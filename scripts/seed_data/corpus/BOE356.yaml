regulation:
  code: BOE356
  name_ar: تنظيم صندوق الشهداء والمصابين والأسرى والمفقودين
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: 'المادة الأولى : التعريفات'
  article_text_ar: 'الوزير: وزير الداخلية. الصندوق: صندوق الشهداء والمصابين والأسرى والمفقودين. المجلس: مجلس أمناء الصندوق. الشهيد: من توفي من العسكريين أو المدنيين بسبب الحرب مع العدو أو أثناء التمارين العسكرية وحفظ الأمن أو أثناء عمليات إنقاذ الأرواح أو الممتلكات في حالات الاحتجاز أو الحرائق. ويشمل ذلك الطلبة العسكريين الذين يكلفون بمهمات مماثلة، وكل موظف عام عسكري أو مدني أو متعاقد سعودي أو أي فرد من أفراد أسرهم - سواء داخل المملكة أو خارجها - توفي بسبب أعمال إرهابية أو بسبب استهدافه بقصد الإساءة إلى المملكة. ويدخل في حكم الشهيد من أصيب من هؤلاء بعجز تتجاوز نسبته (70%). المفقود: من فقد من العسكريين بسبب الحرب مع العدو أو أثناء التمارين العسكرية وحفظ الأمن، ولم تعلم حياته أو مماته. ويشمل ذلك المدنيين والطلبة العسكريين الذين يكلفون بمهمات مماثلة. الأسير: العسكري الذي يحتجز قسرًا بسبب الحرب مع العدو أو أثناء التمارين العسكرية وحفظ الأمن ويثبت وجوده على قيد الحياة. ويشمل ذلك المدنيين والطلبة العسكريين الذين يكلفون بمهمات مماثلة. المصاب: من أصيب من العسكريين أو المدنيين بعجز نسبته (70%) فأقل
    بسبب الحرب مع العدو أو أثناء التمارين العسكرية وحفظ الأمن، أو أثناء عمليات إنقاذ الأرواح أو الممتلكات في حالات الاحتجاز أو الحرائق. ويشمل ذلك من أصيب من الطلبة العسكريين الذين يكلفون بمهمات مماثلة، وكل موظف عام عسكري أو مدني أو متعاقد سعودي أو أي فرد من أفراد أسرهم - سواء داخل المملكة أو خارجها - أصيب بسبب أعمال إرهابية أو بسبب استهدافه بقصد الإساءة إلى المملكة. أسرة الشهيد، أسرة المفقود، أسرة الأسير: الوالدان، والزوجات، والأبناء، والبنات، ومن يعولهم شرعاً. التنظيم: تنظيم الصندوق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: ينشأ بموجب هذا التنظيم صندوق للشهداء والمصابين والأسرى والمفقودين، يتمتع بالشخصية الاعتبارية والاستقلال المالي والإداري، ويكون مرتبطاً بالوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: مقر الصندوق الرئيس في مدينة الرياض، ويجوز إنشاء فروع أو مكاتب له داخل المملكة بقرار من مجلس الأمناء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يهدف الصندوق إلى مساعدة المحتاجين من أسر الشهداء والمصابين والأسرى والمفقودين، ومن يعولونهم شرعاً، والقيام بأعمال خيرية يعود أجرها وثوابها لهم، وذلك وفقاً للأحكام الواردة في هذا التنظيم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للصندوق مجلس أمناء برئاسة الوزير وعضوية وزير الشؤون الإسلامية والأوقاف والدعوة والإرشاد، ووزير المالية، ووزير الشؤون الاجتماعية، ويعين الرئيس بقرار منه أربعة أعضاء آخرين على الأقل من المشهود لهم بالإسهام في المجال الخيري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا في الصندوق، وهو الذي يرسم السياسة العامة له ويشرف على تنفيذها ، وله على وجه خاص ما يلي : 1 - الصرف من الصندوق وفق أحكام هذا التنظيم. 2 - تحديد الأوعية التي تستثمر فيها أموال الصندوق ونسب الاستثمار في كل منها.3 - شراء العقارات، وتسجيلها وقفاً باسم الصندوق بالطرق الشرعية لدى الجهات المختصة، وتنميتها، وتحصيل إيراداتها، وإنفاقها في الأوجه المحددة في هذا التنظيم.4 - تحديد الأوجه التي يصرف فيها ريع عائدات الصندوق، ووضع الضوابط اللازمة لذلك.5 - إصدار لوائح الصندوق المالية والإدارية.6 - قبول الهبات والتبرعات والوصايا والأوقاف. 7 - إقرار خطة تنمية موارد الصندوق واستثمار أمواله.8 - إنشاء فروع أو مكاتب للصندوق داخل المملكة. 9 - تعيين أمين عام الصندوق، وتحديد صلاحياته وحقوقه. 10 - تعيين مراقب حسابات للصندوق، وتحديد أتعابه.11 - إقرار الحساب الختامي للصندوق، وتقرير مراقب الحسابات.12 - النظر في التقرير السنوي للصندوق ونشاطه خلال السنة المالية المنتهية، تمهيداً لرفعه إلى رئيس مجلس الوزراء. 13 - اعتماد الميزانية العمومية السنوية، وحساب الإيرادات والمصروفات، وأي
    قائمة أخرى تخص الوضع المالي للصندوق.14 - تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم يعهد إليها القيام بمهمات محددة. 15 - الاستعانة بمن يراه من الخبراء والمستشارين للقيام ببعض الأعمال أو إجراء ما يراه من دراسات وبحوث. وللمجلس أن يفوض بعض صلاحياته إلى الأمين العام أو إلى من يراه المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1 - يجتمع المجلس برئاسة الرئيس أو من ينيبه مرة على الأقل كل ثلاثة أشهر، أو كلما دعت الحاجة إلى ذلك بناء على دعوة من رئيسه، أو بناء على طلب ثلاثة على الأقل من أعضائه. ويشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء على أن يكون من بينهم الرئيس أو من ينيبه.2 - تصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين، وفي حالة التساوي يرجح الجانب الذي صوت رئيس الجلسة معه، ويجوز في الأمور العاجلة أن يصدر المجلس قراراته بطريق عرضها على الأعضاء متفرقين (بالتمرير) ما لم يطلب أحد الأعضاء - كتابة - اجتماع المجلس للمداولة فيها ، على أن تعرض هذه القرارات على المجلس في أول اجتماع تالٍ لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1 - يكون الأمين العام للصندوق مسؤولاً عن متابعة تنفيذ قرارات المجلس، وعن سير عمل الصندوق، وإدارة شؤون موظفيه، وحفظ الصكوك والسجلات والقيود الخاصة به، وتمثيله أمام الغير. 2 - يحضر الأمين العام جلسات المجلس دون أن يكون له حق التصويت، ويتولى عرض الموضوعات المدرجة على جدول الأعمال، والإشراف على إعداد القرارات اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد الصندوق مما يلي : 1 - الأموال التي تقدمها الدولة له. 2 - التبرعات والهبات والوصايا والأوقاف التي يقبلها المجلس. 3 - عوائد استثمار أمواله.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تودع جميع أموال الصندوق في حساب خاص لدى مؤسسة النقد العربي السعودي، ولا يجوز صرف أي مبلغ من حساب الصندوق إلا بتوقيع من رئيس المجلس أو من يفوضه بذلك، بناءً على قرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يضع المجلس الضوابط اللازمة للصرف من العائدات السنوية لأوقاف الصندوق واستثماراته، على أن يراعى في ذلك ما يأتي : 1 - يصرف من غلة كل وقف ما يلزم لحفظه من ترميم وإصلاح وصيانة. 2 - يخصص ما لا يقل عن (75%) من العائدات السنوية لمساعدة المحتاجين من أسر الشهداء والمصابين والأسرى والمفقودين والذين يعولونها شرعاً. وإذا توافر ما يزيد على ذلك، فيصرف منه في الأعمال الخيرية وأعمال البر داخل المملكة وفق الأنظمة والتعليمات. 3 - يخصص ما لا يزيد على (25%) من العائدات السنوية في استثمارات إضافية للمساعدة على تطوير إمكانات الصندوق ودعم قدراته المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: للمجلس تفويض الأمين العام بسحب مبالغ معينة لصرفها في الوجوه التي يحددها المجلس وفقاً للأحكام الواردة في هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترسل الجهة التي يتبعها الشهيد أو المصاب أو الأسير أو المفقود معلومات كاملة عنه وعن أسرته إلى وزارة الداخلية لتقرير ما تراه في شأنه وأسرته وفقاً لما ينص عليه هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: السنة المالية للصندوق هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من بدء أعمال الصندوق وتنتهي بنهاية السنة المالية التالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62d14b10-5bee-46e9-870a-a9a700f19762/1
  verified: false
