regulation:
  code: BOE290
  name_ar: تنظيم الفحص الفني الدوري للمركبات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: التنظيم: تنظيم الفحص الفني الدوري للمركبات. اللائحة: اللائحة التنفيذية للتنظيم. الرئيس: رئيس مجلس إدارة الهيئة السعودية للمواصفات والمقاييس والجودة. المحافظ: محافظ الهيئة السعودية للمواصفات والمقاييس والجودة. الهيئة: الهيئة السعودية للمواصفات والمقاييس والجودة. الفحص الفني الدوري: عملية إخضاع المركبة والقاطرة والمقطورة ونصف المقطورة؛ للكشف الفني الدوري بحسب متطلبات ومواصفات محددة على أساس فني. المركبة: وسيلة نقل تسير على شبكة الطرق. القاطرة: مركبة موصول بها مقطورة يكونان معاً وحدة واحدة. المقطورة: مركبة ليس لها محرك تجرها مركبة آلية أخرى. نصف المقطورة: مقطورة يستند جزء كبير من وزنها على القاطرة. جهة الفحص: محطة أو مركز أو ورشة يرخّص لها بإجراء الفحص الفني الدوري. المحطة: جهة فحص فنية مرخص لها بناءً على التنظيم بفحص المركبة والقاطرة والمقطورة ونصف المقطورة بما فيها التي تحمل مواد خطرة، وتشتمل على خمسة مسارات فأكثر. المركز: جهة فحص فني مرخص لها بناءً على التنظيم
    بفحص المركبة والقاطرة والمقطورة ونصف المقطورة عدا التي تحمل مواد خطرة، ويشتمل على أربعة مسارات فأقل، أو عدد خمس وحدات فحص فأكثر. الورشة: جهة فحص فنية مرخص لها بناءً على التنظيم بفحص المركبة فقط، وتشتمل على مسارين فأقل أو وحدتين فأقل. المسار: مسرب مجهز بمعدات وأجهزة الفحص الفني الدوري. الوحدة: مكان ثابت يُجرى فيه الفحص الفني الدوري. المواد الخطرة: مواد صلبة أو سائلة أو غازية ذات خواص مضرة بصحة الإنسان أو تؤثر تأثيراً ضاراً على البيئة بسبب خصائصها الكيميائية أو الفيزيائية أو البيولوجية. البرنامج: برنامج إلكتروني؛ لأجل الفحص الفني الدوري. القبول: تقويم تجريه الهيئة في شأن كفاية جهة الفحص في مجال تقديم أعمال الفحص الفني الدوري بناءً على الأحكام ذات الطابع الإداري والفني المحددة في لائحة قبول جهات تقويم المطابقة الصادرة بقرار مجلس إدارة الهيئة. الفحص الفني الدوري المتحرك: جهة فحص تمتلك نظاماً متنقلاً يقوم بعمليات الفحص الفني الدوري للمركبة والقاطرة والمقطورة ونصف المقطورة المتحركة بوساطة أجهزة تقنية متخصصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تتولى الهيئة الترخيص لجهة الفحص بممارسة نشاط الفحص الفني الدوري، وفق النطاقات الجغرافية التي تحددها الهيئة داخل المملكة وبحسب التصنيف الذي تراه، وذلك بعد توافر ما يأتي: أ- سجل تجاري في مجال تقديم أعمال الفحص الفني الدوري. ب- قبول من الهيئة. ج- رخصة بلدية وفق الشروط المنظمة لذلك. د- رخصة سلامة من المديرية العامة للدفاع المدني، وفق الشروط المنظمة لذلك. هـ- استيفاء المتطلبات والضوابط الواجب توافرها في موقع جهة الفحص وفقاً لما تحدده اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتولى الهيئة منح التراخيص اللازمة لجهات الفحص الراغبة في تقديم خدمات الفحص الفني الدوري المتحرك، وتحدد اللائحة الأحكام اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: على الهيئة اتخاذ ما يلزم من إجراءات في شأن ربط إصدار الترخيص تقنياً بمركز المعلومات الوطني. تصدر الهيئة ترخيص كل جهة فحص على حدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب حصر نشاط جهة الفحص في كشف الأخطاء الفنية بالمركبة والقاطرة والمقطورة ونصف المقطورة، والأعطال المحتمل وقوعها فيها، وألا تمارس جهة الفحص أي نشاط للصيانة أو الإصلاح أو بيع قطع الغيار أو شرائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يُجرى الفحص الفني الدوري للمركبة والقاطرة والمقطورة ونصف المقطورة وفقاً لما تصدره الهيئة من تعليمات ولوائح فنية ومواصفات قياسية ذات علاقة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يجب أن يتبنى البرنامج المفهوم الحديث للفحص الفني للمركبات والقاطرة والمقطورة ونصف المقطورة، وبخاصة ما يأتي: أ- التكامل الفني والإداري لبرنامج جهة الفحص ضمن بيئة إلكترونية. ب- أن تلتزم جهة الفحص بالتقنيات الحاسوبية الحديثة لربط جميع إجراءات الفحص الفني الدوري تقنياً لضمان الجودة والسرعة في الأداء. ج- برامج تدريب متطورة ومتفاعلة مع المستجدات. يجب أن يضَمن النظام الإلكتروني -الذي يستخدم في البرنامج- الفاعلية والواقعية في تقديم الخدمات لجميع مراحل الفحص، مع توفير خدمة الربط التقني مع الهيئة والجهات ذات العلاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على جهة الفحص أن توفر للبرنامج صيانة وقائية متكاملة، تشمل برامج معايرة الأجهزة والمعدات وبمختلف المستويات؛ لإسناد ودعماً لجميع أجهزة جهة الفحص الفني الدوري؛ للمحافظة على جاهزيتها ودقتها، وتتابع الهيئة التزام جهة الفحص بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يتولى مجلس إدارة الهيئة اقتراح المقابل المالي الذي تحصل عليه جهة الفحص لإجراء الفحص الفني الدوري، ويرفعه الرئيس إلى مجلس الوزراء؛ لإقراره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد مقررة نظاماً، تعاقب جهة الفحص المخالفة لأحكام التنظيم أو اللائحة بعقوبة (أو أكثر) من العقوبات الآتية: أ- الإنذار. ب- غرامة لا تزيد على مائة ألف ريال. ج- الإغلاق لمدة لا تتجاوز ستة أشهر، ويجوز عند تكرار المخالفة إلغاء الترخيص نهائياً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكوّن بقرار من الرئيس لجنة (أو أكثر) لا يقل عدد أعضائها عن (ثلاثة)، ويسمى أحدهم رئيساً، ويكون من بينهم ممثل من الهيئة يسميه المحافظ، ومستشار شرعي أو نظامي؛ تتولى النظر في مخالفات جهة الفحص لأحكام التنظيم أو اللائحة وتوقيع العقوبات المنصوص عليها في المادة (العاشرة) من التنظيم. يصدر الرئيس بقرار منه قواعد عمل اللجنة. يحدد الرئيس مكافآت أعضاء اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يحق لمن صدر في شأنه قرار من اللجنة المنصوص عليها في المادة (الحادية عشرة) من التنظيم بأي من العقوبات المنصوص عليها في المادة (العاشرة) من التنظيم الاعتراض عليه أمام المحكمة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يتولى موظفون -يصدر بتسميتهم قرار من الرئيس- الرقابة والتفتيش على جهة الفحص، وضبط ما يقع منها من مخالفات لأحكام التنظيم أو اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يصدر الرئيس اللائحة، وذلك خلال (مائة وثمانين) يوماً من تاريخ نشر التنظيم بالجريدة الرسمية، ويعمل بها من تاريخ العمل به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يحل التنظيم محل تنظيم الفحص الفني الدوري للمركبات، الصادر بقرار مجلس الوزراء رقم (169) وتاريخ 19 / 5 / 1431هـ، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به بعد (مائة وثمانين) يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b15d62d-6e3a-4894-b6fa-ad0700926350/1
  verified: false
