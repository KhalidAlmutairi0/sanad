articles:
- article_ref: الباب الأول الوظائف
  article_text_ar: الجدارة هي الأساس في اختيار الموظفين لشغل الوظيفة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 2
  article_text_ar: تصنف الوظائف بتجميعها في فئات تتضمن كل فئة منها الوظائف المتماثلة في طبيعة العمل ومستوى الواجبات والمسئوليات والمؤهلات المطلوبة لشغلها وتوصف الفئات طبقا للقواعد الواردة في المادة الثالثة، ويجوز أن يجري تصنيف الوظائف تدريجيا وذلك وفق قواعد تعتمد بقرار من رئيس مجلس الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 3
  article_text_ar: 'توصف مختلف الفئات بحيث تتضمن أوصاف كل فئة ما يلي: أ - الاسم الذي يدل عليها.ب - مرتبتها حسب سلم الرواتب الملحق بهذا النظام.ج - وصفًا عامًا لواجباتها ومسئولياتها.د - وصفًا تحليليًا لواجباتها ومسئولياتها.هـ - بيانًا بالحد الأدنى للمؤهلات المطلوبة لشغلها وتشمل المؤهلات العلمية والعملية ودرجة المهارة المطلوبة وغير ذلك من الشروط المطلوبة للوظيفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: الباب الثاني الموظفون  الفصل الأول شغل الوظيفة
  article_text_ar: 'مع مراعاة ما تقضي به الأنظمة الأخرى يشترط فيمن يعين في إحدى الوظائف أن يكون: أ - سعودي الجنسية، ويجوز استثناء من ذلك استخدام غير السعودي بصفة مؤقتة في الوظائف التي تتطلب كفاءات غير متوفرة في السعوديين بموجب قواعد يضعها مجلس الخدمة المدنية. ب - مكملاً سبعة عشر عامًا من العمر. ج - لائقًا صحيًا للخدمة. د - حسن السيرة والأخلاق. هـ - حائزًا المؤهلات المطلوبة للوظيفة، ويجوز لمجلس الخدمة المدنية الإعفاء من هذا الشرط. و- غير محكوم عليه بحد شرعي أو بالسجن في جريمة مخلة بالشرف أو الأمانة حتى يمضي على انتهاء تنفيذ الحد أو السجن ثلاث سنوات على الأقل. ز- غير مفصول من خدمة الدولة لأسباب تأديبية ما لم يكن مضى على صدور قرار الفصل ثلاث سنوات على الأقل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 5
  article_text_ar: يتم شغل وظائف الدواوين الملكية بأمر ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 6
  article_text_ar: يتم شغل وظائف المرتبة الرابعة عشرة فما فوق بقرار من مجلس الوزراء ويتم شغل وظائف المرتبة الثالثة عشرة فما دون بقرار من الوزير المختص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 7
  article_text_ar: يعلن الديوان العام للخدمة المدنية الوظائف التي في المرتبة العاشرة فما دون ويخضع جميع المتقدمين لشغل هذه الوظائف لتقييم يحدد الديوان العام للخدمة المدنية مقاييسه وإجراءاته حسب ما تقتضيه الوظائف المعلنة ومتطلبات الخدمة.ويجوز بعد اتفاق رئيس الديوان العام للخدمة المدنية والوزير المختص أن تقوم الجهة الإدارية بامتحان من يتقدمون لشغل بعض وظائف المراتب الخاصة فما دون وفق المقاييس والإجراءات التي يحددها الديوان العام للخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 8
  article_text_ar: الموظف الذي لا يباشر مهمات وظيفته دون عذر مشروع خلال خمسة عشر (15) يومًا من تاريخ إبلاغه قرار التعيين يلغى قرار تعيينه ويعتبر كأن لم يكن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 9
  article_text_ar: يعتبر الموظف المعين ابتداء تحت التجربة مدة سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 10
  article_text_ar: أ - تتم ترقية ونقل الموظفين إلى الوظائف الشاغرة وفق الأحكام التي تحددها قواعد التصنيف بما في ذلك مؤهلات وشروط شغل الوظيفة.ب - لا تكون الترقية نافذة قبل تاريخ صدور القرار بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: الفصل الثاني الواجبات
  article_text_ar: 'يجب على الموظف خاصة : أ‌ - أن يترفع عن كل ما يخل بشرف الوظيفة والكرامة سواء كان ذلك في محل العمل أم خارجه. ب - أن يراعي آداب اللباقة في تصرفاته مع الجمهور ورؤسائه وزملائه ومرؤوسيه. ج - أن يخصص وقت العمل لأداء واجبات وظيفته وأن ينفذ الأوامر الصادرة إليه بدقة وأمانة في حدود النظم والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة12
  article_text_ar: 'يحظرعلى الموظف خاصة : أ - إساءة استعمال السلطة الوظيفية. ب - استغلال النفوذ. ج - قبول الرشوة أو طلبها بأي صورة من الصور المنصوص عليها في نظام مكافحة الرشوة. د - قبول الهدايا أو الإكراميات أو خلافه بالذات أو بالوساطة لقصد الاغراء من أرباب المصالح. هـ - إفشاء الأسرار التي يطّلع عليها بحكم وظيفته ولو بعد تركه الخدمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 13
  article_text_ar: 'يجب على الموظف أن يمتنع عن : أ - الاشتغال بالتجارة بطريقة مباشرة أو غير مباشرة.ب - الاشتراك في تأ سيس الشركات أو قبول عضوية مجالس إدارتها أو أي عمل فيها أو في محل تجاري إلا اذا كان معينا من الحكومة، ويجوز بمقتضى لائحة يصدرها مجلس الوزراء الإذن للموظفين بالعمل في القطاع الخاص في غير أوقات الدوام الرسمي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 14
  article_text_ar: لا يجوز للموظف الجمع بين وظيفته وممارسة مهنة أخرى، ويجوز الترخيص في الاشتغال بالمهن الحرة لمن تقضي المصلحة العامة بالترخيص لهم في ذلك لحاجة البلاد إلى مهنهم ويكون منح هذا الترخيص من قبل الوزير المختص وتحدد اللائحة شروط منح هذا الترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 15
  article_text_ar: كل موظف مسؤول عما يصدر عنه ومسؤول عن حسن سير العمل في حدود إختصاصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة (15 مكرر)
  article_text_ar: '- أُضيفت هذه المادة وذلك بموجب المرسوم الملكي رقم (م/95) وتاريخ 1439/9/15هـ، لتكون بالنص الآتي: "تتولى إدارة الموارد البشرية في الجهة الحكومية تطبيق أحكام هذا النظام ولوائحه التنفيذية والقرارات والتعليمات ذات العلاقة، وتلتزم الإدارات المعنية في كل جهة حكومية بالرجوع إليها في جميع ما يتعلق بذلك، وعلى الجهة الحكومية الرجوع إلى الوزارة فيما يعترضها عند التطبيق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: الفصل الثالث الرواتب والعلاوات
  article_text_ar: يستحق الموظف راتبه اعتباراً من تاريخ مباشرته العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 17
  article_text_ar: يمنح الموظف العلاوة وفق سلم الرواتب الملحق بهذا النظام وذلك بنقله من الدرجة التي يشغلها إلى الدرجة التالية لها مباشرة في المرتبة نفسها ويتم هذا النقل من أول شهر محرم من كل سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 18
  article_text_ar: أ - يمنح الموظف المعين راتب أول درجة في مرتبة الوظيفة التي عين عليها فإذا كان راتبه عند التعيين يساوي راتب هذه الدرجة أو يزيد عليه يمنح راتب أول درجة تتجاوز راتبه عند التعيين. ويجوز التعيين في غير الدرجة الأولى بالنسبة لمن يتوفر لديه مؤهلات معينة يحددها مجلس الخدمة المدنية. ب - يمنح الموظف المرقى راتب أول درجة في مرتبة الوظيفة التي يرقى إليها فإذا كان راتبه عند الترقية يساوي راتب هذه الدرجة أو يزيد عليه يمنح راتب أول درجة تتجاوز راتبه. ويجوز بقرار من السلطة المختصة منح الموظف المرقى راتب الدرجة التالية. ج - في حالة إعادة الموظف الذي ترك الخدمة في وظيفة بنفس المرتبة التي كان يشغلها عند انتهاء خدمته يوضع بنفس الدرجة التي كان عليها أما إذا أعيد إلى وظيفة ذات مرتبة أقل فيمنح راتب أول درجة تتجاوز آخر راتب كان يتقاضاه فإذا كان راتبه يزيد عن راتب آخر درجة في مرتبة الوظيفة يمنح هذه الدرجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 19
  article_text_ar: يصرف للموظف المكفوف اليد ومن في حكمه نصف صافي راتبه فإذا برئ أو عوقب بغير الفصل يصرف له الباقي من راتبه. أما إذا عوقب بالفصل فلا يستعاد ما صرف له ما لم تقرر الجهة التي أصدرت قرار العقوبة غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 20
  article_text_ar: لا يجوز الحجز على راتب الموظف إلا بأمر من الجهة المختصة ولا يجوز أن يتجاوز المقدار المحجوز كل شهر ثلث صافي راتبه الشهري ما عدا دين النفقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 21
  article_text_ar: مع مراعاة ما تقضي به الأنظمة لا يستحق الموظف راتباً عن الأيام التي لا يباشر فيها عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: الفصل الرابع البدلات والمكافآت والتعويضات
  article_text_ar: يصرف للموظف المنتدب في مهمة رسمية بدل نقدي عن كل يوم يقضيه خارج مقر عمله داخل المملكة أوخارجها وفق الفئات التي تحددها لائحة البدلات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 23
  article_text_ar: يجوز بقرار من الوزير المختص تكليف الموظف بالقيام بأعمال وظيفة معينة أو بالقيام بمهمة رسمية ، كما يجوز تكليفه بذلك مع قيامه بمهام وظيفته الأصلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 24
  article_text_ar: يجوز أن يحدد الديوان العام للخدمة المدنية المستوى الذي يصل إليه أداء العمل بالنسبة لبعض الوظائف فإذا زاد عمل الموظف على القدر المحدد جاز منحه مكافأة عن هذه الزيادة تحدد بقرار من الوزير المختص وتحدد اللائحة قواعد منح هذه المكافأة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 25
  article_text_ar: يجوز بقرار من الوزير المختص شغل بعض الوظائف بصفة مؤقته بمكافأة تحدد على أساس العمل بالقطعة أو الإنتاج أو الساعة حسب المعدلات التي يضعها مجلس الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة (25 مكرر)
  article_text_ar: '- أُضيفت هذه المادة وذلك بموجب المرسوم الملكي رقم (م/95) وتاريخ 1439/9/15هـ، لتكون بالنص الآتي: "يجوز التعاقد مع المستشارين والخبراء لأداء خدمة معينة، بموجب نموذج عقد يتفق عليه بين الجهة الحكومية ووزارتي الخدمة المدنية والمالية، يتضمن نطاق ومجال العمل المطلوب أداؤه ومدة العقد والتزامات وحقوق الطرفين بما في ذلك السقف الأعلى لاستحقاقات المتعاقد. وتحدد اللائحة ضوابط التعاقد وإجراءاته وآلية تحديد المقابل المالي في العقود."'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 26
  article_text_ar: يصرف للموظف الذي يكلف بالعمل خارج وقت الدوام الرسمي وأثناء العطل الرسمية مكافأة نقدية عن الساعات الإضافية ، وتحدد اللائحة قواعد منح هذه المكافأة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 27
  article_text_ar: تحدد اللائحة أنواع ومقدار وشروط البدلات أو المكافآت أو التعويضات أو المزايا التي تمنح للموظف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: الفصل الخامس  الإجازات والإعارة
  article_text_ar: تحدد اللائحة أنواع ومدد وشروط الإجازات وفترات الغياب التي يستحقها الموظف أو يؤذن له فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 29
  article_text_ar: يجوز إعارة الموظف بعد موافقته للعمل لدى المؤسسات العامة أو الخاصة أو الحكومات أو الهيئات الدولية وتحدد اللائحة قواعد الإعارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: الفصل السادس  إنهاء الخدمة
  article_text_ar: 'مع مراعاة أسباب إنهاء الخدمة التي تنص عليها الأنظمة تنهى خدمة الموظف لأحد الأسباب الآتية: أ - الاستقالة.ب - طلب الإحالة على التقاعد قبل بلوغ السن النظامية حسب نظام التقاعد.ج - إلغاء الوظيفة.د - بلوغ السن النظامية للتقاعد ما لم تمدد خدمته بقرار من السلطة المختصة.هـ - العجز الصحي. و - الغياب بغير عذر مشروع أو عدم تنفيذ قرار النقل. ز - الفصل لأسباب تأديبية.ح - الفصل بأمر ملكي أو بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: الباب الثالث أحكام عامة وانتقالية
  article_text_ar: للوزير تفويض بعض صلاحياته المقررة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 32
  article_text_ar: يكون لرئيس المصلحة المستقلة بالنسبة لموظفي هذه المصلحة من الصلاحيات ما للوزير بالنسبة لموظفي الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 33
  article_text_ar: لا يجوز تعيين الموظف على أكثر من وظيفة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 34
  article_text_ar: يعتبر تدريب الموظفين جزءا من واجبات العمل النظامية سواء كان داخل أو خارج أوقات الدوام الرسمي وعلى جميع الوزارات والمصالح الحكومية تمكين موظفيها من تلقي التدريب كل في مجال اختصاصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 35
  article_text_ar: يتم ابتعاث الموظفين الذين تقضي مصلحة العمل بابتعاثهم للدراسة وفق لائحة الابتعاث.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 36
  article_text_ar: تعد تقارير دورية عن كل موظف وفق لائحة يصدرها رئيس مجلس الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة (36 مكرر)
  article_text_ar: '- أُضيفت هذه المادة وذلك بموجب المرسوم الملكي رقم (م/95) وتاريخ 1439/9/15هـ، لتكون بالنص الآتي: " تتولى إدارة الموارد البشرية في الجهة الحكومية إعداد الخطط الوظيفية وفق المعايير والأسس التي تحددها اللائحة، وبخاصة ما يأتي: أ- خطة القوى العاملة. ب- خطة التطوير والتدريب. ج- خطة تطوير القيادات. د- خطة إدارة المواهب. هـ- خطة التعاقب الوظيفي. ويعتمد الوزير المختص هذه الخطط بالتنسيق مع وزارة الخدمة المدنية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 37
  article_text_ar: يجوز بقرار من مجلس الخدمة المدنية استثناء وظائف معينة من بعض أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة ( 37مكرر )
  article_text_ar: '- أُضيفت هذه المادة وذلك بموجب المرسوم الملكي رقم (م/57) وتاريخ 1438/5/24هـ، لتكون بالنص الآتي: " تسري أحكام هذا النظام على جميع الموظفين المدنيين الذين يشغلون وظائف ثابتة في الميزانية العامة للدولة، ويستثنى من تطبيق أحكامه موظفو الجهات الذين تسري في شأنهم أنظمة أو لوائح خاصة في حدود ما تنص عليه تلك الأنظمة واللوائح ".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 38
  article_text_ar: 'يحل هذا النظام محل نظام الموظفين الصادر بالمرسوم الملكي رقم م/5 وتاريخ 1 / 2 / 1391 هـ وذلك : أ - بالنسبة للموظفين الخاضعين بصفة أصلية لهذا النظام. ب - بالنسبة للموظفين الذين يعتبر النظام المذكور مكملاً للنظم التي تحكم أوضاعهم وذلك في حدود ما تنص عليه تلك النظم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 39
  article_text_ar: يصدر مجلس الخدمة المدنية لوائح هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
- article_ref: مادة 40
  article_text_ar: لمجلس الوزراء حق تفسير هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/32f651e6-2976-439c-b418-a9a700f23fb2/1
  verified: false
