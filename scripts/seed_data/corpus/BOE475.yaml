articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها، ما لم يدل السياق على غير ذلك: البنك: بنك التصدير والاستيراد السعودي. التنظيم: تنظيم البنك. المجلس: مجلس إدارة البنك. الرئيس: رئيس المجلس. الوزير: وزير الصناعة والثروة المعدنية. الرئيس التنفيذي: الرئيس التنفيذي للبنك. الاستيراد: استيراد السلع أو الخدمات من أجل إدخال قيمة مضافة وإعادة تصديرها إلى الخارج. التصدير: إرسال السلع أو الخدمات المنتجة في المملكة إلى الخارج، ما عدا (النفط الخام).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: نشأ بموجب التنظيم بنك يسمى بنك (التصدير والاستيراد السعودي)، يحدد ارتباطه بأمر من رئيس مجلس الوزراء، ويتمتع بالشخصية الاعتبارية المستقلة والاستقلال المالي والإداري، ويباشر المهمات والاختصاصات المنوطة به بموجب التنظيم. يكون مقر البنك الرئيس في مدينة الرياض، وللبنك -بقرار من المجلس- إنشاء فروع أو مكاتب له داخل المملكة أو خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف البنك إلى تعزيز تنمية الصادرات السعودية وتنويعها وزيادة قدرتها التنافسية، من خلال توفير خدمات تمويل الصادرات، والضمان، وتأمين ائتمان الصادرات بمزايا تنافسية، وذلك من أجل تعزيز الثقة في الصادرات السعودية، ودخول أسواق جديدة، والحد من مخاطر عدم السداد. كما يهدف البنك إلى تقديم تسهيلات ائتمانية للاستيراد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع عدم الاخلال باختصاصات ومسؤوليات الجهات الحكومية الأخرى، للبنك -في سبيل تحقيق أهدافه- القيام بالمهمات والاختصاصات اللازمة التي تخدم الغايات التي أنشئ من أجلها، ومن ذلك الآتي: تقديم خدمات تمويل الصادرات والضمان وتأمين ائتمان الصادرات للمستفيدين بمزايا تنافسية. إصدار الضمانات أو تقديم غير ذلك من أشكال التسهيلات الائتمانية، على أن يتم تغطيته من رأس مال البنك. تمويل المستوردين للمواد الخام، بهدف إيجاد قيمة مضافة وإعادة التصدير. التعاون والتواصل مع المؤسسات الحكومية، وبناء شراكات معها بما يخدم أهداف البنك والغايات التي أنشئ من أجلها. تقديم المشورة المالية أو الاقتصادية أو الفنية للمستفيدين. توفير أفضل الحلول والخدمات التي تسهم في تعزيز الصادرات السعودية من خلال عقد الشراكات مع الجهات المحلية والدولية في القطاعين العام والخاص. التعاون والعمل مع البنوك التجارية والمؤسسات المالية المحلية والدولية من أجل تقديم خدمات مالية متكاملة لتمويل الصادرات. دراسة ومتابعة تطورات خدمات تمويل الصادرات والضمان وتأمين ائتمان الصادرات دولياً، وتحديد أفضل الممارسات والمعايير من أجل تحسين خدماته.
    عقد اللقاءات والندوات، وتنظيم جلسات العمل في مجال أعماله. إجراء البحوث والدراسات اللازمة في الموضوعات ذات الصلة بأهدافه. الإسهام في تدريب القدرات والكوادر الوطنية في مجال عمله، وتطويرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: (المادة الرابعة مكرر)
  article_text_ar: '- أُضيفت هذه المادة وذلك بموجب قرار مجلس الوزراء رقم (508) وتاريخ 1443/9/4هـ، لتكون بالنص الآتي: " لا يجوز أن تتجاوز التزامات البنك المباشرة أو غير المباشرة قيمة أصوله إلا وفق حالات وضوابط يتم وضعها بالاتفاق مع صندوق التنمية الوطني".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للبنك مجلس إدارة برئاسة الوزير، وعضوية كل من: أ- ممثل من وزارة المالية. ب- ممثل من وزارة الاقتصاد والتخطيط. ج- ممثل من هيئة تنمية الصادرات السعودية. د- ممثل من الهيئة العامة للتجارة الخارجية. هـ- ممثل من الهيئة العامة للمنشآت الصغيرة والمتوسطة. و- ممثل من الصندوق السعودي للتنمية. ز- ممثل من صندوق التنمية الصناعية السعودي. ح - ممثل من هيئة المحتوى المحلي والمشتريات الحكومية. ط - ممثل من صندوق التنمية الوطني. تكون مدة العضوية في المجلس (ثلاث) سنوات قابلة للتجديد مرة واحدة، ويجب ألا تقل مرتبة ممثلي الجهات المشاركة عن المرتبة (الثالثة عشرة) أو ما يعادلها. يختار المجلس من بين أعضائه نائباً للرئيس في أول اجتماع له. يراعى أن يكون للعضو مؤهلات وخبرات أو اختصاصات وظيفية تتناسب مع عمل البنك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للبنك، يتولى الإشراف عليه ويصرف أموره، وله -في حدود أحكام التنظيم- اتخاذ جميع القرارات اللازمة لتحقيق أهدافه، وله على وجه خاص ما يأتي: إقرار السياسات العامة للبنك وخطة العمل التي يسير عليها؛ لتحقيق أغراضه ومتابعة تنفيذها. تحديد أنواع التسهيلات الائتمانية التي يقدمها البنك، ووضع الحدود القصوى لقيمتها. إقرار المقابل المالي للخدمات التي يقدمها البنك. اعتماد أنواع الخدمات المالية وغير المالية التي يقدمها البنك للمستفيدين. الموافقة على اقتراض البنك وغير ذلك من صور المديونية بما في ذلك إصدار الصكوك والسندات من خلال الضوابط التي يتم الاتفاق عليها مع وزارة المالية. تحديد فئات المستفيدين من خدمات البنك. إقرار الهيكل التنظيمي للبنك. اعتماد اللوائح الإدارية والمالية للبنك - بالاتفاق مع وزارة المالية - وغيرها من اللوائح التي تسير أعماله. الموافقة على إنشاء فروع أو مكاتب للبنك. النظر في التقارير الدورية التي يرفعها الرئيس التنفيذي عن سير عمل البنك. قبول المنح والتبرعات والهبات والوصايا والأوقاف وفقاً للأنظمة. تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي.
    تشكيل اللجان وتخويلها ما يراه من الصلاحيات لإنجاز المهمات التي يكلفها بها. تقويم أداء الإدارة التنفيذية ومتابعة اتخاذ الإجراءات التصحيحية اللازمة إذا تطلب الأمر ذلك. الموافقة على تأسيس الشركات أو المشاركة فيها. الموافقة على آلية استثمار ما يملكه البنك من أموال. اعتماد مؤشرات قياس أداء البنك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس بدعوة من الرئيس (ست) مرات على الأقل في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وعلى الرئيس دعوة المجلس إلى الاجتماع إذا طلب ذلك (نصف) الأعضاء على الأقل. توجه الدعوة إلى حضور اجتماع المجلس قبل موعد الاجتماع (بخمسة) أيام على الأقل، على أن تتضمن جدول الأعمال. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حال تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت ولا تفويض عضو آخر في التصويت نيابة عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز للمجلس - عند الحاجة وفي الحالات المستعجلة ووفقًا لما يقدره الرئيس- عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية. ويمكن أن تتخذ القرارات عن طريق التمرير على أعضاء المجلس، ويوقع عليها بما يفيد اطلاع جميع الأعضاء عليها، ولا يعد القرار الصادر بهذه الطريقة صحيحاً ما لم يصوت عليه جميع الأعضاء، ويعرض هذا القرار على المجلس
    في أول اجتماع لاحق لإثباته في محضر الاجتماع. للمجلس أن يدعو إلى حضور جلساته من يرى الاستعانة بهم دون أن يكون لهم حق التصويت. لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار البنك. يجب على أعضاء مجلس الإدارة الإفصاح عن أي تعارض للمصالح قبل الانضمام للمجلس. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو من يراه من أعضائه أو من منسوبي البنك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للبنك رئيس تنفيذي يكون تعيينه وإعفاؤه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى. وهو المسؤول التنفيذي عن إدارة شؤون البنك وتسيير أعماله ومسؤولياته وسلطاته وصلاحياته في حدود ما ينص عليه التنظيم، وما يقرره المجلس، وله على وجه الخصوص ممارسة الاختصاصات الآتية: اقتراح السياسات العامة وخطة العمل التي يسير عليها البنك لتحقيق أهدافه، ورفعها إلى المجلس؛ لإقرارها. اقتراح الهيكل التنظيمي للبنك ولوائحه الإدارية والمالية واللوائح اللازمة لتسيير العمل فيه، ورفعها إلى المجلس؛ لإقرارها والإشراف على تنفيذها بعد إقرارها. الإشراف على سير عمل البنك والعاملين فيه وفقاً للصلاحيات المنوطة به وما تحدده لوائح البنك. إصدار الأوامر بمصروفات البنك وفقاً للوائحه المالية. إعداد تقارير دورية عن أعمال البنك وإنجازاته ونشاطاته والمعوقات التي يواجهها، ورفعها إلى المجلس؛ تمهيدًا لاستكمال ما يلزم في شأنها. التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات الممنوحة له من المجلس. تعيين منسوبي البنك، والإشراف عليهم، وإنهاء خدماتهم؛ وفقاً للصلاحيات الممنوحة له وما تحدده
    الأنظمة واللوائح ذات العلاقة. التعاقد مع الخبراء والمختصين والمستشارين في المجالات ذات العلاقة بعمل البنك. تقديم المقترحات والتوصيات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. اقتراح الخدمات التي يمكن تقديمها والمقابل المالي لها، ورفعها إلى المجلس؛ لإقرارها. إعداد مؤشرات لقياس أداء البنك، ورفعها إلى المجلس؛ لاعتمادها. تمثيل البنك أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى المعنية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. ممارسة أي اختصاص يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته وصلاحياته إلى غيره من منسوبي البنك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد البنك مما يلي: أ- المقابل المالي الذي يتقاضاه نظير تقديم خدماته. ب- الهبات والتبرعات والأوقاف والوصايا التي يقبلها المجلس وفقاً للأنظمة. ج- عوائد استثمار ما يملكه من أموال. د- الصكوك والسندات التي يصدرها البنك. هـ- المساهمات النقدية والعينية التي تقدمها الدولة. و- الموارد الأخرى التي يقرها المجلس بما لا يتعارض مع الأنظمة والتعليمات. تودع أموال البنك في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي، ويصرف منها وفقاً لميزانيته المعتمدة. يفتح البنك حساباً له في مؤسسة النقد العربي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة. ويصرف من هذه الحسابات وفق ميزانية البنك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: مع عدم الإخلال باختصاصات الديوان العام للمحاسبة بالرقابة على حسابات البنك، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات البنك ومعاملاته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه، ويُرفع تقرير مراجع الحسابات إلى المجلس، ويُزوّد الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يرفع المجلس إلى جهة الارتباط تقريراً سنوياً عن أعمال البنك وحساباته مصدقاً عليه من المراجعين القانونيين؛ للنظر فيه، تمهيداً لاستكمال الإجراءات النظامية المتبعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يخضع جميع منسوبي البنك لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: السنة المالية البنك هي السنة المالية للدولة. واستثناءً من ذلك تبدأ السنة المالية الأولى للبنك من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/017d722d-4f95-4acd-be8c-ab6c00eb3f90/1
  verified: false
