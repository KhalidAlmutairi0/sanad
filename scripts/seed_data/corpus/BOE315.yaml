  name_ar: اللائحة التنفيذية لنظام التكاليف القضائية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يكون للألفاظ والمصطلحات الواردة في هذه اللائحة المعاني المبينة في المادة (الأولى) من نظام التكاليف القضائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'مع مراعاة ما تقضي به المادة (الثالثة) من النظام؛ تُقدّر التكاليف القضائية للدعوى المحددة القيمة؛ على أساس نسبة من قيمة المطالبة فيها، وذلك على النحو الآتي: أ- نسبة (٥٪) إذا كانت قيمة المطالبة أقل من مائة ألف ريال. ب- نسبة (٤٪) إذا كانت قيمة المطالبة مائة ألف ريال فأكثر، وتقل عن خمسمائة ألف ريال. ج- نسبة (٣٪) إذا كانت قيمة المطالبة خمسمائة ألف ريال فأكثر، وتقل عن مليون ريال. د- نسبة (٢٪) إذا كانت قيمة المطالبة مليون ريال فأعلى. تُحدد قيمة المطالبة على النحو الآتي: أ- فيما يتعلق بالدعاوى المالية، تُحدد على أساس المبلغ الذي يطلب المدعي الحكم به. ب- في الدعاوى المتعلقة بإثبات صحة عقد أو فسخه أو إبطاله أو الإلزام بتنفيذه، تُحدد على أساس قيمة الشيء المتنازع عليه وفقاً لقيمته المحددة في العقد. ج- في الدعاوى المتعلقة بمنازعات ملكية عقار؛ تُحدد على أساس قيمة العقار عند رفع الدعوى، وتُحدد قيمة العقار بناء على البيانات التاريخية -الموثقة لدى وزارة العدل- لقيمة مبايعات هذا العقار والعقارات المجاورة له، ونحو ذلك من الوسائل الأخرى التي تُمكن الوزارة من تحديد قيمته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تُقدّر التكاليف القضائية في الدعاوى غير محددة القيمة على النحو الآتي: الدعاوى الجزائية الخاصة؛ عشرة آلاف ريال. الدعاوى التي تُنظر لدى المحاكم التجارية والدوائر التجارية؛ خمسة آلاف ريال. الدعاوى المستعجلة أيًا كانت المحكمة أو الدائرة التي تنظرها؛ ثلاثة آلاف ريال. الدعاوى التي تُنظر لدى المحاكم العامة؛ ثلاثة آلاف ريال. منازعات التنفيذ؛ ثلاثة آلاف ريال. الدعاوى التي تُنظر لدى المحاكم العمالية والدوائر العمالية؛ ألفا ريال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: إذا اشتملت الدعوى على مطالبة محددة القيمة وأخرى غير محددة القيمة، فتحتسب تكاليف كل مطالبة بحسب الأحكام الواردة في النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تُقدّر التكاليف القضائية لطلب التنفيذ المباشر بمبلغ قدره خمسمائة ريال، وفيما يتعلق بباقي طلبات التنفيذ، فتقدر التكاليف القضائية بنسبة اثنين في المائة (٢٪) من قيمة المطالبة على ألا تقل هذه التكاليف عن خمسمائة ريال ولا تزيد على عشرة آلاف ريال. ويتحمل المنفذ ضده التكاليف القضائية لطلب التنفيذ ما لم يثبت أن طالب التنفيذ غير مستحق لمطالبته، فيتحمل طالب التنفيذ كامل التكاليف القضائية، وإذا كان طالب التنفيذ غير مستحق لجزء من مطالبته، فيتحمل من التكاليف القضائية بقدر هذا الجزء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تُقدّر التكاليف القضائية للطلبات الواردة في المادة (السابعة) من النظام، على النحو الآتي: طلب التماس إعادة النظر؛ عشرة آلاف ريال. طلب النقض؛ سبعة آلاف ريال. طلب الاستئناف؛ خمسة آلاف ريال. طلب الإدخال من الخصوم، وطلب الرد، وطلب تصحيح الحكم أو تفسيره، وطلب وقف تنفيذ الحكم؛ ألفا ريال. الطلب العارض؛ ألف ريال. طلب أحد الخصوم السير في الدعوى الموقوفة اتفاقاً قبل انتهاء المدة المتفق عليها لوقف الخصومة؛ مائة ريال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تكون التكاليف القضائية لكل طلب من الطلبات الواردة في المادة (الثامنة) من النظام على النحو الآتي: طلب ذي المصلحة تسليمه نسخة مصدقة من أوراق الدعوى أو سجلاتها -الورقية أو الإلكترونية- أو الوثائق أو الأوراق التي تحت يد المحكمة؛ مائة ريال. طلب ذي المصلحة الاطلاع على أوراق الدعوى أو سجلاتها -الورقية أو الإلكترونية-؛ خمسون ريالاً. طلب نسخة بديلة للوثائق القضائية؛ مائة ريال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تصدر الإدارة المختصة -التي يحددها وزير العدل- التقدير النهائي لمبلغ التكاليف القضائية للدعوى بعد انتهائها، ويبلغ المكلف بأداء هذه التكاليف، ولا يُحصل مبلغ التكاليف من المكلف إلا بعد انتهاء مدة الاعتراض على التقدير أو صدور قرار في شأن اعتراضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: فيما عدا طلب النقض وطلب التماس إعادة النظر، تصدر الإدارة المختصة -التي يحددها وزير العدل- التقدير النهائي لمبلغ التكاليف القضائية للطلب بعد البت فيه، ويبلغ المكلف بأداء هذه التكاليف، ولا يُحصل مبلغ التكاليف من المكلف إلا بعد انتهاء مدة الاعتراض على التقدير أو صدور قرار في شأن اعتراضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تحتسب التكاليف القضائية بالريال السعودي، ولا يحتسب الجزء من الريال في تقدير التكاليف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يشترط للترخيص للقطاع الخاص للقيام بالأعمال المساندة لتطبيق أحكام النظام -إضافةً إلى استيفاء المتطلبات النظامية- الشروط الآتية: أن يكون المرخص له شركة مرخصاً لها في المملكة للقيام بالعمل محل الترخيص. أن يكون للمرخص له خبرة في تقديم الخدمة محل الترخيص لا تقل عن ثلاث سنوات. أن يكون الترخيص محدداً بمدة. أن تتوافر لدى المرخص له الخبرات الفنية والقدرات المالية اللازمة للقيام بتقديم الخدمة محل الترخيص بحسب ما تقرره وزارة العدل. ألا يكون هناك تعارض مصالح لدى المرخص له وإن كان هذا التعارض محتملاً. أن يلتزم المرخص له بالمحافظة على سرية أي معلومات تم الاطلاع عليها بسبب تقديم الخدمة محل الترخيص، وأن يمتد هذا الالتزام حتى بعد انتهاء الترخيص. أن يلتزم المرخص له بالشروط الفنية الخاصة بحسب ما تقرره وزارة العدل. وتتولى وزارة العدل الإشراف على أعمال المرخص له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يكون تحصيل التكاليف القضائية وفق الأحكام النظامية المقررة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لغرض إدارة التحصيل والاعتراضات والإعفاءات والاستثناءات الواردة في النظام واللائحة؛ تفتح وزارة العدل حساباً جارياً تودع فيه المبالغ المتحصلة من التكاليف القضائية، ومن ثم تُودع تلك المبالغ في حساب جاري وزارة المالية لدى البنك المركزي السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يصدر وزير العدل بالتنسيق مع رئيس المجلس الأعلى للقضاء ما يلزم في شأن إجراءات الاعتراض على قرار الإدارة المختصة بتحديد مبلغ التكاليف القضائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يكون تنفيذ الإجراءات الواردة في النظام واللائحة في أي وقت باستعمال الوسائل الإلكترونية المعتمدة، وإذا تعذر تنفيذ أي من الإجراءات بالوسائل الإلكترونية المعتمدة، فيجوز تنفيذه بالطرق العادية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يصدر وزير العدل ما يلزم من قرارات لتنفيذ أحكام اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تنشر اللائحة في الجريدة الرسمية، ويعمل بها من تاريخ العمل بالنظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7e8efd3-4021-4413-8255-ae7c00f190de/1
  verified: false
