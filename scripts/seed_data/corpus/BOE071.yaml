articles:
- article_ref: 'المادة الأولى:  تعريفات'
  article_text_ar: 'يقصد بالعبارات الآتية المعاني الموضحة أمام كل منها، ما لم يدل السياق على خلاف ذلك : 1 ـ المهنة : مهنة التقييم . 2 - الوزارة : وزارة التجارة والصناعة . 3 - الوزير : وزير التجارة والصناعة . 4 ـ الهيئة : الهيئة السعودية للمقيّمين المعتمدين . 5 ـ النظام : نظام المقيّمين المعتمدين . 6 ـ التقييم : عملية تحديد القيمة العادلة للعقارات، أو المنشآت الاقتصادية، أو المعدات والممتلكات على اختلاف أنواعها، لغرض محدد . 7 ـ فروع التقييم : ـ فرع العقارات : جميع المصالح، والحقوق، والالتزامات المتعلقة بملكية العقارات بكل التحسينات المثبتة عليها بشكل دائم، والملحقات التابعة المرتبطة بها . ومثال ذلك : التملك والتصرف في الملكية، والرهن، والتأمين، ونزع الملكية، والارتفاق، والانتفاع .ـ فرع المنشآت الاقتصادية : منشآت الأعمال، أو مصالح الملكية فيها على اختلاف حجومها، سواء أكانت فردية أم شركات، والحقوق والالتزامات المتعلقة بها ، وتقييم الأصول غير الملموسة، مثل براءات الاختراع، والعلامات التجارية، والشهرة ، والملكية الفكرية.ـ فرع المعدات والممتلكات المنقولة : ويشمل على سبيل المثال : معدات النقل،
    ومعدات البناء، والأجهزة المكتبية، ومحتويات المباني عامة، وجميع المصالح والحقوق والالتزامات المتعلقة بها. 8 ـ السجل : السجل الذي يقيد فيه المقيّمون المعتمدون لدى الوزارة. 9 ـ لجنة قيد المقيّمين : اللجنة التي تنظر في طلبات القيد في السجل وتبت فيها . 10 ـ معايير التقييم : المعايير التي تعتمدها الهيئة . 11 ـ المقيّم المعتمد : الشخص ذو الصفة الطبيعية أو الاعتبارية الذي يرخص له بمزاولة المهنة وفقاً لهذا النظام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى وضع الضوابط والمعايير اللازمة لأعمال تقييم العقارات، والمنشآت الاقتصادية، والمعدات ، والممتلكات المنقولة ونحوها، وتطوير مهنة التقييم ، ورفع مستوى العاملين فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لا يحق لأي شخص ذي صفة طبيعية أو اعتبارية مزاولة مهنة التقييم في أي فرع من فروع التقييم ما لم يكن مرخصاً له بمزاولة المهنة في الفرع نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يُنشأ في الوزارة سجل لكل فرع من فروع التقييم يقيد فيه أسماء المقيّمين المعتمدين إذا كانوا أشخاصاً ذوي صفة طبيعية . أما إذا كانوا أشخاصاً ذوي صفة اعتبارية فيسجلون ـ بالإضافة إلى ذلك ـ في سجل الشركات المهنية بالوزارة، ويخضعون في ذلك لأحكام نظام الشركات المهنية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يشترط فيمن يقيد اسمه في السجل أن يكون : 1 ـ سعودي الجنسية .2 ـ كامل الأهلية .3 ـ حسن السيرة والسلوك، وغير محكوم عليه بحد شرعي، أو في جريمة مخلة بالشرف أو الأمانة ما لم يكن قد رُد إليه اعتباره.4 ـ لديه خبرة عملية بالتقييم في الفرع الذي يطلب الترخيص لمزاولته، وذلك طبقاً لما تحدده اللائحة التنفيذية. 5 ـ عضواً أساسياً في الهيئة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تحدد اللائحة التنفيذية أعمال التقييم التي يرى مجلس إدارة الهيئة ضرورة توافر مدة إضافية من الخبرة لمزاولتها ، ولا تدخل مدة الإيقاف المنصوص عليها في هذا النظام في حساب تلك المدة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'أ ـ تشكل في الوزارة بقرار من الوزير لجنة تسمى " لجنة قيد المقيّمين"، وذلك من ثلاثة أعضاء على النحو الآتي : 1 - مسؤول من الوزارة لا تقل مرتبته عن المرتبة الرابعة عشرة (رئيساً).2 ـ مستشار قانوني (عضواً). 3 ـ مقيّم مزاول للمهنة من كل فرع من فروع التقييم المختلفة يرشحهم مجلس إدارة الهيئة (عضواً). ويسمي الوزير من يحل محل العضو عند غيابه، وتكون مدة العضوية في اللجنة ثلاث سنوات قابلة للتجديد مدداً مماثلة. ب ـ تنعقد اللجنة بحضور جميع أعضائها وتصدر قراراتها بالأغلبية، على أن يقتصر تمثيل المقيّمين في اجتماع اللجنة على المقيّم المزاول للمهنة في الفرع الوارد في طلب القيد. وتبت اللجنة في طلب القيد وفقاً لما يحدده هذا النظام ولائحته التنفيذية، على أن يكون القرار مسبباً في حال رفض الطلب، ويجوز لصاحب الطلب ـ إذا رفضت اللجنة طلبه ـ التظلم أمام ديوان المظالم وفقاً لنظامه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: بعد القيد في السجل، تصدر الوزارة الترخيص بمزاولة مهنة التقييم في الفرع الوارد في طلب القيد - وفقاً لما تحدده اللائحة التنفيذية - وتكون مدته خمس سنوات قابلة للتجديد مدداً مماثلة، بناء على طلب يقدم قبل انتهاء الترخيص بتسعين يوماً على الأقل، ويدفع طالب الترخيص من الأشخاص ذوي الصفة الطبيعية رسماً قدره (1000) ألف ريال، عند إصدار الترخيص، وعند كل تجديد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للهيئة أن تنظر - وفقاً لما تحدده اللائحة التنفيذية- في الطلبات التي يقدمها مهنيون آخرون (أعضاء في هيئات مهنية أخرى) للحصول على ترخيص بمزاولة المهنة، وذلك وفقاً للشروط الواردة في هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: على المقيّم المعتمد أن يزاول المهنة فعلاً في فرع التقييم الذي رخص له بمزاولته ، وأن يبلغ الوزارة - كتابة - بعنوان مكتبه وبكل تغير يطرأ على هذا العنوان، وذلك خلال المواعيد التي تحددها اللائحة التنفيذية، وإلا عُدّ إبلاغه على عنوانه الذي لدى الوزارة صحيحاً . وعلى المقيّم المعتمد أن يبلغ الوزارة - كتابة - عند فتح أي فرع آخر له، وذلك مع مراعاة ما تقضي به الأنظمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: للمقيّم المعتمد - إذا كان شخصاً ذا صفة طبيعية - أن يضع اسماً لمكتبه، بشرط أن يكون مقروناً باسمه الشخصي . وعليه أن يضع الترخيص الممنوح له في مكان بارز من المكتب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: على المقيّم المعتمد أن يضع اسمه ورقم ترخيصه، وتاريخه على جميع مطبوعاته ومراسلاته، وجميع ما يصدر عنه من تقارير وبيانات . وعليه أيضاً أن يزود الهيئة بالبيانات اللازمة عن نشاطه وفقاً لما تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: على المقيّم المعتمد أن يتفرغ لمزاولة أعمال المهنة ، ومع ذلك يجوز له الجمع بين المهنة ومزاولة الأعمال التي لا تتعارض مع سلوك المهنة وآدابها، وذلك وفقاً لما تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجب أن يوقع المقيّم المعتمد نفسه تقارير التقييم التي يصدرها إذا كان المقيّم شخصاً ذا صفة طبيعية ، أما إن كان ذا صفة اعتبارية فيجب أن يوقع الشريك الذي شارك في التقييم، أو أشرف عليه فعلاً، ولا يجوز إنابة شخص آخر في التوقيع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجب على المقيّم المعتمد التقيد بسلوك المهنة وآدابها، ومعايير التقييم، والمعايير الفنية التي تصدرها الهيئة، والواجبات المحددة بموجب الأنظمة واللوائح التي تحكم عمل الهيئة . ويجب عليه أيضاً موافاة الوزارة والهيئة بأي معلومة تطلبها للتأكد من أدائه لعمله وفقاً لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يلتزم العضو الأساسي بحضور برامج التعليم المهني وفق ما تحدده الهيئة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على المقيّم المعتمد ـ في جميع الأحوال ـ الاحتفاظ بجميع ما يتعلق بالتقييم والبيانات والمستندات الورقية والإلكترونية التي يقدمها العملاء مدة عشر سنوات من تاريخ إصدار تقريره النهائي . وفي حال رفع دعوى لها صلة بذلك فعليه أن يحتفظ بجميع ما ذكر حتى صدور حكم نهائي فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: على المقيّم المعتمد المحافظة على سرية جميع المعلومات المتعلقة بعملية التقييم، وألاَ يُطلع أحداً عليها، إلا بناء على موافقة خطية من العميل، أو بناء على طلب من الجهات الرسمية المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يُسأل المقيّم المعتمد إذا كان شخصاً ذا صفة طبيعية عن تعويض الضرر الذي يصيب العميل، أو الغير بسبب الأخطاء الواقعة منه في أداء عمله ، أما إذا كان شخصاً ذا صفة اعتبارية فتكون المسؤولية تضامنية بين الشركاء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يجب على المقيّم المعتمد أن يفصح عن أي مصلحة له مباشرة أو غير مباشرة فيما يطلب منه تقييمه. وتحدد اللائحة التنفيذية الحالات التي يجب على المقيّم المعتمد عدم قبول العمل فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 1 - يجب على المقيّم المعتمد إذا توقف عن مزاولة المهنة لأي سبب من الأسباب بصورة مؤقتة أو نهائية أن يبلغ الوزارة والهيئة والعميل بذلك خلال ثلاثين يوماً من تاريخ توقفه ، ويعد الترخيص منتهياً في حالة التوقف النهائي . ودون إخلال بالجزاءات المنصوص عليها في هذا النظام يكون للوزارة صلاحية طلب إصدار قرار - من اللجنة المنصوص عليها في المادة (الرابعة والثلاثين) من هذا النظام - بإلغاء ترخيص كل مقيّم معتمد توقف عن مزاولة المهنة ، ولم يتقدم بالإبلاغ المنصوص عليه في هذه المادة خلال الموعد المحدد بعد التحقق من الواقعة المستوجبة لذلك ، وسماع أقوال المقيّم المعتمد ، وإذا أبلغ المقيّم المعتمد ولم يحضر خلال الثلاثين يوماً التالية لتاريخ إبلاغه يلغى ترخيصه ، ويجوز له التظلم من قرار إلغاء الترخيص أمام ديوان المظالم، ولا يترتب على إلغاء الترخيص إلغاء العضوية في الهيئة .2- في حالة توقف المقيّم المعتمد عن مزاولة مهنته نهائياً ، أو لمدة يترتب عليها الإضرار بالعملاء أو الغير ، فعليه أن يصفي جميع المعاملات المعلقة لديه ، والحقوق والالتزامات المترتبة على ذلك طبقاً للقواعد والإجراءات التي تحددها اللائحة
    التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تنشأ هيئة تسمى "الهيئة السعودية للمقيّمين المعتمدين" تتمتع بشخصية اعتبارية، وتكون غير هادفة للربح، ولها ميزانية مستقلة، وتعمل تحت إشراف الوزارة، ويكون مقرها مدينة الرياض، ولها أن تنشئ مكاتب تابعة لها داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'تسعى الهيئة إلى تحقيق الأهداف المنصوص عليها في هذا النظام ، ولها على الأخص ما يلي : 1 - إعداد وتطوير واعتماد معايير موحدة لفروع التقييم مجتمعة، ومعايير لكل فرع من فروعه . 2 - وضع القواعد العامة اللازمة لامتحان الحصول على شهادة الزمالة لكل فرع من فروع التقييم. 3 - تنظيم دورات التعليم المهني المستمر لتطوير مستوى المنتمين إلى المهنة، والمشاركة في الندوات واللجان المحلية والدولية المتعلقة بمهنة التقييم . 4 - إعداد البحوث والدراسات وإصدار الدوريات والكتب الخاصة بالتقييم وما يتصل به. 5 - وضع الإجراءات المناسبة للرقابة الميدانية ؛ للتأكد من قيام المقيّم المعتمد بتطبيق معايير التقييم .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'تتكون الهيئة مما يأتي : 1 - أعضاء أساسيون، وهم : أ - الحاصلون على درجة جامعية في أحد التخصصات التي تعتمدها الهيئة، بشرط الحصول على شهادة الزمالة. ب - المستثنون بموجب المادة (الأربعين) من هذا النظام. 2 - أعضاء منتسبون : وهم الحاصلون على درجة جامعية في أحد التخصصات التي تعتمدها الهيئة دون الحصول على شهادة الزمالة .3 - أعضاء شرف : وهم الذين يمنحون العضوية من قبل مجلس إدارة الهيئة تقديراً لإنجازاتهم أو خدماتهم لمهنة التقييم، سواء أكانوا ذوي صفة طبيعية أم اعتبارية .4 - الطلبة المنتسبون : وهم الذين يتقدمون بطلب الانتساب من دارسي التخصصات الجامعية ذات العلاقة بأي فرع من فروع التقييم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 1 - يكون للهيئة جمعية عمومية تتكون من جميع الأعضاء الأساسيين والمنتسبين الذين سددوا اشتراكاتهم السنوية .2 - تعقد الجمعية العمومية للهيئة اجتماعاتها العادية أو الاستثنائية بحضور أغلبية أعضائها، فإن لم يتوافر النصاب اللازم للاجتماع، وُجهت دعوة لموعد اجتماع لاحق يعقد خلال الثلاثين يوماً التالية للموعد السابق، على ألاّ تقل المدة بين الموعدين عن خمسة عشر يوماً ، ويكون اجتماع الجمعية العمومية للهيئة في هذا الموعد صحيحاً مهما كان عدد الحاضرين. وتعقد الاجتماعات العادية للجمعية العمومية للهيئة بدعوة من مجلس الإدارة في موعد يحدد في بداية كل عام مالي للهيئة . ويجوز للجمعية العمومية للهيئة عقد اجتماعات استثنائية بناءً على طلب خُمس أعضائها أو طلب مجلس الإدارة.3- يرأس الجمعية العمومية رئيس مجلس إدارة الهيئة أو من ينيبه في حال غيابه، وتصدر قرارات الجمعية العمومية للهيئة بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'تختص الجمعية العمومية للهيئة بما يلي : 1 - اعتماد تقرير مجلس الإدارة السنوي عن نشاط الهيئة.2 - إقرار الحسابات الختامية للهيئة.3 - تعيين مراجعي حسابات الهيئة وتحديد أتعابهم.4 - انتخاب أعضاء مجلس إدارة الهيئة.5 - مناقشة كل ما يرد في جدول أعمالها من أمور تدخل في نطاق عمل الهيئة أو اهتماماتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 1 - يدير الهيئة مجلس إدارة مكون من تسعة من المقيّمين المعتمدين، تنتخبهم الجمعية العمومية، وتحدد اللائحة التنفيذية الإجراءات اللازمة لذلك، والشروط الواجب توافرها في المرشحين. ويتولى مجلس الإدارة المنتخب في أول جلسة له اختيار رئيس المجلس ونائبه من بين أعضائه بالاقتراع السري، وفي حالة التساوي يتم إجراء القرعة. 2 - تكون مدة دورة مجلس الإدارة ثلاث سنوات قابلة للتجديد مرة واحدة، واستثناء من ذلك تكون مدة دورة أول مجلس إدارة خمس سنوات. 3 - يعقد مجلس الإدارة اجتماعاً واحداً على الأقل كل ثلاثة أشهر، ويعقد كذلك اجتماعاً عندما يطلب ذلك رئيس المجلس، أو أربعة من أعضائه.4 - تعقد الاجتماعات بحضور أغلبية الأعضاء، على أن يكون من بينهم الرئيس، أو نائبه.5 - تصدر قرارات المجلس بأغلبية أصوات الحاضرين، فإن تساوت الأصوات رجح الجانب الذي صوت معه رئيس الاجتماع. 6 - يحضر الأمين العام اجتماع المجلس دون أن يكون له حق التصويت .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 'يمارس مجلس الإدارة الصلاحيات اللازمة لتصريف شؤون الهيئة وتحقيق أهدافها المنصوص عليها في هذا النظام، وله على الأخص ما يأتي : 1 - اقتراح التعديلات التي يرى إدخالها على هذا النظام وغيره من الأنظمة واللوائح ذات العلاقة بمهنة التقييم .2 - مراجعة معايير التقييم ، وقواعد السلوك، وبرنامج مراقبة جودة الأداء المهني، وتطويرها واعتمادها.3 - اعتماد الهيكل التنظيمي، واللوائح الداخلية للهيئة . 4 - اعتماد الخطة الطويلة المدى والخطة السنوية ، والموازنة التقديرية .5 - تحديد المقابل المالي لفئات العضوية .6 - اعتماد قواعد امتحان شهادة زمالة الهيئة، وقواعد برامج التعليم المهني المستمر. 7 - تشكيل لجان معايير التقييم بفروعه المختلفة ، واللجان الفنية، وتحديد واجباتها، ووضع قواعد وإجراءات أعمالها وتنفيذها . 8 - إضافة فروع تقييم أخرى .9 - إعداد التقرير السنوي للهيئة وحساباتها الختامية وعرضها على الجمعية العمومية . 10 - اقتراح أسماء مراجعي الحسابات للجمعية العمومية .11 - استثمار أموال الهيئة فيما يتناسب مع أغراضها. 12 - تحديد المقابل المالي للخدمات التي تقدمها الهيئة .13 - إعداد جدول أعمال اجتماع
    الجمعية العمومية .14 - تعيين أمين عام الهيئة ونائبه، وتحديد مهماتهما وصلاحياتهما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تبدأ السنة المالية للهيئة في بداية السنة المالية للدولة وتنتهي في نهاية السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا النظام، وتنتهي في نهاية السنة المالية للدولة من العام التالي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: 'تتكون موارد الهيئة مما يأتي : 1 - اشتراكات الأعضاء .2 - الإعانات الحكومية . 3 - الهبات، والتبرعات، والوصايا، والأوقاف، التي يقرر مجلس الإدارة قبولها .4 - عوائد استثمار أموال الهيئة. 5 - المقابل المالي لما تقدمه الهيئة من خدمات. 6 - المبالغ المحصلة من المخالفات .7 - الموارد الأخرى التي يعتمدها مجلس الإدارة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يكون للهيئة مراجع حسابات تعينه الجمعية العمومية كل سنة من المحاسبين القانونيين المرخص لهم في المملكة، ويكون له حق الاطلاع على الدفاتر والمستندات وإبداء ما يراه من ملحوظات، وعليه مراجعة حسابات الهيئة وتقديم تقرير عنها إلى الجمعية العمومية. وتحدد الجمعية العمومية أتعابه، ولها إعادة تعيينه أو اختيار غيره . واستثناءً من ذلك يعين مجلس الإدارة مراجع الحسابات للسنة المالية الأولى، ويحدد أتعابه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'أولاً : دون إخلال بأي عقوبة أشد منصوص عليها في أي نظام آخر، تطبق على من يخالف أحكام هذا النظام أي من العقوبات الآتية : أ ـ الإنذار. ب - اللوم . ج - الإيقاف عن ممارسة المهنة مدة لا تزيد على سنة. د - غرامة مالية لا تتجاوز (200.000) مائتي ألف ريال . هـ - إلغاء الترخيص . و- شطب قيد المخالف من سجل المقيّمين المعتمدين . ز- السجن مدة لا تجاوز سنة واحدة. ويراعى أن تتناسب العقوبة مع المخالفة. ثانياً : في حالة صدور قرار قطعي بعقوبة الإيقاف ، أو إلغاء الترخيص ، أو الشطب ، تصفى على نفقة من صدر بحقه هذا القرار جميع المعاملات المعلقة لديه ، والحقوق ، والالتزامات المترتبة على ذلك ، وتبين اللائحة التنفيذية الإجراءات اللازم اتخاذها في هذا الشأن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 'أولاً : تتولى المحكمة المختصة النظر في القضايا الناشئة عن ارتكاب أي من المخالفات التالية: 1 - مزاولة مهنة التقييم دون الحصول على ترخيص. 2 - مزاولة مهنة التقييم بعد إلغاء الترخيص أو شطبه أو انتهائه ولم يتبع الإجراءات اللازمة للتجديد. 3 - فتح أو إنشاء أو إدارة مكتب لمزاولة التقييم دون ترخيص .4 - تقديم بيانات غير مطابقة للحقيقة أو استعمال طرق غير مشروعة كان من نتيجتها منحه ترخيصاً لمزاولة مهنة التقييم أو أدت إلى تجديد الترخيص.5 - استعمال وسيلة من وسائل الدعاية يكون من شأنها حمل الجمهور على الاعتقاد بأحقيته في مزاولة مهنة التقييم خلافاً للحقيقة.6 - انتحال لقب من الألقاب التي تطلق عادة على مزاولي مهنة التقييم. ثانياً : تطبق المحكمة المختصة على مرتكبي المخالفات المنصوص عليها في البند (أولاً) من هذه المادة أي من العقوبات المنصوص عليها في الفقرات (ج،د،هـ،و،ز) من البند (أولاً) من المادة (الثانية والثلاثين) من هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: أ - مع مراعاة ما ورد في المادة (الثالثة والثلاثين) من هذا النظام، يتولى النظر في مخالفات أحكام هذا النظام وإيقاع العقوبة المناسبة من بين العقوبات المنصوص عليها في البند (أولاً) من المادة (الثانية والثلاثين) من هذا النظام - فيما عدا عقوبة السجن - لجنة يشكلها الوزير من ثلاثة أعضاء ، على أن يكون من بينهم مستشار قانوني، وأحد أعضاء مجلس إدارة الهيئة من المقيّمين المعتمدين، وفي جميع الأحوال يجب أن يكون قرار اللجنة مسبباً ، وللصادر في حقه قرار العقوبة أن يتظلم من القرار إلى ديوان المظالم وفقاً لنظامه . ب - تقوم الوزارة بإحالة المخالفات المنصوص عليها في المادة (الثالثة والثلاثين) من هذا النظام إلى هيئة التحقيق والادعاء العام؛ للنظر في إقامة الدعوى الجنائية أمام المحكمة المختصة . ج - يجوز نشر القرار القطعي الصادر بعقوبة الإيقاف، والغرامة المالية، وإلغاء الترخيص، والشطب، على نفقة المخالف في واحدة أو أكثر من الصحف المحلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يتولى ضبط ما يقع من مخالفات لأحكام هذا النظام ولائحته التنفيذية موظفو الوزارة الذين يصدر بتحديدهم قرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: تحدد ـ بقرار من الوزير ـ مكافآت أعضاء لجنة النظر في مخالفات أحكام هذا النظام المنصوص عليهم في المادة (الرابعة والثلاثين) من هذا النظام ، وأعضاء لجنة قيد المقيّمين المنصوص عليهم في المادة (السابعة) من هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يجوز لمن ألغي ترخيصه أو شطب قيده أن يطلب الحصول على ترخيص جديد أو إعادة قيده بعد انقضاء ثلاث سنوات من تاريخ صدور قرار إلغاء الترخيص أو الحكم بشطب القيد، وتتبع في ذلك الشروط والإجراءات نفسها المقررة لمنح الترخيص وطلب القيد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: تتولى المحكمة المختصة النظر في جميع الدعاوى التي تقام من المقيّم المعتمد أو عليه لسبب يتعلق بمزاولته المهنة طبقاً لأحكام هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يجب على كل من يتولى عملاً للغير يتطلب التقييم؛ الحصول على تحديد للقيمة من قبل مقيّم مسجل في السجل أو أكثر ، وتحدد اللائحة التنفيذية الحالات التي تنطبق عليها هذه المادة وتوقيت سريانها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: استثناءً من الأحكام الواردة في المادة (الرابعة والعشرين) من هذا النظام ووفقاً لما تحدده اللائحة التنفيذية ، يستمر القائم بأعمال التقييم عند نفاذ هذا النظام في مزاولة عمله بصفة عضو أساسي، وتنتفي عنه هذه الصفة ويتوقف عن مزاولة هذه الأعمال إذا لم يجتز - خلال خمس سنوات من تاريخ نفاذ هذا النظام - امتحان شهادة الزمالة أو الامتحان الذي تعقده الهيئة من أجل تأهيله، ويجوز للوزير تمديد هذه المدة لمدة مماثلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: تنظم العلاقة بين المقيّمين المعتمدين ـ المرخص لهم وفقاً لهذا النظام ـ والمقيّمين المعتمدين غير السعوديين، وفقاً لما يحدده هذا النظام ونظام الشركات المهنية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: لا تنطبق أحكام هذا النظام على الموظفين الحكوميين القائمين بأعمال التقييم بحكم أعمالهم في اللجان المختلفة في الأجهزة الحكومية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يراعى في تطبيق أحكام هذا النظام ما ورد في المادة (الثامنة عشرة) من نظام مراقبة شركات التأمين التعاوني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يعد مجلس الإدارة اللائحة التنفيذية لهذا النظام ، وتصدر بقرار من الوزير، وتكون نافذة بنفاذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد مائة وثمانين يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cad66e4d-38d3-4baa-8049-a9a700f1e7a8/1
  verified: false
