articles:
- article_ref: المادة الأولى
  article_text_ar: يكون للمسميات الواردة في هذا النظام نفس الدلالات الواردة في المادة الأولى من نظام الوثائق والمحفوظات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: ينشأ بموجب هذا النظام مركز يسمى (المركز الوطني للوثائق والمحفوظات) يرتبط إداريًّا برئيس ديوان رئاسة مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'غرض المركز وضع نظام الوثائق والمحفوظات موضوع التنفيذ، وله في سبيل ذلك اتخاذ كافة الوسائل والسبل التي تمكنه من القيام بهذه المهمة ومن ذلك: 1 - إعداد اللوائح التنفيذية اللازمة لنظام الوثائق والمحفوظات وتنفيذها بعد إقرارها. 2 - إعداد دليل تصنيف موحد للوثائق والمحفوظات، ودليل ترميز شامل لأجهزة الدولة. 3 - جمع الوثائق والمحفوظات، وفهرستها، وتصنيفها، وترميزها، وحفظها، وصيانتها، وتنظيم تداولها وفقًا لنظام الوثائق والمحفوظات ولوائحه التنفيذية، وخطتي التصنيف والترميز. 4 - الإشراف والمتابعة الفنية لعمليات الحفظ في الأجهزة الحكومية، والعمل على حماية الوثائق والمحفوظات. 5 - إعداد التنظيم الإداري والإجراءات الإدارية والفنية اللازمة لأعمال المركز وتنفيذها بعد إقرارها. 6 - أ : توفير البيانات، والمعلومات عن الوثائق، والمحفوظات للمستفيدين منها وفقًا للوائح المركز. ب : تجميع الأنظمة، واللوائح، والتعليمات، والاتفاقيات، والمعاهدات وفقًا لنظام الوثائق والمحفوظات ولوائحه. 7 - تحقيق التنسيق والتكامل مع الأجهزة المعنية بالوثائق والمحفوظات في المملكة، وتبادل الخبرات والمعلومات معها. 8 - تحقيق
    التعاون في مجال الوثائق والمحفوظات مع الأجهزة المختصة دوليًّا، وذلك عن طريق : أ : الاشتراك في الهيئات، والمنظمات الإقليمية، والدولية في مجال الوثائق والمحفوظات، وحضور الندوات، والمؤتمرات، والحلقات العلمية المتخصصة، وإعداد البحوث المتعلقة بذلك. ب : تبادل المعلومات مع المراكز الوطنية للوثائق والمحفوظات في العالم. 9 - العمل مع الجهات المختصة على إيجاد العناصر الوطنية المؤهلة للعمل في مجال الوثائق والمحفوظات، واتخاذ كافة السبل المؤدية لذلك. 10 - الإشراف على إتلاف المحفوظات والوثائق التي يتقرر إتلافها بموجب اللائحة الخاصة بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للمركز هيئة تختص بما يلي: 1 - رسم السياسة العامة للمركز، ومتابعة تنفيذها. 2 - اقتراح ما تراه مناسبًا من الأنظمة، واللوائح، والإجراءات التي تكفل التنفيذ الأمثل لنظام الوثائق والمحفوظات. 3 - إصدار اللوائح التنفيذية لنظام الوثائق والمحفوظات. 4 - الموافقة على الخطط، والبرامج، والمشروعات التي تقترحها إدارة المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تشكل الهيئة من: 1 -رئيس ديوان رئاسة مجلس الوزراءرئيسًا 2 -الأمين العام لمجلس الوزراء عضوًا 3 -رئيس شعبة الخبراء بمجلس الوزراءعضوًا 4 -مدير عام المركزعضوًا 5 - ثلاثة أعضاء يختارون بأمر سام لمدة ثلاث سنوات قابلة للتجديد لمدة مماثلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تجتمع الهيئة برئاسة رئيسها، أو من ينيبه من الأعضاء، ولا يعتبر الاجتماع نظاميًّا إلا بحضور أغلبية الأعضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تصدر قرارات الهيئة بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يعتبر صوت الرئيس مرجحًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعين للمركز مدير عام بالمرتبة الخامسة عشرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى مدير عام المركز إدارة، وتصريف شؤونه، وله في سبيل ذلك ما يلي: 1 - اقتراح خطط المركز، وبرامجه، ومشروعاته، والإشراف على تنفيذها بعد الموافقة عليها. 2 - اقتراح اللوائح التنفيذية لهذا النظام. 3 - اقتراح التنظيمات المناسبة للوثائق والمحفوظات بما يتفق والتطور الفني والإداري. 4 - تقديم أي اقتراحات يراها كفيلة بحسن سير العمل. 5 - تمثيل المركز في صلاته مع الجهات الأخرى. 6 - تنفيذ قرارات الهيئة. 7 - رفع تقارير دورية عن سير أعمال المركز وإنجازاته إلى الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للمركز ميزانية خاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يلغي هذا النظام ما يتعارض معه من أحكام أخرى تتعلق بالوثائق والمحفوظات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bdf15375-52e6-4c94-9153-a9a700f16cc3/1
