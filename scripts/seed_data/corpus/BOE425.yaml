articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: المؤسسة: المؤسسة العامة للمحافظة على الشعب المرجانية والسلاحف في البحر الأحمر. التنظيم: تنظيم المؤسسة. الوزير: وزير البيئة والمياه والزراعة. الوزارة: وزارة البيئة والمياه والزراعة. المجلس: مجلس إدارة المؤسسة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمؤسسة. المراكز الوطنية البيئية: المركز الوطني لتنمية الحياة الفطرية، والمركز الوطني لتنمية الغطاء النباتي ومكافحة التصحر، والمركز الوطني للرقابة على الالتزام البيئي، والمركز الوطني للأرصاد، والمركز الوطني لإدارة النفايات، أو أي مركز آخر ينشأ مستقبلاً. الشخص: أي شخص ذي صفة طبيعية أو اعتبارية. النشاط: أي مشروع أو عمل له أثر بيئي على الشعب المرجانية والسلاحف في البحر الأحمر. التصريح: وثيقة تمنحها المؤسسة للشخص قبل البدء بممارسة النشاط. الترخيص: وثيقة تمنحها المؤسسة للشخص للإذن له بممارسة النشاط. الشعب المرجانية: بيئات بحرية ترتكز على المرجان الباني لتشكيلات الشعاب الصلبة على قيعان البحار والتي تعيش
    وترتبط بها -في توازن دقيق- العديد من أنواع الأسماك والأحياء الفقارية واللافقارية والنباتات المتنوعة. الاستثمار البيئي: الاستثمار المستدام المسؤول -في بيئات الشعب المرجانية وأماكن تعشيش السلاحف- والذي يأخذ بعين الاعتبار العوامل البيئية والمنافع الاجتماعية محدداتٍ أساسية لهذه الاستثمارات. الإرشاد البيئي: التوعية البيئية الخاصة بالمحافظة على الشعب المرجانية والسلاحف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع المؤسسة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض. ولها بقرار من المجلس إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة. يكون نطاق عمل المؤسسة الجغرافي في سواحل وجزر ومياه البحر الأحمر التابعة للمملكة، عدا المناطق المحمية التابعة للمركز الوطني لتنمية الحياة الفطرية؛ فتقوم المؤسسة بالمهمات الخاصة بها داخل هذه المناطق من خلال المركز وبالتنسيق معه، وبما لا يتعارض مع مهماته واختصاصاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف المؤسسة إلى التنظيم والإشراف والمحافظة على الشعب المرجانية والسلاحف وأماكن تعشيشها في البحر الأحمر، وإدارتها، وإنمائها واستدامتها، والعمل على إعادة تأهيل الشعب المرجانية المتدهورة، وأماكن تعشيش السلاحف، وذلك وفق الأنظمة واللوائح ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال بالاختصاصات المقرة نظامًا للجهات الأخرى، تقوم المؤسسة بكل ما يلزم في سبيل تحقيق أهدافها، ولها على وجه خاص ما يأتي: إعداد وتنفيذ الخطط والبرامج والمبادرات والمشاريع، التي تهدف إلى المحافظة على الشعب المرجانية والسلاحف في البحر الأحمر، وإعادة تأهيلها، وتنميتها، وضمان استدامتها، بالتنسيق مع المركز الوطني لتنمية الحياة الفطرية، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. إجراء الدراسات والبحوث والمسوحات الميدانية والاستطلاعات وجمع البيانات، وبناء قواعد المعلومات، الخاصة بالشعب المرجانية والسلاحف. مراقبة وتقييم الحالة البيئية للشعب المرجانية والسلاحف، وإصدار تقارير دورية عنها، ورصد حالات الخطر التي تهدد بقاءها ومعالجتها. التنسيق مع المركز الوطني لتنمية الحياة الفطرية للمواءمة في تحقيق الاستراتيجيات المعتمدة ذات العلاقة. التكامل والعمل على تحقيق مستهدفات الاستراتيجية الوطنية للبيئة -ذات العلاقة بنشاطها وأهدافها- بالتنسيق مع الوزارة والمراكز الوطنية البيئية والجهات ذات العلاقة. إعداد المقاييس والمعايير والضوابط والاشتراطات البيئية فيما يتعلق باختصاصاتها، ورفعها
    إلى الوزارة لاعتمادها. إصدار التصاريح والتراخيص -المتعلقة باختصاصاتها- المنصوص عليها في الأنظمة واللوائح ذات العلاقة، وذلك وفق لائحة يصدرها المجلس. العمل وفق اختصاصاتها على إعادة تأهيل الشعب المرجانية المتدهورة، وإعادة أنواع السلاحف المهددة بالانقراض إلى موائلها الطبيعية وإكثارها وتنميتها، والموافقة على خطط إعادة التأهيل، والإشراف على تنفيذها، بالتنسيق مع المركز الوطني لتنمية الحياة الفطرية. تزويد الوزارة بالدراسات والبيانات والمؤشرات البيئية ذات العلاقة باختصاصاتها؛ التي تسهم في اتخاذ القرارات بشأن إعداد الاستراتيجيات والسياسات والتشريعات البيئية. تنظيم نشاطات الإرشاد البيئي المتصلة باختصاصاتها، وتعزيز الوعي بأهمية المحافظة على الشعب المرجانية والسلاحف، وذلك من خلال إقامة المؤتمرات والمعارض والندوات وورش العمل المتخصصة. الموافقة على دراسات تقييم الأثر البيئي التي تكون ضمن نطاق أعمال المؤسسة -المحالة إلى المؤسسة من المركز الوطني لتنمية الحياة الفطرية- المعنية بالمشاريع والأنشطة ذات الأثر على الشعب المرجانية والسلاحف وأماكن تعشيشها، وفق الآلية التي تحددها اللوائح التنفيذية لنظام البيئة.
    الموافقة على البرامج والخطط والمبادرات والمشاريع والدراسات والأبحاث التي تقوم بها الجهات الأخرى في مناطق الشعب المرجانية وأماكن تعشيش السلاحف، والتي لا تتطلب دراسة تقييم الأثر البيئي، ومراقبة تنفيذها، بالتنسيق مع المركز الوطني لتنمية الحياة الفطرية. إصدار قوائم خاصة بأنواع الشعب المرجانية في البحر الأحمر ومواقعها، والسلاحف وأماكن تعشيشها. إعداد ضوابط واشتراطات الدخول لمناطق الشعب المرجانية وأماكن تعشيش السلاحف في البحر الأحمر؛ للقيام بأي نشاط يؤثر فيها. التعاون مع الجامعات ومراكز البحوث والمؤسسات فيما يتعلق باختصاصاتها. إعداد خطط التأهب والاستجابة لحالات الطوارئ المتعلقة بالشعب المرجانية والسلاحف، وتنفيذها بالتنسيق مع الجهات المختصة المسؤولة عن قيادة وإدارة جهود الاستجابة لحالات الطوارئ. إقامة البرامج التدريبية في المجالات ذات العلاقة باختصاصاتها، لرفع مستوى الأداء لدى الكوادر الإدارية والفنية. اعتماد برامج تدريبية مهنية وجهات مانحة للشهادات مختصة بالتدريب في المجالات ذات العلاقة باختصاصاتها. تنظيم الاستثمار البيئي في مناطق الشعب المرجانية وأماكن تعشيش السلاحف، وفقًا للأحكام المنظمة
    لذلك، وبالتنسيق مع الجهات ذات العلاقة. الإشراف على تنفيذ المبادرات والبرامج والمشاريع الهادفة الى المحافظة على الشعب المرجانية والسلاحف، وتشجيع القطاعات العامة والخاصة وغير الربحية على تنفيذها، ومتابعة إنجازها، وتقديم الدعم اللازم لضمان تحقيق المستهدفات المحددة لها. تمثيل المملكة خارجيًّا، في المجالات المتعلقة بالشعب المرجانية والسلاحف في البحر الأحمر، وفقًا للإجراءات النظامية المتبعة، وبعد التنسيق مع الوزارة. تشجيع الاستثمار والتمويل في المجالات ذات العلاقة باختصاصاتها، بالتنسيق مع الجهات ذات العلاقة. الحصول -من الأفراد والجهات الحكومية وغير الحكومية والأكاديمية- على المعلومات والبيانات المتعلقة باختصاصاتها، وذلك بما يمكنها من أداء مهماتها. أي مهمة أخرى ذات علاقة باختصاصاتها، يقرها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمؤسسة مجلس إدارة برئاسة الوزير، وعضوية كل من: أ- ممثل من وزارة البيئة والمياه والزراعة. ب- ممثل من الهيئة السعودية للبحر الأحمر. ج- ممثل من وزارة الداخلية (المديرية العامة لحرس الحدود). د- ممثل من المركز الوطني لتنمية الحياة الفطرية. هـ- ممثل من المركز الوطني للرقابة على الالتزام البيئي. و- ممثل من جامعة الملك عبدالله للعلوم والتقنية. ز- ممثل من شركة نيوم. ح- ممثل من شركة البحر الأحمر الدولية. يجب ألا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يعد المجلس السلطة العليا للمؤسسة، ويتولى إدارة شؤون المؤسسة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنه التنظيم. وله على وجه خاص ما يلي: إقرار السياسة العامة للمؤسسة وخططها الاستراتيجية والبرامج والمبادرات والمشاريع والمعايير والضوابط والمقاييس الخاصة بها. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات المؤسسة، واقتراح تعديل النافذ منها، تمهيدًا لرفعها بحسب الإجراءات النظامية المتبعة. إقرار الهيكل التنظيمي للمؤسسة. إقرار اللوائح الإدارية والمالية للمؤسسة، وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية. إقرار القواعد والشروط والضوابط المتعلقة بالموافقة على الأنشطة التي تستلزم الحصول على تصاريح وتراخيص والتي تصدرها المؤسسة وفقًا لاختصاصاتها. تحديد المقابل المالي للتصاريح والتراخيص والخدمات والأعمال التي تصدرها أو تقدمها المؤسسة في مجال اختصاصاتها.
    الموافقة على إنشاء فروع أو مكاتب تابعة للمؤسسة داخل المملكة. الموافقة على إبرام الاتفاقيات والعقود، وفقًا للإجراءات النظامية المتبعة. النظر في التقارير الدورية التي يقدمها الرئيس التنفيذي عن سير العمل، واعتمادها. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. الموافقة على مشروع ميزانية المؤسسة وحسابها الختامي وتقريرها السنوي؛ تمهيداً لرفعها وفقًا للإجراءات النظامية المتبعة. قبول التبرعات والهبات والمنح والوصايا والأوقاف، وفقاً للأحكام المنظمة لذلك. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس أيضًا تفويض من يراه من أعضائه أو من منسوبي المؤسسة ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس دوريًّا برئاسة الرئيس -أو من ينيبه من ممثلي الجهات الحكومية بالمجلس- (أربع) مرات على الأقل في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وتوجه الدعوة للاجتماع من الرئيس أو من ينيبه، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها الرئيس والأعضاء الحاضرون. للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم، دون أن يكون لهم حق التصويت. لا يجوز للعضو الامتناع عن التصويت ولا تفويض عضو آخر بالتصويت عند غيابه. ويجوز للعضو الذي يعترض على أي قرار أن يثبت اعتراضه مسبباً في محضر الاجتماع. تعقد اجتماعات المجلس في المقر الرئيس للمؤسسة. ويجوز عند الحاجة عقدها في مكان آخر داخل المملكة. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة وفقاً لما يقدره الرئيس- أن يصدر قراراً بالتمرير، ويشترط في هذه الحالة موافقة جميع أعضاء المجلس على القرار، ويعرض هذا القرار على
    المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة وفقاً لما يقدره الرئيس- عقد الاجتماعات والتصويت على القرارات عن بُعد من خلال استخدام وسائل التقنية. يضع المجلس القواعد والإجراءات المنظمة لعقد اجتماعاته عن بُعد، بما في ذلك تحديد إجراءات الدعوة للاجتماعات وكيفية انعقادها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعيَّن بقرار من المجلس أمين للمجلس يتولى إعداد جدول أعمال المجلس، وتوجيه الدعوة لاجتماعاته إلى الأعضاء، وأمانة سر اجتماعاته، وإعداد محاضر اجتماعاته وقراراته، وتسجيلها في السجل الخاص بذلك، وأي مهمة أخرى يحددها له المجلس. ويحدد المجلس ما يتقاضاه أمين المجلس من مزايا مالية وفق ما تحدده اللوائح الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يكون للمؤسسة رئيس تنفيذي، يعين في منصبه ويعفى منه بقرار من المجلس بناءً على ترشيح من الرئيس، ويحدد القرار أجره ومزاياه المالية، ويتولى إدارة أعمال المؤسسة والإشراف العام على جميع شؤونها في حدود ما يقضي به التنظيم واللوائح الصادرة بموجبه، وما يقرره له المجلس. وله على وجه الخصوص ما يلي: اقتراح السياسة العامة للمؤسسة وخططها الاستراتيجية والبرامج والمشاريع والمبادرات وخطط تنفيذها، للارتقاء بخدمات المؤسسة وتحقيق الاستدامة المالية، ورفعها إلى المجلس. تنفيذ ما يعتمده المجلس من السياسات -المتعلقة بنشاط المؤسسة- والخطط والبرامج المعتمدة، والقرارات الصادرة من المجلس أو القرارات ذات الصلة بأعمال المؤسسة. الإشراف على سير العمل في المؤسسة من خلال اللوائح والخطط والبرامج المعتمدة. اقتراح الهيكل التنظيمي للمؤسسة، ورفعه إلى المجلس لإقراره. اقتراح اللوائح الإدارية والمالية وغيرها من اللوائح اللازمة لتسيير شؤون المؤسسة، ورفعها إلى المجلس لإقرارها. تقديم تقارير دورية إلى المجلس عن أعمال المؤسسة ومنجزاتها ونشاطاتها والعوائق التي تواجهها، تمهيداً لاستكمال ما يلزم في شأنها. الصرف من ميزانية
    المؤسسة، واتخاذ جميع الإجراءات المالية، وفقًا للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي فوضه بها المجلس. تعيين العاملين في المؤسسة، والإشراف عليهم، وإنهاء خدماتهم، وفقاً للوائح المنظمة لذلك. العمل على تطوير الكوادر البشرية الوطنية العاملة في المؤسسة وتدريبها في مجالات عمل المؤسسة واختصاصاتها، وفقًا للأحكام المنظمة لذلك. التعاقد لتنفيذ الأعمال والخدمات اللازمة لتسيير أعمال المؤسسة، وفقًا للصلاحيات التي يفوضه بها المجلس، والأحكام المنظمة لذلك. التوقيع على الاتفاقيات والعقود، بحسب الصلاحيات التي يفوضه بها المجلس، ووفقًا للإجراءات النظامية المتبعة. اتخاذ ما يلزم تجاه أي معالجات فنية أو تقنية أو تشغيلية مناسبة لرفع كفاءة عمل المؤسسة. الإشراف على إعداد مشروع ميزانية المؤسسة، وحسابها الختامي، وتقريرها السنوي، تمهيداً لعرضها على المجلس. إقرار إجراءات عمل المؤسسة. تمثيل المؤسسة أمام الجهات القضائية والإدارية وغيرها من الجهات، أو في المؤتمرات أو الفعاليات داخل المملكة وخارجها. وله تفويض غيره بذلك. الاستعانة بالخبراء والمستشارين في حدود أهداف المؤسسة، وفقًا لما تحدده اللوائح. اقتراح إنشاء
    فروع أو مكاتب للمؤسسة داخل المملكة، والعرض بذلك على المجلس. أي مهمة أخرى يكلفه بها المجلس. وللرئيس التنفيذي تفويض بعض صلاحياته إلى غيره من منسوبي المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتألف موارد المؤسسة من المصادر الآتية: أ- ما يخصص لها من اعتمادات في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه عن التصاريح والتراخيص والخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من تبرعات وهبات ومنح ووصايا وأوقاف، وفقًا للأحكام المنظمة لذلك. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المؤسسة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح المؤسسة حسابًا لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها العمل في المملكة، ويصرف من هذه الحسابات وفق ميزانيتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للمؤسسة ميزانية سنوية مستقلة. السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة، يعين المجلس مراجع حسابات (أو أكثر) من المرخص لهم بالعمل في المملكة، ليتولى تدقيق ومراجعة حسابات المؤسسة وسجلاتها المالية وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه (أو أتعابهم)، ويُرفع تقرير مراجع الحسابات إلى المجلس لإقراره، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخضع منسوبو المؤسسة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع المؤسسة إلى مجلس الوزراء، خلال (90) يومًا من انتهاء السنة المالية، تقريرًا سنويًّا عما حققته من إنجازات خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ترفع المؤسسة إلى مجلس الوزراء، خلال (90) يومًا من تاريخ انتهاء السنة المالية، حسابها الختامي، ويُزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/191dfdfc-b28f-443e-bb13-b0d600cb6e71/1
  verified: false
