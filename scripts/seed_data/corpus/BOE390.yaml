articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: 1- التنظيم: تنظيم هيئة كفاءة الإنفاق والمشروعات الحكومية. 2- الهيئة: هيئة كفاءة الإنفاق والمشروعات الحكومية. 3- المجلس: مجلس إدارة الهيئة. 4- الرئيس التنفيذي: الرئيس التنفيذي للهيئة. 5- الجهات الحكومية: الوزارات والأجهزة الحكومية الأخرى التي تمول من الميزانية العامة للدولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية المستقلة، والاستقلال المالي والإداري، وترتبط تنظيميّاً برئيس مجلس الشؤون الاقتصادية والتنمية، ويكون مقرها الرئيس في مدينة الرياض، ولها أن تنشئ فروعاً ومكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى الإسهام في تحقيق كفاءة الإنفاق في الجهات الحكومية، والارتقاء بجودة المشروعات والأصول والمرافق، وتخطيط البنية التحتية، والبرامج والمبادرات والعمليات التشغيلية الممولة من الميزانية العامة للدولة، ومتابعة تنفيذ تلك الجهات للبرامج والمبادرات الخاصة بها بما يحقق أهداف الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات ومسؤوليات الجهات الأخرى، للهيئة القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: وضع السياسات والاستراتيجيات والخطط والبرامج والمعايير والأدلة ذات الصلة باختصاصات الهيئة بالتنسيق مع الجهات المعنية، ومتابعة تطبيقها بعد اعتمادها. اقتراح مشروعات الأنظمة ذات الصلة باختصاصات الهيئة، واقتراح تعديل المعمول به منها، والرفع عنها لاستكمال الإجراءات النظامية اللازمة. دراسة تفاصيل الإنفاق والممارسات التشغيلية والرأسمالية المتعلقة به في الجهات الحكومية في التخطيط والتشغيل، وإبداء التوصيات حيالها، وتحديد فرص رفع كفاءة الإنفاق المترتبة عليها، وتحديد أثرها في ميزانية تلك الجهات. والرفع عما يلزم الرفع عنه وفقاً للإجراءات النظامية. دراسة السياسات والخطط والاستراتيجيات للجهات الحكومية، ذات التأثير على الإنفاق وجودة المشروعات، واقتراح تعديل المعمول به منها، والرفع عنها لاستكمال الإجراءات النظامية اللازمة. وضع المؤشرات ومعايير القياس -ذات الصلة باختصاصات الهيئة- وتطويرها بشكل مستمر بالتنسيق مع الجهات المعنية. وضع الأدوات والمنهجيات والأساليب التي تسهم في تحقيق
    أهداف الهيئة، وتبني أفضل الممارسات العالمية والتطبيقات التقنية ذات الصلة باختصاصاتها. التنسيق مع الجهات الحكومية لتشكيل فرق عمل بداخلها؛ لرفع كفاءة الإنفاق، والارتقاء بجودة المشروعات والبرامج التشغيلية والمبادرات الحكومية. إعداد تقارير قياس ومتابعة التزام الجهات الحكومية بالتوصيات والمنهجيات والآليات والمعايير ذات الصلة، والرفع عنها؛ لاتخاذ ما يلزم بشأنها. مراجعة المبادرات والبرامج المعتمدة للجهات الحكومية للتأكد من مواءمتها لأهداف كفاءة الإنفاق، واقتراح التغييرات اللازمة لضمان تحقيق كفاءة الإنفاق ورفع جودة المشروعات -بالتنسيق مع الجهات المعنية- والرفع عنها، لاستكمال ما يلزم في شأنها. دراسة تأثير الإنفاق الحكومي على المشروعات والبرامج والمبادرات والخطط وعلى المالية العامة في المدى المتوسط والبعيد بالتنسيق مع الجهات الحكومية ذات الصلة للتأكد من مواءمتها لأهداف الاستدامة المالية، واقتراح التغييرات اللازمة والتوصيات، والرفع عنها لاستكمال ما يلزم في شأنها. تحديد نوعية ومستوى المؤهلات العلمية والعملية للعاملين في مجالات إدارة المشروعات في الجهات الحكومية، والتحقق من وجود الكوادر المؤهلة علميًّا
    وعمليًّا. التأكد من استيفاء متطلبات (البوابات المرحلية) للمشروعات قبل إدراج المشروعات في الميزانية وخلال كامل مراحل كل مشروع، والتنسيق مع هيئة المحتوى المحلي والمشتريات الحكومية فيما يتصل بمتطلبات المحتوى المحلي. وضع المعايير والآليات لتخطيط وإدارة المشروعات في الجهات الحكومية، وعقود الخدمات ذات التنفيذ المستمر، ومتابعة تنفيذها بعد ذلك، وتحديد الميزانيات اللازمة لها. عقد اللقاءات والندوات والمؤتمرات والدورات التدريبية المتخصصة في المجالات ذات الصلة باختصاصات الهيئة. الاستعانة بالخبراء والمستشارين وبيوت الخبرة ذات الكفاءات المتميزة وفقاً للوائح الهيئة المعتمدة. عقد شراكات واتفاقيات تعاون مع الجهات الحكومية ذات العلاقة وفقاً للإجراءات النظامية. إعداد الدراسات والبحوث العلمية ذات الصلة باختصاصات الهيئة. تشجيع الجهات الحكومية على التميز في المجالات ذات الصلة باختصاصات الهيئة من خلال اقتراح حوافز لذلك، والرفع عنها لاستكمال ما يلزم في شأنها. التنسيق مع الجهات الحكومية لطلب البيانات والمعلومات والوثائق والمستندات ذات العلاقة باختصاصات الهيئة، وعقد اجتماعات مع تلك الجهات لأخذ مرئياتها أو الحصول
    على المعلومات ذات الصلة بحسب الإجراءات المتبعة. التعاون مع الجهات الحكومية في وضع وتبني الممكنات التقنية اللازمة لتحقيق أهداف الهيئة ومن ذلك: الاستفادة من قواعد البيانات المتاحة لدى الجهات الحكومية والربط معها. وضع متطلبات ومستهدفات كفاءة الإنفاق والمشروعات الحكومية بالتنسيق مع هيئة المحتوى المحلي والمشتريات الحكومية، ومتابعة أداء تلك الجهات في سبيل تحقيق ذلك، وفقًا لأحكام النظامية ذات الصلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة على النحو الآتي: 1- وزير المالية رئيسًا. 2- وزير الاقتصاد والتخطيط. عضوًا. 3- وزير الموارد البشرية والتنمية الاجتماعية. عضوًا. 4- وزير الاتصالات وتقنية المعلومات. عضوًا. 5- رئيس مجلس إدارة هيئة المحتوى المحلي والمشتريات الحكومية. عضوًا. 6- الرئيس التنفيذي للهيئة. عضوًا. ويجوز تعديل تشكيل المجلس بأمر من رئيس مجلس الوزراء بناء على اقتراح من رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنه التنظيم، وله على وجه خاص ما يأتي: إقرار السياسات والاستراتيجيات ذات الصلة باختصاصات الهيئة، والخطط والبرامج اللازمة لتنفيذها. اقتراح مشروعات الأنظمة ذات الصلة باختصاصات الهيئة، واقتراح تعديل المعمول به منها، والرفع عن ذلك لاستكمال الإجراءات النظامية اللازمة. إقرار الهيكل التنظيمي للهيئة. إقرار اللوائح المالية والإدارية التي تسير عليها الهيئة وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وأن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. اعتماد المعايير والمنهجيات والأساليب والأدوات ذات الصلة باختصاصات الهيئة. الموافقة على إنشاء فروع ومكاتب للهيئة. النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة، واتخاذ ما يلزم بشأنها. الموافقة على مشروع ميزانية الهيئة، وحسابها الختامي، وتقرير مراجع الحسابات،
    والتقرير السنوي؛ تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. تحديد المقابل المالي لما تقدمه الهيئة من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتعبة. قبول التبرعات والهبات والمنح والوصايا والأوقاف والمساعدات، وذلك وفقاً للأحكام المنظمة لذلك. تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي. وللمجلس تشكيل لجان -دائمة أو مؤقتة- من بين أعضائه أو من غيرهم، يعهد إليها بما يراه من مهمات. ويحدِّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وله كذلك تفويض بعض اختصاصاته إلى رئيسه أو من يراه من أعضائه أو الرئيس التنفيذي أو من يراه من منسوبي الهيئة، وفقاً لما يقتضيه سير العمل فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس بدعوة من رئيسه مرة كل ثلاثة أشهر، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك ثلث الأعضاء على الأقل، ويجب أن توجه الدعوة -كتابة- قبل الاجتماع بسبعة أيام على الأقل، على أن تتضمن جدول الأعمال. يشترط لصحة اجتماع المجلس حضور أغلبية أعضائه على الأقل، بمن فيهم رئيس المجلس أو من ينيبه من الأعضاء. تصدر قرارات المجلس بموافقة أغلبية أعضائه على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت أو تفويض عضو آخر للتصويت نيابة عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع، والأعضاء الحاضرون. ويجوز للعضو الذي يعترض على أي قرار أن يثبت اعتراضه مسبباً في المحضر. للمجلس أن يدعو من يراه لحضور اجتماعاته دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يعين بقرار من المجلس بناء على ترشيح من رئيسه، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون المسؤول عن إدارة الهيئة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم، وما يقرره المجلس، وله بوجه خاص مباشرة الاختصاصات الآتية: اقتراح سياسات واستراتيجيات الهيئة والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس لإقرارها. اقتراح هيكل الهيئة التنظيمي. اقتراح اللوائح المالية والإدارية اللازمة لتسيير العمل في الهيئة، ورفعها إلى المجلس لإقرارها والإشراف على تنفيذها بعد إقرارها. اقتراح المعايير والمنهجيات والأساليب والأدوات ذات الصلة باختصاصات الهيئة، ورفعها إلى المجلس لإقرارها. إعداد مشروع ميزانية الهيئة، وحسابها الختامي، والتقرير السنوي، ورفعها إلى المجلس لإقرارها. إصدار الأوامر بمصروفات الهيئة، وذلك وفقاً للوائحها المالية. تعيين العاملين في الهيئة والإشراف عليهم، وفقاً لما تحدده اللوائح. التعاقد مع الخبراء والمستشارين وبيوت الخبرة ذات الكفاءات المتميزة في حدود أهداف الهيئة، ووفقاً لما تحدده اللوائح. متابعة تنفيذ القرارات ذات الصلة بأهداف الهيئة. إعداد
    تقارير دورية عن أعمال الهيئة ومنجزاتها ونشاطاتها، ورفعها إلى المجلس تمهيداً لاستكمال ما يلزم في شأنها. تقديم المقترحات والتوصيات إلى المجلس في شأن الموضوعات الداخلة في اختصاصاته. التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات التي يمنحه إياها، ووفقًا للإجراءات النظامية المتبعة. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره في ذلك. أي مهمة أخرى يكلفه بها المجلس. وللرئيس التنفيذي تفويض أي من اختصاصاته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون تبادل بيانات الجهات الحكومية مع الهيئة إلكترونيّاً ما أمكن وفقاً لما تقضي به الأنظمة والتعليمات المعمول بها. يجوز للهيئة -بعد موافقة المجلس- نشر بيانات ونتائج كفاءة الإنفاق وجودة تنفيذ المشروعات لدى الجهات الحكومية، لتعزيز الشفافية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل، ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة. واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتألف موارد الهيئة المالية من الآتي: أ- ما يخصص لها من اعتمادات في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها. ج- التبرعات والهبات والمنح والوصايا والأوقاف والمسـاعدات التي يقبلها المجلس، وفقاً للأحكام المنظمة لذلك. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة ولوائحها المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8bb51bc2-69b3-4dfa-83de-ada400bd49e3/1
  verified: false
