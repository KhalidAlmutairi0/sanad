  name_ar: نظام النقد العربى السعودى
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'وحدة النقد السعودي هي الريال السعودي، ويقسم الريال إلى عشرين قرشا سعوديا، ويقسم القرش السعودي إلى: خمس هلل سعودية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تعادل قيمة الريال السعودي: (197482 /0) غرام من الذهب الخالص، وتسمى هذه القيمة: سعر التعادل . ولا يجوز تعديل سعر التعادل إلا بمرسوم ملكي ، ووفقا لأحكام الاتفاقيات الدولية التي تكون المملكة العربية السعودية طرفا فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: سك وطبع وإصدار النقد السعودي امتياز ينحصر في مؤسسة النقد العربي السعودي وحدها، ولا يجوز لأي كان أن يمارس هذا الحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'بناء على اقتراح مؤسسة النقد العربي السعودي ، وموافقة وزير المالية ، ومع مراعاة أحكام هذا النظام، يقرر مجلس الوزراء : أ - فئات النقد المعدنية والورقية: 1 - التي يجوز إصدارها للتداول.2 - وأشكالها وتصميماتها ورسومها، ومقاديرها ومقاييسها ومحتوياتها، وعياراتها وأوزانها وأحجامها، وسائر أوصافها ونفقاتها.3 - ومكان حفظ أكليشاتها أو قوالبها، ونماذج تواقيع المخولين للتوقيع على أوراق النقد في حرز أمين.4 - وأسباب الوقاية ضد تزييفها.5 - ومكان وزمان طبعها أو سكها. ب - اختيار البنوك التي تودع بها العملات الأجنبية التي تشكل جزءا من غطاء النقد (احتياطي المملكة)، بشرط أن تكون من الدرجة الأولى.ج - استثمار مؤسسة النقد العربي السعودي لاحتياطي المملكة من نقد أجنبي في أوراق مالية أجنبية طبقا للأصول المرعية في البنوك المركزية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تقرر مؤسسة النقد العربي السعودي بموافقة وزير المالية ، ومع مراعاة أحكام هذا النظام: أ - فئات النقود الورقية والمعدنية التي يقتضي تبديلها أو سحبها من التداول لعدم استيفائها الشروط التي تجعلها صالحة للتداول، وطريقة التصرف بها، أو فقدانها قوتها الإبرائية بعد مهلة لا تقل عن شهر، إن اقتضى استعجال السحب حرصا على المصلحة العامة . ومع مراعاة البندين (ب) و (ج) من هذه المادة.ب - الشروط التي يجب توافرها في النقد المستهلك لاستبداله بآخر، مع مراعاة عدم دفع أي مقابل للأوراق النقدية التي فقدت معالمها أو أكثر من خمس ساحتها أو رقمي معادلتها، أو التوقيعين المفروضين عليها بموجب المادة الثامنة من هذا النظام. ولا للسكوكات التي فقدت معالمها أو قطعت أو بردت أو ثقبت أو غسلت بالوسائل الكيماوية أو شوهت أو تغير شكلها، ما لم يثبت ثبوتا قاطعا أن ما أصابها كان نتيجة أسباب قاهرة، ففي هذه الحالة للقضاء حق الحكم بتعويض ما يفقد عند ثبوت ذلك لديه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: أ - تغطي مؤسسة النقد العربي السعودي جميع النقود التي تصدرها بغطاء كامل، يساوي قيمتها تماما من الذهب والعملات الأجنبية القابلة للتحويل في الذهب.ب - لا يجوز لمؤسسة النقد العربي السعودي بحال من الأحوال إصدار نقد بدون غطاء كامل مصون في حرز أمين، بحيث يحفظ هذا الغطاء في المملكة. ومع ذلك يجوز حفظ ما عدا الذهب منه لدى بنوك الدرجة الأولى في خارج المملكة.ج - يقوم الغطاء على أساس السعر المحدد، وفقا للمادة الثانية من هذا النظام.د - عند إعادة تقويم الرصيد تؤول كل زيادة ناشئة عن ذلك إلى الحكومة، ويجوز استخدامه في دعم النقد وتثبيت سعره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون لورق النقد من فئة الريال ومضاعفاته وأجزائه الذي تصدره مؤسسة النقد العربي السعودي ، صفة التداول القانوني وقوة إبرائية غير محددة، لتسديد كافة الديون والالتزامات الخاصة والعامة، غير أنه لا يجبر أحد على قبول نقود من فئات أجزاء الريال تزيد قيمتها على عشرة ريالات سعودية إلا مؤسسة النقد العربي السعودي وفروعها وما يقوم مقامها، التي تقبل تيسيرا للناس أي مقدار من أية فئة من فئات النقد السعودي المصرح بتداولها، سواء كان ذلك بقصد دفعها إلى الخزينة العامة ، أو استبدالها بفئات أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يوقع على أوراق النقد : وزير المالية ومحافظ مؤسسة النقد العربي السعودي .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يسحب من التداول ما تبقى من الجنيهات السعودية الذهبية، ويفقد الجنية السعودي الذهب صفة التداول القانوني وقوته الإبرائية من تاريخ نشر هذا النظام. ويجوز لحامل الجنيه السعودي الذهب أن يسلمه إلى مؤسسة النقد العربي السعودي في خلال شهرين اعتبارا من تاريخ نشر هذا النظام، لقاء قبضهم أربعين ريالا سعوديا، وبعد انتهاء المهلة المذكورة يصبح سلعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تحتفظ مؤسسة النقد العربي السعودي بسجل تدون فيه تفاصيل النقود المعدنية والورقية في خزانتها، والمصدرة والمسحوبة من التداول .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تنشر مؤسسة النقد العربي السعودي في الجريدة الرسمية بيانا بوضعها عن الأسبوعين السابقين، يتضمن مقدار الأوراق النقدية والسكوكات المصدرة، ومقدار ما يقابلها من غطاء كامل بالتفصيل، مع مقارنة كل ذلك بنصف الشهر الذي قبله. كما تنشر في آخر كل سنة في الجريدة الرسمية بيانا عاما مصدقا عليه من قبل فاحص حسابات قانوني معروف، يشتمل على تقرير سنوي عن أعمال المؤسسة ووضعها والميزانية العامة، وحساب الأرباح والخسائر حسب الأصول المرعية في البنوك المركزية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: أ - تطبق على إيصالات الحجاج جميع الأحكام الواردة في هذا النظام بشأن ورق النقد، إلى أن يتم سحبها من التداول.ب - تقوم مؤسسة النقد العربي السعودي بسحب إيصالات الحجاج من التداول تدريجيا، وبإبدالها بما يقابلها من العملة الجديدة، وذلك بعد إصدار العملة الجديدة، وخلال مدة تعينها المؤسسة وتعلن عنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تصدر مؤسسة النقد العربي السعودي ، بموافقة وزير المالية، التعليمات وفقا لأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يعتبر هذا النظام ملغيا لجميع ما يتعارض مع أحكامه، مما صدر في السابق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: على رئيس مجلس الوزراء ووزير المالية والاقتصاد الوطني تنفيذ هذا النظام، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1603064a-ab7e-48eb-9564-a9a700f2d2e0/1
  verified: false
