articles:
- article_ref: المادة الأولى
  article_text_ar: تطبق محاكم الديوان على القضايا المعروضة أمامها أحكام الشريعة الإسلامية، وفقاً لما دل عليه الكتاب والسنة، والأنظمة التي لا تتعارض معهما، وتتقيد في إجراءات نظرها بما ورد في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يكون الاختصاص المكاني للمحكمة التي يقع في دائرة اختصاصها مقر المدعى عليه، أو مقر فرع الجهة المدعى عليها إن كانت الدعوى متعلقة بذلك الفرع، أو مقر عمل الموظف في الدعوى التأديبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يجوز أن يتم الإبلاغ بالمواعيد والإجراءات المنصوص عليها في هذا النظام بكتاب مسجل مع إشعار بالتسلُّم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب أن تشتمل أوراق التبليغ على البيانات المنصوص عليها في نظام المرافعات الشرعية. ولمجلس القضاء الإداري إضافة ما يلزم من بيانات ومرافقات أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- ترفع الدعوى الإدارية بصحيفة يودعها المدعي أو مَنْ يمثله لدى المحكمة المختصة. ويجب أن تشمل الصحيفة البيانات المنصوص عليها في نظام المرافعات الشرعية، مع مراعاة ما ورد في الفقرة (2) من هذه المادة، وأن يرافق صحيفة الدعوى ومستنداتها صور منها بعدد المدعى عليهم. ولمجلس القضاء الإداري عند الاقتضاء إضافة ما يلزم من بيانات ومرافقات أخرى لصحيفة الدعوى بقرار ينشر في الجريدة الرسمية.2- يجب في الدعاوى المنصوص عليها في الفقرتين (أ) و(ب) من المادة (الثالثة عشرة) من نظام ديوان المظالم أن تتضمن صحيفة الدعوى تاريخ الإبلاغ بالقرار، أو العلم به، أو نشره في الجريدة الرسمية ـ بحسب الأحوال ـ وتاريخ التظلم ونتيجته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- تقيد الإدارة المختصة في المحكمة صحيفة الدعوى إذا كانت مستوفية المطلوب وفقاً للمادة (الخامسة) من هذا النظام، وإذا قررت عدم قيدها؛ لعدم الاستيفاء، فعلى طالب القيد استيفاء ما نقص خلال ثلاثين يوماً من تاريخ إبلاغه بذلك، وإن لم يستوفِ ما طلب منه خلال هذه المدة عُدَّ الطلب كأن لم يكن. فإن قيدت الدعوى بعد الاستيفاء عدت مقيدة من تاريخ تقديم طلب القيد. على أنه يجب على الإدارة إثبات تاريخ طلب القيد في جميع الأحوال.وتثبت الإدارة - بحضور مَنْ أودع صحيفة الدعوى - تاريخ الجلسة المحددة لنظرها، وتحيل الدعاوى إلى الدوائر وفقاً لقواعد يصدرها رئيس مجلس القضاء الإداري.2- تبلغ - بالإضافة إلى الجهة المدعى عليها - كلٌ من وزارة المالية وديوان المراقبة العامة بموعد نظر الدعوى.وإذا كانت تتعلق بشؤون الخدمة المدنية فتبلغ به وزارة الخدمة المدنية، ويجب ألا تقل المدة بين الإبلاغ وتاريخ الجلسة عن ثلاثين يوماً. ولكل من وزارة المالية وديوان المراقبة العامة ووزارة الخدمة المدنية - بحسب الحال - أن ترسل وجهة نظرها إلى المحكمة الإدارية، أو أن تطلب الاشتراك في المرافعة، وذلك قبل موعد الجلسة بوقت كافٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: ترفع الدعوى التأديبية بإيداع صحيفتها وجميع أوراق التحقيق لدى المحكمة المختصة. ويجب أن تتضمن الصحيفة اسم الموظف، وصفته، ومقر عمله، والمخالفة المنسوبة إليه، ومكان وقوعها، وأدلتها، والنصوص النظامية المطلوب تطبيقها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجب في الدعاوى المنصوص عليها في الفقرة (أ) من المادة (الثالثة عشرة) من نظام ديوان المظالم، أن يسبق رفعها إلى المحكمة الإدارية التظلم إلى وزارة الخدمة المدنية أو الجهة العسكرية التابع لها الموظف خلال عشر سنوات من تاريخ نشوء الحق المدعى به، ما لم يقر المدعى عليه بالحق أو يكن ثمة عذر شرعي حال دون رفع الدعوى يثبت لدى المحكمة. وعلى وزارة الخدمة المدنية أو الجهة العسكرية التابع لها الموظف أن تبت في التظلم خلال ستين يوماً من تاريخ تقديمه. إذا صدر قرار وزارة الخدمة المدنية أو الجهة العسكرية التابع لها الموظف برفض التظلم، أو مضت المدة المحددة في الفقرة السابقة دون البت فيه، جاز رفع الدعوى إلى المحكمة الإدارية خلال ستين يوماً من تاريخ العلم بالقرار الصادر بالرفض أو انقضاء الستين يوماً المذكورة دون البت في التظلم أو خلال ما تبقى من السنوات العشر المذكورة في الفقرة (1) من هذه المادة أيهما أطول. ويجب أن يكون القرار الصادر من وزارة الخدمة المدنية أو الجهة العسكرية التابع لها الموظف برفض التظلم مسبباً. إذا صدر قرار وزارة الخدمة المدنية أو الجهة العسكرية التابع لها الموظف بأحقية المدعي
    فيما يطالب به ولم تقم الجهة الإدارية بتنفيذه خلال ستين يوماً من تاريخ إبلاغه، جاز رفع الدعوى إلى المحكمة الإدارية خلال الستين يوماً التالية لهذه المدة أو خلال ما تبقى من السنوات العشر المذكورة في الفقرة (1) من هذه المادة أيهما أطول. فيما لم يرد به نص خاص، يجب في الدعوى - المنصوص عليها في الفقرة (ب) من المادة (الثالثة عشرة) من نظام ديوان المظالم إن لم تكن متعلقة بشؤون الخدمة المدنية - أن يسبق رفعها إلى المحكمة الإدارية التظلم إلى الجهة مصدرة القرار خلال ستين يوماً من تاريخ العلم بهذا القرار، ويتحقق العلم به بإبلاغ ذوي الشأن به أو بنشره في الجريدة الرسمية إذا تعذر الإبلاغ. وعلى تلك الجهة أن تبت في التظلم خلال ستين يوماً من تاريخ تقديمه، وإذا صدر القرار بالرفض وجب أن يكون مسبباً، ويعد مضي ستين يوماً من تاريخ تقديم التظلم دون البت فيه بمثابة صدور قرار برفضه. ويجب قبل رفع الدعوى إذا كانت متعلقة بشؤون الخدمة المدنية التظلم إلى وزارة الخدمة المدنية وحدها دون الجهة الإدارية وذلك خلال ستين يوماً من تاريخ العلم بالقرار. وعلى وزارة الخدمة المدنية أن تبت في التظلم خلال ستين يوماً من تاريخ تقديمه.
    وإذا صدر قرارها برفض التظلم أو مضت المدة المحددة دون البت فيه، جاز رفع الدعوى إلى المحكمة الإدارية خلال ستين يوماً من تاريخ العلم بالقرار الصادر بالرفض أو انقضاء الستين يوماً المذكورة دون البت في التظلم. ويجب أن يكون قرار وزارة الخدمة المدنية برفض التظلم مسبباً. وإذا صدر قرار وزارة الخدمة المدنية لمصلحة المتظلم ولم تقم الجهة الإدارية بتنفيذه خلال ستين يوماً من تاريخ إبلاغه، جاز رفع الدعوى إلى المحكمة الإدارية خلال الستين يوماً التالية لهذه المدة. استثناءً من الأحكام الواردة في الفقرة السابقة؛ للمحكمة أن تقبل دعوى الإلغاء - خلال فترة التظلم الوجوبي - في الحالات المستعجلة متى اقترنت بطلب وقف تنفيذ القرار الإداري المطلوب إلغاؤه بشرط التظلم إلى الجهة مصدرة القرار، وتبت المحكمة على وجه السرعة في طلب وقف التنفيذ، وتنظر في موضوع الدعوى بعد انتهاء فترة التظلم الوجوبي أو إذا رفضت الجهة مصدرة القرار تظلمه قبل انتهاء هذه الفترة. فيما لم يرد به نص خاص، لا تسمع الدعاوى المنصوص عليها في الفقرتين (ج،د) من المادة (الثالثة عشرة) من نظام ديوان المظالم بعد مضي عشر سنوات من تاريخ نشوء الحق المدعى به، ما
    لم يقر المدعى عليه بالحق أو يتقدم المدعى بعذر تقبله المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: مع عدم الإخلال بما ورد في الفقرة (5) من المادة (الثامنة) من هذا النظام ، لا يترتب على رفع الدعوى وقف تنفيذ القرار المطلوب إلغاؤه، على أنه يجوز للمحكمة أن تأمر بوقف تنفيذه إذا طلب ذلك ورأت المحكمة أن تنفيذه يرتب آثاراً يتعذر تداركها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون إجراءات نظر الدعوى والمرافعة فيها كتابية، على أنه يجوز للدائرة سماع الأقوال والدفوع مشافهة، وإثبات ما تراه من ذلك في محضر الجلسة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'في سبيل نظر الدعوى يجوز - وفقاً لقرار يصدر من مجلس القضاء الإداري - الآتي : 1 - أن تعهد الدائرة إلى أحد قضاتها تحضير الدعوى وتهيئتها للمرافعة، وفقاً لما يلي: أ - أن يعد القاضي - بعد إتمام التحضير - تقريراً عن الدعوى يحدد فيه الوقائع والمسائل التي تثيرها، ثم تُحدد جلسة لتنظر الدائرة في الدعوى. ب - أن للقاضي تكليف أطراف الدعوى بتقديم مذكرات ومستندات تكميلية، واستدعاء ذوي الشأن لسؤالـهم عن الوقائع التي يرى لزوم تحقيقها، وإدخال وقبول تدخل من يصح اختصامه، وغير ذلك من الإجراءات اللازمة لتحضير الدعوى. 2 - تبادل المذكرات بين الأطراف عن طريق أحد المختصين في المحكمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع مراعاة ما نصت عليه المادة (الحادية عشرة) من هذا النظام ؛ لا تصح جلسات الدائرة إلا بحضور جميع قضاتها، وممثل الادعاء في الدعوى التأديبية. فإن لم يكتمل تشكيل الدائرة، يكلف رئيس مجلس القضاء الإداري مَنْ يكمله من قضاتها مدة لا تتجاوز ستين يوماً، ولرئيس المجلس تفويض رئيس المحكمة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'إدارة الجلسة وضبطها منوطان برئيسها، ولـه في سبيل ذلك اتخاذ أيِّ من الإجراءات الآتية: 1 - أن يأمر بمحو العبارات الجارحة، أو المخالفة للآداب، أو النظام العام، من أيِّ ورقة يقدمها أطراف الدعوى.2 - أن يخرِج من قاعة الجلسة من يخل بنظامها، فإن لم يمتثل جاز له أن يأمر على الفور بحبسه أربعاً وعشرين ساعة، أو بتغريمه مبلغاً لا يتجاوز ألف ريال، أو بهما معاً، ولـه قبل انتهاء الجلسة الرجوع عما أصدره، ويكون أمره نهائياً.3 - أن يأمر بكتابة محضر عن كل جريمة تقع أثناء انعقاد الجلسة، وإحالة الأوراق إلى الجهة المختصة، ولـه إن اقتضى الحال أن يأمر بالقبض على من وقعت منه هذه الأفعال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لأيٍّ من أطراف الدعوى الحصول على صور من أوراق الدعوى ومستنداتها ما لم يرَ رئيس الجلسة خلاف ذلك، ولا يجوز التعويل على أيٍّ من أوراق الدعوى ومستنداتها ما لم يمكَّن الأطراف من الاطلاع عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1- إذا لم يحضر المدعي الجلسة الأولى جاز للمحكمة أن تحكم في الدعوى إذا كانت صالحة للحكم فيها، أو تقرر شطبها. فإذا انقضت ستون يوماً ولم يطلب المدعي السير فيها بعد شطبها، أو لم يحضر بعد السير فيها، عُدَّت كأن لم تكن.وإذا طلب المدعي السير فيها بعد ذلك حكمت المحكمة من تلقاء نفسها باعتبار الدعوى كأن لم تكن.2- إذا لم يحضر المدعى عليه، فعلى المحكمة تأجيل نظر الدعوى إلى جلسة تالية يبلغ بها المدعى عليه، فإن لم يحضر فصلت في الدعوى، ويعد الحكم حضوريَّا.3- يقدَّم طلب السير في الدعوى وفقاً للإجراءات المقررة لرفع الدعوى، على أن يتضمن الطلب بيانات القضية المشطوبة، والدائرة التي نظرتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: إذا حضر المدعي أو المدعى عليه في أي جلسة أمام المحكمة المختصة، أو قدم المدعى عليه مذكرة بدفاعه عُدَّت الخصومة حضورية ولو تخلف أي منهما بعد ذلك. ولا يجوز للمدعي أن يبدى طلبات جديدة في الجلسة التي تخلف عنها المدعى عليه، أو أن يعدِّل أو يزيد أو ينقص في الطلبات الأولى. وكذلك لا يجوز للمدعى عليه أن يطلب - في غيبة المدعي - الحكم عليه بطلب ما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: للموظف في الدعوى التأديبية أن يحضر الجلسات بنفسه ، أو أن يوكل عنه. وللمحكمة أن تقرر حضوره بشخصه واستجوابه، ولـه أن يبدي دفاعه كتابة أو مشافهة. وإن لم يحضر هو - أو وكيلـه - بعد إبلاغه، فعلى المحكمة أن تمضي في إجراءات الدعوى، ويعد حكمها في هذه الحالة حضورياً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يحرر أمين سر الدائرة محضر الجلسة تحت إشراف رئيسها، على أن يبين فيه أسماء القضاة الذين حضروا الجلسة، وزمان انعقادها ومكانه، والحاضرين من أطراف الدعوى، وجميع الإجراءات التي تتم فيها، ويوقع المحضر قضاة الدائرة، وأمين سرها، وأطراف الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: إن رأت المحكمة أثناء المرافعة ضرورة إجراء تحقيق تكميلي، باشرت ذلك بنفسها، أو كلفت من يقوم به من قضاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يصدر مجلس القضاء الإداري القواعد الخاصة بالاستعانة بالخبراء، وتحديد أتعابهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يكون طلب رد القاضي بعريضة تقدم إلى المحكمة، يوضح فيها أسبابه، ويُحال الطلب إلى القاضي المطلوب رده، ليجيب عليه كتابة خلال مدة أقصاها خمسة أيام، فإن لم يُجِب في الموعد المحدد، أو وافق على أسباب الرد وكانت تصلح نظاماً للرد، يصدر رئيس المحكمة قراراً بتنحيته عن نظر الدعوى .وفي غير الأحوال السابقة، أو إذا كان المطلوب رده رئيس المحكمة، فيُرفع طلب الرد إلى رئيس مجلس القضاء الإداري للفصل فيه. ويترتب على تقديم الطلب وقف النظر في الدعوى إلى حين الفصل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: للقاضي - إذا قامت لديه أسباب يشعر معها بالحرج من نظر الدعوى - أن يعرض أمر تنحيه عن النظر فيها على رئيس مجلس القضاء الإداري للفصل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تفصل المحكمة في الوقائع التي وردت في صحيفة الدعوى التأديبية، ويجوز لها - من تلقاء نفسها أو بناءً على طلب جهة الادعاء - إعادة أوراق القضية إليها للتحقيق في وقائع لم ترد في صحيفة الدعوى، أو مع موظفين غير من قدّموا للمحاكمة أمامها، إذا كانت أوراق القضية تتضمن ذلك. وفي جميع الأحوال يجب إعادة القضية إلى المحكمة، على أنه إذا كانت إعادة أوراق القضية بناء على قرار من الدائرة من تلقاء نفسها للتحقيق مع موظفين لم يقدموا للمحاكمة أمامها، فتحال القضية إلى دائرة أخرى لنظرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: إذا رأت المحكمة التي تنظر دعوى تأديبية أن الواقعة التي وردت في صحيفة الدعوى أو غيرها من الوقائع التي تضمنها التحقيق تشكل جريمة، أحالتها إلى الجهة المختصة لاتخاذ ما يجب نظاماً، وفصلت في الدعوى التأديبية، ما لم يكن الحكم في الدعوى التأديبية يتوقف على نتيجة الفصل في الدعوى الجزائية، فيجب وقف النظر في الدعوى الأولى حتى يفصل في الدعوى الثانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تصدر الأحكام بأغلبية قضاة الدائرة، وينسب الحكم إلى الدائرة، وعلى المخالف توضيح وجهة نظره وأسبابها، وعلى الأغلبية الرد عليها، ويثبت ذلك - أثناء المداولة - في محضر يرافق ملف الدعوى، ولا يجوز الاطلاع عليه إلا من المحكمة المعترض على الحكم أمامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يجب أن تودع في ملف الدعوى عند النطق بالحكم مسودته المشتملة على وقائعه وأسبابه موقعة من قضاة الدائرة. ويجب أن يحدد ـ بعد النطق بالحكم ـ موعد لتسليم صورة من نسخته لا يتجاوز أربعاً وعشرين ساعة في الأحكام العاجلة، وخمسة عشر يوماً في الأحكام الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يجب أن يبين في نسخة الحكم المحكمة التي أصدرته، ومكانها، وتاريخ إصداره، وما إذا كان صادراً في دعوى إدارية أو تأديبية، والدائرة وقضاتها، واسم ممثل الادعاء وطلباته، وأسماء أطراف الدعوى وصفاتهم، وموطن كلٍ منهم وحضورهم أو غيابهم، وأسماء ممثليهم. ويجب أيضاً أن تشمل نسخة الحكم عرضاً مجملاً لوقائع الدعوى، ثم طلبات أطراف الدعوى وملخصاً وافياً لدفوعهم ودفاعهم الجوهري، ثم أسباب الحكم ومنطوقه. ويجب كذلك أن تشمل نسخة الحكم الصادر بالتفسير بيانات الحكم المُفسَّر.ويوقع قضاة الدائرة وأمين سرها نسخة الحكم الأصلية، وتودع في ملف الدعوى قبل الموعد المحدد لتسليم صورتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يوقع الموظف المختص في المحكمة صورة من نسخة الحكم غير التنفيذية، وتختم بختمها، وتسلم لمن يطلبها من ذوي الشأن، ويجوز تسليمها لغيرهم بإذن من رئيس المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تذيَّل صورة نسخة الحكم التي يكون التنفيذ بموجبها بالصيغة التنفيذية، ويوقعها الموظف المختص في المحكمة، وتختم بختمها، ولا تسلم إلا إلى طرف الدعوى الذي تعود إليه منفعة من تنفيذ الحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: '1- الصيغة التنفيذية للأحكام الصادرة ضد جهة الإدارة، وللأحكام الصادرة في الدعاوى التأديبية هي: (على الوزراء ورؤساء الأجهزة الحكومية المستقلة تنفيذ هذا الحكم وإجراء مقتضاه).2- الأحكام الصادرة بفصل موظفي المرتبة (الرابعة عشرة) فما فوقها أو ما يعادلها تنفذ بعد تصديق الملك عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: 1- إذا امتنعت الإدارة المختصة في المحكمة عن تسليم الصورة التنفيذية الأولى لنسخة الحكم، جاز لطالبها الاعتراض على ذلك بعريضة تقدم إلى رئيس المحكمة ليفصل فيه.2- لا تسلم صورة تنفيذية ثانية لنسخة الحكم لمن سبق أن تسلمها إلا في حالة فقد الصورة التنفيذية الأولى، ولطالبها أن يعترض على عدم التسليم وفقاً لما ورد في الفقرة (1) من هذه المادة. ويجب في هذه الحالة إبلاغ المحكوم عليه بالعريضة المقدمة في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: الأحكام الصادرة بالإلغاء حجة على الكافة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 1- مع مراعاة ما ورد في الفقرة (2) من هذه المادة ، تكون المهلة المحددة للاعتراض على الأحكام ثلاثين يوماً من تاريخ تسلم صورة نسخة الحكم، أو من التاريخ المحدد للتسلُّم في حال عدم الحضور. وإذا لم يقدم الاعتراض خلال هذه المهلة من أطراف الدعوى؛ يصبح الحكم نهائياً واجب النفاذ.2- تكون الأحكام الصادرة في الدعاوى المنصوص عليها في الفقرتين (ج)، (د) من المادة (الثالثة عشرة) من نظام ديوان المظالم على خلاف ما طلبته الجهة الإدارية أو في غير مصلحتها ؛ واجبة التدقيق إذا لم يستأنف ممثل تلك الجهة الحكم خلال المدة المقررة، وعلى المحكمة - بعد النطق بالحكم - إبلاغ ممثل الجهة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: إذا كان الاعتراض قد رفعه المحكوم عليه وحده، فلا يضار باعتراضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: فيما لم يرد فيه نص خاص، تسري على الاعتراض أمام محاكم الاستئناف الإدارية والمحكمة الإدارية العليا الإجراءات المقررة أمام المحاكم الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يرفع الاستئناف بصحيفة يودعها المستأنِف أو مَنْ يمثله، لدى المحكمة الإدارية التي أصدرت الحكم ، وفقاً للإجراءات المقررة لرفع الدعوى. على أن تتضمن الصحيفة بيانات الحكم المستأنَف، وملخصاً عنه، وأسباب الاستئناف وطلبات المستأنِف.وعلى الإدارة المختصة في هذه المحكمة إرسال صحيفة الاستئناف - مرافقاً لها ملف الدعوى - إلى محكمة الاستئناف الإدارية المختصة خلال مدة لا تتجاوز ثلاثة أيام عمل من تاريخ استيفاء إجراءات طلب الاستئناف. وعلى الإدارة المختصة في محكمة الاستئناف أن تقيد الاستئناف في يوم وصوله إليها، ويبلغ المستأنف ضده بصحيفة الاستئناف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: الاستئناف ينقل الدعوى بحالتها التي كانت عليها قبل صدور الحكم المستأنف بالنسبة إلى ما رُفع عنه الاستئناف فقط. ويجب على المحكمة أن تنظر الاستئناف على أساس ما يقدم إليها من أدلة ودفوع وأوجه دفاع جديدة، وما كان قد قدم من ذلك إلى المحكمة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: 1- مع مراعاة ما نصت عليه المادة (السابعة والثلاثون) من هذا النظام، استئناف الحكم المنهي للخصومة يقتضي حتماً استئناف جميع الأحكام التي سبق صدورها في الدعوى. 2- استئناف الحكم الصادر في الطلب الاحتياطي يقتضي حتماً استئناف الحكم الصادر في الطلب الأصلي. وفي هذه الحالة يجب اختصام المحكوم لـه في الطلب الأصلي ولو بعد فوات الموعد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يجب على محكمة الاستئناف الإدارية - في حال إلغاء الحكم في الطلب الأصلي - أن تعيد القضية إلى المحكمة الإدارية لتفصل في الطلبات الاحتياطية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: لا تقبل الطلبات الجديدة في الاستئناف، وتحكم محكمة الاستئناف الإدارية من تلقاء نفسها بعدم قبولـها. ومع ذلك يجوز أن يضاف إلى الطلب الأصلي ما يزيد من التعويضات التي تُستحق بعد تقديم الطلبات الختامية أمام المحكمة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: لا يجوز في الاستئناف إدخال مَنْ لم يكن طرفاً في الدعوى الصادر فيها الحكم المستأنف، ما لم يكن الإدخال لإظهار الحقيقة. ولا يجوز التدخل فيه إلا ممن يطلب الانضمام إلى أحد الخصوم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يجوز للمستأنف ضده - إلى ما قبل إقفال المرافعة - أن يرفع استئنافاً فرعياً يتبع الاستئناف الأصلي، ويزول بزواله، وذلك بالإجراءات المعتادة أو بمذكرة مشتملة على أسباب استئنافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يجوز طلب إعادة النظر في الأحكام النهائية الصادرة من المحاكم الإدارية ومحاكم الاستئناف الإدارية في الأحوال المنصوص عليها في نظام المرافعات الشرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يرفع طلب إعادة النظر بصحيفة يودعها طالب إعادة النظر أو مَنْ يمثله لدى المحكمة التي أصدرت الحكم، وفقاً للإجراءات المقررة لرفع الدعوى. على أن تتضمن الصحيفة بيانات الحكم المطلوب إعادة النظر فيه، وملخصاً عنه، وأسباب الطلب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يرفع الاعتراض أمام المحكمة الإدارية العليا بصحيفة يودعها المعترض أو مَنْ يمثله لدى محكمة الاستئناف الإدارية التي أصدرت الحكم، وفقاً للإجراءات المقررة لرفع الدعوى. على أن تتضمن الصحيفة بيانات الحكم المعترض عليه، وملخصاً عنه، والأسباب التي بني عليها الاعتراض، وطلبات المعترض. ولا يجوز التمسك بسبب من أسباب الاعتراض غير التي ذكرت في الصحيفة، ومع ذلك فالأسباب المبنية على النظام العام يمكن التمسك بها في أي وقت، وتأخذ المحكمة بها من تلقاء نفسها.وإن أبدى المعترض سبباً للاعتراض يتعلق بحكم سابق لصدور الحكم المعترض عليه في الدعوى نفسها، عُدَّ الاعتراض شاملاً للحكم السابق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: 'يجب أن يرافق صحيفة الاعتراض الآتي: 1 - صورة من الوثيقة التي تثبت صفة ممثل المعترض.2 - صور من صحيفة الاعتراض بعدد المعترض ضدهم. 3 - الصورة المسلمة إليه من الحكم المعترض عليه، والصورة المسلمة إليه من حكم المحكمة الإدارية إذا كان الحكم المعترض عليه قد أحال إليه في أسبابه. 4 - المستندات التي تؤيد الاعتراض، فإذا كانت مقدمة في اعتراض آخر، فيقدم ما يدل على ذلك، وللمحكمة أن تتخذ ما تراه في سبيل الاطلاع على هذه المستندات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: يجب على الإدارة المختصة في محكمة الاستئناف الإدارية أن ترسل ملف الاعتراض إلى المحكمة الإدارية العليا في اليوم التالي على الأكثر من تاريخ استيفاء إجراءات طلب الاعتراض. وللمحكمة الإدارية العليا أن تأمر بضم ملف الدعوى التي صدر فيها الحكم المعترض عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: تقيد الإدارة المختصة في المحكمة الإدارية العليا الاعتراض يوم وصوله إليها، ويبلغ المعترض ضده بصحيفة الاعتراض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: لا يترتب على الاعتراض أمام المحكمة الإدارية العليا وقف تنفيذ الحكم. على أنه يجوز للمحكمة أن تأمر بوقف تنفيذه إذا طلب ذلك في صحيفة الاعتراض، وقدرت أن تنفيذه يرتب آثاراً يتعذر تداركها. وتحدد المحكمة جلسة لنظر هذا الطلب يبلغ بها أطراف الاعتراض. وعلى المحكمة إذا أمرت بوقف التنفيذ أن تراعي ذلك عند تحديد جلسة نظر الاعتراض ؛ أما إذا كان حكم الاستئناف يقضي بفصل موظف فإن الاعتراض عليه أمام المحكمة العليا يكون موقفاً لتنفيذه حتى يفصل في أصل الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: 1- إذا بدا للمعترض ضده أن يقدم دفاعاً ، فعليه أن يودع لدى الإدارة المختصة في المحكمة - خلال ثلاثين يوماً من تاريخ تبليغه بصحيفة الاعتراض - مذكرة بدفاعه مرافقاً لها المستندات التي يرى تقديمها. 2- إذا قدم المعتَرَض ضده مذكرة بدفاعه على النحو الوارد في الفقرة (1) من هذه المادة، كان للمعتَرِض - خلال ثلاثين يوماً من انقضاء المهلة المذكورة - أن يودع لدى الإدارة المختصة مذكرة برده مرافقاً لها المستندات التي يرى تقديمها. وفي حال تعدد المعتَرَض ضدهم يكون لكل منهم - خلال المهلة المذكورة في هذه الفقرة- أن يودع مذكرة بالرد على المذكرة التي قدمها المعتَرِضُ ضدهم. 3- إذا استعمل المعترض حقه في الرد، كان للمعترض ضده أن يودع - خلال ثلاثين يوماً أخرى - مذكرة بملحوظاته على الرد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يجوز للمعترض ضده قبل انقضاء الموعد المنصوص عليه في الفقرة (1) من المادة (الخمسين) من هذا النظام أن يطلب إدخال أي طرف في الدعوى التي صدر فيها الحكم المعترض عليه لم يوجه إليه الاعتراض، ويكون إدخاله بتبليغه بصحيفة الاعتراض، ولمن أدخل أن يودع لدى الإدارة المختصة في المحكمة - خلال ثلاثين يوماً من تاريخ تبليغه - مذكرة بدفاعه مرافقاً لها المستندات التي يرى تقديمها. وفى هذه الحالة لا تسري مواعيد الرد المنصوص عليها في الفقرتين (2) و (3) من المادة (الخمسين) من هذا النظام، إلا بعد انقضاء الثلاثين يوماً المذكورة في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: يجوز لكل طرف في الدعوى التي صدر فيها الحكم المعترض عليه ـ إذا لم يبلغ بصحيفة الاعتراض - أن يتدخل في الاعتراض ليطلب الحكم برفضه. ويكون تدخله بإيداع مذكرة بدفاعه لدى الإدارة المختصة في المحكمة قبل انقضاء المهلة المحددة في الفقرة (1) من المادة (الخمسين) من هذا النظام، مشفوعة بالمستندات التي تؤيده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: لا يجوز قبول أي مذكرة أو أي ورقة بعد انقضاء المواعيد المحددة لتقديمها ، وعلى الإدارة المختصة في المحكمة أن تحرر محضراً تثبت فيه تاريخ تقديمها، واسم من قدمها وصفته، وتضعها في ملف الاعتراض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: بعد انقضاء المواعيد المنصوص عليها في المواد السابقة من هذا الفصل ، ترسل الإدارة ملف الاعتراض إلى الدائرة المختصة، ويتولى أحد قضاة الدائرة دراسة الاعتراض وإعداد تقرير يتضمن ملخصاً لأسباب الاعتراض والرد عليها، وحصراً لمواضع الخلاف بين الأطراف دون إبداء الرأي فيها ويعرضه على الدائرة، فإن رأت أن الاعتراض غير جائز أو غير مقبول لفوات موعد الاعتراض، أو لإقامته على غير الأسباب المبينة في المادة (الحادية عشرة) من نظام ديوان المظالم، أو على أسباب تخالف ما استقر عليه قضاء المحكمة الإدارية العليا، أمرت بعدم قبوله بقرار يثبت في محضر الجلسة، مع إشارة موجزة إلى سبب القرار. وإذا رأت الدائرة أن الاعتراض جدير بالنظر حددت جلسة لنظره. ويجوز لها في هذه الحالة أن تستبعد من الاعتراض ما لا يقبل من الأسباب أمام المحكمة الإدارية العليا، وأن تقصر نظرها على باقي الأسباب، مع إشارة موجزة إلى سبب الاستبعاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: يبلغ أطراف الاعتراض الذين أودعوا مذكراتهم بتاريخ الجلسة المحددة لنظر الاعتراض قبل انعقادها بخمسة عشر يوماً على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: تفصل المحكمة في الاعتراض بغير مرافعة، بعد أن يتلو القاضي الذي تولى دراسة الاعتراض التقرير الذي أعده وفقاً للمادة (الرابعة والخمسين) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: 1- إذا رأت الدائرة المختصة ضرورة المرافعة الشفهية، فلها أن تسمع أقوال أطراف الاعتراض، ولا يجوز إبداء أسباب شفهية في الجلسة غير الأسباب التي سبق للأطراف بيانها في الأوراق، ما لم تكن متعلقة بالنظام العام. 2- يجوز للدائرة - استثناءً - أن تأذن لأطراف الاعتراض بإيداع مذكرات تكميلية إذا رأت بعد اطلاعها على الدعوى أن الفصل فيها يتطلب ذلك، وحينئذ يؤجل نظر الاعتراض إلى جلسة أخرى، وتحدد الدائرة المواعيد التي يجب إيداع تلك المذكرات فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: إذا نقضت المحكمة الإدارية العليا الحكم المعترض عليه لمخالفة قواعد الاختصاص، فعليها الفصل في مسألة الاختصاص. وعند الاقتضاء تحيل الدعوى إلى المحكمة المختصة.وإذا نقضت الحكم لغير ذلك، فتحيل القضية إلى المحكمة التي أصدرت الحكم المعترض عليه لتفصل فيها من جديد من غير مَنْ نظرها. وفي هذه الحالة يجب على المحكمة التي أحيلت إليها القضية أن تتبع حكم المحكمة الإدارية العليا في المبدأ الذي فصلت فيه.ومع ذلك إذا قررت المحكمة نقض الحكم المعترض عليه للمرة الثانية وكان الموضوع صالحاً للفصل فيه، وجب عليها أن تحكم في الموضوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: لا يجوز الاعتراض على أحكام المحكمة الإدارية العليا، ما لم يكن الاعتراض بطلب إعادة النظر ممَّنْ يعد الحكم حجة عليه ولم يكن قد أُدخل في الدعوى أو تدخل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: تطبق على الدعاوى المرفوعة أمام محاكم ديوان المظالم أحكام نظام المرافعات الشرعية، فيما لم يرد فيه حكم في هذا النظام، وبما لا يتعارض مع طبيعة المنازعة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: يصدر مجلس القضاء الإداري اللائحة اللازمة لتنفيذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: يلغي هذا النظام قواعد المرافعات والإجراءات أمام ديوان المظالم، الصادرة بقرار مجلس الوزراء رقم (190) وتاريخ 16 /11 / 1409هـ، وكل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: يعمل بهذا النظام من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f2f7b465-b576-4f47-a8e7-a9a700f27202/1
