articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والألفاظ الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: التنظيم: تنظيم الهيئة السعودية للبحر الأحمر. الوزير: وزير السياحة. الهيئة: الهيئة السعودية للبحر الأحمر. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الواسطة البحرية: كل واسطة عائمة معدة للعمل فوق المسطحات المائية أو تحتها تستخدم لأغراض سياحية أو ترفيهية. وتعد ملحقات الواسطة البحرية اللازمة لاستغلالها جزءًا منها. الأنشطة الملاحية: الأنشطة البحرية الملاحية للواسطة البحرية التي تستخدم لأغراض سياحية وترفيهية أو تمارس عليها تلك الأنشطة في النطاق الجغرافي. الأنشطة البحرية: الأنشطة السياحية والترفيهية البحرية والأنشطة التي تمارس بشكل غير تنافسي في النطاق الجغرافي. الوكيل الملاحي السياحي: الشخص ذو الصفة الاعتبارية المرخص له من الهيئة بتقديم الخدمات للواسطة البحرية لممارسة الأنشطة الملاحية في النطاق الجغرافي. المرسى البحري السياحي: المنطقة المستخدمة لتوقف أو رسو الواسطة البحرية في النطاق الجغرافي. النطاق الجغرافي: البحر الإقليمي التابع للمملكة في البحر الأحمر
    الذي تمارس فيه الأنشطة الملاحية والأنشطة البحرية، والجزء من اليابسة المرتبط بممارسة تلك الأنشطة؛ عدا المناطق العسكرية والأمنية وغيرها فيهما، وفقًا لخريطة تعدها الهيئة -بالتنسيق مع الجهات ذات العلاقة- تمهيدًا لعرضها على مجلس الشؤون الاقتصادية والتنمية؛ للموافقة عليها، ومن ثم عرضها على رئيس مجلس الوزراء؛ لاعتمادها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية وبالاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض. ولها إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى تنظيم الأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي، بما لا يخل باختصاصات الجهات الأخرى، وذلك بما يضمن تحقيق الاستخدام الأمثل والمستدام لها، ويسهم في رفع كفايتها. وللهيئة القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: وضع السياسات والاستراتيجيات والخطط والبرامج والمبادرات اللازمة لتنظيم الأنشطة البحرية، والأنشطة الملاحية والمراسي البحرية السياحية في النطاق الجغرافي، والإشراف عليها، والعمل على تنميتها واستدامتها، والرفع عما يتطلب استكمال إجراءات في شأنه. إصدار التراخيص والتصاريح اللازمة لتنظيم الأنشطة الملاحية والأنشطة البحرية والأعمال المتعلقة بهما في النطاق الجغرافي، وفق متطلبات واشتراطات يضعها المجلس. مراجعة اختصاصات ومهمات الجهات التي تمارس أعمالاً ضمن النطاق الجغرافي، واقتراح ما ترى تعديله منها، وذلك بالتنسيق مع تلك الجهات. متابعة متطلبات واشتراطات وإجراءات الجهات ذات العلاقة المتصلة بتنظيم ممارسة الأنشطة الملاحية والأنشطة البحرية، واقتراح ما تراه في شأنها. اقتراح ما تراه حيال الاختصاصات والمهمات غير المنظمة من الجهات ضمن النطاق
    الجغرافي -إن وجدت- دون إخلال بالجوانب المتصلة بالبيئة والموارد الطبيعية ومتطلبات الأمن والسلامة البحرية، والرفع عما يلزم. تحديد المواقع والمسارات الملاحية لممارسة الأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي، وتطويرها، وتحديثها، وذلك بالتنسيق مع الجهات ذات العلاقة. تحديد الاحتياجات الحالية والمستقبلية اللازمة لتهيئة البنى التحتية للأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي، والتنسيق مع الجهات ذات العلاقة للعمل على اتخاذ ما يلزم في شأنها. وضع الضوابط والقواعد والمعايير الخاصة المتعلقة بتقديم الخدمات في الأنشطة البحرية والأنشطة الملاحية، بالتنسيق مع الجهات ذات العلاقة، والإشراف على تطبيقها. وضع الضوابط والقواعد والمعايير الخاصة للمراسي البحرية السياحية بما يشمل تطويرها وإدارتها وتشغيلها، والإشراف عليها. وضع آلية -بالتنسيق مع الجهات المعنية- تضمن التحقق من حماية البيئة البحرية في المواقع التي تمارس فيها الأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي، على أن تتضمن هذه الآلية تحديد دور الهيئة في متابعة تنفيذها، وما يلزم اتخاذه بشكل عاجل في حال الإخلال بها. اتخاذ ما
    يلزم لتشجيع وجذب الاستثمار في الأنشطة الملاحية والأنشطة البحرية، بالتنسيق مع الجهات المعنية. تقديم المساندة الإدارية والفنية والاستشارية للمستثمرين في الأنشطة الملاحية والأنشطة البحرية بما في ذلك المنشآت الصغيرة والمتوسطة، بالتنسيق مع الجهات المعنية. إنشاء قواعد للبيانات وللمعلومات ذات العلاقة بمهام واختصاصات الهيئة. الاستفادة من الممارسات الدولية في مجالها، من أجل تطوير الأنشطة الملاحية والأنشطة البحرية، واتخاذ ما يلزم حيال ذلك. التعاون وتبادل الخبرات مع الهيئات والمنظمات الإقليمية والدولية، وذلك في حدود اختصاصات الهيئة، وفق الإجراءات النظامية المتبعة. تشجيع ممارسة الأنشطة الملاحية والأنشطة البحرية، واتخاذ ما يلزم لتمكين الراغبين في ممارستها. العمل على تسويق الأنشطة الملاحية والأنشطة البحرية؛ لجذب الممارسين المستهدفين إلى تلك الأنشطة. عقد وتنظيم الملتقيات والمؤتمرات والمنتديات والمعارض ذات العلاقة باختصاص الهيئة داخل المملكة وخارجها والمشاركة فيها، وفقًا للأحكام النظامية ذات الصلة. إقامة الدورات التدريبية في المجالات ذات العلاقة باختصاصاتها، والتشجيع على ذلك. وضع برامج تدريبية مهنية،
    وجهات مانحة للشهادات مختصة بالتدريب في المجالات ذات العلاقة باختصاصاتها، وفق الإجراءات النظامية. إسناد بعض مهماتها إلى جهات حكومية، وذلك بالاتفاق مع الجهة المسند إليها، أو إلى القطاع الخاص أو إلى القطاع غير الربحي وفق ضوابط يعتمدها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: وزير الرياضة. وزير الثقافة. وكيل وزارة الداخلية. ممثل من وزارة الداخلية (المديرية العامة لحرس الحدود). ممثل من وزارة البيئة والمياه والزراعة. ممثل من وزارة الشؤون البلدية والقروية والإسكان. ممثل من وزارة السياحة. ممثل من الهيئة العامة للموانئ. ممثل من الهيئة العامة للنقل. ممثل من الهيئة السعودية للسياحة. ممثل من صندوق الاستثمارات العامة. أمين محافظة جدة. الرئيس التنفيذي لشركة نيوم. الرئيس التنفيذي لشركة البحر الأحمر الدولية. رئيس رابطة الرياضات المائية. مختصين وخبراء لا يقل عددهم عن (ثلاثة) ولا يزيد على (خمسة) في المجالات ذات العلاقة بعمل الهيئة، يرشحهم الوزير، ويصدر بتسميتهم أمر من رئيس مجلس الوزراء، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد مرة واحدة. ويجب ألا تقل مرتبة ممثلي الجهات الحكومية عن (الخامسة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنه التنظيم، وله على وجه خاص ما يلي: اعتماد السياسات والاستراتيجيات والخطط والبرامج والمبادرات اللازمة للأنشطة الملاحية والأنشطة البحرية وما تتضمنه من مهمات للهيئة وفق اختصاصاتها، مع مراعاة اختصاصات الجهات ذات العلاقة. اعتماد المتطلبات والاشتراطات المتعلقة بالتراخيص والتصاريح التي تصدرها الهيئة. اعتماد المواقع والمسارات والخرائط الملاحية اللازمة لممارسة الأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي، مع مراعاة اختصاصات الجهات الأخرى. اعتماد الضوابط والقواعد والمعايير الخاصة للمرخص لهم وللوكلاء الملاحيين السياحيين. اعتماد الضوابط والقواعد والمعايير الخاصة للمراسي البحرية السياحية بما يشمل تطويرها وإدارتها وتشغيلها والإشراف عليها. اقتراح مشروعات الأنظمة ذات العلاقة بأهداف الهيئة واختصاصاتها، واقتراح تعديل المعمول به منها؛ تمهيدًا لرفعها لاستكمال الإجراءات النظامية في شأنها. اعتماد ضوابط إسناد بعض مهمات الهيئة إلى جهات حكومية أو القطاع الخاص أو القطاع غير الربحي،
    مع مراعاة أن يكون إسناد أي مهمة إلى جهة حكومية أخرى بموافقة تلك الجهة. اعتماد آلية التحقق من حماية البيئة البحرية في المواقع التي تمارس فيها الأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي. اعتماد خطط تأهيل وتدريب الكفاءات الوطنية في التخصصات ذات العلاقة بمهمات الهيئة واختصاصاتها. إقرار اللوائح المالية والإدارية التي تسير عليها الهيئة وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار الهيكل التنظيمي للهيئة. إقرار الخطط التشغيلية السنوية. تحديد المقابل المالي لما تقدمه الهيئة من خدمات وأعمال ذات صلة بأهدافها واختصاصاتها. تعيين مراجع حسابات خارجي (أو أكثر) ومراقب مالي داخلي. الموافقة على مشروع ميزانية الهيئة السنوية، وحسابها الختامي، وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيدًا لرفعها وفق الإجراءات النظامية المتبعة. النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة. الموافقة
    على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. الموافقة على قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقًا للأحكام المنظمة لذلك. الموافقة على فتح فروع أو مكاتب للهيئة داخل المملكة. الموافقة على إنشاء مكاتب موحدة تقدم فيها الخدمات من جميع الجهات ذات العلاقة. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ولها الاستعانة بمن تراه لتأدية بعض المهمات الموكولة إليها. وللمجلس تفويض بعض اختصاصاته إلى الرئيس أو إلى من يراه من أعضائه أو من منسوبي الهيئة، وفقًا لما يقتضيه سير العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة برئاسة الرئيس أو من ينيبه من أعضاء المجلس المنصوص عليهم في الفقرات من (1) إلى (12) من المادة (الرابعة). ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يجتمع المجلس -بناء على دعوة من الرئيس- مرة كل (ثلاثة) أشهر، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وعلى الرئيس دعوة المجلس إلى الاجتماع إذا طلب ذلك (ثلث) الأعضاء على الأقل. ويجب أن توجه الدعوة -كتابة- قبل الاجتماع بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول أعمال الاجتماع. لا يعد اجتماع المجلس صحيحًا إلا بحضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه من الأعضاء. تصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين، وفي حال تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز أن تعقد اجتماعات المجلس عن بُعد، من خلال استخدام الوسائل التقنية. ويمكن أن تُتخذ القرارات عن طريق التمرير على الأعضاء، ويوقعون عليها بما يفيد باطلاعهم عليها. ولا تعد القرارات المتخذة بهذه الطريقة صحيحة ما لم يصوت عليها جميع الأعضاء، وتحُزْ على موافقة ثلثي الأعضاء على الأقل. وتعرض القرارات
    المتخذة بهذه الطريقة على المجلس في أول اجتماع -لاحق- لإثباتها في محضر الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. وللعضو المعترض أن يثبت اعتراضه مسببًا في المحضر. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. يجوز للمجلس أن يدعو من يراه من المختصين والمستشارين -سواء من داخل المملكة أو خارجها- لحضور اجتماعاته والاستعانة بهم، دون أن يكون لهم حق التصويت. يكون للمجلس أمين من منسوبي الهيئة يعين بقرار من المجلس بناءً على ترشيح الرئيس التنفيذي للهيئة، يتولى الإعداد لاجتماعات المجلس وإبلاغ أعضائه بمواعيدها وإعداد محاضره ومشاريع قراراته، وما يكلفه به المجلس أو الرئيس من مهمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي -يرشحه الرئيس- يُعيَّن ويعفى بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود التنظيم وما يقره المجلس، ويتولى الاختصاصات الآتية: اقتراح السياسات والاستراتيجيات والخطط والبرامج والمبادرات اللازمة للأنشطة الملاحية والأنشطة البحرية وما تتضمنه من مهمات للهيئة وفق اختصاصاتها. اقتراح المواقع والمسارات للأنشطة البحرية والأنشطة الملاحية والخرائط التفاعلية اللازمة وتطويرها، تمهيدًا لرفعها إلى المجلس. اقتراح الاحتياجات الحالية والمستقبلية اللازمة لتهيئة البنى التحتية للأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي، والتنسيق مع الجهات ذات العلاقة للعمل على اتخاذ ما يلزم في شأنها. اقتراح الضوابط والقواعد والمعايير الخاصة المتعلقة بتقديم الخدمات في الأنشطة البحرية والأنشطة الملاحية والإشراف على تطبيقها، تمهيدًا لرفعها إلى المجلس. اقتراح الضوابط والقواعد والمعايير الخاصة للمراسي البحرية السياحية بما يشمل تطويرها وإدارتها وتشغيلها، تمهيدًا لرفعها إلى المجلس. اقتراح ضوابط إسناد بعض مهمات
    الهيئة إلى القطاع الحكومي أو إلى القطاع الخاص أو إلى القطاع غير الربحي، تمهيدًا لرفعها إلى المجلس. اقتراح آلية التحقق من حماية البيئة البحرية في المواقع التي تمارس فيها الأنشطة الملاحية والأنشطة البحرية في النطاق الجغرافي، تمهيدًا لرفعها إلى المجلس. اقتراح خطط تأهيل وتدريب الكفاءات الوطنية في التخصصات ذات العلاقة بمهمات الهيئة واختصاصاتها، تمهيدًا لرفعها إلى المجلس. الإشراف على سير العمل في الهيئة، وفقًا للأنظمة واللوائح والخطط والبرامج المعتمدة. الإشراف على إعداد اللوائح المالية والإدارية واللوائح الداخلية لتسيير شؤون الهيئة؛ تمهيدًا لرفعها إلى المجلس. اقتراح هيكل الهيئة التنظيمي، تمهيدًا لرفعه إلى المجلس. الإشراف على إعداد تقرير الهيئة السنوي ومشروع ميزانيتها وحسابها الختامي؛ تمهيدًا لرفعها إلى المجلس. إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، وعرضها على المجلس. التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، ووفقًا للإجراءات النظامية المتبعة. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. الصرف من ميزانية
    الهيئة، واتخاذ جميع الإجراءات المالية، وفقًا للأنظمة واللوائح المقرة من المجلس، وفي حدود الصلاحيات التي فوضه بها المجلس اقتراح فتح فروع أو مكاتب للهيئة داخل المملكة، تمهيدًا لرفعه إلى المجلس. التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفقًا للأنظمة والصلاحيات التي فوضه بها المجلس. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناءً عليه، بحسب الصلاحيات المخولة له. تعيين منسوبي الهيئة وفقًا للوائح المنظمة لذلك، والإشراف على أداء أعمالهم. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصات الهيئة. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تنشئ الهيئة منصة إلكترونية تُربط بها الجهات الممثلة في عضوية المجلس، ومن تراه الهيئة من الجهات ذات العلاقة؛ للتنسيق بينها لغرض تسهيل الخدمات المقدمة من الهيئة. للهيئة -بحسب الاحتياج- إنشاء مكاتب موحدة تقدم فيها الخدمات من جميع الجهات ذات العلاقة، وذلك بالتوافق مع تلك الجهات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد الهيئة مما يلي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع الأوقاف. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حسابًا لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يسري على منسوبي الهيئة نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87a6bf6e-e4e2-468d-bd9e-b0b400a55bbb/1
