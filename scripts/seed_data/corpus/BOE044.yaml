regulation:
  code: BOE044
  name_ar: نظام الطوارئ
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام أو في الأوامر الصادرة بموجبه - المعاني الموضحة أمام كلٍ منها، ما لم يقتض السياق غير ذلك: النظام: نظام الطوارئ. المجلس: المجلس الأعلى للطوارئ. الجهات العامة: الوزارات والهيئات والمصالح والمؤسسات العامة وما في حكمها، ويشمل ذلك الجهات التابعة للسلطتين التنظيمية والقضائية. الحدث الطارئ: الحدث المبين في المادة (الثانية) من النظام. حالة الطوارئ: الحالة النظامية التي يعلن عنها الملك - وفقًا لأحكام النظام - للاستجابة للحدث الطارئ، وتستلزم اتخاذ إجراءات استثنائية مؤقتة لمواجهته. أوامر الطوارئ: الأوامر الصادرة بناءً على المادة (الثانية عشرة) من النظام. البنى الحساسة: الأصول والمنشآت والمرافق العامة والخاصة والنظم والشبكات، بما في ذلك المباني والطرق ووسائل المواصلات ومرافق الماء والغاز والنفط والكهرباء والاتصالات والبنى التحتية الأخرى، التي يؤدي تعطلها أو توقفها أو تدمرها أو إتلافها أو إعاقة الوصول إليها إلى وقوع الحدث الطارئ أو التهديد الوشيك بوقوعه أو إعلان حالة الطوارئ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'لأغراض النظام، يُقصد بالحدث الطارئ أي حدث أو حوادث تؤدي إلى الإضرار بالأفراد أو البنى الحساسة أو البيئة أو الصحة أو السلامة العامة أو الأمن أو النظام العام أو استقرار المملكة وسيادتها أو استمرارية الأعمال أو الاقتصاد أو موارد المملكة بصورةٍ جوهرية، أو التهديد الوشيك بأيٍ منها، ويشمل ذلك: الكوارث والبراكين والزلازل والفيضانات والحرائق والحوادث النووية والكيميائية والبيولوجية والحروب العسكرية والإلكترونية والسيبرانية والكيميائية والبيولوجية والعمليات الإرهابية والعدوان والعصيان المسلح والاضطرابات والشغب والأوبئة والجوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف النظام إلى تحديد الأحكام والقواعد والإجراءات الخاصة بحالة الطوارئ، وبيان السلطات والأحكام الاستثنائية التي تضمن الاستجابة للحدث الطارئ بشكل فعّال أثناء سريان حالة الطوارئ، بما يعزّز من القدرة على الدفاع عن المملكة، والحفاظ على النظام العام والأمن والصحة والبيئة والسلامة العامة فيها، وحماية البنى الحساسة، وتمكين استمرارية الأعمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يُنشأ المجلس بموجب النظام، ويُشكّل برئاسة الملك، ويكون ولي العهد نائبًا لرئيس المجلس، وعضوية الآتي: أ- أعضاء مجلس الشؤون السياسية والأمنية. ب- محافظ الهيئة الوطنية لإدارة الطوارئ. ج- من يرى الملك تعيينه في المجلس بأمر ملكي. تكون للمجلس غرفة باسم (غرفة الأزمة) برئاسة مستشار الأمن الوطني، وبعضوية ممثلين رفيعي المستوى من الجهات الممثلة في المجلس، وفي مجلس إدارة الهيئة الوطنية لإدارة الطوارئ. ولرئيس الغرفة - عند الحاجة - دعوة من يراه من رؤساء الجهات العامة أو المسؤولين أو ذوي الخبرة والدراية؛ وذلك بحسب مقتضيات وطبيعة حالة الطوارئ. يكون للمجلس أمين يعين بأمر ملكي. يجتمع المجلس مرة واحدة في السنة على الأقل، وكلما دعت الحاجة إلى ذلك. لرئيس المجلس أن يدعو لحضور اجتماعات المجلس من يرى الاستعانة بهم دون أن يكون لهم حق التصويت. أ- يكون للمجلس لجنة تنفيذية يصدر بتشكيلها وتحديد مهماتها قرار من رئيس المجلس. ب- للمجلس تشكيل لجان دائمة أو مؤقتة للقيام بما يكلفها به من مهمات. يُعد مجلس الشؤون السياسية والأمنية قواعد وآليات وإجراءات عمل المجلس، وتُعتمد بأمرٍ ملكي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يُمارس المجلس الاختصاصات الآتية: أ- التوصية بإعلان حالة الطوارئ، مع بيان أسباب الإعلان عنها، ومدة العمل بها، والنطاق الجغرافي الخاضع لها. ب- التوصية بشأن السياسات المتعلقة بحفظ النظام العام والأمن والصحة والبيئة والسلامة العامة والدفاع عن المملكة وحماية مقدراتها ومكتسباتها وتمكين استمرارية الأعمال خلال سريان حالة الطوارئ، وتوجيه الجهات العامة المعنية بما يلزم حيال ذلك. ج- إبداء الرأي في شأن أي موضوع يحيله إليه رئيس المجلس أو نائبه. د- أي اختصاص آخر يحدده الأمر الملكي الصادر بإعلان حالة الطوارئ أو أي أمر ملكي لاحق له. تصبح قرارات المجلس نهائية بعد موافقة الملك عليها. تمارس غرفة الأزمة الاختصاصات الآتية: أ- طلب التقارير والبيانات والمعلومات من الهيئة الوطنية لإدارة الطوارئ والجهات العامة، والرفع بالتوصيات حيالها إلى المجلس. ب- متابعة حالة الطوارئ. ج- أي اختصاص آخر يُسند إليها بتوجيه من رئيس المجلس أو نائبه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: عند وقوع الحدث الطارئ ويرى الملك أنه يستوجب الإعلان عن حالة الطوارئ بسببه، يُعلن الملك حالة الطوارئ بموجب أمرٍ ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يُحدّد الأمر الملكي بإعلان حالة الطوارئ الآتي: الحدث الطارئ الذي أُعلنت حالة الطوارئ بسببه. تاريخ سريان العمل بحالة الطوارئ. وفي حال لم ينص الأمر الملكي على تاريخ السريان، يُعمل بحالة الطوارئ من تاريخ إعلانها. مدة العمل بحالة الطوارئ. وفي حال لم ينص الأمر الملكي على مدة العمل بها، فتنتهي بمضي (ستة أشهر)، ما لم يصدر أمر ملكي بإنهائها قبل ذلك أو بتمديدها. النطاق الجغرافي الخاضع لحالة الطوارئ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تستمر الجهات العامة - أثناء سريان حالة الطوارئ - بالقيام بواجباتها، بما فيها تلك المتعلقة بالحد من المخاطر والاستجابة للحدث الطارئ والتعافي منه؛ وفقًا للخطط المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: لا يُرتب مجرد إعلان حالة الطوارئ حقًّا لأي شخص طبيعي أو اعتباري تجاه المملكة أو الجهات العامة أو أي من منسوبيها، أو تجاه أي شخصٍ آخر، عدا ما ورد في النظام أو ما ينص عليه في إعلان حالة الطوارئ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'لا يخل انتهاء حالة الطوارئ بما يأتي: المراكز النظامية أو الالتزامات والحقوق المكتسبة التي نشأت أثناء سريان حالة الطوارئ. استكمال أي إجراء تم البدء فيه بموجب أحكام النظام أو بموجب أي من أوامر الطوارئ، وذلك ما لم ينص على غير ذلك في أمر الطوارئ ذي الصلة أو يصدر حكم نهائي من المحكمة المختصة بشأن ذلك الإجراء. أي حكم قضائي نهائي صادر تنفيذًا لأحكام النظام أو أوامر الطوارئ الصادرة بموجبه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تُعد الهيئة الوطنية لإدارة الطوارئ - بوصفها المرجع الرئيس فيما يتعلق بإدارة شؤون الطوارئ - الاستراتيجيات والسياسات والبرامج والمنهجيات والمعايير والضوابط والإرشادات ومؤشرات وأدوات قياس الأداء ذات الصلة بأعمال الهيئة. وللهيئة التنسيق مع الجهات المعنية لتحديد أدوارها ومسؤولياتها تجاه شؤون إدارة الطوارئ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تصدر - عند الاقتضاء - أوامر ملكية باسم (أوامر طوارئ) أثناء إعلان حالة الطوارئ، تتضمن ما يلزم من تدابير وإجراءات ضرورية مؤقتة لها قوة الأنظمة التي تصدر عن السلطة التنظيمية؛ للحد من المخاطر والاستجابة للحدث الطارئ والتعافي منه، وفقًا لما قضت به المادتان (الثانية والستون، والثانية والثمانون) من النظام الأساسي للحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يُنشر الأمر الملكي الصادر بإعلان حالة الطوارئ وأوامر الطوارئ من خلال أي من وسائل الإعلام الرسمية، بالإضافة إلى نشره في الجريدة الرسمية. ويجوز وفقًا لمقتضيات وطبيعة حالة الطوارئ النشر بأي وسيلة كانت. تُستثنى من النشر أوامر الطوارئ التي يُنص فيها على سريتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تكون أوامر الطوارئ نافذة من تاريخ صدورها؛ ما لم يُنص فيها على تاريخ آخر، وينتهي العمل بها في التواريخ المحددة فيها، أو بانتهاء أو إنهاء حالة الطوارئ وفقًا لأحكام النظام، أيهما أسبق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: على الجهات العامة والخاصة، وأي جهة أخرى يحددها المجلس، تزويد الهيئة الوطنية لإدارة الطوارئ بأي معلومات أو وثائق تطلبها لأغراض التخطيط أو الاستعداد للحدث الطارئ أو تحديد المخاطر المتعلقة به أو تقييم خطط الاستجابة له وخطط التعافي منه، وتطويرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تُصنّف المعلومات والوثائق المتحصل عليها بموجب أحكام النظام بأنها معلومات ووثائق سرية وفقًا لنظام عقوبات نشر الوثائق والمعلومات السرية وإفشائها؛ ما لم تكن تلك المعلومات والوثائق متاحة للعموم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يلتزم كل من يُعنى بتطبيق أحكام النظام بسرية المعلومات والوثائق التي اطّلع عليها، وألّا يكشف سريتها إلا لضرورة استخدامها للأغراض التي تحددها جهات الاختصاص، وألّا يفصح عن البيانات المتعلقة بها دون مسوّغ نظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تُحدَّد في أوامر الطوارئ الجهات العامة المكلَّفة بتنفيذ تلك الأوامر، ويُحدَّد فيها من لهم صفة الضبط الجنائي من منسوبي تلك الجهات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: على المكلّفين بتنفيذ أوامر الطوارئ اتخاذ كافة الإجراءات اللازمة للتأكد من سلامة الأفراد وأمنهم وسلامة ممتلكاتهم والتخفيف من الأثر السلبي الناشئ عن أي إجراءٍ يُتخذ بموجب أحكام النظام أو أوامر الطوارئ، والتعامل مع الأفراد بالعدل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يُعفى منسوبو الجهات العامة المكلفون بتنفيذ أوامر الطوارئ - ومن يستعينون بهم - من المسؤولية المدنية والجزائية عمّا يتخذونه من إجراءات أثناء مباشرتهم لمهماتهم بموجب أوامر الطوارئ؛ شريطة تقيدهم بأحكام النظام وأوامر الطوارئ والأحكام والإجراءات الواردة في الأنظمة واللوائح المعمول بها أثناء العمل بحالة الطوارئ، ولا يُخل ذلك بأحكام التعويض المنصوص عليها في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تصدر عند الاقتضاء قواعد أو ضوابط -بموجب أوامر طوارئ- تهدف لمعالجة أثر تعذر تنفيذ العقود والالتزامات الأخرى أثناء سريان حالة الطوارئ، أو للحد من الآثار السلبية الناشئة عنها أو عن تطبيق أحكام النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 'يستحق تعويضًا عادلًا كُلُّ من: كُلف بالقيام بأداء عمل محدد أو تقديم مال، أو وضعت اليد على ماله أو تم نزع ملكيته أو استعماله أو الانتفاع به أو التصرف به أو نقله أو إتلافه؛ بموجب أوامر الطوارئ. تضرر نتيجة أي إجراء اتُّخذ بصورة غير مشروعة بذريعة تطبيق أحكام أوامر الطوارئ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجوز - بموجب أمر طوارئ أو أمرٍ ملكي خاص بحسب الحال - تشكيل لجان تختص بتقدير التعويضات في الحالات الواردة في المادة (الثانية والعشرين) من النظام، لا يقل عدد أعضائها عن (ثلاثة) يكون من بينهم مستشار شرعي أو مستشار نظامي. ويحدد أمر التشكيل الارتباط التنظيمي لتلك اللجان وقواعد وإجراءات عملها وضوابط التقدير. تصدر قرارات اللجان، المشار إليها في الفقرة (1) من هذه المادة، خلال (ثلاثين) يوم عمل من تاريخ التقدم بطلب تقدير التعويض، وتكون قراراتها قابلة للاعتراض عليها أمام المحكمة الإدارية المختصة خلال (ستين) يومًا من تاريخ تبلّغ الشخص المعني بالقرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تتولى المحكمة الإدارية المختصة النظر في دعاوى إلغاء القرارات المتعلقة بتطبيق أحكام أوامر الطوارئ، بما فيها تلك المتعلقة بصحة التوقيف أو الحبس أو الإقامة الجبرية أو المصادرة أو وضع اليد على المال أو إيقاف النشاط أو جزء منه أو تقييده. ويجوز استئناف الأحكام الصادرة من المحكمة والاعتراض عليها بطريق النقض وفقًا للأحكام المنصوص عليها نظامًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: مع مراعاة استيفاء المتطلبات الإجرائية ذات الصلة بنظر الدعاوى المبينة في المادة (الرابعة والعشرين) من النظام، على المحكمة الإدارية المختصة الفصل في تلك الدعاوى خلال مدة لا تتجاوز (خمسة عشر) يومًا من تاريخ قيد الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: فيما عدا حالة التزوير، أو في حال كان ثمة عذر حال دون رفع الدعوى ويثبت لدى المحكمة الإدارية المختصة، لا تُسمع دعاوى إلغاء القرارات المتعلقة بتطبيق أحكام النظام أو أحكام أوامر الطوارئ بعد مضي (ستين) يومًا من انتهاء حالة الطوارئ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يُعاقب كل من يخالف أي حكم من أحكام النظام بالسجن مدة لا تتجاوز سنة، أو بغرامة لا تتجاوز (مائة ألف) ريال، أو بهما معًا. يُعاقب كل من يخالف أيًّا من أوامر الطوارئ بالعقوبات المنصوص عليها في ذلك الأمر. وفي حال عدم النص في أمر الطوارئ على العقوبات التي توقع بحق مخالفيه، فتكون العقوبة بالسجن مدة لا تتجاوز (ستة) أشهر، أو بالغرامة بمبلغ لا يتجاوز (خمسين ألف) ريال، أو بهما معًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: لا تخل العقوبات الواردة في أحكام النظام أو أوامر الطوارئ بالحدود المقررة شرعًا، ولا بالعقوبات الأشد المنصوص عليها في أي نظام آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يسري على الدعوى الجزائية العامة في جرائم مخالفة أحكام النظام أو أوامر الطوارئ نظام الإجراءات الجزائية. وتختص النيابة العامة بالتحقيق في هذه الجرائم، وإقامة الدعوى الجزائية العامة، ومباشرتها أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يجوز أن تتضمن أوامر الطوارئ تحديد مدد وإجراءات خاصة للنظر في جرائم مخالفة أحكام النظام أو أوامر الطوارئ في الحدود التي تستلزمها طبيعة حالة الطوارئ؛ بشرط ألا يخل ذلك بالضمانات المنصوص عليها في الأنظمة ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الحادية الثلاثون
  article_text_ar: تُعد الصلاحيات المخولة أو المفوضة لأي شخص بموجب النظام أو أوامر الطوارئ مضافة لأي صلاحية أخرى مخولة إليه بموجب أي نظام أو لائحة أخرى معمول بها، ما لم يُنص على غير ذلك في أمر الطوارئ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
- article_ref: المادة الثانية الثلاثون
  article_text_ar: يُعمل بالنظام من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7ac1a448-b042-4c73-8164-b2eb00ceb54f/1
  verified: false
