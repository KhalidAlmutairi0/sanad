articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية - حيثما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك:الوزير: وزير النقل.الهيئة: هيئة النقل العام.المجلس: مجلس إدارة الهيئة.الرئيس: رئيس الهيئة.التنظيم: تنظيم الهيئة.النقل العام: نقل الركاب بأجر داخل المدن وبين المدن، ويستثنى من ذلك النقل الجوي، والنقل بالسكك الحديدية بين المدن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميا بالوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون مقر الهيئة الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب لها داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف الهيئة إلى تنظيم خدمات النقل العام، والإشراف عليه وتوفيره بالمستوى الجيد والكلفة الملائمة، وتشجيع الاستثمار فيه بما يتفق مع أهداف التنمية الاقتصادية والاجتماعية في المملكة، بما في ذلك تأمين وسائط النقل والمرافق، وتراعى في ذلك الجوانب الفنية والبيئية والتكامل مع أنظمة النقل الجوي والنقل بالسكك الحديدية بين المدن، ولها في سبيل تحقيق ذلك ممارسة المهمات والاختصاصات الآتية: 1 - إعداد الخطط السنوية والخمسية لنشاطات الهيئة في إطار الأهداف والسياسات العامة لها بالتنسيق مع الجهات ذات العلاقة.2 - تنفيذ خطط النقل العام على مستوى المملكة، والتأكد من توافر التمويل لأنشطة النقل العام من مصادره المختلفة.3 - اقتراح السياسات العامة والتشريعات الخاصة بالنقل العام والإشراف على تنفيذها بعد اعتمادها. 4 - إجراء البحوث والدراسات اللازمة لتقويم نشاط النقل العام والعمل على تطويره باستمرار.5 - تحديد شبكة خطوط النقل العام ومساراتها.6 - وضع أسس تنظيم الأنشطة الخاصة بمرافق النقل العام وإدارتها.7 - وضع مواصفات وسائط النقل العام، بالمشاركة والتنسيق مع الجهات ذات العلاقة.8 - منح التراخيص والتصاريح،
    وإلغاؤها في حال مخالفة أحكام نظام النقل العام على الطرق.9 - تحديد مواقع مرافق النقل العام - بالتنسيق مع الجهات ذات العلاقة - والإشراف على خدماتها، بما في ذلك محطات الوصول والانطلاق لوسائط النقل وأهمية قربها من المطارات ومحطات السكك الحديدية.10 - اقتراح آلية لتنظيم أجور النقل العام وكيفية تحديدها ومتابعة الالتزام بها بعد اعتماد الأجور من الجهات المختصة.11 - مراقبة وسائط النقل العام ومرافقه في المملكة، وإعادة هيكلتها بما يتناسب مع الحاجة إليها.12 - توظيف التقنية في تنفيذ ومراقبة أعمال الهيئة ومهماتها.13 - إعداد الدراسات اللازمة لمخططات النقل العام وتصميم منظوماتها.14 - التعاقد على تقديم خدمات النقل العام ومرافقه، بالتنسيق مع الجهات ذات العلاقة.15 - مراقبة الالتزام بتنفيذ العقود ومتابعة المرخصين من الهيئة.16 - التأكد من سلامة الطرق ومركبات النقل العام بالتعاون والتنسيق مع الجهات ذات العلاقة.17 - توفير الظروف الملائمة لجذب الاستثمارات في مجال النقل العام.18 - التنسيق مع أجهزة النقل البري والبحري والسكك الحديدية والهيئة العامة للطيران المدني من أجل ضمان تنفيذ الإستراتيجية الوطنية للنقل.19
    - العمل على وضع المواصفات اللازمة للحد من التلوث البيئي بالتعاون مع الجهات المختصة.20 - تمثيل المملكة في المنظمات الدولية والإقليمية ذات العلاقة بالنقل العام.21 - متابعة تنفيذ اتفاقيات النقل العام المبرمة بين المملكة والدول الأخرى.22 - القيام بأي مهمة أخرى تكلف بها في مجال اختصاصها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1 - يكون للهيئة مجلس إدارة يشكل على النحو الآتي:'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويختص بالإشراف عليها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق أهدافها وفقاً لأحكام هذا التنظيم، وله بوجه خاص ما يأتي: 1 - الإشراف على تنفيذ الهيئة المهمات المنوطة بها.2 - إقرار السياسات والخطط والبرامج التي تحقق أهداف الهيئة. 3 - إصدار اللوائح الإدارية والمالية التي تسير عليها الهيئة بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية، وغيرها من اللوائح الداخلية.4 - وضع الهيكل التنظيمي للهيئة، ورفعه لاعتماده وفق الإجراءات النظامية المتبعة.5 - اقتراح المقابل المالي للتراخيص والتصاريح التي تمنحها الهيئة، ورفعه إلى الجهات المختصة لاعتماده.6 - الموافقة على إنشاء الفروع والمكاتب للهيئة داخل المملكة.7 - الموافقة على توظيف أموال الهيئة بما يحقق أغراضها، واستثمار العقارات واستئجارها وفقاً للأنظمة المتبعة.8 - تعيين مراجع حسابات خارجي ومراقب مالي داخلي.9 - الموافقة على مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراجع الحسابات، تمهيداً لاعتمادها وفق الإجراءات النظامية المتبعة.10 - اعتماد التقرير السنوي لنشاطات الهيئة. 11 - قبول الهبات
    والإعانات والمنح والوصايا والأوقاف وفقاً للأنظمة المتبعة.12 - الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، وتفويض رئيس الهيئة بالتوقيع عليها.13 - النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة ومركزها المالي. وللمجلس تفويض رئيسه أو نائبه أو من يراه من أعضاء مجلس الإدارة أو من منسوبي الهيئة ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- تعقد اجتماعات المجلس في مقر الهيئة، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة.2- يعقد المجلس اجتماعاته بصفة دورية أربع مرات في السنة، ولرئيس المجلس دعوته للاجتماع متى دعت الحاجة إلى ذلك أو متى طلب ذلك (ثلاثة) أعضاء على الأقل.3- يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.4- تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون.5- لا يجوز لعضو المجلس الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس.6- لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار الهيئة بسبب عضويته في المجلس.7- للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: للمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من غيرهم، ويعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للهيئة رئيس بالمرتبة (الممتازة) يعين بأمر ملكي بناءً على اقتراح الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يتولى الرئيس الاختصاصات والمهمات الآتية: 1 - الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة.2 - اقتراح السياسات العامة للهيئة، المتعلقة بأنشطتها، والخطط والبرامج اللازمة لتنفيذ ذلك، ورفعها إلى المجلس.3 - اقتراح الخطط لتطوير نشاط النقل العام في المملكة.4 - إعداد مشروع الميزانية السنوية للهيئة ومشروع حسابها الختامي، ورفعهما إلى المجلس.5 - تمثيل الهيئة لدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة وغيرها من الجهات داخل المملكة وخارجها.6 - اقتراح اللوائح اللازمة لتسيير العمل في الهيئة، واعتماد إجراءات العمل المبنية على اللوائح والقرارات الصادرة عن المجلس. 7 - الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المقرة والصلاحيات المفوضة له من المجلس. 8 - إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، ودراستها، وعرضها على المجلس.9 - التعاقد على تنفيذ الأعمال والخدمات وغيرها وفقاً للأنظمة والصلاحيات المخولة له.10 - إعداد التقرير السنوي عن نشاط الهيئة والعقبات التي واجهتها واقتراح الحلول المناسبة لها، وتقديمه
    إلى المجلس للنظر فيه ورفعه إلى الجهات المختصة بعد اعتماده من المجلس.11 - التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس. 12 - تنظيم مشاركة الهيئة في المؤتمرات والفعاليات والمهرجانات الإقليمية والدولية.13 - إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناءً عليه والقواعد والإجراءات المعتمدة، بحسب الصلاحيات المخولة له. 14 - تعيين العاملين في الهيئة طبقاً للوائح، والإشراف عليهم.15 - إقرار الخطط والبرامج اللازمة لتدريب وابتعاث وإيفاد منسوبي الهيئة في جميع مجالات عملها، ومتابعة تنفيذها.16 - مباشرة ما تخوله إياه قرارات المجلس واللوائح الخاصة بالهيئة من اختصاصات. وللرئيس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: '1 - تتكون موارد الهيئة المالية مما يأتي: أ - ما يخصص لها في الميزانية العامة للدولة. ب - ما يخصص لها من المقابل المالي الذي تتقاضاه نظير التراخيص والتصاريح التي تمنحها. ج - المقابل المالي الذي تحصل عليه نظير الخدمات التي تقدمها.د - ما يقبله المجلس من هبات وإعانات ومنح ووصايا وأوقاف.هـ - أي مورد آخر يقره المجلس. 2- تودع أموال الهيئة في حساب مفتوح لها في مؤسسة النقد العربي السعودي، ولها فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الأموال وفق ميزانية الهيئة المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعامل الهيئة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 1- تكون للهيئة ميزانية سنوية مستقلة، تصدر بمرسوم ملكي، وفقاً لترتيبات إصدار الميزانية العامة للدولة.2- السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات وعمليات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات ومعاملات الهيئة وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه، وإذا تعدد مراجعو الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
- article_ref: ( المادة الثالثة عشرة مكرر )
  article_text_ar: '- أُضيفت هذه المادة بموجب قرار مجلس الوزراء رقم (631) وتاريخ 1440/11/6هـ، لتكون بالنص الآتي: " يخضع منسوبو الهيئة -عدا الرئيس- لأحكام نظام العمل ونظام التأمينات الاجتماعية ".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9a1c4977-c539-4e01-8c88-a9a700f2efa9/1
  verified: false
