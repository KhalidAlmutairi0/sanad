articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية ـ أينما وردت في هذا التنظيم ـ المعاني المبينة أمامها:الهيئة : هيئة تقويم التعليم العام.المجلس : مجلس إدارة الهيئة.المحافظ : محافظ الهيئة.التنظيم : تنظيم الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية المستقلة والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس المجلس الأعلى للتعليم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون مقر الهيئة الرئيس مدينة الرياض، وللهيئة أن تنشئ فروعاً ومكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'الغرض الأساس للهيئة هو تقويم التعليم العام (الحكومي والأهلي)، وذلك من أجل تحقيق الأهداف الآتية : 1 ـ رفع جودة التعليم العام، وكفايته .2 ـ دعم التنمية والاقتصاد الوطني من خلال تحسين مخرجات التعليم العام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'للهيئة في سبيل تحقيق أهدافها القيام بالمهمات والاختصاصات الآتية: 1 - بناء نظام للتقويم لضمان جودة التعليم العام، يتضمن المعايير والمؤشرات الأساسية وإطاراً وطنيًّا لمؤهلات التعليم العام وجميع مايتعلق بذلك من إجراءات ونماذج .2 - بناء معايير متقدمة لمراحل التعليم العام تستخدم لقياس كفاية الأداء على المستوى المؤسسي والبرامجي .3 - بناء معايير لمناهج التعليم وتحديد مايجب أن يعرفه الطالب في كل مرحلة، ومايستطيع عمله في كل منها .4 - تقويم أداء المدارس الحكومية والأهلية واعتمادها بشكل دوري بناءً على معايير الهيئة، سواء قامت بذلك الهيئة بنفسها أو بالتعاقد أوالتعاون مع المنشآت المختصة في مجال التقويم والاعتماد.5 - بناء الاختبارات الوطنية المقننة في كل مرحلة دراسية وتنفيذها .6 - وضع الضوابط التي تكفل جودة التعليم بعناصره كافة، وإصدار الأدلة الاسترشادية المناسبة .7 - إعداد المعايير المهنية، واختبارات الكفايات، ومتطلبات برامج رخص المهنة للعاملين في التعليم العام .8 - تقويم البرامج المنفذة في مؤسسات التعليم العام (الحكومية والأهلية).9 - إجراء الدراسات والبحوث في مجال اختصاصها والتحفيزعلى
    إجرائها .10 - نشر نتائج التقويم والاعتماد التي تنفذها الهيئة، والمعلومات والبيانات الخاصة بالاعتماد والتقويم، وإصدار المجلات، والدوريات العلمية، والكتب، والكتيبات، والأدلة الإرشادية، والنشرات في مجال اختصاصها .11 - التواصل مع الهيئات والمؤسسات المماثلة في الخارج؛ للاستفادة من تجاربها وخبراتها . 12 - الترخيص للقيام بعمليات التقويم للمنشآت المختصة في مجال التقويم والاعتماد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: '1- يكون للهيئة مجلس إدارة يشكل على النحو الآتي:'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا في الهيئة ، ويختص بالإشراف عليها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق الأهداف التي أنشئت من أجلها، وفقاً لأحكام هذا التنظيم واللوائح الصادرة بناء عليه، وله على وجه خاص ما يأتي : 1 - تحديد الأهداف واقرار السياسات والخطط التي تسيرعليها الهيئة لتحقيق أغراضها، واعتماد البرامج اللازمة لذلك والإشراف على تنفيذها . 2 - اعتماد القواعد، والمعايير، والشروط الخاصة بتقويم التعليم العام. 3 - اعتماد نتائج عمليات التقويم، والموافقة على إصدار شهادات الاعتماد. 4 - الموافقة على مشروع الهيكل التنظيمي للهيئة، ورفعه لاستكمال الإجراءات النظامية لاعتماده. 5 - تحديد المقابل المالي الذي تتقاضاه الهيئة عن أي عمل أو خدمة تقدمها، بالاتفاق مع وزارة المالية. 6 - تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي. 7 - إصدار اللوائح الداخلية التي تسيرعليها الهيئة، وإصدار اللوائح المالية بالاتفاق مع وزارة المالية. 8 - اعتماد سلم أجور الخبراء والمختصين ذوي الكفايات المطلوبة، بعد الاتفاق مع وزارتي الخدمة المدنية والمالية. 9 - النظر في التقارير الدورية التي تقدم
    له عن سير أعمال الهيئة . 10 - اعتماد لائحة رسوم التقويم والاعتماد. 11 - الموافقة على مشروع ميزانية الهيئة وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيداً لرفع ذلك بحسب الإجراءات النظامية المتبعة . 12 - قبول مايقدم إلى الهيئة من تبرعات وهبات ووصايا وأوقاف ومنح وإعانات، وذلك وفقاً للأنظمة المرعية . 13 - الموافقة على إبرام العقود والاتفاقات، وتفويض المحافظ بالتوقيع عليها. 14 - الموافقة على إنشاء الفروع والمكاتب في الداخل، وذلك وفقاً للأنظمة. 15 - اعتماد معايير وضوابط منح الرخص للقيام بعمليات التقويم للمنشآت المختصة في هذا المجال. 16 - الموافقة على عقد المؤتمرات والندوات واللقاءات ذات الصلة بمهمات الهيئة وفقاً للإجراءات النظامية المتبعة . وللمجلس تفويض المحافظ ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- يعقد المجلس اجتماعاته بصفة دورية كل ثلاثة أشهر، ولرئيس المجلس دعوته للاجتماع متى دعت الحاجة إلى ذلك أو متى طلب ذلك (ثلاثة) أعضاء على الأقل.2- يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم رئيس المجلس أو من ينيبه من الأعضاء لرئاسته . وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.3- للمجلس دعوة من يراه لحضور جلساته للاستفادة من خبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من سواهم، ويعهد إليها بما يراه من مهمات . ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للهيئة محافظ بالمرتبة الممتازة يعين بأمر ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يتولى المحافظ إدارة وتصريف جميع شؤون الهيئة وإداراتها وأقسامها وفق الصلاحيات المنصوص عليها في هذا التنظيم واللوائح الصادرة بناءً عليه وقرارات المجلس، وله على وجه خاص ما يأتي : 1 - اقتراح السياسات والخطط والبرامج التي تسير عليها الهيئة لتحقيق أغراضها، تمهيداً لاعتمادها من مجلس إدارة الهيئة . 2 - إعداد القواعد، والمعايير، والشروط الخاصة بتقويم التعليم العام . 3 - إعداد مشروع ميزانية الهيئة، ومشروع الحساب الختامي، والتقريرالسنوي ؛ تمهيدا لعرضها على مجلس إدارة الهيئة . 4 - الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفق الأنظمة واللوائح المقرة . 5 - اقتراح مشاريع الهيكل التنظيمي واللوائح والقرارات التنفيذية الخاصة بسير العمل في الهيئة وعرضها على مجلس إدارة الهيئة . 6 - إعداد سلم أجور الخبراء والمختصين ذوي الكفايات المطلوبة. 7 - إعداد لائحة رسوم التقويم والاعتماد. 8 - تعيين العاملين في الهيئة والإشراف عليهم وفقاً للصلاحيات الممنوحة له، وماتحدده اللوائح. 9 - تنفيذ قرارات المجلس ومباشرة مايخوله إياه المجلس من اختصاصات وصلاحيات. 10 - تقديم تقارير دورية إلى المجلس
    عن أعمال الهيئة ونتائج تقويم التعليم العام. 11 - إعداد التقرير السنوي عن نشاط الهيئة والصعوبات التي واجهتها واقتراح الحلول لها، وعرضه على المجلس للنظر فيه. 12 - التعاقد على تنفيذ الأعمال والخدمات وغيرها، والتعاقد مع الخبراء وفقاً لاحتياجات الهيئة. 13 - تمثيل الهيئة أمام القضاء والجهات الحكومية والهيئات الأخرى، داخل المملكة وخارجها، وله توكيل من يراه في ذلك. 14 - إقرارالخطط والبرامج اللازمة للتدريب والابتعاث داخليًّا وخارجيًّا، ومتابعة تنفيذها. 15 - إعداد معايير وضوابط منح الرخص للقيام بعمليات التقويم للمنشآت المختصة في هذا المجال. 16 - تنظيم مشاركة الهيئة في المؤتمرات والندوات والمهرجانات والمعارض المحلية والإقليمية والعربية والدولية، والاشتراك في المجلات والنشرات التخصصية والمهنية وفقاً للإجراءات النظامية. وللمحافظ أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: '1- تتكون موارد الهيئة مما يأتي : أ ـ مايخصص لها في الميزانية العامة للدولة .ب - المقابل المالي الذي تحصل عليه عن الأعمال والخدمات التي تقدمها .جـ - ماتقبله من تبرعات وهبات ووصايا وأوقاف ومنح وإعانات.د ـ أي مورد آخر يقره المجلس. 2 - تودع أموال الهيئة في حساب مفتوح لها في مؤسسة النقد العربي السعودي ، ويصرف منها وفق ميزانية الهيئة المعتمدة، وتؤول الأموال الفائضة عن حاجة الهيئة خلال السنة المالية ـ سوى ما تحتاجه لتمويل مشروعاتها المستقبلية المقرة في ميزانيتها السنوية والتزاماتها النظامية - إلى الخزينة العامة للدولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تعامل الهيئة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1 - تكون للهيئة ميزانية سنوية مستقلة. 2 - السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات وعمليات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم رسميًّا بالعمل في المملكة، لتدقيق حسابات ومعاملات الهيئة وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس مكافآته . وعند تعدد مراجعي الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة . ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: مع مراعاة الحكم الوارد في الفقرة (8) من المادة (السابعة) من هذا التنظيم، يخضع منسوبو الهيئة - ما عدا المحافظ - من حيث أوضاعهم الوظيفية للأحكام المعتمدة بالأمر السامي رقم (5464/م ب) وتاريخ 20/ 4/ 1426 هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغى كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/125423ca-43d6-40f5-9e2d-a9a700f20110/1
  verified: false
