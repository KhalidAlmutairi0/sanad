regulation:
  code: BOE140
  name_ar: نظام مجلس الخدمة العسكرية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة (1)
  article_text_ar: ينشأ مجلس للخدمة العسكرية يتولي تخطيط شئون خدمة العسكريين في جميع القطاعات العسكرية وتنظيمها والإشراف عليها بما يحقق تطور مستوى الخدمة العسكرية والإقبال عليها ورفع الكفاية الإنتاجية للعاملين فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: 'يتكون المجلس من: نائب رئيس مجلس الوزراء رئيساً رئيس الحرس الوطني عضواً ونائباً للرئيس وزير الدفاع والطيران والمفتش العام عضواً وزير الداخلية عضواً وزير المالية والاقتصاد الوطني عضواً رئيس الاستخبارات العامة عضواً ثلاثة أعضاء يعينون بأمر ملكي بناء على اقتراح رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: تكون أمانة عامة للمجلس تقوم بأعمال سكرتارية مجلس الخدمة العسكرية ويختار لهذه الأمانة أمين عام من ذوي الاختصاص بأمر من رئيس المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: يجوز للمجلس الاستعانة بمن يراه من الخبراء وفي حالة حضور الخبير للجلسة بناء على طلب المجلس يبدي رأيه فيما أوكل إليه دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: يجتمع المجلس بدعوة من رئيسه أو نائبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: تعقد جلسات المجلس برئاسة رئيسه أو نائبه أو من ينيبه من الأعضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: تكون جلسات المجلس صحيحة بحضور أغلبية أعضائه وتتخذ القرارات بأغلبية أصوات الأعضاء الحاضرين وعند تساوي الأصوات يرجح الجانب الذي فيه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: لا تكون قرارات المجلس نافذة إلا بعد موافقة رئيس مجلس الوزراء عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (9)
  article_text_ar: للمجلس أن يشكل لجانا يعهد إليها بدراسة ما يراه من الموضوعات ذات العلاقة باختصاصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: 'يكون لمجلس الخدمة العسكرية الاختصاصات التالية : أ - اقتراح الأنظمة المتعلقة بشئون العاملين في الخدمة العسكرية وتقديها لمجلس الوزراء. ب - إصدار لوائح الأنظمة المتعلقة بشئون العاملين في الخدمة العسكرية ودراسة المعاملات التي ترفع من الجهات المختصة. جـ - دراسة معدلات الرواتب والعلاوات والبدلات والمكافآت واقتراح تعديلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: يلغي هذا النظام ما يتعارض مع أحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ويعمل به اعتبارا من تاريخ صدوره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/11d3d5b0-dddf-443a-9851-a9a700f23208/1
  verified: false
