articles:
- article_ref: 'المادة الأولى: التعريفات'
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية أينما وردت في هذا النظام المعاني المبينة أمامها، ما لم يقتض السياق خلاف ذلك : المؤسسة : مؤسسة النقد العربي السعودي . المعلومات الائتمانية : المعلومات والبيانات عن المستهلك فيما يتعلق بتعاملاته الائتمانية، مثل: القروض ، والشراء بالتقسيط ، والإيجار، والبيع الآجل، وبطاقات الائتمان ، ومدى التزامه بالسداد من عدمه. العضو : الجهة الحكومية أو الخاصة التي يربطها عقد لتبادل المعلومات الائتمانية مع شركة واحدة على الأقل من شركات المعلومات الائتمانية . المستهلك : الشخص من ذوي الصفة الطبيعية أو الاعتبارية الذي له تعاملات ائتمانية. الشركات : شركات المعلومات الائتمانية المرخص لها بجمع المعلومات الائتمانية عن المستهلكين وحفظها، وتزويد الأعضاء بتلك المعلومات عند طلبها. السجل الائتماني : تقرير تصدره الشركات يحتوي على المعلومات الائتمانية عن المستهلك. السجلات العامة : سجلات المعلومات الائتمانية التي لدى الجهات الحكومية، مثل سجلات الصناديق والبنوك التي تقدم قروضا حكومية، والجهات القضائية، واللجان الحكومية، وملفات الإفلاس والإعسار، وما في حكمها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى وضع الأسس العامة والضوابط اللازمة لجمع المعلومات الائتمانية عن المستهلكين وتبادلها وحمايتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يسري هذا النظام على الشركات والأعضاء والجهات الحكومية والخاصة التي لديها معلومات ائتمانية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 1 - تلتزم الجهات الحكومية التي لديها معلومات ائتمانية بتوفيرها للشركات المرخص لها وفقا لضوابط تضعها تلك الجهات بما يضمن عدم احتكار تلك المعلومات.2 - تلتزم الشركات بجمع المعلومات الائتمانية ، وتوفيرها وتبادلها فيما بينها وحمايتها.3 - تقوم الشركات بإعداد السجلات الائتمانية عن المستهلكين وتبادلها مع الأعضاء عند طلبها.4 - تستوفي الشركات مقابلا ماليا لتوفير المعلومات الائتمانية وتبادلها وفق الضوابط التي تحددها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1 - يلتزم كل عضو بتبادل جميع المعلومات الائتمانية المتوافرة لديه مع الشركة المرتبط معها بعقد، وتقع عليه مسؤولية صحة تلك المعلومات وتحديثها.2 - يحق للأعضاء الحصول من الشركات على نسخة من السجل الائتماني عن المستهلك بعد أخذ موافقته الخطية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يلتزم الأعضاء والشركات والعاملون لديهم بالمحافظة على سرية المعلومات الائتمانية للمستهلكين، ولا يجوز نشرها أو استخدامها لأي غرض آخر، باستثناء ما ورد في هذا النظام أو لائحته التنفيذية، أو بما يتوافق مع الأنظمة والتعليمات المنظمة لسرية المعلومات في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجوز استخدام المعلومات الائتمانية على شكل أرقام إحصائية، بشرط ألا تحتوي على معلومات تدل على شخصية المستهلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1 - يلتزم الأعضاء والشركات بتوفير المعلومات للمستهلكين عن الإجراءات المتبعة عند التقديم لأي تعالم ائتماني.2 - تلتزم الشركات بوضع إجراءات محددة لمعالجة شكاوى المستهلكين، ونشرها بعد موافقة المؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1 - لا يؤسس للمستهلك سجل ائتماني لدى الشركات للمرة الأولى إلا بعد موافقته الخطية.2 - يجب على العضو إبلاغ المستهلك بسبب رفض تعامله الائتماني، في حالة طلبه.3 - يحق للمستهلك الذي رُفض تعامله الائتماني الحصول مجانا على نسخة من سجله الائتماني لمرة واحدة فقط.4 - يحق للمستهلك الحصول على نسخة من سجله الائتماني في أي وقت - بشرط أن يسدد المقابل المالي لذلك - وله الحصول على نسخة من سجله مجانا لمرة واحدة بعد تأسيس السجل.5 - يحق للمستهلك إضافة معلومات إلى سجله الائتماني توضح وجهة نظره الشخصية على ما ورد فيه من معلومات ائتمانية .6 - يحق للمستهلك الذي يكتشف خطأ في سجله الائتماني أن يطلب من الشركة تصحيح المعلومات الخاطئة، وذلك بعد تقديمه المستندات المؤيدة لطلبه.7 - يحق للمستهلك إذا لم تصحح المعلومات الخاطئة في سجله الائتماني، أو لاحظ أن سجله الائتماني قد تم طلبه لسبب غير مشروع؛ أن يتقدم بشكواه إلى اللجنة المكونة بموجب هذا النظام لإصدار القرار المناسب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1 - يجب على الشركات حفظ المعلومات الائتمانية لديها.2 - يجب على الشركات إعداد سجل يتضمن جميع طلبات السجلات الائتمانية للمستهلكين وحفظها لديها.3 - تحدد اللائحة التنفيذية مدة الحفظ وضوابطه، وكيفية التصرف في تلك المعلومات بعد انتهاء هذه المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتولى المؤسسة مهمة الإشراف والرقابة على تطبيق أحكام هذا النظام، ولها على الأخص القيام بالمهمات التالية: 1 - إعداد اللائحة التنفيذية لهذا النظام.2 - تحديد الشروط الواجب توافرها في الشركات التي ترغب في تقديم خدمات المعلومات الائتمانية ، وضوابط الترخيص لها وإجراءاته.3 - إصدار التراخيص لشركات المعلومات الائتمانية ، وتجديدها، وتعديلها. 4 - وضع آليات الإشراف والرقابة على عمل شركات المعلومات الائتمانية .5 - اعتماد إجراءات العمل التي يجب أن يتبعها الأعضاء وشركات المعلومات الائتمانية لتطبيق السجلات الائتمانية .6 - ضبط المخالفات والتحقيق فيها والادعاء ضد المخالفين أمام اللجنة.7 - تحديد الإجراءات الواجب اتخاذها حيال المعلومات الائتمانية في حالة إلغاء ترخيص شركة المعلومات الائتمانية ، أو حلها، أو تصفيتها، أو إفلاسها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تعد الأعمال الآتية مخالفة لأحكام هذا النظام: 1 - القيام بنشاط شركات المعلومات الائتمانية دون الحصول على ترخيص من المؤسسة.2 - مخالفة الشركات شروط الترخيص وضوابطه.3 - قيام أي عضو أو شركة معلومات ائتمانية أو أي من الجهات الخاضعة لأحكام هذا النظام أو أحد منسوبيها بإفشاء معلومات مما نُص على سريتها في هذا النظام – أثناء عمله أو بعد تركه للعمل – تكون قد وصلت إليه بسبب أعمال وظيفته، وذلك في غير الحالات المنصوص عليها في هذا النظام. 4 - استخدام المعلومات الائتمانية أو استغلالها لأي غرض غير مشروع، أو مخالف لأحكام هذا النظام.5 - تأخر العضو أو شركة المعلومات الائتمانية في تحديث المعلومات الائتمانية عن المواعيد المحددة في اللائحة التنفيذية أو عدم تصحيح الخطأ فور اكتشافه.6 - تقديم بيانات خاطئة أو مزورة عن أحد المستهلكين.7 - عدم تقديم المعلومات الائتمانية المطلوبة من الأعضاء الملتزمين باتفاقية العضوية، أو التباطؤ والتأخر في تقديمها عن المواعيد المحددة في اللائحة التنفيذية .8 - أية مخالفة أخرى لأحكام هذا النظام ولائحته التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع عدم الإخلال بأي عقوبة أشد ينص عليها نظام آخر؛ يعاقب كل من ارتكب أية مخالفة لأحكام هذا النظام ولائحته التنفيذية بواحدة أو أكثر من العقوبات الآتية:1 - غرامة مالية لا تزيد على مليون ريال، ويضاعف الحد الأقصى للغرامة في حالة العود.2 - وقف الترخيص مؤقتا.3 - إلغاء الترخيص .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تكوَّن بقرار من وزير المالية لجنة أو أكثر للنظر في مخالفات أحكام هذا النظام، وتوقيع العقوبات، والفصل في النزاعات والخلافات التي تنشأ بين المستهلك والأعضاء والشركات، على ألا يقل عدد أعضائها عن (ثلاثة) من أهل الخبرة في هذا المجال، يكون من بينهم مستشار نظامي على الأقل. وتصدر اللجنة قراراتها بالأغلبية، ويجوز التظلم من قراراتها أمام ديوان المظالم خلال (ستين) يوما من تاريخ الإبلاغ بها. وتحدد اللائحة التنفيذية كيفية عمل هذه اللجنة ومكافأة أعضائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجوز لمن لحق به ضرر ناتج من ارتكاب المخالفات المنصوص عليها في هذا النظام – بعد صدور قرار من اللجنة – اللجوء إلى الجهة القضائية المختصة لطلب التعويض عن الأضرار التي لحقت به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يصدر محافظ المؤسسة اللائحة التنفيذية لهذا النظام خلال (مائة وثمانين) يوما من تاريخ صدوره، وتنشر في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد (مائة وثمانين) يوما من تاريخ نشره، ويلغى ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63dc01a6-fc5c-4600-9171-a9a700f2d222/1
  verified: false
