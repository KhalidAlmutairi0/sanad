regulation:
  code: BOE249
  name_ar: نظام حقوق كبير السن ورعايته
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها: النظام: نظام حقوق كبير السن ورعايته. اللائحة: اللائحة التنفيذية للنظام. الوزارة: وزارة الموارد البشرية والتنمية الاجتماعية. الوزير: وزير الموارد البشرية والتنمية الاجتماعية. كبير السن: كل مواطن بلغت سنه (ستين) سنة فأكثر. حقوق كبير السن: كل ما لكبير السن من حقوق شرعية كانت أو نظامية بما في ذلك حقوقه المالية والجسدية والاجتماعية والمعنوية. رعاية كبير السن المحتاج: توفير الحاجات الضرورية اللازمة لكبير السن من سكن ومأكل وملبس وعناية صحية وجسدية ونفسية واجتماعية وترويحية. العائل: من يقوم برعاية كبير السن المحتاج وحفظ حقوقه. دار الرعاية الاجتماعية لكبير السن: أي جهة حكومية، أو أي جهة خاصة أو أهلية رخّصت لها الوزارة؛ تقوم بإيواء كبير السن ورعايته وتقديم الخدمات اللازمة له. الأسرة: تشمل الأب والزوج أو الزوجة والذكور من الأولاد والأحفاد والإخوة. الجهات ذات العلاقة: كل جهة حكومية أو خاصة أو أهلية تقدم خدمات لكبير السن سواء كانت بطريقة مباشرة أو غير مباشرة. الخدمات العامة: كل خدمة تقدمها الجهة
    الحكومية سواء بنفسها أو عن طريق غيرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تقوم الوزارة بالتنسيق مع الجهات ذات العلاقة لتحقيق ما يأتي: تمكين كبار السن من العيش في بيئة تحفظ حقوقهم وتصون كرامتهم. نشر التوعية والتثقيف المجتمعي لبيان حقوق كبار السن؛ لأجل احترامهم، وتوقيرهم. توفير معلومات إحصائية موثقة عن كبار السن؛ للاستفادة منها في إجراء الدراسات والبحوث ذات العلاقة بهم، والمساعدة في وضع الخطط والبرامج. تنظيم وتنفيذ برامج مناسبة لكبار السن؛ تعزز من مهاراتهم وخبراتهم وممارسة هواياتهم وتعزيز اندماجهم في المجتمع. تشجيع القادرين من كبار السن على العمل، والاستفادة من برامج الدعم الموجهة إلى الجهات المشغلة لهم. دعم النشاطات التطوعية في خدمة كبار السن. تأهيل المرافق العامة والتجارية والأحياء السكنية والبيئة المحيطة والمساجد؛ لتكون ملائمة لاحتياجات كبار السن، وذلك في ضوء الأنظمة والأوامر ذات العلاقة. تخصيص أماكن لكبار السن في المرافق العامة والمناسبات العامة. حثّ القطاع الخاص وأصحاب الأعمال والجهات الأهلية على رعاية كبار السن من خلال إقامة مراكز أهلية وأندية اجتماعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لكبير السن حق العيش مع أسرته، وعليها إيواؤه ورعايته، وتكون المسؤولية في ذلك على أفراد الأسرة وفقًا للتسلسل المنصوص عليه في المادة (السادسة) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: لا يجوز لدور الرعاية الاجتماعية لكبير السن إيواء كبير السن فيها إلا بعد موافقته، أو بعد صدور حكم قضائي بذلك، أو في الحالات التي تشكل خطورة على حياة كبير السن أو سلامته وفق ضوابط تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لأغراض تطبيق أحكام النظام، يعد كبير السن محتاجًا إذا كان غير قادر على أن يؤمّن لنفسه ضروريات الحياة كليًّا أو جزئيًّا نتيجة لقصور في قدراته المالية أو البدنية أو النفسية أو العقلية، وتحدد اللائحة الأحكام والضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تكون إعالة كبير السن المحتاج على الزوج أو الزوجة إن رغبت، فإن تعذر ذلك فعلى أبيه إذا كان قادرًا ثم أحد أولاده الذكور، فإن تعذر ذلك فعلى أحد أحفاده الذكور، فإن تعذر ذلك فعلى أحد إخوته الذكور. ويجوز انتقال واجب الإعالة إلى من اختاره كبير السن منهم مع وجود من هو أولى منه. وفي حال عدم الاتفاق أو عدم قيام أيٍّ من أفراد الأسرة بالإعالة، فتتولى المحكمة المختصة تحديد العائل من أفراد أسرته، على أن يراعى في ذلك مصلحة كبير السن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تكون نفقة رعاية كبير السن المحتاج وفقًا لمقتضيات النفقة الشرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: إذا عجز العائل عن توفير نفقة رعاية كبير السن المحتاج، ولم يكن في أسرته من هو قادر على إعالته؛ فيصرف له من الوزارة ما يساعده على ذلك، وذلك وفقًا لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يحمي العائل حقوق كبير السن المحتاج وفقًا للمقتضى الشرعي والنظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: توفر الوزارة لكبير السن المحتاج الأجهزة والمستلزمات الطبية المساعِدة بالمجان، وتتحمل ما يترتب عليها من نفقات التشغيل والصيانة؛ وذلك وفق ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: على الجهة الحكومية ومن يقدم خدمة عامة نيابةً عنها إعطاء كبير السن أولوية في الحصول على الخدمات الأساسية التي تقدمها، وبخاصة الخدمات الصحية والاجتماعية؛ وذلك وفقًا لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تمنح الوزارة كبير السن بطاقة امتياز تمكنه من الاستفادة من الخدمات العامة التي يحتاجها لضروريات حياته اليومية التي تقدمها الجهات الحكومية والخاصة والأهلية لكبير السن، وعليها مراعاة كبير السن في جميع الإجراءات التي تتخذ في شأنه والإسراع في إنجازها، ومراعاة حاجاته العقلية، والنفسية، والجسدية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تمنح الجهة الحكومية أو من يقدم خدمة عامة نيابةً عنها لكبير السن المحتاج –في حدود الصلاحيات المخولة لها نظاماً- خصماً على الخدمات العامة التي تقدمها؛ وذلك وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: للوزارة حق الولاية على النفس لفاقد الأهلية أو ناقصها من كبار السن ممّن ثبت قضاء أنه ليس له ولي، أو أن له وليًّا تخلى أو تقاعس عن المطالبة بحقوقه. وتحدد اللائحة الأحكام الخاصة بذلك. للهيئة العامة للولاية على أموال القاصرين ومن في حكمهم؛ الولاية على مال فاقد الأهلية أو ناقصها من كبار السن، وذلك بعد ثبوت ولاية الوزارة عليه بحكم قضائي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يحظر على العائل التصرف في مال كبير السن دون موافقته. يحظر على العائل الإخلال عمدًا بحماية حقوق كبير السن المحتاج ورعايته. يحظر إساءة التصرف عمدًا في مال كبير السن لمن أوكلت إليه سلطة التصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يعاقب من يخل بأيٍّ من أحكام المادتين (الثالثة) و(الخامسة عشرة) من النظام، بعقوبة أو أكثر من العقوبات الآتية: أ- السجن مدة لا تزيد على سنة. ب- غرامة لا تزيد على (خمسمائة ألف) ريال. لا يسري ما ورد في الفقرة (1) من هذه المادة إذا كان العائل هو الأب أو الزوجة. وتجوز مضاعفة العقوبة على المخالف في حالة العود بما لا يتجاوز ضعف الحد الأقصى المقرر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: إذا شكل أي من الأفعال الواردة في المادة (الخامسة عشرة) من النظام؛ جريمة بموجب أنظمة أخرى؛ فتطبق العقوبة الأشد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: للمحكمة المختصة أن تحكم بعقوبة بديلة عن العقوبات الواردة في المادة (السادسة عشرة) من النظام على أن تكون في خدمة كبار السن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تتولى النيابة العامة التحقيق في المخالفات الواردة في المادتين (الثالثة) و(الخامسة عشرة) من النظام، وإقامة الدعوى أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تعاقب دور الرعاية الاجتماعية الخاصة أو الأهلية المخالفة لحكم المادة (الرابعة) من النظام، ومن يقدم خدمة عامة نيابةً عن الجهة الحكومية المخالفة لحكم المادتين (الحادية عشرة) و(الثالثة عشرة) من النظام؛ بغرامة لا تزيد على (مائة ألف) ريال. تكوّن بقرار من الوزير لجنة أو أكثر، لا يقل عدد أعضائها عن (ثلاثة) يكون أحدهم مستشارًا نظاميًّا، تتولى النظر في مخالفة أحكام المواد (الرابعة) و(الحادية عشرة) و(الثالثة عشرة) من النظام، وتوقيع العقوبة المنصوص عليها، وترفع قرارها إلى الوزير أو من يفوضه لاعتماده، ويجوز لمن صدر ضده قرار بالعقوبة التظلم منه أمام المحكمة الإدارية. يتولى من يصدر بتسميته قرار من الوزير ضبط المخالفات المنصوص عليها في الفقرة (1) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'لا تخل الأحكام والإجراءات المنصوص عليها في النظام بما يأتي: الالتزامات النظامية الأخرى المتعلقة بحماية حقوق كبير السن ورعايته المترتبة على الجهات المعنية، كل بحسب اختصاصه. أي حكم يكفل حماية أفضل لكبير السن ينص عليه نظام آخر أو أي التزام على المملكة وفقًا لاتفاقية دولية المملكة طرفٌ فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يصدر الوزير اللائحة خلال (تسعين) يوماً من تاريخ نشر النظام في الجريدة الرسمية، ويعمل بها من تاريخ العمل بالنظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يُعمل بالنظام بعد (تسعين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3c63e654-4046-468d-93fd-ae1a00de13be/1
  verified: false
