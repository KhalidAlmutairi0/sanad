regulation:
  code: BOE332
  name_ar: اللائحة التنظيمية للمنشآت الاجتماعية غير الحكومية للأشخاص ذوي الإعاقة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذه اللائحة - المعاني المبينة أمامها ما لم يقتضِ السياق غير ذلك: الوزارة: وزارة الموارد البشرية والتنمية الاجتماعية. الوزير: وزير الموارد البشرية والتنمية الاجتماعية. الشخص ذو الإعاقة: كل شخص لديه اضطراب، أو قصور طويل الأمد في الوظائف الجسدية، أو العقلية، أو الذهنية، أو الحسية، أو النفسية، قد يمنعه -عند تعامله مع مختلف التحديات- من المشاركة بصورة كاملة وفاعلة في المجتمع على قدم المساواة مع الآخرين. البرامج الاجتماعية: مجموعة من البرامج التي تقدم من خلالها الخدمات الاجتماعية للأشخاص ذوي الإعاقة لتنمية مهاراتهم الاجتماعية وتدريبهم على الاستقلالية قدر الإمكان في وظائفهم الحياتية اليومية لتحقيق مشاركتهم الفاعلة في بيئتهم المحيطة وتكاملهم مع أسرهم والمجتمع المحيط بهم. وتشمل البرامج الآتية: برنامج الرعاية الاجتماعية اليومية، وبرنامج الرعاية الاجتماعية المنزلية، وبرنامج الإيواء للأشخاص ذوي الإعاقة. برنامج الرعاية الاجتماعية اليومية: مجموعة من الخدمات الاجتماعية التي تقدم للأشخاص ذوي الإعاقة في المنشآت في مدد محددة خلال اليوم. برنامج
    الرعاية الاجتماعية المنزلية: مجموعة من الخدمات الاجتماعية التي تقدم للأشخاص ذوي الإعاقة في مقرات سكنهم في مدد محددة خلال اليوم. برنامج الإيواء للأشخاص ذوي الإعاقة: مجموعة من الخدمات الاجتماعية التي تقدم للأشخاص ذوي الإعاقة في مقرات الإقامة المؤقتة أو مقرات السكن الدائم لهم. المنشآت: أي منشأة غير حكومية مرخصة من الوزارة لمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة. الترخيص: وثيقة تصدرها الوزارة لمزاولة أنشطة تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة. المرخص له: من يحمل ترخيصاً سواء كان شخصًا ذا صفة طبيعية أو اعتبارية. اللائحة: اللائحة التنظيمية للمنشآت الاجتماعية غير الحكومية للأشخاص ذوي الإعاقة. القواعد التنفيذية: القواعد التنفيذية للائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يحظر على المنشأة ممارسة النشاط قبل الحصول على الترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يحدد الوزير بقرار منه المقابل المالي للتراخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تحدد القواعد التنفيذية الاشتراطات اللازمة لإصدار تراخيص مزاولة أنشطة تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة ومددها وإجراءات تجديدها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب أن يكون المرخص له ذو الصفة الطبيعية سعودي الجنسية، وألا يكون قد سبق الحكم عليه في جريمة مخلة بالشرف أو الأمانة، ما لم يكن قد رد إليه اعتباره. يجب أن يكون المرخص له ذو الصفة الاعتبارية سعوديًّا أو حاصلاً على ترخيص استثماري سارٍ في المملكة العربية السعودية وفقاً لنظام الاستثمار الأجنبي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تصنف المنشآت التي تقدم البرامج الاجتماعية للأشخاص ذوي الإعاقة على النحو الآتي: منشآت متخصصة بمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة، وحاصلة على ترخيص مزاولة نشاط تقديم البرامج الاجتماعية من الوزارة. منشآت تمارس أنشطة غير موجهة للأشخاص ذوي الإعاقة، وحاصلة على ترخيص مزاولة نشاط تقديم البرامج الاجتماعية من الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تلتزم المنشأة بالحصول على الاعتمادات اللازمة للبرامج الاجتماعية المقدمة وفق اللائحة التنظيمية للبرامج الاجتماعية والمهنية للأشخاص ذوي الإعاقة، قبل الحصول على الترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تحدد القواعد التنفيذية الاشتراطات الواجب توفرها في الكوادر الفنية والإدارية بحسب تصنيف المنشآت المشار إليها في المادة (السادسة) من اللائحة. يشترط في مدير المنشأة المتخصصة بمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة أن يكون من ذوي الاختصاص في المجالات الصحية أو التأهيلية أو الاجتماعية أو التربوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تحدد القواعد التنفيذية اشتراطات البنية التحتية للمنشآت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجوز للمنشأة تقديم برامج اجتماعية متعددة في مقر واحد، ويجوز لها أيضاً تغيير برامجها المقدمة وفق الضوابط والشروط التي تحددها القواعد التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: للوزارة إسناد التحقق من استيفاء المنشأة لكافة الاشتراطات اللازمة للحصول على الترخيص إلى القطاع غير الحكومي تحت إشرافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تحدد القواعد التنفيذية إجراءات نقل ملكية المنشأة، ومقرها، وتغيير نوعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تلتزم المنشأة في حال تعليق العمل فيها أو إغلاقها أو عدم الرغبة في تجديد ترخيصها أو إلغائه؛ بإبلاغ الوزارة والأشخاص ذوي الإعاقة المستفيدين من خدماتها وأولياء أمورهم، مع الوفاء بالتزاماتها تجاه الأشخاص ذوي الإعاقة المستفيدين من خدماتها. يُلغى الترخيص للمنشأة في الحالتين التاليتين: أ- إذا توفي المرخص له. ب- إذا انتفى عن المرخص له أحد شروط الترخيص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: على كل منشأة أخذ موافقة الوزارة عند تحديد أسعار البرامج الاجتماعية التي تقدمها أو تعديلها وفق المعايير المنصوص عليها في القواعد التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تلتزم المنشأة -المتخصصة بمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة– بالضوابط التي تحددها الوزارة قبل الإعلان عن أي نشاط يتعلق بالمنشأة، أو بالأشخاص ذوي الإعاقة المستفيدين من خدماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تتولى الوزارة بالتنسيق مع الجهات ذات العلاقة القيام بعمليات الرقابة، وتوضح القواعد التنفيذية آلية الرقابة على المنشآت بما يضمن الالتزام بتنفيذ ما ورد في اللائحة وقواعدها التنفيذية. ويجوز للوزارة إسناد الرقابة إلى القطاع غير الحكومي تحت إشرافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'يعاقب من يخالف أحكام اللائحة والقواعد التنفيذية بواحدة أو أكثر من العقوبات التالية: غرامة لا تزيد على (300,000) ثلاثمائة ألف ريال سعودي. إغلاق المنشأة مؤقتاً لمدة لا تتجاوز (مائة وعشرين) يوماً. المنع من ممارسة أي نشاط يتعلق بتقديم البرامج الاجتماعية لمدة لا تتجاوز سنة. إلغاء الترخيص. ويجوز مضاعفة العقوبة المحكوم بها وفقًا للفقرات (1) و(2) و(3) من هذه المادة في حال تكرار ارتكاب المخالفة. وتعد المخالفة مكررة في حال ارتكابها خلال سنة من تاريخ ارتكاب المخالفة الأولى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تتولى الوزارة توقيع العقوبات المنصوص عليها في المادة (السابعة عشرة) من اللائحة وذلك وفقاً لجدول يصدره الوزير، يتضمن تصنيفاً للمخالفات والعقوبات المحددة لكل منها، وتعتمد هذه العقوبات بقرار من الوزير أو من يفوضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يشكل الوزير بقرار منه لجنة (أو أكثر) للنظر في التظلمات التي تقدم للوزارة من قرارات توقيع العقوبات الصادرة وفقاً للمادة (السابعة عشرة) من اللائحة، ولا يقل عدد أعضائها عن ثلاثة أعضاء، من مستشارين نظاميين، ومختصين في مجال البرامج الاجتماعية. تحدد قواعد وإجراءات عمل اللجنة ومكافآت أعضائها بقرار من الوزير. يجوز الاعتراض على قرار اللجنة أمام المحكمة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: إذا تعرض أي من الأشخاص ذوي الإعاقة لضرر من المنشأة فله الحق في المطالبة أمام المحكمة المختصة بالتعويض عن الأضرار التي تسببت فيها تلك المنشأة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يمنح صندوق التنمية الوطني -أو أي جهة من الجهات التابعة له- للمنشأة المتخصصة بمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة قرضاً ميسراً بنسبة (%50) من التكاليف الإجمالية لإنشاء مشروعها المتصل بهذا النشاط؛ وفق ضوابط يقرها صندوق التنمية الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يجوز للمنشأة -المتخصصة بمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة- استئجار أراضٍ أو مبانٍ مملوكة للدولة داخل النطاق العمراني بحسب الإجراءات المتبعة في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: للمنشآت -المتخصصة بمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة- تقديم برامج إضافية، كالبرامج التعليمية، أو الصحية، أو الثقافية، أو الرياضية، أو غيرها من البرامج التي تناسب الأشخاص ذوي الإعاقة، شريطة أخذ الموافقات اللازمة من الجهة الحكومية المختصة والإشراف عليها من قبلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تحدد القواعد التنفيذية فترات الدوام الرسمي للمنشآت المتخصصة بمزاولة نشاط تقديم البرامج الاجتماعية للأشخاص ذوي الإعاقة بحسب تصنيفها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تحدد القواعد التنفيذية المدد الزمنية لتنفيذ البرامج الاجتماعية المعتمدة من الوزارة والمقدمة في المنشآت المرخصة من الجهة الحكومية المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تحدد القواعد التنفيذية فئات الأشخاص ذوي الإعاقة الذين يمكنهم الاستفادة من المنشآت بحسب أنواعها وتخصصاتها وفقاً لفئاتهم العمرية ونوع الجنس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: إذا كان الأشخاص ذوي الإعاقة في المنشأة من الجنسين، فعلى المنشأة فصل الخدمات المقدمة للذكور عن الخدمات المقدمة للإناث فصلًا تامًا، مع توفير القوى التشغيلية اللازمة لذلك. يحدد الوزير بالاتفاق مع وزير العدل العمر الذي لا يجوز فيه لأي من الجنسين خدمة الجنس الآخر. ويجوز للوزير استثناء الأشخاص ذوي الإعاقة من الذكور ممن تثبت تقاريرهم الطبية -المعتمدة من لجنة طبية من أطباء استشاريين من ذوي الاختصاص- وجود مشكلة نمائية تمنعهم من النضج الجسدي للوصول إلى مرحلة البلوغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يصدر الوزير القواعد التنفيذية خلال (مائة وثمانين) يوماً من تاريخ صدور اللائحة، وتنشر في موقع الوزارة الإلكتروني، ويعمل بها من تاريخ العمل باللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تحل اللائحة محل اللائحة التنظيمية لمراكز تأهيل المعوقين غير الحكومية الصادرة بقرار مجلس الوزراء رقم (291) وتاريخ 4 / 9 / 1433هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يعمل باللائحة بعد (مائة وثمانين) يوماً من تاريخ نشرها في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ce1982e0-5c1c-4f2e-91fa-b13700eeb592/1
  verified: false
