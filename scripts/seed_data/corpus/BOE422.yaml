regulation:
  code: BOE422
  name_ar: تنظيم المركز الوطني لكفاءة وترشيد المياه
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها، ما لم يدل السياق على غير ذلك: التنظيم: تنظيم المركز الوطني لكفاءة وترشيد المياه. المركز: المركز الوطني لكفاءة وترشيد المياه. الوزير: وزير البيئة والمياه والزراعة. الوزارة: وزارة البيئة والمياه والزراعة. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمركز. الشخص: أي شخص ذي صفة طبيعية أو اعتبارية عامة أو خاصة. كفاءة المياه: تحسين كفاءة سلسلة إمداد المياه. ترشيد المياه: الاستخدام الأمثل للمياه في الأغراض الحضرية أو الصناعية أو الزراعية. سلسلة إمداد المياه: استخراج المياه أو إنتاجها من أي مصدر ونقلها وتوزيعها للأغراض الحضرية أو الصناعية أو الزراعية. الأغراض الحضرية: استخدام المياه للأغراض السكنية، والتجارية، والتشييد، ولاستخدامات المرافق العامة، والتشجير والحدائق العامة، ونحوها. مقدمو خدمات كفاءة وترشيد المياه: أشخاص يرخص لهم بمزاولة أنشطة خدمات كفاءة وترشيد المياه. الرخصة: إذن مكتوب يصدره المركز للشخص للقيام بأي نشاط يتعلق بكفاءة وترشيد المياه. المياه
    الرمادية: مياه ناتجة من مختلف الاستخدامات -ما عدا المياه الناتجة من المراحيض- وتشمل: المياه الناتجة من الاستحمام، أو أحواض غسيل اليدين، أو المطابخ، أو غسالات الصحون، أو أحواض غسيل الملابس، أو غسيل السيارات، أو غسيل الأرضيات، أو أحواض السباحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يرتبط المركز تنظيميًّا بالوزير، ويتمتع بالشخصية الاعتبارية والاستقلال المالي والإداري، ويكون مقره الرئيس في مدينة الرياض، ويجوز بقرار من المجلس -بحسب الحاجة- إنشاء فروع أو مكاتب له داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى الإسهام في رفع كفاءة وترشيد المياه، وتوحيد جهود الجهات الحكومية وغير الحكومية في هذا المجال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع مراعاة الاختصاصات المقررة نظاماً للجهات المعنية، يتولى المركز في سبيل تحقيق أهدافه الاختصاصات الآتية: وضع برامج وطنية لكفاءة وترشيد المياه، وتحديد المؤشرات والأهداف ووضع الخطط والسياسات المتعلقة بذلك، مع متابعة تنفيذ الخطوات اللازمة لتحقيقها مع الجهات ذات العلاقة، والتحقق من نتائجها ومدى فاعليتها، وإعداد تقارير دورية بذلك، وفقاً للإجراءات النظامية المتبعة. اقتراح مشاريع الأنظمة الخاصة بكفاءة وترشيد المياه واقتراح تعديل النافذ منها -بالتنسيق مع الجهات ذات العلاقة- والرفع عن ذلك وفقًا للإجراءات النظامية المتبعة. إصدار اللوائح الفنية والمعايير والإجراءات التي تحقق كفاءة وترشيد المياه. المساهمة مع الجهات ذات العلاقة في وضع المواصفات القياسية للأجهزة والمعدات بما يحقق كفاءة وترشيد المياه. وضع الآليات والإجراءات المحفزة لإعادة استخدام المياه الرمادية. وضع الأسس المناسبة التي تساعد على إدارة برنامج بطاقات كفاءة وترشيد المياه، بالتنسيق مع الجهات ذات العلاقة. وضع القواعد اللازمة للتأهيل والترخيص لمقدمي خدمات كفاءة وترشيد المياه. الإسهام مع الجهات ذات العلاقة في وضع القواعد
    اللازمة المتعلقة باختبارات كفاءة وترشيد المياه. تقديم الخدمات الفنية والاستشارية في مجال كفاءة وترشيد المياه. إعداد الدليل الوطني لخدمات كفاءة وترشيد المياه، ويشمل القياس والتحقق من تلك الخدمات، ونشره ومتابعة تحديثه. مراقبة الالتزام بمعايير كفاءة وترشيد المياه، واتخاذ جميع التدابير التي تحقق ذلك. الحصول على المعلومات والوثائق المتعلقة بكفاءة وترشيد المياه من أي شخص مستخدم للمياه، وإنشاء وتطوير قاعدة البيانات اللازمة لتحقيق مهمات المركز، بالتعاون مع الجهات ذات العلاقة. إعداد تقارير دورية عن إنتاج واستهلاك وكفاءة وترشيد المياه، بالتعاون مع الجهات ذات العلاقة، وفقاً للإجراءات النظامية المتبعة. تشجيع إجراء الدراسات والبحوث في المجالات المتعلقة بكفاءة وترشيد المياه. تشجيع ودعم الاستثمار والتمويل في المجالات التي تهدف إلى تحقيق كفاءة وترشيد المياه. تشجيع ودعم إقامة برامج تدريبية ومهنية وتوعوية في المجالات المتعلقة بكفاءة وترشيد المياه. اعتماد برامج تدريبية ومهنية وجهات مانحة للشهادات المختصة بالتدريب، في المجالات المتعلقة بكفاءة وترشيد المياه، بالتنسيق مع الجهات ذات العلاقة. التنسيق والمتابعة
    لإعداد مناهج وأنشطة لكفاءة وترشيد المياه في التعليم العام والعالي والمهني، وذلك بالتعاون مع الجهات والمؤسسات التعليمية ذات العلاقة. إقامة المعارض والمؤتمرات والندوات والحملات التوعوية المتعلقة بكفاءة وترشيد المياه، بالتنسيق مع الجهات ذات العلاقة، وفقاً للإجراءات النظامية المتبعة. تمثيل المملكة خارجيًّا في المجالات المتعلقة بكفاءة وترشيد المياه، وفقاً للإجراءات النظامية المتبعة. وضع قواعد تضمن المحافظة على سرية أي معلومة حصل عليها المركز من أي شخص، بما في ذلك حظر إفشاء أي معلومة سرية يحصل عليها أي شخص أثناء أدائه لمهماته بصفته عضواً في المجلس أو أحد منسوبي المركز أو مستشاراً له. إبرام اتفاقيات ومذكرات تفاهم مع الهيئات الدولية والإقليمية -وفق الإجراءات النظامية المتبعة- وكذلك إبرام اتفاقيات ومذكرات تفاهم مع الهيئات المحلية الحكومية والجهات غير الحكومية من الشركات والمؤسسات، للاستفادة من أفضل التقنيات والأنظمة والبحوث والدراسات في المجالات المتعلقة بكفاءة وترشيد المياه. أي اختصاص آخر يُسند إليه نظامًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير، وعضوية كل من: ممثل من وزارة البيئة والمياه والزراعة. ممثل من وزارة التجارة. ممثل من وزارة الشؤون البلدية والقروية. ممثل من وزارة المالية. ممثل من وزارة الإسكان. ممثل من وزارة التعليم. ممثل من وزارة الشؤون الإسلامية والدعوة والإرشاد. ممثل من وزارة الطاقة. ممثل من وزارة الصناعة والثروة المعدنية. ممثل من الهيئة السعودية للمواصفات والمقاييس والجودة. ممثل من الهيئة العامة للجمارك. ممثل من المركز السعودي لكفاءة الطاقة. ممثل من شركة المياه الوطنية. اثنان من المتخصصين وذوي الخبرة في مجال عمل المركز، يعينان بقرار من مجلس الوزراء -بناءً على ترشيح من الوزير- لمدة (ثلاث) سنوات قابلة للتجديد لمرة واحدة. ويجب ألا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على إدارة شؤون المركز وتصريف أموره، ويتخذ جميع القرارات اللازمة لتحقيق أغراضه في حدود ما تضمنته أحكام التنظيم، وله على وجه خاص الاختصاصات الآتية: رسم توجهات المركز الأساسية، واعتماد الخطط والبرامج والسياسات اللازمة لتحقيقها، والإشراف على تنفيذها. اعتماد الهيكل التنظيمي للمركز. اعتماد اللوائح المالية والإدارية وغيرها من اللوائح الداخلية والفنية، على أن يكون اعتماد اللوائح المالية والأحكام ذات الأثر المالي الواردة في اللوائح الإدارية بالاتفاق مع وزارة المالية. تحديد المقابل المالي الذي يتقاضاه المركز عن الرخص والأعمال والخدمات التي يقدمها. اعتماد البرامج الوطنية لكفاءة وترشيد المياه. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. قبول التبرعات والهبات والمنح والوصايا والأوقاف والمساعدات التي تُقدَّم إلى المركز، وفقاً للأحكام المنظمة لذلك. تعيين مراقب مالي داخلي، وتحديد أتعابه. تشكيل فرق العمل واللجان من أعضاء المجلس أو من غيرهم، وتحديد اختصاصاتها. ويجوز
    للمجلس تفويض أي من اختصاصاته أو بعضها إلى من يراه من المسؤولين في المركز وفق ما يقتضيه سير العمل فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس أربع مرات في السنة على الأقل بناءً على دعوة من رئيسه، وكلما اقتضت المصلحة ذلك، ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. وعلى الرئيس أن يدعو المجلس إلى الاجتماع متى طلب ذلك خمسة من أعضائه على الأقل. تعقد اجتماعات المجلس في مقر المركز. ويجوز عند الحاجة عقدها في أي مكان آخر داخل المملكة. للرئيس إنابة من يرى من أعضاء المجلس -من ممثلي الجهات الحكومية- لرئاسة اجتماع المجلس عند الحاجة. يشترط لصحة انعقاد المجلس حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع، ولا يجوز للعضو الامتناع عن التصويت ولا تفويض عضو آخر بالتصويت عنه عند غيابه. يجوز للمجلس أن يصدر قراراته بالتمرير عن طريق عرضها على جميع الأعضاء متفرقين ما لم يطلب خمسة أعضاء -كتابةً- عقد اجتماع للمداولة فيها. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. للمجلس أن يدعو لحضور جلساته
    من يرى الاستعانة بخبراتهم ومعلوماتهم، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي يعيّن بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون هو المسؤول التنفيذي عن إدارة المركز، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم واللوائح وما يقرره المجلس، ويمارس الاختصاصات الآتية: القيام بأمانة المجلس، والتحضير لاجتماعاته، والدعوة إليها، وإعداد محاضر اجتماعات المجلس وقراراته ومتابعة تنفيذها. الإشراف على سير عمل المركز والعاملين فيه، وفقاً للصلاحيات المنوطة به وما تحدده لوائح المركز. اقتراح الهيكل التنظيمي للمركز ولوائحه المالية والإدارية والداخلية والفنية، ورفعها إلى المجلس لاعتمادها، والإشراف على تنفيذها بعد اعتمادها. إعداد مشروع ميزانية المركز ومشروع حسابه الختامي وتقريره السنوي، ورفعها إلى المجلس. الموافقة على عقد المركز للمؤتمرات والندوات واللقاءات المتعلقة بعمله. التوقيع على الاتفاقيات ومذكرات التفاهم، وفقاً للإجراءات النظامية المتبعة. تعيين العاملين في المركز من ذوي الكفاية والإشراف عليهم، وفقاً للأنظمة واللوائح ذات العلاقة. التعاقد مع الخبراء والمختصين والمستشارين في المجالات ذات العلاقة بعمل المركز، والموافقة على
    الدراسات الاستشارية ونتائجها. تمثيل المركز أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات والمنظمات المعنية، وغيرها من الجهات أو المؤتمرات أو الفعاليات داخل المملكة وخارجها، وله تفويض غيره بذلك. إعداد تقارير دورية عن أعمال المركز وإنجازاته وأنشطته والمعوقات التي تواجهه، ورفعها إلى المجلس تمهيداً لاستكمال ما يلزم في شأنها. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. ممارسة أي صلاحية يسندها إليه المجلس أو التنظيم أو اللوائح. وله تفويض أي من صلاحياته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة. وتكون السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد المركز مما يأتي: أ- ما يخصص له من اعتمادات في الميزانية العامة للدولة. ب-المقابل المالي الذي يتقاضاه عن الرخص والأعمال والخدمات التي يقدمها. ج- ما يقبله المجلس من التبرعات والهبات والمنح والوصايا والأوقاف والمساعدات. د-أي مورد آخر يقره المجلس، بما لا يخالف الأنظمة والتعليمات. تودع أموال المركز في حساب جاري وزارة المالية لدى مؤسسة النقد العربي السعودي. يفتح المركز حساباً له في مؤسسة النقد العربي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة. ويصرف من هذه الحسابات وفق ميزانيته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو المركز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة في الرقابة على حسابات المركز وعملياته، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المُرخَّص لهم بالعمل في المملكة، ويحدد المجلس أتعابه (أتعابهم)، ويُرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fb9e0ae5-12c0-4ebd-816d-accd0174328c/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يرفع المركز إلى مجلس الوزراء -خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية- حسابه الختامي السنوي، وتقريراً سنويًّا عما حققه من إنجازات وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
