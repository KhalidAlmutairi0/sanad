articles:
- article_ref: المادة الأولى  تعريفات
  article_text_ar: 'لأغراض تطبيق هذا النظام، يكون للعبارات والألفاظ الآتية المعاني المبينة أمام كل منها، ما لم يقتضي السياق غير ذلك: النظام : النظام الأساسي للمجلس الدولي للتمور. العضو : الدولة أو المنظمة أو الهيئة التي تتمتع بالعضوية الكاملة أو المشاركة. المجلس : المجلس الدولي للتمور. الأغلبية البسيطة للتصويت : تصويت 50% + 1 من الأعضاء الحاضرين - على الأقل - في اجتماع مستوف النصاب القانوني. الأغلبية المعرفة : تصويت ثلثي الأعضاء الحاضرين - على الأقل - في اجتماع مستوف النصاب القانوني. الهيئة التنفيذية : هيئة منتخبة تعمل على تنفيذ قرارات وتوجهات مجلس الأعضاء. مجلس الأعضاء : أعلى جهاز لاتخاذ القرارات بالمجلس الدولي للتمور. الأمانة العامة للمجلس : الجهاز التنفيذي للمجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثانية  الوضع القانوني
  article_text_ar: ينشأ بموجب هذا النظام مجلس يسمى المجلس الدولي للتمور IDC) International Date Council)، ويشار إليه فيما بعد بـ "المجلس"، ويتمتع بالشخصية القانونية الدولية المستقلة في حدود الأهداف والمهمات المنصوص عليها في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثالثة أهداف المجلس
  article_text_ar: 'يهدف المجلس إلى الآتي : 1 - تعزيز التعاون الدولي بين الدول الأعضاء في كل المجالات المطلوبة لتطوير قطاع التمور.2 - تطوير إنتاج وجودة التمور والعمل على تحسين تصنيعها. 3 - تعزيز المساهمة في رفع مستوى الدخل والمعيشة للعاملين في مجال التمور وفي تحقيق التنمية الزراعية والريفية المستدامة والأمن الغذائي والتوازن البيئي والاستعمال الأمثل للموارد الطبيعية وبخاصة المياه.4 - تطوير التجارة الدولية للتمور وتحقيق مزيد من الشفافية فيها، ودعم تسويقها محلياً وإقليمياً ودولياً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الرابعة  مهمات المجلس
  article_text_ar: 1 - تقديم الدعم الفني والاستشارات والمعلومات التي تساعد على تحقيق الأهداف المتعلقة بالتنمية المستدامة للتمور والتطوير الفعال للتسويق الداخلي والتجارة الخارجية.2 - طرح نظم وأساليب وقواعد لتشجيع وتسهيل تبادل الخبرات والتجارب والمعلومات بين الدول الأعضاء والمساهمة في تنفيذها.3 - إعداد وتنفيذ برامج بالتعاون بين الدول الأعضاء والمنظمات الإقليمية والدولية المعنية لتطوير مراكز بحوث محلية وإقليمية ودولية متميزة تسهم في حل المشكلات المشتركة لتحقيق التنمية المستدامة لقطاع التمور والمحافظة على سلامة البيئة.4 - الإستخدام الأمثل للموارد الطبيعية في إنتاج تمور ذات جودة عالية وبحسب متطلبات واحتياجات وأذواق المستهلكين في السوق المحلية والدولية. 5 - وضع برامج تدريب الكوادر والقوى العاملة وتنمية القدرات المؤسسية في جميع مجالات قطاع التمور والعمل على تنفيذ هذه البرامج بالتعاون مع الدول الأعضاء والمنظمات والهيئات المحلية والإقليمية والدولية. 6 - المساعدة في إعداد برامج إرشادية للمكافحة المتكاملة لآفات النخيل والتمور، والمساهمة في إعداد برامج لمنع انتشار أمراض وآفات النخيل والتمور العابرة
    للحدود. 7 - تحديد وتنفيذ برنامج لتطوير وتعميم وتوحيد مواصفات قياسية دولية للتمور والعمل على مراقبة ومتابعة تنفيذها وكذلك توحيد المصطلحات وأسماء الأصناف المختلفة للتمور والموازين والمقاييس. 8 - إعداد وتنفيذ برامج تسويقية ودعائية لاستهلاك التمور محلياً وإقليمياً ودولياً وإعداد دليل تجاري لكل الشركات المصدرة والموردة للتمور ومنتجاتها للمساعدة في تنمية وتسهيل الاتصالات وانسياب التجارة الدولية.9 - مساعدة الدول في وضع برامج لتطوير معاملات ما بعد الحصاد وإعداد برامج وخطط لتطوير تصنيع التمور الموجهة نحو احتياجات وأذواق المستهلكين محلياً وإقليمياً ودولياً.10 - إعداد وتنفيذ برنامج للمحافظة على الموارد الوراثية والتنوع الوراثي للنخيل، والمساهمة في إنشاء مجمعات محلية وإقليمية ودولية للمحافظة على الموارد الوراثية. 11 - تشجيع إقامة المعارض المحلية والإقليمية والدولية في الترويج لإنتاج التمور واستهلاكها وتجارتها وتوطين التكنولوجيا الملائمة لتطويرها. 12 - تعزيز دور القطاع الخاص في إنتاج وتسويق التمور.13 - تشجيع الاستثمار في زراعة النخيل وإنتاجه وتصنيعه وتجارته.14 - تعزيز التعاون والتنسيق مع المنظمات
    الإقليمية والدولية ذات الصلة.15 ـ توفير قاعدة بيانات لإنتاج التمور وتوزيعها، ونشر وتبادل المعلومات الأساسية المتعلقة بالإنتاج والتصنيع والتسويق والتجارة الخارجية والمواصفات والأسعار، وإصدار مؤشر دولي لأسعار التمور.16 - وضع قواعد أساسية للتعاون الدولي في قطاع التمور للمحافظة على حقوق الملكية الفكرية في إنتاج وتصنيع التمور وحماية المستهلك ومنع الغش والتدليس في تجارة التمور محليًّا وإقليميًّا ودوليًّا.17 ـ تشجيع وتطوير العمل الجماعي الإقليمي والدولي المشترك لتنمية القدرات البشرية والمؤسسية في قطاع التمور بالدول الأعضاء، وكذلك لإيجاد الحلول للمشكلات المتشابهة بين الأعضاء، وتبادل الخبرات والمعلومات من خلال البحوث العلمية والتطبيقية، وتدريب الكوادر، ونشر الوعي والمعرفة، والترويج للتمور، ونقل التكنولوجيا الملائمة، وتطبيق الممارسات الإنتاجية والتصنيعية والتسويقية الجيدة.18- العمل على الدفاع - في المنتديات الدولية والإقليمية - عن القضايا المتعلقة بتطوير إنتاج ووقاية وتجارة التمور وتسهيل تبادل الخبرات والمعلومات وتعزيز التواصل المستمر بين الأعضاء عن طريق الاجتماعات الدورية لمتابعة القضايا ذات
    الاهتمام المشترك، وتقديم المعلومات المطلوبة عن التمور، وترسيخ دور المجلس ليكون مركزاً عالمياً متميزاً للتوثيق والإعلام ومرجعياً في كل الأمور المتعلقة بالتمور.19 ـ تشجيع زيادة الطلب على التمور ولا سيما من أجل الاستخدامات غير التقليدية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الخامسة  المقر
  article_text_ar: يكون المقر الدائم للمجلس في مدينة الرياض بالمملكة العربية السعودية وله أن ينشئ مكاتب فرعية خارج دولة المقر عند الضرورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السادسة  الامتيازات والحصانة
  article_text_ar: تبرم دولة المقر والمجلس اتفاقية مقر تنظم وضع المجلس والامتيازات والحصانة الممنوحة له، وتشمل المدير التنفيذي للمجلس وكبار موظفيه ومستشاريه والخبراء المتعاقدين مع المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السابعة  أنواع العضوية
  article_text_ar: '1 - العضوية الكاملة : تكون للدول المنتجة للتمور التي قبلت وصدقت على النظام، أو التي تتقدم بطلب الانضمام إلى المجلس، على أن يوافق مجلس الأعضاء بالإجماع على انضمامها. 2 - العضوية المشاركة : تكون للدول المستوردة للتمور، والمنظمات والهيئات الإقليمية والدولية الراغبة في ذلك، وبعد مصادقة مجلس الأعضاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثامنة  حقوق العضو الكامل
  article_text_ar: 'تتمتع الدول الكاملة العضوية بالحقوق الآتية : 1- حضور اجتماعات مجلس الأعضاء، والاجتماعات الأخرى والنشاطات التي يدعو إليها المجلس. 2 - الحق في التصويت في الاجتماعات، والترشح لجميع مناصب ووظائف المجلس.3 - المشاركة في كل هيئات المجلس. 4 - التمثيل بمقعد واحد في مجلس الأعضاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة التاسعة التزامات الأعضاء
  article_text_ar: 'يلتزم الأعضاء بالآتي : 1 - تنفيذ قرارات المجلس بما لا يتعارض مع سيادة الدول وحريتها في إتخاذ القرارات.2 - سداد التزاماتهم المالية للمجلس في الأوقات المحددة بصفة مستمرة.3 - التعاون فيما بينهم لتحقيق الأهداف المعلنة في هذا النظام. 4 - السعي لتزويد المجلس بصفة مستمرة بكل البيانات والإحصاءات والوثائق المطلوبة عن إنتاج وتصنيع وتسويق وتجارة التمور في بلدانهم وأي معلومة أخرى يطلبها المجلس وهيئاته ولجانه المتخصصة لأداء المهمات المنوطة بهم، وذلك بما لا يتعارض مع قوانين دولة العضو. 5 - تطبيق المواصفات والمعايير الموحدة للجودة - التي اعتمدها المجلس - في التجارة الإقليمية والدولية. 6 - السعي إلى تنفيذ توجهات المجلس الخاصة بالممارسات الجيدة في إنتاج التمور وتصنيعها وتسويقها.7 - تطوير التجارة الدولية للتمور وتحقيق الشفافية فيها من خلال اتِّبَاع المبادئ والقواعد التوجيهية الصادرة عن المجلس، والاتفاقيات الدولية الأخرى المتعلقة بالتجارة الدولية. 8 - الإسهام في تطوير أنشطة الترويج للتمور محلياً وإقليمياً ودولياً من أجل زيادة استهلاك التمور عن طريق الحملات الإعلامية والثقافية والتعليمية
    والصحية؛ للتعريف بالتمور ومنتجاتها والترغيب في استهلاكها، وذلك بتوضيح خصائصها العضوية والطبيعية والكيميائية والغذائية والمذاقية وغيرها. 9 - توفير المساعدات والتسهيلات الضرورية لتمكين المجلس من أداء المهمات المنوطة به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة العاشرة  حقوق العضو المشارك
  article_text_ar: يحق للدول أو المنظمات الحاصلة على العضوية المشاركة حضور اجتماعات ونشاطات المجلس المفتوحة والمشاركة في النقاش، دون أن يكون لها حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الحادية عشر الهيكل التنظيمي
  article_text_ar: 'يتكون المجلس الدولي للتمور مما يأتي: أ ) مجلس الأعضاء. ب ) الهيئة التنفيذية.ج ) الأمانة العامة للمجلس.د ) اللجان المتخصصة التي يشكلها مجلس الأعضاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثانية عشر  مجلس الأعضاء
  article_text_ar: 1 - مجلس الأعضاء هو أعلى سلطة في المجلس يكون مسئولاً عن اتخاذ القرارات، واعتماد سياسات المجلس وبرامجه وخططه وميزانيته، ويحدد الأولويات والآليات والترتيبات لتحقيق أهداف المجلس، ويتألف مجلس الأعضاء من الأعضاء كاملي العضوية.2 - يعتمد المجلس - بتصويت خاص - اللوائح المالية والإدارية، واللوائح المنظمة لشئون منسوبي المجلس، وغيرها من اللوائح الداخلية للمجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثالثة عشر  اجتماعات مجلس الأعضاء
  article_text_ar: 1 - يعقد مجلس الأعضاء اجتماعاً عادياً مرة واحدة في السنة، وذلك في المقر الدائم للمجلس ما لم يقرر المجلس عقده في دولة عضو بناءً على دعوة من تلك الدولة. وفي كل الأحوال تبلغ الأمانة العامة الدول الأعضاء بمكان وموعد الاجتماع وذلك قبل ستة أسابيع على الأقل من الموعد المقرر.2 - يجوز عقد اجتماعات غير عادية لمجلس الأعضاء بناءً على طلب الرئيس أو طلب أربعة أعضاء على الأقل، على أن يبلغ الأعضاء بموعد الاجتماع وجدول أعماله قبل أربعة أسابيع على الأقل من بدء عقد هذه الدورة. وتعقد الاجتماعات غير العادية في المقر الدائم للمجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الرابعة عشر  رئيس مجلس الأعضاء ونائبه
  article_text_ar: 1 - ينتخب مجلس الأعضاء في أول اجتماع له رئيساً له ونائباً لمدة عامين قابلة للتجديد لمرة واحدة. ولا يتقاضى الرئيس أو نائب الرئيس أي مرتب ولكن يتحمل المجلس تكاليف سفرهما وإقامتهما عند حضور الاجتماعات.2 - يرأس الرئيس اجتماعات مجلس الأعضاء، وفي حالة غيابه يتولى رئاسة اجتماعات المجلس نائب الرئيس، وفي حالة غياب الرئيس ونائبه ينتخب مجلس الأعضاء مؤقتاً من بين أعضائه رئيساً ونائباً للرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الخامسة عشر النصاب القانوني لاجتماعات مجلس الأعضاء
  article_text_ar: يكتمل النصاب اللازم لكل دورة من دورات مجلس الأعضاء بحضور 50% + 1 من الأعضاء على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السادسة عشر  الموافقة على قرارات مجلس الأعضاء
  article_text_ar: تتخذ قرارات مجلس الأعضاء بتوافق الأعضاء، وفي حالة عدم التوافق يلجأ إلى الاقتراع، وتتخذ القرارات عندها بالأغلبية البسيطة، إلا في الحالات التي نص فيها النظام على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السابعة عشر  تقارير المجلس ووثائقه
  article_text_ar: 1 - يُصدر المجلس تقريراً سنوياً عن أنشطته وسير العمل فيه وتقويم أدائه.2 - اللغات الرسمية في اجتماعات المجلس هي العربية والإنجليزية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثامنة عشر المراقبون
  article_text_ar: يحق للمجلس - بإجماع الأعضاء - دعوة أي دولة أو منظمة أو هيئة دولية أو إقليمية أو محلية غير عضو مهتمة بنشاطات المجلس وأهدافه لحضور اجتماعات المجلس بصفة مراقب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة التاسعة عشر  التعاون والعلاقات مع المنظمات الأخرى
  article_text_ar: يعمل المجلس على التنسيق والتعاون والقيام بالنشاطات المشتركة مع المنظمات الإقليمية والدولية الحكومية وغير الحكومية المعنية بالاستهلاك وحماية المستهلك وسلامة الغذاء، وذلك لتعزيز التكامل مع أنشطة تلك المنظمات التي تعمل في المجالات التي تهم المجلس، ومنع الازدواج وتكرار الجهود.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة العشرون  الهيئة التنفيذية
  article_text_ar: '1- ينتخب مجلس الأعضاء هيئة تنفيذية تعمل على تنفيذ قراراته وتوجهاته، وتتولى الهيئة الرقابة المالية والإشراف على الأمانة العامة، وتكون مسئولة أمام مجلس الأعضاء وتعمل وفقاً لتوجهاته.2 - تكون الهيئة التنفيذية برئاسة رئيس مجلس الأعضاء، وأربعة أعضاء ينتخبهم مجلس الأعضاء من بين أعضائه لمدة سنتين، ويمثلون المناطق المختلفة بحسب التنظيم الإقليمي للشرق الأدنى لمنظمة الأغذية والزراعة للأمم المتحدة بواقع عضو واحد، وذلك على النحو الآتي : أ - منطقة مجلس التعاون الخليجي واليمن.ب - منطقة شمال أفريقيا. ج‌ - منطقة الشرق الأدنى (عدا دول مجلس التعاون وشمال أفريقيا). د‌ - الدول الأخرى. 3 - تحدد اللائحة الداخلية للمجلس مهمات الهيئة التنفيذية.4 - يشارك المدير التنفيذي للمجلس في مناقشات ومداولات اجتماعات الهيئة التنفيذية بحكم وظيفته، ولكن لا يحق له التصويت.5 ـ يحق لأي عضو في مجلس الأعضاء المشاركة في اجتماعات الهيئة التنفيذية عند مناقشة مواضيع تتعلق بذلك العضو، وذلك دون أن يكون له التصويت.6 ـ تعقد الهيئة التنفيذية اجتماعين سنوياً يكون أحدهما قبل اجتماع مجلس الأعضاء السنوي مباشرة، ويمكن عقد اجتماعات
    غير عادية للهيئة إذا طلب ذلك رئيس الهيئة أو ثلاثة من الأعضاء. 7 ـ تعقد الهيئة التنفيذية اجتماعاتها بحضور ثلاثة ممثلين على الأقل بالإضافة إلى رئيسها، وتتخذ قراراتها بالتوافق أو بالأغلبية البسيطة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الحادية والعشرون الأمانة العامة للمجلس
  article_text_ar: '1- تكون للمجلس أمانة عامة تُعنى بجميع الشؤون الإدارية والمالية والفنية للمجلس، وتشمل: أ‌ - إدارة أموال المجلس. ب‌ - التحضير لاجتماعات مجلس الأعضاء والهيئة التنفيذية واللجان. ج‌ - متابعة تنفيذ قرارات مجلس الأعضاء والهيئة التنفيذية خاصة المتعلقة بإجراء البحوث والدراسات والاستشارات والعون الفني والتدريب. د‌ - إعداد مسودات القوانين واللوائح الخاصة بالمجلس. 2 ـ تتكون الأمانة العامة من المدير التنفيذي، الذي يعد المسؤول الأول في الأمانة ويساعده مجموعة من العاملين، تحدد أعدادهم ومهماتهم بحسب متطلبات العمل وفقاً للهيكل التنظيمي للمجلس. 3 ـ يعين مجلس الأعضاء بالأغلبية البسيطة المدير التنفيذي بناءً على توصية من الهيئة التنفيذية التي تحدد مؤهلات المدير التنفيذي ومهماته، ويكون المدير التنفيذي مسئولاً أمام الهيئة التنفيذية ومجلس الأعضاء عن المهمات الموكلة إليه. 4 ـ يعين المدير التنفيذي العاملين معه بحسب الهيكل التنظيمي المعتمد واللوائح المنظمة لذلك. 5 ـ يكون المدير التنفيذي والعاملون معه مسئولون أمام الهيئة التنفيذية ومجلس الأعضاء فقط، وعليهم الامتناع عن القيام بأي عمل يتعارض مع أعمالهم،
    والالتزام بسرية معلومات المجلس، وألا تكشف أو تنشر إلا بتصريح أو تفويض من الهيئة التنفيذية أو مجلس الأعضاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثانية والعشرون الاتفاقيات ومذكرات التفاهم
  article_text_ar: للمجلس أن يبرم اتفاقيات أو مذكرات تفاهم للتعاون والشراكة مع مراكز بحوث النخيل والتمور والمراكز المتخصصة والجهات ذات العلاقة في المجالات ذات الاهتمام المشترك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثالثة والعشرون  المساهمات والاشتراكات
  article_text_ar: يحدد مجلس الأعضاء مبالغ المساهمات التي تلتزم الدول بسدادها، وفقاً لنوع العضوية المنصوص عليه في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الرابعة والعشرون الموارد المالية
  article_text_ar: 'تتكون الموارد المالية للمجلس مما يأتي : 1 ـ المساهمات السنوية.2 - المنح والتبرعات المالية والعينية المقدمة للمجلس التي يوافق عليها مجلس الأعضاء بالإجماع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الخامسة والعشرون إدارة أموال المجلس
  article_text_ar: للمجلس فتح حسابات مصرفية في دولة المقر أو خارجها، وتفوض الهيئة التنفيذية المدير التنفيذي ومسؤولاً آخراً من الأمانة العامة بالسحب من تلك المصارف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السادسة والعشرون الميزانية والمصروفات والتقارير المالية
  article_text_ar: 1 ـ يعد المدير التنفيذي ميزانية المجلس للسنة القادمة - قبل انتهاء السنة المالية الجارية - ويعرضها على الهيئة التنفيذية للمراجعة والتقييم، تمهيداً لعرضها على مجلس الأعضاء للموافقة عليها.2 - تحدد الهيئة التنفيذية - بشكل دوري - أوجه الصرف التي من شأنها تحقيق أهداف المجلس.3 - يتحمل المجلس تكاليف سفر وإقامة ممثل الدولة العضو في مجلس الأعضاء والهيئة التنفيذية. 4 ـ يتحمل المجلس تكاليف اجتماعات مجلس الأعضاء عندما تعقد في دولة المقر بدعوة من المجلس. أما إذا عقدت هذه الاجتماعات في إحدى الدول الأعضاء بناءً على دعوة منها، فتتحمل الدولة العضو كل التكاليف المحلية المتعلقة بتنظيم الاجتماع، ويتحمل المجلس سفر ممثلي الدول الأعضاء وإقامتهم.5 - يعد المدير التنفيذي تقارير مالية نصف سنوية عن الإيرادات والمصروفات وتنفيذ الميزانية ويرفعها إلى الهيئة التنفيذية، ويعد كذلك تقريراً مالياً سنوياً ويرفعه إلى مجلس الأعضاء لاعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السابعة والعشرون  المراجع المستقل
  article_text_ar: يعين مجلس الأعضاء ـ بناءً على توصية من الهيئة التنفيذية ـ مراجعاً مستقلاً يتولى مراجعة حسابات المجلس، وتكون مدة التعيين سنتين قابلة للتجديد مرة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثامنة والعشرون  جهة الإيداع
  article_text_ar: تُعيِّن حكومة المملكة العربية السعودية بموجب هذا النظام وديعاً له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة التاسعة والعشرون التوقيع
  article_text_ar: يفتح باب التوقيع على هذا النظام في المملكة العربية السعودية بمدينة الرياض بدءً من 29 محرم 1435هـ الموافق 2 ديسمبر 2013م.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثلاثون  التصديق والقبول والإقرار
  article_text_ar: 1 - يخضع هذا النظام للتصديق أو القبول أو الإقرار من جانب الدول الموقعة وفقاً للإجراءات النظامية لكل منها.2 - تودع وثائق التصديق أو القبول أو الإقرار أو الانضمام لدى المودع لديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الحادية والثلاثون  سريان النظام
  article_text_ar: يبدأ سريان النظام الأساسي للمجلس من تاريخ المصادقة عليه من طرف تسع دول على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثانية والثلاثون  الانضمام
  article_text_ar: يكون باب الانضمام إلى المجلس مفتوحاً أمام الدول المنتجة والمستوردة للتمور وفقاً لأحكام هذا النظام، ويكون الانضمام سارياً من اليوم التالي لإيداع الدولة وثيقة انضمامها لدى جهة الإيداع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثالثة والثلاثون تعليق العضوية
  article_text_ar: 1- تقدم الأمانة العامة للعضو الكامل الذي لم يسدد اشتراكاته السنوية إخطار بالدفع وبعد ستة أشهر من الإخطار يفقد الحق في التصويت ما لم يسدد ما بذمته. 2 - تقدم الأمانة العامة للعضو المشارك الذي لم يسدد اشتراكاته السنوية إخطار بالدفع خلال ستة أشهر من تاريخ الإنذار. 3 - تعلق العضوية في المجلس إذا لم يلتزم العضو بالدفع بعد سنة من الإخطار، ما لم يتقدم بعذر تقبله الهيئة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الرابعة والثلاثون  إسقاط العضوية
  article_text_ar: يحق لمجلس الأعضاء - عن طريق الأغلبية المعرفة - بتوصية من الهيئة التنفيذية إسقاط عضوية أي عضو ثبت أنه لم يدفع التزاماته المالية لمدة سنتين ماليتين بدون عذر مقبول، أو لم يقم بواجباته المنصوص عليها في هذا النظام، أو قام بتصرفات تعوق العمل بهذا النظام، دون أن يخل ذلك باستمرار إلزام العضو بتسديد كل ما عليه من التزامات. وعلى العضو المسقطة عضويته استرجاع عضويته إن رغب في ذلك بعد سداد ما عليه من التزامات مالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الخامسة والثلاثون  الانسحاب من عضوية المجلس
  article_text_ar: يجوز لأي عضو من أعضاء المجلس الانسحاب من المجلس إذا تقدم بإبلاغ كتابي لرئيس مجلس الأعضاء، الذي يبلغ بها الهيئة التنفيذية والأمانة العامة للمجلس، ويصبح الانسحاب من عضوية المجلس سارياً بعد ستة أشهر من تاريخ تسلم البلاغ، وعلى العضو المنسحب الوفاء بما عليه من التزامات خلال مدة عضويته قبل الانسحاب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السادسة والثلاثون  تسوية الخلافات
  article_text_ar: أي نزاع ينشأ بين الأعضاء بسبب تفسير أحكام هذا النظام أو تطبيقه يسوّى بالطرق الودية من خلال الاتصالات الرسمية والتفاوض بين الأعضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة السابعة والثلاثون  تعديل النظام
  article_text_ar: يجوز لمجلس الأعضاء - عن طريق التصويت الخاص - تعديل أي من أحكام هذا النظام بناءً على اقتراح من الهيئة التنفيذية أو من أحد الأعضاء يُرسل إلى رئيس المجلس قبل (120) يوماً من اجتماع مجلس الأعضاء، وإلى كل الأعضاء قبل (90) يوماً من اجتماع مجلس الأعضاء. ويصبح التعديل الموافق عليه سارياً بعد (90) يوماً من تاريخ إيداع ما لا يقل عن 50% من الدول الأعضاء لوثائق تصديقها أو قبولها أو إقرارها لهذا التعديل لدى جهة الإيداع. واستثناء من ذلك لا تعدل المواد (السابعة) و(الثامنة) و(التاسعة) و(الأربعون) من هذا النظام إلا بالإجماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الثامنة والثلاثون  التحفظات
  article_text_ar: لا يجوز إبداء التحفظات في شأن أي من أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة التاسعة والثلاثون إنهاء المجلس وتصفيته
  article_text_ar: 1 - يمكن لمجلس الأعضاء - عن طريق الأغلبية المعرفة - إنهاء عمل المجلس اعتباراً من التاريخ الذي يحدده مجلس الأعضاء في قراره.2 - عند الإنهاء، يُشكل مجلس الأعضاء لجنة مستقلة لتصفية وتسوية حسابات المجلس ويوزع الناتج من التسوية والأصول الأخرى على الأعضاء بنسب اشتراكهم، على ألا تحمل دولة المقر أي عجز ناتج عن هذه العملية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
- article_ref: المادة الأربعون  النسخ
  article_text_ar: حرر هذا النظام من نسختين أصليتين باللغتين العربية والإنجليزية، والنصان متساويان في الحجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0761b32-f420-4435-bd2f-a9a700f25a36/1
  verified: false
