  name_ar: تنظيم مركز الإسناد والتصفية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للكلمات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: المركز: مركز الإسناد والتصفية. الوزير: وزير العدل. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: ينشأ بموجب هذا التنظيم مركز يسمى "مركز الإسناد والتصفية", يتمتع بالشخصية الاعتبارية وبالاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير، ويكون مقره الرئيس في مدينة الرياض, وله إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى تحقيق التعاون بين الجهات القضائية والحكومية فيما يسند إليه من مهمات تتعلق بالتصفية والبيع من خلال إسنادها إلى الجهات المتخصصة فنيًّا والإشراف على أعمالها؛ للإسهام في تسريع عملية استيفاء الحقوق وإصدار الأحكام القضائية، وذلك من خلال قيامه بالمهمات والاختصاصات الآتية: القيام بما يلزم لتصفية التركات والشركات والصناديق والمساهمات، وبيع الأصول، وغير ذلك من الأموال؛ التي تسندها إليه الجهات القضائية والحكومية وفقاً للإجراءات النظامية. القيام بما يلزم لتصفية التركات والشركات والصناديق والمساهمات، وبيع الأصول، وغير ذلك من الأموال؛ التي ليس في شأنها نزاع منظور قضاءً وتقدم بطلبهما أصحاب الشأن للمركز، وذلك وفقاً للإجراءات النظامية. الاستعانة بالشركات أو المؤسسات أو المكاتب المتخصصة محاسبيًّا وقانونيًّا وتسويقيًّا وغيرها؛ لتنفيذ المهمات التي تتطلبها أعمال التصفية والبيع للأموال المشار إليها في الفقرتين (1) و(2) من هذه المادة. تقديم الخدمات الاستشارية والفنية في أعمال تصفية وبيع الأموال المشار إليها في الفقرتين (1) و(2) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير وعضوية كل من: أ- ممثل لوزارة العدل. ب- ممثل لوزارة المالية. ج- ممثل لوزارة التجارة والاستثمار. د- ممثل لمؤسسة النقد العربي السعودي. هـ- ثلاثة من القطاع الخاص من ذوي الخبرة في المجالات ذات الصلة بأعمال المركز، يعينون بأمر من رئيس مجلس الوزراء بناء على اقتراح من الرئيس. تكون مدة عضوية ممثلي الأجهزة الحكومية والأعضاء من القطاع الخاص ثلاث سنوات قابلة للتجديد لمرة واحدة، ويجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'للمجلس جميع الصلاحيات اللازمة لإدارة المركز وتصريف شؤونه وتحقيق أهدافه, وبخاصة ما يأتي: اعتماد السياسات العامة المتعلقة بنشاطات المركز والبرامج اللازمة لتنفيذها. إقرار هيكل المركز التنظيمي. النظر فيما يقدم إلى المركز من طلبات في ضوء اختصاصاته، وإصدار القرارات اللازمة في شأنها. تحديد آلية لإسناد أعمال التصفية والبيع إلى الجهات المتخصصة مع مراعاة الأحكام الشرعية والنظامية. الموافقة على فتح حسابات للمركز لدى البنوك المرخص لها بالعمل في المملكة؛ ليقوم المركز بمهماته واختصاصاته المنصوص عليها في المادة (الثالثة) من هذا التنظيم. تحديد المقابل المالي لما يقدمه المركز من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها وفقاً للأحكام الواردة في هذا التنظيم. إقرار اللوائح الإدارية والمالية -بالاتفاق مع وزارة المالية- وغيرها من اللوائح الداخلية اللازمة؛ لتسيير شؤون المركز. الموافقة على مشروع ميزانية المركز السنوية وحسابه الختامي وتقريره السنوي، تمهيداً لرفعها وفق الإجراءات النظامية المتبعة. النظر في التقارير الدورية عن سير العمل في المركز واتخاذ القرارات اللازمة في شأنها. الموافقة
    على إبرام الاتفاقات والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف وفقاً للأحكام المنظمة لذلك. تعيين مراجع حسابات خارجي ومراقب مالي داخلي. الموافقة على إنشاء فروع ومكاتب للمركز. وللمجلس -في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم, يعهد إليها بما يراه من مهمات, ويحدِّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها, ويكون لها الاستعانة بمن تراه لتأدية المهمات المعهود بها إليها. وللمجلس -كذلك- تفويض بعض اختصاصاته إلى الرئيس أو إلى من يراه من أعضائه أو منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعقد المجلس اجتماعاته في مقر المركز، وله -عند الاقتضاء- أن يعقدها في مكان آخر داخل المملكة. يجتمع المجلس مرة على الأقل كل (ثلاثة) أشهر بناء على دعوة من الرئيس التنفيذي بعد التنسيق مع الرئيس, أو كلما دعت الحاجة, أو إذا طلب ذلك -كتابة- ثلاثة من أعضائه على الأقل. يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء على الأقل, على أن يكون من بينهم الرئيس أو من ينيبه من الأعضاء ممثلي الجهات الحكومية لرئاسة الاجتماع في حال غيابه. وتصدر قرارات المجلس بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. لا يجوز للعضو الامتناع عن التصويت, أو تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل الاعتراض وأسبابه ضمن محضر اجتماع المجلس. لا يجوز للعضو أن يصوت على أي قرار يتعلق بشخص تربطه به علاقة زوجية أو مصاهرة أو قرابة إلى الدرجة الرابعة، أو يترتب عليه حق أو مصلحة للعضو. لا يجوز للعضو أن يفشي شيئاً من أسرار المركز. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين
    لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للمركز رئيس تنفيذي، يُعين ويعفى من منصبه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون المركز، وتتركز مسؤولياته في حدود هذا التنظيم وما يقرره المجلس، ويتولى الاختصاصات الآتية: اقتراح السياسات العامة المتعلقة بنشاطات المركز والبرامج اللازمة لتنفيذها. اقتراح مشروع هيكل المركز التنظيمي ورفعه إلى المجلس. تمثيل المركز أمام الجهات الحكومية والمؤسسات ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وأمام القضاء وله تفويض غيره في ذلك. تنفيذ قرارات المجلس ومباشرة ما يخوله إياه من اختصاصات وصلاحيات. اقتراح اللوائح الإدارية والمالية التي يسير عليها المركز وغيرها من اللوائح الداخلية، ورفعها إلى المجلس. إعداد مشروع ميزانية المركز السنوية وحسابه الختامي وتقريره السنوي، ورفعها إلى المجلس. إعداد التقارير الدورية عن سير العمل في المركز، ورفعها إلى المجلس. تعيين منسوبي المركز وفقاً للوائح الداخلية المنظمة، والإشراف عليهم. وللرئيس التنفيذي أن يفوض بعض اختصاصاته إلى من يراه من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتألف موارد المركز مما يأتي: نسبة لا تتجاوز (5%) من إجمالي حصيلة التصفية أو البيع مما يسند إليه من الجهات القضائية والحكومية شاملة جميع الأتعاب اللازمة لعملية التصفية أو البيع, وتحدد النسبة لكل مهمة بقرار من المجلس، وذلك ما لم تحدد الجهة القضائية المختصة مقابلاً عن ذلك. ما يتقاضاه من أصحاب الشأن نظير التصفية أو البيع. المقابل المالي للخدمات الاستشارية والفنية في أعمال التصفية أو البيع. ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. أي مورد آخر يقره المجلس, بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يفتح المركز حسابات له في مؤسسة النقد العربي السعودي أو في أي من البنوك المرخص لها بالعمل في المملكة, ويتم الصرف من هذه الحسابات وفق ميزانية المركز المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: السنة المالية للمركز هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع جميع منسوبي المركز لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يرفع المركز حسابه الختامي إلى مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يرفع المركز إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية تقريراً سنويًّا عما حققه من إنجازات خلال السنة المنقضية وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة في الرقابة على حسابات المركز، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة, ويحدد أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8847a132-156b-49e8-add9-aa52010570f2/1
  verified: false
