regulation:
  code: BOE380
  name_ar: تنظيم المركز السعودي للتحكيم التجاري
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها، ما لم يقتضِ السياق غير ذلك: التنظيم: تنظيم المركز السعودي للتحكيم التجاري. المركز: المركز السعودي للتحكيم التجاري. مجلس الغرف: مجلس الغرف السعودية. الغرف: الغرف التجارية والصناعية السعودية. المجلس: مجلس إدارة المركز. هيئة التحكيم: المحكم الفرد أو الفريق من المحكمين, الذي يفصل في النزاع المحال إلى التحكيم. اللجنة الدائمة: اللجنة المشار إليها في البند (أولاً) من قرار مجلس الوزراء رقم (107) وتاريخ 8 / 4 / 1437هـ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية وبالاستقلال المالي والإداري، ولا يهدف إلى الربح، ويعمل تحت مظلة مجلس الغرف، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع داخل المملكة وخارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يتولى المركز الإشراف على إجراءات التحكيم التي يتفق الأطراف على تسويتها في إطار المركز ووفق قواعده، وله على وجه خاص ما يأتي: 1- إدارة إجراءات التحكيم. 2- إعداد قائمة بأسماء المحكمين في مجال اختصاص المركز، يمكن للأطراف المعنية الاطلاع عليها والاختيار منها أو من غيرها. 3- وضع معايير استرشادية لتحديد أتعاب المحكمين المقيدين في المركز ومصروفاتهم. 4- تقديم التدريب والتأهيل في مجال التحكيم. 5- نشر ثقافة التحكيم، ودعم الأنشطة البحثية فيها. 6- المشاركة في تمثيل المملكة في مجال التحكيم التجاري محليًّا ودوليًّا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يسهم مجلس الغرف في دعم خدمات المركز، وتسويقها، وبناء العلاقات الفاعلة مع القطاع الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- يستقل أعضاء المجلس وموظفو المركز عن مجلس الغرف والغرف في ممارسة عملهم، ولا يتلقون منهم أي تعليمات تتصل بأدائهم لعملهم. 2- تستقل هيئة التحكيم عن المجلس في ممارسة عملها في إدارة إجراءات القضايا المنظورة، ولا تتلقى منه أي تعليمات تتصل بأدائها لعملها في تلك القضايا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يكون تشكيل مجلس إدارة المركز بأمر من رئيس مجلس الوزراء بناء على ترشيح يتفق عليه بين وزارة التجارة والاستثمار، ووزارة العدل، بالتنسيق مع اللجنة الدائمة، وتكون مدة العضوية فيه (ثلاث) سنوات قابلة للتجديد مرة واحدة، ويكون رئيس المجلس ونائبه وأعضاؤه ممن سبق لهم العمل في القطاع الخاص ذي الصلة لمدة لا تقل عن (عشر) سنوات للرئيس و(خمس) سنوات للأعضاء، ولا يكون أي منهم شاغلاً لمنصب أو وظيفة حكومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا المهيمنة على شؤون المركز وتصريف شؤونه، وله ما يأتي: 1- اعتماد استراتيجية المركز، وسياساته، وخططه، وبرامجه. 2- اعتماد اللوائح الداخلية للمركز، والتي من ضمنها اللوائح الإدارية والمالية. 3- إقرار الهيكل التنظيمي للمركز. 4- تشكيل اللجان التابعة للمجلس واعتماد صلاحياتها. 5- اعتماد قواعد التحكيم، ومعايير السلوك الأخلاقي للأطراف ذات العلاقة. 6- اعتماد معايير القيد في قوائم المحكمين. 7- إقرار المقابل المالي للخدمات التي يقدمها المركز. 8- الموافقة على إنشاء فروع للمركز. 9- اعتماد لائحة استثمار أموال المركز الفائضة عن الحاجة، والإشراف على تنفيذها. 10- قبول الهبات والتبرعات والوصايا والأوقاف. 11- تعيين مراجع (أو أكثر) لحسابات المركز، وتحديد أتعابه. 12- الموافقة على ميزانية المركز وحسابه الختامي وتقريره السنوي، وتزويد مجلس الغرف بنسخة من كل منها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يختص رئيس المجلس بتمثيل المجلس أمام الغير، والإشراف على أعماله وإدارة جلساته، وينوب عنه نائب الرئيس حال غيابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجتمع المجلس بدعوة من الرئيس بشكل ربع سنوي وكلما دعت الحاجة إلى ذلك، ويجب أن تشتمل الدعوة على جدول الأعمال. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حال تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. وللمجلس أن يدعو من يراه لحضور جلساته دون أن يكون له حق التصويت، وتثبت مداولات المجلس في محاضر يوقعها رئيس الاجتماع وأعضاء المجلس الحاضرون، ولا يجوز للعضو الاشتراك في المداولة في الموضوعات التي يكون له فيها مصلحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يعد عمل المجلس ذا طبيعة سرية، ويجب على كل من شارك في أعماله بأي صفة المحافظة على هذه السرية، حتى بعد انتهاء عمله في المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تنتهي العضوية في المجلس بأحد الأسباب الآتية: 1- انتهاء مدتها. 2- تعيين العضو في منصب أو وظيفة حكومية. 3- وفاة العضو. 4- فقد العضو الأهلية الشرعية أو عجزه عن أداء مهمات العضوية. 5- استقالة العضو كتابيًّا. 6- غياب العضو عن ثلاثة اجتماعات متوالية أو خمسة متفرقة في الدورة الواحدة دون عذر يقبله المجلس. ولا تعد العضوية منتهية إلا بصدور قرار من المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يكون للمركز رئيس تنفيذي يعين بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، وصلاحياته ومسؤولياته، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم، وما يقره المجلس، وله بوجه خاص الاختصاصات والصلاحيات الآتية: 1- اقتراح خطط المركز وبرامجه، والإشراف على تنفيذها بعد الموافقة عليها. 2- اقتراح اللوائح الداخلية، والتي من ضمنها اللوائح الإدارية والمالية. 3- اقتراح الهيكل التنظيمي للمركز. 4- اقتراح المقابل المالي للخدمات التي يقدمها المركز. 5- إدارة أعمال المركز. 6- الإشراف على الإعداد لاجتماعات المجلس. 7- حضور اجتماعات المجلس دون أن يكون له حق التصويت. 8- متابعة تنفيذ قرارات المجلس. 9- تعيين موظفي المركز، والإشراف على أعمالهم، وتقويم أدائهم، واتخاذ التدابير التأديبية في حقهم، وفقاً للوائح المركز والأنظمة ذات العلاقة. 10- تطوير علاقات المركز مع الشركاء المحليين والدوليين الفاعلين في نشاطه، وإبرام اتفاقيات التعاون ومذكرات التفاهم ذات الصلة. 11- فتح الحسابات المصرفية الخاصة بالمركز في البنوك المرخص لها بالعمل في المملكة، وتوقيع أوامر الصرف والحوالات المالية بحسب الميزانية
    المعتمدة. 12- إبرام العقود الخاصة بالمركز. 13- تمثيل المركز أمام القضاء والجهات الحكومية الأخرى والخاصة. 14- إعداد مشروع ميزانية المركز ومشروع حسابه الختامي وتقريره السنوي؛ تمهيدًا لعرضها على المجلس. وللرئيس التنفيذي تفويض من يراه في بعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تتكون موارد المركز مما يأتي: 1- ما قد يخصص له من مجلس الغرف والغرف. 2- المقابل المالي للخدمات التي يقدمها في مجال اختصاصه. 3- عوائد استثماراته. 4- الهبات والتبرعات والوصايا وعائدات الأوقاف. 5- أي مورد آخر يوافق عليه المجلس، بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع منسوبو المركز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/54ff827d-8488-49aa-b593-aa4400c961fd/1
  verified: false
