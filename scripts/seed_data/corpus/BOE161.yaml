regulation:
  code: BOE161
  name_ar: قانون (نظام) المبيدات في دول مجلس التعاون لدول الخليج العربية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يهدف هذا القانون(النظام) إلى تنظيم عمليات إنتاج واستيراد وتداول المبيدات بدول مجلس التعاون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يقصد بالتعابير والمصطلحات التالية المعاني المبينة أمامها ما لم يقتض سياق النص غير ذلك : المجلس : مجلس التعاون لدول الخليج العربية . دول المجلس : دول مجلس التعاون لدول الخليج العربية . المجلس الأعلى : المجلس الأعلى لمجلس التعاون لدول الخليج العربية . الأمانة العامة : الأمانة العامة لمجلس التعاون لدول الخليج العربية . الدولة : إحدى الدول الأعضاء بمجلس التعاون لدول الخليج العربية . الوزارة : وزارة الزراعة أو الهيئة المسئولة عن الزراعة في الدولة . الوزير : الوزير المسئول عن الزراعة أو رئيس الهيئة المسئولة. السلطة المختصة : الجهة المسئولة عن كل ما يختص بالمبيدات . القانون (النظام) : قانون (نظام) المبيدات لدول مجلس التعاون لدول الخليج العربية . التسجيل : عملية تقييم البيانات العلمية الشاملة التي تبيّن نوعية وفاعلية المبيد في المجال الزراعي ومدى فعاليته ضد الآفة المسجل لمكافحتها والتأكد من عدم خطورته على الإنسان والحيوان والبيئة بصفة عامة عند استخدامه طبقا للبيانات المدونة على بطاقة المعلومات المعتمدة والتأكد من تسجيله في بلد المنشأ في هيئتيه الخام والمنتج النهائي والذي على
    أساسه تتم الموافقة على استيراده أو تصنيعه محلياً وتداوله ويتم إدراجه في سجلات السلطة المختصة تحت رقم معين وإصدار شهادة تسجيل له حسب نموذج معين. المبيد : أي منتج كيماوي عضوي أو غير عضوي مخلق أو طبيعي أو منتج أحيائي يضم عناصر من الكائنات الحية الدقيقة يستخدم في مكافحة الآفات ( وتشمل أيضاً المواد الجاذبة والطاردة ) أو كمنظمات النمو النباتية أو كمسقطات أوراق أو مجففات عامة أو منظمات النتح. المبيد المقيد : المبيد الوارد في قائمة المبيدات المقيدة التي يصدرها الوزير نظرا لخطورته عند الاستخدام ولا يسمح باستخدامه إلا بمعرفة الأشخاص المعتمدين وتحت إشراف الجهات الحكومية ذات العلاقة أو الشركات أو المؤسسات المتخصصة المصرح لها من قبل الوزارة . المبيد المحظور : المبيد الوارد في قائمة المبيدات المحظورة التي يصدرها الوزير نظراً لسميته العالية أو لتأثيره الضار على عناصر البيئة المختلفة ولا يسمح بتداوله. التداول : البيع أو العرض للبيع والتخزين أو الحيازة ، سواء كانت دائمة أو مؤقتة أو النقل بأي وسيلة من الوسائل. الاستيراد : إدخال المبيدات الى الدولة لجهة عامة أو خاصة ، سواء كانت بالطرود البريدية أو الشحن
    مستقلا أو بصحبة مستوردين . الآفة : أي نوع أو سلالة أو نمط بيولوجي من الكائنات النباتية أو الحيوانية أو أي عامل ممرض أو مؤذ للنباتات والحيوانات أو المنتجات النباتية و الحيوانية . اللائحة التنفيذية : اللائحة التنفيذية الصادرة تطبيقاً لهذا القانون (النظام).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتولى السلطة المختصة تسجيل المبيدات التي يجوز استيرادها أو تصديرها أو تصنيعها أو تداولها أو استخدامها في الدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: لا يجوز استيراد أو تصنيع أو تداول أي مبيد إلا بعد الحصول على ترخيص بذلك من السلطة المختصة بالدولة طبقا للقواعد والإجراءات المنصوص عليها في هذا القانون (النظام) ولائحته التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يصدر الوزير بناء على اقتراح السلطة المختصة القرارات الآتية: 1 - أنواع المبيدات المحظور استيرادها أو تداولها أو تصنيعها وتسمى قائمة المبيدات المحظورة وأنواع المبيدات المقيد استخدامها وتسمى قائمة المبيدات المقيدة.2 - شروط و إجراءات تسجيل المبيدات وحالات الغاء التسجيل.3 - شروط وإجراءات تصنيع وتجهيز واستيراد وتصدير وتداول المبيدات.4 - إجراءات أخذ عينات المبيدات وتحليلها والاجراءات التي تتبع في نظم الطعن أو التظلم وكيفية البت فيها.5 - شروط وإجراءات استخدام المبيدات وتحديد نسب المتبقيات المسموح بها في المنتجات الزراعية .6 - شروط إعلان ونشر بيانات المبيدات المسجلة متضمنا شروط تداولها وتوصيات السلطة المختصة بشأن استخدامها 7 - شروط إجراءات إتلاف المبيدات بالتنسيق مع الجهات ذات العلاقة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تحدد الجهة المختصة بالدولة ، الرسوم المستحقة طبقا لأحكام القانون (النظام) ولائحته التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للوزير السماح باستيراد بعض المبيدات المقيدة أو المحظورة لغرض البحث العلمي وفق الشروط المحددة في اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: للوزارة حق التفتيش على جميع الواردات والصادرات ومرافق التصنيع والتداول لأي مبيد من قبل موظفيها المعنيين في المحاجر الزراعية ونقاط التفتيش الجمركي على الحدود أو من توكل إليه الوزارة هذه المهمة وذلك لغرض التأكد من تنفيذ أحكام هذا النظام ( القانون ) وضبط الحالات المخالفة له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يحق للموظفين الرسميين الذين لهم صفة الضبطية القضائية دخول الأماكن التي يدخل نشاطها في أحكام هذا القانون (النظام) وذلك لغرض التأكد من تنفيذ أحكامه وضبط الحالات المخالفة لأحكامه أو لأحكام أخرى مشابهة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يعتبر كل من قام بالأعمال التالية مخالفا لأحكام هذا القانون ( النظام ) سواء قام بها بنفسه أو بشكل غير مباشر من خلال موظف أو وكيل : 1 - تعمد تغيير أو تشويه أو إتلاف جزء من البيانات الإيضاحية الملصقة على العبوة.2 - فتح العبوة أو / و إعادة تعبئتها بدون موافقة رسمية من السلطة المختصة.3 - الدعاية والإعلان عن أي مبيد دون أخذ موافقة من السلطة المختصة .4 - منع أو عرقلة موظفي الوزارة المعنيين بتطبيق أحكام هذا القانون (النظام) .5 - استيراد أو تداول أو تصنيع أي مبيد بدون الترخيص اللازم6 - استيراد أو تداول أو تصنيع أي مبيد تالف أو مغشوش أو منتهي الصلاحية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يترك لكل دولة تحديد العقوبات والغرامات اللازمة لمن يخالف أحكام هذا القانون ( النظام ) أو لائحته التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 1- للوزير إصدار اللائحة التنفيذية لهذا القانون (النظام) أو تعديلها بما يراه ضروريا للمصلحة العامة وفقاً لأحكام هذا القانون (النظام) والمعايير والاشتراطات التي حددتها الاتفاقيات الدولية ذات الصلة2 - تخطر الأمانة العامة باللائحة التنفيذية التي تصدر أو أي تعديل عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجوز للمتضرر من القرارات الصادرة تطبيقاً لأحكام هذا القانون ( النظام ) التظلم للوزير وفقاً لأنظمة التظلم المعمول بها في كل دولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: أي تعديل على هذا القانون ( النظام ) يجب أن يكون متفقا عليه من قبل الدول الأعضاء ، و أن لا يكون نافذا إلا بعد اعتماده من قبل المجلس الأعلى ، ويسري في شأن نفاذه ذات الإجراءات المنصوص عليها في المادة (15) .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعمل بهذا القانون بشكل إلزامي ويدخل حيز النفاذ بعد ستة أشهر من إقراره من قبل المجلس الأعلى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b79b62a-da9e-4f66-8a7d-a9a700f25369/1
  verified: false
