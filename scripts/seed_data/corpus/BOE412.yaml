  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: الهيئة: الهيئة العامة لعقارات الدولة. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. المحافظ: محافظ الهيئة. عقارات الدولة: جميع الأراضي والمباني المملوكة للدولة داخل المملكة وخارجها الـمنفكة عن الملكية الخاصة، الثابتة بصك تملك. الصك: الصك المثبت لملكية العقار الصادر من الجهة المختصة، أو ما يقوم مقامه بالنسبة إلى العقارات الواقعة خارج المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية، والاستقلال المالي والإداري، وترتبط – تنظيمياً – برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض، ولها فتح فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنظيم ما يتصل بعقارات الدولة، وحمايتها والمحافظة عليها، وكيفية التصرف بها، واستغلالها واستخدامها واستثمارها بالشكل الأمثل، والإشراف عليها، وتوحيد رسم السياسات المتعلقة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع مراعاة الاختصاصات الأخرى المسندة إلى الهيئة بموجب الأنظمة والأوامر والقرارات والتعليمات المتعلقة بشؤون عقارات الدولة، تتولى الهيئة جميع المهمات والاختصاصات المتصلة بشؤون عقارات الدولة، وبخاصة ما يأتي: الإشراف على عقارات الدولة. التصرف في عقارات الدولة، ويشمل ذلك الاستثمار، والتخصيص، والتأجير وتلبية احتياجات الجهات الحكومية من أراض ومبان، وغيرها من أنواع التصرف، وفقاً للأوامر والأنظمة والتعليمات المنظمة لذلك، على ألا يؤثر ذلك على قدرة الهيئة في تلبية احتياجات الجهات الحكومية من تلك العقارات. وضع السياسات العامة المتعلقة بشؤون عقارات الدولة، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. اقتراح مشروعات الأنظمة المتعلقة بشؤون عقارات الدولة، واقتراح تعديل القائم منها، ورفعها لاستكمال الإجراءات النظامية. وضع الإجراءات اللازمة لتثبيت ملكية الدولة لجميع عقاراتها، واستصدار صكوك على عقارات الدولة باسم عقارات الدولة. تمثيل الدولة أمام الجهات القضائية وشبه القضائية، داخل المملكة وخارجها في المنازعات المرتبطة بملكية عقارات الدولة أو الاعتداء
    عليها وذلك بالتنسيق مع الجهات المستفيدة منها. تخصيص عقارات الدولة للجهات الحكومية، وإلغاء تخصيصها عند الاقتضاء. ووضع الضوابط والإجراءات اللازمة لذلك. وضع آليات تضمن تحقيق التكامل والتنسيق بين الجهات الحكومية المعنية بشؤون عقارات الدولة، بما يمكنها من تنفيذ ما يسند إليها من مهمات، والبت في أي تنازع بينها. متابعة تطبيق الأنظمة واللوائح والتعليمات الخاصة بشؤون عقارات الدولة. حفظ أصول صكوك ووثائق ملكية عقارات الدولة. إبرام عقود واتفاقيات التمويل، بما في ذلك عقود القروض، وأدوات الدين من صكوك وما في حكمها؛ وذلك إلى حين صدور نظام عقارات الدولة. بناء وتطوير قاعدة بيانات إلكترونية متكاملة مع نظام معلومات جغرافية خاصة بعقارات الدولة، والتنسيق مع الجهات ذات العلاقة من أجل توحيد المعايير والمواصفات وفق أفضل الممارسات. وضع قواعد وضوابط لتقويم عقارات الدولة، وشرائها أو استئجارها. تحديد الحقوق المترتبة على استخدام عقارات الدولة. تقويم العقارات التي ترغب الجهات الحكومية في شرائها أو استئجارها، وذلك من الناحيتين المالية والفنية. تقويم عقارات الدولة، ومراجعته دورياً. وضع معايير ومواصفات -وفق أفضل الممارسات-
    لتشغيل عقارات الدولة وتطويرها، وإدارتها، وصيانتها. اعتماد معايير ومواصفات -وفق أفضل الممارسات- لبناء عقارات الدولة وتخطيطها وتصميمها وتنفيذها وتطويرها، وآليات وخيارات تمويلها. بالتنسيق مع الجهات المعنية. التعاون وتبادل الخبرات مع المنظمات والهيئات الإقليمية والدولية ذات الصلة بمهمات الهيئة، وبيوت الخبرة المتخصصة داخل المملكة وخارجها، وذلك في حدود اختصاصاتها. تأسيس الشركات أو المشاركة أو المساهمة فيها؛ وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها، بالاتفاق مع وزارة المالية، تسهم في تمكين الهيئة من أداء مهماتها وغاياتها، وتخدم الأهداف التي أنشئت من أجلها، ولها أن تُسند أداء بعض مهماتها إلى هذه الشركات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة وزير المالية، وعضوية كل من: محافظ الهيئة. ممثل عن وزارة الداخلية. ممثل عن وزارة العدل. ممثل عن وزارة المالية. ممثل عن وزارة الشؤون البلدية والقروية. ممثل عن وزارة البيئة والمياه والزراعة. ممثل عن وزارة الاقتصاد والتخطيط. ممثل عن وزارة الطاقة. ممثل عن وزارة الصناعة والثروة المعدنية. ممثل عن الهيئة العامة للعقار. ويجب ألا تقل مرتبة أعضاء المجلس عن (الرابعة عشرة) أو ما يعادلها. وتحدد مكافآتهم بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس الإشراف على شؤون الهيئة وإدارتها وتصريف أمورها، وله أن يتخذ القرارات اللازمة لتحقيق أغراضها في حدود أحكام التنظيم، وله على وجه خاص ما يأتي: إقرار السياسات العامة المتعلقة بشؤون عقارات الدولة، وخططها، وبرامجها، والرفع عما يستلزم استكمال إجراءات في شأنه. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل القائم منها، ورفعها لاستكمال الإجراءات النظامية. إقرار الضوابط والإجراءات اللازمة لتخصيص عقارات الدولة للجهات الحكومية، وإلغاء تخصيصها عند الاقتضاء. إقرار الهيكل التنظيمي للهيئة. إقرار لوائح الهيئة المالية والإدارية، وغيرها من اللوائح الداخلية، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية ووزارة الموارد البشرية والتنمية الاجتماعية. الموافقة على مشاريع استثمار العقارات الواقعة تحت تصرف الهيئة. الموافقة على استثمار أموال الهيئة بما يحقق أهدافها وفقاً للأحكام المنظمة لذلك. شراء العقارات، والتصرف في العقارات المملوكة لها، واستثمارها؛ وفق ضوابط يضعها المجلس. إقرار قواعد وآليات استثمار عقارات
    الدولة. الموافقة على مشروع ميزانية الهيئة السنوية والحساب الختامي والتقرير السنوي وتقرير مراجع الحسابات؛ تمهيداً لاستكمال الإجراءات النظامية المتبعة. تحديد المقابل المالي لما تقدمه الهيئة من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها، بالاتفاق مع وزارة المالية ومركز تنمية الإيرادات غير النفطية. تعيين مراجع حسابات خارجي، أو أكثر. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، وفقاً للإجراءات النظامية المتبعة. الموافقة على فتح فروع أو مكاتب للهيئة داخل المملكة. قبول الهبات والتبرعات والإعانات والمنح والوصايا والأوقاف، وفقاً للإجراءات النظامية المتبعة. الموافقة على تأسيس الشركات أو المشاركة أو المساهمة فيها؛ وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها، وذلك وفقاً للإجراءات النظامية. وللمجلس – في سبيل تحقيق أغراضه– تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات. ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها ومكافآتهم واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس -بقدر ما تقتضيه حاجة العمل- تفويض بعض اختصاصاته
    إلى رئيسه، أو إلى اللجان التابعة للمجلس، أو إلى المحافظ، وفقاً لما يقتضيه سير العمل في الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة الرئيس، ويجوز بموافقة رئيس المجلس عقدها في أي مكان آخر. يجتمع المجلس على الأقل مرة واحدة كل (أربعة أشهر)، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، بناءً على دعوة من رئيسه، على أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع، وعلى رئيس المجلس أن يدعو المجلس إلى الاجتماع متى طلب ذلك (أربعة) من أعضائه على الأقل، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم رئيس المجلس أو من ينيبه لرئاسة المجلس في حال غيابه. ويجوز عقد الاجتماع بالطرق الإلكترونية الآمنة. وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. وللمجلس أن يصدر قراراته بالتمرير. تدون مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض على أي قرار أن يثبت اعتراضه مُسبباً في المحضر. لا يجوز للعضو الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه. لا يجوز للعضو أن يفشي شيئاً مما اطلع عليه من أسرار الهيئة حتى بعد انتهاء عضويته في المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين
    والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت. يُعين المجلس أميناً له من منسوبي الهيئة، بناءً على ترشيح المحافظ، يتولى أعمال أمانة المجلس والإعداد للاجتماعات وتسجيل المداولات والقرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة محافظ بالمرتبة الممتازة، ويُعد المسؤول التنفيذي عن إدارتها، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم واللوائح الصادرة بناءً عليه، وما يقرره المجلس وله على وجه الخصوص مباشرة الاختصاصات الآتية: الإشراف على إعداد الهيكل التنظيمي للهيئة، ورفعه إلى المجلس. الإشراف على إعداد اللوائح المالية والإدارية وغيرها من اللوائح الداخلية لقيام الهيئة بمهامها ورفعها إلى المجلس. الإشراف على إعداد السياسات العامة وخططها وبرامجها، ومتابعة تنفيذها بعد إقرارها من المجلس. الإشراف على إعداد مشروع ميزانية الهيئة السنوي والحساب الختامي؛ ورفعها إلى المجلس. الإشراف على إعداد التقرير السنوي للهيئة، على أن يتضمن العقبات التي واجهتها واقتراح الحلول المناسبة لها، ورفعه إلى المجلس؛ للنظر فيه، لاتخاذ ما يراه في شأنه. الإشراف على سير العمل في الهيئة، وفقاً للوائح والخطط والبرامج المعتمدة. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناء عليه، بحسب الصلاحيات المخولة له. إصدار قرارات تخصيص عقارات الدولة للجهات الحكومية وإلغاء تخصيصها عند الاقتضاء، وفق الضوابط
    والإجراءات التي يُقرها المجلس. تعيين منسوبي الهيئة والإشراف عليهم، وفقاً للأنظمة واللوائح المعمول بها. الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المعمول بها، وفي حدود الصلاحيات التي يفوضه بها المجلس. تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفق ما يقتضيه سير العمل في الهيئة، وفقاً للأنظمة والصلاحيات التي يفوضه بها المجلس. التوقيع على الاتفاقيات ومذكرات التفاهم والعقود، وفقاً للإجراءات النظامية المتبعة. تقديم تقارير دورية إلى المجلس عن أعمال الهيئة. أي اختصاص آخر يكلفه به المجلس. وللمحافظ تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة، وفقاً لما يقتضيه سير العمل في الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتألف موارد الهيئة من الآتي: أ- ما يخصص لها من اعتمادات في الميزانية العامة للدولة. ب- نسبة لا تزيد عن (١٠٪) من العوائد المحصلة من استثماراتها لعقارات الدولة بالاتفاق مع وزارة المالية. ج- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها. د- ما يقبله المجلس من هبات وتبرعات وإعانات ومنح ووصايا وأوقاف. هـ- عوائد استثمار مواردها المالية المتاحة. و- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في مؤسسة النقد العربي السعودي، ويجوز لها فتح حسابات أخرى في البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من بداية كل سنة مالية تقريراً سنوياً عما حققته من إنجازات خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل فيها
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخضع منسوبو الهيئة – عدا المحافظ – لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تعامل الهيئة، من حيث إعفاء وارداتها من الرسوم الجمركية، بحسب القواعد المتبعة في شأن واردات المؤسسات والهيئات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويُزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9537b1e5-bfb5-499e-b0f9-accd0142beda/1
  verified: false
