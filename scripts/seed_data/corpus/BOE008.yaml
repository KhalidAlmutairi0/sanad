regulation:
  code: BOE008
  name_ar: نظام الوثائق والمحفوظات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للمسميات التالية أينما وردت في هذا النظام - الدلالات الواردة قرين كل منها : 1 - المركز : هو المركز الوطني للوثائق والمحفوظات . 2 - الجهاز : أي وزارة، أو مصلحة مستقلة، أو أي جهة حكومية ذات شخصية معنوية مستقلة. 3 - الوثائق والمحفوظات : هي الأوعية التي تحتوي على معلومات تتعلق بأعمال ومصالح الدولة، سواء نتجت هذه الأوعية عن عمل من أعمال أجهزتها أو عن سواها، ما دام أن الأمر يقتضي حفظها للحاجة إليها أو لقيمتها. 4 - الوثائق والمحفوظات الإدارية : هي الوثائق ، والمحفوظات الخاصة بالأعمال الإدارية. 5 - الوثائق والمحفوظات المالية : هي الوثائق والمحفوظات الخاصة بالأمور المالية. 6 - الوثائق والمحفوظات التخصصية : هي الوثائق ، والمحفوظات المتعلقة بالنشاط الأساسي للجهاز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'الغرض من هذا النظام هو : المحافظة على الوثائق والمحفوظات ، وصيانتها وفهرستها، وتصنيفها بما يكفل سرعة الاهتداء إلى ما تدعو الحاجة إليه، وتنظيم تداولها، وذلك مع مراعاة ما يتقرر بالنسبة لمدد الحفظ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تقسم الوثائق والمحفوظات إلى الفئات التالية : 1 - الوثائق والمحفوظات الإدارية، وتنظم وفقًا للائحة موحدة تعد بالاشتراك مع الديوان العام للخدمة المدنية. 2 - الوثائق والمحفوظات المالية، وتنظم وفقًا للائحة موحدة تعد بالاشتراك مع وزارة المالية والاقتصاد الوطني، وديوان المراقبة العامة. 3 - الوثائق والمحفوظات التخصصية وتنظم وفقًا للوائح متعددة تعد كل لائحة منها بالاشتراك مع الجهة، أو الجهات ذات العلاقة. وتحدد اللوائح الأنواع التي تدخل تحت كل فئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون للوثائق والمحفوظات خطة تصنيف موحدة، كما يكون لكل جهاز رمز مستقل.وتحدد اللوائح تفاصيل ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تحفظ الوثائق والمحفوظات في الجهاز أو في المركز أو فيهما معًا وتحدد اللوائح ما يلي : 1 - مدة الحفظ.2 - أساليب إرسال الوثائق والمحفوظات إلى المركز .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تقسم الوثائق والمحفوظات إلى نوعين : 1 - وثائق ومحفوظات لا يجوز إتلافها. 2 - وثائق ومحفوظات يجوز إتلافها. وتحدد اللوائح المشار إليها في المادة الثالثة فئات هذه الوثائق والمحفوظات وأساليب ومواعيد إتلافها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تقسم الوثائق والمحفوظات لأغراض الاطلاع إلى فئات.وتحدد اللوائح تلك الفئات، وقواعد الاطلاع على كل فئة منها، وضوابط إخراج بعض الوثائق والمحفوظات أو صورها داخل المملكة وخارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على الجهاز و المركز استخدام أنسب المواد، والأجهزة والمعدات كأوعية للوثائق والمحفوظات.وتحدد اللوائح أساليب التعامل مع أصول تلك الوثائق، والمحفوظات وأوعيتها والاستفادة من تلك الأصول أو مادتها الأولية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: ينشأ لأغراض تطبيق هذا النظام وإصدار لوائحه التنفيذية مركز يسمى ( المركز الوطني للوثائق والمحفوظات) ويحدد نظامه أغراضه، ومهامه، وارتباطه التنظيمي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يلغي هذا النظام ما يتعارض معه من أحكام أخرى تتعلق بالوثائق والمحفوظات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a4d3a985-a838-47e8-977e-a9a700f16c1c/1
  verified: false
