articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذه القواعد- المعاني الموضحة أمام كل منها، ما لم يقتض السياق غير ذلك: القواعد: القواعد المنظمة للتخصيص. النظام: نظام التخصيص. اللائحة التنفيذية: اللائحة التنفيذية للنظام. المجلس: مجلس الشؤون الاقتصادية والتنمية. الجهة المختصة: الجهة (الجهات) التي لها صلاحية إصدار الموافقات اللازمة لمشاريع التخصيص بما في ذلك الموافقة على طرح المشاريع وترسيتها وإبرام العقود أو ممارسة أي صلاحيات أو مهمات أخرى وفقاً للنظام. الجهة التنفيذية: الجهة (الجهات) التي يكون لها مهمات دراسة وتحضير مشاريع التخصيص وصلاحيات طرح المشاريع وترسيتها وإبرام العقود أو ممارسة أي صلاحيات أو مهمات أخرى وفقاً للنظام. المركز: المركز الوطني للتخصيص. مجلس الإدارة: مجلس إدارة المركز. اللجنة الإشرافية: اللجنة الإشرافية المشكلة وفق القواعد. الجهاز المعني: كل وزارة أو جهاز حكومي أو هيئة أو مؤسسة عامة أو جهاز ذي شخصية معنوية عامة مستقلة أو مصلحة معنية بمشروع تخصيص خاضع لأحكام النظام، ويشمل ذلك الشركات التي تخضع عقودها لما جاء في المادة (الرابعة) من نظام التخصيص. العقد: عقد
    التخصيص، أو أي عقد تابع له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تسري القواعد على مشاريع التخصيص والعقود الخاضعة لأحكام النظام، والأجهزة المعنية بتلك المشاريع والعقود.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'ما لم يرد في شأنه نص خاص في القواعد، يكون مجلس الوزراء هو الجهة المختصة بشأن منح الموافقات على وثيقة مشروع التخصيص، والطرح، والترسية، وتوقيع العقود ذات الصلة، وذلك بشأن مشاريع نقل ملكية الأصول، ومشاريع الشراكة بين القطاعين العام والخاص التي تتضمن نقل ملكية أصول مملوكة من جهاز معني إلى الطرف الخاص، أياًّ كانت قيمة المشروع. يكون مجلس الوزراء هو الجهة المختصة في شأن إجازة أي من العقود المشار إليها في الفقرة (1) من هذه المادة، التي وقعت دون الحصول على موافقة مسبقة منه. يصدر بأمر من رئيس مجلس الوزراء الآتي: أ- إجازة أي عقد شراكة بين القطاعين العام والخاص أبرمه جهاز معني، ووُقِّع دون الحصول على موافقة مسبقة من الجهة المختصة. ب- الموافقة على وثيقة مشروع التخصيص وطرح مشروع التخصيص بأسلوب التعاقد المباشر، مهما كانت قيمته. ج- الموافقة على وثيقة مشروع التخصيص وطرح مشروع نقل ملكية الأصول، ومشروع الشراكة بين القطاعين العام والخاص، التي تتضمن نقل ملكية أصول بأسلوب المنافسة المحدودة، مهما كانت قيمته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون المجلس هو الجهة المختصة بشأن الموافقة على تملك أي من الأجهزة المعنية حصصاً أو أسهماً في رأس مال شركة مشروع التخصيص. استثناءً من الفقرة (1) من هذه المادة، في حال كان تملك الحصص أو الأسهم في رأس مال شركة مشروع التخصيص من قبل المركز فتكون الموافقة على ذلك من قبل مجلس الإدارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1- يكون مجلس الإدارة هو الجهة المختصة بشأن مشاريع الشراكة بين القطاعين العام والخاص ضمن الحدود الآتية: أ- ما لم يرد نص خاص في شأنه في القواعد، منح جميع الموافقات المطلوبة بموجب النظام لمشروع الشراكة بين القطاعين العام والخاص الذي تكون قيمته خمسمائة مليون ريال أو أكثر للعقد الواحد، بما في ذلك الموافقة على وثيقة مشروع التخصيص والطرح والترسية وتوقيع العقد. ب- الموافقة على إلغاء طرح مشروع الشراكة بين القطاعين العام والخاص، الذي تكون قيمته خمسمائة مليون ريال أو أكثر للعقد الواحد، في أي وقت قبل توقيع العقد. ج- الموافقة على أن يتضمن العقد شرطاً للتحكيم لتسوية المنازعات الناشئة عنه أو على إبرام اتفاق للتحكيم لتسوية نزاع قائم ناشئ عنها، أو على تضمين اتفاق أو شرط التحكيم تحديداً لقانون أجنبي واجب التطبيق على موضوع النزاع. د- الموافقة على ما يأتي بشأن أي مشروع للشراكة بين القطاعين العام والخاص مهما كانت قيمته: طرح مشروع الشراكة بين القطاعين العام والخاص من خلال المنافسة المحدودة. ترسية مشروع الشراكة بين القطاعين العام والخاص في حال وجود تظلمات ضد إجراءات الطرح والترسية لم يُبت بها،
    أو التوجيه بوقف إجراءات الترسية لحين البت في تلك التظلمات. عدم اعتبار ممارسة الطرف الخاص لحق ممنوح له، أو التقيد بأي التزام بموجب عقد الشراكة بين القطاعين العام والخاص، ممارسة احتكارية وإن ترتب عليها تأثير على المنافسة أو تقييدها. أن تتجاوز مدة عقد الشراكة بين القطاعين العام والخاص الأصلية أو بعد التجديد أو التمديد، ثلاثين سنة. إنهاء الجهة التنفيذية عقد الشراكة بين القطاعين العام والخاص وأي عقد تابع له بالإرادة المنفردة. منح أي موافقة مطلوبة بموجب النظام عند حدوث إشكال لدى الجهة التنفيذية في تحديد الجهة المختصة بمنح الموافقة المطلوبة لمشروع الشراكة بين القطاعين العام والخاص. 2- يكون مجلس الإدارة هو الجهة المختصة بشأن مشروع نقل ملكية الأصول، ومشروع الشراكة بين القطاعين العام والخاص الذي يتضمن نقل ملكية أصول مملوكة من أي جهاز معني إلى الطرف الخاص -أياًّ كانت قيمته- وضمن الحدود الآتية: أ- الموافقة على إلغاء طرح مشروع نقل ملكية الأصول، ومشروع الشراكة بين القطاعين العام والخاص الذي يتضمن نقل ملكية أصول قبل توقيع العقد، على أن يقوم مجلس الإدارة بإشعار مجلس الوزراء بذلك، ويبين فيه مسوغات الإلغاء.
    ب- الموافقة على قيام الطرف الخاص في عقد نقل ملكية الأصول، أو عقد الشراكة بين القطاعين العام والخاص الذي يتضمن نقل ملكية أصول، بنقل ملكية الأسهم أو الحصص التي يملكها في شركة مشروع التخصيص أو رهنها؛ في حال لم يتضمن العقد حكماً أو ضوابط بهذا الخصوص. ج- الموافقة على قيام الجهة التنفيذية بتقديم شهادة للطرف الخاص في عقد نقل ملكية الأصول، وعقد الشراكة بين القطاعين العام والخاص الذي يتضمن نقل ملكية أصول -بناءً على طلبه- تتضمن أن الجهة المختصة وافقت على العقد، وأن العقد وأي مستندات، أو سندات، أو وثائق ذات صلة، موقعة أو ستُوقع، وتخضع لأحكام النظام. د- الموافقة على استكمال إجراءات ترسية مشروع نقل ملكية الأصول، ومشروع الشراكة بين القطاعين العام والخاص الذي يتضمن نقل ملكية أصول، في حال وجود تظلمات ضد إجراءات الطرح والترسية لم يتم البت فيها، أو توجيه الجهة التنفيذية بوقف إجراءات الترسية إلى حين البت في تلك التظلمات. 3- يكون مجلس الإدارة هو الجهة المختصة بشأن الموافقة على استئجار الطرف الخاص -إذا كان مستثمراً أجنبيّاً- عقاراً داخل حدود مدينتي مكة المكرمة والمدينة المنورة لمدة تعادل مدة عقد التخصيص
    لغرض تنفيذ مشروع التخصيص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تكون اللجنة الإشرافية هي الجهة المختصة بشأن ما يأتي: ما لم يرد في شأنه نص خاص في القواعد، منح جميع الموافقات المطلوبة بموجب النظام لمشروع الشراكة بين القطاعين العام والخاص الواقع تحت إشرافها الذي تقل قيمته عن خمسمائة مليون ريال للعقد الواحد، أو لا تترتب بموجبه أي التزامات مالية سنوية مباشرة على الحكومة، بما في ذلك الموافقة على وثيقة مشروع التخصيص والطرح والترسية وتوقيع العقد. الموافقة على إلغاء طرح مشروع الشراكة بين القطاعين العام والخاص الذي تقل قيمته عن خمسمائة مليون ريال للعقد الواحد قبل توقيع العقد، أو لا تترتب بموجبه أي التزامات مالية سنوية مباشرة على الحكومة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لغرض تطبيق أحكام القواعد وتحديد الجهة المختصة وفقاً لقيمة مشروع الشراكة بين القطاعين العام والخاص، تحتسب قيمة مشروع الشراكة بين القطاعين العام والخاص استناداً إلى قيمة الالتزامات المالية السنوية المباشرة المترتبة على الحكومة بناءً على العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تكون وزارة المالية هي الجهة المختصة بشأن الموافقة على أن يتضمن العقد منح الطرف الخاص أيّاً من الحقوق الآتية: تحصيل المقابل المالي من المستفيدين لحسابه مباشرة لقاء الأعمال والخدمات التي يقدمها، وفقاً لعقد الشراكة بين القطاعين العام والخاص. تحصيل الإيرادات العامة -بما في ذلك الرسوم والضرائب- المرتبطة بعقد الشراكة بين القطاعين العام والخاص لحساب الخزينة العامة للدولة. تحصيل الإيرادات العامة أو جزء منها لحسابه مباشرة، وفقاً للعقد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تمارس كل جهة من الجهات المحددة في القواعد الصلاحيات الممنوحة لها في النظام والقواعد دون الإخلال باختصاصات الجهات الأخرى، وتصدر كل جهة الموافقات التي تملك صلاحية إصدارها ضمن الحدود المنصوص عليها في القواعد، وتقوم بالرفع -في كل موضوع يخرج عن اختصاصها- إلى الجهة التي تملك صلاحية منح الموافقة وفقاً للقواعد متضمناً توصياتها لغرض الحصول على الموافقة المطلوبة. دون إخلال بصلاحيات ومهمات اللجنة الإشرافية والجهة التنفيذية المنصوص عليها في القواعد، على اللجنة الإشرافية والجهة التنفيذية التنسيق مع المركز قبل الرفع إلى الجهة المختصة للموافقة على مشروع التخصيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: لمجلس الوزراء أو المجلس تفويض غيره ببعض صلاحياته المنصوص عليها في القواعد، ويحدد في التفويض الصلاحيات المشمولة بالتفويض، ومشروع أو مشاريع التخصيص التي تم التفويض بشأنها، ومدة التفويض، وأي شروط أو ضوابط مرتبطة بالتفويض. تكون ممارسة الصلاحيات المحددة في المادتين (الخامسة) و(السادسة) من القواعد حصرية وغير قابلة للتفويض. دون إخلال بما ورد في الفقرة (2) من هذه المادة، تحدد القرارات الصادرة عن الجهة المختصة -وفق ما هو منصوص عليه في هذا الباب- الصلاحيات والمهمات التي تتمتع بها اللجنة الإشرافية والجهات المعنية الأخرى لتنفيذ تلك القرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ما لم يرد نص خاص في شأنه في القواعد، تكون اللجنة الإشرافية المعنية بالقطاع هي الجهة التنفيذية بشأن مشاريع التخصيص التي تنفّذ في القطاع، ولها صلاحيات الجهة التنفيذية، ومهماتها، واصدار الموافقات، المنصوص عليها في النظام والقواعد. للجنة الإشرافية تشكيل فريق عمل (أو أكثر) وتكليفه بما تراه من مهمات أو أعمال، ويجوز لها -بعد الحصول على موافقة مجلس الإدارة ودون إخلال بما ورد في المادة (الثانية عشرة)- أن تفوض الجهاز المعني أو فريق عملها ليمارس الصلاحيات الممنوحة لها كجهة تنفيذية على أن تحدد اللجنة الإشرافية حدود صلاحيات الجهاز المعني أو فريق عملها عند ممارسته لتلك المهمات والصلاحيات، والصلاحيات التي لا تقبل التفويض، وذلك وفق الضوابط الواردة في اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'استثناءً من الفقرة (1) من المادة (الحادية عشرة)، ودون إخلال بصلاحيات واختصاصات ومهمات الجهات المحددة في القواعد، يكون الجهاز المعني بالقطاع هو الجهة التنفيذية في شأن المهمات المرتبطة بمشاريع التخصيص -التي تنفّذ في القطاع- التالية: أ- إعداد وثيقة مشروع التخصيص، ووثائق طرح مشروع التخصيص، والرفع بها إلى اللجنة الإشرافية المعنية بالقطاع لأخذ الموافقات اللازمة. ب‌- إدارة إجراءات طرح مشروع التخصيص ويشمل ذلك طلبات إبداء الرغبات، والتأهيل، والعروض، وتقييمها، والتفاوض مع المتنافسين، وأي مهمات أخرى مرتبطة بإجراءات الطرح، والرفع بنتائج ذلك للجنة الإشرافية المعنية بالقطاع لأخذ الموافقات اللازمة. ج‌- إدارة مرحلة ترسية وتوقيع العقد مع الطرف الخاص، وإنهاء الإجراءات المرتبطة بذلك بعد الحصول على الموافقات اللازمة من اللجنة الإشرافية، والجهة المختصة. د‌- إدارة مرحلة تنفيذ عقد التخصيص ومراقبته في المرحلة اللاحقة لتوقيع العقد. هـ- إعداد تقرير -بعد التنسيق مع الجهة المعنية نظاماً- عند تعذر إصدار رخصة، أو ترخيص، أو تصريح لازم لأي مشروع تخصيص، أو تأخر إصداره من قبل الجهة الحكومية المعنية نظامًا
    بإصداره متضمناً وصف الحالة، وأسباب التعذر أو التأخر في الإصدار، والتكاليف الناجمة عن ذلك، والحلول المقترحة، ورفعه إلى اللجنة الإشرافية المعنية بالقطاع لاتخاذ ما تراه مناسباً حياله. و‌- الرفع إلى اللجنة الإشرافية المعنية بالقطاع في حال كان مشروع الشراكة بين القطاعين العام والخاص تقل قيمته عن خمسمائة مليون ريال للعقد الواحد، أو لا يترتب بموجبه أي التزامات مالية سنوية مباشرة على الحكومة، للتوجيه بما تراه مناسباً حيال الآتي: 1) طلب الموافقة على إلغاء طرح مشروع الشراكة بين القطاعين العام والخاص قبل توقيع العقد. 2) طلب الموافقة على إبرام اتفاقيات مباشرة مع جهة أخرى ذات علاقة بمشروع الشراكة بين القطاعين العام والخاص أو على تقديم تعهدات لها تحدد الحقوق التي تتمتع بها تلك الجهة، وما عليها من التزامات. 3) طلب الموافقة على تقديم شهادة للطرف الخاص في عقد الشراكة بين القطاعين العام والخاص -بناءً على طلبه- تتضمن أن الجهة المختصة وافقت على عقد الشراكة بين القطاعين العام والخاص، وأن العقد وأي مستندات، أو سندات أو وثائق ذات صلة موقعة أو سيتم توقيعها، تخضع لأحكام النظام. 4) طلب الموافقة على تعديل أو تعليق
    عقد الشراكة بين القطاعين العام والخاص. يعد الجهاز المعني -عند ممارسته لدوره بصفته جهة تنفيذية- المسؤول عن مشروع التخصيص، ويتحمل كامل المسؤولية المباشرة عن أي مخالفة أو تقصير أو إخفاق في تنفيذ المهمات والمسؤوليات المنوطة به، وعن عدم صحة أو دقة البيانات والمعلومات والوثائق التي يقدمها للجهات المعنية بمنح الموافقات المحددة في القواعد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'استثناءً من الفقرة (1) من المادة (الثانية عشرة)، للجنة الإشرافية منح الصلاحيات الممنوحة للجهاز المعني لفريق عملها ليمارسها في حال تحقق أي من الحالات الآتية: أ- تقصير الجهاز المعني باعتباره الجهة التنفيذية بالصلاحيات المنوطة به، واستمراره في التقصير بعد إشعاره من اللجنة الإشرافية. ب- عدم قدرة الجهاز المعني على تحديد الجهة الحكومية المعنية بمشروع التخصيص في الجهاز المعني. ج- عدم توفر المؤهلات والكفايات المتعلقة بالتخصيص أو أي منها؛ في الجهاز المعني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تكون ممارسة الجهاز المعني بالقطاع أو فريق عمل اللجنة الإشرافية، للصلاحيات والمهمات المحددة في الفقرة (1) من المادة (الثانية عشرة)؛ حصرية وغير قابلة للتفويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع مراعاة الفقرة (2) من المادة (الحادية عشرة)، والفقرة (1) من المادة (الثانية عشرة)، والمادة (الرابعة عشرة)؛ تتولى اللجنة الإشرافية الفصل في أي خلاف ينشأ حول تحديد الجهاز المعني أو فريق عملها المعني المكلفين بممارسات صلاحيات ومهمات الجهة التنفيذية المنصوص عليها في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على رئيس اللجنة الإشرافية تقديم عرض إلى مجلس الإدارة كل ثلاثة أشهر بشأن مشاريع التخصيص التي تتولاها تلك الجهة، يتضمن ما اتُخذ بشأنها من أعمال، ومدى التقدم في تنفيذها، والصعوبات التي واجهتها، واقتراح سبل تذليلها، وخطط الجهة التنفيذية المستقبلية، وسائر المعلومات المرتبطة بتلك المشاريع، على أن يقدم المركز عرضاً شاملاً للمجلس مرتين سنوياً وذلك خلال (45) يوماً من منتصف ونهاية العام المالي، يتضمن ملخصاً لأهم مضامين عروض اللجان الإشرافية، وأي ملاحظات أو مرئيات يراها المركز في شأنها. على الجهة التنفيذية وفرق عملها واستشارييها تزويد المركز بأي وثائق أو دراسات أو بيانات يطلبها المركز بشأن مشاريع التخصيص التي تتولاها الجهة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'لمجلس الإدارة ما يأتي: أ- إجراء تعديل على نطاق مشاريع التخصيص الداخلة ضمن اختصاص لجنةٍ إشرافيةٍ قائمةٍ بعد التنسيق مع اللجنة الإشرافية المعنية، وذلك بإضافة مشاريع تخصيص جديدة ضمن اختصاصها، أو نقل مشاريع تخصيص من لجنة إشرافية إلى أخرى. ب- استحداث لجنة إشرافية جديدة سواء أكان ذلك لقطاع محدد، أو لمشروع تخصيص محدد في أي قطاع، أو لمجموعة مشاريع تخصيص محددة في أي قطاع، على أن يحدد القرار بشكل واضح مشاريع التخصيص الداخلة ضمن اختصاص تلك اللجنة. ج- إلغاء أي لجنة إشرافية قائمة، بعد التنسيق معها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: '1- تتكون كل لجنة إشرافية على النحو الآتي: أ- الأعضاء الأساسيون: - الوزير المعنى (أو من يقوم مقامه) أو من يفوضه (رئيساً للجنة). - وزير المالية أو من يفوضه (عضواً) ولمجلس الإدارة إضافة عضو آخر، على أن يحدد مجلس الإدارة في قراره صلاحيات ذلك العضو. ب- الأعضاء الإضافيون: يجوز بإجماع الأعضاء الأساسيين إضافة عضوين بحد أقصى إلى اللجنة الإشرافية، وإنهاء عضويتيهما، سواء أكانت عضويتيهما لمشاريع أو مشروع محدد، على أن يحدد في قرار الإضافة صلاحيات ذلك العضو. 2- يجب أن يكون كل الأعضاء (الأساسيين والإضافيين) من الموظفين الحكوميين، وألا تقل مرتبة أي منهم عن (الخامسة عشرة) أو ما يعادلها. 3- في حال كان رئيس أي لجنة إشرافية هو وزير المالية: فيكون لمجلس الإدارة إضافة عضو آخر إلى اللجنة الإشرافية إلى جانب رئيسها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يتولى المركز مهمات ومسؤوليات أمانات اللجان الإشرافية. ولمجلس الإدارة تفويض هذا الاختصاص لمن يراه من اللجان الإشرافية، على أن تتبع الأمانة المحددة من تلك اللجان الإشرافية الإجراءات والنماذج التي يقرها المركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يصدر مجلس الإدارة القواعد والإجراءات المنظمة لاجتماعات اللجان الإشرافية، بما في ذلك عدد اجتماعاتها، ونصاب الحضور، وآليات اتخاذ القرارات، والتفويض في الحضور، وترجيح القرار في حال تساوي الأصوات، وغير ذلك من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الحادية والعشرين
  article_text_ar: 'يقوم الجهاز المعني بالقطاع -بعد التنسيق مع الجهات الأخرى المشمولة بالقطاع ومع المركز، وخلال مدة يحددها مجلس الإدارة لا تتجاوز (ثلاثة عشر) شهراً من تاريخ نفاذ القواعد بالنسبة إلى القطاعات التي لها لجان إشرافية قائمة- بإعداد خطة التخصيص للقطاع، على أن تتضمن ما يأتي: أ- الأهداف المنشودة من مشاريع التخصيص في القطاع، وقائمة مشاريع التخصيص المقترحة، وأوليات تنفيذها، والجداول الزمنية المقترحة لتنفيذها. ب- مراجعة البيئة النظامية المنظمة للقطاع واقتراح تطويرها بما يحفز القطاع الخاص للاستثمار فيه، ويحقق الأهداف من التخصيص. يقوم الجهاز المعني بالقطاع من خلال اللجنة الإشرافية برفع خطة التخصيص التي تم إعدادها إلى مجلس الإدارة للنظر في اعتمادها. ولمجلس الإدارة وفق ما يراه مناسباً، وبعد أخذ موافقة رئيس اللجنة الإشرافية؛ نشر خطة التخصيص المعتمدة للقطاع أو أي جزء منها للعموم أو إبلاغ أي أشخاص أو جهات أخرى يحددهم مجلس الإدارة بمضامينها أو أجزاء منها. إذا تضمنت خطة التخصيص المعتمدة ما يلزم استكمال إجراءات نظامية في شأن اقتراح تطوير البيئة النظامية المنظمة للقطاع، فيقوم الجهاز المعني بالقطاع
    باتخاذ ما يلزم في شأن استكمال تلك الاجراءت. لا يجوز البدء بدراسة وثيقة مشروع التخصيص أو طرح أو تنفيذ أي مشروع تخصيص غير وارد في قائمة المشاريع المقترحة ضمن خطة التخصيص المعتمدة للقطاع. يقوم الجهاز المعني بالقطاع، بعد التنسيق مع المركز ومع الجهات الأخرى المشمولة بالقطاع، بتحديث خطة التخصيص للقطاع مرة واحدة على الأقل كل (خمس) سنوات أو كلما لزم الأمر، والرفع بالخطة المحدثة بحسب ما هو محدد في الفقرة (2) من هذه المادة. لا يسري حكم الفقرة (4) من هذه المادة على القطاعات التي لها لجان إشرافية قائمة أو أي قطاعات أخرى يتم استحداث لجان إشرافية جديدة لها وفقاً لما ورد في المادة (السابعة عشرة) من القواعد إلا بعد مضي (تسعة عشر) شهراً من تاريخ نفاذ القواعد أو استحداث اللجنة الإشرافية أو اعتماد خطة تخصيص القطاع، أيهما أسبق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثانية والعشرين
  article_text_ar: يضع مجلس الإدارة، بالاتفاق مع وزارة المالية، القواعد والآليات اللازمة لتحمل نفقات أمانات اللجان الإشرافية وفرق العمل، والاستشاريين، وغير ذلك من النفقات الإدارية المرتبطة بمشاريع التخصيص، والأحكامَ المرتبطة باسترداد الجهاز المعني أو المركز لتلك النفقات، وذلك وفقاً للإجراءات النظامية المتعبة، وفي حدود الإمكانيات والصلاحيات المالية المتاحة، وبما لا يتجاوز الأسقف المحددة للإنفاق العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
  verified: false
- article_ref: المادة الثالثة والعشرين
  article_text_ar: تحل القواعد محل قواعد عمل اللجان الإشرافية للقطاعات المستهدفة بالتخصيص ومهماتها (المعدلة) الصادرة بقرار مجلس الوزراء رقم (55) وتاريخ 20 / 1 / 1442هـ
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f95abff1-7f8b-4aea-9e97-adb900a2576e/1
