articles:
- article_ref: 'المادة الأولى: التعريفات'
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها: النظام: نظام الجامعات. مجلس شؤون الجامعات: السلطة المختصة بتنظيم شؤون الجامعات ورسم سياساتها ووضع اللوائح المنظمة لها، وفق أحكام النظام. مجلس الأمناء: السلطة المختصة بحوكمة الجامعة، والرقابة على أدائها أكاديميًّا وإداريًّا وماليًّا، وفق أحكام النظام. مجلس الجامعة: السلطة المختصة بتصريف الشؤون العلمية والتعليمية والإدارية والمالية في الجامعة، وتنفيذ السياسة العامة لها، وفق أحكام النظام. المجلس العلمي: السلطة المختصة بالشؤون العلمية والبحثية والدراسات والنشر في الجامعة، وفق أحكام النظام. الكلية: منشأة علمية مكونة من مجموعة من الأقسام العلمية تنتمي إلى مجال علمي عام. مجلس الكلية: السلطة المختصة بتصريف الشؤون الأكاديمية في الكلية، وفقاً لأحكام النظام. القسم العلمي: وحدة أكاديمية تمثل تخصصاً علمياً عامًّا. مجلس القسم: السلطة المختصة بالشؤون الأكاديمية في القسم العلمي. أعضاء هيئة التدريس: الأساتذة والأساتذة المشاركون والأساتذة المساعدون، ويعد في حكم أعضاء هيئة التدريس المحاضرون والمعيدون.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: 'المادة الثانية: الأهداف'
  article_text_ar: يهدف النظام إلى تنظيم شؤون التعليم العالي ويعمل على تعزيز مكانته العلمية والبحثية والمجتمعية على المستوى المحلي والإقليمي والدولي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: الجامعة مؤسسة أكاديمية عامة ذات شخصية اعتبارية مستقلة ماليًّا وإداريًّا، تسهم في تنفيذ السياسة التعليمية للدولة وفق أحكام النظام، ولا تهدف إلى الربح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون إنشاء الجامعات وفروعها بقرار من مجلس الوزراء بناء على توصية مجلس شؤون الجامعات. تتكون الجامعة من: كليات، وعمادات، وأقسام علمية، ومعاهد، ومراكز، ووحدات تعليمية دون المستوى الجامعي، ومستشفيات جامعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى حوكمة وإدارة وتصريف شؤون الجامعة: مجلس الأمناء مجلس الجامعة رئيس الجامعة'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'ينشأ مجلس يسمى "مجلس شؤون الجامعات" ويتكون من الآتي: وزير التعليم رئيساً نائب وزير التعليم للجامعات والبحث والابتكار عضواً نائب وزير المالية عضواً نائب وزير الخدمة المدنية عضواً نائب وزير العمل والتنمية الاجتماعية عضواً نائب وزير الاقتصاد والتخطيط عضواً رئيس هيئة تقويم التعليم والتدريب عضواً خمسة من رؤساء الجامعات أحدهم من رؤساء الجامعات الأهلية أعضاء اثنان من ذوي الخبرة والاختصاص عضوين ويرشح وزير التعليم الأعضاء الوارد ذكرهم في الفقرتين (8، 9)، ويصدر تعيينهم بأمر من رئيس مجلس الوزراء لمدة ثلاث سنوات قابلة للتجديد لمرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'مع مراعاة الاختصاصات الأخرى المسندة إليه بموجب النظام، يتولى مجلس شؤون الجامعات الاختصاصات الآتية: إقرار السياسات والاستراتيجيات للتعليم الجامعي. إقرار اللوائح التنظيمية للجامعات والكليات الأهلية وفروع الجامعات الأجنبية والرقابة عليها. إقرار اللوائح المالية، والإدارية، والأكاديمية للجامعات. إقرار اللوائح المنظمة للاستثمار والإيرادات الذاتية للجامعة. إقرار اللوائح المنظمة لقبول التبرعات والهبات والوصايا وآلية الإنفاق منها. إقرار اللوائح المنظمة لإدارة الأوقاف في الجامعات بالتنسيق مع الهيئة العامة للأوقاف. إقرار اللوائح المنظمة للجمعيات العلمية والكراسي البحثية ومراكز البحث والابتكار وريادة الأعمال في الجامعات. إقرار اللائحة الخاصة بإنشاء المتاحف العلمية في الجامعات بالتنسيق مع الجهات ذات الاختصاص. إقرار اللائحة المنظمة لصناديق الطلبة في الجامعات. حوكمة وتقويم أداء الجامعات أكاديميًّا وإداريًّا وماليًّا. إقرار قواعد ترشيح رؤساء الجامعات. التوصية بالموافقة على إنشاء الجامعات وفروعها والكليات الأهلية وفروع الجامعات الأجنبية وإلغائها ودمجها ورفعها إلى مجلس الوزراء للموافقة
    عليها. اعتماد إنشاء الكليات والعمادات والمعاهد والمراكز والأقسام العلمية أو دمجها، أو إلغائها، أو تعديل أسمائها. تحديد المكافآت والمزايا لرئيس مجلس الأمناء ونائبه وأعضائه. تحديد الراتب والمزايا لرئيس الجامعة. تحديد المكافآت والمزايا لرئيس مجلس الجامعة وأعضائه. تحديد المكافآت والمزايا لنواب رئيس الجامعة والعمداء ووكلائهم ورؤساء الأقسام العلمية وأعضاء المجالس العلمية وأمنائها. تحديد المكافآت والمزايا لأمين عام مجلس شؤون الجامعات. التوصية بالموافقة على اتفاقيات التعاون العلمي والفني، ومذكرات التفاهم بين الجامعات والمؤسسات الأجنبية. تحديد البرامج والدورات التي يجوز للجامعة وضع مقابل مالي عليها، وتحديد القواعد العامة للمقابل المالي. اعتماد التقرير السنوي المتعلق بنشاطات الجامعة وإنجازاتها، ورفعه إلى مجلس الوزراء. الرقابة على أداء مجالس الأمناء والتحقق من سلامة قراراتها. الفصل فيما يطرأ من تنازع في الاختصاص بين مجلسي الأمناء ومجلس الجامعة. دراسة ما يحيله إليه رئيسه أو يقترح عرضه أي عضو من أعضائه. وللمجلس تفويض بعض صلاحياته لأي من مجالس الأمناء وفق الضوابط التي يقرها مجلس شؤون الجامعات. وله
    تكوين لجان دائمة أو مؤقتة من أعضائه أو من غيرهم لدراسة ما يكلّفها به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعقد مجلس شؤون الجامعات اجتماعاته مرة كل أربعة أشهر في العام على الأقل بناءً على دعوة من رئيسه أو من ينوب عنه، ولا يصح انعقاد الاجتماع إلا إذا حضره ثلثا الأعضاء على الأقل، يكون من بينهم الرئيس أو نائبه. وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. ولرئيس المجلس دعوة من يراه للحضور عند مناقشة أي من الموضوعات التي تتطلب ذلك دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون لمجلس شؤون الجامعات أمين عام يتم تكليفه بأمر من رئيس مجلس الوزراء بناء على ترشيح رئيس مجلس شؤون الجامعات. تُخصّص ميزانية برنامج تشغيلي لأمانة مجلس شؤون الجامعات وتعتمد ضمن ميزانية وزارة التعليم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تختص الأمانة العامة لمجلس شؤون الجامعات بالقيام بما يأتي: مساندة المجلس في أعماله ومسؤولياته، وإعداد دراساته، وتوفير البيانات والمعلومات اللازمة لاتخاذ قراراته ومتابعة تنفيذها. التحضير لاجتماعات المجلس واللجان المنبثقة منه. إعداد جداول أعمال اجتماعات المجلس وإبلاغها للأعضاء. تبليغ قرارات المجلس للجهات المعنية ومتابعتها. التنسيق مع الجهات الحكومية الأخرى فيما يتعلق بأعمال المجلس. القيام بالأعمال الإدارية والمالية للمجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يكون لكل جامعة مجلس أمناء يكلف رئيسه ونائبه وأعضاؤه -فيما عدا رئيس الجامعة- بأمر من رئيس مجلس الوزراء -بناءً على ترشيح رئيس مجلس شؤون الجامعات- لمدة ثلاث سنوات قابلة للتجديد مرة واحدة، ويكون رئيس مجلس الأمناء مسؤولاً أمام رئيس مجلس شؤون الجامعات فيما يختص به مجلس الأمناء طبقاً للنظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يتكون مجلس أمناء الجامعة من الآتي: أربعة أعضاء من ذوي الخبرة والكفاية والاختصاص ممن عملوا في مجال التعليم الجامعي. ثلاثة أعضاء من القطاع الخاص من ذوي الخبرة والكفاية والاختصاص في المجال المالي والاستثماري والنظامي. رئيس الجامعة. ثلاثة من أعضاء هيئة التدريس في الجامعة يرشحهم مجلس الجامعة. ويكون رئيس المجلس ونائبه من الوارد ذكرهم في الفقرتين (1) و (2) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'يتولى مجلس أمناء الجامعة -وفقاً لأحكام النظام وما يصدره مجلس شؤون الجامعات من لوائح وقواعد- المهمات الآتية: إقرار رؤية الجامعة ورسالتها وأهدافها، ورسم سياساتها الأكاديمية والمالية والإدارية. إقرار الهيكل والدليل التنظيمي للجامعة. حوكمة الجامعة، والتأكد من تحقق رؤية الجامعة ورسالتها وأهدافها. إقرار القواعد التنفيذية للوائح المالية والإدارية للجامعة. ترشيح رئيس الجامعة. الموافقة على تكليف نواب رئيس الجامعة. التوصية بالموافقة على إنشاء الكليات، والعمادات، والمعاهد، والمراكز، والأقسام العلمية أو دمجها، أو إلغائها، أو تعديل أسمائها. إقرار القواعد المنظمة لتعيين عمداء الكليات، والعمادات، والمعاهد، والمراكز، ورؤساء الأقسام العلمية. إقرار القواعد المنظمة لدعم البحث العلمي، والابتكار، والتأليف، والترجمة، والنشر. إقرار القواعد المنظمة لتقديم الخدمات الاستشارية والأكاديمية للقطاعين العام والخاص ومؤسسات المجتمع المدني. إقرار الميزانية السنوية للجامعة. الموافقة على تأسيس الشركات أو المشاركة في تأسيسها أو دخول الجامعة فيها شريكًا أو مساهمًا وذلك وفقًا للإجراءات النظامية. تعيين مراجع
    خارجي (أو أكثر) لحسابات الجامعة. اعتماد الحساب الختامي للجامعة، ورفعه إلى مجلس شؤون الجامعات. إقرار أسماء الدرجات العلمية. منح درجة الدكتوراه الفخرية. تشكيل المجلس الاستشاري الدولي للجامعة وتحديد اختصاصاته ووضع قواعد عمله. مراجعة التقرير السنوي للجامعة ورفعه إلى مجلس شؤون الجامعات. دراسة ما يحيله إليه رئيسه أو يقترح عرضه أي عضو من أعضائه. وللمجلس تفويض بعض من صلاحياته إلى رئيس المجلس أو المجالس الأخرى في الجامعة، وله كذلك تكوين لجان دائمة أو مؤقتة من أعضائه أو من غيرهم؛ لدراسة ما يكلفها به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجتمع مجلس أمناء الجامعة مرة كل ثلاثة أشهر على الأقل في العام الدراسي، وللرئيس أن يدعو المجلس للاجتماع إذا دعت الحاجة إلى ذلك، ولا تصح اجتماعات المجلس إلا بحضور ثلثي أعضائه على الأقل، على أن يكون من بينهم رئيس المجلس أو نائبه، وتصدر قراراته بأغلبية أصوات الأعضاء على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع، وتكون قراراته نافذة بعد خمسة عشر يوماً من تاريخ انعقاد الاجتماع الذي صدرت فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يختار مجلس الأمناء من يراه من منسوبي الجامعة ليتولى أمانة المجلس بالتنسيق مع رئيس الجامعة. إذا شغر منصب رئيس مجلس الأمناء أو نائبه أو أي عضو فيه فيعين بديل له للمدة الباقية وفقاً لإجراءات تعيينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يكون لكل جامعة مجلس، يسمى "مجلس الجامعة" برئاسة رئيس الجامعة وتكون العضوية فيه على النحو الآتي: نواب رئيس الجامعة. عمداء الكليات والعمادات والمعاهد في الجامعة. أربعة أعضاء على الأكثر من ذوي الخبرة والكفاية، والاهتمام بالتعليم الجامعي، يصدر بتعيينهم قرار من مجلس الأمناء -بناءً على ترشيح من رئيس الجامعة- لمدة سنتين قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'يختص مجلس الجامعة بتصريف الشؤون الأكاديمية والإدارية والمالية، وتنفيذ السياسة العامة للجامعة وفقاً لأحكام النظام وما يصدره مجلس شؤون الجامعات ومجلس الأمناء من لوائح وقواعد، وله على وجه الخصوص ما يأتي: اقتراح رؤية الجامعة ورسالتها وأهدافها، ورسم سياساتها الأكاديمية والمالية والإدارية. اقتراح الهيكل والدليل التنظيمي للجامعة. اقتراح القواعد التنفيذية للوائح المالية والإدارية للجامعة. إقرار القواعد التنفيذية للوائح الأكاديمية للجامعة. وضع القواعد المنظمة لتفويض الصلاحيات في المجالس المختلفة في الجامعة. تعيين أعضاء هيئة التدريس. الموافقة على الاستفادة من خدمات أعضاء هيئة التدريس من خلال الإعارة أو التكليف أو التعاقد معهم للقطاعين العام والخاص ومؤسسات المجتمع المدني. اقتراح إنشاء الكليات، والعمادات، والمعاهد، والمراكز، والأقسام العلمية أو دمجها، أو إلغائها، أو تعديل أسمائها. اقتراح أسماء الدرجات العلمية. إقرار البرامج والخطط الدراسية للدرجات العلمية التي تمنحها الجامعة. إقرار القواعد الخاصة بإصدار الدوريات العلمية. اعتماد خطة التدريب والابتعاث. تحديد تفصيلات التقويم الأكاديمي
    وفقاً للإطار العام لبداية الدراسة ونهايتها. اعتماد سياسة القبول وتحديد أعداد الطلاب الذين يمكن قبولهم في كل عام دراسي. وضع المقابل المالي للبرامج الدراسية والدبلومات والدورات، بما في ذلك الخدمات المرتبطة والمساندة لجميع البرامج. إقرار خطط الأنشطة الطلابية. إقرار خطة الجامعة للمسؤولية الاجتماعية. منح الدرجات العلمية للخريجين. اقتراح منح درجة الدكتوراه الفخرية. الموافقة على اتفاقيات التعاون العلمي والفني ومذكرات التفاهم بين الجامعة والمؤسسات المحلية. اقتراح اتفاقيات التعاون العلمي والفني ومذكرات التفاهم بين الجامعة والمؤسسات الأجنبية. اقتراح تشكيل المجلس الاستشاري الدولي للجامعة وتحديد اختصاصاته. إقرار تشكيل المجلس الاستشاري لأعضاء هيئة التدريس في الجامعة واختصاصاته وقواعد عمله. إقرار تشكيل المجلس الاستشاري للطلبة وتحديد اختصاصاته ووضع قواعد عمله. اقتراح الميزانية السنوية للجامعة. اقتراح القواعد المنظمة للاستثمار والإيرادات الذاتية وإدارة الأوقاف في الجامعة وفقًا للوائح التي يصدرها مجلس شؤون الجامعات. اقتراح تأسيس الشركات أو المشاركة في تأسيسها أو دخول الجامعة فيها شريكًا أو مساهما وذلك
    وفقا للإجراءات النظامية. قبول التبرعات والهبات والوصايا والإنفاق منها وفقاً للوائح التي يقرها مجلس شؤون الجامعات. تخصيص جزء من أراضي الجامعة لأوقاف الجامعة بعد التنسيق مع الهيئة العامة لعقارات الدولة وفق الأنظمة واللوائح ذات الصلة. إنشاء الكراسي العلمية ووضع لوائحها. تعيين مراقب مالي أو أكثر لحسابات الجامعة. مناقشة الحساب الختامي للجامعة، ورفعه إلى مجلس الأمناء. مناقشة التقرير السنوي للجامعة تمهيداً لعرضه على مجلس الأمناء. النظر في الموضوعات التي يحيلها إليه رئيس المجلس أو التي يقترح أي عضو من أعضائه عرضها عليه. وللمجلس تفويض بعض صلاحياته إلى رئيسه أو المجالس الأخرى في الجامعة على أن يحاط المجلس علماً بما يتخذ من قرارات وله كذلك تكوين لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم لدراسة ما يكلفها به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجتمع مجلس الجامعة بناء على دعوة من رئيسه مرة كل شهر على الأقل في العام الدراسي، وللرئيس أن يدعو المجلس للاجتماع إذا دعت الحاجة إلى ذلك، أو إذا قدم ثلث أعضائه على الأقل طلباً مكتوباً بذلك، ولا يصح انعقاد المجلس إلا إذا حضر الاجتماع ثلثا أعضائه على الأقل، على أن يكون من بينهم رئيس المجلس أو من ينيبه من الأعضاء، وتصدر قراراته بأغلبية أصوات الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع، وتكون قراراته نافذة من تاريخ اعتمادها منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يكون لمجلس الجامعة أمين عام من أعضاء هيئة التدريس يصدر بتسميته قرار من المجلس -بناءً على ترشيح من رئيس المجلس- لمدة سنتين قابلة للتجديد مرة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: ينشأ في كل جامعة مجلس علمي برئاسة نائب رئيس الجامعة المختص بالبحث العلمي وعضوية ممثل من كل كلية أو معهد بدرجة أستاذ مشارك على الأقل، ويصدر بتعيينهم قرار من مجلس الجامعة -بناءً على ترشيح من مجلس الكلية أو المعهد وتأييد رئيس الجامعة- ويعين جميع الأعضاء لمدة سنتين قابلة للتجديد مرة واحدة، ولمجلس الجامعة الاستثناء من ذلك. ويجوز بقرار من مجلس الجامعة تعيين أعضاء آخرين من الأساتذة أو الأساتذة المشاركين على ألا يتجاوز عددهم نصف مجموع الأعضاء ويكون تعيينهم لمدة سنتين قابلة للتجديد، ولمجلس الجامعة الاستثناء من ذلك. ويكون للمجلس العلمي أمين من أعضاء هيئة التدريس بالجامعة، ويصدر بتعيينه قرار من رئيس الجامعة -بترشيح من رئيس المجلس العلمي- لمدة سنتين قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'مع عدم الإخلال بأحكام النظام ولوائحه وقواعده يتولى المجلس العلمي الإشراف على الشؤون العلمية لأعضاء هيئة التدريس وشؤون البحوث والدراسات والنشر، وله على الخصوص ما يأتي: اعتماد الترقية العلمية لأعضاء هيئة التدريس. التوصية بتعيين أعضاء هيئة التدريس. الموافقة على التفرغ والاتصال العلمي لأعضاء هيئة التدريس ومشاركتهم العلمية والأكاديمية الخارجية. التوصية بالموافقة على الاستفادة من خدمات أعضاء هيئة التدريس من خلال الإعارة أو التكليف أو التعاقد معهم للقطاعين العام والخاص ومؤسسات المجتمع المدني. الموافقة على إصدار المجلات والدوريات العلمية. التوصية بإنشاء الجمعيات العلمية. اقتراح القواعد المنظمة للابتعاث والتدريب. وللمجلس تفويض بعض اختصاصاته لرئيسه وفق قواعد تفويض الصلاحيات التي يقرها مجلس الأمناء. وللمجلس كذلك تكوين لجان من أعضائه أو من غيرهم لدراسة ما يكلفها به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يجتمع المجلس العلمي مرة كل شهر في العام الدراسي على الأقل بناءً على دعوة من رئيسه أو من ينيبه من أعضاء المجلس، وللرئيس أن يدعو المجلس إلى الاجتماع إذا دعت الحاجة إلى ذلك أو إذا قدم إليه ثلث أعضائه على الأقل طلباً مكتوباً بذلك، أو بناءً على طلب من رئيس الجامعة الذي له أن يطلب إدراج موضوع يراه في جدول الأعمال وله رئاسة المجلس إذا حضره، ولا يكون اجتماع المجلس صحيحًا إلا إذا حضره ثلثا الأعضاء على الأقل على أن يكون من بينهم رئيس المجلس أو من ينوب عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تصدر قرارات المجلس العلمي بأغلبية أصوات الأعضاء الحاضرين على الأقل، وإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع، وتعد قراراته نافذة ما لم يرد عليها اعتراض من رئيس الجامعة خلال (عشرين) يوماً من تاريخ وصولها إليه، فإن اعترض عليها رئيس الجامعة، أعادها إلى المجلس العلمي -مشفوعة بوجهة نظره- لدراستها من جديد، فإن بقي المجلس على رأيه، فتحال القرارات المعترض عليها إلى مجلس الجامعة، وتنظر في أول جلسة عادية أو استثنائية، ولمجلس الجامعة تصديق القرارات أو تعديلها أو إلغاؤها، ويكون قراره في ذلك نهائيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'يكون مجلس الكلية أو المعهد برئاسة العميد وتكون العضوية فيه على النحو الآتي: الوكلاء ويكون أحدهم أميناً للمجلس رؤساء الأقسام العلمية. ولرئيس الجامعة أن يضيف لعضوية المجلس ثلاثة -على الأكثر- من أعضاء هيئة التدريس في الكلية أو المعهد، واثنان -على الأكثر- من ذوي الخبرة والعلاقة بمجال اختصاصات الكلية أو المعهد، وذلك بناءً على ترشيح من مجلس الكلية أو المعهد لمدة سنتين قابلة للتجديد مرة واحدة. ولمجلس الكلية أو المعهد دعوة من يراه من الطلبة لحضور جلساته للمشاركة في مناقشة الأمور الطلابية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: مع مراعاة ما تقضي به أحكام النظام وما يصدره مجلس شؤون الجامعات ومجلس الأمناء ومجلس الجامعة من لوائح وقواعد؛ يختص مجلس الكلية أو المعهد بالنظر في الأمور العلمية، والإدارية، والمالية، التي تتعلق بالكلية أو المعهد، ويجوز له تفويض بعض اختصاصاته لرئيسه، وللمجلس تكوين لجان من أعضائه أو من غيرهم؛ لدراسة ما يكلفها به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يجتمع مجلس الكلية أو المعهد بدعوة من رئيسه مرة كل شهر على الأقل في العام الدراسي، ولا يصح الاجتماع إلا بحضور ثلثي أعضائه على الأقل بمن فيهم الرئيس أو من ينيبه من الوكلاء، وتصدر قراراته بأغلبية أصوات الأعضاء الحاضرين على الأقل وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. تعد قرارات المجلس نافذة ما لم يرد عليها اعتراض من رئيس الجامعة خلال (عشرين) يوماً من تاريخ وصولها إليه، فإن اعترض عليها رئيس الجامعة أعادها إلى مجلس الكلية أو المعهد -مشفوعة بوجهة نظره- لدراستها من جديد، فإن بقي المجلس على رأيه فتحال القرارات المعترض عليها إلى مجلس الجامعة للبت فيها في أول جلسة عادية أو استثنائية ولمجلس الجامعة تصديق القرارات أو تعديلها أو إلغائها، ويكون قراره في ذلك نهائي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يكون لكل قسم علمي من أقسام الكلية أو المعهد مجلس يتألف من رئيس القسم رئيساً، وعضوية أعضاء هيئة التدريس فيه. ويجوز بقرار من رئيس الجامعة -عند الحاجة- أن يضاف إلى عضوية المجلس بعض أعضاء هيئة التدريس من أقسام أخرى. ويتولى العميد رئاسة المجلس في حالة غياب رئيس القسم أو خلو منصبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: مع مراعاة ما تقضي به أحكام النظام وما يصدره مجلس شؤون الجامعات ومجلس الأمناء ومجلس الجامعة من لوائح وقواعد؛ يختص مجلس القسم بالنظر في الأمور العلمية والمالية والإدارية التي تتعلق بالقسم، بما في ذلك تحديد المعايير الأساسية التي يجب أن تتضمنها المناهج العلمية التي تدرس في القسم، والتأكد من تنفيذها ومراجعتها دورياً، وله تفويض بعض اختصاصاته لرئيسه، وفق قواعد تفويض الصلاحيات التي يقرها مجلس الأمناء. ولمجلس القسم تشكيل لجان من أعضائه، أو من غيرهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يجتمع مجلس القسم بدعوة من رئيسه مرة كل شهر في العام الدراسي على الأقل، ولا يصح الاجتماع إلا بحضور ثلثي أعضائه على الأقل بمن فيهم الرئيس أو من ينيبه من الأعضاء، وتصدر قراراته بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. تعد قرارات مجلس القسم نافذة ما لم يرد عليها اعتراض من عميد الكلية أو المعهد خلال سبعة أيام عمل من تاريخ وصولها إليه، فإن اعترض عليها أعادها إلى مجلس القسم -مشفوعة بوجهة نظره- لدراستها من جديد، فإن بقي المجلس على رأيه، فتحال القرارات المعترض عليها إلى مجلس الكلية أو المعهد، وله صلاحيات البت فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يكلف رئيس الجامعة بأمر من رئيس مجلس الوزراء، بناء على توصية رئيس مجلس شؤون الجامعات بعد ترشيح مجلس الأمناء، ويكون التعاقد معه على نظام العمل لمدة ثلاث سنوات قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: 'مع مراعاة اختصاصات مجلس الأمناء ومجلس الجامعة، يكون رئيس الجامعة مسؤولاً أمام رئيس مجلس شؤون الجامعات طبقاً للنظام، ويتولى رئيس الجامعة إدارة الجامعة وتصريف جميع شؤونها، وله على وجه الخصوص ما يلي: إدارة شؤون الجامعة، بما فيها الشؤون الأكاديمية والإدارية والمالية. الإشراف على تنفيذ النظام ولوائحه ولوائح الجامعة وقرارات مجلس الأمناء وقرارات المجالس في الجامعة. تقديم تقرير سنوي عن أداء الجامعة إلى مجلس الأمناء بعد مناقشته في مجلس الجامعة، مبين فيه مؤشرات الأداء، ونتائج البحث العلمي في الجامعة ومناشط الجامعة في خدمة المجتمع والمناشط الأخرى، مع بيان الفرص والعوائق إن وجدت ومقترحات تذليلها، وأي مقترح آخر لتطوير الجامعة، وآلية تحقيق ذلك. ترشيح نواب رئيس الجامعة. تمثيل الجامعة أمام القضاء والجهات الأخرى، وله تفويض غيره بذلك. تكليف العمداء ووكلائهم، ورؤساء الأقسام، ومديري المراكز العلمية والبحثية. ولرئيس الجامعة تفويض بعض صلاحياته إلى أي من نوابه أو من يراه كل في نطاق اختصاصه، على أن يكون التفويض مكتوباً ومحدداً بمدة، وله تشكيل اللجان عند الحاجة إلى ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: إذا كان رئيس الجامعة يشغل وظيفة عامة، أو كان عضو هيئة تدريس، فيحق له الاحتفاظ بوظيفته خلال مدة رئاسته للجامعة، وتحتسب تلك المدة في الخدمة لأغراض العلاوة الدورية والترقية والتقاعد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يكون لكل رئيس جامعة نائب أو أكثر من أعضاء هيئة التدريس، ويكون تكليفهم بقرار من مجلس الأمناء بناء على ترشيح رئيس الجامعة، ويكون التكليف لمدة ثلاث سنوات قابلة للتجديد مرة واحدة، ولمجلس شؤون الجامعات الاستثناء مما ذكر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يعاون النواب رئيس الجامعة في إدارة شؤونها، وتحدد اللوائح صلاحياتهم، ولرئيس الجامعة تكليف أحدهم -عند تعددهم- للقيام بمهمات رئيس الجامعة عند غيابه، ولرئيس مجلس شؤون الجامعات تكليف من يراه من النواب -أو غيرهم- بإدارة الجامعة عند خلو منصب رئيسها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يكلف عميد الكلية أو العمادة أو المعهد بقرار من رئيس الجامعة ويكون تكليفه لمدة سنتين قابلة للتجديد وفق القواعد التي يقرّها مجلس أمناء الجامعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: مع مراعاة ما تقضي به أحكام النظام وما يصدره مجلس شؤون الجامعات ومجلس الأمناء ومجلس الجامعة من لوائح وقواعد؛ يتولى العميد إدارة الشؤون العلمية، والتعليمية، والإدارية، والمالية، للكلية أو المعهد، ويقدم في نهاية كل عام دراسي تقريراً مفصلاً إلى رئيس الجامعة عن سير أعمال الكلية أو المعهد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يكون لكل كلية أو عمادة أو معهد وكيل أو أكثر من أعضاء هيئة التدريس يرشحهم العميد، ويصدر بتكليفهم قرار من رئيس الجامعة لمدة سنتين قابلة للتجديد، ويعاون الوكيل العميد في أعماله، وينوب أقدم الوكلاء -عند تعددهم- عن العميد أثناء غيابه أو خلو منصبه، ويتولى أحدهم أمانة مجلس الكلية أو المعهد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يُكلّف رؤساء الأقسام في كل كلية بقرار من رئيس الجامعة بناء على ترشيح من عمداء الكليات، ويكون التكليف لمدة سنتين قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يكون رئيس القسم مسؤولاً عن إدارة الأمور العلمية والتعليمية والبحثية والإدارية والمالية للقسم في حدود النظام ولوائحه وما يقرره مجلس الجامعة ومجلس الكلية. ويقدم رئيس القسم للعميد تقريراً عن أعمال القسم في نهاية كل عام دراسي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: تلتزم الجامعة بالحصول على الاعتماد المؤسسي من هيئة تقويم التعليم والتدريب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: تعمل الجامعة على تحقيق الاعتماد البرامجي من هيئة تقويم التعليم والتدريب، أو من إحدى الهيئات الدولية التي تعتمدها الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يجوز أن يشكل في الجامعة مجلس استشاري دولي بقرار من مجلس الأمناء، ويحدد مجلس الأمناء اختصاصاته وقواعد عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يشكل في الجامعة بقرار من مجلسها مجلس استشاري للطلاب برئاسة أحد نواب رئيس الجامعة، ويحدد مجلس الجامعة اختصاصاته وقواعد عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يشكل في الجامعة بقرار من مجلسها مجلس استشاري لأعضاء هيئة التدريس برئاسة رئيس الجامعة أو من ينيبه، ويحدد مجلس الجامعة اختصاصاته وقواعد عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يكون لكل جامعة ميزانية سنوية مستقلة، ويصدر بإقرارها قرار من مجلس الأمناء وفق القواعد العامة التي يقرها مجلس شؤون الجامعات، بعد التنسيق مع الجهات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: يتولى الديوان العام للمحاسبة -وفق قواعد مراقبة الشركات والمؤسسات العامة- إجراء المراجعة للحساب الختامي للجامعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: مع عدم الإخلال بمراقبة الجهة المختصة، يعين مجلس الأمناء -بناءً على ترشيح من رئيس الجامعة- مراجعًا خارجيًا أو أكثر لحسابات الجامعة ممن تتوافر فيهم الشروط النظامية، وتكون لهم حقوق المراجع الخارجي في الشركات المساهمة، وعليهم واجباته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يجوز للجامعة أن تنشئ لها -بإشراف مجلس النظارة- أوقافاً يكون لها الشخصية المعنوية المستقلة, وتكون إدارتها وفق القواعد المنظمة التي يقرها مجلس شؤون الجامعات بما لا يتعارض مع شروط الواقفين, ويجوز للجامعة ولأوقافها تأسيس الشركات أو المشاركة في تأسيسها أو الدخول فيها شريكاً أو مساهما وذلك وفقاً للإجراءات النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: 'تتكون إيرادات الجامعة من الآتي: الإعانة التي تخصصها الدولة لها وفق القواعد المنظمة لبرنامج تمويل الجامعات. المقابل المالي للبرامج الدراسية والدبلومات والدورات والخدمات التي تقدمها. التبرعات، والهبات، والمنح، والوصايا، والأوقاف. ريع أملاكها، واستثماراتها، وأوقافها. الموارد المالية الأخرى التي يقرها مجلس الأمناء، على ألا تتعارض مع أهداف نشاط الجامعة وطبيعته. وتفتح الجامعة حسابًا لها في مؤسسة النقد العربي السعودي، وتفتح حساباً خاصاً لأوقاف الجامعة, ولها ولأوقافها فتح حسابات أخرى في أيّ من البنوك المرخص لها بالعمل في المملكة، وتودع فيها إيراداتها ويصرف من الحساب وفق القواعد المنظمة التي يقرها مجلس شؤون الجامعات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: 'للجامعة أن تتقاضى مقابلاً مالياً لتنمية إيراداتها الذاتية، ومنها ما يأتي: رسومٌ دراسية لبرامج الدراسات العليا، وبما لا يخل بجودة المنتج العلمي. رسومٌ دراسية لبرامج الدبلومات والدورات التعليمية والتدريبية، وذلك وفقًا للقواعد العامة التي يضعها مجلس شؤون الجامعات. رسومٌ دراسية من الطلبة غير السعوديين، ويستثنى من ذلك المنح الدراسية المجانية وفق القواعد المنظمة لذلك. مبالغ مالية مقابل القيام ببحوث علمية، أو خدمات استشارية، لجهات أخرى داخلية أو خارجية، وبما لا يخل بأهداف الجامعة ورسالتها. مبالغ مالية نتيجة استثمار الإيرادات المالية النقدية والعينية وتنميتها وفقًا للوائح المنظمة للاستثمار والإيرادات الذاتية وإدارة الأوقاف في الجامعة. مبالغ مالية مقابل التعاقد مع الجهات الحكومية وغيرها لتأمين ما تحتاجه تلك الجهات من الكفايات الوطنية من أعضاء هيئة التدريس لأداء مهمات تُحدّد وفقًا لعقد عمل يعتمد من الجهتين بعد موافقة عضو هيئة التدريس والمجالس المختصة، مع مراعاة استمرار عضو هيئة التدريس في أداء الحد الأدنى من أعماله الأكاديمية كالتدريس والإشراف العلمي وحضور المجالس العلمية. مبالغ
    مالية مقابل القيام بدراسات أو خدمات أو استشارات للجهات الحكومية وغيرها بموجب عقد يعتمد من الجهتين، عند الحاجة للكفايات الوطنية من أعضاء هيئة التدريس، وتدرج تلك العائدات في حساب مستقل للإنفاق منه وفقًا للوائح المعتمدة من مجلس الأمناء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يجوز بقرار من مجلس الوزراء؛ بناءً على اقتراح مجلس الأمناء وتأييد مجلس شؤون الجامعات؛ الموافقة على إنشاء فروع للجامعات خارج المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: يكون ارتباط جميع موظفي الجامعة -بمن فيهم أعضاء هيئة التدريس، والإداريون والفنيون- بالجامعة؛ وفقًا لنظام العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: يجوز حضور اجتماعات أي من المجالس المنصوص عليها في النظام بناء على طلب رئيس المجلس أو أحد الأعضاء بعد موافقة رئيس المجلس، ليفيدهم بما لديه من معلومات وإيضاحات، على أن يكون حق التصويت خاصا بأعضاء المجلس فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: لغة التعليم في الجامعة هي اللغة العربية، ويجوز -عند الاقتضاء وبقرار من مجلس الجامعة- التدريس بلغات أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: لا يجوز لعضو أي من المجالس المنصوص عليها في النظام حضور مناقشة المجلس في الموضوعات المتعلقة به، أو بمن لهم به قرابة إلى الدرجة الثانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: تكون جميع المجالس المنصوص عليها في النظام مسؤولة عن تنفيذه، ويكون مجلس شؤون الجامعات مسؤولاً عن سلامة التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: يحل هذا النظام محل نظام مجلس التعليم العالي والجامعات، الصادر بالمرسوم الملكي رقم (م / 8) وتاريخ 4 / 6 / 1414هـ ويلغي جميع ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: يعمل بالنظام بعد مائة وثمانين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ee74282-7f0d-49ff-b6ee-aafc00a3d801/1
  verified: false
