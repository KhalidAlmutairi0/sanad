regulation:
  code: BOE481
  name_ar: تنظيم المنطقة الخاصة اللوجستية المتكاملة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبنية أمام كل منها: 1- المنطقة: المنطقة الخاصة اللوجستية المتكاملة. 2- التنظيم: تنظيم المنطقة. 3- الجهة المختصة: الهيئة العامة للطيران المدني. 4- التجميع: عملية توريد منتجات ذات بنود جمركية مختلفة وتركيبها للوصول إلى المنتج النهائي وبنده الجمركي. 5- العمليات التصنيعية البسيطة: عمليات التجميع والتفكيك والتركيب والغسيل والنقش والاختبار والتصميم، بشرط ألا تؤدي إلى تغيير البند الجمركي. 6- البضائع: جميع ما يستورد أو يُدخل إلى المنطقة من منتجات وسلع وقطع ومواد وأجهزة ومعدات وغيرها على اختلاف أنواعها وأشكالها، بما في ذلك ما يُستخدم في العمليات التصنيعية البسيطة والإصلاح والصيانة والتعديل والتغيير والتطوير داخل المنطقة. 7- البضائع الأخرى: جميع ما ينتج من العمليات التصنيعية البسيطة، وما يُعالج ويُعدّل ويُغيّر ويُطوّر داخل المنطقة. 8- الأرض الرئيسة: إقليم المملكة العربية السعودية ما عدا المنطقة. 9- المنشأة الدائمة: يكون لهذه العبارة المعنى المخصص لها في نظام ضريبة الدخل، الصادر بالمرسوم الملكي رقم (م/1) وتاريخ
    1425/1/15 هـ. 10- غير المقيم: يكون لهذه العبارة المعنى المخصص لها في نظام ضريبة الدخل، الصادر بالمرسوم الملكي رقم (م/1) وتاريخ 1425/1/15 هـ. 11- نظام الجمارك الموحد: نظام (قانون) الجمارك الموحد لدول مجلس التعاون لدول الخليج العربية، الموافق عليه بالمرسوم الملكي رقم (م/41) وتاريخ 1423/11/3هـ. 12- ضريبة القيمة المضافة: يكون لهذه العبارة المعنى المخصص لها في الاتفاقية الموحدة لضريبة القيمة المضافة لدول مجلس التعاون لدول الخليج العربية، المصادقة بالمرسوم الملكي رقم (م/51) وتاريخ 1438/5/3هـ. 13- توريد: يكون لهذه الكلمة المعنى المخصص لها في الاتفاقية الموحدة لضريبة القيمة المضافة لدول مجلس التعاون لدول الخليج العربية، المصادقة بالمرسوم الملكي رقم (م/51) وتاريخ 1438/5/3هـ. 14- المنشأة القائمة: أي شركة أو فرع شركة يمارس داخل المنطقة الأنشطة المشار إليها في المادة (السادسة) من التنظيم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف التنظيم إلى إقامة منطقة خاصة لوجستية جاذبة لاستثمارات نوعية، تٌمارس فيها الأنشطة المذكورة في المادة (السادسة) من التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 1- تنشأ بموجب التنظيم منطقة خاصة لوجستية متكاملة، يكون موقعها في أرض مطار الملك خالد في الرياض بحسب المساحة والموقع الجغرافي المحددين في الخريطة المرافقة للتنظيم. 2- يكون إنشاء أي منطقة خاصة لوجستية متكاملة أخرى في إحدى أراضي مطارات المملكة بقرار من مجلس الشؤون الاقتصادية والتنمية بناء على اقتراح من الجهة المختصة، وتسري عليها أحكام التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 1- تعد الجهة المختصة هي المسؤولة عن إدارة المنطقة وتطويرها والإشراف عليها وتنظيم الأنشطة التي تمارس فيها، ولها الصلاحيات اللازمة لذلك. 2- للجهة المختصة إسناد أعمال إدارة المنطقة وتطويرها والإشراف عليها أو بعض من هذه الأعمال إلى القطاع الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- للجهة المختصة -دون غيرها- تملك الأراضي والأصول الواقعة داخل المنطقة، ولها -وفقًا لما تقرره من ضوابط- منح حقوق الانتفاع عليها. 2- للجهة المختصة -وفقًا لما تقره من ضوابط- تقديم كل أنواع الضمانات والتعهدات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يُمارَسُ في المنطقة -بعد أخذ التراخيص والموافقات اللازمة من الجهة المختصة- أيًّا من الأنشطة الآتية: 1- صيانة البضائع وإصلاحها ومعالجتها وتعديلها وتطويرها وتجميعها وتخزينها. 2- فرز البضائع أو البضائع الأخرى وتعبئتها وإعادة تعبئتها وتغليفها والاتجار بها وتوزيعها والتعامل معها واستخدامها -بما في ذلك العمليات التصنيعية البسيطة- بأي شكل من الأشكال. 3- الاستيراد والتصدير وإعادة التصدير. 4- الخدمات ذات القيمة المضافة، والخدمات اللوجستية، وخدمات ما بعد البيع. 5- إعادة تدوير النفايات والمخلفات الإلكترونية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- لا تُستحق رسوم جمركية -وفقاً لنظام الجمارك الموحد- على البضائع والبضائع الأخرى؛ وذلك باعتبار أنها في وضع تعليق جمركي. 2- تخرج البضائع والبضائع الأخرى من وضع التعليق الجمركي فور نقلها من المنطقة إلى الأرض الرئيسة. 3- تعد البضائع والبضائع الأخرى التي تُنقل مؤقتاً إلى المنطقة في وضع تعليق جمركي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- لا تُستحق ضريبة القيمة المضافة على البضائع، والبضائع الأخرى متى ما كانت في وضع تعليق جمركي. 2- لا تُستحق ضريبة القيمة المضافة على توريد البضائع المعلقة جمركيًّا -بموجب المادة (السابعة) من التنظيم- ما لم تكن الغاية من البضائع الموردة؛ استخدامها أو استهلاكها لأنشطة أخرى غير المنصوص عليها في المادة (السادسة) من التنظيم. 3- لا تُستحق ضريبة القيمة المضافة عند النقل المؤقت للبضائع والبضائع الأخرى بين الأرض الرئيسة والمنطقة لأغراض الإصلاح والصيانة وخدمات ما بعد البيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: لا يعد غير المقيم الممارس لنشاط ذي صلة مباشرة بالبضائع أو البضائع الأخرى الموجودة داخل المنطقة مالكًا لمنشأة دائمة في المملكة، وذلك فيما يتصل بتطبيق نظام ضريبة الدخل الصادر بالمرسوم الملكي رقم (م/1) وتاريخ 1425/1/15هـ، مع مراعاة الضوابط والشروط التي تصدرها الهيئة العامة للزكاة والدخل وفقًا للمادة (العاشرة) من التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تُصدر الهيئة العامة للزكاة والدخل الضوابط والشروط الخاصة بضريبة الدخل التي تطبق على المنشآت القائمة داخل المنطقة التي تمارس أنشطتها داخل المنطقة بما يتوافق مع أحكام التنظيم وأهداف المنطقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لا يُفرض أي قيد مالي على المنشآت القائمة داخل المنطقة فيما يخص الاقتراض من الخارج، أو استعادة رأس المال، أو تحويل العائدات والأرباح، ودفع العمولات وغيرها من الدفعات المشابهة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: '1- تتولى الجهة المختصة -دون غيرها- ما يأتي: أ- إصدار التراخيص والموافقات اللازمة للمنشآت الراغبة في ممارسة الأنشطة الواردة في المادة (السادسة) من التنظيم، وتحديد المقابل المالي لذلك وتحصيله على ألا يقل عن المقابل المقرر نظاماً، ولها كل الصلاحيات التي تمكنها من ذلك. ب- الرقابة على المنشآت القائمة داخل المنطقة وتفتيشها. 2- تتفق الجهة المختصة مع الجهات ذات العلاقة على ما يلزم من ترتيبات في شأن تنفيذ ما ورد في الفقرة (1).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'على المنشأة القائمة داخل المنطقة -إضافة إلى كتابة اسمها على كل المطبوعات والعقود والفواتير والمراسلات والمنشورات- كتابة الآتي: 1- أن المنشأة قد تأسست أو سجلت وفقاً لأحكام التنظيم. 2- أن المنشأة منشأة قائمة داخل المنطقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- تمنح وزارة العمل والتنمية الاجتماعية الجهة المختصة تأشيرات العمل اللازمة لتحقيق أهداف الاستثمار في المنطقة، وذلك بالقدر الكافي الذي تحدده الجهة المختصة. 2- تقوم الجهة المختصة بالتنسيق مع الجهات ذات العلاقة لاستخراج رخص العمل وتصاريح الإقامة للعاملين في المنطقة. 3- للجهة المختصة تمكين المنشآت القائمة في المنطقة من الاستفادة من خدمات العاملين الذين يستقدمون بموجب الفقرة (1) من هذه المادة، وذلك بما يحقق متطلبات تلك المنشآت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا تخضع منقولات المنشآت القائمة داخل المنطقة -بما فيها حقوق الملكية الفكرية- لأي قيود على الملكية الخاصة، ولا تصادر إلا بحكم قضائي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تنسق الجهة المختصة مع وزارة العمل والتنمية الاجتماعية لوضع اشتراطات وبرامج التوطين التي ستطبق داخل المنطقة بما يحقق أهداف الاستثمار فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تنسق الجهة المختصة مع الجهات الأمنية المعنية داخل أراضي المطارات لقيام تلك الجهات بوضع آلية شاملة ومحددة الأدوار لكل العمليات الأمنية التي تتم في المنطقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: فيما لم يرد فيه نص خاص في التنظيم، تخضع المنطقة للأنظمة والتشريعات المعمول بها في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: لا يخل أي تنظيم أو لائحة تصدر لاحقاً بالأحكام والاستثناءات الواردة في التنظيم، ما لم يُنص صراحة على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تصدر الجهة المختصة القواعد والقرارات التنفيذية للتنظيم، بالتنسيق مع الجهات ذات العلاقة كل فيما يخصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ الموافقة عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e4e5f15c-9728-4ed1-b1b9-a9fc00b15fef/1
  verified: false
