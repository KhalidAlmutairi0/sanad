regulation:
  code: BOE084
  name_ar: نظام تصنيف المقاولين
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ الآتية أينما وردت في هذا النظام المعاني المبينة أمامها ما لم يقتض السياق غير ذلك: الوزارة: وزارة الشؤون البلدية والقروية والإسكان. الوزير: وزير الشؤون البلدية والقروية والإسكان. النــظـام: نظام تصنيف المقاولين. اللائحــــة: اللائحة التنفيذية للنظام. التصنيف: تقويم إمكانيات المقاول: المالية، والفنية، والإدارية، والتنفيذية؛ لوضعه في المجال والنشاط والدرجة المستحقة وفقًا لأحكام النظام واللائحة. المقـــــاول: شخص ذو صفة طبيعية أو اعتبارية مرخص له نظامًا بالقيام -منفردًا أو مشتركًا- لتنفيذ عقد في أحد المجالات المحددة في اللائحة. المجـــــال: نوع العمل الذي يصنف فيه المقاول. النشـــاط: نوع من الأعمال الفرعية في مجال من المجالات. الدرجــة: النتيجة التي يحصل عليها المقاول عند تصنيفه. المعيار: مجموعة العناصر المستخدمة للتصنيف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتولى الوزارة -بالتنسيق مع الجهات ذات العلاقة- التصنيف وإصدار شهادات التصنيف وتعديلها وإيقافها وإلغاءها، وفق أحكام النظام واللائحــــة، على أن يبت في طلب التصنيف أو تعديله خلال مدة تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لا يجوز للجهات الحكومية والهيئات والمؤسسات والأجهزة ذوات الشخصية الاعتبارية العامة إرساء أو قبول أي عرض أو عطاء لأي مشروع يخضع للتصنيف إلا إذا كان المقاول مصنفًا، وكان المشروع يقع في المجال والنشاط والدرجة التي تم تصنيف المقاول عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تحدد وتعدل مجالات وأنشطة ودرجات التصنيف بقرارٍ من الوزير، وفق ضوابط تحددها اللائحة، على أن يتم الاستناد في تحديد مجالات وأنشطة التصنيف بناءً على ما ورد بالدليل الوطني للأنشطة الاقتصادية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تحدد وتعدل الحدود المالية لكل درجة بقرارٍ من الوزير بعد الاتفاق مع وزير المالية ووزير الاقتصاد والتخطيط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يصنف المقاول في الدرجة التي يستحقها في مجالٍ أو نشاطٍ واحدٍ أو أكثر من مجالات وأنشطة التصنيف، وذلك وفقًا للمعايير والشروط الآتية: القدرة المالية: القوائم المالية. القدرة الفنية والإدارية والتنفيذية: الهياكل التنظيمية، الكوادر الإدارية والفنية. إجمالي عدد ونوع وقيمة المشاريع. وأي معايير أو شروط أخرى تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للمقاول أن يطلب تعديل شهادة تصنيفه برفع أي مجال (أو نشاط) أو إضافته أو حذفه منها، على أن يعزز طلبه بالمعلومات والبيانات التي تؤيد ذلك، وفقًا للشروط التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يصدر الوزير أو من يفوضه قرارًا بتصنيف المقاول في المجال (أو المجالات) أو النشاط (أو الأنشطة)، والدرجة التي يستحقها، بناءً على ما توافر من معلومات وبيانات، ويمنح شهادة بذلك وفق المدة المحددة في اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: إذا تضامن مقاولان أو أكثر في تنفيذ مشروعٍ ما، فيجب أن يكون كل منهم مصنفًا في مجال تنفيذ المشروع وأحدهم على الأقل مصنفًا في المجال والدرجة المطلوبة لتنفيذه، وأن تكون درجة تصنيف المتضامنين الباقين بنفس الدرجة المطلوبة لتنفيذ المشروع أو أقل بدرجةٍ واحدة فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: إذا حدث أي تغير قانوني على وضع المقاول مما يؤثر على تصنيفه، فعليه التقدم بطلب تعديل شهادة التصنيف وفقًا للحالات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يصنف المقاول المرخص له بالعمل وفقًا لنظام الاستثمار الأجنبي حسب الإجراءات المعمول بها في تصنيف المقاول السعودي. ولمجلس الوزراء استثناؤه وفق ضوابط يضعها لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تتقاضى الوزارة مقابلًا ماليًّا عن الخدمات التي تقدمها وفق أحكام النظام، على أن تحدد هذه الخدمات والمقابل المالي لها بالاتفاق مع وزارة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: على الجهات الحكومية والهيئات والمؤسسات والأجهزة ذوات الشخصية الاعتبارية العامة تزويد الوزارة بالمعلومات والبيانات والملحوظات التي تطلبها عن المقاولين لأغراض التصنيف، وكذلك المشاريع التي نفذها المقاولون أو تحت التنفيذ، وذلك بحسب ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يتولى مفتشون -يصدر بتسميتهم قرار من الوزير- مجتمعين أو منفردين ضبط مخالفات أحكام النظام واللائحة، وإثباتها، والاطلاع على السجلات والمعلومات، والحصول على صور من الوثائق الضرورية. وتحدد اللائحة قواعد وإجراءات عملهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها أي نظام آخر، يعاقب كل من يخالف أحكام النظام أو اللائحة بواحدة أو أكثر من العقوبات الآتية: أ- تخفيض درجة التصنيف. ب- إيقاف التصنيف، والمنع من تجديده لمدة لا تزيد على (خمس) سنوات. ج- إلغاء التصنيف. يصدر الوزير -بقرار منه- جدول تصنيف للمخالفات وتحديد للعقوبات ضمن حدها المنصوص عليه في النظام، يراعى فيه طبيعة كل مخالفة وجسامتها، والظروف المشددة والمخففة لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يتولى النظر في اعتراضات المقاولين على قرارات التصنيف، ومخالفات أحكام النظام واللائحة، والفصل فيها، وإقرار العقوبات المنصوص عليها في المادة (الخامسة عشرة) من النظام، لجنة (أو أكثر) تكوَّن من (ثلاثة) أعضاء على الأقل، على أن يكون من بينهم مختص شرعي أو نظامي. تشكل اللجنة -المنصوص عليها في الفقرة (1) من هذه المادة- بقرار من الوزير لمدة (ثلاث) سنوات قابلة للتجديد، ويحدد القرار من يتولى رئاستها، على أن يكون من المختصين في الشريعة أو الأنظمة، وتصدر قراراتها بالأغلبية، وتكون قراراتها مسببة. تحدد اللائحة قواعد وإجراءات عمل اللجنة -المنصوص عليها في الفقرة (1) من هذه المادة- والفريق المساند لها، ومكافآت أعضائهما. يجوز التظلم من قرار اللجنة -المنصوص عليها في الفقرة (1) من هذه المادة- أمام المحكمة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يصدر الوزير اللائحة خلال (تسعين) يومًا من تاريخ نشر النظام في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشر النظام في الجريدة الرسمية، ويعمل به بعد مضي (تسعين) يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يحل النظام محل نظام تصنيف المقاولين الصادر بالمرسوم الملكي رقم (م / 18) وتاريخ 20 / 3 / 1427ه، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/66eccea3-fc1c-471f-bcfa-ad9d009a7ec0/1
  verified: false
