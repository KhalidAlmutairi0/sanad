  name_ar: نظام ضمان الحقوق بالأموال المنقولة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها: النظام: نظام ضمان الحقوق بالأموال المنقولة. اللائحة: اللائحة التنفيذية للنظام. الوزارة: وزارة التجارة. الوزير: وزير التجارة. حق الضمان: حق عيني يقع على ضمانة تقدم، أو يتفق على تقديمها؛ ضماناً للوفاء بالتزام. الضمانة: مال منقول يُقدم، أو يتفق على تقديمه؛ ضماناً للوفاء بالتزام. الالتزام المضمون: التزام قدمت الضمانة ضمانًا للوفاء به، ويشمل ذلك الالتزام المالي سواء أكان نقديًا أم غير نقدي، والالتزام بالقيام بعمل أو الامتناع عن عمل، وجميع أنواع الالتزامات، الحالية والمستقبلية، بما في ذلك الثابتة أو المعلقة على شرط. المضمون له: شخص ذو صفة طبيعية أو اعتبارية قُدم حق الضمان لمصلحته. الضامن: شخص ذو صفة طبيعية أو اعتبارية مُقدِّم لحق الضمان. المضمون عنه: شخص ذو صفة طبيعية أو اعتبارية مدين بالالتزام المضمون، إذا لم يكن هو الضامن. الذمة المدينة: حق نقدي -غير مضمون- للمدين على الغير سواء أكان حالًا أم مؤجلًا. الضمان بحوالة الحق: اتفاق بين دائن وشخص آخر يقدم -بناء عليه- هذا الشخص حقوقه لدى الغير
    ضمانة للوفاء بدينه تجاه الدائن. السجل: السجل الموحد للحقوق على الأموال المنقولة. الإشهار: قيد حق الضمان وما يطرأ عليه في السجل. المخزون: بضائع محتفظ بها لغرض البيع أو التأجير والمواد الأولية والمواد قيد التصنيع والتحويل. العقار بالتخصيص: مال منقول ملحق بعقار بشكل ثابت لخدمته واستغلاله. العوائد: الريع أو البدل العيني أو النقدي المتحصل من التصرف بالضمانة أو الانتفاع بها أو استبدال غيرها بها، ويشمل ذلك نتاجها ونماؤها والتعويض عن نقص قيمتها أو تلفها أو أي تعويض آخر متصل بتلك الضمانة، ولا يشمل ذلك حصيلة التنفيذ عليها بناء على أحكام النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تسري أحكام النظام على أي عقد أو معاملة تتضمن إنشاء حق ضمان على الضمانة، ويشمل ذلك بوجه خاص الآتي: أ- الرهن التجاري. ب- بيع المال المنقول المتضمن شرطًا باسترداده أو إعادة شرائه. ج- نقل ملكية المال المنقول لغرض الضمان. د- بيع المال المنقول بشرط تأجيل نقل ملكيته إلى حين استيفاء الثمن. هـ- الضمان بحوالة الحق. و- بيع الحقوق في الذمم المدينة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يجوز أن تكون ضمانة أي أموال منقولة -سواء كانت مادية أو معنوية، حالية أو مستقبلية، أو حقوقًا حالية أو مستقبلية-، وسواء كانت مملوكة من الضامن أو المضمون له أو الغير، ويشمل ذلك بوجه خاص الآتي: أ- الحقوق لدى الغير سواء أكانت حاّلة أو مؤجلة، بما فيها الذمة المدينة. ب- الحسابات الدائنة لدى البنوك والمؤسسات المالية الأخرى، بما في ذلك حساب الوديعة والحساب الجاري. ج- السندات الكتابية القابلة للتحويـل عن طريق التسليم أو التظهير، التي تثبت استحقاق مبلغ أو ملكية بضائع، بما فيها الأوراق التجارية وشهادات الإيداع البنكية وبواليص الشحن. د- المركبات وما في حكمها. هـ- المعدات وأدوات العمل. و-المخزون. ز- الحيوانات ومنتجاتها. ح- المحاصيل الزراعية. ط- العقار بالتخصيص. ي- الأشجار ولو قبل قطعها، والمعادن ولو قبل استخراجها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'لا تسري أحكام النظام على المعاملتين الآتيتين: أ- حوالـة الحـق لغايات تحصيل الديون. ب- شراء دين يكون جزءًا من اتفاقية تملك مشروع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'لا تسري أحكام النظام على حقوق الضمان المتعلقة بالآتي: أ- السفن، والطائرات. ب- الأوراق المالية المدرجة في السوق المالية. ج- البضائع المودعة في المخازن العامة ما لم يكن حق الضمان قد تقرر قبل الإيداع. د- العلامات التجارية. هـ- الحسابات الاستثمارية. و- الأموال التي لها سجلات ملكية تقيد فيها حقوق الضمان.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: '1- يكون حق الضمان صحيحًا ومنتجًا لآثاره بين أطرافه، إذا استوفى الشروط الآتية: أ- أن يكون مكتوبًا سواء في عقد مستقل أو ضمن عقد آخر. ب- أن يكون الضامن مخولًا بإنشاء حق الضمان على الضمانة. ج- أن يوصف الالتزام المضمون وصفًا عامًّا أو محددًا، ويشمل ذلك تحديد الحد الأعلى له. د- أن توصف الضمانة وصفًا عامًّا أو محددًا بما يتيح التعرف عليها، ويشمل ذلك وصفها على أنها كامل أموال الضامن، أو فئة محددة أو عامة أو صنف محدد أو عام من أموال الضامن. هـ- أن يؤدي المضمون له مقابل الالتزام المضمون أو أن يلتزم بأدائه. 2- ينشأ حق الضمان لضمان التزام أو أكثر، سواء أكان الالتزام سابقًا لتاريخ إنشاء حق الضمان أو متزامنًا معه أو لاحقًا له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يعتد بحق الضمان المنشأ على الأموال التي لا يجوز -بناء على نظام آخر- إنشاء حق ضمان عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- يشترط لنفاذ حق الضمان في مواجهة الغير الإشهار، أو انتقال حيازة الضمانة إلى المضمون له انتقالاً مباشرًا أو غير مباشر سواء كان انتقالاً حقيقيًّا أو حكميًّا. 2- استثناءً من حكم الفقرة (1) من هذه المادة، تحدد اللائحة الحالات التي تُعد الحيازةُ الوسيلة الوحيدة لنفاذ حق الضمان في مواجهة الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: مع مراعاة حكم الفقرة (2) من المادة (الثامنة) من النظام، لا يؤثر استبدال طريقة نفاذ حق الضمان على الضمانة من الإشهار إلى الحيازة أو العكس، في استمرار نفاذ حق الضمان في مواجهة الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- يستمر حق الضمان النافذ في مواجهة الغير تلقائيًّا على عوائد الضمانة لمدة (خمسة عشر) يومًا من قبض الضامن لها، ما لم يتفق عند إنشاء حق الضمان على استثنائها. 2- ينقضي نفاذ حق الضمان على العوائد في مواجهة الغير بانقضاء المدة المنصوص عليها في الفقرة (1) من هذه المادة، ويستثنى من ذلك العوائد النقدية القابلة للتعيين أو العوائد الموصوفة في الإشهار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: إذا كانت الضمانة حقًّا لدى الغير، فيكون نفاذ حق الضمان في مواجهة ذلك الغير من تاريخ إبلاغه بإنشاء حق الضمان على الحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا يؤثر أي شرط في اتفاق يقيد حق الضامن في تقديم ديونه أو حوالة حقوقه ضمانة على صحة عقد إنشاء حق الضمان أو نفاذه، ولا يمنع ذلك الطرف الذي اشترط القيد لمصلحته من الرجوع إلى الضامن للمطالبة بحقوقه الاتفاقية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 1- أ- يستمر نفاذ حق الضمان في مواجهة الغير حتى وإن أصبحت الضمانة عقارًا بالتخصيص؛ إذا كان حق الضمان مشهرًا في السجل. ب- يسري نفاذ حق الضمان المشهر في الضمانة التي أصبحت عقارًا بالتخصيص في مواجهة أي دائن مضمون بالعقار الذي خصصت له تلك الضمانة، سواءً وضع العقار ضمانًا لالتزام قبل تخصيص الضمانة للعقار أو بعد التخصيص. 2- لا ينفذ حق الضمان المنشأ على الضمانة التي أصبحت عقارًا بالتخصيص في مواجهة الدائن المرتهن للعقار إذا تم تخصيص الضمانة للعقار قبل تسجيل الرهن على العقار ما لم يكن حق الضمان مشهرًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يستمر نفاذ حق الضمان في مواجهة الغير في حال إلحاق الضمانة بمال منقول آخر بشكل قابل للفصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: إذا أحال المضمون له حق ضمان نافذ في مواجهة الغير، فلا يلزم إشهار الحوالة، ويستمر نفاذ حق الضمان في مواجهة الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: '1- لا يعتد بإشهار حق الضمان إلا بموافقة مكتوبة من الضامن. 2- يستكمل الإشهار باستيفاء الإجراءات الواردة في اللائحة، بتعبئة النموذج الإلكتروني المعد لهذا الغرض، على أن يتضمن المعلومات الآتية: ‌أ- بيانات الضامن، وتشمل اسمه وفقًا لوثائقه الرسمية، ورقم الهوية أو السجل الخاص به. ‌ب- اسم المضمون له وعنوانه وبيانات الاتصال به. ‌ج- وصف الضمانة وفق ما ورد في الفقرة (1/د) من المادة (السادسة) من النظام. ‌د- تاريخ انتهاء الإشهار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 1- ينقضي الإشهار بانهائه من المضمون له، أو بانتهاء مدته المحددة في السجل ما لم يتم تمديدها قبل انتهائها، أو بصدور حكم قضائي بشطبه أو إنهائه. 2- إذا انتهى حق الضمان قبل انتهاء مدة الإشهار، يلتزم المضمون له بإنهاء الإشهار خلال (خمسة عشر) يومًا من تاريخ انتهاء حق الضمان، ويلتزم بتعويض الضامن عن أي ضرر ينشأ عن عدم التزامه بالإنهاء في المدة المحددة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: لأي شخص الاطلاع على السجل والحصول على مستخرَج ببيانات ومعلومات أي إشهار، ويعد المستخرَج المعتمد وسيلة معتبرة في إثبات تاريخ الإشهار ووقته ومضمونه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: '1- للضامن إيقاع أكثر من حق ضمان على الضمانة نفسها. 2- ترتب الأولوية حقاً للمضمون له بالتقدم على غيره من الدائنين في استيفاء الالتزام المضمون من الضمانة، وتكون الأولوية بين المضمون لهم وفقا للآتي: أ- يكون لحق الضمان النافذ في مواجهة الغير أولوية على غيره من حقوق الضمان. ب- يكون لحق الضمان النافذ في مواجهة الغير بالإشهار أولوية على غيره من حقوق الضمان النافذة الأخرى. ج- إذا وجد أكثر من حق ضمان نافذ بالإشهار، فتكون الأولوية في استيفاء الحق للمضمون له الأسبق في تاريخ الإشهار ووقته. د- إذا وجد أكثر من حق ضمان نافذ بانتقال الحيازة، فتكون الأولوية في استيفاء الحق للمضمون له الأسبق في تاريخ الحيازة ووقتها. هـ- إذا وجد أكثر من حق ضمان غير نافذ في مواجهة الغير، فتكون الأولوية في استيفاء الحق للمضمون له الأسبق في تاريخ إنشاء حق الضمان ووقته. 3- استثناءً من حكم الفقرة (2) من هذه المادة، للائحة -عند الاقتضاء- تحديد أولويات خاصة لحقوق الضمان في معاملات أو أموال محددة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تتقدم حقوق الضمان النافذة في مواجهة الغير في أولوية السداد على الديون الأخرى بما فيها حقوق العمال والمستحقات الحكومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: للمضمون له التنازل كتابةً عن مرتبة الأولوية المقررة لحق الضمان العائد له دون المساس بحقوق الضمان الأخرى، ويكون هذا التنازل نافذًا في مواجهة الغير دون حاجة إلى إشهاره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 1- لا يجوز للضامن نقل ملكية الضمانة، إلا بموافقة المضمون له أو إذا كان ذلك في إطار الأعمال المعتادة للضامن. 2- يترتب على نقل ملكية الضمانة -بالمخالفة للفقرة (1) من هذه المادة- في حق الضمان النافذ في مواجهة الغير؛ حق المضمون له في تتبع الضمانة في أي يد لاستيفاء حقوقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 1- يجوز اتفاق الضامن والمضمون له على تمكين المضمون له من التنفيذ غير القضائي على الضمانة استيفاءً لحقه في حال الإخلال بالوفاء بالالتزام المضمون، على أن يكون هذا الاتفاق مكتوباً وقبل حصول إخلال بالالتزام المضمون. 2- يشمل التنفيذ المشار إليه في الفقرة (1) من هذه المادة، بيع الضمانة بالمزاد العلني أو بيعًا مباشرًا، أو تملكها لاستيفاء حق المضمون له. وتحدد اللائحة الأحكام والإجراءات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: للمضمون له اتخاذ الإجراءات اللازمة لإصلاح الضمانة وتحسينها وإعدادها للبيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يترتب على التنفيذ غير القضائي أو القضائي على الضمانة؛ تطهيرها من الحقوق المترتبة عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: '1- إذا كانت حصيلة التنفيذ على الضمانة لا تكفي للوفاء بالحقوق المترتبة عليها فتوزع وفق الترتيب الآتي: ‌أ- نفقات اتخاذ الإجراءات اللازمة لإصلاح الضمانة وتحسينها وإعدادها للبيع. ‌ب- نفقات التنفيذ على الضمانة. ‌ج- ما يترتب لأصحاب حقوق الضمان بحسب الأولويات وفقا لأحكام النظام. 2- يكون المضمون له -في التنفيذ غير القضائي- مسؤولًا عن إعادة المبالغ المتبقية من التنفيذ للضامن، وذلك بعد استيفاء الحقوق المترتبة على الضمانة الواردة في الفقرة (1) من هذه المادة. 3- يبقى المدين بالالتزام المضمون مسؤولًا تجاه المضمون له ‏عن أي نقص في استيفاء حقه، وفي هذه الحالة يعد النقص دينًا ‏غير مضمون.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 1- تؤسس الوزارة السجل وتديره، ولها إسناد ذلك إلى جهة خاصة، وتحدد الوزارة شروط عمل هذه الجهة والضوابط اللازم التقيد بها، ويكون للوزارة جميع الصلاحيات اللازمة لضمان ممارسة هذه الجهة عملها بفعالية ونزاهة. 2- يكون المضمون له الذي قام بالإشهار مسؤولًا عن دقة وصحة المعلومات والبيانات التي قدمها في الإشهار، ولا تتحمل الجهة القائمة على السجل مسؤولية عدم صحة أو دقة البيانات والمعلومات الواردة في الإشهار الذي قام به المضمون له. 3- لكل ذي مصلحة الاعتراض أمام المحكمة المختصة على أي إشهار في السجل أو على بيانات محددة في الإشهار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 'يصدر الوزير اللائحة خلال (ثلاثين) يومًا من تاريخ نشر النظام في الجريدة الرسمية، على أن تتضمن بوجه خاص الآتي: ‌أ- إجراءات الإشهار. ‌ب- إجراءات البحث في السجل والحصول على مستخرجاته. ‌ج- المقابل المالي لخدمات السجل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يعمل بالنظام من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e2c00ba7-2af3-41fa-a1ab-ab9f00af1dec/1
