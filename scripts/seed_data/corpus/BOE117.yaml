regulation:
  code: BOE117
  name_ar: نظام حماية المرافق العامة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يطبق هذا النظام على المرافق العامة التالية: المياه والمجاري وتصريف السيول والكهرباء والهاتف والطرق العامة والسكك الحديدية والمرافق الأخرى التي يصدر بتحديدها قرار من مجلس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتعين قبل القيام بأي عمل من شأنه التأثير على شبكات ومنشآت أي مرفق من المرافق العامة الحصول من الجهة المختصة على المخططات والتعليمات الخاصة بذلك المرفق، وأخذ أقصى الاحتياطات التي تضمن حمايته وعدم توقف خدماته عن أي مستفيد منه. وفي حال إلحاق ضرر بأي مرفق يجب على المتسبب إشعار الجهة المعنية بهذا المرفق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: على الإدارات والشركات المعنية بإدارة كل مرفق اتخاذ الاحتياطات اللازمة لحمايته وتوعية الغير بما يجب عمله لضمان سلامة شبكات المرفق ومنشآته. وعليها تقديم مخططات المرفق والتعليمات المعدة لحمايته إلى من يطلبها من ذوي العلاقة خلال مدة لا تتعدى خمسة عشر يوما من ورود الطلب إليها، وتكون مسؤولة عن صحة التعليمات والمخططات التي تقدمها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: على إدارات وشركات المرافق العامة التنسيق فيما بينها بما يخدم حماية كل مرفق وضمان إصلاح أي ضرر يتعرض له بأقصى سرعة ممكنة، وعليها من أجل ذلك الإعلام عن المسؤول لديها الذي يمكن الاتصال به في أي وقت .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يعاقب بالسجن مدة لا تزيد عن سنتين وبغرامة لا تتجاوز مائة ألف ريال، أو بإحدى هاتين العقوبتين كل من تعمد إتلاف أي من تمديدات أو منشآت المرافق العامة أو تعمد قطعها أو تعطيلها سواء كان الفاعل أصليا أو شريكا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعاقب بغرامة لا تتجاوز مائة ألف ريال كل من تسبب في إتلاف أي من تمديدات المرافق العامة أو قطعها أو تعطيلها. فإن كان المتسبب في ذلك مقاولا فإنه يجوز منع التعاقد معه مستقبلا مدة لا تزيد على ستة أشهر، كما يجوز في حالة العود أن يحكم بمنع التعاقد مدة تزيد على الحد الأقصى المقرر على ألا تتجاوز المدة المحكوم بها ضعف هذا الحد. وتنشر في الصحف المحلية العقوبات المحكوم بها على نفقة المحكوم عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يعاقب بغرامة لا تتجاوز خمسين ألف ريال كل من يتعدى على منشآت المرافق العامة أو شبكاتها بقصد الاستفادة من خدماتها بطريقة غير مشروعة، وكذا كل من يتعدى على السكك الحديدية أو الطرق العامة أو حرمها باغتصاب جزء منها أو إقامة منشآت عليها من أي نوع كانت أو إحداث قطع أو حفر في سطحها أو أكتافها أو ميولها أو مواقفها أو أخذ أتربة منها أو إتلاف الإشارات أو العلامات الكيلومترية الموجودة بها أو الأعمال الصناعية المنفذة لها كالجسور والأنفاق وغيرها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعاقب بغرامة لا تزيد عن ثلاثة آلاف ريال كل من يعبث بعدادات المياه أو الكهرباء أو أجهزة الهاتف العامة أو تمديداتها بقصد تعطيل وظيفتها أو الإخلال بها، وكذا كل من يتعدى على السكك الحديدية أو الطرق العامة أو حرمها بإغراقها بمياه الري والصرف أو غيرها أو يحدث فيها عملا يترتب عليه تعطيلها أو عدم الاستفادة منها كلها أو جزء منها أو تعريض حركة المرور للخطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعاقب بغرامة لا تزيد عن ألفي ريال كل مستفيد من خدمات المرافق العامة يسهل للغير الاستفادة منها بطريقة غير مشروعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: في حالة العود إلى ارتكاب أي من المخالفات المنصوص عليها في هذا النظام، يجوز أن يحكم بأكثر من الحد الأقصى المقرر للغرامة، على ألا يتجاوز ضعف هذا الحد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: أ - يلزم مرتكب المخالفة بالتعويض عن جميع الأضرار التي لحقت بالمرفق أو الغير بما في ذلك تكاليف إصلاح التلف الذي تسبب في حدوثه والتعويض عن المنفعة التي فقدها المرفق أو الغير، ويحتسب التعويض للمتر المكعب عن المياه الضائعة بسبب المخالفة وفق قواعد تضعها لجنة تشكل من وزارة المالية والاقتصاد الوطني ووزارة الشئون البلدية والقروية ووزارة الزراعة والمياه .وللجهة المختصة أن تلزم مرتكب المخالفة بإصلاح ما ينتج عن مخالفته أو أن تقوم بالإصلاح على نفقة المخالف، ويرجع عليه في هذه الحالة بكافة المصاريف والنفقات اللازمة لإزالة التعدي وإصلاح الأضرار التي ترتبت عليها، وتحدد مصاريف الإزالة والإصلاح بقرار من الوزير المختص فإن لم يقم بدفعها استوفيت من مستحقاته لدى أية جهة حكومية وإلا تم تحصيلها وفقا لقواعد جباية أموال الدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يتم ضبط مخالفات هذا النظام وإثباتها والتحقيق فيها وفق الإجراءات التي تضعها لجنة تشكل من وزارة الداخلية ، ووزارة الشؤون البلدية والقروية ، ووزارة الزراعة والمياه ، ووزارة المواصلات ، ووزارة الصناعة والكهرباء ووزارة البرق والبريد والهاتف ، ويعتمدها وزير الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: أ- يختص ديوان المظالم بتوقيع عقوبة السجن المنصوص عليها في هذا النظام.ب- يتم تقدير التعويضات وتوقيع الغرامات وتحديد مقدار الغرامة عن كل مخالفة ضمن حدها الأعلى المنصوص عليه في هذا النظام وفق قواعد يصدرها الوزير المختص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يصدر الوزراء المعنيون بتنفيذ هذا النظام كل منهم في حدود اختصاصه القرارات اللازمة لتنفيذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يلغي هذا النظام المواد (الرابعة، والخامسة، والسادسة، والسابعة، والثامنة، والتاسعة، والعاشرة والحادية عشرة) من نظام مرفق الهاتف الصادر بالمرسوم الملكي رقم (م/16) وتاريخ 16 / 3 / 1398 هـ. والمادة (الخامسة عشرة) من نظام مصالح المياه والمجاري الصادر بالمرسوم الملكي رقم (م/22) وتاريخ 23 / 6 / 1391 هـ، ولائحة الجزاءات الصادرة تنفيذا لها بقرار مجلس الوزراء رقم (811) وتاريخ 28 / 7 / 1392 هـ، وكل ما يتعارض مع أحكام هذا النظام. ويعمل به بعد شهرين من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/70405759-cf34-4260-a81e-a9a700f21241/1
  verified: false
