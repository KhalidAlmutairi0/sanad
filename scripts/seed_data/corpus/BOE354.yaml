regulation:
  code: BOE354
  name_ar: تنظيم اللجنة الوطنية لمكافحة المخدرات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالمصطلحات التالية أينما وردت في هذا التنظيم المعاني الموضحة أمام كل منها، ما لم يقتض السياق خلاف ذلك: ـ اللجنة : اللجنة الوطنية لمكافحة المخدرات . ـ الرئيس : رئيس اللجنة الوطنية لمكافحة المخدرات . ـ اللجنة التحضيرية : اللجنة التحضيرية للجنة الوطنية لمكافحة المخدرات . ـ الأمين العام : أمين عام اللجنة الوطنية لمكافحة المخدرات . ـ الأمانة العامة : الأمانة العامة للجنة الوطنية لمكافحة المخدرات . ـ اللجان الفرعية : اللجان الفرعية المتخصصة ( لجنة الشؤون الأمنية ـ لجنة الشؤون القانونية ـ لجنة التوعية الإعلامية ـ لجنة الدراسات والمعلومات ـ لجنة العلاج والتأهيل ). ـ فرق العمل : فرق العمل في المناطق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: اللجنة ذات شخصية معنوية تتمتع بالاستقلال الإداري والمالي ، ومركزها الرئيس في مدينة الرياض . ولها في سبيل مزاولة نشاطها أن تنشئ - بقرار منها - فرق عمل في جميع مناطق المملكة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تسعى اللجنة إلى تحقيق الأهداف التالية : 1 ـ الإسهام في الحد من انتشار المخدرات بين أفراد المجتمع.2 ـ تكوين وعي صحي واجتماعي وثقافي لدى أفراد المجتمع بأضرار المخدرات وسوء استعمال المؤثرات العقلية.3 ـ تحقيق التناغم والانسجام وتنسيق الجهود بين الجهات الحكومية والأهلية ذات العلاقة بمكافحة المخدرات . 4 ـ تعزيز المشاركة التطوعية لأفراد المجتمع المدني ومؤسساته في مجال مكافحة المخدرات .5 ـ توفير وتطوير برامج الدعم الذاتي للمتعافين من الإدمان على المخدرات وأسرهم.6 ـ توفير وتطوير البرامج العلاجية والتأهيلية لمرضى إدمان المخدرات.7 ـ دعم الدراسات والبحوث ذات العلاقة بمجال مكافحة المخدرات.8 ـ الاستفادة من التجارب الإقليمية والدولية في مجال مكافحة المخدرات .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون للجنة دور تنسيقي لأعمال الأجهزة المعنية بمكافحة المخدرات ، وعلى هذه الأجهزة التنسيق مع الأمانة العامة للجنة عند تنفيذ أي نشاط ذي علاقة بالجانب الوقائي والتأهيلي والدراسات والبحوث الميدانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تشكل اللجنة على النحو التالي : وزير الداخلية. رئيساً الرئيس العام لرعاية الشباب. عضواً مساعد وزير الداخلية للشؤون الأمنية. عضواً وزير الشؤون الإسلامي والأوقاف والدعوة والإرشاد. عضواً وزير التعليم العالي. عضواً وزير الشؤون الاجتماعية. عضواً وزير التريبة والتعليم. عضوا وزير الثقفة والإعلام. عضواً وزير الصحة. عضواً مدير عام مصلحة الجمارك. عضواً رئيس اللجنة التحضيرية للجنة الوطنة لمكافحة المخدرات عضواً أربعة أعضاء يختارون لذواتهم، ويعينون بقرار من مجلس الوزراء لمدة ثلاث سنوات بناءً على ترشيح من رئيس اللجنة. أمين عام اللجنة الوطنية لمكافحة المخدرات. مقرراً'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تختص اللجنة بما يلي : 1 ـ رسم السياسات الوطنية في مجال مكافحة المخدرات ، وتحديد الأولويات من خلال إعداد استراتيجية سنوية لتوجيه الجهود الوطنية للمكافحة .2 ـ وضع القواعد النظامية والتنظيمية لأعمال اللجنة ، واعتمادها من الجهة المختصة.3 - مراجعة الأنظمة والتعليمات المطبقة في مجال مكافحة المخدرات واقتراح التعديلات اللازمة عليها ، واقتراح ما يلزم من أنظمة ولوائح جديدة لرفع مستوى المكافحة .4 ـ وضع السياسات العامة لاستيراد المواد المخدرة والمؤثرات العقلية وتصديرها ونقلها وإنتاجها وصنعها وزراعتها وتملكها وحيازتها وإحرازها والاتجار بها وشرائها وبيعها وتسليمها ووصفها طبيًّا .5 ـ تحديد كمية المخدرات والمؤثرات العقلية التي يجوز استيرادها أو تصديرها أو نقلها أو إنتاجها أو زراعتها أو الاتجار بها سنويا . 6 ـ التنسيق والمتابعة مع الأجهزة المعنية فيما يتعلق بتنفيذ الخطط والبرامج المرسومة لمكافحة المخدرات ؛ لتحقيق الترابط والتكامل بين أعمالها ، وتنظيم جهود الجهات الحكومية والأهلية في هذا المجال .7 ـ تنسيق التعاون بين الوزارات والإدارات المختصة بشؤون المخدرات والمؤثرات العقلية والمكتب العربي
    لشؤون المخدرات والمنظمات العربية والدولية المختصة عبر الجهات المعنية في وزارة الداخلية.8 ـ الإشراف على اتفاقيات التعاون مع الدول والهيئات العربية والدولية في مجال مكافحة المخدرات ، بالتنسيق مع الجهات المعنية في وزارة الداخلية .9 ـ دعم النشاطات والبرامج التطويرية والتدريبية المتخصصة والموجهة ؛ من أجل رفع كفاية المختصين والعاملين في مجال المكافحة في الجهات المعنية .10 ـ دعم المهتمين والمختصين وتوجيههم لعمل الدراسات والبحوث في مجال مكافحة المخدرات .11 ـ تشجيع التعاون وتبادل ونشر المعلومات ( في مجال عمل اللجنة ) مع الجهات المحلية والإقليمية والعالمية، ومسايرة التطور التقني والعلمي في هذا المجال.12ـ دعوة المؤسسات والجمعيات الأهلية العاملة في المجتمع للمشاركة مع اللجنة في وضع تصور للسياسات والاستراتيجيات المتعلقة بمكافحة المخدرات ، وتحفيزها على ممارسة أدوار محددة في مجال التوعية والتعليم الوقائي ومجال العلاج والتأهيل والدعم الذاتي، أو أي دور آخر ترى اللجنة أنه يمكن أن تكِله إليهم . 13- تقويم النشاطات والجهود التي تبذلها الأجهزة المختصة في مجال المكافحة ؛ من أجل تعديل مسار الخطط المرسومة .
    14 - دعم الجهات المعنية ومشاركتها في عقد الندوات واللقاءات العلمية حول أحدث أساليب التوعية والعلاج والتأهيل المستخدمة في هذا المجال ، وإقامة المعارض المتخصصة للتركيز على ظاهرة الإدمان وسوء استخدام العقاقير الطبية لرفع مستوى الوعي لدى جميع فئات المجتمع مع احتفاظ اللجنة بأداء النشاطات والبرامج في مجال التوعية والتعليم الوقائي ، وبرامج الدعم الذاتي للمتعافين إلى جانب الأجهزة المعنية الأخرى الشريكة في هذا المجال .15 - إصدار المطبوعات الإرشادية المتخصصة والموجهة إلى جميع الفئات العمرية ، وإنتاج البرامج المسموعة والمرئية في مجال التوعية من أضرار تعاطي المخدرات، ودعم الجهود المماثلة التي تنفذها الجهات المعنية الأخرى.16 - دعم برنامج الدعم الذاتي مالياً وفنياً ، والتنسيق مع الجهات المعنية في تنفيذ البرامج التأهيلية للمستفيدين من البرنامج .17 - وضع الأطر والمعايير للمجالات التي يمكن لمؤسسات المجتمع المدني أن تشارك فيها لدعم أنشطة وبرامج مكافحة المخدرات .18- دعم التوسع في إنشاء المصحات العلاجية الحكومية والأهلية المتخصصة في علاج الإدمان .19 - دراسة وتقويم الطرق المتبعة في علاج المدمنين وتأهيلهم
    ؛ للوصول إلى أفضل الطرق المستخدمة في هذا المجال على المستوى العربي والدولي .20 - توفير التجهيزات التقنية الحديثة ؛ لتسهيل عملية التنسيق بين اللجنة ومراكز العلاج والتأهيل . 21 - الموافقة على مشروع السياسة الوطنية لمكافحة المخدرات والخطط والبرامج اللازمة لتنفيذها.22 - الموافقة على مشروع الموازنة المالية والحساب الختامي للجنة .23 - الموافقة على التقرير السنوي للجنة.24 - الموافقة على الخطط الطويلة لاستثمار أموال اللجنة .25- قبول التبرعات والهبات التي تقدمها المؤسسات والأفراد إلى صندوق الدعم والتأهيل .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تكون اجتماعات اللجنة نظامية إذا حضرها ثلثا الأعضاء على أن يكون من بينهم الرئيس أو من ينيبه . وتتخذ قراراتها بأغلبية الحاضرين ، فإن تساوت الأصوات يرجح الجانب الذي يصوت معه الرئيس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تعقد اللجنة جلسة عادية مرة كل عام ، ويحق لرئيس اللجنة أو لنصف الأعضاء دعوة اللجنة إلى عقد جلسة غير عادية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للجنة أن تدعو خبراء أو مختصين لحضور اجتماعاتها دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يباشر رئيس اللجنة الصلاحيات التالية : 1 - إصدار واعتماد القرارات ذات العلاقة بمهمات واختصاصات اللجنة .2 - اعتماد جميع اللوائح اللازمة لهذا التنظيم . 3 - ترشيح الأمين العام للجنة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكوَّن "لجنة تحضيرية" للجنة تضم في عضويتها عدداً من المختصين والخبراء ذوي الكفاية والتأهيل في مجال التوعية والتعليم الوقائي ومجال العلاج والتأهيل يرشحون بناءً على خبراتهم ، إضافة إلى عضوية أمين عام اللجنة . ويشكل أعضاء اللجنة التحضيرية ويختار رئيس لها بقرار من رئيس اللجنة الوطنية لمدة ثلاث سنوات قابلة للتجديد لمرة واحدة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتولى اللجنة التحضيرية للجنة المهمات التالية: 1 - اقتراح مشروع السياسة الوطنية لمكافحة المخدرات والخطط والبرامج اللازمة لتنفيذها بعد دراستها ومناقشتها مع الجهات ذات العلاقة ، وإعداد التوصيات اللازمة في شأنها ؛ تمهيداً لعرضها على اللجنة .2 - تقويم ومراجعة نتائج الخطط والبرامج التي تنفذها الأجهزة الحكومية والأهلية المعنية ، وذلك بشكل دوري ؛ للتأكد من تطبيقها بحسب المخطط له .3 - اقتراح تشكيل لجان فرعية أو فرق عمل متخصصة من أعضائها أو من غيرهم ؛ لدراسة الموضوعات التي تحيلها اللجنة أو الأمانة العامة أو الجهات والأفراد .4 - إجراء الدراسات الأولية للموضوعات التي تعرض على اللجنة ، واقتراح التوصيات اللازمة في شأنها .5 - القيام بأي مهمة أخرى تحيلها إليها اللجنة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تنشأ للجنة أمانة عامة مستقلة ، يرأسها أمين عام متفرغ بمرتبة لا تقل عن الرابعة عشرة، وتوفر لها الإمكانات والتجهيزات اللازمة ، وتزود بعدد مناسب من العاملين المؤهلين والمتخصصين في مجال أعمال اللجنة ، على أن يكونوا متفرغين لأعمال الأمانة ونشاطاتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'يتولى أمين عام اللجنة الإشراف على شؤون الجهاز التنفيذي للجنة ، ويشرف على إدارته ، وتسيير أعمال اللجنة ، وتتركز مسؤولياته في الآتي : 1 - إعداد مشروع الموازنة السنوية والتقرير السنوي ، تمهيداً لعرضهما على اللجنة .2 - الإشراف على الإعداد لاجتماعات اللجنة ولجنتها التحضيرية ولجانها الفرعية وفرق العمل المتخصصة .3 - تمثيل اللجنة لدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة داخل المملكة وخارجها .4 - الموافقة على البرامج والندوات وجميع النشاطات المنوطة باللجنة في حدود الميزانية السنوية المخصصة .5 - الإشراف على جميع أعمال اللجنة بما في ذلك الشؤون المالية والإدارية من خلال اللوائح المعتمدة .6 - إعداد التقارير الدورية الخاصة بأعمال اللجنة ذات العلاقة بالمكافحة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تؤدي اللجنة أعمالها من خلال لجان متخصصة فرعية (غير متفرغة) تشرف على أعمالها وتنسقها الأمانة العامة للجنة، ويحدد القرار الصادر من أمين عام اللجنة اختصاصاتها وتشكيلاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تكوّن فرق عمل تشرف على تنفيذ البرامج والنشاطات التوعوية في جميع مناطق المملكة، وتقوم بالدور التنسيقي فيما بين الأجهزة المعنية . ويرأس كل فريق أحد المختصين في وحدة التوعية الوقائية في فرع المديرية العامة لمكافحة المخدرات في المملكة ، ويشارك في عضويته عدد من المختصين من الجهات ذات العلاقة على أن تدعم أعمال هذه الفرق ماليا وفنياً الأمانة العامة للجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تخصص وحدة تنظيمية لأبحاث الإدمان ضمن وحدات الجهاز الإداري في الأمانة العامة للجنة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشأ صندوق بالأمانة العامة باسم ( صندوق الدعم والتأهيل ) ؛ من أجل دعم أسر مدمني المخدرات أثناء مدة علاجهم وتأهيلهم ، وتدريب المتعافين لتأهيلهم للدخول في سوق العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'تتكون موارد صندوق الدعم والتأهيل من الآتي : أ - ما يخصص له من ميزانية اللجنة .ب - التبرعات والهبات التي تقبلها اللجنة . ج - ما يخصص له من الأموال التي تضبط في قضايا المخدرات .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تعد الأمانة العامة للجنة لائحة صندوق الدعم والتأهيل تمهيداً لإحالتها إلى اللجنة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: السنة المالية للجنة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى للجنة من تاريخ نفاذ هذا التنظيم وتنتهي بنهاية السنة المالية للدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يكون للجنة ميزانية خاصة ضمن ميزانية وزارة الداخلية في فرع مستقل يخصص " لمشروع اللجنة الوطنية لمكافحة المخدرات ".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: مع عدم الإخلال باختصاصات ديوان المراقبة العامة يكلف وزير الداخلية مراجع حسابات لمراجعة حسابات اللجنة السنوية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تطبق أحكام نظام الخدمة المدنية ، ونظام خدمة الضباط والأفراد ، وكذلك أحكام نظام التقاعد المدني ونظام التقاعد العسكري على موظفي الأمانة العامة للجنة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تعد مراتب موظفي اللجنة من الوظائف المستثناة من المسابقة تطبيقاً لنص الفقرة (ن) من المادة ( 3 / 37 ) من اللائحة التنفيذية لنظام الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ، ويعمل به من تاريخ نشره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b2c545f0-d65f-4c13-b712-a9a700f193b6/1
  verified: false
