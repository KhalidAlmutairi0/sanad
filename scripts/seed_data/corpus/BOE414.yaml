- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يرفع المركز إلى رئيس مجلس الوزراء -خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية- حسابه الختامي السنوي، وتقريراً سنويًّا عما حققه المركز من إنجازات وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة بالرقابة على حسابات المركز وعملياته، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز ومعاملاته وبياناته ويحدد المجلس أتعابه، ويُرفع تقرير مراجع الحسابات إلى المجلس، مع تزويد الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تنشر الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
