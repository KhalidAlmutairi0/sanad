articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذه الترتيبات- المعاني الموضحة أمام كل منها: المركز: المركز السعودي لكود البناء. الترتيبات: الترتيبات التنظيمية للمركز السعودي لكود البناء. الوزير: وزير البلديات والإسكان. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمركز. الكود: كود البناء السعودي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية، وبالاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير. يكون مقر المركز الرئيس في مدينة الرياض، وله إنشاء فروع ومكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى مراجعة وتحديث وتطوير النظم الفنية والعلمية والإدارية المتخصصة بالمباني والمنشآت المبنية على الأسس العلمية المتوافقة مع القواعد الهندسية وخواص المواد، والظروف والمخاطر الطبيعية، والارتقاء بالجودة واستقرار واستدامة المباني، وذلك من خلال تحديد وتحليل ودراسة المعوقات والتحديات التي تواجه القطاعين العام والخاص في تنفيذ نظام تطبيق كود البناء السعودي، وممارسة العمل المهني المتوافق مع بيئة وظروف المملكة وذلك من أجل حماية الأرواح والممتلكات والحفاظ على الاقتصاد الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات الجهات الحكومية الأخرى ومسؤولياتها، للمركز في سبيل تحقيق أهدافه القيام بالمهام والاختصاصات اللازمة التي تخدم الغايات التي أنشئ من أجلها، ومن ذلك ما يلي: اقتراح مشروعات الأنظمة واللوائح ذات الصلة بمجالات اختصاصه، واقتراح تعديل النافذ منها، وذلك بالتنسيق مع الجهات ذات العلاقة، والرفع عن ذلك وفقاً للإجراءات النظامية المتبعة. وضع السياسات والخطط والبرامج والمبادرات الداخلة في مجالات اختصاصه، والرفع عما يتطلب استكمال إجراءات نظامية في شأنها. وضع المعايير والإجراءات والنماذج في مجالات اختصاصه. وضع الضوابط والاشتراطات اللازمة لما يصدره المركز من تراخيص ذات صلة بالأنشطة المرتبطة بمجالات اختصاصه. وضع سياسات وآليات نشر الكود. العمل على تحسين وتطوير وتحديث الكود. دراسة الملحوظات التي ترد من الجهات ذات العلاقة حيال الكود، واقتراح ما يلزم من تعديلات لتحديثه، وذلك بالتنسيق معها. إعداد الأدلة والإرشادات والشروحات العلمية والفنية الخاصة بالكود. إعداد مناهج التدريب والتأهيل وخططه بالمشاركة مع الجهات المختصة. وضع المتطلبات والضوابط لفحص المباني والتفتيش أثناء مرحلة
    البناء أو بعده لضمان امتثالها لمتطلبات الكود، وذلك بالمشاركة مع الجهات ذات العلاقة. تحديد العوائق والتحديات التي تواجه القطاعين العام والخاص المتعلقة بالكود، وتقديم المرئيات والاقتراحات اللازمة في شأنها. تقديم خدمات الكود، وتقييم أنظمة البناء، وإصدار المطبوعات. دراسة واعتماد تقنيات البناء الحديثة، وتطوير الاختبارات والمعايير والمواصفات الخاصة بها، بالمشاركة مع الجهات ذات العلاقة. إعداد الدراسات والبحوث المتعلقة بالكود. تقديم الاستشارات الفنية في مجال اختصاصه وفق الضوابط التي يقرها المجلس. إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة بمجالات اختصاصه مع الجهات المعنية داخل المملكة وخارجها، وفقاً للإجراءات النظامية المتبعة. تنظيم الندوات وإقامة المنتديات والمؤتمرات، وعقد ورش العمل، وفق الإجراءات النظامية المتبعة. التعاون مع مراكز البحوث وبيوت الخبرة على المستويين المحلي والدولي -عند الحاجة- بما يسهم بتحقيق أهدافه. العمل على توفير البيئة الاستثمارية الملائمة في مجالات اختصاصه، بالتنسيق مع الجهات المختصة. تمثيل المملكة -إقليميًّا ودوليًّا- في حدود مجالات اختصاصه، وفقاً للإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير، وعضوية كل من: أ- ممثل من وزارة الداخلية (المديرية العامة للدفاع المدني). ب- ممثل من وزارة الطاقة. ج- ممثل من وزارة البلديات والإسكان. د- ممثل من وزارة البيئة والمياه والزراعة. هـ- ممثل من وزارة الصناعة والثروة المعدنية. و- ممثل من وزارة التجارة. ز- ممثل من الهيئة السعودية للمهندسين. ح- ممثل من الهيئة العليا للأمن الصناعي. ط- ممثل من الهيئة السعودية للمواصفات والمقاييس والجودة. ي- ممثل من الهيئة السعودية للمقاولين. ك- الرئيس التنفيذي. ل- عضوين من ذوي الخبرة والاختصاص من القطاع الخاص في مجال المقاولات والاستشارات الهندسية. يجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها. يصدر بتعيين العضوين -الواردين في الفقرة الفرعية (ل) من الفقرة (1) من هذه المادة- أمر من رئيس مجلس الوزراء بناء على ترشيح من الرئيس، وتكون مدة عضويتهما (ثلاث) سنوات قابلة للتجديد مرة واحدة. يختار الرئيس نائبًا له من بين الأعضاء ممثلي الجهات الحكومية. يراعى أن يكون للمرشح -لعضوية المجلس- من الجهات الحكومية مؤهلات أو خبرات أو اختصاصات وظيفية
    تتناسب مع عمل المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للمركز، ويتولى الإشراف عليه وتصريف أموره، وله اتخاذ جميع القرارات اللازمة لتحقيق أغراضه في حدود أحكام الترتيبات، وله على وجه الخصوص ما يأتي: اقتراح مشروعات الأنظمة واللوائح ذات الصلة بمجالات اختصاصه، واقتراح تعديل النافذ منها، وذلك بالتنسيق مع الجهات ذات العلاقة، والرفع عن ذلك وفقاً للإجراءات النظامية المتبعة. إقرار السياسات والخطط والبرامج والمبادرات الداخلة في مجالات اختصاصه، والرفع عما يتطلب استكمال إجراءات نظامية في شأنها. إقرار سياسات وآليات نشر الكود. إقرار المعايير والإجراءات والنماذج في مجالات اختصاص المركز. إقرار الضوابط والاشتراطات اللازمة لما يصدره المركز من تراخيص ذات صلة بالأنشطة المرتبطة بمجالات اختصاص المركز. وضع المتطلبات والضوابط لفحص المباني والتفتيش أثناء مرحلة البناء أو بعده لضمان امتثالها لمتطلبات الكود، وذلك بالمشاركة مع الجهات ذات العلاقة، وإقرارها. إقرار المقابل المالي للخدمات والأعمال التي يقدمها المركز في مجال اختصاصه ويرى المجلس استحصال مقابل مالي عنها، وفقاً للإجراءات النظامية المتبعة. إقرار الهيكل والدليل التنظيمي للمركز،
    وفقاً للإجراءات النظامية المتبعة. إقرار اللوائح المالية والإدارية التي يسير عليها المركز وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونه، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية، ويكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. الموافقة على إنشاء فروع ومكاتب للمركز بحسب الحاجة. النظر في التقارير الدورية التي ترفع من الرئيس التنفيذي عن سير عمل المركز، واتخاذ القرارات اللازمة في شأنها. الموافقة على إبرام الاتفاقيات، والعقود، بحسب الإجراءات النظامية المتبعة. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيدًا لرفعها بحسب الإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. اعتماد تقرير مراجع الحسابات. الموافقة على قبول التبرعات والهبات والمنح والوصايا والأوقاف التي تقدم إلى المركز، وفقاً للأحكام المنظمة لذلك. وللمجلس تشكيل لجان يعهد إليها بما يراه من مهمات، وله تفويض بعض صلاحياته إلى رئيسه أو من يراه من أعضائه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس بدعوة من الرئيس (أربع) مرات على الأقل في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وعلى الرئيس دعوة المجلس للاجتماع إذا طلب ذلك ثلث الأعضاء على الأقل. توجه الدعوة إلى حضور اجتماع المجلس قبل موعد الاجتماع بـ(سبعة) أيام عمل على الأقل، على أن تتضمن جدول الأعمال. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء على الأقل بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حال تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت ولا تفويض عضو آخر في التصويت نيابة عنه عند غيابه. على العضو الإفصاح عن أي تعارض مصالح في موضوع مدرج على جدول أعمال المجلس. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة- أن يعقد الاجتماعات وأن يصوت على القرارات عن بعد من خلال استخدام وسائل التقنية. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة- أن يصدر القرارات بالتمرير على الأعضاء، ويوقع عليها بما يفيد اطلاع جميع الأعضاء، ولا تعد القرارات الصادرة بهذه الطريقة صحيحة ما لم يصوِّت عليها جميع الأعضاء،
    وتعرض القرارات على المجلس في أول اجتماع لاحق لإثباتها في محضر الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع وأعضاؤه الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. للمجلس أن يدعو إلى حضور جلساته من يرى الاستعانة بهم، دون أن يكون لهم حق التصويت. يكون للمجلس أمين من منسوبي المركز ويعينه المجلس –بناءً على ترشيح الرئيس- يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر، والمداولات والقرارات. لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار المركز حتى بعد انتهاء عضويته في المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي، يعين بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية، ويكون إعفاؤه من منصبه بقرار من المجلس، ويعد المسؤول عن إدارة شؤون المركز، وتتركز مسؤولياته في حدود الترتيبات وما يقرره المجلس، ويمارس الاختصاصات الآتية: إعداد مشروعات الأنظمة واللوائح ذات الصلة بمجالات اختصاصه، واقتراح تعديل النافذ منها، تمهيداً لعرضه على المجلس. إعداد السياسات والخطط والبرامج والمبادرات الداخلة في مجالات اختصاص المركز، ورفعها إلى المجلس؛ للنظر في إقرارها. إعداد المعايير والإجراءات والنماذج في مجالات اختصاص المركز، ورفعها إلى المجلس؛ للنظر في إقرارها. إعداد الضوابط والاشتراطات اللازمة لما يصدره المركز من تراخيص ذات صلة بالأنشطة المرتبطة بمجالات اختصاص المركز، ورفعها إلى المجلس؛ للنظر في إقرارها. اقتراح المقابل المالي للخدمات والأعمال التي يقدمها المركز في مجال اختصاصه، ورفعه إلى المجلس؛ للنظر في إقراره. متابعة تنفيذ القرارات التي يصدرها المجلس. اقتراح الهيكل والدليل التنظيمي للمركز، واقتراح لوائحه الإدارية والمالية والداخلية والفنية اللازمة لتسيير العمل فيه، ورفعها إلى المجلس؛
    للنظر في إقرارها. الإشراف على سير عمل المركز، والعاملين فيه، وفقاً للصلاحيات المنوطة به وما تحدده لوائح المركز. الصرف من ميزانية المركز واتخاذ جميع الإجراءات المالية، وفقاً للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي فوضه بها المجلس. الإشراف على إعداد مشروع ميزانية المركز، ومشروع الحساب الختامي، وتقرير المركز السنوي، ورفعها إلى المجلس. تمثيل المركز أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى المعنية، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. إعداد تقارير دورية عن أعمال المركز وإنجازاته ونشاطاته والمعوقات التي يواجهها، ورفعها إلى المجلس تمهيداً لاستكمال ما يلزم في شأنها. التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات الممنوحة له من المجلس. تعيين منسوبي المركز والإشراف عليهم وإنهاء خدماتهم طبقاً للصلاحيات الممنوحة له وما تحدده الأنظمة واللوائح ذات العلاقة. التعاقد مع الخبراء والمختصين والمستشارين في المجالات ذات العلاقة بأهداف المركز، وفقاً لما تحدده اللوائح المعتمدة للمركز. تقديم المقترحات والتوصيات إلى المجلس في شأن الموضوعات
    الداخلة في اختصاصه. ممارسة أي اختصاص يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته وصلاحياته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد المركز مما يأتي: أ‌- الاعتمادات المالية التي تخصص له في ميزانية الدولة. ب‌- المقابل المالي الذي يتقاضاه عن الأعمال والخدمات التي يقدمها. ج- التبرعات والهبات والمنح والوصايا وريع الأوقاف التي يقبلها المجلس. د‌- الموارد الأخرى التي يقرها المجلس بما لا يتعارض مع الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المركز حسابًا له في البنك المركزي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المركز المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/664d871f-7a44-4a52-b653-b2db00b55732/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع منسوبو المركز لنظام العمل ونظام التأمينات الاجتماعية.
