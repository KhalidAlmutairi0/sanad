articles:
- article_ref: 'المادة الأولى : التعريفات'
  article_text_ar: 'تكون للألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: الهيئة: الهيئة العامة للتجارة الخارجية. المجلس: مجلس إدارة الهيئة. التنظيم: تنظيم الهيئة. المحافظ: محافظ الهيئة. العضو: عضو مجلس الإدارة. المعالجات التجارية: الموضوعات المتعلقة باتفاقيات مكافحة الإغراق والتدابير التعويضية والوقائية بمنظمة التجارة العالمية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الثانية : تشكيل الهيئة'
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة وبالاستقلال المالي والإداري، وترتبط تنظيمياً بوزير التجارة. يكون مقر الهيئة الرئيس في مدينة الرياض، ويجوز لها -بحسب الحاجة- إنشاء فروع داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الثالثة : أهداف الهيئة'
  article_text_ar: تهدف الهيئة إلى تعزيز مكاسب المملكة التجارية الدولية، والدفاع عن مصالحها في مجالات التجارة الخارجية، بما يسهم في تنمية اقتصادها الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الرابعة : اختصاصات الهيئة'
  article_text_ar: 'للهيئة القيام بالاختصاصات اللازمة التي تحقق الأهداف التي أنشئت من أجلها، ومن ذلك ما يأتي: وضع السياسات والاستراتيجيات والخطط والبرامج ذات الصلة بعملها، بالتنسيق مع الجهات ذات العلاقة، واستكمال ما يلزم في شأنها. تمثيل المملكة في منظمة التجارة العالمية، والقيام بالمهمات والاختصاصات المتعلقة بذلك، ومنها: أ- المشاركة في المفاوضات الثنائية مع الدول الساعية إلى الانضمام إلى منظمة التجارة العالمية، بالتنسيق مع الجهات الحكومية المختصة. ب- متابعة تنفيذ التزامات المملكة تجاه منظمة التجارة العالمية. ج- متابعة تنفيذ الدول الأعضاء لالتزاماتها تجاه منظمة التجارة العالمية. د- التنسيق بين الجهات المختلفة في المملكة فيما يتعلق بالتجارة الدولية. هـ- متابعة قضايا فض المنازعات التجارية المتعلقة بالمملكة لدى منظمة التجارة العالمية. و- العمل على تنسيق المواقف والسياسات مع الدول الأعضاء في منظمة التجارة العالمية. الإشراف على مهمات الفريق التفاوضي السعودي والفرق الفنية المنبثقة منه، وتنسيق واعتماد العروض والمواقف التفاوضية والموضوعات ذات الصلة بمنظمة التجارة العالمية واتفاقيات التجارة الحرة
    والاتفاقيات الثنائية والإقليمية والدولية. تمكين صادرات المملكة من النفاذ إلى الأسواق الخارجية، والعمل على فتح أسواق جديدة لها وإزالة المعوقات الخارجية التي تواجهها، وذلك بالتنسيق مع الجهات الحكومية ذات العلاقة. القيام بمهمات ومسؤوليات المعالجات التجارية، والدفاع عن مصالح المملكة في هذا الشأن محليًّا ودوليًّا. اقتراح ما تراه في شأن التعرفة الجمركية، وإحالتها إلى الجهة المختصة لاستكمال ما يلزم في شأنها. إدارة علاقات المملكة الدولية في مجال التجارة الخارجية، بالتنسيق مع الجهات ذات العلاقة. الإشراف على الملحقيات التجارية. الإشراف على مجالس الأعمال المشتركة مع الدول. الإسهام في توعية القطاعين (الحكومي والخاص) بالتزامات المملكة في التجارة الخارجية وما يطرأ عليها من مستجدات وتطورات. تمثيل المملكة في المنظمات والمحافل الإقليمية والدولية ذات العلاقة بشؤون التجارة الخارجية. عقد مؤتمرات وندوات ولقاءات ذات علاقة باختصاصات الهيئة وفقاً للإجراءات المتبعة. إعداد دراسات وبحوث وتقارير، وإنشاء قواعد للمعلومات، متعلقة بمجال عمل الهيئة، وتبادل المعلومات مع الجهات المحلية والإقليمية والدولية، بما في ذلك
    دراسة وتحليل الأثر الاقتصادي لفرص إبرام اتفاقيات التجارة الحرة مع الدول والمجموعات الاقتصادية بالتنسيق مع الجهات المعنية والرفع بها. اقتراح مشروعات الأنظمة واللوائح ذات العلاقة باختصاصات الهيئة وتعديلها؛ وذلك وفق الإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الخامسة : تشكيل المجلس'
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة وزير التجارة، وعضوية كل من: أـ محافظ الهيئة. ب ـ ممثل عن وزارة الاقتصاد والتخطيط. ج ـ ممثل عن وزارة الطاقة. د- ممثل عن وزارة الصناعة والثروة المعدنية. هـ ـ ممثل عن وزارة التجارة. و ـ ممثل عن وزارة الاستثمار. ز ـ ممثل عن وزارة الخارجية. ح ـ ممثل عن وزارة البيئة والمياه والزراعة. ط ـ ممثل عن وزارة المالية. ي - ممثل عن وزارة النقل. ك - ممثل عن الهيئة العامة للغذاء والدواء. ل - ممثل عن الهيئة العامة للجمارك. م - ممثل عن هيئة تنمية الصادرات السعودية. ن ـ (أربعة) أعضاء مستقلين من ذوي الكفاية العالية والخبرة في مجال عمل الهيئة، يختارون لذواتهم، ويعينون بأمر من رئيس مجلس الوزراء بناءً على اقتراح رئيس المجلس، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد لمرة واحدة. يجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن (الخامسة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة السادسة : اختصاصات المجلس'
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويختص بالإشراف على شؤونها وإدارتها وتصريف أمورها، ويضع السياسات العامة التي تسير عليها، ويتخذ جميع القرارات اللازمة لتحقيق أغراضها في حدود أحكام التنظيم، وله بصفة خاصة الاختصاصات الآتية: إقرار السياسات العامة للهيئة وخطة العمل والبرامج التي تسير عليها لتحقيق أغراضها، ومتابعة تنفيذها. اقتراح الاستراتيجية الوطنية للتجارة الخارجية، ورفعها لاستكمال الإجراءات النظامية اللازمة في شأنها، والإشراف على تنفيذها بعد اعتمادها. تشكيل الفريق التفاوضي السعودي والفرق الفنية المنبثقة منه، وتحديد مهمات كل من الفريق التفاوضي والفرق الفنية وصلاحيات كل منها ومسؤولياته، واعتماد المواقف التفاوضية في مجال التجارة الخارجية، والرفع عما يلزم اتخاذ إجراءات نظامية في شأنه. الموافقة على مشاركة المملكة في اللجان والفرق الفنية والتفاوضية وعلى الانضمام لمقترحات وعروض الدول التجارية في إطار منظمة التجارة العالمية والمنظمات الدولية الأخرى وفقاً للإجراءات النظامية المتبعة. وضع لائحة لتنظيم الإشراف على الملحقيات التجارية دون إخلال بما تقضي به الأنظمة. وضع ما يلزم من قواعد
    لتنظيم الإشراف على مجالس الأعمال المشتركة، وذلك دون إخلال بما تقضي به الأنظمة. إقرار اللوائح المالية والإدارية التي تسير عليها الهيئة وغيرها من اللوائح الداخلية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح المالية وما يتعلق بالأمور المالية في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار الهيكل التنظيمي للهيئة. إنشاء فروع للهيئة داخل المملكة. اقتراح إنشاء ملحقيات تجارية، واستكمال الإجراءات النظامية في شأنها. الموافقة على مشروع ميزانية الهيئة، وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي (أو أكثر) لحسابات الهيئة، ومراقب مالي داخلي للهيئة. متابعة التقارير الدورية التي يرفعها المحافظ عن سير عمل الهيئة، والإشراف على الإدارة التنفيذية وتقويم أدائها، واتخاذ الإجراءات اللازمة حيالها. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، وفقاً للإجراءات النظامية المتبعة. إقرار المقابل المالي الذي تتقاضاه الهيئة عن أي عمل أو خدمة يرى المجلس أخذ مقابل عليها. قبول الهبات والإعانات والمنح والوصايا والأوقاف
    وفقاً للأنظمة المتبعة. اعتماد مؤشرات قياس أداء الهيئة. إصدار القرارات اللازمة لتنفيذ أحكام التنظيم. وللمجلس تشكيل لجان -دائمة أو مؤقتة- من أعضائه أو من غيرهم، يعهد إليها بما يراه من مهمات، ويحدِّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها، ما لم يقرر المجلس غير ذلك. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: المادة السابعة :انعقاد المجلس
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة برئاسة رئيس المجلس أو من ينيبه من ممثلي الأجهزة الحكومية الأعضاء، ويجوز انعقاد المجلس في أي مكان آخر يحدده رئيس المجلس. يجتمع المجلس بما لا يقل عن اجتماعين في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك (خمسة) من أعضائه على الأقل. توجه الدعوة للاجتماع من رئيس المجلس -كتابة- قبل موعد الاجتماع بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء، بمن فيهم رئيس المجلس أو من ينيبه. تصدر القرارات بأغلبية أصوات الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز أن تعقد اجتماعات المجلس وأن يصوت على قراراته عن بُعد من خلال استخدام وسائل التقنية، وفي هذه الحالة يشترط لصحة انعقاد المجلس حضور ما لا يقل عن (تسعة) أعضاء. ويجوز أن يتخذ القرار بالتمرير على الأعضاء، وفي هذه الحالة تشترط موافقة جميع الأعضاء عليه، ويعرض على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت نيابة عنه عند غيابه،
    وله تسجيل اعتراضه وأسباب الاعتراض ضمن محضر قرارات المجلس. على العضو الإفصاح عن أي تعارض مصالح في أي موضوع مدرج في جدول أعمال المجلس، ويثبت ذلك في محضر الاجتماع، وليس له حق التصويت على هذا الموضوع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يكون للمجلس أمين عام من بين منسوبي الهيئة يختاره رئيس المجلس بناء على ترشيح المحافظ، ويحدد المجلس مهماته ومكافأته، ويعهد إليه أن يدوِّن -في سجل خاص- آراء أعضاء المجلس وتصويتهم والقرارات المتخذة. لرئيس المجلس أن يدعو لحضور جلسات المجلس من يرى الاستعانة بخبراتهم ومعلوماتهم، دون أن يكون لهم حق التصويت. لا يجوز للعضو أو لأي شخص يحضر جلسات المجلس أن يفشي شيئًا مما وقف عليه من أسرار الهيئة بسبب عضويته في المجلس أو حضوره لاجتماعاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الثامنة : المحافظ'
  article_text_ar: 'يكون للهيئة محافظ بالمرتبة الممتازة، يعين بناء على اقتراح من رئيس المجلس، ويعد المسؤول عن إدارة شؤون الهيئة، ويتولى المهمات والاختصاصات الآتية: اقتراح سياسات الهيئة العامة، وخطة العمل والبرامج التي تسير عليها لتحقيق أهدافها، ورفعها إلى المجلس لإقرارها. اقتراح الهيكل التنظيمي للهيئة، ولوائحها المالية والإدارية، والإشراف على تنفيذها بعد إقرارها. الإشراف على سير عمل الهيئة، والعاملين فيها، وفقاً للصلاحيات المنوطة به وما تحدده لوائح الهيئة. إعداد مشروع ميزانية الهيئة ومشروع الحساب الختامي وتقرير الهيئة السنوي، ورفعها إلى المجلس. تمثيل الهيئة أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات والمنظمات المعنية، وغيرها من الجهات أو المؤتمرات أو الفعاليات داخل المملكة وخارجها، وله تفويض غيره في ذلك. رئاسة الفريق التفاوضي السعودي في المفاوضات التجارية، وله تفويض غيره في ذلك. الموافقة على مشاركة الهيئة واللجان والفرق المشكلة في إطارها في الاجتماعات والمفاوضات القائمة والمستقبلية، وذلك في إطار مفاوضات منظمة التجارة العالمية واتفاقيات التجارة الحرة والاتفاقيات الثنائية والإقليمية
    والدولية ذات الصلة، وتقديم العروض التفاوضية الأولية والمبادرات والمقترحات، وتنسيق المواقف التفاوضية مع الدول، ضمن التزامات المملكة ووفق الإجراءات النظامية المتبعة. الموافقة على عقد الهيئة للمؤتمرات والندوات واللقاءات المتعلقة بعملها وفقًا للإجراءات المتبعة. التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات التي يمنحه المجلس إيِّاها، ووفقاً للإجراءات النظامية المتبعة. تعيين العاملين ذوي الكفاءة في الهيئة، والإشراف عليهم، طبقاً للأنظمة واللوائح ذات العلاقة. التعاقد مع الخبراء والمختصين والمستشارين في المجالات ذات العلاقة بعمل الهيئة، والموافقة على الدراسات الاستشارية ونتائجها. إعداد تقارير دورية عن أعمال الهيئة وإنجازاتها ونشاطاتها والمعوقات التي تواجهها، ورفعها إلى المجلس، تمهيداً لاستكمال ما يلزم في شأنها. إعداد مؤشرات لقياس أداء الهيئة، ورفعها إلى المجلس لاعتمادها، ومن ثم قياس الأداء وفقاً لتلك المؤشرات بعد اعتمادها، واقتراح الوسائل الكفيلة بتقويم الأداء وتطويره. ممارسة أي صلاحية يسندها إليه المجلس، أو تسندها إليه الأنظمة أو اللوائح. وللمحافظ تفويض أي
    من صلاحياته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة التاسعة : مندوب المملكة الدائم لدى منظمة التجارة العالمية'
  article_text_ar: يرتبط -تنظيميًّا- مكتب مندوب المملكة الدائم لدى منظمة التجارة العالمية بالهيئة. يقوم رئيس المجلس بترشيح مندوب المملكة الدائم لدى منظمة التجارة العالمية وفق الإجراءات النظامية المتبعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة العاشرة : طبيعة عقود منسوبي الهيئة'
  article_text_ar: يخضع منسوبو الهيئة -ما عدا المحافظ- لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الحادية عشرة : الموارد المالية'
  article_text_ar: 'تتكون موارد الهيئة مما يأتي: أ ـ ما يخصص لها في الميزانية العامة للدولة. ب ـ المقابل المالي الذي تتقاضاه عن الأعمال والخدمات التي تقدمها. ج ـ ما يقبله المجلس من هبات وإعانات ومنح ووصايا وأوقاف. د ـ أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع أموال الهيئة في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. تفتح الهيئة حساباً لها في مؤسسة النقد العربي السعودي، ويجوز لها فتح حسابات أخرى في البنوك المرخص لها بالعمل في المملكة، ويُصرف من هذه الحسابات وفق ميزانية الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الثانية عشرة : الميزانية والسنة المالية'
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للهيئة هي السنة المالية للدولة. واستثناء من ذلك تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الثالثة عشرة : مراجع حسابات'
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يُعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه (أتعابهم). ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الرابعة عشرة : رفع الحساب الختامي'
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة الخامسة عشرة : رفع التقرير السنوي'
  article_text_ar: يرفع رئيس المجلس إلى رئيس مجلس الوزراء -خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية- تقريراً سنويًّا عما حققته الهيئة من إنجازات وما واجهتها من صعوبات -إن وجدت- وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
- article_ref: 'المادة السادسة عشرة : النشر والنفاذ'
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2b007d5f-346c-45fc-9bb8-abff00d2bb6b/1
  verified: false
