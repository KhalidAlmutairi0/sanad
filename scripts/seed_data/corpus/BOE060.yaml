regulation:
  code: BOE060
  name_ar: نظام الصندوق السعودي للتنمية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تنشأ بموجب هذا النظام مؤسسة عامة تسمى الصندوق السعودي للتنمية، يكون مقره مدينة الرياض ويتمتع بالشخصية المعنوية والذمة المالية المستقلة، ويتولى المساهمة في تمويل المشاريع الإنسانية في الدول النامية عن طريق منح القروض لتلك الدول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يحدد رأسمال الصندوق بمبلغ عشرة آلاف مليون ريال يغطى نصفه خلال الثلاث السنوات التالية وفقا لاعتمادات الميزانية ويغطى الباقي بعد ذلك وفقًا لما تحدده الميزانية العامة للدولة في كل سنة. ويجوز بقرار من مجلس الوزراء زيادة رأسمال الصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يدير الصندوق مجلس إدارة يرأسه وزير المالية والاقتصاد الوطني ويشكل أعضاء المجلس كما يلي: أ ) نائب للرئيس وعضو منتدب للمجلس – يصدر بتعيينه قرار من مجلس الوزراء يحدد راتبه وشروط خدمته وكيفية إنهائها – بناء على اقتراح وزير المالية والاقتصاد الوطني. ب ) أربعة أعضاء آخرين من ذوي الخبرة والاختصاص يصدر باختيارهم قرار من مجلس الوزراء بناء على اقتراح وزير المالية والاقتصاد الوطني، وتكون مدة عضوية هؤلاء الأعضاء ثلاث سنوات، ويجوز دائمًا إعادة اختيارهم عند انتهاء مدة عضويتهم. ويجتمع مجلس الإدارة بدعوة من رئيسه أو نائبه كلما دعت الحاجة لاجتماعه، ويكون انعقاده صحيحا بحضور أغلبية أعضائه. وبدون إخلال بما ورد به نص خاص تكون قراراته نافذة بموافقة الأغلبية المطلقة للحاضرين وعند التساوي يرجح رأي الجانب الذي فيه الرئيس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مجلس إدارة الصندوق هو السلطة المهيمنة على شئونه وتصريف أموره وله في سبيل ذلك: 1 ) إقرار قواعد وشروط منح القروض واستردادها وفقا لأحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يتولى نائب الرئيس والعضو المنتدب مهام الإدارة التنفيذية للصندوق ويقوم بتمثيله أمام القضاء وفي علاقته بالغير وهو مسئول عن تنفيذ مقررات مجلس الإدارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يجب أن يتحرى الصندوق قبل منح القرض مدى إنتاجيته وضمان الوفاء به مراعياً الاعتبارات التالية: أ ) الملاءمة المالية التي تتمتع بها الدولة طالبة القرض بالنسبة لحجم القرض والموارد المالية والاقتصادية التي تستند إليها في الوفاء به وكفاية هذه العناصر. ب ) أهمية المشروع المقترض له، وأولويته على غيره من المشاريع وتكامله مع المرافق الاقتصادية الأخرى للدولة المقترضة. ج ) كفاية الدراسات التقييمية والتحليلية للمشروع من الوجهتين الاقتصادية والفنية. د ) توفر المال اللازم لتنفيذ المشروع لدى الدولة المقترضة بالإضافة إلى مبلغ القرض.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يمنح الصندوق القروض مراعيا الشروط الآتية: أ ) أن يثبت لصندوق الجدوى الاقتصادية أو الاجتماعية في البلد المقترض للمشروع المطلوب تمويله. ب ) أن يتم دفع القرض واسترداده بالريال السعودي. ج ) ألا يتجاوز مبلغ القرض لأي مشروع نسبة 5% خمسة في المائة من رأسمال الصندوق ونسبة 50% خمسين في المائة من التكلفة الإجمالية للمشروع المقترض له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يجب أن تتضمن جميع العقود التي يبرمها الصندوق مع أي بلد مستفيد بالقرض ما يلي: أ ) تخصيص كامل قيمة القرض للمشروع المقترض له واطلاع الصندوق على كيفية صرف القيمة وطريقة التنسيق مع مصادر التمويل الأخرى. ب ) تقديم جميع المعلومات والتسهيلات التي يطلبها الصندوق عن سير العمل في المشروع المقترض له ابتداءً من تاريخ توقيع العقد حتى تمام استرداد قيمة القرض. ج ) تقديم جميع التسهيلات للموظفين الذين يكلفهم الصندوق بمهام تتعلق بالقرض في البلد المقترض ومنحهم الحصانات المماثلة لحصانات البعثات الدبلوماسية. د ) تسهيل جميع عمليات الصندوق المالية في البلد المقترض وإعفاء مبلغ القرض وموجودات الصندوق في ذلك البلد من جميع القيود الخاصة بالرقابة على تحويل الأموال والعملات والصكوك الناشئة عن مقدار القرض بصورة مباشرة أو غير مباشرة. هـ ) إعفاء جميع معاملات الصندوق ودخله في البلد المقترض من جميع الضرائب والرسوم والتكاليف الرسمية الأخرى مهما كان نوعها. و ) إعفاء جميع موجودات الصندوق في البلد المقترض أيا كان نوعها من المصادرة والتأميم والحراسة بجميع أنواعها والحجز والاستيلاء. ز ) اعتبار جميع مستندات وسجلات
    ومراسلات الصندوق سرية وتوفير الحصانة التامة للصندوق في البلد المقترض بالنسبة لمراقبة المطبوعات وتفتيشها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجوز للصندوق وفقاً لما يراه أن يطلب من المقترض ضمانات ملائمة للقرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: بدون إخلال بحقوق الصندوق الناشئة عن عقد القرض أو قواعد القانون العام أو العرف الدولي يجوز للصندوق إذا أخلت الدولة المقترضة بأي التزام من التزامات عقد القرض أن يوقف أداء أقساط القرض التي لم تدفع وأن يعتبر ما أداه مستحق الأداء فوراً ويسترده مضافاً إليه جميع التكاليف المقررة بعقد القرض وذلك دون حاجة إلى تنبيه أو إنذار أو اتخاذ أي إجراء قضائي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'السنة المالية للصندوق هي السنة المالية للدولة، وفي نهاية كل سنة مالية يرفع وزير المالية والاقتصاد الوطني إلى مجلس الوزراء: أ ) تقريراً سنوياً مفصلاً عن أعمال الصندوق يتضمن عرضاً شاملاً للأعمال في السنة المنتهية وما يعتزم القيام به في السنة اللاحقة. ب ) الميزانية العامة للصندوق وحسابه الختامي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: بدون إخلال لسلطة ديوان المراقبة في المراجعة المالية يجوز لمجلس إدارة الصندوق أن يعين مراقباً ومراجع حسابات قانوني أو أكثر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7017dc70-15bb-4137-b87d-a9a700f1b950/1
  verified: false
