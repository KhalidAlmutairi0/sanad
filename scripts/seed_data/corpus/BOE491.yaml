regulation:
  code: BOE491
  name_ar: الترتيبات التنظيمية لجائزة الملك عبد العزيز للجودة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولاً
  article_text_ar: 'يقصد بالألفاظ الآتية -أينما وردت في هذه الترتيبات- المعاني الموضحة أمام كل منها: الجائزة: جائزة الملك عبدالعزيز للجودة. الهيئة: الهيئة السعودية للمواصفات والمقاييس والجودة. القطاعات: الكيانات الحكومية، والخاصة، وغير الربحية، في المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: ثانياً
  article_text_ar: 'تهدف الجائزة إلى تحقيق الآتي: تحفيز القطاعات على تبني مبادئ الجودة والتميز المؤسسي من خلال تطبيق النموذج الوطني للتميز ومعاييره. تعزيز مفاهيم وتطبيقات قياس الأداء والتحسين المستمر للأعمال. العمل على رفع مستوى الجودة والكفاءة الإنتاجية في مختلف القطاعات، وتعزيز جهودها وتمكينها من المنافسة على المستوى العالمي. توفير المعلومات المتعلقة بالجودة والتميز المؤسسي على مستوى المملكة. التوعية بثقافتي الجودة والتميز المؤسسي وتطبيقاتهما ونشرهما في المجتمع وبين مختلف القطاعات. تحفيز القيادات الإدارية في القطاعات على تحقيق أهداف الجودة الشاملة والوفاء بمسـؤولياتها. إنشاء منصة موحدة لتبادل أفضل الممارسات والمقارنات المرجعية في مجالات الجودة والتميز المؤسسي بين القطاعات. تكريم المنشآت المتميزة بما يسهم في إيجاد بيئة محفزة على الجودة والتميز لمختلف القطاعات. تقديم الخدمات التدريبية والاستشارية المتعلقة بالجودة والتميز المؤسسي للقطاعات. إجراء البحوث والدراسات الخاصة بقياس الأثر من الاشتراك في الجائزة وبتطبيق نموذجها الوطني للتميز المؤسسي ومعاييره، ولها التعاون مع الجهات البحثية المتخصصة
    داخل وخارج المملكة لتحقيق ذلك. تحقيق التكامل لكافة الجهود الوطنية لجوائز الجودة والتميز في مختلف القطاعات. التعاون مع الجوائز المحلية والإقليمية والعالمية المشابهة للجائزة لتبادل الخبرات ونقل المعرفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: 'يكون للجائزة لجنة إشرافية يرأسها وزير التجارة، وعضوية كل من: محافظ الهيئة نائباً للرئيس. ممثل من وزارة الصناعة والثروة المعدنية. ممثل من وزارة التعليم. ممثل من وزارة الصحة. ممثل من وزارة الموارد البشرية والتنمية الاجتماعية. ممثل من الهيئة العامة للمنشآت الصغيرة والمتوسطة. ممثل من المركز الوطني لقياس أداء الأجهزة العامة. ممثل من مجلس الغرف السعودية. ممثلان من الجمعيات أو المؤسسات الأهلية المتخصصة في مجال الجودة. ويتولى أمين عام الجائزة ترشيح الممثلين المشار إليهما في الفقرة (9) من هذا البند، ويصدر رئيس اللجنة الإشرافية للجائزة قراراً بتسميتهما لمدة (ثلاث) سنوات قابلة للتجديد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: رابعاً
  article_text_ar: 'تختص اللجنة الإشرافية للجائزة بالآتي: اعتماد النموذج الوطني للتميز المؤسسي، واللائحة التنظيمية للجائزة. اعتماد فئات الجائزة. اعتماد تكاليف الاشتراك في الجائزة. اعتماد القطاعات التي تشملها الجائزة لكل دورة. اعتماد أسماء أعضاء اللجان الاستشارية. اعتماد الترشيحات النهائية للفائزين بالجائزة. اعتماد موعد وبرنامج الحفل الختامي لتوزيع الجائزة. الموافقة على المقابل المالي للخدمات التدريبية أو الاستشارية التي تقدمها الجائزة. اعتماد مشروع الميزانية السنوية للجائزة. الموافقة على إنشاء المنصة الموحدة المشار إليها في الفقرة (7) من البند (ثانياً) من هذه الترتيبات. وللجنة الإشرافية للجائزة -في سبيل تحقيق اختصاصاتها- تشكيل لجان دائمة أو مؤقتة من أعضائها أو من سواهم، تعهد إليها بما تراه من مهمات، وتحدِّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، وللجان الاستعانة بمن تراه لتأدية المهمات المعهود بها إليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: خامساً
  article_text_ar: تعمل الجائزة وفق النموذج الوطني للتميز المؤسسي الموجه لجميع القطاعات، ويخضع للمراجعة بصفة دورية لضمان مواكبته للمتطلبات الوطنية والمتغيرات في مستوى الأداء. تركز الجائزة على تطوير معايير تحقيق التميز المؤسسي للمنشآت في مختلف القطاعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: سادساً
  article_text_ar: يحق لمختلف منشآت القطاعات أن تتقدم بطلب الاشتراك في دورة الجائزة وفقاً لمعايير النموذج الوطني للتميز المؤسسي واللائحة التنظيمية للجائزة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: سابعاً
  article_text_ar: تمنح الجائزة كل عامين لمنشأة واحدة أو أكثر بحسب معايير النموذج الوطني للتميز المؤسسي، وذلك لمختلف شرائح القطاعات المستهدفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: ثامناً
  article_text_ar: تسلم الجائزة في حفل برعاية خادم الحرمين الشريفين أو من ينيبه، وتمنح المنشأة (أو المنشآت) الفائزة بأي من فئات الجائزة درع التميز وشهادته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: تاسعاً
  article_text_ar: يجوز حجـب الجـائزة أو أي من فئاتها كليًّا أو جزئيًّا في حالة عدم اشتراك منشآت القطاعات المستهدفة فيها أو عدم تحقيق متطلبات الحصول عليها وفقاً لمعايير النموذج الوطني للتميز المؤسسي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: عاشراً
  article_text_ar: يحق للجنة الإشرافية للجائزة سحب الجائزة من المنشأة الفائزة في حال عدم التزام تلك المنشأة بالمعايير التي تحددها اللائحة التنظيمية للجائزة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: حادي عشر
  article_text_ar: 'يكون مقر الأمانة العامة للجائزة في الهيئة، ويكون محافظ الهيئة أميناً عاماً للجائزة، ويتولى الأمين العام الاختصاصات الآتية: الإشراف العام على أعمال الجائزة، ومتابعة تنفيذ قرارات اللجنة الإشرافية للجائزة. اعتماد الخطة الزمنية لدورة الجائزة. ترشيح أسماء أعضاء اللجان الاستشارية. اعتماد أسماء أعضاء لجان التقييم والتحكيم. اعتماد الخطة الزمنية للتقييم والتحكيم. اقتراح الآليات اللازمة لإنشاء المنصة الموحدة المشار إليها في الفقرة (7) من البند (ثانياً) من هذه الترتيبات، ورفعها إلى اللجنة الإشرافية للجائزة. تمثيل الجائزة في المحافل المحلية والإقليمية والدولية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: ثاني عشر
  article_text_ar: تلتزم الأمانة العامة للجائزة بالحفاظ على سرية المعلومات التي تقدمها المنشآت لنيل الجائزة أو أي من فئاتها في جميع مراحل الاشتراك فيها، وبعد الانتهاء من دورة الجائزة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: ثالث عشر
  article_text_ar: 'تتكون الموارد المالية للجائزة من الآتي: ما يخصص لها من الدولة ضمن بنود ميزانية الهيئة. المقابل المالي لتكاليف عمليات الاشتراك فيها، أو أي خدمة تدريبية أو استشارية تقدمها. أي مورد آخر تقره اللجنة الإشرافية للجائزة، بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
- article_ref: رابع عشر
  article_text_ar: تعد اللجنة الإشرافية للجائزة مشروع تنظيم للجائزة في ضوء ما ورد في هذه الترتيبات التنظيمية وما قد يظهر لها في هذا الشأن، وترفعه لاستكمال الإجراءات النظامية اللازمة في شأنه، وذلك خلال مدة لا تتجاوز (اثني عشر) شهراً من تاريخ الموافقة على هذه الترتيبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1cf187fc-fcee-4eec-be82-ace90181b86e/1
  verified: false
