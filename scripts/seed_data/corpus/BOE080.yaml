regulation:
  code: BOE080
  name_ar: نظام مكافحة الغش التجاري
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمامها ما لم يقتضِ السياق خلاف ذلك: النظام: نظام مكافحة الغش التجاري. اللائحة: اللائحة التنفيذية لنظام مكافحة الغش التجاري. المنتج المغشوش: أ - كل منتج دخل عليه تغيير أو عبث به بصورة ما مما أفقده شيئًا من قيمته المادية أو المعنوية، سواء كان ذلك بالإضافة أو بالإنقاص أو بالتصنيع أو بغير ذلك، في ذاته أو طبيعته أو جنسه أو نوعه أو شكله أو عناصره أو صفاته أو متطلباته أو خصائصه أو مصدره أو قدره سواء في الوزن، أو الكيل، أو المقاس، أو العدد، أو الطاقة، أو العيار. ب - كل منتج غير مطابق للمواصفات القياسية المعتمدة. ج - المنتج الفاسد: كل منتج لم يعد صالحًا للاستغلال أو الاستعمال أو الاستهلاك وفق ما تبينه اللائحة. المواصفات القياسية المعتمدة: المواصفات الصادرة من الهيئة العربية السعودية للمواصفات والمقاييس أو الصادرة من جهات أخرى محلية أو دولية وتعتمدها الهيئة المذكورة. الوزارة: وزارة التجارة والصناعة. الوزير: وزير التجارة والصناعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يعد مخالفًا لأحكام هذا النظام كل من: خدع - أو شرع في الخداع - بأي طريقة من الطرق في أحد الأمور الآتية: أ - ذاتية المنتج، أو طبيعته، أو جنسه، أو نوعه، أو عناصره، أو صفاته الجوهرية. ب - مصدر المنتج. ج - قدر المنتج، سواء في الوزن، أو الكيل، أو المقاس، أو العدد، أو الطاقة، أو العيار. غش - أو شرع - في غش المنتج. باع منتجًا مغشوشًا، أو عرضه. حاز منتجًا مغشوشًا بقصد المتاجرة. صنع منتجات مخالفة للمواصفات القياسية المعتمدة، أو أنتجها أو حازها، أو باعها، أو عرضها. استعمل آنية، أو أوعية، أو أغلفة، أو عبوات، أو ملصقات، مخالفة للمواصفات القياسية المعتمدة، وذلك في تجهيز - أو تحضير - ما يكون معدًّا للبيع من المنتجات. عبأ منتجًا، أو حزمه، أو ربطه، أو وزعه، أو خزنه، أو نقله، بالمخالفة للمواصفات القياسية المعتمدة. استورد عبوات، أو أغلفة، أو مطبوعات تستعمل في الغش، أو صنعها، أو طبعها، أو حازها، أو باعها، أو عرضها. استورد منتجًا مغشوشًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يلتزم كل من (المنتج والمستورد والموزع) لمنتج مغشوش إذا صرّفه؛ بإبلاغ الوزارة بالمعلومات التي تتعلق بكميته وأسماء التجار الذين صرف إليهم هذا المنتج وعناوينهم، وذلك فور علمه أو إعلانه أو إبلاغه بالمخالفة على عنوانه المسجل في السجل التجاري أو في الغرفة التجارية الصناعية، أو عند تحرير محضر بضبطها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: لا يجوز إجراء تخفيضات في أسعار المنتجات، أو إجراء مسابقات تجارية بأي وسيلة من الوسائل، دون الحصول على ترخيص من الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يتولى موظفون من الوزارة، ووزارة الشئون البلدية والقروية، والهيئة العامة للغذاء والدواء– يصدر بتعيينهم قرار من الوزير بعد موافقة جهاتهم– مجتمعين أو منفردين ضبط مخالفات أحكام هذا النظام وإثباتها، ويعدون من مأموري الضبط القضائي، ويكونون تحت مسؤولية وإشراف الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: إذا وجدت لدى مأمور الضبط القضائي أسباب قوية تحمله على الاعتقاد بأن هناك مخالفة لأحكام هذا النظام، جاز له سحب عينات من المنتج المشتبه به لتحليلها، وتحرير محضر ضبط بهذه الواقعة يحتوي على جميع البيانات اللازمة للتثبت من العينات نفسها والمنتج الذي أخذت منه وفقاً لما تبينه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يحظر على التاجر التصرف في المنتج المشتبه به قبل ظهور نتيجة الفحص بإجازته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تلتزم الجهة المختصة بفحص المنتج وإظهار نتيجة الفحص خلال مدة لا تتجاوز خمسة عشر يومًا بالنسبة للمنتجات الغذائية، أما المنتجات الأخرى فتحدد اللائحة المدد اللازمة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يحظر منع مأموري الضبط القضائي من تأدية أعمال وظائفهم في التفتيش والضبط، ودخول المصانع أو المخازن أو المتاجر أو غيرها من المحلات، أو الحصول على عينات من المنتجات المشتبه بها، وعلى مأموري الضبط القضائي تقديم ما يثبت أنهم من مأموري الضبط، ويحق لهم إغلاق المحل لحين مراجعة التاجر صاحب المحل وتمكينهم من الدخول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تصدر بقرار من مجلس الوزراء – بناء على اقتراح الوزير بعد التنسيق مع وزير الشئون البلدية والقروية ورئيس الهيئة العامة للغذاء والدواء – قواعد تمنح بموجبها مكافآت مالية للموظفين المشار إليهم في المادة (الخامسة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تمنح مكافأة تشجيعية بنسبة لا تزيد على (25%) من مقدار الغرامة المستحصلة لمن يساعد - من غير الموظفين المشار إليهم في المادة (الخامسة) من هذا النظام - في الكشف عن حالات الغش التجاري التي تؤدي إلى ضبط المخالفين وإدانتهم، وفقًا لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تختص هيئة التحقيق والادعاء العام بالتحقيق والادعاء العام في المخالفات الواردة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يختص ديوان المظالم بالفصل في جميع المخالفات والمنازعات ودعاوى المطالبة بالتعويض الناشئة عن تطبيق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يفترض في كل من ارتكب مخالفة لأحكام هذا النظام العلم بغش المنتج، ولا يمنع علم المشتري بذلك من تطبيق العقوبة المقررة بحق المخالف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يكون البائع، ومن يصرف المنتج لحسابه، ومديرو الشركات والجمعيات والمؤسسات والمحلات، مسئولين عن كل ما يقع من مخالفات لأحكام هذا النظام، وتوقع على كل منهم العقوبات المقررة لمرتكب المخالفة، فإذا أثبت أي منهم أن المخالفة وقعت لسبب خارج عن إرادته فتقتصر العقوبة على المخالف وحده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يعاقب بغرامة لا تزيد على خمسمائة ألف ريال، أو السجن مدة لا تزيد على سنتين، أو بهما معًا، كل من ارتكب إحدى المخالفات المنصوص عليها في المادة (الثانية) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعاقب بغرامة لا تزيد على خمسين ألف ريال، أو السجن مدة لا تزيد على ستة أشهر، أو بهما معًا كل من ارتكب المخالفة المنصوص عليها في المادة (الرابعة).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'يعاقب بغرامة لا تزيد على (1.000.000) مليون ريال، أو بالسجن مدة لا تزيد على ثلاث سنوات، أو بهما معًا – في الحالتين الآتيتين: إذا اقترن فعل الخداع - أو الشروع فيه - باستعمال موازين أو مقاييس أو مكاييل أو دمغات أو آلات فحص أخرى مزيفة أو مختلفة، أو باستعمال طرق ووسائل من شأنها جعل عملية وزن المنتج أو قياسه أو كيله أو فحصه غير صحيحة. أو كان المنتج المغشوش أو المواد المستعملة في غشه مضرة بصحة الإنسان أو الحيوان. إذا ارتكبت أي من المخالفات المنصوص عليها في المواد (الثالثة) و(السابعة) و(التاسعة) من هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: مع عدم الإخلال بالعقوبات المنصوص عليها في المادة (الثامنة عشرة) من هذا النظام يعاقب من يتصرف بمنتجات محجوزة بغرامة تعادل قيمتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: مع عدم الإخلال بالعقوبات المنصوص عليها في هذا النظام، يجوز الحكم بإغلاق المحل المخالف مدة لا تتجاوز سنة في المخالفات المنصوص عليها في المادة (الثانية) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يترتب –في جميع الأحوال– على ثبوت غش المنتج إتلافه أو التصرف فيه بأي طريقة مناسبة، ومصادرة الأدوات التي استعملت في الغش أو الخداع. وتبين اللائحة كيفية التصرف فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: مع عدم الإخلال بحق من أصابه ضرر في التعويض نتيجة ارتكاب إحدى المخالفات المنصوص عليها في هذا النظام، يلتزم المخالف بسحب المنتج المغشوش وإعادة قيمته إلى المشتري، وذلك وفق الشروط والإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: لهيئة التحقيق والادعاء العام أن تطلب منع سفر من يثبت التحقيق ارتكابه مخالفة لأحكام هذا النظام إلى أن يصدر الحكم النهائي في القضية، فإذا صدر الحكم بالإدانة تقضي الجهة المختصة بإبعاد الأجنبي عن المملكة بعد تنفيذ الحكم، ولا يسمح بعودته إليها للعمل بعد ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: إذا عاد المخالف إلى ارتكاب أي من المخالفات المنصوص عليها في هذا النظام خلال خمس سنوات من تاريخ صدور الحكم نهائيًّا، يعاقب بعقوبة لا تزيد على ضعف الحد الأعلى للعقوبة المقررة للمخالفة، فإن عاد مرة أخرى– فبالإضافة إلى العقوبات المقررة– يحرم من مزاولة النشاط التجاري مدة لا تزيد على (خمس) سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: ينشر على نفقة المحكوم عليه ملخص الحكم النهائي بالإدانة في إحدى المخالفات المنصوص عليها في المواد السابقة في جريدتين يوميتين تصدر إحداهما في المنطقة التي وقعت فيها المخالفة أو أقرب منطقة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تسري العقوبات المنصوص عليها في هذا النظام على كل من شارك في ارتكاب المخالفة، أو حرض على ارتكابها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يجوز للوزير– في حالة الضرورة أو الاستعجال– إصدار أمر بالحجز التحفظي على منتج وسحبه من الأسواق عند الاشتباه في غشه، على أن يعرض أمر الحجز خلال مدة لا تزيد على (اثنتين وسبعين) ساعة على ديوان المظالم على النحو المبين في اللائحة لتأكيد الحجز أو إلغائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام، وتنشر في الجريدة الرسمية خلال (تسعين) يومًا من تاريخ صدوره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يحل هذا النظام محل نظام مكافحة الغش التجاري، الصادر بالمرسوم الملكي رقم (م/11) وتاريخ 29 / 5 / 1404هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ، ويعمل به بعد (تسعين) يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85eb2897-bec6-4c0c-b1d7-ac7c008ec09c/1
  verified: false
