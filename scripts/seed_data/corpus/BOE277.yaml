- article_ref: 'المادة الأولى: اسم المؤسسة'
  article_text_ar: 'تنشأ بموجب هذا النظام مؤسسة عامة تسمى: ( المؤسسة العامة لخطوط حديد حكومة المملكة العربية السعودية )، وتتمتع بالشخصية المعنوية، وترتبط بوزارة المواصلات .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: 'المادة الثانية:  مقرها'
  article_text_ar: تتخذ المؤسسة مقرها الرئيسي في مدينة الدمام، ولها أن تنشئ فروعا لها في المدن والقرى التي تمر بها خطوطها الحديدية، ويجوز لمجلس الوزراء أن يقرر نقل مقرها إلى مدينة أخرى في داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: 'المادة الثالثة: أغراض المؤسسة واختصاصاتها'
  article_text_ar: 'تتولى هذه المؤسسة ممارسة النقل بالخط الحديدي وإدارة ميناء الدمام كخدمة عامة للجمهور، والمساهمة في جميع ما من شأنه تحسين وتطوير هذه الخدمة. ولها في سبيل تحقيق ذلك القيام بما يلي: 1 - الإشراف على تنفيذ وإدارة مشروعات الخطوط الحديدية والمشروعات المرتبطة بخدمة النقل بالخط الحديدي.2 - تشترك مع غيرها من الهيئات أو الشركات أو الأفراد في الأعمال التي تدخل في الغرض الذي أنشئت من أجله، أو تعاون على تحقيقه.3 - عقد القروض الداخلية والخارجية بعد موافقة مجلس الوزراء ، ولها أن تقبل الهبات و أن تملك العقار والمنقول.4 - ممارسة جميع التصرفات اللازمة لتحقيق الأغراض التي أنشئت من أجلها والمذكورة في هذا النظام.5 - إدارة وتشغيل ميناء الدمام لما لها من صلة بمرفق السكة الحديدية، ويجوز لمجلس الوزراء أن يقرر سحب هذه الإدارة وذلك التشغيل متى رأى أن المصلحة العامة تقضي ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: 'المادة الرابعة: أموال المؤسسة'
  article_text_ar: 'تتكون أموال المؤسسة من: 1 - الأموال العينية المستخدمة حاليا في إدارة مرافق السكة الحديد وحقوقها والتزاماتها قبل الغير.2 - الإيرادات التي تحصلها لقاء الخدمات التي تقدمها للأفراد والهيئات العامة والخاصة.3 - الأموال التي تساهم بها الخزانة العامة للدولة.4 - الأموال الثابتة والمنقولة الواقعة تحت تصرفها. 5 - الهبات والقروض .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: 'المادة الخامسة: مجلس إدارة المؤسسة'
  article_text_ar: 'يكون للمؤسسة مجلس إدارة، يتم تشكيله على النحو التالي: 1 - وزير المواصلات - أو من ينيبه - رئيساً 2 - وكيل وزارة المواصلات لشئون الطرق والموانئ عضواً المادة السادسة: اختصاصات مجلس إدارة المؤسسة مجلس إدارة المؤسسة هو السلطة العليا للمؤسسة، يرسم السياسة العامة لها، ويشرف على تنفيذها دون التقيد بالأنظمة الإدارية والمالية المتبعة في الإدارات الحكومية، باستثناء ما هو محدد في هذا النظام، وله في سبيل ذلك، دون أن يكون فيما يلي تحديد لاختصاصه: 1 - إصدار القرارات واللوائح الداخلية المنظمة للأعمال الإدارية والمالية والفنية الخاصة بسير العمل بالمؤسسة. 2 - اقتراح مشروعات اللوائح المتعلقة بموظفي المؤسسة، وتنظيم قواعد تعيينهم وترقيتهم وتحديد وظائفهم ومرتباتهم ورواتبهم، وتنظيم قواعد نقلهم وانتدابهم وتدريبهم وإعارتهم وقواعد إجازاتهم، وتأديبهم وإنهاء خدماتهم. وتصبح هذه الأنظمة نافذة بقرار من مجلس الوزراء ، ويبقى نظام التقاعد لموظفي الدولة المدنيين ساري المفعول على موظفي المؤسسة، وكذلك أنظمة العمل والعمال بالنسبة لعمالها.3 - الموافقة على مشروع ميزانية المؤسسة وعرضه على وزارة المالية والاقتصاد
    الوطني لبحثه تمهيدا لاستصدار مرسوم ملكي به.4 - المصادقة على مشروع الحساب الختامي بعرضه على ديوان المراقبة العامة مع التقرير المشار إليه في الفقرة (6)، تمهيدا للتصديق عليه من مجلس الوزراء . 5 - الموافقة على التعرفة المتعلقة بنقل البضائع والركاب وبالخدمات الأخرى التي تمارسها المؤسسة. 6 - يقدم مجلس الإدارة تقريرا سنويا عن نشاط المؤسسة ومركزها المالي، وحساب الأرباح والخسائر وتقرير مراجعي الحسابات إلى مجلس الوزراء ، خلال أربعة أشهر من تاريخ انتهاء السنة المالية . 7 - يحق لمجلس الإدارة في حالة شغور منصب المدير العام انتداب من يشاء للقيام بمهامه، على أن يكون ذلك بصورة مؤقتة. المادة السابعة: انعقاد مجلس الإدارة وقراراته يجتمع مجلس الإدارة بدعوة من رئيسه مرة كل شهر على الأقل، ويجب في الأحوال الاستثنائية أن يجتمع بدعوة من رئيسه أو بناء على طلب خمسة من أعضائه أو من مدير المؤسسة. ويتم النصاب القانوني للمجلس بحضور ثلثي الأعضاء بما فيهم الرئيس أو من ينوب عنه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي يكون فيه الرئيس. وتعقد اجتماعات مجلس الإدارة في مقر المؤسسة، ويجوز
    في حالة الضرورة انعقاد المجلس في أي مكان آخر من المملكة. المادة الثامنة: المدير العام يكون للمؤسسة مدير عام يعين بقرار من مجلس الوزراء ، بناء على ترشيح من وزير المواصلات وموافقة مجلس الإدارة، ويحدد القرار ما يتقاضاه من رواتب أو مكافأة. ومع عدم الإخلال بما تنص عليه أحكام هذا النظام؛ يعتبر رئيس مجلس إدارة المؤسسة هو المرجع الأعلى للمدير العام. ويقوم المدير العام بإدارة المؤسسة وتصريف شئونها، ويمارس الاختصاصات التالية: 1 - التحضير لجلسات مجلس الإدارة واجتماعاته.2 - تنفيذ القرارات الصادرة من مجلس الإدارة والإشراف على سير العمل بالمؤسسة.3 - الإشراف على إعداد مشروع الميزانية السنوية للمؤسسة ومشروع الحساب الختامي السنوي، وتقديمها لمجلس الإدارة.4 - إصدار أوامر الصرف الخاصة بنفقات المؤسسة ضمن حدود الميزانية.5 - إصدار القرارات الإدارية اللازمة الخاصة بتنظيم دوائر المؤسسة وتحديد اختصاصاتها وضبط العمل وحسن سيره في حدود أنظمة المؤسسة.6 - تمثيل المؤسسة أمام جميع الجهات، وله حق التوقيع عنها في التعاقد وفي التقاضي، وغير ذلك من الأمور الخاصة بشؤون المؤسسة، في حدود الصلاحيات المخولة له.7 - مباشرة ما تخوله
    قرارات مجلس الإدارة والنظم واللوائح الخاصة بالمؤسسة من اختصاصات.8 - تقديم تقرير دوري إلى مجلس الإدارة عن سير العمل بالمؤسسة.9 - يجوز للمدير العام بموافقة مجلس الإدارة أن يفوض غيره في ممارسة كل أو جزء من هذه الصلاحيات. المادة التاسعة: تنقل إلى المؤسسة بمجرد وجودها الحقوق والالتزامات المترتبة من نشاط مصلحة السكة الحديدية قبل ذلك في إدارتها للسكة الحديدية وميناء الدمام. المادة العاشرة: يحدد رأسمال المؤسسة بمجموع قيم الأصول الثابتة والمنقولة عند وجودها، وتعد ميزانية مستقلة للمؤسسة تراعى فيها القواعد المتبعة في المشروعات التجارية، وتلحق بميزانية الدولة. ويجوز أن تضع المؤسسة ميزانية للمشاريع المستجدة التي تزيد مدتها عن سنة، ويجوز زيادة أو تخفيض رأسمالها بموافقة مجلس الوزراء . المادة الحادية عشرة: السنة المالية للمؤسسة هي السنة المالية للدولة. المادة الثانية عشرة: تلتزم المؤسسة بأن تؤدي الرسوم والضرائب والالتزامات المالية إلى الجهات صاحبة الاستحقاق، على أن تتمتع المؤسسة فيما عدا ذلك بالإعفاءات والمميزات التي تتمتع بها الجهات الحكومية من النواحي المالية والضرائبية. المادة الثالثة عشرة: مع عدم
    الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المؤسسة؛ يعين مجلس الإدارة مراجع حسابات أو أكثر من المحاسبين القانونيين، يكون له حقوق مراجع الحسابات في الشركات المساهمة وعليه واجباته. وفي حالة تعدد المراجعين يكونون مسئولين بالتضامن. المادة الرابعة عشرة: تتقيد المؤسسة فيما يتعلق بإدارتها لميناء الدمام بالأنظمة العامة للموانئ في المملكة العربية السعودية. المادة الخامسة عشرة: تمارس المؤسسة الاختصاصات المخولة لها بمقتضى هذا النظام فور صدوره. المادة السادسة عشرة: يعهد إلى لجنة تعين بقرار من وزير المواصلات تضم ممثلين من: وزارة المالية والاقتصاد الوطني ، وديوان المراقبة العامة بتقييم أصول المؤسسة في مدة لا تتجاوز ثلاثة شهور من تاريخ إنشائها، ولها في سبيل تأدية مهمتها أن تستعين بمكتب مراجع حسابات أو أكثر. المادة السابعة عشرة: يستمر العمل بالميزانية القائمة حتى يتم اعتماد الميزانية الجديدة التي توضع طبقا لحكم المادة السادسة من هذا النظام. المادة الثامنة عشرة: تسري الأنظمة واللوائح والقواعد الحالية المنظمة لشئون الخط الحديدي، وذلك حتى يتم إصدار غيرها. الإسم البريد الإلكتروني رقم الجوال
