- article_ref: 'المادة السابعة: انعقاد مجلس الإدارة وقراراته'
  article_text_ar: يجتمع مجلس الإدارة بدعوة من رئيسه مرة كل شهر على الأقل، ويجب في الأحوال الاستثنائية أن يجتمع بدعوة من رئيسه أو بناء على طلب خمسة من أعضائه أو من مدير المؤسسة. ويتم النصاب القانوني للمجلس بحضور ثلثي الأعضاء بما فيهم الرئيس أو من ينوب عنه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي يكون فيه الرئيس. وتعقد اجتماعات مجلس الإدارة في مقر المؤسسة، ويجوز في حالة الضرورة انعقاد المجلس في أي مكان آخر من المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: 'المادة الثامنة: المدير العام'
  article_text_ar: 'يكون للمؤسسة مدير عام يعين بقرار من مجلس الوزراء ، بناء على ترشيح من وزير المواصلات وموافقة مجلس الإدارة، ويحدد القرار ما يتقاضاه من رواتب أو مكافأة. ومع عدم الإخلال بما تنص عليه أحكام هذا النظام؛ يعتبر رئيس مجلس إدارة المؤسسة هو المرجع الأعلى للمدير العام. ويقوم المدير العام بإدارة المؤسسة وتصريف شئونها، ويمارس الاختصاصات التالية: 1 - التحضير لجلسات مجلس الإدارة واجتماعاته.2 - تنفيذ القرارات الصادرة من مجلس الإدارة والإشراف على سير العمل بالمؤسسة.3 - الإشراف على إعداد مشروع الميزانية السنوية للمؤسسة ومشروع الحساب الختامي السنوي، وتقديمها لمجلس الإدارة.4 - إصدار أوامر الصرف الخاصة بنفقات المؤسسة ضمن حدود الميزانية.5 - إصدار القرارات الإدارية اللازمة الخاصة بتنظيم دوائر المؤسسة وتحديد اختصاصاتها وضبط العمل وحسن سيره في حدود أنظمة المؤسسة.6 - تمثيل المؤسسة أمام جميع الجهات، وله حق التوقيع عنها في التعاقد وفي التقاضي، وغير ذلك من الأمور الخاصة بشؤون المؤسسة، في حدود الصلاحيات المخولة له.7 - مباشرة ما تخوله قرارات مجلس الإدارة والنظم واللوائح الخاصة بالمؤسسة من اختصاصات.8
    - تقديم تقرير دوري إلى مجلس الإدارة عن سير العمل بالمؤسسة.9 - يجوز للمدير العام بموافقة مجلس الإدارة أن يفوض غيره في ممارسة كل أو جزء من هذه الصلاحيات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تنقل إلى المؤسسة بمجرد وجودها الحقوق والالتزامات المترتبة من نشاط مصلحة السكة الحديدية قبل ذلك في إدارتها للسكة الحديدية وميناء الدمام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يحدد رأسمال المؤسسة بمجموع قيم الأصول الثابتة والمنقولة عند وجودها، وتعد ميزانية مستقلة للمؤسسة تراعى فيها القواعد المتبعة في المشروعات التجارية، وتلحق بميزانية الدولة. ويجوز أن تضع المؤسسة ميزانية للمشاريع المستجدة التي تزيد مدتها عن سنة، ويجوز زيادة أو تخفيض رأسمالها بموافقة مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تلتزم المؤسسة بأن تؤدي الرسوم والضرائب والالتزامات المالية إلى الجهات صاحبة الاستحقاق، على أن تتمتع المؤسسة فيما عدا ذلك بالإعفاءات والمميزات التي تتمتع بها الجهات الحكومية من النواحي المالية والضرائبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المؤسسة؛ يعين مجلس الإدارة مراجع حسابات أو أكثر من المحاسبين القانونيين، يكون له حقوق مراجع الحسابات في الشركات المساهمة وعليه واجباته. وفي حالة تعدد المراجعين يكونون مسئولين بالتضامن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تتقيد المؤسسة فيما يتعلق بإدارتها لميناء الدمام بالأنظمة العامة للموانئ في المملكة العربية السعودية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تمارس المؤسسة الاختصاصات المخولة لها بمقتضى هذا النظام فور صدوره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يعهد إلى لجنة تعين بقرار من وزير المواصلات تضم ممثلين من: وزارة المالية والاقتصاد الوطني ، وديوان المراقبة العامة بتقييم أصول المؤسسة في مدة لا تتجاوز ثلاثة شهور من تاريخ إنشائها، ولها في سبيل تأدية مهمتها أن تستعين بمكتب مراجع حسابات أو أكثر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يستمر العمل بالميزانية القائمة حتى يتم اعتماد الميزانية الجديدة التي توضع طبقا لحكم المادة السادسة من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تسري الأنظمة واللوائح والقواعد الحالية المنظمة لشئون الخط الحديدي، وذلك حتى يتم إصدار غيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4eb4bd77-cb8e-461d-b5bd-a9a700f2ee03/1
  verified: false
