    . 5 - الموافقة على التعرفة المتعلقة بنقل البضائع والركاب وبالخدمات الأخرى التي تمارسها المؤسسة. 6 - يقدم مجلس الإدارة تقريرا سنويا عن نشاط المؤسسة ومركزها المالي، وحساب الأرباح والخسائر وتقرير مراجعي الحسابات إلى مجلس الوزراء ، خلال أربعة أشهر من تاريخ انتهاء السنة المالية . 7 - يحق لمجلس الإدارة في حالة شغور منصب المدير العام انتداب من يشاء للقيام بمهامه، على أن يكون ذلك بصورة مؤقتة.'
