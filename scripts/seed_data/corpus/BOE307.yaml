- article_ref: المادة الثانية عشرة
  article_text_ar: 'تُحدد الوزارة نوع الدعم السكني الذي يُخصص للمتقدم بناءً على المعايير الآتية: أ - اختيار المتقدم.ب - الحالة المالية للمتقدم وأفراد أسرته.ج - ملاءمته لوضع المتقدم وأفراد أسرته.د - وفرة المنتج السكني (وحدة سكنية - أرض سكنية - قرض سكني - أرض وقرض سكنيين معاً).هـ - مكان إقامة المتقدم وأفراد أسرته.وتحدد اللائحة الأحكام الخاصة بكل نوع من أنواع الدعم السكني بما في ذلك إجراءات التخصيص وشروطه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يُبرَم مع المستفيد عقد دعم سكني - وفقاً لنماذج تعدها الوزارة - يبين الأحكام والشروط والحقوق والالتزامات التي تحكم تقديمه وفقاً لأحكام هذا التنظيم واللائحة والأنظمة ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- يستوفى القسط المالي للدعم السكني وفقاً للآلية التي تحددها اللائحة، ويُنص عليه في العقد مع مراعاة الطبيعة الخاصة لنوع الدعم. ويجوز استقطاع القسط المالي من دخل المستفيد مباشرة على ألا تتجاوز نسبة الاستقطاع (25%) من دخله الشهري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يحدد إجمالي الأقساط المالية للوحدات السكنية والأراضي السكنية بناءً على الموقع والمساحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: إذا لم يسدد المستفيد ستة أقساط شهرية متتالية أو متفرقة، أو لم يسدد القسط السنوي خلال مدة ستة أشهر من تاريخ استحقاقه، تتخذ الوزارة الإجراءات النظامية اللازمة لتحصيل الأقساط المتأخرة باعتبارها ديناً مستحقاً للدولة بما لا يخالف الأحكام الواردة في نظام إيرادات الدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: إذا توفي المستفيد قبل استيفاء الأقساط المالية، جاز لورثته استكمال الاستفادة من الدعم السكني، على أن يتحملوا التزاماته كلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 1 - لا تنتقل ملكية الوحدة السكنية إلى المستفيد إلا بعد سداد الأقساط المالية كاملة، ويلتزم المستفيد خلال مدة الاستيفاء بالمحافظة عليها وصيانتها.2 - لا تنتقل ملكية الأرض السكنية إلى المستفيد إلا بعد بناء مسكن عليها وسداد الأقساط المالية كاملةً.3 - يُقصر انتفاع المستفيد من الدعم السكني على منفعة السكن الخاص له ولأسرته، ويستثنى من ذلك تأجير المسكن وفق الضوابط التي تحددها اللائحة.4 - لا يجوز التصرف بعوض أو بغير عوض في الدعم السكني إلا بعد مرور عشر سنوات من تاريخ حصول المستفيد عليه وسداده الأقساط المالية كاملةً.5 - يكون باطلاً أي تصرف في الأرض السكنية أو الوحدة السكنية بالمخالفة لأحكام هذه المادة، وللوزارة في هذه الحالة استرداد الدعم السكني بشكل نهائي.6 - تطبق أحكام الفقرتين (3) و(4) من هذه المادة على المسكن الذي يشتريه المستفيد أو يبنيه باستخدام القرض السكني. وإذا تصرف المستفيد في المسكن بما يخالف ذلك، حل مبلغ القرض كاملاً.7 - للوزارة أو الصندوق الحصول على الضمانات العينية والشخصية من المستفيد لضمان استيفاء الأقساط المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: للوزارة إحداث برنامج أو أكثر لتعجيل سداد الأقساط المالية بالتنسيق مع القطاع الخاص، وتحدد اللائحة الإجراءات الخاصة بتلك البرامج وكيفية عملها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: مع عدم الإخلال بما ورد في المادة (السادسة عشرة) من هذا التنظيم،تُسترد الأرض السكنية والوحدة السكنية في الحالات التي تحددها اللائحة، وتتخذ الجهات المعنية الإجراءات اللازمة لتنفيذ ذلك.وتحدد اللائحة الضوابط الخاصة بإعادة الأقساط المالية (أو جزء منها) التي قامت الوزارة بتحصيلها للمستفيد، وذلك بعد أن تستقطع الوزارة منه عوض الانتفاع السابق وفق ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يجب على المتقدم والمستفيد - بحسب الأحوال - ضمان صحة ودقة واكتمال جميع المعلومات والبيانات والمستندات المقدمة بموجب أحكام هذا التنظيم واللائحة ـ سواء في طلب الدعم السكني أم غير ذلك - والالتزام بعدم إخفاء أي معلومة يجب الإفصاح عنها بموجب أحكام هذا التنظيم واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: '1 - يترتب على تقديم معلومات أو مستندات أو بيانات جوهرية مضللة أو غير صحيحة أو غير مكتملة ـ سواء في طلب الدعم السكني أم غير ذلك ـ أو إخفاء أي معلومة جوهرية يجب الإفصاح عنها بموجب أحكام هذا التنظيم واللائحة، أو التحايل بأي طريقة للحصول على الدعم السكني؛ اتخاذ أي مما يأتي: أ - إلغاء طلب الدعم السكني الخاص بالمتقدم. ب - استرداد الدعم السكني الذي حصل عليه المستفيد إذا كان يشتمل على أرض سكنية أو وحدة سكنية. ج - حلول مبلغ القرض السكني كاملاً إذا كان الدعم السكني الذي حصل عليه المستفيد يشتمل على قرض سكني.وتعد المعلومة جوهرية لأغراض هذه المادة إذا كان لها تأثير على استحقاق الدعم السكني أو أولوية الحصول عليه. 2 - لا يخل ما ورد في الفقرة (1) من هذه المادة من قيام الوزارة بإحالة المتقدم أو المستفيد - المشار إليهما في تلك الفقرة - إلى الجهات المختصة لاتخاذ ما يلزم في شأنه نظاماً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجوز لمن صدر في شأنه قرار أو أي إجراء تتخذه الوزارة بموجب هذا التنظيم أو اللائحة التظلم منه - خلال ستين يومًا من تاريخ إبلاغه - أمام لجنة تشكل في الوزارة لهذا الغرض، وتحدد اللائحة الأحكام المتعلقة بتشكيلها وإجراءات عملها. ويجوز التظلم من قرارات اللجنة أمام ديوان المظالم وفقاً لنظامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يصدر الوزير اللائحة خلال ستين يوماً من تاريخ نشر هذا التنظيم، وتنشر في الجريدة الرسمية، ويعمل بها من تاريخ نفاذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يعمل بهذا التنظيم بعد مضي ستين يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
