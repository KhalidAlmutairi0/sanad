regulation:
  code: BOE307
  name_ar: تنظيم الدعم السكني
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها: الوزارة: وزارة الإسكان. الوزير:وزير الإسكان. الصندوق: صندوق التنمية العقارية. اللائحة: اللائحة التنفيذية لهذا التنظيم. الدعم السكني: ما تقدمه الدولة من وحدة سكنية، أو أرض سكنية، أو قرض سكني، أو أرض وقرض سكنيين معاً، أو غير ذلك من أوجه الدعم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا التنظيم إلى تيسير تملك الأسرة لمسكن مناسب، وفقاً للأحكام الواردة فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 1 - تتولى الوزارة تنفيذ هذا التنظيم، ولها التنسيق مع الصندوق لأداء أي مهمة تتعلق بذلك. 2 - تستقبل الوزارة طلبات الدعم السكني وتبت فيها بعد دراستها. 3 - يقدم الصندوق القروض السكنية للمتقدمين بناءً على القرار الذي تصدره الوزارة في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع مراعاة الشروط الواردة في المادتين (الخامسة) و(السادسة) من هذا التنظيم، يقصر الدعم السكني على الأسرة التي هي أيُّ من المجموعات الآتية: 1 - زوج وزوجة. 2 - زوج وزوجة وولد أو أكثر من أولادهما (الذكور غير المتزوجين الذين لم تتجاوز سنهم (25) سنة، أو الإناث غير المتزوجات). 3 - أب وولد أو أكثر من أولاد الأب (الذكور غير المتزوجين الذين لم تتجاوز سنهم (25) سنة، أو الإناث غير المتزوجات). 4 - أم وولد أو أكثر من أولادها (الذكور غير المتزوجين الذين لم تتجاوز سنهم (25) سنة، أو الإناث غير المتزوجات). 5 - اثنان أو أكثر من الإخوة في حال وفاة الوالدين على أن يكون الذكر غير متزوج ولم تتجاوز سنه (25) سنة وأن تكون الأنثى غير متزوجة. 6 - واحد أو أكثر من الإخوة في حال كون الأم غير سعودية والأب متوفى، أو كونها العائل الوحيد لأولادها السعوديين على أن يكون الذكر غير متزوج ولم تتجاوز سنه (25) سنة والأنثى غير متزوجة. ولا يعد فرداً من الأسرة من كان له - بموجب أحكام هذا التنظيم - حق التقدم بطلب دعم سكني عن أسرة مستقلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يقدم الزوج أو الأب طلب الحصول على دعم سكني للأسرة. وتقدمه الزوجة التي تعول أولادها، أو الأم إذا كانت مطلقة مضى على طلاقها سنتان (أو أكثر) وكانت تعول أولادها، أو الأم متى كان زوجها متوفى.ويقدم الطلب الإخوة - المشار إليهم في الفقرتين (5) و(6) من المادة (الرابعة) من هذا التنظيم - مجتمعين.وتحدد اللائحة الضوابط والإجراءات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: '1 - يجب أن تتوافر الشروط الآتية لتقديم طلب الحصول على الدعم السكني: أ - أن يكون طالب الدعم السكني سعودي الجنسية.ب - ألا تقل سن طالب الدعم السكني عن (25) سنة، ويستثنى من ذلك الأم أو الزوجة أو الأخوة مجتمعين. المادة السابعة: يقدم طلب الدعم السكني بالطريقة التي تحددها الوزارة، ويلتزم المتقدم بتزويد الوزارة بجميع المعلومات والمستندات التي تطلبها، وللوزارة التنسيق مع الجهات الحكومية والخاصة من أجل الحصول على أي معلومة أو مستند خاص بالمتقدم أو أفراد أسرته أو التحقق من صحتها. المادة الثامنة: توقف إجراءات طلب الدعم السكني إذا تغير حال المتقدم أو الأسرة (أو أحد أفرادها) بعد تاريخ تقديم الطلب، بحيث لم تعد تتوافر في الطلب متطلبات أي من المواد (الرابعة) أو (الخامسة) أو (السادسة) من هذا التنظيم. ويجوز تفعيل الطلب بعد انتفاء سبب الإيقاف، ولا يُعتد بمدة الإيقاف في احتساب الأولوية وفقاً لمعيار أسبقية تقديم الطلب. المادة التاسعة: إذا توفي المتقدم قبل تخصيص دعم سكني، جاز لمن تنطبق عليه الشروط المبينة في هذا التنظيم من أفراد أسرته أن يتقدم بطلب جديد يأخذ أسبقية طلب المتوفى. المادة العاشرة:
    يلتزم المتقدم في كل الأوقات بما يأتي: 1 - إشعار الوزارة بأي تغيير يطرأ على المعلومات التي قدمها أو أي تغيير على وضعه قد يؤثر على توافر الشروط المبينة في هذا التنظيم أو على أولويته في الحصول على الدعم السكني، وذلك خلال مدة لا تتجاوز خمسة عشر يوماً من تاريخ حدوث التغيير. 2 - تقديم المعلومات والمستندات والإقرارات التي تطلبها الوزارة خلال مدة لا تتجاوز عشرة أيام من تاريخ طلبها ما لم تحدد الوزارة مهلة أطول. وتبين اللائحة أي التزام إضافي يتعين على المتقدم التقيد به. المادة الحادية عشرة: يُرتَّب المتقدمون - الذين توافرت فيهم شروط الحصول على الدعم السكني - بحسب أولويتهم في الحصول على الدعم السكني بناءً على المعايير التي تحددها اللائحة، ومنها: 1 - الحالة المالية للمتقدم وأسرته.2 - سن المتقدم.3 - عدد أفراد الأسرة.4 - الحالة الاجتماعية والصحية للمتقدم وأسرته.5 - أسبقية تقديم الطلب. كما تحدد اللائحة الضوابط اللازمة لتطبيق المعايير المنصوص عليها في هذه المادة، والوزن النسبي لكل منها، مع مراعاة توازن المجتمعات السكنية. المادة الثانية عشرة: تُحدد الوزارة نوع الدعم السكني الذي يُخصص للمتقدم بناءً على
    المعايير الآتية: أ - اختيار المتقدم.ب - الحالة المالية للمتقدم وأفراد أسرته.ج - ملاءمته لوضع المتقدم وأفراد أسرته.د - وفرة المنتج السكني (وحدة سكنية - أرض سكنية - قرض سكني - أرض وقرض سكنيين معاً).هـ - مكان إقامة المتقدم وأفراد أسرته.وتحدد اللائحة الأحكام الخاصة بكل نوع من أنواع الدعم السكني بما في ذلك إجراءات التخصيص وشروطه. المادة الثالثة عشرة: يُبرَم مع المستفيد عقد دعم سكني - وفقاً لنماذج تعدها الوزارة - يبين الأحكام والشروط والحقوق والالتزامات التي تحكم تقديمه وفقاً لأحكام هذا التنظيم واللائحة والأنظمة ذات الصلة. المادة الرابعة عشرة: 1- يستوفى القسط المالي للدعم السكني وفقاً للآلية التي تحددها اللائحة، ويُنص عليه في العقد مع مراعاة الطبيعة الخاصة لنوع الدعم. ويجوز استقطاع القسط المالي من دخل المستفيد مباشرة على ألا تتجاوز نسبة الاستقطاع (25%) من دخله الشهري. المادة الخامسة عشرة: يحدد إجمالي الأقساط المالية للوحدات السكنية والأراضي السكنية بناءً على الموقع والمساحة. المادة السادسة عشرة: إذا لم يسدد المستفيد ستة أقساط شهرية متتالية أو متفرقة، أو لم يسدد القسط السنوي خلال مدة ستة أشهر
    من تاريخ استحقاقه، تتخذ الوزارة الإجراءات النظامية اللازمة لتحصيل الأقساط المتأخرة باعتبارها ديناً مستحقاً للدولة بما لا يخالف الأحكام الواردة في نظام إيرادات الدولة. المادة السابعة عشرة : إذا توفي المستفيد قبل استيفاء الأقساط المالية، جاز لورثته استكمال الاستفادة من الدعم السكني، على أن يتحملوا التزاماته كلها. المادة الثامنة عشرة: 1 - لا تنتقل ملكية الوحدة السكنية إلى المستفيد إلا بعد سداد الأقساط المالية كاملة، ويلتزم المستفيد خلال مدة الاستيفاء بالمحافظة عليها وصيانتها.2 - لا تنتقل ملكية الأرض السكنية إلى المستفيد إلا بعد بناء مسكن عليها وسداد الأقساط المالية كاملةً.3 - يُقصر انتفاع المستفيد من الدعم السكني على منفعة السكن الخاص له ولأسرته، ويستثنى من ذلك تأجير المسكن وفق الضوابط التي تحددها اللائحة.4 - لا يجوز التصرف بعوض أو بغير عوض في الدعم السكني إلا بعد مرور عشر سنوات من تاريخ حصول المستفيد عليه وسداده الأقساط المالية كاملةً.5 - يكون باطلاً أي تصرف في الأرض السكنية أو الوحدة السكنية بالمخالفة لأحكام هذه المادة، وللوزارة في هذه الحالة استرداد الدعم السكني بشكل نهائي.6 - تطبق أحكام
    الفقرتين (3) و(4) من هذه المادة على المسكن الذي يشتريه المستفيد أو يبنيه باستخدام القرض السكني. وإذا تصرف المستفيد في المسكن بما يخالف ذلك، حل مبلغ القرض كاملاً.7 - للوزارة أو الصندوق الحصول على الضمانات العينية والشخصية من المستفيد لضمان استيفاء الأقساط المالية. المادة التاسعة عشرة : للوزارة إحداث برنامج أو أكثر لتعجيل سداد الأقساط المالية بالتنسيق مع القطاع الخاص، وتحدد اللائحة الإجراءات الخاصة بتلك البرامج وكيفية عملها. المادة العشرون : مع عدم الإخلال بما ورد في المادة (السادسة عشرة) من هذا التنظيم،تُسترد الأرض السكنية والوحدة السكنية في الحالات التي تحددها اللائحة، وتتخذ الجهات المعنية الإجراءات اللازمة لتنفيذ ذلك.وتحدد اللائحة الضوابط الخاصة بإعادة الأقساط المالية (أو جزء منها) التي قامت الوزارة بتحصيلها للمستفيد، وذلك بعد أن تستقطع الوزارة منه عوض الانتفاع السابق وفق ما تحدده اللائحة. المادة الحادية والعشرون : يجب على المتقدم والمستفيد - بحسب الأحوال - ضمان صحة ودقة واكتمال جميع المعلومات والبيانات والمستندات المقدمة بموجب أحكام هذا التنظيم واللائحة ـ سواء في طلب الدعم السكني أم
    غير ذلك - والالتزام بعدم إخفاء أي معلومة يجب الإفصاح عنها بموجب أحكام هذا التنظيم واللائحة. المادة الثانية والعشرون : 1 - يترتب على تقديم معلومات أو مستندات أو بيانات جوهرية مضللة أو غير صحيحة أو غير مكتملة ـ سواء في طلب الدعم السكني أم غير ذلك ـ أو إخفاء أي معلومة جوهرية يجب الإفصاح عنها بموجب أحكام هذا التنظيم واللائحة، أو التحايل بأي طريقة للحصول على الدعم السكني؛ اتخاذ أي مما يأتي: أ - إلغاء طلب الدعم السكني الخاص بالمتقدم. ب - استرداد الدعم السكني الذي حصل عليه المستفيد إذا كان يشتمل على أرض سكنية أو وحدة سكنية. ج - حلول مبلغ القرض السكني كاملاً إذا كان الدعم السكني الذي حصل عليه المستفيد يشتمل على قرض سكني.وتعد المعلومة جوهرية لأغراض هذه المادة إذا كان لها تأثير على استحقاق الدعم السكني أو أولوية الحصول عليه. 2 - لا يخل ما ورد في الفقرة (1) من هذه المادة من قيام الوزارة بإحالة المتقدم أو المستفيد - المشار إليهما في تلك الفقرة - إلى الجهات المختصة لاتخاذ ما يلزم في شأنه نظاماً. المادة الثالثة والعشرون : يجوز لمن صدر في شأنه قرار أو أي إجراء تتخذه الوزارة بموجب هذا التنظيم أو اللائحة
    التظلم منه - خلال ستين يومًا من تاريخ إبلاغه - أمام لجنة تشكل في الوزارة لهذا الغرض، وتحدد اللائحة الأحكام المتعلقة بتشكيلها وإجراءات عملها. ويجوز التظلم من قرارات اللجنة أمام ديوان المظالم وفقاً لنظامه. المادة الرابعة والعشرون : يصدر الوزير اللائحة خلال ستين يوماً من تاريخ نشر هذا التنظيم، وتنشر في الجريدة الرسمية، ويعمل بها من تاريخ نفاذ هذا التنظيم. المادة الخامسة والعشرون : يعمل بهذا التنظيم بعد مضي ستين يوماً من تاريخ نشره.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1e29de81-aa5e-4d27-9b90-a9a700f21aed/1
  verified: false
