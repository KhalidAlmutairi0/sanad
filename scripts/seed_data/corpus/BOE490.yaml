regulation:
  code: BOE490
  name_ar: الترتيبات التنظيمية للهيئة الملكية لمدينة مكة المكرمة والمشاعر المقدسة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولاً
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذه الترتيبات - المعاني المبينة أمام كل منها، ما لم يقتضِ سياق النص غير ذلك: الهيئة: الهيئة الملكية لمدينة مكة المكرمة والمشاعر المقدسة. الترتيبات: الترتيبات التنظيمية للهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. النطاق الجغرافي: مدينة مكة المكرمة والمشاعر المقدسة، وما يحدده المجلس من أماكن خارج حدودهما مما هو مرتبط بأهداف الهيئة واختصاصاتها ومهماتها والخدمات المقدمة لضيوف الرحمن من حجاج ومعتمرين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: ثانياً
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، وترتبط تنظيمياً برئيس مجلس الوزراء. يكون مقر الهيئة في مدينة مكة المكرمة، ولها إنشاء مكاتب بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: تهدف الهيئة إلى الارتقاء بالأعمال والخدمات ذات الصلة بالمجالات التنموية والاجتماعية والصحية والتعليمية والثقافية والبلدية والتقنية والمائية والبيئية والتجارية والاستثمارية والفندقية، وبالإسكان والسياحة والآثار والنقل والاتصالات والطاقة وغيرها من المجالات التنموية والخدمية الأخرى، والأعمال والخدمات والمشروعات المرتبطة بها من جوانب تنظيمية وإدارية وتشغيلية - فيما عدا المجالات الأمنية - التي تقدم في النطاق الجغرافي، وذلك بما يتناسب مع قدسية ومكانة مدينة مكة المكرمة والمشاعر المقدسة وبما يكفل حصول ضيوف بيت الله الحرام من الحجاج والمعتمرين على أرقى الخدمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: رابعاً
  article_text_ar: 'تُعدّ الهيئة السلطة العليا المهيمنة على ما يقدم من أعمال وخدمات ومشروعات في النطاق الجغرافي، ولها في سبيل ذلك القيام بكل ما يلزم لتحقيق أهدافها، وعلى وجه خاص ما يلي: رسم السياسات العامة لتطوير النطاق الجغرافي، وتنميته. اقتراح التنظيمات والقواعد والضوابط ذات الصلة باختصاصات ومهمات الهيئة، واقتراح تعديل المعمول به منها، على أن تصدر بقرار من المجلس، ومن ثم استكمال ما يلزم نظاماً في شأنها، دون أن يخل ذلك بتنفيذ تلك التنظيمات والقواعد والضوابط. إعداد الخطط والدراسات والمخططات الاستراتيجية الشاملة، وكذلك البرامج التنفيذية المتعلّقة باختصاصات ومهمات الهيئة، وإقرارها، ومتابعة تنفيذها. مراجعة الخطط والدراسات والمخططات والبرامج التنفيذية التي تعدها الوزارات والأجهزة الحكومية العاملة في النطاق الجغرافي، بما في ذلك ما يتصل بالخدمات المقدمة فيها ذات الصلة بالمجالات المشار إليها في البند (ثالثاً) من هذه الترتيبات؛ واتخاذ ما يلزم في شأنها. تحديد ما ينقل إلى الهيئة- كلياً أو جزئياً- من اختصاصات ومهمات الوزارات والأجهزة الحكومية ذات الصلة باختصاصات الهيئة ومهماتها، وآلية ذلك، على أن يشمل
    النقل - وفق ما تراه الهيئة- ما خصص لتلك الوزارات والأجهزة الحكومية من أصول وممتلكات واعتمادات مالية وموارد بشرية ونحو ذلك. وضع استراتيجيات ونماذج الأعمال والشراكات مع القطاعين الخاص وغير الربحي، وما يلزم من خطط تمويل في هذا الشأن، ووضع ما يتعلق بها من مقابل مالي، وتعديل القائم منها. مراجعة مخططات تقسيمات الأراضي، وإقرارها. وضع قواعد وضوابط ومعايير تخطيط النطاق الجغرافي بما في ذلك ما يتصل بكود البناء وتصميم المباني والطرق والمنشآت التجارية وغيرها، واستعمالات الأراضي، بما يحقق أرقى مستويات التطوير والتنمية. الإشراف المباشر على تخطيط وتصميم وتنفيذ البرامج والمشروعات القائمة في النطاق الجغرافي - قبل تأسيس الهيئة ومباشرتها اختصاصاتها ومهماتها - وما يتصل بها من أعمال التشغيل والصيانة. وللهيئة صلاحية التوجيه بإيقاف تلك البرامج والمشروعات أو إدخال تعديلات عليها. مراجعة الخطط والبرامج والمشروعات ذات الصلة بعمل الهيئة؛ التي تعدها الوزارات والأجهزة الحكومية الأخرى، وإقرارها؛ بما يضمن تحقيق التنمية المتوازنة في النطاق الجغرافي. ترتيب أولويات تنفيذ الأعمال والخدمات والمشروعات والبرامج في النطاق الجغرافي،
    بما في ذلك ما تنفذه جميع الجهات العاملة فيه، ومتابعتها. تنسيق وتنظيم الجهود بين الوزارات والأجهزة الحكومية الأخرى في النطاق الجغرافي، وفقاً للخطط والبرامج المقرة. التنسيق مع جميع الوزارات والأجهزة الحكومية الأخرى وغيرها؛ بما يكفل تنفيذ المهمات والاختصاصات الموكولة إلى الهيئة وتحقيق أهدافها. تحديد العقارات التي ترى الهيئة نزع ملكياتها لتطوير النطاق الجغرافي، بالتنسيق مع أمانة العاصمة المقدسة والجهات ذات العلاقة، واستكمال الإجراءات النظامية اللازمة في هذا الشأن. الإشراف على تأهيل الأحياء العمرانية القائمة وتحسينها، ومعالجة وضع المناطق العشوائية وتطويرها والارتقاء بها عمرانياً واجتماعياً واقتصادياً وأمنياً وبيئياً. إنشاء قاعدة بيانات ونظم معلومات حضرية، وإدارتها؛ بحيث تكون منصة موحدة ومرجعاً أساساً للمعلومات التي تستند إليها الجهات ذات الصلة بتطوير النطاق الجغرافي. وضع البرامج والآليات والإجراءات اللازمة والسبل المحفزة لمشاركة القطاع غير الحكومي (الخاص وغيره) في تحقيق أهداف التنمية وتنفيذ المشروعات والخدمات في النطاق الجغرافي، والإشراف عليها. تأسيس الشركات أو المساهمة في تأسيسها أو الدخول
    فيها، وذلك وفقاً للإجراءات النظامية. التعاون مع مراكز البحوث والمؤسسات المتخصصة وبيوت الخبرة على المستويين المحلي والدولي؛ بما يسهم في تحقيق الأهداف التي أنشئت من أجلها الهيئة. تمثيل المملكة في الهيئات والمنظمات المحلية والإقليمية والدولية ذات العلاقة، وذلك وفقاً للإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: خامساً
  article_text_ar: تلتزم جميع الوزارات والأجهزة الحكومية الأخرى التي تمارس أعمالاً أو تقدم خدمات في النطاق الجغرافي بتنفيذ ما تصدره الهيئة من قرارات وتعليمات، وفقاً لما تراه محققاً لأهدافها في ضوء الاختصاصات والمهمات الموكولة إليها بموجب هذه الترتيبات، وبخاصة ما يتصل بالمجالات المشار إليها في البند (ثالثاً) من هذه الترتيبات. للهيئة أن تباشر بنفسها الأعمال المشار إليها في الفقرة (1) من هذا البند، وفي هذه الحالة على الوزارات والأجهزة الحكومية الأخرى تنفيذ ما تطلبه الهيئة منها من مهمات ونحو ذلك، ما لم تر الهيئة إسناد تلك الأعمال إلى الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: سادساً
  article_text_ar: للهيئة طلب أي معلومات أو بيانات أو تقارير - من الوزارات والأجهزة الحكومية الأخرى - تتطلبه طبيعة أعمالها وخدماتها ومشروعاتها؛ واتخاذ ما تراه في شأنها في ضوء أهداف الهيئة ورفع ما يلزم حيال ذلك. يكون تزويد الهيئة بالمعلومات والبيانات والتقارير إلكترونياً - ما أمكن - وفقاً لما تقضي به الأنظمة والتعليمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: سابعاً
  article_text_ar: يكون للهيئة مجلس إدارة برئاسة نائب رئيس مجلس الوزراء، ويعين أعضاؤه بأمر من رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: ثامناً
  article_text_ar: 'يُعدّ المجلس السلطة العليا على شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها وتنفيذ اختصاصاتها ومهماتها المشار إليها في البند (رابعاً) من هذه الترتيبات، وله على وجه خاص ما يأتي: إقرار السياسات العامة لتطوير النطاق الجغرافي. إقرار الخطط والدراسات والمخططات الاستراتيجية الشاملة، وكذلك البرامج التنفيذية المتعلقة باختصاصات الهيئة ومهماتها. تحديد الأماكن الواقعة داخل النطاق الجغرافي، وترتيب أولويات تنفيذ الأعمال والخدمات والمشروعات والبرامج فيها المرتبطة بأهداف الهيئة واختصاصاتها ومهماتها والخدمات التي تقدم لضيوف الرحمن من حجاج ومعتمرين. اعتماد ما ينقل إلى الهيئة - كلياً أو جزئياً - من اختصاصات ومهمات الوزارات والأجهزة الحكومية الأخرى ذات الصلة باختصاصات الهيئة ومهماتها، وآلية ذلك، وتحديد ما ينقل مما خصص لتلك الوزارات والأجهزة الحكومية الأخرى من أصول وممتلكات واعتمادات مالية وموارد بشرية ونحو ذلك. إقرار مخططات تقسيمات الأراضي. إقرار قواعد وضوابط ومعايير تخطيط النطاق الجغرافي بما في ذلك كود البناء وتصميم المباني والطرق والمنشآت التجارية وغيرها، واستعمالات
    الأراضي. إقرار الهيكل التنظيمي للهيئة. إقرار اللوائح الإدارية والمالية والفنية للهيئة. الموافقة على إنشاء مكاتب للهيئة. الموافقة على تنظيم ما يتصل بعقارات الدولة الداخلة في نطاق اختصاص الهيئة من بيع أو شراء أو تأجير أو استثمار أو انتفاع أو وقف، وله إقرار ما يراه مناسباً من قواعد أو ضوابط تتصل بذلك. الموافقة على تأسيس الشركات أو المساهمة في تأسيسها أو الدخول فيها، وذلك وفقاً للإجراءات النظامية. إصــدار التـراخيـص والتصــاريح المتعـلقـة بالأعمــال والخـدمات الداخلـة في اختصـاصات الهيئة. إقـرار مقـابل مـالي نظيـر الأعمـال والخـدمات التـي تقـدمهـا الهيـئة مـن تراخيـص وتصـاريح ونحو ذلك. الموافقة على قبول التبرعات والهبات والأوقاف والوصايا والمنح، وفقاً للأحكام المنظمة لذلك. الموافقة على إبرام الاتفاقيات والعقود، بحسب الإجراءات المنظمة لذلك، بما فيها عقود التمويل للمشروعات الداخلة في نطاق اختصاصات الهيئة، وله تقديم المبالغ المتحصلة من المقابل المالي المشار إليه في الفقرة (13) من هذا البند ضماناً لتلك العقود، وفق الإجراءات والآليات التي يتم الاتفاق عليها في هذا الشأن مع وزارة المالية. النظر
    في التقارير الدورية التي يقدمها الرئيس التنفيذي عن سير أعمال الهيئة، واتخاذ ما يراه حيالها. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. الموافقة على مشروع ميزانية الهيئة، والحساب الختامي والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية. تفويض أي من اختصاصات الهيئة إلى من يراه من الجهات الحكومية. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من منسوبي الهيئة أو من غيرهم، يعهد إليها بما يراه من المهمات والصلاحيات، ويُحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ولها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض بعض اختصاصاته إلى الرئيس أو من يراه من أعضائه أو منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: تاسعاً
  article_text_ar: يجتمع المجلس بدعوة من الرئيس أربع مرات في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو إذا طلب ذلك ثلاثة من أعضائه على الأقل، وللرئيس أن ينيب من يراه من أعضاء المجلس لرئاسة الاجتماعات في حال غيابه. يشترط لصحة اجتماع المجلس حضور أغلبية أعضائه على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. للمجلس أن يصدر قراراً بالتمرير، وفي هذه الحالة يشترط موافقة جميع أعضاء المجلس على القرار، ويُعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. لا يجوز للعضو الامتناع عن التصويت أو تفويض غيره بالتصويت عنه عند غيابه، وللعضو الذي يعترض على أي قرار أن يثبت اعتراضه مسبباً في محضر الاجتماع. للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت. يُبلّغ المجلس قراراته إلى الجهات المعنية بالطريقة التي يراها مناسبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: عاشراً
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يُعين ويُعفى من منصبه بقرار من المجلس، ويُحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون الهيئة وتسيير أعمالها، وتتركز مسؤولياته في حدود ما تنص عليه الترتيبات وما يقرره المجلس، ويمارس المهمات والصلاحيات الآتية: اقتراح السياسات العامة لتطوير النطاق الجغرافي. الإشراف على إعداد الخطط والدراسات والمخططات الاستراتيجية الشاملة، وكذلك البرامج التنفيذية المتعلّقة بتطوير النطاق الجغرافي، ومتابعة تنفيذها بعد إقرارها. اقتراح الهيكل التنظيمي للهيئة. اقتراح اللوائح الإدارية والمالية والفنية للهيئة، والإشراف على تنفيذها بعد اعتمادها. إبرام الاتفاقيات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات الممنوحة له. تمثيل الهيئة أمام القضاء ولدى الجهات الحكومية وغيرها من الجهات داخل المملكة وخارجها؛ وله تفويض غيره بذلك. تقديم تقارير دورية إلى المجلس عن سير أعمال الهيئة ومنجزاتها ونشاطاتها؛ تمهيداً لاستكمال ما يلزم في شأنها. الإشراف على إعداد مشروع ميزانية الهيئة، والحساب الختامي والتقرير السنوي؛ تمهيداً لعرضها على المجلس. إصدار الأوامر بمصروفات الهيئة
    ومشترياتها واتخاذ جميع الإجراءات، وفقاً لما تحدده لوائح الهيئة الإدارية والمالية. تعيين العاملين، والإشراف عليهم، وفقاً لما تحدده لوائح الهيئة الإدارية والمالية. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. متابعة تنفيذ القرارات الصادرة عن المجلس أو القرارات ذات الصلة بأعمال الهيئة. مباشرة ما يكلّفه به المجلس من مهمات. وللرئيس التنفيذي أن يفوّض بعض مهماته وصلاحياته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: حادي عشر
  article_text_ar: يخضع منسوبو الهيئة لنظامي العمل والتأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: ثاني عشر
  article_text_ar: تحدد اللوائح الإدارية للهيئة جميع الأحكام المنظمة لشؤونها الإدارية، بما في ذلك الأحكام المنظمة لأوضاع منسوبيها، وما يتصل بتسيير شؤونها. تحدد اللوائح المالية للهيئة جميع الأحكام المنظمة لشؤونها المالية، بما في ذلك الأحكام المتعلقة بآليات تنفيذ منافساتها وتأمين مشترياتها. تحدد اللوائح الفنية للهيئة جميع الأحكام المتصلة بالأمور الفنية ذات الصلة بعمل الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: ثالث عشر
  article_text_ar: يكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة. واستثناءً من ذلك تبدأ السنة المالية الأولى للهيئة من تاريخ الموافقة على الترتيبات وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: رابع عشر
  article_text_ar: 'تتألف موارد الهيئة مما يلي: أ - ما يخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير التراخيص والتصاريح وما تقدمه من أعمال وخدمات. ج - ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. د - عوائد استثمار مواردها المالية المتاحة. هـ - أي مورد آخر يقره المجلس، بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة لدى مؤسسة النقد العربي السعودي. تفتح الهيئة حساباً لها في مؤسسة النقد العربي السعودي، ولها فتح حسابات أخرى في أيّ من البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفق ميزانيتها المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: خامس عشر
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه بعد إقراره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: سادس عشر
  article_text_ar: يُعِد المجلس مشروع تنظيم للهيئة في ضوء ما ورد في الترتيبات وما قد يظهر له في هذا الشأن، ويرفعه لاستكمال الإجراءات النظامية اللازمة في شأنه، وذلك خلال مدة لا تقل عن (اثني عشر) شهراً من تاريخ الموافقة على الترتيبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
- article_ref: سابع عشر
  article_text_ar: يعمل بالترتيبات من تاريخ الموافقة عليها، وتلغي كل ما يتعارض معها من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58b1d864-0d14-4ed7-9c5e-ac4e00b5aff9/1
  verified: false
