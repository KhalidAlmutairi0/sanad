articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمامها ما لم يقتضِ السياق غير ذلك: النظام: نظام حماية المؤشرات الجغرافية. اللائحة: اللائحة التنفيذية للنظام. الهيئة: الهيئة السعودية للملكية الفكرية. المجلس: مجلس إدارة الهيئة. المؤشر الجغرافي: البيان الذي يحدد منتجاً بمنشئه، ويستخدم على المنتجات التي تكون نوعيتها أو شهرتها أو سماتها عائدة بصورة أساسية إلى منشئها الجغرافي. المؤشر الجغرافي الوطني: المؤشر الجغرافي الذي يقع نطاقه داخل إقليم المملكة العربية السعودية. المـنتَج: مُنتج زراعي أو غذائي أو طبيعي، بما في ذلك عناصره الأولية والمواد والمكونات الداخلة فيه، أو مُنتج حرفي أو صناعي ترتبط طريقة تصنيعه بمنطقة معينة. المـنتِج: شخص طبيعي أو اعتباري يقوم -حسب طبيعة المنتَج- بالآتي: تجهيز أو تغليف المنتجات الزراعية أو الغذائية. استغلال المنتجات الطبيعية. المتاجرة بمنتجات الحرف اليدوية أو الصناعية أو التعامل بها أو استغلالها أو تصنيعها. دليل الاستعمال: بيان يرفق بطلب تسجيل المؤشر الجغرافي متضمنًا العناصر اللازم توافرها في المنتَج المراد تسجيله. السجل:
    السجل الذي تسجل فيه المؤشرات الجغرافية وفقًا لأحكام النظام. اللجنة: اللجنة المشكلة بقرار من المجلس للنظر في التظلمات من قرارات تسجيل المؤشرات الجغرافية ورفض تسجيلها وشطبها الصادرة عن الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف النظام إلى توفير الحماية للمؤشرات الجغرافية المبينة في المادة (الثالثة) من النظام، ومنع غير المصرح لهم من استغلال المؤشرات الجغرافية، أو تقليدها بطريقة تؤدي إلى تضليل المستهلكين حول المصدر الحقيقي لهذه المنتجات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يتمتع بالحماية المقررة بموجب النظام ما يأتي: المؤشرات الجغرافية الوطنية المسجلة في السجل. المؤشرات الجغرافية الأجنبية المحمية في بلد منشئها المسجلة في سجل المؤشرات الجغرافية لذلك البلد. المؤشرات الجغرافية الأجنبية المحمية بموجب الاتفاقيات الدولية التي تكون المملكة طرفًا فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تُعِد الهيئة سجلًا للمؤشرات الجغرافية تسجل فيه المؤشرات الجغرافية وعناصرها وطلبات تسجيلها، والتصرفات التي ترد عليها، والبيانات اللازمة، بموجب النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يدخل في تحديد المؤشر الجغرافي الـعوامل الطبيعية والبشرية أو أي منهما، ويشترط فيه ما يأتي: ألا يتعارض مع النظام العام والآداب العامة. ألا يتعارض تسجيله مع التزامات المملكة بموجب الأنظمة والاتفاقيات الدولية التي تكون المملكة طرفاً فيها. ألا يكون من المؤشرات الجغرافية ذات الأسماء المتماثلة، إلا إذا اقترنت بما يمكن المستهلكين من التمييز بينها. مع مراعاة ضمان المعاملة العادلة للمُنتَجات التي تستخدم عليها تلك المؤشرات، وعدم تضليل مستهلكي هذه المنتجات، وذلك وفقًا للقواعـد التي تحـددها اللائحة. ألا يكون متشابهًا إلى درجة تدعو إلى التباسه مع علامة تجارية تم تسجيلها بحسن نية قبل تطبيق أحكام النظام. ألا يكون متطابقًا مع اسم صنف نباتي أو سلالة حيوانية بما يؤدي إلى تضليل المستهلكين. أي شروط أخرى تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يقدم طلب تسجيل المؤشر الجغرافي إلى الهيئة بالنموذج المعد لذلك، متضمنًا ما يأتي: ما يُبيّن أن المـنتَج يرتبط بمنطقة جغرافية معينة، وأن نوعيته أو شهرته أو سماته الأخرى تعود بصورة أساسية إلى تلك المنطقة. إذا كان طلب التسجيل لمؤشر جغرافي أجنبي، فيقدم ما يثبت حمايته واستعماله في بلد المنشأ، وما يثبت أن مقدم الطلب يملك حق استعماله أو أنه جهة مختصة بالإشراف عليه. دليل الاستعمال، وفق العناصر والبيانات الواردة في المادة (الثامنة) من النظام. أي بيانات أخرى تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجوز للهيئة أن تطلب من مقدم طلب تسجيل مؤشر جغرافي أجنبي تقديمَ شهادة مصادقة من الجهات المختصة في بلاده على صحة ما تضمنه طلب التسجيل، وذلك خلال مدة تحددها الهيئة، فإذا لم تُقدم تلك الشهادة خلال هذه المدة جاز للهيئة رفض الطلب. تخضع طلبات التسجيل الدولية المودعة لدى الهيئة بموجب الاتفاقيات الدولية، التي تكون المملكة طرفًا فيها، للإجراءات والأحكام الخاصة بهذه الاتفاقيات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يجب أن يتضمن دليل الاستعمال العناصر والبيانات الآتية: اسم المـنتَج. وصف المـنتَج، مع بيان خصائصه ونوعيته والعناصر الداخلة في تركيبته، والمنطقة الجغرافية لإنتاجه. وصف طريقة الإنتاج. أي عناصر أو بيانات أخرى تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تفحص الهيئة طلب تسجيل المؤشر الجغرافي؛ للتحقق من استيفائه الشروط المحددة بموجب النظام واللائحة، وتصدر قرارها بقبول الطلب أو رفضه، وفي حال الرفض فعلى الهيئة إبلاغ مقدم الطلب بقرار الرفض مسبباً، وتحدد اللائحة إجراءات تقديم الطلب وفحصه وتسجيل المؤشر الجغرافي ونشره والمدد اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجوز للهيئة أن تصدر قرارًا بتسجيل المؤشر الجغرافي الوطني الذي لم يطلب فيه المـنتِج تسجيله، وفق ما تحدده اللائحة ووفقاً للشروط الواردة في المادة (الخامسة) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تشكل بقرار من المجلس لجنة تتولى النظر في التظلمات من قرارات تسجيل المؤشرات الجغرافية ورفض تسجيلها وشطبها، الصادرة من الهيئة، لا يقل عدد أعضائها عن (ثلاثة)، يكون منهم مستشار نظامي، وتصدر قرارات اللجنة بالأغلبية، وتكون مسببة. وتصدر قواعد عمل اللجنة ومكافآت أعضائها بقرار من المجلس. يجوز لصاحب الطلب إذا رفضت الهيئة طلبه التظلم من قرار الرفض أمام اللجنة خلال (ستين) يومًا من تاريخ إبلاغه به. وعلى اللجنة أن تبت في التظلم خلال (ستين) يوماً من تاريخ تقديمه. وإذا لم تبت اللجنة في التظلم أو صدر قرارها برفضه فلصاحب الطلب الاعتراض أمام المحكمة المختصة خلال (ستين) يومًا من تاريخ مضي المدة أو إبلاغه بقرار رفض التظلم بحسب الأحوال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا يترتب على تسجيل المؤشر الجغرافي أي حق استئثاري لمقدم طلب التسجيل، ويجوز لجميع المنتجين الذين يباشرون نشاطهم في المنطقة الجغرافية المحددة في دليل الاستعمال؛ استعماله على المنتج الذي يستوفي جميع عناصر وبيانات دليل الاستعمال. يجوز طلب تعديل عناصر أو بيانات دليل الاستعمال، وذلك وفقًا للإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تكون مدة تسجيل المؤشر الجغرافي (عشر) سنوات من تاريخ نشر الموافقة على التسجيل، ويجوز تجديدها وفقًا للإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'للمحكمة المختصة -بناءً على طلب يقدم إليها من ذي مصلحة- أن تحكم بشطب المؤشر الجغرافي من السجل في الحالات الآتية: أ- ارتكاب مخالفة للمادة (الخامسة) من النظام. ب- زوال أو تغير الظروف التي أسست للمؤشر الجغرافي. ج- إذا ثبت أن التسجيل كان بناءً على غش أو معلومات غير صحيحة. وتشطب الهيئة التسجيل بعد اكتساب الحكم الصادر بشأنه الصفة النهائية. تصدر الهيئة قرارًا بشطب المؤشر الجغرافي الأجنبي من السجل إذا سقطت الحماية عنه في بلد المنشأ، ويجوز التظلم من هذا القرار أمام اللجنة خلال (ثلاثين) يوماً من تاريخ الإبلاغ به. وإذا لم تبت اللجنة في التظلم خلال (ستين) يوماً من تاريخ ورود التظلم، أو صدر قرار اللجنة برفض التظلم، فيكون للمتظلم الاعتراض أمام المحكمة المختصة خلال (ستين) يومًا من تاريخ مضي المدة أو إبلاغه بقرار رفض التظلم بحسب الأحوال. يشهر شطب تسجيل المؤشر الجغرافي بعد اكتساب حكم المحكمة الصفة النهائية، أو بعد مضي (ثلاثين) يوماً من تاريخ الإبلاغ بقرار الهيئة المنصوص عليه في الفقرة (2) من هذه المادة، دون اعتراض عليه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تصدر الهيئة قائمة تتضمن المؤشرات الجغرافية المحمية بموجب أحكام النظام واللائحة أو بموجب اتفاقيات دولية تكون المملكة طرفاً فيها، ويتاح الاطلاع عليها دون مقابل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يتولى مفتشون -يصدر بتسميتهم قرار من المجلس- ضبط مخالفات أحكام النظام واللائحة. وتكون لهم صفة الضبط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على المسؤولين والعاملين في الأماكن المراد تفتيشها تمكين المفتشين من أداء عملهم، وتقديم جميع التسهيلات والمعلومات والوثائق التي يطلبونها. وللهيئة -عند الحاجة- طلب الاستعانة بالجهات المختصة؛ لتنفيذ أي قرار يصدر في حق المخالف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تتولى النيابة العامة التحقيق والادعاء في الدعوى الجزائية لمخالفات أحكام النظام واللائحة أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تتولى المحكمة المختصة النظر في المخالفات والمنازعات ودعاوى المطالبة بالتعويض الناشئة عن تطبيق أحكام النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'يجوز لكل ذي مصلحة أن يقدم طلبًا إلى المحكمة المختصة بإصدار أمر باتخاذ إجراء، أو أكثر، من الإجراءات التحفظية المناسبة، بما في ذلك الآتي: إجراء وصف تفصيلي للمخالفة المدعى بها، والمنتجات محل هذه المخالفة، والمواد والأدوات والمعدات التي استخدمت أو ستستخدم في أي من ذلك، والمحافظة على الأدلة ذات الصلة بالموضوع. توقيع الحجز التحفظي على الأشياء المشار إليها في الفقرة (1) من هذه المادة، والعوائد الناتجة عن المخالفة المدعى بها. منع المنتجات التي تنطوي على المخالفة المدعى بها من الدخول إلى الأسواق، ومنع تصديرها. ويشمل ذلك المنتجات المستوردة فور الإفراج الجمركي عنها. وقف المخالفة أو منع وقوعها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها في نظام آخر، يعاقب بالسجن مدة لا تقل عن (شهر) ولا تزيد على (ثلاث) سنوات، وبغرامة لا تقل عن (خمسة) آلاف ريال ولا تزيد على (مليون) ريال، أو بإحدى هاتين العقوبتين، كل من ارتكب عمدًا أيًّا من الأفعال الآتية: الاستعمال التجاري غير المشروع للمؤشر الجغرافي، أو تقليده، أو الشروع في أي منهما بأي طريقة كانت مثل تسمية أو عرض أي مُنتَج شبيه لا تتوافر فيه جميع عناصر وبيانات دليل الاستعمال الخاص بهذا المؤشر ولو أشير إلى مصدر المنتج الحقيقي أو ذكر المؤشر مترجمًا أو مقرونًا بعبارات مثل نوع أو صنف أو طريقة أو تقليد أو خليط أو ما شابه ذلك. التقليد، أو الشروع فيه، لما اشتُهر به مُنتَج يُستخدم عليه مؤشر جغرافي من ناحية شكله أو تغليفه أو دعايته أو أي وسيلة أخرى، مما قد يمكن معه حدوث لبس لدى الشخص العادي بين المنتَج الأصلي والمقلَّد. أي استخدام لمؤشر جغرافي يشكل عملًا من أعمال المنافسة غير المشروعة وفقًا لما تحدده أنظمة المملكة والاتفاقيات الدولية التي تكون المملكة طرفًا فيها. ويجوز تضمين الحكم الصادر بالعقوبة النص على نشر منطوقه -بعد اكتسابه الصفة النهائية-
    في صحيفة محلية تصدر في محل إقامة المخالف أو في أي وسيلة إعلامية. وفي حال العود تضاعف العقوبة الصادرة مع إغلاق المحل التجاري أو المشروع أو إيقاف النشاط -بحسب الأحوال- مدة لا تقل عن (خمسة عشر) يومًا ولا تزيد على (ستة) أشهر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يعد عائدًا كل من عاد إلى ارتكاب المخالفة خلال (ثلاث) سنوات من تاريخ اكتساب الحكم الصادر الصفة النهائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: للمحكمة المختصة، عند ثبوت ارتكاب أي من الأفعال الواردة في المادة (الحادية والعشرين) من النظام، أن تحكم بمصادرة الأدوات والآلات التي استخدمت في ارتكاب المخالفة، وإتلاف المنتجات على نفقة المحكوم عليه أو التصرف بها عبر قنوات غير تجارية بعد إزالة المخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: للهيئة الاستعانة بأي جهة حكومية أخرى -بعد الاتفاق معها- أو بالقطاع الخاص للقيام بأي مهمة مسندة إليها بموجب النظام واللائحة، وذلك دون إخلال باختصاصات ومسؤوليات أي من تلك الجهات الحكومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تحدد اللائحة المقابل المالي عن الخدمات التي تقدمها الهيئة بموجب أحكام النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يصدر المجلس اللائحة خلال (مائة وثمانين) يومًا من تاريخ نشر النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يعمل بالنظام بعد مضي (مائة وثمانين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b6c66cda-7f2c-408d-94b7-b3d300dbffe8/1
  verified: false
