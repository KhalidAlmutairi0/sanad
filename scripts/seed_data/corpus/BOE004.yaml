regulation:
  code: BOE004
  name_ar: نظام المناطق
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يهدف هذا النظام إلى رفع مستوى العمل الإداري والتنمية في مناطق المملكة، كما يهدف إلى المحافظة على الأمن والنظام، وكفالة حقوق المواطنين وحرياتهم، في إطار الشريعة الإسلامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنظم مناطق المملكة ومقر إمارة كل منطقة بأمر ملكي، بناء على توصية من وزير الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتكون كل منطقة إداريا من عدد من المحافظات، والنواحي، والمراكز، ويراعى في ذلك الاعتبارات السكانية، والجغرافية، والأمنية، وظروف البيئة، وطرق المواصلات، ويتم تنظيم المحافظة بأمر ملكي، بناء على توصية من وزير الداخلية. أما النواحي والمراكز فيصدر بإنشائها وارتباطها قرار من وزير الداخلية، بناء على اقتراح من أمير المنطقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون لكل منطقة أمير بمرتبة وزير، كما يكون له نائب بالمرتبة الممتازة يساعده في أعماله، ويقوم مقامه عند غيابه، ويتم تعيين الأمير ونائبه وإعفاؤهما بأمر ملكي، بناء على توصية من وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون أمير المنطقة مسئولا أمام وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يؤدي الأمير ونائبه قبل مباشرة العمل القسم التالي أمام الملك:(أقسم بالله العظيم أن أكون مخلصا لديني، ثم لمليكي، وبلادي، وأن لا أبوح بسر من أسرار الدولة، وأن أحافظ على مصالحها وأنظمتها، وأن أؤدي أعمالي بالصدق والأمانة والإخلاص والعدل).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يتولى أمير كل منطقة إدارتها، وفقا للسياسة العامة للدولة، ووفقا لأحكام هذا النظام، وغيره من الأنظمة واللوائح، وعليه بصفة خاصة: أ - المحافظة على الأمن و النظام والاستقرار، واتخاذ الإجراءات اللازمة لذلك، وفقا للأنظمة واللوائح. ب - تنفيذ الأحكام القضائية بعد اكتسابها صفتها النهائية. ج - كفالة حقوق الأفراد وحرياتهم، وعدم اتخاذ أي إجراء يمس تلك الحقوق والحريات، إلا في الحدود المقررة شرعا ونظاما د - العمل على تطوير المنطقة اجتماعيا واقتصاديا وعمرانيا. هـ - العمل على تنمية الخدمات العامة في المنطقة، ورفع كفايتها. و - إدارة المحافظات، والنواحي، والمراكز، ومراقبة أعمال محافظي المحافظات، ومديري النواحي، ورؤساء المراكز، والتأكد من كفايتهم في القيام بواجباتهم . ز- المحافظة على أموال الدولة واملاكها، ومنع التعدي عليها. حـ - الاشراف على أجهزة الحكومة وموظفيها في المنطقة، للتأكد من حسن ادائهم لواجباتهم بكل أمانة واخلاص، وذلك مع مراعاة ارتباط موظفي الوزارات والمصالح المختلفة في المنطقة بمراجعهم. ط - الاتصال مباشرة بالوزراء ورؤساء المصالح، وبحث أمور المنطقة معهم، بهدف رفع كفاية أداء الأجهزة
    المرتبطة بهم، مع إحاطة وزير الداخلية بذلك. ي - تقديم تقارير سنوية لوزير الداخلية عن كفاية أداء الخدمات العامة في المنطقة، وغير ذلك من شئون المنطقة، وفقا لما تحدده اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعقد اجتماع سنوي برئاسة وزير الداخلية لأمراء المناطق لبحث الأمور المتعلقة بالمناطق، ويرفع وزير الداخلية تقريرا بذلك لرئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعقد اجتماع برئاسة أمير المنطقة مرتين في السنة على الأقل، لمحافظي المحافظات، ومديري النواحي، لبحث شئون المنطقة. ويرفع الأمير تقريرا بذلك لوزير الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: أ - يعين لكل منطقة وكيل أو أكثر، بمرتبة لا تقل عن المرتبة الرابعة عشرة، بقرار من مجلس الوزراء، بناء على توصية من وزير الداخلية. ب- يكون لكل محافظة محافظ لاتقل مرتبته عن الرابعة عشرة، يعين بأمر من رئيس مجلس الوزراء، بناء على توصية من وزير الداخلية، ويكون لها وكيل لاتقل مرتبته عن الثانية عشرة، يعين بقرار من وزير الداخلية، بناء على توصية من أمير المنطقة. جـ - يكون لكل ناحية مدير لا تقل مرتبته عن الثامنة، يعين بقرار من وزير الداخلية، بناء على توصية من أمير المنطقة. د - يكون لكل مركز رئيس لاتقل مرتبته عن الخامسة، يعين بقرار من أمير المنطقة، بناء على توصية من محافظ المحافظة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: على أمراء المناطق، ومحافظي المحافظات، ومديري النواحي، ورؤساء المراكز، الإقامة حيث مقر عملهم، وعدم مغادرة نطاق عملهم، إلا بإذن من الرئيس المباشر .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يباشر محافظو المحافظات، ومديرو النواحي، ورؤساء المراكز، مهامهم في النطاق الإداري لجهاتهم، وفي حدود الصلاحيات الممنوحة لهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: على محافظي المحافظات، إدارة محافظاتهم في نطاق الاختصاصات المنصوص عليها في المادة السابعة، باستثناء ما ورد في الفقرات "و" ، "ط" ، "ي" من تلك المادة، وعليهم مراقبة أعمال مديري النواحي، ورؤساء المراكز، التابعين لهم، والتأكد من كفايتهم بالقيام بواجباتهم، وتقديم تقارير دورية لأمير المنطقة عن كفاية أداء الخدمات العامة، وغير ذلك من شئون المحافظة، وفقا لما تحدده اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: على كل وزارة أو مصلحة حكومية لها خدمات في المنطقة، أن تعين رئيسا لأجهزتها في المنطقة، لا تقل مرتبته عن الثانية عشرة، يرتبط بالجهاز المركزي مباشرة، وعليه التنسيق مع أمير المنطقة في مجال عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشأ في كل منطقة مجلس يسمى مجلس المنطقة، يكون مقره مقر إمارة المنطقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يتكون مجلس المنطقة من: أ - أمير المنطقة رئيسا للمجلس. ب - نائب أمير المنطقة نائبا لرئيس المجلس. جـ - وكيل الامارة ومحافظي المحافظات. د - رؤساء الأجهزة الحكومية في المنطقة التي يصدر بتحديدها قرار من رئيس مجلس الوزراء، بناء على توصية من وزير الداخلية. هـ - عدد من الأهالي لايقل عن عشرة أشخاص، من أهل العلم والخبرة والاختصاص، يتم تعيينهم بأمر من رئيس مجلس الوزراء، بناء على ترشيح أمير المنطقة، وموافقة وزير الداخلية، وتكون مدة عضويتهم أربع سنوات قابلة للتجديد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'يشترط في عضو المجلس ما يلي: أ - أن يكون سعودي الجنسية بالأصل والمنشأ.ب - أن يكون من المشهود لهم بالصلاح والكفاية.ج - أن لا يقل عمره عن ثلاثين سنة.د - أن تكون إقامته في المنطقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: للعضو أن يقدم اقتراحات إلى رئيس مجلس المنطقة كتابة، وذلك في الأمور الداخلة في اختصاص المجلس، ويدرج الرئيس كل اقتراح في جدول أعمال المجلس لعرضه ودراسته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: لا يجوز لعضو مجلس المنطقة أن يحضر مداولات المجلس أو لجانه إذا كان الموضوع يتعلق بمصلحة شخصية له، أو مصلحة من لا تقبل شهادته له، أو كان وصيا، أو قيما، أو وكيلا لمن له مصلحة فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: إذا رغب العضو المعين في الاستقالة قدم طلبا بذلك إلى وزير الداخلية عن طريق أمير المنطقة، ولا تعتبر الاستقالة نافذة إلا بعد موافقة رئيس مجلس الوزراء ، بناء على اقتراح وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: في غير الأحوال المنصوص عليها في هذا النظام، لا يجوز عزل العضو المعين خلال مدة عضويته إلا بأمر من رئيس مجلس الوزراء، بناء على اقتراح وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: في حالة خلو مكان أي عضو معين لأي سبب من الأسباب، يعين بدله خلال مدة ثلاثة أشهر من تاريخ الخلو، وتكون مدة العضو الجديد هي المدة الباقية من مدة سلفه. وذلك وفقا لما ورد في الفقرة (هـ) من المادة السادسة عشرة من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'يختص مجلس المنطقة بدراسة كل ما من شأنه رفع مستوى الخدمات في المنطقة، وله على وجه الخصوص ما يلي: أ - تحديد احتياجات المنطقة، واقتراح إدراجها في خطة التنمية للدولة.ب - تحديد المشاريع النافعة حسب أولويتها، واقتراح اعتمادها في ميزانية الدولة السنوية.ج - دراسة المخططات التنظيمية لمدن وقرى المنطقة، ومتابعة تنفيذها بعد اعتمادها.د - متابعة تنفيذ ما يخص المنطقة من خطة التنمية، والموازنة، والتنسيق في ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يقوم مجلس المنطقة باقتراح أى عمل من أعمال النفع العام لمواطني المنطقة، وتشجيع إسهام المواطنين في ذلك، ورفعه إلى وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يحظر على مجلس المنطقة النظر في أي موضوع يخرج عن الاختصاصات المقررة له حسب هذا النظام، وتكون قراراته باطلة إذا تجاوز ذلك، ويصدر وزير الداخلية قرارا بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يعقد مجلس المنطقة دورة عادية كل ثلاثة أشهر بدعوة من رئيسه، وللرئيس أن يدعو المجلس لاجتماع غير عادي، إذا رأى حاجة لذلك.وتشمل الدورة الجلسة، أو الجلسات التي تعقد بناء على دعوة واحدة، ولا يجوز فض الدورة إلا بعد النظر في جميع المسائل الواردة في جدول الأعمال ومناقشتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يعتبر حضور اجتماعات مجلس المنطقة واجبا وظيفيا بالنسبة للأعضاء المنصوص عليهم في الفقرتين (ج، د) من المادة السادسة عشرة من هذا النظام، ويتعين عليهم الحضور بأنفسهم، أو من يقوم مقامهم، في حالة غيابهم عن عملهم.وبالنسبة للأعضاء المنصوص عليهم في الفقرة (هـ) من المادة المذكورة، يعتبر تخلف العضو عن حضور دورتي انعقاد متتاليين بدون عذر مقبول، موجبا للإقالة من المجلس، وفي هذه الحالة لا يجوز تعيين هذا العضو لعضوية المجلس مرة أخرى إلا بعد مضي سنتين من تاريخ صدور قرار إقالته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: لا تكون اجتماعات مجلس المنطقة نظامية إلا إذا حضرها ثلثا عدد أعضائه على الأقل، وتصدر قراراته بالأغلبية المطلقة لأصوات أعضاء المجلس، فإذا تساوت الأصوات يرجح الجانب الذي صوت معه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: لمجلس المنطقة أن يكون عند الحاجة لجانا خاصة لدراسة أي أمر يدخل في اختصاصه وله أن يستعين بمن يراه من ذوي الخبرة والاختصاص. وله أن يستدعي من يشاء لحضور اجتماعات المجلس، والاشتراك في المناقشة، دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: لوزير الداخلية أن يدعو المجلس للاجتماع برئاسته في أي مكان يراه، كما أن له رئاسة أي اجتماع يحضره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: لا يجوز انعقاد مجلس المنطقة إلا بدعوة من رئيسه أو نائبه، أو بأمر من وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: على رئيس المجلس رفع نسخة من القرارات إلى وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: على رئيس مجلس المنطقة إبلاغ الوزارات والمصالح الحكومية بما يخصها من قرارات المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: على الوزارات والمصالح الحكومية أن تراعي قرارات مجلس المنطقة بالنسبة لما ورد في الفقرتين (أ، ب) من المادة الثالثة والعشرين من هذا النظام. وإذا رأت الوزارة أو المصلحة الحكومية عدم الأخذ بقرار مجلس المنطقة فيما ذكر، فعليها أن توضح أسباب ذلك لمجلس المنطقة ، وإذا لم يقتنع مجلس المنطقة بملاءمة الأسباب التي أوضحتها الوزارة أو المصلحة، فيرفع عن ذلك إلى وزير الداخلية للعرض عنه لرئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: تحيط كل وزارة ومصلحة لها خدمات في المنطقة مجلس المنطقة بما تقرر للمنطقة من مشاريع في الميزانية فور صدورها، كما تحيطه بما تقرر للمنطقة في خطة التنمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: لكل وزير و رئيس مصلحة أن يستطلع رأي مجلس المنطقة، حول أي موضوع يتعلق باختصاصه في المنطقة، وعلى المجلس إبداء رأيه في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يحدد مجلس الوزراء بناء على اقتراح وزير الداخلية مكافآت لرئيس مجلس المنطقة وأعضائه، ويراعى في تقديرها تكاليف المواصلات والإقامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: لا يحل مجلس المنطقة إلا بأمر من رئيس مجلس الوزراء، بناء على اقتراح وزير الداخلية على أن يتم تعيين أعضائه مجددا خلال ثلاثة أشهر من تاريخ الحل، وفي أثناء فترة الحل يمارس الأعضاء المنصوص عليهم في الفقرتين (ج، د) من المادة السادسة عشرة من هذا النظام برئاسة أمير المنطقة، اختصاصات المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يكون لمجلس المنطقة أمانة في إمارة المنطقة تتولى إعداد جدول أعماله، وتوجيه الدعوات في مواعيدها، وتسجيل المناقشات التي تجري في أثناء الجلسات، وفرز الأصوات، وإعداد محاضر الجلسات، وتحرير القرارات، والقيام بالأعمال اللازمة لضبط جلسات المجلس، وتدوين قراراته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يصدر وزير الداخلية اللوائح اللازمة لتنفيذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: '- أضيفت هذه المادة برقم ( الحادية والأربعون) وذلك بموجب الأمر الملكي رقم ( أ/21) وتاريخ 1414/3/30هـ، وتنص على الاتي: "لايجوز تعديل هذا النظام الا بالطريقة التي تم بها اصداره".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93f81644-fbbc-49ca-b33c-a9a700f16701/1
  verified: false
