  name_ar: نظام الضمان الصحي التعاوني
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يهدف هذا النِظام إلى توفير الرعاية الصحية وتنظيمِها لجميع المُقيمين غير السعوديين في المملكة، ويجوز تطبيقُه على المواطنين وغيرِهم بقرار مِن مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تشمل التغطية بالضمان الصحي التعاوني جميع من ينطبق عليهم هذا النِظام وأفراد أُسرِهم وِفقاً لما جاء في الفقرة (ب) مِن المادة الخامسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: مع مُراعاة مراحِل التطبيق المُشار إليها في الفقرة (ب) من المادة الخامسة، وما تقضي بِه المادتان الثانية عشرة والثالثة عشرة مِن هذا النِظام، يلتزم كُل من يكفل مُقيماً بأن يشترِك لصالِحه في الضمان الصحي التعاوني. ولا يجوز منح رُخصة الإقامة، أو تجديدِها إلا بعد الحصول على وثيقة الضمان الصحي التعاوني، على أن تُغطي مُدتِها مُدة الإقامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يُنشأ مجلِس للضمان الصحي برئاسة وزير الصحة ، وعضوية:أ - مُّمثِل على مستوى وكيل وزارة عن: وزارة الداخلية، وزارة الصحة ، وزارة العمل والشؤون الاجتِماعية، وزارة المالية والاقتِصاد الوطني و وزارة التجارة ، تُرشِِحُهم جهاتِهم.ب - مُّمثِل عن مجلِس الغُرف التِجارية الصِناعية السعودية يُرشِحُه وزير التِجارة، ومُّمثِل عن شركات التأمين التعاوني يُرشِحُه وزير المالية والاقتصاد الوطني بالتشاور مع وزير التِجارة.ج - مُّمثِل عن القِطاع الصحي الخاص، ومُّمثِلين اثنين عن القِطاعات الصحية الحُكومية الأُخرى يُرشِحُهم وزير الصحة بالتنسيق مع قِطاعاتِهم. ويتم تعيين أعضاء المجلِس وتجديد عضويتهُم بقرار مِن مجلس الوزراء لمُدة ثلاث سنوات قابِلة للتجديد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى مجلِس الضمان الصحي الإشراف على تطبيق هذا النِظام، ولهُ على وجه الخصوص ما يأتي: أ - إعداد مشروع اللائحة التنفيذية لهذا النِظام.ب - إصدار القرارات اللازِمة لتنظيم الأمور المُتغيرة بشأن تطبيق أحكام هذا النِظام بما في ذلك تحديد مراحِل تطبيقه، وتحديد أفراد أُسرة المُستفيد المشمولين بالضمان وكيفية ونِسبة مُساهمة كُلٍ مِن المُستفيد وصاحِب العمل في قيمة الاشتِراك في الضمان الصحي التعاوني، وكذلك تحديد الحد الأعلى لتلك القيمة بناءً على دِراسة مُتخصِّصة تشتمل على حِسابات التأمين.ج - تأهيل شركات التأمين التعاوني للعمل في مجال الضمان الصحي التعاوني.د - اعتِماد المرافِق الصحية التي تُقدِّم خدمات الضمان الصحي التعاوني.هـ - تحديد المُقابِل المالي لتأهيل شركات التأمين التعاوني للعمل في هذا المجال، والمُقابِل المالي لاعتِماد المرافِق الصحية التي تُقدِّم خدمات الضمان الصحي التعاوني وذلك بعد أخذ رأي وزارة المالية والاقتِصاد الوطني.و - إصدار اللائحة المالية لإيرادات مجلِس الضمان الصحي ومصروفاتِه، بما في ذلك أجور العاملين فيه ومُكافآتِهم، بعد أخذ رأي وزارة المالية والاقتِصاد الوطني.ز
    - إصدار اللائحة الداخلية لتنظيم سير أعمال المجلِس.ح - تعيين أمين عام للمجلِس بناءً على ترشيح من وزير الصحة ، وتشكيل أمانة عامة، وتحديد مهماتِها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تُغطى المصروفات اللازِمة لأداء مجلِس الضمان الصحي لأعمالِه وأجور العاملين فيه ومُكافآتِهم مِن الإيرادات التي يتم تحصيلُها بموجب الفقرة (هـ) من المادة الخامسة، وِفق ما يتم الاتِفاق عليه بين وزارة الصحة ووزارة المالية ولاقتِصاد الوطني .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تُغطي وثيقة الضمان الصحي التعاوني الخدمات الصحية الأساسية الآتية : أ - الكشف الطبي والعلاج في العيادات، والأدوية. ب - الإجراءات الوقائية مِثل: التطعيمات، ورعاية الأمومة والطفولة. ج - الفحوصات المِخبرية والشُعاعية التي تتطلبُها الحالة. د - الإقامة والعلاج في المُستشفيات بما في ذلك الوِلادة والعمليات. هـ - مُعالجة أمراض الأسنان واللِّثة، ما عدا التقويم والأطقُم الصِناعية. ولا تخِل هذه الخدمات بما تقضي بِه أحكام نِظام التأمينات الاجتِماعية، وما تُقدِّمه الشركات والمؤسسات الخاصة والأفراد لجميع منسوبيها مِن خدمات صحية أشمل مِّما نص عليه هذا النِظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجوز لصاحِب العمل توسيع مجال خدمات الضمان الصحي التعاوني ،بموجب ملاحِق إضافية، وبتكلِفة إضافية لتشمل خدمات تشخيصية وعلاجية أُخرى أكثر مِّما نُص عليه في المادة السابِقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يتم ترتيب ما يتعلق بالإجراءات الوقائية الصحية التي يخضع لها المشمولون بالضمان بما في ذلك الفحوصات واللُّقاحات في المُدة التي تسبِق إصدار وثيقة الضمان الصحي التعاوني بقرار مِن وزير الصحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يتحمل صاحِب العمل تكاليف عِلاج المُستفيد مِن الضمان في الفترة التي تنقضي بين تاريخ استِحقاق العِلاج وتاريخ الاشتِراك في الضمان الصحي التعاوني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: أ - يجوز عند الحاجة تقديم الخدمات الصحية المشمولة في وثيقة الضمان الصحي التعاوني لحامِلها مِن قِبل المرافِق الصحية الحُكومية، وذلك بمُقابِل مالي تتحملُه جهة الضمان الصحي، ويُحدِّد مجلِس الضمان الصحي المرافِق التي تُقدِّم هذه الخِدمة، والمُقابِل المالي لها. ب - يُحدِّد وزير الصحة بعد الاتِفاق مع وزير المالية والاقتصاد الوطني إجراءات وضوابِط كيفية تحصيل المُقابِل المالي المنصوص عليه في الفقرة السابِقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يكون علاج العاملين في الجِهات الحُكومية المشمولين بهذا النِظام وأفراد أُسرِهم في المرافِق الصحية الحُكومية متى كانوا مُتعاقدين مُباشرة مع هذه الجِهات وتحت كفالتِها، وكانت عقودُهم تنُص على حقِهم في العلاج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجوز بقرار مِن مجلِس الضمان الصحي إعفاء المؤسسات والشركات التي تملك مؤسسات طبية خاصة مؤهلة من الاشتِراك في الضمان الصحي التعاوني عن الخدمات التي تُقدِّمُها لمنسوبيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'أ - إذا لم يشترِك صاحِب العمل أو لم يقُم بدفع أقساط الضمان الصحي التعاوني عن العامِل لديه مِّمن ينطبق عليه هذا النِظام وأفراد أُسرتِه المشمولين معه بوثيقة الضمان الصحي التعاوني، أُلزِم بدفع جميع الأقساط الواجِبة السداد، إضافة إلى دفع غرامة مالية لا تزيد على قيمة الاشتِراك السنوي عن كُل فرد. مع جواز حِرمانِه مِن استِقدام العُمال لفترة دائمة أو مؤقتة.وتُحدِّد اللائحة التنفيذية الجهة التي تدفع إليها الأقساط الواجِبة السداد في هذه الحالة.ب - إذا أخلت أي مِن شركات التأمين التعاوني بأي مِن التِزاماتِها المُحدَّدة في وثيقة الضمان الصحي التعاوني ، أُلزِمت بالوفاء بهذه الالتِزامات وبالتعويض عمَّا نشاء عن الإخلال بِها مِن أضرار، إضافة إلى دفع غرامة لا تزيد على خمسة ألاف ريال عن كُل فرد مشمول بالوثيقة محل المُخالفة.ج - تُشكل بقرار مِن رئيس مجلِس الضمان الصحي لجنة أو أكثر، يشترِك فيها مُّمثِل مِن : 1 - وزارة الداخلية .2 - وزارة العمل والشؤون الاجتِماعية .3 - وزارة العدل .4 - وزارة المالية والاقتِصاد الوطني .5 - وزارة الصحة .6 - وزارة التجارة . وتختص هذه اللجنة بالنظر في مُخالفات
    أحكام هذا النِظام واقتِراح الجزاء المُناسِب، ويوقع الجزاء بقرار مِن رئيس مجلِس الضمان الصحي، وتُحدِّد اللائحة التنفيذية كيفية عمل هذه اللجنة.ويجوز التظلُّم مِن هذا القرار أمام ديوان المظالم خِلال ستين يوماً مِن إبلاغِه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يحل المُقيم غير المشمول بكفالة عمل محل صاحِب العمل في الالتِزامات المُترتِبة على هذا الأخير بموجب هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تتولى وزارة الصحة مُراقبة ضمان جودة ما يُقدم مِن خدمات صحية للمُستفيدين مِن الضمان الصحي التعاوني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يتم تطبيق الضمان الصحي التعاوني عن طريق شركات تأمين تعاونية سعودية مؤهلة، تعمل بأسلوب التأمين التعاوني على غِرار ما تقوم بِه الشركة الوطنية للتأمين التعاوني ، ووِفقاً لما ورد في قرار هيئة كِبار العُلماء رقم (51) وتاريخ 4 / 4 / 1397 هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يُصدِر وزير الصحة اللائحة التنفيذية لهذا النِظام في مُدة أقصاها سنة من تاريخ صُدورِه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يُنشر هذا النِظام في الجريدة الرسمية ، ويبدأ تنفيذُه بعد تسعين يوماً مِن صدور اللائحة التنفيذية ، أمَّا الأحكام المُتعلِقة بإنشاء مجلِس الضمان الصحي واختِصاصاتِه فتُعد نافِذة من تاريخ نشرِّه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87c1482d-fa95-41ea-98b6-a9a700f2a529/1
  verified: false
