articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمامها، ما لم يقتضِ السياق غير ذلك: الهيئة: الهيئة العامة للأمن الغذائي. التنظيم: تنظيم الهيئة. الوزير: وزير البيئة والمياه والزراعة. المجلس: مجلس إدارة الهيئة. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. الأمن الغذائي: تأمين الغذاء الكافي والآمن والمغذي للجميع، بطريقة مستقرة دائمة من خلال عمل منسق بين الجهات الحكومية وغير الحكومية، بهدف تمكين مجتمع حيوي واقتصاد مزدهر. السلع الاستراتيجية: السلع الغذائية المستمر طلبها على المدى الطويل مهما تغيرت الظروف، ولا يمكن الاستغناء عنها. نظام الإنذار المبكر: نظام آلي لجمع المعلومات يُمَّكن الجهات المعنية الاستعداد للأحداث الخطرة المتعلقة بأسواق السلع الغذائية من خلال المتابعة الدقيقة للأسواق وفق عدد من البروتوكولات لدعم استدامة الغذاء على المدى الطويل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة، وبالاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها -عند الحاجة- إنشاء فروع أو مكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تعد الهيئة الجهة المختصة في المملكة بالأمن الغذائي، والمشرفة على وفرة جميع السلع الاستراتيجية، وتهدف إلى تنظيم الأمن الغذائي وتعزيزه وتطويره، بما يكفل حماية المصالح الوطنية للدولة وأمنها الوطني، ومراقبة الالتزام بالأنظمة والخطط الصادرة بشأنه، بالتنسيق مع الجهات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة في سبيل تحقيق أهدافها -دون إخلال باختصاصات الجهات الأخرى- ممارسة الاختصاصات والمهمات الآتية: اقتراح مشروعات الأنظمة واللوائح والسياسات والاستراتيجيات ذات الصلة باختصاصاتها، واقتراح تعديل النافذ منها، والرفع عما يتطلب اتخاذ إجراءات نظامية في شأنه. اقتراح السلع الاستراتيجية، وتحديثها متى ما لزم الأمر، وذلك بالتنسيق مع الجهات المعنية، والرفع عما يتطلب اتخاذ إجراءات نظامية في شأنه. التنسيق مع الجهات المعنية لوضع السياسات والخطط للاستجابة للطوارئ المتعلقة بالأمن الغذائي والتعافي منها وإدارتها والإشراف عليها، وتحديثها، والرفع عما يتطلب وفق الإجراءات النظامية. تصميم وإدارة نظام الإنذار المبكر، وذلك بالتنسيق مع الجهات المعنية. وضع خطط وسياسات الخزن الاستراتيجي فيما يتعلق بمنظومة الأمن الغذائي، والإشراف على تنفيذها، والرفع عما يلزم استكمال إجراءات نظامية في شأنه. وضع المعايير والإجراءات والضوابط والاشتراطات لتخزين السلع الاستراتيجية، ومتابعة الالتزام بها، وتحديثها، وذلك دون إخلال بأي معايير أو ضوابط معتمدة لدى الجهات الأخرى ذات العلاقة. وضع الضوابط والاشتراطات اللازمة،
    لما تصدره من تراخيص وفقاً لاختصاصها. توفير بيئة استثمارية للمستثمرين والقطاع الخاص -بالتنسيق مع الجهات ذات العلاقة- في مجالات عمل الهيئة والإشراف على الخطط والبرامج المتعلقة بها والتأكد من مواءمتها مع الجهود ذات الصلة. تنمية مصادر إيراداتها من خلال الاستثمار والشراكات الاستراتيجية مع القطاع الخاص، بما يكفل أداء مهماتها وتحقيق أهدافها، وذلك وفقاً للإجراءات النظامية. رصد البيانات اللازمة لدعم التحليلات والكشف الاستباقي للأزمات المتعلقة بمنظومة الأمن الغذائي وجمعها، واتخاذ الإجراءات اللازمة حيالها بما يضمن تفادي تلك الأزمات. مراقبة السلع المستهدفة بخطط الخزن الاستراتيجي المتصلة بمنظومة الأمن الغذائي المخزنة لدى القطاع الخاص، وآليات تدويرها واستخدامها، واتخاذ ما يلزم من إجراءات حيال ما ترصده الهيئة في هذا الشأن. قياس مستويات الفقد والهدر الغذائي لجميع مراحل سلسلة القيمة، ووضع السياسات والخطط والمستهدفات اللازمة للحد من الفقد والهدر الغذائي بما يشمل إعادة التدوير، وتطوير البرامج اللازمة لذلك بالتنسيق مع الجهات المعنية، وفقاً لاختصاصاتها. وضع برامج توعية للحد من الفقد والهدر الغذائي، بالتنسيق
    مع الجهات المعنية، ومتابعة تنفيذها. التنسيق مع جميع الجهات المعنية بمنظومة الأمن الغذائي، لتنظيم الجهود ذات الصلة بالمنظومة. وضع خطة شاملة لبناء القدرات ذات الصلة بمنظومة الأمن الغذائي، بالتنسيق مع الجهات المعنية. متابعة الامتثال للأنظمة واللوائح والسياسات ذات الصلة بمنظومة الأمن الغذائي، واتخاذ الإجراءات اللازمة بالتنسيق مع الجهات المعنية حيال ما يرصد من مخالفات لتلك الأنظمة والتشريعات. الربط الإلكتروني مع الجهات الحكومية وغير الحكومية، وذلك للحصول على المعلومات والبيانات المتعلقة باختصاصاتها وأدائها مهماتها. إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة بمجالات الأمن الغذائي مع الجهات المعنية داخل المملكة وخارجها، وفقاً للإجراءات النظامية المتبعة، وذلك بالتنسيق مع الجهات ذات الصلة. عقد المؤتمرات والندوات وجلسات العمل ذات الصلة بمجالات الأمن الغذائي، والاشتراك فيها داخل المملكة وخارجها، وفقاً للإجراءات النظامية المتبعة. دعم البحوث والدراسات في مجالات الأمن الغذائي، سواء بشكل منفرد أو بالاشتراك مع الجهات ذات العلاقة. تمثيل المملكة -إقليميًّا ودوليًّا- في حدود مجالات الأمن الغذائي، وفقاً
    للإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: أ‌- ممثل من وزارة البيئة والمياه والزراعة. ب‌- ممثل من وزارة المالية. ج‌- ممثل من وزارة التجارة. د‌- ممثل من وزارة الداخلية. ه‌ـ- ممثل من مجلس المخاطر الوطنية. و‌- ممثل من الهيئة العامة للغذاء والدواء. ز‌- الرئيس التنفيذي. ح- اثنين من القطاع الخاص، من ذوي الخبرة والاختصاص بمجال عمل الهيئة، يعينان بأمر من رئيس مجلس الوزراء بناء على ترشيح من الوزير. لا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن (الثانية عشرة) أو ما يعادلها. تكون مدة العضوية في المجلس (ثلاث) سنوات قابلة للتجديد لمرة واحدة. يختار الرئيس نائباً من أعضاء المجلس ممثلي الجهات الحكومية عدا الرئيس التنفيذي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على شؤون الهيئة، وإدارتها وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود أحكام التنظيم، وله على وجه خاص ما يأتي: الموافقة على مقترحات تحديد وتحديث السلع الاستراتيجية، واعتمادها وفقاً للإجراءات النظامية المتبعة. الموافقة على مقترحات مشروعات الأنظمة واللوائح والسياسات والاستراتيجيات المتعلقة بالأمن الغذائي، تمهيداً للرفع عنها. اعتماد المعايير والإجراءات والضوابط والاشتراطات لتخزين السلع الاستراتيجية، وما تصدره الهيئة من تراخيص وفقاً لاختصاصها. إقرار السياسات العامة للهيئة، واستراتيجياتها، وخططها، وبرامجها. تحديد المقابل المالي للأعمال والخدمات التي تقدمها. إقرار الأطر والقواعد والمعايير والضوابط ومؤشرات قياس الأداء، ذات الصلة بأعمال الهيئة. إقرار الهيكل والدليل التنظيمي للهيئة. إقرار اللوائح المالية والإدارية وغيرها من اللوائح اللازمة لتسيير عمل الهيئة وشؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق
    مع وزارة المالية. الموافقة على مشروع ميزانية الهيئة، حسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية. تعيين مراجع حسابات خارجي (أو أكثر) معتمد، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، بحسب الإجراءات النظامية المتبعة. الموافقة على إنشاء فروع ومكاتب للهيئة داخل المملكة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف، التي تقدم للهيئة وفقاً للأحكام المنظمة لذلك. النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة، واتخاذ القرارات اللازمة في شأنها. الموافقة على استثمار أموال الهيئة بما يحقق أهدافها وفقاً للأحكام المنظمة لذلك. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه مناسباً من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض اختصاصاته -عدا الاختصاصات الواردة في الفقرات (2) و(4) و(5) و(7) و(8) و(9) و(10) و(12) و(14) و(15) من هذه المادة- إلى رئيسه أو من يراه من أعضاء المجلس أو
    من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس -بصفة دورية- بما لا يقل عن ثلاثة اجتماعات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس أو نائبه، أو إذا طلب ذلك ثلث أعضائه على الأقل. توجه الدعوة إلى الاجتماع من الرئيس أو نائبه -كتابةً- قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. تعقد اجتماعات المجلس في مقر الهيئة الرئيس. ويجوز -بقرار من الرئيس- عقد الاجتماع في أي مكان آخر داخل المملكة. يشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو نائبه. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. لا يجوز لأي عضو الامتناع عن التصويت، ولا تفويض غيره بالتصويت نيابةً عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. وللعضو تسجيل اعتراضه مسبباً في محضر اجتماع المجلس. للرئيس أو نائبه دعوة من يراه من أهل الاختصاص والخبرة لحضور اجتماعات المجلس، وتقديم المعلومات والرأي والمشورة، دون أن يكون له حق التصويت. يجوز -عند الحاجة ووفقاً لما يقدره الرئيس- أن تُعقد الاجتماعات
    وأن يُصوّت عليها عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ القرارات بطريق التمرير على الأعضاء، ويُوقع عليها بما يفيد باطلاع جميع الأعضاء عليها، ولا تُعدُّ القرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرر على جميع الأعضاء، ويُصوّت عليها من جميع الأعضاء، وتحز على أغلبية أصواتهم. يكون للمجلس أمين من منسوبي الهيئة يختاره الرئيس بناء على ترشيح الرئيس التنفيذي، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات، ويحضر اجتماعات المجلس دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يعين ويعفى من منصبه بقرار من المجلس، ويعد المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويتولى الاختصاصات الآتية: اقتراح سياسات الهيئة العامة واستراتيجياتها وخططها وبرامجها، ورفعها إلى المجلس لإقرارها، ومتابعة تنفيذها بعد إقرارها. اقتراح تحديد السلع الاستراتيجية وتحديثها، ورفعها إلى المجلس للموافقة عليها، تمهيداً لاعتمادها وفق الإجراءات النظامية. اقتراح الأطر والقواعد والمعايير والضوابط ومؤشرات قياس الأداء، ذات الصلة بأعمال الهيئة، ورفعها إلى المجلس لإقرارها. اقتراح الهيكل والدليل التنظيمي للهيئة ولوائحها الإدارية والمالية والداخلية، تمهيداً لرفعها إلى المجلس. الإشراف على سير العمل في الهيئة من خلال اللوائح والقرارات التي يقرها المجلس. الإشراف على إعداد تقرير الهيئة السنوي ومشروع ميزانيتها وحسابها الختامي؛ تمهيداً لرفعها إلى المجلس. الإشراف على إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، تمهيداً لرفعها إلى المجلس. تقديم تقارير دورية إلى المجلس عن أعمال الهيئة ومنجزاتها ونشاطاتها. تعيين العاملين
    في الهيئة والإشراف عليهم وفقاً للوائح الهيئة. إصدار الأوامر بمصروفات الهيئة، وفقاً للوائح الهيئة المالية. متابعة تنفيذ القرارات الصادرة عن المجلس. تمثيل الهيئة أمام القضاء، والجهات الحكومية والمؤسسات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة، وله تفويض غيره بذلك. إقرار الخطط والبرامج اللازمة للتدريب والابتعاث داخليًّا وخارجيًّا، ومتابعة تنفيذها. عقد المؤتمرات والندوات واللقاءات ذات العلاقة بأهداف الهيئة، وفقاً للإجراءات النظامية المتبعة. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم، واللوائح، بحسب الصلاحيات المخولة له من المجلس. التعاقد مع المكاتب الاستشارية وبيوت الخبرة والخبراء، في حدود نشاط الهيئة، ووفقاً لما تحدده لوائح الهيئة. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتألف موارد الهيئة المالية من الآتي: أ- الاعتمادات التي تخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه عن الأعمال والخدمات التي تقدمها. ج- عوائد استثمارات الموارد المالية والأصول المتاحة للهيئة. د- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف، وفقًا للأحكام المنظمة لذلك. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية لدى البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي. ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للهيئة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية تقريرًا سنويًّا عما حققته من إنجازات، وما واجهها من صعوبات، وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وميزانياتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6d1d7df9-b061-4830-8356-b332009f07ad/1
  verified: false
