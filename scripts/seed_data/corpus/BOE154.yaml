regulation:
  code: BOE154
  name_ar: نظام مياه الصرف الصحي المعالجة وإعادة استخدامها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يهدف هذا النظام إلى : التوصل إلى مستويات مقبولة للتخلص من مختلف أنواع مياه الصرف الصحي في شبكة الصرف الصحي العامة، إضافة إلى تحقيق مستويات آمنة لإعادة استخدام مياه الصرف الصحي المعالجة في مجالات الري الزراعي وري الحدائق العامة والأماكن الترويحية، وتغذية المياه الجوفية مستقبلا وفي التبريد والأغراض الصناعية وأية استخدامات أخرى، وذلك لتأمين درجة كافية من حماية الصحة من الآثار الضارة الناجمة عن التلوث وانتقال الأمراض من خلال التحكم في نوعية مياه الصرف الصحي المعالجة، وتنظيم مراقبة محطات معالجة مياه الصرف الصحي، إضافة إلى ضمان الاستفادة القصوى من المياه المعالجة باعتبارها أحد المصادر غير التقليدية للمياه بما يتفق مع المعايير القياسية الموضحة في هذا النظام ولوائحه التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يقصد بالعبارات الآتية المعاني الموضحة أمام كل منها، ما لم يدل النص على خلاف ذلك : 1 - الري المقيد : ري جميع أنواع المحاصيل، باستثناء الخضروات والنباتات التي تلامس ثمرتها المياه المعالجة، سواء كانت تؤكل طازجة أو مطبوخة، وكما هو موضح في اللائحة التنفيذية. 2 - الري غير المقيد : ري جميع أنواع المحاصيل بدون استثناء. 3 - المنكشف الصخري : هو جزء من المتكون الجيولوجي، تظهر صخوره فوق سطح الأرض. 4 - المعالجة الثنائية : هي مستوى المعالجة التي يمكن التوصل إليها عن طريق المعالجة الحيوية المنتهية بالترسيب والتطهير. ويمكن استخدام المياه الناجمة عنها في الري المقيد . 5 - المعالجة الثلاثية : هي مستوى المعالجة التي يمكن التوصل إليها عن طريق المعالجة الحيوية المنتهية بالترشيح والتطهير وأي عمليات أخرى. ويمكن استخدام المياه الناتجة عنها في الري غير المقيد . 6 - المعالجة الحيوية : هي عمليات المعالجة التي تهدف إلى تنشيط البكتيريا في مياه الصرف الصحي لإنقاص تركيز المواد العضوية فيها. 7 - المادة الملوثة : هي أي مادة فيزيائية أو كيميائية أو عضوية أو إشعاعية موجودة في مياه الصرف الصحي وتعمل على
    تدني نوعية المياه أو تشكل خطورة عند الاستفادة من هذه المياه. 8 - النفايات غير المنزلية : هي مياه الصرف الناجمة عن الأنشطة الصناعية أو الطبية أو العلمية أو التجارية التي تختلف عن مياه الصرف الصحي المنزلية. 9 - أقصى مستوى للمادة الملوثة : هو الحد الأقصى لمستوى المادة الملوثة المسموح بوجودها في مياه الصرف الصحي، وفقا للمعايير القياسية المحددة. 10 - شبكة الصرف الصحي العامة : هي شبكة الصرف الصحي التي تتولى إدارتها مصلحة حكومية أو مؤسسة عامة. 11 - مياه الصرف الصحي : هي المياه الحاملة للفضلات والنفايات التي مصدرها المساكن والمباني التجارية والحكومية والمؤسسات والمصانع، وأي كمية من المياه الجوفية والسطحية التي يمكن أن تتسرب إلى شبكة مياه الصرف الصحي العامة . 12 - مياه الصرف الصحي المعالجة : هي المياه الخارجة من محطة معالجة مياه الصرف الصحي بعد معالجتها بطريقة سليمة طبقا للمعايير القياسية لنوعية مياه الصرف الصحي المعالجة حسب الغرض من استخدامها. 13 - مرافق مياه الصرف الصحي : هي المنشآت والمعدات التي يتطلبها جمع مياه الصرف الصحي ونقلها ومعالجتها. 14 - الحقن المباشر : هو ضخ مياه الصرف الصحي المعالجة
    إلى طبقات الأرض. 15 - المياه غير الملوثة : هي مياه ذات نوعية مساوية أو تفوق المعايير المحددة لمياه الصرف الصحي المعالجة أو هي المياه التي لا تقل عن المستويات القياسية لنوعية المياه التي ستصب فيها (أي المستقبلة). 16 - الحمأة : هي المواد المترسبة الناتجة من معالجة مياه الصرف الصحي. 17 - أنبوب صرف المبنى : هو امتداد غرفة التفتيش النهائية للمبنى نحو شبكة مياه الصرف الصحي العامة . 18 خزان التحليل : هو خزان يحفر في باطن الأرض لاستيعاب مياه الصرف الصحي وفق شروط فنية معينة. 19 - المخرج الطبيعي : هو أي مصب لصرف مياه الأمطار والسيول أو مياه الصرف الصحي المعالجة لتتدفق في مجرى مائي أو واد أو بركة أو خندق أو بحيرة أو أي وسط آخر للمياه الجوفية أو السطحية. 20 - الترخيص : الموافقة الخطية الصادرة من الجهة المختصة. 21 - الجهة المختصة : هي واحدة أو أكثر من الجهات الآتية، وفق ما يقتضيه السياق : أ - وزارة الزراعة والمياه . ب - وزارة الشؤون البلدية والقروية ( مصالح المياه والصرف الصحي ). جـ - جهات أخرى يحددها مجلس الوزراء . 22 - الشخص : أي شخص طبيعي أو معنوي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 1 - في حالة عدم توافر شبكة الصرف الصحي العامة ، فإنه يجب على المالك توصيل أنبوب صرف المبنى إلى خزان تحليل خاص به، وتوصيلة فرعية أخرى مغلقة للربط بشبكة الصرف الصحي العامة مستقبلا. 2 - يجب على أصحاب المجمعات الكبيرة إنشاء محطة معالجة خاصة، وذلك بعد الحصول على ترخيص بذلك من مصلحة المياه والصرف الصحي أو البلديات . وتحدد اللائحة التنفيذية حجم هذه المجمعات والشروط والمواصفات الفنية التي يجب أن تتوافر في محطة المعالجة والشبكات التابعة لها. 3 - يلتزم صاحب المجمع بتشغيل وصيانة المرافق الخاصة بالتخلص من مياه الصرف الصحي الخارجة من مجمعه بطريقة صحية دائمة على نفقته الخاصة وطبقا للأصول الفنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تلتزم الجهات الحكومية والخاصة بما في ذلك المؤسسات التجارية والصناعية، قبل تصريف مياه الصرف الصحي غير المطابقة للمواصفات، بإجراء معالجة مسبقة لمياه الصرف الصحي على نفقتها، وذلك قبيل تصريفها إلى شبكة الصرف الصحي العامة بحيث تتطابق مع المعايير القياسية للنوعية الموضحة في هذا النظام ولوائحه التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: في حالة توافر محطة معالجة لدى جهة ما، فيجب أن تكون معايير تشغيلها وصيانتها حسب أحكام اللوائح التنفيذية لهذا النظام، كما يجب تأمين جميع المعلومات التي تحتاج إليها الجهات المختصة تطبيقا لأحكام هذا النظام ولوائحه التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجب ألا يتعدى تركيز الملوثات في مياه الصرف الصحي المعالجة المستويات القصوى للتلوث حسبما هو موضح في اللوائح التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: '1 - تتولى الجهات المسئولة عن محطات معالجة مياه الصرف الصحي مسؤولية تصريف مياه الصرف الصحي المعالجة إذا لم تكن تتمشى مع متطلبات هذا النظام، وبعد إجراء التنسيق اللازم بين كل من: وزارة الشؤون البلدية والقروية ، ووزارة الزراعة والمياه .2 - إذا كانت المياه الخارجة من محطات معالجة مياه الصرف الصحي لا تتمشى مع متطلبات هذا النظام ولوائحه التنفيذية ولا يمكن قبولها في الشبكة العامة أو الاستخدامات الخاصة، فيجب على الجهة المالكة لتلك المحطات التوقف حتى تتمكن من تحسين نوعية المياه المعالجة لتكون مطابقة لمتطلبات النظام ولوائحه التنفيذية، أو حسبما هو موضح في الفقرة (1) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يحظر على أي شخص إلحاق أي ضرر بمرافق الصرف الصحي أو أن يصرف أي نوع من المياه أو الفضلات، أو المواد التي تؤدي إلى إعاقة عملية معالجة مياه الصرف الصحي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للمراقبين المعتمدين التابعين لمصالح المياه والصرف الصحي أو البلديات ، الذين يحملون بطاقات شخصية تثبت صفتهم الرسمية، الحق في أن يدخلوا مواقع تجميع مياه الصرف الصحي في المنشآت العامة أو الخاصة بقصد التفتيش والمراقبة والقياس وأخذ العينات والاختبارات المتعلقة بالتصريف بما يتفق مع هذا النظام ولوائحه التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: فيما عدا ما تحتاجه وزارة الشؤون البلدية والقروية لأغراض التشجير داخل المدن، يجب الحصول على ترخيص من وزارة الزراعة والمياه لاستخدام مياه الصرف الصحي المعالجة الخارجة من محطات المعالجة الخاصة أو العامة، وفقا لما تحدده اللوائح التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يشترط في مياه الصرف الصحي المعالجة ثلاثيا - التي يراد استعمالها لأغراض الري غير المقيد - أن تكون موافقة للمعايير القياسية التي توضحها اللوائح التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يشترط في مياه الصرف الصحي المعالجة ثنائيا - التي يراد استعمالها لأغراض الري المقيد - أن تكون موافقة للمعايير القياسية الموضحة في اللوائح التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجب الكشف المستمر والتفتيش الدائم من قبل وزارة الزراعة والمياه على المزروعات المروية بمياه الصرف الصحي المعالجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا يجوز لأصحاب المزارع المستفيدة من مياه الصرف الصحي المعالجة، أن يقوموا بتوصيل هذه المياه إلى مزارع أخرى دون موافقة الجهة المختصة، سواء كان بتوصيلات مؤقتة أو دائمة. كما لا يجوز لهم إعطاء هذه المياه لغيرهم سواء بثمن أو بغير ثمن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يجوز استخدام مياه الصرف الصحي غير المعالجة أو المياه الملوثة بشكل عام في الري أو الزراعة بجميع أنواعها. ولا يجوز زراعة الخضروات أو ما يلامس ثمره سطح التربة، إلا بعد الحصول على تصريح من وزارة الزراعة والمياه مبني على تحليل للمياه من وزارة الصحة أو وزارة الشؤون البلدية والقروية أو أي جهة أخرى معتمدة من قبل وزارة الصحة ، يثبت خلوها من التلوث وتوضح اللوائح التنفيذية كيفية ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: توضح اللوائح التنفيذية لهذا النظام ما يجب توافره في أنظمة الري التي تستخدم مياه الصرف الصحي المعالجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجب ألا تقل نوعية مياه الصرف الصحي المعالجة المراد استعمالها في مختلف مجالات الأنشطة الترفيهية وتربية الأسماك، عن المعايير النوعية المحددة للمعالجة الثلاثية الموضحة باللوائح التنفيذية لهذا النظام. ويجب إجراء معالجة إضافية على نفقة الجهة المستفيدة لإزالة النتروجين والفسفور للحد من الطحالب لتأمين بيئة مائية صالحة وملائمة لحياة الأسماك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجوز استخدام مياه الصرف الصحي المعالجة في الصناعة وفقا للمعايير القياسية الموضحة في اللوائح التنفيذية لهذا النظام، ويستثنى من ذلك صناعة المواد الغذائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: في حالة توقف محطة المعالجة، لا يجوز تصريف مياه الصرف الصحي غير المعالجة أو المعالجة التي لا تتوافق مع المعايير القياسية الموضحة في اللوائح التنفيذية لهذا النظام، في مناطق المنكشفات الصخرية للطبقات المائية أو المجاري المائية. كما لا يجوز طمر مخلفات الصرف الصحي في هذه المناطق، ويجب التنسيق مع وزارة الزراعة والمياه لإيجاد حل بديل للتصريف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 1 - يتم التخلص من مياه الصرف الصحي المعالجة، من محطات المعالجة التابعة لوزارة الشؤون البلدية والقروية في الأراضي أو مجاري الوديان والمجاري الطبيعية ، بعد إجراء التنسيق اللازم بين وزارة الزراعة والمياه ووزارة الشؤون البلدية والقروية .2 - يتم التخلص من مياه الصرف الصحي المعالجة، في الأراضي الفضاء أو مجاري الوديان والمجاري الطبيعية، بعد الحصول على تصريح كتابي من وزارة الزراعة والمياه مبني على جودة المياه المعالجة والتكوينات الجيولوجية لأماكن التخلص، ووفقا للوائح التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يجب الحصول على تصريح كتابي من وزارة الزراعة والمياه قبل إجراء الحقن المباشر لمياه الصرف الصحي المعالجة إلى باطن الأرض، وبعد التأكد من مطابقة تلك المياه للمعايير الفنية المعروفة علميا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: في حالة تصريف مياه الصرف الصحي المعالجة إلى البحار، يجب إتباع المواصفات الوطنية لحماية البيئة، ولا يجوز تصريف مياه الصرف الصحي المعالجة إلى المسطحات المائية مثل السدود.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يمنع استخدام الحمأة للأغراض الزراعية في المنكشفات الصخرية للطبقات المائية، كما يمنع التخلص من الحمأة في البحار أو المسطحات المائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يمكن الاستفادة من الحمأة في الزراعة، وينبغي أن تكون نوعيتها جافة ومثبتة، ولا تقل عن معايير النوعية التي تحددها اللوائح التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: للمراقبين المعتمدين التابعين لوزارة الزراعة والمياه ، الذين يحملون بطاقات شخصية تثبت صفتهم الرسمية، الحق في أن يدخلوا المزارع التي تستعمل مياه الصرف الصحي المعالجة، بغرض المراقبة والتفتيش وأخذ القياسات والعينات للتأكد من تنفيذ أحكام هذا النظام ولوائحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: للمفتشين والموظفين المعتمدين التابعين لوزارة الزراعة والمياه ، الحق في أخذ القياسات والعينات من المياه المعالجة الخارجة من حدود محطات معالجة مياه الصرف الصحي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تتولى وزارة الزراعة والمياه مراقبة تصريف مياه الصرف الصحي المعالجة من أجل إعادة استخدامها، كما تقوم محطات معالجة مياه الصرف الصحي بتزويد وزارة الزراعة والمياه شهريا بنتيجة البيانات التي تتولى جمعها في حالة طلب الوزارة ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: تقوم الجهة المختصة بتنفيذ أحكام هذا النظام بإعداد وإصدار مواصفة قياسية سعودية خاصة بضوابط خصائص مياه الصرف الصحي المعالجة بعد التنسيق مع الجهات ذات العلاقة.وإلى أن يتحقق ذلك يتم إجراء جميع القياسات الخاصة بضوابط خصائص هذه المياه طبقا لأحدث طريقة من الوسائل القياسية العالمية لاختبارات المياه ومياه الصرف الصحي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: مع عدم الإخلال بأي عقوبة أشد تنص عليها أنظمة أخرى، يعاقب كل من يخالف أي حكم من أحكام هذا النظام أو لوائحه التنفيذية وفقا لما يأتي:1 - غرامة مالية لا تقل عن ألف ريال ولا تزيد على خمسين ألف ريال، مع إزالة موضوع المخالفة وإصلاح ما تلف بسببها على نفقة المخالف، وأخذ التعهد اللازم بعدم تكرار مخالفة أحكام هذا النظام.2 - في حالة تكرار المخالفة لأحكام هذا النظام تشدد العقوبة، ويجوز قفل مياه الصرف الصحي المعالجة عن المخالف لمدة لا تزيد على ستة أشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: للجهة المختصة قفل مياه الصرف الصحي المعالجة عن المخالف إذا لم يقم بتسديد الغرامة المالية المقررة - بعد أن يكون قرار العقوبة نهائيا - حتى يتم السداد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: 1- تكون لجنة في وزارة الزراعة والمياه ، ولجنة في وزارة الشؤون البلدية والقروية ، كل لجنة مكونة من ثلاثة أعضاء يكون أحدهم من ذوي الخبرة الشرعية أو النظامية، للنظر في توقيع العقوبة المنصوص عليها في هذا النظام ولوائحه التنفيذية على من يخالف أحكامه، ويعتمد قرار العقوبة من الوزير المختص.2 - يحق لمن صدر ضده قرار العقوبة، التظلم أمام ديوان المظالم خلال ستين يوما من تاريخ إبلاغه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يصدر وزير الشؤون البلدية والقروية ووزير الزراعة والمياه - كل فيما يخصه - اللوائح التنفيذية لهذا النظام، بعد إجراء التنسيق اللازم بينهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 'يتم تنفيذ هذا النظام ولوائحه التنفيذية من قبل كل من: وزارة الزراعة والمياه ووزارة الشؤون البلدية والقروية ، وتشكل لجنة من الوزارتين لإجراء التنسيق اللازم للإشراف على تنفيذ هذا النظام ولوائحه التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد ثلاثين يوما من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c440e774-b1d8-42f5-9169-a9a700f24951/1
  verified: false
