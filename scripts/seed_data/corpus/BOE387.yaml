articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للمصطلحات والعبارات الآتية المعاني الموضحة أمام كل منها: الهيئة: هيئة الزكاة والضريبة والجمارك. الوزير: وزير المالية. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. المحافظ: محافظ الهيئة. المكلفون: الأشخاص - الطبيعيون أو الاعتباريون - الخاضعون للزكاة أو الضريبة أو الرسوم الجمركية بمقتضى الأنظمة واللوائح والتعليمات ذات العلاقة. المنافذ الجمركية: المنافذ التي تقع تحت مسؤولية الهيئة، سواء أكانت برية أم بحرية أم جوية. التنظيم: تنظيم الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب - بحسب الحاجة - داخل المملكة وخارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى القيام بأعمال جباية الزكاة وتحصيل الضرائب والرسوم الجمركية، وتحقيق أعلى درجات الالتزام من قبل المكلفين بها بالواجبات المفروضة عليهم وفقًا لأفضل الممارسات وبكفاية عالية، وتنظيم جميع الأنشطة المتعلقة بالعمل الجمركي والمنافذ الجمركية، وإدارتها، بما يكفل النهوض بمستواها إلى أقصى درجة من الكفاية والإنتاجية والتنافسية، ولها - بالإضافة إلى اختصاصاتها المقررة نظامًا ودون إخلال باختصاصات ومسؤوليات الجهات الأخرى - القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: جباية الزكاة وتحصيل الضرائب والرسوم الجمركية من المكلفين، وفقًا للأنظمة واللوائح والتعليمات ذات العلاقة. توفير خدمات عالية الجودة للمكلفين؛ لمساعدتهم على الوفاء بواجباتهم. متابعة المكلفين، واتخاذ ما يلزم من إجراءات لضمان جباية وتحصيل المستحقات المتوجبة عليهم. العمل على نشر الوعي لدى المكلفين وتقوية درجة التزامهم الطوعي، والتأكد من التزامهم بما يصدر من الهيئة من تعليمات وضوابط في مجال اختصاصها. توظيف التقنية الحديثة في تنفيذ أعمال الهيئة ومراقبتها وتسهيلها، وفي تعزيز الدور الأمني في مكافحة التهريب
    الجمركي. التعاون مع القطاع الخاص في شأن تنفيذ بعض الأعمال المساندة، وإدارتها. وضع الخطط اللازمة لتنظيم مرافق المنافذ الجمركية وإدارتها واستثمارها، بالتنسيق مع الجهات ذات العلاقة. وضع معايير لمتابعة مؤشرات أداء أعمال الهيئة وخططها، التي تكفل تطوير أدائها وخدماتها، وللهيئة التنسيق في هذا الشأن مع من تراه من الجهات ذات الصلة باختصاصاتها. التعاون وتبادل الخبرات مع الهيئات والمنظمات الإقليمية والدولية، وبيوت الخبرة المتخصصة داخل المملكة وخارجها، وذلك في حدود اختصاصات الهيئة. تمثيل المملكة في المنظمات والهيئات والمحافل والمؤتمرات الإقليمية والدولية ذات الصلة باختصاصات الهيئة. وللهيئة إنشاء شركات تابعة لها تقوم بأدوار تمكنها من أداء أنشطتها ومهماتها وتحقيق أهدافها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: المحافظ. ممثل عن وزارة الداخلية. ممثل عن وزارة المالية. ممثل عن وزارة التجارة. ممثل عن وزارة النقل. ممثل عن وزارة الاقتصاد والتخطيط. ممثل عن وزارة الاستثمار. ممثل عن البنك المركزي السعودي. ممثل عن هيئة السوق المالية. ممثل عن رئاسة أمن الدولة. ممثلين اثنين من القطاع الخاص يعينان بقرار من مجلس الوزراء بناءً على ترشيح من الرئيس. ويجب ألَّا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الخامسة عشرة) أو ما يعادلها، وفيما عدا الرئيس والمحافظ، تكون العضوية في المجلس لمدة (ثلاث) سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنه التنظيم من أحكام، وله - بوجه خاص - ما يأتي: إقرار السياسات العامة للهيئة، والخطط والبرامج اللازمة لتنفيذها. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل المعمول به منها، ورفعها لاستكمال الإجراءات النظامية اللازمة في شأنها. إقرار اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وأن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار الهيكل التنظيمي للهيئة. الموافقة على إنشاء فروع أو مكاتب للهيئة. تعيين مراجع حسابات خارجي. الموافقة على حساب الهيئة الختامي والتقرير السنوي وتقرير مراجع الحسابات؛ تمهيدًا لرفعها وفق الإجراءات النظامية المتبعة. اعتماد ميزانية الهيئة السنوية، ورفع نسخة منها إلى رئيس مجلس الوزراء. النظر في التقارير الدورية
    التي تقدم عن سير العمل في الهيئة. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. تحديد أوجه استثمار أموال الهيئة وأصولها الثابتة والمنقولة. تحديد المقابل المالي للخدمات التي تقدمها الهيئة في مجال اختصاصها. وضع قواعد عمل اللجنة الشرعية المنصوص عليها في المادة (الثامنة) من التنظيم، بما في ذلك تنظيم اجتماعاتها، وآلية إصدار قراراتها. قبول الهبات والتبرعات والمنح والوصايا والأوقاف وفقًا للأحكام المنظمة لذلك. الموافقة على إنشاء شركات تابعة للهيئة. وللمجلس - في سبيل تحقيق هذه الاختصاصات - تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدِّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض بعض اختصاصاته إلى الرئيس أو إلى من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة برئاسة الرئيس أو من ينيبه من الأعضاء ممثلي الجهات الحكومية، ويجوز عقدها في مكان آخر داخل المملكة. يعقد المجلس اجتماعاته بصفة دورية (أربع) مرات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو إذا طلب ذلك (ثلث) الأعضاء على الأقل. يكون اجتماع المجلس صحيحًا إذا حضره أغلبية الأعضاء - على الأقل - بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حال تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز - عند الحاجة، وفي الحالات المستعجلة، ووفقًا لما يقدره الرئيس - أن تعقد الاجتماعات وأن يُصَوَّت على القرارات؛ عن بعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ القرارات عن طريق التمرير على الأعضاء، ويوقع عليها بما يفيد اطلاع جميع الأعضاء عليها. ولا تعد القرارات الصادرة بهذه الطريقة صحيحة ما لم تمرر على جميع أعضاء المجلس، ويصوتوا عليها، وتحُز على أغلبية أصواتهم. لا يجوز لعضو المجلس الامتناع عن التصويت، ولا تفويض عضو
    آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. لا يجوز للعضو أن يفشي شيئًا مما وقف عليه من أسرار الهيئة حتى بعد انتهاء عضويته في المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة محافظ بمرتبة (وزير)، وهو المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود التنظيم وما يقرره المجلس، ويتولى - بوجه خاص - الاختصاصات الآتية: الإشراف على إعداد السياسات العامة للهيئة وخططها وبرامجها، ومتابعة تنفيذها بعد إقرارها. الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة. الإشراف على إعداد اللوائح الإدارية والمالية والداخلية والفنية التي تسير عليها الهيئة؛ تمهيدًا لرفعها إلى المجلس لإقرارها. اقتراح الهيكل التنظيمي للهيئة، ورفعه إلى المجلس لإقراره. الإشراف على إعداد تقرير الهيئة السنوي ومشروع ميزانيتها وحسابها الختامي؛ لعرضها على المجلس للموافقة عليها؛ تمهيدًا لاستكمال الإجراءات النظامية اللازمة في شأنها. الإشراف على إعداد التقارير الدورية عن سير العمل في الهيئة، وعرضها على المجلس؛ للنظر فيها. التوقيع على الاتفاقيات والبروتوكولات بعد موافقة المجلس، واستكمال الإجراءات النظامية اللازمة في شأنها. تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والهيئات والمؤسسات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض
    غيره بذلك. اعتماد الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية وفقًا للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي فوضه بها المجلس. التعاقد مع الغير وفق ما يقتضيه سير العمل في الهيئة، وفقًا للأنظمة والصلاحيات التي فوضه بها المجلس. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناءً عليه، بحسب الصلاحيات المخولة له. تعيين منسوبي الهيئة وفقا للوائح المنظمة لذلك، والإشراف عليهم. أي اختصاص آخر يسنده إليه المجلس. وللمحافظ تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تُكوَّن في الهيئة لجنة شرعية من ذوي التأهيل العالي والخبرة والكفاية، لا يقل عدد أعضائها عن (خمسة) من المتخصصين في فقه المعاملات المالية ومحاسبة الزكاة، والأنظمة؛ يوكل إليها ما يأتي: أ- إعداد الدراسات التي تحتاج إليها الهيئة في مجال الزكاة. ب- مراجعة مشروعات الأنظمة واللوائح ذات الصلة بعمل الهيئة في مجال الزكاة، ومراجعة أي تعديل عليها بعد إقرارها. ج- معالجة أي إشكال يطرأ أثناء ممارسة الهيئة لمهماتها مما يتصل بجباية الزكاة. د- أي مهمة أخرى يكلفها بها المجلس. يكون للأعضاء المشار إليهم في الفقرة (1) من هذه المادة، أعضاء احتياطيون يحلون محلهم في حالة غيابهم. تكون تسمية أعضاء اللجنة المنصوص عليهم في الفقرتين (1) و(2) من هذه المادة، وتحديد مكافآتهم؛ بأمر من رئيس مجلس الوزراء، بناءً على اقتراح من الوزير، وتكون مدة عضويتهم (أربع) سنوات قابلة للتجديد. للجنة الاستعانة بمن تراه من المختصين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: أ- مبلغ لا يتجاوز ما نسبته (10 %) من دخل الإيرادات الضريبية والجمركية للعام المالي المنصرم، وبما لا يشمل الضرائب المحصلة من الغاز والزيت والمواد الهيدروكربونية. ب- المقابل المالي الذي تحصل عليه نظير الخدمات التي تقدمها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف وفقًا للأحكام المنظمة لذلك. د- عوائد استثمارات الموارد المالية والأصول المتاحة للهيئة. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حسابًا لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة ولوائحها المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة من مواردها المالية، واحتياطي عام يعادل ضعف إجمالي نفقاتها المبينة في ميزانيتها السنوية السابقة؛ تودع في حساب الهيئة بعد توريد جميع الإيرادات إلى حساب جاري وزارة المالية في البنك المركزي السعودي. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجي (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يرفع المحافظ إلى المجلس خلال (تسعين) يومًا من بداية كل سنة مالية تقريرًا سنويًّا عما حققته الهيئة من إنجازات، وما واجهها من صعوبات، وما يراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع منسوبو الهيئة - عدا المحافظ - لأحكام نظام العمل ونظام التأمينات الاجتماعية.
