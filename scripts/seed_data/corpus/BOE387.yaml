- article_ref: المادة الخامسة عشرة
  article_text_ar: يلغي التنظيم كلًّا من تنظيم الهيئة العامة للزكاة والدخل الصادر بقرار مجلس الوزراء رقم (465) وتاريخ 20 / 7 / 1438هـ، وتنظيم الهيئة العامة للجمارك الصادر بقرار مجلس الوزراء رقم (352) وتاريخ 3 / 7 / 1439هـ، وكل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/667e9149-19e3-451e-9212-ad2e0091def9/1
