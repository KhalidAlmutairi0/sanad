regulation:
  code: BOE421
  name_ar: تنظيم المركز الوطني للوقاية من الآفات النباتية والأمراض الحيوانية ومكافحتها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: المركز: المركز الوطني للوقاية من الآفات النباتية والأمراض الحيوانية ومكافحتها. التنظيم: تنظيم المركز. الوزارة: وزارة البيئة والمياه والزراعة. الوزير: وزير البيئة والمياه والزراعة. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمركز. الآفات: أي نوع أو سلالة أو نمط حيوي من الكائنات النباتية أو الحيوانية أو أي عامل ممرض للنباتات أو للحيوانات. الأمراض الحيوانية: الأمراض الوبائية أو المعدية ونواقلها بحسب تصنيف منظمة الصحة الحيوانية. مقدمو الخدمة: الجهات المرخص لها من قبل المركز لمكافحة الآفات والأمراض الحيوانية. الترخيص: وثيقة رسمية يصدرها المركز لممارسة أنشطة مكافحة الآفات والأمراض الحيوانية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط تنظيمياً (بالوزير)، ويكون مقره الرئيس في مدينة الرياض، ويجوز بقرار من المجلس إنشاء فروع أو مكاتب له داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى تنفيذ ما يحقق سياسات الوزارة المعتمدة لمكافحة الآفات والأمراض الحيوانية، وذلك من خلال اتخاذ الإجراءات الوقائية والعلاجية لضمان صحة النباتات والحيوانات واستدامتها، وتعزيز مشاركة القطاع الخاص، وتوحيد الجهود بين الجهات الحكومية والخاصة في هذا المجال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يتولى المركز في سبيل تحقيق أهدافه الاختصاصات الآتية: وضع الاستراتيجيات والخطط والبرامج والمبادرات والإجراءات والضوابط اللازمة فيما يتعلق بأهدافه. وضع القواعد اللازمة للتأهيل والترخيص لمقدمي الخدمة. الترخيص لمقدمي الخدمة، واتخاذ الإجراءات النظامية بحقهم عند مخالفة الأنظمة أو الإخلال بالتزاماتهم. الإشراف والرقابة على أعمال مقدمي الخدمة من خلال التقييمات الدورية لهم. التعاقد مع مقدمي الخدمة وفقاً للإجراءات النظامية، لتقديم الوسائل الوقائية والعلاجية للنباتات والحيوانات. التدخل السريع لتقديم العلاج اللازم فيما يتعلق بالآفات والأمراض الحيوانية، عند عدم وفاء مقدم الخدمة بالتزاماته أو عند عدم وجود مقدم خدمة. الكشف الدوري لضمان عدم تفشي الآفات وتقصي الأمراض الحيوانية، بالتعاون مع الجهات المختصة. تطوير تقنيات الوقاية والمكافحة، واعتمادها. تطوير قاعدة بيانات للمعلومات عن الآفات والأمراض الحيوانية وانتشارها، وتحديثها، والعمل على توفيرها لأصحاب المصلحة حسب السياسات المعتمدة. تنظيم عملية الحد من انتشار الآفات والأمراض الحيوانية والإشراف عليها، بالتنسيق مع الجهات ذات العلاقة. وضع خطط
    الطوارئ المتعلقة بالآفات والأمراض الحيوانية، والإشراف على تنفيذها. تحديد الآفات والأمراض الحيوانية المحتملة ومدى تأثيرها وضررها الاقتصادي، وحصرها، وتحديثها، ونشرها في قائمة الآفات والأمراض الحيوانية. متابعة تحركات الآفات والأمراض الحيوانية بالدول المجاورة وخلال مواسم الهجرة، واتخاذ التدابير اللازمة، وإصدار الإنذارات المبكرة عنها. الحصول من الأفراد والجهات الحكومية وغير الحكومية على المعلومات والبيانات المتعلقة باختصاصاته وما يحتاج إليه لأداء مهماته. تقديم الخدمات الفنية والاستشارية في مجال مكافحة الآفات والأمراض الحيوانية. إصدار جميع التقارير والإحصائيات الدورية والسنوية الخاصة بالآفات والأمراض الحيوانية بعد التنسيق مع الوزارة. إقامة المعارض والمؤتمرات والندوات والحملات التوعوية في شأن مكافحة الآفات والأمراض الحيوانية، وذلك بالتنسيق مع الجهات المختصة. إبرام مذكرات التفاهم والاتفاقيات - وفق الإجراءات النظامية المتبعة - مع الهيئات المحلية الحكومية والجهات غير الحكومية من الشركات والمؤسسات، للاستفادة من أفضل التقنيات والأنظمة والبحوث والدراسات في المجالات المتعلقة بمكافحة الآفات والأمراض.
    أي اختصاص آخر - يقره المجلس - ذي صلة بأهداف المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'أولاً: يكون للمركز مجلس إدارة برئاسة الوزير - أو من ينيبه - وعضوية كل من: ممثلين من وزارة البيئة والمياه والزراعة. ممثل من وزارة الداخلية. ممثل من وزارة الشؤون البلدية والقروية. ممثل من وزارة المالية. ممثل من وزارة الصحة. ممثل من المركز الوطني للوقاية من الأمراض ومكافحتها. ممثل من الهيئة العامة للجمارك. ممثل من الهيئة العامة للغذاء والدواء. ثلاثة (أعضاء) من المختصين وذوي الخبرة في مجال عمل المركز ومن القطاع الخاص، يرشحهم الوزير ويصدر بتعيينهم قرار من مجلس الإدارة، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد مرة واحدة. ثانياً: يجب ألا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن المرتبة (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على إدارة شؤون المركز وتصريف أموره، ويتخذ جميع القرارات اللازمة لتحقيق أهدافه في حدود ما تضمنته أحكام التنظيم، وله بوجه خاص ما يأتي: إقرار الاستراتيجيات والخطط والبرامج والمبادرات والإجراءات والضوابط ذات العلاقة بأهداف المركز. إقرار هيكل المركز التنظيمي. إقرار اللوائح المالية، بالاتفاق مع وزارة المالية. إقرار اللوائح الإدارية والفنية، بالاتفاق مع وزارة المالية فيما يتعلق بالأحكام ذات الأثر المالي الواردة فيها. تحديد المقابل المادي لخدمات مقدمي الخدمة. تحديد المقابل المالي الذي يتقاضاه المركز عن الخدمات والتراخيص التي يقدمها. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. قبول التبرعات والهبات والمنح والوصايا والأوقاف والمساعدات التي تقدم للمركز. تشكيل فرق العمل واللجان من أعضاء المجلس أو من غيرهم، وتحديد اختصاصاتها. وللمجلس تفويض أي من اختصاصاته أو بعضها إلى من يراه من المسؤولين في المركز وفق ما يقتضيه سير العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المركز، ويجوز عند الحاجة عقدها في مكان آخر داخل المملكة. يجوز لرئيس المجلس إنابة أحد أعضاء المجلس من ممثلي الجهات الحكومية؛ ليرأس اجتماعات المجلس حال غيابه. يجتمع المجلس أربع (4) مرات في السنة على الأقل بناءً على دعوة من رئيسه أو من ينيبه، وكلما اقتضت المصلحة ذلك، وعلى الرئيس أن يدعو المجلس إلى الاجتماع متى طلب ذلك أربعة من أعضائه على الأقل، ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. ولا يجوز للعضو الامتناع عن التصويت ولا تفويض عضو آخر بالتصويت عنه عند غيابه. يجوز - عند الحاجة - عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية أو بالتمرير على أعضاء المجلس والتوقيع عليها عند تمريرها بما يفيد اطلاع جميع الأعضاء عليها، ولا تعد القرارات الصادرة بهذه الطريقة صحيحة إلا بتمريرها على أعضاء المجلس جميعهم، وتصويتهم عليها، وحصولها على غالبية
    أصواتهم على الأقل. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي، يكون تعيينه وإعفاؤه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، وهو المسؤول عن إدارة المركز، وتتركز مسؤولياته في حدود التنظيم واللوائح الصادرة بموجبه، وما يقرره المجلس، ويمارس الاختصاصات والصلاحيات الآتية: الإشراف على سير عمل المركز، والعاملين فيه. التحضير لاجتماعات المجلس، والدعوة إليها، والإشراف على إعداد محاضر المجلس وقراراته، ومتابعة تنفيذها بعد اعتمادها. اقتراح الاستراتيجيات والخطط والبرامج والمبادرات والقواعد والإجراءات اللازمة لتنفيذ أهداف المركز، والإشراف على تنفيذها بعد إقرارها. تعيين منسوبي المركز والإشراف عليهم وإنهاء خدماتهم، طبقاً للصلاحيات الممنوحة له وما تحدده لوائح المركز. الاستعانة بالكوادر والقدرات المميزة في مجالات عمل المركز. اقتراح هيكل المركز التنظيمي، ولوائحه المالية والإدارية والفنية، والإشراف على تنفيذها بعد إقرارها. التعاقد لتنفيذ الأعمال وتقديم الخدمات وغيرها، وفقاً للصلاحيات التي يفوضه بها المجلس. إصدار أوامر الصرف وفق ميزانية المركز السنوية المعتمدة، واتخاذ جميع الإجراءات المالية وفق الأنظمة واللوائح
    المالية، وفي حدود الصلاحيات التي فوضه بها المجلس. إعداد تقـارير دورية عـن أعمـال المركز وإنجازاته ونشاطاته والمعوقات التي تواجهه، ورفعها إلى المجلس. الإشـراف على إعـداد مشـروع ميزانية المـركـز وحسـابه الختـامي والتقـرير السنـوي، ورفعهـا إلى المجلس. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. تمثيل المركز أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي - بعد موافقة المجلس - تفويض بعض اختصاصاته وصلاحياته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد المركز المالية مما يأتي: أ - الاعتمادات المالية التي تخصص له في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه المركز نظير تقديم خدماته وما يصدره من تراخيص. ج - التبرعات والهبات والمنح والوصايا والأوقاف والمساعدات التي يقبلها المجلس. د - الموارد الأخرى التي يقرها المجلس بما لا يتعارض مع الأنظمة والتعليمات. تودع أموال المركز في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي، ويصرف منها وفقاً لميزانيته المعتمدة. يفتح المركز حساباً له في مؤسسة النقد العربي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفقاً لميزانيته المعتمدة ولوائحه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع جميع منسوبي المركز لأحكام نظام العمل وأحكام نظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يرفع المركز إلى مجلس الوزراء حسابه الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يرفع المركز إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية تقريراً سنوياً عمّا حققه من إنجازات خلال السنة المنقضية وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به بعد مضي (60) يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/82e66c29-bff3-4e5e-abfd-ac6d00a50895/1
  verified: false
