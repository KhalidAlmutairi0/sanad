regulation:
  code: BOE011
  name_ar: نظام المطبوعات والنشر
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تعريفات : تدل المصطلحات الآتية، حيثما وردت في هذا النظام، على المعاني المبينة قرينها. 1 - التداول :جعل المطبوعة في متناول عدد من الأشخاص بتوزيعها مجانًا، أو عرضها للبيع، أو إلصاقها على الجدران، أو عرضها على واجهات المحلات، أو اللوحات الضوئية، أو لوحات الطرق، أو غير ذلك. 2 - الصحافة : مهنة تحرير المطبوعات الصحفية أو إصدارها. 3 - الصحفي : كل من اتخذ التحرير الصحفي مهنة له، سواء أكانت أصلية أم إضافية. 4 - الصحيفة : كل مطبوعة ذات عنوان ثابت تصدر بصفة دورية أو في المناسبات في مواعيد منتظمة أو غير منتظمة، كالجرائد والمجلات والنشرات. 5 - الطابع : المسئول عن المطبعة، سواء أكان صاحبها أم من يقوم مقامه. 6 - المطبعة : كل منشأة أعدت لطبع الكلمات أو الأصوات أو الرسوم أو الصور بهدف تداولها. 7 - المطبوعة : كل وسيلة للتعبير، مما يطبع للتداول، سواء أكان كلمة، أم رسمًا، أم صورة، أم صوتًا. 8 - المكتبة : المحل المعد لعرض الكتب، أو الصحف، أو ما في حكمها للبيع أو للتأجير. 9 - الموزع : الوسيط- فردًا أو شركة- بين المؤلف أو الناشر، ونقاط التوزيع، والمستفيد. 10 - المؤلف : من يقوم بإعداد مادة علمية
    أو ثقافية أو فنية بهدف تداولها. 11 - الناشر : من يتولى إصدار أي إنتاج علمي أو ثقافي أو فني بغرض التداول. 12 - الوزارة : وزارة الإعلام . 13 - الوزير : وزير الإعلام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تخضع لأحكام هذا النظام النشاطات الآتية : 1 - المطبوعات. 2 - خدمات الإعداد لما قبل الطباعة. 3 - المطابع. 4 - المكتبات. 5 - الرسم والخط. 6 - التصوير الفوتوغرافي. 7 - استيراد الأفلام وأشرطة الفيديو، أو بيعها، أو تأجيرها. 8 - التسجيلات الصوتية والأسطوانات. 9 - الإنتاج الفني الإذاعي أو التلفزيوني أو السينمائي أو المسرحي. 10 - الاستوديوهات التلفزيونية والإذاعية. 11 - مكاتب وسائل الإعلام الأجنبية ومراسلوها. 12 - الدعاية والإعلان. 13 - العلاقات العامة. 14 - النشر. 15 - التوزيع. 16 - الخدمات الصحفية. 17 - إنتاج برامج الحاسب الآلي أو بيعها أو تأجيرها. 18 - الدراسات والاستشارات الإعلامية. 19 - النسخ والاستنساخ. 20 - أي نشاط تقترح الوزارة إضافته ويقره رئيس مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون من أهداف المطبوعات والنشر الدعوة إلى الدين الحنيف ومكارم الأخلاق، والإرشاد إلى كل ما فيه الخير والصلاح، ونشر الثقافة والمعرفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 1- لا يجوز مزاولة أي نشاط مما ذكر في المادة الثانية، إلا بترخيص من الوزارة، ولا يعفي هذا من الحصول على أي ترخيص توجبه الأنظمة الأخرى. 2- تحدد اللائحة التنفيذية مدة الترخيص لكل نشاط، كما تحدد المهلة المناسبة لتجديد الترخيص قبل انتهائه بعد التأكد من مزاولة المهنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1 - مع مراعاة ما تقضي به الأنظمة والاتفاقيات يشترط فيمن يعطى الترخيص الآتي : أ - أن يكون سعودي الجنسية.ب - ألا يقل عمره عن خمس وعشرين سنة، وللوزير الاستثناء من هذه السن لمسوغات يراها.ج - أن يكون من المشهود لهم بحسن السيرة والسلوك لممارسة هذا النشاط.د - أن يكون حاصلًا على مؤهل مناسب، وفق ما تحدده اللائحة التنفيذية. 2 - في حالة الشركات تطبق الشروط السابقة على ممثليها.3 - تنظم اللائحة التنفيذية الشروط اللازمة لعمل مكاتب وسائل الإعلام الأجنبية ومراسليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: للجهات الحكومية، والمؤسسات التعليمية والبحثية، والجمعيات العلمية، والأندية الأدبية والثقافية، والمؤسسات الصحفية الأهلية إصدار مطبوعات غير دورية في مجال اختصاصها وتحت مسئوليتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يحدد مقدار رسم الترخيص أو تجديده، للمقر الرئيسي أو الفرع وفق الآتي : 1 - ألفا ريال (2.000) لكل من النشاطات الآتية: أ - المطابع. ب - خدمات الإعداد لما قبل الطباعة. ج - النشر. د - التوزيع. هـ - الإنتاج الفني الإذاعي أو التلفزيوني أو السينمائي. و - الاستوديوهات التلفزيونية والإذاعية. ز- الدراسات والاستشارات الإعلامية. ح - الخدمات الصحفية. ط - الدعاية والإعلان. ي - العلاقات العامة. ك - استيراد الأفلام وأشرطة الفيديو، أو بيعها، أو تأجيرها. ل - إنتاج برامج الحاسب الآلي أو بيعها أو تأجيرها. 2 - ألف ريال (1.000) لكل من النشاطات الآتية: أ - المكتبات. ب - التسجيلات الصوتية والأسطوانات. ج - الرسم والخط. د - التصوير الفوتوغرافي. هـ - النسخ والاستنساخ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: حرية التعبير عن الرأي مكفولة بمختلف وسائل النشر في نطاق الأحكام الشرعية والنظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يراعى عند إجازة المطبوعة ما يلي : 1 - ألا تخالف أحكام الشريعة الإسلامية. 2 - ألا تفضي إلى ما يخل بأمن البلاد، أو نظامها العام، أو ما يخدم مصالح أجنبية تتعارض مع المصلحة الوطنية. 3 - ألا تؤدي إلى إثارة النعرات وبث الفرقة بين المواطنين. 4 - ألا تؤدي إلى المساس بكرامة الأشخاص وحرياتهم، أو إلى ابتزازهم، أو إلى الإضرار بسمعتهم، أو أسمائهم التجارية. 5 - ألا تؤدي إلى تحبيذ الإجرام أو الحث عليه. 6 - ألا تضر بالوضع الاقتصادي، أو الصحي في البلاد. 7 - ألا تفشي وقائع التحقيقات أو المحاكمات، إلا بعد الحصول على إذن من الجهة المختصة. 8 - أن تلتزم بالنقد الموضوعي البناء الهادف إلى المصلحة العامة، والمستند إلى وقائع وشواهد صحيحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجب أن تدون على كل مطبوعة تطبع داخل المملكة البيانات الورقية الضرورية بحسب ما تقرره اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز التنازل عن الترخيص للغير، أو تأجيره، أو إشراك آخرين فيه بعد موافقة الوزارة وبما يتفق مع أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: إذا توفي صاحب الترخيص، فإن على الورثة إشعار الوزارة بذلك خلال شهرين من تاريخ الوفاة، ولهم الحق في استمرار النشاط بعد موافقة الوزارة، وبما يتفق مع أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: على كل مؤلف أو ناشر أو طابع أو موزع يرغب في طباعة أي مطبوعة أو توزيعها أن يقدم نسختين منها إلى الوزارة لإجازتها قبل طبعها أو عرضها للتداول، وعلى الوزارة إجازة المطبوعة أو رفضها مع بيان الأسباب خلال ثلاثين يومًا، ولصاحب الشأن التظلم من قرار الرفض لدى الوزير .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: على كل مطبوعة أن تحتفظ بسجل للمطبوعات التي تطبع فيها يبرز للمختصين عند الطلب، وللوزارة في اللائحة التنفيذية أن تستثني من شرط التسجيل ما تراه من مطبوعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: المؤلف و الناشر و الطابع مسئولون عما يرد في المطبوعة من مخالفات إذا طبعت أو وضعت للتداول دون إجازتها، فإذا تعذرت معرفة أي منهم أصبح الموزع هو المسئول، وإلا فتقع المسئولية على البائع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تكلف الوزارة المؤلف أو الناشر أن يقدم وفق نظام الإيداع، النسخ المطلوبة منه للإيداع، مما يطبع داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: لا تجوز إضافة مواد الدعاية والإعلان إلى الأفلام، أو الأشرطة أو نحوها المسجلة عليها مواد فنية أو رياضية أو غيرها، التي يتعاقد على استغلالها في المملكة، إلا عن طريق مؤسسات أو شركات دعاية وإعلان محلية، وبعد إجازتها من الوزارة، وتحدد اللائحة التنفيذية المدة الزمنية للإعلانات في كل عمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تجاز المطبوعات الخارجية، إذا خلت من كل ما يسيء إلى الإسلام، أو نظام الحكم، أو يضر بالمصلحة العليا للدولة، أو يخدش الآداب العامة وينافي الأخلاق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تجاز المطبوعات الخارجية، أو ترفض مع بيان الأسباب خلال ثلاثين يومًا من تاريخ تسلم الطلب، أما الصحف فتعامل وفقًا لما تحدده اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: على كل سعودي يصدر مطبوعة غير دورية خارج المملكة، ويتقدم للوزارة بطلب إجازتها أن يرفق بطلبه ما يثبت إيداع النسخ المطلوبة، وفق نظام الإيداع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: لا تسري رقابة الوزارة على ما تستورده الجهات الحكومية والمؤسسات التعليمية والبحثية، والجمعيات العلمية، والأندية الأدبية والثقافية والمؤسسات الصحفية الأهلية من مطبوعات لأغراضها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تحدد اللائحة التنفيذية- في حدود أحكام هذا النظام- تنظيم استيراد المطبوعات الخارجية وتوزيعها. كما تحدد الإجراءات اللازمة لتسهيل اصطحاب الكتب والمطبوعات الأخرى، والاشتراك بها من قبل الباحثين والمفكرين، لأغراضهم العلمية وفي حدود حيازتهم الشخصية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجوز بعد موافقة رئيس مجلس الوزراء أن تطبع صحف أجنبية في المملكة وفقًا لما تحدده اللائحة التنفيذية، وبما يتفق مع أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: لا تخضع الصحف المحلية للرقابة، إلا في الظروف الاستثنائية التي يقرها رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: '1 - يجوز- خارج نطاق المؤسسات الصحفية الأهلية- إصدار الصحف من قبل الجهات الأهلية أو الأفراد بترخيص من الوزارة بعد موافقة رئيس مجلس الوزراء . 2 - يكتفى بموافقة الوزارة لإصدار ما يأتي : أ - النشرات محدودة التداول، ولغير أغراض البيع، مما تصدره الجهات الأهلية، على أن تقتصر هذه النشرات على ما يخدم نشاط الجهة التي تصدرها. ب - المجلات العلمية والمهنية المتخصصة، التي تصدرها جهات أهلية أو أفراد. 3 - إصدار الصحف والمجلات العلمية من قبل المؤسسات العامة التعليمية والجهات الحكومية، وذلك بعد إشعار الوزارة. 4 - المشرف على أي من المطبوعات الواردة في هذه المادة ومدير الجهة التي تصدر عنها مسئولان عما ينشر فيها بموجب أحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يوضع في مكان بارز من الصحيفة اسم صاحب الترخيص واسم رئيس التحرير، ورقم العدد، ومكان الصدو،ر وتاريخه، والسعر، واسم المطبعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 1- لا يجوز استعمال اسم صحيفة سبق صدورها ثم احتجبت، إلا بعد انقضاء عشرة أعوام على احتجابها، ما لم يتنازل أصحاب الشأن عن الاسم قبل انقضاء هذه المدة.2- لا يجوز اتخاذ اسم لصحيفة يؤدي إلى الالتباس مع اسم غيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: تحدد اللائحة التنفيذية القواعد المنظمة لبدل الاشتراك السنوي في الصحف وقيمة النسخة الواحدة، وشؤون الإعلانات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'للوزارة سحب الترخيص أو إلغاء الموافقة على إصدار الصحيفة في إحدى الحالتين الآتيتين: 1 - إذا لم يتم الإصدار خلال مدة أقصاها سنتان من الإبلاغ بالترخيص.2 - إذا توقف الإصدار مدة متصلة تزيد على سنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يحظر على الصحف وعلى العاملين فيها قبول أي منفعة، من هبات أو إعانات أو غيرها، من جهات داخلية أو خارجية؛ إلا بعد موافقة الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: لا تمنع الصحيفة عن الصدور إلا في الظروف الاستثنائية، وبعد موافقة رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: أ - يجوز نشر الإعلانات التحريرية للمؤسسات والأفراد، بشرط الإشارة إلى أنها مادة إعلانية.ب - يجوز نشر الإعلانات التحريرية للدول بعد موافقة الوزارة مع الإشارة إلى أنها مادة إعلانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 1- رئيس تحرير الصحيفة أو من يقوم مقامه في حالة غيابه، مسئول عما ينشر فيها. 2 - مع عدم الإخلال بمسئولية رئيس التحرير أو من يقوم مقامه يكون كاتب النص مسئولًا عما يرد فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: جريدة أم القرى هي الصحيفة الرسمية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: على كل صحيفة نسبت إلى الغير تصريحًا غير صحيح، أو نشرت خبرًا خاطئًا، أن تصحح ذلك بنشره مجانًا، بناء على طلب صاحب الشأن، في أول عدد يصدر بعد طلب التصحيح، ويكون ذلك في المكان الذي سبق أن نشر الخبر أو التصريح فيه، أو في مكان بارز منها، ولمن أصابه ضرر حق المطالبة بالتعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: للوزارة ، عند الضرورة ، سحب أي عدد من أعداد الصحيفة دون تعويض، إذا تضمن ما يخالف أحكام الشريعة الإسلامية، بناء على قرار من اللجنة المنصوص عليها في المادة السابعة والثلاثين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: تنظر في المخالفات لأحكام هذا النظام لجنة تشكل بقرار من الوزير برئاسة وكيل الوزارة المختص لا يقل عدد أعضائها عن ثلاثة يكون أحدهم مستشارًا قانونيًّا وتصدر قراراتها بالأغلبية، بعد دعوة المخالف أو من يمثله، وسماع أقواله، ويجوز لها دعوة من ترى الاستماع إلى أقواله، كما يجوز لها الاستعانة بمن تراه، ولا تصبح قرارات اللجنة معتمدة، إلا بعد موافقة الوزير عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: مع عدم الإخلال بأي عقوبة أشد ينص عليها نظام آخر، يعاقب كل من يخالف حكمًا من أحكام هذا النظام بغرامة مالية لا تتجاوز خمسين ألف ريال أو بإغلاق محله أو مؤسسته مدة لا تتجاوز شهرين، أو بإغلاق محله أو مؤسسته نهائيًّا، ويصدر بالعقوبة قرار من الوزير بناء على اقتراح اللجنة المنصوص عليها في المادة السابعة والثلاثين من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: 'للوزارة سحب المطبوعات المعروضة للتداول داخلية كانت أو خارجية، في الحالتين الآتيتين : 1 - عندما تكون محظورة التداول. 2 - عندما تكون غير مجازة، وتكون مشتملة على بعض المحظورات المنصوص عليها في المادة التاسعة أو المادة الثامنة عشرة. وتكون الجهة المخولة بالنظر في ذلك اللجنة المنصوص عليها في المادة السابعة والثلاثين، وهي التي تقرر ما تراه مناسبًا، بإتلافها دون تعويض أو تكليف صاحب العلاقة بإعادتها إلى خارج المملكة على نفقته إن كانت خارجية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يحق لمن يصدر بشأنه عقوبة بمقتضى أحكام هذا النظام التظلم أمام ديوان المظالم، وذلك خلال ستين يومًا من تاريخ إبلاغه بالقرار الصادر بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: إذا أجازت الوزارة المطبوعة ثم طرأ ما يوجب سحبها، فعليها تعويض صاحب الشأن عن قيمة تكلفة النسخ المسحوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: على الوزارة أن تكلف لإجازة الأعمال العلمية والفكرية، من تتوافر فيهم الأهلية لذلك من ذوي الكفاية والتخصص، والإلمام بالأنظمة، وتعليمات النشر، ولها أن تستعين في ذلك بمن تراه من غير المتفرغين من خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: تضع الوزارة بالتنسيق مع الجهات ذات العلاقة، القواعد المنظمة لإقامة معارض الكتب من قبل دور النشر والتوزيع الأهلية وتشرف عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يجوز بقرار من الوزير إنشاء جمعيات لنشاطات مما هو منصوص عليه في المادة الثانية، لمعالجة مشكلاتها، وتنسيق مهماتها، وعلى كل جمعية أن تضع لائحة يعتمدها الوزير، توضح أهدافها، وتنظم عملها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: الوزارة هي الجهة المنوط بها متابعة تنفيذ هذا النظام، ومساءلة من يخالفه وفقًا لأحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام، في مدة أقصاها ثمانية عشر شهرًا من تاريخ نشره، وتنشر في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: على من يمارس أي نشاط من النشاطات التي يحكمها هذا النظام أن يقوم بتصحيح أوضاعه طبقًا للأحكام الواردة فيه، وذلك خلال سنتين من تاريخ نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يحل هذا النظام محل نظام المطبوعات والنشر الصادر بالمرسوم الملكي ذي الرقم (م/17) والتاريخ 13/ 4/ 1402هـ، ويلغي ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد تسعين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ecaaec43-8ff9-46b8-b269-a9a700f16e66/1
  verified: false
