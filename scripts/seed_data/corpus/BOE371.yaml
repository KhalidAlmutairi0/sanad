articles:
- article_ref: 'المادة الأولى: تعريفات'
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية المعاني الموضحة أمام كل منها، ما لم يقتض السياق خلاف ذلك: الجمعية: جمعية حماية المستهلك.المستهلك: كل شخص ذي صفة طبيعية أو اعتبارية يحصل على سلعة أو خدمة بمقابل أو دون مقابل لحاجاته الشخصية أو حاجات الآخرين.السلعة: كل منتج صناعي أو نباتي أو حيواني أو تحويلي، بما في ذلك العناصر الأولية للمواد والمكونات الداخلة في المنتج.الخدمة: كل عمل تقدمه أي جهة للمستهلك، سواء كان بأجر أو دون أجر. المجلس: المجلس التنفيذي للجمعية.الأمانة العامة: الأمانة العامة للجمعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الثانية: المركز النظامي للجمعية'
  article_text_ar: جمعية حماية المستهلك جمعية أهلية تتمتع بالشخصية الاعتبارية المستقلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الثالثة: مقر الجمعية'
  article_text_ar: يكون مقر الجمعية الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الرابعة: أهداف الجمعية'
  article_text_ar: تهدف الجمعية إلى العناية بشؤون المستهلك ورعاية مصالحه والمحافظة على حقوقه والدفاع عنها، وتبني قضاياه لدى الجهات العامة والخاصة، وحمايته من جميع أنواع الغش والتقليد والاحتيال والخداع والتدليس في جميع السلع والخدمات والمبالغة في رفع أسعارهما، ونشر الوعي الاستهلاكي لدى المستهلك، وتبصيره بسبل ترشيد الاستهلاك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الخامسة: اختصاصات الجمعية'
  article_text_ar: 'للجمعية في سبيل تحقيق أهدافها القيام بما يأتي: 1 - تلقي شكاوى المستهلك، المتعلقة بالاحتيال والغش والتدليس والتلاعب في السلع أو الخدمات والمغالاة في أسعارهما، والتضليل عن طريق الإعلانات في الصحف وغيرها، ورفع ذلك إلى الجهات المختصة، ومتابعتها.2 - مساندة جهود الجهات الحكومية المعنية بحماية المستهلك، وإبلاغ تلك الجهات بكل ما يمس حقوق المستهلك ومصالحه.3 - إعداد الدراسات والبحوث، وعقد المؤتمرات والندوات والدورات، وإقامة المعارض ذات العلاقة بنشاط حماية المستهلك، ونشر نتائج تلك الدراسات والبحوث، وذلك وفقًا للأنظمة والتعليمات.4 - توعية المستهلك بطرق ترشيد الاستهلاك وتقديم المعلومات والاستشارات الضرورية له.5 - اقتراح الأنظمة ذات الصلة بحماية المستهلك وتطويرها.6 - تمثيل المستهلك في اللجان والهيئات المحلية والدولية ذات العلاقة بحماية المستهلك، والتعاون معها والمشاركة في أنشطتها المتعلقة بأهدافها، وذلك وفق الإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة السادسة: العضوية'
  article_text_ar: 'تكون العضوية في الجمعية على النحو الآتي: 1 - العضو العامل : من طلب الالتحاق بالجمعية، وتوافرت فيه الشروط الآتية: أ - أن يكون من المواطنين المهتمين بمجال حماية المستهلك.ب - أن يكون قد أتم الثامنة عشرة من عمره. ج - أن يكون كامل الأهلية المعتبرة شرعًا. د - أن يكون من المشهود لهم بالاعتدال وحسن السيرة والسلوك، وغير محكوم عليه في جريمة مخلة بالشرف أو الأمانة، ما لم يكن قد رد إليه اعتباره. هـ - أن يدفع الاشتراك السنوي المقرر للعضوية.و - أن يقبل المجلس طلبه. وللعضو العامل حق ترشيح نفسه لعضوية المجلس بعد مضي سنة على تاريخ التحاقه بالجمعية. 2 - العضو المنتسب : من طلب الانتساب إلى عضوية الجمعية، وتوافرت فيه شروط العضو العامل عدا شرط السن. ويكون لهذا العضو حق حضور اجتماعات الجمعية العمومية، دون أن يكون له حق التصويت أو الترشيح لعضوية المجلس. 3 - العضو الفخري : من منحته الجمعية عضويتها نظير ما قدمه لها من خدمات جليلة - مادية كانت أم معنوية - تساعد الجمعية على تحقيق أهدافها. ويكون لهذا العضو حق حضور اجتماعات الجمعية العمومية ومناقشة ما يطرح فيها دون أن يكون له حق التصويت أو الترشيح
    لعضوية المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة السابعة: التزامات الأعضاء'
  article_text_ar: 'على العضو العامل والعضو المنتسب الالتزام بما يأتي: 1 - الوفاء بجميع الالتزامات المترتبة على عضويته في الجمعية والقيام بجميع الواجبات المنصوص عليها في هذا التنظيم واللوائح الداخلية للجمعية.2 - التقيد بقرارات الجمعية العمومية وبقرارات المجلس.3 - إبلاغ الجمعية - كتابة - بما يطرأ من تعديلات على عنوانه المدون لديها.4 - ألا يمارس عملًا يتعارض مع أهداف الجمعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الثامنة: فقدان العضوية'
  article_text_ar: '1 - يفقد العضو عضويته في الجمعية في الحالات الآتية: أ) الوفاة.ب) إذا أُسقطت عنه العضوية، بناء على قرار تصدره الجمعية العمومية. ج) إذا قدم استقالته كتابة.د) إذا فقد شرطًا من شروط العضوية الواردة في المادة (السادسة).هـ) إذا ألحق بالجمعية - عن عمد - أضرارًا جسيمة، سواء أكانت مادية أم معنوية.و) إذا تأخر عن تسديد الاشتراك مدة تزيد على (ستة أشهر) من بداية السنة المالية للجمعية بعد إبلاغه بخطاب على عنوانه المدون لديها. 2 - فيما عدا الحالتين (أ) و (ب) يصدر بفقدان العضوية قرار من المجلس. 3 - يجوز للمجلس إعادة العضوية لمن فقدها بسبب عدم تسديده الاشتراك السنوي في حالة أدائه المبلغ المستحق عليه.4- لا يجوز للعضو أو لورثته أو لمن فقد عضويته استرداد ما دفعه للجمعية من اشتراكات أو تبرعات أو هبات، سواء أكان ذلك نقدًا أم عينًا، ومهما كانت الأسباب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة التاسعة: أجهزة الجمعية'
  article_text_ar: 'تتكون الجمعية من الأجهزة الآتية: 1 ـ الجمعية العمومية.2 ـ المجلس التنفيذي.3 - الأمانة العامة. 4 ـ اللجان الدائمة التي تشكلها الجمعية العمومية، أو المجلس التنفيذي، ويحدد قرار التشكيل اختصاص كل لجنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة العاشرة: الجمعية العمومية'
  article_text_ar: تتكون الجمعية العمومية من جميع الأعضاء العاملين الذين وفوا بالتزاماتهم للجمعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الحادية عشرة: اختصاصات الجمعية العمومية'
  article_text_ar: 'الجمعية العمومية هي السلطة العليا للجمعية وتتولى الاختصاصات والمهمات الآتية: 1 - وضع السياسات العامة التي توجه سير عمل الجمعية.2 - انتخاب ثلثي أعضاء المجلس وثلثي الأعضاء الاحتياطيين.3 - اعتماد التقرير السنوي.4 - الموافقة على الحسابات الختامية للجمعية، وتعيين مراقب للحسابات وتحديد مكافأته.5- اعتماد تقرير مراقب الحسابات.6 - اعتماد الميزانية السنوية.7 - تحديد اشتراك العضوية السنوي وتعديله.8 - دراسة مبدأ استثمار أموال الجمعية واقتراح مجالاته.9 - اعتماد إنشاء فروع أو مكاتب للجمعية.10 - اقتراح حل الجمعية لأي سبب من الأسباب المنصوص عليها في الفقرة (1) من المادة (العشرين) من هذا التنظيم، ورفعه إلى مجلس الوزراء لاعتماده.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الثانية عشرة: اجتماعات الجمعية العمومية'
  article_text_ar: 1- تعقد الجمعية العمومية في مقرها الرئيس اجتماعًا مرة كل عام، ولها عقد اجتماعات استثنائية عند الحاجة بدعوة من المجلس أو بناء على طلب ثلث الأعضاء. 2- يكون اجتماع الجمعية العمومية صحيحًا بحضور أغلبية الأعضاء، ولا يجوز للعضو أن يفوض عضوًا آخر، ويرأس الاجتماع رئيس المجلس أو من ينيبه، فإن لم يكتمل العدد أُجّل الاجتماع إلى وقت آخر خلال مدة أقلها سبعة أيام وأقصاها خمسة عشر يومًا من تاريخ الاجتماع الأول، ويكون الاجتماع الثاني صحيحًا إذا حضره ما لا يقل عن (25%) من الأعضاء العاملين، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند التساوي يكون صوت الرئيس مرجحًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الثالثة عشرة: المجلس التنفيذي'
  article_text_ar: 1- يتكون المجلس من تسعة أعضاء من الأعضاء العاملين، تنتخب الجمعية العمومية ثلثيهم بطريقة التصويت السري. 2 - يختار وزير التجارة والصناعة ثلث أعضاء المجلس من الأعضاء العاملين وثلث الأعضاء الاحتياطيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الرابعة عشرة: اختصاصات المجلس'
  article_text_ar: 'يتولى المجلس إدارة أعمال الجمعية بما يحقق أهدافها المحددة في هذا التنظيم، وله على وجه خاص ما يأتي: 1 - إعداد اللوائح الداخلية والمالية والإدارية، ولوائح الترشح والانتخاب تمهيدًا لاعتمادها من وزير التجارة والصناعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الخامسة عشرة: اجتماعات المجلس'
  article_text_ar: 1- يعقد المجلس اجتماعًا كل شهرين، وله عقد اجتماعات استثنائية عند الحاجة بدعوة من رئيسه أو بناء على طلب ثلث الأعضاء.2- يكون اجتماع المجلس صحيحًا بحضور أغلبية أعضائه، ولا يجوز للعضو أن يفوض عضوًا آخر، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند التساوي يكون صوت رئيس الاجتماع مرجحًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة السادسة عشرة: الأمانة العامة'
  article_text_ar: 'تكون للجمعية أمانة عامة تتولى أعمال سكرتارية الجمعية وأجهزتها، يرأسها أمين عام يعينه المجلس، ويكون هو المسؤول التنفيذي عن إدارة الجمعية وفقًا لهذا التنظيم وما يقرره المجلس، وعليه بوجه خاص القيام بما يأتي: 1 - إدارة شؤون الجمعية.2 - تمثيل الجمعية لدى الجهات الحكومية والقضائية والمنظمات الدولية والمؤسسات والهيئات الأخرى.3 - التوقيع على ما تصدره الجمعية من قرارات وعقود.4 - اتخاذ ما يلزم في شأن تنفيذ قرارات الجمعية العمومية وقرارات المجلس.5 - إعداد التقارير الخاصة بتنفيذ خطط الجمعية، وعرضها على المجلس.6 - الإشراف على إعداد مشروع ميزانية الجمعية وحسابها الختامي وتقريرها السنوي.7 - تشكيل اللجان المؤقتة.8 - تزويد وزارة التجارة والصناعة بتقرير مراقب الحسابات، للاطلاع والإحاطة.ويتولى نائب الأمين العام ما يسنده إليه الأمين العام من صلاحيات، ويقوم بمهماته عند غيابه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة السابعة عشرة: لجان الجمعية'
  article_text_ar: 'يشكل المجلس اللجان الآتية: 1 - لجنة الرصد والمتابعة، وتختص برصد ما يتعلق بتحقيق أهداف الجمعية ومراقبته ومتابعته، وتلقي البلاغات والشكاوى، والتحقق من دعاوى المخالفات والتجاوزات المتعلقة بشؤون المستهلك.2 - لجنة الدراسات والبحوث، وتختص بالقيام بالدراسات والبحوث، وتقديم الاستشارات المتعلقة بحماية المستهلك.3 - لجنة التوعية والنشر، وتختص بتوعية المستهلك من خلال إقامة الندوات والمؤتمرات، ونشر المعلومات المتعلقة بحماية المستهلك، وفق الإجراءات النظامية.وللمجلس أن ينشئ لجانًا أخرى عند الحاجة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الثامنة عشرة: موارد الجمعية'
  article_text_ar: '1 - تتكون موارد الجمعية من المصادر الآتية: أ ) الإعانات الحكومية.ب ) ريع المطبوعات والنشرات، وإيراد تنظيم الندوات والمعارض والدورات.ج ) عائدات استثمار ممتلكات الجمعية الثابتة والمنقولة.د ) اشتراكات الأعضاء في الجمعية.هـ ) الهبات والتبرعات والوصايا والأوقاف والمنح التي يقبلها المجلس.و) الموارد الأخرى التي يقترحها المجلس وتقرها الجمعية العمومية. 2 - تودع الجمعية أموالها النقدية باسمها لدى أحد البنوك في المملكة، ولا يسحب من هذه الأموال إلا بتوقيع اثنين من المسؤولين في الجمعية، وتحدد اللوائح الداخلية هذين المسؤولين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة التاسعة عشرة: السنة المالية'
  article_text_ar: تبدأ السنة المالية للجمعية في اليوم العاشر من برج الجدي من كل عام، وتنتهي في اليوم التاسع منه من العام التالي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة العشرون: حل الجمعية'
  article_text_ar: 1- يجوز حل الجمعية إذا خرجت عن أهدافها، أو ارتكبت مخالفة جسيمة للأحكام المنصوص عليها في هذا التنظيم، أو خالفت النظام العام أو الآداب العامة أو التقاليد المراعاة.2- إذا حُلت الجمعية تؤول جميع أموالها وممتلكاتها بعد تصفيتها إلى أقرب جهة خيرية أو إنسانية داخل المملكة العربية السعودية لا تتعارض أهدافها مع أهداف الجمعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
- article_ref: 'المادة الحادية والعشرون: أحكام ختامية'
  article_text_ar: استثناء من الأحكام المنصوص عليها في هذا التنظيم، لوزير التجارة والصناعة - في حال عدم اكتمال النصاب النظامي لانعقاد الجمعية العمومية، أو عدم توصلها إلى انتخاب أعضاء المجلس التنفيذي، أو لأي سبب آخر يحول دون مباشرة الجمعية لمهماتها أو تحقيق أهدافها - حل المجلس القائم واختيار مجلس تنفيذي مؤقت لها من أعضاء الجمعية العمومية ومن غيرهم من ذوي الخبرة والاختصاص المشهود لهم بالكفاية، وذلك لدورة واحدة أو أكثر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cdfe6d5c-ad3c-45e3-8544-a9a700f1e8ca/1
  verified: false
