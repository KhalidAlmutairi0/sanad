- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والمصطلحات والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها ما لم يقتض السياق خلاف ذلك: النظام: نظام البريد. اللائحة: اللائحة التنفيذية للنظام. التنظيم: تنظيم هيئة الاتصالات وتقنية المعلومات. الوزارة: وزارة الاتصالات وتقنية المعلومات. الوزير: وزير الاتصالات وتقنية المعلومات. الهيئة: هيئة الاتصالات وتقنية المعلومات. المجلس: مجلس إدارة الهيئة. القطاع: قطاع البريد. المحافظ: محافظ الهيئة. الخدمات البريدية: جميع الخدمات والأنشطة المتعلقة بالبريد، وتشمل ما يأتي: 1- تسلّم المواد البريدية، ونقلها، وتوزيعها، وتسليمها، بما فيها البريد السريع. 2- الخدمات المالية البريدية. 3- خدمة الصناديق البريدية. 4- خدمة البريد الدعائي. 5- خدمة تقديم بطاقات، أو كروت، أو قسائم مسبقة الدفع. 6- محطات الطرود. 7- خدمة البريد الرسمي. 8- أي خدمة أو نشاط ترى الهيئة دخولها في نطاق الخدمات البريدية، وذلك بالاتفاق مع الهيئة العامة للنقل فيما يتصل باختصاصاتها المقررة نظاماً، وبما لا يخالف أحكام النظام. الترخيص: وثيقة تصدرها الهيئة لشخص؛ لتقديم الخدمات البريدية وفقاً للنظام
    واللائحة. مقدم الخدمة: من يقدم الخدمات البريدية بناءً على ترخيص، أو تسجيل، أو إعفاء. التسجيل: تقييد معلومات مقدم الخدمة، ونوع الخدمة التي يقدمها لدى الهيئة. الإعفاء: وثيقة تصدرها الهيئة لمقدم الخدمة؛ لتقديم بعض الخدمات البريدية دون الحصول على ترخيص، أو بالإعفاء من شرط أو أكثر من شروط الترخيص. المستفيد: من يستفيد من أي من الخدمات البريدية. الخدمة الشاملة: توفير الحد الأدنى من الخدمات البريدية بنوعية وأجر مناسبين لجميع المستفيدين. حق الاستخدام الشامل: إتاحة الفرصة لجميع المستفيدين في المملكة للاستفادة من الخدمة الشاملة. المشغل الوطني: مقدم الخدمة المنوط به تقديم الخدمة الشاملة. الرسائل: أي شكل من أشكال المعلومات المكتوبة التي لها صفة التراسل، وترسل عن طريق الخدمات البريدية. البطاقات البريدية: قطع من الورق المقوى، مخصص الجزء الأيمن أو الأعلى منها لكتابة عنوان المرسل إليه، وإجراءات التخليص البريدية واللصائق، والجزء الأيسر أو الأسفل منها مخصص للعبارات التي يريد أن يكتبها المرسل. المطبوعات: الصحف، والمجلات، والكتب، والنشرات، والإعلانات التجارية، والصور الفوتوغرافية، وأوراق أو بطاقات التهنئة
    أو التعزية وما في حكمها. مطبوعات أو مكتوبات المكفوفين: أي أوراق مطبوعة، أو مكتوبة بالأحرف البارزة، أو تسجيلات صوتية، أو أوراق حساسة مخصصة لاستعمال المكفوفين، وترسل مكشوفة. الرزم البريدية: ملفات صغيرة قد تشتمل على أشياء أو أوراق أو مستندات لها صفة التراسل الشخصي، وتغلف بطريقة تمكن من الاطلاع على محتوياتها. البعائث البريدية: تشمل الرسائل، والبطاقات البريدية، والمطبوعات، ومطبوعات ومكتوبات المكفوفين، والرزم البريدية المرسلة عن طريق البريد. الطرود: كل رزمة بريدية، أو علبة، أو كيس، أو صندوق، أو مادة مغلفة أو غيرها؛ تحتوي على سلع أو أشياء ليس لها صفة الرسائل، وتكون وفقاً للشروط والأوصاف التي تضعها الهيئة بالاتفاق مع الهيئة العامة للنقل. المواد البريدية: الطرود، والبعائث البريدية، وما في حكمهما. الحوالات البريدية: تحويل النقود عن طريق البريد بقيمة محددة إلى شخص معين. الخدمات المالية البريدية: أي حوالة بريدية، أو إذن بريدي، أو شيك بريدي أو غيرها من الخدمات المالية. البريد الدعائي: تقديم خدمة الدعاية والإعلان عن طريق البريد. البريد الرسمي: نقل المواد البريدية المرسلة من أي جهة حكومية. صندوق إيداع
    البعائث البريدية: صندوق مخصص لإيداع البعائث البريدية، وما في حكمها، المطلوب إرسالها إلى المستفيدين سواء داخل مكاتب البريد أو خارجها. مكتب البريد: المكان الذي يعده مقدم الخدمة؛ لغرض تقديم الخدمات البريدية. التخليص: استيفاء الأجور المستحقة أو المقررة على المواد البريدية. آلات التخليص البريدي: آلات تستخدم لاستيفاء الأجور المستحقة أو المقررة على المواد البريدية. صندوق البريد الخاص: صندوق مخصص لإيداع البعائث البريدية، وما في حكمها، الواردة إلى المستفيد سواء داخل مكتب البريد أو خارجه. الأجر: ما تعتمده الهيئة لتقديم الخدمات البريدية من قبل مقدمي الخدمة. المقابل المالي: ما تتقاضاه الهيئة مقابل ما تقدمه من خدمات أو إصدار للتراخيص أو تجديدها. المرسل: من يرسل مادة بريدية عن طريق مقدم الخدمة. المرسل إليه: من ترسل إليه المادة البريدية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف النظام إلى تحقيق الآتي: تطوير القطاع وتنظيمه -وفق أحدث الأساليب والتقنيات الحديثة- بشكل يضمن تقديم الخدمات البريدية بأسعار مناسبة وجودة عالية، وتلبية احتياجات المجتمع منها بشكل متطور، ومواكبة المعايير العالمية في هذا المجال. إيجاد المناخ المناسب للمنافسة العادلة والفاعلة. زيادة فاعلية السياسات العامة ذات الصلة بالقطاع وتضافر الجهود بين الجهات العامة والخاصة بما يحقق الحوكمة الفاعلة والعادلة في القطاع. زيادة وسرعة انتشار الخدمات البريدية في التعاملات الحكومية، والخدمات العامة، والعلاقات مع الأفراد، والأنشطة التجارية. المساهمة في نمو التجارة الإلكترونية. تحفيز سوق البريد، وتوفير بيئة جاذبة للاستثمار في القطاع، واستقطاب الشركات الدولية الرائدة في المجالات ذات الأولوية للقطاع، ورفع مستوى عمل منظومة المؤسسات والشركات الوطنية. حماية المصلحة العامة، ومصالح المستفيدين، والمحافظة على سرية المواد البريدية، وأمنها، وسلامتها. تنمية المهارات والكفايات المحلية، وتطوير مستواها، وزيادة مشاركتها في القطاع، وتشجيع الإبداع والابتكار، وريادة الأعمال، والبحث والتطوير للخدمات البريدية،
    وإنشاء أسواق جديدة للبريد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'دون إخلال باختصاصات الجهات الحكومية الأخرى؛ لتحقيق أهداف النظام تتولى الهيئة ما يلي: وضع ضوابط ومعايير أجور الخدمات البريدية وفقاً لوضع سوق البريد، ودرجة المنافسة. تحديد المقابل المالي لفئات التراخيص وتجديدها، والمقابل المالي السنوي لها؛ وفقاً لما يرد في اللائحة، ودون إخلال بحكم المادة (العاشرة) من النظام. اقتراح القواعد، والأسس، والشروط المتعلقة بالخدمة الشاملة، وحق الاستخدام الشامل، ومتابعة تنفيذها بعد الموافقة عليها. إصدار القرارات التنظيمية والقواعد والتعليمات المنظمة لتقديم الخدمات البريدية في القطاع، مع مراعاة الأحكام الواردة في اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجوز لأي شخص تقديم أي من الخدمات البريدية بناءً على ترخيص، أو تسجيل، أو إعفاء من الهيئة؛ وفقاً للإجراءات والمتطلبات التي تحددها اللائحة. وبالنسبة للطرود فيشترط قبل ذلك الحصول على الترخيص اللازم من الهيئة العامة للنقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تمنح الهيئة رخصة المشغل الوطني، وتحدد نطاق خدمات الترخيص وشروطه، ويعتمد الترخيص من الوزير، وله أن يفوض الهيئة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: دون إخلال بأي نظام آخر؛ يجوز لمقدم الخدمة تقديم الخدمات المالية البريدية، وذلك بعد الحصول على ترخيص من البنك المركزي السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تحدد اللائحة الآتي: الخدمات البريدية التي تتطلب الترخيص، أو التسجيل، أو الإعفاء. التراخيص اللازمة لتوفير أنواع الخدمات البريدية ونطاقها، وتحديد الخطة الزمنية لإطلاقها. الشروط التي تطبق على أنواع التراخيص والسجلات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: لا يجوز لمقدم الخدمة نقل ترخيصه ولا التنازل عنه لشخص آخر ولا نقل ملكية المنشأة المرخص لها، سواء عن طريق البيع أو الرهن أو أي طريق آخر، إلا بعد الحصول على موافقة مكتوبة من الهيئة؛ وفقاً للضوابط والإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للهيئة أن تطلب أي معلومة من مقدم الخدمة، ولها أن تطلع على ما لديه من مستندات، أو فواتير، أو إيصالات، أو وثائق متعلقة بالخدمات البريدية، ولا يحق له رفض، أو تأجيل، أو إعاقة تنفيذ الطلب بأي شكل من الأشكال. ولها كذلك أن تطلب أي معلومة من كل من يتعاقد مع مقدم الخدمة بوصفه موزعاً له، أو مقدماً لخدماته من الباطن، وأي شخص من ذوي العلاقة ممن يتيح لهم النظام تقديم تلك الخدمات. وتحدد اللائحة الإجراءات والضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يحدد المقابل المالي لفئات التراخيص، وتجديدها، والمقابل المالي السنوي لها بالاتفاق مع وزارة المالية ومركز تنمية الإيرادات غير النفطية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: دون إخلال بنظام المنافسة، على مقدم الخدمة الحصول على موافقة الهيئة قبل القيام بالمشاركة في أي عملية استحواذ، أو اندماج تؤدي إلى جعل مقدم الخدمة مهيمناً داخل السوق السعودية سواء كانت العملية داخل السوق السعودية، أو خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعد المادة البريدية قبل تسليمها إلى المرسل إليه -وفقاً لأحكام النظام واللائحة- ملكاً للمرسل، ويجوز له أن يطلب استردادها، أو إجراء تصحيح، أو تعديل على عنوان المرسل إليه بمقابل مالي، وفقاً للضوابط المقرة باللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يجوز لمقدم الخدمة فرض أجر على (المرسل أو المرسل إليه) ولا تحصيله من أي منهما، لقاء إرسال المواد البريدية، أو تسلّمها، ما عدا الأجور التي اعتمدتها الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'على مقدم الخدمة الحصول على موافقة الهيئة كتابة -وفقاً لما يقتضيه النظام واللائحة- قبل القيام بما يأتي: إقرار شروط، أو إجراءات تقديم الخدمات البريدية الموكول إليه تقديمها. إضافة أجور أخرى على الخدمات البريدية. إبرام العقود مع الغير لأداء بعض الخدمات المرخص له تقديمها. التعامل مع أي منشأة بريدية، أو أي وكالة، أو منظمة دولية معنية بشؤون البريد؛ للقيام بأي ترتيبات تتعلق بتقديم الخدمات البريدية المرخص له بتقديمها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: دون إخلال بأحكام الأنظمة النافذة في المملكة؛ يحظر إرسال، أو نقل أي مادة بريدية تمس سمعة الدولة، أو أمنها، أو تخالف النظام العام، أو تتنافى مع الأخلاق، أو الآداب العامة، أو تحتوي على مواد مصنفة وفق الأنظمة المعمول بها في المملكة على أنها ممنوعات. وتعد الهيئة قائمة بالمواد المحظورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'على مقدم الخدمة التحفظ على المادة البريدية، والمبادرة بإبلاغ الجهات المختصة في الأحوال الآتية: عند احتوائها أو الاشتباه في احتوائها على محتويات تمس سمعة الدولة أو أمنها، أو تخالف النظام العام، أو إذا كانت تتنافى مع الأخلاق أو الآداب العامة، أو إذا كانت تحتوي على مواد مصنفة وفق الأنظمة المعمول بها في المملكة على أنها ممنوعات. عند تقديم طلب رسمي من أي جهة حكومية مختصة؛ لأسباب تتعلق بالأمن، أو السلامة، أو المصلحة العامة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجب على مقدم الخدمة حفظ المادة البريدية في حال تعذر تسليمها. وتبين اللائحة مدد الحفظ، وإجراءات التعامل معها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: للمستفيد الحق في الاستعلام عن حالة المواد البريدية المرسلة خلال مدة تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: على من تسلّم أي مادة بريدية لا تخصه، أو عثر عليها، أو تسلّمها على وجه مخالف لأي من أحكام النظام أو اللائحة؛ أن يبلغ مقدم الخدمة فوراً بذلك، ويسلمها إليه، وعلى مقدم الخدمة استرداد تلك المادة. وتحدد اللائحة الإجراءات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: لمقدم الخدمة استخدام جميع طرق التخليص. وتضع الهيئة الضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يتحمل المرسل أجور إرسال المادة البريدية، ويجوز أن يتحملها المرسل إليه وفق الإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تصدر الهيئة الطوابع البريدية بجميع فئاتها، وأنواعها، وأشكالها، وأوصافها، وألوانها، وأقيامها، وذلك بعد موافقة رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'يعد مقدم الخدمة مسؤولاً عن التأخر، أو الخطأ في تسليم أي مادة بريدية، أو فقدها، أو تلفها؛ من وقت تسلمها، أو إيداعها في صندوق إيداع البعائث البريدية إلى أن يتحقق أي من الإجراءات الآتية: إيصالها إلى عنوان المرسل إليه. تسليمها إلى المرسل إليه بأي وسيلة أخرى معتمدة من الهيئة. إيداعها في صندوق البريد الخاص بالمرسل إليه. إعادتها إلى عنوان المرسل إذا تعذر إيصالها إلى المرسل إليه. اتخاذ الإجراءات اللازمة إذا كانت غير قابلة للتسليم، بناءً على أحكام النظام واللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'لا يعد مقدم الخدمة مسؤولاً في الحالات الآتية: خطأ المرسل، أو إهماله. التلف الذاتي للمادة البريدية بسبب طبيعة محتوياتها. القوة القاهرة المؤدية إلى تلف المادة البريدية، أو تلف مستنداتها الرسمية التي تساعد على الاستدلال على مصير المادة البريدية. إذا تبين أن محتويات المادة البريدية مما يمنع إرساله بناءً على النظام، أو اللائحة، أو أي من الأنظمة الأخرى، أو الاتفاقيات الدولية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: دون إخلال بمسؤولية مقدم الخدمة، يتحمل المرسل المسؤولية عن أي ضرر يقع بسبب المادة البريدية؛ نتيجة لعدم الالتزام بأحكام النظام أو اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: دون إخلال بأحكام أي نظام آخر، يلتزم مقدم الخدمة بالمحافظة التامة على سرية البيانات الشخصية للمستفيدين، ولا يجوز جمع تلك البيانات، ولا تمريرها، ولا استخدامها في غير ما خصصت له، وتعد المواد البريدية والمعلومات المتعلقة بها مصونة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يتولى مفتشون -يصدر بتسميتهم قرار من المحافظ- مجتمعين أو منفردين ضبط مخالفات أحكام النظام واللائحة، والتحقيق فيها. وتحدد اللائحة قواعد وإجراءات عملهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: على المسؤولين والعاملين في الأماكن المراد تفتيشها تمكين المفتشين من أداء عملهم، وتقديم جميع التسهيلات والمعلومات والوثائق المطلوبة. وعلى المفتشين إبراز بطاقاتهم الوظيفية عند مباشرة اختصاصاتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: للهيئة -عند اللزوم- طلب الاستعانة بالجهات المختصة في حالة الضبط، أو لتنفيذ أي قرار يصدر في حق المخالف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: 'يعد من المخالفات لأحكام النظام القيام بأي من الأفعال الآتية: العبث بأي شكل من الأشكال بصناديق البريد، أو أي ممتلكات، أو وسائل، أو أجهزة، أو معدات، أو مركبات، تستخدم في الخدمات البريدية؛ أو إتلافها. استخدام آلات التخليص البريدية، أو بيعها، أو شراؤها، أو استيرادها، أو حيازتها؛ من دون الحصول على ترخيص من الهيئة. العبث بأي مادة بريدية، أو شعار يتعلق بالخدمات البريدية، أو إتلافها، أو وضع علامة رسمية على أي مادة بريدية بطريقة مخالفة لأحكام النظام، أو العبث، أو تغيير، أو إتلاف، أو إزالة أي علامة رسمية، أو طابع بريدي، أو أي رمز، أو رقم، أو حرف على أي مادة بريدية. الإخلال بما تصدره الهيئة من قواعد، أو قرارات، أو إجراءات، أو الامتناع عن تنفيذ أي منها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها أي نظام آخر، يعاقب كل من يخالف أحكام النظام، أو اللائحة، أو الترخيص بواحدة أو أكثر من العقوبات الآتية: أ - غرامة لا تزيد على (5,000,000) خمسة ملايين ريال. ب - إيقاف الخدمة محل المخالفة. ج - تعليق الترخيص، أو جزء منه، أو المنع من تجديده؛ لمدة لا تزيد على (ثلاث) سنوات. د - تعليق الإعفاء، أو جزء منه، أو المنع من تجديده؛ لمدة لا تزيد على (ثلاث) سنوات. هـ - إلغاء الترخيص، أو الإعفاء. يصدر المجلس -بقرار منه- جدول تصنيف للمخالفات، وتحديد للعقوبات ضمن حدها المنصوص عليه في النظام، يراعى فيه طبيعة كل مخالفة، وجسامتها، والظروف المشددة والمخففة لها. للجنة المنصوص عليها في الفقرة (1) من المادة (الثالثة والثلاثين) من النظام أي مما يلي: أ- فرض غرامة عن كل يوم يستمر فيه المخالف في مخالفته بعد تبليغه بقرار اللجنة، على أن يبدأ احتساب هذه الغرامة من التاريخ الذي يحدده قرار اللجنة. ب- مضاعفة الغرامة في حال تكرار المخالفة نفسها، وتعد المخالفة مكررة إذا وقعت خلال سنة من تاريخ ارتكاب المخالفة التي سبقتها. ج- تضمين القرار -الصادر بتحديد العقوبة- النص على نشر
    منطوقه على نفقة المخالف في صحيفة تصدر في مكان إقامته، فإن لم تكن في مقره صحيفة ففي صحيفة تصدر في أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة المرتكبة، وجسامتها، وآثارها، على أن يكون نشر القرار بعد تحصنه بمضي المدة المحددة نظاماً، أو بصدور حكم في شأنه مكتسب الصفة القطعية. د- تضمين القرار -الصادر بتحديد العقوبة- النص على إلزام المخالف بإزالة المخالفة. هـ- تضمين القرار - الصادر بتحديد العقوبة - النص على إلزام المخالف بإعادة المبالغ التي حصلها نتيجة المخالفة لأصحابها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: عند نشوء أي نزاع بين مقدمي الخدمة، يجوز لأي منهم التقدم للهيئة لطلب تسوية النزاع وديًّا، وذلك بحسب ما تحدده اللوائح، ودون المساس بأي وسيلة أخرى لتسوية النزاعات تنص عليها الاتفاقيات السارية بين أطراف النزاع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يتولى النظر في مخالفات أحكام النظام واللائحة والترخيص، والفصل فيها، وإقرار العقوبات المنصوص عليها في المادة (الحادية والثلاثين) من النظام، لجنة (أو أكثر) تكوَّن من ثلاثة أعضاء على الأقل، على أن يكون من بينهم مختص شرعي، أو نظامي. تشكل اللجنة المشار إليها في الفقرة (1) من هذه المادة بقرار من المجلس لمدة (ثلاث) سنوات قابلة للتجديد مرة واحدة، ويحدد القرار من يتولى رئاستها، على أن يكون من المختصين في الشريعة، أو الأنظمة، وتصدر قراراتها بالأغلبية، وتكون قراراتها مسببة. تُحدد اللائحة قواعد وإجراءات عمل اللجنة ومكافآت أعضائها. يجوز التظلم من قرار اللجنة -المنصوص عليها في الفقرة (1) من هذه المادة- أمام المحكمة الإدارية وفقاً لنظامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: إذا ترتب على العقوبات أو الإجراءات التي تتخذها الهيئة ما يؤثر في تقديم الخدمات البريدية، فعلى الهيئة أن تتخذ الترتيبات المناسبة؛ لضمان استمرار الخدمة متى كان ذلك ضروريًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: تصدر اللائحة بقرار من الوزير بناء على اقتراح من المجلس، وذلك خلال (مائة وثمانين) يوماً من تاريخ نشر النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: ينشر النظام في الجريدة الرسمية، ويكون نافذاً بعد (مائة وثمانين) يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يحل النظام محل نظام البريد، الصادر بالمرسوم الملكي رقم (م / 4) وتاريخ 21 / 2 / 1406ه، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8ca91427-5be7-4807-80ae-adc700a97f0d/1
  verified: false
