regulation:
  code: BOE099
  name_ar: نظام مدينة الملك عبد العزيز للعلوم والتقنية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يُحول المركز الوطني للعلوم والتقنية المنشأ بالمرسوم الملكي رقم (م/61) وتاريخ 20/ 12/ 1405هـ إلى مدينة علمية تُسمى ( مدينة الملك عبد العزيز للعلوم والتقنية ).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يكون لمدينة الملك عبد العزيز للعلوم والتقنية الشخصية الاعتبارية المستقلة وتُلحق إداريًّا برئيس مجلس الوزراء ، ويكون مقرها الرئيسي مدينة الرياض، ويجوز إنشاء فروع لها في المدن الأخرى بالمملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تقوم مدينة الملك عبد العزيز للعلوم والتقنية بدعم وتشجيع البحث العلمي للأغراض التطبيقية وتنسيق نشاطات المؤسسات ومراكز البحوث العلمية في هذا المجال، بما يتناسب مع متطلبات التنمية في المملكة، والتعاون مع الأجهزة المختصة لتحديد الأولويات والسياسات الوطنية في مجال العلوم والتقنية، من أجل بناء قاعدة علمية تقنية لخدمة التنمية في المجالات الزراعية والصناعية والتعدينية وغيرها، والعمل على تطوير الكفايات العلمية الوطنية، واستقطاب الكفايات العالية القادرة لتعمل بالمدينة في تطوير وتطويع التقنية الحديثة لخدمة التنمية في المملكة، وتشتمل هذه المدينة على متطلبات البحث العلمي كالمختبرات ووسائل الاتصالات ومصادر المعلومات، كما تشتمل على جميع المرافق اللازمة للعاملين في المدينة، ولها في سبيل تحقيق أغراضها دون أن يكون في ذلك تحديد لاختصاصاتها القيام بما يلي: 1 - اقتراح السياسة الوطنية لتطوير العلوم والتقنية ووضع الإستراتيجية والخطة اللازمة لتنفيذها.2 - تنفيذ برامج بحوث علمية تطبيقية لخدمة التنمية في المملكة.3 - مساعدة القطاع الخاص في تطوير بحوث المنتجات الزراعية والصناعية التي تتم عن طريقها.4
    - دعم برامج البحوث المشتركة بين المملكة والمؤسسات العلمية الدولية لمواكبة التطور العلمي العالمي سواء عن طريق المنح أو القيام بتنفيذ بحوث مشتركة.5 - تقديم منح دراسية وتدريبية لتنمية الكفايات الضرورية، للقيام بإعداد وتنفيذ برامج البحوث العلمية، وتقديم منح للأفراد والمؤسسات العلمية، للقيام بإجراء بحوث علمية تطبيقية.6 - التنسيق مع الأجهزة الحكومية والمؤسسات العلمية ومراكز البحوث في المملكة في مجال البحوث وتبادل المعلومات والخبرات ومنع الازدواج في مجهوداتها.ولتحقيق ذلك تشكل لجان تنسيق تتكون من خبراء في الأجهزة والمؤسسات الحكومية المتصل عملها بأعمال المدينة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للمدينة هيئة عليا تشكل كما يلي: - رئيس مجلس الوزراء رئيساً - نائب رئيس مجلس الوزراء نائباً للرئيس - وزير الدفاع والطيران والمفتش العام عضواً - وزير التعليم العالي عضواً - وزير الزراعة والمياه عضواً - وزير الصناعة والكهرباء عضواً - وزير البترول والثروة المعدنية عضواً - وزير التخطيط عضواً - وزير المالية والاقتصاد الوطني عضواً - رئيس الاستخبارات العامة عضواً - رئيس مدينة الملك عبد العزيز للعلوم والتقنية عضواً - ثلاثة أعضاء يختارهم رئيس مجلس الوزراء أعضاء'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'الهيئة العليا لمدينة الملك عبد العزيز للعلوم والتقنية هي السلطة المهيمنة على شئون المدينة وتصريف أمورها، ولها أن تتخذ كافة القرارات اللازمة لتحقيق أغراضها في حدود أحكام هذا النظام وللهيئة على وجه الخصوص ما يلي: أ - اعتماد مشروع السياسة الوطنية لتطوير العلوم والتقنية والإستراتيجية والخطة اللازمة لتنفيذها تمهيدًا لرفع ذلك إلى مجلس الوزراء .ب - اعتماد برامج العمل والمشاريع التي تقوم المدينة بتنفيذها.ج - إصدار اللوائح المالية والإدارية التي تسير عليها المدينة واللوائح المنظمة لشئون منسوبيها بعد إعدادها من قبل المدينة بالاشتراك مع وزارة المالية والاقتصاد الوطني والديوان العام للخدمة المدنية .د - النظر في التقارير الدورية التي تقدم عن سير العمل في المدينة.هـ - تشكيل لجان التنسيق المنصوص عليها في الفقرة (6) من المادة الثالثة وتحديد مهامها. و - الموافقة على مشروع ميزانية المدينة السنوية.وللهيئة العليا تكوين لجان دائمة أو مؤقتة من بين أعضائها أو من غيرهم لدراسة ما تكلفهم به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تجتمع الهيئة العليا للمدينة برئاسة الرئيس أو نائبه أو من يفوضه، ولا يكون اجتماع الهيئة نظاميًّا إلا بحضور أغلبية الأعضاء، وتصدر القرارات بموافقة أغلبية الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للمدينة رئيس يعين بأمر ملكي ، كما يكون له نائب أو أكثر يعين بقرار من مجلِس الوزراء
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: رئيس المدينة هو المسئول التنفيذي عن إدارة المدينة في حدود ما يقضي به هذا النظام وما تقرره الهيئة العليا،ويتولى رئيس المدينة الاختصاصات الأخرى الموكولة إليه في هذا النظام أو في قرارات الهيئة العليا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: أ - تسري على منسوبي المدينة أنظمة ولوائح الخدمة المدنية في الأمور التي لا يتم تنظيمها بموجب اللوائح التي تصدر وفقًا للفقرة (ج) من المادة الخامسة من هذا النظام.ب - وفي كل الأحوال يخضع موظفو المدينة السعوديون لنظام التقاعد المدني، كما يخضع عمال المدينة لنظام العمل والعمال ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يكون للمدينة ميزانية سنوية مستقلة، ويجوز للمدينة أن تضع ميزانية لبرامجها تزيد مدتها عن سنة وفقًا لما تتطلبه المُدة التقديرية لتنفيذ تلك البرامج، وتتكون أموال المدينة من: 1 - الاعتمادات التي تخصص لها في ميزانية الدولة.2 - الدخل الذي تحققه المدينة من ممارسة النشاط الذي يدخل ضمن اختصاصاتها.3 - الهبات والإعانات والمنح والوصايا التي تقبلها المدينة وفقًا للقواعد التي تضعها الهيئة العليا.4 - الموارد الأخرى التي تقرر الهيئة العليا للمدينة إضافتها إلى أموال المدينة.وتوضع أموال المدينة في حساب مستقل، ويتم الصرف منها وفق اللائحة المالية للمدينة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الحادية عشر
  article_text_ar: تبدأ السنة المالية للمدينة مع السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الثانية عشر
  article_text_ar: يقدم رئيس المدينة الحساب الختامي للمدينة وتقريرًا سنويًّا عن أعمالها، وذلك خلال ثلاثة أشهر على الأكثر من تاريخ إنتهاء السنة المالية إلى الهيئة العليا تمهيدًا لرفعهما إلى مجلس الوزراء ، كما يزود ديوان المراقبة العامة بنسخة من التقرير السنوي والحساب الختامي للمدينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يكون للمدينة مراقب مالي يعين من قبل الهيئة العليا للقيام بالرقابة السابقة على الصرف وذلك وفقًا لما تقرره اللوائح المالية للمدينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المدينة تعين الهيئة العليا مراقبًا أو أكثر للحسابات من الأشخاص الطبيعيين الذين تتوفر فيهم شروط مراجعي حسابات الشركات المساهمة ، وتحدد الهيئة العليا مكافأته، ويكون له حقوق مراقب الحسابات في الشركات المساهمة وعليه واجباته، وفي حالة تعدد المراقبين يكونون مسئولين بالتضامن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: أ - تستمر الصلاحيات المخولة لرئيس المركز طبقًا لنظام المركز الصادر بالمرسوم الملكي رقم م/60 وتاريخ 18/ 12/ 1397هـ لرئيس المدينة حتى تُصدر الهيئة العليا لائحة التنظيم الإداري للمدينة واللوائح المالية والإدارية الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تُعفى المدينة من جميع أنواع الضرائب والرسوم الجمركية على المعدات والآلات التي تستوردها خصيصًا لنشاطها العلمي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يُلغي هذا النظام نظام المركز الوطني للعلوم والتقنية الصادر بالمرسوم الملكي رقم م/61 في 20/ 12/ 1405هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يُنشر هذا النظام في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4033de9e-45f5-406f-9b3c-a9a700f1fbf0/1
  verified: false
