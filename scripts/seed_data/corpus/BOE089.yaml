regulation:
  code: BOE089
  name_ar: نظام سلامة المنتجات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمامها، ما لم يقتضِ السياق غير ذلك: النظام: نظام سلامة المنتجات. اللوائح: اللائحة التنفيذية للنظام، وغيرها من اللوائح التي تصدر بموجب أحكامه. الهيئة: الهيئة السعودية للمواصفات والمقاييس والجودة. المجلس: مجلس إدارة الهيئة. المحافظ: محافظ الهيئة. اللجنة: لجنة النظر في مخالفات أحكام النظام واللوائح. مراقبة الأسواق: أي مهمة تباشرها الجهات المختصة؛ للتحقق من توافق المنتجات مع أحكام النظام واللوائح. الجهات المختصة: الجهات المسؤولة عن مراقبة الأسواق وفقاً لأحكام النظام واللوائح. المنتج: أي منتج يُوضع أو يُعرض في الأسواق. فئة المنتج: مجموعة من المنتجات التي تشترك معاً في صفات وخصائص محددة. الوضع في الأسواق: وضع المُنتَج في الأسواق. العرض في الأسواق: أي إمداد أو إعلان لمُنتَج بهدف التوزيع أو الاستهلاك في إطار نشاط تجاري سواء كان ذلك بمقابل مادي أو بدون مقابل. المستهلك: شخص طبيعي أو اعتباري يستخدم منتجًا. سلسلة الإمداد: جميع المراحل التي يمر بها المنتج؛ وصولاً للاستخدام النهائي. الصانع: شخص طبيعي أو اعتباري
    يقوم بتصنيع مُنتَج، أو يوكل تصنيعه إلى شخص طبيعي أو اعتباري آخر ثم يقوم بتسويقه تحت اسمه أو تحت علامته التجارية. الممثل المعتمد: شخص طبيعي، أو شخص اعتباري تم تأسيسه في المملكة؛ حصل على تفويض من الصانع خارج المملكة للتصرف نيابة عنه وفق الإجراءات النظامية. المستورد: شخص طبيعي أو اعتباري يستورد منتجاً من خارج المملكة العربية السعودية إلى أحد أسواقها. الموزع: شخص طبيعي أو اعتباري في سلسلة الإمداد -غير الصانع والمستورد- يعرض المنتج في الأسواق، أو يقدم في مجال النشاط التجاري ما لا يقل عن خدمتين من الخدمات الآتية: (التخزين في المستودع، والتغليف، وتحديد العنوان، وتجهيز الإرسالية) دون أن يكون مالكاً للمنتج. ولا يشمل الموزع من يقدم أيّاً من الخدمات الآتية: )الخدمات البريدية، وخدمات توصيل الطرود، وخدمات نقل البضائع). المشغل الاقتصادي: الصانع، والممثل المعتمد، والمستورد، والموزع. اللوائح الفنية: اللوائح المعتمدة من المجلس، التي تضع المتطلبات والمتطلبات الأساسية التي تطبق على منتج محدد أو فئة منتج بصفة إلزامية وفقاً لأحكام النظام. المتطلبات: جميع القواعد والوسائل والإجراءات التي يجب الالتزام بها
    وفقاً لأحكام النظام، وتشمل المتطلبات الأساسية. المتطلبات الأساسية: المتطلبات والنتائج ذات الصلة بالسلامة والصحة والبيئة التي يجب تحقيقها، أو ذات الصلة بالخطر والمخاطر التي يجب التعامل معها. المواصفة: وثيقة معتمدة تضع القواعد والتعليمات أو الخصائص للمُنتجَات أو العمليات وطرق الإنتاج ذات العلاقة، ولا يكون التقيد بها إلزاميًّا. المواصفة السعودية: المواصفة المعتمدة من المجلس، والتي تعتبر المواصفة الوطنية للمملكة. المواصفة الوطنية: المواصفة التي تبناها جهاز تقييس في إحدى الدول. المواصفة الإقليمية: المواصفة التي تبناها جهاز تقييس إقليمي. المواصفة الدولية: المواصفة التي تبناها جهاز تقييس دولي. تقويم المطابقة: التأكد من أن المنتج أو الخدمة أو العملية أو الإجراء متوافق مع المتطلبات والمتطلبات الأساسية. إجراءات تقويم المطابقة: الإجراءات المستخدمة لتقويم المطابقة، والتي تشمل أنشطة المعايرة والاختبار ومنح الشهادات والتفتيش. الجهات المقبولة: هي جهات تقويم المطابقة التي تم قبولها من الهيئة وفقاً لأحكام النظام واللوائح. إقرار المطابقة: وثيقة تصدر من المسؤول عن وضع المنتج في السوق قبل وضعه، يشهد فيها
    تحت مسؤوليته أن المنتج مستوفٍ للمتطلبات. مؤشر المطابقة: إجراء يحدد نسبة المنتجات المطابقة في الأسواق مع جميع الالتزامات المعمول بها والمتطلبات الأساسية. الخطر: أي خاصية أو عمل أو إغفال يشكل أو يحتمل أن يشكل خطراً على سلامة المستهلك في الأسواق أو على الممتلكات أو على البيئة. المخاطر: الجمع بين احتمال حدوث الخطر وشدته، بما في ذلك الحالات التي قد لا تكون فيها الآثار ظاهرة أو فورية. تقييم المخاطر: عملية تحديد أي خطر يمثله منتج ما والخطوات التي يجب اتخاذها لمنع هذا الخطر أو إزالته أو الحد منه أو التحكم فيه. المخالفة الجسيمة: المخالفة التي من شأنها أن تؤدي إلى وقوع ضرر جسيم على صحة المستهلك أو سلامته أو الممتلكات أو البيئة. المفتش: من يعين بقرار من المجلس لضبط أي مخالفات لأحكام النظام واللوائح. نظام التتبع: نظام يتيح تحديد وتتبع المنتج، والمشغل الاقتصادي المشارك في سلسلة الإمداد الخاصة به. ويشمل ذلك تطوير حلول إلكترونية ووضع ملصق على المنتج أو عبوته أو مستندات مصاحبة في حال تعذر وضعه على المنتج. الإجراءات التصحيحية: الإجراءات المتخذة لمنع أو تقليل أو إزالة الخطر المؤثر في السلامة. استدعاء
    المنتج: إجراء يهدف إلى استرجاع المنتجات التي سبق وضعها أو عرضها للمستخدم النهائي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف النظام إلى حماية المستهلك من خلال منع الخطر المرتبط بالمنتجات التي توضع أو تعرض في أسواق المملكة، وبيان أسلوب التعامل مع الخطر والمخاطر المرتبطة بتلك المنتجات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تطبق أحكام النظام على جميع المنتجات، وتشمل المنتجات المتداولة من خلال الوسائل الإلكترونية؛ عدا المنتجات المسند اختصاصها إلى الهيئة العامة للغذاء والدواء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تراعى المبادئ الآتية عند تطبيق أحكام النظام: عدم التمييز بين المنتجات المحلية والمستوردة، التي توضع أو تعرض في الأسواق، فيما يتصل بالإلزام باللوائح الفنية. تناسب المتطلبات والإجراءات التصحيحية والعقوبات التي تقرر وفقًا للنظام مع شدة الخطر وخطورة المخالفة. التنسيق الفعال والتعاون بين جميع الجهات ذات العلاقة بتطبيق النظام. الشفافية في تطبيق أحكام النظام، وإشراك جميع أصحاب المصالح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تحظر صناعة المنتجات غير الآمنة أو استيرادها أو تسويقها أو تداولها أو الإعلان عنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يكون المنتج آمنًا إذا كان استخدامه -في ظل ظروف الاستخدام العادية- لا يمثل خطرًا، أو يمكن أن تنشأ عنه مخاطر مقبولة ومتوافقة مع مستويات السلامة المحددة -التي تضمن المحافظة على سلامة المستهلك والممتلكات والبيئة- وتوافر فيه جميع المتطلبات الأساسية وكان متوافقاً مع اللوائح الفنية. في حال عدم وجود متطلبات أساسية أو لوائح فنية ذات صلة، فإن المنتج يُعد آمنًا إذا كان مطابقًا للمواصفات السعودية -في حال توافرها- أو للمواصفات الإقليمية أو الدولية ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'عند تقييم ما إذا كان المنتج في الأسواق آمنًا، يجب أن يراعى الآتي: خصائص المنتج -بما في ذلك تكوينه- وتعليمات استخدامه وتركيبه وإصلاحه. تأثير المنتج في المنتجات الأخرى في حال استخدامه معها. طريقة عرض المنتج، وبيان معلوماته، وتعليمات وتحذيرات استخدامه، وتعليمات التخلص منه، وغيرها من المؤشرات والمعلومات المتعلقة به. المستهلك الذي قد يتعرض لخطر عند استخدام المنتج. توقعات المستهلك المشروعة -المتعلقة بالسلامة- لاستخدام المنتج.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: لا تعد إمكانية تحقيق مستويات أعلى من السلامة للمنتج، أو إمكانية الحصول على منتج آخر أقل خطرًا؛ سببًا كافيًا لاعتبار المنتج غير آمن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يجب على كل من الصانع والممثل المعتمد والمستورد -المسؤول عن وضع المنتج في الأسواق- ما يأتي: التأكد من أن المنتج آمن أو يفترض أنه آمن. التأكد من أن المنتج يتوافق تمامًا مع أحكام اللوائح الفنية والمتطلبات التي تنطبق على المنتج، بما في ذلك المتطلبات الأساسية. تقييم المخاطر المحتملة في المنتج تقييمًا كافيًا لتمكين نفسه من اتخاذ الإجراءات التصحيحية المناسبة. وتحدد إجراءات عمليات تقييم المخاطر وفقًا للوثائق الإرشادية الصادرة من الهيئة. تقديم ما يثبت أن المنتج آمن عند طلب الجهات المختصة، بما في ذلك مطابقته -عند الاقتضاء- للوائح الفنية أو المواصفات ذات الصلة، والإجراءات التصحيحية التي اتُّخذت لضمان سلامة المنتج. وتحدد اللوائح مسؤوليات وواجبات كل من الصانع والممثل المعتمد والمستورد وفقًا لما جاء في حكم هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجب على الصانع والممثل المعتمد والمستورد تزويد المستهلك بجميع المعلومات حول الخطر المرتبط بالمنتج، والتي لا تكون واضحة له، وذلك بما يمكن من اتخاذ الاحتياطات اللازمة لدرء ذلك الخطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يجب على الصانع والممثل المعتمد والمستورد أن يضع على المنتج: اسمه الشخصي أو اسمه التجاري أو علاماته التجارية، وتفاصيل الاتصال به. وتحدد اللوائح شروط وكيفية وضع هذه البيانات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجب على الصانع والممثل المعتمد والمستورد اتخاذ الترتيبات اللازمة للبقاء على اطلاع بالمخاطر التي قد يسببها المنتج الذي يوضع من قبلهم في الأسواق، واتخاذ الإجراءات التصحيحية المناسبة التي تتضمن تحذير المستهلك واستدعاء المنتج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'يجب على الموزع -في حدود نشاطه- ما يأتي: العمل بعناية تامة للمساعدة في ضمان الالتزام بالمتطلبات. عدم عرض المنتجات -في الأسواق- التي يعلم أو يفترض أن يعلم بناء على المعلومات التي في حوزته أو بصفته المهنية أنها لا تتوافق مع المتطلبات. المشاركة في نقل المعلومات المتعلقة بمخاطر المنتج، وحفظ وتقديم الوثائق اللازمة لتعقب منشأ المنتج، والتعاون في تنفيذ الإجراءات التصحيحية التي تتخذها الجهات المختصة والمشغل الاقتصادي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: إذا علم المشغّل الاقتصادي -بناءً على ما لديه من معلومات- أو كان من المفترض أن يعلم -بناءً على معلوماته المهنية- بأن المنتج يمثل خطرًا، فعليه إبلاغ الجهات المختصة بذلك على الفور، وأن يقدم لهم معلومات عن الإجراءات التصحيحية التي اتخذها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجب على المشغل الاقتصادي أن يحدد للجهات المختصة أي مشغل اقتصادي آخر قدم له المنتج وأي مشغل اقتصادي آخر سلم له المنتج؛ في حال طلبت الجهات المختصة منه ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: في حال كان للمشغل الاقتصادي نظام تتبع خاص به فيجب ربطه بالهيئة. ويجوز للهيئة أن تطلب منه -في حال لم يكن لديه نظام تتبع خاص به- الالتزام بنظام التتبع الخاص بالهيئة نظير مقابل مالي يصدر بقرار من المجلس وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'يجب أن تتضمن اللوائح الفنية جميع المعلومات والمتطلبات التي يتحقق من خلالها من سلامة المنتج للاستخدام أو الاستهلاك، وأن يكون من بينها ما يأتي: المتطلبات الأساسية والمتطلبات الأخرى التي تنطبق على المنتج أو فئة المنتج. الإحالة للمواصفات السعودية أو الوطنية أو الإقليمية أو الدولية. طريقة تقييم المخاطر التي تنطبق على المنتج أو فئة المنتج. إجراءات تقويم المطابقة على المنتج أو فئة المنتج. نوع وطبيعة المعلومات المقدمة إلى المستهلك. تحديد المحتويات وشكل الوثائق الفنية لإعدادها وتوفيرها. المتطلبات المتعلقة بالمصطلحات والرموز المستخدمة والتعبئة؛ ووضع علامات أو شارات على المنتج.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'يلتزم الصانع والممثل المعتمد والمستورد، الذي يضع في الأسواق منتجًا يخضع للائحة فنية، بما يأتي: تقييم مدى مطابقة المنتج للمتطلبات من خلال تطبيق إجراء تقويم المطابقة؛ وفقًا للوائح أو اللوائح الفنية. تكليف إحدى الجهات المقبولة إذا لزم تدخل جهة تقويم المطابقة في إجراء تقويم المطابقة. أن يعد ملفًّا فنيًّا كاملًا يشتمل على جميع الوثائق اللازمة لإثبات أن المنتج يتوافق مع المتطلبات المنصوص عليها في اللوائح الفنية. إصدار إقرار مطابقة يؤكد فيه -تحت مسؤوليته الخاصة -أن المنتج يتوافق مع جميع المتطلبات، بما في ذلك تلك المنصوص عليها في اللوائح الفنية. وضع شارة المطابقة الوطنية أو الإقليمية على المنتج؛ وفقاً للإجراءات والشروط المنصوص عليها في اللوائح. تحدد اللوائح مسؤوليات وواجبات كل من الصانع والممثل المعتمد والمستورد وفقاً لما جاء في حكم هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: في حال فرضت اللوائح الفنية ذات الصلة بالمنتج تدخل جهة تقويم المطابقة لإجراء تقويم مطابقة محدد؛ فيجب على المسؤول عن وضع المنتج في السوق أن يسند مهمة إجراء تقويم المطابقة إلى إحدى الجهات المقبولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يحق للجهات المختصة الاستعانة بخدمات جهات تقويم المطابقة على أن تكون مقبولة من الهيئة للقيام بإجراء تقويم المطابقة لمنتَج محدد وفقًا لأحكام النظام واللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تلتزم الجهات المقبولة بالمحافظة على السرية المهنية في كل ما يتعلق بالوقائع والممارسات والمعلومات التي تطلع عليها من خلال المهمات الموكولة إليها في إطار القبول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يجب على الجهات المقبولة ألا تفرض أي إجراءات لتقويم المطابقة خلاف تلك المنصوص عليها في اللوائح الفنية. يجب على الجهات المقبولة أن تلتزم بنطاق القبول عند تقديم خدماتها وفق اللوائح الفنية ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تكون جهات تقويم المطابقة مسؤولة عن الخدمات التي تقدمها أو تتعاقد من الباطن من أجل تقديمها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تقوم الجهات المختصة بالمراقبة على الأسواق وفقاً للقواعد والإجراءات والمهمات التي تحددها اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'تتولى الهيئة الآتي: إعداد استراتيجية وطنية لسلامة المنتجات ومراقبة الأسواق، ومتابعة تنفيذها بعد اعتمادها، وتحديثها دوريًّا؛ وفقًا للإجراءات النظامية. التأكد من الالتزام بجميع المتطلبات المفروضة على المشغل الاقتصادي والمتطلبات الأساسية المطبقة على المنتجات الموضوعة والمعروضة في الأسواق. المحافظة على الحد الأدنى لمؤشر المطابقة للمنتجات المعروضة في الأسواق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'يتولى مفتشون -يعينهم المجلس- مجتمعين أو منفردين ضبط مخالفات أحكام النظام واللوائح وإثباتها، ولهم في سبيل ذلك الآتي: الدخول -في أي وقت- لمنشآت المشغل الاقتصادي وما يلحق بها من مستودعات وأماكن تخزين أو وسائل نقل أو غيرها، وتفتيشها. تحرير محاضر الضبط لإثبات المخالفات. استدعاء أطراف المخالفة، وسماع أقوالهم، وضبطها وإثباتها في محضر. إغلاق مكان وقوع المخالفة -في الحالات الضرورية التي تستلزم ذلك بناءً على ما تحدده اللوائح- إلى حين استكمال إجراءات الضبط. التحفظ على المنتجات المخالفة -أو المشتبه في مخالفتها- لأحكام النظام، وعلى الوثائق المتعلقة بها. الاطلاع على جميع المستندات والسجلات والملفات والشكاوى والفواتير وغيرها من الوثائق، والحصول على نسخ منها. ولا يجوز -بأي حال من الأحوال- حجب أي من تلك الوثائق عنهم. الاحتفاظ -عند الضرورة- بالوثائق وملف المعلومات التي جُمعت لإثبات المخالفة أو التحقيق مع المساهمين أو المشاركين في المخالفة نفسها. سحب عينات من المنتجات من أجل اختبارها من قبل جهة تقويم المطابقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تمنح بقرار من المجلس بناء على اقتراح من المحافظ مكافآت مالية للمفتشين المنصوص عليهم في المادة (السادسة والعشرين) من النظام، وفقًا لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يحظر منع المفتش أو إعاقته عن تأدية أعماله المتعلقة بالتفتيش والضبط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يجب على المفتش المحافظة على سرية المعلومات التي يحصل عليها بحكم عمله. لا تحول المحافظة على سرية المعلومات دون إفصاح الجهات المختصة عن المعلومات اللازمة لضمان مراقبة فعالة للأسواق أو لمنع خطر يهدد سلامة المستهلك والممتلكات والبيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يجوز للهيئة -بالتنسيق مع الجهات المختصة- أن تأمر بإتلاف المنتج المخالف لأحكام النظام بعد صدور حكم نهائي من المحكمة المختصة بمصادرة المنتج محل المخالفة، على أن تتم عملية الإتلاف من قبل لجنة أو أكثر تشكل لهذا الغرض. ويتحمل المخالف تكاليف عملية الإتلاف. وتحدد اللائحة كيفية تشكيل هذه اللجنة وآلية عملها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يُعد الصانع مسؤولًا عن كل ضرر ينتج عن خلل موجود في المنتج الذي قام بوضعه في السوق. وتحدد اللوائح الخلل الموجب لقيام المسؤولية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'يعد صانعًا للمنتج كلٌّ من: الصانع، وصانع أي مادة أولية، وصانع المنتجات الجزئية، وكل شخص -بوصفه صانعًا- يوضع اسمه أو علامته التجارية أو أي علامة أخرى مميزة على المنتَج. في حال كان مقر الصانع خارج المملكة، يتحمل المستورد أو الممثل المعتمد جميع مسؤولياته وواجباته القانونية. وتحدد اللوائح مسؤوليات وواجبات كل منهما وفقًا لأحكام النظام. في حال تعذر تحديد هوية الصانع أو المستورد المسؤول عن الوضع في السوق حيال الأضرار الناتجة عن خلل موجود في المنتج، فإن جميع المشغلين الاقتصاديين يكونون مسؤولين بالتضامن عن تلك الأضرار ما لم يُكشف خلال أجل معقول عن هوية الصانع أو المستورِد في حال المنتج المستورَد حتى لو كانت هوية الصانع معلومة، وذلك دون إخلال بحق أي مشغل اقتصادي في الرجوع على المشغل الاقتصادي الآخر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 'تشكل لجنة أو أكثر -بقرار من المجلس- من (خمسة) أعضاء، على أن يكون من بينهم (ثلاثة) مستشارين نظاميين -على الأقل- يكون أحدهم رئيسًا لها. تتولى اللجنة الآتي: أ- فرض إجراءات تصحيحية على المشغل الاقتصادي، وذلك وفقًا لما تحدده اللوائح. ب- تطبيق العقوبات المنصوص عليها في الفقرتين الفرعيتين (ب) و(ج) من الفقرة (1) من المادة (الرابعة والثلاثين) من النظام. ج- الطلب من المحكمة المختصة الحكم بمصادرة المنتج محل المخالفة. تصدر اللجنة قراراتها وفقاً للقواعد والإجراءات التي تحددها اللوائح. ويجوز لمن صدر ضده القرار التظلم منه أمام المحكمة الإدارية خلال (ستين) يوماً من تاريخ إبلاغه بالقرار. تحدد مكافآت أعضاء اللجنة بقرار من المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها نظام آخر، يعاقب كل من يخالف أيًّا من أحكام النظام واللوائح بعقوبة (أو أكثر) من العقوبات الآتية: أ- الإنذار. ب- غرامة لا تزيد على عشرة ملايين (10.000.000) ريال. ج- إغلاق المنشأة لمدة لا تزيد على (سنة). يجوز للجنة -المنصوص عليها في المادة (الثالثة والثلاثين) من النظام- تضمين القرار الصادر بالعقوبة النص على نشر ملخصه على نفقة المخالف في صحيفة محلية تصدر في مكان إقامته، فإن لم يكن في مكان إقامته صحيفة ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة المرتكبة وجسامتها وتأثيرها، على أن يكون نشره بعد تحصن القرار بمضي المدة المحددة نظاماً أو كان الحكم الصادر في شأنه مكتسبًا الصفة القطعية. يتولى المحافظ -أو من ينيبه- توقيع عقوبة الإنذار المنصوص عليها في الفقرة الفرعية (أ) من الفقرة (1) من هذه المادة، وعقوبة الغرامة المنصوص عليها في الفقرة الفرعية (ب) من الفقرة (1) من هذه المادة التي لا يتجاوز مقدارها (عشرة) آلاف ريال؛ على من يخالف أحكام النظام واللوائح بناءً على توصية من المفتش. وفي حال إيقاع عقوبة الإنذار على مخالفة
    غير جسيمة فيمنح المشغل الاقتصادي مهلة تصحيحية -وفقًا لما تحدده اللوائح- لمعالجتها قبل إيقاع الغرامة أو إغلاق المنشأة بحسب ما نصت عليه الفقرتان الفرعيتان (ب) و(ج) من الفقرة (1) من هذه المادة. يصدر المجلس -ضمن اللوائح- جدولًا يتضمن الآتي: أ‌- تصنيف المخالفات وما يقابلها من عقوبات -منصوص عليها في الفقرة (1) من هذه المادة- ومقدارها ومدتها، ويراعى فيها التدرج في العقوبة. ب- تصنيف المخالفات وما يقابلها من عقوبة -منصوص عليها في الفقرة (3) من هذه المادة- ومقدارها ويراعى فيها التدرج في العقوبة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يعاقب كل من تسبب عمدًا في وضع أو عرض منتج غير آمن بما من شأنه إلحاق ضرر بالمستهلك بالسجن مدة لا تزيد على (عشر) سنوات. تختص النيابة العامة بالتحقيق والادعاء في المخالفات الواردة في الفقرة (1) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يصدر المجلس اللوائح خلال (تسعين) يوماً من تاريخ نشر النظام في الجريدة الرسمية، ويعمل بها من تاريخ نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يعمل بالنظام بعد (تسعين) يومًا من تاريخ نشره في الجريدة الرسمية، ويلغي ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7f147afb-5a81-4744-a4bf-b1cd00b831ea/1
  verified: false
