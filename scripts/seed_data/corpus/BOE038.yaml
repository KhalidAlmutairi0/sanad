- article_ref: مادة (18) النفاذ
  article_text_ar: يدخل هذا النظام حيز النفاذ بعد مضي ثلاثين يوما من تاريخ إيداع وثيقة تصديق الدولة العضو الرابعة لدى الأمانة العامة . حُرِّر هذا النظام باللغة العربية في مدينة ........بدولة .......بتاريخ ...........14 هـ الموافق ......./...../.200م من أصل واحد يودع بالأمانة العامة وتسلم نسخة مطابقة للأصل لكل دولة من الدول الأعضاء .
