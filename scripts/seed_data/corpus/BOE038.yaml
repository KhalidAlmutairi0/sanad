articles:
- article_ref: مادة (1) تعريفات
  article_text_ar: 'لأغراض هذا النظام يكون للعبارات والمصطلحات التالية المعاني المبينة قرين كل منها ما لم يقتض السياق معنى آخر: 1 - مجلس التعاون : مجلس التعاون لدول الخليج العربية . 2 - الأمانة العامة : الأمانة العامة لمجلس التعاون لدول الخليج العربية . 3 - الدولة العضو : الدولة العضو في مجلس التعاون. 4 - المركز: مركز المعلومات الجنائية لمكافحة المخدرات لمجلس التعاون لدول الخليج العربية . (GCC Criminal Information Center to Combat Drugs (GCC-CICCD 5 - النظام : النظام الأساسي للمركز. 6 - المجلس : مجلس إدارة المركز . 7 - السلطات المختصة : هي الأجهزة المعنية في الدول الأعضاء بمكافحة المخدارت والاتجار غير المشروع بها والمؤثرات العقلية والسلائف الكيميائية والجرائم المنظمة ذات الصلة. 8 - المدير: مدير المركز. 9 - ضابط الاتصال: ممثل السلطة المختصة التابعة للدولة العضو الذي يكون موظفا لدى تلك السلطة ويجري إعارته للمركز بغرض إقامة الاتصال بين تلك السلطة في الدولة المعيرة والمركز. 10 - المعلومات : هي أية معلومات مستمدة من عمليات المراقبة والتحريات و المعلومات المرجعية والتحليلية والإحصائية وسائر المعلومات
    المتعلقة بالاتجار غير المشروع بالمخدرات والجرائم الأخرى ذات الصلة. 11 - تبادل المعلومات : حصول الدول الأعضاء والمركز والدولة أو المنظمة التي منحت صفة المراقب على المعلومات المستمدة من التحريات. 12 - قاعدة بيانات المركز : قاعدة البيانات المركزية التابعة للمركز. 13 - المراقب : دولة أو منظمة دولية متخصصة لا تكون طرفا في هذا النظام، وتمنح صفة المراقب لدى المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (2) الإنشاء
  article_text_ar: 'ينشأ بمقتضى هذا النظام مركز يسمى: مركز المعلومات الجنائية لمكافحة المخدرات لمجلس التعاون لدول الخليج العربية (GCC Criminal Information Center to Combat Drugs ( GCC-CICCD ويتمتع بالشخصية القانونية الدولية المستقلة في حدود الأهداف والمهام المنصوص عليها في هذا النظام'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (3) مقر المركز
  article_text_ar: 1- يتخذ المركز من مدينة الدوحة عاصمة دولة قطر مقرا له.2- تحدد شروط استضافة دولة قطر للمركز في اتفاق المقر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (4) أهداف ومهام المركز
  article_text_ar: 'يهدف المركز إلى تطوير التعاون والتنسيق وتعزيزه بين الدول الأعضاء في مجال مكافحة الاتجار غير المشروع بالمخدرات والمؤثرات العقلية والسلائف الكيميائية وأشكال الجريمة المنظمة الأخرى ذات الصلة وفقا لقواعد القانون الدولي والاتفاقات الدولية النافذة في هذا الشأن من خلال ما يلي: 1- تنسيق ما تبذله الدول الأعضاء من جهود في مجال مكافحة الاتجار غير المشروع بالمخدرات والمؤثرات العقلية والسلائف الكيميائية. 2 - تسهيل القيام بعمليات وتحريات مشتركة بما فيها عمليات التسليم المراقب والتنسيق مع الجهات المختصة. 3 - جمع المعلومات عن الاتجار غير المشروع بالمخدرات والمؤثرات العقلية والسلائف الكيميائية وتخزين هذه المعلومات وتحليلها وتنظيم تبادلها. 4 - تعزيز التعاون بين السلطات المختصة بالدول الأعضاء على مكافحة الجريمة المنظمة عبر الوطنية المرتكبة بالاتجار غير المشروع بالمخدرات والمؤثرات العقلية والسلائف الكيميائية . 5 - تقديم المساعدة في مجال تنفيذ برامج مكافحة المخدرات إلى السلطات المختصة بالدول الأعضاء وغيرها من الدول التي أبرم معها المركز اتفاقات في ذات المجال والتي تستخدم أراضيها في الاتجار
    والنقل غير المشروعين للمخدرات والمؤثرات العقلية والسلائف الكيميائية . 6 - المساعدة في توحيد نظم تبادل المعلومات بما فيها قواعد بيانات السلطات المختصة بالدول الأعضاء. 7 - تقديم المساعدة في مدى مواءمة الإطار القانوني والتنظيمي لدى الدول الأعضاء فيما يتعلق بمراقبة المخدرات. 8 - إجراء دراسات تحليلية لمشكلة المخدرات في الدول الأعضاء وفي المنطقة ووضع التوصيات المناسبة في هذا الخصوص. 9- التعاون مع المنظمات الدولية .10 - العمل على تطوير وتأهيل الكوادر العاملة لدى السلطات المختصة بالدول الأعضاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (5) أجهزة المركز
  article_text_ar: 'يتكون المركز من الأجهزة التالية: 1 - مجلس الإدارة. 2 - الجهاز الفني والإداري. ويجوز لكل من الجهازين المشار إليهما إنشاء أجهزة فرعية أخرى عند الحاجة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (6) مجلس الإدارة
  article_text_ar: '1 - التشكيل: يتكون المجلس من مديري السلطات المختصة وضباط الاتصال من كل دولة. 2 - الاختصاصات: المجلس هو السلطة العليا للمركز، ويختص باعتماد السياسية العامة التي يسير عليها المركز.وله في سبيل ذلك القيام بما يلي: 1 - اعتماد الخطط الاستراتيجية للمركز والخطط الطويلة المدى والسنوية المتضمنة نشاطات ومشاريع المركز.2 - تعيين المدير وإنهاء خدماته وتفويض بعض صلاحياته. 3 - اعتماد شعار المركز وعمله. 4 - اعتماد إجراءات الحفاظ على سرية المعلومات . 5 - اعتماد التوصيات المتعلقة بتنفيذ أنشطة المركز الرئيسية. 6- اعتماد آليات التعيين في وظائف المركز. 7- اعتماد النظام الداخلي والأنظمة الإدارية والتنظيمية والمالية للمركز. 8- اقتراح الموازنة السنوية للمركز وإعداد الحساب الختامي وعرضهما على أصحاب السمو والمعالي وزراء الداخلية للاعتماد.9- اختيار المدقق المالي وتحديد مكافآته.10 - وضع تنظيم لإجراءات إنشاء قاعدة البيانات المركزية التابعة للمركز وتشغيلها. 3 - الاجتماعات: 1- يعقد المجلس اجتماعا واحدا في السنة في مقر المركز وله أن يعقد اجتماعات أخرى متى ما دعت الحاجة إلى ذلك. 2 - ينعقد المجلس بحضور
    ممثلي أربعة من أعضائه على الأقل ويتخذ قراراته بموافقة أغلبية الثلثين، ويكون لكل دولة صوت واحد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (7) الجهاز الفني والإداري
  article_text_ar: 'يكون للمركز جهاز فني وإداري يتولى تصريف شؤونه الفنية والإدارية والمالية برئاسة مدير وعدد كاف من الموظفين، ويعين المدير لمدة ثلاث سنوات قابلة للتجديد، ويتولى القيام بما يلي: 1 - إعدد الاستراتيجيات اللازمة لتحقيق أهداف المركز وتنفيذها بعد اعتمادها.2 - إعداد الخطط طويلة المدى والسنوية ومتابعة تنفيذها بعد اعتمادها. 3- إعداد مشروع الموازنة السنوية للمركز ومتابعة تنفيذها بعد اعتمادها. 4 - إعداد مشاريع الأنظمة واللوائح الفينة والإدارية والمالية والتنظيمية ومتابعة تنفيذها بعد اعتمادها.5- تعيين موظفي المركز واعتماد قرارات شؤون الموظفين وفق القواعد المعتمدة. 6- تمثيل المركز لدى الغير. 7 - التحضير لاجتماعات مجلس الإدارة وإعداد جدول أعماله. 8 - إعداد التقارير الدورية عن إنجازات المركز. 9 - تنفيذ المهام التي يكلف بها من قبل مجلس الإدارة، ويكون المدير مسئولا أمام مجلس الإدارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (8)
  article_text_ar: يقوم مجلس الإدارة برفع تقارير سنوية عن أعمال المركز لأصحاب السمو والمعالي وزراء الداخلية بدول المجلس عن طريق الأمانة العامة ، تتضمن نشاطاته وإنجازاته وللوزراء إصدار توجيهاتهم إلى مجلس الإدارة لضمان تنفيذ الأهداف والمهام المنوطة بالمركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (9) ميزانية المركز وموارده
  article_text_ar: 'تكون للمركز ميزانية مالية مستقلة من المصادر التالية: 1- المساهمات المالية من الدول الأعضاء. 2 - الإعانات والهبات التي يوافق عليها مجلس الإدارة. 3 - الموارد الأخرى التي يقرها مجلس الإدارة.ويشترط لقبول الإعانات والهبات اعتماد أصحاب السمو والمعالي وزراء الداخلية بدول مجلس التعاون لدول الخليج العربية لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (10) تبادل  المعلومات
  article_text_ar: '1- يجب حماية المعلومات وفقا لما تقرره القوانين الوطنية للدول الأعضاء، ويتم تبادل هذه المعلومات على النحو التالي: - بين الدول الأعضاء بواسطة ضباط الاتصال. - بين الدول الأعضاء والمركز. - بين المركز و المراقبين. 2 - تقرر الدولة العضو بنفسها مقدار ونوع المعلومات التي تتيحها للمركز وكذلك إجراءات استخدام الدول الأخرى لهذه المعلومات . 3- تتبادل الدول الأعضاء المعلومات التحليلية والإحصائية المستخلصة من معالجة المعلومات المتاحة. 4 - تنقل طلبات الحصول على المعلومات عبر قنوات اتصال آمنة. 5 - يتحمل مستخدمو المعلومات التي يتم الحصول عليها في سياق تبادل المعلومات أو من قاعدة البيانات التابعة للمركز المسئولية عن انتهاك إجراءات حماية تلك المعلومات ومعالجتها واستخدامها طبقًا لقوانينهم الوطنية. 6 - تتخذ الدولة العضو التي تطلب منها المعلومات التدابير المناسبة للاستجابة للطلب في الوقت المناسب وتوفر المعلومات المطلوبة في غضون 30 يومًا من تاريخ تلقي الطلب في الأحوال العادية وفي غضون 10 أيام في حالة الاستعجال وعلى الفور في الحالات الطارئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (11) طلبات المساعدة
  article_text_ar: '1- يكون التعاون بين السلطات المختصة للدولة العضو والمركز وفي مجال تنظيم وتوفير المساعدة في العلميات والتحريات المشتركة بما في ذلك عمليات التسليم المراقب مستندا إلى طلبات الدول الأعضاء المهتمة بالمساعدة. 2- يجوز تقديم طلب المساعدة كتابيا أو آليا، وفي الحالات الطارئة تقديم الطلب شفهيا على أن يتم تأكيده كتابيا أو آليا في غضون ثلاثة أيام.3- عند استخدام وسائل تقنية لنقل المعلومات وفي حال عدم التيقن من موثوقية الطلب أو محتواه يجوز للدولة العضو المطلوب منها تقديم هذه المساعدة أن تلتمس تأكيد الطلب إما كتابيا وإما آليا من الدولة العضو التي وجهته. 4- يجب أن يتضمن طلب المساعدة المعلومات التالية: - اسم الدولة العضو صاحبة الطلب. - اسم الدولة العضو المطلوب منها تقديم المساعدة. - بيان نوعية الطلب ودواعيه. - المعلومات الأخرى المطلوبة لتقديم المساعدة. 5 - للدولة العضو التي يطلب منها توفير المعلومات أن تسمح لممثلي الدولة العضو التي تطلب تلك المعلومات بالتواجد في إقليمها شريطة الامتثال لقوانينها أو أنظمتها. 6- في حال تعذر الاستجابة لأحد الطلبات أو رفضه تقوم الدولة العضو الموجه إليها الطلب
    على الفور بإشعار الدولة العضو صاحبة الطلب بذلك الرفض مع بيان أسبابه. 7- يجوز رفض الطلب كليا أو جزئيا إذا اعتقدت الدولة العضو الموجه إليها الطلب أن تلبيته قد يضر بسيادتها وأمنها وسائر مصالحها الحيوية أو إذا كان يتعارض مع قوانينها الوطنية. 8- إذا اعتقدت الدولة العضو الموجه إليها الطلب أن تلبية الطلب بصورة مباشرة قد تعرقل محاكمة جنائية أو إجراءات رسمية أخرى يجري القيام بها في إقليمها جاز لها أن ترجئ تلبية الطلب وتربط تلبيته باستيفاء الشروط التي تم تحديدها بعد التشاور مع الدولة العضو صاحبة الطلب، وإذا وافقت هذه الأخيرة على تلقي المساعدة بهذه الشروط وجب عليها أن تستوفي الشروط المحددة.9- تكفل الدول الأعضاء سرية المعلومات وسرية محتوى المستندات والمواد المتعلقة بمراقبة الاتجار غير المشروع بالمخدرات والمؤثرات العقلية والسلائف الكيميائية التي يجري تبادلها بينها. 10- لا تستخدم الدولة العضو صاحبة الطلب المعلومات التي تتلقاها إلا في الأغراض التي وفرت من أجلها فقط.11- لا يجوز إعطاء المعلومات السرية بما فيها المستندات والمواد لأي شخص كان دون موافقة كتابية من الدولة العضو التي وفرت هذه المعلومات . 12-
    عندما لا تكون المعلومات المطلوبة سرية ينبغي لكلتا الدولتين صاحبة الطلب والموجهة إليها الطلب أن تقرا بذلك وتقبلانه.13- تتحمل كل دولة عضو نفقات تنفيذ الطلب في إقليمها. 14- تتحمل كل دولة عضو جميع النفقات المرتبطة بسفر ممثليها وإقامتهم في أقليم دولة عضو أخرى ما لم تتفق كتابة على خلاف ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (12) نقاط الاتصال
  article_text_ar: تحدد الدول الأعضاء السلطات المختصة و نقاط الاتصال بالمركز، وتزود المركز بها في غضون ثلاثين يوما بعد دخول هذا النظام حيز النفاذ، ويتولى المركز تزويد الدول الأعضاء بها، ويراعى الإبلاغ الفوري بأي تعديلات لاحقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: المادة (13) الامتيازات والحصانات
  article_text_ar: يتمتع المركز طبقا للمادة 2 من هذا النظام بالامتيازات والحصانات المطلوبة لأداء مهامه بالدول الأعضاء استنادا لاتفاقية حصانات وامتيازات دول مجلس التعاون لدول الخليج العربية الموقعة في 9 / 6 /1404هـ الموافق 11 / 2 /1984م
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (14) المراقبون
  article_text_ar: يجوز لمجلس الإدارة أن يمنح صفة المراقب لدولة غير عضو أو لمنظمة دولية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (15) اللغات
  article_text_ar: اللغة العربية هي لغة المركز الرسمية ويجوز عند الاقتضاء استخدام اللغة الإنجليزية أثناء التعاون في مجال العمليات والتعاون الدولي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
  verified: false
- article_ref: مادة (16) أحكام ختامية
  article_text_ar: التعديل يجوز تعديل هذه النظام بإجماع ممثلي الدول الأعضاء ويصبح نافذا طبقا لأحكام المادة 18 من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76988d51-8339-42a8-97d1-a9a700f194dc/1
