regulation:
  code: BOE291
  name_ar: ضوابط إيقاف الخدمات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: 'أولاً: التعريفات'
  article_text_ar: 'الخدمات: جميع الخدمات التي تقدمها الجهات الحكومية، عدا الخدمات المتعلقة بالعلاج والتعليم والعمل، والسجل التجاري، وتوثيق الوقائع المدنية والأوراق الثبوتية. إيقاف الخدمات: إجراء يترتب عليه امتناع جهة حكومية أو أكثر عن تقديم خدمة (أو أكثر) من خدماتها إلى شخص ذي صفة طبيعية أو اعتبارية (أفراد - أعمال). المركز: مركز المعلومات الوطني. المنصة الإلكترونية: المنصة الإلكترونية الموحدة لإيقاف الخدمات. اللجنة: اللجنة الإشرافية على المنصة الإلكترونية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/caca1b4d-f344-444b-a1f3-afce00d6840b/1
  verified: false
- article_ref: 'ثانياً: ضوابط عامة'
  article_text_ar: 'يكون إيقاف الخدمات بناءً على سند نظامي، أو قرار من مجلس الوزراء، أو أمر سامٍ، أو أمر قضائي، أو أمر من النيابة العامة. يكون إيقاف الخدمات من خلال المنصة الإلكترونية. لا يجوز اللجوء إلى إيقاف الخدمات من أجل التبليغ بالحضور لدى الجهات الحكومية. لا توقف الخدمات في أي مرحلة من المراحل المشار إليها في البندين (ثالثًا) و(رابعًا) من هذه الضوابط إلَّا بعد أن تبلّغ اللجنة المعنيّ قبل مدة كافية تحددها، وذلك بوسيلة أو أكثر من الوسائل الآتية: الرسائل النصية، البريد الإلكتروني، الاتصال الهاتفي، منصة أبشر (أفراد - أعمال)، الحسابات الحكومية، العنوان الوطني. تقوم كل جهة حكومية بتصنيف الخدمات التي تقدمها الممكن إيقافها بالنسبة إلى الأفراد وقطاع الأعمال كل على حدة إلى (ثلاث) فئات بحسب الآثار المترتبة على الإيقاف، ويُعتمد التصنيف من قبل اللجنة. تراعي الجهة الحكومية عند تصنيف الخدمات التي تقدمها والتي يمكن إيقافها ألَّا يترتب على الإيقاف ضرر يمتد إلى تابعي الشخص الموقوفة خدماته (أفراد - أعمال) أو غيرهم أو إلى الشركات التي يملكها أو التي يكون شريكًا أو مساهمًا فيها، أو أعضاء مجلس الإدارة أو
    مجلس المديرين أو الشركاء أو المدير التنفيذي أو العاملين فيها، وفي حال ترتب ضرر على أي من المذكورين أعلاه تتم معالجته فورًا بالوسائل المناسبة بما يؤدي إلى إيقاف الضرر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/caca1b4d-f344-444b-a1f3-afce00d6840b/1
  verified: false
- article_ref: 'ثالثاً: ضوابط إيقاف الخدمات للأفراد'
  article_text_ar: 'يكون إيقاف الخدمات للأفراد وفقًا للترتيب الآتي: أ- المرحلة الأولى: إيقاف الخدمات (منخفضة الأثر)، وتشمل: الخدمات الجديدة غير المرتبطة بخدمة قائمة، والخدمات الإضافية التي لا يترتب على إيقافها أثر كبير على الفرد. ب- المرحلة الثانية: إيقاف الخدمات (متوسطة الأثر)، وتشمل: الخدمات التي تحد من الاستفادة من الخدمات غير المؤثرة. ج- المرحلة الثالثة: إيقاف الخدمات (عالية الأثر)، وتشمل: جميع الخدمات التي يمكن إيقافها، على ألَّا يشمل ذلك هوية الفرد. لا تتجاوز مدة إيقاف الخدمات في المرحلتين (الأولى) و(الثانية) المشار إليهما (30) يومًا لكل مرحلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/caca1b4d-f344-444b-a1f3-afce00d6840b/1
  verified: false
- article_ref: 'رابعاً: ضوابط إيقاف الخدمات لقطاع الأعمال'
  article_text_ar: 'يكون إيقاف الخدمات لقطاع الأعمال وفقًا للترتيب الآتي: أ- المرحلة الأولى: إيقاف الخدمات (منخفضة الأثر)، وتشمل: الخدمات الجديدة غير المرتبطة برخصة قائمة، والخدمات الإضافية التي لا يترتب على إيقافها أثر كبير على قطاع الأعمال. ب- المرحلة الثانية: إيقاف الخدمات (متوسطة الأثر)، وتشمل: الخدمات التي تحد من التوسع في ممارسة النشاط أو الاستفادة من الخدمات غير المؤثرة في طبيعة النشاط. ج- المرحلة الثالثة: إيقاف الخدمات (عالية الأثر)، وتشمل: جميع الخدمات القابلة للإيقاف. لا تتجاوز مدة إيقاف الخدمات في المرحلتين (الأولى) و(الثانية) المشار إليهما (30) يومًا لكل مرحلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/caca1b4d-f344-444b-a1f3-afce00d6840b/1
  verified: false
- article_ref: 'خامساً: المنصة الإلكترونية'
  article_text_ar: 'تنشأ منصة إلكترونية موحدة لإيقاف الخدمات في المركز. تشكل لجنة إشرافية على المنصة الإلكترونية، يكون مقرها في مدينة الرياض، وتكون برئاسة وزارة الداخلية، وعضوية ممثلين من: وزارة العدل، ووزارة التجارة، ووزارة الاستثمار، ووزارة الموارد البشرية والتنمية الاجتماعية، ووزارة الشؤون البلدية والقروية والإسكان، ووزارة الصناعة والثروة المعدنية، وديوان المظالم، والنيابة العامة، ورئاسة أمن الدولة، وهيئة الزكاة والضريبة والجمارك، وهيئة حقوق الإنسان، والهيئة السعودية للبيانات والذكاء الاصطناعي. وللجنة جميع الصلاحيات في إدارة المنصة الإلكترونية، ويشمل ذلك ما يأتي: أ- إعداد نماذج إلكترونية لطلب الجهات الحكومية إيقاف الخدمات، على أن تتضمن النماذج الخدمة المراد إيقافها، وتصنيفها، وسبب طلب الإيقاف والسند النظامي لذلك. ب- البت في الطلبات التي تقدمها الجهات الحكومية لإيقاف الخدمات. ج- اعتماد تصنيف الخدمات التي يمكن إيقافها -الوارد إلى اللجنة من الجهات الحكومية-إلى المراحل (الثلاث) المشار إليها في البندين (ثالثًا) و(رابعًا) من هذه الضوابط، بحسب الآثار المترتبة على الإيقاف والغرض منه. د- التأكد
    من تطبيق ما تضمنته هذه الضوابط من أحكام. يكون إلغاء إيقاف الخدمات تلقائيًّا من خلال الربط الإلكتروني بين المنصة الإلكترونية والجهة الحكومية طالبة الإيقاف، وذلك خلال مدة لا تتجاوز (24) ساعة من الموافقة على إلغاء إيقاف الخدمات. تمكين الأفراد وقطاع الأعمال من تقديم طلب تمديد المدة الممنوحة لهم قبل إيقاف خدماتهم وذلك في كل مرحلة من المراحل المشار إليها في البندين (ثالثًا) و(رابعًا) من هذه الضوابط؛ إلى الجهة الحكومية طالبة الإيقاف، وفي حال موافقة الجهة على الطلب إلكترونيًّا يتم التمديد وإبلاغ المعني بذلك من خلال واحدة أو أكثر من الوسائل المشار إليها في الفقرة (4) من البند (ثانيًا) من هذه الضوابط. تضع اللجنة قواعد عملها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/caca1b4d-f344-444b-a1f3-afce00d6840b/1
  verified: false
- article_ref: سادساً
  article_text_ar: تنشر ضوابط إيقاف الخدمات في الجريدة الرسمية، ويُعمل بها بعد (180) يوماً من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/caca1b4d-f344-444b-a1f3-afce00d6840b/1
  verified: false
