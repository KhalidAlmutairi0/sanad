regulation:
  code: BOE451
  name_ar: تنظيم المدن الطبية والمستشفيات التخصصية التابعة لوزارة الصحة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم – المعاني المبينة أمام كل منها:التنظيم: تنظيم المدن الطبية والمستشفيات التخصصية التابعة لوزارة الصحة.الوزارة: وزارة الصحة.الوزير: وزير الصحة. المجلس: مجلس إدارة المدن الطبية والمستشفيات التخصصية التابعة لوزارة الصحة.الرئيس: رئيس المجلس.المدير العام التنفيذي: المدير العام التنفيذي للمدينة الطبية أو المستشفى التخصصي.المدن الطبية: المدن الطبية التابعة للوزارة، وهي: مدينة الملك فهد الطبية بالرياض, ومدينة الملك عبدالله الطبية بمكة المكرمة, ومدينة الأمير محمد بن عبدالعزيز الطبية لخدمة المناطق الشمالية، ومدينة الملك فيصل الطبية لخدمة المناطق الجنوبية، ومدينة الملك خالد الطبية في المنطقة الشرقية, وأي مدينة طبية تابعة للوزارة تنشأ مستقبلاً.المستشفيات التخصصية: المستشفيات التخصصية التابعة للوزارة، وهما: مستشفى الملك خالد التخصصي للعيون, ومستشفى الملك فهد التخصصي بالدمام, وأي مستشفى تخصصي تابع للوزارة ينشأ مستقبلاً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تهدف المدن الطبية والمستشفيات التخصصية إلى تقديم أفضل الخدمات الطبية والصحية على أرقى المستويات، ومن ذلك ما يأتي : 1 - توفير أرفع مستويات الرعاية الطبية التخصصية. 2 - الإسهام في إرساء قواعد ومقاييس عالية المستوى لممارسة مهنة الطب في المدن الطبية والمستشفيات التخصصية . 3 - الإسهام في توفير الكفايات الوطنية المتخصصة وتأهيلها للعمل في المدن الطبية والمستشفيات التخصصية . 4 - إعداد برامج متكاملة لتدريب الأطباء السعوديين من أجل إعدادهم للمشاركة في تقديم الرعاية الطبية على مستوى الأطباء المقيمين والزمالات المتخصصة. 5 - القيام بالأبحاث العلمية والتطبيقية المتعلقة بالمجال الصحي والتعاون مع الهيئات الطبية المتخصصة في البحث العلمي داخل المملكة وخارجها، من أجل تطوير وسائل العلاج وتحسينها وتحسين الرعاية الطبية والصحية في المملكة بصفة عامة والتخصصات الطبية الدقيقة بصفة خاصة. 6 - السعي نحو استقطاب الكفايات والكوادر الوطنية والعالمية المتميزة في المجالات الطبية العالية التخصص واحتضانهم ودعمهم؛ للانضمام إلى العمل في المدن الطبية والمستشفيات التخصصية. 7 - التعاون مع الهيئات الصحية والمؤسسات
    التعليمية في المملكة في سبيل رفع الوعي والثقافة الصحية بين أفراد المجتمع. 8 - الإسهام في إصدار المجلات الطبية والعلمية والنشرات والدوريات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يكون تشكيل المجلس على النحو الآتي: 1 - الوزيررئيساً2 - نائب الوزير للشؤون الصحيةعضواً3 - نائب الوزير للتخطيط والتطويرعضواً4 - وكيل وزارة المالية للتنظيم والميزانيةعضواً5 - وكيل وزارة العمل للشؤون العماليةعضواً6 - وكيل وزارة الخدمة المدنيةعضواً7- أمين عام مجلس الخدمات الصحيةعضواً8 - المدير العام التنفيذي لمدينة الملك فهد الطبيةعضواً9 - المدير العام التنفيذي لمدينة الملك عبدالله الطبية بمكة المكرمةعضواً10 - المدير العام التنفيذي لمستشفى الملك خالد التخصصي للعيونعضواً11 - المدير العام التنفيذي لمستشفى الملك فهد التخصصي بالدمامعضواً12 - المدير العام التنفيذي لمدينة الأمير محمد بن عبدالعزيز الطبية لخدمة المناطق الشماليةعضواً13 - المدير العام التنفيذي لمدينة الملك فيصل الطبية لخدمة المناطق الجنوبيةعضواً14 - المدير العام التنفيذي لمدينة الملك خالد الطبية في المنطقة الشرقيةعضواً15 - المدير العام التنفيذي لأي مدينة طبية أو مستشفى تخصصي ينشأ مستقبلاً ويكون تابعاً للوزارةعضواً16 - أمين عام المجلسعضواً ومقرراً'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع عدم الإخلال باختصاصات مجلس الخدمات الصحية المقرة نظاماً، يعد المجلس هو السلطة المهيمنة على جميع شؤون المدن الطبية والمستشفيات التخصصية، وتصريف أمورها واتخاذ جميع القرارات اللازمة لتحقيق أغراضها في حدود أحكام هذا التنظيم واللوائح والقرارات الصادرة بناء عليه، وله على وجه خاص ما يأتي: 1 - رسم السياسة العامة - سواء الطبية أو الإدارية - للمدن الطبية والمستشفيات التخصصية ومتابعة سير العمل فيها، واعتماد برنامج تحسين الأداء ورفع الكفاية الكلية بما يحقق المحافظة على المستوى المرجو منها. 2 - اعتماد اللوائح الإدارية والفنية والهياكل الإدارية للمدن الطبية والمستشفيات التخصصية، وكذلك اعتماد اللوائح المالية فيها بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية وفقاً للأنظمة السارية. 3 - إصدار اللوائح المنظمة للخدمات في المدن الطبية والمستشفيات التخصصية، المتعلقة بأهلية العلاج وآلية قبول المرضى في العيادات وأقسام التنويم، وتحديد المقابل المادي للخدمات العلاجية وقواعد الإعفاء منها عندما يتقرر الحصول على مقابل مادي نظير الخدمات العلاجية. 4 - الإشراف العام على الترتيبات الإدارية والمالية
    لكل مدينة طبية أو مستشفى تخصصي، ومراجعتها. 5 - إقرار مشروعات الميزانيات السنوية للمدن الطبية والمستشفيات التخصصية، وإحالتها إلى الجهات المختصة لاعتمادها. 6 - اعتماد البرامج والخطط الخاصة بالأبحاث الطبية وخطط التوظيف للوظائف الإدارية والفنية والطبية وفقاً للوظائف المعتمدة في ميزانيات المدن الطبية والمستشفيات التخصصية. 7 - وضع معايير لإنشاء المدن الطبية والمستشفيات التخصصية. 8 - التوصية بإنشاء مدن طبية أو مستشفيات تخصصية أو تحويل القائم من المستشفيات إلى أي منهما، والرفع إلى مجلس الوزراء لاتخاذ ما يلزم. 9 - وضع ترتيبات تنظيمية تضمن التنسيق الفاعل بين المدن الطبية والمستشفيات التخصصية ومديريات الشؤون الصحية. وللمجلس تفويض بعض صلاحياته إلى الرئيس أو اللجنة التنفيذية وفقاً لما تقتضيه مصلحة العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1 - يجتمع المجلس بدعوة من رئيسه مرة واحدة على الأقل كل شهرين، أو كلما دعت الحاجة إلى ذلك، أو إذا طلب ذلك خمسة من أعضائه على الأقل.2 - يجب أن توجه الدعوة قبل الاجتماع بسبعة أيام على الأقل مقرونة بجدول الأعمال. 3 - يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه من الأعضاء. 4 - تصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين، فإن تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.5 - تثبت مداولات المجلس في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون.6 - يجوز للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بخبراته دون أن يكون له حق التصويت.7 - تصرف لأعضاء المجلس مكافأة عن حضور الجلسات وفقاً لما هو مقرر نظاماً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يكون للمجلس لجنة تنفيذية من بين أعضائه، يصدر بتسمية أعضائها وتحديد رئيسها قرار من الرئيس، وتجتمع مرتين شهريًّا على الأقل، وتتولى الإشراف على إعداد وتحضير أعمال اجتماعات المجلس، ودراسة جميع التقارير والموضوعات الواردة إليه وإبداء الملحوظات واتخاذ التوصيات اللازمة في شأنها، تمهيداً لعرضها على المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للمجلس أمين عام يسميه الرئيس، ويرتبط إداريًّا بالرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمجلس أمانة عامة تسمى (الأمانة العامة لمجلس إدارة المدن الطبية والمستشفيات التخصصية التابعة لوزارة الصحة) ، تتولى الترتيبات التنظيمية والإدارية والفنية المساندة التي تسهم في إنجاح عمل المجلس، وبخاصة ما يأتي : 1 - إعداد جدول اجتماعات المجلس وتحضير أعماله، واللجان المنبثقة منه, وموافاة المجلس بالموضوعات المطروحة عليها.2 - تسجيل المداولات والمناقشات والتوصيات، وتوثيق القرارات، وإعداد محاضر اجتماعات المجلس، واللجان المنبثقة منه.3 - متابعة تنفيذ قرارات المجلس وتوصياته، وإعداد التقارير الدورية اللازمة عن الإنجازات والتوصيات، ورفعها إلى الرئيس.4 - إعداد ملفات المجلس وتنظيمها وحفظها، كالمحاضر والوثائق والمستندات وكل ما يتعلق بأعماله.5 - توفير الوثائق والمصادر الضرورية التي يحتاج إليها المجلس واللجان المنبثقة منه، وتزويده بالمراسلات والاتصالات ذات العلاقة بأعمالها.6 - القيام بجميع أعمال المجلس الخاصة بالشؤون الإدارية والمالية والسكرتارية، واتخاذ الإجراءات الإدارية والمالية اللازمة لتنفيذ خطة العمل التي يقرها المجلس.7 - أي عمل آخر يكلفها به المجلس أو رئيسه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تعتمد ضمن الميزانية العامة للوزارة ميزانية خاصة باسم ميزانية (أمانة مجلس إدارة المدن الطبية والمستشفيات التخصصية التابعة لوزارة الصحة) ، ويصرف منها على أعمال المجلس ولجانه ومكافآت أعضائه وأمانته وفقاً للأنظمة واللوائح المالية المعمول بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'مع مراعاة ما للمجلس وما للوزير من صلاحيات، تتمتع المدن الطبية والمستشفيات التخصصية بالاستقلال وفقاً لما يأتي : 1 - يكون لكل مدينة طبية ومستشفى تخصصي ميزانية تشغيلية سنوية خاصة ضمن ميزانية الوزارة.2 - تتكون موارد كل مدينة طبية ومستشفى تخصصي مما يأتي: أ - الاعتمادات التي تخصص لها في ميزانية الدولة.ب - الهبات والإعانات والمنح والوصايا والأوقاف التي يقبلها كل منها وفقاً للقواعد التي يضعها المجلس.ج - موارد علاج من ليس لهم أهلية علاج بناءً على الضوابط المنظمة لأهلية العلاج وفقاً للأنظمة واللوائح المنظمة لذلك. د - ريع أملاك كل مدينة طبية أو مستشفى تخصصي، إن وجدت.هـ - أي مورد آخر يقرر المجلس إضافته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يكون لكل مدينة طبية ومستشفى تخصصي مدير عام تنفيذي يصدر بتكليفه قرار من الوزير، يتولى إدارة المدينة الطبية أو المستشفى التخصصي وتصريف شؤونه، وله في سبيل ذلك على وجه خاص ما يأتي : 1 - الإشراف على العاملين في المدينة الطبية أو المستشفى التخصصي وفقاً لما تحدده الأنظمة واللوائح ذات العلاقة. 2 - تمثيل المدينة الطبية أو المستشفى التخصصي في العلاقة مع الأفراد والجهات وأمام القضاء. 3 - تنفيذ قرارات المجلس ومباشرة ما يخوله إياه من اختصاصات. 4 - اقتراح اللوائح والقرارات التنفيذية الخاصة بسير العمل في المدينة الطبية أو المستشفى التخصصي، وعرضها على المجلس. 5 - الإشراف على تحضير مشروع ميزانية المدينة الطبية أو المستشفى التخصصي، والرفع عن ذلك للمجلس. 6 - الإشراف على الشؤون الإدارية والمالية، والصرف في حدود اعتمادات الميزانية ووفقاً للوائح المعتمدة من المجلس. وللمدير العام التنفيذي تفويض بعض المسؤولين في المدينة الطبية أو المستشفى التخصصي في بعض صلاحياته وفقاً لما تقتضيه مصلحة العمل وطبقاً للقواعد التي يضعها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية, ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7270187a-6cde-413d-9665-a9a700f29022/1
