regulation:
  code: BOE327
  name_ar: لائحة دور الرعاية الاجتماعية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات الآتية - أينما وردت في هذه اللائحة - المعاني المبينة أمام كل منها: الوزارة : وزارة الشؤون الاجتماعية. الوزير : وزير الشؤون الاجتماعية. الدار: دار الرعاية الاجتماعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: الدار مؤسسة اجتماعية تنشئها الوزارة وتتولى الإشراف عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الدار إلى توفير الحماية والرعاية الاجتماعية لمن هم في حاجة إليها وفقاً للشروط الواردة في هذه اللائحة، والتوعية بأهمية رعاية المسن في أسرته، أو النزيل في الدار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يشترط للقبول في الدار الآتي : 1 - أن يكون سعودي الجنسية.2 - أن يكون قد بلغ سن الستين فأكثر، وأعجزته الشيخوخة عن العمل أو القيام بشؤون نفسه، ويجوز قبول من هو دون سن الستين إذا أثبت البحث الاجتماعي الحاجة إلى شموله بخدمات الدار.3 - أن يثبت الفحص الطبي خلوه من الأمراض السارية، أو المعدية، أو النفسية، أو العقلية، التي تشكل تهديداً لسلامته، أو خطراً على باقي النزلاء.4 - عدم وجود الأسرة، أو عدم قدرتها على توفير ما يحتاجه من خدمات. 5 - يحق لمدير الدار الاستثناء من تطبيق الفقرات (1) و(2) و(4) من هذه المادة لمدة شهرين، على ألا يتم الإيواء فوق هذه المدة إلا بعد موافقة الوزير، وبما تقتضيه المصلحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تقوم الدار بتقديم أوجه الرعاية الشاملة التي يحتاجها نزلاؤها، وعلى الأخص منها ما يأتي : 1 - إيواء النزيل والعناية به.2 - تقديم الغذاء اللازم له بحسب المعايير الصحية، ويشمل ذلك التغذية الأنبوبية للمعتمدين عليها. 3 - المحافظة على نظافة النزيل في جسده وملابسه ومستلزماته، وذلك بتأمين احتياجاته الضرورية ومستلزماته الشخصية. 4 - توفير الرعاية الصحية.5 - العمل على إيجاد المحيط الاجتماعي المناسب.6 - تنظيم البرامج الدينية والاجتماعية والثقافية والترفيهية التي تساعد النزلاء على استقرار أوضاعهم، وتعمل على تكيفهم مع متطلبات الإقامة فيها.7 - تدريب العاملين في الدار على تعلم طرق الإسعافات الأولية للنزلاء، وبخاصة طرق الإنعاش القلبي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يخصص لكل نزيل سجل يحفظ فيه البحث الاجتماعي والبحث النفسي الخاصان به، بالإضافة إلى معلوماته الشخصية، والتقارير الدورية عن حالته الصحية والنفسية والاجتماعية، وجميع المستندات الثبوتية المتعلقة به، وتكون إدارة الدار مسؤولة عن سريتها، والمحافظة عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: إذا ثبت من خلال الفحص الطبي إصابة النزيل بأحد الأمراض السارية أو المعدية، فتتخذ الدار الترتيبات اللازمة لعلاجه بما يضمن سلامة النزلاء الآخرين وحمايتهم، على أن يخصص في كل قسم غرف عزل منفصلة للحالات المرضية السارية أو المعدية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تخصص الدار قسماً للرجال و آخر للنساء، ويفصل القسمان فصلاً تاماً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتولى إدارة الدار القيام بما يأتي : 1 - إجراء البحوث التتبعية، وإعداد التقارير الدورية عن النزلاء، وما قد يحتاجونه من خدمات.2 - تقديم أوجه النشاطات المختلفة في الدار، والعمل على التنسيق فيما بينها، ومتابعة تنفيذها وفق المطلوب.3 - تكوين حلقة اتصال بين النزيل وأسرته.4 - تشجيع الأهل والأقارب على تواصل النزيل مع محيطه الخارجي من خلال إعداد برنامج للزيارات الميدانية خارج الدار.5 - تمكين النزيل - الذي تسمح حالته - من التواصل مع محيطه الخارجي، وذلك من خلال الزيارات الميدانية وفق برامج تعد لهذا الشأن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخصص لكل نزيل مبلغ مائتي ريال شهريًّا لتغطية مصروفاته الشخصية، ويجوز للوزير رفع هذا المبلغ إذا تطلب الأمر ذلك بعد توفير التمويل اللازم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تنتهي إقامة النزيل في الدار في أي من الحالات الآتية : 1 - إذا أصبحت ظروفه الأسرية تسمح له بالإقامة خارج الدار.2 - إذا زالت الأسباب التي أدت إلى دخوله الدار. 3 - إذا انتقل للإقامة في منشأة علاجية أو تأهيلية، أو في دار رعاية اجتماعية أخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يصدر الوزير القواعد والقرارات اللازمة لتنفيذ هذه اللائحة، في مدة أقصاها تسعون يوماً من تاريخ صدورها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية، ويعمل بها بعد تسعين يوماً من تاريخ نشرها، وتلغي كل ما يتعارض معها من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8e4bbe17-7156-445b-9928-a9a700f2c03d/1
  verified: false
