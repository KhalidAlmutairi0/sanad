articles:
- article_ref: المادة الأولى
  article_text_ar: 'تفتيش العمل : المهمات التي يقوم بها مفتشو العمل الذين يسميهم وزير العمل بقرار منه ، وذلك لتنفيذ اختصاصاتهم المنصوص عليها في المادة (196) من نظام العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتألف جهاز تفتيش العمل من إدارة مركزية في وكالة الوزارة للشؤون العمالية ومن أجهزة فرعية في مكاتب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'لا يجوز تبديل مفتشي العمل بعد تعيينهم، أو تكليفهم بواجبات إضافية إلا وفقاً للشروط التالية : أ - أن يكون التبديل بقرار من وزير العمل . ب - ألاَّ تتعارض الواجبات الإضافية مع واجبات المفتشين الرئيسية. ج - ألاَّ يخل ذلك بحال من الأحوال بالصلاحية والحيدة التي يجب أن تتوافر للمفتشين بموجب النظام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يقسم مفتشو العمل قبل مباشرتهم مهمات تفتيش العمل أمام وزير العمل اليمين التالية : ( أقسم بالله أن أقوم بمهام وظيفتي بأمانة وإخلاص ، وألاَّ أفشي سراً من أسرار أي مهنة أو أي اختراع صناعي أو غير ذلك من الأسرار التي أطلع عليها بحكم وظيفتي ولو بعد انقطاع عملي بهذه الوظيفة ) . ويُعد - بعد أداء اليمين - محضر تحال نسخة منه إلى مدير عام تفتيش العمل بالوزارة لحفظها في ملف المفتش ، كما تحال نسخة أخرى إلى مكتب العمل الذي يتبع له المفتش.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يحمل مفتش العمل بطاقة تحمل صورته ومختومة بالختم الرسمي للوزارة، وذلك لإثبات صفته الرسمية عند قيامه بمهمات تفتيش العمل ، وعلى المفتش إعادة هذه البطاقة عند تركه لعمله في التفتيش.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تتولى الإدارة المركزية لتفتيش العمل المهمات التالية : أ - الإشراف على أعمال المفتشين في مكاتب العمل وتوجيههم ، ومراقبة أعمال التفتيش ومتابعة خططه وبرامجه . ب - الاهتمام بصحة العمال وسلامتهم ووقايتهم من أخطار الآلآت ومن الأمراض المهنية وإصابات العمل ، ونشر الوعي الصحي والوقائي بجميع الوسائل الممكنة . ج - وضع مشاريع القرارات والتعليمات المتعلقة بتفتيش العمل وفق النظام . د - إعداد تقرير سنوي عام عن منجزات تفتيش العمل في المملكة، وذلك وفقا للمادة ( 206 ) من نظام العمل . هـ - إعداد نماذج التقارير والبيانات والاستمارات والسجلات المتعلقة بتفتيش العمل، وتزويد دوائر تفتيش العمل في المكاتب بها. و - دراسة التقارير الشهرية التي تعدّها دوائر تفتيش العمل وتدقيقها وبيان الملحوظات عليها . ز - تنظيم أو المشاركة في تنظيم دورات تدريبية لمفتشي العمل لتأهيلهم للقيام بواجباتهم وتطوير مهاراتهم في مجال أعمالهم . ح - القيام بجولات توجيهية لتفقد سير العمل في دوائر تفتيش العمل في المكاتب، والتأكد من قيامها بالمهمات الموكولة إليها بموجب هذه اللائحة ونظام العمل . ط - ممارسة غير ذلك من المهمات التي
    تدخل في نطاق تفتيش العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يتولى المفتشون في مكاتب العمل المهمات والواجبات التالية: أ - مراقبة تطبيق أحكام نظام العمل واللوائح والقرارات الصادرة بمقتضاه في المنشآت الخاضعة لتفتيش العمل ، وذلك بالتحقق عن طريق الزيارات التفتيشية عما إذا كانت الاحتياطات والشروط النظامية موضوع التفتيش منفذة، ومن ثم اتخاذ الإجراءات اللازمة إذا لم تنفذ. ب - زيارة أماكن العمل الخاضعة لإشرافهم وفقاً للتعليمات المرعية للقيام بتفتيش العمل فيها، مع التزام المفتش بأن يشرح لصاحب العمل - أو ممثله - مهمته والغرض من زيارته باللطف واللباقة اللازمين لاكتساب تقديره وثقته بمهمة التفتيش الموفد لأجلها. ج - تقديم التقارير عن جميع ملحوظاتهم ومشاهداتهم المتعلقة بتطبيق الأحكام النظامية . د - معاونة كل من العمال وأصحاب الأعمال ، وإرشادهم إلى أفضل الطرق المتبعة ، لتطبيق موجبات النظام واللوائح والقرارات التنفيذية والتعليمات الفنية الخاصة بالعمل . هـ - دراسة الظروف والشروط والأحوال المتصلة بالعمل ورفع التقارير بذلك إلى الوزارة وبخاصة ما يلاحظ عليها من أوجه النقص التي لم تتداركها أو تتعرض لها الأحكام الواردة بالأنظمة المتعلقة بهذا الشأن .و -
    إعداد تقرير شهري عن نشاط تفتيش العمل في منطقة اختصاص المكتب ، والمنشآت التي تم تفتيش العمل فيها ، وعدد المخالفات الملحوظة ونوعها والمعوقات التي اعترضت التنفيذ، والمقترحات اللازمة لتذليلها .ى - إعداد تقرير سنوي عن نشاط تفتيش العمل في منطقة اختصاص المكتب ونتائجه وآثاره مع الملحوظات والمقترحات اللازمة في هذا الشأن ، وتصدر الوزارة تعليمات خاصة عن كيفية تنظيم هذين التقريرين والنماذج الواجب استعمالها في هذا المجال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على مفتشي العمل ورؤسائهم إمداد أصحاب الأعمال والعمال بالمعلومات الفنية والإرشادات العملية المتعلقة بحسن تنفيذ الأحكام النظامية ، كما أن عليهم إسداء النصح إليهم وتوجيهـهم لتطبيق أفضل مستويات الصحة والسلامة ، إلى جانب تشجيع التعاون بينهم لتعزيز الاحتياطات الفنية والصحية ، وتدعيم طرق السلامة في أماكن العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: على مفتشي العمل ورؤسائهم - التعاون مع العمال وأصحاب الأعمال على حد سواء - للمساعدة في تحسين العلاقات الإنسانية والكفاية الإنتاجية ، لإيجاد جو من الاستقرار في علاقات العمل يسوده التفاهم والتعاون المثمر بين الأطراف المعنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: على مفتشي العمل الاهتمام بمهمات التفتيش الموكولة إليهم وعليهم أن يتناولوا المشكلات التي تعرض عليهم من جوانبها المختلفة ، وأن يعملوا على معالجتها مع الأطراف المعنية بمهارة ولباقة ، وبروح تتسم بالنزاهة والإنصاف ، كما يجب أن لا يكون لهم مصلحة مباشرة أو غير مباشرة في المنشآت الخاضعة لإشرافهم ، كما أن عليهم أن يتجنبوا قبول أي هدايا ويرفضوا أي عرض أو خدمة من أي نوع خاص سواء من أصحاب الأعمال أو العمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يكون لمفتشي العمل في مجال قيامهم بمهمات تفتيش العمل الموكولة إليهم ممارسة الصلاحيات التالية : أ - الدخول إلى جميع أماكن العمل، وذلك بعد إبلاغ صاحب العمل أو ممثله قبل دخوله إلى المنشاة، مع إبراز بطاقته التعريفية، ما لم ير أن هذا الإبلاغ قد يضر بمهمة التفتيش الموكولة إليه ، إلا أنه لا يجوز بحال من الأحوال الإخبار المسبق عن الزيارة التفتيشية مهما كانت الأسباب. ب - فحص السجلات والأوراق والدفاتر والملفات أو أي وثيقة أخرى لها علاقة بالعمال ، والحصول على صور ومستخرجات منها ، وذلك للتأكد من مطابقتها للمتطلبات المنصوص عليها في نظام العمل واللوائح والقرارات الصادرة تطبيقاً له، وأن يلفت نظر أصحاب الأعمال إلى تعليق البيانات والإعلانات المنصوص عليها في النظام في منشآتهم . ج - الحصول على عينات من المواد المستعملة والتي تتداول في المنشأة لتحليلها ، وكذلك فحص الآلات والتركيبات المختلفة للتأكد من وجود الوسائل الكافية والفعالة التي توفر أسباب الوقاية والصحة للعمال، وللمفتش إصدار الأوامر اللازمة لإجراء التغييرات العاجلة المطلوبة لتوفير اشتراطات الحماية الواجبة من مخاطر العمل والآلات . د
    - سؤال صاحب العمل أو ممثله أو العمال على انفراد أو في حضور شهود في أي من الموضوعات المتصلة بتنفيذ أحكام النظام ، ليمكن في ضوئها استنتاج ما إذا كانت الاشتراطات التي نص عليها نظام العمل والقرارات المنفذة له مطبقة وإلى أي حد . هـ - بحث أفضل الطرق مع أصحاب العمل والعمال منفردين أو مجتمعين لتسهيل تطبيق الأحكام النظامية المتعلقة بالعمل ، وتذليل الصعوبات التي تعترض ذلك وخاصة ما تعلق منها بالجهل بأحكام النظام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'لمفتشي العمل عند قيامهم بتفتيش العمل في أي منشأة صناعية أو تجارية وغيرها تنفيذاً لأحكام نظام العمل واللوائح والقرارات الصادرة تطبيقاً له، أن يتخذوا بحق مخالفي أحكام النظام - وذلك بحسب أهمية المخالفة والظروف المحيطة بها والتي يعود تقديرها للمفتش- أحد التدابير التالية : أ - إسداء النصح والإرشاد لصاحب العمل . ب - توجيه تنبيه شفهي . ج - توجيه إنذار كتابي لصاحب العمل لتدارك المخالفة خلال مدة معينة . د - تحرير محضر ضبط للمخالفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'ينظم رئيس تفتيش العمل في كل مكتب زيارات التفتيش الجارية أثناء ساعات الدوام الرسمي بموجب برامج أسبوعية مسبقة يصادق عليها مدير المكتب المسؤول، وتعد وفقاً للأسس التالية : أ - توزع المنشآت الخاضعة للتفتيش، ويراعي في التوزيع عدد المنشآت الخاضعة للتفتيش الواقعة ضمن دائرة اختصاص المكتب وطبيعتها وحجمها، وعدد العمال المستخدمين فيها وفئاتهم، وتنوع الأحكام النظامية التي يتعين مراقبة تطبيقها ، ووسائل التنفيذ المادية الموضوعة تحت تصرف المفتشين . ويكون التوزيع بموجب أوامر إدارية يصادق عليها مدير المكتب المسؤول وتبلغ إلى المفتشين. ويجوز تبديلها بحسب مقتضيات العمل وظروفه، على أن تبلغ صورة منها إلى وكالة الوزارة للشؤون العمالية عند صدورها . ب - ينظم برنامج مسبق للزيارات التي يتعين القيام بها خلال الأسبوع على أن يحدد فيه ما يلي : 1- اسم مفتش العمل المكلف بالزيارة . 2 - المنشآت التي يتعين على كل مفتش القيام بتفتيش العمل فيها في كل يوم من أيام الأسبوع . 3 - تاريخ وموعد الزيارة . 4- نوع الزيارة، بحيث يميز بين الزيارات الجارية لأغراض التفتيش العامّ التي تفحص فيها ظروف العمل في المنشأة وشروطه
    من جميع النواحي ، وبين الزيارات الخاصة كإعادة التفتيش وزيارات فحص الشكاوي والحوادث وأمراض المهنة . ج - يراعي في تحديد زيارات التفتيش الاختيار المناسب للزمن بحيث تكون زيارة المنشآت أثناء ممارسة النشاط الكامل لها ، مع ملاحظة توزيع أوقات العمل في المنشأة ، وعلى مفتش العمل أن يخصص جزءاً من دوامه في مكتب العمل للأعمال الإدارية والكتابية ، على ألا يؤثر ذلك على الوقت اللازم لقيامه بمهماته الأساس في التفتيش.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكون تفتيش العمل خارج أوقات الدوام الرسمي وفقاً للتعليمات الخطية وأوامر رئيس تفتيش العمل في كل مكتب، ويجب أن تتضمن هذه الأوامر أسماء المنشآت المطلوب تفتيشها، وأوقات التفتيش ، وأسماء المفتشين المكلفين به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجب على المفتشين الذين كلفوا بالتفتيش خارج أوقات الدوام الرسمي تقديم تقاريرهم بنتائج التفتيش إلى رؤسائهم في اليوم التالي لإجرائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يجب تكثيف الزيارات التفتيشية على أماكن العمل ، وذلك بالدقة التي يتطلبها تنفيذ الأحكام النظامية، مع الاهتمام بزيارة المنشآت التي تكون إداراتها غير مرضية من ناحية حماية صحة العمال وسلامتهم ، أو التي تجري فيها عمليات خطرة أو منافية للصحة ، وفي حال اكتشاف إخلال خطير بالأوضاع الواجب مراعاتها في أماكن العمل فعلى المفتش أن يعود لزيارتها بشكل مبكر للتحقق من تقيد هذه المنشات بمعالجة تلك الأوضاع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجب أن يكون التفتيش في الزيارات الدورية المخصصة لأغراض التفتيش العام شاملاً لجميع أوضاع العمل وشروطه وأحواله في المنشأة الجاري تفتيش العمل فيها ، ولا يجوز اقتصاره على ناحية خاصة ، وعلى المفتش في هذا النوع من الزيارات أن يزور المنشأة التي يؤدى العمل فيها كلها، وأن يفحص الطرق التي تطبق لتنفيذ الاشتراطات النظامية لحماية العمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: أ - يقوم بتفتيش العمل في كل منشأة مفتش عمل واحد مالم يرَ مدير مكتب العمل تكليف مفتشين اثنين أو أكثر للاشتراك في تفتيش منشأة واحدة . ب - إذا لم يكن هناك مفتشون مختصون بنواحي الصحة والسلامة في مكتب العمل، فيجوز لمكتب العمل الاستعانة بخبرة المختصين في الوزارات الأخرى أو فروعها في المناطق ، وكذلك طلب تزويدهم بالإرشادات اللازمة من وزارة العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'يعد مفتش العمل تقريراً بكل تفتيش يقوم به في كل منشأة يزورها يرفعه لرئيسه المباشر لدراسته وإجراء ما يلزم في شأنه ، ويجب أن يتضمن هذا التقرير المعلومات التالية: أ - البيانات الإدارية الخاصة بزيارة المفتش (اسم مفتش العمل) تاريخ الزيارة ووقتها وأسماء الذين قابلهم. ب - تعريف المنشأة التي زارها ويتضمن (اسمها ، وعنوانها، وطبيعة عملها، وتاريخ تأسيسها ، واسم صاحبها، واسم المدير المسؤول عنها) . ج - عدد العمال الذين يعملون فيها مع بيان جنسياتهم وجنسهم وسنهم . د - ملخصاً لما قام به المفتش من إعمال وإجراءات خلال عملية التفتيش، وذلك للتأكد من تنفيذ المنشاة للالتزامات والاشتراطات التي نص عليها نظام العمل واللوائح والقرارات الصادرة بمقتضاه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يجب على مفتشي العمل توخي الحرص والأمانة والدقة في القيام بالأعمال المنوطة بهم، وعليهم بوجه خاص أن يؤسسوا ملحوظاتهم على ما يشاهدونه بأنفسهم، كما أن عليهم الامتناع كلياً عن إبداء أي ملحوظة عن أمور لا يلمون بها إلماماً كافياً ، حفاظاً على ثقة أصحاب العمل والعمال بهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: على مفتشي العمل متابعة المنشات - التي تثبت مخالفتها لأحكام نظام العمل واللوائح والقرارات الصادرة تطبيقاً له- بزيارات متتالية بعد منحها مهلاً كافية ومعقولة لتلافي المخالفات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: في حالة ضبط مخالفة فيجب أن يحرر محضرها في مكان العمل إلا إذا حال دون ذلك مانع، وعلى مفتش العمل أن يسأل صاحب العمل - أو ممثله-عن أسباب ارتكاب كل مخالفة من المخالفات التي شاهدها ، وأن يسجل في محضر الضبط كلّ إفادته ، وأن يوقع على المحضر كل من المفتش وصاحب العمل أو ممثله ، فإن امتنع عن التوقيع فإنه يشار إلى ذلك في المحضر، وعلى المفتش أن يضع نصب عينيه أهمية التوجيه والإرشاد والتعاون مع أصحاب الأعمال إلى أقصى حد ممكن لوضع الأحكام النظامية موضع التطبيق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تضع الوزارة نماذج محاضر ضبط مخالفات وسجلات التفتيش والتنبيهات والإنذارات والنماذج الأخرى المتعلقة بتنفيذ أحكام هذه اللائحة وأحكام نظام العمل الخاصة بتفتيش العمل ، مع بيان التعليمات اللازمة لكيفية استعمالها وحفظها وتعميمها ، ومن ثم تعميمها على مكاتب العمل، ولا يجوز لها استعمال غير النماذج التي اعتمدتها الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c0469b2e-535b-43ca-a5a8-a9a700f2c095/1
  verified: false
