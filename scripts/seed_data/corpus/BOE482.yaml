articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها، ما لم يدل السياق على غير ذلك: الوزير: وزير الاتصالات وتقنية المعلومات. الهيئة: هيئة الحكومة الرقمية. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. المحافظ: محافظ الهيئة. التحول الرقمي: تحويل نماذج الأعمال وتطويرها بشكل استراتيجي؛ لتكون نماذج رقمية مستندة على بيانات وتقنيات وشبكات الاتصالات. الحكومة الرقمية: دعم العمليات الإدارية والتنظيمية والتشغيلية داخل القطاعات الحكومية -وفيما بينها- لتحقيق التحول الرقمي، وتطوير وتحسين وتمكين الوصول بسهولة وفاعلية للمعلومات والخدمات الحكومية. المعايير: مجموعة من المقاييس والقواعد والضوابط المنظمة للعمليات والمهمات ذات العلاقة بالحكومة الرقمية التي تعتمدها الهيئة. منصة السوق الرقمي الحكومي: منصة تمكن الجهات الحكومية من شراء وتوفير الخدمات والأصول التقنية، مثل: البرمجيات والأجهزة وخدمات الاتصالات والخدمات المدارة والخدمات السحابية؛ وإتمام عمليات الشراء والدفع والاستلام من خلال البوابة الإلكترونية للمنافسات والمشتريات الحكومية.
    البوابة الوطنية الموحدة: المنصة الوطنية التقنية التي تتيح جميع الخدمات الرقمية الحكومية من مختلف القطاعات عن طريق بوابة وتطبيق موحد أو من خلال مركز خدمة موحد وفق استراتيجية الوصول للمستفيد، وتكون مرجعاً معلوماتيّاً موثوقاً لجميع المستفيدين. خدمات الثقة الرقمية: أي خدمة إلكترونية تهدف إلى التحقق من صحة وسلامة التعامل الإلكتروني وهوية المتعاملين، ويشمل ذلك (التوقيع الرقمي، والختم الرقمي، والختم الزمني) وغيرها. الترخيص: وثيقة تصدرها الهيئة لشخص لتقديم الخدمات في مجال الحكومة الرقمية، نيابةً عن الجهة الحكومية، وفقاً للضوابط التي تضعها الهيئة. مقدم الخدمة: مقدم الخدمات الحكومية الرقمية لأغراض تجارية، المرخص له من الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميّا برئيس مجلس الوزراء. يكون المقر الرئيس للهيئة في مدينة الرياض، ولها أن تنشئ فروعاً ومكاتب داخل المملكة بقرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: الهيئة هي الجهة المختصة بكل ما يتعلق بالحكومة الرقمية، وتعد المرجع الوطني في شؤونها. وتهدف إلى تنظيم أعمال الحكومة الرقمية في الجهات الحكومية، من أجل الوصول إلى حكومة رقمية استباقية ومُبادرة وقادرة على تقديم خدمات رقمية ذات كفاية عالية، وتحقيق التكامل في مجال الحكومة الرقمية بين كافة الجهات الحكومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات الجهات ذات العلاقة، تتولى الهيئة الاختصاصات والمهمات الآتية: إقرار السياسات المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه. اقتراح مشروعات الأنظمة ذات العلاقة باختصاص الهيئة، واقتراح تعديل المعمول به منها، ورفعها لاستكمال الإجراءات النظامية اللازمة. المشاركة في إعداد الاستراتيجية الوطنية للحكومة الرقمية -بالتنسيق مع الجهات المعنية- تمهيداً للرفع بها وفقاً للإجراءات النظامية المتبعة، والإشراف على تنفيذها بعد اعتمادها ووضع خططها التنفيذية ومتابعة الالتزام بها. التنسيق مع الجهات المختصة للعمل على تنظيم أعمال الحكومة الرقمية، والمنصات والمواقع والخدمات الحكومية الرقمية، والشبكات الحكومية، والبوابة الوطنية الموحدة، ويشمل ذلك وضع الخطط والبرامج والمؤشرات والمقاييس ذات العلاقة بأعمال الحكومة الرقمية والخدمات الحكومية الرقمية المشتركة، وخدمات الثقة الرقمية في الجهات الحكومية، ومنصة السوق الرقمي الحكومي، وتنظيم عمليات التشغيل والإدارة والمشاريع المتعلقة بها، وتعميمها على الجهات ذات العلاقة، ومتابعة الالتزام
    بها. إصدار القياسات والمؤشرات والأدوات والتقارير؛ لقياس أداء الجهات الحكومية وقدراتها في مجال الحكومة الرقمية، ورضا المستفيد عنها. متابعة التزام الجهات الحكومية بالقرارات والأوامر الصادرة في شأن التعاملات الحكومية الرقمية، وفق الأطر والمعايير التي تضعها الهيئة. حوكمة أعمال السحابة الحكومية الرقمية والسحابات ذات العلاقة بقطاع الحكومة الرقمية. ترشيد تكاليف الخدمات الحكومية الرقمية، بما يكفل تحقيق مستوى أفضل للخدمة، ووضع الضوابط اللازمة لذلك بالاشتراك مع الجهات المختصة. وضع المعايير الفنية لنماذج التحول الرقمي في القطاعات الحكومية ومتابعة الالتزام بها، بالتنسيق مع الجهات المختصة. تقديم المساندة للجهات الحكومية فيما يتعلق بخدمات الحكومة الرقمية، لتبني وتمكين التقنيات الحديثة. المساهمة في بناء القدرات الوطنية المتخصصة في الحكومة الرقمية، والمشاركة في إعداد البرامج التعليمية والتدريبية المتعلقة بالحكومة الرقمية. إجراء الدراسات والبحوث في مجال الحكومة الرقمية وتشجيع الاستثمار فيها. المساهمة في وضع المواصفات القياسية الخاصة بمنتجات الحكومة الرقمية، والإشراف على تطبيقها بالاشتراك مع الجهات المختصة.
    تقديم الاستشارات والخدمات فيما يتعلق بالحكومة الرقمية للجهات الحكومية والقطاع الخاص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'للهيئة -في سبيل تحقيق أهدافها والقيام باختصاصاتها ومهماتها- اتخاذ الوسائل المحققة لذلك، ومنها ما يأتي: إنشاء وحدات تابعة للهيئة للقيام ببعض مهماتها وتحديد علاقاتها التنظيمية بالهيئة، وتحديد وسائل وآليات تنفيذ مهماتها. التواصل مع الجهات المماثلة خارج المملكة والجهات الخاصة لتبادل الخبرات، وتأسيس آليات للتعاون والشراكة معها وفقاً للإجراءات النظامية المتبعة. طلب أي معلومات أو بيانات أو تقارير من الوزارات والأجهزة الحكومية الأخرى ذات العلاقة بطبيعة أعمالها. التأهيل والترخيص لتقديم لخدمات الثقة والهوية الرقمية والحكومة الرقمية. تحصيل المقابل المالي المقرر للهيئة عن أي عمل أو خدمة تُقدِّمها للقطاع الخاص وفقاً للتنظيم. التصنيف الفني لمقدمي خدمات الحكومة الرقمية بحسب نوع الخدمة المقدمة. إلزام الجهات الحكومية بالمعايير التقنية للأجهزة العامة عند التعاقد لتنفيذ المشاريع ذات الصلة بالحكومة الرقمية بالتنسيق مع الجهات المعنية. استثمار أموال الهيئة بما يحقق أغراضها، وفقاً للأنظمة المتبعة. تنظيم وعقد ورش العمل والندوات والمؤتمرات والمعارض داخل المملكة وخارجها، والمشاركة فيها في المجالات
    المتعلقة بالحكومة الرقمية، ووفقا للإجراءات المتبعة. تبليغ قرارات المجلس إلى الجهات المعنية بها مباشرة أو بالطريقة التي تراها الهيئة مناسبة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وتكون العضوية فيه على النحو الآتي: 1- وزير التجارة. عضواً 2- وزير المالية. عضواً 3- وزير الموارد البشرية والتنمية الاجتماعية. عضواً 4- رئيس الهيئة السعودية للبيانات والذكاء الاصطناعي. عضواً 5- محافظ الهيئة الوطنية للأمن السيبراني. عضواً 6- نائب وزير الداخلية. عضواً 7- نائب وزير الاتصالات وتقنية المعلومات. عضواً 8- رئيس مجلس إدارة هيئة المحتوى المحلي والمشتريات الحكومية. عضواً 9- محافظ الهيئة. عضواً'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويختص بالإشراف على شؤونها وإدارتها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق أغراضها، وله بصفة خاصة الصلاحيات والاختصاصات الآتية: الموافقة على السياسات المتعلقة بنشاط الهيئة، والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل المعمول به منها. الإشراف على تنفيذ الهيئة للمهمات المنوطة بها. إعداد مشروع الاستراتيجية الوطنية للحكومة الرقمية، ومقترحات تحديثها، تمهيداً للرفع عنها لاعتمادها. إقرار الخطط التنفيذية للاستراتيجية الوطنية للحكومة الرقمية على المستوى الوطني، وتحديثها ومتابعة تنفيذها بعد اعتمادها. إقرار الآليات والضوابط والمؤشرات التي تختص بها الهيئة. إقرار هيكل الهيئة التنظيمي. إقرار اللوائح الإدارية، بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. إقرار اللوائح المالية، والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. اقرار اللوائح الداخلية. الموافقة على الضوابط والمعايير الخاصة بالحكومة الرقمية. الموافقة
    على إبرام الاتفاقيات، والبروتوكولات، والعقود، بحسب الإجراءات النظامية المتبعة. الموافقة على إنشاء الفروع والمكاتب للهيئة. إقرار مشروع ميزانية الهيئة وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي تمهيداً لرفعها بحسب الإجراءات النظامية. النظر في التقارير الدورية التي تُقدَّم عن سير العمل في الهيئة ومركزها المالي، واتخاذ القرارات التي يراها المجلس في ذلك. الموافقة على استثمار أموال الهيئة بما يحقق أغراضها، وفقاً للأنظمة المتبعة. إقرار المقابل المالي للخدمات والأعمال التي تقدمها الهيئة. قبول ما يقدم للهيئة من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف وفقاً للأحكام المنظمة لذلك. تعيين مراجع حسابات خارجي ومراقب مالي داخلي. تشكيل لجان دائمة أو مؤقتة من أعضاء المجلس أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها وأمينها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تُعقد اجتماعات المجلس في مقر الهيئة برئاسة الرئيس أو من ينيبه من الأعضاء، ويجوز عند الحاجة عقدها في مكان آخر داخل المملكة. يعقد المجلس اجتماعاته بصفة دورية أربع مرات -على الأقل- في السنة. ولرئيس المجلس دعوته للاجتماع متى ما دعت الحاجة إلى ذلك، أو متى طلب ذلك (ثلاثة) أعضاء على الأقل. ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يكون الاجتماع صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يُرجَّح الجانب الذي صوّت معه رئيس الاجتماع. لا يجوز لعضو المجلس الامتناع عن التصويت ولا تفويض عضو آخر للتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الجلسة والأعضاء الحاضرون. يجوز -عند الحاجة وفي الحالات المستعجلة ووفقاً لما يقدره الرئيس- أن تُعقد الاجتماعات وأن يُصَوَّت عليها عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ القرارات بطريق التمرير على الأعضاء، ويوقع عليها بما يفيد اطلاع جميع الأعضاء عليها، ولا تُعدُّ
    القرارات الصادرة بهذه الطريقة صحيحة ما لم تمرر على جميع الأعضاء، ويتم التصويت عليها من جميع الأعضاء، وتحوز على أغلبية أصواتهم. يكون للمجلس أمين من بين منسوبي الهيئة يختاره الرئيس بناءً على ترشيح المحافظ، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات. للمجلس دعوة مَن يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يكون للهيئة محافظ بالمرتبة الممتازة، يُعيّن بناء على ترشيح الرئيس، ويكون هو المسؤول عن إدارة الهيئة وتسيير أعمالها، وتتركز مسؤولياته وصلاحياته في حدود ما ينصُّ عليه التنظيم، وما يقرره المجلس، وله على وجه الخصوص ممارسة الصلاحيات الآتية: اقتراح السياسات العامة للهيئة المتعلقة بأنشطتها، والخطط والبرامج اللازمة لتنفيذ ذلك، ورفعها إلى المجلس لإقرارها، والإشراف على تنفيذها بعد إقرارها. الإشراف على إعداد مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل المعمول به منها. الإشراف على إعداد هيكل الهيئة التنظيمي ولوائحها الإدارية والمالية واللوائح اللازمة لتسيير العمل فيها، ورفعها إلى المجلس؛ لإقرارها. الإشراف على سير العمل في الهيئة طبقاً للصلاحيات الممنوحة له وما تحدده اللوائح. الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المقرة، والصلاحيات التي يفوضه بها المجلس. الإشراف على إعداد مشروع ميزانية الهيئة، والتقرير السنوي، ومشروع الحساب الختامي، ورفعها إلى المجلس. التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، ووفقاً
    للإجراءات النظامية المتبعة. متابعة تنفيذ القرارات الصادرة من المجلس، أو القرارات ذات الصلة بأعمال الهيئة. تشكيل لجان عمل داخل الهيئة (دائمة أو مؤقتة) وفقاً لما تقضي به اللوائح والإجراءات المعتمدة لدى الهيئة. الاستعانة بالخبراء والمستشارين المتخصصين الذين تحتاج إليهم الهيئة، وفقاً للوائح المعمول بها. التعاقد مع الموظفين والعاملين في الهيئة، وفقاً للهيكل التنظيمي واللوائح المالية والإدارية التي يُقرُّها المجلس. التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفقاً للأنظمة والصلاحيات التي يفوضه بها المجلس. تمثيل الهيئة أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. أي اختصاص آخر يسنده إليه المجلس. وللمحافظ تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع منسوبو الهيئة -ما عدا المحافظ- لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للهيئة ميزانية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة. واستثناء من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتألف موارد الهيئة المالية مما يأتي: أ - ما يُخصَّص لها في الميزانية العامة للدولة. ب - المقابل المالي الذي تتقاضاه عن الأعمال والأنشطة والخدمات التي تقدمها. ج - ما يقبله المجلس من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف. د - عوائد استثماراتها. هـ - أي مورد آخر يقرُّه المجلس بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تُودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يرفع المحافظ إلى المجلس خلال (تسعين) يوماً بداية كل سنة مالية تقريراً سنويّاً عما حققته الهيئة من إنجازات مقارنة بما ورد في الخطة العامة للتنمية خلال السنة المنقضية، وما واجهها من صعوبات، وما يراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يُعيِّن المجلس مراجع حسابات خارجيّاً (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويُحدِّد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزوَّد الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تُعامل الهيئة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb98b088-6d6f-41a7-8633-acfc00b6db02/1
  verified: false
