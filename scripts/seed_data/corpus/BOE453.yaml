articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها: التنظيم: تنظيم المركز الوطني لتعزيز الصحة النفسية. المركز: المركز الوطني لتعزيز الصحة النفسية. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. المدير: مدير عام المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يرتبط المركز تنظيميًّا بوزارة الصحة، ويتمتع بالشخصية الاعتبارية المستقلة والاستقلال المالي والإداري، ويباشر المهمات والاختصاصات المنوطة به بموجب التنظيم. يكون مقر المركز الرئيس في مدينة الرياض، ويجوز للمركز إنشاء فروع له داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: 'المادة الثالثة: أهداف المركز'
  article_text_ar: 'يهدف المركز إلى صناعة برامج وطنية تسهم في تعزيز الصحة النفسية، وتهيئة حياة أفضل لأفراد المجتمع، وتعزيز المشاركة الإيجابية، ودعم الفئات الأكثر عرضة للاضطرابات النفسية، وذلك من خلال مايأتي: توجيه المجتمع لدعم قضايا الصحة النفسية. تمكين الفئات المستهدفة وتطوير مهاراتها بما يحقق المفهوم الشامل للصحة النفسية. تقديم برامج التوعية والتثقيف الصحي في مجال الصحة النفسية. الإسهام في تحسين جودة الخدمات النفسية المقدمة. تطوير برامج وقائية في مجال الصحة النفسية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: 'المادة الرابعة : اختصاصات المركز'
  article_text_ar: 'دون إخلال باختصاصات الجهات الأخرى ومسؤولياتها، يتولى المركز القيام بجميع المهمات والاختصاصات اللازمة لتحقيق أهدافه، وله على وجه خاص ما يأتي: المشاركة مع الجهات ذات العلاقة، في رسم السياسات الوطنية في مجال تعزيز الصحة النفسية والعمل على تحسين جودة الخدمات النفسية المقدمة في مختلف القطاعات. تسهيل حصول الفئات المستهدفة على الدعم النفسي والمساندة والخدمات اللازمة. تطوير برامج تعزيز الصحة النفسية، والاهتمام بالفئات الأكثر عرضة للاضطرابات النفسية. اقتراح وتبني برامج توعية تتمشى مع ما يطرأ من تغيرات اجتماعية. تنظيم ورعاية الفعاليات ذات العلاقة بتعزيز الصحة النفسية. الاستفادة من التجارب الدولية في مجال تعزيز الصحة النفسية، والعمل على توطين الخبرات في هذا المجال. العمل على تطوير مهارات مقدمي الخدمات ذات العلاقة بالصحة النفسية. رصد ومتابعة الظواهر والمشكلات ذات العلاقة بالصحة النفسية، ومساندة الأنشطة والمبادرات التطوعية والمجتمعية في مجال تعزيز الصحة النفسية. التعاون والتنسيق مع الجهات الصحية والتعليمية والبحثية المختلفة في مجال الصحة النفسية، سواء داخل المملكة أو خارجها. العمل
    مع الجهات الحكومية والخاصة ذات العلاقة في كل ما يلزم لتطوير الخطط العلاجية والبرامج التأهيلية المتعلقة بتعزيز الصحة النفسية. اقتراح الخطط والبرامج التعريفية والثقافية والاجتماعية وغيرها -بالتنسيق مع الجهات المعنية- لرفع مستوى الوعي لدى جميع فئات المجتمع في كل ما يتعلق بالصحة النفسية. تنظيم الندوات وجلسات العمل واللقاءات العلمية حول أحدث أساليب التوعية والعلاج والتأهيل. إجراء البحوث والدراسات المتعلقة بتعزيز الصحة النفسية. إصدار المطبوعات الإرشادية المتخصصة، وإنتاج البرامج المسموعة والمرئية الموجهة إلى جميع فئات المجتمع؛ لنشر ثقافة الصحة النفسية ومفاهيمها وطرق التعامل السليمة مع الاضطرابات النفسية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: 'المادة الخامسة : المجلس'
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة وزير الصحة، وعضوية عدد من الأعضاء على النحو الآتي: أ- ممثل من وزارة الداخلية. ب- ممثل من وزارة العمل والتنمية الاجتماعية. ج- ممثل من وزارة العدل. د- ممثل من وزارة الشؤون الإسلامية والدعوة والإرشاد. هـ- ممثل من وزارة الإعلام. و- ممثل من وزارة الصحة. ز- ممثل من وزارة التعليم. ح- ممثل من الهيئة العامة للرياضة. ط- ممثل من هيئة حقوق الإنسان. ي- ممثل من مجلس الغرف السعودية. ك- ثلاثة ممثلين من الجمعيات أو المؤسسات الخيرية المتخصصة. ويكون المدير أميناً عاماً للمجلس. يختار الرئيس من بين الأعضاء ممثلي الجهات الحكومية نائباً للرئيس. تكون مدة العضوية في المجلس ثلاث سنوات قابلة للتجديد مرة واحدة، ويجب ألاّ تقل مرتبة ممثلي الجهات الحكومية عن المرتبة (الثالثة عشرة) أو ما يعادلها، ويصدر بتسمية ممثلي الجهات الواردة في الفقرتين (ي) و(ك) أمر من رئيس مجلس الوزراء. يراعى أن يكون للمرشح -لعضوية المجلس- مؤهلات أو خبرات أو اختصاصات وظيفية تتناسب مع عمل المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: 'المادة السادسة : اختصاصات المجلس'
  article_text_ar: 'يتخذ المجلس جميع القرارات اللازمة لتحقيق أغراض المركز في حدود ما تضمنته أحكام التنظيم، وله بوجه خاص ما يأتي: وضع السياسة العامة التي يسير عليها المركز وفقاً للتنظيم. اعتماد خطة العمل المتعلقة بنشاط المركز، والخطط والبرامج التي يسير عليها. مراجعة الأنظمة والتعليمات المطبقة في مجال تعزيز الصحة النفسية واقتراح التعديلات اللازمة عليها، واقتراح ما يلزم من أنظمة ولوائح جديدة لرفع مستوى التأهيل النفسي والاجتماعي للمرضى النفسيين؛ تمهيداً لاستكمال ما يلزم وفقاً للإجراءات النظامية. إقرار المقابل المالي للخدمات التي يقدمها المركز. إقرار هيكل المركز التنظيمي. إقرار اللوائح الإدارية والمالية التي يسير عليها المركز؛ بالاتفاق مع وزارة المالية. وغيرها من اللوائح اللازمة لتسيير شؤونه وعمله. النظر في التقارير الدورية التي يرفعها المدير عن سير عمل المركز. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيدًا لرفعها بحسب الإجراءات النظامية المتبعة. قبول المنح والتبرعات والهبات والوصايا والأوقاف، وفقاً للأنظمة. تقويم أداء الإدارة العامة، ومتابعته،
    واتخاذ الإجراءات التصحيحية اللازمة إذا تطلب الأمر ذلك. الموافقة على إنشاء فروع للمركز داخل المملكة بحسب الحاجة. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم، يُعهد إليها بما يراه ملائماً من المهمات والصلاحيات. ويحدد قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية الأعمال الموكولة إليها. ويجوز للمجلس كذلك أيضاً تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه أو من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: 'المادة السابعة : اجتماعات المجلس'
  article_text_ar: يجتمع المجلس بدعوة من الرئيس مرة واحدة كل (ثلاثة) أشهر وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيسه. وعلى الرئيس دعوة المجلس للاجتماع إذا طلب ذلك نصف الأعضاء على الأقل. توجه الدعوة لاجتماع المجلس قبل موعده بخمسة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت أو تفويض عضو آخر للتصويت نيابة عنه عند غيابه. للمجلس أن يصدر قراراً بعرضه على الأعضاء متفرقين، وفي هذه الحالة يشترط موافقة جميع الأعضاء على القرار كتابة، ويعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. تُثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع وأعضاؤه الحاضرون. للمجلس أن يدعو لحضور جلساته من يرى الاستعانة به دون أن يكون له حق التصويت. على العضو الإفصاح عن أي تعارض مصالح في موضوع مدرج في جدول أعمال المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: 'المادة الثامنة : المدير واختصاصاته'
  article_text_ar: 'يكون للمركز مدير عام يُعين في منصبه ويعفى منه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون هو المسؤول التنفيذي عن إدارة المركز، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم، وما يقرره المجلس، وله بوجه خاص ممارسة الاختصاصات الآتية: اقتراح السياسات العامة للمركز، وخطة العمل والبرامج التي يسير عليها المركز لتحقيق أهدافه، ورفعها إلى المجلس لإقرارها. التحضير لاجتماعات المجلس. اقتراح هيكل المركز التنظيمي، ورفعه إلى المجلس لإقراره، والإشراف على التنفيذ بعد الإقرار. اقتراح لوائح المركز الإدارية والمالية، وغيرها من اللوائح، في حدود ما ورد في التنظيم. اقتراح المقابل المالي للخدمات التي يقدمها المركز ورفعها إلى المجلس للنظر في إقراراها. إصدار الأوامر بمصروفات المركز وفقاً للميزانية السنوية المعتمدة ولوائح المركز المالية والإدارية. إعداد مشروع ميزانية المركز ومشروع الحساب الختامي وتقرير المركز السنوي، ورفعها إلى المجلس. تعيين منسوبي المركز، والإشراف عليهم، وإنهاء خدماتهم، وفقاً للصلاحيات الممنوحة له وما تحدده اللوائح والأنظمة ذات العلاقة. متابعة تنفيذ القرارات
    التي يصدرها المجلس. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. تمثيل المركز أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات وغيرها من الجهات الحكومية والخاصة داخل المملكة وخارجها. الإشراف على سير عمل المركز، والعاملين فيه، وفقاً للصلاحيات الممنوحة له وما تحدده لوائح المركز. إعداد وتقديم تقارير دورية للمجلس عن أعمال المركز ومنجزاته وما قد يعوق تحقيق أهدافه. ممارسة أي اختصاص آخر يسنده إليه المجلس. وللمدير تفويض بعض اختصاصاته وصلاحياته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: 'المادة التاسعة : الموارد المالية'
  article_text_ar: 'تكون للمركز ميزانية سنوية كبرنامج تشغيل ذاتي ضمن ميزانية وزارة الصحة وتتكون إيرادات المركز مما يأتي: أ‌- الاعتمادات المالية التي تخصص له في ميزانية الدولة. ب‌- المقابل المالي الذي يتقاضاه نظير تقديم الخدمات. ج - الهبات والتبرعات والأوقاف والوصايا التي يقبلها المجلس. د - الموارد الأخرى التي يقرها المجلس بما لا يتعارض مع الأنظمة والتعليمات. تودع أموال المركز في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي، ويصرف منها وفقاً لميزانيته المعتمدة. يفتح المركز حساباً له في مؤسسة النقد العربي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة. ويصرف من هذه الحسابات وفق ميزانيته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع منسوبو المركز لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يرفع المركز إلى رئيس مجلس الوزراء -خلال تسعين يوماً من تاريخ انتهاء السنة المالية- تقريراً سنويًّا عما حققه من إنجازات خلال السنة المنقضية، وما واجهه من صعوبات، وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المركز، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لها بالعمل في المملكة، ويحدد أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/acf735b8-a606-424e-8c0e-aaab016118b6/1
  verified: false
