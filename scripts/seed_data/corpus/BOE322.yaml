- article_ref: 'المادة الحادية عشرة : التزامات المتقدم المستمرة'
  article_text_ar: 'يلتزم المتقدم خلال الفترة الممتدة من تاريخ تقديم طلبه وحتى تاريخ البت فيه بما يلي : 1 - إشعار الصندوق فوراً بكل تغيير يطرأ على وضعه ويترتب عليه- أو قد يترتب عليه- عدم استحقاقه لإعانة البحث عن عمل .2 - تقديم المستندات التي يطلبها الصندوق لتمكينه من التحقق من توافر شروط الاستحقاق فيه.3 - التقيد بالتعليمات التي يصدرها الصندوق للمتقدم شخصياً أو من خلال ملفه الإلكتروني في قاعدة بيانات طالبي العمل بما في ذلك الحضور وإجراء المقابلات الشخصية مع أصحاب الأعمال أو مع الجهات الأخرى التي يحددها الصندوق أو حضور أي دورة تعليمية أو تدريبية، بما في ذلك التدريب عن بعد .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الثانية عشرة : التزامات المستفيد المستمرة'
  article_text_ar: 'يلتزم المستفيد بما يلي : 1 - إشعار الصندوق فوراً بكل تغيير يطرأ على وضعه ويترتب عليه -أو قد يترتب عليه- عدم استحقاقه للإعانة . 2 - تقديم المستندات التي يطلبها الصندوق لتمكينه من التحقق من استمرار توافر شروط الاستحقاق فيه . 3 - اتخاذ الإجراءات اللازمة لفتح حساب بنكي باسمه لدى أحد البنوك التي يحددها الصندوق لتحويل الإعانة إلى هذا الحساب . 4 - التقيد بالتعليمات التي يصدرها الصندوق للمستفيد شخصياً أو من خلال ملفه الإلكتروني في قاعدة بيانات طالبي العمل بما في ذلك الحضور وإجراء المقابلات الشخصية مع أصحاب الأعمال أو مع الجهات الأخرى التي يحددها الصندوق أو حضور أي دورة تعليمية أو تدريبية، بما في ذلك التدريب عن بعد .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الثالثة عشرة : استرداد الإعانة'
  article_text_ar: 1 - يلزم المستفيد - الذي قدم بيانات غير صحيحة بغرض الحصول على إعانة البحث عن عمل- بإعادة كامل مبلغ الإعانة التي صرفت له. 2 - للوزارة إحالة من يقدم بيانات غير صحيحة بغرض الحصول على الإعانة إلى المحكمة المختصة بعد اتباع الإجراءات النظامية المنصوص عليها . 3 - يجوز للصندوق اتخاذ جميع الإجراءات اللازمة لاستعادة الإعانة التي صرفت للمستفيد وثبت عدم استحقاقه لها بجميع الطرق ، وتتمتع هذه المبالغ بالحماية المقررة لأموال الدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الرابعة عشرة : التظلم من قرارات الصندوق'
  article_text_ar: للمتقدم الذي رفض طلبه أو رفض تظلمه الإداري في الحصول على الإعانة، وكذلك المستفيد الذي رفض تظلمه من قرار إيقاف صرف الإعانة أو تخفيضها أو الخصم منها؛ الطعن في قرار الرفض أمام المحكمة الإدارية المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
