articles:
- article_ref: 'المادة الأولى : التعريفات'
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم- المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك: الوزارة : وزارة العمل. الوزير : وزير العمل. الصندوق : صندوق تنمية الموارد البشرية. الإعانة: إعانة البحث عن عمل. المتقدم : الشخص الذي تقدم بطلب للاستفادة من الإعانة. المستفيد : المتقدم الحاصل على الإعانة. المعاش التقاعدي : أي مبلغ تصرفه للمتقدم بشكل شهري المؤسسة العامة للتقاعد أو المؤسسة العامة للتأمينات الاجتماعية بصفته المستحق المباشر بموجب نظام التقاعد أو نظام التأمينات الاجتماعية. التدريب : التدريب التقني أو المهني الذي تتجاوز مدته ثلاثة أشهر. قاعدة بيانات طالبي العمل : قاعدة بيانات طالبي العمل التي ينشئها الصندوق لهذا الغرض. الموقع الإلكتروني : الموقع الإلكتروني الذي ينشئه الصندوق وفقاً لهذا التنظيم. اللائحة : اللائحة التنفيذية لهذا التنظيم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الثانية: الهدف من التنظيم'
  article_text_ar: يهدف هذا التنظيم إلى تنظيم صرف الإعانة وتحديد الأشخاص الذين يحق لهم الحصول عليها، والعمل على مساعدتهم في الحصول على العمل المناسب، وتحديد حقوق الأطراف ذات العلاقة ومسؤولياتهم والتزامتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الثالثة : مبلغ الإعانة ومدته'
  article_text_ar: يكون مبلغ الإعانة (2.000) ألفا ريال شهرياً لمدة اثني عشر شهراً هجرياً تبدأ من تاريخ الموافقة على طلب المتقدم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الرابعة : شروط الاستحقاق'
  article_text_ar: 'يشترط لاستحقاق إعانة البحث عن عمل توافر جميع الشروط التالية : 1 - أن يكون سعودي الجنسية. واستثناءً من حكم هذه الفقرة، يجوز لأبناء وبنات المرأة السعودية من زوج غير سعودي الجنسية ممن تنطبق عليهم باقي الشروط الموضحة في هذه المادة التقدم بطلب الحصول على إعانة البحث عن العمل. 2 - أن يكون مقيماً إقامة دائمة في المملكة العربية السعودية وفقاً لما هو محدد في المادة (السابعة) من هذا التنظيم. 3 - ألا تقل سنه عن عشرين سنة ، ولا تزيدعلى خمس وثلاثين سنة. 4 - ألا يكون موظفاً أو عاملاً في القطاع العام أو القطاع الخاص. 5 - أن يكون قادراً على العمل. 6 - ألا يكون مستحقاً لمعاش تقاعدي. 7 - ألا يكون مستحقاً لأي مخصص أو تعويض ضد التعطل عن العمل. 8 - ألا يكون طالباً أو متدرباً في أي مرحلة من مراحل التعليم أو التدريب . 9 ـ ألا يكون لديه نشاط تجاري، وفقاً لما هو محدد في المادة (الخامسة) من هذا التنظيم . 10 ـ ألا يكون له دخل ثابت يعادل إعانة البحث عن العمل المستحقة له بموجب هذا التنظيم أو يزيد عليها. 11 ـ ألا يكون مقيماً في دار رعاية اجتماعية أو ما في حكمها . 12 ـ مضي المدد التالية قبل تقديم المتقدم
    لطلبه : أ ـ ستة أشهر على الأقل من تاريخ حصوله على شهادة اجتياز الدراسة فوق الجامعية أو الجامعية أو شهادة الثانوية العامة أو ما يعادلها أو شهادة اجتياز التدريب . ب ـ ستة أشهر على الأقل من تاريخ انسحابه من الدراسة أو التدريب إذا كان لا يستحق مكافأة من الدولة خلال هذه الدراسة أو التدريب . ج ـ سنة كاملة على الأقل من تاريخ انسحابه من الدراسة أو التدريب إذا كان يستحق مكافأة من الدولة خلال هذه الدراسة أو التدريب . د ـ ثلاثة أشهر على الأقل من تاريخ انتهاء العلاقة الوظيفة أو العمالية إذا سبق للمتقدم أن عمل في القطاع العام أو القطاع الخاص مع مراعاة ما ورد في الفقرة (7) من هذه المادة . ويجوز للوزير تعديل شروط الاستحقاق الواردة في الفقرة (12) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الخامسة: النشاط التجاري'
  article_text_ar: 'يُقصد بالنشاط التجاري لأغراض هذا التنظيم، على سبيل المثال لا الحصر، ما يأتي: 1 - تملّك مؤسسة فردية لمزاولة أي نشاط تجاري أو صناعي أو زراعي أو خدمي أو مهني أو نحو ذلك من النشاطات. 2 - الحصول على ترخيص لفتح محل أو مكتب لممارسة أي نشاط تجاري أو صناعي أو زراعي أو خدمي أو مهني أو نحو ذلك من النشاطات. 3 - الاشتراك في شركة مهنية. 4 - وجود غير سعوديين على كفالة المتقدم باستثناء الوالدين والزوج أو الزوجة والأبناء والبنات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: المادة السادسة:الدخل الثابت
  article_text_ar: '1- يقصد بالدخل الثابت لأغراض هذا التنظيم المتوسط الشهري لدخل المتقدم خلال الاثني عشر شهراً السابقة لبداية الشهر الذي تقدم فيه بطلب الإعانة، ويشمل - على سبيل المثال لا الحصر - جميع ما حصل عليه المتقدم من المصادر التالية : أ - إيجار أي أصول ثابتة أو منقولة. ب - أرباح أسهم أو حصص في أي نوع من أنواع الشركات. جـ - نفقة شهرية بموجب حكم قضائي أو بموجب اتفاق. د - ما يصرف للمتقدم من مخصصات بموجب نظام الضمان الاجتماعي. هـ - المخصصات المالية التي يحصل عليها المتقدم من المخصصات والقواعد في وزارة المالية. و - جميع ما حصل عليه المستفيد لذاته من الدولة من الإعانات والمبالغ الأخرى دون مقابل. 2 - لا يعد في حكم الدخل الثابت ما يلي: أ - ما يحصل عليه المتقدم أو أسرته من مساعدات أو هبات أو صدقات أو زكاة نقدية أو عينية من الجمعيات أو المؤسسات الخيرية المرخص لها نظاماً. ب - المساعدات التي تصرف في حالات الكوارث.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: المادة السابعة:الإقامة الدائمة
  article_text_ar: 1 - بالنسبة إلى المتقدم، الإقامة في المملكة العربية السعودية لمدة لا تقل عن عشرة أشهر في السنة السابقة لتقديمه لطلبه، ويستثنى من ذلك من كان خارج المملكة العربية السعودية لأغراض الدراسة بموجب شهادة معترف بها أو غيرها من الحالات بموجب مسوغات معتمدة. 2 - بالنسبة إلى المستفيد، الإقامة في المملكة العربية السعودية لمدة لا تقل عن عشرة أشهر خلال الفترة التي تصرف له فيها الإعانة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة الثامنة: إيقاف الإعانة أو تخفيضها أو الخصم منها'
  article_text_ar: '1 - يوقف صرف إعانة البحث عن عمل للمستفيد - وبشكل فوري - في أي من الحالات الآتية : أ ـ وفاة المستفيد . ب ـ زوال أي من شروط الاستحقاق . ج ـ انتهاء مدة صرف الإعانة . د - رفض المستفيد عرضاً مناسباً للعمل وفقاً لما تحدده اللائحة. هـ ـ عدم التحاق المستفيد أو عدم إتمامه بنجاح لأي دورة تعليمية أو تدريبية طلب الصندوق منه الالتحاق بها، أو عدم اتمامها بنجاح، أو عدم حضوره في المواعيد التي يحددها الصندوق للمقابلات الشخصية مع أصحاب الأعمال أو مع الجهات الحكومية أو الخاصة، أو عدم زيارته لملفه الإلكتروني في قاعدة بيانات طالبي العمل؛ وذلك وفقاً لما تحدده اللائحة من أحكام. 2 - في حال إيقاف صرف الإعانة لتحقق أي سبب من الأسباب الموضحة في الفقرة (1) من هذه المادة، فإنه لا يحق للمستفيد التقدم بطلب جديد إلا في حال توافر جميع شروط الاستحقاق فيه ، وفي حال قبول طلبه ، تصرف له إعانة البحث عن عمل للمدة الباقية من مدة صرف إعانة البحث عن عمل بحيث لا تتجاوز المدة الإجمالية ، سواء كانت مستمرة أو متقطعة ، التي تصرف خلالها لأي مستفيد عن مدة صرف الإعانة. 3 - تخفض إعانة البحث عن عمل بمقدار لا يقل عن (200)
    مائتي ريال، في كل مرة تتحقق فيها أي حالة من الحالات الآتية : أ ـ في حال تخلف المستفيد عن حضور دورة تعليمية أو تدريبية، بما في ذلك التدريب عن بعد، أو عدم إكماله لها، وفقاً للشروط التي تحددها اللائحة. ب ـ في حال تخلف المستفيد عن الحضور في الموعد الذي يحدده الصندوق لإجراء المقابلة الشخصية مع أصحاب الأعمال أو مع الجهات الحكومية أو الخاصة قبل - أو خلال - مدة صرف الإعانة له ، دون عذر يقبله الصندوق . جـ ـ في حال عدم زيارة المستفيد لملفه الإلكتروني في قاعدة بيانات طالبي العمل وفقاً لما تحدده اللائحة. 4 - يخصم من الإعانة التي يستحقها المستفيد بموجب هذا التنظيم مبلغ يعادل الدخل الثابت له. 5 - في حال تخفيض الإعانة أو الخصم منها - وفقاً لما ورد في الفقرتين (3) و(4) من هذه المادة - يستمر صرف باقي الإعانة إلى حين استكمال المدة المقررة لصرفها ما لم يوقف صرفها وفقاً لأحكام هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة التاسعة : مهمات الوزارة والصندوق ومسؤولياتهما'
  article_text_ar: '1- مهمات الوزارة ومسؤولياتها : أ ـ إصدار القرارات التنفيذية اللازمة لوضع هذا التنظيم موضع التنفيذ . ب ـ التنسيق مع الجهات الحكومية والخاصة لتسهيل إجراءات التقدم وصرف إعانة البحث عن عمل للمستفيدين . جـ ـ الإشراف والتأكد من قيام الصندوق بأداء مهماته ومسؤولياته بموجب هذا التنظيم . 2 - مهمات الصندوق ومسؤولياته : أ ـ إنشاء الموقع الإلكتروني وقاعدة بيانات طالبي العمل وتشغيلها والتواصل من خلالها مع المتقدمين والمستفيدين وتحديد الإجراءات ونماذج الطلبات التي يجب على المتقدم أو المستفيد القيام بها وتعبئتها وتقديمها .ب ـ تلقي طلبات المتقدمين ودراستها وتقرير قبول الطلب أو رفضه .جـ ـ تنفيذ جميع البرامج والدورات وورش العمل اللازمة لتأهيل المتقدمين والمستفيدين وتطوير مهاراتهم سواء بطريقة مباشرة أو من خلال طرف ثالث بما في ذلك التدريب والتأهيل عن بعد.د - صرف إعانة البحث عن عمل للمستفيدين.هـ - متابعة المستفيدين والتأكد من استمرار توافر شروط الاستحقاق فيهم وإصدار القرارات المتعلقة بإيقاف صرف إعانة البحث عن عمل أو تخفيضها أو الخصم منها.و - تلقي ودراسة تظلم المتقدم من قرار رفض طلبه أو تظلم
    المستفيد من قرار إيقاف صرف إعانة البحث عن عمل الخاصة به أو تخفيضها أو الخصم منها . المادة العاشرة : إجراءات التقدم للاستفادة من الإعانة : 1 - يقوم المتقدم الذي تتوافر فيه شروط الاستحقاق بتقديم طلبه للحصول على إعانة البحث عن عمل إلى الصندوق عبر الموقع الإلكتروني أو أي وسيلة أخرى يحددها الصندوق .2 - يلتزم المتقدم بتزويد الصندوق بجميع المستندات التي يطلبها وبالطريقة التي يحددها .3 - يقوم الصندوق بدراسة طلب المتقدم للتحقق من توافر شروط الاستحقاق ، على أن يشعربالرد خلال فترة لا تتجاوز ثلاثة أشهر من تاريخ آخر إجراء استكمله المتقدم. وفي حال كان إشعار الصندوق بالرفض فيجب أن يكون الرفض مسبباً . المادة الحادية عشرة : التزامات المتقدم المستمرة : يلتزم المتقدم خلال الفترة الممتدة من تاريخ تقديم طلبه وحتى تاريخ البت فيه بما يلي : 1 - إشعار الصندوق فوراً بكل تغيير يطرأ على وضعه ويترتب عليه- أو قد يترتب عليه- عدم استحقاقه لإعانة البحث عن عمل .2 - تقديم المستندات التي يطلبها الصندوق لتمكينه من التحقق من توافر شروط الاستحقاق فيه.3 - التقيد بالتعليمات التي يصدرها الصندوق للمتقدم شخصياً أو من خلال ملفه
    الإلكتروني في قاعدة بيانات طالبي العمل بما في ذلك الحضور وإجراء المقابلات الشخصية مع أصحاب الأعمال أو مع الجهات الأخرى التي يحددها الصندوق أو حضور أي دورة تعليمية أو تدريبية، بما في ذلك التدريب عن بعد . المادة الثانية عشرة : التزامات المستفيد المستمرة : يلتزم المستفيد بما يلي : 1 - إشعار الصندوق فوراً بكل تغيير يطرأ على وضعه ويترتب عليه -أو قد يترتب عليه- عدم استحقاقه للإعانة . 2 - تقديم المستندات التي يطلبها الصندوق لتمكينه من التحقق من استمرار توافر شروط الاستحقاق فيه . 3 - اتخاذ الإجراءات اللازمة لفتح حساب بنكي باسمه لدى أحد البنوك التي يحددها الصندوق لتحويل الإعانة إلى هذا الحساب . 4 - التقيد بالتعليمات التي يصدرها الصندوق للمستفيد شخصياً أو من خلال ملفه الإلكتروني في قاعدة بيانات طالبي العمل بما في ذلك الحضور وإجراء المقابلات الشخصية مع أصحاب الأعمال أو مع الجهات الأخرى التي يحددها الصندوق أو حضور أي دورة تعليمية أو تدريبية، بما في ذلك التدريب عن بعد . المادة الثالثة عشرة : استرداد الإعانة : 1 - يلزم المستفيد - الذي قدم بيانات غير صحيحة بغرض الحصول على إعانة البحث عن عمل- بإعادة
    كامل مبلغ الإعانة التي صرفت له. 2 - للوزارة إحالة من يقدم بيانات غير صحيحة بغرض الحصول على الإعانة إلى المحكمة المختصة بعد اتباع الإجراءات النظامية المنصوص عليها . 3 - يجوز للصندوق اتخاذ جميع الإجراءات اللازمة لاستعادة الإعانة التي صرفت للمستفيد وثبت عدم استحقاقه لها بجميع الطرق ، وتتمتع هذه المبالغ بالحماية المقررة لأموال الدولة . المادة الرابعة عشرة : التظلم من قرارات الصندوق: للمتقدم الذي رفض طلبه أو رفض تظلمه الإداري في الحصول على الإعانة، وكذلك المستفيد الذي رفض تظلمه من قرار إيقاف صرف الإعانة أو تخفيضها أو الخصم منها؛ الطعن في قرار الرفض أمام المحكمة الإدارية المختصة . المادة الخامسة عشرة : يصدر الوزير اللائحة لهذا التنظيم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7332c942-b24e-4903-9b1b-a9a700f2b726/1
  verified: false
- article_ref: 'المادة العاشرة : إجراءات التقدم للاستفادة من الإعانة'
  article_text_ar: 1 - يقوم المتقدم الذي تتوافر فيه شروط الاستحقاق بتقديم طلبه للحصول على إعانة البحث عن عمل إلى الصندوق عبر الموقع الإلكتروني أو أي وسيلة أخرى يحددها الصندوق .2 - يلتزم المتقدم بتزويد الصندوق بجميع المستندات التي يطلبها وبالطريقة التي يحددها .3 - يقوم الصندوق بدراسة طلب المتقدم للتحقق من توافر شروط الاستحقاق ، على أن يشعربالرد خلال فترة لا تتجاوز ثلاثة أشهر من تاريخ آخر إجراء استكمله المتقدم. وفي حال كان إشعار الصندوق بالرفض فيجب أن يكون الرفض مسبباً .
