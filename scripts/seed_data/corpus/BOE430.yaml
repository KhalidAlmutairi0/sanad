articles:
- article_ref: 'المادة الأولى: إنشاء الهيئة'
  article_text_ar: تنشأ وفقاً لأحكام هذا التنظيم هيئة مهنية باسم (الهيئة السعودية للمحامين)، تتمتع بشخصية اعتبارية وذمة مالية مستقلة، وتعمل تحت إشراف وزارة العدل، ويكون مقرها مدينة الرياض، ويجوز أن تنشئ فروعاً لها داخل المملكة بقرار من مجلس إدارتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الثانية: أهداف الهيئة وصلاحياتها'
  article_text_ar: 'تهدف الهيئة إلى رفع مستوى ممارسة المحامين لمهنتهم وضمان حسن أدائهم لها، والعمل على زيادة وعيهم بواجباتهم المهنية، وذلك وفقاً لهذا التنظيم والأنظمة المرعية الأخرى. ويكون للهيئة في سبيل تحقيق أهدافها جميع الصلاحيات اللازمة لذلك، ومن ذلك ما يأتي: 1 - وضع أسس ومعايير مزاولة المهنة، ومراجعة تلك المعايير، وتطويرها وفقاً للأصول الشرعية والأنظمة المرعية.2 - العمل على رعاية مصالح أعضاء الهيئة الأساسيين المتعلقة بممارسة المهنة وفق ما هو مقر نظاماً، والعمل على تقديم الخدمات اللازمة لهم في هذا الشأن، بما فيها التصديق على توقيعاتهم. 3 - تنظيم الدورات وإقامة المؤتمرات والندوات واللقاءات والملتقيات والمعارض ذات العلاقة بمهنة المحاماة، والمشاركة فيها، وذلك بعد التنسيق مع وزارة العدل، ووفقاً للإجراءات النظامية. 4 - وضع البرامج التأهيلية والتدريبية في مجال المهنة وتقويمها، والمشاركة في ذلك مع الجهات المختصة. 5 - إجراء الدراسات والبحوث ونشرها، وإصدار الكتب والنشرات والمجلات العلمية والمهنية والدوريات. 6 - التقدم إلى الجهات المختصة بما تراه من مقترحات تتعلق بالمهنة. 7 - تقديم العون الحقوقي
    للمستحقين، والمشورة الفنية في مجال اختصاصها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الثالثة: العضوية'
  article_text_ar: 'تكون العضوية في الهيئة على النحو الآتي : 1 - العضوية الأساسية: ويتمتع بها المحامون السعوديون المرخص لهم بمزاولة مهنة المحاماة في المملكة الذين سددوا رسوم العضوية السنوية المقررة. 2 - عضوية الانتساب: ويتمتع بها كل من تتوافر فيه شروط مزاولة مهنة المحاماة في المملكة، وذلك بعد التقدم بطلب هذه العضوية إلى مجلس إدارة الهيئة وقبول المجلس له، وسداد رسوم العضوية السنوية المقررة. 3 - العضوية الفخرية: ويتمتع بها من يقرر مجلس إدارة الهيئة منحها لهم ممن يقدمون إسهامات مميزة تخدم أهداف الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الرابعة: انتهاء العضوية'
  article_text_ar: 'تنتهي العضوية في أي من الحالات الآتية: 1 - الوفاة. 2 - الشطب من جدول المحامين المرخص لهم بالنسبة إلى الأعضاء الأساسيين. 3 - تأخر العضو عن سداد رسم العضوية المستحق مدة تزيد على تسعين يوماً من تاريخ استحقاقه ومضي خمسة عشر يوماً من تاريخ إنذاره بالسداد. 4 - صدور قرار مسبب من مجلس الإدارة بإنهاء العضوية. 5 - الانسحاب من عضوية الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الخامسة: الجمعية العمومية'
  article_text_ar: تكون للهيئة جمعية عمومية تتكون من جميع الأعضاء الأساسيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: المادة السادسة   اجتماعات الجمعية العمومية
  article_text_ar: 1 - تعقد الجمعية العمومية اجتماعها العادي خلال تسعين يوماً من بداية كل سنة مالية للهيئة، ويكون رئيس مجلس الإدارة - أو من ينيبه من بين أعضاء المجلس - رئيساً للاجتماع، ولا يكون الاجتماع صحيحاً إلا إذا حضره نصف الأعضاء على الأقل، فإذا لم يكتمل النصاب يدعى إلى اجتماع آخر يعقد خلال مدة لا تقل عن خمسة عشر يوماً ولا تزيد على ستين يوماً من موعد الاجتماع الأول، ويكون الاجتماع في هذه الحالة صحيحاً بمن حضر. ويجوز للجمعية العمومية عقد اجتماعات استثنائية وفق ما تحدده اللوائح. ولوزارة العدل تكليف من يمثلها لحضور اجتماعات الجمعية العمومية. وتصدر قرارات الجمعية العمومية بأغلبية أصوات الأعضاء الحاضرين، وفي حال التساوي يكون صوت رئيس الاجتماع مرجحاً. 2 - يوجه رئيس مجلس الإدارة الدعوة لاجتماعات الجمعية العمومية قبل ثلاثين يوماً على الأقل من تاريخ انعقادها، ويحدد فيها زمان الاجتماع ومكانه وجدول أعماله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تكوًّن في السنة الأولى من كل دورة جديدة لمجلس الإدارة لجنة عامة للانتخابات من خمسة أعضاء؛ ثلاثة منهم من أعضاء الهيئة الأساسيين تختارهم الجمعية العمومية وعضو من الأمانة العامة للهيئة وعضو من وزارة العدل. وتتولى تلك اللجنة تنظيم أعمال الانتخابات التي تتم في إطار الهيئة، والإشراف عليها وإعلان نتائجها ولا يكون لأي من أعضائها حق التصويت في أي انتخاب تشرف عليه. ويكون انعقادها صحيحاً بحضور أغلبية أعضائها وتصدر قراراتها بأغلبية أعضائها الحاضرين. وتبين اللوائح الأحكام المنظمة لعمل اللجنة، وبخاصة ما يتعلق بحضور أعضائها ورئاستها وبداية عملها وانتهائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الثامنة: اختصاصات الجمعية العمومية'
  article_text_ar: 'تختص الجمعية العمومية بما يأتي : 1 - إقرار اللوائح اللازمة لهذا التنظيم. 2 - إقرار اللوائح الإدارية والمالية للهيئة. 3 - اقتراح لائحة لتصنيف المحامين ودرجاتهم، ورفعها إلى وزارة العدل لاتخاذ ما تراه في شأنها. 4 - إقرار الضوابط والمعايير الخاصة بقبول طلبات عضوية الانتساب. 5 - إقرار رسوم العضوية وأي مقابل مالي تتقاضاه الهيئة، وآلية السداد. 6 - انتخاب أعضاء مجلس إدارة الهيئة المنصوص عليهم في الفقرة (ز) من المادة (التاسعة). 7 - إقرار الميزانية السنوية للهيئة، والموافقة على حساباتها الختامية. 8 - إقرار خطة العمل التي يقدمها مجلس إدارة الهيئة، واعتماد التقرير السنوي للهيئة. 9 - إقرار سياسة استثمار أموال الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة التاسعة: تكوين مجلس إدارة الهيئة'
  article_text_ar: 'يكون مجلس إدارة الهيئة على النحو الآتي: أ - وزير العدل رئيساً ب - ممثل من وزارة الداخلية عضواً ج - ممثل من وزارة العدل عضواً د - ممثل من وزارة التجارة والصناعة عضواً هـ - ممثل من ديوان المظالم عضواً ويجب ألا تقل مرتبة ممثلي الجهات الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها. و - اثنان من أعضاء هيئة التدريس السعوديين في الجامعات، من الكليات ذات العلاقة، يختارهما وزير التعليم عضوين ز - خمسة من الأعضاء الأساسيين في الهيئة، تنتخبهم الجمعية العمومية أعضاء ويجب أن يتوافر في العضو المنتخب الشرطان الآتيان: 1 - أن يكون منتظماً في سداد رسوم العضوية المقررة لآخر ثلاث سنوات. 2 - ألا يكون قد صدر في حقه قرار تأديبي نهائي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تنتهي العضوية في المجلس بالنسبة إلى الأعضاء المشار إليهم في الفقرة (ز) من المادة (التاسعة) بقرار من المجلس، في أي من الحالتين الآتيتين : 1 - تقديم الاستقالة من عضوية مجلس الإدارة. 2 - عدم حضور ثلاثة اجتماعات متتالية للمجلس، أو ستة اجتماعات متفرقة في الدورة الواحدة، دون عذر يقبله المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الحادية عشرة: مدة المجلس'
  article_text_ar: تكون مدة المجلس ثلاث سنوات. ولا يجوز انتخاب الأعضاء المشار إليهم في الفقرة (ز) من المادة (التاسعة) أكثر من دورتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الثانية عشرة: اجتماعات المجلس ونصاب الحضور والتصويت'
  article_text_ar: 1 - يجتمع المجلس بدعوة من رئيسه مرة على الأقل كل تسعين يوماً، أو كلما طلب ذلك - كتابةً - أربعة أعضاء على الأقل. 2 - مع مراعاة ما ورد في المادة (التاسعة) يعقد المجلس اجتماعاته بحضور أغلبية أعضائه على أن يكون من بينهم الرئيس أو من ينيبه من أعضاء المجلس. وتصدر قرارات المجلس بموافقة أغلبية الأعضاء الحاضرين، وإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. ويتولى الأمين العام أو من ينوب عنه أمانة المجلس دون أن يكون له حق التصويت. وللمجلس أن يطلب حضور من يرى حاجة إلى سماع آرائه أو الاستعانة به، ولمن يحضر بهذه الصفة حق الاشتراك في المناقشة بحسب ما يطلب منه دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الثالثة عشرة: اختصاصات المجلس'
  article_text_ar: 'فيما عدا ما يدخل في اختصاصات الجمعية العمومية، يكون للمجلس حق ممارسة جميع الصلاحيات اللازمة لتصريف شؤون الهيئة وتحقيق أهدافها، ومنها : 1 - اقتراح اللوائح اللازمة لهذا التنظيم واللوائح المالية والإدارية للهيئة. 2 - اقتراح رسوم العضوية وأي مقابل مالي تتقاضاه الهيئة، وآلية السداد. 3 - إعداد الحساب الختامي ومشروع الميزانية السنوية للهيئة. 4 - إعداد التقرير السنوي عن نشاط الهيئة. 5 - تكوين اللجان اللازمة لمساعدة المجلس في ممارسة مهماته. 6 - قبول الهبات والتبرعات والوصايا والأوقاف. 7 - اقتراح سياسة استثمار أموال الهيئة. 8 - اقتراح خطة عمل الهيئة لكل سنة مالية. 9 - المشاركة في وضع وتقويم البرامج التأهيلية والتدريبية في مجال المهنة مع الجهات المختصة. 10 - تلقي ما يقدم إلى الهيئة من شكاوى ضد المحامين تتصل بالجوانب المهنية، ومحاولة تسويتها. 11 - وضع قائمة دورية بأسماء المحامين المتبرعين لتقديم المعونة القضائية، وترشيح من تراه منهم عند طلب الجهات ذات العلاقة بما فيها جهات التحقيق والمحاكم. 12 - منح العضوية الفخرية. 13 - البت في طلبات عضوية الانتساب، وإنهاء عضوية الأعضاء الأساسيين
    والمنتسبين.14 - دراسة الطلبات المهنية للمحامين من الأعضاء، والنظر في دعمها لدى الجهات المختصة. 15 - التصرف في أموال الهيئة الثابتة والمنقولة بما يحقق أغراضها، وفقاً لما تحدده اللوائح المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يمثل الهيئة في صلاتها بغيرها من الجهات وأمام القضاء رئيس مجلس الإدارة أو من ينيبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة الخامسة عشرة: الأمانة العامة'
  article_text_ar: يكون للهيئة أمين عام، وأمين مساعد واحد أو أكثر، يعينهم المجلس، ويحدد واجباتهم ومسؤولياتهم، ويتعين عليهم التفرغ للعمل بالهيئة.وللأمين العام تعيين عدد كافٍ من العاملين اللازمين لمساعدته في أداء مهماته وفقاً للميزانية المعتمدة للهيئة، وللأمين العام صلاحية توزيع المهمات والأعمال على العاملين المرتبطين به. ويدخل في اختصاصات الأمين العام التصديق على صحة توقيعات الأعضاء الأساسيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة السادسة عشرة: السنة المالية'
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة، واستثناء من ذلك، تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة السابعة عشرة: موارد الهيئة'
  article_text_ar: 'تتكون موارد الهيئة من الآتي: 1 - رسوم العضوية والمقابل المالي لما تقدمه من خدمات. 2 - الإعانات الحكومية إن وجدت. 3 - الهبات والتبرعات والوصايا والأوقاف التي يقبلها مجلس الإدارة. 4 - عوائد استثمار أموالها. 5 - الموارد الأخرى التي يوافق عليها مجلس الإدارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تودع الهيئة أموالها النقدية باسمها لدى أحد البنوك المحلية، ولا يجوز سحب أي مبلغ إلا بشيك يوقعه رئيس مجلس الإدارة - أو من يفوضه من أعضاء المجلس - والأمين العام. ولا يجوز للهيئة أن تنفق أموالها في غير الأغراض التي أنشئت من أجلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: 'المادة التاسعة عشرة: مراجع الحسابات'
  article_text_ar: يكون للهيئة مراجع حسابات تعينه الجمعية العمومية من بين المحاسبين القانونيين المرخص لهم بالعمل في المملكة، وتحدد الجمعية أتعابه، ويكون له حق الاطلاع على الدفاتر والمستندات وإبداء ما يراه من ملحوظات، ويقدم للجمعية العمومية تقريراً عن حسابات الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يعمل بهذا التنظيم بعد ستين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/197be463-0b2b-4b67-9cd2-a9a700f2733b/1
  verified: false
