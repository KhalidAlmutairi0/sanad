regulation:
  code: BOE474
  name_ar: تنظيم المركز الوطني لقياس أداء الأجهزة العامة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك: المركز: المركز الوطني لقياس أداء الأجهزة العامة. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. المدير: مدير عام المركز. الأجهزة: الأجهزة الحكومية، والوزارات، والهيئات العامة، والصناديق، والأجهزة ذات الشخصية المعنوية العامة المستقلة. التنظيم: تنظيم المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1- يتمتع المركز بالشخصية الاعتبارية والاستقلال المالي والإداري، ويكون هو المرجع لقياس أداء الأجهزة، ويرتبط تنظيمياً برئيس مجلس الوزراء.2- يكون مقر المركز الرئيس في مدينة الرياض، وله أن ينشئ فروعاً ومكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى قياس أداء الأجهزة من خلال تطبيق نماذج ومنهجيات وأدوات موحدة وملزمة لها لدعم كفايتها وفاعليتها، وإعداد تقارير دورية حول نتائج أدائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يتولى المركز المهام الآتية: 1 - بناء مؤشرات وأدوات قياس أداء الأجهزة، واعتمادها وتطويرها بشكل مستمر. 2 - دعم عمليات تحسين الخدمات الحكومية وتطويرها من خلال قياس جودة الخدمات ورضا المستفيدين.3 - دعم الأجهزة في تنفيذ غاياتها وخططها الاستراتيجية وفق مؤشرات تسهم في ضمان تحقيق أهدافها ومبادراتها ومشروعاتها المعتمدة.4 - تحديد وتحليل المخاطر وأوجه الصعوبات التي تواجه الأجهزة في مسارها لتحقيق أهدافها واقتراح الحلول المناسبة لمعالجتها. 5 - إعداد التقارير عن نتائج أداء الأجهزة، التي يمكن توظيفها في مراجعة وتحسين الأداء الحكومي.6 - نشر ثقافة قياس ومراجعة وتحسين أداء الأجهزة، وتعزيز قدراتها في هذا المجال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'للمركز من أجل تحقيق مهامه استخدام الوسائل الآتية: 1 - التواصل مع الأجهزة للتعريف بالمركز وأهدافه والخدمات التي يقدمها. 2 - تنفيذ زيارات ميدانية، وإعداد وتنظيم ورش عمل ودورات تدريبية متخصصة في مجال قياس الأداء. 3 - الاستعانة بالخبراء والمختصين والمستشارين ذوي الكفايات المطلوبة في المجالات ذات العلاقة بقياس الأداء.4 - عقد شراكات واتفاقيات تعاون مع الأجهزة ذات العلاقة، لتبادل الخبرات وتعزيز تطبيق نظم قياس أداء الأجهزة. 5 - تبني أفضل البرمجيات الحاسوبية والتطبيقات التقنية في مجال قياس الأداء. 6 - عقد اللقاءات والندوات والمؤتمرات المتخصصة في مجال أعمال المركز.7 - تقديم استشارات إدارية للأجهزة في مجال قياس الأداء.8 - إعداد دراسات وبحوث علمية في مجال قياس الأداء، ونشرها.9 - التعاون مع الجامعات ومراكز البحوث والمؤسسات المتخصصة في قياس الأداء على المستويين المحلي والدولي.10 ـ تشجيع الأجهزة على التميز المؤسسي من خلال تقديم حوافز لذلك.11 - أي وسيلة أخرى تساعده في تحقيق أهدافه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يكون للمركز مجلس إدارة يشكل على النحو الآتي: أ- رئيس مجلس الشؤون الاقتصادية والتنمية رئيساً ب- وزير الاقتصاد والتخطيط عضواً وأميناَ ج- وزير الخدمة المدنية عضواً د- اثنان من وزراء الدولة يصدر بتسمييتها قرار من مجلس الوزراء عضوين للرئيس تعيين نائب له من بين الأعضاء. تحدد مكافأة أعضاء المجلس بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- يجتمع المجلس بدعوة من رئيسه مرة واحدة كل ثلاثة أشهر، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك ثلث أعضائه على الأقل، ويجب أن توجه الدعوة - كتابة - قبل الاجتماع بسبعة أيام على الأقل، على أن تتضمن جدول الأعمال.2 - تعقد اجتماعات المجلس بحضور أغلبية الأعضاء، بمن فيهم الرئيس أو نائبه.3 - يكون لكل عضو من أعضاء المجلس صوت واحد، وتصدر القرارات بأغلبية أصوات أعضاء المجلس، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع.4 - لا يجوز لأي عضو الامتناع عن التصويت أو أن يفوض شخصاً آخر للتصويت نيابة عنه عند غيابه.5 - تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، ويجوز للعضو الذي يعترض على أي قرار أن يثبت اعتراضه مسبباً في المحاضر.6 - يجوز للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: '1- المجلس هو السلطة العليا للمركز، ويتولى الإشراف عليه وتصريف أموره، وله اتخاذ جميع القرارات اللازمة لتحقيق أغراضه في حدود أحكام هذا التنظيم، وله على وجه الخصوص ما يلي: أ - إقرار السياسات والاستراتيجيات العامة للمركز، والخطط والبرامج اللازمة لتنفيذها. ب - إقرار الهيكل التنظيمي واللوائح الإدارية والمالية واللوائح اللازمة لتنفيذ هذا التنظيم. ج - اقتراح مشروعات الأنظمة المتعلقة بقياس الأداء، ورفعها بحسب الإجراءات. د - إقرار التقارير الدورية عن نتائج أداء الأجهزة، والرفع عنها إلى مجلس الوزراء. هـ - إقرار المنهجيات والأساليب والأدوات المستخدمة لتطبيق قياس الأداء في الأجهزة. و- إقرار مشروع ميزانية المركز وحسابه الختامي وتقرير مراجع الحسابات والتقرير السنوي، ورفع ما يلزم منها لاستكمال الإجراءات النظامية في هذا الشأن. ز- تحديد المقابل المادي للخدمات التي يقدمها المركز في مجال اختصاصه. ح - الموافقة على إقامة لقاءات وندوات ومؤتمرات علمية متعلقة بمهام المركز، وفقاً للإجراءات المنظمة لذلك. ط - إقرار ضوابط استعانة المركز بالخبرات والمكاتب الاستشارية المحلية والأجنبية للدراسات والبحوث.
    ي - إقرار قواعد إجراء المسوحات الميدانية والشراكات اللازمة مع الأطراف الأخرى لمساندة المركز. ك - قبول ما يقدم للمركز من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف، بما لا يتعارض مع القواعد المنظمة لذلك. ل - اعتماد خطة العمل السنوية والخطط التشغيلية للمركز. م - تعيين مراجع حسابات خارجي معتمد، وتعيين مراقب مالي داخلي. ن - تعيين مدير عام للمركز من ذوي الكفاية والاختصاص. 2 - للمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من سواهم، ويعهد إليها بما يراه من مهمات، ويحدد قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ومكافآت أعضائها.3 - للمجلس تفويض رئيسه أو من يراه من أعضائه أو مديره ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يكون مدير عام المركز هو المسؤول التنفيذي عن إدارة شؤون المركز، وتسيير أعماله ومسؤولياته في حدود ما ينص عليه هذا التنظيم واللوائح الصادرة بموجبه وما يقرره المجلس، ويمارس الاختصاصات الآتية: 1 - الإشراف على سير العمل في المركز من خلال اللوائح والخطط والبرامج المعتمدة.2 - اقتراح السياسات والاستراتيجيات العامة للمركز، والخطط والبرامج اللازمة لتنفيذ ذلك، ورفعها إلى المجلس.3 - اقتراح المنهجيات والأساليب والأدوات المستخدمة لتطبيق قياس الأداء في الأجهزة.4 - إعداد مشروع الميزانية السنوية للمركز ومشروع الحساب الختامي، ورفعهما إلى المجلس.5 - تمثيل المركز أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة وغيرها من الجهات داخل المملكة وخارجها.6 - اقتراح الهيكل التنظيمي واللوائح الإدارية والمالية واللوائح اللازمة لتسيير العمل في المركز، وعرضها على المجلس، والإشراف على تنفيذها بعد اعتمادها، واعتماد إجراءات العمل المبنية على اللوائح والقرارات الصادرة عن المجلس.7 - إصدار الأوامر بمصروفات المركز من الميزانية السنوية، واتخاذ الإجراءات المالية وفقاً للأنظمة واللوائح
    المقرة والصلاحيات المفوضة له من المجلس.8 - إعداد التقارير الخاصة بتنفيذ خطط المركز وبرامجه، وعرضها على المجلس.9 - إعداد التقرير السنوي للمركز، وتقديمه إلى المجلس للنظر فيه ورفعه بحسب الإجراءات المتبعة.10 - التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات الممنوحة له من المجلس.11 - تعيين العاملين في المركز وفقاً للصلاحيات الممنوحة له.12 - الإشراف على منسوبي المركز وفقاً للصلاحيات الممنوحة له.13 - تنظيم مشاركة المركز في المؤتمرات والفعاليات المحلية والإقليمية والدولية.14 - إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناءً عليه والقواعد والإجراءات المعتمدة، بحسب الصلاحيات الممنوحة له.15 - إقرار الخطط والبرامج اللازمة لتدريب وابتعاث وإيفاد منسوبي المركز في جميع مجالات عمله، ومتابعة تنفيذها.16 - مباشرة ما تمنحه إياه قرارات المجلس واللوائح الخاصة بالمركز من اختصاصات.17 - للمدير أن يفوض بعض صلاحياته إلى من يراه من منسوبي المركز وفقاً للوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون تبادل بيانات الأجهزة مع المركز إلكترونيًّا - ما أمكن - وفقاً لما تقضي به الأنظمة والتعليمات المرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز للمركز - بعد موافقة المجلس - نشر بيانات ونتائج قياس الأداء؛ لدعم جهود التطوير الإداري، وتحسين الخدمات والبرامج الحكومية في الأجهزة، وبما يعزز الشفافية في القطاع العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: '1 - تتكون موارد المركز مما يأتي : أ - المقابل المادي الذي يتقاضاه نظير الخدمات والأعمال الاستشارية التي يقدمها للجهات غير الحكومية.ب - ما يقبله المجلس من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف.ج - الموارد الأخرى التي يقرها المجلس. 2 - تودع أموال المركز في حساب مفتوح له في مؤسسة النقد العربي السعودي، وله فتح حسابات أخرى لهذا الغرض في البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الأموال وفق ميزانية المركز المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخضع منسوبو المركز لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكون للمركز ميزانية مستقلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: السنة المالية للمركز هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات وعمليات المركز، يعين المجلس مراجع حسابات خارجي (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات ومعاملات المركز وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابهم. وعند تعدد مراجعي الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام المركز. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه بعد موافقة المجلس عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c4da61a8-c85e-49de-a751-a9a700f2db8b/1
  verified: false
