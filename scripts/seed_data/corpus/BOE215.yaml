articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية أينما وردت في هذا النظام المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك: 1 - النظام : نظام الغذاء. 2 - الهيئة : الهيئة العامة للغذاء والدواء. 3 - المجلس : مجلس إدارة الهيئة. 4 - الرئيس : الرئيس التنفيذي للهيئة. 5 - اللائحة : اللائحة التنفيذية لهذا النظام. 6 - الغذاء : كل ما هو معد للاستهلاك الآدمي، سواء أكان خاماً، أم طازجاً، أم مصنعاً، أم شبه مصنع. ويعد في حكم الغذاء أي مادة تدخل في تصنيع الغذاء أو تحضيره أو معالجته. 7 - المادة المضافة : أي مادة تضاف قصداً للغذاء وليست مكوناً له، وذلك للمحافظة على صفات الغذاء أو تحسينها، وتضاف لأغراض تقنية أو لأغراض التغذية سواء أثناء التصنيع، أو التحضير، أو المعالجة، أو التعبئة، أو التغليف، أو النقل، أو التخزين. وقد تصبح هذه المادة نفسها أو نواتجها الثانوية جزءًا من الغذاء بصورة مباشرة، أو غير مباشرة. 8 - سلامة الغذاء : مأمونية الغذاء وخلوه من أي مصدر خطر أو مضر خلال مراحل السلسلة الغذائية إلى أن يصل إلى المستهلك. 9 - الممارسات الصحية للغذاء : الاشتراطات والتدابير الضرورية للتحكم بالمخاطر لضمان
    صلاحية الغذاء للاستهلاك الآدمي في جميع مراحل السلسلة الغذائية، مع الأخذ في الاعتبار الاستخدام المتوقع للغذاء. 10 - جودة الغذاء : درجة تميز الغذاء أو خصائصه اللازمة لتلبية حاجة المستهلك وترغيبه فيه أو جعله مقبولاً لديه، أو التي تحقق متطلبات المواصفات القياسية أو القواعد الفنية للجودة التي تعتمدها الهيئة. 11 - المستهلك : من يستهلك الغذاء بنفسه ولا يستخدمه لأي نشاط تجاري. 12 - السلسلة الغذائية : المراحل التي يمر بها الغذاء من الإنتاج الأولي حتى وصوله إلى المستهلك، بما في ذلك استيراده، وتصديره، وتصنيعه، وتحضيره، ومعالجته، وتعبئته، وتغليفه، وتجهيزه، وتخزينه، ونقله، وحيازته، وتوزيعه، وعرضه للبيع، وبيعه، وتوزيعه بالمجان. 13 - تداول الغذاء : الممارسات التي يمر بها الغذاء خلال السلسلة الغذائية. 14 - المرخص له : الشخص ذو الصفة الطبيعية أو المعنوية الذي يرخص له بممارسة نشاط غذائي في أي مرحلة من السلسلة الغذائية. 15 - المنشأة الغذائية : أي كيان نظامي يقوم بعمل يتعلق بتداول الغذاء خلال مراحل السلسلة الغذائية، ويستثنى من ذلك المطابخ المنزلية للأسرة. 16 - مرفق الغذاء : مقر أو بناء دائم أو مؤقت أو ثابت
    أو متحرك، أو وسيلة نقل تستخدمها المنشأة الغذائية. 17 - البطاقة الغذائية : أي بيان أو رمز أو علامة تجارية أو أي شيء مصور أو وصفي سواء كان مكتوباً أو مطبوعاً أو مرسوماً أو معلماً أو ملصقاً أو محفوراً أو مضغوطاً على حاوية أو غطاء أو غلاف لأي غذاء، أو عبوته، أو مرافقاً لأي من ذلك. 18 - البيانات الإيضاحية : أي معلومة مكتوبة أو مطبوعة أو مرسومة أو مصورة على البطاقة الغذائية المصاحبة للغذاء، أو معروضة بالقرب من الغذاء، ويشمل ذلك الترويج لبيعه، أو التصرف فيه. 19 - اللوائح الفنية : وثائق إلزامية تصف خصائص الغذاء أو طرق إنتاجه وتصنيعه، والتعليمات المنظمة لذلك، بما فيها المصطلحات أو الرموز أو التعبئة أو البيانات الإيضاحية، أو البطاقة الخاصة بالمنتج، أو طريقة إنتاجه. 20 - المواصفات القياسية للغذاء : وثيقة غير إلزامية تقرها الهيئة، وتنص على قواعد أو مبادئ توجيهية، أو خصائص الغذاء ومنتجاته، أو عمليات أو أساليب الإنتاج المرتبطة بها، وقد تشمل المصطلحات أو الرموز أو التعبئة أو متطلبات البطاقة الغذائية، والبيانات الإيضاحية المتعلقة بالمنتج، أو طريقة إنتاجه. 21 - المواصفات القياسية الدولية للغذاء : المواصفات
    القياسية للغذاء التي تصدرها منظمات وهيئات معترف بها دوليًّا. 22 - الاشتراطات البيئية والصحية : التعليمات أو الضوابط أو الإرشادات البيئية والصحية الإلزامية التي يجب الأخذ بها في تداول الغذاء، وفقاً للشروط والإجراءات التي تحددها اللوائح الفنية. 23 - الإعلان : أي بيان سواء كان مكتوبًا، أو مقروءًا، أو مسموعًا، أو مرئيًّا، أو غير ذلك؛ يقصد منه الترويج المباشر أو غير المباشر لبيع أو تصريف أي غذاء، أو مادة مقدمة بوصفها غذاء. 24 - العبوة : أي وعاء أو مادة يوضع فيها الغذاء، أو يعبأ أو يغلف بها كصندوق، أو زجاجة، أو علبة، أو صفيحة، أو برميل، أو كيس، أو حقيبة، أو غلاف. 25 - الإنتاج الأولي : إنتاج وتربية حيوانات المزرعة قبل الذبح وزراعة المنتجات الأولية، بما في ذلك الحلب والحصاد، ويشمل ذلك صيد الحيوانات، وصيد الأسماك والقشريات وإنتاجها، وحصاد المنتجات البرية وجمعها. 26 - الملوثات : أي مادة تصل للغذاء عرضاً أثناء مراحل السلسلة الغذائية، وتؤثر سلباً على سلامته وصلاحيته. 27 - المخاطر : درجة احتمال حدوث تأثير سلبي على صحة الإنسان وشدة ذلك الأثر نتيجة تعرضه لمصادر الخطر في الغذاء. 28 - مصدر الخطر : عامل
    بيولوجي أو كيميائي أو فيزيائي يوجد في الغذاء، أو حالة قد تجعل الغذاء ضاراً، أو يؤثر سلباً على صحة الإنسان. 29 - تحليل المخاطر : نهج علمي يهدف إلى تقويم مدى خطورة الغذاء وطريقة التحكم في المخاطر من خلال ثلاثة عناصر مترابطة مع بعضها: تقويم المخاطر، وإدارة المخاطر، والإبلاغ عن المخاطر. 30 - تتبع الغذاء : الإجراءات والتدابير التي تمكن من اقتفاء أثر الغذاء، أو أي من مصادره، أو أي مادة تدخل عليه في أي مرحلة من مراحل السلسلة الغذائية. 31 - سحب الغذاء : الإجراءات أو التدابير التي تتخذ لاستعادة حيازة الغذاء غير المأمون للمستهلك أو المخالف لهذا النظام، ومنع توزيعه، أو عرضه. 32 - التفتيش : فحص الغذاء والرقابة عليه في تداوله خلال مراحل السلسلة الغذائية للتحقق من توافقه مع المتطلبات النظامية. 33 - المفتش : الشخص المؤهل تأهيلاً مناسباً وفقاً لطبيعة المهمة المكلف بها ضمن أعمال الرقابة على الغذاء. 34 - التدابير الصحية لسلامة الغذاء : أي إجراءات تطبق لحماية حياة الإنسان وصحته من المخاطر الناتجة من المضافات الغذائية والملوثات والسموم والجراثيم المسببة للأمراض في الغذاء، أو لوقاية الإنسان من الأمراض الصحية
    المنقولة بوساطة النباتات، أو المنتجات النباتية، أو الحيوانية. وتشمل التدابير أي تنظيمات أو متطلبات أو سياسات أو قرارات أو إجراءات ذات علاقة مباشرة بسلامة الغذاء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف هذا النظام إلى الآتي: 1 - ضمان سلامة الغذاء، والعمل على تحسين جودته.2 - حماية الصحة العامة للمستهلك من خلال تقليل المخاطر المرتبطة بالغذاء، ونشر التوعية الغذائية السليمة.3 - حماية المستهلك من الغذاء الضار أو المغشوش أو المضلل أو غير الصالح للاستهلاك.4 - عدم إعاقة حركة تجارة الغذاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تسري أحكام هذا النظام على جميع مراحل السلسلة الغذائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تصدر الهيئة اللوائح الفنية والمواصفات القياسية للغذاء، ومرافقه، والعاملين فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تراعي الهيئة - عند إصدار اللوائح الفنية والمواصفات القياسية للغذاء وتحديثها - المواصفات القياسية الدولية للغذاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تتبنى الهيئة - في سبيل اعتماد اللوائح الفنية والمواصفات القياسية للغذاء وتحديثها - مبدأ تحليل المخاطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز فسح الغذاء المستورد إلا بعد موافقة الهيئة وفقاً للشروط والمتطلبات والإجراءات التي تحددها اللائحة، وتصدر الهيئة اللوائح المنظمة لإجراءات الإذن بفسح الغذاء المستورد إلى المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على المنشآت الغذائية التسجيل لدى الهيئة، بما في ذلك مرافق الإنتاج الأولية، وتحدد اللائحة شروط التسجيل وإجراءاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: على المنشأة الغذائية تسجيل منتجاتها الغذائية لدى الهيئة، وتحدد اللائحة شروط التسجيل، وإجراءاته، والمواد التي تستثنى من التسجيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: على المختبرات التي تتعامل مع الغذاء التسجيل لدى الهيئة، وتحدد اللائحة شروط التسجيل، وإجراءاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لا يجوز الإعلان عن الغذاء إلا بموافقة من الهيئة وفق الشروط والمتطلبات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا يجوز لأي مختبر التعامل مع الغذاء قبل الحصول على ترخيص من الهيئة وفق الشروط والمتطلبات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يجوز لأي منشأة غذائية تداول الغذاء قبل الحصول على ترخيص فني من الهيئة، وفقاً للمتطلبات والشروط والإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا يجوز تصدير الغذاء إلا من منشأة ترخص لها الهيئة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يجوز لأي فرد العمل في تداول الغذاء إلا بعد الحصول على رخصة ممارسة العمل في الأنشطة المتعلقة بالغذاء، وتحدد اللائحة متطلبات وشروط الحصول على تلك الرخصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'لا يجوز تداول الغذاء في الحالات الآتية: 1 - إذا كان مخالفاً لأحكام الشريعة الإسلامية.2 - إذا كان ضاراً بالصحة أو غير صالح للاستهلاك.3 - إذا كان مخالفاً للوائح الفنية أو المواصفات القياسية للغذاء.4 - إذا كان مغشوشاً، أو يحتوي على طرق أو وسائل مخادعة أو ممارسة تضلل المستهلك.5 - إذا لم يكن معبأ بالطريقة التي تحددها اللوائح الفنية، عدا ما يتم استثناؤه في اللائحة.6 - إذا لم ترفق به البطاقة الغذائية والبيانات الإيضاحية، عدا ما يتم استثناؤه في اللائحة.7 - إذا لم يكن مسجلاً لدى الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تكون المنشأة الغذائية مسؤولة عن ضمان تطبيق أحكام هذا النظام ولوائحه ضمن النشاط الغذائي الواقع تحت مسؤوليتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجب على المنشأة الغذائية أن تكون قادرة على التعرف على مصدر الغذاء الذي تحت إشرافها، وتحديد المنشآت الغذائية التي تمدها به، وتزويد الهيئة بالمعلومات المطلوبة إذا تطلب الأمر ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: للهيئة أن تقوِّم الغذاء قبل تسويقه وفي أثنائه وبعد التسويق إذا تطلب الأمر ذلك، ولها - في ضوء نتيجة التقويم - اتخاذ الإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: إذا علمت أو شكّت المنشأة الغذائية أن الغذاء غير مطابق للاشتراطات والمتطلبات التي تفرضها الهيئة؛ وجب عليها إبلاغ الهيئة بذلك، واتخاذ الإجراءات اللازمة لسحب الغذاء وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تنشئ الهيئة وتدير نظام إنذار سريع للتبليغ عن أي خطر مباشر أو غير مباشر على صحة الإنسان يكون مصدره الغذاء، وتوعية المستهلك بالوسائل التي تراها مناسبة، وذلك وفقاً للإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: الهيئة هي الجهة المخولة نظاماً بتفتيش المنشآت والمرافق الغذائية فيما يخص تطبيق أحكام هذا النظام ولوائحه، ولها الاستعانة بالجهات الأمنية عند الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يتولى مفتشون - يصدر بتسميتهم قرار من الرئيس - أعمال الرقابة والتفتيش وضبط المخالفات، وتكون لهم صلاحيات وسلطات مأموري الضبط الجنائي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: للمفتش عند إبرازه بطاقة هويته الوظيفية دخول المنشآت والمرافق الغذائية لغرض التفتيش، وله الاطلاع على المستندات والسجلات والاحتفاظ بنسخة منها إذا لزم الأمر، كما يمكنه سحب عينات من الأغذية لتحليلها. وعلى المنشأة أو المرفق الغذائي تمكينه من ذلك، وعدم إعاقته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: إذا ظهر للمفتش وجود غذاء مخالف لأحكام هذا النظام أو لوائحه؛ فله حجزه واتخاذ التدابير اللازمة وفقاً للإجراءات التي تحددها اللائحة، على أن يكون الحجز وجوبيًّا إذا كان الغذاء غير مأمون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'يلتزم المفتش بالآتي : 1 - عدم الكشف عن أي معلومة حصل عليها بسبب عمله، ما لم تطلب منه ذلك الهيئة أو المحكمة المختصة.2 - التقيد بالأحكام والإجراءات المنصوص عليها في هذا النظام ولوائحه.3 - تحرير محضر ضبط إذا كانت هناك مخالفة لأحكام هذا النظام ولوائحه، تسلم نسخة منه للمخالف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: للهيئة حق سحب عينات من الغذاء دون مقابل؛ للتحقق من مدى مطابقتها لأحكام هذا النظام ولوائحه، وتحليلها إذا لزم الأمر في مختبراتها، أو في المختبرات المسجلة لديها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: إذا أظهرت نتائج تحليل العينة وجود مخالفة لأحكام هذا النظام ولوائحه؛ فتصدر الهيئة تقريراً بذلك، وللهيئة اتخاذ الإجراءات اللازمة في ضوء نتائج التقرير، بما في ذلك إبلاغ المنشأة الغذائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: للهيئة اعتماد المنهج الوقائي المناسب لضمان سلامة الغذاء خلال مراحل السلسلة الغذائية، ولها في سبيل ذلك فرض النظم الفنية الكفيلة بتحقيقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: إذا توافر للهيئة ما يدعوها للاعتقاد بأن الغذاء قد يسبب أضراراً على صحة المستهلك أو الصحة العامة، ولم يتوافر دليل علمي قاطع يؤكد ذلك؛ فيجوز لها أن تتخذ التدابير الاحترازية اللازمة للتحكم في المخاطر، مع مراعاة حجم الضرر المحتمل، وتفادي فرض قيود غير ضرورية، ومراجعة تلك التدابير خلال مدة معقولة في ضوء نتائج تقويم المخاطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: للهيئة إذا كان هناك خطر محتمل يهدد صحة المستهلك أو الصحة العامة في منشأة غذائية، أو مرافقها، أو أيِّ محتوياتها، أو منتجاتها؛ أن تصدر أمراً بإغلاق هذه المنشأة أو أي من مرافقها وفقاً للإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: إذا ظهر للهيئة أن الغذاء يشكل خطراً على صحة المستهلك أو الصحة العامة، ولا يمكن تفاديه بالتدابير والإجراءات المتاحة؛ فلها الأمر بسحب الغذاء، أو اتخاذ الإجراءات المناسبة وفقاً لما تقتضيه طبيعة الحالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: إذا توافر للهيئة دليل على أن هناك منتجاً غذائيًّا قد يسبب ضرراً على صحة المستهلك، أو الصحة العامة؛ فلها الأمر بسحب المنتج، أو استرجاعه ومنع تداوله وفقاً للإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: للهيئة أن تأمر إداريًّا بإتلاف أي منتج غذائي مخالف لأحكام هذا النظام ولوائحه متى كان تداوله يسبب ضرراً على صحة المستهلك أو الصحة العامة، وتحدد اللائحة إجراءات الإتلاف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: لا يجوز تداول أي منتج غذائي قررت الهيئة سحبه أو استرجاعه من السوق، أو حظر تداوله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 'أولاً : أ - مع عدم الإخلال بأي عقوبة ينص عليها أي نظام آخر؛ يعاقب مرتكب أي مخالفة لأحكام هذا النظام أو لوائحه بواحدة أو أكثر من العقوبات الآتية : 1 - غرامة لا تزيد على مليون ريال. 2 - منع المخالف من ممارسة أي عمل غذائي، وذلك لمدة لا تتجاوز مائة وثمانين يوماً.3 - تعليق الترخيص لمدة لا تتجاوز عاماً.4 - إلغاء الترخيص. ب - تجوز مضاعفة العقوبة في حال تكرار ارتكاب المخالفة.ج - إذا كانت المخالفة تتمثل في التسبب عمداً بتداول مادة غذائية ضارة بالصحة أو مغشوشة أو ممنوعة؛ فتكون العقوبة بالسجن مدة لا تزيد على عشر سنوات، أو بغرامة لا تزيد على عشرة ملايين ريال، أو بهما معاً، بالإضافة إلى تطبيق أي من العقوبات المنصوص عليها في الفقرات (2) و(3) و(4) من البند (أولاً/ أ) من هذه المادة. ثانياً : تتولى الهيئة توقيع العقوبات المنصوص عليها في الفقرات (1) و(2) و(3) و(4) من البند (أولاً/ أ) من هذه المادة، وفقاً لتصنيف للمخالفات وتحديد للعقوبات يعتمده المجلس، ولا تكون العقوبات نافذة إلا بعد اعتمادها من الرئيس أو من يفوضه، وتحدد اللائحة لهذا النظام الضوابط والإجراءات المتعلقة بذلك، ولا يخل ذلك
    بقيام الهيئة باتخاذ ما تراه من تدابير احترازية إذا رأت ضرورة لذلك. ثالثاً : إذا كانت المخالفة تستوجب عقوبة السجن، فتحال إلى هيئة التحقيق والادعاء العام؛ للتحقيق فيها، وإحالتها إلى المحكمة المختصة إذا رأت ذلك. رابعاً : نشر الحكم أو القرار المكتسب للقطعية على نفقة المخالف في ثلاث صحف محلية، يراعى في تحديدها مقر المنشأة الغذائية، ومكان وقوع المخالفة. خامساً : يجوز لمن أصدرت الهيئة في حقه قراراً بالعقوبة؛ التظلم منه أمام اللجنة المنصوص عليها في البند (سادساً) من هذه المادة خلال (ثلاثين) يوماً من تاريخ تبليغه بالقرار. سادساً : يكوّن المجلس لجنة - أو أكثر - لا يقل عدد أعضائها عن ثلاثة، يكون من بينهم مستشار نظامي، وتختص اللجنة بالنظر فيما يأتي: 1 - المخالفات وتوقيع أي من العقوبات المنصوص عليها في الفقرة (ج) من البند (أولاً) من هذه المادة عدا عقوبة السجن، وإصدار القرار المناسب لذلك، ويجوز التظلم منه أمام المحكمة الإدارية خلال (ستين) يوماً. من تاريخ إبلاغه به.2 - تظلم ذي الشأن من قرار العقوبة الذي تصدره الهيئة في حقه، على أن تبت اللجنة في التظلم خلال مدة لا تتجاوز (ستين) يوماً. وفي حالة انتهاء
    هذه المدة دون البت في التظلم، أو عدم قبول المخالف لقرار اللجنة؛ يجوز له التظلم من قرار العقوبة أمام المحكمة الإدارية.وفي حال إلغاء المحكمة الإدارية لقرار العقوبة الصادر من اللجنة أو الهيئة؛ تتولى المحكمة النظر في المخالفة وإيقاع العقوبة المناسبة المنصوص عليها في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: للمتضرر من أي مخالفة لأحكام هذا النظام، الحق في المطالبة بالتعويض عن الأضرار التي تسببت بها تلك المخالفة، وذلك أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: للهيئة إجراء اتفاقيات اعتراف متبادلة أو مذكرات تفاهم أو طرق وآليات أخرى للتعاون الثنائي أو متعدد الأطراف فيما يخص مجال الغذاء، وهي الجهة المخولة نظاماً بتنفيذ هذه الاتفاقيات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يحدد المجلس المقابل المالي نظير الخدمات التي تقدمها الهيئة، والتراخيص وشهادات التسجيل والموافقات التي تصدرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يجوز منح مفتشي الهيئة مكافآت مالية بقرار من المجلس نظير ما يقدمونه من أعمال تؤدي إلى تفادي وقوع ضرر على المستهلك، أو على الصحة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: يجوز منح مكافأة تشجيعية بنسبة لا تزيد على (25%) من مقدار الغرامة المستحقة بقرار من المجلس؛ لمن يساعد - من غير مفتشي الهيئة أو الجهات التي تستعين بها - في الكشف عن مخالفة لأحكام هذا النظام ولوائحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: تعرض الهيئة مشاريع اللوائح الفنية والمواصفات القياسية للغذاء على الجمهور بالأسلوب الذي تراه مناسباً قبل اعتمادها أو إصدارها؛ وذلك لتلقي الملحوظات والمقترحات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: للهيئة الاستعانة بأي جهة حكومية أخرى أو بالقطاع الخاص؛ للقيام بأي مهمة مسندة إليها بموجب هذا النظام ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يصدر المجلس اللائحة خلال (مائة وثمانين) يوماً من تاريخ نشر هذا النظام في الجريدة الرسمية، ويعمل بها ابتداءً من تاريخ العمل به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يعمل بهذا النظام بعد (مائة وثمانين) يوماً من تاريخ نشره في الجريدة الرسمية، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9167ec51-a011-4a22-b6c3-a9a700f290f8/1
  verified: false
