regulation:
  code: BOE132
  name_ar: نظام المساهمات العقارية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لغرض تطبيق هذا النظام، يقصد بالعبارات والألفاظ الآتية -أينما وردت فيه- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: النظام: نظام المساهمات العقارية. اللائحة: اللائحة التنفيذية للنظام. الهيئة: الهيئة العامة للعقار. المجلس: مجلس إدارة الهيئة. الرئيس: الرئيس التنفيذي للهيئة. المساهمة العقارية: مشروع تطوير عقاري يشترك فيه مجموعة من الأشخاص لأجل تحقيق منفعة، ويكون ذلك بتملك عقار وتطويره إلى سكني أو تجاري أو صناعي أو زراعي وغير ذلك، ثم بيع وإنهاء المساهمة، ولا يشمل ذلك الصناديق الاستثمارية العقارية. المساهم: الشخص الذي يملك حصة مشاعة في المساهمة العقارية. الترخيص: ترخيص مساهمة عقارية يصدر من الهيئة. المرخص له: الشخص الحاصل على الترخيص. مدير المساهمة العقارية: الشخص المعين لإدارة المساهمة العقارية. حساب الضمان: الحساب المصرفي الخاص بالمساهمة العقارية. سجل المساهمين: سجل تقيد فيه أسماء المساهمين وحصصهم وأي تغيير يحدث في ملكية حصصهم. الجمعية: جمعية المساهمين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف النظام إلى تنظيم نشاط المساهمات العقارية، وإلى رفع مستوى الشفافية والإفصاح فيه، وإلى حماية حقوق جميع أطراف المساهمة العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'دون إخلال باختصاصات الجهات الحكومية الأخرى، تتولى الهيئة تنظيم نشاط المساهمات العقارية وفقاً لما يحدده النظام واللائحة، ولها على وجه خاص ما يأتي: إصدار الترخيص وتعديله وإلغاؤه. وتحدد اللائحة الشروط والمتطلبات والإجراءات اللازمة لذلك. تصنيف المساهمات العقارية بحسب الحجم أو النوع أو الموقع، ووضع الشروط والمتطلبات الملائمة والمدد الزمنية للمساهمة العقارية بحسب تصنيفها. وضع شروط تأهيل وتصنيف المطورين العقاريين لغرض طرح المساهمات العقارية. وضع شروط تأهيل وتصنيف ممارسي نشاط المساهمات العقارية. وضع أسس تحدد استحقاقات المرخص له نظير أتعابه، وما يتقاضاه من عمولات. الرقابة والإشراف على المساهمات العقارية. وللهيئة الاستعانة بأي جهة حكومية أخرى أو بالقطاع الخاص؛ للقيام بأي مهمة مسندة إليها بموجب النظام أو اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'لا يجوز طرح المساهمة العقارية ولا الإعلان عنها ولا تسويقها ولا جمع الأموال لها إلا بعد موافقة هيئة السوق المالية والحصول على ترخيص من الهيئة -وفقاً لأحكام النظام واللائحة- وذلك بعد التحقق مما يأتي: أن يكون العقار محل المساهمة العقارية مملوكاً بموجب صك ملكية ساري المفعول، ثابتة سلامته، بناءً على إفادة من الجهة التي أصدرته. أن يكون العقار محل المساهمة العقارية حاصلاً على الموافقات اللازمة لتطويره من الجهات المختصة وذلك وفقاً لما تحدده اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب أن يكون المرخص له مؤهلاً ومصنفاً من الهيئة لممارسة نشاط المساهمات العقارية وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يحدد رأس مال المساهمة العقارية، الذي على أساسه يُحتسب عدد الحصص ومقدارها من خلال التكلفة التقديرية من قبل جهة تقييمية مرخصة، بعد موافقة الهيئة وهيئة السوق المالية وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للهيئة اشتراط إضافة مبلغ احتياطي إلى رأس مال المساهمة العقارية بما لا يتجاوز (15%) من تكلفتها التقديرية، وذلك لمقابلة أي مصاريف إضافية غير متوقعة. ويكون التصرف بالمبلغ الاحتياطي بموافقة الجمعية. وتحدد اللائحة الشروط اللازمة لذلك، وكيفية إعادته للمساهمين في حال عدم التصرف به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يحق للمساهم الاشتراك في المساهمة العقارية، بحصة عينية أو نقدية. وتحدد اللائحة نوع الحصة العينية والشروط الواجب توافرها فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يقسم رأس مال المساهمة العقارية إلى حصص متساوية القيمة والحقوق، وتكون مسؤولية المساهمين في حدود ما يملكون من حصص في المساهمة العقارية. تقوم هيئة السوق المالية بتنظيم سجل المساهمين الخاص بالمساهمة العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: لا يجوز الإقراض من رأس مال المساهمة العقارية، ويجوز الاقتراض بضمان أموال أو أصول المساهمة العقارية على أن يتم تضمين اتفاقية المساهمة ذلك، وتحدد اللائحة الاشتراطات المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يكون صافي أصول المساهمة العقارية من أصول ثابتة نقدية وعينية أو حقوق لدى الغير؛ مملوكة للمساهمة العقارية. وليس لدائني المساهمين أو المرخص له أو مدير المساهمة العقارية أي حق في أموال المساهمة العقارية أو أصولها عدا ما يملكونه من الحصص في المساهمة العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجب ألا تقل نسبة المرخص له في المساهمة العقارية عن النسبة التي تحددها اللائحة، وأن يحتفظ لنفسه بملكية هذه النسبة حتى انقضاء المساهمة العقارية. يجوز لبقية المساهمين في المساهمة العقارية التصرف بحصصهم وفق الشروط التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يكون المرخص له هو المسؤول عن جميع ما يتعلق بالمساهمة العقارية تجاه المساهم والهيئة وهيئة السوق المالية وأي من الجهات الحكومية ذات العلاقة والغير. وتحدد اللائحة اختصاصات المرخص له، وحدود مسؤولياته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع مراعاة ما نصت عليه المادة (التاسعة عشرة) من النظام، على المرخص له الالتزام بالإشراف على أعمال مدير المساهمة العقارية، وتمكينه من القيام بواجباته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يفتح المرخص له حساب ضمان في أحد البنوك المرخص لها باسم المساهمة العقارية. وتضع الهيئة بالتنسيق مع البنك المركزي السعودي الضوابط اللازمة لحساب الضمان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تقوم هيئة السوق المالية بتنظيم إصدار شهادة المساهمة العقارية التي تثبت تملك المساهم حصة في المساهمة العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تكتسب المساهمة العقارية الشخصية الاعتبارية بصدور الترخيص من قبل الهيئة، وتكون خاضعة لأحكام النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجب على المرخص له تعيين محاسب قانوني واستشاري هندسي لكل مساهمة عقارية. وتحدد اللائحة شروط ومتطلبات ومسؤوليات ومهمات وآلية عمل كل منهما وما يترتب عليه، فيما يتعلق بالمساهمات العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يدير المساهمة العقارية مدير المساهمة العقارية الذي يُعيّنه المرخص له. وتحدد اللائحة اشتراطات ومتطلبات مدير المساهمة العقارية وصلاحياته ومهماته ومسؤولياته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يحق للمرخص له وللهيئة وللجمعية عزل مدير المساهمة العقارية وفق ما تحدده اللائحة في حال إساءته استخدام صلاحياته أو إخلاله بتنفيذ التزاماته، ولا يخل ذلك بأي عقوبة قد تفرض عليه جراء ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: دون إخلال بما نصت عليه المادة (الرابعة عشرة) من النظام، لا يجوز للمرخص له ولا لمدير المساهمة العقارية اتخاذ أي قرار أو إجراء إذا كان هناك تعارض مصالح قائم أو محتمل في هذا القرار أو الإجراء. وتحدد اللائحة طريقة التعامل مع حالات تعارض المصالح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يكون للمساهمة العقارية جمعية تتشكل من جميع المساهمين المسجلين في سجل المساهمة العقارية. وتحدد اللائحة اختصاصات الجمعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تنعقد اجتماعات الجمعية بدعوة من المرخص له أو مدير المساهمة العقارية أو مساهمين يمثلون (10%) من رأس مال المساهمة العقارية أو بطلب من الهيئة، ويحدد في الدعوة للاجتماع مكان انعقاده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يرأس المرخص له -أو من يمثله- الجمعية، ويحق لجميع المساهمين حضور اجتماعات الجمعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: لا يكون اجتماع الجمعية (الأول) صحيحاً إلا إذا حضره مساهمون يمثلون ما لا يقل عن (ثلثي) رأس مال المساهمة العقارية، وإذا لم يتوافر النصاب اللازم لعقد اجتماع الجمعية (الأول)، وجهت الدعوة إلى اجتماع (ثانٍ) يعقد خلال الأيام الـــ(خمسة عشر) التالية للاجتماع (الأول)، ولا يكون الاجتماع (الثاني) صحيحاً إلا إذا حضره مساهمون يمثلون ما لا يقل عن (نصف) رأس مال المساهمة العقارية. وتصدر قرارات الجمعية في الاجتماعين (الأول) و(الثاني) بأغلبية الحصص الممثلة في الاجتماع، وفي حال تساوي الأصوات يعاد التصويت مرة أخرى. وإذا لم يتوافر النصاب اللازم في الاجتماع (الثاني)، وجهت الدعوة إلى اجتماع (ثالث) يعقد خلال الأيام الـــــ(سبعة) التالية للاجتماع (الثاني)، ويكون الاجتماع صحيحا أيًّا كانت نسبة الحصص الممثلة فيه بشرط ألا يقل عدد الحضور عن (ثلاثة) أشخاص، وتصدر قرارات الجمعية بأغلبية حصص الممثلين في الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يجوز عقد اجتماعات الجمعية والتصويت على قراراتها؛ بواسطة وسائل التقنية الحديثة التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: لا يجوز بيع أصول المساهمة العقارية إلا بعد تقييم الأصول من مقيمين معتمدين وفقاً لنظام المقيمين المعتمدين، ووفقاً لما تحدده اللائحة من إجراءات. ويعد باطلاً أي تصرف ينطوي على إخلال بما نصت عليه هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 'يكون بيع أصول المساهمة العقارية بإحدى الطرق الآتية: البيع بمزاد علني. البيع المباشر لكامل أو لجزء من المساهمة العقارية. أي طريقة أخرى تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'دون إخلال بما نصت عليه المادة (السابعة عشرة) من النظام، تحتفظ المساهمة العقارية بالشخصية الاعتبارية بالقدر اللازم لتصفيتها، وتنقضي بإحدى الحالات الآتية: بيعها وفقاً لأحكام النظام واللائحة. انقضاء المدة المحددة لها ما لم تمدد وفقاً لأحكام النظام واللائحة. استحالة تحقق الغرض الذي أسست من أجله. إلغاؤها وفقاً لأحكام النظام واللائحة. صدور حكم قضائي نهائي بتصفيتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يجب أن تودع جميع العوائد المالية المتعلقة بالمساهمة العقارية مباشرة في حساب الضمان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يتولى ضبط ما يقع من مخالفات لأحكام النظام أو اللائحة موظفون من الهيئة ومن أي جهة أخرى ترى الهيئة الاستعانة بموظفيها، يصدر بتعيينهم قرار من الرئيس بعد موافقة جهاتهم. ولمسؤولي الضبط دخول المواقع والمشاريع المتعلقة بالأنشطة المشمولة بالنظام بما فيها مقر المرخص له، وعليهم ضبط المخالفات والتحفظ على المستندات والوثائق والأدلة المتعلقة بها وفقاً لإجراءات الضبط الصادرة عن الهيئة ويكونون تحت إشراف الهيئة، ولهم الاستعانة بالجهات الأمنية عند الحاجة. وتحدد اللائحة طريقة عملهم، وصلاحياتهم، ومكافآتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'دون إخلال بما نصت عليه المادة (الخامسة والثلاثون) من النظام، يعاقب كل من يخالف أيًّا من أحكام النظام أو اللائحة بواحدة أو أكثر من العقوبات الآتية: الإنذار. إيقاف الترخيص مدة لا تزيد على (سنة). إلغاء الترخيص. غرامة لا تزيد على (10,000,000) عشرة ملايين ريال. منع المرخص له أو مدير المساهمة العقارية من القيام -مستقبلاً- بأي عمل مرتبط بالمساهمات العقارية لمدة لا تتجاوز (10) عشر سنوات. ويصدر المجلس جدولاً يتضمن تصنيفاً للمخالفات والعقوبات المقررة لها بناءً على ما نصت عليه هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: تُكوّن بقرار من رئيس الهيئة لجنة أو أكثر لا يقل عدد أعضائها عن ثلاثة ويسمى أحدهم رئيساً، ويكون من بينهم مستشار شرعي أو نظامي؛ تتولى النظر في المخالفات وإيقاع العقوبات المنصوص عليها في المادة (الثانية والثلاثين) من النظام، وذلك بحسب نوع المخالفة المرتكبة وجسامتها ومدى تأثيرها، ويعتمد قرار اللجنة من رئيس الهيئة أو من يفوضه بذلك. ويصدر الرئيس قواعد عمل اللجنة وتحديد مكافآت أعضائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يجوز التظلم من قرار اللجنة المنصوص عليها في المادة (الثالثة والثلاثين) من النظام أمام المحكمة الإدارية خلال (ستين) يوماً من تاريخ الإبلاغ بالقرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 'دون إخلال بأي عقوبة منصوص عليها في أي نظام آخر، يعاقب بالسجن مدة لا تزيد على (ثلاث) سنوات، كل من يخالف أيًّا من أحكام المواد الآتية: (الرابعة)، و(الحادية والعشرون)، و(السابعة والعشرون)، و(الثلاثون)، من النظام، وتحال إلى النيابة العامة؛ للتحقيق فيها، والادعاء فيها أمام المحكمة المختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: دون إخلال باختصاصات الهيئة، تنظم هيئة السوق المالية بالاتفاق مع الهيئة ما يتعلق بجمع الأموال لغرض طرح المساهمة العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يصدر المجلس اللائحة بالاتفاق مع هيئة السوق المالية، وذلك خلال (مائة وعشرين) يوماً من تاريخ صدور النظام، ويعمل بها من تاريخ العمل به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: ينشر النظام في الجريدة الرسمية، ويعمل به بعد (مائة وعشرين) يوماً من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5efb6f40-d859-47e6-9c8a-b04500943ecc/1
  verified: false
