regulation:
  code: BOE460
  name_ar: التنظيم الخاص بمركز الدراسات والبحوث البترولية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: ينشأ بموجب هذا التنظيم مركز لا يهدف إلى الربح يسمى (مركز الدراسات والبحوث البترولية)، ويكون له شخصية اعتبارية مستقلة، ويشار إليه فيما بعد بـ "المركز".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: مقر المركز مدينة الرياض، وله الحق في إنشاء فروع داخل المملكة. ويجوز بقرار من مجلس الوزراء نقل مقره إلى مكان آخر في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'أغراض المركز هي: إجراء الدراسات والقيام بالبحوث العلمية والتطبيقية الخاصة بالصناعة البترولية من أجل دعم مصالح المملكة والمحافظة عليها، ويشمل ذلك - دون تحديد - القيام بما يلي: 1 - إجراء البحوث العلمية والتطبيقية التي تساعد على تطوير الصناعة البترولية ودعمها، بما في ذلك أساليب وطرق الكشف والتنقيب والتطوير والإنتاج والتكرير، وإجراء الدراسات التي تتصل بتقدم تلك الصناعة وتساعد على الحفاظ على البيئة، وإنشاء المختبرات البحثية اللازمة لذلك. 2 - متابعة التطورات والابتكارات الحديثة في مجال الصناعة البترولية، وتلك المتعلقة بالتقنية في مجالات الطاقة البديلة، ودراسة مدى تأثيرها على البترول والغاز بوصفها لقيمًا ووقودًا للصناعة. 3 - متابعة الاهتمامات العالمية في مجال البيئة، ودراسة أثرها على الصناعة والسوق البترولية. 4 - دراسة أوضاع الصناعة البترولية العالمية ومتابعة سياسات الدول المستهلكة والمنتجة والتوجهات الاستراتيجية لشركات البترول العالمية. 5 - تنمية الكوادر البشرية وتطويرها وتدريبها ، ورفع القدرات البحثية في مجال الصناعة البترولية. 6 - التعاون مع مدينة الملك عبد العزيز للعلوم
    والتقنية والجامعات السعودية ومراكز البحوث العلمية والتقنية في داخل المملكة وخارجها، للقيام بأنشطة مشتركة وتبادل المعلومات والخبرة معها مما يفتح آفاق التعاون العلمي في مجال البترول بين المملكة والعالم. 7 - توفير المعلومات ونتائج البحوث والدراسات للجهات المعنية من الأجهزة الحكومية والقطاع الخاص والمساهمة في رفع الأداء في الصناعة البترولية في المملكة وتطويرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يشرف على المركز مجلس أمناء برئاسة وزير البترول والثروة المعدنية، وعضوية ستة من ذوي الاختصاص والمهارات العلمية والتميز والخبرة في مجال البترول والبحث العلمي. ويكون تعيينهم بأمر من رئيس مجلس الوزراء بناء على اقتراح وزير البترول والثروة المعدنية لمدة ثلاث سنوات قابلة للتجديد، ويحدد الأمر مكافآتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1 - يجتمع مجلس الأمناء بدعوة من رئيسه مرتين على الأقل كل سنة، وعلى الرئيس دعوة المجلس إذا طلب ذلك نصف الأعضاء على الأقل. ويجب أن تشتمل الدعوة على جدول الأعمال. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس. وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوى الأصوات يرجح الجانب الذي يصوت معه رئيس المجلس. وللمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت، وتثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس المجلس وأعضاؤه الحاضرون. 2 - لا يجوز للمجلس أن يصدر قرارات بعرضها على الأعضاء متفرقين إلا في حالة الضرورة، ويشترط عندئذ موافقة جميع أعضاء المجلس على القرارات كتابة، وتعرض هذه القرارات على المجلس في أول اجتماع لاحق لإثباتها في محضر الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'مجلس الأمناء هو السلطة العليا المهيمنة على شؤون المركز، وإدارته، وتصريف أموره، ووضع السياسة العامة التي يسير عليها، وفقًا لتنظيم المركز ولوائحه، وله جميع الصلاحيات اللازمة لتحقيق أغراضه، وبصفة خاصة ما يلي: 1 - وضع السياسة العامة للمركز وخطة العمل التي يسير عليها المركز لتحقيق أغراضه ومراقبة تنفيذ ذلك. 2 - اعتماد اللوائح المالية والإدارية للمركز. 3 - اعتماد اللوائح الداخلية للمركز والسياسات واللوائح الخاصة بأوجه نشاطه. 4 - الإشراف على أعمال المركز الفنية والإدارية والمالية ومراجعتها.5 - إقرار مشروع ميزانية المركز وحسابه الختامي وتقرير مراقب الحسابات والتقرير السنوي.6 - تشكيل اللجان وتخويلها ما يراه ملائمًا من الصلاحيات من أجل إنجاز الأمور التي تعرض عليه.7 - قبول الهبات والتبرعات والمنح والوصايا والأوقاف.8 - تفويض المسؤولين عن إدارة المركز بإبرام الاتفاقات والعقود بأنواعها في حدود القواعد التي يضعها مجلس الأمناء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز لأعضاء مجلس الأمناء أن يفشوا شيئا مما وقفوا عليه من أسرار المركز بسبب عضويتهم في المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز مدير عام من ذوي الكفاية والخبرة يعينه مجلس الأمناء، وهو المسؤول التنفيذي عن المركز، ومرجعه رئيس مجلس الأمناء، وتتركز مسؤولياته في حدود ما ينص عليه تنظيم المركز ولوائحه، وما يقرره مجلس الأمناء، وللمدير العام الاختصاصات التالية: 1 - التحضير لاجتماعات مجلس الأمناء.2 - متابعة تنفيذ القرارات الصادرة من مجلس الأمناء.3 - إعداد مشروع ميزانية المركز ومشروع الحساب الختامي؛ تمهيدًا لعرضهما على مجلس الأمناء. 4 - الإشراف على العاملين في المركز طبقًا للصلاحيات الممنوحة له وما تحدده اللوائح. 5 - إصدار أوامر الصرف الخاصة بالمركز بموجب الميزانية السنوية المعتمدة ولوائح المركز المالية. 6 - تقديم تقارير دورية إلى مجلس الأمناء عن أعمال المركز ومنجزاته ونشاطاته.7 - اقتراح خطط المركز وبرامجه والإشراف على تنفيذها بعد موافقة مجلس الأمناء عليها. 8 - اقتراح اللوائح الإدارية والمالية والفنية التي يسير عليها المركز، واقتراح تعديلها، ورفعها إلى مجلس الأمناء.ولمدير عام المركز تفويض بعض الاختصاصات المنصوص عليها في هذه المادة إلى غيره من المسؤولين عن إدارة المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمركز لجنة استشارية من خبراء وعلماء غير متفرغين، تعاون المدير العام، يصدر بتشكيلها قرار من مجلس الأمناء بناء على ترشيح المدير العام . ويحدد القرار آلية عملها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يمثل المركز في صلاته بغيره من الجهات وأمام القضاء رئيس مجلس الأمناء أو من يفوضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تكون للمركز ميزانية سنوية، ويجوز له أن يضع ميزانية لبرامجه تزيد مدتها على سنة وفقًا لما تتطلبه المدة التقديرية لتنفيذ تلك البرامج. وتتكون الموارد المالية للمركز مما يلي: 1 - الأموال التي تسهم بها الدولة.2 - الدخول التي يحققها المركز من ممارسة أوجه النشاط التي تدخل ضمن اختصاصاته. 3 - الهبات والتبرعات والمنح والوصايا والأوقاف التي يقبلها مجلس أمناء المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع أموال المركز في حسابات بنكية مستقلة باسم المركز، ويصرف منها وفق ميزانية المركز المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يطبق نظام العمل ونظام التأمينات الاجتماعية على جميع العاملين في المركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: السنة المالية للمركز هي السنة المالية للدولة، واستثناء من ذلك تبدأ السنة المالية الأولى للمركز من تاريخ نفاذ هذا التنظيم وتنتهي بنهاية السنة المالية الجارية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعين مجلس الأمناء مراقبًا أو أكثر للحسابات من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة ويحدد أتعابهم، وإذا تعدد مراقبو الحسابات فإنهم يكونون مسئولين بالتضامن عن أعمالهم أمام المركز، ويرفع تقرير مراقب الحسابات إلى مجلس الأمناء، وتزود وزارة البترول والثروة المعدنية بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/93365bc0-8aa6-47a7-aed9-a9a700f29ecb/1
  verified: false
