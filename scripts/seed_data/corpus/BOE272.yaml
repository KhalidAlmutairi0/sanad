regulation:
  code: BOE272
  name_ar: نظام المؤسسة العامة للموانئ السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تنشأ بموجب هذا النظام مؤسسة عامة تسمى: ( المؤسسة العامة للموانئ السعودية )، ويكون مقرها مدينة الرياض، وتتمتع بالشخصية الاعتبارية والذمة المالية المستقلة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'الغرض الرئيسي للمؤسسة هو: الإشراف على إدارة الموانئ، ووضع القواعد اللازمة بقصد تنمية وتطوير وتحسين أوضاع الموانئ، ولها في سبيل ذلك: 1 - وضع القواعد اللازمة لإدارة الموانئ طبقا للنظم والأساليب الدولية.2 - توفير الخدمات المختلفة للموانئ كالإرشاد البحري، وتوفير المراسي وأعمال صيانة الممرات الملاحية الداخلة في حدود الميناء، والمعدات والآلات.3 - بناء الأرصفة والأحواض الجافة والعائمة وصيانتها واستغلالها، وصيانة السفن.4 - تنظيم عمليات الشحن والتفريغ والإشراف عليها، وتوفير الخدمات اللازمة للسفن.5 - ممارسة جميع الأعمال اللازمة لتحقيق غرضها والرفع من كفاية أعمال الموانئ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'أ - يدير المؤسسة مجلس إدارة، يشكل على الوجه التالي: 1 - رئيس المؤسسة العامة للموانئ ، وله رئاسة المجلس.2 - مدير عام المؤسسة ، نائبا للرئيس.3 - خمسة أعضاء من ذوي الخبرة والاختصاص. ب - يرتبط رئيس مجلس الإدارة برئيس مجلس الوزراء ، ويتم تعيينه وتحديد مرتبته بأمر ملكي بناء على اقتراح من نائب رئيس مجلس الوزراء ، كما يعين بقية أعضاء المجلس بأمر ملكي بناء على اقتراح من نائب رئيس مجلس الوزراء . وتكون مدة الأعضاء - فيما عدا الرئيس والمدير العام - ثلاث سنوات قابلة للتجديد، وإذا خلا مكان أحدهم بالاستقالة أو الوفاة أو غير ذلك، يعين عضو جديد في منصبه. ويجوز لمجلس الإدارة دعوة مديري الموانئ الرئيسية لحضور جلسات المجلس دون أن يكون لهم حق التصويت. وينعقد المجلس بدعوة من رئيسه، ويكون انعقاده صحيحا بحضور أغلبية أعضائه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي فيه الرئيس، ويجوز أن ينعقد المجلس في الأحوال الاستثنائية وبناء على طلب أربعة من أعضائه، ويكون للمجلس أمين من بين موظفي المؤسسة يختاره رئيس مجلس إدارة المؤسسة يتولى سكرتارية المجلس والإعداد للاجتماعات
    وتسجيل مداولات المجلس وقراراته وإبلاغها للجهات المعنية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مجلس الإدارة هو السلطة العليا المهيمنة على شئون المؤسسة وتصريف أمورها، وله أن يتخذ كافة القرارات اللازمة لتحقيق أغراضها وأهدافها، وذلك كله في حدود أحكام هذا النظام. وللمجلس على وجه الخصوص: 1 - وضع مشروع بالسياسة العامة التي يسير عليها في تشغيل وإنشاء الموانئ وتطويرها، ويتم بعد إقراره من مجلس الوزراء العمل بموجبه.2 - إصدار القرارات واللوائح الداخلية، والقرارات المتعلقة بالشؤون الإدارية والفنية للموانئ.3 - إصدار اللوائح المنظمة لشؤون الموظفين السعوديين وغيرهم، بالاتفاق مع ديوان الموظفين.4 - إصدار اللوائح المالية للمؤسسة، بالاتفاق مع وزارة المالية والاقتصاد الوطني .5 - إعداد مشروع الميزانية السنوية ، وحسابها الختامي.6 - تعيين الموظفين والاستشاريين والخبراء بالمؤسسة، سعودين ومتعاقدين.7 - إبرام الاتفاقيات والعقود بأنواعها، مع الأفراد والمؤسسات والشركات والمنظمات - سعودية أو أجنبية محلية أو دولية - فيما له علاقة بأغراض ونشاطات الموانئ التابعة للمؤسسة.8 - لمجلس الإدارة حق تفويض بعض صلاحياته وسلطاته لرئيس مجلس الإدارة، ويجوز لمجلس الإدارة أن يشكل من بين أعضائه لجانا تتولى دراسة
    الموضوعات التي يحيلها إليه المجلس، وتقديم دراساتها إليه للبت فيها. ويجوز عند الاقتضاء - وبموافقة المجلس - أن تضم هذه اللجان أعضاء فنيين من غير أعضاء المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تتكون أموال المؤسسة من: 1 - عائدات الموانئ.2 - الأموال التي تساهم بها الخزانة العامة للدولة . 3 - الأموال الثابتة والمنقولة الواقعة تحت تصرف الموانئ، وكذلك كافة الأموال المستخدمة حاليا في إدارة الموانئ، وحقوقه والتزاماته في مواجهة الغير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يصدر رئيس مجلس الوزراء بناء على اقتراح مجلس إدارة المؤسسة؛ قرارا بتحديد صلاحيات رئيس مجلس إدارة المؤسسة ، والمدير العام، ومديري الموانئ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يساعد مدير عام المؤسسة رئيس مجلس إدارة المؤسسة للقيام بأعماله، كما يحل محله في حالة غيابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يدير كل ميناء مدير يرتبط مباشرة برئيس مجلس الإدارة ، ويعطى كافة الصلاحيات اللازمة لإدارة الميناء. ويشكل في كل ميناء مجلس استشاري، يتألف من ممثلين عن الإدارات الحكومية العاملة في الميناء مع ممثل عن كل من الغرف التجارية ووكلاء الشحن البحري، وتكون مهمة المجلس تقديم المشورة إلى إدارة الميناء لتحسين أعمالها، وحل المشاكل التي تعترض أعماله اليومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تنقل إلى المؤسسة بمجرد صدور المرسوم الملكي جميع الحقوق والالتزامات المترتبة على نشاط إدارة الموانئ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للمؤسسة ميزانية مستقلة، تراعى فيها القواعد المتبعة في إعداد الميزانية العامة للدولة ، وتبدأ سنتها مع السنة المالية للدولة، ويجوز للمؤسسة أن تضع ميزانية للمشاريع التي تزيد مدتها عن سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تتمتع المؤسسة بالإعفاءات والمزايا الأخرى التي تتمتع بها الجهات الحكومية من النواحي المالية والضريبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المؤسسة؛ يعين مجلس الإدارة مراجع حسابات أو أكثر من المحاسبين القانونيين، يكون له حقوق مراجع الحسابات في الشركات المساهمة وعليه واجباته، وفي حالة تعدد المراجعين يكونون مسئولين بالتضامن، ويحدد مجلس الإدارة مكافأته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تعد المؤسسة تقريرا سنويا عن أعمالها، وذلك خلال فترة ثلاثة أشهر على الأكثر من تاريخ انتهاء السنة المالية المنقضية، ويعرض هذا التقرير على مجلس الإدارة لإقراره ثم يرفع إلى مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'يعهد إلى لجنة تُعَيَّن بقرار من رئيس مجلس الوزراء ، تضم ممثلين عن: وزارة المالية والاقتصاد الوطني ، وديوان المراقبة العامة ، بتقييم أموال المؤسسة في مدة لا تتجاوز ثلاثة أشهر من تاريخ إنشائها، ولها في سبيل تأدية مهمتها أن تستعين بمكتب مراجع حسابات أو أكثر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يستمر العمل بالميزانية القائمة حتى يتم اعتماد الميزانية الجديدة طبقا لأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تسري الأنظمة واللوائح والقواعد المنظمة لشئون الموانئ إلى أن يتم إصدار غيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db0851bf-16ee-41d5-b87f-a9a700f2e35d/1
  verified: false
