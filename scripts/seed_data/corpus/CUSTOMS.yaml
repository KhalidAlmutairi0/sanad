articles:
- article_ref: المادة (1)
  article_text_ar: يسمى هذا النظام "القانون" (نظام "قانون" الجمارك الموحد لدول مجلس التعاون لدول الخليج العربية).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: 'يكون للكلمات والعبارات التالية حيثما وردت في هذا النظام "القانون" ومذكرته الإيضاحية ولائحته التنفيذية ، المعاني الموضحة أمام كل منها ما لم يقتض السياق معنى آخر : 1 - المجلس : مجلس التعاون لدول الخليج العربية. 2 - الوزير : الوزير الذي تتبعه الإدارة العامة للجمارك. 3 - الجهة المختصة : السلطة التي تتبعها الإدارة العامة للجمارك. 4 - المدير العام : مدير عام الجمارك. 5 - المدير : مدير الدائرة الجمركية. 6 - الإدارة : الإدارة العامة للجمارك. 7 - الدائرة الجمركية : النطاق الذي يحدده الوزير في كل ميناء بحري أو جوي أو بري أو في أي مكان آخر يوجد فيه مركز للإدارة يرخص فيه بإتمام كل الإجراءات الجمركية أو بعضها. 8 - النظام "القانون" : القواعد والأحكام التي تنظم العمل الجمركي وأية قواعد أو أحكام أخرى مكملة أو متممة أو معدلة له. 9 - النطاق الجمركي : الجزء من الأراضي أو البحار الخاضعة لرقابة وإجراءات جمركية محددة في هذا النظام "القانون" ويشمل : أ) النطاق الجمركي البحري : ويشمل منطقة البحر الواقعة بين الشواطئ ونهاية حدود المياه الإقليمية. ب) النطاق الجمركي البري : ويشمل الأراضي الواقعة
    ما بين الشواطئ أو الحدود البرية من جهة، وخط داخلي من جهة أخرى، يحدد بقرار من الوزير أو الجهة المختصة. 10 - الخط الجمركي : الخط المطابق للحدود السياسية الفاصلة بين الدولة وبين الدول المتاخمة لها ولشواطئ البحار المحيطة بالدولة. 11 - التعرفة الجمركية : الجدول المتضمن أسماء البضائع وفئات الضريبة "الرسوم" الجمركية التي تخضع لها، والقواعد والملاحظات الواردة فيها لأنواع البضائع وأصنافها . 12 - الضريبة "الرسوم" الجمركية : هي المبالغ التي تحصل على البضائع وفق أحكام هذا النظام "القانون". 13 - الرسوم : هي المبالغ التي تحصلها الجمارك مقابل أداء خدمة. 14 - البضاعة : كل مادة طبيعية أو منتج حيواني أو زراعي أو صناعي أو فكري. 15 - نوع البضاعة : التسمية الواردة في جدول التعرفة الجمركية. 16 - الثمن المدفوع فعلا أو المستحق دفعه : يعني إجمالي المبلغ المدفوع أو المستحق دفعه للبائع -سواء كان بشكل مباشر أو غير مباشر- عن البضاعة التى يستوردها المشتري أو لمصلحته. 17 - البضائع المستوردة قيد التثمين : تعني تلك البضائع التي يجري تحديد قيمتها للأغراض الجمركية. 18 - البضائع المتطابقة : تعني تلك البضائع التي تتطابق
    مع بعضها في كل النواحي ، بما في ذلك الخصائص المادية والنوعية والشهرة التجارية، ولا تؤدي الاختلافات الطفيفة في المظهر إلى استبعاد البضائع المطابقة. 19 - البضائع المتماثلة : تعني تلك البضائع التي تكون لها ـ وإن لم تكن متماثلة في كل النواحي ـ خصائص متماثلة ومكونات مادية متماثلة تمكنها من أداء وظائفها، وأن يحل بعضها محل بعضها الآخر تجاريا، كما أن نوعية البضائع وشهرتها ووجود علامة تجارية من بين العوامل التي ينبغي بحثها عند تحديد ما إذا كانت البضائع متماثلة. 20 - عمولة البيع : تعني العمولة المدفوعة إلى وكيل البائع الذي يرتبط بالمصنع أو البائع أو يخضع له أو يعمل لمصلحته أو بالنيابة عنه. 21 - تكاليف التعبئة : تعني تكلفة جميع الأوعية (ما عدا الحاويات) والأغطية مهما كانت نوعيتها والعبوات، سواء كانت عن العمالة أو المواد المستخدمة لوضع البضاعة في العبوات الصالحة لشحنها إلى دول المجلس. 22 - سعر الوحدة بأكبر كمية إجمالية : يقصد بها سعر الوحدة الذي تباع به بضاعة معينة لأشخاص غير مرتبطين بعلاقة، على أول مستوى تجاري بعد الاستيراد، بحالتها عند الاستيراد، أو بعد إجراء مزيد من التجهيزات أو التصنيع عليها
    إذا طلب المستورد ذلك. 23- "الأشخاص المرتبطون بعلاقة" يقصد بهم ما يلي : * الشركاء بصفة قانونية في العمل. * موظفون أو مديرون أحدهم لدى الآخر. * صاحب العمل وموظفوه. * كل شخص يملك أو يتحكم أو يحتفظ ـ بشكل مباشر أو غير مباشر - بـ 5 % من الحصص أو الأسهم التي لها حق التصويت أو كليهما. * إذا كان أحدهما يشرف أو يهيمن على الآخر. * أو كان كلاهما خاضعا بشكل مباشر أو غير مباشر لإشراف شخص ثالث. * أو كانوا معا يشرفون بشكل مباشر أو غير مباشر على شخص ثالث. * أو كانوا من أفراد نفس الأسرة نفسها. 24 - اتفاقية القيمة : تعني اتفاق تطبيق المادة السابعة من الاتفاق العام للتعريفات والتجارة لعام 1994م. 25 - منشأ البضاعة : هو بلد إنتاجها، سواء كانت من الثروات الطبيعية أم المحصولات الزراعية أم الحيوانية أم المنتجات الصناعية. 26 - البضائع الممنوعة : البضائع التي تمنع الدولة استيرادها أو تصديرها بالاستناد إلى أحكام هذا النظام "القانون" أو نظام "قانون" آخر. 27 - البضائع المقيدة : البضائع التي يكون استيرادها أو تصديرها مقيدا بموجب أحكام هذا النظام "القانون" أو أي نظام "قانون" آخر. 28 - المصدر : البلد الذي استوردت منه
    البضاعة. 29 - المستورد : الشخص الطبيعي أو الاعتباري الذي يقوم باستيراد البضاعة. 30 - المصدر : الشخص الطبيعي أو الاعتباري الذي يقوم بتصدير البضاعة. 31 - بيان الحمولة "المنافست" : المستند الذي يتضمن وصفا شاملا للبضائع المشحونة على وسائل النقل المختلفة. 32 - المنطقة الحرة : جزء من أراضي الدولة تمارس فيه الأعمال التجارية أو الصناعية بموجب الأنظمة الخاصة بها، وتعد أي بضاعة داخلة إليها خارج المنطقة الجمركية، ولا تخضع تلك البضائع للإجراءات الجمركية المعتادة. 33 - السوق الحرة : البناء أو المكان المرخص له الذي تودع فيه البضائع في وضع معلق للرسوم "الضرائب" الجمركية لغايات العرض والبيع. 34 - البيان الجمركي : بيان البضاعة أو الإقرار الذي يقدمه صاحبها أو من يقوم مقامه المتضمن تحديد العناصر المميزة لتلك البضاعة المصرح عنها وكمياتها بالتفصيل وفق أحكام هذا النظام "القانون". 35 - المخزن : المكان أو البناء المعد لخزن البضائع مؤقتا بانتظار سحبها وفق أحد الأوضاع الجمركية، سواء كانت الإدارة تديره مباشرة أو المؤسسات الرسمية العامة أو الهيئات المستثمرة. 36 - المستودع : المكان أو البناء الذي تودع فيه البضائع
    تحت إشراف الإدارة في وضع معلق للضرائب "الرسوم" الجمركية وفق أحكام هذا النظام "القانون". 37 - الناقل : مالك وسيلة النقل أو من يقوم مقامه (بموجب تفويض رسمي). 38 - الطرق المعينة : الطرق التي يحددها الوزير أو الجهة المختصة لسير البضائع الواردة إلى الدولة أو الصادرة منها أو المارة عبرها بموجب قرار. 39 - الخزينة : الخزينة العامة. 40 - التخليص الجمركي : توثيق البيانات الجمركية للبضائع الواردة والصادرة والعابرة وفقا للإجراءات الجمركية المنصوص عليها في هذا النظام (القانون). 41 - المخلص الجمركي : كل شخص طبيعي أو اعتباري مرخص له بمزاولة أعمال التخليص الجمركي لحساب الغير. 42 - مندوب المخلص الجمركي : كل شخص طبيعي مرخص له بالقيام بمتابعة الإجراءات الجمركية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 3
  article_text_ar: تسري أحكام هذا النظام "القانون" على الأراضي الخاضعة لسيادة الدولة ومياهها الإقليمية، ويجوز أن تنشأ في هذه الأراضي مناطق حرة لا تسري عليها الأحكام الجمركية كليا أو جزئيا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 4
  article_text_ar: تخضع كل بضاعة تجتاز الخط الجمركي في الإدخال أو في الإخراج لأحكام هذا النظام "القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 5
  article_text_ar: تمارس الإدارة عملها في الدائرة الجمركية وفي النطاق الجمركي، ولها أيضا أن تمارس صلاحيتها على امتداد أراضي الدولة ومياهها الإقليمية وذلك ضمن الشروط المحددة في هذا النظام "القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 6
  article_text_ar: تنشأ الدوائر الجمركية وتلغى بقرار من الوزير أو الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 7
  article_text_ar: تحدد اختصاصات الدوائر الجمركية وساعات العمل فيها بقرار من الوزير أو الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 8
  article_text_ar: مع مراعاة ما نصت عليه المواد المتعلقة بمعاينة البضائع، لا يجوز القيام بالإجراءات الجمركية إلا في الدوائر الجمركية المختصة وفق ما ورد بالمادة (7) من هذا النظام "القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 9
  article_text_ar: تخضع البضائع التي تدخل إلى الدولة للضرائب "الرسوم" الجمركية بموجب التعرفة الجمركية الموحدة وللرسوم المقررة إلا ما استثني بموجب أحكام هذا النظام "القانون"، أو بموجب الاتفاقية الاقتصادية الموحدة لدول مجلس التعاون لدول الخليج العربية أو أي اتفاقية دولية أخرى في إطار المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 10
  article_text_ar: تكون فئة ضريبة التعرفة الجمركية إما مئوية (نسبة مئوية من قيمة البضاعة) أو نوعية (مبلغا على كل وحدة من البضاعة)، ويجوز أن تكون هذه الضريبة مئوية ونوعية معا للنوع الواحد من البضاعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 11
  article_text_ar: تفرض الضرائب "الرسوم" الجمركية، وتعدل وتلغى بالأداة القانونية المعمول بها في كل دولة من الدول الأعضاء مع الأخذ بالاعتبار القرارات التي تصدر عن دول المجلس في هذا الشأن وأحكام الاتفاقيات الدولية النافذة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 12
  article_text_ar: تحدد القرارات المتعلقة بتعديل فئة الضريبة "الرسوم" الجمركية التاريخ الذي يبدأ تطبيقها فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 13
  article_text_ar: تخضع البضائع المستوردة للضريبة "الرسوم" الجمركية النافذة في تاريخ تسجيل البيان الجمركي في الدوائر الجمركية، ما لم ينص على خلاف ذلك في صلب القرارات المعدلة للتعرفة الجمركية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 14
  article_text_ar: عند وجوب تصفية الضريبة "الرسوم" الجمركية حكما على البضائع المودعة في المستودع بسبب انتهاء مهلة الإيداع، تطبق عليها نصوص التعرفة النافذة في تاريخ تسجيل البيان الجمركي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 15
  article_text_ar: تخضع البضائع الخارجة من المناطق والأسواق الحرة إلى الأسواق المحلية للتعرفة الجمركية النافذة في تاريخ خروجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 16
  article_text_ar: تخضع البضائع المهربة أو التي هي في حكم المهربة للتعرفة الجمركية النافذة في تاريخ اكتشاف التهريب أو تاريخ وقوعه إذا أمكن تحديده أيهما أعلى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 17
  article_text_ar: تطبق التعرفة الجمركية النافذة يوم البيع على البضائع التي تبيعها الدائرة الجمركية وفق الأحكام المنصوص عليها في هذا النظام "القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 18
  article_text_ar: تطبق التعرفة الجمركية النافذة على البضاعة التي تعرضت للتلف وفق قيمتها في الحالة التي تكون عليها وقت تسجيل البيان الجمركي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 19
  article_text_ar: يقدم عن كل بضاعة تدخل الدولة أو تخرج منها بيان جمركي، وتعرض البضاعة على السلطات الجمركية في أقرب دائرة جمركية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 20
  article_text_ar: يحظر على وسائل النقل البحرية التي تدخل الدولة مهما كانت حمولتها الاستيعابية أن ترسو في غير الموانئ المعدة لاستقبالها، إلا في ظرف بحري طارئ أو بسبب قوة قاهرة، وعلى الربان في هذه الحالة أن يقوم بإشعار أقرب دائرة جمركية أو مركز أمني بذلك دون إبطاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 21
  article_text_ar: يحظر على السفن التي تقل حولتها الاستيعابية عن مائتي طن بحري أن تدخل أو تنتقل ضمن النطاق الجمركي البحري وهي محملة بالبضائع المقيدة، أو الممنوع استيرادها، أو الخاضعة لفئات رسوم عالية في التعرفة الجمركية، إلا في الظروف الناشئة عن طوارئ بحرية، أو بسبب قوة قاهرة، وعلى الربان في هذه الحالة أن يقوم بإشعار أقرب دائرة جمركية أو مركز أمني بذلك دون إبطاء، ويستثنى من ذلك البضائع المنقولة بين موانئ الدولة والتي أنهيت إجراءاتها الجمركية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 22
  article_text_ar: يحظر على الطائرات المغادرة من الدولة أو القادمة إليها أن تقلع أو تهبط في المطارات التي لا توجد فيها دوائر جمركية، إلا في حالات القوة القاهرة، وعلى قائد الطائرة في هذه الحالة أن يقوم بإشعار أقرب دائرة جمركية أو مركز أمني بذلك دون إبطاء، وأن يقدم للدائرة الجمركية تقريرا مؤيدا من الدائرة الجمركية التي جرى إشعارها ما لم ينص على خلاف ذلك في أي نظام "قانون" أو قرار آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 23
  article_text_ar: يحظر على وسائل النقل البرية دخول الدولة أو الخروج منها في المناطق التي لا توجد فيها دوائر جمركية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 24
  article_text_ar: تمنع الإدارة بموجب أحكام هذا النظام "القانون" أو أي نظام "قانون" أو قرار آخر دخول البضائع الممنوعة أو المخالفة أو خروجها أو عبورها، كما تمنع دخول البضائع المقيدة أو خروجها أو عبورها إلا بموجب موافقة صادرة عن جهات الاختصاص في الدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 25
  article_text_ar: تخضع البضائع المستوردة لإثبات المنشأ وفق قواعد المنشأ المتفق عليها في إطار المنظمات الاقتصادية الدولية والإقليمية النافذة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 26
  article_text_ar: تحتسب القيمة للأغراض الجمركية وفق الأحكام والأسس الواردة في اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 27
  article_text_ar: 'يتطلب لقبول القيمة كعنصر مميز للبضاعة ما يلي : 1 - تقدم مع كل بيان جمركي فاتورة أصلية تفصيلية، ويجوز للمدير العام أو من يخوله أن يسمح بإتمام إجراءات التخليص على البضاعة دون إبراز الفواتير الأصلية المصدقة والوثائق المطلوبة مقابل تعهد بإحضارها في مدة لا تتجاوز (90) يوما من تاريخ التعهد. 2 - يكون إثبات قيمة البضاعة بتقديم جميع الفواتير الأصلية والمستندات التي تبين قيمتها وفقا للأسس الواردة في المادة (26). 3 - للدائرة الجمركية الحق في المطالبة بالمستندات والعقود والمراسلات وغيرها المتعلقة بالبضاعة دون أن تتقيد بما ورد فيها أو في الفواتير نفسها. 4 - يجوز للإدارة أن تطلب ترجمة عربية للفواتير الصادرة بلغة أجنبية تبين تفاصيل البضاعة، بما يتفق والتعرفة الجمركية وكذلك المستندات الأخرى إذا تطلب الأمر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 28
  article_text_ar: إن قيمة البضائع المصدرة هي قيمتها وقت تسجيل البيان الجمركي مضافا إليها جميع النفقات حتى وصول البضاعة إلى الدائرة الجمركية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 29
  article_text_ar: تصنف البضائع التي لا يوجد لها ذكر في جدول التعرفة الجمركية وشروحاتها وفق ما يصدر عن منظمة الجمارك العالمية بهذا الشأن، أما البضائع التي تخضع لفقرات فرعية محلية في جدول التعرفة فيتم تصنيفها في إطار دول المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 30
  article_text_ar: 'أ - تسجل في بيان الحمولة "المنافست" كل بضاعة ترد إلى الدولة عن طريق البحر. ب - يجب أن ينظم بكل الحمولة بيان واحد يوقعه ربان السفينة، متضمنا المعلومات التالية : 1 - اسم السفينة وجنسيتها وحمولتها المسجلة. 2 - أنواع البضائع ووزنها الإجمالي ووزن البضائع الفرط إن وجدت، وإذا كانت البضائع ممنوعة يجب أن تذكر بتسميتها الحقيقية. 3 - عدد الطرود والقطع ووصف أغلفتها وعلاماتها وأرقامها. 4 - اسم الشاحن واسم المرسل إليه. 5 - الموانئ التي شحنت منها البضاعة . ج - يبرز ربان السفينة عند دخولها النطاق الجمركي بيان الحمولة الأصلي "المنافست" للجهات المختصة. د - على ربان السفينة أن يقدم للدائرة عند دخول السفينة إلى الميناء : 1- بيان الحمولة "المنافست". 2 - بيان الحمولة "المنافست" الخاص بمؤن السفينة وأمتعة البحارة والسلع العائدة لهم . 3 - قائمة بأسماء الركاب. 4 - قائمة البضائع التي ستفرغ في هذا الميناء. 5 - سندات الشحن وجميع الوثائق التي يمكن أن تطلبها الدائرة الجمركية في سبيل تطبيق الأنظمة الجمركية. هـ - تقدم البيانات والمستندات خلال ست وثلاثين ساعة من دخول السفينة إلى الميناء، ولا تحسب ضمن
    هذه المهلة العطل الرسمية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 31
  article_text_ar: إذا كان بيان الحمولة "المنافست" عائدا لسفينة لا تقوم برحلات منتظمة أو ليس لها وكيل ملاحة في الميناء، أو كانت من المراكب الشراعية، فيجب أن يكون مؤشرا عليه من السلطات الجمركية في ميناء الشحن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 32
  article_text_ar: أ - لا يجوز تفريغ حمولة السفن وجميع وسائط النقل المائية الأخرى إلا في الدائرة الجمركية في الميناء. ولا يجوز تفريغ أي بضاعة أو نقلها من سفينة إلى أخرى إلا تحت إشراف الدائرة الجمركية .ب - يتم التفريغ والنقل من سفينة إلى أخرى وفق الشروط المحددة من المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 33
  article_text_ar: يكون ربان السفينة أو وكيلها أو من يمثله مسؤولا عن النقص في عدد القطع أو الطرود، أو في محتوياتها، أو في مقدار البضائع الفرط، إلى حين استلام البضائع في المخازن الجمركية، أو في المستودعات، أو من قبل أصحابها عندما يسمح لهم بذلك، مع مراعاة أحكام المادة (54) من هذا النظام "القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 34
  article_text_ar: إذا تحقق نقص في عدد القطع أو الطرود المفرغة عما هو مدرج في بيان الحمولة "المنافست" أو في مقدار البضائع الفرط، فعلى ربان السفينة أو من يمثله بيان سبب هذا النقص وتأييده بمستندات تثبت أنه تم خارج النطاق الجمركي البحري، وإذا تعذر تقديم هذه المستندات في الحال، يجوز إعطاء مهلة لا تتجاوز ستة أشهر لتقديمها بعد أخذ ضمان يكفل حقوق الإدارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 35
  article_text_ar: البضائع الواردة برا يجب إتمام إجراءاتها الجمركية في أول دائرة جمركية، ويجوز إحالتها لإحدى الدوائر الجمركية الداخلية في الحالات التي يراها المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 36
  article_text_ar: أ - ينظم بكل حمولة "المنافست" وسيلة النقل البرية بيان حمولة "منافست" يوقعه الناقل أو من يمثله متضمنا معلومات كافية عن وسيلة النقل وحمولتها وجميع البيانات الأخرى وفق الشروط التي يحددها المدير العام. ب - على ناقلي البضائع أو من يمثلهم تقديم بيان الحمولة "المنافست" إلى الدائرة الجمركية فور وصولهم إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 37
  article_text_ar: مع مراعاة ما نصت عليه المادة (22) من هذا النظام "القانون" على الطائرات أن تسلك عند اجتيازها حدود الدولة الطرق الجوية المحددة لها، وألا تهبط إلا في المطارات التي فيها دوائر جمركية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 38
  article_text_ar: ينظم بكل حمولة الطائرة بيان حمولة "منافست" يوقعه قائد الطائرة وفق الشروط المبينة في الفقرات (أ - ب - ج - د) من المادة (30) من هذا النظام "القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 39
  article_text_ar: على قائد الطائرة أو من يمثله أن يقدم بيان الحمولة "المنافست" والقوائم المذكورة في المادة (38) من هذا النظام "القانون" إلى موظفي الإدارة، وأن يسلم هذه الوثائق إلى الدائرة الجمركية فور وصول الطائرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 40
  article_text_ar: لا يجوز تفريغ البضائع أو إلقاؤها من الطائرات أثناء الطيران ، إلا إذا كان ذلك لازما لأغراض السلامة ، على أن يتم إبلاغ الدائرة الجمركية بذلك ، مع مراعاة الأحكام الخاصة الواردة في القوانين الأخرى ذات العلاقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 41
  article_text_ar: على مالكي وسائل نقل البضائع أو وكلائهم أثناء مغادرتهم الدولة -سواء كانت محملة أو فارغة - أن يقدموا إلى الدائرة الجمركية بيان الحمولة "المنافست" مطابقا لأحكام الفصل الأول من هذا الباب ، والحصول على ترخيص بالمغادرة ، ويجوز للمدير الاستثناء من هذا الشرط في بعض الحالات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 42
  article_text_ar: يجب على مصدري البضائع التوجه بالبضائع المعدة للتصدير إلى الدائرة الجمركية المختصة والتصريح عنها بالتفصيل ، ويحظر على الناقلين باتجاه الحدود البرية أن يتجاوزوا الدوائر الجمركية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 43
  article_text_ar: يتم استيراد البضائع أو تصديرها عن طريق البريد وفقا لأحكام هذا النظام "القانون" مع مراعاة أحكام الاتفاقيات البريدية الدولية والقوانين والأنظمة الداخلية الأخرى النافذة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 44
  article_text_ar: أ - لا يجوز أن تذكر في بيان الحمولة "المنافست" أو ما يقوم مقامه عدة طرود مقفلة ومجمعة بأي طريقة كانت على أنها طرد واحد . ويراعى بشأن المستوعبات (الحاويات) والطبليات والمقطورات التعليمات التي يصدرها المدير العام. ب - لا يجوز تجزئة الإرسالية الواحدة من البضائع . وللمدير العام أن يسمح لأسباب مبررة بالتجزئة ، على ألا يترتب على هذه التجزئة أي خسارة تلحق بالخزينة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 45
  article_text_ar: تسري أحكام المواد (32 ، 33 ، 34) من هذا النظام "القانون" والمتعلقة بالنقل بحرا على النقل برا وجوا فيما يتعلق بتفريغ البضائع ونقلها من وسيلة نقل إلى أخرى . ويكون السائقون وقائدو الطائرات وشركات النقل مسؤولين عن النقص في حالة النقل البري والجوي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 46
  article_text_ar: للإدارة الحق باستخدام تبادل المعلومات إلكترونيا بالتخليص الجمركي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 47
  article_text_ar: يجب أن يقدم للدائرة الجمركية عند تخليص أي بضاعة - ولو كانت معفاة من الضرائب "الرسوم" الجمركية - بيان جمركي تفصيلي وفقا للنماذج المعتمدة في إطار دول المجلس يتضمن جميع المعلومات التي تمكن من تطبيق الأنظمة الجمركية واستيفاء الضرائب "الرسوم" الجمركية المستحقة ولأغراض إحصائية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 48
  article_text_ar: مع مراعاة ما ورد في الفقرة "1" من المادة (27) من هذا النظام "القانون" يحدد المدير العام الوثائق التي يجب أن ترفق مع البيانات الجمركية والمعلومات التي يجب أن تتضمنها هذه الوثائق وأن يسمح بإتمام إجراءات التخليص في حالة عدم إبراز أي وثيقة من الوثائق المطلوبة لقاء ضمانات نقدية أو مصرفية أو تعهد خطي بإحضار هذه الوثائق وفقا للشروط التي يحددها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 49
  article_text_ar: لا يجوز تعديل ما ورد في البيانات الجمركية بعد تسجيلها ، ولمقدم البيان الجمركي أن يتقدم للمدير بطلب خطي للتصحيح قبل إحالة البيان الجمركي للمعاينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 50
  article_text_ar: يجوز لأصحاب البضائع أو من يمثلهم الاطلاع على بضائعهم قبل تقديم البيان الجمركي وأخذ عينات منها عند الاقتضاء، وذلك بعد الحصول على إذن من المدير وتحت إشراف الدائرة الجمركية ، وتخضع هذه العينات للضرائب "الرسوم" الجمركية المقررة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 51
  article_text_ar: لا يجوز لغير أصحاب البضائع أو من يمثلهم الاطلاع على البيانات والمستندات الجمركية، وتستثنى من ذلك الجهات القضائية أو الرسمية المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 52
  article_text_ar: يقوم الموظف المختص بمعاينة البضائع كليا أو جزئيا بعد تسجيل البيانات الجمركية حسب التعليمات التي يصدرها المدير .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 53
  article_text_ar: أ - تجري معاينة البضائع في الدائرة الجمركية، ويسمح في بعض الحالات بإجرائها خارج هذه الدائرة وفقا للقواعد التي يحددها المدير العام. ب - يكون نقل البضائع إلى مكان المعاينة وفتح الطرود وإعادة تغليفها وكل الأعمال الأخرى التي تقتضيها المعاينة؛ على نفقة مالك البضاعة، ويكون مسؤولا عنها حتى وصولها إلى مكان المعاينة . ج - لا يجوز نقل البضائع التي وضعت في المخازن الجمركية أو في الأماكن المحددة للمعاينة دون موافقة الدائرة الجمركية . د - يكون العاملون في نقل البضائع وتقديمها للمعاينة مقبولين من الدائرة الجمركية . هـ - لا يجوز لأي شخص دخول المخازن والمستودعات الجمركية والحظائر والسقائف والساحات المعدة لتخزين البضائع أو إيداعها والأماكن المعدة للمعاينة دون موافقة الدائرة الجمركية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 54
  article_text_ar: 'لا تجري المعاينة إلا بحضور مالك البضاعة أو من يمثله ، وعند ظهور نقص في محتويات الطرود تحدد المسؤولية بصدده على الشكل التالي : 1 - إذا كانت البضاعة قد دخلت المخازن الجمركية والمستودعات ضمن طرود بحالة ظاهرية سليمة يتأكد معها حدوث النقص في محتوياتها في بلد المصدر قبل الشحن؛ يصرف النظر عن ملاحقة هذا النقص . 2 - إذا كانت البضاعة الداخلة إلى المخازن الجمركية أو المستودعات ضمن طرود في حالة ظاهرية غير سليمة، وجب على الجهة المسؤولة عن هذه المخازن أو المستودعات أن تقوم مع الشركة الناقلة بإثبات هذه الحالة في محضر الاستلام والتحقق من وزنها ومحتوياتها وعددها . وعلى هذه الجهة أن تتخذ التدابير اللازمة لسلامة حفظها ، وتقع المسؤولية في هذه الحالة على الناقل ما لم يكن ثمة تحفظ على بيان الحمولة "المنافست" مؤشرا من جمرك بلد المصدر ، ويصرف النظر في هذه الحالة عن الملاحقة . 3 - إذا دخلت البضاعة ضمن طرود بحالة ظاهرية سليمة، ثم أصبحت موضع شبهة بعد دخولها المخازن الجمركية والمستودعات ، فتقع المسؤولية على الجهة المسؤولة عن المستودعات في حال وجود نقص أو تبديل .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة  55
  article_text_ar: للدائرة الجمركية الحق في فتح الطرود لمعاينتها عند الاشتباه بوجود بضائع ممنوعة أو مخالفة لما هو وارد في الوثائق الجمركية في غياب مالك البضاعة، أو من يمثله، إذا امتنع عن حضور المعاينة في الوقت المحدد رغم إبلاغه ، وعند الضرورة تجري الدائرة الجمركية المعاينة قبل تبليغ مالك البضاعة أو من يمثله من قبل لجنة تشكل لهذا الغرض بقرار من المدير العام ، وتحرر محضرا بنتيجة المعاينة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 56
  article_text_ar: أ - للدائرة الجمركية الحق في تحليل البضائع لدى الجهات المختصة للتحقق من نوع البضاعة أو مواصفاتها أو مطابقتها لما تسمح به القوانين والأنظمة .ب - تخضع البضائع التي يقتضي فسحها توافر شروط ومواصفات خاصة لإجراء التحليل أو المعاينة ، وللمدير حق الإفراج عنها لقاء الضمانات اللازمة التي تكفل عدم التصرف بها إلا بعد ظهور نتيجة التحليل .ج - للمدير العام الأمر بإتلاف البضائع التي يثبت من المعاينة أو التحليل إنها مضرة أو غير مطابقة للمواصفات المعتمدة، ذلك على نفقة أصحابها وبحضورهم أو من يمثلهم ، ويعاد تصديرها إلى مصدرها إذا استوجب الأمر ذلك ، ويحرر بذلك المحضر اللازم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 57
  article_text_ar: تستوفى الضريبة "الرسوم" الجمركية وفقا لمحتويات البيان الجمركي ، وإذا أظهرت نتيجة المعاينة فرقا بينها وبين ما جاء في البيان الجمركي فتستوفى الضريبة "الرسوم" الجمركية على أساس هذه النتيجة، مع عدم الإخلال بحق الجمارك في استيفاء الغرامات المستحقة عند الاقتضاء وفقا لاحكام هذا النظام "القانون" .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 58
  article_text_ar: إذا لم يكن بوسع الدائرة الجمركية التأكد من صحة محتويات البيان الجمركي عن طريق فحص البضاعة أو المستندات المقدمة ، فلها أن تقرر إيقاف المعاينة وطلب المستندات التي توفر عناصر الإثبات اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 59
  article_text_ar: للدائرة الجمركية إعادة المعاينة وفقا لأحكام المواد من ( 52- 56 ) من هذا النظام "القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 60
  article_text_ar: يتم في الدوائر الجمركية المختصة المعاينة والتصريح لما يصطحبه المسافرون أو يعود إليهم وفق الأصول والقواعد التي يحددها المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 61
  article_text_ar: تشكل لجنة للفصل في القيمة من موظفي الإدارة بموجب قرار من المدير العام، وتكون مهمتها حل الخلافات التي تنشأ بين الدائرة الجمركية وأصحاب العلاقة حول قيمة البضائع المستوردة ، ولها الاستعانة بمن تراه من ذوي الخبرة، ودون الإخلال بحق المستورد باللجوء إلى القضاء ، يحق للمستورد أن يتظلم من قرارات زيادة قيمة البضاعة أمام لجنة القيمة ، وذلك خلال خمسة عشر يوما من تاريخ تسجيل البيان الجمركي، أو من تاريخ إعلامه بالقيمة التي قدرتها الإدارة للبضاعة بكتاب مسجل بعلم الوصول، وتكون قرارات هذه اللجنة بالأغلبية ونافذة بعد تصديق المدير العام عليها . ويجب إبلاغ المستورد كتابة بالقرار الذي أصدرته اللجنة في تظلمه ، ويكون قرارها مسببا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 62
  article_text_ar: أ - إذا نشأ خلاف بين الموظف الجمركي المختص ومالك البضاعة حول قيمة البضاعة لاختلاف نوعها أو منشئها أو لسبب آخر ، يحال الأمر إلى المدير، فإذا أقر رأي الموظف الجمركي ولم يقبل به مالك البضاعة، فيتم إحالة الأمر إلى المدير العام لتسوية الخلاف أو إحالته إلى لجنة الفصل في القيمة .ب - للمدير الحق في الإفراج عن البضائع المختلف بشأنها التي لا تكون معرضة للمنع بعد استيفاء ضمان مالي بقيمة الضريبة "الرسوم" الجمركية وفقا لتقدير الدائرة الجمركية. ويحتفظ بعينات من البضاعة بصفة مؤقتة في حالات الضرورة للرجوع إليها وقت الحاجة ، وتعاد هذه العينات لمالك البضاعة بعد الانتهاء منها ما لم تستهلك في أغراض الفحص والتحليل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 63
  article_text_ar: أ - تكون البضائع رهن الضرائب "الرسوم" الجمركية ، ولا يمكن الإفراج عنها إلا بعد إتمام الإجراءات الجمركية عليها وتأدية الضرائب "الرسوم" الجمركية وأي رسم آخر عنها وفقا لأحكام هذا النظام "القانون" .ب - يكون تسليم البضائع لأصحابها أو من يفوضونهم رسميا وفق الإجراءات التي يحددها المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 64
  article_text_ar: على الموظفين المكلفين باستيفاء الضرائب "الرسوم" الجمركية أن يحرروا إيصالا رسميا باسم المستورد وفق النموذج الذي يحدده الوزير أو الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 65
  article_text_ar: عند إعلان حالة الطوارئ يجوز اتخاذ تدابير لسحب البضائع لقاء ضمانات وشروط خاصة تحدد بقرار من الوزير أو الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 66
  article_text_ar: يجوز ضمن الشروط والقواعد التي يحددها المدير العام السماح بفسح البضائع قبل تأدية الضرائب "الرسوم" الجمركية عنها، وبعد إتمام الإجراءات الجمركية عليها بموجب ضمانات مصرفية أو نقدية أو مستندية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 67
  article_text_ar: يجوز إدخال البضائع ونقلها إلى أي مكان آخر داخل الدولة دون تأدية الضرائب "الرسوم" الجمركية، بشرط تقديم كفالة نقدية أو ضمان مصرفي يعادل ما يترتب عليها من ضرائب "رسوم" جمركية وفق التعليمات التي يصدرها المدير العام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 68
  article_text_ar: يفرج عن الكفالات النقدية والضمانات المصرفية والتعهدات استنادا إلى شهادات الإبراء وفق الشروط التي يحددها المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 69
  article_text_ar: مع مراعاة المادة (67) من هذا النظام "القانون" وأحكام الاتفاقية الاقتصادية الموحدة لدول المجلس، يسمح بعبور البضائع (ترانزيت) لأراضي دول المجلس وفق أحكام الأنظمة والاتفاقيات الدولية النافذة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 70
  article_text_ar: لا يسمح بإجراء عمليات العبور (الترانزيت) إلا في الدوائر الجمركية المرخص لها بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 71
  article_text_ar: مع مراعاة أحكام الاتفاقيات الإقليمية والدولية النافذة ، يتم نقل البضائع بالعبور (ترانزيت) على الطرق المعينة، وبمختلف وسائط النقل وعلى مسؤولية الناقل وفق التعليمات التي يصدرها المدير العام ، وتحدد الطرق والمسالك التي يمكن إجراء النقل عليها بطريق العبور (الترانزيت) وشروط هذا النقل بقرار من الوزير أو الجهة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 72
  article_text_ar: يجوز في حالة النقل من دائرة جمركية إلى أخرى إعفاء أصحاب العلاقة من تقديم بيان تفصيلي في مركز الدخول ، وتتم الإحالة وفق المستندات والشروط التي يحددها المدير العام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 73
  article_text_ar: يصدر الوزير أو الجهة المختصة القرارات اللازمة لتنظيم تعليق الضرائب "الرسوم" الجمركية على جميع أنواع النقل بطريق العبور (الترانزيت) الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 74
  article_text_ar: تنشأ مستودعات داخل الدائرة الجمركية أو خارجها بقرار من الوزير أو الجهة المختصة ، ويضع المدير العام القواعد والشروط المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 75
  article_text_ar: يجوز إيداع البضائع في المستودعات داخل الدائرة الجمركية أو خارجها دون تأدية الضرائب "الرسوم" الجمركية عليها وفقا للقواعد والشروط التي يحددها المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 76
  article_text_ar: للإدارة الحق في الإشراف والرقابة الجمركية على المستودعات التي تديرها الهيئات الأخرى وفقا لأحكام هذا النظام "القانون" والأنظمة "القوانين" الأخرى النافذة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 77
  article_text_ar: تنشأ المناطق والأسواق الحرة بالأداة القانونية لكل دولة، وتحدد القواعد والشروط والإجراءات الجمركية الخاصة بها بقرار من الوزير أو الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 78
  article_text_ar: أ - مع مراعاة أحكام المادتين (79 و 80) من هذا النظام "القانون" يمكن إدخال جميع البضائع الأجنبية من أي نوع كانت، وأيا كان منشؤها إلى المناطق والأسواق الحرة وإخراجها منها إلى خارج البلاد أو إلى مناطق وأسواق حرة أخرى، دون أن تخضع للضرائب والرسوم الجمركية.ب - يجوز إدخال البضائع الأجنبية المعاد تصديرها من داخل البلاد إلى المناطق والأسواق الحرة على أن تخضع لقيود التصدير والإجراءات الجمركية المتبعة في حالة إعادة التصدير .ج - لا تخضع البضائع الموجودة في المناطق والأسواق الحرة لأي قيد من حيث مدة بقائها فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 79
  article_text_ar: البضائع المدرجة في بيان الحمولة "المنافست" برسم الوارد لا يجوز نقلها أو إدخالها إلى المناطق والأسواق الحرة إلا بموافقة المدير العام وضمن الشروط والضوابط التي يقررها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 80
  article_text_ar: 'يحظر دخول البضائع التالية إلى المناطق والأسواق الحرة : 1 - البضائع القابلة للاشتعال، عدا المحروقات اللازمة للتشغيل التي تسمح بها الجهة المشرفة على المناطق والأسواق الحرة ضمن الشروط التي تحددها الجهات المختصة. 2 - المواد المشعة. 3 - الأسلحة الحربية والذخائر والمتفجرات أيا كان نوعها إلا بترخيص من الجهات المختصة . 4 - البضائع المخالفة للأنظمة المتعلقة بحماية الملكية التجارية والصناعية والأدبية والفنية الصادر بها قرارات من الجهات المختصة . 5 - المخدرات على اختلاف أنواعها ومشتقاتها . 6 - البضائع التي منشؤها بلد تقرر مقاطعتها اقتصاديا. 7 - البضائع الممنوع دخولها البلاد، وتحدد كل دولة قائمة بهذه البضائع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 81
  article_text_ar: للدائرة الجمركية القيام بأعمال التفتيش في المناطق والأسواق الحرة عن البضائع الممنوع دخولها إليها ،كما يجوز لها تدقيق المستندات والكشف على البضائع لدى الاشتباه بوجود عمليات تهريب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 82
  article_text_ar: على إدارة المناطق والأسواق الحرة أن تقدم إلى الإدارة عند الطلب قائمة بالبضائع التي تدخل المناطق الحرة والبضائع التي تخرج منها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 83
  article_text_ar: لا يجوز نقل البضائع الموجودة في المناطق والأسواق الحرة إلى مناطق أو أسواق حرة أخرى أو مخازن أو مستودعات إلا وفق الكفالات والتعهدات والإجراءات التي يحددها المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 84
  article_text_ar: يجري سحب البضائع من المناطق والأسواق الحرة إلى داخل البلاد وفقا لأحكام الأنظمة المعمول بها وطبقا للتعليمات التي يصدرها المدير العام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 85
  article_text_ar: تعامل البضائع الخارجة من المناطق الحرة إلى الدائرة الجمركية معاملة البضائع الأجنبية، حتى ولو اشتملت على مواد أولية محلية أو على أصناف سبق تأدية الضرائب "الرسوم" الجمركية عنها قبل إدخالها إلى المناطق الحرة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 86
  article_text_ar: يسمح للسفن الوطنية والأجنبية أن تتزود من المناطق الحرة بجميع المعدات البحرية التي تحتاج إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 87
  article_text_ar: تعد إدارة المناطق والأسواق الحرة مسؤولة عن جميع المخالفات التي يرتكبها موظفوها، وعن تسرب البضائع منها بصورة غير مشروعة، وتبقى نافذة فيها جميع الأنظمة والتعليمات المتعلقة بالأمن والصحة العامة وبقمع التهريب والغش.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 88
  article_text_ar: تعامل البضائع الواردة من المناطق والأسواق الحرة إلى داخل الدولة أو خارجها معاملة البضائع الأجنبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 89
  article_text_ar: مع مراعاة الأحكام الواردة في هذا الفصل والاتفاقية الاقتصادية الموحدة لدول المجلس ، والاتفاقيات الدولية الأخرى النافذة ، يسمح بدخول البضائع إدخالا مؤقتا دون استيفاء الضرائب"الرسوم" الجمركية عليها وفق الشروط التي تحددها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 90
  article_text_ar: 'للمدير العام أن يمنح الإدخال المؤقت لما يلي : 1 - الآليات والمعدات الثقيلة لإنجاز المشاريع أو لإجراء التجارب العملية والعلمية العائدة لتلك المشاريع . 2 - البضائع الأجنبية الواردة بقصد إكمال الصنع .3 - ما يستورد مؤقتا للملاعب والمسارح والمعارض وما يماثلها . 4 - الآلات والمعدات والأجهزة التي ترد إلى البلاد بقصد إصلاحها. 5 - الأوعية والأغلفة الواردة لملئها . 6 - الحيوانات الداخلة بقصد الرعي . 7 - العينات التجارية بقصد العرض . 8 - الحالات الأخرى التي تستدعي ذلك .ويعاد تصدير الأصناف المنصوص عليها في هذه المادة أو يتم إيداعها في المنطقة الحرة أو الدوائر الجمركية أو المستودعات خلال فترة الإدخال المؤقت التي تحددها اللائحة التنفيذية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 91
  article_text_ar: تراعى أحكام الاتفاقية الاقتصادية الموحدة لدول المجلس والاتفاقيات الدولية الأخرى النافذة الخاصة بالإدخال المؤقت للسيارات وفق التعليمات التي تصدرها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 92
  article_text_ar: لا يجوز استعمال المواد والأصناف التي تم فسحها بالإدخال المؤقت أو تخصيصها أو التصرف بها في غير الأغراض والغايات التي استوردت من أجلها وصرح عنها في البيانات المقدمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 93
  article_text_ar: كل نقص يظهر عند إخراج البضائع التي فسحت بالإدخال المؤقت يخضع للضرائب "الرسوم" الجمركية المستحقة عليها وقت إدخالها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 94
  article_text_ar: تحدد اللائحة التنفيذية شروط التطبيق العملي لوضع الإدخال المؤقت والضمانات الواجب تقديمها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 95
  article_text_ar: يجوز إعادة تصدير البضائع الداخلة إلى البلاد التي لم تستوف عنها الضرائب (الرسوم ) الجمركية إلى الخارج أو إلى المنطقة الحرة وفق الإجراءات والضمانات التي تحددها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 96
  article_text_ar: يجوز الترخيص في بعض الحالات بنقل البضائع من سفينة إلى أخرى، أو سحب البضائع التي لم يجر إدخالها إلى المستودعات الجمركية من الأرصفة إلى السفن ضمن الشروط التي يحددها المدير العام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 97
  article_text_ar: ترد كليا أو جزئيا الضرائب "الرسوم " الجمركية المستوفاة عن البضائع الأجنبية في حالة إعادة تصديرها ، وفق اللوائح والشروط التي تحددها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 98
  article_text_ar: تعفى من الضرائب "الرسوم" الجمركية بموجب هذا النظام "القانون" البضاعة المتفق على إعفائها في التعرفة الجمركية الموحدة لدول المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 99
  article_text_ar: يعفى من الضرائب "الرسوم" الجمركية بشرط المعاملة بالمثل ما يرد للهيئات الدبلوماسية والقنصلية والمنظمات الدولية ورؤساء وأعضاء السلكين الدبلوماسي والقنصلي المعتمدين لدى الدولة ، وذلك وفق الاتفاقيات الدولية والقوانين والقرارات النافذة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 100
  article_text_ar: 'أ - لا يجوز التصرف في البضائع المعفاة بموجب المادة (99) من هذا النظام "القانون" تصرفا يغاير الهدف الذي أعفيت من أجله أو التنازل عنها إلا بعد إعلام الإدارة وتأدية الضرائب "الرسوم" الجمركية المستحقة. ب - لا تجب الضرائب "الرسوم " الجمركية إذا تصرف المستفيد فيما أعفي عملا بالمادة (99) من هذا النظام "القانون" بعد ثلاث سنوات من تاريخ الفسح من الدائرة الجمركية بشرط المعاملة بالمثل. ج - لا يجوز التصرف في السيارة المعفاة قبل مضي ثلاث سنوات على تاريخ إعفائها إلا في الحالات التالية : 1 - انتهاء مهمة العضو الدبلوماسي أو القنصلي المستفيد من الإعفاء في البلاد. 2 - إصابة السيارة بعد إعفائها بحادث يجعلها غير ملائمة لمقتضيات استعمال العضو الدبلوماسي أو القنصلي بناء على توصية مشتركة من إدارة المرور والإدارة . 3 - البيع من عضو دبلوماسي أو قنصلي إلى عضو آخر ويشترط في هذه الحالة أن يكون المتنازل له متمتعا بحق الإعفاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 101
  article_text_ar: يبدأ حق الإعفاء بالنسبة للأشخاص المستفيدين منه بموجب المادة (99) من هذا النظام "القانون " اعتبارا من تاريخ مباشرتهم العمل في مقار عملهم الرسمي بالبلاد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 102
  article_text_ar: يعفى من الضرائب " الرسوم " الجمركية ما يستورد للقوات المسلحة وقوى الأمن الداخلي بجميع قطاعاتها من ذخائر وأسلحة وتجهيزات ووسائط نقل عسكرية وقطعها، وأي مادة أخرى بقرار من مجلس الوزراء أو من الجهة المخولة بذلك في كل دولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 103
  article_text_ar: أ - تعفى من الضرائب "الرسوم " الجمركية الأمتعة الشخصية والأدوات المنزلية المستعملة التي يجلبها المواطنون المقيمون في الخارج والأجانب القادمون للإقامة في البلاد لأول مرة، ويخضع هذا الإعفاء للشروط والضوابط التي يحددها المدير العام.ب - تعفى من الضرائب " الرسوم " الجمركية الأمتعة الشخصية والهدايا التي بحوزة المسافرين على ألا تكون ذات صفة تجارية، وأن تكون وفقا للشروط والضوابط التي تحددها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 104
  article_text_ar: تعفى مستلزمات الجمعيات الخيرية من الضرائب "الرسوم " الجمركية وفق الضوابط والشروط التي تحددها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 105
  article_text_ar: 'تعفى من الضرائب "الرسوم" الجمركية ما يلي : 1 - البضائع ذات المنشأ الوطني المعادة التي سبق تصديرها . 2 - البضائع الأجنبية المعادة إلى البلاد، والتي ثبت أنه سبق إعادة تصديرها إلى الخارج إذا أعيدت خلال سنة واحدة من تاريخ إعادة تصديرها . 3 - البضائع التي صدرت مؤقتا لإكمال صنعها أو إصلاحها تستوفى الضرائب "الرسوم " الجمركية على الزيادة التي طرأت نتيجة لإكمال صنعها أو إصلاحها وفقا لقرار يتخذه المدير العام.ويحدد الوزير أو الجهة المختصة بقرار الشروط الواجب توافرها للاستفادة من أحكام هذه المادة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 106
  article_text_ar: أ - تطبق أحكام الإعفاءات الواردة في هذا الباب على البضائع التي يشملها الإعفاء، سواء استوردت بطريق مباشر أو غير مباشر، أم اشتريت من المستودعات الجمركية، أو المناطق الحرة، على أن تراعى الشروط التي تضعها الإدارة .ب - إذا وقع خلاف حول البضائع المنصوص عليها في هذا الباب أهي خاضعة للضرائب " الرسوم " الجمركية أم معفاة منها ، فيبت المدير العام في هذا الخلاف .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 107
  article_text_ar: أ - تخضع البضائع التي توضع في الساحات والمستودعات التابعة للدائرة الجمركية لرسوم التخزين والمناولة والتأمين والخدمات الأخرى التي تقتضيها عملية خزن البضائع ومعاينتها وفقا للمعدلات المقررة ، ولا يجوز بأي حال من الأحوال أن يتجاوز رسم التخزين نصف القيمة المقدرة للبضاعة . وإذا أدارت المستودعات جهات أخرى فلها استيفاء هذه الرسوم وفق النصوص والمعدلات المقررة بهذا الشأن .ب - يجوز إخضاع البضائع لرسوم الترصيص والختم والتحليل وجميع ما يقدم لها من خدمات.ج - تحدد الخدمات والرسوم الواردة في هذه المادة وشروط استيفائها بموجب قرار يصدره الوزير أو الجهة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 108
  article_text_ar: يعد مخلصا جمركيا كل شخص طبيعي أو اعتباري يزاول إعداد البيانات الجمركية وتوقيعها وتقديمها للدائرة الجمركية وإتمام الإجراءات الجمركية الخاصة بتخليص البضائع لحساب الغير .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 109
  article_text_ar: يحق لمواطني دول المجلس ( الطبيعيين والاعتباريين ) مزاولة مهنة التخليص الجمركي بعد الحصول على ترخيص من الإدارة
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 110
  article_text_ar: 'يقبل التصريح عن البضائع لدى الدائرة الجمركية وإتمام الإجراءات الجمركية عليها سواء كان ذلك للاستيراد أم للتصدير أم العبور "ترانزيت" من : 1 - مالكي البضائع أو ممثليهم المفوضين من قبلهم الذين تتوافر فيهم الشروط التي يحددها المدير العام بما في ذلك شروط التفويض.2 - المخلصين الجمركيين المرخص لهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 111
  article_text_ar: يعد تظهير إذن التسليم لاسم المخلص الجمركي أو ممثلي مالكي البضاعة تفويضا لإتمام الإجراءات الجمركية عليها، دون تحمل الإدارة أي مسؤولية من جراء تسليم البضاعة إلى من ظهر له إذن التسليم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 112
  article_text_ar: يعد المخلص الجمركي مسؤولاً عن أعماله وأعمال تابعيه أمام المستوردين والمصدرين وأمام الإدارة وفق أحكام هذا النظام " القانون".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 113
  article_text_ar: 'للمدير العام أن يصدر التعليمات اللازمة لما يلي : 1 - الشروط اللازمة لمنح التراخيص في مزاولة مهنة التخليص الجمركي 2 - الشروط اللازمة لمنح التراخيص في مزاولة مهنة مندوب المخلص الجمركي . 3 - إجراءات إصدار التراخيص الجمركية للمخلص والمندوب الجمركي . 4 - التزامات المخلص ومندوب المخلص الجمركي . 5 - الشروط اللازمة لفتح مكاتب التخليص الجمركي . 6 -عدد المخلصين والمندوبين الجمركيين الذين يسمح لهم بممارسة العمل في الدوائر الجمركية . 7 - الدائرة الجمركية أو الدوائر الجمركية التي يسمح للمخلصين العمل فيها . 8 - إجراءات الاستغناء عن المخلصين الجمركيين ومندوبيهم . 9 - إجراءات الانتقال لمندوبي المخلصين الجمركيين بين مكاتب التخليص الجمركي . 10 - إجراءات سحب تراخيص المخلصين الجمركيين ومندوبيهم . 11 - حالات شطب القيد في سجل الإدارة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 114
  article_text_ar: 'مع مراعاة نص المادة (141 ) من هذا النظام " القانون " وعدم الإخلال بأية مسؤولية مدنية أو جزائية يقرها هذا النظام " القانون " أو أي نظام "قانون" آخر، للمدير العام أن يفرض على المخلص ومندوبي المخلص الجمركي - بعد إجراء التحقيق اللازم معه بمعرفة الجهة المختصة بالإدارة، وبما يتناسب وحجم مخالفته للالتزامات المفروضة عليه - العقوبات التالية: 1 - الإنذار . 2 - غرامة مالية لا تتجاوز 5000 ريال سعودي أو ما يعادلها من عملات دول المجلس الأخرى . 3 - الإيقاف عن العمل لمدة لا تزيد عن سنتين . 4 - إلغاء الرخصة والمنع من مزاولة المهنة نهائيا . ويجوز التظلم من تطبيق هذه العقوبات لدى الوزير أو الجهة المختصة خلال ثلاثين يوما من تاريخ إبلاغه بها . ويكون قرار الوزير أو الجهة المختصة قطعيا .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 115
  article_text_ar: على المخلص الجمركي أن يحتفظ لديه بسجل لمدة خمس سنوات يدون فيها خلاصة المعاملات الجمركية التي أنجزها لحساب الغير ضمن الشروط التي تحددها الإدارة .ويجب أن يشمل هذا السجل مقدار الرسوم التي دُفعت للدائرة الجمركية والأجور المدفوعة للمخلص، وأي نفقة أخرى صرفت على المعاملات ، وللمدير أو من يفوضه الصلاحية المطلقة في الاطلاع في أي وقت على هذه السجلات دون أي اعتراض من المخلص الجمركي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 116
  article_text_ar: أ - يعد موظفو الإدارة أثناء قيامهم بأعمالهم من رجال الضبط القضائي ، وذلك في حدود اختصاصاتهم .ب - يعطى موظفو الإدارة عند تعيينهم بطاقة تثبت طبيعة عملهم ، وعليهم أن يبرزوها عند الطلب .ج - على موظفي الإدارة ارتداء الزي الرسمي المخصص لهم أثناء قيامهم بالعمل إذا كانت طبيعة عملهم تتطلب ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 117
  article_text_ar: على السلطات المدنية والعسكرية وقوى الأمن الداخلي أن تقدم لموظفي الإدارة كل مساعدة للقيام بعملهم بمجرد طلبهم ذلك ، كما يجب على الإدارة التعاون مع الجهات الرسمية الأخرى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 118
  article_text_ar: يسمح بحمل السلاح لموظفي الجمارك الذين تتطلب طبيعة عملهم ذلك ، ويحدد هؤلاء الموظفون بقرار من الوزير أو الجهة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 119
  article_text_ar: على كل موظف من موظفي الإدارة تنتهي خدماته لأي سبب كان ، أن يعيد ما في عهدته إلى الإدارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 120
  article_text_ar: يحدد بقرار من الوزير أو الجهة المختصة بناء على اقتراح من المدير العام الحوافز والبدلات التي تمنح لموظفي الجمارك حسب طبيعة عملهم ، ويُعمل بها بعد إقرارها من جهات الاختصاص .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 121
  article_text_ar: تخضع لأحكام النطاق الجمركي البضائع الممنوعة والمقيدة والخاضعة لضرائب " لرسوم " جمركية مرتفعة، وكذلك البضائع الأخرى التي يعينها المدير العام بقرار منه ، وتحدد اللائحة التنفيذية شروط النقل داخل هذا النطاق والمستندات والإجراءات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 122
  article_text_ar: أ - على موظفي الإدارة مكافحة التهريب ، ولهم في سبيل ذلك أن يقوموا بالكشف على البضائع ووسائط النقل وتفتيش الأشخاص وفقا لأحكام هذا النظام " القانون " والأنظمة " القوانين " الأخرى النافذة . ب - لا يجوز تفتيش النساء ذاتيا إلا من قبل مفتشات جمركيات . ج - يحق لموظفي الإدارة في حالة وجود دلائل كافية على وجود مواد مهربة ، وبعد الحصول على إذن من الجهة المختصة تفتيش أي بيت أو مخزن أو أي محل وفقا للأنظمة " القوانين " النافذة . د - لا يتحمل موظفو الإدارة مسؤولية الأضرار الناشئة عن ممارستهم لعملهم الوظيفي على الوجه المطلوب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 123
  article_text_ar: لموظفي الإدارة المخولين الحق في الصعود إلى جميع السفن الموجودة في الموانئ المحلية والداخلة إليها أو الخارجة منها ، وأن يبقوا فيها حتى تفرغ حمولتها ولهم تفتيش كافة أجزاء السفينة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 124
  article_text_ar: لموظفي الإدارة المخولين الحق في الصعود إلى السفن داخل النطاق الجمركي لتفتيشها أو المطالبة بتقديم بيان الحمولة "المنافست" وغيره من المستندات المتوجبة وفق أحكام هذا النظام " القانون " ولهم الحق في حالة الامتناع عن تقديم المستندات أو عدم وجودها والاشتباه بوجود بضائع مهربة أو ممنوعة أن يتخذوا جميع التدابير اللازمة لضبط تلك البضائع ، ومن ثم اقتياد السفينة إلى أقرب دائرة جمركية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 125
  article_text_ar: للإدارة اتخاذ الإجراءات المناسبة للتحري عن التهريب داخل الدائرة الجمركية وخارجها وفق القواعد التي يحددها الوزير أو الجهة المختصة
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 126
  article_text_ar: 'يجوز إجراء التحري عن التهريب وحجز البضائع وتحقيق المخالفات الجمركية بشأن جميع البضائع على امتداد أراضي الدولة في الحالات التالية: 1 - في النطاقين الجمركيين البري والبحري . 2 - في الدوائر الجمركية وفي الموانئ والمطارات وفي جميع الأماكن الخاضعة للرقابة الجمركية . 3 - خارج النطاقين الجمركيين البري والبحري عند متابعة البضائع المهربة ومطاردتها مطاردة متواصلة من قبل المسؤولين عن ذلك بعد أن شوهدت ضمن النطاق في وضع يستدل منه على قصد تهريبها .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 127
  article_text_ar: لموظفي الإدارة الحق في الاطلاع على الأوراق والمستندات والسجلات والمراسلات والعقود التجارية والوثائق أيا كان نوعها ، المتعلقة بصورة مباشرة أو غير مباشرة بالعمليات الجمركية ، وضبطها عند وجود مخالفة ، وذلك لدى مؤسسات الملاحة والنقل وجميع الأشخاص الطبيعيين والاعتباريين الذي لهم صلة بالعمليات الجمركية ، وعلى المؤسسات والأشخاص المذكورين حفظ جميع الأوراق المشار إليها مدة خمس سنوات من تاريخ إتمام العمليات الجمركية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 128
  article_text_ar: 'يجوز لموظفي الإدارة التحفظ على أي شخص إذا كان لديهم اشتباه بأنه ارتكب أو حاول ارتكاب جريمة أو كان ذا علاقة بارتكاب جريمة من الجرائم التالية: 1 - التهريب.2 - نقل بضائع مهربة أو حيازتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 129
  article_text_ar: يُحرر محضر الضبط لمخالفات وجرائم التهريب الجمركي وفق الأصول المحددة في هذا النظام "القانون ".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 130
  article_text_ar: ينظم محضر الضبط موظفان على الأقل من الجمارك حال اكتشاف المخالفة أو جريمة التهريب ، ويجوز عند الضرورة أن ينظم محضر الضبط موظف واحد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 131
  article_text_ar: 'يذكر في محضر الضبط ما يلي : 1 - مكان تنظيمه وتاريخه وساعته بالأحرف والأرقام . 2 - أسماء ضابطي الواقعة ومنظمي محضر الضبط وتوقيعهم وطبيعة أعمالهم . 3 - أسماء المخالفين أو المسؤولين عن التهريب وجنسياتهم وصفاتهم ومهنهم وعناوينهم التفصيلية . 4 - البضائع المحجوزة وأنواعها وكمياتها وقيمتها وبندها الجمركي . 5 - تفصيل الوقائع وأقوال المخالفين أو المسؤولين عن التهريب وأقوال الشهود في حالة وجودهم . 6 - النص في محضر الضبط على أنه تُلي على المخالفين أو المسؤولين عن التهريب الحاضرين الذين أيدوه بتوقيعهم أو رفضوا ذلك . 7 - جميع الوثائق الأخرى المفيدة ، وحضور المخالفين أو المسؤولين عن التهريب عند جرد البضائع أو امتناعهم عن ذلك . 8 - إحالة عينات من المادة المهربة المضبوطة إلى جهات الاختصاص للتأكد من كونها مادة ممنوعة . 9 - تحديد الجهة التي سُلمت إليها المواد المهربة وتوقيع هذه الجهة بالتسليم . 10 - تحديد الجهة الأمنية التي أودع المهرب أو المهربون لديها وساعة التسليم وتاريخه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 132
  article_text_ar: أ - يعد محضر الضبط المنظم وفق المادتين 130 - 131 من هذا النظام " القانون" حجة فيما يتعلق بالوقائع المادية التي عاينها منظموه بأنفسهم ما لم يثبت العكس . ب - لا يعد النقص الشكلي في محضر الضبط سببا لبطلانه ، ولا يمكن إعادته إلى منظميه إلا إذا كان النقص متعلقا بالوقائع المادية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 133
  article_text_ar: للدائرة الجمركية حجز البضائع موضوع المخالفة أو جرم التهريب والأشياء التي استعملت لإخفائها، وكذلك وسائط النقل من أي نوع كانت؛ كالقوارب والسيارات والحيوانات، عدا البواخر والطائرات والحافلات العامة المعدة لنقل الركاب، إلا إذا أعدت خصيصا لغرض التهريب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 134
  article_text_ar: يتم التصرف في المواد المهربة أو التي شرع في تهريبها من نوع المخدرات، وما في حكمها، وفق الأنظمة والقوانين المعمول بها في الدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 135
  article_text_ar: أ - يجوز لمحرري محضر الضبط حجز البضائع موضوع المخالفة أو التهريب والأشياء التي استعملت لإخفائها ووسائط النقل وضبط جميع المستندات ووضع اليد عليها؛ بغية إثبات المخالفات أو جرائم التهريب، وضمانا للرسوم والضرائب والغرامات . ب - يجوز للمدير العام -عند الاقتضاء- أن يستصدر أمرا من السلطات المختصة بتوقيع الحجز التحفظي على أموال المخالفين والمسؤولين عن التهريب تحت يد الغير؛ ضمانا لتحصيل الضرائب والرسوم الجمركية والغرامات، وتنفيذا للقرارات النهائية أو الأحكام النهائية الصادرة بالإلزام بأدائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 136
  article_text_ar: يجوز بقرار من المدير العام -عند الضرورة وضمانا لحقوق الخزينة العامة- فرض تأمين جمركي على أموال المكلفين أو شركائهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 137
  article_text_ar: لا يجوز القبض إلا في الحالات التالية :1 - جرائم التهريب المتلبس بها .2 - مقاومة رجال الجمارك أو رجال الأمن التي تعوق ضبط المخالفات الجمركية أو جرائم التهريب أو تحقيقها أو ضبط المتهمين فيها . ويصدر قرار القبض من موظفي الجمارك المخولين صفة مأموري الضبط القضائي أو من السلطات الأمنية . ويقدم المقبوض عليه إلى المحكمة المختصة خلال 24 ساعة من وقت القبض عليه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 138
  article_text_ar: يجوز للمدير العام أو من يفوضه أن يطلب من السلطات المختصة منع المخالفين أو المتهمين بالتهريب من مغادرة البلاد في حالة عدم كفاية قيمة المواد المضبوطة لتغطية الضرائب والرسوم والغرامات .ويلغى قرار المنع إذا قدم المخالف أو المتهم بالتهريب كفالة تعادل المبالغ التي قد يطالب بها ، أو إذا تبين فيما بعد أن قيمة المواد المضبوطة كافية لتغطية المبالغ المطالب بها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 139
  article_text_ar: تعد الغرامات الجمركية المحصلة والمصادرات المنصوص عليها في هذا النظام "القانون "تعويضا مدنيا للإدارة ولا تشملها أحكام العفو العام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 140
  article_text_ar: عند تعدد المخالفات تستحق الغرامة عن كل مخالفة على حدة، ويكتفى بالغرامة الأشد إذا كانت المخالفات مرتبطة ببعضها على نحو لا يحتمل التجزئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 141
  article_text_ar: 'فيما عدا الحالات التي تعد في حكم التهريب، المنصوص عليها في المادة (143) من هذا النظام "القانون"، وبما لا يتعارض ونصوص الاتفاقيات الدولية النافذة، تفرض غرامة مالية وفق القواعد التي تحددها اللائحة التنفيذية لهذا النظام "القانون" على المخالفات التالية: 1 - مخالفات الاستيراد والتصدير. 2 - مخالفات البيانات الجمركية. 3 - مخالفات البضائع العابرة "الترانزيت". 4 - مخالفات المستودعات. 5 - مخالفات المناطق التي تشرف عليها الجمارك. 6 - مخالفات الإدخال المؤقت. 7 - مخالفات إعادة التصدير. 8 - أي مخالفة جمركية أخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 142
  article_text_ar: التهريب هو إدخال أو محاولة إدخال البضائع إلى البلاد أو إخراجها، أو محاولة إخراجها منها بصورة مخالفة للتشريعات المعمول بها، دون أداء الضرائب " الرسوم " الجمركية كليا أو جزئيا، أو خلافا لأحكام المنع أو التقييد الواردة في هذا النظام " القانون " والأنظمة والقوانين الأخرى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 143
  article_text_ar: 'يدخل في حكم التهريب بصورة خاصة ما يلي : 1 - عدم التوجه بالبضائع عند الإدخال إلى أول دائرة جمركية . 2 - عدم اتباع الطرق المحددة في إدخال البضائع وإخراجها . 3 - تفريغ البضائع من السفن أو تحميلها عليها بصورة مغايرة للأنظمة في الدائرة الجمركية، أو تفريغها أو تحميلها في النطاق الجمركي البحري. 4 - تفريغ البضائع من الطائرات أو تحميلها عليها بصورة غير مشروعة خارج المطارات الرسمية، أو إلقاء البضائع أثناء النقل الجوي، مع مراعاة أحكام المادة (40) من هذا النظام " القانون ". 5 - عدم التصريح في الدائرة الجمركية عن البضائع الواردة أو الصادرة دون بيان حمولة "منافست" ، ويدخل في ذلك ما يصطحبه المسافرون من بضائع ذات صفة تجارية . 6 - تجاوز البضائع في الإدخال أو الإخراج الدائرة الجمركية دون التصريح عنها . 7 - اكتشاف بضائع غير مصرح عنها في إحدى الدوائر الجمركية موضوعة في مخابئ بقصد إخفائها، أو في فجوات أو فراغات لا تكون مخصصة عادة لاحتواء مثل هذه البضائع . 8 - الزيادة أو النقص أو التبديل في عدد الطرود، أو في محتوياتها المصرح عنها في وضع معلق للرسوم المنصوص عليها في الباب السابع من هذا النظام
    " القانون " والمكتشفة بعد مغادرة البضاعة الدائرة الجمركية، ويشمل هذا الحكم البضائع التي عبرت البلاد تهريبا أو دون إنهاء إجراءاتها الجمركية، ويتحمل الناقل مسؤولية ذلك . 9 - عدم تقديم الإثباتات التي تحددها الإدارة لإبراء بيانات الأوضاع المعلقة للضرائب " الرسوم " الجمركية المنصوص عليها في الباب السابع من هذا النظام " القانون ". 10 - إخراج البضائع من المناطق والأسواق الحرة أو المخازن الجمركية أو المستودعات أو المناطق الجمركية دون إنهاء إجراءاتها الجمركية . 11 - تقديم مستندات أو قوائم كاذبة أو مزورة أو مصطنعة أو وضع علامات كاذبة بقصد التهرب من تأدية الضرائب " الرسوم " الجمركية " كليا أو جزئيا أو بقصد تجاوز أحكام المنع أو التقييد . 12 - نقل البضائع الممنوعة أو المقيدة أو حيازتها دون تقديم إثباتات تؤيد استيرادها بصورة نظامية . 13 - نقل أو حيازة البضائع الخاضعة لسلطة الجمارك ضمن النطاق الجمركي دون مستند نظامي . 14 - عدم إعادة استيراد البضائع الممنوع تصديرها والمصدرة مؤقتا لأي غاية كانت .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 144
  article_text_ar: 'يشترط في المسؤولية الجزائية في جرم التهريب توفر القصد، وتراعى في تحديد هذه المسؤولية النصوص الجزائية المعمول بها، ويعتبر مسؤولا جزائيا بصورة خاصة : 1 - الفاعلون الأصليون . 2 - الشركاء في الجرم . 3 - المتدخلون والمحرضون . 4 - حائزو المواد المهربة . 5 - أصحاب وسائط النقل التي استخدمت في التهريب وسائقوها ومعاونوهم الذين تثبت علاقتهم بالمهربات . 6 - أصحاب أو مستأجرو المحلات والأماكن التي أودعت فيها المواد المهربة أو المنتفعون بها الذين يثبت علمهم بوجود المهربات في محلاتهم وأماكنهم .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 145
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد تقضي بها نصوص أخرى نافذة في الدولة ، يعاقب على التهريب وما في حكمه ، وعلى الشروع في أي منهما بما يلي : 1 - إذا كانت البضاعة المهربة بضاعة تخضع لضرائب " رسوم " جمركية مرتفعة ، فتكون العقوبة غرامة لا تقل عن مثلي الضريبة " الرسوم " الجمركية المستحقة ولا تزيد على مثلي قيمة البضاعة ، والحبس مدة لا تقل عن شهر ولا تزيد عن سنة، أو بإحدى هاتين العقوبتين . 2 - أما السلع الأخرى ، تكون العقوبة غرامة لا تقل عن مثلي الضريبة " الرسوم " الجمركية المستحقة، ولا تزيد عن قيمة البضاعة ، والحبس مدة لا تقل عن شهر ولا تزيد على سنة أو بإحدى هاتين العقوبتين . 3 - إذا كانت البضاعة المهربة غير خاضعة للضرائب " الرسوم " الجمركية (معفاة) ، فتكون العقوبة غرامة لا تقل عن عشرة في المائة من قيمة البضاعة، ولا تزيد على قيمتها ، والحبس مدة لا تقل عن شهر ولا تزيد على سنة ، أو بإحدى هاتين العقوبتين . 4 - إذا كانت البضاعة المهربة من البضائع الممنوعة ، قتكون العقوبة غرامة لا تقل عن قيمة البضاعة ولا تزيد على ثلاثة أمثال قيمتها ، والحبس مدة لا تقل عن ستة أشهر ولا تزيد على ثلاث سنوات
    ، أو بإحدى هاتين العقوبتين . 5 - مصادرة البضائع محل التهريب أو الحكم بما يعادل قيمتها عند عدم حجزها . 6 - مصادرة وسائط النقل والأدوات والمواد التي استعملت في التهريب، وذلك فيما عدا وسائط النقل العامة كالسفن والطائرات والقطارات والسيارات العامة، ما لم تكن قد أعدت أو استؤجرت لهذا الغرض أو الحكم بما يعادل قيمتها عند عدم حجزها . 7 - في حالة العود يجوز الحكم بمثلي العقوبة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 146
  article_text_ar: للمدير العام التحفظ على البضائع ووسائط النقل المضبوطة في حالة فرار المهربين أو عدم الاستدلال عليهم، وبيعها طبقا لأحكام الباب الرابع عشر من هذا النظام " القانون "، وتؤول حصيلة البيع إلى الدولة إذا مضت سنة على تاريخ البيع دون ضبط المهربين، فإن ضبطوا أو قدموا للمحاكمة خلال هذه المدة وحكم بمصادرة البضاعة سرى حكم المصادرة على مبلغ حصيلة البيع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 147
  article_text_ar: أ - يجوز للمدير العام أن يصدر القرارات اللازمة لتحصيل الضرائب " الرسوم " الجمركية والرسوم الأخرى والغرامات الجمركية الثابتة التي تخلف المكلف عن أدائها .ب - يجوز الاعتراض على قرارات التحصيل لدى الإدارة خلال خمسة عشر يوما من تاريخ التبليغ، غير أن ذلك لا يوقف التنفيذ إلا إذا أديت عن المبالغ المطالب بها تأمينا بموجب كفالة بنكية أو نقدية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 148
  article_text_ar: أ - تفرض الغرامات المنصوص عليها في الفصل الرابع من هذا الباب بقرار من المدير العام أو من يفوضه بذلك .ب - يبلغ المخالف أو من يمثله بالغرامة المفروضة عليه بموجب إشعار خطي عن طريق الجهة المختصة، وعلى المخالف دفع الغرامات خلال خمسة عشر يوما من تاريخ تبليغه بها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 149
  article_text_ar: يجوز التظلم لدى الوزير أو الجهة المختصة من قرارات التغريم المشار إليها في المادة السابقة، وذلك خلال المهلة ذاتها ، وللوزير أو الجهة المختصة تثبيت قرار التغريم أو تعديله أو إلغاؤه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 150
  article_text_ar: لا يجوز تحريك الدعوى في جرائم التهريب إلا بناء على طلب خطي من المدير العام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 151
  article_text_ar: أ - للمدير العام أو من يفوضه بناء على طلب كتابي من صاحب الشأن عقد تسوية صلح في قضايا التهريب، سواء قبل رفع الدعوى أو خلال النظر فيها وقبل صدور الحكم الابتدائي، وذلك بالاستعاضة عن الجزاءات والغرامات الجمركية التي نصت عليها المادة (145) من هذا النظام " القانون ".ب - يصدر دليل التسويات الصلحية بقرار من الوزير أو الجهة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 152
  article_text_ar: 'مع مراعاة أحكام المادة (151) تكون التسوية الصلحية كما يلي : 1 - إذا كان محل التهريب بضاعة تخضع لضرائب " رسوم جمركية " مرتفعة ، تكون العقوبة غرامة لا تقل عن مثلي الضريبة " الرسوم " الجمركية المستحقة، ولا تزيد على مثلي قيمة البضاعة .2 - أما السلع الأخرى ، تكون العقوبة غرامة لا تقل عن مثل الضريبة " الرسوم " الجمركية المستحقة، ولا تزيد على خمسين بالمائة من قيمة البضاعة .3 - إذا كانت البضاعة المهربة غير خاضعة للضرائب " الرسوم " الجمركية (معفاة) ، فتكون العقوبة غرامة لا تقل عن عشرة بالمائة من قيمة البضاعة، ولا تزيد على خمسين بالمائة من قيمتها .4 - إذا كانت البضاعة المهربة من البضائع الممنوعة ، تكون العقوبة غرامة لا تقل عن قيمة البضاعة، ولا تزيد على ثلاثة أمثال قيمتها .5 - مصادرة البضائع المهربة أو الفسح عنها أو إعادة تصديرها كليا أو جزئيا .6 - مصادرة وسائط النقل والأدوات والمواد التي استعملت في التهريب، وذلك فيما عدا وسائط النقل العامة كالسفن والطائرات والسيارات العامة، ما لم تكن قد أعدت أو استؤجرت لهذا الغرض .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 153
  article_text_ar: تسقط الدعوى بعد انتهاء إجراءات المصالحة عليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 154
  article_text_ar: أ - تتكون المخالفة كما تترتب المسؤولية المدنية في جرائم التهريب بتوافر الأركان المادية لها ، ولا يجوز الدفع بحسن النية أو الجهل، إلا أنه يعفى من المسؤولية من أثبت أنه كان ضحية قوة قاهرة . وكذلك من أثبت أنه لم يقدم على ارتكاب أي فعل من الأفعال التي كونت المخالفة أو جريمة التهريب أو تسبب في وقوعها أو أدت إلى ارتكابها . ب - تشمل المسؤولية المدنية - إضافة إلى مرتكبي المخالفة وجرائم التهريب - الشركاء والممولين و الكفلاء والمنتفعين والوسطاء والموكلين والمتبرعين والناقلين والحائزين ومرسلي البضائع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 155
  article_text_ar: يعد مستثمرو المحلات والأماكن الخاصة التي تودع فيها البضائع موضوع المخالفة أو جريمة التهريب مسؤولين عنها ، أما مستثمرو المحلات والأماكن العامة وموظفوها، وكذلك أصحاب وسائط نقل الركاب العامة وسائقوها ومعاونوهم فهم مسؤولون ما لم يثبتوا عدم علمهم بوجود البضائع موضوع المخالفة أو التهريب وعدم وجود مصلحة مباشرة أو غير مباشرة لهم بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 156
  article_text_ar: يكون الكفلاء مسؤولين في حدود كفالاتهم عن دفع الضرائب " الرسوم " الجمركية والغرامات وغيرها من المبالغ المستحقة للإدارة أو التي تستحق على الملتزمين الأصليين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 157
  article_text_ar: يكون المخلصون الجمركيون مسؤولين مسؤولية كاملة عن المخالفات وجرائم التهريب التي يرتكبونها في البيانات الجمركية، وعن المخالفات وجرائم التهريب التي يرتكبها مستخدموهم المفوضون من قبلهم ، أما بالنسبة للتعهدات المقدمة في البيانات الجمركية فلا يسألون عنها إلا إذا تعهدوا بها أو كفلوا متعهديها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 158
  article_text_ar: يكون أصحاب البضائع وأرباب العمل وناقلو البضائع مسؤولين عن أعمال مستخدميهم وجميع العاملين لمصلحتهم فيما يتعلق بالرسوم والضرائب التي تستوفيها الدائرة الجمركية والغرامات والمصادرات المنصوص عليها في هذا النظام " القانون " والناتجة عن تلك الأعمال .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 159
  article_text_ar: لا يسأل الورثة عن أداء الغرامات المترتبة على المتوفى من نصيب كل منهم من التركة، إلا إذا كانوا شركاء في التهريب ، وتسقط الدعوى في حالة وفاة المخالف .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 160
  article_text_ar: تحصل الضرائب والرسوم والغرامات المقررة أو المحكوم بها بالتضامن والتكافل من المخالفين أو المسؤولين عن التهريب، وذلك وفق الأصول المتبعة في تحصيل أموال خزينة الدولة ، وتكون البضائع ووسائط النقل عند وجودها أو حجزها ضمانا لاستيفاء المبالغ المطلوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 161
  article_text_ar: يجوز تشكيل محاكم جمركية ابتدائية في كل من الإدارة والدوائر الجمركية وفقا للأداة القانونية المعمول بها في كل دولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 162
  article_text_ar: 'تتولى المحكمة الجمركية الابتدائية الاختصاصات التالية : 1 - النظر في جميع جرائم التهريب وما في حكمه .2 - النظر في جميع الجرائم والمخالفات التي ترتكب ضد أحكام هذا النظام " القانون " ولائحته التنفيذية .3 - النظر في الاعتراضات على قرارات التحصيل عملا بأحكام المادة (147) من هذا النظام " القانون" .4 - النظر في الاعتراضات المقدمة على قرارات التغريم وفقا لأحكام المادة (148) من هذا النظام " القانون " .5 - يجوز للمحكمة أن تطلب من أي شخص اتهم بموجب هذا النظام " القانون " أن يقدم كفيلا يضمن مثوله أمام المحكمة أو تقرر توقيفه حتى تنتهي القضية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 163
  article_text_ar: أ - يجوز استئناف أحكام المحكمة الجمركية الابتدائية أمام محكمة استئنافية خاصة تشكل بموجب الأداة القانونية المعمول بها في كل دولة .ب - تنظر هذه المحكمة في القضايا المرفوعة لديها وتصدر أحكامها بالأغلبية .ج - مدة الاستئناف ثلاثون يوما من تاريخ تبليغ الحكم الابتدائي إذا كان غيابيا، ومن تاريخ النطق به إذا كان حضوريا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 164
  article_text_ar: تكون للأحكام الصادرة من المحكمة الاستئنافية الصفة القطعية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 165
  article_text_ar: تنفذ قرارات التحصيل والتغريم والأحكام الصادرة في القضايا الجمركية بعد اكتسابها الصفة القطعية بجميع وسائل التنفيذ على أموال المكلفين المنقولة وغير المنقولة ، وللوزير أو الجهة المختصة استصدار أمر بحجز ما يكفي من تلك الأموال لتسديد المبالغ المطلوبة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 166
  article_text_ar: أ - للإدارة أن تبيع البضائع المحجوزة القابلة للتلف أو النقص أو التسرب أو كانت في حالة من شأنها أن تؤثر في سلامة البضائع الأخرى والمنشآت الموجودة فيها .ب - يجوز بترخيص من المدير العام أو من يفوضه بيع البضائع المحجوزة التي تتعرض لنقصان قيمتها بشكل ملحوظ . وتنفيذا لهذه المادة يتم البيع استنادا إلى محضر تثبت فيه حالة البضاعة والأسباب الداعية إلى بيعها، دون الحاجة إلى انتظار صدور الحكم من المحكمة المختصة ، على أن يشعر صاحب البضاعة بذلك ، فإذا صدر هذا الحكم فيما بعد وكان يقضي بإعادة هذه البضاعة إلى صاحبها دفع له ثمن البضاعة المباعة بعد اقتطاع أي ضريبة أو رسم مستحق عليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 167
  article_text_ar: للإدارة بعد انقضاء المهلة التي حددها الوزير أو الجهة المختصة أن تبيع البضائع التي خزنت في المستودعات الجمركية أو الموجودة على الساحات والأرصفة، أو تلك المتروكة في الدوائر الجمركية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 168
  article_text_ar: 'تقوم الإدارة ببيع ما يلي : 1 - البضائع والمواد ووسائط النقل التي أصبحت ملكا للجمارك نتيجة حكم بالمصادرة أو تسوية صلحية أو تنازل خطي . 2 - البضائع التي لم تسحب من المستودعات ضمن المهلة القانونية التي تحدد وفقا للمادة (75) من هذا النظام " القانون " . 3 - البضائع والمواد التي لم يُعرَف أصحابها ولم يطالب بها أحد خلال مهلة الحفظ التي يحددها الوزير أو الجهة المختصة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 169
  article_text_ar: لا تتحمل الإدارة أي مسؤولية عن العطل أو الضرر الذي يلحق بالبضائع التي تقوم ببيعها بموجب أحكام هذا النظام " القانون "، إلا إذا ثبت أنها ارتكبت خطأ بينا في إجراء عملية البيع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 170
  article_text_ar: أ - تجري عمليات البيع المنصوص عليها في هذا الباب بالمزاد العلني وفقا للشروط والقواعد التي تحدد بقرار من الوزير أو الجهة المختصة .ب - تباع البضائع والأشياء ووسائط النقل خالصة من الضرائب " الرسوم " الجمركية والرسوم والضرائب الأخرى عدا عمولة السمسرة التي يتحملها المشتري أثناء إجراءات البيع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 171
  article_text_ar: 'أ - يوزع حاصل البيع وفقا للترتيب التالي : 1- الضرائب " الرسوم " الجمركية .2 - نفقات عملية البيع .3 - النفقات التي صرفتها الإدارة من أي نوع كانت .4 - أجرة النقل عند الاقتضاء .5 - أي رسم آخر . ب - يودع الرصيد المتبقي من حاصل بيع البضائع المسموح باستيرادها في يوم البيع بعد اقتطاع المبالغ المنصوص عليها في الفقرة (أ) من هذه المادة أمانة لدى الإدارة. ولأصحاب العلاقة أن يطالبوا باسترداده خلال سنة من تاريخ البيع، وإلا أصبح حقا للخزينة .ج - البضائع الممنوعة أو غير المسموح باستيرادها يصبح الرصيد المتبقي من ثمنها حقا للخزينة العامة .د - البضائع الممنوعة أو المقيدة أو المسموح باستيرادها التي تباع نتيجة لتسوية صلحية أو قرار تغريم أو حكم قضائي بصدد عملية تهريب يوزع الرصيد المتبقي وفقا لأحكام المادة (172) من هذا النظام " القانون "، وذلك بعد اقتطاع الضرائب والرسوم والنفقات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 172
  article_text_ar: تحدد الحصة العائدة للخزينة من حصيلة مبالغ الغرامات الجمركية وقيمة البضائع ووسائط النقل المصادرة أو المتنازل عنها بنسبة خمسين بالمائة، وذلك بعد اقتطاع الضرائب " الرسوم " الجمركية والنفقات ، ويتم إيداع النسبة المتبقية من الحصيلة في صندوق المكافآت الجمركية أو أي حساب آخر خاص بالجمارك ، وتصرف للأشخاص الذين قاموا باكتشاف المخالفات وضبطها ومن عاونهم ، وتحدد بقرار من الوزير أو الجهة المختصة قواعد توزيع تلك المكافآت بناء على اقتراح من المدير العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 173
  article_text_ar: تتمتع الإدارة من أجل تحصيل الضرائب " الرسوم " الجمركية والرسوم والضرائب الأخرى التي تكلف بتحصيلها ، وكذلك الغرامات والتعويضات والمصادرات والاستردادات بامتياز عام على أموال المكلفين المنقولة وغير المنقولة حتى حالة الإفلاس وبالأفضلية على جميع الديون عدا المصروفات القضائية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 174
  article_text_ar: لا تقبل أي مطالبة أو دعوى باسترداد الضرائب " الرسوم " الجمركية التي مضى على تأديتها أكثر من ثلاث سنوات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 175
  article_text_ar: للإدارة إتلاف السجلات والإيصالات والبيانات والمستندات الجمركية الأخرى العائدة لكل سنة بعد مضي خمس سنوات على الانتهاء من إجراءاتها الجمركية ، ولا تكون ملزمة بإبرازها بعد انقضاء تلك المدة لأي جهة من الجهات أو إعطاء أي نسخة أو صورة عنها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 176
  article_text_ar: 'مع عدم الإخلال بالنظم والقوانين الأخرى النافذة بالدولة ، تكون مدة التقادم فيما يخص إدارة الجمارك إذا لم تجر ملاحقة بشأنها على النحو التالي : 1 - خمسة عشر سنة للحالتين التاليتين : أ - أعمال التهريب أو ما في حكمه ابتداء من تاريخ اقتراف الجرم . ب - تنفيذ أحكام التهريب وما في حكمه من تاريخ صدور الحكم . 2 - خمس سنوات للحالات التالية ما لم تجر المطالبة بشأنها: أ - لتحقيق المخالفات ابتداء من تاريخ وقوعها. ب - لتحصيل الغرامات والمصادرات المفروضة في المخالفات ابتداء من صدور قرار التغريم . ج - لتحصيل الضرائب " الرسوم " الجمركية والرسوم الأخرى التي لم تحصل لخطأ من الدائرة الجمركية ابتداء من تاريخ تسجيل البيان الجمركي .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 177
  article_text_ar: أ - للمدير العام أن يستثني الوزارات والدوائر الحكومية والمؤسسات الرسمية العامة من بعض الإجراءات تسهيلا لأعمالها .ب - للمدير العام بيع البضائع والأشياء المصادرة أو المتنازل عنها للوزارات والدوائر الرسمية والمؤسسات العامة التابعة للدولة بالمبلغ الذي يراه مناسبا إذا أبدت حاجتها إليها ، أو التنازل عنها بدون مقابل بقرار من الوزير أو الجهة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 178
  article_text_ar: تقر لجنة التعاون المالي والاقتصادي لدول المجلس اللائحة التنفيذية لهذا النظام " القانون " ويتم إصدارها وفقا للأداة القانونية لكل دولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
- article_ref: المادة 179
  article_text_ar: يحل النظام "القانون" الموحد للجمارك بدول المجلس بعد نفاذه محل الأنظمة والقوانين الجمركية المعمول بها في الدول الأعضاء ، وفي حدود القواعد والنظم الدستورية والأنظمة الأساسية المعمول بها في كل دولة ، وبما لا يتعارض معها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b93d0275-775f-482a-9d52-a9a700f2ca15/1
  verified: false
