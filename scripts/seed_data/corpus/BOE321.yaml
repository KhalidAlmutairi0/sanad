regulation:
  code: BOE321
  name_ar: الضوابط الخاصة بوضع الأطفال السعوديين في الخارج من أب سعودي وأم غير سعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولا
  article_text_ar: '1 - في حال اعتراف الأب بأولاده : يلزم الأب بتصحيح أوضاعهم وفقا للتعليمات المنظمة لذلك، وفي حال عدم تمكنه من الصرف عليهم فيحالون إلى الجمعية الخيرية لرعاية الأسر السعودية في الخارج أو غيرها من الجمعيات المماثلة ؛ لدراسة أوضاعهم ، ليخصص لهم مبلغ شهري يصرف من الجمعية ، يحدد وفقا للحالة المعيشية في البلد الذي يقيمون فيه. 2 - في حال إنكار الأب أولاده أو تنكره لهم : فإذا كان لدى الأم وثائق مصدقة تثبت زواجها من مواطن سعودي ، ونتج من هذا الزواج أولاد والأب ينكرهم ؛ فلها التقدم إلى الجهة المختصة في بلدها، أو الممثلية السعودية في ذلك البلد بطلب تصحيح وضع الأولاد وفقا لما لديها من وثائق ومستندات ، وتتم الكتابة عن ذلك إلى وزارة الخارجية ، ومن ثم تكتب الوزارة لإمارة المنطقة المقيم فيها الزوج إن كان مكان إقامته معلوما ، فإن كان غير معلوم ؛ فيكتب إلى وزارة الداخلية لأخذ إفادته عن صحة ادعاء الزوجة ، وإن كان متوفى أو تعذر العثور عليه ؛ تؤخذ إفادة أحد أقاربه من الدرجة الأولى في ذلك . وعند ورود الإفادة متضمنة إنكار الأب - أو من يقوم مقامه - نسب الأولاد إليه ، فتبلغ الأم بذلك عبر القنوات
    نفسها ، فإن أصرت على أنهم أولاده ؛ فلها إقامة دعوى قضائية لإثبات نسبهم إليه، وعند ثبوت النسب ؛ يُلزم الأب - أو من يقوم مقامه - بتنفيذ الأحكام الصادرة في حقه ، وتصحيح أوضاع أولاده نظاما ، ودفع جميع ما صُرف عليهم من نفقة وذلك وفقا لضوابط تنفيذ الأحكام الأجنبية.وإذا تنكر الأب لأولاده الثابت نسبهم إليه ، سواء أكان هذا راجعا إلى نواح مادية ، أم اجتماعية ، أم نظامية ، أم غيرها ؛ فيلزم بتصحيح أوضاعهم نظاما ، وصرف نفقاتهم . وإن كان عاجزا عن صرف النفقة ؛ تسجل الأسرة لدى الجمعية الخيرية لرعاية الأسر السعودية في الخارج أو غيرها من الجمعيات المماثلة لتتولى الصرف عليهم وفقا لنظامها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ed69b738-fa85-4777-9f56-a9a700f2b630/1
  verified: false
- article_ref: ثانيا
  article_text_ar: التأكيد على أن دور الجمعية الخيرية لرعاية الأسر السعودية في الخارج لاحق لدور البعثات السعودية في الخارج ، وأن ما ترصده البعثات السعودية من حالات تبلغ به وزارة الخارجية في الرياض ليُبعث إلى الجمعية لإقرار المساعدة اللازمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ed69b738-fa85-4777-9f56-a9a700f2b630/1
  verified: false
- article_ref: ثالثا
  article_text_ar: تطبيق قرار مجلس الوزراء رقم (104) وتاريخ 5 / 5 / 1404 هـ ، الصادر في شأن من يسيئون إلى سمعة المملكة في الخارج ، والإجراءات اللازمة لتنفيذه الصادرة بموجب قرار سمو وزير الداخلية رقم (16س/999) وتاريخ 6 / 3 / 1405 هـ، على من يثبت أنه ترك أولاده إهمالا لهم بوصفه إساءة إلى سمعة المملكة في الخارج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ed69b738-fa85-4777-9f56-a9a700f2b630/1
  verified: false
- article_ref: رابعا
  article_text_ar: 'تفعيل دور المجلس التنسيقي المنصوص عليه في برقية المقام السامي رقم (1131/م ب) وتاريخ 11 / 2 / 1429 هـ ، المتضمنة إنشاء مجلس تنسيق مكون من مندوبين من : وزارة الداخلية (الشؤون العامة ، والأحوال المدنية)، ووزارة الخارجية ، ووزارة الشؤون الاجتماعية ، ووزارة المالية ، ورئاسة الاستخبارات العامة ، والجمعية الخيرية لرعاية الأسر السعودية في الخارج ، ويكون مقره وزارة الداخلية ؛ وذلك للبت في قضايا الأسر السعودية في الخارج ورعاية شؤونهم وفقا لما هو منصوص عليه في المهمات الموضحة لمجلس التنسيق المشار إليه في الأمر السامي الآنف ذكره.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ed69b738-fa85-4777-9f56-a9a700f2b630/1
  verified: false
- article_ref: خامسا
  article_text_ar: شمول الضمان الاجتماعي من يثبت استحقاقهم إياه نظاما من أولئك الأطفال .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ed69b738-fa85-4777-9f56-a9a700f2b630/1
  verified: false
- article_ref: سادسا
  article_text_ar: يتم دعم وزارة الخارجية - بالتنسيق مع وزارة المالية - بوظائف باحثين وأخصائيين اجتماعيين للعمل في البعثات السعودية في الخارج ليقوموا بمتابعة حالات هؤلاء الأطفال السعوديين الموجودين في الخارج الذين يعانون الإهمال والعوز والإنكار والتنكر من قبل الآباء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ed69b738-fa85-4777-9f56-a9a700f2b630/1
  verified: false
