regulation:
  code: BOE153
  name_ar: نظام المحافظة على مصادر المياه
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة (1)
  article_text_ar: دون إخلال بالحقوق المُقرَّرة شرعاً، تُعتبر مصادِر المياه مُلكاً عاماً يتم الانتِفاع بِها طِبقاً لأحكام هذا النِظام والأنظِمة الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: 'المُحافظة على مصادِر المياه وتنظيم طُرق الانتِفاع بِها مِن اختِصاص وزارة الزِراعة والمياه ، وعليها في سبيل ذلك: أ - وضع القواعِد والإجراءات اللازِمة للمُحافظة على مصادِر المياه وحمايتِها من التلوث.ب - تنظيم كيفية استِغلال مصادِر المياه بالشكل الذي يضمن توفُرها ويُحقِّق عدالة توزيعِها.جـ - وضع التعليمات اللازِمة لحفر الآبار وإقامة السدود والإنشاءات المائية الأُخرى.د - تحديد الإمكانات الواجب توفُرها لدى المُقاولين الذين يُزاوِلون حفر الآبار، وتصنيفِهم على فئات حسب إمكاناتِهم الفنية والإدارية والمالية.هـ - الإشراف والتفتيش للتأكُد من الالتِزام بتطبيق أحكام هذا النِظام ولوائحه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: 'تكون الأفضلية في الاستِفادة من المياه كالتالي: أولاً : الاحتياجات البشريِّة الأساسية. ثانياً : سُقيا الحيوانات. ثالثاً : مُتطلبات الزِراعة والصِناعة والعُمران وغيرِها من الأغراض، وتُحدَّد الأولويات في هذه الحالة بقرار من وزير الزِراعة والمياه .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: على وزير الزِراعة والمياه في الحالات الطارئة أو عند شُح المياه اتِخاذ الإجراءات الفنية والإدارية اللازِمة لتحقيق عدالة التوزيع بين المُنتفِعين وِفقاً للأفضليات المنصوص عليها في المادة السابِقة، وللوزارة من أجل ذلك حظر حفر الآبار مُدة محدُّدة أو على سبيل الدوام وتحديد كمية المياه للمُستهلِكين وتنظيم طُرق وسائل استِهلاك المياه واستِعمالِها، وغير ذلك من الإجراءات الضرورية للمُحافظة على الموجود من المياه وتوزيعِها بشكل عادِل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: على وزارة الزِراعة والمياه إصلاح أو ردم الآبار التي تُعرِض الثروة المائية للضياع أو تؤدي إلى الإضرار بالتُربة أو تلوث المياه، وذلك على نفقتِها إذا كانت محفورة بموجب ترخيص من الوزِارة وِفقاً للتعليمات التي أصدرتها. أمَّا الآبار التي تم حفرُها خِلافاً لذلك، فتقوم الوزارة بإصلاحِها أو ردمِها على حِساب المالِك إذا امتنع عن إصلاحِها خِلال الفترة التي حدَّدتها وزارة الزِراعة والمياه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: لا يجوز حفر بئر أو إقامة سد، أو أية إنشاءات مائية أُخرى، إلا بعد الحصول على ترخيص من وزارة الزِراعة والمياه مصحوباً بالتعليمات التي يجب مُراعاتِها عند التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: أ - على مُقاوِلي حفر الآبار الحصول على ترخيص من وزارة الزِراعة والمياه بمُزاولة أعمال الحفر، ولا يُمنح الترخيص إلا بعد تصنيف المُقاوِل.ب - المُقاوِلون الذين يُزاوِلون أعمال الحفر قبل العمل بِهذا النِظام، عليهم التقدُّم للوزارة بطلب الترخيص خِلال فترة لا تتجاوز سنة مِن صُدورِه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: على مُقاوِلي حفر الآبار الامتِناع عن حفر أي بئر لا يوجد لدى مالِكِها الترخيص المنصوص عليه في المادة السادسة، وفي حالة وجود الترخيص على المُقاوِل الالتِزام بعدم مُخالفة التعليمات المُقترنة بِه ويُكلف بإصلاح البئر التي يتم حفرُها خِلافاً لتِلك التعليمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (9)
  article_text_ar: كُل من يُخالِف أحكام هذا النِظام ولوائحه التنفيذية يُعاقب بغرامة لا تتجاوز مائة ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: لوزارة الزِراعة والمياه سحب الترخيص في حال تِكرار المُخالفة، ويجوز التظلُّم من هذه العقوبة أمام ديوان المظالِم خِلال شهر من صدور القرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: يصدُر بتوقيع العقوبات الوارِدة في هذا النِظام قرار من وزير الزِراعة والمياه ، ويتم ضبط مُخالفة هذا النِظام ولوائحه والتحقيق فيها وتنفيذ عقوبتِها وِفقاً للإجراءات التي يُحدِّدُها وزير الداخلية ووزير الزِراعة والمياه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: يُصدِر وزير الزِراعة والمياه اللوائح التنفيذية لهذا النِظام، وتسري أحكامُها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
- article_ref: المادة (13)
  article_text_ar: يُلغِي هذا النِظام كُل ما يتعارض مع أحكامِه، ويُعمل بِه بعد ثلاثة أشهُر من تاريخ نشرِّه في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/588efd09-dc0d-4491-82e4-a9a700f245f6/1
  verified: false
