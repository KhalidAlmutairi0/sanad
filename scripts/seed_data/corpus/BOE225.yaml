articles:
- article_ref: 'المادة الأولى: إنشاء الصندوق واسمه ومركزه'
  article_text_ar: 'يؤسس بمُقتضى هذا النظام صندوق يُسمَّى: ( صندوق التنمية الصناعية السعوديِّ )، وتكون له الشخصية الاعتبارية، ويمثله رئيس مجلِس إدارته، ويكون مركزُه الرئيسي في مدينة الرياض، وللصندوق في سبيل مزاولة نشاطه أن يُنشئ فروعًا أو يعين وكلاء في مدن أخرى. ويرتبط الصندوق إداريًّا بوزارة المالية والاقتصاد الوطني .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الثانية: أغراض الصندوق'
  article_text_ar: 'يهدف الصندوق إلى دعم التنمية الصناعية في القطاع الأهلي لاقتِصاد المملكة عن طريق القيام بما يلي: 1 - تقديم قروض متوسطة أو طويلة الأجل بدون فوائد للمنشآت الصناعية الجديدة التي تؤسس في المملكة.2 - تقديم قروض متوسطة أو طويلة الأجل بدون فوائد للمنشآت الصناعية الخاصة القائمة لغرض توسعة نشاطها أو استبدال معداتها وإدخال الأساليب العصرية عليها.3 - تقديم المشورة الاقتِصادية أو الفنية أو الإدارية للمنشآت الصناعية في المملكة عندما يكون ذلك ضروريًّا ومُمكِنًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الثالثة: صلاحيات الصندوق'
  article_text_ar: تكون للصندوق جميع الصلاحيات اللازمة لتحقيق أغراضِه المنصوص عليها في هذا النظام؛ ومن ذلك على سبيل المثال، في حدود مقتضيات نشاطه أن يُبرم عقود القروض وغيرها من العقود، ويقبل الرهون وغيرها من ضمانات الوفاء بالقروض التي يُقدِّمُها، وأن يمتلك ويرهن ويبيع الأموال بجميع أنواعها منقولة كانت أو عقارية، وأن يقترض أو يرتب في ذمته غير ذلك من الالتزامات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الرابعة:  سياسة الاستثمار والقروض'
  article_text_ar: 1- تُشكل السياسة الصناعية للحكومة القواعد العريضة لنشاط الصندوق في دعم وتشجيع الصناعة في المملكة، وعلى الصندوق أن يتعاون مع الأجهزة والمؤسسات الحكومية المُختصة في سبيل تحقيق ذلك. ويُنسق بين نشاطِه ونشاطها.2 - على الصندوق إجراء تقييم متكامل للجدوى الاقتِصادية للمشروع الذي يُطلب تمويله، وأن يأخُذ في الاعتبار سلامة إدارته وذلك للتحقق من جدوى المشروع الصناعي من النواحي الاقتصادية والمالية والفنية.3 - على الصندوق عند فحص المشروعات التي يُطلب مِنه تمويلها أن ينظر فيما إذا كان التمويل المطلوب للمشروع بكامله قد تم بصورة معقولة، وما إذا كان حجم مساعدة الصندوق يمثل نسبة معقولة من مجموع حاجة المشروع للتمويل.4 - يجب على الصندوق أن يحصُل على ضمانات مالية كافية من أصحاب المشاريع الصناعية التي يمولُها تتناسب وحجم التمويل الذي يقدمه الصندوق.5 - يجب على الصندوق مراقبة تنفيذ المشروعات الصناعية التي يمولها للتأكد من أنها تسير سيرًا منتظمًا حسب الخطة المحددة لها، ويقدم مشورته للمنشأة الصناعية فيما يتعلق بالمشاكل والصعوبات التي تعترض هذه المشروعات، وتتم هذه الرقابة عن طريق الحصول على تقارير
    عن تلك المشروعات والقيام بزيارات تفتيشية يقوم بها المختصون في الصندوق.6 - لا يجوز للصندوق أن يمول أكثر من (25 %) خمسة وعشرين في المائة من مجموع التمويل المطلوب للمشروع أو تطويره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الخامسة:  رأس مال الصندوق'
  article_text_ar: رأس مال الصندوق خمسمائة مليون ريال تدفعه وزارة المالية والاقتصاد الوطني تدريجيًّا حسبما يتم الاتفاق عليه مع الصندوق، ويجوز زيادته بقرار من مجلس الوزراء بناءً على توصية وزير المالية والاقتصاد الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تتمتع القروض التي يمنحها الصندوق بالمزايا والضمانات المترتبة لحقوق الخزانة العامة وتكون قابلة للتحصيل؛ كأموال الدولة الأخرى وفقًا للقواعد المنظمة لجباية أموال الدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة السابعة: مجلس إدارة الصندوق'
  article_text_ar: يكون للصندوق مجلس إدارة يتكون من خمسة أعضاء من بينهم رئيسه ويعينهم مجلس الوزراء بناءً على توصية وزير المالية والاقتصاد الوطني لمدة لا تزيد عن أربع سنوات، ويجوز إعادة تعيينهم لمدة أو لمدد أخرى ويحدد مجلس الوزراء مكافأة رئيس وأعضاء مجلس الإدارة ، ويكون المجلس مسئولًا عن توجيه نشاط الصندوق وسياسته العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الثامنة: اجتِماعات مجلِس الإدارة'
  article_text_ar: يجتمع مجلس إدارة الصندوق بناء على دعوة رئيسه كلما دعت الحاجة، ويُنتخب من بين أعضائه نائبًا للرئيس يساعده في حضوره وينوب عنه في غيابه، ولا يكون اجتماع المجلس صحيحًا إلا إذا حضره أغلبية الأعضاء، وتتخذ قرارات المجلِس بأغلبية الحاضرين، وعند تساوي الآراء يُرجح الرأي الذي وافق عليه رئيس الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة التاسعة: مدير عام الصندوق ونائبه'
  article_text_ar: يكون للصندوق مدير عام ونائب له ويكون المدير العام مسئولًا أمام مجلس الإدارة عن تنفيذ وتطبيق وتدعيم سياسة الصندوق ولوائحه وقرارات مجلس إدارته، ويحضر المدير العام جلسات مجلس الإدارة ويشترك في مناقشات المجلس ويوقع على محاضر جلساته، ولكن لا يكون له صوت في المداولات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة العاشرة: لوائح الصندوق'
  article_text_ar: يصدر مجلس إدارة الصندوق اللوائح اللازمة لإدارته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز أن يعقد الصندوق اتفاقية مع مؤسسة أو مؤسسات ذات خبرة وسمعة عالية؛ لتزويد الصندوق بالخدمات الفنية والمهنية بالشروط التي يتفق عليها ولعدد محدود من السنوات، ويجوز تجديدها طبقًا لما يراه مجلس الإدارة ويكون من بين الخدمات التي تقدمها المؤسسة أو المؤسسات المتعاقد معها تقديم مدير عام الصندوق ابتداءً من تاريخ ممارسة الصندوق لنشاطه وللمدة التي يتفق مجلس الإدارة عليها مع المؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الثانية عشرة: مُراجِع حِسابات الصندوق'
  article_text_ar: يعين مجلس إدارة الصندوق مراجع حسابات أو أكثر من ذوي الخبرة العالية يقوم بأعمال المراجعة الحسابية المتعارف عليها بالإضافة إلى أية مراقبة محاسبية داخلية تقررها لوائح الصندوق أو مجلس إدارته، ويحدد مجلس إدارة الصندوق أتعاب المراجع ومدة عمله ويجوز إعادة تعيينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الثالثة عشرة:  السنة المالية'
  article_text_ar: السنة المالية للصندوق هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
- article_ref: 'المادة الرابعة عشرة: تقرير مجلس الإدارة'
  article_text_ar: يُقدِّم مجلس إدارة الصندوق لوزير المالية والاقتصاد الوطني خلال الأربعة الأشهر التالية لكل سنة مالية للصندوق تقريرًا عن أعماله وحساباته مصدقًا عليه من المراجعين القانونيين، ويرفع الوزير التقرير مقرونًا بملاحظاته عليه إلى مجلس الوزراء للنظر فيه وإقراره أو إصدار التوجيه اللازم بشأنه ويتم بعد إقراره نشره في الجريدة الرسمية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/407a32f0-2e60-4c3e-9994-a9a700f2952a/1
  verified: false
