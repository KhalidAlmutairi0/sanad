regulation:
  code: BOE057
  name_ar: نظام الرهن التجاري
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: الرهن التجاري هو الذي يتقرر على مال منقول توثيقا لدين يعتبر تجاريًّا بالنسبة للمدين.ويكون الرهن تجاريًّا بالنسبة إلى جميع ذوي الشأن الذين تتعلق حقوقهم والتزاماتهم به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجب أن يكون الشيء المرهون مما يصح بيعه، وأن يكون معينًا بالذات تعيينًا دقيقًا في عقد الرهن أو في عقد لاحق. ولا يصح رهن المال المستقبل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يترتب الرهن ضمانًا لدين ثابت في الذمة أو مآله إلى الثبوت، على أن يتحدد في عقد الرهن مبلغ الدين المضمون أو الحد الأقصى الذي ينتهي إليه هذا الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون الراهن هو نفس المدين ، ويجوز أن يكون شخصًا آخر يقدم رهنًا لمصلحة المدين. وفي كلتا الحالتين يجب أن يكون الراهن مالكًا للشيء المرهون وأهلًا للتصرف فيه. وإذا ظهر أن الراهن لا يملك التصرف في الشيء المرهون كان للدائن المرتهن الحسن النية التمسك بحقه في رهن بديل أو فسخ العقد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لا ينفصل الرهن عن الدين المضمون ، بل يكون تابعًا له في صحته وانقضائه.وإذا كان الراهن غير المدين كان له ـ إلى جانب التمسك بالدفوع الخاصة به ـ أن يتمسك بالدفوع المتعلقة بالدين، ويبقى له هذا الحق ولو تنازل عنه المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لا يكون الرهن نافذًا في حق الغير إلا إذا انتقلت حيازة الشيء المرهون إلى الدائن المرتهن أو إلى عدل يعينه المتعاقدان . ويعتبر في حكم العدل الشخص الذي كان يحوز الشيء المرهون لحساب الراهن واتفق على أن تكون حيازته لحساب الدائن المرتهن .وفي جميع الأحوال يتعين أن تبقى حيازة الشيء المرهون بيد من تسلمه حتى انقضاء الرهن .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يعتبر الدائن المرتهن أو الشخص العدل الذي عينه المتعاقدان حائزًا للشيء المرهون ، إذا وضع تحت تصرفه على النحو الذي يحمل الغير على الاعتقاد بأن الشيء أصبح في حيازته، أو إذا تسلم صكًّا يمثل الشيء المرهون ، وكان هذا الصك يعطي جائزة دون غيره حق تسلم هذا الشيء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يتم رهن الحقوق الثابتة في صكوك اسمية، وذلك في محرر مكتوب يذكر فيه رهن هذه الحقوق، ويقيد الرهن في سجلات الجهة التي أصدرت الصكوك، ويؤشر به على الصكوك ذاتها.ويتم رهن الحقوق الثابته في صكوك لحاملها في محرر مكتوب يذكر فيه رهن هذه الحقوق مع إشعار الجهة التي أصدرت هذه الصكوك بحصول الرهن، وتنتقل حيازة الحقوق بتسليم الصكوك الثابتة فيها. وإذا كان الصك مودعًا لدى الغير اعتبر تسليم إيصال الإيداع بمثابة تسليم الصك ذاته، بشرط أن يكون الصك معينًا في الإيصال تعيينًا كافيًا وأن يوافق المودع لديه على حيازته لحساب الدائن المرتهن .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يثبت الرهن بالنسبة إلى المتعاقدين وفي مواجهة الغير بجميع طرق الإثبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: إذا ترتب الرهن على مال مثلي، بقي الرهن قائمًا ولو استبدل بالشيء المرهون شيء آخر بذات القيمة والنوع. وإذا كان الشيء المرهون من الأموال غير المثلية جاز للمدين الراهن أن يسترده ويستبدل به غيره، بشرط أن يكون منصوصًا على ذلك في عقد الرهن وأن يقبل الدائن البدل، وذلك مع مراعاة الأحكام الخاصة بالإفلاس، ومع عدم الإخلال بحقوق الغير الحسن النية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: على الدائن المرتهن أو العدل الذي يحوز الشيء المرهون، أن يسلم المدين بناء على طلبه إيصالا يثبت فيه ماهية الشيء المرهون ونوعه، ومقداره، ووزنه، وغير ذلك من الصفات المميزة له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يلتزم الدائن المرتهن باتخاذ الوسائل اللازمة للمحافظة على الشيء المرهون ، وأن يبذل في ذلك عناية الشخص المعتاد، وإذا كان الشيء المرهون ورقة تجارية التزم الدائن المرتهن باتخاذ جميع الإجراءات التي يتطلبها النظام لحماية الحق الثابت في الورقة واستيفاء قيمتها عند حلول الأجل.وتسري أحكام هذه المادة على العدل الذي يكون الشيء المرهون في حيازته.ويلتزم الراهن بجميع المصروفات التي يتحملها الدائن المرتهن أو العدل في هذا الشأن على الوجه المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يجوز للدائن المرتهن أن ينتفع بالشيء المرهون دون مقابل إلا بإذن الراهن . وعليه عند طلب الراهن أن يستثمر المرهون ، وأن يستعمل جميع الحقوق المتعلقة به لحساب الراهن، وأن يقبض قيمته وأرباحه وغير ذلك من المبالغ الناتجة عنه عند استحقاقها. ويخصم الدائن المرتهن من قيمة ما قبضه من مبالغ ومن مقابل استعماله للشيء المرهون ما يكون قد أنفقه في المحافظة عليه وما تحمله من مصروفات على الوجه المعتاد. وما بقي يخصم من أصل الدين المضمون بالرهن ، ما لم ينص الاتفاق أو النظام على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكون الدائن المرتهن أو العدل مسؤولًا عن هلاك الشيء المرهون أو تلفه في حالة تفريطه أو تعديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: إذا لم يوف المدين الدين المضمون بالرهن في ميعاد استحقاقه كان للدائن المرتهن بعد انقضاء ثلاثة أيام عمل من تاريخ إعذار المدين بالوفاء أن يطلب بعريضة تقدم إلى ديوان المظالم الأمر ببيع الشيء المرهون كله أو بعضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: لا يجوز تنفيذ الأمر الصادر من ديوان المظالم ببيع الشيء المرهون إلا بعد انقضاء خمسة أيام من تاريخ تبليغه إلى المدين والكفيل العيني ـ إن وجد ـ مع بيان المكان الذي يجري فيه البيع وتاريخه وساعته. وإذا تقرر الرهن على عدة أموال كان من حق الدائن المرتهن أن يعين المال الذي يجري عليه البيع، ما لم يتفق على غير ذلك، أو كان من شأنه إلحاق ضرر بالمدين. وفي جميع الأحوال لا يجوز أن يشمل البيع إلا ما يكفي للوفاء بحق الدائن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجري البيع في الزمان والمكان اللذين يعينهما ديوان المظالم بالمزاد العلني ، إلا إذا عين الديوان طريقة أخرى للبيع. وإذا كان الشيء المرهون ورقة تجارية يتم تظهيرها تظهيرًا ناقلًا للملكية بإذن من ديوان المظالم دون التزام المظهر بالضمان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يستوفي الدائن المرتهن بطريق الامتياز دينه وما يكون قد تحمله من مصروفات على الوجه المعتاد، وذلك من الثمن الناتج من بيع المرهون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: إذا كان الشيء المرهون معرضًا للهلاك أو التلف، أو كانت حيازته تستلزم نفقات باهظة ولم يشأ الراهن تقديم شيء آخر بدله، جاز لكل من الدائن المرتهن أو الراهن أن يطلب من ديوان المظالم الترخيص ببيعه فورًا بأي طريقة يعينها الديوان، وينتقل الرهن إلى الثمن الناتج عن البيع، ويعين الديوان جهة إيداعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: إذا انخفضت القيمة السوقية للشيء المرهون بحيث أصبحت غير كافية لضمان الدين، كان للدائن المرتهن أن يطلب من الراهن تكملة الضمان بمقدار ما حدث من انخفاض، وذلك خلال ميعاد معين. وإذا رفض الراهن ذلك أو انقضى الميعاد المحدد دون أن يقوم بتكملة الضمان، كان للدائن المرتهن أن يتقدم إلى ديوان المظالم للنظر في ذلك
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الحادية العشرون
  article_text_ar: إذا كان الشيء المرهون صكًّا لم يدفع ثمنه بالكامل التزم الراهن ـ متى وجب الوفاء بالجزء غير المدفوع ـ أن يقدم إلى الدائن المرتهن النقود اللازمة للوفاء بهذا الجزء قبل ميعاد استحقاقه بيوم على الأقل، وإلا جاز للدائن المرتهن أن يطلب بيع الصك باتباع الإجراءات النظامية المقررة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يبطل كل شرط أو اتفاق يتم وقت تقرير الرهن أو بعده يعطي الدائن المرتهن ـ في حالة عدم استيفاء الدين عند حلول أجله ـ الحق في تملك الشيء المرهون أو بيعه دون مراعاة الأحكام المنصوص عليها في المواد من (الخامسة عشرة) إلى ( الثامنة عشرة) من هذا النظام.ومع ذلك يجوز لديوان المظالم بناء على طلب الدائن المرتهن أن يأذن بتملكه للشيء المرهون أو جزء منه وفاء للدين، على أن يحسب عليه بالقيمة التي يقدرها الخبراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: إذا انفك الرهن بأي سبب ثم تبين عدم صحة هذا السبب فإن الرهن يعود كما كان مع عدم الإخلال بالحقوق التي يكون الغير الحسن النية قد كسبها ما بين انقضاء الحق وعودته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: إذا بيع الشيء المرهون بيعًا جبريًا بالمزاد العلني فإن حقوق الرهن تنقضي بتسليم الدائن المرتهن ما يستحقه من الثمن الذي رسا به المزاد أو إيداعه في الجهة التي يعينها ديوان المظالم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يختص ديوان المظالم بالفصل في المنازعات الناشئة عن تطبيق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يصدر وزير التجارة والصناعة اللائحة التنفيذية لهذا النظام خلال تسعين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ، ويعمل به بعد تسعين يومًا من تاريخ نشره، ويلغى كل ما يتعارض مع أحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b6436fd-e7c0-4a51-afcc-a9a700f1ae15/1
  verified: false
