regulation:
  code: BOE208
  name_ar: نظام تداول بدائل حليب الأم
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية أينما وردت في هذا النظام المعاني الموضحة أمامها ما لم يقتض السياق خلاف ذلك: بدائل حليب الأم : أي بديل لحليب الأم يركب صناعيًّا وفقًا لمعايير دستور الأغذية الدولي المعمول به، وطبقًا للمواصفات القياسية السعودية، للوفاء بالمتطلبات الغذائية الاعتيادية حتى ستة أشهر من العمر وهو بديل مجهز لخصائص الأطفال الفيزيولوجية (الاعتيادية) ويشمل ذلك الأغذية المحضرة منزليًّا. الأغذية التكميلية : أي غذاء مناسب مكمل لحليب الأم أو مكمل لبديل حليب الأم- سواء أكان مصنعًا أم محضرًا في المنزل- عندما يصبح أحدهما غير كاف للوفاء بالمتطلبات الغذائية للرضيع، على أن يبدأ استعمالها من الشهر السادس. التداول : هو عملية أو أكثر، تشمل تصنيع المنتجات وتخزينها وترويجها وبيعها بما يدخل تحت نطاق هذا النظام. التسويق : هو النشاط الذي تتم من خلاله دراسة ترويج المنتج وتوزيعه وبيعه، وكذلك البحوث ذات العلاقة بالسوق والمستهلك. البطاقة : أي بيان مكتوب أو مطبوع أو مصور أو مرسوم أو محفور على عبوة المنتجات التي يشملها هذا النظام. العبوة : أي شكل من أشكال تعبئة المنتجات، يباع كوحدة تجزئة
    اعتيادية، بما فيها الأغلفة الخارجية. العينات : عبوة واحدة أو كميات صغيرة من المنتج تقدم بالمجان. المنتج : أي فرد، أو مؤسسة، أو شركة تعمل- مباشرة أو من خلال وكيل أو من خلال كيان تحت إشرافه أو متعاقد معه- في صناعة منتج يشمله هذا النظام. موظف التسويق : أي فرد من مهامه تسويق المنتج، أو المنتجات التي يشملها هذا النظام. المورد والموزع : أي فرد، أو شركة، أو مؤسسة يعمل- بصورة مباشرة أو غير مباشرة- في مستوى تجارة الجملة، أو التجزئة في مجال تسويق منتج يشمله هذا النظام. مؤسسات الرعاية الصحية : كل جهة حكومية، أو خاصة لها علاقة- مباشرة أو غير مباشرة- بالرعاية الصحية للأمهات والرضع والحوامل، وكل دور الحضانة أو جمعيات رعاية الأطفال، عدا الصيدليات والمحلات المرخص لها ببيع هذه المنتجات. عامل الرعاية الصحية : أي فرد من منسوبي مؤسسات الرعاية الصحية من الموظفين، والعمال المعنيين بتغذية الأم والطفل، ويشمل ذلك العاملين في الجمعيات الخيرية، والأهلية التي تمارس الرعاية الصحية. الوزير: وزير الصحة. الوزارة : وزارة الصحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى توفير التغذية المأمونة المناسبة للرضع، وذلك بحماية الرضاعة الطبيعية وتعزيزها، وضمان الاستعمال الصحيح لبدائل حليب الأم عندما تدعو الحاجة إليها، على أساس التوعية المناسبة، ومن خلال أساليب التسويق والتوزيع الملائمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يطبق هذا النظام على التداول، والممارسات المتعلقة بالمنتجات الآتية: بدائل حليب الأم، والأغذية التكميلية من منتجات الحليب، والأغذية والمشروبات الأخرى التي تعطى بالزجاجة أو غيرها من الطرق، عندما تسوق أو تعرض بأي شكل على أنها مناسبة - بعد تعديلها أو بغير تعديل - للاستعمال كبديل جزئي أو كلي لحليب الأم، وكذلك زجاجات وحلمات الإرضاع، كما تنطبق على نوعيتها وتوفرها، وعلى المعلومات الخاصة باستعمالها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يجب أن تشمل كل المواد الإعلامية والتربوية- سواء كانت خطية أو سمعية أو بصرية- مما لها علاقة بتغذية الطفل، وتصدرها وزارة الصحة أو الجهات الأخرى ذات العلاقة؛ على معلومات واضحة عن النقاط الآتية: أ - فوائد الرضاعة الطبيعية وتفوقها على أنواع الرضاعات الأخرى «الاصطناعية».ب - أهمية تغذية الأمهات وإعدادهن للرضاعة الطبيعية والمحافظة عليها لأطول فترة ممكنة.ج - التأثيرات السلبية على الرضاعة الطبيعية من جراء التغذية الجزئية بالزجاجة.د - المخاطر الصحية الناجمة عن الاستعمال غير السليم لبدائل حليب الأم والأغذية التكميلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يحظر الإعلان والترويج- بأي شكل من الأشكال- لبدائل حليب الأم وأغذية الرضع، ويشمل هذا الحظر ما يأتي: أ - استخدام مؤسسات الرعاية الصحية للترويج لهذه المنتجات، أو الإعلان عنها، أو عرضها، أو توزيعها.ب - تقديم المنتجين، والموردين، والموزعين للأمهات ولمؤسسات الرعاية الصحية - بصورة مباشرة أو غير مباشرة - أي عينة من هذه المنتجات، أو أي هدية، أو أداة، أو معدة تشجع على استعمالها.ج - تقديم المنتجين، والموردين، والموزعين أي مكافأة مالية، أو عينية للعاملين الصحيين، لترويج هذه المنتجات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: استثناء من حكم المادة الخامسة من هذا النظام، يجوز للمنتجين، والموردين، والموزعين تقديم النشرات العلمية عن أغذية الرضع - بعد اعتمادها من الوزارة - إلى المهنيين «فقط» العاملين في مجال رعاية الأمومة والطفولة، على أن تقتصر المعلومات على الحقائق العلمية، وأن يشار فيها إلى تفضيل الرضاعة الطبيعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: على وسائل الإعلام المرئية، والمسموعة، والمقروءة المساهمة بفعالية في مجال التوعية، بما يدعم أهداف هذا النظام، من خلال برامج ونشرات يقدمها مختصون في هذا المجال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'على الجهات ذات العلاقة، مثل: وزارة الصحة، والقطاعات الصحية الأخرى العامة، والخاصة، ووزارة التربية والتعليم، ووزارة الثقافة والإعلام، ووزارة الشؤون الاجتماعية، ووزارة التعليم العالي، ووزارة الشؤون الإسلامية والأوقاف والدعوة والإرشاد؛ الإسهام في نشر المعلومات الصحية المتعلقة بهذا النظام، بوسائلها المتاحة حسب اختصاصها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يحظر على مؤسسات الرعاية الصحية استخدام موظفي المنتجين لبدائل حليب الأم، ومورديها، والموزعين لها؛ واستخدام عمالهم للعمل في مجال رعاية الأمومة والطفولة. كما يحظر على موظفي هذه المؤسسات وعمالها العمل لدى هؤلاء المنتجين، والموردين، والموزعين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'مع عدم الإخلال بالمواصفات القياسية السعودية الخاصة ببدائل حليب الأم، يجب وضع بطاقة على كل عبوة- بطريقة واضحة تسهل قراءتها وفهمها، وتصعب إزالتها- تشتمل على البيانات الآتية: 1 - عبارة تفيد تميز الرضاعة الطبيعية بخط واضح، ويسبقها كلمة «ملحوظة مهمة»، وتحدد هذه العبارة الإدارة المختصة في الوزارة.2 - بيانات خاصة بالطريقة الصحيحة للتحضير، وتحذير بشأن المخاطر الصحية التي تنتج من التحضير غير السليم. ويجب ألا تحمل البطاقة أو العبوة أي صورة للأطفال، أو أي صورة أخرى أو نص يوحي بتفوقه على الرضاعة الطبيعية.3 - بيان يوضح عدم استعمال المنتج إلا للضرورة الملحة وبمشورة أحد الأطباء أو المتخصصين في مجال تغذية الرضع، على أن تشتمل على الطريقة الصحيحة للاستعمال. 4 - بيان يوضح فيه ما يأتي: أ - قائمة المكونات.ب - التركيب الغذائي.ج - ظروف التخزين المطلوبة.د - رقم التشغيلة وتاريخ الإنتاج وتاريخ انتهاء الصلاحية بطريقة مباشرة وواضحة غير رمزية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجب أن تكون بدائل حليب الأم والأغذية التكميلية مطابقة للمواصفات القياسية السعودية، وأن يكتب على العبوة السن المناسب للاستعمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: على مؤسسات الرعاية الصحية اتخاذ التدابير الملائمة لتشجيع الرضاعة الطبيعية وحمايتها، من خلال تقديم المشورة، والمعلومات والتدريب للعاملين الصحيين بهذا الخصوص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: على مؤسسات الرعاية الصحية عدم قبول أي عينة مجانية، أو مخفضة الأسعار من حليب الأطفال الرضع وأغذيتهم؛ للحد من انتشار بدائل حليب الأم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجوز لدور التربية الاجتماعية المعنية بالأيتام قبول عينات حليب الأطفال وأغذيتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجب على العاملين الصحيين المعنيين بتغذية الأم تشجيع الرضاعة الطبيعية، وبذل ما يساعد على ضمانها، وأن يكونوا على دراية كافية بما تتطلبه أعمالهم، وأن يكونوا مؤهلين لتقديم المعلومات والمشورة والتدريب لمن يحتاج إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يحظر على العاملين الصحيين، وأعضاء أسرهم قبول أي مكافأة مالية أو عينية قد تقدم لهم من المنتجين، والموردين، والموزعين لبدائل حليب الأم والأغذية التكميلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'لا يجوز لأي فرد من منسوبي مؤسسات الرعاية الصحية الاستفادة من إسهامات قد تقدم له من شركات المنتجات التي يشملها هذا النظام، أو موزعيها، مثل: حضور الدورات، أو الندوات، أو المنح الدراسية، إلا بعد موافقة خطية من الوزارة، أو الجهة التي ينتمي إليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: لا يجوز لغير العاملين الصحيين أو الصيادلة شرح كيفية إعطاء بدائل حليب الأم المحضرة، أو المصنعة منزليًّا، على أن يقتصر ذلك على الأمهات وأعضاء الأسر المحتاجة إليها، وأن تتضمن المعلومات المقدمة شرحًا واضحًا لمخاطر الاستخدام غير السليم لهذه المنتجات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'تكون بقرار من الوزير لجنة أو أكثر من الجهات الآتية: أ - ممثل لوزارة العدل يرشحه وزير العدل.ب - ممثل لوزارة الصحة يرشحه وزير الصحة.ج - ممثل لوزارة التجارة والصناعة يرشحه وزير التجارة والصناعة.ويجب أن يكون أحد الأعضاء على الأقل مستشارًا نظاميًّا، وتنظر هذه اللجنة في مخالفة أحكام هذا النظام وإصدار القرارات اللازمة بذلك، ويعتمد الوزير قرارات اللجنة، وتحدد اللائحة التنفيذية لهذا النظام مدة العضوية في هذه اللجنة، وكيفية العمل بها، وتحدد مكافآت أعضاء اللجنة بقرار من مجلس الوزراء بناء على اقتراح الوزير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها في أنظمة أخرى، يعاقب كل من تثبت مخالفته لأي حكم من أحكام هذا النظام ممن يصنع بدائل حليب الأم، أو يستوردها، أو يوزعها من الأفراد أو المؤسسات أو الشركات بعقوبة أو أكثر من العقوبات الآتية: أ - الإنذار.ب - غرامة مالية لا تقل عن خمسة آلاف ريال ولا تزيد على مائة وخمسين ألف ريال.ج - إغلاق المؤسسة لمدة لا تزيد على مائة وثمانين يومًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها في أنظمة أخرى، يعاقب كل من تثبت مخالفته لأي حكم من أحكام هذا النظام من مؤسسات الرعاية الصحية الخاصة أو أحد منسوبيها بعقوبة أو أكثر من العقوبات الآتية: أ - الإنذار.ب - غرامة مالية لا تقل عن خمسة آلاف ريال ولا تزيد على مائة ألف ريال.ج - إغلاق المؤسسة لمدة لا تزيد على ستين يومًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: إذا رأت اللجنة أن المخالفة تستوجب توقيع غرامة مالية تزيد على ما ورد في المادتين العشرين والحادية والعشرين من هذا النظام، أو إلغاء الترخيص، فعليها أن ترفع الموضوع إلى الوزير لإحالته إلى ديوان المظالم للنظر فيه، وتقرير ما يراه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجوز التظلم من قرار اللجنة أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغ القرار لمن صدر ضده قرار العقوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يجوز بحكم من ديوان المظالم نشر منطوق قرار العقوبة في واحدة أو أكثر من الصحف المحلية على نفقة المخالف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: كل من يخالف من الموظفين أحكام المواد «الخامسة، والتاسعة، والثالثة عشرة، والخامسة عشرة، والسادسة عشرة، والسابعة عشرة، والثامنة عشرة» من هذا النظام- يعاقب طبقًا لأحكام نظام تأديب الموظفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يصدر الوزير بالتنسيق مع وزير التجارة والصناعة اللائحة والقرارات التنفيذية اللازمة لهذا النظام، خلال تسعين يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يلغي هذا النظام كل ما يتعارض معه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد تسعين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8d68a28a-3ca8-4093-8f53-a9a700f28818/1
  verified: false
