regulation:
  code: BOE204
  name_ar: نظام المختبرات الخاصة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تدُل المُصطلحات الآتية أينما وردت في هذا النظام على المعاني الموضحة أمامها : أ - الوزارة المُختصة : وزارة التجارة أو وزارة الصحة أو وزارة الزراعة والمياه أو وزارة الصناعة والكهرباء أو وزارة الشؤون البلدية والقروية، أو غيرها من الوزارات التي تُحدِّدها اللائحة التنفيذية ، وذلك بحسب ما يقتضيه النص أو السياق. ب - الهيئة : الهيئة العربية السعودية للمواصفات والمقاييس. جـ - السلع : السلع التجارية المُنتجة محليًّا أو المُستوردة، سواء كانت على شكل مواد أمْ أجهِزة أمْ أدوات أمْ غيرها. د - الاختبار : كل تحليل أو مُعايرة أو فحص يهدف إلى تحديد خصائص أداء أو كفاءة أو فعالية أو مُطابقة. هـ - المُختبر : كل مكان أعد لاختبار أي سلعة من السِلع .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجوز بقرار من الوزير المُختص الاستِعانة بالمُختبرات الوطنية الخاصة المؤهلة، والمُرخصة لغرض فحص السلع المحلية والمُستوردة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يُمنح الترخيص المبدئي للمُختبرات، بعد توافُر الشروط الآتية : أ - أن يكون طالِب الترخيص سعوديًّا، سواء كان شخصًا طبيعيًّا أمْ معنويًّا.ب - التزام طالب الترخيص بتعيين مُدير فني سعودي للمُختبر.جـ - التِزام طالِب الترخيص بتوفير الجهاز اللازِم من المتخصصين المؤهلين علميًّا، والمعدات والأجهزة اللازِمة للعمل بالمُختبر بما يتفق مع حجم العمل وطبيعته، وفقًا لما تحدده الوزارة المختصة والهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تحدد اللائحة التنفيذية فئات المُختبرات والشروط اللازِم توافُرها لكُل فئة، بناءً على توصية من الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تُحدد اللائحة التنفيذية إجراءات الحصول على الترخيص، والمدة اللازمة لدراسة الطلب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يُعطى المُرخص له مبدئيًّا مُهلة لا تزيد على ستة أشهُر لإكمال ما يأتي : أ - الهيكل التنظيمي للمُختبر .ب - الجهاز الفني لتشغيل المُختبر ، وتقديم صورة مُصدقة من مُؤهلاتِهم العلمية ودوراتِهم التدريبية.جـ - الاعتِماد من الهيئة وِفقًا للائحة علامة الجودة وشهادة المُطابقة واعتِماد الخدمات (اعتِماد المُختبرات)، وفي حالة انقِضاء مُهلة الستة أشهُر دون استكمال المُتطلبات، يُعد الترخيص المبدئي مُلغى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'أ - تُصدِر الوزارة المُختصة الترخيص للمُختبر الخاص، بعد استيفاء ما يأتي : 1 - إكمال مُتطلبات المادة السادسة، مع تحديد نوعية السلع والاختبارات والحد الأعلى لتسعيرة كُل اختِبار مطلوب الترخيص له. 2 - تسديد رسم الترخيص، ومِقدارُه خمسة آلاف (5000) ريال للمُختبر الرئيس، وألفان وخمسمائة (2500) ريال لكُل فرع. ب - مُدة صلاحية الترخيص خمس سنوات، ويتم تجديده بطلب من صاحِب الشأن يُقدِّمُه إلى الوزارة المُختصة، وذلك قبل ثلاثة أشهُر على الأقل من تاريخ انتِهاء مُدته. ويكون التجديد من تاريخ انتِهاء الترخيص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تقوم الوزارة المُختصة بإصدار قرار بالسلع المُزمع فحصُها بواسِطة المُختبر الخاص، قبل ستين يومًا من إسناد المهمة إلى المُختبر الخاص، وبعد الإعلان عنها في الجريدة الرسمية ، كما يتم إبلاغ وزارة المالية والاقتِصاد الوطني (مصلحة الجمارِك) بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يجب على المُختبر التقيد بما يأتي : أ - الاقتِصار على إجراء الاختبارات للسِلع المُحددة بالترخيص لفحصِها. ب - المُحافظة على مُستوى الأداء والدقة وفقًا لأصول المِهنة في الفحص بكل أمانة وصِدق وتجرُّد، كما تجب المُحافظة على أسرار العمل وسلامة الأجهِزة. جـ - الاحتِفاظ بسجِلات نتائج الاختبارات، لمُدة لا تقِل عن خمس سنوات، للرجوع إليها عند الحاجة. د - إبراز الترخيص والهيكل التنظيمي والأقسام الفنية وتكاليف الاختبار وشهادة الاعتِماد من الهيئة في مكان ظاهِر عند مدخل المُختبر، وعدم إجراء أي تعديل عليها إلا بعد اعتِمادِه من الوزارة. هـ - الالتِزام بالسرية عند نقل العينات ونتائج الاختبار، وعدم إعطاء أي معلومات إلا للمُختصين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- يقوم الفنيون مِن الوزارة المُختصة بمهمة سحب العينات وتجهيزِها، طِبقًا لما تُحدده المواصفات القياسية المُعتمدة. 2 - أ - بالنِسبة للسِلع المُستوردة يؤخذ التعهُد اللازِم على صاحِب السِلعة بعدم التصرُّف بِها إلا بعد الفحص النهائي. ب - بالنسبة للسلع المُنتجة محليًّا، يؤخذ التعهُد اللازِم على صاحِب السِلعة بعدم التصرُّف بِها إلا بعد أن تجيزها الجِهة المُختصة. 3 - تُسلَّم العينة- بعد أن يُجهزها الفنيون- إلى مكتب المُختبر الخاص، مع خِطاب يتضمن وصفًا دقيقًا للعينة، وتحديد الاختبارات المطلوب إجراؤها، وَفقًا للمواصفات القياسية المُعتمدة. 4 - يلتزم المُختبر بإعادة النتائج مع بقية العينات، أو ما يُفيد استِهلاكِها أثناء إجراء الاختبار إلى الجهة الوارِدةُ مِنها، خِلال خمسة عشر يومًا من تاريخ سحب العينة، على أن يتم إبلاغ الوزارة المُختصة بنتيجة الفحص خِلال مُدة لا تتجاوز خمسة وعشرين يومًا، من تاريخ سحب العينات. 5 - يتحمل صاحِب السلعة المطلوب إجراء الاختبار لها التكاليف اللازِمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد تقضي بِها الأنظِمة الأُخرى، يُعاقب بواحدة أو أكثر مِن العقوبات الآتية، كُل من يُخالِف حُكمًا من أحكام هذا النظام : 1 - الإنذار . 2 - غرامة مالية لا تقِل عن خمسة آلاف ريال، ولا تزيد على عشرين ألف ريال. 3 - وقف الترخيص لمُدة لا تقِل عن ثلاثين يومًا، ولا تزيد على ستين يومًا. 4 - سحب الترخيص في حالة العود.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تُطبق غرامة التأخير وفق ما يأتي : 1 - ألف ريال عن كُل سنة تأخير عند تجديد الترخيص، ويكون التجديد من تاريخ انتِهاء الترخيص.2 - غرامة مساوية لتكاليف الاختبار محل المُخالفة، في حالة تأخر المُختبر عن إعطاء النتيجة خِلال المُدة المُحدَّدة في الفقرة (4) من المادة العاشرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'يتولى مُراقبة المُختبرات والتفتيش عليها وضبط المُخالفات لأحكام هذا النِظام واللوائح والقرارات الصادِرة لتنفيذِه - موظفون مُختصون. وتُحدد اللائحة التنفيذية الآتي : 1 - الجهة أو الجهات المسئولة عن تسميتِهم. 2 - صلاحيات الموظفين المُخولين بدخول المُختبرات ، وتفتيشِها، وضبط المُخالفات، والتحفُظ على العينات والمُستندات والأجهِزة محل المُخالفة، وإجراء التحقيقات اللازِمة، ودواعي الاستِعانة بالجِهات الأمنية. 3 - الجهة التي لها حق الإذن بدخول المُختبرات لأغراض التفتيش. على أن يلتزِم موظفو المُراقبة والتفتيش والضبط بالسرية والسلوك الحسِن، وأن يقدِّموا لصاحِب الشأن ما يُثبت هويتهم وصفتهم الرسمية والغرض من الزيارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تُحدِّد اللائحة التنفيذية إجراءات التحقيق والادعاء، والجهة التي تتولى ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يختص ديوان المظالِم بالفصل في دعوى المُخالفة لهذا النِظام، وتوقيع العقوبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يُصدِر وزير التِجارة بالاتفاق مع كُل مِن: وزارات الداخلية، الصِحة، الزِراعة والمياه، الصِناعة والكهرباء، والشؤون البلدية والقروية ، اللائحة التنفيذية لهذا النِظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يُنشر هذا النظام في الجريدة الرسمية ، ويُعمل بِه بعد مائة وثمانين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4c55f487-89fa-4d0f-80f1-a9a700f2835e/1
  verified: false
