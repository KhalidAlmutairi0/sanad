regulation:
  code: BOE432
  name_ar: تنظيم الجمعية السعودية للمرشدين السياحيين
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية أينما وردت في هذا التنظيم، المعنى المقابل لكل منها: الهيئة: الهيئة العامة للسياحة والآثار.الجمعية: الجمعية السعودية للمرشدين السياحيين.الجمعية العمومية: الجمعية العمومية للجمعية.المجلس: مجلس إدارة الجمعية.الرئيس: رئيس المجلس.المدير: المدير التنفيذي للجمعية.الأعضاء الأساسيون: أعضاء الجمعية من المرشدين السياحيين. الجهاز: الجهاز التنفيذي للجمعية.التنظيم: تنظيم الجمعية.النظام الداخلي: النظام الداخلي الخاص بالجمعية.المرشد السياحي: كل شخص يمارس أعمال إرشاد ومرافقة السياح في أماكن الجذب السياحي في المملكة، حاصل على ترخيص من الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنشأ بمقتضى هذا التنظيم جمعية تسمى الجمعية السعودية للمرشدين السياحيين، وهي جمعية مهنية ذات شخصية اعتبارية وذمة مالية مستقلة، تعمل تحت إشراف الهيئة، ومقرها الرئيس مدينة الرياض، ولها - بقرار من المجلس - إنشاء فروع أو مكاتب في مدن أخرى داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الجمعية إلى تطوير نشاط المرشدين السياحيين ، ومن أغراضها ما يلي: 1 - الإسهام في تهيئة البيئة الملائمة لتنمية وتطوير خدمات الإرشاد السياحي في المملكة. 2 - العمل على تهيئة المناخ لتمكين أعضاء الجمعية من التطوير، وذلك من خلال تبادل الدعم والمعلومات فيما بينهم وأصحاب العلاقة.3 - التعاون والتنسيق مع الهيئة والمؤسسات والجمعيات السياحية الأخرى المتخصصة أو المرتبطة بأي من المجالات المتعلقة بالإرشاد السياحي. 4 - تحسين وتعزيز كفاية المرشدين السياحيين، من خلال وضع وتطوير معايير ثابتة لضمان جودة الخدمات ونشر الوعي بهذه المعايير في المجتمع دون إخلال بالقيم الإسلامية والتراث الوطني في المملكة.5 - المشاركة في تحديد مفاهيم الأعراف والمصطلحات السياحية في المجالات المختلفة بما في ذلك ما يتعلق منها بقواعد ومعايير ممارسة النشاط.6 - وضع دليل بإجراءات تطبيق معايير الجودة، بما يضمن حماية كل من المرشد السياحي ومتلقي خدمة الإرشاد، وجمع المعلومات والإحصاءات ذات الشأن وتصنيفها، وتزويد الجهات المختصة بها.7 - رعاية مصالح الجمعية وأعضائها والمحافظة على حقوقها وأهدافها.8 - تقديم الخدمات الاجتماعية
    والثقافية لأعضاء الجمعية.9 - تهيئة مناخ للحوار وتبادل الرأي داخل الجمعية وبينها وبين كل من القطاعين الخاص والحكومي - ولا سيما الهيئة - والمجتمع والجمعيات المهنية المحلية الأخرى.10 - المساعدة في جذب استثمارات القطاع الخاص في مجالات أنشطتها.11 - الارتقاء بالمستوى المهني لأعضاء الجمعية ونشر الوعي المهني بينهم، مع المحافظة التامة على تقاليد النشاط وآدابه.12 - إعداد الدراسات والمقترحات المتعلقة بمشروعات الأنظمة واللوائح ذات الصلة وتقديمها إلى الجهات المعنية.13 - التنسيق مع الجهات المعنية من أجل إعداد الدراسات والأبحاث وعقد وتنظيم المؤتمرات والاجتماعات والندوات والمعارض السياحية ذات العلاقة بنشاطها داخل وخارج المملكة والمشاركة فيها بعد موافقة الجهات المختصة.14 - الإسهام مع الهيئة والجهات المعنية الأخرى في تدريب ودعم الكوادر العاملة في حقل الإرشاد السياحي، والمشاركة في وضع خطة لتحفيز السعوديين لقبول العمل بهذا القطاع وتذليل العوائق حيال ذلك.15 - إصدار المجلات والنشرات الدورية المهنية بعد موافقة الجهات الرسمية المختصة.16 - عقد دورات تدريبية وتعليمية معتمدة وإصدار الشهادات لها بعد التنسيق مع
    الجهات المعنية.17 - العمل على حل الخلافات التي قد تقع بين أعضائها، أو بين أي منهم والغير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: عضوية الجمعية متاحة لكل مرشد سياحي، يتقدم بطلبها، ويمكن للمجلس اقتراح عضوية أطراف أخرى ذات علاقة بأغراض الجمعية من غير الممارسين للنشاط، ويبين النظام الداخلي أنواع العضوية وشروطها وأحكامها، وواجبات العضو وحقوقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تتكون الجمعية العمومية من أعضاء الجمعية الذين أوفوا لها بالتزاماتهم، وفقاً لما يحدده النظام الداخلي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- تعقد الجمعية العمومية برئاسة الرئيس - أو من ينيبه - اجتماعاً مرة كل عام في مدة لا تتجاوز (3) ثلاثة أشهر من تاريخ انتهاء السنة المالية للجمعية، ولها عقد اجتماعات استثنائية عند الحاجة بدعوة من المجلس أو بناءً على طلب (5%) خمسة في المائة من الأعضاء، وتعقد الاجتماعات في مقر الجمعية الرئيس، ويجوز بناءً على قرار من المجلس عقدها في مكان آخر.2 - يكون اجتماع الجمعية العمومية صحيحاً بحضور أغلبية الأعضاء، فإن لم يكتمل النصاب اللازم لذلك توجه دعوة إلى اجتماع ثانٍ يعقد خلال الثلاثين يوماً التالية للاجتماع السابق، ويكون اجتماع الجمعية العمومية في هذه الحالة صحيحاً مهما كان عدد الحاضرين.3 - تصدر قرارات الجمعية العمومية بأغلبية أصوات الحاضرين، وفي حالة التساوي يرجح الجانب الذي صوت معه رئيس الجلسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تختص الجمعية العمومية بالنظر في الأمور الآتية: 1 - إقرار خطة العمل التي يقدمها المجلس واعتماد التقرير السنوي.2 - اقتراح تعديل تنظيم الجمعية.3 - إقرار النظام الداخلي.4 - إقرار اللوائح الداخلية للجمعية.5 - اعتماد الميزانية السنوية للجمعية.6 - تعيين مراجع حسابات للجمعية.7 - انتخاب أعضاء المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1 - يتكون المجلس من عشرة من الأعضاء الأساسيين ، تنتخبهم الجمعية العمومية، وتحدد اللوائح الداخلية للجمعية الإجراءات اللازمة لذلك وما يشترط في المرشحين. ويتولى المجلس المنتخب اختيار الرئيس ونائبه من بين أعضائه بالاقتراع السري .2 - تكون مدة العضوية في المجلس ثلاث سنوات قابلة للتجديد.3 - يعقد المجلس جلسة على الأقل كل ثلاثة أشهر، وكذلك عندما يطلب ذلك الرئيس أو ثلاثة من أعضائه.4 - تعقد الجلسات بحضور أغلبية الأعضاء، على أن يكون من بينهم الرئيس أو نائبه.5 - تصدر قرارات المجلس بأغلبية أصوات الحاضرين، فإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الجلسة.6 - يحضر المدير الجلسة دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى المجلس الإشراف على أعمال الجمعية بما يحقق الأهداف التي أنشئت من أجلها والمحددة في هذا التنظيم، وفي حدود ما تنص عليه الأنظمة واللوائح المرعية في المملكة، وله على الأخص ما يأتي: 1 - دراسة المقترحات الخاصة بتطوير العمل بالجمعية.2 - إعداد التقرير السنوي عن نشاط الجمعية، واقتراح خطة عمل لها.3 - الإشراف على تنفيذ ومتابعة قرارات الجمعية العمومية والتعليمات الواردة من جهات الاختصاص.4 - الموافقة على عقد الندوات والمؤتمرات التي تنظمها الجمعية فيما يتعلق بالإرشاد السياحي والموضوعات المتعلقة به.5 - اقتراح النظام الداخلي ورفعه إلى الجمعية العمومية.6 - دعوة الجمعية العمومية للانعقاد وإعداد جدول أعمالها.7 - قبول الهبات والتبرعات والوصايا والأوقاف.8 - إقرار سياسة استثمار أموال الجمعية والإشراف على إدارة ممتلكاتها وأموالها، وتحديد البنوك التي تودع فيها أموالها.9 - تحديد المقابل المالي للاشتراك في عضوية الجمعية.10 - الإشراف على استيفاء ما للجمعية من حقوق وتأدية ما عليها من التزامات.11 - إعداد اللوائح الإدارية والمالية للجمعية وغيرها من اللوائح الداخلية.12 - إعداد الميزانية السنوية
    للجمعية.13 - تشكيل اللجان المتخصصة الدائمة والمؤقتة لمساعدة الجمعية على تحقيق أهدافها، وتعيين أعضائها من بين أعضاء المجلس أو من غيرهم، واعتماد إجراءات عملها، وتحديد واجبات أعضائها ومكافآتهم.14- تعيين المدير وتحديد مسؤولياته وحقوقه.وللمجلس تفويض بعض اختصاصاته للرئيس أو من ينيبه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للجمعية جهاز من المدير وعدد كاف من الموظفين، يتولى القيام بالمهمات التنفيذية (الفنية والمالية والإدارية) ويشرف المدير على الجهاز، ويحدد المجلس صلاحياته ومسؤولياته وحقوقه وواجباته والشروط التي يجب توافرها فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون إيرادات الجمعية مما يلي: 1 - اشتراكات الأعضاء.2 - إيرادات الأنشطة ذات العائد المالي.3 - التبرعات والهبات والوصايا والأوقاف.4 - ما قد يتقرر للجمعية من إعانات حكومية.5 - عائدات استثمار ممتلكات الجمعية الثابتة والمنقولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعين الجمعية العمومية مراجع حسابات (أو أكثر) من بين المحاسبين القانونيين المصرح لهم بالعمل في المملكة، وتحدد مكافآته ومدة عمله، ويجوز لها إعادة تعيينه، ويجوز لها كذلك - في أي وقت - تغييره مع عدم الإخلال بحقه في التعويض إذا وقع التغيير في وقت غير لائق أو لسبب غير مقبول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تحدد السنة المالية للجمعية باثني عشر شهراً ميلادياً تبدأ ببداية السنة الميلادية وتنتهي بنهايتها، واستثناءً من ذلك تبدأ السنة المالية الأولى للجمعية من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية لإنشاء الجمعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- يجوز بقرار من مجلس الوزراء حل الجمعية بناءً على مقتضيات المصلحة العامة، أو بناءً على توصية من الجمعية العمومية تصدر بأغلبية ثلثي أعضائها.2 - تؤول جميع ممتلكات الجمعية إذا حلت إلى واحدة أو أكثر من الجمعيات أو الهيئات المهنية غير الهادفة إلى الربح التي لها أغراض مشابهة لأغراض هذه الجمعية وتقع في منطقة خدماتها ومسجلة، وفقاً لما تقضي به الأنظمة المرعية في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ويعمل به بعد ثلاثين يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fc7adddb-03cc-49b8-bbbb-a9a700f27a38/1
  verified: false
