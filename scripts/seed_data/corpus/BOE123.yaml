regulation:
  code: BOE123
  name_ar: نظام إجراءات التراخيص البلدية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية المعاني المبينة أمام كل منها، ما لم يقتضِ السياق خلاف ذلك: النظام: نظام إجراءات التراخيص البلدية.اللائحة: اللائحة التنفيذية للنظام.الوزارة: وزارة الشؤون البلدية والقروية أو الأمانات أو البلديات بحسب الأحوال.الوزير: وزير الشؤون البلدية والقروية.الجهة الحكومية المختصة: كل وزارة أو هيئة أو مؤسسة عامة، وما في حكمها، مختصة - بموجب أنظمتها - بالإشراف على نشاط معين تتطلب ممارسته إصدار ترخيص له من تلك الجهة.الترخيص البلدي: موافقة مكتوبة من الوزارة لشخص ذي صفة طبيعية أو معنوية لبناء أو فتح محل لأي نشاط على موقع معين، وفق الشروط المحددة في نظام البلديات والقرى واللوائح المتعلقة به.ترخيص الجهة الحكومية المختصة: موافقة مكتوبة لشخص ذي صفة طبيعية أو معنوية لممارسة نشاطٍ ما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: لا تجوز ممارسة أي نشاط إلا بعد الحصول على ترخيصٍ بلدي وترخيصٍ من الجهة الحكومية المختصة، وذلك بحسب حال كل نشاط، ووفقاً للأنظمة واللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تختص الوزارة بإصدار التراخيص البلدية للأنشطة بجميع أنواعها، وتعديلها، وتجديدها، وإلغائها، وإيقافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تتولى الجهة الحكومية المختصة وضع اشتراطات ممارسة النشاط الداخل تحت إشرافها ومتطلباته وإصدار تراخيص ممارسته، وتعديلها، وتجديدها، وإلغاءها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: أ - تصدر الوزارة الترخيص البلدي بعد اكتمال جميع إجراءاته خلال مدة لا تتجاوز عشرة أيام عمل من تاريخ تقديم الطلب، فإن رفض الطلب فيجب أن يكون الرفض مكتوباً ومسبباً، وتكون مخاطبة مقدم الطلب على عنوانه المحدد فيه.ب - يجب على الوزارة - إذا كان الترخيص البلدي يوجب على طالبه تنفيذ التزامات معينة - إصدار موافقة مبدئية للترخيص البلدي متى كانت الشروط المقررة نظاماً متوافرة، ولا يجوز العدول عن هذه الموافقة المبدئية إلا إذا لم ينفذ مقدم الطلب تلك الالتزامات. وتبين اللائحة كيفية الحصول على هذه الموافقة ومدتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تستوفي الوزارة الرسوم والغرامات البلدية، وتستوفي الجهة الحكومية المختصة الرسوم والغرامات الخاصة بها وفق الأنظمة واللوائح المنظمة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: أ - تحدد اللائحة صلاحية من يملك إصدار الترخيص البلدي أو إيقافه أو إلغاءه أو عدم تجديده أو تعديله وفقاً لما تقضي به الأنظمة واللوائح والتعليمات ذات الصلة. ب - تحدد الجهة الحكومية المختصة في لوائحها صلاحية من يملك إصدار ترخيص ممارسة النشاط الداخل تحت إشرافها، أو إيقافه، أو إلغاءه، أو عدم تجديده، أو تعديله، وفقاً لما تقضي به الأنظمة واللوائح والتعليمات ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: للوزارة - وفقاً للأنظمة المتبعة - الاستعانة بالمكاتب الهندسية والشركات والمؤسسات الخاصة؛ لتسهيل إجراءات إصدار الترخيص البلدي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تحدد اللائحة مدة الترخيص البلدي وفقاً لطبيعة النشاط، ويجدد الترخيص لمدة أو لمدد مماثلة بعد التأكد من استيفاء شروطه ومتطلباته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: ينشأ في كل أمانة، وبلدية فئة (أ) مكتب تنسيق، لتسهيل إجراءات إصدار التراخيص البلدية وتراخيص الجهة الحكومية المختصة، وعلى كل جهة حكومية مختصة تكليف من يمثلها في المكتب، بحسب نوع النشاط المراد الترخيص بممارسته، وتنشر تقارير إحصائية عن أعمال المكتب، بما في ذلك أعداد التراخيص الصادرة من كل مكتب ومدة الحصول عليها. وتحدد اللائحة الأحكام اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: '1- مع مراعاة ما ورد في المادة (الثامنة) من هذا النظام، تشترك الجهة الحكومية المختصة مع الوزارة لتحقيق الآتي: أ - توحيد شروط الترخيص البلدي للنشاط الخاضع لإشراف تلك الجهة ومتطلباته.ب - توحيد مدد الترخيص البلدي لتكون مماثلة لمدة ترخيص النشاط الذي تمنحه الجهة الحكومية المختصة.ج - تحديد علاقة كل جهة حكومية مختصة بالوزارة وبيان دورهما، مع مراعاة أن يكون تقديم طلب الترخيص إلى الجهة المشرفة على النشاط أولاً.د - معالجة الوزارة لحالات إيقاف الترخيص البلدي للنشاط الخاضع لإشراف تلك الجهة، أو إلغائه أو عدم تجديده أو تعديله.2 - يضمّن ما ورد في الفقرة (1) من هذه المادة في اللائحة، فإن تباينت وجهات النظر بين تلك الجهات فيرفع الأمر إلى رئيس مجلس الوزراء للنظر فيه.3 - على الوزارة ألا تمنح أيًّا من الأنشطة ترخيصاً بلديًّا إلا بعد الحصول على موافقة الدفاع المدني، على أن يتم البت في طلب الموافقة خلال مدة لا تتجاوز عشرة أيام عمل من تاريخ تقديم الطلب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تصدر الجهة الحكومية المختصة موافقة مبدئية لطالب الترخيص إذا توافرت الشروط المقررة نظاماً، وذلك خلال مدة لا تتجاوز عشرة أيام عمل من تاريخ تقديم الطلب، على أن يكون إصدار الترخيص النهائي بعد الحصول على ترخيص بلدي ساري المفعول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: '1 - تكوّن بقرار من الوزير لجان في الأمانات والبلديات - بحسب الحال - للنظر في الآتي: أ - التظلم من عدم منح الترخيص البلدي، أو إيقافه، أو عدم تجديده، أو تعديله، أو إلغائه.ب - التظلم من تطبيق الغرامات والجزاءات البلدية المقررة نظاماً.ج - الشكاوى الناشئة من أضرار الانتفاع بالتراخيص البلدية. 2 - تحدد اللائحة عدد أعضاء كل لجنة، وصفاتهم، ومدة العضوية، والأعضاء الاحتياطيين، وكيفية إصدار القرارات، والمدد اللازمة للبت في هذه التظلمات والشكاوى، وإجراءات عمل اللجان، ومكافآت أعضائها.3 - يجوز التظلم من قرارات اللجان المشار إليها في الفقرة (1) أعلاه أمام المحكمة الإدارية خلال (ستين) يوماً من تاريخ العلم بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يصدر الوزير اللائحة خلال تسعين يوماً من تاريخ نشر النظام، وتحدد فيها شروط التراخيص البلدية وضوابطها ونماذجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يلغي هذا النظام كل ما يتعارض معه، ويعمل به بعد تسعين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1dd4c3d4-f4e9-4c15-852f-a9a700f21cab/1
  verified: false
