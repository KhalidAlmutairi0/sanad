regulation:
  code: BOE156
  name_ar: نظام صيد واستثمار وحماية الثروات المائية الحية في المياه الاقليمية للمملكة العربية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تتولى وزارة الزِراعة والمياه الإشراف على جميع أعمال الصيد والغوص وتنظيمِها، واتِخاذ كُل ما مِن شأنه تنمية وتطوير واستثمار وحماية الثروات المائية الحيِّة في المياه الإقليمية للمملكة، وتشجيع العمل في قِطاعِها وتطوير وسائل وطُرق الصيد بالتنسيق مع الهيئة الوطنية لحماية الحياة الفطرية وإنمائها ولها على سبيل المثال: 1 - تحديد مناطِق الصيد في المياه الإقليمية للمملكة.2 - تحديد المواقع الساحلية البحريِّة الصالِحة لإقامة مشاريع تربية الأسماك.3 - تحديد أنواع وأصناف الأحياء المائية المحظور صيدُها نهائياً، أو خِلال فترات مُحدَّدة من السنة.4 - تحديد وسائل ومُعِدات وطُرق الصيد المَّمنوع استِعمالُها.5 - مُساعدة الصيادين على تطوير مُعداتِهم وتشجيعُهم على تكوين جمعيات تعاونية فيما بينهُم.6 - إبرام الاتِفاقيات والعقود مع المؤسسات العلمية والتِجارية المُتخصِّصة في مجال تنمية الثروة المائية الحيِّة واستخراجِها، وذلك طِبقاً للأنظِمة المعمول بِها.7 - إجراء البحوث التطبيقية والإحصائية، وغير ذلك من الوسائل المادية والإرشادية المؤدية إلى تطوير الاستِفادة من الثروة المائية الحية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: لا تجوز مُّمارسة الصيد أو الغوص في المياه الإقليمية للمملكة إلا بعد الحصول على ترخيص بذلك من وزارة الزِراعة والمياه ، وِفقاً للشروط التي يتم الاتِفاق عليها مع كُلٍ مِن وزارة الداخلية والهيئة الوطنية لحماية الحياة الفطرية وإنمائها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تُشكل في كُل منطِقة صيد لجنة محلية مِن: مندوب عن الإمارة، ومندوب عن سِلاح الحدود وأحد المُختصين في مهنة الصيد، يختارُه وزير الزراعة والمياه ومُدير الزِراعة والمياه في المنطقة، وتكون له رئاسة اللجنة.ويجوز للجنة الاستِعانة بخبرة من تراه من المُختصين في أي من النشاطات الوارِدة في هذا النِظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تختص اللجنة المُشار إليها في المادة السابِقة بالنظر فيما ينشأ من خِلاف أو مُشكلات بين الصيادين في نِطاق مُّمارسة مِهنة الصيد أو الغوص، وتكون قراراتِها نافِذة بعد اعتِمادِها من أمير البلدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لا يجوز لسُفن الصيد أو الغوص الأجنبية استِخراج الثروات المائية الحية من المياه الإقليمية للمملكة إلا بترخيص مِن وزير الزِراعة والمياه بعد موافقة رئيس مجلِس الوزراء ، ويُحدَّد بالترخيص أنواع الثروات المائية الحية المسموح باستِخراجِها، والأماكن التي يجوز فيها ذلك. فإذا كانت السُفن الأجنبية المُشار إليها تعمل لحِساب شركات أو مؤسسات وطنية تُمارِس مِهنة الصيد فيُكتفى بالترخيص لها مِن وزير الزِراعة والمياه فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لا يجوز قطع الأشجار أو الأعشاب النامية على سواحِل المملكة أو في الجُزر التابِعة لها، أو نقل الأترِبة أو بيض الطيور والسلاحف، أو أية مواد عضوية مِنها، أو القيام بردميات ساحلية إلا بعد موافقة وزارة الزِراعة والمياه على ذلك بالتنسيق مع الهيئة الوطنية لحماية الحياة الفطرية وإنمائها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يتولى سِلاح الحدود بالتعاون مع وزارة الزِراعة والمياه ، مُراقبة الصيادين ووسائل ومُعِدات وطُرق الصيد والغوص، وتطبيق اللوائح والتعليمات التي تصدُر مِن وزارة الداخلية ووزارة الزِراعة والمياه بهذا الخصوص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تتولى وزارة الزِراعة والمياه ضبط مُخالفات أحكام هذا النِظام أو لوائحه أو القرارات اللازِمة لتنفيذِه وإثباتِها والتحقيق فيها، وِفق الإجراءات التي يصدُر بتحديدِها قرار من وزير الداخلية ووزير الزِراعة والمياه معاً بعد التشاور مع الهيئة الوطنية لحماية الحياة الفطرية وإنمائها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: مع عدم الإخلال بالعقوبات الأشد المنصوص عليها في الأنظِمة واللوائح والقرارات الأُخرى، يُعاقب كُل من يُخالِف أي حُكم من أحكام هذا النِظام أو لوائحه بالسِّجن مُدة لا تزيد على ستة أشهُر أو بغرامة لا تزيد على عشرة آلاف ريال، أو بالعقوبتين معاً، وذلك عن كُل مُخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يتم توقيع عقوبة الغرامة المنصوص عليها في المادة السابِقة بقرار من وزير الزِراعة والمياه ، فإذا رأى أن المُخالفة من الجسامة بحيث لا يُكتفى فيها بتوقيع الغرامة فعليه أن يُحيلها إلى ديوان المظالِم للفصل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يُصدِر وزير الزِراعة والمياه اللوائح اللازِمة لتنظيم أو تنفيذ أي أمر من الأمور الوارِدة بهذا النِظام، وتُعتبر هذه اللوائح نافِذة المفعول بعد مُضي ثلاثين يوماً من تاريخ نشرها بالجريدة الرسمية. كما يجوز له إصدار القرارات اللازِمة لتنفيذ أحكام هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يُنفذ هذا النِظام بعد مُضي ثلاثين يوماً من تاريخ نشره بالجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يُلغِي هذا النِظام من تاريخ نفاذه نِظام صيد الأسماك والمحار في سواحِل البحر الأحمر، المنشور في جريدة أُم القُرى عام 1351هـ، كما يُلغي جميع الأحكام والقرارات والتعليمات التي تتعارض معه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e74c8b2e-f6e6-4eaf-ad6d-a9a700f24e39/1
  verified: false
