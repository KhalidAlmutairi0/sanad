regulation:
  code: BOE042
  name_ar: نظام استخدام وحماية شارة واسم الهلال الأحمر وما في حكمهما
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: النظام: نظام استخدام وحماية شارة واسم الهلال الأحمر وما في حكمهما. الشارة: شارة الهلال الأحمر وما في حكمها من الشارات المعترف بها بناء على اتفاقيات دولية تكون المملكة طرفًا فيها. الوزارة: وزارة الدفاع. الهيئة: هيئة الهلال الأحمر السعودي. التنظيم: تنظيم الهيئة. شريط الذراع: علامة حماية مميزة تتألف من شريط أبيض مرسومة عليه الشارة، يثبت على الذراع الأيسر للشخص المحمي. بطاقة تحقيق الهوية: وثيقة تصدر وفقًا للنموذج المعتمد في اتفاقية جنيف الأولى لعام (1949م)، وتتضمن البيانات الأساسية لشخص حاملها وصفته. الشخص: الشخص ذو الصفة الطبيعية أو الاعتبارية. مكونات الحركة الدولية: اللجنة الدولية للصليب الأحمر، والاتحاد الدولي لجمعيات الصليب الأحمر والهلال الأحمر، والهيئات والجمعيات الوطنية للصليب الأحمر والهلال الأحمر الأعضاء في الاتحاد الدولي لجمعيات الصليب الأحمر والهلال الأحمر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف النظام إلى تنظيم استخدام وحماية الشارة واسم الهلال الأحمر وما في حكمهما، وقت السلم ووقت النزاع المسلح، ومنع إساءة استخدامهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تكون شارة الهلال الأحمر عبارة عن هلال أحمر على قاعدة بيضاء، ويكون طرفا الهلال متجهين إلى يمين الناظر إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: للهيئة استخدام الشارة واسم الهلال الأحمر وما في حكمهما؛ للدلالة والحماية وفقًا لتنظيمها، ولا يجوز لأي شخص استخدام أي منهما دون الحصول على ترخيص بذلك من الهيئة وفق ضوابط تحددها في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لمكونات الحركة الدولية استخدام شاراتها في المملكة، وذلك بعد استكمال الإجراءات النظامية اللازمة لوجودها وعملها في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تستخدم الشارة في وقت النزاع المسلح لغرض حماية كل من يعمل في مجالات الخدمات الطبية والوحدات الطبية ووسائل النقل الطبي والمنشآت الطبية العسكرية أو المدنية وممتلكاتهما، وتكون مقاييس الشارة عندئذ كبيرة الحجم. تستخدم الشارة في وقت السلم لغرض الدلالة على أن لشخص معين أو لممتلكات محددة علاقة بأحد مكونات الحركة الدولية، وتكون مقاييس الشارة عندئذ صغيرة الحجم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للخدمات الطبية والوحدات الطبية ووسائل النقل الطبي والمنشآت الطبية التابعة للقوات العسكرية ومنسوبيها وممتلكاتها، وكذلك المرشدون التابعون لها -في وقت السلم ووقت النزاع المسلح- استخدام الشارة تحت إشراف الوزارة بالتنسيق مع الجهات الحكومية ذات العلاقة، وفقاً للمادة (السادسة) من النظام، وتمنح الوزارة -في وقت النزاع المسلح- منسوبي تلك الخدمات والوحدات ووسائل النقل الطبية والمنشآت الطبية العسكرية، وأولئك المرشدين، شريط الذراع وبطاقة تحقيق الهوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: مع مراعاة ما ورد في المادة (الرابعة) من النظام، يكون للمنشآت الطبية المدنية ومنسوبيها وممتلكاتها استخدام الشارة -بعد موافقة الوزارة- في وقت النزاع المسلح، ووفقًا للفقرة (1) من المادة (السادسة) من النظام، وتمنح الوزارة منسوبي المنشآت الطبية المدنية شريط الذراع وبطاقة تحقيق الهوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للهيئة -بعد التنسيق مع الوزارة- توجيه منسوبي الخدمات الطبية والوحدات الطبية ووسائل النقل الطبي التابعين لها؛ لتقديم المساعدة والعون للخدمات الطبية للقوات العسكرية في وقت النزاع المسلح، مع الالتزام بحمل شريط الذراع وبطاقة تحقيق الهوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها في نظام آخر، يعاقب بالسجن لمدة لا تزيد على (سنة) وبغرامة لا تزيد على (مليون) ريال أو بإحدى هاتين العقوبتين، كل من قام بأي مما يأتي: استخدام الشارة أو استخدام اسم الهلال الأحمر وما في حكمهما، أو كليهما، دون الحصول على ترخيص من الهيئة أو موافقة من الوزارة بحسب الأحوال. استخدام الشارة أو اسم الهلال الأحمر وما في حكمهما، أو كليهما، بما لا يتفق مع أحكام الترخيص؛ دون وجه مشروع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يُعاقب بالسجن لمدة لا تزيد على (خمس عشرة) سنة كل من استخدم الشارة بنية الغدر أثناء النزاعات المسلحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تتولى النيابة العامة -وفقًا لنظامها- التحقيق، والادعاء أمام المحكمة المختصة في الجرائم المشار إليها في المادتين (العاشرة)، و(الحادية عشرة) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تتولى المحكمة المختصة النظر في الجرائم المشار إليها في المادتين (العاشرة) و(الحادية عشرة) من النظام، ولها القيام بالآتي: إيقاع العقوبات المنصوص عليها في المادتين (العاشرة)، و(الحادية عشرة) من النظام. الحكم بمصادرة المضبوطات محل المخالفة، وإزالة الشارات المستخدمة على نفقة المخالف. فرض غرامة عن كل يوم يستمر فيه المخالف في مخالفته بعد تبليغه بالحكم الصادر بالعقوبة على ألا يتجاوز مجموع الغرامات (10%) من مبلغ الغرامة المنصوص عليه في المادة (العاشرة) من النظام. ويبدأ احتساب هذه الغرامة من التاريخ الذي يحدده الحكم. مضاعفة الغرامة -الواردة في المادة (العاشرة) من النظام- الموقعة على المخالف حال العود. ويعد عائدًا كل من عاد إلى ارتكاب المخالفة خلال (ثلاث) سنوات من تاريخ اكتساب الحكم القطعية. تضمين الحكم الصادر بالعقوبة النص على نشر ملخصه على نفقة المخالف في صحيفة محلية تصدر في مكان إقامته، فإن لم يكن في مكان إقامته صحيفة ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة المرتكبة وجسامتها وتأثيرها، على أن يكون نشره بعد اكتساب الحكم القطعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا يخل تطبيق أحكام النظام بالتزامات المملكة في الاتفاقيات الدولية ذات الصلة التي تكون طرفًا فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعمل بالنظام بعد مضي (تسعين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/469689de-5af0-4c28-b96c-b05a008bdda3/1
  verified: false
