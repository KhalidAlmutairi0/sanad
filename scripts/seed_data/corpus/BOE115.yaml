articles:
- article_ref: المادة الأولى
  article_text_ar: ينشأ صندوق يسمى (صندوق التنمية العقارية) يختص بإعطاء قروض للأفراد والمؤسسات لإقامة مشروعات عقارية للاستعمال الخاص أو الاستعمال التجاري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76ad693d-d427-4de8-8980-a9a700f210be/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يدار الصندوق بواسطة لجنة، يصدر بتحديد عدد أعضائها وتسميتهم وتسمية رئيسها أمر من رئيس مجلس الوزراء بناء على اقتراح من وزير المالية والاقتصاد الوطني ، وينضم إلى عضويتها ممثلون عن الهيئة المركزية للتخطيط ووزارة الداخلية ( شئون البلديات ) ومصلحة الأشغال العامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76ad693d-d427-4de8-8980-a9a700f210be/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يمارس الصندوق أعماله على الوجه التالي: 1 - تقديم قروض متوسطة أو طويلة الأجل : أ - للأفراد السعوديين ذوي الدخل المتوسط أو المحدود، الذين يحتاجون للمساعدة في توفير مساكن خاصة بهم لتغطية تكاليف البناء، على أن لا تتجاوز قيمة القرض سبعين بالمائة من تكلفة البناء.ب - للأشخاص السعوديين الطبيعيين أو المعنويين لبناء مجمعات سكنية ذات وحدات سكنية متعددة للاستعمال التجاري أو الفندقي، شريطة أن لا تتجاوز قيمة القرض نصف كلفة البناء. 2 - لغرض المساهمة في تطوير المدن وتحسينها خصوصا الأجزاء الداخلية في المدن الكبيرة، ويجوز للصندوق أن يتفق مع إحدى البلديات على تطوير مناطق سكنية أو تجارية، وذلك بأن يقوم الصندوق بتملك المنطقة المتفق عليها ودفع التعويضات اللازمة لأصحابها، ثم يقوم بإعادة تخطيط المنطقة تمهيدا لبيعها، وتساعد البلديات الصندوق على تنفيذ إجراءات نزع الملكية بموجب صلاحياتها. وتضاف الموارد التي يجتنيها الصندوق من ذلك إلى رأس ماله.3 - يجوز للصندوق أن يتفق مع المؤسسات السعودية على إقامة مجموعات سكنية لمنسوبي هذه المؤسسات، وذلك بتقديم قرض لا يتجاوز خمسين بالمائة من تكاليف بناء الوحدة
    السكنية.4 - يجوز للصندوق إقراض أي مشروعات سكنية غير تلك المذكورة في هذه القواعد إذا ثبت للجنة إدارة الصندوق جدوى المشروع وتوفر الضمانات الكافية له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76ad693d-d427-4de8-8980-a9a700f210be/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تمنح القروض مقابل ضمانات عقارية أو بنكية ملائمة، وفي حالة الإقراض للمساكن الفردية يكتفى برهن الأرض والمبنى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76ad693d-d427-4de8-8980-a9a700f210be/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجوز للصندوق أن يتولى إدارة منح القروض ومتابعتها وحفظ حساباتها من قبله مباشرة أو يوكل ذلك إلى إحدى المؤسسات البنكية طبقا لعقد يبرم لهذا الغرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76ad693d-d427-4de8-8980-a9a700f210be/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يحدد رأس مال الصندوق بصفة مبدئية بمبلغ مائتين وخمسين مليون ريال، يجوز زيادته بقرار من مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76ad693d-d427-4de8-8980-a9a700f210be/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تصدر بقرار من وزير المالية والاقتصاد الوطني بناء على توصية لجنة إدارة الصندوق لائحة تنفيذية، تتضمن قواعد عملها وشروط وطرق تقديم القروض ومواعيد الدفع والسداد والضمانات ، وغير ذلك مما يستلزمه هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/76ad693d-d427-4de8-8980-a9a700f210be/1
  verified: false
