#  (نظام نقل معلومات المتعاملين مع المنشآت الخاصة إلكترونياً إلى مركز المعلومات الوطني في وزارة الداخلية (نظام شموس الأمني)) — fetched VERBATIM from laws.boe.gov.sa.
# Parsed from the official gazette; verified: false until a human confirms each
# article against source_url (AGENTS.md #5). Not fabricated.
regulation:
  code: BOE039
  name_ar: نظام نقل معلومات المتعاملين مع المنشآت الخاصة إلكترونياً إلى مركز المعلومات الوطني في وزارة الداخلية (نظام شموس الأمني)
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك : 1- نظام شموس: نظام آلي مركزي لشبكة المعلومات الوطنية، تُنقل من خلاله المعلومات إلى مركز المعلومات الوطني بوزارة الداخلية عبر الشبكات المرخص لها من هيئة الاتصالات وتقنية المعلومات. 2- الوزارة : وزارة الداخلية. 3- الجهات الحكومية: الجهات المعنية بمنح تراخيص للمنشآت الخاصة بمزاولة الأنشطة الواردة في هذا النظام. 4- المعلومات: معلومات وبيانات المتعاملين مع المنشآت الخاصة، المطلوب تسجيلها وإرسالها عبر نظام شموس إلى مركز المعلومات الوطني بالوزارة. 5- المنشآت الخاصة: الشركات والمؤسسات والمكاتب والمحلات في القطاع الخاص، الملزمة بالاشتراك في نظام شموس وفق هذا النظام. 6- المتعامل: الشخص ذو الصفة الطبيعية المستفيد من الخدمات التي تقدمها المنشآت الخاصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى وضع القواعد العامة لنقل معلومات المتعاملين مع المنشآت الخاصة إلى مركز المعلومات الوطني في وزارة الداخلية إلكترونيًّا عبر نظام شموس، وتحديد آلية ضبط المخالفات والعقوبات المترتبة عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يسري هذا النظام على المنشآت الخاصة التي تمارس الأنشطة الآتية: 1 - مرافق الإيواء السياحي، وتأجير الاستراحات. 2 - تأجير السيارات. 3 - شراء الذهب والمجوهرات من المتعامل. 4 - نقل الركاب بين المدن داخل المملكة، أو إلى خارجها. 5 - نقل المركبات. 6 - تأجير العقار. 7 - المراكز الرياضية. 8 - بيع المركبات الملغى تسجيلها (محلات التشليح).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تتولى الوزارة مسؤولية تشغيل نظام شموس، والإشراف على تطبيقه، وتطويره، واتخاذ الإجراءات اللازمة لتحقيق ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تتولى الوزارة التنسيق مع الجهات الحكومية لضمان ربطها بنظام شموس، وتحديد نوعية المعلومات التي يجب إدخالها في النظام، بما فيها الإبلاغ عن مخالفات أحكام هذا النظام، وتحديد آلية تبادل تلك المعلومات وكيفية استفادة الجهات الحكومية منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تقوم الوزارة - بالتنسيق مع الجهات الحكومية - بوضع آلية للتأكد من اشتراك المنشآت الخاصة في نظام شموس قبل إصدار رخصة مزاولة النشاط أو تجديدها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يجب على المنشآت الخاصة الالتزام بما يأتي: 1 - الاشتراك في نظام شموس.2 - تسجيل المعلومات بشكل كامل.3 - تسجيل المعلومات بشكل صحيح. 4 - تسجيل المعلومات بشكل فوري منذُ بدء التعامل مع المتعامل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- تتولى الوزارة التأكد من تطبيق المنشآت الخاصة لأحكام هذا النظام، وضبط المخالفات، وتطبيق العقوبات المقررة. 2- تتولى الوزارة - بالتنسيق مع الجهات الحكومية - وضع الإجراءات اللازمة لقيام تلك الجهات (وفق اختصاصاتها) بإبلاغ الوزارة عن المنشآت الخاصة المخالفة لأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد ينص عليها نظام آخر؛ تعاقب المنشأة الخاصة التي تخالف أحكام هذا النظام، بالآتي: 1 - عند مخالفتها للفقرة (1) من المادة (السابعة) من هذا النظام؛ تكون العقوبة بالترتيب الآتي: أ - الإنذار. ب - غرامة قدرها (10.000) عشرة آلاف ريـال إذا لم تشترك خلال ثلاثين يوماً من تاريخ تبليغها بالإنذار.ج - غرامة قدرها (25.000) خمسة وعشرون ألف ريـال إذا لم تشترك خلال ثلاثين يوماً من تاريخ تبليغها بقرار فرض الغرامة المشار إليها في الفقرة (ب) من الفقرة (1) من هذه المادة.د - إيقاف النشاط إلى حين اشتراكها، وذلك إذا لم تشترك خلال ثلاثين يوماً من تاريخ تبليغها بقرار فرض الغرامة المشار إليه في الفقرة (ج) من الفقرة (1) من هذه المادة، على أن يكون ذلك بعد التنسيق مع الجهات الحكومية ذات العلاقة، مع مراعاة عدم إلحاق الضرر بالمتعاملين مع المنشأة.2 - عند مخالفتها للفقرات (2، 3، 4) من المادة (السابعة) من هذا النظام؛ تكون العقوبات بالترتيب الآتي:أ - الإنذار عند ارتكاب المخالفة للمرة الأولى.ب - غرامة قدرها (5000) خمسة آلاف ريـال في حال ارتكاب المخالفة نفسها للمرة الثانية خلال ستة
    أشهر من تاريخ ارتكاب المخالفة الأولى.ج - غرامة قدرها (25.000) خمسة وعشرون ألف ريـال في حال ارتكاب المخالفة نفسها للمرة الثالثة خلال ستة أشهر من تاريخ ارتكاب المخالفة الثانية.د - إيقاف النشاط لمدة لا تزيد على ستين يوماً في حال ارتكاب المخالفة نفسها للمرة الرابعة خلال ستة أشهر من تاريخ ارتكاب المخالفة الثالثة، وذلك بعد التنسيق مع الجهات الحكومية ذات العلاقة، مع مراعاة عدم إلحاق الضرر بالمتعاملين مع المنشأة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تصدر العقوبات المنصوص عليها في المادة (التاسعة) من هذا النظام؛ بقرار من وزير الداخلية أو من يفوضه، ويجوز لمن صدر في حقه قرار بإحدى العقوبات الاعتراض عليه أمام المحكمة الإدارية خلال ستين يوما من تاريخ العلم بالقرار الصادر من الوزارة برفض التظلم, أو مضي ستين يوما دون البت فيه, وفقا لأحكام نظام المرافعات أمام ديوان المظالم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تقوم الوزارة باتخاذ جميع الإجراءات الفنية والتقنية التي تضمن خصوصية المنشآت الخاصة، وسرية المعلومات، وضمان عدم استخدامها للأغراض غير المعدة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا تتحمل المنشآت الخاصة تكاليف مالية مقابل اشتراكها في نظام شموس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يصدر وزير الداخلية اللائحة التنفيذية لهذا النظام خلال تسعين يوماً من تاريخ صدوره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يعمل بهذا النظام بعد تسعين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ad0354f7-9756-4a4e-8948-a9a700f19705/1
  verified: false
