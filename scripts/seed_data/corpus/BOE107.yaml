regulation:
  code: BOE107
  name_ar: نظام الأئمة والمؤذنين وخدم المساجد
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة (1)
  article_text_ar: تسري أحكام هذا النِظام على جميع الأئمة والمؤذنين وخدم المساجد باستثناء العاملين في الحرمين الشريفين فسيصدُر بشأنِهم تنظيم خاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: يُعامل جميع المعينين بموجب أحكام هذا النِظام على أساس مبدأ المكافأة المقطوعة وليس على أساس المراتب الثابِتة في الميزانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: 'يُشترط فيمن يعين طبقًا لأحكام هذا النِظام ما يأتي: أ - أن يكون سعودي الجنسية.ب - أن يكون بالغًا (21) سنة على الأقل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: يُشترط فيمن يُعين لشغل وظيفة إمام لأحد الجوامع من فئة (أ ، ب) ما يلي:1 - أن يكون قارئًا ومُجوِّدًا لكتاب الله حافِظًا لما لا يقل عن ثُلُثِِه.2 - أن يكون ذا دراية كافية بالفقه وعلى وجه الخصوص بالأحكام المُتعلِّقة بالعبادات.3 - أن يكون عارِفًا بقواعد اللُّغة العربية قادِرًا على إنشاء خُطب الجمعة وإلقائها دون لحن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: يُشترط فيمن يُعين لشغل وظيفة إمام جامع فئة (ج) ومسجد فئة (أ) ما يلي:1 - أن يكون قارئًا لكتاب الله حافِظًا لما لا يقل عن الأجزاء الثلاثة الأخيرة مِنه.2 - أن يكون ذا معرِفة كافية بالأحكام المُتعلِّقة بالصلاة قادِرًا على إلقاء خُطب الجمعة المكتوبة.3 - أن يكون عارِفًا باللُّغة العربية بالقدر الذي يستطيع به تجنُب اللحن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: يُكتفى بالنسبة لمن يُعين لشغل وظيفة إمام مسجد (ب ، ج) أن يكون قارئًا لكتاب الله حافِظًا للجُزء الأخير مِنه على الأقل ذا إلمام بالأحكام العامة المُتعلِّقة بالصلاة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: يُشترط فيمن يُعين للأذان أن يكون صيتًا حسن الآداء، ويُفضل أن يكون قارئًا لكتاب الله حافِظًا لبعض أجزائه ذا معرِفة بالأحكام المُتعلِّقة بالعبادات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: يُشترط فيمن يُعين للخدمة في أحد الجوامع أو المساجد، أن يكون صحيح الجسم قادِرًا على أعمال النظافة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (9)
  article_text_ar: يجوز تعيين الأجانب لشغل وظائف المساجد إذا استحال شغلها بسعوديين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: يكون تعيين موظفي المساجد بقرار من وزير الحج والأوقاف أو من يُنيبُه في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: يُصنف موظفو المساجد وتُصرف مُكافآتِهم وفق هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: يستحق الموظف مُكافأة الوظيفة اعتِبارًا من تاريخ مباشرتِه العمل، بشرط أن لا يسبق ذلك صدور قرار تعيينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (13)
  article_text_ar: يجوز أن يُعين على وظائف المساجد من يشغلون وظائف عامة أو وظائف المُستخدمين ، كما يجوز في الحالات التي يراها وزير الحج والأوقاف أن يجمع شخص واحد بين وظيفتين من وظائف المساجد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (14)
  article_text_ar: لا يستحق موظفو المساجد إجازات إلا في حال المرض، ولكن يجوز الأذن بغياب الموظف لعذر مشروع مُدة لا تتجاوز شهرًا في السنة، بشرط أن يُنيب شخصًا آخر تقبله وزارة الحج والأوقاف للقيام بعمله وأن يُدفع له مُكافأة الوظيفة بعدد أيام الغياب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (15)
  article_text_ar: يستحق الموظف الذي يثبت مرضُه بموجب تقرير طبي صادِر من الجهة المعنية لذلك إجازة مرضية لمُدة ثلاثة أشهُر بكامل المُكافأة، وثلاثة أشهُر بنصف المُكافأة، وثلاثة أشهُر بربع المُكافأة، وستة أشهر بدون مُكافأة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (16)
  article_text_ar: يجب على موظفي المساجد ما يلي:أ - مُراعاة مواعيد الصلاة.ب - المُحافظة على نظافة المساجد وسلامة محتوياتِها.جـ - القيام بالواجب حسبما تقتضيه الشريعة الإسلامية.د - الابتِعاد عن كل ما يُخِل بشرف الوظيفة وكرامتِها أو يمس بالسُمعة وحسن السيرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (17)
  article_text_ar: الجزاءات التي يُمكِن توقيعُها على موظفي المساجد هي:أ - الإنذار. ب - اللوم.جـ - حسم المكافأة بما لا يتجاوز استحقاق ثلاثة أشهُر.د - الفصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (18)
  article_text_ar: لا يجوز توقيع الجزاء إلا بعد إجراء تحقيق مكتوب مع المُتهم وسماع أقوالِه وثُبوت ارتِكابه المُخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (19)
  article_text_ar: يكون توقيع الجزاءات بقرار من وزير الحج والأوقاف أو من يُنيبُه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (20)
  article_text_ar: يُبلغ الموظف بالقرار الصادِر بالجزاء فور صدوره بخطاب رسمي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (21)
  article_text_ar: تنتهي خِدمة الموظف ويُعتبر مُستقيلًا لأحد الأسباب الآتية:أ - إذا لم يُباشِر عمله خِلال خمسة عشر يومًا من تاريخ إبلاغه بقرار التعيين أو النقل.ب - إذا غاب عن عمله بدون عذر مشروع لمُدة خمسة عشر يومًا.جـ - إذا فقد أحد شروط التعيين.د - إذا عجز عن مُباشرتِه عمله بسبب المرض لمُدة تزيد عن خمسة عشر شهرًا.هـ - إذا حُكِم عليه بالسجن لمُدة تزيد عن ستة أشهُر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (22)
  article_text_ar: الموظفون الذين يتقاضون مُكافآت عند صدور هذا النِظام يُعاملون بموجبه، فإذا كانت مُكافآتِهم التي يتقاضونها عند صدوره أكثر من المُكافآت المُستحقة وفق هذا النِظام، صُرِف لهم الفرق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (23)
  article_text_ar: الموظفون الذين يتقاضون رواتِب من وظائف ثابِتة في الميزانية عند صدور هذا النِظام يُخيرون بين البقاء على وظائفِهم المُعينين عليها وبرواتِبها المُقرَّرة أو نقلِهم إلى بند المُكافآت وفق هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (24)
  article_text_ar: الموظفون الذين يجمعون بين وظيفتين ثابتتين عند صدور هذا النِظام إحداهُما من وظائف المساجد يُنقلون بالنسبة لوظائف المساجد إلى جدول المُكافآت ويُصرف لهُم الفرق- في حال وجودِه- بين راتب الوظيفة ومقدار المُكافأة المستحقة بموجب هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (25)
  article_text_ar: يُمنح موظفو المساجد عند إنتهاء خدماتِهم اللاحِقة لصدور هذا النِظام- إذا كان ذلك لأسباب غير تأديبية- مُكافآت بمقدار نصف المُكافأة الشهرية عن كل سنة من السنوات الخمس الأولى وبمقدار كامل المُكافأة الشهرية عن كل سنة من السنوات التالية، وتُحسب المُكافآت على أساس آخر مُكافأة شهرية استحقها الموظف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (26)
  article_text_ar: تُحدَّد مُكافآت موظفي المساجد بقرار من مجلِس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (27)
  article_text_ar: يُصدِر وزير الحج والأوقاف التعليمات اللازِمة لتنفيذ هذا النِظام وفي الحدود المُبينة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
- article_ref: المادة (28)
  article_text_ar: يلغي هذا النِظام كُل ما يتعارض معه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/23b12c1f-6823-4759-982e-a9a700f2031a/1
  verified: false
