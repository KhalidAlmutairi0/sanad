articles:
- article_ref: المادة الأولى
  article_text_ar: تنشأ بموجب هذا النظام هيئة تسمى ( هيئة التحقيق والادعاء العام ) ترتبط بوزير الداخلية ويكون لها ميزانية ضمن ميزانية الوزارة . وتكون مدينة الرياض مقرها الرئيسي، وتنشأ الفروع اللازمة لها داخل المقر الرئيسي أو خارجه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تشكل الهيئة من رئيس ونائب أو أكثر، ومن عدد كاف من رؤساء الدوائر ووكلائهم ومن المحققين ومساعديهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'أولاً - تختص الهيئة وفقا للأنظمة وما تحدده اللائحة التنظيمية ، بما يلي: أ - التحقيق في الجرائم.ب - التصرف في التحقيق برفع الدعوى أو حفظها طبقا لما تحدده اللوائح.ج - الادعاء أمام الجهات القضائية وفقا للائحة التنظيمية . د - طلب تمييز الأحكام.هـ - الإشراف على تنفيذ الأحكام الجزائية.و - الرقابة والتفتيش على السجون ودور التوقيف وأي أماكن تنفذ فيها أحكام جزائية والقيام بالاستماع إلى شكاوى المسجونين والموقوفين والتحقق من مشروعية سجنهم أو توقيفهم ومشروعية بقائهم في السجن أو دور التوقيف بعد انتهاء المدة، واتخاذ الإجراءات اللازمة لإطلاق سراح من سجن أو أوقف منهم بدون سبب مشروع، وتطبيق ما تقضي به الأنظمة في حق المتسببين في ذلك، ويجب إحاطة وزير الداخلية بما يبدو من ملاحظات في هذا الشأن، ورفع تقرير له كل ستة أشهر عن حالة السجناء والموقوفين. ز - أي اختصاصات أخرى تسند إليها بموجب الأنظمة أو اللوائح الصادرة طبقا لهذا النظام أو قرارات مجلس الوزراء أو الأوامر السامية. ثانياً - تحدد اللائحة التنظيمية التي تصدر طبقا لهذا النظام، كيفية ممارسة الهيئة لاختصاصاتها كإجراء التحقيق، والادعاء وعلاقة
    المحققين بدوائر الأمن والإمارات، وترتيب العمل بين المحققين وهذه الجهات. ثالثاً - تحدد اللائحة التنظيمية الأحكام الانتقالية اللازمة لممارسة الهيئة لاختصاصاتها. رابعاً - استثناء من حكم المادتين التاسعة عشرة والعشرين من نظام مجلس الوزراء ، يجوز بقرار من مجلس الوزراء إسناد التحقيق والادعاء إلى الهيئة في الجرائم التي تنص الأنظمة على إسناد التحقيق والادعاء فيها إلى جهات حكومية أخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'أ - تؤلف لجنة تسمى: ( لجنة إدارة الهيئة ) مكونة من : رئيس الهيئة رئيساً نائب رئيس الهيئة ، وخمسة من أعضاء الهيئة من مرتبة وكيل رئيس دائرة تحقيق وادعاء (أ ) فما فوق يختارهم وزير الداخلية بناء على اقتراح رئيس الهيئة. ب - تنعقد لجنة إدارة الهيئة برئاسة رئيس الهيئة أو نائبه، ولا يكون انعقادها صحيحا إلا بحضور ستة أعضاء بمن فيهم رئيس الجلسة. وفي حالة غياب أحدهم بسبب نظر اللجنة مسألة تتعلق به أو له فيها مصلحة مباشرة، أو لغير ذلك من الأسباب - يحل محله من يرشحه وزير الداخلية بناء على اقتراح رئيس الهيئة، ممن تتوفر فيه شروط عضوية لجنة إدارة الهيئة. وتصدر قرارات اللجنة بالأغلبية المطلقة لأعضائها. ج - تختص لجنة إدارة الهيئة بالإضافة إلى الاختصاصات المبينة في هذا النظام ولوائحه، بما يلي: 1 - مراجعة قرارات الاتهام في القضايا التي يطلب فيها توقيع عقوبة القتل، أو القطع، أو الرجم.2 - دراسة الأمور المتعلقة بالتحقيق والادعاء بناء على أمر وزير الداخلية .3 - إعداد التقرير السنوي للهيئة، متضمنا ملاحظاتها ومقترحاتها حول سير عملها، وما تراه بالنسبة للأنظمة والإجراءات التي تطبقها. وترفع ذلك إلى
    وزير الداخلية لرفعه إلى خادم الحرمين الشريفين متضمنا ما يراه بشأنه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يتمتع أعضاء الهيئة بالاستقلال التام، ولا يخضعون في عملهم إلا لأحكام الشريعة الإسلامية والأنظمة المرعية، وليس لأحد التدخل في مجال عملهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: مع عدم الإخلال بما يقتضيه هذا النظام من أحكام، يتمتع أعضاء الهيئة بالحقوق والضمانات المقررة في نظام الخدمة المدنية، ونظام التقاعد. ويلتزمون بما نص عليه نظام الخدمة المدنية من واجبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز لعضو الهيئة الجمع بين وظيفته ومزاولة التجارة أو أي مهنة أو عمل لا يتفق مع استقلال عمل الهيئة وكرامته. ويجوز للجنة إدارة الهيئة، أن تقرر منع عضو الهيئة من مباشرة أي عمل ترى أن القيام به يتعارض مع واجبات الوظيفة وحسن أدائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: لا يجوز لأعضاء الهيئة إفشاء الأسرار التي يطلعون عليها بحكم عملهم، ولو بعد تركهم الخدمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تكون مسميات وظائف أعضاء الهيئة، كما يلي : - ملازم تحقيق . - مساعد محقق .- محقق ثان . - محقق أول .- وكيل رئيس دائرة تحقيق وادعاء ( ب ). - وكيل رئيس دائرة تحقيق وادعاء ( أ ). - رئيس دائرة تحقيق وادعاء ( ب ). - رئيس دائرة تحقيق وادعاء ( أ ).- نائب الرئيس.وتكون مرتبات أعضاء الهيئة وفقا لسلم رواتب أعضاء الهيئة المرفق بهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يعين رئيس الهيئة بالمرتبة الممتازة بأمر ملكي بناء على ترشيح من وزير الداخلية ، ممن تتوفر فيه الشروط المطلوبة لشغل وظيفة نائب رئيس على الأقل. ويتم شغل وظائف أعضاء الهيئة الأخرى، ونقلهم إلى جهات أخرى بأمر ملكي بناء على قرار من لجنة إدارة الهيئة وتوصية وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: مع مراعاة ما ورد في هذا النظام، يحدد مجلس الوزراء شروط شغل وظائف الهيئة، كما يحدد كيفية معاملة أعضائها، وغيرهم من العاملين فيها من حيث التعيين والترقية والنقل والندب والإعارة وتقويم الأداء الوظيفي والتفتيش، وجميع ما يتعلق بوضعهم الوظيفي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تنتهي خدمة عضو الهيئة، بأحد الأسباب الآتية : أ - قبول الاستقالة.ب - بلوغ سن الخامسة والستين.ج - قبول طلب الإحالة على التقاعد، طبقا لنظام التقاعد.د - الإحالة على التقاعد، طبقا للمادة الخامسة والعشرين من هذا النظام.هـ - الحصول على تقدير أقل من المتوسط في تقرير الكفاية ثلاث مرات متوالية.و - فقد الثقة والاعتبار، اللذين تتطلبهما الوظيفة.ز- العجز الصحي.ح- عدم ثبوت صلاحية العضو خلال فترة التجربة.ط - الوفاة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: في غير حالات الوفاة وبلوغ السن النظامية وعدم ثبوت صلاحية العضو خلال فترة التجربة، تنتهي خدمة عضو الهيئة بأمر ملكي بناء على قرار من لجنة إدارة الهيئة وطلب وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا تجوز محاكمة أعضاء الهيئة، إلا وفق الشروط والقواعد الخاصة بتأديبهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تأديب أعضاء الهيئة يكون من اختصاص لجنة إدارة الهيئة، بوصفها مجلس تأديب. وإذا كان العضو المقدم إلى المحاكمة عضوا فيها، فيندب رئيس الهيئة من يراه - من مرتبة رئيس دائرة تحقيق وادعاء ( أ ) - ليحل محله، ولا يمنع من الجلوس في مجلس التأديب سبق الاشتراك في طلب إحالة المتهم إلى التقاعد أو طلب رفع الدعوى التأديبية ضده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'لرئيس دائرة أو دوائر التحقيق والادعاء حق تنبيه المحققين التابعين لها إلى ما يقع منهم مخالفا لواجباتهم أو مقتضيات وظائفهم، بعد سماع أقوالهم. ويكون التنبيه مشافهة أو كتابة، وفي الحالة الأخيرة تبلغ صورة منه إلى وزير الداخلية من رئيس الهيئة. وللمحقق حق الاعتراض على ذلك خلال خمسة عشر يوما من تاريخ إعلانه به بطلب إجراء تحقيق عن الواقعة التي كانت سببا للتنبيه، وتؤلف لهذا الغرض لجنة من: رئيس الهيئة ووكيل رئيس دائرة تحقيق وادعاء ( أ )، أو من: نائب رئيس الهيئة ووكيل رئيس دائرة تحقيق وادعاء ( ب )، ولهذه اللجنة - بعد سماع أقوال المحقق المعترض - أن تعهد إلى أحد أعضائها بإجراء التحقيق إن وجدت وجها لذلك، ولها أن تؤيد التنبيه أو أن تعتبره كأن لم يكن، وتبلغ قرارها إلى وزير الداخلية . وإذا تكررت المخالفة أو استمرت - بعد تأييد التنبيه من قبل اللجنة - رفعت الدعوى التأديبية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ترفع الدعوى التأديبية بأمر من وزير الداخلية بناء على اقتراح رئيس الهيئة، ولا تقام هذه الدعوى إلا بناء على تحقيق يتولاه أحد أعضاء الهيئة الذي يندبه وزير الداخلية بناء على اقتراح رئيس الهيئة، ويشترط في عضو الهيئة الذي يندب للتحقيق أن يكون في مرتبة أعلى من مرتبة العضو المحقق معه أو سابقا له في الأقدمية إن كانا في مرتبة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ترفع الدعوى التأديبية بمذكرة تشتمل على التهمة الموجهة والأدلة المؤيدة لها، وتقدم إلى مجلس التأديب ليصدر قراره، بدعوة المتهم بالحضور أمام المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: في حالات التلبس بالجريمة يجب عند القبض على عضو الهيئة وحبسه أن يرفع الأمر إلى لجنة إدارة الهيئة في مدة الأربع والعشرين ساعة التالية، وللجنة أن تقرر استمرار الحبس أو الإفراج بكفالة أو بغير كفالة، ولعضو الهيئة أن يطلب سماع أقواله أمام اللجنة عند عرض الأمر عليها. وتحدد اللجنة مدة الحبس في القرار الذي يصدر بالحبس أو باستمراره، وتراعى الإجراءات السالفة الذكر كلما رئي استمرار الحبس الاحتياطي بعد انقضاء المدة التي قررها المجلس. وفيما عدا ما ذكر لا يجوز القبض على عضو الهيئة أو اتخاذ أي إجراء من إجراءات التحقيق معه أو رفع الدعوى الجزائية عليه، إلا بإذن من اللجنة المذكورة. ويتم حبس أعضاء الهيئة وتنفيذ العقوبات المقيدة للحرية عليهم في أماكن مستقلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يجوز لمجلس التأديب أن يجري ما يراه لازما من التحقيقات، وله أن يندب أحد أعضائه للقيام بذلك، فإذا رأى مجلس التأديب وجها للسير في إجراءات المحاكمة عن جميع التهم المنسوبة أو بعضها كلف المتهم بالحضور في وقت كاف، ويجب أن يشتمل التكليف بالحضور على بيان كاف لموضوع الدعوى وأدلة الاتهام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يجوز لمجلس التأديب عند تقرير السير في إجراءات المحاكمة أن يأمر بوقف المتهم عن مباشرة أعمال وظيفته، وللمجلس في كل وقت أن يعيد النظر في أمر الوقف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تنقضي الدعوى التأديبية باستقالة عضو الهيئة، ولا تأثير للدعوى التأديبية على الدعوى الجزائية أو المدنية الناشئة عن الواقعة نفسها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تكون جلسات مجلس التأديب سرية، ويحكم مجلس التأديب بعد سماع دفاع عضو الهيئة المرفوعة عليه الدعوى الذي له أن يقدم دفاعه كتابة، وأن ينيب في الدفاع عنه أحد أعضاء الهيئة، وللمجلس دائما الحق في طلب حضوره بشخصه، وإذا لم يحضر ولم ينب أحدا، جاز الحكم في غيبته بعد التحقق من صحة دعوته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يجب أن يشتمل الحكم في الدعوى التأديبية على الأسباب التي بني عليها، وأن تتلى أسبابه عند النطق به في جلسة سرية، وتكون أحكام مجلس التأديب نهائية غير قابلة للطعن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'العقوبات التأديبية التي يجوز توقيعها على عضو الهيئة، هي : اللوم، والإحالة على التقاعد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تبلغ قرارات مجلس التأديب إلى وزير الداخلية ، ويصدر أمر ملكي بتنفيذ عقوبة الإحالة على التقاعد، وقرار من وزير الداخلية بناء على توصية رئيس الهيئة بتنفيذ عقوبة اللوم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: مع عدم الإخلال بالأحكام المنصوص عليها في هذا النظام ولوائحه، يتولى وزير الداخلية الإشراف على الهيئة، ويتخذ الإجراءات والتدابير، أو يتقدم إلى الجهات المختصة بما يراه من المقترحات أو المشروعات التي من شأنها ضمان المستوى اللائق بالتحقيق والادعاء. كما يتولى رئيس الهيئة الإشراف على جميع إدارات الهيئة ودوائر التحقيق والادعاء فيها، وجميع المحققين والعاملين بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يصدر مجلس الوزراء اللائحة التنظيمية اللازمة لهذا النظام بناء على اقتراح وزير الداخلية ، وتحدد هذه اللائحة الحالات التي لا يجوز لعضو الهيئة مباشرتها أو تحقيقها وتحضيرها أو إصدار قرار فيها، كما تحدد مجالات الأخذ بالخبرة في نطاق عمل الهيئة وحقوق الخبراء وواجباتهم وطريقة تأديبهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يلغي هذا النظام ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به من تاريخ نشره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ac892eff-4aa4-4b26-b312-a9a700f2663d/1
