articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك: النظام: نظام الرهن التجاري. الوزارة: وزارة التجارة والاستثمار. الوزير: وزير التجارة والاستثمار. اللائحة: اللائحة التنفيذية للنظام. عقد الرهن: اتفاق يخصص بموجبه المدين أو كفيله مالاً منقولاً ضمانًا لدين، ويشمل ذلك تعديله أو الإضافة إليه. المال المنقول: مال منقول حالي أو مستقبلي، أو حق مستقبلي. المال المستقبلي: أصول محتملة الوجود أو موجودة ولم يكتمل امتلاك الراهن لها عند انعقاد عقد الرهن، كالأصول المتعاقد على إنشائها، أو الأصول المنقولة قيد الإنشاء، أو الأصول التي لم تكن لها صفة المنقول وقت عقد الرهن. الحق المستقبلي: دين يلتزم شخص ما بسداده للراهن خلال أجل، أو دين حل أجل سداده ولم يُحصَّل، ويشمل ذلك الديون المعلق ثبوتها في ذمة الغير للراهن على شرط، أو كان ثبوتها في ذمة الغير احتماليًّا. المال المرهون: المال المنقول المقدم أو المتفق على تقديمه ضمانًا لدين. الدين أو الدين المضمون: الدين، أو جزء الدين، الذي قُدم المال المرهون ضمانًا له، ويشمل ذلك التزام المدين بتنفيذ
    عمل محدد. المدين: الشخص الملتزم بأداء الدين المضمون. الراهن: مقدم الرهن، سواء أكان هو المدين أم كفيلاً عينيًّا له. المرتهن: الشخص -أو الأشخاص بحسب الأحوال- الذي قُدم الرهن لمصلحته. العدل: شخص يتفق الراهن والمرتهن على حيازته المال المرهون، أو يتولى المحافظة عليه، أو استثماره، أو تنميته، أو تطويره، أو تحصيل ريعه. الحائز: من يكون المال المرهون تحت يده، سواء أكان الراهن أم المرتهن أم العدل. وكيل التنفيذ: شخص -من غير المرتهنين- رخَّصت له الوزارة في التنفيذ على المال المرهون لمصلحة أكثر من مرتهن، أو شخص يتفق مرتهنو المال المرهون على توليه التنفيذ نيابة عنهم. ريع المال المرهون: الحقوق والعوائد والأرباح الناشئة عن المال المرهون أو منه خلال فترة الرهن. الدين الاقتصادي: دين تجاري أو دين يترتب على شخص غير تاجر عند مزاولته نشاطاً مهنيًّا أو غيره من الأنشطة التي تهدف إلى تحقيق الربح. المنشأة الاقتصادية: المنشأة التي تمارس نشاطًا تجاريًا أو مهنيًّا أو غير ذلك من الأنشطة التي تهدف إلى تحقيق الربح. الرهن العائم: رهن يقع على أموال منقولة دون تحديد لمفرداتها. الأموال المثلية: أموال متماثلة في الأوصاف
    والقيم. الأموال القيمية: أموال مختلفة في الأوصاف والقيم أو أحدهما. السجل: السجل الموحد للرهون التجارية. مستخرج السند التنفيذي: وثيقة يصدرها السجل للتنفيذ على المال المرهون أمام قاضي التنفيذ. مستخرج التنفيذ المباشر: وثيقة يصدرها السجل للتنفيذ المباشر على المال المرهون. عروض التجارة: السلع والمنتجات التي ليس لها سجلات ملكية رسمية وتستخدمها المنشأة الاقتصادية أو تعرضها للبيع خلال مزاولة نشاطها الطبيعي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تسري أحكام النظام على عقد الرهن المكتوب الواقع على مال منقول ضماناً لدين اقتصادي بالنسبة إلى المدين. يعد عقد الرهن مكتوبًا إذا تضمن البيانات الآتية: أ- اسم الراهن، والمرتهن، والمدين (إذا كان الراهن كفيلاً عينيًّا)، والعدل إن وجد، وتحديد الحائز منهم، وعناوينهم ووسائل التواصل معهم. ب- وصف المال المرهون وحالته وقيمته في تاريخ التعاقد، وبالنسبة إلى المال المستقبلي تحديد أوصافه المتوقعة والتاريخ التقريبي لوجوده، وقيمته التقريبية. ج- الوصف العام للدين المضمون، أو مقداره، أو الحد الأقصى الذي ينتهي إليه، بحسب الأحوال. د- تاريخ عقد الرهن. هـ- ميعاد استحقاق الدين المضمون، أو الميعاد المتوقع لاستحقاق الدين غير الثابت في ذمة المدين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يجوز انعقاد الرهن ضمانًا لدين غير ثابت في ذمة المدين، بما في ذلك الدين المعلق على شرط أو الدين الاحتمالي. ويعد الرهن ساريًا من تاريخ عقد الرهن لا من تاريخ ثبوت الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يعد عقد الرهن نافذًا في مواجهة الغير بالتسجيل أو بانتقال حيازة المال المرهون إلى المرتهن أو العدل، وذلك وفقًا لما يأتي: يعد عقد الرهن مسجلاً إذا تم قيده في السجل، فإن كان المال المرهون مما تنص أنظمة أخرى على اختصاص سجلات معينة بتسجيل الرهون التي تقع عليه، عُدَّ عقد الرهن مسجلاً بقيده في هذه السجلات. وإن كان المال المرهون مما نصت أنظمة أخرى على اختصاصات سجلات محددة بتسجيل ملكيته فقط، عُدَّ عقد الرهن مسجلاً متى ما تم قيده في السجل وبينت سجلات الملكية واقعة الرهن. يجوز -في الحالات التي تحددها اللائحة- اعتبار الحيازة الوسيلة الوحيدة لنفاذ عقد الرهن في مواجهة الغير، وتحدد اللائحة أي إجراء آخر يلزم لنفاذ عقد الرهن في مواجهة الغير، وللوزارة - عند الاقتضاء - تنظيم الأحكام الخاصة بحيازة أنواع معينة من الأموال كمال مرهون. لا ينفذ عقد رهن عروض التجارة في مواجهة الغير إلاَّ بانتقال الحيازة إلى المرتهن أو العدل، فإن كان رهن عروض التجارة رهناً عائماً نفذ عقد الرهن بالتسجيل أو انتقال الحيازة. ويتحمل الراهن النفقات اللازمة لنفاذ عقد الرهن في مواجهة الغير، ما لم يتفق على غير ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يكون عقد الرهن غير النافذ في مواجهة الغير صحيحًا منتجًا لآثاره بين الراهن والمرتهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يضمن المال المرهون -إضافة إلى سداد أصل الدين المضمون- المصروفات المتعلقة به، وهي: مصروفات حفظه. مصروفات استثماره. مصروفات تحصيل ريعه. مصروفات التنفيذ عليه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: استثناءً من حكم الفقرة (1) من المادة (الثامنة)، يجوز الاتفاق على تقديم مال مستقبلي كمال مرهون، بشرط أن يكون وجود المال المستقبلي متوقعًا من الراهن والمرتهن وأن يتملكه الراهن قبل حلول أجل الدين المضمون، ويعد الرهن في هذه الحال ساريًا من تاريخ الاتفاق لا من تاريخ وجود المال المستقبلي أو تملك الراهن له أو تحوله إلى منقول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يشمل الرهن ملحقات المال المرهون وأجزاءه وريعه، إلاَّ إن اتفق في عقد الرهن على استثناء الريع. يعد كل المال المرهون ضامناً لكامل الدين، ما لم يتفق على غير ذلك. يجوز رهن جزء من مال منقول ولو استحالت قسمته أو فرزه، ويقع الرهن في هذه الحال على الجزء المرهون مشاعًا، وتحدد اللائحة -بالتنسيق مع وزارة العدل- الضوابط والأحكام المنظمة لانتقال حيازة المال المرهون مشاعاً والتنفيذ عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: للراهن -في عقد الرهن النافذ- عقد أكثر من رهن على المال المرهون نفسه. يكون للمرتهن المسجل أولوية على المرتهن غير المسجل، وللمرتهن الذي يحوز المال المرهون أولوية على المرتهن الآخر في عقد الرهن غير المسجل. إذا وجد أكثر من رهن مسجل، فتكون الأولوية للمرتهن صاحب تاريخ التسجيل الأقدم، إلاَّ إذا اتفق على غير ذلك. إذا وجد أكثر من رهن بالدرجة نفسها على المال المرهون نفسه فللمرتهن صاحب تاريخ عقد الرهن الأسبق أولوية على من يليه، إلاَّ إذا اتفق على غير ذلك. يكون لصاحب الرهن على مال منقول محدد أولوية على صاحب الرهن العائم أو صاحب الرهن على المنشأة الاقتصادية في عقود الرهن بالدرجة نفسها، وذلك إذا كان المال المرهون المحدد داخلاً في نطاق الأموال المرهونة رهنًا عائماً أو رهن المنشأة الاقتصادية، إلاَّ إذا اتفق على غير ذلك. أي تعديل على عقد الرهن بزيادة مقدار الدين المضمون إذا كان محددًا، أو برفع حده الأقصى إذا لم يكن محدداً؛ لا تكون له أولوية الدين المضمون الأصلي، ما لم يتفق على غير ذلك. يكون الاتفاق الوارد في الفقرات (3) و(4) و(5) و(6) من هذه المادة، بين المرتهنين ذوي العلاقة. يجوز أن يكون
    الاتفاق الوارد في الفقرات (3) و(4) و(5) و(6) بين الراهن والمرتهن عند انعقاد عقد الرهن أو أي وقت بعده بتخصيص أولوية معينة للمرتهن، دون إخلال بحق المرتهنين الآخرين. يجوز الاتفاق على تجزئة الدين المضمون الواحد إلى أجزاء مضمونة بأولويات متعددة. يجب أن يبين السجل جميع الرهون المسجلة وأولوياتها وتاريخ التسجيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجوز رهن أكثر من مال منقول لضمان الدين نفسه، ويحق للمرتهن في هذه الحال تحديد ترتيب التنفيذ على هذه الأموال، ما لم يُتفق على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: للمرتهن أو العدل -بحسب الأحوال- استثمار المال المرهون، وإدارته، وتنميته وتحصيل ريعه لحساب الراهن، وذلك بموجب تفويض من الراهن مثبت في عقد الرهن. للحائز -غير الراهن- بعد الاتفاق مع الراهن، خصم المصروفات المنصوص عليها في المادة (السابعة) من النظام من ريع المال المرهون، ويؤول الباقي من الريع إلى الراهن، ما لم يُتفق في عقد الرهن على رهن الريع. وفي هذه الحال يودع الباقي منه في حساب خاص وفق أحكام المادة (السادسة والثلاثين) من النظام. ويجوز أن يستوفى من الريع بعض الدين المضمون باتفاق الراهن والمرتهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يجوز للمرتهن أو العدل الانتفاع بالمال المرهون إلاَّ بموافقة مكتوبة من الراهن، ويشترط أن يكون مقابل الانتفاع بما يعادل المثل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'مع مراعاة حكم المادة (السادسة عشرة) من النظام، لا يحق للراهن نقل ملكية المال المرهون إلاَّ بموافقة مكتوبة من المرتهن، وللمرتهن في هذه الحال أحد الخيارات الآتية: قيام الراهن بنقل الرهن إلى ثمن المال المرهون، مع إيداع الثمن في حساب تسري عليه أحكام المادة (السادسة والثلاثين) من النظام، ويجب في هذه الحال تعديل عقد الرهن. حلول أجل الدين المضمون . التنازل عن عقد الرهن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: على الراهن الحائز إصلاح المال المرهون عند تعرضه للعيب، وله -بدلاً عن ذلك- استبداله وفق أحكام المادة (السادسة عشرة) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 'إذا أخل المدين إخلالاً موجبًا للتنفيذ، فللمرتهن أيّ مما يأتي: أ- إنذار الراهن والمدين بهذا الإخلال وأنه يجب أداء الدين المضمون خلال مدة لا تقل عن ستة أيام عمل، ما لم يتفق على مدة أطول في عقد الرهن، فإن أُدي الدين المضمون انقضى الرهن، وإلاَّ جاز للمرتهن أن يطلب من المحكمة المختصة البدء في إجراءات التنفيذ على المال المرهون لاستيفاء حقه. وتحدد اللائحة الأحكام الأخرى المتعلقة بشكل الإنذار وكيفيته. ب- التنفيذ على المال المرهون وفقاً للمادة (التاسعة والعشرين) أو المادة (الثلاثين) من النظام. إن كان الراهن كفيلاً عينيًّا، كان له -إلى جانب التمسك بالدفوع الخاصة به- حق التمسك بدفوع المدين ذات الصلة بالدين المضمون ولو تنازل عنها المدين. ولا يجوز التنفيذ على غير المال المرهون من أموال الكفيل العيني. لا يصح الاشتراط في عقد الرهن على تملك المرتهن المال المرهون مقابل الدين المضمون إذا حدث ما يوجب التنفيذ، وفي حال وجود هذا الشرط فيبطل الشرط ويبقى الرهن صحيحاً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: إذا كانت المنشأة الاقتصادية شركة فلا يشمل عقد رهنها إلا أصولها المنقولة (المادية والمعنوية) وحقوقها ومحلها التجاري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: للمرتهن -في عقد الرهن النافذ- أن ينقل إلى الغير حقه في استيفاء الدين المضمون مع الرهن الضامن له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: تحدد قيمة المال المرهون ومتوسط التقويم في الحالات المنصوص عليها في النظام وفق القواعد والإجراءات التي تبينها اللائحة، ما لم يكن لدى الجهة المختصة بتنظيم أنواع معينة من الأموال إجراءات خاصة لتحديدها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لا يجوز تغيير العدل إلاَّ باتفاق الراهن والمرتهن، ويحق للعدل المطالبة بالتعويض عن أي أضرار ترتبت على هذا التغيير. يجوز تعديل عقد الرهن كتابة باتفاق الراهن والمرتهن، وتتبَّع لنفاذ التعديل إجراءات نفاذ عقد الرهن وفقاً لأحكام المادة (الرابعة) من النظام. يعد عقد الرهن الذي جرى عليه تعديل بتغيير المال المرهون القيمي عقدًا جديدًا من تاريخ التعديل. يجب تعديل عقد الرهن إذا تحول الرهن إلى بدل نقدي في الحالات المحددة في النظام، وعلى الراهن إيداع البدل في حساب خاص تسري عليه أحكام المادة (السادسة والثلاثين) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجب أن يكون الراهن مالكًا للمال المرهون عند إبرام العقد وأهلاً للتصرف فيه، فإن تبين ما يخالف ذلك بعد التعاقد فللدائن المرتهن حسن النية التمسك بحقه في رهن بديل عن المال المرهون بعقد جديد، أو سقوط أجل الدين المضمون والمطالبة بالوفاء به حالاً. يجب أن يكون المال المرهون مما يصح بيعه أو مما يمكن تقدير قيمته. استثناءً من حكم المادتين (التاسعة) و(الخامسة والثلاثين)، لا يصح رهن أموال أو حقوق من تركات أو وصايا لم تدخل في ملك الراهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: للحائز -غير الراهن- أن يعود على الراهن بما ينفقه -من مصروفات معقولة عرفًا- في سبيل اتخاذ التدابير والإجراءات والتصرفات اللازمة للمحافظة على المال المرهون وحمايته وصيانته وإصلاحه، ما لم يتفق على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: إذا كان المال المرهون من الأموال المثلية جاز للراهن الحائز استبدال مثله به دون حاجة إلى موافقة المرتهن أو إلى تعديل عقد الرهن، وإذا كان المال المرهون من الأموال القيمية فيحق للراهن الحائز استبدال غيره به بعد موافقة المرتهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: مع مراعاة حكم المادة (السادسة عشرة) من النظام، يترتب على تصرف الراهن في ملكية المال المرهون دون موافقة مكتوبة من المرتهن؛ حلول أجل الدين المضمون وثبوت حق المرتهن في المطالبة بسداده حالاً. كما يحق للمرتهن -عند عدم وفاء المدين بالدين المضمون- تتبع المال المرهون في يد من انتقلت إليه ملكيته، ولا يثبت حق تتبع المال المرهون ما لم يكن عقد الرهن نافذاً في مواجهة الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يترتب على ثبوت حق المرتهن في تتبع المال المرهون حقه في التنفيذ عليه في يد من انتقلت إليه ملكيته وإن لم يعلم بوجود الرهن، ويحق لمن انتقلت إليه ملكية المال المرهون الرجوع في هذه الحال على الراهن أو البائع بالقيمة ودون إخلال في حقه بالتعويض ما لم يتنازل عن هذا الحق كتابة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: ينتقل المال المرهون بالإرث أو الوصية محملاً بالرهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يجوز لمن انتقلت إليه ملكية المال المرهون تطهيره بأداء الدين المضمون والنفقات والمصروفات التي تكبدها المرتهن، ويحق له في هذه الحال الرجوع على الراهن بما لا يتجاوز إجمالي ما كان سيدفعه الراهن إلى المرتهن، ما لم يتفق مع الراهن على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: الحائز مسؤول عن سلامة المال المرهون حتى تاريخ انقضاء الرهن أو التنفيذ على المال المرهون. وللمرتهن أو الراهن -بحسب الأحوال- أن يطلب من المحكمة المختصة إلزام الحائز باتخاذ الإجراءات اللازمة للمحافظة على المال المرهون وحمايته وصيانته وإصلاحه. للمرتهن أو الراهن -بحسب الأحوال- الاعتراض أمام المحكمة المختصة على أي إجراء يتخذه الحائز قد يؤدي إلى إنقاص قيمة المال المرهون أو تعريضه للهلاك أو العيب، وتنظر المحكمة المختصة في الاعتراض بصفة عاجلة. مع مراعاة ما ورد في الفقرة (1) من المادة (الرابعة والعشرين) من النظام، يضمن الحائز قيمة المال المرهون إذا هلك بسبب تعدٍّ أو إهمال أو تقصير منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: إذا هلك المال المرهون بيد الراهن بتعدٍّ أو تفريط منه ترتب على ذلك حلول الدين المضمون وسقوط الأجل، مع حق المرتهن في التنفيذ على الباقي من المال المرهون إن وجد، ما لم يُستبدل المال المرهون وفق أحكام المادة (السادسة عشرة) من النظام. مع مراعاة ما ورد في الفقرة (1) من هذه المادة، إذا ترتب على هلاك المال المرهون استحقاق تعويض؛ انتقل الرهن إلى التعويض، ما لم يتفق الراهن والمرتهن على غير ذلك. ويودع الراهن مبلغ التعويض في حساب خاص تسري عليه أحكام المادة (السادسة والثلاثين) من النظام، وتسري عليه أحكام عقد الرهن الأصلي ما لم يتفق الراهن والمرتهن -كتابة- على خصم مبلغ التعويض من أصل الدين المضمون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: للمحكمة المختصة أن تقضي -بناء على طلب من الراهن أو المرتهن- ببيع المال المرهون ولو لم يحل أجل الدين المضمون متى كان المال المرهون معرضًا للهلاك أو نقص القيمة، أو تجاوزت التكلفة المتوقعة لإصلاحه نصف قيمته وقت عقد الرهن، أو استلزمت حيازته ورعايته نفقات كبيرة. للمحكمة المختصة -بناء على طلب من الراهن- أن تأذن ببيع المال المرهون إذا سنحت فرصة لبيعه بسعر يزيد على قيمته وقت عقد الرهن. يباع المال المرهون بأي طريقة تحددها المحكمة المختصة. يودع ثمن بيع المال المرهون في حساب خاص تسري عليه أحكام المادة (السادسة والثلاثين) من النظام، ما لم يتفق على تسوية الدين المضمون من ثمن المال المرهون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: مع عدم الإخلال بما ينص عليه أي نظام آخر، تتقدم الديون المضمونة بالرهن النافذ -في حالات الإفلاس أو التصفية- في أولوية السداد على الديون الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 'تسري الأحكام الآتية على المنفّذ، سواء أكان مرتهناً أم وكيل تنفيذ -بحسب الأحوال- وبصرف النظر عن طريقة التنفيذ وآلياته: للمرتهن حق التقدم على الغير في شراء المال المرهون بسعر التقويم، ما لم يكن هناك عرض بشرائه بسعر أعلى من سعر التقويم. يراعي المنفّذ مصلحة كل من له حق في المال المرهون بما في ذلك مصالح المرتهنين الآخرين، وألاَّ يخل بأحكام الأنظمة واللوائح والقواعد المعمول بها. على المنفّذ الاحتفاظ بجميع السجلات والوثائق والمستندات المتعلقة بالتنفيذ، وذلك لمدة تحددها اللائحة. يجوز الاعتراض على المنفّذ أمام المحكمة المختصة أو قاضي التنفيذ - بحسب الأحوال - إذا لم يراعِ أيًا من الأحكام الإجرائية المنصوص عليها في النظام واللائحة وعقد الرهن، وتنظر المحكمة المختصة أو قاضي التنفيذ الاعتراض بصفة عاجلة، ولأي منهما أن يقرر وقف ما باشره المنفّذ من إجراءات أو بطلانها. للمرتهن غير المنفّذ أو الراهن أو لمن له مصلحة في المال المرهون مطالبة المنفّذ بالتعويض عن جميع الأضرار المترتبة على عدم مراعاته لطبيعة المال المرهون أو الأحكام الإجرائية أو مصلحة كل من له حق فيه، أو المترتبة على تعسفه في
    استخدام حقه أو إذا نفذ دون وجه حق. إذا تعدد مرتهنو المال المرهون نفسه، جاز لأي مرتهن ذي أولوية أعلى من المرتهن المنفّذ التقدم إلى المحكمة المختصة بطلب إسناد مهمة التنفيذ إلى وكيل تنفيذ، وتسري في هذه الحال أحكام المادة (الحادية والثلاثين) من النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يعد مستخرج السند التنفيذي لعقد الرهن المسجل سنداً تنفيذيًّا، ولا يجوز إصدار مستخرج السند التنفيذي في حال وجود أكثر من مرتهن بعقود مسجلة على المال المرهون نفسه إلاَّ لوكيل تنفيذ، ويجب أن يبين السجل في هذه الحال واقعة إصداره لمستخرج السند التنفيذي. يتولى قاضي التنفيذ التنفيذَ على المال المرهون وفق الأحكام المقررة في نظام التنفيذ ولائحته التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: للراهن والمرتهن في عقد الرهن المسجل الاتفاق في العقد على أن يتولى المرتهن التنفيذ على المال المرهون بنفسه. إذا تعدد مرتهنو المال المرهون نفسه واتفق أي منهم مع الراهن على أن يكون التنفيذ تنفيذًا مباشرًا وجب تعيين وكيل تنفيذ. ولا يجوز إصدار مستخرج التنفيذ المباشر في هذه الحال إلاَّ لوكيل التنفيذ. يعد مستخرج التنفيذ المباشر إذنًا لمن صدر باسمه بالتنفيذ على المال المرهون وبيعه، وله أن يطلب من الجهات المختصة نقل حيازة المال المرهون أو قيد سند ملكية المال المرهون باسمه، ويجب على السجل في هذه الحال بيان واقعة إصدار مستخرج التنفيذ المباشر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يؤدي وكيل التنفيذ -بعد حصوله على مستخرج السند التنفيذي أو مستخرج التنفيذ المباشر- حق المرتهن طالب التنفيذ وفقًا للأولويات على المال المرهون، وبحسب ما تحدده اللائحة، مع إيداع المبلغ المتبقي في حساب بنكي باسم السجل يخصص لمصلحة الدائنين المرتهنين الآخرين، وتسري على هذا الحساب أحكام المادة (السادسة والثلاثين) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'يكون التنفيذ المشار إليه في المادة (الثلاثين) من النظام من قبل المنفّذ على النحو الآتي: إنذار المدين بأداء الدين المضمون، وتحدد اللائحة مدة الإنذار والأحكام الأخرى المنظمة لذلك، على ألاَّ تقل مدة الإنذار عن ستة أيام عمل. بعد انقضاء مدة الإنذار، يقدم المنفّذ مستخرج التنفيذ المباشر إلى الجهات المختصة لنقل حيازة المال المرهون إليه أو إلى عدل يختاره أو لقيد سند ملكية المال المرهون باسمه أو باسم ذلك العدل، بحسب الأحوال، وفقًا لما تحدده اللائحة. تقويم المنفّذ للمال المرهون. بيع المال المرهون بإحدى الطريقتين الآتيتين: أ- البيع المباشر. ب- البيع بالمزاد العلني وفق إجراءات يتفق عليها في عقد الرهن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 'مع مراعاة حكم المادة (الرابعة والثلاثين) من النظام، يجوز رهن المنشأة الاقتصادية، ويتم قيد ذلك في السجل التجاري لها، ويشمل رهنها -ما لم يُتفق على غير ذلك في عقد الرهن- ما يأتي: جميع العناصر المعنوية للمنشأة الاقتصادية (القابلة للانتقال للغير بمفردها أو مع المنشأة الاقتصادية). حقوق المنشأة الاقتصادية وأصولها من المنقولات عدا عروض التجارة التي تعرضها المنشأة للبيع بشكل مستمر كجزء من نشاطها، ما لم يتفق صراحة على رهنها. وفي هذه الحال تسري عليها أحكام المادة (الثامنة والثلاثين) من النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يرهن الحق المستقبلي بقيد عقد الرهن في السجل، مع تحديد قيمته وتاريخ استحقاقه واسم المدين بذلك الحق. يشترط لنفاذ رهن الحق المستقبلي إبلاغ المدين به، وتوثيق ذلك في السجل. إذا استُحق أو أُدي الحق المستقبلي المرهون في تاريخ استحقاق الدين المضمون أو قبله، فعلى المدين بالحق المستقبلي أن يودع المبلغ في حساب خاص، وتسري عليه في هذه الحال أحكام المادة (السادسة والثلاثين) من النظام، ما لم يتفق الراهن والمرتهن على غير ذلك. إذا استُحق أو أُدي الحق المستقبلي المرهون بعد تاريخ استحقاق الدين المضمون وقع التنفيذ على الحق المستقبلي المرهون بالطريقة التي يتفق عليها الراهن والمرتهن في عقد الرهن، فإن لم يكن بينهما اتفاق على ذلك، جاز للمرتهن أن يحل محل الراهن في تحصيله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: ترهن الحسابات الجارية والحسابات الاستثمارية والودائع لأجل بقيد عقد الرهن في السجل أو بقيد عقد الرهن في السجلات الخاصة بذلك وفقًا للمادة (التاسعة والثلاثين) من النظام، ويشمل الرهن رصيد الحساب بتاريخ القيد وما يضاف إليه من إيداعات لاحقة، ما لم يتفق على غير ذلك. يجوز للمنشأة المالية خصم الالتزامات المالية المدينة الناشئة قبل انعقاد الرهن على الحساب، وذلك عند حلول أجلها. لا يحق للراهن السحب من الحساب المرهون والتحويل منه ما لم يتفق على غير ذلك، ولا يحق له كذلك السحب أو التحويل في حال تم فتح الحساب باسم السجل في الأحوال المنصوص عليها في النظام. مع مراعاة ما جاء في الفقرة (1) من هذه المادة، تحدد اللائحة الإجراءات المتعلقة بالرهن على الحسابات الجارية والحسابات الاستثمارية والودائع لأجل بالتنسيق مع هيئة السوق المالية ومؤسسة النقد العربي السعودي كل فيما يخصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: فيما عدا الأوراق المالية المتداولة في السوق المالية وأسهم الشركات غير المتداولة في السوق المالية، يكون رهن الأوراق المالية والحصص في الشركات بقيد عقد الرهن في السجل والتأشير عليه في سجلات الجهة مصدرة الأوراق المالية أو الحصص مع تحديد عددها وقيمتها. يؤشر الراهن على الأوراق المالية إذا كانت لحاملها بما يفيد حصول الرهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يجوز رهن جميع الأموال المنقولة المملوكة للراهن أو جزء منها أو فئة منها، أو مال منقول يحدد بنوعه أو كميته أو مكان وجوده أو خصائصه أو غير ذلك من الأوصاف المعتبرة. يكون التنفيذ على الرهن المنصوص عليه في الفقرة (1) من هذه المادة عند تحقق واقعة إخلال المدين بالتزامه المضمون بالرهن، وتكون جميع أموال الراهن ذات الأوصاف الواردة في عقد الرهن المملوكة له وفي حيازته في تاريخ الاستحقاق مشمولة بالرهن. للراهن التصرف في الأموال المرهونة بموجب الفقرة (1) من هذه المادة أو استثمارها في أعماله الاقتصادية الاعتيادية ما لم يحدث إخلال موجب للتنفيذ. في حال كان رهن عروض التجارة رهنًا عائمًا، فيجب بيان كميتها وقيمتها ومكان وجودها وأوصافها المعتبرة في عقد الرهن. ويلتزم الراهن بتقديم تقارير شهرية للمرتهن عن المخزون من هذه العروض على ألاَّ يقل الخالي من أي حق منها عن نصف قيمة المال المرهون، ما لم يتفق على غير ذلك. ويجوز للراهن والمرتهن الاتفاق على تقديم طرف ثالث هذه التقارير ويلتزم الراهن بتسهيل أدائه لمهماته. إذا قل مخزون عروض التجارة عن القيمة المحددة في الفقرة (4) من هذه المادة سقط الأجل ووجب
    الوفاء، إلاَّ إذا قدم الراهن ضمانًا إضافيًّا أو سدد جزءًا من الدين المضمون يوازي قيمة ما قل من المخزون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يخضع رهن السفن، والطائرات، والأوراق التجارية، والأوراق المالية المتداولة في السوق المالية، وأسهم الشركات غير المتداولة في السوق المالية، والبضائع المودعة في المخازن العامة، والعلامات التجارية، وغيرها من الأموال التي يخضع رهنها لأحكام أنظمة خاصة بها؛ للأحكام المقررة لها في تلك الأنظمة، وتسري أحكام هذا النظام فيما لم يرد به نص فيها. تزود الجهات -التي تتولى تسجيل الرهون على الأموال المذكورة في الفقرة (1) من هذه المادة- السجلَّ ببيانات تسجيل تلك الرهون، وتنسق الوزارة مع الجهات المعنية لتحديد آلية تضمن ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: 'ينقضي الرهن في أي من الأحوال الآتية: أ- انقضاء الدين المضمون بتمامه بالوفاء أو الإبراء أو بغير ذلك مما ينقضي به الدين. ب- هلاك المال المرهون، ما لم يتفق الراهن والمرتهن على أن يحل محله مال آخر، دون الإخلال بأحكام الفقرة (2) من المادة (الرابعة والعشرين) من النظام. ج- اتفاق الراهن والمرتهن على إنهاء عقد الرهن. د- تنازل المرتهن عن الرهن. هـ- عدم وجود المال المستقبلي أو عدم تملك الراهن له أو عدم تحوله إلى منقول. و- عدم ثبوت الدين المضمون في ذمة مقدم الرهن أو المكفول. ز- تغيير المال المرهون القيمي. لا ينقضي الرهن بإعادة جدولة الدين المضمون به أو تجديده.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: تؤسس الوزارة السجل وتديره، ولها إسناد ذلك إلى جهة مساندة خاصة (واحدة أو أكثر) يصدر لها ترخيص من الوزارة متضمنًا شروط عملها وضوابطه، ويكون للوزارة جميع الصلاحيات اللازمة لضمان ممارسة هذه الجهات عملها بفعالية ونزاهة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: 'يصدر الوزير -خلال (مائة وثمانين) يومًا من تاريخ نشر النظام في الجريدة الرسمية- لائحة تنظيم السجل الموحد للرهون التجارية، على أن تتضمن ما يأتي: إجراءات التسجيل ومستنداته وأطرافه. إجراءات الاطلاع على السجل والحصول على كشف يبين الرهون. إجراءات الحصول على مستخرج السند التنفيذي للعقد المسجل مبينًا فيه عدد مرتهني المال المرهون نفسه. إجراءات الحصول على مستخرج التنفيذ المباشر. الأحكام الخاصة بالمحافظة على سرية البيانات والمعلومات. مسؤولية السجل والمتعاملين معه، ومعايير تقدير التعويض عن الضرر الذي قد يلحقه متعامل بأي طرف. المقابل المالي للتسجيل والتعديل والحصول على أي من خدمات السجل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يصدر الوزير اللائحة خلال (ستين) يومًا من تاريخ نشر النظام في الجريدة الرسمية. يصدر الوزير القرارات اللازمة لتنظيم أعمال الخدمات المساندة بما في ذلك وكلاء التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: يحل هذا النظام محل نظام الرهن التجاري, الصادر بالمرسوم الملكي رقم (م/75) وتاريخ 21 / 11 / 1424هـ، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e7bd6fcc-c29c-4696-8032-aae9009b113a/1
  verified: false
