regulation:
  code: BOE330
  name_ar: اللائحة التنظيمية للبرامج الاجتماعية والمهنية للأشخاص ذوي الإعاقة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذه اللائحة - المعاني المبينة أمامها ما لم يقتضِ السياق غير ذلك: الوزارة: وزارة الموارد البشرية والتنمية الاجتماعية. الوزير: وزير الموارد البشرية والتنمية الاجتماعية. الشخص ذو الإعاقة: كل شخص لديه اضطراب، أو قصور طويل الأمد في الوظائف الجسدية، أو العقلية، أو الذهنية، أو الحسية، أو النفسية، قد يمنعه -عند تعامله مع مختلف التحديات- من المشاركة بصورة كاملة وفاعلة في المجتمع على قدم المساواة مع الآخرين. الأشخاص ذوو الإعاقة من ذوي الظروف الاجتماعية الخاصة: الأشخاص ذوو الإعاقة ممن لا عائل لهم يتولى رعايتهم كونهم مجهولي الأبوين أو لا يوجد لهم قريب من أي من الفئات الآتية: الوالدان، والدا الوالدين، الإخوان، الأخوات، الأبناء، البنات، الأحفاد، الحفيدات، الزوج، الزوجة)، أو ممن يقعون تحت الولاية الشرعية للوزارة فيما يتعلق بولاية النفس لعدم وجود عائل يتولى رعايتهم. مقدم الرعاية للشخص ذي الإعاقة: من يقيم مع الشخص ذي الإعاقة ويُقدم الرعاية له سواء من أسرته أو الموظفين لرعايته. البرامج الاجتماعية: مجموعة من البرامج التي تقدم من خلالها الخدمات
    الاجتماعية للأشخاص ذوي الإعاقة لتنمية مهاراتهم الاجتماعية وتدريبهم على الاستقلالية قدر الإمكان في وظائفهم الحياتية اليومية لتحقيق مشاركتهم الفعالة في بيئتهم المحيطة وتكاملهم مع أسرهم والمجتمع المحيط بهم. وتشمل البرامج الآتية: برنامج الرعاية الاجتماعية اليومية، وبرنامج الرعاية الاجتماعية المنزلية، وبرنامج الإيواء للأشخاص ذوي الإعاقة. برنامج الرعاية الاجتماعية اليومية: مجموعة من الخدمات الاجتماعية التي تقدم للأشخاص ذوي الإعاقة في المنشآت في مدد محددة خلال اليوم. برنامج الرعاية الاجتماعية المنزلية: مجموعة من الخدمات الاجتماعية التي تقدم للأشخاص ذوي الإعاقة في مقرات سكنهم في مدد محددة خلال اليوم. برنامج الإيواء للأشخاص ذوي الإعاقة: مجموعة من الخدمات الاجتماعية التي تقدم للأشخاص ذوي الإعاقة في مقرات الإقامة المؤقتة أو مقرات السكن الدائم لهم. الخدمات الاجتماعية المساندة: مجموعة من الخدمات الاجتماعية التي تقدمها الوزارة للشخص ذي الإعاقة بناءً على تقييم إعاقته؛ لتمكينه من تحقيق المشاركة الفعالة مع بيئته المحيطة، ويشمل ذلك الاستفادة من البرامج الاجتماعية والمهنية. الأجهزة المساعدة: أجهزة غير
    طبية أو تعليمية تُصرف لمساعدة الأشخاص ذوي الإعاقة للقيام بالأنشطة اليومية وتمكينهم من المشاركة مشاركة فعالة ومنتجة في الحياة المجتمعية. البرامج المهنية: مجموعة برامج التدريب المهني التي تقدم للأشخاص ذوي الإعاقة لتنمية مهاراتهم لجعلهم قادرين على العمل والكسب المشروع. المنشآت: أي منشأة حكومية أو غير حكومية تقدم البرامج الاجتماعية أو المهنية للأشخاص ذوي الإعاقة المعتمدة من الوزارة. اللائحة: اللائحة التنظيمية للبرامج الاجتماعية والمهنية للأشخاص ذوي الإعاقة. القواعد التنفيذية: القواعد التنفيذية للائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تعمل الوزارة في سبيل تنفيذ أحكام اللائحة وقواعدها التنفيذية على ما يلي: تطوير قاعدة البيانات الاجتماعية للأشخاص ذوي الإعاقة. اعتماد طرق تقييم الإعاقة التي يحدد على أساسها المستوى الملائم من البرامج للأشخاص ذوي الإعاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: للوزارة تقييم الإعاقة بالتنسيق مع الجهات الحكومية ذات العلاقة، ولها إسناد التقييم إلى القطاع غير الحكومي تحت إشرافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تعتمد الوزارة ملاءمة البرامج المهنية بحسب أنواع الإعاقات وشدتها، وتحدد القواعد التنفيذية الاشتراطات اللازمة لذلك، على أن يراعى الآتي: أن يكون البرنامج المهني معتمدًا من الجهة الحكومية المختصة ويساهم في تمكين الشخص ذي الإعاقة من العمل والكسب المشروع. ألا تتجاوز مدة البرنامج المهني (ثلاث) سنوات. تهيئة البيئة المناسبة والترتيبات التيسيرية لتدريب الأشخاص ذوي الإعاقة في المنشأة التدريبية. أن تكون هناك معايير واضحة لاجتياز البرنامج المهني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تحدد القواعد التنفيذية ضوابط تقديم البرامج المهنية الحاصلة على اعتماد الملاءمة للأشخاص ذوي الإعاقة في منشآت التدريب المهني المخصصة للأشخاص ذوي الإعاقة أو غيرهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يشترط لقبول الشخص ذي الإعاقة في البرامج المهنية الحكومية ما يلي: أن يكون قابلًا للتدريب المهني بناء على تقييم الإعاقة. أن يكون قد أكمل الخامسة عشرة من عمره وألا يكون قد تجاوز الخامسة والأربعين. ألا يكون موظفًا في القطاع العام أو القطاع الخاص. أن يكون سعودي الجنسية، أو من أبناء القبائل النازحة ومن في حكمهم، أو من أبناء المواطنات من غير السعوديين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجوز للوزارة عقد شراكات استراتيجية مع الجهات الحكومية ذات العلاقة والقطاع غير الحكومي؛ لتقديم البرامج المهنية من قبل تلك الجهات في إطار الأحكام الواردة في اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يحق للأشخاص ذوي الإعاقة الاستفادة من الشراكات الاستراتيجية القائمة للتدريب المنتهي أو المبتدئ بالتوظيف بين الجهات الحكومية ذات العلاقة والقطاع غير الحكومي، وفق الأحكام المذكورة في اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يستفيد الشخص ذو الإعاقة من برنامج مهني واحد فقط في المنشآت التي تتحمل الدولة تكاليفها وفقاً للمادة (الثالثة والعشرين) من اللائحة، ولا يحول ذلك دون إمكانية استفادته من برامج مهنية إضافية أو إعادة البرنامج المهني على حسابه الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تحدد القواعد التنفيذية الاشتراطات الخاصة باعتماد وتطوير البرامج الاجتماعية والإشراف عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تحدد القواعد التنفيذية الضوابط الخاصة بتقديم البرامج الاجتماعية في المنشآت الحكومية على أن تتضمن الآتي: الاشتراطات الإدارية والفنية والتشغيلية اللازمة لتنفيذ الخدمات الاجتماعية، والاشتراطات الخاصة بتنفيذ الخدمات الإيوائية المقدمة في برنامج الإيواء للأشخاص ذوي الإعاقة. تحديد الفترات الزمنية للاستفادة من البرامج.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يشترط للقبول في برنامج الإيواء للأشخاص ذوي الإعاقة في دور الإقامة المؤقتة الحكومية، أن يكون الأشخاص من ضمن الحالات الآتية: الأشخاص ذوو الإعاقة الذهنية المتوسطة أو الشديدة أو ذوو الإعاقات المتعددة الشديدة ممن تثبت البحوث الاجتماعية عدم مقدرة أسرهم على خدمتهم، ولا تتوفر برامج اجتماعية في بلد سكنهم. الأشخاص ذوو الإعاقة المتوسطة أو الشديدة المتعرضون للعنف والإيذاء، المحالة حالتهم من الحماية الأسرية. الأشخاص ذوو الإعاقة الملتحقون بمراكز التدريب المهني الحكومية خارج المدينة أثناء فترة تنفيذ البرنامج التدريبي، على ألا يكون مستفيداً خلال تلك الفترة من أي خدمات إيوائية على نفقة الدولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: للوزارة قبول الأشخاص ذوي الإعاقة ممن لا تنطبق عليهم شروط القبول المشار إليها في المادة (الثانية عشرة) من اللائحة، في دور الإقامة المؤقتة الحكومية على حسابهم الخاص. ويشمل ذلك الأشخاص ذوي الإعاقة من غير السعوديين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجوز تقديم برنامج الإيواء للأشخاص ذوي الإعاقة في مقار السكن الدائم للأشخاص ذوي الإعاقة من ذوي الظروف الاجتماعية الخاصة غير القادرين على العمل إذا كانوا من ذوي الإعاقة الذهنية أو المتعددة أو طريحي الفراش.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'يشترط لقبول الشخص ذي الإعاقة في برنامج الرعاية الاجتماعية المنزلية الحكومية، الآتي: أن يكون من ذوي الإعاقة الشديدة ممن لا يستطيعون الاعتماد على أنفسهم لأداء المهمات الحياتية اليومية بحسب تقييم الإعاقة المعتمد. ألا يوجد مقدم رعاية متفرغ له بالمنزل. أن يثبت البحث الاجتماعي مناسبة تقديم البرنامج له وفق المعايير المحددة في القواعد التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تحدد القواعد التنفيذية الاشتراطات اللازمة لقبول الأشخاص ذوي الإعاقة في برنامج الرعاية الاجتماعية اليومية الحكومية، على أن يراعى أن يكون الشخص من ذوي الإعاقة الذهنية المتوسطة أو الشديدة ممن تمنعهم شدة إعاقتهم من الاستفادة من البرامج التعليمية الخاصة بوزارة التعليم أو برامج التدريب المهني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تحدد القواعد التنفيذية الضوابط الخاصة بتقديم الخدمات الاجتماعية المساندة، بالتنسيق مع الجهات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'تحدد القواعد التنفيذية ضوابط صرف واستحقاق الشخص ذي الإعاقة للأجهزة المساعدة على أن يراعي الآتي: أن يكون مستحقاً للجهاز بناءً على تقييم الإعاقة. أن يكون سعودي الجنسية، أو من أبناء القبائل النازحة ومن في حكمهم، أو من أبناء المواطنات من غير السعوديين. ألا يكون مستفيداً من الإقامة في أي خدمة إيوائية حكومية أو على نفقة الدولة داخل المملكة أو خارجها لمدة تزيد على (مائة وثمانين) يوماً في السنة الواحدة. ألا تصرف له الأجهزة المساعدة من أي جهة حكومية أخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يجوز للجهات الحكومية تقديم برامجها التخصصية للأشخاص ذوي الإعاقة في المنشآت المتخصصة بتقديم البرامج الاجتماعية التابعة للوزارة، كالبرامج التعليمية، والبرامج الثقافية، والبرامج الصحية، وغيرها من البرامج التي تناسب احتياجات الأشخاص ذوي الإعاقة تحت إشراف تلك الجهات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: إذا كان الأشخاص ذوو الإعاقة في المنشأة من الجنسين، فعلى المنشأة فصل الخدمات المقدمة للذكور عن الخدمات المقدمة للإناث فصلًا تامًا، مع توفير القوى التشغيلية اللازمة لذلك. يحدد الوزير بالاتفاق مع وزير العدل العمر الذي لا يجوز فيه لأي من الجنسين خدمة الجنس الآخر. ويجوز للوزير استثناء الأشخاص ذوي الإعاقة من الذكور ممن تثبت تقاريرهم الطبية -المعتمدة من لجنة طبية من أطباء استشاريين من ذوي الاختصاص- وجود مشكلة نمائية تمنعهم من النضج الجسدي للوصول إلى مرحلة البلوغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'لا يقبل في البرامج الاجتماعية أو المهنية المقدمة في المنشآت الحكومية التابعة للوزارة: المصابون بأمراض سارية أو معدية أو باضطرابات نفسية تشكل خطراً على أنفسهم أو الآخرين. غير المستقرين صحيّاً ممن يحتاجون إلى رعاية صحية تحول دون استفادتهم من هذه البرامج.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 'تقدم البرامج الاجتماعية أو المهنية -حسب اشتراطات القبول في كل برنامج- في المنشآت الحكومية للأشخاص ذوي الإعاقة من السعوديين، ويعد في حكم السعوديين لأغراض تطبيق هذا الحكم كل من: أبناء القبائل النازحة ومن في حكمهم. أبناء المواطنات من غير السعوديين. المستفيدين من خدمات المنشآت الحكومية على حسابهم الخاص، أو من تتحمل دولهم أو المؤسسات الربحية أو غير الربحية تكاليف خدماتهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'تتحمل الدولة تكاليف البرامج الاجتماعية والمهنية -تحملاً كاملاً أو جزئيّاً- للشخص ذي الإعاقة في المنشآت غير الحكومية عند تعذر إلحاقه بالمنشآت الحكومية، وفق الضوابط التالية: أن يكون سعودي الجنسية، أو من أبناء القبائل النازحة، أو من أبناء المواطنات من غير السعوديين. ألا يكون مصابًا بأمراض سارية أو معدية أو باضطرابات نفسية تشكل خطراً على نفسه أو الآخرين. ألا يكون غير مستقر صحيّاً ممن يحتاج إلى رعاية صحية تحول دون استفادته من هذه البرامج. أن تنطبق عليه شروط القبول بالبرامج بحسب أنواعها. ألا يكون موظفًا في القطاع العام أو القطاع الخاص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تحدد الوزارة المنشآت غير الحكومية التي يحوَّل الأشخاص ذوو الإعاقة إليها للاستفادة من برامجها استفادة كاملة أو جزئية وفق الاشتراطات المذكورة في القواعد التنفيذية، على أن يراعى في ذلك التغطية الجغرافية لأماكن إقامة الأشخاص ذوي الإعاقة وبما يتناسب مع احتياجاتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تحدد القواعد التنفيذية إجراءات إنهاء الخدمات للأشخاص ذوي الإعاقة من البرامج الاجتماعية أو المهنية الحكومية أو التي تتحمل الدولة تكاليفها، وإجراءات إحالتهم إلى البرامج الأخرى سواء المقدمة من الوزارة أو التي توفرها الدولة في الجهات الحكومية الأخرى لضمان تغطية احتياجاتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: للوزارة -في حال امتناع الشخص ذي الإعاقة- الاستعانة بالجهات الحكومية ذات العلاقة لتنفيذ إجراءات الخروج من البرنامج بعد انتهائه أو انتفاء شروط القبول عنه، وكذلك تنفيذ إجراءات الإحالة المذكورة في المادة (الخامسة والعشرين) من اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تحدد القواعد التنفيذية معايير متابعة تنفيذ البرامج ومراقبة جودة الأداء. وللوزارة إسناد المتابعة إلى القطاع غير الحكومي تحت إشرافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يصرف للمستحق من الأشخاص ذوي الإعاقة وفق المادة (التاسعة والعشرين) من اللائحة دعم مالي لا يتجاوز (20) عشرين ألف ريال سنويّاً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'تحدد القواعد التنفيذية ضوابط استحقاق الشخص ذي الإعاقة للدعم المالي استحقاقاً كاملاً أو جزئيّاً، دائماً أو مؤقتاً، وفق التالي: أن يكون مستحقاً للدعم بناءً على تقييم الإعاقة وشدتها. أن يكون سعودي الجنسية، أو من أبناء القبائل النازحة ومن في حكمهم، أو من أبناء المواطنات من غير السعوديين. ألا يكون مستفيداً من أي خدمة إيوائية حكومية، أو أي خدمة إيوائية أخرى على نفقة الدولة سواء داخل المملكة أو خارجها لمدة تزيد على (مائة وثمانين) يوماً في السنة الواحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يصرف الدعم المالي للشخص ذي الإعاقة كامل الأهلية. وإذا كان قاصرًا أو صدر في شأنه حكم قضائي يثبت نقص أو فقدان الأهلية فيصرف الدعم لمقدم الرعاية من أسرته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يجوز الجمع بين الدعم المالي الخاص بالشخص ذي الإعاقة وأي إعانة أو دعم مالي آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يستحق الأشخاص ذوو الإعاقة السعوديون الملتحقون بالبرامج المهنية مكافأة مالية شهرية أثناء فترة التحاقهم بالبرنامج، قدرها (800) ثمانمائة ريال للأعزب، و(1200) ألف ومائتا ريال للمتزوج. وفي حالة الإقامة في أي خدمة إيوائية حكومية أو على نفقة الدولة تخفض هذه المكافأة بنسبة (%50).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: تحدد القواعد التنفيذية ضوابط صرف المكافأة المالية الشهرية اعتبارًا من تاريخ الالتحاق بالبرامج المهنية بما في ذلك ما يتصل بالإجازات، وضوابط إيقاف الصرف للمتعثرين في البرامج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يمنح الأشخاص ذوو الإعاقة السعوديون القادرون على العمل منحة مالية لإقامة مشروعاتهم سواء كانت بصفة فردية أو بمشاركة الغير بقيمة (50,000) خمسين ألف ريال للشخص لمرة واحدة فقط، وفق الضوابط التي تحددها القواعد التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: للشخص ذي الإعاقة كامل الأهلية الحق في اتخاذ جميع الإجراءات اللازمة لتمكينه من الاستفادة مما نصت عليه أحكام اللائحة من مزايا. مع مراعاة اختصاصات الجهات ذات العلاقة، للوزارة حق الولاية على النفس على من صدر في شأنه حكم قضائي يثبت نقص أو فقدان أهليته مبني على تقييم صحي لقدراته ونضجه الذهني ولا يوجد له ولي شرعي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: لا يخل ما ورد في هذه اللائحة من حقوق وخدمات تقدم للشخص ذي الإعاقة، بأي حق أو خدمة أفضل ترد في نصوص نظامية أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يشكل الوزير بقرار منه لجنة (أو أكثر) للنظر في التظلمات التي تقدم للوزارة من القرارات الناتجة عن تطبيق اللائحة، على ألا يقل عدد أعضائها عن (ثلاثة) أعضاء، من مستشارين نظاميين، ومختصين في مجال البرامج الاجتماعية والبرامج المهنية. تحدد قواعد وإجراءات عمل اللجنة ومكافآت أعضائها بقرار من الوزير. يجوز الاعتراض أمام المحكمة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يصدر الوزير القواعد التنفيذية خلال (مائة وثمانين) يوماً من تاريخ صدور اللائحة، وتنشر في موقع الوزارة الإلكتروني، ويعمل بها من تاريخ العمل باللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: تحل اللائحة محل اللائحة الأساسية لبرامج تأهيل المعوقين، الصادرة بقرار مجلس الوزراء رقم (٣٤) وتاريخ ١٠ / ٣ / ١٤٠٠هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يعمل باللائحة بعد (مائة وثمانين) يوماً من تاريخ نشرها في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/80edfc3f-789b-4abf-9920-b13700da43e8/1
  verified: false
