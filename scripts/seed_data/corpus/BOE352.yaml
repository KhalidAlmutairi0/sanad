articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: المعهد: المعهد الملكي للفنون التقليدية. التنظيم: تنظيم المعهد. الوزير: وزير الثقافة. المجلس: مجلس أمناء المعهد. رئيس المجلس: رئيس مجلس أمناء المعهد. المجلس العلمي: المجلس العلمي للمعهد. الفنون التقليدية: فنون مورثة، ترتبط بالهوية الوطنية، وتنتقل عبر الأجيال، أنتجتها المجتمعات المحلية أو طورتها. وتشمل المنتجات الحرفية والأعمال الفنية التقليدية. الكنوز الحية: الأشخاص الذين يمتلكون درجة عالية جدًّا من المعرفة والمهارات المطلوبة لأداء أو إعادة إنشاء عناصر محددة من التراث غير المادي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المعهد بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير، ويكون مقره الرئيس في مدينة الرياض، وله -بقرار من المجلس- إنشاء فروع أو مكاتب تابعة له بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المعهد إلى الإسهام في العناية بالفنون التقليدية، وذلك من خلال تحقيق الأهداف الآتية: التأكيد على الهوية الوطنية من خلال إثراء الفنون التقليدية، والترويج لها. تشجيع وتدريب المواهب والقدرات في مجالات الفنون التقليدية، وتوفير برامج تعليمية في مجالات الفنون التقليدية. تقدير الكنوز الحية والمتميزين وذوي الريادة والإسهامات في مجالات الفنون التقليدية، وتكريمهم، وتوفير المحفزات والدعم المادي لهم -وفقاً للإجراءات النظامية المتبعة- لمواصلة أعمالهم والتعريف بها. المساهمة في المحافظة على أصول الفنون التقليدية المادية وغير المادية. رفع مستوى الوعي بالفنون التقليدية في المملكة، ونشرها، والتعريف بها محليًّا ودوليًّا، وتشجيع ودعم الجهود الهادفة إلى المحافظة عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يقوم المعهد بكل ما يلزم في سبيل تحقيق أهدافه، ومن ذلك ما يأتي: بناء الأطر والمعايير الفنية المرتبطة بتطوير البرامج التعليمية والتدريبية في الفنون التقليدية، وفق متطلبات الإطار الوطني للمؤهلات. تصميم وإقامة برامج تدريبية وبرامج إعدادية ودبلومات في مجالات الفنون التقليدية، وذلك بالتنسيق مع الجهات ذات العلاقة. تطوير وتنفيذ برامجه التعليمية الأكاديمية في مجالات الفنون التقليدية، وذلك بالتنسيق مع الجهات ذات العلاقة. وضع الشروط اللازمة لممارسة مهن التعليم والتدريب في مجالات الفنون التقليدية في المملكة، ومتابعة تطبيقها، وذلك بالتنسيق مع الجهات ذات العلاقة. احتضان وتبني ودعم واعتماد برامج التلمذة في مجالات الفنون التقليدية، وذلك بالتنسيق مع الجهات ذات العلاقة. ابتعاث منسوبي المعهد وإيفادهم للدراسة والتدريب في المجالات ذات العلاقة بنشاطات المعهد. تقديم منح دراسية وتدريبية ومكافآت وجوائز تشجيعية للمواهب وذوي القدرات في مجالات الفنون التقليدية، وذلك بالتنسيق مع الجهات ذات العلاقة، ومن خلال لوائح تقر بالاتفاق مع وزارة المالية فيما له أثر مالي. تكريم الكنوز الحية والمتميزين وذوي الريادة
    والإسهامات في مجالات الفنون التقليدية. إعداد الدراسات والاستشارات والخدمات في مجال اختصاص المعهد للجهات الحكومية وغيرها، داخل المملكة وخارجها. وضع الآليات والممكنات التي تساعد على تطوير المنتجات الحرفية والأعمال الفنية التقليدية للحرفيين والطلاب المتدربين في المعهد وعرضها وبيعها. إثراء الفنون التقليدية عن طريق التأليف وإجراء البحوث والدراسات في مجالاتها. تنظيم المؤتمرات المحلية والدولية والندوات واللقاءات وورش العمل والفعاليات والمسابقات الفنية ذات الصلة بالفنون التقليدية، والمشاركة فيها داخل المملكة وخارجها، وذلك وفقًا للإجراءات النظامية المتبعة. بناء الشراكات المحلية والدولية والاستعانة بالكفايات والخبرات وبيوت الخبرة المحلية والدولية المتخصصة في مجالات عمل المعهد بما يسهم في تحقيق أهدافه، وفقًا للإجراءات النظامية المتبعة. الاشتراك في عضوية المعاهد والاتحادات والمنظمات والهيئات الإقليمية والدولية وما في حكمها ذات العلاقة باختصاصات المعهد، وفقًا للإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمعهد مجلس أمناء برئاسة الوزير، وعضوية كل من: أ‌- نائب وزير الثقافة (نائباً لرئيس المجلس). ب‌- ثمانية من المتخصصين -من غير منسوبي المعهد- من ذوي الخبرة في المجالات ذات العلاقة باختصاص المعهد. يصدر بتعيين الأعضاء -الواردين في الفقرة (1 / ب) من هذه المادة - أمر من رئيس مجلس الوزراء بناء على ترشيح من الوزير، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد لمرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا المهيمنة على شؤون المعهد وإدارته وتصريف أموره ووضع السياسة العامة التي يسير عليها، وله جميع الصلاحيات اللازمة لتحقيق أهدافه وتنفيذ مهماته، وله على وجه خاص ما يأتي: إقرار استراتيجية المعهد، ومتابعة تنفيذها. إقرار السياسات المتعلقة بنشاط المعهد، والخطط والبرامج اللازمة لتنفيذها. إقرار المعايير والضوابط اللازمة لتسيير عمل المعهد. إقرار هيكل المعهد التنظيمي. إقرار مكافآت أعضاء المجلس العلمي ومزاياهم، من خلال لوائح بالاتفاق مع وزارة المالية. الموافقة على إنشاء فروع ومكاتب للمعهد. اعتماد الأطر والمعايير الفنية المرتبطة بتطوير البرامج التعليمية والتدريبية في الفنون التقليدية، وفق متطلبات الإطار الوطني للمؤهلات. إقرار معايير ومتطلبات وتصنيفات برامج التلمذة التي تقدم في المعهد ومن يقدمها من مهرة ومحترفين، واللوائح المنظمة لهذه البرامج بما يشمل تحديد مدد برامج التلمذة وأوقاتها وأسس تقديمها ومعايير اجتيازها ودرجات الإتقان فيها. إقرار الآليات والممكنات التي تساعد على تطوير المنتجات الحرفية والأعمال الفنية التقليدية للحرفيين والطلاب المتدربين في المعهد وعرضها
    وبيعها. إقرار اللوائح المالية والإدارية، وغيرها من اللوائح اللازمة لتسيير عمل المعهد وشؤونه، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح أو القرارات الأخرى بالاتفاق مع وزارة المالية. إقرار المقابل المالي للبرامج التدريبية والتعليمية التي يقدمها المعهد وما يقدمه المعهد من خدمات واستشارات. الموافقة على مشروع ميزانية المعهد السنوية، والحساب الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود ومذكرات التفاهم والشراكات بحسب الإجراءات النظامية المتبعة. الموافقة على استثمار أموال المعهد وفقًا للتعليمات والأحكام المنظمة لذلك. الموافقة على اشتراك المعهد في المعاهد والاتحادات والمنظمات والهيئات الإقليمية والدولية وما في حكمها ذات العلاقة باختصاصات المعهد، وفقًا للأنظمة والتعليمات. تعيين مراجع حسابات خارجي ومراقب مالي داخلي. النظر في التقارير الدورية التي تقدم عن سير العمل في المعهد. قبول الهبات
    والتبرعات والمنح والوصايا والأوقاف، وفقًا للأحكام المنظمة لذلك. وللمجلس في سبيل تحقيق اختصاصاته تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يوكل إليها ما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها، وللمجلس كذلك تفويض بعض مهماته أو صلاحياته إلى رئيسه أو إلى من يراه من أعضائه أو منسوبي المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المعهد، ويجوز عند الاقتضاء عقدها في أي مكان آخر. يعقد المجلس اجتماعاته بصفة دورية (أربع) مرات في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك (ثلث) أعضائه على الأقل. توجه الدعوة للاجتماع من رئيس المجلس كتابة قبل موعد الاجتماع بـ(سبعة) أيام عل الأقل، على أن تتضمن الدعوة جدول أعمال الاجتماع. يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز أن تعقد الاجتماعات وأن يصوت عليها عن بُعد من خلال استخدام وسائل التقنية، ويمكن أن تتخذ القرارات بطريق التمرير على الأعضاء، وفي هذه الحالة يشترط موافقة جميع أعضاء المجلس على القرار، ويعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر عنه عند غيابه، وللعضو المعترض تسجيل اعتراضه
    وأسباب الاعتراض ضمن المحضر. لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار المعهد. للمجلس دعوة من يراه لحضور اجتماعاته للاستفادة من خبراته دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمعهد رئيس تنفيذي، يتم تعيينه وإعفاؤه من منصبه بقرار من المجلس، ويحدد قرار التعيين أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون المعهد، ويمارس المهمات التي تمكنه من ذلك، وله بوجه خاص ما يأتي: الإشراف على إعداد استراتيجية المعهد، ورفعها إلى المجلس. اقتراح السياسات المتعلقة بنشاط المعهد، والخطط والبرامج اللازمة لتنفيذها، واللوائح الإدارية والمالية والداخلية وغيرها من اللوائح والمعايير والضوابط اللازمة لتسيير عمل المعهد، والهيكل التنظيمي للمعهد، والرفع بها إلى المجلس. الإشراف على إعداد تقرير المعهد السنوي ومشروع ميزانيته وحسابه المالي الختامي؛ تمهيداً لعرضها على المجلس وفقًا للإجراءات المتبعة. اعتماد إصدار الأوامر بمصروفات المعهد وفقًا للميزانية السنوية المعتمدة، واتخاذ جميع الإجراءات المالية وفقًا للأنظمة واللوائح المعتمدة، وفي حدود الصلاحيات التي يفوضه بها المجلس. متابعة تنفيذ القرارات الصادرة من المجلس. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاص المعهد. الإشراف على إعداد التقارير الخاصة بتنفيذ خطط المعهد وبرامجه، وعرضها على المجلس.
    تمثيل المعهد أمام الجهات القضائية، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. التعاقد مع الخبراء والمستشارين في حدود أغراض المعهد، ووفقًا لما تحدده اللوائح. الموافقة على عقد المعهد المؤتمرات والندوات واللقاءات وورش العمل والفعاليات والمسابقات الفنية ذات الصلة بعمله، والمشاركة فيها، وفق الإجراءات النظامية المتبعة. التوقيع على الاتفاقيات والبروتوكولات والعقود ومذكرات التفاهم والشراكات بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. تعيين العاملين في المعهد، والإشراف على سير العمل فيه، وفقاً للوائح والخطط والبرامج المعتمدة. اعتماد منح الشهادات والمؤهلات العلمية وفقاً للوائح التي يصدرها المجلس. إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناءً عليه، بحسب الصلاحيات المخولة له. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض صلاحياته أو مهماته إلى من يراه من منسوبي المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمعهد مجلس علمي برئاسة الرئيس التنفيذي، وعضوية عدد لا يتجاوز (تسعة) من المختصين في الفنون التقليدية. يعين أعضاء المجلس العلمي بقرار من مجلس الأمناء بناء على توصية من الرئيس التنفيذي، لمدة (سنتين) قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يتولى المجلس العلمي أعمال الدراسة والمراجعة وتقديم الرأي العلمي في جميع المسائل والجوانب المتعلقة بالفنون التقليدية، وغيرها مما تحدده لوائح المعهد، وما يحال إليه من المجلس أو رئيس المجلس أو الرئيس التنفيذي. للمجلس العلمي تشكيل لجان دائمة أو مؤقتة من أعضائه يكلفها بما يراه من مهمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يعقد المجلس العلمي اجتماعاته بصفة دورية (أربع) مرات في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيسه، أو إذا طلب ذلك أغلبية الأعضاء على الأقل. توجه الدعوة لاجتماع المجلس العلمي من رئيسه، وتعقد الاجتماعات برئاسة رئيسه أو من ينيبه من الأعضاء. لا يكون اجتماع المجلس العلمي نظاميًّا إلا بحضور أغلبية أعضائه على الأقل، على أن يكون من بينهم رئيس المجلس العلمي أو من ينيبه من الأعضاء. تصدر توصيات المجلس العلمي بموافقة أغلبية الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. لرئيس المجلس العلمي دعوة من يراه لحضور اجتماعات المجلس العلمي دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتكون موارد المعهد مما يأتي: أ- ما يخصص له في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه نظير الخدمات والاستشارات التي يقدمها. ج- المقابل المالي الذي يتقاضاه نظير البرامج التدريبية والتعليمية التي يقدمها. د- الإيرادات التي يحصل عليها مقابل نتاجه العلمي. هـ- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع الأوقاف. و- عوائد استثماراته وريع أملاكه وما ينتج من التصرف فيها. ز- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع أموال المعهد في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المعهد حسابًا له في البنك المركزي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تكون للمعهد ميزانية سنوية مستقلة تعد وتصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمعهد هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة بالرقابة على حسابات وعمليات المعهد، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم رسميًّا بالعمل في المملكة؛ لتدقيق حسابات ومعاملات المعهد وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يخضع منسوبو المعهد لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2a2a2b5d-ceb3-4d1f-893e-b058008b5638/1
  verified: false
