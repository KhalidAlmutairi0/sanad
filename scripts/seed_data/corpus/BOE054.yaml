articles:
- article_ref: المادة الأولى
  article_text_ar: تعد علامة تجارية في تطبيق أحكام هذا النظام الأسماء المتخذة شكلا مميزا أو الإمضاءات أو الكلمات أو الحروف أو الأرقام أو الرسوم أو الرموز أو الأختام أو النقوش البارزة، أو أي إشارة أخرى أو أي مجموع منها تكون قابلة للإدراك بالنظر وصالحة لتمييز منتجات صناعية أو تجارية أو حرفية أو زراعية أو مشروع استغلال للغابات أو ثروة طبيعية، أو للدلالة على أن الشيء المراد وضع العلامة عليه يعود لمالك العلامة بداعي صنعه أو انتقائه أو اختراعه أو الاتجار به، أو للدلالة على تأدية خدمة من الخدمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'لا تعد ولا تسجل علامة تجارية الإشارات والشعارات والأعلام وغيرها الوارد بيانها أدناه: أ - الإشارات الخالية من أية صفة مميزة والتي تعد وصفا لخصائص المنتجات أو الخدمات أو تكون مجرد أسماء عادية يطلقها العرف على المنتجات أو الخدمات.ب - كل تعبير أو إشارة أو رسم مخل بالدين أو يكون مطابقا أو مماثلا لرمز ذي صبغة دينية.جـ ـ كل تعبير أو إشارة أو رسم مخالف للنظام العام أو الآداب العامة.د - الشعارات العامة والأعلام وغيرها من الرموز والأسماء أو التسميات الخاصة بالمملكة أو بإحدى الدول التي تعاملها بالمثل، أو بإحدى الدول الأعضاء في اتفاقية دولية متعددة الأطراف تكون المملكة طرفا فيها، أو بمنظمة دولية أو حكومية، وكذلك أي تقليد لهذه الشعارات أو الأعلام أو الرموز أو الأسماء أو التسميات ما لم يكن مصرحا بذلك من الجهة المالكة لها.هـ - الشارات و الدمغات الرسمية للمملكة وللدول والمنظمات المشار إليها في الفقرة (د) إذا كانت هذه الشارات والدمغات خاصة برقابتها على المنتجات أو الخدمات أو ضمانها ما لم يكن مصرحا بذلك من الجهة المالكة لها.ولا يسري هذا الحظر إلا عندما تكون العلامة معدة للاستعمال على المنتجات
    نفسها أو الخدمات أو على منتجات أو خدمات مشابهة.و- الأسماء الجغرافية إذا كان استعمالها من شأنه أن يحدث لبسا فيما يتعلق بمصدر المنتجات أو الخدمات أو أصلها، أو إذا كان من شأنه احتكار بيان للمصدر أو تسمية المنشأ دون وجه حق.ز - صور الآخرين أو أسماؤهم الشخصية أو التجارية ما لم يوافقوا هم أو ورثتهم على استعمالها.ح - البيانات الخاصة بدرجات الشرف.ط - البيانات التي من شأنها أن تضلل الجمهور، أو تتضمن بيانات كاذبة عن مصدر المنتجات أو الخدمات أو صفاتها الأخرى، وكذلك العلامات التي تحتوي على بيان اسم تجاري وهمي أو مقلد أو مزور.ي - العلامات المطابقة أو المشابهة للعلامات الشائعة الشهرة في المملكة ولو كانت غير مسجلة فيها على سلع أو خدمات مطابقة أو مشابهة والعلامات المطابقة أو المشابهة لتلك الشائعة الشهرة في المملكة والمسجلة فيها على سلع أو خدمات ليست مطابقة أو مشابهة شريطة أن يلحق ذلك الانتفاع الضرر بصاحب العلامة شائعة الشهرة.ك - العلامات المملوكة لأشخاص طبيعيين أو معنويين يحظر التعامل معهم وفقا لقرار صادر من قبل الجهة المختصة.ل - الإشارات المطابقة أو المشابهة لعلامات تجارية سبق إيداعها أو تسجيلها من
    قبل الآخرين على منتجات أو خدمات مطابقة أو مشابهة، وكذلك الإشارات التي ينشأ عن تسجيلها بالنسبة لبعض المنتجات أو الخدمات الحط من قيمة منتجات الآخرين أو خدماتهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يعد سجل بالإدارة المختصة بوزارة التجارة يسمى ( سجل العلامات التجارية ) تقيد فيه جميع العلامات التجارية المسجلة وإخطارات التنازل عن ملكيتها أو نقلها أو رهنها أو الحجز عليها أو الترخيص باستعمالها وكذلك تجديدها أو شطبها، وجميع البيانات التي تنص عليها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للفئات الآتية الحق في تسجيل العلامات التجارية: أ - الأشخاص الطبيعيون أو المعنويون المتمتعون بالجنسية السعودية.ب - الأشخاص المقيمون في المملكة عادة والمصرح لهم بمباشرة عمل من الأعمال التجارية أو الأعمال الحرفية.ج - الأشخاص المنتمون إلى دولة تعامل المملكة بالمثل.د - الأشخاص المنتمون إلى دولة عضو في اتفاقية دولية متعددة الأطراف تكون المملكة طرفا فيها أو يقيمون في تلك الدولة.هـ - المصالح العامة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يقدم طلب تسجيل لكل علامة تتوافر فيها الشروط المنصوص عليها في المادة الأولى من هذا النظام من صاحب الشأن إذا كان له موطن في المملكة أو من وكيل رسمي له موطن فيها؛ وذلك إلى الإدارة المختصة بوزارة التجارة وفقا للشروط والإجراءات التي تحددها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجوز طلب تسجيل العلامة عن فئة واحدة أو أكثر من فئات المنتجات أو الخدمات، وتتعدد الطلبات بتعدد الفئات المطلوب تسجيل العلامة عنها، وذلك وفق الشروط والإجراءات التي تحددها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجوز تقديم طلب واحد لتسجيل مجموعة من العلامات المتطابقة من حيث عناصرها الجوهرية، ويقتصر اختلافها على أمور لا تمس ذاتيتها مساسا جوهريا كلون العلامات أو بيان المنتجات أو الخدمات المرتبطة بها، على أن تكون هذه المنتجات أو الخدمات تابعة لنفس الفئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: في حال طلب شخصين أو أكثر تسجيل العلامة نفسها، أو علامات متشابهة بشكل يحدث اللبس عن فئة واحدة من فئات المنتجات أو الخدمات، وكان للطلبات تاريخ الإيداع ذاته أو تاريخ الأولوية ذاته، يوقف طلب التسجيل إلى أن يقدم أحدهم تنازلا كتابيا من المنازعين له مصدقا عليه نظاما، أو إلى أن يصدر حكم نهائي من ديوان المظالم بأحقية أحدهم في التسجيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: إذا رغب طالب تسجيل علامة أو خلفه في التمتع بحق الأولوية استنادا إلى طلب سابق مودع في دولة عضو في اتفاقية دولية متعددة الأطراف تكون المملكة طرفا فيها، أو دولة أخرى تعامل المملكة معاملة المثل، فعليه أن يرفق بطلبه إقرارا يبين فيه تاريخ الطلب السابق ورقمه والدولة التي أودع فيها هذا الطلب، كما يتعين على الطالب أن يودع صورة من الطلب السابق مصدقا عليها من السلطة المختصة في الدولة التي أودع فيها، وذلك خلال ستة أشهر من تاريخ تقديم طلب التسجيل الذي يدعي من أجله حق الأولوية وإلا سقط حقه في المطالبة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: على الإدارة المختصة بوزارة التجارة أن تبت في طلب التسجيل خلال ستين يوما من تاريخ تقديمه، متى كان مستوفيا للشروط والإجراءات المنصوص عليها في هذا النظام واللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: إذا رأت الإدارة المختصة أن طلب التسجيل لا يتفق وأحكام هذا النظام، فعليها أن تبلغ طالب التسجيل كتابيا بذلك، ولها أن تطلب استيفاء الشروط أو إدخال التعديلات اللازمة لقبول طلب التسجيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: إذا لم يستجب طالب التسجيل لطلبات الإدارة المختصة باستيفاء الشروط أو إدخال التعديلات خلال تسعين يوما من تاريخ إبلاغه بذلك، اعتبر طلبه مرفوضا من تاريخ فوات هذا الميعاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لصاحب الشأن التظلم لوزير التجارة من القرار الصادر برفض طلبه خلال ستين يوما من تاريخ إبلاغه به، وإذا صدر قرار الوزير برفض التظلم كان لصاحب الشأن حق الطعن فيه أمام ديوان المظالم خلال ثلاثين يوما من تاريخ إبلاغه به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: في حالة قبول تسجيل العلامة تقوم الإدارة المختصة بالشهر عنها بالكيفية والإجراءات التي تحددها اللائحة التنفيذية، ويلزم طالب التسجيل بتكاليف الشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لكل ذي مصلحة الاعتراض على قبول تسجيل العلامة أمام ديوان المظالم خلال تسعين يوما من تاريخ شهرها، مع إيداع نسخة من الاعتراض وما يفيد تقديمه لدى الإدارة المختصة بوزارة التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تقوم الإدارة المختصة بتسجيل العلامة في السجل المنصوص عليه في المادة (الثالثة) من هذا النظام بعد أن يصبح القرار الصادر بقبول تسجيل العلامة نهائياً، أو يصدر حكم في هذا الشأن من ديوان المظالم، ويتم التسجيل وفقا للإجراءات والشروط التي تحددها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعطى مالك العلامة التجارية بمجرد تمام تسجيلها شهادة تشمل البيانات التي تحددها اللائحة التنفيذية، وعلى الأخص :أ ـ الرقم المتتابع لتسجيل العلامة.ب ـ تاريخ إيداع طلب التسجيل وتاريخ التسجيل وتاريخ الأولوية إن وجدت.ج ـ الاسم التجاري أو اسم مالك العلامة ومحل إقامته وجنسيته.د ـ صورة للعلامة.هـ ـ بيان بالمنتجات أو الخدمات التي سجلت عنها العلامة وبيان فئتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: لمالك العلامة التجارية التي تم تسجيلها أن يطلب من الإدارة المختصة إدخال أي إضافات أو تعديلات عليها لا تمس ذاتيتها مساسا جوهرياً، وتسري على هذا الطلب الشروط والإجراءات الخاصة بطلبات التسجيل الأصلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: لكل ذي مصلحة الاطلاع على السجل المنصوص عليه في المادة (الثالثة) من هذا النظام، وطلب بيانات أو صور مما هو مدون فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يكون لتسجيل العلامة التجارية أثره من تاريخ تقديم طلب التسجيل، ويثبت هذا التاريخ طبقا لما تحدده اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يعد من قام بتسجيل العلامة التجارية مالكا لها دون سواه، ويكون انتفاع أي شخص بعلامة مسجلة مشروطا بموافقة مالكها. ولمالك العلامة التجارية المسجلة الحق في رفع دعوى قضائية لطلب منع غيره من استعمالها أو استعمال أي إشارة أخرى مشابهة لها يكون من شأنها تضليل الجمهور بالنسبة للمنتجات أو الخدمات التي سجلت عنها العلامة، وكذلك بالنسبة للمنتجات أو الخدمات المماثلة. ويستثنى من الحقوق الناشئة عن تسجيل العلامة الاستخدام المنصف للإشارات والعبارات والرسوم الوصفية الخالية من الصفة المميزة التي اشتملت عليها العلامة المسجلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تستمر حقوق صاحب الشأن المترتبة على تسجيل العلامة التجارية لمدة عشر سنوات ما لم يتم تجديدها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: لمالك العلامة التجارية أن يقدم طلبا لتجديد تسجيلها خلال السنة الأخيرة من مدة حمايتها ولمدة ستة أشهر تالية لها، وذلك بالشروط والإجراءات المنصوص عليها في هذا النظام ولائحته التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تجدد العلامة التجارية دون أي فحص جديد، ويشهر عن تجديد التسجيل وفقا للشروط والإجراءات المنصوص عليها في اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'للإدارة المختصة ولكل ذي مصلحة أن يطلب شطب تسجيل العلامة التجارية في الأحوال الآتية : أ - إذا لم يقم مالك العلامة التجارية باستعمالها مدة خمس سنوات متتالية، دون عذر مشروع. ب - إذا تم تسجيل العلامة التجارية بالمخالفة للنظام العام أو الآداب العامة.جـ - إذا تم تسجيل العلامة التجارية بناءً على غش أو بيانات كاذبة.ويختص ديوان المظالم بالفصل في طلبات شطب التسجيل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'يشطب تسجيل العلامة التجارية بقوة النظام في الحالتين الآتيتين: أ - العلامات التجارية التي لم يتم تجديد تسجيلها طبقا لهذا النظام ولائحته التنفيذية.ب - العلامات التجارية التي يمتلكها أشخاص طبيعيون أو معنويون وصدر من السلطة المختصة قرار بحظر التعامل معهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: إذا شطبت العلامة التجارية فلا يجوز تسجيلها لصالح الآخرين على المنتجات نفسها أو الخدمات أو على منتجات أو خدمات مشابهة إلا بعد ثلاث سنوات من تاريخ الشطب، إلا إذا نص قرار الشطب على مدة أقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يشهر شطب تسجيل العلامة التجارية وفقا للإجراءات والشروط المنصوص عليها في اللائحة التنفيذية. وينتج الشطب أثره من تاريخ صدور حكم ديوان المظالم أو انتهاء مدة الحماية، أو من تاريخ صدور قرار الحظر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يجوز أن تنتقل ملكية العلامة التجارية إلى الآخرين بأي واقعة أو تصرف ناقل للملكية، ويشترط في التصرف أن يكون كتابة، وألا يكون الغرض منه تضليل الجمهور وخاصة بالنسبة لطبيعة أو مصدر المنتجات والخدمات أو مميزاتها أو أدائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: إذا انتقلت ملكية المحل التجاري أو المشروع الذي تستخدم العلامة التجارية في تمييز منتجاته أو خدماته دون أن تنتقل ملكية العلامة ذاتها، فإنه يجوز لمن ظلت العلامة في ملكيته الاستمرار في استعمال هذه العلامة بالنسبة للمنتجات أو الخدمات التي سجلت من أجلها ما لم يتفق على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يجوز رهن العلامة التجارية أو الحجز عليها مع أو بدون المحل التجاري أو المشروع الذي تستخدم العلامة في تمييز منتجاته أو خدماته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: لا يكون نقل ملكية العلامة التجارية أو رهنها أو الحجز عليها منتجا لآثاره بالنسبة للآخرين إلا بعد شهره والتأشير به في السجل المنصوص عليه في المادة ( الثالثة ) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يجوز لمالك العلامة التجارية أن يرخص لأي شخص طبيعي أو معنوي باستعمالها عن كل أو بعض المنتجات أو الخدمات المسجلة عنها، ويكون لمالك العلامة الحق في أن يرخص لأشخاص آخرين باستعمالها، كما يحق له أن يستعملها بنفسه ما لم يتفق على غير ذلك، ولا يجوز أن تزيد مدة الترخيص عن مدة حماية العلامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يجب أن يكون عقد الترخيص مكتوبا وأن يصدق على توقيع المتعاقدين أو بصماتهم أو أختامهم بصفة رسمية، وذلك طبقا لما تحدده اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يجب قيد عقد الترخيص بالسجل المنصوص عليه في المادة (الثالثة) من هذا النظام، ولا يكون للترخيص أثره قبل الآخرين إلا بعد قيده في السجل والشهر عنه وفقا للإجراءات والشروط المنصوص عليها في اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: لا يجوز للمرخص له التنازل عن الترخيص لغيره أو منح تراخيص من الباطن ما لم يتفق على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يشطب قيد الترخيص من السجل بناء على طلب مالك العلامة التجارية أو المرخص له بعد تقديم ما يثبت انتهاء الترخيص أو فسخه وعلى الإدارة المختصة أن تبلغ الطرف الآخر بطلب شطب الترخيص، وله في هذه الحالة الاعتراض على ذلك أمام ديوان المظالم خلال ثلاثين يومًا من تاريخ إخطاره بطلب الشطب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يجوز لوزير التجارة الترخيص بتسجيل علامة تجارية جماعية للأشخاص الطبيعيين أو المعنويين الذين يتولون مراقبة منتجات أو خدمات معينة أو فحصها فيما يختص بمصدرها أو عناصر تركيبها أو طريقة صنعها أو أدائها أو صفاتها أو أي خاصية أخرى، وذلك وفقا للإجراءات والشروط التي تحددها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: لا يجوز تسجيل العلامة التجارية الجماعية غير المجددة لصالح الآخرين بالنسبة لمنتجات أو خدمات متطابقة أو متماثلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: تطبق أحكام هذا النظام على العلامات التجارية الجماعية فيما لا يتعارض مع طبيعتها الخاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: 'تحدد الرسوم المستحقة طبقا لأحكام هذا النظام على الوجه الآتي : أولاً : ألف ريال عن أي إجراء مما يأتي : أ - تقديم طلب تسجيل علامة تجارية عن فئة واحدة.ب - تقديم طلب تسجيل علامة تجارية جماعية عن فئة واحدة.ج - طلب فحص علامة تجارية جماعية عن فئة واحدة.د - الاطلاع على السجل بشأن علامة تجارية عن فئة واحدة.هـ - كل صورة تؤخذ مما هو مدون بالسجل بشأن علامة تجارية عن فئة واحدة.و - طلب التأشير بانتقال الملكية أو تحويلها لعلامة تجارية عن فئة واحدة. ز - طلب الترخيص باستخدام علامة تجارية عن فئة واحدة، وكذا التأشير برهنها وفقا للمواد ( الحادية والثلاثين) و ( الثانية والثلاثين) و ( الثالثة والثلاثين) من هذا النظام.ح - لكل تعديل أو إضافة في علامة تجارية عن فئة واحدة وفقا للمادة (الثامنة عشرة) من هذا النظام.ط - طلب إضافة أو تغيير أي بيان لم يحدد له رسم في شأن علامة تجارية عن فئة واحدة.ي - طلب تجديد تسجيل علامة تجارية عن فئة واحدة خلال الأشهر الستة التالية لمدة حمايتها. ثانيا: ثلاثة آلاف ريال عن أي إجراء مما يأتي : أ - تقديم طلب بالحماية الوقتية لعلامة تجارية عن فئة واحدة.ب - تسجيل علامة تجارية
    عن فئة واحدة.ج - تسجيل علامة تجارية جماعية عن فئة واحدة.د - تجديد تسجيل علامة تجارية عن فئة واحدة.هـ - تجديد تسجيل علامة تجارية جماعية عن فئة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: الطلبات والإجراءات المقرر لها رسوم طبقا للمادة (الحادية والأربعين) من هذا النظام لا تكون مقبولة أو منتجة لآثارها إلا بعد أداء الرسوم المقررة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد، يعاقب بالحبس مدة لا تزيد على سنة وبغرامة لا تقل عن خمسين ألف ريال ولا تزيد على مليون ريال أو بإحدى هاتين العقوبتين : أ - كل من زور علامة مسجلة أو قلدها بطريقة تتسبب في تضليل الجمهور، وكل من استعمل بسوء القصد علامة مزورة أو مقلدة.ب - كل من وضع بسوء القصد على منتجاته أو استعمل فيما يتعلق بخدماته علامة مملوكة لغيره.ج - كل من عرض أو طرح للبيع أو باع أو حاز بقصد البيع منتجات عليها علامة مزورة أو مقلدة أو موضوعة أو مستعملة بغير وجه حق مع علمه بذلك، وكذلك كل من عرض خدمات في ظل مثل هذه العلامة مع علمه بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد، يعاقب بالحبس مدة لا تزيد على ثلاثة أشهر وبغرامة لا تقل عن عشرين ألف ريال، ولا تزيد على مائتين وخمسين ألف ريال أو بإحدى هاتين العقوبتين: أ - كل من استعمل علامة غير مسجلة في الأحوال المنصوص عليها في الفقرات ( ب، ج، د، هـ ) من المادة (الثانية) من هذا النظام.ب - كل من دون بغير حق على علاماته أو أوراقه التجارية بيانا يؤدي إلى الاعتقاد بحصول تسجيلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يعاقب العائد بعقوبة لا تزيد على ضعف الحد الأقصى للعقوبة المقررة للمخالفة، مع إغلاق المحل التجاري أو المشروع لمدة لا تقل عن خمسة عشر يوما ولا تزيد على ستة أشهر، مع نشر الحكم على نفقة المخالف وفقا للشروط والإجراءات التي تنص عليها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: يعد عائدا في تطبيق أحكام هذا النظام من حكم عليه في مخالفة من المخالفات المنصوص عليها فيه وعاد إلى ارتكاب مخالفة أخرى مماثلة خلال ثلاث سنوات من تاريخ الحكم عليه نهائيا في المخالفة السابقة. وتعد مخالفات متماثلة المخالفات المنصوص عليها في المادتين (الثالثة والأربعين) و(الرابعة والأربعين) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: تسقط دعوى الحق العام بمضي خمس سنوات من تاريخ ارتكاب المخالفة دون اتخاذ أي إجراء من إجراءات التحقيق أو المحاكمة، ولا يترتب على سقوط دعوى الحق العام أي مساس بالحقوق الخاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يجوز لكل من أصابه ضرر نتيجة ارتكاب إحدى المخالفات المنصوص عليها في هذا النظام أن يطالب المسؤول عن هذه المخالفة بالتعويض المناسب عما لحقه من ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: 'يجوز لمالك العلامة التجارية في أي وقت ولو كان ذلك قبل رفع أي دعوى مدنية أو جنائية أن يستصدر - بناءً على عريضة مشفوعة بشهادة رسمية دالة على تسجيل العلامة - أمرا من ديوان المظالم باتخاذ الإجراءات التحفظية اللازمة، وعلى الأخص: أ ) عمل محضر حصر ووصف تفصيلي عن الآلات والأدوات التي تستخدم أو تكون قد استخدمت في ارتكاب المخالفة والمنتجات المحلية والمستوردة أو البضائع أو الأوراق مما يكون قد وضعت عليها العلامة التجارية موضوع المخالفة.ب ) توقيع الحجز على الأشياء المشار إليها في الفقرة ( أ ) على ألا يوقع الحجز عليها إلا بعد أن يقدم الطالب تأمينا يقدره ديوان المظالم تقديرا أوليا لتعويض المحجوز عليه عند الاقتضاء. ويجوز بعد توقيع الحجز المنازعة في كفاية التأمين الذي قدمه الحاجز وفقا للإجراءات والشروط المنصوص عليها في اللائحة التنفيذية، ويجوز أن يشمل الأمر الصادر من ديوان المظالم ندب خبير أو أكثر لمعاونة الجهة التي تحددها اللائحة التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: تعتبر الإجراءات التحفظية التي اتخذها مالك العلامة التجارية كأن لم تكن إذا لم يتبعها رفع دعوى مدنية أو جنائية على من اتخذت ضده تلك الإجراءات وذلك في خلال عشرة أيام من تاريخ اتخاذ الإجراءات المنصوص عليها في المادة (التاسعة والأربعين) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: للمدعى عليه أن يتخذ إجراءات مطالبة المدعي السيئ النية بالتعويض الذي قد يستحق له نتيجة اتخاذه للإجراءات المنصوص عليها في المادة (التاسعة والأربعين) من هذا النظام. وذلك خلال تسعين يوما من تاريخ انتهاء الميعاد المنصوص عليه في المادة(الخمسين) من هذا النظام. إذا لم يرفع الحاجز دعواه، أو من تاريخ صدور الحكم النهائي في دعوى الحاجز المتعلقة بالعلامة التجارية ، وفي جميع الأحوال لا يجوز صرف التأمين للحاجز إلا بعد صدور الحكم النهائي في دعوى المحجوز عليه بإدانته، أو بعد انقضاء الميعاد المقرر له دون رفعها ما لم يتضمن الحكم الصادر في دعوى الحاجز الفصل في موضوع التأمين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: يجوز لديوان المظالم في أي دعوى مدنية أو جنائية أن يحكم بمصادرة الأشياء المحجوزة أو التي تحجز فيما بعد لخصم ثمنها من التعويضات أو الغرامات أو للتصرف فيها وفقا للشروط والإجراءات التي تنص عليها اللائحة التنفيذية. ويجوز لديوان المظالم أن يأمر بنشر الحكم في جريدة واحدة أو أكثر على نفقة المحكوم عليه. ويجوز له كذلك أن يأمر بإتلاف العلامات التجارية المزورة أو المقلدة أو الموضوعة أو المستعملة بغير حق وأن يأمر - عند الاقتضاء - بإتلاف الأشياء التي تحمل هذه العلامات وذلك حتى في حالة الحكم بالبراءة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: يختص ديوان المظالم بالفصل في جميع الدعاوى المدنية والجنائية والمنازعات الناشئة عن تطبيق هذا النظام، وتوقيع الجزاءات المقررة لمخالفة أحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: تتولى هيئة التحقيق والادعاء العام تمثيل الحق العام في الدعوى الجزائية لمخالفات أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: تتضمن اللائحة التنفيذية الإجراءات الخاصة بالحماية المؤقتة لأي علامة تجارية تستعمل للمنتجات والخدمات المعروضة في المعارض الوطنية والدولية التي تقام في المملكة أو في إحدى الدول التي تعامل المملكة بالمثل، ويتم تحديد هذه المعارض بقرار من وزير التجارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: يكون للموظفين الذين يعينهم وزير التجارة صفة مأموري الضبط القضائي فيما يتعلق بتطبيق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: تصدر بقرار من وزير التجارة اللائحة التنفيذية لهذا النظام خلال ستين يوما من تاريخ صدوره وتنشر في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ويعمل به بعد تسعين يوما من تاريخ نشره، ويلغى نظام العلامات التجارية الصادر بالمرسوم الملكي رقم م/5 وتاريخ 4 / 5 / 1404 هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3ec4414f-2ec5-48b1-bcb4-a9a700f1aa2b/1
  verified: false
