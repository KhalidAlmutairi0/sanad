regulation:
  code: BOE126
  name_ar: نظام تطبيق كود البناء السعودي
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك: الوزارة : وزارة الشؤون البلدية والقروية. الجهاز البلدي : الأمانة أو البلدية. اللجنة الوطنية : اللجنة الوطنية لكود البناء السعودي. الكود : كود البناء السعودي، وهو مجموعة الاشتراطات والمتطلبات وما يتبعها من لوائح تنفيذية وملاحق متعلقة بالبناء والتشييد؛ لضمان السلامة والصحة العامة. النظام : نظام تطبيق كود البناء السعودي. اللوائح : اللوائح التنفيذية للنظام. البناء / المبنى : ما يشيد ويجهز للاستخدام والإشغال، وورد له تصنيف في الكود. المصمّم : الشخص ذو الصفة الطبيعية أو الاعتبارية المرخص له، الذي يكلفه المالك بعمل الدراسات والتصاميم بما يلبي احتياجاته وطلباته وفق الكود. المنفذ (المقاول) : الشخص ذو الصفة الطبيعية أو الاعتبارية المرخص له، الذي يكلفه المالك بتنفيذ أعمال البناء أو التركيب أو التشغيل أو الصيانة وفق الكود. المشرف : الشخص ذو الصفة الطبيعية أو الاعتبارية المرخص له الذي يكلفه المالك بالقيام بأعمال الإشراف. رخصة البناء : إذنٌ بالبناء يصدره الجهاز البلدي.
    شهادة الإشغال : إذنٌ بإشغال المبنى يصدره الجهاز البلدي بعد التأكد من مطابقته للكود. رخصة الممارسة : تصريح تصدره الجهة المختصة للأفراد، والهيئات، والمؤسسات، والشركات؛ لممارسة أعمال الدراسات والتصاميم، أو التنفيذ أو الإشراف، وفق الكود. الجهات ذات العلاقة : الجهات الحكومية المعنية وفقاً لاختصاصها بمراقبة تطبيق الكود، وهي: وزارة الشؤون البلدية والقروية، ووزارة الداخلية (المديرية العامة للدفاع المدني)، ووزارة الطاقة والصناعة والثروة المعدنية. المخالفة : كل تجاوز للكود، متعمد أو غير متعمد. المخالفة الخطرة : كل مخالفة للكود يترتب عليها تعريض الأرواح أو الممتلكات للخطر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1- يطبق الكود على جميع أعمال البناء في القطاعين العام والخاص، بما في ذلك تصميم البناء وتنفيذه وتشغيله وصيانته وتعديله، ويطبق كذلك على المباني القائمة في حالة ترميمها، أو تغيير استخدامها، أو توسعتها، أو تعديلها.2 - يكون تطبيق الكود تدريجيًّا وفقاً لما تحدده اللوائح خلال مدة لا تتجاوز خمس سنوات من تاريخ نفاذ النظام.3 - يحظر تطبيق أي كود - بعد العمل بالنظام وفقاً للتطبيق التدريجي المشار إليه في الفقرة (2) من هذه المادة - غير الكود السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: دون الإخلال بحق الجهات ذات العلاقة في ممارسة مهماتها واختصاصاتها وفقاً لأنظمتها، تتولى الوزارة متابعة تطبيق الكود ومراقبته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تتولى اللجنة الوطنية ما يأتي: 1 - دراسة الملحوظات الواردة حيال الكود، واقتراح ما يلزم من تعديلات لتحديثه وتطويره، وذلك بالتنسيق مع الجهات المختصة، وتصدر هذه التعديلات بقرار من وزير التجارة والاستثمار رئيس مجلس إدارة الهيئة السعودية للمواصفات والمقاييس والجودة.2 - إعداد الإرشادات والشروحات العلمية والفنية الخاصة بالكود، ومشاركة الجهات المختصة في إعداد مناهج التدريب والتأهيل وخططه، وعقد ورش العمل والندوات والمؤتمرات المتعلقة بالكود.3 - تمثيل المملكة في المنظمات واللجان الفنية الإقليمية والدولية ذات العلاقة، بعد التنسيق مع الجهات المختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يُحدَّث الكود ويعاد إصداره كل خمس سنوات بقرار من وزير التجارة والاستثمار رئيس مجلس إدارة الهيئة السعودية للمواصفات والمقاييس والجودة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعد الالتزام بالكود - بعد العمل بالنظام وفقاً للتطبيق التدريجي المشار إليه في الفقرة (2) من المادة (الثانية) من النظام - أحد متطلبات الحصول على رخص البناء أو الترميم أو التعديل أو تغيير الاستخدام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون التصميم والإشراف والتنفيذ بموجب عقود مع متخصصين يحملون رخص ممارسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على كل من المصمم والمنفذ والمشرف الالتزام بتنفيذ الأعمال الموكولة إليه وفق الكود.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: لا يجوز إشغال البناء إلَّا بموجب شهادة إشغال بحسب تصنيف الإشغال الوارد في الكود، ووفقاً للإجراءات والمدد التي تحددها اللوائح، وتعد شهادة الإشغال شرطاً أساساً لإيصال الخدمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: على كل من خالف الكود إزالة المخالفة أو تصحيحها بما يتفق مع الكود في مدة تحددها الجهة ذات العلاقة، ويشعر المخالف بذلك.وإذا لم يُزِل المخالف المخالفة أو يصححها خلال المدة المحددة، تحيل الجهة ذات العلاقة المخالفة إلى اللجنة المنصوص عليها في المادة (الرابعة عشرة) من النظام وفق ما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: عندما تكون المخالفة خطرة، فعلى الجهة ذات العلاقة إشعار المخالف بها، وإيقاف البناء أو الجزء أو القسم الذي يشكل الخطورة أو منع الإشغال أو إخلاء المبنى حتى يزيل المخالف المخالفة أو يصححها بما يتفق مع الكود، وإحالة المخالفة إلى اللجنة المنصوص عليها في المادة (الرابعة عشرة) من النظام خلال مدة لا تتجاوز خمسة أيام عمل من تاريخ ضبط المخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'مع مراعاة ما ورد في المادتين (العاشرة) و(الحادية عشرة) من النظام، يعاقب كل من يخالف الكود أو أيًّا من أحكام النظام أو لوائحه بأي من العقوبتين الآتيتين أو بكلتيهما : 1 - غرامة مالية لا تزيد على مليون ريال للمخالفة الواحدة في المبنى الواحد.2 - إيقاف رخصة الممارسة مدة لا تقل عن شهر ولا تتجاوز سنة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يتولى ضبط مخالفات الكود وتوثيقها مختصون مؤهلون في الكود من الجهات ذات العلاقة، يصدر بتسميتهم قرار من جهاتهم، على أن يكون ضبط المخالفة بموجب محضر تدون فيه المعلومات وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- تكوَّن بقرار من وزير الشؤون البلدية والقروية لجنة (أو أكثر) في كل منطقة من مناطق المملكة - بحسب الحاجة - من متخصصين من الجهات ذات العلاقة، على ألَّا يقل عدد أعضائها عن (ثلاثة) يكون من بينهم من يحمل مؤهلاً شرعيًّا أو نظاميًّا، وتصدر - بقرار من وزير الشؤون البلدية والقروية - قواعد عمل تلك اللجان وإجراءاتها ومكافأة أعضائها.2 - تتولى هذه اللجنة النظر في المخالفات وإيقاع العقوبات المنصوص عليها في المادة (الثانية عشرة) من النظام، ويجوز التظلم من هذه القرارات أمام ديوان المظالم وفقاً لنظامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تعد اللجنة الوطنية - خلال سنة من تاريخ نشر النظام - اللوائح، بما في ذلك لائحة تشتمل على تصنيف مخالفات الكود، وتعتمد بقرار من وزير التجارة والاستثمار رئيس مجلس إدارة الهيئة السعودية للمواصفات والمقاييس والجودة، وتنشر في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يُعمل بهذا النظام بعد سنة من تاريخ نشره في الجريدة الرسمية، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cfc97985-4a9f-4012-832b-a9a700f21ed2/1
  verified: false
