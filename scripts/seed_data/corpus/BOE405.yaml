regulation:
  code: BOE405
  name_ar: تنظيم المعهد الوطني للتطوير المهني التعليمي
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: التنظيم: تنظيم المعهد الوطني للتطوير المهني التعليمي. المعهد: المعهد الوطني للتطوير المهني التعليمي. المجلس: مجلس أمناء المعهد. الوزارة: وزارة التعليم. الوزير: وزير التعليم. الهيئة: هيئة تقويم التعليم والتدريب. القطاع التعليمي: التعليم العام. المستفيد: من يستفيد من خدمات وبرامج المعهد، ومنهم شاغلو الوظائف التعليمية بالقطاع التعليمي، ومن في حكمهم من العاملين في مدارس التعليم الخاص أو غير الربحي، والمرشحون لشغل أو ممارسة مهمات الوظائف التعليمية، وأي فئات أخرى يحدد المجلس شمول خدمات المعهد لها. خدمات التطوير المهني التعليمي: الخدمات التي يقدمها المعهد للمستفيدين، بالشراكة مع الوزارة أو جهات القطاع العام أو الخاص أو غير الربحي. وتشمل تأهيل المستفيدين وتطويرهم وتهيئتهم مهنيًّا وقياديًّا، وأي أوجه تطوير أو برامج أو خدمات تطويرية أخرى يقرها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المعهد بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير، ويكون المقر الرئيس للمعهد في مدينة الرياض، وله إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المعهد إلى ما يأتي: دعم تمهين التعليم العام، والارتقاء بمستوى الممارسات المهنية التعليمية إلى مستوى الاحتراف. بناء منظومة للتطوير المهني التعليمي في قطاع التعليم العام ذات كفاية وفاعلية عالية، ودعم تطبيقها. تنظيم وتقديم خدمات التطوير المهني التعليمي وبرامجه، بما يضمن كفايته وفاعليته في القطاع التعليمي. تعزيز التنمية المهنية المستدامة في القطاع التعليمي من خلال بناء مسارات مهنية وأوعية تطوير مهني متنوعة. إعداد قيادات تعليمية من خلال الكشف عنها وتطويرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يعد المعهد الجهة المختصة بتقديم خدمات التطوير المهني التعليمي. وله -دون إخلال باختصاصات الأجهزة الحكومية الأخرى- القيام بكل ما يلزم في سبيل تحقيق أهدافه، ومن ذلك ما يأتي: وضع سياسات ومواصفات وإجراءات خدمات التطوير المهني التعليمي، وإعداد وإقرار الضوابط التي تكفل تطبيقها. المشاركة مع الهيئة في إعداد وتطوير نموذج (إطار) الجدارات للمستفيدين من شاغلي الوظائف التعليمية. إعداد واعتماد معايير برامج ممارسي التطوير المهني التعليمي غير المنتهية بمؤهل. إعداد وإقرار وتنفيذ برامج وخدمات التطوير المهني التعليمي للمستفيدين، وتحديد معاييرها وضوابطها ومواصفاتها. إعداد قيادات وكوادر بشرية تعليمية وتطويرها. إنشاء مراكز فرعية للمعهد وتشغيلها -ضمن الأسقف المعتمدة للمعهد في الميزانية العامة للدولة، ووفقاً للأنظمة والإجراءات المتبعة- وإصدار اللوائح التنظيمية لنشاطات تلك المراكز، بما لا يخل بالأحكام الواردة في التنظيم. وضع الشروط والمتطلبات لتسجيل ممارسي مهنة خدمة التطوير المهني التعليمي المؤهلين. إعداد الدراسات والبحوث، وتقديم الاستشارات، في المجالات المعني بها المعهد. تمثيل المملكة خارجيًّا
    في حدود مجالات اختصاصه، وفقاً للإجراءات النظامية. تنظيم الندوات والمؤتمرات والفعاليات وجلسات العمل والمعارض والمسابقات والجوائز -ذات العلاقة بالتطوير المهني التعليمي- وعقدها، والمشاركة فيها، وفقاً للإجراءات المتبعة. إصدار المجلات والدوريات والكتب والأدلة الإرشادية والنشرات ذات العلاقة بمهماته وأنشطته، وفقاً للأنظمة والإجراءات المتبعة. التعاون مع مراكز البحوث وبيوت الخبرة على المستويين المحلي والدولي -عند الحاجة- بما يسهم في تحقيق أهدافه. تصميم وإقامة برامج تعليمية وتدريبية وبرامج إعدادية متعلقة بالمجالات المعني بها، وتأهيل المدربين لتقديمها. منح الشهادات العلمية والتدريبية في المجالات المعني بها، بالتنسيق مع الجهات ذات العلاقة. تقديم الخدمات والأعمال والمبادرات ذات الصلة بالمجالات المعني بها. تملك الأصول المنقولة والثابتة والتصرف فيها، وفق الأنظمة المتبعة. الاشتراك في عضوية المعاهد والاتحادات والمنظمات والهيئات الإقليمية والدولية وما في حكمها ذات العلاقة بمجالات اختصاصه، وفقاً للإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'أ- يكون للمعهد مجلس أمناء برئاسة الوزير، وعضوية كل من: 1- مدير عام المعهد. عضواً 2- ممثل من وزارة المالية. عضواً 3- ممثل من وزارة الموارد البشرية والتنمية الاجتماعية. عضواً 4- ممثل من وزارة التعليم. عضواً 5- ممثل من معهد الإدارة العامة. عضواً 6- ممثل من المؤسسة العامة للتدريب التقني والمهني. عضواً 7- ممثل من هيئة تقويم التعليم والتدريب. عضواً 8- اثنين من أعضاء هيئة التدريس في الجامعات الحكومية. عضوين 9- ممثلين من قطاع التعليم والتدريب الأهلي. عضوين ب- يجب ألا تقل مراتب ممثلي الأجهزة الحكومية عن (الرابعة عشرة) أو ما يعادلها، ويعين الأعضاء المنصوص عليهم في الفقرتين (9) و(8) بأمر من رئيس مجلس الوزراء بناءً على ترشيح من رئيس المجلس، وتكون مدة عضويتهم في المجلس (ثلاث) سنوات قابلة للتجديد مرة واحدة. ج- يختار الرئيس نائباً له من بين الأعضاء ممثلي الجهات الحكومية عدا مدير عام المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون المعهد وتصريف أموره، واتخاذ جميع القرارات اللازمة لتحقيق أهدافه في حدود ما تضمنه التنظيم، وله على وجه خاص ما يلي: إقرار سياسات العمل المتعلقة بالمعهد، والخطط والبرامج والمبادرات اللازمة لتنفيذها، والرفع عما يتطلب استكمال أي إجراءات نظامية في شأنها. إقرار متطلبات منح الشهادات العلمية والتدريبية التي يقدمها المعهد. إقرار متطلبات تعيين المعلمين والمدربين وتأهيلهم. إقرار متطلبات تصميم وإقامة البرامج التعليمية والتدريبية والبرامج الإعدادية المتعلقة بمجالات اختصاص المعهد. إقرار الهيكل والدليل التنظيمي للمعهد. إسناد ما يخص تطوير شاغلي الوظائف التعليمية إلى شركة تطوير التعليم القابضة أو أي من الشركات التابعة لها، وفقاً للإجراءات النظامية المتبعة. إقرار اللوائح المالية والإدارية التي يسير عليها المعهد وغيرها من اللوائح الداخلية والفنية اللازمة لتسير شؤونه، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية، ويكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية،
    مع مراعاة ما يصدر من قواعد وتعليمات في هذا الشأن. إقرار المقابل المالي للخدمات والأعمال التي يقدمها المعهد ويرى المجلس استحصال مقابل مالي عنها، وفقاً للإجراءات النظامية المتبعة. الموافقة على مشروع ميزانية المعهد، وحسابه الختامي، والتقرير السنوي عن نشاطه؛ تمهيداً لاستكمال الإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. اعتماد تقرير مراجع الحسابات. الموافقة على إنشاء الفروع أو المكاتب أو المراكز للمعهد. النظر في التقارير الدورية التي تقدم له عن سير العمل في المعهد، واتخاذ القرارات اللازمة في شأنها. الموافقة على إبرام المعهد لاتفاقيات ومذكرات التفاهم والعقود، وعلى انضمام المعهد إلى عضوية المعاهد والاتحادات والمنظمات والهيئات الإقليمية والدولية وما في حكمها ذات العلاقة بمجالات اختصاصه، وفقاً للإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا وريع الأوقاف، بحسب القواعد المنظمة لذلك. تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم، يعهد إليها بما يراه من مهام، ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصها، ويكون لها الاستعانة بمن
    تراه لتأدية تلك المهمات. وللمجلس كذلك تفويض بعض من اختصاصاته -عدا الاختصاصات الواردة في الفقرات (1)، (2)، (3)، (4)، (5)، (6)، (7)- إلى رئيسه أو من يراه من أعضائه أو من منسوبي المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس بصفة دورية (ثلاث) مرات في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس -أو من ينيبه- أو إذا طلب ذلك ثلث أعضائه على الأقل، وتوجه الدعوة للاجتماع -كتابةً- من الرئيس -أو من ينيبه- قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. تعقد اجتماعات المجلس في مقر الجهاز الرئيسي. ويجوز بقرار من الرئيس -أو من ينيبه- عقد الاجتماع في أي مكان آخر داخل المملكة. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس -أو من ينيبه- وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. للمجلس دعوة من يراه من أهل الاختصاص والخبرة لحضور اجتماعات السلطة، وتقديم المعلومات والرأي والمشورة، دون أن يكون لهم حق التصويت. لا يجوز لعضو المجلس الامتناع عن التصويت ولا تفويض عضو آخر للتصويت عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. للمجلس عند الحاجة وفي الحالات المستعجلة
    وفقاً لما يقدره الرئيس -أو من ينيبه- عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية، ويمكن أن تتخذ القرارات عن طريق التمرير على الأعضاء، ويوقع عليها بما يفيد اطلاع جميع الأعضاء عليها، ولا يعد القرار الصادر بهذه الطريقة صحيحاً ما لم يصوت عليه جميع الأعضاء. ويعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. يكون للمجلس أمين يعينه المجلس -بناءً على ترشيح الرئيس- يتولى أمانته، والإعداد لاجتماعاته، وتسجيل المحاضر والمداولات والقرارات. لا يجوز لعضو المجلس أو الأمين أن يفشي شيئاً مما وقف عليه من أسرار الجهاز حتى بعد انتهاء عضويته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمعهد مدير عام يعين ويعفى بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون المعهد، وتتركز مسؤوليته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويتولى الاختصاصات التالية: إعداد سياسات العمل المتعلقة بالمعهد، والخطط والبرامج والمبادرات اللازمة لتنفيذها، ورفعها إلى المجلس؛ للنظر في إقرارها. إعداد متطلبات تصميم وإقامة البرامج التعليمية والتدريبية والبرامج الإعدادية المتعلقة بالمجالات المعني بها المعهد، ورفعها إلى المجلس؛ للنظر في إقرارها. إعداد متطلبات منح الشهادات العلمية والتدريبية التي يقدمها المعهد، ورفعها إلى المجلس؛ للنظر في إقراراها. إعداد متطلبات تعيين المعلمين والمدربين وتأهليهم، ورفعها إلى المجلس؛ للنظر في إقرارها. اقتراح فتح فروع ومكاتب ومراكز للمعهد داخل المملكة، ورفعه إلى المجلس؛ للموافقة عليه. اقتراح تحديث فئات المستفيدين والخدمات التطويرية الإضافية التي يقدمها المعهد، ورفعه إلى المجلس؛ للنظر في اعتماده. متابعة تنفيذ القرارات التي يصدرها المجلس. اقتراح الهيكل والدليل التنظيمي للمعهد، واقتراح لوائحه المالية والإدارية
    التي يسير عليها، وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونه؛ ورفعها إلى المجلس؛ للنظر في إقرارها. اقتراح المقابل المالي للخدمات والأعمال التي يقدمها المعهد ورفعه إلى المجلس؛ للنظر في إقراره. الإشراف على إعداد مشروع ميزانية المعهد السنوية والحساب الختامي، والتقرير السنوي للمعهد، تمهيداً لعرضها على المجلس. الصرف من ميزانية المعهد واتخاذ جميع الإجراءات المالية، وفقاً للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي فوضه بها المجلس. التوقيع على الاتفاقيات ومذكرات التفاهم والعقود بعد موافقة المجلس. تمثيل المعهد أمام القضاء، والجهات الحكومية ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها. وله تفويض غيره بذلك. تعيين العاملين في المعهد والإشراف عليهم، وفقاً للأحكام المقرة للمعهد. أي عمل آخر يسنده إليه المجلس في حدود الاختصاص. وللمدير العام تفويض بعض من اختصاصاته أو صلاحياته إلى من يراه من منسوبي المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد المعهد من الآتي: ما يخصص له في الميزانية العامة للدولة. ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع الأوقاف وفقاً للإجراءات النظامية المتبعة. المقابل المالي الذي يتقاضاه عن الخدمات والأعمال التي يقدمها. أي مورد آخر يقره المجلس للمعهد بما يتوافق مع اختصاصاته، وبما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تودع جميع إيرادات المعهد في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المعهد حساباً له في البنك المركزي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المعهد المعتمدة ولوائحه المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يكون للمعهد ميزانية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. تكون سنة المعهد المالية هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يرفع المعهد إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من بداية كل سنة مالية تقريراً سنويًّا عما حققه من إنجازات خلال السنة المنقضية، وما واجهه من صعوبات، وما يراه من مقترحات لتحسين سير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المعهد ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يرفع المعهد إلى رئيس مجلس الوزراء حسابه الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يخضع منسوبو المعهد لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يحل هذا التنظيم محل تنظيم المعهد الوطني للتطوير المهني التعليمي، الموافق عليه بقرار مجلس الوزراء رقم (197) وتاريخ 8 / 3 / 1441هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/46d3b1b2-6455-466d-8942-b13600c0414c/1
  verified: false
