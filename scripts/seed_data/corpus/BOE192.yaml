regulation:
  code: BOE192
  name_ar: نظام التنفيذ أمام ديوان المظالم
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق خلاف ذلك: النظام: نظام التنفيذ أمام ديوان المظالم. اللائحة: اللائحة التنفيذية للنظام. المجلس: مجلس القضاء الإداري. المحكمة: محكمة التنفيذ الإدارية. السند: سند التنفيذ المشمول بأحكام النظام. منازعة التنفيذ: دعوى تتعلق بشروط صحة التنفيذ وسلامة إجراءاته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: على المحكوم عليه المبادرة بتنفيذ الأحكام النهائية والأحكام المشمولة بالنفاذ المعجل الصادرة من محاكم ديوان المظالم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تُنشأ بقرار من المجلس محكمة أو أكثر -بحسب الحاجة- تؤلف من رئيس وعدد كافٍ من القضاة، وتختص بتنفيذ السند والفصل في منازعة تنفيذه، وتباشر اختصاصاتها من خلال دوائر تكوّن كل منها من قاضٍ واحد. تنشأ دائرة للتنفيذ أو أكثر -بحسب الحاجة- في المحاكم الإدارية في المناطق والمحافظات التي لم تنشأ فيها محكمة، يكون لها الاختصاصات المقررة للمحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'لا يجوز التنفيذ الجبري إلا بسند تنفيذي لحق محدد المقدار حال الأداء. والسندات التنفيذية المشمولة بأحكام النظام هي: الأحكام النهائية أو العاجلة الصادرة من محاكم ديوان المظالم. الأحكام النهائية أو العاجلة التي تكون جهة الإدارة طرفًا فيها. العقود التي تكون جهة الإدارة طرفاً فيها، والمحررات التي تصدرها إذا كانت موثقة. أحكام المحكمين التي تكون جهة الإدارة طرفًا فيها. الأوراق التجارية التي تكون جهة الإدارة طرفًا فيها. وتحدد اللائحة الأحكام المتعلقة بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تكون قرارات المحكمة وأوامرها نهائية وغير قابلة للاعتراض، وتخضع جميع أحكامها للاعتراض أمام محكمة الاستئناف الإدارية المختصة؛ وفقًا للقواعد والإجراءات المقررة للاعتراض على أحكام المحاكم الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: الفصل الأول ( رفع طلب التنفيذ وقيده )
  article_text_ar: 'يرفع طلب التنفيذ بصحيفة يودعها طالب التنفيذ لدى المحكمة المختصة، على أن تتضمن الصحيفة: بيانات رافع الطلب أو من يمثله، وبيانات السند، وأية بيانات أو مرفقات أخرى تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تقيد الإدارة المختصة في المحكمة صحيفة طلب التنفيذ إذا كانت مستوفية المطلوب وفقاً للمادة (السادسة) من النظام، وتحيلها -فور قيدها- إلى دائرة التنفيذ. وإذا قررت الإدارة عدم قيد الصحيفة؛ لعدم الاستيفاء، فعلى طالب القيد استيفاء ما نقص خلال (عشرين) يوماً من تاريخ إبلاغه بذلك، وإن لم يستوفِ ما طلب منه خلال هذه المدة عُدَّ الطلب كأن لم يكن. لطالب القيد التظلم أمام رئيس المحكمة من عدم القيد خلال (خمسة عشر) يوماً من تاريخ اعتبار الطلب كأن لم يكن، ويفصل رئيس المحكمة في التظلم خلال (خمسة عشر) يومًا من تاريخ التظلم، ويعد قراره في هذا الشأن نهائيًّا وغير قابل للاعتراض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجب على صاحب الشأن -قبل رفع طلب التنفيذ- أن يطالب من عليه الحق -الوارد في السند- بالأداء، وذلك خلال مدة لا تتجاوز (عشر) سنوات من تاريخ اكتساب الحكم الصفة النهائية، أو من تاريخ نشوء الحق الوارد في السندات التنفيذية الأخرى. لا يقبل طلب التنفيذ قبل مضي ثلاثين يوماً من تاريخ المطالبة بالأداء، فإذا مضت هذه المهلة دون أن يتم التنفيذ، أو صرح خلالها المطالَب بالأداء بما يفيد الرفض، فلصاحب الشأن أن يتقدم بطلبه إلى المحكمة المختصة خلال ما تبقى من المدة المذكورة في الفقرة (1) من هذه المادة أو في اليوم التالي لانقضاء مهلة (الثلاثين) يوماً، أيهما أطول. تكون المهلة المنصوص عليها في الفقرة (2) من هذه المادة (خمسة) أيام إذا كان المطلوب تنفيذه حكماً عاجلاً، ما لم يحدد الحكم العاجل مهلة أقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: لا يترتب على عدم قبول طلب التنفيذ -لفوات المدد المنصوص عليها في المادة (الثامنة) من النظام- انقضاء الالتزام، أو عدم تطبيق أحكام الباب (الرابع) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: الفصل الثاني ( التنفيذ ضد الجهات الإدارية )
  article_text_ar: تصدر دائرة التنفيذ -فور إحالة الطلب إليها- إنذاراً للجهة الإدارية للتنفيذ خلال مهلة لا تتجاوز (خمسة) أيام في الأحكام العاجلة، و(ثلاثين) يوماً فيما عداها، وذلك من تاريخ التبليغ بالإنذار، ما لم تر الدائرة تحديد مهلة أقل. ويتضمن الإنذار بيانات السند المطلوب تنفيذه وترافقه صورة منه، وللدائرة أن تُبلغ بذلك الجهة الرقابية المختصة للنظر في مباشرة الإجراءات التأديبية عند الاقتضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لدائرة التنفيذ أن تأمر الجهات الإدارية بالتدابير اللازمة للتنفيذ، بما في ذلك اطلاعها على الميزانيات والوظائف والإجراءات وأي مستند ترى ضرورة الاطلاع عليه، وعلى الجهات الإدارية تنفيذ هذه الأوامر خلال المهل المحددة فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تصدر دائرة التنفيذ أمراً بالتنفيذ إلى الجهة الإدارية إذا انتهت المهلة المنصوص عليها في المادة (العاشرة) دون أن يتم التنفيذ، أو إذا صرحت خلالها الجهة بما يفيد رفضه. وإذا كان تنفيذ السند يتطلب اتخاذ إجراءات معينة بما في ذلك إصدار قرارات إدارية فيتضمن أمر التنفيذ تحديدها. وتبلغ الجهة المختصة بصورة من الأمر للنظر في مباشرة الإجراءات الجزائية ضد المتسبب في عدم التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: إذا تبين لدائرة التنفيذ أن الجهة الإدارية -الملزمة بأداء مبلغ مالي أو ما يؤول إليه- قد استوفت ما تختص به من الإجراءات اللازمة للتنفيذ، دون أن يتم ذلك بسبب يعود إلى وزارة المالية؛ فللدائرة أن توجه إلى الوزارة إنذار التنفيذ وتطبق ضدها الإجراءات المنصوص عليها في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: للجهة الإدارية -قبل صدور الأمر المنصوص عليه في المادة (الثانية عشرة) من النظام- أن تطلب من دائرة التنفيذ إرشادها إلى كيفية التنفيذ، وتصدر دائرة التنفيذ -عند الاقتضاء- أمراً يتضمن بيان الإجراءات التي يتطلبها التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يترتب على طلب الإرشاد والبت فيه وقف الإجراءات والمهل المنصوص عليها في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: الفصل الثالث  ( التنفيذ لصالح الجهات الإدارية )
  article_text_ar: في سبيل تنفيذ السند الصادر لمصلحة الجهة الإدارية، تصدر دائرة التنفيذ فور إحالة طلب التنفيذ إليها أمراً إلى المطلوب التنفيذ ضده لتنفيذ السند خلال مهلة لا تتجاوز (ثلاثين) يوماً من تاريخ تبليغه بأمر التنفيذ، على أن يتضمن الأمر بيانات السند وترافقه صورة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: إذا انتهت المهلة المنصوص عليها في المادة (السادسة عشرة) دون أن يتم التنفيذ، أمرت دائرة التنفيذ -فوراً- بالإفصاح عن أمـوال المنفذ ضده وحجزها، بما في ذلك مستحقاته لدى الجهات الإدارية، وذلك بمقدار ما يفي بالمبلغ المستحق عليه في السند. وللدائرة إضافةً إلى ما سبق أن تأمر -بحسب الأحوال- بمنع المنفذ ضده من السفر، أو منع الجهات الإدارية والمنشآت المالية من التعامل معه، أو بهما معًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: فيما لم يرد فيه نص خاص في النظام ولائحته، تطبق -في تنفيذ السندات المشمولة بأحكام هذا الفصل- الإجراءات الواردة في نظام التنفيذ، ويكون لدوائر التنفيذ اختصاصات قاضي التنفيذ الواردة في نظام التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: باستثناء الإجراءات المنصوص عليها في المادتين (السابعة عشرة) و(العشرين) من النظام، لدائرة التنفيذ أن تكلف الجهة الإدارية طالبة التنفيذ -أو غيرها- بمباشرة ما تراه الدائرة من الإجراءات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: الفصل الرابع ( إجراءات التنفيذ ضد الجهات الإدارية ولصالحها )
  article_text_ar: فيما عدا التنفيذ لاقتضاء المبالغ المالية، لدائرة التنفيذ -بعد انقضاء المهلة المنصوص عليها في المادة (العاشرة) أو المادة (السادسة عشرة) بحسب الأحوال- أن تفرض غرامة لا تزيد على عشرة آلاف ريال على المنفذ ضده عن كل يوم يمضي دون إتمام التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: عند إتمام التنفيذ أو تعذره أو مضي (ستة) أشهر من سريان الغرامة دون إتمام التنفيذ؛ تتولى دائرة التنفيذ تصفية الغرامة بتحديد مبلغها، وتصدر في جلسة تحددها حكماً بإلزام المنفذ ضده بأن يؤدي لطالب التنفيذ -بناءً على طلبه- المبلغ الذي حددته، أو بإلغاء الغرامة أو جزء منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: لدائرة التنفيذ -بناءً على أسباب ملجئة يبديها المنفذ ضده- أن تأمر بوقف المهل المنصوص عليها في المادتين (العاشرة) و(السادسة عشرة) لمدة أو مدد لا تزيد في مجموعها على (ستة) أشهر، ويجوز أن يكون الوقف أو تمديده باتفاق أطراف التنفيذ أمام الدائرة، على ألا يزيد مجموع وقف المهل أو تمديدها -في جميع الأحوال- على (اثني عشر) شهرًا. يقف سريان المهلة من تاريخ صدور أمر الوقف، وتُستكمل من تاريخ انقضاء المدة المحددة فيه أو عدول دائرة التنفيذ عنه في أي وقت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجب أن يشتمل طلب وقف المهل -إضافة إلى البيانات اللازمة وفقاً للمادة (السادسة) من النظام- على أسبابه، وبيان الإجراءات، والمدد اللازمة للتنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: لطالب التنفيذ أن يقرر أمام دائرة التنفيذ ترك طلبه في أي مرحلة كان عليها، ويترتب على الترك زوال طلب التنفيذ وما تم من إجراءات بناءً عليه، ولا يمنع ذلك من رفع طلب جديد وفقاً لأحكام النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: ترفع منازعة التنفيذ -من كل ذي مصلحة من أطراف التنفيذ أو غيرهم- بصحيفة تودع لدى المحكمة المختصة وفق الإجراءات المعتادة لرفع الدعوى، على أن تتضمن الصحيفة بيانات السند المتنازع في تنفيذه، وملخصاً عنه، وأسباب المنازعة، وطلبات مقدمها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تنظر منازعة التنفيذ على وجه السرعة، وإذا تضمنت طلباً وقتيًا بوقف التنفيذ أو الاستمرار فيه فيخضع للأحكام المنظمة للدعاوى المستعجلة. يترتب على الحكم بوقف التنفيذ توقف جميع الإجراءات والمهل المتعلقة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: لا يجوز أن تتضمن منازعة التنفيذ اعتراضاً على الحكم المتنازع في تنفيذه. يترتب على صدور أمر بوقف التنفيذ من المحكمة المختصة بنظر الاعتراض على الحكم توقف جميع الإجراءات والمهل المتعلقة به، ولا تقبل الطلبات والمنازعات التي ترفع بعد أمر الوقف حتى يتم الفصل في الاعتراض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: لأي من أطراف التنفيذ أو المنازعة أن يطلب من دائرة التنفيذ وقف التنفيذ عند وجود غموض أو لبس في الحكم محل الطلب أو المنازعة يحول دون تنفيذه، وللدائرة أن تأمر بالوقف وذلك إلى حين الفصل في طلب تفسير الحكم من المحكمة المختصة. لأي من أطراف التنفيذ -عند صدور أمر وقف التنفيذ وفقًا لحكم الفقرة (1) من هذه المادة- التقدم إلى المحكمة المختصة بطلب التفسير خلال (خمسة عشر) يومًا من تاريخ التبليغ بأمر الوقف، على أن تشعر المحكمة المختصة دائرة التنفيذ بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: إذا تبين لدائرة التنفيذ أن تنفيذ السند أصبح متعذرًا لأي سبب فإنها تحكم بإثبات ذلك، ولا يعد من حالات تعذر التنفيذ عدم توفر الاعتمادات أو الوظائف في ميزانية الجهة الإدارية المنفذ ضدها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: دون إخلال بأي عقوبة أخرى منصوص عليها في نظام آخر، يعاقب الموظف العام:‌ أ- إذا استغل نفوذه أو سلطته الوظيفية في منع تنفيذ السند المطلوب تنفيذه -جزئيًا أو كليًا- بقصد تعطيل تنفيذه؛ بالسجن مدة لا تزيد على (سبع) سنوات وبغرامة لا تزيد على سبعمائة ألف ريال أو بإحدى هاتين العقوبتين. ‌ب- إذا امتنع عمداً عن تنفيذ السند المطلوب تنفيذه -جزئيًا أو كليًا- بقصد تعطيل تنفيذه، وذلك بعد مضي (ثمانية) أيام من تبليغه بالإنذار المنصوص عليه في المادة (العاشرة) من النظام، أو وصول إجراءات التنفيذ التالية للإنذار إليه، وكان التنفيذ من اختصاصه؛ بالسجن مدة لا تزيد على (خمس) سنوات وبغرامة لا تزيد على خمسمائة ألف ريال أو بإحدى هاتين العقوبتين. تُطبق عقوبات الجرائم الواردة في نظام التنفيذ عند وقوعها بمناسبة تنفيذ سند مشمول بأحكام النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يعاقب كل من اشترك في ارتكاب جريمة من الجرائم المنصوص عليها في المادة (الثلاثين) من النظام بالعقوبة المقررة لتلك الجريمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: للمحكمة تضمين الحكم الصادر بالعقوبة النص على نشر ملخصه على نفقة المحكوم عليه في صحيفة محلية تصدر في مقر إقامته، فإن لم تكن في مقره صحيفة ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، على أن يكون نشر الحكم بعد اكتسابه الصفة النهائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: تعد الجرائم المنصوص عليها في المادة (الثلاثين) من النظام من جرائم الفساد، ومن الجرائم الكبيرة الموجبة للتوقيف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يجوز الاستعانة بمقدمي خدمات التنفيذ المرخص لهم وفقًا لأحكام نظام التنفيذ. ويصدر المجلس الضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يجوز أن تتم الإجراءات المنصوص عليها في النظام إلكترونياً. ويصدر المجلس الضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: فيما لم يرد فيه نص خاص، تطبق على الطلبات والمنازعات الواردة في النظام -بما لا يتعارض مع طبيعتها- أحكام نظام المرافعات أمام ديوان المظالم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يصدر المجلس اللائحة خلال (ثلاثين) يومًا من تاريخ العمل بالنظام، على أن تنشر في الجريدة الرسمية، ويعمل بها بعد نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae1d79bf-3716-4bc5-a85e-ada100c8a870/1
  verified: false
