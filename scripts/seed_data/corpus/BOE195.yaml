regulation:
  code: BOE195
  name_ar: نظام الآثار والمتاحف والتراث العمراني
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني الموضحة أمام كل منها، ما لم يقتض السياق خلاف ذلك: الهيئة : الهيئة العامة للسياحة والآثار. المجلس : مجلس إدارة الهيئة. الرئيس : رئيس الهيئة. اللوائح : اللوائح التنفيذية لهذا النظام. الآثار/ مواقع الآثار : الأعيان الثابتة والمنقولة والمطمورة والغارقة داخل حدود المملكة وفي المناطق البحرية الخاضعة لسيادتها أو ولايتها القانونية، التي بناها الإنسان، أو صنعها، أو أنتجها، أو كيفها، أو رسمها، وتكونت لها خصائص أثرية بفعل تدخل الإنسان عبر العصور، وإن امتد تاريخها إلى فترة متأخرة، على ألا تقل عن (مائة) سنة. وللهيئة أن تعد ما يرجع إلى عهد أحدث آثاراً، وتدخل تحت اسم الآثار المواقع التاريخية ومواقع التراث الشعبي وقطعه. الآثار الثابتة : الآثار المتصلة بالأرض، مثل: الكهوف الطبيعية، أو المحفورة التي استخدمها الإنسان، والصخور التي رسم أو حفر عليها صوراً أو نقوشاً كتابية، والرجوم، والدوائر الحجرية، وأطلال المدن والقرى، والمنشآت الظاهرة أو المطمورة تحت الأرض، والمنشآت المائية، وطرق التجارة والحج القديمة، والمدن والقرى والأحياء
    التقليدية، والأبنية المنشأة لغايات مختلفة، وأطلال تلك المباني، وما يتصل بها من عناصر معمارية. الآثار المنقولة : القطع الأثرية التي صُنعت في الأصل لتكون بطبيعتها منفصلة عن الأرض أو عن الآثار الثابتة، والتي يمكن تغيير مكانها، كالمنحوتات، والمسكوكات، والكتابات، والحلي، وأدوات الزينة، والقطع التراثية التي تشكل قيمة وطنية من حيث طابعها التاريخي، أو العلمي، أو الجمالي، أو الفني، أو التقليدي، أو قدم الاستخدام. التراث العمراني : كل ما شيده الإنسان من مدن، وقرى، وأحياء، ومبانٍ، مع ما تتضمنه من فراغات، ومنشآت، وقطع لها قيمة عمرانية، أو تاريخية، أو علمية، أو ثقافية، أو وطنية. المواقع التاريخية : الأماكن التي شهدت أحداثاً تاريخية مهمة أو وطنية، أو وردت في التراث الأدبي ولا تحوي بالضرورة آثاراً ظاهرة أو مطمورة. مواقع التراث الشعبي : الأماكن التي تقام أو تنظم فيها نشاطات اجتماعية، أو ثقافية، أو حرفية، أو اقتصادية مرتبطة بالتراث الشعبي. قطع التراث الشعبي : الأدوات والقطع التي صنعها الإنسان، أو استخدمها في العصور المتأخرة في أي منطقة من مناطق المملكة لتسيير أموره المعيشية، من مطعم، وملبس، ومسكن، وتعليم،
    ودفاع عن النفس، ومحافظة على صحة البدن، وأدوات ترويحية. المتحف : المكان الذي تعرض فيه مواد أثرية أو فنية أو ثقافية أو تاريخية أو علمية بشكل دائم، ويحقق عرضها أهدافاً ثقافية أو تربوية أو ترفيهية، ويفتح أبوابه للجمهور في مواعيد ثابتة. ويطلق اسم (مجموعة خاصة) على ما عدا ذلك. التنقيب عن الآثار : جميع أعمال الحفر والسبر والتحري والغوص التي تتم وفق أسس علمية، وتستهدف العثور على آثار في باطن الأرض، أو على سطحها، أو في مجاري المياه، أو البحيرات، أو في المناطق البحرية الخاضعة لسيادة المملكة، أو ولايتها القانونية. المسح الأثري : جميع أعمال استكشاف مواقع الآثار وتوثيقها بالوسائل العلمية المختلفة، سواء على سطح الأرض أو في باطنها أو تحت الماء. المنقب عن الآثار : كل شخص طبيعي أو اعتباري مؤهل علميًّا ومهنيًّا في مجال التنقيب عن الآثار. التصنيف : تحديد درجة أهمية الأثر، وذلك وفقاً لقيمته التاريخية، أو الثقافية، أو الفنية، أو العلمية، أو الوطنية. الشخص/ الأشخاص : الشخص الطبيعي، أو الاعتباري العام، أو الخاص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تعد جميع الآثار الثابتة والمنقولة الموجودة في المملكة، أو في المناطق البحرية الخاضعة لسيادتها، أو ولايتها القانونية من الأملاك العامة للدولة، ويستثنى من ذلك ما يأتي: 1 - الآثار الثابتة التي يثبت أصحابها ملكيتهم لها أمام الجهات المختصة.2 - الآثار المنقولة التي سجلت من قبل مالكيها لدى الهيئة.3 - الآثار المنقولة التي لا ترى الهيئة ضرورة لتسجيلها.وعلى كل من يملك أثراً منقولاً أن يعرضه على الهيئة لتسجيله خلال سنتين من تاريخ نفاذ هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يجوز للهيئة وفقاً للإجراءات المنصوص عليها في نظام نزع ملكية العقارات للمنفعة العامة ووضع اليد المؤقت على العقار؛ امتلاك أو وضع اليد مؤقتاً على أي موقع أثري، أو موقع تراث عمراني، أو شعبي، أو مبنى تاريخي، كما يجوز لها امتلاك أو وضع اليد مؤقتاً على المباني، أو الأراضي المجاورة للآثار الثابتة المسجلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: إذا اقتضى الأمر إخلاء مواقع الآثار من شاغليها، فللهيئة - بالتنسيق والتعاون مع الجهات المختصة - القيام بذلك لقاء تعويض عادل وفقاً للإجراءات المنصوص عليها في نظام نزع ملكية العقارات للمنفعة العامة ووضع اليد المؤقت على العقار، ويجوز للهيئة إبقاء تلك الأبنية والمواقع تحت تصرف مالكيها أو المنتفعين بها وفق اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لا تُكسب الأرض مالكها أو المنتفع بها حرية التصرف في الآثار الثابتة أو المنقولة التي على سطحها أو في باطنها، ولا يجوز لأي منهما التنقيب عن الآثار فيها، وتقوم بذلك الهيئة بنفسها أو من تخوله بالتنقيب فيها، وما يعثر عليه من آثار يصبح ملكاً للدولة. وللهيئة أن تتخلى عن الآثار الثابتة في الأرض إذا اقتضت الضرورة ذلك بعد أن تحدد أهميتها، وتبت في تصنيفها، وتوثقها، وتسجلها وفقاً لأحكام هذا النظام ولوائحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- يحظر التعدي على مواقع الآثار والتراث العمراني، أو تحويرها، أو إزالتها، أو إلحاق الضرر بها، أو تشويهها بالكتابة، أو الطلاء، أو النقش، أو إلصاق الإعلانات عليها، أو افتعال الحريق فيها، أو تغيير معالمها، أو طمسها. 2- لا يجوز وضع اللافتات، أو اللوحات، أو غيرها من علامات الدعاية على مواقع الآثار والتراث العمراني إلا بعد موافقة الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تتولى الهيئة تقرير أثرية الآثار والتراث العمراني وتحديد ما يجب تسجيله منها، ويترتب على تسجيل أثرٍ ما إقرار الدولة بأهميته الوطنية أو التاريخية أو الثقافية أو الفنية، والمحافظة عليه، وصيانته، وعرضه وفقاً لأحكام هذا النظام ولوائحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: '1 - تضع الهيئة سجلاً يسمى (سجل الآثار) تسجل فيه جميع الآثار، ويشمل ما يأتي: أ - الآثار الثابتة، والمنقولة. ب - المواقع التاريخية، ومواقع التراث الشعبي، بحسب تصنيفها الوارد في المادة (الخامسة والعشرين) من هذا النظام. ج - قطع التراث الشعبي، بحسب تصنيفها الوارد في المادة (الرابعة والثلاثين) من هذا النظام. 2 - تعد الهيئة قوائم التسجيل، ويقرها الرئيس. 3 - يجوز إلغاء التسجيل الكلي أو الجزئي للأثر، ويصدر قرار الإلغاء من الرئيس، وتبين اللوائح ضوابط التسجيل الكلي أو الجزئي.4 - إذا رأت الهيئة - استثناءً من الفقرة (1) من هذه المادة - عدم ضرورة تسجيل الأثر، أو صدر قرار بإلغاء التسجيل الكلي أو الجزئي له؛ فتجيز التصرف فيه وفق نصوص هذا النظام ولوائحه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1- تحدد الهيئة مواقع الآثار والتراث العمراني، وتنسق مع وزارة الشؤون البلدية والقروية، والجهات المعنية الأخرى - كل فيما يخصه - في شأن ذلك. 2 - تجب المحافظة على مواقع الآثار والتراث العمراني عند وضع مشروعات تخطيط المدن والقرى، أو توسيعها، أو تجميلها، كما تجب مراعاة حقوق الارتفاق لها، ومنها إيجاد منطقة حماية غير مبنية حول هذه المواقع بالتنسيق مع وزارة الشؤون البلدية والقروية، ولا يجوز إقرار مشروعات التخطيط التي فيها - أو في نطاقها - مواقع آثار أو تراث عمراني إلا بعد أخذ موافقة الهيئة.3 - لا يجوز إصدار رخص البناء أو الترميم في الأماكن المجاورة لمواقع الآثار والتراث العمراني المحددة إلا بعد الاتفاق مع الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- يمنع تطبيق قرارات المنح والتوزيع على مواقع الآثار والتراث العمراني المتفق عليها مع وزارة الشؤون البلدية والقروية. 2 - تنسق وزارة الشؤون البلدية والقروية ووزارة الزراعة مع الهيئة عند إعداد مخططات المنح والمخططات الزراعية في مناطق الآثار والتراث العمراني المحددة والمناطق المجاورة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لا تجوز إقامة منشآت خطرة بالقرب من الآثار الثابتة إلا بموافقة الهيئة، وتبين اللوائح الضوابط الخاصة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 1- على كل من وزارة الزراعة ووزارة النقل التنسيق مع الهيئة عند إعداد دراسات المشروعات الحقلية. 2 - على وزارة البترول والثروة المعدنية التنسيق مع الهيئة قبل إصدار رخص التعدين، ورخص محاجر مواد الكسارات، وتحديد مجمعاتها. وعلى الهيئة إجابة الوزارة برأيها خلال (ثلاثين) يوماً من تاريخ تسلّم طلب التنسيق، ولا يخل ذلك بمسؤولية الجهة التي تعمل في الموقع عن المحافظة على الآثار والتراث العمراني الموجودة فيه. 3 - على وزارة الشؤون البلدية والقروية، والجهات الحكومية الأخرى، والجهات الخاصة، عند إقامة مشروعاتها وظهور آثار أو مواقع تراث عمراني في مواقع تلك المشروعات؛ المحافظة على تلك الآثار أو المواقع وإبلاغ الهيئة بذلك، وعلى الهيئة الإجابة برأيها خلال (ثلاثين) يوماً من تاريخ تسلّم البلاغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تنسق الهيئة مع وزارة الداخلية، والجهات ذات العلاقة لوضع آلية تكفل حماية مواقع الآثار والتراث العمراني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تضع الهيئة - بالتنسيق مع الجهات المعنية - قواعد استثمار مواقع الآثار والتراث العمراني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يجوز تنظيم مزادات بيع الآثار المنقولة وقطع التراث الشعبي، إلا بترخيص من الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على الهيئة - بالتنسيق مع الجهات المختصة - أن تعمل على استعادة الآثار الوطنية، وأن تساعد على إعادة الآثار الأجنبية المهربة والمنقولة بطرق غير شرعية من المملكة وإليها، وذلك وفقاً للاتفاقيات والمعاهدات الدولية ذات العلاقة التي تكون المملكة طرفاً فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: للمجلس الحق في قبول التنازل للهيئة عن ملكية مواقع الآثار، أو المواقع التاريخية، أو مواقع التراث الشعبي والتراث العمراني؛ عن طريق الهبة، أو الشراء بثمن رمزي، أو وضعها تحت تصرف الهيئة، وذلك بما لا يتعارض مع النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 1- على الشخص الذي يقع في ملكيته أو تحت سلطته أثر أو موقع تراث عمراني مسجل في سجل الآثار، أو التراث العمراني؛ المحافظة عليه.2 - لا يجوز استثمار الأثر وموقع التراث العمراني أو تشغيله إلا بترخيص من الهيئة، وتحدد اللوائح شروط منح هذا الترخيص. 3 - يلتزم كل مستخدم أو مشغل أو مستثمر للأثر أو موقع التراث العمراني؛ بصيانته وترميمه واستعماله وفقاً للوائح. 4 - لمستثمر الأثر أو موقع التراث العمراني أن يحصل على مقابل لزيارته؛ ليكون تعويضاً عن مصروفات المحافظة عليه، وتحدد اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: على كل شخص يشغل موقعاً أثرياً، أو تاريخياً، أو موقع تراث شعبي، أو عمراني؛ أن يسمح لموظفي الهيئة المختصين بالدخول؛ للاطلاع عليه ودراسته وفقاً للإجراءات النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: '1- ينشأ في الهيئة صندوق يسمى (صندوق الآثار والمتاحف والتراث العمراني)؛ للإنفاق منه على حماية الآثار، والتراث العمراني، والمحافظة عليها، وصيانتها، وعرضها، وتوظيفها بصفة دائمة، وكذلك لإنشاء متاحف جديدة، ودعم المتاحف التي تحمل شعار "متحف سعودي"، ودعم جهود القطاع الخاص من أفراد ومؤسسات وجمعيات أهلية؛ بما يسهم في تحقيق الأهداف والغايات المنصوص عليها في هذا النظام. 2 - تتكون الموارد المالية للصندوق مما يأتي: أ - ما يخصص للصندوق من إيرادات المشروعات التي تديرها الهيئة. ب - مبالغ التعويضات التي يحكم بها مقابل إحداث أضرار بالآثار ومواقع التراث العمراني. ج - المساعدات، والتبرعات، والمنح، والهبات، والأوقاف التي تقدم إلى الصندوق من الأفراد، والمؤسسات العامة والخاصة، والهيئات الأهلية الوطنية والعربية والإقليمية والدولية، التي يوافق عليها المجلس، وبما لا يتعارض مع النصوص النظامية. 3 - تحدد اللوائح القواعد والتعليمات المتعلقة بأموال الصندوق، وإدارتها، وإيداعها، وأوجه إنفاقها، واستثمارها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تشجع الهيئة - وفقاً للأنظمة القائمة - إنشاء جمعيات متخصصة في مجال الآثار والتراث والمتاحف، ويكون لهذه الجمعيات الاستفادة من دعم صندوق الآثار والمتاحف والتراث العمراني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: لا يجوز الإحداث في مواقع الآثار والتراث العمراني، أو استعمال الأنقاض التي فيها، أو أخذ أتربة أو أحجار أو أي مادة أخرى منها، إلا بموافقة الهيئة وتحت إشرافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: على كل من يكتشف أثراً ثابتاً أو منقولاً، أو يعلم باكتشافه، أن يبلغ الهيئة أو أقرب سلطة حكومية إليه فوراً، وعلى هذه السلطة توفير الحماية للأثر، وإحاطة الهيئة علماً بذلك على وجه السرعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: '1 - لا يجوز القيام بأي من الأعمال الآتية داخل حدود مواقع الآثار والتراث العمراني إلا بعد الحصول على موافقةٍ مسبقةٍ من الهيئة: أ - أعمال الهدم الكلي، أو الجزئي. ب - تمديدات خدمات الماء، والكهرباء، والغاز، والاتصالات، وأعمال الطرقات، وجميع ما من شأنه تغيير المظهر الخارجي لمواقع الآثار، والتراث العمراني، والمباني التي فيها، أو قلب محتوى طبقاتها الأثرية. ج - أي عمل جديد يتعلق بالبناء، وتصميم المواقع، والتشجير. 2 - على الهيئة الإجابة خلال (ستين) يوماً من تاريخ تسلّم طلب القيام بأي من الأعمال المحددة في الفقرة (1) من هذه المادة. 3 - تخضع الأعمال المحددة في الفقرة (1) من هذه المادة، أثناء عملية تنفيذها، لمراقبة الهيئة.4 - تضع الهيئة - بالتنسيق مع وزارة الداخلية، ووزارة الشؤون البلدية والقروية - الآلية الفنية والإجرائية للتعامل مع المباني التراثية الآيلة للسقوط.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: '1 - يكون تصنيف المواقع التاريخية ومواقع التراث الشعبي على النحو الآتي: الفئة (أ) المواقع ذات الأهمية العالية. الفئة (ب) المواقع ذات الأهمية المتوسطة.الفئة (ج) المواقع ذات الأهمية القليلة. 2 - تطبق على هذه المواقع أنظمة الحماية الخاصة بمواقع الآثار الواردة في هذا النظام. 3 - تحدد اللوائح ضوابط تصنيف هذه المواقع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تعد الآثار الغارقة الثابتـة والمنقولة، المكتشفة وغير المكتشفة، في المناطق البحرية الخاضعة لسيادة المملكة أو ولايتها القانونية؛ ملكاً للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 1- على كل من يكتشف موقعاً أثرياً تحت الماء، أو حطاماً لسفن، أو قطعة أثرية منقولة؛ أن يتركها في مكانها، وألّا يلحق بها أي ضرر أو تغيير، وأن يبلغ الهيئة أو أقرب سلطة حكومية بوجودها فوراً، وعلى هذه السلطة أن تحيط الهيئة علماً بذلك على وجه السرعة. 2- على كل من ينتشل من تحت الماء عن طريق الصدفة قطعة أثرية أن يبلغ عنها، ويسلمها إلى الهيئة أو أي سلطة حكومية قريبة منه خلال أسبوع من تاريخ انتشالها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: إذا تعرضت الآثار الغارقة أو المنتشلة من المناطق البحرية الخاضعة لسيادة المملكة أو ولايتها القانونية، لأخطار تهدد سلامتها أو بقاءها؛ فعلى الهيئة اتخاذ التدابير اللازمة للمحافظة عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'تنسق الهيئة مع كل من: وزارة الدفاع، ووزارة الداخلية (حرس الحدود)، ووزارة البترول والثروة المعدنية، ووزارة الزراعة، والهيئة العامة للمساحة، وهيئة المساحة الجيولوجية السعودية، والمؤسسة العامة للموانئ، والهيئة السعودية للحياة الفطرية، والرئاسة العامة للأرصاد وحماية البيئة، ومصلحة الجمارك؛ لوضع آلية تكفل حماية الآثار الغارقة، وعلى هذه الجهات إبلاغ الهيئة أو أقرب جهة أمنية عن أي أثر غارق مكتشف، وعن الأشخاص الذين في حوزتهم آثار غارقة، وحجز ما يُعثر عليه من آثار، وتسليمها إلى الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يجوز للهيئة تبادل الآثار المنقولة المكررة، أو التي لها نماذج مع المتاحف والمؤسسات العلمية الداخلية والخارجية، وكذلك إعارة الآثار المنقولة لعرضها في المتاحف والمعارض العالمية، وتحدد اللوائح الإجراءات المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: للهيئة قبول الآثار المنقولة التي تقدم إليها على سبيل الإهداء أو الإعارة، ولها أن تحفظها أو تعرضها باسم مقدمها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: للهيئة ترك الأثر المنقول المكتشف عن طريق الصدفة في حيازة مكتشفه بعد تسجيله، ولا يجوز لمكتشفه التصرف فيه دون موافقة الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: لا تجوز مزاولة نشاط ترميم الآثار المنقولة لأغراض تجارية إلا بعد الحصول على ترخيص من الهيئة، وتبين اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: '1 - يكون تصنيف قطع التراث الشعبي في سجل الآثار على النحو الآتي: الفئة (أ) القطع ذات الأهمية العالية. الفئة (ب) القطع ذات الأهمية المتوسطة. الفئة (ج) القطع ذات الأهمية القليلة. 2 - تخضع قطع التراث الشعبي المصنفة ضمن سجل الآثار للحماية الخاصة بالآثار المنقولة الواردة في هذا النظام.3 - تسهم الهيئة في توثيق قطع التراث الشعبي، ودراستها وعرضها، وتدعم برامج التوثيق والبحث العلمي التي يقوم بها الأفراد، والمؤسسات المهتمة بهذا المجال.4 - تحدد اللوائح ضوابط تصنيف قطع التراث الشعبي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 1 - لا يجوز بيع الآثار المنقولة المسجلة التي تملكها الدولة. 2 - دون إخلال بالاتفاقيات التي تكون المملكة طرفاً فيها، لا يجوز إهداء الآثار المنقولة المسجلة التي تملكها الدولة إلا بموافقة رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: لا يجوز اقتناء أي أثر منقول بأي شكل من أشكال الاقتناء دون حمل ما يثبت شرعية ملكيته، على أن يعرض على الهيئة لتسجيله، ويعد حائز الأثر مسؤولاً عن المحافظة عليه، ولا يجوز له إحداث أي تغيير فيه، فإن تعرض الأثر للضياع، أو التلف، أو السرقة؛ وجب على المقتني إبلاغ الهيئة فوراً، وفقاً للإجراءات التي تحددها اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: للهيئة أن تمتلك - بالشراء أو التبادل - أي أثر منقول، وذلك طبقاً للشروط التي تحددها اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يجوز الاتجار بالآثار المنقولة التي يثبت حائزها شرعية ملكيتها، وقطع التراث الشعبي، وذلك بعد الحصول على ترخيص من الهيئة، وفقاً للشروط والأحكام التي تبينها اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: 1 - يجوز - بترخيص من الهيئة - تداول الآثار المنقولة وقطع التراث الشعبي المملوكة للأشخاص الخاصة والمسجلة في سجل الآثار بوصفها تراثاً وطنياً، داخل حدود المملكة فقط، وفي حالة البيع؛ يكون للهيئة حق الأولوية في الشراء. 2 - يتعين على كل من يبيع قطعة مسجلة في سجل الآثار بوصفها تراثاً وطنياً، أو ينقل ملكيتها بأي شكل من أشكال التداول؛ إبلاغ من تنتقل إليه الملكية بقرار التسجيل وإجراءات الحماية، وإبلاغ الهيئة بتمام عملية التداول، وذلك وفقاً للوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يجب على كـل من يُحضر معه إلى المملكة قطعة أثرية أو تراثية الالتزام بالاتفاقيات الدولية المنظمة لذلك، التي تكون المملكة طرفاً فيها، والتصريح بها لموظفي الجمارك، وتسجيلها لدى الهيئة أو فروعها في المناطق خلال (ثلاثة أسابيع) من تاريخ إدخالها، وله حـق إخراجها من المملكة بعد الحصول على موافقة الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: لا يجوز نسخ الآثار، أو صنع نماذج لها لأغراض تجارية إلا بعد الحصول على ترخيص من الهيئة، وتبين اللوائح شروط وأحكام ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: الهيئة وحدها هي صاحبة الحق في المسح الأثري والتنقيب عن الآثار، ويتضمن ذلك الآثار الغارقة في المناطق البحرية الخاضعة لسيادة المملكة أو ولايتها القانونية، ويجوز للهيئة - بالتنسيق مع الجهات المختصة - الترخيص للجامعات، والهيئات، والمؤسسات، والجمعيات العلمية الوطنية، والمنقبين عن الآثار، والبعثات الأجنبية؛ بالمسح الأثري والتنقيب عن الآثار، إما بصورة منفردة، أو بالاشتراك معها، وفقاً لأحكام هذا النظام ولوائحـه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: للهيئة والجهات المرخص لها حق المسح الأثري والتنقيب عن الآثار في الأملاك العامة والخاصة، وذلك بالتنسيق مع أصحابها أو من تقع تحت سلطتهم، فإن كانت هناك ضرورة للاحتفاظ بالأثر المكتشف الثابت؛ فيعوض أصحاب الأملاك الخاصة عن قيمة الأرض التي فيها الأثر، وإن لم تكن هناك ضرورة لذلك؛ فيقدر التعويض عن الأضرار بعد انتهاء أعمال التنقيب، وذلك وفقاً للإجراءات المنصوص عليها في نظام نزع ملكية العقارات للمنفعة العامة ووضع اليد المؤقت على العقار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: 1- تعد ملكاً للدولة جميع الآثار المكتشفة - التي تعثر عليها الهيئة أو المرخص له بالتنقيب عن الآثار - ولا يجوز التنازل عنها. ويجوز للرئيس أن يسمح للمرخص له بعرض مكتشفاته من الآثار المنقولة لمدة يتفق عليها. 2 - يمكن إعارة المرخص له بالتنقيب عن الآثار أو الأفراد المرتبطين بجهة علمية؛ بعض الآثار المنقولة لمدة يتفق عليها، وذلك لدراستها وإجراء التحاليل اللازمة عليها أو ترميمها، ومن ثم إعادتها إلى الهيئة، وتبين اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: '1 - تضع الهيئة سجلاً يسمى (سجل التراث العمراني)؛ تسجل فيه جميع مواقع ومباني التراث العمراني ومناطقه، وتكون درجات التصنيف على النحو الآتي: الفئة (أ) المباني والمواقع ذات الأهمية العالية. الفئة (ب) المباني والمواقع ذات الأهمية المتوسطة.الفئة (ج) المباني والمواقع ذات الأهمية القليلة. 2 - يشمل التصنيف ما يأتي: أ - المبنى، أو الموقع، أو أجزاء منهما، بما فيها الآثار المنقولــة المرتبطة بهما، مثل: التركيبات، والتجهيزات، والنوافذ، والأبواب، والأثاث، وأعمال الدهان، والزخارف.ب - المناطق العمرانية التي تتكون من عــــدة مبانٍ، وتُكَوِّنُ نسيجاً عمرانياً من مدن وقرى وأحياء، ويشمل ذلك المناطق المحيطة بالمبنى أو المنطقة العمرانية والمواقع المسجلة، التي تشكل ضرورة لحماية المبنى أو الموقع المسجل، أو عرضهما، أو استعمالهما. ج - المناطـق الطبيعية المحيطة بالمبنى أو المنطقة العمرانية، أو المكملة للبيئة المخططة، كالحــدائق والمزارع. 3 - تحدد اللوائح معايير تصنيف مباني التراث العمراني ومناطقه.4 - تُعد الهيئة قوائم التسجيل، ويقرها الرئيس.5 - يجوز إلغاء التسجيل الكلي أو الجزئي للمواقع التراثية،
    ويصدر قرار الإلغاء من الرئيس، وتبين اللوائح ضوابط التسجيل الكلي أو الجزئي.6 - إذا رأت الهيئة - استثناءً من الفقرة (1) من هذه المادة - عدم ضرورة تسجيل الموقع أو المبنى التراثي، أو صدر قرار بإلغاء التسجيل الكلي أو الجزئي له؛ فتجيز التصرف فيه وفق نصوص هذا النظام ولوائحه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: 1- تحدد منطقة حمايــة التراث العمراني والأثري الثابت بمسافة (مائتي) متر حول الحدود المباشرة للمبنى أو الموقع المصنف، وبخاصة الجهة التي تقع عليها واجهة المبنى أو الموقع، ويتم تحديد ضوابط منطقة الحماية واشتراطاتها بالتنسيق مع وزارة الشؤون البلدية والقروية، ويمكن تمديد تلك المنطقة أو تقليصها بقرار من الرئيس بالتنسيق مع وزارة الشؤون البلدية والقروية والجهات ذات العلاقة.2- يتم إحداث وتحديد منطقة حماية للتراث العمراني في المدن والقرى إذا كانت لها أهمية تاريخية، أو ثقافية، أو فنية، أو علمية تسوغ المحافظة عليها، ويصدر بذلك قرار من الرئيس - بالتنسيق مع وزارة الداخلية ووزارة الشؤون البلدية والقروية - يتضمن مخطط حماية التراث العمراني وتنميته. ويمكن إلغاء التصنيف الكلي أو الجزئي لمنطقة الحماية بقرار من الرئيس.3- يمكن تغيير منطقة الحماية بإشراف الهيئة، وبقرار من الرئيس - بعد التنسيق مع الجهات ذات العلاقة - وذلك في حدود مقتضيات حماية الأثر المعماري المصنف عند وضع المخططات العمرانية الهيكلية والتصاميم العمرانية المفصلة أو مراجعتها، على أن تستوعب مقتضيات حدود منطقة الحماية ضمن الوثائق
    المذكورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: '1- تقوم الهيئة - بعد التنسيق مع وزارة الشؤون البلدية والقروية والجهات ذات العلاقة - بإعداد وتطوير مخطط حماية التراث العمراني وتنميته، وفق برنامج حماية وتطوير وتنمية شامل ومتكامل للمنطقة المعنية. 2- تحدد في مخطط حماية التراث العمراني المباني والمواقع المصنفة، وتوجهات الحماية ومقتضياتها، والارتفاقات، وضوابط أساليب التدخل، ويشمل ذلك: الترميم، والتأهيل العمراني، والتجديد العمراني، وأنظمة البناء، ومحددات استعمالات الأراضي، وطرق التدخل في المباني، وتحديد الارتفاعات، ومخططات النقل، والسير، والخدمات، وغيرها.3- يجوز تطبيق أنظمــة البناء والمواصفات الخاصة بالمباني علــى مباني التراث العمراني ومواقعه المصنفة، إلا إذا كـان تطبيقها يتعارض مع مقتضيات التصنيف أو الحماية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يجب - عند إعداد المخططات العمرانية الهيكلية، أو التصاميم العمرانية المفصلة - الالتزام بمقتضيات حماية المباني، والمواقع المصنفة، وتدرج الآثار الثابتة المسجلة في سجل الآثار، ومباني التراث العمراني والشعبي ومواقـعهما، والمواقع التاريخية المصنفة، ومنطقـة الحماية التابعة لها ضمن المخططات الهيكلية والتفصيلية لتنظيم المدن، ومخططات حماية التراث العمراني وتطويره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: يترتب على صدور قرار إحداث منطقة حماية التراث العمراني وتنميته؛ دمج مخططات حماية التراث العمراني ومقتضياتها ضمن المخططات العمرانية الهيكلية والتفصيلية، بحيث تحل محلها في المنطقة المصنفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: 'يترتب على تصنيف مبنى أو موقع تراث عمراني ضمن سجل الآثار ما يأتي: 1 - التزام الدولة بحمايته والمحافظة عليه وتطويره إذا كان ملكاً لها، والمشاركة في جهود حمايته والمحافظة عليه وتطويره إذا كان ملكاً للقطاع الخاص، ونزع ملكيته لمصلحة الدولة إذا كانت ظروف حمايته غير متوافرة، وذلك وفقاً للإجراءات المنصوص عليها في نظام نزع ملكية العقارات للمنفعة العامة ووضع اليد المؤقت على العقار.2 - ضرورة صيانته وترميمه وتشغيله بما يتناسب مع طبيعته، وذلك دون تغيير في أي عنصر من عناصره إلا بالقدر اللازم لعملية التشغيل. 3 - منع إحداث أي تغيير في منطقة الحماية يؤدي إلى تعرضه لأضرار، أو تشويه، أو إعاقة تشغيله، أو استعماله.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: 1- لا يجوز إجراء أي عمل من أعمال البناء أو الترميم في مباني وأحياء وقرى التراث العمراني المصنفة إلا بعد الحصول على رخصة من وزارة الشؤون البلدية والقروية، وتتفق الوزارة والهيئة على شروط منح الرخصة وإجراءاته. 2 - لا يجوز إجراء أي عمل من أعمال الصيانة أو التجزئة والتقسيم في مباني وأحياء وقرى التراث العمراني المصنفة إلا بعد موافقة الهيئة، وعلى الهيئة الإجابة على الطلب خلال (تسعين) يوماً من تاريخ تقديمه. 3 - تخضع الأعمال المنصوص عليها في الفقرتين (1) و (2) من هذه المادة لمراقبة الهيئة وإشرافها، وذلك وفقاً لقواعد تعدها الهيئة بالاتفاق مع الجهات المعنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: تبين اللوائح آلية المساهمة في تكاليف صيانة مبنى أو موقع التراث العمراني المصنف وإصلاحه وترميمه، إذا عجز مالكه عن القيام بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: 'مع عدم الإخلال بالنصوص النظامية ذات العلاقة: 1 - لا يجوز نقل ملكية المباني أو مواقع التراث العمراني المصنفة التي تملكها الدولة؛ إلى الأشخاص الطبيعية أو الاعتبارية الخاصة، بأي شكل من أشكال نقل الملكية، إلا بعد الحصول على موافقة الهيئة، ويلتزم المشتري أو المالك الجديد بشروط التصنيف المبينة في هذا النظام ولوائحه. 2 - يجوز بيع أو تأجير مباني ومواقع التراث العمراني المصنفة التي يملكها القطاع الخاص، أو نقل ملكيتها، بعد الحصول على موافقة الهيئة، ويلتزم المالك الجديد أو المستأجر بشروط البيع أو نقل الملكية أو التأجير التي تحددها اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: تنسق الهيئة مع وزارة البترول والثروة المعدنية عند تصنيف وتسجيل مباني التراث العمراني التي تقع ضمن مناطق امتيازات ومحجوزات شركات الزيت والغاز، وكذلك عند تحديد مناطق الحماية لتلك المواقع، وعند تحديد منطقة الحماية الفاصلة بين مواقع الآثار ومنشآت تلك الشركات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: لا يجوز العمل في مجال ترميم المباني التراثية وصيانتها إلا بعد الحصول على موافقة وتصنيف من الهيئة، وفقاً لما تبينه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: يجوز للشخص إنشاء متحف حضاري، أو تراثي، أو علمي، أو غير ذلك (كمشروع ثقافي، أو استثماري، أو كليهما) وذلك بعد الحصول على تصنيف وترخيص من الهيئة ومن الجهات ذات العلاقة وفقاً للأنظمة، وتبين اللوائح شروط وضوابط التصنيف والترخيص الصادرين من الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: 'تصنف المتاحف إلى ثلاث فئات: (أ) و(ب) و(ج) تبعاً لمستوى عروضها وتنوع نشاطاتها، وما عدا ذلك يعد (مجموعات خاصة)، وتحدد اللوائح معايير تصنيف المتاحف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: تعتمد الهيئة شعاراً باسم (متحف سعودي) يمنح للمتاحف العامة والخاصة، وينتقل الشعار مع المتحف إذا انتقلت ملكيته، وتبين اللوائح الأحكام المتعلقة بمنح الشعار، وتعليقه، وإلغائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: 'يجب على المتحف القيام بالآتي: 1 - حفظ المجموعات التي يمتلكها، وصيانتها، وترميمها، ودراستها، وإثراؤها. 2 - عرض مجموعاته، وجعلها متاحة لأكبر فئة من الجمهور. 3 - تنفيذ نشاطات ثقافية وتربوية، بعد التنسيق مع الجهات المعنية. 4 - المشاركة في البحث العلمي، والإسهام في تطوير المعرفة ونشرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: 1 - يجوز للهيئة تقديم الدعم المادي للمتاحف الخاصة التي تحمل شعار (متحف سعودي)، ودعمها لدى مصادر التمويل الحكومية والخاصة للحصول على إعانات، أو قروض توظف لتطوير المتاحف، وفق ضوابط تحددها اللوائح. 2 - يحق للمتحف الذي يحمل شعار (متحف سعودي) الاستفادة من خبرات الهيئة والحصول على دعمها العلمي والفني في مجالات العرض، وحفظ المعروضات، وصيانتها، وترميمها، وكذلك التشغيل والإدارة، والحصول على خبرات دولية في هذه المجالات في إطار برامج التعاون المشتركة بين الهيئة، والمتاحف العالمية والجهات الدولية ذات الاختصاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: يجوز تحديد مقابل مالي للدخول إلى المتاحف وإلى أي مواقع أخرى تقام فيها عروض مؤقتة، وتحدد اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: للهيئة تسجيل ما تنطبق عليه مواصفات قطع الآثار الوطنية من معروضات المتاحف في سجل الآثار، ولا يجوز للمتحف بيع هذه القطع، أو إخراجها خارج المملكة إلا بعد موافقة الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: يجوز للمتاحف التي تحمل شعار (متحف سعودي) فقط المشاركة في معارض خارج المملكة، ونشاطات مشتركة مع متاحف خارجية، وذلك بعد موافقة الهيئة، وتبين اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: يجوز للمتاحف التي تحمل شعار (متحف سعودي) فقط قبول الإعانات المالية والهدايا العينية من خارج المملكة، وذلك بعد موافقة الهيئة، ووفقاً للضوابط المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: يكون للمتحف الوطني، ومتاحف المناطق التي تحددها الهيئة، مجالس أمناء يكوّنها المجلس بناءً على اقتراح من الرئيس، ويقترح مجلس الأمناء برامج تشغيل المتحف، ويتابع جميع شؤونه، وأنشطته العلمية المختلفة، ومجالات التعاون مع المتاحف الداخلية والخارجية، وذلك وفقاً للائحة المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة والستون
  article_text_ar: يجوز للأفراد والمؤسسات والشركات العاملة في المملكة؛ التبرع بشراء قطع أثرية أو تراثية، أو مجموعات لمصلحة المتاحف، ويجوز - مقابل ذلك - منح المتبرع مزايا وحوافز. وتقترح الهيئة ـ بعد التنسيق مع الجهات ذات العلاقة ـ مثل هذه الحوافز، وترفعها إلى مجلس الوزراء لاعتمادها، وتحدد اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة والستون
  article_text_ar: يجب على كل متحف التنسيق مع الهيئة عند نقل مقره من مكان إلى آخر، أو إجراء تعديل جوهري في عروضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة والستون
  article_text_ar: لا يوقف نشاط المتحف نهائياً أو لمدة طويلة إلا بعد موافقة الهيئة، وللهيئة تحديد مصير معروضات المتحف، وتحدد اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة والستون
  article_text_ar: لا يجوز لأي متحف إجراء أي عملية ترميم لقطعة يملكها ومسجلة في سجل الآثار إلا بعد موافقة الهيئة، وتحدد اللوائح ضوابط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السبعون
  article_text_ar: لا تجوز مزاولة نشاط تشغيل المتاحف إلا بترخيص من الهيئة، وتحدد اللوائح شروط منح هذا الترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والسبعون
  article_text_ar: يعاقب بالسجن لمدة لا تقل عن (ثلاثة) أشهر ولا تزيد على (سنتين)، وبغرامة لا تقل عن (خمسة وعشرين ألف) ريـال ولا تزيد على (مائتي ألف) ريـال، أو بإحدى هاتين العقوبتين؛ كل من استولى بصورة غير مشروعة على أثر من ممتلكات الدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والسبعون
  article_text_ar: 'يعاقب بالسجن لمدة لا تقل عن (شهر) ولا تزيد على (سنة)، وبغرامة لا تقل عن (عشرة آلاف) ريـال ولا تزيد على (مائة ألف) ريـال، أو بإحدى هاتين العقوبتين؛ كل من: 1 - تعدى على أثر، أو موقع أثري، أو موقع تراث عمراني؛ بإتلافه، أو تحويره، أو إزالته، أو نبشه، أو إلحاق الضرر به، أو تغيير معالمه، أو طمسه.2 - مسح أو نقب عن الآثار دون ترخيص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والسبعون
  article_text_ar: 'يعاقب بالسجن لمدة لا تزيد على (ستة أشهر) وبغرامة لا تزيد على (خمسين ألف) ريـال، أو بإحدى هاتين العقوبتين؛ كل من: 1 - قلد أثراً أو زيفه مدعياً أثريته. 2 - قام بأي من أعمال الهدم الكلي أو الجزئي داخل حدود مواقع الآثار والتراث العمراني، أو بنى عليها؛ دون الحصول على موافقة من الهيئة. 3 - خالف شروط الارتفاق وحقوقه المفروضة على الأراضي المجاورة لمواقع الآثار.4 - انتشل - عمداً - أثراً غارقاً، أو نقله من مكانه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والسبعون
  article_text_ar: 'يعاقب بغرامة لا تزيد على (ثلاثين ألف) ريـال كل من: 1 - غيّر مبنى أو موقع تراث عمراني، أو أجرى في البيئة المحيطة به تعديلاً يؤدي إلى الإضرار به دون أخذ موافقة الهيئة.2 - نقل أنقاضاً أو أحجاراً أو أتربة من مواقع الآثار والتراث العمراني دون موافقة الهيئة.3 - رمى أنقاضاً أو مخلفات في مواقع الآثار والتراث العمراني.4 - شوّه أثراً أو تراثاً عمرانياً بالكتابة، أو الطلاء، أو النقش، أو إلصاق الإعلانات عليه، أو بافتعال الحريق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة والسبعون
  article_text_ar: يعاقب بغرامة لا تزيد على (عشرين ألف) ريـال كل من خالف الشروط المتعلقة بالآثار والتراث العمراني في الرخصة الممنوحة له الخاصة بترميم المباني الأثرية والتراثية، وأحكامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة والسبعون
  article_text_ar: 'يعاقب بغرامة لا تزيد على (خمسة عشر ألف) ريـال كل من: 1 - حاز أو صنع نماذج أو نسخاً للآثار لأغراض تجارية دون ترخيص من الهيئة.2 - أخفى الآثار التي اكتشفها أو عثر عليها، أو امتنع عن تسليمها إلى الهيئة. 3 - صدّر أثراً منقولاً أو باعه أو تصرف فيه، بالمخالفة لأحكام هذا النظام ولوائحه.4 - وضع لافتات أو لوحات أو غيرها من علامات الدعاية على مواقع الآثار والتراث العمراني دون موافقة الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة والسبعون
  article_text_ar: 'يعاقب بغرامة لا تزيد على (عشرة آلاف) ريـال كل من: 1 - لم يقدم للهيئة بياناً بالآثار التي يملكها. 2 - حاز قطعة أثرية أصلية غير مسجلة. 3 - حاز أثراً لا يحمل ما يثبت شرعية ملكيته. 4 - باع أو أجّر أو نقل ملكية أثر ثابت، أو موقع تراث عمراني مصنف؛ دون أخذ موافقة الهيئة. 5 - زاول نشاط ترميم الآثار المنقولة لأغراض تجارية دون الحصول على ترخيص من الهيئة، أو خالف شروط الترخيص الممنوح له.6 - قام بعمل من أعمال الصيانة أو التجزئة والتقسيم في مباني وأحياء وقرى التراث العمراني المصنفة، دون الحصول على موافقة الهيئة.7 - قام من المتاحف بترميم قطعة أثرية يملكها ومسجلة في سجل الآثار دون الحصول على موافقة الهيئة.8 - زاول نشاط تشغيل المتاحف دون الحصول على ترخيص من الهيئة، أو خالف شروط الترخيص الممنوح له.9 - عرقل عمل فرق الهيئة في مواقع الآثار والتراث العمراني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة والسبعون
  article_text_ar: تطبق على تهريب الآثار الأحكام الخاصة بالتهريب، المنصوص عليها في نظام (قانون) الجمارك الموحد لدول مجلس التعاون لدول الخليج العربية، على أن تقوم مصلحة الجمارك بتسليم الآثار المضبوطة إلى الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة والسبعون
  article_text_ar: مع عدم الإخلال بحقوق الغير (حسن النية)؛ تصادر بحكم قضائي الآثار المنقولة التي خالف حائزها أحكام المواد (الثانية، والسادسة والثلاثين، والأربعين) من هذا النظام، والأموال المتحصلة منها، وكذلك جميع الأدوات، والمواد، والآلات، ووسائط النقل التي استخدمت في المخالفات المنصوص عليها في المواد (الحادية والسبعين، والثانية والسبعين، والثالثة والسبعين، والثامنة والسبعين) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثمانون
  article_text_ar: 'مع عدم الإخلال بالعقوبات المنصوص عليها في هذا النظام: 1 - يُلزم كل من عثر على آثار، أو استولى على آثار مملوكة للدولة بصورة غير مشروعة، أو حصل على آثار بطريقة مخالفة لأحكام هذا النظام؛ بتسليم ما في حوزته إلى الهيئة دون تأخير.2 - يُلزم كل من أحدث ضرراً في مواقع الآثار والتراث العمراني المسجلة بدفع ما يقابل الضرر الحاصل، وفقاً لما تقرره المحكمة المختصة، ويودع مبلغ التعويض في صندوق الآثار والمتاحف والتراث العمراني، ويخصص لإصلاح الضرر. 3 - يُلزم كل من قام بأيٍّ من أعمال الهدم الكلي أو الجزئي داخل حدود مواقع الآثار والتراث العمراني أو البناء عليها دون الحصول على موافقة من الهيئة، وكل من خالف شروط الارتفاق وحقوقه المفروضة على الأراضي المجاورة لمواقع الآثار والتراث العمراني؛ بإزالةما أحدثه، وإعادة الموقع إلى ما كان عليه على نفقته، وتحت إشراف الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والثمانون
  article_text_ar: مع عدم الإخلال بالعقوبات المنصوص عليها في هذا النظام، في حالة مخالفة الأحكام والشروط المتعلقة بتراخيص المسح، أو التنقيب، أو التصدير، أو الاتجار، أو المتاحف؛ فللجنة المنصوص عليها في المادة (التسعين) من هذا النظام إصدار قرار يتضمن إيقاف النشاط، أو تعليق الترخيص، أو إلغاءه بصورة نهائية، وذلك وفقاً لما تبينه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والثمانون
  article_text_ar: يعاقب كل من اشترك بطريق الاتفاق، أو التحريض، أو المساعدة في ارتكاب أي من المخالفات المنصوص عليها في هذا النظام بالعقوبة نفسها المقررة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والثمانون
  article_text_ar: يعاقب على الشروع في أي من المخالفات المنصوص عليها في هذا النظام بما لا يتجاوز نصف الحد الأعلى للعقوبة المقررة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والثمانون
  article_text_ar: إذا كانت المخالفة معاقباً عليها بموجب هذا النظام ونظام آخر؛ فتطبق العقوبة الأشد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الخامسة والثمانون
  article_text_ar: أ- تجوز مضاعفة الحد الأعلى للعقوبة في حالة العود لارتكاب أي من المخالفات المنصوص عليها في هذا النظام، ويعد عائداً في تطبيق أحكام هذا النظام كل من عاد إلى ارتكاب المخالفة خلال ثلاث سنوات من تاريخ صدور حكم أو قرار نهائي واجب النفاذ في حقه. ب- يجوز تضمين الحكم أو القرار - الصادر بتوقيع أي من العقوبات المنصوص عليها في هذا النظام - النص على نشر منطوقة على نفقة المخالف في صحيفة (أو أكثر) تصدر في مقر إقامته، فإن تعذر ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة المرتكبة وجسامتها وتأثيرها، على أن يكون نشر الحكم أو القرار بعد اكتسابه القطعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السادسة والثمانون
  article_text_ar: يعد موظفو الهيئة الذين تخولهم بضبط مخالفات أحكام هذا النظام - أثناء قيامهم بأعمالهم - من رجال الضبط الجنائي، وذلك في حدود اختصاصهم، ويمكن للهيئة - بالاتفاق مع الجهات الأخرى - الاستعانة بموظفي تلك الجهات المخولين من جهاتهم لضبط تلك المخالفات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة السابعة والثمانون
  article_text_ar: تشعر الجهات الحكومية الهيئةَ عند علمها بوقوع أي مخالفة لأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثامنة والثمانون
  article_text_ar: كل أثرٍ يُضبط بمقتضى أحكام هذا النظام يسلم فوراً إلى الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التاسعة والثمانون
  article_text_ar: 'تمنح الهيئة مكافأة مالية بحسب ما تبينه اللوائح لكل من: 1 - ساعد على ضبط أثر تم العثور عليه، أو جرى تداوله بصورة مخالفة لأحكام هذا النظام ولوائحه. 2 - قدم معلومات أدت إلى اكتشاف أي مخالفة لأحكام هذا النظام ولوائحه. 3 - اكتشف أثراً ثابتاً أو منقولاً أو غارقاً مهماً بطريق الصدفة، وتكون المكافأة متناسبة مع قيمة الأثر.4 - أرشد أو ساعد على العثور على مواقع أو قطع أثرية غير معروفة للهيئة، على أن تكون المكافأة التي تمنح له متناسبة مع قيمة الأثر.5 - قام بأعمال تسهم في المحافظة على الآثار والتراث العمراني، وعدم العبث بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة التسعون
  article_text_ar: 1- تكوّن بقرار من الرئيس لجنة من ثلاثة أعضاء، يكون أحدهم على الأقل مستشاراً شرعياً أو نظامياً؛ للنظر في المخالفات وتطبيق الغرامات المنصوص عليها في المواد (الرابعة والسبعين، والخامسة والسبعين، والسادسة والسبعين، والسابعة والسبعين) من هذا النظام. 2 - تعتمد قرارات اللجنة من الرئيس، ويحق لمن صدر ضده القرار التظلم منه أمام ديوان المظالم وفقاً لنظامه.3 - تحدد اللوائح آلية عمل اللجنة، ومكافآت أعضائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الحادية والتسعون
  article_text_ar: دون إخلال بالفقرة (1) من المادة (التسعين) من هذا النظام، تختص هيئة التحقيق والادعاء العام بالتحقيق في مخالفات هذا النظام، ومباشرة الدعوى في شأنها أمام المحكمة الجزائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثانية والتسعون
  article_text_ar: يحل هذا النظام محل نظام الآثار، الصادر بالمرسوم الملكي رقم (م/26) وتاريخ 23/ 6 / 1392هـ، ويلغي جميع ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الثالثة والتسعون
  article_text_ar: يصدر المجلس اللوائح خلال (مائة وعشرين) يوماً من تاريخ نشر هذا النظام في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
- article_ref: المادة الرابعة والتسعون
  article_text_ar: يعمل بهذا النظام بعد مضي (مائة وعشرين) يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a7d4493b-7c03-4c2d-b3c6-a9a700f275cd/1
  verified: false
