articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذه اللائحة- المعاني المبينة أمام كل منها، مالم يقتض السياق غير ذلك: اللائحة: لائحة الجزاءات عن المخالفات البلدية. الوزارة: وزارة الشؤون البلدية والقروية. الوزير: وزير الشؤون البلدية والقروية. المخالفة البلدية: حالة عدم الالتزام بالأحكام الواردة في اللائحة، أو القرارات التنفيذية الصادرة بموجب اللائحة، أو الاشتراطات والقواعد والضوابط والتعليمات التي تختص الأمانة أو البلدية بالإشراف على تنفيذها وفقاً لما هو مقرر نظاماً. المخالفة البلدية الجسيمة: المخالفة البلدية التي من شأنها أن تؤدي إلى وقوع ضرر جسيم على صحة الإنسان أو سلامته أو الصحة العامة. المخالفة: المخالفة البلدية أو المخالفة البلدية الجسيمة. المخالف: من يرتكب مخالفة سواءً كان ذا شخصية طبيعية أو اعتبارية. الترخيص البلدي: موافقة مكتوبة -تصدرها الأمانة أو البلدية- وفقاً للأحكام الواردة في نظام إجراءات التراخيص البلدية، لبناء منشأة أو فتح محل لأي نشاط على موقع معين أو لبدء مزاولة العمل في منشأة، وذلك وفق الشروط المحددة في نظام البلديات والقرى ولوائحه التنفيذية. المحل: فيما
    عدا المنشأة، هو موقع -حاصل على ترخيص بلدي- يمارس فيه نشاط له علاقة باختصاصات الأمانة أو البلدية المقررة نظاماً. المنشأة: كيان -حاصل على ترخيص بلدي- مرخص له نظاماً بأداء نوع أو أكثر من الأنشطة الاقتصادية، ويمارس أنشطة الإنتاج أو التغليف أو المعالجة ويدخل فيها مادة أو أداة أو عنصر له علاقة باختصاصات الأمانة أو البلدية المقررة نظاماً. خطوط التنظيم: خطوط توضح حدود العقار وتفصله عن المجاورين والأملاك العامة، موضوعة في المخطط المعتمد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'مع مراعاة ما ورد في أحكام اللائحة، ودون الإخلال بأي عقوبة أشد منصوص عليها نظاماً، يعاقب كل من ارتكب مخالفة بواحد (أو أكثر) من الجزاءات الآتية: غرامة لا تتجاوز (خمسمائة) ألف ريال، ولا تتجاوز (مليون) ريال إذا كانت المخالفة مخالفة بلدية جسيمة. وتجوز مضاعفة الجزاء في حالة تكرار المخالفة. وتتعدد الغرامة بتعدد من وقعت منهم المخالفة. ويجوز بأمر من رئيس مجلس الوزراء رفع الحد الأعلى للغرامة المنصوص عليها في هذه الفقرة بعد الاتفاق بين الوزير ووزير المالية. إغلاق المحل أو المنشأة لمدة لا تزيد على (أسبوعين). وتجوز مضاعفة الجزاء في حالة تكرار المخالفة. إلغاء الترخيص البلدي للمحل أو للمنشأة ومنعهما من مزاولة النشاط لمدة لا تزيد على (سنتين) إذا كانت المخالفة مخالفة بلدية جسيمة. على أن يقصر إيقاع الجزاءين الواردين في الفقرتين (2) و(3) من هذه المادة على المكان الذي وقعت فيه المخالفة. وتحدد القرارات التنفيذية الصادرة بموجب اللائحة الإجراءات المترتبة على إيقاع أي من الجزاءين الواردين في الفقرتين (2) و(3) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يصدر بقرار من الوزير جدول تُحدد فيه المخالفات والجزاءات المقابلة لها المنصوص عليها في المادة (الثانية) من اللائحة، التي تطبق على كل منها، وفق آلية حوكمة واضحة يراعى فيه التدرج في تحديد مقدار الجزاء على المخالفة وتناسبه مع نوعها وتكرارها ومدى تأثيرها. يُحدد في الجدول المخالفات التي تجوز فيها مضاعفة الجزائين المنصوص عليهما في الفقرتين (1) و(2) من المادة (الثانية) من اللائحة في حالة تكرار المخالفة، بزيادة الحدين الأقصيين لهما على ألا تتجاوز الضعف. يُضمن الجدول المخالفات التي يُلزم فيها المخالف -خلال مدة محددة- بإزالة المخالفة أو إعادة الوضع إلى ما كان عليه قبل وقوع المخالفة أو إصلاح التلف الناجم عنها (إن وجد) وذلك على نفقته، على أن يراعى أنه في حال انتهاء المدة المحددة دون أن يقوم بما أُلزم به فتحتسب عليه مخالفة جديدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تُضبط المخالفات وتُثبت في محاضر وفق الإجراءات التي تحددها القرارات التنفيذية الصادرة بموجب اللائحة. يتولى الموظفون أو العمال في الأمانة أو البلدية أو الجهات ذات العلاقة أو من غيرهم -ممن يصدر بتسميتهم قرار من الوزير أو من يفوضه- ضبط المخالفات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: فيما عدا القرارات المتعلقة بجزاء الغرامة المنصوص عليه في الفقرة (1) من المادة (الثانية) من اللائحة عندما تتجاوز (خمسة وعشرين) ألف ريال، أو عندما تتجاوز (خمسين) ألف ريال إذا كانت المخالفة مخالفة بلدية جسيمة، يكون للوزير صلاحية إصدار قرارات الجزاءات المنصوص عليها في اللائحة، ويجوز له تفويض غيره بذلك من المسؤولين في الأمانة أو البلدية أو الجهات ذات العلاقة، على ألا يكون القرار الذي سيصدر بتحديد الجزاء المنصوص عليه في الفقرة (3) من المادة (الثانية) من اللائحة نافذاً إلا بعد أن يصدره الوزير أو يعتمده عند تفويض غيره في إصداره. تكوَّن بقرار من الوزير لجنة (أو أكثر) لا يقل عدد أعضائها عن (ثلاثة) من بينهم مستشار نظامي، ويسمى أحدهم رئيساً، ويكون لها صلاحية إصدار القرارات المتعلقة بجزاء الغرامة المنصوص عليه في الفقرة (1) من المادة (الثانية) من اللائحة عندما تتجاوز (خمسة وعشرين) ألف ريال، أو عندما تتجاوز (خمسين) ألف ريال إذا كانت المخالفة مخالفة بلدية جسيمة. وتحدد قواعد وإجراءات عمل اللجنة ومكافآت أعضائها بقرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجوز -بموافقة الوزير أو من يفوضه- تضمين القرار الصادر بتحديد الجزاء المقرر للمخالفة في حالة تكرارها؛ النص على نشر منطوقه على نفقة المخالف في صحيفة (أو أكثر) من الصحف المحلية التي تصدر في محل إقامته، أو في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة ومدى تأثيرها، على أن يكون النشر بعد تحصن القرار بمضي المدة المحددة نظاماً أو كان الحكم الصادر في شأنه مكتسباً للصفة القطعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا تخل الجزاءات الواردة في اللائحة بحق المتضرر من المخالفة في رفع الدعوى الخاصة عما أصابه من ضرر. وللمخالف أيضاً حق التظلم من تطبيق الجزاء عليه وفقاً لما هو مقرر نظاماً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'دون الإخلال بأي إجراء منصوص عليه نظاماً، ودون الإخلال بالجزاءات المنصوص عليها في المادة (الثانية) من اللائحة، يجوز للأمانة أو البلدية ما يأتي: حجز المركبة أو الآلية المتروكة في ساحة عامة أو موقف عام أو شارع عام لمدة تزيد على (سبعة) أيام. فإن لم يراجع صاحبها لتسلمها بعد المدة التي تحددها القرارات التنفيذية الصادرة بموجب اللائحة، فعلى الأمانة أو البلدية اتخاذ الإجراءات اللازمة وفقاً لما تحدده القرارات التنفيذية الصادرة بموجب اللائحة. حجز الماشية المتروكة سائبة داخل حدود حماية التنمية أو الداخلة ضمن هذه الحدود في المناطق الخضراء المملوكة للأمانة أو البلدية أو للغير؛ في حجز خاص لمدة لا تتجاوز (خمسة) أيام. فإن لم يراجع صاحبها لتسلمها بعد المدة التي تحددها القرارات التنفيذية الصادرة بموجب اللائحة، فعلى الأمانة أو البلدية اتخاذ الإجراءات اللازمة وفقاً لما تحدده القرارات التنفيذية الصادرة بموجب اللائحة. في جميع الأحوال، يتحمل المخالف ما قد يترتب على ما ورد في الفقرتين (1) و(2) من هذه المادة من نفقات، وتحدد القرارات التنفيذية الصادرة بموجب اللائحة آليات احتسابها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: دون الإخلال بالجزاءات المنصوص عليها في المادة (الثانية) من اللائحة، إذا تجاوز المرخص له بالبناء حدود الترخيص تجاوزاً غير متوافق مع المسموح به في أنظمة البناء؛ وذلك بزيادة نسبة البناء على الحد المسموح به في الترخيص، أو بزيادة الأدوار على العدد المرخص به، أو بعدم الالتزام بالارتدادات النظامية، أو بغيرها من التجاوزات؛ فتزال المخالفة على نفقة المخالف. وفي الحالات التي تصعب فيها الإزالة من الناحية الإنشائية لتأثير ذلك على سلامة المبنى -ويمكن تصحيح المخالفة بإزالة الضرر الناتج منها- فيجازى المخالف بدفع نصف تكلفة البناء محل المخالفة مع إلزامه بتصحيحها بإزالة الضرر، على أن يحضر شهادة من مكتب هندسي مؤهل من الوزارة يثبت فيها سلامة المنشآت المقامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'دون الإخلال بالجزاءات المنصوص عليها في المادة (الثانية) من اللائحة، إذا أقيم مبنى دون رخصة نظامية فتتبع الأحكام والإجراءات الآتية: إذا كان المبنى المقام متعارضاً مع خطوط التنظيم، فيزال المبنى على نفقة المخالف. إذا كان المبنى المقام لا يتعارض مع خطوط التنظيم وكان متوافقاً مع المسموح به في أنظمة البناء وليس منه ضرر على المجاورين، أو نتج عن المبنى ضرر يمكن إزالته؛ فيجازى المخالف بدفع ربع تكاليف البناء محل المخالفة ورسوم الرخصة المقررة نظاماً مع إلزامه بتصحيح المخالفة بإزالة الضرر (إن وجد)، على أن يحضر شهادة من مكتب هندسي مؤهل من الوزارة يثبت فيها سلامة المنشآت المقامة. إذا كان المبنى المقام مخالفاً لأنظمة البناء، وترتب عليه ضرر على المجاورين لا يمكن معه تصحيحه بإزالة محل الضرر؛ فيزال المبنى على نفقة المخالف. وتحدد القرارات التنفيذية الصادرة بموجب اللائحة الإجراءات الإضافية اللازمة لما ورد في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: على صاحب المحل أو المنشأة -أو من ينوب عنه- مراجعة الأمانة أو البلدية إذا طلبت منه ذلك في الحالات التي تحددها القرارات التنفيذية الصادرة بموجب اللائحة. على صاحب المحل أو المنشأة -أو من ينوب عنه- تنفيذ تعليمات الأمانة أو البلدية الصادرة منها وفقاً لما هو مقرر نظاماً. دون الإخلال بالجزاءات المنصوص عليها في المادة (الثانية) من اللائحة، تحدد القرارات التنفيذية الصادرة بموجب اللائحة الإجراءات المترتبة على عدم التزام صاحب المحل أو المنشأة -أو من ينوب عنه- بما ورد في الفقرتين (1) و(2) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: إذا كان لدى الأمانة أو البلدية شك قوي بوقوع مخالفة بلدية جسيمة، فيجوز لها التحفظ على المواد أو الأدوات المتعلقة بهذه المخالفة المشكوك في وقوعها، أو حجزها، أو إغلاق المحل أو المنشأة مدة لا تتجاوز (ثلاثة) أيام، يتخذ بعدها الإجراء اللازم وفقاً للّائحة والقرارات التنفيذية الصادرة بموجب اللائحة. يتحمل المخالف التلف الذي أصاب المواد أو الأدوات -بسبب التحفظ عليها أو حجزها- المستعملة في المخالفة البلدية الجسيمة وفقاً لما ورد في الفقرة (1) من هذه المادة، ويتحمل المخالف كذلك النفقات التي قد تترتب على ذلك التحفظ أو الحجز. وتعوض الأمانة أو البلدية صاحب الشأن عن التلف الذي أصاب تلك المواد أو الأدوات المحجوزة أو المتحفظ عليها وعن أي نفقات قد تترتب على ذلك التحفظ أو الحجز إذا لم يثبت وقوع المخالفة البلدية الجسيمة. تحدد القرارات التنفيذية الصادرة بموجب اللائحة الأحكام اللازمة لما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يترتب على ضبط المواد والأدوات المستعملة في المخالفة إتلافها إلا إذا ثبت أنها غير صالحة للاستخدام، وتحدد القرارات التنفيذية الصادرة بموجب اللائحة الأحكام والإجراءات اللازمة لما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجوز للأمانة أو البلدية إسناد مهمات الرقابة والتفتيش عن المخالفات إلى القطاع الخاص، وفقا ًللإجراءات النظامية ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يصدر الوزير القرارات التنفيذية اللازمة للائحة في حدود ما تقضي به من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: للوزير -أو من يفوضه- منح من يساعد في الكشف عن مخالفة مكافأة مالية تشجيعية لا تزيد على (25 %) من مبلغ الغرامة المحصلة؛ بشرط ألا يكون من الموظفين أو العاملين في الأمانة أو البلدية أو من المستعان بهم في شأن ضبط المخالفات أو أداء مهمات الرقابة أو التفتيش، ويضع الوزير بالاتفاق مع وزير المالية شروطًا وضوابط لهذا الغرض. للوزير -أو من يفوضه- منح من يتولى ضبط المخالفات أو أداء مهمات الرقابة أو التفتيش من المتميزين مكافآت لغرض تحسين الأداء، ويضع الوزير بالاتفاق مع وزير المالية شروطاً وضوابط لهذا الغرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تحل اللائحة محل لائحة الغرامات والجزاءات عن المخالفات البلدية الصادرة بقرار مجلس الوزراء رقم (218) وتاريخ 6 / 8 / 1422ه، وتلغي ما يتعارض معها من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/921c3d40-85cd-4f5e-aa97-aca900b92c72/1
