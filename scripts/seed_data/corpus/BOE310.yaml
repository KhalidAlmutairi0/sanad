- article_ref: المادة الثامنة عشرة
  article_text_ar: يعمل باللائحة بعد مرور (ثلاثين) يوماً من تاريخ نشرها في الجريدة الرسمية. ويجوز بقرار من الوزير زيادة هذه المدة لبعض أحكام اللائحة بما لا يتجاوز (مائة وثمانين) يوماً من تاريخ النشر.
