articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارة الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها: البنك: البنك المركزي السعودي. النظام: نظام البنك. المجلس: مجلس إدارة البنك. المحافظ: محافظ البنك. المؤسسة المالية: أي شخص يخضع لإشراف البنك ورقابته وتنظيمه، سواءً كان ذا صفة طبيعية أو اعتبارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع البنك بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط تنظيمياً بالملك، ويكون مقره الرئيس في مدينة الرياض، وله أن ينشئ فروعاً أو مراكز نقد داخل المملكة، وله – أيضاً - افتتاح مكاتب أو تعيين وكلاء ومراسلين له خارج المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف البنك إلى الآتي: المحافظة على الاستقرار النقدي. دعم استقرار القطاع المالي، وتعزيز الثقة به. دعم النمو الاقتصادي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يؤدي البنك مهماته وفقاً لأحكام النظام، وما يصدره المجلس من لوائح وسياسات، ووفق أفضل المعايير والممارسات الدولية، وله جميع الصلاحيات اللازمة لتحقيق أهدافه، وله - في سبيل ذلك - ممارسة المهمات والصلاحيات والاختصاصات الآتية: إصدار النقد، وتنظيمه (بما في ذلك: سك وطباعة وإصدار العملة الوطنية، وطرحها، وسحبها، وإلغاؤها، وإدارتها، وحمايتها)، والأعمال الأخرى كافة ذات العلاقة، بما لا يخالف أحكام نظام النقد العربي السعودي. الرقابة والإشراف على المؤسسات المالية وفقاً للأنظمة ذات العلاقة. إصدار اللوائح والتعليمات ذات الصلة بالمؤسسات المالية وأعمالها. وضع وإدارة السياسة النقدية، وتنظيم سوق صرف العملات الأجنبية. إدارة واستثمار احتياطيات النقد الأجنبي. القيـام بوظيفـة مصـرف الحكومـة، ووظيفـة مستشـار الحكومـة في الشـؤون النقـدية والمصرفية والمالية. إنشاء وتطوير وتشغيل البنى التحتية لنظم المدفوعات الوطنية والتسويات والمقاصة، وإصدار القواعد والتعليمات والتراخيص، والرقابة والإشراف على نظم المدفوعات والتسويات والمقاصة في مجال اختصاصه. إنشاء وتطوير وتشغيل منصات التقنيات المالية، وإصدار القواعد
    والتعليمات والتراخيص، والرقابة والإشراف عليها في مجال اختصاصه. وضع التعليمات والإجراءات الكفيلة بحماية عملاء المؤسسات المالية. وضع وإدارة السياسات الاحترازية واتخاذ الإجراءات والتدابير اللازمة للمؤسسات المالية، واتخاذ الإجراءات والتدابير اللازمة للمساهمة في مواجهة الاضطرابات والأزمات الاقتصادية والمالية، المحلية والإقليمية والعالمية. اتخاذ الإجراءات والتدابير المناسبة للحد من ارتكاب الجرائم المرتبطة بالمؤسسات المالية. التمثيل والمشاركة في المنظمات والهيئات والمحافل والمؤتمرات الإقليمية والدولية التي يُشارك فيها بعضويته وذلك وفق الإجراءات النظامية. التعاون وتبادل الخبرات مع البنوك المركزية الأخرى والجهات النظيرة له والمنظمات الإقليمية والدولية، وبيوت الخبرة المتخصصة داخل المملكة وخارجها، وذلك في حدود اختصاصاته. وضع الاختبارات والاشتراطات المهنية المتصلة بالمؤسسات المالية وأعمالها. إعداد البحوث والدراسات ونشر الإحصائيات في مجال اختصاصه. تأسيس شركات تابعة له، والمساهمة في تأسيس شركات، والمشاركة في شركات، تقوم بأداء نشاطات ذات علاقة بطبيعة أعماله، وفقاً للإجراءات النظامية. اقتراح مشاريع
    الأنظمة ذات العلاقة بالمؤسسات المالية والقطاع المالي، واقتراح تعديل القائم منها، والرفع عنها لاستكمال الإجراءات النظامية في شأنها. وأن يتم التنسيق معه في شأن إعداد واقتراح مشاريع الأنظمة أو تعديل القائم منها التي قد يترتب عليها آثار على الأوضاع النقدية أو استقرار القطاع المالي. تعريف المصطلحات والنصوص الواردة في النظام وتفسيرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: للبنك أن يتقاضى مقابلاً مالياً عن إصدار التراخيص والموافقات والخدمات والعمليات التي يؤديها وتكاليف الإشراف على المؤسسات المالية، وذلك وفقاً لضوابط يعتمدها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'لا يجوز للبنك القيام بأي من الأعمال الآتية: الاشتغال بالتجارة أو المساهمة في الأعمال التجارية أو أن يكون له مصلحة في أي مشروع تجاري أو صناعي أو زراعي، عدا ما هو ضروري لتحقيق أهدافه. شراء العقارات أو امتلاكها عدا ما يحتاجه للقيام بأعماله، أو لغرض تنويع استثماراته الأجنبية. تمويل الحكومة وإقراضها. تمويل أو إقراض أي شخص ذي صفة طبيعية أو اعتبارية. ويستثنى من ذلك المؤسسات المالية لغرض إدارة السيولة أو مواجهة الأزمات بقرار من المحافظ وفق ضوابط يضعها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تتمتع أصول البنك وإيراداته وممتلكاته بالحصانة، ولا يجوز تفتيشها أو حجزها أو الاستيلاء عليها أو مصادرتها أو نزع ملكيتها، ولا تخضع لإجراءات الإفلاس بأي شكل كان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للبنك مجلس إدارة يشكل على النحو الآتي: أ - المحافظ رئيساً للمجلس. ب- نائب المحافظ نائباً للرئيس. ج - خمسة من غير موظفي الحكومة أعضاء. يكون ترشيح أعضاء المجلس - المشار إليهم في الفقرة الفرعية (ج) من الفقرة (1) من هذه المادة - بالاتفاق بين المحافظ ووزير المالية، ويصدر بتعيينهم أمر ملكي، وتكون مدة عضويتهم (سبع) سنوات قابلة للتجديد لمدد أخرى مماثلة. وإن انتهت مدة العضو دون أن يجدد له، أو تعيين آخر بديلاً عنه يستمر العضو في عضويته. تحـدد مكافآت أعضـاء المجـلس ومـزاياهم بأمـرٍ ملكي، بناءً علـى اقتـراح وزير المـاليـة وبالتنسيق مع المحافظ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يجب أن يتوافر في العضو من الأعضاء المنصوص عليهم في الفقرة الفرعية (ج) من الفقرة (1) من المادة (الثامنة) من النظام الشروط الآتية: أن يكون سعودي الجنسية. أن يكون من ذوي الكفاية والخبرة ذات العلاقة بعمل البنك. ألا يكون قد سبق الحكم عليه في جريمة مخلة بالشرف أو الأمانة، ما لم يكن قد رد إليه اعتباره. ألا يكون قد أشهر إفلاسه، أو إعساره، أو امتنع عن الوفاء بديونه. ألا يكون شاغلاً لأي منصب أو وظيفة في جهة عامة أو لدى أي من المؤسسات المالية، أو أن يكون من مراجعي حساباتها. ألا يكون مالكاً أو وكيلاً لمكتب مراجع حسابات خارجي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يتولى المجلس الإشراف على أعمال البنك، ويكون المسؤول بشكل عام عن حسن سير الإدارة، وله الاختصاصات كافة اللازمة لتحقيق ذلك وفقاً لأهداف البنك، وللمجلس أن يضع ما يلزم من النظم والتعليمات واللوائح والسياسات بحسب ما يراه ضرورياً وملائماً لسير الأعمال في البنك وفقاً لنظامه، ومن ذلك - على سبيل المثال لا الحصر - الآتي: أ - اعتماد الاستراتيجيات والخطط التشغيلية للبنك. ب- إقرار اللوائح الداخلية واللوائح الإدارية والمالية والفنية والرقابية ولائحة الموارد البشرية. ج - إقرار الهيكل التنظيمي للبنك. د - تحديد السنة المالية للبنك. هـ- اعتماد الميزانية العامة للبنك، وإقرار حساباته الختامية. و- اعتماد تعيين مراجع أو مراجعي الحسابات الخارجيين للبنك وتحديد أتعابهم. ز- إنشاء فروع أو مكاتب للبنك. ح- متابعة التقارير الدورية التي تقدم عن سير العمل في البنك. للمجلس - في سبيل تحقيق اختصاصاته - تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات وصلاحيات واختصاصات للبنك، ويحدّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها ومكافآتها، ويكون لها الاستعانة بمن تراه لتأدية
    المهمات المعهود بها إليها. للمجلس تفويض بعض اختصاصاته إلى المحافظ، ويكون للمحافظ تفويض تلك الاختصاصات إلى من يراه من موظفي البنك وفق ضوابط وجدول صلاحيات يعتمدها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ينعقد المجلس بدعوة من رئيسه أو نائبه مرة كل (ثلاثة) أشهر، وكلما دعت الحاجة إلى ذلك بدعوة من رئيس المجلس أو بطلب من (ثلاثة) أعضاء على الأقل. لا يكون الاجتماع صحيحاً إلا بحضور أغلبية الأعضاء على الأقل، على أن يكون من بينهم رئيس المجلس أو نائبه. تصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين على الأقل، وفي حال التساوي في الأصوات يرجح الجانب الذي صوت معه رئيس الجلسة، ويجوز التصويت باستخدام الوسائل الإلكترونية كافة. للمجلس أن يدعو إلى حضور اجتماعاته من يرى الاستعانة بهم من ذوي الكفاية والخبرة والمختصين، من موظفي البنك أو غيرهم، لتقديم ما يطلبه المجلس من مشورة أو بيانات أو إيضاحات، دون أن يكون لهم حق التصويت. يعين المجلس من موظفي البنك أميناً للسر، ويحدد اختصاصاته ومكافأته ومدة تعيينه. تدوّن محاضـر جلسات المجلـس وقراراتـه، ويوقعهـا رئيس الجلسـة والأعضـاء الحاضرون وأمين السر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يرفع المحافظ إلى الملك طلب تعيين خلـفٍ لأي مـن أعضاء المجلـس - وفقاً للفقـرة (2) من المـادة الثامنـة من النظـام - في أي من الحالات الآتية: وفاة العضو. إذا فقد العضو أحد شروط العضوية المنصوص عليها في النظام. إذا طلب العضو الإعفاء. عنـد تغيب العضـو (ثلاثة) اجتمـاعـات متتاليـة دون عـذر يقبلـه المجـلس أو دون موافقة من رئيس المجلس. إذا أصبح العضو غير قادر على أداء مهماته لأي سبب. إذا أخلّ العضو بأحد واجباته إخلالاً جسيماً وفق ما يقرره المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المحافظ ونائب المحافظ وموظفو البنك  ( المادة الثالثة عشرة )
  article_text_ar: 'يكون للبنك محافظ متفرغ بمرتبة وزير يعين وتحدد مزاياه بأمر ملكي. والمحافظ هو المسؤول التنفيذي عن إدارة البنك، ويتولى تنفيذ سياساته ومهماته وتسيير شؤونه، ومباشرة الأعمال التي يراها ضرورية وملائمة للقيام بها وفقاً للنظام، ومن ذلك - على سبيل المثال لا الحصر - الآتي: تنفيذ القرارات التي يصدرها المجلس. تقديم تقارير دورية إلى المجلس عن أعمال البنك، ومنجزاته، ونشاطاته. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. تمثيل البنك أمام القضاء وفي علاقاته مع الغير، وله تفويض غيره في ذلك. أداء مهمات وصلاحيات البنك وفق ضوابط وجدول صلاحيات يعتمدها المجلس. اقتراح الاستراتيجيات والخطط التشغيلية للبنك. إبرام الاتفاقيات والعقود. تعيين موظفي البنك، والتعاقد مع الخبراء والمستشارين داخل المملكة أو خارجها، وتحديد مزاياهم، وفقاً لما يقره المجلس. افتتاح مراكز النقد، وتعيين الوكلاء والمراسلين . وللمحافظ تفويض بعض اختصاصاته إلى من يراه من موظفي البنك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكون للمحافظ نائب متفرغ يعاونه في أداء مهماته، ويحل محله في حال غيابه أو خلو منصبه؛ وذلك لتسيير أعمال البنك. يعين نائب المحافظ بالمرتبة الممتازة بناءً على اقتراح المحافظ، وتحدد مزاياه بأمرٍ ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يكون موظفو البنك عرضة لأي مساءلة أو مطالبة بسبب تأديتهم لمهماتهم وفقاً لأحكام النظام باستثناء حالات سوء النية أو الإخلال الجسيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: تعارض المصالح  ( المادة السادسة عشرة )
  article_text_ar: على عضو المجلس الإفصاح عن أي مصلحة تتعارض بشكل مباشر أو غير مباشر مع أدائه لمهماته وذلك قبل أول اجتماع للمجلس أو عند نشوء ذلك، ويحظر على العضو المشاركة في التصويت في الموضوعات التي تتعارض مع مصالحه. على موظف البنك الإفصاح عن أي مصلحة مباشرة تتعارض مع أدائه لمهماته، ويحظر عليه في هذه الحالة المشاركة في اتخاذ القرارات أو الإجراءات أو إبداء الرأي حيال الموضوعات التي تتعارض مع مصالحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: البنك هو المسؤول الوحيد عن وضع السياسة النقدية وتنفيذها، واختيار أدواتها وإجراءاتها التشغيلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يتولى تدقيق حسابات البنك مراجع خارجي (أو أكثر) على أن يكون مؤهلاً تأهيلاً فنياً كافياً وذا خبرة بأعمال البنك ويكون مسؤولاً أمام المجلس عن أداء عمله ويرفع تقاريره إلى المجلس مباشرة. يقتصر عمل مراجع الحسابات الخارجي على تدقيق حسابات البنك وقوائمه المالية، ولا يكون له التدخل بأي صورة في تسيير أعمال البنك أو التعرض لسياساته. يكون لمراجع الحسابات الخارجي الحق في الاطلاع على دفاتر البنك وسجلاته ومستنداته، وأن يطلب البيانات كافة التي يرى ضرورة الحصول عليها لمباشرة أعماله وأداء واجباته. وفي حال عدم تمكنه من ذلك؛ يرفع بذلك تقريراً إلى المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'يقوم البنك بالنيابة عن الحكومة وبناءً على طلب من وزير المالية أو من يفوّضه بما يأتي: فتح وتسوية ومتابعة الحسابات الجارية وتسجيل بيانات الإيرادات الحكومية. حفظ الودائع والحسابات. الإشراف على إصدار أو تنفيذ دفع الاعتمادات محلياً وخارجياً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'للبنك - وفقاً لما تقتضيه طبيعة أعماله، وتحقيقاً لأهدافه وأداء مهماته - القيام بالآتي: الدخول في اتفاقات ثنائية أو جماعية بشأن السياسات النقدية أو التنظيمية أو الرقابية، وفقاً للإجراءات النظامية. إبرام الاتفاقات مع البنوك المركزية الأخرى، أو الجهات الرقابية والإشرافية الأجنبية المماثلة، أو المؤسسات والمنظمات والمجالس الدولية ذات الصلة بعمله، وفقاً للإجراءات النظامية. التعاون والتنسيق مع الجهات الأجنبية النظيرة لغرض تبادل المعلومات أو الزيارات الإشرافية والرقابية ذات العلاقة بالمؤسسات المالية. إجراء العمليات النقدية والمالية وفتح حسابات في البنوك المركزية الأخرى والمؤسسات النقدية والمالية المحلية والأجنبية والإقليمية والدولية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'يُعنى البنك عند تواصله مع الجهات الرقابية والإشرافية الأجنبية المماثلة والمنظمات الدولية ذات الصلة؛ بما يأتي: المحافظة على تطوير العلاقات وتعزيز سبل التواصل مع تلك الجهات والمنظمات من خلال تنسيق الزيارات وتبادلها، وعقد الاجتماعات وجلسات العمل وحضورها. متابعة ما يصدر من التقارير والمعلومات من تلك الجهات والمنظمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: للبنك إبرام العقود والاتفاقيات باللغة العربية أو بغيرها من اللغات وفق ما تقتضيه حاجة العمل ومصلحة البنك. لا يخضـع البنك في قيامـه بتنفيذ أعمالـه وتأمين مشترياته لأحـكام نظام المنافسـات والمشتـريات الحكوميـة، ويخضـع في ذلك لما يصـدره المجلـس من لـوائح وسياسات، على أن تكـون هذه اللوائح والسيـاسـات متفقة مع الأهداف والمبادئ الأساسيـة لنظام المنـافسات والمشتـريات الحكومية. تخضع عقود البنك واتفاقياته لما يقره المجلس من سياسات، ويجوز استثناءً في الحالات التي تقتضيها مصلحة البنك؛ أن ينص على إخضاع عقوده واتفاقياته لقوانين أجنبية وذلك وفق السياسات الصادرة من المجلس. ويجوز في تلك الحالات تضمين العقود والاتفاقيات أحكاماً تخضع بمقتضاها لاختصاص محاكم أجنبية أو ينص فيها على اللجوء إلى التحكيم للبت في المنازعات التي قد تنشأ حيالها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يحظـر على أعضـاء المجلس وموظفـي البنك ومراجعي حساباته الخارجيين ووكلائه إفشاء أي بيانات أو معلومات تتعلق بشؤون البنك أو بشؤون المؤسسات المالية سواء أثناء عملهم أو بعد تركهم للعمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: لا يجوز التدخل بأي صورة في تسيير أعمال البنك أو التعرض لسياساته أو فرض الرقابة عليه أو تدقيق حساباته أو على ما يبرمه من عقود أو اتفاقيات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يقدم البنك إلى الملك تقريراً يشمل أحدث التطورات المالية والاقتصادية في المملكة وتقرير مراجعي الحسابات الخارجيين للبنك وذلك للسنة المالية المنصرمة، ويزود وزير المالية بنسخة منه. وتنشر نسخة من ذلك التقرير في التوقيت والوسيلة المناسبين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يحل النظام محل نظام مؤسسة النقد العربي السعودي الصادر بالمرسوم الملكي رقم (23) وتاريخ 23-5-1377هـ، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يُعمل بالنظام بعد (تسعين) يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a292ec7e-85fb-4ceb-9ad0-ac9200ced829/1
  verified: false
