articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ الآتية -أينما وردت في هذه الترتيبات- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: الترتيبات التنظيمية: الترتيبات التنظيمية للهيئة العامة للطرق. الهيئة: الهيئة العامة للطرق. الوزير: وزير النقل والخدمات اللوجستية. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. المجلس: مجلس إدارة الهيئة. الطرق: الطرق خارج النطاق العمراني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة، والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها بقرار من المجلس إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنظيم قطاع الطرق، والإشراف عليه، بما يساعد في تدعيم عملية النقل والخدمات اللوجستية في المملكة، وتمكين الجهات العاملة في هذا القطاع بما ينعكس على التنمية الاقتصادية بالمملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة في سبيل تحقيق أهدافها -دون إخلال باختصاصات الجهات الأخرى ذات العلاقة- القيام بما يأتي: وضع السياسات العامة المتعلقة بجميع الطرق داخل النطاق العمراني وخارجه وصيانتها، بالتنسيق مع الجهات الأخرى ذات العلاقة. وضع الخطط الاستراتيجية الخاصة بالطرق وتنظيمها، بالتنسيق مع الجهات الأخرى ذات العلاقة، والإشراف على تنفيذها بعد اعتمادها. اقتراح مشروعات الأنظمة ذات الصلة باختصاصات الهيئة، واقتراح تعديل المعمول به منها، والرفع عنها لاستكمال الإجراءات النظامية اللازمة. تعزيز الوضع التنافسي لإنشاء الطرق وتشغيلها وصيانتها. وضع ضوابط وقواعد دعم الأنشطة الاستثمارية والخدمات ذات القيمة المضافة للطرق، بما فيها الخدمات المساندة. وضع الشروط والمعايير والضوابط والمواصفات لإنشاء جميع الطرق داخل النطاق العمراني وخارجه وصيانتها، بالتنسيق مع الجهات الأخرى ذات العلاقة، ومتابعة الالتزام بها. إسناد بعض مهماتها إلى جهات حكومية، وذلك بالاتفاق مع الجهة المسند إليها، أو إلى القطاع الخاص، وفق ضوابط يعتمدها المجلس. ممارسة الأعمال التشغيلية المتعلقة بالطرق من تخطيط وتصميم وتنفيذ وصيانة، والإشراف عليها.
    وضع معايير الأمان والسلامة والبيئة المتعلقة بجميع الطرق داخل النطاق العمراني وخارجه، بالتنسيق مع الجهات الأخرى ذات العلاقة، ومتابعة تنفيذها. منح التراخيص والتصاريح الخاصة بقطاع الطرق. التحقيق فنيًّا فيما يتعلق بالحوادث الناتجة عن تنفيذ الطرق وصيانتها. التنسيق مع الجهات الأخرى ذات العلاقة؛ لجذب الاستثمارات المحلية والأجنبية وتشجيع وتهيئة البيئة المناسبة للاستثمار في قطاع الطرق. التنسيق مع الجهات الأخرى ذات العلاقة؛ لتزويد الطرق بالخدمات اللازمة في سبيل توفير الخدمات الملائمة لاستخدام الطرق. التنسيق مع الجهات الأخرى ذات العلاقة؛ لإنشاء مراكز التدريب والبحوث المتخصصة بقطاع الطرق. إجراء الدراسات والأبحاث المتعلقة بقطاع الطرق ومشروعاتها. تنظيم وإقامة المعارض والمؤتمرات ذات العلاقة بقطاع الطرق والمشاركة فيها. تمثيل المملكة في الهيئات والمنظمات الدولية ذات العلاقة بقطاع الطرق. إنشاء قاعدة بيانات تضم جميع البيانات المتعلقة بإحصاءات الطرق في المملكة بالتنسيق مع الجهات الأخرى ذات العلاقة. أي مهمة أخرى توكل إليها بموجب الأنظمة واللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: الرئيس التنفيذي. ممثل من وزارة الداخلية. ممثل من وزارة النقل والخدمات اللوجستية. ممثل من وزارة المالية. ممثل من وزارة الشؤون البلدية والقروية والإسكان. ممثل من الهيئة العامة للنقل. ممثل من الهيئة السعودية للمقاولين. ممثل من مكتب دعم هيئات تطوير المناطق والمدن. ثلاثة من القطاع الخاص من ذوي العلاقة بقطاع الطرق، يصدر بتعيينهم قرار من مجلس الوزراء بناءً على ترشيح من الوزير، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد لمرة واحدة. ويجب ألَّا تقل مرتبة ممثلي الجهات الحكومية عن (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويختص بالإشراف عليها وتصريف أمورها، وله ممارسة جميع الصلاحيات واتخاذ جميع القرارات اللازمة لتحقيق أغراضها؛ وذلك في حدود أحكام الترتيبات التنظيمية، وله بوجه خاص ما يأتي: اعتماد السياسات العامة المتعلقة بجميع الطرق داخل النطاق العمراني وخارجه وصيانتها. اعتماد الخطط الاستراتيجية الخاصة بالطرق وتنظيمها. الإشراف على تنفيذ الهيئة المهمات المنوطة بها. اعتماد خطط الهيئة وسياساتها وبرامجها، ومتابعة تنفيذها. اعتماد ضوابط وقواعد دعم الأنشطة الاستثمارية والخدمات ذات القيمة المضافة للطرق، بما فيها الخدمات المساندة. اعتماد الشروط والمعايير والضوابط والمواصفات لإنشاء جميع الطرق داخل النطاق العمراني وخارجه وصيانتها، ومتابعة الالتزام بها. اعتماد معايير الأمان والسلامة والبيئة المتعلقة بجميع الطرق داخل النطاق العمراني وخارجه. اعتماد القواعد والمعايير الخاصة بقطاع الطرق. اعتماد ضوابط إسناد بعض مهمات الهيئة إلى جهات حكومية أو إلى القطاع الخاص. النظر في كل ما يتعلق بتخصيص قطاع الطرق، والرفع عن ذلك وفقاً للأحكام النظامية المنظمة للتخصيص. اعتماد لائحة التراخيص
    والتصاريح التي تختص بها الهيئة. اعتماد اللوائح الإدارية، بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. اعتماد اللوائح المالية، والأحكام ذات الأثر المالي في اللوائح الإدارية، بالاتفاق مع وزارة المالية. اعتماد اللوائح اللازمة لتسيير العمل فيها. اعتماد هيكل الهيئة الإداري ودليلها التنظيمي. اعتماد المقابل المالي للتراخيص والتصاريح التي تمنحها الهيئة، والمقابل المالي لاستغلال الطرق وأحرامها وتحديد طرق تحصيلها، وفق الإجراءات النظامية والآليات ذات الصلة. الموافقة على الاتفاقيات والعقود بأنواعها مع الأفراد والمؤسسات والشركات فيما له علاقة بأغراض الطرق ونشاطاتها، ومراجعتها بصفة دورية بحسب المتطلبات التشغيلية، وتعديل ما يلزم في شأنها بالتوافق مع المستثمرين. الموافقة على إنشاء فروع الهيئة ومكاتبها. الموافقة على استثمار أموال الهيئة بما يحقق أغراضها، واستثمار العقارات واستئجارها؛ وفقاً للأنظمة والتعليمات والآليات ذات الصلة. النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة ومركزها المالي. اعتماد ميزانية الهيئة وحسابها الختامي وتقريرها السنوي وتقرير مراجع حساباتها، ورفعها بحسب الإجراءات
    النظامية المتبعة. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف، بحسب الإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي للهيئة ومراقب مالي داخلي لها. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه أو من منسوبي الهيئة. وللمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من غيرهم، ويعهد إليها بما يراه من مهمات، ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المعهودة إليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة الرئيس، برئاسة رئيس المجلس أو من ينيبه من الأعضاء من ممثلي الجهات الحكومية، ويجوز عند الحاجة عقدها في مكان آخر داخل المملكة. يعقد المجلس اجتماعاته بصفة دورية (أربع) مرات -على الأقل- في السنة. ولرئيس المجلس دعوته للاجتماع متى ما دعت الحاجة إلى ذلك، أو متى طلب ذلك (ثلث) الأعضاء على الأقل. ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يكون الاجتماع صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم رئيس المجلس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يُرجّح الجانب الذي صوّت معه رئيس الاجتماع. لا يجوز لعضو المجلس الامتناع عن التصويت ولا تفويض عضو آخر للتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز -عند الحاجة وفي الحالات الطارئة ووفقاً لما يقدره رئيس المجلس- أن تُعقد الاجتماعات وأن يُصوّت عليها عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ القرارات بطريق التمرير على الأعضاء، ويُوقع عليها
    بما يفيد اطلاع جميع الأعضاء عليها، ولا تُعدُّ القرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرر على جميع الأعضاء، ويُصوّت عليها من جميع الأعضاء، وتحز على أغلبية أصواتهم. يكون للمجلس أمين من بين منسوبي الهيئة يختاره رئيس المجلس بناءً على ترشيح الرئيس التنفيذي، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات، ويحضر اجتماعات المجلس دون أن يكون له حق التصويت. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت. تنشر القرارات التي يرى المجلس ضرورة إبلاغها للمرخص لهم أو المتعاملين مع خدمات الهيئة؛ في الجريدة الرسمية وفي أي وسيلة أخرى يرى المجلس مناسبتها، على ألَّا يخل هذا النشر بالمصلحة العامة أو بأسرار العمل. وتبلغ الهيئة هذه القرارات للجهات المعنية بها مباشرة بالطريقة المناسبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي، يعين ويعفى من منصبه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون المسؤول عن إدارة الهيئة وتسيير أعمالها، وتتركز مسؤولياته وصلاحياته في حدود ما تنص عليه الترتيبات التنظيمية، وما يقرره المجلس، وله على وجه الخصوص ممارسة الصلاحيات الآتية: اقتراح السياسات العامة المتعلقة بجميع الطرق داخل النطاق العمراني وخارجه وصيانتها، ورفعها إلى المجلس لاعتمادها. اقتراح الخطط الاستراتيجية الخاصة بالطرق وتنظيمها، ورفعها إلى المجلس لاعتمادها. اقتراح خطط الهيئة وسياساتها وبرامجها، ورفعها إلى المجلس لاعتمادها، والعمل على تنفيذها بعد اعتمادها. اقتراح ضوابط وقواعد دعم الأنشطة الاستثمارية والخدمات ذات القيمة المضافة للطرق، بما فيها الخدمات المساندة، ورفعها إلى المجلس لاعتمادها. اقتراح الشروط والمعايير والضوابط والمواصفات لإنشاء جميع الطرق داخل النطاق العمراني وخارجه وصيانتها، ورفعها إلى المجلس لاعتمادها، ومتابعة الالتزام بها بعد اعتمادها. اقتراح معايير الأمان والسلامة والبيئة المتعلقة بجميع الطرق داخل النطاق العمراني وخارجه، ورفعها إلى المجلس لاعتمادها.
    اقتراح القواعد والمعايير الخاصة بقطاع الطرق، ورفعها إلى المجلس لاعتمادها. اقتراح ضوابط إسناد بعض مهمات الهيئة إلى جهات حكومية أو إلى القطاع الخاص، ورفعها إلى المجلس لاعتمادها. اقتراح لائحة التراخيص والتصاريح التي تختص بها الهيئة، ورفعها إلى المجلس لاعتمادها. الإشراف على إعداد الهيكل التنظيمي للهيئة، ولوائحها الإدارية والمالية، واللوائح اللازمة لتسيير العمل فيها؛ ورفعها إلى المجلس لاعتمادها. متابعة تنفيذ القرارات التي يصدرها المجلس، أو القرارات ذات الصلة بأعمال الهيئة. التوقيع على الاتفاقيات والعقود بأنواعها مع الأفراد والمؤسسات والشركات فيما له علاقة بأغراض الطرق ونشاطاتها، بعد موافقة المجلس. التعاقد مع العاملين في الهيئة، وفقاً للهيكل التنظيمي واللوائح المالية والإدارية التي يقرها المجلس. الصرف من الميزانية المعتمدة واتخاذ الإجراءات المالية وفقاً للأنظمة واللوائح المقررة والصلاحيات المفوضة له من المجلس. تنظيم مشاركة الهيئة في المعارض والمؤتمرات الإقليمية والدولية. إصدار القرارات اللازمة لتنفيذ أحكام الترتيبات التنظيمية واللوائح الصادرة بناءً عليها والقواعد والإجراءات المعتمدة، بحسب
    الصلاحيات الممنوحة له. الإشراف على منسوبي الهيئة، ومباشرة الاختصاصات والصلاحيات المالية والإدارية الممنوحة له وفقًا للترتيبات التنظيمية وما تحدده اللوائح. الإشراف على إعداد مشروع ميزانية الهيئة، وتقريرها السنوي، ومشروع حسابها الختامي، ورفعها إلى المجلس. رفع تقارير دورية إلى المجلس عن سير العمل في الهيئة. التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفقاً للأنظمة والصلاحيات التي يفوضه بها المجلس. إقرار الخطط والبرامج اللازمة للتدريب والابتعاث وإيفاد منسوبي الهيئة في جميع مجالات عملها ومتابعة تنفيذها. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. أي مهمة أخرى يكلفه بها المجلس. وللرئيس التنفيذي تفويض أي من اختصاصاته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها والتراخيص والتصاريح التي تمنحها. ج-ما يقبله المجلس من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف وفقاً للأنظمة. د- الدخل الذي تتحصل عليه من عائدات استثماراتها. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة. يُصرف من هذه الإيرادات وفق ميزانية الهيئة المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تنشر الترتيبات التنظيمية في الجريدة الرسمية، ويعمل بها بعد (تسعين) يوماً من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c6b7358c-cc66-4a6b-8694-aef800d07e5e/1
  verified: false
