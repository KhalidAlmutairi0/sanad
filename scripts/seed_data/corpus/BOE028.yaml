- article_ref: الأحكام العامة الخاصة بالعلامات والإشارات المرورية
  article_text_ar: تكون العلامات والإشارات التحذيرية والتنظيمية والإعلامية وفقاً للأحجام القياسية المعتمدة. يجب أن تكون كافة العلامات والإشارات التحذيرية والتنظيمية والإعلامية للنوع الواحد ذات أشكال موحدة ، وأن تكون العلامات بأصنافها المختلفة متماثلة في مواصفاتها ، وأن يغطي التجانس في التصميم كلاً من الشكل ، واللون ، والأبعاد ، والرموزأو الكتابة ، والإضاءة ، والإنعكاسية بحيث تشكل وحدة متجانسة متكاملة. يجب استخدام العلامات والإشارات في الأماكن التي تستدعي الحاجة لها دون الإفراط في استخدامها حتى لا تفقد دورها. يجب وضع العلامات والإشارات على مسافات كافية من الموقع المعني بها. يجب عدم وضع أي وضع أي ملصق أو إعلان على العلامات أو الكتابة عليها سواء على اللوحات التفسيرية أو الأعمدة الحاملة لها. يجب أن تكون العلامة مصنعة من معدن صلب ، وأن تكون العلامات عاكسة أو مضاءة بحيث تظهر بنفس اللون ليلاً ونهاراً. يجب على مستخدمي الطريق مراعاة التعليمات التي تحتويها العلامات والتقيد التام بالتحذيرية والتنظيمية منها في الظروف الطبيعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: الإشارات التحذيرية (مرفقه مع أصل الوثيقة)
  article_text_ar: 'أولاً: الغرض من الإشارات التحذيرية: تستخدم الإشارات التحذيرية لتنبيه وتحذير السائق وكافة مستخدمي الطريق من أخطار أو أوضاع خطرة قائمة أو محتملة على الطريق أو الشارع أو بجوارهما وذلك حتى لا يفاجأ بالخطر ويؤثر سلبا على تصرفه. وتطالب الإشارات التحذيرية بأخذ الحيطة والحذر من قبل السائق من أجل سلامته وسلامة من معه وكافة مستخدمي الطريق. ثانياً: شكل وألوان الإشارات التحذيرية: بوجه عام تكون جميع الإشارات التحذيرية ذات شكل مثلث. وتكون الأرضية (خلفية الإشارة) باللون الأبيض والرموز أو الرسوم باللون الأسود على وجه الإشارة وإطار باللون الأحمر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: الإشارات التنظيمية (مرفقه مع أصل الوثيقة)
  article_text_ar: 'أولاً: الغرض من الإشارات التنظيمية: تستخدم الإشارات التنظيمية لتعريف السائق وكافة مستخدمي الطريق بالأنظمة المرورية والقيود والمحظورات المختلفة الواجب التقيد بها إثناء القيادة أو استخدام الطريق. وهذه الإشارات توضح أنظمة المرور وقوانينه ويتعرض من يخالفها للمخالفة والعقاب. كما أن هناك عدة أنواع وأصناف الإشارات التنظيمية حسب التالي: - مجموعة إشارات حرم الطريق وتتضمن الآتي: - علامة (قف). - علامة (أعط الأفضيلة). - مجموعة إشارات السرعة. - مجموعة إشارات السير وممنوعات السير. - مجموعة إشارات الانتظار. - مجموعة الإشارات الإجبارية. ثانياً: شكل وألوان الإشارات التنظيمية: بوجه عام تكون جميع الإشارات التنظيمية دائرية الشكل وتكون الأرضية (خلفية الإشارة) باللون الأبيض والرموز أو الرسوم باللون الأسود على وجه الإشارة وإطار باللون الأحمر وهناك بعض الاستثناءات مثل: شكل إشارتي (قف) و (أعط الأفضلية) يختلف، فإشارة (قف) ذات الشكل ثماني الأضلاع وأرضية حمراء والكتابة والإطار بالأبيض وذلك لتمييزها لأهميتها. أما إشارة (أعط الأفضلية) ذات شكل مثلث متساوي الأضلاع مقلوب (رأسه إلى أسفل) وتكون الأرضية
    باللون الأبيض والإطار باللون الأحمر. الإشارات الإجبارية تكون أرضيتها باللون الأزرق والكتابة بالأبيض.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: الإشارات الإرشادية (مرفقه مع أصل الوثيقة)
  article_text_ar: 'أولاً: الغرض من الإشارات الإرشادية: تستخدم الإشارات الإرشادية بصفة أساسية من أجل إرشاد وتوجيه السائقين وكافة مستخدمي الطرق على طول الشوارع والطرق إلى المدن والقرى والشوارع وغير من المقاصد الهامة والضرورية. وإحاطتهم بالتقاطعات وتحديد المسافات والاتجاهات والأماكن ذات الأهمية الجغرافية والجيولوجية والتاريخية والدينية ومرافق الخدمات على الطرق. وبشكل عام فإن هذه الإشارات تؤمن مثل هذه المعلومات، كما تساعد السائقين على طول الطريق بسلك أقصر الطرق للوصول لمقاصدهم. ثانياً: شكل وألوان الإشارات الإرشادية: بالنسبة لمعظم الإشارات الإرشادية فإن الكتابة أو الرموز تكون مختلفة ومتنوعة لدرجة أنه لا يمكن أن يكون هناك حجم موحد لجميع الإشارات. ولذلك فإن أحجام الإشارات تتحدد أساسا بطول الرسالة المراد توصيلها. بالنسبة للألوان والإشارات الإرشادية فهي أيضاً مختلفة وقد تم تحديد الألوان حسب نوع الرسالة فمثلاً: الإشارات على الطرق خارج المدن تكون الأرضية باللون الأزرق والكتابة باللون الأبيض. أما داخل المدن تكون الأرضية بالأخضر والكتابة بالأبيض. للتأشير للمدن والقرى والهجر فتكون الأرضية بالأزرق والكتابة
    بالأبيض. للتأشير للشوارع والأحياء داخل المدن فيكون لون الأرضية بالأخضر والكتابة بالأبيض. للتاشير للمقاصد المهمة كالمستشفيات يكون لون الخلفية بالأبيض والكتابة باللون بالأسود. للتأشير للمزارع والمجمعات الترفيهية والمتاحف يكون لون الخلفية بالبني والكتابة بالأبيض وكذلك بالنسبة للإشارات الدينية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: إشارات وعلامات مناطق العمل والمؤقتة
  article_text_ar: 'أولاً: الغرض من إشارات مناطق العمل والمؤقتة: تستخدم إشارات وعلامات مناطق العمل والمؤقتة لنفس الغرض التي تستخدم فيه الإشارات السابق ذكرها التحذيرية والتنظيمية والإرشادية مع اختلاف بسيط بأن إشارات مناطق العمل تحذر وتنظم لوضع طارئ وغير عادي ومؤقت على الطريق يجب مراعاته من قبل السائقين ومستخدمي الطريق. ثانياً: شكل وألوان إشارات مناطق العمل والمؤقتة: إشكال إشارات مناطق العمل والمؤقتة في الشوارع والطرق هي نفس إشكال الفئات الرئيسية الثلاث التي تنقسم إليها إشارات المرور وهي التحذيرية والتنظيمية والإرشادية مع اختلاف في اللون بحيث تكون ألوان إشارات مناطق العمل الأرضية صفراء وإطار أحمر والكتابة أو الرسم بالأسود.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
