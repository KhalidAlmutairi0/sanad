articles:
- article_ref: المادة الأولى
  article_text_ar: تسري أحكام هذا النظام، والجداول الملحقة به، ولائحته، على المركبات بجميع أنواعها والدراجات، كما يسري على مرور المشاة والحيوان في الطرق العامة وجميع مستخدمي الطريق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يقصد بالألفاظ والعبارات التالية - أينما وردت في هذا النظام - المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك: 1 - الطريق : كل سبيل مفتوح للسير العام. 2 - نهر الطريق : جزء من الطريق يسمح فيه بسير المركبات. 3 - مسار الطريق (المسرب - الجادة - الخط) : أي جزء من الأجزاء العرضية التي يقسم إليها نهر الطريق ويسمح عرضه لمرور صف واحد من المركبات المتتابعة سواء حددته علامات طولية على سطح الطريق أم لم تحدده. 4 - الرصيف : جزء من الطريق معد لسير المشاة. 5 - الجزيرة : الحيز الفاصل بين نهري الطريق . 6 - كتف الطريق : جزء من الطريق محاذ وملاصق لنهره من جانب أو جانبين معد للتوقف الاضطراري للمركبات. 7 - حرم الطريق : الحيز المخصص للطريق. 8 - التقاطع : كل تلاق أو تقابل أو تفرع للطرق على مستوى واحد أو عدة مستويات، ويشمل المساحة التي تتكون نتيجة لذلك كاملة. 9 - طريق حر الحركة : نهر الطريق الذي يتم الدخول إليه أو الخروج منه عبر مداخل ومخارج محكمة مخصصة لذلك، ولا يخدم مباشرة الملكيات المجاورة للطريق. 10 - طريق الخدمة : نهر الطريق المحاذي للطريق (حر الحركة) ويخدم الملكيات المجاورة مباشرة. 11
    - التوقف : وقوف المركبة لفترة زمنية تستلزمها ضرورة السير، أو نزول الأشخاص، أو ركوبهم، أو تحميل البضائع، أو تفريغها. 12 - الوقوف أو الانتظار: وجود المركبة في مكان ما لفترة محددة أو غير محددة في غير حالات التوقف . 13 - الموقف : المكان المخصص لوقوف المركبات. 14 - علامات الطريق : خطوط أو علامات على الطريق أو على جانبيه لتنظيم استخدام الطريق . 15 - العاكسات : أي مادة عاكسة توضع على الطريق كإحدى علاماته أو توضع في أطراف المركبة أو جانبيها بحيث يمكن رؤيتها من مسافة مناسبة. 16 - المنعطف : المنحنى الذي يتغير به اتجاه الطريق . 17 - الشاخصات : كل ما يقام على الطريق من لوحات وإشارات وغيرها. 18 - المركبة : كل وسيلة من وسائل النقل أعدت للسير على عجلات أو جنزير، وتسير أو تجر بقوة آلية أو حيوانية، ولا تشمل القطارات. 19 - السيارة : كل مركبة آلية تستخدم في نقل الأشخاص أو الأشياء أو كليهما، أو جر المركبات المعدة لنقل الأشخاص أو الأشياء أو كليهما. 20 - سيارة خاصة : السيارة المعدة للاستعمال الخاص بنقل الركاب ومستلزماتهم دون أجر. 21 - سيارة أجرة : السيارة المعدة لنقل الركاب ومستلزماتهم بأجر ولا تزيد سعتها
    على ثمانية أشخاص. 22 - الحافلة : سيارة معدة لنقل عدد من الركاب ومستلزماتهم يزيد عددهم على ثمانية، وتنقسم إلى نوعين: أ - حافلة عامة : لنقل الركاب ومستلزماتهم بأجر.ب - حافلة خاصة : لنقل الركاب ومستلزماتهم دون أجر. 23 - سيارة النقل : سيارة معدة لنقل الحيوانات والأشياء، وتنقسم إلى نوعين: أ - نقل عام : لنقل الحيوانات والأشياء والبضائع بأجر.ب - نقل خاص : لنقل الحيوانات والأشياء والبضائع دون أجر. 24 - السيارة القاطرة : سيارة موصول بها مقطورة، ويكونان معا وحدة واحدة. 25 - المقطورة : كل مركبة ليس لها محرك تجرها مركبة آلية أخرى. 26 - نصف المقطورة : مقطورة يستند جزء كبير من وزنها على السيارة القاطرة . 27 - مركبات الطوارئ : سيارات الخدمات الأمنية العامة ، والإسعافية المجهزة بإشارات ضوئية ومنبهات خاصة، التي يتطلب عملها عند الضرورة تجاوز السرعة النظامية المحددة وعدم التوقف عند إشارات المرور . 28 - الدراجة الآلية : كل مركبة ذات عجلتين أو أكثر مجهزة بمحرك آلي، ومعدة لنقل الأشخاص أو الأشياء، وقد يلحق بها عربة، وليست مصممة على شكل سيارة. 29 - الدراجة العادية : كل وسيلة نقل ذات عجلتين أو أكثر غير مجهزة
    بمحرك آلي، وتسير بقوة راكبها. 30 - مركبات الأشغال العامة : المعدات والآلات التي تسير بالدفع الذاتي بما فيها المعدات الزراعية. 31 - أ - نور القيادة : (النور العالي) نور المركبة الذي يستخدم في إنارة الطريق على مسافة طويلة في حالة عدم وجود مركبة مقابلة لها.ب - نور التلاقي : (النور المنخفض) نور المركبة الذي يستخدم في إنارة الطريق على مسافة قصيرة في حالة وجود مركبة مقابلة لها.ج - أنوار الموضع : (الصغير) الأنوار الأمامية والخلفية والجانبية للمركبة، التي تشير إلى وجودها في السير وتحدد موضعها، وتبين عرضها من الأمام والخلف. 32 - الفحص الفني : الكشف على المركبة في أحد مراكز الفحص الدوري المعتمدة. 33 - السائق : كل من يقود مركبة أو معدة أشغال عامة، أو دراجة آلية. 34 - رخصة القيادة : وثيقة رسمية صادرة من الإدارة المختصة، أو من جهة أجنبية معترف بما يصدر عنها من وثائق مماثلة، تثبت أن حاملها مؤهل لقيادة نوع أو أنواع من المركبات. 35 - رخصة السير : وثيقة رسمية صادرة من الإدارة المختصة، أو من جهة أجنبية معترف بما يصدر عنها من وثائق مماثلة، تجيز للمركبة السير على الطرق. 36 - الإدارة المختصة : الإدارة المخولة
    صلاحية تنظيم السير وإصدار رخص القيادة والسير وصرف اللوحات أو كليهما (إدارة المرور). 37 - الراكب : كل من يوجد في المركبة أو يكون صاعدا إليها أو نازلا منها بخلاف السائق . 38 - المشاة : الأشخاص الذين يسيرون على أقدامهم، ومن في حكمهم، مثل الأشخاص الذين يدفعون أو يجرون عربة أطفال، أو عربة مريض، أو ذوي الاحتياجات الخاصة. 39 - المحكمة المختصة : المحكمة المخولة صلاحية النظر والبت في القضايا والحوادث المرورية. 40 - الحادث المروري : كل حادث ينتج عنه أضرار جسيمة أو مادية دون قصد ؛ جراء استخدام المركبة وهي في حالة حركة وينقسم إلى قسمين: أ - حادث مروري بسيط : ما ينتج منه أضرار أو (تلفيات) بالممتلكات خاصة أو عامة، ولا ينجم عنه إصابة تتطلب علاجا إسعافيا.ب - حادث مروري جسيم : ما ينتج عنه إزهاق للأرواح، أو إصابات في الأجسام، أو خسائر في الأموال، أو جميع ذلك، و المركبة في حالة حركة. 41 - التفحيط : الانطلاق بسرعة كبيرة وبشكل مفاجئ أو غير منتظم بحيث تحدث الإطارات صوتا عاليا مزعجا، وأي من أنواع القيادة بشكل متهور وخطر ؛ لأجل اللعب والاستعراض، أو سد الطرق وعرقلة السير. 42 - الأوزان : أ - وزن السيارة الفارغ
    : وزن السيارة وهي مجهزة بمحروقاتها وآلات الصيانة والإصلاح وأدواتها الاحتياطية.ب - وزن السيارة الإجمالي : وزن السيارة الفارغ مضافا إليه الحمولة و السائق والركاب.ج - الوزن الصافي (الحمولة) : الفرق بين الوزنين الإجمالي والفارغ.د - الوزن المحوري : الوزن الجزئي من الحمولة على المحور الواحد. 43 - اللائحة : اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: أ - يكون لكل مركبة رقم خاص تحمله مسجل لدى الإدارة المختصة، وفق ما تحدده اللائحة .ب - يكون رقم رخصة السير هو رقم لوحة المركبة نفسه، وإذا أجري أي تغيير في رقم اللوحة فإنه يجب إجراء التغيير نفسه على رخصة السير .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب أن تحمل كل مركبة - فيما عدا الدراجة الآلية و المقطورة ونصف المقطورة - لوحتين ظاهرتين مقروءتين، توضحان رقم تسجيلهما، تكون إحداهما في مقدمة المركبة ، والأخرى في مؤخرتها، ولا يجوز سير المركبة دونهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: أ - يجب أن تحمل كل دراجة آلية أو مقطورة أو نصف مقطورة لوحة واحدة، واضحة، ومقروءة، تثبت على مؤخرتها، ولا يجوز السير دونها، على أن تحمل المقطورة أو نصف المقطورة رقم لوحة القاطرة نفسه.ب - تعفى المقطورة من حمل اللوحة إذا كان حجمها لا يحجب رؤية لوحة المركبة القاطرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لا يجوز لأي مركبة حمل لوحات غير التي تصدر من الإدارة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تنقسم لوحات المركبات إلى الأنواع الآتية: 1 - اللوحات الخاصة ، وتشمل الآتي: أ - لوحات المركبات الخاصة .ب - لوحات مركبات النقل الخاصة .ج - لوحات الحافلات الخاصة . 2 - اللوحات العامة ، وتشمل الآتي: أ - لوحات مركبات نقل عام .ب - لوحات الحافلات العامة .ج - لوحات مركبات الأجرة . 3 - اللوحات الدبلوماسية والقنصلية . 4 - اللوحات المؤقتة . 5 - لوحات مركبات الأشغال العامة . 6 - لوحات التصدير . 7 - لوحات الدراجات الآلية . وتحدد اللائحة فئات هذه اللوحات ومواصفاتها، وشروط إصدارها، وكيفية المحافظة عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: أ - لا يجوز تسيير المركبات قبل تسجيلها ودفع الرسوم المقررة - وفقا لجداول الرسوم الملحقة بهذا النظام - وصدور رخصة السير الخاصة بها، ووضع لوحات عليها وفقا لأحكام هذا النظام ولائحته. ويستثنى من ذلك المركبات العسكرية المستخدمة لأغراض عسكرية التي لا تستخدم الطرق العامة بصورة اعتيادية.ب - يجب تسديد الغرامات المرورية المترتبة على مخالفات سابقة قبل البدء في إجراءات رخصة السير .ج - يلزم كل قائد مركبة - يحمل رخصة قيادة سارية المفعول، ويقود سيارته داخل المملكة - بالتأمين، وفق ما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجوز نقل ملكية المركبات بعد سداد الرسوم المقررة، وتستمر مسئولية المالك المسجلة ملكيته للمركبة عن جميع الرسوم وكل ما يترتب على المركبة من التزامات، ويمكنه العودة بما دفع على المالك الجديد. وتحدد اللائحة الإجراءات والشروط التي تنظم ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجوز تعديل مجال استعمال المركبة بناء على طلب مالكها أو من يفوضه، بعد تعديل تسجيلها. وتحدد اللائحة إجراءات وشروط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجب أن تكون رخصة سير المركبة موجودة بها أثناء سيرها، ولرجل الأمن حق طلب إبرازها للاطلاع عليها، وليس له حجزها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يحظر حجز رخصة سير المركبة لدى الغير، أو رهنها، أو ارتهانها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: أ - تصرف رخص السير ولوحات المركبات بعد دفع الرسوم المقررة. وتحدد اللائحة شروط ذلك.ب - في حالة بيع المركبات العائدة ملكيتها إلى البعثات الدبلوماسية، تستوفى الرسوم المقررة، وتحدد اللائحة شروط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: أ - مدد صلاحية رخص سير المركبات بأنواعها ثلاث سنوات. وتحدد اللائحة شروط ذلك.ب - تجدد رخص السير بعد دفع الرسوم المقررة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يتم إصدار بدل لما يفقد أو يتلف من رخص السير، أو اللوحات، بعد دفع الرسوم المقررة. وتحدد اللائحة الإجراءات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: لا تستحصل رسوم نقل الملكية على المركبات التي تباع بقصد تفكيكها والانتفاع بأجزائها، وعلى المالك إنهاء إجراءات إسقاط المركبة من اسمه في سجلات المرور، ويكون مسئولا عما ينتج من إساءة استعمالها في حالة عدم اتخاذ هذا الإجراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: لا تجوز قيادة المركبة من قبل شخص غير مالكها - عند الخروج بها من المملكة - إلا بموجب تفويض، وفق ما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تلزم الجهات الحكومية بعدم بيع مركباتها إلا بعد التنسيق مع الإدارة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تسجل مركبات الأشغال العامة لدى الجهة المختصة بما يضمن معرفة مالكها، ووضع لوحات عليها، وتحديد إجراءات نقل ملكيتها، والشروط اللازمة لاستخدامها وقيادتها، وفق ما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: لوزير الداخلية إسناد سحب المركبات وحجزها للقطاع الخاص، وفقا للضوابط والأحكام الخاصة بمنافسة سحب السيارات وحجزها. وتحدد اللائحة ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'أ - لا يجوز افتتاح معارض لبيع المركبات إلا بترخيص من الإدارة المختصة ، وبعد الحصول على السجل التجاري. ب - يحظر على أصحاب معارض بيع المركبات ما يأتي: 1 - السماح بخروج أي مركبة مبيعة قبل انتهاء إجراءات نقل ملكيتها.2 - التعديل أو التغيير أو الكشط في بيانات سجلات البيع، ويثبت التصحيح عند اقتضائه مع وضع خاتم على التعديل.3 - إعطاء عقود البيع الخاصة بالمعرض أو أختامه للغير.4 - بيع المعرض أو تأجيره إلا بعد موافقة الإدارة المختصة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يجب التقيد بالأوزان والأبعاد المقررة نظاما للمركبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تعد -بالاتفاق بين وزير الداخلية ووزير النقل - قواعد وإجراءات ضبط مخالفات الأوزان والأبعاد المقررة ، وتعديل هذه القواعد والإجراءات، وتحديد فئات هذه المخالفات، والغرامة المالية لكل مخالفة وفق جسامتها، وذلك بحد أعلى قدره مائة ألف ريال ولو تعددت المخالفات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تخضع جميع المركبات للمواصفات والمقاييس المعتمدة من الهيئة العربية السعودية للمواصفات والمقاييس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يحظر -دون تصريح سابق من الجهة المختصة- إجراء أي تعديل في المركبة يغير لونها، أو معالمها، أو تجهيزاتها الأساسية، أو يؤدي إلى زيادة حمولتها، أو أبعادها المقررة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تخضع جميع المركبات - على اختلاف أنواعها - لفحص فني دوري للتأكد من صلاحيتها للاستعمال، وتحدد اللائحة الشروط الخاصة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يجوز التصريح بنقل الحمولات غير القابلة للتجزئة التي تزيد أوزانها أو أبعادها عن تلك المقررة نظاما. ويحدد وزيرا الداخلية والنقل شروط ذلك وإجراءاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يعد السائق مسئولا عن جميع الأضرار التي تصيب الأرواح أو الممتلكات العامة أو الخاصة ؛ نتيجة لنقل أحمال مخالفة للأوزان والأبعاد المقررة نظاما، أو لعدم مراعاة قواعد السلامة في التحميل، ما لم تثبت مسئولية غيره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يحظر وضع أجهزة تنبيه صوتية أو ضوئية غير مصرح بها أو استعمالها في المركبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يجب تزويد المقطورة ، أو المركبة المتعطلة - عند سحبها - بأنوار أو عاكسات خلفية وجانبية تسمح برؤيتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يجب تزويد المركبات الكبيرة، كالشاحنات والحافلات ومركبات الأشغال العامة، وتلك التي تجرها الحيوانات ؛ بأنوار إضاءة أو شرائح عاكسة توضع في المؤخرة وعلى جانبي هذه المركبات والمعدات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يحظر على أي شخص قيادة أي مركبة قبل الحصول على رخصة القيادة اللازمة وفقا لأحكام هذا النظام ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يجب على السائق أن يحمل رخصة قيادة سارية المفعول عند قيادته للمركبة، ولرجل الأمن حق طلب إبرازها للاطلاع عليها، وليس له حجزها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: لا يجوز لحامل رخصة قيادة المركبات العسكرية قيادة المركبات المدنية إلا بعد الحصول على رخصة قيادة من الإدارة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 'تنقسم رخص القيادة إلى: 1 - رخصة قيادة خاصة .2 - رخصة قيادة عامة .3 - رخصة قيادة مركبات أشغال عامة .4 - رخصة قيادة دراجة آلية .وتحدد اللائحة فئات هذه الرخص ومواصفاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 'يشترط للحصول على رخصة القيادة ما يلي: 1 - إتمام سن الثامنة عشرة لرخصة القيادة الخاصة وقيادة الدراجات الآلية.2 - إتمام سن العشرين لرخصة القيادة العامة وقيادة مركبات الأشغال العامة .3 - ألا يكون طالب رخصة القيادة العامة ، و رخصة قيادة مركبات الأشغال العامة ، قد سبق الحكم عليه قضائيا في جريمة اعتداء على النفس، أو العرض، أو المال، ما لم يكن قد رد إليه اعتباره.4 - ألا يكون طالب الرخصة -مهما كان نوعها- قد أدين بحكم قضائي بتعاطي المخدرات، أو صنعها، أو تهريبها، أو ترويجها، أو حيازتها، ما لم يكن قد رد إليه اعتباره.5 - الإقامة النظامية لغير السعوديين.6 - السلامة من الأمراض والعاهات التي تمنع من قيادة المركبة المرخص بقيادتها.7 - اجتياز اختبار القيادة، وتحدد اللائحة الاختبار الخاص بكل رخصة وشروط أدائه.8 - دفع الرسوم المقررة.9 - تسديد الغرامات المرورية المترتبة على مخالفات سابقة، إن وجدت.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يعفى من شرط الاختبار الوارد في الفقرة (7) من المادة (السادسة والثلاثين) من هذا النظام، من يحمل رخصة قيادة أجنبية أو دولية معترف بها من الإدارة المختصة في المملكة وتكون سارية المفعول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: تتولى الإدارة المختصة -بالتنسيق مع الجهات المعنية الأخرى- تنظيم أندية السيارات التي تمنح رخصا دولية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: استثناء من الفقرة (1) من المادة (السادسة والثلاثين) من هذا النظام، يجوز - وفق ضوابط تحددها اللائحة - منح ترخيص مؤقت لا تزيد مدته على سنة لمن أتم سن السابعة عشرة من العمر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: تعد بالاتفاق بين وزير الداخلية ووزير الخارجية الشروط اللازمة للحصول على رخصة القيادة لأعضاء البعثات الدبلوماسية، والقنصلية، والهيئات الإقليمية، والدولية ، المعتمدين في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: تكون مدة صلاحية رخص القيادة الخاصة ورخص قيادة الدراجات الآلية عشر سنوات، وبقية أنواع الرخص خمس سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: تحدد مدة استخدام رخصة القيادة الدولية والأجنبية المعترف بها بسنة واحدة من تاريخ دخول حاملها إلى المملكة أو انتهاء فترة صلاحيتها، أيهما أقرب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يحق لذي الاحتياجات الخاصة الحصول على رخصة قيادة بعد تقديم تقرير طبي معتمد يثبت قدرته على القيادة. وتحدد اللائحة الضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: تجدد رخصة القيادة بعد دفع الرسوم المقررة، والغرامات المترتبة إن وجدت. وتحدد اللائحة شروط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يتم إصدار بدل لما يفقد أو يتلف من رخص القيادة بعد دفع الرسوم المقررة، والغرامات المترتبة إن وجدت. وتحدد اللائحة الإجراءات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: يحظر حجز رخصة القيادة لدى الغير، أو رهنها، أو ارتهانها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: يجوز إنشاء أو تشغيل مدارس لتعليم قيادة المركبات، كما تجوز ممارسة مهنة تعليم القيادة، وفق ما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: للإدارة المختصة إلغاء رخصة القيادة ، أو عدم تجديدها؛ إذا ثبت أن حاملها فاقد الأهلية أو اللياقة الطبية لقيادة المركبات المرخص له بقيادتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: لوزير الداخلية السماح بإنشاء جمعيات أهلية غير حكومية لتوعية المواطنين والحد من حوادث الطرق. وتحدد اللائحة واجبات هذه الجمعيات واختصاصاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: الطريق للجميع، وتجب مراعاة حقوق الآخرين من مستخدميه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: تعد علامات الطريق و العاكسات و الشاخصات الملحقة بهذا النظام جزءا منه، ويجب على السائق التقيد بها وبالتعليمات الصادرة من الجهات المختصة، وفقا لأحكام هذا النظام ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: يحظر إتلاف علامات الطريق و العاكسات و الشاخصات ، أو العبث بها، أو نقلها، أو القيام بأي تصرف يجعلها أقل أهمية ووضوحا، أو يؤدي إلى الإخلال بالمفهوم العام المتفق عليه دوليا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: جهة السير على الطرق هي الجهة اليمنى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: أفضلية المرور لمركبات الطوارئ أثناء مباشرة مهماتها، والمواكب الرسمية ، ولا يعفى سائقوها من القيادة بما يضمن سلامة الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: على المشاة السير في الأماكن المخصصة لهم، وفق ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: يحظر تجاوز حافلات النقل المدرسي عند توقفها للتحميل أو للتنزيل. وتحدد اللائحة الشروط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: يجب على قائدي المركبات وركابها استخدام أحزمة الأمان، والمقاعد المخصصة للأطفال، أثناء السير على الطرق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: يجب على قائدي الدراجات الآلية ومرافقيهم ارتداء خوذة للرأس بإحكام أثناء القيادة. وتحدد اللائحة شروط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: 'تنقسم الحوادث المرورية إلى قسمين: أ - الحادث المروري البسيط .ب - الحادث المروري الجسيم .وتحدد اللائحة تفاصيل ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: يعد الحادث المروري موجبا للمسئولية إذا نتج من الإهمال، أو قلة الاحتراز، أو عدم مراعاة الأنظمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: تباشر الإدارة المختصة إجراءات التحقيق في الحادث فور وقوعه، وتستكمل الإجراءات بأسرع وقت ممكن، وإذا نتج من الحادث وفاة أو إصابة بدنية جسيمة وجب إيقاف السائق المتسبب مدة لا تتجاوز اثنتين وسبعين ساعة، وللمحكمة المختصة تمديد هذه المدة، ويتحتم في جميع الأحوال إطلاق سراح السائق فور تقديم كفالة غرامية أو حضورية أو وثيقة التأمين المطلوبة، وفي حال الاختلاف يكون الفصل للمحاكم المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: كل من أتلف نفس إنسان - كلا أو بعضا - في حادث سير متعديا أو مفرطا، يعاقب بالسجن مدة لا تزيد على سنة واحدة، وبغرامة مالية لا تزيد على عشرة آلاف ريال، أو بإحدى هاتين العقوبتين، دون إخلال بما يتقرر للحق الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: مع مراعاة ما ورد في المادتين (الحادية والستين) و(الثانية والستين) من هذا النظام، على كل سائق يكون طرفا في حادث مروري أن يوقف المركبة في مكان الحادث، ويبادر بإبلاغ الإدارة المختصة، وأن يقدم المساعدة الممكنة لمصابي الحادث، فإن لم يقم بذلك يعاقب بغرامة مالية لا تزيد على ألفي ريال، أو بالسجن مدة لا تزيد على ثلاثة أشهر، أو بهما معا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: يحظر على أصحاب الورش والعاملين فيها أو غيرهم، القيام بأي إجراء من الإجراءات الآتية دون الحصول على تصريح مسبق بذلك - ساري المفعول - من الإدارة المختصة :1 - إصلاح في الجسم الخارجي للمركبة. 2 - تعديل يخل بأبعاد المركبة وأوزانها، أو قوة محركها. 3 - تغيير في شكل المركبة أو لونها.4 - إزالة أرقام تسجيل هيكل المركبة . ويعاقب من يخالف ذلك بغرامة مالية قدرها ألفا ريال في المرة الأولى، وفي حالة تكرار المخالفة للمرة الثانية تضاعف الغرامة، وفي حالة تكرارها للمرة الثالثة، يعاقب بغرامة مالية مقدارها خمسة آلاف ريال مع إغلاق الورشة بصفة نهائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: لا يجوز بيع أي مركبة تالفة أو شراؤها إلا بتصريح مسبق من الإدارة المختصة، ويعاقب من يخالف ذلك بغرامة مالية لا تزيد على خمسة آلاف ريال، وفي حالة التكرار تضاعف العقوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة والستون
  article_text_ar: يحدد وزير الداخلية -أو من ينيبه- الجهات المخولة صلاحية ضبط مخالفات أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة والستون
  article_text_ar: تتولى المحاكم المختصة الفصل في المنازعات، وقضايا الحوادث المرورية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة والستون
  article_text_ar: مع عدم الإخلال بأي عقوبة أشد منصوص عليها في نظام آخر، يعاقب كل من يرتكب إحدى المخالفات الواردة في جداول المخالفات الملحقة بهذا النظام بما يأتي:1 - غرامة مالية لا تقل عن خمسمائة ريال ولا تزيد على تسعمائة ريال، أو بحجز المركبة مع الغرامة، وفقا لجدول المخالفات رقم (1) الملحق بهذا النظام.2 - غرامة مالية لا تقل عن ثلاثمائة ريال ولا تزيد على خمسمائة ريال، أو بحجز المركبة مع الغرامة، وفقا لجدول المخالفات رقم (2) الملحق بهذا النظام.3 - غرامة مالية لا تقل عن مائة وخمسين ريالا ولا تزيد على ثلاثمائة ريال، وفقا لجدول المخالفات رقم (3) الملحق بهذا النظام.4 - غرامة مالية لا تقل عن مائة ريال ولا تزيد على مائة وخمسين ريالا، وفقا لجدول المخالفات رقم (4) الملحق بهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة والستون
  article_text_ar: 'يعد التفحيط مخالفة مرورية ، ويعاقب مرتكب مخالفة التفحيط بالعقوبات الآتية: أ - في المرة الأولى حجز المركبة خمسة عشر يوما، و غرامة مالية مقدارها ألف ريال، ومن ثم يحال إلى المحكمة المختصة للنظر في تطبيق عقوبة السجن في حقه.ب - في المرة الثانية حجز المركبة لمدة شهر و غرامة مالية مقدارها ألف وخمسمائة ريال، ومن ثم يحال إلى المحكمة المختصة للنظر في تطبيق عقوبة السجن في حقه. ج - في المرة الثالثة غرامة مالية مقدارها ألفا ريال وحجز المركبة ، ومن ثم الرفع إلى المحكمة المختصة للنظر في مصادرة المركبة أو تغريمه بدفع قيمة المثل للمركبة المستأجرة أو المسروقة وسجنه.وتستثنى من عقوبتي الحجز أو المصادرة - الواردتين في الفقرات (أ) و (ب) و (ج) من هذه المادة - المركبات المستأجرة والمركبات المسروقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السبعون
  article_text_ar: مع مراعاة ما ورد في المادتين (الثانية عشرة) و(السادسة والأربعين) من هذا النظام، يعاقب كل من حجز رخصة سير المركبة أو رخصة القيادة لدى الغير، أو رهنها، أو ارتهنها بغرامة مالية لا تقل عن ثلاثمائة ريال ولا تزيد على تسعمائة ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية والسبعون
  article_text_ar: تحدد غرامة التأخير عن تجديد رخص القيادة ورخص السير بمبلغ مائة ريال عن كل سنة أو جزء منها، وبحد أعلى ثلاثمائة ريال فقط، وتطبق الغرامة بعد انقضاء مدة ستين يوما من تاريخ انتهاء الرخصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية والسبعون
  article_text_ar: أ - يعاقب كل من يخالف حكم الفقرة (أ) من المادة (الحادية والعشرين) من هذا النظام بغرامة مالية مقدارها عشرة آلاف ريال مع إغلاق المعرض محل المخالفة إلى حين الحصول على ترخيص. ب - يعاقب كل من يخالف حكم الفقرة (ب) من المادة (الحادية والعشرين) من هذا النظام، بغرامة مالية مقدارها ألف وخمسمائة ريال في المرة الأولى، وتضاعف الغرامة في المرة الثانية. وفي حال تكرار المخالفة للمرة الثالثة يعاقب المخالف بغرامة مالية مقدارها ثمانية آلاف ريال مع إغلاق معرض بيع المركبات لمدة شهر. وفي حال تكرار المخالفة للمرة الرابعة يلغى تصريح معرض بيع المركبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة والسبعون
  article_text_ar: تحرر مخالفات السير بموجب نموذج ضبط موحد ومعتمد، يحدد المخالفة، والمدة المقررة لدفع قيمتها. وللمخالف دفع الحد الأدنى للغرامة لأقرب إدارة مختصة في مدة أقصاها ثلاثون يوما من تاريخ تحرير المخالفة بموجب إيصال رسمي. وعلى الإدارة المختصة في حالة عدم التسديد في المدة المقررة إلزام المخالف بدفع الحد الأعلى للغرامة. وتحدد اللائحة إجراءات ضبط المخالفات والمدد المقررة لدفع قيمتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة والسبعون
  article_text_ar: على الإدارة المختصة في حال تكرار المخالفات التي تعرض السلامة العامة للخطر، أن تطلب من المحكمة المختصة -خلال ثلاثين يوما من تاريخ تحرير المخالفة- النظر في توقيع غرامة تزيد على الحد الأدنى، أو إيقاع عقوبة السجن على المخالف، أو بهما معا. وتحدد اللائحة أنواع المخالفات التي تعرض السلامة العامة للخطر، وإجراءات إحالة المخالف إلى المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة والسبعون
  article_text_ar: للمخالف حق الاعتراض على أنموذج الضبط أمام المحكمة المختصة، وذلك خلال ثلاثين يوما من تاريخ تحرير المخالفة ما لم يكن للمخالف عذر - تقتنع به المحكمة - يمنعه من تقديم الاعتراض
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السادسة والسبعون
  article_text_ar: يحدد لكل مخالفة منصوص عليها في هذا النظام عدد معين من النقاط - بحسب خطورة المخالفة على السلامة العامة - وتسجل هذه النقاط في سجل المخالف، وتسحب رخصة القيادة عند تجاوز الحد الأعلى المسموح به من النقاط. وتحدد اللائحة القواعد والإجراءات اللازمة لذلك، ومدد سحب الرخصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة السابعة والسبعون
  article_text_ar: إذا سمح مالك المركبة ، أو المسئول عن قيادتها، أو حائزها، لشخص آخر ليست لديه رخصة قيادة بقيادة المركبة ؛ فيعاقب بغرامة مالية لا تزيد على تسعمائة ريال، وإذا نتج من ذلك حادث مروري فيكون متضامنا معه في المسئولية المادية وفقا لتقدير المحكمة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثامنة والسبعون
  article_text_ar: يجب إبلاغ الإدارة المختصة عن بيع المركبة أو تلفها خارج المملكة ؛ لإلغاء تسجيلها، مع تسليم رخصة السيرواللوحات. ويعاقب من يخالف ذلك بغرامة مالية لا تزيد على خمسة آلاف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة التاسعة والسبعون
  article_text_ar: تباع بالمزاد العلني المركبات المحجوزة لدى الإدارة المختصة بسبب ارتكاب مالكيها مخالفات مرورية تستوجب الحجز وفقا لأحكام هذا النظام إذا لم يراجع مالكها أو من يفوضه لتسلمها خلال مدة تسعين يوما. ويسدد ما على المركبة من غرامات أو رسوم من ثمن بيعها، ويؤدى الباقي في الهيئة العامة للولاية على أموال القاصرين ومن في حكمهم أمانة للمالك. وتحدد اللائحة إجراءات بيع تلك المركبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثمانون
  article_text_ar: ينشأ في وزارة الداخلية مجلس أعلى للمرور ، ويصدر بتكوينه أمر ملكي ، محددا مهماته، واختصاصاته، بناء على اقتراح من وزير الداخلية . ويكون المجلس هو السلطة العليا المشرفة على شئون المرور من خلال رسم السياسة العامة للمرور .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الحادية والثمانون
  article_text_ar: 'تنظر المحكمة المختصة فيما يلي: 1 - الدعاوى التي تقام ضد من يخالف أحكام هذا النظام أو لائحته.2 - الاعتراضات التي تقدم ضد قرارات الإدارة المختصة أو أي جهة معنية بشأن تطبيق أحكام هذا النظام أو لائحته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثانية والثمانون
  article_text_ar: يجوز للمحكمة المختصة -لاعتبارات تقدرها- وقف تنفيذ العقوبة المحكوم بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الثالثة والثمانون
  article_text_ar: يحل هذا النظام محل نظام المرور ، الصادر بالمرسوم الملكي رقم (م/49) تاريخ 6 / 11 / 1391 هـ وتعديلاته، ويلغي ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الرابعة والثمانون
  article_text_ar: يصدر وزير الداخلية اللائحة التنفيذية لهذا النظام خلال (مائة وثمانين) يوما من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: المادة الخامسة والثمانون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ، ويعمل به بعد مائة وثمانين يوما من تاريخ نشره. لمزيد من المعلومات عن جدول المخالفات، الإشارات التحذيرية لنظام المرور يرجى معاينة أصل الوثيقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: جدول المخالفات رقم ( 1 )
  article_text_ar: قيادة المركبة قبل الحصول على رخصة قيادة. سير المركبة بدون لوحات (مع حجز المركبة حتى إزالة المخالفة). سير المركبة بدون لوحة خلفية (مع حجز المركبة حتى إزالة المخالفة). استخدام لوحة غير عائدة للمركبة (مع حجز المركبة حتى إزالة المخالفة). استخدام لوحات غير نظامية (مع حجز المركبة حتى إزالة المخالفة). تركيب تجهيزات في المركبة كتلك الخاصة بالمركبات الرسمية ومركبات الطوارئ (مع حجز المركبة حتى إزالة المخالفة). طمس أو محاولة طمس المعالم الخاصة بالتعريف بالمركبة (مع حجز المركبة حتى إزالة المخالفة). قيادة المركبة تحت تأثير مسكر أو مخدر أو عقاقير طبية محذر عن القيادة تحت تأثيرها. تجاوز إشارة المرور الضوئية أثناء الضوء الأحمر. قيادة المركبة بالاتجاه المعاكس لحركة السير. المراوغة بسرعة بين المركبات على الطرق العامة. تجاوز السرعة المحددة بأكثر من خمسة وعشرين كيلو متر في الساعة. التجاوز في المناطق التي يمنع فيها التجاوز مثل المنعطفات والمرتفعات. الوقوف على خطوط السكة الحديدية. عدم تغطية وتربيط الحمولة المنقولة. القيام بأعمال على الطرق قبل التنسيق مع الإدارة المختصة. عدم الوقوف تماماً عند
    إشارة (قف). عدم إعطاء أفضلية بالوقوف وقوفاً تاماً عند إشارة ( أمامك أفضلية ) في حالة مرور مركبات على الطريق المعطى له الأفضلية. عد إعطاء الأفضلية للسيارة القادمة من اليمين عند الوصول إلى تقاطع متساوي الأفضليات في آن واحد وعندما لا يكون هناك إشارات أولوية. عدم إعطاء الأفضلية للسيارات التي على الطريق الرئيسي في حالة عدم وجود إشارة أفضلية. عدم التقيد بإشارات رجل الأمن اليدوية عند تنظيمه للحركة وعدم إعطاء إشارته الأولوية على الإشارات الضوئية. عدم إعطاء الأفضلية للسيارات التي بداخل الدوار من قبل السيارات التي خارجه في حالة عدم وجود إشارات ضوئية أو رجل أمن يوجه السير. قيادة مركبة بدون توافر التجهيزات اللازمة مثل المكابح والأنوار أو ما في حكمها مما يعرض السلامة العامة للخطر (مع حجز المركبة حتى إزالة المخالفة). عدم استخدام الأنوار اللازمة عند السير أو في الأحوال الجوية التي تكون فيها الرؤية غير واضحة. قيادة المركبة داخل الأنفاق بدون إضاءة أنوارها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: جدول المخالفات رقم ( 2 )
  article_text_ar: إجراء أي تعديل أو إضافة على هيكل أو جسم المركبة بدون اتخاذ الإجراءات النظامية (مع حجز المركبة حتى إزالة المخالفة). تسيير مركبات الأشغال العامة صناعية أو إنشائية أو زراعية على الطرق قبل اتخاذ الإجراءات اللازمة لتلافي أضرارها بما في ذلك عدم وضع الشرائح العاكسة على مؤخرة جانبي المركبة (مع حجز المركبة حتى إزالة المخالفة). تسيير مركبة تحدث تلوث للبيئة على الطرق العامة (مع حجز المركبة حتى إزالة المخالفة). تجاوز السرعة المحددة بمقدار لا يزيد على خمسة وعشرين كيلو متراً في الساعة. العبث بعلامات الطريق أو العاكسات أو الشاخصات المنظمة لحركة السير. عدم الوقوف عند نقاط التفتيش أو الدوريات الأمنية عند وجود توجيه أو علامة توجب الوقوف. عدم التقيد بتنظيمات السير عند تقاطعات الطرق. استعمال المركبة لغير الغرض الذي رخصت من أجله. نقل عدد من الركاب يزيد عن العدد المحدد في رخصة السير. نقل الركاب في الأماكن غير المخصصة لهم في المركبة. رفض إبراز الوثائق الخاصة بالسائق أو المركبة للمصرح لهم للاطلاع عليها. عدم الالتزام بحدود المسارات المحددة على الطريق. ترك أجسام أو أشياء على الطرق العامة مما يعرض
    السلامة العامة للخطر. عدم إعطاء أفضلية المرور لسيارات المواكب الرسمية أو الطوارئ. تجاوز حافلات النقل المدرسي عند توقفها للتحميل أو للتنزيل. القيادة برخصة قيادة مدة صلاحيتها منتهية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: جدول المخالفات رقم ( 3 )
  article_text_ar: عدم توافر المتطلبات النظامية للمقطورة. عدم تقديم المركبة للفحص الفني الدوري. مخالفة قواعد استعمال أنوار التلاقي. عدم اتخاذ الاحتياطات اللازمة عند إيقاف المركبة في حالات الطوارئ على الطرق العامة. وضع حواجز داخل المركبة تعيق رؤية السائق. عدم حمل رخصة القيادة أو رخصة السير أثناء القيادة. ترك المركبة في طريق منحدر مع عدم اتخاذ الاحتياطات اللازمة. مخالفة تنظيمات السير على الطرق. عدم المحافظة على لوحات المركبة. عدم إنهاء إجراءات نقل ملكية المركبة. عدم إنهاء إجراءات تعديل مجال استعمال المركبة. عدم ربط حزام الأمان. عدم استخدام مقاعد الأمان المخصصة للأطفال. عدم مراعاة قواعد الأفضلية. عدم إخراج المركبة المعدة للتصدير خلال المدة المحددة. استخدام الهاتف المحمول باليد أثناء القيادة. إساءة استعمال منبه المركبة. عدم إرتداء الخوذة أثناء قيادة الدراجة الآلية. القيادة في مسارات غير مخصصة لذلك. عدم قيام أصحاب الحيوانات بإبعادها عن الطرق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: جدول المخالفات رقم ( 4 )
  article_text_ar: استخدام أجهزة غير مصرح بها في المركبة أو وضع شعارات أو مصلقات تتنافى مع الآداب العامة. ترك المركبات على الطرق العامة في الأماكن غير المخصصة لها من غير ضرورة. رمي أية أجسام خارج المركبات أثناء سيرها. سير المركبة بدون لوحة أمامية. النزول أو الركوب أثناء سير المركبات. عبور المشاة للطرق من غير الأماكن المخصصة لهم. عدم تقيد المشاة بالإشارات الخاصة بهم. التباطؤ في السير على نحو يعرقل الحركة. وقوف المركبة في أماكن غير مخصصة للوقوف. الوقوف في أماكن وقوف ذوي الاحتياجات الخاصة من غير هذه الفئة المسموح لها. الانشغال بغير الطريق أثناء قيادة المركبة. عدم وجود وثيقة تأمين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: جدول المخالفات رقم (5)
  article_text_ar: '- تم إضافة الجدول بموجب المرسوم الملكي رقم (م/70) وتاريخ 1437/11/6هـ. - جدول المخالفات رقم (5) الوقوف على خطوط السكة الحديدية. نقل عدد من الركاب يزيد عن العدد المحدد في رخصة السير. رفض إبراز الوثائق الخاصة بالسائق أو المركبة للمصرح لهم الاطلاع عليها. عدم المحافظة على لوحات المركبة. عدم إنهاء إجراءات نقل ملكية المركبة. عدم إنهاء إجراءات تعديل مجال استعمال المركبة. عدم إخراج المركبة المعدة للتصدير خلال المدة المحددة. عدم ارتداء الخوذة أثناء قيادة الدراجة الآلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: جدول المخالفات رقم (6)
  article_text_ar: '- تم إضافة الجدول بموجب المرسوم الملكي رقم (م/70) وتاريخ 1437/11/6هـ. - جدول المخالفات رقم (6) سير المركبة بدون لوحات (مع حجز المركبة حتى إزالة المخالفة). استخدام لوحة غير عائدة للمركبة (مع حجز المركبة حتى إزالة المخالفة). استخدام لوحات غير نظامية (مع حجز المركبة حتى إزالة المخالفة). تركيب تجهيزات في المركبة كتلك الخاصة بالمركبات الرسمية ومركبات الطوارئ (مع حجز المركبة حتى إزالة المخالفة). تجاوز إشارة المرور الضوئية أثناء الضوء الأحمر. تجاوز حافلات النقل المدرسي عند توقفها للتحميل أو التنزيل. تسيير مركبات الأشغال العامة على الطرق قبل اتخاذ الإجراءات اللازمة لتلافي أضرارها بما في ذلك عدم وضع الشرائح العاكسة على جانبي مؤخرة المركبة (مع حجز المركبة حتى إزالة المخالفة). العبث بعلامات الطريق أو العاكسات أو الشاخصات المنظمة لحركة السير. عدم الوقوف عند نقاط التفتيش أو الدوريات الأمنية عند وجود توجيه أو علامة توجب الوقوف. استخدام أجهزة غير مصرح بها في المركبة أو وضع شعارات أو ملصقات تتنافى مع الآداب العامة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: جدول المخالفات رقم (7)
  article_text_ar: '- تم إضافة الجدول بموجب المرسوم الملكي رقم (م/70) وتاريخ 1437/11/6هـ. - جدول المخالفات رقم (7) طمس أو محاولة طمس المعالم الخاصة بالتعريف بالمركبة (مع حجز المركبة حتى إزالة المخالفة). قيادة المركبة تحت تأثير مسكر أو مخدر أو عقاقير طبية محذر عن القيادة تحت تأثيرها. القيام بأعمال على الطرق قبل التنسيق مع الإدارة المختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/85364e57-c01e-41ba-8def-a9a700f183e9/1
  verified: false
- article_ref: الجدول رقم (8)
  article_text_ar: '- تم إضافة هذا الجدول وذلك بموجب المرسوم الملكي رقم (م/115) وتاريخ 1439/12/5هـ. الجدول رقم (8) السرعة من 120 كلم/ساعة فأقل. السرعة المحددة على الطريق مقدار تجاوز السرعة المحددة قيمة الغرامة بالريال الحد الأدنى الحد الأعلى من 120 كلم/ ساعة فأقل التجاوز بأكثر من 10 كلم/ساعة إلى 20 كلم /ساعة 150 300 التجاوز بأكثر من 20 كلم/ساعة إلى 30 كلم/ساعة 300 500 التجاوز بأكثر من 30 كلم/ ساعة إلى 40 كلم/ ساعة 800 1000 التجاوز بأكثر من 40 كلم/ ساعة إلى 50 كلم/ ساعة 1200 1500 التجاوز بأكثر من 50 كلم/ ساعة 1500 2000 السرعة 140 كلم/ ساعة. السرعة المحددة على الطريق مقدار تجاوز السرعة المحددة قيمة الغرامة بالريال الحد الأدنى الحد الأعلى 140 كلم/ ساعة التجاوز بأكثر من 5 كلم/ساعة إلى 10 كلم /ساعة 300 500 التجاوز بأكثر من 10 كلم/ساعة إلى 20 كلم/ساعة 800 1000 التجاوز بأكثر من 20 كلم/ ساعة إلى 30 كلم/ ساعة 1200 1500 التجاوز بأكثر من 30 كلم/ ساعة 1500 2000'
