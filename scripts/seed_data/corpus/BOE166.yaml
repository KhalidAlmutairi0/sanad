regulation:
  code: BOE166
  name_ar: قانون (نظام) الرفق بالحيوان لدول مجلس التعاون لدول الخليج العربية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة (1)
  article_text_ar: 'يقصد بالتعابير والمصطلحات التالية المعاني المبينة أمامها ما لم يقتض سياق النص غير ذلك:المجلس: مجلس التعاون لدول الخليج العربية.دول المجلس: دول مجلس التعاون لدول الخليج العربية.المجلس الأعلى: المجلس الأعلى لمجلس التعاون لدول الخليج العربية.الدولة: إحدى الدول الأعضاء بمجلس التعاون لدول الخليج العربية.الجهة المختصة: الوزارة أو الجهة المسؤولة عن الزراعة والثروة الحيوانية في الدولة. رئيس الجهة المختصة: الوزير المسئول عن الزراعة والثروة الحيوانية أو المستحضرات البيطرية أو رئيس الجهة المسئولة.الموظفون المخولون: الموظفون الرسميون المخولون بتنفيذ أحكام هذا القانون ولائحته التنفيذية ممن لديهم صفة الضبطية القضائية.الحيوان: جميع أنواع الحيوانات ومنها الطيور، والزواحف، والبرمائيات، والأسماك.المنشآت: أي مكان تحتفظ أو تحتجز أو تستولد أو تربي أو تذبح أو تعالج فيه الحيوانات وتشمل الأماكن العامة والخاصة.وسائل النقل: أية وسيلة يتم من خلالها نقل الحيوانات وتشمل كافة وسائل النقل البري والبحري والجوي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: على ملاك الحيوانات والقائمين على رعايتها اتخاذ جميع الاحتياطات التي تضمن عدم الإضرار أو إلحاق الأذى أو التسبب في ألم أو معاناة الحيوانات ويجب عليهم بوجه خاص الالتزام بما يلي:- أ - توفير المنشآت المناسبة والظروف المعيشية الضرورية لإيواء الحيوانات.ب - توفير العدد الكافي من العاملين المؤهلين ممن لديهم القدرة المناسبة والمعرفة والكفاية المهنية بالأمور المتعلقة بالرفق بالحيوان.ج - معاينة الحيوانات وتفقد أحوالها مرة واحدة على الأقل في اليوم.د - عدم إطلاق سراح أي حيوان يعتمد بقاءه على الإنسان، وفي حالة الرغبة في التخلي عنه يتم ذلك بالتنسيق مع الجهة المختصة.هـ - متابعة الحالة الصحية للحيوانات وعرضها على الطبيب البيطري للكشف عليها ومعالجتها واتخاذ ما يلزم في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: أ - يحق للموظفين المخولين دخول أي منشأة للتفتيش والتأكد من تطبيق أحكام هذا القانون (النظام) ولائحته التنفيذية، وإذا كانت المنشأة منازل سكنية خاصة فيتعين الحصول على إذن مسبق من الجهة المعنية بالدولة.ب - يحق للموظفين المخولين الاستعانة بمن يرونه مناسباً لفحص أية حيوانات داخل المنشآت وإجراء الاختبارات وأخذ العينات التي يرى أنها ضرورية.ج - على المالك أو الشخص المسئول عن الحيوانات داخل أية منشأة أن يقدم التسهيلات اللازمة للأشخاص المخولين بما في ذلك المساعدة في السيطرة على الحيوانات للفحص وأخذ العينات وتقديم أية وثائق ذات علاقة بالحيوانات تطلب منهم.د - للموظفين المخولين وضع علامات مميزة على الحيوانات بطريقة تمكن من التعرف على كل حيوان على حدة، ولا يجوز إزالة هذه العلامات عن الحيوانات إلا بموافقة مسبقة من الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: يجب أن تخضع المنشآت للشروط الصحية والفنية التي تحددها اللائحة التنفيذية لهذا القانون (النظام).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: يجب تغذية الحيوانات بما يتناسب مع عمرها ونوعها وبكميات كافية تبقيها بصحة جيدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: يجب نقل الحيوانات بطريقة تضمن سلامتها، وعدم تعريضها للإصابات أو الضرر، وتحدد اللائحة التنفيذية لهذا القانون (النظام) الشروط والمواصفات الواجب توفرها في وسائل النقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: يحظر عرض أو الإتجار بأي حيوان تظهر عليه أعراض مرضية أو إعياء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: تحدد اللائحة التنفيذية لهذا القانون (النظام) أسس وضوابط تنظيم المعارض العامة أو المنافسات أو عروض الحيوانات لأغراض تجارية أو أية أغراض أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (9)
  article_text_ar: يحظر ترك الحيوانات في غير المكان المخصص لها أو تركها مهملة، ويحق للجهة المختصة التصرف في الحيوانات المهملة أو السائبة طبقا للشروط والضوابط التي تحددها اللائحة التنفيذية لهذا القانون (النظام).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: 1- يحظر استخدام الحيوانات لأغراض التجارب العلمية إلا بعد الحصول على ترخيص من الجهة المختصة.2 - ينشأ سجل لدى الجهة المختصة لقيد التراخيص الصادرة باستخدام الحيوانات لأغراض التجارب العلمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: تحدد الجهة المختصة الرسوم المستحقة طبقا لأحكام هذا القانون (النظام) ولائحته التنفيذية وذلك بعد موافقة الجهات المعنية بالدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: يجوز للمتضرر من القرارات الصادرة تطبيقاً لأحكام هذا القانون (النظام) التظلم للجهة المختصة وفقاً للإجراءات المتبعة في كل دولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (13)
  article_text_ar: يترك لكل دولة تحديد العقوبات والغرامات اللازمة لمن يخالف أحكام هذا القانون (النظام) أو لائحته التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (14)
  article_text_ar: تعتمد لجنة التعاون الزراعي اللائحة التنفيذية لهذا القانون (النظام) بشكل إلزامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (15)
  article_text_ar: للجنة التعاون الزراعي حق تفسير واقتراح تعديل هذا القانون (النظام)، ولا يكون التعديل نافذا إلا بعد اعتماده من قبل المجلس الأعلى، ويسري في شأن نفاذه ذات الإجراءات المنصوص عليها في المادة (16).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
- article_ref: المادة (16)
  article_text_ar: يعمل بهذا القانون (النظام) بشكل إلزامي بعد مائة وثمانين يوماً من إقراره من قبل المجلس الأعلى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6f3797d0-fc94-4930-b5e3-a9a700f25744/1
  verified: false
