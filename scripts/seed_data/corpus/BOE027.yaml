regulation:
  code: BOE027
  name_ar: نظام المتفجرات والمفرقعات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمامها، ما لم يقتض السياق خلاف ذلك: أ - المتفجرات : مركب أو خليط كيميائي يتحول بسرعة هائلة عن طريق التفاعل الكيميائي –عند تعرضه لمؤثر خارجي– إلى كميات من الغاز ودرجة حرارة مرتفعة وضغط كبير، معطية قوة محطمة لكل ما حولها. ب - المفرقعات : مركب أو خليط كيميائي تعد لإحداث فرقعة صوتية تكون مصحوبة بهالات، أو أشكال ضوئية أو دخانية، مثل: (الألعاب النارية المضيئة، أو الدخانية، المعدة للاستخدام في المهرجانات والمناسبات). ج - المصرح له : الشخص الطبيعي أو الاعتباري الذي تتوافر فيه الشروط اللازمة، ويكون حاصلا على تصريح من وزارة الداخلية. د - الوزير : وزير الداخلية . هـ - الوزارة : وزارة الداخلية . و - اللائحة : اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى تنظيم التعامل مع المتفجرات المعدة للاستخدام غير العسكري، و المفرقعات ، وكيفية تصنيعها، وحيازتها، وتصديرها، واستيرادها، وبيعها، واستعمالها، وتداولها، ونقلها، وتخزينها، وإتلافها، وفق ضوابط تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تحدد اللائحة أسماء وأصناف المواد المتفجرة، وتوابعها، والمكملات اللازمة لها، و المفرقعات ، وإجراءات إصدار التصاريح، أو تجديدها، أو استبدالها عند التلف أو الفقدان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يحظر صنع المتفجرات و المفرقعات ، أو حيازتها، أو تصديرها، أو استيرادها، أو بيعها، أو استعمالها، أو تداولها، أو نقلها، أو تخزينها، أو إتلافها، أو التدريب عليها، إلا بتصريح من الوزارة وفقا لأحكام هذا النظام ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: أ - لا يجوز استعمال المتفجرات لغير الغرض الذي صدر التصريح من أجله. ب - لا يجوز التنازل عن المتفجرات ، أو التصرف بها، إلا بتصريح من الوزارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجب على المصرح له بصناعة المتفجرات ، أو استيرادها، أو تصديرها، أو استعمالها، أن ينظم لها سجلات خاصة، وفقا للنماذج والإجراءات التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب على المصرح له بتصدير المتفجرات ، الحصول على موافقة الجهات المعنية في البلد المصدرة إليه، مصدقة من ممثلية المملكة في ذلك البلد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: لا يجوز الاستعانة بأفراد أو حراس تابعين لشركات الحراسات الأمنية؛ للقيام بأعمال حراسة المتفجرات ، دون تصريح من الوزارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: لا يجوز - لغير الأشخاص المصرح لهم - مزاولة أعمال التفجير، أو الإشراف عليها، أو تشغيل أجهزة الألعاب النارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تحدد اللائحة الشروط والإجراءات، والمواصفات الفنية والأمنية، ومتطلبات السلامة، الواجب توافرها في الآتي: أ - نقل المتفجرات ، والوسائط التي تنقلها. ب - استعمال المتفجرات ، أو إتلافها. ج - التنازل عن المتفجرات ، أو التصرف فيها. د - تخزين المتفجرات ، والصرف منها، وتصديرها، أو استيرادها. هـ - مستودعات تخزين المتفجرات . و - حراسة المتفجرات ، ومن يقوم بأعمال حراستها. ز - الحصول على تصاريح فنيي التفجير، والمهنيين العاملين في مجال المتفجرات . ح - تخزين المفرقعات ونقلها. ط - إقامة عروض الألعاب النارية وأماكن إقامتها، ومن يصرح لهم بتشغيلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'مع مراعاة ما ورد في نظام الإجراءات الجزائية: أ - يقوم رجال الضبط –الذين يصدر بتحديدهم قرار من الوزارة – بضبط مخالفات أحكام هذا النظام، وتحرير محضر بذلك. ب - يجوز لرجال الأمن أو غيرهم –ممن يصدر بتسميتهم قرار من الوزارة – الدخول إلى مستودعات المتفجرات وأماكن إنتاجها؛ لأجل التفتيش أو المتابعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تختص هيئة التحقيق والادعاء العام بالتحقيق والادعاء في مخالفات أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'يختص ديوان المظالم بالآتي: أ - الفصل في جميع مخالفات أحكام هذا النظام، ودعاوى المطالبة بالتعويض. ب - الحكم بمصادرة المتفجرات أو المفرقعات محل المخالفة، ووسيلة النقل المستخدمة في التهريب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع مراعاة ما يقضي به نظام "قانون" الجمارك الموحد لدول مجلس التعاون لدول الخليج العربية، ولائحته التنفيذية؛ تطبق الأحكام الواردة في هذا النظام على مخالفي أحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'مالم تقتض ملابسات الجريمة عقوبة أشد، يعاقب بالسجن مدة لا تتجاوز عشرين سنة وبغرامة لا تزيد على خمسة ملايين ريال، أو بإحدى هاتين العقوبتين؛ كل من ثبت قيامه - بقصد الإخلال بأمن المملكة - بأي من الأفعال الآتية: أ - تهريب متفجرات إلى داخل المملكة. ب - تصنيع المتفجرات ، أو تجميعها. ج - بيع المتفجرات ، أو شراؤها، أو حيازتها. د - استعمال المتفجرات ، أو نقلها، أو تخزينها. هـ - تدريب شخص أو أكثر على صنع المتفجرات ، أو استعمالها، أو الشروع في ذلك. و - تلقي التدريب، أو الشروع فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز عشر سنوات، وبغرامة لا تزيد على مليونين وخمسمائة ألف ريال، أو بإحدى هاتين العقوبتين، كل من هرب متفجرات إلى داخل المملكة بقصد الاتجار، أو قام بصنعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز خمس سنوات، وبغرامة لا تزيد على مليون ريال، أو بإحدى هاتين العقوبتين، كل من حاز متفجرات، أو نقلها مع علمه أنها متفجرات، أو اشتراها، أو باعها، أو استعملها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'يعاقب المصرح له بصناعة المتفجرات ، أو استيرادها، أو تصديرها، أو استعمالها، أو تداولها؛ بغرامة مالية لا تتجاوز مائة ألف ريال، إذا قام بأي من الأفعال الآتية: أ - الإخلال بأي من شروط التصريح الممنوح له. ب - الإخلال بأي من شروط نقل المتفجرات ، وإجراءاته. ج - الإخلال بأي من شروط تخزين المتفجرات ، وإجراءاته. د - عدم تسليم ما بحوزته من المتفجرات إلى الوزارة خلال ثلاثين يوما من تاريخ إلغاء تصريحه. هـ - استعمال متفجرات في غير الغرض الذي صدر التصريح من أجله. و - الاستعانة بشخص غير مصرح له بمزاولة أعمال التفجير، أو الإشراف عليها. ز - عدم تبليغ الوزارة عند علمه بفقد شيء من المتفجرات التي بحوزته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'يعاقب المصرح له بصناعة المتفجرات ، أو استيرادها، أو تصديرها، أو استعمالها، أو تداولها؛ بغرامة مالية لا تتجاوز خمسين ألف ريال في الحالات الآتية: أ - إذا انتهت مدة التصريح الممنوح له، واستمر في مزاولة نشاطه، ولم يتقدم بطلب تجديد تصريحه خلال ثلاثة أشهر من تاريخ انتهائه. ب - إذا خالف أيا من الشروط أو المواصفات الواجب توافرها في الحراس أو الأفراد المكلفين بحراسة المتفجرات ، أو استعان بحراس أو أفراد دون تصريح من الوزارة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: للوزير إيقاف جميع التصاريح المتعلقة بنشاط المتفجرات لمدة لا تزيد على ستين يوما إذا لم يلتزم أصحابها بشروط مستودعات تخزين المتفجرات ، ومواصفاتها، أو الوسائط التي تنقلها، وإذا تكررت المخالفة يجوز له إلغاء جميع التصاريح المتعلقة بهذا النشاط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز ستة أشهر، وبغرامة لا تزيد على مائة ألف ريال، أو بإحدى هاتين العقوبتين؛ كل من هرب مفرقعات إلى داخل المملكة، أو صنعها، أو اتجر فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 'يعاقب المصرح له بصناعة المفرقعات ، أو استيرادها، أو تصديرها، أو استعمالها، أو تداولها، بغرامة مالية لا تتجاوز أربعين ألف ريال في الحالات الآتية: أ - إذا انتهت مدة التصريح الممنوح له، واستمر في مزاولة نشاطه، ولم يتقدم بطلب تجديد تصريحه خلال ثلاثة أشهر من تاريخ انتهاء تصريحه. ب - إذا خالف أيا من شروط التصريح الممنوح له. ج - إذا خالف أيا من شروط أو إجراءات نقل المفرقعات أو تخزينها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'مع عدم الإخلال بحق من لحقه ضرر بالتعويض يعاقب فني التفجير - متى ثبت إهماله أو ارتكابه خطأ فنيا في التشغيل أو خالف أيا من شروط التصريح الممنوح له - بإحدى العقوبات الآتية: أ - الإنذار بالإيقاف عن مزاولة أعمال التفجير. ب - غرامة مالية لا تتجاوز عشرين ألف ريال. ج - المنع من مزاولة أعمال التفجير داخل المدن. د - الإيقاف عن مزاولة أعمال التفجير لمدة محددة أو دائمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يعاقب بالعقوبة المقررة على المخالف، كل من ثبتت مشاركته في ارتكاب أي من مخالفات أحكام هذا النظام مع علمه بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تطبق العقوبات الواردة في هذا النظام وتضاعف في حالة العود، ما لم ينص على عقوبة أشد في نظام آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'يعفى من العقوبات المنصوص عليها في المواد (الخامسة عشرة، والسادسة عشرة، والسابعة عشرة، والحادية والعشرين) من هذا النظام كل من: أ - بادر بإبلاغ السلطات قبل البدء في تنفيذ المخالفة. ب - قام بالإبلاغ بعد حدوث المخالفة وساعد بلاغه في ضبط شركائه في المخالفة نفسها، أو في مخالفة أخرى مماثلة لها في النوع والخطورة. وتحدد اللائحة الضوابط اللازمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يعفى من العقوبات الواردة في هذا النظام، كل من حاز متفجرات أو مفرقعات على وجه مخالف لأحكام هذا النظام، إذا تقدم بطلب التصريح اللازم بها خلال ثلاثة أشهر من تاريخ العمل بهذا النظام، أو سلم ما لديه إلى الوزارة خلال المدة المذكورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: تمنح مكافأة – يقدرها الوزير – لا تزيد على مبلغ الغرامة المقررة للمخالفة، لكل من يبلغ عن أي مخالفة من المخالفات المنصوص عليها في هذا النظام، إذا ترتب على بلاغه ضبط المخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تحدد اللائحة المقابل المالي للخدمات التي تقدمها الوزارة لحراسة المتفجرات و المفرقعات أثناء النقل أو التخزين أو الاستعمال، على أن يؤخذ في الاعتبار الكميات والمسافات عند تحديد هذا المقابل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام خلال مائة وعشرين يوما، وتنشر في الجريدة الرسمية، ويعمل بها من تاريخ نفاذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد مائة وعشرين يوما من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a05632b0-ac19-4659-af2a-a9a700f18337/1
  verified: false
