regulation:
  code: REFIN
  name_ar: نظام التمويل العقاري
  name_en: Real Estate Finance Law
  authority: SAMA
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك: النظام : نظام التمويل العقاري.اللائحة : اللائحة التنفيذية لهذا النظام.الوزير : وزير المالية.المؤسسة : مؤسسة النقد العربي السعودي.الوزارة : وزارة الإسكان.عقد التمويل العقاري : عقد الدفع الآجل لتملك المستفيد للسكن.المستفيد : الشخص ذو الصفة الطبيعية الحاصل على التمويل العقاري.الممول العقاري : البنوك التجارية، وشركات التمويل المرخص لها بمزاولة نشاط التمويل العقاري.المستهلك : كل شخص توجه له خدمات التمويل العقاري.مستحق الدعم : الشخص السعودي ذو الصفة الطبيعية الذي لا يتجاوز دخله الحد الذي يقترحه الوزير من حين إلى آخر، ويوافق عليه مجلس الوزراء.جمعيات الإسكان : المؤسسات والجمعيات الخيرية المتخصصة في تقديم الإسكان لغير القادرين، المرخص لها طبقًا للأنظمة المرعية.السوق الأولية : عقود التمويل العقاري التي تبرم بين المستفيد والممول العقاري.السوق الثانوية : تداول حقوق الممول الناشئة من عقود السوق الأولية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تختص المؤسسة بتنظيم قطاع التمويل العقاري، بما في ذلك ما يأتي: 1 - السماح للبنوك بمزاولة التمويل العقاري بتملك المساكن لأجل تمويلها - استثناءً من حكم الفقرة (5) من المادة (العاشرة) من نظام مراقبة البنوك - وفقاً لهذا النظام وما تحدده اللائحة.2 - الترخيص لشركات التمويل العقاري وفقًا لهذا النظام ونظام مراقبة شركات التمويل.3 - الترخيص لشركة مساهمة (أو أكثر) لإعادة التمويل العقاري وفقًا لاحتياجات السوق، ويجوز لصندوق الاستثمارات العامة المساهمة في ملكيتها، وتوافق المؤسسة على المرشحين لمجلس الإدارة، وللممولين المرخص لهم المساهمة في ملكية الشركة، ويطرح للاكتتاب العام جزء من أسهمها وفق أحكام نظام السوق المالية.4 - الترخيص لشركات التأمين التعاوني بتغطية المخاطر المتعلقة بالتمويل العقاري وفقًا لنظام مراقبة شركات التأمين التعاوني.5 - إصدار المعايير والإجراءات المتعلقة بالتمويل العقاري، ومراجعة نماذج عقود التمويل العقاري التي يصدرها الممولون العقاريون، والتأكد من مطابقتها لتلك المعايير والإجراءات، وتحقيقها للحماية الواجبة للمستهلك والمستفيد.6 - نشر البيانات المتعلقة بسوق التمويل العقاري،
    ورعاية تطوير تقنيات التمويل العقاري، بما في ذلك تقنيات تيسير تدفق البيانات بين السوقين الأولية والثانوية.7 - تحديد مبادئ الإفصاح عن معايير تكلفة التمويل وطريقة احتسابه؛ لتمكين المستهلك من مقارنة الأسعار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يزاول الممول العقاري أعمال التمويل العقاري بما لا يتعارض مع أحكام الشريعة الإسلامية؛ بناء على ما تقرره اللجان الشرعية المشار إليها في المادة (الثالثة) من نظام مراقبة شركات التمويل، وبما لا يخل بسلامة النظام المالي وعدالة التعاملات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تنشر وزارة التجارة والصناعة، ووزارة العدل، والوزارة - كل فيما يخصها - البيانات المتعلقة بنشاط السوق العقارية، وذلك في نشرات دورية وفقًا لاحتياجات السوق، وطبقًا لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب على الجهات المنوط بها تسجيل الملكية العقارية (المحاكم وكتابات العدل) تمكين الممولين العقاريين (المرخص لهم) من الاطلاع والحصول على المعلومات المدرجة في سجلات العقار لديها، وفقًا لما تحدده اللائحة بالاتفاق مع وزارة العدل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: للممولين العقاريين وشركات إعادة التمويل العقاري تغطية مخاطر التمويل العقاري بالتأمين التعاوني وفقًا لأحكام اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب أن يكون للمستفيد سجل ائتماني لدى أحد مقدمي الخدمة المرخص لهم وفقًا لنظام المعلومات الائتمانية، وأن تدرج فيه بيانات سلوكه الائتماني خلال مدة التمويل، وتحدد اللائحة وتعليمات المؤسسة الحد الأدنى لمدة سجل المستفيد، وبيانات السجل خلال مدة التمويل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يخصص صندوق التنمية العقارية جزءًا من ميزانيته المعتمدة ضمانات ومعونات لدعم التمويل العقاري لمستحقي الدعم وجمعيات الإسكان، وتنظم اللائحة كيفية ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تضمن الحكومة الوفاء بالالتزامات المالية التي تترتب على ضمانات صندوق التنمية العقارية لدعم التمويل العقاري، وذلك في حدود ما يعتمد لتلك الضمانات في ميزانية الصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجوز بقرار من مجلس الوزراء - بناءً على اقتراح من الوزير - منح حوافز ضريبية للاستثمار في الأوراق المالية العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'مع عدم الإخلال بما ورد في المادة (الثالثة) من هذا النظام؛ للممولين العقاريين إعادة التمويل من خلال ما يأتي: 1 - شركات إعادة التمويل العقاري وفقًا لأحكام النظام واللائحة.2 - الأوراق المالية وفقًا لأحكام نظام السوق المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعفى إجراءات نقل الرهن في السوق الثانوية للتمويل العقاري من رسوم التسجيل في نظام التسجيل العيني للعقار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تتولى المحكمة المختصة الفصل في المنازعات الناشئة عن عقود التمويل العقاري، وإيقاع العقوبة المنصوص عليها في الفقرة (1) من المادة (الخامسة والثلاثين) من نظام مراقبة شركات التمويل على كل من ثبتت مماطلته في الوفاء بدينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تعد المؤسسة اللائحة لهذا النظام، وتصدر بقرار من الوزير خلال (تسعين) يومًا من تاريخ صدوره، ويعمل بها بعد نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعمل بهذا النظام بعد مضي (تسعين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/88254f6b-0311-4ed2-be96-a9a700f2d6f2/1
  verified: false
