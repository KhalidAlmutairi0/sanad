regulation:
  code: BOE118
  name_ar: نظام تملك غير السعوديين للعقار واستثماره
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: أ - يجوز للمستثمر غير السعودي من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص له بمزاولة أي نشاط مهني أو حرفي أو اقتصادي تملك العقار اللازم لمزاولة ذلك النشاط، ويشمل العقار اللازم لسكنه وسكن العاملين لديه، وذلك بعد موافقة الجهة التي أصدرت الترخيص . كما يجوز استئجار العقار المشار إليه مع مراعاة ما ورد في المادة الخامسة من هذا النظام.ب - إذا كان الترخيص المشار إليه يشمل شراء مبان أو أراض لإقامة مبان عليها واستثمارها بالبيع أو التأجير فيجب ألا تقل التكلفة الإجمالية للمشروع أرضا وبناء عن ثلاثين مليون ريال، ويجوز لمجلس الوزراء تعديل هذا المبلغ. كما يشترط أن يتم استثمار ذلك العقار خلال خمس سنوات من ملكيته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يسمح للأشخاص غير السعوديين ذوي الصفة الطبيعية المقيمين في المملكة إقامة نظامية بتملك العقار لسكنهم الخاص، وذلك بعد الترخيص لهم من وزارة الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يجوز - على أساس المعاملة بالمثل - للممثليات الأجنبية المعتمدة بالمملكة بتملك المقر الرسمي ومقر السكن لرئيسها وأعضائها، ويجوز للهيئات الدولية والإقليمية في حدود ما تقضي به الاتفاقيات التي تحكمها تملك المقر الرسمي لها، وذلك كله بشرط الحصول على ترخيص من وزير الخارجية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجوز بموافقة من رئيس مجلس الوزراء -في غير الحالات السابقة- تملك العقار للسكن الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لا يجوز لغير السعودي بأي طريق غير الميراث اكتساب حق الملكية أو حق الارتفاق أو الانتفاع على عقار واقع داخل حدود مدينتي مكة المكرمة والمدينة المنورة، ويستثنى من ذلك اكتساب حق الملكية إذا اقترن بها وقف العقار المملوك طبقا للقواعد الشرعية على جهة معينة سعودية وبشرط أن ينص في الوقف على أن يكون للمجلس الأعلى للأوقاف حق النظارة على الموقوف. على أنه يجوز لغير السعودي من المسلمين استئجار العقار داخل حدود مدينتي مكة المكرمة والمدينة المنورة لمدة لا تزيد على سنتين قابلة للتجديد لمدة أو مدد مماثلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يحظر على كتاب العدل أو أي جهة أخرى مختصة توثيق أي تصرف لا يتفق وأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'لا يخل تطبيق أحكام هذا النظام بما يأتي : أ - حقوق الملكية التي ترتبت لغير السعوديين بموجب الأنظمة السابقة، ويتعين إعمال أحكام هذا النظام بعد نفاذه عند انتقال ملكية العقار. ب - المزايا التي تضمنتها القواعد المنظمة لتملك العقار لمواطني دول مجلس التعاون لدول الخليج العربية. ج - اكتساب حق الملكية أو أي حق عيني أصلي آخر على عقار عن طريق الميراث. د - الأنظمة وقرارات مجلس الوزراء والأوامر السامية التي تمنع التملك في بعض المواقع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: أ - يحل هذا النظام محل نظام تملك غير السعوديين للعقار في المملكة العربية السعودية، الصادر بالمرسوم الملكي ذي الرقم (م/22) والتاريخ 12 / 7 / 1390 هـ. ب - ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد تسعين يوما من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/753d7ffc-5e18-4f36-818d-a9a700f213a1/1
  verified: false
