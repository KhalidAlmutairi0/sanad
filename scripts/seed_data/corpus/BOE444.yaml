articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية_ أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها ما لم يقتض السياق غير ذلك: الهيئة: الهيئة العليا للفروسية. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. الفروسية: جميع الرياضات والأنشطة الخاصة بالخيل في المملكة. الجهات المعنية: نادي الفروسية، والاتحاد السعودي للفروسية، ومركز الملك عبدالعزيز للخيل العربية الأصيلة، ووزارة البيئة والمياه والزراعة، وأي جهة ذات علاقة بالفروسية أو الخيل في المملكة. المرافق: جميع الأراضي والمنشآت المخصصة للفروسية في المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري ، وترتبط تنظيمياً برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع ومكاتب داخل المملكة، وخارجها بالتنسيق مع وزارة الخارجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة - بالتعاون مع الجهات المعنية - إلى تطوير قطاع الفروسية في المملكة على نحو يتناسب مع قيمتها الحضارية وارتباطها بالتراث والثفافة الوطنيين، وبما يحقق المصالح الرياضية والثقافية والاجتماعية والاقتصادية المرجوة، ويسهم في تعزيز المكانة الدولية للمملكة في مجالات الفروسية المختلفة، وللهيئة في سبيل ذلك - دون إخلال باختصاصات ومسؤوليات الجهات الأخرى – ما يلي: قتراح السياسات العامة لتطوير قطاع الفروسية. القيام بجميع الدراسات اللازمة لإعداد الاستراتيجية الوطنية للفروسية، ورفعها لاستكمال الإجراءات النظامية، والإشراف على تنفيذها بعد اعتمادها، ومراجعتها وتحديثها بشكل مستمر. وضع مواصفات قياسية للمرافق، واعتماد مخططاتها في جميع مناطق المملكة بالتنسيق مع الجهات المعنية. التخطيط للبطولات الدولية التي تقام في المملكة ، والتعاون في تنفيذها - بعد اعتمادها - بالتنسيق مع الجهات المعنية. اقتراح ميزانيات المشروعات الوطنية والبطولات الدولية الخاصة بالفروسية، ورفعها لاستكمال الإجراءات النظامية اللازمة في شأنها. دعم الفرسان السعوديين وملاك الخيل ومنتجيها. وضع برامج لدعم إنتاج الخيل في
    المملكة. العمل - بالتنسيق مع الجهات المعنية - على تطوير الخدمات البيطرية المقدمة للخيل. تقديم المشورة والدعم لتطوير جوائز الفروسية. مواءمة الجهود المبذولة بين جميع الجهات المعنية وتنسيقها بما يكفل النهوض بالفروسية في المملكة. دعم التكامل والشراكة بين الجهات المعنية وتحفيزها لإقامة الفعاليات والبرامج. دراسة الصعوبات والإشكالات التي تواجه سير أعمال الجهات المعنية، والعمل على حلها. توثيق وأرشفة وتبادل المعلومات الخاصة بفعاليات وبرامج ونشاطات الجهات المعنية، وإصدار النشرات الإعلامية والتوعوية لتلك المعلومات. تطوير الفكر التنظيمي لنشاطات الفروسية. وضع الخطط والاستراتيجيات الإعلامية لخدمة الفروسية. تقديم التوصيات للجهات المعنية في شأن تنمية الموارد المالية، والعمل على هيكلة اقتصاديات الخدمات التي تقدمها تلك الجهات، وفقاً لما تقضي به الأنظمة والتعليمات الصادرة في هذا الشأن. التعاون مع الجامعات والكليات ومراكز البحث العلمي والمؤسسات الصحية، لإجراء الدراسات والأبحاث العلمية ذات الصلة بالفروسية. التعاون مع الهيئات والمنظمات الإقليمية والدولية ذات الصلة بنشاط الهيئة، بحسب الأنظمة والتعليمات المتبعة.
    الإسهام في التعريف بالتراث الحضاري للمملكة في قطاع الفروسية، ودعم السياحة المتخصصة فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'أ - يكون للهيئة مجلس إدارة يُشكل من رئيس يعين بأمر ملكي، وعضوية كل من: رئيس مجلس إدارة نادي الفروسية. رئيس ا لاتحاد السعودي للفروسية. رئيس مجلس إدارة مركز الملك عبدالعزيز للخيل العربية الأصيلة. ممثل من وزارة المالية. ممثل من وزارة البيئة والمياه والزراعة. ممثل من وزارة الشؤون البلدية والقروية. ممثل من وزارة الرياضة. ممثل من الهيئة العامة للجمارك. ثلاثة من الخبراء أو المختصين في مجالات الفروسية، يعينون بقرار من مجلس الوزراء بناء على اقتراح من رئيس المجلس. ويجب ألا تقل مراتب ممثلي الأجهزة الحكومية عن (الرابعة عشرة) أو ما يعادلها، وتكون مدة عضوية الأعضاء – عدا الرئيس وممثلي الجهات المعنية- (ثلاث) سنوات قابلة للتجديد مرة واحدة. ب - للرئيس تعيين نائب له من أعضاء المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، وله اتخاذ القرارات اللازمة لتحقيق أهدافها وممارسة صلاحياتها في حدود أحكام هذا التنظيم والأنظمة الأخرى واللوائح الصادرة ذات العلاقة، وله على وجه خاص ما يأتي: اعتماد السياسات العامة للهيئة ، وخطتها الاستراتيجية ،وخططها التشغيلية. اعتماد الهيكل التنظيمي للهيئة. إقرار اللوائح المالية والإدارية التي تسير عليها الهيئة وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها ،على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. الموافقة على استثمار أموال الهيئة بما يحقق أهدافها، وفقاً للأحكام المنظمة لذلك. الموافقة على افتتاح فروع أو مكاتب للهيئة. قبول الهبات والوصايا والأوقاف والمنح والتبرعات، وفق الإجراءات المنظمة لذلك. الصرف من أموال الهيئة لتحقيق أغراضها، واتخاذ جميع الإجراءات المالية اللازمة في حدود أحكام التنظيم والأنظمة ذات العلاقة. تعيين مراجع حسابات خارجي (أو أكثر) ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات وتوقيع العقور والانضمام للبروتوكولات، والمعاهدات،
    بحسب الإجراءات النظامية المتبعة. اقتراح مشروعات الأنظمة والقرارات ذات العلاقة باختصاصات الهيئة، واقتراح تعديل المعمول به منها، بحسب الإجراءات النظامية المتبعة. الموافقة على مشروع الميزانية السنوية للهيئة، وحسابها الختامي وتقرير مراجع الحسابات، تمهيداً لاعتمادها وفق الإجراءات النظامية المتبعة. وللمجلس – في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات- ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض رئيسه أو من يراه من أعضاء المجلس أو من منسوبي الهيئة بعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع المجلس مرتين في السنة المالية الواحدة على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك ثلث أعضائه على الأقل. وتوجه الدعوة إلى الاجتماع من رئيس المجلس – كتابة - قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم رئيس المجلس أو من ينيبه. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس المجلس. يجوز – عند الحاجة وفي الحالات المستعجلة ووفقاً لما يقدره المجلس - أن تعقد الاجتماعات وأن يصوت على القرارات عن بعد من خلال استخدام وسائل التقنية، ويمكن أن تتخذ القرارات بطريق التمرير على الأعضاء والتوقيع عليها بما يفيد اطلاع جميع الأعضاء عليها، ولا تعد القرارات الصادرة بهذه الطريقة صحيحة ما لم تمرر على جميع أعضاء المجلس ويصوت عليها من جميع الأعضاء وتحز - على الأقل - على أغلبية أصواتهم. لرئيس المجلس أو من يفوضه بذلك دعوة من يراه من أهل الاختصاص والخبرة لحضور اجتماعات المجلس، وتقديم المعلومات والرأي والمشورة، دون أن يكون له حق
    التصويت. يُمنع تصويت أي عضو على قرار له فيه مصلحة مباشرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للهيئة أمين عام يُعين ويُعفي بقرار من المجلس يحدد فيه أجره ومزاياه المالية الأخرى، وهو المسؤول التنفيذي عن إدارة الهيئة وتمثيلها أمام القضاء - أو من يفوضه - والجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وتتركز مسؤولياته في حدود أحكام التنظيم وما يمنحه المجلس من صلاحيات ، وللمجلس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتكون موارد الهيئة المالية مما يأتي: أ - ما يُخصص لها في الميزانية العامة للدولة من اعتمادات وإعانات. ب - المقابل المالي للخدمات والأعمال التي تقدمها. ج - عوائد استثمار أموالها الثابتة والمنقولة. د - الهبات أو الأوقاف أو الوصايا أو التبرعات أو المنح التي يقبلها المجلس. هـ - أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية لدى مؤسسة النقد العربي السعودي. تفتح الهيئة حساباً لها في مؤسسة النقد العربي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة المعتمدة ولوائحها المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للهيئة هي السنة المالية للدولة . واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تُعامل الهيئة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات والهيئات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع جميع العاملين في الهيئة لنظامي العمل والتأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من بداية كل سنة مالية تقريراً سنوياً عما حققته من إنجازات خلال السنة المنقضية، وما واجهها من صعوبات ، وما تراه من مقترحات لتحسين سير عملها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة على حسابات الهيئة وعملياتها، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يُنشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c9b0b7b9-a586-45ec-87c1-ac9000e6a783/1
  verified: false
