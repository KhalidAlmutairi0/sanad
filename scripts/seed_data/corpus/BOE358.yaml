articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ الآتية- أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك: الهيئة: الهيئة العامة للصناعات العسكرية. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. المحافظ: محافظ الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية وبالاستقلال المالي والإداري، وترتبط برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى تنظيم قطاع الصناعات العسكرية في المملكة وتطويره ومراقبة أدائه، ولها في سبيل تحقيق ذلك القيام بكل ما يلزم لتحقيق أهدافها، ومن ذلك ما يأتي: 1ـ وضع السياسات والاستراتيجيات وإعداد الأنظمة واللوائح ذات الصلة بقطاع الصناعات العسكرية، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. 2ـ إدارة عمليات المشتريات العسكرية للجهات العسكرية والأمنية في المملكة من خلال استلام احتياجات تلك الجهات من المنظومات والأسلحة والذخائر وأنظمة الاتصالات والمعدات وقطع الغيار والتجهيزات والملابس العسكرية، وعقود الصيانة والإصلاح والعمرة والتشغيل الخاصة بالتسليح؛ لدراستها والموافقة عليها والتفاوض مع الموردين في شأنها، والمشاركة في فحص وقبول المنتجات والخدمات لضمان مطابقتها للمواصفات المطلوبة، مع مراعاة أن تكون الأولوية للشركات المحلية وفق ضوابط محددة تضعها الهيئة. 3ـ إصدار تراخيص التصنيع والتصدير للقطاعين العام والخاص للصناعات العسكرية، ووضع الضوابط والإجراءات المتعلقة بذلك. 4ـ وضع المواصفات القياسية الخاصة بالصناعات العسكرية، والإشراف على تطبيقها بالاشتراك مع الجهات المعنية. 5ـ تحديد
    المواقع المناسبة لإقامة مصانع عسكرية بالتنسيق مع الجهات ذات العلاقة، ووضع المعايير اللازمة لذلك. 6ـ وضع آليات مراقبة قطاع الصناعات العسكرية ومتابعة تطبيقها. 7ـ إدارة برنامج التوازن الاقتصادي وتطويره، والإشراف على تنفيذه، وذلك فيما يخص قطاع الصناعات العسكرية، والتفاوض مع الجهات والشركات الأجنبية لنقل التقنية وزيادة المحتوى المحلي، ووضع الضوابط والإجراءات المتعلقة بذلك. 8ـ إدارة عمليات البحث والتطوير في قطاع الصناعات العسكرية، ونقل التقنية، وذلك بالاستفادة من المراكز البحثية والمختبرات والمعامل والجامعات -الداخلية والخارجية- وإنشاء مراكز بحثية بحسب الحاجة، وتحديد المخصصات المالية -بالتنسيق مع وزارة المالية- لعمليات البحث والتطوير في القطاع للهيئة والجهات الحكومية. 9ـ إجراء الدراسات اللازمة في مجال الصناعات العسكرية. 10ـ العمل مع الجهات ذات العلاقة لمواءمة مخرجات التعليم والتدريب الفني مع احتياجات قطاع الصناعات العسكرية، والعمل على استقطاب الكفايات الفنية إلى القطاع. 11ـ وضع حوافز لتطوير قطاع الصناعات العسكرية، بالاتفاق مع الجهات ذات العلاقة. 12ـ دعم المصنعين المحليين لتلبية احتياجات قطاع
    الصناعات العسكرية، ومن ذلك نقل التقنية ومراعاة توزيع المشاريع بين الشركات المحلية وفق آلية تضمن نمو كافة شركات قطاع الصناعات العسكرية، والترويج للقطاع داخلياً وخارجياً، وتأهيل المصنعين المحليين وتصنيفهم، وتوفير البنى التحتية ذات الصلة بالقطاع. 13ـ عقد شراكات استراتيجية مع القطاعين العام والخاص محلياً وخارجياً لتحقيق أهدافها. 14ـ إنشاء قاعدة معلومات عن جميع التجهيزات العسكرية والأمنية المتوفرة لدى الجهات العسكرية والأمنية، وكذلك عن جميع المنتجات المحلية وبرامج البحث والتطوير المتعلقة بالقطاع العسكري، بما يمكن الهيئة من تحقيق أهدافها. 15ـ المشاركة في تمثيل المملكة في الهيئات والمنظمات الدولية ذات الصلة بالصناعات والمشتريات العسكرية وأنشطة البحث والتطوير في المجال العسكري. 16ـ تمثيل المملكة فيما يتم توقيعه من اتفاقيات دولية ذات الصلة بالصناعات والتقنيات العسكرية. 17ـ إقامة المعارض والمؤتمرات، وعقد الندوات العلمية وجلسات العمل ذات الصلة بالصناعات والمشتريات العسكرية وأنشطة البحث والتطوير في المجال العسكري، وفقاً للإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'أـ يكون للهيئة مجلس إدارة برئاسة نائب رئيس مجلس الوزراء، وعضوية كل من: 1ـ وزير الطاقة والصناعة والثروة المعدنية. 2ـ وزير المالية. 3ـ وزير التجارة والاستثمار. 4ـ رئيس مجلس إدارة الشركة السعودية للصناعات العسكرية. 5ـ ممثلين عن وزارة الدفاع. 6ـ ممثل عن وزارة الداخلية. 7ـ ممثل عن وزارة الحرس الوطني. 8ـ ممثل عن رئاسة أمن الدولة. 9ـ أربعة من ذوي الاختصاص في مجال عمل الهيئة، يصدر بتعيينهم أمر من رئيس مجلس الوزراء بناء على اقتراح من رئيس المجلس وتكون عضويتهم لمدة (ثلاث) سنوات قابلة للتجديد لمرة واحدة. ب ـ يجب ألا تقل مرتبة ممثلي الأجهزة الحكومية المشار إليهم في الفقرات (5) و(6) و(7) و(8) عن المرتبة (الممتازة) أو ما يعادلها. ج - يختار رئيس المجلس نائبًا له من الأعضاء المنصوص عليهم في الفقرات (1) و(2) و(3) و(4) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنه التنظيم، وله على وجه خاص ما يأتي: 1ـ الموافقة على السياسات والاستراتيجيات المتعلقة بقطاع الصناعات العسكرية، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه. 2ـ اقتراح مشروعات الأنظمة ذات العلاقة بقطاع الصناعات العسكرية، واقتراح تعديل المعمول به منها. 3ـ إقرار آليات إدارة عمليات المشتريات العسكرية للجهات العسكرية والأمنية. 4ـ إقرار اللائحة المنظمة للبحث والتطوير في قطاع الصناعات العسكرية. 5ـ إقرار الضوابط والإجراءات المتعلقة بالتراخيص المشمولة باختصاصات الهيئة. 6ـ إقرار ضوابط التعامل مع العقود والوثائق والمستندات المتعلقة بالمشتريات العسكرية، بما يضمن المحافظة على سريتها. 7ـ إقرار اللوائح الإدارية والمالية -بالاتفاق مع وزارة المالية- وغيرها من اللوائح الداخلية. 8ـ إقرار هيكل الهيئة التنظيمي بحسب الإجراءات النظامية المتبعة. 9ـ الموافقة على إنشاء فروع أو مكاتب للهيئة. 10ـ تحديد المقابل المالي لما تقدمه الهيئة من خدمات وأعمال يرى
    المجلس استحصال مقابل مالي عنها. 11ـ تعيين مراجع حسابات خارجي (أو أكثر) ومراقب مالي داخلي. 12ـ الموافقة على مشروع ميزانية الهيئة السنوية وحسابها الختامي والتقرير السنوي؛ تمهيداً لرفعها وفق الإجراءات النظامية المتبعة. 13- اعتماد تقرير مراجع الحسابات. 14ـ النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة. 15ـ الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. 16ـ قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقاً للأحكام المنظمة لذلك. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1 ـ يجتمع المجلس مرة واحدة كل (ثلاثة) أشهر، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك ثلث أعضائه على الأقل، وتوجه الدعوة للاجتماع من رئيس المجلس - كتابة- قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. 2ـ يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء، بمن فيهم رئيس المجلس أو نائبه. وتصدر القرارات بأغلبية أصوات الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. 3ـ للمجلس دعوة من يرى الاستعانة بهم لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة محافظ بمرتبة وزير، يعين بناء على اقتراح رئيس المجلس، ويعد المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود التنظيم وما يقرره المجلس، ويتولى الاختصاصات الآتية: 1ـ اقتراح السياسات والاستراتيجيات المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس. 2ـ الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة. 3ـ الإشراف على إعداد اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية؛ تمهيداً لرفعها إلى المجلس. 4ـ اقتراح هيكل الهيئة التنظيمي، ورفعه إلى المجلس. 5ـ الإشراف على إعداد تقرير الهيئة السنوي ومشروع ميزانيتها وحسابها الختامي؛ تمهيداً لعرضها على المجلس. 6ـ الإشراف على إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، وعرضها على المجلس. 7ـ التوقيع على الاتفاقيات والبروتوكولات بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. 8ـ تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. 9ـ الصرف من ميزانية
    الهيئة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي يفوضه بها المجلس. 10ـ التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفقاً للأنظمة والصلاحيات التي يفوضه بها المجلس. 11ـ إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناءً عليه، بحسب الصلاحيات المخولة له. 12ـ تعيين منسوبي الهيئة وفقاً للوائح المنظمة لذلك، والإشراف عليهم. 13ـ إقرار الابتعاث والتدريب لمنسوبي الهيئة، وفقاً للوائح المنظمة لذلك. 14ـ أي اختصاص آخر يسنده إليه المجلس. وللمحافظ تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1ـ تحدد اللوائح الإدارية للهيئة جميع الأحكام المنظمة لشؤونها الإدارية، بما في ذلك الأحكام المنظمة لأوضاع منسوبيها. 2ـ فيما عدا الحكم الوارد في الفقرة (3) من المادة (الخامسة) من التنظيم، تحدد اللوائح المالية للهيئة جميع الأحكام المنظمة لشؤونها المالية، بما في ذلك الأحكام المتعلقة بآليات تنفيذ منافساتها وتأمين مشترياتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1ـ تشترك الهيئة مع الجهات العسكرية والأمنية عند مناقشة وزارة المالية لميزانيات تلك الجهات المتعلقة بالمشتريات العسكرية. 2ـ تشترك الهيئة مع الجهات الحكومية- بما فيها الجهات العسكرية والأمنية- عند مناقشة وزارة المالية لميزانيات تلك الجهات المتعلقة بتمويل البحث والتطوير في قطاع الصناعات العسكرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون المصانع العسكرية المرخصة من قبل الهيئة، خاضعة لإشراف الهيئة العليا للأمن الصناعي فيما يتصل بتوفير متطلبات الأمن والسلامة والحماية من الحريق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتألف موارد الهيئة مما يلي: 1ـ ما يخصص لها من اعتمادات في الميزانية العامة للدولة. 2 ـ المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها. 3 ـ ما يقبله المجلس من هبات وتبرعات ومنح ووصايا، وعائدات أوقافها. 4 ـ أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تفتح الهيئة حساباً لها في مؤسسة النقد العربي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1ـ تكون للهيئة ميزانية سنوية مستقلة. 2ـ السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1ـ يسري على منسوبي الهيئة المدنيين -عدا المحافظ- نظام العمل ونظام التأمينات الاجتماعية. 2ـ تسري على منسوبي الهيئة العسكريين أنظمة الخدمة العسكرية ولوائحها، ونظام التقاعد العسكري، ويتمتعون بمزايا منسوبي الهيئة وفقاً لما يحدده المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ترفع الهيئة حسابها الختامي إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية تقريراً سنوياً عما حققته من إنجازات خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة؛ يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2f06117c-62e3-406c-a61e-a9fc009c5879/1
