regulation:
  code: BOE447
  name_ar: تنظيم المركز الوطني للطب البديل والتكميلي
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: ينشأ بموجب هذا التنظيم مركز يسمى (المركز الوطني للطب البديل والتكميلي)، يرتبط بوزير الصحة مباشرةً، ويكون مرجعاً وطنياً لكل ما يتعلق بنشاطات الطب البديل والتكميلي ومزاولته، ويشار إليه فيما يلي بـ "المركز" .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يكون مقر المركز مدينة الرياض، وللمركز الحق في إنشاء فروع ومكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى وضع الضوابط والمعايير لمزاولة الطب البديل والتكميلي، وتوثيق علوم الطب البديل والتكميلي، وتطويرها ، وبخاصة الطب الإسلامي والعربي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: للمركز الاستعانة بالخبراء في مجال الطب البديل والتكميلي من داخل المملكة وخارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تكون مهمات المركز على النحو التالي : 1 - وضع الأسس والمعايير والشروط والضوابط لمزاولة مهنة الطب البديل والتكميلي.2 - وضع الأدلة والإجراءات الخاصة بالطب البديل والتكميلي.3 - وضع الضوابط والمعايير والآلية الملائمة لتوثيق علوم الطب البديل والتكميلي، وبخاصة الطب الإسلامي والعربي.4 - إجراء المسوحات والدراسات والبحوث المتعلقة بالطب البديل والتكميلي.5 - إصدار التراخيص بمزاولة مهنة الطب البديل والتكميلي.6 - المشاركة في تحديد الرسوم التي يتقاضاها ممارسو الطب البديل والتكميلي بحسب الخبرة والخدمة المقدمة والتأهيل.7 - مراقبة نشاطات المرخص لهم - أفراداً ومؤسسات - بممارسة الطب البديل والتكميلي، وتقويم ذلك .8 - تأسيس قاعدة معلومات للطب البديل والتكميلي .9 - إصدار التقارير والنشرات والدوريات العلمية، وعقد الندوات والمؤتمرات، في مجال الطب البديل والتكميلي .10 - تقديم برامج التوعية والتثقيف الصحي في مجال الطب البديل والتكميلي للمجتمع. 11 - عقد الدورات، والبرامج التأهيلية، وبرامج التعليم والتدريب المستمر للمتعاملين في مجال نشاطات الطب البديل والتكميلي .12 - التعاون والتنسيق مع الجهات الصحية
    والتعليمية والبحثية المختلفة في مجال الطب البديل والتكميلي، سواء داخل المملكة أو خارجها .13 - إصدار مجلة علمية متخصصة في الطب البديل والتكميلي .14 - اقتراح الميزانية السنوية اللازمة لتوفير الاحتياجات البشرية والمادية والأجهزة والأدوات والمستلزمات والأثاث.15 - القيام بأي مهمة أخرى يكلف بها ضمن اختصاصه مستقبلاً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تشكل - بقرار من وزير الصحة - لجنة استشارية من المسؤولين، أو المختصين، أو المهتمين بالطب البديل والتكميلي. ويحدد في القرار رئيس اللجنة لمدة ثلاث سنوات قابلة للتجديد، على أن تضم ممثلين من كل من : 1 - رئاسة الحرس الوطني (الشؤون الصحية) . 2 - وزارة الدفاع والطيران (الإدارة العامة للخدمات الطبية بالقوات المسلحة). 3 - وزارة الداخلية (الإدارة العامة للخدمات الطبية). 4 - وزارة التعليم العالي. 5 - وزارة الصحة . 6 - المؤسسة العامة لمستشفى الملك فيصل التخصصي ومركز الأبحاث. 7 - الهيئة العامة للغذاء والدواء. 8 - الهيئة السعودية للتخصصات الصحية . 9- القطاع الخاص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تختص اللجنة الاستشارية بإبداء الرأي فيما يلي: 1 - السياسة العامة للمركز.2 - الأسس والمعايير والشروط والضوابط لمزاولة مهنة الطب البديل والتكميلي .3 - الأدلة والإجراءات الخاصة بالطب البديل والتكميلي .4 - شروط وضوابط إصدار التراخيص بمزاولة مهنة الطب البديل والتكميلي.5 - الضوابط والمعايير والآلية الملائمة لتوثيق علوم الطب البديل والتكميلي، وبخاصة الطب الإسلامي والعربي .6 - أي مهمة أخرى تكلف بها ضمن اختصاصتها مستقبلاً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تجتمع اللجنة الاستشارية بدعوة من رئيسها مرتين على الأقل كل سنة ، وعلى الرئيس دعوة اللجنة إذا طلب ذلك نصف الأعضاء على الأقل . ويجب أن تشتمل الدعوة على جدول الأعمال . ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس أو نائبه . وتصدر التوصيات بأغلبية أصوات الحاضرين ، وفي حالة تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الجلسة . وللجنة الاستشارية أن تدعو لحضور جلساتها من ترى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت . وتثبت مداولات الجلسة وتوصياتها في محاضر يوقعها رئيس الجلسة وأعضاؤها الحاضرون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يزود المركز بما يحتاج إليه من الموظفين والمختصين والباحثين . ويكون للمركز مدير من ذوي الكفاية والخبرة يعينه وزير الصحة ، يتولى إدارة المركز ، وتصريف شؤونه ، وتتركز مسؤولياته في حدود ما ينص عليه هذا التنظيم، ويمارس الاختصاصات التالية : 1 - التحضير لاجتماعات اللجنة الاستشارية .2 - متابعة تنفيذ التوصيات التي تصدرها اللجنة الاستشارية بعد اعتمادها بقرار من وزير الصحة.3- إعداد مشروع ميزانية المركز وإقرارها وفق الإجراءات النظامية المتبعة.4 - الإشراف على المركز ومنسوبيه طبقاً للصلاحيات الممنوحة له وما تحدده اللوائح .5 - إصدار أوامر الصرف الخاصة بالمركز بموجب الميزانية السنوية المعتمدة .6 - رفع تقارير دورية عن سير أعمال المركز ومنجزاته ونشاطاته .7 - اقتراح خطط المركز وبرامجه والإشراف على تنفيذها بعد الموافقة عليها.8 - تمثيل المركز في علاقاته بغيره من الجهات وأمام القضاء .9- القيام بأي مهمة أخرى يكلفه بها وزير الصحة، تدخل ضمن صلاحياته.وللمدير تفويض بعض الاختصاصات المنصوص عليها في هذه المادة إلى غيره من المسؤولين في المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تكون للمركز ميزانية سنوية كبرنامج تشغيل ذاتي ضمن ميزانية وزارة الصحة. وتتكون إيرادات المركز مما يأتي : 1 - الاعتمادات التي تخصص له في ميزانية الدولة .2 - الدخول التي يحققها من ممارسة النشاطات التي تدخل ضمن اختصاصاته .3- الهبات والمنح والوصايا والإعانات الأخرى التي يقبلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يطبق نظام العمل ونظام التأمينات الاجتماعية على جميع منسوبي المركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يصدر وزير الصحة القرارات اللازمة لتنفيذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/62679230-95a3-44d5-bc69-a9a700f28bbd/1
