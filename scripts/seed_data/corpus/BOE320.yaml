regulation:
  code: BOE320
  name_ar: اللائحة التنظيمية لمراكز التنمية الاجتماعية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية – أينما وردت في هذه اللائحة – المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك: الوزارة : وزارة الشؤون الاجتماعية . الوزير : وزير الشؤون الاجتماعية . المركز : مركز التنمية الاجتماعية ، وهو مؤسسة اجتماعية تنشئها الوزارة، وتديرها، وتشرف عليها. اللجنة : لجنة التنمية الاجتماعية الأهلية ، المكونة من عدد من المواطنين؛ بهدف تلمس احتياجات المجتمع المحلي التنموية ، والعمل على تحقيقها بالمشاركة مع الدولة ممثلة في وزارة الشؤون الاجتماعية . المنطقة : المكان، أو الأماكن التي تقع في نطاق عمل المركز واللجنة. المجتمع المحلي : مجموعات السكان التي تعيش في أماكن تقع في نطاق عمل المراكز واللجان. القطاعات الحكومية : الوزارات والأجهزة الحكومية الأخرى التي لها فروع في المناطق التي بها المراكز واللجان.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تهدف المراكز إلى تنمية المجتمعات المحلية تنمية اجتماعية متكاملة وشاملة وفق الأساليب العلمية الحديثة، المستندة إلى احتياجات المواطن في تلك المجتمعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تقوم المراكز على أساس مشاركة الأهالي في تلمس احتياجاتهم، ومشاركتهم ماديًا ومعنويًا وبشريًا في تنفيذ مختلف البرامج التنموية الاجتماعية، والثقافية، والتدريبية، والترفيهية، والرياضية، والصحية، والزراعية، والبيئية، التي تسهم في سد احتياجات المجتمع المحلي وتنميته، وتحقيق أمنه وسلامته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تعمل المراكز على حث الأهالي – في المناطق التي تقع في نطاق عملها – على تكوين اللجان، وتشجيعهم على ذلك لبحث الاحتياجات العامة لمناطقهم ومجتمعاتهم المحلية، والعمل على تلبيتها من خلال برامج التنمية المتنوعة التي تقترحها اللجان، ويسهم فيها أفراد المجتمع مادياً ومعنوياً وبشرياً، ويجوز أن تنشأ في المدينة الواحدة أكثر من لجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تقدم البرامج التنموية من خلال المراكز واللجان التي تنشأ في نطاق عمل كل مركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يصدر الوزير القواعد والقرارات اللازمة لكيفية تكوين اللجان، وتنظيم عملها، وتحديد مدتها، وطريقة اختيار رئيسها وأعضائها، وبيان عددهم، وكيفية إنهائها. ويكون لكل لجنة شخصية اعتبارية فور موافقة الوزارة على إنشائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجوز للوزارة تقديم إعانة تأسيس لكل لجنة بما يكفل لها البدء في أعمالها الإدارية والاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يراعي في البرامج التي تنفذها المراكز أو اللجان أن تكون متناسقة مع الوضع الحضاري والاجتماعي والاقتصادي لكل منطقة، وفق منهجية علمية تستند إلى المسوح الاجتماعية الميدانية للمجتمعات المحلية التي تحدد الاحتياج الفعلي لها. وتنفذ تلك البرامج بعد موافقة الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تعمل المراكز ولجانها على الاستفادة من جميع القطاعات الحكومية والأهلية والخيرية التي هي في منطقة عملها؛ لتنفيذ برامجها وفق منهج تنسيقي مدروس بما يحقق التكامل وعدم الأزدواجية مع هذه القطاعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون لكل مركز جهاز إداري وفني متكامل يتولي تنفيذ برامجه، ويتناسب مع المهمات المنوطة به. وتحدد القواعد والقرارات التي يصدرها الوزير أقسام كل مركز والمهمات التفصيلية لكل قسم، وواجبات العاملين فيه ومهماتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تقسم مناطق خدمات المراكز واللجان على مستوي المملكة إلي فئات ثلاث – وفق توافر الخدمات والمرافق العامة فيها – على النحو الأتي : - فئة ( أ ) وتشمل المناطق التي تتوافر فيها معظم الخدمات. - فئة ( ب ) وتشمل المناطق المتوسطة الخدمات. - فئة ( ج ) وتشمل المناطق القليلة الخدمات.وتحدد الوزارة فئة كل مركز ولجنة وفق معايير توضحها القواعد والقرارات التي يصدرها الوزير لتنفيذ هذه اللائحة، على أن تحدث بشكل دوري وفق التغييرات التنموية في كل منطقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تكون الإعانة (المساهمة الحكومية) التي تقدمها الوزارة للمشروعات (البرامج) التي تنفذها المراكز واللجان وما تحتاج إليه اللجان والمشروعات من تجهيزات في هذه المناطق على النحو الآتي : - فئة ( أ ) ما لا يزيد على (50%) من إجمالي التكلفة. - فئة (ب ) ما لا يزيد على (70%) من إجمالي التكلفة. - فئة (ج ) ما لا يزيد على (90%) من إجمالي التكلفة. وتنظم القواعد والقرارات التي يصدرها الوزير لهذه اللائحة طريقة صرف هذه الإعانات.وللوزير صلاحية زيادة هذه النسبة لبعض اللجان في المشروعات ذوات النفع العام التي تصعب أو تقل مشاركة الأهالي فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجوز للجان جمع التبرعات وقبول الهبات والوصايا والأوقاف وفقًا للأنظمة المرعية التي تنظم ذلك. كما يجوز لها – بعد موافقة الوزارة – استثمار أموالها التي تزيد على احتياجاتها في نشاطات يكون لها عائد مالي يساعدها على تحقيق أهدافها، بما لا يتعارض مع الأنظمة والتعليمات الصادرة في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تتولي الوزارة الإشراف على أعمال اللجان ومراقبة أعمالها، ولها في ذلك الاطلاع على دفاترها وسجلاتها ووثائقها. وعلى كل لجنة تقديم أي معلومة أو بيان أو مستند آخر تطلبه الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجوز للوزير – بعد استنفاد الوزارة وسائل الإصلاح الممكنة – حل اللجنة في إحدى الحالات الآتية:1- اذا ما أصبحت عاجزة عن القيام بعملها ماليًا أو إداريًا.2 – إذا خرجت عن أهدافها.3 – إذا ارتكبت مخالفة جسيمة لهذه اللائحة، أو القواعد والقرارات الصادرة تنفيذًا لها.4 – إذا تصرفت في أموالها في غير الوجوه المحددة لها.وللجنة حق التظلم أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغها بقرار الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: للوزارة أن تسند إدارة إحدى دورها، أو مؤسساتها، أو مراكزها، أو أي من أنشطتها الاجتماعية إلى إحدى اللجان التي تثبت قدرتها الإدارية والمالية على ذلك، ويصرف للجنة في هذه الحالة إعانة تتناسب مع حجم الأعمال المنوطة بها طبقًا للقواعد المقررة في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يصرف بدل حقل للعاملين في المراكز من منسوبي الوزارة مقداره (25%) من الراتب الأساس، على أن يعمل المستفيد من هذا البدل ساعات إضافية لا تقل عن ثلاث ساعات يوميًا، وأن يغطي البدل مصاريف الانتقال الإضافية من العمل وإليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تلغي هذه اللائحة الصادرة بقرار مجلس الوزراء رقم (15) وتاريخ 11 / 1 / 1386 هـ، وكل ما يتعارض معها من أحكام أو قرارات سابقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يصدر الوزير القواعد والقرارات اللازمة لتنفيذ هذه اللائحة، على أن تصدر القواعد في مدة أقصاها تسعون يومًا من تاريخ صدورها، ويعمل بها من تاريخ العمل باللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية ، ويعمل بها بعد تسعين يومًا من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09a30b92-50a5-41ce-b404-a9a700f2b4e6/1
  verified: false
