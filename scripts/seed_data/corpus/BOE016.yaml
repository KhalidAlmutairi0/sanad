regulation:
  code: BOE016
  name_ar: نظام عقوبات نشر الوثائق والمعلومات السرية وإفشائها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'أ - يقصد بالوثائق السرية : الأوعية بجميع أنواعها، التي تحتوي على معلومات سرية يؤدي إفشاؤها إلى الإضرار بالأمن الوطني للدولة أو مصالحها أو سياساتها أو حقوقها، سواء أنتجتها أجهزتها المختلفة أو استقبلتها. ب - يقصد بالمعلومات السرية : ما يحصل عليه الموظف - أو يعرفه بحكم وظيفته - من معلومات يؤدي إفشاؤها إلى الإضرار بالأمن الوطني للدولة أو مصالحها أو سياساتها أو حقوقها. ج - تحدد لائحة الوثائق السرية وقوائمها، التي يصدرها المركز الوطني للوثائق والمحفوظات - بالتنسيق مع الجهات ذات العلاقة - أسماء هذه الوثائق، ودرجات سريتها، وموضوعاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يحظر على أي موظف عام أو من في حكمه ـ ولو بعد انتهاء خدمته ـ نشر أي وثيقة سرية أو إفشاء أي معلومة سرية حصل عليها أو عرفها بحكم وظيفته وكان نشرها أو إفشاؤها لا يزالان محظورين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يعد في حكم الموظف العام في تطبيق أحكام هذا النظام: 1 - من يعمل لدى الدولة أو لدى أحد الأجهزة ذات الشخصية المعنوية العامة، سواء أكان يعمل بصفة دائمة أو مؤقتة.2 - من تكلفه جهة حكومية أو أي سلطة إدارية أخرى بأداء مهمة معينة.3 - من يعمل لدى الشركات أو المؤسسات الفردية، التي تقوم بإدارة المرافق العامة أو تشغيلها أو صيانتها، أو تقوم بمباشرة خدمة عامة، وكذلك من يعمل لدى الشركات التي تساهم الدولة في رأس مالها.4 - المحكِّم أو الخبير الذي تعيّنه الحكومة أو أي هيئة لها اختصاص قضائي.5- رؤساء مجالس إدارات الشركات المنصوص عليها في الفقرة (3) من هذه المادة وأعضاؤها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يحظر إخراج الوثائق السرية من الجهات الحكومية، أو تبادلها مع الغير بأي وسيلة كانت، أو الاحتفاظ بها في غير الأماكن المخصصة لحفظها، وتحظر طباعتها أو نسخها أو تصويرها خارج الجهات الحكومية؛ إلا وفق ضوابط يصدرها المركز الوطني للوثائق والمحفوظات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد مقررة نظاماً، يعاقب بالسجن مدة لا تزيد على عشرين سنة أو بغرامة لا تزيد على مليون ريال أو بهما معاً، كل من: 1 - نشر وثائق أو معلومات سرية أو أفشاها.2 - دخل أو شرع في الدخول إلى أي مكان أو موقع غير مأذون له الدخول فيه؛ بقصد الحصول على وثائق أو معلومات سرية.3 - حصل بأي وسيلة غير مشروعة على وثائق أو معلومات سرية.4 - حاز أو علم - بحكم وظيفته - وثائق أو معلومات رسمية سرية فأفشاها أو أبلغها أو نشرها دون سبب مشروع مصرح به نظاماً.5 - أتلف ـ عمداً ـ وثائق سرية أو أساء استعمالها وهو يعلم أنها تتعلق بأمن الدولة أو بأي مصلحة عامة، وذلك بقصد الإضرار بمركز الدولة العسكري أو السياسي أو الدبلوماسي أو الاقتصادي أو الاجتماعي.6 - أخل بالمحافظة على سرية المعلومات والوثائق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعاقب كل من اشترك في أي من الجرائم الواردة في هذا النظام بالعقوبة المنصوص عليها في المادة (الخامسة)، ويعد شريكاً في الجريمة كل من اتفق أو حرض أو ساعد على ارتكابها مع علمه بذلك إذا ارتكبت الجريمة بناء على هذا الاتفاق أو التحريض أو المساعدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يراعى عند تطبيق العقوبة الواردة في المادة (الخامسة) من هذا النظام؛ التناسب بين الجريمة والعقوبة، مع مراعاة الظروف المخففة والمشددة للعقوبة، ويعد من الظروف المشددة ما يلي: 1 - إذا ارتكبت الجريمة في زمن الحرب.2 - إذا ارتكبت الجريمة لمصلحة دولة أجنبية، أو لأحد ممن يعملون لمصلحتها بأي صورة وعلى أي وجه وبأي وسيلة، سواء بطريق مباشر، أو غير مباشر.3 - إذا كانت الوثيقة أو المعلومة مهمة وذات درجة سرية عالية.4 - إذا كان الضرر الذي أصاب الدولة بسبب إفشاء الوثيقة أو المعلومة السرية جسيماً.5 - إذا ارتكبت الجريمة بقصد الإضرار بالدولة.6 - إذا ارتكب الجريمة من يشغل وظيفة ذات طابع سري.7 - إذا ارتكب الجريمة من يشغل وظيفة عليا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تتولى جهة التحقيق - المختصة نظاماً - التحقيق في الجرائم الواردة في هذا النظام والادعاء فيها أمام الجهة القضائية المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تشعر الجهات الحكومية - بما فيها الجهات الأمنية - جهة التحقيق عند وقوع أي جريمة من الجرائم المحددة في هذا النظام، وعليها إشعار الجهة الحكومية التابع لها المشتبه به، وفقاً لما جاء في المادة (الثالثة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تتولى المحكمة المختصة النظر في الجرائم وإيقاع العقوبة الواردة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يصدر المركز الوطني للوثائق والمحفوظات اللائحة التنفيذية لهذا النظام، خلال تسعين يوماً من تاريخ نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يعمل بهذا النظام بعد تسعين يوما من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/77d77bae-afbb-4481-a1cd-a9a700f1744b/1
  verified: false
