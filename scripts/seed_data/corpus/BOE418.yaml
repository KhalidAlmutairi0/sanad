articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ الآتية - أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها: المؤسسة: المؤسسة العامة للري. التنظيم: تنظيم المؤسسة. المجلس: مجلس إدارة المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع المؤسسة بالشخصية الاعتبارية وبالاستقلال المالي والإداري، وترتبط بوزير البيئة والمياه والزراعة، ويكون مقرها الرئيس في محافظة الأحساء، ولها إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتولى المؤسسة إدارة نشاط الري في المملكة وتشغيله وتطويره، ولها التعاقد مع جهات متخصصة للقيام ببعض مهماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع عدم الإخلال باختصاص الجهات الأخرى، للمؤسسة في سبيل تحقيق أغراضها -دون حصر- الاختصاصات التالية: 1- إعداد السياسات العامة والخطط والبرامج؛ لتطوير نشاط الري، والمحافظة على مياه الري وترشيد استخدامها. 2- الاستفادة من المصادر المتاحة لمياه الري التقليدية وغير التقليدية. 3- إعداد برامج جدولة الري للمحاصيل الزراعية وفق المقننات المائية. 4- وضع وتنفيذ خطط الطوارئ لنشاط الري ولمواجهة نقص المياه. 5- اقتراح مشروعات الأنظمة واللوائح والمعايير المنظمة لنشاط الري - بعد عرضها على المجلس - وتطبيقها بعد اعتمادها وفقاً للإجراءات النظامية. 6- تطبيق معايير نوعية المياه المستخدمة في الري الزراعي، ومراقبة مستوى جودة مياه الري والتربة الزراعية، ودعم الإصلاح البيئي. 7- إنشاء وتشغيل وصيانة مصادر إمداد المياه للري، مثل السدود والمياه الجوفية والمصادر البديلة، بالاتفاق مع الجهات المعنية. 8- إنشاء وتشغيل وصيانة محطات الضخ، ومشاريع نقل وتخزين وتوزيع مياه الري، وأنظمة الصرف الزراعي. 9- تطوير التقنيات المعتمدة لرصد استهلاك مياه الري وضمان امتثالها لمخصصات وبرامج استخدام المياه، واتخاذ الإجراءات
    المناسبة لمعالجة حالات عدم الامتثال وفق اللوائح والإجراءات المعتمدة. 10- إجراء الدراسات والبحوث بالمشاركة مع الجامعات والمعاهد والجهات المتخصصة لتحسين أساليب الري، وتبني التقنيات الحديثة، وترشيد استخدام مياه الري. 11- تمثيل المملكة في المنظمات والمؤسسات المحلية والإقليمية والدولية ذات العلاقة بقطاع الري. 12- تقديم البرامج والدورات في مجال عملها، وتأهيل الكوادر البشرية العاملة في هذا المجال, وعقد جلسات عمل وندوات ومؤتمرات ومعارض والمشاركة فيها. 13- توفير قاعدة بيانات ومعلومات إحصائية عن نشاط الري. 14- إبرام الاتفاقيات والعقود المتعلقة بالري مع الجهات المحلية والخارجية وفق الإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمؤسسة مجلس إدارة برئاسة وزير البيئة والمياه والزراعة وعضوية كل من: 1- ممثل من وزارة الداخلية. 2- ممثل من وزارة الاقتصاد والتخطيط. 3- ممثل من وزارة المالية. 4- ممثل من وزارة البيئة والمياه والزراعة. 5- ممثل من صندوق التنمية الزراعية. 6- اثنان من ذوي الاختصاص. ويحدد رئيس المجلس من ينوب عنه من الأعضاء ممثلي الأجهزة الحكومية لرئاسة المجلس، ويجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة)، أو ما يعادلها، وتحدد مكافآت الأعضاء بقرار من مجلس الوزراء. ويصدر قرار من مجلس الوزراء بتعيين العضوين المشار إليهما في الفقرة (6) بناء على ترشيح من رئيس المجلس, وتكون عضويتهما لمدة (ثلاث) سنوات قابلة للتجديد لمرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على شؤون المؤسسة, ويشرف على إدارتها وتصريف شؤونها, ويتخذ جميع القرارات اللازمة لتحقيق أغراضها في حدود أحكام التنظيم، وله على وجه خاص ما يأتي: 1- إقرار السياسات العامة للمؤسسة واستراتيجياتها وبرامجها وخططها التشغيلية في إطار الخطط العامة للدولة. 2- إقرار هيكل المؤسسة التنظيمي وفقاً للإجراءات النظامية المتبعة. 3- اقتراح مشروعات الأنظمة واللوائح والمعايير المنظمة لنشاط الري، وتطبيقها بعد اعتمادها وفقاً للإجراءات النظامية. 4- إقرار اللوائح المالية التي تسير عليها المؤسسة بعد الاتفاق مع وزارة المالية، وغيرها من اللوائح الداخلية اللازمة لتسيير شؤونها. 5- تحديد المقابل المالي للخدمات والأعمال والتراخيص التي تقدمها المؤسسة. 6- الموافقة على مشروع ميزانية المؤسسة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيدا لرفعها بحسب الإجراءات النظامية المتبعة. 7- تعيين نائب (أو أكثر) لرئيس المؤسسة بناءً على ترشيحه له. 8- إقرار سياسات الاستثمار بالمؤسسة بما يحقق أهدافها وفقاً للأنظمة والتعليمات المتبعة. 9- قبول الوصايا والهبات والتبرعات والأوقاف والمنح
    التي تقدم إلى المؤسسة, وفقاً للأحكام المنظمة لذلك. 10- الموافقة على إبرام الاتفاقيات والعقود بحسب الإجراءات النظامية المتبعة. 11- اعتماد مكافآت ومزايا من تستعين بهم المؤسسة من الخبراء والمختصين ذوي الكفايات المطلوبة. 12- تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. 13- تعيين أمين عام للمجلس. وللمجلس تشكيل لجان دائمة أو مؤقتة، من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويُحدَد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. ويجوز للمجلس تفويض بعض صلاحياته إلى من يراه من المسؤولين في المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- تعقد اجتماعات المجلس في مقر المؤسسة، ويجوز - عند الاقتضاء- بطلب من رئيس المجلس عقدها في مكان آخر داخل المملكة. 2- يجتمع المجلس بناء على دعوة من رئيسه، على ألا تقل اجتماعاته عن اجتماعين خلال العام. ولا يكون اجتماع المجلس نظاميًا إلا بحضور أغلبية أعضائه، على أن يكون من بينهم الرئيس أو من ينيبه، وتصدر القرارات بموافقة أغلبية الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. ولرئيس المجلس دعوة من يراه لحضور جلسات المجلس لتقديم معلومات أو آراء أو إيضاحات دون أن يكون له حق التصويت. 3- لا يجوز للعضو أن يمتنع عن التصويت أو أن يفوض آخر للتصويت نيابة عنه عند غيابه. 4- تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. 5- لا يجوز للعضو أن يفشـي شيئاً مما اطلع عليه من أسرار المؤسسة بسبب عضويته في المجلس. 6- يعد أمين عام المجلس جداول الأعمال ومحاضر الاجتماعات، ويرسل الدعوات للاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمؤسسة رئيس يعين بقرار من المجلس، ويحدد القرار أجره ومزاياه، ويكون المسؤول التنفيذي عن إدارة المؤسسة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويتولى مباشرة الاختصاصات الآتية: 1- اقتراح السياسات العامة للمؤسسة المتعلقة بأنشطتها، والخطط والبرامج اللازمة لتنفيذ ذلك، ورفعها إلى المجلس. 2- الإشراف على سير العمل في المؤسسة من خلال اللوائح والخطط والبرامج المعتمدة. 3- اقتراح هيكل المؤسسة التنظيمي، واللوائح المالية التي تسير عليها المؤسسة وغيرها من اللوائح الداخلية اللازمة لتسيير شؤونها. 4- تنفيذ القرارات التي يصدرها المجلس. 5- الإشراف على إعداد مشروع ميزانية المؤسسة السنوية ومشروع حسابها الختامي والتقرير السنوي ورفعها إلى المجلس. 6- تعيين العاملين في المؤسسة وفقاً للصلاحيات الممنوحة له، والإشراف عليهم. 7- الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المعتمدة والصلاحيات التي فوضها إليه المجلس. 8- إعداد التقارير الخاصة بتنفيذ خطط المؤسسة وبرامجها ومنجزاتها، وعرضها على المجلس. 9- التوقيع على الاتفاقيات والعقود بعد
    موافقة المجلس. 10- التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفقاً للأنظمة والصلاحيات التي فوضها إليه المجلس. 11- تنظيم مشاركة المؤسسة في المؤتمرات والفعاليات والمهرجانات والمعارض الإقليمية والدولية وفقاً للإجراءات النظامية. 12- إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناء عليه والقواعد والإجراءات المعتمدة، بحسب الصلاحيات المخولة له. 13- تمثيل المؤسسة في صلتها بالغير وأمام القضاء، والنيابة عنها في حدود الصلاحيات الممنوحة له. 14- أي اختصاص آخر يسنده إليه المجلس. وللرئيس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد المؤسسة المالية مما يأتي: 1- ما يخصص لها في الميزانية العامة للدولة. 2- المقابل المالي الذي تستوفيه نظير الخدمات والأعمال والتراخيص التي تقدمها. 3- عوائد استثماراتها. 4- ما يقبله المجلس من وصايا وهبات وتبرعات وأوقاف ومنح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تودع أموال المؤسسة في حساب خاص لدى مؤسسة النقد العربي السعودي ولها - بموافقة وزارة المالية- فتح حسابات في البنوك المرخص لها في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 1- تكون للمؤسسة ميزانية سنوية مستقلة. 2- السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تطبق أحكام نظام العمل، ونظام التأمينات الاجتماعية على منسوبي المؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع المؤسسة إلى رئيس مجلس الوزراء - خلال تسعين يوماً من انتهاء السنة المالية- تقريراً سنوياً عمَّا حققته من إنجازات خلال السنة المنقضية وما واجهتها من صعوبات وما تراه من مقترحات لتحسين سير العمل بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع المؤسسة إلى مجلس الوزراء حسابها الختامي خلال تسعين يوماً من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المؤسسة، يُعين المجلس مراجع حسابات خارجياً (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابه. ويُرفع تقرير مراقب الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يلغي هذا التنظيم قرار مجلس الوزراء رقم (28) وتاريخ 12 - 13 / 1 / 1392 هـ، وكل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يُعمل بالتنظيم بعد مضي (ستين) يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7912ce55-36b8-4db2-8e59-a9eb016d382f/1
  verified: false
