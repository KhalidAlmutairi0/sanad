- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: النظام: نظام البيئة. اللوائح: اللوائح التنفيذية للنظام. الوزارة: وزارة البيئة والمياه والزراعة. الوزير: وزير البيئة والمياه والزراعة. الجهة المختصة: الوزارة، أو أي من المراكز الوطنية لقطاع البيئة، كل بحسب اختصاصه، ووفقاً لما تحدده اللوائح. الجهة المشرفة: أي جهة حكومية مُخوَّلة نظاماً بالإشراف على قطاع تنموي، وتختص بإصدار تراخيص لممارسة الأنشطة التي تخضع لإشرافها. الشخص: أي شخص ذي صفة طبيعية أو اعتبارية عامة أو خاصة. التصريح: وثيقة تمنحها الجهة المختصة للشخص قبل البدء بممارسته أي نشاط له أثر بيئي. الترخيص: وثيقة تمنحها الجهة المختصة للشخص للإذن له بممارسة نشاط بيئي. المصرح له: شخص حاصل على التصريح. المرخص له: شخص حاصل على الترخيص. نشاط بيئي: أي نشاط تشغيلي أو فني له علاقة بقطاع البيئة. الأثر البيئي: كل تغيير سلبي أو إيجابي يؤثر في البيئة نتيجة ممارسة أي نشاط. البيئة / الأوساط البيئية: كل ما يحيط بالإنسان أو الحيوان أو النبات أو أي كائن حي؛ من ماء وهواء ويابسة
    وتربة وأحياء وتنوع أحيائي وغازات في الغلاف الجوي ومسطحات مائية، وما تحتويه هذه الأوساط من جماد وأشكال مختلفة من طاقة وموائل بيئية وعمليات طبيعية وتفاعلها فيما بينها. قطاع البيئة: يشمل الأوساط البيئية والأنشطة والبرامج المتعلقة بها، والتي تهدف إلى ضمان حماية البيئة وسلامتها، وتنمية الأوساط البيئية لضمان استدامتها وحمايتها من أي مصدر للتلوث. الاعتبارات البيئية: كل ما يجب أخذه في الحسبان -عند تخطيط أي مشروع- من أنظمة وقرارات واستراتيجيات وبرامج بيئية. المبادئ البيئية: مبادئ متعارف عليها في المنظمات الدولية والاتفاقيات ذات الصلة بالبيئة، وتهدف إلى حماية البيئة. الموارد الطبيعية: جميع المواد الحية وغير الحية -الموجودة في الطبيعة- ومنتجاتها، التي يستغلها أو يستثمرها الإنسان بشكل مباشر، كالهواء والمياه والأراضي والتربة والتنوع الأحيائي والتكوينات الجيولوجية ذات القيمة البيئية. التنوع الأحيائي: التعدد في أنواع الكائنات النباتية أو الحيوانية أو المجهرية وعددها، والتباين بين هذه الأنواع. الكائنات الفطرية: أي كائن حي أو ميت، وينتمي علميًّا إلى المجموعات الحيوانية أو النباتية، ولا يدخل في ذلك الإنسان
    والكائنات المدجنة والأليفة. الموائل: مواقع تعيش أو تنمو أو تتكاثر فيها الكائنات الفطرية بشكل طبيعي ومترابط ومتكامل مع الظروف المحيطة. الحياة الفطرية: الكائنات الفطرية النباتية والحيوانية وموائلها. المناطق المحمية: مواقع برية أو بحرية أو ساحلية تحددها الجهة المختصة، ومخصصة لحماية الكائنات الفطرية وتنميتها. مشتق: كل ما يستخرج من الكائنات الفطرية سواء بشكل طبيعي أو غير طبيعي. منتج: أي جزء من أي كائن فطري، سواء أكان مصنّعًا جزئيًّا أم كليًّا أو غير مصنّع. وسائل المكافحة الحيوية: استخدام النظم الحيوية أو الكائنات الحية أو مشتقاتها للحد من الآفات وأمراض النباتات، وضبطها، ومكافحتها. الغطاء النباتي: النباتات الطبيعية سواء أكانت أعشابًا أم شجيرات أم أشجارًا. أراضي الغطاء النباتي: جميع الأراضي المملوكة للدولة التي تحتوي على نباتات برية وما في حكمها. وتشمل: المراعي، والغابات، والمنتزهات الوطنية والبرية والجيولوجية، والمناطق الرطبة، والمناطق السهلية، والمناطق الرملية (الكثبان)، والمناطق الجبلية، والوديان، والمناطق الساحلية، والجزر. الغابات: تجمع نباتي يتكون من نوع أو عدة أنواع من الأشجار أو الشجيرات
    أو النباتات العشبية في حالة نقية، أو مختلطة بكثافة شجرية لا تقل عن (10%) من مساحة الموقع، سواء أكان هذا التجمع طبيعيًّا أم مستزرعًا. المراعي: الأراضي المغطاة -كليًّا أو جزئيًّا- بنباتات محلية أو غير محلية نامية نمواً طبيعيًّا، وتتفاوت في صلاحيتها للرعي وتغذية الحيوانات، سواء أكانت أعشابًا أم شجيرات أم أشجارًا، ويدخل ضمنها: المراعي التي تدهورت وأعيد استزراعها بنباتات رعوية، وتكون على أراضٍ غير مستغلة في الزراعة والسكن والمنافع العامة. الأشجار: أي شجرة لها جذع خشبي أو هوائي، وترتفع عن سطح الأرض (1.5) مترًا ونصف المتر فأكثر، سواء أكانت نامية نموًّا طبيعيًّا أم مستزرعة. الشجيرات: أي نبتة طبيعية أو مستزرعة نامية، ويبلغ ارتفاعها من نصف متر إلى أقل من (1.5) متر ونصف المتر. المنتزهات الوطنية والبرية والجيولوجية: مواقع ضمن أراضي الغطاء النباتي ذات خصائص بيئية أو جيولوجية فريدة جرى تطويرها للمحافظة عليها وتشجيع السياحة البيئية فيها. البيئة البحرية والساحلية: المناطق البحرية والمناطق الساحلية والجزر أو أي مكون من مكوناتها الطبيعية، سواء أكانت أشجارًا أم شجيرات أم نباتات أم أعشابًا أم طحالب أم شعبًا
    مرجانية أم أحياء بحرية أو مجهرية، ونحوها. الموارد المائية: المياه السطحية والجوفية المتجددة وغير المتجددة، وتشمل: مياه الآبار، والعيون، والينابيع، والسدود، ومياه الأمطار. المسطحات المائية: تراكم للماء على سطح الأرض أو في جوفها، وتشمل المحيطات والبحار والبحيرات والبرك والأراضي الرطبة والمكونات الجغرافية الأخرى التي تنتقل فيها المياه من مكان إلى آخر. حماية البيئة: المحافظة على البيئة، وتشمل: منع التلوث، والتخفيف من حدته، والحد من تدهور البيئة، وضمان تحقيق التنمية المستدامة؛ وذلك من خلال الالتزام بالمقاييس والمعايير والإجراءات الوقائية أو العلاجية المتعلقة بالبيئة وفقاً لأحكام النظام واللوائح. جودة الهواء: الخصائص التي تتميز بها حالة الهواء والتي تُقوَّم استناداً إلى المقاييس والمعايير التي تضعها الجهة المختصة لحماية البيئة وصحة الإنسان. تلوث البيئة: وجود مادة أو أكثر من المواد أو العوامل بكميات أو صفات معينة لمدة زمنية؛ تؤدي بطريق مباشر أو غير مباشر إلى الإضرار بالبيئة. المكونات السائلة: أي مادة سائلة أو زيتية تسبب تلوثًا للأوساط البيئية. الملوثات: أي مادة صلبة أو سائلة أو غازية أو أدخنة
    أو أبخرة أو انبعاثات أو ضوضاء أو إضاءة أو أي مؤثر آخر طبيعي أو بشري يؤدي بطريق مباشر أو غير مباشر إلى تلوث البيئة أو تدهورها. الانبعاثات: انطلاق غازات أو جسيمات عالقة إلى الهواء من مصدر محدد. المقاييس البيئية: حدود أو نسب تركيز الملوثات أو الانبعاثات التي لا يسمح بتجاوزها؛ لضمان مستوى جودة الأوساط البيئية. النفايات الخطرة: مُخلفات تشكل ضرراً على البيئة ومكوناتها وصحة الإنسان، وتحتفظ بخواص خطرة أو معدية، مثل: السُمية العالية أو القابلة للانفجار أو التفاعل، والتي ليس لها استخدام ما لم تعالج وفقاً لاشتراطات خاصة. الإضرار بالبيئة: تأثير سلبي في البيئة، يقلل من قيمتها البيئية أو الاقتصادية، أو يؤثر في إمكان الاستفادة منها أو يغير من طبيعتها، أو يؤدي إلى اختلال التوازن الطبيعي بين عناصرها سواء بشكل مباشر أو غير مباشر. التدهور البيئي: إضرار شديد بالأوساط البيئية بسبب استنزاف الموارد الطبيعية، أو تدمير الموائل البيئية، أو انقراض الحياة الفطرية، أو تلوث الأوساط البيئية وتدني مستوى جودة الهواء والمياه والتربة. الكارثة البيئية: أي حالة أو حادث ناتج من فعل طبيعي أو بشري ويترتب عليه تهديد الموائل
    البيئية أو الإضرار بالبيئة، وتتطلب مواجهته إمكانات وإجراءات أكبر من تلك التي تتطلبها الحوادث العادية أو تستوعبها القدرات المحلية، بما يستدعي تدخّل الجهات المعنية وتعاونها. المواد المستنفدة لطبقة الأوزون: مواد تتميز بثباتها الكيميائي في طبقة الغلاف الجوي القريب من سطح الأرض وتحتوي على ذرة أو أكثر من الكلور أو البروم أو كليهما معاً، وتبدأ في تفاعلات تؤدي إلى تفاعلات متسلسلة في طبقة (الستراتوسفير) الجوي تؤدي إلى نفاد الأوزون. مياه الصرف: مياه أدى استخدامها إلى تغير لونها أو طعمها أو رائحتها أو مستوى أمنها الصحي أو البيئي، وتشمل المياه المستخدمة لأغراض صحية أو صناعية أو زراعية. مياه الصرف المعالجة: مياه خارجة من محطة معالجة مياه الصرف بعد معالجتها طبقاً لمقاييس ومعايير محددة. حقن المياه: ضخ مياه الصرف المعالجة إلى الطبقات الجوفية. دراسة التدقيق البيئي: دراسة تشمل نتائج فحص موضوعي ومنظم ودوري وموثق للعمليات التشغيلية لمنشأة معينة، تُعد بعد إنشاء أو خلال تشغيل المنشأة؛ من أجل التحقق من استيفائها الاشتراطات والضوابط والمقاييس والمعايير البيئية وتحسين الأداء البيئي للمنشأة، والتزامها بالأحكام
    الواردة في النظام واللوائح والترخيص والتصريح. دراسة التقييم البيئي الاستراتيجي: دراسة لتحديد وتقدير وتقييم التأثيرات البيئية التي قد تنتج من السياسات والاستراتيجيات والخطط والبرامج على مستوى القطاعات والمناطق التي تقترح الجهات الحكومية تخصيصها لقطاع تنموي أو بشري؛ لتضمين جميع الاعتبارات البيئية وإدراجها بالتوازي مع الاعتبارات الاقتصادية والاجتماعية. دراسة تقييم الأثر البيئي: دراسة لتحديد وتقدير وتقييم التأثيرات البيئية التي قد تنتج من إنشاء أي مشروع أو نشاط، أو تشغيله، أو تعديله، أو إزالته؛ لتضمين جميع الاعتبارات البيئية وإدراجها بالتوازي مع الاعتبارات الاقتصادية والاجتماعية والأمنية، وتحديد البدائل والإجراءات اللازمة لحماية البيئة. التعويضات: ما يدفعه المتسبب بالإضرار أو التلوث أو التدهور البيئي؛ لجبر الضرر المترتب جراء ذلك الإضرار أو التلوث أو التدهور البيئي أو إزالته. وتشمل تكاليف إعادة التأهيل التي يدفعها حال تعذر قيامه بإعادة التأهيل. إعادة التأهيل: كل إجراء على موقع متدهور بيئيَّا، أو ألحق به ضرر بيئي أو تلوّث؛ لإعادته إلى حالته الطبيعية من التوازن البيئي، وفقاً للمعايير التي تحددها
    الجهة المختصة. السياحة البيئية: النشاط السياحي الصديق للبيئة الذي يمارسه الإنسان، محافظاً على الميراث الفطري الطبيعي والحضاري للبيئية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف النظام إلى حماية البيئة وتنميتها واستدامتها، والالتزام بالمبادئ البيئية، وتنظيم قطاع البيئة والأنشطة والخدمات المتعلقة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لا يجوز لأي شخص ممارسة أي من الأنشطة البيئية أو التي لها أثر بيئي؛ إلا بعد الحصول على تصريح أو ترخيص؛ وذلك وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: على كل من المصرح له والمرخص له؛ الالتزام بأحكام النظام، واللوائح، وشروط التصريح أو الترخيص، والتعليمات والقرارات -ذات العلاقة- التي تصدرها الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تضع الجهة المختصة ضوابط تنفيذ البرامج والخطط والمبادرات التطوعية المتعلقة بالبيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يُحظر القيام بكل ما من شأنه تلويث الأوساط البيئية والموارد المائية، أو الإضرار بهما، أو التأثير سلباً في الانتفاع بهما؛ وذلك وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يُحظر استغلال أو نقل أو تخزين أو بيع أو الترويج لأيّ من الموارد الطبيعية ومنتجاتها الموجودة في إقليم المملكة الذي يشمل أراضيها -بما في ذلك الجزر- ومجالها الجوي، والمياه الداخلية والبحر الإقليمي وقاعهما وباطن أرضهما والحيز الجوي فوقهما، وجميع المناطق البحرية الأخرى التي تمارس عليها المملكة حقوق السيادة أو حقوق الولاية طبقاً للقانون الدولي؛ دون الحصول على تصريح أو ترخيص؛ وذلك وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'على كل من المصرح له والمرخص له الذي يمارس أنشطة قد يصدر منها انبعاثات أو ملوثات، أو التي قد تؤثر في الأوساط البيئية؛ الالتزام بالآتي: الاشتراطات والضوابط والإجراءات والمقاييس والمعايير البيئية؛ التي تحددها اللوائح. اتخاذ الإجراءات والتدابير اللازمة عند الاقتراب من تجاوز المقاييس البيئية؛ وفقاً لما تحدده اللوائح. وضع برامج وأجهزة للرصد والقياس والرقابة على جودة الأوساط البيئية، وفقاً لما تحدده اللوائح. تزويد الجهة المختصة -بصفة دورية- بالبيانات والتقارير المتعلقة بالانبعاثات أو الملوثات الصادرة عن أنشطته؛ لمراجعتها ومطابقتها، وتحديد تجاوزات المقاييس والمعايير والاشتراطات، وذلك وفقاً لما تحدده اللوائح. تزويد الجهة المختصة بدراسة التدقيق البيئي، وفقاً لما تحدده اللوائح. إعادة تأهيل الأوساط البيئية المتدهورة جراء ممارسته لأنشطته، وفقاً لما تحدده اللوائح. وتحدد الجهة المختصة الأنشطة المشار إليها في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: على كل من يمارس أي نشاط يستخدم فيه مواد لها تأثير سلبي في جودة الهواء، أو مواد مستنفدة لطبقة الأوزون؛ اتخاذ ما يلزم من إجراءات لتنفيذ الخطط -التي تعدها الجهة المختصة- المتعلقة بالتخلص التدريجي من تلك المواد؛ وذلك وفقاً لما تحدده اللوائح. تحدد الجهة المختصة المواد التي لها تأثير سلبي في جودة الهواء، وكذلك المواد المستنفدة لطبقة الأوزون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يُحظر استيراد أو تصدير أو إعادة تصدير أو تداول أو تصنيع أو استخدام المواد المستنفدة لطبقة الأوزون -التي تحددها الجهة المختصة-؛ دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تحدده اللوائح. يُحظر استيراد أو تصدير أو إعادة تصدير أو تصنيع أو استخدام الأجهزة والمعدات والمنتجات -الجديدة أو المعاد تدويرها- والتي تحتوي على أي من المواد المشار إليها في الفقرة (1) من هذه المادة؛ دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تبينه اللوائح. يكون التخلص من المواد والأجهزة والمعدات والمنتجات المشار إليها في الفقرتين (1) و(2) من هذه المادة؛ وفقاً لما تبينه اللوائح. يُحظر استيراد الأجهزة والمعدات والمنتجات -المستعملة- التي تحتوي على أي من المواد المشار إليها في الفقرة (1) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يُحظر إلقاء مياه الصرف أو أي من المكونات السائلة -المعالجة- أو تصريفها أو حقنها؛ في الآبار الجوفية أو أي وسط بيئي، دون الحصول على تصريح، وذلك وفقاً لما تبينه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا يجوز تملك أراضي الغابات والمراعي والمنتزهات الوطنية والبرية والجيولوجية، بأي وجه من أوجه التصرف الناقل للملكية. لا يجوز التعدي -سواء أكان بالتوسع أم بالإحداث- على أراضي الغابات والمراعي والمنتزهات الوطنية والبرية والجيولوجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تنشأ -بقرار من الوزير- المنتزهات الوطنية والبرية والجيولوجية على أرض غير مملوكة ملكية خاصة وليس لأحد عليها حق اختصاص أو حجز أو امتياز. وفي حالة وجود أي من ذلك، تُعدل خارطة المنتزه المقترح، أو يُختار بديل عنه، ما لم يتنازل صاحب الحق عن حقه؛ وذلك وفقاً لما تبينه اللوائح. للجهة المختصة -وفق ضوابط تحددها اللوائح- استثمار المنتزهات الوطنية والبرية والجيولوجية، وتنظيم الاستثمار فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: على أي شخص قبل القيام بنهل أو استغلال الرمل أو الحصى أو الصخور أو الطين؛ الحصول على تصريح، وذلك وفقاً لما تُبيّنه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: دون إخلال بما ورد في المادة (الرابعة عشرة) من النظام، يشترط لاستصلاح الأرض الزراعية وأراضي الغطاء النباتي وتسويتها؛ الحصول على ترخيص وفقاً لما تُبيّنه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تُحظر ممارسة أي نشاط أو عمل داخل أراضي الغطاء النباتي؛ دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تبينه اللوائح. تُحظر ممارسة أي نشاط أو عمل في الأراضي التي تقع ضمن النطاق الحضري العمراني وتحتوي على غطاء نباتي تشرف عليه الجهة المختصة؛ دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تُبيّنه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على كل من المرخص له والمصرح له -عند استخدامه أراضي الغطاء النباتي في تنفيذ أنشطته- الأخذ بالاعتبارات البيئية، والالتزام بالاستخدام الرشيد للتربة؛ وذلك وفقاً لما تُبيّنه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يُحظر الاستزراع أو التشجير داخل أراضي الغطاء النباتي؛ دون الحصول على ترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'مع مراعاة ما ورد في المادة (الثامنة عشرة) من النظام؛ يُحظر كل ما من شأنه الإضرار بأراضي الغطاء النباتي، أو الإخلال بالتوازن الطبيعي فيها، وعلى وجه خاص ما يأتي: قطع الأشجار أو الشجيرات أو الأعشاب أو النباتات، أو اقتلاعها أو نقلها أو تجريدها من لحائها أو أوراقها أو أي جزء منها، أو نقل تربتها أو جرفها، أو الاتجار بها. ترك النفايات داخلها، أو دفنها، أو حرقها، أو رميها في غير الأماكن المخصصة لها التي تحددها الجهة المختصة. إشعال النار داخلها في غير الأماكن المخصصة لذلك التي تحددها الجهة المختصة. إتلاف منشآتها الثابتة أو المنقولة، أو قطع السياجات التي تضعها الجهة المختصة داخلها أو إتلافها، أو العبث في علاماتها الحدودية أو الإرشادية. الرعي في المواقع والمدد المحظورة من الجهة المختصة. إطلاق فيها أي من أنواع الكائنات الفطرية الحيوانية الدخيلة على البيئة أو الغازية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يُحظر إنتاج الحطب أو الفحم المحلي، أو نقل أي منها، أو تخزينه، أو بيعه، أو الترويج له؛ دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'يُحظر القيام بكل ما من شأنه الإضرار بالبيئة البحرية والساحلية ومكوناتها الحية وغير الحية. ويشمل ذلك: أعمال الحفر، والردم، والتجريف، والإنشاء، والتنقيب، والاستكشاف، والاستغلال؛ وإجراء الأبحاث؛ دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تُبيّنه اللوائح. يُحظر استخدام أي مادة أو أداة تضر بيئيًّا بالبيئة البحرية والساحلية، أو إدخالها إليها أو إخراجها منها؛ دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تُبيّنه اللوائح. تحدد الجهة المختصة قائمة بالمواد والأدوات المشار إليها في الفقرة (2) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: على مُشغِّل وسائط النقل البحري أن يحتفظ بسجل خاص يُدوّن فيه الإجراءات والتدابير الوقائية وخطة الطوارئ المتعلقة بمنع التلوث؛ وذلك وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تُحدد الجهة المختصة أنواع الكائنات الفطرية المهددة بالانقراض التي يُحظر قتلها أو صيدها، أو الاتجار بها أو مشتقاتها أو منتجاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'يُحظر -دون الحصول على ترخيص فيما يتعلق بأنواع الكائنات الفطرية التي تحددها الجهة المختصة- القيام بأي مما يأتي: أ- الاتجار بأي منها أو منتجاتها أو مشتقاتها، سواء كان الاتجار محليًّا أو بالاستيراد أو التصدير. ب- العبور البري أو الجوي أو البحري بأي منها أو منتجاتها أو مشتقاتها. ج- نقل أي منها أو منتجاتها أو مشتقاتها داخل المملكة. د- استخراج أي منها أو منتجاتها أو مشتقاتها من البيئة البحرية والساحلية، أو إدخالها إليها. هـ- بيع أي منها أو عرضه بغرض البيع أو منتجاتها أو مشتقاتها باستخدام أي وسيلة. و- حيازة أي منها أو منتجاتها أو مشتقاتها، أو إيواؤه، أو استزراعه. يُحظر -دون الحصول على ترخيص فيما يتعلق بأنواع الكائنات الفطرية الحيوانية الحية التي تحددها الجهة المختصة- القيام بأي مما يأتي: أ- وضع أي منها في مكان مُتحكَّم فيه بشكل كلي أو جزئي. ب- استخدام أي منها في تقديم العروض والفعاليات. تحدد اللوائح الضوابط اللازمة لما ورد في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: مع مراعاة ما ورد في الفقرة (1) من المادة (الرابعة والعشرين) من النظام، يُحظر استيراد أو تصدير أو إعادة تصدير -للأغراض غير التجارية- أي من أنواع الكائنات الفطرية أو منتجاتها أو مشتقاتها التي تحددها الجهة المختصة؛ دون الحصول على موافقة الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يُحظر قتل الكائنات الفطرية الحيوانية الحية أو إيذاؤها. واستثناء من ذلك، يجوز في حالات محددة قتل تلك الكائنات، وذلك وفقاً لما تُبيّنه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 'يُحظر صيد الكائنات الفطرية الحيوانية الحية. واستثناء من ذلك، يجوز صيد أنواع محددة منها بعد الحصول على ترخيص، مع مراعاة الآتي: أن يُقصر الصيد على الأنواع التي تحددها الجهة المختصة. أن يكون الصيد في الأماكن والأوقات التي تحددها الجهة المختصة. عدم استخدام وسائل جذب الحيوانات والطيور أو الوسائل التي تؤدي إلى اصطياد أكثر من حيوان أو طير دفعة واحدة. وتحدد اللوائح الضوابط اللازمة لذلك، بما فيها وسائل الصيد المسموح باستخدامها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يُحظر إدخال أي من وسائل المكافحة الحيوية إلى المملكة، أو استخدام أي منها؛ دون الحصول على ترخيص، وذلك وفقاً لما تُبيّنه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تنشأ المناطق المحمية -بقرار من مجلس الوزراء بناءً على اقتراح الجهة المختصة- على أرض غير مملوكة ملكية خاصة وليس لأحد عليها حق اختصاص أو امتياز أو حجز، وفي حالة وجود أي من ذلك، تُعدل خارطة المنطقة المحمية، أو يختار بديل عنها، ما لم يتنازل صاحب الحق عن حقه؛ وذلك وفقاً لما تُبيّنه اللوائح. للجهة المختصة -وفق ضوابط تحددها اللوائح- استثمار المناطق المحمية، وتنظيم الاستثمار فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: تُحظر ممارسة أي نشاط داخل حدود المناطق المحمية، دون الحصول على تصريح أو ترخيص، وذلك وفقاً لما تُبيّنه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: تضع الجهة المختصة ضوابط دخول المناطق المحمية -بالتنسيق مع وزارة الداخلية- والانتفاع بها بالرعي أو السياحة البيئية أو إجراء البحوث، ونحوها؛ وذلك بحسب طبيعة كل منطقة محمية، وبما يحقق أهداف النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'يُحظر كل ما من شأنه الإضرار بالمناطق المحمية أو الإخلال بالتوازن الطبيعي فيها، وعلى وجه خاص ما يأتي: الإضرار بمكوناتها الحية وغير الحية. قطع الأشجار أو الشجيرات أو الأعشاب أو النباتات، أو اقتلاعها أو نقلها أو تجريدها من لحائها أو أوراقها أو أي جزء منها، أو نقل تربتها أو جرفها، أو الاتجار بها. إشعال النار في غير الأماكن المخصصة لذلك التي تحددها الجهة المختصة. ترك النفايات فيها، أو دفنها، أو حرقها، أو رميها في غير الأماكن المخصصة لها التي تحددها الجهة المختصة. الرعي أو الزراعة في غير المواقع والمدد التي تحددها الجهة المختصة. إطلاق فيها أو في المواقع المحيطة بها؛ أي من أنواع الكائنات الفطرية الدخيلة أو الغازية، أو استزراعها. إتلاف منشآتها الثابتة أو المنقولة، أو قطع السياجات التي تضعها الجهة المختصة داخلها وحولها أو إتلافها، أو العبث في علاماتها الحدودية أو الإرشادية. سير المركبات -وما في حكمها- في غير المسارات المخصصة لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يُعفى العاملون في الجهة المختصة من المسؤولية عن أيّ ضرر بيئي، نتيجة خطأ غير متعمد وغير ناتج عن إهمال، خلال عمليات إزالة تلوث ناتج عن الطوارئ والكوارث البيئية. لا يخل الإعفاء الوارد في الفقرة (1) من هذه المادة بحق المتضرر في التعويض عن المسؤولية المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: للوزير اتخاذ ما يلزم من إجراءات وتدابير للاستجابة لأي حالة بيئية طارئة، أو كارثة بيئية، أو خطر وشيك يتعلق بالبيئة، وكذلك اتخاذ ما يلزم من إجراءات وتدابير لمنع تفاقم أي من ذلك؛ وذلك بالتنسيق مع الجهات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 'يعد من المخالفات لأحكام النظام القيام بأي من الأفعال الآتية: إلقاء مياه الصرف أو أي مكونات سائلة -غير معالجة- أو تصريفها، أو حقنها؛ في الآبار الجوفية، أو في أي وسط بيئي، أو في أي منطقة من مناطق المنكشفات الصخرية للطبقات المائية؛ لأي سبب كان. إلقاء أو تصريف وسائط النقل البحري لأي من الملوثات الناتجة من مياه التوازن، وبقايا الحمولة، والنفايات، والمكونات السائلة، وانحلال المواد المانعة لالتصاق الشوائب. التخلص من النفايات الخطرة في الأوساط البيئية. الاتجار بالكائنات الفطرية المهددة بالانقراض ومشتقاتها ومنتجاتها، أو قتلها، أو صيدها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 'يتولى مفتشون -يصدر بتحديدهم قرار من الوزير أو رئيس مجلس إدارة الجهة المختصة (بحسب الأحوال)- مجتمعين أو منفردين ضبط مخالفات أحكام النظام واللوائح، والتحقيق فيها وإثباتها، وتحدد اللوائح آليات عملهم؛ وذلك دون إخلال بما ورد في الفقرة (2) من هذه المادة، والمادة (الثانية والأربعين) من النظام. على المفتش قبل دخول المنشآت بغرض تفتيشها والاطلاع على سجلاتها وبياناتها، وضبط المخالفات فيها؛ التنسيق في ذلك مع الجهة المشرفة. وتحدد اللوائح الآليات اللازمة لذلك، وتصنيف المنشآت المشمولة بهذه الفقرة. للمفتش ما يأتي: أ- سحب عينات من المواد والأصناف الموجودة لدى المنشأة المشتبه بارتكابها مخالفة لأي من أحكام النظام واللوائح، إذا لزم الأمر، على أن يحرر محضر ضبط بهذه الواقعة تدوَّن فيه جميع البيانات اللازمة للتثبت من العينات نفسها والمواد والأصناف التي أخذت منها، وكذلك الاحتفاظ بنسخة من سجلات المنشأة محل التفتيش وبياناتها؛ وذلك وفقاً لما تحدده اللوائح. ب- استعادة منتجات الغطاء النباتي أو الحياة الفطرية التي تضبط، والتعامل معها؛ وفقاً لما تحدده اللوائح، وذلك دون إخلال بتطبيق العقوبات الواردة
    في المادتين (الثامنة والثلاثين) و(الأربعين) من النظام. ج- التحفظ -على نفقة المخالف في حال ثبوت المخالفة- على المركبات والأدوات المستخدمة (أو التي يشتبه في استخدامها) في ارتكاب المخالفة، وتسليمها بوصفها مضبوطات إلى الجهة المختصة، على أن يعرض ذلك على المحكمة المختصة -خلال مدة لا تزيد على (سبعة) أيام- لتأكيد التحفظ أو إلغائه؛ وذلك وفقاً لما تحدده اللوائح. يُحظر منع المفتش أو إعاقته عن تأديته أعماله المتعلقة بالتفتيش والضبط. وعلى المفتش إبراز بطاقته الوظيفية عند مباشرة اختصاصه. دون إخلال بما ورد في الفقرة (2) من هذه المادة، للوزير أو مجلس إدارة الجهة المختصة (بحسب الأحوال) -بقرار منه- إسناد بعض مهمات التفتيش وضبط المخالفات ذات الطبيعة الإدارية، إلى شركات متخصصة؛ وذلك وفق ضوابط ومعايير تحددها اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: 'دون إخلال بما ورد في المادة (السادسة والثلاثين) من النظام، تتولى وزارة الداخلية -بالتنسيق مع الجهة المختصة- القيام بالآتي: المراقبة الأمنية لتحقيق الالتزام البيئي، واتخاذ جميع التدابير الأمنية اللازمة لمنع ارتكاب أي مخالفة لأحكام النظام. ضبط مخالفي أحكام النظام واللوائح وإحالتهم إلى الجهة المعنية؛ لاتخاذ الإجراءات النظامية المتبعة. تقديم المساندة والدعم الأمني -عند الطلب- للمفتشين المشار إليهم في المادة (السادسة والثلاثين) من النظام، وذلك فيما يتصل بأعمال التفتيش وضبط المخالفات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: 'دون إخلال بما ورد في المادتين (الأربعين) و(الثالثة والأربعين) من النظام، وأي عقوبة أشد ينص عليها نظام آخر؛ يعاقب كل من يخالف أيًّا من أحكام النظام واللوائح بواحدة أو أكثر من العقوبات الآتية: أ- غرامة لا تزيد على (20.000.000) عشرين مليون ريال. ب- تعليق الترخيص أو التصريح لمدة لا تتجاوز ستة أشهر. ج- إلغاء الترخيص أو التصريح. يُصدر الوزير -بالتنسيق مع الجهة المختصة- بقرار منه جداول تصنيف للمخالفات وتحديد للعقوبات ضمن حدها المنصوص عليه في هذه المادة؛ تراعى فيها طبيعة كل مخالفة وجسامتها، والظروف المشددة والمخففة لها. للجان -المشار إليها في الفقرة (2) من المادة (التاسعة والثلاثين) من النظام- ما يأتي: أ- فرض غرامة عن كل يوم يستمر فيه المخالف في مخالفته بعد تبليغه بقرار اللجنة، على أن يبدأ احتساب هذه الغرامة من التاريخ الذي يحدده قرار اللجنة. ب- مضاعفة العقوبة -الواردة في الفقرتين الفرعيتين (أ) و(ب) من الفقرة (1) من هذه المادة- الموقعة على المخالف في حالة تكرار المخالفة نفسها خلال سنة من تاريخ صيرورة قرار العقوبة السابقة نهائيًّا، وذلك فيما عدا ما ورد في الفقرة (2) من المادة
    (الأربعين) من النظام. ج- تضمين القرار الصادر بالعقوبة النص على نشر ملخصه على نفقة المخالف في صحيفة محلية تصدر في مكان إقامته، فإن لم يكن في مكان إقامته صحيفة ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة المرتكبة وجسامتها وتأثيرها، على أن يكون نشره بعد تحصن القرار بمضي المدة المحددة نظاماً أو كان الحكم الصادر في شأنه مكتسباً الصفة القطعية. د- الطلب من المحكمة المختصة الحكم بمصادرة المضبوطات محل المخالفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: دون إخلال بما ورد في الفقرة (2) من هذه المادة، والمادة (الحادية والأربعين) من النظام؛ تتولى الجهة المختصة إيقاع عقوبة الغرامة التي لا تزيد على (100،000) مائة ألف ريال، وفقاً لجداول تصنيف المخالفات المشار إليها في الفقرة (2) من المادة (الثامنة والثلاثين) من النظام. دون إخلال بما ورد في الفقرة (1) من هذه المادة، والمادة (الحادية والأربعين) من النظام، يتولى النظر في مخالفات أحكام النظام واللوائح، وإيقاع العقوبات المنصوص عليها في المادة (الثامنة والثلاثين) من النظام، والاعتراضات التي يقدمها ذوو الشأن على الغرامات التي توقعها الجهة المختصة وفقاً للفقرة (1) من هذه المادة؛ لجان تكوَّن كل منها بقرار من الوزير لمدة (ثلاث) سنوات قابلة للتجديد، وتُكوَّن كل منها من عدد لا يقل عن ثلاثة أعضاء. ويحدد قرار تشكيل كل لجنة من يتولى رئاستها على أن يكون من المختصين في الشريعة أو الأنظمة، وتصدر قراراتها بالأغلبية، وتكون مسببة، ويعتمد الوزير أو رئيس مجلس إدارة المركز المختص -بحسب الأحوال- قراراتها الصادرة بالغرامة التي تتجاوز (5.000.000) خمسة ملايين ريال، أو بإلغاء الترخيص أو التصريح. تُحدد
    اللوائح قواعد عمل اللجان وإجراءاتها، ومكافآت أعضائها. يجوز الاعتراض على قرارات اللجان أمام المحكمة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: 'دون إخلال بأي عقوبة أشد ينص عليها نظام آخر، يعاقب بالسجن مدة لا تزيد على عشر سنوات وبغرامة لا تزيد على (30.000.000) ثلاثين مليون ريال، أو بإحدى هاتين العقوبتين؛ كل من: يرتكب أيًّا من الأفعال الواردة في المادة (الخامسة والثلاثين) من النظام. يرتكب للمرة الثانية وما بعدها -خلال مدة سنة من ارتكابها للمرة السابقة- أي من الأفعال الآتية بالمخالفة لأحكام النظام: أ- قطع الأشجار أو الشجيرات أو الأعشاب أو النباتات، أو اقتلاعها، أو نقلها، أو تجريدها من لحائها أو أوراقها أو أي جزء منها، أو نقل تربتها أو جرفها، أو الاتجار بها. ب- قتل أي من الكائنات الفطرية الحيوانية الحية بالمخالفة لحكم المادة (السادسة والعشرين) من النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: 'دون إخلال بما ورد في المادة (الثالثة والأربعين) من النظام، تتولى المحكمة المختصة النظر في المخالفات المشار إليها في المادة (الأربعين) من النظام، وإيقاع العقوبات المنصوص عليها فيها، ويجوز لها ما يأتي: الحكم بمصادرة المضبوطات محل المخالفة. حجز السفينة التي يشتبه بمخالفتها لأحكام النظام واللوائح؛ لمدة لا تتجاوز (تسعين) يوماً، ولها كذلك الحكم بمصادرتها في حال ثبوت المخالفة. فرض غرامة عن كل يوم يستمر فيه المخالف في مخالفته بعد تبليغه بالحكم الصادر بالعقوبة، على أن يبدأ احتساب هذه الغرامة من التاريخ الذي يحدده الحكم. مضاعفة الغرامة الموقعة على المخالف في حال تكرار المخالفة نفسها خلال سنة من تاريخ اكتساب الحكم الصادر بالعقوبة الصفة النهائية. تضمين الحكم الصادر بالعقوبة النص على نشر ملخصه على نفقة المخالف في صحيفة محلية تصدر في مكان إقامته، فإن لم يكن في مكان إقامته صحيفة ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة المرتكبة وجسامتها وتأثيرها، على أن يكون النشر بعد اكتساب الحكم الصفة النهائية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: تتولى النيابة العامة -وفقاً لنظامها- التحقيق في المخالفات المشار إليها في المادة (الأربعين) من النظام؛ والادعاء أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يجب على المخالف إزالة الآثار المترتبة على المخالفة وإعادة التأهيل ودفع التعويضات، وذلك وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: للوزير أو رئيس مجلس إدارة الجهة المختصة (بحسب الأحوال) أو من يفوضانه اتخاذ إجراء احترازي -بعد التنسيق مع الجهة المشرفة- بإيقاف النشاط جزئيًّا أو كليًّا لمدة لا تزيد على (15) خمسة عشر يوماً في حال ضبط أي مخالفة تتطلب اتخاذ إجراء عاجل لتفادي وقوع كارثة بيئية، واتخاذ ما يلزم لإحالة المخالفة إلى المحكمة المختصة أو اللجنة المعنية -المنصوص عليها في الفقرة (2) من المادة (التاسعة والثلاثين) من النظام- (بحسب الأحوال) خلال (5) خمسة أيام من تاريخ الإيقاف، على أن تنظر المحكمة أو اللجنة -بحسب الأحوال- خلال مدة لا تتجاوز (10) عشرة أيام من تاريخ الإحالة في مدى الحاجة لاستمرار الإيقاف من عدمه؛ وتحدد اللوائح الإجراءات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: على صناديق الإقراض مراعاة الجوانب والاعتبارات البيئية للمشروعات التي تمولها أو تقرضها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: دون إخلال بما ورد في الفقرة (2) من هذه المادة، تُطبق أحكام النظام فيما لم يرد في شأنه نص نظامي خاص، على ألا يخل ذلك النص بالتقيد بالأحكام الأخرى الواردة في النظام. تمثل الأحكام الواردة في النظام واللوائح الحد الأدنى فيما يتعلق بتحقيق الالتزام بالضوابط والمعايير والمقاييس اللازمة لحماية البيئة واستدامتها. لا يخل تطبيق أحكام النظام بالتزامات المملكة في الاتفاقيات الدولية -ذات الصلة- التي تكون طرفاً فيها، والأنظمة والقوانين الصادرة عن مجلس التعاون لدول الخليج العربية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: 'تُحدد اللوائح ما يأتي: الضوابط والإجراءات المتعلقة بتطبيق المبادئ البيئية. الاشتراطات والضوابط والإجراءات والمقاييس والمعايير اللازمة لحماية الأوساط البيئية، وتنميتها، وإعادة تأهيلها. الاشتراطات والإجراءات اللازمة لإدارة المراعي والغابات والاستثمار فيها. الاشتراطات والضوابط والإجراءات المتعلقة بالآتي: أ- تلقي بلاغات الطوارئ والكوارث البيئية، والتعامل معها في حدود اختصاصات الجهة المعنية المقررة نظاماً. ب- الرقابة على الالتزام البيئي والتفتيش البيئي. ج- القياس والرقابة على التلوث الضوضائي. د- إدارة البيئة البحرية والساحلية فيما يتعلق بالجوانب البيئية. هـ- صيد الكائنات الفطرية الحيوانية الحية. و- دراسة التقييم البيئي الاستراتيجي. ز- دراسة تقييم الأثر البيئي. ح- دراسة التدقيق البيئي. ط- كل نوع من أنواع التصاريح والتراخيص التي يلزم الحصول عليها فيما يتعلق بقطاع البيئة، وكذلك للأنشطة التي لها أثر بيئي. ي- نشر المعلومات والبيانات البيئية. الاشتراطات والضوابط البيئية المتعلقة بحقن المياه. الضوابط والإجراءات المتعلقة بتحديد المقابل المالي لكل نوع من أنواع التصاريح والتراخيص، والخدمات
    المتعلقة بقطاع البيئة. الضوابط المتعلقة بأسس حساب التعويضات. ضوابط إعداد خطة للتأهب والاستجابة لحالات الطوارئ والكوارث البيئية، وإجراءاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يُصدر الوزير اللوائح خلال مدة لا تتجاوز (مائة وثمانين) يوماً من تاريخ نشر النظام في الجريدة الرسمية، ويعمل بها من تاريخ نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/63831ff6-63d9-4212-8b54-abf800e146bd/1
  verified: false
