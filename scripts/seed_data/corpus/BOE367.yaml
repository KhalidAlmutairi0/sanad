regulation:
  code: BOE367
  name_ar: تنظيم هيئة المدن الاقتصادية ( هيئة المدن والمناطق الاقتصادية الخاصة)
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتض السياق خلاف ذلك: التنظيم : تنظيم المدن الاقتصادية . الهيئة : هيئة المدن الاقتصادية . المجلس : مجلس إدارة الهيئة . المدن الاقتصادية (أو المدينة الاقتصادية) : المدن الاقتصادية السعودية القائمة حاليا أو التي تنشأ في المستقبل. المستثمر : كل شخص ذي صفة طبيعية ، أو اعتبارية يستثمر في المدن الاقتصادية، سواء أكان سعوديا أم أجنبيا. المطور : الشخص ذو الصفة الاعتبارية الذي يوكل إليه - بموجب اتفاقية خاصة تبرمها الهيئة معه - تنمية وتطوير النطاق الجغرافي المخصص لإقامة المدن الاقتصادية، وذلك بتأسيس بنيتها التحتية، وإقامة المشروعات والخدمات اللازمة لذلك، سواء بنفسه أو عن طريق الغير. الأمين العام : الأمين العام لهيئة المدن الاقتصادية . المدير التنفيذي للمدينة : المدير التنفيذي للشركة المطورة للمدينة الاقتصادية . المشغل : الشخص ذو الصفة الاعتبارية الذي يوكل إليه تشغيل إحدى الخدمات، أو المرافق الخدمية في المدن الاقتصادية. المخطط العام للمدينة : مجموعة الوثائق التي تتفق عليها الهيئة والمطور،
    والتي تحدد الإطار العام لتصميم المدينة. مفهوم (60×24×7) : إنجاز كل خدمة حكومية في مدة لا تتجاوز (ستين) دقيقة على مدار (أربع وعشرين) ساعة خلال أيام الأسبوع .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1- تنشأ بموجب هذا التنظيم هيئة تسمى " هيئة المدن الاقتصادية " ترتبط بالملك، وتتمتع بالشخصية الاعتبارية، والاستقلال المالي والإداري، ويكون مقرها الرئيس مدينة الملك عبد الله الاقتصادية بمحافظة رابغ، ولها إنشاء فروع أو مكاتب داخل المملكة لأداء مهماتها. 2- تعمل الهيئة على أسس ومعايير تجارية وتتمتع بالمرونة والصلاحيات التي تمكنها من القيام بمهماتها، وذلك وفقا للوائحها الداخلية والمالية والإدارية المنصوص عليها في هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تتولى الهيئة الإشراف الكامل على المدن الاقتصادية - إداريا وماليا - من أجل تحقيق أهدافها في توطين رأس المال الوطني واستقطاب الاستثمارات الأجنبية، وأهداف خطط التنمية في المملكة، ولها على وجه خاص ما يلي: 1 - إبرام الاتفاقات ، والعقود ، ووضع الخطط والبرامج، وإجراء الدراسات اللازمة لتطوير المدن الاقتصادية، ومساندتها ومراقبة مسيرة نموها، والمحافظة على مكتسباتها.2 - مراجعة المخططات العامة للمدن الاقتصادية واعتمادها، والتأكد من حسن تطبيقها، والموافقة على أي تعديل يقترحه المطور على المخطط العام.3 - وضع الضوابط التي تحدد أفضل المواصفات، والمقاييس العالمية لجميع أعمال البنية التحتية للمدن الاقتصادية، وتحديد شروط إقامة المباني، والطرق، والموانئ والمناطق الصناعية والتجارية والسكنية وتقديم الخدمات ذات النفع العام، مراعية في ذلك شروط الأمن والسلامة، والبيئة، والصحة العامة.4 - وضع الضوابط اللازمة لإدارة المناطق الصناعية داخل المدن الاقتصادية وتشغيلها وسلامتها. 5 - إصدار التراخيص لمختلف الأنشطة التجارية، والصناعية، والخدمية، والمهنية، والتعليمية، والتدريبية، والصحية، وفقا للوائح ومعايير
    يضعها المجلس تتضمن طريقة الإشراف على تلك الأنشطة ومراقبتها.6 - تحديد المقابل المالي للتراخيص والخدمات المقدمة في المدن الاقتصادية.7 - منح حقوق الانتفاع داخل المدن الاقتصادية.8 - إنشاء الشركات أو الدخول فيها شريكًا، وذلك وفقا للإجراءات النظامية المتبعة، وبما يحقق المهمات والاختصاصات المنوطة بالهيئة.9 - متابعة تطبيق ضوابط التصميم، والبناء، والتشغيل، والصيانة.10 - وضع الضوابط والإجراءات المنظمة لعمل المدير التنفيذي للمدينة الاقتصادية ومسؤولياته.11 - الإشراف والرقابة على المطورين والمستثمرين والمشغلين والمقاولين والعاملين والمقيمين والزائرين في المدن الاقتصادية.12- القيام بأي مهمة أخرى تتفق مع طبيعة عملها أو الغرض من إنشائها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون للهيئة مجلس إدارة يؤلف من ذوي الخبرة والاختصاص برئاسة محافظ الهيئة العامة للاستثمار ، على ألا يقل عددهم عن تسعة أعضاء بمن فيهم الرئيس، ويسمى أعضاء المجلس بأمر ملكي ، تحدد فيه مكافآتهم. تكون مدة عضوية المجلس ثلاث سنوات قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'المجلس هو السلطة المسؤولة عن شؤون الهيئة، ويشرف على إدارتها وتصريف أمورها، واختيار الأسلوب الذي يراه مناسبا لتنفيذ المدن الاقتصادية وتشغيلها، دون التقيد بالقواعد المالية والإدارية المعمول بها، ويشمل ذلك الصلاحيات المتعلقة بمهمات الهيئة واختصاصاتها المنصوص عليها في هذا التنظيم، وله على وجه خاص ما يلي: 1 - وضع السياسات التي تسير عليها الهيئة لتحقيق أغراضها واعتماد البرامج اللازمة لذلك.2 - اعتماد الهيكل التنظيمي للهيئة ولوائحها الداخلية والمالية والإدارية.3 - اعتماد المقابل المالي للتراخيص والخدمات المقدمة في المدن الاقتصادية.4 - اعتماد ضوابط منح حقوق الانتفاع داخل المدن الاقتصادية.5 - اعتماد خطة العمل السنوية والخطط التشغيلية للهيئة.6 - إقرار مشروع الميزانية السنوية للهيئة وحسابها الختامي وتقرير مراقب الحسابات والتقرير السنوي تمهيدا لرفعها إلى الملك.7 - تشكيل اللجان وتخويلها الصلاحيات اللازمة لإنجاز المهمات المنوطة بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- تعقد اجتماعات المجلس في المقر الرئيس للهيئة، ويجوز عند الاقتضاء انعقادها في أي مكان آخر داخل المملكة.2 - يجتمع المجلس بدعوة من رئيسه مرة واحدة كل ثلاثة أشهر، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك نصف أعضائه على الأقل، ويجب أن توجه الدعوة - كتابة - قبل الاجتماع بسبعة أيام على الأقل على أن تتضمن جدول الأعمال.3 - تعقد اجتماعات المجلس بحضور أغلبية الأعضاء، بمن فيهم الرئيس أو من ينيبه. 4 - يكون لكل عضو من أعضاء المجلس صوت واحد، وتصدر القرارات بأغلبية أصوات أعضاء المجلس.5 - لا يجوز لأي عضو أن يفوض شخصا آخر للتصويت نيابة عنه عند غيابه.6 - تثبت مداولات المجلس في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، ويجوز للعضو الذي يعترض على أي قرار أن يثبت اعتراضه مسببا في المحاضر.7 - لا يجوز للعضو أن يفشي شيئا من أسرار تتعلق بعمل الهيئة ونشاطاتها مما اطلع عليه بسبب عضويته في المجلس.8- يجوز للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة أمين عام يعينه الملك وهو المسؤول التنفيذي عن إدارتها، وتتركز مسؤولياته في حدود ما ينص عليه هذا التنظيم وما يقرره المجلس، ويمارس بوجه خاص المهمات والصلاحيات التالية: 1 - الإشراف على الإعداد لاجتماعات المجلس.2 - متابعة تنفيذ القرارات الصادرة عن المجلس.3 - الإشراف على إعداد مشروع ميزانية الهيئة ومشروع الحساب الختامي والتقرير السنوي وعرضها على المجلس.4 - الإشراف على منسوبي الهيئة طبقا للصلاحيات الممنوحة له وما تحدده اللوائح.5 - إصدار الأوامر بمصروفات الهيئة بموجب الميزانية السنوية المعتمدة. 6 - تقديم تقارير دورية للمجلس عن أعمال الهيئة ومنجزاتها ونشاطها.7 - اقتراح خطط الهيئة وبرامجها، والإشراف على تنفيذها بعد موافقة المجلس عليها.8 - تمثيل الهيئة في صلاتها بغيرها من الجهات وأمام القضاء، وله تفويض غيره للقيام بذلك.9 - تفويض بعض هذه الصلاحيات والمهمات إلى المسؤولين في الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتألف الموارد المالية للهيئة من المصادر التالية: 1 - الأموال التي تخصصها لها الدولة. 2 - الإيرادات التي تستوفى نظير الخدمات التي تقدمها الهيئة في مجال اختصاصها.3 - ما يقبله المجلس من هبات ومساعدات وتبرعات ووصايا وأوقاف.4 - الموارد الأخرى التي يقرر المجلس إضافتها إلى أموالها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1- تحتفظ الهيئة بإيراداتها وتصرف منها مباشرة على نشاطاتها المختلفة.2 - تودع أموال الهيئة في حساب مستقل لدى مؤسسة النقد العربي السعودي، يصرف منه طبقا للوائح المالية للمؤسسة، وللهيئة فتح حسابات في البنوك المرخص لها بالعمل في المملكة.3 - تكون جميع مصروفات الهيئة - المتعلقة بتحقيق أغراضها وتقديم الخدمات العامة وأجور منسوبيها وغيرها - من مواردها المالية المنصوص عليها في المادة (الثامنة) من هذا التنظيم، ولا تتحمل الدولة أي التزام في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تنشأ في المدن الاقتصادية مراكز للخدمة الشاملة تخضع لإشراف وإدارة الهيئة، تمثل فيها الجهات الخدمية الحكومية وغير الحكومية، وتقدم من خلالها مختلف أنواع الخدمات للمطورين، والمشغلين، والمستثمرين، والعاملين، والمقيمين، بحسب احتياجاتها في المدن الاقتصادية وعلى تلك الجهات تفويض ممثليها بممارسة الصلاحيات التي تضمن سرعة تقديم الخدمات وفق ما يحدده المجلس ؛ تطبيقا لمفهوم (60×24×7).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تسوق الهيئة - محليا وعالميا - فرص الاستثمار المتاحة في المدن الاقتصادية، وأي من الفعاليات ذات العلاقة بالتسويق الاستثماري، بالتنسيق مع مطوري المدن الاقتصادية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: للمطورين - بعد استيفاء المتطلبات الواردة في هذا التنظيم ولوائحه - الحرية التامة في إدارة أعمالهم، وتنفيذ المشروعات المتفق عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تسجل العقارات بجميع أنواعها داخل المدن الاقتصادية في سجلات خاصة بالهيئة، ويشتمل كل سجل على مختلف بيانات كل عقار، ومساحته، ومالكه أو المنتفع به، والأغراض المخصصة لاستعماله. ويجوز تغيير طبيعة استعمال أي عقار بما لا يتعارض مع المخطط العام لكل مدينة اقتصادية. ويحق للهيئة استحداث أي تنظيم أو خدمة لتسجيل العقارات، والوثائق الخاصة بها، ورهنها، ومتابعتها، وغير ذلك مما تراه الهيئة مناسبا لكل مدينة، ولها في ذلك تفويض الغير - بموجب عقود تبرمها لهذا الغرض - بإدارة وتشغيل مثل هذه التنظيمات والخدمات؛ وذلك تحت إشرافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تستخرج الهيئة - لكل مالك أو منتفع بعقار سُجل في السجلات العقارية بالمدينة الاقتصادية - وثيقة رسمية معتمدة تكون بياناتها مسجلة بالكامل في سجلات كاتب العدل في الهيئة، ومعتمدة طبقا لقواعد إصدار وثائق الملكية التي تقرها الهيئة. وتلزم الهيئة كل مالك أو منتفع بعقار أو متصرف فيه داخل المدن الاقتصادية بتقديم الوثائق، والمستندات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجوز لغير السعودي من ذوي الصفة الطبيعية أو الاعتبارية تملك العقار داخل المدن الاقتصادية أو الانتفاع به، وذلك وفقا لقواعد يضعها المجلس ويعتمدها الملك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تصدر الهيئة تصاريح العمل داخل المدن الاقتصادية، على أن تعطى الأولوية للسعوديين، وذلك بالتنسيق مع وزارة العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تنشئ الهيئة - بالاتفاق مع وزارة الداخلية - إدارة أمنية داخل المدن الاقتصادية تعمل على مدار الساعة بالتنسيق والتكامل مع الأجهزة الأمنية. وعلى الإدارة الأمنية وضع خطط السير، والمراقبة المرورية، والحركة، والانتقال، بما في ذلك أعمال الإطفاء والإنقاذ وحالات الطوارئ الأخرى في المدن الاقتصادية، وذلك لتحقيق الأمن الشامل. وتزود الإدارة الأمنية بمختلف الوسائل والآليات اللازمة لأداء مهماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يلتزم المطورون والمشغلون والمستثمرون والعاملون والمقيمون والزائرون داخل المدن الاقتصادية ؛ بالتقيد بالقيم والآداب العامة المرعية في المملكة. وفي حال إخلال أي شخص بهذا الالتزام، فللهيئة اتخاذ الإجراءات النظامية اللازمة في حقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: للهيئة - بالتعاون مع مطوري المدن الاقتصادية - استحداث مناطق إيداع ومناطق إعادة التصدير وإدارتها، على أن تشمل هذه المناطق البنية التحتية اللازمة لاحتضان الأنشطة الصناعية، والتجارية، والخدمية وفقا لحاجة وخطط كل مدينة، ويضع المجلس القواعد المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يعامل المستثمرون في المدن الاقتصادية - من حيث الإعفاءات والحوافز المالية والجمركية والضريبية وغيرها - معاملة المستثمرين خارج نطاقها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: للهيئة الحق في دخول أي موقع أو مبنى داخل المدن الاقتصادية - عدا المساكن الخاصة- وذلك بالتنسيق مع المدير التنفيذي للمدينة أو من ينوب عنه، وبما لا يتعارض ومصلحة العمل في المدينة. وللهيئة في سبيل القيام بذلك طلب المستندات والمعلومات اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تضع الهيئة اللوائح، والضوابط المتعلقة بحماية البيئة - بعد التنسيق مع الرئاسة العامة للأرصاد وحماية البيئة - وذلك وفقا لأفضل المقاييس، والمعايير العالمية، ومراعاة المعمول به محليا وإقليميا، ويراعى ذلك عند إصدار التراخيص لمطوري المدن الاقتصادية ومشغليها والمستثمرين فيها وغيرهم. وعلى الهيئة متابعة الالتزام بتطبيق تلك اللوائح والضوابط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تعمل الهيئة على تطبيق الأنظمة الخاصة بحماية حقوق الملكية الفكرية داخل المدن الاقتصادية ، ومن أجل ذلك يحق للهيئة إبرام الاتفاقات اللازمة مع الأطراف ذات الاختصاص لضمان حماية تلك الحقوق، وذلك وفقا للأنظمة والاتفاقيات الدولية ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة، واستثناء من ذلك تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ هذا التنظيم وتنتهي بنهاية السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يرفع الأمين العام خلال (تسعين) يوما من بداية كل سنة مالية إلى المجلس تقريرا سنويا عما حققته الهيئة من إنجازات مقارنة بما ورد في الخطة العامة للتنمية خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لحسن سير العمل فيها ؛ تمهيدا لرفعه إلى الملك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يعين المجلس مراجع حسابات أو أكثر من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابهم. وإذا تعدد مراجعو الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة. ويرفع تقرير مراجع الحسابات إلى المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تعامل الهيئة من حيث إعفاء مستورداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن مستوردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يعمل بهذا التنظيم من تاريخ اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4100e06a-1a43-458d-a3b4-a9a700f1e3d9/1
  verified: false
