regulation:
  code: BOE338
  name_ar: لائحة حقوق والتزامات مستخدمي وسائل النقل العام
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالعبارات والكلمات الآتية -أينما وردت في هذه اللائحة- المعاني المبينة أمامها، ما لم يقتضِ السياق غير ذلك: المملكة: المملكة العربية السعودية. الهيئة: الهيئة العامة للنقل. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس الهيئة. اللائحة: لائحة حقوق والتزامات مستخدمي وسائل النقل العام، وآلياتها التفصيلية. النقل العام: نقل الركاب المنتظم المتاح للعموم بأجر بوسيلة نقل داخل مدن المملكة وبينها وإلى الدول الأخرى، ويستثنى من ذلك النقل الجوي. أنشطة النقل العام: أي نشاط من الأنشطة الآتية: - النقل البري: النقل العام للركاب بواسطة الحافلات، أو غيرها من الوسائل التي تحددها الهيئة. - النقل بالسكك الحديدية: نقل الركاب عبر خطوط السكك الحديدية؛ سواء كان ذلك داخل المدن بواسطة وسائل النقل الخفيفة (كالترام، والمترو)، أو بين المدن وعلى الخطوط الدولية بواسطة القطارات السريعة وناقلات الركاب الأوتوماتيكية. - النقل البحري: نقل الركاب داخل المياه الإقليمية للمملكة، أو منها إلى الدول الأخرى بواسطة الحافلات المائية والعبّارات وسفن الركاب. الخدمة: أي خدمة من خدمات وسائل النقل العام. مرافق النقل: المنشآت
    والمرافق والنظم والبرامج اللازمة لمزاولة أنشطة النقل العام وتقديم الخدمة، بما في ذلك محطات الوصول والانطلاق لوسائل النقل العام بجميع أشكالها. الناقل: المرخص له من الهيئة بمزاولة أنشطة النقل العام وتقديم الخدمة. وسيلة النقل: وسيلة مرخصة لتقديم الخدمة، كالمركبات والحافلات، والقطارات، والمركبات البحرية، وغيرها. الراكب: عميل متعاقد مع الناقل للحصول على الخدمة. الموظفون: أي من منسوبي الهيئة أو الناقل أو المسؤول عن مرافق النقل، أو العاملين تحت إشراف أي منهم. الغير: شخص يرتاد مرافق النقل أو وسيلة النقل من غير الركاب أو الموظفين. ذو القدرة المحدودة على الحركة: أي شخص من غير الأشخاص ذوي الإعاقة، لديه إصابة أو عارض يمنعه من المشي دون مساعدة غيره من الأشخاص الطبيعيين أو معدات التنقل. ذو الإعاقة: كل شخص لدية اضطراب أو قصور طويل الأمد في الوظائف الجسدية، أو العقلية، أو الذهنية، أو الحسية، أو النفسية، قد يمنعه من المشاركة بصورة كاملة وفاعلة في المجتمع على قدم المساواة مع الآخرين. الأجرة: مبلغ يدفع للحصول على الخدمة. معدات التنقل: أي وسيلة أو أداة مصممة خصيصاً لمساعدة الأشخاص ذوي الإعاقة أو ذوي القدرة
    المحدودة على الحركة في تنقلاتهم الشخصية؛ وتشمل الكراسي المتحركة التي تعمل بالطاقة الكهربائية أو تعمل يدوياً، وأدوات المساعدة على المشي، والعكازات، وغيرها. حيوان الخدمة: أي حيوان أليف مدرب خِصّيصاً لمرافقة الأشخاص ذوي الإعاقة وخدمتهم، يستطيع توجيه ذوي الإعاقة السمعية والبصرية أو تنبيههم، أو تحريك معدات التنقل، أو جلب ما يسقط على الأرض من أمتعة، وغير ذلك من الخدمات التي يستطيع حيوان الخدمة القيام بها. المركبات سهلة الاستخدام (أو سهلة الوصول): أي مركبة مجهزة بوسائل تسمح للأشخاص على كراسي متحركة باستخدامها وتمكنهم من التنقل على متنها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تُقدّم الخدمة لمن يطلبها دون تمييز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يجب ألا يقل عمر الراكب عن (ثلاث عشرة) سنة للحصول منفردًا على الخدمة بين المدن، وألا يقل عن (ثماني) سنوات للحصول منفردًا على الخدمة داخل المدن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: أولياء الأمور والأوصياء مسؤولون عن سلوك أبنائهم القصَّر أو من هم تحت وصايتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يهيئ الناقل وسيلة النقل -التي تحددها الهيئة- بالأدوات والتجهيزات اللازمة لخدمة الأشخاص من ذوي الإعاقة وذوي القدرة المحدودة على الحركة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'لكل شخص من الأشخاص ذوي الإعاقة وذوي القدرة المحدودة على الحركة، الحق في الحصول على الخدمة، ولا يجوز رفض تقديم الخدمة له إلا في الحالتين الآتيتين: إذا كان الرفض مرتبطًا بمتطلبات الصحة والسلامة وفقاً لما تحدده الهيئة. استحالة تقديم الخدمة في حال عدم إمكانية توفير المتطلبات الخاصة بهم في وسيلة النقل أو مرافق النقل. وفي هاتين الحالتين، وفي حال توفّر خدمة بديلة تتوافق مع احتياجاته؛ يبلغ بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يحق لكل شخص من الأشخاص ذوي الإعاقة وذوي القدرة المحدودة على الحركة –بالإضافة إلى الحقوق المنصوص عليها في المادة (الثامنة) من اللائحة- الآتي: الاستفادة من أي إعفاءات أو تخفيضات على أسعار التذاكر المخصصة له ولمرافقه بناء على سياسة تحديد أجور استخدام وسائل النقل التي تصدرها الهيئة. الحصول على المعلومات المتعلقة بالرحلة وشروط النقل، بوسائل وطرق يسيرة تتناسب مع حالته. العلم بحقوقه الواردة في اللائحة وسياسات الناقل. الحصول على المساعدة اللازمة للصعود على متن وسيلة النقل والنزول منها، والتنقل في مرافق النقل. تمكينه من حجز مقعد له ومقعد مجاور لمرافقه إن توفّر ذلك. اصطحاب حيوان الخدمة من قبل الأشخاص ذوي الإعاقة على متن وسيلة النقل، وفي مرافق النقل، وفقاً لما تضعه الهيئة من سياسة لهذا الشأن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يحق لكل راكب الآتي: الحصول على الخدمة بجودة عالية، وبشكل آمن، وفي مواعيدها المحددة. التمتع بالخصوصية بالقدر المتعارف عليه في الأماكن العامة. الحصول على خيارات متعددة لشراء الخدمة بيسر وسهولة. اصطحاب الأمتعة الشخصية أو أي متعلقات لا تشكل خطرًا على سلامة الركاب ووسيلة النقل ومرافق النقل، وذلك وفقاً لشروط الناقل وما تحدده الهيئة. اصطحاب عربات حمل الأطفال ومعدات التنقل الخفيفة التي لا تشكل خطرًا على سلامة الركاب ووسيلة النقل ومرافق النقل، وذلك وفقاً لشروط الناقل وما تحدده الهيئة. اصطحاب الحيوانات الأليفة التي لا تشكل خطراً أو تؤثر في الخدمة ووسيلة النقل ومرافق النقل، وذلك وفقاً لشروط الناقل وما تحدده الهيئة. الحصول على معلومات واضحة وبطريقة مناسبة ويسيرة؛ لمعرفة جميع ما له من حقوق وما عليه من التزامات عند طلبه للخدمة. التعويض عن فقدان الأمتعة أو تلفها أو تأخرها، وعن التأخر في تقديم الخدمة أو إلغائها بعد شرائها أو سوء تقديمها، وذلك وفقاً للائحة وما تضعه الهيئة من سياسات. الحصول على المساعدة الطبية في حالة الإصابة على متن وسيلة النقل أو مرافق النقل أو في حالة الحاجة إليها.
    معرفة آليات الشكاوى المتعلقة بالخدمة، والجهات المعنية بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يلتزم الراكب بالآتي: سداد أجرة النقل، واتباع أحكام اللائحة وتعليمات الناقل وسياسته بشأن الخدمة. التقيّد بخط السير المحدد في التذكرة والنزول في المحطة المحددة فيها. المحافظة على الذوق العام في وسيلة النقل ومرافق النقل، وفق الأحكام النظامية ذات العلاقة وما تضعه الهيئة والناقل من شروط وأحكام. مراعاة ظروف كبار السن والحوامل والأطفال والمرضى، وإعطاء الأولوية لهم. عدم العبث بوسيلة النقل ومرافق النقل، أو استخدامها لغير الغرض المخصصة لها. عدم حمل مواد أو أمتعة تخالف سياسة الناقل وما تحدده الهيئة. عدم حمل أي مواد خطرة أو محظورة، وأي مواد تعرض وسيلة النقل أو مرافق النقل، أو حياة الآخرين للخطر. عدم استخدام تجهيزات السلامة والوقاية إلا في الحالات التي تستلزم ذلك. تسليم ما يُعثر عليه فوراً من مقتنيات أو أغراض فقدت إلى الناقل أو المسؤول عن مرافق النقل. الإبلاغ عن أي ممتلكات فُقدت منه أثناء الرحلة. التقيد بسياسة الناقل عند حمل الحيوانات الأليفة المسموح بحملها في وسيلة النقل ومرافقه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يلتزم الراكب بتعويض الناقل أو المسؤول عن مرافق النقل عن أي ضرر ناجم عن مخالفته لأحكام اللائحة، ما لم يثبت أن ذلك الضرر نجم عن ظروف لم يكن بإمكانه تجنبها أو قوة قاهرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يلتزم الراكب بجميع الأنظمة واللوائح والتعليمات النافذة في المملكة، ويلتزم كذلك -في الرحلات الممتدة إلى خارج المملكة- بالتقيد بالمتطلبات الأمنية والجمركية لجهة الوصول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يلتزم الناقل بالآتي: إعداد سياساته المتعلقة بتقديم الخدمة وفق اللائحة، وتقديمها إلى الهيئة لاعتمادها. تقديم الخدمة للركاب وفقاً لحقوقهم الواردة في اللائحة وشروط ترخيص الخدمة الذي تصدره الهيئة له. تأهيل الموظفين التابعين له للتعامل مع الركاب بمهنية واحترام. وضع آلية إلكترونية واضحة للتعامل مع الشكاوى والاقتراحات المتعلقة بحقوق الركاب. الاحتفاظ بسجل خاص بجميع الشكاوى المستلمة وما تم في شأنها وتواريخ ذلك، وانطباعات وآراء أصحاب الشكوى عن الكيفية التي عُولجت بها شكواهم، وإتاحة هذا السجل للهيئة أو أي جهة أخرى تحددها الهيئة. إتاحة منافذ متعددة لتمكين الراكب من سداد الأجرة بيسر وسهولة، بما في ذلك الدفع نقداً أو من خلال الوسائل الإلكترونية. إبلاغ الفئات التي يحق لها الحصول على أجرة مخفضة بذلك عند طلب الخدمة. الاحتفاظ بسجلات لجميع المواد المفقودة من الركاب التي عثر عليها أو سُلمت إليه. بيان كيفية المطالبة بجميع المواد المفقودة من الركاب التي عثر عليها أو سُلمت إليه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يلتزم الناقل بالتعويض عن الأضرار الناجمة عن أخطائه -وأخطاء تابعيه- التي تلحق بالركاب أو الغير إذا كان الضرر ناشئًا عن خطأ حصل أثناء تقديم الخدمة أو بسببه. يلتزم الناقل في جميع الأحوال باتخاذ الخطوات الفورية اللازمة لتوفير المساعدة الطبية وتحمل نفقات العلاج الطبي للراكب الذي يتعرض لإصابة أثناء تقديم الخدمة له، ولا يدخل ذلك في احتساب قيمة التعويض المشار إليه في الفقرة (1) من هذه المادة. يكون الناقل مسؤولاً عن أمتعة الركاب التي تُسلّم إليه، من وقت تسلمها إلى حين تسليمها للراكب. ويجب عليه تعويض الراكب عن فقدانها أو تلفها أو تأخر وصولها. يُعفى الناقل من المسؤولية والتزامه بالتعويض -المنصوص عليه في هذه المادة- إذا كانت الأضرار ناجمة عن فعل غير مشروع أو خطأ أو إهمال من جانب الراكب، أو عن قوة قاهرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجوز للناقل أو المسؤول عن مرافق النقل فحص أمتعة الركاب، وإذا تطلب الأمر إفراغ محتوياتها لفحصها في الحالات التي تستلزم ذلك ولأغراض الأمن والسلامة. يجب على الناقل إعداد تقرير عن حالة أي أمتعة مفقودة أو تالفة أو متأخرة، وسبب وتاريخ الفقدان أو التلف أو التأخير، بحضور الراكب -إذا كان ذلك ممكنًا- وتزويده بنسخة من التقرير. ويجوز للراكب الاعتراض على محتوى التقرير، وطلب رأي خبير. تعتبر الأمتعة مفقودة إذا لم تُسلّم للراكب خلال أربعة عشر (14) يومًا من تاريخ المطالبة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'تُقدّم الشكوى للناقل على النحو الآتي: يُقدّم الراكب شكواه خلال ثلاثين (30) يوماً من التاريخ المحدد لتقديم الخدمة. يُصدر الناقل إقراراً بتسلم كل شكوى مثبتًا فيه تاريخها، وذلك خلال خمسة (5) أيام عمل من تاريخ تسلمها. يُخطر الناقل الراكب خلال خمسة عشر (15) يوم عمل من تاريخ تسلم شكواه بما يفيد بأنها قيد النظر، أو بقبولها أو رفضها مع توضيح الأسباب. وفي جميع الأحوال، لا تتجاوز مدة معالجة الشكوى ثلاثين (30) يوماً من تاريخ تسلمها. في حال عدم رضا الراكب عن معالجة الناقل لشكواه، أو في حال تجاوز الناقل المدة المحددة لمعالجتها، يحق للراكب الاعتراض أمام اللجنة المشكلة بناء على المادة (السابعة عشرة) من اللائحة، وذلك خلال ستين (60) يوماً من تاريخ إشعاره بنتيجة معالجة الشكوى، أو من تاريخ انتهاء المدة المحددة لمعالجتها وفق الفقرة (3) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تتولى الهيئة الإشراف على تنفيذ أحكام اللائحة بما يضمن حصول الركاب على حقوقهم وتقيدهم بالتزاماتهم. وتصدر بقرار من المجلس الآليات التفصيلية اللازمة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تشكل بقرار من المجلس لجنة (أو أكثر) من خمسة أعضاء يرشحهم الرئيس، يكون منهم مستشاران نظاميّان يسمى أحدهما رئيساً، وثلاثة من أصحاب الخبرة الفنية، تتولى النظر في مخالفات أحكام اللائحة، واعتراضات الركاب على نتيجة معالجة الشكاوى المشار إليها في الفقرة (4) من المادة (الخامسة عشرة) من اللائحة، وفقاً لما تضعه الهيئة من قواعد لهذا الغرض. تصدر قرارات اللجنة بالأغلبية، وتكون مسببة، ويجوز التظلم من القرار أمام ديوان المظالم خلال ستين (60) يوماً من تاريخ الإبلاغ به. تكون مدة العضوية في اللجنة ثلاث (3) سنوات قابلة للتجديد، ويحدد المجلس بقرار منه قواعد عمل اللجنة، وإجراءاتها، ومكافآت أعضائها، وأمانتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: دون إخلال بالحق في اللجوء إلى القضاء، تكون التعويضات -فيما عدا ما يتعلق بالإصابة أو الوفاة- وفق سياسة تضعها الهيئة لهذا الغرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يكون للهيئة صلاحية فرض غرامة لا تتجاوز (500) خمسمائة ريال على الركاب والغير من المخالفين لأحكام اللائحة وما تحدده الهيئة من أفعال مخالفة وفق جدول تصنيف المخالفات والغرامات الذي يقره المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: دون إخلال بالأنظمة ذات العلاقة، يتولى الموظفون -سواء من الهيئة أو من غيرها من الجهات الحكومية أو الناقل- الذين يصدر بتسميتهم قرار من الرئيس، ضبط ما يصدر من الركاب والغير من مخالفات لأحكام اللائحة وما تحدده الهيئة من أفعال مخالفة وفق جدول تصنيف المخالفات والغرامات الذي يقره المجلس. للهيئة إسناد أعمال تحصيل الغرامات إلى الناقل، ولها مشاركته في إيراداتها وفق قواعد المشاركة في الدخل والأنظمة ذات العلاقة. يقوم الناقل بإبلاغ الجهات الأمنية فور اكتشاف جريمة في وسيلة النقل أو مرافق النقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تنشر اللائحة في الجريدة الرسمية، ويعمل بها من التاريخ الذي يحدده المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b9fbe3d4-2952-4f9b-b881-b05d008baeec/1
  verified: false
