regulation:
  code: BOE036
  name_ar: نظام الأسلحة والذخائر
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية أينما وردت في هذا النظام المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك : الأسلحة الحربية : الأسلحة النارية والذخائر والتجهيزات التي صممت بشكل خاص للاستعمال في العمليات الحربية، كالرشاشات والمدافع والصواريخ وغيرها. ويدخل في حكم الأسلحة الحربية الأسلحة التي تستخدم الأشعة، والغازات، والسموم، وأي سلاح عدا الأسلحة النارية الفردية والأسلحة المشار إليها في بقية فقرات هذه المادة. الأسلحة النارية الفردية : الأسلحة النارية المعدة لاستعمال شخص واحد، كالمسدسات، والبنادق، وفقا لما تحدده اللائحة التنفيذية. أسلحة الصيد : الأسلحة النارية ذات السبطانة الملساء، التي صممت أصلا لأغراض الصيد. أسلحة التمرين والبنادق الهوائية : أسلحة رماية دون بارود وينطلق مقذوفها بوساطة ضغط الهواء أو دفع نابض. السلاح الأبيض : كل أداة قاطعة أو ثاقبة أو مهشمة أو راضة، كالسيوف والخناجر والمدى والنبال والحراب والعصي ذات الحربة والقبضات وما في حكمها. الذخيرة : المقذوفات التي تنطلق من الأسلحة نتيجة الدفع الانفجاري أو الهوائي أو الدفع بالنابضات. الأسلحة الأثرية : الأسلحة القديمة
    ذات القيمة التاريخية التي يثبت بعد فحصها ومعاينتها عدم إمكانية استخدامها. اللائحة : اللائحة التنفيذية لهذا النظام. الوزير : وزير الداخلية . الجهة المختصة : وزارة الداخلية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يسمح بحمل الأسلحة الحربية والفردية الحكومية وذخائرها واستخدامها وفق الأنظمة والأوامر الخاصة بحملها واستخدامها لكل من: 1- العسكريين العاملين في: أ - الحرس الوطني. ب - وزارة الدفاع والطيران. ج - وزارة الداخلية. د - الاستخبارات العامة. هـ- رئاسة أمن الدولة. 2 - موظفي الحكومة المدنيين الذين ينص نظام الجهة التابعين لها على جواز حملهم أسلحة حكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يقصر استيراد الأسلحة النارية الفردية والبنادق الهوائية و أسلحة الصيد المعرفة في هذا النظام ولوازمها وقطع غيارها وذخائرها، وبيعها وشراؤها على السعوديين المرخص لهم، وفقا للإجراءات والشروط التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يحظر على غير الجهات الحكومية المختصة ما يأتي: أ - صنع الأسلحة الحربية وذخائرها ومستلزماتها أو قطع غيارها، و استيرادها، أو حيازتها، أو تداولها، أو اقتناؤها، أو إصلاحها. ب - صنع الأسلحة النارية الفردية ومستلزماتها وقطع غيارها وذخائرها، أو إجراء أي تعديل عليها. ج - استيراد الأسلحة النارية الفردية أو أسلحة الصيد وقطع غيارها وذخائرها، وكذلك بيعها أو شراؤها أو حملها أو اقتناؤها إلا بترخيص من الوزير. د - صنع أسلحة التمرين والبنادق الهوائية وقطع غيارها وذخائرها ومستلزماتها، أو استيراد أي من ذلك إلا بترخيص من الوزير . هـ - جلب أسلحة أو ذخائر أو قطع غيارها ومستلزماتها، وكذلك اصطحابها دون إذن من الوزير .و - استيراد أسلحة من غير ما ورد ذكره في هذا النظام، وكذلك جلبها دون إذن من الوزير .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: أ - لا يجوز استيراد الأسلحة الأثرية وتداولها بقصد الاتجار إلا بترخيص من الوزير .ب - يجوز جلب الأسلحة الأثرية أو اصطحابها بقصد الاقتناء.ج - تحدد اللائحة شروط وإجراءات ما ورد في الفقرتين (أ) و(ب) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجب على من تئول إليه أسلحة أو قطع غيار أو ذخائر - بالإرث أو الوصية أو أي طريقة أخرى - إبلاغ الجهات المختصة عنها خلال ثلاثة أشهر من تاريخ مآلها إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب على من فقد سلاحه أو تلف إبلاغ الجهات المختصة خلال شهر من تاريخ العلم بالفقد أو التلف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يحدد الوزير الأماكن والأوقات التي يحظر فيها حمل السلاح المرخص بحمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للوزير أن يرخص باستيراد الأسلحة النارية الفردية و أسلحة الصيد و أسلحة التمرين والبنادق الهوائية وقطع غيارها ولوازمها وذخائرها، وكذلك بيعها أو شراؤها أو حملها أو اقتناؤها أو إصلاحها، وفقا للشروط التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: للوزير الترخيص بحيازة أسلحة وذخائر نارية فردية لبعض المؤسسات والشركات السعودية التي تتطلب طبيعة عملها تسليح بعض منسوبيها، وفق الضوابط والشروط التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: للوزير -لاعتبارات خاصة يراها- الترخيص بشراء سلاح ناري فردي وحمله واقتنائه لشخص يقيم في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجوز للوزير الترخيص بفتح نواد للتدريب على الرماية، وفق ما تحدده اللائحة من ضوابط وشروط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجوز للوزير السماح بعبور أسلحة الصيد وأسلحة الحماية الشخصية للأراضي السعودية، بما يتفق مع الأنظمة والأعراف الدولية المعمول بها وأنظمة الدولة المتجه إليها، وفي ضوء الإجراءات والشروط التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجب على المرخص له باستيراد الأسلحة النارية الفردية أو أسلحة الصيد ومستلزماتها وقطع غيارها وذخائرها، وكذلك المرخص له بشرائها وبيعها - اتخاذ جميع وسائل السلامة لنقلها وتخزينها وفق الشروط المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجب على المرخص له باستيراد الأسلحة بجميع أنواعها ومستلزماتها وذخائرها وقطع غيارها، وكذلك المرخص له بشرائها وبيعها، أن ينظم لها سجلات خاصة وفقا للنماذج والإجراءات التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: للوزير -بناء على مقتضيات المصلحة العامة - عدم الموافقة على طلب الترخيص، أو تقييد الترخيص القائم، أو إلغاؤه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: جميع الرخص الصادرة بموجب أحكام هذا النظام لا يستفيد منها إلا المرخص له نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'تلغى رخصة حمل السلاح أو اقتنائه في الأحوال الآتية: أ - إذا تقررت مصادرة السلاح وذخيرته.ب - إذا فقد المرخص له شرطا من شروط منح الرخصة. ج - إذا توفي المرخص له أو فقد أهليته. د - إذا تقرر مغادرة المقيم المرخص له المملكة بصفة نهائية. ويتم التصرف في السلاح وذخيرته إذا كان الإلغاء بموجب الفقرات (ب، ج، د) من هذه المادة من قبل صاحب السلاح أو ورثة المتوفى أو وكيلهم الشرعي أو ولي القصر في ضوء ما تحدده اللائحة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'تلغى رخصة استيراد الأسلحة النارية الفردية أو رخص بيعها وشرائها أو إصلاحها في الحالات الآتية: أ - وفاة صاحب الرخصة أو فقد أهليته. ب - فقدان شرط من شروط منح الرخصة. وتحدد اللائحة الشروط والإجراءات التي يجب الأخذ بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تحدد اللائحة الإجراءات والشروط الواجب اتباعها إذا رغب المرخص له باستيراد الأسلحة النارية الفردية وذخائرها، أو رغب المرخص له ببيعها أو شرائها، في تغيير النشاط أو التنازل عنه لغيره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: لا يجوز إعطاء الشخص الملغى ترخيصه أي ترخيص جديد على أي سلاح آخر إلا في الحالات التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تحدد اللائحة الإجراءات الواجب اتخاذها في حال فقدان الرخصة أو تلفها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجوز منح رخصة اقتناء لأكثر من سلاح ناري فردي، وفقا لما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: لا يجوز منح رخصة حمل لأكثر من سلاح ناري فردي واحد، وتحدد اللائحة نوع هذا السلاح. وللوزير في حالات خاصة منح تراخيص بحمل أكثر من سلاح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تحدد اللائحة المدة الملائمة لسريان مفعول الرخص بأنواعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: للوزير أن يأذن لمن لديه سلاح مرخص بالسفر به إلى خارج المملكة، إذا أذنت له الدولة التي يقصدها والدول التي يمر بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يجوز التعويض بما يعادل قيمة السلاح المرخص وذخيرته إذا تقرر تسليمه للدولة في الحالات التي توجب ذلك طبقا لما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: تحظر ممارسة مهنة إصلاح الأسلحة النارية بجميع أنواعها إلا بترخيص من الوزير . وتحدد اللائحة شروط منح الترخيص وواجبات المرخص له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يحظر إصلاح أي سلاح غير مرخص به وفق أحكام هذا النظام ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يحظر إجراء أي تعديل على آلية الأسلحة أو طرق تذخيرها بما يجعلها أشد خطورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: أ - يجوز لأعضاء السلكين الدبلوماسي والقنصلي المعتمدين لدى المملكة جلب الأسلحة الفردية المعتادة وحملها واقتناؤها وكذلك ذخيرتها، وذلك بعد الحصول على ترخيص أو الحصول على هذه الأسلحة من المحلات المرخص لها بالبيع داخل المملكة بشرط المعاملة بالمثل. ب - يصدر الترخيص المشار إليه في الفقرة ( أ ) من هذه المادة من الجهة المختصة بناء على طلب من وزارة الخارجية. ج - لا يجوز لأعضاء السلكين الدبلوماسي والقنصلي نقل ملكية السلاح المرخص به إلا إلى عضو من البعثة الدبلوماسية نفسها أو القنصلية المعتمدة لدى المملكة. وفي غير هذه الحالة يجب إثبات خروج السلاح من المملكة عند انتهاء إقامة المرخص له في المملكة أو عند زوال الصفة الدبلوماسية أو القنصلية عنه، إلا إذا كان مصدر الحصول عليه من الداخل في ضوء ما ذكر في الفقرة ( أ ) من هذه المادة فيجوز التصرف فيه وفقا لهذا النظام ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يجوز لأعضاء السلكين الدبلوماسي والقنصلي السعوديين العاملين في الخارج، جلب أسلحتهم الفردية إلى المملكة بعد انتهاء عملهم في الخارج بحسب التعليمات والإجراءات التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يجوز لأعضاء الوفود الرسمية أو العسكرية أو الأشخاص المكلفين بمهمات رسمية اصطحاب أسلحتهم الفردية الرسمية المعتادة وحملها، وذلك وفقا للعرف الدولي وبشرط المعاملة بالمثل بحسب ما تتطلبه الظروف، على أن تشعر الوزارة قبل ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: 'يعاقب بالسجن مدة لا تتجاوز ثلاثين سنة وبغرامة لا تتجاوز ثلاثمائة ألف ريال كل من يثبت قيامه بأي مما يأتي: أ - تهريب أسلحة حربية أو فردية أو قطع منها أو ذخائرها إلى داخل المملكة بقصد الإخلال بالأمن الداخلي. ب - استعمال الأسلحة الحربية أو الفردية أو ذخائرها أو قطع منها، أو صنعها أو تجميعها أو بيعها أو شراؤها أو حيازتها، بقصد الإخلال بالأمن الداخلي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 'يعاقب بالسجن مدة لا تتجاوز عشرين سنة وبغرامة لا تتجاوز مائتي ألف ريال أو بإحدى هاتين العقوبتين كل من يثبت قيامه بأي مما يأتي : أ - تهريب أسلحة حربية أو قطع منها أو ذخائرها إلى داخل المملكة بقصد الاتجار.ب - صنع أسلحة حربية أو ذخائرها أو قطع غيارها بقصد الاتجار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز خمس عشرة سنة وبغرامة لا تتجاوز مائة وخمسين ألف ريال، أو بإحدى هاتين العقوبتين، كل من ثبت حمله سلاحا حربيا أو ذخيرته أو اقتنى أيا من ذلك أو باعه أو اشتراه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز عشر سنوات وبغرامة لا تتجاوز مائة ألف ريال، أو بإحدى هاتين العقوبتين، كل من ثبت قيامه بصنع أسلحة فردية أو قطع منها أو ذخائرها، أو ثبت قيامه بتهريبها إلى داخل المملكة بقصد الاتجار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: 'يعاقب بالسجن مدة لا تتجاوز خمس سنوات وبغرامة لا تتجاوز ثلاثين ألف ريال، أو بإحدى هاتين العقوبتين كل من ثبت قيامه بأي مما يأتي: أ - تهريب أسلحة صيد أو قطع منها أو ذخائرها إلى المملكة بقصد الاتجار. ب - تهريب أسلحة نارية فردية أو قطع منها أو ذخيرتها إلى المملكة بقصد الاستعمال الشخصي. ج - صنع أسلحة الصيد أو قطع غيارها. د - إدخال تعديل على آلية أسلحة الصيد أو أسلحة التمرين أو الأسلحة الأثرية بقصد جعلها أسلحة أشد خطورة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز سنتين وبغرامة لا تتجاوز سبعة آلاف ريال، أو بإحدى هاتين العقوبتين كل من ثبت شراؤه سلاحا ناريا فرديا أو ذخيرة دون ترخيص أو بيعه أيا من ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز ثمانية عشر شهرا وبغرامة لا تزيد على ستة آلاف ريال، أو بإحدى هاتين العقوبتين كل من تثبت حيازته لسلاح ناري فردي أو ذخيرة دون ترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: 'يعاقب بالسجن مدة لا تتجاوز سنة وبغرامة لا تزيد على خمسة آلاف ريال، أو بإحدى هاتين العقوبتين، كل من ثبت قيامه بأي مما يأتي: أ - استعمال السلاح المرخص له بحمله واقتنائه في غير الغرض المرخص له به. ب - استعمال سلاح ناري للصيد ولو كان مرخصا. ج - حيازته سلاح صيد أو ذخيرته دون ترخيص. د - السماح لغيره باستعمال السلاح المرخص له به، أو استعمال غيره للسلاح نتيجة إهماله. هـ - نقل أسلحة أو ذخائر غير مرخصة، أو المساعدة في ذلك. و - فتح محل للتدريب على أسلحة الصيد أو التمرين دون الحصول على ترخيص بذلك. ز - مزاولة مهنة إصلاح الأسلحة دون الحصول على ترخيص بذلك. ح - إصلاح الأسلحة غير المرخصة. ط - صنع ذخيرة أسلحة الصيد . ي - تهريب أسلحة تمرين بالجملة إلى المملكة. ك - تهريب أسلحة الصيد إلى المملكة أو ذخيرتها بقصد الاستعمال الشخصي. ل - تهريب الأسلحة الأثرية بقصد الاتجار. م - مخالفة أي شرط من شروط الترخيص بالاستيراد أو البيع أو الحيازة أو الإصلاح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز ستة أشهر وبغرامة لا تزيد على ثلاثة آلاف ريال، أو بإحدى هاتين العقوبتين كل من ثبت أن لديه معلومات عن عمليات متاجرة بالأسلحة دون ترخيص أو عن عمليات تهريب لها ولم يعلم السلطات المختصة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: 'يعاقب بغرامة مالية لا تتجاوز ألفي ريال: أ - كل من انتهت مدة الرخصة الممنوحة له بالاستيراد أو البيع والشراء أو الإصلاح أو التدريب، واستمر في مزاولة العمل المرخص له به دون أن يتقدم بطلب تجديد الرخصة خلال ثلاثة أشهر من تاريخ انتهائها. ب - كل من ألغي الترخيص الممنوح له بالحمل أو الاقتناء ولم يتصرف بالسلاح أو لم يسلمه خلال ثلاثة أشهر من تاريخ إلغاء الترخيص. ج - كل من قام بتهريب أسلحة التمرين بقصد الاستعمال الشخصي. د- كل من علم بفقد سلاحه أو سرقته أو تلفه ولم يبلغ الجهات المختصة. هـ- كل من خالف أي حكم آخر من أحكام هذا النظام ولائحته مما لا يقع تحت العقوبات الواردة فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يعاقب بغرامة مالية لا تتجاوز ألف ريال كل من حمل سلاحه المرخص في الأماكن والأوقات التي يحظر فيها حمل السلاح. وتحدد اللائحة الأماكن والأوقات التي يحظر فيها حمل السلاح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يعاقب بغرامة مالية لا تتجاوز ألف ريال كل من يثبت فقدانه سلاحه بالسرقة أو الضياع نتيجة إهماله، مع حرمانه من الحصول على ترخيص جديد لأي سلاح مدة سنتين من تاريخ تنفيذ العقوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: 'يعاقب بغرامة مالية لا تقل عن مائة ريال ولا تتجاوز خمسمائة ريال عن كل سنة تأخير: أ - كل من انتهت مدة رخصة حمله للسلاح أو اقتنائه ولم يتقدم بطلب تجديدها خلال ثلاثة أشهر من تاريخ انتهائها. ب - كل من آل إليه بالإرث أو الوصية سلاح ناري مرخص به ولم يبلغ عنه الجهات المختصة خلال ثلاثة أشهر من تاريخ مآله إليه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: يعاقب كل من يثبت تصرفه في الأسلحة والذخائر المصرح بعبورها أراضي المملكة بالبيع أو الإهداء داخل المملكة بالعقوبات الخاصة بمهربي الأسلحة بحسب نوعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يعاقب بالعقوبة المقررة على المخالفة نفسها كل من تثبت مشاركته في ارتكاب أي مخالفة من المخالفات الواردة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: تطبق العقوبات - عدا السجن - الواردة في هذا النظام على المؤسسات أو الشركات أو أي منشأة أخرى يثبت مخالفتها لما ورد به من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: إضافة إلى العقوبات المنصوص عليها في المواد (الرابعة والثلاثين، والخامسة والثلاثين، والسادسة والثلاثين، والسابعة والثلاثين، والثامنة والثلاثين، والتاسعة والثلاثين، والأربعين، والحادية والأربعين) من هذا النظام، يصادر بحكم قضائي جميع ما يضبط من أسلحة وذخائر ومعدات متعلقة بها. وإذا كانت المخالفة تهريبا فتصادر وسيلة النقل المستخدمة في التهريب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يراعى تشديد العقوبات المقررة في المواد (الرابعة والثلاثين، والخامسة والثلاثين، والسادسة والثلاثين) من هذا النظام إذا كان مرتكب المخالفة أحد موظفي الجهات ذات العلاقة بتطبيق هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: تتولى هيئة التحقيق والادعاء العام التحقيق في مخالفات أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: تكون بقرار من الوزير لجنة من ثلاثة أعضاء يكون من بينهم واحد من المؤهلين في العلوم الشرعية أو النظامية للنظر في توقيع العقوبات المنصوص عليها في المواد (الثالثة والأربعين، والرابعة والأربعين، والخامسة والأربعين، والسادسة والأربعين) من هذا النظام ويعتمد قرارات هذه اللجنة الوزير أو من يفوضه. ويجوز لمن صدر ضده قرار بالعقوبة التظلم أمام ديوان المظالم خلال ستين يوما من تاريخ إبلاغه به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: مع عدم الإخلال بما تقضي به المادة (الثالثة والخمسون) من هذا النظام، يختص ديوان المظالم بالنظر في قضايا المخالفين لأحكام هذا النظام، وتوقيع العقوبات الواردة فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: لا يخل تطبيق العقوبات المنصوص عليها في هذا النظام بأي عقوبة أشد ينص عليها نظام آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: يجوز للوزير إيقاف الإجراءات المتعلقة بمساءلة كل من يتطوع ويبادر بالإبلاغ عما لديه من أسلحة وذخائر غير مرخصة، ويبدي رغبته واستعداده لتسليمها قبل ضبطها لديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: أ - لديوان المظالم -ولأسباب معتبرة، أو إذا ظهر له من أخلاق المحكوم عليه أو ماضيه أو سنه أو ظروفه الشخصية أو الظروف التي ارتكبت فيها المخالفة أو غير ذلك مما يبعث على الاعتقاد بأن المتهم لن يعود إلى مخالفة أحكام هذا النظام- وقف تنفيذ عقوبة السجن المحكوم بها من العقوبات الواردة في هذا النظام ما لم يكن سبق أن حكم عليه وعاد إلى المخالفة نفسها. ويجب أن تبين الأسباب التي استند إليها الحكم في جميع الأحوال. ب - إذا عاد المحكوم عليه لارتكاب مخالفة من المخالفات المعاقب عليها بموجب هذا النظام خلال مدة ثلاث سنوات من تاريخ وقف تنفيذ العقوبة فلديوان المظالم إلغاء وقف التنفيذ والأمر بإنفاذ العقوبة دون الإخلال بالعقوبة المقررة عن المخالفة الجديدة. ج - إذا انقضت مدة وقف تنفيذ العقوبة دون عودة المحكوم عليه لارتكاب إحدى المخالفات المعاقب عليها في هذا النظام، فإن الحكم الموقوف يعد كأن لم يكن وتنقضي كل آثاره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: يجوز للوزير الإذن بإعادة تصدير الأسلحة أو الذخائر القادمة إلى المملكة عبر المنافذ الجمركية دون إذن سابق، إذا تم التقرير عنها قبل ضبطها، وذلك خلال مدة لا تتجاوز ستة أشهر وتصادر بحكم قضائي إذا لم يعد تصديرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: يجوز للوزير منح مكافأة لا تزيد على قيمة الغرامة المحكوم بها لمن يقوم بالإبلاغ عن مخالفات الاتجار بالأسلحة أو تهريبها إذا أدى بلاغه إلى ضبط الأسلحة وإدانة المخالفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: للوزير تحديد الإدارات والفروع التي يعهد إليها تنفيذ أحكام هذا النظام ومناطق كل منها وصلاحياتها وفق مقتضيات المصلحة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: يجوز للوزير تفويض بعض الصلاحيات المخولة له بموجب هذا النظام إلى من يراه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: يحل هذا النظام محل نظام الأسلحة والذخائر ، الصادر بالمرسوم الملكي ذي الرقم (م/8) وتاريخ 19/ 2/ 1402هـ، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: يعمل بهذا النظام و اللائحة بعد مائة وثمانين يوما من تاريخ نشره في الجريدة الرسمية، ويصدر الوزير اللائحة لهذا النظام خلال هذه المدة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a445af93-671f-496b-818a-a9a700f19150/1
  verified: false
