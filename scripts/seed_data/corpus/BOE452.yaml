regulation:
  code: BOE452
  name_ar: تنظيم المركز السعودي لاعتماد المنشآت الصحية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك: التنظيم: تنظيم المركز السعودي لاعتماد المنشآت الصحية. المركز: المركز السعودي لاعتماد المنشآت الصحية. المجلس: المجلس الصحي السعودي. المدير العام: مدير عام المركز. المنشآت الصحية: المرافق الصحية الحكومية أو الخاصة التي تقدم خدمات الرعاية الصحية، وتشمل: (المستشفى، ومراكز الرعاية الصحية الأولية، والمجمع الطبي العام، والمجمع الطبي المتخصص، والعيادة، ومركز الأشعة، والمختبر الطبي، ومركز جراحة اليوم الواحد، ومركز الخدمة الصحية المساندة، ومراكز خدمات النقل الإسعافي).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يرتبط المركز تنظيميًّا برئيس المجلس، ويكون مقره في مدينة الرياض، وله أن ينشئ فروعاً ومكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: '1- يهدف المركز إلى رفع مستوى جودة الخدمات الصحية وأمانها بما يكفل سلامة المريض وتطوير الأداء المهني الصحي والإداري في المنشآت الصحية، وله في سبيل ذلك دون حصر القيام بالمهمات والاختصاصات الآتية: أ - اعتماد معايير وطنية موحدة لجميع المنشآت الصحية في المملكة في مجالات الممارسات الصحية، وتشمل (الطبية، والصيدلية، وسلامة المنشآت، والجودة وسلامة المريض، والقيادات الإدارية، وخدمات المختبرات، والأقسام الفنية الأخرى). ب - مراجعة المعايير المعتمدة بصفة دورية - كلما دعت الحاجة أو كل أربع سنوات على الأقل - والتأكد من ملاءمتها لبيئة العمل الصحي في المملكة. ج - الإسهام في تهيئة المنشآت الصحية لتطبيق معايير الجودة من خلال ما يأتي: - عقد الندوات وجلسات العمل لنشر ثقافة الجودة وزيادة الوعي بين العاملين والمسؤولين بمفاهيم الجودة وأهمية تطبيقها. - إرسال فرق من المتخصصين في مجالات الطب والتمريض والصيدلة والمختبرات والأشعة والإدارة ومكافحة العدوى وإجراءات السلامة؛ لشرح المعايير وتدريسها للعاملين في المنشآت الصحية. - تنفيذ برامج التدريب المعدة للعاملين في المنشآت الصحية عن طريق المختصين المدربين،
    ودعم هذه المنشآت بالمواد العلمية اللازمة لذلك. د - متابعة أداء المنشآت الصحية للتأكد من التزامها بالمعايير المعتمدة ومراقبة جودة الأداء. هـ - وضع الآليات المناسبة لتقويم أداء المنشآت الصحية عن طريق مراقبة تحقيق مؤشرات الأداء المتعارف عليها وتقويمها. و - تدريب المرشحين لمهمات الاعتماد وإعدادهم مقومين من المركز. ز - إجراء الدراسات والبحوث في مجال عمل المركز. ح - إنشاء قاعدة بيانات شاملة للمنشآت الصحية. ط - التعاون وتبادل الخبرات مع جهات الاعتماد الدولية والمنظمات والهيئات ذات العلاقة بعمل المركز. ي - تنسيق الجهود بين الجهات الحكومية وغيرها فيما يحقق أهداف المركز. ك - تعزيز التعاون والتنسيق بين الجهات المختصة في المملكة وخارجها بما يحقق أهداف المركز، وفقاً للقواعد والتعليمات المتبعة. ل - تنظيم المؤتمرات والندوات المحلية والعالمية - في مجال عمل المركز - والمشاركة فيها. م - اعتماد جميع المنشآت الصحية في المملكة. ن - القيام بأي مهمة أخرى يكلفه بها المجلس في حدود اختصاص المركز. 2 - لا تخل الاختصاصات والمهمات الموكولة إلى المركز الواردة في الفقرة (1) من هذه المادة باختصاص الهيئة السعودية للتخصصات
    الصحية - المتعلق بالاعتراف بالمؤسسات الصحية المخصصة لأغراض التدريب - الوارد في الفقرة (3) من المادة (الثانية) من نظام الهيئة السعودية للتخصصات الصحية الصادر بالمرسوم الملكي رقم (م / 2) وتاريخ 6 / 2 / 1413هـ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون للمركز مدير عام متفرغ لا تقل مرتبته عن (الرابعة عشرة) أو ما يعادلها، يرتبط تنظيميًّا برئيس المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المدير العام إدارة المركز وتصريف شؤونه، وفقاً للاختصاصات والصلاحيات المحددة له التي يصدر بها قرار من المجلس، وله على وجه خاص ما يأتي: 1 - التحضير لاجتماعات اللجنة الإدارية ومتابعة تنفيذ توصياتها بعد أن يعتمدها المجلس.2 - إعداد تصور التكاليف المالية السنوية التي يحتاج إليها المركز تمهيداً لإقرارها وفق الإجراءات النظامية المتبعة. 3 - الإشراف على المركز ومنسوبيه طبقاً للصلاحيات الممنوحة له وما تحدده اللوائح. 4 - إصدار أوامر الصرف الخاصة بالمركز في حدود الاعتماد المالي السنوي. 5 - رفع تقارير دورية عن سير أعمال المركز ومنجزاته ونشاطاته وما يراه من مقترحات إلى المجلس خلال تسعين يوماً من بداية كل سنة مالية. 6 - اقتراح خطط المركز وبرامجه والإشراف على تنفيذها بعد موافقة المجلس عليها. 7 - اقتراح اللوائح التنفيذية لهذا التنظيم تمهيداً لاعتمادها من المجلس.8 - تشكيل اللجان الفنية والإدارية المؤقتة لتسيير العمل والقيام بالمهمات المحددة لها. 9 - إعداد مؤشرات لقياس أداء المركز ومتابعته. 10 - تمثيل المركز في علاقاته بغيره من الجهات وأمام القضاء. 11 - أي مهمة أو اختصاص يصدر في شأنه
    قرار من المجلس. وللمدير تفويض بعض الاختصاصات المنصوص عليها في هذه المادة إلى غيره من المسؤولين في المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يشكل رئيس المجلس "لجنة إدارية" للمركز من الخبراء والمختصين من ممثلين عن القطاعات الصحية الحكومية والقطاع الخاص في المملكة في مجال الجودة وسلامة المريض وسلامة المنشآت الصحية برئاسة المدير العام يتم ترشح أعضائها من المجلس، تتولى ما يأتي: 1 - اقتراح الأهداف والسياسات العامة التي يسير عليها المركز لتحقيق أهدافه، والبرامج اللازمة لذلك، تمهيداً للموافقة عليها من المجلس. 2 - اقتراح اللوائح الإدارية والمالية التي يسير عليها المركز - بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية - وغيرها من اللوائح الداخلية، تمهيداً لاعتمادها من المجلس. 3 - الإشراف على إعداد المعايير الموحدة للمنشآت الصحية واعتمادها. 4 - اعتماد نتائج تقويم جميع المنشآت الصحية. 5 - التنسيق مع الجهات المعنية المختصة لاتخاذ ما هو مناسب من إجراءات وعقوبات نظامية في حق المنشآت الصحية المتهاونة أو غير القادرة على تطبيق المعايير. 6 - التنسيق مع الجهات المعنية لربط الترخيص للمنشآت الصحية وتجديده، وكذلك تقديم خدمات الضمان الصحي، بالحصول على الاعتماد.7 - اقتراح إنشاء فروع أو مكاتب للمركز في مناطق المملكة تمهيداً لاعتمادها
    من المجلس. 8 - تحديد المقابل المالي للأعمال والخدمات التي يقدمها المركز في مجال اختصاصه تمهيداً لاعتمادها من المجلس. 9 - اقتراح تشكيل اللجان الفنية الدائمة والرفع بذلك إلى المجلس لإقراره وتحديد ما يراه من صلاحيات لها. 10 - قبول المساعدات والهبات والتبرعات التي تقدم للمركز، وفقاً للأنظمة المنظمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تجتمع اللجنة الإدارية بدعوة من رئيسها مرتين على الأقل كل سنة، وعلى الرئيس دعوة اللجنة إذا طلب ذلك نصف الأعضاء على الأقل. ويجب أن تشتمل الدعوة على جدول الأعمال. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه. وتصدر التوصيات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. وللجنة الإدارية أن تدعو لحضور اجتماعاتها من ترى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت. وتثبت مداولات الاجتماع وتوصياته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون تمهيداً لاعتمادها من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: '1 - يكون للمركز مخصص اعتماد مالي ضمن ميزانية المجلس، مع إعطائه المرونة المالية والإدارية التي تمكنه من الاستفادة من الخبرات المحلية والدولية. 2 - تتكون موارد المركز مما يأتي: أ - ما يخصص له من اعتماد مالي ضمن ميزانية المجلس. ب - المقابل المالي الذي يتقاضاه المركز عن الأعمال والخدمات التي يقدمها ضمن اختصاصه، وفقاً لما يقرره المجلس. ج - الهبات والتبرعات والمساعدات والأوقاف والوصايا. د - أي مورد آخر يقره المجلس. 3 - تودع إيرادات المركز المنصوص عليها في الفقرتين (2 / ب) و(2 / ج) و(2 / د) من هذه المادة في حساب في أحد البنوك المحلية، ويصرف منها وفقاً للقواعد والإجراءات التي يقرها المجلس. 4 - يعامل المركز من حيث الرقابة المالية معاملة المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يصدر المجلس القرارات اللازمة لتنفيذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6383fcba-9d26-428a-8b5a-a9a700f29275/1
  verified: false
