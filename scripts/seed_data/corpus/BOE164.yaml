regulation:
  code: BOE164
  name_ar: نظام الزراعة العضوية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'في تطبيق أحكام هذا النظام، يكون للكلمات والعبارات الآتية المعاني المبينة قرين كل منها، ما لم يقض سياق النص بغير ذلك:الوزارة: وزارة الزراعة.الوزير: وزير الزراعة.النظام: نظام الزراعة العضوية.اللائحة: اللائحة التنفيذية للنظام.الزراعة العضوية: أسلوب للإنتاج الزراعي - بشقيه النباتي والحيواني - يعتمد على استخدام مواد طبيعية لإنتاج غذاء دون استخدام مواد أو أسمدة أو مبيدات كيمائية أو هرمونات أو مواد معدلة وراثيًّا.معايير نشاط الزراعة العضوية: معايير الزراعة العضوية التي تعتمدها الوزارة.نشاط الزراعة العضوية: عمليات إنتاج المدخلات أو المنتجات العضوية أو تصنيعها أو تسويقها أو استيرادها أو تصديرها.المدخلات العضوية: المواد التي تستخدم في الزراعة العضوية. المنتجات العضوية: المنتجات النباتية والحيوانية العضوية الطازجة والمصنعة .وحدة الإنتاج العضوي: المنشأة المخصصة لإنتاج المدخلات أوالمنتجات العضوية أو تصنيعها أو تخزينها أو تعليبها أو تغليفها أو تجهيزها.جهة التوثيق: شركات متخصصة في مجال التوثيق العضوي تشرف على وحدات الإنتاج من خلال تطبيق معايير نشاط الزراعة العضوية.شهادة التوثيق العضوي:
    شهادة تمنحها جهة التوثيق التي ترخص لها الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى تنظيم نشاط الزراعة العضوية في المملكة وحمايته من أي ممارسة خاطئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تُطبق أحكام هذا النظام على كل من يزاول نشاط الزراعة العضوية، وجهات التوثيق العاملة في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: مع عدم الإخلال باختصاصات الجهات الواردة في الأنظمة الأخرى، تتولى الوزارة الإشراف على نشاط الزراعة العضوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب على كل من يرغب في مزاولة نشاط الزراعة العضوية الحصول على شهادة التوثيق العضوي من جهات التوثيق التي ترخص لها الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تعمل الوزارة على تحقيق أهداف هذا النظام، ولها على الأخص ما يأتي: 1 - إعداد معايير نشاط الزراعة العضوية واعتمادها.2 - اعتماد شروط وإجراءات فحص وتحليل المدخلات العضوية.3 - وضع قوائم للمواد المصرح باستخدامها بوصفها مدخلات عضوية ضمن معايير نشاط الزراعة العضوية.4 - وضع متطلبات الملصقات وبيانات البطاقة الخاصة بالمدخلات العضوية.5 - وضع متطلبات استيراد المدخلات العضوية وتصديرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تعد الهيئة العامة للغذاء والدواء بالتنسيق مع الوزارة ما يأتي: 1 - شروط وإجراءات فحص وتحليل المنتجات العضوية .2 - متطلبات الملصقات وبيانات البطاقة الخاصة بالمنتجات العضوية.3 - متطلبات استيراد المنتجات العضوية وتصديرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تختص الوزارة بمنح التراخيص لجهات التوثيق في المملكة، وتحدد اللائحة شروط منح التراخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يلتزم كل من يزاول نشاط الزراعة العضوية بالاحتفاظ بالسجلات اللازمة لمتابعة كل ما يتعلق بالمدخلات والمنتجات العضوية. ويلتزم كذلك بإبلاغ الوزارة وجهة التوثيق بكل ما يستجد على نشاطه، وفق ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تخضع المدخلات والمنتجات العضوية لمعايير نشاط الزراعة العضوية وللضوابط والاشتراطات الفنية اللازمة لها، وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يحظر وضع أي كلمة أو عبارة أو شعار أو ملصق على منتج غير عضوي للدلالة على أنه منتج عضوي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: للوزارة - بالتعاون مع الجهات ذات العلاقة كل فيما يخصه - حق التفتيش على وحدات الإنتاج العضوي ؛ للتأكد من تطبيقها لمعايير نشاط الزراعة العضوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجوز للوزير إصدار قرار حظر إنتاج الحيوانات الحية العضوية أو تصديرها أو استيرادها أو تداولها، أو أي مدخل نباتي أو حيواني عضوي، بصفة دائمة أو مؤقتة، إذا اقتضت المصلحة العامة ذلك، وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكون للموظفين الذين يصدر بتحديدهم قرار من الوزير صفة مأموري الضبط وإثبات ما يقع من مخالفات لأحكام هذا النظام ولائحته، وذلك في نطاق اختصاص كل منهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد ينص عليها أي نظام آخر، يعاقب كل من يخالف أي حكم من أحكام هذا النظام أو لائحته بعقوبة أو أكثر من العقوبات الآتية : أ - الإنذار.ب - غرامة مالية لا تزيد على مليون ريال.ج - وقف الترخيص بمزاولة النشاط لمدة لا تزيد على سنة.د - إلغاء الترخيص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تكوَّن - بقرار من الوزير – لجنة (أو أكثر) من ثلاثة أعضاء على الأقل يكون من بينهم مستشار نظامي؛ للنظر في مخالفات أحكام هذا النظام ولائحته وتقرير العقوبات المناسبة، ويعتمد الوزير قرارات اللجنة. ويجوز لمن صدر في حقه قرار بالعقوبة التظلم منه أمام ديوان المظالم خلال (ستين) يوماً من تاريخ إبلاغه به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يصدر الوزير لائحة هذا النظام بعد (مائة وعشرين) يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يعمل بهذا النظام بعد (مائة وعشرين) يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e37044a1-c673-4e80-af59-a9a700f25663/1
  verified: false
