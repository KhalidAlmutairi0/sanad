regulation:
  code: BOE389
  name_ar: الترتيبات التنظيمية لمركز تنظيم المعدّات الثقيلة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولاً
  article_text_ar: يهدف المركز إلى تنظيم المعدات الثقيلة المشمولة باختصاصاته بما يضمن جودتها وسلامتها. تحدد اللجنة الإشرافية -المشار إليها في البند (رابعاً) من هذه الترتيبات- المعدّات الثقيلة المشمولة باختصاصات المركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: ثانياً
  article_text_ar: يكون المركز ضمن الهيكل التنظيمي للهيئة السعودية للمواصفات والمقاييس والجودة، على أن يرتبط تنظيمياً بمحافظ الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: 'دون إخلال باختصاصات الجهات الحكومية الأخرى ذات العلاقة ومسؤولياتها، يقوم المركز بكل ما يلزم لتحقيق الهدف من إنشائه، ومن ذلك ما يأتي: اقتراح اللوائح والمعايير التشغيلية المتعلقة بالمتطلبات العامة للمعدّات الثقيلة، والتفتيش والرقابة عليها، وصيانتها، وتشغيلها. وضع ما يلزم من خطط وبرامج تتعلق بتنظيم أعماله ونشاطاته. إنشاء قاعدة بيانات في شأن المعدّات الثقيلة بالتعاون مع الجهات المعنية، ويشمل ذلك حصرها وتسجيل ملكيتها وبياناتها. اعتماد جهات التفتيش والرقابة على سلامة المعدات الثقيلة. اعتماد الجهات التدريبية لمشغلي المعدّات الثقيلة. إصدار التراخيص اللازمة للمعدّات الثقيلة وتشغيلها. الإشراف على عمليات فحص المعدّات الثقيلة للتأكد من سلامتها وجاهزيتها للتشغيل وبدء الخدمة. وضع القواعد اللازمة للتأهيل والترخيص لمشغلي المعدات الثقيلة. اقتراح ضوابط لعمر المعدّات الثقيلة الافتراضي وضوابط التخلص منها. اقتراح المقابل المالي لما يقدمه المركز من أعمال وخدمات في مجال اختصاصه. العمل على نشر الوعي بأهمية تسجيل وسلامة المعدّات الثقيلة واستخدامها، وكفاية مشغليها. التنسيق مع الجهات الحكومية والخاصة،
    والمتابعة معها، فيما يتعلق بتنفيذ الخطط والبرامج المتعلقة بتنظيم المعدّات الثقيلة، والإسهام في تنظيم جهود الجهات الحكومية والخاصة في هذا المجال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: رابعاً
  article_text_ar: 'تكون للمركز لجنة إشرافية برئاسة محافظ الهيئة السعودية للمواصفات والمقاييس والجودة، وعضوية كل من الآتي: ممثل من وزارة الشؤون البلدية والقروية والإسكان. ممثلان من وزارة الداخلية (المديرية العامة للدفاع المدني، والإدارة العامة للمرور). ممثل من وزارة النقل. ممثل من وزارة الموارد البشرية والتنمية الاجتماعية. ممثل من الهيئة العامة للجمارك. ممثل من الهيئة السعودية للمواصفات والمقاييس والجودة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: خامساً
  article_text_ar: 'تتولى اللجنة الإشرافية الإشراف على المركز ومتابعة تنفيذ أعماله بما يضمن تحقيق الهدف من إنشائه، وبخاصة ما يأتي: اعتماد اللوائح والمعايير التشغيلية المتعلقة بالمتطلبات العامة للمعدّات الثقيلة والتفتيش والرقابة عليها، وصيانتها، وتشغيلها. إقرار خطط المركز وبرامجه فيما يتعلق بتنظيم أعماله ونشاطاته. اعتماد ضوابط لعمر المعدّات الثقيلة الافتراضي وضوابط التخلص منها. اعتماد القواعد اللازمة للتأهيل والترخيص لمشغلي المعدّات الثقيلة. اعتماد المقابل المالي لما يقدمه المركز من أعمال وخدمات في مجال اختصاصه تری اللجنة الإشرافية استحصال مقابل مالي عنها بالاتفاق مع وزارة المالية ومركز تنمية الإيرادات غير النفطية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: سادساً
  article_text_ar: يصدر محافظ الهيئة السعودية للمواصفات والمقاييس والجودة القواعد المنظمة لعمل اللجنة الإشرافية، وعقد اجتماعاتها، واتخاذ قراراتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: سابعاً
  article_text_ar: يكون للمركز مدير تنفيذي يُعين بقرار من اللجنة الإشرافية، ويحدد القرار أجره ومزاياه المالية الأخرى. ويتولى الاختصاصات التي تكِلها إليه اللجنة الإشرافية في حدود ما ورد في هذه الترتيبات، ويمثله أمام القضاء والجهات الأخرى، وله تفويض غيره بذلك. توفر الهيئة السعودية للمواصفات والمقاييس والجودة -وفقاً لإمكاناتها المتاحة- الدعم والمساندة الإدارية والفنية للمركز للقيام بالاختصاصات الموكولة إليه الواردة في هذه الترتيبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: ثامناً
  article_text_ar: تخصص للمركز -ضمن ميزانية الهيئة السعودية للمواصفات والمقاييس والجودة- اعتمادات مالية، تصدر بالاتفاق بين كل من الهيئة السعودية للمواصفات والمقاييس والجودة ووزارة المالية. تودع أموال المركز في حساب جاري وزارة المالية لدى البنك المركزي السعودي، ويصرف منها على أنشطة المركز وفق لائحة تصدرها اللجنة الإشرافية بالاتفاق مع وزارة المالية. دون إخلال باختصاصات الديوان العام للمحاسبة، تعين اللجنة الإشرافية مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز وتعاملاته المالية، وتحدد أتعابه، ويرفع إليها تقرير مراجع الحسابات، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
- article_ref: تاسعاً
  article_text_ar: تنشر هذه الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ab80058f-0e34-4750-82cd-ad3f00937698/1
  verified: false
