articles:
- article_ref: 'المادة الأولى: (تعريفات)'
  article_text_ar: 'يقصد بالعبارات الآتية أينما وردت في هذا النظام المعاني المذكورة أمامها ما لم يقتض السياق خلاف ذلك: المصنف : أي عمل أدبي، أو علمي، أو فني. المصنف المشترك : المصنف الذي يشترك في وضعه شخصان أو أكثر من الأشخاص الطبيعيين أو المعنويين سواء أمكن فصل إسهام كل منهم في العمل أم لم يمكن ذلك. المصنف الجماعي: المصنف الذي يشترك في وضعه جماعة بتوجيه من شخص طبيعي أو معنوي يتكفل بنشره تحت إدارته، أو باسمه، ويندمج عمل المشتركين فيه في الهدف العام الذي قصد إليه هذا الشخص الطبيعي، أو المعنوي بحيث لا يمكن فصل عمل كل من المشتركين وتمييزه على حدة . المصنف السمعي : أي تثبيت سمعي لأداء أو صوت معين مهما كانت طريقة التثبيت. المصنف السمعي البصري: أي مصنف معد للسمع والنظر في آن واحد، يتكون من مجموعة من الصور المترابطة والمصحوبة بأصوات والمسجلة على دعامة ملائمة، ويعرض بواسطة أجهزة مناسبة. المصنف المشتق : كل مصنف يوضع استنادًا إلى مصنف آخر سابق له. المؤلف: هو الشخص الذي ابتكر المصنف. المؤدون: هم الأشخاص الذين يمثلون، أو يلقون، أو ينشدون، أو يلعبون أدوارًا، أو يشتركون بالأداء بأي طريقة أخرى في المصنفات
    الأدبية أو الفنية. النشر: توفير نسخ من المصنف لتلبية حاجات الجمهور. النسخ: إنتاج نسخة. أو أكثر من أحد المصنفات الأدبية، أو الفنية، أو العلمية على دعامة مادية، بما في ذلك أي تسجيل صوتي، أو بصري. التراث الشعبي (الفولكلور): يقصد به جميع المصنفات الأدبية، أو الفنية، أو العلمية التي يفترض أنها ابتكرت في الأراضي السعودية، وانتقلت من جيل إلى جيل، وتشكل جزءًا من التراث الثقافي أو الفني التقليدي السعودي. الإذاعة: بث مصنف أو أداء أو تسجيل صوتي أو بصري للجمهور بالطرق السلكية أو اللاسلكية أو أي وسيلة ناقلة لكي يستقبلها الجمهور، بما في ذلك البث بالأقمار الصناعية. اللجنة: اللجنة المختصة للنظر في المخالفات الناشئة عن تطبيق أحكام هذا النظام. الوزارة: وزارة الثقافة والإعلام . الوزير: وزير الثقافة والإعلام . اللائحة التنفيذية: اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثانية: المصنفات الأصلية'
  article_text_ar: 'يحمي هذا النظام المصنفات المبتكرة في الآداب والفنون والعلوم، أيًّا كان نوع هذه المصنفات، أو طريقة التعبير عنها، أو أهميتها، أو الغرض من تأليفها؛ مثل: 1 - المواد المكتوبة كالكتب، والكتيبات، وغيرها. 2 - المصنفات التي تلقى شفهيًّا كالمحاضرات، والخطب، والأشعار، والأناشيد، وما يماثلها. 3 - المؤلفات المسرحية، والتمثيليات، والاستعراضات، ونحو ذلك من العروض التي تؤدى بالحركة، أو بالصوت، أو بهما معًا. 4 - المصنفات التي تعد خصيصًا لتذاع ، أو تعرض بواسطة الإذاعة. 5 - أعمال الرسم، وأعمال الفن التشكيلي ، والعمارة، والفنون الزخرفية، والحياكة الفنية، ونحوها. 6 - المصنفات السمعية ، والسمعية البصرية. 7 - أعمال الفنون التطبيقية سواء أكانت حرفية أم صناعية. 8 - أعمال التصوير الفوتوغرافي، أو ما يماثله. 9 - الصور التوضيحية، والخرائط الجغرافية، والتصاميم، والمخططات، والرسوم (الكروكية)، والأعمال التشكيلية المتصلة بالجغرافيا، والطبوغرافيا، وفن العمارة والعلوم. 10 - المصنفات المجسمة المتعلقة بالجغرافيا، أو الطبوغرافيا، أو العمارة، أو العلوم. 11 - برمجيات الحاسب الآلي. 12 - تشمل الحماية كذلك عنوان
    المصنف إذا كان متميزًا بطابع ابتكاري، ولم يكن لفظًا جاريًا للدلالة على موضوع المصنف .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثالثة: المصنفات المشتقة'
  article_text_ar: 'يحمي هذا النظام أيضاً : 1 - مصنفات الترجمة. 2 - مصنفات التلخيص ، أو التعديل، أو الشرح، أو التحقيق، أو غير ذلك من أوجه التحوير. 3 - الموسوعات، والمختارات التي تعد مبتكرة من حيث اختيار محتوياتها أو ترتيبها، سواء أكانت مصنفات أدبية، أم فنية، أم علمية. 4 - مجموعات المصنفات والتعبيرات (الفلكلورية) للتراث الشعبي التقليدي والمختارات منها إذا كانت هذه المجموعات مبتكرة من حيث اختيار محتوياتها، أو ترتيبها. 5 - قواعد البيانات سواء أكانت بشكل مقروء آليًّا أم بأي شكل آخر، والتي تعد مبتكرة من حيث اختيار أو ترتيب محتوياتها. ولا تخل الحماية التي يتمتع بها أصحاب المصنفات المذكورة في الفقرات أعلاه بالحماية التي يتمتع بها مؤلفو المصنفات الأصلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الرابعة: المصنفات المستثناة من الحماية'
  article_text_ar: 'لا تشمل الحماية المقررة بمقتضى هذا النظام: 1 - الأنظمة والأحكام القضائية ، وقرارات الهيئات الإدارية ، والاتفاقيات الدولية، وسائر الوثائق الرسمية، وكذلك الترجمات الرسمية لهذه النصوص، مع مراعاة الأحكام الخاصة بتداول هذه الوثائق.2 - ما تنشره الصحف، والمجلات، والنشرات الدورية، والإذاعة من الأخبار اليومية، أو الحوادث ذات الصبغة الإخبارية. 3 - الأفكار، والإجراءات، وأساليب العمل، ومفاهيم العلوم الرياضية، والمبادئ، والحقائق المجردة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الخامسة: المؤلفون'
  article_text_ar: '1- يعد مؤلفًا أي شخص نشر المصنف منسوبًا إليه، سواء بذكر اسمه على المصنف، أم بأي طريقة من الطرق المتبعة في نسبة المصنفات لمؤلفيها، إلا إذا دل دليل على عكس ذلك. 2 - يكون الناشر الذي يظهر اسمه على المصنف ممثلًا للمؤلف إذا نشر المصنف باسم مستعار، أو بدون اسم المؤلف. 3 - يكون مؤلفًا للمصنف السمعي، والمصنف السمعي البصري الأشخاص الذين شاركوا في ابتكار هذا المصنف، مثل : أ - مؤلف النص. ب - واضع السيناريو. ج - واضع الحوار. د - المخرج. هـ - الملحن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة السادسة: المصنفات المشتركة والجماعية'
  article_text_ar: 1- إذا اشترك شخصان أو أكثر في تأليف مصنف بحيث لا يمكن فصل إسهام أي منهم في المصنف فإنهم يعدون جميعًا شركاء بالتساوي في ملكية المصنف ، ولا يجوز لأي منهم منفردًا مباشرة حقوق المؤلف المقررة بمقتضى هذا النظام، ما لم يتفق كتابة على خلاف ذلك.ولكل واحد من المشتركين في التأليف الحق في اتخاذ الإجراءات التحفظية والمستعجلة عند وقوع تعد على المصنف، وله الحق في المطالبة بالتعويض عن نصيبه لقاء الضرر الذي لحقه بسبب التعدي.2- إذا اشترك شخصان أو أكثر في تأليف مصنف بحيث يمكن فصل إسهام كل منهم في المصنف المشترك، كان لكل منهم الحق في استغلال الجزء الخاص به على حدة، بشرط ألا يضر ذلك باستغلال المصنف المشترك، ما لم يتفق على غير ذلك.3- يكون للشخص الطبيعي أو المعنوي الذي وجه أو نظم ابتكار المصنف الجماعي وحده الحق في مباشرة حقوق المؤلف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة السابعة: التراث الشعبي (الفلكلور)'
  article_text_ar: 1- يعد التراث الشعبي ملكًا عامًّا للدولة، وتمارس الوزارة حقوق المؤلف عليه. 2- يحظر استيراد أو توزيع نسخ مصنفات التراث الشعبي، أو نسخ ترجمات أو غيرها المنتجة خارج المملكة دون ترخيص من الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثامنة: الحقوق الأدبية'
  article_text_ar: '1 - للمؤلف الحق في ممارسة أي من التصرفات الآتية : أ - نسبة المصنف إليه، أو نشره باسم مستعار، أو بدون اسم. ب - الاعتراض على أي تعد على مصنفه، ومنع أي حذف، أو تغيير، أو إضافة، أو تحريف، أو تشويه، أو كل مساس آخر بذات المصنف. ج - إدخال ما يراه من تعديل أو إجراء أي حذف على مصنفه. د - سحب مصنفه من التداول. 2 - الحقوق الأدبية الواردة في الفقرة (1) من هذه المادة هي حقوق أبدية للمؤلف، ولا تقبل التنازل، ولا تسقط بالتقادم. 3 - تبقى الحقوق الأدبية لصاحبها، ولا تسقط بمنح حق استغلال المصنف بأي وجه من وجوه الاستغلال. 4 - الحقوق الأدبية المنصوص عليها في هذا النظام تؤول إلى الوزارة في حال وفاة صاحب الحق دون وارث له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة التاسعة: الحقوق المالية'
  article_text_ar: 'أولاً : للمؤلف أو من يفوضه حق القيام بكل التصرفات الآتية أو بعضها حسب طبيعة المصنف: 1 - طبع المصنف ونشره على شكل مقروء، أو تسجيله على أشرطة مسموعة أو مرئية، أو أسطوانات مدمجة، أو ذاكرة إلكترونية، أو غير ذلك من وسائل النشر. 2 - ترجمة المصنف إلى لغات أخرى، أو اقتباسه، أو تحويره، أو إعادة توزيع المادة المسموعة، أو المرئية. 3 - نقل المصنف إلى الجمهور بأي وسيلة ممكنة، مثل العرض، أو التمثيل، أو البث الإذاعي، أو عبر شبكات المعلومات. 4 - جميع أشكال الاستغلال المادي لمصنف بوجه عام، بما في ذلك التأجير التجاري المسموح به. ثانياً : يتمتع مؤلفو المصنفات الأدبية والفنية ومؤدوها ومعدوها ومنتجو التسجيلات السمعية وهيئات الإذاعة بحقوقهم المالية وفق ما توضحه اللائحة التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة العاشرة: التعويض عند سحب المصنف'
  article_text_ar: يلتزم المؤلف بالامتناع عن أي عمل من شأنه تعطيل استغلال الحق المأذون به للغير، ومع ذلك يجوز للمؤلف سحب مصنفه من التداول، أو تعديله، أو الحذف منه، أو الإضافة إليه، بعد الاتفاق مع المأذون له بمباشرة الحق، وفي حالة عدم الاتفاق يلزم المؤلف بتعويض المأذون له بمباشرة الحق، وفق ما تحدده اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الحادية عشرة: انتقال ملكية حقوق المؤلف'
  article_text_ar: 1- حقوق المؤلف المنصوص عليها في هذا النظام قابلة للانتقال كلها، أو بعضها سواء بطريق الإرث ، أو التصرف النظامي، الذي يجب إثباته بالكتابة، ويكون محددًا لنطاق الحق المنقول زمانًا ومكانًا. 2- تنتقل الحقوق المقررة بمقتضى هذا النظام لورثة المؤلف من بعده، عدا إجراء تعديل أو حذف على المصنف. 3- إذا كان المؤلف قد أوصى بمنع النشر، أو بتعيين موعد له، وجب تنفيذ وصيته في حدودها. 4- إذا كان المصنف عملًا فرديًّا وتوفي صاحبه، أو عملًا مشتركًا وتوفي أحد المؤلفين ولم يكن له وارث، فإن نصيبه يؤول إلى من يستحقه حسب أحكام الشريعة الإسلامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثانية عشرة: التنازل عن الإنتاج المستقبلي'
  article_text_ar: يعد تنازل المؤلف عن مجموع إنتاجه الفكري المستقبلي باطلًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثالثة عشرة: تنظيم العلاقات التعاقدية'
  article_text_ar: 1 - يجب على أصحاب الحقوق تنظيم علاقاتهم وحقوقهم مع مؤسسات الإنتاج والطباعة والنشر والتوزيع، وهيئات الإذاعة، وغيرها من الجهات المرخص لها بمزاولة أنشطتها، بموجب عقود موثقة تحدد جميع الحقوق والالتزامات لجميع الأطراف أصحاب العلاقة. 2 - يجب على مؤسسات الإنتاج والطباعة والنشر والتوزيع وهيئات الإذاعة وغيرها عدم ممارسة أي نشاط له علاقة بحقوق المؤلف إلا بعد إبرام عقد مع أصحاب حقوق المؤلف أو وكيلهم الشرعي تحدد فيه حقوق والتزامات كل طرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الرابعة عشرة: استمرارية العقود'
  article_text_ar: يلتزم ورثة المؤلف بالعقود التي أبرمها مورثهم في حياته، بما فيها من حقوق والتزامات للغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الخامسة عشرة: استثناءات'
  article_text_ar: 'تعد أوجه الاستخدام الآتية للمصنف المحمي بلغته الأصلية، أو بعد الترجمة مشروعة، وذلك دون الحصول على موافقة أصحاب حقوق المؤلف، وهذه الأوجه هي : 1 - نسخ المصنف للاستعمال الشخصي، عدا برمجيات الحاسب الآلى، والمصنفات السمعية ، والسمعية البصرية . 2 - الاستشهاد بفقرات من ذلك المصنف في مصنف آخر، بشرط أن يكون الاستشهاد متمشيًّا مع العرف، وأن يكون بالقدر الذي يسوغه الهدف المنشود، وبشرط أن يذكر المصدر، واسم المؤلف في المصنف الذي يرد فيه الاستشهاد. وينطبق ذلك أيضًا على الخلاصات الصحفية المنقولة من الصحف والدوريات. 3 - الاستعانة بالمصنف للأغراض التعليمية على سبيل الإيضاح في حدود الهدف المنشود، أو تصوير نسخة أو نسختين للمكتبات العامة أو مراكز التوثيق غير التجارية، ويكون بشروط : أ - ألا يتم بشكل تجاري أو ربحي. ب - أن يكون النسخ مقصورًا على حاجة الأنشطة. ج - ألا يضر بالاستفادة المادية من المصنف. د - أن يكون المصنف قد نفد، أو فقدت إصداراته، أو تلفت. 4 - نقل أو نسخ المقالات المنشورة في الصحف والدوريات عن موضوعات جارية، أو المصنفات المذاعة ذات الطابع المماثل، بشرط ذكر المصدر بوضوح واسم المؤلف
    إن وجد. 5 - نسخ أي مصنف إذاعي يمكن أن يشاهد أو يسمع بمناسبة عرض أحداث جارية عن طريق التصوير الثابت أو المتحرك، بشرط أن يكون ذلك في حدود الهدف المراد تحقيقه، مع ضرورة الإشارة إلى المصدر بصورة واضحة. 6 - نسخ الخطب، والمحاضرات، والمرافعات القضائية، أو غيرها من المصنفات المشابهة المعروضة علنًا على الجمهور، وذلك إذا تم النسخ من قبل وسائل الإعلام مع ذكر اسم المؤلف بوضوح، وللمؤلف أن يحتفظ بحق نشر هذه المصنفات بالطريقة التي يراها. 7 - إنتاج تسجيلات مؤقتة من قبل هيئات البث الإذاعي، وبوسائلها الخاصة- دون إلحاق الضرر بحقوق المؤلف- في نسخة واحدة أو أكثر لأي مصنف محمي يرخص لها بأن تذيعه أو تعرضه، على أن تتلف جميع النسخ في مدة لا تتجاوز سنة من تاريخ إعدادها، أو مدة أطول يوافق عليها المؤلف، ويجوز الاحتفاظ بنسخة من هذا التسجيل ضمن محفوظات رسمية إذا كان تسجيلًا وثائقيًّا فريدًا. 8 - عزف، أو تمثيل، أو أداء، أو عرض أي مصنف بعد نشره من قبل الفرق التابعة للدولة، أو الأجهزة ذوات الشخصية المعنوية العامة، أو المسرح المدرسي، ما دام هذا الإيقاع أو الأداء لا يأتي بأي حصيلة مالية بطريقة مباشرة أو غير مباشرة. 9
    - نقل مقتطفات قصيرة من مصنفات سبق نشرها، أو رسوم، أو صور، أو تصميمات، أو خرائط إلى الكتب المدرسية المعدة لمناهج التعليم، أو إلى كتب التاريخ، والأدب والفنون، على أن يقتصر النقل على قدر الضرورة، وأن يذكر اسم المصنف، واسم المؤلف. 10 - التقاط صور جديدة لأي موضوع أو عمل سبق تصويره فوتوغرافيا، ونشر تلك الصور، حتى ولو أخذت الصور الجديدة من المكان نفسه، وفي الظروف نفسها التي أخذت فيها الصور. 11 - نقل أجزاء من المقالات والمصنفات العلمية، من قبل المؤسسات البحثية لأغراضها الداخلية، أو للإيفاء بمتطلبات من يقوم بإعداد الدراسات والبحوث، مع ذكر المصدر. 12 - نسخ نسخة واحدة احتياطية من برمجيات الحاسب الآلي للأشخاص الذين يمتلكون نسخة أصلية بغرض حماية الأصل المنتج منها، مع إبقاء النسخة الأصلية لدى المستخدم لإبرازها حال طلبها. وتبين اللائحة التنفيذية تفصيل الظروف إلى ينبغي توافرها لهذه الاستثناءات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة السادسة عشرة: التراخيص الإلزامية'
  article_text_ar: '1 - يجوز للوزير منح ترخيص نشر للمصنف بعد مضي مدة تحددها اللائحة التنفيذية لكل حالة، إذا رأى أن المصلحة العامة تقتضي نشر هذا المصنف، وذلك في الحالات الآتية : أ ‌- إذا لم تتوافر نسخ من المصنف المنشور بلغته الأصلية في المملكة من قبل صاحب الحق لتلبية الاحتياجات العامة للجمهور أو التعليم المدرسي والجامعي بثمن مقارب لثمن المصنفات المشابهة في المملكة، وذلك بعد امتناعه من توفير نسخ منه. ب‌ - إذا نفدت جميع الطبعات للمصنف الأصلي أو ترجمته إلى اللغة العربية دون أن يقوم صاحب الحق بتوفير المصنف بعد الطلب منه. ج - إذا لم تنشر ترجمة لهذا المصنف بواسطة صاحب حق الترجمة أو بتصريح منه، على أن يكون الغرض الاستفادة من هذه الترجمة في المناهج التعليمية. د - إذا امتنع ورثة المؤلف السعودي أو من يخلفه عن ممارسة الحقوق التي انتقلت إليهم بموجب المادة الحادية عشرة من هذا النظام، وذلك خلال سنة من تاريخ الطلب إذا لم يكن لديهم عذر مقبول. 2 - تنتهي صلاحية الترخيص إذا نشر المصنف أو الترجمة من قبل صاحب الحق أو بتصريح منه. 3 - للوزير تحديد مكافأة مالية يدفعها المرخص له لأصحاب الحقوق عن كل ترخيص يتم إصداره،
    ويحق لهم التظلم من قراره أمام ديوان المظالم. وتحدد اللائحة التنفيذية الإجراءات والشروط التي يجب توفرها في طلب الترخيص الإلزامي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة السابعة عشرة: محظورات الاستفادة من بعض المصنفات'
  article_text_ar: 1- لا يحق لمن قام بإنتاج صورة أن ينشر أو يعرض أو يوزع أصل الصورة، أو نسخًا منها دون إذن الأشخاص الذين قام بتصويرهم، أو إذن ورثتهم، ولا يسري هذا الحكم إذا كان نشر تلك الصورة قد تم بمناسبة حوادث وقعت علنًا، أو تعلقت بموظفين رسميين، أو أشخاص ذوي شهرة عامة، أو سمحت بها السلطات العامة خدمة للصالح العام، وللشخص الذي تمثله الصورة أن يأذن بنشرها في الصحف، والمجلات، وغيرها من النشرات المماثلة حتى ولو لم يأذن بذلك المصور، وتسري هذه الأحكام على الصورة أيًّا كانت الطريقة التي عملت بها. 2- للمؤلف وحده الحق في نشر رسائله، ويشترط لممارسة هذا الحق الحصول على إذن المرسل إليه إذا كان من شأن هذا النشر أن يلحق به ضررًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثامنة عشرة: نطاق الحماية'
  article_text_ar: 'تسري أحكام هذا النظام على ما يأتي : أولاً : 1 - مصنفات المؤلفين السعوديين، وغير السعوديين التي تنشر، أو تنتج، أو تمثل أو تعرض لأول مرة في المملكة العربية السعودية. 2 - مصنفات المؤلفين السعوديين التي تنشر، أو تنتج، أو تمثل، أو تعرض لأول مرة خارج المملكة. ثانياً : مصنفات هيئات الإذاعة ، ومنتجي التسجيلات الصوتية ، والمؤدين. ثالثاً : المصنفات المتمتعة بالحماية بموجب الاتفاقيات أو المعاهدات الدولية لحماية حقوق المؤلفين التي تكون المملكة طرفًا فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة التاسعة عشرة: مدة الحماية'
  article_text_ar: 'أولاً : 1 - تكون حماية حق المؤلف في المصنف مدى حياة المؤلف، ولمدة خمسين سنة بعد وفاته. 2 - تحسب مدة الحماية للمصنفات المشتركة من تاريخ وفاة آخر من بقي حيًّا من مؤلفيها. 3 - مدة الحماية للمصنفات التي يكون المؤلف لها شخصًا اعتباريًّا أو مجهول الاسم هي خمسون سنة من تاريخ أول نشر للمصنف، وإذا عرف اسم المؤلف قبل نهاية الخمسين سنة فإن مدة الحماية هي المدة المنصوص عليها في الفقرة (1) من هذا البند. 4 - إذا كان المصنف مكونًا من عدة أجزاء أو مجلدات بحيث تنشر منفصلة أو على فترات، فيعد كل جزء أو مجلد منها مصنفًا مستقلًّا بالنسبة لحساب مدة الحماية. 5 - مدة الحماية بالنسبة إلى المصنفات السمعية ، والسمعية البصرية ، والأفلام، والمصنفات الجماعية، وبرمجيات الحاسب الآلي هي خمسون سنة من تاريخ أول عرض أو نشر للمصنف، بغض النظر عن إعادة النشر. 6 - مدة الحماية لأعمال الفنون التطبيقية (سواء كانت حرفية أو صناعية)، والصور الفوتوغرافية هي خمس وعشرون سنة من تاريخ النشر، ويبدأ حساب المدة في هذه الحالة من تاريخ أول نشر للمصنف بغض النظر عن إعادة النشر. ثانياً : 1 - مدة الحماية لهيئات الإذاعة عشرون سنة
    من تاريخ أول بث للبرامج أو المواد المذاعة. 2 - مدة الحماية لمنتجي التسجيلات السمعية والمؤدين خمسون سنة من تاريخ الأداء أو أول تسجيل لها بحسب الحال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة العشرون: سريان الحماية على المصنفات السابقة للنظام'
  article_text_ar: تتمتع بالحماية المصنفات الأدبية والفنية والعلمية والتسجيلات السمعية وبرامج الإذاعة التي يرجع تاريخ نشرها إلى ما قبل بدء سريان هذا النظام، وفق المدد المحددة بالمادة التاسعة عشرة من هذا النظام، على ألا تكون مدة الحماية قد انقضت بمقتضى النظام السابق ولم تسقط عنها الحماية في دول المنشأ التي ترتبط مع المملكة باتفاقيات أو معاهدات دولية لحماية حقوق المؤلفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الحادية والعشرون: المخالفات'
  article_text_ar: 'تعد التصرفات الآتية تعديًا على الحقوق التي يحميها النظام : 1 - القيام بنشر مصنف غير مملوك لمن قام بالنشر، أو نشره مدعيًا ملكيته، أو دون حصوله على إذن كتابي أو عقد من مؤلف المصنف أو ورثته أو من يمثلهم. 2 - تعديل محتويات المصنف أو طبيعته أو موضوعه أو عنوانه دون علم المؤلف وموافقته الخطية المسبقة على ذلك، سواء كان هذا التعديل من قبل الناشر أو المنتج أو الموزع أو غيرهم. 3 - قيام المنتج أو الناشر أو الطابع بإعادة طبع المصنف دون الحصول على موافقة خطية مسبقة من صاحب الحق، أو لم يكن لديه من الوثائق ما يخوله إعادة الطبع. 4 - إزالة أي معلومة كتابية وإلكترونية قد تتسبب في إسقاط حقوق أصحاب المصنف. 5 - إزالة وفك أي معلومة احترازية إلكترونية تضمن استخدام النسخ الأصلية للمصنف، مثل التشفير، أو المعلومات المدونة بالليزر، أو غيره. 6 - الاستخدام التجاري للمصنفات الفكرية بطرق التحايل التي لا تسمح بها الجهة صاحبة الحق، مثل استخدام البرمجيات المنسوخة، أو التقاط البرامج الإذاعية المشفرة بطرق غير نظامية. 7 - تصنيع أو استيراد أدوات لغرض البيع أو التأجير لأي وسيلة من شأنها تسهيل استقبال أو استغلال
    مصنفات بطرق غير الطرق التي تحددها الجهة صاحبة الحقوق. 8 - نسخ أو تصوير أجزاء من كتاب أو مجموعة كتب أو أجزاء من أي مصنف بعوض أو بدون عوض دون الحصول على الموافقات الخطية من أصحاب الحق والجهات المعنية في الوزارة، باستثناء حالات النسخ المشروعة المبينة في المادة الخامسة عشرة من هذا النظام . 9 - استيراد المصنفات المزورة، أو المقلدة، أو المنسوخة. 10 - الاحتفاظ بمصنفات غير أصلية في المنشأة التجارية أو المستودع أو غير ذلك من المواقع التابعة لها بطريقة مباشرة أو غير مباشرة بأي حجة كانت. 11 - الاعتداء على أي حق من الحقوق المحمية المنصوص عليها في هذا النظام، أو ارتكاب مخالفة لأي حكم من أحكامه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثانية والعشرون: العقوبات'
  article_text_ar: 'أولاً : يعاقب كل من خالف حكمًا من أحكام هذا النظام بعقوبة أو أكثر من العقوبات الآتية : 1 - الإنذار. 2 - غرامة مالية لا تزيد على مائتين وخمسين ألف ريال. 3 - إغلاق المنشأة المتعدية أو التي ساهمت في الاعتداء على حق المؤلف مدة لا تزيد على شهرين. 4 - مصادرة جميع نسخ المصنف، وكذا المواد المخصصة أو المستخدمة في ارتكاب التعدي على حق المؤلف. 5 - السجن مدة لا تزيد على ستة أشهر. ثانياً : في حال تكرار التعدي على المصنف نفسه أو غيره تجوز مضاعفة الحد الأعلى للعقوبة والغرامة والإغلاق. ثالثاً : إذا رأت اللجنة أن المخالفة تستوجب عقوبة السجن أو غرامة مالية تزيد على مائة ألف ريال أو تستوجب شطب الترخيص، ترفع الموضوع للوزير لإحالته إلى ديوان المظالم. رابعاً : يجوز للجنة أن تقرر تعويضًا ماليًّا لصاحب حق المؤلف المعتدى عليه الذي يتقدم بالشكوى، ويكون التعويض متناسبًا مع حجم الاعتداء والضرر الذي لحق به. خامساً : يجوز للجنة أن تضمِّن قرارها عقوبة التشهير بحق المعتدي، ويكون النشر على نفقته وبالطريقة التي تراها اللجنة مناسبة. سادساً : يجوز للجنة أن تُضمِّن قرارها تعليق مشاركة المنشأة المعتدية في
    الأنشطة أو المناسبات أو المعارض إذا ضبطت المخالفة في مناسبة تجارية، على ألا تزيد مدة التعليق على عامين. سابعاً: يجوز للجنة أن تصدر قرارًا مؤقتًا بوقف طبع المصنف المعتدى عليه، أو إنتاجه، أو نشره، أو توزيعه، وإجراء الحجز التحفظي على النسخ والمواد والصور التي استخرجت منه، أو القيام بأي إجراء مؤقت تراه ضروريًّا لحماية حق المؤلف، وذلك إلى حين الفصل النهائي في الشكوى أو التظلم. وتحدد اللائحة التنفيذية إجراءات الحجز التحفظي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الثالثة والعشرون: التظلم'
  article_text_ar: يحق لمن صدر ضده قرار من اللجنة التظلم منه أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغه بهذا القرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الرابعة والعشرون: ضبط المخالفات'
  article_text_ar: يتولى الموظفون المختصون بالوزارة ضبط المخالفات، وزيارة المنشآت الإعلامية والتجارية والمستودعات والمؤسسات العامة والخاصة التي تستخدم المصنفات الفكرية في أنشطتها، والتحقيق فيها، ويكون لهم صفة الضبط القضائي، وتحريز أي أدلة ثبوتية. وتحدد اللائحة التنفيذية الإجراءات والقواعد التي يلتزم بها هؤلاء الموظفون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة الخامسة والعشرون: لجنة النظر في المخالفات'
  article_text_ar: 1 - تكون بقرار من الوزير لجنة للنظر في المخالفات لا يقل عدد أعضائها عن ثلاثة، على أن يكون أحدهم مستشارًا قانونيًّا، والآخر مستشارًا شرعيًّا. 2 - تصدر قرارات اللجنة بالأغلبية، ويتم اعتمادها من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67d159e6-ee98-4efc-a2ee-a9a700f17083/1
  verified: false
- article_ref: 'المادة السادسة والعشرون: إصدار اللائحة التنفيذية'
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام خلال ستة أشهر، وتنشر في الجريدة الرسمية.
