regulation:
  code: BOE226
  name_ar: نظام المعادن الثمينة والأحجار الكريمة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تتولى وزارة التجارة الإشراف والرقابة على تجارة وصناعة المعادن الثمينة ومشغولاتها والأصناف المطلية والملبسة والمطعمة بها، وكذلك الأحجار الكريمة ولها على الأخص: أ - فحص وتحليل ودمغ ومراقبة مشغولات المعادن الثمينة والأصناف المطلية أو الملبسة أو المطعمة بها، والمنتجات المستخدمة فيها المعادن الثمينة أو الأحجار الكريمة.ب - تحليل وترقيم المعادن الثمينة غير المشغولة أو مزيجها أو سبائكها المقدمة للفحص ودمغها بسمة المملكة.ج - فحص ومراقبة الأحجار الكريمة وتحديد أنواعها التي يطبق عليها هذا النظام.د - تحديد العيارات النظامية لدرجة نقاء المعادن الثمينة.هـ - تحديد شكل وأوصاف سمة المملكة التي تدمغ بها المعادن الثمينة ومشغولاتها.و- تحديد أنواع المشغولات المصاغة كلها أو جزء منها من المعادن الثمينة المستثناة من أحكام هذا النظام.ز- تحديد الرسوم التي تدفع مقابل الفحص والتحليل والدمغ وإصدار الشهادات.ح - تحديد شروط وإجراءات الدمغ والفحص والتحليل للأصناف الخاضعة لأحكام هذا النظام.ط - تحديد شروط مزاولة تجارة وصناعة الأصناف الخاضعة لأحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: مع مراعاة ما تقضي به الأنظمة الأخرى لا تجوز مزاولة تجارة أو صناعة المعادن الثمينة والأحجار الكريمة إلا بعد الحصول على ترخيص بذلك من وزارة التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يحظر البيع أو العرض أو الحيازة بقصد البيع للأصناف المطلية بالمعادن الثمينة، أو التي تقل عن الحد الأدنى للعيارات النظامية إلا وفقًا للتعليمات التي يصدر بها قرار من وزير التجارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يحظر بيع سبائك ومشغولات المعادن الثمينة أو عرضها أو حيازتها بقصد البيع ما لم تكن مدموغة بسمة المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تقوم الجهات المختصة بالجمارك أو البريد - بعد إخطار صاحب الشأن - بإرسال الطرود المحتوية على سبائك أو مشغولات المعادن الثمينة، وغيرها من الأصناف الخاضعة لأحكام هذا النظام المستوردة من الخارج بقصد التجارة إلى الجهة المختصة بوزارة التجارة لفحصها وتحليلها ودمغها بسمة المملكة، أو للتأكد من أنها مدموغة بسمة معترف بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تقدم سبائك ومشغولات المعادن الثمينة إلى الجهة المختصة بوزارة التجارة لفحصها ودمغها طبقًا للعيارات النظامية. فإذا تبين أنها تقل عن الحد الأدنى للعيارات النظامية تكسر وترد إلى مالكها، وله في كل الأحوال طلب إعادة تصديرها إلى مصدرها على حالتها إذا كانت مستوردة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز إحداث أي تغيير في سبائك أو مشغولات المعادن الثمينة بعد دمغها من قبل وزارة التجارة بسبب عمليات إعدادها للبيع إلا ما توجبه ضرورات الصناعة وطبقًا للتعليمات التي تصدرها وزارة التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يحظر بيع مشغولات المعادن الثمينة والأصناف الملبسة أو المطعمة أو المطلية أو عرضها للبيع أو حيازتها بقصد البيع ما لم تكن مدموغة على النحو التالي: أ - تدمغ مشغولات المعادن الثمينة وفقًا لعيارها بأحد العيارات النظامية التي تقررها وزارة التجارة . ب - تدمغ الأصناف الملبسة والمطعمة برقم يبين نسبة المعدن الثمين النقي الذي تحتويه مقرونًا ببيان نوعه.ج - تدمغ الأصناف المطلية بكلمة " مطلي ".وإذا لم يسمح حجم الأصناف الملبسة أو المطعمة بالدمغ على النحو المذكور؛ تصحب كل قطعة ببطاقة تحمل البيانات المذكورة مضافًا إليها اسم صاحب المحل باللغة العربية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجوز لوزارة التجارة إصدار قرار باعتماد دمغة إحدى الدول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجوز لوزارة التجارة إلزام أصحاب مشاغل المعادن الثمينة باستخدام علامات دمغ؛ لتمييز مشغولاتهم تسجل لدى الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يحظر بيع الأحجار الكريمة أو عرضها للبيع أو حيازتها بقصد البيع ما لم تكن مصحوبة بقرار كتابي من صاحب الشأن يوضح فيه اسم الحجر وصنفه ووزنه ولونه ومستوى جودته؛ من حيث درجة النقاء وخواصه وسلامته من الكسر والخدش وتحديد أي عيوب أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجوز إقامة معارض مشغولات المعادن الثمينة والأحجار الكريمة وغيرها من الأصناف الخاضعة لهذا النظام بترخيص مؤقت من وزير التجارة وفقًا للشروط والإجراءات التي تحددها وزارة التجارة بالاتفاق مع وزارة المالية والاقتصاد الوطني. ويجوز استثناء المعروضات من الدمغ وبعض الإجراءات الأخرى المنصوص عليها في هذا النظام إذا كان القصد عرضها فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يعين وزير التجارة الموظفين المختصين بمراقبة تنفيذ أحكام هذا النظام ولوائحه، ويكون لهم حق دخول وتفتيش المتاجر والمستودعات وجميع الأماكن التي توجد بها الأصناف الخاضعة لهذا النظام، ولهم أخذ العينات لفحصها وتحليلها وعليهم ضبط المخالفات وتحرير المحاضر اللازمة على أن يتم كل ذلك طبقًا للإجراءات التي تحددها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'يعاقب بالسجن مدة لا تزيد على سنتين وبغرامة لا تتجاوز أربعمائة ألف ريال أو بإحدى هاتين العقوبتين: أ - كل من غش أو خدع في نوع أو وزن أو عيار المعادن الثمينة أو الأصناف المطلية أو المطعمة أو الملبسة بها أو غش أو خدع في نوع الأحجار الكريمة أو صنفها أو وزنها أو مستوى جودتها.ب - كل من أحدث في المعادن الثمينة أو مشغولاتها بعد دمغها تعديلًا يجعلها غير مطابقة للعيار المدموغة به أو تعامل بها مع علمه بذلك.ج - كل من باع أو عرض أو حاز بقصد البيع سبائك المعادن الثمينة أو مشغولاتها غير المدموغة بالسمة النظامية.ويجوز الحكم بتعليق الترخيص وبغلق المحل مدة لا تتجاوز ثلاث سنوات في حال ارتكاب أي من المخالفات المتقدمة مرة ثانية خلال خمس سنوات من تاريخ صدور الحكم النهائي في المخالفة الأولى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعاقب بالسجن مدة لا تزيد على ستة أشهر وبغرامة لا تتجاوز تسعين ألف ريال، أو بإحدى هاتين العقوبتين كل من زاول تجارة أو صناعة المعادن الثمينة ومشغولاتها أو الأحجار الكريمة بدون ترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يعاقب بالسجن مدة لا تتجاوز شهرين وبغرامة لا تتجاوز ثلاثين ألف ريال أو بإحدى هاتين العقوبتين كل من منع أو تسبب في منع الموظفين المختصين بمراقبة تنفيذ هذا النظام ولوائحه من مباشرة واجباتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعاقب بغرامة لا تتجاوز مائتي ألف ريال كل من ارتكب مخالفة أخرى لأحكام هذا النظام ولوائحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: لا يخل توقيع العقوبات المنصوص عليها في هذا النظام بتوقيع أي عقوبة تقضي بها أنظمة أخرى كما لا يخل بحق المتضرر في الحصول على التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يجوز الحكم بنشر قرار العقوبة على نفقة مرتكب المخالفة بعد أن يصبح القرار نهائيًّا في جريدة محلية أو أكثر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يتم الفصل في مخالفات هذا النظام ولوائحه من قبل لجنة تشكل بقرار من وزير التجارة من ثلاثة أعضاء يكون من بينهم مستشار شرعي أو نظامي ويجوز التظلم من قرارات اللجنة أمام ديوان المظالم خلال مدة لا تتجاوز ستين يومًا من إبلاغ المحكوم عليه بقرار العقوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يصدر وزير التجارة اللوائح والقرارات اللازمة لتنفيذ أحكام هذا النظام بما في ذلك لائحة تحدد أنواع المعادن الثمينة والأحجار الكريمة التي تخضع له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يلغى هذا النظام نظام الصاغة الصادر بالأمر السامي رقم 8117 في 28 / 6 / 1360 هـ وكل ما يتعارض مع أحكامه. ويعمل به بعد تسعين يومًا من نشر لائحته التنفيذية في الجريدة الرسمية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f54d227-1450-4231-93cd-a9a700f29821/1
  verified: false
