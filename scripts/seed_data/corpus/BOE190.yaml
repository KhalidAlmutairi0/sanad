articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: النظام: نظام التوثيق. اللائحة: اللائحة التنفيذية للنظام. الوزير: وزير العدل. الوزارة: وزارة العدل. الإدارة المختصة: الجهة المختصة بشؤون التوثيق في الوزارة. التوثيق: مجموعة الإجراءات التي تكفل إثبات الحق على وجه يصح الاحتجاج به، وفقاً لأحكام النظام. كاتب العدل: موظف حكومي مؤهل تأهيلاً شرعياً، معين على وظيفة كاتب عدل، أو رئيس كتابة عدل، يختص بتوثيق العقود والإقرارات. الموثق: من يقوم بأعمال التوثيق بموجب رخصة صادرة وفق أحكام النظام. المأذون: من يقوم بتوثيق عقود النكاح بموجب رخصة صادرة وفق أحكام النظام. الرخصة: رخصة الموثق أو المأذون. المرخص له: الموثق أو المأذون. كتابة العدل: مقر عمل كاتب العدل. مكتب التوثيق: مقر عمل الموثق. وعاء التوثيق: النموذج أو الضبط المخصص للتوثيق، ويتضمن توقيعات ذوي الشأن. الجدول: جدول قيد المرخص لهم. ذوو الشأن: أطراف العقد أو المقِرّ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يطبق كاتب العدل والمرخص له أحكام الشريعة الإسلامية والأنظمة عند إجراء أي من أعمال التوثيق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون إنشاء كتابات العدل، وتحديد دوائر اختصاصها النوعي والمكاني وتكوينها، وإلغاؤها، بقرار يصدره الوزير، ويشرف رئيس كتابة العدل على كتاب العدل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يشترط فيمن يعين كاتب عدل ما يأتي: أن يكون سعودي الجنسية بالأصل. أن يكون حسن السيرة والسلوك، وألا يكون محكوماً عليه بجريمة مخلة بالدين أو الشرف، أو صدر في حقه قرار تأديبي بالفصل من وظيفة عامة، ولو كان قد رُدّ إليه اعتباره. أن يكون لائقاً صحيًا، وسليم الحواس. أن يكون حاصلاً على شهادة جامعية في تخصص الشريعة من إحدى الكليات في المملكة أو شهادة أخرى معادلة لها. أن يجتاز امتحاناً تحريريًا تعده الإدارة المختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يخضع كاتب العدل -بعد تعيينه- لدورة تدريبية تطبيقية في مجال عمله لا تقل مدتها عن (3) أشهر، وتكون مدة التجربة له سنتين من تاريخ مباشرته للعمل بعد صدور قرار تعيينه، وإذا لم تثبت صلاحيته للعمل خلال مدة التجربة يصدر الوزير قراراً بالاستغناء عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تصنف وظائف كُتاب العدل على النحو الآتي: كاتب عدل (د)، كاتب عدل (ج)، كاتب عدل (ب)، كاتب عدل (أ)، رئيس كتابة عدل (د)، رئيس كتابة عدل (ج)، رئيس كتابة عدل (ب)، رئيس كتابة عدل (أ).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تحدد المؤهلات المطلوبة لشغل وظائف كُتاب العدل على النحو الآتي: كاتب عدل (د): أن يكون حاصلاً على شهادة جامعية في تخصص الشريعة أو ما يعادلها بتقدير عام لا يقل عن (جيد). كاتب عدل (ج): أن يكون قد أمضى ثلاث سنوات في وظيفة كاتب عدل (د) أو حاصلاً على شهادة جامعية في تخصص الشريعة أو ما يعادلها بتقدير عام لا يقل عن (جيد) مع خبرة لا تقل عن ثلاث سنوات، أو حاصلاً على شهادة الماجستير في الشريعة أو ما يعادلها. كاتب عدل (ب): أن يكون قد أمضى أربع سنوات في وظيفة كاتب عدل (ج)، أو حاصلاً على شهادة جامعية في تخصص الشريعة أو ما يعادلها بتقدير عام لا يقل عن (جيد) مع خبرة لا تقل عن سبع سنوات، أو حاصلاً على شهادة الماجستير في الشريعة أو ما يعادلها مع خبرة لا تقل عن أربع سنوات، أو حاصلاً على شهادة الدكتوراه في الشريعة أو ما يعادلها. كاتب عدل (أ): أن يكون قد أمضى أربع سنوات في وظيفة كاتب عدل (ب)، أو حاصلاً على شهادة جامعية في تخصص الشريعة أو ما يعادلها بتقدير عام لا يقل عن (جيد) مع خبرة لا تقل عن إحدى عشرة سنة، أو حاصلاً على شهادة الماجستير في الشريعة أو ما يعادلها مع خبرة لا تقل عن ثماني سنوات،
    أو حاصلاً على شهادة الدكتوراه في الشريعة أو ما يعادلها مع خبرة لا تقل عن أربع سنوات. وتحدد اللائحة نوع الخبرة الواردة في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يشترط للترقية إلى وظيفة رئيس كتابة عدل (د) أن يكون المرشح قد أمضى سنتين على الأقل في وظيفة كاتب عدل (أ). يشترط للترقية إلى وظائف: رئيس كتابة عدل (أ) و(ب) و(ج) أن يكون المرشح قد أمضى سنتين على الأقل في الوظيفة التي قبلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يُصرف لمن يعين لأول مرة في الخدمة على إحدى وظائف كُتاب العدل بدل تعيين يعادل راتب ثلاثة أشهر للوظيفة المعين عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون رواتب كتاب العدل بجميع درجاتهم وفقًا لسلم رواتب خاص بهم يصدر بأمر ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يختص كاتب العدل بتوثيق العقود والإقرارات، وله على وجه خاص توثيق ما يأتي: الطلاق والخلع والرجعة. الصلح. عقد الزواج إذا كان أحد طرفيه سعودي الجنسية والآخر غير سعودي. اتفاق ذوي الشأن على الحضانة، أو النفقة، أو الزيارة. إنشاء الوقف والوصية. قسمة الأموال المشتركة -بما فيها العقار- إذا لم يكن فيها نزاع، أو حصة وقف أو وصية، أو قاصر، أو غائب. إقرار ذوي الشأن بالأموال المتلفة لأغراض التعويض عند الاقتضاء. إقرار من لا يحسن القراءة من ذوي الشأن. إفادة صاحب الشأن في الحالات الاجتماعية، والتصديق على شهادة الشهود عليها. إفراغ صكوك الملكية العقارية وصكوك الاستحكام المستكملة لإجراءاتها الشرعية والنظامية، وتحويل استخدام صك الاستحكام، ودمج صكوك الاستحكام وصكوك الملكية العقارية الصادرة من كتابات العدل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'لا يختص كاتب العدل بتوثيق أي إقرار أو عقد يكون أحد طرفيه قاصراً، أو غائباً، أو ناظر وقف أو وصية؛ إلا في الحالات الآتية: قبول الهبة. تصرفات الأب في مال ولده القاصر. إقرار البائع بالبيع على مورث القاصر وقبضه الثمن قبل وفاة المورث. ما ينزع من العقار للمنفعة العامة ما لم يكن البدل عقاراً. عقد تأجير مدته لا تتطلب الإذن من المحكمة المختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يتولى قناصل المملكة في الخارج أو من يقوم مقامهم بعض اختصاصات كاتب العدل، وفق ضوابط تصدر بقرار من الوزير بالتنسيق مع وزير الخارجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'يشترط في الموثق ما يأتي: أن يكون سعودي الجنسية. أن يكون حسن السيرة والسلوك، وألا يكون محكوماً عليه بجريمة مخلة بالدين أو الشرف، أو صدر في حقه قرار تأديبي بالفصل من وظيفة عامة، ولو كان قد رُدّ إليه اعتباره. أن يكون لائقاً صحيًا، وسليم الحواس. أن يكون حاصلاً على شهادة جامعية في تخصص الشريعة أو الأنظمة من إحدى الكليات في المملكة، أو ما يعادل أيًّا منها، وبتقدير عام لا يقل عن (جيد). أن يجتاز امتحاناً تحريريًا تعده الإدارة المختصة. أن يجتاز دورة تدريبية متخصصة في مجال التوثيق وفق ضوابط تحددها اللائحة، ما لم يكن قد عمل -مدة لا تقل عن سنة- قاضياً أو كاتب عدل أو محامياً أو مستشاراً شرعيًا أو نظاميًا أو درّس الفقه أو أصوله أو الأنظمة في إحدى كليات المملكة. ألاَّ يكون موظفاً في القطاع العام أو القطاع الخاص، ولا مزاولاً لأي مهنة أخرى عدا مهنة المحاماة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'دون إخلال بما ورد في المادتين (الحادية عشرة) و(الثانية عشرة) من النظام، يعهد إلى الموثق -وفق أحكام النظام- توثيق ما يأتي: إفراغ صكوك الملكية العقارية، وفقاً لما تبينه اللائحة. الوكالات وفسخها. الرهن وفكه وتعديله. عقود تأسيس الشركات، وملاحق التعديل، وقرارات ذوي الصلاحيات فيها. محاضر الجمعيات العمومية للشركات. التصرفات والعقود الواقعة على العلامات التجارية، وبراءات الاختراع، وحقوق المؤلف. العقود الواقعة على المال المنقول. إقرار الكفالة الحضورية والغرمية. الإقرار بالمبالغ المالية والمنقولات، وتسلمها، والتنازل عنها. ويجوز بقرار من مجلس الوزراء -بناء على اقتراح من الوزير- أن يُعهد إلى الموثق بعض اختصاصات كاتب العدل الأخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على الموثق البدء بمزاولة مهنته خلال مدة لا تزيد على مائة وعشرين يوماً من تاريخ صدور الرخصة، فإن لم يزاول المهنة، أو أراد التوقف عنها مدة تزيد على ستين يوماً، فيجب عليه أن يُبلغ الإدارة المختصة بذلك وفق النموذج المعدّ، ويؤشَّر في الجدول بالتوقف، ولا يعود إلى مزاولة المهنة إلاَّ بعد إشعار الإدارة المختصة، والتأشير في الجدول بعودته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجب على كل موثق أن يتخذ مكتباً لمزاولة مهنته وفقًا لما تحدده اللائحة، ويجوز تكوين شركة مهنية للتوثيق وفقاً لما يقضي به نظام الشركات المهنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يُعهد إلى المأذون بتوثيق عقود النكاح إذا كان كلا طرفيه سعوديين، أو غير سعوديين، وذلك وفقاً لما تبينه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'يُشترط في المأذون ما يأتي: أن يكون سعودي الجنسية. أن يكون حسن السيرة والسلوك، وألا يكون محكوماً عليه بجريمة مخلة بالدين أو الشرف، ما لم يكن قد مضى على انتهاء تنفيذ الحكم خمس سنوات على الأقل. أن يكون لائقاً صحيًا، وسليم الحواس. أن يكون حاصلاً على شهادة جامعية في العلوم الشرعية. أن يجتاز امتحاناً تحريريًا تعده الإدارة المختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تصدر الرخصة بقرار من الوزير بناء على توصية من الإدارة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يشكل الوزير لجنة للبت في طلبات الحصول على الرخص، تؤلف برئاسة وكيل من الوزارة، وعضوية مستشار شرعي ومستشار نظامي من الوزارة لا تقل مرتبة كل منهما عن المرتبة (العاشرة)، وتبت اللجنة في الطلب خلال (ثلاثين) يوماً من تاريخ تقديمه، على أن يكون القرار مسبباً في حالة رفض الطلب. ويجوز لصاحب الطلب التظلم أمام المحكمة المختصة من قرار رفضه أو عدم البت فيه خلال تلك المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تكون مدة الرخصة خمس سنوات قابلة للتجديد، وتحدد اللائحة الإجراءات والضوابط الواجب اتخاذها عند إصدار الرخصة، أو تجديدها، أو إعادة إصدارها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تقيد الرخص في الجدول لدى الإدارة المختصة، وتبين اللائحة كيفية القيد، وما يدرج فيه من بيانات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: للمرخص له الإعلان عن مهنته وفق ضوابط تعدها الإدارة المختصة، وتصدر بقرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يستحصل على إصدار الرخصة للموثق رسم قدره ألفا ريال، وألف ريال عند التجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يحظر ممارسة أعمال التوثيق إلا بعد الحصول على الرخصة وفقاً لأحكام النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: على كاتب العدل والمرخص له كتابة إقرارات ذوي الشأن بعد التحقق من أهليتهم وصفاتهم وهوياتهم، والتثبت من المستندات المقدمة منهم، وأنها صالحة للاعتماد عليها، وتبين اللائحة الإجراءات والمستندات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: على كاتب العدل والمرخص له الاستعانة بمترجم معتمد لمن لا يحسن العربية، ويوقع المترجم على ما قام به من ترجمة، ولا تجوز الاستعانة بمترجم له مصلحة فيما يوثق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: لا يجوز لكاتب العدل أو المرخص له توثيق ما يتعلق بمصلحته، أو مصلحة زوجه أو أصوله، أو فروعه أو من تحت ولايته ولو بصفة النيابة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: على كاتب العدل تلقي طلبات التوثيق، واتخاذ ما يلزم في شأنها، وفقاً لأحكام النظام ولائحته، ولمن رُفض طلبه حق التظلم لدى الإدارة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يقوم كاتب العدل بأعمال التوثيق في كتابة العدل، ولا ينتقل خارجها إلا وفق ضوابط تحددها الإدارة المختصة، أما الموثق فله أن ينتقل إذا طلب ذوو الشأن ذلك. وفي غير ما ذكر لا يجوز -بأي حال- إخراج وعاء التوثيق أو أي مستند رسمي محفوظ خارج كتابة العدل أو مكتب التوثيق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يُحظر على كاتب العدل والمرخص له إفشاء أسرار المعاملات وأي معلومة اطلعا عليها، أو تحصلا عليها بسبب عملهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يجب على المأذون -قبل إجراء عقد النكاح- التحقق من توافر الأركان والشروط وانتفاء الموانع في الزوجين وحضور الولي المقرر شرعاً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: تبين اللائحة إجراءات التوثيق لدى كتابة العدل، ولدى المرخص له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يجوز تدوين بيانات التوثيق إلكترونيًّا، ويكون لها حكم المحررات المكتوبة، وفقًا لأحكام نظام التعاملات الإلكترونية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: توثق العقود والإقرارات باللغة العربية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: على كاتب العدل والمرخص له اعتماد الوثائق الصادرة من خارج المملكة بعد التحقق من عدم مخالفتها للمقتضى الشرعي أو النظامي وتصديق الوزارة عليها، ويسري ذلك على أصل ترجمتها إلى اللغة العربية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: تكون مدة صك الوكالة خمس سنوات من تاريخ صدوره ما لم تفسخ أو يتوفى أحد طرفيها أو تزول أهليته قبل مضي هذه المدة أو يحدد الموكل مدتها بما يقل عن تلك المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: تُحفظ أوعية التوثيق في كتابة العدل ولدى المرخص لهم، وتحدد اللائحة ضوابط ذلك، وإجراءات تسليم أوعية التوثيق، ونسخ العقود الموثقة، والإدارات المختصة بتسلمها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: تكون أعمال التوثيق في نماذج تعدها الوزارة، وإذا كانت النماذج تتعلق بأعمال جهة حكومية، فتعدها تلك الجهة بالتنسيق مع الوزارة. يراعى في النماذج بالنسبة إلى العقود حق المتعاقدين في إضافة ما بينهما من شروط أو اتفاق ما لم يخالف ذلك المقتضى الشرعي أو النظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: الوثائق الصادرة وفق أحكام النظام لها قوة الإثبات، وتعد سنداً تنفيذيًا فيما تضمنته من التزام، ويجب العمل بمضمونها أمام المحاكم بلا بينة إضافية ولا يجوز الطعن فيها. ولا تلغى الوثائق الصادرة وفق النظام إلا بحكم قضائي تأسيساً على مخالفتها لمقتضى الأصول الشرعية أو النظامية، أو تزويرها، وذلك بعد مرافعة مستكملة إجراءاتها الشرعية والنظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يجوز لمن له مصلحة ولو محتملة من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية -العامة والخاصة- أن يخاصم من بيده وثيقة صادرة وفق أحكام النظام أو من يستفيد منها أمام المحكمة المختصة. ويكون ذلك وفق أحكام نظام المرافعات الشرعية، وأحكام نظام الإجراءات الجزائية، والأنظمة ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: لا يؤشر على وعاء التوثيق بالإيقاف أو التحفظ عليه أو رفعهما إلا بأمر من المحكمة المختصة، أو سلطة مختصة بذلك بموجب نص نظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: إذا فقد ضبط صك صادر من كاتب عدل قبل صدور النظام، أو فقد وعاء توثيق، أو تلف أي منهما تلفاً لا يعرف معه مضمونه، فيعاد ضبطه بعد أخذ تصديق ذوي الشأن، متى طابق الصك أساسه المستند إليه، وإلا فيعرض على الإدارة المختصة لتقرير ما يلزم في شأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: إذا فقد سجل صك صادر من كاتب عدل قبل صدور النظام، أو تلف تلفاً لا يعرف معه مضمونه، فيعاد تسجيله، متى طابق الصك أساسه المستند إليه، وإلا فيعرض على الإدارة المختصة لتقرير ما يلزم في شأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: تتولى الإدارة المختصة التفتيش والرقابة على كاتب العدل والتحقيق معه في الأعمال ذات العلاقة بالتوثيق، وذلك وفقًا للإجراءات المنظمة لذلك التي تحددها اللائحة. تتولى الإدارة المختصة التفتيش والرقابة على المرخص له والتحقيق معه، وذلك وفقاً للإجراءات المنظمة لذلك التي تحددها اللائحة. لا يخل ما ورد في الفقرة (1) والفقرة (2) من هذه المادة باختصاص إدارة التفتيش القضائي في المجلس الأعلى للقضاء في التحقيق مع كاتب العدل أو المرخص له، والتحقق من أعمالهم الواردة في السجلات والضبوط، والصكوك الصادرة بناءً عليها، ومدى موافقتها للأصول الشرعية أو النظامية؛ متى ارتبط ذلك بمعاملة لديها، وفي جميع الأحوال يجب إحالة نتيجة التحقيق فيما يخص مساءلتهم إلى الإدارة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: يصدر الوزير قراراً بإيقاف المرخص له عن العمل مدة لا تزيد على تسعين يوماً أثناء التحقيق معه بناءً على توصية من الإدارة المختصة، وينتهي قرار الإيقاف بانتهاء مدته أو بانتهاء التحقيق بعدم الإدانة أيهما أسبق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يشكل الوزير لجنة -أو أكثر- للنظر في نتائج التحقيق في مخالفات كاتب العدل -ذات العلاقة بالتوثيق- والمرخص له، وتوقيع العقوبات المنصوص عليها في المادتين (التاسعة والأربعين) و(الخمسين) من النظام، وتؤلف برئاسة وكيل من الوزارة، وعضوية مستشار شرعي ومستشار نظامي، ويسمي الوزير من يحل محل أي من أعضائها عند غيابه. وتكون مدة عضوية هذه اللجنة أربع سنوات قابلة للتجديد، وتنعقد بحضور جميع أعضائها، وتصدر قراراتها بالأغلبية بعد سماع أقوال كاتب العدل أو المرخص له. وتكون قراراتها مسببة قابلة للطعن فيها وفقاً لأحكام نظام المرافعات أمام ديوان المظالم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: 'العقوبات التأديبية التي يجوز توقيعها على كاتب العدل هي: اللوم. الحسم من الراتب بما لا يتجاوز صافي راتب ثلاثة أشهر. الحرمان من علاوة دورية واحدة. الفصل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد منصوص عليها في نظام آخر، يعاقب المرخص له بعقوبة أو أكثر من العقوبات الآتية: الإنذار. غرامة لا تزيد على خمسمائة ألف ريال. إيقاف الرخصة مدة لا تتجاوز ثلاث سنوات. إلغاء الرخصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يؤشر في الجدول بالقرار النهائي الصادر بالعقوبة، ولمن ألغيت رخصته بعد مضي خمس سنوات من تاريخ صدور القرار طلب إعادة قيد اسمه في الجدول، والترخيص له، وتحدد اللائحة الإجراءات الواجب اتخاذها لإعادة القيد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: مع عدم الإخلال بأي عقوبة أشد منصوص عليها في نظام آخر، تعاقب المحكمة المختصة من ينتحل اسم المرخص له أو صفته، أو يمارس عمله دون رخصة، بالسجن مدة لا تزيد على سنة، أو بغرامة لا تزيد على مائة ألف ريال، أو بهما معاً، ويجوز تضمين الحكم الصادر بالعقوبة النص على نشر ملخصه على نفقة المحكوم عليه في صحيفة أو أكثر من الصحف المحلية، أو في أي وسيلة أخرى مناسبة، وذلك بحسب نوع الجريمة المرتكبة وجسامتها وتأثيرها، على أن يكون النشر بعد اكتساب الحكم القطعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: يجوز -بقرار من الوزير- إسناد بعض أعمال التوثيق إلى القطاع الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: يجوز تحصيل رسوم عن أي من أعمال التوثيق التي يقوم بها كاتب العدل، ويحدد -بقرار من مجلس الوزراء بناء على اقتراح من الوزير- مقدار هذه الرسوم، وحالات تأجيل تحصيلها، أو إيقافها، أو عدم تطبيقها. تحدد اللائحة مقابلاً مالياً لا يقل عن مائة ريال ولا يزيد على خمسة آلاف ريال عن أي من أعمال التوثيق التي يقوم بها المرخص له. لمجلس الوزراء تعديل الحد الأعلى للمقابل المالي المشار إليه في الفقرة (2) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: فيما لم يرد فيه نص خاص في النظام، تسري أنظمة ولوائح الخدمة المدنية على كتاب العدل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: يصدر الوزير -بعد التنسيق مع المجلس الأعلى للقضاء- اللائحة خلال مائة وثمانين يومًا من تاريخ صدور النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: يعمل بالنظام بعد مائة وثمانين يوماً من تاريخ نشره في الجريدة الرسمية، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/40754577-f250-47f6-8a5a-abf600af7d72/1
  verified: false
