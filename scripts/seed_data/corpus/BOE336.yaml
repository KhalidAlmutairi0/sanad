  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولاً
  article_text_ar: يسمح للشركات والأهالي أفراداً أو جماعات أو مؤسسات بفتح الطرق على حسابهم وفق الشروط الواردة في هذه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b359badb-2ea0-4cbc-bbfb-a9a700f2f11b/1
  verified: false
- article_ref: ثانياً
  article_text_ar: 'في حالة رغبة أي فرد أو جماعة أو مؤسسة أهلية أو شركة في فتح طريق ترابي أو مسفلت أو توسعته على نفقتهم الخاصة – سواء كان الطريق يخدم مصلة خاصة أو عامة – فإنه يجب الحصور على إذن سابق من الجهة المختصة، على النحو الآتي: يقدم صاحب أو (أصحاب) الطلب مخططاً موضحاً فيه مسار الطريق المطلوب فتحه، وطوله من بدايته حتى نهايته، ونوعه (ترابي أم مسفلت) مع توضيح أقرب خط عام له. فإذا كان الطريق المطلوب فتحه يقع ضمن مسؤولية وزارة الشؤون البلدية والقروية – فيقدم الطلب إلى الأمانة أو البلدية أو المجمع القروي في المنطقة؛ لدراسة مدى ملائمته للشوارع وشبكات الطرق المعتمدة في المخططات الهيكلية للمدن والقرى. وإذا كان الطريق يخدم مناطق زراعية فيقدم الطلب إلى وزارة الزراعة والمياه أو أحد فروعها. أما ما عدا ذلك من الطرق فيقدم الطلب إلى وزارة المواصلات أو أحد فروعها. يدرس الطلب المقدم ميدانياً من الجهة المعنية ذات الشأن، ثم يحال إلى المحافظة المختصة لأخذ إقرار رسمي من صاحب أو (أصحاب) الطلب بأن الطريق المطلوب إنشاؤه لا يضر بالغير، وأنه لا يمر بأرض عليها نزاعات أو مملوكة للغير. وعلى المحافظة المختصة مسؤولية
    التأكد من صحة المعلومات الواردة في الإقرار، وذلك وفق النموذج المعد لذلك. وإذا ثبت خلاف ذلك فإن صاحب أو (أصحاب) الطلب يتحمل المسؤولية كاملة أمام الآخرين ودون مطالبة الدولة بأي تعويض. ذا استكمل صاحب أو (أصحاب) الطلب ما ورد في الفقرتين ( 1 ، 2 ) أعلاه يقدم الإقرار المذكور إلى وزارة المواصلات أو وزارة الشؤون البلدية والقروية أو وزارة الزراعة والمياه – كل فيما يخصه – مع ما يأتي: أ‌- نسخة من مخطط تصميم الطريق ومواصفاته التنفيذية من مكتب هندسي مرخص له بالنسبة للطرق المسفلته فقط. ب‌- بيان بالخبرات السابقة للمقاول الذي سيقوم بتنفيذ الطريق بالنسبة للطرق المسفلته فقط. ج- إقرار ممن مقدم الطلب على نموذج تعده الجهة الحكومية التي يقدم إليها الطلب – بعدم مطالبته الدولة مستقبلاً بأي مصاريف أو نفقات أو تعويضات تترتب على فتح الطريق أو عدم إكماله. تصدر الوزارة المختصة الموافقة النهائية على المشروع، وتصرح لصاحب الطلب بالبدء في التنفيذ، وتتولى الإشراف عليه، ومتابعة سير العمل في تنفيذ، وتسلمه من المقاول.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b359badb-2ea0-4cbc-bbfb-a9a700f2f11b/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: بعد إنجاز الطريق وفقاً للمواصفات والشروط التي صدر بموجبها الإذن النهائي، - وسواء كان الطريق مسفلتاً أم ترابياً – تقوم الوزارة المختصة بتسلمه وضمه إلى برامج صيانة الطرق لديها ويصبح من مسؤوليتها، ويعامل كغيره من الطرق التي تدخل في نطاق اختصاصها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b359badb-2ea0-4cbc-bbfb-a9a700f2f11b/1
  verified: false
- article_ref: رابعاً
  article_text_ar: في حالة عجز مقدم الطلب عن إكمال تنفيذ الطريق، فإن الوزارة المختصة غير ملزمة بإكماله إلا وفق أولويته وفي حدود البرامج التي تنظم تنفيذ الطرق ووجود الاعتمادات المالية لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b359badb-2ea0-4cbc-bbfb-a9a700f2f11b/1
  verified: false
- article_ref: خامساً
  article_text_ar: بعد تسلّم الطريق مسفلتاً ومكتملاً، حسب المواصفات والتصاميم المعتمدة، يمنح الممول شهادة تقدير، ويجوز أن يسمى الطريق باسمه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b359badb-2ea0-4cbc-bbfb-a9a700f2f11b/1
  verified: false
- article_ref: سادساً
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية، ويعمل بها بعد ثلاثين يوماً من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b359badb-2ea0-4cbc-bbfb-a9a700f2f11b/1
  verified: false
