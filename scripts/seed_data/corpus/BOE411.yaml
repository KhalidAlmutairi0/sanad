regulation:
  code: BOE411
  name_ar: تنظيم مؤسسة حديقة الملك سلمان
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبنية أمام كل منها: المؤسسة: مؤسسة حديقة الملك سلمان. الهيئة: الهيئة الملكية لمدينة الرياض. التنظيم: تنظيم المؤسسة. المجلس: مجلس إدارة المؤسسة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمؤسسة. الحديقة: حديقة الملك سلمان. النطاق الجغرافي: الحدود الجغرافية للحديقة التي تمارس فيها المؤسسة اختصاصاتها وفقاً لأحكام التنظيم، والمحددة في الخريطة المرافقة للتنظيم مساحتها وحدودها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع المؤسسة بالشخصية الاعتبارية العامة وبالاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تعمل المؤسسة على أسس ومعايير تجارية غير هادفة للربح، بما يمكنها من القيام بمسؤولياتها وأداء مهماتها في تنظيم خدماتها وتطويرها؛ وذلك وفقاً لما تحدده اللوائح التي يقرها المجلس. تشرف الهيئة على المؤسسة -وفقاً لصلاحياتها المخولة لها نظاماً- من خلال إقرار رؤاها وخططها الاستراتيجية، وما تضعه المؤسسة من ضوابط ومعايير تخطيطية وأنظمة بناء ذات صلة بالحديقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف المؤسسة إلى رفع تنافسية مدينة الرياض، وتعزيز مستوى جودة الحياة فيها بتوفير مساحة خضراء وغطاء نباتي لبيئة أفضل، ودعم الناتج المحلي بإيجاد مزيد من فرص العمل. ولها في سبيل تحقيق ذلك -دون إخلال بما ورد في الفقرة (2) من المادة (الثالثة) من التنظيم- جميع الصلاحيات اللازمة التي تمكنها من ممارسة صلاحياتها في النطاق الجغرافي، وبوجه خاص ما يأتي: الإشراف العام على الحديقة. وضع السياسات والخطط والبرامج التنفيذية اللازمة لممارسة مهماتها. اقتراح ما يلزم من ضوابط عمرانية خاصة بالمناطق المحيطة بالحديقة -المحددة في الخريطة المرافقة للتنظيم- بالتنسيق مع أمانة منطقة الرياض؛ تمهيداً لاستكمال ما يلزم لاعتمادها وفقاً للإجراءات النظامية. تصميم الحديقة وتخطيطها وتنفيذها وإدارتها وتشغيلها وتطويرها وصيانتها، والمرافق والخدمات التابعة لها ولها أن توكل أيًّا من ذلك إلى من تراه وفقاً لضوابط يضعها المجلس. تشجيع الاستثمار في الحديقة. التصرف في العقارات المملوكة لها، واستثمارها؛ وفق ضوابط يضعها المجلس. استثمار أموالها المنقولة، والعقارات المخصصة لها؛ وفقاً لضوابط يضعها المجلس. تأسيس الشركات أو
    الدخول فيها شريكة أو المساهمة فيها، وإنشاء صناديق الاستثمار ونحوها أو المساهمة فيها؛ وذلك وفقاً للإجراءات النظامية المتبعة. التعاون وتبادل الخبرات مع الهيئات والمنظمات المحلية والإقليمية والدولية ذات الصلة بنشاط المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للمؤسسة مجلس إدارة يشكل من رئيس وعضوية ما لا يقل عن (ستة) أعضاء من ذوي الخبرة والاختصاص -يرشحهم رئيس مجلس إدارة الهيئة- يعينون بأمر من رئيس مجلس الوزراء. وتكون مدة عضوية المجلس (ثلاث) سنوات قابلة للتجديد مرة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على إدارة شؤون المؤسسة، ويشرف على إدارتها ويُصرِّف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أغراضها، وله على وجه خاص -دون إخلال بما ورد في الفقرة (2) من المادة (الثالثة) من التنظيم- ما يأتي: إقرار السياسات المتعلقة بأنشطة المؤسسة، والخطط والبرامج التنفيذية اللازمة لتنفيذها، والإشراف على تنفيذها. إقرار الإجراءات والقواعد والمعايير المتعلقة بعمل المؤسسة وأنشطتها ومشروعاتها. تحديد أنواع التراخيص والتصاريح اللازمة لممارسة الأنشطة في الحديقة، ووضع ما يلزم من ضوابط واشتراطات لكل منها، وذلك بالتنسيق مع الجهات المعنية. إقرار هيكل المؤسسة التنظيمي. إقرار اللوائح المالية. إقرار اللوائح الإدارية -المنظمة لشؤون منسوبي المؤسسة- والداخلية وغيرها من اللوائح اللازمة لتسيير شؤون المؤسسة. تحديد المقابل المالي للخدمات والأعمال التي يرى المجلس استحصال مقابل مالي عنها. الموافقة على مشروع ميزانية المؤسسة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيداً لرفع ما يتطلب منها وفقاً للإجراءات النظامية المتبعة. الموافقة على تأسيس الشركات أو الدخول فيها شريكة
    أو المساهمة فيها، والموافقة على إنشاء صناديق الاستثمار ونحوها أو المساهمة فيها؛ وذلك وفقاً للإجراءات النظامية المتبعة. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف، وفقًا للإجراءات النظامية المتبعة. تعيين مراقب مالي داخلي. وللمجلس تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم، يَعهد إليها بما يراه من مهمات، ويحدّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، وللجنة الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض مهماته إلى رئيسه أو أي من أعضائه أو الرئيس التنفيذي، وفقاً لما يقتضيه سير العمل في المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تُعقد اجتماعات المجلس في مقر المؤسسة، ويجوز -بموافقة رئيس المجلس- عقدها في مكان آخر. يجتمع المجلس بدعوة من رئيسه مرة كل (ثلاثة) أشهر، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو إذا طلب ذلك ثلث الأعضاء على الأقل. ويجب أن توجه الدعوة -كتابة- قبل الاجتماع بسبعة أيام على الأقل، على أن تتضمن جدول الأعمال. تنعقد اجتماعات المجلس بحضور أغلبية أعضائه على الأقل، بمن فيهم رئيس المجلس أو من ينيبه. تصدر قرارات المجلس بأصوات أغلبية أعضائه على الأقل، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. وللمجلس أن يصدر قراراته بالتمرير، وفقاً للائحة يضعها تنظم ذلك. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت نيابة عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، ويجوز للعضو الذي يعترض على أي قرار أن يثبت اعتراضه مسبباً في المحضر. للمجلس أن يدعو لحضور اجتماعاته من يرى الاستعانة به دون أن يكون له الحق في التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمؤسسة رئيس تنفيذي يعين ويعفى بقرار من المجلس بناء على ترشيح من رئيسه، ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون المؤسسة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم واللوائح الصادرة بناء عليه، وما يقرره المجلس، وله بوجه خاص مباشرة الاختصاصات الآتية: إعداد السياسات المتعلقة بنشاط المؤسسة، والخطط والبرامج التنفيذية اللازمة لتنفيذها، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. الإشراف على سير العمل في المؤسسة من خلال اللوائح والخطط والبرامج التنفيذية المعتمدة. اقتراح هيكل المؤسسة التنظيمي. الإشراف على إعداد اللوائح الإدارية والمالية، وغيرها من اللوائح الداخلية اللازمة لتسيير شؤونها؛ تمهيداً لرفعها إلى المجلس. الإشراف على إعداد الإجراءات والقواعد والمعايير المتعلقة بعمل المؤسسة، وأنشطتها، ومشروعاتها؛ تمهيداً لرفعها إلى المجلس. تعيين منسوبي المؤسسة، وفقاً للوائح المنظمة لذلك، والإشراف عليهم. الصرف من ميزانية المؤسسة، واتخاذ جميع الإجراءات المالية وفقاً لما تقره اللوائح، في حدود الصلاحيات التي فوضه بها المجلس. التوقيع على الاتفاقيات والبروتوكولات
    والعقود، بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. التعاقد لتنفيذ الأعمال والخدمات وغيرها، وذلك في حدود الصلاحيات التي فوضه بها المجلس. الإشراف على إعداد تقرير المؤسسة السنوي، ومشروع ميزانيتها، وحسابها الختامي؛ تمهيداً لعرضها على المجلس. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناء عليه، بحسب الصلاحيات المخولة له. متابعة تنفيذ القرارات الصادرة من المجلس. رفع تقارير دورية إلى المجلس عن سير العمل في المؤسسة ومنجزاتها ونشاطاتها. تمثيل المؤسسة أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها. وله تفويض غيره بذلك. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى من يراه من منسوبي المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع منسوبو المؤسسة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتألف موارد المؤسسة مما يأتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف. د- عوائد استثماراتها. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المؤسسة في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. تفتح المؤسسة حساباً لها في مؤسسة النقد العربي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة. ويصرف من هذه الحسابات وفق ميزانية المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للمؤسسة ميزانية مستقلة. السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المؤسسة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويُزود المجلس الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تعامل المؤسسة من حيث إعفاء وارداتها من الرسوم الجمركية وفقاً للقواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يجوز بأمر من رئيس مجلس الوزراء -بناء على اقتراح من الرئيس- تعديل الخريطة المرافقة للتنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b83d96ce-df0e-4444-a225-ab6d00ca12da/1
  verified: false
