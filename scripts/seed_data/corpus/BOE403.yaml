regulation:
  code: BOE403
  name_ar: الترتيبات التنظيمية لهيئة تنمية البحث والتطوير والابتكار
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذه الترتيبات- المعاني الموضحة أمام كل منها، ما لم يقتضِ السياق غير ذلك: الهيئة: هيئة تنمية البحث والتطوير والابتكار. الترتيبات: الترتيبات التنظيمية للهيئة. اللجنة العليا: اللجنة العليا للبحث والتطوير والابتكار. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. المحافظ: محافظ الهيئة. القطاع: قطاع البحث والتطوير والابتكار. الجهات البحثية: كل جهة معنية -كليًّا أو جزئيًّا- بممارسة أي نشاط من أنشطة البحث والتطوير والابتكار وتسويق مخرجاتها، سواء كانت من القطاع العام أو الخاص، أو من القطاع غير الربحي. البنية التحتية البحثية: كل ما يستخدم بشكل مباشر أو غير مباشر في البحث والتطوير والابتكار، ويشمل: المعامل والمختبرات ومرافق الابتكار وواحات التقنية وما في حكمها، وكذلك الموارد والأجهزة والمعدات والأدوات ونظم المعلومات والبرمجيات والشبكات وقواعد البيانات وما شابهها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة، والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى دعم وتشجيع القطاع، والإشراف عليه وتنظيمه، وتعمل على تحقيق التناغم والانسجام والتنسيق بين أدوار الجهات البحثية وتمكينها وتحفيزها، وتعزيز توطين التقنية في أنشطة البحث والتطوير والابتكار ونقلها لتكون جزءًا من تنمية المحتوى المحلي، بما يُسهم في نمو الاقتصاد الوطني المبني على المعرفة والابتكار، وزيادة إنتاجه وتنافسه عالميًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة في سبيل تحقيق أهدافها -مع مراعاة اختصاصات الجهات الأخرى ذات العلاقة- ممارسة الاختصاصات والقيام بالمهمات الآتية: اقتراح الأولويات والسياسات العامة والاستراتيجيات ومشروعات الأنظمة المتعلقة بالقطاع، ورفعها إلى اللجنة العليا؛ تمهيدًا لاستكمال الإجراءات النظامية. وضع اللوائح والضوابط والقواعد والمعايير ومتطلبات الترخيص والإرشادات المتعلقة بالقطاع، بالتنسيق مع الجهات ذات العلاقة، ومتابعة الالتزام بها، وفق الإجراءات النظامية. وضع السياسات المنظمة لتتجير ونقل التقنية والابتكارات الناتجة عن أنشطة البحث والتطوير والابتكار بالتنسيق مع الجهات ذات العلاقة، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. وضع متطلبات التمويل اللازمة لتنمية القطاع وضمان استدامته وكفايته وتنويع مصادره بالتنسيق مع الجهات ذات العلاقة، وتخصيص التمويل والاعتمادات المالية المؤسسية للمختبرات الوطنية وبرامج ومبادرات البحث والتطوير والابتكار، والإشراف على تلك الاعتمادات. مراجعة أداء المبادرات والبرامج والجهات البحثية وتقييمها، لأغراض دعمها وتمويلها. وضع الخطط والبرامج التنفيذية لتنمية القطاع، والإشراف
    عليها ومتابعة سيرها. التنسيق مع الجهات المعنية لتطوير البرامج اللازمة لتحقيق الأولويات والسياسات العامة التي تحددها اللجنة العليا. تنسيق أنشطة البحث والتطوير والابتكار وأعمال تنفيذها بين الجهات البحثية، وضمان تكاملها ومنع الازدواج في مجهوداتها، وتبادل المعلومات والخبرات بين تلك الجهات. تقديم المنح والتمويل للمشاريع والجهات البحثية. تقديم المساندة الفنية وتنسيق أعمال التنفيذ بين الجهات البحثية. تعزيز التعاون البحثي والعلمي والتقني بين الجهات البحثية والدولية النظيرة. الإسهام في نشر ثقافة البحث والتطوير والابتكار والتوعية بها وبأهميتها وأولوياتها والبرامج الوطنية ذات الصلة. الإسهام في بناء القدرات الوطنية المتخصصة في البحث والتطوير والابتكار، وإعداد البرامج التدريبية المتعلقة باختصاصات الهيئة. تشجيع وتهيئة البيئة المناسبة للاستثمار في القطاع، وتحفيز نموه. وضع المؤشرات والتقارير الدورية ذات العلاقة بالقطاع. رصد وتحليل المؤشرات والتقارير الدولية المعتبرة التي لها أثر على البيئة التنافسية للقطاع، والعمل على الارتقاء بترتيب المملكة فيها، وذلك بالتعاون مع الجهات الأخرى ذات العلاقة. متابعة الجهات
    البحثية وتمكينها من وضع خطط مفصلة ومسارات محددة الأهداف للتنفيذ، والإسهام في تذليل العقبات وحل المشكلات التي تواجه تلك الجهات من خلال دراسة أسبابها ووضع الخطط لمعالجتها. تمثيل المملكة في المحافل الدولية ذات الصلة بالقطاع بالتنسيق مع الجهات ذات العلاقة. تأهيل وترخيص المختبرات ومعامل ومراكز البحوث العلمية، وذلك بحسب ما يلزم لأغراض الأمن والسلامة، ولأغراض تقييمها ودعمها وتشجيعها، بالاتفاق مع الجهات ذات العلاقة. الاستثمار، وتأسيس الشركات وصناديق الاستثمار وأي كيانات قانونية أخرى، أو المساهمة فيها، بما يسهم في تحقيق أهدافها، وفقًا للإجراءات النظامية. تنظيم المؤتمرات والندوات ولقاءات العمل والمعارض والمسابقات والجوائز، وعقدها داخل المملكة وخارجها، والمشاركة فيها، في مجالات اختصاصها وفقاً للإجراءات المتبعة. إجراء الدراسات والبحوث ذات العلاقة باختصاصاتها. تأسيس منصة رقمية موحدة لأنشطة القطاع ومؤشرات أدائه وإدارتها، بالتنسيق مع هيئة الحكومة الرقمية. التنسيق مع الجهات ذات العلاقة؛ لتحديد سُبل الاستغلال الأمثل للتقنيات الحديثة التي تُرصد -إن وجدت- بما يتوافق مع التطلعات والأولويات الوطنية للقطاع.
    أي اختصاصات ومهمات أخرى -يقرها المجلس- ذات صلة بأهداف الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة، ويكون له رئيس يسمى بأمر من رئيس مجلس الوزراء، وتكون العضوية فيه على النحو الآتي: أ- المحافظ. ب- ممثل من وزارة التعليم. ج- ممثل من الهيئة السعودية للبيانات والذكاء الاصطناعي. د- ممثل من الهيئة العامة للمنشآت الصغيرة والمتوسطة. هـ- ممثل من هيئة المحتوى المحلي والمشتريات الحكومية. و- ممثل من المركز الوطني للتنمية الصناعية. ز- ثلاثة من القطاع الخاص. ح- اثنان من قطاع البحث العلمي والمؤسسات الجامعية. يُعين الأعضاء المشار إليهم في الفقرتين (ز) و(ح) بأمر من رئيس مجلس الوزراء بناء على ترشيح من الرئيس، وتكون مدة عضويتهم في المجلس (ثلاث) سنوات قابلة للتجديد لمدة مماثلة ولمرة واحدة. لا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن المرتبة (الممتازة) أو ما يعادلها، ويستثنى من هذا الشرط المسؤول الأول في الجهة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويختص بالإشراف عليها وتصريف أمورها، وله ممارسة جميع الصلاحيات واتخاذ جميع ما يلزم لتحقيق أغراضها في حدود أحكام الترتيبات، وله بوجه خاص ما يأتي: الإشراف على تنفيذ الهيئة للمهمات المنوطة بها. الموافقة على الأولويات والسياسات العامة للقطاع، ورفعها إلى اللجنة العليا. الإشراف على إعداد مشروع الاستراتيجية الوطنية للبحث والتطوير والابتكار بما يتفق مع الأولويات والسياسات العامة المتعلقة بالقطاع، ومقترحات تحديثها، تمهيدًا للرفع عن ذلك إلى اللجنة العليا. الموافقة على مشروعات الأنظمة ذات العلاقة بالقطاع، واقتراح تعديل المعمول به منها، تمهيدًا للرفع عن ذلك وفق الإجراءات النظامية. اعتماد السياسات المنظمة لتتجير ونقل التقنية والابتكارات الناتجة عن أنشطة البحث والتطوير والابتكار، تمهيدًا للرفع عما يستلزم استكمال إجراءات نظامية في شأنه. الموافقة على الاستراتيجيات والخطط والبرامج المعنية بالقطاع في القطاعات الاقتصادية، تمهيدًا لرفعها إلى اللجنة العليا. الموافقة على متطلبات التمويل اللازمة لتنمية القطاع وضمان استدامته وكفايته وتنويع مصادره، تمهيدًا للرفع
    عما يستلزم استكمال إجراءات في شأنه. اعتماد الخطط والبرامج التنفيذية لتنمية القطاع وتحقيق الأولويات والسياسات العامة المتعلقة به، بما في ذلك الخطط والبرامج التنفيذية للاستراتيجية الوطنية للبحث والتطوير والابتكار، وتحديثها والإشراف على تنفيذها. اعتماد المعايير المهنية والأخلاقية ومعايير الجودة المتعلقة بالقطاع. اعتماد اللوائح والقواعد المنظمة للبنية التحتية البحثية للاستفادة منها بالشكل الأمثل وتسهيل الوصول إليها وتوجيهها في المجالات ذات الأولوية الوطنية للقطاع. الموافقة على مخصصات التمويل والاعتمادات المالية المؤسسية للمختبرات الوطنية وبرامج ومبادرات البحث والتطوير والابتكار. اعتماد الهيكل والدليل التنظيمي للهيئة. اعتماد اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية، بالاتفاق مع وزارة المالية. اعتماد اللوائح الإدارية، بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. اعتماد اللوائح الداخلية اللازمة لتسيير العمل في الهيئة. الموافقة على المؤشرات والتقارير الدورية ذات العلاقة بالقطاع. النظر في التقارير الدورية التي تُقدَّم عن سير العمل في الهيئة ومركزها المالي، واتخاذ
    القرارات اللازمة في شأنها. الموافقة على إبرام الاتفاقيات، والبروتوكولات، والعقود، بحسب الإجراءات النظامية. الموافقة على إنشاء الأوقاف العلمية وتأسيس الفروع والمكاتب والوحدات والصناديق للهيئة داخل المملكة. الموافقة على مشروع ميزانية الهيئة وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيداً لرفعها وفق الإجراءات النظامية. الموافقة على استثمار أموال الهيئة وأصولها الثابتة والمنقولة بما يحقق أغراضها، وفقاً للإجراءات النظامية. اعتماد سياسة تقديم الهيئة للمنح المالية وخدمات المساندة الفنية. تحديد المقابل المالي للخدمات والأعمال التي تقدمها الهيئة في مجال اختصاصها، وفق الإجراءات النظامية والآليات ذات الصلة. الموافقة على آليات وضوابط قبول الهيئة للهبات والتبرعات والإعانات والمنح والوصايا والأوقاف وفقاً للأحكام المنظّمة لذلك. الاستعانة بمن يراه من الخبراء والمستشارين للعمل بشكل متفرغ أو غير متفرغ لإنجاز بعض الأعمال والخدمات، وتقديم المشورة، وإجراء البحوث والدراسات. اعتماد لائحة التراخيص التي تصدرها الهيئة والمقابل المالي لها. تعيين مراجع حسابات خارجي ومراقب مالي داخلي. وللمجلس تفويض
    بعض اختصاصاته إلى الرئيس أو من يراه من أعضائه أو المحافظ أو من منسوبي الهيئة. وللمجلس أن يشكل لجانًا دائمة أو مؤقتة من بين أعضائه أو من غيرهم، وأن يفوضها ببعض اختصاصاته أو يعهد إليها بما يراه من مهمات، ويُحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها وأمينها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المعهودة إليها والاختصاصات المفوضة بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في الهيئة، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يجتمع المجلس -بناء على دعوة من الرئيس أو من ينيبه من الأعضاء من ممثلي الجهات الحكومية- مرة كل (ثلاثة) أشهر على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو بطلب من (ثلث) أعضائه على الأقل. يكون اجتماع المجلس صحيحًا بحضور أغلبية أعضائه على الأقل بمن فيهم الرئيس أو من ينيبه من الأعضاء -ممثلي الجهات الحكومية- في المجلس. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حالة تساوي الأصوات يُرجّح الجانب الذي صوت معه رئيس الاجتماع. يجوز للمجلس -عند الحاجة، ووفقاً لما يقدره الرئيس- أن يعقد الاجتماعات وأن يُصوَّت على التوصيات والقرارات عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتّخذ التوصيات والقرارات عن طريق التمرير على الأعضاء، ويُوقّع عليها بما يُفيد اطّلاع جميع الأعضاء عليها. ولا تُعدّ التوصيات والقرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرّر على جميع أعضاء المجلس الحاضرين، ويصوتوا عليها، وتحُز على أغلبية أصواتهم على الأقل. تثبت مداولات المجلس وتوصياته وقراراته في محاضر
    يوقعها رئيس الاجتماع والأعضاء الحاضرون. وتُحاط اجتماعات المجلس ومداولاته وجدول أعماله وتوصياته وقراراته ومحاضره بالسرّية التامة. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. للمجلس دعوة من يراه من الجهات الحكومية أو الخاصة أو من المختصين والمستشارين لحضور الاجتماعات، دون أن يكون لهم حق التصويت. ويكون للمجلس أمين من الأعضاء أو من غيرهم يختاره الرئيس، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات والتوصيات وتبليغها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة محافظ بمرتبة (وزير)، ويعدّ المسؤول الأول عن إدارة شؤون الهيئة، وتتركز مسؤولياته وصلاحياته في حدود ما تنصُّ عليه الترتيبات وما يقرره أو يفوضه به المجلس، وله -على وجه الخصوص- ممارسة الصلاحيات الآتية: الإشراف على سير العمل في الهيئة وفقًا للوائح والخطط والبرامج المعتمدة. الإشراف على إعداد مشروعات الأنظمة والسياسات العامة للقطاع، واقتراح تعديل المعمول به منها، والرفع عن ذلك إلى المجلس. الإشراف على إعداد مشروع الاستراتيجية الوطنية للبحث والتطوير والابتكار بما يتفق مع الأولويات والسياسات العامة المتعلقة بالقطاع، ومقترحات تحديثها، ورفعها إلى المجلس. الإشراف على إعداد مشروعات الاستراتيجيات والخطط والبرامج المعنية بالقطاع في القطاعات الاقتصادية، ورفعها إلى المجلس. الإشراف على إعداد الخطط والبرامج التنفيذية لتنمية القطاع وفقًا للأولويات والسياسات العامة المعتمدة المتعلقة به، بما في ذلك الخطط والبرامج التنفيذية للاستراتيجية الوطنية للبحث والتطوير والابتكار لتنفيذ السياسات المعتمدة، ورفعها إلى المجلس لاعتمادها، ومتابعة تنفيذها. الإشراف على إعداد اللوائح والضوابط والقواعد
    والمعايير والإرشادات المتعلقة بالقطاع بالتنسيق مع الجهات ذات العلاقة، ورفعها إلى المجلس لاعتمادها، ومتابعة تنفيذها وفق الإجراءات النظامية. اقتراح مشروع لائحة التراخيص التي تصدرها الهيئة والمقابل المالي لها، ورفعها إلى المجلس لاعتمادها. اقتراح مخصصات التمويل والاعتمادات المالية المؤسسية للمختبرات الوطنية وبرامج ومبادرات البحث والتطوير والابتكار، ورفعها إلى المجلس للموافقة عليها، ومتابعة تنفيذها. الإشراف على إعداد الهيكل والدليل التنظيمي للهيئة، ولوائحها المالية والإدارية، وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها؛ ورفع ما يلزم منها إلى المجلس لاعتمادها. اقتراح آليات وضوابط قبول الهيئة للهبات والتبرعات والإعانات والمنح والوصايا والأوقاف وفقاً للأحكام المنظّمة لذلك، ورفعها إلى المجلس للموافقة عليها. الصرف من ميزانية الهيئة المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً للأحكام المنظّمة لذلك والصلاحيات التي يفوضه بها المجلس. الإشراف على إعداد مشروع ميزانية الهيئة، والتقرير السنوي، ومشروع الحساب الختامي، ورفعها إلى المجلس. الإشراف على إعداد التقارير الدورية التي تقدَّم عن سير
    العمل في الهيئة والقطاع، ورفعها إلى المجلس. التوقيع على الاتفاقيات والبروتوكولات والعقود، واستكمال ما يلزم في شأنها وفق الإجراءات النظامية. متابعة تنفيذ القرارات الصادرة من المجلس، أو القرارات ذات الصلة بأعمال الهيئة. تشكيل لجان وفرق عمل (دائمة أو مؤقتة) وفقاً لما تقضي به اللوائح المعتمدة من الهيئة. التعاقد مع الغير والاستعانة بالخبراء والمستشارين المتخصصين حسب ما يقتضيه سير العمل في الهيئة، وفقاً للأحكام النظامية ذات الصلة والصلاحيات التي يفوضه بها المجلس. تعيين منسوبي الهيئة والإشراف عليهم، وفقاً للوائح المنظمة لذلك. الإشراف على تنظيم مشاركة الهيئة في المؤتمرات والندوات واللقاءات والمعارض المتعلقة بمجالات عمل الهيئة محليًّا وإقليميًّا ودوليًّا. تمثيل الهيئة أمام الجهات القضائية والحكومية والإدارية، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. إقرار الخطط والبرامج اللازمة لتدريب وابتعاث وإيفاد منسوبي الهيئة في جميع مجالات عملها، ومتابعة تنفيذها. أي مهمة أخرى يكلفه بها المجلس. وللمحافظ تفويض أي من اختصاصاته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمحافظ نائب أو أكثر يُعيّن بقرار من المجلس، بناءً على ترشيح من المحافظ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع منسوبو الهيئة -عدا المحافظ- لأحكام نظامي العمل والتأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
