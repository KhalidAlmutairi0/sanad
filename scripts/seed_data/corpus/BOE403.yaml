- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: أ- ما يُخصَّص لها في الميزانية العامة للدولة. ب- ما يُخصّص أو يورَّد للصناديق التي تشرف عليها. ج- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها، والتراخيص التي تصدرها. د- ما يقبله المجلس من هبات وتبرعات وإعانات ومنح ووصايا وأوقاف، وفقاً للأحكام المنظّمة لذلك. هـ- عوائد استثماراتها. و- أي مورد آخر يقرُّه المجلس بما لا يخالف الأنظمة والتعليمات. تودع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة المعتمدة ولوائحها المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يُعيِّن المجلس مراجع حسابات خارجيّاً (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويُحدِّد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزوَّد الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/58c61d55-df5b-4820-b2d6-afd300bc7e1e/1
  verified: false
