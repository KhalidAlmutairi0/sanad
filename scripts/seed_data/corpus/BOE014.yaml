regulation:
  code: BOE014
  name_ar: نظام مكتبة الملك فهد الوطنية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تحول مكتبة الملك فهد إلى مكتبة وطنية للمملكة العربية السعودية باسم (مكتبة الملك فهد الوطنية) وتكون لها شخصية اعتبارية مستقلة، وترتبط إداريًّا بديوان رئاسة مجلس الوزراء، ويكون مقرها مدينة الرياض، ويجوز إنشاء فروع لها داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تهدف المكتبة إلى اقتناء الإنتاج الفكري وتنظيمه وضبطه وتوثيقه والتعريف به ونشره، ولها في سبيل تحقيق ذلك- من غير تحديد لاختصاصها- ما يلي : 1 - جمع كل ما ينشر داخل المملكة. 2 - جمع ما ينشره أبناء المملكة خارجها. 3 - جمع ما ينشر عن المملكة. 4 - جمع ما يعتبر من الموضوعات الحيوية للمملكة من إنتاج فكري عالمي. 5 - جمع كل ما يمكن جمعه من الإنتاج الفكري في الخارج مما يساعد على دراسة الحضارة الإنسانية ومسايرتها في مختلف نواحيها. 6 - جمع كتب التراث والمخطوطات والمصورات النادرة والمطبوعات والوثائق المنتقاة، وبالأخص ما له علاقة بالحضارة العربية والإسلامية. 7 - تسجيل ما يودع لديها وفقًا للأنظمة. 8 - إصدار الببليوجرافية الوطنية والفهارس الموحدة وغيرها من أدوات التوثيق. 9 - إنشاء قواعد للمعلومات الببليوجرافية. 10 - تقديم الدراسات المرجعية للأجهزة والهيئات الحكومية. 11 - تقديم الخدمات المرجعية والإعارة للأفراد والأجهزة والهيئات الحكومية والخاصة. 12 - إقامة وتنظيم معارض الكتب والندوات والمؤتمرات. 13 - تمثيل المملكة في اللقاءات والمؤتمرات التي تتطلب تمثيلًا دوليًّا، وذلك في مجال اختصاصها
    . 14 - التعاون وتبادل المعلومات والمطبوعات مع المكتبات والهيئات والمنظمات الدولية. 15 - قيادة وتطوير أعمال وخدمات المكتبات ومراكز المعلومات عن طريق : أ - المشاركة بدور أساسي في وضع الخطط الوطنية لأنظمة المكتبات والمعلومات والوثائق بالتنسيق مع الجهات المعنية. ب - المشاركة بدور أساسي في وضع المواصفات والمقاييس الببليوجرافية الوطنية بالتنسيق مع الجهات المعنية، وتشجيع ومتابعة تطبيقها في المكتبات ومراكز المعلومات. ج - تنفيذ برامج استثمار المعلومات بما في ذلك إنشاء شبكة معلومات تعاونية بين المكتبات ومراكز المعلومات. د - المساهمة في إعداد ونشر البحوث والدراسات والأدلة الخاصة بأعمال المكتبات والمعلومات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يكون للمكتبة مجلس أمناء يتكون من : - رئيس للمجلس وخمسة أعضاء ممن لهم اهتمام بشؤون المكتبات، يتم اختيارهم بأمر ملكي، وتكون مدة عضويتهم ثلاث سنوات قابلة للتجديد مرة واحدة فقط. - أمين المكتبة عضوًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مجلس الأمناء هو السلطة المسؤولة عن رسم السياسة العامة للمكتبة في حدود هذا النظام والأنظمة الأخرى ذات العلاقة.وله أن يتخذ جميع القرارات اللازمة لتحقيق أهداف المكتبة، وعلى وجه الخصوص : 1 - اقتراح الأنظمة الخاصة بالإيداع النظامي وحقوق الملكية الفكرية، وحماية التراث الفكري الوطني وغير ذلك من الأنظمة ذات العلاقة بمجال عمل المكتبة.2 - إصدار اللوائح المالية والإدارية التي تسير عليها المكتبة، واللوائح التي تنظم شؤون منسوبيها بالاشتراك مع وزارة المالية والاقتصاد الوطني والديوان العام للخدمة المدنية بما يتفق والأنظمة القائمة.3 - إصدار اللوائح التنفيذية لهذا النظام.4 - اعتماد برامج المكتبة ومشروعاتها.5 - اقتراح مشروع ميزانية المكتبة والنظر في حسابها الختامي تمهيدًا لرفعه إلى مجلس الوزراء .6 - تكوين لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم للقيام بما يكلفها به المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يعقد المجلس اجتماعاته بصفة دورية بناء على دعوة من رئيسه أو من ينيبه أو من أغلبية الأعضاء وفقًا للائحة داخلية يصدرها المجلس، على ألا تقل اجتماعاته عن أربعة اجتماعات خلال العام، ولا يكون اجتماع المجلس نظاميًّا إلا بحضور الأغلبية المطلقة لأعضائه على أن يكون من بينهم الرئيس أو من ينيبه عنه، وتصدر القرارات بموافقة الأغلبية المطلقة للحاضرين، وعند التساوي يرجح الجانب الذي منه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يكون للمكتبة أمين بمسمى (أمين مكتبة الملك فهد الوطنية) لا تقل مرتبته عن الخامسة عشرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: أمين المكتبة هو المسؤول التنفيذي عن إدارة المكتبة في حدود ما يقضي به هذا النظام، وما يقرره مجلس الأمناء . كما أنه يمثلها أمام القضاء والهيئات والمؤسسات الأخرى، وتحدد صلاحياته ومسئولياته بموجب لائحة داخلية يصدرها مجلس الأمناء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يسري على منسوبي المكتبة نظام الخدمة المدنية ولوائحه في الأمور التي لا يتم تنظيمها بموجب اللوائح التي تصدر وفقًا للفقرة الثانية من المادة الرابعة من هذا النظام، وفي كل الأحوال يسري نظام التقاعد المدني على الموظفين السعوديين، كما يسري نظام التأمينات الاجتماعية على العمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تكون للمكتبة ميزانية مستقلة، وتتكون أموالها من : 1 - الاعتمادات التي تخصص لها من ميزانية الدولة.2 - الدخل الذي تحصل عليه من ممارسة نشاطها.3 - الهبات والإعانات والمنح والوصايا التي تقدم للمكتبة، وتقبل حسب القواعد التي يضعها مجلس الأمناء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: مع عدم الإخلال برقابة ديوان المراقبة العامة يعين مجلس الأمناء مراقبًا أو أكثر للحسابات من الأشخاص الطبيعيين ممن تتوافر فيهم الشروط القانونية، وتكون لهم حقوق المراقب في الشركات المساهمة وعليهم واجباته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يلغي هذا النظام ما يتعارض معه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يعمل بهذا النظام اعتبارًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/891a3908-3c1b-4b06-85ac-a9a700f17132/1
