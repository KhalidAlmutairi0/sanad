articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها : المملكة : المملكة العربية السعودية . الهيـئة : هيئة الهلال الأحمر السعودي . التنظيم : تنظيم هيئة الهلال الأحمر السعودي . المجلس : مجلس إدارة الهيئة . الرئيس : رئيس الهيئة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: هيئة الهلال الأحمر السعودي هيئة عامة ذات شخصية اعتبارية مستقلة ، ترتبط برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع ومراكز داخل المملكة، ولها كذلك إنشاء مكاتب خارج المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يقوم تنظيم الهيئة على أساس اتفاقيات جنيف الأربع لعام 1949م ، والبرتوكولين الإضافيين لها لعام 1977م ، والاتفاقيات والبروتوكولات المستقبلية المتعلقة بها التي تكون المملكة طرفاً فيها ، وقرارات ومبادئ الحركة الدولية للصليب الأحمر والهلال الأحمر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: الهدف الرئيس للهيئة هو السعي إلى منع وتخفيف حدة المعاناة والآلام البشرية ، دون تمييز أو تفرقة في المعاملة لأي سبب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'مع عدم الإخلال باختصاصات الجهات الأخرى ، تتولى الهيئة في سبيل تحقيق أهدافها المهمات الآتية : 1 - الاستعداد والعمل في زمن السلم والحرب بصفتها مساعدة للإدارات الطبية في القطاعات العسكرية على سبيل التعاون والتكامل لمصلحة جميع ضحايا الحروب المدنيين والعسكريين في جميع الأحوال المنصوص عليها في اتفاقيات جنيف الأربع لعام 1949م والبروتوكولين الإضافيين لها لعام 1977م، ويشمل ذلك على وجه خاص ما يلي : أ‌ - نقل الجرحى والمرضى ، وإنشاء وتشغيل مستشفيات الهلال الأحمر السعودي في المواقع التي تحددها القيادة العسكرية .ب - توفير وسائل نقل ومساعدة ضحايا الحرب .ج - التوسط في تبادل المراسلات الخاصة بأسرى وضحايا الحرب.د - العمل على توفير وتخزين وسائل ومعدات الإيواء والأدوية وجميع ما يلزم لعلاج المرضى والجرحى والعناية بالأسرى . 2 - تمثيل المملكة أمام الجهات الدولية المختصة بوصفها الجهة الوحيدة التي تمثل الهلال الأحمر في المملكة. 3 - تقديم الخدمات الإسعافية الطبية بوصفها المقدم الرئيس لهذه الخدمة في المملكة ، ويشمل ذلك النقل الإسعافي ، والخدمات الصحية لمرحلة ما قبل المستشفى للمرضى والمصابين في
    الحوادث والكوارث .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تلتزم الهيئة عند ممارستها لمهماتها وعند وضع برامجها وتطبيق أهدافها بالقواعد الواردة في هذا التنظيم على نحو لا يتعارض مع أحكام الشريعة الإسلامية والنظام الأساسي للحكم والأنظمة المعمول بها ، والاتفاقيات الدولية ذات الصلة ودون التدخل في الأمور السياسية أو الدينية عند تقديم خدماتها داخل المملكة وخارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تكون شارة الهيئة المميزة لها على النحو التالي : 1 ـ داخل المملكة : هلال أحمر على قاعدة بيضاء بحيث يكون طرفا الهلال متجهين إلى اليمين بالنسبة إلى الناظر إليه وإلى اليسار بالنسبة إلى حامل الشارة ، ويتوسط الهلال رمز الدولة السيفان باللون الذهبي والنخلة باللون الأخضر محاطاً باسم الهيئة الرسمي باللغتين العربية والإنجليزية . 2 - خارج المملكة : هلال أحمر على قاعدة بيضاء بحيث يكون طرفا الهلال متجهين إلى اليمين بالنسبة إلى الناظر إليه وإلى اليسار بالنسبة إلى حامل الشارة ، محاطاً باسم الهيئة الرسمي باللغتين العربية والإنجليزية .وللهيئة أن تعمل تحت أي شارة دولية أخرى بحسب الاتفاقيات الدولية التي توافق عليها المملكة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تضع الهيئة شارتها على مكاتبها ومراكزها ومستشفياتها ومخازنها وعرباتها وقوافلها ووسائل الانتقال الخاصة بها ومرافقها الأخرى ، ولها أن ترفع علماً عليه شارتها، وتمنح الهيئة منسوبيها شارات طبقاً لما تقرره لوائح الهيئة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: فيما عدا الحالات التي يقرها التنظيم أو الاتفاقيات الدولية المنظمة لأنشطة الهلال الأحمر والصليب الأحمر ، لا يجوز للغير استخدام شارة الهيئة، وللهيئة الحق في اتخاذ الإجراء القانوني اللازم لمنع استخدامها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تتمتع الهيئة بجميع المزايا والحصانات الواردة في اتفاقيات جنيف وأي اتفاقية متعلقة بها توافق عليها المملكة ، بما يسمح لها بالعمل وفقاً للمبادئ الأساسية للحركة الدولية للهلال الأحمر والصليب الأحمر، والقانون الدولي الإنساني، وقرارات المؤتمر الدولي للصليب الأحمر والهلال الأحمر .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يكون للهيئة مجلس إدارة يشكل على النحو الآتي :'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'المجلس هو السلطة المهيمنة على إدارة شؤون الهيئة والإشراف عليها وتصريف أمورها ، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود أحكام هذا التنظيم ، وله على وجه خاص ما يأتي : 1 - إقرار السياسات والخطط التي تحقق أهداف الهيئة . 2 - إصدار اللوائح الإدارية والمالية ، بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية. 3 - إصدار اللوائح اللازمة لتسيير عمل الهيئة . 4 - إقرار الهيكل التنظيمي للهيئة. 5 - الموافقة على إنشاء الفروع والمراكز والمكاتب . 6 - تعيين مراجع حسابات خارجي ومراقب مالي داخلي . 7 - الموافقة على مشروع الميزانية السنوية للهيئة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي تمهيداً لرفع ذلك وفقاً للإجراءات النظامية المتبعة . 8 - إقرار مصادر التمويل وقبول الهبات والإعانات والمنح والوصايا والأوقاف، بما لا يتعارض مع القواعد التي تنظم تلقي الجهات الحكومية تبرعات عينية أو نقدية . 9 - تشكيل لجان دائمة أو مؤقتة من بين أعضائها أو من غيرهم ، وتحديد مهماتهم واختصاصاتهم ومزاياهم المالية. 10 - إقرار القواعد والتنظيمات الخاصة بتنمية موارد الهيئة واستثماراتها . 11 - تقدير
    الإعانات ومستوى ونوع خدمات الإغاثة التي تقدمها الهيئة داخل المملكة وخارجها . 12 - إقرار التوجهات والسياسات الخاصة بعلاقة الهيئة بمنظمات الحركة الدولية للهلال الأحمر والصليب الأحمر وغيرها من المنظمات ذات العلاقة بأعمالها . 13 - إقرار قواعد منح الشارات والأوسمة والشهادات الفخرية والعضوية . 14 - إقرار القواعد التي تنظم التطوع في أعمال الهيئة ، وفقاً للخطة العامة المنظمة لذلك . 15 - إقرار الخطط والقواعد التي تنظم عمل الهيئة في حالات الطوارئ وفقاً للخطة المعتمدة المنظمة لذلك . وللمجلس بقرار منه تفويض بعض الصلاحيات إلى الرئيس أو غيره من مسؤولي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 1 - يعقد المجلس اجتماعاته في مقر الهيئة الرئيس ، ويجوز عند الحاجة انعقاد المجلس في أي مكان آخر في المملكة بناء على طلب رئيسه. 2 - يجتمع المجلس بصفة دورية مرة كل ثلاثة أشهر على الأقل ، ولرئيس المجلس دعوته للاجتماع متى دعت الحاجة إلى ذلك ، أو متى طلب نصف أعضاء المجلس على الأقل عقد اجتماع ، ويجب أن تشتمل الدعوة على جدول الأعمال . 3 - ينعقد الاجتماع بحضور أغلبية الأعضاء بمن فيهم رئيس المجلس ، أو من ينيبه، وللمجلس أن يدعو لحضور جلساته من يرى الاستعانة بخبراتهم ومعلوماتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'يكون للهيئة رئيس بمرتبة وزير يعين بأمر ملكي، ويكون هو المسؤول التنفيذي عن إدارة الهيئة وتصريف شؤونها وفقاً لهذا التنظيم وما يقرره المجلس، ويختص بما يلي : 1 ـ الإشراف على إعداد السياسات العامة ، والخطط والبرامج التي تسير عليها الهيئة، ورفعها إلى المجلس.2 ـ الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة.3 ـ الإشراف على إعداد مشروع الميزانية السنوية للهيئة ورفعه إلى المجلس.4 ـ تمثيل الهيئة أمام القضاء والجهات الحكومية والمؤسسات والهيئات الأخرى ، داخل المملكة وخارجها .5 ـ إصدار قرارات التعيين والترقية وإنهاء الخدمة، واعتماد المكافآت والجزاءات لجميع منسوبي الهيئة وفقاً للأنظمة واللوائح المعمول بها .6 ـ الإشراف على إعداد اللوائح اللازمة لتسيير العمل في الهيئة، واعتماد إجراءات العمل المبنية على اللوائح والقرارات التي يصدرها المجلس.7 ـ الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفق الأنظمة واللوائح المقرة .8 ـ الإشراف على إعداد التقرير السنوي والتقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، وعرضها على المجلس. وللرئيس بقرار منه تفويض أيٍّ
    من صلاحياته إلى من يراه من مسؤولي الهيئة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يكون لرئيس الهيئة نائب أو أكثر ، وفقاً للهيكل التنظيمي للهيئة، يعينون بقرار من المجلس بناءً على ترشيح الرئيس، ويتولى نواب الرئيس الأعمال والصلاحيات التي يفوضها الرئيس إليهم في حدود ما يقضي به التنظيم واللوائح المعتمدة الخاصة بالهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تكون العضوية في الهيئة متاحة للجميع دون تمييز ، سواء من الأفراد أو الأشخاص ذوي الصفة الاعتبارية ، وفق قواعد يقرها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: باستثناء الرئيس ، تطبق على موظفي الهيئة ـ من حيث أوضاعهم الوظيفية ـ القواعد المطبقة على موظفي المؤسسات والهيئات العامة، وفقاً لأحكام الأمر السامي رقم (5464/ م ب) وتاريخ 20/4/1426هـ .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'تكون للهيئة ميزانية مستقلة تعد وتصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. وتتكون أموال الهيئة مما يأتي : 1 ـ الاعتمادات التي تخصص لها في ميزانية الدولة .2 - الإعانات والمنح الحكومية . 3 - التبرعات والهبات والوصايا والأوقاف .4 ـ اشتراكات الأعضاء .5 ـ العوائد الناتجة من استثمار أموالها . 6 ـ الموارد الأخرى التي يوافق عليها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: أموال الهيئة مخصصة للصرف منها على ما يحقق أهدافها ، وللهيئة أن تمتلك وأن تتصرف في أموالها وتستثمرها، ولها إنشاء شركات أو الاشتراك في تأسيسها وفقاً للأساليب التجارية على النحو الذي يتفق مع أهدافها ومهماتها وفقاً لقواعد يقرها المجلس، دون الدخول في مضاربات مالية أو استثمارات مرتفعة المخاطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تودع أموال الهيئة في حساب مستقل لدى مؤسسة النقد العربي السعودي ، ولها فتح حسابات في البنوك المرخص لها في داخل المملكة وخارجها بحسب الحاجة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تسعى الهيئة إلى تكوين مال احتياطي لمواجهة الطوارئ والحالات الاستثنائية يستقطع من الوفورات التي تتحقق في ميزانيتها السنوية التي يكون مصدرها الهبات والتبرعات والإعانات والوصايا والأوقاف والموارد التي يقرر المجلس تخصيصها لهذا الغرض من غير الاعتمادات التي تخصص لها في ميزانية الدولة ، على ألا يتجاوز مقدار المال الاحتياطي (10%) من الميزانية السنوية للهيئة. ويحتفظ بالمال الاحتياطي للهيئة رصيداً نقديًًا في أحد البنوك ، ولا يجوز التصرف فيه إلا في الحالات الاستثنائية التي يقدرها المجلس، ويجوز في حالة الاستعجال التصرف في المال الاحتياطي بقرار من الرئيس، على أن يعرض ذلك على المجلس في أول اجتماع له للنظر في إقراره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تبدأ السنة المالية للهيئة وتنتهي مع السنة المالية للدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة، يكون للهيئة مراقب مالي داخلي . ويعين المجلس مراجع حسابات خارجيًًا ( أو أكثر ) من المرخص لهم بالعمل في المملكة، ويحدد أتعابهم . وإذا تعدد مراجعو الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة . ويرفع تقرير مراجع الحسابات إلى المجلس ، ويزود ديوان المراقبة العامة بنسخة منه بعد موافقة المجلس عليه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: ترفع الهيئة حسابها الختامي السنوي إلى مجلس الوزراء خلال تسعين يوماً من تاريخ انتهاء السنة المالية ، ويزود ديوان المراقبة العامة بنسخة منه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ، ويعمل به بعد تسعين يوماً من تاريخ نشره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يحل هذا التنظيم محل النظام الأساسي لجمعية الهلال الأحمر، الصادر بالمرسوم الملكي رقم (م/14) وتاريخ 12 /4 /1386هـ، ويلغي كل ما يتعارض معه من أحكام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/49ab78f2-a4ad-42f8-97ce-a9a700f28035/1
  verified: false
