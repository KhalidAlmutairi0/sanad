regulation:
  code: BOE473
  name_ar: تنظيم الجمعية السعودية للمراجعين الداخليين
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات التالية، أينما وردت في هذا التنظيم، المعنى القرين لكل منها، ما لم يقتضِ سياق النص خلاف ذلك : الجمعية : الجمعية السعودية للمراجعين الداخليين. التنظيم : تنظيم الجمعية. النظام الداخلي : النظام الداخلي للجمعية. الجمعية العمومية : الجمعية العمومية للجمعية. مجلس الإدارة : مجلس إدارة الجمعية. رئيس المجلس : رئيس مجلس إدارة الجمعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنشأ بمقتضى هذا التنظيم جمعية تسمى الجمعية السعودية للمراجعين الداخليين، وهي جمعية مهنية ذات شخصية اعتبارية وذمة مالية مستقلة، تعمل تحت إشراف وزارة التجارة والصناعة، مقرها الرئيس مدينة الرياض . ولها - بقرار من مجلس الإدارة - إنشاء فروع أو مكاتب في مدن أخرى داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الجمعية إلى تطوير مهنة المراجعة الداخلية، ومن أغراضها ما يلي : توفير معايير المراجعة الداخلية الدولية وقواعد آداب المهنة والإرشادات المهنية الأخرى ذات الصلة بالمراجعة الداخلية الصادرة من معهد المراجعين الداخليين الدولي. إعداد مواد وأدلة إرشادية وتطويرها، وتوفير المعارف والمعلومات ذات الصلة بالمراجعة الداخلية. عقد الاختبارات المؤهلة للحصول على الشهادات المهنية التي يمنحها معهد المراجعين الداخليين الدولي. تطوير البرامج التدريبية وبرامج التعليم المهني المستمر والدبلومات المتعلقة بالمراجعة الداخلية وتنفيذها من أجل رفع المستوى العلمي والمهني لممارسي مهنة المراجعة الداخلية، وإصدار الشهادات المتعلقة بها. تقديم الدعم الفني لمراقبة جودة الأداء المتعلق بالمراجعة الداخلية، وتطوير وسائل تحسين الأداء المهني . إعداد الدراسات المتعلقة بالأنظمة، واللوائح، والمعايير ذات الصلة بأعمال المراجعة الداخلية، وتقديم المقترحات في شأنها للجهات ذات الاختصاص. عقد المؤتمرات واللقاءات المهنية في مجال المراجعة الداخلية، وفقًا للإجراءات النظامية المتبعة . السعي إلى رفع وعي الجمهور بأعمال المراجعة
    الداخلية . توطيد أواصر الصلة مع الجهات ذات العلاقة بالمراجعة الداخلية داخل المملكة وخارجها، وتحديد مجالات الاهتمام المشترك وتفعيلها .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: عضوية الجمعية متاحة لكل شخص ذي صفة طبيعية يتقدم بطلبها، ويبين النظام الداخلي أنواع العضوية وشروطها وأحكامها، وواجبات العضو وحقوقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تتكون الجمعية العمومية من أعضاء الجمعية الذين أوفوا لها بالتزاماتهم، وفقًا لما يحدده النظام الداخلي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعقد الجمعية العمومية برئاسة رئيس المجلس - أو من ينيبه - اجتماعًا مرة كل عام في مدة لا تتجاوز ثلاثة أشهر من تاريخ انتهاء السنة المالية للجمعية، ولها عقد اجتماعات استثنائية عند الحاجة بدعوة من مجلس الإدارة أو بناء على طلب (5%) من الأعضاء. وتعقد الاجتماعات في مقر الجمعية الرئيس، ويجوز بناء على قرار من مجلس الإدارة عقدها في مكان آخر. يكون اجتماع الجمعية العمومية صحيحًا بحضور أغلبية الأعضاء، فإن لم يكتمل النصاب اللازم لذلك توجه دعوة إلى اجتماع ثانٍ يعقد خلال الثلاثين يومًا التالية للاجتماع السابق، ويكون اجتماع الجمعية العمومية في هذه الحالة صحيحًا مهما كان عدد الحاضرين. تصدر قرارات الجمعية العمومية بأغلبية أصوات الحاضرين، وفي حالة التساوي يرجح الجانب الذي صوت معه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تختص الجمعية العمومية بالنظر في الأمور التالية : إقرار خطة العمل التي يقدمها مجلس الإدارة واعتماد التقرير السنوي. اقتراح تعديل تنظيم الجمعية. إقرار النظام الداخلي وأي تعديل عليه. إقرار اللوائح الداخلية للجمعية. اعتماد الميزانية السنوية للجمعية . تعيين مراجع حسابات للجمعية. انتخاب ممثلي الجمعية العمومية في مجلس الإدارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يدير الجمعية مجلس إدارة يتكون من : أ - وزير التجارة والصناعة رئيسًا،. وله أن ينيب أحد أعضاء المجلس في ذلك. ب - وكيل وزارة التجارة والصناعة عضوًا. ج - وكيل وزارة المالية للشؤون المالية والحسابات أو من يعينه وزير المالية على ألا تقل مرتبته عن المرتبة الرابعة عشرة عضوًا. د - نائب رئيس ديوان المراقبة العامة أو من يعينه رئيس الديوان على ألا تقل مرتبته عن المرتبة الرابعة عشرة عضوًا. هـ - عضوين سعوديين من أعضاء هيئة التدريس في أقسام المحاسبة بجامعات المملكة ، يعينهما وزير التجارة والصناعة بناءً على ترشيح وزير التعليم العالي. و - ممثل لهيئة السوق المالية يعينه رئيس الهيئة عضوًا. ز - ستة أعضاء تنتخبهم الجمعية العمومية من بين أعضائها السعوديين لمدة ثلاث سنوات قابلة للتجديد مرة واحدة، واستثناء من ذلك يكون فريق العمل المنصوص عليه في المادتين (السادسة) و(السابعة) من برنامج التعاون الفني الموقع بين الهيئة السعودية للمحاسبين القانونيين ومعهد المراجعين الداخليين الأمريكي ممثلًا للجمعية العمومية إلى حين انتخاب ممثلي الجمعية العمومية في المجلس. يعاد تشكيل مجلس الإدارة كل ثلاث سنوات. يعقد
    مجلس الإدارة جلسة على الأقل كل ثلاثة أشهر، ويعقد كذلك بناءً على طلب رئيس المجلس، أو أربعة من أعضائه. تعقد الجلسات بحضور ثلثي الأعضاء، على أن يكون من بينهم الرئيس - أو من ينيبه - ويحضر المدير التنفيذي جلسات مجلس الإدارة دون أن يكون له صوت في إصدار القرارات. تصدر قرارات المجلس بأغلبية أصوات الحاضرين، فإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الجلسة. يمثل رئيس مجلس الإدارة - أو من ينيبه - الجمعية أمام الجهات الأخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى مجلس الإدارة الإشراف على أعمال الجمعية بما يحقق الأهداف التي أنشئت من أجلها والمحددة في هذا التنظيم، وفي حدود ما تنص عليه الأنظمة واللوائح المرعية في المملكة، وله على الأخص ما يأتي : دراسة المقترحات الخاصة بتطوير المراجعة الداخلية بما في ذلك الأنظمة والمعايير والإجراءات ذات الصلة، وتقديم توصياته ومقترحاته في شأنها للجهات المختصة. إعداد التقرير السنوي عن نشاط الجمعية، واقتراح خطة عمل لها . الإشراف على تنفيذ ومتابعة قرارات الجمعية العمومية والتعليمات الواردة من جهات الاختصاص . الموافقة على عقد الندوات والمؤتمرات التي تنظمها الجمعية فيما يتعلق بالمراجعة الداخلية والموضوعات المرتبطة بها . اقتراح النظام الداخلي، ورفعه إلى الجمعية العمومية. دعوة الجمعية العمومية للانعقاد، وإعداد جدول أعمالها . قبول الهبات والتبرعات والوصايا والأوقاف المخصصة للجمعية . إقرار سياسة استثمار أموال الجمعية، والإشراف على إدارة ممتلكاتها وأموالها، وتحديد البنوك التي تودع فيها أموالها. تحديد اشتراك العضوية في الجمعية . الإشراف على استيفاء ما للجمعية من حقوق وتأدية ما عليها من التزامات . إعداد
    اللوائح الإدارية والمالية للجمعية وغيرها من اللوائح الداخلية . إعداد الميزانية السنوية للجمعية . تشكيل اللجان المتخصصة الدائمة والمؤقتة لمساعدة الجمعية على تحقيق أهدافها، وتعيين أعضائها من بين أعضاء مجلس الإدارة أو من غيرهم، واعتماد إجراءات عملها، وتحديد واجبات أعضائها ومكافآتهم . تعيين مدير تنفيذي للجمعية وتحديد مسؤولياته وحقوقه، ولمجلس الإدارة تفويض بعض اختصاصاته لرئيس المجلس أو من ينيبه .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للجمعية جهاز تنفيذي من المدير التنفيذي وعدد كاف من الموظفين، يتولى القيام بالمهمات التنفيذية الفنية والمالية والإدارية. ويشرف المدير التنفيذي على الجهاز التنفيذي، ويحدد مجلس الإدارة صلاحياته ومسؤولياته وحقوقه والتزاماته، والشروط التي يجب توافرها فيه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون إيرادات الجمعية مما يلي : 1 - اشتراكات الأعضاء . 2 - إيرادات النشاطات ذات العائد المالي. 3 - التبرعات والهبات والوصايا والأوقاف . 4 - الإعانات الحكومية . 5 - عائدات استثمار ممتلكات الجمعية الثابتة والمنقولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعين الجمعية العمومية مراجع حسابات (أو أكثر) من بين المحاسبين القانونيين المصرح لهم بالعمل في المملكة، وتحدد مكافآته ومدة عمله، ويجوز لها إعادة تعيينه، ويجوز لها كذلك - في أي وقت - تغييره، مع عدم الإخلال بحقه في التعويض إذا وقع التغيير في وقت غير لائق أو لسبب غير مقبول .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تحدد السنة المالية للجمعية باثني عشر شهرًا ميلاديا تبدأ ببداية السنة الميلادية وتنتهي بنهايتها، واستثناء من ذلك تبدأ السنة المالية الأولى للجمعية من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية لإنشاء الجمعية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1 - يجوز بقرار من مجلس الوزراء حل الجمعية، وذلك بناء على توصية من الجمعية العمومية تصدر بأغلبية ثلثي أعضائها . 2 - تؤول جميع ممتلكات الجمعية إذا حلت إلى واحدة أو أكثر من الجمعيات أو الهيئات المهنية أو العلمية غير الهادفة إلى الربح التي لها أغراض مشابهة لأغراض هذه الجمعية وتقع في منطقة خدماتها ومسجلة وفقًا لما تقضي به الأنظمة المرعية في المملكة، ويصدر بذلك قرار من الجمعية العمومية للجمعية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به بعد ثلاثين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5203b65e-bf51-4e81-8701-a9a700f2d4b7/1
  verified: false
