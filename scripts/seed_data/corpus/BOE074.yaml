regulation:
  code: BOE074
  name_ar: نظام مزاولة المهن الهندسية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني الموضحة أمام كل منها، ما لم يقتضِ السياق خلاف ذلك: النظام : نظام مزاولة المهن الهندسية. اللائحة : اللائحة التنفيذية للنظام. الهيئة : الهيئة السعودية للمهندسين. الوزارة : وزارة التجارة والاستثمار. الوزير : وزير التجارة والاستثمار. مجلس الإدارة : مجلس إدارة الهيئة. اللجنة : لجنة الاعتماد المهني بالهيئة. العمل الهندسي : الدراسات والتصاميم والرسومات والإشراف والتنفيذ والتشغيل والصيانة في شعب التخصصات الهندسية وفروعها. مزاولة المهن الهندسية : القيام بأي عمل هندسي يمارس في شعب التخصصات الهندسية وفروعها. الاعتماد المهني : القيد لدى الهيئة والحصول على الدرجة المهنية. الدرجة المهنية : الدرجة المهنية التي يحصل عليها المهندس من الهيئة عند اعتماده مهنيًّا. ميثاق المهندس: مجموعة القواعد التي تنظم أخلاقيات مزاولة المهن الهندسية، وسلوكياتها التي تقرها الهيئة. الترخيص : الترخيص الذي تمنحه الوزارة للمكاتب والشركات الهندسية عند مزاولتها أيًّا من المهن الهندسية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1- لا تجوز مزاولة أي من المهن الهندسية إلَّا بعد الحصول على الاعتماد المهني من الهيئة، وفقا لما ورد في النظام، واللائحة.2 - يعد شغل الوظائف الهندسية في الجهات الحكومية بمثابة التصريح بمزاولة المهنة في هذه الجهات في حدود الوظائف الهندسية التي تم التعيين عليها، وواجباتها، ومسؤولياتها، وللجهات التنظيمية المختصة -في أي وقت تراه- إلزام المهندسين في الجهات الحكومية بالحصول على الاعتماد المهني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لا يجوز للمعتمد مهنيًّا مزاولة تخصص هندسي أو درجة مهنية غير معتمدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: مع مراعاة ما ورد في الفقرة (2) من المادة (الثانية) من النظام، يحظر تشغيل المهندسين غير المعتمدين مهنيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: فيما لم يرد فيه نص خاص، لا يجوز لأي جهة قبول أي عمل هندسي إلَّا من المعتمدين مهنيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يشترط للاعتماد المهني ما يأتي: 1 - أن يكون طالب الاعتماد المهني حاصلاً على المؤهل المطلوب في أي من التخصصات الهندسية من إحدى الجامعات السعودية، أو ما يعادلها من إحدى الجامعات المعترف بها.2 - أن يكون متمتعًا بالأهلية الكاملة.3 - أن يتعهد بالالتزام بميثاق المهندس.4 - ألَّا يكون قد سبق الحكم عليه في جريمة مخلة بالشرف أو الأمانة، ما لم يرد إليه اعتباره.5 - ألَّا يكون قد صدر في حقه قرار بشطب الاعتماد المهني، ما لم يكن قد مضى على صدور القرار ثلاث سنوات. 6 - أن يجتاز اختبارات القدرات الفنية في مجال تخصصه، للحصول على الدرجات المهنية، وفقاً للشروط والضوابط التي يصدر بها قرار من مجلس الإدارة. 7 - أن يسدد المقابل المالي المقرر للاعتماد المهني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تقدم طلبات الاعتماد المهني إلى اللجنة وفقاً للإجراءات التي يعتمدها مجلس الإدارة، ويتم الاعتماد المهني بعد التحقق من توافر الشروط اللازمة للاعتماد. وعلى اللجنة أن تبت في الطلب خلال ثلاثين يوماً من تاريخ استكمال المستندات المطلوبة. وفي جميع الأحوال، يجب أن يكون قرار اللجنة مسبباً، ويجوز التظلم من قرارها أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على المعتمد مهنيًّا أن يذكر اسمه، ودرجته المهنية، ورقم اعتماده المهني؛ على جميع أعماله الهندسية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يحدد مجلس الإدارة الدرجات المهنية ومتطلباتها، ومدة الاعتماد المهني وإجراءات تجديده، والمقابل المالي له، على أن يراجع ذلك كل خمس سنوات، وطبقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: مع مراعاة ما تقضي به الأنظمة ذات الصلة، وما ورد في الفقرة (1) من المادة (الثانية) من النظام، لا يجوز للمكاتب والشركات الهندسية مزاولة أي من المهن الهندسية إلَّا بعد الحصول على الترخيص اللازم من الوزارة، وفقاً لمعايير مزاولة المهنة وشروط التراخيص التي تضعها الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: '1- مع عدم الإخلال بأي عقوبة أشد منصوص عليها في أنظمة أخرى، يعاقب بغرامة لا تزيد على (1.000.000) مليون ريـال؛ كل من قام بأي من المخالفات الآتية: أ - مزاولة أي من المهن الهندسية دون الحصول على اعتماد مهني، أو خلال إيقافه، أو بعد شطبه.ب - مزاولة المكاتب والشركات الهندسية أيًّا من المهن الهندسية دون الحصول على ترخيص، أو بعد إلغائه.ج - تشغيل ممارس هندسي دون الحصول على الاعتماد المهني لمزاولة أعمال هندسية مع علمه بذلك. 2 - مع عدم الإخلال بأي عقوبة أشد منصوص عليها في أنظمة أخرى، يعاقب بالسجن مدة لا تتجاوز سنة واحدة، وبغرامة لا تزيد على (1.000.000) مليون ريـال، أو بإحدى هاتين العقوبتين ؛ كل من قام بأي من المخالفات الآتية: أ - تقديم بيانات غير مطابقة للحقيقة، أو سلوك طرق غير نظامية؛ نتج منها الاعتماد المهني أو الترخيص ، أو أدت إلى تجديد أي منهما، أو حصوله على درجة مهنية.ب - استعمال أي وسيلة من وسائل الدعاية والإعلان التي يكون من شأنها الاعتقاد بأحقيته في مزاولة مهنة من المهن الهندسية، دون حصوله على الترخيص أو الاعتماد المهني اللازم لذلك. ج - انتحال لقب من ألقاب الدرجات المهنية
    التي تمنح للمعتمدين مهنيًّا. 3 - تتولى هيئة التحقيق والادعاء العام التحقيق والادعاء في المخالفات المنصوص عليها في هذه المادة. 4 - تتولى المحكمة المختصة النظر في المخالفات وتطبيق العقوبات المنصوص عليها في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: '1 - تكوّن بقرار من الوزير لجنة أو أكثر لا يقل عدد أعضائها عن ثلاثة، على أن يكون من بينهم مستشار نظامي؛ تتولى النظر في المخالفات الأخرى الناشئة من تطبيق النظام، وإيقاع واحدة أو أكثر من العقوبات الآتية: أ - اللوم.ب - الإنذار. ج - إيقاف الاعتماد المهني مدة لا تزيد على ستة أشهر.د - غرامة مالية لا تزيد على (100.000) مائة ألف ريـال.هـ - شطب الاعتماد المهني.و - إلغاء الترخيص. 2 - تصدر قرارات اللجنة بأغلبية أعضائها، على أن تكون مسببة، وتعتمد بقرار من الوزير، ولمن صدر ضده قرار الحق في التظلم منه أمام ديوان المظالم وفقاً لنظامه. 3 - إذا اقترنت المخالفة -التي تختص اللجنة بنظرها وفقاً للفقرة (1) من هذه المادة- بمخالفة أخرى تختص بنظرها المحكمة وفقاً للمادة (الحادية عشرة) من النظام؛ فعلى اللجنة إحالة المخالفة إلى هيئة التحقيق والادعاء العام للتحقيق والادعاء فيها، وعلى المحكمة المختصة النظر في المخالفة، وتطبيق العقوبات الواردة في النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجوز تضمين الحكم أو القرار المكتسب القطعية الصادر بالعقوبة النص على نشره على نفقة المخالف في ثلاث صحف محلية، تصدر إحداها على الأقل في مقر إقامته، فإن لم تكن هناك صحيفة في المنطقة ففي صحيفة تصدر في أقرب منطقة إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يتولى ضبط ما يقع من مخالفات لأحكام النظام، ولائحته، موظفون من الهيئة يصدر بتسميتهم قرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجوز لمن شطب اعتماده المهني أو ألغي ترخيصه طبقاً لأحكام النظام؛ أن يطلب إعادة اعتماده أو ترخيصه من الجهة المختصة بعد انقضاء ثلاث سنوات من تاريخ صدور حكم أو قرار الشطب أو الإلغاء، وتُتَّبع في طلب إعادة الاعتماد المهني أو الترخيص الشروط والإجراءات اللازمة للاعتماد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يصدر الوزير -بالتنسيق مع مجلس الإدارة- اللائحة التنفيذية لهذا النظام خلال تسعين يوماً من تاريخ العمل به، وتنشر في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعمل بهذا النظام بعد ستين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ebb751a1-6f0b-4595-9736-a9a700f1f47b/1
  verified: false
