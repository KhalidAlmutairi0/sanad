  name_ar: نظام الجمعيات التعاونية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية – أينما وردت في هذا النظام – المعاني المبينة أمام كل منها ما لم يقتض السياق خلاف ذلك. الوزارة : وزارة الشئون الاجتماعية. الوزير: وزير الشئون الاجتماعية . الجمعية : أي جمعية تعاونية مسجلة بموجب أحكام هذا النظام . الجمعية العمومية : جميع الأعضاء المساهمين في رأس مال الجمعية التعاونية. مجلس الإدارة : مجلس إدارة الجمعية التعاونية. العضو: العضو المؤسس للجمعية، أو المنضم إليها بعد تأسيسها. اللائحة : اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تعد جمعية تعاونية كُل جمعية يكوِّنها أفراد طِبقاً لأحكام هذا النِظام، بهدف تحسين الحالة الاقتصادية والاجتماعية لأعضائها ،سواء في نواحي الإنتاج، أم الاستِهلاك ،أم التسويق أم الخدمات ، باشتِراك جهود الأعضاء مُتبِعة في ذلك المبادئ التعاونية. ويجب أن يشتمل اسم الجمعية على ما يدل على صفتها التعاونية ،ونوع عملها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتكون الجمعية من أفراد لا يقل عدَّدُهم عن اثني عشر شخصاً، ولكُل عضو أنَّ يمتلِك عدَّدا من الأسهُم، بشرط ألا يزيد ما يمتلِكُه العضو الواحد عن (10%) من رأس مال الجمعية طوال مُدة اشتِراكِه في الجمعية ، ويجوز في حالات استثنائية يقدرها الوزير تأسيسها بما لايقل عن خمسة أعضاء ، وفي هذه الحالة يشترط ألا يزيد مايمتلكه العضو الواحد على 20% من رأس مال الجمعية طوال مدة اشتراكه فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تكتسِب الجمعية الشخصية الاعتِبارية بمُجرد إتمام عمليتي التسجيل والإشهار المنصوص عليها في هذا النِظام، والنشر عن ذلك في صحيفتين محليتين. ويجوز للجمعية أن تنشئ لها فروعا بعد الحصول على ترخيص من الوزارة ، وفق الضوابط التي تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: مع مراعاة ما ورد في المادة (الثالثة) من هذا النظام ، يكون سعر السهم ثابِتا، ولا تجوز تجزئتُه ، ويمكن للعضو المنسحب من الجمعية التنازل عن قيمة أسهمه لعضو في الجمعية أو لمساهم جديد بعد موافقة مجلس الإدارة ، فإذا تعذر التنازل واقتنع مجلس الإدارة بأسباب الانسحاب كان للعضو المنسحب أن يسترد قيمة أسهمه بعد إضافة ماحققته من أرباح أو حسم مالحق بها من خسائر . وكذلك الأمر إذا ما فقد عضو عضويته بفقد أحد شروطها أو بالفصل . وفي حالة الوفاة يحل الورثة أو بعضهم محل مورثهم أو يتفقون على إحلال أحدهم محله على أن تتوافر شروط العضوية في الوارث ،وإلا ردت إليهم قيمة الأسهم بعد إضافة ماحققته من أرباح أو حسم مالحق بها من خسائر .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لايجوز الحجز على أموال الجمعية إلا وفاء لديونها وبموجب حكم قضائي ، وتتحدد مسؤولية العضو في حقوق الجمعية وإلتزاماتها بقدر مايملكه من الأسهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: باب العضوية بالجمعية مفتوح لمن تنطبق عليهم شروط العضوية ، إلا في حالات استثنائية تحددها اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يُعد الأشخاص الذين يشترِكون في تكوين جمعية تعاونية مؤسَّسين لها، وهُم الذين يتولون إعداد عقد التأسيس الابتدائي، واللائحة الأساسية للجمعية. ويتحملون بالتضامُن ما يستلزمُه تكوين الجمعية من نفقات التأسيس، وما يتفرع عنه من التزامات، ويرد إليهم من رأس المال مصروفات التأسيس بعد تسجيل الجمعية، وإذا تعذر تكوين الجمعية لا يكون لهُم حق الرجوع على أحد بما أنفقوه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجب أن يتضمن عقد تأسيس الجمعية ما يأتي:1 - تاريخ ومكان تحريرِه.2 - أسماء المؤسَّسين ومحال إقامتِهم ومهنِهم.3 - اسم الجمعية.4 - مقر الجمعية ومنطِقة عملِها.5 - نوع الجمعية وأغراضِها.6 - قيمة رأس المال والقيمة الاسمية لكُل سهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يكون لكُلِ جمعية لائحة أساسية تعد وفقا لأحكام هذا النظام متضمنة -على الأخص - ما يأتي: 1 - اسم الجمعية، ومنطِقة عملِها ، ومقرها والغرض أو الأغراض التي أنشئت من أجلها . 2 - مقدار رأس مال الجمعية ، وقيمة الأسهُم ، وكيفية دفعِها، والحد الأعلى للأسهم التي يجوز للعضو امتلاكها .3 - شروط العضوية ، وواجبات الأعضاء، وشروط فقد العضوية ، أو انسِحابِهم والآثار المترتبة عليها .4 - شروط الترشيح لعضوية مجلس الإدارة ، وعدد أعضائه ،وطريقة إنتخابهم ، وإختصاصاته ، ومدته ، وأحوال وشروط انسحاب أعضائه وإنهاء عضويتهم . 5 - اختِصاصات الجمعية العمومية وقواعِد دعوتِها ومواعيد اجتِماعِها. 6 - السنة المالية للجمعية.7 - السجلات الحِسابية والإدارية التي يجب أن تُمسِكُها الجمعية، وطريقة إعداد وتحضير الحِساب الختامي والميزانية العمومية ، والمُصادقة عليهما .8 - قواعد قبول التبرعات ،والهبات ، والمنح ، والوصايا ، والأوقاف .9 - قواعد توزيع الأرباح ، وتسوية الخسائر.10 - قواعِد تعديل اللائحة الأساسية للجمعية.11 - قواعِد إندماج الجمعية، أو حلها وتصفيتها .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'على مؤسِّسي الجمعية التقدُّم للوزارة بطلب تسجيل الجمعية، على أنَّ يُرفق بِه المُستندات الآتية: 1 - دراسة جدوى تأسيس الجمعية . 2 - محضر اجتِماع المؤسِّسين. 3 - نُسختان من كُلٍ مِن: عقد التأسيس، واللائحة الأساسية للجمعية، موقعة من المؤسِّسين ، ويُصدِق على التواقيع مسؤول الوزارة الذي تقع الجمعية في منطِقة عملِه. 4 - كشف بأسماء المؤسسين ومهنهم ومحال إقامتهم ، وعدَّد وقيمة الأسهُم التي تم الاكتتاب بها من قبل كل منهم ، مصحوب بصور لبطاقات الهوية الوطنية . 5 - إيصال بإيداع قيمة أسهم المؤسسين بأحد البنوك. 6 - مشروع البرنامج السنوي لنشاط الجمعية. 7 - إقرار موقع عليه من جميع الأعضاء المؤسسين يبين أعضاء اللجنة المؤقتة التي ستتولى متابعة تأسيس الجمعية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تقوم الوزارة بمُراجعة المُستندات الواردة في المادة (الحادية عشرة) من هذا النظام ، فإذا كانت مستوفية لمتطلبات هذا النِظام قامت بإتمام إجراءات الإشهار، وإلا فلها أنَّ ترفُض التسجيل أو تطلُّب تعديل اللائحة الأساسية ، وعليها أنَّ تُخطِر المؤسِّسين بالرفض وأسبابه أو بطلب التعديل خِلال ستين يوماً من تاريخ ورود طلب الإشهار إليها، وإلا عد الإشهار واقِعاً بحُكم النِظام. وللمؤسسين حق الطعن في قرار الرفض أمام الوزير خِلال ستين يوماً من تاريخ إبلاغهم بذلك . وفي حالة الموافقة على الإشهار تزاول الجمعية نشاطها ، وتتمتع بالامتيازات الممنوحة للجمعيات بموجب هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يكون لكُل جمعية مجلِس إدارة، يقوم بكافة الأعمال اللازِمة لإدارتها في حدود أغراضِها ولائحتِها، ويتكون مِن خمسة أعضاء على الأقل، تنتخِبُهم الجمعية العمومية من بين أعضائها، واستثناء من ذلك يُعيِّن المؤسِّسون من بينِهم مجلِس الإدارة الأول لمُدة ثلاث سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مُدة عضوية مجلِس الإدارة أربع سنوات، ويجوز للجمعية العمومية التجديد للمجلس لفترة أخرى أو أكثر ، ويستمر المجلس في ممارسة مهامه وصلاحياته إلى أن يتم تعيين المجلس الجديد ، ولا يتقاضى أعضاء مجلِس الإدارة أجراً عن عملِهم ، ولكن يجوز للجمعية العمومية منح المجلس مكافأة بنسبة لاتزيد على 10٪ من الأرباح السنوية المحققة بعد استقطاع النسب النظامية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: إذا خلا مكان أحد أعضاء مجلِس الإدارة لأي سبَّب، فعلى المجلِس أنَّ يضُم العضو – من بين الأعضاء الاحتياطيين - الذي حاز على أكثر الأصوات في إقتراع الجمعية العمومية التي انتخبتهم ، ويكمل المدة المتبقية من دورة المجلس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينتخب مجلِس الإدارة من بين أعضائه رئيساً ، ونائباً للرئيس ، وأميناً للمجلس ، وأميناً للصندوق في أول اجتماع له .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: لايكون انعقاد المجلس صحيحا إلا بحضور أغلبية أعضائه ، وتصدر قراراته بموافقة الأغلبية المطلقة لعدد الأعضاء الحاضرين ، فإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 1- يقوم مجلِس الإدارة بالإشراف على سير العمل بالجمعية بصِفة مُستمِرة، ومُراقبة من يقوم بالإدارة ، ومن يُمثِلون الجمعية والمُفوضين لأعمال مُعيِّنة . 2 - لرئيس مجلِس الإدارة حق التوقيع عن الجمعية و تمثيلِها لدى الآخرين و أمام القضاء، وله بموجب ذلك حق تفويض غيره وتوكيله .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: مع مراعاة أنظمة المحاسبين المعمول بها، يصدر الوزير قرارات وزارية تنظم عملية المراجعة الحسابية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يُقدِّم مجلِس الإدارة في نهاية السنة المالية حِسابات الجمعية، وتشمل:1 - الحِساب الختامي للسنة المالية المُنتهية.2 - حساب الأرباح والخسائر .ويُعرض هذان الحِسابان -مشفوعين بالمُستندات المُثبِتة لهُما -على مُراجِع الحِسابات لفحصِها قبل انعِقاد الجمعية العمومية بشهر على الأقل، ويبقى الحِساب الختامي وحِساب الأرباح والخسائر وتقارير مجلِس الإدارة والمُفتِّشين والمُراجعين في مقر الجمعية مُدة أسبوعين على الأقل قبل انعِقاد الجمعية العمومية، ويكون لكُلِ عضو حق الإطلاع عليها. وتظل كذلك إلى أنَّ يتم التصديق عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يعين مجلس الإدارة مديرًا تنفيذيًا يقوم بتصريف شؤون الجمعية، ويحدد المجلس اختصاصاته، وواجباته، وحقوقه، ويكون مجلس الإدارة مسؤولاً عن أعمال المدير في مواجهة الجمعية العمومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: الجمعية العمومية هي السلطة العليا في الجمعية التي تتكون من جميع الأعضاء المساهمين، ويجب أن تنعقد مرة على الأقل كل سنة ولا يكون الاجتماع نظاميًا إلا بحضور (25%) من الأعضاء، فإذا لم يكتمل النصاب يؤجل الاجتماع خمسة عشر يومًا، ويصبح الاجتماع نظاميًا بحضور (10%) من الأعضاء على الأقل، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه الرئيس
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: لكل عضو صوت واحد في الجمعية العمومية مهما بلغت الأسهم التي يملكها، وللعضو أن يوكل عضوًا آخر في الجمعية من غير أعضاء مجلس الإدارة، ولا يجوز للعضو أن يكون وكيلاً عن أكثر من واحد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تتولى الجمعية العمومية ممارسة الاختصاصات الآتية:1 - مناقشة تقارير مجلس الإدارة وملاحظات الوزارة على الجمعية واتخاذ القرارات المناسبة بشأنها .2 - اعتماد الميزانية العمومية والحسابات الختامية للسنة المالية المنصرمة. 3 - مناقشة واعتماد الخطة السنوية للجمعية، وموازنتها التقديرية للسنة المالية التالية. 4 - اعتماد مشروع توزيع الأرباح، وتحديد كيفية استثمار الاحتياطي العام. 5 - انتخاب أعضاء مجلس الإدارة، والأعضاء الاحتياطيين. 6 - تعيين مراجع الحسابات الخارجي، وتحديد أتعابه. 7 - البت في الاعتراضات والاستئنافات المقدمة للجمعية طعنًا في أي قرار صادر من مجلس الإدارة. 8 - تحديد الحد الأعلى للتمويل، والالتزامات التي يتطلبها عمل الجمعية. 9 - النظر في المسائل الأخرى المتعلقة بأعمال الجمعية، وتدخل ضمن اختصاصاتها بموجب هذا النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'تعقد الجمعية العمومية اجتماعا غير عادي بدعوة من مجلس الإدارة، أو من مراجع الحسابات، أو بطلب من ثلث أعضائها على الأقل، أو بدعوة من الوزارة، وذلك لبحث إحدى الحالات الآتية: 1 - تعديل اللائحة الأساسية للجمعية. 2 - التصرف في ممتلكاتها العقارية والاستثمارية. 3 - حل الجمعية، أو دمجها مع جمعية أخرى، أو تقسيمها إلى جمعيتين أو أكثر. ويشترط لصحة انعقاد اجتماع الجمعية العمومية غير العادي حضور أغلبية المساهمين، مع مراعاة ما ورد في الفقرة (6) من المادة (السابعة والثلاثين) من هذا النظام في حالة حل الجمعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تنتخب الجمعية العمومية من بين أعضائها رئيسا لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 'تتكون موارد الجمعية من المصادر الآتية: 1 - رأس مال الجمعية. 2 - التبرعات والهبات والمنح والوصايا والأوقاف، وفقًا للقواعد التي تنظمها اللائحة الأساسية للجمعية. 3 - المقابل الذي تقرره الجمعية لقاء الخدمات التي تقدمها لأعضائها وغيرهم. 4 - الإعانات التي تقدمها الدولة. 5 - عوائد أنشطة الجمعية واستثماراتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 'توزع أرباح الجمعية على النحو الآتي: 1 - (٪20) من الأرباح لتكوين احتياطي نظامي للجمعية إلى أن يتساوى رصيد الاحتياطي النظامي مع رأس المال ، وعندها يتم تحويل النسبة إلى الاحتياطي العام . 2 - مبلغ لا يزيد على (20٪) من باقي الأرباح يُصرف كرِبح بنِسبة المُساهمة في رأس المال . 3 - مبلغ لا يزيد عن (10٪) من الباقي الأرباح للخدمات الاجتِماعية. 4 - مع مراعاة ماقد تقرره الجمعية العمومية من مكافأة لأعضاء مجلس الإدارة وفق مانصت عليه المادة ( الرابعة عشرة) من هذا النظام ، تُخصَّص باقي الأرباح للعائد على المعاملات وفق ما تحدده اللائحة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يكون مجلس للجمعيات ، وتحدد اللائحة طريقة تكوينه وإختصاصاته وتنظيم شؤونه المالية والإدارية وعلاقته بالجمعيات ومدى استفادته من الاعانات والامتيازات التي تمنح للجمعيات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: 'تقدم الوزارة الإعانات الآتية: 1 - إعانة تأسيسية لمرة واحدة للجمعية بعد تسجيلها لمساعدتها في نفقات التأسيس على ألا تزيد عن (20%) من رأس مال الجمعية وقت التسجيل. 2 - إعانة بناء مقر للجمعية لمزاولة أعمالها ونشاطاتها على ألا تزيد عن (50%) من التكاليف المقدرة للبناء، موزعة على دفعات تتناسب مع مراحل التنفيذ بشرط ألا تزيد عن (50%) من التكاليف الفعلية. 3 - إعانة مشاريع للجمعية إذا قامت بتنفيذ مشروع تعاوني إنتاجي أو تسويقي يدخل ضمن أغراضها بما لا يزيد عن (50%) من تكاليف المشروع. 4 - إعانة مخاطر إذا تعرضت الجمعية لخسارة فادحة نتيجة لظروف قاهرة بما لا يزيد عن (90%) من الخسارة. 5 - إعانة إدارة عندما تعين الجمعية مديرًا سعوديًا متفرغًا لأعمالها، تتناسب كفايته ومؤهلاته مع النشاطات التي تؤديها الجمعية، على ألا تتجاوز الإعانة نسبة (50%) من راتبه الشهري لمدة ثلاث سنوات، ويجوز تمديدها لسنوات أخرى بموافقة الوزير. 6 - إعانة مجلس إدارة إذا انتظمت اجتماعات المجلس، بحيث لا تقل عن اثني عشر اجتماعا في السنة الواحدة بما لا يتجاوز (20%) من الأرباح السنوية للجمعية مكافأة لأعضاء مجلس الإدارة. 7 -
    إعانة تشغيل عندما تمتلك الجمعية ما لا يقل عن ثلاث آلات ميكانيكية لا تنقطع عن العمل في منطقة خدمات الجمعية أكثر من (ثلاثة) أشهر خلال السنة بما لا يتجاوز (50%) من متوسط مرتبات (ثلاثة) من العاملين على الآليات. 8 - إعانة تدريب عن اشتراك أحد أعضاء الجمعية، أو العاملين بها في دورة أو حلقة دراسية أو مؤتمر في مجال التعاون داخل المملكة أو خارجها. وتحدد الإعانة بما لا يتجاوز (90%) من التكاليف، على ألا تتحمل الوزارة تكاليف أكثر من شخصين في السنة الواحدة. 9 -إعانة محاسبية للجمعية في الحالات الآتية: أ - عندما تتفق الجمعية مع أحد مكاتب المحاسبة المسجلة رسميًا؛ للقيام بمراجعة حساباتها الختامية وميزانياتها العمومية ،على أن تحدد الإعانة بما لا يزيد عن (50%) من التكاليف المتفق عليها لمدة (سنتين)، ويجوز تمديدها بموافقة الوزير على ألا تزيد عن (25%) من التكاليف. ب - عندما تقوم الجمعية بالاتفاق مع محاسب لديه من الخبرة ما يتفق وحاجتها، على أن تحدد الإعانة بما لا يزيد عن (50%) من مرتبه لمدة (سنتين)، وبما لا يزيد عن (25%) للسنة الثالثة. 10 - إعانة دراسات وبحوث بنسبة لا تزيد عن (50%) من التكاليف. 11 - إعانة فنية
    لمساعدة الجمعية – عند الضرورة – على تطوير عملها، ويشمل ذلك تكليف بعض موظفي الوزارة بالعمل لدى الجمعيات ولمدد محددة. 12 - إعانة خدمات اجتماعية للجمعية بما لا يتجاوز (50%) مما تنفقه الجمعية من البند المخصص لذلك في ميزانياتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: تقوم الوزارة بتقدير الإعانات وفقًا لأحكام هذا النظام، وحاجة الجمعيات، شريطة توافر الاعتمادات اللازمة لذلك. وتحدد اللائحة شروط وضوابط منح هذه الإعانات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'للوزير أن يوقف بصفة مؤقتة أو دائمة صرف الإعانة للجمعية في الحالات الآتية: 1 - إذا صدر قرار بحل الجمعية، أو تصفيتها، أو إيقاف نشاطها. 2 - إذا لم تعقد الجمعية جمعيتها العمومية السنوية بدون مبرر مقبول. 3 - إذا تأخرت الجمعية في تقديم ميزانيتها العمومية وحساباتها الختامية للوزارة (ستة) أشهر بعد نهاية سنتها المالية بدون مبرر مقبول. 4 - إذا انتهى الغرض الذي من أجله تقرر صرف الإعانة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: لا يجوز للجمعية أن تجمع بين إعانتين تدفعان من قبل الحكومة لمشروع واحد، ويكتفي بالأكثر منهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: لا تصرف الإعانات الواردة في هذا النظام إلا بعد أن تتأكد الوزارة من قدرة الجمعية على مواصلة العمل وتحقيق أهدافها، وأن تكون التقارير عنها جيدة، ولم تخرج عن الأهداف التي أنشئت من أجلها، أو تخالف هذا النظام ولائحته واللائحة الأساسية للجمعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 'يجوز منح القطاع التعاوني التسهيلات والمزايا الآتية: 1 - منح الأراضي للجمعيات. 2 - إعطاء الأفضلية في تأجير المواقع الحكومية على الجمعيات وبأسعار تشجيعية. 3 - تسهيل إجراءات إقراضها من صناديق الإقراض الحكومية المختلفة وبخاصة ما يتعلق بالضمانات، وتوسيع دائرة الإقراض. 4 - تسهيل إجراءات استيرادها لاحتياجات أعضائها والمتعاملين معها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 1 - تخضع الجمعيات لرقابة الوزارة ، وتتناول هذه الرقابة فحص أعمال الجمعية والتحقُّق من مُطابقتِها للأنظِمة واللائحة الأساسية وقرارات الجمعية العمومية، كما تشمل الرقابة مُراقبة حِسابات الجمعية بواسِطة مُراجعي الحِسابات.2 - للوزير الحق في وقف تنفيذ قرارات الجمعية العمومية في حالة مُخالفتِها للأنظِمة وللائحتِها الأساسية.3 - للوزارة الحق في الإنابة عن الجمعية العمومية في استيفاء مُستحقاتِها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: 'للوزير الحق في حل الجمعية وتصفية أعمالِها في أي من الحالات الآتية: 1 - إذا مضت سنتان على تاريخ نشر تسجيلها وإشهارها ولم تباشر عملها . 2 - إذا بلغ مجموع خسائرِها في سنة ما أكثر مِن نصف رأس مالها المدفوع. 3 - إذا نقص عدَّد المُساهمين عن العدد المحدد في المادة (الثالثة) من هذا النظام . 4 - إذا خرجت عن أهدافها التي أنشئت من أجلها . 5 - إذا تعذر استمرارها لإضطراب أعمالها بصفة مستمرة ، أو لتكرار إخلالِها بأحكام هذا النظام ولائحته واللائحة الأساسية للجمعية . 6 - إذا قرَّرت الجمعية العمومية حلها بأغلبية (ثلاثة أرباع) المُساهمين على الأقل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: في حالة حل الجمعية، تُعيِّن الوزارة مُصفي أو أكثر لتصفيتِها. ويقوم المُصفي بإجراء كافة التصرُفات النِظامية اللازِمة لاستيفاء حقوق الجمعية والوفاء بديونِها ، لتحقيق فائض موجوداتِها. ويجب أنَّ يُقصِر المُصفي عملُه على إنهاء أعمال الجمعية التي بدئ فيها فعلاً، وأنَّ يمتنع عن الشروع في أعمال جديدة. ويضع المُصفي حساباً ختامياً، وتتم مُراجعتُه طِبقاً لأحكام المادة (العشرين) من هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: ينشر ملخص حساب التصفية في إحدى الصحف المحلية ، ويجوز لأي من أعضاء الجمعية الطعن فيه أمام الوزير خِلال ثلاثين يوماً من تاريخ النشر ، وعلى الوزير الفصل في الطعن خِلال (ثلاثين) يوماً من تاريخ تقديمه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يوزع ناتج التصفية على الأعضاء، بحيث لا تتجاوز قيمة ما دفعُه الأعضاء فعلاً ثمناً لأسهُمهم وماتحقق من أرباح ، ويودع الباقي في أحد المصارِف على ذمة إنشاء جمعية تعاونية جديدة، أو بتحويله بقرار من الوزير إلى جمعية تعاونية تُمارِس نشاط الجمعية نفسه أو أي نشاط آخر يكون أقرب إلى نشاطِها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: تتولى الوزارات ذات العلاقة الإشراف الفني على الجمعيات، وذلك فيما يخص نشاطاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يصدر الوزير اللائحة والقرارات اللازمة لتنفيذ أحكام هذا النظام، على أن تصدر اللائحة في مدة أقصاها (تسعون) يومًا من تاريخ صدوره، ويعمل بها من تاريخ العمل بالنظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يحل هذا النظام محل نظام الجمعيات التعاونية، الصادر بالمرسوم ذي الرقم 26 والتاريخ 25 / 6 / 1382 هـ، وكذا لائحة إعانة الجمعيات التعاونية، الصادرة بقرار مجلس الوزراء ذي الرقم 419 والتاريخ 10 / 5 / 1398 هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد (تسعين) يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0264f52c-70bd-40f2-94c1-a9a700f2b561/1
  verified: false
