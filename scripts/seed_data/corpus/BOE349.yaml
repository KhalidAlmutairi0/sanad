regulation:
  code: BOE349
  name_ar: الترتيبات التنظيمية للمعهد الملكي للفنون التقليدية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية –أينما وردت في هذه الترتيبات– المعاني المبينة أمام كل منها: الترتيبات: الترتيبات التنظيمية للمعهد الملكي للفنون التقليدية. المعهد: المعهد الملكي للفنون التقليدية. الوزير: وزير الثقافة. المجلس: مجلس أمناء المعهد. الرئيس: رئيس المجلس. الفنون التقليدية: فنون موروثة، ترتبط بالهوية الوطنية، وتنتقل عبر الأجيال، أنتجتها المجتمعات المحلية أو طورتها. الكنوز الحية: الحرفيون المتميزون من كبار السن ذوي الخبرة العميقة في ممارسة أحد عناصر التراث الثقافي غير المادي، الذين ينقلون خبراتهم إلى الآخرين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: ينشأ بموجب هذه الترتيبات معهد يسمى (المعهد الملكي للفنون التقليدية)، يتمتع بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط تنظيمياً بالوزير، ويكون مقره الرئيس في مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المعهد إلى الإسهام في العناية بالفنون التقليدية، وذلك من خلال تحقيق الأهداف الآتية: التأكيد على الهوية الوطنية من خلال إثراء الفنون التقليدية، والترويج لها. تشجيع وتدريب المواهب والقدرات في مجالات الفنون التقليدية، وتوفير برامج تعليمية في مجالات الفنون التقليدية. تقدير الكنوز الحية والمتميزين وذوي الريادة والإسهامات في مجالات الفنون التقليدية، وتكريمهم، وتوفير المحفزات والدعم المادي لهم لمواصلة أعمالهم والتعريف بها. المساهمة في الحفاظ على أصول الفنون التقليدية المادية وغير المادية. رفع مستوى الوعي بالفنون التقليدية في المملكة، ونشرها، والتعريف بها محلياً ودولياً، وتشجيع ودعم الجهود الهادفة إلى الحفاظ عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يقوم المعهد بكل ما يلزم في سبيل تحقيق أهدافه، من ذلك ما يأتي: تصميم وإقامة برامج تدريبية وبرامج إعدادية ودبلومات في مجالات الفنون التقليدية. اقتراح وتطوير وتنفيذ برامج أكاديمية تعليمية في مجالات الفنون التقليدية، وذلك بالتنسيق مع الجهات ذات العلاقة. احتضان وتبني ودعم واعتماد برامج التلمذة في مجالات الفنون التقليدية، وذلك بالتنسيق مع الجهات ذات العلاقة. تقديم منح دراسية وتدريبية للمواهب والقدرات في مجالات الفنون التقليدية، وذلك بالتنسيق مع الجهات ذات العلاقة. عقد المؤتمرات والندوات واللقاءات وورش العمل المتعلقة بالفنون التقليدية، والمشاركة فيها داخل المملكة وخارجها، وذلك وفقاً للإجراءات النظامية المتبعة. تقديم الخدمات التدريبية والاستشارية في مجال اختصاص المعهد. الاستعانة بالكفايات والخبرات وبيوت الخبرة المحلية والدولية المتخصصة في مجالات عمل المعهد بما يسهم في تحقيق أهدافه. الاشتراك في عضوية المعاهد والاتحادات والمنظمات والهيئات الإقليمية والدولية وما في حكمها ذات العلاقة باختصاصات المعهد ووفقاً للإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للمعهد مجلس أمناء برئاسة الوزير، وعضوية تسعة أعضاء يرشحهم الوزير، ويصدر بتعيينهم أمر من رئيس مجلس الوزراء لمدة ثلاث سنوات قابلة للتجديد لمرة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون المعهد وتصريف أموره في حدود الترتيبات، وله أن يتخذ جميع القرارات اللازمة لتحقيق أهدافه وتنفيذ مهماته، وله على وجه خاص ما يأتي: إقرار استراتيجية المعهد، ومتابعة تنفيذها. إقرار السياسات المتعلقة بنشاط المعهد، والخطط والبرامج اللازمة لتنفيذها. إقرار اللوائح المنظمة للتدريب في المعهد، بما يشمل تحديد ساعاته وخططه ومدده والإجازات وشروط الالتحاق والاختبارات والشهادات. إقرار معايير ومتطلبات وتصنيفات برامج التلمذة ومن يقدمها من مهرة ومحترفين، واللوائح المنظمة لهذه البرامج وبما يشمل تحديد مدد برامج التلمذة وأوقاتها وأسس تقديمها ومعايير اجتيازها ودرجات الإتقان فيها وذلك لبرامج التلمذة التي تقدم في المعهد. إقرار هيكل المعهد التنظيمي. الموافقة على إنشاء فروع ومكاتب للمعهد. إقرار اللوائح المالية والإدارية، وغيرها من اللوائح اللازمة لتسيير عمل المعهد وشؤونه، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار
    المقابل المالي لما يقدمه المعهد من خدمات بالاتفاق مع وزارة المالية ومركز تنمية الإيرادات غير النفطية. الموافقة على مشروع ميزانية المعهد السنوية، والحساب الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي ومراقب مالي داخلي. النظر في التقارير الدورية التي تقدم عن سير العمل في المعهد. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود بحسب الإجراءات النظامية المتبعة. الموافقة على الاشتراك في المعاهد والاتحادات والمنظمات والهيئات الإقليمية والدولية وما في حكمها ذات العلاقة باختصاصات المعهد، وفقاً للانظمة والتعليمات. قبول الهبات والتبرعات والمنح والوصايات والأوقاف، وفقاً للأحكام المنظمة لذلك. وللمجلس في سبيل تحقيق اختصاصاته تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يوكل إليها ما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه ومن منسوبي المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المعهد. ويجوز عند الاقتضاء عقدها في أي مكان آخر. يعقد المجلس اجتماعاته بصفة دورية أربع مرات في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو إذا طلب ذلك ثلث أعضائه على الأقل. توجه الدعوة للاجتماع من الرئيس كتابةً قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول أعمال الاجتماع. يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه من الأعضاء، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل. وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز أن تعقد الاجتماعات وأن يصوت عليها عن بعد من خلال استخدام وسائل التقنية. ويمكن أن تتخذ القرارات بطريق التمرير على الأعضاء، وفي هذه الحالة يشترط موافقة جميع أعضاء المجلس على القرار، ويعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه
    وأسباب الاعتراض ضمن المحضر. لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار المعهد. للمجلس دعوة من يراه لحضور جلساته للاستفادة من خبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمعهد مدير عام، يتم تعيينه وإعفاؤه من منصبه بقرار من المجلس، ويحدد قرار التعيين أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون المعهد، وتتركز مسؤولياته في حدود الترتيبات وما يقرره المجلس. ويتولى الاختصاصات الآتية: الإشراف على إعداد استراتيجية المعهد، ورفعها إلى المجلس. اقتراح السياسات المتعلقة بنشاط المعهد، والخطط والبرامج اللازمة لتنفيذها، واللوائح الإدارية والمالية والداخلية وغيرها من اللوائح والمعايير والضوابط اللازمة لتسيير عمل المعهد والتي تدخل في اختصاص المجلس، والهيكل التنظيمي للمعهد، والرفع بها إلى المجلس. الإشراف على إعداد تقرير المعهد السنوي ومشروع ميزانيته وحسابه المالي الختامي؛ تمهيداً لعرضها على المجلس وفقاً للإجراءات المتبعة. إصدار الأوامر بمصروفات المعهد وفقاً للميزانية السنوية المعتمدة، ووفقاً للوائح المعتمدة. متابعة تنفيذ القرارات الصادرة من المجلس. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصات المعهد. الإشراف على إعداد التقارير الخاصة بتنفيذ خطط المعهد وبرامجه، وعرضها على المجلس. تمثيل المعهد أمام الجهات القضائية، ولدى
    الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. التعاقد مع الخبراء والمستشارين في حدود أغراض المعهد، ووفقاً لما تحدده اللوائح. التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. تعيين العاملين في المعهد والإشراف على سير العمل فيه وفقاً للوائح والخطط والبرامج المعتمدة. إصدار القرارات اللازمة لتنفيذ أحكام الترتيبات واللوائح الصادرة بناءً عليها، بحسب الصلاحيات المخولة له. أي اختصاص آخر يسنده إليه المجلس. وللمدير العام تفويض بعض اختصاصاته إلى من يراه من منسوبي المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد المعهد مما يأتي: أ- ما يخصص له في الميزانية العامة للدولة من اعتمادات. ب- المقابل المالي الذي يتقاضاه نظير الخدمات التي يقدمها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع الأوقاف التي يقبلها. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع أموال المعهد في حساب جاري وزارة المالية في البنك المركزي السعودي، وله فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الأموال وفق ميزانية المعهد المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للمعهد ميزانية سنوية مستقلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: السنة المالية للمعهد هي السنة المالية للدولة. واستثناءً من ذلك، تبدأ السنة المالية الأولى من تاريخ نفاذ هذه الترتيبات، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة بالرقابة على حسابات وعمليات المعهد، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم رسمياً بالعمل في المملكة، لتدقيق حسابات ومعاملات المعهد وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/99f64251-7873-4627-80c5-ad3f009a3bb5/1
  verified: false
- article_ref: المادة الثالثة عشرة
