- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات التالية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: الوزير: وزير الاستثمار. الوزارة: وزارة الاستثمار. التنظيم: تنظيم الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0b5bf9f-efb9-4dd1-9f35-ad3b00b3aef3/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'الوزارة هي الجهة المختصة والمرجع الرئيس في المملكة فيما يتعلق بتنظيم الاستثمار (المحلي والأجنبي) وتنميته، والنهوض بمقوماته، وتشجيعه وحماية المستثمرين، ولها -دون إخلال باختصاصات ومسؤوليات الجهات الأخرى- القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: إعداد الاستراتيجية الوطنية للاستثمار في المملكة، ورفعها لاستكمال الإجراءات النظامية اللازمة في شأنها، والإشراف على تنفيذها بعد اعتمادها، واقتراح أي تعديل عليها. إعداد السياسات العامة لتنمية الاستثمار وتطويره، وتهيئة البيئة الاستثمارية المثلى وتعزيز تنافسيتها، ورفعها للاعتماد وفقاً للإجراءات النظامية المتبعة، ومتابعة تنفيذها بعد اعتمادها. اقتراح مشروعات الأنظمة المتعلقة بالاستثمار، ومراجعة الأنظمة القائمة واقتراح تعديلها، ورفعها لاستكمال الإجراءات النظامية اللازمة. إصدار تراخيص الاستثمار -وفقاً للنصوص النظامية ذات الصلة- وتنظيم إجراءاتها، وتقديم خدمات الوزارة للمستثمرين وتنظيم كل ما يلزم لتحقيق ذلك، وتحديد المقابل المالي لذلك بالاتفاق مع وزارة المالية ومركز تنمية الإيرادات غير النفطية. تحديد المؤشرات التي تقيس أداء
    الاستثمار في المملكة، وآلية القياس، وذلك بالتنسيق مع الجهات المعنية، والرفع بها إلى مجلس الشؤون الاقتصادية والتنمية لاعتمادها، وتتولى الوزارة متابعة تطبيقها، وتقويمها بعد اعتمادها. وضع الخطط التنفيذية والقواعد الكفيلة بتهيئة بيئة الاستثمار في المملكة ومعايير تنميته وتعزيز تنافسيته، والرفع عما يتطلب استكمال إجراء في شأنه. جذب الاستثمارات من خلال تنظيم المؤتمرات والندوات والمعارض الداخلية والخارجية والفعاليات وغيرها من الوسائل، وإقامتها، والمشاركة فيها، والإعلان عن المبادرات المحفزة للاستثمار. إنشاء قاعدة بيانات الاستثمار ومؤشراته في المملكة، لتكون المنصة الموحدة والمرجع الرئيس للمعلومات ذات الصلة باختصاصات الوزارة، والتنسيق مع الجهات ذات العلاقة لتزويد الوزارة بالمعلومات والبيانات والتقارير ذات العلاقة، وذلك وفق سياسات ولوائح حوكمة البيانات الوطنية الصادرة من الهيئة السعودية للبيانات والذكاء الاصطناعي. دعم الاستثمار السعودي في الخارج، ومعالجة تحدياته مع الجهات ذات العلاقة داخل المملكة وخارجها. العمل على تعزيز استدامة الاستثمار، والنهوض بدوره، ومعالجة تحدياته وعوائقه، واقتراح الحوافز الممكنة
    له. التنسيق مع الجهات الحكومية ذات العلاقة بما يمكن الوزارة من أداء مهماتها. تمثيل المملكة أو المشاركة في تمثيلها لدى المنظمات والهيئات والمحافل والمؤتمرات الإقليمية والدولية ذات الصلة باختصاصات الوزارة. إجراء الدراسات والأبحاث المتصلة باختصاصاتها، والتعاون مع مراكز البحوث وبيوت الخبرة المتخصصة على المستويين المحلي والدولي في هذا الشأن. إبرام الاتفاقيات ذات الصلة بنشاط الوزارة مع الجهات المعنية في الدول الأخرى ومع المنظمات الدولية، وفقاً للإجراءات النظامية المتبعة. تمثيل الحكومة في المفاوضات مع المستثمرين الاستراتيجيين، وتصميم الحوافز الاستثمارية والرفع عنها لاستكمال ما يلزم. أي مهمة تسند إلى الوزارة نظاماً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0b5bf9f-efb9-4dd1-9f35-ad3b00b3aef3/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يتولى الوزير إدارة شؤون الوزارة وتصريف أمورها، واتخاذ جميع القرارات والإجراءات اللازمة لتحقيق الأهداف المنوطة بها وفقاً لأحكام التنظيم، وله -بوجهٍ خاص- ما يأتي: إقرار تعديل اللوائح المالية التي تسير عليها الوزارة، بالاتفاق مع وزارة المالية. إقرار تعديل اللوائح الإدارية -المنظمة لشؤون منسوبي الوزارة- بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ووزارة المالية فيما يتعلق بالأحكام ذات الأثر المالي الواردة فيها. إقرار اللوائح الداخلية التي تسير عليها الوزارة، بما لا يتعارض مع النصوص النظامية ذات الصلة. اقتراح مشروع الهيكل التنظيمي للوزارة، والرفع به لاستكمال الإجراءات النظامية اللازمة في شأنه. البت في طلبات الحصول على تراخيص الاستثمار، وإلغائها، وفقاً للنصوص النظامية ذات الصلة. اقتراح قائمة بأنواع النشاطات المستثناة من الاستثمار الأجنبي، ورفعها لاستكمال الإجراءات النظامية. الموافقة على إنشاء فروع للوزارة داخل المملكة، ومكاتب لها خارج المملكة؛ وفقاً للإجراءات النظامية. الاستعانة بمن يراه من الخبراء والمستشارين للعمل بشكل متفرغ أو غير متفرغ لإنجاز بعض الأعمال والخدمات،
    وتقديم المشورة، وإجراء البحوث والدراسات، وفقاً لما تتضمنه الأحكام ذات الصلة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف وفقاً للأحكام المنظمة لذلك. تمثيل الوزارة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. تعيين منسوبي الوزارة وفقاً للوائحها، والإشراف عليهم، والإشراف كذلك على تطوير الموارد البشرية في الوزارة. الإشراف على تنظيم الوزارة للمؤتمرات والندوات والمعارض الداخلية والخارجية والفعاليات المتعلقة بالاستثمار، وإقامتها، والمشاركة فيها، وإسناد تنفيذها لمن يراه؛ وفقاً للإجراءات النظامية المتبعة. الموافقة على مشروع ميزانية الوزارة وحسابها الختامي والتقرير السنوي تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. وللوزير تفويض بعض صلاحياته إلى من يراه من منسوبي الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f0b5bf9f-efb9-4dd1-9f35-ad3b00b3aef3/1
  verified: false
