regulation:
  code: BOE103
  name_ar: نظام تعليم الكبار ومحو الأمية في المملكة العربية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُسمَّى هذا النِظام: نِظام تعليم الكِبار ومحو الأُميِّة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يستهدف هذا النِظام محو الأُميِّة بين جميع المواطنين بالمملكة بمُختلف فئاتِهم، وإعداد المواطِن الصالِح المُستنير ليتمكن من إفادة نفسه والإسهام في النهوض بمُجتمعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يُقصد بالأُميين في تطبيق هذا النِظام: الذين لا يُجيدون القراءة والكتابة وتجاوزوا أعلى حد لسِّن القبول بالمدارس الابتدائية، ولم يبلغوا سن الخامسة والأربعين، من رعايا المملكة العربية السعودية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تُعَّد خِطة شامِلة للقضاء على الأُميِّة في مُدة أقصاها (20) عشرون عامًا، على ضوء البيانات الإحصائية الخاصة بحصر عدد الأُميين وأماكن تجمُعِهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يُخصص لتمويل مشروعات محو الأُميِّة وتعليم الكِبار الموارِد التالية : أ - ما ترصُده كُل وزارة مِن وزارات الدولة والهيئات المُستقِلة في ميزانياتِها سنويًّا من مبالغ لهذا الغرض.ب - النفقات التي تُفرض بموجب هذا النِظام لغرض محو الأُميِّة على الشركات والمؤسسات الخاصة.جـ - المعونات التي تُقدَّم لمشاريع محو الأُميِّة وتعليم الكِبار.د - الموارِد الأُخرى التي يتقرر إضافتُها بقرار من مجلِس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تجري مُكافحة الأُميِّة بين الأُميين بإتباع الأساليب المُناسِبة للكِبار، ويشتمل ذلك الأنماط التالية : أ - إعداد فصول مُنتظِمة لتعليم الأُميين في جميع أنحاء المملكة العربية السعودية.ب - إقامة حملات إنتقائية مُركزة في الأماكن التي لا يسهُل فيها إعداد فصول مُنتظِمة، كمناطِق سُكنى البدو الرُحل والمناطِق النائية، وذلك لفترة مُناسِبة لتحقيق محو الأُميِّة.جـ - إعداد برامج مُلائمة لمحو الأُميِّة بواسطة الإذاعة والتلِفزيون ووسائل الإعلام الأُخرى.د - استخدام المساجد والمراكِز الصيفية والنوادي ومراكز التجمُع لغرض محو الأُميِّة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تنظم برامج ومناهج محو الأُميِّة وتعليم الكِبار وفق الأنماط التي تُقرها وزارة المعارف وتُنفذ تحت إشرافِها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تُستخدم المباني الحُكومية المُلائمة، وخاصة المدارس والمعاهد والمراكز الثقافية والاجتِماعية مقرًّا لمحو الأُميِّة، ويجوز إنشاء أو استئجار مبانٍ خاصة لمحو الأُميِّة متى اقتضى الأمر ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجوز اختيار المُدرسين لغرض محو الأُميِّة وتعليم الكِبار من موظفي الحُكومة أو غيرِهم من الأشخاص المؤهلين أو الذين يتم تأهيلهُم لهذا الغرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجوز منح العاملين في برامج محو الأُميَّة وتعليم الكِبار مُكافآت تتناسب مع جهودِهم، ويتم تقديرُها وتحديد شروط استِحقاقِها بالاتِفاق بين وزارة المعارف و وزارة المالية والاقتِصاد الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون الدراسة في برامج محو الأُميِّة وتعليم الكِبار بالمجان، ويُزود الدارسون بالكُتب والأدوات اللازِمة ووسائل الإيضاح مجانًا طيلة فترة دراستِهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجوز قبول المتطوعين لمحو الأُميِّة وتعليم الكِبار وِفق الإجراءات التي تُحدِّدُها اللجنة العُليا لمحو الأُميِّة وتعليم الكِبار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: العمل من أجل محو الأُميِّة بين المواطنين واجب على كُل مواطِن حسب قُدراتِه، وعلى الأُميين واجب التخلص من الأُميِّة في حدود الوسائل المُتاحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: على كُل جهة حُكومية أو مؤسسة عامة أن تقوم بمحو الأُمية بين أفرادِها ومنسوبيها خِلال (6) ست سنوات من نفاذ هذا النِظام، ويجوز عند الضرورة تمديد هذه المُدة بقرار من مجلِس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: على الشركات والمؤسسات الخاصة أن تُزوِّد وزارة المعارف عند طلبِها ببيانات عن عدد الأُميين العاملين لدى تلك الشركات والمؤسسات، وأعمارِهم ومهنِهم، وبإيضاح عن الخطوات التي قامت بِِها لمحو أُميتِهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'على الشركات والمؤسسات الخاصة أن تقوم بمحو الأُمية بين العاملين لديها وفق ما يأتي : 1 - الشركات والمؤسسات التي يزيد عُمالها الأُميون في مقر واحد في أي فترة بعد نفاذ هذا النِظام عن عشرين شخصًا، إما أن تُنشئ فصولًا خاصة وكافية لمحو الأُميِّة، أو تدفع بدلًا عن ذلك النفقات اللازِمة لمحو الأُميِّة وفق ما تُحددُه اللجنة العُليا لمحو الأُميِّة وتعليم الكِبار.2 - الشركات والمؤسسات التي لا يزيد عُمالها الأُميون عن عشرين، تلتزم بإلحاقِهم بالفصول التي تُنشئُها الحُكومة بدون أن تُطالب بالنفقات المُترتِبة على تعليمِهم عدا نفقات انتِقالِهم لهذه الفصول، وذلك في حالة عدم اختيار الشركة أو المؤسسة إنشاء فصل خاص لمحو أُمية عُمالها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'على كُل جِهة حُكومية أو خاصة تقوم بمشروع لمحو الأُميِّة بين منسوبيها أن تُزوِّد وزارة المعارف مُسبقًا بما يلي: 1 - عدد الفصول المُقترح افتتاحُها كُل عام.2 - عدد المُدرسين والإداريين اللازمين لتلك الفصول.3 - عدد الدارسين.4 - الكُتب والمناهج الدراسية اللازِمة.5 - الأماكن المُقترحة لفتح الفصول، ويتم التنفيذ طبقًا لما يتم التفاهُم عليه بين الوزارة والجهة المُختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تُقدم وزارة المعارف المُساعدة المُلائمة للجهات الأُخرى التي تقوم بمحو الأُميِّة، كما تُتابِع وتقوِّم برامجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'تُشكل اللجنة العُليا لمحو الأُمية وتعليم الكِبار على النحو التالي: 1 - وزير المعارف رئيسًا.2 - وكيل وزارة المعارف عضوًا ونائبًا للرئيس.3 - مُدير الثقافة الشعبية بوزارة المعارف عضوًا ومُقرِّرًا للجنة.4 - عضو من وزارة الداخلية. 5 - عضو من وزارة الدِّفاع والطيران. 6 - عضو من وزارة المالية والاقتِصاد الوطني. 7 - عضو من وزارة العمل والشئون الاجتِماعية. 8 - عضو من وزارة الإعلام. 9 - عضو من رئاسة الحرس الوطني. 10 - عضو من الرئاسة العامة لتعليم البنات. ويجوز للجنة أن تستعين بمن ترى الحاجة إلى الاستعانة به من المختصين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'يكون من مهام اللجنة العليا لمحو الأُمية وتعليم الكِبار بالإضافة لما نُص عليه في هذا النِظام ما يلي: أ - إقرار الخُطة الشامِلة لمحو الأُميِّة، وإقرار السياسة التخطيطية لتعليم الكِبار ومُتابعة تنفيذهما.ب - اقتِراح موارِد جديدة لتمويل مشروعات محو الأُميِّة واستصدار الموافقة عليها مِن الجهة المُختصة.جـ - تنسيق الجهود بين الوزارات والجهات الحُكومية والمؤسسات الخاصة لغرض محو الأُميِّة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تضع اللجنة العُليا النِظام الداخلي الذي يُحدِّد مُدة العضوية ومواعيد انعِقادِها وطريقة التصويت وعدد الجلسات العادية والاستثنائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تُشكل بقرار من اللجنة العُليا لمحو الأُمية وتعليم الكِبار لجنة فرعية لمُتابعة تنفيذ خُطة محو الأُمية، وتتألف من مُدير التعليم "رئيساً" ومُمثلين للوزارات والجهات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تصدُر اللوائح الخاصة بتنفيذ هذا النِظام بقرار من وزير المعارف .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: على الجهات المعنية حكومية أو غير حُكومية تنفيذ هذا النِظام كُل فيما يخصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f457818f-2d89-4339-b7e7-a9a700f1fff2/1
  verified: false
