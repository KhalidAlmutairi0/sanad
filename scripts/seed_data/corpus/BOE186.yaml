  name_ar: نظام التنفيذ 1433هـ
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك : النظام : نظام التنفيذ. اللائحة : اللائحة التنفيذية لهذا النظام. الوزير : وزير العدل. قاضي التنفيذ : رئيس دائرة التنفيذ وقضاتها، وقاضي دائرة التنفيذ، وقاضي المحكمة الذي يختص بمهمات قاضي التنفيذ، وذلك بحسب الحال. الرئيس : رئيس دائرة التنفيذ، أو قاضي دائرة التنفيذ، أو قاضي المحكمة الذي يختص بمهمات قاضي التنفيذ، وذلك بحسب الحال. مأمور التنفيذ : الشخص المكلف بمباشرة إجراءات التنفيذ وفقًا لأحكام النظام. مبلغ الأوراق القضائية : محضر المحكمة، أو طالب التنفيذ، أو من ترخص له وزارة العدل بإبلاغ الإعلانات، والمواعيد، والأوامر، والمستندات القضائية التي يتطلبها التنفيذ. وكيل البيع القضائي : من ترخص له وزارة العدل ببيع أصول المدين للوفاء للدائن. القرارات : إجراءات قاضي التنفيذ، وأوامره عدا حكمه في المنازعات. منازعات التنفيذ : الدعاوى التي تنشأ بسبب التنفيذ، وتتعلق بتوافر شروط صحته، ويبديها أطراف خصومة التنفيذ أو غيرهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: عدا الأحكام والقرارات الصادرة في القضايا الإدارية والجنائية، يختص قاضي التنفيذ بسلطة التنفيذ الجبري والإشراف عليه، ويعاونه في ذلك من يكفي من مأموري التنفيذ، وتتبع أمامه الأحكام الواردة في نظام المرافعات الشرعية ما لم ينص هذا النظام على خلاف ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يختص قاضي التنفيذ بالفصل في منازعات التنفيذ مهما كانت قيمتها، وفقًا لأحكام القضاء المستعجل، ويختص كذلك بإصدار القرارات والأوامر المتعلقة بالتنفيذ، وله الأمر بالاستعانة بالشرطة أو القوة المختصة، وكذلك الأمر بالمنع من السفر ورفعه، والأمر بالحبس والإفراج، والأمر بالإفصاح عن الأصول، والنظر في دعوى الإعسار .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون الاختصاص المكاني لقاضي التنفيذ - بحسب الحال - كما يأتي : 1 - في دائرة المحكمة التي أصدرت السند التنفيذي.2 - في مكان الجهة التي أنشئ المحرر في منطقتها.3 - في موطن المدين.4 - في موطن عقار المدين، أو أمواله المنقولة.وتحدد اللائحة الأحكام اللازمة لهذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: إذا تعددت الدوائر المختصة بالتنفيذ؛ فيكون لقاضي التنفيذ - الذي قام بأول إجراء تنفيذي - الإشراف على التنفيذ وتوزيع حصيلته، وله أن ينيب قاضي تنفيذ في دائرة أخرى للتنفيذ على مال المدين، وتحدد اللائحة الأحكام اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تكون جميع قرارات قاضي التنفيذ نهائية، وتخضع جميع أحكامه في منازعات التنفيذ، ودعوى الإعسار للاستئناف، ويكون حكم الاستئناف نهائيًا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: إذا وقع تعدٍّ، أو مقاومة، أو محاولة لتعطيل التنفيذ، وجب على قاضي التنفيذ اتخاذ جميع الإجراءات التحفظية، وله الأمر على الجهات المختصة بتقديم المعونة المطلوبة، ولا يجوز لمأموري التنفيذ كسر الأبواب، أو فتح الأقفال بالقوة لإجراء التنفيذ، إلا بعد استئذان قاضي التنفيذ، وتوقيع محضر بذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1 - تتولى دائرة التنفيذ - في كل محكمة عامة - التنفيذ وإجراءاته، ويجوز تأليف أكثر من دائرة عند الحاجة.2 - يتولى القاضي الفرد - في المحكمة العامة - التنفيذ وإجراءاته.3 - يكون تنفيذ الأحكام والأوامر والمحررات الأجنبية من قاضٍ، أو أكثر، بحسب الحاجة. وللمجلس الأعلى للقضاء - عند الحاجة - إحداث محاكم متخصصة للتنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'لا يجوز التنفيذ الجبري إلا بسندٍ تنفيذيٍّ لحقٍّ محدد المقدار حالِّ الأداء، والسندات التنفيذية هي: 1 - الأحكام، والقرارات، والأوامر الصادرة من المحاكم. 2 - أحكام المحكمين المذيلة بأمر التنفيذ وفقًا لنظام التحكيم .3 - محاضر الصلح التي تصدرها الجهات المخولة بذلك أو التي تصدق عليها المحاكم.4 - الأوراق التجارية .5 - العقود والمحررات الموثقة.6 - الأحكام، والأوامر القضائية، وأحكام المحكمين، والمحررات الموثقة الصادرة في بلد أجنبي.7 - الأوراق العادية التي يقر باستحقاق محتواها كليًا، أو جزئيًا .8 - العقود والأوراق الأخرى التي لها قوة سند التنفيذ بموجب نظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: لا يجوز تنفيذ الأحكام والقرارات والأوامر جبرًا، مادام الاعتراض عليها جائزًا، إلا إذا كانت مشمولة بالنفاذ المعجل، أو كان النفاذ المعجل منصوصًا عليه في الأنظمة ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'مع التقيد بما تقضي به المعاهدات والاتفاقيات؛ لا يجوز لقاضي التنفيذ تنفيذ الحكم والأمر الأجنبي إلا على أساس المعاملة بالمثل وبعد التحقق مما يأتي: 1 - أن محاكم المملكة غير مختصة بالنظر في المنازعة التي صدر فيها الحكم أو الأمر، وأن المحاكم الأجنبية التي أصدرته مختصة بها وفقًا لقواعد الاختصاص القضائي الدولي المقررة في أنظمتها.2 - أن الخصوم في الدعوى التي صدر فيها الحكم قد كلفوا بالحضور، ومثلوا تمثيلاً صحيحًا، ومكنوا من الدفاع عن أنفسهم .3 - أن الحكم أو الأمر أصبح نهائيًا وفقًا لنظام المحكمة التي أصدرته .4 - أن الحكم أو الأمر لا يتعارض مع حكم أو أمر صدر في الموضوع نفسه من جهة قضائية مختصة في المملكة.5 - ألا يتضمن الحكم أو الأمر ما يخالف أحكام النظام العام في المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تسري أحكام المادة السابقة على أحكام المحكمين الصادرة في بلد أجنبي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: المحررات الموثقة الصادرة في بلد أجنبي، يجوز الأمر بتنفيذها بالشروط نفسها المقررة في أنظمة هذا البلد لتنفيذ المحررات الموثقة القابلة للتنفيذ الصادرة في المملكة، وعلى أساس المعاملة بالمثل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تقدم الأحكام، والأوامر القضائية، وأحكام المحكمين، والمحررات الموثقة الصادرة في بلد أجنبي؛ إلى قاضي التنفيذ المختص بتنفيذ الأحكام الأجنبية؛ ليتحقق من استيفاء السند شروط التنفيذ، ويضع عليه خاتم التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1- إذا أقر المدين بالحق في ورقة عادية أثبت قاضي التنفيذ إقراره وعدت سندًا تنفيذيًا. 2 - إذا لم يقر المدين بالحق، أو بعضه؛ أمر قاضي التنفيذ المدين بتوقيع إقرار بسبب الاعتراض تحت طائلة العقوبة المنصوص عليها في هذا النظام ، وتعد الورقة سندًا تنفيذيًا فيما لم يعترض عليه، وللدائن رفع دعواه أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: لقاضي التنفيذ أن يأمر بالإفصاح عن أموال المدين بمقدار ما يفي بالسند التنفيذي، ويصدر الأمر بالإفصاح والحجز بعد إبلاغ المدين بأمر التنفيذ. ومع ذلك إذا ظهر لقاضي التنفيذ أن المدين مماطل من واقع سجله الائتماني، أو من قرائن الحال؛ جاز له الأمر بالإفصاح عن أمواله وحجزها قبل إبلاغه بأمر التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على جميع الجهات المختصة، أو المشرفة على تسجيل الأموال، وعلى مدين المدين، ومحاسب المدين، وموظفيه الإفصاح عن أصول المدين بناء على أمر قاضي التنفيذ خلال مدة لا تتجاوز عشرة أيام من تاريخ إبلاغ تلك الجهات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'يجب على جهات تسجيل الأموال، أو الجهات المشرفة عليها أو على إدارتها - بحسب الأحوال - ما يأتي: 1 - إنشاء إدارات مختصة للتعامل مع أوامر قضاء التنفيذ المختلفة .2 - إعداد قواعد بيانات بملكية الأموال سواء كانت أصولاً عقارية، أو مالية، أو تجارية، أو فكرية، أو أي أصل آخر.3 - الالتزام بالمحافظة على سرية البيانات والمعلومات، التي اطلع عليها الموظفون بسبب عملهم، وألا يفشوها لأي سبب كان .4 - وضع آلية تقنية لضمان عدم الدخول على البيانات إلا بإذن .5 - مع مراعاة ما تقضي به الأنظمة، على هذه الإدارات إبلاغ أصحاب الأموال بما تم الإفصاح عنه من بيانات بعد مدة تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يتم تبادل الإفصاح عن الأموال مع الدول الأخرى بناءً على أمر من قاضي التنفيذ، وعلى أساس المعاملة بالمثل، ويستثنى من هذا الإفصاح ما نصت عليه الأنظمة، وقرارات مجلس الوزراء، وما يؤثر على الأمن الوطني للمملكة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: جميع أموال المدين ضامنة لديونه، ويترتب على الحجز على أموال المدين عدم نفاذ ما يقوم به من تصرف في أمواله المحجوزة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'لا يجوز الحجز والتنفيذ على ما يأتي : 1 - الأموال المملوكة للدولة .2 - الدار التي يسكنها المدين ومن يعولهم شرعًا، ويقدر قاضي التنفيذ مقدار كفايته، ما لم يكن السكن مرهونًا للدائن .3 - وسيلة نقل المدين ومن يعولهم شرعًا، ويقدر قاضي التنفيذ مقدار كفايته، ما لم تكن الوسيلة مرهونة للدائن.4 - الأجور والرواتب إلا فيما يأتي : أ - مقدار النصف من إجمالي الأجر، أو الراتب لدين النفقة .‌ب - مقدار الثلث من إجمالي الأجر، أو الراتب للديون الأخرى . وعند التزاحم، يخصص نصف إجمالي الأجر، أو الراتب لدين النفقة، وثلث النصف الآخر للديون الأخرى، وفي حال تعدد هذه الديون يوزع ثلث النصف بين الدائنين بحسب الوجه الشرعي والنظامي.5 - ما يلزم المدين لمزاولة مهنته، أو حرفته بنفسه.6 - مستلزمات المدين الشخصية، ويقدر قاضي التنفيذ كفايته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يجوز للمحجوز على أمواله - في أي حال كانت عليها إجراءات الحجز - إيداع مبلغ من النقود يفي بالدين في حساب المحكمة يخصص للوفاء بالدين، ويترتب على هذا الإيداع زوال الحجز عن الأموال المحجوزة، وانتقاله إلى المبلغ المودع .1- لا يجوز الحجز على أموال المدين إلا بمقدار قيمة الدين المطالب به، ما لم يكن المال المحجوز غير قابل للتجزئة .2- يخصص قاضي التنفيذ الأموال المنفذ عليها بما يحقق سرعة الوفاء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يكون للجهة المختصة نظامًا بالنظر في النزاع ؛ سلطة الأمر بالحجز التحفظي، وفقًا لأحكام القضاء المستعجل .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: للدائن أن يطلب إيقاع الحجز التحفظي على منقولات مدينه إذا لم يكن للمدين محل إقامة ثابت في المملكة، أو خشي الدائن لأسباب مقبولة اختفاء أموال المدين، أو تهريبها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: لمؤجر العقار أن يطلب إيقاع الحجز التحفظي على المنقولات، أو الثمار التي في العين المؤجرة ضمانًا للأجور المستحقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: لمن يدعي ملك المنقول أن يطلب إيقاع الحجز التحفظي عند من يحوزه متى كانت هناك دلائل واضحة تؤيد ادعاءه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: للدائن بدين مستقر حالِّ الأداء - ولو لم يكن بيده حكم قابل للتنفيذ - أن يطلب إيقاع الحجز التحفظي على ما يكون لمدينه لدى الآخرين من الديون، ولو كانت مؤجلة، أو معلقة على شرط، وما يكون له من أموال أو أعيان منقولة في يد الغير، وعلى المحجوز لديه خلال عشرة أيام من تاريخ تبليغه بالحجز الإقرار بما في ذمته من الديون، والأعيان، والأموال، وعليه الإيداع في حساب المحكمة خلال عشرة أيام من تاريخ تبليغه بحكم صحة الحجز بما أقر به، أو ما يفي منه بالحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: لا يوقع الحجز التحفظي في الأحوال المتقدمة إلا اقتضاء لحقٍّ ظاهر الوجود، وحالِّ الأداء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: لا يوقع الحجز التحفظي في الأحوال المنصوص عليها في المواد السابقة إلا بأمر من المحكمة، أو الجهة المختصة بنظر النزاع التابع لها محل إقامة المحجوز على أمواله، وللمحكمة أو الجهة قبل إصدار أمرها أن تجري التحقيق اللازم إذا لم تكفها المستندات المؤيدة لطلب الحجز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: إذا كانت الدعوى بالحق مرفوعة أمام المحكمة، أو الجهة المختصة؛ اختصت هذه المحكمة، أو الجهة بإصدار الأمر بالحجز التحفظي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يجب أن يبلغ المحجوز على أمواله، والمحجوز لديه بالأمر الصادر بالحجز خلال عشرة أيام على الأكثر من تاريخ صدوره، وإلا عد الحجز ملغى. ويجب على الحاجز خلال الأيام العشرة المشار إليها أن يرفع أمام المحكمة أو الجهة المختصة الدعوى بثبوت الحق وصحة الحجز، وإلا عد الحجز ملغى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يجب على طالب الحجز أن يقدم إلى المحكمة، أو الجهة المختصة إقرارًا خطيًا موثقًا من كفيل مقتدر، أو ضمانًا يضمن جميع حقوق من طلب الحجز على أمواله وما يلحقه من ضرر إذا ظهر أن طالب الحجز غير محق في طلبه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: تتبع في الحجز التحفظي - على المنقولات وما للمدين لدى الغير منها - الإجراءات المتعلقة بالحجز التنفيذي عدا ما يتعلق بالبيع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: 1- يتم التنفيذ بناءً على طلب يقدمه طالب التنفيذ إلى قاضي التنفيذ، وفقًا للنموذج الذي تحدده اللائحة.2 - أ - يتحقق قاضي التنفيذ من وجود الصيغة التنفيذية على السند التنفيذي الوارد في الفقرات (1، 2، 3) من المادة (التاسعة) من هذا النظام.ب - فيما عدا ما ذكر في الفقرة (2-أ) يتحقق قاضي التنفيذ من استيفاء السندات التنفيذية - المذكورة في الفقرات (4، 5، 6، 7، 8) من المادة (التاسعة) - الشروط النظامية، ويضع خاتم التنفيذ عليها، متضمناً عبارة (سند للتنفيذ) مقروناً باسم قاضي التنفيذ ، ومحكمته، وتوقيعه. 3 - يصدر قاضي التنفيذ فورًا أمرًا بالتنفيذ إلى المدين مرافقة له نسخة من السند التنفيذي مختومة بخاتم المحكمة بمطابقتها للأصل، ويبلغ المدين وفق أحكام التبليغ التي تحددها اللائحة، فإن تعذر إبلاغ المدين خلال عشرين يومًا من تاريخ صدور أمر التنفيذ ؛ أمر قاضي التنفيذ بنشر الإبلاغ فورًا في الصحيفة اليومية الأوسع انتشارًا في منطقة مقر المحكمة، وتستوفى من المدين نفقة الإعلان مع استيفاء الحق.4 - يتم التنسيق بين وزارة العدل، والجهات ذات العلاقة ؛ للإفصاح عن عناوين الأشخاص الذين لا يعرف لهم محل إقامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 1 - يجري الحجز التنفيذي على المنقول بانتقال مأمور التنفيذ إلى مكان المال، أو إصدار أمر مكتوب إلى الجهة المختصة بتسجيله بحسب الحال، وتحرير المأمور محضرًا للحجز بناء على أمر قاضي التنفيذ، ويؤشر على سجل المال بمضمون المحضر. 2 - إن لم يكتمل الحجز في يوم واحد، جاز إتمامه في أيام متتالية، ولو كانت عطلة رسمية. 3 - لا يجوز نقل المال من مكان حجزه إلا بأمر قاضي التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 1 - يندب قاضي التنفيذ مع المأمور مقوِّمًا معتمدًا (أو أكثر) مختصًا بتقويم المال المنفذ عليه؛ لتقدير قيمته ، ويثبت تقويمه في محضر الحجز تحت توقيعه، ولقاضي التنفيذ في الأموال اليسيرة التي تحددها اللائحة تكليف المأمور بتقويمها، ما لم يتفق الدائن والمدين على قيمتها. 2 - إذا اقتضى تقويم المال المنقول دخول العقار، دخله المقوم، والمأمور بحضور الشرطة، ولقاضي التنفيذ الأمر باستخدام القوة إذا امتنع المدين، أو غاب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يودع المأمور النقود، والمجوهرات، والمعادن الثمينة، والتحف، والأشياء النفيسة في حساب المحكمة، أو في خزينتها بحسب الحال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: للمأمور إذا اقتضى الحال تحريز المال المحجوز، وعليه وضع الأقفال وخاتم المحكمة، وإثبات ذلك في المحضر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: تحجز الثمار والزروع قبل بدوِّ صلاحها، ويضع مأمور التنفيذ لوحة على مدخل الأرض الزراعية يلصق عليها محضر الحجز، وتباع عند بدوِّ صلاحها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: 'يحرر محضر الحجز وفقًا لما تحدده اللائحة، ويتضمن البيانات الآتية: 1 - تحديد هوية الحاجز، والمحجوز عليه، والمحجوز لديه. 2 - تحديد سند التنفيذ، ورقم أمر التنفيذ، وتاريخه، ومصدره . 3 - تعيين المال المحجوز ، ووصفه، ومقداره، ووزنه، ونوعه، وعدده، وصفاته التي تختلف بها قيمته، ومستند تملكه، وبيانات تسجيله بحسب الأحوال. 4 - نوع صك ملكية العقار، ورقمه، وتاريخه، ومصدره، وموقع العقار، وحدوده، وأطواله، ومساحته. 5 - قيمة المال المحجوز، وفقًا لتقدير المقوم. 6 - مكان الحجز. 7 - اسم الحارس الذي عهد إليه بحفظه . 8 - اسم وكيل البيع، وموعد البيع، وتاريخه، ومكانه. ويتضمن محضر الحجز تـوقيع مأمور التنفيذ والمدين - إن كان حاضرًا - والحارس، وكل من نسب إليه تصرف في المحضر، وفق ما تحدده اللائحة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: يتم إعلان محضر الحجز في موقع نشر بيانات التنفيذ خلال خمسة أيام من تاريخ الحجز، ويعد هذا الإعلان إبلاغًا لجميع من له عـلاقة بالمال المحجوز، ومع ذلك يجب على مأمور التنفيذ أن يبلغ المحجوز عليه وكل من ظهر لقاضي التنفيذ أن له حقًا عينيًّا على المال المحجوز متى كان لهؤلاء عناوين معروفة لدى قاضي التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يكلف قاضي التنفيذ المحجوز عليه بحراسة المال المحجوز تحت يده بشرط تقديم ضمان، أو كفيل مليء بالامتناع عن التعرض للمال المحجوز بما قد يضر الدائن. فإن رفض المحجوز عليه الحراسة، أو تعذر تقديم الضمان، أو الكفيل؛ أمر قاضي التنفيذ بتعيين حارس مرخص له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: في جميع الأحوال يسلم المال المحجوز للحارس بتوقيعه على ذلك بموجب محضر الحجز، ولا يجوز للحارس الانتفاع بالمال المحجوز، أو إعارته، أو تعريضه للتلف. ولقاضي التنفيذ أن يأذن للحارس بإدارة المحجوز إذا اقتضت المصلحة ذلك، وعليه حفظ غلته محجوزة مع الأصل. وإذا كان الحارس مالكًا للمال المحجوز، جاز لقاضي التنفيذ أن يأذن له بالانتفاع به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: للحارس غير المالك للمال المحجوز أجرة المثل على حراسته وإدارته، ويصدر بتقديرها قرار من قاضي التنفيذ، وتحسب ضمن مصاريف التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: يجري الحجز التنفيذي على العقار بموجب محضر حجز، ويجب تزويد الجهة التي صدرت منها وثيقة تملك العقار بنسخة من المحضر للتأشير على سجل الوثيقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: 'إذا لم ينفذ المدين، أو لم يفصح عن أموال تكفي للوفاء بالدين خلال خمسة أيام من تاريخ إبلاغه بأمر التنفيذ، أو من تاريخ نشره بإحدى الصحف إذا تعذر إبلاغه؛ عُدَّ مماطلاً، وأمر قاضي التنفيذ حالاً بما يأتي: 1- منع المدين من السفر . 2- إيقاف إصدار صكوك التوكيل منه بصفة مباشرة، أو غير مباشرة في الأموال وما يؤول إليها. 3- الإفصاح عن أمـوال المدين القائمة وعما يرد إليه مستقبلاً، وذلك بمقدار ما يفي بالسند التنفيذي، وحجزها، والتنفيذ عليها، وفقًا لأحكام هذا النظام . 4- الإفصاح عن رخص وسجلات أنشطة المدين التجارية، والمهنية . 5- إشعار مرخص له بتسجيل المعلومات الائتمانية بواقعة عدم التنفيذ . ولقاضي التنفيذ أن يتخذ - إضافة إلى ما سبق بحسب الحال - أيًا من الإجراءات الآتية: أ - منع الجهات الحكومية من التعامل مع المدين، وحجز مستحقاته المالية لديها، وأن عليها إشعار قاضي التنفيذ بذلك. ‌ب - منع المنشآت المالية من التعامل معه بأي صفة.‌ج - الأمر بالإفصاح عن أموال زوج المدين، وأولاده، ومن تشير القرائن إلى نقل الأموال إليه، أو محاباته. وإذا تبين الاشتباه بأن هناك أدلة أو قرائن على إخفاء الأموال،
    يحال الطلب إلى قاضي الموضوع للنظر فيه.‌د - حبس المدين، وفقًا لأحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: لقاضي التنفيذ استجواب المدين، ومحاسبه، وموظفيه، أو المتعاملين معه المشتبه في محاباتهم له ومدين المدين؛ لتتبع أمواله، وله ندب خبير لتتبع أمواله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يذيل أصل السند التنفيذي بما ينفذ فعليًا، وتسجل بيانات السند في سجل سندات التنفيذ لدى المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: لا يدخل صالة المزاد إلا من تأهـل للمشاركة فيه، ويتأهل المشاركون في المـزاد بموجب ترتيبات تضعها وزارة العدل بالاتفاق مع مؤسسة النقد العربي السعودي، تنظم إثبات ملاءة المشاركين في المزاد، وطريقة خصم المبالغ والسداد فور رسو المزاد، وفق ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: 1 - يعلن عن المزاد قبل اليوم المحدد لإجرائه بمدة لا تزيد على ثلاثين يوماً ولا تقل عن خمسة عشر يوماً في موقع بيانات التنفيذ، وبالإلصاق على باب المكان الذي فيه الأموال المحجوزة، مبيناً فيه يوم البيع وساعته ومكانه ونوع الأموال المحجوزة ووصفها بالإجمال. ويجوز لقاضي التنفيذ أن يأمر بنشر هذا الإعلان في صحيفة أو أكثر من الصحف اليومية خصماً من حصيلة البيع.2 - يبدأ المزاد بحضور مأمور التنفيذ، وينادي الوكيل بالقيمة التي يفتتح فيها المزاد للمال المحجوز، ولا يجوز البيع بأقل من القيمة المقدرة، فإن لم يتقدم مشتر، حدد مأمور التنفيذ موعدًا آخر للمزاد خلال مدة لا تزيد على يومين، وتباع الأموال المحجوزة بما يقف عليه المزاد، إلا إذا كان المال عقارًا، أو كان من المعادن الثمينة أو المجوهرات أو ما في حكمها؛ فيأمر قاضي التنفيذ بإعادة التقويم، ويفتتح المزاد بالتقويم الأخير، وتباع بما يقف عليه المزاد. ويجب على من رسا عليه المزاد سداد الثمن فورًا وفق ما تحدده اللائحة. 3 - إذا لم يسدد من رسا عليه المزاد الثمن في الموعد المحدد، يعاد البيع على مسؤوليته بمزايدة جديدة، وفقًا لما ورد في الفقرتين (1) و
    (2) من هذه المادة، ويلزم المتخلف بما نقص من الثمن وبمصروفات المزايدة، ويُردُّ إليه ما زاد على ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يحظر التأثير على أسعار المزاد بأي ترتيب يؤدي إليه، وعلى قاضي التنفيذ أن يطلب من هيئة التحقيق والادعاء العام إجراء التحقيق اللازم إذا قامت شبهة التواطؤ .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: يوقف مأمور التنفيذ البيع على باقي أموال المدين إذا نتج مما بيع من أموال مبلغ كافٍ لوفاء الدين المحجوز بسببه، مضافًا إليه نفقات التنفيذ، أو أحضر المحجوز عليه المبلغ الواجب دفعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: 1 - يحرر مأمور التنفيذ محضرًا يثبت فيه ما تم من إجراءات، واسم من رسا عليه المزاد، ومقدار الثمن. 2 - يصدر قاضي التنفيذ قرارًا بترسية المزاد على من رسا عليه بعد تحصيل المبلغ لحساب محكمة التنفيذ، متضمنًا ملخص محضري الحجز والبيع، ويتضمن القرار تسليم المشتري المال المبيع، ويكون قرار البيع سندًا تنفيذيًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: يكون قرار رسو المزاد مطهرًا للعقار من أي استحقاق تجاه من رسا عليه المزاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: يجرى بيع الأوراق المالية الخاضعة لنظام السوق المالية من خلال شخص مرخص له من هيئة السوق المالية بالوساطة في الأوراق المالية. ويتم الاتفاق بين وزارة العدل وهيئة السوق المالية على وضع الضوابط اللازمة لبيع هذه الأوراق، بما يحقق عدالة السعر، وضمانات التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: 1 - تفتح حسابات مصرفية باسم المحكمة تودع فيها وتصرف منها أموال التنفيذ. وتحدد اللائحة أحكام الإيداع، والصرف، وإدارة هذه الحسابات. 2 - تودع المعادن الثمينة والمجوهرات - وما في حكمها - في خزانة البنك الذي لديه حسابات محكمة التنفيذ. وتنظم اللائحة أحكام، وإجراءات تسهيل مشاركة البنوك في أعمال التنفيذ بعد الاتفاق بين الوزير ومحافظ مؤسسة النقد العربي السعودي على ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: توزع حصيلة التنفيذ - بأمر من قاضي التنفيذ - على الدائنين الحاجزين، ومن يعد طرفًا في الإجراءات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: إذا كانت حصيلة التنفيذ لا تكفي للوفاء بجميع حقوق ذوي الشأن (الدائنين الحاجزين ومن يعد طرفًا في الإجراءات)، واتفق هؤلاء على تسوية ودية فيما بينهم لتوزيعها ؛ يثبت قاضي التنفيذ اتفاقهم في محضر ويوقعه مأمور التنفيذ، والمنفذ لهم، والقاضي، وتكون لهذا المحضر قوة السند التنفيذي في مواجهتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: إذا لم تكن الحصيلة كافية، ولم يتفق ذوو الشأن على تسوية ودية لتوزيع الحصيلة؛ يثبت قاضي التنفيذ الاعتراض في محضر يوقعه القاضي، ومأمور التنفيذ، والأطراف ذوو الشأن، ويصدر قاضي التنفيذ حكمًا يتضمن توزيع الحصيلة بين الدائنين، وفقًا للأصول الشرعية والنظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: '1- تحجز الأموال المستحقة للمدين تحت يد المنشأة المالية - التي تحددها اللائحة - من خلال السلطة الإشرافية، وفق الضوابط الآتية: أ - يكون حجز الحسابات الجارية الدائنة بقيام المنشأة المالية بمنع صاحب الحساب من السحب من رصيده الدائن وما يضاف إليه من إيداعات لاحقة. وللمنشأة المالية - بعد موافقة قاضي التنفيذ - خصم الالتزامات المدينة الناشئة على الحساب قبل الحجز على رصيده. ‌ب - يكون حجز الحسابات الاستثمارية بقيام المنشأة المالية بمنع صاحب الحساب من السحب من الرصيد النقدي الدائن وما يضاف إليه من إيداعات. وإذا كان الرصيد النقدي الدائن مخصصًا للوفاء بما يترتب على المراكز أو العمليات الاستثمارية عند تاريخ استحقاقها، والتي أنشئت قبل إبلاغ المنشأة المالية بالحجز، فلا تخضع لإجراءات الحجز إلا بعد إقفال جميع المراكز.‌ج - يكون الحجز على الودائع لأَجَل بعدم تمكين المدين من سحبها مع استمرار تنميتها على الوجه الشرعي إن رغب المدين في ذلك، مع إشعار قاضي التنفيذ بطبيعتها، وتاريخ استحقاقها، وما يترتب على كسرها. ‌د - يكون حجز موجودات خزائن الأمانات بانتقال مأمور التنفيذ إلى المنشأة المالية، وتفتح
    الخزائن، وتجرد محتوياتها، ويوقع المحضر مأمور التنفيذ وموظف المنشأة المالية، والمدين - إذا أمكن إحضاره - ويسلم مفتاح الخزائن الآخر الخاص بالمدين إلى محكمة التنفيذ. ‌هـ - تحجز تعويضات التأمـين بالتأشير على سجل حقوق المدين في السجلات بمحتوى السند التنفيذي، ويسلم أي تعويض مستحق، أو سيستحق للمدين إلى حساب محكمة التنفيذ. ‌و- تضع السلطات الإشرافية على المنشآت المالية الآلية اللازمة التي تضمن سرعة تنفيذ أمر قاضي التنفيذ. 2 - يبلغ قاضي التنفيذ بنتيجة الحجز خلال ثلاثة أيام عمل من تسلم أمر الحجز. 3 - يأمر قاضي التنفيذ السلطة المشرفة على المنشأة المالية بأن تحول إلى حساب المحكمة الأرصدة النقدية الدائنة المستحقة للمدين الواردة في الفقرات (أ) و (ب) و (ج) و (د) و (هـ) من الفقرة (1) من هذه المادة بمقدار ما يفي بالدين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: '1- تُحجَز حصص الملكية في الشركات، والأسهم غير المدرجة - عن طريق وزارة التجارة والصناعة - بالتأشير على سجل الملكية، والتأشير بمحتوى السند التنفيذي على سجل الشركة. 2- تُحجَز الأوراق المالية - عن طريق هيئة السوق المالية - وتُبلغ قاضي التنفيذ بنتيجة الحجز خلال ثلاثة أيام عمل من تسلم أمر الحجز، وفق الضوابط الآتية: أ - يكون حجز الأوراق المالية بمنع المدين من التصرف فيها. ‌ب - يكون حجز المراكز القائمة للأوراق المالية بمنع المدين من التصرف في المبالغ المستحقة له بعد إغلاقها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: 'تحجز الأوراق التجارية، وفق الضوابط الآتية: 1 - إذا كان الشيك تحت يد المدين المستفيد منه، فيحرر المأمور محضر الحجز، وتحصل القيمة أو المتوافر منها ، وتودع في حساب المحكمة. 2 - يكون حجز قيمة الشيك المظهر بعد علم المدين بأمر التنفيذ عن طريق قيام البنك المسحوب عليه - عند تقدم المظهر له لتحصيل قيمة الشيك - بحجز القيمة، وإيداعها في حساب المحكمة. 3 - إذا لم يتوافر مقابل الوفاء بالشيك محل الحجز، فيفوض قاضي التنفيذ الدائن في الحلول محل المدين ؛ لمطالبة الساحب، أو المظهر بقيمة الشيك، وتودع القيمة في حساب المحكمة. وفي حال معارضة الساحب، أو المظهر في الوفاء، فعليه التقدم إلى الجهة القضائية المختصة بدعوى المعارضة خلال عشرة أيام من مطالبته بالوفاء، وإشعار قاضي التنفيذ بإجراءات نظر الدعوى وما تنتهي إليه. وإذا انتهت المدة المذكورة دون التقدم بدعوى المعارضة، وجب عليه الوفاء بقيمة الشيك للمحكمة. 4 - يكون حجز السند لأمر، والكمبيالة المستحقة الدفع التي في حيازة المدين بتحرير المأمور لمحضر الحجز، وتودع القيمة التي تضمنتها الورقة التجارية في حساب المحكمة، وإذا كانت مؤجلة، أُجِّـل التحصيل إلى
    حين حلول أجلها .5 - إذا عارض أو اعترض الساحب أو المظهر في السند لأمر، أو الكمبيالة على حق المدين المستفيد في القيمة، فعليه إقامة دعوى المعارضة وفق ما ذكر في الفقرة (3) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: يكون حجـز الأموال التي تستحق للمدين مستقبلاً تحت يد الملتزم بدفع تلك الأموال، ويقوم مأمور التنفيذ، والجهة الملتزمة، ومستحق تلك الأموال بتحرير محضر بتلك الأموال وتاريخ استحقاقها، وتودع تلك الأموال في حساب المحكمة سواء أكانت نقودًا، أم منقولاً، أم عقارًا، بحسب الضوابط الواردة في هذا النظام لكل نوع منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: يكون حجز الملكية الفكرية - عن طريق الجهة المختصة بتسجيل الملكية الفكرية - بالتأشير على سجلها بمضمون السند التنفيذي، ويبلغ قاضي التنفيذ بنتيجة الحجز خلال ثلاثة أيام عمل من تسلم أمر الحجز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: يجوز للدائن أن يوقع الحجز تحت يد نفسه على ما يكون مدينًا به لمدينه، ويكون الحجز بإعلان إلى المدين يشتمل على البيانات الواجب ذكرها في ورقة إبلاغ الحجز. وفي الأحوال التي يكون فيها الحجز بأمر من قاضي التنفيذ، يجب على طالب الحجز - خلال الأيام العشرة التالية لإعلان المدين بالحجز - أن يرفع أمام الجهة القضائية المختصة الدعوى بثبوت الحق وصحة الحجز، وإلا عد الحجز كأن لم يكن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والستون
  article_text_ar: إذا كان للمحجوز لديه أكثر من فرع، فيعد إبلاغ الحجز لأي فرع من تلك الفروع منتجًا لآثاره في مواجهة المحجوز لديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والستون
  article_text_ar: إذا تصرف المحجوز لديه في المال المحجوز بخلاف أمر قاضي التنفيذ؛ وجب على قاضي التنفيذ - بناءً على طلب الحاجز - التنفيذ على مال المحجوز لديه بمقدار المال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والستون
  article_text_ar: إذا كان محل التنفيذ فعلاً أو امتناعًا عن فعل ولم يقم المنفذ ضده بتنفيذ التزامه خلال خمسة أيام من تكليفه بذلك وفقًا لأحكام هذا النظام، فعلى قاضي التنفيذ الأمر باستعمال القوة المختصة (الشرطة) للقيام بما يلزم من إجراءات للتنفيذ، وذلك ما لم يتطلب التنفيذ أن يقوم به المدين بنفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة والستون
  article_text_ar: إذا تعذر التنفيذ باستخدام القوة المختصة، أو اقتضى التنفيذ قيام المدين به بنفسه ولم يقم بذلك، فلقاضي التنفيذ أن يصدر حكمًا بغرامة مالية لا تزيد على عشرة آلاف ريال يوميًا تودع في حساب المحكمة عن كل يوم يتأخر فيه المنفذ ضده عن التنفيذ، ولقاضي التنفيذ الحق في إلغاء الغرامة، أو جزء منها إذا بادر المنفذ ضده بالتنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السبعون
  article_text_ar: إذا تعذر استخدام القوة المختصة لإجراء التنفيذ، أو إذا فرضت غرامة مالية على المنفذ ضده ولم ينفذ خلال المدة التي يحددها قاضي التنفيذ، جاز له أن يصدر أمرًا بحبس المنفذ ضده لإجباره على التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والسبعون
  article_text_ar: تسري أحكام التنفيذ المباشر على الممثل النظامي للشخص المعنوي الخاص، أو المتسبب في إعاقة التنفيذ من منسوبي الشخص المعنوي الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والسبعون
  article_text_ar: يكون تنفيذ إخلاء العقار بخروج المأمور إلى موقع العقار في اليوم التالي لمضي خمسة أيام من تاريخ الإبلاغ بأمر التنفيذ، ويقـوم المأمور بتسليم العقار للمنفذ له، وله استخدام القوة الجبرية لدخول العقار إذا استدعى الأمر ذلك. وإذا لم يحضر من بيده العقار، أو امتنع عن تسلم المنقولات التابعـة له، فتسلم هذه المنقولات إلى الخازن القضائي، ويأمر قاضي التنفيذ ببيعها في المزاد بعد شهرين ما لم يتسلمها الحائز، وتوضع القيمة في حساب المحكمة. وإذا كان المنفذ له دائنًا للحائز، فتطبق أحكام هذا النظام على منقولات الحائز المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والسبعون
  article_text_ar: تنفذ القرارات والأحكام الصادرة في مسائل الأحوال الشخصية بالطرق المقررة في هذا النظام، إذا اقتضى ذلك الحجز على الأموال وبيعها. وإذا تضمن التنفيذ دفع أموال بشكل دوري، فيجري التنفيذ من خلال ترتيبات تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والسبعون
  article_text_ar: تنفذ الأحكام الصادرة بحضانة الصغير، وحفظه، والتفريق بين الزوجين، ونحو ذلك مما يتعلق بالأحوال الشخصية جبرًا ولو أدى ذلك إلى الاستعانة بالقوة المختصة (الشرطة)، ودخول المنازل، ويعاد تنفيذ الحكم كلما اقتضى الأمر ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والسبعون
  article_text_ar: لا ينفذ الحكم الصادر على الزوجة بالعودة إلى بيت الزوجية جبرًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والسبعون
  article_text_ar: يحدد قاضي التنفيذ طريقة تنفيذ الحكم الصادر بزيارة الصغير ما لم ينص الحكم عليها، ويجري التنفيذ بتسليم الصغير في مكان مهيّأ ومناسب لهذا النوع من التنفيذ، وتحدد وزارة العدل تلك الأماكن في اللائحة، على ألا يكون في مراكز الشرط ونحوها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والسبعون
  article_text_ar: إذا لم يف المدين بالدين وادعى الإعسار، ينظر قاضي التنفيذ في إثبات إعساره بعد استكمال إجراءات الإفصاح عن الأموال والاستجواب والتتبع، وفقًا لأحكام هذا النظام، وبعد إعلان يتضمن أسباب طلب الإعسار، وينشر في صحيفة يومية أو أكثر في منطقة المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والسبعون
  article_text_ar: 1- إذا ادعى المدين الإعسار وظهر لقاضي التنفيذ قرائن على إخفائه لأمواله، فعلى قاضي التنفيذ - بموجب حكم يصدره - استظهار حاله بالحبس مدة لا تتجاوز خمس سنوات مع مراعاة كثير المال وقليله، ويخضع الحكم لتدقيق محكمة الاستئناف.2 - يستدعي قاضي التنفيذ المدين - خلال فترة حبسه الواردة في الفقرة (1) من هذه المادة - ويستجوبه استظهارًا لحاله بصفة دورية لا تتجاوز ثلاثة أشهر وفق ما تحدده اللائحة . 3 - تحدد اللائحة كثير مال الدين وقليله بحسب أنواع الديون وأحوال المدينين، ويكون ذلك بالتنسيق مع وزارة الداخلية ووزارة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة والسبعون
  article_text_ar: إذا نشأ الدين عن واقعة جنائية غير متعمدة وادعى المدين الإعسار، يثبت قاضي التنفيذ إعساره بعد سماع بينته، فإن لم يكن له بينة، أمر القاضي بيمين الاستظهار وأثبت إعساره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثمانون
  article_text_ar: إذا ادعى المدين الإعسار، وظهر لقاضي التنفيذ أن دعوى الإعسار احتيالية، أو كان عجز المدين عن الوفاء نتيجة تعد أو تفريط منه؛ أثبت القاضي تلك الواقعة، واستكمل إجراءات التنفيذ، وأمر بإيقاف المتهم وإحالة ملف الاتهام خلال مدة لا تتجاوز سبعة أيام إلى هيئة التحقيق والادعاء العام لرفع الدعوى. ويجوز لذوي المصلحة تقديم بلاغ إلى الهيئة بطلب رفع الدعوى، وينظر قاضي الموضوع في الدعوى، وفي حال الإدانة تطبق العقوبة المنصوص عليها في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والثمانون
  article_text_ar: 1- يصدر قاضي التنفيذ أمره للجهات المسؤولة عن الأصول الواردة في هذا النظام بالحجز على الأموال التي ترد مستقبلاً للمدين المعسر. 2 - يشعر القاضي أحد المرخص لهم بتسجيل المعلومات الائتمانية بواقعة الإعسار. 3 - للدائن التقدم بالسند التنفيذي نفسه مستقبلاً إلى قاضي التنفيذ إذا ظهر للمدين المعسر أي مال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والثمانون
  article_text_ar: يخضع التاجر في إعلان إفلاسه لقواعد الإفلاس المقررة نظامًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والثمانون
  article_text_ar: يصدر قاضي التنفيذ - بناءً على أحكام هـذا النظام - حكمًا بحبس المدين إذا ثبت له امتناعه عن التنفيذ، ويستمر الحبس حتى يتم التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والثمانون
  article_text_ar: 'لا يجوز الحبس التنفيذي للمدين في الأحوال الآتية: 1 - إذا كانت لديه أموال ظاهرة كافية للوفاء بالحق الذي عليه ويمكن الحجز والتنفيذ عليها. 2 - إذا قدم كفالة مصرفية، أو قدم كفيلاً مليئًا ، أو كفالة عينية تعادل الدين.3- إذا ثبت إعساره، وفقًا لأحكام هذا النظام. 4 - إذا كان من أصول الدائن، ما لم يكن الدين نفقة شرعية مقررة. 5 - إذا ثبت بشهادة الهيئة الطبية المختصة إصابته بمرض لا يتحمل معه الحبس. 6 - إذا كانت امرأة حاملاً، أو كان لها طفل لم يتجاوز الثانية من عمره.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والثمانون
  article_text_ar: لا يؤدي تنفيذ الحبس إلى انقضاء الحق، وينفذ الحبس التنفيذي بمعزل عن المسجونين في القضايا الجزائية، وتهيئ إدارة السجن للمحبوس ما يمكنه من الوفاء بديونه، أو تسويتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والثمانون
  article_text_ar: تسري أحكام الحبس التنفيذي على الممثل النظامي للشخص المعنوي الخاص، أو المتسبب في إعاقة التنفيذ من منسوبيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والثمانون
  article_text_ar: تختص المحاكم الجزائية بالنظر في إيقاع العقوبات الواردة في هذا النظام، وترفع هيئة التحقيق والادعاء العام الدعوى بناءً على إحالة يصدرها قاضي التنفيذ أو بلاغ من المتضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والثمانون
  article_text_ar: '1 - يعاقب بالسجن مدة لا تزيد على سبع سنـوات كل مـدين ارتكب أيًّا من الجرائم الآتية: أ - الامتناع عن تنفيذ الحكم النهائي الصادر في حقه، أو ثبت قيامه بإخفاء أمواله، أو تهريبها، أو امتنع عن الإفصاح عما لديه من أموال. ب - تعمد تعطيل التنفيذ بأن أقام دعوى قصد منها تعطيل التنفيذ.ج - مقاومة التنفيذ، بأن هدد، أو تعدى هو بنفسه - أو بوساطة غيره - على موظف، أو مرخص له يقوم بالتنفيذ، أو قام بأي من ذلك ضـد المنفذ له، وأي فعل آخر غير مشروع قام به بقصد مقاومة التنفيذ. د - الكذب في إقراراته أمام المحكمة، أو الكذب في الإجراءات، أو تقديم بيانات غير صحيحة. 2 - يعاقب بالعقوبة المنصوص عليها في الفقرة (1) من هذه المادة، كل من أعان المدين، أو ساعده في أي من الجرائم المنصوص عليها في الفقرات (1/ أ) و(1/ ب) و(1/ ج) و(1/ د) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التاسعة والثمانون
  article_text_ar: يعاقب الموظف العام ومن في حكمه بالسجن مدة لا تزيد على سبع سنوات إذا منع التنفيذ أو أعاقه. ويعد ذلك جريمة من الجرائم المخلة بالأمانة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة التسعون
  article_text_ar: يعاقب بالسجن مدة لا تزيد على خمس عشرة سنة كل مدين ثبت أن سبب مديونيته قيامه بعمل احتيالي، أو قيامه بتبديد أمواله إذا كانت الأموال كثيرة ولو ثبت إعساره في الحالتين. وتعد هذه الأفعال من الجرائم الكبيرة الموجبة للتوقيف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الحادية والتسعون
  article_text_ar: 'يعاقب بالسجن مدة لا تزيد على ثلاث سنوات كل من: 1 - الشخص المطلع على بيانات أصول المدين، إذا سرب تلك البيانات، ويعاقب بالعقوبة نفسها كل شخص اطلع على تلك البيانات دون أمر قضائي. 2 - الحارس أو الخازن القضائي وتابعيهما، إذا أخل أي منهم بواجباته؛ بإهماله أو تعديه أو تهربه من تسليم الأموال، أو تسلمها. 3 - المقوم أو وكيل البيع وتابعيهما، أو المشارك في المزاد؛ إذا تعمد أي منهم التأثير على السعر، أو التضليل في عدالة الأسعار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثانية والتسعون
  article_text_ar: يعاقب بالسجن مدة لا تزيد على ثلاثة أشهر كل من امتنع من الوالدين - أو غيرهما - عن تنفيذ حكم صادر بالحضانة، أو الولاية، أو الزيارة ، أو قام بمقاومة التنفيذ، أو تعطيله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثالثة والتسعون
  article_text_ar: 'تنشأ في وزارة العدل وكالة مختصة للتنفيذ تعنى بالشؤون الإدارية، والمالية، تتولى ما يأتي: 1- الترخيص لمقدمي خدمات التنفيذ ، وهم : أ - مبلغ الأوراق القضائي .ب- وكيل البيع القضائي .ج - الحارس القضائي . د - الخازن القضائي.هـ - شركات متخصصة تتولى الإشراف على عملية تسلُّم المؤجر الأصول المنقولة وفقاً لضوابط تضعها وزارة العدل بالتنسيق مع وزارة الداخلية.و - مقدم خدمة تنفيذ من القطاع الخاص بعد موافقة مجلس الوزراء على إسناد الخدمة إلى هذا القطاع. وتحدد اللائحة أحكام الترخيص لهم، وقواعد تأهيلهم بما في ذلك الضمان المالي المطلوب، وقواعد إجراءات عملهم، والإشراف عليهم، وسياسات تحديد الأجور التي يتقاضونها، والجزاءات التي توقع عليهم. 2 - الاستعانة بشركة (أو أكثر) للقيام بأعمال التنفيذ أو بعضها تحت إشراف قضاء التنفيذ. 3 - إعداد لائحة لتدريب العاملين في التنفيذ. 4 - نشر بيانات التنفيذ. 5 - تبادل الإفصاح عن الأصول مع الدول الأخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الرابعة والتسعون
  article_text_ar: لا يخل تطبيق هذا النظام بما ارتبطت به المملكة من معاهدات، واتفاقيات مع الدول والهيئات والمنظمات الدولية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الخامسة والتسعون
  article_text_ar: للمتضرر من المماطلة في إجراءات التنفيذ، إقامة دعوى في مواجهة المتسبب أمام قاضي التنفيذ؛ لتعويضه عمّا لحقه من ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السادسة والتسعون
  article_text_ar: يلغي هذا النظام المواد من (السادسة والتسعين بعد المائة إلى الثانية والثلاثين بعد المائتين) من نظام المرافعات الشرعية، الصادر بالمرسوم الملكي رقم (م/21) وتاريخ 20/5/1421هـ، والفقرة (ز) من المادة (الثالثة عشرة) من نظام ديوان المظالم، الصادر بالمرسوم الملكي رقم (م/78) وتاريخ 19/9/1428هـ، وكل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة السابعة والتسعون
  article_text_ar: يصدر الوزير اللائحة خلال مائة وثمانين يومًا من تاريخ صدور النظام، ويعمل بها بعد نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
- article_ref: المادة الثامنة والتسعون
  article_text_ar: يعمل بهذا النظام بعد مضي مائة وثمانين يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c81ba2f1-1bf1-443b-9b1c-a9a700f27110/1
  verified: false
