regulation:
  code: BOE247
  name_ar: نظام العمل التطوعي
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها، ما لم يقتض سياق النص غير ذلك: العمل التطوعي: كل جهد أو عمل يقدمه شخص ذو صفة طبيعية أو اعتبارية، بطوعه واختياره؛ رغبة في خدمة المجتمع وتنميته. النظام: نظام العمل التطوعي. اللجنة: اللجنة الوطنية للعمل التطوعي. المتطوع: كلّ من يقدم عملاً تطوعيًّا، دون اشتراط مقابل مادي أو معنوي. الجهة المستفيدة: أي جهة غير هادفة إلى الربح تستفيد من العمل التطوعي، سواء كانت عامة أو أهلية. الفريق التطوعي: مجموعة من الأفراد يمارسون عملاً تطوعيًّا، تحت قيادة موحدة؛ لتحقيق أهداف مشتركة ومحددة، وبناءً على أطر نظامية تتكون من سياسات وإجراءات موصوفة بإشراف الجهة المستفيدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف النظام إلى الآتي: تنظيم العمل التطوعي، وتطويره. نشر ثقافة العمل التطوعي بين أفراد المجتمع ومؤسساته. تنظيم العلاقة بين أطراف العمل التطوعي، وتحديد حقوقهم وواجباتهم. تعزيز قيم الانتماء الوطني والعمل الإنساني والمسؤولية الاجتماعية لدى أفراد المجتمع ومؤسساته. تنمية قدرات المتطوعين وتوجيهها نحو الأولويات الوطنية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تنشأ بموجب أحكام النظام لجنة وطنية تسمى (اللجنة الوطنية للعمل التطوعي)، برئاسة وزير العمل والتنمية الاجتماعية، وعضوية كل من: ممثل من وزارة العمل والتنمية الاجتماعية. ممثل من وزارة التعليم. ممثل من وزارة الصحة. ممثل من وزارة الحج والعمرة. ممثل من وزارة الإعلام. ممثل من هيئة الهلال الأحمر السعودي. ممثل من المديرية العامة للدفاع المدني. ممثل من وحدة المخاطر الوطنية. ممثل من جمعية الكشافة العربية السعودية. أحد مسؤولي الجمعيات التطوعية الأهلية، يختاره وزير العمل والتنمية الاجتماعية. أحد المهتمين بالعمل التطوعي، يختاره وزير العمل والتنمية الاجتماعية. ويكون للجنة سكرتارية في وزارة العمل والتنمية الاجتماعية، ويختار الوزير مقرراً وأميناً للجنة من موظفي الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تكون مدة العضوية في اللجنة أربع سنوات قابلة للتجديد لمرة واحدة، ويختار الرئيس نائباً له من ممثلي الأجهزة الحكومية في اللجنة عدا ممثل وزارة العمل والتنمية الاجتماعية، ويحق للجنة دعوة من تراه لحضور اجتماعاتها دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تجتمع اللجنة مرتين على الأقل في السنة بناءً على دعوة من رئيسها. ولا يكون اجتماع اللجنة صحيحاً إلا إذا حضره أكثر من نصف أعضائها على الأقل, على أن يكون من بينهم الرئيس أو نائبه. وتصدر قراراتها بأغلبية أصوات الأعضاء الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. وللجنة عقد اجتماعات طارئة إذا طلب ذلك رئيسها أو ثلاثة من أعضائها على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'على اللجنة -في حدود أحكام النظام- مسؤولية التنسيق بين الجهات المستفيدة فيما يخص العمل التطوعي، وعليها على نحو خاص ما يأتي: وضع استراتيجيات العمل التطوعي. وضع آليات تنظيم العمل التطوعي وتطويره. الإشراف على قواعد البيانات الخاصة بالمتطوعين. دعم تنظيم المؤتمرات والندوات وتشجيع البحوث والدراسات المتعلقة بالعمل التطوعي والعمل على تفعيلها، بالتنسيق مع الجهات المعنية. إبراز الجهود التطوعية في المملكة على المستوى الوطني والإقليمي والدولي. إعداد تقرير سنوي عن العمل التطوعي في المملكة. وضع ضوابط إصدار تراخيص الفرق التطوعية، وتسجيلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تلتزم الجهة المستفيدة -وفقاً لأحكام النظام- بكل ما من شأنه تفعيل العمل التطوعي، وبالأخص القيام بالمهمات الآتية: استقبال طلبات الراغبين في العمل التطوعي، ودراستها، واتخاذ القرار في شأنها. استقطاب الراغبين في العمل التطوعي، من منسوبيها وغيرهم، للمشاركة في البرامج التطوعية الداخلية التي تنظمها الجهات المستفيدة، وكذلك البرامج التطوعية الخارجية، وفق التعليمات المنظمة لذلك. تصميم برامج تطوعية وفق أهدافها التنموية. تدريب المتطوعين ورفع مستوى قدراتهم في مجال التخصص. متابعة أداء المتطوعين وتقويمهم وتحفيزهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجوز للمتطوعين ممارسة العمل التطوعي عن طريق تشكيل فريق تطوعي، بعد تسجيله واعتماده لدى الجهة المستفيدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يُنشأ في الجهة المستفيدة سجل يسمى (سجل المتطوعين والفرق التطوعية)، تقيد فيه أسماء المتطوعين وعدد ساعات التطوع والأعمال التطوعية التي قاموا بها لدى الجهة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'للمتطوع -وفق أحكام النظام وفي حدود الصلاحيات والإمكانات المتاحة للجهة المستفيدة، وبما يخدم تنفيذ العمل التطوعي- الحق في الحصول من الجهة المستفيدة على ما يأتي: التدريب اللازم في مجاله التطوعي. الأجهزة، والأدوات، والملابس، التي يحتاج إليها العمل التطوعي. الإعاشة، والمواصلات، وكذلك السكن إذا كان العمل التطوعي خارج مقر إقامته. العلاج إذا أصيب أثناء التدريب أو ممارسة العمل التطوعي، أو خلال ذهابه إلى عمله التطوعي وعودته منه. بطاقة تعريفية من الجهة المستفيدة. شهادة تطوع وخبرة، تصدر باسم الجهة المستفيدة، تتضمن نوع العمل التطوعي الذي أنجز ومدته وساعات العمل التطوعية ووصف الخبرة التي اكتسبها منه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يلتزم المتطوع بما يأتي: التحلي بالأخلاق والآداب التي يتطلبها العمل التطوعي الذي اختاره. إنجاز العمل التطوعي بأمانة ونزاهة وفق مقتضيات العمل التطوعي ومبادئه وأهدافه، والأنظمة واللوائح والتعليمات ذات الصلة بمجال تطوعه. اتباع الأنظمة والتعليمات والضوابط الخاصة بالجهة المستفيدة من عمله التطوعي. المحافظة على العهد المسلمة إليه بجميع أشكالها، وإعادتها إلى الجهة المستفيدة. مراعاة وسائل السلامة وحماية العاملين في العمل التطوعي، إذا كان العمل ذا طبيعة ميدانية، وذلك بالتنسيق مع الجهة المستفيدة. عدم إفشاء أي سر يتعلق بعمله التطوعي أثناء عمله، أو بعد تركه. عدم الإدلاء أو التصريح بأي معلومة لأي وسيلة إعلامية دون الحصول على إذن من رئيس الجهة المستفيدة، وللجهة المستفيدة اتخاذ الإجراءات اللازمة لضمان التزام المتطوع بمقتضيات العمل التطوعي ومبادئه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يمنح المتطوع -في حالة الإصابة بعجز أو عاهة تمنعه من العمل بصورة قطعية، أو ورثته في حالة الوفاة، إذا كان العجز أو الوفاة ناشئين بسبب عمله التطوعي- تعويضاً؛ وفقاً لنظام العمل لدى الجهة المستفيدة. يصرف لمن يصاب -بسبب عمله التطوعي- بعجز جزئي أو عاهة مستديمة لا تمنعه من أداء عمله؛ تعويض يقدر على أساس نسبة العجز الذي أصابه مقدراً على أساس التعويض المشار إليه في الفقرة (1) من هذه المادة، ويكون تقرير نسبة العجز من الهيئة الطبية المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: للجهة المستفيدة تكريم المتطوعين سنويًّا في المناسبات الوطنية أو الدولية، ولرئيس الجهة المستفيدة منح المتطوع ما يراه مناسباً من حوافز معنوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: للجهة المستفيدة إنهاء عمل المتطوع وفق شروط وضوابط تحددها، ولجهة عمل المتطوع إنهاء تفرغه من عمله التطوعي، إذا كان تطوعه أثناء الدوام الرسمي, بعد التنسيق كتابيًّا مع الجهة المستفيدة. للمتطوع إنهاء عمله التطوعي لدى الجهة المستفيدة، بشرط إشعارها قبل الإنهاء بوقت كاف، وأن يحرص على ألا يخل ذلك بالعمل التطوعي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يجوز لمنشآت القطاع الخاص الاستفادة من جهود المتطوعين في حال وجود عائد ربحي مباشر أو غير مباشر لتلك المنشآت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على الجهة المستفيدة النظر في تظلمات المتطوعين، والتحقق منها، واتخاذ ما يلزم حيالها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تصدر كل جهة حكومية قرارات متضمنة الآليات الخاصة بها لتطبيق النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يُعمل بالنظام بعد (تسعين) يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a122634e-98ea-4e40-b4dd-ab5700c51c7d/1
  verified: false
