regulation:
  code: BOE139
  name_ar: نظام الكليات العسكرية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة (1)
  article_text_ar: 'يسمي هذا النظام نظام الكليات العسكرية وتطبق أحكامه على الكليات الآتية: أ) كلية الملك عبد العزيز الحربية. ب) كلية الملك فيصل الجوية.جـ) كلية قوى الأمن الداخلي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: 'يقصد بالعبارات التالية الواردة في هذا النظام ما يلي: أ) الوزير: وزير الدفاع والطيران فيما يختص بكلية الملك عبد العزيز الحربية، وكلية الملك فيصل الجوية، وزير الداخلية فيما يختص بكلية قوى الأمن الداخلي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: تعتبر كل من الكليات المذكورة كلية تعليمية عسكرية ومهمتها تعليم وتدريب الطالب ليحوز على الصفات التي تؤهله ليكون ضابطا في حقل تخصصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: 'السلطات التي تباشر إدارة الكلية هي: أ) المجلس الأعلى للكلية. ب) مجلس الكلية. ج) قائد الكلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: يؤلف المجلس الأعلى للكلية من أعضاء لجنة الضباط العليا، قائد الكلية وعضوين يختارهما الوزير ويتولى رئاسة المجلس رئيس لجنة الضباط العليا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: 'المجلس الأعلى للكلية هو السلطة العليا التي ترسم السياسة العامة لها. وله على الأخص الآتي: أ) تحديد عدد الطلبة.ب) المصادقة على المنهج التعليمي العام.جـ) دراسة أية مقترحات بتعديل هذا النظام.د) إقرار اللائحة الداخلية للكلية.هـ) النظر فيما يعرض عليه من قِبل رئيس المجلس ويقرر إدراجه بجدول الأعمال ولا تعتبر القرارات نافذة إلا بعد مصادقة الوزير عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: يؤلف مجلس الكلية من قائد الكلية رئيسًا، وعضوية مساعد قائد الكلية وأركان الكلية وعضوين يختارهما الوزير من بين أعضاء هيئة التدريس بالكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: 'مجلس الكلية هو السلطة المسئولة عن تنفيذ السياسة العامة التي يقرها المجلس الأعلى ويمارس الصلاحيات المخولة له بموجب هذا النظام وله على الأخص الآتي: أ) اقتراح المنهج التعليمي العام.ب) قبول الطلبة المستجدين المستوفين لشروط الالتحاق بالكلية المنصوص عليها في هذا النظام.جـ) اقتراح اللائحة الداخلية للكلية.د) اقتراح مشروع ميزانية الكلية تمهيدًا لرفعها.هـ) إعداد التقرير السنوي مبينًا الملاحظات الرئيسية التي واجهت الكلية في النواحي التعليمية والإدارية والمالية والمقترحات التي يراها المجلس بشأنها ورفع التقرير للمجلس الأعلى.و) إقرار التقييم للطالب في نهاية العام الدراسي أو المرحلة الدراسية على ضوء نتائج الامتحانات وتقارير الكفاءة.ز) تحديد بدء ونهاية العام الدراسي ومواعيد الامتحانات والعطل الدراسية والأجازات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (9)
  article_text_ar: يجتمع المجلس الأعلى للكلية بدعوة من رئيسه مرة في السنة على الأقل. كما يجتمع مجلس الكلية مرة في الشهر على الأقل.وللرئيس دعوة المجلس إلى الانعقاد كلما اقتضت الضرورة ذلك ولا يعتبر انعقاد المجلس نظاميًّا إلا إذا حضره ثلثا أعضائه ويصدر قراراته بالأغلبية المطلقة لأصوات الحاضرين فإذا تساوت الأصوات يرجح الجانب الذي فيه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: قائد الكلية يتولي جميع شئون الكلية الإدارية والمالية والتعليمية. وهو المسئول عن تنفيذ قرارات مجلس الكلية ويصدر الأوامر والتعليمات التي تتضمن سير العمل بالكلية ويتم تعيينه وتحديد صلاحياته بقرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: تتكون هيئة التدريس في الكلية من أعضاء عسكريين ومدنيين ويضع المجلس الأعلى للكلية بناء على اقتراح مجلس الكلية. أ) الشروط والمؤهلات الواجب توافرها في أعضاء هيئة التدريس العسكريين.ب) لائحة تنظيم الشروط والمؤهلات الواجب توافرها في أعضاء هيئة التدريس المدنيين وتعيينهم وتصنيفهم وترقيتهم وابتعاثهم ورواتبهم ومكافآتهم وكافة نواحي حياتهم الوظيفية وذلك بالاتفاق مع وزارة المالية والاقتصاد الوطني والديوان العام للخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: يجوز لمجلس الكلية الاستعانة ببعض حملة المؤهلات العالية من أساتذة الجامعات ومن الضباط والأطباء وموظفي الدولة وغيرهم لتدريس بعض المواد في الكلية ويمنحون مكافأة وفقًا للقواعد المعمول بها في الجامعات. كما يجوز له استدعاء ضيوف محاضرين لإلقاء محاضرات عامة في الكلية ويتم ذلك بالتنسيق مع الجهات المختصة ويمنحون مكافأة يحددها مجلس الكلية وفقًا لضوابط يضعها المجلس الأعلى للكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (13)
  article_text_ar: تمنح لكافة الضباط العاملين بالكلية مكافأة مقدارها أربعمائة ريال (400 ريال) شهريًّا كما يمنح ضباط الصف والجنود المشتركون بالتدريس والتدريب بالكلية مكافأة مقدارها (مائة ريال 100 ريال) شهريًّا على أن لا يجمع الضباط بين هذه المكافأة وبين علاوة التدريس المنصوص عليها في نظام خدمة الضباط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (14)
  article_text_ar: تعتبر خدمة الضباط وضباط الصف والجنود بالكلية خدمة بالوحدات الميدانية لأغراض الترقية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (15)
  article_text_ar: 'يشترط لقبول الطالب في الكلية الشروط التالية: أ) أن يكون سعودي الأصل والمنشأ وفي النظام الخاص بذلك.ب) أن لا يقل عمره عن السابعة عشرة وان لا يتجاوز الرابعة والعشرين طبقًا لما يرد في حفيظة نفوس الطالب أو والده.جـ) أن يكون حائزًا على شهادة الثانوية العامة أو ما يعادلها.د) أن يكون غير متزوج.هـ) أن يكون حسن الأخلاق والسمعة وغير محكوم عليه بحد شرعي أو في جريمة مخلة بالشرف أو الأمانة، وأن لا يكون مطرودًا من إحدى الكليات أو المعاهد العسكرية لأي سبب.و) أن يجتاز فحصًا طبيًّا طبقًا لشروط اللياقة الطبية المنصوص عليها باللائحة.ز) أن يجتاز المقابلة الشخصية التي تجريها الكلية وفقًا للشروط المنصوص عليها باللائحة الداخلية.ح) أية شروط أخرى ترد في اللائحة الداخلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (16)
  article_text_ar: يلتزم الطالب عند التحاقه بالكلية بتقديم تعهد خطي موقع منه ومن ولي أمره يتعهد فيه بأن يخدم بعد تخرجه مدة ثمان سنوات. كما يقدم كفيلاً لإدارة الكلية يلتزم بدفع التعويض الذي تحدده اللائحة الداخلية في حالة ترك الطالب للدراسة من تلقاء نفسه أو طرده بسبب سوء سلوكه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (17)
  article_text_ar: يجوز بقرار من الوزير بعد موافقة رئيس مجلس الوزراء قبول طلبة من غير السعوديين ويقرر المجلس الأعلى بناء على اقتراح مجلس الكلية الشروط الواجب توافرها لديهم والمزايا التي تقدم لهم ويمنح هؤلاء بعد تخرجهم شهادة من الكلية بنجاحهم دون أن يمنحوا رتبًا عسكرية سعودية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (18)
  article_text_ar: يجوز استثناء قبول ضباط الصف والجنود بالكلية إذا توافرت فيهم شروط الالتحاق المنصوص عليها في المادة (15) عدا الفقرتين (ب، د) ويشترط أن لا يزد سنه عن (27) سنة، وأن يكون أمضى مدة خدمة عسكرية لا تقل عن خمس سنوات. ويوقف صرف راتبه الأصلي ومخصصاته وبدلاته الأخرى بعد أن يتم تثبيته في الكلية ويعامل كطالب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (19)
  article_text_ar: الطالب الذي يجتاز نجاح مرحلة التدريب العسكري الأولى يثبت في الكلية بقرار من قائدها وتسوى آثار هذا التثبيت من تاريخ التحاقه بالكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (20)
  article_text_ar: تتحمل الكلية النفقات الدراسية وتؤمن للطالب الطعام والملابس والسكن والعلاج طبقًا لما توضحه اللائحة الداخلية ويمنح راتبًا شهريًّا يعادل نصف الراتب الشهري الأساسي للملازم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (21)
  article_text_ar: (يعامل من يصاب من الطلاب بحادثة أدت إلى العجز والوفاة من حيث التعويض أو معاش التقاعد معاملة الضباط طبقًا لنظام التقاعد العسكري ويعفى الطالب في هذه الحالة من دفع العائدات التقاعدية).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (22)
  article_text_ar: يصرف للطالب الذي يكلف بمهمة خارج مقر الكلية داخل المملكة أو خارجها بدل انتداب عن كل ليلة يحدد مقداره المجلس الأعلى للكلية بالاتفاق مع وزارة المالية والاقتصاد الوطني ويخفض البدل إلى الثلثين في حالة تأمين السكن وإلى الثلث في حالة تأمين السكن والإعاشة ولا يعتبر انتدابًا تدريب الطالب خارج مقر الكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (23)
  article_text_ar: تؤمن الكلية الوسائل النقلية اللازمة لنقل المنتدب أو يتم إركابه بالدرجة السياحية بالطائرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (24)
  article_text_ar: لا يجوز أن تزيد مدة انتداب الطالب عن ثلاثة أشهر في السنة الدراسية ويصدر قرار انتدابه من قائد الكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (25)
  article_text_ar: يضع المجلس الأعلى لائحة لابتعاث الطلاب يصادق الوزير عليها وتوضح هذه اللائحة شروط الابتعاث وإنهاء وحقوق وواجبات الطالب المبتعث وغيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (26)
  article_text_ar: يجوز بموافقة الوزير إيفاد الطالب في بعثات دراسية عسكرية أو علمية للداخل أو الخارج ويصدر قرار الابتعاث من قائد الكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (27)
  article_text_ar: تتحمل الكلية النفقات الدراسية وتحدد لائحة الابتعاث المبالغ التي تصرف للإنفاق على المبتعث وذلك بالاتفاق مع وزارة المالية والاقتصاد الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (28)
  article_text_ar: يطبق على الطلاب نظام الميداليات المدنية والعسكرية في حالة تأديتهم خدمات ممتازة ويمنحون هذه الميداليات من الدرجة الثانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (29)
  article_text_ar: يؤمن للطالب وسائل النقل في الذهاب والعودة من مقر دراسته إلى إقامته لدى ذويه داخل المملكة وذلك عند قضاء إجازته السنوية. وإذا لم تؤمن له وسائل النقل فيمنح تذاكر سفر بالطائرة بالدرجة السياحية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (30)
  article_text_ar: يعين الطالب المتخرج بنجاح من الكلية برتبة ملازم وفقًا لنظام خدمة الضباط، وتحدد اللائحة الداخلية الدرجة العلمية أو الدبلوم أو الشهادة التي تمنح للمتخرج وفقًا لمدة الدراسة والمستوى العلمي الذي تلقاه في الكلية وقبلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (31)
  article_text_ar: مدة الدراسة في الكلية ثلاث سنوات ولا تقل السنة الدراسية عن خمسة وعشرين أسبوعًا ويجوز تخفيض مدة الدراسة إذا اقتضت الضرورة ذلك أو زيادتها بقرار من المجلس الأعلى وموافقة الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (32)
  article_text_ar: تحدد اللائحة الداخلية نظام الدراسة والامتحانات وتقييم الطلاب ومنحهم رتبًا فخرية داخل الكلية واعتماد النتائج ومنح الشهادات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (33)
  article_text_ar: يلتزم الطالب بالواجبات ويمتنع عن الأعمال المحظورة على الضباط. ويطبق عليه نظام العقوبات العسكري فيما يتعلق بالجنايات العسكرية الكبرى. كما توضح اللائحة الداخلية واجبات الطلاب داخل الكلية وإجراءات تأديبهم والجزاءات الإدارية التي توقع عليهم وصلاحية فرضها.وتشمل هذه الجزاءات التوبيخ والإنذار والحسم من الراتب والتوقيف والطرد من الكلية ويصدر قرار الطرد من مجلس الكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (34)
  article_text_ar: 'يفصل الطالب بقرار من مجلس الكلية لأي سبب من الأسباب التالية مؤيدًا بالوثائق الرسمية: أ) عدم اللياقة الطبية خلال مدة الدراسة.ب) عند رسوب الطالب سنتين متتاليتين خلال سنوات الدراسة. ويجوز لمجلس الكلية منح فرصة ثالثة لطالب المرحلة النهائية، ولا تحتسب من سنوات الرسوب السنة التي تخلف فيها الطالب عن الامتحان النهائي لعذر يقره مجلس الكلية. ج) إذا ثبت عدم صلاحيته كضابط لضعف كفاءته وشخصيته بناء على التقارير الواردة من قادته بالتسلسل القيادي. د) إذا تخلف الطالب مدة تزيد عن خمسة عشر يومًا متتالية بدون عذر يقبله مجلس الكلية. هـ) إذا قدم الطالب طلبًا بإعفائه من مواصلة دراسته لعذر يقبله مجلس الكلية. و) إذا فقد الطالب أحد شروط القبول المنصوص عليها في المادة (15) من هذا النظام أثناء مدة دراسته. ز) أي سبب آخر يقره المجلس الأعلى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (35)
  article_text_ar: لقائد الكلية منح إجازة نهاية السنة الدراسية وتصرف للطلبة خلالها الرواتب الشهرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (36)
  article_text_ar: لقائد الكلية منح إجازة عرضية للطالب لا تتجاوز مدتها عشرة أيام في السنة الدراسية وتعطى كاملة أو مجزأة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (37)
  article_text_ar: يستحق الطالب إجازة مرضية تحددها اللائحة الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (38)
  article_text_ar: يجتمع قادة الكليات الخاضعة لهذا النظام على هيئة لجنة يرأسها أقدمهم رتبة مرة في السنة على الأقل لبحث الشئون المشتركة والتعديلات المقترحة للنظام والاتفاق على المواد العامة والمالية المشتركة في اللوائح الداخلية بما يضمن تنسيق العمل في الكليات وتماثل المزايا المالية الممنوحة للعاملين في الكلية والطلاب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (39)
  article_text_ar: للوزير أن يفوض من يراه بممارسة بعض صلاحياته المنصوص عليها في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (40)
  article_text_ar: لمجلس الوزراء تفسير هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
- article_ref: المادة (41)
  article_text_ar: يلغي هذا النظام ما يتعارض معه من الأنظمة والتعليمات السابقة ويعمل به من تاريخ نشره في الجريدة الرسمية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e36e899b-f29b-4db0-8b71-a9a700f23065/1
  verified: false
