  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم- المعاني المبينة أمامها، ما لم يقتض السياق خلاف ذلك:المركز : المركز السعودي لزراعة الأعضاء.المجلس : مجلس الخدمات الصحية.المدير العام : مديرعام المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية العامة والاستقلال المالي والإداري ويرتبط تنظيمياً بالمجلس، ويكون مقره مدينة الرياض، وله أن ينشئ فروعاً داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'مهمات المركز واختصاصاته هي: 1 - تسجيل مرضى الفشل العضوي، والمرضى المزروع لهم، والمتبرعين بالأعضاء، ومتابعتهم، ووضع الإجراءات اللازمة لذلك. 2 - استقبال بلاغات حالات الوفاة الدماغية للأشخاص في وحدات العناية المركزة، ومتابعة هذه الحالات، وتنسيق استئصال الأعضاء - بعد الحصول على الموافقات اللازمة – وتوزيعها على مراكز الزراعة في مختلف المنشآت الصحية بالمملكة.3 - التنسيق مع الجهات المعنية لإيصال الفرق الطبية إلى مختلف المناطق في المملكة وخارجها، لاستئصال الأعضاء من الحالات المشار إليها في الفقرة (2) من هذه المادة، وزراعتها للمرضى.4 - التعاون والتنسيق مع الجهات الصحية في مجال زراعة الأعضاء، داخل المملكة وخارجها.5 - اقتراح الإجراءات اللازمة لزراعة الأعضاء من المتبرعين الأحياء، وفقاً للضوابط الشرعية لإقرارها من المجلس. 6 - إعداد المعايير والمواصفات والشروط والضوابط الخاصة لزراعة الأعضاء في المملكة ؛ تمهيداً لإقرارها من المجلس. 7 - مراقبة برامج زراعة الأعضاء فنيًّا ومتابعتها، وتقويم منشآت زراعة الأعضاء بشكل دوري، ومتابعتها مع جهة الاختصاص. 8 - اقتراح اللوائح الإدارية والمالية لمنسوبي
    المركز والباحثين والمتعاونين معه، ورفعها إلى المجلس لاعتمادها.9 - عقد الدورات والمؤتمرات، وبرامج التعليم والتدريب، في مجال الفشل العضوي وزراعة الأعضاء والتبرع بها على المستوى المحلي والعالمي، وعقد البرامج التأهيلية. 10 - تقديم برامج التوعية والتثقيف الصحي، في مجال الفشل العضوي وزراعة الأعضاء والتبرع بها للمجتمع.11 - إصدار مجلة علمية متخصصة في مجال زراعة الأعضاء حول الفشل العضوي والتبرع بالأعضاء وزراعتها.12 - القيام بالأبحاث العلمية المتعلقة بزراعة الأعضاء والفشل العضوي، والمشاركة فيها داخل المملكة وخارجها.13 - التعاون مع الجمعيات الخيرية لرعاية مرضى الفشل العضوي.14 - القيام بأي مهمة أخرى يكلفه بها المجلس ضمن اختصاصه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للمركز مدير عام يعينه المجلس، ويعد المسؤول التنفيذي للمركز وفقاً للاختصاصات والصلاحيات المحددة له، وله على وجه خاص ما يأتي: 1 - تعيين موظفي المركز وفقاً لما ورد في المادة (السابعة) من هذا التنظيم. 2 - تشكيل اللجان الفنية والإدارية اللازمة لأعمال المركز، ومتابعتها.3 - رفع تقارير سنوية عن سير أعمال المركز ومنجزاته ونشاطاته إلى المجلس.4 - إعداد خطة إستراتيجية للمركز، وعرضها على المجلس لاعتمادها. 5 - إعداد الميزانية التشغيلية للمركز، وعرضها على المجلس لاعتمادها.6 - تطوير مؤشرات لقياس الأداء.7 - تمثيل المركز أمام الجهات العامة والخاصة وفق الأصول الإدارية المتبعة في كل ما من شأنه تسهيل مهمات المركز وله الحق بالإنابة.8 - أي مهمة أخرى يرى المجلس تكليفه بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1 - يكون للمركز ميزانية سنوية ملحقة بميزانية المجلس. 2 - تتكون موارد المركز من الآتي : أ - الاعتمادات التي تخصص له في ميزانية الدولة.ب - المقابل المالي الذي يحصل عليه عن الخدمات التي يقدمها، مثل ممارسة النشاطات التدريبية وما في حكمها، التي تدخل ضمن اختصاصاته.ج - الهبات، والتبرعات، والأوقاف، والمساعدات والمنح، والوصايا، والإعانات الأخرى التي يقبلها، بما لا يتعارض مع القواعد والأنظمة والتعليمات النافذة في المملكة. 3 - تودع إيرادات المركز المنصوص عليها في (ب) و(ج) من الفقرة (2) من هذه المادة في أحد البنوك المحلية، ويصرف منها وفقاً للقواعد والإجراءات التي يحددها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يتولى مراجعة حسابات المركز محاسب قانوني خارجي، ويرفع تقريراً سنوياً في شأنها إلى المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يطبق نظام العمل ونظام التأمينات الاجتماعية على جميع منسوبي المركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يرفع المدير العام - خلال تسعين يوماً من بداية كل سنة مالية - تقريراً إلى المجلس عما حققه المركز من إنجازات، وما يواجهه من صعوبات، وما يراه من مقترحات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يصدر المجلس القرارات اللازمة لتنفيذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من اليوم التالي لنشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a9cc4c-61cb-4053-8fe5-a9a700f28d1a/1
  verified: false
