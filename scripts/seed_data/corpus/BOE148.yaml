articles:
- article_ref: 'المادة الأولى: تعريفات'
  article_text_ar: 'يقصد بالمصطلحات الآتية أينما وردت في هذا النظام المعاني الموضحة أمامها ما لم يقتضِ السياق خلاف ذلك : المشترك : كل من لديه خدمة خاضعة لنظام التقاعد المدني أو لنظام التقاعد العسكري أو لنظام التأمينات الاجتماعية . مدة الاشتراك : المدة المحسوبة بموجب أحد الأنظمة المشار إليها. المكافأة : مبلغ مقطوع يصرف دفعة واحدة للمشترك نظير مدة اشتراكه إذا لم تؤهله للحصول على معاش حسب النظام الذي قضيت في ظله. النظام الأول : نظام التقاعد المدني أو نظام التقاعد العسكري أو نظام التأمينات الاجتماعية الذي كان المشترك خاضعًا له قبل أن ينتقل إلى عمل خاضع للنظام الأخير. النظام الأخير : نظام التقاعد المدني أو نظام التقاعد العسكري أو نظام التأمينات الاجتماعية الذي انتقل المشترك لعمل خاضع له وانتهت خدمته في ظله. النظامان : نظام التقاعد (المدني أو العسكري) ونظام التأمينات الاجتماعية . الجهة المختصة : المؤسسة العامة للتقاعد أو المؤسسة العامة للتأمينات الاجتماعية حسب الحال. ضم المدد : الخيار الذي يمنح للمشترك لضم مدة اشتراكه السابقة التي قضاها في ظل النظام الأول. التاريخ المحدد : تاريخ نفاذ هذا النظام.
    القيمة المحولة : القيمة المحددة بموجب المادة الرابعة من هذا النظام. القيمة الاكتوارية : القيمة الحالية للمبالغ المؤجل صرفها للمشترك والتي يتم احتسابها وفقًا للجداول الاكتوارية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae482429-33b8-4e3f-a3ae-a9a700f23d5c/1
  verified: false
- article_ref: 'المادة الثانية: حق  المشترك  في ضم مدد الاشتراك'
  article_text_ar: 1- يجوز للمشترك الخاضع للنظام الأخير وله مدة اشتراك سابقة عومل خلالها بالنظام الأول أن يطلب ضم تلك المدة إلى مدة اشتراكه في النظام الأخير.2- إذا عاد المشترك مرة أخرى إلى عمل خاضع للنظام الأول بعد انتهاء عمله الخاضع للنظام الأخير، فإن النظام الذي عاد للعمل في ظله من جديد يعد نظاماً أخيراً أيضاً في مجال تطبيق هذا النظام بالنسبة للمدة الأخيرة.3- للمشترك الحق في طلب الضم طبقاً لأحكام الفقرتين السابقتين ولو كانت مدة اشتراكه في ظل النظامين قد انتهت قبل نفاذ هذا النظام، إذا توافرت لديه الشروط المنصوص عليها في المادة الثالثة من هذا النظام.4- لا يخل هذا النظام بالحقوق التي اكتسبها المشترك (الذي اختار الضم) في النظام الأول في حال عدم استحقاقه معاشاً وفقاً للنظام الأخير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae482429-33b8-4e3f-a3ae-a9a700f23d5c/1
  verified: false
- article_ref: 'المادة الثالثة: شروط ضم مدد الاشتراك'
  article_text_ar: 1- ألا يكون المشترك قد تسلم مكافأة أو معاشا طبقا للنظام الأول عن مدة اشتراكه المطلوب ضمها. 2 - ألا تقل مدة الاشتراك في النظام الأول عن سنة. 3 - ألا يزيد عمر المشترك على 59 عاما عند طلب الضم. 4 - ألا يكون المعاش في النظام الأول قد استحق بسبب العجز. 5 - المشترك الذي لا يزال على رأس العمل وقت نفاذ هذا النظام وكذلك المشترك الذي انتهت مدد اشتراكه في النظامين قبل التاريخ المحدد يحق له أن يبدي رغبته في ضم مدد اشتراكه في النظام الأول إلى مدد اشتراكه في النظام الأخير خلال سنتين من تاريخ نفاذ هذا النظام، كما يحق للمشترك الذي يلتحق بالعمل بعد نفاذ هذا النظام أن يطلب ضم مدد الاشتراك في النظام الأول إلى مدد اشتراكه في النظام الأخير خلال سنتين من تاريخ التحاقه بالعمل في النظام الأخير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae482429-33b8-4e3f-a3ae-a9a700f23d5c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'أولاً : التزامات النظام الأول : القيمة الاكتوارية الواجب تحويلها : عند انتهاء خدمة المشترك في النظام الأخير، وكان قد سبق له أن أبدى رغبته في الضم، وتقرر له معاش تقاعدي من النظام الأخير، يتم حساب القيمة الاكتوارية عن مدة اشتراكه المحسوبة بموجب النظام الأول وفقًا للجداول الاكتوارية (1، 2، 3) المرفقة بهذا النظام والأحكام الملحقة بكل منها حسب الحال، ويتم حساب هذه القيمة على أساس ما يأتي : 1 - الراتب الأخير في النظام الأول إذا كان نظام التقاعد المدني أو العسكري، وعلى أساس متوسط أجر الاشتراك الذي يحسب على أساسه المعاش إذا كان نظام التأمينات الاجتماعية. 2 - المدة المحسوبة بموجب النظام الأول التي يتم ضمها إلى المدة المحسوبة في النظام الأخير. 3 - تحسب القيمة الاكتوارية المشار إليها على أساس أنها مستحقة الدفع إلى النظام الأخير في تاريخ استحقاق استلام المعاش عند انتهاء الخدمة في النظام الأخير، فإذا كان الفرق بين تاريخ استحقاق استلام المعاش والتاريخ الفعلي لتحويل القيمة المحولة إلى النظام الأخير يبلغ ثلاثين يومًا أو يزيد، تضرب القيمة المحولة في المعامل المستخرج من الجدول رقم (4)
    المرفق، ويكون الناتج هو القيمة الواجب تحويلها، وعلى النظام الأخير مطالبة النظام الأول خلال ثلاثين يومًا من تاريخ علمه بالاستحقاق، وتحدد اللوائح التنفيذية الوسائل الملائمة لإثبات العلم بالاستحقاق. ثانياً : التزامات النظام الأخير: المعاش التقاعدي عن المدتين : 1 - مع عدم الإخلال بالفقرة (6) من المادة الثالثة من هذا النظام، تضم المدد المحسوبة بموجب النظام الأول كاملة، وتعد مع المدة المحسوبة بموجب النظام الأخير وكأنها قضيت جميعها في النظام الأخير، وتسوى الاستحقاقات عنها على أساس ما يقضي به هذا النظام من أحكام بمراعاة حكم الفقرة (2) التالية. 2 - إذا كان نظام التأمينات الاجتماعية هو النظام الأخير، وتبين أن متوسط الأجر الذي يقدر على أساسه المعاش وفق أحكامه يزيد على الراتب الأخير في النظام الأول مضروباً في المعامل المحدد بموجب الجدول رقم (5) المرفق، فإنه يحسب المعاش المستحق عن المدتين على النحو الآتي :'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae482429-33b8-4e3f-a3ae-a9a700f23d5c/1
  verified: false
- article_ref: 'المادة الخامسة: المتابعة المالية وفحص المركز المالي'
  article_text_ar: مع مراعاة الأحكام الخاصة بالمتابعة المالية وفحص المركز المالي الواردة في الدراسة الاكتوارية التي تم على أساسها إعداد الجداول الاكتوارية المرفقة، يتم تحديد الوسائل الملائمة لتعويض النظامين عن الكلفة الإضافية التي قد تترتب على الأخذ بنظام تبادل المنافع، بما في ذلك أسلوب توزيع الأعباء، وذلك من خلال دراسة اكتوارية تتم كل ثلاث سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae482429-33b8-4e3f-a3ae-a9a700f23d5c/1
  verified: false
- article_ref: 'المادة السادسة: أحكام عامة'
  article_text_ar: '1 - تعد الجداول الاكتوارية المرفقة والأحكام الملحقة بها جزءا متمما لهذا النظام . 2 - يتم التنسيق بين الجهتين المختصتين في تبادل المعلومات عن المشتركين والبيانات المتعلقة بهم، وتحديد الوثائق التي يجب على المشترك تقديمها، والجهة التي يتقدم إليها بطلب الضم. 3 - تكوين لجنة من كل من المؤسسة العامة للتأمينات الاجتماعية ، والمؤسسة العامة للتقاعد ، يمثل كل جهة ثلاثة أعضاء يختارهم الوزير المشرف على الجهة، على أن يكونوا من أعضاء مجلس الإدارة أو من كبار العاملين بها، وتكون مهمة اللجنة مباشرة الاختصاصات الآتية : أ - تطبيق أحكام هذا النظام. ب - التنسيق بين الجهتين المختصتين كلما اقتضى الأمر ذلك. ج - اقتراح اللائحة التنفيذية لهذا النظام. وتتولى كل من الجهتين المختصتين رئاسة اللجنة بالتناوب فيما بينهما عن طريق أحد ممثليها في اللجنة يختاره الوزير لمدة ثلاث سنوات، وتصدر قرارات اللجنة بالأغلبية، وعند التساوي يرجح الجانب الذي منه رئيس اللجنة، ويتفق الوزيران على من يتولى رئاسة اللجنة في دورتها الأولى. 4 - يراجع هذا النظام والدراسات الاكتوارية عن التكاليف المالية التي قد يتحملها أي من النظامين
    كلما اقتضى الأمر عن طريق لجنة يرأسها الأمين العام لمجلس القوى العاملة، ويشارك فيها ممثلون لكل من وزارات : المالية، والعمل، والشؤون الاجتماعية، والخدمة المدنية، والمؤسسة العامة للتقاعد ، والمؤسسة العامة للتأمينات الاجتماعية ، وذلك للتحقق من مدى ملاءمة هذا النظام والالتزامات المترتبة عليها معالجتها وما قد تحتاجه من تعديلات، وتعرض نتائج المراجعة على رئيس مجلس القوى العاملة ؛ ليرفعها إلى مجلس الوزراء مشفوعة بتوصياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ae482429-33b8-4e3f-a3ae-a9a700f23d5c/1
  verified: false
