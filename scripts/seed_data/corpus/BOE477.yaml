regulation:
  code: BOE477
  name_ar: تنظيم مؤسسة البريد السعودي
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتض السياق خلاف ذلك : المملكة : المملكة العربية السعودية. المؤسسة : مؤسسة البريد السعودي . الوزير : وزير البرق والبريد والهاتف . المجلس : مجلس إدارة المؤسسة. الرئيس : رئيس المؤسسة. عضو المجلس : عضو مجلس إدارة المؤسسة. النظام : نظام البريد. التنظيم : تنظيم مؤسسة البريد السعودي .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: '1- تنشأ بموجب هذا التنظيم مؤسسة عامة تسمى: ( مؤسسة البريد السعودي ) تتمتع بالشخصية الاعتبارية وبالذمة المالية المستقلة ، ويكون مقرها الرئيسي مدينة الرياض، ولها إنشاء فروع ومكاتب لأداء مهامها.2- تعمل المؤسسة على أسس تجارية وتتمتع بالمرونة والصلاحيات التي تمكنها من القيام بمهامها، وذلك وفقا للوائحها الداخلية والمالية والإدارية المنصوص عليها في هذا التنظيم وبما يهيؤها للتخصيص في مرحلة لاحقة.3- تقوم المؤسسة بتطوير أساليب حديثة لقبول البريد وجمعه ومعالجته ونقله وتوزيعه بما يضمن وصوله إلى المرسل إليهم خلال فترة معقولة وفقاً للمعايير الدولية المتعارف عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تتولى المؤسسة القيام بمهامها ومسئولياتها وفق النظام والأحكام الواردة في تنظيمها ولوائحها، ولها على وجه الخصوص ما يأتي: 1 - تقديم الخدمات البريدية . 2 - تقديم الخدمات البريدية المالية . 3 - تقديم أي خدمات أخرى تدخل في اختصاصها. 4 - حضور اجتماعات المنظمات والاتحادات الإقليمية والدولية المعنية بشؤون البريد بعد التنسيق مع وزارة البرق والبريد والهاتف . 5 - إنشاء شركات تابعة لها، والمساهمة في تأسيس شركات تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها، أو المشاركة فيها. 6 - الاتفاق مع غيرها على أداء خدمات بريدية لحسابها بموجب عقود تبرم لهذا الغرض، ولها الاستعانة بشركات النقل في أداء مهامها المتعلقة بنقل البريد. 7 - القيام بأي مهام أخرى تتفق مع طبيعة عملها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تصدر المؤسسة وفقا للنظام الطوابع البريدية المعتادة والتذكارية، وتحدد فئاتها، وكذلك علامات التخليص البريدي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمؤسسة مجلس إدارة برئاسة الوزير، وعضوية كلٍ من: 1 - رئيس المؤسسة، ويكون نائباً لرئيس المجلس.2 - ممثل من وزارة البرق والبريد والهاتف . 3 - ممثل من وزارة المالية والاقتصاد الوطني . 4 - ممثل من وزارة التجارة. 5 - ممثل من مؤسسة النقد العربي السعودي . ويراعى ألا تقل مراتبهم عن الرابعة عشرة.6 - ثلاثة أعضاء من القطاع الخاص يرشحهم الوزير، ويصدر بتعيينهم قرار من مجلس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للمؤسسة، ويشرف على إدارتها وتصريف أمورها، وله في سبيل ذلك أوسع السلطات، وعلى وجه الخصوص الصلاحيات الآتية: 1 - تحديد الأهداف ووضع السياسة العامة التي تسير عليها المؤسسة لتحقيق أغراضها، وتحديد البرامج اللازمة لذلك، والإشراف على تنفيذها.2 - اعتماد اللوائح الداخلية والإدارية للمؤسسة.3 - إصدار اللوائح المالية للمؤسسة بالتنسيق مع وزارة المالية والاقتصاد الوطني . 4 - إقرار الهيكل التنظيمي للمؤسسة ولائحة العاملين فيها، واعتماد سلم رواتب منسوبي المؤسسة.5 - إقرار مشروع خطة عمل المؤسسة وخططها التشغيلية في إطار الخطة العامة للدولة.6 - إقرار مشروع ميزانية المؤسسة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي ، تمهيدا لرفع ذلك حسب الإجراءات النظامية المتبعة.7 - الموافقة على إبرام العقود بأنواعها التي تتجاوز قيمتها الصلاحيات المحددة للمسئولين في المؤسسة وتفويض من يراه بتوقيعها.8 - وضع القواعد التي تكفل سير العمل في المؤسسة على أسس تجارية تنافسية سعيا لبلوغ المؤسسة الاعتماد على مواردها الذاتية.9 - اقتراح المقابل المالي الذي تتقاضاه المؤسسة عن أي عمل أو
    خدمة تقدمها لاعتماده وفقا للنظام.10 - وضع الشروط والإجراءات الخاصة بفتح حسابات الادخار البريدي، وإصدار الحوالات البريدية ، والخدمات البريدية المالية الأخرى التي يسمح بها النظام، وتحديد المقابل المالي لها وفقا للأنظمة.11 - الموافقة على شراء العقارات وبيعها واستثمارها بما يحقق أغراضها.12 - دراسة ما يحيله الوزير إلى المؤسسة من الاتفاقيات البريدية لإبداء الرأي حيالها.13 - تشكيل اللجان وتخويلها الصلاحيات اللازمة لإنجاز المهام المنوطة بها.14 - تفويض الرئيس بعض الصلاحيات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- تعقد اجتماعات المجلس في المقر الرئيسي للمؤسسة، ويجوز انعقاد المجلس في أي مكان آخر من المملكة.2- يجتمع المجلس بدعوة من رئيسه مرة واحدة على الأقل كل ثلاثة أشهر، أو كلما دعت الحاجة إلى ذلك، أو إذا طلب ذلك خمسة من أعضاء المجلس على الأقل. ويجب أن تشتمل الدعوة على جدول الأعمال، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم رئيس المجلس أو نائبه. وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الجلسة.3- للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بخبراتهم ومعلوماتهم، دون أن يكون لهم حق التصويت.4- لا يجوز لعضو المجلس تفويض شخص آخر للتصويت عنه عند غيابه، ولعضو المجلس المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر قرارات المجلس.5- تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس المجلس وأمين المجلس.6- يكون للمجلس أمين من بين منسوبي المؤسسة يختاره رئيس المجلس، يتولى سكرتارية المجلس والإعداد للاجتماعات وتسجيل المداولات والقرارات وإبلاغها للجهات المعنية.7- لا يجوز لعضو المجلس أن يفشي شيئا مما وقف عليه من أسرار المؤسسة بسبب عضويته
    في المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمؤسسة رئيس بالمرتبة الممتازة، يعين بأمر ملكي بناء على ترشيح الوزير، وهو المسئول التنفيذي عن إدارة المؤسسة، وتتركز مسئولياته في حدود ما ينص عليه هذا التنظيم، وما يقرره المجلس، ويمارس الرئيس بوجه خاص الصلاحيات والمهام الآتية: 1 - الإشراف على الإعداد لاجتماع المجلس.2 - متابعة تنفيذ القرارات الصادرة عن المجلس.3 - تمثيل المؤسسة في صلاتها بغيرها من الجهات وأمام القضاء، وله تفويض غيره بذلك.4 - تعيين العاملين في المؤسسة والإشراف عليهم طبقا للوائح المؤسسة.5 - اقتراح مشاريع اللوائح والقرارات التنفيذية الخاصة بسير العمل في المؤسسة وعرضها على المجلس.6 - الإشراف على إعداد مشروع ميزانية المؤسسة ومشروع الحساب الختامي والتقرير السنوي ورفعها للمجلس.7 - إصدار الأوامر بمصروفات المؤسسة بموجب الميزانية السنوية المعتمدة ولوائح المؤسسة ذات العلاقة.8 - تقديم تقارير دورية للمجلس عن أعمال المؤسسة ومنجزاتها ونشاطها.9 - اقتراح خطط المؤسسة وبرامجها والإشراف على تنفيذها، بعد موافقة المجلس عليها.ولرئيس المؤسسة تفويض بعض هذه الصلاحيات إلى المسئولين في المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون أموال المؤسسة من: 1 - الإيرادات التي تحققها من ممارسة نشاطها.2 - الأموال التي تخصصها لها الدولة.3 - الأصول الثابتة والمنقولة الواقعة تحت تصرف وزارة البرق والبريد والهاتف ( المديرية العامة للبريد ) وكذلك جميع الأموال المستخدمة في المديرية العامة للبريد وحقوقها والتزاماتها في مواجهة غيرها وقت نفاذ هذا التنظيم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- تكون للمؤسسة ميزانية مستقلة.2- السنة المالية للمؤسسة هي السنة المالية للدولة ، واستثناء من ذلك تبدأ السنة المالية الأولى للمؤسسة من تاريخ نفاذ هذا التنظيم.3- تودع أموال المؤسسة في حساب مستقل لدى مؤسسة النقد العربي السعودي ، يصرف منه طبقا للوائح المالية للمؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: باستثناء الرئيس، تطبق أحكام نظام العمل، وأحكام نظام التأمينات الاجتماعية على منسوبي المؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعامل المؤسسة من حيث إعفاء مستورداتها من الرسوم الجمركية بحسب القواعد المتبعة بشأن مستوردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المؤسسة؛ يعين المجلس مراجع حسابات خارجي أو أكثر من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابهم، وإذا تعدد مراجعو الحسابات فإنهم يكونون مسئولين بالتضامن عن أعمالهم أمام المؤسسة، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يلتزم جميع المستفيدين من خدمات المؤسسة بسداد مستحقاتها، وتستوفي المؤسسة المقابل المالي للخدمات التي تقدمها من جميع المستفيدين من خدماتها قبل تقديم الخدمة لهم، ويجوز لها أن تستوفي مستحقاتها من كبار المستفيدين من الخدمة بموجب قوائم حساب دورية. كما يجوز لها أن تمنح خصما خاصا لكبار المستفيدين من الخدمة والوكالات البريدية نظير قيامهم بمعالجات أولية للبعائث البريدية من شأنها تسهيل مهمة المؤسسة وعملها. وعلى المؤسسة أن تضع في مكان واضح للجمهور في المكاتب البريدية التابعة لها مقدار المقابل المالي المستحق لها على الخدمات البريدية التي تقدمها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يلغي هذا التنظيم كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به بعد 180 يوما من تاريخ نشره، باستثناء الأحكام المتعلقة بتشكيل مجلس الإدارة واختصاصاته، فتعد نافذة من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0041fa37-4a6d-4b68-a9ab-a9a700f2e88f/1
  verified: false
