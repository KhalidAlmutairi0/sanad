regulation:
  code: BOE125
  name_ar: نظام رسوم الأراضي البيضاء والعقارات الشاغرة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها ، ما لم يقتض السياق خلاف ذلك : الوزير : وزير الإسكان. الوزارة : وزارة الإسكان. النظام : نظام رسوم الأراضي البيضاء. اللائحة : اللائحة التنفيذية للنظام. الأراضي البيضاء : كل أرض فضاء مخصصة للاستخدام السكني ، أو السكني التجاري؛ داخل حدود النطاق العمراني. حدود النطاق العمراني : الخطوط المبينة بخرائط وثائق النطاق العمراني التي توضح مراحل التنمية العمرانية المختلفة ، وحد حماية التنمية ، وتمثل الحدود الملائمة لتوطين الأنشطة الحضرية ، واستيعاب النمو العمراني خلال فترة زمنية محددة. المرافق العامة : شبكات الطرق والمياه والكهرباء والهاتف والصرف الصحي وتصريف السيول. الخدمات العامة : الخدمات الدينية والتعليمية والصحية والأمنية ونحوها؛ التي لا تشملها النسبة النظامية للتخطيط.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف هذا النظام إلى الآتي : 1 - زيادة المعروض من الأراضي المطورة بما يحقق التوازن بين العرض والطلب.2 - توفير الأراضي السكنية بأسعار مناسبة.3 - حماية المنافسة العادلة ، ومكافحة الممارسات الاحتكارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يفرض رسم سنوي على الأراضي البيضاء ، المملوكة لشخص أو أكثر من ذوي الصفة الطبيعية أو الصفة الاعتبارية غير الحكومية ، بنسبة (2.5%) من قيمة الأرض ، وتحدد اللائحة معايير تقدير قيمة الأرض والجهة التي تتولى ذلك ، على أن تشمل المعايير موقع الأرض، واستخداماتها ، ونظم البناء ، ومعامل توافر الخدمات العامة فيها ووصول المرافق العامة إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تحدد اللائحة ما يأتي : 1 - البرنامج الزمني لتطبيق الرسم بشكل تدريجي.2 - معايير تحديد الأراضي التي تخضع لتطبيق الرسم.3 - المعايير التي يتوقف عند تحققها تطبيق الرسم.4 - الضوابط اللازمة لضمان تطبيق الرسم بعدالة ، ومنع التهرب من دفعه.5 - آلية تحديد معامل توافر الخدمات العامة للأراضي ووصول المرافق العامة إليها.6 - معايير تحديد العوائق التي تحول دون صدور التراخيص والموافقات اللازمة لتطوير الأرض أو بنائها ، والتي يعتد بها في تقرير عدم تطبيق الرسم عليها.7 - قواعد وإجراءات تحصيل الرسم ، وتحديد الجهات المخولة بتحصيله.8 - آليات تبليغ مالك الأرض بالقرارات الصادرة في حقه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1 - على ملاك الأراضي التي يعلن عن اعتبارها ضمن الأراضي الخاضعة لتطبيق الرسم؛ التقدم إلى الوزارة بالوثائق والبيانات المتعلقة بأراضيهم ، وذلك خلال مدة لا تتجاوز (ستة) أشهر من تاريخ الإعلان.2 - يبلغ مالك الأرض بالقرار الصادر بخضوع الأرض التي يملكها لتطبيق الرسم ، ومقدار الرسم المستحق عليه ، وفقاً لآليات التبليغ المحددة في اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعاقب كل من يخالف أحكام النظام واللائحة بغرامة مالية لا تزيد على مقدار الرسم المستحق على أرضه ، ولا يخل ذلك بإلزامه بسداد الرسم المستحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تكون بقرار من الوزير لجنة أو أكثر من ثلاثة أعضاء - على الأقل - على أن يكون من بينهم مستشار نظامي ومختص في الجانب الفني؛ للنظر في مخالفات أحكام النظام واللائحة ، وتطبيق العقوبات ، والاعتراضات التي تقدم من ذوي الشأن ، وإصدار القرارات اللازمة ، ويجوز التظلم من قراراتها أمام المحكمة الإدارية المختصة. وتصدر قواعد عمل اللجنة وإجراءاتها بقرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: لمالك الأرض حق الاعتراض على القرارات الصادرة بإخضاع أرضه لتطبيق الرسم ، أو بتقدير قيمة الأرض وتحديد الرسم ، ويقدم الاعتراض كتابة إلى اللجنة المنصوص عليها في المادة (السابعة) من النظام خلال ستين يوماً من تاريخ إبلاغه بالقرار ، وعلى اللجنة أن تبت في هذا الاعتراض خلال ستين يوماً من تاريخ تقديمه إليها ، ويعد مضي ستين يوماً دون البت في الاعتراض بمثابة صدور قرار برفضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تتولى الوزارة - بالتنسيق مع الجهات ذات العلاقة - تطبيق أحكام النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تتولى الوزارة - بالتنسيق مع الجهات ذات العلاقة - إنشاء قاعدة بيانات تتضمن المعلومات المتعلقة بتطبيق الرسم. وللجهات المعنية صلاحية الاطلاع على قاعدة البيانات لأغراض تطبيق الرسم ، وتحصيله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تودع مبالغ الرسوم والغرامات المستحصلة في حساب خاص لدى مؤسسة النقد العربي السعودي ، يخصص للصرف على مشروعات الإسكان ، وإيصال المرافق العامة إليها ، وتوفير الخدمات العامة فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تقوم الوزارة - بالتنسيق مع وزارة الثقافة والإعلام وغيرها من الجهات ذات العلاقة - باتخاذ ما يلزم للتوعية بأحكام النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تعد الوزارة - بالتنسيق مع وزارات : (العدل ، والمالية ، والشؤون البلدية والقروية ، والاقتصاد والتخطيط ، والتجارة والصناعة) - اللائحة ، وتصدر بقرار من مجلس الوزراء خلال مائة وثمانين يوماً من تاريخ صدور النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكلف مجلس الوزراء من يراه بمراجعة نتائج البرنامج الزمني لتطبيق الرسم ، واقتراح ما يراه مناسباً في شأنها ، ورفع تقرير سنوي بذلك للمجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعمل بهذا النظام بعد مائة وثمانين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6932e745-0f61-4f25-9e4a-a9a700f21d6b/1
  verified: false
