- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: الوزير: وزير الاتصالات وتقنية المعلومات. الوكالة: وكالة الفضاء السعودية. الهيئة: هيئة الاتصالات والفضاء والتقنية. التنظيم: تنظيم الوكالة. المجلس: مجلس إدارة الوكالة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الوكالة بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة أو خارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الوكالة إلى قيادة تطوير قطاع الفضاء المدني، وتعزيز الاستخدام السلمي للفضاء، وتعزيز مكانة المملكة بصفتها مركزًا إقليميًّا ودوليًّا رائدًا في مجال علوم الفضاء وتقنياته، والإسهام في خدمة القطاعات التنموية والحيوية في المملكة، وامتلاك المعرفة الخاصة بقطاع الفضاء المدني، ولها -دون إخلال باختصاصات الجهات الحكومية الأخرى- القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: تصنيع وتطوير ما يتصل بالأنشطة الخاصة بقطاع الفضاء المدني والداعمة والمعززة له، ومن ذلك: تقنيات الأقمار الصناعية ونظمها، والبيانات الفضائية، وإطلاق المركبات والأجسام الفضائية، ومنصات الإطلاق، ومواقعها، وإطلاق الحمولات. رصد الفضاء، ورصد الحطام الفضائي والتخفيف من آثاره، وتتبع الأجسام والأجرام، وإدارة الحركة الفضائية، وإدارة أنظمة الإنذار المبكر، وجمع المعلومات عن سطح الأرض والفضاء. تنفيذ برامج وعمليات فضائية، وفق السياسات المعتمدة من المجلس الأعلى للفضاء. اختيار رواد فضاء وتدريبهم، والعمل على بناء قدرات الكوادر الوطنية وتنمية مهاراتها وخبراتها في مجال قطاع الفضاء المدني بالتعاون مع الهيئة والجهات
    ذات العلاقة. المشاركة في عمليات الإنقاذ والتحقيق في الحوادث والوقائع المتصلة بقطاع الفضاء المدني. إعداد ودعم الدراسات والبحوث المتصلة بقطاع الفضاء المدني، ومن ذلك: علوم الفلك واستكشاف الفضاء الخارجي، وأنشطة الموارد الفضائية، والاستشعار عن بُعد، والمسح الفضائي، ودراسة الظواهر الطبيعية والبيئية؛ وذلك بحسب الأنظمة والإجراءات المتبعة. التعاون مع المنظمات الإقليمية والدولية، والجهات المماثلة في الدول الأخرى، والجهات البحثية والاستشارية المحلية والإقليمية والدولية، في حدود اختصاصات الوكالة ووفقًا للإجراءات النظامية المتبعة. تمثيل المملكة في الهيئات والمنظمات الدولية والفعاليات الإقليمية والدولية ذات العلاقة باختصاصات الوكالة، بعد التنسيق مع الهيئة؛ وذلك وفقًا للإجراءات النظامية المتبعة. إقامة المعارض والمؤتمرات وورش العمل ذات الصلة باختصاصات الوكالة، وفقًا للإجراءات النظامية المتبعة. إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة بأنشطة الوكالة وفي حدود اختصاصاتها مع الجهات المماثلة لها في الدول الأخرى ومع المنظمات الدولية والإقليمية، وذلك بالتنسيق مع الهيئة وبحسب الإجراءات النظامية المتبعة. بناء
    الإمكانات البشرية والتقنية لتنمية قطاع الفضاء المدني في المملكة، وتطوير ونقل وتوطين علوم وتقنيات الفضاء، بما في ذلك تنفيذ أو دعم البنى التحتية لقطاع الفضاء المدني، والخدمات المتصلة بالأنشطة الفضائية، والأنشطة الأخرى الداعمة والمعززة للقطاع ودعم رواد الأعمال والشركات الناشئة العاملة في القطاع، وللوكالة في سبيل ذلك: أ- تأسيس الشركات بمفردها أو بالمشاركة مع الغير، وتأسيس الصناديق، أو الاستثمار من خلال شراء الأسهم أو الحصص أو الاندماج أو الاستحواذ على شركات أو كيانات تزاول أنشطة مماثلة أو شبيهة بنشاطها؛ داخل المملكة أو خارجها، بحسب الإجراءات النظامية. ب- شراء الأصول واقتناؤها وإبرام التصرفات في الممتلكات المنقولة وغير المنقولة، ولها تأجير تلك الممتلكات ورهنها، بحسب الإجراءات النظامية. جـ- الموافقة على إبرام الاتفاقات والعقود، بحسب الإجراءات النظامية. د- إنشاء مراكز البحوث والأكاديميات الداعمة لقطاع الفضاء المدني العمل على رفع الوعي بعلوم الفضاء وتقنياته واستخداماته، وذلك بالتنسيق مع الجهات ذات العلاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للوكالة مجلس إدارة برئاسة وزير الاتصالات وتقنية المعلومات، وعضوية كل من: محافظ هيئة الاتصالات والفضاء والتقنية (نائباً للرئيس). رئيس الهيئة العامة للطيران المدني. رئيس مدينة الملك عبد العزيز للعلوم والتقنية. ثلاثة من ذوي الخبرة والاختصاص في مجال عمل الوكالة، يعينون بأمر من رئيس مجلس الوزراء بناءً على اقتراح من الرئيس، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد لمرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على إدارة شؤون الوكالة وتصريف أمورها ورسم السياسة العامة لها في حدود أحكام التنظيم وغيره من الأنظمة ذات العلاقة، ويتخذ جميع القرارات اللازمة لتحقيق أغراضها، وله بوجه خاص ما يأتي: اقتراح السياسات المتعلقة بأنشطة الوكالة، والاستراتيجيات والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى الهيئة لاستكمال الإجراءات النظامية حيالها. اقتراح مشروعات الأنظمة المتعلقة بنشاط الوكالة، واقتراح تعديل المعمول به منها، ورفعها إلى الجهة ذات الاختصاص التنظيمي والرقابي لقطاع الفضاء تمهيدًا لاعتمادها وفق الإجراءات النظامية المتبعة. اعتماد الخطط والمتطلبات الفنية اللازمة لتنفيذ البنى التحتية لقطاع الفضاء وتشغيلها وتطويرها، بما فيها المحطات الأرضية، والأنشطة والتقنيات المتعلقة بالرحلات الفضائية. اعتماد السياسات والمعايير المتصلة بسلامة الأنشطة الفضائية والأمن الفضائي واستدامتها. إقرار هيكل الوكالة التنظيمي. إقرار اللوائح الإدارية والمالية، وغيرها من اللوائح اللازمة لتسيير عمل الوكالة، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية،
    وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. الموافقة على إنشاء فروع ومكاتب للوكالة داخل المملكة أو خارجها بحسب الحاجة. الموافقة على مشروع ميزانية الوكالة السنوية، وحسابها الختامي، وتقريرها السنوي؛ تمهيدًا لرفعها وفق الإجراءات النظامية. تحديد المقابل المالي لما تقدمه الوكالة من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها. الموافقة على الاستعانة بمراكز الدراسات والبحوث والتخطيط، وبيوت الخبرة، والخبراء والمستشارين، وذلك لتحقيق أهداف الوكالة. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقًا للأحكام المنظمة لذلك. النظر في التقارير الدورية التي تقدم إليه عن سير العمل في الوكالة. الموافقة على تأسيس الوكالة للشركات والصناديق ومراكز الأبحاث والأكاديميات الداعمة لقطاع الفضاء أو الإسهام فيها، وذلك وفقاً للإجراءات النظامية. وللمجلس -في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم،
    يوكل إليها ما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها، وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه أو إلى الرئيس التنفيذي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعقد اجتماعات المجلس في مقر الوكالة أو في أي مكان آخر أو عن بُعد، برئاسة الرئيس أو نائبه. يعقد المجلس اجتماعاته بصفة دورية (أربع) مرات في السنة على الأقل، وللرئيس الدعوة للاجتماع متى دعت الحاجة إليه، أو متى طلب ذلك (أربعة) على الأقل من أعضاء المجلس، وتُوَّجه الدعوة إلى الاجتماع من الرئيس أو نائبه كتابة قبل موعد الاجتماع بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول أعمال الاجتماع ومكانه. يكون اجتماع المجلس صحيحًا إذا حضره أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع، ويجوز اتخاذ قرارات المجلس عن طريق التمرير على الأعضاء. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. لا يجوز لعضو المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. يجوز للرئيس دعوة من يراه لحضور الاجتماعات دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للوكالة رئيس تنفيذي يعين بقرار من المجلس، ويحدد قرار التعيين أجره ومزاياه المالية، ويعد المسؤول عن إدارة شؤون الوكالة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويتولى الاختصاصات والمهمات الآتية: أ- الإشراف على سير العمل في الوكالة من خلال اللوائح والخطط والبرامج المعتمدة. ب- اقتراح سياسات العمل المتعلقة بنشاط الوكالة، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. ج- اقتراح الهيكل التنظيمي للوكالة، ومشروعات اللوائح الإدارية والمالية وغيرها من اللوائح الداخلية اللازمة لعمل الوكالة، ورفعها إلى المجلس لإقرارها. د- تعيين العاملين في الوكالة والإشراف عليهم وإنهاء خدماتهم، وفقًا لما تحدده اللوائح. هـ- إصدار الأوامر بمصروفات الوكالة وفقًا للميزانية السنوية المعتمدة ولوائح الوكالة، والتوقيع على العقود ومذكرات التفاهم وغيرها وفقًا لما يقرره المجلس. و- إعداد مشروع ميزانية الوكالة السنوية ومشروع حسابها الختامي وتقريرها السنوي، ورفعها إلى المجلس للموافقة عليها. ز- تمثيل الوكالة أمام القضاء ولدى الجهات الحكومية والمؤسسات
    والهيئات الأخرى ذات العلاقة وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. ح- إعداد التقارير الدورية عن سير عمل الوكالة وإنجازاتها، وعما يعوق تحقيق أهدافها، وتوصياته في هذا الشأن، ورفعها إلى المجلس. ط- تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاص الوكالة. ي- أي اختصاص آخر يسنده إليه المجلس أو لوائح الوكالة. للرئيس التنفيذي تفويض بعض اختصاصاته ومهماته وصلاحياته إلى غيره من منسوبي الوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتكون الموارد المالية للوكالة مما يأتي: أ- الاعتمادات التي تخصص لها في الميزانية العامة للدولة. ب- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف، وفقًا للأحكام المنظمة لذلك. ج- المقابل المالي للخدمات والأعمال التي تقدمها الوكالة. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. هـ- عوائد استثمارات أموال الوكالة. تودع أموال الوكالة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الوكالة حسابًا لها في البنك المركزي السعودي ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الوكالة ولوائحها المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للوكالة ميزانية سنوية مستقلة، تصدر وفقًا لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للوكالة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات الوكالة وعملياتها، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حساباتها ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو الوكالة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يحل التنظيم محل الترتيبات التنظيمية للهيئة السعودية للفضاء، الصادرة بقرار مجلس الوزراء رقم (209) وتاريخ 25 / 4 / 1440هــ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/db8ba5c5-726b-471a-aeb0-b02800a195fd/1
