regulation:
  code: BOE045
  name_ar: نظام الإقامة المميزة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها: النظام: نظام الإقامة المميزة. اللائحة: اللائحة التنفيذية للنظام. غير السعودي: الشخص ذو الصفة الطبيعية الذي لا يحمل الجنسية السعودية. حامل الإقامة المميزة: غير السعودي الذي حصل على الإقامة المميزة وفقاً للنظام. الأسرة: من يعولهم حامل الإقامة المميزة من: الأزواج، والأولاد (ممن لم يتجاوز إحدى وعشرين سنة). المركز: مركز الإقامة المميزة. اللجنة: اللجنة الإشرافية للمركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يتمتع حامل الإقامة المميزة بالحقوق والمزايا الآتية ويلتزم بما يترتب عليها من واجبات: أ- الإقامة في المملكة مع أسرته. ب- تأشيرات زيارة للأقارب، وفق ما تحدده اللائحة. ج- استقدام العمالة المنزلية بحسب احتياجاته. د- امتلاك العقارات للأغراض: السكنية، والتجارية، والصناعية، وذلك فيما عدا مدينتي مكة المكرمة والمدينة المنورة، والمناطق الحدودية وفقًا لما تحدده اللائحة. هـ- الانتفاع بالعقارات الواقعة في مدينتي مكة المكرمة والمدينة المنورة لمدة لا تتجاوز (تسعاً وتسعين) سنة، وتضع وزارة العدل ووزارة التجارة والاستثمار الآليات اللازمة لذلك، بما يكفل للمنتفع الحصول على صك حق انتفاع صادر من كتابة العدل. ويكون هذا الحق قابلاً للتصرف بانتقاله إلى الغير وفق ضوابط تضعها اللجنة. و- امتلاك وسائل النقل الخاصة، وأي منقولات أخرى يسمح باقتنائها نظاماً في المملكة. ز- العمل في منشآت القطاع الخاص والانتقال بينها ويشمل ذلك أي من أفراد أسرته، فيما عدا المهن والأعمال التي يحظر على غير السعودي الاشتغال بها، ودون إخلال بالرسوم المقررة على غير السعودي. ح- حرية الخروج من المملكة والعودة إليها ذاتياً. ط-
    استخدام الممرات المخصصة للسعوديين عند دخول المملكة عبر منافذها والخروج منها. ي- مزاولة الأعمال التجارية، وفقاً لنظام الاستثمار الأجنبي. تحدد اللائحة الأحكام الأخرى المنظمة لما ورد في الفقرة (1) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تكون أنواع الإقامة المميزة وفقاً للآتي: أ- غير محددة المدة. ب- لسنة واحدة قابلة للتجديد. وتحدد اللائحة الإجراءات والضوابط المتعلقة بما ورد في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يشترط للتقدم بطلب الحصول على الإقامة المميزة ما يأتي: أ- تقديم جواز سفر ساري المفعول. ب- ألاّ يقل سن المتقدم عن إحدى وعشرين سنة. ج- تقديم ما يثبت الملاءة المالية للمتقدم. د- تقديم سجل جنائي يثبت خلو المتقدم من السوابق. هـ- تقديم تقرير صحي عن حالة المتقدم الصحية يثبت خلوه من الأمراض المعدية، لا يزيد تاريخه على ستة أشهر من تاريخ التقدم. و- أن تكون إقامة المتقدم نظامية في حال كان متقدماً من داخل المملكة. للجنة -عند الاقتضاء- إضافة شروط خاصة في الحالات التي تتطلب ذلك. تحدد اللائحة الإجراءات والضوابط المتعلقة بما ورد في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يدرس المركز الطلب، بعد استكمال المتطلبات المشار إليها في المادة (الرابعة) من النظام؛ للنظر في الموافقة على منح المتقدم الإقامة المميزة، وتصدر بقرار من رئيس المركز، وذلك وفقاً للأحكام الواردة في النظام واللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'على المتقدم -خلال (ثلاثين) يوماً من إبلاغه بصدور الموافقة المشار إليها في المادة (الخامسة) من النظام- القيام بالآتي: أ- سداد المقابل المالي الذي تحدده اللائحة. ب- تقديم وثيقة تأمين طبي وفقاً لنظام الضمان الصحي التعاوني، ولائحته التنفيذية. يعد الطلب المقدم وفقاً للمادة (الرابعة) من النظام ملغى إذا لم تستوفَ المتطلبات المشار إليها في الفقرة (1) من هذه المادة خلال المدة المحددة. تبدأ الإقامة المميزة -بالنسبة إلى من يقيم داخل المملكة وقت التقدم بطلب الحصول على الإقامة المميزة- من تاريخ حصوله عليها، على أن تستكمل الإجراءات اللازمة لإنهاء العلاقة المتعلقة بالإقامة السابقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يلتزم حامل الإقامة المميزة بالتقيد بالنظام واللائحة، وغيرهما من الأنظمة والتعليمات المعمول بها في المملكة، وذلك دون إخلال بالأحكام المنصوص عليها في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعتبر حامل الإقامة المميزة في حكم المقيم لغرض تطبيق الأحكام النظامية الأخرى وبخاصة الأحكام الضريبية، وذلك بصرف النظر عن المدة التي يقضيها خارج المملكة خلال السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تلغى الإقامة المميزة في الحالات الآتية: أ- إدانة حامل الإقامة المميزة بجريمة يعاقب عليها بالسجن لمدة لا تقل عن (ستين) يوماً، أو بغرامة لا تقل عن (مائة) ألف ريال أو ما يعادلها. ب- صدور قرار أو حكم قضائي بإبعاد حامل الإقامة المميزة عن المملكة. ج- ثبوت أن طلب الحصول على الإقامة المميزة قد تضمن معلومة غير صحيحة. د- عدم تقيّد حامل الإقامة المميزة بالتزاماته الواردة في المادة (السابعة) من النظام. هـ- تنازل حامل الإقامة المميزة عنها. و- وفاة حامل الإقامة المميزة أو فقدانه الأهلية. لا يخل ما ورد في الفقرة (1) من هذه المادة بحق اللجنة في إنهاء الإقامة المميزة إن اقتضت المصلحة العامة ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون الحقوق والمزايا الممنوحة لحامل الإقامة المميزة وفقاً للنظام على سبيل الحصر. تحدد اللائحة الحقوق والمزايا الأخرى التي تتمتع بها الأسرة، وذلك في حدود ما ورد في المادة (الثانية) من النظام. فيما عدا ما نصت عليه الفقرتان (1) و(2) من هذه المادة، تسري على حامل الإقامة المميزة وأسرته جميع الأنظمة والتعليمات التي تسري على المقيم غير السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لا يترتب على إلغاء الإقامة المميزة أو إنهائها انتقال الحقوق والمزايا -التي كان يحصل عليها وفقاً للمادة (الثانية) من النظام- إلى أسرته، على أنه إذا تحققت في أي منهم الشروط الواردة في هذا النظام ولائحته فله التقدم للحصول على الإقامة المميزة. لا تخوِّل الإقامة المميزة حاملها الحق في الحصول على الجنسية السعودية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: في حال إلغاء الإقامة المميزة أو إنهائها، لحاملها أو أي من أفراد أسرته، فيتولى المركز -بالتنسيق مع الجهات المعنية- النظر فيما قد يترتب على ذلك من آثار، ومعالجتها، وذلك وفق ما ورد في النظام وما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يعد المركز -بالتنسيق مع الجهات المعنية- اللائحة، وتصدر بقرار من اللجنة. يصدر المركز القرارات والتعليمات اللازمة لتنفيذ أحكام النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يعمل بالنظام اعتباراً من اليوم التالي لنشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5e9762df-2b15-4e66-8cdc-aa5200f62042/1
  verified: false
