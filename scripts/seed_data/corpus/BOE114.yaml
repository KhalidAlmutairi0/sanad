regulation:
  code: BOE114
  name_ar: نظام التصرف في العقارات البلدية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: الأموال العامة التابعة للبلديات غير قابلة للتصرف، ولكن يجوز في حدود ما تقر الأنظمة واللوائح الترخيص بالانتفاع بها دون مقابل أو مقابل رسم، بصورة لا تتعارض مع الأغراض المخصصة لأجلها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81bd35e9-ee8d-47bf-97c7-a9a700f2100a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يجوز للبلديات في حدود هذا النظام ولوائحه التصرف بالأموال الخاصة التابعة لها، بما يلي: 1 - بالبيع أو المعاوضة.2 - بالإيجار.3 - بالترخيص بالانتفاع بها بدون مقابل أو مقابل رسم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81bd35e9-ee8d-47bf-97c7-a9a700f2100a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يقصد في تطبيق الأحكام السابقة بالأموال العامة : الأموال المخصصة للمنفعة العامة بالفعل أو بالنظام، ويقصد بالأموال الخاصة ما عدا ذلك. ويعتبر من الأموال الخاصة ما زالت عنه بالفعل أو بالنظام صفة التخصيص للمنفعة العامة من الأموال العامة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81bd35e9-ee8d-47bf-97c7-a9a700f2100a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يتم التصرف وفق لائحة تصدر عن رئيس مجلس الوزراء ، بناء على توصية وزير الداخلية ووزير المالية والاقتصاد الوطني .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81bd35e9-ee8d-47bf-97c7-a9a700f2100a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يتم التصرف بناء على قرار من المجلس البلدي، أما البلديات التي لا يوجد لها مجالس بلدية فيتم التصرف بالأموال الخاصة التابعة لها بناء على قرار من وزير الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81bd35e9-ee8d-47bf-97c7-a9a700f2100a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لا يجوز أن يكون المتصرف له وزيرا أو وكيل وزارة، كما لا يجوز أن يكون موظفا من موظفي المرتبة الثامنة فما فوق في الجهة الإدارية التي تتبعها البلدية، أو موظف أيا كانت مرتبته في البلدية التي تجري التصرف، أو عضوا في المجلس البلدي الذي يصدر عنه قرار التصرف، كما لا يجوز أن يكون المتصرف له أحد أقارب من ذكر من الوالدين والأولاد وأبناء الأولاد والأزواج والأخوة والأخوات أو وكيلا معروفا لأي منهم أو مستخدمًا لهم. ولا يجوز بغير طريق الميراث أو الوصية أن ينقل حق المتصرف له إلى أي ممن ذكر طوال خمس السنوات التالية للتصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81bd35e9-ee8d-47bf-97c7-a9a700f2100a/1
  verified: false
