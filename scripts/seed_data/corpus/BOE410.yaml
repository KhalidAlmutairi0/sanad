articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك: الوزير: وزير الإسكان. الهيئة : الهيئة العامة للعقار. المجلس : مجلس إدارة الهيئة. الرئيس : رئيس المجلس. المحافظ : محافظ الهيئة. التنظيم : تنظيم الهيئة. الرخصة : وثيقة تصدرها الهيئة تخول صاحبها مزاولة نشاط أو أكثر من الأنشطة العقارية. الأنشطة العقارية : عمل أو مجموعة أعمال تنفذ لتوفير منتجات عقارية محددة، منها التطوير العقاري، والمساهمات العقارية، والبيع على الخارطة، ومزاولة خدمات الوساطة في بيع العقارات أو شراؤها أو تأجيرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها فتح فروع ومكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'الغرض الأساس للهيئة هو العمل على تنظيم النشاط العقاري غير الحكومي والإشراف عليه وتطويره، لرفع كفايته، وتشجيع الاستثمار فيه بما يتفق مع أهداف التنمية الاقتصادية والاجتماعية.وتتمتع الهيئة - في سبيل تحقيق أغراضها التي أنشئت من أجلها - بجميع الصلاحيات اللازمة لذلك، ولها على وجه خاص ما يأتي: 1 - اقتراح الأنظمة واللوائح والسياسات ذات العلاقة بالأنشطة العقارية، والرفع عنها لاستكمال ما يلزم في شأنها.2 - وضع الخطط اللازمة لممارسة اختصاصاتها، والإشراف على تنفيذها.3 - الترخيص للأنشطة العقارية، والإشراف عليها.4 - وضع المعايير الخاصة بالأنشطة العقارية.5 - تنظيم المعارض العقارية، بالتنسيق مع الجهات ذات العلاقة.6 - اتخاذ ما يلزم من إجراءات لتحديد المنطقة أو المناطق العقارية التي يبدأ فيها تطبيق نظام التسجيل العيني للعقار، وذلك بحسب ما قضى به من أحكام.7 - وضع أسس تحديد المقابل المالي للأنشطة العقارية بما لا يخل بقواعد المنافسة.8 - تشجيع الاستثمار في الأنشطة العقارية، وتوفير البيئة المناسبة للمنافسة العادلة في هذا المجال.9 - التنسيق مع الأجهزة المعنية من أجل ضمان تكامل البنى التحتية للعقارات
    وتحقيق الأهداف والسياسات والاستراتيجيات الوطنية ذات العلاقة.10 - عقد المؤتمرات والندوات واللقاءات المتعلقة بمجالات عمل الهيئة وفقاً للضوابط المنظمة لذلك، والمشاركة في المعارض الدولية، وذلك بالتنسيق مع الجهات المعنية.11 - نشر الوعي بأنظمة القطاع العقاري وأنشطته.12 - متابعة تنفيذ الاتفاقيات ذات الصلة بالعقار المبرمة بين المملكة والدول الأخرى، وذلك بالتنسيق مع الجهات المعنية.13 - مراقبة مؤشرات القطاع العقاري بما يحقق له الاستقرار والتوازن.14 - العمل على توفر التدريب والتأهيل اللازمين للمرخص لهم بمزاولة الأنشطة العقارية وللعاملين في هذه الأنشطة.15 - وضع الضوابط اللازمة لتنظيم الإعلانات العقارية التي تنشر في جميع الوسائل والرقابة عليها، بالتنسيق مع الجهات ذات العلاقة.16 - إجراء البحوث والدراسات والإحصاءات في مجال الأنشطة العقارية.17 - إنشاء بوابة إلكترونية تحتوي على قواعد للمعلومات العقارية اللازمة للأنشطة العقارية، سواء المتوافرة لدى الهيئة أو الجهات الأخرى المعنية، مع تحديثها دوريًّا، وإتاحتها للمعنيين.18 - التنسيق مع الوزارة في شأن تمثيل المملكة في المنظمات والمنتديات الدولية والإقليمية
    ذات العلاقة باختصاصها، وذلك بحسب الإجراءات المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: '1 - يكون للهيئة مجلس إدارة برئاسة الوزير وعضوية كل من: أ - المحافظ عضواً ونائباً للرئيس ب - ممثل عن وزارة الإسكان عضواً ج - ممثل عن وزارة العدل عضواً د - ممثل عن وزارة المالية عضواً هـ - ممثل عن وزارة التجارة والاستثمار عضواً و - ممثل عن وزارة الطاقة والصناعة والثروة المعدنية عضواً ز- ممثل عن وزارة الشؤون البلدية والقروية عضواً ح - ممثل عن وزارة الاقتصاد والتخطيط عضواً ط - ثلاثة أعضاء من القطاع الخاص ذي العلاقة بنشاط الهيئة، يعينون بقرار من مجلس الوزراء بناء على اقتراح من الوزير، وتكون عضويتهم لمدة ثلاث سنوات قابلة للتجديد مرة واحدة. 2 - يجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويختص بالإشراف على شؤونها وإدارتها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق أغراضها في حدود أحكام التنظيم، وله بصفة خاصة الصلاحيات والاختصاصات الآتية : 1 - الإشراف على تنفيذ الهيئة للمهمات المنوطة بها.2 - وضع السياسات التي تسير عليها الهيئة لتحقيق أغراضها، واعتماد الخطط والبرامج اللازمة لذلك، والإشراف على تنفيذها.3 - إصدار اللوائح الإدارية والمالية التي تسير عليها الهيئة- بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية- وغيرها من اللوائح الداخلية.4 - وضع الهيكل التنظيمي للهيئة ورفعه لاعتماده وفق الإجراءات النظامية المتبعة.5 - إقرار المقابل المالي للرخص التي تصدرها الهيئة.6 - إقرار المقابل المالي الذي تتقاضاه الهيئة عن الأعمال والخدمات التي تقدمها.7 - الموافقة على فتح فروع ومكاتب للهيئة داخل المملكة.8 - الموافقة على توظيف أموال الهيئة بما يحقق أغراضها، واستثمار العقارات واستئجارها وفقاً للأنظمة المتبعة.9 - إقرار مشروع ميزانية الهيئة، وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، ورفع ما يلزم اعتماده بحسب الإجراءات
    النظامية المتبعة.10 - قبول الهبات والإعانات والتبرعات والمنح والوصايا والأوقاف وفقاً للأنظمة المتبعة.11 - الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، وتفويض المحافظ بالتوقيع عليها بحسب الإجراءات المتبعة.12 - النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة ومركزها المالي.13 - إقرار قواعد منح المكافآت لمن يكلفه المجلس من غير منسوبي الهيئة بالقيام بأعمال أو تقديم خدمات معينة للهيئة.14 - تعيين مراجع حسابات خارجي، ومراقب مالي داخلي.وللمجلس تفويض رئيسه أو نائبه أو من يراه من أعضائه في بعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- تعقد اجتماعات المجلس في مقر الهيئة بدعوة من الرئيس، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة.2 - يعقد المجلس اجتماعاته بصفة دورية أربع مرات في السنة، وللرئيس دعوته للاجتماع متى دعت الحاجة إلى ذلك أو متى طلب ذلك ثلاثة أعضاء على الأقل.3 - يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين، وفي حال تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.4 - تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون.5 - لا يجوز لعضو المجلس الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه، وللعضو المعترض تسجيل اعتراضه وأسبابه ضمن محضر اجتماع المجلس.6 - لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار الهيئة بسبب عضويته في المجلس.7 - للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.8 - يكون للمجلس أمين من بين منسوبي الهيئة يختاره الرئيس بناء على ترشيح المحافظ، يتولى أمانة المجلس والإعداد للاجتماعات وتسجيل المداولات
    والقرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من غيرهم، ويعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للهيئة محافظ بالمرتبة الممتازة، يعين بأمر ملكي بناءً على ترشيح الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'المحافظ هو المسؤول التنفيذي عن إدارة الهيئة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويمارس بوجه خاص الصلاحيات والمهمات الآتية: 1 - الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة.2 - اقتراح السياسات العامة للهيئة، المتعلقة بأنشطتها، والخطط والبرامج اللازمة لتنفيذ ذلك، ورفعها إلى المجلس.3 - إعداد مشروع ميزانية الهيئة السنوية ومشروع حسابها الختامي، ورفعهما إلى المجلس.4 - الموافقة على إصدار الرخص التي تدخل في اختصاص الهيئة.5 - تمثيل الهيئة لدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة وغيرها من الجهات داخل المملكة وخارجها وأمام القضاء.6 - الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المقرة والصلاحيات التي منحها إياه المجلس.7 - إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، ودراستها، وعرضها على المجلس.8 - إعداد التقرير السنوي عن نشاط الهيئة والعقبات التي واجهتها واقتراح الحلول المناسبة لها، وتقديمه إلى المجلس للنظر فيه ورفعه إلى الجهات المختصة بعد اعتماده من المجلس.9 - التوقيع
    على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس بحسب الإجراءات المتبعة.10 - تنظيم مشاركة الهيئة في المؤتمرات والندوات واللقاءات والمعارض المتعلقة بمجالات عمل الهيئة محليًّا وإقليميًّا ودوليًّا.11 - إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناءً عليه والقواعد والإجراءات المعتمدة، بحسب الصلاحيات المخولة له.12 - تشكيل لجان عمل داخلية (دائمة أو مؤقتة) وفقاً لما تقضي به اللوائح والإجراءات المعتمدة لدى الهيئة.13 - الاستعانة بالخبراء والمستشارين المتخصصين الذين تحتاج إليهم الهيئة.وللمحافظ أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- تنشأ - بموافقة المجلس - مراكز للخدمة الشاملة في مقر الهيئة وفروعها التي ترى الهيئة ضرورة إنشاء تلك المراكز فيها. 2 - تقوم جميع الجهات الحكومية وغير الحكومية التي يتطلب الأمر تمثيلها في تلك المراكز بتحديد من يمثلها للعمل في تلك المراكز، وعلى تلك الجهات تفويض ممثليها بممارسة الصلاحيات التي تضمن سرعة تقديم الخدمات بما في ذلك إصدار الشهادات والتصاريح والتراخيص للأنشطة التي تدخل ضمن اختصاص تلك الجهات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: '1- تتكون موارد الهيئة المالية مما يأتي: أ - ما يخصص لها في الميزانية العامة للدولة.ب - المقابل المالي للرخص التي تصدرها.ج - المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها للغير مما يدخل ضمن اختصاصها، وفقاً للوائح والقرارات التي يعتمدها المجلس.د - الإيرادات المتحصلة من عوائد استغلال واستثمار أصولها وأموالها.هـ - ما يقبله المجلس من هبات وإعانات وتبرعات ومنح ووصايا وأوقاف.و - أي مورد آخر يقره المجلس. 2 - تودع أموال الهيئة في حساب خاص بها في مؤسسة النقد العربي السعودي، وللهيئة عند الحاجة فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الأموال وفق ميزانية الهيئة المعتمدة.3 - تؤول الأموال الفائضة عن حاجة الهيئة خلال السنة المالية إلى الخزينة العامة للدولة لحساب جاري وزارة المالية، وذلك بعد اقتطاع جميع النفقات الجارية ونفقات رأس المال وغيرها من المصروفات التي تحتاج إليها الهيئة، وما تحتاج إليه لتمويل مشروعاتها المستقبلية المقرة في ميزانيتها السنوية وللوفاء بالتزاماتها النظامية، وذلك دون الإخلال بشرط الواقف فيما يتعلق بالأوقاف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعامل الهيئة من حيث إعفاء مستورداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن مستوردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 1- تكون للهيئة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة.2 - السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: ( المادة الثالثة عشرة مكرر )
  article_text_ar: '- صدر قرار مجلس الوزراء رقم (69) وتاريخ 1443/1/23هـ وذلك بإضافة مادة ترتيبها ( الثالثة عشرة مكرر) وتنص على الآتي: " يخضع منسوبو الهيئة -عدا المحافظ- لأحكام نظام العمل ونظام التأمينات الاجتماعية".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات الهيئة وعملياتها، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a98158eb-927b-4f8c-a9ff-a9a700f21e78/1
  verified: false
