- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: المركز: المركز الوطني لإدارة الدين. التنظيم: تنظيم المركز. الوزير: وزير المالية. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية المستقلة، والاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير، ويكون مقره في مدينة الرياض
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى ما يلي: الإسهام في وضع سياسة الدين العام للمملكة وتطويرها، وتأمين احتياجات المملكة من التمويل على المدى القصير والمتوسط والبعيد. ضمان استدامة وصول المملكة إلى مختلف أسواق الدين لإصدار أدوات الدين السيادية بتسعيرة عادلة ضمن أطر وأسس مدروسة لإدارة المخاطر. متابعة شؤون التصنيف الائتماني للمملكة بالتعاون مع الجهات الحكومية ذات العلاقة. تقديم خدمات استشارية واقتراح خطط تنفيذية للأجهزة الحكومية والشركات التي تمتلك فيها الدولة ما يزيد على (50%) من رأس مالها والمؤسسات العامة في مجال اختصاص المركز، بما في ذلك تجميع بيانات الدين العام المباشر وغير المباشر ومعالجتها ومتابعتها ، والتفاوض حول إعادة هيكلة الديون أو إعادة تسعيرها أو إعادة التعاقد عليها، أو خدمات تتعلق بسياسات التحوط، أو إدارة علاقات المستثمرين في أدوات الدين العام، أو شؤون التصنيف الائتماني، أو غيرها من الخدمات ذات العلاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للمركز -دون إخلال باختصاص الجهات الحكومية ذات العلاقة- اتخاذ كل ما يلزم في سبيل تحقيق أهدافه، وله على وجه خاص ما يأتي: وضع السياسات والخطط والبرامج -وفق الإجراءات النظامية المتبعة- التي من شأنها أن تعزز سياسة الدين العام للمملكة، وضمان استدامة وصول المملكة إلى مختلف أسواق الدين المحلية والعالمية بتسعير عادل. الإسهام في تعزيز السياسة المالية للمملكة فيما يدخل في اختصاصه، وذلك بالاتفاق مع وزارة المالية. اقتراح الأنظمة ذات الصلة بإدارة الدين العام، واقتراح تعديل المعمول به منها، والرفع عنها وفق الإجراءات النظامية المتبعة. اعتماد مؤشرات ومعايير قياس أداء مستويات الدين العام، ومؤشرات التصنيف الائتماني للمملكة، وتطوير هذه المؤشرات والمعايير بشكل مستمر، وذلك بالتعاون مع الجهات الحكومية ذات العلاقة. تطوير الأدوات والمنهجيات والأساليب اللازمة لسداد الدين العام، واقتراح تعديل المعمول به منها، والرفع عما يلزم لاستكمال الإجراءات النظامية، وذلك بالاتفاق مع الجهات ذات العلاقة. تبنّي أفضل ممارسات نظم المعلومات والتطبيقات التقنية لمشاريع المركز وأعماله، بما في ذلك نظم إدارة المخاطر والتسوية
    والمدفوعات. إعداد تقارير قياس ومتابعة دورية عن أوضاع الدين العام، تشمل إدارة المخاطر والالتزام وتقويم مصادر التمويل وتحليل أثرها على محفظة الدين العام. التنسيق مع الجهات الحكومية لتشكيل فرق عمل لدراسة تفاصيل التصنيف الائتماني. عقد اللقاءات والندوات والمؤتمرات والدورات التدريبية المتخصصة في مجال الدين العام سواء داخل المملكة أو خارجها بما يسهم في بناء وتقوية علاقات فاعلة مع المشاركين في الأسواق المالية. الاستعانة بالخبراء والاستشاريين وبيوت الخبرة ذات الكفايات المتميزة في المجالات ذات العلاقة بأعمال المركز والمهمات المسندة إليه. عقد شراكات واتفاقيات تعاون مع الأجهزة الحكومية ذات العلاقة، لتبادل الخبرات في المجالات المالية والنقدية. عقد مذكرات تفاهم واتفاقيات مع الأجهزة النظيرة له في الدول الأخرى والمؤسسات المالية الدولية ذات العلاقة، لتبادل الخبرات في مجال أعمال إدارة الدين العام، وذلك وفق الإجراءات النظامية المتبعة. إعداد دراسات وبحوث علمية في مجالات الدين العام وتطوراتها أو المشاركة في ذلك، ونشرها. نشر بيانات الدين العام لتعزيز الشفافية. تقديم الاستشارات الإدارية والفنية للجهات الحكومية
    والشركات التي تمتلك فيها الدولة ما يزيد على (50%) رأس مالها والمؤسسات العامة، في مجالات تسعير أو هيكلة التمويل، أو سياسات التحوط، أو علاقات المستثمرين، أو التصنيف الائتماني، أو غيرها من الخدمات ذات العلاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير وعضوية كل من: الرئيس التنفيذي. عدد لا يتجاوز (ثلاثة) أعضاء من المختصين وذوي الخبرة بمجال عمل المركز، يعينون بأمر من رئيس مجلس الوزراء بناء على اقتراح من الرئيس، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على شؤون المركز وإدارته وتصريف أموره، ويتخذ جميع القرارات اللازمة لتحقيق أهدافه في حدود أحكام التنظيم، وله على وجه خاص ما يأتي: اقتراح استراتيجية الدين العام وأي تعديلات عليها؛ لإقرارها من الجهة المختصة، وذلك وفق الإجراءات النظامية المتبعة. إقرار السياسات العامة للمركز وخطة عمله وخططه التشغيلية، في إطار سياسات الدولة المالية والاقتصادية. إقرار هيكل المركز التنظيمي. إقرار اللوائح المالية والإدارية لأعمال المركز بالاتفاق مع وزارة المالية، وغيرها من اللوائح الداخلية اللازمة لتسيير شؤونه. إقرار اللوائح الفنية والإجراءات والقواعد والمعايير المتعلقة بعمل المركز. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيدًا لرفعها بحسب الإجراءات النظامية المتبعة. الموافقة على إبرام مذكرات التفاهم والاتفاقيات والعقود وغيرها من الوثائق، وفقاً للوائح المركز والإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي. الموافقة على فتح حسابات بنكية للمركز خارج المملكة. اعتماد المقابل المالي للخدمات
    الاستشارية التي يقدمها المركز وفقاً لتنظيمه. النظر فيما يحال إلى المركز من الوزير. وللمجلس تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من سواهم، يعهد إليها بما يراه مناسباً من مهمات، ويحدد قرارُ تشكيل كل لجنة رئيسَها وأعضاءها واختصاصاتها، ولتلك اللجان الاستعانة بمن تراه لتأدية المهام المنوطة بها. وللمجلس كذلك تفويض أي من اختصاصاته إلى الرئيس التنفيذي أو إلى من يراه من منسوبي المركز، وفق ما تقتضيه مصلحة العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المركز، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة أو خارجها. يجتمع المجلس مرة كل ثلاثة أشهر، بناء على دعوة من رئيسه وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، وعلى الرئيس دعوة المجلس إلى الاجتماع متى طلب ذلك عضوان من أعضائه على الأقل. ويجب أن توجه الدعوة كتابة قبل موعد الاجتماع بسبعة أيام عمل على الأقل، على أن يتضمن جدول أعمال الاجتماع مكانه وطريقة انعقاده. تنعقد اجتماعات المجلس بحضور أغلبية أعضائه على الأقل، بمن فيهم الرئيس أو من ينيبه. تصدر قرارات المجلس بأغلبية أصوات أعضائه الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض أن يثبت اعتراضه مسبباً في المحضر. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه. استثناءً مما ورد في الفقرة (6) من هذه المادة، لا يجوز للرئيس التنفيذي التصويت على القرارات التي تتعلق بتجديد مدة شغله المنصب أو بعزله أو تتعلق بما يتلقى من مكافآت أو مزايا.
    يجوز للمجلس أن يدعو لحضور اجتماعاته من يرى الاستعانة بهم من المختصين والمستشارين -سواء من داخل المملكة أو خارجها- دون أن يكون له حق التصويت. يجوز أن تعقد الاجتماعات وأن يصوت عليها عن بعد، من خلال استخدام وسائل التقنية. ويمكن أن تتخذ القرارات بطريق التمرير على الأعضاء ويوقعون عليها بما يفيد اطلاعهم عليها، ولا تعد القرارات المتخذة بهذه الطريقة صحيحة ما لم يصوت عليها جميع أعضاء المجلس، ولا يكون القرار نافذاً إلا إذا حاز على أغلبية الثلثين على الأقل. ويعرض القرار المتخذ بهذه الطريقة على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي يعين ويعفى من منصبه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون المسؤول التنفيذي عن إدارة المركز وأعماله اليومية، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس أو يفوضه به، وله بوجه خاص ممارسة الاختصاصات الآتية: اقتراح سياسات المركز العامة وخطة عمله وخططه التشغيلية؛ ورفعها إلى المجلس ومتابعة تنفيذها بعد إقرارها. إعداد تقارير قياس ومتابعة دورية عن أوضاع المديونية العامة للدولة، بما يشمل تقرير إدارة المخاطر والالتزام وتقويم مصادر التمويل وتحليل أثرها على محفظة الدين العام، ورفعها إلى المجلس. اقتراح هيكل المركز التنظيمي ولوائحه الإدارية والمالية والفنية والاجراءات والقواعد والمعايير اللازمة لتسيير أعماله، ورفعها إلى المجلس لإقرارها، والإشراف على تنفيذها بعد إقرارها. رفع تقارير دورية إلى المجلس عن أعمال المركز ومنجزاته ونشاطاته. تقديم المقترحات والتوصيات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. متابعة تنفيذ القرارات ذات الصلة بأعمال المركز، ومباشرة ما تخوله إياه قرارات المجلس ولوائح المركز من اختصاصات، وما
    يكلفه به المجلس من مهمات. إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح والقواعد والإجراءات المعتمدة، وذلك بحسب الصلاحيات المفوضة إليه. الصرف من ميزانية المركز، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي يفوضه بها المجلس. الإشراف على إعداد مشروع ميزانية المركز وحسابه الختامي وتقريره السنوي، ورفعها إلى المجلس. تعيين العاملين في المركز والإشراف عليهم وفقًا لما تحدده لوائح المركز. التعاقد مع الخبراء والمستشارين وبيوت الخبرة من داخل المملكة أو خارجها بما يخدم أهداف المركز واختصاصاته، وفقًا لما تحدده لوائح المركز، والإجراءات النظامية المتبعة. التوقيع على الاتفاقيات ومذكرات التفاهم والعقود وغيرها من الوثائق، بعد موافقة المجلس ووفقاً للإجراءات النظامية المتبعة. تمثيل المركز أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض أي من اختصاصاته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع منسوبو المركز لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى للمركز من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتألف موارد المركز المالية من المصادر الآتية: أ- ما يخصص له في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه عن الخدمات الاستشارية التي يقدمها وفقاً لأحكام التنظيم. ج- أي مورد آخر يقرّه المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. يفتح المركز حساباً له في مؤسسة النقد العربي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة أو خارجها، ويصرف من هذه الحسابات وفق ميزانية المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يرفع الرئيس التنفيذي إلى المجلس تقريرًا سنويًا عما حققه المركز من إنجازات خلال السنة المنقضية وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع عدم الإخلال باختصاص الديوان العام للمحاسبة بالرقابة على حسابات المركز وعملياته، يعين المجلس مراجع حسابات خارجيًا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة لتدقيق حسابات المركز ومعاملاته وبياناته وحسابه الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس لإقراره ومن ثم يزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13d5bd75-47b5-44ff-8b84-aaee00c614f5/1
