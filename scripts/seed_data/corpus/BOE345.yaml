articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية - حيثما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك:الوزارة : وزارة الثقافة والإعلام.الوزير: وزير الثقافة والإعلام.الهيئة: الهيئة العامة للإعلام المرئي والمسموع.المجلس: مجلس إدارة الهيئة.الرئيس: رئيس الهيئة. التنظيم: تنظيم الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنشأ بموجب هذا التنظيم هيئة عامة تسمى "الهيئة العامة للإعلام المرئي والمسموع"، تتمتع بالشخصية الاعتبارية المستقلة والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون مقر الهيئة الرئيس مدينة الرياض، وللهيئة أن تنشئ فروعًا ومكاتب داخل المملكة وخارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف الهيئة إلى تنظيم نشاط البث الإعلامي المرئي والمسموع وتطويره، ومراقبة محتواه، وفقًا للسياسة الإعلامية للمملكة، مراعية في ذلك ما يأتي: 1 - تعزيز القيم الدينية والاجتماعية والثقافية في المملكة.2 - ضمان تزويد الجمهور بمجموعة ذات جودة عالية ومتنوعة من المواد المرئية والمسموعة الترفيهية والثقافية والتعليمية وغيرها.3 - وضع أطر مرنة وواضحة للترخيص للبث الإعلامي المرئي والمسموع، بما يستوعب الاتجاهات التجارية والتقنية المتطورة.4 - ضمان تكافؤ الفرص في الأسواق وضمان المنافسة العادلة، وذلك في مجال نشاطها.5 - دعم تنمية وتطوير قطاع البث والمحتوى الإعلامي المرئي والمسموع في المملكة.6 - دعم وتنفيذ أهداف السياسة الإعلامية للمملكة والخطط الوطنية من خلال البث والمحتوى الإعلامي المرئي والمسموع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تكون الهيئة الجهة المسؤولة عن شؤون البث والمحتوى الإعلامي المرئي والمسموع، وفقًا للأنظمة ذات العلاقة، وتتخذ ما تراه لازمًا من القرارات التي تحقق أهدافها في هذا الشأن، ولها في سبيل ذلك ما يأتي : 1 - إدارة عملية التراخيص لجميع أنشطة البث والمحتوى الإعلامي المرئي والمسموع وإصدارها. 2 - اقتراح رسوم تراخيص البث والمحتوى الإعلامي المرئي والمسموع، واقتراح تعديلها، ورفعها إلى الجهات المختصة لاعتمادها. 3 - الاتفاق مع هيئة الاتصالات وتقنية المعلومات فيما يتعلق بالطيف الترددي الخاص بالبث الإعلامي المرئي والمسموع، وذلك وفقًا لنظام الاتصالات. 4 - الاتفاق مع هيئة الاتصالات وتقنية المعلومات فيما يتعلق بالمواصفات الفنية لأجهزة البث الإعلامي المرئي والمسموع، وإصدار الموافقات لاستيرادها وفسحها. 5 - مراقبة جميع مقدمي خدمات البث والمحتوى الإعلامي المرئي والمسموع؛ للتأكد من تقيدهم بالأنظمة وتنفيذ شروط وأحكام التراخيص الصادرة لهم. 6 - تلقي الشكاوى المتعلقة بالبث والمحتوى الإعلامي المرئي والمسموع والتحقيق فيها. 7 - دعم البحوث والدراسات وإجراؤها، وتنظيم المؤتمرات والندوات المتعلقة بنشاط البث
    والمحتوى الإعلامي المرئي والمسموع، سواء أكانت منفردة أم بالاشتراك مع المؤسسات الأخرى المماثلة. 8 - وضع آلية لتسوية المنازعات بين الهيئة ومقدمي خدمات البث والمحتوى الإعلامي المرئي والمسموع، وذلك وفقًا لما يقضي به النظام. 9 - أي مهمة أخرى تكلف بها أو تقتضيها طبيعة أعمالها أو الأنظمة النافذة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: '1 - يكون للهيئة مجلس إدارة يشكل على النحو الآتي: أ - وزير الثقافة والإعلامرئيسًا ب- رئيس الهيئةعضوًا ونائبًا للرئيس ج- محافظ هيئة الاتصالات وتقنية المعلوماتعضوًا د- ممثل من وزارة الداخليةعضوًا هـ-ممثل من وزارة المالية عضوًا و-ممثل من وزارة التجارة والصناعةعضوًا ز-ممثلان من وزارة الثقافة والإعلامعضوين ح- اثنان من ذوي الخبرة في شؤون الإعلام يعينان بقرار من مجلس الوزراء بناء على اقتراح من الوزير، وتكون مدة عضويتهما ثلاث سنوات قابلة للتجديد لمرة واحدة.عضوين 2- يجب ألا تقل مرتبة ممثلي الأجهزة الحكومية المشار إليهم في الفقرات (د - هـ - و - ز/1) من هذه المادة عن المرتبة (الرابعة عشرة) أو ما يعادلها.3- تحدد مكافآت أعضاء المجلس بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا في الهيئة، ويختص بالإشراف عليها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق الأهداف التي أنشئت من أجلها، وفقًا لأحكام هذا التنظيم واللوائح الصادرة بناء عليه، وله على وجه خاص ما يأتي: 1 - إقرار السياسات العامة المتعلقة بأنشطة الهيئة، والخطط والبرامج اللازمة لتنفيذ ذلك.2 - الموافقة على مشروع الهيكل التنظيمي للهيئة، ورفعه لاستكمال الإجراءات النظامية لاعتماده.3 - إصدار اللوائح الإدارية والمالية التي تسير عليها الهيئة بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية، وغيرها من اللوائح الداخلية. 4 - الموافقة على مشروع ميزانية الهيئة السنوية، وحسابها الختامي، وتقريرها السنوي، والرفع عن ذلك وفقًا للإجراءات النظامية المتبعة. 5 - تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي.6 - النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة ومركزها المالي. 7 - الموافقة على إنشاء الفروع والمكاتب لتحقيق أهداف الهيئة في الداخل والخارج، وذلك وفقًا للأنظمة.8 - الموافقة على شراء العقارات وبيعها واستثمارها.9 - الموافقة على إبرام العقود والاتفاقات،
    وتفويض رئيس الهيئة بالتوقيع عليها.10 - الموافقة على تأسيس الهيئة للشركات والوكالات التي تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها أو المساهمة في إنشائها، وفقًا للأنظمة وبالاتفاق مع وزارة المالية.11 - تحديد المقابل المالي للخدمات التي تقدمها الهيئة.وللمجلس تفويض رئيسه أو نائبه أو لجنة من أعضائه ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- يعقد المجلس اجتماعاته بصفة دورية كل ثلاثة أشهر، ولرئيس المجلس دعوته للاجتماع متى دعت الحاجة إلى ذلك أو متى طلب ذلك (ثلاثة) أعضاء على الأقل.2- يكون اجتماع المجلس صحيحًا إذا حضره أغلبية الأعضاء بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.3- للمجلس دعوة من يراه لحضور جلساته للاستفادة من خبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للمجلس أن يشكل لجانًا دائمة أو مؤقتة من بين أعضائه أو من سواهم، ويعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للهيئة رئيس بالمرتبة الممتازة يعين بأمر ملكي، بناءً على اقتراح من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يتولى الرئيس إدارة وتصريف جميع شؤون الهيئة وإداراتها وأقسامها وفق الصلاحيات المنصوص عليها في هذا التنظيم واللوائح الصادرة بناءً عليه وقرارات المجلس، وله على وجه خاص ما يأتي: 1 - اقتراح السياسات العامة المتعلقة بأنشطة الهيئة، والخطط والبرامج اللازمة لتنفيذ ذلك، ورفعها إلى المجلس.2 - اقتراح مشروع هيكل الهيئة التنظيمي، ورفعه إلى المجلس. 3 - تمثيل الهيئة أمام القضاء والجهات الحكومية والهيئات الأخرى، داخل المملكة وخارجها، ويحق له توكيل من يراه في ذلك. 4 - تنفيذ قرارات المجلس ومباشرة ما يخوله إياه المجلس من اختصاصات وصلاحيات. 5 - اقتراح اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية، ورفعها إلى المجلس.6 - إعداد مشروع ميزانية الهيئة والحساب الختامي وعرضهما على المجلس.7 - الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفق الأنظمة واللوائح المقرة. 8 - إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها ودراساتها، وعرضها على المجلس. 9 - التعاقد على تنفيذ الأعمال والخدمات وغيرها.10 - إعداد التقرير السنوي عن نشاط الهيئة والصعوبات التي واجهتها
    واقتراح الحلول لها، وعرضه على المجلس للنظر فيه.11 - التوقيع على العقود والاتفاقات بعد موافقة المجلس، وفقًا للأنظمة.12 - تنظيم مشاركة الهيئة في المؤتمرات والندوات والمهرجانات والمعارض المحلية والإقليمية والعربية والدولية، والاشتراك في المجلات والنشرات التخصصية والمهنية ووسائل المعلومات الحديثة وفقًا للإجراءات النظامية.13 - إقرار الخطط والبرامج اللازمة للتدريب والابتعاث داخليًّا وخارجيًّا، ومتابعة تنفيذها.14 - تعيين العاملين في الهيئة وفقًا للوائح، والإشراف عليهم.15 - التعاقد مع الخبراء وفقًا لاحتياجات الهيئة.وللرئيس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: '1- تتكون موارد الهيئة مما يأتي: أ - ما يخصص لها في الميزانية العامة للدولة من اعتمادات.ب - ما يخصص لها من المقابل المالي الذي تتقاضاه الدولة من رخص البث الإعلامي.ج - المقابل المالي الذي تتقاضاه الهيئة عن الأعمال والخدمات التي تقدمها.د - حصيلة الغرامات المفروضة المنصوص عليها نظامًا.هـ - أي مورد آخر يقره المجلس. 2 - تودع أموال الهيئة في حساب مفتوح لها في مؤسسة النقد العربي السعودي، ويتم الصرف منها وفق ميزانية الهيئة المعتمدة وتؤول الأموال الفائضة عن حاجة الهيئة خلال السنة المالية - باستثناء ما تحتاجه لتمويل مشروعاتها المستقبلية المقرة في ميزانيتها السنوية والتزاماتها النظامية - إلى الخزينة العامة للدولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تتولى الهيئة تحصيل الغرامات والمقابل المالي للخدمات وإصدار التراخيص وتجديدها، وتوريدها إلى الخزينة العامة للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تعامل الهيئة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1 - تكون للهيئة ميزانية سنوية مستقلة. 2 - السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات وعمليات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم رسميًّا بالعمل في المملكة، لتدقيق حسابات ومعاملات الهيئة وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس مكافآته، وعند تعدد مراجعي الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يخضع منسوبو الهيئة - ما عدا الرئيس - من حيث أوضاعهم الوظيفية للأحكام المعتمدة بالأمر السامي رقم (5464/م ب) وتاريخ 20 /4 /1426هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/13445632-e42b-4576-a671-a9a700f175f6/1
  verified: false
