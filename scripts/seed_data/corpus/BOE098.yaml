articles:
- article_ref: المادة الأولى ( اسم المعهد ومقرُه )
  article_text_ar: أ - ينشأ بموجب هذا النِظام معهد يُسمَّى ( معهد الدِراسات الدُبلوماسية ).ب - يرتبط المعهد بوزارة الخارجية ، ويكون مقره الرئيس بمدينة "الرياض"، ويجوز إنشاء فروع له خارجها بقرار من مجلِس المعهد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة الثانية ( أهداف المعهد )
  article_text_ar: 'يعمل المعهد على تحقيق الأهداف الآتية: أ - تزويد منسوبي وزارة الخارجية وغيرِهم من منسوبي الأجهزة الحُكومية، بالمعرفة في مُختلف الحقول العلمية المُرتبِطة بالعمل الدُبلوماسي، بقصد رفع كفايتِهم وإنتاجِيتهم.ب - إعداد الدراسات والبحوث المُتعلِّقة بالقضايا العربية والإسلامية والدولية ونشرها.ج - تنظيم المؤتمرات والندوات الخاصة بالشئون الدُبلوماسية والسياسية الدولية، وللمعهد أن يقوم بذلك مُنفرِّدًا أو بالاشتِراك مع المؤسسات الأُخرى أو المعاهد المُماثِلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة الثالثة ( السُلُّطات في المعهد )
  article_text_ar: 'يتولى السلطات في المعهد: أ - مجلِس المعهد.ب - مُدير عام المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة الرابعة ( مجلِس المعهد )
  article_text_ar: 'يُشكل مجلِس المعهد مِن :'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة الخامسة ( صلاحيات المجلِس )
  article_text_ar: 'المجلِس هو السُلطة المسئولة عن شئون المعهد العلمية والمالية والإدارية في حدود هذا النِظام والأنظِمة الأُخرى ذات العلاقة، ولهُ أن يتخذ ما يراه لازِمًا من القرارات التي تُحقِّق أهداف المعهد، وله على وجه الخصوص : أ - وضع السياسة العامة للمعهد ومُراقبة تنفيذِها.ب - اقتِراح مشروع الميزانية السنوية للمعهد.ج - إقرار مناهج الدراسة في المعهد.د - إنشاء الأقسام والإدارات اللازِمة للمعهد، وتحديد مهامِها واختصاصاتِها، وذلك مع مُراعاة أحكام الميزانية.هـ - وضع قواعد قبول منسوبي الأجهزة الحُكومية الأُخرى للدراسة بالمعهد.و - قبول دارسين من غير السعوديين على ألَّا تتجاوز نِسبتُهم (10%) من المقبولين في كُل دورة.ز- وضع اللائحة الخاصة بتشجيع البحوث، وتحديد المُكافآت التي تُصرف للباحثين.ح - وضع اللائحة الداخلية للمعهد.ط - تكوين لجان دائمة أو مؤقتة من بين أعضائه أو من المُختصين لدراسة ما يُكلِّفُهم به من موضوعات.ي - تشكيل لجنة تنفيذية برئاسة مُدير عام المعهد تتولى اقتِراح مناهج الدراسة وقبول الدارسين بالمعهد، واقتِراح تحديد عددِهم.ك - اقتراح تعديل هذا النِظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة السادسة ( اجتِماعات المجلِس )
  article_text_ar: يعقد المجلِس اجتماعاتِه بناءً على دعوة من رئيسه، ولا يُعتبر انعِقاد المجلِس نِظاميًّا إلا بحضور أغلبية أعضائه على أن يكون من بينِهم الرئيس أو نائبه، وتصدُر قرارات المجلِس بأغلبية أصوات الحاضرين، وفي حالة التساوي يُرجح الجانب الذي صوت معه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة السابعة ( مُدير عام المعهد )
  article_text_ar: أ - يختار وزير الخارجية من بين أعضاء السلك الدُبلوماسي أو غيرِهم مُديرًا عامًّا للمعهد.ب - يتولى المُدير الإشراف على إدارة شئون المعهد العلمية والإدارية والمالية، ويُمثله أمام الهيئات والمؤسسات الأُخرى، كما يكون مسئولًا بصِفة عامة أمام رئيس المجلِس- أو من يُنيبُه عنه- عن تنفيذ السياسة الموضوعة لتحقيق أهداف المعهد.ج - تُحدِّد اللوائح الداخلية صلاحيات مُدير المعهد ومسئولياته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يُحدِّد المجلِس برامج المعهد التي يُشترط للالتِحاق بِها سبق الحصول على شهادة جامعية، ويعامل أعضاء هيئة التدريس في هذه البرامج مُعاملة أعضاء هيئة التدريس بجامعة الملك سعود .كما يُعامل الأساتِذة والمُحاضرون الزائرون مُعاملة نُظرائهم في جامعة الملك سعود .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يتم ابتعاث المُعيدين والمُحاضرين لمُتابعة دراساتِهم العُليا في التخصُصات التي يحتاجُها المعهد وفقًا لما هو مُتبع بجامعة الملك سعود .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة العاشرة ( ميزانية المعهد )
  article_text_ar: أ - يُخصص للمعهد ميزانية تكون فرعًا من ميزانية وزارة الخارجية .ب - يقوم مُدير عام المعهد برفع مشروع الميزانية إلى المجلِس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة الحادية عشر ( أحكام انتقالية )
  article_text_ar: يُعامل أعضاء هيئة التدريس الذين يشغلون وقت صدُور هذا النِظام وظائف بالمُسميات الأكاديمية الوارِدة في سلم رواتب هيئة التدريس بالجامعات مُعاملة أعضاء هيئة التدريس بجامعة الملك سعود .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
- article_ref: المادة الثانية عشر
  article_text_ar: يُنشر هذا النِظام في الجريدة الرسمية ويُعمل بِه من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b3f0cb3a-6338-4995-91d7-a9a700f1fad2/1
  verified: false
