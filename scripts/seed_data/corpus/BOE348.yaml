articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: المجمع: مجمع الملك سلمان العالمي للغة العربية. التنظيم: تنظيم المجمع. الوزير: وزير الثقافة. الوزارة: وزارة الثقافة. المجلس: مجلس أمناء المجمع. الرئيس: رئيس المجلس. المجلس العلمي: المجلس العلمي للمجمع. الأمين العام: الأمين العام للمجمع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المجمع بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير. يكون مقر المجمع الرئيس في مدينة الرياض، وله -بقرار من المجلس- إنشاء فروع أو مكاتب تابعة له بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المجمع إلى تحقيق ما يأتي: المحافظة على سلامة اللغة العربية ودعمها نطقًا وكتابة، والنظر في فصاحتها وأصولها وأساليبها وأقيستها ومفرداتها، وضوابطها وقواعدها، وتيسير تعلمها وتعليمها داخل المملكة وخارجها؛ لتواكب المتغيرات في جميع مجالات اللغة العربية. توحيد المرجعية العلمية داخليًّا فيما يتعلق باللغة العربية وعلومها، والعمل على تحقيق ذلك خارجيًّا. إيجاد البيئة الملائمة لتطوير اللغة العربية وترسيخها. العمل على نشر استخدام اللغة العربية، ومتابعة سلامة استعمالاتها في المجالات المختلفة. إحياء تراث اللغة العربية دراسةً وتحقيقًا ونشرًا. العناية بتحقيق الدراسات والأبحاث والمراجع اللغوية ونشرها. تشجيع العلماء والباحثين والمختصين في اللغة العربية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يتولى المجمع المهمات والاختصاصات الآتية: وضع السياسات والاستراتيجيات والخطط والبرامج المتعلقة بنشاطه، وذلك بالتنسيق مع الوزارة، والرفع عمّا يستلزم استكمال إجراءات نظامية في شأنه، ومتابعة تطبيقها بعد اعتمادها. اقتراح مشروعات الأنظمة والتنظيمات المتعلقة باختصاصاته، واقتراح تعديل القائم منها، بالتنسيق مع الوزارة، والرفع لاستكمال الإجراءات النظامية في شأنها. إجراء الدراسات والبحوث ونشر الكتب ذات العلاقة بأهدافه واختصاصاته. إصدار تقارير دورية عن حالة اللغة العربية ومؤشراتها. إصدار المعاجم اللغوية، وإقرار المصطلحات اللغوية وتحديثها، ونشرها عبر الوسائل المختلفة، وتعميمها على الأجهزة الحكومية للاستفادة منها. تشجيع إجراء البحوث والدراسات المتعلقة باللغة العربية. الإسهام في أعمال التعريب وأعمال الترجمة من اللغة العربية وإليها. بناء اختبارات كفاية اللغة العربية وتطبيقها، بالتنسيق مع الجهات ذات العلاقة. بناء مناهج وأدوات وطرق تدريس اللغة العربية لغير الناطقين بها، وتصميم البرامج التعليمية والتدريبية الإثرائية لمهارات اللغة العربية، وتنفيذها. وضع الوسائل المناسبة لخدمة اللغة العربية،
    من برامج ومعامل متخصصة، وتوظيف تقنيات الذكاء الاصطناعي والصوتيات وأدوات التعليم الحديثة، ونحوها. دعم حضور اللغة العربية وتعزيز استخدامها في الهيئات والمنظمات والفعاليات الدولية، وذلك من خلال إطلاق البرامج والمبادرات ونحوها. إثراء المحتوى العربي في الوسائل المختلفة بما يسهم في رفع مستواه العلمي والإعلامي. تحفيز ومساندة منتجي المحتوى العربي، وذلك من خلال إنشاء برامج ومسرعات تابعة للمجمع بالمشاركة مع القطاع الخاص، وتقديم الدعم للبرامج والمسرعات القائمة. تقديم الخدمات والأعمال في المجالات ذات العلاقة باللغة العربية. الإسهام في أرشفة ورقمنة ونشر المخطوطات في المجالات ذات العلاقة باللغة العربية. وضع الخطط المناسبة لإحلال اللغة العربية محل غيرها من اللغات في المجالات المختلفة، ومتابعة تنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه. إصدار المجلات العلمية لنشر البحوث والدراسات المحكّمة ذات الصلة باللغة العربية، وغيرها بما يحقق أهدافه. تأسيس مراكز داخل المملكة وخارجها لتعليم اللغة العربية بعد التنسيق مع الجهات ذات العلاقة، ووفقًا للإجراءات النظامية المتبعة. إنشاء قواعد بيانات لخدمة الأغراض
    ذات العلاقة بمجالات عمله. إقامة مسابقات علمية في اللغة العربية وعلومها. تمثيل المملكة في الهيئات والمنظمات والفعاليات الإقليمية والدولية ذات الصلة باختصاصاته، وفقًا للإجراءات النظامية المتبعة. إقامة المعارض والمؤتمرات وجلسات العمل ذات الصلة باختصاصاته، وفقًا للإجراءات النظامية المتبعة. التعاون والتنسيق مع المجامع والهيئات اللغوية والمصطلحية والهيئات العلمية الأخرى داخل المملكة وخارجها، وذلك في المجالات التي تتفق مع أهدافه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للمجمع مجلس أمناء برئاسة الوزير، وعضوية عشرة من ذوي الخبرة في مجالات عمل المجمع يعينون بأمر من رئيس مجلس الوزراء، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد لمرة واحدة، ويحدد الأمر مكافآتهم ومزاياهم المالية الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يكون المجلس هو السلطة المسؤولة عن رسم السياسة العامة للمجمع في حدود أحكام التنظيم، وله أن يتخذ جميع القرارات اللازمة لتحقيق أهداف المجمع ومهماته، وعلى وجه خاص ما يأتي: إقرار السياسات العامة المتعلقة بنشاط المجمع -بالتنسيق مع الوزارة- والاستراتيجيات والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. الإشراف على تنفيذ المجمع للمهمات المنوطة به. اقتراح مشروعات الأنظمة والتنظيمات المتعلقة باختصاصات المجمع، واقتراح تعديل القائم منها، بالتنسيق مع الوزارة، والرفع لاستكمال الإجراءات النظامية في شأنها. إقرار الهيكل التنظيمي للمجمع. إقرار اللوائح المالية التي يسير عليها المجمع، وذلك بالاتفاق مع وزارة المالية. إقرار اللوائح الإدارية المنظمة لشؤون منسوبي المجمع، وذلك بالاتفاق مع وزارة المالية فيما يتعلق بالأحكام ذات الأثر المالي الواردة فيها. إقرار مكافآت أعضاء المجلس العلمي ومزاياهم وقواعد عملهم. إقرار اللوائح الداخلية والفنية والإجراءات والقواعد والمعايير المتعلقة بنشاط المجمع. إقرار مشروع ميزانية المجمع وحسابه الختامي وتقرير مراجع الحسابات والتقرير
    السنوي؛ تمهيدًا لرفعها بحسب الإجراءات النظامية المتبعة. تحديد المقابل المالي لما يقدمه المجمع من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها. النظر في التقارير الدورية عن سير العمل في المجمع واتخاذ القرارات اللازمة بشأنها. الموافقة على إنشاء الفروع والمكاتب ومراكز تعليم اللغة العربية. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والهدايا والأوقاف، وفقًا للإجراءات المنظمة لذلك. إقرار مجالات تنمية موارد المجمع ومتابعتها بشكل دوري للاستفادة منها، وله الاستعانة بمن يراه من المختصين لتحقيق ذلك. تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم يكلفها بما يراه من مهمات، وله كذلك تفويض بعض اختصاصاته إلى من يراه من أعضائه أو الأمين العام، وفق ما يقتضيه سير العمل فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يعقد المجلس اجتماعاته بصفة دورية برئاسة الرئيس أو من ينيبه من الأعضاء، ويعقد الاجتماع بناءً على دعوة من رئيسه أو بناءً على طلب أغلبية الأعضاء على الأقل وفقًا للوائح الداخلية التي يقرها المجلس، على ألا تقل اجتماعاته عن مرتين في السنة، ولا يكون اجتماع المجلس نظاميًّا إلا بحضور أغلبية أعضائه على الأقل، على أن يكون من بينهم الرئيس أو من ينيبه من الأعضاء. وتصدر القرارات بموافقة أغلبية الأعضاء الحاضرين على الأقل، وعند التساوي يُرجّح الجانب الذي صوت معه رئيس الاجتماع. وللرئيس دعوة من يراه من غير الأعضاء لحضور اجتماعات المجلس دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للمجمع أمين عام من المختصين في اللغة العربية وعلومها يُعين بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى. ويتولى إدارة المجمع في حدود ما يقضي به التنظيم، وما يُقرره المجلس. ويمثله أمام القضاء والهيئات والمؤسسات الأخرى وله تفويض غيره في ذلك. تحدد صلاحيات الأمين العام ومسؤولياته وفقًا للوائح التي يقرها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمجمع مجلس علمي برئاسة الأمين العام، وعضوية عدد لا يتجاوز (عشرين) من المختصين في اللغة العربية وعلومها. يعين أعضاء المجلس العلمي بــقرار من الرئيس، لمدة (أربع) سنوات قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يتولى المجلس العلمي أعمال الدراسة والمراجعة وتقديم الرأي العلمي في جميع المسائل والجوانب اللغوية العامة والمتخصصة، وغيره مما تحدده لوائح المجمع، وما يحال إليه من المجلس أو رئيسه أو الأمين العام. للمجلس العلمي تشكيل لجان دائمة أو مؤقتة من أعضائه يكلفها بما يراه من مهمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يعقد المجلس العلمي اجتماعاته بصفة دورية برئاسة رئيسه أو من ينيبه من الأعضاء، ويعقد الاجتماع بناءً على دعوة من رئيسه أو بناءً على طلب الرئيس أو طلب أغلبية الأعضاء على الأقل، على ألا تقل اجتماعاته عن (أربعة) اجتماعات في السنة، ولا يكون اجتماع المجلس العلمي نظاميًّا إلا بحضور أغلبية أعضائه على الأقل، على أن يكون من بينهم رئيس المجلس العلمي أو من ينيبه من الأعضاء. وتصدر توصياته بموافقة أغلبية الأعضاء الحاضرين على الأقل، وعند التساوي يُرجّح الجانب الذي صوّت معه رئيس الاجتماع. ولرئيس المجلس العلمي دعوة من يراه لحضور اجتماعات المجلس العلمي دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتكون موارد المجمع من المصادر الآتية: أ- الاعتمادات التي تخصص له في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه عن الخدمات والأعمال التي يقدمها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وهدايا وريع الأوقاف. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع أموال المجمع في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. يفتح المجمع حسابًا له في مؤسسة النقد العربي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانيته المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تكون للمجمع ميزانية سنوية مستقلة تعد وتصدر وفقًا لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمجمع هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع جميع منسوبي المجمع لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يرفع المجمع حسابه الختامي السنوي إلى مجلس الوزراء خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويُزوّد الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يرفع المجمع إلى رئيس مجلس الوزراء -خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية- تقريرًا سنويًّا عما حققه من إنجازات خلال السنة المنقضية وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: دون إخلال بحق الديوان العام للمحاسبة في الرقابة على حسابات المجمع، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابه. ويُرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0a8d8ccf-dfc2-49a2-9881-ac3200aec3a0/1
  verified: false
