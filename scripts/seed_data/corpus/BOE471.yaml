regulation:
  code: BOE471
  name_ar: تنظيم مجلس شؤون الأسرة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لأغراض هذا التنظيم، يكون للكلمات والعبارات الآتية المعاني الموضحة قرين كل منها: المجلس : مجلس شؤون الأسرة. الوزير : وزير العمل والتنمية الاجتماعية. الرئيس : رئيس المجلس. الأمين: أمين عام المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يُنشأ مجلس - برئاسة الوزير - باسم "مجلس شؤون الأسرة"، يتولى مهمة رعاية شؤون الأسرة داخل المملكة، ويكون مقره في مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: '1- يشكل المجلس على النحو الآتي: أ - الوزير رئيساً ب ـ ممثل من وزارة الداخلية عضواً ج - ممثل من وزارة الحرس الوطني (برنامج الأمان الأسري الوطني) عضواً د ـ ممثل من وزارة الشؤون الإسلامية والدعوة والإرشاد عضواً هـ ـ ممثل من وزارة العدل عضواً و ـ ممثل من وزارة العمل والتنمية الاجتماعية عضواً ز - ممثل من وزارة الاقتصاد والتخطيط عضواً ح - ممثل من وزارة الصحة عضواً ط ـ ممثل من وزارة الثقافة والإعلام عضواً ي ـ ممثل من وزارة التعليم عضواً ك ـ ممثل من هيئة حقوق الإنسان عضواً ل - اثنان من المختصين والمهتمين بشؤون الطفولة. عضوين م - اثنتان من المتخصصات والمهتمات بشؤون المرأة. عضوين 2 - يختار الرئيس نائباً له من بين أعضاء المجلس. 3 - يجب ألاَّ تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الخامسة عشرة) أو ما يعادلها. 4 - يكون تعيين الأعضاء المشار إليهم في الفقرتين (ل، م) بقرار من مجلس الوزراء بناء على ترشيح من الرئيس، وتكون مدة عضويتهم ثلاث سنوات قابلة للتجديد لمرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يهدف المجلس إلى تعزيز مكانة الأسرة ودورها في المجتمع والنهوض بها، والمحافظة على أسرة قوية متماسكة ترعى أبناءها وتلتزم بالقيم الدينية والأخلاقية والمثل العليا، وله في سبيل تحقيق ذلك ممارسة الصلاحيات والاختصاصات اللازمة وعلى الأخص ما يلي: 1 - إعداد مشروع استراتيجية للأسرة بالتنسيق مع الجهات ذات العلاقة، ورفعه لاستكمال الاجراءات النظامية، ومتابعة تنفيذها وتقويمها بصفة دورية.2 - العمل على قيام الجهات الحكومية والأهلية ذات العلاقة بالأسرة بأدوارها، وتحقيق غاياتها، والتنسيق بينها؛ لتكوين الرؤية المشتركة للأسرة. 3 - التوعية بحقوق أفراد الأسرة وواجباتهم في الإسلام. 4 - تحديد المشكلات والمخاطر التي تتعرض لها الأسرة، والعمل على وضع الحلول المناسبة لها.5 - توعية المجتمع بأهمية قضايا الأسرة، وسبل معالجتها. 6 - تشجيع المشاركة الأهلية في الاهتمام بقضايا الأسرة، وطرح الحلول لمعالجتها.7 - تقديم الرأي للجهات المعنية حيال التقارير الوطنية التي تعد عن الأسرة (الطفولة، والمرأة، وكبار السن) في المملكة. 8 - إبداء الرأي حيال التقارير والدراسات والاستفسارات والتوصيات التي تصدرها الهيئات والمنظمات
    الإقليمية والدولية حول النشاطات والبرامج المتعلقة بشؤون الأسرة، واقتراح المرئيات والتوصيات في شأنها وذلك دون الإخلال باختصاصات الجهات المعنية.9 - إبداء المقترحات في شأن التشريعات ذات العلاقة بالأسرة.10 - إعداد قاعدة معلومات بشؤون الأسرة.11 - التعاون مع الهيئات والمنظمات الإقليمية والدولية المعنية بشؤون الأسرة، والمشاركة في المؤتمرات والندوات التي تعقد لبحث قضايا الأسرة من خلال اللجان المختصة، بحسب الإجراءات المتبعة.12 - التعاون مع مراكز البحوث المحلية والعالمية؛ لإجراء البحوث والدراسات المتعلقة بشؤون الأسرة، بحسب الإجراءات المتبعة. 13 - إقرار اللوائح الداخلية للمجلس بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية. 14 - إقرار الهيكل التنظيمي للمجلس.15 - قبول الهبات والتبرعات والمنح والوصايا والأوقاف التي تقدم للمجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- يجتمع المجلس بدعوة من رئيسه ـ أو نائبه ـ مرتين في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك، أو بطلب من ثلث أعضائه؛ ولا يعد الاجتماع نظاميًّا إلاَّ إذا حضره أغلبية أعضاء المجلس بمن فيهم الرئيس أو نائبه. 2 - تصدر قرارات المجلس وتوصياته بأغلبية الحاضرين من أعضاء المجلس، وعند تساوي الأصوات يُرجَّح الجانب الذي صوَّت معه رئيس الاجتماع. 3 - للمجلس دعوة من يرى الاستعانة بهم لحضور جلساته دون أن يكون لهم حق التصويت. 4 - تعقد اجتماعات المجلس في المقر الرئيس، ويجوز انعقادها في أي مكان آخر يحدده الرئيس. 5 - تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع وأعضاؤه الحاضرون. 6 - لا يجوز للمجلس أن يصدر قرارات بعرضها على الأعضاء متفرقين إلاَّ في حالة الضرورة، ويشترط عندئذ موافقة جميع أعضاء المجلس على القرارات كتابة، وتعرض هذه القرارات على المجلس في أول اجتماع لاحق لإثباتها في محضر الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يُشكّل المجلس ما يلزم من لجان فنية على أن يكون من بينها: أ‌ - لجنة الطفولة. ب‌ - لجنة كبار السن. ج - لجنة المرأة. ويحدد المجلس أعضاء كل لجنة ومهماتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للمجلس أمانة عامة ترتبط بالرئيس، يرأسها أمين عام، يختاره الرئيس، ويخصص لها عدد كافٍ من الموظفين، مع ما يلزم من التجهيزات الإدارية والفنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يتولى الأمين القيام بجميع أعمال الأمانة الإدارية والمالية والفنية التي تخدم أغراض المجلس ويمارس بوجه خاص الصلاحيات والاختصاصات الآتية: 1 - إعداد جداول أعمال المجلس.2 - الإشراف على الدراسات الفنية التي تقوم بها فرق العمل العاملة في الأمانة أو اللجان الفنية أو اللجان الأخرى التي يشكلها المجلس.3 ـ التنسيق مع الجهات الحكومية والأهلية في مجال عمل المجلس.4 ـ إبلاغ قرارات المجلس وتوصياته إلى الجهات المختصة ومتابعة تنفيذها.5 ـ اقتراح القواعد المنظمة لعمل الأمانة في المجالات الفنية والإدارية والمالية ورفعها إلى المجلس لاعتمادها.6 ـ الإشراف على إعداد مشروع ميزانية المجلس، والحساب الختامي, ورفعهما إلى المجلس.7 ـ إعداد تقارير عن عمل المجلس وإنجازاته في نهاية كل سنة مالية ورفعها إلى المجلس.8 ـ إعداد الدراسات والبحوث المتعلقة بأعمال المجلس من خلال لجان فنية متخصصة.9 ـ تمثيل المجلس أمام الجهات القضائية والإدارية وغيرها، وله تفويض غيره بذلك.10- أي عمل آخر يكلفه به المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: '1- يخصص للمجلس ميزانية (قسم) ضمن ميزانية وزارة العمل والتنمية الاجتماعية، ويصرف منها بقرار من الرئيس، وتتكون الموارد المالية للمجلس مما يأتي: أ - ما يخصص له من اعتمادات ضمن ميزانية وزارة العمل والتنمية الاجتماعية. ب - الهبات والتبرعات والمنح والوصايا والأوقاف التي يقبلها المجلس وفقاً للقواعد المنظمة لذلك. 2 - تودع أموال المجلس في حساب مفتوح له في مؤسسة النقد العربي السعودي، ويصرف من هذه الأموال وفق ميزانية المجلس المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع موظفو المجلس لنظام الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يرفع الرئيس تقريراً سنويًّا إلى رئيس مجلس الوزراء عن شؤون الأسرة في المملكة مشتملاً على إنجازات المجلس، والعقبات التي تواجهه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يُعمل بهذا التنظيم بعد تسعين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1c026125-b0b2-4ea7-b374-a9a700f2c0ee/1
  verified: false
