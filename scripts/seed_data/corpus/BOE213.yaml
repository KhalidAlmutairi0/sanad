regulation:
  code: BOE213
  name_ar: نظام المراقبة الصحية في منافذ الدخول
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية ـ أينما وردت في هذا النظام ـ المعاني الموضحة أمام كل منها : اللوائح الصحية الدولية : مجموعة من اللوائح الصحية التي تشكل الإطار القانوني العالمي لمنظمة الصحة العالمية، وتهدف إلى الحيلولة دون انتشار المرض على الصعيد الدولي، والحماية منه ومكافحته ومواجهته، باتخاذ تدابير في مجال الصحة العامة على نحو يتناسب مع الأخطار المحدقة بالصحة العامة ويقتصر عليها، مع تجنب التدخل غير الضروري في حركة المرور الدولي والتجارة الدولية . اللائحة : اللائحة التنفيذية لهذا النظام. السلطة المختصة : سلطة مسؤولة عن تنفيذ التدابير الصحية وتطبيقها في منافذ الدخول . المنطقة المتضررة أو الموبوءة : أي موقع جغرافي توصي منظمة الصحة العالمية باتخاذ تدابير في شأنه . طارئة صحية عامة تسبب قلقاً دوليًّا : حدث استثنائي يشكل خطراً محتملاً على الصحة العامة بسبب انتشار المرض دولياً ، وقد يقتضي استجابة دولية منسقة . الحجر الصحي : تقييد نشاطات أشخاص يشتبه في إصابتهم ، أو أمتعة أو حاويات أو وسائل نقل أو بضائع يشتبه في إصابتها، أو فصل هؤلاء الأشخاص عن غيرهم، أو فصل الأمتعة أو الحاويات
    أو وسائل النقل أو البضائع عن غيرها، بطريقة تؤدي إلى الحيلولة دون انتشار العدوى أو التلوث . العزل : فصل المرضى أو الذين يحملون التلوث عن غيرهم، أو الأمتعة أو الحاويات أو وسائل النقل أو البضائع أو الطرود البريدية الموبوءة عن غيرها، بطريقة تحول دون انتشار العدوى أو التلوث . تلوث : وجود عامل معدٍ أو سامٍّ أو مادة معدية أو سامة في جسم بشريٍّ أو حيوانيٍّ ما أو على سطح ذلك الجسم أو في منتج معدٍّ للاستهلاك أو عليه أو على جمادات أخرى، بما في ذلك وسائل النقل ، قد تشكل أخطاراً محتملة محدقة بالصحة العامة . إزالة التلوث : إجراءٌ تتخذ بموجبه تدابير صحية للقضاء على التلوث . فحص طبي : قيام الممارس الصحي المرخص له بفحص شخص ، أو قيام شخص ما - تحت إشراف السلطة المختصة المباشرة - بالفحص الأولي لتحديد حالته الصحية وما إذا كان يشكل خطراً محتملاً محدقاً على الصحة العامة فيما يخص الآخرين ، وقد يشمل ذلك التدقيق في الوثائق الصحية وإجراء فحص سريري إذا كانت ملابسات الحالة الفردية تقتضي ذلك . تحت الملاحظة : رصد الحالة الصحية لمسافرٍ ما لمدة ما لتحديد الأخطار المحتملة لانتقال المرض . تفتيش : القيام بوساطة السلطة
    المختصة أو تحت إشرافها ، بمعاينة المناطق أو الأمتعة أو الحاويات أو وسائل النقل أو المرافق أو البضائع أو الطرود البريدية بما في ذلك البيانات والوثائق ذات الصلة بها ؛ لتحديد ما إذا كان هناك خطر محتمل على الصحة العامة . مشغل وسيلة النقل : الشخص ذو الصفة الطبيعية أو الاعتبارية المسؤول عن تشغيل وسيلة النقل ، أو الوكيل الذي يمثله. مشتبه فيه : الأشخاص أو الأمتعة أو الحمولات أو الحاويات أو وسائل النقل أو البضائع أو الطرود البريدية التي تعرضت لأخطار محتملة على الصحة العامة أو يمكن أن يكونوا قد تعرضوا لها، ويمكن أن يصبحوا مصدراً محتملاً لانتشار المرض . الإقرار الصحي : بيان يحرره قائد وسيلة النقل حول الوضع الصحي داخلها بمن فيها الأشخاص. حرية الحركة : الترخيص لسفينة أو طائرة أو مركبة نقل بري لدى وصولها بصعود المسافرين على متنها أو بإنزالهم منها أو بتفريغ الشحنات أو الإمدادات أو تحميلها . وسيلة نقل تحت الحراسة الصحية : (سفينة أو طائرة أو مركبة) معزولة لا يجرى معها أي اتصال، إلا بإذن من السلطة المختصة وتحت إشرافها . التدابير الصحية : الإجراءات المطبقة للحيلولة دون انتشار المرض أو التلوث أو العدوى
    ، ولا تشمل إنفاذ القوانين أو التدابير الأمنية . مرور دولي عابر : حركة الأشخاص أو الأمتعة أو الحمولات أو الحاويات أو وسائل النقل أو البضائع أو الطرود البريدية عبر حدود دولية دون هدف الدخول إلى المملكة. نواقل الأمراض وخوازنها : أي حشرة أو أي حيوان آخر يحمل - عادةً - عاملاً معدياً يشكل أخطاراً محتملة محدقة بالصحة العمومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: وزارة الصحة (مركز الاتصال الوطني) هي الجهة المختصة بتنسيق الأمور المتعلقة بهذا النظام مع منظمة الصحة العالمية عن طريق نقطة الاتصال المعنية باللوائح الصحية الدولية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: على السلطة المختصة أن تتخذ الاحتياطات اللازمة نحو كل وسيلة نقل قادمة إلى المملكة إذا تبين لها أن هناك علامات سريرية أو أعراضاً ومعلومات تستند إلى وقائع أو بيانات تدل على أخطار محتملة محدقة بالصحة العامة بما في ذلك مصادر العدوى أو التلوث أو غيرهما ، على متن وسيلة من وسائل النقل ، حيث تعد وسيلة النقل تلك موبوءة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: دون إخلال بالأنظمة والمعاهدات الدولية التي تكون المملكة طرفاً فيها ، على كل سفينة راسية في الموانئ السعودية أن تتخذ التدابير اللازمة التي تراها الجهة المختصة لمنع تلوث المياه عن طريق تصريف مخلفات الصرف الصحي والنفايات وغيرها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تتخذ السلطة المختصة - في منافذ الدخول ـ الإجراءات الكفيلة بمكافحة نواقل الأمراض وخوازنها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: على كل ربان سفينة التأكد دوريًّا من إبادة القوارض والحشرات، ويجب أن يكون لدى ربان السفينة شهادة صحية صالحة بإبادة القوارض والحشرات ما لم يكن قد حصل على شهادة إعفاء من المراقبة الصحية. فإن لم يكن لديه أيّ من الشهادتين ، فإنه يجوز للسلطة المختصة أن تبيد القوارض والحشرات في السفينة ، أو أن تجرى عملية الإبادة تحت إشرافها ورقابتها بالطرق الفنية الواجب اتباعها ، على النحو المبين في اللائحة التنفيذية لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: على كل مشغل وسيلة نقل تصل إلى أحد منافذ المملكة الالتزام ـ عند الوصول والمغادرة ـ بالإجراءات الصحية الموضحة في اللائحة التنفيذية لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على كل مشغل وسيلة نقل تصل إلى أحد منافذ المملكة ، أن يستوفي البيانات الصحية المطلوبة ، بحسب اللوائح الصحية الدولية، ويسلمها إلى السلطة المختصة، وفقاً للنموذج الموضح في اللائحة التنفيذية لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجوز للسلطة المختصة في جميع منافذ الدخول - بالتنسيق مع الجمارك والجهات الأخرى ذات العلاقة - أن تجري التفتيش على وسائط النقل المختلفة عند وصولها ، وكذلك الفحص الطبي على أي شخص مشتبه فيه قادم على رحلة دولية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجوز للسلطة المختصة إجراء التحريات الصحية (إذا اقتضت الحالة ) عن أي سفينة في الميناء . ويجوز لها كذلك إجراء التحريات الصحية إذا كانت السفينة قادمة من ميناء في منطقة موبوءة أو متضررة ، أو قد مرت بهما أثناء رحلتها . وإذا انقضت أكثر من أربعة أسابيع على بدء الرحلة يكتفى بالبيانات الخاصة بالأسابيع الأربعة الأخيرة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تعفى من المعاينة الصحية الوحدات البحرية التابعة للميناء ووسائط النزهة الخاصة أو المعدة للإيجار محليًّا ، على ألا تتصل بموانئ غير سعودية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجوز للسلطة المختصة - استناداً إلى معلومات تدل على وجود حالة طارئة صحية عامة تسبب قلقاً دوليًّا - إذا اشتبهت في وجود نواقل للأمراض وخوازنها على إحدى الطائرات أن تبيدها ، أو يجرى ذلك تحت إشرافها ورقابتها بحسب الشروط الواجب اتباعها ، وفقاً لما هو موضح في اللائحة التنفيذية لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يسمح لأي وسيلة نقل بمغادرة المنفذ الذي يقع في دائرة مهيئة لانتشار أي وباء إلا إذا خضعت للإجراءات التي تطلبها السلطة المختصة وفقاً لأحكام هذا النظام ولائحته التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: إذا اضطرت طائرة للهبوط في ميناء جوي غير الذي تقصده وكانت قادمة من منطقة موبوءة أو متضررة ، فعلى قائد الطائرة أو مشغلها إبلاغ أقرب سلطة عامة أو السلطة المختصة . ويجوز للسلطة المختصة المبلغة بذلك أن تتخذ ما تراه من إجراءات محجرية وفقاً للأسس العلمية والفنية . ويجوز لقائد الطائرة أو مشغلها أن يتخذ ما يكون ضروريًّا من إجراءات للمحافظة على صحة الركاب وسلامتهم . ولا يجوز للطائرة مغادرة مكان هبوطها إلا بعد الترخيص بذلك من السلطة المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: عند وصول أي وسيلة نقل إلى المملكة ، يجب أن ينقل منها للمعالجة أي شخص مريض ، إذا طلبها مشغل وسيلة النقل ورأى الطبيب المسؤول في السلطة المختصة أنها ضرورية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يجوز للسلطة المختصة أن تضع تحت الملاحظة أي شخص يشتبه في مرضه يكون في رحلة دولية قادماً من منطقة موبوءة . ويجوز لها كذلك أن تخضع هذا الشخص للفحص الطبي، وأن تجري التحريات الضرورية للتحقق من حالته الصحية . وعند السماح له بالانتقال إلى منطقة أخرى، فإن عليها إبلاغ السلطة المختصة في المنطقة المنتقل إليها لتتولى متابعته . وتستمر هذه الملاحظة حتى نهاية حضانة المرض المشتبه فيه . ويجب على السلطة المختصة عزل الشخص المشتبه في مرضه إذا رأت أن هناك خطراً بالغاً من انتقال العدوى إلى الآخرين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: للسلطة المختصة في منافذ الدخول المختلفة - عند حدوث حالة طارئة صحية عامة تسبب قلقاً دولياً أو لأغراض الصحة العامة المتمثلة في الحيلولة دون انتشار المرض دولياً - أن تجري الفحص الطبي على أي شخص مسافر في رحلة دولية مشتبه في إصابته أو متضرر ، ويجوز لها منع سفر أي شخص مريض أو يشتبه في مرضه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: لا يجوز اتخاذ التدابير الصحية لأي طائرة تمر مروراً دوليًّا عابراً في أحد مطارات المملكة، إلاّ أنه يمكن قصر مرور هذه الطائرة على منطقة معينة من المطار دون صعود أو تحميل أو تفريغ. ويجوز السماح لهذه الطائرة بالتزود بالوقود والمياه والطعام والإمدادات تحت إشراف السلطة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يجب أخذ الاحتياطات اللازمة المحددة في اللائحة التنفيذية عند دفن الذين يتوفون أثناء عزلهم بسبب إصابتهم بأحد الأمراض ذات الأثر الوخيم على الصحة العامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تخضع الأمتعة والحمولات والحاويات ووسائل النقل والبضائع والطرود البريدية والرفات البشرية للإجراءات الصحية التي تحددها اللائحة التنفيذية لهذا النظام ، وذلك عند قدومها من منطقة موبوءة أو متضررة ، أو إذا توافر للسلطة المختصة معلومات عن احتمال تلوث أي منها بأحد العوامل التي قد تشكل أخطاراً محتملة على الصحة العامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: على جميع المسافرين القادمين على رحلات دولية إلى المملكة ، والمسؤولين عن وسائل النقل المختلفة أو مشغليها في منافذ الدخول ؛ الالتزام بالتعليمات والاشتراطات الصحية الدولية والمحلية لمنع وفادة الأمراض ذات الأثر الوخيم على الصحة العامة . وعلى السلطة المختصة اتخاذ جميع الإجراءات الوقائية والعلاجية اللازمة الموضحة تفصيلاً في اللائحة التنفيذية لهذا النظام ، وذلك عند حدوث أي حالة طارئة صحية تثير قلقاً دوليًّا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: إذا اقتضت الضرورة اتخاذ إجراءات إضافية على وسائل النقل ، فلابد من إبلاغ مشغلي وسائل النقل بتفاصيل هذه الإجراءات قبل اتخاذها ، وتوفير معلومات مكتوبة تتعلق بالطرق التي تتبع ، في حال توافرها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: '1- باستثناء المسافرين الذين يلتمسون الإقامة الدائمة أو المؤقتة ، وأخذاً بأحكام الفقرة (2) من هذه المادة ، لا يجوز فرض أي أجر يتعلق بالتدابير الخاصة بحماية الصحة العامة الآتية: أ - أي فحص طبي تنص عليه اللوائح الصحية الدولية، أو أي فحص تكميلي قد تشترطه الجهة المختصة للتحقق من الحالة الصحية للمسافر الذي يجرى فحصه.ب - أي تطعيم أو أي وسيلة وقائية أخرى تقدم للمسافر عند وصوله ولا تكون شرطاً من الشروط المنشورة الواجب عليه القيام بها أو تكون شرطاً نُشِر قبل التطعيم أو تقديم الوسيلة الوقائية الأخرى بأقل من عشرة أيام.ج - الاشتراطات المناسبة في شأن عزل المسافرين أو فرض الحجر الصحي عليهم.د - أي شهادة تصدر للمسافر وتحدد التدابير المطبقة وتاريخ تطبيقها.هـ - أي تدابير صحية مطبقة على الأمتعة المصاحبة للمسافر. 2- يجوز للسلطات المختصة فرض أجور على التدابير الصحية ، غير تلك المشار إليها في الفقرة (1) من هذه المادة ، بما في ذلك التدابير التي تتخذ أساساً لمصلحة المسافر . وتحدد اللائحة التنفيذية الشروط الخاصة بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يجوز للسلطات المختصة فرض أجور لتطبيق التدابير الصحية لحماية الصحة العامة ، على الأمتعة أو الحمولات أو الحاويات أو وسائل النقل أو البضائع أو الطرود البريدية . وتحدد اللائحة التنفيذية الشروط الخاصة بذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: دون إخلال بأي عقوبة أشد منصوص عليها في أنظمة أخرى ، يعاقب كل من يخالف أي حكم من أحكام هذا النظام ولائحته التنفيذية بغرامة لا تتجاوز خمسمائة ألف (500.000) ريال ، ويتحمل المخالف أو مشغل وسيلة النقل أو مالكها أي ضرر ينتج من مخالفته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تكوّن لجنة بقرار من وزير الصحة، لا يقل عدد أعضائها عن ثلاثة برئاسة مستشار نظامي، للنظر في أي مخالفة لأحكام هذا النظام ولائحته التنفيذية وتقرير العقوبة المناسبة المنصوص عليها في هذا النظام، ورفع قرارها إلى الوزير لاعتماده. ويجوز لمن صدر في حقه قرار بالعقوبة، التظلم منه أمام ديوان المظالم وفقاً لنظامه. وإذا اقترنت المخالفة بارتكاب فعل جرمي فتحال القضية إلى هيئة التحقيق والادعاء العام للتحقيق مع المتهم، تمهيداً لإقامة الدعوى أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يصدر وزير الصحة اللائحة التنفيذية لهذا النظام خلال تسعين يوماً من تاريخ نشره ، وذلك بعد التنسيق مع وزارة الداخلية (حرس الحدود) ، ووزارة المالية (مصلحة الجمارك) ، ووزارة التجارة والصناعة ، ووزارة النقل ، ووزارة الزراعة ، والمؤسسة العامة للموانئ ، والرئاسة العامة لمصلحة الأرصاد وحماية البيئة ، والهيئة العامة للطيران المدني ، والهيئة العامة للغذاء والدواء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يحل هذا النظام محل نظام الحجر الصحي ، الصادر بالأمر الملكي رقم (21 / 1 / 1112) وتاريخ 6 / 5 / 1376هـ ، ويلغي كل ما يتعارض معه من أحكام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يعمل بهذا النظام بعد تسعين يوماً من تاريخ نشره في الجريدة الرسمية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1b787adb-3b1e-4b69-b04d-a9a700f28ca6/1
  verified: false
