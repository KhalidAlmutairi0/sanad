regulation:
  code: BOE043
  name_ar: نظام مكافحة غسل الأموال
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني الموضحة أمام كل منها، ما لم يقتضِ السياق غير ذلك: النظام: نظام مكافحة غسل الأموال. اللائحة: اللائحة التنفيذية للنظام. الأموال: الأصول أو الموارد الاقتصادية أو الممتلكات أيًّا كانت قيمتها أو نوعها أو طريقة امتلاكها -سواء أكانت مادية أم غير مادية منقولة أم غير منقولة ملموسة أم غير ملموسة-والوثائق والصكوك والمستندات والحوالات وخطابات الاعتماد أيًّا كان شكلها؛ سواء أكانت داخل المملكة أم خارجها. ويشمل ذلك النظم الإلكترونية أو الرقمية، والائتمانات المصرفية التي تدل على ملكية أو مصلحة فيها، وكذلك جميع أنواع الأوراق التجارية والمالية، أو أية فوائد أو أرباح أو مداخيل أخرى تنتج من هذه الأموال. الجريمة الأصلية: كل فعل يرتكب داخل المملكة يشكل جريمة معاقباً عليها وفق الشرع أو الأنظمة في المملكة، وكل فعل يرتكب خارج المملكة إذا كان يعد جريمة وفقاً لقوانين الدولة التي ارتكب فيها، ووفقاً للشرع أو أنظمة المملكة فيما لو ارتكب داخلها. المتحصلات: الأموال الناشئة أو المتحصلة -داخل المملكة أو خارجها- بشكل مباشر أو غير مباشر من
    ارتكاب جريمة أصلية، بما في ذلك الأموال التي حولت أو بدلت كلياً أو جزئياً إلى أموال مماثلة. الوسائط: كل ما أُعد أو قصد أو يراد استخدامه أو استخدم فعلاً في ارتكاب جريمة من الجرائم المنصوص عليها في النظام. المؤسسات المالية: كل من يزاول واحداً (أو أكثر) من الأنشطة أو العمليات المالية -التي تحددها اللائحة- لمصلحة عميل أو نيابة عنه. الأعمال والمهن غير المالية المحددة: أي من الأعمال التجارية أو المهنية التي تحددها اللائحة. المنظمات غير الهادفة إلى الربح: أي كيان غير هادف للربح - مصرح له نظاماً - يجمع أموالاً أو يتلقاها أو يصرف منها لأغراض خيرية أو دينية أو ثقافية أو تعليمية أو اجتماعية أو تضامنية أو غيرها من الأغراض. الحجز التحفظي: الحظر المؤقت على نقل الأموال أو تحويلها أو تبديلها أو التصرف فيها أو تحريكها، أو وضع اليد عليها؛ استناداً إلى أمر صادر من المحكمة المُختصة أو السلطة المختصة بذلك. المصادرة: التجريد والحرمان الدائمان من الأموال أو متحصلات الجريمة أو الوسائط؛ بناءً على حكم قضائي صادر من محكمة مختصة. الجهة الرقابية: الجهة المسؤولة عن التحقق من التزام المؤسسات المالية، والأعمال والمهن
    غير المالية المحددة، والمنظمات غير الهادفة إلى الربح؛ بالمتطلبات المنصوص عليها في النظام واللائحة أو أي قرارات أو تعليمات ذات صلة. السلطات المختصة: السلطات الإدارية أو السلطات المختصة بتطبيق الأنظمة أو الجهات الرقابية. الأدوات القابلة للتداول لحاملها: الأدوات النقدية التي تكون في شكل وثيقة لحاملها كالشيكات والسندات الإذنية وأوامر الدفع التي إما لحاملها أو مظهرة له أو صادرة لمستفيد صوري أو في أي شكل آخر ينتقل معه الانتفاع بمجرد تسليمه، والأدوات غير المكتملة التي تكون موقعة وحذف منها اسم المستفيد. المستفيد الحقيقي: الشخص ذو الصفة الطبيعية الذي يمتلك أو يمارس سيطرة فعلية نهائية مباشرة أو غير مباشرة على العميل أو الشخص الطبيعي الذي تُجرى المعاملة نيابة عنه، أو على المؤسسات المالية أو الأعمال والمهن غير المالية المحددة أو المنظمات غير الهادفة إلى الربح أو على أي شخص اعتباري آخر. العميل: من يقوم -أو يَشْرع في القيام- بأي من الأعمال التي تحددها اللائحة مع إحدى المؤسسات المالية أو الأعمال والمهن غير المالية المحددة. علاقة العمل: العلاقة ذات الطابع الاستمراري التي تنشأ بين العميل وأي من المؤسسات
    المالية والأعمال والمهن غير المالية المحددة، المتعلقة بالأنشطة والخدمات التي تقدمها لهم. البنك الصوري: بنك مسجل أو مرخص له في دولة وليس له وجود مادي فيها، ولا ينتسب إلى مجموعة مالية خاضعة للتنظيم والرقابة. التحويل البرقي: معاملة مالية تجريها مؤسسة مالية نيابةً عن آمر التحويل يجري من خلالها إيصال مبلغ مالي إلى مستفيد في مؤسسة مالية أخرى بصرف النظر عما إذا كان آمر التحويل والمستفيد هما الشخص نفسه. تدابير العناية الواجبة: عملية التعرف أو التحقق من معلومات العميل أو المستفيد الحقيقي، التي تمكن المؤسسة المالية والأعمال والمهن غير المالية المحددة من تقويم مدى تعرضها للمخاطر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يعد مرتكباً جريمة غسل الأموال كل من قام بأي من الأفعال الآتية: تحويل أموال أو نقلها أو إجراء أي عملية بها، مع علمه بأنها من متحصّلات جريمة؛ لأجل إخفاء المصدر غير المشروع لتلك الأموال أو تمويهه، أو لأجل مساعدة أي شخص متورط في ارتكاب الجريمة الأصلية التي تحصّلت منها تلك الأموال للإفلات من عواقب ارتكابها. اكتساب أموال أو حيازتها أو استخدامها، مع علمه بأنها من متحصلات جريمة أو مصدر غير مشروع. إخفاء أو تمويه طبيعة أموال، أو مصدرها أو حركتها أو ملكيتها أو مكانها أو طريقة التصرف بها أو الحقوق المرتبطة بها، مع علمه بأنها من متحصلات جريمة. الشروع في ارتكاب أي من الأفعال المنصوص عليها في الفقرات (1) و(2) و(3) من هذه المادة، أو الاشتراك في ارتكابها بطريق الاتفاق أو تأمين المساعدة أو التحريض أو تقديم المشورة أو التوجيه أو النصح أو التسهيل أو التواطؤ أو التستر أو التآمر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يُعد الشخص الاعتباري مرتكباً جريمة غسل الأموال إذا ارتكب باسمه أو لحسابه أي من الأفعال الواردة في المادة (الثانية) من النظام، وذلك مع عدم الإخلال بالمسؤولية الجنائية لرؤساء وأعضاء مجالس إداراته أو مالكيه أو العاملين فيه أو ممثليه المفوضين أو مدققي حساباته، أو أي شخص طبيعي آخر يتصرف باسمه أو لحسابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 1- تعد جريمة غسل الأموال جريمة مستقلة عن الجريمة الأصلية، ولا تلزم إدانة الشخص بارتكاب الجريمة الأصلية من أجل إدانته بجريمة غسل الأموال أو من أجل اعتبار الأموال متحصلات جريمة, سواء ارتكبت الجريمة الأصلية داخل المملكة أو خارجها. 2- يُتحقق من القصد أو العلم أو الغرض في ارتكاب جريمة غسل الأموال من خلال الظروف والملابسات الموضوعية والواقعية للقضية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ تحديد مخاطر احتمال وقوع غسل الأموال لديها وتقييمها وتوثيقها وتحديثها بشكل مستمر، من خلال الجوانب المتعددة للمخاطر بما فيها العوامل المرتبطة بعملائها والدول الأخرى والمناطق الجغرافية والمنتجات والخدمات والمعاملات وقنوات التسليم، وتوفير تقارير عن ذلك للجهات الرقابية عند الطلب. وعليها أن تراعي -عند قيامها بذلك- المخاطر المرتبطة بالمنتجات الجديدة وممارسات العمل والتقنيات قبل استخدامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لا يجوز للمؤسسات المالية أن تفتح أو تحتفظ بحسابات مرقّمة أو مجهولة الاسم أو باسم وهمي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ القيام بالآتي: 1- أن تطبق على عملائها تدابير العناية الواجبة. وتحدد اللائحة الحالات التي تطبق فيها هذه التدابير وأنواعها. 2- أن تحدد نطاق تدابير العناية الواجبة على أساس مستوى المخاطر المرتبطة بالعميل أو الأعمال أو العلاقات التجارية، وأن تطبق تدابير مشددة للعناية الواجبة عندما تكون مخاطر غسل الأموال مرتفعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ استخدام أدوات مناسبة لتحديد ما إذا كان العميل أو المستفيد الحقيقي مكلفاً -أو أصبح مكلفاً- بمهمات عامة عليا في المملكة أو دولة أجنبية أو مناصب إدارية عليا أو وظيفة في إحدى المنظمات الدولية. فإن تبين لها أي من ذلك، فعليها تطبيق تدابير إضافية وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1- على المؤسسات المالية قبل دخولها في علاقة مراسلة مع مؤسسات مالية خارج المملكة؛ التقيّد بالتدابير المناسبة للحد من المخاطر المحتمل وقوعها من هذه العلاقة وفقاً لما تحدده اللائحة، وأن تتأكّد من أن هذه المؤسسات لا تسمح بأن يستخدم حساباتها بنك صوري. 2- على المؤسسات المالية الامتناع عن الدخول -أو الاستمرار- في علاقات مراسلة مع بنك صوري، أو مع مؤسسة مالية خارج المملكة تسمح بأن يستخدم حساباتها بنك صوري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- على المؤسسات المالية التي تمارس نشاط التحويلات البرقية الحصول على المعلومات المتعلقة بآمر التحويل والمستفيد، وحفظ هذه المعلومات مع أوامر التحويل أو الرسائل ذات الصلة من خلال سلسلة الدفع. فإن لم تتمكن المؤسسة المالية من الحصول على تلك المعلومات، فيجب عدم تنفيذ التحويل البرقي. 2- على المؤسسات المالية تسجيل جميع المعلومات المتعلّقة بآمر التحويل والمستفيد الحقيقي والاحتفاظ بالسجلات والمستندات والوثائق والبيانات وفقاً للمادة (الثانية عشرة) من النظام. 3- على المؤسسة المالية الالتزام بأي تدبير إضافي يتعلق بالتحويلات البرقية تنص عليه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 1- على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ تطبيق تدابير العناية الواجبة المشددة المتناسبة مع المخاطر التي قد تنشأ من علاقات عمل ومعاملات مع شخص يأتي من دولة حددتها هي أو حددتها اللجنة الدائمة لمكافحة غسل الأموال بأنها دولة عالية المخاطر. 2- على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ تطبيق التدابير التي تحددها اللجنة الدائمة لمكافحة غسل الأموال فيما يتعلق بالدول عالية المخاطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثانية عشر
  article_text_ar: 1- على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ الاحتفاظ بجميع السجلات والمستندات والوثائق والبيانات، لجميع التعاملات المالية والصفقات التجارية والنقدية, سواء أكانت محلية أم خارجية, وذلك لمدة لا تقل عن عشر سنوات من تاريخ انتهاء العملية أو قفل الحساب. 2- على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ الاحتفاظ بجميع السجلات والمستندات التي حصلت عليها من خلال تدابير العناية الواجبة وبملفات الحسابات والمراسلات التجارية وصور وثائق الهويات الشخصية، بما في ذلك نتائج أي تحليل يجرى, وذلك لمدة لا تقل عن عشر سنوات من تاريخ انتهاء علاقة العمل أو بعد إتمام معاملة لعميلٍ ليس في علاقة عمل قائمة معها. 3- للنيابة العامة -في الحالات التي تراها- إلزام المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ بتمديد مدة الاحتفاظ بالسجلات والمستندات والوثائق والبيانات إلى الحدّ الضروري لأغراض التحقيق الجنائي أو الادعاء. 4- يجب أن تكون السجلات والمستندات والوثائق المحتفظ بها كافية للسماح بتحليل البيانات وتتبع التعاملات المالية, ويجب الاحتفاظ بها لتكون متاحة وتوفر للسلطات
    المختصة عند الطلب بصورة عاجلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ القيام بالآتي: 1- مراقبة المعاملات والوثائق والبيانات وفحصها بشكل مستمرّ لضمان توافقها مع ما لديها من معلومات عن العميل وأنشطته التجارية والمخاطر التي يمثلها، وعن مصادر أمواله عند الحاجة. 2- التدقيق في جميع المعاملات التي تكون معقدة وكبيرة بشكلٍ غير عادي وكذلك أي نمط غير اعتيادي للمعاملات التي لا يكون لها أغراض اقتصادية أو مشروعة واضحة. 3- تشديد إجراءات العناية الواجبة ودرجة وطبيعة مراقبة علاقة العمل في الحالات التي تكون فيها مخاطر احتمال وقوع غسل الأموال مرتفعة؛ وذلك لتحديد ما إذا كانت المعاملة تبدو غير عادية أو مشبوهة. 4- الاحتفاظ بسجلات الفحص مدة عشر سنوات، وإتاحتها للسلطات المختصة عند الطلب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: '1- على المؤسسات المالية، والأعمال والمهن غير المالية المحددة؛ القيام بالآتي: أ‌- وضع سياسات وإجراءات وضوابط داخلية لمكافحة غسل الأموال وتنفيذها بفاعلية من أجل إدارة المخاطر التي حددتها -وفقاً لما ورد في المادة (الخامسة) من النظام- والحدّ منها. على أن تتناسب مع طبيعة أعمالها وحجمها، وأن توافق عليها الإدارة العليا فيها، وأن تراجعها وتعززها بشكل مستمر. ب- تطبيق السياسات والإجراءات والضوابط الداخلية -المذكورة في الفقرة (أ)- على جميع فروعها والشركات التابعة لها التي تملك فيها حصة الأغلبية. 2- تحدد اللائحة ما يجب أن تتضمنه السياسات والإجراءات والضوابط الداخلية لمكافحة غسل الأموال التي تضعها المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح، بموجب الفقرة (1 / أ) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'على المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح - بما في ذلك الأشخاص الذين يقدمون خدمات قانونية أو محاسبية- عند اشتباههم أو إذا توافرت لديهم أسباب معقولة للاشتباه في أن الأموال أو بعضها تمثل متحصلات جريمة أو في ارتباطها أو علاقتها بعمليات غسل الأموال أو في أنها سوف تستخدم في عمليات غسل أموال بما في ذلك محاولات إجراء مثل هذه العمليات؛ أن تلتزم بالآتي: 1- إبلاغ الإدارة العامة للتحريات المالية فوراً وبشكل مباشر، وتزويدها بتقرير مفصل يتضمن جميع البيانات والمعلومات المتوافرة لديها عن تلك العملية والأطراف ذات الصلة. 2- الاستجابة لكل ما تطلبه الإدارة العامة للتحريات المالية من معلومات إضافية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 1- يُحظر على المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح، وأي من مديريها أو أعضاء مجالس إداراتها أو أعضاء إداراتها التنفيذية أو الإشرافية أو العاملين فيها؛ تنبيه العميل أو أي شخص آخر بأن تقريراً بموجب النظام أو معلومات متعلّقة بذلك قد قُدّمت أو سوف تُقدّم إلى الإدارة العامة للتحريات المالية أو أنّ تحقيقاً جنائيًّا جارٍ أو قد أُجري. ولا يشمل ذلك عمليات الإفصاح أو الاتصال بين المديرين والعاملين أو عمليات الاتصال مع المحامين أو السلطات المختصة. 2- لا يترتب على المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح، وأي من مديريها أو أعضاء مجالس إداراتها أو أعضاء إداراتها التنفيذية أو الإشرافية أو العاملين فيها؛ أي مسؤولية تجاه المُبلغ عنه عند إبلاغ الإدارة العامة للتحريات المالية أو تقديم معلومات لها بحسن نية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ترتبط الإدارة العامة للتحريات المالية برئيس أمن الدولة، وتتمتع باستقلالية عملية كافية, وتعمل -بوصفها جهازاً مركزياً وطنياً- على تلقي البلاغات والمعلومات والتقارير المرتبطة بغسل الأموال أو الجرائم الأصلية أو متحصّلات الجريمة وفقاً لما هو منصوص عليه في النظام واللائحة، وتحليل ودراسة هذه البلاغات والتقارير والمعلومات, وإحالة نتائج تحليلها إلى السلطات المختصّة، بشكلٍ تلقائي أو عند الطلب. ويحدد رئيس أمن الدولة الهيكل التنظيمي للإدارة العامة للتحريات المالية، وتحدد اللائحة اختصاصاتها ومهماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 1- للإدارة العامة للتحريات المالية الحصول مباشرة من مقدم البلاغ على أي معلومة إضافية تعينها على تحليلها، وفي الحالات التي لا تكون فيها المؤسسات المالية قد قدمت بلاغاً بموجب المادة (الخامسة عشرة) من النظام أو إذا رغبت الإدارة العامة للتحريات المالية في الحصول على معلومات لا علاقة لها ببلاغ تلقته؛ فإنها تطلب المعلومات من خلال الجهة الرقابية المختصّة، وعلى المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة إلى الربح تقديم ما يُطلب منها بصورة عاجلة. 2- للإدارة العامة للتحريات المالية الحصول على أي معلومة مالية أو إدارية أو قانونية أو أي معلومة ذات صلة, تجمعها أو تحتفظ بها السلطات المختصة -أو من ينوب عنها- وفقاً للأحكام المقررة نظاماً، وترى أنها ضرورية لأداء مهماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'للإدارة العامة للتحريات المالية من تلقاء نفسها أو عند الطلب إحالة المعلومات ونتائج تحليلها إلى السلطات المختصة ذات الصلة عندما تكون هناك أسباب للاشتباه بأنّ معاملة ما مرتبطة بجريمة غسل أموال أو جريمة أصلية ولها الصلاحية التامة لتنفيذ اختصاصاتها بحرية بما في ذلك اتخاذ قرار مستقل بتحليل معلومات معينة وطلبها أو إعادة توجيهها أو إحالتها. المادة العشرون: على كل موظف يعمل في الإدارة العامة للتحريات المالية، أو أي شخص مسؤول أمامها، الالتزام بسرية المعلومات التي يطلع عليها ضمن نطاق أداء واجباته حتى بعد انتهاء مسؤولياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: على كل موظف يعمل في الإدارة العامة للتحريات المالية، أو أي شخص مسؤول أمامها، الالتزام بسرية المعلومات التي يطلع عليها ضمن نطاق أداء واجباته حتى بعد انتهاء مسؤولياته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: للإدارة العامة للتحريات المالية أن تتبادل مع السلطات المختصّة المعلومات التي تحتفظ بها، ولها كذلك الدخول في اتفاقيات أو مذكرات تفاهم مع السلطات المختصة لتسهيل عمليات تبادل المعلومات والتعاون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 1- للإدارة العامة للتحريات المالية أن تتبادل مع أي جهة أجنبية نظيرة أو تطلب منها أي معلومة متصلة بعملها، ولها أن تُبرم -وفقاً للإجراءات النظامية- مع أي جهة أجنبية نظيرة اتفاقاً أو ترتيباً لتسهيل تبادل المعلومات معها. 2- على الإدارة العامة للتحريات المالية عند تقديم معلومات وفقاً لهذه المادة إلى جهة أجنبية نظيرة، أن تحصل منها على إقرار أو تعهّد ملائم بأنّ تلك المعلومات لن تُستخدم إلا للغرض الذي طُلبت من أجله، ما لم تحصل هذه الجهة على موافقة الإدارة العامة للتحريات المالية لاستخدام المعلومات لغرض آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 1- على كل شخص يَقْدُم إلى المملكة أو يغادرها وتكون بحوزته عملات أو أدوات قابلة للتداول لحاملها، أو سبائك ذهبية أو معادن ثمينة أو أحجار كريمة أو مجوهرات مشغولة، أو يُرتِّب لنقلها إلى داخل المملكة أو خارجها من خلال خدمة شحن أو نقل أو خدمة بريدية أو بأي وسيلة أخرى، تبلغ قيمتها (أو تفوق) الحد المنصوص عليه في اللائحة؛ أن يقدم إقراراً بذلك لمصلحة الجمارك العامة، ولمصلحة الجمارك العامة أن تطلب من الشخص معلومات إضافية عن مصدرها أو الغرض من استخدامها. 2- لمصلحة الجمارك العامة ضبط مبلغ العملة أو الأدوات القابلة للتداول لحاملها أو سبائك الذهب أو المعادن الثمينة أو الأحجار الكريمة أو المجوهرات المشغولة لمدة (72) ساعة إذا كان هناك اشتباه في أنها متحصّلات أو وسائط أو أنها مرتبطة بجريمة غسل الأموال أو جريمة أصلية بما في ذلك في حالات المبالغ التي لا تصل إلى حد الإقرار المحدد وفقاً للفقرة (1) من هذه المادة، وحالات عدم الإقرار أو الإقرار الكاذب وفقاً لهذه المادة. 3- لمصلحة الجمارك العامة -عند مخالفة عدم الإقرار أو الإقرار الكاذب, وعدم الاشتباه بارتباطها بجريمة غسل أموال أو جريمة أصلية-
    فرض غرامة وفق ما تحدده اللائحة. 4- للإدارة العامة للتحريات المالية الحصول على كل المعلومات التي تتلقاها مصلحة الجمارك العامة. 5- تحدّد اللائحة القواعد والإجراءات المتعلقة بالإقرار وصلاحيات مصلحة الجمارك العامة في تنفيذ موجباته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'تتخذ الجهات الرقابية في سبيل أدائها لمهماتها ما يأتي: ‌أ- جمع المعلومات والبيانات من المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح؛ وتطبيق الإجراءات الإشرافية المناسبة، بما في ذلك إجراء عمليات الفحص الميداني والمكتبي. ‌ب- إلزام المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح؛ بتوفير أي معلومة تراها الجهة الرقابية ملائمة للقيام بوظائفها، والحصول على نسخ للمستندات والملفات أيًّا كانت طريقة تخزينها وأينما كانت مخزّنة. ‌ج- إجراء تقييم مخاطر احتمال وقوع غسل الأموال في الجهات التي تملك الجهة الرقابية صلاحية مراقبتها. د- إصدار تعليمات أو قواعد أو إرشادات أو أي أدوات أخرى للمؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح؛ تنفيذاً لأحكام النظام. ‌هـ- التعاون والتنسيق مع السلطات المختصة عند تبادل المعلومات الرقابية ذات العلاقة بمجال الإشراف على مكافحة غسل الأموال مع أي جهة أجنبية نظيرة، أو تنفيذ طلبات تتعلق بأعمال رقابية ترد من أي جهة أجنبية نظيرة بالنيابة عنها،
    أو طلب أي معلومة رقابية أو تعاون من أي جهة أجنبية نظيرة. ‌و- التحقق من أنّ المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح؛ تعتمد التدابير المقررة وفقاً لأحكام النظام، وتنفّذها في فروعها الأجنبية والشركات التابعة لها والتي تملك فيها حصة الأغلبية بقدر ما تجيزه أنظمة الدولة التي تقع فيها تلك الفروع والشركات. ‌ز- وضع إجراءات النزاهة والملاءمة وتطبيقها على كل من يسعى إلى المشاركة في إدارة المؤسسات المالية، والأعمال والمهن غير المالية المحددة، والمنظمات غير الهادفة إلى الربح، أو الإشراف عليها أو يسعى إلى امتلاكها أو السيطرة عليها بشكلٍ مباشر أو غير مباشر، أو أن يصبح مستفيداً حقيقياً من حصص كبيرة فيها. ‌ح- الاحتفاظ بإحصاءات عن التدابير المتخذة والعقوبات المفروضة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشدّ، ودون إخلال بأي إجراء منصوص عليه في نظام آخر، للجهة الرقابية عند اكتشاف أي مخالفة -من المؤسسات المالية، أو الأعمال والمهن غير المالية المحددة، أو المنظمات غير الهادفة إلى الربح، أو مديريها أو أيٍ من أعضاء مجالس إداراتها أو أعضاء إداراتها التنفيذية أو الإشرافية- للأحكام المنصوص عليها في النظام أو اللائحة أو القرارات أو التعليمات ذات الصلة, أو أي مخالفة تحال إليها من قبل السلطة المختصة؛ أن تتخذ أو تفرض واحداً (أو أكثر) من الإجراءات أو الجزاءات الآتية: 1- إصدار إنذار كتابي بالمخالفة المرتكبة. 2- إصدار أمر يتضمن الالتزام بتعليمات محددة. 3- إصدار أمر بطلب تقديم تقارير منتظمة عن التدابير المتخذة لمعالجة المخالفة. 4- فرض غرامة مالية لا تتجاوز خمسة ملايين ريال سعودي عن كلّ مخالفة. 5- منع مرتكب المخالفة من العمل في القطاعات التي تملك الجهة الرقابية سلطة الرقابة عليها لمدة تحددها الجهة الرقابية. 6- تقييـد صلاحيات المديرين أو أعضاء مجلس الإدارة أو أعضاء الإدارة التنفيذية أو الإشرافية أو المـلاك المسيطرين، ومن ذلك تعيين مراقب مؤقت واحد أو أكثر. 7- إيقاف
    المديرين أو أعضاء مجلس الإدارة أو أعضاء الإدارة التنفيذية أو الإشرافية، أو طلب تغييرهم. 8- إيقاف النشاط أو العمل أو المهنة أو المنتج، أو تقييد أي منها، أو حظر مزاولته. 9- تعليق الترخيص أو تقييده أو سحبه أو إلغاؤه. وعلى الجهة الرقابية إبلاغ الإدارة العامة للتحريات المالية بما تتخذه من إجراء أو جزاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يعاقب كل من يرتكب جريمة غسل الأموال المنصوص عليها في المادة (الثانية) من النظام؛ بالسجن مدة لا تقل عن سنتين ولا تتجاوز عشر سنوات, أو بغرامة لا تزيد على خمسة ملايين ريال، أو بكلتا العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 'يعاقب كل من يرتكب جريمة غسل الأموال -المنصوص عليها في المادة (الثانية) من النظام- بالسجن مدة لا تقل عن ثلاث سنوات ولا تتجاوز خمس عشرة سنة، أو بغرامة لا تزيد على سبعة ملايين ريال، أو بكلتا العقوبتين؛ إذا اقترنت الجريمة بأي من الآتي: 1- ارتكابها من خلال جماعة إجرامية منظمة. 2- استخدام العنف أو الأسلحة. 3- اتصالها بوظيفة عامة يشغلها الجاني، أو ارتكابها باستغلال السلطة أو النفوذ. 4- الاتجار بالبشر. 5- استغلال قاصر ومن في حكمه. 6- ارتكابها من خلال مؤسسة إصلاحية أو خيرية أو تعليمية أو في مرفق خدمة اجتماعية. 7- صدور أي حكم سابق محلي أو أجنبي بإدانة الجاني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 1- يمنع السعودي المحكوم عليه بعقوبة السجن في جريمة غسل أموال من السفر خارج المملكة مدة مماثلة لمدة السجن المحكوم عليه بها. 2- يبعد غير السعودي المحكوم عليه في جريمة غسل أموال عن المملكة بعد تنفيذ العقوبة المحكوم عليه بها، ولا يسمح له بالعودة إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: إذا قام أحد مرتكبي جريمة غسل الأموال بإبلاغ السلطات المختصة عن الجريمة -قبل علمها بها- أو عن مرتكبيها الآخرين، وأدى بلاغه إلى ضبطهم أو ضبط الأموال أو الوسائط أو متحصلات الجريمة؛ فيجوز تخفيف العقوبة عنه وفقاً لما تقضي به المادة (الثلاثون).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: 'يجوز تخفيف العقوبات الواردة في المادة (السادسة والعشرين) من النظام وفقاً للظروف المُقررة نظاماً، لتكون العقوبة السَّجن لمدة لا تقل عن سنة ولا تتجاوز سبع سنوات، أو غرامة لا تزيد على ثلاثة ملايين ريال، أو كلتا العقوبتين. وذلك متى بادر مرتكب الجريمة بعد علم السلطات المختصة بها بالإبلاغ بمعلومات لم يكن من الممكن الحصول عليها بطريق آخر، وذلك للمساعدة في القيام بأي مما يأتي: ‌أ- منع ارتكاب جريمة غسل أموال أخرى أو الحد من آثارها. ‌ب- تحديد مرتكبي الجريمة الآخرين أو ملاحقتهم قضائيًّا. ‌ج- الحصول على أدلة. د- حرمان الجماعات الإجرامية المنظمة من أموال لا حق لها فيها، أو منعها من السيطرة عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: 1- مع عدم الإخلال بالمسؤولية الجنائية للشخص ذي الصفة الطبيعية، يعاقَب أي شخص ذي صفة اعتبارية يرتكب جريمة غسل الأموال بغرامة لا تزيد على خمسين مليون ريال سعودي ولا تقل عن ضعف قيمة الأموال محل الجريمة. 2- يجوز معاقبة الشخص ذي الصفة الاعتبارية بمنعه بصفة دائمة أو مؤقتة من القيام بالنشاط المرخص له به بصورة مباشرة أو غير مباشرة، أو بإغلاق مكاتبه التي اقترن استخدامها بارتكاب الجريمة بصفة دائمة أو مؤقتة، أو بتصفية أعماله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يجوز تضمين الحكم الصادر بالعقوبة النص على نشر ملخصه على نفقة المحكوم عليه في صحيفة محلية تصدر في مقر إقامته، فإن لم تكن في مقره صحيفة ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع الجريمة المرتكبة وجسامتها وتأثيرها، على أن يكون نشر الحكم بعد اكتسابه الصفة النهائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: '1- مع عدم الإخلال بحقوق الغير الحسن النية، يصادر بحكم قضائي في حال الإدانة بجريمة غسل أموال أو جريمة أصلية ما يأتي: ‌أ- الأموال المغسولة. ب- المتحصلات. فإن اختلطت بأموال اكتسبت من مصادر مشروعة فيصادر منها ما يعادل القيمة المقدرة لها. ‌ج- الوسائط. 2- تحكم المحكمة المُختصة بمصادرة الأموال المرتبطة بجريمة غسل أموال بصرف النظر عما إذا كانت في حيازة أو ملكية مرتكب الجريمة أو طرف آخر. ولا يجوز مصادرتها متى أثبت صاحبها أنّه حصل عليها لقاء ثمن عادل أو مقابل تقديمه خدمة تتناسب مع قيمتها أو حصل عليها بناءً على أسباب مشروعة أخرى وأنّه كان يجهل مصدرها غير المشروع. 3- للمحكمة المختصة إبطال بعض الأنشطة أو الأعمال، أو منع تنفيذها -سواء كانت تعاقدية أو غير ذلك- متى علم أطرافها أو أحدهم -أو كان لمثلهم أن يعلموا- بأن هذه الأنشطة أو الأعمال من شأنها أن تؤثر على قدرة السلطات المختصة في استرداد الأموال الخاضعة للمصادرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: تحكم المحكمة المختصة بمصادرة الأموال المرتبطة بجريمة غسل أموال التي لا تستند على إدانة في حال تعذر محاكمة مرتكب الجريمة بسبب وفاته أو هربه أو غيابه أو عدم تحديد هويته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 1- إذا كانت مصادرة الأموال المرتبطة بجريمة غسل أموال غير ممكنة لكونها لم تعد متوافرة للمصادرة أو لا يمكن تحديد مكانها؛ فتحكم المحكمة المختصة بمصادرة أموال أخرى يملكها مرتكب الجريمة تماثل قيمة تلك الأموال. 2- إذا كانت قيمة متحصلات الجريمة المحكوم بمصادرتها -وفقاً للمادة (الثالثة والثلاثين) من النظام- أقل من قيمة المتحصلات الناشئة من الجريمة الأصلية؛ فعلى المحكمة المختصة أن تحكم بالمصادرة من الأموال الأخرى لمرتكب الجريمة ما يكمل قيمة المتحصلات المحكوم بمصادرتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: ما لم ينص نظام آخر على غير ذلك, تؤول الأموال المصادَرة إلى الخزينة العامة، وتظل هذه الأموال مُحملة في حدود قيمتها بأي حقوق تتقرر بصورة مشروعة لأي طرف آخر حسن النية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: إذا حكم بمصادرة الأموال أو المتحصلات أو الوسائط المستخدمة أو التي اتجهت النية لاستخدامها أو استردادها وفقاً لأحكام النظام وكانت غير واجبة الإتلاف، فللسلطة المختصة التصرف بها وفقاً للنظام، أو اقتسامها مع الدول التي تربطها مع المملكة اتفاقيات أو معاهدات سارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يجوز للسلطات المختصة إصدار الطلبات إلى الجهات الأجنبية النظيرة وتبادل المعلومات معها والقيام بالتحريات نيابةً عنها في الدول التي تربطها بالمملكة اتفاقيات سارية، أو تبعاً لمبدأ المعاملة بالمثل، وذلك وفقاً للإجراءات النظامية المتبعة ودون أن يشكل ذلك إخلالاً بالسيادة الوطنية للدولة أو بالأعراف والأنظمة المتعلقة بسرية المعلومات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: للسلطات المختصة -بناءً على طلب من محكمة أو سلطة مختصة في دولة أخرى تربطها بالمملكة اتفاقية سارية أو تبعاً لمبدأ المعاملة بالمثل- أن تُقدم المساعدة في التحقيقات والادعاءات والإجراءات المرتبطة بغسل الأموال والجرائم الأصلية بما في ذلك -على سبيل المثال لا الحصر- المساعدة في تعقّب الأموال أو المتحصلات أو الوسائط المرتبطة بجريمة غسل الأموال أو الجريمة الأصلية والتحفظ عليها ومصادرتها واستردادها أو التسليم المراقب وفق الأنظمة المعمول بها في المملكة، على أن تبين اللائحة أنواع المساعدة الإضافية التي يمكن تقديمها، والشروط التي يجب أن تلبيها الدولة الطالبة، والإجراءات التي يجب تطبيقها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يجوز للسلطات المختصة الاعتراف والتنفيذ لأي حكم قضائي نهائي ينص على مصادرة الأموال أو المتحصلات أو الوسائط المتعلقة بجرائم غسل الأموال أو الجريمة الأصلية، يصدر من محكمة مختصة بدولة أخرى تربطها بالمملكة اتفاقية سارية أو تبعاً لمبدأ المعاملة بالمثل، وذلك إذا كانت الأموال أو المتحصلات أو الوسائط التي نص الحكم بمصادرتها؛ جائزاً إخضاعها للمصادرة وفقاً للنظام المعمول به في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: يجوز تسلم المتهم أو المحكوم عليه في جريمة غسل الأموال من دولة أخرى وتسليمه إليها، على أن يكون التسليم إعمالاً لاتفاقية سارية بين المملكة والدولة الطالبة، أو بناءً على مبدأ المعاملة بالمثل، وإذا رفض طلب تسليم مطلوب في تلك الجريمة, فتحاكمه المحاكم المختصة في المملكة، ويستعان في هذا الشأن بالتحقيقات التي تقدمها الدولة طالبة التسليم, وتوضح اللائحة آلية التسلم والتسليم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: تقوم اللجنة الدائمة لطلبات المساعدة القانونية المتبادلة بتلقي طلبات المساعدة القانونية المتبادلة المتعلقة بجرائم غسل الأموال والجرائم الأصلية المرتبطة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: 1- للنيابة العامة -بمبادرةٍ منها أو بناءً على طلب رجل الضبط الـجنائي- أن تطلب من أي شخص أو من المؤسسات المالية -عبر الجهات الرقابية- أو الأعمال والمهن غير المالية المحددة، أو المنظمات غير الهادفة إلى الربح؛ توفير سجلات أو مستندات أو معلومات، وعلى الجهة المطلوب منها ذلك تنفيذه بشكل صحيح ودقيق كما هو محدد في الطلب من دون تأخير. وتوضح اللائحة آليات تنفيذ تلك الطلبات. 2- على من يتبلغ بالطلب المنصوص عليه في الفقرة (1) من هذه المادة، عدم الإفصاح لأيّ شخص عن هذا الطلب أو ما يتعلق بتنفيذه إلا لشخص معني فيه، أو لموظّف آخر أو عضو من أعضاء الإدارة للحصول على المشورة، أو تحديد الخطوات الضرورية لتنفيذ الطلب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: 1- للنيابة العامة -بمبادرة منها أو بطلب من الإدارة العامة للتحريات المالية أو رجل ضبط جنائي بناءً على الاشتباه في جريمة غسل أموال أو جريمة أصلية- أن تأمر بالحجـز التـحـفـظي على الأموال محل المصادرة أو التي قد تصبح محلاً للمصادرة، لمدة لا تتجاوز (ستين) يوماً. ويُصدَر الأمر، ويطبق من دون إشعار مسبق للطرف المعني. ويمكن تمديد الأمر مدة أطول بموجب أمر قضائي صادر من المحكمة المختصّة مع عدم الإخلال بحقوق أي طرف آخر حسن النيّة. 2- للنيابة العامة -عند إصدار أمر الحجز التحفظي- أن تُبقي الأموال المحجوزة تحت إدارة صاحب المصلحة فيها أو أي طرف آخر، أو أن تطلب من المحكمة المختصة الأمر بنقل هذه الأموال إلى جهة مختصة للحد من احتمال اختفائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: مع عدم الإخلال بما يتضمنه نظام الإجراءات الجزائية، للنيابة العامة -بمبادرة منها أو بناء على طلب رجل ضبط جنائي- إصدار مذكّرة تسمح لرجل الضبط الجنائي أو المحقق بدخول المساكن أو المكاتب أو مقر الجهة المبلغة؛ لتفتيشها والبحث والقبض على الأشخاص أو للبحث عن الأموال أو حجزها أو الممتلكات أو الوثائق أو الأدلة أو المعلومات المرتبطة بجريمة أصلية أو جريمة غسل أموال في أي وقت خلال المدة المحددة في إذن التفتيش. وفي حالة الضرورة لا يلزم الحصول على إذن للقيام بذلك، على أن يدوَّن محضر توضح فيه الأسباب ودواعي الاستعجال، على أن يتم إصدار الأمر بموجب هذه المادة من طرف واحد ودون سابق إنذار للطرف المعني. وتبلغ النيابة العامة الجهة المشرفة على الجهات المبلغة بالإجراءات المتخذة بناءً على هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: مع عدم الإخلال بما يتضمنه نظام الإجراءات الجزائية، للنيابة العامة بمبادرة منها أو بطلب من رجل الضبط الجنائي، أن تصدر أمراً مسبباً يسمح لرجل الضبط الجنائي أو المحقق بمراقبة وضبط وتسجيل واعتراض وحجز والوصول إلى كافة أشكال الأدلّة والسجلات والرسائل بما فيها الخطابات والمطبوعات والطرود وسائر وسائل الاتصال والمحادثات الهاتفية والمعلومات والبيانات المخزنة في أجهزة الحاسب الآلي المحددة في الأمر، سواء أكان ذلك في جريمة أصلية أو في جريمة غسل أموال. كما يجوز لها إصدار أمر بموجب هذه المادة من طرف واحد ودون سابق إنذار للطرف المعني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: تتولى المحكمة المختصة الفصل في جميع الجرائم الواردة في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: تتولى النيابة العامة التحقيق والادعاء أمام المحكمة المختصة في الجرائم الواردة في النظام. ولها إصدار قواعد وإرشادات للجهات الخاضعة لإشرافها وفقاً لنظام الإجراءات الجزائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: يتولى رجال الضبط الجنائي -كلٌّ وفق اختصاصه- القيام بالبحث والتحري وجمع الأدلة في الجرائم الواردة في النظام بالإضافة إلى الملاحقة الجنائية والإدارية من أجل تحديد متحصلات الجريمة أو وسائطها أو تعقّبها أو التحفظ عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: '" المادة التاسعة والأربعون - مكرر"'
  article_text_ar: '- أُضيفت هذه المادة وذلك بموجب المرسوم الملكي رقم (م/223) وتاريخ 1447/10/27هـ، بالنص الآتي: " تقوم اللجنة الدائمة لمكافحة غسل الأموال بوضع وتنسيق سياسات وطنية عامة قائمة على المخاطر في مجال مكافحة غسل الأموال ومراجعة تلك السياسات وتحديثها دوريًّا واتخاذ التدابير اللازمة بشأنها وتطويرها على أساس الالتزامات والمتطلبات والمستجدات الدولية، وكذلك تقييم مخاطر غسل الأموال ويشمل ذلك البلدان عالية المخاطر، ويصدر محافظ البنك المركزي السعودي اللائحة الداخلية للجنة الدائمة لمكافحة غسل الأموال ".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: يصدر رئيس أمن الدولة بالاتفاق مع وزير المالية والنائب العام اللائحة, خلال مدة لا تتجاوز (تسعين) يوماً من تاريخ صدور النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: 1- يحل هذا النظام محل نظام مكافحة غسل الأموال، الصادر بالمرسوم الملكي رقم (م/31) وتاريخ 11/5/1433هـ. 2- يُعمَل بهذا النظام من اليوم التالي لتاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0657dfce-95f8-463a-9d87-aa3900ec7b51/1
  verified: false
