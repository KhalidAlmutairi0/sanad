articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: النادي: نادي سباقات الخيل. التنظيم: تنظيم النادي. المجلس: مجلس إدارة النادي. الرئيس: رئيس المجلس. سباق الخيل: رياضة سباق خيل السرعة. خيل السرعة: الخيل المخصصة لسباق السرعة المسجلة في كتاب أنساب الجواد السعودي أو السجلات الرسمية بالمملكة أو سجلات الجهات الدولية المختصة. رعاية الخيل: تقديم الرعاية الصحية والغذائية للخيل، والعناية بها، والمحافظة عليها، ومتابعة شؤون إنتاجها. المربي: شخص ذو صفة طبيعية أو اعتبارية يقوم برعاية خيل السرعة سواءً أكانت مملوكة له أم لغيره. الخيَّال/الفارس: شخص مرخص له بالمشاركة في سباق الخيل، أو التمرن لذلك. الرخصة: وثيقة يصدرها النادي تخول صاحبها ممارسة نشاط معين داخل في اختصاصات النادي. الوثائق: جميع المستندات الخاصة بخيل السرعة، ومنها: جوازات السفر، وسجل المشاركات، وشهادة التلقيح (الشبأ)، وتراخيص الاستيراد أو التصدير. المضمار: أرض مخصصة لممارسة سباق الخيل وفق الأنظمة الدولية. الميدان: مكان مخصص لممارسة سباق الخيل يضم مضمارًا أو
    أكثر، وإسطبلات، ومرافق متعددة مهيأة لهذا الغرض.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع النادي بالشخصية الاعتبارية، والاستقلال المالي والإداري، بوصفه كيانًا ذا نفع عام، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع أو مكاتب داخل المملكة، أو خارجها بالتنسيق مع وزارة الخارجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف النادي إلى إقامة سباق الخيل وتنظيمه وتطويره، وتشجيع الاهتمام به والاستثمار فيه. وللنادي في سبيل تحقيق ذلك -دون إخلال باختصاصات الجهات الأخرى ذات العلاقة- على وجه خاص القيام بما يأتي: العمل على أن تكون المملكة الوجهة العالمية الأولى لسباق الخيل. إقامة سباقات الخيل داخل المملكة، وترتيب المشاركات الخارجية فيها، بالتنسيق مع الجهات المختصة. نشر ثقافة سباق الخيل، والتشجيع على اقتناء خيل السرعة ورعايتها وإنتاجها والمشاركة بها في سباقات الخيل المحلية والدولية. إصدار اللوائح والاشتراطات الخاصة بجميع ما يتعلق بسباق الخيل، وخيل السرعة المهجنة. وضع الخطط -بالتعاون مع الجهات ذات العلاقة- لتطوير سباق الخيل. اعتماد جميع برامج سباق الخيل وجداوله. الإشراف المالي والإداري على الميادين، في حدود ما يقضي به التنظيم، وبما لا يخل باختصاصات الجهات ذات العلاقة، ويكفل مباشرتها لاختصاصاتها. التعاون مع الجهات المختصة الأخرى في مجال الفروسية؛ لإقامة السباقات والفعاليات الخاصة المصاحبة لسباق الخيل. تقييد جميع بيانات خيل السرعة المهجنة وسلالاتها في كتاب أنساب الجواد السعودي، وربط تلك البيانات
    بالمنظمات الدولية المختصة. بناء قواعد معلومات إلكترونية خاصة بخيل السرعة، وتسجيل بيانات خيل السرعة فيها، بالتعاون مع الجهات المختصة محليًّا ودوليًّا. إصدار الوثائق الخاصة بخيل السرعة المهجنة. إصدار الموافقات اللازمة لاستيراد خيل السرعة المهجنة أو تصديرها، وفقًا للأنظمة والتعليمات ذات العلاقة. إصدار جميع أنواع التراخيص المتعلقة بسباق الخيل، وخيل السرعة، ومن ذلك ما يأتي: أ- رخص أندية سباق الخيل في المملكة. ب- رخص الميادين والمضامير الأهلية. ج- رخص خيالة/فرسان، ومدربي، سباق الخيل. د- رخص إنشاء الإسطبلات الخاصة بخيل السرعة. هـ- رخص مربي خيل السرعة. و- رخص مراكز ومدارس تدريب سباق الخيل. إقامة المهرجانات والفعاليات والمعارض والمؤتمرات ذات الصلة بسباق الخيل وخيل السرعة، ومنح الإذن بإقامتها والإشراف عليها، والمشاركة فيها داخل المملكة وخارجها، بعد أخذ الموافقات اللازمة لذلك. تقديم الخدمات الاستشارية والدورات التدريبية في حدود اختصاصاته. التعاون مع الهيئات والمنظمات الإقليمية والدولية ذات الصلة بنشاط النادي، وفقًا للأحكام النظامية المنظمة لذلك. التعاون مع الجامعات والكليات ومراكز البحث العلمي
    والمؤسسات البيطرية؛ لإجراء الدراسات والأبحاث العلمية ذات الصلة بخيل السرعة. تمثيل المملكة في جميع المنظمات والهيئات والمحافل والمؤتمرات الدولية والإقليمية ذات الصلة باختصاص النادي، وفقًا للأحكام النظامية المنظمة لذلك. إقامة المزادات الخاصة بخيل السرعة، والترخيص للأشخاص والجهات بإقامتها، والإشراف عليها، وذلك بعد أخذ الموافقات اللازمة. الإسهام في التعريف بالتراث الحضاري للمملكة في مجال سباق الخيل، ودعم السياحة المتخصصة فيه، بالتنسيق مع الجهات ذات العلاقة. الاستثمار، وتأسيس الشركات أو المساهمة في تأسيسها أو الدخول فيها أو الاستحواذ عليها، وذلك وفقًا للإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للنادي مجلس إدارة يشكل من رئيس يعين بأمر من رئيس مجلس الوزراء، وأعضاء على النحو الآتي: أ- عدد لا يتجاوز (ستة) يمثلون جهات حكومية ذات علاقة بنشاط النادي. ب- عدد لا يتجاوز (ثلاثة) من المهتمين والمتخصصين وذوي الخبرة في المجالات ذات العلاقة بنشاط النادي. يصدر بتعيين أعضاء المجلس وتحديد الجهات المشار إليها في الفقرة (1) من هذه المادة أمر من رئيس مجلس الوزراء بناءً على اقتراح من الرئيس، وتكون مدة عضوية الأعضاء في المجلس (ثلاث) سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على شؤون النادي وتصريف أموره في حدود التنظيم، وله أن يتخذ جميع القرارات اللازمة لتحقيق أهدافه ومهماته، وله على وجه خاص ما يأتي: الإشراف العام على سير العمل في النادي، والنظر في التقارير الدورية عن سير العمل فيه، واتخاذ القرارات اللازمة في شأنها. الموافقة على السياسات العامة المتعلقة بالنادي. الموافقة على الخطط والبرامج والمشروعات اللازمة لتحقيق أهداف النادي وتنفيذ مهماته. الموافقة على استثمار أموال النادي بما يحقق أهدافه، وفقًا للأحكام المنظمة لذلك. الموافقة على اللوائح والاشتراطات الخاصة بسباق الخيل، وخيل السرعة المهجنة. تحديد أنواع العضوية في النادي وشروطها ورسوم اشتراكها. تحديد المقابل المالي لما يقدمه النادي من خدمات وأعمال -في مجال نشاطه- يرى المجلس استحصال مقابل مالي عنها. الموافقة على هيكل النادي التنظيمي، واللوائح الإدارية والمالية اللازمة -بالاتفاق مع وزارة المالية فيما يتعلق باللوائح المالية، والأحكام ذات الأثر المالي الواردة في اللوائح الإدارية- وغيرها من اللوائح الفنية اللازمة لتسيير شؤونه. قبول الهبات والتبرعات والمنح والوصايا والأوقاف،
    وفق الإجراءات المنظمة لذلك. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات والانضمام للبروتوكولات، والمعاهدات، وتوقيع العقود، وفق الإجراءات النظامية المنظمة لذلك. اقتراح مشروعات الأنظمة والقرارات ذات العلاقة باختصاص النادي، واقتراح تعديل المعمول به منها. الموافقة على مشروع ميزانية النادي وحسابه الختامي والتقرير السنوي. الموافقة على إنشاء فروع أو مكاتب للنادي. الموافقة على الاستثمار، وتأسيس الشركات أو المساهمة في تأسيسها أو الدخول فيها أو الاستحواذ عليها، وذلك وفقًا للإجراءات النظامية. وللمجلس في سبيل تحقيق هذه الاختصاصات تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض بعض صلاحياته إلى رئيسه أو إلى من يراه من أعضائه أو من العاملين في النادي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع المجلس (مرتين) في السنة على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، وإذا طلب ذلك (ثلث) أعضائه على الأقل، ولرئيس المجلس أن ينيب من يراه من الأعضاء في المجلس لرئاسة الاجتماعات في حال غيابه، ويوجه الرئيس الدعوة إلى الاجتماع -كتابةً- قبل موعده بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. ويُشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه. وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. يجوز -عند الحاجة وفي الحالات المستعجلة ووفقًا لما يقدره الرئيس- أن تعقد الاجتماعات وأن يصوت على القرارات عن بعد من خلال استخدام وسائل التقنية، ويمكن أن تُتخذ القرارات بطريق التمرير على الأعضاء والتوقيع عليها بما يفيد باطلاع جميع الأعضاء عليها، ولا تعد القرارات الصادرة بهذه الطريقة صحيحة ما لم تمرر على جميع أعضاء المجلس ويصوت عليها من جميع الأعضاء وتحزْ -على الأقل- على أغلبية أصواتهم. للرئيس أو من يفوضه بذلك دعوة من يراه من أهل الاختصاص والخبرة لحضور اجتماعات المجلس، وتقديم
    المعلومات والرأي والمشورة، دون أن يكون له حق التصويت. يُمنع تصويت أي عضو على قرار له فيه مصلحة مباشرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للنادي رئيس تنفيذي، يعين ويعفى من منصبه بقرار من المجلس، ويُحدد القرار أجره ومزاياه المالية الأخرى، وهو المسؤول التنفيذي عن إدارة النادي، وتمثيله أمام القضاء -أو من يفوضه-، والجهات الحكومية، والجهات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وتتركز مسؤولياته في حدود أحكام التنظيم وما يمنحه المجلس من صلاحيات، وللرئيس التنفيذي أن يُفوض بعض صلاحياته إلى من يراه من منسوبي النادي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتكون موارد النادي المالية مما يأتي: أ- ما يخصص له في الميزانية العامة للدولة من إعانات. ب- المقابل المالي للخدمات والأعمال التي يقدمها. ج- عوائد استثمار موارده المالية المتاحة.د- رسوم اشتراكات العضوية فيه. ه- ما يقبله المجلس من هبات أو تبرعات أو منح أو وصايا أو أوقاف. و- أي مورد آخر يقره المجلس بما لا يُخالف الأنظمة والتعليمات. تودع جميع إيرادات النادي في حساب جاري وزارة المالية لدى مؤسسة النقد العربي السعودي. يفتح النادي حسابًا له في مؤسسة النقد العربي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية النادي المعتمدة ولوائحه المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: السنة المالية للنادي هي السنة المالية للدولة. واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يُعامل النادي من حيث إعفاء وارداته من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات والهيئات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع العاملون في النادي لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يرفع النادي إلى مجلس الوزراء حسابه الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويُزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يرفع النادي إلى رئيس مجلس الوزراء خلال (تسعين) يومًا من بداية كل سنة مالية تقريرًا سنويًّا عما حقَّقه من إنجازات خلال السنة المنقضية، وما واجهه من صعوبات، وما يراه من مقترحات لتحسين سير عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة بالرقابة على حسابات النادي وعملياته، يُعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات النادي ومعاملاته، وبياناته، وميزانيته السنوية، وحسابه الختامي، ويُحدِّد المجلس أتعابه، ويُرفع تقرير مراجع الحسابات إلى المجلس، ويُزوَّد الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يُنشر التنظيم في الجريدة الرسمية، ويُعمل به من تاريخ نشره، ويُلغي نظام (نادي الفروسية بالرياض) الصادر عام 1386ه، وما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2361f142-d009-41e9-ac3e-ac3200e13f0b/1
  verified: false
