articles:
- article_ref: المادة 1
  article_text_ar: يسمى هذا النِظام (نظَام خدمة الضباط) وتتناول أحكامه القواعد التي تنظم خدمة الضباط العاملين في القوات المسلحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 2
  article_text_ar: 'تعني الكلمات والعبارات التالية المعاني المذكورة أدناه ما لم يرد النص أو يدل السياق على خلاف ذلك. أ- المملكة: – المملكة العربية السعودية. ب- الوزير: – وزير الدفاع والطيران والمفتش العام. ج- القوات المسلحة: – وتشتمل على جميع القوات البرية والجوية والبحرية المرتبطة أو التي ترتبط بوزارة الدفاع والطيران. د- الضابط: – هو الحائز على رتبة عسكرية بموجب أحكام هذا النِظام. هـ- الضابط الركن: – هو الضابط المتخرج من كلية القيادة والأركان السعودية أو ما يعادلها من كليات الأركان الأخرى. و- الضابط الطبيب: – هو الضابط المتخرج من كلية طب معترف بها ويسري على أطباء الأسنان والصيادلة والبيطريين ما يسري على الأطباء من أحكام بموجب هذا النِظام. ز- الضابط المهندس: – هو الضابط من كلية هندسة معترف بها. ح- الضابط الفني: – هو الضابط الحائز على شهادة تخصص في مجال عمله من أحد المعاهد الفنية أو المهنية التي تحدد بقرار من الوزير. وعلى سبيل المثال يكون ضابطاً فنياً كل من حمل المؤهل المقبول بإحدى الفنون التالية :- ميكانيكاً الدبابات والطائرات والسيارات والقطع البحرية. التسليح: ويشمل الأسلحة الصغيرة والثقيلة
    والآلات الدقيقة. الهندسة المساحية. الكهرباء. الإشارة وصيانتها مع أجهزتها. الذخيرة والأجهزة الفنية كأجهزة الطائرات وما في حكمها. الرادار. الموسيقى. تخزين معدات الطائرات والمعدات الفنية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 3
  article_text_ar: تكون الرتب العسكرية للضباط في القوات المسلحة كما يلي :- ملازم. ملازم أول. نقيب. رائد. مقدم. عقيد. عميد. لواء. فريق. فريق أول. فيما عدا فريق وفريق أول تضاف كلمة (طيار) إلى الرتبة للضباط الطيارين في القوات الجوية وكلمة (بحري) لضباط القوات البحرية وكلمة (طبيب) للضباط الأطباء وكلمة (مهندس) للضباط المهندسين وكلمة (فني) للضباط الفنيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 4
  article_text_ar: 'يشترط في تعيين الضابط توفر الشروط التالية : أ- أن يكون سعودي الأصل والمنشأ والولادة ويستثنى من شرط المنشأ والولادة من ولد أو نشأ مع والده أثناء خدمته للدولة خارج المملكة. ب- قد أكمل التاسعة عشرة من عمره. ج- أن يكون لائقاً طبياً وسالماً من الأمراض المعدية ومن الأمراض والعاهات الجسمية والعقلية. د- أن يكون حائزاً على المؤهلات المطلوبة في هذا النِظام. هـ- أن يكون حسن الأخلاق والسمعة وغير محكوم عليه بحد شرعي أو في جريمة مخلة بالشرف أو الأمانة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 5
  article_text_ar: يتم التعيين بقرار من القائد الأعلى للقوات المسلحة بناءً على اقتراح رئيس مجلس الوزراء وبعد توصية الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 6
  article_text_ar: يعين في رتبة الملازم :- أ- خريجو الكليات العسكرية أو المؤسسات العسكرية السعودية التي تعادل شهاداتها شهادات الكليات العسكرية السعودية. ب- خريجو الكليات أو المعاهد العسكرية الأجنبية التي تعادل شهاداتها شهادات الكليات العسكرية السعودية. ج- خريجو إحدى الكليات العلمية أو النظرية أو المعاهد الفنية ممن تحتاج القوات المسلحة إلى اختصاصاتهم. د- يجوز الاستثناء من شرط المؤهل المنصوص عليه فيما سبق بقرار من مجلس الوزراء. وبالنسبة لخريجي الكليات والمعاهد المنصوص عليها في الفقرتين (ب،ج) يشترط أن يكون المتخرج حاصلاً على شهادة إتمام الدراسة الثانوية أو ما يعادلها قبل التحاقه بالكلية أو المعهد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 7
  article_text_ar: بالنسبة للمتخرج من الكليات والمعاهد المنصوص عليها في الفقرتين (ب،ج) من المادة السادسة إذا كانت سنوات الدراسة المقررة للكلية أو المعهد تزيد على ثلاث سنوات فتحتسب له المدة الزائدة أقدمية في الرتبة التي يعين فيها ويثبت في الرتبة والمربوط اللذين يتناسبان مع سنوات الدراسة للكلية أو المعهد الذي تخرج منه ويتعين بالنسبة للمتخرج من الكليات والمعاهد المنصوص عليها في الفقرة (ج) كشرط لاستمراره في الرتبة العسكرية اجتيازه بنجاح الدورة العسكرية التي تحددها الجهة المختصة بوزارة الدفاع والطيران.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 8
  article_text_ar: يعتبر الضابط المعين في رتبة ملازم تحت الاختبار لمدة سنتين فإذا كانت تقاريره السرية غير مرضية ينقل إلى وحدة أخرى لمدة سنة ثالثة فإذا كانت تقاريره عند نهايتها غير مرضية استغني من خدماته دون أن يترتب له أي حق من الحقوق المنصوص عليها في مجموعة الأنظمة العسكرية إلا إذا كان الضابط المذكور قد رقى من رتبة وكيل ممتاز فيجوز إعادته إلى رتبته التي رقى منها أو الاستغناء عن خدماته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 9
  article_text_ar: توضع كشوفات عامة بأقدمية الضباط لكل قوة من القوات المسلحة تصدق من قبل رئيس هيئة الأركان العامة. ويراعى في ترتيب الأقدمية تاريخ منح الرتبة ثم درجة التخرج من الكلية الواحدة. ثم من تقرر لجنة الضباط أسبقيته ويدخل في حساب الأقدمية واعتبارها أية أقدمية خاصة اكتسبها الضابط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 10
  article_text_ar: إذا عين الضباط برتبة أعلى من رتبة ملازم فتعتبر أقدميته في تلك الرتبة وفقاً لتاريخ بدء تعيينه وإذا تساوى تاريخ تعيينه مع تاريخ ترقية بعض زملائه لهذه الرتبة وضع في كشف الأقدمية آخرهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 11
  article_text_ar: إذا عين للخدمة ضباط من رتبة واحدة وكانوا من أسلحة ذات كشوف أقدمية منفصلة أو كانوا من قوات مختلفة بالقوات المسلحة فتكون أسبقيتهم فيما بينهم في الرتبة الواحدة من تاريخ الحصول عليها فإذا تصادف حصول ضابطين أو أكثر على تلك الرتبة فيرجع إلى تاريخ حصول كل منهم على الرتبة السابقة وهكذا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 12
  article_text_ar: تفتح إدارة شئون الضباط لكل ضابط عند تعيينه ملفين ويسمى أحدهما ملف الخدمة وتوضع فيه كل الأوراق والبيانات المتعلقة بخدمة الضابط. ويسمى الثاني الملف السري وتودع فيه تقاريره وسائر المعلومات التي لها صفة السرية. وتصدر لجنة الضباط العليا لائحة تنفيذية تبين الأسس والإجراءات التي يتم على أساسها تنظيم تلك الملفات وإعداد تقارير الكفاءة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 13
  article_text_ar: يخضع الضباط لتقارير الكفاءة التالية :- أ- يعد تقرير كفاءة كل ستة أشهر لكل ملازم تحت الاختبار. ب- يعد تقرير كفاءة كل سنة من رتبة ملازم أول إلى رتبة عميد. ج- يعد تقرير كفاءة للضباط العاملين خارج المملكة من قبل الجهات التي يعملون بها. د- ترفع التقارير السنوية خلال الشهر الأول من كل عام. هـ- إذا كان الضابط رهن التحقيق أو المحاكمة عند إعداد تقرير كفاءته السنوي فيشار إلى ذلك في تقريره وتؤجل ترقيته حتى صدور الحكم النهائي فإذا كان الحكم النهائي بالبراءة ترد أقدميته إلى تاريخ استحقاقه مع زملائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 14
  article_text_ar: يبلغ الضابط من قبل قائده الذي كتب عنه تقريراً غير مرض بمضمون ذلك التقرير ويوقع بالاطلاع وله الحق في تقديم اعتراضه على كل أو بعض ما ورد بالتقرير إلى لجنة الضباط عن طريق مرجعه خلال أسبوعين من تاريخ إبلاغه مضمون التقرير. وتفصل اللجنة في تظلمه وتكون توصياتها نهائية بعد تصديقها وفقاً لأحكام هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 15
  article_text_ar: يوضع ملف لكل ضابط في وحدته يدون فيه كل ما يتعلق به من أعمال طيلة وجوده بالوحدة ويكون مرجعاً لتقارير الضابط. وفي حالة نقله لوحدة أخرى يرسل ملفه إلى الوحدة التي نقل إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 16
  article_text_ar: 'يجب على الضابط : أ- الولاء التام للمليك والمحافظة على مصالح الوطن والقوات المسلحة وأن لا يتقاعس أو يتهاون في أداء الواجبات الموكولة إليه وأن يعمل دون إهمال لتطبيق النظم واللوائح المعمول بها وتنفيذها ويتحاشى أية مخالفة أو خرق لها. ب- تأدية المسئوليات المنوطة به بكل دقة وأمانة ونشاط وإخلاص وأن ينهي الأعمال المطلوبة منه على أكمل وجه وفي أقصر مدة وأن يخصص جميع أوقاته لأداء واجباته الرسمية. ج- تنفيذ الأوامر والتعليمات العسكرية التي تصدر إليه من قبل رؤسائه. د- التصرف في أدب وكياسة في صلاته برؤسائه وزملائه ومرؤوسيه وأفراد الشعب. هـ- المحافظة على شرف الخدمة العسكرية في جميع الأوقات والأماكن. و- المحافظة على الضبط والربط وحسن السلوك والقيافة وأن يكون مثلاً أعلى لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 17
  article_text_ar: يحرم على الضابط ما يلي :- أ- ترك الوظيفة أو التوقف عن أدائها لأي سبب من الأسباب دون تصريح رسمي من رئيسه. ب- نقل المعلومات الرسمية لنشرها في الصحف أو في وسيلة نشر أخرى دون موافقة مسبقة من المراجع المختصة. ويستمر هذا الالتزام قائماً على الضابط بعد تركه الخدمة. ج- إبداء الآراء السياسية أو الاشتغال بالسياسة وحضور اجتماعات الهيئات والمنظمات ذات المبادئ أو الميول السياسية أو التشجيع لها أو عقد اجتماعات لانتقاد أعمال الدولة أو أن يشترك بأية صورة في أي إجراءات هدفها الغايات المذكورة. د- الاشتراك في تحرير الصحف والمجلات ذات الميول السياسية أو الاشتراك في إدارتها بصورة مباشرة أو غير مباشرة. هـ- توزيع مطبوعات أو نشرات سياسية أو التوقيع على عرائض أو وسائل من شأنها النيل من سمعة الدولة أو القوات المسلحة. و- الاحتفاظ لنفسه بأصل أي ورقة من الأوراق الرسمية ولو كانت خاصة بعمل كلف به شخصياً. ز- الإفضاء بمعلومات أو إيضاحات عن المسائل والأمور العسكرية لا سيما تلك التي ينبغي أن تحتفظ بالسرية بطبيعتها أو بناءً على تعليمات خاصة بشأن سريتها ويستمر هذا الالتزام قائماً على الضابط بعد تركه للخدمة.
    ح- الاشتغال بالتجارة أو الصناعة بطريق مباشر أو غير مباشر ويشمل ذلك العمل بإدارة أعمال مالية أو العمل بصفة رئيس أو عضو مجلس إدارة أو مؤسسة أو مدير أو مستشار أو موظف في إحدى الشركات أو المحلات التجارية كما يشمل عقد الصفقات التجارية أو المضاربات بكافة أنواعها أو الاشتراك بعلاقات مع أية شركة أو وكالة أو القيام بأي عمل يتعارض مع عمله الرسمي أو يؤثر بأي حال من الأحوال على القيام بواجبه ولا يسري ذلك على شراء أسهم في الشركات المساهمة. ط- قبول الهدايا والإكراميات والمنح من أصحاب المصالح سواء كان ذلك مباشرة أو بالواسطة لغرض التأثير على عمله الرسمي. ي- قبول العروض والمساعدات المالية خشية الوقوع تحت منَّة أي شخص له علاقة مع الدوائر العسكرية. ك- الاشتراك في مشترى وبيع المهمات واللوازم والأملاك والعقارات الحكومية بقصد الربح والمضاربة. ل- قبول أي عمل خارج عن اعماله العسكرية أصالة أو وكالة أو نيابة مع أي فرد أو مؤسسة من المؤسسات التجارية. م- تأدية أي عمل للغير بمقابل أو بدون مقابل ولو كان ذلك خارج أوقات الدوام إلا بإذن رسمي خاص من رئيس هيئة الأركان العامة. ن- الزواج من غير السعوديات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 18
  article_text_ar: تكون ترقية الضباط الى الرتب التى تعلو رتبهم مباشرة بعد توفر الشروط العامة المنصوص عنها فى هذا النظام ومرور مدة من الزمن فى الخدمة لكل رتبة على النحو التالى :- سنتين على الأقل فى رتبة ملازم ( للترقية الى رتبة ملازم أول ) . أربع سنوات على الأقل فى رتبة ملازم أول ( للترقية الى رتبة نقيب ) و ثلاث سنوات على الأقل فى رتبة ملازم أول طيار (للترقية الى رتبة نقيب طيار) . ست سنوات على الأقل فى رتبة نقيب ( للترقية الى رتبة رائد ) وخمس سنوات على الأقل في رتبة نقيب طيار (للترقية الى رتبة رائد طيار) . أربع سنوات على الأقل فى رتبة رائد ( للترقية الى رتبة مقدم ) . أربع سنوات على الأقل فى رتبة مقدم ( للترقية الى رتبة عقيد ) . أربع سنوات على الأقل فى رتبة عقيد ( للترقية الى رتبة عميد ) . أربع سنوات على الأقل في رتبة عميد ( للترقية الى رتبة لواء ) . سنتان على الأقل فى رتبة لواء للترقية الى رتبة فريق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 19
  article_text_ar: إذا توفرت جميع شروط الترقية في الضابط من رتبة ملازم إلى رتبة رائد وكانت تقارير الكفاءة غير مرضية فتؤخر ترقيته لمدة ستة شهور وينقل بعدها لوحدة أخرى يقدم عنه خلالها تقرير خاص فإذا أصبحت نتيجة تقاريره مرضية فيرقى وتعتبر ترقيته من تاريخ صدور الأمر بترقيته. أما إذا كانت نتيجة تقاريره غير مرضية فيؤخر مدة ستة أشهر أخرى فإذا أصبحت تقاريره مرضية فيرقى ويوضع في الأقدمية من تاريخ ترقيته. أما إذا انتهت السنة دون أن تصبح تقاريره مرضية فتنهى خدمات الضابط بقرار من القائد الأعلى للقوات المسلحة بناءً على اقتراح رئيس مجلس الوزراء وبعد توصية الوزير ويعامل بمقتضى أحكام النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 20
  article_text_ar: يتدرج جميع الضباط بالترقية من الرتبة الأدنى إلى الرتبة التي تليها مباشرة وذلك بقرار من القائد الأعلى للقوات المسلحة بناءً على اقتراح رئيس مجلس الوزراء وبعد توصية الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 21
  article_text_ar: تكون الترقية من رتبة ملازم حتى رتبة مقدم بالأقدمية مع توفر الشروط التالية :- أ- أن تكون تقارير الكفاءة السنوية والبيانات الواردة بملف الضابط السري مرضية. ب- أن يكون الضابط قد أمضى الحد الأدنى للمدة الزمنية المقررة في رتبته. ج- أن يكون الضابط تام التأهيل على الوجه الاتي :- أن يحصل على الدورات الحتمية والمؤهلات العلمية التي توصي بها لجنة الضباط العليا. أن يجتاز امتحان الترقية المقررة وذلك في غير الحالات الاستثنائية التي يوافق عليها الوزير بناءً على قرار من لجنة الضباط العليا. أن يقضي الضابط من رتبة نقيب فما دون المدة المقررة للخدمة بوحدات السلاح الميدانية. د- وجود الشاغر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 22
  article_text_ar: إذا أمضى الضابط من رتبة رائد فما دون سنتين في رتبته بالإضافة إلى المدة المقررة في المادة (18) من هذا النظَام ولم تتوافر شروط الترقية المنصوص عليها في المادة (21) تنهى خدماته ويعامل بموجب النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 23
  article_text_ar: 'يراعى في ترقية كل من المقدم والعقيد والعميد إلى الرتب التالية الاعتبارات الآتية :- أ- توفر الشروط الآتية : أن يكون الضابط قد أمضى الحد الأدنى للمدة الزمنية المقررة للخدمة في رتبته. أن تكون تقارير الكفاءة مرضية وتوصي بترقيته. أن يكون قد أتم التأهيل المطلوب. وجود الشاغر. ب- الأقدمية بوجه عام والكفاءة والمقدرة على تولى مناصب القيادة مع الحصول على المؤهلات العلمية والفنية للمركز الذي سيشغله الضابط ويصدر رئيس هيئة الأركان العامة قراراً بتلك المؤهلات بناءً على توصية لجنة الضباط العليا. ج- تكون ترقية المقدم والعقيد والعميد إلى الرتب التالية باختيار الضابط الأكثر تأهيلاً من بين من سبقت التوصية بترقيتهم وأدرجت أسماؤهم بكشف المرشحين للترقية ويصدر قرار من الوزير بناءً على توصية لجنة الضباط العليا يبين شروط وضع اسم الضابط في كشوفات المرشحين للترقية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 24
  article_text_ar: 'أ- يقسم الضباط من رتبة مقدم وعقيد وعميد إلى ثلاثة أقسام :- القسم الأول : الذين أتموا تأهيلهم وأوصى بترقيتهم. القسم الثاني : الذين لم يتموا تأهيلهم ولكن يوصى بترقيتهم بعد تمام تأهيلهم. القسم الثالث : الذين لا يوصى بترقيتهم. ب- يخطر الضباط من القسم الثاني بضرورة إتمام تأهيلهم فإذا مضت سنة على إخطارهم بذلك يعاملون على الوجه الآتي :- إذا وجدوا أهلاً للترقية أوصي بترقيتهم وأدرجت أسماؤهم بكشف المرشحين للترقية ووضعوا في أقدميتهم الأصلية في كشف الأقدمية الأصلي. إذا وجدوا غير أهل للترقية فلا يوصى بترقيتهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 25
  article_text_ar: أ- إذا أمضى الضابط الموصى بترقيته من رتبة مقدم وعقيد وعميد مدة ست سنوات في رتبته ولم يرق أو بلغ سن التقاعد في رتبته قبل ذلك يحال إلى التقاعد بالرتبة التي تلي رتبته وراتبها. ب- إذا أمضى الضابط غير الموصى بترقيته من رتبة مقدم وعقيد وعميد مدة ست سنوات في رتبته دون أن يرقى أو بلغ سن التقاعد في رتبته قبل ذلك يحال إلى التقاعد برتبته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 26
  article_text_ar: اذا امضى اللواء سنتين في الخدمة ولم يصدر امر بتمديد خدمته فيحال للتقاعد ويجوز مد خدمته سنة فأخرى على ان لاتزيد مدة خدمته في هذه الرتبة عن ست سنوات وذلك بقرار من القائد الاعلى للقوات المسلحة بناء على اقتراح رئيس مجلس الوزراء وبعد توصية الوزير مالم يبلغ سن التقاعد في رتبته قبل ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 27
  article_text_ar: تكون الترقية لرتبة فريق بالاختيار المطلق بقرار من القائد الأعلى للقوات المسلحة بناء على اقتراح رئيس مجلس الوزراء وتوصية الوزير وذلك من بين الضباط الحاصلين على رتبة لواء الذين أمضوا سنتين على الأقل في هذه الرتبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 28
  article_text_ar: تكون الترقية إلى رتبة فريق أول بالاختيار المطلق بقرار من القائد الأعلى للقوات المسلحة بناء على اقتراح رئيس مجلس الوزراء وتوصية الوزير وتنهى خدمة الفريق والفريق أول بقرار من القائد الأعلى للقوات المسلحة بناءً على اقتراح رئيس مجلس الوزراء وتوصية الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 29
  article_text_ar: يجوز ترقية الضباط إلى الرتبة التي تلي رتبته بصورة استثنائية بقرار من القائد الأعلى للقوات المسلحة بناء على اقتراح رئيس مجلس الوزراء وتوصية الوزير دون التقييد بالأقدمية العامة أو القيد الزمني المقرر للرتبة إذا قام الضابط بأعمال مجيدة في ميدان القتال أو في الخدمة العسكرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 30
  article_text_ar: يجوز بقرار من القائد الأعلى للقوات المسلحة عدم التقيد بقواعد الترقية المنصوص عليها في هذا النظَام في حالتي الحرب والتعبئة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 31
  article_text_ar: يجوز بقرار من الوزير بناءً على توصية لجنة الضباط العليا أن يمنح الضابط رتبة وقتية تعلو رتبته الأصلية متى عين الضابط في منصب تقضي ظروف الخدمة فيه بذلك الإجراء ويعود الضابط إلى رتبته الأصلية بمجرد تركه المنصب المذكور دون أن يترتب على منحه الرتبة الوقتية أية مزايا مالية. وتحسب مدة الخدمة بالرتبة الوقتية ضمن الخدمة بالمرتبة الأصلية ولا يكون لحامل الرتبة الوقتية أفضلية عند عودته إلى الرتبة الأصلية إلا بموجب أقدميته بين زملائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 32
  article_text_ar: يجوز بقرار من الوزير بناءً على توصية لجنة الضباط العليا أن تمنح الرتب الشرفية للضباط المتقاعدين المعادين للخدمة العسكرية أو المدنيين إذا اقتضت الظروف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 33
  article_text_ar: إذا تساوت الرتب والأقدمية تكون أسبقية القيادة للضباط طبقاً للترتيب الآتي :- الضابط العامل. الضابط العامل المستدعى من التقاعد. الضابط الفني أو المهندس أو الطبيب. الضابط الفني أو المهندس أو الطبيب المستدعى منالتقاعد. الضابط المكلف ثم ضابط الشرف. يقصد بالضابط العامل بحكم هذه المادة الضابط الذي يعمل أصلاً في أحد أسلحة القوات المسلحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 34
  article_text_ar: الضباط الحائزون على رتب أصلية يسبقون الضباط الحائزين على رتب وقتية وتكون الأسبقية للضباط الحائزين على رتبة وقتية فيما بينهم بحسب أقدميتهم في رتبهم الأصلية وليس بحسب تاريخ ترقيتهم إلى الرتب الوقتية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 35
  article_text_ar: يتم اختيار رئيس هيئة الأركان العامة بأمر من القائد الأعلى للقوات المسلحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 36
  article_text_ar: يتم اختيار نائب رئيس هيئة الأركان العامة ورؤساء الهيئات في الجيش وقائد القوات الجوية وقائد القوات البحرية بقرار من الوزير بناءً على توصية من رئيس هيئة الأركان العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 37
  article_text_ar: يتم بتوصية من لجنة الضباط العليا نقل واثبات الضباط الذين يشغلون مناصب قيادية من مستوى فوج وما يعادله فأعلى ومساعديهم وأركان الألوية وما يعادلهم فأعلى والملحقين العسكريين ومساعديهم في القوات الجوية والبحرية والدفاع الجوي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 38
  article_text_ar: لا يعين الضباط في منصب قيادي ما لم يكن تام التأهيل وإذا رشح أكثر من ضابط لتولي منصب قيادي فيفضل اختيار الضباط الأكفاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 39
  article_text_ar: يجري نقل الضباط على اختلاف رتبهم خارج السلاح أوالاختصاص بتوصية من لجنة الضباط العليا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 40
  article_text_ar: 'يجري نقل وإثبات الضباط داخل السلاح على الوجه الآتي : من رتبة مقدم فما فوق بتوصية من لجنة الضباط العليا. من رتبة رائد فما دون بقرار من قائد السلاح المختص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 41
  article_text_ar: يخدم الضابط في الوحدات الميدانية أطول مدة ممكنة ولا ينقل منها أو من السلاح الذي يعمل فيه إلا عند الضرورة القصوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 42
  article_text_ar: يجوز أن يشغل الضابط وظيفة ذات رتبة أعلى من رتبته على أن لا تتجاوز رتبتين على الأكثر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 43
  article_text_ar: لا يجوز نقل الضباط الآتي ذكرهم للخدمة خارج وحدات السلاح :- أ- الملازمون والملازمون الأوائل. ب- النقباء الذين لم يمضوا سنتين على الأقل بوحدات سلاحهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 44
  article_text_ar: يجب إعادة الضابط العامل خارج سلاحه أو اختصاصه إلى سلاحه أو اختصاصه قبل انتهاء المدة المحددة في الحالات الآتية :- أ- إذا قصر في امتحان الترقية. ب- إذا كتب عنه تقرير كفاءة غير مرضي. ج- إذا رؤي اتخاذ هذا الإجراء كعقوبة تأديبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 45
  article_text_ar: 'يجوز نقل الضابط من رتبة رائد وكذا النقيب الذي أمضى سنتين على الأقل في رتبته من وحدته في الحالات الآتية : أ- إثباته في إحدى وظائف القيادة والأركان. ب- إثباته في إحدى الوظائف الفنية أو الإدارية. ج- تأهيله لمنصب قيادي. د- في حالات الطوارئ والحرب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 46
  article_text_ar: يجوز نقل الضابط من قوة إلى أخرى في القوات المسلحة إذا اقتضت المصلحة العامة ذلك ويتم هذا النقل بقرار من الوزير بناءً على توصية لجنة الضباط العليا ويضم إلى كشوفات الأقدمية في القوة المنقول إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 47
  article_text_ar: تؤمن للضابط المعين أو المنقول الوسائط النقلية اللازمة لنقله وزوجته وأولاده ووالديه من أقرب طريق من مقر عمله الأصلي إلى مكانه الجديد ، فإذا لم تؤمن له وسائط النقل فتصرف له تذاكر سفر حسب الدرجات الآتية :- أ- بالدرجة الأولى إذا كانت رتبة الضابط رائد فما فوق. ب- بالدرجة السياحية إذا كانت رتبة الضابط نقيب فما دون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 48
  article_text_ar: بالاضافة الى ما سبق في المادة ( 47 ) تؤمن وسائط النقل اللازمة لنقل امتعة الضابط المعين او المنقول داخل المملكة وعائلته فاذا لم تؤمن فيصرف راتب شهرين على ان لا تزيد عن ثلاثة الاف ريال .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 49
  article_text_ar: أ- يلحق الضابط للخدمة خارج وحدته لفترة مؤقتة ولظروف طارئة تستدعي ذلك ويعتبر الضابط في حالة الإلحاق من قوة وحدته الأصلية بسلاحه. ب- يتم الإلحاق بتوصية من لجنة الضباط العليا. ج- يؤمن نقل الضابط بمفرده إذا تقرر إلحاقه. وإذا كانت مدة الإلحاق تزيد عن ستة أشهر فيؤمن نقله وعائلته وفقاً للمادتين (47) و(48) من هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 50
  article_text_ar: يجوز بقرار من الوزير بعد موافقة رئيس مجلس الوزراء إعارة الضابط للخدمة خارج القوات المسلحة سواء كان ذلك داخل المملكة وخارجها وتحتسب مدة الإعارة ضمن مدة الخدمة بالقوات المسلحة بعد تأدية العائدات التعاقدية عنها ولا يجوز أن يعار الضابط لمدة تزيد عن ثلاث سنوات. ويراعى أن لا تقل رتبة الضابط المعار عن رتبة رائد. ويقطع راتب الضابط المعار اعتباراً من تاريخ تركه العمل حتى يعود إلى مباشرته ويجوز بموافقة رئيس مجلس الوزراء أن تتحمل الجهة المعيرة كل أو بعض راتب الضابط المعار ومخصصاته كما يجوز في حالة الإعارة خارج المملكة أن يصرف للضابط مكافأة يحدد مقدارها رئيس مجلس الوزراء وأن يعامل بموجب هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 51
  article_text_ar: فيما لم يرد به نص آخر فإن النقل والتعيين والإثبات والإلحاق والإعارة المنصوص عليها بالفصل الأول والثاني من الباب الخامس من هذا النظَام يتم بقرار من الوزير بناءً على توصية من لجنة الضباط العليا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 52
  article_text_ar: أ- راتب الضابط الأساسي هو الراتب المقرر للرتبة بموجب جدول الرواتب والعلاوات المرفق بهذا النظَام بما في ذلك العلاوات الدورية ، أما المخصصات فتشمل البدلات والعلاوات المنصوص عليها بموجب هذا النظَام. ب- تحسم العائدات التقاعدية من الراتب الأساسي فقط وهو الذي يتم عليه حساب المعاش التقاعدي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 53
  article_text_ar: يستحق الضابط الراتب الفعلي من تاريخ تعيينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 54
  article_text_ar: مع عدم الإخلال بالمادة (7) يتقاضى الضابط أول مربوط الرتبة المعين بها أو المرقى إليها ويستحق العلاوة الدورية بعد مرور سنة من تاريخ تعيينه او ترقيته ولا تحتسب المدة التي يقضيها الضابط بالاستيداع ضمن مدة السنة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 55
  article_text_ar: أ‌-يصرف لرئيس هيئة الأركان العامة بدل تمثيل مبلغ الف ريال شهريا. ب‌-يصرف لنائب رئيس هيئة الأركان العامة بدل تمثيل مبلغ سبعمائة ريال شهريا. ت‌-يصرف لقائد القوات الجوية بدل تمثيل مبلغ خمسمائة ريال شهريا. ث‌-يصرف لقائد القوات البحرية بدل تمثيل مبلغ خمسمائة ريال شهريا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 56
  article_text_ar: يصرف بدل إعاشة بمعدل مائة ريال شهريا لكل ضابط من جميع الرتب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 57
  article_text_ar: يصرف بدل سكن بمعدل الراتب الأساسي لشهرين سنويا لكل الضباط من جميع الرتب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 58
  article_text_ar: في حالة عدم تأمين الملابس عينا يصرف بدل ملابس سنويا لكل ضابط من جميع الرتب
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 59
  article_text_ar: أ - يصرف بدل تنقلات شهرياً للضابط حسب الفئات التالية :- ملازم وملازم أول (200) ريال شهرياً. نقيب ورائد (300) ريال شهرياً. مقدم وعقيد وعميد (400) ريال شهرياً. لواء وفريق وفريق أول (500) ريال شهرياً. ب- يصدر رئيس هيئة الأركان العامة قراراً بالمناصب التي يؤمن لها النقل الرسمي فقط من وإلى مقر العمل. ج- لا يصرف البدل النقدي المنصوص عليه في الفقرة (أ) لمن تؤمن له سيارة لتنقلاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 60
  article_text_ar: يصرف بدل خادم شهريا مبلغ مائة ريال لكل ضابط من جميع الرتب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 61
  article_text_ar: يصرف بدل ركن للضابط الركن على النحو الاتي :- أ‌- مائتان وخمسون ريالا شهريا للضباط من رتبة مقدم فما فوق . ب‌- مائة وخمسون ريالا شهريا للضباط من رتبة رائد فما دون .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 62
  article_text_ar: يستحق الضباط الطيارون زيادة على رواتبهم علاوة طيران بالفئات المبنية في جدول الرواتب ويوقف صرف هذه العلاوات أثناء وجود الضابط الطيار بالاستيداع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 63
  article_text_ar: يحرم الضابط الطيار من علاوة الطيران متى ثبت تقصيره في أداء واجباته المتعلقة بأعمال الطيران أو ثبت ضعف مستوى طيرانه أو لم يتم الحد الأدنى لعدد ساعات الطيران المقررة لكل رتبة وتحدد لجنة الضباط العليا مدى هذه الواجبات وكيفية أدائها بناءً على اقتراح قائد القوات الجوية ويكون الحرمان كلياً أو جزئياً بنسبة تقصير الضابط في أداء واجباته المتعلقة بأعمال الطيران.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 64
  article_text_ar: 'إذا تقرر عدم صلاحية الضابط الطيار للطيران نتيجة لعدم لياقته الطبية يكلف بأعمال أرضية ويبقى مدرجاً بكشف الضباط الطيارين وفي هذه الحالة تخفض أو تلغى علاوة الطيران طبقاً لما يلي : أ- تلغى العلاوة إذا كان الضابط برتبة ملازم طيار. ب- تخفض العلاوة بنسبة 50% إذا كان الضابط برتبة ملازم أول أو نقيب طيار. ج- تخفض العلاوة بنسبة 25% إذا كان الضابط برتبة رائد أو مقدم طيار. د- تخفض العلاوة بنسبة 12.5% إذا كان الضابط برتبة عقيد طيار فما فوق. يستحق الضابط صرف العلاوة بعد تخفيضها بصفة ثابتة طيلة مدة خدمته بالقوات الجوية بغض النظر عن ترقيته لرتبة أعلى .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 65
  article_text_ar: لا يجوز حرمان الضابط الطيار من علاوة الطيران كلياً أو جزئياً إذا كان عدم صلاحيته للطيران ناتجة عن طيرانه في العمليات الجوية أو بسبب حادث طيران لم يكن ناتجاً عن إهماله أو مخالفته للأوامر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 66
  article_text_ar: يستحق الضباط البحريين زيادة على رواتبهم علاوة بحر بحسب الفئات المبينة في جدول الرواتب ويوقف صرف هذه العلاوة أثناء وجود الضابط البحري بالاستيداع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 67
  article_text_ar: يحرم الضابط البحري من علاوة البحر إذا ثبت تقصيره في أداء الواجبات المتعلقة بإبحاره أو لم يستوف عدد ساعات الإبحار المحددة أو لم يعد لائقاً طبياً للعمل البحري وتحدد لجنة الضباط العليا مدى هذه الواجبات وكيفية أدائها بناءً على اقتراح قائد القوات البحرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 68
  article_text_ar: يستحق الضباط الذين يشغلون احدى الوظائف الاتية :- 1.رؤساء الهيئات . 2.مدير شئون ضباط القوات المسلحة . 3.قادة المناطق . 4.قائد الأسلحة . 5.قائد الدفاع الجوي . 6.مدراء الالوية. 7.قادة الكليات العسكرية . 8.مدراء الإدارات . 9.مدراء الالمستشفيات العسكرية . 10.مدراء القواعد . 11.قادة الافواج. 12.قيادة المدارس ومدراء المعاهد وقادة المدارس . 13.قادة مراكز التجنيد والتدريب ( في مستوى فوج) 14.مساعدى قادة المناطق . 15.مساعدى قادة الالوية . علاوة قيادة بموجب هذا النظام على النحو الاتي :- أ‌-ثلاثمائة ريال شهريا للضباط من رتبة مقدم فما فوق . ب-مائتا ريال شهريا للضباط في رتبة رائد تصرف العلاوات الموضحة أعلاه لمن يشغل وظيفة مماثلة في القوات الجوية او البحرية والقوات الأخرى وتحدد الوظائف بقرار من رئيس هيئة الأركان العامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 69
  article_text_ar: 'تصرف للضباط علاوة لكل من يمارس عمل: أ- مدير مكتب الوزير. ب- مدير مكتب رئيس هيئة الأركان. ج- ضباط مكتب الوزير. د- ضباط مكتب رئيس هيئة الأركان. هـ- مديرو مكاتب رؤساء الهيئات. و- أركان المناطق. ز- أركان الألوية. ح- أركان وكبير معلمي الكليات وقيادة المدارس. ط- أركان الأسلحة. على النحو الاتي :- 1.مائتان وخمسون ريالا شهريا من مقدم فما فوق . 2.مائة وخمسون ريالا شهريا من رائد فما دون. تصرف العلاوات الموضحة أعلاه لمن يشغل وظيفة مماثلة في القوات الجوية او البحرية والقوات الأخرى وتحدد الوظائف المماثلة بقرار من رئيس هيئة الأركان العامة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 70
  article_text_ar: تصرف علاوة قفز شهريا بمعدل مائة وثمانين ريالا شهريا للضباط المظليين الذين يعملون بسلاح المظلات ومبلغ 90 ريالا شهريا لمن يعمل خارج سلاح المظلات شريطة ان يزاول القفزات السنوية الحتمية مالم يكن عدم مزاولتها لسبب لايد للضابط فيه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 71
  article_text_ar: تصرف علاوة تدريس شهريا للضباط القائمين فعلا بالتدريس بالفئات الاتية :- 1. مائة وخمسون ريالا شهريا لمدرسي الكليات العسكرية . 2. مائة وخمسون ريالا شهريا لمدرسي المعاهد والمدارس العسكرية لمن هم في رتبة مقدم فما فوق 3. مائة ريال شهريا لمدرسي المعاهد والمدارس العسكرية لمن هم في رتبة رائد فما دون . 4. مائة وخمسون ريالا شهريا لمدرسي الطيران الجوي المتفرغين للتدريس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 72
  article_text_ar: تصرف علاوة فنية للضباط الأطباء والصيادلة والمهندسين على النحو الاتي :- 1. ثلاثمائة ريال شهريا للأطباء البشريين والمهندسين لجميع الرتب . 2. مائتين ريالا شهريا الاطباء الاسنان والأطباء البيطريين والصيادلة لجميع الرتب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 73
  article_text_ar: تصرف علاوة تخصص للضباط الأطباء والصيادلة والمهندسين بالفئات التالية :- أ- ثلاثمائة ريال شهرياً لمن يحمل شهادة تخصص دكتوراه بالطب او الصيدلة او الهندسة . ب- مائتا ريال لمن يحمل شهادة تخصص ماجستير بالطب او الصيدلة او الهندسة . ج- مائة ريال شهرياً لمن يحمل شهادة تخصص دبلوم بالطب أو الصيدلة أو الهندسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 74
  article_text_ar: تصرف علاوة فنية للضباط خريجي المعاهد الفنية ثلاثمائة ريال شهرياً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 75
  article_text_ar: تصرف علاوة عدوى وضرر بمعدل مائة وخمسين ريال شهرياً للضباط الذين يعملون بأقسام الأمراض المعدية أو الأشعة والمختبرات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 76
  article_text_ar: تصرف علاوة خطر بمعدل بمائة ريال شهرياً للضباط الذين يعملون بأنفسهم في المواد المتفجرة كعمليات الأبحاث والصناعات التي تدخلها المواد المتفجرة والمفرقعات وعملية صيانتها أو تخزينها أو عمليات التفتيش على الذخيرة وإصلاحها وعملية تفجيرها والضباط المهندسين الحاصلين على دورة المهندسين ويعملون في وحدات المهندسين المقاتلة أو في حقول تدريب المواد المتفجرة وطاقم الطائرة ما عدا الطيارين وتصدر لجنة الضباط العليا لوائح تحدد فيها الوظائف التي تستحق علاوة الخطر المنصوص عنها بهذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 77
  article_text_ar: تصرف علاوة بمقدار أربعمائة ريال شهرياً لجميع الضباط العاملين في (الوحدات الخاصة).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 78
  article_text_ar: لا يجوز أن يتقاضى الضباط أكثر من علاوتين مهما كان نوعها ويمكن أن يتقاضى علاوة ثالثة إذا كان يستحق علاوة طيران أو علاوة بحرية أو علاوة عدوى أو علاوة خطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 79
  article_text_ar: يعامل الضباط في الملحقيات العسكرية من حيث بدل تهيئة السفر وبدل التمثيل وبدل العلاج معاملة موظفوا وزارة الخارجية طبق ما يحدده مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 80
  article_text_ar: أ- يجوز ابتعاث الضابط للدراسة في دورات عسكرية أو دورات ضمن اختصاصه خارج المملكة لمدة محدودة. ب- يجوز إيفاد الضابط في بعثة دراسية للدراسات العليا ضمن فروع القوات المسلحة. ج- تعتبر مدة الابتعاث ضمن الخدمة بالقوات المسلحة. د- يحدد احتياج القوات المسلحة من المبتعثين وشروط الابتعاث بقرار وزاري بناءً على توصية لجنة الضباط العليا. هـ- يتم الإبتعاث بقرار من الوزير بناءً على توصية لجنة الضباط العليا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 81
  article_text_ar: تضع لجنة الضباط العليا لائحة تحدد واجبات الضابط المبتعث والأشياء المحظورة عليه ، ويلتزم الضابط المبتعث بالتقيد بهذه اللائحة ، ويتجنب كل ما يخل بسمعته أو سمعة بلده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 82
  article_text_ar: 'للجنة الضباط العليا أن توصي بإنهاء ابتعاث الضابط في إحدى الحالات الآتية : إذا صدر بحقه حكم بحد شرعي أو بجريمة مخلة بالشرف أو الأمانة. إذا تسبب الضابط بقصد أو إهمال منه أو بغير قصد في الإساءة إلى سمعة المملكة أو القوات المسلحة. إذا اتخذ المعهد الذي يدرس فيه قراراً بفصله لأي سبب من الأسباب. إذا تغيب عن الدراسة أو قام بنشاط سياسي أو انتمى لأحد الأحزاب. إذا دلت النتائج على تقصيره أو احتمال رسوبه وكان ذلك ناتجاً عن إهمال منه وليس لأسباب قاهرة أو صحية. أية أسباب أخرى ترى اللجنة معها إنهاء بعثة الضابط حرصاً على مصلحة القوات المسلحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 83
  article_text_ar: بدل الابتعاث:- أ- يعطى الضابط المبتعث خارج المملكة بدل ابتعاث عن كل ليلة يقضيها خارج مركز عمله طبقاً للفئات التالية :- في أمريكا ريال أوروبا والشرق الأقصى ريال بقية البلدان ريال من مقدم فأعلى 100 90 70 رائد ونقيب 80 70 45 ملازم وملازم أول 60 55 35 ب- يدفع للضابط قيمة الكتب والنفقات الدراسية وبدل الانتساب للجامعات ويثبت ذلك بموجب وثائق خاصة مصدقة من ممثليات جلالته في الخارج. ج- لا يجوز الجمع بين بدل الابتعاث وبدل الانتداب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 84
  article_text_ar: إذا كان الابتعاث للتدريب في دورة داخل المملكة وفي غير المنطقة التي يعمل فيها الضابط فيصرف له (75%) من راتبه الأساسي كبدل ابتعاث إضافة على راتبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 85
  article_text_ar: يمنح الضابط تذكرة إركاب إلى البلد المبتعث إليها مرجعاً حسب الدرجات المنصوص عليها بالمادة (47) وإذا كانت مدة الابتعاث تزيد عن ستة أشهر فللضابط الحق في الحصول على تذكرة إركاب مرجعاً لزوجته وأولاده فقط بنفس الدرجات ولمرة واحدة خلال فترة ابتعاثه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 86
  article_text_ar: يجوز منح الضابط إجازة دراسية للدراسات العليا بناءً على توصية لجنة الضباط العليا ولمدة لا تتجاوز أربع سنوات. تحتسب الإجازة الدراسية ضمن الخدمة بالقوات المسلحة. تطبق أحكام المادة (81) على الضابط المجاز إجازة دراسية. يمنح الضابط المجاز إجازة دراسية مع زوجته وأولاده تذاكر إركاب مرجعاً إلى البلد الذي سيدرس فيه حسب الدرجات المنصوص عليها بالمادة (47) ولمرة واحدة. يصرف للضابط المجاز إجازة دراسية للدراسات العليا راتبه الأساسي وبدل السكن فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 87
  article_text_ar: 'الإجازات هي : اعتيادية ، عرضية ، ميدانية ، استثنائية ، مرضية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 88
  article_text_ar: يستحق الضابط إجازة اعتيادية مدتها خمسة وأربعون يوماً في السنة ويمنح الضابط أولى إجازاته بعد مضي سنة من بدء تعيينه، على أنه يمكن أن يحصل على مدة خمسة عشر يوماً من أصل أجازته السنوية بعد مضي ستة أشهر من بدء تعيينه. يجوز ضم الإجازات الاعتيادية المستحقة لأكثر من سنة بشرط أن لا يزيد تمتع الضابط بها عن تسعين يوماً في السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 89
  article_text_ar: 'تعطى الإجازات الاعتيادية للضباط على الوجه الآتي : خارج المملكة بموافقة الوزير ويجوز للوزير تخويل هذه الصلاحية لرئيس هيئة الأركان العامة. داخل المملكة من قبل رؤساء الهيئات وقادة المناطق ومديري الأسلحة ومدراء الإدارات والرئاسات الأخرى المماثلة على أن تشعر إدارة شئون ضباط القوات المسلحة بالانفكاك والعودة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 90
  article_text_ar: يجوز لمن يملك سلطة إعطاء الإجازة تقصيرها أو تأجيلها أو قطعها لأسباب تقتضيها ظروف الخدمة في القوات المسلحة ، وإذا اقتضت الظروف قطع إجازة الضابط الاعتيادية ولم يكن قد استمتع بثلثي إجازته فيعوض عن إركابه ذهاباً وإياباً ومصاريف عودة عائلتة أن سبق له أن اصطحبها أو نقلها من مركز عمله بسبب تمتعه بالإجازة مع الاحتفاظ له بالجزء المتبقي من إجازته ومن استمتع بثلثي إجازته أو أكثر يحتفظ له بالجزء المتبقي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 91
  article_text_ar: يحق للضابط الذي يتمتع بإجازة اعتيادية أن يحصل على تذكرة إركاب مرجعاً بنصف الأجرة له ولزوجته وأولاده على طائرة مؤسسة الخطوط الجوية العربية السعودية وفي حدود ما تصل إليه داخل المملكة وخارجها وذلك لمرة واحدة في السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 92
  article_text_ar: الإجازة العرضية يمنح الضابط إجازة عرضية لمدة لا تزيد على عشرة أيام في السنة لأسباب طارئة وتمنح هذه الإجازة طبقاً لما هو محدد بالمادة (89). يسقط الحق بهذه الإجازة بانقضاء السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 93
  article_text_ar: 'الإجازة الميدانية يستحق الضابط العامل في الميدان إجازة ميدانية لا تتجاوز ستين يوماً في انتهاء السنة ولا يجوز تجزئتها إلا في حدود خمسة عشر يوماً بعد انتهاء كل ثلاثة أشهر أو ثلاثين يوماً بعد انتهاء كل ستة أشهر. تمنح هذه الإجازة طبقاً لما هو محدد بالمادة (89). لا يجوز الجمع بين الإجازة الميدانية والإجازة الاعتيادية. يسقط حق الضابط باستعمال الإجازة الميدانية بعد نقله من الميدان ويبقى حقه باستعمال الإجازة الاعتيادية. 5- يمنح الضابط المجاز إجازة ميدانية تذكرة إركاب بمفرده ذهاباً وإياباً داخل المملكة بالدرجات الآتية: من رتبة رائد فما فوق بالدرجة الأولى. من رتبة نقيب فما دون بالدرجة السياحية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 94
  article_text_ar: الإجازة الاستثنائية يجوز لظروف اضطرارية ولمن يملك صلاحية منح الإجازة وفقاً للمادة (89) منح الضابط إجازة استثنائية لمدة لا تزيد على شهر إذا كان قد أستنفذ إجازته الاعتيادية على أن تحتسب مدتها من أجازاته الاعتيادية المقبلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 95
  article_text_ar: يستحق الضابط إجازة مرضية ، في مدة ثلاث سنوات قدرها ثلاثة اشهر بالراتب الفعلي . وثلاثة اشهر بنصف الراتب وثلاثة اشهر بربع الراتب وستة اشهر بدون راتب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 96
  article_text_ar: يستحق الضابط الذي يصاب بجرح أو مرض - يمنعه من أداء عمله بصفة مؤقتة ، ويكون ذلك أثناء عمله وبسببه - إجازة مرضية بدلاً من الإجازة المنصوص عليها في المادة (95) مدتها اثنى عشر شهرا بالراتب الفعلي وستة اشهر بنصف الراتب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 97
  article_text_ar: في حالة تعذر علاج الضباط داخل المملكة يعالج خارجها على نفقة الحكومة وتصرف له نفقات سفره وعلاجه في حدود المدة المقررة بموجب التقارير الطبية الصادرة من اللجنة الطبية العسكرية العليا طبقاً للائحة تنفيذية يقرها رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 98
  article_text_ar: يعالج الضباط في المستشفيات العسكرية أو غيرها داخل المملكة وإذا رأت اللجنة الطبية العسكرية أن علاجه متعذر داخل المملكة فيعالج خارجها على نفقة وزارة الدفاع والطيران بقرار من رئيس هيئة الأركان العامة ويجوز للوزير في الحالات المرضية المستعجلة أن يقرر معالجة أي ضابط خارج المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 99
  article_text_ar: يعالج الضباط المنتدبون في مهام رسمية أو المبتعثون للدراسة في الخارج على نفقة وزارة الدفاع والطيران على أن تؤيد المعالجة بتقارير طبية تصادق عليها مراجع طبية وتقترن بتصديق أحد الملحقين العسكريين أو ممثليات المملكة في الخارج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 100
  article_text_ar: للضابط الحق في معالجة أفراد أسرته الذين يعولهم شرعاً في المستشفيات العسكرية في داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 101
  article_text_ar: تشكل اللجنة الطبية العسكرية العليا بقرار من الوزير بناءً على توصية رئيس هيئة الأركان العامة من ثلاثة أطباء على الأقل ويحدد القرار مدة عمل اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 102
  article_text_ar: 'أ‌- يمنح للضابط المنتدب في مهمة رسمية عن كل ليلة يقضيها خارج مركز عمله بدل انتداب بالفئات الاتية مع تأمين مواصلاته. عميد فما فوق 100ريال رائد ومقدم وعقيد 80ريال ملازم وملازم اول ونقيب 60 ريال ب‌- اذا كان الانتداب لخارج المملكة يزاد البدل لكل مجموعة من البلدان وفق النسب التالية : أولا: دول أمريكا : 150% أمريكا الشمالية وامريكا الجنوبية . ثانيا: دول اوربا الغربية : 100% لقبرص والبرتغال . 125% لأسبانيا واليونان . 150% لغير ذلك من بلدان اوربا الغربية . ثالثا: دول اسيا : 150% للكويت واليابان والصين الوطنية . 125% للعراق ولبنان والأردن والباكستان وايران وتركيا وماليزيا وسنغافورة والهند والفلبين وامارات الخليج العربي . 100% لما عدا ذلك من دول آسيا . رابعا : دول افريقيا : 150% الجزائر والمغرب وليبيا وتونس وموريتانيا والصومال وغانا وغينيا ونيجريا والنيجر ومالي وتشاد والسنغال . 125% السودان ومصر والحبشة . 100% ماعدا ذلك من دول افريقيا . خامسا: 150% لأستراليا ونيوزيلاندا . ج‌- اذا لم تؤمن مواصلات الضابط المنتدب فيصرف له بدل مواصلات إضافي عن مدة انتدابه مماثلا لبدل المواصلات المقرر
    لرتبته .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 103
  article_text_ar: يجوز في الحالات الاستثنائية، تأمين السكن والطعام للضباط المنتدبين لحضور المؤتمرات الدولية والوفود الرسمية داخل المملكة أو خارجها، ويجب أن يتضمن قرار الانتداب موافقة الوزير أو من يفوضه على تأمين السكن والطعام، وتحديد مستوى السكن ، مع مراعاة رتبة الضابط وطبيعة المهمة . وعند تأمين السكن يخفض من بدل الانتداب ربعه، واذا أمن السكن والطعام يخفض من بدل الانتداب نصفه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 104
  article_text_ar: تؤمن الوسائط النقلية اللازمة لنقل الضابط وزوجته وأولاده مع أمتعتهم الشخصية أو أجورها من أقرب طريق من مقر عمله إلى مكان انتدابه إذا كانت مدة المهمة المنتدب إليها ثلاثة أشهر فما فوق وفقاً للأحكام المنصوص عليها في المادتين (48،47).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 105
  article_text_ar: 'تصدر قرارات الانتداب : أ- من الوزير إذا كان الانتداب خارج المملكة لأي مدة أو داخلها لمدة ثلاثة أشهر فأكثر. ب- من رئيس هيئة الأركان العامة إذا كانت مدة الانتداب تقل عن ثلاثة أشهر داخل المملكة لكافة الرتب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 106
  article_text_ar: تؤمن الوسائط النقلية اللازمة لنقل الضابط المنتدب مرجعاً وفقاً للدرجات المنوه عنها بالمادة (47) من هذا النظَام إلا إذا كان الضباط منتدباً مع وفد رسمي فيجري إركابه بالدرجة الأولى مهما كانت رتبته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 107
  article_text_ar: تصرف يومية الميدان لضباط القوات المسلحة العاملة في الميدان من جميع الرتب بمعدل ستة ريال يومياً ويحدد الوزير المناطق التي تصرف بموجبها للقوات يومية الميدان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 108
  article_text_ar: تصرف يومية الميدان لضباط القوات المسلحة أثناء المناورات والتمرينات الجماعية والمشاريع بمعدل ستة ريالات يوميا ويراعى لصرف هذه اليومية ما يلي :- أ- تصرف للقوات المشتركة في تمرينات تعبوية للوحدات من مستوى سرية فأعلى. ب- أن لا تقل مدة المشروع عن اثنتين وسبعين ساعة وأن لا تزيد على خمسة وأربعين يوماً ولا يجوز تجاوز هذه المدة إلا بتصديق رئيس هيئة الأركان العامة. ج- أن يجري المشروع في ظروف خدمة الميدان مع الإقامة والإعاشة المستديمة أثناء المشروع. د- إن لا تصرف هذه اليومية مع بدل الانتداب ولا عن مدد الإجازات والغياب. هـ- يستند في صرف يوميات الميدان بالنسبة للمناورات والتمرينات الجماعية والمشاريع على قرار من رئيس هيئة الأركان العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 109
  article_text_ar: 'يحال الضابط إلى الاستيداع من قبل الوزير بناءً على توصية لجنة الضباط العليا ويحدد في القرار مدة الإحالة إلى الاستيداع وذلك وفقاً لما يأتي : أ- تتم الإحالة إلى الاستيداع بسبب عدم اللياقة الطبية بناءً على تقرير طبي من اللجنة الطبية العسكرية مصادق من رئيس هيئة الأركان العامة. ب- تتم جوازاً إحالة الضابط إلى الاستيداع بناءً على طلبه لأسباب مقنعة يوافق عليها من رئيس هيئة الأركان العامة. ج- تمت إحالة الضابط إلى الاستيداع بسبب اتهامه بارتكاب جريمة إذا اقتضت ظروف التحقيق والمحاكمة ذلك بناءً على توصية رئيس هيئة الأركان العامة حتى يبت في أمره. د- تتم جوازاً إحالة الضابط إلى الاستيداع إذا قصر في امتحان الترقي مرتين أما إذا قصر في امتحان الترقية ثلاث مرات فيجب إحالته إلى الاستيداع ولا يعود الضابط المحال إلى الاستيداع إلى الخدمة إلا بعد اجتيازه الامتحان في المواد التي قصر فيها. وفي الحالتين لا تزيد مدة الإحالة على الاستيداع عن ثلاث سنوات طيلة حياة الضباط الوظيفية وعند استغراقها وعدم إعادة الضابط إلى الخدمة بسبب اجتيازه الامتحان الذي أخفق فيه يجب حتماً إنهاء خدمته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 110
  article_text_ar: إذا أعيد أحد الضباط إلى الخدمة وكان قد أحيل إلى الاستيداع لغير الأسباب المنصوص عليها في الفقرتين (ج،د) من المادة (109) يعود إلى رتبته التي كان يشغلها قبل إحالته إلى الاستيداع محتفظاً بأقدميته أما إذا كانت الإحالة إلى الاستيداع للأسباب المنصوص عليها في الفقرتين (ج،د) من المادة (109) فإذا أعيد إلى الخدمة قبل مضي سنة على استيداعه يعود إلى الرتبة التي كان بها محتفظاً بأقدميته فإذا كانت الإعادة بعد مضي سنة على استيداعه عاد إلى الرتبة التي كان بها وتكون أقدميته من يوم صدور القرار بالإعادة من الاستيداع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 111
  article_text_ar: يخضع الضابط إلى الاستيداع لأحكام الضبط والربط العسكري ولا يجوز أن يشتغل بالتجارة أو أي عمل آخر إلا بإذن كتابي من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 112
  article_text_ar: تتم إعادة الضابط إلى الخدمة العسكرية بقرار من لجنة الضباط العليا مصادق عليه من الوزير ويتعين على الضابط مباشرة عمله خلال شهر من تاريخ صدور القرار ما لم يمنعه عن ذلك مانع خارج عن إرادته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 113
  article_text_ar: لا يجوز للضابط الذي طلب إحالته إلى الاستيداع أن يترك الخدمة إلا بعد صدور الأمر له بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 114
  article_text_ar: يجب على الضابط المحال إلى الاستيداع أن يخطر شئون ضباط القوات المسلحة بعنوانه ومحل إقامته أو أي تغيير يطرأ على تنقلاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 115
  article_text_ar: لا يسمح للضباط الذين صدر قرار بإحالتهم إلى الاستيداع بارتداء الملابس العسكرية ويجوز لهم ارتداؤها عند دعوتهم إلى وزارة الدفاع والطيران أو عند حضورهم الحفلات الرسمية العسكرية وبتصريح من رئيس هيئة الأركان العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 116
  article_text_ar: يستحق الضابط المحال إلى الاستيداع نصف الراتب الفعلي لرتبته وذلك من تاريخ صدور القرار بالإحالة إلى الاستيداع ويصرف نصف الراتب المذكور من خزانة وزارة الدفاع والطيران على أن يلاحظ صرف الراتب الباقي له إذا كانت إحالته إلى الاستيداع وفقاً للفقرة (ج) من المادة 109 وثبتت براءته بصفة نهائية بعد ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 117
  article_text_ar: 'تنتهي خدمات الضابط لأحد الأسباب الآتية : أ- الإحالة إلى التقاعد. ب- الاستغناء عن خدماته. ج- الطرد من الخدمة العسكرية بناءً على قرار عسكري. د- صدور حكم عليه بحد شرعي أو في جريمة مخلة بالشرف أو الأمانة. هـ- الاستقالة. و- عدم اللياقة الطبية للخدمة العسكرية. ز- فقدان الجنسية. ح- الوفاة أو الفقدان.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 118
  article_text_ar: أ- يجب أن يكون طلب الاستقالة الذي يقدمه الضابط خالياً من أي شرط أو قيد، وإلا جاز للجهة المختصة عدم النظر فيها. ب- لا تنتهي خدمات الضابط إلا بصدور قرار قبول استقالته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 119
  article_text_ar: إذا قدم الضابط طلباً بالاستقالة فللمراجع المختصة حق رفضها أو قبولها ويخطر الضابط بالقبول أو الرفض في مدة أقصاها ثلاثة أشهر أما إذا كان الضابط رهن التحقيق أو المحاكمة فيجب إرجاء البت في الاستقالة إلى أن ينتهي التحقيق بالحفظ أو المحاكمة وفي الحالة الأخيرة ينتظر إلى أن يصدق على الحكم ثم ينظر في استقالته على ضوء النتيجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 120
  article_text_ar: لا يجوز للضابط ترك عمله في حالة طلب إحالته على التقاعد أو الاستقالة قبل إخطاره رسمياً بقبول طلبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 121
  article_text_ar: اذا اعيد الضابط المستقيل للخدمة يعاد برتبته الاصلية وتحدد اقدميته من تاريخ عودته ، واذا تساوى تاريخ عودته مع تاريخ زملائه لهذه الرتبة وضع كشف الاقدمية اخرهم
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 122
  article_text_ar: إذا انتهت خدمات الضابط لأسباب غير تأديبية فيعوض عن إجازته المتراكمة ويكون التعويض على أساس آخر راتب كان يتقاضاه الضابط مع كامل العلاوات والبدلات عدا بدل التمثيل. إذا أنهيت خدمات الضابط لأسباب تأديبية فيعامل بموجب القرار العسكري بحقه من ناحية تعويضه عن إجازاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 123
  article_text_ar: اذا فقد أحد الضباط أثناء تأدية الواجب الرسمي ولم تعلم حياته أو مماته يصرف راتبه الفعلي لعائلته لمدة ستة أشهر يفصل في نهايتها وتصفى حقوقه بموجب أحكام النظام كأنه توفي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 124
  article_text_ar: تشكل بالقوات المسلحة لجنة ضباط عليا تتكون من:- 1- رئيس هيئة الأركان العامة رئيساً 2- نائب رئيس هيئة الأركان العامة عضواً 3- رئيس هيئة الجيش عضواً 4- رئيس هيئة الاستخبارات الحربية عضواً 5- رئيس هيئة العمليات الحربية عضواً 6- رئيس هيئة الامدادات والتموين عضواً 7- قائد القوات الجوية عضواً 8- قائد القوات البحرية عضواً 9- نائب قائد القوات الجوية عضواً 10- نائب قائد القوات البحرية عضواً 11- مديرشؤون ضباط القوات المسلحة عضواً وسكرتيراً
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 125
  article_text_ar: 'تنظر لجنة الضباط العليا وتوصي بالمسائل الآتية : أ- بدء تعيين الضباط بالقوات المسلحة. ب- الاستغناء عن الخدمة والإعادة إليها. ج- منح الأوسمة. د- اختيار أعضاء البعثات العسكرية من بين المرشحين لها. هـ- النظر في طلبات الإعارة والإجازات الدراسية وإنهائها. و- تحديد الأقدمية ومنحها أو ردها وفقاً لأحكام هذا النظَام. ز- ترقية الضباط من رتبة رائد حتى رتبة عميد. ح- طلبات الإحالة للاستيداع أو التقاعد أو الاستقالة. ط- تعيين الضباط لمناصب القيادة والأركان والوظائف الرئيسية الأخرى. ي- نقل وإثبات الضباط من رتبة مقدم فأعلى. ك- نقل الضباط من قوة إلى أخرى بالقوات المسلحة. ل- نقل الضباط من سلاح إلى آخر لجميع الرتب. م- ترشيح الضباط للدراسة بكلية القيادة والأركان قبل تقديم أسمائهم لانتخاب المرشحين بموجب نظَام كلية القيادة والأركان. ن- القضايا التي يرى إحالتها إلى الوزير. ص- القضايا التي يرى إحالتها إليها رئيس هيئة الأركان العامة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 126
  article_text_ar: تجتمع اللجنة العليا بدعوة من رئيسها ، ويجب أن تنعقد مرة واحدة كل خمسة عشر يوماً على الأقل وتكون اجتماعاتها نظَامية عند حضور أكثر من نصف أعضائها من بينهم الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 127
  article_text_ar: عند غياب رئيس اللجنة العليا يحل محله من يكلف بالقيام بعمله اما اذا غاب أحد الأعضاء فلا يحل محله من يتولى منصبه ماعدا أعضاء القوات الجوية والبحرية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 128
  article_text_ar: إذا كان موضوع المناقشة يمس أحد أعضاء اللجنة فيجب على هذا العضو أن لا يحضر اجتماع اللجنة المختص لبحث موضوعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 129
  article_text_ar: تصدر توصيات اللجنة العليا بأغلبية أصوات الحاضرين وعند تساوي الأصوات يرجح رأي الجانب الذي فيه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 130
  article_text_ar: يصدر قرار من رئيس هيئة الأركان العامة بناء على توصية مدير شئون ضباط القوات المسلحة ينظم سير أعمال اللجنة واجتماعاتها والبت في القضايا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 131
  article_text_ar: تمارس هذه اللجنة الاختصاصات المنصوص عليها في المادة (125) من هذا النظَام ويحق لها تخويل لجان الضباط الفرعية بممارسة بعض هذه الاختصاصات بعد موافقة الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 132
  article_text_ar: يجوز للجنة الضباط العليا أن تستدعي مدير السلاح أو قائد التشكيل المختص في القوات المسلحة عند النظر في أمر ضابط تابع له للاسترشاد بمعلوماته عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 133
  article_text_ar: تكون توصيات لجنة الضباط العليا نافذة المفعول بعد تصديق الوزير عليها فيما يدخل في اختصاصه بموجب أحكام هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 134
  article_text_ar: للوزير الحق في الموافقة على توصيات لجنة الضباط العليا وله أن يعيدها إليها لبحثها من جديد أو أن يعدلها أو أن يصدر قراره فيها مباشرة في حدود الصلاحيات التي يملكها بمقتضى أحكام هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 135
  article_text_ar: تبني لجان الضباط توصياتها على ضوء التقارير والمعلومات المودعة في ملف الضابط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 136
  article_text_ar: تعتبر مداولات وتوصيات لجان الضباط سرية ولا يجوز بأي حال من الأحوال إعلان أو نشر أي توصية إلا بعد التصديق عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 137
  article_text_ar: لا يجوز الاستغناء عن خدمات الضابط تأديباً أو إحالته على الاستيداع لنفس السبب أو تخطيه بالترقية عند حلول دوره إلا طبقاً لأحكام هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 138
  article_text_ar: عند التماس الضابط إعادته للخدمة أو رد أقدميته يجوز إخطاره بتوصية لجنة الضباط خلال شهرين من تاريخ تقديم الطلب وعند عدم إخطاره بقرار اللجنة خلال ثلاثة شهور من تاريخ ورود الطلب إلى اللجنة يعتبر طلبه مرفوضاً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 139
  article_text_ar: تشكل لجان ضباط فرعية في فروع القوات المسلحة- الجيش- القوات الجوية- القوات البحرية ،وتتكون كل منها من خمسة ضباط على مستوى جيد من الثقافة والتخطيط وحسن الإدراك ويرأسها أقدم ضابط منهم على أن يكون أحدهم مدير إدارة شئون ضباط ذلك الفرع عضواً وسكرتيراً لها ،ولا يجوز أن يشترك في هذه اللجان أي من أعضاء لجنة الضباط العليا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 140
  article_text_ar: 'يتم ترشيح رئيس وأعضاء اللجان الفرعية على النحو الاتي :- أ-الجيش : يرشح رئيس هيئة الأركان العامة رئيس وأعضاء لجنة الضباط الفرعية في الجيش وفقا للمادة (139) من هذا النظام . ب-القوات الجوية : يرشح قائد القوات الجوية رئيس وأعضاء لجنة الضباط الفرعية في الجيش وفقا للمادة (139) من هذا النظام . ح‌-القوات البحرية : يرشح قائد القوات البحرية رئيس وأعضاء لجنة الضباط الفرعية في الجيش وفقا للمادة (139) من هذا النظام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 141
  article_text_ar: يصدر قرار من الوزير بناءً على توصية رئيس هيئة الأركان العامة بتعيين رؤساء وأعضاء لجان الضباط الفرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 142
  article_text_ar: تنظر لجان الضباط الفرعية وتوصي بالمواضيع الخاصة بالضباط من رتبة نقيب فما دون في حدود المسائل الآتية :- أ- بدء تعيين الضباط في القوات المسلحة. ب- الاستغناء عن الخدمة والإعادة إليها. ج- منح الأوسمة. د- اختيار أعضاء البعثات العسكرية من بين المرشحين لها. هـ- النظر في طلبات الإعارة والإجازات الدراسية وإنهائها. و- تحديد الأقدمية ومنحها أو ردها وفقاً لأحكام هذا النظَام. ز- الترقية. ح- طلبات الإحالة للاستيداع أو التقاعد أو الاستقالة. ط- نقل الضباط من سلاح إلى آخر. ي- القضايا التي يحيلها إليها رئيس هيئة الأركان العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 143
  article_text_ar: تجتمع لجان الضباط الفرعية بدعوة من رئيسها وتكون اجتماعاتها نظَامية عند حضور أكثر من نصف أعضائها من بينهم الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 144
  article_text_ar: تمارس لجان الضباط الفرعية أعمالها طبقاً للاختصاصات المنصـوص عليها في المادة (142) من هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 145
  article_text_ar: ترفع توصيات لجان الضباط الفرعية بعد إقرارها من :- أ‌-نائب رئيس هيئة الأركان العامة بالنسبة لتوصيات لجنة ضباط الجيش . ب‌-قائد القوات الجوية بالنسبة لتوصيات لجنة ضباط القوات الجوية. ت‌-قائد القوات البحرية بالنسبة لتوصيات لجنة ضباط القوات البحرية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 146
  article_text_ar: لا تكون توصيات هذه اللجان نافذة المفعول إلا بعد الموافقة عليها من رئيس هيئة الأركان العامة أو الوزير وفقاً لأحكام هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 147
  article_text_ar: تصدر توصيات هذه اللجان بأغلبية أصوات الحاضرين وعند تساوي الأصوات يرجح رأي الجانب الذي فيه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 148
  article_text_ar: عند غياب رئيس لجنة الضباط الفرعية يحل محله أقدم عضو من ضباط اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 149
  article_text_ar: إذا كان موضوع المناقشة يمس أحد أعضاء اللجنة فيجب على هذا العضو أن لا يحضر اجتماع اللجنة المخصص لبحث موضوعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 150
  article_text_ar: لرئيس هيئة الأركان العامة حق الاعتراض على توصيات لجان الضباط الفرعية وله أن يعيدها إليها لبحثها من جديد أو يصدر قراره فيها مباشرة في حدود الصلاحيات المخولة له بموجب أحكام هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 151
  article_text_ar: للوزير الاعتراض على توصيات لجان الضباط الفرعية وإعادتها إليها لبحثها من جديد أو يصدر قراره فيها مباشرة في حدود الصلاحيات التي يملكها بمقتضى أحكام هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 152
  article_text_ar: ينظم أعمال لجان الضباط الفرعية في القوات المسلحة:- أ‌-يصدر قرار من نائب رئيس هيئة الأركان العامة بناء على توصية مدير إدارة شؤون ضباط الجيش بعد التنسيق مع مدير شؤون ضباط القوات المسلحة ينظم سير اعمال الفرعية في الجيش واجتماعاتها والبت في القضايا المنوطة بها وفقا لأحكام هذا النظام . ب‌-يصدر قرار من قائد القوات الجوية بناء على توصية مدير إدارة شؤون ضباط القوات الجوية بعد التنسيق مع مدير شؤون ضباط القوات المسلحة ينظم سير اعمال اللجنة الفرعية في القوات الجوية واجتماعاتها والبت في القضايا المنوطة بها وفقا لأحكام هذا النظام . ت‌-يصدر قرار من قائد القوات البحرية بناء على توصية مدير إدارة شؤون ضباط قوات البحرية بعد التنسيق مع مدير شؤون ضباط القوات المسلحة ينظم سير اعمال اللجنة الفرعية في قوات البحرية واجتماعاتها والبت في القضايا المنوطة بها وفقا لأحكام هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 153
  article_text_ar: يعطي الضابط الذي تلحقه خسارة مادية بسبب عمله أو أثناء قيامه بتأديته أو قيامه بمهمة رسمية تعويضاً معادلاً للخسارة الفعلية على أن لا يتجاوز مقدار هذا التعويض رواتب ثلاثة شهور ، على أن يقدم الضابط الوثائق المثبتة لهذه الخسارة إلى الوزير عن طريق المرجع لاعتماده والتعويض عنها ، على أن تقدم طلبات التعويض خلال مدة شهر على الأكثر من تاريخ وقوع الخسارة المنوه عنها وإلا سقط الحق بالمطالبة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 154
  article_text_ar: يصرف للضابط ما يعادل راتبه الفعلي لثلاثة أشهر في الحالات الآتية :- أ-الإحالة على التقاعد بسبب العجز عن العمل. ب-الإحالة على التقاعد لبلوغه السن النظَامية. ج-الوفاة. وفيما عدا هذه الحالات يصرف له راتب شهرين إذا انتهت خدماته لأسباب غير تأديبية. وتعتبر هذه المبالغ عوضاً عن ترحيل الضابط وعائلته وأمتعتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 155
  article_text_ar: الضباط المنقولون أو الملحقون للعمل خارج المملكة يعاملون بالنسبة لنقل أمتعتهم أو تعويضهم عن أجورها كما يعامل منسوبو وزارة الخارجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 156
  article_text_ar: تؤمن للضابط تذكرة إركاب بالطائرة مرجعاً أو إركابه بواسطة النقل المناسب حسب الأحوال وذلك عند استدعائه لحضور الاجتماعات العسكرية أو المثول أمام الهيئات القضائية أو هيئات التحقيق أو اللجان الطبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 157
  article_text_ar: يعالج الضباط المتقاعدون ومن يعولونهم شرعاً في المستشفيات العسكرية بالداخل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 158
  article_text_ar: يجوز للوزير منح بعض الصلاحيات المخولة له بموجب هذا النظَام إلى نائب الوزير ورئيس هيئة الأركان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 159
  article_text_ar: للوزير أن يضع اللوائح والتعليمات اللازمة لتنفيذ هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 160
  article_text_ar: لمجلس الوزراء حق تفسير هذا النظَام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
- article_ref: المادة 161
  article_text_ar: يحل هذا النظَام محل نظَام خدمة الضباط الصادر بالمرسوم الملكي رقم م/18 وتاريخ 22/9/1379هـ ويلغى ما يتعارض معه من أنظمة وقرارات سابقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a12c94e-5a31-45cf-9c57-ac4400be8677/1
  verified: false
