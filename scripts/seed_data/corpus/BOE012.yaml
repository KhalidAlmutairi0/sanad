articles:
- article_ref: 'المادة الأولى: ( تعريفات)'
  article_text_ar: 'تدل الكلمات الآتية حيثما وردت على المعاني المبينة أمامها، ما لم يقض سياق النص بخلاف ذلك: 1 - الترخيص : الموافقة الرسمية التي تسمح بقيام المؤسسة الصحفية. 2 - التفرغ : عدم مزاولة أي عمل حكومي أو غير حكومي بأجر في غير المؤسسة. 3 - المؤسسة أو المؤسسات: المؤسسة أو المؤسسات الصحفية . 4 - عضو المؤسسة : الشخص الذي يملك جزءًا من رأس مال المؤسسة. 5 - الصحيفة : الجريدة أو المجلة. 6 - المطبوعات : الصحف والإصدارات الأخرى للمؤسسة الصحفية. 7 - الوزارة : وزارة الإعلام . 8 - الوزير : وزير الإعلام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: أ - ينبثق هذا النظام من السياسة الإعلامية للمملكة العربية السعودية، ويحقق أهدافها. ب - المؤسسة منشأة خاصة هدفها إصدار مطبوعات دورية، يكون رائدها خدمة المجتمع بنشر الثقافة والمعرفة، ملتزمة الصدق والموضوعية في كل ما تصدره من مطبوعات. وللمؤسسة أن تحقق أرباحًا معقولة بشكل لا يتعارض مع غايتها في إطار ضوابط هذا النظام. ج - تنشأ المؤسسة بموجب أحكام هذا النظام وتحمل اسمًا مميزًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: أ - يصدر الوزير الترخيص بإنشاء المؤسسة بعد موافقة رئيس مجلس الوزراء، بناءً على طلب يتقدم به عدد من السعوديين لا يقل عن ثلاثين شخصًا، يتضمن أهداف المؤسسة، وأسماء المؤسسين، ومؤهلاتهم، ومهنهم، وأعمارهم، واسم المؤسسة، والمطبوعات التي ستقوم بإصدارها، واللغة أو اللغات التي ستصدر بها، ورأس مالها، ومركزها الرئيس، وغير ذلك من البيانات التي تحددها الوزارة. ب - يجوز بقرار من الوزير الإذن للمؤسسة بإصدار مطبوعات دورية إضافية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون المركز الرئيس للمؤسسة في المدينة التي حددها الترخيص . ويجوز إصدار بعض مطبوعاتها في غير المركز الرئيس بعد موافقة الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: أ - يحدد رأس مال المؤسسة بالمقدار الكافي لتحقيق أهدافها. ب - للمؤسسة شخصية معنوية وذمة مالية مستقلة، وتنحصر المسئولية المالية لأعضائها بمقدار حصة كل منهم في رأس مال المؤسسة. ج - على كل مؤسسة أن تصدر حساباتها الختامية وميزانيتها السنوية مصدقة من محاسب قانوني مرخص له. د - تخصص نسبة كافية من الأرباح المتحققة سنويًّا؛ لأغراض التدريب وتوفير وسائل التقنية الحديثة اللازمة لتطوير العمل الصحفي. هـ - يخصص احتياطي نظامي لا يقل عن 10% من الأرباح سنويًّا. ويجوز أن تقرر الجمعية العمومية وقف هذا التخصيص متى بلغ الاحتياطي النظامي نصف رأس المال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يشترط في عضو المؤسسة ما يأتي : أ - أن يكون سعودي الجنسية. ب - ألا يكون عضوًا في مؤسسة صحفية أخرى. ج - أن يكون حاصلًا على مؤهل جامعي على الأقل، أو أن يكون من رجال العلم والفكر والإعلام، أو من رجال الأعمال المهتمين بالثقافة، ويجوز قبول عضوية الشخصيات المعنوية ذات الطبيعة الفكرية والثقافية والعلمية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: أ - أعضاء المؤسسة متساوون في حقوق التصويت، أو الترشح لمجلس الإدارة. ب - يجوز انضمام أعضاء جدد للمؤسسة من خلال زيادة رأس مال المؤسسة، أو بيع عضو أسهمه أو جزءًا منها، أو التنازل عنها أو جزء منها، أو من خلال التوريث. ج - في حالة الإرث، يرشح الورثة واحدًا منهم، فإذا لم تتوافر شروط العضوية في الوارث تباع الأسهم على عضو أو أعضاء من داخل المؤسسة، أو على أشخاص من خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتكون الجمعية العمومية من جميع أعضاء المؤسسة، وهي أعلى سلطة في المؤسسة، ولها اتخاذ القرارات اللازمة لتحقيق الأغراض التي أنشئت من أجلها المؤسسة، ولها على وجه الخصوص ما يأتي : أ - رسم السياسة العامة للمؤسسة.ب - اختيار أعضاء مجلس الإدارة وتعيينهم.ج - الموافقة على تعيين المدير العام، ورئيس التحرير وإعفائهما.د - التصديق على ميزانية المؤسسة، وحسابها الختامي.هـ - تعيين محاسب قانوني.و - إصدار اللائحة الداخلية للمؤسسة واللوائح الأخرى المنظمة لسير العمل فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تكون اجتماعات الجمعية العمومية وفق الضوابط والإجراءات الآتية : أ - تنعقد الجمعية العمومية مرة كل عام بدعوة من رئيس مجلس الإدارة، كما يجوز دعوتها- عند الاقتضاء- من قبل رئيس مجلس الإدارة، أو بطلب ثلاثة من أعضاء مجلس الإدارة، أو بطلب يتقدم به ربع الأعضاء على الأقل. ب - يتولى رئيس مجلس الإدارة رئاسة اجتماعات الجمعية العمومية أثناء انعقادها . ج - تعقد الجمعية العمومية جلساتها بحضور أغلبية الأعضاء، وإذا لم يكتمل النصاب في الجلسة الأولى تعد الجلسة الثانية نظامية إذا حضرها ثلث الأعضاء أصالة ونيابة، وللوزارة ندب ممثل عنها لحضور الاجتماع. د - يكون التصويت في الجمعية العمومية على أساس العضوية، ولكل عضو أن يصوت عن نفسه، وعن العضو الذي أنابه، وتصدر قرارات الجمعية بالأغلبية المطلقة للأعضاء الممثلين في الاجتماع- أصالة أو وكالة- فإذا تساوت الأصوات يرجح الجانب الذي صوت معه الرئيس. هـ - يحرر محضر لكل اجتماع من اجتماعات الجمعية العمومية يتضمن أسماء الأعضاء الحاضرين أصالة، والممثلين في الاجتماع نيابة، كما يتضمن جدول الأعمال وما اتخذ حياله من قرارات، وخلاصة وافية عن المناقشات التي دارت في
    الاجتماع، ويكون تدوين هذه المحاضر بصفة منتظمة عقب كل اجتماع في سجل خاص يوقعه رئيس المجلس ومقرر الاجتماع، وتوزع نسخ منه على أعضاء الجمعية العمومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'مجلس الإدارة : أ - يكون لكل مؤسسة مجلس إدارة يتكون من: 1 - عدد من أعضاء المؤسسة لا يقل عن ستة. 2 - المدير العام ورؤساء التحرير في المؤسسة، على ألا يزيد عددهم على ثلث مجموع أعضاء مجلس الإدارة . ب - يختار أعضاء مجلس الإدارة بالأغلبية المطلقة من بينهم رئيسًا للمجلس في أول اجتماع يعقدونه، على ألا يكون المدير العام، أو رئيس التحرير .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'مع مراعاة الاختصاصات المقررة للجمعية العمومية، لمجلس الإدارة اتخاذ القرارات والإجراءات اللازمة لتحقيق الأغراض التي أنشئت من أجلها المؤسسة، وله على وجه الخصوص ما يأتي : أ - اقتراح اللائحة الداخلية واللوائح الأخرى المنظمة لسير العمل. ب - إقرار الخطط اللازمة لتنمية موارد المؤسسة. ج - إقرار مشروع ميزانية المؤسسة، وحسابها الختامي، قبل عرضه على الجمعية العمومية. د - اقتراح الإصدارات الجديدة ورفعها إلى الوزارة للموافقة عليها. هـ - ترشيح المدير العام ورئيس التحرير لكل صحيفة مع أخذ موافقة الوزارة على ترشيح رئيس التحرير لمنصبه أو إعفائه منه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: أ - يجتمع مجلس الإدارة بدعوة من رئيسه مرة واحدة على الأقل كل ثلاثة أشهر. ب - لا يعد اجتماع المجلس صحيحًا إلا بحضور نصف أعضائه على الأقل بمن فيهم الرئيس أو من ينيبه. ج - تصدر قرارات المجلس بالأغلبية المطلقة لأصوات الأعضاء الحاضرين، فإذا تساوت الأصوات رجح الجانب الذي صوت معه الرئيس. د - يحرر لكل اجتماع محضر يذكر فيه مكان الاجتماع وتاريخه وأسماء الحاضرين والغائبين، وسبب الغياب إن وجد، كما يذكر في المحضر جدول الأعمال، والموضوعات التي نوقشت، وما اتخذ حيالها من قرارات، ويوقع المحضر رئيس المجلس ومقرره والأعضاء الحاضرون. هـ - لرئيس المجلس أن ينيب عنه- في حالة غيابه- من يرى من أعضاء المجلس لمدة محددة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تنتهي عضوية المجلس في الأحوال الآتية : أ - انتهاء المدة النظامية لدورة المجلس وفق ما تحدده اللائحة الداخلية للمؤسسة.ب - الاستقالة أو العجز الصحي.ج - صدور قرار من الجمعية العمومية بتنحية العضو من المجلس.د - إذا فقد العضو المعين في المجلس بحكم منصبه في المؤسسة المنصب الذي كان يتولاه.هـ - إذا حكم على العضو في جريمة تخل بدينه أو بالشرف أو الأمانة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: إذا شغر مركز أحد أعضاء المجلس، من غير المعينين فيه بسبب مناصبهم، فللمجلس أن يعين عضوًا بديلًا، على أن يعرض ذلك على الجمعية العمومية في أول اجتماع لها، ويكمل العضو الجديد مدة سلفه في المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يكون لكل مؤسسة مدير عام يتولى تصريف شؤون المؤسسة المالية والإدارية وفق السياسات والتعليمات المنظمة لذلك ويمثل المؤسسة في علاقتها مع الجهات الأخرى في الأمور المالية والإدارية وتحدد اللوائح الداخلية للمؤسسة اختصاصاته وصلاحياته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يشترط في المدير العام : أ - أن يكون سعودي الجنسية. ب - أن يكون متفرغًا. ج - أن يكون حاصلًا على مؤهل جامعي، وله خبرة لا تقل عن خمس سنوات في العمل الإداري أو الصحفي، ويجوز الاستثناء من شرط المؤهل الجامعي لمن تتوافر فيه كفاية فكرية وإدارية متميزة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: في حالة خلو منصب المدير العام يقوم نائبه بعمله، وإذا لم يوجد نائب يختار مجلس الإدارة أحد أعضائه للقيام بالعمل لمدة لا تزيد على ثلاثة أشهر، وفي الحالتين يتم خلال المدة المذكورة اختيار مدير عام يعين مؤقتًا إلى أن يعرض الأمر على الجمعية العمومية في أول اجتماع لها لأخذ الموافقة عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'يكون لكل صحيفة رئيس تحرير مسؤول عما ينشر في الصحيفة، وله من المهام والصلاحيات ما يأتي : أ - الإشراف المباشر على جميع شؤون تحرير الصحيفة وإدارته وتوجيهه، بما يحقق الأهداف والأغراض التي أنشئت المؤسسة من أجلها.ب - تمثيل الصحيفة في صلاتها مع الغير فيما يتعلق بالشؤون الصحفية.ج - وضع الخطط والبرامج التي تهدف إلى تطوير الصحيفة.د - ما تخوله اللائحة الداخلية من صلاحيات تكفل له أداء مهمته بالشكل المناسب والمنافس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'يشترط في رئيس التحرير : أ - أن يكون سعودي الجنسية.ب - أن يكون متفرغًا.ج - أن يكون حاصلًا على مؤهل جامعي وذا كفاية فكرية وإعلامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'تنتهي خدمة المدير العام ورئيس التحرير في إحدى الحالات الآتية : أ - قبول الاستقالة أو العجز الصحي.ب - إذا صدرت توصية مسببة من مجلس الإدارة بثلثي الأعضاء بإعفاء أي منهما من منصبه، ووافقت الجمعية العمومية على ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: في حالة خلو منصب رئيس التحرير ، يقوم مجلس الإدارة بتكليف أحد منسوبي المؤسسة بالقيام بمهمات رئيس التحرير ، وعلى مجلس الإدارة اتخاذ الإجراءات النظامية لتعيين رئيس للتحرير في مدة لا تتجاوز ثلاثة أشهر من خلو المنصب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 'يكون للصحيفة محررون متفرغون يعينهم رئيس التحرير ، ويكون من مهامهم ما يأتي : أ - العمل على تحقيق الأهداف والأغراض التي أنشئت المؤسسة من أجلها.ب - العمل على تحقيق التميز المطلوب للصحيفة.ج - تمثيل الصحيفة التمثيل اللائق في المناسبات واللقاءات والمؤتمرات.د - مراعاة ما تضمنه نظام حماية حقوق المؤلف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'تنتهي خدمة المحرر في الحالات الآتية : أ - قبول الاستقالة أو العجز الصحي.ب - إذا صدرت توصية مسببة من رئيس التحرير ووافق عليها مجلس الإدارة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'تحل المؤسسة ويلغى الترخيص الصادر بإنشائها في الحالات الآتية : أ - إذا بلغت خسائر المؤسسة (50%) من رأس المال، ما لم تقرر الجمعية العمومية استمرار المؤسسة وتوافق الوزارة على ذلك.ب - إذا قررت الجمعية العمومية بأغلبية ثلثي الأعضاء حلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'في حالة حل المؤسسة تتخذ الإجراءات الآتية : أ - تحدد الجمعية العمومية طريقة تصفية المؤسسة وتختار مصفيًا لها، وتنتهي عند ذلك مهمة مجلس الإدارة والمدير العام.ب - تتوقف أعمال المؤسسة عدا ما يلزم لتنفيذ إجراءات التصفية.ج - تتم أعمال التصفية بإشراف المصفي وعلى مسؤوليته باعتباره ممثلًا للمالكين، وتحت رقابة الوزارة.د - تدعو الوزارة الجمعية العمومية للانعقاد لإقرار نتائج التصفية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'على المؤسسة أن تضع خلال عام من بداية عملها ما يأتي : أ - هيكلًا تنظيميًّا يشمل إدارات المؤسسة وأقسامها ووحداتها، ويوضح مهامها وارتباطاتها الإدارية. ب - لائحة تنظيم العمل، وتشمل واجبات العاملين في المؤسسة وحقوقهم. ج - لائحة المكافآت والجزاءات. د - سلمًا للرواتب يضمن لمنسوبي المؤسسة حقوقهم في الترقيات والعلاوات السنوية. هـ - قواعد الانتدابات والبدلات والتعويضات وخلافه. و - اللائحة الداخلية، وتحدد اختصاصات أجهزة المؤسسة، وصلاحيات المسؤولين فيها، وتنظيم العلاقة فيما بينهم، كما تشمل الأمور التنظيمية الأخرى ذات العلاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تنشأ بموجب هذا النظام ووفقًا لأحكامه هيئة للصحفيين السعوديين ذات شخصية اعتبارية مستقلة، تعنى بشؤون الصحفيين، وتحدد اللائحة التنفيذية مهماتها واختصاصاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: على المؤسسات القائمة - خلال سنة من نفاذ هذا النظام- ترتيب أوضاعها مع أحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يصدر الوزير اللائحة التنفيذية اللازمة لتنفيذ أحكام هذا النظام، وذلك خلال عام من تاريخ صدوره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يحل هذا النظام محل نظام المؤسسات الصحفية الأهلية الصادر بالمرسوم الملكي ذي الرقم (62) المؤرخ في 24/ 8/ 1383هـ، ويعد نافذًا بعد ثلاثين يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c385b62c-c635-484c-afa1-a9a700f16fe1/1
  verified: false
