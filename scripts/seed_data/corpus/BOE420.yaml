regulation:
  code: BOE420
  name_ar: تنظيم المركز الوطني لأبحاث وتطوير الزراعة المستدامة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: المركز: المركز الوطني لأبحاث وتطوير الزراعة المستدامة (استدامة). التنظيم: تنظيم المركز. الوزير: وزير البيئة والمياه والزراعة. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط تنظيمياً بالوزير، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع ومكاتب له داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى إدارة المعرفة والتمكين الفعال؛ لتطوير تقنيات النظم الزراعية المستدامة, والإشراف على المشروعات والبرامج البحثية، وإجراء الأبحاث والدراسات والتجارب، وذلك في مجالات الزراعة المحمية، والمكافحة الحيوية, والأسمدة, وترشيد استخدام المياه، وتسهيل عملية الابتكار؛ لغرض دعم الزراعة المستدامة وتنميتها والتوسع في تطبيقاتها، وله دون إخلال باختصاصات الجهات الحكومية ذات العلاقة، اتخاذ ما يلزم في سبيل تحقيق أهدافه، وعلى وجه خاص ما يأتي: إجراء الأبحاث والدراسات والتجارب في مجالات عمل المركز؛ للوصول إلى التقنيات الحديثة التي تتواكب مع بيئة المملكة. تطوير التقنيات الحديثة والمبتكرة وتطبيقاتها العملية ذات الصلة بمجالات عمل المركز، ونقلها، وتوطينها. بناء قاعدة بيانات إلكترونية تُعنى باختصاصاته، وتطويرها. وضع ما يلزم في شأن تطوير الخطط والبرامج البحثية؛ لتحديد المعوقات البيئية أو الإنتاجية أو التسويقية، وإيجاد الحلول لها. التعاون مع الأفراد والجهات وبيوت الخبرة المتخصصة داخل المملكة وخارجها، وذلك في حدود اختصاصات المركز. عقد المؤتمرات والندوات واللقاءات العلمية وورش العمل والدورات
    التدريبية، وذلك في حدود اختصاصات المركز. نشر الإنتاج العلمي, والمشاركة فيه. نشر الوعي بالممارسات الزراعية المستدامة المتبعة والتقنيات الحديثة والمبتكرة. تقديم الاستشارات والدعم الفني والحلول العملية للقطاعين العام والخاص، في مجال نظم الزراعة المستدامة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير، وعضوية كل من: أ ـ مدير عام المركز. ب ـ ممثلين من وزارة البيئة والمياه والزراعة. ج ـ ممثل من وزارة المالية. د ـ ممثل من وزارة الاقتصاد والتخطيط. هــ ممثل من وزارة التجارة والاستثمار. و- اثنين من أعضاء هيئة التدريس بالجامعات يسميهما وزير التعليم بالاتفاق مع الوزير. ز ـ ممثل من مجلس الغرف التجارية والصناعية السعودية. ح ـ ممثلين من القطاع الخاص من المتخصصين في مجال عمل المركز، يعينون بقرار من مجلس الوزراء، بناءً على ترشيح من الرئيس. يجب ألا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن المرتبة (الرابعة عشرة) أو ما يعادلها. وفيما عدا الرئيس ومدير عام المركز, تكون عضوية المجلس ثلاث سنوات قابلة للتجديد مرة واحدة فقط, وتحدد مكافآت الأعضاء بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على شؤون المركز وتصريف أموره، وله أن يتخذ القرارات اللازمة لتحقيق أغراضه في حدود أحكام التنظيم، وله على وجه خاص ما يأتي: إقرار الهيكل التنظيمي للمركز. إقرار اللوائح المالية والإدارية لأعمال المركز بالاتفاق مع وزارة المالية، وغيرها من اللوائح الداخلية. إقرار السياسات العامة للمركز وخططه وبرامجه. اقتراح مشروع ميزانية المركز ورفعه لاستكمال اعتمادها وفقاً للإجراءات النظامية. الموافقة على حساب المركز الختامي والتقرير السنوي وتقرير مراجع الحسابات؛ تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، وفقاً للإجراءات النظامية المتبعة. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات المركز، واقتراح تعديل القائم منها، ورفعها لاستكمال الإجراءات النظامية. الموافقة على إنشاء فروع ومكاتب للمركز داخل المملكة. قبول الهبات والإعانات والتبرعات والمنح والوصايا والأوقاف، وفقاً للأنظمة المتبعة. تحديد المقابل المالي للخدمات التي يقدمها المركز وفقاً لاختصاصه. وللمجلس -في سبيل تحقيق
    هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض كل أو بعض اختصاصاته إلى رئيسه، أو إلى من يراه من أعضائه أو منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعقد اجتماعات المجلس في مقر المركز الرئيس, ويجوز عقدها في مكان آخر. يجتمع المجلس مرتين على الأقل في السنة بناءً على دعوة من رئيسه، ومتى اقتضت المصلحة ذلك، على أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع، وعلى الرئيس أن يدعو المجلس إلى الاجتماع متى طلب ذلك (أربعة) من أعضائه على الأقل، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل بمن فيهم الرئيس أو من ينيبه من ممثلي الجهات الحكومية الأعضاء في المجلس لرئاسة الاجتماعات في حال غيابه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. تدون مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. لا يجوز للعضو الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه. لا يجوز للعضو أن يفشي شيئًا مما اطلع عليه من أسرار المركز حتى بعد انتهاء عضويته في المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للمركز مدير عام، يُعين ويعفى من منصبه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول التنفيذي عن إدارة المركز، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم، وما يقرره المجلس، وله بوجه خاص تولي الاختصاصات الآتية: الإشراف على إعداد هيكل المركز التنظيمي، ورفعه إلى المجلس؛ للنظر في إقراره. الإشراف على إعداد اللوائح المالية والإدارية للمركز، ورفعها إلى المجلس؛ للنظر في إقرارها. الإشراف على إعداد السياسات العامة للمركز وخططه وبرامجه, ومتابعة تنفيذها بعد إقرار المجلس لها. الإشراف على إعداد مشروع الميزانية والحساب الختامي والتقرير السنوي للمركز, ورفعها إلى المجلس. الإشراف على سير العمل في المركز, ومتابعة تنفيذ ما يعتمده المجلس في المجال الإداري والمالي والفني للمركز. تعيين العاملين في المركز والإشراف على منسوبيه, وفقاً للأنظمة واللوائح المعمول بها. الصرف من ميزانية المركز, واتخاذ جميع الإجراءات المالية، وفقاً للأنظمة واللوائح المعمول بها, وفي حدود الصلاحيات التي يفوضه بها المجلس. تمثيل المركز أمام القضاء, ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى
    ذات العلاقة, وغيرها من الجهات داخل المملكة وخارجها. التعاقد مع الغير وفق ما يقتضيه سير العمل في المركز, وفي حدود الصلاحيات التي فوضه بها المجلس. -التوقيع على الاتفاقيات ومذكرات التفاهم والعقود بعد موافقة المجلس, ووفقاً للإجراءات النظامية المتبعة. تقديم تقارير دورية إلى المجلس عن أعمال المركز. أي اختصاص آخر يكلفه به المجلس. وللمدير العام تفويض بعض اختصاصاته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتألف موارد المركز من الآتي: أـما يعتمد له من مخصص ضمن ميزانية وزارة البيئة والمياه والزراعة. ب - المقابل المالي الذي يحصل عليه عن الخدمات التي يقدمها. ج- ما يقبله المجلس من هبات وإعانات وتبرعات ومنح ووصايا وأوقاف. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع إيرادات المركز في حساب جاري وزارة المالية لدى مؤسسة النقد العربي السعودي. للمركز فتح حسابات أخرى في البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفق ميزانية المركز المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع منسوبو المركز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات المركز وعملياته, يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة, لتدقيق حساباته ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي, ويحدد المجلس أتعابه. ويُرفع تقرير مراجع الحسابات إلى المجلس, ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fdc204c9-f7a3-4e17-9ce8-aa4700feac9f/1
  verified: false
