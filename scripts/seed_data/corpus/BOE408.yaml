regulation:
  code: BOE408
  name_ar: تنظيم مجمع خادم الحرمين الشريفين الملك سلمان بن عبدالعزيز ال سعود للحديث النبوي الشريف
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'المجمع: مجمع خادم الحرمين الشريفين الملك سلمان بن عبدالعزيز آل سعود للحديث النبوي الشريف. التنظيم: تنظيم المجمع. المجلس: مجلس أمناء المجمع. الرئيس: رئيس المجلس. المجلس العلمي: المجلس العلمي للمجمع. المدير: المدير التنفيذي للمجمع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1- يتمتع المجمع بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط تنظيميًّا بالملك. 2- يكون مقر المجمع الرئيس في المدينة المنورة، وله -بقرار من المجلس- إنشاء فروع أو مكاتب له بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المجمع إلى تحقيق ما يأتي: 1- بيان عِظَم مكانة السنة النبوية، كونها المصدر الثاني للتشريع الإسلامي بعد القرآن الكريم، وتقديمها إلى العالم أجمع بصورتها الصحيحة الصالحة لكل زمان ومكان. 2- خدمة السنة النبوية وعلومها جمعاً وتصنيفاً وتحقيقاً ودراسةً ونشراً. 3- حماية السنة النبوية من أيِّ تجاوزٍ في الفهم أو الاستدلال، وتعزيز مفاهيم الوسطية والاعتدال ومكافحة مسبِّبات الغلو والتطرف والإرهاب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للمجمع في سبيل تحقيق أهدافه القيام -دون حصر- بما يأتي: 1- جمع الأحاديث النبوية الشريفة المتواترة والثابتة, وتحقيقها, وتوثيقها؛ في كتاب واحد ونشره بعدة لغات. 2- إعداد معاجم وفهارس شاملة للأحاديث النبوية الشريفة, وإعداد موسوعات للمتون وتراجم رواة الحديث النبوي الشريف. 3- إقامة مؤتمرات وندوات وأنشطة عن الحديث النبوي الشريف, وتنظيمها، وفقاً للإجراءات المنظمة لذلك. 4- المشاركة في المؤتمرات والندوات والأنشطة المحلية والدولية الداخلة في مجال اختصاصه، وفقاً للإجراءات المنظمة لذلك. 5- التعاون مع المراكز العلمية المتخصصة في الحديث النبوي الشريف؛ لتحقيق أهداف المجمع من خلال تبادل المعلومات والخبرات. 6- إصدار مجلة علمية محكّمة متخصصة في الحديث النبوي الشريف وعلومه. 7- إنشاء مكتبات متخصصة في الحديث النبوي الشريف وعلومه. 8- إقامة مسابقات علمية في الحديث النبوي الشريف وعلومه. 9- استثمار أحدث التقنيات والبرمجيات في خدمة الحديث النبوي الشريف وعلومه. 10- تطوير المناهج والأساليب والأدوات العلمية لخدمة الحديث النبوي الشريف وعلومه. 11- وضع برامج للعناية بالنوابغ والمتخصصين في الحديث النبوي
    الشريف وعلومه، وتأهيلهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للمجمع مجلس أمناء يتكون من رئيس وعشرة أعضاء يعينون بأمر ملكي, وتحدد فيه مكافآتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يكون المجلس هو السلطة المسؤولة عن رسم السياسة العامة للمجمع في حدود أحكام التنظيم، وله أن يتخذ جميع القرارات اللازمة لتحقيق أهداف المجمع ومهماته، وعلى وجه خاص ما يأتي: 1- الإشراف على تنفيذ المجمع المهمات المنوطة به. 2- إقرار السياسات والخطط والبرامج والمشروعات التي تحقق أهداف المجمع. 3- إقرار الهيكل التنظيمي للمجمع. 4- إقرار اللوائح المالية والإدارية والوظيفية وغيرها، على أن تتضمن تلك اللوائح تحديداً لشروط تعيين منسوبي المجمع وأجورهم ومزاياهم وحقوقهم وواجباتهم، ويكون إقرار اللوائح المالية والإدارية بالاتفاق مع وزارة المالية. 5- إقرار مكافآت أعضاء المجلس العلمي ومزاياهم وقواعد عملهم. 6- إقرار اللوائح الداخلية والفنية والإجراءات والقواعد والمعايير المتعلقة بنشاط المجمع. 7- إقرار مشروع ميزانية المجمع وحسابه الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيداً لرفعها إلى الملك. 8- النظر في التقارير الدورية عن سير العمل في المجمع واتخاذ القرارات اللازمة بشأنها. 9- الموافقة على إنشاء فروع أو مكاتب للمجمع. 10- قبول الهبات والتبرعات والمنح والوصايا والهدايا والأوقاف، وفقاً
    للإجراءات المنظمة لذلك. 11- تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي. وللمجلس تكوين لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم للقيام بما يكلفها به من مهمات، وله كذلك تفويض بعض اختصاصاته إلى من يراه من أعضائه أو المدير أو أي من منسوبي المجمع، وفق ما يقتضيه سير العمل فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يعقد المجلس اجتماعاته بصفة دورية بدعوة من رئيسه بمبادرة منه أو بناء على طلب أغلبية الأعضاء على الأقل وفقاً للوائح الداخلية التي يقرها المجلس، على ألاّ تقل عن اجتماعين خلال العام، ولا يكون اجتماع المجلس نظاميًّا إلاّ بحضور أغلبية أعضائه على الأقل، على أن يكون من بينهم الرئيس أو من ينيبه من الأعضاء، وتصدر القرارات بموافقة أغلبية الأعضاء الحاضرين على الأقل، وعند التساوي يُرجّح الجانب الذي صوت معه رئيس الاجتماع. وللرئيس دعوة من يراه لحضور اجتماعات المجلس دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للمجمع مجلس علمي يضم صفوة من علماء الحديث النبوي الشريف في العالم، ويعين رئيسه وأعضاؤه بأمر ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1- يتولى المجلس العلمي المراجعة العامة للمنهجية العلمية وتقديم الآراء العلمية والتوصيات والاستشارات للمجلس وفقاً لما يحيله إليه المجلس أو المدير. 2- للمجلس العلمي تكوين لجان دائمة أو مؤقتة من بين أعضائه للقيام بما يكلفها به من مهمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يعقد المجلس العلمي اجتماعاته بصفة دورية بدعوة من رئيسه بمبادرة منه أو بناء على طلب الرئيس أو طلب أغلبية الأعضاء على الأقل، على ألاّ تقل عن اجتماعين خلال العام، ولا يكون اجتماع المجلس العلمي نظاميًّا إلاّ بحضور أغلبية أعضائه على الأقل، على أن يكون من بينهم رئيس المجلس العلمي أو من يُنيبه من الأعضاء. وتصدر توصياته بموافقة أغلبية الأعضاء الحاضرين على الأقل، وعند التساوي يُرجّح الجانب الذي صوّت معه رئيس الاجتماع. ولرئيس المجلس العلمي دعوة من يراه لحضور اجتماعات المجلس العلمي دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 1- يكون للمجمع مدير تنفيذي يُعين بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويتولى إدارة المجمع في حدود ما يقضي به التنظيم، وما يُقرره المجلس، ويمثله أمام القضاء والهيئات والمؤسسات الأُخرى وله تفويض غيره في ذلك. 2- تحدد صلاحيات المدير ومسؤولياته وفقاً للوائح التي يقرها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: '1- تتكون موارد المجمع من المصادر الآتية: أ- الاعتمادات التي تخصص له في الميزانية العامة الدولة. ب- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وهدايا وريع أوقاف. ج- أي مورد آخر يقره المجلس. 2- تودع أموال المجمع في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. 3- يفتح المجمع حساباً له في مؤسسة النقد العربي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المجمع المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 1- تكون للمجمع ميزانية سنوية مستقلة تعد وتصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. 2- السنة المالية للمجمع هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع جميع منسوبي المجمع لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يرفع المجمع حسابه الختامي السنوي إلى الملك خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويُزوّد الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يرفع المجمع إلى الملك -خلال تسعين يوماً من تاريخ انتهاء السنة المالية- تقريراً سنويًّا عما حققه من إنجازات خلال السنة المنقضية وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: مع عدم الإخلال بحق الديوان العام للمحاسبة في الرقابة على حسابات المجمع، يعين المجلس مراجع حسابات خارجياً أو أكثر من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابهم. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3a067704-6e6f-42bd-9767-ab5700c9524f/1
  verified: false
