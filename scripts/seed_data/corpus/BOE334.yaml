articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمامها، ما لم يقتض السياق غير ذلك: الصندوق: صندوق تنمية الموارد البشرية. المجلس: مجلس إدارة الصندوق. التنظيم: تنظيم إعانة البحث عن عمل. اللائحة: اللائحة التنفيذية للتنظيم. الإعانة: إعانة البحث عن عمل. مقدم الطلب: من تقدم بطلب للاستفادة من الإعانة. المؤهل: مقدم الطلب الذي توافرت شروط الأهلية لديه ولم يبدأ بالاستفادة من الإعانة. المستفيد: المؤهل الحاصل على الإعانة. الأسرة: مجموعة أفراد -يقيمون في مسكن واحد- مكونة من زوج وزوجة (أو أكثر) وأولادهما أو بعض أفراد هذه المجموعة. المعاش التقاعدي: مبلغ يُصرف شهريًّا لمقدم الطلب بصفته المستحق المباشر بناءً على نظام التقاعد المدني أو نظام التقاعد العسكري أو نظام التأمينات الاجتماعية. الدخل الشهري: مجموع المبالغ المالية التي حصل عليها مقدم الطلب وأسرته خلال الشهر الذي يسبق طلب الحصول على الإعانة، من رواتب أو عوائد تجارية أو غيرها، وفقًا لما تحدده اللائحة. الثروة: الأصول أو الأموال لمقدم الطلب وأسرته القابلة للتقويم، وفقًا لما تحدده اللائحة. المفوض من الصندوق:
    أي جهة حكومية أو خاصة يفوضها الصندوق لأداء بعض المهمات والمسؤوليات المنوطة به لتنفيذ أحكام التنظيم أو اللائحة. التعليم: التعليم في أي من مؤسسات التعليم العام أو التعليم العالي، وفقًا لما تحدده اللائحة. التدريب: التدريب التقني أو المهني الذي تتجاوز مدته (ثلاثة) أشهر. التدريب على رأس العمل: المهمات أو الأعمال التي يطلب فيها الصندوق أو من يفوضه من المؤهل أو المستفيد القيام بها، والتي تهدف إلى تنمية مهاراته وزيادة فرص حصوله على عمل. المنصة الإلكترونية: موقع أو تطبيق إلكتروني ينشئه الصندوق وفقًا للتنظيم، أو أية موقع أو تطبيق إلكتروني آخر يحدده الصندوق. التدريب الإلكتروني: المهمات أو الأعمال التي يطلب فيها الصندوق أو من يفوضه من المؤهل أو المستفيد القيام بها من خلال المنصة الإلكترونية أو غيرها من وسائل التقنية الحديثة، والتي تهدف إلى تنمية مهاراته وزيادة فرص حصوله على عمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف التنظيم إلى الآتي: تنظيم صرف الإعانة وتحديد الأشخاص الذين يحق لهم الحصول عليها. العمل على دعم الباحثين عن عمل ومساعدتهم في الحصول عليه. تحفيز الباحثين عن عمل لدخول سوق العمل. تحديد حقوق الأطراف ذات العلاقة (الصندوق والباحثين عن عمل) ومسؤولياتهم والتزاماتهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يكون صرف مبلغ الإعانة لمدة (خمسة عشر) شهرًا، بحسب الآتي: (ألفا) ريال شهريًّا لمدة (أربعة) أشهر، يبدأ احتسابها من تاريخ بداية صرف الإعانة. (ألف وخمسمائة) ريال شهريًّا لمدة (أربعة) أشهر، يبدأ احتسابها من تاريخ انتهاء الفترة المنصوص عليها في الفقرة (1) من هذه المادة. (ألف) ريال شهريًّا لمدة (أربعة) أشهر، يبدأ احتسابها من تاريخ انتهاء الفترة المنصوص عليها في الفقرة (2) من هذه المادة. (سبعمائة وخمسون) ريالًا شهريًّا لمدة (ثلاثة) أشهر، يبدأ احتسابها من تاريخ انتهاء الفترة المنصوص عليها في الفقرة (3) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون مقدم الطلب مؤهلًا للحصول على الإعانة في حال توافرت فيه الشروط الآتية: أن يكون سعودي الجنسية. أن يكون مقيمًا إقامة دائمة في المملكة العربية السعودية. وتحدد اللائحة شروط الإقامة الدائمة. أن يكون قادرًا على العمل وجادًّا في البحث عنه. وتحدد اللائحة معايير القدرة والجدية. ألَّا يقل عمره عن (عشرين) سنة، ولا يزيد على (أربعين) سنة. ألَّا يكون موظفًا أو عاملًا في القطاع العام أو القطاع الخاص. ألَّا يكون يصرف له معاش تقاعدي. ألَّا يكون يصرف له أي مخصص أو تعويض ضد التعطل عن العمل. ألَّا يكون يصرف له معاش من الضمان الاجتماعي. ألَّا يكون طالبًا أو متدربًا في أي مرحلة من مراحل التعليم أو التدريب. ألَّا يكون لديه نشاط تجاري، وفقًا لما تحدده اللائحة. ألَّا يزيد الدخل الشهري أو الثروة عن الحد المانع للحصول على الإعانة، وفقًا لما تحدده اللائحة. ألَّا يكون سبق له الاستفادة من إعانة البحث عن عمل، أو من المخصص المالي لصعوبة الحصول على عمل. واستثناءً من ذلك يجوز قبول طلب مقدم الطلب الذي سبق له الاستفادة، بشرط ألَّا يزيد بكل الأحوال مجموع مدد الصرف السابقة واللاحقة عن مدة صرف الإعانة
    المنصوص عليها في المادة (الثالثة) من التنظيم، وتحدد اللائحة آلية احتساب المدد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يكون تقديم الطلب إلى الصندوق أو من يفوضه عبر المنصة الإلكترونية أو أي وسيلة أخرى يحددها الصندوق. يقدم الطلب مع مراعاة إحدى المدتين الآتيتين: أ- قبل مضي (أربعة وعشرين) شهرًا من تاريخ انتهاء الدراسة أو التدريب في أيٍّ من مراحل التعليم أو التدريب. ب- بعد مضي (أربعة وعشرين) شهرًا من تاريخ انتهاء العلاقة الوظيفية أو العمالية إذا كان ممن سبق له العمل في القطاع العام أو القطاع الخاص مع مراعاة ما ورد في الفقرة (7) من المادة (الخامسة) من التنظيم. ويجوز للمجلس تعديل هاتين المدتين بالاتفاق مع صندوق التنمية الوطني. يلتزم مقدم الطلب بما يلي: أ- الحضور في الموعد الذي يحدده الصندوق أو من يفوضه لتقويم طلبه، وفقًا لما تحدده اللائحة. ب- تزويد الصندوق أو من يفوضه بجميع المستندات التي يطلبها وبالطريقة التي يحددها. ج- التعليمات التي يصدرها الصندوق أثناء دراسة طلبه، وفقًا لما تحدد اللائحة. 4- يقوم الصندوق بدراسة الطلب للتحقق من توافر شروط الأهلية، على أن يُشعر مقدم الطلب بالقرار المتخذ في شأنه خلال مدة لا تتجاوز شهرين من تاريخ استكمال الطلب. وفي حال كان قرار الصندوق رفض الطلب، يجب أن يكون
    الرفض مسببًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يلتزم المؤهل والمستفيد بدءًا من تاريخ قبول الطلب أو تاريخ صرف الإعانة بما يأتي: إشعار الصندوق فورًا بكل تغيير يطرأ ويترتب عليه -أو قد يترتب عليه- عدم أهليته للإعانة. تقديم المستندات التي يطلبها الصندوق أو من يفوضه لتمكينه من التحقق من توافر شروط الأهلية لديه. التقيد بالتعليمات التي يصدرها الصندوق أو من يفوضه للمؤهل وللمستفيد شخصيًّا أو من خلال ملفه الإلكتروني في المنصة الإلكترونية أو من خلال أي وسيلة أخرى يقررها الصندوق أو من يفوضه، بما في ذلك الحضور شخصيًّا لتقويم طلبه أو الحضور لإجراء المقابلات الشخصية مع أصحاب العمل أو مع الجهات الأخرى التي يحددها الصندوق أو من يفوضه. الحضور لأي دورة تعليمية أو تدريبية، ويشمل ذلك التدريب الإلكتروني أو التدريب على رأس العمل. الحضور لدى الصندوق أو من يفوضه للحصول على التأهيل أو التدريب أو خدمات التوظيف. زيارة الملف الإلكتروني في المنصة الإلكترونية، وفقًا لما تحدده اللائحة. الموافقة على عروض العمل المناسبة التي تقدم له. ويكون عرض العمل مناسبًا إذا توافرت فيه الشروط الآتية: أ- ملاءمته مع مستوى المؤهل العلمي لمقدم الطلب وخبرته بحسب الوظائف
    المقدمة من أصحاب العمل. ب- ألَّا يقل الأجر الشهري عن الحد الأدنى الذي يحدده الصندوق وفقًا للمعايير التي تحددها اللائحة. ج- ألَّا تزيد المسافة بين مقر العمل ومقر إقامة المؤهل أو المستفيد عن المسافة التي تحددها اللائحة. د- أن يتوافق مع التعليمات الصادرة من وزارة الموارد البشرية والتنمية الاجتماعية. ولا يعتد بما ورد في الشروط المنصوص عليها في الفقرات الفرعية (أ) و(ب) و(ج) لغرض تحديد عرض العمل المناسب في حال لم يسبق للمؤهل أو المستفيد العمل وكان مؤهله العلمي الشهادة الثانوية فأقل، أو إذا رفض عرضي عمل تتوافر فيهما جميع الشروط المنصوص عليها في الفقرات الفرعية (أ) و(ب) و(ج)، أو قد مضى على تسجيله لدى الصندوق (ستة) أشهر أو أكثر. وللصندوق وفق تقديره الاستثناء من بعض هذه الشروط. إظهار الجدية في البحث عن عمل والالتزام بالتدريب والتأهيل الذي يقدم له. التجاوب مع الصندوق أو من يفوضه عند التواصل بأي من وسائل التواصل. التجاوب بالحضور إلى الصندوق أو من يفوضه لتقييم جديته في البحث عن عمل. أية التزامات أخرى يحددها الصندوق وفقًا لأهداف التنظيم واللائحة. على المؤهل إمضاء مدة لا تزيد على شهرين دون أن يخل بأي
    من التزاماته المنصوص عليها في هذه المادة دون عذر يقبله الصندوق، وعلى المستفيد عدم الإخلال بأي من التزاماته المنصوص عليها في هذه المادة دون عذر يقبله الصندوق. وتحدد اللائحة نوع وعدد الالتزامات المنصوص عليها في هذه المادة التي يترتب على عدم القيام بها عدم صرف الإعانة للمؤهل، أو تخفيضها أو إيقاف صرفها عن المستفيد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يوقف صرف الإعانة للمستفيد -فورًا- في أي من الحالات الآتية: أ- انتهاء مدة صرف الإعانة له. ب- إذا طلب إيقاف صرف الإعانة. ج- إذا توفي. د- إذا زال عنه أي شرط من شروط استحقاقه المحددة في المادة (الخامسة) من التنظيم. إذا أوقف صرف الإعانة للمستفيد استنادًا إلى الفقرة الفرعية (أ) من الفقرة (1) من هذه المادة، فإنه لا يحق له التقدم بطلب جديد للحصول على الإعانة. دون إخلال بأحكام المادة (السابعة) من التنظيم، إذا أوقف صرف الإعانة للمستفيد استنادًا إلى الفقرة الفرعية (ب) أو (د) من الفقرة (1) من هذه المادة، يجوز للصندوق قبول طلبه باستكمال صرف الإعانة، وفقًا لما تحدده اللائحة، مع مراعاة ألَّا تتجاوز المدة الإجمالية لصرف الإعانة -سواء كانت مستمرة أم متقطعة- (خمسة عشر) شهرًا، مع مراعاة ما ينطبق على مبلغ الإعانة وفق المادة (الثالثة) من التنظيم. تخفض الإعانة بمبلغ (مائتين) ريال شهريًّا، ويستمر التخفيض إلى انتهاء المدة المنصوص عليها في المادة (الثالثة) من التنظيم، وذلك إذا لم يلتزم المستفيد بأحد التزاماته المحددة في المادة (السابعة) من التنظيم، وفقًا لما تحدده اللائحة. يخصم من الإعانة قيمة
    الدخل الشهري والثروة، وفقًا لما تحدده اللائحة. للصندوق تعليق صرف الإعانة للمستفيد مؤقتًا وبمدة لا تزيد على (ستة) أشهر، وتحدد اللائحة الحالات التي يمكن فيها تعليق صرف الإعانة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجب على المستفيد -الذي قدم عمداً بيانات أو معلومات غير صحيحة بغرض الحصول على الإعانة- إعادة كامل مبلغ الإعانة التي صرفت له. للصندوق إحالة من يقدم بيانات أو معلومات غير صحيحة بغرض الحصول على الإعانة إلى الجهات المختصة لاتخاذ الإجراءات النظامية في حقه. يجوز للصندوق أو من يفوضه اتخاذ جميع الإجراءات اللازمة لاسترداد مبالغ الإعانة التي صرفت للمستفيد وثبت عدم استحقاقه لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'دون إخلال باختصاصات صندوق التنمية الوطني، يتولى الصندوق الآتي: إعداد القرارات التنفيذية اللازمة لتنفيذ أحكام التنظيم؛ ليعتمدها المجلس. التنسيق مع الجهات الحكومية والخاصة لتسهيل إجراءات تقديم الطلبات وصرف الإعانة للمستفيدين وتقديم الدعم لهم. إنشاء المنصة الإلكترونية وتشغيلها والتواصل مع مقدم الطلب والمؤهل والمستفيد من خلالها أو من خلال أية وسيلة يحددها الصندوق، وتحديد الإجراءات التي يجب اتباعها لتقديم الطلب، وفقًا لما تحدده اللائحة. استقبال طلبات تقديم الحصول على الإعانة، ودراستها، ثم اتخاذ قرار بقبول الطلب أو رفضه. وللصندوق في سبيل ذلك الحصول على المعلومات الخاصة بمقدم الطلب من الجهات الحكومية أو الخاصة. متابعة المستفيدين، والتأكد من استمرار توافر شروط الأهلية لديهم للحصول على الإعانة، وإصدار القرارات المتعلقة بإيقاف الإعانة أو تعليقها أو تخفيضها أو الخصم منها. وللصندوق في سبيل ذلك الحصول على المعلومات الخاصة بالمؤهلين والمستفيدين من الجهات الحكومية أو الخاصة. تنفيذ جميع البرامج والدورات وورش العمل اللازمة للمؤهلين والمستفيدين لغرض تأهيلهم وتطوير مهاراتهم سواء بطريقة
    مباشرة أو من خلال مفوض من الصندوق، بما في ذلك التدريب والتأهيل بوسائل عدة، ويشمل ذلك التدريب الإلكتروني أو التدريب على رأس العمل، وفقًا لما تحدده اللائحة. صرف الإعانة للمستفيدين. تلقي ودراسة تظلمات كل من مقدم الطلب، أو المؤهل، أو المستفيد؛ والبت فيها. الاستعانة بالجهات الحكومية والخاصة وفق تقديره لتنفيذ أحكام التنظيم واللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لمقدم الطلب أو المؤهل أو المستفيد الذي رُفض تظلمه للحصول على الإعانة؛ التظلم من قرار الرفض أمام المحكمة الإدارية المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bf8b73e3-a411-400d-b34b-ad2c00eb44e9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يحل التنظيم محل تنظيم إعانة البحث عن عمل الصادر بقرار مجلس الوزراء رقم (353) وتاريخ 25 / 12 / 1432هـ، وتنظيم المخصص المالي لصعوبة الحصول على عمل الصادر بقرار مجلس الوزراء رقم (44) وتاريخ 29 / 1 / 1435هـ، ويلغي كل ما يتعارض معه من أحكام، ويعمل بالتنظيم بعد (تسعين) يومًا من تاريخ نشره في الجريدة الرسمية.
