regulation:
  code: BOE075
  name_ar: نظام صندوق الاستثمارات العامة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'قصد بالكلمات والعبارات الآتية، أينما وردت في النظام، المعاني الموضحة أمام كل منها، ما لم يقتض سياق النص غير ذلك: الصندوق: صندوق الاستثمارات العامة. النظام: نظام الصندوق. المجلس: مجلس إدارة الصندوق. الرئيس: رئيس المجلس. المحافظ: محافظ الصندوق. القواعد والسياسات الداخلية: مجموعة اللوائح والتعليمات والإجراءات التي يصدرها المجلس لتنظيم الشؤون الداخلية للصندوق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يرتبط الصندوق تنظيمياً بمجلس الشؤون الاقتصادية والتنمية، وتكون له شخصية اعتبارية عامة، ويتمتع بالاستقلال المالي والإداري، ويكون مقره في مدينة الرياض، وله فتح فروع داخل المملكة وخارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف الصندوق إلى استثمار أمواله -نقديًا أو عينيًا- وفقاً لأفضل المعايير لتحقيق العوائد بما يخدم المصلحة العامة ويسهم في دعم التنمية الاقتصادية في المملكة وتنويع مصادر دخلها، ومراعاة مصلحة الأجيال القادمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للصندوق الصلاحيات اللازمة لتحقيق أهدافه وتأدية وظائفه ومهماته بموجب النظام، وتشمل ما يأتي: 1- الاستثمار داخل المملكة وخارجها، وتملّك الأصول والتصرف فيها، بما في ذلك العقارات والحقوق العينية والحصص والأوراق المالية والعملات الأجنبية والسلع والمشتقات المالية بأنواعها. 2- تأسيس الشركات وغيرها من المنشآت ذات الأغراض الخاصة داخل المملكة وخارجها, والمشاركة فيها بمفرده أو مع الغير. 3- الإقراض وغير ذلك من صور التمويل. 4- عقد القروض وغير ذلك من صور المديونية, بما في ذلك إصدار الصكوك والسندات. 5- إصدار الضمانات للشركات والمنشآت ذات الأغراض الخاصة الأخرى التي يملكها أو يساهم فيها. 6- إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة بنشاطه مع الجهات المعنية في الدول والمنظمات الدولية. 7- القيام بأي نشاط أو عمل آخر يقره المجلس بما يحقق أهداف الصندوق ويتفق مع طبيعة عمله.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للصندوق مجلس إدارة برئاسة رئيس مجلس الشؤون الاقتصادية والتنمية، وعضوية المحافظ وما لا يقل عن أربعة أعضاء آخرين من ذوي الخبرة والاختصاص، على أن يكون من بينهم ممثلون من الجهات المعنية، يصدر بتعيينهم أمر ملكي وتكون مدة عضويتهم خمس سنوات قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يكون المجلس مسؤولاً عن الإشراف على شؤون الصندوق وإدارته وتحقيق أهدافه ومباشرة صلاحياته الواردة في النظام، ويكون له في سبيل ذلك أوسع السلطات والصلاحيات، ويتولى إقرار القواعد والسياسات الداخلية وإصدارها؛ ويشمل ذلك ما يأتي: 1- وضع استراتيجية الاستثمار وسياساته وإجراءاته, بما في ذلك تحديد العوائد المستهدفة وآلية اتخاذ قرار الاستثمار ومتابعة أدائه والتخارج منه. 2- وضع سياسة توزيع أرباح الصندوق. 3- وضع إجراءات ونظم إدارة الأخطار. 4- تحديد المعايير والسياسات المحاسبية لإعداد قوائم الصندوق المالية ومراجعتها، وتحديد بداية السنة المالية ونهايتها. 5- الموافقة على عقد القروض وغير ذلك من صور المديونية، بما في ذلك إصدار الصكوك والسندات، وفقاً للضوابط التي يضعها في هذا الشأن. 6- وضع ضوابط ترشيح ممثلي الصندوق وتعيينهم في مجالس إدارات الشركات والكيانات الأخرى التي يمتلكها الصندوق أو يساهم فيها، وتحديد مكافآتهم وحقوقهم وواجباتهم تجاه الصندوق. 7- وضع السياسات والإجراءات الخاصة بالالتزام الضريبي. 8- تحديد المفوضين بالتوقيع نيابة عن الصندوق. 9- إقرار الإجراءات المنظمة للتواصل الإعلامي. 10-
    إقرار لوائح الصندوق المالية والإدارية. 11- إقرار هيكل الصندوق التنظيمي, وكيفية تنظيم وظائفه ومهماته وتوزيعها. 12- الموافقة على موازنة الصندوق السنوية وتقريره السنوي. وللمجلس تشكيل لجان تابعة له يكل إليها أيًّا من مهماته ومسؤولياته وفق ما تقتضيه مصلحة العمل. وله تفويض المحافظ أو أيٍّ من موظفي الصندوق أيًّا من صلاحياته وفقاً للقواعد والسياسات الداخلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: على المجلس أن يرفع إلى مجلس الشؤون الاقتصادية والتنمية القواعد والسياسات الداخلية التي تنظم المسائل المشار إليها في الفقرات (1) و(2) و(3) و(4) و(5) من المادة (السادسة) من النظام، والقواعد والإجراءات المنظمة لأعماله المشار إليها في المادة (الثامنة) من النظام، أو أي تعديل يُجرى عليها, وذلك قبل مدة لا تقل عن (خمسة عشر) يوماً، ولا تزيد على (ثلاثين) يومًا من التاريخ المحدد لبدء سريانها. ولمجلس الشؤون الاقتصادية والتنمية خلال تلك المدة أن يوجه المجلس بإجراء أي تعديل على تلك القواعد والسياسات وفق ما يراه مناسباً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يضع المجلس القواعد والإجراءات المنظمة لأعماله، وتشمل إجراءات الدعوة للاجتماعات وانعقادها، والأحكام الخاصة بالتصويت على القرارات سواءً خلال الاجتماعات أو بعرضها على أعضاء المجلس متفرقين، ويراعى في جميع الأحوال ألاَّ تقل اجتماعات المجلس عن مرة واحدة كل (تسعين) يوماً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعين المجلس أميناً عاماً له يتولى أعمال أمانة المجلس وأي مهمة أخرى توكل إليه. ويحدد المجلس ما يتقاضاه الأمين العام من مزايا مالية وفق ما تحدده القواعد والسياسات الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للصندوق محافظ بمرتبة وزير، وللمجلس في حال خلو منصب المحافظ أن يكلف شخصاً آخر بأعماله بصفة مؤقتة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يحدد المجلس صلاحيات المحافظ ومسؤولياته ومهماته، على أن تشمل الآتي: 1- تنفيذ قرارات المجلس. 2- تمثيل الصندوق أمام الغير وأمام الجهات القضائية، وفق الصلاحيات الممنوحة له. 3- الإشراف على إعداد القواعد والسياسات الداخلية وموازنة الصندوق السنوية وتقريره السنوي، وجميع المستندات الأخرى التي يلزم عرضها على المجلس. 4- الإشراف على الشؤون الإدارية والمالية للصندوق والإشراف على موظفيه، والتثبت من توافق عمليات الصندوق وأنشطته مع القواعد والسياسات الداخلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع مراعاة القواعد والسياسات الداخلية ذات العلاقة, للمحافظ تفويض بعض موظفي الصندوق أو غيرهم في بعض صلاحياته, وفق ما تقتضيه مصلحة العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 1- يخضع موظفو الصندوق عدا المحافظ لنظام العمل، ونظام التأمينات الاجتماعية. 2- فيما عدا الحالات التي تحددها القواعد والسياسات الداخلية, لا يجوز لموظفي الصندوق ممارسة أي مهنة أو عمل آخر, بما في ذلك أن يشغلوا منصباً أو وظيفة في القطاعين العام والخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: على كل عضو في المجلس وموظف لدى الصندوق أن يفصح -بالكيفية المحددة في القواعد والسياسات الداخلية- عن استثماراته الشخصية وعن أي تغير يحدث عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1- على عضو المجلس الذي تكون له مصلحة شخصية أو منفعة مباشرة أو غير مباشرة في أي أمر يعرض على المجلس أن يفصح للمجلس عن طبيعة هذه المصلحة أو المنفعة. وفي جميع الأحوال, لا يجوز لذلك العضو التصويت على القرار الذي يصدر في شأن ذلك الأمر. 2- على موظف الصندوق الذي تكون له مصلحة شخصية أو منفعة مباشرة أو غير مباشرة في أي أمر يعرض عليه أثناء تأديته لمهماته أن يفصح عن طبيعة تلك المصلحة أو المنفعة, وفقاً للآلية التي تحددها القواعد والسياسات الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على أعضاء المجلس وموظفي الصندوق عند تأديتهم لمهماتهم التصرف بحسن نية واجتهاد وبذل العناية اللازمة والحرص الواجب بما يحقق مصالح الصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يحظر على أعضاء المجلس وموظفي الصندوق إفشاء أي معلومة سرية أو الاستفادة من أي معلومة يحصلون عليها أو يطلعون عليها بمناسبة قيامهم بمهامهم حتى بعد انتهاء علاقتهم بالصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تحدد القواعد والسياسات الداخلية الاستثمارات والأموال التي يجوز لأعضاء المجلس وموظفي الصندوق الاستثمار فيها لحسابهم الخاص, على أن يراعى في ذلك طبيعة الاستثمار ونوعه بما يكفل عدم تعارض المصالح وغير ذلك من الممارسات غير السليمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: مع مراعاة أحكام هذا الفصل, تحدد القواعد والسياسات الداخلية الأحكام المنظمة للسلوك المهني لأعضاء المجلس وموظفي الصندوق بما يكفل التوافق مع الممارسات المهنية والسلوكية السليمة, وتحدد تلك الأحكام التبعات المترتبة على المخالفات السلوكية والمهنية التي يرتكبها أيٌّ من أعضاء المجلس أو موظفي الصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: '1- تكون للصندوق ميزانية سنوية تمول من موارده المالية. 2- تتكون موارد الصندوق المالية من الآتي: أ- العوائد الناتجة من أصوله واستثماراته. ب- المساهمات النقدية والعينية التي تقدمها إليه الدولة. ج- الأموال التي يقترضها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: على الصندوق الاحتفاظ بسجلات وافية لجميع تعاملاته وعملياته واستثماراته وذلك وفق القواعد والسياسات الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تعد قوائم الصندوق المالية وتراجع وفقاً للمعايير والسياسات المحاسبية التي يحددها المجلس, ويراجعها مراجع حسابات خارجي يعينه المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: على الجهات الرقابية المختصة عند إجرائها أي مراجعة على عمليات الصندوق وحساباته، الالتزام بأحكام النظام والقواعد والسياسات الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'على المجلس -خلال مائة وخمسين يوماً من نهاية السنة المالية للصندوق- أن يرفع إلى مجلس الشؤون الاقتصادية والتنمية تقريراً مفصلاً عن عمليات الصندوق ونشاطاته, على أن يتضمن التقرير -بحد أدنى- المعلومات الآتية: 1- الحساب الختامي للسنة المالية المنقضية. 2- بيان بأصول الصندوق واستثماراته, مع تفصيل بأدائها خلال السنة المالية المنقضية. 3- القوائم المالية المراجعة للصندوق. 4- بيان بجميع التعويضات التي حصل عليها أعضاء المجلس. 5- أي معلومة أو بيان آخر يطلبه مجلس الشؤون الاقتصادية والتنمية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: لمجلس الشؤون الاقتصادية والتنمية -بعد اطلاعه على التقرير المشار إليه في المادة (الرابعة والعشرين) من النظام- أن يوجه المجلس باتخاذ أي إجراء يرى مناسبته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: للمجلس نشر التقرير (أو جزء منه) المشار إليه في المادة (الرابعة والعشرين) من النظام، وله كذلك نشر أي تقرير أو معلومة أخرى في شأن عمليات الصندوق ونشاطاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 1- للصندوق إبرام العقود والاتفاقات -داخل المملكة أو خارجها- بغير اللغة العربية وفق ما تقتضيه حاجة العمل ومصلحة الصندوق. 2- تخضع عقود الصندوق واتفاقاته لأنظمة المملكة، إلاَّ ما تقتضي مصلحة الصندوق إخضاعه منها لاختصاص محاكم أجنبية أو للتحكيم, وذلك في ضوء ما تحدده القواعد والسياسات الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: لا يؤثر صدور النظام في حقوق الصندوق والتزاماته الناشئة قبل تاريخ العمل به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تخضع الشركات التي يؤسسها الصندوق في المملكة أو يشارك في تأسيسها لنظام الشركات، وللمجلس -بقرار منه- تضمين عقد التأسيس أو نظام الشركة الأساس للشركات التي يملك الصندوق فيها نسبة أكثر من (50%) بعض الاستثناءات من أحكام نظام الشركات, ويكون الترخيص بتأسيس تلك الشركات بقرار من وزارة التجارة والاستثمار وفقًا لنظام الشركات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: لا يجوز حلُّ الصندوق أو تصفيته إلا بمرسوم ملكي، وتسمع الدعاوى المتعلقة بذلك لدى الجهة القضائية المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يحل النظام محل نظام صندوق الاستثمارات العامة, الصادر بالمرسوم الملكي رقم (م / 24) وتاريخ 25 / 6 / 1391هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يعمل بالنظام من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/52da052e-9de3-4ead-abbf-aa3f00ef5083/1
  verified: false
