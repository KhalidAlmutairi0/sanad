regulation:
  code: BOE152
  name_ar: نظام المؤسسة العامة لتحلية المياه المالحة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة (1)
  article_text_ar: 'تُنشأ مؤسسة تُسمَّى: ( المؤسسة العامة لتحلية المياه المالِحة )، تتمتع بالشخصية الاعتِبارية، وتتبع إدارياً وزير الزِراعة والمياه ، ويكون مقرُها الرئيس في مدينة الرياض، ولها أن تُنشئ فروعاً أو مكاتِب لها في المناطِق أو المُدن التي يُقرِّرُها مجلِس الإدارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: 'الغرض الرئيسي للمؤسسة هو: تصفية الموارِد الطبيعية للمياه بطُرق تحلية المياه المالِحة في مناطِق ومُدن المملكة التي تُقصِر الموارد الطبيعة عن سد حاجتِها، والتي يتقرَّر فيها اتباع أسلوب التحلية. ويجوز للمؤسسة إنتاج الطاقة الكهربائية بصورة تبعية متى استوجبت ذلك أسباب اقتِصادية وفنية، وذلك كُلِه وِفق خُطة شامِلة تضعُها المؤسسة ويوافِق عليها مجلِس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: 'يكون للمؤسسة جميع الاختِصاصات اللازِمة لتحقيق الأغراض الوارِدة في المادة الثانية من هذا النِظام، ويكون لها بصِفة خاصة: أ ) تنفيذ وإدارة مشروعات التحلية في المملكة، ويشمل ذلك عمليات التوسِعة والتشغيل والصيانة.ب ) تدريب المواطنين السعوديين داخل المملكة أو خارجها في مجالات الدِراسة والتنفيذ والتشغيل والصيانة لمشاريع التحلية.جـ ) إبرام اتِفاقيات وعقود بيع الماء والطاقة الكهربائية مع الجهات القائمة بالتوزيع حُكومية كانت أو أهلية وتُحدِّد المؤسسة أسعار الماء والكهرباء وشروط البيع بالتشاور مع الجهات الحُكومية المُختصة وِفقاً لتوجيهات مجلِس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: 'يكون للمؤسسة مجلِس إدارة يُشكل على الوجه التالي: - وزير الزِراعة والمياه رئيساً - مُحافِظ المؤسسة نائباً للرئيس - وكيل وزارة التِجارة والصِناعة عضواً - وكيل وزارة الداخلية لشئون البلديات عضواً - وكيل وزارة المالية والاقتِصاد الوطني عضواً - وكيل وزارة البترول والثروة المعدنية عضواً - نائب رئيس الهيئة المركزية للتخطيط عضواً'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: تُحدَّد مُكافآت أعضاء مجلِس الإدارة بقرار من مجلِس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: 'مجلِس إدارة المؤسسة هو السُلطة المُهيمِنة على شئونِها وتصرِيف أمورِها ووضع السياسة العامة التي تسير عليها ومراقبة تنفيذِها، وله في سبيل ذلك: أ ) إصدار القرارات واللوائح التنفيذية الخاصة بنِظام سير العمل بالمؤسسة من النواحي الفنية والإدارية.ب ) إصدار لائحة الموظفين بالمؤسسة بعد إعدادِها بالاتِفاق مع ديوان الموظفين العام .جـ ) إصدار اللائحة المالية للمؤسسة بعد إعدادِها بالاتِفاق مع وزارة المالية والاقتِصاد الوطني .د ) إقرار مشروع ميزانية المؤسسة وحسابِها الختامي.هـ ) وضع قواعِد منح المُكافآت عن أنواع نشاط المؤسسة المُختلِفة وتحديد فئاتِها.و ) إقامة وشراء وبيع العقارات وتأجيرِها واستئجارِها تحقيقاً لأغراض المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: يجتمع مجلِس الإدارة بدعوة من رئيسه مرة على الأقل كُل شهر أو بناءً على طلب أربعة من أعضائه، ولا يُعتبر اجتِماع المجلِس صحيحاً إلا إذا حضرهُ أغلبية الأعضاء بما فيهم الرئيس، وتصدُر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يُرجح الجانب الذي يكون فيه الرئيس، وتُعقد اجتِماعات مجلِس الإدارة في مقر المؤسسة، ويجوز عند الاقتِضاء أنَّ ينعقد المجلِس في مكان آخر داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: يكون للمؤسسة مُحافِظ بالمرتبة المُمتازة، يتم تعيينهُ بأمر ملكي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (9)
  article_text_ar: 'يتولى مُحافِظ المؤسسة إدارتِها وتصريف شئونِها، ويُمارِس الاختِصاصات التالية: أ ) تمثيل المؤسسة في صِلاتِها بالغير وأمام القضاء، في حدود الصلاحيات المَّمنوحة له.ب ) تنفيذ قرارات مجلِس الإدارة.جـ) اقتِراح خِطَّط وبرامج المؤسسة وتنفيذِها والإشراف عليها، بعد موافقة مجلِس الإدارة.د ) الإشراف على إعداد مشروع الميزانية العامة للمؤسسة ومشروع الحِساب الختامي ورفِعها إلى مجلِس الإدارة.هـ ) الإشراف على موظفي المؤسسة ومُستخدِميها وعُمالِها، وإصدار القرارات الإدارية الخاصة بتنظيم دوائر المؤسسة وتحديد اختِصاصاتِها، وضبط العمل وحُسن سيرِه.و ) إصدار أوامِر الصرف الخاصة بنفقات المؤسسة، ولهُ أنَّ يُفوِض غيرِه في ذلك.ز ) اقتِراح اللوائح والقرارات التنفيذية الخاصة بنِظام سير العمل بالمؤسسة وتقديمِها إلى مجلِس الإدارة.ح ) مُباشرة ما تُخوِلُه إياه قرارات مجلِس الإدارة والنِظام واللوائح بالمؤسسة من اختِصاصات.ط ) إعداد التقرير السنوي عن نشاط المؤسسة وتقديمه إلى مجلِس الإدارة.ويجوز للمُحافِظ أن يُفوِض غيرُه في مُّمارسة بعض صلاحياتِه. ويُعتبر مجلِس الإدارة المرجع لمُحافِظ المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: 'تتكون أموال المؤسسة مِن: أ ) مُنشآت تحلية المياه المالِحة والأراضي التي تقوم عليها في أنحاء المملكة، وسائر الأموال الثابِتة والمنقولة والمُخصَّصة للتحلية والعائدة لوزارة الزِراعة والمياه وقت نفاذ هذا النِظام، وأية أموال أُخرى قد تُحوِلُها الدولة لمُلكية المؤسسة. ب ) الدخل الذي تُحقِّقه المؤسسة من ممارسة النشاط الذي يدخُل ضِمن أغراضِها.جـ ) الهِبات والإعانات والمِنح والوصايا.د ) الموارد الأُخرى التي يُقرِّر مجلِس الإدارة إضافتها إلى أموال المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: يكون للمؤسسة ميزانية مُلحقة تصدُر بمرسوم ملكي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: توضع أموال المؤسسة في حِساب مُستقِل، ويُحدَّد الغرض مِنها بقرار مِن مجلِس الإدارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (13)
  article_text_ar: السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (14)
  article_text_ar: مع عدم الإخلال بحق ديوان المُراقبة العامة في الرِّقابة على حسابات المؤسسة، يُعيِّن مجلِس الإدارة مُراقِباً أو أكثر من الأشخاص الطبيعيين مِّمن تتوافر فيهم الشروط النِظامية اللازِمة للتعيين كمُراجعي حِسابات للشركات المُساهِمة ، ويُحدِّد المجلِس مُكافأة المُراقِب، ويكون لهُ حقوق مُراقِب الحِسابات في الشركات المُساهِمة وعليه واجباته، وفي حالة تعدُّد المُراقِبين يكونون مسئولين بالتضامُن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (15)
  article_text_ar: تُقدِّم المؤسسة تقريراً سنوياً عن نشاطِها ومركزِها المالي إلى مجلِس الوزراء خِلال أربعة أشهُر من تاريخ انتِهاء السنة المالية، كما تُقدِّم مشروع حِسابِها الختامي، وتقرِّر مُراجعي الحِسابات إلى ديوان المُراقبة العامة تمهيداً للتصديق عليه من مجلِس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (16)
  article_text_ar: يخضع موظفو المؤسسة لنِظام التقاعُد المدني، ونِظام تأديب الموظفين. أمَّا عُمالِها فيخضعون في كافة شؤونِهم لنِظامي العمل والتأمينات الاجتِماعية والقرارات المُكمِلة لهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (17)
  article_text_ar: يُعِد مجلِس الإدارة فور تشكيله ميزانية مؤقتة للمؤسسة يوافِق عليها مجلِس الوزراء ، تُغطي الفترة من تاريخ إنشائها إلى بداية السنة المالية التالية، ويُباشر الإنفاق في المؤسسة على الأعمال التأسيسية والتحضيرية لنشاطِها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (18)
  article_text_ar: لمجلِس الإدارة اتِخاذ قرارات الصرف في حدود ميزانية المؤسسة، واتِخاذ القرارات الخاصة بترتيب وتحديد الوظائف وتعيين الموظفين، مع التقيُّد في كُلِ ذلك بالأنظِمة المالية الحُكومية ونِظام الموظفين العام، وذلك إلى أنَّ يتم إصدار اللوائح المُتعلِقة بهذه الأمور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (19)
  article_text_ar: يختص مجلِس الوزراء بتفسير أحكام هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
- article_ref: المادة (20)
  article_text_ar: يُنشر هذا النِظام في الجريدة الرسمية، ويُعمل بِه من تاريخ نشرِّه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/37f95015-f360-45be-8f91-a9a700f244c1/1
  verified: false
