  name_ar: تنظيم الهيئة العامة للمنافسة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها: الهيئة: الهيئة العامة للمنافسة. التنظيم: تنظيم الهيئة العامة للمنافسة. النظام: نظام المنافسة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. المحافظ: محافظ الهيئة. اللائحة: اللائحة التنفيذية للنظام. اللجنة: لجنة الفصل في مخالفات النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية المستقلة وبالاستقلال المالي والإداري، وتباشر المهمات والاختصاصات المنوطة بها بموجب التنظيم. ترتبط الهيئة برئيس مجلس الوزراء، ويكون مقرها في مدينة الرياض، ويجوز لها إنشاء مكاتب في مناطق المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'مع مراعاة المهمات الموكولة إلى الهيئة بموجب النظام، تتولى الهيئة حماية وتشجيع المنافسة العادلة ومكافحة الممارسات الاحتكارية المخلة بالمنافسة المشروعة، والمحافظة على البيئة التنافسية لقطاع الأعمال في إطار من العدالة والشفافية للسوق المحلية، وإصدار القواعد والإجراءات المنظمة لذلك، وللهيئة على وجه خاص ما يأتي: إصدار القواعد والإجراءات وفق الاختصاص، على أن تشمل ما يأتي: أ- قواعد مراقبة السوق لضمان المنافسة العادلة. ب- القواعد الخاصة بمنع الممارسات الاحتكارية، ومكافحة ما يستجد منها. ج- الضوابط الخاصة بضبط مخالفات النظام والتحقيق فيها. مراقبة السوق في ضوء القواعد التي يقرها المجلس لضمان تطبيق المنافسة العادلة، وإجراء البحوث والدراسات اللازمة لذلك. نشر ثقافة المنافسة، وعقد الندوات والمؤتمرات، وإجراء الدراسات والبحوث، وغيرها من النشاطات التوعوية والعلمية، في مجال المنافسة. تعزيز التعاون والتنسيق مع الجهات ذات العلاقة داخل المملكة وخارجها بما يحقق أهداف الهيئة، وفقاً للأنظمة والقواعد والتعليمات السارية في هذا الشأن. استحداث قاعدة بيانات ومعلومات عن النشاط الاقتصادي وتحديثها وتطويرها
    بما يخدم عمل الهيئة في المجالات المرتبطة بالمنافسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'أولاً: يكون للهيئة مجلس إدارة يعين رئيسه بأمر ملكي، ويكون بمرتبة وزير وتكون العضوية فيه على النحو الآتي : 1- المحافظ عضواً ونائباً للرئيس. 2- ممثل من وزارة التجارة والاستثمار عضواً. 3- ممثل من وزارة المالية عضواً. 4- ممثل من وزارة الاقتصاد والتخطيط عضواً. 5- ممثل من وزارة الطاقة والصناعة والثروة المعدنية على ألاَّ تقل مراتب ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها. عضواً. 6- أربعة أعضاء من ذوي الكفاية العالية والخبرة في مجالات الأنظمة أو الأنشطة الاقتصادية، يُختارون لذواتهم، ويعينون بقرار من مجلس الوزراء بناءً على اقتراح الرئيس. ثانياً: تحدد مكافآت حضور جلسات المجلس بقرار من مجلس الوزراء. ثالثاً: فيما عدا الرئيس والمحافظ، تكون مدة العضوية في المجلس ثلاث سنوات قابلة للتجديد لمدة مماثلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: ينعقد المجلس بدعوة من رئيسه أو نائبه أربع مرات على الأقل في السنة، أو كلما دعت الحاجة إلى ذلك، أو إذا طلب ذلك ثلث أعضائه على الأقل. ولا ينعقد المجلس إلاَّ بحضور أغلبية الأعضاء على الأقل، على أن يكون من بينهم الرئيس أو نائبه. تعقد اجتماعات المجلس في مقر الهيئة، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يكون للمجلس أمين سر من بين منسوبي الهيئة يختاره الرئيس بناء على ترشيح المحافظ ويحدد المجلس مهامه ومكافأته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تصدر قرارات المجلس بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز للمجلس أن يصدر قرارات بعرضها على الأعضاء متفرقين، بشرط أن يوافق جميع الأعضاء على القرارات كتابةً، وتعرض هذه القرارات على المجلس في أول اجتماع لاحق لإثباتها في محضر الاجتماع. يجوز للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بخبراتهم، دون أن يكون لهم حق التصويت. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وتنشر القرارات التي يرى المجلس ضرورة نشرها في الجريدة الرسمية وفي أي وسيلة إعلامية أخرى يرى المجلس مناسبتها، وتبلغ الهيئة هذه القرارات إلى الجهات المعنية بها مباشرة وبالطريقة المناسبة. لا يجوز لعضو المجلس الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه، ولعضو المجلس المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. لا يجوز لعضو المجلس أن يفشي شيئاً مما وقف عليه من أسرار الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويشرف على إدارتها وتصريف أمورها ووضع الخطط العامة التي تسير عليها، ويتابع تنفيذ الأنظمة والتعليمات المتعلقة بالمنافسة والحد من الممارسات الاحتكارية، وله اتخاذ ما يراه كفيلاً بتحقيق أهداف الهيئة وحماية المنافسة العادلة وتشجيعها، ومن ذلك ما يأتي: اعتماد مشروعات الخطط والسياسات العامة والأنظمة الخاصة بالمنافسة، ورفعها بحسب الإجراءات النظامية المتبعة. تحديد الأهداف والسياسات التي تسير عليها الهيئة لتحقيق أهدافها، واعتماد البرامج اللازمة لذلك والإشراف على تنفيذها. إصدار اللائحة، والقواعد والإجراءات المشار إليها في الفقرة (1) من المادة (الثالثة) من التنظيم. إقرار لوائح الهيئة الداخلية والمالية والإدارية على أن تتضمن تلك اللوائح تحديداً لشروط التعيين ورواتب منسوبي الهيئة ومزاياهم وحقوقهم وواجباتهم، والممارسات الوظيفية. الموافقة على اتخاذ إجراءات التقصي والبحث وجمع الاستدلالات والتحقيق للكشف عن الممارسات والمخالفات المخلة بالمنافسة. الموافقة على تحريك الدعوى الجزائية في الممارسات المخلة بالمنافسة، واتخاذ الإجراءات النظامية اللازمة حيالها ما عدا
    المخالفات المتعلقة بإفشاء أعضاء المجلس أو منسوبي الهيئة للأسرار المتعلقة بعملهم. تسمية الموظفين الذين لهم صفة الضبطية في تطبيق أحكام النظام. تسمية المحققين وممثلي الادعاء العام في تطبيق أحكام النظام. الموافقة على قبول المصالحة مع المنشآت المخالفة وفقاً لأحكام النظام واللائحة. البت في طلبات التركز الاقتصادي، وفقاً لأحكام النظام واللائحة. إقرار هيكل الهيئة التنظيمي. تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من سواهم، ويعهد إليها بما يراه من المهمات. ويحدد قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها ومدد إنجاز مهماتها. الموافقة على إنشاء مكاتب للهيئة في المناطق بحسب الحاجة. تعيين مراجع (أو أكثر) لحسابات الهيئة، وتحديد أتعابهم. إقرار مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيداً لرفعها بحسب الإجراءات النظامية. تحديد المقابل المالي للخدمات التي تقدمها الهيئة. إبداء الرأي في الأنظمة والسياسات والقرارات المتعلقة بالمنافسة. وللمجلس تفويض بعض المهمات المشار إليها أعلاه إلى المحافظ وفق ما يقتضيه سير العمل في الهيئة، على أن يكون ذلك بقرار مكتوب ولمدة محددة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة محافظ بالمرتبة الممتازة، يُعين بناءً على ترشيح الرئيس، ويُعدّ هو المسؤول التنفيذي عن إدارة الهيئة وتسيير أمورها في حدود ما ينص عليه النظام والتنظيم وما يقرره المجلس من مهمات وصلاحيات، ومن ذلك ما يأتي: اقتراح مشروعات الخطط والسياسات العامة والأنظمة المتعلقة بالمنافسة ورفعها إلى المجلس، ومتابعة تنفيذها بعد الموافقة عليها. رفع مشروع ميزانية الهيئة، وحسابها الختامي، وتقريرها السنوي، إلى المجلس. متابعة تنفيذ القرارات التي يصدرها المجلس. اقتراح هيكل الهيئة التنظيمي ومشروعات اللوائح والقرارات التنفيذية الخاصة بسير العمل في الهيئة، ورفعها إلى المجلس؛ لاستكمال إجراءات إقرارها. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها. إصدار الأوامر بمصروفات الهيئة وفقاً للميزانية السنوية المعتمدة ولوائح الهيئة. تعيين الموظفين في الهيئة والإشراف عليهم، وفقاً للصلاحيات الممنوحة له وما تحدده الأنظمة واللوائح. استقطاب الكفاءات وتعيين من يقتضي عمل الهيئة الاستعانة به. إقرار الابتعاث والتدريب لموظفي الهيئة؛ للدراسة في الداخل أو الخارج، وفقاً للإجراءات النظامية المتبعة. الموافقة
    على مشاركة موظفي الهيئة في المنتديات والندوات والبرامج والحلقات والزيارات ذات العلاقة بأهداف الهيئة واختصاصاتها في الداخل والخارج، وفقاً للإجراءات النظامية المتبعة. قياس أداء عمل الهيئة وفقاً لمؤشرات الأداء ومعايير الإنجاز التي يقرها المجلس، واقتراح الوسائل الكفيلة بتقويم أداء الهيئة وتطويرها. تقديم تقارير دورية إلى المجلس عن أعمال الهيئة ومنجزاتها وأنشطتها. مباشرة ما يخوله إياه المجلس والنظم واللوائح الخاصة بالهيئة من اختصاصات أخرى. وللمحافظ تفويض بعض مهماته وصلاحياته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمحافظ نائب (أو أكثر) يعين بقرار من المجلس بناءً على ترشيح المحافظ، ويتولى نائب المحافظ الأعمال التي يفوضها المحافظ إليه، في حدود ما يقضي به النظام والتنظيم واللوائح والإجراءات المعتمدة الخاصة بالهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: فيما عدا المحافظ، يسري على جميع منسوبي الهيئة نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة ضمن ميزانية الدولة، ويحوَّل الفائض من الموارد المالية التي تتقاضاها الهيئة إلى وزارة المالية بعد اقتطاع جميع النفقات الجارية ونفقات رأس المال وغيرها من المصروفات التي تحتاج إليها الهيئة. وتحتفظ الهيئة باحتياطي عام يعادل ضعف إجمالي نفقاتها المبينة في ميزانيتها السنوية السابقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتكون موارد الهيئة من المصادر الآتية: أ- الاعتمادات المالية التي تخصص لها في ميزانية الدولة. ب- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها وفقاً لأحكام النظام والتنظيم. ج- حصيلة الغرامات التي توقعها وفقاً للنظام. د- العائد من استثماراتها. هـ- ما يقبله المجلس من التبرعات والهبات والأوقاف والوصايا والمنح والمساعدات. و- أي مورد آخر يقره المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تودع أموال الهيئة في حساب باسمها في مؤسسة النقد العربي السعودي، ويصرف منه وفق ميزانيتها المعتمدة، ولها فتح حسابات أخرى في البنوك المرخص لها بالعمل في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة الأولى للهيئة من تاريخ نفاذ التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة، يُعيِّن المجلس مراجع حسابات خارجيًّا (أو أكثر) من الُمرخَّص لهم بالعمل في المملكة، ويُحدد أتعابه (أتعابهم)، وإذا تعدد مراجعو الحسابات فإنهم يكونون مسؤولين منفردين عن أعمالهم أمام الهيئة، ما لم يتم الاتفاق معهم بعقد واحد فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة. ويُرفع تقرير مراجع الحسابات إلى المجلس، ويُزوَّد ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يحل هذا التنظيم محل الترتيبات التنظيمية الصادرة بقرار مجلس الوزراء رقم (319) وتاريخ 14 / 9 / 1434هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعمل بهذا التنظيم من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/216a2b6e-911e-4223-a11b-adab00c670a1/1
  verified: false
