- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والكلمات الآتية -أينما وردت في هذا التنظيم- المعاني المبنية أمامها، ما لم يقتض السياق غير ذلك: الهيئة: هيئة تقويم التعليم والتدريب. المجلس: مجلس إدارة الهيئة. المراكز: مراكز تابعة للهيئة للقيام ببعض اختصاصاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية وبالاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون مقر الهيئة الرئيس في مدينة الرياض، ويجوز -بقرار من المجلس- إنشاء فروع أو مكاتب لها داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تعد الهيئة الجهة المختصة في المملكة بالتقويم والقياس واعتماد المؤهلات، في التعليم والتدريب في القطاعين العام والخاص لرفع جودتهما وكفايتهما ومساهمتهما في خدمة الاقتصاد والتنمية الوطنية. وتشمل اختصاصات الهيئة -في سبيل تحقيق ذلك- ما يأتي: 1- بناء نظم للتقويم والاعتماد -بما في ذلك المؤسسي والبرامجي- في التعليم والتدريب, تتضمن القواعد والمعايير والأطر والمؤشرات والشروط والإجراءات الخاصة بها, واعتمادها، وتطبيقها. 2- تقويم أداء المدارس ومؤسسات التعليم العالي ومؤسسات التدريب، واعتمادها بشكل دوري، وفق المعايير التي يعتمدها المجلس. 3- تقويم البرامج المنتهية بمؤهل التي تنفذها مؤسسات التعليم والتدريب، واعتمادها بشكل دوري, وفق المعايير التي يعتمدها المجلس. 4- بناء أدوات القياس في التعليم والتدريب ووسائله, وتطبيقها وتطويرها. 5- بناء معايير مناهج التعليم العام بالتنسيق مع وزارة التعليم, واعتمادها, وتحديثها بشكل دوري. 6- بناء وتنفيذ المقاييس والاختبارات التعليمية (كاختبارات القبول في الجامعات، والاختبارات الوطنية في مراحل التعليم العام ذات العلاقة بتقويم التعليم العام) والتدريبية والمهنية
    والوظيفية واللغوية والمعرفية وغيرها. 7- بناء وتطبيق الأدلة المسحية التشخيصية في التعليم والتدريب وغيرها من الأدلة. 8- الاشتراك في الاختبارات الدولية القياسية الخاصة بتقويم التعليم والتدريب، وفق الضوابط التي يعتمدها المجلس, والإشراف على تطبيقها في المملكة. 9- إعداد المعايير المهنية لممارسة مهن التعليم العام والتدريب, واعتمادها, وتقويم تطبيقها. 10- بناء وتطبيق الاختبارات الخاصة بالكفاية المهنية للمعلمين -ومن في حكمهم- في التعليم, والمدربين -ومن في حكمهم- في التدريب, وإصدار الرخص المهنية الخاصة بها، وفق الضوابط التي يعتمدها المجلس. 11- إعداد الإطار الوطني للمؤهلات, على أن يتضمن القواعد والضوابط والمعايير والمؤشرات والشروط والإجراءات الخاصة به، واعتماده من المجلس, والإشراف على تطبيقه. 12- إعداد المعايير والشروط الخاصة بتقديم مؤسسات التعليم والتدريب للحصول على الاعتماد المؤسسي والبرامجي من جهات اعتماد دولية, وما يلزم لإعفائها من الاعتماد البرامجي، واعتمادها من المجلس, ومتابعة تطبيقها. 13- وضع المؤشرات المتعلقة بمجالات عمل الهيئة، وقياسها بشكل دوري، وتطويرها، ومقارنتها بالمؤشرات الدولية. 14-
    تأسيس مراكز تابعة للهيئة للقيام ببعض اختصاصاتها، ويكون تحديد ارتباطها التنظيمي ووضعها المالي، وتحديد وسائل تنفيذ اختصاصاتها، وآلية تنفيذ ما تعهده الهيئة إليها من مهمات؛ بقرارات من المجلس. 15- تأسيس الشركات أو المشاركة في تأسيسها أو الدخول فيها شريكة أو مساهمة؛ وفقاً للإجراءات النظامية المتبعة. 16- الاستعانة بمن تراه للمشاركة في القيام بأعمال التقويم والقياس والاعتماد التي تختص بها، أو أجزاء من تلك الأعمال أو أجزاء متممة لها، وفق ضوابط يعتمدها المجلس. 17- الترخيص لمن تراه للقيام بأعمال التقويم والقياس والاعتماد والمؤهلات في التعليم والتدريب في المملكة، وفق ضوابط يعتمدها المجلس. 18- الترخيص لأي جهة أجنبية بممارسة نشاط التقويم أو الاعتماد أو القياس أو المؤهلات في التعليم أو التدريب داخل المملكة، سواء كانت الممارسة مباشرة أو غير مباشرة، وفق الضوابط التي يعتمدها المجلس. 19 - القيام بأعمال التقويم والقياس والاعتماد خارج المملكة، وفق ضوابط يعتمدها المجلس. 20 - تقديم الاستشارات والخدمات للجهات الحكومية والخاصة وغيرها، داخل المملكة وخارجها. 21 - تنظيم البرامج والدورات في مجال اختصاصاتها، وتقديمها.
    22 - تنظيم الندوات والمؤتمرات وجلسات العمل والمعارض والمسابقات والجوائز، وعقدها، والمشاركة فيها، وفقاً للإجراءات المتبعة. 23-إصدار المجلات والدوريات والكتب والأدلة الإرشادية والنشرات ذات العلاقة بمهمات الهيئة وأنشطتها. 24- تبادل الإنتاج العلمي والمعرفي مع مؤسسات التعليم والتدريب داخل المملكة وخارجها, ومع الجهات العاملة في أي من مجالات عمل الهيئة خارج المملكة. 25- تبادل التجارب والخبرات مع الجهات المماثلة خارج المملكة, وتأسيس آليات للتعاون معها وفقاً للإجراءات المتبعة. 26- متابعة تنفيذ التزامات المملكة الدولية الخاصة بالتقويم والقياس والاعتماد في التعليم والتدريب. 27- تمثيل المملكة أو المشاركة في تمثيلها لدى اللجان والمنظمات والهيئات الإقليمية والدولية ذات الصلة وفقاً للإجراءات المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- يكون من بين المراكز المركز الوطني للقياس, ويتمتع بالاستقلال المالي. 2- يختص المركز الوطني للقياس ببناء وسائل القياس في التعليم والتدريب وتطبيقها وتطويرها, وبناء المقاييس والاختبارات القياسية التي تختص بها الهيئة وتنفيذها, والإشراف على تطبيق الاختبارات الدولية في المملكة التي تشترك فيها الهيئة, وما يحدده المجلس للمركز من اختصاصات أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: للهيئة والمراكز -بما فيها المركز الوطني للقياس- تقديم الاستشارات والخدمات للجهات الحكومية والخاصة وغيرها داخل المملكة وخارجها, بالإضافة إلى ما يحدده المجلس من وسائل أخرى تمكنها من تحقيق أهدافها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: '1- يكون للهيئة مجلس إدارة يشكل من رئيس يعين بأمر ملكي, وعضوية كل من: - رئيس الهيئة (نائباً لرئيس المجلس). - ممثلان من وزارة التعليم, أحدهما مختص بالتعليم العام والآخر بالتعليم العالي. - ممثل من وزارة الاقتصاد والتخطيط. - ممثل من وزارة التجارة والاستثمار. - ممثل من وزارة الطاقة والصناعة والثروة المعدنية. - ممثل من وزارة الخدمة المدنية. - ممثل من وزارة العمل والتنمية الاجتماعية. - ممثل من المؤسسة العامة للتدريب التقني والمهني. - ممثل من المراكز يختاره رئيس المجلس. - ستة من المختصين وذوي العلاقة بمجالات عمل الهيئة، يعينون بأمر من رئيس مجلس الوزراء بناء على اقتراح من رئيس المجلس, وتكون مدة عضويتهم ثلاث سنوات قابلة للتجديد مرة واحدة. 2- يجب ألا تقل مرتبة ممثلي الأجهزة الحكومية المشار إليهم في الفقرة (1) من هذه المادة عن المرتبة (الرابعة عشرة) أو ما يعادلها. 3- يكون للمجلس أمين يعينه المجلس ويحدد مهماته ومكافأته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة والمراكز وتصريف أمورها, ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود أحكام هذا التنظيم, وله على وجه خاص ما يأتي: 1- إقرار السياسات العامة، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه, والإشراف على تنفيذها. 2- اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة, واقتراح تعديل المعمول به منها. 3- إقرار اللوائح الإدارية والمالية والوظيفية, وغيرها من اللوائح الداخلية اللازمة. 4- إقرار الهياكل التنظيمية للهيئة والمراكز. 5- اعتماد سلالم الأجور، بما في ذلك أجور الخبراء والمختصين ذوي الكفايات المطلوبة, ومكافآت من تستعين بهم الهيئة والمراكز. 6- الموافقة على إنشاء المراكز والفروع والمكاتب. 7- تحديد المقابل المالي للخدمات والأعمال التي يرى المجلس استحصال مقابل مالي عنها. 8- الموافقة على سياسات استثمار الأموال, وفقاً للأنظمة والتعليمات المتبعة. 9- تعيين مراجع حسابات خارجي ومراقب مالي داخلي. 10- الموافقة على مشروع ميزانية الهيئة السنوية وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيداً لرفعها
    وفق الإجراءات النظامية المتبعة. 11- اعتماد ميزانيات المراكز ذات الاستقلال المالي وحساباتها الختامية وتقرير مراجع حساباتها, والنظر في تقاريرها السنوية. 12- النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة والمراكز. 13- الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود, بحسب الإجراءات النظامية المتبعة. 14- قبول الهبات والتبرعات والمنح والوصايات والأوقاف وفقاً للأحكام المنظمة لذلك. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم, يعهد إليها بما يراه من مهمات. ويُحدّد، في قرار تشكيل كل لجنة، رئيسها وأعضاؤها وأمينها واختصاصاتها, ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه أو من منسوبي الهيئة والمراكز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجتمع المجلس (ثلاثة) اجتماعات في السنة المالية الواحدة على الأقل, أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس, وإن طلب ذلك ثلث أعضائه على الأقل, وذلك برئاسة رئيس المجلس أو نائبه في حال غيابه. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الاقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للهيئة رئيس يعين بقرار من المجلس، ويحدد المجلس اختصاصاته وصلاحياته وأجره ومزاياه المالية والوظيفية الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يكون رئيس الهيئة المسؤول التنفيذي الأول عن إدارة الهيئة، وتتركز مسؤولياته في حدود ما ينص عليه هذا التنظيم وما يقرره المجلس، وله بوجه خاص مباشرة الاختصاصات الآتية: 1- اقتراح السياسات المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس. 2- الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة. 3- الإشراف على إعداد اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية؛ تمهيداً لرفعها إلى المجلس. 4- اقتراح الهياكل التنظيمية للهيئة والمراكز، ورفعها إلى المجلس. 5- الإشراف على إعداد تقرير الهيئة السنوي ومشروع ميزانيتها وحسابها الختامي؛ تمهيداً لعرضها على المجلس. 6- الإشراف على إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، وعرضها على المجلس. 7- التوقيع على الاتفاقيات والبروتوكولات بعد موافقة المجلس، وفقاً للإجراءات النظامية المتبعة. 8- تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها. 9- الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات
    المالية، وفقاً للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي فوضه بها المجلس. 10- التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفقاً للأنظمة والصلاحيات التي فوضه بها المجلس. 11- إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في هذا التنظيم واللوائح الصادرة بناء عليه، بحسب الصلاحيات المخولة له. 12- تعيين منسوبي الهيئة وفقاً للوائح المنظمة لذلك، والإشراف عليهم. 13- أي اختصاص آخر يسنده إليه المجلس. ولرئيس الهيئة تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يخضع منسوبو الهيئة والمراكز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تتألف موارد الهيئة والمراكز مما يأتي: 1- ما يخصص لها من الدولة. 2- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها. 3- ما يقبله المجلس من هبات وإعانات وأوقاف ووصايا ومنح. 4- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. 2- تودع أموال المراكز المستقلة ماليًّا التي تمول ميزانياتها من إيراداتها الذاتية بشكل كامل وليس لها مخصصات في الميزانية العامة للدولة؛ في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تفتح الهيئة والمراكز المستقلة ماليًّا حسابات لها في مؤسسة النقد العربي السعودي, ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة, ويصرف من هذه الحسابات وفق ميزانية الهيئة والمراكز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 1- تكون للهيئة ميزانية سنوية مستقلة. 2- تكون للمراكز ميزانيات فرعية ضمن ميزانية الهيئة السنوية، وفي حال تمتع أي منها بالاستقلال المالي فتكون له ميزانية سنوية مستقلة. 3- السنة المالية للهيئة والمراكز ذات الاستقلال المالي هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة والمراكز ذات الاستقلال المالي ومعاملاتها وبياناتها وميزانياتها السنوية وحساباتها الختامية، ويحدد المجلس أتعابه, ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a054a8-6dbc-4323-9405-aa3f00bd5985/1
