regulation:
  code: BOE005
  name_ar: نظام هيئة البيعة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تكون بأمر ملكي هيئة تسمى (هيئة البيعة)، على النحو الآتي: 1 - أبناء الملك المؤسس عبد العزيز بن عبد الرحمن الفيصل آل سعود. 2 - أحد أبناء كل متوفى، أو معتذر، أو عاجز بموجب تقرير طبي، يعينه الملك من أبناء الملك المؤسس عبد العزيز بن عبد الرحمن الفيصل آل سعود، على أن يكون مشهودا له بالصلاح والكفاية. 3 - اثنان يعينهما الملك أحدهما من أبنائه والآخر من أبناء ولي العهد، على أن يكون مشهودا لهما بالصلاح والكفاية. وإذا خلا محل أي من أعضاء هيئة البيعة، يعين الملك بديلا عنه وفق الضوابط المشار إليها في الفقرتين (2) و(3) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تمارس الهيئة المهام المنوطة بها وفقا لهذا النظام والنظام الأساسي للحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تلتزم الهيئة بكتاب الله تعالى، وسنة رسوله محمد صلى الله عليه وسلم، والمحافظة على كيان الدولة، وعلى وحدة الأسرة المالكة، وتعاونها، وعدم تفرقها، وعلى الوحدة الوطنية ومصالح الشعب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: مقر الهيئة في مدينة الرياض، وتعقد اجتماعاتها في الديوان الملكي ، ويجوز بموافقة الملك عقد اجتماعاتها في أحد مقار الديوان الملكي داخل المملكة، أو أي مكان آخر يحدده الملك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يؤدي رئيس وأعضاء الهيئة وأمينها العام قبل أن يباشروا أعمالهم في الهيئة أمام الملك القسم التالي:(أقسم بالله العظيم أن أكون مخلصا لديني، ثم لمليكي وبلادي، وألا أبوح بسر من أسرار الدولة، وأن أحافظ على مصالحها، وأنظمتها، وأن أحرص على وحدة الأسرة المالكة وتعاونها، وعلى الوحدة الوطنية، وأن أؤدي أعمالي بالصدق، والأمانة، والإخلاص، والعدل).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: عند وفاة الملك تقوم الهيئة بالدعوة إلى مبايعة ولي العهد ملكا على البلاد وفقا لهذا النظام والنظام الأساسي للحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: أ - يختار الملك بعد مبايعته، وبعد التشاور مع أعضاء الهيئة، واحدا، أو اثنين، أو ثلاثة، ممن يراه لولاية العهد ويعرض هذا الاختيار على الهيئة، وعليها بذل الجهد للوصول إلى ترشيح واحد من هؤلاء بالتوافق لتتم تسميته وليا للعهد. وفي حالة عدم ترشيح الهيئة لأي من هؤلاء فعليها ترشيح من تراه وليا للعهد. ب - للملك في أي وقت أن يطلب من الهيئة ترشيح من تراه لولاية العهد. وفي حالة عدم موافقة الملك على من رشحته الهيئة، وفقا لأي من الفقرتين (أ) و (ب) من هذه المادة، فعلى الهيئة التصويت على من رشحته وواحد يختاره الملك، وتتم تسمية الحاصل من بينهما على أكثر الأصوات وليا للعهد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجب أن يتوافر في المرشح لولاية العهد ما تنص عليه الفقرة (ب) من المادة الخامسة من النظام الأساسي للحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يتم اختيار ولي العهد وفقا لحكم المادة السابعة، في مدة لا تزيد عن ثلاثين يوما من تاريخ مبايعة الملك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تشكل الهيئة مجلسا مؤقتا للحكم من خمسة من أعضائها، ويتولى المجلس إدارة شؤون الدولة، بصفة مؤقتة في الحالات المنصوص عليها في هذا النظام. وفي كل الأحوال ليس لهذا المجلس أي صلاحية لتعديل النظام الأساسي للحكم، أو هذا النظام، أو نظام مجلس الوزراء ، أو نظام مجلس الشورى ، أو نظام المناطق ، أو نظام مجلس الأمن الوطني ، أو أي من الأنظمة الأخرى ذات العلاقة بالحكم. وليس له حل مجلس الوزراء ، أو مجلس الشورى ، أو إعادة تكوينهما. وعلى المجلس خلال المدة الانتقالية المحافظة على وحدة الدولة ومصالحها الداخلية والخارجية وأنظمتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: في حالة توفر القناعة لدى الهيئة بعدم قدرة الملك على ممارسة سلطاته لأسباب صحية، تقوم الهيئة بتكليف اللجنة الطبية المنصوص عليها في هذا النظام بإعداد تقرير طبي عن الحالة الصحية للملك، فإذا أثبت التقرير الطبي أن عدم قدرة الملك على ممارسة سلطاته تعد حالة مؤقتة، فتقوم الهيئة بإعداد محضر إثبات بذلك وعندئذ تنتقل مباشرة سلطات الملك بصفة مؤقتة إلى ولي العهد لحين شفاء الملك. وعند وصول إخطار كتابي من الملك إلى رئيس الهيئة بأنه قد تجاوز الأسباب الصحية التي لم تمكنه من ممارسة سلطاته، أو عند توفر القناعة لدى الهيئة بذلك، فعليها تكليف اللجنة الطبية المشار إليها بإعداد تقرير طبي عن حالة الملك الصحية، على أن يكون ذلك في مدة لا تتجاوز أربعا وعشرين ساعة. وإذا أثبت التقرير الطبي قدرة الملك على ممارسة سلطاته، فعلى الهيئة إعداد محضر إثبات لذلك، وعندئذ يستأنف الملك ممارسة سلطاته. أما إذا أثبت التقرير الطبي أن عدم قدرة الملك على ممارسة سلطاته تعد حالة دائمة، فعلى الهيئة إعداد محضر إثبات لذلك، وعندئذ تدعو الهيئة لمبايعة ولي العهد ملكا على البلاد على أن تتم هذه الإجراءات وفقا لهذا النظام والنظام
    الأساسي للحكم في مدة لا تتجاوز أربعا وعشرين ساعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: في حالة توفر القناعة لدى الهيئة بعدم قدرة الملك وولي عهده على ممارسة سلطاتهما لأسباب صحية، فعلى الهيئة تكليف اللجنة الطبية المنصوص عليها في هذا النظام بإعداد تقرير طبي عن حالتهما الصحية، فإذا أثبت التقرير الطبي أن عدم قدرتهما على ممارسة سلطاتهما تعد حالة مؤقتة، فتقوم الهيئة بإعداد محضر إثبات لذلك، وعندئذ يتولى ( المجلس المؤقت للحكم ) إدارة شؤون الدولة ورعاية مصالح الشعب لحين شفاء أي منهما. وعند وصول إخطار كتابي من الملك أو ولي العهد إلى الهيئة بأنه قد تجاوز الأسباب الصحية التي لم تمكنه من ممارسة سلطاته، أو عند توفر القناعة لدى الهيئة لذلك، فعليها تكليف اللجنة الطبية المشار إليها بإعداد تقرير طبي عن حالته على أن يكون ذلك مدة لا تتجاوز أربعا وعشرين ساعة، فإذا أثبت التقرير الطبي قدرة أي منهما على ممارسة سلطاته فعلى الهيئة إعداد محضر إثبات لذلك، وعندئذ يستأنف ممارسة سلطاته. أما إذا أثبت التقرير الطبي أن عدم قدرتهما على ممارسة سلطاتهما تعد حالة دائمة، فعلى هيئة البيعة إعداد محضر إثبات لذلك، وعندئذ يتولى المجلس المؤقت للحكم إدارة شؤون الدولة، على أن تقوم الهيئة خلال مدة لا تتجاوز
    سبعة أيام باختيار الأصلح للحكم من أبناء الملك المؤسس عبد العزيز بن عبد الرحمن الفيصل آل سعود وأبناء الأبناء والدعوة إلى مبايعته ملكا على البلاد وفقا لهذا النظام والنظام الأساسي للحكم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: في حالة وفاة الملك وولي العهد في وقت واحد تقوم الهيئة خلال مدة لا تتجاوز سبعة أيام باختيار الأصلح للحكم من أبناء الملك المؤسس عبد العزيز بن عبد الرحمن الفيصل آل سعود وأبناء الأبناء والدعوة إلى مبايعته ملكا على البلاد وفقا لهذا النظام والنظام الأساسي للحكم. ويتولى المجلس المؤقت للحكم إدارة شؤون الدولة لحين مبايعة الملك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'تكون لجنة طبية من كل من: 1- المسئول الطبي عن العيادات الملكية.2- المدير الطبي لمستشفى الملك فيصل التخصصي.3 - ثلاثة من عمداء كليات الطب في المملكة تختارهم هيئة البيعة. وتتولى اللجنة إصدار التقارير الطبية المشار إليها في هذا النظام، ولها أن تستعين بمن تراه من الأطباء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يرأس الهيئة أكبر الأعضاء سنا من أبناء الملك المؤسس عبد العزيز بن عبد الرحمن الفيصل آل سعود، وينوب عنه الذي يليه في السن من إخوته، وفي حالة عدم وجود أي منهم يرأس الاجتماع أكبر الأعضاء سنا من أبناء الأبناء في الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: اجتماعات الهيئة سرية، وتعقد اجتماعاتها بناء على موافقة الملك، ولا يحضرها إلا أعضاؤها وأمينها العام إضافة إلى من يتولى ضبط مداولات اجتماعاتها بعد موافقة الملك. وللهيئة بعد موافقة الملك دعوة من تراه لتقديم إيضاحات أو معلومات وليس له الحق في التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يتولى رئيس الهيئة الدعوة لاجتماعاتها في الحالات المنصوص عليها في المواد السادسة، والحادية عشرة، والثانية عشرة، والثالثة عشرة من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجب على أعضاء الهيئة الالتزام بحضور اجتماعات الهيئة وعلى العضو الذي يطرأ ما يستوجب غيابه عن أحد اجتماعات الهيئة أن يخطر رئيس الهيئة كتابة بذلك، ولا يجوز لأي عضو الانصراف نهائيا من اجتماع الهيئة قبل انتهائه إلا بإذن من رئيس الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يفتتح رئيس الجلسة الاجتماعات، ويعلن انتهاءها، ويدير المناقشات ويأذن بالكلام، ويحدد موضوع البحث، وينهي المناقشة، ويطرح الموضوعات للتصويت. ويجوز بموافقة عشرة من أعضاء الهيئة مناقشة أي موضوع غير مدرج في جدول الأعمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: لا يكون اجتماع الهيئة نظاميا إلا بحضور ثلثي أعضائها على الأقل بمن فيهم رئيس الهيئة أو من ينوب عنه. ومع مراعاة ما ورد في المادة السابعة تصدر قراراتها بموافقة أغلبية أعضائها الحاضرين. وفي حالة التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. ويجوز في الحالات الطارئة التي لا يتوافر فيها النصاب النظامي عقد اجتماعات الهيئة بحضور نصف أعضائها، وتصدر قراراتها بموافقة ثلثي الأعضاء الحاضرين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يحرر لكل اجتماع محضر يدون فيه مكان الاجتماع، وتاريخه، ووقت افتتاحه، واسم رئيسه، وأسماء الأعضاء الحاضرين، وأسماء الأعضاء الغائبين، وسبب الغياب إن وجد، واسم الأمين العام، وملخص لما دار من مناقشات، وعدد أصوات الموافقين، وغير الموافقين، ونتيجة التصويت، ونصوص القرارات، وما يتصل بتأجيل الاجتماع، أو وقفه، ووقت انتهائه، وأي أمور أخرى يرى رئيس الاجتماع تدوينها فيه، ويوقع على المحضر رئيس الاجتماع، والأعضاء الحاضرون، والأمين العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يتم التصويت على قرارات هيئة البيعة عن طريق الاقتراع السري وفق نموذج يعد لهذا الغرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يطلع عضو الهيئة على جدول الأعمال ومرفقاته في مقر انعقاد الهيئة، ولا يجوز له أن يصطحب وثائق الهيئة خارج مقر انعقادها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يعين الملك أمينا عاما للهيئة يتولى استكمال إجراءات توجيه الدعوة لاجتماعاتها، والإشراف على إعداد محاضرها، وقراراتها، وإعلان بيانات اجتماعاتها وفق ما يقرره رئيس الهيئة. وللأمين العام للهيئة بعد موافقة الملك الاستعانة بمن يراه.ويعين الملك نائبا للأمين العام يتولى مهامه عند غيابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يتم تعديل أحكام هذا النظام بأمر ملكي بعد موافقة هيئة البيعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3213c2f6-eaf8-45dc-8f8c-a9a700f167ee/1
  verified: false
