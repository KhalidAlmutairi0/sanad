articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية ـ حيثما وردت في هذا التنظيم ـ المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك : الوزارة : وزارة الثقافة والإعلام . الوزير : وزير الثقافة والإعلام . الهيئة : هيئة الإذاعة والتلفزيون . المجلس : مجلس إدارة الهيئة . الرئيس : رئيس الهيئة. التنظيم : تنظيم الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنشأ بموجب هذا التنظيم هيئة عامة تسمى " هيئة الإذاعة والتلفزيون " تتمتع بالشخصية الاعتبارية المستقلة والاستقلال المالي والإداري، وترتبط تنظيمياً بالوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون مقر الهيئة الرئيس مدينة الرياض، ولها أن تنشئ فروعاً ومكاتب داخل المملكة وخارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف الهيئة إلى إيصال رسالة المملكة إلى جميع مناطقها وإلى أنحاء العالم بالكلمة والصورة باستخدام أحدث الوسائل التقنية، مراعية في ذلك ما يأتي: 1 - السياسات العامة للدولة في جميع المجالات، وما تقضي به الأنظمة والتعليمات ذات الصلة. 2 - تنمية القيم المستمدة من الشريعة الإسلامية وإبرازها، وإرساء القواعد والقيم الأخلاقية والروحية وتعميق الوحدة الوطنية. 3 - الارتقاء بالخدمات الإذاعية والتلفزيونية، وضمان توجيهها لخدمة المصلحة الوطنية والتنمية الاقتصادية والاجتماعية، وتطوير نشاط ومفاهيم الإعلام الإذاعي بنوعيه المسموع والمرئي. 4 - الإسهام في نشر التراث الوطني والإسلامي والإنساني، ونشر الثقافة ورفع مستوى الوعي بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تتولى الهيئة لتحقيق أغراضها - على سبيل المثال لا الحصر - المهمات والاختصاصات الآتية : 1 - تطوير البث الإذاعي والتلفزيوني والعمل على تعميمه في جميع أنحاء المملكة، وإيصاله إلى العالم الخارجي. 2 - إنتاج البرامج الإذاعية والتلفزيونية وتطويرها، بما يمكِّن الهيئة من التبادل المتكافئ مع الهيئات المماثلة في الدول الأخرى، وتسويق إنتاجها. 3 - التخطيط والتوجيه لمختلف البرامج الإذاعية والتلفزيونية التي تقوم بإعدادها وتنفيذها، أو التي تشترك في إعدادها وتنفيذها مع جهات أخرى، والإشراف عليها ومراقبتها. 4 - تسيير أنشطتها وإعداد خططها وبرامجها في إطار السياسة العامة والسياسة الإعلامية للمملكة. 5 - اقتراح الأنظمة والتنظيمات التي تتطلبها طبيعة عملها، والرفع عنها لاستكمال الإجراءات النظامية. 6 - شراء المواد الإذاعية والتلفزيونية المسجلة على مختلف أنواع الوسائط الإعلامية، واستئجارها وتسويقها. 7 - تأسيس الشركات والوكالات التي تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها، أو الإسهام في تأسيسها، وفقاً للأنظمة، وذلك بالاتفاق مع وزارة المالية. 8 - إنشاء محطات الإرسال الأرضي والفضائي والاستوديوهات
    الإذاعية والتلفزيونية وإقامة المنشآت والمرافق اللازمة لتحقيق أهدافها، وتجهيزها وتشغيلها وصيانتها، داخل المملكة وخارجها. 9 - إنشاء الفروع والمكاتب ومراكز الإنتاج التي تراها ضرورية لتحقيق أهدافها في الداخل والخارج، وذلك وفقاً للأنظمة. 10 - تأهيل كوادر الهيئة وتدريبها، والنهوض بالمستوى الثقافي والفني والمهني للقائمين بالعمل لديها، ولها في سبيل تحقيق ذلك إيفاد موظفيها إلى الجامعات والمعاهد المحلية والخارجية. 11 - المشاركة في المؤتمرات والندوات والمهرجانات والمعارض المحلية والإقليمية والعربية والدولية والاشتراك في المجلات والنشرات التخصصية والمهنية ووسائل المعلومات الحديثة وفقاً للإجراءات النظامية. 12 - الاشتراك في الاتحادات والمنظمات والهيئات المحلية والعربية والإسلامية والدولية التي لها علاقة بنشاطات الهيئة، وفقاً للإجراءات النظامية. 13 - إجراء البحوث والدراسات العلمية واستطلاعات الرأي التي تقتضيها عمليات التخطيط وتطوير العمل بالهيئة. 14 - توثيق الروابط والعلاقات بالمؤسسات والهيئات التي لها علاقة بنشاط الهيئة على مختلف الأصعدة. أي مهمة أخرى تكلف بها أو تقتضيها طبيعة أعمالها أو الأنظمة النافذة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: '1- يكون للهيئة مجلس إدارة يشكل على النحو الآتي: أ - وزير الثقافة والإعلام رئيساً ب - رئيس الهيئة عضواً ونائباً للرئيس ج - ممثل من وزارة الداخلية عضواً د - ممثل من وزارة الخارجية عضواً هـ - ممثل من وزارة المالية عضواً و - ممثل من وزارة الثقافة والإعلام عضواً ز - ممثل من هيئة الاتصالات وتقنية المعلومات عضواً ح - عضوان من أصحاب الرأي والخبرة في مجال نشاط الهيئة، يعينان بقرار من مجلس الوزراء بناء على اقتراح من الوزير، وتكون عضويتهما لمدة ثلاث سنوات قابلة للتجديد لمرة واحدة. ويجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو مايعادلها. 2- تحدد مكافآت أعضاء المجلس بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا في الهيئة ويختص بالإشراف عليها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق الأغراض التي قامت من أجلها الهيئة وفقاً لأحكام هذا التنظيم واللوائح الصادرة بناء عليه، وله على وجه خاص ما يأتي: إقرار السياسات العامة للهيئة المتعلقة بأنشطتها والخطط والبرامج اللازمة لتنفيذ ذلك. إقرار مشروع الهيكل التنظيمي للهيئة، ورفعه لاستكمال الإجراءات النظامية لاعتماده. إصدار اللوائح الإدارية والمالية التي تسير عليها الهيئة بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية، وغيرها من اللوائح الداخلية، وكذلك اللوائح المتعلقة بالشؤون البرامجية والفنية والخدمات التي تقدمها الهيئة. إقرار مشروع ميزانية الهيئة السنوية، ورفعه وفقاً للإجراءات النظامية. إقرار الحساب الختامي السنوي للهيئة، ورفعه وفقاً للإجراءات النظامية. تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي. اعتماد التقرير السنوي لنشاطات الهيئة، ورفعه وفقاً للإجراءات النظامية. الموافقة على قبول ما يقدم للهيئة من هبات وتبرعات وأوقاف وإعانات ومنح ووصايا. النظر في التقارير الدورية التي تقدم عن سير العمل
    في الهيئة ومركزها المالي. الموافقة على إنشاء الفروع والمكاتب ومراكز الإنتاج الضرورية لتحقيق أهداف الهيئة في الداخل والخارج، وذلك وفقاً للأنظمة. الموافقة على شراء العقارات وبيعها واستثمارها. الموافقة على إبرام الاتفاقيات والعقود، وتفويض رئيس الهيئة بالتوقيع عليها. الموافقة على تأسيس الهيئة للشركات والوكالات التي تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها أو المساهمة في إنشائها، وفقاً للأنظمة وبالاتفاق مع وزارة المالية. تحديد المقابل المالي للخدمات التي تقدمها الهيئة. وللمجلس تفويض رئيسه أو نائبه أو لجنة من أعضائه ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- يعقد المجلس اجتماعاته بصفة دورية كل (ثلاثة أشهر)، ولرئيس المجلس دعوته للاجتماع متى دعت الحاجة إلى ذلك أو متى طلب ذلك (ثلاثة) أعضاء على الأقل.2- يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.3- للمجلس دعوة من يراه لحضور جلساته للاستفادة من خبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: للمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من سواهم، ويعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للهيئة (رئيس) بالمرتبة (الممتازة)، يعين بأمر ملكي بناء على اقتراح الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يتولى الرئيس إدارة وتصريف جميع شؤون الهيئة وإداراتها وأقسامها وفق الصلاحيات المنصوص عليها في هذا التنظيم واللوائح الصادرة بناءً عليه وقرارات المجلس، وله على وجه خاص ما يأتي: 1 - اقتراح السياسات العامة للهيئة المتعلقة بأنشطتها والخطط والبرامج اللازمة لتنفيذ ذلك ورفعها إلى المجلس. 2 - اقتراح مشروع هيكل الهيئة التنظيمي، ورفعه إلى المجلس. 3 - تمثيل الهيئة أمام القضاء والجهات الحكومية والهيئات الأخرى، داخل المملكة وخارجها. ويحق له توكيل من يراه في ذلك. 4 - تنفيذ قرارات المجلس ومباشرة ما يخوله إياه المجلس من اختصاصات وصلاحيات. 5 - اقتراح اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية، وكذلك اللوائح المتعلقة بالشؤون البرامجية والفنية والخدمات التي تقدمها الهيئة، ورفعها إلى المجلس. 6 - اقتراح الخطط لتطوير الأداء البرامجي والبث الإذاعي والتلفزيوني. 7 - إقرار هيكل وبرامج الدورات الإذاعية والتلفزيونية. 8 - إعداد مشروع ميزانية الهيئة والحساب الختامي وعرضهما على المجلس. 9 - الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفق الأنظمة واللوائح
    المقرة. 10 - إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها ودراساتها، وعرضها على المجلس. 11 - التعاقد على تنفيذ الأعمال والخدمات وغيرها. 12 - إعداد التقرير السنوي عن نشاط الهيئة والصعوبات التي واجهتها واقتراح الحلول لها، وعرضه على المجلس للنظر فيه. 13 - التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، وفقاً للأنظمة. 14 - تنظيم مشاركة الهيئة في المؤتمرات والندوات والمهرجانات والمعارض المحلية والإقليمية والعربية والدولية، والاشتراك في المجلات والنشرات التخصصية والمهنية ووسائل المعلومات الحديثة وفقاً للإجراءات النظامية. 15 - إقرار الخطط والبرامج اللازمة للتدريب والابتعاث داخليًّا وخارجيًّا، ومتابعة تنفيذها. 16 - تعيين العاملين في الهيئة وفقاً للوائح، والإشراف عليهم. 17- التعاقد مع الخبراء وفقاً لاحتياجات الهيئة. وللرئيس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: '1 - تتكون موارد اهيئة مما يأتي: أ - ما يخصص لها في الميزانية العامة للدولة من اعتمادات. ب - المقابل المالي الذي تحصل عليه من الخدمات التي تقدمها. ج - ما تقبله من هبات وتبرعات وأوقاف وإعانات ومنح ووصايا. د - أي مورد آخر يقره المجلس. 2 - تودع أموال الهيئة في حساب مفتوح لها في مؤسسة النقد العربي السعودي ، ولها فتح حسابات في البنوك المرخص لها بالعمل في المملكة ، ويصرف من هذه الأموال وفق ميزانية الهيئة المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تعامل الهيئة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1 - تكون للهيئة ميزانية سنوية مستقلة، تصدر بمرسوم ملكي، وفقاً لترتيبات إصدار الميزانية العامة للدولة. 2 - السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات وعمليات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم رسميًّا بالعمل في المملكة، لتدقيق حسابات ومعاملات الهيئة وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس مكافآته، وعند تعدد مراجعي الحسابات، فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يخضع منسوبو الهيئة - عدا الرئيس - من حيث أوضاعهم الوظيفية للأحكام المعتمدة بالأمر السامي رقم (5464/م ب) وتاريخ 20 / 4/ 1426هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c18a4f9b-cd0a-45fd-9038-a9a700f17508/1
  verified: false
