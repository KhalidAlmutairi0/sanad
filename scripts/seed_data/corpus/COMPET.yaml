articles:
- article_ref: المادة الأولى
  article_text_ar: يهدف هذا النظام إلى حماية المنافسة العادلة وتشجيعها، ومكافحة الممارسات الاحتكارية التي تؤثر على المنافسة المشروعة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يقصد بالمصطلحات الآتية أينما وردت في هذا النظام المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك : - المنشأة : المصنع أو المؤسسة أو الشركة التي يملكها شخص أو أشخاص من ذوي الصفة الطبيعية أو الاعتبارية ، وكل التجمعات التي تمارس أعمالًا تجارية أو زراعية أو صناعية أو خدمية ، أو تبيع وتشتري سلعًا أو خدمات. - السوق : مكان أو وسيلة يلتقي فيه مجموعة من المشترين والبائعين الحاليين والمرتقبين خلال فترة زمنية معينة . - الهيمنة : وضع تكون من خلاله المنشأة أو مجموعة منشآت قادرة على التأثير في السعر السائد في السوق من خلال التحكم في نسبة معينة من العرض الكلي لسلعة أو خدمة معينة في الصناعة التي تمارس نشاطها فيها. وتحدد اللائحة هذه النسبة طبقًا لمعايير تشمل تركيبة السوق ومدى سهولة دخول منشآت أخرى للسوق، وأي معايير أخرى يقررها المجلس. - الاندماج : ضم منشأة إلى أخرى أو أكثر، أو ضم منشأتين أو أكثر في منشأة جديدة . - المجلس : مجلس حماية المنافسة . - الوزارة : وزارة التجارة والصناعة . - الوزير : وزير التجارة والصناعة . - اللائحة : اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تطبق أحكام هذا النظام على جميع المنشآت العاملة في الأسواق السعودية ما عدا المؤسسات العامة والشركات المملوكة بالكامل للدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تحظر الممارسات أو الاتفاقيات أو العقود بين المنشآت المتنافسة أو تلك التي من المحتمل أن تكون متنافسة ، سواء أكانت العقود مكتوبة أو شفهية ، وصريحة كانت أم ضمنية ، إذا كان الهدف من هذه الممارسات أو الاتفاقات أو العقود أو الأثر المترتب عليها تقييد التجارة أو الإخلال بالمنافسة بين المنشآت. كذلك يحظر على المنشأة أو المنشآت التي تتمتع بوضع مهيمن، أي ممارسة تحد من المنافسة بين المنشآت، وفقًا للشروط والضوابط المبينة في اللائحة ، وبخاصة ما يأتي : 1 - التحكم في أسعار السلع والخدمات المعدة للبيع بالزيادة أو الخفض، أو التثبيت، أو بأي صورة أخرى تضر المنافسة المشروعة .2 - الحد من حرية تدفق السلع والخدمات إلى الأسواق أو إخراجها منها بصفة كلية أو جزئية ، وذلك من خلال إخفائها، أو تخزينها دون وجه حق، أو الامتناع عن التعامل فيها.3 - افتعال وفرة مفاجئة في السلع والخدمات بحيث يؤدي تداولها إلى سعر غير حقيقي، يؤثر في باقي المتعاملين في السوق.4 - منع أي منشأة من استخدام حقها في دخول السوق أو الخروج منه أو عرقلة ذلك في أي وقت . 5 - حجب السلع والخدمات المتاحة في السوق بصفة كلية أو جزئية عن منشأة
    أو منشآت معينة . 6 - تقسيم الأسواق لبيع أو شراء السلع والخدمات أو تخصيصها طبقًا لأي من المعايير الآتية : أ - المناطق الجغرافية . ب - مراكز التوزيع. ج - نوعية العملاء. د - المواسم والفترات الزمنية . 7 - التأثير في السعر الطبيعي لعروض بيع السلع والخدمات أو شرائها أو توريدها سواء في المنافسات أو المزايدات الحكومية أو غير الحكومية .8 - تجميد عمليات التصنيع والتطوير والتوزيع والتسويق وجميع أوجه الاستثمار الأخرى، أو الحد من ذلك. ويجوز للمجلس عدم تطبيق أحكام هذه المادة على الممارسات والاتفاقات المخلة بالمنافسة التي من شأنها أن تؤدي إلى تحسين أداء المنشآت وتحقيق فائدة للمستهلك تفوق آثار الحد من حرية المنافسة ، كما توضحه الشروط والضوابط في اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يحظر على المنشأة التي تتمتع بوضع مهيمن أي ممارسة تحد من المنافسة ، وفقًا لما تحدده اللائحة ، ومن ذلك: 1 - بيع السلعة أو الخدمة بسعر أقل من التكلفة ، بهدف إخراج منافسين من السوق.2 - فرض قيود على توريد السلعة أو الخدمة بهدف إيجاد نقص مصطنع في توافر المنتج لزيادة الأسعار.3 - فرض اشتراطات خاصة على عمليات البيع أو الشراء، أو على التعامل مع منشأة أخرى على نحو يضعها في مركز تنافسي ضعيف بالنسبة إلى المنشآت المتنافسة .4 - رفض المنشأة التعامل مع منشأة أخرى دون مسوغ، وذلك من أجل الحد من دخولها السوق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- على المنشآت المشاركة في عملية الاندماج، أو المنشآت التي ترغب تملك أصول أو حقوق ملكية أو حقوق انتفاع أو أسهم، تجعلها في وضع مهيمن، إبلاغ المجلس كتابة قبل ستين يومًا على الأقل من إتمامها.2- على المنشآت المتنافسة التي ترغب في الجمع بين إدارتين أو أكثر بإدارة مشتركة بينهما إذا نتج عن ذلك وضع مهيمن، إبلاغ المجلس كتابة قبل ستين يومًا على الأقل من إتمامها.3- تحدد اللائحة مواعيد هذا الإبلاغ وشكله وبيانات محتواه والمعلومات والمستندات المطلوبة ، والإجراءات الواجب اتباعها في تقديمه، والمقابل المالي المستحق لفحصه.4- للمجلس الاطلاع على جميع البيانات الضرورية قبل إصدار قرار بالموافقة أو الرفض على ما يتم إبلاغه به وفقًا لما ورد في الفقرتين (1)و(2) أعلاه، مع بيان الأسباب في كل حالة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يجوز للمنشأة المشار إليها في (المادة السادسة ) من هذا النظام، استكمال إجراءات الاندماج، أو التملك، أو الجمع بين إدارتين أو أكثر بإدارة مشتركة في الحالات الآتية : 1 - إذا أبلغت كتابة من المجلس بالموافقة .2 - إذا انقضى ستون يومًا من تاريخ الإبلاغ دون أن يبلغها المجلس كتابة باعتراضه على الصفقة ، أو أنها قيد الدراسة والتحري.3 - إذا انقضى تسعون يومًا من تاريخ الإبلاغ، وكانت الصفقة قيد الدراسة والتحري، دون أن يبلغها المجلس كتابة بالموافقة أو الرفض.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: '1- ينشأ مجلس مستقل يسمى مجلس حماية المنافسة يكون مقره وزارة التجارة والصناعة. 2 - يصدر أمر ملكي بتكوين المجلس من كل من: • وزير التجارة والصناعة رئيساً • ممثل عن وزارة التجارة والصناعة عضواً • ممثل عن وزارة المالية عضواً • ممثل عن وزارة الاقتصاد والتخطيط عضواً • ممثل عن الهيئة العامة للاستثمار عضواً • أربعة أعضاء من ذوي الخبرة والكفاية يختارون لذواتهم ويرشحهم الوزير.أعضاء 3 - مدة العضوية في المجلس أربع سنوات قابلة للتجديد مرة واحدة ، ويظل عضو المجلس في منصبه بعد انتهاء فترة عضويته إلى أن يتم تعيين خلف له. 4 - ينعقد المجلس برئاسة رئيسه أو من ينيبه من الأعضاء وبحضور ثلثي الأعضاء، وتصدر قرارات المجلس بالأغلبية . وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. 5 - لا يجوز لأعضاء المجلس أن يفشوا شيئًا مما اطلعوا عليه بسبب عضويتهم في المجلس. 6 - لا يجوز لأي من أعضاء المجلس أن يشارك في مداولة تتعلق بقضية أو موضوع له فيه مصلحة أو علاقة ، أو أن يكون بينه وبين أحد الأطراف صلة قرابة أو نسب أو أن يكون قد مثل أحد الأشخاص المعنيين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'مع مراعاة ما تقضي به الأنظمة الأخرى، يختص المجلس بالمهام الآتية : 1 - الموافقة على حالات الاندماج أو التملك أو الجمع بين إدارتين أو أكثر بإدارة مشتركة وينتج عنها وضع مهيمن في السوق.2 - الأمر باتخاذ إجراءات التقصي والبحث وجمع الاستدلالات بالنسبة للشكاوى والممارسات المخالفة لأحكام هذا النظام، وكذلك الأمر بالتحقيق والادعاء فيها.3 - الموافقة على البدء في إجراءات الدعوى الجزائية ضد المخالفين لأحكام هذا النظام.4 - تشكيل أجهزة المجلس وإصدار اللوائح المالية والإدارية بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية .5 - اقتراح مشروعات الأنظمة ذات العلاقة التي تؤثر على المنافسة في ضوء المتغيرات التي تطرأ على السوق، واقتراح التعديلات اللازمة لأحكام هذا النظام.6 - إصدار اللائحة التنفيذية لهذا النظام.7 - إعداد تقرير سنوي على نشاطات المجلس وخططه المستقبلية يرفع إلى مجلس الوزراء من قبل رئيس المجلس .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للمجلس أمانة عامة يرأسها أمين عام بالمرتبة الخامسة عشرة توفر لها جميع التجهيزات اللازمة والخبراء المختصين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: '1- يصدر المجلس قرارًا بتحديد الموظفين الذين لهم صفة الضبطية القضائية في تطبيق أحكام هذا النظام.2- مع مراعاة ما تقضي به الأنظمة الأخرى، يكون للموظفين الذين لهم صفة الضبطية القضائية ما يأتي: أ - دراسة الشكاوى المقدمة التي تستند إلى أدلة فعلية بموجب أحكام هذا النظام والتحقيق فيها والادعاء عند نظر مخالفات أحكام هذا النظام أمام اللجنة المشار إليها في المادة ( الخامسة عشرة ) وأمام ديوان المظالم . ب - الحق في الاطلاع على جميع السجلات والملفات والوثائق لدى المنشأة المعنية ، المتعلقة بالشكاوى المقدمة ، والحصول على صور منها، ولا يجوز للمنشأة موضوع الشكوى حجب أي معلومات بحجة السرية أو لأي سبب آخر. 3 - للوزير أن يصدر قرارًا بتكليف بعض موظفي الوزارة للقيام بأعمال المجلس الفنية والمالية والإدارية .4- يحق للمجلس الاستعانة بخبراء وأشخاص مؤهلين من خارج الوزارة عند الحاجة .5- على أعضاء المجلس وموظفيه المحافظة على سرية المعلومات والسجلات التي يحصل عليها من المنشآت أثناء جمع الاستدلالات أو التحقيقات، ولا يجوز تسليمها إلى أي أطراف أخرى إلا بموافقة المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع عدم الإخلال بأي عقوبة أشد ينص عليها نظام آخر، يعاقب على كل مخالفة لأحكام هذا النظام بغرامة مالية لا تتجاوز خمسة ملايين ريال، وتضاعف الغرامة في حالة العود، وينشر الحكم على نفقة المخالف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يعاقب كل من أفشى سرا له علاقة بعمله طبقًا لأحكام الفقرة (5) من المادة (الحادية عشرة ) من هذا النظام، أو حقق نفعًا بطريقة مباشرة أو غير مباشرة ، بغرامة مالية لا تتجاوز خمسة ملايين ريال أو بالسجن لمدة لا تزيد عن سنتين أو بهما معًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تحدد العقوبات المشار إليها في المادتين (الثانية عشرة ) و(الثالثة عشرة ) حسب المخالفة المرتكبة وخطورتها في كل حالة فردية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1- يشكل المجلس لجنة من خمسة أعضاء على أن يكون من بينهم مستشار نظامي على الأقل ويصدر بها قرار من الوزير وتختص بالنظر والفصل في المخالفات التي تستوجب عقوبة الغرامة . 2 - تصدر اللجنة قراراتها وفقًا للقواعد والإجراءات التي تحددها اللائحة التنفيذية 3 - يجوز التظلم من قرارات اللجنة أمام ديوان المظالم خلال ستين يومًا من تاريخ الإبلاغ بالقرار.4 - إذا رأت اللجنة بعد النظر في المخالفة أنها تستوجب عقوبة السجن فتحيلها إلى ديوان المظالم للنظر فيها ابتداء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'مع عدم الإخلال بما تقضي به المادة (الثانية عشرة ) من هذا النظام، يجوز للمجلس إصدار قرار باتخاذ أحد التدابير الآتية أو بعضها عند ثبوت مخالفة لأحد أحكام هذا النظام: 1 - تكليف المخالف بتعديل أوضاعه وإزالة المخالفة خلال فترة زمنية تحددها اللائحة .2 - تكليف المخالف بالتصرف في بعض الأصول أو الأسهم أو حقوق الملكية ، أو القيام بأي عمل آخر يكفل إزالة آثار المخالفة .3 - إلزام المخالف بدفع غرامة يومية لا تقل عن ألف ريال ولا تتجاوز عشرة آلاف ريال حتى إزالة المخالفة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجوز لمن صدر بشأنه قرار من المجلس التظلم منه وفقا لنظام ديوان المظالم ولوائحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجوز لأي شخص طبيعي أو اعتباري يلحقه ضرر ناتج عن ممارسات محظورة بموجب أحكام هذا النظام، التقدم بطلب التعويض أمام القضاء المختص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يجب على جميع المنشآت التي يشملها هذا النظام تصحيح أوضاعها بما يتلاءم مع أحكام هذا النظام خلال سنة من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يصدر المجلس اللائحة التنفيذية لهذا النظام خلال تسعين يومًا من تاريخ نشره، وتنفذ بنفاذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6b615a05-f637-41cf-8419-a9a700f1afd7/1
