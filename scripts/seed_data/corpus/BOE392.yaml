articles:
- article_ref: أولاً
  article_text_ar: 'يقصد بالعبارات والكلمات الآتية -أينما وردت في هذه الترتيبات- المعاني المبينة أمام كل منها ما لم يقتضِ سياق النص غير ذلك: الترتيبات: الترتيبات التنظيمية للهيئة السعودية لتسويق الاستثمار. الوزارة: وزارة الاستثمار. الوزير: وزير الاستثمار. الهيئة: الهيئة السعودية لتسويق الاستثمار. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: ثانيًا
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية وبالاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها بقرار من المجلس إنشاء فروع أو مكاتب داخل المملكة وخارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: 'تهدف الهيئة إلى تحقيق التكامل والتعاون بين الجهات والارتقاء بجميع الأعمال والخدمات ذات الصلة بتسويق الاستثمار، وتسويق المملكة لتكون وجهة استثمارية، وإبراز الفرص الاستثمارية في كافة القطاعات، وتعزيز وتوحيد جهود القطاعين العام والخاص في هذا الشأن، وضمان وجود الركائز والدعائم اللازمة من برامج ومشروعات وحوافز لتشجيع وتسهيل الاستثمار بما يعود بالنفع على الاقتصاد الوطني، وذلك في ضوء ما تضعه الوزارة وفقاً لاختصاصاتها من سياسات عامة وخطط وبرامج تطويرية للاستثمار. ولها -دون إخلال باختصاصات ومسؤوليات الجهات الأخرى- القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: دعم أنشطة تسويق استثمارات المملكة التي تقوم بها الوزارات والجهات المعنية ومنظومة القطاع الخاص. إدارة الهوية الوطنية الموحدة لتسويق الاستثمارات وجذبها في المملكة وتفعيلها بالتنسيق مع الوزارة والجهات المعنية؛ من أجل توحيد الرسائل والمحتوى وتنسيق الجهود التسويقية والإعلامية للاستثمار. إدارة منصة (استثمر في السعودية) الإلكترونية، وتحديثها دوريًّا بالتعاون مع الوزارة والجهات المعنية، وتسويقها وإتاحتها للمستثمرين.
    إعداد الخطط والبرامج المتعلقة بالتسويق -محليًّا ودوليًّا- لتشجيع الاستثمار في المملكة، واستكمال ما يلزم في شأنها بالتنسيق مع الوزارة. القيام بحملات تسويقية داخل المملكة وخارجها للتعريف بمزايا وفرص وحوافز الاستثمار في المملكة، أو المساهمة فيها مع الجهات الحكومية. وضع الخطط الإعلامية الداعمة لتسويق الاستثمار، وتنفيذها داخل المملكة وخارجها بالتنسيق مع الوزارة. عقد وتنظيم الملتقيات والمؤتمرات والمنتديات والمعارض داخل المملكة وخارجها والمشاركة فيها بأي وسيلة ترى مناسبتها، بالتنسيق مع الوزارة والجهات المعنية، بما يخدم تسويق الاستثمار في المملكة. إنشاء المؤشرات القياسية والمسوحات الإحصائية المتعلقة بالاستثمار وتنفيذها مباشرة، أو بالتعاون مع الجهات الأخرى ذات الاختصاص، وتطويرها بما يحقق أهدافها، ورفعها إلى الوزارة. الاستعانة بذوي الاختصاص والخبراء من الشركات والمؤسسات المحلية والعالمية المتميزة لتقديم منتجات وأدوات احترافية والاستفادة من خبراتها في مجالات اختصاص الهيئة. تشجيع ودعم الشراكات المحققة لأهداف التنمية بين المستثمر المحلي والمستثمر الأجنبي. إصدار الموافقات اللازمة لإقامة الجهات الحكومية
    مبادرات تسويق الاستثمار وتشجيعها، وتقديم الدعم الفني لها من خلال دعم مشاركتها في المؤتمرات والفعاليات داخل المملكة وخارجها، وفقاً للإجراءات النظامية. العمل على استقطاب المؤتمرات الدولية ذات العلاقة بتسويق الاستثمار، والمساهمة في تطوير المؤتمرات المحلية، ودعمها، واستحداث مبادرات جديدة، وفقاً للإجراءات النظامية. التعاون وتبادل الخبرات مع الجهات الحكومية والهيئات والمنظمات الإقليمية والدولية والهيئات المماثلة في الدول الأخرى، في حدود اختصاصات الهيئة. الاشتراك في المنظمات والجمعيات الدولية فيما يتعلق باختصاصاتها؛ وفقاً للإجراءات النظامية. تمثيل المملكة في المحافل الدولية ذات الصلة باختصاصاتها. إعداد الدراسات والأبحاث ذات الصلة بقطاع تسويق الاستثمار. إصدار التقارير الدورية والمتخصصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: رابعاً
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: أعضاء لا يتجاوز عددهم (أربعة) يمثلون جهات حكومية ذات صلة بنشاط الهيئة، على ألا تقل مرتبة كل منهم عن (الثانية عشرة)، أو ما يعادلها، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد مرة واحدة، وتحدد تلك الجهات بأمر من رئيس مجلس الوزراء بناء على اقتراح من الرئيس. ثلاثة من القطاع الخاص من ذوي العلاقة بتسويق الاستثمار، يصدر بتسميتهم أمر من رئيس مجلس الوزراء بناء على ترشيح من الرئيس، وتكون عضويتهم لمدة (ثلاث) سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: خامساً
  article_text_ar: 'يعد المجلس السلطة العليا للهيئة، ويتولى الإشراف على إدارة الهيئة، وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنته الترتيبات، وله على وجه خاص ما يأتي: إقرار السياسات العامة المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنها. إعداد مشروع استراتيجية تشجيع واستقطاب الاستثمار -بالتنسيق مع الوزارة- ورفعه؛ لاعتماده وفق الإجراءات النظامية. اقتراح تعديل الأنظمة ذات العلاقة باختصاصات الهيئة، ورفعها للوزارة؛ تمهيداً لاعتمادها وفق الإجراءات النظامية. إقرار اللوائح الإدارية والمالية، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار اللوائح الداخلية، وغيرها من اللوائح اللازمة لتسيير عمل الهيئة. إقرار الضوابط والاشتراطات المنظمة للفرص الاستثمارية التي يكون تسويقها من خلال الهيئة. إقرار الهيكل التنظيمي للهيئة. الموافقة على إنشاء فروع ومكاتب للهيئة داخل المملكة وخارجها.
    الإشراف على مكاتب الوزارة في خارج المملكة ذات الصلة باختصاص الهيئة، بالتنسيق مع الوزارة. إقرار المقابل المالي للأعمال والخدمات التي تقدمها الهيئة. الموافقة على مشروع الميزانية السنوية للهيئة، وحسابها الختامي، وتقريرها السنوي؛ تمهيداً لاعتمادها وفق الإجراءات النظامية. الاستعانة بمراكز الدراسات والتخطيط، وببيوت الخبرة، وبالمستشارين؛ لتحقيق أهداف الهيئة. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات والعقود، بحسب الإجراءات النظامية. قبول الهبات والتبرعات والمنح والوصايا والأوقاف؛ وفقاً للأحكام المنظمة لذلك. النظر في التقارير الدورية التي تقدم له عن سير أعمال الهيئة. الموافقة على اشتراك الهيئة في المنظمات والجمعيات الدولية المتخصصة؛ وفقاً للإجراءات النظامية. وللمجلس -في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم، يكِل إليها ما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها. وللجان الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض اختصاصاته إلى الرئيس، أو من يراه من أعضائه أو من منسوبي
    الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: سادساً
  article_text_ar: يجتمع المجلس دوريًّا (أربع) مرات -على الأقل- في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وتكون اجتماعاته برئاسة الرئيس أو من ينيبه من الأعضاء. وتوجه الدعوة للاجتماع من الرئيس أو من ينيبه، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم، دون أن يكون لهم حق التصويت. لا يجوز لعضو الامتناع عن التصويت ولا تفويض عضو آخر بالتصويت عند غيابه. ويجوز للعضو الذي يعترض على أي قرار أن يثبت اعتراضه مسببًا في المحاضر. تعقد اجتماعات المجلس في مقر الهيئة. ويجوز عند الحاجة عقدها في مكان آخر داخل المملكة. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة ووفقاً لما يقدره الرئيس- أن يصدر قراراً بالتمرير، ويشترط في هذه الحالة موافقة جميع أعضاء المجلس على القرار، ويُعرض هذا القرار على المجلس في أول
    اجتماع لاحق لإثباته في محضر الاجتماع. يجوز -عند الحاجة وفي الحالات المستعجلة ووفقاً لما يقدره الرئيس- عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية. يضع المجلس القواعد والإجراءات المنظمة لعقد اجتماعاته عن بعد، بما في ذلك تحديد إجراءات الدعوة للاجتماعات وكيفية انعقادها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: سابعاً
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يُعيَّن ويعفى من منصبه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود الترتيبات وما يقرره المجلس، ويتولى الاختصاصات الآتية: إعداد الخطط والسياسات اللازمة لتنفيذ الاستراتيجيات المتعلقة بنشاط الهيئة، ورفعها إلى المجلس. الإشراف على سير العمل في الهيئة من خلال الأنظمة واللوائح والخطط والبرامج المعتمدة. إعداد اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية؛ تمهيداً لرفعها إلى المجلس للموافقة عليها. اقتراح هيكل الهيئة التنظيمي، ورفعه إلى المجلس. إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، وعرضها على المجلس. التوقيع على الاتفاقيات والعقود- ذات الصلة باختصاصات الهيئة- بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والمؤسسات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها. الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية؛ وفقاً للأنظمة واللوائح المقرة من المجلس، وفي حدود الصلاحيات
    التي فوضه بها المجلس. التعاقد لتنفيذ الأعمال والخدمات وغيرها؛ وفقاً للأنظمة والصلاحيات التي فوضه بها المجلس. اقتراح إنشاء فروع أو مكاتب للهيئة داخل المملكة وخارجها، والرفع عنها إلى المجلس. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في الترتيبات واللوائح الصادرة بناءً عليها، بحسب الصلاحيات المخولة له. تعيين منسوبي الهيئة وفقًا للوائح المنظمة لذلك، والإشراف عليهم. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: ثامناً
  article_text_ar: يسري على منسوبي الهيئة نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: تاسعاً
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ الموافقة على هذه الترتيبات وتنتهي بنهاية السنة المالية التي تليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: عاشراً
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حسابًا لها في البنك المركزي السعودي. ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويُصرف من هذه الإيرادات وفق ميزانية الهيئة المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: حادي عشر
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: ثاني عشر
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها وحسابها الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
- article_ref: ثالث عشر
  article_text_ar: تنشر هذه الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0640036c-6e31-4479-9c8c-aef800e34d96/1
  verified: false
