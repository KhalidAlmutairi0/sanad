articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: المملكة: المملكة العربية السعودية. الهيئة: الهيئة العامة للطيران المدني. التنظيم: تنظيم الهيئة. الوزير: وزير النقل والخدمات اللوجستية. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس الهيئة. الطيران المدني: جميع ما يتعلق بالطيران، عدا الطيران العسكري. إقليم المملكة: الأراضي البرية والبحر الإقليمي للمملكة والمجال الجوي الذي يعلوهما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع داخل المملكة، أو مكاتب داخل المملكة أو خارجها؛ بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنظيم قطاع الطيران المدني في المملكة وتطويره ومراقبة أدائه، وتهيئته لجذب استثمارات القطاع الخاص، وتطوير صناعة النقل الجوي ونموها في إقليم المملكة، وذلك بالمواءمة مع الاستراتيجية الوطنية للنقل والخدمات اللوجستية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة في سبيل تحقيق أهدافها -دون إخلال باختصاصات الجهات الأخرى ذات العلاقة- ممارسة الاختصاصات والقيام بالمهمات الآتية: وضع السياسات والاستراتيجيات وإعداد الأنظمة واللوائح ذات العلاقة بقطاع الطيران المدني، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. الرقابة على تشغيل المطارات والمهابط المدنية، وعلى التزام شركات الطيران والمطارات والشركات العاملة في قطاع الطيران المدني بالأنظمة واللوائح والمعايير ذات العلاقة بقطاع الطيران المدني، وبتنفيذ استراتيجية الطيران المدني، وباستدامة الأعمال. إصدار التراخيص والتصاريح والشهادات والإجازات والموافقات والاعتمادات ذات العلاقة بالطيران المدني. وضع الإجراءات والمعايير الأمنية ذات العلاقة بالطيران المدني ومتابعة تطبيقها، وفقًا للمتطلبات والمستجدات المحلية والدولية، وبالتنسيق مع الجهات ذات العلاقة. البتّ في طلبات ممارسة أعمال الوساطة ذات العلاقة بقطاع الطيران المدني، وفقًا للإجراءات التي تضعها الهيئة. إصدار تصاريح الرحلات الجوية المجدولة والعارضة والخاصة بما في ذلك الرحلات العسكرية والدبلوماسية، وفقًا للضوابط والإجراءات التي تضعها
    الهيئة. البتّ في طلبات تقديم الخدمات الاستشارية ذات العلاقة بقطاع الطيران المدني وفقًا للإجراءات التي تضعها الهيئة. وضع معايير موحدة للمطارات الذكية وتقنيات الاتصالات لتحسين تجارب المسافرين وإثرائها، وضمان تطبيق أفضل الممارسات العالمية والمحلية دون إخلال بأمن المعلومات والبيانات في مجال الطيران المدني، وذلك بالتنسيق مع هيئة الاتصالات والفضاء والتقنية. تنظيم برامج حماية البيئة في مجال الطيران المدني، والإشراف عليها -بالتنسيق مع الجهات ذات العلاقة- بما يتماشى مع المعايير المحلية والدولية. الموافقة على التعاقدات بين مشغل المطار المرخص له والأطراف الخارجية، لأغراض السلامة والأمن والتسهيلات ومعايير جودة الخدمة؛ وذلك دون إخلال بالأنظمة واللوائح ذات العلاقة. الإشراف على إدارة استخدام ترددات الاتصال الجوي المرخصة للاستخدام في مجال الطيران المدني، وفقًا للضوابط التي تضعها الهيئة، والتنسيق في ذلك مع الجهات ذات العلاقة. إصدار دليل للطيران السعودي، يحتوي على معلومات الطيران اللازمة للملاحة الجوية في إقليم المملكة، وإصدار نشرات معلومات الطيران المدني. التنسيق مع الجهات ذات العلاقة بما يضمن سلامة
    وأمن الطيران المدني في إقليم المملكة. تعريف المصطلحات المتعلقة بقطاع الطيران المدني، وذلك دون إخلال بما ورد في المعاهدات والاتفاقيات الدولية ذات العلاقة بالطيران المدني التي صدقت عليها المملكة. اتخاذ التدابير اللازمة لتنفيذ المعاهدات والاتفاقيات الدولية ذات العلاقة بالطيران المدني التي صدقت عليها المملكة. الموافقة على الاتفاقيات والترتيبات التجارية التي تبرم بين الناقلات الجوية الوطنية أو الأجنبية، وذلك عند تشغيلها من إقليم المملكة وإليه، على أن تراعى في ذلك الجوانب الاقتصادية والاجتماعية والأمنية، وفقًا لأحكام المعاهدات والاتفاقيات الدولية ذات العلاقة بالطيران المدني التي صدقت عليها المملكة. إبرام الاتفاقيات ومذكرات التفاهم والبروتوكولات ذات العلاقة بالطيران المدني، وفقًا للإجراءات النظامية المتبعة. تمثيل المملكة في المنظمات الإقليمية والدولية واللجان ذات العلاقة بالطيران المدني، وفقًا للإجراءات النظامية المتبعة. إقامة المعارض والمؤتمرات وعقد الندوات العلمية وجلسات العمل ذات العلاقة بالطيران المدني، وفقًا للإجراءات النظامية المتبعة. التحقيق فنيًّا في حوادث ووقائع الطيران المدني، دون
    إخلال باختصاصات المركز الوطني لسلامة النقل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: أ- الرئيس. ب- ما لا يتجاوز (خمسة) ممثلين من الجهات الحكومية. ج- ما لا يتجاوز (ثلاثة) أشخاص من القطاع الخاص. لا تقل مرتبة ممثلي الجهات الحكومية المشار إليهم في الفقرة الفرعية (ب) من الفقرة (1) من هذه المادة عن المرتبة (الرابعة عشرة) أو ما يعادلها. يرفع رئيس المجلس إلى مجلس الشؤون الاقتصادية والتنمية ما يتصل بتحديد الجهات الحكومية المشار إليها في الفقرة الفرعية (ب) من الفقرة (1) من هذه المادة، تمهيداً لصدور أمر من رئيس مجلس الوزراء بذلك. يصدر بتعيين الأشخاص المشار إليهم في الفقرة الفرعية (ج) من الفقرة (1) من هذه المادة أمر من رئيس مجلس الوزراء بناءً على اقتراح من رئيس المجلس. فيما عدا رئيس المجلس والرئيس، تكون مدة العضوية في المجلس (ثلاث) سنوات قابلة للتجديد لمدة مماثلة ولمرة واحدة. لرئيس المجلس إنابة من يراه لرئاسة المجلس -في حال غيابه- من ممثلي الجهات الحكومية المشار إليها في الفقرة الفرعية (ب) من الفقرة (1) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود أحكام التنظيم، وله بوجه خاص ما يأتي: إقرار السياسات والاستراتيجيات ذات العلاقة باختصاصات الهيئة، وإقرار الخطط والبرامج اللازمة لتنفيذها، تمهيدًا للرفع عما يستلزم استكمال إجراءات نظامية في شأنه. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل المعمول به منها، تمهيدًا للرفع عن ذلك لاستكمال الإجراءات النظامية المتبعة. إقرار الهيكل التنظيمي للهيئة. إقرار اللوائح المالية والإدارية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وأن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية. الموافقة على إنشاء فروع ومكاتب للهيئة. النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة، واتخاذ ما يلزم في شأنها. الموافقة على مشروع ميزانية الهيئة، وحسابها الختامي، وتقرير مراجع الحسابات، وتقريرها
    السنوي؛ تمهيدًا لاعتمادها وفقًا للإجراءات النظامية المتبعة. تحديد المقابل المالي لما تقدمه الهيئة من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها. الموافقة على استثمار أموال الهيئة بما يحقق أهدافها، وفقًا للآليات والإجراءات النظامية المتبعة. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. قبول التبرعات والهبات والمنح والوصايا والأوقاف، وذلك وفقًا للأحكام المنظّمة لذلك. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. وللمجلس تفويض بعض اختصاصاته -عدا الاختصاصات الواردة في الفقرات (1) و(2) و(3) و(4) و(5) و(6) و(7) و(8) و(9) من هذه المادة- إلى رئيس المجلس أو من يراه من أعضائه أو من منسوبي الهيئة. وللمجلس أن يشكل لجانًا دائمة أو مؤقتة من أعضائه أو من غيرهم، وأن يفوضها ببعض اختصاصاته أو يعهد إليها بما يراه من مهمات. ويُحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها وأمينها واختصاصاتها. ويكون للجنة الاستعانة بمن تراه لتأدية الاختصاصات المفوضة بها والمهمات المعهودة إليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في الهيئة، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يجتمع المجلس -بناءً على دعوة من رئيس المجلس أو من ينيبه- مرة كل (ثلاثة) أشهر على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو بطلب من (ثلث) أعضائه على الأقل. يكون اجتماع المجلس صحيحًا بحضور أغلبية أعضائه على الأقل بمن فيهم رئيس المجلس أو من ينيبه. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حالة تساوي الأصوات يُرجّح الجانب الذي صوت معه رئيس الاجتماع. يجوز للمجلس -عند الحاجة، ووفقًا لما يقدره رئيسه- أن يعقد الاجتماعات وأن يُصوّت على التوصيات والقرارات عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتّخذ التوصيات والقرارات عن طريق التمرير على الأعضاء، ويُوقّع عليها بما يُفيد باطّلاع جميع الأعضاء عليها. ولا تُعدّ التوصيات والقرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرّر على جميع الأعضاء، ويصوتوا عليها، وتحُز على أغلبية أصواتهم على الأقل. ويعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. تثبت مداولات المجلس وتوصياته وقراراته في محاضر يوقعها
    رئيس الاجتماع والأعضاء الحاضرون. وتُحاط اجتماعات المجلس ومداولاته وجدول أعماله وتوصياته وقراراته ومحاضره بالسرّية التامة. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. للمجلس دعوة من يراه من الجهات الحكومية أو الخاصة أو من المختصين والمستشارين لحضور الاجتماعات، دون أن يكون لهم حق التصويت. ويكون للمجلس أمين من الأعضاء أو من غيرهم يختاره رئيس المجلس، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات والتوصيات وتبليغها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس يعين ويعفى من منصبه بقرار من المجلس، ويحدد فيه أجره ومزاياه المالية الأخرى، ويعدّ المسؤول الأول عن إدارة شؤون الهيئة، وتتركز مسؤولياته وصلاحياته في حدود ما ينصُّ عليه التنظيم وما يقرره أو يفوضه به المجلس، وله -على وجه الخصوص- ممارسة الصلاحيات الآتية: الإشراف على سير العمل في الهيئة وفقًا للسياسات والاستراتيجيات والخطط والبرامج المعتمدة. اقتراح سياسات واستراتيجيات الهيئة والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس لإقرارها. اقتراح الهيكل التنظيمي للهيئة، ورفعه إلى المجلس لإقراره. الإشراف على إعداد اللوائح المالية والإدارية وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤون الهيئة، ورفعها إلى المجلس لإقرارها، والإشراف على تنفيذها بعد إقرارها. الإشراف على إعداد مشروع ميزانية الهيئة، وحسابها الختامي، وتقريرها السنوي، ورفعها إلى المجلس تمهيدًا لاستكمال ما يلزم في شأنها. الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية، وفقًا للأنظمة واللوائح وفي حدود الصلاحيات التي يفوضه بها المجلس. تعيين منسوبي الهيئة وفقًا للوائح المنظّمة لذلك، والإشراف
    عليهم. التعاقد مع الخبراء والمستشارين وبيوت الخبرة في حدود أهداف الهيئة، ووفقًا لما تحدده اللوائح. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناءً عليه، بحسب الصلاحيات المخولة له. التعاقد لتنفيذ الأعمال والخدمات وغيرها، وفقًا للأنظمة واللوائح وفي حدود الصلاحيات التي يفوضه بها المجلس. إعداد تقارير دورية عن أعمال الهيئة ومنجزاتها ونشاطاتها، ورفعها إلى المجلس تمهيدًا لاستكمال ما يلزم في شأنها. الموافقة على ابتعاث وتدريب منسوبي الهيئة، وفقًا للوائح المنظمة لذلك. التوقيع على الاتفاقيات ومذكرات التفاهم والبروتوكولات بعد موافقة المجلس، أو بحسب الصلاحيات التي يمنحه إياها، ووفقًا للإجراءات النظامية المتبعة. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها. وله تفويض غيره في ذلك. أي مهمة أخرى يكلفه بها المجلس. وللرئيس تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: أ- ما يُخصَّص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها والتراخيص والتصاريح والشهادات والإجازات والموافقات والاعتمادات التي تصدرها. ج- عوائد استثماراتها. د- ما يقبله المجلس من التبرعات والهبات والمنح والوصايا وريع الأوقاف، وفقًا للأحكام المنظّمة لذلك. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حسابًا لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفقًا لميزانية الهيئة ولوائحها المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة من مواردها المالية، ويكون لها احتياطي عام يعادل ضعف إجمالي نفقاتها المبينة في ميزانيتها السابقة؛ يودعان في حساب الهيئة بعد أن تودع إيراداتها في حساب جاري وزارة المالية في البنك المركزي السعودي. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو الهيئة -عدا الرئيس- لأحكام نظامي العمل والتأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة وتعاملاتها المالية وميزانيتها السنوية وحسابها الختامي، ويحدّد المجلس أتعابه. ويُرفع تقرير مراجع الحسابات إلى المجلس، ويُزوّد الديوان العام للمحاسبة بنسخة منه بعد موافقة المجلس عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء حسابها الختامي السنوي -خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية- تمهيدًا لإحالته إلى مجلس الوزراء وفقًا لنظامه، ويزود الديوان العام للمحاسبة بنسخة منه بعد موافقة المجلس عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء -خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية- تقريرًا سنويًّا عما حققته من إنجازات خلال السنة المنقضية وما واجهته من صعوبات، وما تراه من مقترحات لتحسين سير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7b3d4c04-1816-4c89-bdc7-b32200e54fee/1
  verified: false
