regulation:
  code: BOE342
  name_ar: تنظيم مركز الملك عبد الله بن عبد العزيز الدولي لخدمة اللغة العربية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: ينشأ بموجب هذا التنظيم مركز يسمى ( مركز الملك عبد الله بن عبد العزيز الدولي لخدمة اللغة العربية ) ، وتكون له شخصية اعتبارية واستقلال مالي وإداري ، ويكون مقره في مدينة الرياض، وله فتح مكاتب داخل المملكة وخارجها، ويرتبط المركز بوزارة التعليم العالي، ويشار إليه فيما بعد بـ "المركز" .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف المركز إلى الآتي : 1 - المحافظة على سلامة اللغة العربية.2 - إيجاد البيئة الملائمة لتطوير وترسيخ اللغة العربية ونشرها. 3 - الإسهام في دعم اللغة العربية وتعلمها . 4 - العناية بتحقيق ونشر الدراسات والأبحاث والمراجع اللغوية. 5 - وضع المصطلحات العلمية واللغوية والأدبية، والعمل على توحيدها ونشرها. 6 - تكريم العلماء والباحثين والمختصين في اللغة العربية . 7 - تقديم الخدمات ذات العلاقة باللغة العربية للأفراد والمؤسسات والهيئات الحكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الثالثة (الإشراف على المركز )
  article_text_ar: 1- يكون وزير التعليم العالي في المملكة العربية السعودية المشرف العام على المركز .2- يتولى إدارة المركز مجلس أمناء يتألف من رئيس وثمانية أعضاء غير متفرغين من ذوي الاختصاص والمهارات العلمية والتميز والخبرة في مجال اللغة العربية من داخل المملكة وخارجها ، ويكون تعيينهم وتحديد الرئيس ونائبه بقرار من المشرف العام على المركز لمدة ثلاث سنوات قابلة للتجديد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الرابعة (صلاحيات مجلس الأمناء)
  article_text_ar: 'مجلس الأمناء هو السلطة العليا المهيمنة على شؤون المركز وإدارته وتصريف أموره ووضع السياسة العامة التي يسير عليها وفقا لهذا التنظيم ولوائحه ، وله جميع الصلاحيات اللازمة لتحقيق أغراضه وبصفة خاصة ما يأتي : 1 - وضع السياسة العامة للمركز وخطة العمل التي يسير عليها لتحقيق أغراضه ومراقبة تنفيذ ذلك . 2 - اعتماد اللوائح المالية والإدارية للمركز. 3 - اعتماد اللوائح الداخلية للمركز والسياسات واللوائح الخاصة بأوجه نشاطه . 4- الموافقة على إنشاء فروع للمركز ومكاتب له داخل المملكة وخارجها.5 - الموافقة على مشروع ميزانية المركز وحسابه الختامي وتقرير مراجع الحسابات والتقرير السنوي لاعتماد ذلك من المشرف العام.6 - تشكيل اللجان وتخويلها بما يراه من الصلاحيات من أجل إنجاز الأمور التي تعرض على المجلس .7 - قبول الهبات والتبرعات والمنح والوصايا والأوقاف بما لا يتعارض مع الأنظمة والتعليمات النافذة في المملكة .8 - تفويض الأمين العام للمركز أو من ينيبه بإبرام الاتفاقيات والعقود بأنواعها في حدود القواعد التي يضعها مجلس الأمناء .9 - إقرار مشروعات استثمار أموال المركز .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الخامسة (اجتماعات مجلس الأمناء)
  article_text_ar: 1 - يجتمع مجلس الأمناء بدعوة من رئيسه أربعة اجتماعات - على الأقل - كل سنة ، وعلى الرئيس دعوة المجلس إذا طلب ذلك نصف الأعضاء على الأقل ، ويجب أن تشتمل الدعوة على جدول الأعمال ، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين ، وفي حالة تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع، وللمجلس أن يدعو لحضور جلساته من يرى الاستعانة به دون أن يكون له حق التصويت ، وتثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع وأعضاؤه الحاضرون .2 - لا يجوز للمجلس أن يصدر قراراً بعرضه على الأعضاء متفرقين إلا في حالة الضرورة، ويشترط عندئذ موافقة جميع أعضاء المجلس على القرار كتابة ، ويعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع .3- لا تكون قرارات المجلس نافذة إلا بعد تصديق المشرف العام عليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة السادسة (مهمات الأمين العام)
  article_text_ar: 'يعين المشرف العام على المركز أميناً عاما من ذوي الكفاية والخبرة لمدة أربع سنوات بناءً على توصية من مجلس الأمناء ، ويكون المسؤول التنفيذي عن المركز، ومرجعه رئيس مجلس الأمناء وتتركز مسؤولياته في حدود ما ينص عليه هذا التنظيم ولوائحه ، وما يقرره مجلس الأمناء، وله على وجه الخصوص الآتي: 1 - التحضير لاجتماعات مجلس الأمناء .2 - متابعة تنفيذ القرارات الصادرة من مجلس الأمناء .3 - الإشراف على إعداد مشروع ميزانية المركز ومشروع الحساب الختامي ، تمهيداً لعرضهما على مجلس الأمناء .4 - تعيين العاملين في المركز وفروعه ومكاتبه حسب اللوائح الإدارية والمالية والفنية في المركز .5 - الإشراف على العاملين في المركز طبقاً للصلاحيات الممنوحة له وما تحدده اللوائح .6 - إصدار أوامر الصرف الخاصة بالمركز وفقاً للميزانية السنوية المعتمدة ولوائح المركز المالية . 7 - تقديم تقارير دورية إلى مجلس الأمناء عن أعمال المركز ومنجزاته ونشاطاته .8 - اقتراح خطط المركز وبرامجه والإشراف على تنفيذها بعد موافقة مجلس الأمناء عليها .9 - اقتراح اللوائح الإدارية والمالية والفنية التي يسير عليها المركز ، واقتراح تعديلها،
    ورفعها إلى مجلس الأمناء .وللأمين العام تفويض بعض الاختصاصات المنصوص عليها في هذه المادة إلى غيره من المسؤولين عن إدارة المركز وفروعه ومكاتبه .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة السابعة (اللجنة الاستشارية)
  article_text_ar: 'تشكل في المركز ـ بقرار من مجلس الأمناء ـ لجنة استشارية من خمسة أشخاص على الأقل غير متفرغين ، يساعدون الأمين العام ، وتكون من مهمات هذه اللجنة المساعدة فيما يأتي : 1 ـ اقتراح الاستراتيجيات ورسم السياسات والتخطيط لسير أعمال المركز . 2 ـ اقتراح اللوائح والإجراءات الكفيلة بالتنفيذ الأمثل لأعمال المركز .3 ـ اقتراح الخطط والبرامج والمشروعات السنوية .4 ـ إجراء البحوث العلمية وإعداد التقارير ذات العلاقة بنشاط المركز .وللجنة الاستشارية أن تستعين بمن تراه في سبيل القيام بتلك المهمات .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: أ - يمثل المركز في تعاملاته القانونية والقضائية رئيس مجلس الأمناء أو من يفوضه. ب - يرفع رئيس مجلس الأمناء التقارير الدورية للمشرف العام بعد إقرارها من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للمركز ميزانية سنوية ، ويجوز له أن يضع ميزانية لبرامجه تزيد مدتها على سنة وفقاً لما تتطلبه المدة التقديرية لتنفيذ تلك البرامج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة العاشرة (الموارد المالية)
  article_text_ar: 'تتكون الموارد المالية للمركز مما يأتي : 1 ـ الإعانات التي تخصصها له الدولة.2 ـ الدخول التي يحققها المركز من ممارسة أوجه النشاط التي تدخل ضمن اختصاصاته. 3 ـ الهبات والتبرعات والمنح والوصايا والأوقاف التي يقبلها مجلس أمناء المركز.4 ـ عائدات استثمارات أموال المركز .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الحادية عشرة (إيداع أموال المركز)
  article_text_ar: تودع أموال المركز في حسابات مصرفية مستقلة في مصارف المملكة باسم المركز ويصرف منها وفقاً لهذا التنظيم ولوائحه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الثانية عشرة (المراجع المالي)
  article_text_ar: يعين مجلس الأمناء مراجعاً أو أكثر للحسابات من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة ، ويحدد أتعابهم، وإذا تعدد مراجعو الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام المركز، ويعرض تقرير مراجع الحسابات على مجلس الأمناء تمهيداً لرفعه إلى المشرف العام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الثالثة عشرة (نظام العمل والتأمينات الاجتماعية)
  article_text_ar: يطبق نظام العمل ونظام التأمينات الاجتماعية على جميع العاملين السعوديين في المركز .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الرابعة عشرة (  السنة المالية للمركز )
  article_text_ar: السنة المالية للمركز هي السنة المالية لدولة المقر، واستثناء من ذلك تبدأ السنة المالية الأولى للمركز من تاريخ نفاذ هذا التنظيم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يُنشر هذا التنظيم في الجريدة الرسمية لدولة المقر، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/09eebc33-6b78-4a34-ad59-a9a700f173ce/1
  verified: false
