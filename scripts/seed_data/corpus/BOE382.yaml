regulation:
  code: BOE382
  name_ar: تنظيم المركز السعودي للاعتماد
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمامها، ما لم يقتضِ السياق غير ذلك: المركز: المركز السعودي للاعتماد. التنظيم: تنظيم المركز. الوزير: وزير التجارة والاستثمار. المجلس: مجلس إدارة المركز. المدير التنفيذي: المدير التنفيذي للمركز. جهات تقويم المطابقة المعتمدة: جهات يعتمدها المركز للقيام بتقويم المطابقة. تقويم المطابقة: التحقق من أن اشتراطات محددة خاصة بمُنتَج، أو بعملية، أو بمنظومة، أو بجهة تقويم؛ قد استوفيت. الاعتماد: اعتراف رسمي من المركز بكفاية جهة من جهات تقويم المطابقة في مجال محدد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية، والاستقلال المالي والاداري، ويرتبط تنظيمياً بالوزير، ويكون مقره الرئيس في مدينة الرياض، وله -بحسب الحاجة- إنشاء فروع أو مكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى تحقيق ما يلي: كفاية جهات تقويم المطابقة. حماية المستهلك، والمحافظة على الصحة والسلامة العامة. منح الثقة بخدمات جهات تقويم المطابقة، وبما يعزز من مشاركة القطاع الخاص في تقديم هذه الخدمات. رفع مستوى جودة الخدمات والمنتجات وكفايتها، ورفع الثقة بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع عدم الإخلال باختصاصات الجهات الأخرى، للمركز القيام بكل ما يلزم في سبيل تحقيق أهدافه، ومن ذلك ما يلي: اعتماد جهات تقويم المطابقة داخل المملكة أو خارجها، وفقاً للمتطلبات التي يقرها المجلس. الاعتراف المتبادل بشهادات اعتماد جهات تقويم المطابقة الصادرة من أجهزة الاعتماد في الدول الأخرى، وذلك وفقاً للممارسات والمتطلبات الدولية، وما يضعه المجلس من قواعد. الاشتراك في المنظمات والهيئات الدولية والإقليمية ذات العلاقة بنشاطه، وتوقيع مذكرات التفاهم والاتفاقيات معها، وذلك وفق الإجراءات النظامية المعمول بها. تقديم خدمات التدريب وتأهيل المقوّمين في مجال تقويم المطابقة. إعداد قاعدة بيانات خاصة بنشاط المركز، ونشرها. اقتراح الأنظمة ذات الصلة بنشاطه، وتعديل المعمول به منها، والرفع لاستكمال الإجراءات النظامية اللازمة. التنسيق مع الأجهزة الحكومية في المملكة في مجال نشاطه بما يسهم في توفير البيانات الخاصة بجهات تقويم المطابقة؛ من أجل اعتمادها. إعداد الدراسات والبحوث والإحصاءات المتعلقة بنشاطه، ونشرها، وفقاً للضوابط والإجراءات التي يضعها المجلس. تنظيم الندوات والمؤتمرات المتعلقة بنشاطه.
    تمثيل المملكة في المنظمات الدولية والإقليمية ذات العلاقة بنشاطه، وفقاً للإجراءات النظامية المعمول بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير، وعضوية كل من: ممثل من وزارة التجارة والاستثمار. ممثل من الهيئة السعودية للمواصفات والمقاييس والجودة. ممثل من الهيئة العامة للغذاء والدواء. رئيس اللجنة الوطنية لكود البناء. رئيس جمعية حماية المستهلك. ثلاثة من القطاع الخاص من المختصين وذوي الخبرة في مجال عمل المركز، يعينون بقرار من مجلس الوزراء بناء على اقتراح من مجلس الغرف السعودية، وتكون مدة عضويتهم ثلاث سنوات قابلة للتجديد لمرة واحدة. ويجب ألا تقل مراتب ممثلي الأجهزة الحكومية في المجلس عن (الرابعة عشرة) أو ما يعادلها. وتحدد مكافآت الرئيس والأعضاء بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع المجلس بما لا يقل عن أربعة اجتماعات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيسه، أو إذا طلب ذلك ثلث أعضائه على الأقل. ولرئيس المجلس أن ينيب من يراه من ممثلي الجهات الحكومية الأعضاء في المجلس لرئاسة الاجتماعات في حال غيابه. لا يكون اجتماع المجلس صحيحاً إلا إذا حضره أغلبية الأعضاء على الأقل، على أن يكون من بينهم رئيس المجلس أو من ينيبه. وتصدر القرارات بأغلبية أصوات الحاضرين. وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. تعقد اجتماعات المجلس في مقر المركز الرئيس، ويجوز -بقرار من رئيس المجلس- عقد الاجتماع في أي مكان آخر داخل المملكة. لا يجوز لعضو المجلس تفويض غيره للتصويت عنه عند غيابه. وللعضو تسجيل اعتراضه وأسبابه ضمن محضر اجتماع المجلس. لا يجوز لعضو المجلس أن يفشي شيئاً مما وقف عليه من معلومات بسبب عضويته في المجلس دون موافقة مكتوبة من رئيس المجلس. لرئيس المجلس دعوة من يراه لحضور اجتماعات المجلس دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة المهيمنة على شؤون المركز وتصريف أموره، ويتخذ جميع القرارات اللازمة لتحقيق أهدافه في حدود أحكام التنظيم، وله بوجه خاص ما يأتي: إقرار سياسات المركز العامة، وخططه وبرامجه، ومراقبة تنفيذها. اعتماد المعايير والمتطلبات والاشتراطات اللازمة لتقويم المطابقة. وضع القواعد التنظيمية التي تضمن الحيادية في جميع أعمال المركز. إقرار الهيكل التنظيمي للمركز ورفعه لاستكمال الاجراءات النظامية لاعتماده. قرار اللوائح الإدارية والمالية للمركز -بالاتفاق مع وزارة المالية- وغيرها من اللوائح الداخلية. عقد برامج التعاون الفني واتفاقيات الاعتراف المتبادل بين المركز والجهات النظيرة له في الدول الأخرى، وفقاً للإجراءات المعمول بها. النظر في التقارير الدورية التي تقدم عن سير العمل في المركز، التي يرفعها المدير التنفيذي. إقرار مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيداً لرفعها؛ بحسب الإجراءات النظامية المتبعة. تعيين مراجع (أو أكثر) لحسابات المركز، وتحديد أتعابه. تحديد المقابل المالي للخدمات والأعمال التي يقدمها المركز في مجال اختصاصه. تشكيل لجان
    دائمة أو مؤقتة -من أعضائه أو من غيرهم- وتحديد مهماتها. الموافقة على إنشاء فروع أو مكاتب للمركز داخل المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز مدير تنفيذي يصدر بتعيينه وتحديد أجره ومزاياه المالية قرار من المجلس، ويكون المسؤول عن إدارة المركز وتصريف شؤونه وفقاً لهذا التنظيم وما يقرره المجلس، وله بوجه خاص مباشرة الاختصاصات الآتية: اقتراح سياسات المركز العامة وخططه وبرامجه اللازمة لتنفيذها، ورفعها إلى المجلس لإقرارها. اقتراح الهيكل التنظيمي للمركز، ولوائحه الإدارية والمالية اللازمة لتسيير العمل فيه، ورفعها إلى المجلس لاعتمادها، والإشراف على تنفيذها بعد اعتمادها. إصدار الأوامر بمصروفات المركز، وفقاً للوائحه المالية المعتمدة. تعيين العاملين في المركز، والإشراف عليهم، وفقاً لما تحدده اللوائح. الإشراف على سير العمل في المركز من خلال اللوائح والقرارات التي يعتمدها المجلس. الإشراف على إعداد مشروع الميزانية السنوية للمركز والرفع عنه للمجلس لإقراره. تمثيل المركز لدى الجهات الحكومية والقضائية داخل المملكة، ولدى الجهات والمنظمات ذات الصلة بعمله داخل المملكة وخارجها، وله تفويض غيره بذلك. التعاقد مع المكاتب الاستشارية وبيوت الخبرة والخبراء والمقوّمين المحليين والدوليين، في حدود نشاط المركز، ووفقاً لما تحدده اللوائح.
    إعداد تقارير دورية عن أعمال المركز ومنجزاته ونشاطاته، ورفعها إلى المجلس؛ تمهيداً لاستكمال ما يلزم في شأنها. إإصدار شهادات الاعتماد والقرارات ذات الصلة بمجالات عمل المركز، وفقاً للوائح المركز. الموافقة على إجراء الدراسات والبحوث والنشر العلمي في مجال اختصاص المركز، وفقاً للقواعد التي يضعها المجلس. أي مهمة أخرى يكلفه بها المجلس. وللمدير التنفيذي -بقرار مكتوب منه- تفويض بعض صلاحياته إلى من يراه من مسؤولي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمركز ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمركز هي السنة المالية للدولة. واستثناء من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتألف موارد المركز المالية من المصادر الآتية: أ - ما يخصص له في الميزانية العامة للدولة. ب - المقابل المالي الذي يتقاضاه عن الخدمات والأعمال التي يقدمها في مجال اختصاصه. ج - أي مورد آخر يقرره المجلس. يفتح المركز حساباً له في مؤسسة النقد العربي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها في المملكة، ويصرف من هذه الحسابات وفق ميزانيته. تودع جميع إيرادات المركز في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يرفع المركز إلى مجلس الوزراء حسابه الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات المركز وعملياته، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز ومعاملاته وبياناته وميزانيته وحسابه الختامي. ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخضع منسوبو المركز لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويُعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39f72c5b-1156-43fc-8b56-aa8000aebae2/1
  verified: false
