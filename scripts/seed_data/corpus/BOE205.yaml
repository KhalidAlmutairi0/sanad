articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالعِبارات والكلِمات الآتية المعاني المُبينة قرين كُل مِنها ما لم يقتضِ السياق خِلاف ذلك : 1 - الصحة العامة : منظور مُتكامِل وشامِل لصِحة الفرد والأُسرة والمُجتمع، والتأثيرات البيئية والاجتِماعية والاقتِصادية والوراثية عليها. 2 - الرعاية الصحية : الخدمات الوقائية والعلاجية والتأهيلية التي تعنى بصِحة الفرد والمُجتمع بمُستوياتِها الأولية والثانوية والتخصُّصية. 3 - الرعاية الصحية الأولية : يُقصد بِها الآتي : أ - نشر التوعية الصحية على مستوى الفرد والأسرة والمجتمع حول المشكلات والأخطار التي تهدد الصحة وسبل الوقاية منها، والعمل على تغيير أنماط السلوك التي قد تؤدي إلى المرض. ب - العمل مع الجهات ذات العلاقة لمُراقبة إصحاح البيئة وسلامة مياه الشرب والأغذية، والاهتمام بالتغذية الصحية السليمة ونشر التوعية عنها.ج - الرعاية الصحية المُتكامِلة للأم والطفل.د - التحصين ضد الأمراض المُعدية.هـ - مُكافحة الأمراض المُستوطِنة الطفيلية والمُعدية، والحد من انتشارِها.و - التشخيص والعِلاج المُلائم للأمراض والإصابات الشائعة، وإجراء الوِلادات الطبيعية.ز- توفير الأدوية الأساسية. 4 - الرعاية
    الصحية الثانوية : الرعاية الصحية التي تُقدِّمُها مُستشفيات عامة وأطباء مُتخصِّصون. 5 - الرعاية الصحية الثالثة أو التخصُّصية أو المرجعية : الرعاية الصحية التي يتم تقديمُها مِن قِبل مُستشفيات مُتخصِّصة في أمراض مُعينة، وتتطلب تجهيزات مُتقدِّمة، وأطِباء ذوي تخصُّصات عالية ولديهم الخِبرة والمهارة الكافية. 6 - توفير الرعاية الصحية : ضمان وجود الرعاية الصحية دون أن يعني ذلك بالضرورة تقديمها مُباشرة من الدولة أو تمويلِها، إلا ما نصت عليه مواد هذا النظام. 7 - الوزير : وزير الصحة . 8 - الوزارة : وزارة الصحة . 9 - المجلِس : مجلِس الخدمات الصحية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى ضمان توفير الرعاية الصحية الشامِلة المُتكامِلة لجميع السكان بطريقة عادِلة ومُيسرة، وتنظيمها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تعمل الدولة على توفير الرعاية الصحية، كما تُعنى بالصحة العامة للمُجتمع بما يكفل العيش في بيئة صحية سليمة، ويشمل ذلك على وجه الخصوص ما يأتي : 1 - سلامة مياه الشُّرب وصلاحيتها. 2 - سلامة الصرف الصحي وتنقيته. 3 - سلامة الأغذية المُتداولة. 4 - سلامة الأدوية والعقاقير والمُستلزمات الطبية المُتداولة ومُراقبة استعمالِها. 5 - حماية المُجتمع من آثار أخطار المُخدرات والمُسكِرات. 6 - حماية البلاد من الأوبئة. 7 - حماية البيئة من أخطار التلوث بأنواعِه. 8 - وضع الاشتِراطات الصحية لاستِعمال الأماكِن العامة. 9 - نشر التوعية الصحية بين السكان.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'توفر الدولة خدمات الرعاية الصحية الموضحة أدناه للمواطنين بالطريقة التي تُنظمُها : رعاية الأمومة والطفولة. برامج التحصين. الرعاية الصحية للمعوقين والمسنين. الرعاية الصحية للطلاب والطالبات. الرعاية الصحية للحوادث والطوارئ والكوارث. مكافحة الأمراض المعدية والوبائية. علاج الأمراض المستعصية، مثل إزالة الأورام وزراعة الأعضاء، والغسل الكلوي. الصحة النفسية. غير ذلك من عناصر خدمات الرعاية الصحية الأولية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'الوزارة هي الجهة المسؤولة عن توفير الرعاية الصحية، وعليها -على وجه الخصوص- ما يأتي : 1 - ضمان تقديم خدمات الرعاية الصحية الأولية. 2 - توفير خدمات الرعاية الصحية في المُستشفيات والمراكِز العلاجية الثانوية والتخصُّصية . 3 - إعداد الإحصاءات الصحية والحيوية، وإجراء الدراسات والأبحاث العلمية وتحليلها والاستفادة مِنها. 4 - وضع الاستراتيجية الصحية والخطط اللازمة لتوفير الرعاية الصحية وتطويرها وتوزيعها بما يضمن أن تكون في مُتناول جميع أفراد المجتمع. 5 - وضع البرامِج لإعداد القوى العامِلة في المجال الصحي وتطويرها بالتعاون مع الجهات ذات العلاقة. 6 - وضع التعليمات والاشتراطات الخاصة بمنع دخول وانتِشار الأمراض المُعدية والأمراض الوبائية والمحجرية، والإبلاغ عنها، والعمل على مُكافحتِها أو القضاء عليها، مع تطبيق الإجراءات الوقائية والعلاجية. 7 - تنظيم تداول الأدوية والعقاقير ومُراقبتِها بما يضمن توافُرها وصلاحيتِها وحُسن استعمالِها ومُلاءمة أسعارِها.8 - وضع الضوابِط والاشتِراطات اللازِمة للترخيص للمؤسسات الصحية الخاصة والعاملين بِها، ومُراقبة نشاطِها وجودة أدائها.9 - وضع قواعِد ومعايير
    الجودة النوعية للرعاية الصحية وضمان تطبيقِها.10 - التأكد من الممارسة الصحيحة للمِهن الصحية، ومدى التِزام العاملين بقواعِد المِهنة وأخلاقياتِها.11 - العمل على وضع القواعِد المُنظِمة لإجراء الأبحاث والتجارب الطبية والدوائية.12 - وضع الخطط والبرامِج لنشر التوعية الصحية الشامِلة على مُستوى المُجتمع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعمل الدولة من خِلال الوزارة على توفير شبكة مُتكامِلة من خدمات الرعاية الصحية تُغطي جميع مناطِق المملكة، وتشمل مُستويات الرعاية الصحية الأولية والثانوية والتخصُّصية، وتقوم الوزارة بالتعاون مع مجالِس المناطِق بتحديد الاحتياج ومواقِع ومُستويات تقديم هذه الرعاية وَفقًا للوضع الجُغرافي والسكاني وأنماط الأمراض السائدة في المنطقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تُعطى كل مُديرية عامة للشؤون الصحية الصلاحيات الإدارية والمالية التي تُمكِنُها مِن تأدية المهام المنوطة بِها بطريقة فعَّالة، وتُراعي الوزارة ضِمن ميزانيتِها الاحتياجات الخاصة بكل منطقة بحسب المرافِق الصحية فيها وأعداد سُكانِها، ويُخصص لكل مُستشفى الاعتِمادات المالية التي يحتاجُها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تقوم المُديرية العامة للشؤون الصحية بتنفيذ الخطط والبرامِج التي تضعُها الوزارة في المنطقة، وتُناط بِها على وجه الخصوص المسؤوليات الآتية : 1 - ضمان توفُّر برامِج الرعاية الصحية لتغطية احتياجات المنطقة. 2 - القيام بمسئولية إدارة وتشغيل المرافِق الصحية التابِعة للوزارة. 3 - الترخيص للمرافِق الصحية الخاصة والعاملين بِها طِبقًا للمُتطلبات والاشتِراطات التي تضعُها الوزارة، ومُراقبة الجودة النوعية في هذه المرافِق. 4 - إعداد الإحصاءات الصحية والحيوية وإجراء الدراسات والأبحاث على مُستوى المنطقة. 5 - وضع برامِج التعليم الطبي وتنفيذها المُتواصِل، وتدريب العاملين في المرافِق الصحية في المنطقة، بالتنسيق مع الوزارة والقطاعات الصحية الأُخرى. 6 - التنسيق والتعاون مع المؤسسات الصحية الحُكومية والخاصة ومع المُديريات الصحية الأُخرى. 7 - تنفيذ الخطط والبرامِج لنشر التوعية الصحية الشامِلة على مُستوى المنطقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1- تقوم المراكز الصحية التابعة للوزارة والجهات الحكومية الأخرى والقطاع الخاص بتقديم الخدمات الوقائية والإسعافية والعلاجية والتأهيلية وتوجيه الحالات عند الحاجة إلى المستشفيات ومراكز التخصص العلاجي.2 - تحدد اللائحة التنفيذية تفاصيل اختصاصات هذه المراكز، والقواعد المُنظمة لعملها، وعلاقتها بالمستشفيات، وإجراءات الإحالة، وإصدار التقارير الطبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'مع عدم الإخلال بما جاء في المادة (الرابعة) يتم تمويل خدمات الرعاية الصحية بالطُرق الآتية : 1 - الميزانية العامة للدولة. 2 - إيرادات الضمان الصحي التعاوني . 3 - الوقف والهِبات والتبرعات والوصايا وغيرها. وتحدَّد بقرار من مجلس الوزراء بناء على اقتِراح من الوزير الأُسُّس والمعايير التي يتم بموجبِها اختيار طُرق تمويل الخدمات التي تُقدِّمُها المرافِق الصحية المُختلِفة وتنظيم حق الانتِفاع بِها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز بقرار من مجلِس الوزراء بناءً على اقتِراح الوزير تحويل ملكية بعض مُستشفيات الوزارة إلى القِطاع الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تعمل الوزارة على ما يأتي : 1 - توفير التعليم والتدريب لأفراد الفريق الصحي العاملين بِها، وذلك بالتنسيق مع الجهات ذات العلاقة. 2 - التأكد من وجود المُستوى المُعترف بِه من التعليم والتدريب لدى المتقدمين للترخيص أو إعادة الترخيص. وتحدد الهيئة السعودية للتخصصات الصحية المعايير المطلوبة للتعليم والتدريب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تقدم الرعاية الصحية لغير السعوديين وفقًا لنِظام الضمان الصحي التعاوني ولائحته التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تقدم الرعاية الصحية للحُجاج خِلال فترة الحج وفقًا للائحة يضعُها الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: الوزارة هي الجِهة المسئولة عن تطبيق هذا النِظام فيما لا يدخُل في اختصاصات جهة أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'أ‌- ينشأ مجلس يسمى مجلس الخدمات الصحية برئاسة الوزير وعضوية كل من : ممثل من الوزارة يرشحه الوزير. ممثلين من الخدمات الصحية في كل من رئاسة الحرس الوطني، ووزارة الدفاع والطيران، ووزارة الداخلية، ومستشفى الملك فيصل التخصصي ومركز الأبحاث، ترشحهم جهاتهم. اثنين من عمداء الكليات الصحية يرشحهما وزير التعليم العالي اثنين من القطاع الصحي الخاص يرشحهما مجلس الغرف التجارية الصناعية السعودية. ممثل من الهيئة السعودية للتخصصات الصحية، ترشحه الهيئة. ممثل من جمعية الهلال الأحمر السعودي، ترشحه الجمعية. ممثل من مجلس الضمان الصحي، يرشحه المجلس. ب‌- يتم تعيين أعضاء المجلس بقرار من مجلس الوزراء لمدة ثلاث سنوات قابلة للتجديد مرتين فقط، ولا تقل مرتبة أعضاء المجلس الممثلين للجهات الحكومية عن الثانية عشر. ج‌- للمجلس أن يدعو مندوبين أو خبراء أو مختصين لحضور اجتماعاته، ولهم حق النقاش دون أن يكون لهم حق التصويت. د- لا يعد اجتماع المجلس نظامياً إلا بحضور ثلثي الأعضاء على الأقل، وتصدر قرارات المجلس بأغلبية الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه الرئيس، وتعد قراراته ملزمة للقطاعات الصحية بعد
    اعتمادها من رئيس مجلس الوزراء. هـ- يضع المجلس لائحة داخلية لسير أعماله. و- يحدد بقرار مجلس الوزراء بناء على اقتراح الوزير مقدار مكافأة الرئيس وأعضاء المجلس ومصدر هذه المكافأة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'يختص المجلِس بالآتي: أ - إعداد استراتيجية الرعاية الصحية في المملكة تمهيدًا لاعتِمادِها مِن مجلِس الوزراء .ب - وضع التنظيم المُلائم لتشغيل المُستشفيات التي تُديرُها الوزارة والجهات الحُكومية الأُخرى، بحيث تُدار وفقًا لأُسس الإدارة الاقتِصادية ومعايير الأداء والجودة النوعية.ج - وضع وإقرار سياسة التنسيق والتكامل بين جميع الجهات المُختصة بتقديم خدمات الرعاية الصحية، وعلى وجه الخصوص في المجالات الآتية : 1- خدمات الرعاية الصحية الأولية والثانوية والتخصصية.2 - خدمات الإسعاف والإخلاء الطبي.3 - تحويل المرضى بين الجهات الصحية المُختلِفة.4 - تأمين الأدوية والمُستلزمات والأجهزة الطبية والاستعمال الأمثل لها.5 - تعليم القوى العامِلة في المجال الصحي وتدريبها وتوظيفها.6 - القيام بالبحوث والدراسات الصحية.7 - تقديم الرعاية الصحية للحُجاج.8 - نشر التوعية الصحية بين السكان.9 - تطوير صحة البيئة. 10 - تبادل خبرات المتخصصين بين الجهات الصحية المختلفة. د - تعيين أمين عام للمجلس بناء على ترشيح الوزير، ووفق ما يقضي به نظام الخدمة المدنية .هـ - وضع القواعد اللازمة لمكافأة من يستعان بهم من الخبراء
    بالتنسيق مع وزارة المالية والاقتصاد الوطني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام خلال عام من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1169b2b7-4e7d-4775-86b0-a9a700f2841e/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد تسعين يومًا من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
