regulation:
  code: BOE305
  name_ar: تنظيم خدمات المعتمرين وزوار المسجد النبوي الشريف القادمين من خارج المملكة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تُقدَّم خدمات المُعتمرين وزوار المسجد النبوي الشريف القادمين من خارج المملكة- ويُشار إليهم فيما بعد بالمُعتمرين- من قِبَل مؤسسات أو شركات سعودية، بما فيهم الطوائف التي تقوم بخدمة الحُجاج أو أحد أعضاء هذه الطوائف، بعد الحصول على سجِل تجاري وِفق ما تقضي به الأنظِمة والتعليمات دون استثناء، وبعد الحصول على الترخيص اللازِم من وزارة الحج .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/812ac6e0-430d-4c9d-b6cb-a9a700f2080c/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تتولى وزارة الحج مسؤولية الإشراف على المؤسسات والشركات المُرخص لها، ومُراقبة حُسن أدائها، والتأكُد من دقة تنفيذ التزاماتِها والعمل على رفع كفاءة العاملين بِها، وتصدُر التراخيص اللازِمة لها وِفقًا لما يأتي : 1 - أن يكون رأس مالِها مملوكًا بالكامل لسعوديين، وألا يقل عن خمسمائة ألف ريال. 2 - أن تُقدم ضمانًا بنكيًّا بمبلغ مائتي ألف ريال لصالِح وزارة الحج من أحد البنوك المحلية المُعتمدة، ساري المفعول طيلة مُدة الترخيص، وغير قابِل للإلغاء إلا بموافقة الوزارة في حالة إنهاء صاحب الترخيص العمل في هذه الخدمة. وإعادة الترخيص وِفق طلب يُقدم منه بذلك بعد التثبُّت من وفائه بالتِزاماته كافة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/812ac6e0-430d-4c9d-b6cb-a9a700f2080c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تلتزم المؤسسة أو الشركة المُرخص لها بما يأتي : 1 - أن تقوم بخِدمة المُعتمرين بأمانة وإخلاص، وأن تؤدي خدماتِها وِفقًا لأحكام هذا التنظيم. 2 - أن يكون مُديرها العام ورؤساء فروعِها والمُشرفون على مجال الخدمات بِها على الأقل سعوديين حسني السيرة والسلوك. 3 - أن يكون لها مكتب في كل من مكة المُكرمة والمدينة المنورة وجدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/812ac6e0-430d-4c9d-b6cb-a9a700f2080c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تقوم مُمثليات المملكة في الخارج بالتأشير للمُعتمرين وِفقًا للآتي : 1 - أن يكون قدوم المُعتمرين عن طريق الجهات المُرخص لها رسميًّا لمُزاولة تنظيم رحلات السفر في الدولة التي يقدمون منها. 2 - توفر الاشتِراطات الصحية الصادِرة من وزارة الصحة. 3 - التأكُد من حصول المُعتمر على تذكرة الذهاب والعودة، وعلى شيك مصرفي صادِر من أحد البنوك المُعتمدة من مؤسسة النقد العربيّ السعوديّ لِكُل مُعتمر بكامل استحقاقات المؤسسة أو الشركة التي تقوم بخدمته في المملكة، بما فيها أُجرة سكنه وتنقُلاته، وغير ذلك من الخدمات التي يختارُها المُعتمر حسب المُستوى الذي يتفق عليه ووِفقًا للقائمة المنصوص عليها في البند (3) من المادة الخامسة. 4 - ترتبط المؤسسات والشركات المُرخص لها بخدمة المُعتمرين في المملكة مع الجهات المُرخص لها في الخارج بعقد مُصدق من وزارة الحج ، وتُحدِّد اللائحة التنفيذية التفصيلات اللازِمة لهذا العقد، ويتم التصديق عليه من وزارة الخارجية وِفقًا للقواعد المُتبعة لديها. 5 - يُحدَّد في التأشيرة اسم المؤسسة أو الشركة المُرخص لها بخدمة المُعتمر في المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/812ac6e0-430d-4c9d-b6cb-a9a700f2080c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1 - تلتزم المؤسسات والشركات المُرخص لها في المملكة بخدمة المُعتمرين القادمين عن طريقها بما يلي: أ - استقبال المُعتمرين وتأمين سكنِهم في الفنادق والشقق المفروشة المُصنفة والمرخص لها من وزارة التِجارة ، وتأمين تنقُلاتِهم، وغير ذلك من الخدمات التي يختارُها المُعتمر حسب المستوى المُتفق عليه، وكذلك الإشراف على توفير سُبل الراحة لهم أثناء وجودِهم وتنقلاتِهم في جميع مناطِق المملكة ومُتابعة سفرِهم، وتأكيد حجوزاتِهم خِلال المُدة المُحدَّدة لهم في التأشيرة، وإشعار وزارة الحج بما يُفيد ذلك. ب - الاحتِفاظ بمعلومات تشمل أسماء وجنسيات وتذاكر وأرقام جوازات القادمين، ووسائط النقل التي قدموا عليها، وتاريخ القدوم، واسم الناقِل ووكيله، وكذلك المسؤول عن كل حملة من حملات القادمين عن طريق البر إليها، وغير ذلك من المعلومات التي تُحدِّدُها اللائحة التنفيذية. المادة السادسة توضِح اللائحة التنفيذية الترتيبات المُناسِبة التي تُيسر على القادمين عن طريق (الترانزيت) القيام بأداء العُمرة. المادة السابعة 1- مع عدم الإخلال بأية عقوبة أشد يُعاقب عليها النِظام، تُعاقب المؤسسة أو الشركة المُرخص لها التي
    تُخِل بأي حُكم من أحكام هذا التنظيم ولائحته التنفيذية بعقوبة أو أكثر من العقوبات الآتية: أ - غرامة مالية لا تزيد عن خمسين ألف ريال.ب - إيقاف العمل بالترخيص لِمُدة لا تزيد عن ستة أشهُر من مُدة تأشيرات العُمرة .جـ - إلغاء الترخيص الممنوح للمؤسسة أو الشركة. 2 - مع عدم الإخلال بحق المُطالبة بالحق المدني ، تُحرم الجهة المُرخص لها في الخارج من التعامُل مع المؤسسات والشركات المُرخص لها في المملكة إذا أخلت بالتِزاماتِها التعاقُدية.3 - يُعاقب من يقوم بخدمة المُعتمرين دون الحصول على الترخيص اللازِم بغرامة مالية لا تزيد عن مائة ألف ريال. المادة الثامنة تُشكل لجنة دائمة في وزارة الحج من وزارة الداخلية ووزارة التِجارة ووزارة الحج يكون أحد أعضائها مؤهلًا شرعيًّا، تختص باستقبال الشكاوى المُقدمة من المُعتمرين أو من الجِهات الرسمية، والتحقيق فيها والتوصية بتوقيع العقوبة المنصوص عليها في المادة السابعة من هذا التنظيم، واستحصال قيمة الخدمات التي لم يؤدها المُرخص له وردِها إلى المُعتمرين وِفقًا لما تُحدِّدُه اللائحة التنفيذية. المادة التاسعة يتم تطبيق العقوبات المنصوص عليها في المادة السابعة من هذا التنظيم
    بقرار من وزير الحج. المادة العاشرة يحق لمن صدر بشأنه قرار العقوبة التظلُم مِنه أمام ديوان المظالِم خِلال ستين يومًا من تاريخ إبلاغه بذلك. المادة الحادية عشرة تقوم وزارة الحج بتحصيل الغرامات المنصوص عليها في هذا التنظيم وتوريدها لخزينة الدولة. المادة الثانية عشرة تُستثنى الشخصيات السياسية من الشروط الوارِدة في المادة الرابعة. ويجوز لرؤساء البعثات الدُبلوماسية السعودية في الخارج استثناء الشخصيات الإسلامية والشخصيات التي لها وضع اجتماعي خاص من كل الشروط الوارِدة في المادة الرابعة أو بعضِها. وفيما عدا ذلك يكون الاستثناء وفقًا لما تُحدِّدُه اللائحة التنفيذية. المادة الثالثة عشرة يُصدِر وزير الحج بالاتِفاق مع وزير الداخلية اللائحة التنفيذية لهذا التنظيم بما في ذلك القواعد المُنظِمة لتنقل المعتمرين داخل المملكة وذلك خِلال مُدة لا تتجاوز ستة أشهُر. المادة الرابعة عشرة يُنشر هذا التنظيم في الجريدة الرسمية، ويُعمل به بعد تسعين يومًا من تاريخ صدور لائحته التنفيذية، ويلغي كل ما يتعارض معه من أحكام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/812ac6e0-430d-4c9d-b6cb-a9a700f2080c/1
  verified: false
