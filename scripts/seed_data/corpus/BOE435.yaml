- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها: الوزارة: وزارة السياحة. الوزير: وزير السياحة. التنظيم: تنظيم الوزارة.'
