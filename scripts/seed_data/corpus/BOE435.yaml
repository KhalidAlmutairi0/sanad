- article_ref: المادة الثانية
  article_text_ar: 'الوزارة هي الجهة المختصة والمرجع الرئيس في المملكة فيما يتعلق بتنظيم قطاع السياحة وتنميته، والنهوض بمقوماته، وتذليل عوائق نموه؛ باعتباره رافداً مهماً من روافد الاقتصاد الوطني، وذلك بما يتوافق مع مكانة المملكة وقيمها، ولها - دون إخلال باختصاصات ومسؤوليات الجهات الأخرى - القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: اقتراح مشروعات الأنظمة المتعلقة بالسياحة، واقتراح تعديل المعمول به منها، ورفعها لاستكمال الإجراءات النظامية اللازمة. إصدار تراخيص مزاولة الأنشطة والمهن السياحية وفقاً للنصوص النظامية ذات الصلة، وتنظيم تلك الأنشطة والمهن ومراقبة أدائها. تطوير الوجهات السياحية بما يحقق أهداف استراتيجية التنمية السياحية، وذلك بالتنسيق مع الجهات ذات العلاقة. ولتلك الجهات تطوير الوجهات التي تقع تحت إشرافها بعد التنسيق مع الوزارة، وذلك دون إخلال بالصلاحيات المقررة نظاماً لتلك الجهات. تقويم مشروعات البنية الأساسية للأماكن السياحية في مناطق المملكة المختلفة، ووضع البرامج اللازمة لاستكمالها بالتعاون مع الجهات ذات العلاقة. إجراء مسح شامل للمناطق والمقومات السياحية في المملكة
    وتحديثه دوريًا بالتعاون مع الجهات المعنية، وتقويم الإمكانات السياحية لكل منطقة، ومناقشتها مع مجلس المنطقة. تذليل العوائق التي يتعرض لها النشاط السياحي، واقتراح تقديم التسهيلات والحوافز للمستثمرين فيه. الاشتراك مع الجهات الحكومية ذات العلاقة في المحافظة على الأماكن والوجهات السياحية العامة. تخطيط وتنمية القوى العاملة في قطاع السياحة وتطويرها؛ بالتعاون مع الجهات ذات العلاقة. وضع الخطط الإعلامية المتعلقة بالسياحة، وتنفيذها؛ لتشجيع الاستثمار السياحي وتنشيط الحركة السياحية، وذلك بالتنسيق مع الجهات ذات العلاقة. إنشاء قاعدة بيانات للرصد السياحي وتطوير القطاع السياحي في المملكة، وإدارتها، وذلك بالتنسيق مع الجهات ذات العلاقة. نشر المعرفة والتوعية بأهمية السياحة الداخلية عن طريق طباعة الكتب وإصدار النشرات والمجلات والدوريات المتخصصة، وغيرها من أوعية المعلومات والتشجيع على ذلك، وذلك بالتنسيق مع الجهات ذات العلاقة. تشجيع القطاع الخاص لإنشاء شركات لتخطيط وتطوير واستثمار الأماكن السياحية. إقامة المعارض، وعقد اللقاءات والندوات والمؤتمرات ذات العلاقة باختصاصاتها؛ وفقاً للأحكام النظامية ذات الصلة. التعاون
    وتبادل الخبرات مع نظيراتها من الأجهزة في الدول الأخرى، ومع المنظمات السياحية الإقليمية والدولية، وبيوت الخبرة المتخصصة داخل المملكة وخارجها؛ وذلك في حدود اختصاصاتها، ووفقاً للإجراءات النظامية المتبعة. تنسيق الجهود بين الجهات الحكومية وغيرها فيما يخدم تحقيق أغراض الوزارة. تمثيل المملكة أو المشاركة في تمثيلها لدى المنظمات والهيئات والمحافل والمؤتمرات الإقليمية والدولية ذات الصلة باختصاصات الوزارة. القيام بالأبحاث والدراسات والتسجيل والتوثيق وتشجيع البحث العلمي في مجال السياحة. إبرام الاتفاقيات ذات الصلة بنشاط الوزارة مع الجهات المعنية في الدول الأخرى ومع المنظمات الدولية، وفقًا للإجراءات النظامية المتبعة. أي مهمة تسند إلى الوزارة نظاماً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/898062b9-805f-4bab-974c-ac4500ed4262/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يتولى الوزير إدارة شؤون الوزارة وتصريف أمورها، ويتخذ جميع القرارات والإجراءات اللازمة لتحقيق الأهداف التي أنشئت من أجلها وفقاً لأحكام التنظيم، وله - بوجهٍ خاص - ما يأتي: اقتراح السياسات والاستراتيجيات المتعلقة بقطاع السياحة في المملكة، ورفعها لاستكمال الإجراءات النظامية اللازمة في شأنها، والإشراف على تنفيذها بعد اعتمادها. إقرار اللوائح الداخلية التي تسير عليها الوزارة، بما لا يتعارض مع النصوص النظامية ذات الصلة. اقتراح مشروع الهيكل التنظيمي للوزارة، والرفع به لاستكمال الإجراءات النظامية اللازمة في شأنه. اقتراح سياسات استثمار الأماكن السياحية العامة من قبل القطاع الخاص بعد التنسيق مع الجهات ذات العلاقة كل فيما يخصه، والرفع عنها لمجلس الوزراء لاعتمادها. الموافقة على إقامة المعارض، وعقد اللقاءات والندوات والمؤتمرات والمعارض، ذات العلاقة باختصاصاتها ووفقاً للأحكام النظامية ذات الصلة. الموافقة على إنشاء فروع أو مكاتب للوزارة، وفقًا للإجراءات النظامية المتبعة. الاستعانة بمن يراه من الخبراء والمستشارين للعمل بشكل متفرغ أو غير متفرغ لإنجاز بعض الأعمال والخدمات، وتقديم المشورة،
    وإجراء البحوث والدراسات، وفقاً لما تتضمنه الأحكام ذات الصلة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف وفقاً للأحكام المنظمة لذلك. تمثيل الوزارة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. تعيين منسوبي الوزارة وفقاً للوائح المنظمة لذلك، والإشراف عليهم. الإشراف على تنظيم الوزارة للمؤتمرات والندوات والمعارض الداخلية والخارجية والفعاليات المتعلقة بقطاع السياحة، وإقامتها، والمشاركة فيها، وإسناد تنفيذها لمن يراه؛ وفقاً للإجراءات النظامية المتبعة. الموافقة على مشروع ميزانية الوزارة وحسابها الختامي والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. وللوزير تفويض بعض صلاحياته إلى من يراه من منسوبي الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/898062b9-805f-4bab-974c-ac4500ed4262/1
  verified: false
