  name_ar: نظام الأعلاف
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمامها، ما لم يقتض السياق خلاف ذلك: النظام: نظام الأعلاف. اللائحة: اللائحة التنفيذية للنظام. الهيئة: الهيئة العامة للغذاء والدواء. المجلس: مجلس إدارة الهيئة. الرئيس: الرئيس التنفيذي للهيئة. الأعلاف: ما يعدُّ لتغذية الحيوانات، سواء أكان مادة واحدة، أم مواد مخلوطة، أم مصنعة، أم شبه مصنعة، أم خامًا، أم مادة تدخل في تصنيع العلف أو تحضيره أو معالجته، سواء كانت من مصادر نباتية أو حيوانية مصرح بها، أو من الأحياء المائية. مكونات الأعلاف: عنصر أو مكون لأي مجموعة، أو خليط يتألف منه العلف، بما في ذلك الإضافات العلفية؛ سواء أكانت هذه المكونات ذات أصل نباتي، أم حيواني مصرح به، أم أحياء مائية، أم تتألف من مواد عضوية أو غير عضوية، وسواء أكانت تحتوي على قيمة غذائية ضمن العلف أم لا. الحيوانات: جميع الحيوانات - سواء المنتجة للغذاء أم غير المنتجة له - ويلحق بها الأحياء المائية. التداول: المراحل التي تمر بها الأعلاف أو مكوناتها، من الإنتاج الأولي حتى وصولها إلى المستفيد، بما في ذلك استيرادها، وتصديرها، وتصنيعها،
    وتحضيرها، ومعالجتها، وتعبئتها، وتغليفها، وتجهيزها، وتخزينها، ونقلها، وحيازتها، وتوزيعها، وعرضها، وبيعها. الإضافات العلفية: المكونات التي تضاف بصورة متعمدة إلى العلف لأغراض تقنية، أو لتحسين مذاقه، أو لزيادة قيمته الغذائية، أو لتحسين الكفاية الإنتاجية للحيوان، سواء احتوت هذه المكونات على قيمة غذائية أم لا. مخاليط الأعلاف (بريمكس): مخلوط من الفيتامينات أو الأملاح المعدنية أو الأحماض الأمينية أو الأنزيمات أو غيرها؛ بحسب ما تحدده اللائحة، يضاف إلى الماء أو يحمل على مادة من أصل نباتي أو حيواني مصرح بها، ويستخدم في تصنيع الأعلاف لتحسين كفايتها. المنتجات المعدلة وراثيًّا: الأحياء المعدلة وراثيًّا - سواءً نباتية أو حيوانية - التي تستخدم في تغذية الحيوان، والأعلاف التي تتكون من مواد أو كائنات معدلة وراثيًّا، أو تحتوي عليها، أو مكونات أنتجت من أحياء معدلة وراثيًّا. المخلوق الحي: الإنسان، والحيوان، والنبات. المنشأة: أي كيان نظامي تتم فيه إحدى مراحل التداول أو كلها. التـتبع: الإجراءات أو التدابير التي تمكن من اقتفاء أثر الأعلاف، أو مكوناتها، أو أي من مصادرها، أو أي مادة تدخل عليها في أي مرحلة من
    مراحل تداولها. بطاقة المنتج: بيان أو رمز أو علامة تجارية أو صورة أو وصف للعلف أو عبوته، سواء أكان مكتوباً، أم مطبوعاً، أم مرسوماً، أم معلماً، أم ملصقاً، أم محفوراً، أم مضغوطاً، أم مرفقاً لحاوية، أم غطاءً، أم غلافاً. السحب: الإجراء أو التدبير الذي تقوم به الهيئة لسحب الأعلاف من الأسواق. الاستدعاء: الإجراء أو التدبير الذي تقوم به المنشأة لاستعادة الأعلاف من الأسواق، ومنع تداولها. الممارسات الجيدة للإنتاج: جزء من عملية ضمان الجودة التي تضمن بأن المنتجات تنتج على الدوام بطريقة منتظمة ووفق المعايير المحكمة للجودة؛ من أجل تحقيق الهدف من إنتاجها، وفق المواصفات الفنية المعتمدة. نظام التحكم في النقاط الحرجة: نظام حماية وتحكم في سلامة المنتجات الغذائية والأعلاف، من خلال السيطرة والتحكم في النقاط الحرجة التي قد تؤدي إلى خلل في عملية الإنتاج، وسلامة المنتج وجودته. اللوائح الفنية: وثائق إلزامية تصف خصائص الأعلاف أو طرق إنتاجها وتصنيعها؛ بما فيها التعليمات المنظمة لذلك، وتشمل المصطلحات، والرموز، والبيانات الإيضاحية، والبطاقة الخاصة بالعلف، وطريقة إنتاجه، وتعبئته. المواصفات القياسية: وثيقة غير إلزامية
    تحتوي على متطلبات تصدقها الهيئة، أو تتبناها. تحليل الأخطار: نهج علمي يهدف إلى تقويم مدى خطورة الأعلاف، وطريقة التحكم في الأخطار؛ من خلال ثلاثة عناصر مترابطة هي: تقويم الأخطار، وإدارة الأخطار، والإبلاغ عن الأخطار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف هذا النظام إلى تحقيق ما يأتي: 1 - ضمان مأمونية الأعلاف وسلامتها.2 - حماية صحة الحيوان.3 - حماية الإنسان من انتقال المواد الضارة نتيجة تناول الحيوانات لأعلاف غير صالحة، وحماية الصحة العامة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تطبق أحكام هذا النظام على جميع مراحل تداول واستخدام الأعلاف ومكوناتها المنتجة محليًّا، أو المستوردة، أو المعدة للتصدير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب قبل ممارسة أي نشاط في مجال الأعلاف - ماعدا نشاط الزراعة - الحصول على ترخيص من الهيئة؛ وفقاً للشروط والمتطلبات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب الحصول على موافقة الهيئة عند فسح الأعلاف المستوردة أو السماح بتصدير الأعلاف، وذلك وفقاً للشروط والإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجب على كل مختبر - يتعامل مع الأعلاف - الحصول على ترخيص من الهيئة وفق الشروط والمتطلبات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب الحصول على ترخيص من الهيئة قبل الإعلان عن الأعلاف، وذلك وفق الشروط والمتطلبات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتخذ الهيئة جميع الإجراءات اللازمة لضمان سلامة الأعلاف، ومنها: 1 - إخضاع الأعلاف ومشتقاتها التي تحتوي على منتجات معدلة وراثيًا عند دخولها إلى المملكة للإجراءات والاشتراطات الواردة في اللوائح والتعليمات التي تصدر في هذا الشأن.2 - إخضاع الأعلاف المعاملة بالتشعيع للأحكام التي تحددها اللائحة. 3 - مراجعة ما يستجد من تقنيات حديثة تطبق على الأعلاف، وتتخذ في شأنها القرارات المناسبة بما يحقق أهداف هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تنشئ الهيئة وتدير نظام إنذار سريع للتبليغ عن أي خطر مباشر أو غير مباشر على صحة الإنسان أو الحيوان أو الصحة العامة؛ يكون مصدره الأعلاف، وذلك وفقاً للإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'على مصنِّعي الأعلاف الالتزام بما يأتي: 1 - عدم استخدام مخلفات المزارع الحيوانية أو المسالخ.2 - عدم استخدام المخلفات النباتية إلا وفقاً للشروط والضوابط التي تحددها اللائحة. 3 - تطبيق مبدأ تحليل الأخطار ونظام التحكم في النقاط الحرجة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجب على المزارع السمكية - التي تنتج أعلاف التغذية السمكية - عدم تداول ما تنتجه من الأعلاف التي تحتوي على مخلفات المزرعة خارج نطاقها إلا على صورة مسحوق السمك، وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يجب على المنشأة ما يأتي: 1 - تسجيل منتجاتها من الأعلاف لدى الهيئة، وفقاً لما تحدده اللائحة.2 - استيفاء جميع المتطلبات المنصوص عليها في النظام واللائحة، وتطبيق قواعد الممارسة الجيدة في الإنتاج.3 - أن تكون قادرة على التعرف على مصدر الأعلاف التي تحت إشرافها، وأن تكون قادرة على تحديد المنشآت التي تمدها به، وتزويد الهيئة بالمعلومات المطلوبة إذا تطلب الأمر ذلك.4 - عدم تجاوز الحدود القصوى المسموح بها من الإضافات العلفية التي تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تحظر إضافة أي دواء أو إضافة علفية لتنشيط عملية الهضم أو التمثيل الغذائي والنمو للأعلاف، إلّا في المنشآت المرخص لها حسب ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: إذا علم صاحب المنشأة أو المسؤول عنها - أو شكّ في - أن الأعلاف غير مطابقة للاشتراطات والمتطلبات التي تفرضها الهيئة؛ وجب عليه - فوراً - اتخاذ الإجراءات اللازمة لاستدعاء تلك الأعلاف وفقاً لما تحدده اللائحة، وإبلاغ الهيئة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'لا يجوز تداول الأعلاف أو مكوناتها في الحالات الآتية: 1 - إذا كانت تحتوي على مواد أو إضافات أو مكونات محظورة. 2 - إذا كانت ضارة بالبيئة أو الصحة، أو غير صالحة للاستهلاك.3 - إذا كانت مخالفة للاشتراطات والمتطلبات التي تفرضها الهيئة. 4 - إذا كانت مغشوشة، أو تنطوي على خداع أو تضليل.5 - إذا قررت الهيئة سحبها، أو طلبت استدعاءها من السوق، أو حظرت تداولها.6 - إذا لم تكن مسجلة لدى الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يجب عند تداول الأعلاف التقيد بما يأتي: 1 - وضع بطاقة المنتج، وفقاً لما تحدده اللائحة.2 - أن يضع منتجو مواد العلف الخام والإضافات العلفية ومستوردوها جميع اشتراطات النقل والتخزين على ملصق يثبت على تلك المواد.3 - عدم نقل وتخزين مواد العلف الخام والإضافات العلفية في وسائل أو أماكن سبق أن استخدمت لنقل أو تخزين أي مادة قد تؤثر على جودتها، أو سلامتها.4 - عدم تداول الإضافات العلفية وإضافتها بصورة متعمدة إلى الأعلاف إلا بعد تسجيلها من قبل الهيئة، وتحدد اللائحة إجراءات التسجيل والترخيص.5 - عدم تداول مخاليط الأعلاف (بريمكس) إلا بعد استيفائها للاشتراطات التي تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: للهيئة أن تقوِّم الأعلاف في جميع مراحل تداولها إذا تطلب الأمر ذلك، ولها - في ضوء نتيجة التقويم - اتخاذ الإجراءات المناسبة وفق ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: للهيئة اعتماد المنهج الوقائي المناسب لضمان سلامة الأعلاف خلال مراحل سلسلة الإنتاج، ولها في سبيل ذلك فرض القواعد والإجراءات الكفيلة بتحقيقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: إذا توافر للهيئة ما يدعوها للاعتقاد بوجود أخطار في الأعلاف قد تسبب أضراراً على صحة الإنسان أو الحيوان أو الصحة العامة؛ فيجوز لها أن تتخذ التدابير الاحترازية الضرورية للتحكم في الأخطار، مع مراعاة حجم الضرر المحتمل، وتفادي فرض قيود غير ضرورية، ومراجعة تلك التدابير خلال مدة معقولة في ضوء نتائج تقويم الأخطار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: للهيئة الحق في سحب الأعلاف من أي منشأة، إذا تبين لها أنها تشكل خطراً على صحة الإنسان أو الحيوان أو الصحة العامة، ولا يمكن تفاديه باتخاذ التدابير والإجراءات المتاحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: للهيئة إذا كان هناك خطر محتمل يهدد صحة الإنسان أو الحيوان أو الصحة العامة في أي منشأة، أو أي من مرافقها، أو أي من محتوياتها، أو منتجاتها؛ أن تصدر أمراً بإغلاقها مؤقتاً وفق الإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يحق للهيئة عند الاشتباه في تسبب الأعلاف في نفوق أي نوع من الحيوانات، أو إصابته، أو تضرره؛ أن تصدر قراراً بوقف تداول تلك الأعلاف من مصدرها أو في الأسواق، والتحفظ عليها إلى حين ظهور نتائج التحليل المخبرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: للهيئة إذا ظهر لها أن هناك أعلافاً تسبب ضرراً على صحة الإنسان أو الحيوان أو الصحة العامة؛ أن تقوم بسحبها، أو تأمر باستدعائها ومنع تداولها؛ وفقاً للإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يجب على الهيئة أن تأمر بِإتلاف الأعلاف متى كان تداولها يسبب ضرراً على صحة الإنسان، أو الحيوان، أو الصحة العامة؛ وفقاً لما تؤكده التحاليل المخبرية، ويكون الإتلاف على نفقة المنشأة؛ وفقاً لما تحدده اللائحة من إجراءات وتحت إشراف الهيئة، ويعد محضر بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: الهيئة هي الجهة المخولة نظاماً بتفتيش المنشآت فيما يخص تطبيق أحكام هذا النظام واللائحة، ولها الاستعانة بالجهات الأمنية عند الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يتولى مفتشون - يصدر بتسميتهم قرار من الرئيس - أعمال الرقابة، والتفتيش، وضبط المخالفات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يجب على المسؤولين والعاملين في المنشأة تمكين مفتشي الهيئة من أداء عملـهم وعدم إعاقتهم، وتقديم جميع التسهيلات والمعلومات والوثائق والعيّنات المطلوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: للمفتش إذا ظهر له أن في الأعلاف أو أحد مكوناتها مادة غير مأمونة، أو تنطوي على مخالفة لأحكام هذا النظام أو اللائحة؛ أن يتخذ الإجراءات اللازمة لحجز هذا المنتج، وجميع التدابير والإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'يلتزم المفتش بالآتي: 1 - عدم الكشف عن أي معلومة حصل عليها بسبب عمله، ما لم يطلب منه ذلك أحد المختصين في الهيئة، أو المحكمة المختصة.2 - التقيد بالأحكام والإجراءات المنصوص عليها في النظام واللائحة.3 - تحرير محضر ضبط إذا كانت هناك مخالفة لأحكام النظام واللائحة، تسلم نسخة منه للمخالف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: للهيئة حق سحب عينات من الأعلاف دون مقابل؛ للتحقق من مدى مطابقتها لأحكام النظام واللائحة، وتحليلها - إذا لزم الأمر - في مختبراتها، أو في المختبرات المسجلة لديها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: إذا أظهرت نتائج تحليل العينة وجود مخالفة لأحكام النظام أو اللائحة، تصدر الهيئة تقريراً بذلك، وتتخذ الإجراءات اللازمة - في ضوء نتائج التقرير - وفقاً لما تحدده اللائحة، وللمنشأة الاعتراض على التقرير، وفق الإجراءات النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: '1- مع عدم الإخلال بأي عقوبة أشد ينص عليها أي نظام آخر، يعاقب مرتكب أي مخالفة لأحكام هذا النظام أو لائحته بواحدة أو أكثر من العقوبات الآتية: أ - غرامة لا تزيد على مليون ريـال.ب - المنع من ممارسة أي عمل متعلق بالأعلاف، وذلك لمدة لا تتجاوز مائة وثمانين يوماً.ج - إلغاء الترخيص الصادر من الهيئة.2 - تجوز مضاعفة العقوبة في حالة تكرار المخالفة خلال ثلاث سنوات من تاريخ صدور قرار العقوبة في المخالفة السابقة لها.3 - إذا كانت المخالفة تتمثل في التسبب عمداً في تداول منتج علفي ضار بالصحة أو مغشوش أو ممنوع؛ فتكون العقوبة السجن مدة لا تزيد على عشر سنوات، أو غرامة لا تقل عن مليون ريـال، ولا تزيد على عشرة ملايين ريـال، أو بهما معاً، بالإضافة إلى تطبيق أي من العقوبات المنصوص عليها في الفقرتين (ب) و (ج) من الفقرة (1) من هذه المادة.4 - تتولى الهيئة إيقاع العقوبات المنصوص عليها في الفقرة (1) من هذه المادة، وفقاً لتصنيفٍ للمخالفات وتحديدٍ للعقوبات يعتمده المجلس، ولا تكون العقوبات نافذة إلا بعد اعتمادها من الرئيس. وتحدد اللائحة الضوابط والإجراءات المتعلقة بذلك، ولا يخل ذلك بقيام الهيئة باتخاذ
    ما تراه من تدابير احترازية إذا رأت ضرورة لها.5 - إذا كانت المخالفة من المخالفات المشار إليها في الفقرة (3) من هذه المادة؛ فتحال إلى هيئة التحقيق والادعاء العام؛ للتحقيق فيها، وإحالتها إلى المحكمة المختصة إذا رأت ذلك.6 - يجوز نشر الحكم أو القرار المكتسب للقطعية على نفقة المخالف في ثلاث صحف محلية، يراعى في تحديدها مقر المنشأة، ومكان وقوع المخالفة.7 - يجوز لمن أصدرت الهيئة في حقه قراراً بالعقوبة، أو أي تدبير آخر؛ التظلم منه أمام اللجنة المنصوص عليها في الفقرة (8) من هذه المادة، خلال ستين يوماً من تاريخ تبليغه بالقرار.8 - يكوِّن المجلس لجنة (أو أكثر) لا يقل عدد أعضائها عن ثلاثة، يكون من بينهم مستشار نظامي، تختص بالنظر في تظلمات ذوي الشأن من قرارات العقوبات التي تصدرها الهيئة، على أن تبت في التظلم خلال مدة لا تتجاوز ستين يوماً، وفي حالة انتهاء هذه المدة دون البت في التظلم أو عدم قبول المتظلم لقرار اللجنة؛ يجوز له التظلم أمام ديوان المظالم وفقاً لنظامه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يجوز - بقرار من المجلس وبعد التنسيق مع وزارة المالية - وضع قواعد لمنح مفتشي الهيئة مكافآت مالية نظير ما يقومون به من أعمال تؤدي إلى تفادي وقوع ضررٍ جسيمٍ على صحة الإنسان، أو الحيوان، أو الصحة العامة، وذلك وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يجوز - وفق آلية يضعها المجلس وفي حدود الاعتمادات والموارد المالية المتاحة للهيئة - منح مكافأة تشجيعية بنسبة لا تزيد على (25%) من مقدار الغرامة المقررة، لمن يساعد - من غير مفتشي الهيئة أو الجهات التي تستعين بها - في الكشف عن مخالفة لأحكام النظام واللائحة، وذلك وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: للهيئة الاستعانة بمن تراه من الجهات الحكومية أو غيرها؛ للقيام بمهمة مسندة إليها بموجب النظام واللائحة، عدا إيقاع العقوبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 'تصدر الهيئة اللوائح الفنية والمواصفات القياسية لتداول الأعلاف ومكوناتها واستخدامها، ولمنشآتها والعاملين فيها؛ مراعيةً في ذلك ما يأتي: 1 - الأخذ بمبدأ تحليل الأخطار، ونظام التحكم في النقاط الحرجة. 2 - الاتفاقيات الدولية ذات العلاقة، التي تكون المملكة طرفاً فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: تنسق الهيئة مع الجهات ذات العلاقة في شأن مشروعات اللوائح الفنية والمواصفات القياسية للأعلاف، وذلك قبل اعتمادها وإصدارها من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: تعد الهيئة اللائحة التنفيذية لهذا النظام، خلال تسعين يوماً من تاريخ نشره في الجريدة الرسمية، وتصدر بقرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يعمل بهذا النظام بعد مائة وثمانين يوماً من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b8a7e5ff-d9a4-466b-b4b8-a9a700f256e1/1
  verified: false
