  name_ar: ضوابط تصدير مياه الشرب المعبأة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولاً
  article_text_ar: 'يشترط للسماح لمصنع مياه الشرب المعبأة بتصدير مياه الشرب المعبأة أن يحصل على رخصة تصدير من وزارة البيئة والمياه والزراعة بعد توافر المتطلبات الآتية: التحقق من ألا تستنزف الموارد المائية، والتحقق من تغطية حاجة السوق المحلية من مياه الشرب المعبأة؛ من خلال الآتي: أ- ألا يتجاوز التصدير السقف الأعلى لكميات مياه الشرب المعبأة التي يحددها وزير البيئة والمياه والزراعة. ب- ألا تزيد سعة عبوات مياه الشرب المعبأة -المراد تصديرها- على لتر واحد. ج- أن يكون المصنع قائماً من الناحية التشغيلية وينتج مياه شرب معبأة متوافرة بكميات كافية في السوق المحلية، وألا يتجاوز التصدير النسب المحددة في البند (ثانياً) من هذه الضوابط. أن يكون المصنع حاصلاً على ترخيص فني ساري المفعول، وحاصلاً على شهادة تصدير مياه الشرب المعبأة؛ من الهيئة العامة للغذاء والدواء، وفق الأحكام النظامية المنظمة لذلك. أن يكون الترخيص الصناعي للمصنع -الصادر من وزارة الصناعة والثروة المعدنية- مشتملاً على الرموز الجمركية، والطاقة الإنتاجية، ومصدر المياه (متجددة أو غير متجددة)، وسعة العبوة (وحدة القياس "لتر"). سداد رسوم التصدير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb055cd5-3055-4b20-8ec7-abef00ae3433/1
  verified: false
- article_ref: ثانياً
  article_text_ar: 'تكون نسب التصدير المسموح بها لمصنع مياه الشرب المعبأة على النحو الآتي: نسبة لا تتجاوز (%7) من الطاقة الإنتاجية الفعلية للمصنع القائم على مصادر مياه جوفية غير متجددة. نسبة لا تتجاوز (%60) من الطاقة الإنتاجية الفعلية للمصنع القائم على مصادر مياه متجددة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb055cd5-3055-4b20-8ec7-abef00ae3433/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: تراجع وزارة البيئة والمياه والزراعة هذه الضوابط دورياً -بالتنسيق مع من تراه من الجهات ذات الصلة- وترفع عما يستلزم الرفع عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb055cd5-3055-4b20-8ec7-abef00ae3433/1
  verified: false
- article_ref: رابعاً
  article_text_ar: تنشر هذه الضوابط في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb055cd5-3055-4b20-8ec7-abef00ae3433/1
