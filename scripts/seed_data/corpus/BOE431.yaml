regulation:
  code: BOE431
  name_ar: تنظيم صندوق النفقة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لأغراض هذا التنظيم؛ يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا التنظيم- المعاني الموضحة أمامها، ما لم يقتضِ السياق خلاف ذلك : التنظيم: تنظيم صندوق النفقة. اللائحة: اللائحة التنفيذية للتنظيم. الصندوق: صندوق النفقة. المجلس: مجلس إدارة الصندوق. النفقة: المال الواجب على الشخص إنفاقه على من يستحقه شرعاً. المستفيد: من يستحق النفقة وفقاً لأحكام التنظيم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يُنشأ -وفقاً لأحكام التنظيم- صندوق يسمى (صندوق النفقة)، يرتبط بوزير العدل، وتكون له شخصية اعتبارية، وميزانية مستقلة، ويكون مقره في وزارة العدل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف الصندوق إلى ضمان صرف النفقة للمستفيدين دون تأخير، وذلك وفقاً للأحكام الواردة في التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يتولى الصندوق المهمات الآتية: 1- صرف النفقة لمن صدر له حكم قضائي باستحقاقها، ولم ينفذ لغير عذر الإعسار، وذلك وفقاً للإجراءات التي تحددها اللائحة. 2- صرف النفقة لمن صدر له أمر قضائي بها ولا تزال مطالبته بها منظورة أمام المحكمة، وذلك وفقاً للإجراءات التي تحددها اللائحة. 3- صرف نفقة مؤقتة للمستفيد قبل صدور حكم بالنفقة؛ وذلك وفقاً لإجراءات يحددها المجلس. على أن يقوم الصندوق باستردادها من المبالغ المستحقة للمستفيد بموجب حكم النفقة، وإذا حكم برفض النفقة وجب عليه رد ما صرف له من الصندوق خلال شهرين من تاريخ اكتساب الحكم القطعية. وللصندوق اتخاذ الإجراءات النظامية اللازمة لاسترداد ما صرفه إذا انقضت تلك المدة دون رده. 4- مطالبة كل من تولى الصندوق عنه صرف النفقة الواجبة عليه باسترداد ما صرف عنه, وذلك بأن يحل الصندوق محل المستفيد في المطالبة بتنفيذ الحكم القضائي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- تصرف النفقة بناء على طلب يقدم من المستفيد، وفقاً لنموذج يعده الصندوق لهذا الغرض، على أن يرفق بالنموذج المستندات والأوراق التي تحددها اللائحة. 2- يتولى الصندوق فحص الطلبات المقدمة إليه؛ للتحقق من استيفاء جميع الشروط وفقاً لما تحدده اللائحة من أحكام في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يوقف الصندوق صرف النفقة للمستفيد إذا انتفى سبب استحقاقه لها. وعلى كل مستفيد موافاة الصندوق بأي تغيير يؤثر في استحقاقه للنفقة، وذلك خلال عشرة أيام من تاريخ حدوث التغيير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: إذا حدث تغيير يؤثر في استحقاق المستفيد النفقة ولم يبلغ به الصندوق خلال المدة المذكورة في المادة (السادسة) من التنظيم، أو أخفى أيًّا من البيانات المطلوبة منه، أو قدم بيانات غير صحيحة؛ فعلى الصندوق إيقاف صرف النفقة وإلزامه بإعادة ما صرف له منها بغير وجه حق، ولا يخل ذلك بحق الصندوق في اتخاذ الإجراءات النظامية اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: '1- يكون للصندوق مجلس إدارة برئاسة وزير العدل وعضوية كل من: أ- ممثل من وزارة العدل. ب- ممثل من وزارة المالية. ج- ممثل من وزارة العمل والتنمية الاجتماعية. د- ثلاثة أعضاء من القطاع الخاص ممن لهم اهتمام بمجال عمل الصندوق يرشحهم رئيس المجلس، ويصدر بتعيينهم قرار من مجلس الوزراء. 2- تكون مدة العضوية في المجلس (ثلاث) سنوات قابلة للتجديد لمرة واحدة. 3- لا تقل مراتب ممثلي الجهات الحكومية في المجلس عن المرتبة (الرابعة عشرة) أو ما يعادلها. 4- يحدد رئيس المجلس من ينوب عنه من الأعضاء ممثلي الجهات الحكومية في رئاسة الاجتماعات عند غيابه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى المجلس العمل على تحقيق أهداف الصندوق، وله -على سبيل المثال لا الحصر- الاختصاصات الآتية: 1- اعتماد خطط الصندوق وبرامج عمله. 2- تحديد مسؤوليات المدير العام للصندوق، وصلاحياته. 3- تحديد مبالغ النفقة المؤقتة المشار إليها في الفقرة (3) من المادة (الرابعة) من التنظيم، ومدة صرف هذه النفقة. 4- قبول التبرعات والمنح والهبات والوصايا والأوقاف. 5- الموافقة على مشروع ميزانية الصندوق السنوية وحسابه الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيداً لرفعها وفق الإجراءات النظامية المتبعة. وللمجلس -في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم, يعهد إليها القيام بمهمات محددة, وله كذلك الاستعانة بمن يراه من الخبراء والمستشارين وغيرهم لأداء بعض المهمات الداخلة في نطاق اختصاص الصندوق، وتحديد أتعابهم ومدة عملهم. وللمجلس كذلك تفويض بعض اختصاصاته إلى المدير العام للصندوق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- يجتمع المجلس بدعوة من رئيسه كل ثلاثة أشهر على الأقل، أو كلما دعت الحاجة إلى ذلك, ويكون الاجتماع صحيحاً إذا حضره أغلبية الأعضاء، على أن يكون من بينهم الرئيس أو من ينوب عنه. 2- تصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين، وفي حال تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. 3- تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع وأعضاؤه الحاضرون. 4- يحضر المدير العام للصندوق اجتماعات المجلس دون أن يكون له حق التصويت على القرارات, ويتولى عرض الموضوعات المدرجة في جدول الأعمالK والإشراف على إعداد القرارات اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يكون للصندوق مدير عام بالمرتبة (الخامسة عشرة) يرشحه رئيس المجلس ويكون هو المسؤول التنفيذي عن إدارة الصندوق وفقاً للتنظيم واللائحة وما يقرره المجلس، ويتولى بوجه خاص المهمات الآتية: 1- إعداد مشروعات خطط الصندوق وبرامج عمله، ورفعها إلى المجلس لاعتمادها. 2- الإشراف على سير العمل في الصندوق من خلال الخطط والبرامج المعتمدة. 3- متابعة تنفيذ القرارات التي يصدرها المجلس. 4- إعداد مشروع ميزانية الصندوق السنوية ورفعه إلى المجلس. 5- إعداد مشروع التقرير السنوي عن نشاط الصندوق ورفعه إلى المجلس. 6- إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللائحةK بحسب الصلاحيات المخولة له. 7- الصرف من ميزانية الصندوق, واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المقرةK وفي حدود الصلاحيات التي فوضه بها المجلس. 8- تمثيل الصندوق في علاقاته مع الغير وأمام الجهات القضائية، وله تفويض غيره في هذا الشأن بعد موافقة المجلس. 9- أي اختصاص آخر يسنده إليه المجلس. وللمدير العام تفويض بعض اختصاصاته إلى من يراه من منسوبي الصندوق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتكون الموارد المالية للصندوق مما يأتي: 1- الأموال التي تسهم بها الدولة كإعانة سنوية. 2- التبرعات والمنح والهبات والوصايا والأوقاف التي يقرر المجلس قبولها. 3- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تودع جميع أموال الصندوق، في حسابات خاصة لدى مؤسسة النقد العربي السعودي, ويصرف منها وفقاً للقواعد والإجراءات التي يحددها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: السنة المالية للصندوق هي السنة المالية للدولة، واستثناء من ذلك تبدأ السنة المالية الأولى للصندوق من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الصندوق ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي. ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يصدر المجلس اللائحة خلال تسعين يوماً من تاريخ صدور التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعمل بهذا التنظيم بعد تسعين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/856b8992-cf28-422a-96a8-a9ec0127f6e7/1
  verified: false
