regulation:
  code: BOE169
  name_ar: نظام مطاحن إنتاج الدقيق
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في النظام- المعاني المبينة أمام كل منها: 1- النظام: نظام مطاحن إنتاج الدقيق. 2- المؤسسة: المؤسسة العامة للحبوب. 3- المجلس: مجلس إدارة المؤسسة. 4- الرئيس: رئيس المجلس. 5- المحافظ: محافظ المؤسسة. 6- المطاحن: مطاحن إنتاج الدقيق . 7- شركات المطاحن: شركات مطاحن إنتاج الدقيق. 8- اللجنة: لجنة النظر في المخالفات الناشئة من تطبيق أحكام النظام، والبت في التظلمات المقدمة في شأنها . 9- اللوائح: اللوائح التنفيذية للنظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تُنشأ المطاحن أو تُشغَّل من خلال شركات مساهمة تؤسس وفقاً للإجراءات النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يشترط لإنشاء المطاحن أو تشغيلها أو التوسع فيها؛ الحصول على ترخيص من المؤسسة يصدر بقرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يصدر المجلس الترخيص بإنشاء المطاحن أو تشغيلها بعد موافقة مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تفرض المؤسسة مقابلاً ماليًّا على إصدار أي ترخيص أو تجديده أو تعديله، ويحدد المجلس مقدار المقابل المالي، وتبين اللوائح تصنيف التراخيص، وأنواعها ومددها، وتحدد كذلك شروط إصدار التراخيص وتجديدها وتعديلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: على المؤسسة في حالة عدم تجديد الترخيص اتخاذ ما يلزم لضمان تأمين حاجة السوق من الدقيق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز لشركات المطاحن التنازل عن الترخيص قبل الحصول على الموافقة من المجلس، وتبين اللوائح ضوابط وشروط التنازل عن الترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجوز لشركات المطاحن إنشاء صوامع لتخزين احتياجاتها التشغيلية، بعد الحصول على الترخيص اللازم وفقاً للشروط التي تبينها اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: لا يجوز لشركات المطاحن استيراد أي كمية من القمح إلا بعد الحصول على موافقة المجلس وفقاً للشروط التي تبينها اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'دون إخلال باختصاصات الهيئة العامة للغذاء والدواء: أ ـ تراقب المؤسسة جودة منتجات شركات المطاحن قبل طرحها في الأسواق بحسب المعايير المتعلقة بجودة الدقيق والمواد المضافة إليه، وتحدد اللوائح معايير الجودة. ب ـ تتولى المؤسسة التفتيش على شركات المطاحن ومرافقها وجميع المنشآت التابعة لها؛ فيما يخص تطبيق أحكام النظام واللوائح. وتتفق المؤسسة والهيئة العامة للغذاء والدواء على وضع الآلية المناسبة لممارسة هذا الاختصاص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تُحدّد أسعار الدقيق ومنتجات شركات المطاحن المشتقة من الطحن وفقاً للسياسة التسعيرية التي يقرها مجلس الوزراء بناء على اقتراح من المؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاصات وزارة التجارة والاستثمار تراقب المؤسسة عمليات توزيع الدقيق للموزعين والمخابز وتجار التجزئة، وتراقب كذلك أسعار الدقيق ومنتجات شركات المطاحن المشتقة من الطحن للتأكد من التزامها بالسياسة التسعيرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: للرئيس في الحالات غير العادية اتخاذ التدابير اللازمة لتأمين حاجة السوق من الدقيق بإجراءات ميسرة، بما في ذلك وضع أسعار موحدة للدقيق وفقاً للسياسة التسعيرية إلى حين انتهاء الحالة غير العادية. ويتقرر ظهور الحالة غير العادية أو الانتهاء منها بناء على تقرير يرفعه المحافظ ويوافق عليه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'يُحظر على شركات المطاحن تصدير القمح أو الدقيق أو المنتجات المشتقة منهما المدعومة إلى خارج المملكة إلا بعد الحصول على موافقة المجلس، على أن يراعى ما يلي: 1-تحصيل المؤسسة ما يعادل قيمة الدعم المتحقق للقمح أو الدقيق أو المنتجات المشتقة منهما المطلوب تصديرها. 2- ألا يترتب على التصدير إخلال بحاجة السوق المحلية من القمح أو الدقيق أو المنتجات المشتقة منهما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'مع عدم الإخلال بأحكام نظام المنافسة: 1- تلتزم شركات المطاحن بالآتي: أ‌- الحصول على موافقة المجلس قبل أيّ عملية اندماج مع أي شركة أخرى من شركات المطاحن المرخص لها أو امتلاك معظم هذه الشركات أو موجوداتها سواء داخل المملكة أو خارجها، وإبلاغ المؤسسة خلال خمسة أيام عمل بأي اتفاق مبدئي يتم التوصل إليه في هذا الشأن. ب‌-الحصول على موافقة المجلس قبل شراء ما نسبته خمسة في المائة (5%) أو أكثر من أسهم أي شركة أخرى من شركات المطاحن المرخص لها، أو شراء أوراقها المالية، أو أي صيغة أخرى من صيغ حقوق الملكية، أو شراء نسبة أقل من تلك إذا كانت تؤدي إلى إنشاء وضع مهيمن في أي جزء من نشاط الطحن. 2- يُحظر على شركات المطاحن ما يأتي: أ- اتفاقها على إجراء ممارسات من شأنها الهيمنة على سوق محددة، أو الحد من المنافسة أو منعها أو التقليل من فعاليتها في قطاع نشاط الطحن، إلا بعد الحصول على موافقة المجلس. ب- اتفاقها على زيادة إنتاج الدقيق أو تقليله أو المنتجات المشتقة من نشاط الطحن إلا بعد الحصول على موافقة المجلس. ج- قيامها بأيّ نشاط أو إجراء يمثل استغلالاً لوضعها -بعد حصولها على موافقة المجلس- بالهيمنة
    على سوق معينة أو جزء منها. 3 ـ يُعد باطلاً أي اتفاق أو إجراء يخالف الأحكام الواردة في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تلتزم شركات المطاحن بتقنيات الطحن، ومعايير الإنتاج، وضوابط بيع الدقيق وتوزيعه، التي تعتمدها المؤسسة وفقاً لما تبينه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تتلقى المؤسسة الشكاوى المقدّمة ضد شركات المطاحن أو منتجاتها والمتعلقة بمخالفة أحكام النظام أو اللوائح، وتحيلها بعد التحقيق إلى اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تلتزم شركات المطاحن بتقديم ما تطلبه المؤسسة من معلومات، وعلى المؤسسة المحافظة على سرية المعلومات، وعدم الإفصاح عنها للغير إلا وفقاً لما تقضي به الأنظمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يتولى مفتشون ـ يصدر بتسميتهم قرار من المحافظ ـ أعمال الرقابة والتفتيش وضبط المخالفات وتكون لهم صفة رجال الضبط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: للمفتش دخول جميع المنشآت والمرافق التابعة لشركات المطاحن لأجل التفتيش، وله الاطلاع على المستندات والسجلات والاحتفاظ بنسخة منها إذا لزم الأمر، وله كذلك سحب عينات من المواد والأصناف الموجودة لديها، وعلى المفتش إبراز بطاقته الوظيفية التي تبين اختصاصه بالتفتيش عند مباشرة أي من تلك الإجراءات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: لمفتشي المؤسسة جميع الصلاحيات اللازمة للتحقيق في المخالفات والشكاوى المقدّمة ضد شركات المطاحن بموجب أحكام النظام واللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: على المفتش تحرير المحاضر اللازمة لإثبات ما يضبط من مخالفات والشكاوى المقدّمة ضد شركات المطاحن، وله سلطة التحقيق، والادعاء أمام اللجنة، وفقاً لما تبينه اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد ينص عليها أي نظام آخر، يعاقب كل من يرتكب مخالفة لأحكام النظام أو اللوائح بواحدة من العقوبات الآتية: أ ـ الإنذار. ب ـ تعليق النشاط أو جزء منه لمدة تحددها اللوائح. ج ـ غرامة لا تزيد على عشرين مليون ريـال. د ـ إلغاء الترخيص. على أن يراعى في جميع الحالات أن يتم استرداد المبالغ المحصلة نتيجة المخالفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يجوز تضمين القرار الصادر بالعقوبة -الذي أصبح نهائياً- النص على نشره على نفقة المخالف في ثلاث صحف محلية، تصدر إحداها على الأقل في المنطقة التي يقع فيها مقر إقامته، فإن لم تكن هناك صحيفة في المنطقة ففي صحيفة تصدر في أقرب منطقة إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: في حالة تكرار المخالفة أو إذا لم تصحح خلال المهلة التي تحددها اللجنة، يُعاقب المخالف بضِعف الغرامة أو مدة تعليق النشاط المحكوم بها في المرة السابقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تُطبق العقوبات المنصوص عليها في النظام بقرار يصدر من اللجنة وفقاً لأحكام النظام أو اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: 1- تُكوّن في المؤسسة -بقرار من المجلس- لجنة للنظر في مخالفات أحكام النظام أو اللوائح من ثلاثة أعضاء على الأقل من ذوي الاختصاص من منسوبي المؤسسة أو من غيرهم، على أن يكون من بينهم مستشار قانوني على الأقل. 2- تصدر اللجنة قراراتها وفقاً للقواعد والإجراءات التي تحددها اللوائح. 3- يجوز التظلم من قرارات اللجنة أمام المحكمة الإدارية المختصة خلال ستين يوماً من تاريخ الإبلاغ بالقرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: يصدر المجلس اللوائح خلال مدة لا تتجاوز مائة وثمانين يوماً من تاريخ نشر النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يُعمل بهذا النظام بعد مضي مائة وثمانين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7dd058e6-3f77-4eaa-a069-a9f801447c70/1
  verified: false
