# article against source_url (AGENTS.md #5). Not fabricated.
regulation:
  code: BOE303
  name_ar: اللائحة التنظيمية لتأشيرات العمل المؤقت والعمل المؤقت لخدمات الحج والعمرة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لأغراض تطبيق هذه اللائحة، يقصد بالألفاظ والعبارات الآتية -أينما وردت فيها- المعاني المبينة أمام كل منها: اللائحة: اللائحة التنظيمية لتأشيرات العمل المؤقت والعمل المؤقت لخدمات الحج والعمرة. الوزارة: وزارة الموارد البشرية والتنمية الاجتماعية. الوزير: وزير الموارد البشرية والتنمية الاجتماعية. طالب التأشيرة: المنشأة التي تدار من شخص طبيعي أو اعتباري وتشغل عاملاً أو أكثر لقاء أجر أيًّا كان نوعه. تأشيرة العمل المؤقت: الترخيص بدخول المملكة؛ لأداء عمل محدد في مدة محددة. تأشيرة العمل المؤقت لخدمات الحج والعمرة: الترخيص بدخول المملكة؛ لأداء عمل محدد خاص بخدمات الحج والعمرة خلال موسم الحج، وخدمات موسم العمرة. الجهة المؤيدة: الجهة المشرفة على النشاط أو المشروع، المطلوب له تأشيرات عمل مؤقت لخدمات الحج والعمرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تحدد الوزارة، بالتنسيق مع الجهات ذات العلاقة، الأغراض والمهن التي تشملها تأشيرة العمل المؤقت. تحدد الوزارة بالتنسيق مع الجهات ذات العلاقة الاشتراطات الفنية والمهنية الواجب توافرها في العامل الذي يطلب له تأشيرة العمل المؤقت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: مدة صلاحية تأشيرة العمل المؤقت (سنة) من تاريخ صدورها. تلغي الوزارة -آليًّا- تأشيرة العمل المؤقت غير المستخدمة بعد انتهاء مدة صلاحيتها، أو قبل ذلك بناءً على رغبة طالبها وله في هذه الحالة استعادة الرسم الذي دفعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: مدة الإقامة لحامل تأشيرة العمل المؤقت (تسعون) يوماً من تاريخ دخوله بها للمملكة، وللوزارة تمديدها مدة مماثلة لمرة واحدة. وعلى حامل التأشيرة مغادرة المملكة قبل انتهاء تلك المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تتولى الوزارة دراسة طلبات تأشيرة العمل المؤقت، وتحديدَ أعدادها، وإصدار الأذونات اللازمة، وذلك وفق الشروط والضوابط المحددة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: ترسل الوزارة آليًّا الأذونات الخاصة بتأشيرة العمل المؤقت إلى وزارة الخارجية؛ لإصدار التأشيرة، بعد قيام ممثليات المملكة في الخارج باتخاذ الإجراءات اللازمة؛ للتحقق من أهلية العامل للحصول على التأشيرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يقدم طالب تأشيرة العمل المؤقت إلى ممثليات المملكة في الخارج، قبل منحه التأشيرة، ما يأتي: نسخة من عقد العمل الموقع من طرفيه. تأمين طبي للعامل المطلوب له التأشيرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تحدد الوزارة، بالتنسيق مع الجهات ذات العلاقة، الأغراض والمهن التي تشملها تأشيرة العمل المؤقت لخدمات الحج والعمرة. تحدد الوزارة، بالتنسيق مع الجهات ذات العلاقة، الاشتراطات الفنية ولمهنية الواجب توافرها في العامل الذي يطلب له تأشيرة العمل المؤقت لخدمات الحج والعمرة. تحدد الوزارة الدول التي يُستقدم منها أشخاص للعمل المؤقت لخدمات الحج والعمرة، وتراعي التنوع في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يقتصر طلب تأشيرة العمل المؤقت لخدمات الحج والعمرة على المنشآت المعتمدة لتقديم خدمات الحج والعمرة. يجب على طالب تأشيرة العمل المؤقت لخدمات الحج والعمرة الالتزام بما يأتي: أ- إدخال جميع بيانات الطلب، وتحديد عنوان المنشأة الدائم، وعنوان المنشأة للعمل المؤقت، عبر النظام الآلي. ب- أن يقدم إلى ممثليات المملكة في الخارج، قبل منحه التأشيرة، ما يأتي: (1) نسخة من عقود العمل الموقع من طرفيه. (2) تأمين طبي للعامل المطلوب له التأشيرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يقدم طالب تأشيرة العمل المؤقت لخدمات الحج والعمرة ضماناً ماليًّا إلى الوزارة مقداره (2,000) ألفا ريال عن كل عامل، لتغطية تكاليف إعادته إلى بلده، ويسترجع الضمان إذا زُودت الوزارة بما يثبت مغادرته المملكة خلال المدة المحددة، أو إلغاء التأشيرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يكون إصدار تأشيرة العمل المؤقت لخدمات الحج والعمرة، بناءً على موافقة من الجهة المؤيدة. على الجهة المؤيدة إبلاغ الوزارة بتأييدها لطلب تأشيرة العمل المؤقت لخدمات الحج والعمرة، قبل منتصف شهر رجب لخدمات العمرة، وقبل منتصف شهر شعبان لخدمات الحج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تحدد الوزارة بداية تقديم طلبات تأشيرات العمل المؤقت لخدمات الحج والعمرة. تزود الوزارة -آليًّا- وزارات:(الداخلية، والخارجية، والمالية) بنسخ من تلك الطلبات؛ لدراستها -كل بحسب اختصاصه- وإعادتها إلى الوزارة مصحوبة بمرئياتها، وذلك خلال مدة لا تتجاوز (عشرين) يوماً من تاريخ تلقيها تلك الطلبات. تستكمل الوزارة دراسة تلك الطلبات في ضوء مرئيات الجهات المذكورة في الفقرة (2) من هذه المادة، وتبت فيها، وذلك خلال مدة لا تتجاوز (خمسة عشر) يوماً من تاريخ تلقيها تلك المرئيات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يقدم طالب تأشيرة العمل المؤقت لخدمات الحج والعمرة إلى ممثليات المملكة قوائم بأسماء وبيانات العمالة التي يتم اختبارها واختيارها من قبله أو من يمثله وفقاً للاشتراطات واللوائح والتعليمات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترسل الوزارة -آليًّا- الأذونات الخاصة بتأشيرة العمل المؤقت لخدمات الحج والعمرة إلى وزارة الخارجية قبل منتصف شهر شعبان لموسم العمرة، وقبل نهاية شهر شوال لموسم الحج؛ لاستكمال الإجراءات النظامية لإصدار التأشيرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تعتمد ممثليات المملكة في الخارج تأشيرات العمل المؤقت لخدمات الحج والعمرة بحسب القوائم المقدمة من طالبي التأشيرات، المشار إليها في المادة (الثالثة عشرة) من اللائحة، وذلك بعد التحقق من توافر الاشتراطات الفنية والمهنية في المطلوب لهم تأشيرة العمل المؤقت لخدمات الحج والعمرة وفق الفقرة (2) من المادة (الثامنة) من اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 1- يُسمح لحامل تأشيرة العمل المؤقت لخدمات الحج والعمرة بدخول المملكة من (الخامس عشر) إلى نهاية شهر شعبان لموسم العمرة، ومن (الخامس) من شهر شوال إلى نهاية شهر ذي القعدة لموسم الحج، ولا تتجاوز مدة الإقامة نهاية شهر محرم. ويتحمل طالب التأشيرة تكاليف إعادة من يقدم منهم إلى المملكة في غير المدة المحددة. 2- لا يصرح لحامل تأشيرة العمل المؤقت لخدمات الحج والعمرة؛ بالحج. وتدون ممثليات المملكة في الخارج على التأشيرة عبارة "غير صالحة للحج" باللغتين العربية والإنجليزية. وتضع وزارة الداخلية والوزارة ومجلس إدارة الهيئة الملكية لمدينة مكة المكرمة والمشاعر المقدسة ضوابط الاستثناء من حكم هذه الفقرة. 3- لا يجوز تحويل تأشيرة العمل المؤقت لخدمات الحج والعمرة إلى تأشيرة عمل مؤقت لغرض آخر أو لعمل دائم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تُلغي الوزارة آليًّا، في اليوم (الأول) من شهر ذي الحجة من كل عام، تأشيرات العمل المؤقت لخدمات الحج والعمرة غير المستخدمة، أو إذا رغب طالب التأشيرة في إلغائها قبل هذا التاريخ وله في هذه الحالة استعادة الرسم الذي دفعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'تُشكل لجان رقابية خلال موسم الحج، وموسم العمرة، من: (الوزارة، ووزارة الداخلية، وهيئة الرقابة ومكافحة الفساد)؛ تتولى ضبط ما يقع من مخالفات لأحكام اللائحة، وتعد محاضر بذلك، وتحيلها إلى الوزارة لاستكمال إجراءات التحقيق اللازم. تحيل الوزارة نتائج التحقيق إلى اللجنة المشار إليها في المادة (الحادية والعشرين) من اللائحة؛ للنظر فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: توقع على مخالفي الأحكام الخاصة بتأشيرة العمل المؤقت العقوبات المنصوص عليها في نظام العمل، وغيره من الأنظمة ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'دون إخلال بأي عقوبة أشد يُنص عليها نظاماً، يعاقب من يخالف الأحكام المتعلقة بتأشيرة العمل المؤقت لخدمات الحج والعمرة، وفق الآتي: يعاقب كل من يَثبت بيعه تأشيرة عمل مؤقت لخدمات الحج والعمرة، أو تنازله عنها للغير، أو استغلاله إياها في غير ما خصصت له؛ بغرامة لا تزيد على (50,000) خمسين ألف ريـال، أو بالمنع من دخول المنافسات الخاصة بالعمل المؤقت الخاص بخدمات الحج والعمرة لمدة لا تزيد على (خمس) سنوات، أو بهما معاً. وفي جميع الأحوال يُلزم المخالف بدفع ما يساوي ما حصل عليه من مكاسب جراء المخالفة. وتتعدد العقوبة بتعدد المخالفات. يعاقب كل طالب تأشيرة عمل مؤقت لخدمات الحج والعمرة يثبت أن عنوانه أو البيانات التي سجلها، أو الوثائق التي قدمها من خلال موقع الوزارة، غير صحيحة، أو ثبت إغلاق مقر منشأته وقت الموسم؛ بغرامة لا تزيد على (15,000) خمسة عشر ألف ريال. وتتعدد العقوبة بتعدد المخالفات. يعاقب كل من يخالف أي حكم من أحكام اللائحة لم يرد له عقوبة في الفقرتين السابقتين؛ بغرامة لا تزيد على (5,000) خمسة آلاف ريـال. وتتعدد العقوبة بتعدد المخالفات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'تشكل بقرار من الوزير لجنة دائمة -أو أكثر- برئاسة ممثل من الوزارة، وعضوية ممثلين من: (وزارة الداخلية، ووزارة الخارجية، ووزارة المالية، وهيئة الرقابة ومكافحة الفساد)، يكون أحدهم من حملة أحد المؤهلات الشرعية أو النظامية؛ تتولى النظر في مخالفات الأحكام المتعلقة بتأشيرة العمل المؤقت لخدمات الحج والعمرة، وإيقاع العقوبة المناسبة من العقوبات المنصوص عليها في المادة (العشرين) من اللائحة، وتصدر قراراتها بالأغلبية، ويعتمدها الوزير، ويجوز التظلم من القرار الصادر بالعقوبة أمام المحكمة المختصة. وتحدد الوزارة إجراءات عمل اللجنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تحل اللائحة محل اللائحة التنظيمية لتأشيرات الأعمال المؤقتة والموسمية، الصادرة بقرار مجلس الوزراء رقم (497) وتاريخ 16 / ١١ / 1436هـ، وتلغي كل ما يتعارض معها من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يعمل باللائحة بعد مضي (180) يوماً من تاريخ اعتمادها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9bfa5aa2-77cb-4e3d-a3e7-b20a00c3dccb/1
  verified: false
