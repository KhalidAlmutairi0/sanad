  name_ar: نظام البريد 1406هـ
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يدار مرفق البريد بمقتضى أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يختص مرفق البريد وحده بنقل مواد بعائث بريد الرسائل الداخلية والخارجية بطريق مباشر أو غير مباشر في حدود الأنظمة، كما يختص بالاشتراك مع وزارة المالية والاقتصاد الوطني بإصدار الطوابع البريدية العادية والتذكارية وبالفئات التي تتطلبها تعريفة أجور الخدمات البريدية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تعد تعريفة أجور الخدمات البريدية من قبل وزارة البرق والبريد والهاتف بالاشتراك مع وزارة المالية والاقتصاد الوطني ، وتصدر بقرار من مجلس الوزراء . ولوزير البرق والبريد والهاتف بعد الاتفاق مع وزير المالية والاقتصاد الوطني تعديل هذه التعريفة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تؤدى خدمات مرفق البريد بمقابل مالي تحدده تعريفة أجور الخدمات البريدية ، ولا يجوز الإعفاء منه إلا في الحالات المنصوص عليها في الاتفاقيات البريدية أو قرارات مجلس الوزراء الصادرة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجوز لمرفق البريد القيام بخدمة نقل الطرود الداخلية والخارجية وخدمة البريد الممتاز، وكذلك أية خدمات أخرى لها صلة بخدمة مرفق البريد ، ويحدد المقابل المالي لهذه الخدمات بقرار من مجلس الوزراء بناء على تعريفة موافق عليها من وزير البرق والبريد والهاتف ووزير المالية والاقتصاد الوطني .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتم التخليص على الخدمات البريدية بإحدى الطرق الآتية: أ - طوابع بريد مطبوعة أو ملصقة على البعائث وصالحة في بلد المصدر.ب - بصمات آلات التخليص .ج - أختام خالص الأجرة أو بصمات آلات الطباعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: سرية مواد بعائث بريد الرسائل والطرود مصونة، ولا يجوز الاطلاع على محتوياتها إلا في الحالات التي تحددها الأنظمة النافذة أو قرارات مجلس الوزراء أو مقتضيات المصلحة العامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يمنع بصفة مطلقة استيراد آلات التخليص على المواد البريدية وفسحها من الجمارك وبيعها واستعمالها إلا بعد الحصول على التراخيص المنظمة لذلك من إدارة البريد ، وتوضح اللوائح التنفيذية الشروط والإجراءات اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تعتبر مواد بعائث بريد الرسائل والطرود قبل تسليمها للمرسل إليه ملكا للمرسل يحق له استردادها أو إدخال تعديل على عنوانها، وفقا للإجراءات التي تحددها اللوائح التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: مع عدم الإخلال بمسئولية موظفي ومنسوبي البريد التأديبية، يعتبر مرفق البريد مسئولا عن فقد أو تلف ما يسلم له من بعائث بريدية مسجلة أو رسمية، أو طرود عادية أو مؤمن عليها، ويستحق المرسل في حالة الفقد أو التلف تعويضا بموجب ما هو مقرر بالاتفاقيات البريدية أو قرارات مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تنتهي مسئولية إدارة مرفق البريد بتسليم بعائث البريد المسجلة أو الرسمية أو المؤمن عليها، والطرود البريدية العادية أو المؤمن عليها؛ إلى المرسل إليه أو المفوض من قبله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: على مرفق البريد الامتناع بصفة مطلقة عن نقل أية مادة بريدية يشتبه في احتوائها على ممنوعات، وعليه إبلاغ الجهات المختصة عند ملاحظة ذلك فورا، وتحدد المواد الممنوع تداولها والإجراءات التي تتبع في حالة الاشتباه بقرار من مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يجوز في داخل المملكة بيع الطوابع البريدية السعودية الجاري تداولها بأعلى من قيمتها الاسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: أ - تحتفظ إدارة مرفق البريد بالمستندات الخاصة بالخدمة البريدية وبالمواد البريدية التي تعذر تسليمها لأصحابها، للمدد المقررة في الاتفاقيات البريدية أو قرارات مجلس الوزراء الصادرة طبقا لهذا النظام.ب - يحق لمرسل أية مادة بريدية مسجلة أو رسمية أو طرد، الاستعلام عنها خلال سنة من تاريخ اليوم التالي لإيداعها في البريد، ويحدد مجلس الوزراء القواعد والرسوم اللازمة لذلك.ج - تقوم إدارة مرفق البريد بإتلاف المستندات الخاصة بالخدمة البريدية، وكذلك إتلاف أو بيع أو مصادرة المواد البريدية التي انتهت مدة حفظها المقررة وفقا للأحوال والإجراءات التي يحددها مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تقوم إدارة مرفق البريد بالتنسيق مع الجهات الحكومية ذات العلاقة بإلزام أصحاب المباني القائمة أو التي ستنشأ مستقبلا بتركيب صناديق للبريد في المدخل الرئيسي لكل مبنى، وبعدد الوحدات السكنية فيه، ويحدد وزير البرق والبريد والهاتف نطاق تطبيق هذا النص بالاتفاق مع وزير الشؤون البلدية والقروية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'يعاقب بذات العقوبات المقررة لجريمة تزوير الطوابع البريدية في نظام مكافحة التزوير: 1 - كل من قلد أو زور أو استعمل مع علمه بالتزوير بصمات آلات التخليص البريدية وقسائم الجواب العربية والدولية، أو البصمات أو العلامات المطبوعة للتخليص على الخدمات البريدية.2 - كل من استعمل آلات التخليص البريدية بطريقة يترتب عليها ضياع الرسوم البريدية مع علمه بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'مع مراعاة ما تقضي به الفقرة (ج) من المادة الرابعة عشرة، ومع عدم الإخلال بالمسئولية الخاصة والتأديبية، يعاقب بغرامة لا تزيد عن (100.000) مائة ألف ريال كل من ارتكب فعلا من الأفعال الآتية: أ - نقل بعائث بريد الرسائل بأجر دون موافقة البريد.ب - بيع الطوابع البريدية السعودية الجاري تداولها بأعلى من قيمتها الاسمية.ج - تضمين المادة البريدية أية ممنوعات.د - تعمد استعمال طابع بريد سبق التخليص به.هـ - العبث بأية مادة بريدية كالإخفاء أو الإتلاف أو الكشف.و - إفشاء أية معلومات عن محتويات أية مادة بريدية . ز - الإخلال بحكم المادة السابعة من هذا النظام.وإذا تم ارتكاب إحدى المخالفات السابقة من أحد منسوبي أو متعهدي نقل البريد، فيعتبر ذلك ظرفا خاصا يستدعي القسوة عند تقرير العقوبة اللازمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: عند كشف أو ضبط أية مخالفة تستوجب إحدى العقوبات المحددة في هذا النظام؛ تحال إلى هيئة الرقابة والتحقيق ، فإذا انتهت إلى قرار بتوجيه الاتهام تحال القضية إلى ديوان المظالم للحكم فيها بما هو مقرر نظاما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تعتبر الاتفاقيات البريدية التي تصادق عليها المملكة مكملة لأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يلغي هذا النظام ما يتعارض معه من أحكام، ويجوز بقرار من مجلس الوزراء تعديل أو إلغاء الأحكام التي لم يتم إلغاؤها بموجب هذا النظام أو غيره في نظام البريد الخاص بالمراسلات العادية والمسجلة ، الصادر بالأوامر السنية رقم (52 / 2 / 3 ) وتاريخ 17 / 1 / 1356 هـ، ونظام الحوالات الصادر بالإرادة السنية رقم (84 / 1 / 6 ) وتاريخ 12 / 1 / 1356 هـ، ونظام الخطابات والعلب المؤمن عليها والمحول عليها الصادر بالإرادة السنية رقم (52 / 2 / 6 ) وتاريخ 5 / 2 / 1356 هـ، ونظام الطرود العادية والمؤمن عليها والمحول عليها الصادر بالإرادة السنية رقم (52 / 2 / 2 ) وتاريخ 17 / 1 / 1356 هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تنشر قرارات مجلس الوزراء التي تصدر طبقا لهذا النظام في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يصدر وزير البرق والبريد والهاتف اللوائح اللازمة لتنفيذ أحكام هذا النظام، وتنشر في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد مضي سنة من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87aa6473-8e77-4dc5-b45d-a9a700f2e50f/1
  verified: false
