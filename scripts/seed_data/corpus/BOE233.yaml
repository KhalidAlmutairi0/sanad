- article_ref: المادة الأولى
  article_text_ar: 'تكون للكلمات والعبارات والمصطلحات الآتية -أينما وردت في هذا النظام- المعاني الموضحة أمام كل منها: النظام: نظام الاستثمار التعديني. الوزارة: وزارة الصناعة والثروة المعدنية. الهيئة: هيئة المساحة الجيولوجية السعودية. الوزير: وزير الصناعة والثروة المعدنية. اللوائح: اللوائح التنفيذية للنظام. النشاط التعديني: أي عمليات على الرواسب عن طريق الاستطلاع أو الكشف أو الاستغلال أو المعالجة أو التنقية أو أي أنشطة أخرى ذات علاقة بالنشاط التعديني. قطاع التعدين: الوزارة والهيئة والشركات التي تؤسسها الوزارة أو الهيئة وجميع الكيانات الأخرى ذات العلاقة بالنشاط التعديني. الشخص: أي شخص ذي صفة طبيعية أو اعتبارية. الرخصة: وثيقة تصدرها الوزارة تتضمن الموافقة على قيام شخص بممارسة نشاط تعديني في منطقة محددة وفقا لأحكام النظام واللوائح. الشخص المؤهل: شخص انطبقت عليه شروط الحصول على الرخصة وفقاً لأحكام النظام واللوائح. المرخص له: شخص منح رخصة وفقاً لأحكام النظام واللوائح. موقع الرخصة: موقع محددة إحداثياته الجغرافية في الرخصة. التحويل: نقل الرخصة من المرخص له إلى شخص مؤهل آخر. الاستطلاع: مسح جيولوجي
    مبدئي للتعرف على البيئة الجيولوجية والشواهد السطحية لوجود المعادن والخامات بصفة عامة قبل البدء بالكشف. الكشف: نشاط تفصيلي يؤدي إلى استكشاف الرواسب بالطرق الجيولوجية أو الجيوفيزيائية أو الجيوكيميائية أو الحفر بأنواعه أو أي طريقة أخرى مناسبة، في أي موقع؛ بغرض تحديد وجود تلك الرواسب، وامتداداتها، وكمياتها، ونوعياتها، وجدوى تعدينها. الاستغلال: استخراج الخامات والمعادن (تعديناً أو تحجيراً)، بما في ذلك أي نشاط مباشر أو غير مباشر لازم لتحقيق ذلك. التعدين: عملية استخراج الخامات أو التكوينات المعدنية ذات الفائدة، من الأرض أو المناطق البحرية، أو المواد الأخرى الناتجة عن التبخير من مياه البحر أو إمدادات المياه الطبيعية، بما في ذلك أي نشاط تعديني مباشر أو غير مباشر يكون ضرورياً لذلك. الرواسب: المعادن أو الخامات الموجودة في موضعها بشكل طبيعي والمتوافرة بكيمات ذات مؤشرات اقتصادية. الخامات: تجمعات من معدن واحد أو أكثر في منطقة محددة تجعلها ذات قيمة اقتصادية، وتوجد على حالتها الطبيعية. المعادن: مركبات غير عضوية، فلزية وغير فلزية، ولها تكوين كيميائي وصفات طبيعية مميزة، وتصنف إلى الفئات الآتية: الفئة
    (أ): المعادن الفلزية والأحجار الكريمة وشبه الكريمة والخامات التي تحتاج إلى عمليات متقدمة وتركيز على النحو المصنف في اللوائح. الفئة (ب): المعادن غير الفلزية والمعادن الصناعية والمواد الخام على النحو المصنف في اللوائح. الفئة (جـ): المواد التي تستخدم في أغراض البناء على النحو المصنف في اللوائح. التكوينات المعدنية: أشكال أو هيئات جيولوجية طبيعية توجد فيها خامات أو معادن. المواد الناتجة عن التبخير: المنتجات المستخلصة أو الناتجة عن طريق تبخير المياه. المنجم: مكان يستخرج منه معدن أو خامة ذات فائدة، سواء من سطح الأرض، أو باطنها، أو مياه البحر، أو إمدادات المياه الطبيعية التي تستخلص منها المواد والمعادن الناتجة عن التبخير. المنجم الصغير: منجم لا تتجاوز مساحته الكيلو متر المربع، وحجم راسبه المعدني وإنتاجه من الخام والاستثمارات الرأسمالية تسوغ اعتباره كذلك، ويعود تقدير ذلك إلى الوزارة. المحاجر: أماكن في الجبال أو في الأرض تقتلع منها الصخور أو المعادن أو الخامات. المعالجة: تنقية الخامات، أو إزالة الشوائب، أو زيادة التركيز. الحفر: إحداث حفرة أو فتحة في الأرض، مهما كان نوعها. الصقل: جلي سطح المعادن
    أو الصخور لجعله أملسَ براقًا. الصهر: إذابة المعادن بالحرارة أو بأي وسيلة أخرى من أجل التنقية والمعالجة. التركيز: نسبة معدن ما في منتج. الصخور: مواد أرضية طبيعية على هيئة صلبة، وتتكون في الغالب من تجمع معدني متحجر يتألف من معدن أو أكثر. الحصى: الأحجار الصغيرة التي تتراوح أقطارها بين (2-75) ملم. الرمل: مادة تنشأ من جراء تفتت مكونات القشرة الأرضية أو تكسرها أو تآكلها أو حتها أو تعريتها، وتكون بأقطار تقل عن (2) ملم. الطبقة: طبقة من الأرض ذات خصائص متسقة تميزها عن الطبقات الأخرى. مناطق الاحتياطي التعديني: مناطق تحتوي على كمية من الخامات أو المعادن في مواقع قابلة للتعدين ذات مؤشرات اقتصادية مثبتة جيولوجياً أو محتملة بحسب أحجام التكوينات المعدنية. المجمعات التعدينية: الأراضي المحددة لممارسة الأنشطة التعدينية. المرافق العامة: الأراضي التي تقوم عليها شبكات الطرق أو الشوارع أو السكك الحديدية العامة أو المطارات أو الموانئ أو أنابيب البترول والغاز أو مشروعات الطاقة أو المخصصة لمشاريع المياه المعتمدة. قاعدة البيانات الجيولوجية الوطنية: قاعدة بيانات رقمية تحتوي على المعلومات الجيولوجية والجيوكيميائية
    والجيوفيزيائية والطبوغرافية والجغرافية للدولة، ونتائج دراسات وأعمال المسح وأنشطة الاستكشاف، ومعلومات الرخص ومناطق الاحتياطي التعديني والمجمعات التعدينية. إعادة التأهيل: أعمال يجب على المرخص له القيام بها لإعادة موقع الرخصة إلى حالة طبيعية ملائمة عند الانتهاء من أي نشاط داخل الموقع وفق الأنظمة. الإغلاق: أعمال يجب على المرخص له القيام بها؛ لإغلاق موقع الرخصة بعد الانتهاء من أي نشاط داخل الموقع، وإكمال أعمال إعادة التأهيل. المواد الهيدروكربونية: مركبات الهيدروجين والكربون في حالتها السائلة أو الغازية، سواء أكانت تقليدية أو غير تقليدية، مثل: الزيت الخام، والزيت الحبيس، والزيت الصخري، والمكثفات، والغاز الطبيعي، والغاز الصخري، وهيدرات الميثان، والقطران الطبيعي، والقار، التي يتم استخراجها أو استخلاصها من باطن الأرض أو ظاهرها. المخلفات الخطرة: مخلفات تحوي مواد ضارة بالإنسان أو البيئة، تنتج عن النشاط التعديني، سواء أكانت على هيئة صلبة أو سائلة أو غازية أو إشعاعية. الأجور السطحية: مبالغ يدفعها المرخص له لاستئجاره الأرض المشمولة بالرخصة. المناطق البحرية: المناطق البحرية المشمولة بنظام المناطق البحرية
    للمملكة العربية السعودية. السيطرة: الإمكانية أو القدرة -المباشرة أو غير المباشرة- على ممارسة تأثير فعّال على أعمال وقرارات شخص آخر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: جميع الرواسب ملك للدولة، ولا يجوز أن يكتسبها الغير بالتقادم، ويشمل ذلك الخامات بجميع أنواعها أياً كان شكلها أو تركيبها، سواء أكانت على سطح الأرض أو في باطنها، ويشمل ذلك إقليم الدولة البري ومناطقها البحرية. تنتقل ملكية المعادن والخامات المشمولة برخصة الاستغلال إلى المرخص له بمجرد استخراجها من موقع الرخصة، وذلك خلال مدة الرخصة، وفقاً لأحكام النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'دون إخلال باختصاصات الجهات المعنية، تكون الوزارة هي الجهة المختصة بتطبيق أحكام النظام والإشراف على تنفيذه، ولها في ذلك -على سبيل المثال- القيام بما يأتي: إصدار اللوائح والنماذج والإجراءات والإرشادات اللازمة لتنفيذ أحكام النظام. وضع السياسات الخاصة بقطاع التعدين والإشراف على تنفيذها. تحديد الأراضي والمناطق البحرية التي يجوز منح رخص عليها بمقتضى أحكام النظام، بالتنسيق مع وزارة الطاقة فيما يخصها. تحديد الأجور السطحية والمقابل المالي للرخص والخدمات التي تقدمها الوزارة، وفقاً لأحكام النظام وما تقرره اللوائح. دراسة الطلبات المقدمة للحصول على أي نوع من الحقوق التي تمنح بمقتضى أحكام النظام وإصدار الرخص المانحة لتلك الحقوق وفقاً لأحكامه. تحصيل الرسوم والمقابل المالي والعوائد المالية للمنافسات والأجور السطحية والغرامات المقررة طبقاً لأحكام النظام. تشجيع البحث والتطوير والتخطيط والاستثمار في مجال النشاط التعديني. السعي إلى تحقيق التوسع المنظم للبنية التحتية للنشاط التعديني والخدمات ذات الصلة بطريقة مستدامة وفعالة وموثوقة. التنسيق مع الهيئة؛ لتحقيق ما يأتي: أ‌- تحديد مناطق للاحتياطي
    التعديني. ب‌- تطوير قاعدة البيانات الجيولوجية الوطنية وتحديثها. جـ- توفير الخرائط المختلفة وبيانات المسح والدراسات والبحوث اللازمة للاستثمار التعديني. التنسيق مع الجهات المعنية لتوفير مرافق البنية التحتية المطلوبة للمناطق التعدينية، ويشمل ذلك: الطرق، والسكك الحديدية، والموانئ، ومحطات الطاقة، وخطوط إمداد الطاقة والمياه. التكامل والتعاون مع الجهات المعنية لمراقبة مواقع الأنشطة التعدينية. مراقبة تدابير الصحة والسلامة المهنية التي يتوجب على المرخص له القيام بها. التنسيق مع وزارة الداخلية لتطبيق التعليمات الأمنية وتعليمات السلامة والحماية من الحريق الصادرة منها في مجال النشاط التعديني. الإشراف والمراقبة على جميع أوجه نشاطات المرخص له. تحديد محتوى وشكل أي دراسة أو تقرير أو توجيه يطلب وفقاً للنظام أو اللوائح. وضع الخطط والبرامج التطويرية لقطاع التعدين وتحديثها ومتابعة تنفيذها. تحديد الخامات والمعادن والعناصر التي لا يجوز تطويرها أو التي يُحتفظ بها للكشف أو الاستغلال في وقت لاحق أو التي تخضع لتنظيم خاص. تأهيل شركات أو مكاتب متخصصة للقيام بمهمات المراقبة وضبط المخالفات، وفقًا لما تحدده اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تنشئ الوزارة السجلات الآتية: سجل الطلبات: تقيد فيه جميع طلبات الحصول على الرخص المقدمة إلى الوزارة. سجل الرخص: تقيد فيه جميع الرخص الصادرة وما يتم عليها من تجديد أو تعديل أو تحويل أو تمديد أو رهن أو إنهاء أو انتهاء وكل ما يؤثر فيها. سجل مناطق المعادن: تقيد فيه تفاصيل مناطق المعادن، بما في ذلك: المجمعات التعدينية، ومناطق الاحتياطي التعديني. وتتيح الوزارة بالتنسيق مع الهيئة للعموم الاطلاعَ على جميع السجلات وفقاً للوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'دون إخلال بأحكام المادة (الثانية)، لا تسري أحكام النظام على ما يأتي: المواد أو الرواسب أو الموارد الهيدروكربونية، ويستثنى من ذلك الفحم الحجري. اللآلئ والمرجان والمواد البحرية المشابهة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'مع مراعاة ما تقضي به الأنظمة ذات العلاقة وأحكام النظام، يكون النشاط التعديني على أراضي مملوكة للدولة أو مملوكة ملكية خاصة أو التي يكون جزء منها مملوكاً للدولة والآخر مملوكاً ملكية خاصة، أو على المناطق البحرية. يستثنى مما ورد في الفقرة (1) من هذه المادة ما يلي: أ- الأراضي التي تشغلها الأماكن المقدسة. ب- الأراضي التي تشغلها المنشآت العسكرية أو المناطق المحجوزة لعمليات المواد الهيدروكربونية، أو مناطق اكتشاف المواد الهيدروكربونية، ما لم يصدر قرار من الوزير المختص برفع الحظر عنها بناءً على طلب من الوزير. ج- الأراضي والمناطق البحرية التي تحدد بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يجوز منح رخصة استطلاع على الأراضي والمناطق البحرية كافة عدا الأراضي والمناطق الواردة في الفقرة (2) من المادة (السادسة) من النظام. يجوز منح رخصة كشف أو رخصة استغلال على الأراضي والمناطق الآتية بعد الحصول على الموافقات والتصاريح اللازمة من الجهات الحكومية ذات العلاقة: أ- أراضي المرافق العامة. ب- المناطق التي تحدد -بناء على نظام- بأنها سياحية أو أثرية أو تاريخية أو محميات للحياة الفطرية أو المراعي والغابات والمتنزهات الوطنية والبرية والجيولوجية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: إذا استلمت الوزارة طلباً مكتمل الشروط للحصول على رخصة كشف أو استغلال على أي من الأراضي والمناطق المحددة في المادة (السابعة) من النظام فعليها الكتابة إلى الجهات الحكومية ذات العلاقة للحصول على الموافقات والتصاريح اللازمة. وفي حال عدم ورود أي اعتراض من تلك الجهات خلال مدة (30) يوماً من تاريخ الاستلام عُدّ ذلك موافقة منها، ولمقدم الطلب عند ورود اعتراض من إحدى الجهات استبعاد الأراضي والمناطق محل الاعتراض والمتداخلة مع الأراضي والمناطق المذكورة في المادة (السابعة)، واستكمال طلبه خلال مدة أقصاها (30) يوماً من تاريخ إشعار مقدم الطلب بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: دون إخلال بما ورد في المادة (السادسة) من النظام وبعد التنسيق مع الجهات ذات العلاقة، للوزير أن يصدر قرارًا بتخصيص أي أرض أو منطقة بحرية للاحتياطي التعديني، وتحديد الأنشطة غير المسموح بها فيها من أجل الحفاظ عليها لاستخدامها في الوقت المناسب لأغراض النشاط التعديني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: إذا رغبت الوزارة في تخصيص مجمع تعديني فعليها تبليغ الجهات ذات العلاقة بذلك، وفي حال عدم ورود أي اعتراض من أي من تلك الجهات خلال (30) يوماً من تاريخ استلام التبليغ عٌدّ ذلك موافقة منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تقوم الوزارة بوضع الشروط الخاصة بأنواع الرخص، وتحديد إجراءات إصدارها وتجديدها وتمديدها وتحويلها وتعديلها أو التخلي عنها أو عن جزء من موقع الرخصة وفقاً لأحكام النظام وما تحدده اللوائح. تُقدم جميع طلبات الحصول على الرخصة أو تجديدها أو تمديدها أو تحويلها أو تعديلها أو التخلي عنها أو عن جزء من موقع الرخصة، طبقاً للنظام؛ إلى الوزارة باستخدام النماذج والإجراءات الموضحة في اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا يجوز تعديل شروط وأحكام الرخصة أثناء فترة سريانها إلا بطلب من المرخص له وموافقة الوزارة. ويكون تجديدها أو تمديدها بالشروط والأحكام التي يتم الاتفاق عليها مع المرخص له، وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'فيما عدا رخصة الاستطلاع، لا يجوز منح الرخص الواردة في النظام إلا للشخص ذي الصفة الاعتبارية. لا يجوز لأي شخص القيام بأي عملية استطلاع أو كشف أو استغلال قبل الحصول على الرخصة التي تخوله القيام بذلك، ويستثنى من ذلك ما يأتي: أ- الهيئة، ويجوز لها -بعد إشـعار الوزارة- القيام بنفسها أو بوساطة غيرها بجميع المهمات والأعمال الواردة في تنظيمها. ب- الجهات الرسمية ذات العلاقة والجامعات والمعاهد ومراكز الأبحاث الوطنية، ويجوز لها -بعد موافقة الوزارة- إجراء أبحاث علمية ذات علاقة بالاستطلاع أو بالكشف، على ألا تستخدم تلك الأبحاث لأغراض تجارية إلا بموافقة الوزارة. ويجب أن تزود الوزارة بنسخة من نتائج الأبحاث العلمية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'الرخص التي تخول الحقوق وفقاً للنظام، هي: أ- رخصة الاستطلاع. ب- رخصة الكشف. جـ- رخصة الاستغلال. تشمل رخصة الاستغلال ما يأتي: أ- رخصة التعدين. ب- رخصة المنجم الصغير. جـ- رخصة محجر مواد بناء. د- رخصة الأغراض العامة. مع مراعاة ما ورد في المادة (الثالثة عشرة)، يجوز لأي شخص الحصول على أكثر من رخصة، وفقًا للضوابط التي تحددها اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجوز التقدم بطلب للحصول على رخصة لطبقة محددة من الأرض، ويجوز للوزارة وضع قيود على طبقة محددة، وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: مع مراعاة ما تقضي به الأنظمة ذات العلاقة، يجب أن يتوافر في طالب الرخصة الكفاية الفنية والقدرة المالية وفقا لنوع الرخصة المطلوبة، مما يمكنه من القيام بالتزاماته بشكل فعال، وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: لا يجوز رفض طلب الحصول على أي رخصة أو تجديدها أو تمديدها أو تعديلها وفقاً للنظام واللوائح إلا بناء على أسباب واضحة ومكتوبة، ويحق لمقدم الطلب التظلم من ذلك أمام المحكمة الادارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'مع مراعاة ما ورد في المادة (التاسعة عشرة) والفقرة (6) من المادة (الحادية والأربعين)، إذا تلقت الوزارة أكثر من طلب للحصول على رخصة على موقع واحد، فتكون الأولوية في منح الرخصة بناءً على أسبقية تقديم الطلب وعلى النحو المسجل في سجل الطلبات بشرط ما يأتي: الوفاء بمتطلبات المادة (السادسة عشرة). دفع رسوم طلب الرخصة واستيفاء المتطلبات الأخرى لمنح هذه الرخصة وفقاً لما تحدده اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: للوزارة تحديد أراضٍ أو مناطق بحرية لطرحها للمنافسة، ولا يجوز منح رخص عليها إلا عن طريق المنافسة، وفقاً لأحكام النظام وما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يجوز تحويل أي رخصة كشف أو استغلال -بعد تقديم طلب من المرخص له- إلى شخص مؤهل. ويتم التحويل بالكيفية التي ستحددها اللوائح. ولا يجوز رفض الطلب إذا توافرت شروط التحويل المحددة في أحكام النظام واللوائح. ينتقل ما للرخصة من حقوق وما عليها من التزامات، من المرخص له إلى الشخص المحولة إليه الرخصة، فور صدور القرار بذلك. استثناءً من الفقرة (1) من هذه المادة، لا يجوز تحويل رخصة الكشف، بطريقة مباشرة أو غير مباشرة، خلال السنة الأولى من بداية مدتها. لا يعد طلب التحويل نافذاً إلا بعد صدور قرار من الوزارة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: دون إخلال بما ورد في الفقرة (3) من المادة (العشرين) من النظام، يبلغ المرخص له الوزارة إذا حدث أي تغيير في السيطرة عليه خلال (30) يوماً من حدوث التغيير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: مع مراعاة ما تقضي به الأحكام الشرعية والأنظمة ذات العلاقة، وفيما عدا رخصة الاستطلاع، يجوز للمرخص له أن يرهن الحقوق التي تخولها الرخصة. ولا يعتد بالرهن إلا بعد إبلاغ الراهن (المرخص له) الوزارة بتسجيله في سجل الرخص وفق ما تحدده اللوائح. ويحق للمرتهن أو من يعينه تنفيذ أي حق مرهون في الرخصة ونقل تلك الحقوق بشرط استيفاء متطلبات المادتين (السادسة عشرة) و(العشرين).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'تعد البيانات والمعلومات المقدمة من طالب الرخصة سرية، ولا يجوز إفشاؤها قبل مضي (180) يوماً من تاريخ رفض الطلب. تعـد جميع التقـارير الجيولوجيـة المقدمة من أي مرخص له بموجب اللوائح سـرية متى ما طـلب المرخص له ذلك، ولا يجوز نشرهـا دون موافقته إلا على النحو الآتي: أ- بعد مضي خمس سنوات من استلام التقارير للرخص السارية. ب- بعد مضي (180) يوماً من تاريخ انتهاء الرخصة أو إنهائها أو التخلي الجزئي عن موقع الرخصة. وللوزارة في جميع الأحوال التصرف في البيانات أو المعلومات أو التقارير بما لا يتعارض مع أحكام النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يجوز للوزارة أن تصدر القرارات التي تراها ضرورية لوقف أي عملية أو استخدام أي معدة أو ممارسة أي نشاط في موقع الرخصة عند وجود آثار سلبية على السلامة أو الأمن أو صحة موظفي المرخص له أو الأشخاص الآخرين أو إذا كانت تلك الآثار قد تسببت في أضرار للبيئة أو للممتلكات أو في إزعاج غير عادي أو إتلاف جوهري لأي موقع. وعلى الوزارة إنهاء الوقف حال التأكد من زوال أسبابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'دون إخلال بالأحكام الأخرى الواردة في النظام واللوائح، لا يجوز إنهاء الرخصة إلا بناءً على أحد الأسباب الآتية: تأخر المرخص له عن دفع المبالغ المستحقة للدولة لمدة تزيد على (180) يوماً. تقديم المرخص له معلومات غير صحيحة إلى الوزارة تخل جوهرياً بأعماله أو بياناته. عدم قيام المرخص له -خلال (60) يوماً من تاريخ إشعاره كتابياً- بتنفيذ الالتزامات التي يفرضها النظام واللوائح وشروط وأحكام الرخصة. عدم قيام المرخص له بتصحيح المخالفة التي أشعر بها خلال المدة المحددة في الإشعار، أو تكراره المخالفة. تأخر المرخص له مدة (180) يوما من تاريخ تسلمه إشعار الوزارة الكتابي في اتخاذ الوسائل الضرورية للمحافظة على البيئة أو الحياة الفطرية أو المواقع الأثرية أو المناطق السياحية. وإذا أنهيت الرخصة فلا يحق لمن كانت ممنوحة له ولا لذوي العلاقة التقدم -خلال ثلاث سنوات- بطلب الحصول على رخصة أخرى على ذات الموقع أو جزء منه، وتحدد اللوائح الإجراءات المتصلة بإنهاء الرخصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: دون إخلال بأي اتفاق سابق مع مالك الأرض، يجب على المرخص له خلال (180) يوماً من تاريخ إنهاء أو انتهاء الرخصة لأي سبب كان، أن يزيل أي مبنى أو مصنع أو آلية أو معدة أو أداة أو مخلفات أو مواد أخرى أو الخام المستخرج أو أي نوع آخر من الممتلكات أياً كان نوعها، سواء أكانت ثابتة أو منقولة، وذلك باستثناء ما ترى الوزارة إبقاءه لمقتضى المصلحة العامة، وتحدد اللوائح الشروط والضوابط لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يكون لممثلي الوزارة المختصين صفة الضبط، ولهم دخول موقع الرخصة بموجب النظام؛ للتفتيش، والمراقبة، وضبط المخالفات، والتأكد من تقيد المرخص له بالنظام واللوائح وشروط وأحكام الرخصة. وعلى المرخص له أن يتعاون مع ممثلي الوزارة بما يمكنهم من أداء مهماتهم على أكمل وجه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: تكون العمليات التي تنفذ بمقتضى الرخص الممنوحة بموجب النظام تحت مسؤولية المرخص له وإشرافه وإدارته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: مع مراعاة ما تقضي به الأنظمة ذات العلاقة، إذا رغب المرخص له في القيام بمسح جوي، فعليه أن يحصل على إذن كتابي من الوزارة للقيام بهذا النشاط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: إذا منعت قوة قاهرة أو أعاقت أو أخرت قيام المرخص له بأي من التزاماته في الوقت المحدد، فإن التعطيل أو التأخير الناتج عن ذلك لا يعد إهمالاً أو تقصيراً في العمل أو الأداء. وللوزارة في هذه الحالة تمديد الفترة التي كانت محددة للعمل الذي توقف أو تعطل لمدة لا تقل عن فترة بقاء القوة القاهرة، أو أن تمنح المرخص له موقعاً بديلاً للرخصة متى ما كان ذلك ممكناً وفقاً لنوع الخام والرخصة. ويقصد بالقوة القاهرة في أحكام هذه المادة الأحداث المتعارف عليها أصولياً كقوة قاهرة ناجمة عن ظروف غير متوقعة وقت إصدار الرخصة، والتي لا يرجع وجودها إلى أي من الطرفين وتجعل تنفيذ المرخص له لالتزاماته المحددة بالرخصة مستحيلاً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يجوز للمرخص له أن يتخلى عن رخصته أو عن جزء من الموقع الصادر في شأنه الرخصة، وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'مع مراعاة ما تقضي به المادة (الثانية) من النظام، إذا كان موقع رخصة الكشف أو الاستغلال أو جزء منه مملوكاً ملكية خاصة ثابتة بسند نظامي، أو كان لأحد الأشخاص حق انتفاع بها ثابت نظاماً، فإن على المرخص له أن يقوم بالإجراءات الآتية: تقديم الرخصة إلى مالك الأرض أو المنتفع بها متى ما طلب منه ذلك. ولا يجوز للمرخص له أن يبدأ بممارسة الحقوق محل الرخصة الممنوحة له أياً كان نوعها إلا بعد أن يتفق مع مالك الأرض أو المنتفع على تعويض عادل عما كان سيعود به استعمال الأرض من نفع، وعن الأضرار التي قد تلحق بالأرض نتيجة العمليات المرخص بها، وأن يقدم ذلك الاتفاق إلى الوزارة قبل بدء عملياته على هذه الأرض. إذا لم يتوصل المرخص له ومالك الأرض أو المنتفع بها إلى اتفاق حول التعويض العادل، فتطبق الوزارة في هذه الحالة الأحكام ذات العلاقة بوضع اليد المؤقت على العقار الواردة في نظام نزع ملكية العقارات للمنفعة العامة ووضع اليد المؤقت على العقار. وفي جميع الأحوال، فإنه يجب أن تمارس الحقوق الممنوحة بمقتضى الرخصة ممارسة معقولة وبأقل قدر ممكن من التأثير على مصالح المالك أو المنتفع، وبما يتمشى مع التنفيذ الملائم
    لأغراض الرخصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يكون للمرخص له جميع حقوق الارتفاق اللازمة لتمكينه من تنفيذ عملياته على أي أرض تملكها الدولة خارج موقع الرخصة، وذلك بمقتضى تصريح من الوزارة بعد موافقة الجهات الحكومية المختصة، بشرط ألا تكون متعارضة مع حقوق أخرى لغيره على الأرض. إذا وقعت أي من حقوق الارتفاق المطلوبة على أرض مملوكة ملكية خاصة ثابتة بسند نظامي أو على موقع رخصة أخرى، فعلى المرخص له أن يتفق مع مالك الأرض أو المنتفع بها أو المرخص له الآخر للحصول على تلك الحقوق بالطريقة المحددة نظاماً لاكتساب تلك الحقوق. دون إخلال بما تضمنته الفقرة (1) من هذه المادة، تشمل حقوق الارتفاق -لأغراض هذه المادة دون حصر- حق استخدام الطرق بأنواعها وخطوط الاتصـالات المـخـتلفة والمـياه السـطـحية والجوفية في حال عدم توافر بدائل عن مصادر المياه الضرورية لتنفيذ عمليات المرخص له، على ألا يخل ذلك بأنظمة وتعليمات المحافظة على المياه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: على المرخص له أن يتقيد بالأنظمة والأوامر والقرارات المعمول بها، وبالنظام واللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: على كل طالب رخصة تعدين أو رخصة منجم صغير أو رخصة الأغراض العامة أن يضمن في طلبه دراسة الأثر البيئي والاجتماعي وخطة إعادة تأهيل الموقع والإغلاق وفق ما تحدده اللوائح، ويلتزم بموجبها باتخاذ جميع الوسائل والاحتياطات اللازمة للحفاظ على مصادر المياه والبيئة والحياة الفطرية وحمايتها من أي مخلفات خطرة أو أي ضرر بيئي آخر وفق ما تحدده اللوائح. يكون اعتماد دراسة الأثر البيئي من الجهة المختصة نظاماً عن البيئة في المملكة خلال مدة (60) يوماً من تسلم الدراسة، وللوزير زيادة المدة لبعض الأنشطة التعدينية. يكون اعتماد خطة إعادة التأهيل والإغلاق من الوزارة بعد الحصول على موافقة الجهة المختصة بالبيئة. على كل طالب رخصة تعدين ورخصة منجم صغير أن يضمن في طلبه دراسة للجدوى الاقتصادية للمشروع تتضمن المساهمة في تنمية المجتمعات المحلية الواقعة ضمن موقع الرخصة أو بقربها ودعم المحتوى المحلي، وتكلفة إعادة تأهيل الموقع والإغلاق. على كل طالب رخصة كشف ورخصة محجر مواد بناء أن يضمن في طلبه خطة لإدارة الأثر البيئي تتوافق مع الاشتراطات والمواصفات التي تضعها الجهة المختصة بالبيئة. وأن يقدم خطة لإدارة الأثر الاجتماعي
    للأنشطة التي تتضمن المساهمة في تنمية المجتمعات المحلية وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يحافظ المرخص له على ما قد يوجد في موقع الرخصة من مواقع أثرية، سواء أكانت بناء أو نقشاً أو كتابة أو رسماً أو غير ذلك، ويبلغ الوزارة فور علمه بوجود تلك الآثار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يلتزم حامل رخصة الاستغلال بتقديم ضمان مالي لإعادة التأهيل والإغلاق. تحدد اللوائح مقدار الضمان بحسب طبيعة كل نشاط تعديني، ولا يتم إعادته أو ما تبقى منه إلا بموافقة الجهة المختصة بالبيئة بعد تحققها من التزام المرخص له بخطة إعادة التأهيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: تصدر الوزارة رخصة استطلاع مدتها لا تتجاوز سنتين، على أي منطقة يحددها طالب الرخصة، ويجوز تمديدها أو تجديدها لفترة إضافية واحدة مدتها لا تزيد على سنتين، وتحدد اللوائح شروط الرخصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: 'تخول رخصة الاستطلاع المرخص له بمسح واستطلاع الموقع المحدد في الرخصة، ويكون للمرخص له حق غير حصري في موقع الرخصة للقيام بما يأتي: فحص الرواسب المشمولة بالرخصة وأخذ العينات. فحص المنطقة -التي تغطيها الرخصة- غير المستثناة بموجب النظام. استعمال الوسائل الجيوفيزيائية أو الجيوكيميائية وغير ذلك من الوسائل العلمية. القيام بأي عمل آخر من أعمال الاستطلاع من قبيل الفحص المبدئي للأراضي التي يحتمل وجود معادن أو خامات فيها. الاطلاع على الخرائط والبيانات غير السرية لدى الوزارة. أي حقوق أخرى تنص عليها اللوائح. ولا تخول هذه الرخصة المرخص له الحق في الحفر بأنواعه ولا في بناء منشآت ثابتة، ولا في إنتاج المعادن من أجل استعمالها أو بيعها. ولا تمنحه الحق في استخدام أي متفجرات أو إلحاق الضرر بأي غطاء نباتي أو إزالته، ولا تمنحه أي أفضلية أو أي حق في استصدار أي رخصة أخرى. ولا يمنع وجود رخصة استطلاع في منطقة معينة الوزارة من منح رخصة أخرى على المنطقة نفسها أو على أي جزء منها، سواء للمرخص له أو لغيره. ويترتب على منح رخصة تخول حاملها حقّاً حصرياً استبعاد المناطق المشمولة بهذه الرخصة من نطاق رخصة
    الاستطلاع دون أي مسؤولية على الوزارة. ولا تخول رخصة الاستطلاع الحق في الدخول إلى أي أرض خاصة. وعلى المُرخص له قبل دخول هذه الأراضي الحصول على الموافقات اللازمة من مالك الأرض أو من يملك حق الانتفاع بها وفقا للشروط التي يتفق عليها معهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: 'تصدر الوزارة رخصة كشف، وتحدد مساحة الرخصة ومدتها وتجديدها وفقاً لما يلي: لا تزيد مساحة الموقع على مائة كيلو متر مربع بالنسبة إلى المعادن من الفئتين (أ) و(ب)، ولمدة لا تزيد على خمس سنوات، ويجوز تجديدها لمدد لا تتجاوز خمس سنوات لكل مدة، على ألا تزيد مدة الرخصة ومدد تجديدها على خمس عشرة سنة، وفقاً لما تحدده اللوائح. لا تزيد مساحة الموقع على خمس كيلو متر مربع بالنسبة إلى المعادن من الفئة (جـ)، ولمدة لا تزيد على سنة واحدة غير قابلة للتجديد، وفقاً لما تحدده اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: 'تخول رخصة الكشف للمرخص له الحقوق الحصرية الآتية في موقع الرخصة: الكشف عن جميع المعادن المرخص له بها. أخذ عينات من موقع الرخصة لتحديد وجود المعادن المرخص بها، بشرط عدم بيعها أو استغلالها استغلالاً تجاريًّا. استخدام أي وسيلة من وسائل الكشف السابقة للإنتاج التجاري. إنشاء المخيمات والمرافق لحفظ العينات والآلات والمعدات اللازمة لأغراض الكشف. استخدام الرمل والحصى والمواد المشابهة بحسب ما يكون ذلك مطلوباً لتحقيق أغراض الرخصة. الحصول أثناء مدة سريان الرخصة على رخصة استغلال داخل موقع رخصة الكشف بشرط أن يكون قد وفى بجميع التزاماته وحقق جميع متطلبات الحصول على رخصة الاستغلال بموجب النظام واللوائح، وأثبت وجود جدوى اقتصادية لاستغلال الخامات والمعادن. وإذا انقضت مدة رخصة الكشف قبل البت في طلب الحصول على رخصة استغلال داخل موقع الرخصة، تعد رخصة الكشف قد مددت حكماً إلى تاريخ البت في الطلب، ويُعفى المرخص له، في هذه الحالة، من دفع أي مبالغ مفروضة بموجب النظام عن فترة التمديد الحكمي لهذه الرخصة. أي حقوق أخرى تنص عليها اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: تصدر الوزارة رخصة تعدين، لمدة لا تتجاوز ثلاثين سنة، قابلة للتجديد أو التمديد لمدة أو مدد لا تتجاوز في مجموعها ثلاثين سنة أخرى، على ألا يزيد مجموع سنوات مدة الرخصة ومدد تجديدها أو تمديدها على ستين سنة، وألا تزيد مساحة موقع الرخصة على خمسين كيلو متر مربع، وأن تكون أجزاؤه على شكل تجمعات متجاورة بشكل مقبول للوزارة. ويراعى في تقدير مساحة موقع الرخصة الاعتبارات الفنية والاقتصادية والبيئية. وتقتصر الرخصة على المعادن من الفئتين (أ) و(ب). وفي حال رغبة المرخص له في استغلال المعادن من الفئة (جـ) داخل موقع الرخصة فعليه التقدم بطلب بذلك إلى الوزارة ودفع المقابل المالي لذلك، وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: تصدر الوزارة رخصة منجم صغير لمدة لا تتجاوز عشرين سنة، قابلة للتجديد أو التمديد لمدة أو مدد لا تتجاوز عشرين سنة أخرى، على ألا يزيد مجموع سنوات مدة الرخصة ومدد تجديدها أو تمديدها على أربعين سنة، وأن تكون أجزاؤه على شكل تجمعات متجاورة بشكل مقبول للوزارة. ويراعى في تقدير مساحة موقع الرخصة الاعتبارات الفنية والاقتصادية والبيئية. وتقتصر الرخصة على بعض معادن الفئتين (أ) و(ب)، وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: تصدر الوزارة رخصة محجر مواد بناء لمدة لا تتجاوز عشر سنوات، قابلة للتمديد لمدة أو مدد لا يتجاوز كل منها خمس سنوات، على ألا تزيد مساحة موقع الرخصة على كيلو متر مربع، وأن تكون أجزاؤه متماسكة بشكل مقبول للوزارة. ويراعى في تقدير مساحة موقع الرخصة الاعتبارات الفنية والاقتصادية والبيئية. وتقتصر الرخصة على المعادن من الفئة (جـ)، وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: 'دون إخلال بأحكام المادة (الثانية والثلاثين) من النظام، تخول رخصة الاستغلال حاملها الاستثمار في عمليات التعدين واستخراج الخامات والمعادن، بما فيها أي نشاط مباشر أو غير مباشر لازم لتحقيق أهداف الاستثمار التعديني، وفقاً لما تحدده اللوائح. إذا اكتشف المرخص له رواسب لمعادن أخرى غير مشمولة في الرخصة جاز له أن يتقدم كتابة إلى الوزارة خلال (90) يوما من تاريخ الاكتشاف بطلب منحه رخصة استغلال عليها، أو تعديل رخصته الحالية. لا تخول رخصة الاستغلال حاملها حق تملك أي جزء من الأرض موقع الرخصة، ولا تخوله أيضاً أي حق لم يُنص عليه صراحة فيها. دون إخلال بأحكام المادة (الخامسة والثلاثين) من النظام، يكون لحامل رخصة الاستغلال -وفقأً لشروط وأحكام الرخصة- الحقوق الحصرية الآتية لاستغلال المعادن المشمولة بالرخصة: أ- إنتاج واستغلال المعادن المحددة في الرخصة الموجودة في موقع الرخصة، وذلك عن طريق الحفر والصقل والتركيز والصهر والمعالجة. ب- نقل وبيع المعادن والخامات في حالتها الأصلية أو بعد تنقيتها، وفق ما تحدده اللوائح. جـ- تصدير المعادن والخامات لأغراض تجارية. د- تصدير عينات غير تجارية وفق ما تحدده
    اللوائح. هـ- بناء وتشغيل وصيانة جميع المناجم والمباني والمعامل والورش وخطوط الأنابيب ومصانع المعالجة ومرامي المخلفات وغيرها من المرافق الضرورية أو المناسبة لتحقيق أغراض النشاط التعديني المسموح به في موقع الرخصة. و- إنشاء شبكات المياه والكهرباء والهاتف والصرف الصحي وتصريف السيول والأنابيب ومحطات الطاقة والسكك الحديدية والطرق الخاصة، وذلك بعد الحصول على موافقة مكتوبة من الوزارة. ز- القيام بعمليات المسح والكشف في موقع الرخصة عن الخامات والمعادن بعد إشعار الوزارة. حـ- استخدام الصخور والحصى والرمل والمواد المشابهة الموجودة ضمن موقع الرخصة على النحو اللازم لتحقيق أغراض الرخصة، وذلك بعد دفع المقابل المالي لهذه المواد. ط- استخدام مصادر المياه المتاحة لتنفيذ عمليات المرخص له وفق ما تحدده المادة (الثالثة والثلاثون) من النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: إذا اشتملت رخصة الاستغلال على أكثر من معدن ولم يقم المرخص له باستغلال أحدها، فعلى الوزارة إبلاغ المرخص له كتابة بضرورة استغلال ذلك المعدن. فإذا لم يبدأ المرخص له باستغلاله خلال (90) يوماً من تاريخ الإبلاغ، جاز للوزارة إنهاء حقوقه بالنسبة إلى ذلك المعدن، ومنح شخص آخر رخصة استغلال للمعدن غير المستغل، بشرط ألا يؤثر ذلك تأثيرًا جوهريًّا على عمليات المرخص له الأول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: إذا لم يرغب المرخص له في تجديد أو تمديد الرخصة، وكان في حاجة إلى المرافق الموجودة في موقع الرخصة لاستخدامها كونها جزءًا مكملاً لعمليات التعدين في موقع رخصة أخرى، فيجوز للوزارة السماح له بذلك وفقاً لما تحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: إذا رغب حامل رخصة الاستغلال في إنشاء مرافق أو استخدام أراضٍ خارج موقع الرخصة لتحقيق أغراض الرخصة، فعليه تقديم طلب إلى الوزارة للحصول على رخصة الأغراض العامة وفقاً للنظام واللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: 'يحدد الجدول الملحق بالنظام الرسوم التي يتعين دفعها، وهي: رسوم تقديم الطلب. رسوم إصدار الرخصة أو تجديدها أو تمديدها. رسم تحويل الرخصة. ولمجلس الوزراء تعديل أي من الرسوم الواردة في الجدول الملحق بالنظام بناءً على اقتراح من الوزير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: 'يدفع حامل رخصة الاستغلال للمعادن من الفئة (أ) مقابلاً ماليًا على النحو الآتي: أ‌- بالنسبة إلى الشخص غير الخاضع لضريبة الدخل: أولاً: يدفع مقابلاً مالياً للاستغلال من الدخل الصافي السنوي بما يعادل ضريبة الدخل، على أن تحسم الزكاة المستحقة عليه من ذلك. ثانياً: يدفع مقابلاً مالياً لكل طن من الخام المنتج أو نسبة من صافي الإيرادات الناتجة من النشاط المحدد في الرخصة، وفقاً لما تحدده اللوائح وبعد الاتفاق مع وزارة المالية، ويعفى في السنوات الخمس الأولى من تاريخ صدور الرخصة من دفع قيمة هذا المقابل. ب- بالنسبة إلى الشخص الخاضع لضريبة الدخل: يدفع -إضافة لضريبة الدخل- مقابلاً ماليًا لكل طن من الخام المنتج أو نسبة من صافي الإيرادات الناتجة من النشاط المحدد في الرخصة، وفقاً لما تحدده اللوائح وبعد الاتفاق مع وزارة المالية، ويعفى في السنوات الخمس الأولى من تاريخ صدور الرخصة من دفع قيمة هذا المقابل. بالإضافة إلى مستحقات الزكاة وضريبة الدخل والمستحقات الأخرى للجهات المعنية، يدفع حامل رخص الاستغلال لفئات المعادن (ب) و(جـ) مقابلاً مالياً للاستغلال تحدده اللوائح بعد الاتفاق مع وزارة المالية.
    للوزير -بعد الاتفاق مع وزير المالية- تخفيض قيمة المقابل المالي لأي معدن أو خليط منه إذا تمت معالجته داخل الدولة وفقاً لما تحدده اللوائح. 3- تحدد اللوائح قيمة الأجور السطحية للأراضي المملوكة للدولة، والمقابل المالي للرخص الأخرى والخدمات بعد الاتفاق مع وزارة المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: إذا لم يكن للمعدن أو المادة أو مشتقاتها في نقطة التصدير أو نقطة الاستغلال داخل الدولة سعر متعارف عليه، فتقدر الوزارة القيمة العادلة للمعدن أو المادة أو مشتقاتها المشمولة في النظام بحسب مقتضى الحال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: يتمتع المرخص له -بمقتضى النظام- بالحوافز المقررة في الأنظمة الأخرى وبوجه خاص نظام ضريبة الدخل ونظام الاستثمار الأجنبي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: تعفى جميع المعدات والآليات وقطع الغيار المستوردة اللازمة لتنفيذ أي نشاط تعديني مرخص له؛ من الرسوم الجمركية بناءً على بيانات وقوائم معتمدة من الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: 'ينشأ صندوق للتعدين في الوزارة يهدف إلى إيجاد مصادر تمويل مستدامة من أجل تطوير ودعم النشاط والقطاع التعديني، وتتألف موارده من المصادر الآتية: المقابل المالي للرخص والخدمات التي تقدمها الوزارة. الغرامات التي توقع وفقاً للنظام. الأجور السطحية. العوائد المالية للمنافسات. الهبات والتبرعات والأوقاف. وتودع تلك الموارد في حساب باسم صندوق التعدين في مؤسسة النقد العربي السعودي أو في حسابات في البنوك المرخص لها بالعمل في المملكة. ويصدر الوزير -بالاتفاق مع وزير المالية- لائحة تتضمن آلية تخصيص هذه المبالغ أو بعضها لقطاع التعدين والخدمات والجهات المرتبطة بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: تنشئ الوزارة -وفقاً للإجراءات النظامية- شركة أو أكثر تابعة لها للقيام بخدمات ذات علاقة بقطاع التعدين. يكون رأس مال الشركات المشار إليها في الفقرة (1) من هذه المادة من موارد صندوق التعدين المشار إليه في المادة (الرابعة والخمسين) وفقاً لقرار يصدر من الوزير. تكون موارد الشركات المشار إليها في الفقرة (1) من هذه المادة من المقابل المالي الذي تحصل عليه الشركات نظير الخدمات التي تقدمها ومن إيرادات صندوق التعدين وفقاً لما يخصصه الوزير بقرار منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: 'دون إخلال بما ورد في المادة (الخامسة والعشرين) من النظام، يعد القيام بأي من التصرفات أو الأفعال الآتية مخالفة للنظام: أ- القيام بأي نشاط تعديني دون رخصة. ب- عدم الالتزام بالنظام أو اللوائح أو شروط وأحكام الرخصة. جـ- تقديم معلومات مضللة أو غير صحيحة إلى الوزارة. د- التأخر أو التقصير في تقديم المعلومات أو التقارير التي تطلبها الوزارة. هـ- التأخر عن دفع المبالغ المستحقة بموجب أحكام النظام واللوائح. دون الإخلال بأي عقوبة أشد ينص عليها أي نظام آخر، يعاقب كل من يرتكب أي مخالفة من المخالفات المشار إليها في الفقرة (1) من هذه المادة بعقوبة واحدة أو أكثر من العقوبات الآتية: أ- غرامة لا تزيد على (1,000,000) مليون ريال عن كل مخالفة. ب- إيقاف النشاط. جـ- إنهاء الرخصة. د- مصادرة الآليات والمعدات المستخدمة في المخالفة. تقوم الوزارة -بناء على قرار من اللجنة المشار إليها في المادة (السابعة والخمسين) من النظام- باستعادة جميع المعادن والخامات ومشتقاتها الناتجة عن العمليات التي تمت بشكل مخالف أو الأموال الناتجة عنها، وتحصيل قيمة المقابل المالي للخامات والمعادن المستغلة والناتجة عن تلك العمليات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: ( المادة السادسة والخمسون مكرر )
  article_text_ar: 'أُضيفت هذه المادة وذلك بموجب المرسوم الملكي رقم (م/27) وتاريخ 1444/2/4هـ، ويعمل بها بعد (90) يوماً من تاريخ 1444/2/13هـ. وتكون بالنص الآتي: "1- دون الإخلال بأي عقوبة أشد، يعاقب بالسجن مدة لا تتجاوز (سنتين)، وبغرامة لا تزيد على (1,000,000) مليون ريال، أو بإحدى هاتين العقوبتين، كل من يقوم دون ترخيص بأي مما يأتي: أ- استغلال الرواسب لغرض بيعها. ب- أعمال الحفر لغرض البحث عن المعادن من فئة (أ)، أو استغلالها. 2- تجوز مضاعفة الحد الأعلى للعقوبة في حالة العود لارتكاب أي من الجرائم المنصوص عليها في الفقرة (1) من هذه المادة. ويُعد عائداً كل من عاد إلى ارتكاب الجريمة خلال (ثلاث) سنوات من تاريخ صدور حكم نهائي واجب النفاذ بارتكاب أي من تلك الجرائم. 3- يعاقب كل من اشترك - بطريق الاتفاق أو التحريض أو المساعدة - في ارتكاب أي من الجرائم المنصوص عليها في الفقرة (1) من هذه المادة، بالعقوبة المقررة لها. 4- يحكم على من تثبت إدانته - بارتكاب أيًّ من الجرائم الواردة في الفقرة (1) من هذه المادة - بردّ المال محل الجريمة أو رد قيمته - بحسب الأحوال - ورد أي عائد ترتب من ذلك المال. وللمحكمة أن تحكم
    بمصادرة الآليات والمعدات المستخدمة في ارتكاب الجريمة. 5- تتولى النيابة العامة التحقيق في الجرائم الواردة في الفقرة (1) من هذه المادة، والادعاء فيها أمام المحكمة المختصة".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: 'تفرض الوزارة غرامة لا تتجاوز (200) ألف ريال عند ارتكاب أي من المخالفات المنصوص عليها في الفقرة (1) من المادة (السادسة والخمسين) من النظام، وإذا رأت أن المخالفة تستوجب فرض غرامة تتجاوز (200) ألف ريال فتحيل المخالفة إلى اللجنة المشار إليها في الفقرة (2) من هذه المادة. مع مراعاة ما ورد في الفقرة (1) من هذه المادة، تكوّن لجنة أو أكثر بقرار من الوزير من خمسة من المختصين يكون من بينهم عضو مؤهل تأهيلاً شرعياً أو نظامياً وآخر مالياً وآخر فنياً، تتولى النظر في المخالفات وتقرير العقوبات المنصوص عليها في الفقرة (2) من المادة (السادسة والخمسين) عدا ما يأتي: أ‌- عقوبة إنهاء الرخصة فتكون بقرار من الوزير بناءً على توصية مسببة من اللجنة. ب‌- عقوبة المصادرة فتحال المخالفة إلى المحكمة المختصة للنظر فيها. ويجوز تظلم صاحب الشأن من القرارات الصادرة في حقه أمام المحكمة الإدارية خلال (60) يوماً من تاريخ إبلاغه بالقرار، ويصدر الوزير القواعد المنظمة لعمل تلك اللجان ومكافآت أعضائها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: يجوز الاتفاق على تسوية أي نزاع أو خلاف ينشأ بين أي مرخص له والوزارة عن طريق التحكيم وفقًا لأحكام نظام التحكيم. ولأغراض هذا النظام تعد المحكمة الإدارية هي الجهة المختصة أصلاً بنظر النزاع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: لا يجوز لأي شخص امتلاك أي مواد مشعة (بما في ذلك اليورانيوم والثوريوم) أو استخدامها أو بيعها أو التصرف فيها إلا بموجب أحكام النظام واللوائح والأنظمة الأخرى ذات العلاقة. وعلى الشخص الذي يكتشف أي مواد مشعة إبلاغ الوزارة فوراً بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: 'على الوزارة -وفقاً لما تحدده اللوائح وبالوسيلة التي تراها مناسبة- أن تنشر النص الكامل لكل مما يأتي: القرارات ذات الطابع العام. قرارات إصدار الرخص وتجديدها وتمديدها وإنهائها وتحويلها. الإشعارات المتعلقة بالرهون المسجلة على الرخص. قرارات تخصيص مناطق الاحتياطي التعديني والمجمعات التعدينية أو إنهاء هذا التخصيص. إعلان المنافسات. القرارات أو الوثائق الأخرى التي ينص عليها في اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: يحل النظام محل نظام الاستثمار التعديني الصادر بالمرسوم الملكي رقم (م/47) وتاريخ 20/8/1425هـ، ويلغي كل ما يتعارض معه من أحكام. استثناءً من الفقرة رقم (1) من هذه المادة، يستمر سريان الحقوق الناشئة في ظل نظام الاستثمار التعديني الصادر بالمرسوم الملكي رقم (م/47) وتاريخ 20 / 8 / 1425هـ إذا كانت تلك الحقوق نافذة قبل سريان العمل بالنظام، على أن تطبق الأحكام المالية المقررة في النظام واللوائح على أصحاب تلك الحقوق وذلك من تاريخ العمل بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: يصدر الوزير اللوائح، وتنشر في الجريدة الرسمية، ويُعمل بها من تاريخ العمل بالنظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: يُنشر النظام في الجريدة الرسمية، ويُعمل به بعد مائة وثمانين يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9560f620-e77e-476c-b9ea-abdd00b87480/1
  verified: false
