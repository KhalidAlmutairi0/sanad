regulation:
  code: BOE325
  name_ar: اللائحة التنظيمية لتأشيرات الأعمال المؤقتة والموسمية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تأشيرة العمل المؤقت هي التأشيرة التي تصدر للدخول إلى المملكة لمرة واحدة أو لعدة مرات، لمدة لا تتجاوز سنة، ولعمل محدد خارج نطاق أعمال الحج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تكون صلاحية الاستفادة من تأشيرة العمل المؤقت خلال سنة من تاريخ صدورها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 1- مدة الإقامة لتأشيرة العمل المؤقت ستة أشهر حدًّا أعلى، غير قابلة للتحويل إلى تأشيرة عمل دائم. ويجوز تمديدها لمرة واحدة فقط، ولمدة أقصاها ستة أشهر.2 - لا يجوز بقاء حامل تأشيرة العمل المؤقت في المملكة بعد ستة أشهر من تاريخ دخوله الأول إلى المملكة بموجب هذه التأشيرة، أو بعد سنة من ذلك في حال تمديدها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تقوم وزارة العمل بإلغاء تأشيرات العمل المؤقت غير المستخدمة بعد سنة من تاريخ صدورها، أو عند طلب صاحب التأشيرة ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تأشيرة العمل الموسمي هي التأشيرة التي تصدر للدخول إلى المملكة لمدة مؤقتة، ولعمل محدد خاص بموسم الحج، وغير مصرح لحاملها بالحج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1 - تكون صلاحية الاستفادة من تأشيرة العمل الموسمي لموسم الحج الذي صدرت لأجله.2 - مدة الإقامة لتأشيرة العمل الموسمي أربعة أشهر حدًّا أعلى، غير قابلة للتمديد، أو تحويلها إلى تأشيرة عمل دائم.3 - لا يسمح بدخول حاملي تأشيرات العمل الموسمي إلى المملكة قبل اليوم الأول من شهر شوال، ويكون آخر يوم لدخولهم هو نهاية شهر ذي القعدة، بحيث لا تتجاوز مدة الإقامة نهاية شهر محرم.4 - يقدم طالب تأشيرة العمل الموسمي تأميناً إلى وزارة العمل مقداره (2000) ألفا ريـال عن كل عامل؛ لمواجهة تكاليف إعادته إلى بلده، ويسترجع هذا التأمين إذا زودت وزارة العمل بما يثبت مغادرة العامل إلى بلده، أو إلغاء التأشيرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تقوم وزارة العمل بإلغاء تأشيرات العمل الموسمي غير المستخدمة في اليوم الأول من شهر ذي الحجة من كل عام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على الجهات التي يصدر منها التأييد لتأشيرات العمل الموسمي الإبلاغ عن التأييد قبل نهاية شهر شعبان من كل عام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تقوم وزارة العمل بإرسال تأشيرات العمل الموسمي التي وافقت عليها إلى وزارة الخارجية في موعد أقصاه نهاية شهر شوال من كل عام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: '1 - يجب على صاحب العمل أو من يمثله تقديم عقدِ عملٍ - موقع من طرفي العقد - لممثليات المملكة في الخارج ضمن مسوغات طلب التأشير للعمالة الموسمية. 2 - تدون السفارات عبارة: (غير صالحة للحج) بجانب تأشيرة العمل الموسمي باللغة العربية، أو الإنجليزية في الدول غير الناطقة بالعربية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تصدر وزارة العمل تأشيرات الأعمال المؤقتة والموسمية، وفق الضوابط والشروط التي تقرها الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تختص وزارة العمل بدراسة طلبات هذه التأشيرات، وتحديد أعدادها، وأنواع المهن وشروطها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يكون الحصول على هذه التأشيرات بناءً على خطاب تأييد من الجهة المشرفة على النشاط، أو المشروع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'مع مراعاة ما تصدره وزارة العمل من ضوابط وشروط في هذا الشأن؛ على طالب تأشيرة الأعمال المؤقتة والموسمية - أو ممثله - الالتزام بما يأتي: 1 - تحديد عنوانه الدائم، أو عنوانه للعمل الموسمي أو المؤقت.2 - تقديم نسخة من عقد العمل للجهة التي أيدت طلب التأشيرات (طالبة الخدمة)؛ للاستفادة منها في الطلبات اللاحقة أو تقويم هذه المنشأة، ونسخة من عقد العمل للعامل، ويحتفظ صاحب العمل أو ممثله بأصل العقد.3 - تزويد الجهات الآتية بأسماء العمالة المستقدمة، ومهنهم، وأرقام جوازات سفرهم: أ - جوازات المنفذ الجوي، أو البري، أو البحري.ب - الجهة المؤيدة لطلبه (طالبة الخدمة).ج - مكتب العمل المختص.ويحتفظ صاحب العمل بنسخة لمتابعة مغادرة عماله.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: على وزارة العمل - بالتنسيق مع وزارة الداخلية - متابعة العمالة المؤقتة والموسمية، والتأكد من عملها فيما استقدمت له، وتبادل المعلومات عن الشركات والمؤسسات التي لا يعمل مستقدموها في العمل الذي استقدموا من أجله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: السادسة عشرة
  article_text_ar: 'يعاقب من يخالف أحكام هذه اللائحة وفق الآتي: 1 - كل من يثبت بيعه تأشيرة عمل مؤقت أو موسمي يعاقب بما يأتي: أ - غرامة مالية لا تقل عن (5000) خمسة آلاف ريـال، ولا تزيد على (15000) خمسة عشر ألف ريـال، وتتعدد العقوبة بتعدد التأشيرات التي بيعت.ب‌ - استرداد جميع المبالغ التي حصل عليها بسبب هذه المخالفة.ج - منعه من دخول المنافسات الخاصة بالأعمال المؤقتة أو الموسمية لمدة خمس سنوات. 2 - إذا ثبت عدم صحة العنوان الذي قدمه طالب تأشيرات الأعمال المؤقتة أو الموسمية أو ممثله المسؤول، سواء العنوان الدائم، أو عنوانه للعمل الموسمي أو المؤقت وفق الفقرة (1) من المادة (الرابعة عشرة) من هذه اللائحة؛ فيعاقب صاحب العمل بغرامة لا تقل عن (4000) أربعة آلاف ريـال، ولا تزيد على (8000) ثمانية آلاف ريـال.3 - إذا لم يقدم صاحب العمل نسخة من عقود العمل للجهة المؤيدة لطلب التأشيرات وفق الفقرة (2) من المادة (الرابعة عشرة) من هذه اللائحة؛ يعاقب بغرامة مقدارها (100) مائة ريـال عن كل عقد عمل لم يقدم نسخته.4 - إذا لم يقدم صاحب العمل بيانات بالعمال الموسميين للجهات الواردة في الفقرة (3) من المادة (الرابعة عشرة)
    من هذه اللائحة؛ يعاقب بغرامة لا تقل عن (5000) خمسة آلاف ريـال، ولا تزيد على (10000) عشرة آلاف ريـال.5 - يعاقب من يخالف حكم الفقرة (1) من المادة (العاشرة) من هذه اللائحة؛ بغرامة لا تقل عن (1000) ألف ريـال عن كل تأشيرة، ولا تزيد على (5000) خمسة آلاف ريـال.6 - كل من يخالف أي حكم من أحكام هذه اللائحة لم يرد في شأنه حكم خاص بالعقوبة في الفقرات السابقة؛ يعاقب بغرامة لا تقل عن (500) خمسمائة ريـال، ولا تزيد على (1000) ألف ريـال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تتولى وزارة العمل (الإدارة العامة للتفتيش) التحقيق في مخالفات اللائحة التي يضبطها مفتشو الوزارة في جميع منافذ الدخول والمشاعر المقدسة، أو المخالفات التي تحيلها إليها هيئة الرقابة والتحقيق والجهات الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تشكل بقرار من وزير العمل لجنة في وزارة العمل من ثلاثة أعضاء، يكون أحدهم مؤهلاً تأهيلاً نظامياً؛ للنظر في المخالفات التي تُضبط، والتوصية بإيقاع عقوبة أو أكثر من العقوبات المنصوص عليها في المادة (السادسة عشرة) من هذه اللائحة بحق المخالفين، وتعتمد توصياتها بقرار من وزير العمل، ولصاحب الشأن التظلم من القرار أمام ديوان المظالم وفقاً لنظامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية، ويعمل بها من تاريخ نشرها، وتحل محل اللائحة التنظيمية لتأشيرات الأعمال المؤقتة والموسمية، الصادرة بقرار مجلس الوزراء رقم (325) وتاريخ 1428/11/2هـ، وتلغي كل ما يتعارض معها من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/793145a2-986b-4df3-b95d-a9a700f2bf18/1
  verified: false
