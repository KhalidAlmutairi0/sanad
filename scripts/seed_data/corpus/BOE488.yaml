articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها ما لم يقتض السياق خلاف ذلك: الهيئة: الهيئة الملكية لمحافظة العُلا. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. المحافظ: محافظ الهيئة. المحافظة: محافظة العُلا الواقعة ضمن الحدود الإدارية المحددة بموجب الأنظمة والتنظيمات. المجالات المحددة: جميع الأنشطة المتعلقة بالصحة والسلامة والتعليم والتدريب الفني والمهني والعمل والفعاليات والإعلام والرياضة والفروسية والعقار والاستثمار المحلي والأجنبي والتجارة والصناعة والملكية الفكرية والبنية التحتية والمحاجر والمجالات الاجتماعية، وغيرها من المجالات التنموية والخدمية والأعمال والخدمات والمشروعات المرتبطة بها، باستثناء المجالات الأمنية. النطاق الجغرافي: المحافظة، والمواقع التراثية والثقافية في محافظة خيبر وقلعة المعظَّم وأي مواقع أخرى خارج حدودها تضاف إلى اختصاص الهيئة لاحقاً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري وترتبط تنظيمياً برئيس مجلس الوزراء. تتمتع الهيئة بالمرونة والصلاحيات التي تمكنها من القيام بمهامها، وذلك وفقاً للوائحها المالية والإدارية وما يقره المجلس من تعليمات. يكون المقر الرئيس للهيئة في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة، وخارجها بحسب ما يقره المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تختص الهيئة في الأنشطة المتعلقة بالسياحة والثقافة والفنون والآثار والمتاحف والتراث العمراني والبيئة والمياه والزراعة والحياة الفطرية والمحميات الطبيعية والشؤون البلدية والقروية والترفيه الواقعة في حدود النطاق الجغرافي. تهدف الهيئة إلى تطوير المحـافظة والارتقـاء بالأعمـال والخـدمـات ذات الصلة بالأنشطة التي تقع ضمن اختصـاص الهيئة وبالمجـالات المحـددة وغيـرها مـن المجـالات التنـمـوية والخـدميـة الأخرى الواقعـة في حـدود النطاق الجغـرافي، وذلك بما يتناسب مع قيمة المحافظة التاريخية وما تحتويه من مواقع أثرية وطبيعية، وبما يكفل تزويد المواطنين والمقيمين والزوار بأعلى مستوى من الخدمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تُعدّ الهيئة السلطة العليا المهيمنة على ما يقدم من أعمال وخدمات ومشروعات في حدود النطاق الجغرافي ولها الإشراف الكامل عليها بما في ذلك ما يرتبط بها من جوانب إدارية وتشغيلية، وتقوم - في سبيل ذلك - بكل ما يلزم لتحقيق أهدافها، ولها على وجه خاص ما يلي: رسم السياسات العامة لتنمية وتطوير النطاق الجغرافي. اعتماد المخطط العام وكود البناء للنطاق الجغرافي. اعتماد الخطط والبرامج لتطوير النطاق الجغرافي. الإشراف على المشاريع والبرامج والأنشطة والفعاليات في النطاق الجغرافي. إدارة وتطوير الأنشطة التي تقع ضمن اختصاص الهيئة والأنشطة المتعلقة بالمجالات المحددة في حدود النطاق الجغرافي. وللهيئة إدارة وتطوير تلك الأنشطة بمفردها أو بالتعاون مع الغير. إنشاء مراكز ترتبط تنظيمياً بالهيئة لتولي تنفيذ بعض اختصاصات الهيئة ومهامها، وترتیب أوضاعها المالية والإدارية بما في ذلك منح تلك المراكز الاستقلال المالي والإداري عن الهيئة، وتحديد وسائل وآليات تنفيذ اختصاصاتها ومهامها؛ وذلك شريطة أن تكون ميزانية تلك المراكز من ضمن الميزانية المخصصة للهيئة. إصدار التراخيص والتصاريح وسحبها وإلغاؤها، ووضع ما يلزم
    من ضوابط واشتراطات خاصة، وإيقاف العمل بها كلياً أو جزئياً، بشكل دائم أو مؤقت وذلك فيما يتعلق بالأنشطة التي تختص فيها الهيئة في النطاق الجغرافي؛ وفقاً للإجراءات النظامية اللازمة. مراقبة الكيانات فيما يتعلق بالأنشطة التي تقع ضمن اختصاص الهيئة والتي تقوم بها تلك الكيانات في النطاق الجغرافي لضمان امتثالها لأحكام التنظيم والقرارات الصادرة بموجبه وكذلك امتثالها للأنظمة واللوائح التي تكون من اختصاص الهيئة. إعداد وإقرار وتنفيذ ومراجعة وتخطيط وتحديث ومتابعة وثيقة تطوير المحافظة، والتي تشتمل على الآتي: أ- الدراسات الأساسية اللازمة لتطوير النطاق الجغرافي. ب- الخطط والبرامج والمبادرات وأية حقوق متعلقة بتطوير النطاق الجغرافي والتي تشمل - على سبيل المثال لا الحصر- ما يتعلق بالمشاريع المشتركة، والاستثمار المشترك ومشاريع الشراكة بين القطاعين العام والخاص. ج- المشاريع الإنشائية اللازمة لتطوير النطاق الجغرافي بما يشمل البنى التحتية والمناطق العمرانية والمواقع الأثرية والتراثية والسياحية والمعارض والمتاحف والمحميات الطبيعية ومشاريع الحياة الفطرية والفنادق والمنتجعات ومرافق الإيواء السياحي الأخرى. تشجيع
    الاستثمار في النطاق الجغرافي وتسهيله من خلال إيجاد فرص الشراكة أو الاستثمار المباشر من خلال شراكات مع المستثمرين من القطاعين العام والخاص، والصناديق الاستثمارية، والمؤسسات المحلية والدولية. تأسيس الكيانات غير الربحية والشركات داخل المملكة وخارجها، والمشاركة فيها بمفردها أو مع الغير، وشراء وبيع الحصص والأسهم والمصالح في الشركات أو المشاريع المشتركة. تقديم الضمانات المتعلقة بالتزامات وقروض المنشآت المملوكة للهيئة والرفع بها لاستكمال الإجراءات النظامية. منح القروض للشركات المملوكة للهيئة بالكامل. تنسيق الجهود والتعاون وتبادل المعلومات بين الوزارات والجهات الحكومية الأخرى في المملكة لتحقيق أهدافها. تملك العقار والتصرف فيه. تقديم التبرعات والهبات والشراء والبيع والانتفاع والرهن والحكر والوقف والإقطاع والإيجار مهما كانت المدة للعقارات والممتلكات الثابتة والمنقولة والأصول الأخرى، وتحويل ونقل الحقوق المتعلقة بها. الاستعانة بمن تراه من مراكز الدراسات والتخطيط والكوادر المتخصصة وبيوت الخبرة والخبراء والمستشارين. التعاون وتبادل الخبرات مع الهيئات والمنظمات الإقليمية والدولية، داخل المملكة وخارجها.
    تمثيل المملكة في الهيئات والمنظمات الإقليمية والدولية ذات العلاقة. إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة بأنشطتها مع الجهات المعنية في الدول والمنظمات الدولية. إقامة الفعاليات والمعارض المحلية والدولية أو المشاركة فيها فيما يتعلق بالأنشطة التي تقع ضمن اختصاصاتها وتلك المتعلقة بالمجالات المحددة بالنطاق الجغرافي، وذلك بالتنسيق مع الجهات ذات العلاقة. طلب أية معلومات أو بيانات أو تقارير- من الوزارات والأجهزة الحكومية الأخرى- تتطلبها طبيعة أعمال الهيئة وخدماتها ومشروعاتها؛ واتخاذ ما تراه في شأنها في ضوء أهداف الهيئة والرفع بما يلزم حيال ذلك. إبرام مذكرات تفاهم مع الوزارات والأجهزة الحكومية التي تعمل في النطاق الجغرافي؛ للتنسيق حول تنفيذ الأعمال والخدمات وعمليات منح وإلغاء الموافقات والتراخيص والتصاريح وفرض الغرامات والمخالفات، ولها في سبيل ذلك اقتراح التعديلات على اللوائح والإجراءات لتلك الوزارات والأجهزة الحكومية فيما يخص أعمالها وخدماتها في النطاق الجغرافي. أية مهام أخرى لتحقيق الأهداف التي أنشئت من أجلها الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: على جميع الوزارات والأجهزة الحكومية الأخرى- التي تمارس أعمالاً أو تقدم خدمات تتعلق بالمجالات المحددة في النطاق الجغرافي- تنفيذ ما تصدره الهيئة من قرارات وتعليمات. للهيئة أن تقوم بمباشرة الأعمال والخدمات المشار إليها في الفقرة (1) من هذه المادة بمفردها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يكون للهيئة مجلس إدارة يعين رئيسه وأعضاؤه بأمر من رئيس مجلس الوزراء، ويختار المجلس بعد تعيينه أميناً له من بين أعضائه أو من غيرهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يعد المجلس السلطة العليا للهيئة، ومسؤولاً عن إدارة شؤونها وتصريف أعمالها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها، واختيار الأسلوب الذي يراه مناسباً لذلك، وله على وجه الخصوص ما يأتي: إقرار السياسات العامة للهيئة، وخطة عملها، وخططها التشغيلية. إقرار وثيقة تطوير المحافظة ورفع ما يلزم منها بحسب الإجراءات النظامية. الموافقة على إبرام الاتفاقيات والعقود التي تكون الهيئة طرفاً فيها بما فيها عقود التمويل للمشروعات الداخلة في نطاق اختصاصات الهيئة وذلك بحسب الإجراءات النظامية، وللمجلس تقديم المبالغ المتحصلة من المقابل المالي المشار إليه في الفقرة (19) من هذه المادة ضماناً لتلك العقود. إقرار اللوائح التنفيذية والقواعد التي يسري بها العمل في النطاق الجغرافي فيما يتعلق بالأنشطة التي تدخل ضمن اختصاصات الهيئة وإصدار القرارات والسياسات والإجراءات والأحكام المرتبطة بها لتحقيق أهدافها وأداء مهماتها بموجب التنظيم، وتنفيذ أية مهمات أخرى تتفق مع طبيعة عملها أو الغرض الذي أنشئت من أجله. الموافقة على اللوائح والقواعد والتعاميم والتعليمات والأحكام فيما يخص المجالات المحددة والرفع بها لاستكمال
    الإجراءات النظامية اللازمة بشأنها. اقتراح مشروعات الأنظمة واقتراح تعديل المعمول به منها ورفعها لاستكمال ما يلزم من إجراءات نظامية بشأنها. إقرار الهيكل التنظيمي للهيئة. إقرار لوائح عمل المجلس ولجانه. تعيين الرئيس التنفيذي للهيئة - بناءً على ترشيح المحافظ- وتحديد أجره ومزاياه. إقرار اللوائح المالية والإدارية للهيئة، بما في ذلك اللوائح المتعلقة بشؤون منسوبيها وتأمين مشترياتها وتنفيذ مشروعاتها. إقرار ضوابط تعيين منسوبي الهيئة وغيرهم في مجالس إدارات الشركات والكيانات الأخرى التي تمتلكها الهيئة أو تساهم فيها، وتحديد مكافآتهم وحقوقهم وواجباتهم تجاه الهيئة. إقرار ميزانية الهيئة، ورفعها وفقاً للإجراءات النظامية. إقرار الحساب الختامي للهيئة والتقرير السنوي وتقرير مراجع الحسابات، تمهيداً لرفعها وفقاً للإجراءات النظامية. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. الموافقة على تنظيم ما يتصل بعقارات الدولة الواقعة في النطاق الجغرافي من بيع وشراء أو تأجير أو استثمار أو انتفاع أو وقف وله إقرار ما يراه مناسباً من قواعد أو ضوابط تتصل بذلك. إقرار ضوابط البناء واستعمالات الأراضي ومخططات الأراضي وتقسيمها.
    الموافقة على الاستثمار وشراء وبيع الحصص والأسهم لصالح الهيئة وتأسيس الشركات أو المساهمة في تأسيسها أو الدخول فيها شريكاً أو زيادة رأس المال فيها، ومنح القروض والضمانات للشركات المملوكة للهيئة أو التي تمتلك الهيئة حصصاً فيها. الموافقة على الاستحواذ، وتملك الأراضي وكافة أنواع التصرف فيها من بيع وشراء وقيد وانتفاع ورهن وحكر ووقف وإقطاع وإيجار للعقارات والأصول الثابتة والمنقولة، لصالح الهيئة والموافقة على تحويل ونقل الحقوق المتعلقة بها للغير. تحديد المقابل المالي نظير التراخيص والتصاريح التي تصدرها الهيئة وما تقدمه الهيئة من أعمال وخدمات في النطاق الجغرافي. إقرار اللوائح التي تحدد قيمة الغرامات على الأشخاص والكيانات القانونية المخالفة لأحكام الأنظمة لكافة الأنشطة التي تكون من اختصاص الهيئة على ألا يتجاوز مقدار الغرامة الحد الأقصى المقرر نطاماً. الموافقة على قبول التبرعات والهبات والوصايا والأوقاف والإعانات التي تقدم للهيئة. الموافقة على تقديم التبرعات والهبات والوصايا والأوقاف والإعانات للمنشآت الخيرية ومبادرات التنمية المجتمعية. وللمجلس، في سبيل ممارسة هذه الاختصاصات تشكيل لجان - يعهد إليها
    بما يراه من مهمات - دائمة أو مؤقتة من أعضائه أو من سواهم من خبراء محليين ودوليين، ويحدّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها ومكافآتهم، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكلة إليها. وللمجلس تفويض كل اختصاصاته وصلاحياته - أو بعضها - إلى الرئيس أو المحافظ أو إلى من يراه من أعضائه أو منسوبي الهيئة أو من غيرهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجتمع المجلس مرة واحدة كل ثلاثة أشهر على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو إذا طلب ذلك ثلث أعضائه على الأقل، وللرئيس أن ينيب من يراه من أعضاء المجلس لرئاسة الاجتماعات في حال غيابه، وتوجه الدعوة للاجتماع من الرئيس، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء، بمن فيهم الرئيس أو من ينيبه. وتصدر القرارات بأغلبية أصوات الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز للمجلس أن يصدر قراراته بالتمرير، وذلك وفقاً للائحة يصدرها المجلس لتنظيم أعماله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يكون للهيئة محافظ- بمرتبة وزير- يعين بأمر ملكي، ويعد المسؤول عن إدارة شؤونها، وتتركز مسؤولياته في حدود التنظيم، وما يقره المجلس في حدود اختصاصه، ويتولى الصلاحيات والمهام الآتية: تنفيذ قرارات المجلس. إعداد السياسات العامة للهيئة، وخطة عملها، وخططها التشغيلية، ورفعها إلى المجلس، ومتابعة تنفيذها بعد موافقة المجلس عليها. الإشراف على سير العمل في الهيئة من خلال اللوائح والبرامج المعتمدة. اقتراح الهيكل التنظيمي للهيئة، ولوائحها المالية والإدارية، بما في ذلك اللوائح المتعلقة بشؤون منسوبيها وتأمين مشترياتها وتنفيذ مشروعاتها ورفعها للمجلس. إعداد اللوائح والقواعد والتعاميم والتعليمات للأنشطة التي تكون من اختصاص الهيئة في حدود النطاق الجغرافي والرفع بها للمجلس. إعداد وثيقة تطوير المحافظة، بما يسهم في تطوير النطاق الجغرافي وتحقيق أهداف الهيئة ورفعها للمجلس. تعيين العاملين في الهيئة، والإشراف عليهم طبقاً للصلاحيات الممنوحة له وما تحدده اللوائح. إصدار الأوامر بمصروفات الهيئة بموجب الميزانية السنوية المعتمدة. فتح الحسابات المصرفية لصالح الهيئة، وإدارتها. تقديم تقارير دورية إلى المجلس
    عن أعمال الهيئة وإنجازاتها ونشاطاتها. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في صلاحيات المجلس. التوقيع على الاتفاقيات والعقود التي يمنحه المجلس الصلاحية بتوقيعها. الإشراف على إعداد مشروع ميزانية الهيئة، وتقريرها السنوي، وحسابها الختامي، وعرضها على المجلس لإقرارها تمهيداً لاستكمال ما يلزم في شأنها. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها داخل المملكة وخارجها. إصدار القرارات اللازمة لتنفيذ أحكام التنظيم وقرارات المجلس، وذلك بحسب الصلاحيات المفوضة له. ما يكلفه به المجلس من مهام وصلاحيات وأعمال. وللمحافظ تفويض كل صلاحياته - أو بعضها - إلى من يراه من منسوبي الهيئة أو من غيرهم. يرفع المحافظ خلال أربعة أشهر من بدء كل سنة مالية تقريراً مالياً سنوياً وتقريراً عن إنجازات الهيئة خلال السنة المالية المنقضية والصعوبات التي واجهتها ومقترحات لتحسين سير العمل فيها إلى المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: على الرغم من أي نصٍ آخر، يكون تحديد مناطق المحميات الطبيعية والمواقع الأثرية والتراثية والأماكن السياحية العامة في النطاق الجغرافي بقرار من المجلس حصراً، ويختص المجلس بإعداد خطط وإجراءات تطوير تلك المناطق والمواقع والأماكن واستثمارها وفق ما يقرره من أحكام وشروط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: للهيئة أن تنشئ في المحافظة مراكز للخدمات الشاملة تخضع لإشراف وإدارة الهيئة، تمثل فيها الهيئة والجهات الحكومية وغيرها من الجهات، وتقدم من خلالها مختلف أنواع الخدمات للمطورين والمشغلين والمستثمرين والعاملين والمواطنين والمقيمين، بحسب احتياجاتها في النطاق الجغرافي. وعلى تلك الجهات تفويض ممثليها بممارسة الصلاحيات التي تضمن سرعة تقديم الخدمات وفق ما يحدده المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: للهيئة أن تنشئ حسب الحاجة - وبما لا يخل باختصاصات الجهات المعنية ذات العلاقة - مراكز للحراسات الأمنية وخدمات الإطفاء والإنقاذ والاستجابة للطوارئ والرعاية الصحية تعمل في النطاق الجغرافي كجهات مسؤولة عن تلك الخدمات أو تعين أية جهة أو جهات حسب ما تراه الهيئة للقيام بهذه المهام. وتقوم الهيئة، وهذه المراكز أو من تعينه الهيئة، بالتنسيق مع الجهات المعنية فيما يتعلق بتلك الخدمات في النطاق الجغرافي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: للهيئة أن تنشئ مركزاً لحماية المواقع الطبيعية والأثرية أو تعين أية جهة من القطاع الخاص حسب ما تراه الهيئة لحماية المواقع الطبيعية والأثرية والحياة الفطرية والمحميات الطبيعية، وذلك لإنفاذ الأنظمة واللوائح التي تقع ضمن اختصاصات الهيئة في النطاق الجغرافي
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: أ- ما يخصص لها من اعتمادات في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير التراخيص والتصاريح وما تقدمه من أعمال وخدمات وما تحصله من غرامات ورسوم. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. د- عوائد استثمارات الهيئة، بما في ذلك توزيعات الأرباح وإعادة سداد قروض الشركاء المستحقة لها من الشركات والكيانات التي تمتلك الهيئة فيها حصصاً أو أسهماً أو وحدات. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع أموال الهيئة في حساب مفتوح لها في مؤسسة النقد العربي السعودي، ولها فتح حسابات أخرى لهذا الغرض في أي من البنوك المرخص لها بالعمل في المملكة، وتحتفظ الهيئة بإيراداتها المالية وتصرف منها على مشروعاتها وفق ما تقرره لوائحها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يخضع منسوبو الهيئة - عدا المحافظ - لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: مع عدم الإخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانياتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود المجلس الديوان العام للمحاسبة بنسخة من التقرير بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجوز للهئية التنازل عن حقوقها والتزاماتها في العقود التي تبرمها مع القطاعات العامة أو الخاصة إلى الشركات أو الكيانات القانونية الأخرى التي تملك الهيئة حصصاً أو أسهماً أو وحدات أو مصلحة مالية فيها. تتمتع الهيئة بالإعفاءات والمزايا المقررة لمصلحة المؤسسات العامة وفقاً للقواعد المتبعة في ذلك. وتعامل الشركات المملوكة للهيئة بالكامل من حيث إعفاء وارداتها من الرسوم الجمركية وفقاً للقواعد المتبعة في شأن واردات المؤسسات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: لا يؤثر صدور التنظيم على حقوق الهيئة والتزاماتها الناشئة قبل تاريخ العمل به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يعمل بهذا التنظيم من تاريخ صدوره، ويلغي جميع ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4d0f16b6-fb15-44e3-b88c-ac4b00e40a6d/1
  verified: false
