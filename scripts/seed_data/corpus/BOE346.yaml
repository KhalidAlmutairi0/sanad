regulation:
  code: BOE346
  name_ar: تنظيم اللجنة الوطنية لمتابعة مبادرة خادم الحرمين الشريفين الملك عبدالله بن عبدالعزيز آل سعود للحوار بين أتباع الأديان والثقافات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تهدف اللجنة الوطنية لمتابعة مبادرة خادم الحرمين الشريفين الملك عبدالله بن عبدالعزيز آل سعود للحوار بين أتباع الأديان والثقافات (ويشار إليها فيما بعد باللجنة الوطنية) إلى متابعة جميع شؤون هذه المبادرة، والنظر في الموضوعات المتصلة بها داخل المملكة وخارجها، بما يكفل تحقيق التناغم والانسجام والتنسيق لجميع جهود المملكة ومشاركاتها في مجال الحوار وموضوعاته، ولها في سبيل ذلك - دون حصر - القيام بالأعمال الآتية: 1 - اقتراح السياسات العامة في مجال الحوار بين أتباع الأديان والثقافات وموضوعاته والبرامج والنشاطات اللازمة لذلك.2 - التنسيق مع المراكز المعنية بالحوار في الداخل والخارج للخروج برؤى استراتيجية ضماناً لتفعيل مخرجاتها. 3 - وضع الخطط اللازمة لتنسيق الجهود بين الجهات العامة والأهلية ذات العلاقة في شأن مجال الحوار وموضوعاته.4 - وضع الخطط اللازمة لتنسيق جهود المملكة في مشاركاتها المتصلة بمبادرات الحوار وموضوعاته على المستويات العربية والإسلامية والدولية، من أجل ضمان التمثيل الفاعل للمملكة في هذه المشاركات.5 - دراسة طلبات عقد المؤتمرات التي ترغب الجهات العامة والأهلية ذات العلاقة
    في تنظيمها في مجال الحوار وموضوعاته.6 - إبداء الرأي حيال مقترحات التعاون والتنسيق مع الدول والمنظمات الدولية في مجال الحوار وموضوعاته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2c8fa0b0-32d4-4fec-9dce-a9a700f1767a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: ترفع توصيات اللجنة الوطنية إلى وزير الخارجية؛ للنظر في اتخاذ ما يراه مناسباً في شأنها، على أن يرفع عما يلزم منها إلى المقام السامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2c8fa0b0-32d4-4fec-9dce-a9a700f1767a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: '1 - تشكل اللجنة الوطنية على النحو الآتي: أوزير الدولة للشؤون الخارجيةرئيساً بالأمين العام لمركز الملك عبدالله بن عبدالعزيز العالمي للحوار بين أتباع الأديان والثقافاتعضواً جالأمين العام لمركز الملك عبدالعزيز للحوار الوطنيعضواً دنائب وزير الثقافة والإعلامعضواً هـممثل من وزارة التعليمعضواً وممثل من وزارة الداخليةعضواً زممثل من رئاسة الاستخبارات العامةعضواً حممثل من وزارة الشؤون الإسلامية والأوقاف والدعوة والإرشاد عضواً 2 - يجب ألا تقل مراتب ممثلي الجهات الواردة في الفقرات (هـ، و، ز، ح) عن المرتبة الخامسة عشرة أو ما يعادلها.3 - يكون لرئيس اللجنة الوطنية نائب يختاره الرئيس من بين أعضائها. 4 - للجنة الوطنية أن تشكل لجاناً دائمة أو مؤقتة من بين أعضائها أو من غيرهم، وتعهد إليها بما تراه من مهمات. ويحدد قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ولها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.5 - للجنة الوطنية الاستعانة بمستشارين ومتخصصين ودور استشارية متخصصة.6 - للجنة الوطنية - عند دراسة موضوعات تتعلق بجهة عامة غير ممثلة في اللجنة أو جهة أهلية - الاستعانة بممثلين مختصين
    عن تلك الجهة، دون أن يكون لهم حق التصويت.7 - تكون المخاطبات بين اللجنة الوطنية والجهات العامة عن طريق وزير الخارجية، وتكون المخاطبات بينها وبين الجهات الأهلية عن طريق رئيس اللجنة ما لم ير وزير الخارجية غير ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2c8fa0b0-32d4-4fec-9dce-a9a700f1767a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 1 - تعقد اللجنة الوطنية اجتماعاتها في مقر مركز الملك عبدالعزيز للحوار الوطني، ويجوز عقد الاجتماع في أي مكان آخر بموافقة رئيس اللجنة. وتعقد اللجنة الوطنية اجتماعاتها بشكل دوري، على ألا تقل عن أربعة اجتماعات في السنة، ويعد الاجتماع صحيحاً إذا حضره أكثر من نصف الأعضاء، على أن يكون من بينهم رئيس اللجنة أو نائبه. وتصدر اللجنة توصياتها بأغلبية أصوات الأعضاء الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.2 - يوجه رئيس اللجنة الوطنية الدعوة كتابة إلى جميع الأعضاء قبل التاريخ المحدد للاجتماع بعشرة أيام على الأقل مصحوبة بجدول الأعمال وصور من الوثائق ذات الصلة. ويجوز للرئيس لظروف تتطلب السرية التامة عدم توزيع مواد مكتوبة لموضوع محدد قبل انعقاد الاجتماع. 3 - للجنة الوطنية عقد اجتماعات استثنائية بطلب من الرئيس أو طلب ما لا يقل عن ثلاثة من الأعضاء، وفي هذه الحالة يجوز توجيه الدعوة بأي وسيلة اتصال مناسبة، ويقتصر جدول أعمال الاجتماع على مناقشة الموضوعات المحددة في الدعوة فقط.4 - لرئيس اللجنة الوطنية في الحالات الضرورية التي تستوجب اتخاذ توصيات عاجلة ويتعذر فيها عقد
    الاجتماع حضورياً؛ أن يطلب التصويت على التوصيات بوساطة وسيلة اتصال مناسبة، ويشترط عندئذ موافقة جميع أعضاء اللجنة على التوصيات كتابة، على أن يتم إثباتها في محضر أول اجتماع لاحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2c8fa0b0-32d4-4fec-9dce-a9a700f1767a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1 - يكون للجنة الوطنية أمانة مقرها مركز الملك عبدالعزيز للحوار الوطني، ويكون للجنة أمين متفرغ يجري تعيينه بقرار من اللجنة بناءً على ترشيح الرئيس، ويرتبط برئيس اللجنة. 2 - تقوم الأمانة بالأعمال الإدارية، والمساندة الفنية لأعمال اللجنة الوطنية واللجان المنبثقة منها، وبخاصة ما يأتي: أ - إعداد وتحضير جداول أعمال اجتماعات اللجنة الوطنية، واللجان المنبثقة منها، وإبلاغ الأعضاء بموعدها ومكانها والموضوعات المطروحة، وتزويدهم بصور الوثائق ذات الصلة. ب - متابعة تنفيذ أعمال اللجنة الوطنية، وإعداد التقارير الدورية اللازمة، ورفعها إلى رئيس اللجنة. جـ - تسجيل المداولات والمناقشات والتوصيات التي تتم في اجتماعات اللجنة الوطنية، واللجان المنبثقة منها، وإعداد محاضر تلك الاجتماعات. د - إعداد ملفات اللجنة الوطنية واللجان المنبثقة منها وتنظيمها وحفظها. هـ - توفير الوثائق والمصادر والمراجع الضرورية التي تحتاج إليها اللجنة الوطنية، واللجان المنبثقة منها، وتزويدها بالمراسلات والاتصالات وكل ما يتعلق بأعمالها. و - القيام بأعمال الشؤون الإدارية والمالية والسكرتارية للجنة الوطنية، واللجان المنبثقة
    منها، واتخاذ الإجراءات الإدارية والمالية اللازمة. ز - أي عمل آخر يكلفها به رئيس اللجنة الوطنية أو رؤساء اللجان المنبثقة منها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2c8fa0b0-32d4-4fec-9dce-a9a700f1767a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يكون للجنة الوطنية إعانة سنوية تعتمد ضمن ميزانية مركز الملك عبدالعزيز للحوار الوطني في فرع مستقل يخصص لها، ويصرف منها - وفق ضوابط تقترحها اللجنة ويعتمدها وزير الخارجية - على أعمال اللجنة، واللجان المنبثقة منها، ومكافآت أعضائها وأمانتها والدور الاستشارية والمستشارين وفقاً للأنظمة واللوائح المالية المعمول بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2c8fa0b0-32d4-4fec-9dce-a9a700f1767a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2c8fa0b0-32d4-4fec-9dce-a9a700f1767a/1
