articles:
- article_ref: المادة الأولى
  article_text_ar: يهدف هذا النظام إلى تنظيم تربية النحل .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: 'المادة الثانية :  تعريفات'
  article_text_ar: 'يقصد بالعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها ما لم يقتضِ السياق خلاف ذلك: الوزارة : وزارة الزراعة . الوزير : وزير الزراعة . الجهات ذات العلاقة : أي جهة أخرى لها علاقة بهذا النظام . النحال : كل من يقوم بالتربية والرعاية لمجموعة من طوائف النحل . مهنة تربية النحل : مزاولة نشاط رعاية طوائف النحل، واستغلالها في إنتاج منتجات النحل أو في إكثار النحل وإنتاج الطرود أو في تلقيح المحاصيل . نحل العسل : هو الذي يعيش معيشة اجتماعية في طوائف (جماعات) . أدوات النحل : أدوات يستعملها النحال داخل الخلايا أو خارجها للمساعدة في تنفيذ عمليات النحالة المختلفة . الحمولة الرعوية : نسبة عدد طوائف النحل إلى عدد الأشجار في مساحة معينة . المراعي النحلية : المواقع التي تنتشر فيها النباتات والأشجار المناسبة لرعي النحل، وتكون مصدرا للرحيق وحبوب اللقاح . المحمية الطبيعية : مساحة من الأرض مملوكة للدولة، وتتمتع بحماية خاصة للحياة البرية بها . سلالة النحل المحلي (البلدي) : سلالة النحل المتركزة جنوب غرب الجزيرة العربية ، وتقع - تقسيميا - تحت نوع نحل العسل العالمي . النظام
    : نظام تربية النحل . اللائحة : اللائحة التنفيذية للنظام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتولى الوزارة الإشراف العام على مهنة تربية النحل، والعمل على حمايتها ، ووضع الخطط والبرامج والخدمات الإرشادية ، والتعاون - في سبيل تحقيق ذلك - مع الجهات ذات العلاقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تلتزم الجهات ذات العلاقة بالتعاون مع الوزارة في كل ما من شأنه دعم العاملين في مهنة تربية النحل وحمايتهم وتشجيعهم، ومن ذلك ما يأتي: 1 ـ تقديم أي معلومة أو تسهيلات تساعد الوزارة في تحقيق أهداف هذا النظام .2 - إعطاء الأهمية اللازمة لتنفيذ ما يوكل إليها من برامج ووسائل مادية أو معنوية لدعم مهنة تربية النحل والعاملين فيها .3 ـ اتخاذ الإجراءات والتدابير اللازمة لمنع الضرر على المناحل عند مكافحة الآفات المؤثرة على الإنسان أو الحيوان أو النباتات .4 ـ المساهمة في تطبيق إجراءات الحجر الزراعي في حالة قيام الوزارة بإعلان منطقة ما منطقة حجر زراعي .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1 ـ تتولى الوزارة منح تراخيص إنشاء المناحل التقليدية أو الحديثة للأفراد والمشروعات بعد استكمال الشروط وفقا لما تحدده اللائحة .2 ـ تحدد الوزارة احتياجات مشروعات النحل من العمال ، وتفتش على جميع مشروعات المناحل للتأكد من التزامها بالنظام ولائحته .3 - تتولى الوزارة إصدار تصاريح مزاولة مهنة تربية النحل .4 - تقوم الوزارة بوضع برامج توعية في كل ما يخص مهنة تربية النحل .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يلتزم النحال بالإبلاغ عن أي مرض أو آفة تشكّل تهديدا لطوائف النحل، ويتخذ الإجراءات اللازمة للمكافحة وفقا لما تحدده اللائحة . وتتولى الوزارة اتخاذ الإجراءات الضرورية عند اكتشاف مرض أو آفة جديدة تهدد النحل ، ومنها:1 ـ تحديد منطقة ظهور المرض أو الآفة منطقة حجر، والإعلان عن ذلك، وتوعية أصحاب الشأن.2 ـ وضع برنامج مكافحة لاستئصال المرض أو الآفة، والإشراف على تطبيقه.3 ـ توفير المبيدات ، وأدوات النحالة ، وتوزيعها مجانا على النحّالين .4 ـ في الحالات التي تنشا فيها مشكلات طارئة أو غير متوقعة قد تهدد مهنة تربية النحل بشكل كبير ، تتخذ الوزارة إجراءات فورية للقضاء على التهديد أو الحد منه .5 ـ الإعلان عند انتهاء التهديد أو الحد منه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تتولى الوزارة - بالتعاون مع الجهات ذات العلاقة - منح تصريح استيراد النحل وتصديره ، ومواد التغذية ، والعلاج ، وأدوات النحالة ، وكذلك منح رخصة مزاولة بيع النحل وأدواته، وتصنيعها ، ومراقبة أسواق منتجات النحل .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على النحال - عند إبلاغ الوزارة له بمواعيد الرش - أن يتخذ جميع الاحتياطات اللازمة لحماية النحل من التسمم بالمبيدات، وعليه كذلك الاتصال بأقرب فرع للوزارة لمعرفة برنامج الرش بالمبيدات الذي تحدده الوزارة والجهات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يمنع استخدام المبيدات الكيميائية أو المضادات الحيوية - سواء المصرح بها أو غير المصرح بها - في مكافحة أمراض أو آفات النحل أثناء مواسم تزهير النباتات، وكذلك يمنع استخدام مبيدات أمراض النحل وآفاته، والمضادات الحيوية غير المخصصة للاستخدام داخل خلايا النحل ، وفقا لما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تعمل الوزارة على حماية المراعي النحلية ، وتنظيم المناحل وعمليات التغذية فيها ، والتنسيق مع الجهات ذات العلاقة فيما يتعلق بدخول المناحل للمحميات الطبيعية وفقا لما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تعمل الوزارة على المحافظة على سلالة النحل المحلي، وتطويرها، والتعاون مع الجهات ذات العلاقة وفقا لما تحدده اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'مع عدم الإخلال بما يقضي به نظام الهيئة العامة للغذاء والدواء ، تتولى الوزارة ما يأتي: 1 - تسجيل المبيدات الخاصة بأمراض النحل وآفاته ومواد التغذية والمنشطات ومراقبة استخدامها.2 - إصدار تعليمات لمنتجي ومتداولي منتجات النحل فيما يخص الفرز، والتعبئة، والتغليف والعرض، وذلك بعد التنسيق مع الجهات ذات العلاقة .3 - تسجيل جميع المواد المستخدمة داخل خلايا النحل .4 - التنسيق مع الجهات المعنية في مكافحة الغش في منتوجات النحل .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون الإخلال بأي عقوبة أشد منصوص عليها في أنظمة أخرى ، يعاقب كل من تثبت مخالفته أي حكم من أحكام هذا النظام بعقوبة أو أكثر من العقوبات التالية:1 - الإنذار .2 ـ غرامة مالية لا تزيد على عشرة آلاف ريال .3 - وقف الترخيص بمزاولة النشاط لمدة لا تزيد عن سنة .4 - إلغاء الترخيص .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تكوّن في الوزارة لجنة من ثلاثة أعضاء على الأقل، يكون بينهم مستشار نظامي وآخر مختص في مجال النحل ؛ للنظر في مخالفات أحكام هذا النظام وتقرير العقوبات المناسبة، ويعتمد الوزير قرارات اللجنة. ويجوز التظلم من قرار العقوبة أمام ديوان المظالم خلال ستين يوما من تاريخ إبلاغ من صدر ضده القرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام بعد التنسيق مع الجهات ذات العلاقة ، وذلك خلال تسعين يوما من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ، ويعمل به بعد تسعين يوما من تاريخ نشره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a5fa054e-a124-4cce-96a2-a9a700f254a0/1
  verified: false
