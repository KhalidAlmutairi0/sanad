articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني الموضحة أمام كل منها، ما لم يقتض السياق خلاف ذلك : 1 - غسل الأموال : ارتكاب أي فعل أو الشروع فيه، يقصد من ورائه إخفاء أو تمويه أصل حقيقة أموال مكتسبة خلافاً للشرع أو النظام وجعلها تبدو كأنها مشروعة المصدر. 2 - الأموال : الأصول أو الممتلكات أيًّا كانت قيمتها أو نوعها مادية أو غير مادية، ملموسة أو غير ملموسة، منقولة أو غير منقولة، والوثائق والصكوك والمستندات أيًّا كان شكلها بما في ذلك النظم الإلكترونية أو الرقمية والائتمانات المصرفية التي تدل على ملكية أو مصلحة فيها بما في ذلك على سبيل المثال لا الحصر جميع أنواع الشيكات والحوالات والأسهم والأوراق المالية والسندات والكمبيالات وخطابات الاعتماد. 3 - المتحصلات : أي مال مستمد أو حصل عليه بطريق مباشر أو غير مباشر من ارتكاب جريمة من الجرائم المعاقب عليها وفقاً لأحكام الشريعة أو هذا النظام أو تم تحويله أو تبديله كليًّا أو جزئيًّا إلى أصول أو ممتلكات أو عائدات استثمارية. 4 ـ الوسائط : كل ما استخدم أو أعد للاستخدام بأي شكل في ارتكاب جريمة من الجرائم المعاقب عليها
    وفقاً لأحكام الشريعة أو هذا النظام. 5 ـ المؤسسات المالية: أي منشأة في المملكة تزاول واحداً أو أكثر من الأنشطة المصرفية وتحويل الأموال وتبديل العملات والاستثمار وأعمال الأوراق المالية والتأمين والتمويل، وتوضح اللائحة التنفيذية لهذا النظام الأنشطة المالية التي تزاولها هذه المنشأة. 6 - الأعمال والمهن غير المالية المحددة : أي منشأة في المملكة تزاول واحداً أو أكثر من الأنشطة التجارية أو المهنية، وتوضح اللائحة التنفيذية لهذا النظام أنواع الأعمال والمهن غير المالية المحددة المزاولة في المملكة. 7 - المنظمات غير الهادفة للربح : كل كيان قانوني يقوم بجمع أو تلقي أو صرف أموال لأغراض خيرية أو دينية أو ثقافية أو تعليمية أو اجتماعية أو تضامنية أو للقيام بأعمال أخرى من الأعمال الخيرية. 8 - العملية : كل تصرف في الأموال أو الممتلكات أو المتحصلات النقدية أو العينية. ويشمل على سبيل المثال : الإيداع ، والسحب، والتحويل، والبيع، والشراء، والإقراض، والمبادلة أو استعمال خزائن الإيداع ونحوها مما تحدده اللائحة التنفيذية لهذا النظام. 9 - النشاط الإجرامي والجريمة الأصلية: أي نشاط يشكل جريمة معاقباً عليها وفق الشرع
    أو النظام . 10 - الحجز التحفظي : الحظر المؤقت على نقل الأموال والمتحصلات أو تحويلها أو تبديلها أو التصرف فيها أو تحريكها، أو وضع اليد عليها أو حجزها بصورة مؤقتة، استناداً إلى أمر صادر من محكمة أو سلطة مختصة بذلك. 11 - المصادرة : التجريد والحرمان الدائمان من الأموال أو المتحصلات أو الوسائط المستخدمة في الجريمة بناءً على حكم قضائي صادر من محكمة مختصة. 12 - الجهة الرقابية : الجهة الحكومية المختصة بمنح التراخيص للمؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح والمختصة كذلك بالرقابة أو الإشراف على تلك الجهات. 13 - السلطة المختصة : كافة السلطات الإدارية وسلطات إنفاذ النظـام والجهات الرقابية المرتبطة بمكافحة غسل الأموال. 14 - الشخصية ذات الصفة الاعتبارية: الهيئات التجارية أو المؤسسات أو الكيانات أو الشركات أو الجمعيات أو أي جهة مشابهة تستطيع إقامة علاقة عمل دائمة أو امتلاك أصول.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يعد مرتكباً جريمة غسل الأموال كل من فعل أيًّا من الأفعال الآتية : 1 - إجراء أي عملية لأموال أو متحصلات، مع علمه بأنها ناتجة من نشاط إجرامي أو مصدر غير مشروع أو غير نظامي . 2 - نقل أموال أو متحصلات ، أو اكتسابها أو استخدامها أو حفظها أو تلقيها أو تحويلها، مع علمه بأنها ناتجة من نشاط إجرامي أو مصدر غير مشروع أو غير نظامي. 3 - إخفاء أو تمويه طبيعة الأموال أو المتحصلات، أو مصدرها أو حركتها أو ملكيتها أو مكانها أو طريقة التصرف بها، مع علمه بأنها ناتجة من نشاط إجرامي أو مصدر غير مشروع أو غير نظامي. 4 - الاشتراك بطريق الاتفاق أو المساعدة أو التحريض أو تقديم المشورة أو النصح أو التسهيل أو التواطؤ أو التستر أو الشروع في ارتكاب أي فعل من الأفعال المنصوص عليها في هذه المادة.وتحدد اللائحة التنفيذية الأنشطة الإجرامية أو المصادر غير المشروعة أو غير النظامية التي يعد الاشتغال بالأموال الناتجة منها من عمليات غسل الأموال وفق ما نصت عليه هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يعد مرتكباً جريمة غسل الأموال كل من فعل أيًّا من الأفعال الواردة في المادة (الثانية) من هذا النظام أو اشترك فيه من المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح، أو رؤساء وأعضاء مجالس إدارتها أو أصحابها أو موظفيها أو ممثليها المفوضين أو مدققي حساباتها أو مستخدميها ممن يتصرفون بمقتضى هذه الصفات، مع بقاء المسؤولية الجزائية لتلك الجهات إذا ارتكبت الجريمة باسمها أو لحسابها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تعد جريمة غسل الأموال جريمة مستقلة عن الجريمة الأصلية، ولا تحول معاقبة مرتكب الجريمة الأصلية عن معاقبته على جريمة غسل الأموال المرتكبة داخل المملكة أو خارجها إذا كانت تعد جريمة وفقاً لقانون الدولة التي ارتكبت فيها ووفقاً لنظام المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح ألا تجري أي تعامل مالي أو تجاري أو غيره باسم مجهول أو وهمي أو فتح حسابات رقمية أو التعامل بها. ويجب التحقق بصفة مستمرة من هوية المتعاملين استناداً إلى وثائق رسمية، وذلك عند بداية التعامل مع هؤلاء العملاء أو عند إجراء أي عملية معهم بصفة مباشرة أو نيابة عنهم وعلى تلك المؤسسات التحقق من الوثائق الرسمية للكيانات ذات الصفة الاعتبارية، التي توضح اسم المنشأة وعنوانها وأسماء مالكيها والمديرين المفوضين بالتوقيع عنها، واتخاذ تدابير العناية الواجبة المستمرة ونحو ذلك مما تحدده اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح الاحتفاظ - لمدة لا تقل عن عشر سنوات من تاريخ انتهاء العملية أو قفل الحساب ـ بجميع السجلات والمستندات، لإيضاح التعاملات المالية والصفقات التجارية والنقدية سواء أكانت محلية أو خارجية، وكذلك الاحتفاظ بملفات الحسابات والمراسلات التجارية وصور وثائق الهويات الشخصية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للجهات الرقابية المختصة إصدار تعليمات أو قواعد أو إرشادات أو أية أدوات أخرى للجهات الخاضعة لإشرافها تنفيذاً لأحكام هذا النظام، وعليها التأكد من التزام الجهات الخاضعة لإشرافها بمتطلبات مكافحة غسل الأموال، وعلى المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح وضع إجراءات احترازية ورقابة داخلية لكشف أي من الجرائم المبينة في هذا النظام وإحباطها، والالتزام بالتعليمات الصادرة من الجهات الرقابية في هذا المجال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح إيلاء عناية خاصة للعمليات المعقدة والكبيرة غير المعتادة وكافة أنماط العمليات غير الاعتيادية التي لا يكون لها غرض اقتصادي أو قانوني واضح، وفحص خلفية تلك العمليات والغرض منها لأقصى حد ممكن، وأن تسجل كتابيًّا ما يتم التوصل إليه من نتائج، والاحتفاظ بها لمدة عشر سنوات مع إتاحتها عند الطلب للجهات المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: '1- على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح - عند اشتباهها أو إذا توافرت لديها أسباب معقولة للاشتباه في أن الأموال أو بعضها تمثل متحصلات لنشاط إجرامي أو في ارتباطها أو علاقتها بعمليات غسل الأموال أو تمويل الإرهاب أو عمليات إرهابية أو منظمات إرهابية أو ممولي الإرهاب أو في أنها سوف تستخدم في عمليات غسل أموال أو تمويل الإرهاب أو عمليات إرهابية أو منظمات إرهابية أو ممولي إرهاب بما في ذلك محاولات إجراء مثل هذه العمليات بصرف النظر عن مبالغها - أن تتخذ الإجراءات الآتية : أ - إبلاغ وحدة التحريات المالية فوراً وبشكل مباشر. ب - إعداد تقرير مفصل يتضمن جميع البيانات والمعلومات المتوافرة لديها عن تلك الحالة والأطراف ذات الصلة، وتزويد وحدة التحريات المالية به.2- عند تأكد وحدة التحريات المالية من قيام شبهة بارتكاب أي من الجرائم المتعلقة بتمويل الإرهاب أو بالأعمال الإرهابية أو بالمنظمات الإرهابية أو بممولي الإرهاب - المعاقب عليها بموجب الأحكام ذات الصلة بجرائم الإرهاب وتمويله - تتخذ الإجراءات النظامية اللازمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: استثناءً من الأحكام المتعلقة بالسرية، فإن على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح تقديم الوثائق والسجلات والمعلومات لوحدة التحريات المالية أو السلطة المختصة بالتحقيق أو للسلطة القضائية عند طلبها عن طريق الجهة الرقابية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح والعاملين فيها وغيرهم من الملزمين بأحكام هذا النظام ألا يحذروا العملاء أو يسمحوا بتحذيرهم من وجود شبهات حول نشاطاتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح أن تضع برامج لمكافحة عمليات غسل الأموال، على أن تشمل هذه البرامج كحد أدنى ما يأتي : 1 - سياسات وإجراءات وضوابط داخلية لمكافحة غسل الأموال وإبلاغ موظفيها بها تتضمن إجراءات العناية الواجبة، والاحتفاظ بالسجلات، والكشف عن العمليات غير الاعتيادية والمشبوهة، والالتزام بالإبلاغ عن العمليات المشبوهة.2 - ترتيبات ملائمة لإدارة الالتزام وتعيين مسؤول عن الالتزام بمعايير مكافحة غسل الأموال على مستوى الإدارة، يعمل بصورة مستقلة، وله الحق في الاتصال بمستوى إداري أعلى وحق الاطلاع في الوقت المناسب على بيانات هوية العملاء ومعلومات العناية الواجبة، وعلى سجلات العمليات الأخرى ذات الصلة.3 - إنشاء وحدة تدقيق ومراجعة مستقلة ومزودة بموارد كافية لاختبار الالتزام بهذه الإجراءات والسياسات والضوابط وفقاً لمعيار معدل المخاطر.4 - إعداد برامج تدريبية مستمرة للموظفين المختصين لإحاطتهم بالأنظمة والتعليمات المتعلقة بمكافحة غسل الأموال وبالمستجدات في هذا المجال، بما يرفع من قدراتهم في التعرف على تلك العمليات وأنماطها وكيفية
    التصدي لها.5 - تطبيق إجراءات للفحص لضمان وجود معايير كفاءة عالية عند تعيين الموظفين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تتمتع وحدة التحريات المالية في وزارة الداخلية باستقلالية عملية كافية وتعمل كجهاز مركزي وطني لتلقي البلاغات وتحليل ونشر التقارير وتوجيه بلاغات العمليات المشبوهة وغيرها من المعلومات المتعلقة بأنشطة غسل الأموال، وتحدد اللائحة التنفيذية لهذا النظام مقر هذه الوحدة وتشكيلها واختصاصاتها وكيفية ممارسة مهماتها وارتباطها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: للسلطة المختصة بالتحقيق - من تلقاء نفسها أو بناءً على طلب من وحدة التحريات المالية، عند التأكد من قيام الشبهة بجريمة غسل الأموال - الأمر بالحجز التحفظي على الأموال والممتلكات والوسائط المرتبطة بالجريمة لمدة أو مدد لا تزيد على ثلاثين يوماً، وإذا اقتضى الأمر استمرار مدة الحجز أطول من ذلك فيكون بأمر قضائي من المحكمة المختصة مع عدم الإخلال بحقوق الأطراف الأخرى حسني النية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجوز تبادل المعلومات التي تكشف عنها المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح - وفقاً لأحكام المادة (العاشرة) من هذا النظام - بين تلك المؤسسات والسلطات المختصة حين تكون تلك المعلومات متعلقة بمخالفة أحكام هذا النظام. وعلى السلطات المختصة الالتزام بسرية تلك المعلومات وعدم الكشف عنها إلا بالقدر الذي يكون ضروريًّا لاستخدامها في التحقيقات أو الدعاوى المتعلقة بمخالفة أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تحدد اللائحة التنفيذية لهذا النظام قواعد وإجراءات الإقرار عن المبالغ المالية النقدية والأدوات المالية القابلة للتداول لحاملها والمعادن الثمينة والأحجار الكريمة التي يتم دخولها للمملكة وخروجها منها، وتحدد مقدار المبالغ والأوزان التي يجب الإقرار بـها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: إذا حكم بمصادرة الأموال أو المتحصلات أو الوسائط المستخدمة أو التي اتجهت النية لاستخدامها وفقاً لأحكام هذا النظام وكانت غير واجبة الإتلاف فللسلطة المختصة التصرف بها وفقاً للنظام، أو اقتسامها مع الدول التي تربطها مع المملكة اتفاقيات أو معاهدات سارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: مع عدم الإخلال بحقوق الأطراف الأخرى حسني النية، يعاقب كل من يرتكب جريمة غسل الأموال المنصوص عليها في المادة (الثانية) من هذا النظام بالسجن مدة لا تزيد على عشر سنوات، وبغرامة لا تزيد على خمسة ملايين ريال، أو بإحدى هاتين العقوبتين، مع مصادرة الأموال والمتحصلات والوسائط محل الجريمة. وإذا اختلطت الأموال والمتحصلات بأموال اكتسبت من مصادر مشروعة كانت هذه الأموال خاضعة للمصادرة في حدود ما يعادل القيمة المقدرة للمتحصلات غير المشروعة.وللمحكمة المختصة إبطال أو منع بعض الأعمال سواءً أكانت تعاقدية أم غير ذلك، إذا علم أطرافها أو أحدهم أو كان يفترض أن يعلموا بأن هذه الأعمال من شأنها أن تؤثر على قدرة السلطات المختصة على استرداد الممتلكات الخاضعة للمصادرة.وللمحكمة المختصة أن تعفي من هذه العقوبات مالك الأموال أو المتحصلات موضوع التجريم أو حائزها أو مستخدمها إذا أبلغ السلطات قبل علمها بمصادر الأموال أو المتحصلات وهوية المشتركين، دون أن يستفيد من عائداتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'تكون عقوبة السجن مدة لا تزيد على خمس عشرة سنة وغرامة مالية لا تزيد على سبعة ملايين ريال إذا اقترنت جريمة غسل الأموال بأي من الحالات الآتية: 1 - إذا ارتكب الجاني الجريمة من خلال عصابة منظمة .2 - استخدام الجاني للعنف أو الأسلحة.3 - شغل الجاني وظيفة عامة واتصال الجريمة بهذه الوظيفة ، أو ارتكابه الجريمة مستغلاً سلطاته أو نفوذه.4 - التغرير بالنساء أو القصّر واستغلالهم .5 - ارتكاب الجريمة من خلال مؤسسة إصلاحية أو خيرية أو تعليمية أو في مرفق خدمة اجتماعية.6 - صدور أحكام محلية أو أجنبية سابقة بالإدانة بحق الجاني ، وبوجه خاص في جرائم مماثلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: دون الإخلال بالأنظمة الأخرى يعاقب بالسجن - مدة لا تزيد على سنتين وبغرامة لا تزيد على خمسمائة ألف ريال، أو بإحدى هاتين العقوبتين - كل من أخل من رؤساء مجالس إدارات المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح أو أعضائها أو أصحابها أو مديريها أو موظفيها أو ممثليها المفوضين عنها أو مستخدميها ممن يتصرفون بمقتضى هذه الصفات بأي من الالتزامات الواردة في المواد (الخامسة، والسادسة، والسابعة، والثامنة، والتاسعة، والعاشرة، والحادية عشرة، والثانية عشرة) من هذا النظام، ويسري تطبيق العقوبة على من يزاول النشاط دون الحصول على التراخيص اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يجوز بحكم بناء على ما ترفعه الجهة المختصة أن توقع على المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح التي تثبت مسوؤليتها وفقاً لأحكام المادة (الثالثة) من هذا النظام، غرامة لا تقل عن مائة ألف ريال ولا تزيد على ما يعادل قيمة الأموال محل الجريمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 'عند ارتكاب أحد الأفعال الجرمية المنصوص عليها في المادة (الثانية) من هذا النظام يتخذ الآتي : 1 - يمنع السعودي الذي أنهى عقوبة السجن الصادرة في حقه من السفر خارج المملكة لمدة مماثلة لمدة السجن المحكوم بها عليه ولا تقل مدة المنع عن سنتين، ولوزير الداخلية - أو من يفوضه - منحه الإذن بالسفر للضرورة أثناء مدة المنع.2 - يبعد غير السعودي عن المملكة بعد تنفيذ العقوبة المحكوم بها عليه، ولا يسمح له بالعودة إليها، فيما عدا ما تسمح به تعليمات الحج والعمرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: فيما عدا العقوبات المنصوص عليها في هذا النظام ، يعاقب كل من يخالف أحكامه بالسجن مدة لا تزيد على ستة أشهر وبغرامة مالية لا تزيد على مائة ألف ريال ، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: لا تطبق العقوبات الواردة في هذا النظام بحق من وقع في مخالفته بحسن نية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يجوز للسلطات المختصة تبادل المعلومات التي تكشف عنها المؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح مع الجهات الأجنبية النظيرة في دول أخرى تربطها بالمملكة اتفاقيات أو معاهدات سارية أو مذكرات تفاهم، أو تبعاً للمعاملة بالمثل وذلك وفقاً للإجراءات النظامية المتبعة، دون أن يشكل ذلك إخلالاً بالأحكام والأعراف المتعلقة بسرية المعلومات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: للسلطة القضائية ـ بناءً على طلب من محكمة أو سلطة مختصة بدولة أخرى تربطها بالمملكة اتفاقية أو معاهدة سارية أو تبعاً للمعاملة بالمثل - أن تأمر بالتحفظ على الأموال أو المتحصلات أو الوسائط المرتبطة بجريمة غسل الأموال وفق الأنظمة المعمول بها في المملكة. وللسلطة المختصة ـ بناء على طلب من سلطة مختصة بدولة أخرى تربطها بالمملكة اتفاقية أو معاهدة سارية أو تبعاً للمعاملة بالمثل - أن تأمر بتعقب الأموال أو المتحصلات أو الوسائط المرتبطة بجريمة غسل الأموال وفق الأنظمة المعمول بها في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يجوز الاعتراف والتنفيذ لأي حكم قضائي بات ينص على مصادرة الأموال أو العائدات أو الوسائط المتعلقة بجرائم غسل الأموال صادر من محكمة مختصة بدولة أخرى تربطها بالمملكة اتفاقية أو معاهدة سارية أو تبعاً للمعاملة بالمثل ، وذلك إذا كانت الأموال أو المتحصلات أو الوسائط التي نص عليها هذا الحكم جائزاً إخضاعها للمصادرة وفقاً للنظام المعمول به في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: تعفى السلطات المختصة وموظفوها والمؤسسات المالية والأعمال والمهن غير المالية المحددة والمنظمات غير الهادفة للربح ورؤساء وأعضاء مجالس إدارتها أو أصحابها أو موظفوها أو مستخدموها أو ممثلوها المفوضون عنها من المسؤولية الجزائية أو المدنية أو الإدارية التي يمكن أن تترتب على تنفيذ الواجبات المنصوص عليها في هذا النظام أو على الخروج على أي قيد مفروض لضمان سرية المعلومات، وذلك ما لم يثبت أن ما قاموا به قد يكون بسوء نية لأجل الإضرار بصاحب العملية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تتولى المحكمة المختصة الفصل في جميع الجرائم الواردة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: تتولى هيئة التحقيق والادعاء العام، التحقيق والادعاء أمام المحكمة المختصة في الجرائم الواردة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يصدر وزير الداخلية بالاتفاق مع وزير المالية اللائحة التنفيذية لهذا النظام خلال تسعين يوماً من تاريخ صدوره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 1- يحل هذا النظام محل نظام مكافحة غسل الأموال، الصادر بالمرسوم الملكي رقم (م/39) وتاريخ 25 /6 /1424هـ.2- يعمل بهذا النظام بعد مضي ستين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4a8842df-9cd1-4ee7-bf97-a9a700f180d4/1
