articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك : التنظيم: تنظيم مجلس المحتوى الرقمي. المجلس: مجلس المحتوى الرقمي. الرئيس: رئيس المجلس. الأمين العام: أمين عام المجلس. الوزارة: وزارة الاتصالات وتقنية المعلومات. الوزير: وزير الاتصالات وتقنية المعلومات. المحتوى الرقمي: مادة تُتداول وتُنشر عبر الوسائط الإلكترونية بطريقة رقمية لا تتسم بطابع المراسلات الخاصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يُنشأ مجلس -برئاسة الوزير- باسم (مجلس المحتوى الرقمي)، ويكون مقره في الوزارة في مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المجلس إلى تطوير وتنمية المحتوى الرقمي في المملكة، وتنسيق الجهود بين الجهات ذات الصلة لتحسين البيئة التشريعية والتنظيمية للمحتوى الرقمي، ودراسة المعوقات والتحديات التي تحد من تنمية قطاع المحتوى الرقمي وتعزيزه، واقتراح السياسات والحلول والمبادرات والتوصيات اللازمة لتطويره، ومتابعة تنفيذها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات ومسؤوليات الجهات الحكومية الأخرى، للمجلس -في سبيل تحقيق أهدافه- القيام بالمهمات والاختصاصات اللازمة التي تخدم الغايات التي أُنشئ من أجلها، وله على وجه الخصوص ما يلي: تنظيم سوق منصات المحتوى الرقمي، وإعداد الاستراتيجية الخاصة بمنصات المحتوى الرقمي في المملكة بما يتوافق مع أفضل الممارسات العالمية. التعاون مع الجهات الحكومية لتطوير الأنظمة واللوائح والسياسات والضوابط المتعلقة بالمحتوى الرقمي واقتراح التعديلات اللازمة عليها بالتنسيق مع تلك الجهات، من أجل التعامل مع مستجدات المحتوى الرقمي وبما ينعكس إيجابيّاً على تنظيمه وتطويره، والرفع عما يلزم بحسب الإجراءات المتبعة. التنسيق مع الجهات الحكومية ذات العلاقة بالمحتوى الرقمي؛ لمواكبة المستجدات والحد من التداخل التقني والتنظيمي والتأثير المتبادل بين تلك الجهات بما ينعكس إيجاباً على تنظيم المحتوى الرقمي وتطويره، ولتفادي التعارض بين الاختصاصات والمسؤوليات فيما بينها، وللعمل على قيامها بأدوارها، وتحقيق غاياتها، والرفع عما يلزم بحسب الإجراءات المتبعة. التنسيق مع القطاعين العام والخاص؛ لتنظيم الجهود المتعلقة بخطط
    ومبادرات تطوير المحتوى الرقمي، ومتابعة تنفيذها. المساهمة في تمكين القطاع الخاص من الاستثمار في المحتوى الرقمي، وتحفيز المحتوى الرقمي المحلي، وتوطين وظائفه، وتوفير المتطلبات والتسهيلات اللازمة لدعمه. التنسيق مع القطاعين العام والخاص؛ لدعم جهود تأسيس شركات ومؤسسات متخصصة في المحتوى الرقمي. التواصل مع الجهات العامة والخاصة (بما فيها المؤسسات والجمعيات الأهلية) لبناء شراكات معها، وذلك بما يخدم أهداف المجلس والغايات التي أنشئ من أجلها. التنسيق مع القطاعين العام والخاص؛ لدعم الجهود المتعلقة برفع مستوى الوعي العام بأهمية التنمية في قطاع المحتوى الرقمي، وفق الإجراءات النظامية المتبعة. تقييم النشاطات والجهود التي تبذلها الجهات الحكومية في مجال تطوير وتنمية المحتوى الرقمي، والرفع عما يتطلب اتخاذ إجراء في شأنه. العمل على تحسين بيئة قطاع المحتوى الرقمي وتطوير البيئة التشريعية والتنظيمية له، والرفع عما يلزم الرفع عنه وفقاً للإجراءات النظامية، والإشراف على تنفيذها بعد اعتمادها. إجراء البحوث والدراسات في الموضوعات ذات الصلة بالمحتوى الرقمي. تحديد المعوقات والتحديات المتعلقة بتطوير المحتوى الرقمي، وتقديم
    المرئيات واقتراح الإصلاحات اللازمة في شأنها للجهات ذات الاختصاص، ومتابعة الالتزام بتنفيذها. المساهمة -بالتنسيق مع الجهات المختصة- في تثقيف المجتمع وتوعيته وبث الرسائل التوعوية وتعزيز مفهوم ثورة الاتصالات وتقنية المعلومات ووسائل الإعلام الحديثة وإبراز دورها في خدمة البشرية بصفة عامة والوطن بصفة خاصة، والتحذير من خطورة محتواها الضار على الفرد والمجتمع. المساهمة في عقد جلسات عمل ونشر المعرفة القانونية والإجرائية بالأنظمة واللوائح والسياسات والضوابط الصادرة في شأن المحتوى الرقمي، للمختصين وذوي الخبرة العاملين في قطاع الاستشارات المهنية. متابعة تطور التشريعات في مجال المحتوى الرقمي، والمشاركة مع الجهات ذات العلاقة في المؤتمرات والندوات في مجال المحتوى الرقمي، وتعزيز التكتلات الدولية، والتعاون معها -بحسب الإجراءات النظامية- في مواجهة المحتوى السلبي في مختلف الوسائل المختلفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1- يشكل المجلس برئاسة الوزير، وعضوية كل من: أ- ممثل من وزارة الإعلام. ‌ب- ممثل من وزارة الثقافة. ‌ج- ممثل من وزارة التجارة . ‌د- ممثل من وزارة الاستثمار. هـ- ممثل من وزارة التعليم. ‌و- ممثل من الهيئة العامة للإعلام المرئي والمسموع. ‌ز- ممثل من هيئة الاتصالات وتقنية المعلومات. ‌ح- ممثل من الهيئة السعودية للملكية الفكرية. ‌ط- اثنين من المختصين من ذوي الخبرة في المحتوى الرقمي. 2 - يختار الرئيس نائباً له من بين الأعضاء من ممثلي الجهات الحكومية. 3- يجب ألّا تقل مرتبة ممثلي الجهات الحكومية عن المرتبة (الممتازة) أو ما يعادلها. 4- يراعى أن يكون للمرشح -لعضوية المجلس- من الجهات الحكومية، مؤهلات أو خبرات أو اختصاصات وظيفية تتناسب مع عمل المجلس. 5- يكون تعيين العضوين -المشار إليهما في الفقرة (ط)- مدة (ثلاث) سنوات قابلة للتجديد مرة واحدة بقرار من مجلس الوزراء بناء على ترشيح من الرئيس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع المجلس بدعوة من رئيسه -أو نائبه- مرتين في السنة على الأقل، وكلما دعت الحاجة إلى ذلك، أو بطلب من ثلث أعضائه. ولا يعد الاجتماع نظامياً إلا إذا حضره أغلبية أعضاء المجلس على الأقل بمن فيهم الرئيس أو نائبه. ويجب أن توجه الدعوة للاجتماع -كتابة- قبل الاجتماع بـ(سبعة) أيام على الأقل، وأن تتضمن الدعوة جدول أعمال الاجتماع والمستندات اللازمة له. تعقد اجتماعات المجلس في مقره، ويجوز عند الاقتضاء أن تعقد في أي مكان آخر يحدده الرئيس أو نائبه. تصدر قرارات المجلس وتوصياته بأغلبية أصوات الأعضاء الحاضرين على الأقل. وفي حال تساوي الأصوات، يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز أن تعقد الاجتماعات وأن يصوت على القرارات والتوصيات عن بعد، من خلال استخدام الوسائل التقنية. ويمكن أن تتخذ القرارات والتوصيات عن طريق التمرير على الأعضاء ويوقعون عليها بما يفيد اطلاعهم عليها. ولا تعد القرارات والتوصيات المتخذة بهذه الطريقة صحيحة ما لم يصوت عليها جميع أعضاء المجلس، ولا يكون القرار أو التوصية نافذاً إلا إذا حاز على موافقة ثلثي الأعضاء على الأقل. ويعرض القرار والتوصية المتخذان بهذه الطريقة على
    المجلس في أول اجتماع -لاحق- لإثباته في محضر الاجتماع. للمجلس دعوة من يراه لحضور جلساته دون أن يكون له حق التصويت. لا يجوز لأي عضو الامتناع عن التصويت، ولا أن يفوض عضواً آخر بالتصويت نيابة عنه عند غيابه. تثبت مداولات المجلس وتوصياته وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يصدر المجلس القواعد والإجراءات المنظمة لعقد اجتماعاته وآليات اتخاذ توصياته وقراراته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم، يوكل إليها ما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها. ولتلك اللجان الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. للمجلس الاستعانة بالمكاتب الاستشارية والخبراء والمختصين والمستشارين ذوي الكفايات المؤهلة لمساعدته في تأدية مهماته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للمجلس أمانة عامة ترتبط بالرئيس، يرأسها أمين عام متفرغ، يختاره الرئيس، ويخصص لها عدد كافٍ من الموظفين، مع ما يلزم من التجهيزات الإدارية والفنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى الأمين العام القيام بجميع أعمال الأمانة الإدارية والمالية والفنية التي تخدم أغراض المجلس، ويمارس -بوجه خاص- الصلاحيات والاختصاصات الآتية: تحضير أعمال المجلس، واللجان المنبثقة منه. الإشراف على الدراسات والأعمال التي تقوم بها المكاتب الاستشارية والخبراء والمختصون والمستشارون الذين يستعين بهم المجلس؛ تمهيداً لرفعها إلى المجلس. متابعة أعمال اللجان التي يشكلها المجلس. إبلاغ الجهات المعنية بقرارات وتوصيات المجلس، ومتابعة تنفيذها. اقتراح القواعد المنظمة لعمل الأمانة، ورفعها إلى المجلس، لاعتمادها. إعداد تقارير عن عمل المجلس وإنجازاته في نهاية كل سنة مالية، ورفعها إلى المجلس. إعداد الدراسات والبحوث المتعلقة بأعمال المجلس. تمثيل المجلس أمام الجهات القضائية والإدارية وغيرها. وله تفويض غيره بذلك. أي عمل آخر يكلفه به المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد المجلس من المصادر الآتية: أ- ما يخصص له من اعتمادات ضمن ميزانية الوزارة. ب- ما يقبله المجلس من هبات وتبرعات ومنح؛ وفقاً للقواعد المنظمة لذلك. تودع أموال المجلس في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المجلس حساب له في البنك المركزي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المجلس. يكون للمجلس ميزانية (برنامج) ضمن ميزانية الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع موظفو أمانة المجلس للأنظمة واللوائح المعمول بها في الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يرفع الرئيس تقريراً سنوياً إلى رئيس مجلس الشؤون الاقتصادية والتنمية، مشتملاً على: إنجازات المجلس، والعقبات التي واجهته، والحلول المقترحة لمعالجتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يصدر المجلس القرارات اللازمة لتنفيذ التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يعمل بالتنظيم من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a661e5c-5844-4d90-87fd-adb900ba3c3a/1
