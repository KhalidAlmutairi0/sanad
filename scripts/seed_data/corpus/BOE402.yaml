- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتألف موارد المدينة مما يأتي: أ- ما يُخصَّص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من هبات وتبرعات وإعانات ومنح ووصايا وريع أوقاف، وفقاً للأحكام المنظّمة لذلك. د- عوائد استثماراتها. هـ- أي مورد آخر يقرُّه المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المدينة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح المدينة حساباً لها في البنك المركزي السعودي. ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المدينة المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع المدينة إلى رئيس مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يُعيِّن المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات المدينة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويُحدِّد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزوَّد الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يُنشر التنظيم في الجريدة الرسمية، ويُعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
