articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها، ما لم يقتضِ السياق غير ذلك: المدينة: مدينة الملك عبد العزيز للعلوم والتقنية. التنظيم: تنظيم المدينة. المجلس: مجلس إدارة المدينة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمدينة. اللجنة العليا: اللجنة العليا للبحث والتطوير والابتكار. الهيئة: هيئة تنمية البحث والتطوير والابتكار. المختبر الوطني: مختبر مركزي تابع للمدينة يقوم بدور مرجعي بوصفه بيت خبرة في عمل الأبحاث وتقديم الاستشارات والدراسات في مختلف مجالات العلوم والتقنية للقطاعين العام والخاص والقطاع غير الربحي داخل المملكة وخارجها، بالإضافة إلى دوره مؤسسةً وسيطةً تساهم في نقل التقنية وتجسير الفجوة بين البحث العلمي والتطبيقات الصناعية والتجارية. البنية التحتية البحثية: كل ما يستخدم، بشكل مباشر أو غير مباشر، في إنتاج البحث والتطوير والابتكار، ويشمل المعامل والمختبرات ومرافق الابتكار وما في حكمها، والموارد والأجهزة والمعدات والأدوات ونظم المعلومات والشبكات وقواعد البيانات وما شابهها. التقنية الحصرية: التقنية التي يملكها
    مبتكروها ومطوروها وليست متاحة على نحو تجاري يسهّل حصول منافسين عليها، وتشمل المواد والأجهزة والآلات والمعدات ونظم تشغيلها وبرامجها وقطع غيارها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع المدينة بالشخصية الاعتبارية العامة، والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تُعد المدينة مركز المختبرات الوطنية في المجالات العلمية والتقنية والبحثية، ومرجعًا في مجالات التقنية الحصرية ونقلها وتوطينها وتطويرها لتكون جزءًا من تنمية المحتوى المحلي، وتعمل على تجسير الفجوة بين البحث العلمي والتطبيق الصناعي للتقنية، وتقديم الخدمات والأعمال ذات الصلة وفقًا لأفضل الممارسات العالمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للمدينة في سبيل تحقيق أهدافها -دون إخلال باختصاصات الجهات الأخرى ذات العلاقة- ما يأتي: تنفيذ برامج البحث العلمي الأساسية والتطبيقية والتطويرية بما يتفق مع الاستراتيجية الوطنية للبحث والتطوير والابتكار، ونشر نتائجها، والإسهام في تحويل مخرجاتها إلى منتجات وخدمات ابتكارية ذات قيمة مضافة. تطوير البنية التحتية البحثية لديها وفق أفضل الممارسات والمواصفات العالمية، وتمكين الغير من الاستفادة منها. التعاون وعقد الاتفاقيات والشراكات مع الجهات ذات العلاقة بالبحث والتطوير والابتكار داخل المملكة وخارجها، بما في ذلك المؤسسات والهيئات والمنظمات الإقليمية والدولية وبيوت الخبرة المتخصصة؛ لتبادل الخبرات والمعرفة العلمية والتقنية، ونقل التقنية وتيسير تدفق المعلومات والبيانات، وشراء التقنية الحصرية وتملكها، والإشراف العلمي والتقني والفني على تنفيذ البرامج والمشاريع البحثية، وتحويل نتائج بحوث المدينة ومخرجاتها ومواردها إلى ابتكارات ومنتجات وخدمات جديدة؛ بما يرفع من جودة مخرجات البحث والتطوير والابتكار. الاستثمار، وتأسيس الكيانات غير الربحية، بما يسهم في تحقيق مستهدفاتها في مجالات اختصاصاتها،
    وفق الآليات والإجراءات النظامية المتبعة. استقطاب الباحثين والعلماء ورياديّي الأعمال وذوي الاختصاص في المجالات العلمية والتقنية والبحثية من داخل المملكة وخارجها، وتشجيعهم على الاستفادة من البنية التحتية البحثية لديها. الإسهام في تطوير الكفايات الوطنية وبناء القدرات البحثية والعلمية من خلال تقديم المنح الدراسية والبرامج التدريبية المتعلقة بأهدافها ومجالات اختصاصاتها. المشاركة في برامج البحث والتطوير مع الجهات الأخرى ذات العلاقة لإيجاد حلول للتحديات الوطنية في مجالات اختصاصاتها. إعداد الدراسات والبحوث، وتقديم الاستشارات والخدمات والأعمال، ذات الصلة بأهدافها ومجالات اختصاصاتها. الإسهام في نشر الوعي والثقافة العلمية والتقنية وتيسير مفاهيمها للمجتمع. إنشاء مراكز وواحات تقنية ومراكز ابتكار وحاضنات ومسرّعات أعمال ونحوها، ووضع الممكنات الداعمة لها، وإيجاد قيم اقتصادية منها. استضافة المراكز البحثية المشتركة مع القطاعين الحكومي والخاص لتنفيذ البحوث العلمية والتطويرية المشتركة. تحفيز الباحثين والعلماء ورياديّي الأعمال وذوي الاختصاص على استثمار مخرجـات برامجهم في البحث العلمي وتطويرها وتسويقها، بما
    في ذلك تمكينهم من تأسيس الشركات والمساهمة فيها، بالتنسيق مع الجهات ذات العلاقة. تعظيم رأس المال الفكري، وتشجيع تسجيل واستغلال حقوق الملكية الفكرية ذات العلاقة بأهدافها ومجالات اختصاصاتها، والمشاركة في تنظيمها -بالتنسيق مع الجهات ذات العلاقة- من أجل تعظيم العائد منها على الاقتصاد الوطني. تنظيم وعقد المؤتمرات والندوات والمعارض ذات العلاقة بأهدافها ومجالات اختصاصاتها داخل المملكة وخارجها، والمشاركة فيها، وفقاً للإجراءات النظامية. أي مهمات أخرى ذات صلة بأهداف المدينة واختصاصاتها يقرها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمدينة مجلس إدارة يسمى رئيسه بأمر من رئيس مجلس الوزراء، وتكون العضوية فيه على النحو الآتي: أ- ممثل من وزارة التعليم. ب- ممثل من وزارة الصناعة والثروة المعدنية. ج- ممثل من الهيئة العامة للصناعات العسكرية. د- ممثل من هيئة تنمية البحث والتطوير والابتكار. هـ- الرئيس التنفيذي. و- خمسة يمثلون قطاع البحث العلمي والمؤسسات الجامعية. ز- اثنان يمثلان القطاع الخاص. يُعين الأعضاء المشار إليهم في الفقرتين (و) و(ز) بأمر من رئيس مجلس الوزراء بناء على ترشيح من الرئيس، وتكون مدة عضويتهم في المجلس (ثلاث) سنوات قابلة للتجديد لمدة مماثلة ولمرة واحدة. لا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن المرتبة (الخامسة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للمدينة، ويختص بالإشراف عليها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات لتحقيق أهدافها في حدود أحكام التنظيم، وله بصفة خاصة الصلاحيات والاختصاصات الآتية: الإشراف على تنفيذ المدينة للمهمات المنوطة بها. الموافقة على الخطط والسياسات المتعلقة بأنشطة المدينة في ضوء الأولويات والسياسات العامة التي تحددها اللجنة العليا، واعتماد البرامج والمشاريع اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه. اعتماد الحوافز الخاصة بالباحثين في المدينة، بما في ذلك القواعد المنظّمة لتتجير ونقل التقنية والابتكارات الناتجة عن أنشطة البحث والتطوير والابتكار، وفق حوكمة تعتمدها اللجنة العليا. تحديد المقابل المالي للخدمات والأعمال التي تقدمها المدينة في مجالات اختصاصاتها، وفق الإجراءات النظامية. قبول الهبات والتبرعات والإعانات والمنح والوصايا والأوقاف، ووضع الآليات والضوابط لذلك وفقاً للأحكام ذات الصلة. تعيين مراجع حسابات خارجي ومراقب مالي داخلي. اعتماد الهيكل والدليل التنظيمي للمدينة. اعتماد اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية، بالاتفاق
    مع وزارة المالية. اعتماد اللوائح الإدارية، بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. اعتماد اللوائح الداخلية والفنية اللازمة لتسيير العمل في المدينة. الموافقة على مشروع ميزانية المدينة وحسابها الختامي، وتقرير مراجع حساباتها، وتقريرها السنوي؛ تمهيداً لرفعها بحسب الإجراءات النظامية. الموافقة على استثمار أموال المدينة، وتأسيس الكيانات غير الربحية، بما يسهم في تحقيق مستهدفاتها في مجالات اختصاصاتها، وفق الآليات والإجراءات النظامية المتبعة. الموافقة على إنشاء فروع ومكاتب المدينة والمرافق الداعمة لنشاطاتها داخل المملكة. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود. النظر في التقارير الدورية التي تُقدَّم له عن سير العمل في المدينة ومركزها المالي، واتخاذ القرارات اللازمة في شأنها. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم، يعهد إليها ما يراه من مهمات، ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها وأمينها ومهماتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وله تفويض بعض اختصاصاته إلى الرئيس، أو اللجان التابعة للمجلس، أو من يراه من أعضائه أو الرئيس
    التنفيذي، وفقاً لما يقتضيه سير العمل في المدينة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المدينة. ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يجتمع المجلس -بناء على دعوة من الرئيس أو من ينيبه من الأعضاء ممثلي الجهات الحكومية- مرة كل (ثلاثة) أشهر على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو بطلب من (ثلث) أعضائه على الأقل. ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يكون اجتماع المجلس صحيحًا بحضور أغلبية أعضائه على الأقل بمن فيهم الرئيس أو من ينيبه من الأعضاء ممثلي الجهات الحكومية، وتصدر التوصيات والقرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل. وفي حالة تساوي الأصوات، يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز للمجلس -عند الحاجة، ووفقاً لما يقدره الرئيس- أن يعقد الاجتماعات وأن يُصوَّت على التوصيات والقرارات عن بعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ التوصيات والقرارات عن طريق التمرير على الأعضاء، ويوقع عليها بما يفيد باطّلاع جميع الأعضاء عليها. ولا تعدّ التوصيات والقرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرر على جميع أعضاء المجلس الحاضرين، ويصوتوا عليها، وتحُز على أغلبية أصواتهم على الأقل.
    تثبت مداولات المجلس وتوصياته وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. وتُحاط اجتماعات المجلس ومداولاته وجدول أعماله وتوصياته وقراراته ومحاضره بالسرية التامة. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. يكون للمجلس أمين من الأعضاء أو من غيرهم يختاره رئيس المجلس، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر، والمداولات والتوصيات والقرارات. وللمجلس دعوة من يراه من الجهات الحكومية أو الخاصة أو من المختصين والمستشارين لحضور اجتماعاته للاستفادة من خبراتهم، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمدينة رئيس تنفيذي، يُعيّن ويُعفى بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون هو المسؤول عن إدارة المدينة، وتتركز مسؤولياته وصلاحياته في حدود ما ينص عليه التنظيم وما يقرره أو يفوضه به المجلس، وله -على وجه الخصوص- ممارسة الصلاحيات الآتية: الإشراف على سير العمل في المدينة وفقًا للوائح والخطط والبرامج المعتمدة. اقتراح الخطط والسياسات المتعلقة بأنشطة المدينة في ضوء الأولويات والسياسات العامة التي تحددها اللجنة العليا، والبرامج والمشاريع اللازمة لتنفيذها، ورفعها إلى المجلس، والإشراف على تنفيذها بعد اعتمادها. اقتراح الهيكل والدليل التنظيمي للمدينة، ولوائحها المالية والإدارية، وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها؛ ورفعها إلى المجلس تمهيداً لاعتمادها، والإشراف على تنفيذها بعد اعتمادها. تعيين منسوبي المدينة وفقاً للوائح المنظمة لذلك، والإشراف عليهم. الإشراف على إعداد مشروع ميزانية المدينة، ومشروع تقريرها السنوي، ومشروع حسابها الختامي؛ ورفعها إلى المجلس. الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح
    المقرة، والصلاحيات التي يفوضه بها المجلس. الإشراف على إعداد التقارير الدورية التي تقدَّم عن سير العمل في المدينة، ورفعها إلى المجلس. الإشراف على الكيانات التابعة للمدينة وفقاً للوائح التي يعتمدها المجلس. التوقيع على الاتفاقيات والبروتوكولات والعقود، بعد موافقة المجلس. متابعة تنفيذ القرارات الصادرة من المجلس. التعاقد مع الغير والاستعانة بالخبراء والمستشارين المتخصصين بحسب ما يقتضيه سير العمل في المدينة، وفقاً للأحكام النظامية ذات الصلة. إقرار الخطط والبرامج اللازمة لتدريب وابتعاث وإيفاد منسوبي المدينة في جميع مجالات عملها، ومتابعة تنفيذها. تنظيم مشاركة المدينة في المؤتمرات والندوات واللقاءات والمعارض المتعلقة بمجالات اختصاصاتها محليًّا وإقليميًّا ودوليًّا. تمثيل المدينة أمام الجهات القضائية والحكومية والإدارية، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. أي مهمة أخرى يكلفه بها المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى غيره من منسوبي المدينة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/03bf8e11-bc72-4996-96d5-afc000b859f3/1
  verified: false
