  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها ما لم يقتضِ السياق غير ذلك: المركز: مركز الإقامة المميزة. التنظيم: تنظيم المركز. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية وبالاستقلال المالي والإداري، ويرتبط تنظيميًّا بمجلس الشؤون الاقتصادية والتنمية، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع أو مكاتب بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى الإسهام في تمكين الاقتصاد الوطني من خلال تطوير منتجات وخدمات وأعمال تنافسية للإقامة المميزة، والعمل على استقطاب الفئات المستهدفة منها وإطلاقها وتسويقها بما يتمشى مع الأولويات الوطنية ويُعزز صورة المملكة كوجهة عالمية رائدة، ويشمل ذلك تعزيز الاستثمار الأجنبي في المملكة ودعم وتطوير سوق العمل من خلال طرح منتجات استقطاب جاذبة للمستثمرين ورواد الأعمال والمواهب العالمية والعمل على استبقائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع مراعاة ما يوكل إلى المركز من اختصاصات أخرى بناء على الأنظمة والتنظيمات ذات الصلة، يختص المركز -بما لا يخل باختصاصات ومسؤوليات الجهات الأخرى- بتنظيم وإدارة جميع ما يتصل بالإقامة المميزة، وله تولي الاختصاصات والأعمال الآتية: اقتراح الأنظمة ذات الصلة بالإقامة المميزة، واقتراح تعديل المعمول به منها، والرفع عن ذلك لاستكمال الإجراءات النظامية اللازمة. تلقي الطلبات الخاصة بالإقامة المميزة، ودراستها، والنظر في الموافقة عليها، وفقًا للأحكام النظامية ذات الصلة. اقتراح الخدمات والمنتجات التي يقدمها المركز المتعلقة بالإقامة المميزة، والعمل على تطويرها باستمرار لتلبية احتياجات الفئات المستهدفة -التي تضم المواهب العاملة والاستثنائية ورواد الأعمال والمبتكرين والمستثمرين والمتقاعدين والطلاب والباحثين- وذلك بناءً على تقييم الأولويات الوطنية ومنتجات المنافسين وجاذبية المنتجات والخدمات للفئات المستهدفة. العمل على تسويق الخدمات والمنتجات التي يقدمها، المركز المتعلقة بالإقامة المميزة في القنوات المختلفة -بالتنسيق مع القطاعين العام والخاص- وذلك لتعزيز ترويجها وانتشارها، بما يسهم في جعل
    المملكة وجهة رائدة لاستقطاب الكفاءات. وضع الآليات اللازمة لمعالجة الطلبات الخاصة بالإقامة المميزة، بالتنسيق مع الجهات ذات العلاقة. العمل على مواءمة مزايا المنتجات والخدمات التي يقدمها المركز مع السياسات القطاعية والتشريعات ذات الصلة، بالتنسيق مع الجهات ذات العلاقة. وضع مستهدفات لمنتجات وخدمات المركز، وتقويمها باستمرار؛ لتطويرها، أخذاً بالاعتبار الآثار الاقتصادية، والوظيفية، والاستثمارية. تنظيم المؤتمرات والندوات والمعارض الداخلية والخارجية ذات الصلة بمجال عمل المركز، وفقاً للأحكام النظامية ذات الصلة. إعداد تقارير عن تطبيق الإقامة المميزة، واقتراح ما يراه في شأنها؛ تمهيدًا لعرضها على مجلس الشؤون الاقتصادية والتنمية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة يشكل من رئيس يعين بأمر من رئيس مجلس الوزراء بناءً على اقتراح من رئيس مجلس الشؤون الاقتصادية والتنمية، وعضوية كل من: أ- وزير الثقافة. ب- وزير الاستثمار. ج- وزير الموارد البشرية والتنمية الاجتماعية. د- وزير الاقتصاد والتخطيط. هـ- نائب وزير الداخلية. و- نائب وزير الخارجية. ز- الرئيس التنفيذي للهيئة الملكية لمدينة الرياض. لرئيس مجلس الشؤون الاقتصادية والتنمية -بقرار منه- تعديل تشكيل المجلس المشار إليه في الفقرة (1) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس إدارة شؤون المركز وتصريف أموره، ويتخذ جميع القرارات اللازمة لتحقيق أهدافه في حدود ما يتضمنه التنظيم، وله على وجه خاص ما يأتي: إقرار سياسات المركز العامة والخطط والبرامج اللازمة لتنفيذها. إقرار خطط تطوير محفظة المنتجات والخدمات التي يقدمها المركز المتعلقة بالإقامة المميزة، وإطلاقها بما يتمشى مع الأولويات الوطنية واستجابة السوق. اقتراح منتجات الإقامة المميزة التي يقدمها المركز والمقابل المالي لها التي يرى المجلس استحصال مقابل مالي عنها، والرفع عنها إلى مجلس الشؤون الاقتصادية والتنمية لإقرارها. تحديد مؤشرات أداء لخدمات ومنتجات المركز، ومراجعتها في ضوء مستهدفاته. إقرار هيكل المركز التنظيمي. إقرار اللوائح الإدارية والمالية للمركز، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. الموافقة على إنشاء فروع أو مكاتب للمركز. النظر في تقارير سير العمل في المركز. الموافقة على مشروع ميزانية المركز وحسابه الختامي والتقرير السنوي؛
    تمهيدًا لرفعها بحسب الإجراءات النظامية. الموافقة على قبول التبرعات والهبات والمنح والوصايا والأوقاف التي تقدم إلى المركز، وفقًا للأحكام المنظمة لذلك. تعيين مراجع حسابات خارجي (أو أكثر) ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات والعقود، وفقًا للإجراءات النظامية المتبعة. تحديد المقابل المالي لما يقدمه المركز من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدد قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ولتلك اللجان الاستعانة بمن تراه لتأدية المهمات المنوطة بها. وللمجلس تفويض بعض مهماته إلى رئيسه أو أي من أعضائه أو إلى من يراه من منسوبي المركز، وفقًا لما يقتضيه سير العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس مرة كل ثلاثة أشهر، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس أو إذا طلب ذلك ثلث الأعضاء على الأقل. يوجه الرئيس الدعوة للاجتماع -كتابة- قبل موعد الاجتماع بوقت كافٍ، على أن تتضمن جدول أعمال الاجتماع. يكون اجتماع المجلس صحيحًا إذا حضره أغلبية الأعضاء -على الأقل- بمن فيهم الرئيس أو من ينيبه من الأعضاء في حال غيابه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. للمجلس دعوة من يراه لحضور اجتماعاته، دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي، يعين بقرار من المجلس بناء على ترشيح من رئيسه، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون المسؤول عن إدارة المركز، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، وله بوجه خاص مباشرة الاختصاصات الآتية: اقتراح سياسات المركز العامة والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس لإقرارها، والإشراف على تنفيذها بعد إقرارها. اقتراح هيكل المركز التنظيمي، ورفعه إلى المجلس لإقراره. الإشراف على إعداد اللوائح المالية واللوائح الإدارية المنظمة لشؤون منسوبي المركز؛ تمهيداً لرفعها إلى المجلس. الإشراف على إعداد مشروع ميزانية المركز، وحسابه الختامي، وتقريره السنوي؛ تمهيدًا لعرضها على المجلس. الصرف من ميزانية المركز، واتخاذ جميع الإجراءات المالية، وفقًا للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي فوضها به المجلس. إقرار إجراءات عمل المركز. تعيين العاملين في المركز والإشراف عليهم، وفقًا لما تحدده اللوائح. التعاقد مع الخبراء والمستشارين في حدود أهداف المركز، وفقًا لما تحدده اللوائح. متابعة تنفيذ القرارات الصادرة من المجلس. تقديم تقارير
    دورية إلى المجلس عن سير أعمال المركز ومنتجاته ونشاطاته؛ تمهيدًا لاستكمال ما يلزم في شأنها. تقديم مقترحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصات المركز. تمثيل المركز أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره في ذلك. إبرام الاتفاقيات والعقود اللازمة لتسيير أعمال المركز، وفقًا للإجراءات النظامية المتبعة. أي مهمة أخرى يكلفه بها المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمجلس أمين يعين بقرار منه، ويحدد القرار أجره ومزاياه، ويتولى الأمين الإعداد لاجتماعاته وإبلاغ أعضائه بمواعيدها وتهيئة محاضرها وقراراتها، والقيام بما يكلفه به المجلس أو الرئيس من مهمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع منسوبو المركز لنظام العمل، ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتألف موارد المركز المالية من المصادر الآتية: أ- ما يخصص له من اعتمادات في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه عن المنتجات والخدمات والأعمال التي يقدمها. ج- ما يقبله المجلس من تبرعات وهبات ومنح ووصايا وأوقاف، وفقاً للأحكام المنظمة لذلك. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المركز حسابًا له في البنك المركزي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانيته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة بالمراقبة على حسابات المركز وعملياته، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bc27d6e4-560a-4778-9364-aeac00ca7e3b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يعمل بالتنظيم من تاريخ الموافقة عليه.
