- article_ref: 'الفصل الأول : التعريفات'
  article_text_ar: يسمى هذا النظام نظام العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك: الوزارة: وزارة العمل. الوزير: وزير العمل. مكتب العمل: الجهة الإدارية المنوط بها شؤون العمل في النطاق المكاني الذي يحدد بقرار من الوزير. صاحب العمل: كل شخص طبيعي يعمل لمصلحة صاحب عمل وتحت إدارته أو إشرافه مقابل أجر، ولو كان بعيداً عن نظارته. الحدث: الشخص الذي أتم الخامسة عشرة من عمره ولم يبلغ الثامنة عشرة. العمل: الجهد المبذول في النشاطات الإنسانية كافة، تنفيذاً لعقد عمل (مكتوب أو غير مكتوب) بصرف النظر عن طبيعتها أو نوعها، صناعية كانت أو تجارية، أو زراعية، أو فنية، أو غيرها، عضلية كانت أو ذهنية. العمل الأصلي: بالنسبة للأفراد: موضوع نشاطهم المعتاد، وبالنسبة للمنشآت: الأعمال التي أنشئت المنشأة من أجل القيام بها والمنصوص عليها في عقد تأسيسها أو في عقد الامتياز -إن كانت من شركات الامتياز- أو في السجل التجاري. العمل المؤقت: العمل الذي يدخل بطبيعته فيما يزاوله صاحب العمل من نشاط وتقتضي طبيعة إنجازه مدة محددة، أو ينصب على عمل بذاته وينتهي بإنتهائه، ولا يتجاوز في الحالتين
    تسعين يوماً. العمل العرضي: العمل الذي لا يدخل بطبيعته فيما يزاوله صاحب العمل في نشاطه المعتاد، ولا يستغرق تنفيذه أكثر من تسعين يوماً. العمل الموسمي: العمل الذي يتم في مواسم دورية متعارف عليها. العمل لبعض الوقت: العمل الذي يؤديه عامل غير متفرغ لدى صاحب عمل ولساعات عمل تقل عن نصف ساعات العمل اليومية المعتادة لدى المنشأة، سواء كان هذا العامل يؤدي ساعات عمله يومياً أو بعض أيام الأسبوع. الخدمة المستمرة: خدمة العامل غير المنقطعة مع صاحب العمل نفسه أو خلفه النظامي، من تاريخ ابتداء الخدمة. وتعد الخدمة مستمرة في الحالات الآتية: الإجازات والعطل المقررة نظاماً. فترة الإنقطاع لأداء الامتحانات وفقاً لما هو منصوص عليه في هذا النظام. حالات غياب العامل عن عمله بدون أجر التي لا تزيد مدتها على عشرين يوماً متقطعة خلال سنة العمل. الأجر الأساسي: كل مايعطى للعامل مقابل عمله، بموجب عقد عمل مكتوب أو غير مكتوب، مهما كان نوع الأجر أو طريقة أدائه، مضافاً إليه العلاوات الدورية. الأجر الفعلي: الأجر الأساسي مضافاً إليه سائر الزيادات المستحقة الأخرى التي تتقرر للعامل مقابل جهد بذله في العمل، أو مخاطر يتعرض لها في
    أداء عمله، أو التي تتقرر للعامل لقاء العمل بموجب عقد العمل أو لائحة تنظيم العمل. ومن ذلك: العمولة، أو النسبة المئوية من المبيعات، أو النسبة المئوية من الأرباح، التي تدفع مقابل ما يقوم بتسويقه، أو إنتاجه، أو تحصيله، أو ما يحققه من زيادة الإنتاج أو تحسينه. البدلات التي يستحقها العامل لقاء طاقة يبذلها، أو مخاطر يتعرض لها في أداء عمله. الزيادات التي قد تمنح وفقاً لمستوى المعيشة، أو لمواجهة أعباء العائلة. المنحة أو المكافأة: هي التي يعطيها صاحب العمل للعامل، وما يصرف له جزاء أمانته، أو كفايته، وما شابه ذلك، إذا كانت هذه المنحة أو المكافأة مقررة في عقد العمل، أو لائحة تنظيم العمل للمنشأة، أو جرت العادة بمنحها، حتى أصبح العمال يعدونها جزءاً من الأجر لا تبرعاً. الميزات العينية: هي التي يلتزم صاحب العمل بتوفيرها للعامل مقابل عمله، بالنص عليها في عقد العمل أو في لائحة تنظيم العمل. وتقدر بحد أقصى يعادل الأجر الأساسي لمدة شهرين عن كل سنة ما لم تقدر في عقد العمل أو لائحة تنظيم العمل بما يزيد على ذلك. الأجر: الأجر الفعلي. المنشأة: كل مشروع يديره شخص طبيعي، أو اعتباري، يشغّل عاملاً أو أكثر، لقاء أجر
    أياً كان نوعه. الشهر: ثلاثون يوماً ما لم ينص على خلاف ذلك في عقد العمل أو في لائحة تنظيم العمل. اللائحة: اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: العمل حق للمواطن، لا يجوز لغيره ممارسته إلا بعد توافر الشروط المنصوص عليها في هذا النظام، والمواطنون متساوون في حق العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب على صاحب العمل والعامل عند تطبيق أحكام هذا النظام الالتزام بمقتضيات أحكام الشريعة الإسلامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تسري أحكام هذا النظام على: 1 - كل عقد يلتزم بمقتضاه أي شخص بالعمل لمصلحة صاحب عمل وتحت إدارته أو إشرافه مقابل أجر.2 - عمال الحكومة والهيئات والمؤسسات العامة بمن في ذلك الذين يشتغلون في المراعي أو الزراعة.3 - عمال المؤسسات الخيرية.4 - العمال في المنشآت الزراعية والرعوية التي تشغّل عشرة عمال فأكثر.5 - العمال في المنشآت الزراعية التي تقوم بتصنيع منتجاتها.6 - العمال الذين يقومون بصفة دائمة بتشغيل الآلات الميكانيكية اللازمة للزراعة أو إصلاحها.7 - عقود التأهيل والتدريب مع غير العاملين لدى صاحب العمل في حدود الأحكام الخاصة المنصوص عليها في هذا النظام.8 - العاملين بعض الوقت في حدود ما يتعلق بالسلامة والصحة المهنية وإصابات العمل وما يقرره الوزير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تسري على العامل العرضي والموسمي والمؤقت الأحكام الخاصة بالواجبات وقواعد التأديب، والحد الأقصى لساعات العمل، وفترات الراحة اليومية والراحة الأسبوعية، والتشغيل الإضافي، والعطلات الرسمية، وقواعد السلامة، والصحة المهنية، وإصابات العمل والتعويض عنها، وما يقرره الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يستثنى من تطبيق أحكام هذا النظام: 1 - أفراد أسرة صاحب العمل، وهم زوجه وأصوله وفروعه الذين يعملون في المنشأة التي لا تضم سواهم.2 - خدم المنازل ومن في حكمهم.3 - عمال البحر الذين يعملون في سفن تقل حمولتها عن خمسمائة طن.4 - عمال الزراعة من غير الفئات المنصوص عليها في المادة الخامسة من هذا النظام.5 - العاملون غير السعوديين القادمون لأداء مهمة محددة ولمدة لا تزيد على شهرين.6 - لاعبو الأندية والاتحادات الرياضية ومدربوها.وتقوم الوزارة بالتنسيق مع الجهات المختصة بوضع لائحة خاصة لخدم المنازل ومن في حكمهم تحكم علاقتهم مع مستخدميهم، وتحدد حقوق وواجبات كل طرف منهم، وترفعها لمجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يبطل كل شرط يخالف أحكام هذا النظام، ويبطل كل إبراء أو مصالحة عن الحقوق الناشئة للعامل بموجب هذا النظام أثناء سريان عقد العمل، ما لم يكن أكثر فائدة للعامل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: اللغة العربية هي الواجبة الاستعمال في البيانات والسجلات والملفات وعقود العمل وغيرها مما هو منصوص عليه في هذا النظام، أو في أي قرار صادر تطبيقًا لأحكامه، وكذلك التعليمات التي يصدرها صاحب العمل لعماله.وإذا استعمل صاحب العمل لغة أجنبية إلى جانب اللغة العربية في أي من الحالات المذكورة فإن النص العربي هو المعتمد دون غيره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تحسب جميع المدد والمواعيد المنصوص عليها في هذا النظام بالتقويم الهجري، ما لم ينص في عقد العمل أو لائحة تنظيم العمل على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 1- إذا عهد صاحب العمل لأي شخص طبيعي أو معنوي القيام بعمل من أعماله الأصلية، أو جزء منها وجب على الأخير أن يعطي عماله كافة الحقوق والمزايا التي يعطيها صاحب العمل الأصلي لعماله، ويكونان مسؤولين عنها بالتضامن فيما بينهما.2 - إذا تعدد أصحاب العمل كانوا مسؤولين بالتضامن فيما بينهم عن الوفاء بالالتزامات الناشئة عن هذا النظام وعقود العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجب على صاحب العمل والعامل معرفة أحكام نظام العمل بجميع محتوياته ليكون كل منهما على بينة من أمره وعالمًا بما له وما عليه. وعلى صاحب العمل الذي يشغّل عشرة عمال فأكثر أن يقدم للوزارة خلال سنة من تاريخ سريان هذا النظام أو تاريخ بلوغ النصاب - لائحة لتنظيم العمل تتضمن الأحكام الداخلية للعمل، ويجب أن تكون هذه اللائحة شاملة لقواعد تنظيم العمل، وما يتصل به من أحكام، بما في ذلك الأحكام المتعلقة بالميزات والأحكام الخاصة بالمخالفات والجزاءات التأديبية بما لا يتعارض مع أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تعتمد الوزارة لائحة تنظيم العمل، وما يطرأ عليها من تعديل، خلال ستين يومًا من تاريخ تقديمها إلى الوزارة.فإذا انقضت تلك المدة دون صدور الموافقة أو الاعتراض عليها أصبحت اللائحة نافذة اعتبارًا من انقضاء تلك المدة .وعلى صاحب العمل أن يعلن اللائحة بعد اعتمادها في مكان ظاهر في المنشأة أو بأي وسيلة أخرى تكفل معرفة العاملين بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يصدر الوزير بقرار منه نموذجًا أو نماذج للوائح تنظيم العمل ليسترشد بها أصحاب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'على صاحب العمل عند بدء العمل في أي منشأة أن يبلغ مكتب العمل المختص كتابة بالبيانات الآتية: 1 - اسم المنشأة ونوعها ومركزها، والعنوان الذي توجه إليه المراسلات، وأي معلومة يكون من شأنها سهولة الاتصال بالمنشأة.2 - النشاط الاقتصادي المرخص له بمزاولته مع ذكر رقم السجل التجاري أو الترخيص وتاريخه، وجهة إصداره، وإرفاق صورة منه.3 - عدد العمال المراد تشغيلهم في المنشأة. 4 - اسم مدير المنشأة المسؤول.5 - أي بيانات أخرى تطلبها الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 1- إذا لم يتمكن صاحب العمل من ممارسة العمل بنفسه، فعليه أن يعين مسؤولًا يمثله في مكان العمل. وفي حالة تعدد الشركاء أو المديرين في المنشأة يسمى أحدهم من المقيمين في مكان العمل، يمثل صاحب العمل ويكون مسؤولًا عن أي مخالفة لأحكام هذا النظام.2- على صاحب العمل أن يبلغ مكتب العمل المختص كتابة باسم الشريك أو المدير، وعليه في حالة تغييره أن يبلغ المكتب باسم الشريك أو المدير الجديد خلال سبعة أيام على الأكثر من تولي هذا الأخير عمله.3- إذا لم يوجد شخص معين بصفة مدير مسؤول للمنشأة، أو إذا لم يباشر الشخص المعين عمله- فإن من يقوم فعلًا بأعمال المدير أو صاحب العمل نفسه يعد مديرًا مسؤولًا عن المنشأة.وفي كل الأحوال تبقى مسؤولية صاحب العمل قائمة بصفة أصلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على صاحب العمل أن يحتفظ في مكان العمل بالسجلات والكشوف والملفات التي تحدد ماهيتها، والبيانات التي يجب أن تتضمنها اللائحة.وعليه أن يضع في مكان ظاهر بموقع العمل جدولًا بمواعيد العمل، وفترات الراحة، ويوم الراحة الأسبوعي، ومواعيد بدء كل نوبة وانتهائها في حالة العمل بأسلوب المناوبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: إذا انتقلت ملكية المنشأة لمالك جديد، أو طرأ تغيير على شكلها النظامي بالدمج أو التجزئة أو غير ذلك، تبقى عقود العمل نافذة في الحالين، وتعد الخدمة مستمرة.أما بالنسبة لحقوق العمال الناشئة عن المدة السابقة لهذا التغيير من أجور، أو مكافأة نهاية خدمة مفترضة الاستحقاق بتاريخ انتقال الملكية، أو غير ذلك من حقوق؛ فيكون الخلف والسلف مسؤولين عنها بالتضامن. ويجوز في حال انتقال المنشآت الفردية لأي سبب اتفاق السلف والخلف على انتقال جميع حقوق العمال السابقة إلى المالك الجديد بموافقة العامل الخطية. وللعامل في حال عدم موافقته طلب إنهاء عقده وتسلّم مستحقاته من السلف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تعد المبالغ المستحقة للعامل أو ورثته بمقتضى هذا النظام ديونًا ممتازة من الدرجة الأولى. وللعامل وورثته في سبيل استيفائها امتياز على جميع أموال صاحب العمل. وفي حالة إفلاس صاحب العمل أو تصفية منشأته تسجل المبالغ المذكورة ديونًا ممتازة، ويدفع للعامل مبلغ معجل يعادل أجر شهر واحد، وذلك قبل سداد أي مصروف آخر، بما في ذلك المصروفات القضائية ومصروفات الإفلاس أو التصفية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: لا يجوز لصاحب العمل أو العامل أن يقوم بعمل من شأنه إساءة استعمال أحكام هذا النظام أو القرارات واللوائح الصادرة تنفيذًا لأحكامه. كما لا يجوز لأي منهما القيام بعمل من شأنه الضغط على حرية الآخر أو حرية عمال أو أصحاب عمل آخرين لتحقيق أي مصلحة أو وجهة نظر يتبناها مما يتنافى مع حرية العمل أو اختصاص الجهة المختصة بتسوية الخلافات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: على الوزير- في سبيل تنفيذ أحكام هذا النظام- التنسيق مع الجهات ذات العلاقة كلما اقتضى الأمر ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 'توفر الوزارة وحدات للتوظيف دون مقابل في الأماكن المناسبة لأصحاب العمل والعمال، تقوم بما يأتي: 1 - مساعدة العمال في الحصول على الأعمال المناسبة، ومساعدة أصحاب الأعمال في إيجاد العمال المناسبين. 2 - جمع المعلومات الضرورية عن سوق العمل وتطوره وتحليلها؛ لكي تكون في متناول مختلف الهيئات العامة والخاصة المعنية بشؤون التخطيط الاقتصادي والاجتماعي . 3 - تنفيذ الواجبات الآتية: 3 /1- تسجيل طالبي العمل. 3 /2 - الحصول على بيانات بالأعمال الشاغرة من أصحاب الأعمال. 3 /3 - إحالة طلبات العمال للأعمال الشاغرة الملائمة. 3 /4 - تقديم النصح والمعونة إلى طالبي العمل فيما يختص بالتأهيل والتدريب المهني، أو بإعادة التدريب اللازم للحصول على الأعمال الشاغرة. 3 /5 - غير ذلك من الأمور التي تقررها الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: لكل مواطن في سن العمل قادر على العمل وراغب فيه أن يطلب قيد اسمه في وحدة التوظيف، مع بيان تاريخ مولده ومؤهلاته وأعماله السابقة ورغباته وعنوانه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تحدد اللائحة قواعد سير العمل وإجراءاته في وحدات التوظيف، ونماذج السجلات والإشعارات والأوراق المستخدمة في أعمالها، وكذلك جداول تصنيف المهن وفقًا للتصنيف المهني المعتمد، وتكون أساسًا في تنظيم عمليات التوظيف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'على كل صاحب عمل أن يرسل إلى مكتب العمل المختص ما يأتي: 1 - بيانًا بالأعمال الشاغرة والمستحدثة، وأنواعها، ومكانها، والأجر المخصص لها، والشروط اللازم توافرها لشغلها، وذلك في مدة لا تتجاوز خمسة عشر يومًا من تاريخ شغورها أو استحداثها.2 - إشعارًا بما اتخذه بشأن توظيف المواطن الذي رشحته وحدة التوظيف خلال سبعة أيام من تاريخ تسلُّم خطاب الترشيح.3 - بيانًا بأسماء عماله، ووظائفهم، ومهنهم، وأجورهم، وأعمارهم، وجنسياتهم، وأرقام رخص العمل لغير السعوديين وتواريخها وغير ذلك من البيانات التي تحددها اللائحة.4 - تقريرًا عن حالة العمل وظروفه وطبيعته، والنقص والزيادة في الأعمال المتوقعة خلال السنة التالية لتاريخ التقرير.5 - ترسل البيانات المشار إليها في الفقرتين 3، 4 من هذه المادة خلال شهر محرم من كل عام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 1- على جميع المنشآت في مختلف أنشطتها، وأيًّا كان عدد العاملين فيها، العمل على استقطاب السعوديين وتوظيفهم، وتوفير وسائل استمرارهم في العمل، وإتاحة الفرصة المناسبة لهم لإثبات صلاحيتهم للعمل عن طريق توجيههم وتدريبهم وتأهيلهم للأعمال الموكولة إليهم.2- يجب ألا تقل نسبة العمال السعوديين الذين يستخدمهم صاحب العمل عن 75% من مجموع عماله. وللوزير في حالة عدم توافر الكفايات الفنية أو المؤهلات الدراسية، أو تعذر إشغال الوظائف بالمواطنين أن يخفض هذه النسبة مؤقتًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: للوزير عند الاقتضاء أن يلزم أصحاب العمل- في بعض النشاطات والمهن وفي بعض المناطق والمحافظات- بعدم توظيف العمال إلا بعد تسجيلهم في وحدات التوظيف بالشروط والأوضاع التي يحددها بقرار منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: على كل صاحب عمل يستخدم خمسة وعشرين عاملاً فأكثر ، وكانت طبيعة العمل لديه تمكنه من تشغيل المعوقين الذين تم تأهيلهم مهنيًّا أن يشغل 4% على الأقل من مجموع عدد عماله من المعوقين المؤهلين مهنيًّا، سواء أكان ذلك عن طريق ترشيح وحدات التوظيف أو غيرها.وعليه أن يرسل إلى مكتب العمل المختص بيانًا بعدد الوظائف والأعمال التي يشغلها المعوقون الذين تم تأهيلهم مهنيًّا، وأجر كل منهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: إذا أصيب أي عامل إصابة عمل نتج عنها نقص في قدراته المعتادة لا يمنعه من أداء عمل آخر غير عمله السابق، فإن على صاحب العمل الذي وقعت إصابة العامل بسبب العمل لديه توظيفه في العمل المناسب بالأجر المحدد لهذا العمل. ولا يخل هذا بما يستحقه من تعويض عن إصابته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: لا يجوز لأي شخص طبيعي أو اعتباري أن يمارس نشاط توظيف السعوديين أو نشاط استقدام العمال ما لم يكن مرخصًا له بذلك من الوزارة.وتحدد اللائحة مهمات كل من هذين النشاطين، وشروط منح الترخيص لكل منهما وتجديده، والواجبات والمحظورات، وقواعد عدم تجديد الترخيص أو إلغائه، والآثار المترتبة على ذلك، وغير ذلك مما يكون ضروريًّا من الشروط والضوابط لضمان حسن سير العمل بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يُعدّ العمال السعوديون الذين أسهمت المكاتب في توظيفهم والعمال الذين استقدمتهم نيابة عن أصحاب العمل عمالًّا لدى صاحب العمل، ويرتبطون به بعلاقة عقدية مباشرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: لا يجوز الاستقدام بقصد العمل إلا بعد موافقة الوزارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 'لا يجوز لغير السعودي أن يمارس عملًا، ولا يجوز أن يسمح له بمزاولته، إلا بعد الحصول على رخصة عمل من الوزارة وفق النموذج الذي تعده لهذا الغرض. ويشترط لمنح الرخصة ما يأتي: 1 - أن يكون العامل قد دخل البلاد بطريقة مشروعة ومصرحًا له بالعمل.2 - أن يكون من ذوي الكفايات المهنية أو المؤهلات الدراسية التي تحتاج إليها البلاد، ولا يوجد من أبناء البلاد من يحملها أو كان العدد الموجود منهم لا يفي بالحاجة، أو يكون من فئة العمال العاديين التي تحتاج إليها البلاد.3 - أن يكون متعاقدًا مع صاحب عمل وتحت مسؤوليته.ويقصد بكلمة (العمل) في هذه المادة كل عمل صناعي أو تجاري أو زراعي أو مالي أو غيره وأي خدمة بما في ذلك الخدمة المنزلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: لا يغني عن رخصة العمل المشار إليها أي تصريح أو ترخيص يكون مطلوبًا من جهة أخرى لممارسة العمل أو المهنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يجب التأكد قبل تجديد رخصة العمل من أنه ليس بين طالبي العمل من السعوديين من تتوافر لديه الشروط المطلوبة ويرغب في القيام بالعمل نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: على الوزير أن يحدد بقرار منه المهن والأعمال التي يحظر على غير السعودي الاشتغال بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يجب أن يكون عقد عمل غير السعودي مكتوبًا ومحدد المدة. وإذا خلا العقد من بيان مدته تعد مدة رخصة العمل هي مدة العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: لا يجوز لصاحب العمل توظيف العامل في مهنة غير المهنة المدونة في رخصة عمله، ويحظر على العامل الاشتغال في غير مهنته قبل اتخاذ الإجراءات النظامية لتغيير المهنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: 1- لا يجوز- بغير اتباع القواعد والإجراءات النظامية المقررة - أن يترك صاحب العمل عامله يعمل لدى غيره، ولا يجوز للعامل أن يعمل لدى صاحب عمل آخر، كما لا يجوز لصاحب العمل توظيف عامل غيره.2 - لا يجوز لصاحب العمل أن يترك عامله يعمل لحسابه الخاص، كما لا يجوز للعامل أن يعمل لحسابه الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: 1 - يتحمل صاحب العمل رسوم استقدام العامل غير السعودي، ورسوم الإقامة ورخصة العمل وتجديدهما وما يترتب على تأخير ذلك من غرامات، ورسوم تغيير المهنة، والخروج والعودة، وتذكرة عودة العامل إلى موطنه بعد انتهاء العلاقة بين الطرفين.2 - يتحمل العامل تكاليف عودته إلى بلده في حالة عدم صلاحيته للعمل أو إذا رغب في العودة دون سبب مشروع.3 - يتحمل صاحب العمل رسوم نقل خدمات العامل الذي يرغب في نقل خدماته إليه.4 - يلزم صاحب العمل بنفقات تجهيز جثمان العامل ونقله إلى الجهة التي أبرم فيها العقد أو استقدم العامل منها، ما لم يدفن بموافقة ذويه داخل المملكة، ويعفى صاحب العمل في حالة التزام المؤسسة العامة للتأمينات الاجتماعية بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: تحدد اللائحة شروط الاستقدام، ونقل الخدمات، وتغيير المهنة، وضوابط ذلك وإجراءاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: على كل صاحب عمل إعداد عماله السعوديين، وتحسين مستواهم في الأعمال الفنية والإدارية والمهنية وغيرها، بهدف إحلالهم تدريجيًّا في الأعمال التي يقوم بها غير السعوديين. وعليه أن يعد سجلًا يقيد فيه أسماء العمال السعوديين الذين أحلهم محل غير السعوديين بحسب الشروط والقواعد التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: مع عدم الإخلال بما تنص عليه اتفاقيات الامتياز وغيرها من الاتفاقيات من شروط وقواعد خاصة بالتدريب والتأهيل والتعليم والابتعاث، على كل صاحب عمل يشغّل خمسين عاملًا فأكثر أن يدرب على أعماله من عماله السعوديين ما لا يقل عن 6% من مجموع عماله سنويًّا. وللوزير أن يرفع هذه النسبة في بعض المنشآت التي يحددها بقرار منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يجب أن يشتمل برنامج التدريب على القواعد والشروط التي تتبع في التدريب، وعلى مدته وعدد ساعاته والبرامج التدريبية النظرية والعملية، وطريقة الاختبار والشهادات التي تمنح في هذا الشأن، وتحدد اللائحة المعايير والقواعد العامة التي ينبغي اتباعها بهذا الخصوص لرفع مستوى أداء العامل من حيث المهارة والإنتاجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: عقد التأهيل والتدريب عقد يلتزم بمقتضاه صاحب العمل بتأهيل أو تدريب شخص لإعداده في مهنة معينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: يجب أن يكون عقد التأهيل أو التدريب مكتوبًا، وأن يحدد فيه نوع المهنة المتعاقد للتدريب عليها، ومدة التدريب ومراحله المتتابعة، ومقدار المكافأة التي تعطى للمتدرب في كل مرحلة، على ألا يكون تحديدها بحال من الأحوال على أساس القطعة أو الإنتاج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: للوزير أن يلزم المنشآت- التي يحددها بقرارات منه- بقبول عدد أو نسبة محددة من طلاب الكليات والمعاهد والمراكز وخريجيها؛ بغية التدريب واستكمال الخبرة العملية، وفق الشروط والأوضاع والمدد ومكافآت المتدربين التي يحددها اتفاق يعقد بين الوزارة وإدارة المنشأة المعنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: لصاحب العمل أن ينهي عقد التأهيل أو التدريب إذا لمس من المتدرب عدم قابليته أو قدرته على إكمال برامج التدريب بصورة مفيدة، وللمتدرب أو وليه أو وصيه مثل هذا الحق، وعلى الطرف الذي يرغب في إنهاء العقد إبلاغ الطرف الآخر بذلك قبل أسبوع على الأقل من تاريخ التوقف عن التدريب.ويجوز لصاحب العمل أن يلزم المتدرب بأن يعمل لديه بعد انقضاء مدة التدريب، مدة لا تزيد على ضعف هذه المدة أو سنة أيهما أطول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: تسري على عقد التأهيل والتدريب الأحكام الواردة في هذا النظام، الخاصة بالإجازات السنوية والعطلات الرسمية، والحد الأقصى لساعات العمل، وفترات الراحة اليومية والراحة الأسبوعية، وقواعد السلامة والصحة المهنية، وإصابات العمل وشروطها، وما يقرره الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: عقد العمل هو عقد مبرم بين صاحب عمل وعامل، يتعهد الأخير بموجبه أن يعمل تحت إدارة صاحب العمل أو إشرافه مقابل أجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يجب أن يكتب عقد العمل من نسختين، يحتفظ كل من طرفيه بنسخة. ويعد العقد قائمًا ولو كان غير مكتوب، وفي هذه الحالة يجوز للعامل وحده إثبات العقد وحقوقه التي نشأت عنه بجميع طرق الإثبات، ويكون لكل من الطرفين أن يطلب كتابة العقد في أي وقت، أما عمال الحكومة والمؤسسات العامة فيقوم قرار أو أمر التعيين الصادر من الجهة المختصة مقام العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: 'يجب أن يحتوي عقد العمل بصورة أساسية على: اسم صاحب العمل ومكانه، واسم العامل وجنسيته، وما يلزم لإثبات شخصيته، والأجر المتفق عليه، ونوع العمل ومكانه، وتاريخ الالتحاق به، ومدته إن كان محدد المدة. مع مراعاة ما نصت عليه المادة (السابعة والثلاثون) من هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: إذا كان العامل خاضعًا لفترة تجربة وجب النص على ذلك صراحة في عقد العمل، وتحديدها بوضوح، بحيث لا تزيد على تسعين يومًا، ولا تدخل في حساب فترة التجربة إجازة عيدي الفطر والأضحى والإجازة المرضية، ويكون لكل من الطرفين الحق في إنهاء العقد خلال هذه الفترة ما لم يتضمن العقد نصًّا يعطي الحق في الإنهاء لأحدهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: لا يجوز وضع العامل تحت التجربة أكثر من مرة واحدة لدى صاحب عمل واحد، واستثناء من ذلك يجوز باتفاق طرفي العقد إخضاع العامل لفترة تجربة ثانية لا تتجاوز مدتها تسعين يومًا، بشرط أن تكون في مهنة أخرى أو عمل آخر، وإذا أنهي العقد خلال فترة التجربة فإن أيًّا من الطرفين لا يستحق تعويضًا، كما لا يستحق العامل مكافأة نهاية الخدمة عن ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: 1- ينتهي عقد العمل المحدد المدة بانقضاء مدته، فإذا استمر طرفاه في تنفيذه عدّ العقد مجددًا لمدة غير محددة، مع مراعاة ما نصت عليه المادة (السابعة والثلاثون) من هذا النظام بالنسبة إلى غير السعوديين.2 - إذا تضمن العقد المحدد المدة شرطًا يقضي بتجديده لمدة مماثلة أو لمدة محددة، فإن العقد يتجدد للمدة المتفق عليها، فإن تعدد التجديد مرتين متتاليتين أو بلغت مدة العقد الأصلي مع مدة التجديد ثلاث سنوات أيهما أقل، واستمر الطرفان في تنفيذه تحول العقد إلى عقد غير محدد المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: في جميع الحالات التي يتجدد فيها العقد لمدة محددة، تعد المدة التي تجدد إليها العقد امتدادًا للمدة الأصلية في تحديد حقوق العامل التي تدخل مدة الخدمة في حسابها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: إذا كان العقد من أجل القيام بعمل معين فإنه ينتهي بإنجاز العمل المتفق عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: لا يجوز لصاحب العمل أن ينقل العامل من مكان عمله الأصلي إلى مكان آخر يقتضي تغيير محل إقامته، إذا كان من شأن النقل أن يلحق بالعامل ضررًا جسيمًا ولم يكن له سبب مشروع تقتضيه طبيعة العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: لا يجوز نقل العامل ذي الأجر الشهري إلى فئة عمال اليومية أو العمال المعينين بالأجر الأسبوعي أو بالقطعة أو بالساعة، إلا إذا وافق العامل على ذلك كتابة، ومع عدم الإخلال بالحقوق التي اكتسبها العامل في المدة التي قضاها بالأجر الشهري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: مع عدم الإخلال بما تضمنته المادة (الثامنة والثلاثون) من هذا النظام، لا يجوز تكليف العامل بعمل يختلف اختلافًا جوهريًّا عن العمل المتفق عليه بغير موافقته الكتابية، إلا في حالات الضرورة التي قد تقتضيها ظروف عارضة، ولمدة لا تتجاوز ثلاثين يومًا في السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: 'بالإضافة إلى الواجبات المنصوص عليها في هذا النظام واللوائح والقرارات الصادرة تطبيقاً له، يجب على صاحب العمل ما يأتي: 1 - أن يمتنع عن تشغيل العامل سخرة، وألا يحتجز دون سند قضائي أجر العامل أو جزءًا منه، وأن يعامل عماله بالاحترام اللائق، وأن يمتنع عن كل قول أو فعل يمس كرامتهم ودينهم.2 - أن يعطي العمال الوقت اللازم لممارسة حقوقهم المنصوص عليها في هذا النظام دون تنزيل من الأجور لقاء هذا الوقت، وله أن ينظم ممارسة هذا الحق بصورة لا تخل بسير العمل.3 - أن يسهل لموظفي الجهات المختصة كل مهمة تتعلق بتطبيق أحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: إذا حضر العامل لأداء عمله في الوقت المحدد لذلك، أو بين أنه مستعد لأداء عمله في هذا الوقت، ولم يمنعه عن العمل إلا سبب راجع إلى صاحب العمل؛ كان له الحق في أجر المدة التي لا يؤدي فيها العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: على صاحب العمل أو وكيله أو أي شخص له سلطة على العمال، منع دخول أي مادة محرمة شرعًا إلى أماكن العمل، ويطبق بحق من وجدت لديه أو من تعاطاها العقوبات المقررة في هذا النظام، مع عدم الإخلال بالعقوبات الشرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: 'يلزم صاحب العمل عند انتهاء عقد العمل بما يأتي: 1 - أن يعطي العامل- بناءً على طلبه- شهادة خدمة دون مقابل، ويوضح فيها تاريخ التحاقه بالعمل وتاريخ انتهاء علاقته بالعمل الذي كان يؤديه ومهنته ومقدار أجره الأخير، ويجب أن تكون هذه الشهادة مسببة إذا اشتملت على ما قد يسيء إلى سمعة العامل أو يقلل فرص العمل أمامه.2 - أن يعيد للعامل جميع ما أودعه لديه من شهادات ووثائق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: 'بالإضافة إلى الواجبات المنصوص عليها في هذا النظام واللوائح والقرارات الصادرة تطبيقًا له، يجب على العامل: 1 - أن ينجز العمل وفقًا لأصول المهنة ووفق تعليمات صاحب العمل، إذا لم يكن في هذه التعليمات ما يخالف العقد أو النظام أو الآداب العامة، ولم يكن في تنفيذها ما يعرض للخطر.2 - أن يعتني عناية كافية بالآلات والأدوات والمهمات والخامات المملوكة لصاحب العمل الموضوعة تحت تصرفه، أو التي تكون في عهدته، وأن يعيد إلى صاحب العمل المواد غير المستهلكة.3 - أن يلتزم حسن السلوك والأخلاق أثناء العمل.4 - أن يقدم كل عون ومساعدة دون أن يشترط لذلك أجرًا إضافيًّا في حالات الكوارث والأخطار التي تهدد سلامة مكان العمل أو الأشخاص العاملين فيه.5 - أن يخضع- وفقًا لطلب صاحب العمل- للفحوص الطبية التي يرغب في إجرائها عليه قبل الالتحاق بالعمل أو أثناءه، للتحقق من خلوه من الأمراض المهنية أو السارية.6 - أن يحفظ الأسرار الفنية والتجارية والصناعية للمواد التي ينتجها، أو التي أسهم في إنتاجها بصورة مباشرة أو غير مباشرة، وجميع الأسرار المهنية المتعلقة بالعمل أو المنشأة التي من شأن إفشائها الإضرار بمصلحة صاحب
    العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والستون
  article_text_ar: 'الجزاءات التأديبية التي يجوز لصاحب العمل توقيعها على العامل: 1 - الإنذار.2 - الغرامة.3 - الحرمان من العلاوة أو تأجيلها لمدة لا تزيد على سنة متى كانت مقررة من صاحب العمل.4 - تأجيل الترقية مدة لا تزيد على سنة متى كانت مقررة من صاحب العمل.5 - الإيقاف عن العمل مع الحرمان من الأجر.6- الفصل من العمل في الحالات المقررة في النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والستون
  article_text_ar: لا يجوز لصاحب العمل أن يوقع على العامل جزاءً غير وارد في هذا النظام أو في لائحة تنظيم العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والستون
  article_text_ar: لا يجوز تشديد الجزاء في حالة تكرار المخالفة إذا كان قد انقضى على المخالفة السابقة مائة وثمانون يومًا من تاريخ إبلاغ العامل بتوقيع الجزاء عليه عن تلك المخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والستون
  article_text_ar: لا يجوز اتهام العامل بمخالفة مضى على كشفها أكثر من ثلاثين يومًا، ولا يجوز توقيع جزاء تأديبي بعد تاريخ انتهاء التحقيق في المخالفة وثبوتها في حق العامل بأكثر من ثلاثين يومًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السبعون
  article_text_ar: لا يجوز توقيع جزاء تأديبي على العامل لأمر ارتكبه خارج مكان العمل ما لم يكن متصلًا بالعمل أو بصاحبه أو مديره المسؤول، كما لا يجوز أن يوقع على العامل عن المخالفة الواحدة غرامة تزيد قيمتها على أجرة خمسة أيام، ولا توقيع أكثر من جزاء واحد على المخالفة الواحدة، ولا أن تُقتطع من أجره وفاءً للغرامات التي توقع عليه أكثر من أجر خمسة أيام في الشهر الواحد، ولا أن تزيد مدة إيقافه عن العمل دون أجر على خمسة أيام في الشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والسبعون
  article_text_ar: لا يجوز توقيع جزاء تأديبي على العامل إلا بعد إبلاغه كتابة بما نسب إليه واستجوابه وتحقيق دفاعه وإثبات ذلك في محضر يودع في ملفه الخاص، ويجوز أن يكون الاستجواب شفاهة في المخالفات البسيطة التي لا يتعدى الجزاء المفروض على مرتكبها الإنذار أو الغرامة باقتطاع ما لا يزيد على أجر يوم واحد، على أن يثبت ذلك في المحضر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والسبعون
  article_text_ar: يجب أن يبلغ العامل بقرار توقيع الجزاء عليه كتابة، فإذا امتنع عن الاستلام أو كان غائبًا فيرسل البلاغ بكتاب مسجل على عنوانه المبين في ملفه، وللعامل حق الاعتراض على القرار الخاص بتوقيع الجزاء عليه خلال خمسة عشر يومًا- عدا أيام العطل الرسمية- من تاريخ إبلاغه بالقرار النهائي بإيقاع الجزاء عليه، ويقدم الاعتراض إلى هيئة تسوية الخلافات العمالية، ويجب عليها أن تصدر قرارها خلال ثلاثين يومًا من تاريخ تسجيل الاعتراض لديها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والسبعون
  article_text_ar: يجب كتابة الغرامات التي توقع على العمال في سجل خاص مع بيان اسم العامل ومقدار أجره ومقدار الغرامة وسبب توقيعها وتاريخ ذلك، ولا يجوز التصرف في الغرامات إلا فيما يعود بالنفع على عمال المنشأة بعد أخذ موافقة الوزارة على ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والسبعون
  article_text_ar: 'ينتهي عقد العمل في أي من الأحوال الآتية: 1 - إذا اتفق الطرفان على إنهائه، بشرط أن تكون موافقة العامل كتابية.2 - إذا انتهت المدة المحددة في العقد- ما لم يكن العقد قد تجدد صراحة وفق أحكام هذا النظام- فيستمر إلى أجله.3 - بناءً على إرادة أحد الطرفين في العقود غير المحددة المدة.4 - بلوغ العامل سن التقاعد وهو ستون سنة للعمال، وخمس وخمسون سنة للعاملات ما لم يتفق الطرفان على الاستمرار في العمل بعد هذه السن، ويجوز تخفيض سن التقاعد في حالات التقاعد المبكر الذي ينص عليه في لائحة تنظيم العمل، وإذا كان عقد العمل محدد المدة، وكانت مدته تمتد إلى ما بعد بلوغ سن التقاعد ففي هذه الحالة ينتهي العقد بانتهاء مدته.5 - القوة القاهرة.ويتم العمل بحكم الفقرة الرابعة من هذه المادة بعد سنتين من تاريخ العمل بهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والسبعون
  article_text_ar: إذا كان العقد غير محدد المدة جاز لأي من طرفيه إنهاؤه بناءً على سبب مشروع يجب بيانه بموجب إشعار يوجه إلى الطرف الآخر كتابة قبل الإنهاء بمدة لا تقل عن ثلاثين يومًا إذا كان أجر العامل يدفع شهريًّا، ولا يقل عن خمسة عشر يومًا بالنسبة إلى غيره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والسبعون
  article_text_ar: إذا لم يراع الطرف الذي أنهى العقد المدة المذكورة في المادة الخامسة والسبعين من هذا النظام فإنه يلزم بأن يدفع للطرف الآخر تعويضًا معادلًا لأجر العامل عن مدة الإشعار، أو المتبقي منها، ويتخذ الأجر الأخير للعامل أساسًا لتقدير التعويض، وذلك بالنسبة إلى العمال الذين يتقاضون أجورهم بالمعيار الزمني.أما بالنسبة إلى العمال الذين يتقاضون أجورهم بمعيار آخر فيراعى في التقدير ما ورد في المادة السادسة والتسعين من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والسبعون
  article_text_ar: إذا أنهي العقد لسبب غير مشروع كان للطرف الذي أصابه ضرر من هذا الإنهاء الحق في تعويض تقدره هيئة تسوية الخلافات العمالية، يراعى فيه ما لحقه من أضرار مادية وأدبية حالة واحتمالية وظروف الإنهاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والسبعون
  article_text_ar: يجوز للعامل الذي يفصل من عمله بغير سبب مشروع أن يطلب إعادته إلى العمل، وينظر في هذه الطلبات وفق أحكام هذا النظام ولائحة المرافعات أمام هيئات تسوية الخلافات العمالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والسبعون
  article_text_ar: لا ينقضي عقد العمل بوفاة صاحب العمل، ما لم تكن شخصيته قد روعيت في إبرام العقد، ولكنه ينتهي بوفاة العامل أو بعجزه عن أداء عمله، وذلك بموجب شهادة طبية معتمدة من الجهات الصحية المخولة، أو من الطبيب المخول الذي يعينه صاحب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: ( التاسعة والسبعين مكرر )
  article_text_ar: '- اُضيفت هذه المادة بموجب المرسوم الملكي رقم (م/44) وتاريخ 1446/2/8هـ، وتكون بالنص الآتي: "1- يُعد طلب الاستقالة المقدم مقبولاً إذا مضى على تقديمه (ثلاثون) يوماً دون ردٍّ من صاحب العمل. ولصاحب العمل تأجيل قبول طلب الاستقالة مدة لا تزيد على (ستين) يوماً إذا اقتضت مصلحة العمل ذلك، ووفق إيضاح مسبب مكتوب يقدم للعامل، على أن يكون تأجيل القبول قبل انتهاء مدة الثلاثين يوماً المشار إليها في هذه الفقرة. وتحتسب مدة تأجيل القبول من تاريخ تقديم الإيضاح المشار إليه للعامل. 2- ينتهي عقد العمل بالاستقالة من تاريخ قبول صاحب العمل بها أو مضي مدة الثلاثين يوماً المشار إليها في الفقرة (1) من هذه المادة دون رد من صاحب العمل، أو مرور مدة تأجيل القبول المشار إليها في الفقرة (1) من هذه المادة. 3- للعامل العدول عن طلب الاستقالة خلال مدة لا تتجاوز (سبعة) أيام من تاريخ تقديمه، ما لم يقبلها صاحب العمل قبل العدول. 4- لا يصح أن يُحدد في طلب الاستقالة تاريخ مؤجل لها. 5- يُعد عقد العمل سارياً خلال مدة طلب الاستقالة، ويلتزم طرفا العقد بتنفيذ جميع الالتزامات الناشئة عنه خلالها. 6- يستحق العامل الذي انتهى
    عقده بالاستقالة جميع حقوقه المقررة بموجب هذا النظام".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثمانون
  article_text_ar: 'لا يجوز لصاحب العمل فسخ العقد دون مكافأة أو إشعار العامل أو تعويضه إلا في الحالات الآتية، وبشرط أن يتيح له الفرصة لكي يبدي أسباب معارضته للفسخ : 1 - إذا وقع من العامل اعتداء على صاحب العمل أو المدير المسوؤل أو أحد رؤسائه أثناء العمل أو بسببه.2 - إذا لم يؤد العامل التزاماته الجوهرية المترتبة على عقد العمل أو لم يطع الأوامر المشروعة أو لم يراع عمدًا التعليمات- المعلن عنها في مكان ظاهر من قبل صاحب العمل- الخاصة بسلامة العمل والعمال رغم إنذاره كتابة.3 - إذا ثبت اتباعه سلوكًا سيئًا أو ارتكابه عملًا مخلًّا بالشرف أو الأمانة.4 - إذا وقع من العامل عمدًا أي فعل أو تقصير يقصد به إلحاق خسارة مادية بصاحب العمل على شرط أن يبلغ صاحب العمل الجهات المختصة بالحادث خلال أربع وعشرين ساعة من وقت علمه بوقوعه.5 - إذا ثبت أن العامل لجأ إلى التزوير ليحصل على العمل.6 - إذا كان العامل معينًا تحت الاختبار.7 - إذا تغيب العامل دون سبب مشروع أكثر من عشرين يومًا خلال السنة الواحدة، أو أكثر من عشرة أيام متتالية، على أن يسبق الفصل إنذار كتابي من صاحب العمل للعامل بعد غيابه عشرة أيام في الحالة الأولى،
    وانقطاعه خمسة أيام في الحالة الثانية.8 - إذا ثبت أنه استغل مركزه الوظيفي بطريقة غير مشروعة للحصول على نتائج ومكاسب شخصية.9 - إذا ثبت أن العامل أفشى الأسرار الصناعية أو التجارية الخاصة بالعمل الذي يعمل فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والثمانون
  article_text_ar: 'يحق للعامل أن يترك العمل دون إشعار مع احتفاظه بحقوقه النظامية كلها، وذلك في أي من الحالات الآتية: 1 - إذا لم يقم صاحب العمل بالوفاء بالتزاماته العقدية أو النظامية الجوهرية إزاء العامل.2 - إذا ثبت أن صاحب العمل أو من يمثله قد أدخل عليه الغش وقت التعاقد فيما يتعلق بشروط العمل وظروفه.3 - إذا كلفه صاحب العمل دون رضاه بعمل يختلف جوهريًّا عن العمل المتفق عليه، وخلافًا لما تقرره المادة الستون من هذا النظام.4 - إذا وقع من صاحب العمل أو من أحد أفراد أسرته أو من المدير المسؤول اعتداء يتسم بالعنف، أو سلوك مخل بالآداب نحو العامل أو أحد أفراد أسرته.5 - إذا اتسمت معاملة صاحب العمل أو المدير المسؤول بمظاهر من القسوة والجور أو الإهانة.6 - إذا كان في مقر العمل خطر جسيم يهدد سلامة العامل أو صحته، بشرط أن يكون صاحب العمل قد علم بوجوده، ولم يتخذ من الإجراءات ما يدل على إزالته.7 - إذا كان صاحب العمل أو من يمثله قد دفع العامل بتصرفاته وعلى الأخص بمعاملته الجائرة أو بمخالفته شروط العقد إلى أن يكون العامل في الظاهر هو الذي أنهى العقد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والثمانون
  article_text_ar: لا يجوز لصاحب العمل إنهاء خدمة العامل بسبب المرض، قبل استنفاذه المدد المحددة للإجازة المنصوص عليها في هذا النظام، وللعامل الحق في أن يطلب وصل إجازته السنوية بالمرضية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والثمانون
  article_text_ar: إذا كان العمل المنوط بالعامل يسمح له بمعرفة عملاء صاحب العمل ، أو بالاطلاع على أسرار عمله، جاز لصاحب العمل أن يشترط على العامل ألا يقوم بعد انتهاء العقد بمنافسته أو إفشاء أسراره، ويجب لصحة هذا الشرط أن يكون محررًا ومحددًا، من حيث الزمان والمكان ونوع العمل، وبالقدر الضروري لحماية مصالح صاحب العمل المشروعة، وفي كل الأحوال يجب ألا تزيد مدة هذا الاتفاق على سنتين من تاريخ انتهاء العلاقة بين الطرفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والثمانون
  article_text_ar: إذا انتهت علاقة العمل وجب على صاحب العمل أن يدفع إلى العامل مكافأة عن مدة خدمته تحسب على أساس أجر نصف شهر عن كل سنة من السنوات الخمس الأولى، وأجر شهر عن كل سنة من السنوات التالية، ويتخذ الأجر الأخير أساسًا لحساب المكافأة، ويستحق العامل مكافأة عن أجزاء السنة بنسبة ما قضاه منها في العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والثمانون
  article_text_ar: إذا كان انتهاء علاقة العمل بسبب استقالة العامل يستحق في هذه الحالة ثلث المكافأة بعد خدمة لا تقل مدتها عن سنتين متتاليتين، ولا تزيد على خمس سنوات، ويستحق ثلثيها إذا زادت مدة خدمته على خمس سنوات متتالية ولم تبلغ عشر سنوات، ويستحق المكافأة كاملة إذا بلغت مدة خدمته عشر سنوات فأكثر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والثمانون
  article_text_ar: استثناء من حكم المادة (الثامنة) من هذا النظام، يجوز الاتفاق على ألا تحسب في الأجر الذي تسوى على أساسه مكافأة نهاية الخدمة جميع مبالغ العمولات أو بعضها والنسب المئوية عن ثمن المبيعات وما أشبه ذلك من عناصر الأجر الذي يدفع إلى العامل وتكون قابلة بطبيعتها للزيادة والنقص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والثمانون
  article_text_ar: استثناءً مما ورد في المادة الخامسة والثمانين من هذا النظام تستحق المكافأة كاملة في حالة ترك العامل العمل نتيجة لقوة قاهرة خارجة عن إرادته، كما تستحقها العاملة إذا أنهت العقد خلال ستة أشهر من تاريخ عقد زواجها أو ثلاثة أشهر من تاريخ وضعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والثمانون
  article_text_ar: إذا انتهت خدمة العامل وجب على صاحب العمل دفع أجره وتصفية حقوقه خلال أسبوع- على الأكثر- من تاريخ انتهاء العلاقة العقدية، أما إذا كان العامل هو الذي أنهى العقد وجب على صاحب العمل تصفية حقوقه كاملة خلال مدة لا تزيد على أسبوعين. ولصاحب العمل أن يحسم أي دين مستحق له بسبب العمل من المبالغ المستحقة للعامل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والثمانون
  article_text_ar: لمجلس الوزراء عند الاقتضاء- وبناء على اقتراح الوزير- وضع حد أدنى للأجور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التسعون
  article_text_ar: '1 - يجب دفع أجر العامل وكل مبلغ مستحق له بالعملة الرسمية للبلاد كما يجب دفع الأجر في ساعات العمل ومكانه طبقًا للأحكام الآتية: 1/1 - العمال باليومية تصرف أجورهم مرة كل أسبوع على الأقل.1 /2 - العمال ذوو الأجور الشهرية تصرف أجورهم مرة في الشهر.1 /3 - إذا كان العمل يؤدى بالقطعة، ويحتاج لمدة تزيد على أسبوعين فيجب أن يحصل العامل على دفعة كل أسبوع تتناسب مع ما أتمه من العمل، ويصرف باقي الأجر كاملًا خلال الأسبوع التالي لتسليم العمل.1 /4 - في غير ما ذكر تؤدى إلى العمال أجورهم مرة كل أسبوع على الأقل. 2 - يجوز دفع الأجور عن طريق البنوك المعتمدة في المملكة إذا وافق العامل على ذلك بشرط ألا يتجاوز موعد استحقاقها المواعيد المحددة أعلاه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والتسعون
  article_text_ar: 1- إذا تسبب عامل في فقد أو إتلاف أو تدمير آلات أو منتجات يملكها صاحب العمل أو هي في عهدته وكان ذلك ناشئًا عن خطأ العامل أو مخالفته تعليمات صاحب العمل ولم يكن نتيجة لخطأ الغير أو ناشئًا عن قوة قاهرة، فلصاحب العمل أن يقتطع من أجر العامل المبلغ اللازم للإصلاح أو لإعادة الوضع إلى ما كان عليه على ألا يزيد ما يقتطع لهذا الغرض على أجر خمسة أيام في كل شهر، ولصاحب العمل الحق في التظلم عند الاقتضاء، وذلك بطلب ما هو أكثر من ذلك إذا كان للعامل مال آخر يمكن الاستيفاء منه، وللعامل أن يتظلم مما نسب إليه أو من تقدير صاحب العمل للتعويض أمام هيئة تسوية الخلافات العمالية، فإذا حكمت بعدم أحقية صاحب العمل في الرجوع على العامل بما اقتطعه منه أو حكمت بأقل منه وجب على صاحب العمل أن يرد إلى العامل ما اقتطع منه دون وجه حق خلال سبعة أيام من تاريخ صدور الحكم.2 - يكون تظلم أي من الطرفين خلال خمسة عشر يوم عمل، وإلا سقط الحق فيه، ويبدأ موعد التظلم بالنسبة إلى صاحب العمل من تاريخ اكتشاف الواقعة، وبالنسبة إلى العامل من تاريخ إبلاغ صاحب العمل له بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والتسعون
  article_text_ar: 'لا يجوز حسم أي مبلغ من أجور العامل لقاء حقوق خاصة دون موافقة خطية منه، إلا في الحالات الآتية: 1 - استرداد قروض صاحب العمل، بشرط ألا يزيد ما يحسم من العامل في هذه الحالة على 10% من أجره.2 - اشتراكات التأمينات الاجتماعية ، وأي اشتراكات أخرى مستحقة على العامل ومقررة نظامًا.3 - اشتراكات العامل في صندوق الادخار والقروض المستحقة للصندوق.4 - أقساط أي مشروع يقوم به صاحب العمل لبناء المساكن بقصد تمليكها للعمال أو أي مزية أخرى.5 - الغرامات التي توقع على العامل بسبب المخالفات التي يرتكبها، وكذلك المبلغ الذي يقتطع منه مقابل ما أتلفه.6 - استيفاء دين إنفاذًا لأي حكم قضائي، على ألَّا يزيد ما يحسم شهريًّا لقاء ذلك على ربع الأجر المستحق للعامل ما لم يتضمن الحكم خلاف ذلك.ويستوفى دين النفقة أولًا، ثم دين المأكل والملبس والمسكن قبل الديون الأخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والتسعون
  article_text_ar: لا يجوز- في جميع الأحوال- أن تزيد نسبة المبالغ المحسومة على نصف أجر العامل المستحق، ما لم يثبت لدى هيئة تسوية الخلافات العمالية إمكان الزيادة في الحسم على تلك النسبة، أو يثبت لديها حاجة العامل إلى أكثر من نصف أجره، وفي هذه الحالة الأخيرة لا يعطى العامل أكثر من ثلاثة أرباع أجره، مهما كان الأمر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والتسعون
  article_text_ar: 1- إذا حسم من أجر العامل أي مبلغ لسبب غير ما هو منصوص عليه في هذا النظام بغير موافقته الكتابية، أو تأخر صاحب العمل عن أداء أجر العامل في موعد استحقاقه المحدد نظامًا دون مسوغ مشروع كان للعامل أو لمن يمثله أو مدير مكتب العمل المختص أن يتقدم بطلب إلى هيئة تسوية الخلافات العمالية، كي تأمر صاحب العمل أن يرد إلى العامل ما حسمه دون وجه حق، أو يدفع له أجوره المتأخرة.2 - يجوز للهيئة المذكورة إذا ثبت لديها أن صاحب العمل حسم المبالغ المذكورة أو تأخر في سداد الأجر دون مسوغ أن توقع عليه غرامة لا تتجاوز ضعف ما حسم من أجر العامل أو ضعف قيمة الأجر المتأخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والتسعون
  article_text_ar: 1- إذا لم ينص عقد العمل أو لائحة تنظيم العمل على الأجر الذي يلتزم به صاحب العمل يؤخذ بالأجر المقدر لعمل من النوع ذاته في المنشأة إن وجد، وإلا قدر الأجر طبقًا لعرف المهنة في الجهة التي يؤدى فيها العمل، فإن لم يوجد تولت هيئة تسوية الخلافات العمالية تقدير الأجر وفقًا لمقتضيات العدالة. 2 - ويتبع ذلك أيضًا في تحديد نوع الخدمة الواجب على العامل أداؤها، وفي تحديد مداها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والتسعون
  article_text_ar: 1- إذا كان أجر العامل محددًا على أساس القطعة أو الإنتاج يعتمد متوسط الأجر الذي تقاضاه عن أيام عمله الفعلية في السنة الأخيرة من خدمته، لغرض حساب أي من الحقوق المقررة له بموجب هذا النظام.2 - إذا كان الأجر كله مبالغ العمولات أو النسب المئوية من المبيعات أو ما أشبه ذلك، مما تكون قابلة بطبيعتها للزيادة أو النقص، يحسب متوسط الأجر اليومي على أساس ما تقاضاه العامل عن أيام العمل الفعلية مقسومًا عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والتسعون
  article_text_ar: إذا جرى توقيف العامل أو احتجازه لدى الجهات المختصة في قضايا تتصل بالعمل أو بسببه فعلى صاحب العمل أن يستمر في دفع 50% من الأجر إلى العامل حتى يفصل في قضيته، على ألا تزيد مدة التوقيف أو الحجز على مائة وثمانين يومًا، فإذا زادت على ذلك فلا يلتزم صاحب العمل بدفع أي جزء من الأجر عن المدة الزائدة، فإذا قضي ببراءة العامل أو حفظ التحقيق لعدم ثبوت ما نسب إليه أو لعدم صحته، وجب على صاحب العمل أن يرد إلى العامل ما سبق حسمه من أجره، أما إذا قضي بإدانته فلا يستعاد منه ما صرف له ما لم ينص الحكم على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والتسعون
  article_text_ar: لا يجوز تشغيل العامل تشغيلًا فعليًّا أكثر من ثماني ساعات في اليوم الواحد، إذا اعتمد صاحب العمل المعيار اليومي، أو أكثر من ثمان وأربعين ساعة في الأسبوع، إذا اعتمد المعيار الأسبوعي. وتخفض ساعات العمل الفعلية خلال شهر رمضان للمسلمين، بحيث لا تزيد على ست ساعات في اليوم، أو ست وثلاثين ساعة في الأسبوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والتسعون
  article_text_ar: يجوز زيادة ساعات العمل المنصوص عليها في المادة الثامنة والتسعين من هذا النظام إلى تسع ساعات في اليوم الواحد لبعض فئات العمال، أو في بعض الصناعات والأعمال التي لا يشتغل فيها العامل بصفة مستمرة، كما يجوز تخفيضها إلى سبع ساعات في اليوم الواحد لبعض فئات العمال أو في بعض الصناعات والأعمال الخطرة أو الضارة، وتحدد فئات العمال والصناعات والأعمال المشار إليها بقرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة المائة
  article_text_ar: يجوز لصاحب العمل- بموافقة الوزارة- في المنشآت التي تقتضي طبيعة العمل فيها أداء العمل بالتناوب زيادة ساعات العمل على ثماني ساعات عمل في اليوم أو ثمان وأربعين ساعة في الأسبوع، بشرط ألا يزيد متوسط ساعات العمل عند احتسابه لمدة ثلاثة أسابيع أو أقل على ثماني ساعات يوميًّا أو ثمان وأربعين ساعة أسبوعيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الأولى بعد المائة
  article_text_ar: تنظم ساعات العمل وفترات الراحة خلال اليوم، بحيث لا يعمل أي عامل أكثر من خمس ساعات متتالية دون فترة للراحة والصلاة والطعام لا تقل عن نصف ساعة في المرة الواحدة خلال مجموع ساعات العمل، وبحيث لا يبقى العامل في مكان العمل أكثر من إحدى عشرة ساعة في اليوم الواحد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية بعد المائة
  article_text_ar: لا تدخل الفترات المخصصة للراحة والصلاة والطعام ضمن ساعات العمل الفعلية، ولا يكون العامل خلال هذه الفترات تحت سلطة صاحب العمل، ولا يجوز لصاحب العمل أن يلزم العامل بالبقاء خلالها في مكان العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة بعد المائة
  article_text_ar: للوزير أن يحدد بقرار منه الحالات والأعمال التي يتحتم فيها استمرار العمل دون فترة راحة لأسباب فنية أو لظروف التشغيل، ويلتزم صاحب العمل في هذه الحالات والأعمال بإعطاء فترة للصلاة والطعام والراحة بطريقة تنظمها إدارة المنشأة أثناء العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة بعد المائة
  article_text_ar: 1- يوم الجمعة يوم الراحة الأسبوعية لجميع العمال.ويجوز لصاحب العمل- بعد إبلاغ مكتب العمل المختص- أن يستبدل بهذا اليوم لبعض عماله أي يوم من أيام الأسبوع، وعليه أن يمكنهم من القيام بواجباتهم الدينية، ولا يجوز تعويض يوم الراحة الأسبوعية بمقابل نقدي.2- يكون يوم الراحة الأسبوعية بأجر كامل، ولا يقل عن أربع وعشرين ساعة متتالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة بعد المائة
  article_text_ar: استثناء من حكم المادة الرابعة بعد المائة من هذا النظام، يجوز في الأماكن البعيدة عن العمران وفي الأعمال التي تتطلب طبيعة العمل وظروف التشغيل فيها استمرار العمل تجميع الراحات الأسبوعية المستحقة للعامل عن مدة لا تتجاوز ثمانية أسابيع إذا اتفق صاحب العمل والعمال ووافقت على ذلك الوزارة، ويراعى في حساب مدة الراحة الأسبوعية المُجَمعة أن تبدأ من ساعة وصول العمال إلى أقرب مدينة يتوفر بها وسائل نقل، وتنتهي ساعة العودة إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة بعد المائة
  article_text_ar: 'يجوز لصاحب العمل عدم التقيد بأحكام المواد الثامنة والتسعين والأولى بعد المائة والفقرة (1) من المادة الرابعة بعد المائة من هذا النظام في الحالات الآتية : 1 - أعمال الجرد السنوي، وإعداد الميزانية، والتصفية، وقفل الحسابات، والاستعداد للبيع بأثمان مخفضة، والاستعداد للمواسم، بشرط ألا يزيد عدد الأيام التي يشتغل فيها العمال على ثلاثين يومًا في السنة.2 - إذا كان العمل لمنع وقوع حادث خطر، أو إصلاح ما نشأ عنه، أو تلافي خسارة محققة لمواد قابلة للتلف.3 - إذا كان التشغيل بقصد مواجهة ضغط عمل غير عادي.4 - الأعياد والمواسم والمناسبات الأخرى والأعمال الموسمية التي تحدد بقرار من الوزير.ولا يجوز في جميع الحالات المتقدمة أن تزيد ساعات العمل الفعلية على عشر ساعات في اليوم، أو ستين ساعة في الأسبوع. ويحدد الوزير بقرار منه الحد الأقصى لساعات العمل الإضافية التي يسمح بها في السنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة بعد المائة
  article_text_ar: 1- يجب على صاحب العمل أن يدفع للعامل أجراً إضافيًّا عن ساعات العمل الإضافية يوازي أجر الساعة مضافًا إليه 50% من أجره الأساسي.2 - إذا كان التشغيل في المنشأة على أساس المعيار الأسبوعي لساعات العمل تعد الساعات التي تزيد على الساعات المتخذة لهذا المعيار ساعات عمل إضافية .3 - تعد جميع ساعات العمل التي تؤدَّى في أيام العطل والأعياد ساعات إضافية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة بعد المائة
  article_text_ar: 'لا تسري أحكام المادتين الثامنة والتسعين والأولى بعد المائة من هذا النظام على الحالات الآتية : 1 - الأشخاص الذين يشغلون مناصب عالية ذات مسؤولية في الإدارة والتوجيه، إذا كان من شأن هذه المناصب أن يتمتع شاغلوها بسلطات صاحب العمل على العمال.2 - الأعمال التجهيزية أو التكميلية التي يجب إنجازها قبل ابتداء العمل أو بعده.3 - العمل الذي يكون متقطعًا بالضرورة.4 - العمال المخصصون للحراسة والنظافة، عدا عمال الحراسة الأمنية المدنية.وتحدد اللائحة الأعمال المبينة في الفقرات 2، 3، 4 من هذه المادة والحد الأقصى لساعات العمل فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة بعد المائة
  article_text_ar: 1- يستحق العامل عن كل عام إجازة سنوية لا تقل مدتها عن واحد وعشرين يومًا، تُزاد إلى مدة لا تقل عن ثلاثين يومًا إذا أمضى العامل في خدمة صاحب العمل خمس سنوات متصلة، وتكون الإجازة بأجر يدفع مقدمًا.2 - يجب أن يتمتع العامل بإجازته في سنة استحقاقها، ولا يجوز النزول عنها، أو أن يتقاضى بدلًا نقديًّا عوضًا عن الحصول عليها أثناء خدمته، ولصاحب العمل أن يحدد مواعيد هذه الإجازات وفقًا لمقتضيات العمل، أو يمنحها بالتناوب لكي يؤمن سير عمله، وعليه إشعار العامل بالميعاد المحدد لتمتعه بالإجازة بوقت كافٍ لا يقل عن ثلاثين يومًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة العاشرة بعد المائة
  article_text_ar: 1- للعامل بموافقة صاحب العمل أن يؤجل إجازته السنوية أو أيامًا منها إلى السنة التالية.2 - لصاحب العمل حق تأجيل إجازة العامل بعد نهاية سنة استحقاقها إذا اقتضت ظروف العمل ذلك لمدة لا تزيد على تسعين يومًا، فإذا اقتضت ظروف العمل استمرار التأجيل وجب الحصول على موافقة العامل كتابة، على ألا يتعدى التأجيل نهاية السنة التالية لسنة استحقاق الإجازة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية عشرة بعد المائة
  article_text_ar: للعامل الحق في الحصول على أجرة عن أيام الإجازة المستحقة إذا ترك العمل قبل استعماله لها، وذلك بالنسبة إلى المدة التي لم يحصل على إجازته عنها، كما يستحق أجرة الإجازة عن أجزاء السنة بنسبة ما قضاه منها في العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية عشرة بعد المائة
  article_text_ar: لكل عامل الحق في إجازة بأجر كامل في الأعياد والمناسبات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد المائة
  article_text_ar: للعامل الحق في إجازة بأجر لمدة يوم واحد في حالة ولادة مولود له، وثلاثة أيام لمناسبة زواجه، أو في حالة وفاة زوجه أو أحد أصوله أو فروعه، ويحق لصاحب العمل أن يطلب الوثائق المؤيدة للحالات المشار إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد المائة
  article_text_ar: للعامل الحق في الحصول على إجازة بأجر لا تقل مدتها عن عشرة أيام ولا تزيد على خمسة عشر يومًا بما فيها إجازة عيد الأضحى؛ وذلك لأداء فريضة الحج لمرة واحدة طوال مدة خدمته إذا لم يكن قد أداها من قبل، ويشترط لاستحقاق هذه الإجازة أن يكون العامل قد أمضى في العمل لدى صاحب العمل سنتين متصلتين على الأقل، ولصاحب العمل أن يحدد عدد العمال الذين يمنحون هذه الإجازة سنويًّا وفقًا لمقتضيات العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد المائة
  article_text_ar: للعامل المنتسب إلى مؤسسة تعليمية الحق في إجازة بأجر كامل لتأدية الامتحان عن سنة غير معادة تحدد مدتها بعدد أيام الامتحان الفعلية، أما إذا كان الامتحان عن سنة معادة فيكون للعامل الحق في إجازة دون أجر لأداء الامتحان، ولصاحب العمل أن يطلب من العامل تقديم الوثائق المؤيدة لطلب الإجازة، وكذلك ما يدل على أدائه الامتحان، وعلى العامل أن يتقدم بطلب الإجازة قبل موعدها بخمسة عشر يومًا على الأقل، ويحرم العامل من أجر هذه الإجازة إذا ثبت أنه لم يؤد الامتحان، مع عدم الإخلال بالمساءلة التأديبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة عشرة بعد المائة
  article_text_ar: يجوز للعامل بموافقة صاحب العمل الحصول على إجازة دون أجر، يتفق الطرفان على تحديد مدتها، ويعد عقد العمل موقوفًا خلال مدة الإجازة فيما زاد على عشرين يومًا، ما لم يتفق الطرفان على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة عشرة بعد المائة
  article_text_ar: 'للعامل الذي يثبت مرضه الحق في إجازة مرضية بأجر عن الثلاثين يومًا الأولى، وبثلاثة أرباع الأجر عن الستين يومًا التالية، ودون أجر للثلاثين يومًا التي تلي ذلك خلال السنة الواحدة، سواء أكانت هذه الإجازات متصلة أم متقطعة، ويقصد بالسنة الواحدة: السنة التي تبدأ من تاريخ أول إجازة مرضية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد المائة
  article_text_ar: لا يجوز للعامل أثناء تمتعه بأي من إجازاته المنصوص عليها في هذا الفصل أن يعمل لدى صاحب عمل آخر، فإذا أثبت صاحب العمل أن العامل قد خالف ذلك فله أن يحرمه من أجره عن مدة الإجازة أو يسترد ما سبق أن أداه إليه من ذلك الأجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد المائة
  article_text_ar: لا يعد العاملون طوال الوقت الذين يتأثرون بتخفيض جماعي ومؤقت لساعات عملهم العادية لأسباب اقتصادية أو تقنية أو هيكلية عاملين لبعض الوقت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة العشرون بعد المائة
  article_text_ar: يصدر الوزير القواعد والضوابط اللازمة لتنظيم العمل لبعض الوقت، يحدد فيه الالتزامات المترتبة على كل من العامل لبعض الوقت وصاحب العمل، ولا تسري أحكام هذا النظام إلا في الحدود التي يقررها الوزير، باستثناء الحماية الممنوحة للعاملين طوال الوقت المماثلين، من حيث السلامة والصحة المهنية وإصابات العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد المائة
  article_text_ar: على صاحب العمل حفظ المنشأة في حالة صحية ونظيفة، وإنارتها وتأمين المياه الصالحة للشرب والاغتسال، وغير ذلك من قواعد الحماية والسلامة والصحة المهنية وإجراءاتها ومستوياتها وفقًا لما يحدده الوزير بقرار منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد المائة
  article_text_ar: على كل صاحب عمل أن يتخذ الاحتياطات اللازمة لحماية العمال من الأخطار والأمراض الناجمة عن العمل، والآلات المستعملة، ووقاية العمل وسلامته، وعليه أن يعلن في مكان ظاهر في المنشأة التعليمات الخاصة بسلامة العمل والعمال، وذلك باللغة العربية وبأي لغة أخرى يفهمها العمال عند الاقتضاء، ولا يجوز لصاحب العمل أن يحمّل العمال أو يقتطع من أجورهم أي مبلغ لقاء توفير هذه الحماية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد المائة
  article_text_ar: على صاحب العمل إحاطة العامل قبل مزاولة العمل بمخاطر مهنته، وإلزامه باستعمال وسائل الوقاية المقررة لها، وعليه أن يوفر أدوات الوقاية الشخصية المناسبة للعمال، وتدريبهم على استخدامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد المائة
  article_text_ar: على العامل أن يستعمل الوسائل الوقائية المخصصة لكل عملية، وأن يحافظ عليها، وأن ينفذ التعليمات الموضوعة للمحافظة على صحته ووقايته من الإصابات والأمراض. وعليه أن يمتنع عن ارتكاب أي فعل أو تقصير يتسبب عنه عدم تنفيذ التعليمات، أو إساءة استعمال الوسائل المعدة لحماية مقر العمل وصحة العمال المشتغلين معه وسلامتهم أو تعطيلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد المائة
  article_text_ar: على صاحب العمل أن يتخذ الاحتياطات اللازمة للوقاية من الحريق، وتهيئة الوسائل الفنية لمكافحته، بما في ذلك تأمين منافذ للنجاة، وجعلها صالحة للاستعمال في أي وقت، وأن يعلق في مكان ظاهر من أماكن العمل تعليمات مفصلة بشأن وسائل منع الحريق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد المائة
  article_text_ar: صاحب العمل مسؤول عن الطوارئ والحوادث التي يصاب بها أشخاص آخرون غير عماله، ممن يدخلون أماكن العمل بحكم الوظيفة، أو بموافقة صاحب العمل أو وكلائه، إذا كانت بسبب إهمال اتخاذ الاحتياطات الفنية التي يتطلبها نوع عمله، وعليه أن يعوضهم عما يصيبهم من عطل وضرر حسب الأنظمة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد المائة
  article_text_ar: تطبق أحكام هذا الفصل على المنشآت ذات المخاطر الكبرى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد المائة
  article_text_ar: '1- تعني عبارة ( المنشأة ذات المخاطر الكبرى): المنشأة التي تقوم بشكل دائم أو مؤقت بإنتاج مادة أو أكثر من المواد الخطرة أو فئات من هذه المواد أو تجهيزها أو استبعادها أو مناولتها أو استخدامها أو تخزينها بكميات تتجاوز المعايير المسموح بها،والتي يؤدي تجاوزها إلى إدراج المنشأة في عداد منشآت المخاطر الكبرى.2 - تعني عبارة ( مادة خطرة): أي مادة أو مزيج من المواد يشكل خطورة بحكم خواصه الكيماوية أو الفيزيائية أو السمية إما وحده أو في تركيب مع غيره.3 - تعني عبارة ( حادث كبير): أي حادث فجائي مثل: التسرب الكبير، أو الحريق، أو الانفجار في مجرى نشاط داخل منشأة ذات مخاطر كبرى، ويتضمن مادة خطرة أو أكثر، ويؤدي إلى خطر أكبر على العمال أو الجمهور أو البيئة عاجلًا أو آجلًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد المائة
  article_text_ar: تضع الوزارة ضوابط لتحديد ( المنشآت ذات المخاطر الكبرى) استنادًا إلى قائمة المواد الخطرة، أو فئات هذه المواد، أو كلتيهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثلاثون بعد المائة
  article_text_ar: على أصحاب العمل بالتنسيق مع الوزارة تحديد وضع منشآتهم على أساس الضوابط المشار إليها في المادة التاسعة والعشرين بعد المائة من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد المائة
  article_text_ar: يصدر الوزير اللوائح والقرارات التي تتضمن الترتيبات اللازمة على مستوى المنشأة للوقاية من المخاطر الكبرى، وواجبات أصحاب العمل في هذا الخصوص، وكذلك الترتيبات المتخذة لحماية الجمهور والبيئة خارج موقع كل منشأة ذات مخاطر كبرى، وحقوق العمال وواجباتهم، وغير ذلك من التدابير اللازمة لمنع الحوادث الكبرى، والتقليل من مخاطر وقوعها،والحد من آثارها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد المائة
  article_text_ar: لا تسري أحكام هذا الفصل على المنشآت التي تخضع لفرع الأخطار المهنية من نظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد المائة
  article_text_ar: إذا أصيب العامل بإصابة عمل، أو بمرض مهني، فإن صاحب العمل يلتزم بعلاجه، ويتحمل جميع النفقات اللازمة لذلك، بطريقة مباشرة أو غير مباشرة، بما فيها الإقامة في المستشفى، والفحوص والتحاليل الطبية، والأشعة، والأجهزة التعويضية، ونفقات الانتقال إلى أماكن العلاج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد المائة
  article_text_ar: تعد الإصابة إصابة عمل وفق ما هو منصوص عليه في نظام التأمينات الاجتماعية، وتعد الأمراض المهنية في حكم إصابات العمل، كما يعد تاريخ أول مشاهدة طبية للمرض في حكم تاريخ الإصابة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد المائة
  article_text_ar: تعد في حكم الإصابة حالة الانتكاس أو أي مضاعفة تنشأ عنها، ويسري عليها بالنسبة للمعونة والعلاج ما يسري على الإصابة الأصلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد المائة
  article_text_ar: تحدد الأمراض المهنية وفق جدول الأمراض المهنية المنصوص عليه في نظام التأمينات الاجتماعية وتحدد درجات العجز الدائم الكلي أو الجزئي وفق جدول دليل نسب العجز المنصوص عليه في النظام المذكور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد المائة
  article_text_ar: للمصاب في حالة عجزه المؤقت عن العمل الناجم عن إصابة عمل الحق في معونة مالية تعادل أجره كاملًا لمدة ثلاثين يومًا ثم يستحق 75% من أجره طوال الفترة التي يستغرقها علاجه. فإذا بلغت السنة أو تقرر طبيًّا عدم احتمال شفائه وحالته الصحية لا تمكنه من العمل عدت الإصابة عجزًا كليًّا، ينهى العقد ويعوض عن الإصابة. ولا يكون لصاحب العمل حق في استرداد ما دفعه إلى المصاب خلال تلك السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد المائة
  article_text_ar: إذا نتج عن الإصابة عجز دائم كلي، أو أدت الإصابة إلى وفاة المصاب، فللمصاب أو المستحقين عنه الحق في تعويض يقدر بما يعادل أجره عن مدة ثلاث سنوات بحد أدنى قدره أربعة وخمسون ألف ريال.أما إذا نتج عن الإصابة عجز دائم جزئي، فإن المصاب يستحق تعويضًا معادلًا لنسبة ذلك العجز المقدر، وفقًا لجدول دليل نسب العجز المعتمد مضروبة في قيمة تعويض العجز الدائم الكلي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد المائة
  article_text_ar: 'لا يلزم صاحب العمل بما ورد في المواد الثالثة والثلاثين بعد المائة والسابعة والثلاثين بعد المائة والثامنة والثلاثين بعد المائة من هذا النظام إذا ثبت أي مما يأتي: 1 - أن العامل تعمد إصابة نفسه.2 - أن الإصابة حدثت بسبب سوء سلوك مقصود من جانب العامل.3 - أن العامل امتنع عن عرض نفسه على طبيب، أو امتنع عن قبول معالجة الطبيب المكلف بعلاجه من قبل صاحب العمل دون سبب مشروع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الأربعون بعد المائة
  article_text_ar: تحدد مسؤولية أصحاب العمل السابقين الذين اشتغل لديهم العامل المصاب بالمرض المهني على ضوء التقرير الطبي للطبيب المعالج، ويلزم هؤلاء بالتعويض المنصوص عليه في المادة الثامنة والثلاثين بعد المائة من هذا النظام، كل بنسبة المدة التي قضاها المصاب في خدمته، بشرط أن تكون الصناعات أو المهن التي يمارسونها مما ينشأ عنها المرض الذي أصيب به العامل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد المائة
  article_text_ar: تحدد بقرار من الوزير إجراءات الإبلاغ عن إصابات العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والأربعون بعد المائة
  article_text_ar: على كل صاحب عمل أن يعد خزانة أو أكثر للإسعافات الطبية، مزودة بالأدوية وغيرها، مما يلزم للإسعافات الطبية الأولية.وتحدد اللائحة ما يجب أن تحتويه هذه الخزانة من وسائل الإسعافات الأولية وعددها، وكميات الأدوية، وكذلك تنظيم وسائل حفظها، وشروط من يقوم بمهمة الإسعافات ومستواه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد المائة
  article_text_ar: على كل صاحب عمل أن يعهد إلى طبيب أو أكثر بفحص عماله المعرضين لاحتمال الإصابة بأحد الأمراض المهنية المحددة في جداول الأمراض المهنية- المنصوص عليها في نظام التأمينات الاجتماعية- فحصًا شاملًا مرة كل سنة على الأقل، وأن يثبت نتيجة ذلك الفحص في سجلاته، وكذلك في ملفات أولئك العمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد المائة
  article_text_ar: على صاحب العمل أن يوفر لعماله العناية الصحية الوقائية والعلاجية طبقاً للمستويات التي يقررها الوزير، مع مراعاة ما يوفره نظام الضمان الصحي التعاوني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد المائة
  article_text_ar: يجوز لصاحب العمل بعد موافقة الوزير إنشاء صندوق للتوفير والادخار، على أن تكون مساهمة العمال فيه اختيارية. ويجب إعلان الأحكام المنظمة لكل ما يتصل بقواعد عمل هذا الصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والأربعون بعد المائة
  article_text_ar: 'يلزم صاحب العمل وعلى نفقته بالنسبة لمن يؤدي عملًا في الأماكن البعيدة عن العمران بكل ما يأتي أو بعضه وفقًا لما يحدده الوزير: 1 - توفير حوانيت لبيع الطعام والملابس وغير ذلك من الحاجات الضرورية بأسعار معتدلة، وذلك في مناطق العمل التي لا تتوافر فيها عادة تلك الحوانيت.2 - توفير وسائل ترفيه وتثقيف مناسبة وملاعب رياضية ملحقة بأماكن العمل.3 - إجراء ما يلزم من الترتيبات الطبية المناسبة للمحافظة على صحة العمال وعلاج أسرهم علاجًا شاملًا. (ويقصد بالأسرة: الزوج والأولاد والأم والأب المقيمون معه).4 - توفير مدارس لتعليم أولاد العمال إذا لم يتوافر في المنطقة مدارس كافية. 5 - إعداد مساجد أو مصليات في أماكن العمل.6 - إعداد برامج لمحو الأمية بين العمال.وتحدد اللائحة الأماكن البعيدة عن العمران.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والأربعون بعد المائة
  article_text_ar: يلزم صاحب العمل الذي يؤدي عملًا في الأماكن البعيدة عن العمران، وفي المناجم والمحاجر ومراكز التنقيب عن النفط بتوفير المساكن والمخيمات والوجبات الغذائية للعمال.ويحدد الوزير بقرار منه شروط المساكن والمخيمات ومواصفاتها ومقابل الانتفاع بالمساكن، وكذلك عدد الوجبات الغذائية وكميات الطعام وأنواعه والشروط اللازمة لها، وما يتحمله العامل مقابل الوجبة، وغير ذلك مما يلزم للمحافظة على صحة العمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والأربعون بعد المائة
  article_text_ar: على كل صاحب عمل أن يوفر لعماله وسائل الانتقال من محل إقامتهم، أو من مركز تجمع معين إلى أماكن العمل، وإعادتهم يوميًّا إذا كانت هذه الأماكن لا تصل إليها وسائل المواصلات المنتظمة في مواعيد تتفق مع مواعيد العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والأربعون بعد المائة
  article_text_ar: مع مراعاة ما ورد في المادة الرابعة من هذا النظام، تعمل المرأة في كل المجالات التي تتفق مع طبيعتها، ويحظر تشغيلها في الأعمال الخطرة أو الصناعات الضارة، ويحدد الوزير بقرار منه المهن والأعمال التي تعد ضارة بالصحة، أو من شأنها أن تعرض النساء لأخطار محددة مما يجب معه حظر عملهن فيها أو تقييده بشروط خاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخمسون بعد المائة
  article_text_ar: لا يجوز تشغيل النساء أثناء فترة من الليل لا تقل عن إحدى عشرة ساعة متتالية إلا في الحالات التي يصدر بها قرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والخمسون بعد المائة
  article_text_ar: للمرأة العاملة الحق في إجازة وضع لمدة الأسابيع الأربعة السابقة على التاريخ المحتمل للوضع، والأسابيع الستة اللاحقة له، ويحدد التاريخ المرجح للوضع بوساطة طبيب المنشأة، أو بموجب شهادة طبية مصدقة من جهة صحية. ويحظر تشغيل المرأة خلال الأسابيع الستة التالية مباشرة للوضع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والخمسون بعد المائة
  article_text_ar: على صاحب العمل أن يدفع إلى المرأة العاملة أثناء انقطاعها عن عملها في إجازة الوضع ما يعادل نصف أجرها، إذا كان لها خدمة سنة فأكثر لدى صاحب العمل، والأجرة كاملة إذا بلغت مدة خدمتها ثلاث سنوات فأكثر يوم بدء الإجازة، ولا تدفع إليها الأجرة أثناء إجازتها السنوية العادية إذا كانت قد استفادت في السنة نفسها من إجازة وضع بأجر كامل، ويدفع إليها نصف أجرها أثناء الإجازة السنوية إذا كانت قد استفادت في السنة نفسها من إجازة وضع بنصف أجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والخمسون بعد المائة
  article_text_ar: على صاحب العمل توفير الرعاية الطبية للمرأة العاملة أثناء الحمل والولادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والخمسون بعد المائة
  article_text_ar: يحق للمرأة العاملة عندما تعود إلى مزاولة عملها بعد إجازة الوضع أن تأخذ بقصد إرضاع مولودها فترة أو فترات للاستراحة لا تزيد في مجموعها على الساعة في اليوم الواحد، وذلك علاوة على فترات الراحة الممنوحة لجميع العمال، وتحسب هذه الفترة أو الفترات من ساعات العمل الفعلية، ولا يترتب عليها تخفيض الأجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والخمسون بعد المائة
  article_text_ar: لا يجوز لصاحب العمل فصل العاملة أو إنذارها بالفصل أثناء تمتعها بإجازة الوضع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والخمسون بعد المائة
  article_text_ar: لا يجوز لصاحب العمل فصل العاملة أثناء فترة مرضها الناتج عن الحمل أو الوضع، ويثبت المرض بشهادة طبية معتمدة، على ألا تتجاوز مدة غيابها مائة وثمانين يومًا، ولا يجوز فصلها بغير سبب مشروع من الأسباب المنصوص عليها في هذا النظام خلال المائة والثمانين يومًا السابقة على التاريخ المحتمل للولادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والخمسون بعد المائة
  article_text_ar: يسقط حق العاملة فيما تستحقه وفقًا لأحكام هذا الباب إذا عملت لدى صاحب عمل آخر أثناء مدة إجازتها المصرح بها، ولصاحب العمل الأصلي- في هذه الحالة- أن يحرمها من أجرها عن مدة الإجازة، أو أن يسترد ما أداه لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والخمسون بعد المائة
  article_text_ar: على صاحب العمل في جميع الأماكن التي يعمل فيها نساء وفي جميع المهن أن يوفر لهن مقاعد تأمينًا لاستراحتهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والخمسون بعد المائة
  article_text_ar: 1- على كل صاحب عمل يشغل خمسين عاملة فأكثر أن يهيئ مكانًا مناسبًا يتوافر فيه العدد الكافي من المربيات، لرعاية أطفال العاملات الذين تقل أعمارهم عن ست سنوات، وذلك إذا بلغ عدد الأطفال عشرة فأكثر.2 - يجوز للوزير أن يلزم صاحب العمل الذي يستخدم مائة عاملة فأكثر في مدينة واحدة أن ينشئ دارًا للحضانة بنفسه أو بالمشاركة مع أصحاب عمل آخرين في المدينة نفسها، أو يتعاقد مع دار للحضانة قائمة لرعاية أطفال العاملات الذين تقل أعمارهم عن ست سنوات وذلك أثناء فترات العمل، وفي هذه الحالة يحدد الوزير الشروط والأوضاع التي تنظم هذه الدار، كما يقرر نسبة التكاليف التي تفرض على العاملات المستفيدات من هذه الخدمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الستون بعد المائة
  article_text_ar: للمرأة العاملة التي يتوفى زوجها الحق في إجازة بأجر كامل مدة لا تقل عن خمسة عشر يومًا من تاريخ الوفاة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والستون بعد المائة
  article_text_ar: لا يجوز تشغيل الأحداث في الأعمال الخطرة أو الصناعات الضارة، أو في المهن والأعمال التي يحتمل أن تعرض صحتهم أو سلامتهم أو أخلاقهم للخطر، بسبب طبيعتها أو الظروف التي تؤدى فيها. ويحدد الوزير بقرار منه الأعمال والصناعات والمهن المشار إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والستون بعد المائة
  article_text_ar: '1- لا يجوز تشغيل أي شخص لم يتم الخامسة عشرة من عمره ولا يسمح له بدخول أماكن العمل، وللوزير أن يرفع هذه السن في بعض الصناعات أو المناطق أو بالنسبة لبعض فئات الأحداث بقرار منه .2 - استثناء من الفقرة (1) من هذه المادة يجوز للوزير أن يسمح بتشغيل أو عمل الأشخاص الذين تتراوح أعمارهم ما بين 13- 15 سنة في أعمال خفيفة، يراعى فيها الآتي: 2 /1 - ألا يحتمل أن تكون ضارة بصحتهم أو نموهم.2 /2 - ألا تعطل مواظبتهم في المدرسة واشتراكهم في برامج التوجيه أو التدريب المهني، ولا تضعف قدرتهم على الاستفادة من التعليم الذي يتلقونه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والستون بعد المائة
  article_text_ar: يحظر تشغيل الأحداث أثناء فترة من الليل لا تقل عن اثنتي عشرة ساعة متتالية إلا في الحالات التي يحددها الوزير بقرار منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والستون بعد المائة
  article_text_ar: لا يجوز تشغيل الأحداث تشغيلًا فعليًّا أكثر من ست ساعات في اليوم الواحد لسائر شهور السنة، عدا شهر رمضان، فيجب ألا تزيد ساعات العمل الفعلية فيه على أربع ساعات.وتنظم ساعات العمل بحيث لا يعمل الحدث أكثر من أربع ساعات متصلة دون فترة أو أكثر للراحة والطعام والصلاة، لا تقل في المرة الواحدة عن نصف ساعة، وبحيث لا يبقى في مكان العمل أكثر من سبع ساعات.ولا يجوز تشغيل الأحداث في أيام الراحة الأسبوعية أو في أيام الأعياد والعطلات الرسمية والإجازة السنوية. ولا تسري عليهم الاستثناءات التي نصت عليها المادة السادسة بعد المائة من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والستون بعد المائة
  article_text_ar: 'على صاحب العمل قبل تشغيل الحدث أن يستوفي منه المستندات الآتية: 1 - بطاقة الهوية الوطنية أو شهادة رسمية بميلاده.2 - شهادة باللياقة الصحية للعمل المطلوب صادرة من طبيب مختص ومصدق عليها من جهة صحية.3 - موافقة ولي أمر الحدث.ويجب حفظ هذه المستندات في الملف الخاص بالحدث.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والستون بعد المائة
  article_text_ar: على صاحب العمل أن يبلغ مكتب العمل المختص عن كل حدث يشغله خلال الأسبوع الأول من تشغيله، وأن يحتفظ في مكان العمل بسجل خاص للعمال الأحداث يبين فيه اسم الحدث وعمره والاسم الكامل لولي أمره ومحل إقامته وتاريخ تشغيله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والستون بعد المائة
  article_text_ar: 'لا تسري الأحكام المنصوص عليها في هذا الباب على العمل الذي يؤديه الأطفال والأحداث في المدارس لأغراض التعليم العام أو المهني أو التقني، وفي مؤسسات التدريب الأخرى، ولا تسري على العمل الذي يؤديه في المنشآت الأشخاص الذين بلغوا سن أربع عشرة سنة على الأقل إذا كان هذا العمل ينفذ وفقًا لشروط يقررها الوزير، وكان العمل يشكل جزءًا أساسيًّا من الآتي: 1 - دورة تعليمية أو تدريبية تقع مسؤوليتها الرئيسية على مدرسة أو مؤسسة تدريب .2 - برنامج تدريبي ينفذ قسمه الأكبر أو كله في منشأة إذا كانت الجهة المختصة قد أقرته.3 - برنامج إرشادي أو توجيهي يرمي إلى تسهيل اختيار المهنة أو نوع التدريب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والستون بعد المائة
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية- أينما وردت في هذا الباب- المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك: السفينة: كل منشأة عائمة مسجلة في المملكة العربية السعودية ولا تقل حمولتها عن خمسمائة طن. مجهز السفينة: كل شخص طبيعي، أو منشأة عامة أو خاصة، يجري لحسابه تجهيز السفينة. الربان: كل بحار مؤهل لقيادة السفينة ويتحمل مسؤوليتها. البحار: كل شخص يعمل على ظهر السفينة بعقد عمل بحري. عقد العمل البحري: كل عقد تشغيل بأجر يبرم بين صاحب سفينة أو مجهز سفينة أو ممثل عن أي منهما وبين بحار للعمل على ظهرها، وتسري على هذا العقد أحكام هذا النظام فيما لا يتعارض مع أحكام هذا الباب والقرارات التي تصدر بمقتضاه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والستون بعد المائة
  article_text_ar: يخضع جميع من يعمل على ظهر السفينة لسلطة ربانها وأوامره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السبعون بعد المائة
  article_text_ar: يجب أن تسجل في سجلات السفينة أو أن تلحق بها جميع عقود عمل البحارة العاملين عليها، وأن تكون هذه العقود محررة بصيغة واضحة. ويجب أن ينص في العقد على ما إذا كان معقودًا لمدة محددة أو لسفرة، فإذا كان معقودًا لمدة محددة حددت المدة بصورة واضحة، وإذا كان لسفرة حددت المدينة أو المرفأ البحري الذي تنتهي عنده السفرة، وفي أي مرحلة من مراحل تفريغ السفينة أو تحميلها في هذا المرفأ ينتهي العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والسبعون بعد المائة
  article_text_ar: 'يجب أن ينص في عقد العمل البحري على تاريخ إبرامه ومكانه، واسم المجهز، واسم البحار ولقبه وسنه وجنسيته وموطنه، ونوع العمل المكلف به، وكيفية أدائه، والشهادة التي تتيح له العمل في الملاحة البحرية، والتذكرة الشخصية البحرية، ومقدار الأجر، ومدة العقد، أما إذا كان العقد لسفرة واحدة فيجب تحديد المدينة أو المرفأ البحري الذي تنتهي عنده الرحلة، وفي أي مرحلة من مراحل تفريغ السفينة أو تحميلها في هذا المرفأ ينتهي العمل، وغير ذلك من تفاصيل العقد.ويكون العقد من ثلاث نسخ: نسخة لمجهز السفينة، ونسخة للربان للاحتفاظ بها على ظهر السفينة، ونسخة للبحار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والسبعون بعد المائة
  article_text_ar: 'يجب أن تعلن في السفينة وفي القسم المخصص للعاملين فيها قواعد العمل على ظهرها وشروطه، ويجب أن تتضمن القواعد والشروط ما يأتي : 1 - التزامات البحارة وواجباتهم وقواعد تنظيم العمل على ظهر السفينة والجداول الزمنية للخدمة، وساعات العمل اليومية.2 - واجبات مجهز السفينة تجاه البحارة، من حيث الأجور الثابتة والمكافآت، وغير ذلك من أنواع الأجر.3 - كيفية تعليق دفع الأجور أو الحسم منها، وكيفية دفع السلف على الأجور. 4 - مكان تصفية الأجور وزمانها، وحسابها النهائي.5 - قواعد تقديم الغذاء والمبيت وأصولها على ظهر السفينة.6 - علاج أمراض البحارة وإصاباتهم.7 - سلوك البحارة وشروط ترحيلهم إلي بلدهم .8 - إجازات البحارة السنوية المدفوعة الأجر.9 - مكافأة نهاية الخدمة وغير ذلك من التعويضات التي ستدفع بمناسبة إنهاء عقد العمل أو انتهائه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والسبعون بعد المائة
  article_text_ar: 'يشترط فيمن يعمل بحارًا: 1 - أن يكون قد أتم من العمر ثماني عشرة سنة.2 - أن يكون حاصلًا على شهادة تتيح له العمل في الخدمة البحرية.3 - أن يكون لائقًا طبيًّا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والسبعون بعد المائة
  article_text_ar: تدفع جميع استحقاقات البحار بالعملة الرسمية ، ويجوز أداؤها بالعملة الأجنبية إذا استحقت والسفينة خارج المياه الإقليمية وقبل البحار ذلك.وللبحار أن يطلب من صاحب العمل صرف ما يستحقه من أجره النقدي لمن يعينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والسبعون بعد المائة
  article_text_ar: إذا اختصر السفر لأي سبب من الأسباب، سواء كان ذلك اختياريًّا أم قهريًّا، فلا يترتب على ذلك نقص أجر البحار المشغل بعقد عمل بحري، لمدة رحلة بحرية واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والسبعون بعد المائة
  article_text_ar: إذا حدد الأجر بحصة من الأرباح أو أجر السفينة فإن البحار لا يستحق تعويضًا في حالة إلغاء الرحلة، ولا زيادة في الأجر عند تأجير الرحلة أو إطالتها، أما إذا كان التأخير أو الإطالة ناشئًا عن فعل الشاحنين استحق البحار تعويضًا من المجهز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والسبعون بعد المائة
  article_text_ar: يستحق البحار أجره إذا أسرت السفينة، أو غرقت، أو أصبحت غير صالحة للملاحة، وذلك حتى يوم وقوع الحادث.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والسبعون بعد المائة
  article_text_ar: غذاء البحارة ونومهم على نفقة مجهز السفينة، وينظم ذلك قرار يصدره الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والسبعون بعد المائة
  article_text_ar: لا تزيد ساعات العمل على ظهر السفينة أثناء وجودها في عرض البحر على أربع عشرة ساعة في مدة أربع وعشرين ساعة، ولا على اثنتين وسبعين ساعة في مدة سبعة أيام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثمانون بعد المائة
  article_text_ar: لكل بحار أسهم في مساعدة سفينة أخرى أو إنقاذها نصيب في المكافأة التي تستحقها السفينة التي يعمل فيها، أيًّا كان نوع أجرة العمل الذي يؤديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والثمانون بعد المائة
  article_text_ar: إذا توفي أحد البحارة أثناء الرحلة فيكون لورثته الحق في الحصول على أجره إلى يوم وفاته إذا كان الأجر بحسب الشهر، أما إذا كان أجره يحسب بالرحلة فيحق للورثة تسلم أجره عن الرحلة كاملة. وإذا كان الأجر حصة في الأرباح، فإنها تستحق بأكملها. وتودع المبالغ المستحقة للبحار المتوفى، أو المفقود، أو الذي يتعذر عليه التسلم، لدى مكتب العمل في ميناء الوصول في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والثمانون بعد المائة
  article_text_ar: 'يجوز لصاحب العمل إنهاء العقد دون سبق إعلان وبغير تعويض في الحالات الآتية: 1 - إذا غرقت السفينة، أو صودرت، أو فقدت، أو أصبحت غير صالحة للاستعمال.2 - إذا ألغيت الرحلة في بدئها بسبب ليس لمجهز السفينة إرادة فيه، وكان الأجر على أساس الرحلة الواحدة، ما لم ينص في العقد على غير ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والثمانون بعد المائة
  article_text_ar: 'يلتزم صاحب العمل في حالة انقضاء العقد أو فسخه بما يأتي: 1 - أن يعيد البحار إلى الميناء الذي سافر منه عند بدء تنفيذ العقد.2 - أن يتكفل بغذائه ونومه حتى بلوغه ذلك الميناء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والثمانون بعد المائة
  article_text_ar: 'يلتزم المجهز بترحيل البحار إلى بلده في الحالات الآتية: 1 - إذا ألغي السفر بفعل مجهز السفينة بعد قيام السفينة.2 - إذا ألغي السفر بعد إبحار السفينة، بسبب منع التجارة مع الجهة التي عينت لسفرها.3 - إذا أخرج البحار من السفينة بسبب إصابته بمرض، أو جرح، أو عاهة.4 - إذا بيعت السفينة في بلد أجنبي.5 - إذا عزل البحار من الخدمة أثناء السفر من غير مسوغ نظامي.6 - إذا انتهى العقد المبرم مع البحار في ميناء غير الميناء الذي نص عليه العقد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والثمانون بعد المائة
  article_text_ar: 'يقصد بالعمل في المناجم والمحاجر الآتي: 1 - العمليات الخاصة بالبحث أو الكشف عن المواد المعدنية، بما في ذلك الأحجار الكريمة، أو استخراجها، أو تصنيعها بالمنطقة الصادر عنها الترخيص، سواء أكانت المعادن صلبة أم سائلة.2 - العمليات الخاصة باستخراج رواسب المواد المعدنية الموجودة على سطح الأرض أو في باطنها، أو تركيزها أو تصنيعها في منطقة الترخيص.3 - ما يلحق بالعمليات المشار إليها في الفقرتين 1 ، 2 من هذه المادة من أعمال البناء وإقامة التركيبات والأجهزة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والثمانون بعد المائة
  article_text_ar: لا يجوز تشغيل أي شخص في المنجم أو المحجر لم يتم الثامنة عشرة من العمر، ولا يجوز تشغيل المرأة أيًّا كان سنها في أي منجم أو محجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والثمانون بعد المائة
  article_text_ar: لا يجوز السماح لأي شخص بالعمل في العمليات التي يسري عليها هذا الباب إلا بعد إجراء فحص طبي كامل عليه، وثبوت لياقته الصحية للعمل المطلوب، ويجب إعادة هذا الفحص دوريًّا، ولا يجوز تحميل العامل أي نفقة مقابل الفحوص الطبية اللازمة.ويحدد الوزير بقرار منه الأوضاع والشروط والمدد التي يجب الالتزام بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والثمانون بعد المائة
  article_text_ar: لا تزيد ساعات العمل الفعلية التي يمضيها العامل تحت سطح الأرض على سبع ساعات في اليوم، ولا يجوز إبقاء العامل في مكان العمل سواء فوق سطح الأرض أو في باطنها مدة تزيد على عشر ساعات في اليوم، وإذا كان العمل في باطن الأرض فتشمل هذه المدة الوقت الذي يستغرقه العامل للوصول من سطح الأرض والوقت الذي يستغرقه للعودة من باطن الأرض إلى سطحها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والثمانون بعد المائة
  article_text_ar: يحظر دخول أماكن العمل وملحقاتها على غير العاملين فيها وعلى غير المكلفين بالتفتيش على المنجم أو المحجر والأشخاص الذين يحملون إذنًا خاصًّا من الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التسعون بعد المائة
  article_text_ar: على صاحب العمل أن يعد سجلًّا خاصًّا لقيد العمال وحصرهم قبل دخولهم إلى أماكن العمل وعند خروجهم منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والتسعون بعد المائة
  article_text_ar: على صاحب العمل أو المدير المسؤول أن يضع لائحة بالأوامر والتعليمات الخاصة بالسلامة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والتسعون بعد المائة
  article_text_ar: على صاحب العمل إنشاء نقطة إنقاذ قريبة من مكان العمل مجهزة بأدوات الإنقاذ والإسعافات الضرورية، وأن يكون بهذه النقطة وسيلة اتصال مناسبة، بحيث تصلح للاستعانة بها في الحال، وعليه تعيين عامل فني مدرب للإشراف على عمليات الإنقاذ والإسعافات الأولية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والتسعون بعد المائة
  article_text_ar: مع عدم الإخلال بحكم المادة الثانية والأربعين بعد المائة من هذا النظام على صاحب العمل أن يعد في كل منجم أو محجر يشتغل فيه خمسون عاملًا على الأقل مكانًا مناسبًا يحتوي على غرفة مجهزة بوسائل الإنقاذ والإسعافات الأولية، وأخرى للتمريض، فضلًا عن غرفة أو أكثر لتغيير الملابس. أما في المناجم والمحاجر التي يقل عدد العمال في كل منها عن خمسين عاملًا وتقع في دائرة قطرها عشرون كيلو مترًا فيجوز لصاحب العمل أن يشترك في إنشاء مكان للإنقاذ والإسعاف في مكان وسط، أو ينشئ مكانًا للإنقاذ والإسعاف مستقلًّا.وللوزير تحديد وسائل الإنقاذ والإسعاف وتدابير الوقاية والحماية في المناجم والمحاجر، وكذلك مسؤوليات أصحاب العمل وحقوق العمال وواجباتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والتسعون بعد المائة
  article_text_ar: يتولى تفتيش العمل مفتشون مختصون يصدر الوزير قرارًا بتسميتهم، وتكون لهم الصلاحيات والاختصاصات المنصوص عليها في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والتسعون بعد المائة
  article_text_ar: 'يشترط في مفتش العمل عند ممارسته لعمله- بالإضافة إلى الشروط العامة في تعيين الموظفين- ما يأتي: 1 - أن يكون متصفًا بالحياد التام.2 - ألا تكون له أي صلة مباشرة أو غير مباشرة بالمنشآت التي يقوم بتفتيشها.3 - أن يكون قد اجتاز فحصًا مسلكيًّا بعد قضائه فترة تدريب لا تقل عن تسعين يومًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والتسعون بعد المائة
  article_text_ar: 'يختص مفتشو العمل بما يأتي: 1- مراقبة تنفيذ أحكام نظام العمل واللوائح والقرارات المنفذة له على وجه سليم.2 - تزويد أصحاب الأعمال والعمال بالمعلومات والإرشادات الفنية التي تمكنهم من اتباع أحسن الوسائل لتنفيذ أحكام النظام. 3 - إبلاغ الجهات المختصة بأوجه النقص التي تقصر الأحكام القائمة عن معالجتها واقتراح ما يلزم لذلك.4 - ضبط مخالفات أحكام نظام العمل والقرارات الصادرة تطبيقًا له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والتسعون بعد المائة
  article_text_ar: يُقسم مفتشو العمل- قبل مباشرة أعمال وظائفهم- أمام الوزير بأن يؤدوا أعمالهم بأمانة وإخلاص، وألّا يفشوا سر أي اختراع صناعي، أو غير ذلك من الأسرار التي يطلعون عليها بحكم وظائفهم ولو بعد انقطاع عملهم بهذه الوظائف، ويحمل مفتش العمل بطاقة من الوزارة تثبت صفته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والتسعون بعد المائة
  article_text_ar: 'يحق لمفتشي العمل : 1- دخول أي منشأة خاضعة لأحكام نظام العمل في أي وقت من أوقات النهار أو الليل، دون إشعار سابق.2 - القيام بأي فحص أو تحقيق لازم للتحقق من سلامة تنفيذ النظام، ولهم على الأخص ما يأتي : أ - سؤال صاحب العمل أو من يمثله، أو العمال، على انفراد أو في حضور شهود، عن أي أمر من الأمور المتعلقة بتنفيذ أحكام النظام.ب - الاطلاع على جميع الدفاتر والسجلات والوثائق الأخرى اللازم الاحتفاظ بها طبقًا لأحكام هذا النظام والقرارات الصادرة بمقتضاه، والحصول على صور ومستخرجات منها.ج - أخذ عينة أو عينات من المواد المستعملة أو المتداولة في العمليات الصناعية وغيرها الخاضعة للتفتيش، مما يظن أن لها أثرًا ضارًّا على صحة العمال أو سلامتهم، وذلك لغرض تحليلها في المختبرات الحكومية، ولمعرفة مدى هذا الأثر، مع إبلاغ صاحب العمل أو ممثله بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والتسعون بعد المائة
  article_text_ar: على أصحاب العمل ووكلائهم أن يقدموا للمفتشين والموظفين المكلفين بتفتيش العمل، التسهيلات اللازمة للقيام بأداء واجبهم، وأن يقدموا لهم ما يطلبونه من بيانات تتعلق بطبيعة عملهم، وأن يستجيبوا لطلبات المثول أمامهم، وأن يوفدوا مندوبًا عنهم، إذا ما طلب منهم ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة المئتان
  article_text_ar: على من يقوم بالتفتيش أن يبلغ بحضوره صاحب العمل أو ممثله، وذلك ما لم ير أن المهمة التي يقوم من أجلها بالتفتيش تقتضي غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الأولى بعد المائتين
  article_text_ar: لمفتش العمل الحق في إصدار التعليمات إلى أصحاب العمل بإدخال التعديلات على قواعد العمل في الأجهزة والمعدات لديهم في الآجال التي يحددها، وذلك لضمان مراعاة الأحكام الخاصة بصحة العمال وسلامتهم، كما له في حالة وجود خطر يهدد صحة العمال وسلامتهم أن يطلب تنفيذ ما يراه لازمًا من إجراءات لدرء هذا الخطر فورًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية بعد المائتين
  article_text_ar: على مفتش العمل أن يحيط بالسرية المطلقة الشكاوى التي تصل إليه بشأنأي نقص في الأجهزة أو أي مخالفة لأحكام النظام، وألا يبوح لصاحب العمل أو من يقوم مقامه بوجود هذه الشكاوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة بعد المائتين
  article_text_ar: إذا تحقق للمفتش أثناء التفتيش وجود مخالفة لأحكام هذا النظام، أو القرارات الصادرة بمقتضاه، فله إسداء النصح والإرشاد لصاحب العمل بشأن كيفية تلافي المخالفة أو توجيه تنبيه شفهي أو توجيه إنذار كتابي لتدارك المخالفة خلال مدة معينة، أو تحرير محضر ضبط المخالفة ، وذلك بحسب أهمية المخالفة والظروف الأخرى التي يعود تقديرها للمفتش.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة بعد المائتين
  article_text_ar: يشترك في التفتيش كلما دعت الحاجة أطباء ومهندسون وكيميائيون واختصاصيون في السلامة والصحة المهنية. ولمدير مكتب العمل وللمفتشين أن يطلبوا عند الضرورة من الجهات التنفيذية المختصة تقديم ما يلزم من مساعدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة بعد المائتين
  article_text_ar: يعد رئيس تفتيش العمل في مكتب العمل تقريرًا شهريًّا عن نشاط تفتيش العمل، ونواحي التفتيش، والمنشآت التي تم التفتيش عليها، وعدد المخالفات المرتكبة، ونوعها، والتدابير المتخذة بشأنها، كما يعد تقريرًا سنويًّا عن التفتيش في دائرة اختصاص مكتب العمل ونتائجه وآثاره، ويضمنه ملاحظاته ومقترحاته. وترسل نسخة من التقريرين إلى الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة بعد المائتين
  article_text_ar: 'يقدم وكيل الوزارة للشؤون العمالية تقريرًا سنويًّا شاملًا عن تفتيش العمل في المملكة، وذلك خلال مدة لا تتجاوز مائة وثمانين يومًا من نهاية العام، يتناول كل ما يتعلق برقابة الوزارة على تنفيذ أحكام نظام العمل. ويشمل التقرير على الأخص ما يأتي : 1 - بيانًا بالأحكام المنظمة للتفتيش.2 - بيانًا بالموظفين المختصين بالتفتيش.3 - إحصائيات بالمنشآت الخاضعة للتفتيش وعدد العمال فيها.4 - إحصائيات عن زيارات المفتشين وجولاتهم.5 - إحصائيات عن المخالفات التي وقعت، والجزاءات التي حكم بها.6 - إحصائيات عن إصابات العمل.7 - إحصائيات عن أمراض المهن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة بعد المائتين
  article_text_ar: تضع الوزارة نماذج محاضر ضبط المخالفات، وسجلات التفتيش والتنبيهات والإنذارات، كما تضع الأحكام اللازمة لكيفية حفظها واستعمالها، وتعميمها على مكاتب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة بعد المائتين
  article_text_ar: 'ينظم تدريب مفتشي العمل في دورات تدريبية تشتمل بصورة خاصة على الأمور الآتية: 1 - أصول تنظيم الزيارات التفتيشية والاتصال بأصحاب العمل والعمال.2 - أصول تدقيق السجلات والدفاتر والحاسب الآلي وأصول تنظيم محاضر التفتيش واستجواب الأشخاص.3 - أصول إرشاد أصحاب العمل إلى مستلزمات النصوص النظامية وفوائد تطبيقها، ومساعدتهم في هذا التطبيق.4 - مبادئ أساسية في التقنية الصناعية، ووسائل الوقاية من إصابات العمل والأمراض المهنية.5 - مبادئ أساسية في الكفاية الإنتاجية، وصلتها بمدى تأمين الشروط الصالحة لجو ممارسة العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة بعد المائتين
  article_text_ar: يصدر مجلس الوزراء اللائحة التنفيذية لضبط أعمال التفتيش وتنظيمها المنصوص عليها في هذا الباب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة العاشرة بعد المائتين
  article_text_ar: 'هيئات تسوية الخلافات العمالية هي: 1 - الهيئات الابتدائية لتسوية الخلافات.2 - الهيئة العليا لتسوية الخلافات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية عشرة بعد المائتين
  article_text_ar: يسمى بقرار من الوزير بعد موافقة رئيس مجلس الوزراء أعضاء الهيئات الابتدائية من حملة الإجازة في الشريعة أو الحقوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية عشرة بعد المائتين
  article_text_ar: تؤلف بقرار من الوزير في كل مكتب عمل يحدده الوزير هيئة ابتدائية تشتمل على دائرة أو أكثر من عضو واحد وتفصل كل دائرة من هذه الدوائر فيما يطرح عليها من قضايا، فإذا اشتملت الهيئة على أكثر من دائرة يسمي الوزير رئيسًا من بين الأعضاء يتولى- بالإضافة إلى عمله- توزيع القضايا على أعضاء الهيئة وتنظيم الأعمال الإدارية والكتابية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد المائتين
  article_text_ar: إذا لم تؤلف هيئة ابتدائية في أحد مكاتب العمل، يكلف الوزير- عند الاقتضاء- الهيئة المؤلفة في أقرب مكتب عمل بمهمات الهيئة التي لم تؤلف واختصاصاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد المائتين
  article_text_ar: 'تختص الهيئة الابتدائية بما يأتي: 1 - بالفصل نهائيًّا في الآتي:1 /1 - الخلافات العمالية، أيًّا كان نوعها التي لا تتجاوز قيمتها عشرة آلاف ريال.1 /2 - الاعتراض على الجزاء الذي يوقعه صاحب العمل على العامل.1 /3 - فرض العقوبات المنصوص عليها في هذا النظام على المخالفة التي لا تتجاوز عقوبتها المقررة خمسة آلاف ريال، وعلى المخالفات التي لا تتجاوز عقوباتها المقررة في مجموعها خمسة آلاف ريال.2 - بالفصل ابتدائيًّا في الآتي:2 /1 - الخلافات العمالية التي تتجاوز قيمتها عشرة آلاف ريال.2 /2 - خلافات التعويض عن إصابات العمل مهما بلغت قيمة التعويض.2 /3 - خلافات الفصل عن العمل.2/ 4 - فرض العقوبات المنصوص عليها في هذا النظام على المخالفة التي تتجاوز عقوبتها المقررة خمسة آلاف ريال، وعلى المخالفات التي تتجاوز عقوباتها المقررة في مجموعها خمسة آلاف ريال.2 /5 - فرض العقوبات على المخالفات المعاقب عليها بالغرامة مع عقوبة تبعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد المائتين
  article_text_ar: تكون الهيئة العليا لتسوية الخلافات من عدة دوائر لا تقل الدائرة الواحدة عن ثلاثة أعضاء، ويصدر قرار من مجلس الوزراء- بناءً على ترشيح الوزير- بتسمية رئيس الهيئة وأعضائها من حملة الإجازة في الشريعة والحقوق ممن لديهم الخبرة في مجال الخلافات العمالية، ويحدد عدد دوائر الهيئة العليا ومناطق عملها بقرار من الوزير بناءً على اقتراح رئيس الهيئة، ويتولى رئيس الهيئة اختيار رؤساء الدوائر وتوزيع العمل بينها والإشراف على جميع ما يتعلق بأعمالها الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة عشرة بعد المائتين
  article_text_ar: تختص كل دائرة من دوائر الهيئة العليا بالفصل نهائيًّا، وبالدرجة القطعية في جميع قرارات دوائر الهيئات الابتدائية التي ترفع للاستئناف أمامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة عشرة بعد المائتين
  article_text_ar: مدة الاستئناف ثلاثون يومًا من تاريخ النطق بقرار الدائرة الابتدائية في القرارات الحضورية، ومن تاريخ التبليغ بالقرار في غيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد المائتين
  article_text_ar: إذا لم يستأنف قرار الدائرة الابتدائية خلال المدة المحددة في المادة السابقة يعد القرار نهائيًّا واجب التنفيذ، وتعد قرارات دوائر الهيئة العليا واجبة التنفيذ من تاريخ صدورها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد المائتين
  article_text_ar: كل هيئة من هذه الهيئات لها وحدها- دون غيرها- حق النظر في جميع الخلافات المتعلقة بهذا النظام، وبالخلافات الناشئة عن عقود العمل، ولها إحضار أي شخص لاستجوابه، أو انتداب أحد أعضائها للقيام بهذا الاستجواب، كما يجوز لها الإلزام بتقديم المستندات والأدلة، واتخاذ غير ذلك من الإجراءات التي تقرها. وللهيئة حق الدخول في أي مكان تشغله المنشأة من أجل إجراء التحقيق، والاطلاع على جميع الدفاتر والسجلات والمستندات التي ترى موجبًا للاطلاع عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة العشرون بعد المائتين
  article_text_ar: ترفع الدعاوى عن طريق مكتب العمل المختص أمام الهيئات الابتدائية، التي يقع مكان العمل في مقرها أو في دائرة اختصاصاها، وعلى مكتب العمل- قبل إحالة النزاع إلى الهيئة- اتخاذ الإجراءات اللازمة لتسوية النزاع وديًّا. ويصدر الوزير قرارًا بالإجراءات والقواعد الخاصة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد المائتين
  article_text_ar: تنظر الدعاوى المترتبة على أحكام هذا النظام على وجه الاستعجال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد المائتين
  article_text_ar: 1- لا تقبل أمام الهيئات المنصوص عليها في هذا النظام أي دعوى تتعلق بالمطالبة بحق من الحقوق المنصوص عليها في هذا النظام أو الناشئة عن عقد العمل بعد مضي اثني عشر شهرًا من تاريخ انتهاء علاقة العمل.2- لا تقبل أي دعوى تتعلق بمطالبة بحق من الحقوق المنصوص عليها في نظام العمل السابق بعد مضي اثني عشر شهرًا من تاريخ العمل بهذا النظام.3- لا تقبل أي شكوى عن المخالفات التي تقع ضد أحكام هذا النظام أو اللوائح والقرارات الصادرة بمقتضاه بعد مضي اثني عشر شهرًا من تاريخ وقوع المخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد المائتين
  article_text_ar: لا يجوز لأي هيئة من الهيئات المنصوص عليها في هذا الباب أن تمتنع عن إصدار قرارها بحجة عدم وجود نص في هذا النظام يمكن تطبيقه، وعليها في هذه الحالة أن تستعين بمبادئ الشريعة الإسلامية وما استقرت عليه السوابق القضائية والعرف وقواعد العدالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد المائتين
  article_text_ar: يجوز لطرفي عقد العمل تضمينه نصًّا يقضي بتسوية الخلافات بطريقة التحكيم.كما يمكن لهما الاتفاق على ذلك بعد نشوء النزاع، وفي جميع الأحوال تطبق أحكام نظام التحكيم النافذ في المملكة ولائحته التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد المائتين
  article_text_ar: لا يجوز لأي من الطرفين المتنازعين إثارة النزاع الذي صدر قرار نهائي بشأنه من إحدى الهيئات المنصوص عليها في هذا الباب أمام هذه الهيئة أو غيرها من الجهات القضائية الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد المائتين
  article_text_ar: لا يجوز لصاحب العمل أثناء السير في إجراءات المصالحة أو التحكيم أو أثناء نظر الدعوى أمام إحدى الهيئات المنصوص عليها في هذا الباب أن يغير من شروط التشغيل التي كانت سارية قبل بدء الإجراءات تغييرًا يترتب عليه إلحاق ضرر بالعامل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد المائتين
  article_text_ar: يجوز للهيئة أن تحكم على من خسر الدعوى بأن يدفع إلى الطرف الآخر كل ما تكبده من نفقات أو بعضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد المائتين
  article_text_ar: يصدر مجلس الوزراء لائحة المرافعات أمام هيئات تسوية الخلافات العمالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد المائتين
  article_text_ar: تطبق العقوبات المنصوص عليها في هذا الباب ما لم يكن هناك عقوبات أخرى أشد ينص عليها أي نظام آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: ( التاسعة والعشرين بعد المائتين مكرر )
  article_text_ar: '- اُضيفت هذه المادة بموجب المرسوم الملكي رقم (م/44) وتاريخ 1446/2/8هـ، وتكون بالنص الآتي: " يعاقب بغرامة لا تقل عن (200,000) مائتي ألف ريال ولا تزيد على (500,000) خمسمائة ألف ريال؛ كل من يخالف أحكام الفقرة (1) من المادة (الثلاثين) من هذا النظام، وذلك دون إخلال بما تقضي به المادة (التاسعة والعشرون بعد المائتين) منه".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثلاثون بعد المائتين
  article_text_ar: يعاقب بغرامة لا تقل عن ثلاثة آلاف ريال ولا تزيد على عشرة آلاف ريال كل من يخالف أي حكم من الأحكام الخاصة بإعداد العمال السعوديين مهنيًّا وإحلالهم محل غيرهم المنصوص عليها في هذا النظام والقرارات الصادرة بمقتضاه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد المائتين
  article_text_ar: يعاقب كل من يخالف أحكام المواد السادسة عشرة، والخامسة والعشرين، والثالثة والثلاثين، والسابعة والثلاثين، والثامنة والثلاثين من هذا النظام بغرامة لا تقل عن ألفي ريال ولا تزيد على خمسة آلاف ريال، وتتعدد الغرامة بقدر عدد العمال الذين وقعت المخالفة بشأنهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد المائتين
  article_text_ar: يعاقب كل من يخالف حكم المادة الثلاثين من هذا النظام بغرامة لا تقل عن عشرة آلاف ريال ولا تزيد على ثلاثين ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد المائتين
  article_text_ar: يعاقب كل من يخالف حكم المادة التاسعة والثلاثين من هذا النظام بغرامة لا تقل عن خمسة آلاف ريال ولا تزيد على عشرين ألف ريال، وتتعدد الغرامة بتعدد الأشخاص الذين وقعت المخالفة بشأنهم، ويتم ترحيل العامل على حساب من وجد يعمل لديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد المائتين
  article_text_ar: يعاقب صاحب العمل أو أي شخص مسؤول عن مخالفة أحكام الفصل الثاني والفصل الثالث والفصل الرابع من الباب السادس من هذا النظام أو أي قرارات تصدر بمقتضاه بغرامة لا تقل عن ألفي ريال ولا تزيد على خمسة آلاف ريال عن كل مخالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد المائتين
  article_text_ar: يعاقب صاحب العمل عن مخالفة حكم المادة التسعين من هذا النظام بغرامة لا تقل عن خمسمائة ريال ولا تزيد على ثلاثة آلاف ريال، وتتعدد الغرامة بقدر عدد العمال الذين وقعت المخالفة بشأنهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد المائتين
  article_text_ar: يعاقب كل من يخالف أحكام الفصل الأول والثاني من الباب الثامن من هذا النظام والقواعد الصادرة وفقًا لحكم المادة الحادية والعشرين بعد المائة من هذا النظام بغرامة لا تقل عن ثلاثة آلاف ريال ولا تزيد على عشرة آلاف ريال عن كل مخالفة، أو إغلاق المنشأة لمدة لا تزيد على ثلاثين يومًا أو إغلاقها نهائيًّا، ويجوز الجمع بين الغرامة والإغلاق مع إيقاف مصدر الخطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد المائتين
  article_text_ar: مع عدم الإخلال بما تقرره الأنظمة الأخرى من عقوبة خاصة بحق من يحول دون قيام موظف بأعمال وظيفته، يعاقب كل من يخالف حكم المادة التاسعة والتسعين بعد المائة من هذا النظام بغرامة لا تقل عن خمسة آلاف ريال ولا تزيد على عشرة آلاف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد المائتين
  article_text_ar: يعاقب بغرامة لا تقل عن عشرة آلاف ريال ولا تزيد على ثلاثين ألف ريال كل صاحب عمل أو رئيس مشروع وكل عامل رفض أو أرجأ تنفيذ قرار تحكيم أو أي قرار نهائي صادر عن إحدى هيئات تسوية الخلافات العمالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد المائتين
  article_text_ar: يعاقب كل من يخالف أي حكم من أحكام هذا النظام واللوائح والقرارات الصادرة بمقتضاه- فيما لم يرد بشأنه نص خاص بالعقوبة- بغرامة لا تقل عن ألفي ريال ولا تزيد على خمسة آلاف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: (المادة الحادية والثلاثون بعد المائتين حالياً) (المادة الأربعون بعد المائتين سابقاً)
  article_text_ar: إذا تكررت المخالفة خلال تسعين يومًا أو لم يقم المخالف بتصحيح مخالفته خلال المدة المعينة تضاعف الغرامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد المائتين
  article_text_ar: يجوز للمخالف في كل الأحوال دفع الغرامة المقررة في هذا الباب بحدها الأعلى دون اللجوء إلى هيئة تسوية الخلافات العمالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: (المادة الثانية والثلاثون بعد المائتين حالياً) (المادة الثانية والأربعون بعد المائتين سابقاً)
  article_text_ar: تؤول مبالغ الغرامات التي توقع بسبب مخالفة أحكام هذا النظام واللوائح والقرارات الصادرة بمقتضاه إلى صندوق تنمية الموارد البشرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد المائتين
  article_text_ar: يصدر الوزير القرارات واللوائح اللازمة لتنفيذ أحكام هذا النظام خلال مائة وثمانين يومًا من تاريخ العمل بهذا النظام، وتنشر اللوائح التنفيذية في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد المائتين
  article_text_ar: يحل هذا النظام محل نظام العمل والعمال، الصادر بالمرسوم الملكي ذي الرقم (م/21) والتاريخ 6/ 9/ 1389هـ، ويلغي كل ما يتعارض معه من أحكام، ويستمر العمل باللوائح والقرارات الصادرة قبل نفاذ هذا النظام إلى حين تعديلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد المائتين
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد مائة وثمانين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/08381293-6388-48e2-8ad2-a9a700f2aa94/1
  verified: false
