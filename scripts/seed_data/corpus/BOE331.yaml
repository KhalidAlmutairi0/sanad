regulation:
  code: BOE331
  name_ar: قواعد التعامل مع الوافدين من مخالفي الأنظمة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: البند الأول
  article_text_ar: 'تتولى وزارة الداخلية - ممثلة في قطاعاتها الأمنية - ما يأتي : 1 ) ضبط الوافدين الذين يعملون لحسابهم الخاص (العمالة السائبة)، والمتغيبين عن العمل، والمتأخرين عن المغادرة من القادمين بتأشيرات (حج أو عمرة أو زيارة بأنواعها أو للسياحة، أو للعلاج، أو للعبور، والمتسللين المقبوض عليهم خارج حرم الحدود، وإيقافهم، وإيقاع العقوبات عليهم وترحليهم .2 ) ضبط من يقوم بتشغيل أي من المخالفين المشار إليهم في الفقرة (1) من البند (أولاً) من هذه القواعد، وكل من يترك عمالته يعملون لحسابهم الخاص (العمالة السائبة)، ومن يتستر عليهم أو يؤويهم أو ينقلهم وكل من يقدم لهم أي وسيلة من وسائل المساعدة، وكذلك المستقدمون الذين لم يبلغوا عن تأخر من استقدموهم عن المغادرة في الوقت المحدد لمغادرتهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الثاني
  article_text_ar: 1) يُرحل الوافد المخالف على حساب صاحب العمل، إلا أن يكون متغيباً عن العمل وتم الإبلاغ عنه بالوقت المحدد ؛ فيكون ترحليه على حساب من وجد يعمل لديه، وإذا كان المخالف يعمل لحسابه الخاص فيرحل على حسابه، فإن لم يستطع تأمين تذكرة السفر ؛ يرحل على حساب الدولة، وترصد المبالغ اللازمة والكافية لذلك في بند يخصص لهذا الغرض . 2) يرحل الوافد المخالف من القادمين بتأشيرات حج أو عمرة أو زيارة بأنواعها وغيرها على حساب من وجد يعمل لديه، فإن كان يعمل لحسابه الخاص فيرحل على حسابه وإن لم يكن كذلك فيرحل على حساب الشركة أو المؤسسة أو الفرد القادم عن طريقه، أو على حساب الناقل أو المتستر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الثالث
  article_text_ar: على شركات ومؤسسات خدمات الحجاج والمعتمرين إبلاغ الجهة المختصة عن تأخر أي حاج معتمر عن المغادرة بعد انتهاء المدة المحددة لإقامته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الرابع
  article_text_ar: على المستقدم للزائر إبلاغ الجهة المختصة في حالة تأخر أو تغيب الوافد عن المغادرة بعد انتهاء المدة المحددة لإقامته مباشرة، ويعد عدم الإبلاغ تستراً من المستقدم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الخامس
  article_text_ar: على جميع الشركات والمؤسسات الخاصة والأفراد الالتزام بحصول العمالة الخاصة بهم على الإقامات ورخص العمل، وتجديدها في مواعيدها، وعدم استخدام عمال الغير أو ترك عمالهم يعملون لدى غيرهم دون اتباع القواعد النظامية المقررة، أو ترك عمالهم يعملون لحسابهم الخاص، وإبلاغ الجهات المختصة عند تغيب عمالهم عن مقر العمل خلال خمسة أيام من تاريخ تغيبهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند السادس
  article_text_ar: على جميع الأجهزة الحكومية التأكد من أن جميع الوافدين العاملين لديها أو في المجالات والحقول التي تدخل ضمن اختصاصها لديهم تصاريح إقامة سارية المفعول ومصرح لهم بالعمل، أو بموجب عقود رسمية معترف بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند السابع
  article_text_ar: يُحرم من الاستقدام لغرض العمل أو الزيارة لمدة لا تزيد على خمس سنوات ؛ كل من ثبت عليه تشغيل الوافدين المخالفين للأنظمة، أو ترك عماله يعملون لحسابهم الخاص أو لدى الغير، أو استخدم عمال غيره، دون إتباع القواعد النظامية المقررة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الثامن
  article_text_ar: يُمنع من دخول المملكة كل وافد يُرحّل ، وذلك وفقاً للمدد والإجراءات التي تحدد بموجب لائحة تصدر بقرار من سمو وزير الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند التاسع
  article_text_ar: يكون إيواء الوافدين المخالفين المشار إليهم في هذه القواعد في مراكز الإيواء - التي تنشأ لهذا الغرض - وذلك إلى حين ترحيلهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند العاشر
  article_text_ar: تطبق وزارة الداخلية على المخالفين المشار إليهم في البنود (الأول) و (الثالث) و (الرابع) من هذه القواعد العقوبات المنصوص عليها في المادتين (4) و (5) من تنظيم معاملة القادمين للمملكة بتأشيرات دخول للحج أو العمرة أو الزيارة أو العمل وغيرها، الصادر بالمرسوم الملكي رقم (م/ 42) وتاريخ 18/ 10/ 1404هـ .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الحادي عشر
  article_text_ar: تتولى اللجان المشكلة في المديرية العامة للجوازات وفروعها النظر في المخالفات الواردة هذه القواعد، ويعتمد قراراتها سمو وزير الداخلية أو من يفوضه، ويجوز بقرار من وزير الداخلية نقل اختصاص نظر هذه المخالفات إلى لجان تشكل لهذا الغرض في وزارة الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الثاني عشر
  article_text_ar: يجوز لمن صدر في حقه قرار إداري من اللجان المشار إليها في البند (الحادي عشر) من هذه القواعد ؛ التظلم لدى وزير الداخلية خلال مدة لا تتجاوز ثلاثين يوماً عمل من تاريخ تبليغه أو علمه بالقرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الثالث عشر
  article_text_ar: يصدر وزير الداخلية ما يلزم من القرارات التنفيذية لتطبيق ما ورد في هذه القواعد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
- article_ref: البند الرابع عشر
  article_text_ar: تنشر هذه القواعد في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a910b5ff-6770-4978-99f5-a9a700f2c140/1
  verified: false
