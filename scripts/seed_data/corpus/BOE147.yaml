  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: ينشأ مجلس للخدمة المدنية يتولى بالتعاون مع الجهات المختصة تخطيط وتنظيم شئون الخدمة المدنية في جميع الوزارات، والمصالح الحكومية، والأجهزة ذوات الشخصية المعنوية العامة، والإشراف عليها بما يؤمن تطور مستوى الخدمة المدنية ورفع الكفاية الإنتاجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يعدل اسم ( ديوان الموظفين العام ) إلى ( الديوان العام للخدمة المدنية ).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: الديوان العام للخدمة المدنية هيئة مستقلة تتولى الإشراف على شئون الخدمة المدنية في الوزارات، والمصالح الحكومية، والأجهزة ذوات الشخصية المعنوية العامة، ويرتبط بمجلس الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون رئيس الديوان العام للخدمة المدنية بمرتبة وزير ويتم تعيينه بأمر ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'أ - يكون تشكيل مجلس الخدمة المدنية من: - نائب رئيس مجلس الوزراء رئيساً - رئيس الديوان العام للخدمة المدنية عضواً - أربعة من الوزراء أعضاء يعينون بأمر ملكي بناء على اقتراح نائب رئيس مجلس الوزراء لمدة ثلاث سنوات. - ثلاثة أعضاء من ذوي الاختصاص يعينون بأمر ملكي بناء على اقتراح نائب رئيس مجلس الوزراء لمدة ثلاث سنوات. ب - تعقد جلسات مجلس الخدمة المدنية برئاسة نائب رئيس مجلس الوزراء أو من يفوضه من بين أعضائه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تكون جلسات المجلس صحيحة بحضور أغلبية الأعضاء، وتتخذ القرارات بأغلبية الحاضرين، وفي حالة تساوي الأصوات يعتبر صوت الرئيس مرجحا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا تكون قرارات المجلس نافذة إلا بعد موافقة رئيس مجلس الوزراء عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يضع المجلس نظامه الداخلي، وكذلك نظاما داخليا للديوان العام للخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يختص مجلس الخدمة المدنية بما يلي: أ - اقتراح الأنظمة المتعلقة بشئون الخدمة المدنية لإصدارها بالطرق النظامية. ب - إصدار اللوائح المتعلقة بشئون الخدمة المدنية، وإبداء الرأي في المعاملات التي ترفع من الوزارات والمصالح الحكومية ذات العلاقة بالعاملين في الخدمة المدنية. ج - التعاون مع الجهات المختصة في المجالات الآتية : 1 - رسم السياسات العامة للخدمة المدنية، ووضع الخطط والبرامج اللازمة لتنفيذها. 2 - تنمية القوى العاملة في الجهاز الحكومي، ورفع كفايتها الإنتاجية عن طريق التدريب والإعداد. 3 - تطوير التشكيلات والنظم الإدارية القائمة في الأجهزة الحكومية، وتحسين إجراءات وأساليب العمل فيها. 4 - إحكام الرقابة الإدارية على جميع ما يؤدى ضمن شئون الخدمة المدنية من أعمال وإجراءات من قبل الأجهزة العاملة في الدولة، بما في ذلك الأجهزة ذوات الشخصية المعنوية العامة، والتأكد من تمشيها مع الأنظمة واللوائح. 5 - تصنيف الوظائف. 6 - دراسة معدلات الأجور والرواتب، واقتراح تعديلها، وكذلك تحديد وتنظيم صرف المكافآت والبدلات للعاملين في الخدمة المدنية. د - ما يتم إسناده إليه مستقبلا من اختصاصات أخرى بقرار
    من مجلس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يختص الديوان العام للخدمة المدنية بالتالي: أ - مراقبة تنفيذ أنظمة الخدمة المدنية واللوائح والقرارات المتعقلة بها. ب - إجراء الدراسات والبحوث المتعلقة بالخدمة المدنية، وخاصة في المجالات الآتية: - تصنيف الوظائف. - الأجور والبدلات والمكافآت والتعويضات . ج - إبداء الرأي في المسائل المتعلقة بشئون الخدمة المدنية. د - اقتراح الأنظمة واللوائح المتعلقة بشئون الخدمة المدنية، وتقديمها إلى مجلس الخدمة المدنية. هـ - وضع القواعد والإجراءات الخاصة باختبار أفضل المتقدمين لشغل الوظائف الشاغرة. و- تصنيف الوظائف، واقتراح الرواتب، والأجور، والبدلات، والتعويضات ، والمكافآت، وكذلك دراسة الوظائف المطلوب إحداثها للتأكد من مطابقتها لقواعد التصنيف. ز- وضع القواعد والإجراءات الخاصة بحفظ سجلات الموظفين بما يكفل تكامل المعلومات المطلوبة عن كل موظف. ح - التعاون مع إدارات شئون الموظفين، وتوجيهها إلى أفضل الطرق لتنفيذ الأنظمة واللوائح، والقرارات المتعلقة بشئون الموظفين، وضبط السجلات الخاصة بالتعيينات والترقيات، والنقل، وغير ذلك من الأمور الأخرى المتعلقة بشئون الخدمة. ط - فحص تظلمات الموظفين المحالة
    إليه من الجهات المختصة وإبداء الرأي فيها. ي - الاختصاصات الأخرى التي تسندها إليه الأنظمة، واللوائح، وقرارات مجلس الخدمة المدنية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: على رئيس الديوان العام للخدمة المدنية أن يرفع تقريرا كل ستة أشهر إلى مجلس الخدمة المدنية، يبين فيه إنجازات الديوان العام للخدمة المدنية، وعلى مجلس الخدمة المدنية رفع التقرير إلى رئيس مجلس الوزراء مشفوعا بدراسة شاملة للمشكلات التي تواجه شئون الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1fe7fe77-d349-4fae-a561-a9a700f23a89/1
  verified: false
