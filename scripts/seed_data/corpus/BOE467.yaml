  name_ar: تنظيم مدينة الملك عبدالله للطاقة الذرية والمتجددة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمامها، ما لم يقتضِ السياق غير ذلك: المدينة: مدينة الملك عبدالله للطاقة الذرية والمتجددة. التنظيم: تنظيم المدينة. الوزير: وزير الطاقة. المجلس: مجلس إدارة المدينة. الرئيس التنفيذي: الرئيس التنفيذي للمدينة. إدارة النفايات المشعة: جميع الأنشطة الإدارية والتشغيلية التي تدخل في مناولة النفايات المشعة وفي تهيئتها ومعالجتها وتكييفها ونقلها وتخزينها والتخلص منها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع المدينة بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، وترتبط تنظيميّاً بالوزير، ويكون مقرها الرئيس في مدينة الرياض. ولها بقرار من المجلس إنشاء فروع أو مكاتب داخل المملكة أو خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف المدينة إلى أن تكون مركزاً علمياً وبحثياً متميزاً، مساهماً في التنمية في المملكة من خلال البحث والتطوير في المجالات ذات الصلة بالاستخدامات السلمية للطاقة الذرية وتطبيقات الطاقة المتجددة، والإسهام في تطوير الكفايات الوطنية، وتعزيز توطين التقنية في تلك المجالات لتكون جزءاً من تنمية المحتوى المحلي، والعمل على تقديم الخدمات والأعمال ذات الصلة وفقاً لأفضل الممارسات العالمية، بما في ذلك تقديم كافة أوجه الدعم والخدمات؛ لتيسير الأعمال ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع مراعاة الاختصاصات المقرة نظاماً للجهات الحكومية الأخرى، تتولى المدينة في سبيل تحقيق أهدافها المهمات التالية: المشاركة في إعداد الخطط الوطنية ذات الصلة بمجالات الاستخدامات السلمية للطاقة الذرية وتقنياتها وتطبيقات الطاقة المتجددة وتقنياتها، ووضع الخطط الاستراتيجية اللازمة لتنفيذها، واقتراح الأنظمة واللوائح ذات العلاقة باختصاصها. إجراء البحوث والدراسات في المجالات والتطبيقات ذات الصلة باختصاصها، والاستفادة منها في تنمية المحتوى المحلي. تعظيم رأس المال الفكري، وتشجيع تسجيل واستغلال حقوق الملكية الفكرية والنماذج الصناعية ذات العلاقة باختصاصها والمشاركة في تنظيمها -بالتنسيق مع الجهات المعنية- من أجل تعظيم العائد منها على الاقتصاد الوطني. تطوير برامج لتحفيز القطاع الخاص لدعم برامج البحوث والابتكار، وتطوير القدرات البشرية والمحتوى المحلي، في المجالات والتطبيقات ذات الصلة باختصاصها. إعداد مشاريع المواصفات القياسية الخاصة بمجالات الطاقة الذرية وتطبيقات الطاقة المتجددة، والتنسيق في ذلك مع الجهات المعنية. تقديم الخدمات الفنية والاستشارية لدعم الاستخدامات السلمية للطاقة الذرية
    وتطبيقات الطاقة المتجددة، ورفع مساهمتها في مزيج الطاقة. إدارة النفايات المشعة على المستوى الوطني. إعداد التقارير البحثية والعلمية -دوريّاً- فيما يتعلق بمجالات اختصاصها، والتعاون في ذلك مع الجهات المعنية. إقامة المعارض والمؤتمرات والبرامج والدورات التدريبية والندوات وجلسات العمل في المجالات والتطبيقات ذات الصلة باختصاصها. تقديم منح دراسية وبرامج تدريبية لتطوير الكفايات الوطنية ورفع القدرات البحثية والعلمية في المجالات والتطبيقات ذات الصلة باختصاصها. نشر الوعي في المجالات والتطبيقات ذات الصلة باختصاصها. التعاون وتبادل الخبرات مع الجامعات ومراكز البحوث والمؤسسات والهيئات والمنظمات الإقليمية والدولية، وبيوت الخبرة المتخصصة داخل المملكة وخارجها، في المجالات والتطبيقات ذات الصلة باختصاصها. الاتصال والتعاون الدولي للاستفادة من تجارب الدول الأخرى في المجالات والتطبيقات ذات الصلة باختصاصها. عقد الاتفاقيات مع الهيئات الدولية والإقليمية وفق الإجراءات النظامية المتبعة للاستفادة من أفضل التقنيات، والأنظمة، والبحوث، والدراسات العلمية، في المجالات والتطبيقات ذات الصلة باختصاصها. استثمار أموالها ومواردها
    في المشاريع ذات الصلة باختصاصاتها، بما يحقق عوائد مالية للمدينة. أي مهام أخرى -يقرها المجلس- ذات صلة بأهداف المدينة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمدينة مجلس إدارة برئاسة الوزير، وعضوية كل من: ممثل من وزارة الطاقة. ممثل من وزارة الخارجية. ممثل من وزارة التجارة. ممثل من وزارة الصحة. ممثل من وزارة البيئة والمياه والزراعة. ممثل من وزارة المالية. ممثل من وزارة التعليم. ممثل من وزارة الصناعة والثروة المعدنية. ممثل من هيئة تنمية البحث والتطوير والابتكار. ممثل من مركز الأمن الوطني. ممثل من مدينة الملك عبدالعزيز للعلوم والتقنية. الرئيس التنفيذي. ويجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يعد المجلس السلطة العليا على شؤون المدينة وتصريف أمورها، وله في حدود التنظيم اتخاذ ما يراه مناسباً من القرارات والإجراءات اللازمة لتحقيق أهدافها، وله على وجه خاص ما يأتي: إقرار السياسات العامة لأنشطة المدينة، وإقرار الخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه. إقرار لوائح المدينة المالية والإدارية، وغيرها من اللوائح الداخلية، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار الهيكل التنظيمي للمدينة. تحديد المقابل المالي لما تقدمه المدينة من خدمات وأعمال في مجال اختصاصها، بما لا يخالف الأنظمة والتعليمات. الموافقة على مشروع ميزانية المدينة السنوية، وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيداً لاستكمال ما يلزم في شأنها. اعتماد خطة العمل السنوية والخطط التشغيلية للمدينة. الموافقة على إبرام الاتفاقيات والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف،
    وفقاً للأحكام النظامية ذات الصلة. وللمجلس تشكيل لجان يعهد إليها ما يراه من مهمات، وله تفويض بعض صلاحياته إلى من يراه من أعضائه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المدينة. ويجوز عند الحاجة عقدها في أي مكان آخر داخل المملكة أو خارجها. يجوز لرئيس المجلس إنابة أحد أعضاء المجلس -عدا الرئيس التنفيذي- ليرأس اجتماعات المجلس حال غيابه. يجتمع المجلس أربع مرات في السنة على الأقل بناءً على دعوة من رئيس المجلس، وكلما اقتضت المصلحة ذلك، ومتى طلب ذلك أربعة من أعضائه على الأقل. ويجب أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم رئيس المجلس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز -عند الحاجة- عقد الاجتماعات والتصويت على القرارات باستخدام وسائل التقنية، ولا تعد القرارات المتخذة بهذه الطريقة صحيحة ما لم يصوت عليها جميع أعضاء المجلس، ولا يكون القرار نافذاً إلا إذا حاز على موافقة أغلبية الثلثين على الأقل. ويعرض القرار المتخذ بهذه الطريقة على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. لا يجوز لعضو المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. تثبت مداولات المجلس
    وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. لا يجوز لعضو المجلس أن يفشي شيئاً مما اطلع عليه من أسرار المدينة بسبب عضويته في المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت. للمجلس أن يصدر قرارًا بالتمرير. وفي هذه الحالة تشترط موافقة جميع أعضاء المجلس على القرار، ويُعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. يكون للمجلس أمين من بين منسوبي المدينة يختاره رئيس المجلس بناءً على ترشيح من الرئيس التنفيذي، يتولى جميع أعمال أمانة المجلس بما في ذلك الإعداد للاجتماعات وتسجيل المداولات والقرارات وأي مهمة أخرى يكلف بها من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمدينة رئيس تنفيذي، يُعَيَّن ويُعفى بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون هو المسؤول عن إدارة المدينة، وتتركز مسؤولياته في حدود التنظيم واللوائح الصادرة بناءً عليه، ويمارس الصلاحيات الآتية: الإشراف على سير العمل في المدينة، وعلى العاملين فيها. اقتراح السياسات العامة لأنشطة المدينة، واقتراح الخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس. الإشراف على إعداد مشروع ميزانية المدينة ومشروع حسابها الختامي والتقرير السنوي، ورفعها إلى المجلس. اقتراح الهيكل التنظيمي للمدينة ولوائحها الإدارية والمالية وغيرها من اللوائح الداخلية، ورفعها إلى المجلس لإقرارها. إعداد خطة العمل السنوية والخطط التشغيلية للمدينة، ورفعها إلى المجلس لاعتمادها. اقتراح الخدمات التي يمكن أن تقدمها المدينة والمقابل المالي لها، ورفعها إلى المجلس لإقرارها. تمثيل المدينة لدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة وغيرها من الجهات داخل المملكة وخارجها، وأمام القضاء، وله تفويض غيره بذلك. إصدار أوامر الصرف وفق الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً
    للأنظمة واللوائح المقرة والصلاحيات التي فوضه بها المجلس. إعداد تقارير دورية عن أعمال المدينة وإنجازاتها ونشاطاتها والمعوقات التي تواجهها، ورفعها إلى المجلس. التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، وذلك بحسب الإجراءات النظامية المتبعة. تنظيم مشاركة المدينة في المؤتمرات، والندوات، واللقاءات، والمعارض، المتعلقة بمجالات عمل المدينة محليًّا وإقليميًّا ودوليًّا. إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناءً عليه والقواعد والإجراءات المعتمدة، بحسب الصلاحيات المخولة له. وللرئيس التنفيذي تفويض بعض مهماته أو صلاحياته إلى من يراه من منسوبي المدينة وفقاً لما تحدده لوائحها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمدينة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمدينة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتألف موارد المدينة مما يلي: أ- الاعتمادات المالية التي تخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من التبرعات والهبات والأوقاف والوصايا والمنح. د- عوائد استثمار أموال المدينة. هـ- أي مورد مالي آخر يقره المجلس. تودع أموال المدينة في حساب جاري وزارة المالية في البنك المركزي السعودي، ويصرف منها وفقاً لميزانية المدينة السنوية المعتمدة. تفتح المدينة حساباً لها في البنك المركزي السعودي. ويجوز لها أن تفتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفقاً لميزانيتها المعتمدة ولوائحها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو المدينة لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة، يعيّن المجلس مراجع حسابات خارجيّاً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المدينة، ومعاملاتها، وبياناتها، وميزانيتها السنوية، وحسابها الختامي، ويحدد المجلس أتعابه. ويعرض تقرير مراجع الحسابات على المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع المدينة إلى رئيس مجلس الوزراء حسابها الختامي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع المدينة إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية تقريراً سنويًّا عما حققته من إنجازات أثناء السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يُنشر التنظيم في الجريدة الرسمية، ويُعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/39ee8b3c-770c-4e20-84bf-b33200b5b50a/1
  verified: false
