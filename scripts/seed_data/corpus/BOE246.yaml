regulation:
  code: BOE246
  name_ar: نظام الأحداث
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها: 1ـ النظام: نظام الأحداث. 2 ـ اللائحة: اللائحة التنفيذية للنظام. 3- النيابة: النيابة العامة. 4- الوزارة: وزارة العمل والتنمية الاجتماعية. 5- الحدث: كل ذكر أو أنثى أتم (السابعة) ولم يتم (الثامنة عشرة) من عمره. 6- المحكمة: المحكمة -أو الدائرة- المختصة بالنظر في قضايا الأحداث. 7- الدار: جهة تابعة للوزارة، تخصص فيها أماكن مستقلة لإيداع الأحداث من (الذكور), وأخرى خاصة بالإناث, وأماكن توقيف مستقلة للأحداث الموقوفين من (الذكور), وأخرى خاصة بالإناث الموقوفات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: لا يساءل جزائيًّا من لم يتم (السابعة) من عمره، وقت ارتكاب الفعل المعاقب عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لأغراض تطبيق النظام, يكون احتساب السن بالتقويم الهجري استناداً إلى ما هو مدون في أي وثيقة رسمية، وللمحكمة عند نظر القضية إحالة الحدث إلى الجهة الطبية المختصة لتقدير سنّه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تكون في مكان مناسب إجراءات ضبط بلاغات الأحداث المدعين، وسماع الشهود من الأحداث, وما يتبعها من إجراءات تتطلب حضور الحدث -لأول مرة- (بوجود ولي أمره أو من يقوم مقامه). وتحدد اللائحة ما يلزم حيال ذلك بما يكفل عدم الحاجة إلى حضوره مستقبلاً لأي إجراء، ما لم تقتضِ الضرورة خلاف ذلك، وفقاً لما يقدره المحقق أو القاضي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يراعى عند القبض على الحدث في حالات التلبس إبلاغ ولي أمره فوراً أو من يقوم مقامه. أما في غير حالات التلبس فيراعى حال الحدث، وأن يكون القبض عليه بحضور ولي أمره أو من يقوم مقامه أو مندوب من الدار أو بما يمنع الخلوة أو الانفراد به، ويحاط الحدث وولي أمره أو من يقوم مقامه بالتهمة المنسوبة إليه، وتحدد اللائحة إجراءات القبض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: في جميع الأحوال لا يكون إجراء تبليغ الحدث صحيحاً إلاَّ إذا بُلّغ ولي أمره أو من يقوم مقامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز إيقاف الحدث لغرض التحقيق؛ ما لم ترَ النيابة أن المصلحة تقتضي إيقافه، وفي جميع الأحوال لا يوقف الحدث إلا في الدار، ويكون أمر الإيقاف مسبباً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- إذا لم تكن هناك دار في المحافظة أو المركز الذي يقيم فيه الحدث المراد إيداعه أو إيقافه, فيرحل فوراً إلى أقرب دار لمكان إقامته. 2- يرحّل الحدث الذكر بصحبة ولي أمره أو من يقوم مقامه، وإن تعذر ذلك فيرحل بصحبة مندوب من الوزارة إن أمكن أو بما يمنع الانفراد به، وإن كان الحدث أنثى فترحل بصحبة ولي أمرها أو من يقوم مقامه، وإن تعذر ذلك فترحل بصحبة محرمٍ لها أو سجانة أو أكثر إن أمكن أو بما يمنع الخلوة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: ينتهي توقيف الحدث بمضي خمسة أيام، إلاَّ إذا رأى المحقق تمديد مدة التوقيف، فيجب -قبل انقضائها- أن يقوم بعرض الأوراق على رئيس فرع النيابة، أو من ينيبه من رؤساء الدوائر الداخلة في نطاق اختصاصه، ليصدر أمراً بالإفراج عن الحدث أو بتمديد التوقيف مدة أو مدداً متعاقبة، على ألاّ تزيد في مجموعها على خمسة عشر يوماً من تاريخ القبض عليه. وفي الحالات التي تتطلب التوقيف مدة أطول، يرفع الأمر إلى النائب العام أو من يفوضه من نوابه؛ ليصدر أمره بالتمديد مدة أو مدداً متعاقبة لا تزيد أي منها على عشرة أيام، ولا يزيد مجموعها على ستين يوماً من تاريخ القبض على الحدث، ويتعين بعدها مباشرة إحالته إلى المحكمة المختصة أو الإفراج عنه. وفي الحالات التي تتطلب التوقيف مدة أطول، للمحكمة الموافقة على طلب تمديد التوقيف مدة أو مدداً متعاقبة بحسب ما تراه، وأن تصدر أمراً قضائيًّا مسبباً في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يسمع رئيس جهة الضبط أو من ينيبه أقوال الحدث -في الأماكن التي ليس فيها دار- بحضور ولي أمره أو من يقوم مقامه، أو مندوبٍ من الوزارة أو بما يمنع الخلوة أو الانفراد به، وتحال الأوراق إلى النيابة، ويسلم الحدث لولي أمره أو من يقوم مقامه بعد أخذ التعهد عليه بإحضاره عند الطلب، ما لم ترَ النيابة خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لا تحقق النيابة مع الحدث إلاَّ بحضور ولي أمره أو من يقوم مقامه أو باحث أو أخصائي اجتماعي أو بحضور محامٍ له, ويكون التحقيق داخل الدار. وإن اقتضت مصلحة التحقيق غير ذلك فيكون التحقيق في مكان آخر يتناسب مع عمر الحدث، وتحدد اللائحة الإجراءات والضوابط اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تُعِد الدار -فور إيداع الحدث لديها- تقريرًا اجتماعيًّا عن حالته، وتقدمه إلى المحكمة مع ملف القضية، وكلما طلبت المحكمة ذلك. وفي جميع الأحوال يجب أن تُقدِّم الدار إلى المحكمة - بصفة مستمرة- تقريرًا اجتماعيًّا عن حالة الحدث، وتحدد اللائحة المدد اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع عدم الإخلال بحق أطراف الدعوى في الاعتراض، يكتفى في قضايا الأحداث بقرار اتهام دون حاجة إلى لائحة دعوى، ويستثنى من ذلك القضايا التي يستوجب النظر فيها ثلاثة قضاة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تجرى محاكمة الحدث أمام المحكمة بحضوره وولي أمره أو من يقوم مقامه، فإن تعذر ذلك فمندوب من الدار، وذلك دون الإخلال بحق الحدث في الاستعانة بمحامٍ وفق الأحكام المقررة نظاماً. وللمحكمة -بناء على طلب مَنْ له مصلحة- أن تسمح بعدم حضور الحدث أو ولي أمره أو من يقوم مقامه للمحاكمة، ويكتفى بحضور من يمثله وتعد المحاكمة حضورية في حقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: '1- إذا لم يكن الحدث متمًّا (الخامسة عشرة) من عمره وقت ارتكابه فعلاً أو أفعالاً معاقباً عليها، فلا يفرض عليه سوى تدبيرٍ أو أكثر من التدابير الآتية: أ) توبيخه وتحذيره. ب) تسليمه لمن يعيش معه من الأبوين أو لمن له الولاية. ج) منعه من ارتياد أماكن معينة لمدة لا تتجاوز ثلاث سنوات. د) منعه من مزاولة عمل معين. هـ) وضعه تحت المراقبة الاجتماعية في بيئته الطبيعية لمدة لا تتجاوز سنتين. و) إلزامه بواجبات معينة لمدة لا تتجاوز ثلاث سنوات. ز) الإيداع في مؤسسة اجتماعية أو علاجية لمدة لا تتجاوز سنة، بشرط أن يكون متمًّا (الثانية عشرة) من عمره وقت ارتكابه الفعل المعاقب عليه. 2- إذا كان الحدث متمًّا (الخامسة عشرة) من عمره وقت ارتكابه فعلاً أو أفعالاً معاقباً عليها فتطبق عليه العقوبات المقررة عدا عقوبة السجن؛ فيعاقب بالإيداع في الدار مدة لا تتجاوز نصف الحد الأقصى للعقوبة الأعلى المقررة لذلك الفعل ودون التقيد بالحد الأدنى لتلك العقوبة. وأما إذا كانت الجريمة مما يعاقب عليه بالقتل، فيعاقب بالإيداع في الدار مدة لا تتجاوز عشر سنوات. 3- للمحكمة أن تحكم على الحدث الذي ارتكب فعلاً أو أفعالاً معاقباً
    عليها وهو متم (الخامسة عشرة) من عمره بتدبيرٍ أو أكثر من التدابير المنصوص عليها في الفقرة (1) من هذه المادة، إذا رأت من أخلاقه أو ماضيه أو ظروفه الشخصية أو الظروف التي ارتكب فيها الفعل أو الأفعال المعاقب عليها أنه لن يعود إليها. 4ـ تكلف المحكمة من تراه من الجهات التنفيذية لمتابعة تنفيذ التدبير أو التدابير المحكوم بها على الحدث. 5ـ يجوز للمحكمة في أي وقت فرضُ تدبيرٍ -أو أكثر- أو إنهاؤه، أو إبدال آخر به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: لا تخل الأحكام الواردة في النظام بالأحكام المقررة شرعاً فيما يتعلق بجرائم الحدود والقصاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: إذا أتم الحدث (الثامنة عشرة) من عمره قبل انتهاء مدة الإيداع المحكوم بها عليه، فينقل إلى السجن لإتمام المدة الباقية، إلاَّ إذا رأت المحكمة من تلقاء نفسها -أو بناء على طلب من له مصلحة- غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: إذا اشترك في الجريمة أحداث وغير أحداث تنظم النيابة ملفاً خاصاً بغير الأحداث يحال إلى المحكمة المختصة بنظرها، وملفاً خاصاً بالأحداث يحال إلى المحكمة، ما لم تكن غير مختصة نوعاً. وفي كل الأحوال يطبق في حق الحدث الإجراءات والأحكام المنصوص عليها في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تسجل الأحكام الصادرة في حق الحدث في سجلٍّ خاص لدى الدار ولا تسجل عليه سابقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 1ـ يجوز للمحكمة -بقرار مسبب- من تلقاء نفسها أو بناءً على طلب الحدث أو ولي أمره أو من له مصلحة؛ الإفراجُ المشروط عن الحدث المحكوم عليه بالإيداع، وذلك بشرط أن يكون الحدث قد أمضى مدة لا تقل عن ربع المدة المحكوم بها عليه. 2ـ إذا أخلَّ الحدث بما اشتُرط عليه عند الإفراج عنه وفق ما ورد في الفقرة (1) من هذه المادة قبل انتهاء المدة المحكوم بها عليه، فيعاد إلى الدار؛ ليمضي المدة الباقية من الحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: مع مراعاة حكم المادة (الخامسة عشرة) من النظام، تنًّفذ جميع الأحكام الصادرة في شأن الحدث داخل الدار وبحضور مندوب من المحكمة، ما لم ترَ المحكمة غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: فيما لم يرد فيه نص في النظام، تطبق أحكام نظام الإجراءات الجزائية على الحدث، وذلك بالقدر الذي لا يتعارض مع وضعه بوصفه حدثاً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يصدر مجلس الوزراء اللائحة -بعد أن تعدّها وزارة العدل ووزارة الداخلية ووزارة العمل والتنمية الاجتماعية والمجلس الأعلى للقضاء والنيابة العامة- في مدة لا تتجاوز تسعين يوماً من تاريخ صدور النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يعمل بالنظام بعد تسعين يوماً من تاريخ نشره في الجريدة الرسمية، ويُلغي كل ما يتعارض معه من إجراءات وأحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4ec27eee-f917-408c-85eb-a9f6011ea426/1
  verified: false
