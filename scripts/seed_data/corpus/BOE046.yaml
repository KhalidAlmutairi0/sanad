articles:
- article_ref: المادة 1
  article_text_ar: 'تطبق احكام هذا النظام على جميع الافراد العسكريين السعوديين العامليين في: - وزارة الدفاع والطيران. - وزارة الداخلية. - الحرس الوطني. - الاستخبارات العامة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 2
  article_text_ar: 'التعريفات والرتب: التعريفات: تعني الكلمات والعبارات التالية المعاني المذكورة إلى جانب كل منها ما لم يرد النص أو يدل السياق على خلاف ذلك. أ- الوزير: هو المختص أو رئيس الجهة التابع لها الفرد كل بالنسبة للجهاز العسكري الذي يرأسه. ب- الفرد: هو كل عسكري تكون رتبته دون رتبة ضابط. ج- الجندي: هو أصغر رتبه عسكرية. د- ضابط الصف: هو الفرد الذي تزيد رتبته من رتبة جندي أول وتقل من رتبة ضابط. هـ- الفرد الفني: هو كل فرد يقوم بأعمال خاصة تستلزم اختصاصا أو مهاره فنية وفقاً لما تحدده اللائحة التنفيذية. و- عائلة الفرد: تشمل الاشخاص المثبتين في حفيظة النفوس العائدة للفرد. ز- مدة الخدمة: هي الفترة الزمنية التي يقضيها الفرد في الخدمة منذ تعيينه حتى خروجه منها. ح- خدمة التخصص: هي المدة التي يجب أن يخدمها الفرد الفني من تاريخ تعيينه في الوظيفة الفنية. ط- الراتب الاساسي: هو المبلغ المخصص للرتبه والدرجه التي يشغلها الفرد في سلم الرواتب المرفق بهذا النظام. ي- الراتب الفعلي: هو الراتب الاساسي مع العلاوات والبدلات المقرره للفرد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 3
  article_text_ar: 'أ- الرتب العسكرية للأفراد هي: جندي. جندي أول. عريف. وكيل رقيب. رقيب. رقيب أول. رئيس رقبا. ب- تضاف كلمة فني بعد الرتبه مباشرة للافراد الفنيين :'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 4
  article_text_ar: 'يشترط في تعيين الفرد ما يلي: أ- أن يكون الفرد سعودي الجنسية. ب- أن يكون حسن السيرة والسلوك غير محكوم عليه بالإدانة في جريمة مخلة بالشرف والأمانة مالم يكن قد رد اعتبار إليه. ج- أن يكون لائقا طبياً للخدمة العسكرية. د- أن لا يقل سنه عن سبعة عشر عاما ولا يزيد عن اربعين عاما. ه- أن لا يكون موظفا في اية جهة حكومية. و- أن تتوفر في الفرد الفني المؤهلات التي تحددها اللائحة التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 5
  article_text_ar: يقدم المرشح للتعين اقرارا منه بتوفر شروط التعيين المحددة في الفقرتين ب، ه من المادة (4) وإذا ثبت خلاف ذلك بعد تعيينه تنهى خدماته على أن لا تحتسب خدمته السابقة خدمة عسكرية ولا يستحق عنها أية مكافأة أو تعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 6
  article_text_ar: يعتبر الفرد تحت الاختبار لمدة سنة اعتباراً من تاريخ تعيينه فاذا لم يثبت صلاحيته خلال هذه المدة تنتهي خدمته بقرار من الجهة التي لها حق التعيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 7
  article_text_ar: يلزم الفرد بعد تعيينه البقاء في الخدمة لمدة أربع سنوات ويجوز بعدها انهاء خدمته بناء على طلبه ما لم تقضى ظروف العمل العسكري ببقائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 8
  article_text_ar: 'تجوز ترقية الفرد ما عدا رئيس الرقباء من الرتبة الأدنى إلى الرتبة الأعلى التي تليها مباشرة بقرار من الوزير. أما رئيس الرقباء فلا تجوز ترقيته إلى رتبة ملازم إلا بأمر من القائد الأعلى للقوات المسلحة بناء على توصية الوزير. ولا يتم ترقية الفرد إلا بعد توفر الشروط الآتية: مضي المدة المقررة التالية: من جندي إلى جندي أول سنتان على الأقل. من جندي أول إلى عريف سنتان على الأقل. من عريف إلى وكيل رقيب ثلاث سنوات على الأقل. من وكيل رقيب إلى رقيب ثلاث سنوات على الأقل. من رقيب إلى رقيب أول أربع سنوات على الأقل. من رقيب أول إلى رئيس رقباء خمس سنوات على الأقل. من رئيس رقباء إلى ملازم خمس سنوات على الأقل. نجاحه في اختبار الترقية. حصوله على المؤهل العلمي. اجتيازه للدورات الحتمية بنجاح. توصية قائد وحدته بترقيته. وجود شاغر في التشكيلات للرتبة التي سيرقى إليها على أن تكون ملائمة لتخصصه. ب- تنظيم اللائحة التنفيذية أحكام ترقيته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 9
  article_text_ar: يجوز للوزير الاعفاء من شرط وأكثر من شروط الترقية الواردة في هذا النظام عدا شرط المدة وتوفر الشاغر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 10
  article_text_ar: يجوز بصورة استثنائية وفقاً لما تحدده اللائحة التنفيذية منح الفرد الأقدمية لا تزيد عن سنة أو ترقيته للرتبة التي تلي رتبته دون التقيد بشروط الترقية ما عدا الشاغر إذا قام بأعمال مجيده غير عادية في الميدان أو في الخدمة العسكرية ويتم ذلك بقرار من الوزير أما رئيس الرقباء فتتم ترقيته بأمر من القائد الأعلى للقوات المسلحة بناء على توصية الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 11
  article_text_ar: أ- تحدد رواتب الأفراد بموجب سلم الرواتب المرفق بهذا النظام ويشمل الراتب الأساسي والعلاوات الدورية. ب- لا يجوز أن يثبت الفرد على أكثر من وظيفة ولكن يجوز أن يقوم بأعباء أكثر من وظيفة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 12
  article_text_ar: يمنح الفرد المرقى راتب أول درجة الرتبة المرقى إليها، فإذا كان راتبه عند الترقية ساوياً لراتب هذه الدرجة أو يزيد عليه يمنح راتب أول درجة تتجاوز راتبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 13
  article_text_ar: يصرف للفرد أثناء توقيفه أو سجنه لغرض المحاكمة نصف صافي راتبه فأن يرى أو عوقب بغير الطرد يعاد إليه ما أستقطع منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 14
  article_text_ar: يصرف لعائلة الفرد في حالة أسره كامل راتبه مع العلاوات والبدلات إلى أن ينتهي اسره ثم يعامل بموجب ما يصدر بحقه من قرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة (14) مكرراً
  article_text_ar: '- إضافة مادة تحمل الرقم (14 مكرراً) وذلك بموجب المرسوم الملكي رقم (م/30) وتاريخ 1425/6/1هـ، لتصبح بالنص الآتي: "يحجز على راتب الفرد بأمر من رئيس مجلس الوزراء إن كان متعلقاً بديون الحكومة، أو بحكم قضائي إن كان متعلقاً بغير ديون الحكومة، على ألا يتجاوز المقدار المحجوز ثلث صافي الراتب الشهري، وفي جميع الأحوال يقدم دين النفقة على غيره من الديون دون التقيد بهذه النسبة".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 15
  article_text_ar: يمنح الفرد العلاوة الدورية سنوياً وفي سلم الرواتب المرفق بهذا النظام وذلك بنقلة من الدرجة التي يشغلها إلى الدرجة التي تليها مباشرة في الرتبة ذاتها ويتم هذا النقل في أول شهر محرم من كل سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 16
  article_text_ar: يستحق الفرد الفني علاوة فنية بموجب جدول العلاوات الفنية المرفق بهذا النظام ولا يجوز الجمع بين فنيتين وتحدد اللائحة التنفيذية شروط منح هذه العلاوة وتصنيفها وفق التخصصات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 17
  article_text_ar: أ- يجوز الجمع بين علاوتين وعلاوة واحدة من العلاوات الواردة في جدول العلاوات الاخرى المرفق لهذا النظام والتي تحدد شروط منحها في اللائحة التنفيذية. ب- لا يجوز الجمع بين علاوتين من العلاوات الواردة في جدول العلاوات الاخرى المرفق بهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 18
  article_text_ar: تصرف للفرد الذي يعمل في المناطق النائية علاوة وفقاً لما تحدده اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 19
  article_text_ar: يصرف للفرد العلاوات المنصوص عليها في المادتين (17،16) اثناء الاجازة والانتداب كما تصرف للملحق والمبتعث والمندوب إذا زاول نفس اختصاصه وتسقط في حالة عدم مزاولته العمل الذي خصصت العلاوة من أجله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 20
  article_text_ar: 'تؤمن الاعاشة طهياً في الحالات التالية: أ- للأفراد ضمن وحداتهم. ب- للموقوفين والمسجونين في الوحدات العسكرية ج- للمستجدين الموجودين في الوحدات العسكرية حتى انتهاء إجراءات تعيينهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 21
  article_text_ar: أ- يجوز في الحالات الاستثنائية صرف بدل الاعاشة نقداً للفراد الذين تمنعهم واجباتهم الرسمية من تناول الاعاشة طهياً أو الذين يتعذر تقديمها لهم طهياً ويصدر بتحديد هذه الحالات قرار من الوزير. ب- تقطع عن الافراد المسجونين بالسجون العامة بدل الاعاشة أو الاعاشة المقررة ويكتفى بما يصرف لهم طبقاً للائحة السجون العامة. ج- تؤمن في حالة الحروب والطوارئ لجميع الافراد الذين يعملون في الميدان اعاشتهم المقررة ويصرف لهم بالإضافة اليها بدل اعاشة نقداً كما يتم صرف هذا البدل نقدا في حالة تمتع الافراد بالاجازات الميدانية. د- تحدد اللائحة التنفيذية مقدار بدل الاعاشة النقدي للأفراد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 22
  article_text_ar: 'بدل السكن: يصرف للفرد شهرياً بدل سكن نقدي وفقاً لما تحدده اللائحة التنفيذية وعند تأمين سكن عائلة الفرد يدفع الفرد مقابل ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 23
  article_text_ar: 'يومية الميدان: أ- تصرف يومية ميدان وفقاً لما تحدده اللائحة التنفيذية للأفراد المرابطين في الخطوط الأمامية داخل المملكة وخارجها كما تصرف للأفراد المشتركين في المناورات والتمرينات الجماعية المشتركة والاعمال الميدانية والمشاريع التدريبية ويراعى في صرف هذه اليومية ما يلي: أن لا تقل القوات المشتركة عن مستوى فصيل أو ما يماثله. أن لا تقل مدة المشروع عن أثنين وسبعين ساعة وأن لا تزيد على خمسة وأربعين يوماً ولا يجوز تجاوز هذه المدة إلا بموافقة الوزير. أن يجري المشروع في ظروف خدمة الميدان خارج المعسكرات. أن لا تصرف هذه اليومية مع بدل الانتداب ولا عن مدد الاجازات والغياب. أن يستند في صرف يوميات الميدان بالنسبة للمناورات والتمرينات الجماعية والمشاريع على قرار من الوزير. ب- تصرف لبعض أفراد قوى الأمن الداخلي الذين يقومون بأعمال ميدانية نصف يومية الميدان المقررة وذلك بموجب ما يقترحه وزير الداخلية وما يوافق عليه مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 24
  article_text_ar: 'بدل التشغيل: يصرف للأفراد العاملين في الخارج بالملحقيات العسكرية أو ما في حكمها بدل تشغيل وبدل تهيئة سفر وبدل تنقلات وفق الأحكام التي تقررها اللائحة التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 25
  article_text_ar: 'يصرف للفرد بقرار من الوزير مكافأة وفقاً لما تحدده اللائحة التنفيذية في الحالات التالية: أ- القيام بأعمال جليلة لصالح الأمن الوطني أو السلامة العامة. ب- الاشتراك في أعمال الحج. ج- العمل خلال أيام الأعياد في غير اعمال الحج. د- التفوق في الدراسة أو الدورات التدريبية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 26
  article_text_ar: 'أ- التعويض عند انتهاء الخدمة:يصرف للفرد عند انتهاء خدمته لسبب غير تأديبي ما يعادل راتبه الفعلي لثلاثة أشهر. ب- يعوض الفرد عن اجازاته التي لم يستعملها ويدفع التعويض بعد ترك الخدمة .... أن يكون تركه لها لأسباب غير تأديبية وذلك على النحو التالي: يكون التعويض براتب كامل عدا العلاوات والبدلات عن اجازاته السنوية المستحقة له اثناء خدمته التي تسبق تاريخ 1388/11/1هـ على أساس آخر راتب تقاضاه وفي حدود رواتب ثلاثة أشهر عن المدة السابقة للتاريخ المذكور. يعوض الفرد براتب كامل مع كافة العلاوات والبدلات عدا بدل التشغيل وبدل السكن عن جميع اجازته اللاحقة لتاريخ 1388/11/1هـ التي لم يتمتع بها. اذا فصل الفرد بموجب الفقرات (ج، د، و، ز) من المادة (56) من هذا النظام فأنه يحرم من أي حق في التعويض عن اجازاته ويعامل في ذلك وفق نظام التقاعد العسكري. ج- يعطى الفرد الذي تلحقه خسارة مادية بسبب عمله واثناء قيامه بتأديته أو قيامه بمهمة رسمية تعويضاً معادلا للخسارة الفعلية على أن لا يتجاوز مقدار ذلك التعويض راتب ثلاثة شهور على أن يقدم الفرد الوثائق المثبتة لهذه الخسارة لاعتمادها والتعويض عنها على أن تقدم
    اليات التعويض خلال مدة شهر على الأكثر من تاريخ وقوع الخسارة المنوه عنها والا سقط الحق بالمطالبة بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 27
  article_text_ar: لا يجوز نقل الفرد من وحدته إلى أي وحده أخرى أو من جهة إلى أخرى الا بناء على مقتضيات مصلحة العمل شريطة أن تتلائم الوظيفة المنقول إليها الفرد مع رتبته واختصاصه ويجوز للفرد لا سباب وجيهه ومعقوله أن يتقدم عن طريق مرجعه بطلب كتابي لنقله إلى أي وحده أو جهة أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 28
  article_text_ar: يصرف للفرد بدل ترحيل وفقاً للأحكام التي تحددها اللائحة التنفيذية وذلك في حالة تعيينه لأول مره في الخدمة أو نقله من بلد لآخر داخل المملكة أو نقله من داخل المملكة إلى خارجها أو العكس أو من جهة إلى أخرى خارج المملكة أو في حالة ابتعاثه أو الحاقه لمدة تزيد عن ستة أشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 29
  article_text_ar: 'يتم اركاب الفرد بمفرده ذهاباً واياباً على احدى طائرات القوات المسلحة أو تؤمن له تذكرتا ركاب بالدرجة السياحية بالطائرات أو يصرف له ما يعادل قيمة التذكرة السياحية بالطائرة في الحالات الآتية: أ- إذا انتدب في الداخل أو الخارج لمدة لا تزيد عن "..." يوماً. ب- إذا أوصى التقرير الطبي بعلاجه في بلد داخل المملكة أو خارجها خارج مقر عمله وكذلك في حالة التوصية بالمثول أمام هيئة طبية أو للكشف الطبي الخاص بالعمل في غير مقر عمله كما يتم اركاب مرافق إذا استدعت الحالة الصحية ذلك. ج- إذا منح إجازة ميدانية. د- إذا دعي للمثول امام هيئة تحقيق أو محاكمه. هـ- إذا استدعته الحكومة للأدلاء بشهادة امام احدى المحاكم أو الهيئات بالواقعة خارج مقر عمله. و- إذا اقتضت المصلحة اجراء اختبارات مسابقة في غير مقر عمله. ز- إذا كلف بالحضور في المهرجانات الرياضية والاستعراضات أو الحفلات. ح- في حالة وفاة زوجته أو أحد والديه أو أحد أولاده في المملكة عند ما يكون خارج المملكة منتدبا أو مبتعثا أو يعمل في الخارج. ط- في حالة الالحاق بالعمل في منطقة غير منطقة عمله ولمدة لا تزيد عن (90) يوماً. ي- في حالة الابتعاث للداخل
    أو الخارج في دورة تدريبية أو دراسية لا تزيد مدتها عن ستة شهور.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 30
  article_text_ar: 'يتم اركاب الفرد وافراد عائلته ذهاباً واياباً على احدى طائرات القوات المسلحة أو تؤمن لهم تذاكر الاركاب بالدرجة السياحية بالطائرة أو يصرف له ما يعادل قيمة التذاكر السياحية بالطائرة في الحالات الآتية: أ- إذا كان الفرد يعمل في الخارج ورغب في قضاء اجازته داخل المملكة وذلك كل سنتين. ب- الانتداب في الداخل أو الخارج لمدة تزيد عن (90) يوماً. ج- الالحاق بالعمل في منطقة غير منطقة عمله ولمدة لا تزيد عن (90) يوماً. د- العطلات الدراسية التي لا تقل عن شهر وذلك عندما يكون الفرد في دورة تدريبية أو دراسية تزيد مدتها عن سنة سواء كان في الداخل أو في الخارج. هـ- الابتعاث للداخل أو الخارج في دورة تدريبية أو دراسية تزيد عن ستة أشهر. و- النقل من داخل المملكة إلى خارجها والعكس أو من جهة إلى أخرى خارج المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 31
  article_text_ar: في حالة انتهاء خدمة الفرد الذي يعمل خارج المملكة يتم ترحيله وعائلته إلى المملكة بالطائرة بالدرجة السياحية وفي حالة وفاة الفرد فيتم بطلب عائلته نقل جثمانه إلى المملكة على نفقة الجهة التابع لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 32
  article_text_ar: يحق للفرد الذي يتمتع بإجازة سنوية أن يحصل على تذكرة اركاب ذهاباً واياباً بنصف الأجرة له ولزوجته وأولاده على طائرات مؤسسة الخطوط الجوية العربية السعودية وفي حدود ما تصل إليه داخل المملكة وذلك لمرة واحدة في السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 33
  article_text_ar: يعالج الفرد وافراد عائلته الذين يعولهم شرعا بالمستشفيات العسكرية أو الحكومية داخل المملكة على نفقة الحكومة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 34
  article_text_ar: أ- يصرف بدل علاج شهري للأفراد الذين يعملون بالخارج وفق الأحكام التي تقررها اللائحة التنفيذية. ب- يعالج الفرد المنتدب والمبتعث خارج المملكة وكذلك أفراد عائلته الذي يعولهم شرعاً إذا كان يحق له اصطحابهم بموجب هذا النظام على نفقة الحكومة على أن يؤيد المرض والمعالجة بوثائق طبية مدته من الملحق العسكري أو من الممثليات الموجودة في البلاد التي تمت المعالجة فيها ولا يدخل في ذلك بأية حال عمليات التجميل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 35
  article_text_ar: إذا قررت اللجنة الطبية تعذر علاج الفرد داخل المملكة فيعالج خارجها على نفقة الجهة التابع لها وفقاً لما تحدده اللائحة التنفيذية. واستثناء من ذلك يجوز بقرار من الوزير في الحالات المرضية المستعجلة أن يعالج خارجها دون اشتراط تقرير اللجنة الطبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 36
  article_text_ar: يجوز الحاق الفرد من قوة إلى قوة أخرى تابعة لنفس الجهة أو منطقة إلى أخرى أو من سلاح إلى سلاح آخر أو من وحدة إلى وحدة أخرى لمدة لا تزيد على سنة قابلة للتجديد لسنة أخرى وذلك بناء على مقتضيات مصلحة العمل أو لظروف الطارئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 37
  article_text_ar: أ- يجوز ندب الفرد للقيام بأعمال وظيفة معينة في جهة حكومية أخرى بطلب تلك الجهة. ب- تتحمل الجهة المندوب إليها الفرد صرف تذاكر أركابه وأفراد عائلته وما يستحقه من بدل أو تعويض أو مكافأة عدا راتبه وما يتبعه من علاوات وبدلات ما لم ينص قرار الندب على غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 38
  article_text_ar: أ- يجوز بعد موافقة رئيس مجلس الوزراء إعارة الفرد للعمل لدى احدى الحكومات أو الهيئات الدولية أو المؤسسات العامة أو الخاصة، على أن لا تزيد مدة الإعارة عن سنتين متتاليتين ويجوز تجديدها بموافقة من رئيس مجلس الوزراء لأكثر من ذلك على أن لا تزيد مدة الإعارة بكاملها عن أربع سنوات متتالية ويجوز الغاء قرار الإعارة قبل انتهاء مدتها. ب- يوقف راتب الفرد وجميع البدلات والعلاوات اعتبارا من تاريخ اعارته حتى يعود إلى مباشرة عمله، وتتحمل الجهة المعار إليها نفقات ترحيله وأفراد عائلته وجميع ما يستحقه من رواتب وبدلات وعلاوات. ج- يجوز بعد موافقة رئيس مجلس الوزراء أن تتحمل الجهة المعيره كل أو بعض رواتب الفرد المعار وبدلاته وعلاواته ونفقات ترحيله وأفراد عائلته وأن يعامل كالأفراد العاملين في مكاتب الملحقين العسكريين إذا كانت الإعارة لجهة خارج المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 39
  article_text_ar: يصرف للفرد المنتدب في مهمة رسمية بدل نقدي عن كل ليله يقضيها خارج مقر عمله وفق الأحكام التي تحددها اللائحة التنفيذية وتحدد هذه اللائحة الزيادة التي تطرأ على ذلك البدل إذا كان الانتداب لخارج المملكة كما تحدد مقدار بدل الانتقال للمنتدب في الداخل والخارج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 40
  article_text_ar: يبدأ احتساب بدل الانتداب للفرد من وقت مغادرته مقر عمله الأصلي وينتهي بعودته ولا يدفع له ألا عن الأيام الضرورية لقضاء المهمة ويحتسب بدل الانتداب عن أيام الاجازة المرضية بشرط أن تقع اثناء المدة التي يحتسب عنها بدل الانتداب وأن يخطر الفرد الجهة المنتدب لها أو أقرب إدارة حكومية في حالة عدم وجود قيادة عسكرية بمرضه ويشترط أن توافق الجهة التي انتدبنها على احتساب لهذه المدة انتدابا على الا تزيد عن خمسة عشر يوماً او نصف مدة الانتداب أيهما اقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 41
  article_text_ar: يصرف للفرد بدل الانتداب المقرر عن ليله واحده إذا انتهت المهمة التي كلف بأدائها وعاد الى مقر عمله في اليوم نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 42
  article_text_ar: يصرف مقابل بدل الانتداب للفرد الذي تستوجب طبيعة عمله سفرا متواصلا تعويض شهري بقرار من الوزير على الا يزيد عن ثلث راتبه في الشهر الواحد وتحدد لهذه الوظائف بقرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 43
  article_text_ar: أ- يجوز ابتعاث الافراد الذين تقتضي مصلحة العمل ابتعاثهم للدراسة او التدريب بداخل المملكة وخارجها وفقا لسياسات التدريب. ب- تحديد اللائحة التنفيذية احكام الابتعاث للداخل والخارج والقواعد المنظمة لمعاملة الطلبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 44
  article_text_ar: 'خدمة التخصص: يجب على كل فرد يجري تدريبه وابتعاثه على نفقة الجهة التابع لها سواء في الداخل والخارج ان يخدم مدة التخصص التي تحددها اللائحة التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 45
  article_text_ar: تحدد المستويات الثقافية للقبول طبقا لسياسة التدريب التي تضعها إدارات التدريب والمصدق عليها من الوزير ويمنح المتخرجين بعدد تصنيفهم العلاوات الفنية وفق ما هو منصوص عليه بجدول العلاوات الفنية المرفق في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 46
  article_text_ar: 'الاجازات التي تمنح للفرد هي: أ- إجازة سنوية. ب- إجازة ميدانية. ج- إجازة عرضية. د- إجازة استثنائية. ه- إجازة مرضية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 47
  article_text_ar: أ- يستحق الفرد إجازة سنوية مدتها ثلاثون يوما في السنة. ب- لا يجوز منح الفرد إجازة سنوية للمرة الأولى قبل مضي أحد عشر شهرا من بدء تعيينه. ج- يجوز ضم الاجازات السنوية بعضها الى بعض بشرط لا تزيد مدة او مدد الاجازة التي يتمتع بها الفرد في السنة الهجرية الواحدة على ستين يوما كما يجوز التمتع بالإجازة السنوية على فترات بشرط ان لا تقل فترة التمتع بالإجازة عن خمسة عشر يوما ولا تزيد على مرتين في السنة الهجرية الواحدة. د- يجوز للوزير في حالات الضرورة تمديد مدد التمتع بالاجازات المذكورة في الفقرة ج ما لا يزيد عن 15 يوماً واحتسابها من اجازات الفرد. ه- يجوز تأجيل الاجازة السنوية للفرد اذا اقتضت المصلحة العامة ذلك وفق هذه الحاله يحق له التمتع بها حالما تزول الأسباب التي اجلت الاجازة من اجلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 48
  article_text_ar: تصرف رواتب الافراد المجازين في إجازة سنوية مقدما بما في ذلك جميع البدلات والعلاوات كما يصرف بدل الاعاشة نقداً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 49
  article_text_ar: يجوز استدعاء الفرد من اجازته السنوية وتقديرها لأسباب تقتضيها ظروف العمل وإذا استدعى الفرد من اجازته السنوية ولم يكن قد استمتع فيها فيعوض بما يعادل قيمة التذاكر السياحية بالطائرة ذهابا وإيابا عن اركابه واركاب عائلته (ان كان قد اصطحبها او نقلها من مقر عمله بسبب تمتعه بالإجازة مع الاحتفاظ له بالجزء المتبقي من اجازته).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 50
  article_text_ar: 'الإجازة العرضية: يجوز لظروف طارئه منح الفرد إجازة عرضيه لا تزيد مدتها على عشرة أيام في السنة الواحدة وتسقط بانتهاء السنة الهجرية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 51
  article_text_ar: الإجازة الميدانية:يجوز منح الفرد الذي يعمل في الميدان وفي مراكز الحدود النائية إجازة ميدانية لا تتجاوز في مجموعها (45) يوماً في السنة دفعه واحد كما يجوز تجزئتها إلى دفعتين أو ثلاث دفعات في السنة الواحدة على ان لا تقل كل دفعه عن خمسة عشر يوماً ولا يجوز الجمع بين الاجازة السنوية والاجازة الميدانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 52
  article_text_ar: 'الإجازة الاستثنائية: يجوز منح الفرد بناء على طلبه اجازه استثنائية داخل المملكة او خارجها لمدة لا تزيد عن أربعة أشهر طوال مدة خدمته بدون أي مستحق شهري وذلك بعد استنفاذ الاجازات السنوية المستحقة له بموجب النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 53
  article_text_ar: 'الاجازة المرضية: أ‌- يستحق الفرد اجازه مرضيه في مدة ثلاث سنوات قدرها ثلاثة اشهر بالراتب الفعلي وثلاثة اشهر بنصف الراتب الفعلي وثلاثة اشهر بربع الراتب الفعلي وسته اشهر بدون راتب. ب‌- يستحق الفرد الذي يصاب بجرح او مرض يمنعه من أداء عمله بصفة مؤقته ويكون ذلك اثناء عمله وبسببه اجازه مرضيه بدلا من الاجازة المنصوص عليها في الفقرة السابقة قدرها اثنا عشر شهرا بالراتب الفعلي وسته أشهر بنصف الراتب الفعلي. ج- تحدد اللائحة التنفيذية احكام منح الاجازات المرضية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 53 مكرر
  article_text_ar: 'إضافة مادة جديدة بعنوان "إجازة أداء الامتحان الدراسي" وذلك بموجب المرسوم الملكي رقم (م/11) وتاريخ 1424/3/10هـ، تكون المادة (53) مكرر بالنص الآتي: "المادة ( 53 ) مكرر: إجازة أداء الامتحان الدراسي: يجوز منح الفرد إجازة للمدة اللازمة لأداء الامتحان الدراسي، بشرط أن يقدم ما يثبت أداء الامتحان ومدته. ويجوز استدعاء الفرد من هذه الإجازة أو إلغاؤها لأسباب تقتضيها ظرف العمل".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة ( 53 ) (مكرر2)
  article_text_ar: '- إضافة مادة بالررقم (53) (مكرر2)، بالنص الآتي: "إجازة المرافقة الدراسية: يجوز بقرار من الوزير منح الفرد الذي يرغب في مرافقة زوجته المبتعثة للدراسة في الخارج أو أحد ممن يعولهم شرعاً إجازة مرافقة دراسية، وذلك بقدر مدة المرافقة، على أن تكون دون راتب وألا تحتسب المدة لأغراض التقاعد والترقية". وذلك بموجب المرسوم الملكي رقم (م/28) وتاريخ 1442/3/26هـ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 54
  article_text_ar: بدون اخلال بما ورد في المادتين 7,6 للفرد ان يطلب انهاء خدمته عن طريق طلب مكتوب يتقدمه الى مرجعه المباشر يبدى فيه رغبته في ترك الخدمة العسكرية وللوزير قبول طلبه او رفضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 55
  article_text_ar: على الفرد ان يستمر في أداء واجباته الى أن يبلغ بالقرار الصادر بقبول انهاء خدماته ولا يقبل طلب الفرد إذا كان محالا لمحاكمه عسكريه الابعد انتهاء محاكمته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 56
  article_text_ar: 'تعتبر خدمات الفرد منتهية لاحد الأسباب التالية: أ‌- الاستغناء عن خدماته حسب مقتضيات مصلحة العمل. ب‌- الإحالة على التقاعد. ج‌- الطرد من الخدمة بناء على قرار عسكري. د‌- فقد الجنسية. ه‌- الوفاة والاستشهاد. و‌- إذا انقطع عن عمله بدون عذر شرعي مدة أسبوع او تجاوز الاجازة بمدة شهر وصدر قرار فصله بناء على هذا ومع هذا لا يحول فصل الفرد بسبب تغيبه عن العمل عن محاكمته عسكريا. ز‌- إذا حكم عليه بحد شرعي او أدين في جريمة مخلة بالشرف او الأمانة بعد صدور قرار عسكري. ح- الفقدان اثناء المعركة وذلك بعد مضي سته شهور من تاريخ فقدانه إذا لم تعلم حياته او مماته ويستمر في صرف مخصصاته خلال هذه المدة لعائلته على ان تصفى حقوقه في نهايتها كشهيد طبقا لنظام التقاعد العسكري. ط‌- إذا ثبت عجزه صحيا عن العمل وأصبح غير لائق طبياً للخدمة العسكرية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 57
  article_text_ar: ‌أ- تجوز إعادة الفرد للخدمة إذا دعت الحاجة إلى ذلك وكانت سنه تقل عن سن الإحالة على التقاعد بسنتين على الأقل. ‌ب- يجب أن تتوفر في الفرد المعاد للخدمة الشروط الواردة في المادة (4) ماعدا الفقرة (د). ‌ج- لا يجوز إعادة من فصل من الخدمة أكثر من مرتين وفقا للفقرة (و) من المادة (56).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 58
  article_text_ar: أ‌- إذا أعيد الفرد للخدمة –ماعدا الفني- ولم تتجاوز مدة تركه الخدمة سنه كاملة فيعاد براتبه وبرتبته السابقة وتعطى له بدلاتها وعلاواتها فإذا زادت عن سنة ولم تتجاوز الثلاث سنوات فيعاد بالرتبة الأدنى من رتبته السابقة ويعطى أول مربوطها، أما إ ذا زادت عن الثلاث سنوات ولم تتجاوز الخمس سنوات فيعاد برتبة أدنى من رتبته برتبتين ويعطى أول مربوطها، أما إذا زادت عن ذلك فيعاد برتبة جندي ويعطى له أول مربوطها. ب‌- تتم عودة الفرد الفني للخدمة بعد نجاحه في اختبار يعقد له ويمنح الرتبة المناسبة على أن لا تزيد عن رتبته السابقة إلا إذا حصل على مؤهلات علمية أو فنية أعلى مما كانت لديه، كما يمنح العلاوة الفنية المناسبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 59
  article_text_ar: 'يجب على الفرد: ‌أ- الولاء التام للمليك والمحافظة على مصالح الوطن والقوات العسكرية وأن يعمل دون إهمال على تطبيق النظم واللوائح المعمول بها وتنفيذها وتحاشي أية مخالفة أو خرق لها. ‌ب- أن يؤدي المسئوليات المكلف بها بكل دقة وأمانة ونشاط وإخلاص وأن ينهي الأعمال المطلوبة منه على أكمل وجه وفي أقصر مدة وأن يخصص وقت العمل لأداء واجبات وظيفته وما يناط به من واجبات بكل أمانة ودقة. ‌ج- أن ينفذ الأوامر والتعليمات العسكرية التي تصدر إليه من قبل رؤسائه في غير معصية الله. ‌د- أن يراعى آداب اللياقة وحسن الأخلاق في تصرفاته مع رؤسائه وزملائه ومرؤوسيه وأفراد الشعب. ‌هـ- أن يحافظ على شرف الخدمة العسكرية في جميع الأوقات والأماكن وأن يترفع عن كل ما يخل بشرف الوظيفة وكرامتها. ‌و- أن يحافظ على الانضباط العسكرية وحسن السلوك والقيافة وأن يكون مثلاً أعلى لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 60
  article_text_ar: 'يحظر على الأفراد ما يلي: ‌أ- الزواج من غير سعودية. ‌ب- القيام بأي نشاط سياسي بأي وسيلة كانت بما في ذلك إبداء الآراء السياسية والمساهمة في أي منظمة أو مجموعة ذات صبغة سياسية وحضور أي اجتماع ذي طابع سياسي. ‌ج- مزاولة الأعمال التجارية والمهن الحرة سواء بطريق مباشر أو غير مباشر بأجر أو بدون أجر. ‌د- الاحتفاظ لنفسه بأية ورقة من الأوراق الرسمية إلا ما يخصه شخصياً ما لم يكن لها صفة السرية. ‌هـ- التصريح لغير رؤسائه أو من يخولونهم بأية معلومات عسكرية أو غيرها مما يتصل بعلمه ويستمر الالتزام بهذا الكتمان قائماً حتى بعد ترك الخدمة العسكرية. ‌و- الخدمة بالقوات المسلحة الأجنبية بعد انتهاء خدمته الا بعد الحصول على إذن من الوزير. ‌ز- الاشتراك في تأسيس المؤسسات أو الشركات أو قبول عضوية مجالس إدارتها أو أي عمل فيها. ‌ح- توجيه النقد أو اللوم إلى الحكومة بأية وسيلة من وسائل الإعلام الداخلية أو الخارجية. ‌ط- الاشتراك في مشترى وبيع المهمات واللوازم العسكرية والاملاك والعقارات الحكومية بقصد الربح أو المضاربة. ‌ي- قبول الهدايا والاكراميات والمنح سواء كانت بطريقة مباشرة أو بالواسطة وذلك لغرض
    التأثير على عمله الرسمي. وتكون مخالفة أي من هذه المحظورات موجباً لمحاكمة الفرد ويطرد من يخالف حكم الفقرة (أ) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 61
  article_text_ar: تؤمن للفرد الملابس اللازمة كما تصرف له كافة التجهيزات التي تفرضها قواعد السلامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 62
  article_text_ar: يصنف جميع ضباط الصف والجنود الفنيون والاختصاصيون الذين يتقاضون علاوات فنية او اختصاصية في الفئات التي تتناسب مع اختصاصاتهم ومستوياتهم في جدول العلاوات الفنية وفق اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 63
  article_text_ar: الافراد الذين يتقاضون عند صدور هذا النظام علاوات فنية واختصاصية غير منصوص عليها او يزيد مقدارها عن العلاوات الواردة في هذا النظام يكمل لهم الفرق بين دخلهم السابق لهذا النظام ودخلهم الحالي حتى يتلاشى بهذا الفرق بالترقية او التدرج بالعلاوة الدورية وغير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 64
  article_text_ar: يمنح الفرد العلاوة الدورية المستحقة له خلال عام 1397- في التاريخ الذي يستحق العلاوة الدورية فيه ثم يمنح جميع الافراد العلاوة الدورية بموجب المادة (15) من النظام في اول محرم عام 1398هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 65
  article_text_ar: الافراد الذين كانوا برتبة وكيل في 1394/11/1هـ ثم صنفوا برتبة رقيب ورقوا بعد ذلك الى رتبة رقيب أول تحسب لهم المدة الزائدة عن أربع سنوات التي قضوها في رتبة وكيل كأقدمية في رتبة رقيب أول على الا يترتب على ذلك أي مزايا ماليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 66
  article_text_ar: يجوز بقرار من الوزير في حالة الحرب والطوارئ عدم التقيد بفقرة أو أكثر كما جاء في المواد (58،57،56) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 67
  article_text_ar: على الوزير المختص كل في جهته تنفيذ احكام بهذا النظام وله الحق في تفويض كل او بعض صلاحياته لمن يراه من المسئولين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 68
  article_text_ar: اذا استدعت الحاجة الى إضافة أو تعديل أي حكم في هذا النظام او لائحته التنفيذية وجب اعداد ذلك من قبل لجنة مشكلة من الجهات المعنية بهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
- article_ref: المادة 69
  article_text_ar: يصدر مجلس الوزراء اللائحة التنفيذية المنصوص عليها في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9b461caf-dc11-46bd-a8fd-ac74009a8724/1
  verified: false
