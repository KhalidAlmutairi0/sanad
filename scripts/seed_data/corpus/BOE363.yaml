regulation:
  code: BOE363
  name_ar: تنظيم الهيئة العامة للاستثمار
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات التالية المعاني المبينة أمام كل منها ما لم يقتضِ السياق خلاف ذلك : المجلس : المجلس الاقتصادي الأعلى . الرئيس : رئيس المجلس الاقتصادي الأعلى . مجلس الإدارة : مجلس إدارة الهيئة العامة للاستثمار الهيئة : الهيئة العامة للاستثمار . المحافظ : محافظ الهيئة العامة للاستثمار . اللائحة : اللائحة التنفيذية لهذا التنظيم'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنشأ بموجب هذا التنظيم هيئة عامة تسمى "الهيئة العامة للاستثمار" تتمتع بالشخصية الاعتبارية وترتبط بالرئيس، ويكون مقرها الرئيس مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'الغرض الأساسي للهيئة هو العناية بشؤون الاستثمار في المملكة بما في ذلك الاستثمار الأجنبي، ويشمل ذلك دون تحديد لاختصاصاتها، القيام بما يأتي : 1 - إعداد سياسات الدولة في مجال تنمية وزيادة الاستثمار المحلي والأجنبي ورفعها إلى المجلس. 2 - اقتراح الخطط التنفيذية والقواعد الكفيلة بتهيئة مناخ الاستثمار في المملكة ورفعها إلى المجلس. 3 - متابعة وتقييم أداء الاستثمار المحلي والأجنبي وإعداد تقرير دوري بذلك وتُحدد اللائحة عناصر التقرير. 4 - إعداد الدراسات عن فرص الاستثمار في المملكة والترويج له. 5 - التنسيق والعمل مع الجهات الحكومية ذات العلاقة بما يُمكن الهيئة من أداء مهامها. 6 - تنظيم المؤتمرات والندوات والمعارض الداخلية والخارجية والفعاليات المتعلقة بالاستثمار وإقامتها والمشاركة فيها. 7 - تطوير قواعد المعلومات وإجراء المسوحات الإحصائية اللازمة لمباشرة اختصاصاتها. 8 - أي مهام تسند إلى الهيئة نظاما'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يشكل مجلس إدارة الهيئة على النحو التالي :'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'مجلس الإدارة هو السلطة المهيمنة على شؤون الهيئة وتصريف أمورها، واتخاذ جميع القرارات اللازمة لتحقيق أغراضها في حدود أحكام هذا التنظيم، وله على وجه الخصوص ما يلي : 1 - البت في طلبات الاستثمار وإلغائها. 2 - اقتراح قائمة بأنواع النشاط المستثنى من الاستثمار الأجنبي ورفعها إلى المجلس. 3 - اعتماد اللوائح الداخلية والمالية والإدارية والهيكل التنظيمي للهيئة بما يكفل انتظام سير أعمالها. 4 - الإشراف على أعمال الهيئة الإدارية والمالية ومراجعتها. 5 - إقرار مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراقب الحسابات والتقرير السنوي تمهيدا لرفع ذلك حسب النظام. 6 - تشكيل اللجان من أعضاء مجلس الإدارة ومن غيرهم لممارسة المهام الموكلة إلى الهيئة وفقا لما يراه مجلس الإدارة. 7 - النظر فيما يرفع إليه من المحافظ واللجان التي يُشكلها مجلس الإدارة. 8 - اقتراح تعديل هذا التنظيم والأنظمة الأخرى ذات العلاقة بالاستثمار. 9 - تفويض المسئولين عن إدارة الهيئة في إبرام الاتفاقات والعقود بأنواعها في حدود القواعد التي يضعها مجلس الإدارة. 10 - إقرار خطة عمل الهيئة وخططها التشغيلية. 11 - قبول التبرعات والهبات
    والمنح والإعانات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع مجلس الإدارة بدعوة من المحافظ مرة كل شهر على الأقل، وعلى المحافظ دعوة مجلس الإدارة إذا طلب ذلك نصف الأعضاء على الأقل، ويجب أن تشتمل الدعوة على جدول الأعمال، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم رئيس مجلس الإدارة أو من ينيبه من الأعضاء، وتصدر القرارات بأغلبية أصوات الحاضرين وفي حالة تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الجلسة، ولمجلس الإدارة أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت، وتثبت مداولات مجلس الإدارة وقراراته في محاضر يوقعها رئيس الجلسة والأعضاء الحاضرون. ولا يجوز لمجلس الإدارة أن يصدر قرارات بطريق عرضها على الأعضاء متفرقين إلا في حالة الضرورة، ويشترط عندئذ موافقة جميع أعضاء مجلس الإدارة على القرارات كتابة وتعرض هذه القرارات على مجلس الإدارة في أول اجتماع لاحق لإثباتها في محضر الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للهيئة محافظ بمرتبة وزير يعين بأمر ملكي بناءً على اقتراح الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون المحافظ هو المسؤول التنفيذي عن إدارة الهيئة وتسيير أعمالها وتتركز مسؤولياته في حدود ما ينص عليه هذا التنظيم، وما يقرره مجلس الإدارة، ويمارس الاختصاصات الآتية: 1 - الإشراف على الإعداد لاجتماعات مجلس الإدارة. 2 - متابعة تنفيذ قرارات مجلس الإدارة. 3 - إعداد مشروع ميزانية الهيئة ومشروع الحساب الختامي والتقرير السنوي تمهيدا لعرض ذلك على مجلس الإدارة. 4 - الإشراف على موظفي الهيئة ومستخدميها وعمالها طبقا للصلاحيات الممنوحة له وما تحدده اللوائح. 5 - إصدار أوامر بالمصروفات الخاصة بالهيئة بموجب الميزانية السنوية المعتمدة. 6 - تقديم تقارير دورية إلى مجلس الإدارة عن أعمال الهيئة ومنجزاتها ونشاطاتها. 7 - اقتراح خطط وبرامج الهيئة والإشراف على تنفيذها بعد الموافقة عليها من مجلس الإدارة. 8 - تمثيل الهيئة أمام الجهات الحكومية الأخرى وغيرها.وللمحافظ تفويض بعض هذه الاختصاصات إلى غيره من المسؤولين عن إدارة الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1 - يؤسس بالهيئة مركز الخدمة الشاملة يحوي مكاتب اتصال تضم ممثلين متفرغين لجميع الدوائر الحكومية ذات العلاقة بالاستثمار كوزارات الداخلية (المديرية العامة للجوازات، الإدارة العامة لشئون الاستقدام) والخارجية، والتجارة، والصناعة والكهرباء، والمالية والاقتصاد الوطني (مصلحة الزكاة والدخل ، صندوق التنمية الصناعية السعودي)، والزراعة والمياه، والعمل والشؤون الاجتماعية (مكتب العمل والعمال)، والبترول والثروة المعدنية. وللمجلس تعديل الجهات المذكورة في هذا التنظيم بناءً على اقتراح من مجلس الإدارة
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يكون للهيئة ميزانية مستقلة تصدر وفقا لترتيبات إصدار الميزانية العامة للدولة، وتتكون أموال الهيئة من: 1 - الاعتمادات التي تخصص لها في ميزانية الدولة . 2 - الدخل الذي تحققه الهيئة من ممارسة النشاط الذي يدخل ضمن أغراضها. 3 - أية أموال أخرى يقرر مجلس الإدارة قبولها كالتبرعات والهبات والمنح والإعانات . 4- جميع الأموال المنقولة وغير المنقولة التي تؤول إليها من الدار السعودية للخدمات الاستشارية. وتوضع أموال الهيئة في حساب مستقل، ويتم الصرف منها وفق اللائحة المالية للهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة، واستثناء من ذلك تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة، يعين مجلس الإدارة مراقبًا أو أكثر للحسابات من الأشخاص الطبيعيين أو الاعتباريين المرخص لهم بالعمل في المملكة ويحدد أتعابهم، وإذا تعدد مراقبو الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة، ويرفع تقرير مراقب الحسابات إلى مجلس الإدارة، ويُزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يُصدر مجلس الإدارة اللائحة خلال ثلاثين يومًا من تاريخ صدور هذا التنظيم، وتُنشر في الجريدة الرسمية، ويُعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يُنشر هذا التنظيم في الجريدة الرسمية ويُعمل به بعد ثلاثين يومًا من تاريخ نشره ويُلغى كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c47e6347-4d53-4a50-b92d-a9a700f1a76d/1
  verified: false
