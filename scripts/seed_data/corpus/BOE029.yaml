- article_ref: المادة رقم (1)
  article_text_ar: يسمى هذا النظام " نظام الجنسية العربية السعودية ".
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (2)
  article_text_ar: ليس لهذا النظام أثر رجعي وتعتبر جميع القرارات والإجراءات الصحيحة التي تمت بموجب الأنظمة السابقة نافذة كما تعتبر الجنسيات التي منحت استناداً إلى تلك النظم قائمة ما دامت مستندة إلى صحة الإجراء والثبوت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (3)
  article_text_ar: 'الألفاظ الآتية تؤدي في هذا النظام المعاني الآتية: أ- السعودي هو من كان تابعا لحكومة حضرة صاحب الجلالة الملك المعظم طبقا لأحكام هذا النظام. ب- السعودي بالتجنس هو من اكتسب الجنسية العربية السعودية بمقتضى أحكامها الخاصة. جـ- الأجنبي هو غير السعودي. د- القاصر هو الصغير والمجنون والمعتوه. هـ- سن الرشد ما نصت عليه أحكام الشرع الشريف. و- المملكة العربية السعودية تشمل الأراضي والمياه والطبقات الجوية الخاضعة للسيادة العربية السعودية كما تشمل السفن والطائرات التي تحمل العلم العربي السعودي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (4)
  article_text_ar: 'السعوديون هم: أ- من كانت تابعيته عثمانية عام 1332 هجرية الموافق 1914م من سكان أراضي المملكة العربية السعودية الأصليين. ب- الرعايا العثمانيون المولودون في أراضي المملكة العربية السعودية أو المقيمون فيها عام 1332هـ 1914م الذين حافظوا على إقامتهم في تلك الأراضي إلى 22 / 3 / 1345هـ ولم يكتسبوا جنسية أجنبية قبل هذا التاريخ. جـ- من كان من غير الرعايا العثمانيين مقيما في أراضي المملكة العربية السعودية عام 1332هـ 1914م وحافظ على إقامته فيها إلى 22 / 3 / 1345هـ ولم يكتسب جنسية أجنبية قبل هذا التاريخ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (5)
  article_text_ar: يسري حكم الفقرة (أ) من المادة الرابعة على النسوة من سكان المملكة العربية السعودية الأصليين اللاتي يتقدمن بطلب استرداد الجنسية العربية السعودية بعد طلاقهن أو وفاة أزواجهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (6)
  article_text_ar: لا تقبل طلبات بإعطاء شهادات بالجنسية العربية السعودية من الأشخاص الذين ينطبق عليهم حكم الفقرتين (ب، جـ) من المادة الرابعة بعد مضي سنة من تاريخ العمل بهذا النظام وبالنسبة للقاصر بعد مضي سنة من بلوغه سن الرشد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (7)
  article_text_ar: يكون سعوديا من ولد داخل المملكة العربية السعودية أو خارجها لأب سعودي أو لأم سعودية وأب مجهول الجنسية أو لا جنسية له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (8)
  article_text_ar: 'يعتبر أجنبيا من ولد في المملكة العربية السعودية عن أبوين أجنبيين أو من أب أجنبي وأم سعودية ومن ولد في الخارج لأب أجنبي معروف الجنسية وأم سعودية، ومع ذلك يكون لهذا المولود عند بلوغه سن الرشد الحق في اختيار الجنسية العربية السعودية إذا توفرت فيه الشروط الآتية: أ - أن تكون له صفة الإقامة الدائمة في المملكة العربية السعودية عند بلوغه سن الرشد . ب - أن يكون حسن السيرة والسلوك ولم يسبق الحكم عليه بحكم جنائي أو بعقوبة السجن لجريمة أخلاقية لمدة تزيد عن ستة شهور. جـ - أن يكون ملما باللغة العربية. د - أن يقدم خلال السنة بعد بلوغه سن الرشد طلبا بمنحه الجنسية العربية السعودية، أما المجنون والمعتوه فكل منهما يتبع أباه في رعويته إذا كان الأب على قيد الحياة وفي حالة وفاته فللمقيم الشرعي على كل منهما أن يختار له الجنسية العربية السعودية بعد استكمال الشروط السابقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (9)
  article_text_ar: 'يجوز منح الجنسية العربية السعودية للأجنبي الذي تتوفر فيه الشروط الآتية: أن يكون عند تقديم الطلب قد بلغ سن الرشد . أن يكون غير معتوه أو مجنون. أن يكون حين تقديم الطلب: أ - قد اكتسب صفة الإقامة الدائمة العادية في المملكة العربية السعودية بمقتضى أحكام نظامها الخاص لمدة لا تقل عن خمس سنوات متواليات. ب - أن يكون حسن السير والسلوك. جـ - أن لا يكون قد صدر عليه حكم قضائي بالسجن لجريمة أخلاقية لمدة تزيد عن ستة شهور. د – أن يثبت ارتزاقه بطريق مشروعة. ويشفع طالب التجنس بطلبه تصريح الإقامة الدائمة وجواز سفره القانوني أو أية وثيقة تعتبرها السلطات المختصة قائمة مقام الجواز القانوني وكل وثيقة تتعلق بالجنسية التي ينسلخ منها وبكل ورقة تؤيد ما هو مطالب بإثباته بمقتضى أحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (10)
  article_text_ar: تمنح الجنسية العربية السعودية من قبل رئيس مجلس الوزراء بناء على اقتراح وزير الداخلية، ولوزير الداخلية في جميع الأحوال وبدون إبداء الأسباب الحق في رفض الموافقة على منح الجنسية العربية السعودية للأجنبي الذي تتوفر فيه الشروط المنصوص عليها في المادة التاسعة قبل تقديمه الاقتراح المذكور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (11)
  article_text_ar: لا يجوز لسعودي أن يتجنس بجنسية أجنبية دون إذن سابق من رئيس مجلس الوزراء، والسعودي الذي يتجنس بجنسية أجنبية قبيل الحصول مقدما على هذا الإذن يظل معتبرا سعوديا إلا إذا رأت حكومة جلالة الملك إسقاط الجنسية العربية السعودية عنه تطبيقا لحكم المادة (13).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (12)
  article_text_ar: يترتب على تجنس السعودي بجنسية أجنبية متى أذن له في ذلك أن تفقد زوجته الجنسية السعودية إذا كانت تدخل في جنسية زوجها بمقتضى القانون الخاص بهذه الجنسية الجديدة إلا إذا قررت خلال سنة من تاريخ دخول زوجها في هذه الجنسية أنها ترغب في الاحتفاظ بجنسيتها العربية السعودية. أما الأولاد القصر فيفقدون الجنسية العربية السعودية إذا كانوا بحكم تغيير جنسية أبيهم يدخلون في جنسيته بمقتضى القانون الخاص بهذه الجنسية الجديدة على أنه يكون لهم الحق في استرداد الجنسية العربية السعودية خلال السنة التالية لبلوغهم سن الرشد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (13)
  article_text_ar: 'يجوز بمرسوم مسبب إسقاط الجنسية العربية السعودية عن أي سعودي في أية حالة من الحالات الآتية: أ- إذا دخل في جنسية أخرى مخالفاً مقتضى المادة (11) من هذا النظام. ب- إذا عمل في القوة المسلحة لإحدى الحكومات الأجنبية بدون موافقة سابقة من حكومة جلالة الملك. جـ- إذا عمل لمصلحة دولة أو حكومة أجنبية وهي في حالة حرب مع المملكة العربية السعودية. د- إذا قبل وظيفة لدى حكومة أجنبية أو هيئة دولية وبقي فيها بالرغم من الأمر الذي صدر إليه من حكومة جلالة الملك بتركها. في جميع الأحول المنصوص عليها في الفقرة (أ) (ب) (جـ) (د) من هذه المادة يجب إنذار السعودي بعواقب عمله إنذارا صحيحا سابقا لمدة ثلاثة شهور على الأقل لتاريخ مرسوم إسقاط الجنسية العربية السعودية عنه، وفي جميع الأحوال التي تسقط فيها الجنسية العربية السعودية بمقتضى أحكام هذه المادة تجرى تصفية أملاك الشخص الذي أسقطت جنسيته وفقا لنظام تملك العقار كما يجوز حرمانه من الإقامة في أراضي المملكة العربية السعودية أو العودة إليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (14)
  article_text_ar: يترتب على اكتساب الأجنبي الجنسية العربية السعودية أن تصبح زوجته عربية سعودية ما لم تقرر خلال سنة من دخول زوجها في الجنسية العربية السعودية أنها ترغب في الاحتفاظ بجنسيتها الأصلية، أما الأولاد الذين لم يبلغوا سن الرشد فإن كانت إقامتهم بالمملكة العربية السعودية فيعتبرون سعوديين على أن لهم حق اختيار جنسية والدهم الأصلية خلال سنة من تاريخ بلوغهم سن الرشد أما إذا كانت إقامتهم خارج المملكة فيعتبرون أجانب ولهم حق اختيار جنسية والدهم العربية السعودية خلال سنة من تاريخ بلوغهم سن الرشد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (15)
  article_text_ar: كل من يتبع المتجنس من النسوة اللاتي له عليهن حق الولاية الشرعية بموجب وثيقة شرعية فله أن يتقدم بطلب مستقل باسم كل منهن لمنحهن الجنسية العربية السعودية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (16)
  article_text_ar: تكسب المرأة الأجنبية بالزواج جنسية زوجها السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (17)
  article_text_ar: مع مراعاة ما جاء في المادتين (132) و (133) من نظام المرافعات الشرعية لا تفقد المرأة العربية السعودية جنسيتها إذا تزوجت بأجنبي إلا إذا سمح لها بالخروج مع زوجها خارج المملكة (وذلك طبق نظامه المخصوص) ثم قررت وأعلنت التحاقها بجنسية زوجها ودخلت في هذه الجنسية بحكم القانون الخاص بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (18)
  article_text_ar: يحق للمرأة العربية السعودية المتزوجة بأجنبي أن تسترد جنسيتها العربية السعودية عند انتهاء الزوجية بعد عودتها للإقامة في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (19)
  article_text_ar: تسري الأحكام الآتية على زوجات وأولاد من تسقط عنهم الجنسية العربية السعودية . أ- زوجة من تسقط عنه الجنسية العربية بمقتضى المادة (13) يكون لها حق اختيار جنسية زوجها الجديد أو البقاء على جنسيتها السعودية ولها حالة انتهاء الزوجية أن تسترد جنسيتها السعودية إذا كانت قد اختارت جنسية زوجها من قبل وأما أولاده الصغار إذا كانوا مقيمين في غير أراضي المملكة العربية السعودية لهم الحق حين بلوغهم سن الرشد في اختيار الجنسية العربية السعودية بدون قيد ولا شرط كما يخولون كافة الحقوق التي للسعوديين بدون استثناء. ب- لا يترتب على سقوط الجنسية العربية السعودية عن شخص ما تطبيقا لأحكام المادة (11) سقوطها عن زوجته وأولاده أو من كان يتمتع بها من ذويه بطريقة التبعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (20)
  article_text_ar: كل من أقام المدة المقررة لمنح الجنسية السعودية وقدم طلب للتجنس ثم خرج من المملكة بجواز حكومته الأصلية قبل منحه الجنسية العربية السعودية وغاب عن البلاد مدة تزيد عن سنة تعتبر المدة التي سبق له أن أقامها كأنها لم تكن، أما من سافر بعد انتهاء المدة المقررة دون أن يتقدم بطلب الجنسية العربية السعودية فإنه يسقط حقه في طلب الجنسية إذا زادت غيبته عن مدة تأشيرة العودة وأقصاها ستة أشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (21)
  article_text_ar: 'يجوز بمرسوم مسبب بناء على طلب وزير الداخلية سحب الجنسية العربية السعودية من كل من تجنس بها طبقا لأحكام المواد (8، 9، 10) من هذا النظام خلال السنوات الخمس الأولى من تجنسه في الحالتين الاثنتين: أ - إذا حكم عليه بحكم جنائي أو عوقب بالسجن لجريمة أخلاقية لمدة تزيد عن سنة. ب - إذا ثبت لقيامه أو اشتراكه في أي عمل يخل بالأمن العام في المملكة أو ثبت عنه صدور ما يجعله من غير المرغوب فيهم في البلاد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (22)
  article_text_ar: يجوز بمرسوم بناء على اقتراح وزير الداخلية وموافقة رئيس مجلس الوزراء سحب الجنسية العربية السعودية من المتجنس بها في أي وقت إذا ثبت أنه قد حصل عليها بناء على أقوال كاذبة أو بطريق الغش أو الخطأ أو بالتزوير أو التزييف في الشهود أو الوثائق أو المستندات أو البيانات التي قدمها للدخول فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (23)
  article_text_ar: يترتب على سحب الجنسية العربية السعودية من المتجنس بها زوال هذه الجنسية عن صاحبها وسحبها أيضا ممن كان قد كسبها مع المتجنس بطريق التبعية فإذا ثبت أن من اكتسبها بالتبعية من ذوي الأخلاق الحسنة وثبت عدم وجود ما يمنع منحه الجنسية فتمنح له مع احتساب المدة الماضية له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (24)
  article_text_ar: وزارة الداخلية هي الجهة صاحبة الاختصاص الأصلي في تنفيذ هذا القانون والإقرارات والإعلانات والأوراق والطلبات المنصوص عليها في هذا النظام، يجب أن توجه إلى وزير الداخلية بطريق الإعلان الرسمي أو بموجب إيصال إلى الموظف المختص في الدائرة التابع لها محل إقامة صاحب الشأن، وفي الخارج تسلم للممثلين السياسيين لحكومة جلالة الملك أو إلى قناصلها. ويجوز بقرار من وزير الداخلية أن يرخص لأي موظف آخر في تسلم هذه الإقرارات والإعلانات والطلبات والأوراق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (25)
  article_text_ar: جميع المراسيم والقرارات الخاصة بكسب الجنسية العربية السعودية أو بسحبها أو بإسقاطها أو باستردادها تعتبر نافذة من تاريخ نشرها في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (26)
  article_text_ar: مع عدم الإخلال بأية عقوبة أخرى أشد يعاقب بالحبس مدة لا تتجاوز سنتين أو بغرامة لا تتجاوز ألف ريال عربي سعودي كل من أبدى أمام السلطة المختصة بقصد إثبات الجنسية العربية السعودية له أو لغيره أو بقصد نفيها عنه وعن غيره أقوالا كاذبة أو قدم إليها أوراقا غير صحيحة مع علمه بذلك وتصدر الموافقة بقرار مسبب من وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (27)
  article_text_ar: يصدر وزير الداخلية القرارات اللازمة لتنفيذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (28)
  article_text_ar: يلغي هذا النظام نظام الجنسية العربية السعودية الذي صدرت الإرادة الملكية السنية رقم 7 / 1 / 47 في تاريخ 13 شوال 1357هـ بالموافقة عليه، وما سبقه ومن نظم خاصة بالتابعية الحجازية أو بالتابعية الحجازية النجدية، كما يلغي أحكام النظم الأخرى المخالفة لأحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (29)
  article_text_ar: لا يحق لغير جلالة الملك منح الجنسية لمن لا تتوفر لديه الشرائط المنصوص عليها في المادة (9) وكذلك إسقاط الجنسية عن أي سعودي لا تنطبق عليه الأحكام المدرجة في المادة (13) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
- article_ref: المادة رقم (30)
  article_text_ar: يعتبر هذا النظام نافذا المفعول من تاريخ تصديقة ونشرة في الجريدة الرسمية. ولما ذكر حـــــــــــــرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d9f183b6-3afc-4405-834f-a9a700f18571/1
  verified: false
