articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات الآتية -أينما وردت في هذه الترتيبات التنظيمية- المعاني المبينة أمامها، ما لم يقتضِ السياق غير ذلك: الهيئة: الهيئة العامة للأمن الغذائي. الترتيبات التنظيمية: الترتيبات التنظيمية للهيئة. الوزير: وزير البيئة والمياه والزراعة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. المحافظ: محافظ الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة، وبالاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض. ولها -عند الحاجة- إنشاء فروع أو مكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنظيم الأمن الغذائي وتطويره وتعزيزه، بما يكفل حماية المصالح الحيوية للدولة وأمنها الوطني، ومراقبة الالتزام بالأنظمة والخطط الصادرة بشأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة -دون إخلال باختصاصات الجهات الأخرى- القيام بكل ما يلزم لتحقيق أهدافها، ومن ذلك ما يأتي: اقتراح مشروعات الأنظمة واللوائح ذات الصلة باختصاصاتها، واقتراح تعديل النافذ منها، والرفع عما يتطلب اتخاذ إجراءات نظامية في شأنه. مراجعة استراتيجية الأمن الغذائي، وتطويرها وتحديثها متى ما لزم الأمر، وإعداد خطة تنفيذها، وذلك بالتنسيق مع الجهات المعنية، والرفع عما يتطلب اتخاذ إجراءات نظامية في شأنه. التنسيق مع جميع الجهات المعنية بمنظومة الأمن الغذائي، لتنظيم الجهود ذات الصلة بالمنظومة. العمل على توفير البيئة الاستثمارية الملائمة للقطاع الغذائي بما يعزز من الأمن الغذائي، وذلك بالتنسيق مع الجهات المعنية. تصميم نظام للإنذار المبكر للأمن الغذائي بالتنسيق مع الجهات المعنية، والرفع عما يتطلب استكمال إجراءات نظامية في شأنه. وضع خطط للاستجابة للطوارئ المتعلقة بمنظومة الأمن الغذائي والتعافي منها، وتحديثها، وذلك بالتنسيق مع الجهات المعنية. وضع خطط الخزن الاستراتيجي ذات الصلة بمنظومة الأمن الغذائي بالتنسيق مع الجهات المعنية، والرفع عما يلزم استكمال إجراءات نظامية في شأنه. وضع المعايير والإجراءات
    والنماذج ذات الصلة بمجالات الأمن الغذائي. وضع الضوابط والاشتراطات اللازمة، لما تصدره من تراخيص وفقاً لاختصاصها. إصدار التراخيص لمرافق تخزين السلع المستهدفة بخطط الخزن الاستراتيجي المتصلة بمنظومة الأمن الغذائي. قياس مستويات الفقد والهدر الغذائي، وتحديد مستهدفات الحد منها، وذلك بالتنسيق مع الجهات المعنية. وضع برامج توعية للحد من الفقد والهدر الغذائي بالتنسيق مع الجهات المعنية، ومتابعة تنفيذها. وضع خطة شاملة لبناء القدرات ذات الصلة بمنظومة الأمن الغذائي، بالتنسيق مع الجهات المعنية. متابعة الامتثال للأنظمة والتشريعات ذات الصلة بمنظومة الأمن الغذائي، واتخاذ الإجراءات اللازمة بالتنسيق مع الجهات المعنية حيال ما يرصد من مخالفات لتلك الأنظمة والتشريعات. رصد البيانات اللازمة لدعم التحليلات والكشف الاستباقي للأزمات المتعلقة بمنظومة الأمن الغذائي وجمعها، واتخاذ الإجراءات اللازمة حيالها بما يضمن تفادي تلك الأزمات. مراقبة السلع المستهدفة بخطط الخزن الاستراتيجي المتصلة بمنظومة الأمن الغذائي المخزنة لدى القطاع الخاص، وآليات تدويرها واستخدامها، واتخاذ ما يلزم من إجراءات حيال ما ترصده الهيئة في هذا الشأن.
    إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة بمجالات الأمن الغذائي مع الجهات المعنية داخل المملكة وخارجها، وفقاً للإجراءات النظامية المتبعة. عقد المؤتمرات والندوات وجلسات العمل ذات الصلة بمجالات الأمن الغذائي، والاشتراك فيها داخل المملكة وخارجها، وفقاً للإجراءات النظامية المتبعة. دعم البحوث والدراسات، وإجراؤها في مجالات الأمن الغذائي، سواء بشكل منفرد أو بالاشتراك مع الجهات ذات العلاقة. تمثيل المملكة -إقليميًّا ودوليًّا- في حدود مجالات الأمن الغذائي، وفقاً للإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير وعضوية كل من: أ- المحافظ. ب- ممثل من وزارة البيئة والمياه والزراعة. ج- ممثل من وزارة المالية. د- ممثل من وزارة التجارة. هـ- ممثل من وزارة الداخلية. و- ممثل من مجلس المخاطر الوطنية. ز- ممثل من الهيئة العامة للغذاء والدواء. ح- ممثلَين من القطاع الخاص، من ذوي الخبرة والاختصاص بمجال عمل الهيئة، يعينان بأمر من رئيس مجلس الوزراء بناء على ترشيح من الوزير. لا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن (الخامسة عشرة) أو ما يعادلها. فيما عدا الرئيس والمحافظ، تكون مدة العضوية في المجلس (ثلاث) سنوات، قابلة للتجديد لمرة واحدة. يختار الرئيس نائباً له من أعضاء المجلس ممثلي الجهات الحكومية عدا المحافظ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على شؤون الهيئة، وإدارتها وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود أحكام الترتيبات التنظيمية، وله على وجه خاص ما يأتي: إقرار السياسات العامة للهيئة، واستراتيجياتها، وخططها، وبرامجها. إقرار الأطر والقواعد والمعايير والضوابط ومؤشرات قياس الأداء، ذات الصلة بأعمال الهيئة. تحديد المقابل المالي للتراخيص والأعمال والأنشطة والخدمات التي تقدمها. إقرار الهيكل التنظيمي للهيئة.إقرار اللوائح المالية واللوائح الإدارية التي تسير عليها الهيئة، بالاتفاق مع وزارة المالية فيما يتعلق باللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية، وبالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية فيما يتعلق باللوائح الإدارية. إقرار اللوائح الداخلية الأخرى التي تسير عليها الهيئة. الموافقة على مشروع ميزانية الهيئة، وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية. تعيين مراجع حسابات خارجي (أو أكثر) معتمد، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، بحسب الإجراءات
    النظامية المتبعة. الموافقة على إنشاء فروع ومكاتب للهيئة داخل المملكة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف والهدايا، التي تقدم للهيئة وفقًا للأحكام المنظمة لذلك. النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة، واتخاذ القرارات اللازمة في شأنها. عقد المؤتمرات والندوات واللقاءات ذات العلاقة بأهداف الهيئة، وفقاً للإجراءات النظامية المتبعة. للمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه مناسباً من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض صلاحياته إلى رئيسه أو من يراه من أعضاء المجلس أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس -بصفة دورية- بما لا يقل عن ثلاثة اجتماعات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس أو نائبه، أو إذا طلب ذلك ثلث أعضائه على الأقل. توجه الدعوة إلى الاجتماع من الرئيس أو نائبه -كتابةً- قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. تعقد اجتماعات المجلس في مقر الهيئة الرئيس. ويجوز -بقرار من الرئيس- عقد الاجتماع في أي مكان آخر داخل المملكة. يشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. لا يجوز لأي عضو الامتناع عن التصويت، ولا تفويض غيره بالتصويت نيابةً عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. وللعضو تسجيل اعتراضه مسبباً في محضر اجتماع المجلس. للرئيس أو نائبه دعوة من يراه من أهل الاختصاص والخبرة لحضور اجتماعات المجلس، وتقديم المعلومات والرأي والمشورة، دون أن يكون له حق التصويت. يجوز -عند الحاجة ووفقاً لما يقدره الرئيس- أن تُعقد الاجتماعات
    وأن يُصوّت عليها عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ القرارات بطريق التمرير على الأعضاء، ويُوقع عليها بما يفيد باطلاع جميع الأعضاء عليها، ولا تُعدُّ القرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرر على جميع الأعضاء، ويُصوّت عليها من جميع الأعضاء، وتحز على أغلبية أصواتهم. يكون للمجلس أمين من منسوبي الهيئة يختاره رئيس المجلس بناء على ترشيح المحافظ، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات، ويحضر اجتماعات المجلس دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمؤسسة محافظ بالمرتبة الممتازة، يُعين بناءً على ترشيح من الوزير، ويعد المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود ما تنص عليه الترتيبات التنظيمية وما يقرره المجلس، ويتولى الاختصاصات الآتية: اقتراح سياسات الهيئة العامة، واستراتيجياتها، وخططها وبرامجها، ورفعها إلى المجلس لإقرارها، ومتابعة تنفيذها بعد إقرارها. اقتراح الأطر والقواعد والمعايير والضوابط ومؤشرات قياس الأداء، ذات الصلة بأعمال الهيئة، ورفعها إلى المجلس لإقرارها. اقتراح الهيكل التنظيمي للهيئة، ولوائحها الإدارية والمالية والداخلية، ورفعها إلى المجلس لإقرارها. الإشراف على سير العمل في الهيئة من خلال اللوائح والقرارات التي يقرها المجلس. الإشراف على إعداد تقرير الهيئة السنوي ومشروع ميزانيتها وحسابها الختامي؛ تمهيداً لرفعها إلى المجلس. الإشراف على إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، تمهيداً لرفعها إلى المجلس. تقديم تقارير دورية إلى المجلس عن أعمال الهيئة ومنجزاتها ونشاطاتها. تعيين العاملين في الهيئة والإشراف عليهم وفقاً للوائح الهيئة. إصدار الأوامر بمصروفات الهيئة، وفقاً للوائح الهيئة
    المالية. متابعة تنفيذ القرارات الصادرة عن المجلس. تمثيل الهيئة أمام القضاء، والجهات الحكومية والمؤسسات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة، وله تفويض غيره بذلك. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في الترتيبات التنظيمية، واللوائح، بحسب الصلاحيات المخولة له من المجلس. التعاقد مع المكاتب الاستشارية وبيوت الخبرة والخبراء، في حدود نشاط الهيئة، ووفقاً لما تحدده لوائح الهيئة. أي اختصاص آخر يسنده إليه المجلس. وللمحافظ تفويض بعض اختصاصاته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتألف موارد الهيئة المالية من الآتي: أ- الاعتمادات التي تخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه عن التراخيص والخدمات والأعمال التي تقدمها. ج- عوائد استثمارات الموارد المالية والأصول المتاحة للهيئة. د- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف، وفقًا للأحكام المنظمة لذلك. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية لدى البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي. ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للهيئة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو الهيئة -ما عدا المحافظ- لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية تقريرًا سنويًّا عما حققته من إنجازات، وما واجهها من صعوبات، وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وميزانياتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تحل هذه الترتيبات التنظيمية محل تنظيم المؤسسة العامة للحبوب، الصادر بقرار مجلس الوزراء رقم (328) وتاريخ 2 / 8 / 1437هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تنشر هذه الترتيبات التنظيمية في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/aac8d59d-b423-4890-89f1-af9900a57ca3/1
  verified: false
