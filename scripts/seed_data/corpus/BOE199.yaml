regulation:
  code: BOE199
  name_ar: نظام جمعية الكشافة العربية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ التالية المعاني المُبينة إزاءها: - الجمعية: جمعية الكشافة العربية السعوديِّة . - المجلِس: مجلِس إدارة الجمعية، المُكون وفقًا للمادة الثامنة من هذا النِظام. - الرئيس: رئيس مجلِس إدارة الجمعية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: جمعية الكشافة العربية السعودية هيئة ذات شخصية اعتبارية، ومقرُها الرئيسي في مدينة الرياض، ويجوز إنشاء فروع ومكاتِب للجمعية في أنحاء المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الجمعية إلى نشر الحركة الكشفية وتشجيعها وتنظيمِها في أنحاء المملكة، والمُساهمة في تهيئة النشء، وتوجيه الشباب وإعدادُهم خُلُقيًّا وثقافيًّا واجتِماعيًّا، وتنمية شعورِهم بالواجِب نحو الله جل شأنُه ثم الملِك والوطن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: ترعى حكومة المملكة العربية السعودية الجمعية وتدعم الحركة الكشفية بالبِلاد وتُساعِدها ماليًّا ومعنويًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تُشرف جمعية الكشافة العربية السعودية على الحركة الكشفية في المملكة وفق الأنظِمة المرعية في البِلاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لا يجوز للجمعية الاشتِغال بالأمور السياسية أو التِجارية أو في أية أمور أُخرى، تتعارض مع أهداف الحركة الكشفية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تقوم الجمعية بالمهام اللازِمة لتحقيق أهدافِها في نِطاق مبادئ وقواعِد وتعاليم الأنظِمة الكشفية العربية والعالمية، وبمُراعاة واقِع البِلاد التاريخي والاجتِماعي والثقافي، وفي ضوء تعاليم الإسلام الحنيف. وتتولى بوجه خاص ما يلي: أ - نشر الحركة الكشفية في أنحاء المملكة وتطويرها لكي تُساهِم في تنمية المُجتمع وبِناء المواطِن الصالِح.ب - رسم الخطة العامة للحركة الكشفية في المملكة.ج - تنظيم الاشتراك في المؤتمرات والندوات والدورات والمخيمات العربية والإسلامية والدولية، والإشراف على إعداد البعثات الكشفية التي تُمثل المملكة في مُختلف أوجه النشاط الكشفي في المُحيط العربي والإسلامي والدولي.د - الإشراف على النشاط الكشفي ولقاءاته العامة في المملكة.هـ - منح الأوسِمة الكشفية لِمن يدعمون الحركة الكشفية.و - الاشتراك مع الجهات المختصة- متى دعت الحاجة- في أعمال الحج وخِدمة الحُجاج وتنظيم أسابيع المرور والمُناسبات الأُخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: للجمعية وحدها حق تسجيل أي جماعة أو هيئة حُكومية أو أهلية، والسماح لها بمُمارسة النشاط الكشفي، ولا يجوز لفرد أو جماعة أن تنتحِل أية صِفة كشفية، كما لا يجوز استِخدام اسم الجمعية في أي عمل أو مشروع بدون تصريح منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تتقيد الفرق الكشفية المُسجلة في الجمعية، بالأنظِمة واللوائِح الصادِرة عنها، والمُنظمة لأوجه النشاط المُختلِفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تعتمد الجمعية الشارات التي تُميزها وشعاراتها وأعلامها وعلاماتها المُميزة، ولا يجوز تقليدُها أو تزييفُها، وتُطبَّق على من زيف أو زور شيئًا مِنها عقوبات التزييف أو التزوير المنصوص عليها في الأنظِمة المرعية في البِلاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يتولى شؤون الجمعية وتصريف أمورِها ورسم سياستِها مجلِس إدارة يتألف مِن: أ - وزير المعارِف رئيساً.ب - ثمانية أعضاء من المُهتمين بالحركة الكشفية، يتم اختيارُهم لِمُدة خمس سنوات باقتِراح من الرئيس وموافقة رئيس مجلِس الوزراء . ويُسمي الرئيس من بين الأعضاء نائب الرئيس، وأمين السر العام، وأمين الصندوق، ومفوض العلاقات الخارجية.ج - لا يكون انعِقاد المجلِس صحيحًا، إلا بحضور أغلبية الأعضاء. وتُتخذ القرارات بأغلبية أصوات الحاضرين، وعند التساوي يُرجح الجانب الذي صوت معهُ الرئيس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تنتهي العضوية في مجلِس إدارة الجمعية، قبل المُدة المُحدَّدة للأسباب التالية: 1 - الاستِقالة.2 - الإقالة لأسباب يراها المجلِس.3 - التغيُّب عن حضور اجتِماعات المجلِس ثلاث جلسات مُتتالية، بدون عُذر مقبول.4 - الوفاة.ويتم ترشيح بدل العضو المُنتهية عضويتُه للأسباب المُشار إليها. ويُرفع لرئيس مجلِس الوزراء للموافقة عليه عن المُدة المُتبقية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: حق الإشراف على الجمعية وتمثيلِها أمام الجِهات القضائية والإدارية من صلاحيات الرئيس، ويجوز أن يُخوِّل بعض صلاحياتِه لنائبِه أو لأحد الأعضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يُصدِر المجلِس اللوائح الداخلية اللازِمة للجمعية، كما يُصدِر اللوائح والتعليمات الكشفية والإدارية والمالية، التي تُساعِد الجمعية على تدعيم الحركة وتقدُّمها في نِطاق أحكام هذا النِظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يكون للجمعية ميزانية سنوية تتفق في بدايتِها ونهايتِها مع ميزانية الدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'تتألف الموارِد المالية للجمعية من الآتي: أ - الاشتِراكات ورسوم التسجيل.ب - الإعانات الحكومية والتبرُعات المشروعة.ج - موارِد الجمعية الخاصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: لا يجوز للجمعية أن تنتسِب أو تنضم لأية جمعية خارِج المملكة، أو عقد أيِّ اتِفاق مع أيِّ هيئة كشفية أجنبية، إلا بإذن من رئيس مجلِس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يلغي هذا النِظام النِظام الأساسي لجمعية الكشافة العربية السعودية ، الصادِر بالمرسوم الملكي رقم (م/22) في تاريخ 19/ 4/ 1381هـ. المُعدل بالمرسوم الملكي رقم (م/42) في 13/ 7/ 1394هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يُعمل بهذا النِظام من تاريخ نشرِه في الجريدة الرسمية
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/bbfab460-8fe8-4425-9202-a9a700f27ba7/1
  verified: false
