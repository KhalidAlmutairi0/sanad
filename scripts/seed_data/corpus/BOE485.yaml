regulation:
  code: BOE485
  name_ar: الترتيبات التنظيمية للمركز الوطني لسلامة النقل
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذه الترتيبات- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: المركز: المركز الوطني لسلامة النقل. الترتيبات: الترتيبات التنظيمية للمركز. الوزير: وزير النقل والخدمات اللوجستية. الرئيس التنفيذي: الرئيس التنفيذي للمركز. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. وسائل النقل: المركبات والشاحنات والحافلات، والطائرات، والقطارات، والمركبات البحرية؛ بمختلف أنواعها، ذات الاستخدام غير العسكري أو الأمني. الحوادث الجسيمة: حوادث ووقائع مرتبطة بتشغيل وسائل النقل وينتج عنها خسائر في الأرواح أو إصابات خطيرة أو تُحدث ضرراً بالغاً في البنية التحتية أو تؤثر في سلامة النقل. التحليل الاستقصائي: عملية تُجرى لغرض عدم تكرار وقوع الحوادث الجسيمة، وتشمل جمع المعلومات وتحليلها واستخلاص النتائج بما في ذلك تحديد الأسباب والعوامل المساهمة والوصول إلى التوصيات المناسبة لتقديمها إلى الجهات الأخرى ذات العلاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية العامة، والاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير، ويكون مقره الرئيس في مدينة الرياض، وله بقرار من المجلس إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى تعزيز مستوى السلامة في منظومة النقل بكل أنماطه، من خلال نشر الوعي وثقافة السلامة بين المستفيدين داخل المنظومة وخارجها، وتقديم توصيات إرشادية مبنية على عمليات التحليل الاستقصائي وأفضل الممارسات والتجارب الدولية ذات الصلة إلى الجهات الأخرى ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للمركز في سبيل تحقيق أهدافه -دون إخلال باختصاصات الجهات الأخرى ذات العلاقة، ودون إخلال بالتزامات المملكة بموجب الاتفاقيات الدولية التي تكون طرفاً فيها- القيام بما يأتي: وضع السياسات والخطط والبرامج والمبادرات المتعلقة بسلامة النقل، بالتنسيق مع الجهات الأخرى ذات العلاقة. التحليل الاستقصائي في جميع الحوادث الجسيمة التي تقع في وسائل النقل، وهي كالآتي: أ- ما يقع للمركبات والشاحنات والحافلات في إقليم المملكة. ب- ما يقع للطائرات المدنية في إقليم المملكة، والطائرات السعودية أو التي يشغلها أشخاص يحملون الجنسية السعودية فوق أعالي البحار أو فوق الأراضي غير المملوكة لإحدى الدول، والطائرات السعودية أو التي يشغلها أشخاص يحملون الجنسية السعودية في أقاليم الدول الأخرى. ج- ما يقع للمركبات البحرية في إقليم المملكة، والمركبات البحرية التي في أعالي البحار إذا كانت ترفع علم المملكة، والمركبات البحرية التي ترفع علم المملكة في أقاليم الدول الأخرى. د- ما يقع للقطارات في إقليم المملكة. إنشاء قاعدة بيانات ومعلومات تضم جميع ما يتعلق بالحوادث الجسيمة وإحصاءاتها وما يلزم لإجراء التحليل الاستقصائي
    في المملكة بالتنسيق مع الجهات الأخرى ذات العلاقة. تسهيل الوصول إلى البيانات والمعلومات المتعلقة بالحوادث الجسيمة وما يتعلق بها إلى الجهات الأخرى ذات العلاقة. تقديم الخدمات والاستشارات ذات الصلة بأعماله إلى الجهات الحكومية وغيرها داخل المملكة وخارجها. إجراء الدراسات والأبحاث وإعداد التقارير والمؤشرات المتعلقة بسلامة النقل وتعزيزها؛ ومشاركتها مع الجهات الأخرى ذات العلاقة. استخدام وسائل التقنية في القيام بمهماته بما ينعكس على النتائج التي تهدف إلى الحفاظ على سلامة النقل. الاستفادة من الممارسات والخبرات المحلية والدولية بما يسهم في تعزيز سلامة النقل. التعاون مع الجهات الأكاديمية والمؤسسات البحثية المحلية والدولية ذات الصلة بأعماله. عقد الندوات والدورات وورش العمل التدريبية المتصلة بسلامة النقل لمنسوبيه أو الجهات الأخرى ذات العلاقة أو المستفيدين من خدماته؛ بما يسهم في تعزيز الوعي بأدوار المركز ونشر ثقافة سلامة النقل. تنظيم وإقامة المعارض والمؤتمرات ذات الصلة بسلامة النقل والمشاركة فيها؛ وفق الإجراءات النظامية المتبعة. تمثيل المملكة في الهيئات والمنظمات والمحافل والمؤتمرات المحلية والدولية
    ذات العلاقة بأدواره؛ وفق الإجراءات النظامية المتبعة وبالتنسيق مع الجهات الأخرى ذات العلاقة. أي مهمة أخرى توكل إليه بموجب الأنظمة واللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير، وعضوية كل من: الرئيس التنفيذي. ممثل من وزارة الداخلية. ممثل من وزارة الصحة. ممثل من وزارة النقل والخدمات اللوجستية. ممثل من وزارة الشؤون البلدية والقروية والإسكان. ممثل من الهيئة العامة للطيران المدني. ممثل من الهيئة العامة للنقل. ممثل من الهيئة العامة للطرق. ممثل من الهيئة العامة للموانئ. ممثل من الهيئة السعودية للمواصفات والمقاييس والجودة. ممثل من اللجنة الوزارية للسلامة المرورية. ثلاثة ممثلين من القطاع الخاص من ذوي الاختصاص في سلامة النقل، يصدر بتعيينهم أمر من رئيس مجلس الوزراء بناءً على ترشيح من الوزير، وتكون عضويتهم لمدة (ثلاث) سنوات قابلة للتجديد لمرة واحدة. ويجب ألَّا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للمركز ويختص بالإشراف عليه وتصريف أموره، وله ممارسة جميع الصلاحيات واتخاذ جميع القرارات اللازمة لتحقيق أغراضه؛ وذلك في حدود أحكام الترتيبات والصلاحيات الممنوحة له بموجب الأنظمة ذات العلاقة، وله بوجه خاص ما يأتي: اعتماد السياسات والخطط والبرامج والمبادرات المتعلقة بالمركز، ومراجعتها، ومتابعة تنفيذها. اعتماد المقابل المالي لما يقدمه المركز من خدمات واستشارات أو أعمال يرى المجلس استحصال مقابل مالي عنها. اعتماد اللوائح الإدارية والمالية، على أن يكون اعتماد اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وأن يكون اعتماد اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. اعتماد اللوائح اللازمة لتسيير العمل فيه. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، وفق الإجراءات النظامية المتبعة. النظر في التقارير الدورية التي تقدم عن سير العمل في المركز وأوضاعه المالية. اعتماد هيكل المركز التنظيمي ودليله. الموافقة على إنشاء الفروع والمكاتب للمركز. اعتماد ميزانية المركز وتقريره السنوي وحسابه
    الختامي وتقرير مراجع الحسابات، ورفعها وفق الإجراءات النظامية المتبعة. قبول الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف، وفقاً للأحكام المنظمة لذلك. تعيين مراجع حسابات خارجي للمركز ومراقب مالي داخلي له. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو إلى من يراه من أعضائه أو من منسوبي المركز. وللمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من غيرهم، ويعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المركز برئاسة الرئيس أو من ينيبه من الأعضاء من ممثلي الجهات الحكومية. ويجوز عند الحاجة عقدها في مكان آخر داخل المملكة. يعقد المجلس اجتماعاته بصفة دورية (أربع) مرات -على الأقل- في السنة. وللرئيس دعوته للاجتماع متى ما دعت الحاجة إلى ذلك، أو متى طلب ذلك (ثلث) الأعضاء على الأقل. ويتعين أن تُوجه الدعوة قبل موعد الاجتماع بسبعة أيام على الأقل ومصحوبة بجدول أعمال الاجتماع. يكون الاجتماع صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين. وفي حالة تساوي الأصوات يُرجح الجانب الذي صوّت معه رئيس الاجتماع. لا يجوز لعضو المجلس الامتناع عن التصويت ولا تفويض عضو آخر للتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز -عند الحاجة وفي الحالات الطارئة ووفقاً لما يقدره الرئيس- أن تُعقد الاجتماعات وأن يُصوت عليها عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ القرارات بطريق التمرير على الأعضاء،
    ويُوقع عليها بما يفيد اطلاع جميع الأعضاء عليها، ولا تُعد القرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرر على جميع الأعضاء، ويُصوت عليها من جميع الأعضاء، وتحز على أغلبية أصواتهم. يكون للمجلس أمين من بين منسوبي المركز يختاره الرئيس بناءً على ترشيح الرئيس التنفيذي، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات، ويحضر اجتماعات المجلس دون أن يكون له حق التصويت. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي، يُعين ويُعفى من منصبه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون المسؤول عن إدارة المركز وتسيير أعماله، وتتركز مسؤولياته وصلاحياته في حدود ما تنص عليه الترتيبات، وما يقرره المجلس، وله على وجه الخصوص ممارسة الصلاحيات الآتية: اقتراح السياسات والخطط والبرامج والمبادرات، ورفعها إلى المجلس لاعتمادها. اقتراح المقابل المالي لما يقدمه المركز من خدمات واستشارات وأعمال، ورفعها إلى المجلس لاعتمادها. الإشراف على إعداد الهيكل التنظيمي للمركز ودليله، ولوائحه الإدارية والمالية واللوائح اللازمة لتسيير العمل فيه؛ ورفعها إلى المجلس لاعتمادها. التوقيع على الاتفاقيات ومذكرات التفاهم والعقود، بعد موافقة المجلس. الإشراف على سير العمل في المركز، ورفع تقارير دورية إلى المجلس. متابعة تنفيذ القرارات التي يصدرها المجلس، والقرارات ذات الصلة بأعمال المركز. الإشراف على إعداد مشروع ميزانية المركز، والتقرير السنوي، ومشروع الحساب الختامي؛ ورفعها إلى المجلس لاعتمادها. الصرف من الميزانية المعتمدة واتخاذ الإجراءات المالية، وفقاً للأنظمة واللوائح المقررة والصلاحيات
    المفوضة له من المجلس. تمثيل المركز أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. التعاقد مع العاملين في المركز والخبراء والمستشارين وبيوت الخبرة من داخل المملكة أو خارجها؛ وفقاً للأنظمة واللوائح المقررة والصلاحيات المفوضة له من المجلس. إصدار القرارات اللازمة لتنفيذ أحكام الترتيبات واللوائح الصادرة بناءً عليها والقواعد والإجراءات المعتمدة؛ بحسب الصلاحيات المخولة له. أي مهمة أخرى يكلفه بها المجلس. وللرئيس التنفيذي تفويض أي من اختصاصاته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع منسوبو المركز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون موارد المركز مما يأتي: أ- ما يخصص له في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه نظير الخدمات والأعمال والاستشارات التي يقدمها. ج- ما يقبله المجلس من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف وفقاً للأحكام المنظمة لذلك. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المركز حساباً له في البنك المركزي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويُصرف من هذه الحسابات وفق ميزانية المركز المعتمدة ولوائحه المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يرفع المركز إلى مجلس الوزراء حسابه الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات المركز ومعاملاته وبياناته وميزانياته وحسابه الختامي، ويُحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويُزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تنشر الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ddbe2b46-01ab-43b0-9fd8-af6300c1a649/1
  verified: false
