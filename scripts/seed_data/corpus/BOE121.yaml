regulation:
  code: BOE121
  name_ar: نظام الأنشطة المقلقة للراحة أو الخطرة أو المضرة بالصحة أو البيئة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: لا يجوز إنشاء أو تشغيل محل لممارسة نشاط من الأنشطة المقلقة للراحة أو الخطرة أو المضرة بالصحة أو البيئة إلا بترخيص من الجهات المختصة، ويعد في حكم الإنشاء التوسعة، أو إضافة نشاط جديد إلى المحل القائم، أو إحداث تغيير من شأنه تعديل كيفية التشغيل تعديلا كلياً أو جزئياً أو نقله إلى مكان آخر، وتحدد اللائحة التنفيذية الأنشطة التي يطبق عليها النظام، وأماكن وشروط ممارستها، والجهات المختصة بالإشراف عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجب على صاحب الترخيص أن يقدم طلب تجديده إلى الجهة المختصة قبل نهاية مدته بثلاثين يوما على الأقل، وللجهة المختصة بقرار مسبب رفض التجديد إذا اختل شرط من شروط منح الترخيص أو تغيرت الظروف، وتحدد اللائحة التنفيذية شروط إصدار الترخيص وتجديده، وإلغائه، ومدته، والمهلة اللازمة لتصحيح وضعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لا يجوز التنازل عن الترخيص إلا لمن تتوافر لديه شروطه وبعد موافقة الجهة المختصة بإصداره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب على صاحب الترخيص أن يقوم بإدارة المحل بنفسه أو تعيين مدير أو مسئول عن التشغيل وفقاً للشروط التي تحددها اللائحة التنفيذية، وفي حالة رغبته في تغيير المدير أو المسؤول يجب عليه إخطار الجهة المختصة خلال ثلاثين يوماً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يقوم الموظفون المكلفون من قبل الجهات المختصة بدخول المحلات الخاضعة لهذا النظام في أوقات العمل الرسمية؛ لغرض التأكد من تنفيذ الشروط المطلوب توافرها وضبط المخالفات والتحقيق فيها، وعلى أصحاب المحلات تمكين هؤلاء الموظفين من القيام بمهمتهم بعد إبراز ما يثبت هويتهم، وتحدد اللائحة التنفيذية أوقات العمل الرسمية لكل نشاط وإجراءات ضبط المخالفات والتحقيق فيها وفق نماذج تحدد لهذا الغرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- مع عدم الإخلال بما تقضي به الأنظمة من عقوبات، يعاقب من ارتكب أي مخالفة لأحكام هذا النظام بغرامة لا تزيد على ثلاثين ألف ريال مع غلق محله حتى تتم إزالة المخالفة، وفي حالة العود يجوز- إضافة إلى ذلك- مصادرة محتويات المحل بحكم قضائي. 2- يعاقب كل من ارتكب أي مخالفة لأحكام اللائحة التنفيذية بغرامة لا تزيد على خمسة آلاف ريال، وتحدد اللائحة الأحكام التي يترتب على مخالفتها توقيع هذه العقوبة. 3- في جميع الأحوال يلزم المخالف بإزالة ما ينتج من ضرر عن مخالفته، أو بإصلاحه على نفقته، أو التعويض عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- يكون وزير الداخلية رئيس مجلس الدفاع المدني أو من يفوضه لجنة أو لجاناً تنظر في المخالفات وتوقيع العقوبات المنصوص عليها في المادة السادسة، ويراعى في تكوينها أن تكون من ثلاثة أعضاء على الأقل أحدهم من الجهة ذات العلاقة وآخر من ذوي التأهيل الشرعي أو النظامي. 2- لا تكون العقوبات نافذة إلا بعد اعتمادها من وزير الداخلية أو من يفوضه. 3- يبلغ القرار الصادر بالعقوبة لمن صدر بحقه، وينص فيه على حقه في التظلم أمام ديوان المظالم وفق نظامه. 4- تحيل اللجنة المختصة بالنظر في المخالفات أوراق القضية بقرار من وزير الداخلية إلى هيئة التحقيق والادعاء العام إذا كانت المخالفة تمثل خطأ جسيماً أو ترتب عليها ضرر جسيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يصدر وزير الداخلية رئيس مجلس الدفاع المدني اللائحة التنفيذية لهذا النظام بناءً على توصية لجنة من وزارة الداخلية ( المديرية العامة للدفاع المدني ) ووزارة الشؤون البلدية والقروية، ووزارة الصحة، ووزارة الصناعة والكهرباء، ووزارة التجارة، ومصلحة الأرصاد وحماية البيئة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تقوم الجهات المختصة بتحصيل رسوم الترخيص والغرامات وفقا للأنظمة المرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: أ - يحل هذا النظام محل نظام المحلات المقلقة للراحة والمضرة بالصحة والخطرة، الصادر بالمرسوم الملكي ذي الرقم (م/17) والتاريخ 18 / 3 / 1382 هـ. ب - ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد ثمانية عشر شهراً من تاريخ نشره، وتصدر اللائحة التنفيذية له خلال سنة من نشره، ويعمل بها من تاريخ نفاذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9cff56dc-09be-45e1-a736-a9a700f218db/1
  verified: false
