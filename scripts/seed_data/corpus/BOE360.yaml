articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات التالية المعاني الموضحة أمامها، ما لم يقتض السياق غير ذلك: الهيئة: الهيئة العليا للأمن الصناعي. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. العضو: عضو المجلس. المحافظ: محافظ الهيئة. المنشآت: جميع المنشآت البترولية والصناعية والخدمية الواقعة ضمن نطاق إشراف الهيئة والمرافق التابعة لها، ويدخل في ذلك العاملون فيها. الأمن الصناعي: مجموعة الإجراءات والتنظيمات المتعلقة بجوانب الأمن والسلامة والحماية من الحريق داخل المنشآت الواقعة ضمن نطاق إشراف الهيئة، وحرمها الآمن. مجالات الأمن الصناعي: الأمن والسلامة والحماية من الحريق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء. المقر الرئيس للهيئة في مدينة الرياض. ولها إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى تنظيم متطلبات مجالات الأمن الصناعي في المنشآت، ولها في سبيل تحقيق ذلك القيام بكل ما يلزم لتحقيق أهدافها، ومن ذلك ما يأتي: وضع السياسات والخطط المناسبة لحماية المنشآت في مجالات الأمن الصناعي. إصدار اللوائح والتعليمات الخاصة بمجالات الأمن الصناعي، وتحديثها وفقاً للظروف والمستجدات. تصنيف المنشآت الواقعة ضمن نطاق إشراف الهيئة. إنشاء مركز عمليات للأمن الصناعي يرتبط بكل غرف العمليات في المنشآت الواقعة ضمن نطاق إشراف الهيئة. إنشاء قواعد بيانات ومعلومات متكاملة عن المنشآت الواقعة ضمن نطاق إشراف الهيئة. تنظيم وعقد ورش العمل والندوات والمؤتمرات والمعارض داخل المملكة وخارجها، والمشاركة فيها، وفق الإجراءات المتبعة. الإشراف على المنشآت، ومتابعة تقيدها باللوائح والتعليمات الخاصة بمجالات الأمن الصناعي. الترخيص لمزاولة المهن ذات العلاقة بمجالات الأمن الصناعي. العمل مع الجهات ذات العلاقة لمواءمة معايير الهيئة مع ضوابط الفسح والترخيص والاستيراد والبيع والاستثمارات في مجالات الأمن الصناعي التي تحددها الهيئة، ومتابعة الالتزام بها. تشجيع إجراء البحوث والتطوير في مجالات الأمن
    الصناعي. تعزيز الجهود المبذولة لتطوير مجالات الأمن الصناعي، ووضع معايير قياسية ومراقبة التقيد بها. تمثيل المملكة في الهيئات المحلية والإقليمية والدولية في مجالات الأمن الصناعي، وفق الإجراءات المنظمة لذلك. التواصل مع الجهات المماثلة خارج المملكة، والاستفادة مما لديها؛ بما لا يتعارض مع سرية عمل الهيئة، وفقاً للإجراءات المنظمة لذلك. تطوير مؤشرات قياس الأداء الخاصة بمجالات الأمن الصناعي في المنشآت الواقعة ضمن نطاق إشرافها، وإعداد التقارير الدورية حول حالة الامتثال لمتطلبات مجالات الأمن الصناعي. الاستعانة بالجامعات والكليات ومراكز البحث العلمي والجهات ذوات العلاقة بالأمن الصناعي؛ لإجراء الدراسات والأبحاث العلمية في مجالات الأمن الصناعي. تأسيس مختبرات متخصصة -بالاتفاق مع وزارة المالية- في فحص العينات الناتجة عن الحوادث الصناعية؛ بالشراكة مع الجامعات السعودية والمراكز الوطنية البحثية. اقتراح الأنظمة المتصلة باختصاصات الهيئة، واقتراح تعديل القائم منها، والرفع عن ذلك لاستكمال الإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة وزير الداخلية وعضوية كل من: وزير الطاقة أو من ينيبه. وزير الحرس الوطني. مستشار الأمن الوطني. وزير البيئة والمياه والزراعة. وزير المالية. وزير الاتصالات وتقنية المعلومات. وزير الصناعة والثروة المعدنية. وزير النقل والخدمات اللوجستية. وزير الموارد البشرية والتنمية الاجتماعية. رئيس الاستخبارات العامة. رئيس أمن الدولة. رئيس هيئة الأركان العامة. محافظ الهيئة. محافظ الهيئة العامة للصناعات العسكرية. ثلاثة من ذوي الاختصاص في مجال عمل الهيئة، يصدر بتعيينهم أمر من رئيس مجلس الوزراء بناءً على اقتراح من الرئيس، وتكون عضويتهم لمدة (ثلاث) سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويشرف على إدارتها وتصريف أمورها، ويتابع تنفيذ الأنظمة والتعليمات المتعلقة بالسياسات العامة للأمن الصناعي، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنه التنظيم، وله على وجه الخصوص ما يأتي: إقرار السياسات العامة المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، والإشراف على تنفيذها. الموافقة على الاستراتيجية الوطنية للأمن الصناعي، والخطط والبرامج اللازمة لتنفيذها، والرفع بها لاستكمال الإجراءات النظامية في شأنها. الموافقة على استراتيجية الدعم والحماية للمنشآت الواقعة ضمن نطاق إشراف الهيئة، والرفع عما يستلزم استكمال إجراءات في شأنه. إقرار الهيكل التنظيمي للهيئة بحسب الإجراءات المتبعة. إقرار اللوائح المالية والإدارية، وغيرها من اللوائح الداخلية لتسيير عمل الهيئة وشؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة
    بناءً عليه. تحديد المنشآت الواقعة ضمن نطاق إشراف الهيئة، تمهيداً لرفعه إلى رئيس مجلس الوزراء لاعتمادها. تحديد المقابل المالي للخدمات والأعمال التي يرى المجلس استحصال مقابل مالي عنها. إقرار خطة عمل الهيئة وخططها التشغيلية. الموافقة على إنشاء فروع أو مكاتب للهيئة داخل المملكة، بحسب الحاجة. الموافقة على شراء العقارات وبيعها بما يحقق أغراض الهيئة، وبما لا يخل بالأنظمة ذات العلاقة. الموافقة على إبرام الاتفاقيات والعقود بحسب الإجراءات النظامية المتبعة. النظر في التقارير الدورية عن سير العمل في الهيئة، واتخاذ القرارات اللازمة في شأنها. تحديد الجهات العسكرية والأمنية لحراسة المنشآت الواقعة ضمن نطاق إشراف الهيئة. الموافقة على مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيداً لرفعها وفقاً للإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف، بحسب القواعد المنظمة لذلك. تعيين مراقب مالي داخلي. وللمجلس -بحسب ما يقدره- تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم، يعهد إليها بما يراه من مهمات، ويسمّي في قرار تشكيل كل لجنة رئيسَها وأعضاءها،
    ويحدِّد فيه مهماتها، ولكل لجنة الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض مهماته إلى رئيسه أو أي من أعضائه، وفقاً لما يقتضيه سير العمل في الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع المجلس بدعوة من الرئيس مرة واحدة كل (ثلاثة) أشهر على الأقل، و كلما دعت الحاجة إلى ذلك، أو إذا طلب ذلك (ثلاثة) من الأعضاء على الأقل. ويجب أن تشتمل الدعوة على جدول الأعمال. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه من الأعضاء. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها الرئيس والأعضاء الحاضرون، وتنشر القرارات التي يرى الرئيس ضرورة نشرها في الجريدة الرسمية أو أي وسيلة أخرى يراها مناسبة، على ألا يخل هذا النشر بالمصلحة العامة أو بأسرار العمل، وتبلغ الهيئة هذه القرارات إلى الجهات المعنية بها مباشرة وبالطريقة المناسبة. يعيّن المجلس أميناً عامًّا له يرتبط بالمحافظ؛ لتنظيم وتنسيق أعمال المجلس. لا يجوز للعضو تفويض شخص آخر للتصويت عنه عند غيابه ولا الامتناع عن التصويت. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر قرارات المجلس. للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماته وخبراته دون أن يكون له حق التصويت. لا يجوز للعضو،
    ولا لأي شخص يحضر جلسات المجلس، أن يفشي شيئاً مما وقف عليه من أسرار الهيئة. يصدر المجلس القواعد والإجراءات المنظمة لعقد اجتماعاته وآليات إصدار قراراته، بما في ذلك قواعد الاجتماعات عن بُعد. تعقد اجتماعات المجلس في مقر الهيئة الرئيس. ويجوز عند الاقتضاء أن تعقد في مكان آخر داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة محافظ بمرتبة وزير، يعيّن بناءً على ترشيح الرئيس، ويكون المسؤول التنفيذي عن إدارة الهيئة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويمارس المحافظ بوجه خاص الصلاحيات والمهمات الآتية: الإشراف على إعداد السياسات العامة المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. الإشراف على إعداد الاستراتيجية الوطنية للأمن الصناعي، والخطط والبرامج اللازمة لتنفيذها، وعرضها على المجلس للموافقة عليها. الإشراف على إعداد الهيكل التنظيمي للهيئة، ورفعه إلى المجلس. الإشراف على إعداد اللوائح المالية والإدارية وغيرها من اللوائح الداخلية لقيام الهيئة بمهماتها، ورفعها إلى المجلس. متابعة تنفيذ القرارات الصادرة عن المجلس. اقتراح القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناءً عليه، بحسب الصلاحيات المخولة له. الإشراف على منسوبي الهيئة وفقاً للصلاحيات المخولة له وما تحدده اللوائح المنظمة لذلك. تعيين منسوبي الهيئة من المدنيين، وفقاً للوائح المنظمة لذلك. الإشراف على إعداد تقارير دورية عن
    أعمال الهيئة ومنجزاتها ونشاطها، ورفعها إلى المجلس. الإشراف على إعداد خطة عمل الهيئة التشغيلية، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المعمول بها، وفي حدود الصلاحيات التي يفوضه بها المجلس. الإشراف على إعداد مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي؛ تمهيداً لرفعها إلى المجلس. تمثيل الهيئة أمام القضاء، والجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها. وله تفويض غيره بذلك. إقرار الخطط والبرامج اللازمة لتدريب وابتعاث وإيفاد منسوبي الهيئة في مجالات عملها، ومتابعة تنفيذها. تنظيم مشاركة الهيئة في المؤتمرات والندوات والمعارض المحلية والإقليمية والدولية وفقاً للإجراءات النظامية. التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات التي يمنحه إيّاها المجلس، ووفقاً للإجراءات النظامية المتبعة. أي اختصاص آخر يسنده إليه المجلس. وللمحافظ تفويض بعض صلاحياته ومهماته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يسري على منسوبي الهيئة المدنيين -عدا المحافظ- نظام العمل ونظام التأمينات الاجتماعية. تسري على منسوبي الهيئة العسكريين أنظمة الخدمة العسكرية ولوائحها، ونظام التقاعد العسكري، ويتمتعون بكل مزايا منسوبي الهيئة وفقاً لما يحدده المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون لمحافظ الهيئة نواب يعينون بقرار من الرئيس بناءً على ترشيح من المحافظ، ويتولى النواب الأعمال والصلاحيات التي يفوضهم بها المحافظ في حدود ما يقضي به التنظيم، واللوائح والإجراءات المعتمدة الخاصة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية مستقلة، وتكون السنة المالية للهيئة هي السنة المالية للدولة. واستثناءً من ذلك، تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: ما يخصص لها في الميزانية العامة للدولة. المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها. ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. أي مورد آخر يقره المجلس، بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي. ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تعامل الهيئة، من حيث إعفاء وارداتها من الرسوم الجمركية، بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع الهيئة، خلال (تسعين) يوماً من بداية كل سنة مالية، إلى رئيس مجلس الوزراء تقريراً سنويًّا عما حققته من إنجازات مقارنة بالسنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لحسن سير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/1ad6bc9a-eec1-4dd4-be16-af34010b4cbd/1
  verified: false
