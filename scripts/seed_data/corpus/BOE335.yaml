  name_ar: اللائحة التنظيمية لدور الأحداث
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لغرض تطبيق أحكام هذه اللائحة يقصد بالكلمات والعبارات الآتية المعاني المبينة أمام كل منها: الوزارة: وزارة الموارد البشرية والتنمية الاجتماعية. الوزير: وزير الموارد البشرية والتنمية الاجتماعية. الحدث: كل ذكر أو أنثى أتم (الثانية عشرة) ولم يتم (الثامنة عشرة) من عمره. المحكمة: المحكمة -أو الدائرة- المختصة بالنظر في قضايا الأحداث. الدار: جهة تابعة للوزارة أو مرخصة منها تخصص فيها أماكن مستقلة لإيداع الأحداث من الذكور، وأخرى خاصة بالإناث، وأماكن توقیف مستقلة للأحداث الموقوفين من الذكور، وأخرى خاصة بالإناث الموقوفات. مدير الدار: من يكلف بإدارة الدار أو من ينوب عنه. الجهة المختصة: جهة الضبط التي تسلم الحدث للدار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تختص الدار برعاية وتأهيل الأحداث الموقوفين أو المحكوم عليهم بالإيداع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'على الدار ألا تتسلم الحدث إلا بعد مراعاة الآتي: أن يكون تسلمه من الجهة المختصة. التأكد من هويته وسنه بناءً على وثيقة رسمية. أن ترفق الجهة المختصة بياناً يشتمل على جميع المعلومات اللازمة، إذا كان الغرض من إيقافه التحقيق معه. أن تطلب من الجهة المختصة تقريراً طبياً من مستشفى حكومي توضح فيه الحالة الصحية للحدث في حال ملاحظتها عليه أي إصابات بدنية أو أمراض معدية أو عقلية أو نفسية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'على الدار عند تسلم الحدث القيام بما يلي: إنشاء ملف عام له يتضمن بياناته ومعلوماته عن طريق تعبئة نموذج يحفظ في ملفه العام يتضمن البيانات الأساسية التالية: أ- اسمه، ورقم سجله المدني، وجنسيته، وتاريخ ميلاده. ب- تاريخ دخوله، وحالته الصحية والاجتماعية. ج- تاريخ القبض عليه، واسم جهة الضبط. د- نوع القضية التي أوقف أو أودع بسببها. هـ- اسم مستقبله ووظيفته، واسم مسجل البيانات ووظيفته. و- وسيلة التواصل مع ولي أمره أو من يقوم مقامه. ز- عدد مرات الدخول السابقة للدار (إن وجد). إنشاء ملف طبي له يتضمن بياناته وتقاريره الطبية. تعامل البيانات الواردة في الفقرتين (1) و(2) من هذه المادة بسرية، ولا يجوز أن يطلع عليها غير المختصين إلا بموافقة من الوزير أو من يفوضه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'بعد تسلم الحدث تقوم الدار بما يلي: إبلاغ ولي أمره أو من يقوم مقامه بمكانه فور تسلمه. تفتیشه بما يضمن حمايته وسلامته وسلامة من في الدار، وتسلم كل ما بحوزته من أغراض وحفظها في صندوق الأمانات، وإعداد إيصال بالمواد المستلمة منه يكون موقعاً منه أو من ولي أمره أو من يقوم مقامه ومن مسؤول الصندوق، على أن تعاد إليه عند خروجه، ما لم يرغب في تسليمها لولي أمره أو من يقوم مقامه. أخذ بصماته. التقاط صورة فوتوغرافية وإيداعها في ملفه العام المشار إليه في المادة (الرابعة). إحالته إلى الأخصائي الاجتماعي بالدار لدراسة حالته الاجتماعية وإعداد تقرير عنها. تبليغه بأنظمة الدار وبالحقوق المقررة له والواجبات والمحظورات عليه، وتوقيعه بالعلم والالتزام بها. تبصيره وولي أمره أو من يقوم مقامه بشكل واضح بإجراءات سير القضية والتهمة المنسوبة إليه والحقوق والضمانات التي له.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تهيئ الدار داخلها مكاناً مناسباً لإجراء التحقيق مع الحدث ومكاناً مناسباً لمحاكمته، على أن يشتملا على جميع ما يلزم من احتياجات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: إذا تبين لمدير الدار أن الحدث غير مهيأ للمثول أمام المحكمة -بعد الأخذ بتوصية الأخصائي الاجتماعي- فله أن يطلب من المحكمة تأجيل النظر في القضية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تتولى الدار تنفيذ عقوبة الإيداع المحكوم بها على الحدث وتطلق سراحه بانتهاء مدتها، فإن كان الحكم الصادر في شأنه مشتملاً على عقوبة أخرى ولم تنفذ أثناء الإيداع، فيستدعى لتنفيذ العقوبة الأخرى متى طلبت المحكمة ذلك. تقدم الدار للمحكمة تقريراً طبياً عن حالة الحدث الصحية قبل تنفيذ أي عقوبة أخرى غير الإيداع. على الدار إعداد محضر بتنفيذ أي عقوبة أخرى غير الإيداع، ويوقع عليه -إضافةً إلى مديرها- مندوب المحكمة والطبيب المختص في الدار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تقدم (ثلاث) وجبات غذائية للحدث يومياً وفق جدول يعد لذلك، مع إتاحة الاحتياجات الغذائية الخفيفة طوال اليوم، ولا يجوز حرمانه من الوجبات المقررة أو إنقاصها إلا لأسباب طبية، وإذا استدعت حالته تقديم غذاء خاص له وجب توفيره بحسب ما يوصي به الطبيب المختص في الدار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجب تمكين الحدث من التعرض لأشعة الشمس والهواء الطلق يومياً خلال مدد محددة ومنتظمة بحسب ما يوصي به الطبيب المختص في الدار، مع مراعاة الجوانب الأمنية في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يوفر لكل حدث فراش فردي صحي، وأغطية كافية، وكسوة ملائمة، وأدوات نظافة شخصية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع مراعاة ما ورد في الأنظمة ذات العلاقة، يجب حفظ كرامة الحدث وحقوقه، واتباع الأساليب التربوية السليمة في التعامل معه، ويحظر القيام بأي فعل أو لفظ يؤدي إلى ضرر جسدي أو معنوي له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ينشأ في كل دار وحدة صحية لتوفير الخدمات الصحية العلاجية والوقائية، وتكون مهمتها إعداد التقرير الطبي الخاص بالحدث، وتقديم العناية الصحية له، وذلك عن طريق الكشف الطبي الدوري عليه من قبل طبيب أو ممرض الدار المختص بمتابعة حالته الصحية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'توفر الدار للفتاة الحامل الرعاية الصحية اللازمة وفق الآتي: أ- معاملتها منذ ثبوت الحمل إلى مضي (أربعين) يوماً بعد الوضع معاملة طبية خاصة، ويؤجل تنفيذ أي عقوبة بدنية محكوم بها إلى ما بعد الوضع بسنتين. ب- تتخذ الترتيبات الخاصة بالولادة في مستشفى مهيأ لذلك مع مراعاة الجانب الأمني. ج- يسمح ببقاء المولود في الدار لمدة لا تزيد على سنتين، مع تقديم الرعاية الطبية والتغذية المناسبة له، فإذا بلغ سن المولود سنتين، فعلى الدار إثبات ذلك وتوثيقه رسمياً وتصديقه من قبل المحكمة، ومن ثم يسلّم لمن يحق له حضانته شرعاً، فإن تعذر ذلك فيودع في إحدى دور الحضانة الاجتماعية وتبلغ أمه بمكان إيداعه، وتمكن من رؤيته في أوقات منتظمة، على ألا تزيد الفترة بين الزيارة والأخرى على أسبوع. د- إذا لم ترغب الأم في بقاء المولود الذي لم يبلغ سن السنتين معها في الدار، فعلی الدار إثبات ذلك وتوثيقه رسمياً وتصديقه من قبل المحكمة، ومن ثم تسليمه لمن يحق له حضانته شرعاً، فإن تعذر ذلك فيودع في إحدى دور الحضانة الاجتماعية وتبلغ أمه بمكان إيداعه، مع مراعاة حقها في الزيارة خلال الفترات المشار إليها في الفقرة الفرعية (ج)
    من هذه الفقرة. لا يسجل في تبليغ الولادة أو شهادة الميلاد ما يدل على واقعة إيداع أمه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'تنظم الدار برامج وأنشطة لتوفير احتياجات الحدث بما يحقق التأهيل السليم له وتنميته، وتشمل هذه البرامج والأنشطة ما يلي: توعيته بأصول الدين، وذلك من خلال إقامة الحلقات القرآنية والدروس والمحاضرات وغيرها من الأنشطة، وذلك بعد التنسيق مع وزارة الشؤون الإسلامية والدعوة والإرشاد. تهيئته وتأهليه للاندماج الاجتماعي من خلال إقامة الجلسات الإرشادية الفردية والجماعية، ومعالجة السلوكيات الخاطئة، واكتشاف الميول والاتجاهات، تمهيداً لإعداد الخطة العلاجية اللازمة في ضوء ذلك من قبل الأخصائي الاجتماعي. إعادة تأهيل من تعرض للإيذاء أو الإهمال. تمكينه من مواصلة تعليمه، ولا يجوز أن يدون في شهادته أو أي مستند تعليمي أو تدريبي يصدر من المدارس أو المعاهد داخل الدار ما يشير إلى أنه كان مودعاً بها. إكسابه الثقافة العامة والعادات السليمة، وذلك من خلال البرامج الثقافية والرياضية، والمحاضرات التوعوية. إقامة برامج لممارسة هواياته وتنمية مهاراته وشغل وقت فراغه بما يعود عليه بالنفع والفائدة، وتدريبه على أعمال أو مهن أو حرف مناسبة لإعداده وتأهيله. إتاحة الفرصة له لمشاهدة القنوات الفضائية التي تعود عليه بأثر
    حميد في أوقات محددة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تنشئ الدار مكتبة تحتوي على كتب دينية وعلمية وثقافية في مجالات مختلفة، وتزود بالوسائل التقنية المسموعة والمرئية، ويسمح للحدث بزيارتها في الأوقات المخصصة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تحدد الدار أوقاتاً منتظمة لاتصال الحدث بأسرته عبر وسائل الاتصال المتاحة، وأوقاتاً منتظمة لزيارته، عدا الحدث الممنوع من التواصل لأغراض التحقيق لحين الانتهاء منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'تنتهي إقامة الحدث في الدار في الأحوال الآتية: إذا انتهت المدة المحددة لإيقافه. إذا نفذ حكم الإيداع الصادر بحقه. إذا أتم (الثامنة عشرة) من عمره، مع اتخاذ ما يلزم من إجراءات؛ لضمان تنفيذ المدة المتبقية من محكوميته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: في جميع الأحوال، تراعي الدار وجوب استدعاء ولي أمر الحدث أو من يقوم مقامه لتسليمه إياه أو كفالته في الموعد المحدد لخروجه، فإن رفض تسلمه أو رفض الحدث الخروج معه، فعلى الدار الرفع عن الحالة إلى الوزير من أجل تحويل الحدث لمكان تابع للوزارة مناسب له ودراسة حالته ومعالجتها، وأخذ تعهد على ولي أمره أو من يقوم مقامه -بحسب الحاجة- بعدم التعرض له بأي إساءة أو ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تقوم الدار -بقدر الإمكان- بتصنيف الأحداث داخلها بحسب نوع القضية والعمر والسوابق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: توفر الدار أخصائياً نفسياً وأخصائياً اجتماعياً أو أكثر لمساعدة الحدث ووضع البرنامج المناسب له سواء كان وقائياً أو تربوياً أو علاجياً، بعد تشخيص حالته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: على الدار إنشاء أو توفير صالة رياضية متكاملة يمارس فيها الحدث التمرينات والألعاب الرياضية، وعلى الدار مراقبة سلوكه أثناء الممارسة، وتنفيذ بعض جوانب الخطة العلاجية من خلالها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: على الدار التنسيق مع إدارات التعليم في المناطق والمحافظات لافتتاح مدارس أو مراكز تعليم داخل الدار، وتتولى إدارات التعليم تجهيزها، وتشغيلها، والإشراف عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: على الدار التنسيق مع المؤسسة العامة للتدريب التقني والمهني لافتتاح معاهد مهنية -بحسب الأحوال- داخل الدار، وتتولى المؤسسة تجهيزها، وتشغيلها، والإشراف عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يقوم الوزير بالتنسيق مع وزير الداخلية لتكليف عدد من رجال الأمن للمحافظة على أمن الدار وحراستها من الداخل والخارج، ويحدد مدير الدار ومن يرشحه وزير الداخلية آليات ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: على الدار إبلاغ الجهات المختصة -فوراً- عمَّن يهرب من الأحداث، لإعادته إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: على الدار استقبال شكاوى الأحداث فيها، وتدوينها في سجل الشكاوى، وعلى مدير الدار معالجتها أو الرفع عنها، على أن تحدد الوزارة ما يستوجب الرفع إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: على الدار تجهيز أماكن لبيع الأشياء الأساسية والتموينية والكمالية التي يحتاج إليها الحدث بشكل يومي، وتنظيم عملية البيع، على ألا تزيد الأسعار على أسعار السوق، ويمكن أن يسند البيع إلى الجمعيات الأهلية أو الشركات أو المؤسسات المتخصصة في هذا المجال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: على الدار توفير أدوات إطفاء ووسائل سلامة والتأكد بشكل مستمر من صلاحيتها، وتدريب العاملين فيها على استعمالها وفق وسائل السلامة وقواعد الإخلاء، وذلك بالتنسيق مع المديرية العامة للدفاع المدني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: على الدار المحافظة على النظافة والصحة العامة فيها، ومراقبة نظافة الأحداث، واتخاذ جميع الوسائل المتاحة من أجل تحقيق ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: إذا توفي الحدث داخل الدار، فيجب إبلاغ الجهات المختصة فوراً، لاستكمال الإجراءات المتبعة في هذا الشأن، وتتولى إدارة الدار إبلاغ ولي أمره أو من يقوم مقامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: على الدار مراعاة مصلحة الحدث في جميع الإجراءات التي تتخذ في شأنه والإسراع في إنجازها، ومراعاة حاجاته النفسية والجسدية والتربوية والتعليمية، بما يتفق مع سنه وصحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: إن قام الحدث بأي عمل يقصد منه الانتحار أو إلحاق الأذى بنفسه أو بغيره، يعرض على الطبيب والأخصائي النفسي في الحال، فإن تطلبت حالته الصحية نقله إلى المستشفى فينقل فوراً، ويثبت ذلك في محضر، وتبلغ المحكمة وولي أمر الحدث أو من يقوم مقامه بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يصدر الوزير خلال (تسعين) يوماً -التنسيق مع هيئة حقوق الإنسان- لائحة للتعامل مع سلوكيات الحدث داخل الدار تحدد حقوقه وواجباته والمحظورات عليه، والإجراءات التأديبية في حال مخالفته الواجبات أو ارتكابه للمحظورات، وذلك بما لا يتعارض مع الأحكام الواردة في هذه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يصدر الوزير القواعد التنفيذية لهذه اللائحة في مدة لا تتجاوز (تسعين) يوماً من تاریخ صدور اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية ويعمل بها بعد (تسعين) يوماً من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02a1eb0b-ab11-4900-851e-ad4600cd84a8/1
  verified: false
