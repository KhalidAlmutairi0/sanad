regulation:
  code: BOE406
  name_ar: تنظيم الرئاسة العامة لهيئة الأمر بالمعروف والنهي عن المنكر
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: الرئاسة العامة لهيئة الأمر بالمعروف والنهي عن المنكر جهاز مستقل، ترتبط تنظيمياً برئيس مجلس الوزراء، ويشار إليها في هذا التنظيم بـ(الهيئة)، وتتبعها جميع الهيئات الفرعية للأمر بالمعروف والنهي عن المنكر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يكون الرئيس العام للهيئة بمرتبة وزير يعين بأمر ملكي، ويلحق بالهيئة العدد الكافي من الموظفين والأعضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تكون في كل منطقة هيئة فرعية للأمر بالمعروف والنهي عن المنكر، يصدر بتشكيلها قرار من الرئيس العام للهيئة، ويلحق بها العدد الكافي من الموظفين والأعضاء وتنشأ مراكز للهيئات الفرعية - بحسب الحاجة - في المدن والمحافظات والمراكز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: الرئيس العام للهيئة هو المسؤول عن إدارتها وتصريف شؤونها والمرجع للهيئات الفرعية، وذلك وفقاً لأحكام هذا التنظيم، وله ما للوزير من صلاحيات في وزارته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'مع عدم الإخلال بما يقضي به نظام الخدمة المدنية، يجب أن يتوافر فيمن يباشر المهمات المنصوص عليها في هذا التنظيم من أعضاء الهيئة ما يأتي : 1 - أن يكون من ذوي المؤهلات العلمية، التي تحددها اللائحة التنفيذية لهذا التنظيم.2 - أن يكون مؤهلاً للأمر بالمعروف والنهي عن المنكر.3 - أن يكون حسن السيرة والسلوك والمشهود لهم بحسن السمعة.4 - ألاّ يكون قد سبق أن صدر في حقه حكم بحد شرعي أو بالسجن لمدة تزيد على سنة أو أدين في جريمة مخلة بالشرف أو الأمانة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تختص الهيئة وفقاً لهذا التنظيم بالقيام بواجب الأمر بالمعروف والنهي عن المنكر والدعوة إليه بالرفق واللين، مقتدية في ذلك بسيرة الرسول صلى الله عليه وسلم وخلفائه الراشدين من بعده مع استهداف المقاصد الشرعية، والإسهام مع الجهات المختصة في مكافحة المخدرات وبيان أضرارها على الأسرة والمجتمع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تباشر الهيئة ومنسوبوها الاختصاص المنصوص عليه في المادة (السادسة) من هذا التنظيم وفقاً للضوابط الآتية : 1 - تتولى الهيئة تقديم البلاغات في شأن ما يظهر لها من مخالفات أثناء مزاولتها لاختصاصها المنصوص عليه في المادة (السادسة) من هذا التنظيم بمذكرات إبلاغ رسمية إلى الشرطة أو الإدارة العامة لمكافحة المخدرات - بحسب الاختصاص - وهما وحدهما الجهتان المختصتان - بموجب الأحكام المقررة نظاماً - بجميع الإجراءات اللاحقة لتلك البلاغات بما في ذلك إجراءات الضبط الجنائي والإداري والتحفظ والمتابعة والمطاردة والإيقاف والاستجواب والتثبت من الهوية والتحقيق والقبض في أي بلاغ ذي صلة باختصاص الهيئة.2 - يباشر أعضاء الهيئة الاختصاص المنصوص عليه في المادة (السادسة) من هذا التنظيم في الأسواق والشوارع والأماكن العامة، وذلك خلال ساعات عملهم الرسمي المرتبة والمجدولة بشكل رسمي من قبل إدارة كل مركز. وليس لرؤساء المراكز أو أعضاء الهيئة إيقاف الأشخاص أو التحفظ عليهم أو مطاردتهم أو طلب وثائقهم أو التثبت من هوياتهم أو متابعتهم والتي تعد من اختصاص الشرطة والإدارة العامة لمكافحة المخدرات وفقاً للفقرة (1) من
    هذه المادة .3 - تباشر الهيئة الاختصاص المنصوص عليه في المادة (السادسة) من هذا التنظيم من خلال أعضائها الرسميين شاغلي وظائفها المعتمدة في ميزانيتها.4 - على عضو الهيئة إبراز بطاقة التعريف الرسمية الخاصة به بشكل ظاهر تتضمن اسمه ووظيفته والمركز الذي يتبعه وساعات عمله الرسمي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للهيئة لجنة استشارية – مكونة من خمسة أعضاء – تتولى تقديم الاستشارات والتوصيات للرئيس العام للهيئة فيما يتعلق بمباشرة الهيئة لاختصاصها، وما قد يطرأ من مخالفات وتجاوزات بهذا الشأن واقتراح محاسبة المخالفين، وذلك وفق ما تحدده اللائحة التنفيذية لهذا التنظيم، ويسمي رئيس مجلس الوزراء أعضاء هذه اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: على الجهات العامة والخاصة أن تتعاون مع الهيئة بما يحقق ما ورد في هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يصدر رئيس مجلس الوزراء اللائحة التنفيذية لهذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يحل هذا التنظيم محل تنظيم الرئاسة العامة لهيئة الأمر بالمعروف والنهي عن المنكر، الصادر بقرار مجلس الوزراء رقم (73) وتاريخ 16/ 3/ 1434هـ، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ تبليغه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d7ab6b0a-b50b-4be5-9284-a9a700f209d4/1
  verified: false
