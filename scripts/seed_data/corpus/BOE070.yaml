articles:
- article_ref: المادة (1)
  article_text_ar: التاجر هو من اشتغل بالمعاملات التجارية واتخذها مهنة له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: يعتبر من الأعمال التجارية كل ما هو آت:أ- كل شراء بضاعة أو أغلال من مأكولات وغيرها لأجل بيعها بحالها أو بعد صناعة وعمل فيها.ب- كل مقاولة أو تعهد بتوريد أشياء أو عمل يتعلق بالتجارة بالعمولة أو النقل برا أو بحرا أو يتعلق بالمحلات والمكاتب التجارية ومحلات البيع بالمزايدة يعني الحراج . ج- كل ما يتعلق بسندات الحوالة بأنواعها أو بالصرافة والدلالة (السمسرة).د- جميع العقود والتعهدات الحاصلة بين التجار والمتسببين والسماسرة والصيارف والوكلاء بأنواعهم، وجميع المقاولات المتعلقة بإنشاء مبان ونحوها متى كان المقاول متعهدا بتوريد المؤن والأدوات اللازمة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: إذا باع مالك الأرض أو المزارع فيها غلتها بمعرفته، أو باع مالك العقار عقاره أو اشترى أحد عقارا أو أي شيء لا لبيعها ولا إجارتها بل للاستعمال فلا يعد شيء من ذلك عملا تجاريا، كما وإن دعاوى العقارات وإيجاراتها لا تعد من الأعمال التجارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: كل من كان رشيدا أو بلغ سن الرشد فله الحق أن يتعاطى مهنة التجارة بأنواعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: يجب على كل تاجر أن يسلك في كل أعماله التجارية بدين وشرف، فلا يرتكب غشا ولا تدليسا ولا احتيالا ولا غبنا ولا غررا ولا نكثا ولا شيئا مما يخالف الدين والشرف بوجه من الوجوه، وإذا فعل ذلك استحق الجزاء الرادع بمقتضى قانون العقوبات المندرج في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: 'من الواجب على كل تاجر استعمال الدفاتر الآتية:أ- دفتر اليومية وهو الدفتر المشتمل على بيان جميع ما له وعليه من الديون يوما فيوما وبيان أعمال تجارته مما باعه واشتراه وقبله وحوله واستدانه وأدانه وقبضه ودفعه في نقود وأمتعة وأوراق مالية وتجارية وبيان المبالغ المنصرفة على منزله ومحله شهرا فشهرا بالإجمال. ب- دفتر الكوبية : وهو الدفتر الذي يرصد فيه صور المكاتيب والكشوفات التي تصدر من محل تجارته المتعلقة بأشغاله التجارية، على أن يحفظ عموم التحارير والكشوفات التي ترد إليه من هذا النوع في ملف خاص. ج- دفتر الجرد : وهو الدفتر الذي يجرد فيه سنويا أمواله التجارية منقولة كانت أو غير منقولة، ويحصر فيه كل ما له وعليه من الديون. د- دفتر التوثق : وهو الذي يقيد فيه التاجر بيوعه ومعاملاته مع بيان الإيضاحات اللازمة ويأخذ عليه إمضاء المشتري أو صاحب المعاملة توثيقا للمعاملة وليكون حجة على المشتري عند المراجعة والاقتضاء'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: يجب أن يكون كل من دفاتر اليومية والجرد والتوثق محررات بصورة منتظمة دون أن يتخلل الصحيفة فراغ أو بياض وأن تكون خالية من العلاوات والتحشية والمسح والحك وأن تكون صحائفها مرقومة بعدد متسلسل من الابتداء إلى الانتهاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: يجب أن تكون هذه الدفاتر قبل استعمالها مسجلة في قلم المحكمة التجارية حسب الأصول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (9)
  article_text_ar: كل دفتر غير مستوف للشروط السالف ذكرها لا يصلح حجة أمام المحكمة التجارية في المرافعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: كل تاجر مسئول عن أعماله وانتظام دفاتره وأعمال المستخدمين عنده فيما يترتب فيه عقوبة تجارية ويعد التاجر شريكا لمن ارتكبها من المستخدمين ما لم تظهر براءته بصورة جلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: 'الشركة عقد بين اثنين فأكثر يلتزم به تصرف مخصوص لتحصيل ربح مشروع؛ وهي ثلاثة أنواع: شركة المفاوضة ، وشركة العنان ، وشركة المضاربة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: شركة المفاوضة المعبر عنها بشركة التضامن هي الشركة المنعقدة تحت إمضاء عموم الشركاء على رأس مال معلوم متساو ويكون جميع الشركاء متضامنين متكافلين في كل التعهدات والمقاولات المندرجة في السندات التي أمضاها الشركاء المأذونون في كل الأعمال التجارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (13)
  article_text_ar: شركة العنان هي الشركة المنعقدة بين اثنين فأكثر على رأس مال معلوم لكل من الشركاء حصة معينة فيه ولا يتحمل الشريك ضررا ولا خسارة زيادة على حصته من رأس المال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (14)
  article_text_ar: من فروع شركة العنان المساهمة وهي الشركة المنعقدة على رأس مال معلوم يقسم إلى أسهم، والأسهم إلى حصص متساوية المبالغ من غير تسمية أصحاب الحصص، ويتولى إدارتها وكلاء مختارون ويجوز تعيينهم وعزلهم ونصبهم والمديرون هم المسئولون عن الأعمال الموكولة إلى عهدتهم وليسوا بمديونين ولا كافلين تعهدات الشركة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (15)
  article_text_ar: شركة المضاربة هي الشركة المنعقدة على أن يكون رأس المال من طرف والعمل من الطرف الآخر لاشتراك الجميع في الربح الحاصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (16)
  article_text_ar: ما عدا الشركات المذكورة آنفا توجد شركات أخرى متعارفة بين التجارة تجري فيها مقتضياتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (17)
  article_text_ar: كل الشركات تقسم أرباحها على الوجه الذي وقع الاتفاق عليه وبين الشركاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (18)
  article_text_ar: الوكيل بالعمولة هو الذي يتعاطى التجارة بالوصاية والنيابة ويجري معاملاته باسمه أو بعنوان شركة ما لحساب موكله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (19)
  article_text_ar: كل وكيل بعمولة له الحق أن يتقدم في استيفاء جميع ما صرفه على أمتعة مرسلة له من محل آخر برسم البيع لحساب موكله من نفس قيمتها إذا كانت موجودة لديه أو مودعة في مخزن الجمرك أو حملت إليه بموجب قائمة الإرسالية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (20)
  article_text_ar: إذا حول الوكيل أمر نقل البضاعة والأشياء المسلمة أو المرسلة له إلى غيره بغير إذن التاجر الأصلي يضمن كل ضرر يحصل بسبب ذلك. أما إذا كان التحويل إلى الوكيل الآخر من نفس التاجر أو بإذنه فلا ضمان عليه
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (21)
  article_text_ar: يجب على كل وكيل وأمين أن يقيد بدفتر اليومية جنس ومقدار وأثمان البضائع المأمور بنقلها بحرا أو برا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (22)
  article_text_ar: يجب على الوكيل والأمين حين إرسال البضاعة أن يرفق بها قائمة الإرسالية ؛ أي كشفا مستوفيا للشرائط الآتية
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (23)
  article_text_ar: يوضح في قائمة الإرسالية مقدار وجنس البضائع المنقولة ونوع الطرود ومهلة إيصالها مع بيان اسم وشهرة الوكيل والأمين المتعهد بنقلها والمكارى ، واسم وشهرة من تسلم إليه البضاعة ومقدار أجرة النقل وكيفية التضمينات اللازمة على فرض عدم إيصالها في المهلة المعينة ويوقع عليها إمضاء المرسل مع رقم عدد هذه القائمة وعلامة الأشياء المرسلة بحاشيتها ثم تقيد بعينها في دفتر اليومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (24)
  article_text_ar: تلزم الوكيل والأمين والمكارى ضمانة إيصال البضائع المسلمة إليه في داخل المهلة المعينة في قائمة الإرسالية فكل ضرر ينشأ من تأخيره يضمنه ما لم يكن المانع قاهرا يعجز عن دفعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (25)
  article_text_ar: يضمن الوكيل والأمين كل ما ضاع أو تلف من الأشياء المرسلة بعد وصولها إليه ما لم يكن في قائمة الإرسالية شرط يدفع عنه الضمان أو كان التلف والضياع بسبب يعجز الوكيل والأمين عن دفعه أما إذا كان التلف والضياع في أثناء الطريق قبل وصولها إليه فلا ضمان عليه ويتبع مقتضى التعهدات والمقاولات الواقعة بينهم في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (26)
  article_text_ar: يضمن المكارى كل ما يتلف من الأشياء المرسلة معه إذا كان بتعد منه أو إهمال وإلا فلا ضمان عليه، أما إذا كان التلف والضياع من مقتضى جنس الأشياء المرسلة معه كالخضروات والفواكه التي يتسارع إليها الفساد وتأخر وصولها عن المدة المعهودة لغير داع قاهر فيضمن وإلا فلا ضمان عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (27)
  article_text_ar: استلام الأشياء المرسلة مع المكارى ثم إعطاؤه الأجرة تماما أو باقيها يعد بعد ذلك اعترافا باستلام الأشياء تامة سليمة فلا تسمع دعواه على المكارى بما يناقض ذلك أما قبل تحقق هذا الاعتراف فيحق له إقامة الدعوى ثلاثة أشهر إن كان التلف أو الضياع في المملكة الحجازية أو داخل سنة قمرية إن كان التلف أو الضياع في خارجها وبعد مضي المهلتين لا تسمع الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 28)
  article_text_ar: المهلتان المذكورتان في المادة 27 يعتبر ابتداؤها من تاريخ استلام الأشياء أو آخر دفعة منها، وإذا ظهر أن التلف أو الضياع حصل عن حيلة أو خيانة من نفس المكاري فتقام الدعوى في أي وقت كان ولا يمنع سماعها مرور المهلتين المذكورتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (29)
  article_text_ar: إن الشروط والأحكام المبينة في هذا الفصل مرعية الإجراء والتطبيق على رؤساء السفن ومديري شركات السيارات وعجلات الكراء والمخرجين وأصحاب الجمال وسائر الذين ينقلون البضائع على الإطلاق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (30)
  article_text_ar: 'الدلال : هو من يتوسط بين البائع والمشتري لإتمام البيع بأجرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (31)
  article_text_ar: يتبع فيما للدلال من الحقوق وفيما عليه من الواجبات وفيما يستحقه من الأجرة العرف المطرد والعادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (32)
  article_text_ar: يجب على كل دلال يتعاطى الدلالة في البضائع التجارية بين التجار أن يتخذ له دفتر يومية يقيد فيه أعماله بعد إتمامه يوما فيوما بصورة واضحة مع بيان اسم البائع والمشتري وتاريخ العقد ووقت تسليم البضاعة ومقدارها وجنسها ومقدار ثمنها مع بيان جميع شروط العمل بيانا صحيحا من غير تخلل بياض في الدفتر ولا حصول شطب ولا وضع كلمة فوق أخرى ولا كتابة بين السطور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (33)
  article_text_ar: يجب على الدلالين أن يقدموا دفاترهم مع ما يلزم من الإيضاحات إذا طلبت منهم المحكمة التجارية وليس لهم حق الامتناع بوجه من الوجوه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (34)
  article_text_ar: إذا بيعت بضاعة بواسطة دلال على أنموذج - أي عينة معلومة - وجب عليه حفظها إلى يوم تسليم البضاعة مع التأشير عليها بما يلزم لمعرفتها بدون اشتباه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (35)
  article_text_ar: 'الصراف : هو من يتعاطى مهنة تبديل العملة نقودا وأوراقا نقدية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (36)
  article_text_ar: لا يجوز لأي شخص أن يفتح دكانا أو محلا للصرافة ما لم يستحصل على رخصة من المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (37)
  article_text_ar: يجب على من أراد أن يفتح محلا للصرافة أن يقدم طلبا إلى رئيس الحكومة في البلدة لإجراء التحقيقات الكافلة بواسطة دائرة البلدية وجماعة الصيارف وبعد إعطائه كفيلا اعتباريا وتصديق الكفالة من كاتب العدل يجري تسجيل اسمه في قلم المحكمة التجارية وتعطى له رخصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (38)
  article_text_ar: لجماعة الصيارفة رئيس في كل بلدة يعين بطريق الانتخاب منهم في المحكمة التجارية ويعرض نتيجة الانتخاب من طرف المحكمة لرئيس حكومة البلدة لتعيين المستحق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (39)
  article_text_ar: يجب على كل صراف أن يتخذ له دفترا مختوما من مجلس التجارة مقسوما إلى حقلين (من وإلى) لتدوين كل مقبوض ومدفوع موافقا لشروط المادة 7 من هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (40)
  article_text_ar: يجب على الصراف أن لا يقبل ولا يدفع نقودا مبرودة أو ناقصة عن وزنها ولا زائفة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (41)
  article_text_ar: كل صراف مسئول عن أعماله وانتظام دفاتره وأعمال الأشخاص المستخدمين عنده مما تترتب فيها عقوبة بمقتضى فصل العقوبات :أ- يجب على الطرفين أن يقوموا بكل أمر حكومي إذا بدا للحكومة أي طلب من طريق المالية من قبيل التبديل في المسكوكات بطرق التوزيع والتساوي بين الطرفين مع مراعاة الوقت والحال .ب- يجب على المالية أن لا تأخذ شيئا من الطرفين بطريق التبديل إلا بنقد حينما تقبض تسلم . ج- يجب أن يكون سعر الجنيه أو الريالات بسعر ذلك اليوم الذي تريد المالية تبديل ما تريد تبديله من المسكوكات بغير زيادة ولا نقصان . د- يجب على المالية أن لا تكلف الصرافين في كل وقت بتبديل المسكوكات وإنما يكون تكليفهم حين اللزوم الضروري وبعد موافقة مجلس الوكلاء .هـ- في البلدان التي لا يوجد فيها محكمة تجارية تقوم المجالس البلدية فيها بتطبيق المواد الخاصة بالصرافين بدلا عن المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (42)
  article_text_ar: سندات الحوالة أي السفاتج التي تسحب من محل على آخر يجب أن تؤرخ ويوضح فيها المبالغ المحولة واسم الشخص المحال عليه وتاريخ ومكان الدفع ويبين فيها أنها قيمة بضاعة أو مقابل نقود أو محسوبة لحساب ما ويذكر فيها أن القيمة وصلت وإذا حرر منها عدة نسخ يذكر في كل منها عددها لتقوم الواحدة منها مقام الجميع كما أن جميعها في حكم نسخة واحدة ويضع إمضاء الساحب أو ختمه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (43)
  article_text_ar: يجوز أن تسحب السفاتج على شخص ويشترط فيها الدفع في محل شخص آخر كما يجوز سحبها بأمر شخص على ذمته
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (44)
  article_text_ar: السفاتج المحررة على خلاف الشروط الآنفة الذكر لا تعتبر إلا كسندات عادية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (45)
  article_text_ar: عند حلول أجل دفع قيمة السفاتج يجب أن يكون في ذمة المحال عليه للمحيل أو للآمر بالسحب مبلغ لا يقل عن قيمة السفتجة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (46)
  article_text_ar: الشرح على السفتجة بالقبول دليل كاف على أن القابل مدين للساحب أو الآمر بالسحب بما يقابل الوفاء وعلى الساحب وحده أن يثبت في حالة الإنكار أو الامتناع عن الدفع بعد القبول أن المحال عليه كان مدينا بما يقابل الوفاء حين استحقاق الدفع فإذا لم يثبت ذلك يضمن لحامل السفتجة قيمة الحوالة تماما ولو عملت الإخطارات في مواعيدها . أما في حالة إثباته فتبرأ ذمته بقدر مبلغ مقابل الوفاء المثبت ما لم يكن قد استعمل في منفعة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (47)
  article_text_ar: إذا أفلس الساحب بعد قبول المحال عليه ولو قبل حلول أجل الدفع فلحامل السفتجة دون غيره من غرماء الساحب الحق في استلام مقابل الوفاء الذي عند المسحوب عليه وإذا أفلس المسحوب عليه بعد قبوله فان كان مقابل الوفاء دينا في ذمته فحامل السفتجة أسوة بالغرماء وإن كان مقابل الوفاء أعيانا أو بضائع أو أوراق ذوات قيمة أو مبالغ بأعيانها مودعة فله استلام ذلك ممتازا عن غيره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (48)
  article_text_ar: من قبل السفتجة صار ملزوما بوفاء قيمتها ولو أفلس الساحب بغير علمه قبل قبوله فلا يجوز له الرجوع بعد القبول .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (49)
  article_text_ar: يجب أن تكتب صيغة القبول بعبارة صريحة ويوضع عليها إمضاء القابل أو ختمه مع التاريخ .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (50)
  article_text_ar: لا يجوز تعليق قبول السفتجة على شرط ما، ولكن يجوز أن يكون القبول قاصرا على مقدار معين أقل من قيمة السفتجة وفي هذه الحالة يجب على الحامل أن يعمل الإخطار على الباقى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (51)
  article_text_ar: صاحب السفتجة والمحيلون المتناقلون لها مسئولون على وجه التضامن عن القبول والدفع في ميعاده وملزمون لحاملها بالوفاء على وجه التضامن
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (52)
  article_text_ar: عند امتناع قبول المحول عليه للسفتجة يحرر له الإخطار المعبر عنه ( بالبروتثو ) من دائرة كاتب العدل ويكون كافيا لإثبات الامتناع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (53)
  article_text_ar: يحق لحامل السفتجة بعد إبراز سند إخطاره المذكور أن يطالب محيله بكفيل يضمن قيمة السفتجة في الميعاد المعين ولكل من المحيلين المتناقلين هذا الحق عن التقاعد إلى أن يستقر الأمر على الساحب ومن امتنع عن إحضار الكفيل يلزم بدفع قيمة السفتجة ومصاريف الإخطار والرجوع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (54)
  article_text_ar: يتحتم قبول السفتجة حال تقديمها أو في مدة لا تتجاوز أربعة وعشرين ساعة من حين التقديم فإن لم ترد لحاملها بعد أربعة وعشرين ساعة سواء قبلت أو لم تقبل، كان من حجزها ضامنا لكل ضرر وخسارة تنشأ من ذلك
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (55)
  article_text_ar: إذا عمل الإخطار لعدم القبول يجوز قبولها من شخص آخر متوسط عن صاحبها أو عن أحد المحيلين والمتناقلين ويكتب هذا التوسط في نفس السفتجة وسند الإخطار مع إمضاء المتوسط أو ختمه ويجب على المتوسط إعلان من توسط لأجله على الفور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (56)
  article_text_ar: جميع حقوق حامل السفتجة محفوظة له على الساحب والمحيلين؛ بسبب عدم قبول المسحوب عليه، وإن حصل القبول من متوسط .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 57)
  article_text_ar: لا يجب على المتوسط المذكور دفع قيمة السفتجة في ميعاد استحقاق الدفع إلا بعد عمل الإخطار بعدم الدفع في الميعاد المحدود .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 58)
  article_text_ar: السفاتج المسحوبة لدفع قيمتها حال الاطلاع يجب دفع قيمتها حال تقديمها أما إذا ذكر فيها تاريخ أو مهلة للدفع يتبع مقتضى ما حرر فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 59)
  article_text_ar: إذا وافق ميعاد دفع قيمة السفتجة يوم عيد من الأعياد الرسمية يجب دفعها في اليوم الذي قبله .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 60)
  article_text_ar: تنتقل ملكية السفاتج من واحد لآخر بتحويلها شرحا عليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 61)
  article_text_ar: يؤرخ تحويل السفتجة ويذكر فيها أن قيمتها وصلت ويبين فيها اسم وشهرة من انتقلت تحت إذنه ويضع المحيل إمضاءه أو ختمه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 62)
  article_text_ar: إذا لم يستوف تحويل السفتجة شرائطه المبينة في المادة السابقة فلا يوجب انتقال الملك بل يعد توكيلا اعتياديا في قبض قيمتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 63)
  article_text_ar: تقديم التواريخ في التحاويل عن تاريخها الحقيقي ممنوع وإن حصل يعد ذلك تزويرا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 64)
  article_text_ar: دفع قيمة السفتجة علاوة على كونه مضمونا بالقبول والتحويل يجوز ضمانه من شخص ضمانا احتياطيا ويكون ذلك بكتابه على نفس السفتجة أو في ورقة مستقلة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 65)
  article_text_ar: الضامن الاحتياطي سواء كان عن صاحب السفتجة أو محيلها يكون نظير الساحبين والمحيلين في الضمان بالوفاء على وجه التضامن مالم يوجد شرط بينهما بخلاف ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 66)
  article_text_ar: يجب دفع قيمة السفتجة من نوع النقود المعينة فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 67)
  article_text_ar: لا يجبر حامل السفتجة على استلام قيمتها قبل ميعاد استحقاقها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 68)
  article_text_ar: من دفع قيمة السفتجة قبل ميعاد استحقاقها فهو مسئول عن صحة الدفع
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (69)
  article_text_ar: من دفع قيمة السفتجة في ميعاد استحقاق دفعها من غير تنبيه أو معارضة من أحد يكون دفعه صحيحا وتبرأ ذمته منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (70)
  article_text_ar: إذا دفعت قيمة السفتجة بناء على نسختها الثانية أو الثالثة أو الرابعة وهكذا يكون دفعه صحيحا إن كانت هذه النسخة مكتوبا فيها أن الدفع بناء عليها يلغى ما عداها من النسخ .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 71)
  article_text_ar: إذا دفعت قيمة السفتجة بناء على نسختها الثانية والثالثة أو الرابعة وهكذا من غير استرجاع النسخة التي عليها صيغة قبوله لا يعد دفعه صحيحا ولا تبرأ ذمته بالنسبة لحامل النسخة التي عليها صيغة القبول .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 72)
  article_text_ar: لا يقبل التمنع عن أداء قيمة السفتجة إلا في حالة ضياعها أو ظهور إفلاس حاملها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 73)
  article_text_ar: إذا ضاعت السفتجة التي ليس عليها صيغة القبول يحق لمستحقها أن يطالب بموجب أي نسخة منها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 74)
  article_text_ar: إذا ضاعت السفتجة التي عليها صيغة القبول، فلا تجوز المطالبة بموجب أي نسخة أخرى إلا بعد إحضار كفيل ضامن كفالة مؤقتة إلى ثلاث سنوات وبعد الأمر من مجلس التجارة
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 75)
  article_text_ar: إذا ضاعت السفتجة سواء كان عليها صيغة القبول أم لا ، ولم يمكن تقديم نسخة أخرى منها يجوز لمستحقها أن يطالب لدى المحكمة التجارية بقيمة السفتجة الضائعة ويتحصل عليها بأمر المحكمة بعد إثبات ملكيته لها ، وإعطاء كفيل ضامن كفالة مؤقتة إلى ثلاث سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 76)
  article_text_ar: يحق لمالك السفتجة الضائعة أن يطالب محيله في استحصال نسخة أخرى وعلى المحيل المذكور أن يساعده ويأذن له في استعمال اسمه في إجراء اللازم عند محيله الذي انتقلت إليه السفتجة منه، وهكذا من محيل إلى آخر إلى صاحب السفتجة وجميع المصاريف التي تلزم في ذلك تكون على مالك السفتجة الذي ضاعت منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 77)
  article_text_ar: إذا عرض على حامل السفتجة بعض من قيمتها فلا يجوز له رفضه، وإن كان القبول شاملا لجميع القيمة والبعض المدفوع تبرأ منه ذمة الساحب والمحيلين وعلى حامل السفتجة أن يعمل الإخطار على الباقي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 78)
  article_text_ar: ليس لمحكمة التجارة أن تعطي مهلة من عندها لدفع قيمة السفتجة
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 79)
  article_text_ar: يجوز لأي شخص متوسط أن يدفع قيمة السفتجة عن الساحب أو عن أحد المحيلين بعده بعد عمل الإخطار اللازم ويثبت هذا التوسط وكيفيته في نفس سند الإخطار أو ذيله .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 80)
  article_text_ar: كل من توسط في دفع قيمة سفتجة تنتقل إليه جميع حقوق وواجبات حاملها القانونية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 81)
  article_text_ar: الدفع بالتوسط إن كان عن الساحب برأت ذمة جميع المحيلين وإن كان عن أحد المحيلين برأت ذمة من بعده منهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 82)
  article_text_ar: إذا تزاحم عدة أشخاص على الدفع بالتوسط يقدم منهم من يترتب على دفعه براءة المسئولين أكثر من غيره وإذا تقدم نفس المسحوب عليه الذي قد عمل له الإخطار يكون مقدما على غيره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 83)
  article_text_ar: يجب على حامل السفتجة المسحوبة من سائر بلاد الجزيرة العربية والمملكة المصرية وبلاد السودان والهند البريطانية وبلاد تركيا وسواحل البحر الأبيض المتوسط والبحر الأحمر إذا كانت مستحقة الدفع في المملكة الحجازية حال الاطلاع عليها أو بعد مهلة معينة أن يطالب بقبولها أو دفعها داخل ستة أشهر من تاريخها وإذا كانت مسحوبة من غير ما ذكر من البلدان فيجب عليه أن يطالب داخل سنة كاملة وعين هذه المواعيد تعتبر في السفاتج المسحوبة من المملكة الحجازية المستحقة الدفع في خارجها ويسقط حق حامل السفاتج على المحيلين إذا أخر الطلب عن المواعيد المذكورة في حالة حصول حرب بحرية تضاعف هذه المواعيد
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 84)
  article_text_ar: لا تؤثر أحكام هذه المادة السالفة على الشروط التي تقع بخلافها بين أخذ السفتجة وساحبها والمحيلين، بل تعتبر الشروط وينفذ مقتضاها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 85)
  article_text_ar: يجب على حامل السفتجة أن يطلب دفع القيمة يوم حلول الميعاد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (86)
  article_text_ar: يلزم إثبات الامتناع عن الدفع بعمل الإخطار في اليوم الثاني لميعاد الدفع وتزاد عليه مدة المسافة التي بين محل حامل السفتجة ومركز تحرير الإخطار (كاتب العدل) ويستثنى من هذه المدة المقررة أيام الأعياد الرسمية
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (87)
  article_text_ar: حامل السفتجة وإن عمل إخطارا لعدم القبول أو لمدة المسحوب عليه أو إفلاسه لا يبقى من عمل إخطار آخر لعدم الدفع وإذا كتب صاحب السفتجة أن رجوعها يكون بدون مصاريف، أغنى ذلك عن عمل الإخطار وعن مراجعات المواعيد السالفة وعن الإجراءات المتعلقة بها، وإذا كتب ذلك من قبل أحد المحيلين فإنه يغني عما ذكر بالنسبة للرجوع على الكاتب ومن بعده دون المحيلين قبله .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (88)
  article_text_ar: يحق لحامل السفتجة بعد عمل إخطار عدم الدفع وإخطار عدم القبول أن يطالب الساحب وكل واحد من المحيلين بالانفراد أو جميعهم أو بعضهم ولكل واحد من المحيلين هذا الحق بالنسبة إلى من قبله وتكون هذه المطالبة بعمل الإخطار، فإن لم يحصل دفع القيمة تقام الدعوى في المحكمة التجارية داخل خمسة عشر يوما من تاريخ سند استلام الإخطار وتزاد على هذه المدة مدة المسافة التي بين حامل السفتجة ومجلس التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (89)
  article_text_ar: 'بعد عمل الإخطار عن السفاتج المسحوبة من المملكة الحجازية المستحقة الدفع في الخارج تحصل مطالبة الساحبين والمحيلين في المملكة الحجازية في المواعيد الآتية : 1- ثلاثة أشهر لبلاد الجزيرة العربية ومصر وتركيا وسواحل البحر الأحمر .2- ستة أشهر لسواحل البحر الأبيض المتوسط والهند البريطانية .3- سنة كاملة لما عدا ذلك من البلدان .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 90)
  article_text_ar: إذا طلب حامل السفتجة جميع المحيلين والساحب معا، كان له بالنسبة لكل واحد منهم الميعاد المبين في المادة السابقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 91)
  article_text_ar: لكل واحد من المحيلين حق مطالبة من له الرجوع عليه بالانفراد أو الاجتماع في عين المواعيد المذكورة وتبتدئ هذه المواعيد بالنسبة لكل واحد منهم من تاريخ تقديم الدعوى عليه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (92)
  article_text_ar: لا حق لحامل السفتجة على المحيلين إذا مضت المواعيد المقررة لتقديم السفتجة أو مواعيد عمل الإخطار أو مواعيد تقديم الدعوى والمطالبة فلا تسمع دعواه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 93)
  article_text_ar: لا حق لحامل السفتجة ومحيلها في الرجوع على الساحب إذا ثبت أن له مقابل الوفاء عند المسحوب عليه في وقت استحقاق الدفع وفي هذه الحالة لا يبقى لحاملها حق المطالبة إلا على المسحوب عليه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 94)
  article_text_ar: يعود لحامل السفتجة الحق في مطالبة الساحب والمحيلين إذا وصلت لأحدهما بعد مضي المواعيد المقررة السالفة الذكر المبالغ التي كانت معينة لوفاء قيمة السفتجة سواء كان وصولها بواسطة حساب أو بطرق المقاصة أو بوجه آخر فتسمع دعواه على من وصلت إليه حينئذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 95)
  article_text_ar: يحق لحامل السفتجة بعد عمل إخطار عدم الدفع إضافة على ما له من الحقوق أن يحجز منقولات وديون الساحب أو القابل أو المحيل حجزا احتياطيا بواسطة مجلس التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 96)
  article_text_ar: يحرر الإخطار بعدم القبول وإخطار عدم الدفع بواسطة كتاب العدل حسب قانونه الخاص وحيث لا يوجد كاتب عدل فيكون ذلك من وظائف رؤساء كتاب المحكمة الشرعية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 97)
  article_text_ar: يجب أن تشتمل ورقة الإخطار على صورة السفتجة حرفيا وصورة صيغة القبول (إذا كانت شرحت بالقبول) وصورة جميع التحاويل وكافة ما يوجب فيها من الكتابات وعلى التنبيه الرسمي بدفع القيمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 98)
  article_text_ar: لا تقوم أي ورقة محررة من قبل التجار أو غيرهم بصورة شهادة مقام سند الإخطار .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 99)
  article_text_ar: يحق لحامل السفتجة بعد عمله الإخطار أن يسحب سفتجة جديدة على صاحب السفتجة الأصلية أو على أحد محيليها ليتحصل بها على قيمتها الأصلية وعلى المصاريف التي صرفها وتسمى هذه السفتجة الجديدة ( سفتجة الرجوع ) .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 100)
  article_text_ar: ترفع سفتجة الرجوع بقائمة حساب الرجوع المشتمل على قيمة السفتجة الأصلية وعلى بيان مصاريف الإخطار وغيره من المصاريف التي تسببت عن السفتجة الأصلية وتوضع عليها شهادة تاجرين معروفين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 101)
  article_text_ar: لا يجوز عمل قوائم متعددة لحساب رجوع سفتجة واحدة ويدفع هذا الحساب من محيل إلى محيل بالتسلسل إلى أن يدفع أخيرا من الساحب
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 102)
  article_text_ar: كل دعوى تتعلق بالسفاتج بأنواعها لا تسمع بعد مضي الخمس سنوات اعتبارا من تاريخ إخطار عدم الدفع أو من يوم آخر مرافعة بالمحكمة إذا لم يصدر فيها حكم أو لم يحصل اعتراف بها، وإنما على المدعى عليه أن يحلف بالمحكمة التجارية يطلب المدعي تأييدا لبراءة ذمته كما أن على ورثته أن يحلفوا بطلبه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 103)
  article_text_ar: المفلس من استغرقت الديون جميع أمواله فعجز عن تأديتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 104)
  article_text_ar: 'الإفلاس ثلاثة أنواع؛ الأول: الإفلاس الحقيقي ، الثاني: التقصيري، والثالث: الاحتيالي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 105)
  article_text_ar: 'المفلس الحقيقي : هو الذي اشتغل في صنعة التجارة على رأس مال معلوم يعتبره العرف كافيا للعمل التجاري الذي اشتغل فيه ووجدت له دفاتر منظمة ولم يبذر في مصرفه ووقع على أمواله حرق أو غرق أو خسارات ظاهرة فإذا توفرت فيه هذه الشروط يكون مفلسا حقيقيا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 106)
  article_text_ar: المفلس المقصر هو التاجر الذي يكون مبذرا في مصاريفه ولم يبين عجزه في وقته بل كتمه على غرمائه واستمر يشتغل في التجارة حتى نفذ رأس ماله وإن وجدت له دفاتر منظمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة ( 107)
  article_text_ar: 'المفلس الاحتيالي : لا يعبر عنه بمفلس إلا لتوزيع موجوداته على غرمائه بل هو محتال والمحتال من استعمل ضروب الحيل والدسائس في رأس ماله أو قيد بدفاتره ديونا عليه باسم أحد آخر بصورة كاذبة أو حرر بها سندات أو فراغ أمواله وعقاره إلى غيره بطريقة نقل الملك أو أخفى شيئا من أمواله، واشتغل في التجارة بطريق التمويه والاحتيال أو تغفيل التجار على أي صورة كانت وسواء كان مبذرا، أو لم يكن مبذرا أو لم توجد له دفاتر أو وجدت، وكانت غير منظمة وأضاع حقوق العباد بتلك الصورة، فيكون محتالا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (108)
  article_text_ar: إعلان الإفلاس إما أن يكون بطلب من المفلس مباشرة أو بطلب من أحد غرمائه
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (109)
  article_text_ar: على المفلس أن يقدم دفاتره مع سندات الديوان المطلوبة له إلى المجلس مشفوعة بجدول يحتوي أصل رأس ماله اعتبارا من تاريخ اشتغاله بالتجارة إلى يوم إفلاسه وما وقع عليه من الخسارة ومصاريفه وجميع ما له وعليه. وفي الحال يجب على المجلس أن يوقفه أو يضعه تحت مراقبة الشرطة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (110)
  article_text_ar: على المحكمة بعد أن تدقق الأوراق المقدمة من المفلس مع الجدول والدفاتر المذكورة في المادة السابقة والاستدعاء الذي يقدم من المفلس أو أحد غرمائه بطلب إفلاسه تقرر المحكمة الحجز عليه وإعلان إفلاسه وتعتبر تصرفاته الفعلية والقولية غير نافذة اعتبارا من تاريخ قرار الإفلاس أما إذا وقع الإفلاس على الشركة المعبر عنها بشركة المفاوضة فكما تحجز كافة أموال الشركة تحجز أيضا أموال الشركاء المتضامنين لكونهم مسئولين من جهة التضامن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (111)
  article_text_ar: إعلان إفلاس المفلس يكون بتحرير إعلانات من المحكمة بقدر الكفاية وتلصق بالشوارع في محل ممر الناس وإن كان له معاملة في بلدة أخرى فترسل من الإعلانات المذكورة نسخ بقدر الكفاية إلى أكبر مأمور في تلك الجهة ضمن مذكرة من الرئيس بواسطة الحكومة المحلية لتلصق تلك الإعلانات في الشوارع على الصورة المتقدمة ويعلن في الجريدة وتضرب لحاضري البلدة الموجود بها المحكمة مدة لا تزيد عن عشرة أيام وفي الخارج بالنسبة إلى بعد المسافة ووجود الوسائط على أن كل من له دين على المفلس يراجع أمين المجلس وأمناء الديانة الذين تنتخبهم المحكمة للتحقيق وقيد مطلوباتهم داخل المدة المذكورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (112)
  article_text_ar: على المحكمة أن تعين مأمور من طرفها أحد الأعضاء ويعبر عنه بأمين المجلس وعلى الديانة أن ينتخبوا ذاتين منهم أو من وكلاء الدعاوى المعروفين بالدراية والاستقامة لدى المحكمة ويعبر عنهم بأمناء الديانة وعلى المحكمة أن تبلغهم ذلك بمذكرات رسمية وتعين لهم محلا مخصوصا للاجتماع فيه وتحقيق ما هو للمفلس وعليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (113)
  article_text_ar: على أمين المجلس \ 1 وأمناء الديانة الاهتمام في تحقيق ما على المفلس واستحصال جميع الديون المطلوبة له وأن يجروا قيدها بمفرداتها بدفتر مخصوص ومن يمتنع من أداء ما عليه للمفلس من الديون ويصر على عدم تسليمها إلى أمين المجلس وأمناء الديانة يجرون محاكمته بالمحكمة سواء كان بمعرفة واحد منهم أو بتعيين محام عنهم وللمحكمة الحق في إحضار المفلس واستجوابه والاستيضاح منه فيما تمس إليه الحاجة كما أنه له الحق في تعيين الوكلاء والمستخدمين مع أمين المجلس وأمناء الديانة حسبما تدعو إليه الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (114)
  article_text_ar: أن أمين المجلس وأمناء الديانة يتولون حجز أموال المفلس المنقولة وغير المنقولة ويبيعونها بالمزاد العلني على الصورة المتقدمة في بيع الأموال المحجوزة بعد قرار من المحكمة وكما هو ممنوع حجزه في فصل الحجز كذلك هو ممنوع حجزه في مواد الإفلاس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (115)
  article_text_ar: في أثناء هذه المعاملة والتحقيقات التفليسية إذا طلب المفلس الذي قد أدى واجباته بمقتضى المادة (113) إطلاقه من التوقيف ولم يمانع من ذلك أمين المجلس وأمناء الديانة فبعد إعطائه كفيلا معتبرا بعدم مبارحة البلدة وبحضوره عند اللزوم تقرر المحكمة إطلاقه مؤقتا إلى ظهور النتيجة الأخيرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (116)
  article_text_ar: أن كل دائن لم يحضر في خلال المدة المذكورة في المواد السابقة لقيد مطلوبه لدى أمين المجلس وأمناء الديانة لا يقبل منه قيد أي شيء بعد مرور تلك المدة، بل له أن يقيم دعواه بالمجلس بمحضر أمناء الديانة أو وكيلهم وبعد المحاكمة تحكم المحكمة بما يظهر لديها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (117)
  article_text_ar: إذا كان الدائن الغائب في خلال المدة المضروبة له راجع المجلس برقيا أو بموجب عريضة أو بواسطة وكيل عنه فوجد دينه من الديون المتحققة بدفاتر المفلس يقيد دينه وتحفظ حصته إلى حين حضوره أو نائب عنه وإذا لم يراجع في خلال تلك المدة يجري فيه حكم المادة (116).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (118)
  article_text_ar: ينفق على المفلس وعلى من تلزمه نفقته من موجوداته التي تحت يد أمين المجلس وأمناء الديانة إذا كان المفلس حقيقيا أو مقصرا إلى أن يفرغ من قسمته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (119)
  article_text_ar: إن إيجارات المسكن ومحلات التجارة وأجر الخدم والكتبة ومهر الزوجة كل ذلك من الديون الممتازة على سائر الغرماء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (120)
  article_text_ar: الوديعة التي توجد ضمن أموال المفلس مكتوب عليها اسم صاحبها تسلم له عينا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (121)
  article_text_ar: كل من يوجد بيده رهين؛ سواء كان عقارا أو منقولا فيباع الرهن المذكور ويعطي للمرتهن كامل دينه من ثمن الرهن فإذا زاد شيء بعد مطلوب المرتهن يضم إلى موجودات المفلس وإن نقص يرجع المرتهن بما ينقص على موجودات المفلس مع بقية الديانة بقدر ما ينقص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (122)
  article_text_ar: بعد إتمام جميع ما ذكر في المواد السابقة تجمع أثمان المبيوعات والنقود والديون المتحصلة ويخصم منها جميع المصاريف والرسوم وما يبقى يجري توزيعه على الديانة بموجب جدول كل على قدر حصته بحساب الغرامة والإمضاء في ذلك الجدول من جميع الدائنين ويصدق عليه بقرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (123)
  article_text_ar: الجدول المذكور يحرر على ثلاث نسخ؛ نسخة تعطى لأمناء الديانة والثانية للمفلس والثالثة تبقى أساسا بالمحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (124)
  article_text_ar: إذا أصر أحد الديانة على عدم قبول حصته من موجودات المفلس فتحفظ حصته بصندوق المجلس إلى حين طلبه تعطى له أو لورثته بعد موته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (125)
  article_text_ar: إذا قدر بأن جميع الديانة تصالحوا مع المفلس فيحرر بكيفية الصلح تقرير منهم مفصل به الصلح الواقع وفيما إذا كان الصلح على مبلغ معين معلوم يدفع لهم ويجرى إسقاط ما بقي لهم أو كان الصلح على تسليم شيء وتقسيط الباقي وبيان أوقات التقاسيط ويقدم للمحكمة وبعد التصديق عليه من المحكمة يجرى تنفيذ أحكامه حسب الأصول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (126)
  article_text_ar: ورقة الصلح المذكورة في المادة السابقة تحرر على ثلاثة نسخ ممضاة من المفلس وديانته مؤرخة بتاريخ البدء والشهر وبعد تصديقهم على ما في المادة السابقة تعطى نسخة إلى أمناء الديانة والثانية للمفلس والثالثة تبقى أساسا بقلم المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (127)
  article_text_ar: بعد إتمام كل ما ذكر تعطى الأوراق والدفاتر وكل ما هو عائد للمفلس من معاملة الإفلاس إلى المفلس ويؤخذ منه سند باستلام ذلك وعلى أمين المجلس وأمناء الديانة أن يحرروا تقريرا بذلك للمحكمة وبهذه تنتهي مأموريتهم فتقرر المحكمة رفع الحجز عن المفلس بعد ذلك إذا أقيمت دعوى على المفلس أو معارضة في أي أمر كان من أمور الإفلاس يجرى فصل ذلك بالمحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (128)
  article_text_ar: كل دعوى واعتراض يحصل من قبل سائر الديانة على أمين المحكمة أو على أمناء الديانة تفصل تلك الدعوى أو ذلك الاعتراض بمعرفة المحكمة على أن يجدر بالمحكمة إذا رأت لزوما لتبديل أمين المحكمة وأمناء الديانة فلها ذلك وانتخاب بدلهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (129)
  article_text_ar: إذا قبل بعض الديانة الصلح الواقع ولم يقبل بعضهم سواء تساوت حصصهم أو لم تتساو فتحفظ حصة الممتنع عن الصلح بصندوق المحكمة وللممتنع عن الصلح حق في مطالبة المفلس بجميع حقوقه في أي وقت شاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (130)
  article_text_ar: لكل فرد من أفراد الديانة الحق في مطالبة ما يتبقى له بعد توزيع موجودات المفلس على الديانة في أي وقت كان من الأوقات عند ظهور مال في يده ما لم يوجد في صك المصالحة أو جدول توزيع الديون وقوع إبراء عام أو خاص بخصوص الإفلاس فإذا وجد الإبراء فلا تسمع دعواه بعدئذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (131)
  article_text_ar: إن مرور الزمن في حق المفلس يعتبر من بعد زوال الإفلاس وهي خمسة عشر سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (132)
  article_text_ar: يمكن للمفلس الحقيقي إذا سدد جميع ديونه الأصلية مع المصاريف أن يعيد اعتباره التجاري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (133)
  article_text_ar: لا يعاد إلى المفلس الاحتيالي اعتباره ولا لمن حكم عليه بسرقة أو خيانة أو إخفاء شيء من أمواله وامتنع عن تقديم حسابه بمقتضى المادة (109)، أما المفلس المقصر فيجوز إعادة اعتباره بعد أداء كافة ديونه وإجراء العقوبة عليه حسب العقوبات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (134)
  article_text_ar: يجب على طالب إعادة اعتباره أن يقدم عريضة إلى مقام النيابة العامة مرفوقة بصورة سندات المخالصة مع غرمائه لتحال إلى المحكمة التجارية للاستعلام وإجراء التحقيق وإعلان طلبه في المحل الذي أفلس فيه بإلصاق إعلانات ونشرها في الجرائد ولكل من لم يدفع إليه دينه ولكل خصم ذي شأن في موضوع إعادة اعتباره أن يعارض لدى المحكمة التجارية في مدة شهرين اعتبارا من تاريخ الإعلان فإذا لم يوجد معارض داخل المدة المذكورة تقرر المحكمة إعادة اعتباره ويسجل ذلك ويعلن بالجرائد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (135)
  article_text_ar: إذا توفي التاجر قبل إعطاء القرار بإفلاسه فصلاحية حجز تركته وتقسيمها وإثبات ديونها عائد للمحكمة الشرعية أما إذا توفي في حالة الإفلاس فحجز تركته وبيعها من صلاحية محكمة التجارة حسبما تقدم لكون تركته مستغرقة بديونه فلا حق للورثة فيها
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (136)
  article_text_ar: المفلس احتيالا المنصوص عليه في المادة (107) من هذا النظام ومن يثبت أنه شريكه في إخفاء أمواله وترتيب حيله يعاقب بالحبس من ثلاث سنوات إلى خمس سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (137)
  article_text_ar: المفلس تقصيرا يعاقب بالحبس من ثلاثة أشهر إلى سنتين وكذا المفلس الحقيقي إذا امتنع عن تقديم ما ألزم به بموجب المادة (109).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (138)
  article_text_ar: كل تاجر باع شيئا من أمواله وأموال موكله التي هي تحت تصرفه بيعا صحيحا ثم أعطى للمشتري سند الفسح ( الستمى ) باستلامه من المخزن ثم نكث عن بيعه وعارض في تسليم المبيع ولو بصورة التواطؤ مع أمين المخزن (يعنى مقدم الحوش ) لزيادة سعر المبيع أو نحو ذلك من الأسباب غير الشريفة يعتبر ذلك التاجر مع الأمين الذي قد تواطأ معه قد أساء استعمال الأمانة والشرف التجاري ويلزم بتسليم المبيع عينا وتماما وإذا نقص من المبيع شيء بتصرف البائع يلزم بفرق السعر هذا إنه يستحق الحبس مع الأمين المتواطئ من شهر إلى ثلاثة أشهر
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (139)
  article_text_ar: كل من أساء الاستعمال من التجار في احتياجات صبي مميز بأن احتال عليه لأخذ وثيقة منه على أي صورة كانت سواء تضمنت استقراض دراهم واستعارة أشياء أو إعطاء أوراق أو إبراء أو اعترافا عدا تضمنه ما يلحق الصبي من الأضرار يحبس من ثلاثة أشهر إلى سنة أو بغرامة نقدية من خمسين جنيها إلى مائة جنيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (140)
  article_text_ar: من أساء الاستعمال في سند أو ورقة فيها ختم أو إمضاء أو في دفتر تجاري بتبديل كلمات أو إدخال عبارات تقضى تعهد أو إبراء على وجه الاختلاس والتزوير يعاقب بالحبس من ثلاثة أشهر إلى سنة - أو بغرامة من خمسين جنيها إلى مائة جنيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (141)
  article_text_ar: لا يسوغ للوكيل بالعموم ولا للدلال أن يشتري من نفسه لنفسه مال موكله ما لم يكن بإذن المالك واطلاعه وإذا فعل ذلك بدون دراية صاحب المال أو المالك اختلاسا لترقي الأسعار أو نحو ذلك من الأسباب غير الشريفة يعد مختلسا ويجازى بالحبس من شهر واحد إلى سنة واحدة أو بغرامة من عشرة جنيه إلى خمسين جنيها
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (142)
  article_text_ar: كل من يجسر من التجار والدلالين أي السماسرة بأنواعهم على نشر أمور غير صحيحة بين الناس افتراء بقصد تشويش الأفكار لزيادة أسعار شيء من الأموال أو نقصانه يعاقب بالحبس من شهر إلى ثلاثة أشهر أو بغرامة مالية من عشرة جنيه إلى خمسين جنيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (143)
  article_text_ar: كل دلال يدخل فسادا أو غشا أو تغريرا في بيع وشراء البضائع، أو يخفي الأثمان الحقيقية بالزيادة أو التنقيص، يعد خائنا ويعاقب أول مرة بالحبس شهرا أو بغرامة مالية من خمسة جنيهات إلى عشرة جنيهات، وإذا تكرر ذلك يحرم من تعاطي مهنة الدلالة مع الحبس إلى سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (144)
  article_text_ar: كل دلال يخالف مضمون المواد 32- 33- 34 يجازى بحرمانه من تعاطي مهنة الدلالة شهرا وإذا تكرر ذلك منه تضاعف المدة وبعد ثلاث مرات يحرم بالكلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (145)
  article_text_ar: كل صراف يدفع نقودا مبرودة أو ناقصة، أو يرتكب أي نوع من أنواع الغش والاختلاس يجازى في أول مرة بإغلاق محله شهرا، وإذا عاد لذلك يحبس من شهر إلى ثلاثة أشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (146)
  article_text_ar: كل صراف يدفع أو يتعاطى نقودا زائفة وهو يعلم بها على وجه التدليس يعاقب بالحبس من ثلاثة أشهر إلى سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (147)
  article_text_ar: كل تاجر يخالف مقتضى المادة (5) يجازى بالحبس من عشرة أيام إلى ثلاثة أشهر أو بغرامة مالية من عشرة جنيهات إلى خمسين جنيها على حسب مقتضى جريمته وحاله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (148)
  article_text_ar: إذا ثبتت أية حيلة أو خيانة من أحد أمناء النقل برا أو بحرا أو أحد أمناء البيع أو أمناء الحفظ في إتلاف أو إضاعة البضائع المؤتمنة فضلا عن الضمان يعاقب بالحبس من شهر إلى ستة أشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (149)
  article_text_ar: من ارتكب شيئا من أنواع الحيل بأن أظهر عقدا مباحا يريد به محرما؛ مخادعة وتوسلا إلى الربا كما لو باع بضاعة بثمن مؤجل، ثم اشتراها بنفسه أو وكيله أو بواسطة أخرى أقل من قيمة البيع نقدا، أو أقرض آخر شيئا وباعه أموالا بزيادة فاحشة في القيمة، يعد ذلك ربا، وله رأس ماله وعدا عن ذلك يجازى بالحبس من ثلاثة أشهر إلى سنة مع تشهيرهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (150)
  article_text_ar: لا يقدر حد أن يملك أو يتصرف بسفينة حاملة علما عربيا حجازيا سواء كان بجميعها أو بحصة منها ما لم يكن من تبعة الحكومة العربية الحجازية، غير أنه يسوغ بيع جميع السفينة التي هي بتصرف التبعة العربية الحجازية إلى الأجنبي بعد أن تسترد البراءات والأوراق التي تعين التابعية العربية الحجازية
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (151)
  article_text_ar: الذين هم من تبعة الدولة العربية الحجازية مأذونون بأن يتصرفوا بالسفن الأجنبية ويسافروا عليها رافعين علما عربيا حجازيا وفقا للشروط المختصة بالسفن العربية الحجازية، إنما لا يدرج في سند التملك الذي ينظمه الطرفان حين مشتري مثل هذه السفن الأجنبية شيئا من الشروط والمقاولات يعود لمنفعة الأجنبي ومغاير لحكم المادة السابقة وإلا فتضبط تلك السفينة من جانب الميري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (152)
  article_text_ar: بيع السفينة كاملة أو حصة منها سواء كان قبل سفرها أو في أثناء السفر إذا وقع في ممالك الحكومة الحجازية يجري بسند رسمي بحضور رئيس الميناء في محله وإذا وقع في الممالك الأجنبية فبمواجهة معتمدي الحكومة العربية الحجازية، وإذا لم يحصل على هذه الصورة فيكون البيع كأنه لم يكن، لكن إذا حصل هذا المبيع في محل من الممالك العربية ليس فيه رئيس ميناء فيجري في مجلس المدينة ، ويخبر بذلك رئيس الميناء الموجود في أقرب محل لتلك المدينة، وأما إذا وقع في محل من الممالك الأجنبية لم يكن به معتمد للحكومة العربية فيجري بمعرفة المأمور المخصوص بحكومة ذلك المحل بشرط أن يعطى خبر لمعتمد الحكومة العربية الموجود في تلك الحكومة؛ ليعلم الكيفية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (153)
  article_text_ar: كل أنواع السفن تعد من الأشياء المنقولة، إلا أن صاحب السفينة إذا كان مديونا بسبب تلك السفينة وباعها لشخص آخر ثالث مثل الأشياء غير المنقولة فيمكن لأصحاب المطاليب أن تضبط تلك السفينة من يد الرجل الثالث الذي اشتراها وتبيعها وبناء على ذلك تكون السفن أمثال هذه مخصوصة لوفاء ديون أصحابها وعلى الخصوص الديون التي تعد ممتازة نظاما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (154)
  article_text_ar: 'الديون المبينة فيما يلي يرجح بعضها على بعض وتعد ممتازة بحسب الترتيب الآتي: أولا- مصاريف الدعاوى وغيرها التي تحصل من جراء بيع السفينة وتوزيع أثمانها الحاصلة. ثانيا- أجرة الدليل وما يؤخذ بنسبة الطونيلاتة أو الكيل من رسم أسكلة وخرج ورسومات المرسى والحوض. ثالثا- أجرة الناطور وباقي مصاريف محافظة المراكب من حين دخوله إلى الميناء إلى حين بيعه. رابعا- أجرة المخزن الموضوعة به أدوات السفينة وآلاتها أمانة. خامسا- مصاريف محافظة السفينة وأوائلها وباقي أدواتها في أثناء سفرها الأخير وفي مدة دخولها الميناء وربطها بها. سادسا- أجرة القيودات ومعاشات الملاحين الذين كانوا يديرونها في سفرها الأخير . سابعا- الدراهم التي استقرضها القبودان في أثناء سفر السفينة الأخير وثمن البضاعة التي باعها من حمولة السفينة لأجل لوازمها. ثامنا- الدراهم الباقية دين إلى البائع من ثمن السفينة التي لم تزل ما سافرت والدراهم التي أعطيت قرضا وثمن الكرسنة وباقي الأشياء وأجرة العملة المستخدمين لأجل إنشائها. والدراهم الموجودة دين بالوقت الحاضر للخارج لأجل لوازم السفينة التي سافرت وإصلاحها وأجرة العملة والقلفطة ووضع القوماتية
    والآلات والملاحين قبل خروجها إلى السفر. تاسعا- الاستقراضات البحرية الواقعة على المركب وآلاته قبل خروجه للسفر لأجل تعميره وتموينه وزينته وباقي احتياجاته. عاشرا- أجرة السيكورتاه المعقودة على المركب وآلاته وزينته في سفره الأخير . الحادي عشر- الضمان الواجب إعطاؤه من الأضرار والخسائر عما ضاع من البضائع والأشياء التي كانت موسوقة في السفينة وفقدت ولم تسلم إلى صاحبها بسبب تقصيرات الربان والملاحين ولإتلاف (الأوراتة) يعني ما كان من قبيل الخسارات البحرية ثمن السفينة المباعة لأجل الدين إذا كان لا يقوم بوفاء جميع الديون، فحينئذ تجتمع أصحاب المطلوبات المسطرة في كل فقرة من هذه المادة، وكل منهم يأخذ حصته غرامة من الثمن المذكور بنسبة مطلوبة بحيث لا يحصل عند إجراء هذا الأمر خلل ما في حكم المادة (311) التي سيأتي بيانها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (155)
  article_text_ar: أمناء الديون المحررة في المادة السابقة لا يقبل ما لم يثبت على الوجه الذي سيأتي تصريحه فيما يلي:أولا- مصاريف الدعاوى تكون مثبتة بقوائم مفردات يصادق عليها من قبل مجلس التجارة الذي يكون حكم ضبط السفينة وبيعها. ثانيا- أجرة الدليل ورسومات الأسكلة والمرساة والحوض يثبت بلوائح تعطى من طرف الذين أخذوها.ثالثا- الديون المبينة في الفقرات الأولى والثالثة والرابعة والخامسة من المادة (154) تبين بقوائم مفردات يصادق عليها من طرف محكمة التجارة . رابعا- أجرة الملاحين ومعاشاتهم تتحقق من دفاتر النوتية التي تدون في دوائر الميناء أو في مكاتب التجارة في المحلات التي لا يوجد بها دوائر ميناء .خامسا- الدراهم التي تستقرض وثمن الأموال والأشياء التي تباع من حمولة السفينة لأجل لوازمها في سفرها الأخير تبين بمضابط تنظم من طرف الربان والملاحين الموظفين تصديقا للزوم الاستقراض.سادسا- بيع كامل السفينة أو حصة منها يثبت بسند رسمي ينظم حسب شروط المادة (152) المسطرة أعلاه والدراهم وباقي الأشياء التي تعطى لأجل إنشاء السفينة وتزيينها وتجهيز لوازمها وتموينها يثبت بقوائم ولوائح تنظم نسختين من طرف صاحب المركب أيضا
    ويصادق عليها من طرف الربان وتوضع نسخة منها قبل قيام المركب وحركته أو بعد ذلك بعشرة أيام على الأكثر أمانة في قلم مجلس التجارة أو المكاتب التجارية سابعا- الدراهم ؛ الاستقراضات البحرية تقع قبل حركة السفينة على فلايك السفينة وآلاتها وزينتها وباقي لوازمها تثبت بالمقاولة التي تنظم نسختين رسما أو فيما بين الطرفين فقط ونسخته الثانية توضع أمانة في قلم مجلس التجارة أو مكاتب التجارة بظرف عشرة أيام على الأكثر من تاريخها.ثامنا- خرج السيكورتاه ورسوماتها تبين باللوائح التي تعطى من طرف كمبيالات وكالات السيكورتاه أو بقوائم الإجمال المخرجة من دفاترها المنظمة.تاسعا- تضمينات الأضرار والخسائر التي يلزم إعطاؤه لمستأجري السفينة تتحقق بصكوك محكمة التجارة أو بأوراق قرار المميزين إذا ارتضى الطرفان أن ترى دعواها بمعرفة مميزين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (156)
  article_text_ar: امتيازات أصحاب المطاليب السالفي الذكر تفسخ ببيع السفينة حكما حسب الشروط التي تبين في الفصل الآتي، وإذا كانت السفينة بيعت على رضا ولم يحصل نوع من المخالفة أي الاعتراض من أصحاب ديون البائع وسافرت بحرا على اسم مشتريها وربحه وخسارته هذا ما عدا الأسباب العمومية التي توجب فسخ التعهدات المعتادة إلا أنه إذا وقعت مخالفة من أحد أصحاب المطاليب توفيقا إلى الرسوم والقاعدة المقررة نظاما في هذا الخصوص حسب المنوال المحرر فيستفيد من ذلك الشخص المخالف فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (157)
  article_text_ar: من بعد سفر السفينة بثلاثين يوما وحصول التصديق على سفرها ووصولها إلى أسكلتين كل منهما على انفراد ومرور مدة تزيد عن ستين يوما من حين رجوعها إلى المرسى التي تكون سافرت منها بدون أن تصل إلى إحدى الأساكل أو سافرت سفرا بعيدا يتجاوز الستين يوما ولم يقع نوع من الطالب والادعاء من طرف أصحاب ديون البائع فتعتبر حينئذ تلك السفينة بأنها سافرت بحرا
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (158)
  article_text_ar: بيع السفينة بالرضا أثناء سيرها وسفرها لا يورث خلل في حقوق أصحاب ديون البائع وامتيازاتها وبناء عليه لا يخلص السفينة ولا ثمنها من كونها رهنا إلى أصحاب المطاليب وعدا عن ذلك يمكن لأصحاب المطاليب المذكورين أن يطلبوا فسخ هذا البيع وإلغائه مدعين بأن هذا البيع إنما حصل بصورة الحيلة والدسيسة لأجل إبطال حقوقهم وامتيازاتهم
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (159)
  article_text_ar: كل نوع من السفائن والمراكب البحرية يمكن أن يضبط ويباع بحكم محكمة التجارة وبموجب إعلامها ويلغى امتياز أصحاب الديون بإجراء الأصول والقواعد التالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (160)
  article_text_ar: من بعد صدور حكم محكمة التجارة السالف الذكر وإعلامها حسب استدعاء صاحب الدين الذي طلب ضبط السفينة يؤمر المديون رسما ويكلف في أول الأمر إلى وفاء الدين أن يحصل التشبث بضبط تلك السفينة وما لم تمر على هذا الطلب مدة أربعة وعشرون ساعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (161)
  article_text_ar: يجري الأمر والتكليف المذكور بمعرفة الحكومة المحلية وإذا لم تكن الدراهم المطلوب إيفاؤها من الديون الممتازة على السفينة فيتبلغ ذلك إلى صاحب السفينة أو إلى محل إقامته إنما اذا كان الدين معدودا من الديون الممتازة على السفينة بمقتضى أحكام المادة (154) المسطرة فيما سبق فيمكن حينئذ أن تبلغ قضية الأمر والطلب إلى صاحب السفينة أو إلى ربانها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (162)
  article_text_ar: 'إذا أمكن صاحب الدين الحصول على مطلوبه في ظرف (24) ساعة من قضية الأمر والتكليف الذي مر بيانه فيحصل التشبث من طرف الحكومة بضبط السفينة توفيقا إلى الأصول والقاعدة التي تبين فيما يأتي: وهي المأمور الذي يتعين خصيصا برفق المهندس يستصحب معه شاهدين ويتوجه إلى السفينة وينظم مضبطة قضية الضبط ويذكر في هذه المضبطة اسم صاحب الدين الطالب هذا الضبط وشهرته وصنعته ومحل إقامته والإعلام الذي هو أساس لإجراء المعاملة الجارية ومقدار الدراهم المطلوبة ومحل محكمة التجارة التي تطلب بيع السفينة بحضورها ومحل الإقامة الذي ينتخبه ويعينه الدائن المرقوم في المحل التي تكون السفينة رابطة فيه واسم صاحب السفينة وربانها وشهرته واسم السفينة ونوعها ومقدار حمولتها أما باعتبار الطونيلانة أو باعتبار الكيلة ويقيد ما خلا ذلك التصريح ما يوجد فيها من الفلايك والقوارب والآلات والأدوات والأسلحة والمهمات والتموين ويذكر أيضا أنه قد تعين نفرا للنظارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (163)
  article_text_ar: ينبغي على الشخص الذي ضبط السفينة أن يبلغ المديون صاحب السفينة المضبوطة إذا كان مقيما في البلد الموجود بها محكمة تجارية التي ضبطت السفينة أو على مسافة ست ساعات منها صورة المضبطة المذكورة بظرف ثلاثة أيام ويدعوه مع ذلك إلى الحضور للمحكمة المذكورة في ظرف المهل العادية المعينة في نظام أصول محاكمة المحكمة التجارية ليكون حاضرا على تشبثات مبيع السفينة المضبوطة ومتفرعاتها لكن إذا كان موجودا في محل أبعد من ذلك فتعطل صورة المضبطة وتذكرة طلبه إلى ربان السفينة المذكورة وإن لم يكن الربان موجودا فإلى من كان وكيلا لصاحب السفينة أو ربانها وإذا قدر وكان صاحب السفينة ساكنا في محلات برية من الممالك العربية الحجازية فيضم زيادة على المهل المعتاد المخصوص لجلبه ودعوته يوما لكل مسافة مرحلة من محل المحكمة إلى محل إقامته، وإذا كان ساكنا في محل خارج عن أراضي الممالك العربية الحجازية أو في ديار أجنبية فيجري أمر تبليغه وجلبه في ظرف المهل المبين في المادة (423) من نظام المجلس التجاري ولدى الاقتضاء تراجع أيضا المادة (429) من النظام المذكور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (164)
  article_text_ar: يجري بيع السفينة الصادر إعلام بيعها من المجلس التجاري بالمزاد العلني بمعرفة مأمور يتعين على الوجه الآتي بيانه بعد أن ينشر ويعلن الأمر بواسطة مناد وأوراق مطبوعة وإعلانات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (165)
  article_text_ar: إذا كانت السفينة التي تضبط وتباع أكبر من محمول عشر طونيلانات يعني أربعمائة كيلة فينشر أمر بيعها ويعلن عنه ثلاث دفعات بواسطة مناد وجرائد وإعلانات وهذا النداء والنشر والإعلان يجري مرة كل ثمانية أيام على التوالي في أطراف المحلات التي تكون السفينة راسية بها وفي محلات اجتماع الناس والأسواق وإذا لم يكن موجودا جرائد في ذلك المحل فتدرج في الجرائد التي تطبع في أقرب مكان لتلك الجهة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (166)
  article_text_ar: من بعد أن يجري كل من أمر النداء والإعلان يعلق في ظرف يومين أوراق على الصاري الأوسط من المركب المضبوط وعلى باب المجلس التجاري الذي طلب به ضبط المركب وبيعه وعلى مواقع المحلات التي تكون السفينة راسية بها حيثما تجتمع الناس وعلى المحل الأكثر اعتبارا في شاطئ الميناء وعلى أبواب الأسواق إذا كان يوجد وإلا فعلى باب الحكومة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (167)
  article_text_ar: يذكر صراحة في إعلانات النداء والجرائد والأوراق التي تجري من طرف الدلال وبمعرفته اسم المدعي وشهرته وصنعته ومحل إقامته ومقدار المبلغ الذي يطلبه والسندات الأساسية لطلب البيع ومحل المحكمة التجارية والمركز الذي انتخبه المرقوم لإقامته في محل مرسى السفينة واسم صاحب السفينة المضبوطة وشهرته ومحل إقامته واسم السفينة وكذلك اسم القبودان أيضا إذا كانت تجهزت أو في حالة التجهيز ومقدار حمولة السفينة باعتبار الوزن أو الكيل واسم محل مرسى السفينة أو المربوطة به واسم المأمور المخصوص مع المباشر، والثمن الموضوع أساسا للمزايدة يعني المدفوع أولا، والأيام التي تجري بها نهاية المزايدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (168)
  article_text_ar: بعد المناداة يحصل التشبث بالمزايدة في الأيام المبينة في الإعلانات وكذلك تجري الضمائم بمداومة المزاد في يوم يتعين مرة في كل ثمانية أيام بعد كل مناداة من طرف مأمور البيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (169) مكرر
  article_text_ar: تستثنى من أحكام إجراءات البيع المنصوص عنها في هذا الفصل السفن المحجوزة التي يخشى عليها من التعرض للتلف أو للهلاك أو لغير ذلك من المخاطر التي قد يترتب عليها انعدام أو نقص من قيمتها أو جنوحها بشكل يعيق المجاري الملاحية، ويصعب معه فنيا أو بغير نفقات باهظة إعادتها إلى مرسى آمن، أو يترتب على جنوحها أحداث أو تهديد باحداث أضرار بمنشئات الميناء أو بما فيه من سفن أخرى، أو عائمات سواء كانت هذه المخاطر قائمة وقت إيقاع الحجز عليها أو طرأت بعد ذلك. وتثبت أي من هذه الحالات بقرار مسبب من الجهة التي تنظر الدعوى بعد معاينتها السفينة أو استطلاعها رأي الجهة الفنية المشرفة على الميناء أو إجرائها الخبرة على حالة الراهنة التي عليها السفينة. ويجري البيع بالمزاد العلني في أي من هذه الأحوال بعد الإعلان عنه لمرة واحدة، في صحيفة محلية قبل الموعد المحدد لإجرائه بأسبوع على الأقل. ويجوز في أحوال الضرورة القصوى إنقاص هذه المدة إلى أربع وعشرين ساعة كاملة تمضي بين إتمام النشر والساعة المحددة لبدء المزايدة. ويرسي مأمور البيع المزاد على صاحب أعلى سعر يقدم في الجلسة المحددة. وفي جميع الأحوال يكون للجهة التي
    تباشر إجراءات البيع أن توقف المزايدة وتؤخرها مرة أخرى أو مرتين تحت أمل زيادة السعر بعد الإعلان عنه طبقا لأحكام الفقرتين السابقتين حسب الأحوال فإذا لم تحصل مزايدة ولم يقدم سعر أعلى من السعر الذي أعطي في المزايدة الأخيرة لزم أن يرسو مزاد السفينة نهائيا على الشخص الذي تقررت عليه قبل التوقيف المذكور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (169)
  article_text_ar: ترسو مزايدة السفينة على الشخص الذي يكون أجرى الضميمة في آخر مزايدة حصلت بعد النداء الثالث عندما تنتهي وتنطفئ الشمعة الموقدة بحسب العادة منذ بداية المزايدة إنما إذا كان لم يعط قرار للقضية في ذلك اليوم أيضا فيكون باستطاعة المأمور المخصوص أن يوقفها ويؤخرها تحت أمل زيادة الضم ثمانية أيام أخر مرة أو مرتين وقضية هذا التوقيف تعلن بواسطة الجرائد والإعلانات وإذا لم يحصل شيء من الضمائم في مزايدة تقع في الأيام المتأخرة على هذا الوجه يلزم حينئذ أن يرسو مزاد السفينة نهائيا على الشخص الذي تقررت عليه قبل التوقيف المذكور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (170)
  article_text_ar: إذا كان أمر الضبط والبيع يجري في حق السفائن التي محمولها عشر طونيلات والشخاتير والماعونات وباقي جرومة الأسلكة الصغار فلا يبقى احتياج إلى التكليفات المبينة أعلاه بل تحصل المناداة بمعرفة الدلال في شاطئ الميناء ثلاثة أيام متواليات فقط وإذا كان للسفينة صاري فيلصق عليه وإلا فعلى محل ظاهر منها وعلى باب المحكمة التجارية إعلانات تعلن بها كيفيتها ثم تباع بعد ذلك بالمزاد إنما يلزم أن تكون مرت ثمانية أيام تامة منذ تبليغ قضية ضبط السفينة لحين مبيعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (171)
  article_text_ar: تنتهي مأمورية القبودان عند مبيع السفينة بالمزاد إنما إذا اقتضى الأمر إنما يحق للقبودان المرقوم الادعاء بطلب واستحصال تضمينات الخسائر وأضرار من صاحب السفينة أو كفلائه أو المتعهدين له بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (172)
  article_text_ar: يجبر الأشخاص الذين عليهم مزايدة السفينة مهما كان مقدار محمولها بأن يفوا ويسلموا ثلث ثمنها المقرر للمأمور المخصوص المعين من طرف المحكمة التجارية ويقدموا كفيلا معتبرا أيضا من تبعة الحكومة العربية الحجازية على الثلثين الباقيين وذلك بظرف أربع وعشرين ساعة اعتبارا من انتهاء مزادها. والكفيل المرقوم والمشتري يكونان كافلين وضامنين بعضهما بعضا على تسليم الثلثين المذكورين وإعطائهما تماما بمدة أحد عشر يوما من بيع السفينة ويمكن إجبارهما أيضا على إيفاء ذلك بواسطة الحبس كما أن السفينة لا تسلم إلى المشتري ما لم يدفع ثلث ثمنها المقرر ويقدم كفيلا بالثلثين في ظرف أربع وعشرين ساعة على الوجه المحرر أعلاه كذلك لا يعطى له العلم وخبر الذي ينتظم ببيان مبيعها له بالمزاد ما لم يعط الثلثين المذكورين إذا لم يف ثلث المقرر في ظرف أربع وعشرين ساعة أو أعطى الثلث لكنه لم يقدر أن يقدم كفيلا في الثلثين الباقيين فتوضع حينئذ السفينة مرة ثانية في المزاد وبعد ثلاثة أيام من نشر ذلك وإعلانه مرة بالمناداة والأوراق المطبوعة والإعلانات تباع بالمزاد لحساب المشتري الذي تقررت عليه قبلا وكفلائه ثم إذا تقررت هذه المرة
    بثمن أنقص من ثمنها المقرر سابقا فيكون الشخص الذي تقررت عليه أولا بالمزاد وكفلائه مجبورين أن يؤدوا هذا النقصان وما يترتب عنه من الأضرار والخسائر وما يقع من المصاريف، إنما إذا كان أعطى الثلث قبلا فيحسم ذلك من الضمانة المذكورة كما أنه إذا ظهرت فضلة في المبيع سواء كانت زائدة عن هذا الثلث أو عن قرار مزاد السفينة الأول فيلزم أن تعطى له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (173)
  article_text_ar: دعاوى الممانعة في مبيع حصة من السفينة المضبوطة تقدم قبل رسوم المزاد وتتفهم تحريرا إلى قلم محكمة التجارة ، إنما إذا وقعت الدعاوى المذكورة فلا تجوز حينئذ إلغاء قضية البيع التي جرت بل تعتبر مثل ممانعة حصلت نظاما كيلا تعطى الأثمان الحاصلة من ذلك إلى الشخص الذي كان سبب الضغط والمبيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (174)
  article_text_ar: يعطى مهل ثلاثة أيام إلى الشخص الذي قدم دعوى منع المبيع أو توقيف إعطاء أثمانه الحاصلة لكي يبين أسبابه ودلائله ومعارضته في ذلك ويعطى مثل هذا المهل للمدعى عليه أي الشخص الذي كان سبب الضغط والمبيع لكي يعطى الجواب أيضا ثم يجلب الطرفان إلى محكمة التجارة حسب الاستدعاء الذي يقع لأجل رؤية الدعوى الواقعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (175)
  article_text_ar: إذا وقع ادعاء الممانعة فيما يختص بعدم إعطاء بدل المزاد بعد أمر تقرر بظرف ثلاثة أيام فيقبل أما إذا وقع بعد ذلك فلا يقبل وإنما إذا كانت الأثمان الحاصلة هي أكثر من مطاليب الأشخاص الذين سببوا الضبط والبيع فحينئذ تعتبر دعاوى الممانعة الواقعة بعد الثلاثة أيام على الوجه المحرر فيما يختص بزيادة الثمن وفضلته فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (176)
  article_text_ar: أصحاب المطاليب الذين يظهرون الممانعة يجبرون أن يبرزوا سنداتهم إلى قلم محكمة التجارة وإن لم يكن فإلى المحكمة التي تكون حكمت بأمر البيع وذلك في ظرف ثلاثة أيام اعتبارا من اليوم الذي به دعوا وكلفوا إلى إثبات مطلوبهم من أصحاب المطاليب الذين سببوا الضبط والبيع أو من الشخص الذي ضبطت سفينته أو وكلائه أو ورثته وإن لم يفعلوا ذلك فلا يحسب لهم حصة إنما تقسم وتوزع الأثمان الحاصلة على من يلزم حسب الوجه الممهد قبلا فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (177)
  article_text_ar: قضية توزيع الدراهم وتقسيمها على أصحاب المطاليب تجري غرامة في حق أصحاب الامتياز حسب التفاوت والترتيب المبين في المادة (155) الممهدة قبلا وفي حق أصحاب المطاليب بحسب مطلوب كل واحد منهم أيضا وكل واحد من أصحاب المطاليب المذكورين يدخله مطلوبه عن أصل ماله ومصاريفه أيضا في هذا الحساب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (178)
  article_text_ar: لا يجوز ضبط السفينة المستعدة للسفر إنما يمكن ضبطها لجهة الديون الواقعة لأجل السفر المستعدة له إلا أنه مع ذلك إذا قدمت كفيلا على إعطاء الديون المذكورة فتخلص من الضبط واستعداد السفينة للسفر يتبين بمجرد أخذ الربان أوراق مرور السفينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (179)
  article_text_ar: كل صاحب سفينة يكون مسؤولا عن حركات ربانها ومعاملاته الحقوقية يعني يكون مجبورا على ضمان الأضرار والخسائر التي تنشأ من حركات الربان ومعاملاته وعلى إيفاء المقاولات والتعهدات التي عملها يخص سير السفينة وسفرها ولكن إذا كانت هذه التعهدات لم تقع بأمر مخصوص به فيمكن حينئذ لصاحب السفينة أن يترك المركب ونولونه ويتخلص في كل حال من تلك التعهدات إنما إذا كان ربان السفينة هو صاحبها بالاستقلال فلا يمكنه الخلاص أصلا بترك السفينة والنولون ولذلك إذا كان يملك السفينة بالاشتراك مع غيره من أصحاب الحصص فيكون مسؤولا شخصيا على قدر ما يصيب حصته فقط من جهة المقاولات والتعهدات التي عقدها بخصوص سير السفينة وسفرها أيضا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (180)
  article_text_ar: أصحاب السفائن يكونون مسؤولين بقدر المبلغ الذي كانوا كفلوه من جهة تقديم الكفالة ومن جهة ما يقع في السفائن المجهزة للحرب برخصة الحكومة في أثناء سفرها من طرف العساكر والملاحين الموجودين فيها من الجنح والجنايات والاغتصاب والغارات ولا يسألون عما زاد عن ذلك من الأمور المغايرة طالما لم يكونوا أجروها بذاتهم وبالواسطة والكفالة المذكورة تكون عبارة عن مائتي ألف قرش لأجل السفائن التي تكون عساكرها وملاحوها نحو المائة وخمسين نفرا وأربعمائة ألف قرش أيضا لأجل ما زاد عن ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (181)
  article_text_ar: صاحب السفينة يمكنه عزل الربان في كل حال حتى ولو كان مدرجا في مقاولته معه شرط يختص بعدم إبعاده وإخراجه منها وبناء على ذلك لا يحق للربان المعزول أن يطلب ضمانا ما من صاحب السفينة الذي عزله ما لم يكن بذلك مقاولة محررة على حدتها إنما إذا كان الربان يعزل في محل غير المحل الذي تعين به فيكون له الحق أن يحصل المصاريف اللازمة لرجوعه إلى ذلك المحل فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (182)
  article_text_ar: إذا كان للربان المعزول حصة في السفينة فيحق له أن يترك حصته هذه ويسترد بدلها ويستحصله ومقدار البدل المذكور وكميته يقدر بمعرفة أهل الخبرة ويجرى نصب وتعيين الخبراء باتفاق الطرفين أيضا وإلا فبانضمام رأي محكمة التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (183)
  article_text_ar: إذا لم يحصل اتفاق في مذكرات أصحاب حصص السفينة بما يختص بالتدابير اللازمة لأجل منافعها العمومية فيعطى القرار بأكثرية الآراء وهذه الأكثرية لا تكون بالنسبة إلى عدد الأشخاص الذين يعطون رأيا بل بالنسبة إلى آراء الذين حصتهم تزيد عن قيمة نصف المركب وإذا كانت السفينة ملك جملة أشخاص مشتركين وطلب بيعها بالمزاد بالاتفاق فيما بينهم رسميا وتقديم أثمانها فيجري ذلك بناء على استدعاء أصحاب الحصص الذين حصتهم توازي النصف إلا إذا كان ثمة مقاولة محررة بينهما على نوع آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (184)
  article_text_ar: كل ربان أو رئيس سفينة أو أي نوع كان من أنواع المراكب بحالة إدارته إلى عهدته يكون مسؤولا عن كل خطأ يفعله في أثناء مأموريته مهما كان خفيفا ومجبورا أيضا على ضمان الأضرار والخسائر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (185)
  article_text_ar: يكون الربان مسؤولا من جهة ضياع وتلف وخراب الأشياء والبضائع التي يتعهد بنقلها ومجبورا بأن يعطي سندا لقبضها واستلامها وهذا السند يسمى بوليسة شحن أو سند حمولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (186)
  article_text_ar: تدارك نوبة المركب وانتخاب جميع ملاحيه ونصبهم وتعيين معاشاتهم وأجرتهم هو من اختصاص مأمورية الربان إنما إذا فعل ذلك في المحل الذي توجد فيه أصحاب السفينة فيكون مجبورا بإجراء ذلك بانضمام رأيهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (187)
  article_text_ar: 'يجبر ربان السفينة على اتخاذ دفتر يومية يعبر عنه بجرنال المركب مكتوبة أرقامه وموضوع عليها إشارة (صح) من طرف رئيس ميناء محله وإلا فمن طرف أحد مأموري مجلس البلدة ومصدق بذيله من جانب رئيس الميناء ومجلس البلدة الذين مر ذكرهما ويذكر في دفتر اليومية المذكور.أولا: أحوال الهواء يوميا.ثانيا: حركة المركب في تقدمه أو تأخره كل يوم.ثالثا: درجات الطول والعرض الذي يوجد المركب بها في كل يوم.رابعا: الأضرار والخسائر التي تقع للمركب وحمولته وأسبابها. خامسا: التفاصيل بقدر الممكن عما يقع من التلفات أو ما يقطع ويترك من الأشياء.سادسا: الطريق التي يطرقها المركب وأسباب حياده عن تلك الطريق طوعا أو كرها.سابعا: التدابير والقرارات المتخذة مجلسيا من طرف ضباط ملاحي المركب ورؤسائهم والربان سوية.ثامنا: أسماء الذين يطلق سبيلهم من ضباط ملاحي المركب والأنفار وأسباب إطلاق سبيلهم.تاسعا: بيان جميع المواد والوقوعات التي تسبب المنازعات والادعاءات فيما يتعلق بالمركب وبما يكون مشحونا فيه مع ذكر إيرادات المركب ومصاريفه بتمامها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (188)
  article_text_ar: يجبر ربان المركب أيضا على اتخاذ دفتر آخر صغير عدا دفتر اليومية المذكور آنفا يسمى لبيرتو يقيد فيه ما يقع الاستقراضات البحرية خاصة حسب الأصول والقاعدة المبينة في أول المادة السالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (189)
  article_text_ar: يكون الربان مجبورا على كشف ومعاينة مركبه بمعرفة أهل خبرة تعين مخصوصا قبل الوسق من طرف رئيس الميناء وإن لم يكن فمن طرف مجلس البلدة لأجل معرفة المهمات اللازمة إلى السفينة مدة سفرها وهل هي جاهزة أم لا ؟ وهل هو في حالة يمكنه معها أن يسافر أم لا ؟ ومضبطة هذا الكشف توضع عند رئيس الميناء أو في مجلس البلدة وتعطى ليد الربان نسختها مصادق عليها وإذا صرف أصحاب المركب النظر عن الكشف على السفينة ومعاينتها فلا يمكن للربان أن يستحصل تذكرة المرور ما لم تبرز مضبطة الكشف المذكورة وأن يعبر أهل الخبرة للكشف عما يتعلق بحقوق التجارة البحرية يجري بمعرفة محكمة التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (190)
  article_text_ar: 'يجبر الربان أن يستصحب غير الدفاتر وصورة المضبطة المحررين في المادة السالفة.أولا: سنده البحري المشعر لمن هي السفينة أو صورته مصدق عليها.ثانيا: براءة العلم بعين البراءة التي تبين بأنه رافع علم الحكومة العربية الحجازية.ثالثا: دفتر الملاحين . رابعا: بواليص الشحن مع قوندرانات النولون .خامسا: قائمة الحمولة المعبر عنها بالمنافيستو . سادسا: تذكرة الجمرك وعلم وخبر الذي يبين إيفاء الرسومات اللازمة عن وسق السفينة وأنه قد أخذ منه كفالة بأن لا ينقل وسقه من الأسكلة المشروط إرساله إليها إلى أسكلة أخرى. سابعا: أمر إذن السفينة.ثامنا: تذكرة المحجر الصحي ( الكرنتينة ).تاسعا: نسخة واحدة من قانون التجارة البحرية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (191)
  article_text_ar: الربان مجبور أن يوجد بذاته داخل السفينة منذ شروعه بالسفر لحين وصوله إلى ساحل السلامة أو إحدى الموانئ الأمينة وإذا اقتضى الأمر للدخول إلى ميناء أو خليج أو نهر لم يدخله قبلا ولا أحد ملاحيه أصلا وكان يوجد هناك أدلاء عارفين بالدخول فالربان مكلف بأن يستخدم دليلا على حساب المركب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (192)
  article_text_ar: إذا صدر من ربان السفينة أحوال مغايرة لأحكام المواد الخمسة المذكورة آنفا يكون مسؤولا عن كل الأضرار التي تنجم عن ذلك سواء للسفينة أو مشحونها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (193)
  article_text_ar: كذلك الربان مسؤول عن كل أنواع الخسارات التي تصيب الأموال والأمتعة التي يكون وسقها على ظهر السفينة عن غير رضا الواسق الخطى إنما حكم هذه المادة لا يجرى في حق السفائن الصغار والفلايك التي تروح وتجيء للمحلات القريبة المعروفة بالسياحة الساحلية القصيرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (194)
  article_text_ar: لا يقدر الربان أن يتخلص من المسؤولية ما لم يثبت مانعا بسبب مجبر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (195)
  article_text_ar: الربان والملاحون الذين يوجدون داخل السفينة أو في فلوكة ذاهبين إلى سفينة على أهبة السفر لا يوقفون ولا يمسكون لأجل وفاء الدين ما لم يكن الدين المذكور قد وقع لأجل ذلك السفر وفي هذه الحالة أيضا إذا قدموا كفيلا على وفاء الدين يتخلصون من قضية الأخذ والتوقيف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (196)
  article_text_ar: لا يجوز للربان أن يباشر في المحل الموجود فيه أصحاب السفينة أو وكلاؤهم تعمير السفينة ولا مشتري قلوع وحبال وغير ذلك من الأشياء اللازمة ولا أن يستقرض درهما لحساب المركب ولا أن يؤجر السفينة ذاتها ما لم يستحصل رضاهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (197)
  article_text_ar: إذا تأخرت السفينة برضا أصحابها وامتنع بعضهم عن إعطاء ما يصيبهم من المصاريف التي تحتاج إليها لأجل تجهيزها للسفر فيخطرهم الربان رسميا ويكلفهم أن يقدموا حصتهم من هذه المصاريف ثم بعد أربع وعشرين ساعة من ذلك يمكنه أن يجري استقراضا بحريا لحسابهم على نسبة حصصهم في المركب برخصة من محكمة التجارة أو من مجلس البلدة في البلاد التي توجد فيها محاكم تجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (198)
  article_text_ar: إذا وجد لزوم لتعمير السفينة أثناء سفرها أو لمشتري قلوع أو حبال أو أوائل أو تجهيزات أو غير ذلك من الأشياء اللازمة وكان لا يمكن للربان نظرا للوقت والحال وبعد محل إقامة أصحاب المراكب والوسق أن يستحصل أمرا منهم بذلك فحينئذ يمكنه أن يعطى مضبطة ممضاة ومختومة منه هو ذاته ومن معتبري الملاحين تصديقا لشدة هذا الاضطراب ثم يعمل بعد ذلك استقراضا بحريا بالرخصة من محكمة التجارة إذا كان في الممالك التي لا توجد فيها مجالس تجارية أو من معتمدي الدولة إذا كان في الديار الأجنبية أو من الحكومة المقتضية في المحلات التي لا يوجد فيها معتمد ويعقد هذا الاستقراض على السفينة ومتفرعاتها وإذا قضى الأمر فعلى وسعتها أيضا ويكون مأذونا إذا لم يمكنه إجراء ذلك بتمامه أو جانب منه فله أن يرهن من بضائع الوسق بقدر ما يثبت لزومه أو أن يبيعه بالمزاد وبعد ذلك يكون أصحاب السفينة أو الربان الذي هو بمنزلة وكيلهم مجبورين أن يعطوا حساب البضائع والأمتعة المباعة على الوجه المحرر عندما تصل السفينة إلى المحل المقصود حسب فئات رائج الأمتعة التي هي من ذات الجنس والنوع هناك، وإذا كان للسفينة مستأجر واحد أو عدة من أصحاب الوسق
    وكانوا متفقين جميعا فيما بينهم فيمكنهم أن يعطوا النولون المقتضى بحسب المسافة التي يكون قطعها المركب ويخرجون أموالهم وبضاعتهم منه ويمنعون بيعها ورهنها أما إذا لم يكن أصحاب الوسق متفقين على ذلك فحينئذ يجبر الذين يردون أن يخرجوا أموالهم وأمتعتهم من المركب أن يعطوا النولون الذي يصيب أمتعتهم على تمام السفر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (199)
  article_text_ar: الربان مجبور أن يرسل إلى أصحاب المركب أو وكلائهم قائمة الشحن ومحاسبة ممضاة من طرفه ببيان أسعار البضائع والأمتعة التي قد اشتراها وشحنها لحسابهم والمبالغ التي استقرضها أو أسماء الذين استقرضوها وشهرتهم ومحل إقامتهم ويكون ذلك قبل أن يقوم من إحدى الأساكل الكائنة في الديار الأجنبية أو في خليج إحدى الممالك عائدا إلى باقي سواحل الممالك العربية الحجازية إنما إذا كان الوسق في الموانئ المذكورة قد شحن من جانب القومسيونجية لحساب مستأجري المركب فحينئذ يكون الربان مجبور بأن يرسل لأصحاب المركب أو وكلائهم قائمة الحمولة بموجب سندات الشحن التي يكون أمضاها ومقدار المبالغ التي استقرضها وكميتها مع أسماء الذين أقرضوها وشهرتهم ومحل إقامتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (200)
  article_text_ar: إذا أخذ الربان دراهما بلا موجب لحساب السفينة أو مأكولاتها وذخائرها وسائر مهماتها أو آلاتها أو كان رهن أو باع من البضائع والأمتعة أو الذخائر شيئا أو أدخل في الحساب بعض الأموال المعطوبة ومصاريف لا أصل لها فيصبح مسؤولا عن ذلك من طرف من يلزم ويكون مجبورا بالذات على رد الدراهم التي أخذها وإرجاعها وضمان الأشياء التي رهنها وباعها ولدى الاقتضاء يجوز إقامة الدعوى ضده ليجازى بالجزاء اللازم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (201)
  article_text_ar: لا يمكن للربان أصلا أن يبيع المركب على أية حالة كانت ما لم يستحصل على رخصة مخصوصة من أصحابه عندما يكون ثبت نظاما عدم قابليته للسفر وإذا فعل ذلك فالبيع يعتبر كأن لم يكن ويجبر الربان على ضمان الأضرار والخسائر، أما قضية عدم قابلية المركب للسفر فتثبت بمصادقة أهل الخبرة الذين يعينون لذلك ويحلفون عليه وينظم بذلك مضبطة ويمضى عليها من طرفهم، وأما قضية تعيين الجزاء فتجري في الممالك العربية الحجازية من طرف مجالس التجارة وإن لم تكن هذه موجودة فمن طرف مجلس البلدة ، وأما في الديار الأجنبية فمن طرف معتمدي الحكومة العربية الحجازية، وإن لم يكن موجودا فمن جانب الحكومة المحلية وإذا اقتضى الأمر لبيع المركب بداعي عدم قابليته المثبتة على الوجه المحرر ولم تستحصل رخصة أصحابه وتعليماتهم فحينئذ تجرى المزايدة عليه في السوق علنا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (202)
  article_text_ar: الربان يكون مجبورا على إتمام السفر الذي تعهد به وإن لم يفعل فيحكم عليه بإعطاء ما يقع من مصاريف أصحاب المركب والمستأجرين وضمانة أضرارهم وخسائرهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (203)
  article_text_ar: الربان الذي يسافر على أن يكون شريكا بالربح الذي يحصل من الشحن لا يمكنه أن يأخذ ويعطي ويتاجر أصلا لحسابه الخاص إلا إذا عقدت مقاولة مخصوصة على نوع آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (204)
  article_text_ar: البضائع والأمتعة التي يشحنها الربان بالسفينة لحسابه الخاص خلافا للأحكام المحررة في المادة السابقة تضبط بحكم مجلس التجارة وقراره لمنفعة جميع من يبقى من أصحاب الحصص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (205)
  article_text_ar: لا يمكن للربان أن يترك سفينة ويستعفي أثناء السفر مهما كان حاصلا من الخطر ما لم يستحصل رأي ضابطي الملاحين ومعتبريهم، أما إذا أذن بذلك على الوجه المحرر فيكون مجبورا عندما يترك السفينة أيضا على أن يخلص معه المقدار الذي يمكنه من أثمان بضائع وأمتعة الوسق مع قومندارتو النولون وسندات الشحن وتذكرة المرور وما يماثل ذلك من جميع الأوراق المهمة والنقود الموجودة وإذا لم يخلصها فيكون مسؤولا ذاتيا عما يضيع ويتلف منها إنما إذا استخرجت الأشياء المذكورة من المركب حسب المنوال المحرر ثم ضاعت وتلفت بنوع من المقدورات فحينئذ يتخلص الربان من المسؤولية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (206)
  article_text_ar: يكلف الربان بأن يقدم في ظرف أربع وعشرين ساعة من وصول المركب إلى الميناء الذي قصده دفتر بيان (جرنال) لأجل التفتيش مع تقريره يعني اللابورت إلى المحلات المقتضية المبينة في المادتين المحررتين أدناه وحينئذ يحصل على صورة منه مصدق عليها ويبين الربان في تقريره المذكور المحل الذي سافر منه والزمان والطريق التي سلكها وما صادفه من المقدورات والأخطار وما يكون وقع في المركب في الحركات المغايرة وحاصل الأمر كل ما حصل أثناء سفره من القضايا التي تستحق القيد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (207)
  article_text_ar: يقدم التقرير المذكور في الممالك العربية الحجازية إلى رئيس محكمة التجارة وفي المحلات التي لا يوجد بها محكمة تجارة إلى مأمور مكتب التجارة وفي المحلات التي لا توجد بها هذه أيضا إلى رأس مأموري الحكومة المحلية وإذا أعطي لمأمور التجارة وإلى الحكومة المحلية فيرسل عقب ذلك موقعا من طرفهما إلى أقرب رئيس محكمة تجارية ويوضع في كل حال ويتوقف أمانة في قلم محكمة التجارة المذكورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (208)
  article_text_ar: التقرير المذكور يعطى في الديار الأجنبية إلى معتمدي الحكومة العربية الحجازية وفي المحلات التي لا يوجد بها معتمدون فإلى الحكومة المحلية ويستحصل الربان من طرفهما على علم وخبر موضح به تاريخ وصوله إلى ذاك المكان وقيامه منه أيضا وحالة حمولته وأجناسها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (209)
  article_text_ar: إذا قضت الضرورة أن يقترب الربان إلى إحدى الموانئ العربية أو الأجنبية مبتعدا أثناء سيره وسفره عن الطريق المخصوص فعليه أن يبين أسباب ذلك إلى المأمورين المبينين في المادة (207 و 208) المحررتين أعلاه بحسب محله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (210)
  article_text_ar: إذا غرق المركب ونجا الربان وحده أو معه البعض من الملاحين فيكون مجبورا عقب ذلك أن يذهب إلى المأمورين المبينين أعلاه بحسب محلاتهم ويعطي تقريره ويصادق على ذلك التقرير بإفادة الملاحين الذين معه ويكون له حق باستحصال صورة منه مصادق عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (211)
  article_text_ar: تسمع إفادة الملاحين وتضبط استنطاقاتهم واستنطاقات الركاب إذا كان ممكنا ذلك أيضا من طرف المأمورين المار ذكرهم بدون خلل في كل ما يمكن إيراده من الأدلة الموافقة للتقرير المذكور. أما التقارير التي لا يصادق عليها فلا تكون حرية بالقبول في أمر تخليص الربان المذكور من المسؤولية وإثبات دعاويه في وقت المحاكمة إلا إذا نجا من الغرق وحده في المحل الذي أعطى به تقريره وفي كل الأحوال يكون للذين يدعون عليه صلاحية لإثبات عكس المواد التي بينها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (212)
  article_text_ar: لا يمكن للربان أن يخرج بضائع في وقت ما من المراكب أصلا ما لم يعط تقريره وإذا فعل فيمكن حينئذ حصول الدعاوى عليه فوق العادة ما لم تكن البضائع والأمتعة في حالة ضياع وتلف سريع من جراء تهلكة أوشكت أن تقع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (213)
  article_text_ar: إذا نفذت تجهيزات المركب أثناء السفر وكان يوجد مأكولات غيرها لبعض الموجودين فيه فيكون الربان مأذونا بأن يجعلهم يقدموا المأكولات المذكورة بعد استحصال رأي معتبري الملاحين بشرط إعطاء ثمنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (214)
  article_text_ar: شروط استخدام الربان والضباط وجميع الملاحين يصادق عليها وتثبت بدفتر الملاحين أو بالشرطيات المحررة من الطرفين إنما إذا كانت المقاولات غير خطية ولم يذكر شيء مما يتعلق بها في دفتر الملاحين أصلا فتجرى حينئذ تطبيق الحركة وفقا للأصول والقاعدة المعمول بها في المحل الذي أخذ الملاحون فيه للخدمة ودفتر الملاحين السالف الذكر ينظم إذا كان في الممالك العربية بمعرفة مأمور الميناء وعند عدم وجوده فبمعرفة مكتب التجارة وعند عدم وجود هذا أيضا فبمعرفة مجلس البلدة ، أما إذا كان في الديار الأجنبية فبمعرفة معتمدي الحكومة العربية أو وكلائهم وعند عدمهما بمعرفة الحكومة المحلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (215)
  article_text_ar: الربان والضباط والملاحون لا يمكنهم أن يحملوا في السفينة لحسابهم الخاص بضائع وأمتعة بأي نوع كان من الأعذار والأسباب ما لم يستحصلوا رضا أصحاب السفينة أو مستأجريها إذا كانت السفينة مستأجرة لحسابهم بعد أن يدفعوا أيضا وإذا خالفوا ما تقدم فيمكن أن يضبط ما شحنوه من البضائع لمنفعة من يقتضي لعين لأصحاب السفينة أو مستأجريها ما لم توجد مقاولة خصوصية بعكس ذلك مع أصحاب السفينة في الشق الأول ومع المستأجرين في الشق الثاني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (216)
  article_text_ar: إذا ترك أمر السفر وتعطل إجراؤه قبل قيام المركب لأسباب حصلت من أصحابه أو ربانه أو مستأجريه فيعطي ضمانا إلى رؤساء الملاحين والأنفار معاش شهر إذا كانوا مرتبطين بأجرة شهرية أو ربع الأجرة المشروط إذا كانوا مرتبين بسفره كاملة عدا عن أجرة الأيام التي اشتغلوا فيها بتهيئة المركب، إنما إذا كانوا أخذوا سلفا تحت حساب معاشهم أو أجرتهم فيكونوا مخيرين في ترجيح الشق الذي يختارونه وهو إما أن يقتنعوا بذلك أو أن يأخذوا معاش شهر أو ربع أجرتهم على الوجه المحرر ويخصموا ذلك منه، وأما إذا ترك السفر بعد قيام السفينة فيعطى لهم عما يصيب الوقت الذي خدموا فيه من المعاشات والأجر المقدار المعطى لهم في الفقرة السابقة مضاعفا وما يقتضي لهم من مصاريف النقل إذا لم يرسلوا بسفينة أخرى لأجل العودة إلى المحل الذي قام منه المركب غير أن مقدار الأجر والتضمينات المذكورة لا يزيد في وقت ما أصلا عن الدراهم المشروط إعطاؤها في ختام السفر أما مصاريف نقل الملاحين المرتجعين فتخصص وتعطى بحسب صنعة كل واحد منهم وحيثيته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (217)
  article_text_ar: إذا امتنعت السفينة بأمر الحكومة قبل بداية السفر عن التوجه إلى المحل الذي تريد الذهاب إليه والتجارة فيه أو عن إخراج البضائع والأمتعة التي استؤجرت لنقلها من المملكة أو توقفت بأمر الحكومة فحينئذ يعطى ما يقتضى من الأجرة اليومية لضباط ملاحي السفينة وأنفارها عن الأيام التي خدموا فيها السفينة فقط ويطلق سبيلهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (218)
  article_text_ar: منع التجارة أو توقيف السفينة إذا وقع أثناء السفر فيعطى في حالة المنع إلى ضباط وملاحي السفينة وأنفارها أجرة الأيام التي خدموا بها ومصاريف عودتهم إلى محلاتهم وفي حالة التوقيف نصف الشهريات لمن كان بالشهرية أثناء مدة توقيف المركب، أما الذين أخذوا للسفرة بتمامها فلا يعطى لهم شيء عن مدة التوقيف بل تعطى لهم حقوقهم وأجرتهم المشروطة لأجل السفر بتمامه فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (219)
  article_text_ar: إذا طال سفر السفينة وزيد عن قصد فحينئذ تزاد أجرة الملاحين المستخدمين للسفرة بتمامها حسب الزيادة الحاصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (220)
  article_text_ar: إذا تفرغت السفينة قصدا في محل أقرب من المحل المبين في سند مقاولة النولون فلا تنزل بسبب ذلك الأجرة المشروطة للملاحين المرتبطين للسفرة بتمامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (221)
  article_text_ar: الملاحون المستخدمون على أن تكون لهم حصة من نولون السفينة أو من الربح الذي يحصل من سفرها لا يجوز أن تعطى لهم أجرة يومية أو نوع من التضمينات لأجل ترك السفرة وفسخها وتأخرها أو زيادتها بداعي سبب مجبر لكن إذا وقع ترك السفرة وفسخها وتأخرها أو زيادتها من جهة أصحاب وسق السفينة فيكون للملاحين نصيب أيضا من تضمينات الأضرار والخسائر التي يحكم بإعطائها للسفينة من طرفهم بهذا السبب وهذه التضمينات إذا كان الشرط بأن يأخذ صاحب السفينة والملاحون حصة مهما كان مقدارها من الربح والنولون تتوزع وتقسم فيما بينهم قياسا لتلك الحصة، واما إذا وقع ترك السفرة وفسخها وتأخرها أو زيادتها من ربان المركب وأصحابه فيكونون مجبورين على أن يعطوا لكل من الملاحين بدلا عن ضرر وخسارة بمقدار مناسب حسب شروطهم ومقاولتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (222)
  article_text_ar: إذا ضبطت السفينة أو صودرت أو لطمت فكسرت أو غرقت وضاع وتلف المركب وحمولته بتمامها فلا يحق لضباط الملاحين وأنفارهم أن يطلبوا أدنى أجرة من جهة تلك السفرة، وإنما إذا كان أعطي لهم قبلا شيء من أصل أجرتهم فلا يكونون مجبورين على إرجاعه أيضا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (223)
  article_text_ar: إذا نجا المركب أو بعض أقسامه من الغرق والتلف فيكون للملاحين المستخدمين حق بأن يستحصلوا أجرتهم من صافي حاصلات القطع التي خلصوها وإذا كانت الحاصلات المذكورة تقوم بوفاء أجرتهم أو كان لم يتخلص شيء آخر من الأمتعة فحينئذ يكون للملاحين صلاحية أن يأخذوا من نولون هذه البضائع والأمتعة المخلصة ما يتبقى من أجرتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (224)
  article_text_ar: ضباط الملاحين وأنفارهم المستخدمون بالحصة من النولون يمكنهم أن يحصلوا معاشاتهم وأجرهم من نولون السفينة فقط قياسا إلى الحصة التي يأخذها الربان والمستأجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (225)
  article_text_ar: الملاحون الموظفون والعاديون على أي شرط ومقاولة كان استخدامهم بأن يأخذوا على حدة أجرة الأيام التي صرفوها على تخليص قطع السفينة الغارقة وما يتعلق بها من الأشياء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (226)
  article_text_ar: كل من يمرض من الملاحين أثناء السفر أو ينقطع أو يتعطل سواء كان بسبب خدمة المركب أو بسبب محاربة الأعداء والقرصان فله الحق أن يأخذ أجرته كما هي مقررة وعدا عن ذلك فإنه يأخذ أيضا مصاريف الطبيب والجراح مدة مرضه وجرحه وإذا بقي عاطلا فيأخذ حينئذ مع المصاريف المذكورة بالسوية مقدارا من الدراهم مناسبا تحت اسم تضمين وإذا لم يتفق الطرفان في أمر هذا التضمين فيستحصل له مقدار المبلغ الذي يتعين في مجلس التجارة ، أما مصاريف الجراح وتضمينمات العطل إذا كان المرض أو الجرح أو التعطيل ناشئا عن خدمة فتعطى من نولون السفينة وإذا كان وقع ذلك في محاربة لأجل أمر محافظة السفينة فيعد تعطيلا كبيرا من الخسارات البحرية الجسيمة ويستوفى من المركب ونولونه وسقه غرامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (227)
  article_text_ar: الملاح المريض أو المجروح أو المعطل إذا لم يمكنه أن يداوم على السفر احترازا من الخطر والتهلكة فيكون الربان مجبورا قبل قيام السفينة بأن يخرج الملاح المرقوم من السفينة إلى المستشفى أو محل آخر يمكن مداواته به وأن يقوم عند عودته بمصاريف مرضه ونفقته إذا تعافى وإذا مات فيتدارك ويقوم بالمصاريف اللازمة لأجل دفنه وإذا كان الربان موجودا في الممالك العربية فيعطي جل ذلك دراهم كافية بمصاريف المقدار بصورة أمانة أو كفيلا يتعهد بإعطائها إلى مكتب التجارة وفي المحلات التي لا توجد بها فإلى مأمور البلدة الكبير وإذا كان في البلاد الأجنبية فإلى معتمدي الحكومة العربية وفي المحل التي توجد به فإلى رأس مأموري الحكومة المحلية ومع ذلك تبقى أجرة الملاح المرقوم قائمة لحين شفائه وعدا عن ذلك يعطى حسابه من اليوم الذي يكون خرج مسافرا به في السفينة من أي ميناء كانت إلى اليوم الذي يمكنه أن يعود إلى تلك الميناء مع مصاريف طريقه أيضا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (228)
  article_text_ar: إذا كان الملاح داخل السفينة وخرج منها برخصة وأجرى نزاعا فجرح أو مرض بسبب حركة غير لائقة منه فيعال كذلك بمصاريف السفينة على الوجه المشروح إلا أنه يمكن إقامة الدعوة على هذه المصاريف لكي تسترد منه، أما إذا خرج الملاح من السفينة بلا رخصة فجرح أو تعطل أو مرض بسبب نزاعه ومعارضته أو بسبب حركات غير لائقة تقع منه فتبقى حينئذ مصاريف الطبيب والجراح على حسابه وإذا اتفق أن الربان أخرجه من الخدمة فتحسب له حينئذ أجرته إلى اليوم الذي استخدم فيه فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (229)
  article_text_ar: 'أجرة الملاح الذي يتوفى في السفينة تعطى إلى ورثته على الوجه الآتي: وهو أنه إذا كان مستخدما بالشهرية فيعطى لهم معاشه يوم وفاته وإذا كان مستخدما على سفرة تامة وتوفي أثناء السفر وفي الميناء التي توجه إليها فتعطى لهم نصف الأجرة فقط، أما إذا توفي حين عودته فتعطى أجرته المشروطة بالتمام، وإذا كان مستأجرا بحصة يكون له منها ربح يحصل من السفرة أو من نولون السفينة وتوفي بعد الشروع في السفر فتعطى لهم كذلك حصته المشروطة وبالتمام وعلى أي صورة كان الملاح مستخدما وتلف في محاربة الأعداء أو القرصان حبا بسلامة السفينة ووصلت هذه بالسلامة إلى الأسكلة حينئذ يعتبر كأنة لم يمت إلا يوم وصولها وتعطى أجرته بالتمام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (230)
  article_text_ar: الملاح الذي يؤسر وهو في السفينة لا يحق له أن يطلب شيئا من الربان أو أصحاب السفينة أو المستأجرين لكي يعطى بدل عتقه بل يكون له حق أن يستحصل أجرته إلى اليوم الذي استؤسر فيه فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (231)
  article_text_ar: الملاح الذي يرسل بحرا أو برا بخدمة للسفينة إذا أسر فيكون حق أن يستحصل أجرته بتمامها وعدا عن ذلك إذا وصل المركب بالسلامة إلى الميناء فتكون له صلاحية على أن يطلب أيضا تضمينات لأجل عتقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (232)
  article_text_ar: إذا كان المتوفى مرسلا بحرا أو برا بخدمة للسفينة فيعطى التضمين المذكور من طرف أصحاب المركب فقط، اما إذا كان مرسلا لأجل لزوم المركب والوسق فيلزم أن تستوفى من جانب أصحاب المركب ومن جانب أصحاب الوسق أيضا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (233)
  article_text_ar: بدل التضمين المذكور أي العتق يكون عبارة عن ثلاثين جنيها ذهبا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (234)
  article_text_ar: إذا بيعت السفينة في مدة استخدام الملاحين فيكون للملاح الذي لا يرضى بمقاولة ما على نوع آخر الحق بأخذ مصاريف السفينة وأجرتها لإيصاله لمحله بالتمام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (235)
  article_text_ar: الملاحون الموظفون والعاديون الذين يطردون من الخدمة بناء على أسباب مقبولة نظاما أثناء السفر يكون الربان مجبورا أن يحاسبهم على أجرتهم المشروطة اليوم طردهم فقط بحسب ما قد قطعوه من الطريق ويعطيها لهم، أما الملاحون الذين يطردون قبل بداية السفر فيعطون أجرة الأيام التي خدموا فيها ولا يلزم أن يعطوا شيئا زيادة عن ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (236)
  article_text_ar: 'الأسباب التي تعتبر مقبولة نظاما لطرد الملاحين هيأولا: عدم قابليتهم للخدمة.ثانيا: عدم طاعتهم.ثالثا: إدمانهم على السكر.رابعا: المعاملة بالجبر والضرب داخل السفينة وباقي الأخلاق القبيحة إجمالا التي تكون باعثا لإخلال انتظام السفينة.خامسا: ترك السفينة والانصراف بلا إذن .سادسا: العدول عن السفر بأسباب مجبرة أو جائزة نظاما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (237)
  article_text_ar: كل واحد من الملاحين المقيدين في دفتر النوتية إذا أمكنه أن يثبت بأن طرده من الخدمة كان عن سبب غير مقبول نظاما فيكون له حق بأن يرفع الدعوة على الربان طالبا التضمين هذا إذا طرد الملاح قبل الشروع في السفر فيكون هذا التضمين عبارة عن ثلث أجرته التي يقدر بأنه يكتسبها من السفر وإذا وقع طرده أثناء السفر فتكون الأجرة بقدر ما كان يؤخذ لو بقي من يوم طرده ولم يطرد إلى نهاية السفر ومصاريف عودته أيضا والربان المحكوم عليه بالتضمينات المذكورة لا يكون له حق بأن يستعيضها من أصحاب السفينة بأي وجه كان مما تقدم بيانه ما لم يكن مأذونا من طرفهم في هذا الخصوص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (238)
  article_text_ar: 'الملاحون الموظفون العاديون لا يمكنهم بوجه من الوجوه فيما عدا الأحوال الخمسة الآتي بيانها أن يتركوا السفينة ويستعفوا من خدمتها بعد أن يكونوا تقيدوا في دفتر الملاحين وهذه الأحوال هي:أولا- إذا أراد الربان أن يذهب بالسفينة إلى ميناء غير الميناء المشروط عليهم بالذهاب إليها قبل الشروع بالسفر الذي تعهدوا بخدمته.ثانيا- إذا ظهرت محاربة بحرية للحكومة العربية قبل الشروع بالسفر أيضا أو كانت السفينة وصلت لأحد الموانئ فوقع حرب بين الحكومة العربية وبين حكومة ذلك المحل المشروط توجه السفينة إليه وكان من المحتمل وقوع السفينة في تهلكة قريبة من جراء ذلك أو صار على الميناء المقصود الذهاب إليها حصار بحري.ثالثا: إذا كان أخذ خبر صحيح كذلك قبل الشروع في السفر أو عندما تصل السفينة إلى إحدى الموانئ بأنه يوجد في المحل الذي تقصد السفينة السفر إليه طاعون أو حمى صفراوية أو ما يماثل ذلك من الأمراض ذات العدوى.رابعا: انتقال السفينة بكاملها قبل الشروع بالسفر لأصحاب آخرين. خامسا: وفاة الربان قبل الشروع بالسفر أو عزله من طرف أصحاب المركب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (239)
  article_text_ar: السفينة ونولونها تعتبر في مقام رهن مخصوص لإعطاء أجرة الملاحين وتضميناتهم مع مصاريف عودتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (240)
  article_text_ar: السفينة ونولونها تعتبر كذلك في مقام الرهن للتضمينات والأضرار والخسائر التي تترتب لأصحاب الوسق ناشئة من عدم اعتناء الملاحين الموظفين والعاديين وخطاهم ، إنما لأصحاب السفينة الحق بأن يدعوا باسترجاع هذه التضمينات من الربان ولهذا أيضا الحق بالادعاء على الملاحين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (241)
  article_text_ar: 'كل مقاولة يعبر عنها ( بقوندراتو ) نولون تختص بإيجار إحدى السفن واستئجارها ينبغي أن تكون خطية ويبين بهاأولا: اسم السفينة ومقدار حمولتها باعتبار الطونيلاتة أو الكيل وتحت راية أي دولة هي.ثانيا: اسم ربانها وشهرته.ثالثا: اسم المؤجر والمستأجر وشهرتهما.رابعا: المحل المعين لأجل الوسق والتفريغ ومدة ذلك.خامسا: مقدار الأجور يعني بدل النولون وكميته.سادسا: هل صار عقد المقاولة على جميع السفينة أو قسم منها أو على وسق معين مقداره.سابعا: التضمينات المشروط إعطائها بسبب تأخر يقع في التفريغ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (242)
  article_text_ar: إذا لم تتعين أيام وقوف السفينة يعني مدة وسقها وتفريغها وتتخصص في مقاولة الطرفين فينظر حينئذ إلى العادة الجارية في مثل ذلك وإلا فتكون مدة خمسة عشر يوما على التوالي عدا عن أيام التعطيل اعتبارا من اليوم الذي يبين الربان فيه استعداده للشحن أو للتفريغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (243)
  article_text_ar: إذا حصلت المقاولة بأن يوسق أو يفرغ جانب من الشحن في محل والباقي في محل آخر فالمدة التي تمر لحين ذهاب السفينة من أحدهما إلى الآخر لا تحسب من المدة المشروطة لأجل الوسق والتفريغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (244)
  article_text_ar: إذا استؤجرت السفينة مشاهرة ولم تحصل مقاولة بنوع آخر بحضور بدل الإيجار فتحسب الشهرية اعتبارا من يوم قيام السفينة وحركتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (245)
  article_text_ar: قبل قيام السفينة وحركتها إذا حدث ما يمنع التجارة مع المحل المشروط الذهاب إليه فتفسخ حينئذ المقاولة ولا يحق لأحد الطرفين بأن يطالب أحدهما الآخر بتضمين الضرر أما صاحب الوسق فيكون مجبورا بأن يدفع ما يحصل من المصاريف لأجل وسق بضائعه وأمتعته وتفريغها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (246)
  article_text_ar: إذا ظهر مانع في أثناء الطريق يمنع السفينة من الدخول إلى الميناء المقصودة أو إخراج وسقها إليه ولم يكن بيد الربان تعليمات بنوع آخر فيذهب حينئذ إلى ميناء أخرى غير ممنوع الوصول إليها ويجري مخابرة القضية مع الواسق أو المستلم بحسب ما تقتضيه الحالة وينتظر الجواب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (247)
  article_text_ar: السبب المجبر الذي لا يمكن دفعه إذا امتنعت السفينة مؤقتا عن الخروج من الميناء فتبقى مقاولة الإيجار مرعية إنما لا يكون حق لأحد بأن يطلب أضرار أو خسائر بسبب تأخر هذا السفر وكذلك إذا ظهر أثناء السفر سبب مجبر كهذا فلا يستوجب فسخ مقاولة الإيجار ولا الضم أيضا على بدل الإيجار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (248)
  article_text_ar: السفينة مأذونة ومخيرة في مدة التوقف الناشئ عن الأسباب المجبرة المذكورة أعلاه أن تخرج منها على حسابها الخاص البضائع والأمتعة الموسوقة فيها إنما بعد أن تتخلص السفينة من هذا التوقيف مجبورة على الوسق ثانية أو تعطى ما يلزم لذلك من الأجور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (249)
  article_text_ar: السفينة وآلاتها ومعداتها مع بدل النولون وكذا الأمتعة الموسوقة هي في مقام رهن لأجل تنفيذ المقاولة المعقودة بين الطرفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (250)
  article_text_ar: 'يعتبر تنظيم سند الشحن باسم شخص مخصوص أو لأمره أو لحاملها ويتحرر بها جنس البضائع والأشياء المشحونة ومقدارها وبيان أنواعها وأشكالها ويدرج فيها. أولا: اسم المرسل وشهرته. ثانيا: اسم الشخص المرسلة إليه وشهرته ومحل إقامته. ثالثا: اسم الربان وشهرته ومحل إقامته. رابعا: اسم السفينة ومقدار محمولها باعتبار الطونيلاتة أو الكيل وتحت راية أي دولة هي. خامسا: المحل الذي تقوم منه والمحل الذي تقصد الوصول إليه. سادسا: مقدار النولون وكذلك يتحرر على حاشيتها ماركة البضائع والأشياء المنقولة ونمرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (251)
  article_text_ar: ينظم من كل سند من سندات الشحن أربع نسخ على الأقل تعطى إحداهما للشاحن والثانية للمشحون له وواحدة إلى الربان وأخرى إلى صاحب المركب أو الذي جهزه، ويلزم أن يمضي على هذه النسخ الأربع من طرف الشاحن والربان بظرف (24) ساعة على الأكثر من شحن البضاعة وكذلك بجبر الشاحن بأن يعطي في ظرف المدة المذكورة ويسلم إلى الربان تذاكر تخليص البضائع والأشياء الموسوقة المعطاة له من جانب الجمرك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (252)
  article_text_ar: سندات الشحن المنظمة على الوجه المحرر كما أنها تصلح للاحتجاج فيما بين جميع الأشخاص الذين لهم حصة وعلاقة في الوسق كذلك تصلح أيضا للاحتجاج فيما بينهم وبين أصحاب السيكورتا أيضا إنما إذا ادعى هؤلاء فسادها تكون دعواهم مسموعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (253)
  article_text_ar: إذا وجد تباين فيما بين نسخ سندات شحن إحدى الوسقات فيكون الاعتبار للنسخة الموجودة في يد الربان إذا كانت بخط الواسق أو القومسيونجي أو للنسخة التي بيد الواسق أو المستلم إذا كانت بخط يد الربان .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (254)
  article_text_ar: القومسيونجي أو المستلم يكونان مجبورين بأن يعطيا بحسب طلب الربان علما وخبرا مشعرا باستلام البضائع والأمتعة المدرجة في سندات الشحن أو المقاولات النولون وإن لم يعطياه ذلك فيكونان مجبورين بأن يعطياه مصاريفه ويضمنا الأضرار والخسائر التي تترتب له بأسباب ذلك أو بسبب تأخره كذلك الربان يجبر بأن يطلب من المستلم علما وخبرا باستلام الأمتعة التي سلمها له وإن لم يمكنه أخذ ذلك منه فيستحصل شهادة من الجمرك تبين بأنه أخرج تلك الأمتعة من السفينة بموجب سند شحنها، وإلا فيكون مجبورا على ضمان الأضرار والخسائر التي يمكن وقوعها من جراء ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (255)
  article_text_ar: 'أجرة السفائن وسائر المراكب البحرية يقال لها: (نولون) وتتقدر بمقاولات الطرفين وتثبت ( بقوندراتو ) أو ( ببوالس ) سندات الشحن والنولون يمكن تعيينه على مجموع السفينة أو على موضوع معين منها ويمكن مقاولتها لأجل سفرة تامة أو مدة معينة وعلى حساب الطونيلاتة أو الكيل أو القطار أو مقاطعة أو على مشحونات متنوعة أو على أية حال كان ذلك يلزم أن يبين في عقد المقاولة ( قوندراتو النولون ) ومقدار محمول السفينة باعتبار الطونيلاته أو الكيل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (256)
  article_text_ar: إذا كان النولون مقررا على السفينة بتمامها ولم يكمل المستأجر شحنه فلا يمكن للربان أن يشحن أمتعة أخرى غيرها ما لم يستحصل بذلك رخصة وتكون أجرة سائر الأمتعة التي يصير شحنتها لأجل إكمال محمول السفينة عائدة إلى المستأجر الذي يكون استأجرها جميعا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (257)
  article_text_ar: المستأجر إذا لم يشحن شيئا مما هو في مقاولة النولون ( قوندراتو ) أو بظرف المدة المعينة بهذا النظام يكون للمؤجر الخيار على وجهين إذ يحق له إما أن يطلب التضمينات المشروطة في مقاولة ( النولون ) ( قوندراتو ) بسبب تأخره أو ما يقدر لذلك بمعرفة أهل الخبرة إذا لم يكن ثمة شروط، إما أن يفسخ قوندراتو النولون ويطلب من المستأجر نصف النولون وباقي المنافع المشروطة وكذلك المستأجر إذا لم يشحن شيئا في المدة المذكورة يمكنه أن يفسخ المقاولة قبل أن تبدأ أيام التوقيف (يعنى أيام الفونترا استاريا ) الاستاريا معناها أيام التوقيف وهي عبارة عن أيام معينة بلا أجرة لأجل شحن السفينة وتفريغها، أما الفواتير استاريا فهي عبارة عن أيام تضم إلى أيام استاريا لقاء أجرة معينة بشرط أن يعطى مؤجر السفينة أو ربانها نصف النولون ونصف المنافع المشروطة في عقد المقاولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (258)
  article_text_ar: إذا شحن المستأجر بظرف المدة المعينة جانبا فقط من الأمتعة التي حصلت المقاولة عليها في المقاولة النولون ولم يشحن الباقي فيكون للمؤجر لذلك حق بأن يختار وجهين فإما أن يطلب التضمينات المسطرة في الفقرة الأولى من المادة السالفة وإما أن يقوم ويسافر بالمقدار الذي شحنه من الأمتعة وتكون له صلاحية أن يأخذ نولونه بتمامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (259)
  article_text_ar: إذا شحن المستأجر أمتعة تزيد عن المقدار الذي حصل الاتفاق عليه فيجبر حينئذ بأن يعطى نولون الزيادة قياسا للأجرة المقررة في مقاولة النولون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (260)
  article_text_ar: إذا كان مؤجر السفينة أو ربانها يزيد في قياس السفينة من أصل مقدار محمولها فيكون مجبورا بأن ينزل النولون بحسب ما يتبين من الفرق والتفاوت ومع ذلك يعطي للمستأجر أيضا أضراره وخسائره غير أنه إذا كان الفرق والتفاوت بين المقدار الذي أعلنه وأصل مقدار محمول السفينة ليس بأكثر من ثلاثة في المائة أو كان موافقا للمقدار المحرر في براءة السفينة فينصرف النظر حينئذ عن الفرق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (261)
  article_text_ar: إذا كان مؤجر السفينة المعدة لشحن بضائع مختلفة أو ربانها قد عينا مدة انتظارها لأجل الشحن ولم يقاول أصحاب الوسق على مدة أخرى للانتظار فيكون مجبورا على القيام والحركة بأول فرصة يساعد بها الطقس بعد انقضاء المدة المذكورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (262)
  article_text_ar: إذا أجرت السفينة لأجل مشحونات مختلفة ولم تتعين مدة الشحن يؤذن حينئذ لكل من أصحاب الوسق بأن يرجع السندات الممضاة من الربان وإذا كان البعض منها أرسل إلى محله فيقدم عليه كفيلا ويدفع نصف النولون المشروط عدا عن مصاريف شحن البضائع والأمتعة وتفريغها وما يكون لزم إخراجه بهذا السبب من العنبر إلى الكورتة وربما إلى الخارج ووضعه تكرار في محلاته من سائر الأمتعة ثم يسترد بضاعته أما إذا كان شحن في السفينة مقدار ثلاثة أرباع وسقها وطلب أكثر أصحاب الوسق رفعه فيكون الربان مجبورا على أن يقوم للسفر في الطقس الموافق بعد ثمانية أيام من تبلغهم طلبهم له رسميا ولا يحق لأحد من أصحاب الوسق أصلا أن يسترد بضائعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (263)
  article_text_ar: إذا شحن في السفينة أمتعة بدون علم المؤجر أو الربان واطلاعهما وكان الربان ما زال في محل الشحن فعليه أن يكلف أصحاب البضائع رسميا ليسترجعوا أمتعتهم وفي هذه الحال يحق له إما أن يخرج الأمتعة إلى البر وأن يأخذ نولون بحسب أقل قيمة على مثل ذلك الجنس في ذلك المحل إنما إذا علم وجود المتاع المذكور في السفينة بعد قيام أو سفرها فقط فلا يؤذن حينئذ له بأن يخرجه إلى محل آخر غير المحل المرسل إليه وإنما يحق له بأن يستحصل النولون بحسب الفئات المار ذكرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (264)
  article_text_ar: الواسق الذي يرد بضاعة أثناء السفر يكون مجبورا بأن يعطي نولونها بتمامه وجميع ما يقع من المصاريف بسبب تفريغها إنما إذا تم إرجاعها على ذلك الوجه بسبب من الربان وعن خطأ منه فلا يكون للمذكور حق بوجه ما أن يستحصل النولون بل يضمن أيضا ما يقع من المصاريف وإذا اقتضى الأمر يضمن أيضا ما يترتب من الضرر والخسائر بسبب عدم قيامه بمقتضى مقاولة النولون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (265)
  article_text_ar: إذا توقفت حين قيامها أو في أثناء سفرها أو في محل تفريغها بسبب خطأ أو تكاسل من أحد المستأجرين أو أصحاب الوسق فيكون المستأجر الواسق مجبورا على إيفاء المصاريف الناشئة من تأخرها مع الأضرار والخسائر إلى مؤجر السفينة أو ربانها أو سائر أصحاب الوسق وإذا استؤجرت السفينة ذهابا وإيابا ثم عادت بغير وسق أو بوسق ناقص فيكون للربان حق بأن يستحصل نولونها تماما وأن يستوفي الخسائر التي تنشأ من تأخير السفينة إذا تأخرت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (266)
  article_text_ar: كذلك إذا توقفت السفينة أو تأخرت حين قيامها أو أثناء سفرها أو في محل تفريغها بسبب خطأ أو تكاسل من المؤجر أو الربان فيكونان مجبورين على ضمان الأضرار والخسائر التي تترتب عن ذلك إلى المستأجر ومقدار هذا الضمان سواء الذي ذكر بهذه المادة أو في المادة التي قبلها يعين ويخصص بمعرفة أهل الخبرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (267)
  article_text_ar: إذا حصل اضطرار إلى تعمير السفينة أي تجهيزها أثناء السفر فيكون المستأجر أو الواسق مجبورا على أن ينتظر هذا التجهيز أو أن يعطى النولون حتى بدل الخسارات الجسيمة إذا حدثت ويرجع بضائعه وأمتعته إنما إذا كانت السفينة مستأجرة مشاهرة فلا يجبر حينئذ على عطاء نولون لأجل مدة التعمير ولا لزيادة نولون إذا كانت المقاولة على سفرة تامة، وإذا لم يمكن تعمير السفينة فيكون الربان مجبورا بأن يستأجر سفينة أو سفن متعددة لأجل نقل البضائع المشحونة بها إلى المحل المتفق على إرسالها إليه بشرط أن يعطى مصاريفها ولا يطلب زيادة نولون وإن لم يمكنه ذلك فيعطى له من النولون المقرر مقدار ما يصيب حصة المسافة التي قطعها فقط ويترك عندئذ أمر النقل لكل واحد من أصحاب النقل الوسق إذا لم يمكنه استئجار سفائن أخرى لنقل الأمتعة الموسوقة معه إنما يجب على ذمته أن يبين لهم واقعة الحال ويتخذ التدابير اللازمة لأجل وقاية الوسق أثناء ذلك أن جميع هذه المبينة تكون مرعية الإجراء إذا لم يكن ثمة اتفاق آخر بين الطرفين وعندئذ يقتضى الرجوع إلى المقاولات المعقودة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (268)
  article_text_ar: إذا أمكن المستأجر أن يثبت حين قيام السفينة عدم قابليتها للسفر فيفقد حينئذ الربان حقه في النولون وعدا عن ذلك يكون مجبورا على إعطاء الأضرار والخسائر للمستأجر وقضية هذا الإثبات تسمع وتقبل ولو أنه حصل الكشف على السفينة وجرب معاينتها حين قيامها وأخذ شهادة تبين أنها صالحة للسفر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (269)
  article_text_ar: يلزم إيفاء نولون المتاع الذي يضطر الربان إلى بيعه لأجل تموين السفينة أو تعميرها أو مداركة جميع الأشياء الاضطرارية إنما يجب على الربان أن يعطي قيمة هذا المتاع عندما تصل السفينة بالسلامة إلى الميناء بحسب فئات ما يباع مما بقي منه أو من سائر البضائع التي هي من جنسه ونوعه وبالعكس إذا غرقت السفينة وتلفت فيعطى الربان قيمة المتاع المذكور حسب الفئات التي باعه بها وله أن يبقى معه من ثمن المبيع نولون السفينة بقدر ما تكون حتى المحل الذي وصلت إليه ومع ذلك لا ينبغي في كلا الحالتين أن يحدث خلل في الحقوق والصلاحيات المعطاة لأصحاب السفينة بموجب الفقرة الثانية من المادة (179) من هذا النظام غير أنه إذا نشأ من نوالهم الصلاحية المذكورة استدعائهم ضرر للأشخاص الذين بيع متاعهم أو رهن فيلزم حينئذ أن يتوزع الضرر المذكور غرامة على أثمان البضائع التي وصلت إلى محلها بالسلامة وأثمان جميع الأمتعة التي تخلصت من الغرق الحادث قضاء في البحر والذي أوجب قضية البيع أو الرهن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (270)
  article_text_ar: إذا وقع منع مختص بأمر المتاجرة مع المحل المشروط ذهاب السفينة إليه ولزم الأمر إلى عودتها مع وسقها وكانت مستأجرة ذهابا وإيابا فيكون للربان الحق باستحصال النولون عن ذهابها فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (271)
  article_text_ar: إذا توقفت السفينة أثناء السفر مدة فقط بأمر دولة من الدول وكانت مستأجرة مشاهرة فلا يلزم أن يعطى لها نولون أصلا عن مدة التوقيف ولا زيادة نولون أيضا إذا كانت مستأجرة لسفرة تامة إنما أجرة الملاحين في مدة التوقيف تعد من الخسارة البحرية وفي ظرف المدة المذكورة يؤذن للواسق أن يخرج من السفينة الأمتعة الموصولة على نفقته وإذا خرجها فيكون مجبور على شحنها ثانيا على نفقته أو أن يعطي التضمينات المقتضية إلى مؤجر السفينة أو ربانها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (272)
  article_text_ar: الأمتعة التي تلقى في البحر لأجل سلامة العامة يعطى نولونها إلى الربان ويتوزع غرامة على العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (273)
  article_text_ar: لا يلزم إعطاء نولون أصلا عن أمتعة تصيع أو تتلف بسبب الغرق أو الكسر أو اغتصاب القرصان وضبط الأعداء بل يجب على الربان رد الدراهم التي يكون أخذها معجلا لأجل نولون تلك البضائع إذا لم يكن هناك مقاولة تخالف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (274)
  article_text_ar: إذا تخلصت السفينة من يد الأعداء والبضائع من الغرق والتلف بمساعي الربان أو إقدامه وغيرته ومعاونته وأعطى على ذلك دراهم أو تعهدا وما أمكن نقل البضاعة إلى المحل المشروط إيصالها إليه فيكون للربان حق بأن يستحصل نولونها حتى المحل الذي اغتصبت أو ضبطت أو غرقت فيه إنما إذا تخلصت الأمتعة بمعاونته ثم نقلها معه كلها إلى المحل الذي تعهد بإيصالها له فحينئذ يمكنه أن يستحصل نولونها بالتمام لكنه بتحاصص بإعطاء مصاريف التخليص غير أنه إذا لم يكن للربان من السعي أو غيره على تخلص الأمتعة والتلف بل خلصت على وجه البحر أو ساحله فلا يلزم أن يعطى له نولون أصلا عما يرد أخيرا من الأمتعة ويعطى لأصحابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (275)
  article_text_ar: الأمتعة والسفينة والنولون تتحاصص جميعا فيما يصرف من الدراهم على تخليص الأمتعة من القرصان والأعداء إنما معاش الملاحين وأجورهم لا تدخل بهذه المصاريف وهذه الدراهم تتوزع وتقسم غرامة على ما يتبقى من أثمان الأمتعة حسب فئاتها الجارية في محل تفريغها بعد أن تنزل منها مصاريفها وعلى نصف ثمن السفينة حسبما تساوى في ذلك المحل ونصف النولون أيضا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (276)
  article_text_ar: إذا استنكف المستلم عن أخذ المتاع فللربان الحق أن يكلفه رسميا استلامه بواسطة استدعاء يرفعه إلى محكمة التجارة ويبيع بموجب حكمه مقدارا من الأمتعة المذكورة أو كاملها حتى يستوفي نولونه وخسارته البحرية وباقي مصاريفه الواقعة وإذا بقي من ذلك شيء فيودعه في محل أمين ، أما إذا كانت تباع جميع الأمتعة على الوجه المشروح ولا يبقى النولون وغيره تماما فلا يحرم الربان من الحق في الرجوع على أصحاب الشحن ليستحصل باقي مطاليبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (277)
  article_text_ar: لا يحق للربان أو يوقف بضائع في سفينة بسبب عدم إعطاء النولون والخسارات البحرية الجسيمة وسائر المصاريف وإنما يكون له حق بأن يسلمها أمانة ليد شخص آخر حين تفريغها حتى يعطى له ذلك أو أن يطلب بيعها إذا كانت مما يتلف بمرور الوقت ما لم يكن قد تقدم له كفيل على ذلك من طرف المستلم وإذا كانت مطاليبه عن خسارات بحرية جسيمة لا يمكنه تقدير كميتها وتسويتها حالا فله أن يطلب وضع مبلغ يتعين بمعرفة محكمة التجارة أمانة في صندوق المحكمة أو تقديم كفيل معتبر عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (278)
  article_text_ar: إذا فرغت البضائع مع السفينة وما وضعت أمانة بل جرى تسليمها إلى صاحبها حسبما يتبين في المادة السابقة ولم تدخل في يد شخص آخر بعد ذلك فتكون في مقام رهن على ما يطلبه الربان من النولون والخسارات البحرية وباقي المصاريف ترجيحا على مطاليب باقي أصحاب الديون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (279)
  article_text_ar: إذا وقع إفلاس شاحن البضاعة أو مستلمها قبل مرور الخمسة عشر يوم حسب المنوال السابق فلا يحرم الربان من حق الامتياز على البضاعة المذكورة لأجل تحصيل مطلوب النولون والأمتعة المعطوبة ( لاوارية ) وباقي المصاريف ترجيحا على مطلوب جميع أصحاب المطاليب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (280)
  article_text_ar: إذا كان النولون مشروطا على عدد الأمتعة أو كيلها أو وزنها فيكون للربان الحق بأن يطلب عددها وتكييلها أو وزنها حين تفريغها وإن لم يفعل فيكون القول حينئذ للمستلم وله أن يثبت البضاعة بأنها هي تلك البضاعة أو عددها أو كيلها أو وزنها وقضية هذا الإثبات يمكن أن تكون بشهادة تحت يمين من الأشخاص الذين استخدموا في تفريغ الوسق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (281)
  article_text_ar: إذا وقعت شبهة قوية فيما يتعلق بتلف البضاعة أو سرقتها أو إنقاص كميتها ويمكن حينئذ للربان وللمستلم ولكل واحد من أصحاب العلاقة بها أن يطلب تقدير ما وقع لها من الأضرار والخسائر بالكشف عليها ومعاينتها بمعرفة مجلس التجارة وهي في السفينة قبل تفريغها وإذا كان لا يمكن رؤية ما صادف الأمتعة من الخسارات والكسر والنقص من ظاهرها فيمكن حينئذ إجراء الكشف عليها ومعاينتها أيضا بعد تسليمها إلى المستلمين غير أنه يلزم بأن لا يمر على ذلك وقت أكثر من (48) ساعة من تاريخ تسليمها ويصير إتيان البضاعة بأنها هي تلك البضاعة عينها على الوجه المبين في المادة السالفة أو بصورة أخرى نظامية والمستلمون إذا كانوا تسلموا البضائع وإبراء وسندات الشحن وأرجعوها وأعطوا بيانا بالاستلام غيرها وكانوا أدرجوا في الإبراء أو في بيان التسليم الشبهة القوية فيما يخص تلك الأمتعة أو سرقتها أو إنقاص كميتها فلا يفقدوا حقهم الظاهر في كشفها ومعاينتها لحين مرور ثماني وأربعين ساعة من تسليمها لهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (282)
  article_text_ar: مؤجر السفينة وربانها إذا أجروا من طرفهم كامل وأحكام مقاولة النولون ( قوندراتو ) المتوجبة عليهم فلا يقدر المستأجر أو الواسق أن يطلب تنزيل شيء من النولون أو يداعى به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (283)
  article_text_ar: لا يقدر الشاحن أن يطلب ترك بدل النولون عما تلف من البضاعة طبعا أو بسبب من المقدورات أو عما هبطت أسعاره وإنما يمكنه أن يطلب ترك النولون عما كان فارغا أو رشح وسال حتى كاد أن يفرغ من براميل الزيت والعسل وأمثال ذلك من السوائل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (284)
  article_text_ar: لا يمكن إجبار الربان على قبول ركاب ليس لهم علاقة أصلا في وسق سفينة ليست مخصوصة بنقل الركاب مثل وابورات البوستة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (285)
  article_text_ar: يلزم بأن يخضع المسافر في السفينة لما يقع من جانب الربان من الأمور والتنبيهات المختصة بأمور السفينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (286)
  article_text_ar: مقدار النولون يتعين في المقاولة ( القوندراتو ) أو تذكرة السفر (البليت) الذي يعطى للراكب باسمه أو مفتوحا إلى حامله أما إذا نزل الراكب إلى السفينة وسافر عليها بدون تعيين بدل النولون بمقاولة فيلزمه أن يعطي بدل المثل وإذا لم يتفق الطرفان على ذلك فيبين من المجلس بمعرفة أهل الخبرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (287)
  article_text_ar: إذا نظمت ورقة السفر باسم الراكب فلا يمكن للراكب أن ينقل حقه إلى شخص آخر ما لم يرض بذلك الربان ويوافق عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (288)
  article_text_ar: إذا لم يحضر الراكب إلى السفينة قبل الشروع في السفر بالوقت والساعة المعينة لقيام السفينة أو خرج في أثناء الطريق للخارج ولم يرجع فلا يجبر الربان على انتظاره بل يمكنه أن يسافر ويجبر الراكب أيضا على إعطاء بدل النولون بتمامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (289)
  article_text_ar: إذا أراد الراكب فسخ المقاولة قبل الشروع في السفر وأظهر رغبته هذه أو إنه لم يظهرها لكن تبين أن عدم مجيئه إلى السفينة كان بسبب وفاته أو مرضه أو ظهور عذر شرعي آخر عائد لشخصه فيكون حينئذ مجبورا بأن يعطي نصف النولون فقط أما إذا وقعت الأمور أثناء الطريق فيكون مديونا بإيفاء النولون بتمامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (290)
  article_text_ar: إذا ضاعت السفينة وتلفت بقضاء بحري فيفسخ عقد مقاولة الركاب بتمامه (يعني القوندراتو ).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (291)
  article_text_ar: إذا ضبطت السفينة بسبب الحرب ولم يعد ممكنا أن ينظر إليها نظير سفينة حرة وتعطل سفرها بالكلية أو تأخر قبل الشروع في السفر أو بعده بأسباب مجبرة خارجة عن إرادة الربان أو الشركة التي هو تابع لها فيؤذن حينئذ بأن يفسخ المقاولة التي معهم وكذلك الربان أو الشركة التي يكون تابعا لها إذا أجبر أحدهما على ترك السفر لدى وقوع إحدى الحالات المذكورة أو يرى لزوما إلى ترك السفر إذا كانت السفينة منحصرة بنقل البضاعة خاصة وما أمكنها نقلها وكان ذلك عن غير خطأ أو غير تكاسل منه فيكون هذ الفريق أيضا مأذونا بأن يفسخ المقاولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (292)
  article_text_ar: إذا فسخ عقد المقاولة بسبب إحدى الحالات المبينة في المادتين السالفتين فلا يجبر أحد الطرفين أصلا بأن يعطي ضررا أو خسارة للآخر ومع ذلك إذا وقع فسخ المقاولة بعد الشروع في السفر فيجبر الراكب بأن يعطي النولون بحسب المسافة التي قطعها وهذا أيضا يحسب ويتعين على الوجه المبين في المادة (267).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (293)
  article_text_ar: إذا احتاجت السفينة إلى التعمير في أثناء السفر ولم يشأ الراكب أن ينتظرها إلى إتمام ذلك فيكون مجبورا بأن يعطي النولون بتمامه إنما إذا رضي أن ينتظر فيكون الربان مجبورا بأن يعطيه محلا لإقامته مجانا لحين قيامه للسفر ثانيا وإذا كان متعهدا في المقاولة أو ورقة السفر بأكله وشربه فيكلف بجميع ذلك ومع هذا إذا كان الربان يكلف الراكب بأن ينقله إلى المحل المشروط ويجري له سائر مقاولاته وتعهداته بسفينة أخرى مثل تلك ولم يقبل الراكب بذلك فلا يبقى له حينئذ حق بأن يطلب سكنا أو مأكلا لبينما تستأنف السفينة سفرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (294)
  article_text_ar: إذا لم يكن في المقاولات والتعهدات ما يتعلق بالمأكولات فيجبر حينئذ الراكب على أن يستحضر الأشياء التي يحتاج إليها لأجل تعيشه، أما إذا فرغ زاده بسبب لم يشعر له قبلا أو من طول مدة السفر فحينئذ كما أنه يجبر على أن يترك للسفينة ما زاد عن نفقته بموجب المادة (213) كذلك الربان يكون مجبورا بأن يعطيه ما يلزم من الزاد ببدل مناسب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (295)
  article_text_ar: لا يجبر الراكب بأن يدفع نولون عن الأشياء التي هو مأذون أن يستصحبها معه بالسفينة بموجب المقاولة ما لم تكن هناك مقاولة أخرى بإعطاء النولون عنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (296)
  article_text_ar: ينظر إلى الراكب فيما يستصحبه معه من الأشياء في السفينة نظير شاحن وبناء على ذلك إذا سلم تلك الأشياء إلى الربان فيجبر بأن يعطيه بها سندا مقبولا مشعرا باستلامها ويجري حقه وفي حق تلك الأشياء أيضا الحقوق والتعهدات التي تحتويها المواد المبينة في هذا النظام بحق أصحاب الشحن، إنما إذا لم يسلم الأشياء المذكورة إلى الربان أو إلى الشخص المأمور باستلامها منه وإبقاءها معه فحينئذ لا يبقى له حق أن يطلب من الربان ضررا ولا أن يضمن خسارة أصلا إذا ضاعت أو تلفت أو خسرت ما لم يكن وقوع هذا التلف والخسارة بسبب من الربان أو الملاحين أو عن خطأ يقع منهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (297)
  article_text_ar: إذا توفي الراكب أثناء السفر فيجبر الربان أن يتخذ التدابير اللازمة بحسب الوقت والحال لأجل المحافظة على ماله من الأشياء في السفينة وإعطائه لورثته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (298)
  article_text_ar: للربان حق التوقيت والامتياز على ما للراكب من الأشياء داخل السفينة لكي يستحصل على ما لم يكن استوفاه بعد من النولون وبدل النفقة إنما هذا الحق والامتياز يبقى له طالما كانت الأشياء المذكورة باقية في السفينة أو موضعة من طرفه في محل لتحفظ فيه أمانة فقط، أما إذا أخذها صاحبها أو أخرجها بطريقة ما فعند ذلك يسقط هذا الحق والامتياز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (299)
  article_text_ar: لا يجبر الربان أثناء السفر على الدخول إلى ميناء غير مشروطة ولا على الانتظار مدة زائدة بناء على طلب أحد الركاب لمنافعه الذاتية إنما يكون مأذونا أن يدخل إلى أول ميناء مسكونة يمكنه أن يقترب منها ويخرج إليها الراكب الذي يكون وقع في علة ذات عدوى فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (300)
  article_text_ar: عقد مقاولة الاستقراض البحري هو عبارة عن عقد مقاولة استقراض تعمل على السفينة أو وسقها أو عليها كليهما والسفينة والوسق المرهونان على الوجه المذكور إذا ضاعا أو تلفا بقضاء بحري فلا يصير حينئذ إيفاء الدراهم المستقرضة أما إذا وصلا بالسلامة فيلزم حينئذ إيفاؤها مع التمتع البحري يعني الربح الذي حصلت عليه المقاولة وهذا الربح يعطى بتمامه ولو كان زائد عن المقدار المقرر نظاما .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (301)
  article_text_ar: 'تنظم عقود مقاولات الاستقراض البحري إما بصورة رسمية أو فيما بين الطرفين فقط ويذكر به.أولا: مقدار الدراهم المستقرضة مع مقدار الربح المشروط.ثانيا: نوع المرهون بمقابلة المبالغ المستقرضة.ثالثا: اسم السفينة وأسماء وشهرة صاحبها وربانها والقارضين والمستقرضين.رابعا: هل كان ذلك الإقراض والاستقراض الواقع لأجل سفرة واحدة أو وقت معين وما هي مدته. خامسا: الوقت الذي يوفى به المبلغ المستقرض وربحه.سادسا: الوقت والتاريخ اللذان وقع فيهما الاستقراض.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (302)
  article_text_ar: إذا أريد تنظيم عقد مقاولة استقراض بحري بصورة رسمية وكان ذلك في الممالك العربية الحجازية فيعقد حسب أصوله وينظم في محكمة التجارة وإلا فبحضور مجلس البلدة وإذا كان في الممالك الأجنبية ففي دوائر معتمدي الحكومة العربية الحجازية وإن لم توجد ففي مجلس الحكومة المحلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (303)
  article_text_ar: إذا جرى تنظيم عقد مقاولة الاستقراض البحري فيما بين الطرفين فقط فيجبر المقرض أن يصادق عليه ويقيده في محله أو في إحدى المحلات المذكورة بحسب إيجابه بظرف عشرة أيام على الأكثر من تاريخ عقد المقاولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (304)
  article_text_ar: إذا لم تجر أحكام هاتين المادتين السالفتين يسقط حينئذ عقد مقاولة الاستقراض البحري من حيثيته ويعد من قبيل الاستقراض المعتاد وبناء على ذلك كما أن الشخص المقرض يضيع امتيازه في حق الأشياء التي أقرض من أجلها وكذلك المستقرض يكون مجبورا شخصا ومالا بأن يعطيه دراهمه وربحها النظامي أيضا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (305)
  article_text_ar: سند مقاولة الاستقراض البحري يمكن تنظيمه لأمر ذات المقرض وحينئذ يجوز إحالته بطريق الجبر وحسب أصول السفتجة وعندما يتجبر نحو الشخص المحال إليه محل الشخص المحيل في أمر الربح والخسارة إنما إذا بلغ السلامة فلا تكون كفالة ذات المحيل التي هي حسب أصول الجبر وواقعة على إيفاء التمتع البحري بعين الربح المشروط بل ترجع إلى إعطاء أصل المال ما لم تكن هناك مقاولة معقودة بعكس ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (306)
  article_text_ar: الاستقراضات البحرية يمكن أن تكون بطريقة الرهن على هيكل السفينة أو آلاتها أو طقمها أو جهازها أو تموينها أو حمولتها أو جميع ذلك أو على كل قطعة وحصة تتخصص من كل ما ذكر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (307)
  article_text_ar: يمنع عمل استقراض بحرى بدراهم يزيد مقدارها عن قيمة الأشياء المرهونة وإذا عمل ذلك ثم أثبت القارض باستدعائه وقوع حيلة أو دسيسة، من طرف المستقرض فيمكن حينئذ أن يحكم بفسخ عقد المقاولة وإعطاء الربح النظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (308)
  article_text_ar: إذا وقع استقراض بحري على الوجه المحرر وإنما عن غير حيلة ودسيسة من طرف المستقرض فيراعى عند عقد المقاولة ويعتبر بقدر ما يصادق عليه الطرفان فيما بينهما من قيمة الأشياء المرهونة أو ما يقدر بمعرفة أهل الخبرة أما زيادة الدراهم فترد وتتحصل مع ربحها النظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (309)
  article_text_ar: يمنع الاستقراض البحري على نولون سفينة لم يتحقق أو على تمتعات مأمولة من شحنها وإذا جرى ذلك فلا يكون للمقرض حق سوى أن يأخذ دراهمه بلا ربح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (310)
  article_text_ar: كذلك يمنع الاستقراض البحري من طرف الملاحين على معاشاتهم وأجورهم وإذا وقع ذلك فلا يمكن أن يطلب شيء أكثر من استرجاع الدراهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (311)
  article_text_ar: المركب ومعداته وآلاته وجهازه ومؤونته ونولونه المكتسب أيضا هي مرهونة بوجه الامتياز على الدراهم وأرباحها الذي تعطى لجهة قرض بحري على السفينة وكذلك الوسق يعد رهنا على الدراهم وأرباحها التي تعطى قرضا بحريا على الوسق أما إذا كان الاستقراض البحري واقعا على قطعة من السفينة أو من وسقها فيكون حكم الامتياز المذكور على تلك القطعة وبقدر الاستقراض فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (312)
  article_text_ar: الاستقراض البحري الذي يجري من طرف الربان إذا وقع في محل إقامة أصحاب السفينة أو وكلائهم بدون أن يستحصل منهم رخصة بصورة رسمية أو كانوا لم يتوسطوا في عقد المقاولة بل جرى ذلك خارجا عن محل إقامتهم ولم تستوف به الشروط المبينة في المادة (198) فحينئذ يكون للشخص المقرض حق الادعاء والامتياز على حصة الربان في السفينة وفي النولون وليس له صلاحية أن يطلب شيئا زائدا عن ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (313)
  article_text_ar: إذا لم يعط أصحاب السفينة ما يصيبهم عن حصصهم لكي تستعد السفينة للقيام والسفر بظرف (24) ساعة من تكليفهم لذلك رسميا بمقتضى المادة (197) السابقة فتكون حصصهم من السفينة المذكورة رهنا على الدراهم المستقرضة في محل إقامتهم لأجل تعمير السفينة وتموينها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (314)
  article_text_ar: الدراهم المستقرضة لأجل سفر السفينة ولو كان ثمة مقاولة بأن تستعمل في سفر آخر فالاستقراض الذي يجري لأجل سفر السفينة الأخير يدفع مرجحا والاستقراضات التي تحصل في أثناء السفر تترجح على الاستقراضات التي جرت قبل حركة السفينة وإذا كانت حصلت جملة استقراضات في أثناء السفرة الواحدة فالاستقراض الأخير يترجح على ما قبله وإذا اضطر المركب في إحدى السفرات إلى الدنو من إحدى الموانئ وتوقف فيها مدة فالدراهم التي يستقرضها في تلك المدة تدفع بدرجة متساوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (315)
  article_text_ar: إذا جرى الاستقراض البحري على وسق السفينة المذكور في عقد المقاولة ثم نقل ذلك الوسق وشحن في سفينة أخرى وضاع وتلف لنائبة أو غير ذلك ولم يثبت نظاما بأن أمر نقله ووسقه كان ناشئا عن سبب مجبر فلا يمس المقرض ضرر من ضياع الوسق المذكور وتلفه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (316)
  article_text_ar: إذا ضاعت الأشياء التي حصل الاستقراض البحري عليها وتلفت بالكلية أو اغتصبها القرصان أو ضبطها فضاعت وتلفت أو كان أمر اغتصابها نشأ عن نائبة وأسباب مجبرة وحصل في الوقت والمحل المدرجين في سند الاستقراض البحري فلا يجوز حينئذ استرداد الدراهم المقروضة إنما إذا كان تخلص جانب الأشياء المذكورة فلا تضيع حقوق المقرض على هذه الأشياء التي تخلصت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (317)
  article_text_ar: لا يسوغ تحميل المقرض تحميل خسائر تتأتى عن نزول الأسعار بسبب رداءة جنس الأشياء المرهونة أو سقوطها أو تناقص مقدارها وتلفياتها أو عن أسباب تحدث من المستقرض أو من خطأ الربان والملاحين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (318)
  article_text_ar: عند وقوع الغرق والكسر تنزل مصاريف تخليص ما يتخلص من الأشياء المرهونة وتتسدد الديون البحرية بما ينبغي من القيمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (319)
  article_text_ar: الأخطار البحرية إذا لم يتعين زمانها في عقد مقاولة الاستقراض البحري فيعتبر حينئذ للسفينة ومعداتها وآلاتها وجهازها وقومانيتها منذ قيامها إلى أن تبلغ الميناء المشروط التوجه إليه وترسو فيه أو تربط (غميتها) في إحدى المحلات ويعتبر للبضائع منذ وسقها في السفينة أو وضعها في الفلائك لأجل إرسالها إلى السفن أما إذا وقع الاستقراض البحري أثناء السفر على الأمتعة الموسوقة فيعتبر من بداية تاريخ عقد المقاولة لحين التفريغ على البر في المحل المشروط إرسالها إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (320)
  article_text_ar: إذا حصل الاستقراض البحري على سفرة معينة ولم يقع السفر فلا يمكن للقارض أن يأخذ التمتع المشروط له بل يمكنه أن يسترد الدراهم التي أعطاها مع ربحها النظامي بوجه الامتياز، أما إذا كان ابتداء ما كان لحساب ذاته من زمان الأخطار البحرية حسبما يتبين في المادة السالفة فحينئذ يكون له حق بتحصيل التمتع البحري الذي حصلت المقاولة عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (321)
  article_text_ar: الشخص الذي يعقد استقراضا بحريا على بضاعته لا يمكنه أن يتخلص من الديون عند ضياع المركب ووسقه ما لم يثبت بأنه كان له من ضمن شحن المركب بضائع بقدر المبالغ التي استقرضها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (322)
  article_text_ar: الذين يقرضون قرضا بحريا يتحاصصون فيما يقع من الخسارات البحرية الجسيمة ولو كانت هناك مقاولة بعكس ذلك ويقدر ما يصيب حصصهم يخلص المستقرضون أيضا من ديونهم ويحاصص المقرضون أيضا من الخسارات البحرية الاعتيادية إذا لم يكن هناك مقاولة بعكس ذلك والتحصص المذكور يحسب على رأس المال المقروض ومجموع التمتعات البحرية المشروطة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (323)
  article_text_ar: السفينة والوسق اللذان يقع عليهما استقراض بحري وسيكورتاه أيضا إذا غرقت السفينة أخيرا وكسرت أمكن أن يستخلص منها بعض أشياء فيقسم ثمن الأشياء المستخلصة غرامة فيما بين المقرض وصاحب السيكورتاه بحسب رأس مال المقرض فقط ومقدار المبالغ الذي ضمنه صاحب السيكورتاه بشرط أن لا يحصل خلل في الامتيازات المبينة في المادة السالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (324)
  article_text_ar: مقاولة السكورتاه هي عبارة عن مقاولة بحرية تتضمن التعهد بإعطاء التضمين تماما إلى المضمن مقابلة لبدل السكورتاه الذي يأخذه صاحب السكورتاه على مقدار ضائعات ومضرات يمكن وقوعها بسبب نائبة بحرية على أشياء يحترز عليها من أن تصادف خطر سفر بحري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (325)
  article_text_ar: 'ينظم عقد مقاول السكورتاه بصورة رسمية أو فيما بين الطرفين فقط ولا يترك به محل خاليا ويذكر به.أولا: السنة والشهر واليوم والساعة الذي أمضى وختم فيه.ثانيا: اسم الضمن وشهرته ومحل إقامته مع البيان عنه إن كان هو صاحب المال أو قومسيونجي .ثالثا: جنس البضائع والأشياء المضمونة وثمنها أو قيمتها المقدرة ومقدار الدراهم التي جرى تأمينها بها. رابعا: الأخطار التي تعهد بها صاحب السكورتاه .خامسا: وقت وتاريخ ابتداء هذا الإخطار وانتهاؤه لأجل صاحب السكورتاه .سادسا: بدل السكورتاه .سابعا: اسم الربان واسم المركب ونوعه.ثامنا: المحل الذي شحنت به البضائع أو سوف تشحن به. تاسعا: الميناء التي ذهبت أو سوف تذهب إليها السفينة.عاشرا: الموانئ والأساكل التي يأخذ المركب منها البضائع ويخرجها أو يدخل إليها ويدنوا منها.الحادي عشر: إذا كانت حصلت المقاولة فيما بين الطرفين بأنه عند وقوع النزاع يحكم فيه ويسوى بمعرفة مميزين فتدرج هذه المقاولة أيضا.الثاني عشر: يذكر جميع الشروط التي اتفق عليها الفريقان.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (326)
  article_text_ar: سند السكورتاه الواحد يمكن أن يحتوي جملة سكورتات بحسب تنوع الأمتعة وتفاوت مقدار بدل السكورته وتعدد أصحاب السكورته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (327)
  article_text_ar: 'الأشياء التي يمكن التأمين عليها هي، أولا: السفائن التي تسافر منفردة أو مع سفائن أخرى موسوقة أو فارغة مجهزة أو بغير تجهيز. ثانيا: معدات السفينة وآلاتها ثالثا: جهاز السفينة رابعا: مؤنتهاخامسا: الدراهم المستقرضة حسب الأصول البحرية سادسا: جنس الوسق وأنواعه سابعا: كل ما كان له ثمن ويمكن أن يصادف خطرا بحريا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (328)
  article_text_ar: السكورتاه تصير على الأشياء المذكورة بتمامها أو على جانب منها أو مجموعها أو على كل واحدة منها بمفردها ويمكن أن تصير أيضا في زمان السلم أو الحرب وقبل سفر السفينة وأثناء سفرها وعلى ذهاب السفينة ومجيئها أو ذهابها فقط أو مجيئها وفقط على سفرة تامة أو لوقت معين بحرا كان أو نهرا أو جدولا وما يقع في ذلك من أمور السير والسفر ونقل البضائع وحاصل الأمر على كل ما كان من جميع الأخطار البحرية التي تقع في البحار والأنهار والبحيرات والترع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (329)
  article_text_ar: إذا استعملت الحيلة في تقدير قيمة البضائع والأشياء المضمونة أو وقعت إفادات كاذبة في كمياتها ومقدارها وتزوير في سند الشحن فيحق حينئذ لصاحب السكورتة أن يكشف عن تلك البضائع ويعاينها ويقدر قيمتها ويحق له عدا عن ذلك أن يرفع دعواه على المضمن سواء كان بالتضمين أو التأديب جزاء جنحته أو جنايته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (330)
  article_text_ar: إذا كان المضمن لم يعرف في أية سفينة شحنت البضائع والأشياء التي ينتظرها من البلاد الأجنبية يعفى حينئذ من بيان اسم السفينة وربانها إنما يكون مجبورا على أن يذكر في السند عدم معرفته ذلك ويبين تاريخ المكتوب الأخير وإمضائه المختص بحسب مجيئها أو أمرها وحينئذ يلزم أن تكون السكورته لوقت معين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (331)
  article_text_ar: إذا لم يعرف المضمن جنس البضائع وقيمة الأشياء الموصلة إليه فيقدر أن يضمنها باسمها العمومي بضائع فقط بدون أن يذكر تلك البضائع والأشياء أو يبينها بصورة أخرى في السند إنما يلزم أن يذكر ويبين فيه لمن أرسلت أو لمن تتسلم ما لم يكن ذكر في السند مقاولة بعكس ذلك والسكورتة التي تكون كهذه يعني الاسم العمومي لا يمكن أن تشمل مسكوكات الذهب والفضة ولا سبائكهما ولا الألماس واللؤلؤ والمجوهرات ولا المهمات الحربية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (332)
  article_text_ar: البضائع والأشياء التي تقدر أثمانها بسكة أجنبية في مقاولات السكورتاه بحسب سعرها على موجب مسكوكات الحكومة العربية الحجازية ويتعين بحسب قيمتها الرائجة في محل وتاريخ إمضاء سند المقاولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (333)
  article_text_ar: إذا لم تتعين قيمة البضائع والأشياء في سند مقاولة السكورته فيصير إثباتها حينئذ من قائمة البضائع ودفاترها وإذا لم توجد بها قوائم ولا دفاتر أيضا فتقدر حينئذ وتقوم بحسب قيمتها الدارجة في المحل والوقت الذي شحنت فيهما مع ما أعطى منهما من رسم الجمرك وباقي المصاريف الواقعة لحين نقلها إلى المركب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (334)
  article_text_ar: إذا جرت السكورتة أثناء رجوع السفينة من بلاد يتجر بها بالمقايضة فقط ولم يذكر في السند قيمة ما شحن بها من البضائع والأشياء فتضم حينئذ مصاريف النقل على قيمة البضائع والأشياء المرسلة مبادلة وتتقدر قيمة تلك البضاعة والأمتعة مهما بلغ مقدارها على هذه النسبة ويجري دفعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (335)
  article_text_ar: إذا لم يتعين وقت الخطر البحري وزمانه في مقاولة السكورته فيبتدئ حينئذ وينتهي في الوقت والزمان الذي عين وخصص لمقولات الاستقراضات البحرية في المادة (319) المدرجة آنفا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (336)
  article_text_ar: الشخص الذي يكون ضمن مرة بضائع وأشياء بكامل قيمتها لا يمكن له أن يضمنها ثانيا في ذلك الزمان ولأجل تلك المخاطرات أيضا وإذا فعل ذلك فيحسب كأنه لم يفعل إنما صاحب السكورتة يمكنه أن يضمن في كل حالة عند صاحب السكورتة آخر الأشياء التي أجرى السكورتاه عليها والمضمن يمكنه أن يضمن بدل السكورتة ويسوغ أن يكون بدل السكورتة الثاني أكثر أو أقل من البدل الأول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (337)
  article_text_ar: لا يجوز أن يضم شيء عند ظهور محاربة على بدل سكورتة حصلت عليه المقاولة في زمن السلم ولا أن يقلل بدل السكورتة الذي حصلت عليه المقاولة في زمن الحرب عندما تحصل المصالحة أخيرا ما لم يكن بين الطرفين مقاولة بهذا الخصوص تعاكس ذلك وإذا حصلت المقاولة في سند العقد للسكورته على إمكانية ضم البدل أو تقليله لم يتصرح ويتخصص مقدار الضم والتقليل يتعين ذلك حينئذ بمعرفة محكمة التجار والمميزين بالنظر إلى الخطر الواقع والوقت والحال وشروط عقد المقاولة ( القوندراتو ).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (338)
  article_text_ar: إذا ضاعت وتلفت البضائع التي يكون وسقها الربان لحسابه في السفينة التي هو راكبها أو لحساب السفينة وكان قد أجرى ضمانها فيكون مجبورا بأن يثبت لصاحب السكورته بأنه اشترى البضائع المذكورة ويبرم له بوليسة شحنها ممضاة من نفرين من متقدمي الملاحين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (339)
  article_text_ar: كل من يجري السكورتة من الملاحين أو الركاب في الممالك العربية الحجازية يجبر بأن يسلم سند الشحن للأمتعة التي أحضرها من الممالك الأجنبية إلى معتمدي الحكومة العربية في المحل الذي شحنها منه وإن لم يكن فإلى أحد معتبري تجار الحكومة العربية الحجازية أو إلى الحكومة المحلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (340)
  article_text_ar: إذا أظهر صاحب السكورتة إفلاسه قبل نهاية الخطر البحري المشروط يكون للمضمن حق أن يطلب منه كفيلا على إيفاء ما يجب على ذمته أو أن يفسخ أحكام المقاولة وكذلك إذا أفلس المضمن قبل أن يعطي بدل السكورتة صلاحية أيضا أن يطلب منه كفيلا أو فسخ أحكام المقاولة على الوجه المحرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (341)
  article_text_ar: لا يمكن السكورتا على نولون البضائع الموجودة بالسفينة البحرية والتمتع البحري الحاصل منها وإذا جرى ذلك فيعد كأنه لم يجر. ولا الأرباح الملحوظة منها ولا أجرة الملاحين ومعاشهم ولا دراهم الاستقراضات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (342)
  article_text_ar: الأشياء التي يلزم بيانها في سند المقاولة من طرف المضمن إذا سكت عنها أو أخبر عنها بالخلاف أو كانت فارقة عما هو معين في سند الشحن وعلى صاحب السكورتة حقيقة حالها سواء كان لا يحصل خطر بقدر الدرجة التي يظهر وقوعها من هذا السكون والإفادة أو يحصل عن ذلك خطر آخر غير ذلك الخطر المظنون ولخطر تبطيل عقد المقاولة أو عقده بشروط أخرى فحينئذ يعتبر سند المقاولة المنظم كأنه لم يكن في حق صاحب السكورتة وهذا السكوت الواقع والإفادة المخالفة أو الفارقة يسقطان حكم السكورتا وإن لم يحصل عندهما سبب يوجب خسارة الأشياء المضمونة وضياعها وتلفها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (343)
  article_text_ar: إذا حصل العدول عن السفر قبل بدء الخطر البحري بحسب المادة (319) فيفسخ حينئذ عقد مقاولة السكورتة ولو كان ذلك عن سبب من طرف المضمن ويسترد بدل السكورتة إذا كان أعطى إنما يكون لصاحب السكورتة حق بأن يأخذ في المائة نصف عن قيمة الأشياء المضمونة في مقام تضمين الضرر أو نصف بدل السكورتة إذا بأقل من المائة واحد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (344)
  article_text_ar: جميع ما يقع من الضائعات والخسارات على الأشياء المضمونة يعود على صاحب السكورتة سواء كان ذلك من دواعي النوء أو الغرق أو الكسر أو التنشيب أو الفسخ أو ما يقع بالضرورة من إبدال الطريق والسفر وإبدال المركب أو تحويلها أو إلقاء البضائع في البحر والحريق والضبط والاغتصاب وتوقيف السفينة بأمر الحكومة وإعلان الحرب أو مقابلة للخصم بما فعله من الخصومة وغير ذلك من المهالك والمحاصرات البحرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (345)
  article_text_ar: الضائعات والخسارات التي تقع بسبب تغيير الطريق أو السفر أو المركب على غير اضطرار أو بسبب من شخص المضمن لا توجب ضررا على السكورتة بل إذا بدأ وقوع الخطر البحري لأجله ذاته فيكون قد اكتسب بدل السكورتة أيضا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (346)
  article_text_ar: نزول القيم وتناقص المقدار والضائعات بسبب رداءة جنس الأشياء المضمونة وسقطها مع ما يقع من الخسارات الناشئة بأسباب من أصحاب الأشياء ومستأجري السفينة وشاحنيها جميع ذلك لا يوجب ضررا ولا خسارة على صاحب السكورته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (347)
  article_text_ar: صاحب السكورتة غير مسئول عن (بارتارية) ربان السفينة وملاحيها يعني حيلهم وفسادهم وباقي تهاملهم وفسادهم مثل بيع أو نقص البضائع بدعوى أنها أصيبت بكارثة ما لم تكن حصلت المقاولة بعكس ذلك ومع هذا إذا كانت الأشياء المضمونة هي السفينة وكان الربان يملك السفينة بكاملها أو حصة منها فيسقط حكم المقاولة المذكورة بحسب مقدار حصته في المركب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (348)
  article_text_ar: أجرة الدليل والرفيق والأدلاء الذين يستخدمون في الموانىء والأنهار وجميع الرسومات التي تتحصل من السفينة ووسقها لا يلزم إيفاؤها من طرف صاحب السكورته ما لم يكن وقع ذلك عن أسباب مجبرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (349)
  article_text_ar: يلزم أن يتصرح في سندات الشحن الأشياء القابلة للتلف طبعا كالحنطة أو الذوبان كالملح والأشياء التي ترشح كالعسل والخل وتبين أنها من ذلك الجنس وإلا فلا يكون صاحب السكورتة مسئولا عن خسارات وضائعات تعرض لهذه الأشياء ما لم يكن المضمن لا يعلم جنس المشحون من البضائع حين تنظيم السند المذكور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (350)
  article_text_ar: قضية السكورتة إذا وقف على بضائع تشحن في السفينة ذهابا وإيابا ثم من بعد وصول السفينة إلى المحل المشروط ذهابها إليه عادة بدون وسق أو وسقت لكن لم يكن شحنها كاملا فيكون لصاحب السكورته حينئذ حق أن يأخذ ثلثي الخرج الذي حصلت المقاولة عليه فقط ما لم يكن هناك مقاولة بعكس ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (351)
  article_text_ar: إذا جرت عقود مقاولة السكورتة على مبلغ يزيد عن قيمة الأشياء الموسوقة بالسفينة وتحقق لأن ذلك كان من نوع الحيل والدسائس من طرف المضمن فحينئذ يكون عقد المقاولة المنظم له كأنه لم يكن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (352)
  article_text_ar: إذا لم يكن في قضية السكورته المذكورة حيلة ولا دسيسة من المضمن فيراعى حينئذ سند عقد المقاولة المنظم ويعتبر بقدر القيمة الذي قررت لوسق برضا الطرفين وإلا فتقدر بمعرفة أهل الخبرة ويفسخ فيما زاد عن ذلك وإذا ضاعت الأشياء المذكورة وتلفت فيتخصص من الضرر الواقع لكل واحد من أصحاب السكورته بنسبة مقدار المبلغ الذي يكون ضمنه ولا يمكنهم مع ذلك أن يستحصلوا بدل السكورته المبلغ الزائد عن قيمة الأشياء بل يكون لهم حق أن يأخذوا التضمينات المصرحة والمبينة في المادة (343) المذكورة آنفا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (353)
  article_text_ar: إذا وضعت عدة مقاولات سكورته على شحن واحد بدون وقوع حيلة ولا دسيسة وكانت قيمة الأشياء المذكورة بكاملها تضمنت بعقد المقاولة الأول فحينئذ يراعى عقد هذه المقاولة وتعتبر وتبرأ ذمة أصحاب السكورته الذين أمضوا الباقي ويكون لهم حق بأن يأخذوا تضمينا بموجب المادة (343) أما إذا لم تكن قيمة الأشياء الموسوقة تضمنت تماما بعقد المقاولة الأول فحينئذ يكون أصحاب السكورته مسئولين بالتبعة عن زيادة قيمتها بحسب ترتيب تاريخ عقد مقاولاتهم (يعني كوندراتهم ).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (354)
  article_text_ar: إذا كان الوسق بقدر ما تضمن وضاع جانب منه وبقي جانب آخر فحينئذ يعطى من طرف جميع أصحاب السكورته قيمة ضمان ما ضاع على نسبة ما يصيب حصة كل واحد منهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (355)
  article_text_ar: السكورتة تكون عن البضائع التي تشحن بالسفن التي يتصرح عددها وتتعين أسماؤها ويبين أيضا مقدار ما يضمن لكل واحد منها وإذا كان الوسق شحن بواحدة أو بعدة منها فقط فحينئذ يكون صاحب السكورتة مسئولا بمقدار ما ضمنه على كل واحدة من السفن التي شحنت البضاعة بها ولو ضاعت جميع السفن المشروطة ويكون له حق بأن يفسخ قوندراتو السكورته ويستحصل التضمين المسطر في المادة (343) المذكورة آنفا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (356)
  article_text_ar: إذا كان الربان مأذونا بأن يدخل إلى جملة أساكل لكي يبدل وسقه أو يكمله فلا يكون حينئذ صاحب السكورتة مسئولا عما يقع من الضائعات والتلفيات ما لم تكن الأشياء المضمونة موجودة داخل السفينة أو وضعت في الفلائك لأجل إيصالها للسفينة أو إخراجها من السفينة إلى البر ما لم يكن ثمة مقاولة بعكس ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (357)
  article_text_ar: إذا كان السكورتة لوقت معين يتخلص أصحاب السكورتة عند ختام ذلك الوقت عينه وحينئذ يمكن للمضمن أن يضمن بضائعه جديدا عن أخطار يمكن وقوعها في المستقبل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (358)
  article_text_ar: المضمن إذا أرسل السفينة إلى محل أبعد من المحل المعين والمخصص في القوندراتو يتخلص حينئذ صاحب السكورته من المسئولية لو كان المحل المعين هو على طريق ذلك المحل البعيد ويحق له أن يتقاضى أيضا بدل السكورته أما إذا كان ذلك إلى محل أقرب من المحل المقاول عليه فتجرى شرائط السكورته بالتمام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (359)
  article_text_ar: إذا وقعت السكورته بعد أن تلفت البضائع الموسوقة وضاعت أو وصلت إلى المحل المشروط وعلم المضمن بأنها تلفت وضاعت أو أن صاحب السكورته لم يعلم بأنها وصلت أو حصل الظن الغالب بأنه يمكن أن يتصل بالمضمن علم عن ضياعها وتلفها أو لصاحب السكورته بأنها وصلت لمحلها قبل أن يضعا إمضاءهما على القوندراتو فحينئذ تكون السكورته المذكورة في حكم الملغاة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (360)
  article_text_ar: إذا فقدت السفينة أو تلفت وتحقق بأنه يمكن أن يصل من المحل الذي تلفت فيه أو الذي وصلت إليه أو الذي يصل إليه علم بتلفها إلى المحل الذي ينظم به عقد المقاولة السكورته قبل توقيعه يحصل حينئذ الظن الغالب المذكور في المادة السالفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (361)
  article_text_ar: إذا وضعت السكورتة على حالق الخبر الجيد أو الرديء فلا يعتبر حينئذ الظن الغالب المسطر في المواد السالفة ولا يفسخ القوندراتو المذكور ما لم يثبت بأن المضمن علم بضياع تلك الأشياء المضمونة أو وصل الخبر لصاحب السكورتة عن وصول السفينة إلى محلها قبل إمضاء العقد يعني القوندراتو
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (362)
  article_text_ar: إذا ثبت على المضمن الكيفية التي سبق ذكرها في مادة (316) المذكورة أعلاه فحينئذ يحكم عليه بأن يعطى خرج السكورتة إلى صاحب السكورتة مضاعفا وإن ثبت ذلك على صاحب السكورتة فيعطى هو كذلك بدل السكورتة إلى المضمن مضاعفا وعدا عن ذلك ينظر في محاكمتهما الجزائية لكي يترتب جزاؤها بحسب أحكام قانون الجزاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (363)
  article_text_ar: إذا غرقت السفينة بسبب نائبة بحرية أو نشبت على البر وكسرت أو صارت بحالة لا تصلح للسفر أو اغتصبت من طرف الأعداء والقرصان أو ضبطت من جانب دولة أجنبية أو توقفت قبل ابتداء السفر بأمر الحكومة العربية الحجازية أو كانت الأشياء المضمونة عدمت أو تلفت وكان مقدار الضائعات والخسارات يساوي أقل ما يكون ثلاثة أرباع مقدار المبلغ الذي تضمنت به فيمكن حينئذ بأن تترك تلك الأموال والأشياء المضمونة من طرف صاحبها لحساب السكورته وإنما لا يجوز ترك السفينة ولا البضائع ما لم تظهر الأخطار البحرية بحسب الأحكام المبينة في المادة (319)
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (364)
  article_text_ar: كامل الخسارات والضائعات عن الخسارات والضائعات المحررة في المادة السابقة تعد بحرية ويجري تسويتها فيما بين المضمنين وأصحاب السكورتة بحسب ما يتراءى لهم من المنافع الذاتية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (365)
  article_text_ar: ترك الأشياء المضمونة بلا شرط لا يشمل غير هذه الأشياء المضمونة والموجدة بحالة الخطر أما ما يزيد عنها فلا يشمله ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (366)
  article_text_ar: ترك الأشياء إلى أصحاب السكورتة يلزم أن يجرى في ظرف ستة أشهر أو سنة أو سنتين بحسب المحلات التي ستذكر فيما يأتى وهو أنه إذا ضاع المركب وتلف في موانىء وسواحل أوربا أو آسيا أو أفريقيا وفي البحر الأسود والبحر الأبيض فيجوز ترك السفينة أو حمولتها المضمونة في ظرف ستة أشهر اعتبارا من يوم وصول خبرها إلى المضمن أو من اليوم الذي يرد له فيه خبر إرسال السفينة إلى الأساكل والمحلات السالفة الذكر إذا غصبت أو ضبطت هناك أيضا.أما إذا كانت السفينة ضاعت وتلفت أو غصبت وضبطت في الجزر والسواحل الكائنة في أسور وقناري وماري وغربي أفريقيا وشرقي أمريكا ففي ظرف سنة واحدة من حين العلم بضياعها وإرسالها لتلك المحلات وإذا ضاعت السفينة أو ضبطت في باقي المحلات البعيدة من الأرض ففي ظرف سنتين من العلم بضياعها وإرسالها إلى تلك الأطراف ثم من بعد مرور هذه المدات لا يعود يقبل التخلي الذي يقع عنها من جانب المضمنين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (367)
  article_text_ar: كل ما يقع من الأخطار الموجبة لترك الأشياء المضمونة أو يعد من التهلكات البحرية ويعود على أصحاب السكورتة يكون المضمن مجبورا بأن يبلغ خبره رسميا إلى أصحاب السكورتة في ظرف ثلاثة أيام من وصوله إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (368)
  article_text_ar: إذا انقضت المدات المبينة فيما يأتي بدون أن يؤخذ خبر أصلا عن السفينة بعد قيامها وسفرها أو بعد اليوم المبين في الخبر الأخير الوارد عنها فيمكن حينئذ للمضمن أن يترك الأشياء التي ضمنها إلى أصحاب السكورتة ويطلب تضميناتها المشروطة بدون أن يجبر على إثبات ضياع السفينة وهذه المدات تكون ستة أشهر للسفريات القصيرة التي تقع من إحدى موانئ الممالك العربية الحجازية الأخرى منها أو إلى موانئ أو سواحل أوروبا وآسيا وأفريقيا والبحر الأسود والبحر الأبيض أو منها إلى هذه الجهات وسنة للأسفار التي تقع من البلاد العربية إلى سواحل أسور وقناري وماري وبقية الجزائر الكائنة في سواحل غربي أفريقيا وشرقي أمريكا ومنها إلى البلاد العربية وسنة ونصف أيضا للأسفار التي تقع من الممالك العربية إلى باقي البلاد البعيدة ومنها إلى هذا الطرف أما إذا كان السفر فيما بين أسكلتين خارجتين عن الممالك العربية فحينئذ تكون المدة بقدر إحدى المدات المحررة بحسب زيادة قرب هذه الموانىء لأي ميناء أو محل كان من الموانئ المذكورة سابقا ويكتفى على أي حال كان من المضمنين ليجرى أمر الترك بحينه على أنه لم يرد له أصلا خبر لا رأسا ولا بالواسطة
    عن السفينة المضمونة أو البضائع المضمونة الموسوقة فيها ما لم يثبت عكس ذلك من طرف أصحاب السكورتة ويحق للمضمن من بعد انقضاء المدات المذكورة التخلي عن الأشياء مع طلب حقه من السكورتة غير أنه يرفع دعواه هذه لحين ختام المدات المعينة في المادة (266) فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (369)
  article_text_ar: إذا وضعت السكورتة لوقت محدود فتعتبر حينئذ السفينة بعد انقضاء المدات المعينة في المادة السابقة للأسفار القصيرة والطويلة بأنها ضاعت ضمن مدة السكورتة المحدودة إنما إذا ثبتت ضياع السفينة بأنه كان خارجا عن مدة السكورتة فتكون قضية الترك بحكم ما لم يكن ويلزم حينئذ برد ما قد أعطى من التضمينات لأجلها مع ربحه النظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (370)
  article_text_ar: الأسفار التي تقع خارج بوغاز جبل طارق وفي جميع سواحل وجزائر أوروبا وأفريقيا وآسيا الكائنة في البحر المحيط والجزائر الكائنة في شمال أمريكا وجنوبها وأطرافها والأسفار التي تقع منها إلى هذه الجهات تعد من الأسفار المديدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (371)
  article_text_ar: المضمن يمكنه إذا شاء أن يبين في ورقة قضية التبليغ التي سبق ذكرها في المادة (367) المحررة آنفا بأنه يريد إجراء قضية الترك حالا ويطلب من صاحب السكورتة أن يعطيه التضمينات المشروط إعطاؤها في ظرف المدة المعينة بعقد المقاولة ( الكوندراتو ) أو أنه يريد إجراء الترك بظرف المدات المقررة نظاما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (372)
  article_text_ar: يجبر المضمن عند إجراء الترك على أن يعطي بيانا بجميع السكورتات التي عملها بالذات أو بالواسطة أو التي أمر بإجرائها على السفينة أو البضائع مع المبالغ التي أخذها قرضا بحريا وإلا فتعلق حيئنذ المدة التي يلزم اعتبارها من تاريخ قضية الترك لأجل تحصيل ما يلزم من التضمينات على تاريخ بيان الخصوصات المذكورة وتتوقف إلى ذاك الحين إنما لا يلزم لأجل ذلك تحديد المدة المعينة لتقديم عريضة قضية الترك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (373)
  article_text_ar: إذا بين المضمن الخصوصات المذكورة بطريق الحيلة فلا يمكنه حينئذ أن يستفيد من السكورتة بل يجبر فضلا عن ذلك على إعطاء المبالغ التي يكون استقراضها قرضا بحريا ولو كانت السفينة ضاعت أو غصبت أو ضبطت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (374)
  article_text_ar: إذا غرقت السفينة أو نشبت على البر فكسرت فحينئذ يجبر المضمن بأن يصرف جهده على تخليص الأشياء التي غرقت بشرط اقتداره على إجراء أمر الترك في وقته ومحله ويكون له حق بأن يستحصل مصاريف التخليص بقدر قيمة الأشياء المخلصة عندما يؤمن عليها بعد حلفه اليمين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (375)
  article_text_ar: إذا لم يذكر القوندراتو (المقاولة) وقت إعطاء المبالغ المضمونة فحينئذ يكون صاحب السكورتة مجبورا بأن يعطي المبالغ المذكورة في ظرف مرور ثلاثة أشهر من إبلاغ قضية الترك وإن لم يعطيها فيكون حينئذ مجبورا بأن يعطي بعد ذلك ربحها النظامي أيضا وتعتبر الأشياء المتروكة في مقام رهن على ديونه هذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (376)
  article_text_ar: يبلغ المضمن إلى صاحب السكورتة السندات وباقي الأدوات التي تثبت الشحن ووقوع الضائعات قبيل أن يدعى عليه لكي يستحصل منه المبالغ المضمونة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (377)
  article_text_ar: يمكن صاحب السكورتة أن يبادر أيضا لإثبات ما يخالف المواد والوقوعات التي تحويها السندات والأوراق السالفة الذكر غير أنه في حال صدور القرار على إحضار أوراقه ودلائله المختصة بذلك إذا كان المضمن يقدم كفيلا على أن يعيد أخيرا المبالغ التي طلبها فيحكم حينئذ على صاحب السكورتة بأن يعطي حالا المبالغ المذكورة موقتا والكفيل المرقوم يخلص من الكفالة إذا لم تحصل الدعوى من طرف صاحب السكورتة لحد مرور أربع سنين اعتبارا من يوم الكفالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (378)
  article_text_ar: إذا تبلغت قضية الترك على الوجه المبين أعلاه وقبلت أو حكم بها فتصير الأشياء المتروكة عائدة إلى صاحب السكورتة اعتبارا من تاريخ تركها كما أنه إذا تأخر مجيء السفينة أو البضائع والأشياء المتروكة له بعد تركها فلا يمكنه أن يجعل ذلك عذرا أو علة للتخلص من إعطاء المبالغ المضمونة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (379)
  article_text_ar: نولون البضائع والأشياء المستخلصة يترك أيضا مع ترك السفينة ولو كان معطى مسجلا ويصير مختصا بالسكورتة على أن لا يطرأ بسبب ذلك خلل على حقوق أصحاب القرض البحري وأجرة ملاحي السفينة ومعاشاتهم أثناء السفر مع المصاريف الواقعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (380)
  article_text_ar: إذا ضبطت السفينة وتوقفت من طرف إحدى الدول فيكون حينئذ المضمن مجبورا بأن يبلغ القضية إلى صاحب السكورتة بظرف ثلاثة أيام من أخذه الخبر عنها. وأما إذا كانت الأشياء المضبوطة ضبطت وتوقفت في بحار أوربا أو في البحر الأبيض أو في بحر البلطيق فيمكن حينئذ تركها إلى صاحب السكورتة بظرف ستة أشهر. وإذا كان ذلك في محلات بعيدة عن هذه المحلات ففي مرور سنة واحدة ومبدأ هذه المدات يعتبر من تاريخ تبليغ خبر الضبط والتوقيف له. أما إذا كانت الأشياء المضبوطة هي مما يتلف فتنزل حينئذ المدات المذكورة إلى شهر ونصف في الحالة الأولى وإلى ثلاثة أشهر في الحالة الثانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (381)
  article_text_ar: المضمنون مجبورون على كل حال بأن يصرفوا جهدهم بقدر ما يمكنهم لأجل استخلاص الأشياء المضبوطة في ظرف المدات المعينة والمبينة في المادة السابقة كما وإن أصحاب السكورتة مأذونون أيضا بأن يقوموا بكل ما يقتضى من الأعمال لأجل تخليص هذه الأشياء سواء على انفراد منهم أو بالاتفاق مع المضمنين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (382)
  article_text_ar: إذا جنحت السفينة على البر ثم أمكن تقويمها وإصلاحها بحالة يمكن معها أن تصل إلى المحل المشروط ذهابها إليه فلا يسوغ تركها إلى صاحب السكورتة بدعوى أنها غير صالحة للسفر ما لم تتجاوز مصاريف إصلاحها ثلاثة أرباع المبلغ الذي تضمنت به، إنما إذا أصلحت على الوجه المذكور فحينئذ لا يضيع حق المضمنين عن أن يتحصلوا من أصحاب السكورتة المصاريف والأضرار والخسائر التي تنشأ من جنوحها على البر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (383)
  article_text_ar: إذا تبين بمعرفة أهل الخبرة عدم قابلية السفينة للسفر فيكون حينئذ الشخص الذي ضمن وسقها مجبورا بأن يبلغ ذلك صاحب السكورتة بظرف ثلاثة أيام من اطلاعه على الخبر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (384)
  article_text_ar: يجبر الربان في تلك الحالة بأن يسعى ويبذل الغيرة بمداركة سفينة أخرى بوجه السرعة لكي يقل إليها البضائع الموسوقة معه ويوصلها إلى المحل المشروط إيصالها إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (385)
  article_text_ar: إذا شحنت البضائع المذكورة في سفينة أخرى حسبما ورد في المادة السابقة فإن الأخطار والخسائر التي تترتب على الأمتعة المذكورة في تلك السفينة أيضا لحين وصولها وتفريغها في المحل المشروط إيصالها إليه تعود على صاحب السكورتة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (386)
  article_text_ar: كذلك متى شحنت البضائع في سفينة أخرى على الوجه المحرر يكون صاحب السكورتة مجبورا أو ضامنا بأن يفي خسائر البضائع المذكورة وأضرارها ومصاريف تفريغها وأجرة مخازنها ومصاريف تحملها ثانيا مع جميع ما يقع المصاريف في سبيل تخليصها بقدر المبلغ المضمون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (387)
  article_text_ar: إذا لم يجد الربان سفينة أخرى لكي يشحن بها البضائع وينقلها إلى المحل المشروط إيصالها إليه في ظرف المدات المعينة في المادة (380) المسطرة آنفا فيمكن حينئذ للمضمن أن يترك ذلك بظرف المدات المعينة في المادة (366) ابتداء من انقضاء المدة المعينة لأجل شحن البضاعة في سفينة غيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (388)
  article_text_ar: الأشياء المضمونة إذا اغتصبها القرصان وما أمكن للمضمن أن يخبر صاحب السكورتة فحينئذ يمكنه أن يخلصها بإعطاء بدل عنها بدون أن ينتظر الحصول على أمر أو رخصة منه إنما يكون مكلفا بأن يبلغه حالا عندما تسمح له الفرصة عن المبلغ الذي يكون قد تساوى مع القرصان عليه وأجبر على إعطائه لهم لأجل تخليصها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (389)
  article_text_ar: عندما تبلغ الكيفية لصاحب السكورتة على هذا الوجه فيكون مخيرا بأن يقبل إذا شاء هذه التسوية لحسابه أو أن يرفضها وما يختاره من أحد هذين الوجهين يجبر على أن يخبر به رسميا للمضمن في ظرف (24) ساعة من تبلغ قضية المساواة له وإذا بان قبول قضيته المساواة لحسابه فيكون مجبورا حينئذ بأن يعطى حالا الحصة التي أصابت الأشياء المضمونة من بدل التخليص بحسب شرائط التسوية وبعد ذلك تظل أخطار تلك السفرة عائدة عليه بموجب عقد مقاولة السكورتة ( قوندراتو ) وإذا لم يعلمه في المدة المذكورة عما يختاره من هذين الوجهين فيعتبر حينئذ بأنه لم يقبل أمر المساواة لحسابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (390)
  article_text_ar: جميع ما يقع من ابتداء المدة المعينة للأخطار البحرية في المادة (319) المسطرة آنفا إلى حين نهايتها من كل أنواع الخسائر والأضرار التي يمكن وصولها للسفينة والبضائع الموسوقة بها وجميع ما يقع بصورة فوق العادة من المصاريف سواء على السفينة الوسق معا أو على كل منها أفرادا يعد من الخسارة البحرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (391)
  article_text_ar: الخسارة البحرية نوعان يطلق على أحدهما جسيم وعلى الآخر اعتيادي وخصوصي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (392)
  article_text_ar: إذا لم توجد مقاولات خصوصية فيما بين الطرفين تجرى تسوية الخسارات البحرية تطبيقا للأحكام والشرائط المبينة فيما يأتي
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (393)
  article_text_ar: الخسارات البحرية العمومية تقسم غرامة على جميع الأمتعة المشحونة وعلى نصف المركب ونصف النولون وعلى الأمتعة المطروحة في البحر لأجل نجاة السفينة ووسقها بحسب قيمة كل واحدة من ذلك أما الخسارات البحرية الخصوصية فهي ما يترتب من الخسائر والأضرار أو يقع من مصاريف فوق العادة على أي شيء كان وهي تعود على صاحب ذلك الشيء فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (394)
  article_text_ar: الخسارات البحرية العمومية وهي:أولا- ما يعطى للقرصان من النقود وباقي الأشياء بطريق التسوية لأجل تخليص السفينة والبضائع المشحونة بها من يدهم. ثانيا- الأشياء التي تطرح في البحر لأجل السلامة العمومية أو لمنفعة السفينة وحمولتها جميعا. ثالثا- ما يقع أو يكسر مخصوصا بتلك الغاية أيضا والصواري والقلوع وباقي معدات السفينة وآلاتها. رابعا- كذلك ما يترك للغاية المذكورة أيضا من الياطرات وطواقم الحبال والأمتعة. خامسا- الأضرار والخسائر التي تترتب من طرح الأشياء في البحر على ما يبقى في السفينة من الأمتعة. سادسا- الخسائر الموقعة قصدا على السفينة لأجل تسهيل طرح الأشياء في البحر وتخفيف السفينة وتخليص البضائع وتفريغ المياه التي تكون دخلت إلى السفينة مع ما يعرض من التلفات على الأمتعة بسبب هذا العمل. سابعا- ما يصرف من الدراهم على أطباء وجراحين ونفقات وتضمينات لأشخاص يوجدون داخل السفينة ويجرحون أو يعطبون بمصادمة الأعداء لأجل محافظتها. ثامنا- البدل الذي يعطى لأجل تخليص الذين يرسلون إلى البر أو البحر بمهمة للسفينة أو وسقها ويلقي الأعداء عليها القبض أو يأسرونهم سواء كان البدل أعطى منهم أو من غيرهم.
    تاسعا- أجرة الملاحين ومصاريف مأكولاتهم أثناء توقيف السفينة بعد ابتداء سفرها عندما تؤخذ بأمر دولة أجنبية أو تتوقف لوقوع محاربة ما لم تتخلص السفينة مع حمولتها من تعهدهما المتبادل ما لم تكن السفينة مؤجرة مشاهرة ومجبرة بأن تعطي شيئا لأجل النولون بمقتضى المادة (271). عاشرا- مصاريف إصلاح وترميم التخريبات الموقعة بالسفينة بالقصد والرضى لأجل السلامة العمومية وكذا أجرة الأدلاء مع ما يصرف عند دخول السفينة إلى إحدى الموانىء وخروجها منها عندما تجبر على ذلك ضرورة لكي تتخلص من تهلكة قريبة، أما من النوء ومطاردة الأعداء لها بقصد رديء مع ما يقع من مصاريف التفريغ بقصد تخفيفها لكي تدخل إلى إحدى الموانىء أو إلى خليج أو إلى نهر بسبب من تلك الأسباب. الحادي عشر- مصاريف إخراج البضائع المشحونة إلى البر لأجل إصلاح وترميم الأضرار الموقعة بالقصد والرضا لأجل السلامة العمومية وأجر المخازن ومصاريف تحميلها ثانيا إلى السفينة. الثاني عشر- ما يصرفه الربان عندما يطلب استرجاع السفينة وحمولتها إذا كانت ضبطا وتوقفا وأخذا أو إرسلا.الثالث عشر- ما يقع من المصاريف لأجل تنشيب السفينة على البر قصدا خوفا من ضياعها تماما أو إلقاء
    القبض عليها ثم إخراجها أخيرا إلى البحر مع الأضرار والخسائر التي تترتب عليها وعلى وسقها إجمالا أو إفرادا. الرابع عشر- وحاصل الأمر كلما يترتب عند حدوث الخطر من الخسائر والمضرات التي تقع بالقصد والرضا على السفينة وشحنها في أثناء مدة التهلكة لأجل منفعة السفينة وشحنها والسلامة العمومية بموجب مضبطة تنظم لدى المذاكرة من طرف الربان والملاحين تحتوي أسباب ذلك وعلله وكذلك كل ما يقع من الخسائر بسبب التهلكة المذكورة مع ما ينفق من المصاريف في تلك الحالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (395)
  article_text_ar: 'أما الخسارات البحرية الخصوصية فهي: أولا- الخسائر والأضرار التي تترتب سواء كان من رداءة السفينة وعطل شحنها منذ قبل أو من النوء والضبط والاغتصاب والغرق والتنشيب والقعود قضاء على البر. ثانيا- ما يقع من المصاريف لأجل استخلاص السفينة وحمولتها وسلامتها. ثالثا- ما يقع من الضائعات والخسارات من جهة القلوع والصواري وطواقم الحبال والفلائك بسبب النوء وباقي النوائب البحرية. رابعا- مصاريف الدخول لإحدى الموانىء ضرورة سواء كان ذلك لأجل مداركة مأكولات أو أخذ ماء أو تعمير تسبب عن ضرر وقع بقضاء على صورة من الصور. خامسا- مصاريف المأكولات والأجر التي تعطى إلى الملاحين في مدة تعمير السفينة عندما تكون مستأجرة على سفرة تامة وضبطت أثناء سفرها وتوقفت بأمر إحدى الدول. سادسا- جميع ما يقع من الخسارات والتلفيات والمصاريف من شحن السفينة وسفرها إلى حين وصولها لمحلها وتفريغها سواء على السفينة أو على وسقها فقط.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (396)
  article_text_ar: الخسارات المترتبة على البضائع المشحونة بسبب عدم إغلاق الربان لغرف الركاب والغلقات وباقي النوافذ التي تكون على ظهر المركب أو عدم ربط غمنة السفينة أو عدم جودة الحبل المستعملة لأجل شحن السفينة وتفريغها وجميع ما يقع من باقي النوائب بإهمال الربان أو البحرية ولئن كان يعد ذلك من الخسارات البحرية الخصوصية ويعود على أصحاب المتاع رأسا إلا أن أصحاب المتاع يكون لهم صلاحية الادعاء على تضمين أضرارهم وخسائرهم من الربان والسفينة والنولون.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (397)
  article_text_ar: إنما يعطى من الأجر إلى الأدلاء والرفقاء لأجل دخول السفينة إلى ميناء أو نهر أو خروجها منهما مع خرج الإشارات التي توضع لدى الفحص وعلى اللابورت والبراميل والسلاسل والأوتاد والفنارات ورسم المرسى وباقي الرسومات السفرية مما يكون برخصة من السفينة لا يعد من الخسارات البحرية وإنما هو عبارة عن مصاريف تعود على السفينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (398)
  article_text_ar: إذا اصطدمت سفينتان مع بعضهما وحدث ذلك قضاء بحتا فالخسارة التي تترتب على ذلك لا تسترد من أحد ما أصلا بل ترجع على السفينة المتضررة، أما إذا وقع ذلك بسبب تقصير أحد ربانى السفينتين فتعطى حينئذ الخسارة الحاصلة من طرف الربان الذي هو أصل السبب، وإذا كان ذلك ناشئا عن تقصيرات منهما كلاهما أو كان مجهولا من كان منهما السبب، فحينئذ تعتبر قيمة كل من السفينتين مقياسا وتؤخذ من كل منهما مصاريف التعمير بحسب قيمته وعندما تقع هاتان الفقرتان الأخيرتان يكشف فيها على الضرر الحاصل ويتقدر بمعرفة أهل الخبرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (399)
  article_text_ar: استدعاء الخسارات البحرية إذا كانت عمومية لا يقبل ما لم يتجاوز في المائة واحد من قيمة السفينتين معا وشحنها وإذا كانت من الخسارات الخصوصية فكذلك لا تقبل العريضة ما لم تتجاوز في المائة واحد عن قيمة الأشياء التي وقعت عليها الخسارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (400)
  article_text_ar: إذا أدرج في قوندراتو السكورتة شرط البراءة من الخسارات فيخلص حينئذ أصحاب السكورتة من الخسارات العمومية والخصوصية ما عدا القضايا التي هي مدار لقضية الترك فالمضمنون مأذونون في مثل هذه الحالة بطلب ما يختارونه في قضية الترك أو تضمين الخسارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (401)
  article_text_ar: إذا اضطر الربان بأن يطرح مقدار من وسق السفينة في البحر وأن يقطع سوارية وغمنة أو يترك قاطراته أو أن يتخذ تدابير من التدابير التي هي فوق العادة لأجل السلامة العمومية من النوء أو من مطاردة الأعداء وكان يوجد في السفينة ممن لهم علاقة في الشحن فيأخذ رأيهم ورأي المتقدمين بين الملاحين في ذلك وإذا حصل اختلاف في الأراء فيرجح حينئذ رأيه ورأي المتقدمين من الملاحين ويتشبث بإجراء المقتضى على ذلك الوجه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (402)
  article_text_ar: إذا أوجب الحال طرح أشياء في البحر فيلقي الربان حينئذ بقدر الممكن ما كان أقل لزوما أو أثقل حملا وأخف ثمنا من الأشياء الموجودة أولا فأولا ثم بعد ذلك يبقي الأشياء التي يختارها مما يوجد على الظهر بعد أن يأخذ فيها رأي المتقدمين من الملاحين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (403)
  article_text_ar: 'يجبر الربان متى ساعده الوقت بتنظيم مضبطة تتضمن المذاكرة التي جرت والقرار المعطى بالخصوص المذكور وتكون هذه المضبطة حاوية. أولا: أسباب طرح الأشياء في البحر. ثانيا: التصريح عن الأشياء المطروحة في البحر أو التي تضررت. ثالثا: توقيع الأشخاص الذين أعطوا رأيا في ذلك وأختامهم على المضبطة وإذا وجد من يستنكف عن الإمضاء فيوضح أسباب استنكافه وبعد أن تنظم المضبطة على هذا الوجه يجرى قيدها في دفتر اليومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (404)
  article_text_ar: 'عندما تصل السفينة إلى أول ميناء تدنو منه يجبر الربان بأن يؤيد صحة الوقوعات المسطرة في المضبطة المذكورة المقيدة في دفتر يومية السفينة ويؤمن عليها بيمين السلطة المبينة في المادة الآتية:'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (405)
  article_text_ar: دفتر مفردات الضائعات وما يقع من الخسارات ينظم في محل تفريغ السفينة بسعي وغيرة الربان ومعرفة أرباب الخبرة فإذا كان المحل المذكور هو من الممالك العربية الحجازية فتعين أرباب الخبرة من جانب محكمة التجارة وإن لم يوجد فينصبون من طرف مجلس البلدية وإذا كان من الممالك الأجنبية فيعينون من جانب معتمدي الحكومة العربية الحجازية وإن لم يكن موجودا فمن جانب الحكومة المحلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (406)
  article_text_ar: تقدر أثمان الأشياء المطروحة في البحر والخسائر الواقعة بحسب قيمتها الجارية في المحل الذي أفرغت فيه السفينة وجنس البضائع المطروحة في البحر وأنواعها يثبت بإبراز سندات الشحن والقوائم وفي الأوراق الموجودة التي تصلح للاحتجاج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (407)
  article_text_ar: أهل الخبرة المعينون لأجل تقدير هذا الثمن يرتبون دفتر توزيع وتقسم الضائعات والخسارات ويجري التقسيم غرامة على جميع الأشياء المطروحة في البحر والمتروكة والمتخلص مع نصف السفينة ونصف نولونها بحسب قيمة كل منهما في محل تفريغ السفينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (408)
  article_text_ar: يحكم بتنفيذ دفتر التوزيع غرامة وتجري تسويته من طرف المحكمة التجارية وإن لم يكن فمن طرف مجلس البلدة وإذا كان في الممالك الأجنبية فمن طرف المعتمد العربي وإن لم يوجد فمن طرف الحكومة المحلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (409)
  article_text_ar: إذا كانت أجناس البضائع المشحونة وأنواعها غير مبينة في سند الشحن على وجه الصحة وتزيد قيمتها أيضا عن المقدار المبين وكانت البضائع المرقومة قد تخلصت فتكون الحصص من تقسيم الغرامة بحسب قيمتها الصحيحة وإذا كانت تلفت فتعطى بدلاتها بحسب أجناسها وأنواعها المبينة في سندات الشحن وإذا كانت البضائع المذكورة دون النوع المبين في سندات الشحن وتخلصت فيجرى بحسب نوعها المبين في السند وإذا كانت طرحت في البحر أو أعطيت فتعطى به لأنها بحسب فيئاتها الصحيحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (410)
  article_text_ar: المهمات الحربية والمؤنة التي تكون لأجل محافظة السفينة ومعيشة الملاحين مع ملابسهم وملابس الركاب لا تدخل في التقسيم لأجل ضمان البضائع المطروحة في البحر أما باقي الأشياء فتدخل بالغرامة بأجمعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (411)
  article_text_ar: الأشياء التي يوجد بها سند شحن أو علم وخبر من الربان أو لا تكون مقيدة في مانفيستو السفينة تعين دفتر قيد الشحن إذا طرحت في البحر فلا تعطى أثمانها إنما إذا تخلصت فتدخل في غرامة الخسارات البحرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (412)
  article_text_ar: الأشياء الموسوقة على الظهر (الكورته) إذا تخلصت فتدخل في الغرامة وإذا طرحت في البحر وتلفت من طرح الأشياء في البحر فلا يمكن لأصحابها أن يطلبوا تسويتها فيما عدا السياحة القصيرة بل يمكنهم أن يطلبوا تضمينها من الربان بحسب أحكام المادة (193).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (413)
  article_text_ar: الخسائر التي تعرض على السفينة بسبب طرح الأشياء في البحر إذا كانت وقعت لأجل تسهيل أمر الطرح فتتساوى غرامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (414)
  article_text_ar: كما أنه يمكن تخليص السفينة بواسطة طرح الأشياء في البحر لا يبقى حينئذ محل للغرامة أصلا كذلك لا يدخل ما كان تخلص من هذه الأشياء في الغرم لأجل تضمين الأشياء التي طرحت في البحر أو التي خسرت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (415)
  article_text_ar: إذا تخلصت السفينة بواسطة طرح الأشياء في البحر وبقيت مداومة على السفر وأخيرا غرقت وتلفت فحينئذ يدخل ما تبقى من أشياء فقط في الغرم بحسب قيمته وهو في حالته الحاضرة بعد تنزيل مصاريف تخليصه لأجل تضمين الأشياء المذكورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (416)
  article_text_ar: إذا تخلصت السفينة أو شحنها بواسطة قطع وكسر آلاتها ومعداتها أو بإيقاع خسارة أخرى ثم ضاعت أخيرا البضائع المشحونة بها وتلفت أو غصبت ونهبت فلا يحق للربان بأن يطلب من أصحاب البضائع أو شاحنيها ومستلميها حصة من الغرامة المختصة بالخسارات المذكورة آنفا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (417)
  article_text_ar: إذا ضاعت البضائع المشحونة بسبب من وقع أصحابها ومتسلميها أو عن خطأ منهم فتعتبر منهم حينئذ كأنها باقية وتدخل في غرامة الخسارات العمومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (418)
  article_text_ar: الأشياء المطروحة في البحر لا تدخل في وقت من الأوقات أصلا في غرامة الخسارات التي تعرض على الأمتعة الباقية في السفينة التي تكون خلصت بعد قضية الفض والبضائع المشحونة لا تدخل في الغرامة لأجل تضمين السفينة التي تكون ضاعت وتلفت واكتسبت حالة عدم القابلية للسفر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (419)
  article_text_ar: إذا فتح غطاء الانباريعيبن كورتة السفينة لأجل إخراج البضائع بانضمام رأى الأشخاص المبينين في مادتي (301) (302)، تدخل الأمتعة المذكورة في الغرامة لأجل إيفاء الخسارات الواقعة على السفينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (420)
  article_text_ar: إذا ضاعت وتلفت بضائع وضعت في الفلائك لأجل تخفيف سفينة تريد الدخول لإحدى الموانئ أو الأنهار فتدخل السفينة وكافة وسقها في الغرامة التي تقع لأجل تضمين تلك البضائع إنما إذا ضاعت السفينة وتلفت مع ما يبقى بها من الشحن فلا تدخل البضائع الموضوعة في الفلائك لو أخرجت سالمة إلى البر في الغرامة لأجل تضمين السفينة والشحن المذكور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (421)
  article_text_ar: الربان والملاحون يكون لهم حق الامتياز على البضائع المشحونة وأثمانها الحاصلة لأجل استيفاء الغرامة في جميع الخصوصات المبينة آنفا وبناء على ذلك إذا استنكف أصحابها من إعطاء الغرامة فيكون للربان والملاحين المذكورين صلاحية بأن يطلبوا من أصحاب البضائع المذكورة أو يوقفوا بمقدار حصة الغرامة التي يطلبون أخذها لأجل الاستئمان على استيفائها سواء كان ذلك لهم بالذات أو بطريق الوكالة لباقى أصحاب المطاليب وأن يبيحوا ذلك من محكمة التجارة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (422)
  article_text_ar: الأشياء التي تطرح إلى البحر إذا خلصها أصحابها واستحصلوا عليها بعد توزيع الغرامة فيكون أصحابها مجبورين بأن يرجعوا إلى الربان وباقي الأشخاص الذين لهم علاقة بذلك الدراهم التي تتبقى بعد تنزيل ما يترتب من الأضرار على البضائع المذكورة بسبب طرحها في البحر مع مصاريف تخليصها وهذه الدراهم المرتجعة تتوزع وتقسم غرامة فيما بين أصحاب السفينة وبين من لهم علاقة بالشحن بحسب مقدار الحصة التي أعطوها لأجل ما ترتب من الخسارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (423)
  article_text_ar: لا يمكن للربان أن يمتلك السفينة التي هو راكبها ولا أن يصير صاحبا بوقت من الأوقات بواسطة مرور الزمن أصلا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (424)
  article_text_ar: صلاحية ترك الأشياء لصاحب السكورتة تسقط بمرور الوقت والزمان المعين في المادة (363).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (425)
  article_text_ar: ترفع الدعوة التي تتولد من عقود مقاولات الاستقراضات البحرية أو سندات السكورتة بعد مرور خمس سنين من تاريخها وترد من طرف المدعى بواسطة مرور الزمان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (426)
  article_text_ar: دعوة إيفاء أثمان ما كان أعطي لأجل إنشاء السفينة وتعميرها من الكرسة والقلوع والياطرات وباقي احتياجاتها والذخيرة التي أخذت لها وإعطاء بدلات إنشائها وإصلاحها وأجرة العملة المستخدمين بها ترد بواسطة مرور الزمان إذا كان مر عليها ثلاث سنين منذ إعطاء الأشياء أو نهاية الإنشاء أو التعمير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (427)
  article_text_ar: دعاوى نولون السفينة ومعاشات وأجر الربان والملاحين وباقي المأمورين والخدمة والمستخدمين فيها وإيفاء ذلك وإعطاء المبالغ التي تكون الركاب مديونة بها وتسليم البضائع المشحونة ترد من طرف الخصم بواسطة مرور الزمان إذا كانت مرت سنة واحدة منذ وصولها إلى المحل المشروط ذهابها إليه وكذلك الدعاوى التي تتعلق بالمأكولات المعطاة بأمر الربان إلى الملاحين وباقي مأموري السفينة وخدامها ترد بواسطة مرور الزمن إذا كانت مرت سنة واحدة على إعطائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (428)
  article_text_ar: الدعوى وإن كانت تدفع وترد بواسطة مرور الزمان كما تقدم بيانه في المواد (425 و 426 و 427) السالفة الذكر إلا أنه لا يمكن لأصحاب هذه الدعوى أن يكلفوا أخصامهم الذين يدفعون دعاويهم على هذا الوجه يمينا حسب اعتقاداتهم الدينية بأنهم أعطوا ما عليهم بالتمام وإن كان المديون توفي فيكلفون لهذا اليمين زوجة المتوفى أو ورثته أو وصي الوارث إذا كان الوارث يتيما بأنهم لا يعلمون بأن هذا الشيء المطلوب هو دين على المتوفى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (429)
  article_text_ar: إذا وجد للمديون سند ببيان دينه أو تحويل أو ورقة حساب مقبولة منه بإمضائه أو كان تقدم إخطارا وعريضة من طرف الدائن وتبلغ له بوقته حينئذ لا يمكن أن تدفع الدعوى بواسطة مرور الزمان على الوجه المحرر، إنما إذا لم يوجد سند ولا تحويل بل كان تقدم وتبلغ الإخطار والعريضة فقط ثم سكت المدعي ثلاث سنين ولم يفتش عن دعواه وأعطى القرار على اعتبار الإخطار والعريضة المنظمين على ذلك الوجه بحكم ما لم يكن حسب عريضة المديون فحينئذ تدفع الدعوى بواسطة مرور الزمان على الوجه المحرر آنفا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (430)
  article_text_ar: إذا تضررت البضائع الموسوقة ثم حصل الادعاء بالضرر والخسارة على الربان وأصحاب السكورتة بعد أن تكون تسلمت تلك البضائع بدون إخطار ولا اعتراض أو كانت وقعت خسارات بحرية وادعى الربان على الشاحن بالخسارات المذكورة بعد أن يكون سلمه بضائعه الموسوقة معه وأخذ نولونها بدون إخطار ولا اعتراض أو تصادمت سفينة وكان يوجد في محل الاصطدام حكومة يمكن للربان أن يشتكي إليها ولم يدع بذلك ثم فتح أخيرا دعوى بخصوص هذا الاصطدام فلا تسمع هذه الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (431)
  article_text_ar: الإخطار والاعتراضات والشكايات المذكورة إذا لم تعرض وتبلغ في ظرف (48) ساعة ولم تتقدم عريضة بالدعوى في ظرف واحد وثلاثين يوما اعتبارا من تاريخ تبليغها فتصير في حكم الملغاة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (432)
  article_text_ar: تؤلف المحكمة التجارية من رئيس وستة أعضاء؛ ثلاثة فخريين وثلاثة دائمين برواتب ينتخبون من الأشخاص الذين لهم خبرة تامة بالشؤون التجارية والمشهورين بالديانة والشرف والاستقامة وعضو شرعي سابع بحيث لا تقل أسنانهم عن الثلاثين سنة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (433)
  article_text_ar: يجري تعيين كل من الرئيس والأعضاء المنوه عنهم من قبل صاحب الجلالة ومدة عضويتهم سنتان ويجوز تعيينهم مرة ثانية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (434)
  article_text_ar: يرأس الجلسات الرئيس وإذا غاب الرئيس يرأس المجلس أكبر الأعضاء سنا، وتعتبر الهيئة ومن يرأسها من حيث المجموع هى الهيئة الكاملة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (435)
  article_text_ar: الرئيس يتولى إدارة المجلس وتوقيع صور جميع القرارات التي تصدر من هيئة المجلس بعد استكمال تواقيع الأعضاء على أصلها بالموافقة أو المخالفة وأما المذكرات والصكوك بعد تنظيمها فيكتفى حين تصديرها بتوقيع الرئيس فقط .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (436)
  article_text_ar: كل من الرئيس والأعضاء مكلف بتوقيع ما يثبت من القرارات في نهاية كل جلسة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (437)
  article_text_ar: الرئيس والأعضاء كل منهم حر في إبداء رأيه أثناء المذاكرة وتعتبر الأحكام حين إعطاء القرار بأكثرية الآراء وبالاتفاق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (438)
  article_text_ar: إذا أقيمت على الرئيس أو أحد الأعضاء قضية ، أو كان لأحدهم منفعة مالية في نفس القضية أو شراكة مع أحد المتداعيين أو شهادة لأحدهما أو عداوة دنيوية أو قرابة ماسة تمنع قبول الشهادة أو ثبوت غرض من الأغراض فإنه لا يجوز له الانضمام إلى هيئة المجلس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (439)
  article_text_ar: في حالة حدوث ما يدعو إلى رفع الرئيس أو أحد الأعضاء بسبب من الأسباب التي تضمنتها المادة السابقة فعلى المطالب بذلك من أحد المتداعيين أن يقدم طلبه إلى المجلس رسميا وعلى هذا - أي مجلس - إحالة كل طلب يقدم إليه من الخصوصات المبحوث عنها فى المادة (438) إلى الرئيس أو العضو المطالب بعدم اشتراكه في هيئة المجلس لأخذ رأيه بالموافقة أو المخالفة وعليه في الحالة الأولى أن يتنحى كما على المجلس أن يتولى في الحالة الثانية التحقيق في ذلك ويجري ما تقتضيه المصلحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (440)
  article_text_ar: لا يجوز لأحد الأعضاء أو الرئيس أن ينفرد بأحد المترافعين أثناء المحاكمة على الإطلاق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (441)
  article_text_ar: محظور على الرئيس و الأعضاء إبداء رأي أثناء المحاكمة وقبل خروج المتحاكمين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (442)
  article_text_ar: الرئيس مسئول عن إدارة المجلس وعن سير الأعمال وتعجيل المعاملات فيه كما هو مسئول عن جميع مأموري الإدارة وحسن أعمالهم في وظائفهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (443)
  article_text_ar: 'القضايا التي يحال أمر النظر فيها إلى المحكمة التجارية ويجري بالفعل بتها عن طريقها وضمن اختصاصها هى : أ- كل ما يحدث بين التجار ومن لهم بهم علاقة تجارية من صرافة ودلالين ومقدمي المخازن والحيشان من مشاكل ومنازعات متولدة من أمور تجارية محضة سواء كانت برية أو بحرية . ب- القضايا المنبعثة عن الصرافة وبالأخص صرف النقدية والأقيام والأوراق المالية وما يتعلق بالحوائل العادية والحوائل التجارية المعبر عنها - بالجيرو - والسندات التجارية المعبر عنها بالسفاتج المتداولة بين التجار سواء كانت بين البنوك وفيما بينهم وبين سائر الأصناف المذكورة أسماؤهم في الفقرة (أ) . ج- المشاكل التي تحدث بين أرباب السفن الشراعية بخصوص التلفيات والاصطدامات والتعديات على الإطلاق وكذا أجور النقل . د- القضايا الناشئة عن اختلاف في التعهدات والمقاولات سواء كانت بين أرباب السفائن أو بين هؤلاء والتجار وكذا الكفالات المالية المختصة بالأمور التجارية . هـ- القضايا التي تقع بين الشركاء المرتبطة شراكتهم بالأصول التجارية أو بين الشركات على اختلاف أنواعها الجاري تأسيسها وتسجيلها وفق نظاميها المخصوصين وكذا بين سائر التجار
    والصيارف والدلالين ومقدمي الحيشان والأمناء والوكلاء بالعمولة وكتبتهم وخدم محلاتهم فيما إذا كان لهم علاقة تجارية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (444)
  article_text_ar: إن عدا ما هو مندرج في هذا النظام من التعريفات القانونية في رؤية الدعاوى التجارية يجوز أيضا للمحكمة رؤية الدعوى التي يصدر بها أمر خاص من قبل جلالة الملك المعظم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (445)
  article_text_ar: كافة الصكوك التي تصدر من المجلس التجاري المتعلقة بالمرافعات التجارية ضمن القضايا المبحوث عنها في المادة (443) من هذا النظام تكون معتبرة ونافذة الإجراء إذا كانت موافقة لأصولها واكتسبت الحكم القطعي بموجب هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (446)
  article_text_ar: يؤلف المكتب التجاري من سكرتير وكاتب ومأمور تسجيل ومباشرين وإذا اقتضى اللزوم أكثر من ذلك يزاد حسب الاقتضاء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (447)
  article_text_ar: يجب أن يكون عموم الكتبة وسائر موظفي الإدارة من أرباب الخبرة والدرية بوظائفهم ومن ذوي الديانة وحسن الاستقامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (448)
  article_text_ar: 'يجب أن يشمل مكتب المحكمة التجارية على الدفاتر الآتية : أ- دفتر الأساس تقيد فيه العرائض بعدد متسلسل مع ذكر اسم المدعي والمدعى عليه وشهرتهما ومحل إقامتهما وتابعيتهما وماهية الدعوى التي تحصل فيها إلى النتيجة. ب- دفتر لقيد السندات التي تبرز من أرباب المصالح . ج- دفتر لقيد الأمانات والنقود التي ترد إلى صندوق المجلس مع البيان الكافي . د- دفتر لقرارات المحكمة . هـ- دفتر سجل يسجل فيه كافة الصكوك التي تصدر من المحكمة . و- دفتر الحاصلات ويقيد فيه جميع حاصلات المجلس بأنواعها ومقدار المقبوض منها .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (449)
  article_text_ar: يجب أن تكون عموم الدفاتر المنوه عنها في المادة (448) مرقومة كل منها حسب حجمه بعدد متسلسل مطبوع ومختوم على رأس كل صفحة بختم المحكمة كما يقيد خطا في منتهى كل صفحة رقمها المطبوع ويختم أيضا بالختم الرسمي مع توقيع الرئيس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (450)
  article_text_ar: يجب أن تكون الدفاتر الموضح اسمها بالمادة (448) سالمة من المسح والحك وتخلل الكلمات بين السطور على أنه إذا كتب بأحد الدفاتر عبارة زائدة أو مكررة يضرب على تلك العبارة بقلم رفيع بحيث يمكن قراءتها وفي حالة سقوط كلمة أو عبارة سهوا فعلى الكاتب أن يخرج بها إلى هامش الدفتر بشرط أن يوقع عليه من قبل الرئيس وسكرتير المحكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (451)
  article_text_ar: على السكرتير أن يتولى إدارة المكتب وتحرير المذكرات والصكوك ومقابلتها بعد التبييض وتطبيق الصور ومقابلتها مع السجل والتوقيع بعد ذلك على صحتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (452)
  article_text_ar: السكرتير مكلف بقبض الحاصلات وقيدها بالدفتر المخصوص بها وحفظ جميع ما يتودع إلى المحكمة من أمانات ونقود وغيرها في صندوق المحكمة على أن تؤخذ منه الكفالة اللازمة مصدقة حسب نظامها المخصوص .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (453)
  article_text_ar: على سكرتير المحكمة أن يقدم حاصلات المحكمة على رأس كل شهر أمانة لرئاسة أموال جدة مصحوبة ببيان موضح فيه مفردات الحاصلات وأصنافها موقعة منه ومن الرئيس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (454)
  article_text_ar: على كاتب الضبط أثناء المحاكمة ضبط إفادة الطرفين بجريدة الضبط والمذكرات وقيد السندات التي تسلم إلى المحكمة من قبل أرباب المصالح وإعطاء أربابها إيصالا باستلامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (455)
  article_text_ar: على مأمور السجل تسجيل جميع الصكوك والقرارات وتحرير مذكرات الجلب وقيد جميع الأوراق والسندات التي تقدم إلى المحكمة وأخذ صور السندات والأوراق التي تعاد إلى أصحابها بعد التصديق على صحة مقابلتها وانطباقها على الأصل من رئيس الكتبة ورئيس المحكمة وحفظها ضمن أوراق القضية المتعلقة بها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (456)
  article_text_ar: لا يجوز لأى كاتب إعطاء أي صورة من أصل الأوراق والسندات ونتائج المعاملات على اختلاف أنواعها ما لم يكن ذلك بأمر سابق من رئيس المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (457)
  article_text_ar: لا يسوغ تصدير الصكوك الصادرة من المحكمة ما لم تكن مطابقة لأصولها وسجلاتها وموقعا على صحة ذلك من سكرتير المحكمة وكاتبها ومختومة بختم المحكمة وتوقيع الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (458)
  article_text_ar: السكرتير مسئول عن حسن إدارة المكتب ومراعاة طريق التسلسل في تقديم المعاملات على بعضها وتنظيمها وتسجيل وتصدير المثبوت منها حسب أصوله مع ملاحظة أعمال الكتبة والمباشرين وكل خلل في الإدارة أو خطأ في الشئون الكتابية أو تأخر في تقديم المعاملات أو تصديرها بوقتها على منوالها الأصلى هو المسئول الأول فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (459)
  article_text_ar: نظام القضايا في المحكمة التجارية بموجب عريضة تحال إليه من قبل الحاكم الإداري تشمل على اسم المدعي والمدعى عليه وصنعتهما ومحل إقامتهما وتابعيتهما وخلاصة الدعوى مع أدلتها واسم اليوم وتاريخ الشهر والسنة المقدمة فيه موقع عليها بختم المدعي أو توقيعه أو وكيله الرسمي وإن يطلب فيها جلب الخصم والحكم عليه بالمبلغ المدعى به مع مصاريف المحاكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (460)
  article_text_ar: كل عريضة لا تشتمل على الشروط المبحوث عنها فى المادة السابقة لا تكون مقبولة لدى المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (461)
  article_text_ar: العرائض المحالة إلى المحكمة التجارية المستوفية للشروط المنصوص عليها في المادة (459) تحال من قبل الرئيس أولا إلى السكرتير للقيد واستيفاء الرسوم ثم يجري تعيين يوم المحاكمة والساعة واسم المباشر الذى يعهد إليه أمر تبليغ الجلب من قبل الرئيس ثم تودع إلى الكاتب المختص لعرضها على المحكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (462)
  article_text_ar: يجب أن تكون العريضة المقدمة على نسختين نسخة منها تبقى أساسا بمكتب المحكمة والثانية تبلغ إلى المدعى عليه مشفوعة بورقة الجلب وبنسبة عدد المدعى عليهم تعدد النسخ .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (463)
  article_text_ar: كل عريضة تقدم إلى المحكمة ويترك مقدمها مراجعة المحكمة بشأنها ثلاثة أشهر تكون ملغاة وله الحق في تجديد العريضة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (464)
  article_text_ar: تحرر أوراق الجلب باللغة العربية وبعدد متسلسل مع التاريخ واسم اليوم واسم المدعي والمدعى عليه وشهرتهما وصنعتهما ومحل إقامتهما وتابعيتهما يوم المحاكمة والساعة واسم المباشر وشهرته على أن تكون إرسالها على نسختين نسخة تسلم للمدعى عليه والأخرى يؤخذ توقيعه عليها وتعاد إلى المحكمة موقعة من المباشر الذي عهد إليه أمر تبليغها وإن تعدد المدعى عليهم تعدد نسخ الجلب على الصورة المار ذكرها بنسبة عددهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (465)
  article_text_ar: إذا كان المراد جلبه أميا ولم يكن له ختم يؤخذ أثر إبهامه على النسخة المكلف بتوقيعها وعلى المباشر أن يشهد على كيفية الواقع شخصين مع أخذ توقيعهما في ورقة الجلب التي تعاد إلى المحكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (466)
  article_text_ar: في حالة امتناع المدعى عليه عن استلام ورقة الجلب على المباشر أن يضع إحدى النسختين أمام الممتنع بعد أن يشهد عليه ولو شخصا واحدا مع أخذ توقيعه على النسخة الثانية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (468)
  article_text_ar: للمباشر إذا اقتضت الضرورة أن يسلم ورقة الجلب إلى من يوجد في محل تجارة المطلوب جلبه من ولد أو حفيد ثابت علاقتهما بتجارة المحل بشرط مراعاة الأحكام السابقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (469)
  article_text_ar: يعين يوم المحاكمة في اليوم الذى يحرر فيه الجلب إذا كانت القضية من المواد المستعجلة وكان كل من المدعي والمدعى عليه مقيما في عين البلدة المقام فيها القضية كما أنه يجوز اعتبار مدة الجلب لعين الأسباب لمدة لا تقل عن ثلاثة أيام في داخل البلدة وفي حالة غياب أحد المتداعيين أو كليهما عن البلدة أو كان محل إقامتهما في غيرها من البلدان تقرر لمدة الجلب مدة مناسبة من طرف الرئيس بنسبة بعد المسافة والوسائط النقلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (470)
  article_text_ar: إذا كان المراد جلبه من المقيمين في البلاد البعيدة أو البلاد الأجنبية فترسل ورقة الجلب ضمن مذكرة إلى النيابة العامة لإحالتها على وزارة الخارجية ليجري تبليغه إليه بمعرفة حكومة تلك الجهة وتقدر له من قبل المحكمة مدة مناسبة لبعد المسافة ومراعاة الوسائط النقلية المنظمة وغير المنظمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (471)
  article_text_ar: على المباشرة أن يسلم أوراق الجلب بحسب الشروط المتقدمة وإذا أخل بشيء من تلك الشروط يكون مسئولا ويعرض للجزاء لأول مرة وعند التكرار يطرد من وظيفته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (472)
  article_text_ar: تجرى المرافعات علنا في المحكمة التجارية ويجب على الحاضرين أثناء المحاكمة سواء كانوا مترافعين أو شهودا أو سامعين أو من هيئة المحكمة التزام الصمت والسكوت ورعاية الأدب وللرئيس الحق في إسكات أو توبيخ أو طرد من يقع منه ما يخل بآداب المحاكمة أو إحداث غوغاء أو مشاجرة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (474)
  article_text_ar: يقتضى أن يبرز صك الوكالة قبل المرافعة إلى سكرتير المحكمة وبعد رؤيتها يشرح عليها رؤيت بلا خرج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (475)
  article_text_ar: للموكل عزل وكيله متى شاء ما لم يتعلق حق الغير به فلا يجوز أن يعزله حينئذ وكذلك ليس للوكيل أن يعزل نفسه فى هذه الحالة إلا بحضور ورضاء المدعي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (476)
  article_text_ar: إذا أقيمت دعوى من إحدى الدوائر الرسمية على بعض الأفراد أو بالعكس فيكفي أن يقوم رئيس الدائرة لسماع تلك الدعوى والمرافعة فيها بنفسه أو بتوكيله أحد موظفي دائرته ويكفي في مثل هذا التوكيل أن يحرر به مذكرة رسمية من رئيس تلك الدائرة ولا يجب أن تكون الوكالة محررة لدى الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (477)
  article_text_ar: لا يسوغ لهيئة المحكمة التجارية سواء كان الرئيس أو الأعضاء أو السكرتير أو الكتبة أو المسجل والمباشرين وغيرهم أن يتوكلوا لأصحاب الدعاوى لدعاويهم التي ترى في المحكمة التجارية ويجوز لهم أن يتحاكموا بالذات لدعاويهم الخصوصية لدى المحكمة التجارية كما أن لهم أن يتوكلوا عن آبائهم وأولادهم وأزواجهم وعن الأيتام الذين هم أوصياؤهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (478)
  article_text_ar: إذا حضر الطرفان المتداعيان في اليوم المعين للمحكمة فعلى الرئيس أن يأمر كاتب الضبط بإحضار أوراق تلك الدعوى ثم يفتتح الجلسة باسم جلالة الملك المعظم ثم يباشر في إجراء المحاكمة بصورة علنية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (479)
  article_text_ar: يجب على كاتب الضبط أن يمسك لكل قضية جريدة يعبر عنها بجريدة الضبط بعدد متسلسل ويذكر فيها اسم رئيس الجلسة والأعضاء الحاضرين واسم المدعي والمدعى عليه وشهرتهما واسم الكاتب الذي تولى كتابة الضبط على مسامع الهيئة والمتداعيين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (480)
  article_text_ar: على الرئيس أن يبدأ بالسؤال من المدعي ثم من المدعى عليه وإذا اقتضى الحال تكرار السؤال من المتداعيين فله ذلك إلى انتهاء المحاكمة ولكل من الأعضاء هذا الحق بعد الاستئذان من الرئيس ثم تقرر المحكمة ما تراه مطابقا للحقيقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (481)
  article_text_ar: لا يجوز استعمال أي شيء كالقهوة والشاي وغير ذلك في أثناء المحاكمة ما عدا الماء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (482)
  article_text_ar: لا يجوز لهيئة المجلس وغيرهم ممن يكون حاضرا أثناء المحاكمة التكلم بغير اللغة العربية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (484)
  article_text_ar: لا يسمح لأحد المتداعيين أن يخرج عن صدد الدعوى ولا أن يقطع كلام خصمه أثناء المرافعة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (485)
  article_text_ar: إذا أراد أحد الطرفين أن يكتب مدافعة بنفسه على ورقة بشرط أن لا يكتب شيئا خارجا عن صدد دعواه أو دفعه فله ذلك على أن تكون باللغة العربية وبعد توقيعه عليها تقرأ على الهيئة ويرصدها كاتب الضبط بجريدة الضبط .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (486)
  article_text_ar: يجب أن ترصد جميع السؤالات التي تتوجه على أحد المتداعيين أو الشهود والأجوبة التي تصدر منهم والسندات والأوراق التي تبرز أثناء المحاكمة بجريدة الضبط حرفيا إلى إتمام المحاكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (487)
  article_text_ar: إذا رأت المحكمة لزوما لجلب أحد المتداعيين بالذات للاستيضاح منه عما تراه لازما وكان له وكيل فله ذلك وإن كان هناك مانع شرعي يمنعه من الحضور فللمحكمة أن تنيب عنها أحد الأعضاء للاستيضاح في محله ويوقع عليه من العضو وكاتب الضبط وشاهدين ثم يعرض ذلك الإيضاح للمحكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (488)
  article_text_ar: إذا حدث أثناء المحاكمة دعوى متعلقة بالدعوى المرئية من جهة تعهد أو كفالة أو استحقاق متفرع من أصل تلك الدعوى فللمحكمة أن تقضي فيها مع الدعوى المرئية بدون لزوم لتقديم عريضة أخرى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (489)
  article_text_ar: إذا أقر المدعى عليه بالدين المدعى به وادعى الإعسار ولم يوجد ما يوجب إعلان إفلاسه فعلى المحكمة أن تحكم بالدين فقط أما دعوى الإعسار فلمدعيه الحق في إثباته بالمحكمة الشرعية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (490)
  article_text_ar: إذا كان المدعي لم يعين مقدار المبلغ المدعى به في عريضة الدعوى لأسباب اضطرارية لكون القضية متعلقة بأرباحات أو كانت ناشئة عن شركة لا يعلم مقدار الأرباح الحاصلة وإن القضية تحتاج إلى محاسبة وتصفية حساب فعلى الرئيس أن يأمر بأن يعين مقدارا معلوما ولو على سبيل التخمين وعند ظهور النتيجة بحكم بما يظهر من نتيجة الحساب وتصفية الأرباح .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (491)
  article_text_ar: إذا وجدت دعوى غامضة أو مشوشة تحتاج إلى مراجعة دفاتر أو تصفية حساب فتعين لجنة ينتخبها الطرفان أو المجلس تحت رئاسة أحد الأعضاء وبعد ذلك تقدم تقريرا موافقا عليه من المتداعيين محتويا على تصفية الحساب المذكور ويقدم ذلك التقرير إلى المحكمة بدون أن تبدي اللجنة رأيها فيها فيما يتعلق بإفادة الطرفين ولا في مال الأوراق التي يقدمونها وهذا التقرير يقرأ بالمحكمة بحضور الطرفين ويكون لهما صلاحية في بيان ما وقع فيه من السهو والغلط .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (492)
  article_text_ar: إذا رأت تلك اللجنة أو مأمور المحكمة أن إجراء الصلح بين الطرفين ممكن فيقرر الصلح الذي يقع بينهما ويوقع عليه منهم ومن المتداعيين ويقدم إلى المحكمة للتصديق عليه لإجراء مقتضاه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (493)
  article_text_ar: إذا رأى الطرفان المتداعيان أن يحكما شخصا أو أشخاصا فيجرون بذلك سندا رسميا يصدق عليه من كتاب العدل يكون محتويا على الشروط التي يتفقون عليها فيما إذا كان للتحكيم مدة معينة أو يكون حكم المحكمين نافذا سواء كان باتفاق المحكمين أو الأكثرية وغير ذلك مما يتفقون عليه ثم يوقعان عليه ويسلمانه إلى المحكمين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (494)
  article_text_ar: على المحكمين تدقيق إفادات الطرفين على الأصول المشروعة وإن يضبطوا إفادتهما وأوراقهما وسنداتهما وشهادة شهودهما ولهم أن يحكموا بما ظهر لهم ضمن شروط سند التحكيم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (495)
  article_text_ar: إذا ظهر أن الحكم الصادر من الحكمين مطابق لأصوله وموافق لسند التحكيم يصدق عليه من المحكمة وينفذ وإذا أخل بشيء من ذلك فينقض من طرف المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (496)
  article_text_ar: لا يجوز لكل من الطرفين عزل المحكم الذي عينه وصودق على تعيينه من طرف المحكمة التجارية سواء قبل صدور الحكم أو بعده ولهما حق الاعتراض على أحكام المحكمين لدى المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (497)
  article_text_ar: على المحكمين سواء كانوا من مأموري المحكمة أو لجنة منتخبة أن يقدموا حكمهم موقعا عليه إلى المحكمة وعلى المحكمة بعد تدقيقه وأخذ إفادة الطرفين فيما إذا كان لهما الاعتراض عليه أن تحكم بتصديقه إذا كان موافقا لأصوله أو نقضه إذا كان مخالفا لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (498)
  article_text_ar: لدى المرافعة إذا استند أحد الطرفين على أوراق ومستندات وكانت في إحدى الدوائر الرسمية أو الشركات أو التجار فتعطى له مهلة لإحضارها وإذا تعذر عليه إحضارها فعلى المحكمة إذا رأت لزوما ضروريا لرؤيتها أن تقرر جلبها وبعد رؤيتها وأخذ صورتها تعيدها إلى من كانت بيده .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (499)
  article_text_ar: إذا طلب أحد الطرفين أو وكلاؤهما مهلة لإعطاء الجواب عن أوراق أبرزت له أو سؤالات توجهت إليه ورأت المحكمة ضرورة إمهاله فلها أن تمهله مدة لا تزيد عن ثلاثة أيام فإذا ظهر لديها أن إمهاله هو لغرض المماطلة فلا يمهل وعلى المحكمة أن تباشر في فصل القضية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (500)
  article_text_ar: إن عموم السندات الرسمية والعادية الموقع عليها بإمضاء أو ختم أحد الطرفين وقيودات جميع الدوائر الرسمية والتحاويل وفسوحات البضائع المعطاة من التجار إلى المشترين أو إلى مأموري مستودع البضائع المعبر عنها في عرف التجار بالشتى المشتملة على فسح البضائع للمشترين معتبرة بالنسبة لمضمونها وموقعيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (501)
  article_text_ar: إذا أنكر من نسب إليه السند أو الخط أو الإمضاء أو الختم الموقع على الأوراق والسندات والأوراق العادية المذكورة في المادة السابقة أو حصل دعوى تزوير أو تحريف في شيء من السندات ونحوها فيجب على المحكمة تدقيق ذلك بواسطة هيئة من الخبراء لا يقلون عن ثلاثة أشخاص من ذوي الديانة والاختصاص يباشرون العمل والتدقيق تحت مراقبة أحد الأعضاء بالاشتراك معهم بمحضر الطرفين وذلك بإحضار أوراق أو دفاتر أو سندات أخرى بيد أي أحد تكون للمقابلة والمقايسة والتطبيق على ما فيها من الخط والختم فإن لم يوجد ذلك يستكتب المنكر مرارا ألفاظا تقارب ألفاظ السند المنكر وتجري المقايسة والتطبيق على كتابته وإذا كان الخط والختم المنكران مشهورين ومعروفين بين الناس يعتبران بعد ثبوت الشهود بشهادة أربعة شهود على الأقل على أن يعطى لكل من الخبراء عن كل جلسة نصف ليرة ذهبا تعطى أولا من قبل المدعي على أن تعود في النهاية مع سائر المصاريف على الذي يحكم عليه بالنتيجة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (502)
  article_text_ar: إذا أراد أحد الخصمين أن يثبت دعواه ودفعه بشهود ورأت المحكمة لزوما لقبول ذلك فبعد أن تقرر قبول الشهود تبادر لتسمية الشهود وحصرهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (503)
  article_text_ar: إذا حصر أحد الطرفين شهوده واعترف أن ليس له شهودا غير من ذكرهم وأراد بعد ذلك إحضار خلاف من حصرهم فلا يقبل منه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (504)
  article_text_ar: إذا طلب من أحد الخصمين شهود وأجاب بأن ليس لديه شهود أصلا ثم بعد ذلك أراد إحضار شهود فلا يقبل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (505)
  article_text_ar: إذا رأت المحكمة لزوما لسماع شهادة الشهود فيعطى للمطلوب منه إحضارهم مهلة ثلاثة أيام فإذا لم يمكنه إحضارهم في هذه المدة فتعطى له مدة ثلاثة أيام أخرى وكذا ثلاثة أيام بعدها هذا إذا كان الشهود بداخل البلدة الموجود بها المحكمة وإن كان الشهود في بلدة أخرى فتعطى مهلة مناسبة بنسبة بعد المسافة والوسائط النقلية لإحضارهم أو تحميل شهاداتهم وإذا لم يتسنى له ذلك فيجري أخذ شهادة الشهود المذكورين بواسطة محاكم البلدة الموجودين بها بموجب التعليمات المحررة من قبل المحكمة التجارية بواسطة الحكومة المحلية سواء كان الشهود داخل الحكومة الحجازية أو في بلاد أجنبية وإذا مضت المدة المذكورة ولم يحضر الشهود المذكورين ولم تحتمل شهادتهم ولم تسجل في أي محكمة من محاكم البلاد القاطنين بها فاقدا للبينة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (506)
  article_text_ar: يعتبر قبول شهادة الشهود ورفضهم والطعن فيهم وتعديلهم وتزكيتهم وتحليفهم وتوجيه اليمين والنكول عنه حسب أصول الأحكام الشرعية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (507)
  article_text_ar: إذا صدر قرار بلزوم تحليف أحد الطرفين فبعد أن يصرح فيه خطأ بالأمور والوقائع التي يلزم أن يحلف عليها وأن توضح فيه صورة اليمين يجري العمل بموجب القرار الصادر .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (508)
  article_text_ar: بعد أن تستوفي المحكمة جميع التحقيقات المقتضية وترى أن الدعوى قد اقترب البت فيها يستوضح الرئيس من الطرفين عما إذا كان لديهم كلام أو دفاع في المرافعة بصدد الدعوى فإذا لم يكن لديهما شيء يعلن الرئيس ختام المحاكمة ولا يقبل منهما إفادة شفوية أما إذا كان لأحدهما ما يقال في صدد الدعوى يقدم للمحكمة وعلى المحكمة درس تلك اللائحة أو العريضة أثناء المذاكرة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (509)
  article_text_ar: بعد انتهاء المحاكمة يأمر رئيس المحكمة بإخراج الطرفين ويخلو مع الأعضاء في المذاكرة وبعد تدقيق جميع المستندات وشهادات الشهود وأوراق الضبط وغير ذلك يبدأ رأى الأعضاء فردا ثم يبدي رأيه ويقرر الحكم إما باتفاق الآراء أو بالأكثرية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (510)
  article_text_ar: يجب على العضو المخالف أن يبين رأيه وأسباب مخالفته في ذيل القرار مستندا على الأدلة والحجج الصحيحة المتعلقة بتلك القضية ويوقع عليه في ضبط المحاكمة ولا يدرج ذلك في إعلام الحكم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (511)
  article_text_ar: لا يجوز للمحكمة تأخير الحكم إذا استوفيت أسباب الحكم وشرائطه بتمامها إلا في حالة رجاء الصلح بين الطرفين ولا سيما الأقرباء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (512)
  article_text_ar: بعد إتمام قرار الحكم سواء كان باتفاق الآراء أو بالأكثرية يمضى عليه من الهيئة التي حكمت به ويؤرخ ثم يفهم شفاهيا للطرفين من طرف الرئيس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (513)
  article_text_ar: إذا اقتنع المحكوم عليه بالحكم الصادر عليه وجاها يؤخذ إمضاؤه في ضبط المحاكمة بذلك ثم إذا أراد أن يعرض عليه بطريق التمييز لا يقبل اعتراضه وأما إذا لم يقتنع فله حق تمييزه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (514)
  article_text_ar: يحرر صك الحكم على نسختين ثم تعطى نسخة منها للمحكوم له وتبلغ النسخة الثانية إلى المحكوم عليه بموجب سند استلام موقع عليه من المستلم على الأصول المقررة في تبليغ الجلب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (515)
  article_text_ar: يجب أن يكون سند استلام صك المحكوم عليه الموقع منه ومن المباشر بالتبليغ يصدق من السكرتير ورئيس المحكمة ويؤخذ صورته مصدقة على الصورة المتقدمة وتحفظ صورته ويعطى الأصل إلى المحكوم له .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (516)
  article_text_ar: إذا أقيمت دعوى بخصوص تضمين الضرر والخسارة ولم يمكن التدقيق في الكيفية والمفردات والحكم بها مع الدعوى الأصلية يفهم المستدعى أن يعطي المحكمة دفترا بالمفردات من قبله ليحكم بها على حدتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (517)
  article_text_ar: إذا تحقق وتبين أن المديون قد لحقه ضرر في أشغاله التجارية وأنه في الحقيقة بحالة المضايقة واستنسب المحكمة بسبب ذلك أن يعطيه مهلة مناسبة لأجل تأدية الدين فيذكر في الصك مع الحكم بأصل الدعوى قدر المهلة التي تعطى وأسبابها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (518)
  article_text_ar: لا يجوز للمحكمة إعطاء المهلة للمحكوم عليه إذا ظهر لها أن ليس في طلبه عذر بالمحكوم له وإذا تبين في خلال المدة أن المحكوم يريد الضرر بالمحكوم له فتسقط تلك المهلة وتجرى الاحتياطات اللازمة في ضبط أمواله .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (519)
  article_text_ar: يجب أن يكون تحرير الصك الصادر بالحكم من المحكمة التجارية محتويا على اسم الرئيس والأعضاء الذين حكموا في الدعوى وأسماء الطرفين وشهرتهما وجنسيتهما وتبعيتهما ومحل إقامتهما وملخص دعواهما وكيفية جريان الدعوى وموادها القانونية وعللها وأسبابها وقرار الحكم عليه سواء كان باتفاق الآراء أو بالأكثرية وتاريخ الحكم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (520)
  article_text_ar: يمكن للطرفين أثناء المحاكمة أن يطلبا من المحكمة باتفاقهما تأخر المحاكمة مدة معلومة ولهما تكرار هذا الطلب وللمحكمة إجابة طلبهما .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (521)
  article_text_ar: 'يحق للمدعي أن يطلب بعريضة الدعوى وأثناء المرافعة الحكم بالإجراء الموقت إذا توفرت الأسباب الآتية وهي : أن تكون الدعوى مؤسسة على سند رسمي أو على اعتراف المدعى عليه أو على حكم سابق لم يميز وللمحكمة إن رأت لزوما لذلك قبلته وإعطاء القرار به مع الحكم في القضية وإلا رد طلبه .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (522)
  article_text_ar: على طالب الإجراء الموقت أن يقدم كفيلا ضامنا مصدقا على كفالته من كاتب العدل لرد الأشياء التي يطلبها إذا ظهر أنه غير محق في دعواه وللأضرار والمصاريف التي تنشأ عن ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (523)
  article_text_ar: إن القضايا التي يحكم فيها الإجراء الموقت يجب أن يجرى الإعلان عنها في الجريدة الرسمية لمدة محدودة لا تقل عن خمسة عشر يوما يتقدم في خلالها كل ذي دين ودعوى تجارية لإثباتها حالا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (524)
  article_text_ar: إن عريضة تمييز الصكوك المحكوم بها بالإجراء الموقت ولو جرى نقضها لا يوقف الإجراء الموقت ولا تقبل معارضة المدعى عليه في ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (525)
  article_text_ar: إذا لم يحضر المترافعان في اليوم المعين لرؤية الدعوى في المحكمة أو حضر أحدهما ولم يحضر الآخر ولم يكن تأخره عن الحضور لأسباب صحية أو موانع شرعية ولم يوكل عنه وكيلا رسميا بعد أن بلغ إليه الجلب طبق الأصول فيطلب الطرف الحاضر أن تقرر المحكمة رؤية الدعوى غيابيا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (526)
  article_text_ar: إذا كان الطرف الممتنع عن الحضور إلى المحكمة هو المدعي فالمدعى عليه يمكنه أن يطلب ويستحصل قرارا غيابيا بسقوط حق المحاكمة موقتا وهو عبارة عن إبطال العريضة المتقدمة من طرف المدعي بدون أن يكون مجبورا على إعطاء الجواب على الدعوى المتوجهة عليه وإذا لحق المدعى عليه ضرر يضمن المدعي ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (527)
  article_text_ar: إذا كان الممتنع عن الحضور هو المدعى عليه فيطلب المدعي أن تقرر المحكمة رؤية الدعوى غيابيا وبعد الثبوت تحكم المحكمة بمقتضى ذلك حكما معلقا على نكول المدعى عليه عند وقوع الاعتراض .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (528)
  article_text_ar: لدى إجراء المحاكمة بين المترافعين لدى المحكمة التجارية فبعد أن يعلن الرئيس ختام المحاكمة ويباشر بالمذاكرة وعند تفهيم قرار الحكم إذا غاب المدعى عليه عن المحكمة يعتبر ذلك الحكم بحق المحكوم عليه وجاها وأما إذا كان الغياب قبل ختام المحاكمة ولو في آخر جلسة تقرر المحكمة بحق المدعى عليه إتمام المحاكمة غيابيا وتثابر على ختام الدعوى وتصدر القرار المقتضى وللمدعى عليه حق الاعتراض على ذلك الحكم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (529)
  article_text_ar: إذا صدر حكم غيابي على المدعى عليه فيمكنه أن يعترض على ذلك الحكم ضمن المدة القانونية وحينئذ يضحى ذلك ملغيا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (530)
  article_text_ar: إذا كان الحكم الغيابي المحكوم به معلقا على نكول المدعى عليه عن اليمين وحضر لدى المحكمة التجارية وامتنع المحكوم عليه عن حلف اليمين يصدر الحكم الغيابي ويعتبر بحق المدعى عليه وجاهيا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (531)
  article_text_ar: إن مدة الاعتراض على الحكم الغيابي خمسة عشر يوما ابتداء من تاريخ تبليغ الإعلام إلى المحكوم عليه ولا يحسب من المدة المذكورة يوم التبليغ ولا يوم التقديم هذا إذا كان المحكوم عليه داخل البلدة التي بها المحكمة التجارية وأما إذا كان المحكوم عليه هو في غير البلدة المذكورة فينضم إلى المدة المذكورة بعد المسافة حسب الاقتضاء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (532)
  article_text_ar: الاعتراض على الحكم الغيابي يكون بتقديم عريضة إلى المحكمة التجارية تحتوي الأسباب والعلل التي تدفع وتجرح الدعوى التي تقدمت من طرف المحكوم له والحكم الغيابي المعطى بها ويجرى تبليغ صورة العريضة إلى المعترض عليه على الصورة المتقدمة في تبليغ الجلب ويترافع الخصمان في اليوم الذي يعين بموجب ورقة الجلب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (533)
  article_text_ar: إذا قدم المحكوم عليه غيابيا اعتراضه إلى المحكمة وكان تقديمه داخل المدة القانونية تقرر المحكمة قبول الاعتراض ثم تجرى المحاكمة على حسب المحاكمة الوجاهية ثم تحكم بما يظهر لديها إما بتصديق صك الحكم الغيابي أو نقضه أو إصلاحه، أما مصاريف الحكم الغيابي فهي على كل حال تعود على المحكوم عليه غيابيا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (534)
  article_text_ar: إذا قدم المحكوم عليه اعتراضه داخل المدة القانونية ولم يحضر إلى المحكمة في اليوم المعين ولم يكن تأخره ناشئا عن عذر شرعي تحكم المحكمة بإسقاط عريضة اعتراضه ولا يقبل له اعتراض مرة ثانية بل يبقى له حق التمييز .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (535)
  article_text_ar: إن كل ما هو جار ومراعى في سير المحاكمات الوجاهية ومعلاتها كذلك مرعى الإجراء في المحاكمات الغيابية وفي المحاكمات الجارية في الاعتراض على الحكم الغيابي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (536)
  article_text_ar: إن تنظيم الصكوك الصادرة في الأحكام الغيابية وفي الاعتراض على الحكم ليكون تنظيما على مقتضى الصكوك التي تصدر في الأحكام الوجاهية كما أن تبليغها يكون على ما هو جار في فصل تبليغ الجلب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (537)
  article_text_ar: إذا وقع في أي دعوى حكم يمس حقوق طرف ثالث غايب غير الطرفين المتحاكمين لم يجلب ولم يحضر إلى المحكمة لا بالأصالة ولا بالوكالة ولم يقدم عريضة للدخول في الدعوى فمثل هذا الطرف له أن يعترض على الحكم المذكور بموجب شروط المادة (529) ومثال ذلك لو ادعى أحد دينا على ميت بوجه أحد ورثته فأنكر هذا الوارث وأثبت المدعي دعواه في وجهه بالبينة وحكم عليه بالدين فللوارث الآخر أن يعترض على هذا الحكم بطريق اعتراض الغير .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (538)
  article_text_ar: يحق للطرف الثالث أن يعترض على كل نوع من أنواع الأحكام والقرارات الصادرة من المحكمة التجارية أما قرارات المحكمين فمن حيث لا تسري عليه فلا يحق الاعتراض عليها لأن حكم المحكمين لا ينفذ ولا يسري على غير الطرفين الذين نصباهم وحكماهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (539)
  article_text_ar: إن اعتراض الطرف الثالث لا يؤخر إجراء حكم الصك المقصود جرحه على أنه إذا تبين وقوع خطر أو ضرر من إجراء ذلك الحكم فللمحكمة التجارية أن تقرر تأجيل الحكم المذكور مدة ما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (540)
  article_text_ar: إذا ثبت أن مدة اعتراض الطرف الثالث متحققة مقبولة فيجرح من الحكم والصك المقصود جرحه الجهة العائدة لحقوق ومنافع الطرف المعترض فقط ويعتبر باقي أحكامه على الطرفين المترافعين أما إذا كان حكم الصك المذكور يخص مادة واحدة لا تقبل التفريق فحينئذ يجرح أيضا حكم الصك المذكور العائد للمدعي والمدعى عليه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (541)
  article_text_ar: إذا تحقق أن دعوى اعتراض الطرف الثالث ليست بمقبولة ولا صحيحة يحكم بردها ويغرم المعترض بدفع ما تحمله الطرف الآخر من الضرر والخسارة بسبب ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (542)
  article_text_ar: كل الصكوك الصادرة من المحكمة التجارية الكاسبة الحكم القطعي سواء كان بمواجهة الطرفين أو حكما غيابيا أو نقض فيها مدة الاعتراض على الحكم الغيابي قابلة للتمييز .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (543)
  article_text_ar: إن مدة تمييز الصكوك بحق الحكم الوجاهي والحكم الغيابي المنقضي فيه مدة الاعتراض ثلاثون يوما اعتبارا من تاريخ تبليغ الصك إلى المحكوم عليه غير يوم التبليغ والتقديم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (545)
  article_text_ar: إذا قدم مستدعي التمييز عريضة في آخر يوم من المدة المعينة له وكان غير مستوفي الشروط المذكورة في المادة (541) فترد عريضته كليا وأما إذا قدمه قبل ذلك وكان فيه نواقص فعلى هيئة التمييز أن تنبه المستدعي تحريريا عن النواقص المذكورة ليصلحها في أجل تضربه له على أن يبقى المستدعي إكمال مثل المدة التي كانت باقية له حينما استدعى التمييز وتبتدئ هذه المدة من تاريخ إبلاغه ذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (546)
  article_text_ar: يجب تقديم عريضة التمييز المنوه عنها بالمادة (541) إلى المحكمة التجارية بجدة وإذا رفعت إليها يتعين عليها قبض الرسوم من المستدعي ثم تبلغ من قبلها الأوراق التمييزية مصدقة إلى المميز عليه ليقدم في مدة أسبوع بعد تبليغه لائحته الجوابية على اعتراضات خصمه ثم ترفع الأوراق من قبل المحكمة إلى هيئة التمييز ويحق لها حينئذ أن تعطي قرارها على الصك المميز بالتصديق أو النقض وفي كلتا الحالتين يجب إعادته للمحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (547)
  article_text_ar: على هيئة التمييز أن ترى الدعوى بحسب الأوراق المقدمة إليها فتعتمد الأحوال والوقائع المشروحة في الصك المطلوب تمييزه إذا تعد حقيقته إلى أن يثبت ما يخالفها بجريدة الضبط أو بالسندات التي أبرزت حين المحاكمة بدون أن تجلب الخصمين فإن تبين أن الحكم موافق للنظام وأصول المحاكمة أيدته وإلا نقضته وأعادته إلى المحكمة التجارية لإعادة المحاكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (548)
  article_text_ar: إذا وجد بالصك بعض سهو أو نواقص لم تؤثر في نفس الحكم ولا متعلقاته فللهيئة إعادته إلى المحكمة لتصحيح النواقص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (549)
  article_text_ar: إن الأسباب الموجبة لنقض صك الحكم هي كلما كان مخالفا لمواد هذا النظام أو مخالفا لضبطه بصورة مخلة بأسباب الحكم ومؤثرة فيه أو كانت الدعوى خارجة عن وظيفة المحكمة التجارية وإذا ظهرت الأوراق المبرزة والبينة المقامة غير كافية للحكم أو إذا طعن المميز في شهادة الشهود طعنا مقبولا شرعيا وأهملت المحكمة قبول طعنه أو وجد خللا في توجيه اليمين أو في التحليف أو إذا استندت المحكمة في حكمها على مادة من مواد هذا النظام وظهرت أنها غير صالحة للحكم فبهذه الأسباب ينقض الصك من قبل هيئة التمييز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (550)
  article_text_ar: متى نقض الصك من هيئة التمييز لوجود أحد الأسباب الموجبة للنقض أو لوجود عدة منها وأعيد إلى المحكمة التجارية لإصلاحه على أصوله ثم بنت المحكمة التجارية حكمها مرة ثانية على أسباب وعلل غير صالحة للحكم وميزه المحكوم عليه ورأت هيئة التمييز أن اعتراضات المميز وجيهة وأن الحكم غير واقع في محله فلها نقضه وإعادته ثانيا إلى المحكمة التجارية وفي المرة الثالثة إذا صدر الصك غير صالح للحكم فلهيئة التمييز إصلاحه وتنفيذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (551)
  article_text_ar: إذا نقض صك من هيئة التمييز بوقوع خطأ من الأوجه المذكورة في المادة (546) فالقرارات التي صدرت من المحكمة التجارية بعد وقوع الخطأ في الصك والمرافعة تلغى وأما إذا وقع في أثناء المرافعة كأوسطها مثلا فما جرى من المعاملات والقرارات في محكمة التجارة التي أصدرت ذلك الصك من ابتداء المحاكمة إلى حين وقوع الخطأ الذي أوجب النقض يبقى مرعيا ومعتبرا ولا يسوغ للمحكمة إعادة النظر فيه عند رجوع الصك منقوضا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (552)
  article_text_ar: إن قرارات هيئة التمييز التي تعطى في تصديق صك الحكم أو نقضه تكون باتفاق الآراء أو بأكثريتها القانونية وإذا تساوت الآراء يرجح الجانب الذي ينضم إليه الرئيس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (553)
  article_text_ar: يجب أن يبين في صكوك هيئة التمييز اسم الطرفين وشهرتهما وجنسيتهما ومحل إقامتهما وحكم الصك المميز وخلاصات الاعتراضات والأدلة الواردة من الطرفين والأسباب الموجبة لنقض ذلك الصك أو التصديق عليه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (554)
  article_text_ar: إذا نقضت هيئة التمييز صك الحكم على الصورة المتقدمة وأعادته إلى المحكمة التجارية فعلى المحكمة أن تعيد المحاكمة بين الطرفين على ما في فصل كيفية تقديم الدعوى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (555)
  article_text_ar: على المحكمة التجارية أن تراعي النقط والأوجه التي نقض بها الحكم الأول وأن لا تبني حكمها عليها في الحكم الثاني .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (556)
  article_text_ar: بعد نقض الصك وإعادة الحكم يجب أن يدرج في ضبط الدعوى الثانية خلاصة الصك المنقوض وعدده وتاريخه والأسباب التي أوجبت نقضه ثم تباشر المحكمة التجارية في إجراء المحاكمة مجددا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (557)
  article_text_ar: يحل مجلس الشورى بمكة المكرمة مؤقتا محل هيئة التمييز ويقوم بتطبيق كافة ما يتعلق بأحكام التمييز المبحوث عنها ضمن مواده المخصوصة من هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (558)
  article_text_ar: إن الصك الصادر من المحكمة التجارية المبلغ للمحكوم عليه ولم يقدم اعتراض عليه لا ينفذ وإنما يرفع رأسا من المحكمة التجارية إلى هيئة التمييز حفظا على حقوق المحكوم عليه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (559)
  article_text_ar: لمجلس إدارة ينبع المؤلف من قاضي البلدة وأمين المالية وأعضاء منتخبين تحت رئاسة الأمير صلاحية النظر في القضايا التجارية على مقتضى النظام التجاري ومتى أراد المحكوم عليه استثناء الحكم فيكون ذلك بجدة لدى المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (560)
  article_text_ar: الصكوك التي تصدر من مجلس إدارة ينبع بصفته محكمة تجارية يكون تمييزها عائدا إلى المحكمة التجارية بجدة وهي التي تصدر حكمها فيها بالتصديق أو النقض حسب مواد التمييز المدونة بنظام المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (561)
  article_text_ar: يضمن المحكوم عليه للمحكوم له جميع المصاريف والرسوم المتعلقة بالمحاكمة والإخطارات وأثمان الطوابع وجميع ما يسوغه النظام بموجب ما بيد المحكوم له من الصكوك والأوراق الرسمية وأجرة وكيل المحكوم له التي تقررها المحكمة بحسب جسامة الدعوى عن كل جلسة بحيث لا تزيد تلك الأجرة عن خمسين قرشا لكل جلسة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (562)
  article_text_ar: إذا ظهر أن كل واحد من المترافعين محق في قسم من الدعوى فتحسب من المصاريف المقررة في المادة السابقة بنسبة ما لكل واحد منهما ويضمن كل منهما تلك المصاريف والرسوم بموجب تلك النسبة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (563)
  article_text_ar: جميع الرسوم والمصاريف وأثمان الطوابع التي تصرف في دعاوى الإفلاس تخصم من موجودات المفلس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (564)
  article_text_ar: لكل دين ناشئ عن معاملات تجارية أن يحجز أموال مدينه سواء كانت بيده أو بيد شخص ثالث بموجب عريضة يقدمها إلى رئيس الحكومة المحلية وتحال منه إلى المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (565)
  article_text_ar: تكون هذه العريضة محتوية على بيان الدين ونوعه ومقداره والأحوال المطلوبة حجزها ومكانها وتكون على ثلاثة نسخ لتحفظ واحدة منها بالمحكمة وتسلم الأخرى للمحجوز عليه والثالثة للمحجوز عنده وإذا تعدد المحجوز عندهم تزاد النسخ بعددهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (566)
  article_text_ar: يجب على طالب الحجز أن يقدم إلى المحكمة سند كفالة مالية من كفيل مليء مصدقا من كاتب العدل يضمن جميع حقوق المحجوز عليه وأضراره إذا ظهر أن الحاجز غير محق في طلبه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (567)
  article_text_ar: 'لا يسوغ الحجز ما لم تتوفر الشروط الآتية : .أ- أن يكون الدين حالا أو قد حل أجله . ب- أن يكون الدين معلوما فإن كان مجهولا تعينه المحكمة تخمينا . ج- أن لا يكون الدين معلقا لزومه على شرط ما لم يتحقق فلا يجوز الحجز على ضامن الدرك قبل الحكم بالاستحقاق . د- أن يكون مختصا بنفس المدين فلا يحجز مال مدين المدين . هـ- أن يبرز طالب الحجز سندات رسمية أو عادية ممضاة أو مختومة من المدين بصورة صالحة للاعتبار أو أوراقا أخرى ككشوف وتحارير ممضاة ومختومة من المدين أو ما احتفت بها قرائن ودلائل اقتنعت بها المحكمة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (568)
  article_text_ar: لا يجوز للدائن أن يحجز من أموال مدينه إذا كانت قابلة للتفريق إلا ما يكفي لوفاء دينه وما يلحقه من المصاريف .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (569)
  article_text_ar: إذا كان المدين متوفيا وقد حجزت تركته من قبل المحكمة الشرعية أو شرع في تحريرها لا يسوغ إلقاء الحجز عليها من قبل المحكمة التجارية لأن تحرير المحكمة بمثابة حجز عام وعلى الدائن مراجعة المحكمة الشرعية حينئذ وإذا توفي المدين في أثناء الحجز الاحتياطي فتسلم الأشياء المحجوزة إلى مأمور بيت المال التابع للمحكمة الشرعية وتحال القضية إليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (570)
  article_text_ar: 'يمتنع حجز الأشياء الآتية : أولا- ما يلزم المديون لمعيشته ومعيشة عياله وما لا غنى له عنه من ملبوساته وأثاث البيت . ثانيا- الأدوات اللازمة لمعالجة صنعته . ثالثا- أدوات الزراع والفلاح كبقرة وبذرة ومحصولاته التي لم تدخر في المخزن إلا أن يكون الدين ناشئا عن ثمن الأشياء المذكورة في هذه الفقرات الثلاث . رابعا- بيت السكنى اللائق به وأمتعة زوجته وأولاده .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (571)
  article_text_ar: إذا كانت الأموال المراد حجزها فيها أشياء من المأكولات التي يتسارع إليها الفساد يحق لمأمور الحجز بيعها حالا بالمزاد العلني بعد قرار المجلس وما ينشأ من الضرر والخسارة من هذا البيع مضمون على طالب الحجز .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (572)
  article_text_ar: يمكن حجز العقار وأموال المدين غير المنقولة وحجزها إنما هو عبارة عن منع بيعها ورهنها وكل تصرف فيها بإعطاء الإشارة والقيد اللازم بواسطة كاتب العدل وتعليق النسخة الثالثة من عريضة الحاجز على نفس العقار .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (573)
  article_text_ar: إذا توفرت الشرائط السالفة تقرر المحكمة الحجز حالا ويجري توقيعه ثم يبلغ ذلك إلى المدين والشخص الثالث حسب شروط تبليغ أوراق الجلب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (574)
  article_text_ar: للمحجوز عليه والمحجوز عنده أن يعترض على الحجز في داخل ثمانية أيام من تاريخ التبليغ إذا كان مقيما بالبلدة التي بها المحكمة وإلا فيضاف إلى المهلة مدة بالنسبة إلى بعد المسافة ووسائط النقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (575)
  article_text_ar: بعد إلقاء الحجز يتعين على الدائن أن يرفع للمحكمة التجارية في برهة ثمانية أيام من تاريخ تبليغ الحجز إلى المحجوز عليه عريضة يطلب فيها جلب المديون أو الشخص الثالث إذا كان هنالك شخص ثالث إلى المحكمة لإثبات حقه في الحجز وأن يبلغ كلا منهما صورة هذه العريضة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (576)
  article_text_ar: إذا لم يقدم الحاجز عريضته ودعواه داخل المدة المذكورة فالمحكمة تقرر رفع الحجز وتضمين الحاجز المصاريف والعطل والضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (577)
  article_text_ar: إذا اعترض المحجوز عليه والمحجوز عنده داخل الثمانية الأيام المذكورة فيقبل اعتراضهما ويجرى فيه ما يقتضى حسب النظام وإن لم يعترضا في المدة المذكورة فلا يقبل لإحدهما اعتراض بعد مرور المدة المذكورة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (578)
  article_text_ar: عندما تقرر المحكمة الحجز الاحتياطي على أموال المدين ولا يتعين مأمور من قبل المحكمة لتوقيع الحجز ثم يحرر بذلك من رئيس المحكمة إلى الحاكم الإداري لإحالته إلى دائرة الشرطة لإرفاق مأمور الحجز بمأمور من طرفها لتنفيذ قرار المحكمة بالحجز ويوقع بختم الأشياء المطلوب حجزها تحت ختم المحكمة ويوقع المأمور تقريرا بالواقع إلى المحكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (579)
  article_text_ar: بعد توقيع الحجز تدعو المحكمة التجارية الفريقين إلى المحاكمة وإذا صادق الشخص بجواب قدمه إلى المحكمة بعد إبلاغه قرار الحجز فلا يبقى من حاجة إلى حضوره المحاكمة إلا أن ترى المحكمة لزوم حضوره فيتخذ بذلك قرار فإن تخلف أحد الفريقين عن الحضور جرت بحقه المحاكمة الغيابية على الوجه الذي تقدم ببيانه في فصل الحكم الغيابي وسواء جرت المحاكمة وجاها أو بغياب المدعى عليه يتعين على المحكمة أن تفحص عن دعوى المدعي فإذا تحقق دينه في ذمة المحجوز عليه أو بعضه حكم بإثبات الحجز وبقائه إلى أن يستوفي الدائن دينه وما يلحقه من المصاريف وإذا أثبت الشخص الثالث في المحاكمة أن له دينا عند المحجوز عليه حكم له به أيضا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (580)
  article_text_ar: إذا عجز الدائن الحاجز عن إثبات دينه تقرر المحكمة بفك الحجز ويمنع تعرض الحاجز للمحجوز عليه وتضمينه مع كفيله كل عطل وضرر يلحق المحجوز عليه من ذلك الحجز .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (581)
  article_text_ar: يجوز حجز المرهون على أنه ليس للحاجز أن يتنازل من ثمنه شيئا إلا بعد قضاء دين المرتهن لأنه أحق بثمن الرهن من سائر الغرماء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (582)
  article_text_ar: يجوز أن يحجز مال المديون أكثر من واحد ولا يمتاز أحدهم عن الآخر إلا أن يكون له أولية شرعية كالمرتهن ومن له حبس العين لاستيفاء الثمن أو أولية نظامية وهي إما عامة يمتاز فيها الدائن بجميع أموال المدين كالضرائب الأميرية وإما خاصة كالنفقة المحكوم بها للزوجة والصغير فتقدم العامة على الخاصة وتقدم كلتاهما على سائر الديون .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (583)
  article_text_ar: يجوز لكل مدع أن يحجز عين الأموال المدعى بها حجزا احتياطيا في حال تقديم دعواه أو في أثناء المحاكمة سواء كانت تلك الأموال تحت يد المدعى عليه أو تحت يد شخص ثالث مع مراعاة أحكام المواد المخصوصة في فعل الحجز من جهة الكفالة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (584)
  article_text_ar: لهيئة المحكمة حق النظر في طلب الحجز المقدم لها فإن رأت أن الشخص الذي يراد الحجز عليه موسرا لا خوف على ما تحت يده من أموال وبضائع من جهة تهريب أو إخفاء أو إفلاس ولا يلحق طالب الحجز ضرر في حالة عدم توقيعه يسوغ لها رفض طلب الحجز وعدم إجرائه . ويشترط أن يكون قرار الرفض موقعا من قبل أكثرية أعضاء المحكمة وموضحا فيه الأسباب الكافية لعدم قبول توقيع الحجز وذلك بعد أن يقدم الشخص الذي طلب الحجز عليه كفيل مالي يضمن تأدية أي حق أو حكم يصدر عليه من المحكمة التجارية ويسجل كفالته بمقدار المبلغ المدعى به .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (585)
  article_text_ar: كل شخص مطالب بحق شخص مقام عليه به قضية في المحاكم التجارية مكلف حين اعتزامه السفر بأن يقيم عنه وكيلا شرعيا يواصل المرافعة عنه مدة غيابه حتى انتهاء القضية بالحكم له أو عليه وأن يقدم لدائنه كفيلا مليئا غارما لدى كاتب العدل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (586)
  article_text_ar: إذا طلب الدائن من المدين تأمنه بتقديم الكفيل وإقامة الوكيل وفاقا لما نص عليه في المادة السابقة وامتنع عن إجابة طلبه فعلى الجهات المختصة منع المدين من السفر على أن يكون ذلك بطلب من الدائن وتبليغ قضائي صادر من المحكمة التجارية حسب الأصول .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (587)
  article_text_ar: تشمل التبليغات القضائية المنوه عنها في المادة السابقة الأعاليم المصدقة المطلوب تنفيذها والتي هي رهن التنفيذ في جهاتها الرسمية المختصة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (588)
  article_text_ar: تؤخذ خمسة قروش أميرية رسم قيدية على عموم الأوراق التي تقدم للمحكمة التجارية من استدعاءات وسندات ولوائح وغير ذلك سواء كان قبل المحاكمة أو في أثنائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (589)
  article_text_ar: كل ورقة يجرى قيدها بدفتر القيد يشرح بذيلها عدد القيد المتسلسل بالدفتر المذكور ومقدار الرسم المأخوذ عليها وتختم بختم القيد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (590)
  article_text_ar: كل ورقة لم يجر قيدها بدفتر القيد حسبما توضح المادة 589 لا تعتبر لدى المحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (591)
  article_text_ar: يؤخذ ربع خرج الإعلام على القدر المدعى به من المدعي حال تقديم الاستدعاء إلى المحكمة التجارية مقدما وبدون استيفاء ذلك لا تباشر المحكمة رؤية الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (592)
  article_text_ar: إذا كان المبلغ المدعى به أقل من ألفين وخمسمائة قرش فيؤخذ مقابل ربع الخرج عشرون قرشا رسميا مقطوعا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (593)
  article_text_ar: يؤخذ على تمييز الإعلامات في مجلس التمييز ربع خرج الإعلام المميز مقدما قبل تمييزه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (594)
  article_text_ar: يخصم ربع خرج الإعلام المأخوذ مقدما من رسم خرج الإعلام عند تنظيمه وإذا كان ربع الخرج المأخوذ مقدما زائدا عن ربع الخرج المتحقق بعد إصدار الحكم فيحسب الزائد من ضمن خرج الإعلام وإذا كان ربع الخرج أقل من ربع الخرج المتحقق بعد نتيجة الحكم فيستوفى الباقي ضمن الخرج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (595)
  article_text_ar: إذا ترك المدعي دعواه بعد دفع ربع الخرج حسبما تضمنته المادة 513 من أصول المحاكمات التجارية المتضمنه إبطال دعواه فعندما يقدم استدعاء ثانيا في الدعوى نفسها فيجب أخذ ربع خرج آخر عليها حيث إن ربع الخرج المدفوع سابقا يسقط حكمه بسقوط حكم الاستدعاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (596)
  article_text_ar: تؤخذ عشرة قروش على كل ورقة تبلغها المحكمة لأرباب المصالح من طرف طالب التبليغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (597)
  article_text_ar: تقدر أجرة القدمية لتبليغ الأوراق من طرف المحكمة إذا كان المبلغ على مسافة بعيدة عن المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (598)
  article_text_ar: تؤخذ خمسة قروش على كل نسخة من نسخ أوراق الجلب التي تبلغ للطرفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (599)
  article_text_ar: لا يؤخذ خرج تبليغ على التذاكر المحتوية على قرارات المحكمة اللازم تبليغها للمحكمين أو لإحدى الدوائر الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (600)
  article_text_ar: يؤخذ رسم مقطوع على تسجيل الوكالة عشرون قرشا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (601)
  article_text_ar: 'يؤخذ على القرارات التي تعطى بتعيين مميزين وأهل الخبر حسب الدرجات الآتية: قرش25 تؤخذ على الدعاوى التي تحتوي على مبلغ إلى خمسين جنيها. 50 تؤخذ على الدعاوى التي تحتوي على مبلغ من خمسين جنيها إلى مائة جنيه. 100 تؤخذ على الدعاوى التي تحتوي على مبلغ يزيد عن مائة جنيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (602)
  article_text_ar: 'يؤخذ عل قرار توقيع الحجز الاحتياطي حسب الدرجات الآتية: قرش25 تؤخذ على الدعاوى التي تحتوي على مبلغ إلى الخمسين جنيها. 50 تؤخذ على الدعاوى التي تحتوي على مبلغ من خمسين جنيها إلى مائة جنيه. 100 تؤخذ على الدعاوى التي تحتوي على مبلغ يزيد عن مائة جنيه . وتؤخذ على كل صورة تبليغ منه نصف الرسم الذي يؤخذ في قرار الحجز وفى قرار تصديق الحجز تراعى النسبة المذكورة في استيفاء الرسم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (603)
  article_text_ar: 'يؤخذ على قرار تصديق الصلح رسم حسب الدرجات الآتية: قرش50 في الدعاوى التي تبلغ إلى خمسين جنيها. 100 فيما زاد عن خمسين جنيها إلى مائة جنيه. 150 فيما زاد عن مائة جنيه إلى مائتين جنيه، وما زاد عن المائتين الجنيه فتؤخذ عن كل خمسين جنيها عشرة قروش.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (604)
  article_text_ar: 'يؤخذ خرج نسبي على الإعلامات التي تصدر من المحكمة التجارية المحتوية على مبلغ معين حسب الدرجات الآتية: قرش10 تؤخذ على كل إعلام يحتوي على مبلغ لحد خمسمائة قرش. 20 تؤخذ على كل إعلام يحتوي على مبلغ خمسمائة إلى ألف قرش. 40 تؤخذ على كل إعلام يحتوي على مبلغ من ألف قرش إلى ألفين قرش . 60 تؤخذ على كل إعلام يحتوي على مبلغ من ألفين إلى ثلاثة آلاف قرش. 100 تؤخذ على كل إعلام يحتوي على مبلغ من ثلاثة آلاف إلى خمسة آلاف قرش. وما زاد عن خمسة آلاف قرش فيؤخذ بالنسبة في المائة اثنان ونصف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (605)
  article_text_ar: تؤخذ مائة قرش رسما مقطوعا على كل إعلام صادر بغير مبلغ معين أو برد سند لم يثبت مدعي مقدمه أو رفضه دعوى لم تثبت على المدعى عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (606)
  article_text_ar: تؤخذ خمسون قرشا رسما مقطوعا على قرار يعطى من المحكمة التجارية بإفلاس تاجر أو فسخ قرار الإفلاس أو تعيين تاريخ الإفلاس أو تغييره أو تعيين حارس على أموال المفلس وبكل ما يتعلق بالإفلاس من الخصومات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (607)
  article_text_ar: يؤخذ على كل إعلام صادر من المحكمة متضمن تصديق التعهدات التجارية في المائة اثنين بنسبة مبلغ التعهد الذي تعهد المفلس بإعطائه لأصحاب المطاليب من موجودات المفلس ولو لم تف بدينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (608)
  article_text_ar: يؤخذ خرج المعاملات الإفلاسية ابتداء حسب المادة 591 وفي النهاية من موجودات المفلس بمعرفة مأمور الإفلاس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (609)
  article_text_ar: تؤخذ ألف قرش رسما مقطوعا على قرار إعادة اعتبار المفلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (610)
  article_text_ar: تؤخذ خمسون قرشا رسما مقطوعا على القرارات التي تعطى بلزوم إحالة الدعاوى التي تحدث بين الشركاء للمحكمين وعلى صورتها حسب الخرج المقرر في أخذ الصور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (611)
  article_text_ar: تؤخذ خمسون قرشا رسما مقطوعا على القرارات التي تعطى من المحكمة التجارية بتعيين محكمين في مواد الشركاء سواء كان تعيين المحكمين من طرف الشركاء أو المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (612)
  article_text_ar: تؤخذ على تسجيل القرارات التي تنظم من المحكمين ربع الخرج اللازم أخذه بمقتضى المادة 600 وإذا كانت القرارات المذكورة غير شاملة لمبلغ معين فيؤخذ عليها حسب المادة 601.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (613)
  article_text_ar: تعتبر المواد المدرجة بهذا الفصل بخصوص خرج الإعلامات بحق الدعاوى التي ترى بمعرفة المحكمين الذين عينوا بموجب صك تحكيم بدون مراجعة المحكمة التجارية عند تسجيل ذلك الحكم بالمحكمة التجارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (614)
  article_text_ar: تؤخذ مائة قرش رسما مقطوعا على الإعلام الصادر برد استدعاء الاعتراض على الحكم قبل الدخول بأساس الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (615)
  article_text_ar: تؤخذ مائة قرش رسما مقطوعا على إعلام حكم الاعتراض إذا دخل بأساس الدعوى ولم يحكم له بشيء زائد وإذا حكم بشيء زائد يؤخذ خرج نسبي بمقدار الزيادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (616)
  article_text_ar: تؤخذ مائة قرش رسما مقطوعا على قبول استدعاء تصحيح القرار الصادر من المحكمة التجارية أو رفضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (617)
  article_text_ar: يؤخذ خرج على القرارات التي تعطى بدعاوى اعتراض الغير مثل الخرج الذي يؤخذ على دعاوى الاعتراض على الحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (618)
  article_text_ar: تؤخذ خمسة وعشرون قرشا على الإعلام الصادر بناء على رجوع الطرفين عن الدعوى وفراغهما منها سواء كان في المحكمة التجارية أو في هيئة التمييز إذا كان المبلغ المتضمن الدعوى أقل من خمسة آلاف قرش وإذا كان زائدا عن خمسة آلاف القرش فتؤخذ خمسون قرشا رسما مقطوعا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (619)
  article_text_ar: يؤخذ رسما مقطوعا على قرار وتصديق الإعلام أو نقضه لدى التمييز مائة قرش فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (620)
  article_text_ar: إذا نقض الإعلام في التمييز وأعيد إلى المحكمة التجارية وجرى استئناف الدعوى وتصدق الحكم السابق أو نقض يؤخذ على ذلك القرار رسما مقطوعا مائة وخمسون قرشا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (621)
  article_text_ar: تؤخذ خمسون قرشا على كل صورة من الإعلامات التي تبلغ للمحكوم عليه وعن كل صورة من صور الإعلامات المذكورة بعد التبليغ عشرة قروش.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (622)
  article_text_ar: تؤخذ ثلاثون قرشا عن كل صورة من صور الأوراق السائرة التي تعطى لأحد الطرفين عند طلبه إذا كانت الصورة لا تزيد عن مائة وخمسين كلمة وإذا زادت عن ذلك فتؤخذ عن كل عشرة كلمات قرش واحد لغاية ألف كلمة وما زاد عن ذلك فلا يؤخذ عليه شيء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (623)
  article_text_ar: يؤخذ على كل ما يتودع في صندوق المجلس التجاري من نقود وأوراق نقدية أو أشياء ذات قيمة برسم التأمين في المائة نصف قرش وذلك مدة سنة من التوديع وإذا زادت المدة عن سنة فيؤخذ عن كل سنة ربع قرش في المائة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (624)
  article_text_ar: إن عموم الدعاوى التجارية المقامة من الدوائر الرسمية على بعضها أو من الدوائر الرسمية على الأشخاص لا يستوفى عليها رسم من الدوائر الرسمية أما الدعاوى التي تقام من الأشخاص على الدوائر الرسمية فيؤخذ عليها الرسوم اللازمة حسب نظام المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (625)
  article_text_ar: تؤخذ خمسة وعشرون قرشا رسما مقطوعا على كل مذكرة تحرر من المحكمة التجارية المختصة بمصالح أرباب الدعاوى ولا يؤخذ خرج مكرر على تأكيد هذه المذكرات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (626)
  article_text_ar: تؤخذ مائة قرش خرجا مقطوعا على القرارات التي تعطى بحجز الأموال والأملاك والنقود والأشياء السائرة وبخصوص رفع الحجز سواء كان المحجوز موجودا لدى المديون أو لدى شخص آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (627)
  article_text_ar: تؤخذ عشرة قروش على تنظيم أو إخراج صور الأوراق اللازم تعليقها وإلصاقها في محل ما عينا أو خلاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (628)
  article_text_ar: تؤخذ عشرة قروش على كل ورقة ضبط ينظمها المأمور المعين من جانب المحكمة المتضمنة إبقاء مأموريته أو سائر الخصوصات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (629)
  article_text_ar: يجوز تأجيل أخذ الرسم من المحكوم له إذا كان عاجزا إلى ما بعد تنفيذ الحكم الصادر من المحكمة التجارية على أن يكون إثبات العجز بشهادة أشخاص من المعتبرين مصدقة شهاداتهم من قبل المجلس البلدي والحاكم الإداري على أن يخصم الرسم المذكور من أول مبلغ يستحصل له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (630)
  article_text_ar: إن الشهادة المنوه عنها في المادة السابقة يجب أن تعرض للمحكمة التجارية لاتخاذ قرار بشأنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (631)
  article_text_ar: كل الرسوم الموضوعة بهذا النظام تعتبر بعينها ويضاف إليها رسم طوابع الخط والنسبي والمقطوع بموجب نظام الطوابع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (632)
  article_text_ar: يعتبر هذا النظام مفعول الإجراء من يوم نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
- article_ref: المادة (633)
  article_text_ar: على نائبنا العام تنفيذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c58ba10c-4e89-4c06-98d7-a9a700f1c706/1
  verified: false
