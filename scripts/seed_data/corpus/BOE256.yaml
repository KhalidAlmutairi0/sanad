articles:
- article_ref: المادة الاولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية – أينما وردت في هذا النظام – المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك: المملكة: المملكة العربية السعودية. الإقليم: الأراضي البرية والمياه الإقليمية الخاضعة لسيادة المملكة والفضاء الجوي الذي يعلوهما. النظام: نظام تعريفة الطيران المدني. اللائحة: اللائحة التنفيذية لنظام تعريفة الطيران المدني. الهيئة: الهيئة العامة للطيران المدني. مجلس الإدارة: مجلس إدارة الهيئة العامة للطيران المدني. الرئيس: رئيس الهيئة العامة للطيران المدني. الطائرة : أي آلة في استطاعتها أن تستمد بقاءها في الجو من ردود فعل الهواء غير تلك المنعكسة من سطح الأرض. المطار : مساحة محددة من سطح الأرض أو الماء بما فيها من مبان ومنشآت ومعدات مخصصة كليًا أو جزئيًا لوصول الطائرات أو تحركها أو مغادرتها. المطار الدولي : مطار تعينه المملكة في إقليمها لدخول وخروج الحركة الجوية الدولية، وتتخذ فيه الإجراءات المتعلقة بالجمارك والجوازات والصحة والحجر الصحي – بما فيه الحجر على الحيوانات والنباتات – وغيرها من الإجراءات المشابهة. المطار الإقليمي : مطار تعينه المملكة في إقليمها لاستقبال
    الرحلات الداخلية المجدولة مع توافر خدمات المطار الدولي بصفة محددة، كإجراءات الجوازات والجمارك؛ لاستقبال رحلات دولية إذا ما دعت الحاجة. المطار المحلي : مطار تعينه المملكة في إقليمها لاستقبال الرحلات الداخلية فقط، ولا تتوافر فيه خدمات إنهاء إجراءات السفر الخارجي من جوازات وجمارك وخلافه. الأجور: مبالغ تدفع لقاء خدمات تقدمها الهيئة، كأجور الخدمات الملاحية وإصدار التراخيص والرخص وتجديداتها واستخدامات منشآت ومرافق المطارات ونحوها. الإيجار: مبلغ يدفع بموجب عقد إيجار استثماري للانتفاع بالممتلكات أو مقابل استثمار مرافق تجارية، كصالات السفر وأماكن خدمات العفش والمباني والأراضي والمحلات التجارية ونحوها. السجل : السجل السعودي الوطني لتسجيل الطائرات، الذي تعده وتشرف عليه الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجب على مؤسسات وشركات النقل الجوي الوطنية والأجنبية دفع أجور خدمات الطيران المدني التي تستحق عن عملياتها ورحلاتها داخل المملكة ومنها وإليها وعبر أجوائها وفق أحكام هذا النظام، ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تدفع الأجور المستحقة بموجب هذا النظام بالريال السعودي أو بعملة أجنبية قابلة للتحويل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تستوفي مبالغ الأجور والإيجارات المقررة بموجب هذا النظام وتودع في حساب الهيئة في مؤسسة النقد العربي السعودي طبقًا للأنظمة المعمول بها في المملكة. وفي حالة تأخير التسديد عن موعد الاستحقاق تستوفى غرامة تأخير لا تتجاوز (30%) ثلاثين في المائة من المبلغ المستحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يستوفي رسم مغادرة مقداره (50) خمسون ريالًا على كل فرد يغادر المملكة عبر مطاراتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لايسمح لأي طائرة بمغادرة أرض المطار إذا هبطت فيه قبل أن تدفع جميع الأجور التي تستحق عليها، إلا إذا كان للجهة التي تتبعها تلك الطائرة وكيل أو ممثل مسؤول في المملكة ومعتمد من قبل الهيئة يقوم بدفع جميع الأجور المستحقة عليها وفقًا لأحكام هذا النظام ولائحته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تحسب جميع الأجور الواردة في هذا النظام على الطائرات على أساس أقصى وزن تستطيع الطائرة الإقلاع به، المبين في شهادة صلاحية الطيران التي تحملها الطائرة. وتجبر الكسور التي تبدأ من (500) خمسمائة كيلو جرام في جميع الأوزان، وما دون ذلك لا يحسب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تستوفي الهيئة الأجور المستحقة عن عمليات النقل الجوي ورحلاتها داخل المملكة ومنها وإليها وفقا لما تحدده اللائحة. وذلك عن الفئات الآتية: 1 - الهبوط. 2 - الإيواء. 3 - الملاحة الجوية للطائرات العابرة والهابطة. 4 - انتقال الركاب باستخدام وسائل النقل المختلفة، ويشمل ذلك انتقال الركاب إلى الطائرات أو العكس عن طريق الجسور المعلقة التي تصل بين الصالات وأبواب الطائرات لكل طائرة. 5 - خدمات أمنية عن كل طائرة مغادرة من أحد مطارات المملكة، وتستثنى من هذه الأجور الطائرات المواصلة في رحلات دولية وطائرات الشحن. 6 - خدمات حراسة، وذلك مقابل حراسة الطائرة عند الطلب. 7 - سحب الطائرة في حال طلب المالك سحبها. 8 - استخدام السيارات والمعدات الأرضية المخصصة لخدمات الطائرات للسنة الواحدة أو أجزائها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تستوفي الهيئة أجورا تحددها اللائحة مقابل إصدار التصاريح الآتية : 1 - تصريح الدخول لساحة المطارات أو صالات السفر ويشمل ذلك صالات الحج للأشخاص الذين يحق لهم دخولها 2 - تصريح قيادة سيارة داخل ساحة المطار للشخص الذي يحق له دخول الساحة ويحمل رخصة قيادة من الجهات المعنية وفي حالة فقدان أي من التصاريح المحددة في هذه المادة تصدر الجهة المعنية تصريحاً بدلاً منه وفق آلية تحددها اللائحة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تستوفي الهيئة أجوراٌ تحددها اللائحة مقابل الخدمات الآتية: 1 - تسجيل الطائرات في السجل ، وذلك عند الإصدار أو التجديد. 2 - إصدار أوتجديد شهادة صلاحية الطائرة ، مع مراعاة التكاليف الإضافية التي يتضمنها فحص الطائرة خارج المدنية التي يقع فيها مقر الإدراة المسؤولة ، وتكاليف انتقال المفتش المسؤول جوا من المدينة التي يقع فيها مقر الإدارة إلي موقع الطائرة ذهابا وإيابا لأغراض الفحص ، سواء داخل المملكة أو خارجها . 3 - إصدار شهادات محطات الإصلاح أو تجديدها وذلك عند إصدار شهادة محطة إصلاح الطائرات، وتكون تلك الشهادة سارية المفعول لمدة سنة واحدة، مع مراعاة التكاليف الإضافية التي يتضمنها الفحص خارج المدينة التي يقع فيها مقر الإدراة المسؤولة، وتكاليف انتقال المفتش المسؤول جوا من المدينة التي يقع فيها مقر الإدراة إلى موقع المحطة ذهابا وإيابا لأغراض الفحص ، سواء داخل المملكة أو خارجها . 4 - إصدار تصريح مؤقت بقيادة طائرة من موقع إلى موقع لأغراض الصيانة، والتفتيش، والفحص الفني للطائرة ،ونحوها . 5 - إصدار أو تجديد أي من التصاريح الآتية : أ - تصريح لمزاولة نشاط وكالة خدمات المناولة الأرضية
    للطائرات . ب - تصريح مكتب رئيسي لمزاولة الشحن الجوي . ج - تصريح مكتب فرعي لمزاولة نشاط الشحن الجوي . 6 - إصدار الرخص أو تجديدها ، أو إجراء الاختبارات للطيارين، والمدربين الجويين والأرضيين ، وفنيي إصلاح الطائرات والمضيفين، والمرحلين الجويين، ومهندسي الطيران، ومراقبي العمليات .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تستوفي الهيئة أجورا تحددها اللائحة عن كل متر ممتد من أنابيب الوقود المعدة لتزويد الطائرات داخل منطقة المطار .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تصنف المطارات إلى ثلاث فئات على النحو الآتي : 1 - مطارات دولية .2 - مطارات إقليمية .3 - مطارات محلية .وتحدد فئة كل مطار بقرار من رئيس الهيئة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تحدد اللائحة قواعد وفئات إيجارات مرافق ومواقع مطارات المملكة، و الضمانات الواجب تقديمها لتسديد الإيجارات في مواعيد استحقاقها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'أولا: تعفي الطائرات الآتية من جميع الأجور إيا كان نوعها : 1 - الطائرات الملكية السعودية . 2 - طائرات القوات الجوية الملكية السعودية . 3 - طائرات السلك الدبلوماسي والشخصيات الرسمية، على ألاتحمل ركابا مدنيي بأجر، ويشترط المعاملة بالمثل . 4 - الطائرات العسكرية الأجنبية على ألاتحمل ركابا مدنيين بأجر، وبشرط المعاملة بالمثل. 5 - طائرات البحث والإنقاذ، على ألا تتقاضي أجرا مقابل ذلك . 6 - الطائرات المعفاة من دفع الرسوم بموجب اتفاقيات دولية أو اتفاق خاص مع الحكومة السعودية أو اتفاق تلقائي ينص على المعاملة بالمثل . 7 - الطائرات التي تغادر المملكة وتعود لأسباب فنية طارئة لخلل في أجهزتها أو لرداءة الأحوال الجوية . 8 - الطائرات التي تضطر إلي الهبوط في مطارات المملكة لأسباب فنية أو أسباب قاهرة أو خلل يطرأ عليها أثناء الطيران . 9 - طائرات الهلال الأحمر والصليب الأحمر الدوليين . 10 - طائرات الأمم المتحدة والهيئات التابعة لها، بشرط ألا تتقاضي أجرا مقابل ذلك . ثانيا: تعفي طائرات التدريب السعودية والطائرات الشراعية التابعة للنوادي والهواة وطائرات السباق الجوي من جميع الأجور ما عدا أجور
    التسجيل والصلاحية . ثالثا: يعفى من دفع مقابل إصدار التصاريح المنصوص عليها في المادة (التاسعة) من هذا النظام منسوبو الجهات الآتية: 1 - وزارة الدفاع والطيران والجهات التابعة لها وغيرها من موظفي الحكومة العاملين في المطارات الذين تقتضي طبيعة عملهم دخول صالات وساحات المطار . 2 - البعثات الدبلوماسية المعتمدة في المملكة بشرط المعاملة بالمثل ، والمنظمات الدولية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'يقوم مجلس الإدارة بتحديد فئات الأجور والإيجارات الواردة في هذا النظام، ومراجعتها وتعديلها متى اقتضت الحاجة ذلك، واعتمادها، وعليه عند قيامه بذلك مراعاة الآتي: 1 - أن تكون فئات الأجور والإيجارات ضمن المعايير المعمول بها وضمن الأسعار المنافسة دوليا وإقليميا . 2 - أن تكون فئات الأجور والإيجارات محفزة لشركات الطيران الدولية والخاصة ومشغلي الطائرات للهبوط في مطارات المملكة واستخدام مرافقها والاستفادة من خدماتها . 3 - الأخذ في الاعتبار الأهمية الإستراتيجية لبعض المطارات من حيث ازدحامها أو تدني نسبة الحركة فيها، والتفريق بين أوقات الذروة خلال المواسم والأوقات الأخرى،كلما كان ذلك مناسبا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: الهيئة هي الجهة المختصة بتنفيذ هذا النظام ولائحته، وتحصيل الأجور الواردة فيه، وتأجير المرافق الاستثمارية في المطارات المدنية وتحصيل إيراداتها، وإيقاع الغرامات الواردة في هذا النظام على المخالفين وفق ما يقضي به النظام ولائحته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: مع عدم الإخلال بما تقرره الأنظمة ، لممثلي الهيئة المخولين الحق في الأطلاع على سجلات شركات الطيران ووكلاتها أو المستثمرين بالمطارات، في سبيل التحقق من صحة إيرادات الأجور والإيجارات أو أي وثيقة تتعلق بها. ويجوز لهم ضبط أي من هذه الوثائق أو المستندات إذا اكتشف أنها مخالفة لأحكام هذا النظام ولائحته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: أي مخالفة لأحكام هذا النظام ولائحته لم يرد في شأنها نص، يطبق عليها ما ورد في نظام الطيران المدني والتعليمات الصادرة في شأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يصدر مجلس الإدارة اللائحة، والقرارت اللازمة لتنفيذ أحكام هذا النظام، ويجوز له تفويض بعض الصلاحيات إلى من يراه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يلغي هذا النظام نظام تعرفة الطيران المدني الصادر بالمرسوم الملكي رقم (م/47) وتاريخ 13 / 7 / 1403 هـ والتعديلات التي طرأت عليه،كما يلغي جميع ما يتعارض معه من أحكام . على أن يستمر العمل بالتعليمات المطبقة حاليا لنظام تعريفة الطيران المدني التي لا تتعارض مع أحكام هذا النظام حتي صدور اللائحة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ويعمل به بعد مائة وثمانيين يوما من تاريخ نشره .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/456ab486-9c16-4c7b-993c-a9a700f2cc4a/1
  verified: false
