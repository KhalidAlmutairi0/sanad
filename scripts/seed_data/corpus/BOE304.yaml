regulation:
  code: BOE304
  name_ar: تنظيم معاملة القادمين للمملكة بتأشيرات دخول للحج أو العمرة وغيرها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقوم وزير الداخلية بالتنسيق مع وزير الخارجية و وزير الحج والأوقاف و وزير التِجارة بتنظيم الأمور الآتية: أ - تأشيرات الدخول للراغبين في الحج وفي أداء العُمرة وزيارة المسجد النبوي وتحديد صلاحية التأشيرات وشروط منحِها، ومُدة الإقامة في كُلٍ مِن مكة المُكرمة والمدينة المُنورة وجدة، والأعمال المحظورة على القادمين لهذا الغرض.ب - التأشيرات التي تُمنح لأغراض أُخرى كالزيارة والتِجارة ونحوهِما، وشروط منح تلك التأشيرات ومُدة الإقامة في البِّلاد، والمحظورات والواجِبات التي يتعين على القادمين مُراعاتِها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يقوم وزير الداخلية بالتنسيق مع وزير العمل والشئون الاجتماعية والرئيس العام لديوان الخِدمة المدنية بتحديد فئات المُتعاقدين الذين يُسمح لهُم باستقدام عائلاتِهم، وكذلك تحديد المقصود بالعائلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: أ - لا يجوز للقادمين للحج وللعُمرة أو زيارة المسجد النبوي أن يُقيم في البِّلاد بعد انتهاء صلاحية التأشيرات الممنوحة له، كما يحظُر عليه العمل في جميع أنحاء المملكة أو الانتِقال خارج نِطاق مكة المُكرمة وجدة والمدينة المُنورة.ب - يحظُر على جميع وسائل النقل في الداخل القيام بنقل القادمين لأداء العُمرة أو الحج أو زيارة المسجد النبوي بين مُدن المملكة عدا نقلِهم بين مكة المُكرمة وجدة والمدينة المُنورة، ويكون ذلك أثناء صلاحية تأشيراتِهم وِفقاً لما يُحدِّدُه وزير الداخلية .جـ - يحظُر إيواء المُتخلفين في أي مكان بعد انتِهاء صلاحية تأشيراتِهم، كما يحظُر تشغيلُهم أو التستُر عليهم أو تقديم أية مُساعدة لهُم تؤدي إلى بقائهم في البِّلاد بصورة غير نِظامية
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يُعاقب من يرتكب إحدى المُخالفات المنصوص عليها في المادة الثالثة أعلاه بالسجن مُدة لا تزيد عن سنتين أو بغرامة لا تتجاوز مائة ألف ريال أو بِهما معاً، وتتعدَّد الغرامات بتعدُّد الأشخاص الذين وقعت المُخالفة بشأنِهم
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يُعاقب من يُخالِف القواعد التي يُصدِرُها وزير الداخلية بالاتِفاق مع الجهات المعنية وِفقاً للمادة الأولى أعلاه بالسجن مُدة لا تزيد عن سنة وبغرامة لا تتجاوز خمسين ألف ريال أو بإحدى العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يصدُر بتوقيع العقوبات قرار من وزير الداخلية ، ويجوز التظلُم من قرار العقوبة أمام ديوان المظالِم خِلال شهر من تاريخ إبلاغه للمحكوم عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يُصدِر وزير الداخلية القرارات التنفيذية اللازِمة لهذه القواعد بما في ذلك إجراءات ضبط المُخالفات وإثباتِها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يُلغي هذا النِظام ما يتعارض معه من أنظِمة أو قرارات وتعليمات
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/87e36287-f62c-4006-b677-a9a700f20677/1
  verified: false
