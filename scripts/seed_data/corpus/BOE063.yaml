articles:
- article_ref: المادة الأولى
  article_text_ar: لا يجوز لأي شخص طبيعي أو معنوي مزاولة مهنة مراجعة الحسابات إلا إذا كان اسمه مقيدًا في سجل المحاسبين القانونيين لدى وزارة التجارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يشترط فيمن يقيد في سجل المحاسبين القانونيين أن يكون: 1 - سعودي الجنسية. 2 - كامل الأهلية. 3 - حسن السيرة والسلوك، وغير محكوم عليه بحد شرعي أو في جريمة مخلة بالشرف أو الأمانة ما لم يكن قد رد إليه اعتباره، وألا يكون قد صدر ضده قرار تأديبي بالفصل من الخدمة الحكومية ما لم يكن قد مضى على صدور القرار التأديبي ثلاث سنوات. 4 - حاصلًا على درجة البكالوريوس "تخصص محاسبة" أو أي شهادة أخرى تعتبرها الجهة المختصة بمعادلة الشهادات معادلة لها. 5 - لديه خبرة علمية في أعمال محاسبية بعد الحصول على المؤهل المشار إليه في الفقرة (4) السابقة لدى إحدى الجهات التالية: أ - مكاتب المحاسبين القانونيين التي تعتمدها الهيئة السعودية للمحاسبين القانونيين المنصوص عليها في هذا النظام طبقًا للضوابط التي تحددها اللائحة التنفيذية، وذلك لمدة لا تقل عن ثلاث سنوات تخفض إلى سنتين إذا كان طالب القيد حاصلًا على درجة الماجستير في المحاسبة أو ما يعادلها، وإلى سنة واحدة إذا كان حاصلًا على درجة الدكتوراه في المحاسبة أو ما يعادلها. ب - الجهات الحكومية أو الشركات أو المؤسسات الفردية طبقًا للشروط والمدد التي تحددها اللائحة
    التنفيذية، على ألا تقل عن المدد المشار إليها في الفقرة (أ) السابقة. 6 - عضوًا أساسيًّا بالهيئة السعودية للمحاسبين القانونيين. 7 - متفرغًا لمزاولة المهنة، ومع ذلك يجوز للمحاسب القانوني الجمع بين المهنة ومزاولة الأعمال التي لا تتعارض مع سلوك وآداب المهنة طبقًا للضوابط التي تحددها اللائحة التنفيذية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تشكل بقرار من وزير التجارة لجنة للنظر في طلبات القيد في سجل المحاسبين القانونيين برئاسة موظف من وزارة التجارة لا تقل مرتبته عن المرتبة الرابعة عشرة، وعضوية: 1 - مستشار قانوني سعودي يعينه وزير التجارة .2 - محاسب قانوني سعودي يرشحه مجلس إدارة الهيئة السعودية للمحاسبين القانونيين من المزاولين للمهنة مدة لا تقل عن خمس سنوات.وعلى لجنة القيد في سجل المحاسبين أن تبت في الطلب خلال المدة التي تحددها اللائحة التنفيذية، وأن يكون قرارها مسببًا، ويتم التظلم من هذا القرار أمام ديوان المظالم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يدفع عند طلب القيد وعند كل تجديد رسم قدره ألف ريال للأشخاص الطبيعيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يمنح المحاسب القانوني- فردًا كان أو شركة- بعد قيده ترخيصًا بمزاولة المهنة موقعًا من رئيس لجنة القيد، موضحًا به رقم القيد وتاريخه، ويعتبر الترخيص نافذًا لمدة خمس سنوات، ويجدد لمدد مماثلة بناء على طلب يقدم قبل انتهائه بتسعين يومًا على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجب على المحاسب القانوني المرخص له أن يزاول المهنة فعلًا وأن يخطر الجهة المختصة بوزارة التجارة بعنوان مكتبه وبكل تغيير يطرأ على هذا العنوان، وذلك خلال المواعيد التي تحددها اللائحة التنفيذية، ويترتب على عدم الإخطار في المواعيد المذكورة صحة إبلاغه على عنوانه الموجود بالوزارة. كما يجب على المحاسب القانوني المرخص له أن يشعر الجهة المختصة بوزارة التجارة عند فتح أي فرع آخر له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب التوقيع على تقارير المراجعة الصادرة من المكتب من المحاسب المرخص له نفسه إذا كان فردا أو من الشريك الذي شارك أو أشرف على المراجعة فعلا بالنسبة لشركات المحاسبة، ولا يجوز إنابة شخص آخر في التوقيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجب على المحاسب القانوني أن يتخذ اسمه الشخصي عنوانًا لمكتبه، ويجب وضع الترخيص الممنوح له في مكان بارز من المكتب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجب على المحاسب القانوني- فردًا كان أو شركة- أن يقرن اسمه برقم الترخيص وتاريخه في جميع مطبوعاته ومراسلاته وجميع ما يصدر عنه من تقارير وبيانات، كما يجب عليه أن يزود الهيئة السعودية للمحاسبين القانونيين بالبيانات اللازمة عن نشاطه طبقًا لما تحدده اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يجب على المحاسب القانوني التقيد بسلوك وآداب المهنة، وكذلك بمعايير المحاسبة والمراجعة والمعايير الفنية التي تصدرها الهيئة السعودية للمحاسبين القانونيين، كما يجب على المحاسب القانوني التقيد بالواجبات المحددة بموجب الأنظمة واللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يلتزم المحاسب القانوني بحضور عدد من الندوات التي تحددها وتعقدها الهيئة السعودية للمحاسبين القانونيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجب على المحاسب القانوني في جميع الأحوال الاحتفاظ بالأوراق المقدمة من العملاء وأوراق عمل المراجعة ونسخ من الحسابات الختامية، وذلك لمدة لا تقل عن عشر سنوات من تاريخ إصدار تقريره عن كل سنة مالية تتم مراجعتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يجوز للمحاسب القانوني أن يراجع حسابات الشركات أو المؤسسات التي يكون له مصلحة مباشرة أو غير مباشرة فيها، وذلك طبقا لما تحدده اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا يجوز للمحاسب القانوني مراجعة حسابات شركات المساهمة وحسابات البنوك والمؤسسات العامة إلا إذا مارس المهنة مدة لا تقل عن خمس سنوات بعد حصوله على الترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يسأل المحاسب القانوني عن تعويض الضرر الذي يصيب العميل أو الغير بسبب الأخطاء الواقعة منه في أداء عمله، وتكون المسئولية تضامنية بالنسبة للشركاء في شركات المحاسبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يجب على المحاسب القانوني- فردًا كان أو شركة- توظيف نسبة معينة من السعوديين من مجموع موظفيه، وتحدد اللائحة التنفيذية هذه النسبة دون إخلال بما يقضي به نظام العمل والعمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجب على المحاسب القانوني إذا توقف عن مزاولة المهنة لأي سبب من الأسباب بصورة مؤقتة أو نهائية أن يخطر الجهة المختصة بوزارة التجارة بذلك خلال الثلاثين يومًا التالية لتاريخ توقفه، ويعتبر الترخيص منتهيًا في حالة التوقف النهائي. ودون إخلال بالجزاءات المنصوص عليها في هذا النظام، يكون للجهة المختصة بوزارة التجارة صلاحية إصدار قرار إلغاء ترخيص كل محاسب توقف عن مزاولة المهنة ولم يتقدم بالإخطار المنصوص عليه في هذه المادة خلال الموعد المحدد بعد التحقق من الواقعة المستوجبة لذلك وسماع أقوال المحاسب، وإذا أخطر المحاسب ولم يحضر خلال مدة الثلاثين يومًا التالية لتاريخ إخطاره فيتم إلغاء ترخيصه دون سماع أقواله، ويجوز التظلم من قرار إلغاء الترخيص أمام ديوان المظالم، ولا يترتب على إلغاء الترخيص إلغاء العضوية بالهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: في حالة توقف المحاسب القانوني عن مزاولة مهنته نهائيًّا أو لمدة يترتب عليها الإضرار بالعملاء أو الغير، تتم تصفية جميع المعاملات المعلقة لديه والحقوق والالتزامات المترتبة على ذلك طبقًا للقواعد والإجراءات التي تحددها اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'تنشأ هيئة تسمى (الهيئة السعودية للمحاسبين القانونيين) تعمل تحت إشراف وزارة التجارة للنهوض بمهنة المحاسبة والمراجعة وكل ما من شأنه تطوير هذه المهنة والارتفاع بمستواها ولها على الأخص ما يلي: 1 - مراجعة وتطوير واعتماد معايير المحاسبة والمراجعة.2 - وضع القواعد اللازمة لامتحان الحصول على شهادة الزمالة، على أن يشمل ذلك الجوانب المهنية والعملية والعلمية لمهنة المراجعة بما في ذلك الأنظمة ذات العلاقة بالمهنة.3 - تنظيم دورات التعليم المستمر.4 - إعداد البحوث والدراسات الخاصة بالمحاسبة والمراجعة وما يتصل بهما.5 - إصدار الدوريات والكتب والنشرات في موضوعات المحاسبة والمراجعة.6 - وضع التنظيم المناسب للرقابة الميدانية للتأكد من قيام المحاسب القانوني بتطبيق معايير المحاسبة والمراجعة والتقيد بأحكام هذا النظام ولوائحه.7 - المشاركة في الندوات واللجان المحلية والدولية المتعلقة بمهنة المحاسبة والمراجعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'تتكون الهيئة من: 1 - أعضاء أساسيين، وهم : أ - جميع المحاسبين القانونيين المرخص لهم بمزاولة المهنة في المملكة وقت العمل بهذا النظام، على أن يلتزموا بحضور الدورات التي تعقدها الهيئة لهم، واجتياز الاختبارات خلال مدة لا تتجاوز ثلاث سنوات من تاريخ بدء البرنامج المعد لذلك ما لم يحصلوا على شهادة الزمالة المنصوص عليها في الفقرة (2) من المادة التاسعة عشرة من هذا النظام.ب - من تتوفر لديهم المؤهلات المنصوص عليها في الفقرة (4) من المادة الثانية من هذا النظام، بشرط الحصول على شهادة الزمالة المنصوص عليها في الفقرة (2) من المادة التاسعة عشرة من هذه النظام. 2 - أعضاء منتسبين، وهم من يتقدمون بطلب العضوية ممن تتوفر لديهم المؤهلات المشار إليها في الفقرة (4) من المادة الثانية من هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يكون مقر الهيئة في مدينة الرياض، ويجوز إنشاء مكاتب تابعة لها داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يكون للهيئة جمعية عمومية تتكون من جميع الأعضاء الأساسيين الذين سددوا اشتراكاتهم السنوية. وتعقد الجمعية العمومية للهيئة اجتماعاتها العادية أو الاستثنائية بحضور أغلبية أعضائها، فإذا لم يتوفر النصاب اللازم للاجتماع وجهت دعوة لموعد اجتماع لاحق يعقد خلال الثلاثين يومًا التالية للموعد السابق، ويكون اجتماع الجمعية العمومية للهيئة في هذا الموعد صحيحًا مهما كان عدد الحاضرين. وتصدر قرارات الجمعية العمومية للهيئة بأغلبية أصوات الحاضرين، وفي حالة التساوي يكون صوت الرئيس مرجحًا. ويتم عقد الاجتماعات العادية للجمعية العمومية للهيئة في موعد يحدد في بداية كل عام مالي للهيئة. ويجوز للجمعية العمومية للهيئة أن تعقد اجتماعًا استثنائيًّا كلما طلب ذلك خمس أعضائها أو مجلس إدارة الهيئة. ويعد مجلس إدارة الهيئة جدول أعمال الجمعية العمومية للهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'تختص الجمعية العمومية للهيئة بما يلي: 1 - الموافقة على النظام الداخلي للهيئة.2 - إقرار ميزانية الهيئة السنوية وحساباتها الختامية لكل سنة، وتعيين مراقب لحساباتها وتحديد مكافأته.3 - إقرار خطة العمل السنوية التي يقدمها مجلس الإدارة واعتماد تقريره السنوي عن نشاط الهيئة.4 - انتخاب ممثلي المحاسبين القانونيين في مجلس إدارة الهيئة.5 - مناقشة كل ما يرد بجدول أعمالها من أمور تدخل في نطاق عمل الهيئة أو اهتماماتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'يدير الهيئة مجلس إدارة مكون من ثلاثة عشر عضوًا، ويتم تشكيله من: 1 - وزير التجارة أو من ينيبه، رئيسًا. 2 - وكيل الوزارة للتجارة، عضوًا. 3 - وكيل وزارة المالية والاقتصاد الوطني للشئون المالية والحسابات، أو من يعينه وزير المالية والاقتصاد الوطني على ألا تقل مرتبته عن المرتبة الرابعة عشرة، عضوًا. 4 - نائب رئيس ديوان المراقبة العامة أو من يعينه رئيس الديوان على ألا تقل مرتبته عن المرتبة الرابعة عشرة، عضوًا. 5 - عضوين سعوديين من هيئة التدريس بقسم المحاسبة في واحدة أو أكثر من جامعات المملكة، يعينهما وزير التجارة بناء على ترشيح وزير التعليم العالي . 6 - ممثل لمجلس الغرف التجارية والصناعية يعينه وزير التجارة بترشيح من مجلس الغرف، عضوًا. 7 - ستة أعضاء من المحاسبين القانونيين السعوديين الممارسين للمهنة يتم انتخابهم من قبل الجمعية العمومية للهيئة لمدة ثلاث سنوات قابلة للتجديد مرة واحدة، واستثناء من ذلك يعين هؤلاء في مجلس الإدارة الأول بقرار من وزير التجارة لمدة خمس سنوات. ويحضر أمين عام الهيئة جلسات الإدارة دون أن يكون له صوت في إصدار القرارات. ويجتمع مجلس الإدارة مرة على الأقل كل
    تسعين يومًا بدعوة من رئيسه أو من ينيبه، وعلى الرئيس توجيه الدعوة إلى الاجتماع كلما طلب ذلك كتابة أربعة أعضاء على الأقل. ولا تكون اجتماعات المجلس صحيحة إلا بحضور أغلبية الأعضاء، على أن يكون من بينهم الرئيس أو من ينيبه، وتصدر قرارات المجلس بأغلبية أصوات الحاضرين، فإذا تساوت يرجح الجانب الذي صوت معه الرئيس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'يقوم مجلس الإدارة بتصريف شئون الهيئة وممارسة الصلاحيات اللازمة لتحقيق أغراضها، وله على الأخص ما يلي: 1 - اقتراح التعديلات التي يرى إدخالها على نظام المحاسبين القانونيين، واقتراح اللوائح والقرارات اللازمة لتنفيذه وغير ذلك من الأنظمة واللوائح ذات العلاقة بمهنة المحاسبة والمراجعة. 2 - مراجعة وتطوير واعتماد معايير المحاسبة والمراجعة. 3 - إصدار اللوائح المالية والإدارية وتحديد السنة المالية للهيئة. 4 - إعداد النظام الداخلي للهيئة. 5 - تحديد الاشتراكات المقررة على الأعضاء وكيفية تحصيلها. 6 - تنظيم الاختبارات اللازمة للحصول على شهادة الزمالة، على أن يشمل ذلك الجوانب المهنية والعملية لممارسة مهنة المراجعة، وكذلك الأنظمة ذات العلاقة. 7 - وضع برامج ودورات التعليم المستمر. 8 - تشكيل اللجان الفنية، مثل: لجنة معايير المحاسبة والمراجعة، ولجنة مراقبة جودة الأداء المهني، ولجنة الاختبارات والترشيحات، ولجنة التعليم المستمر، ولجنة سلوك وآداب المهنة، وغيرها، ووضع قواعد وإجراءات ممارسة مهامها. 9 - تعيين أمين عام للهيئة ونائباً له، على أن يكونا من السعوديين المستوفين للشروط المقررة للترخيص
    بمزاولة المهنة وغير مزاولين لها. ويحدد مجلس إدارة الهيئة واجباتهما ومسئولياتهما وحقوقهما وكيفية معاملتهما ماليًّا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'تتكون موارد الهيئة من: 1 - الاشتراكات التي يحددها مجلس الإدارة.2 - الإعانات الحكومية .3 - الهبات والتبرعات والوصايا التي يقرر مجلس الإدارة قبولها.4 - عائد استثمار أموال الهيئة وحصيلة نشر وبيع ما يتم إعداده من بحوث ودراسات ونشرات وما تقدمه من خدمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يكون للهيئة مراقب حسابات تعينه الجمعية العمومية كل سنة من المحاسبين القانونيين المرخص لهم، ويكون له حق الاطلاع على الدفاتر والمستندات وإبداء ما يراه من ملاحظات، وعليه مراجعة حسابات الهيئة وتقديم تقرير عنها إلى الجمعية العمومية، ويجب ألا يكون المراقب أو أحد شركائه عضوًا في مجلس إدارة الهيئة. وتحدد الجمعية العمومية مكافأته، ولها إعادة تعيينه أو اختيار غيره.واستثناء من ذلك يعين مجلس الإدارة مراقب الحسابات للسنة الأولى ويحدد مكافأته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 'تطبق على من يخالف أحكام هذا النظام إحدى العقوبات التالية: اللوم - الإنذار - الإيقاف عن ممارسة المهنة مدة لا تزيد عن ستة أشهر - شطب قيد المخالف من سجل المحاسبين القانونيين ، مع نشر القرار الصادر بعقوبة الإيقاف وعقوبة الشطب على نفقة المخالف بواحدة أو أكثر من الصحف المحلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'مع مراعاة ما تقضي به الأنظمة، يتولى التحقيق في مخالفات أحكام هذا النظام لجنة يشكلها وزير التجارة من: وكيل وزارة التجارة للتجارة رئيسًا، ومستشار قانوني سعودي، وأحد أعضاء مجلس إدارة الهيئة، فإن رأت هذه اللجنة أن المخالفة تشكل جريمة فتقوم بإحالتها إلى الجهة المختصة، وبعد الحكم فيها تنظر اللجنة المشار إليها في المخالفة من الناحية المسلكية، ولها إيقاع إحدى العقوبات التالية: اللوم– الإنذار- الإيقاف عن ممارسة المهنة مدة لا تزيد على ستة أشهر. وللمخالف حق التظلم من القرار الصادر بإحدى العقوبات السابقة إلى ديوان المظالم، أما إن رأت لجنة التحقيق أن المخالفة لا تشكل جريمة فلها بعد استكمال التحقيق مع المخالف إيقاع إحدى العقوبات التالية: اللوم- الإنذار- الإيقاف عن ممارسة المهنة مدة لا تزيد على ستة أشهر. ولها أن تحفظ أوراق المخالفة إذا رأت أنها لا تستحق إحدى العقوبات المقررة. وفي جميع الأحوال يجب أن يكون قرار اللجنة مسببًا، وللمخالف حق التظلم من القرار الصادر بالعقوبة إلى ديوان المظالم. أما إذا رأت اللجنة تطبيق عقوبة الشطب فتحيلها إلى ديوان المظالم للحكم فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يجوز لمن شطب قيده طبقًا لأحكام هذا النظام ولوائحه أن يطلب إعادة قيده بعد انقضاء خمس سنوات من تاريخ صدور قرار الشطب، ويفصل في الطلب وزير التجارة، وتتبع في إعادة القيد الشروط والإجراءات المقررة بالنسبة للقيد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: لا تدخل مدة الإيقاف أو الشطب المنصوص عليهما في هذا النظام في حساب المدة الواجب توفرها فيمن يجوز له مراجعة حسابات شركات المساهمة أو مراجعة حسابات البنوك والمؤسسات العامة المشار إليها في المادة الرابعة عشرة من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يختص ديوان المظالم بتوقيع عقوبة الشطب المنصوص عليها في هذا النظام، كما يختص بنظر كافة الدعاوى التي تقام من أو على المحاسب القانوني لسبب يتعلق بمزاولته المهنة طبقًا لأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: تباشر الجهة المختصة بوزارة التجارة إجراءات رفع الدعوى أمام ديوان المظالم في المخالفة التي تنتهي فيها اللجنة المنصوص عليها في المادة التاسعة والعشرين إلى تطبيق عقوبة الشطب على المحاسب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يجوز لوزير التجارة إلزام المحاسب القانوني بموافاة الوزارة بأي معلومات تطلبها للتأكد من أداء المحاسب لعمله طبقًا لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يتم تنظيم التعاون بين المحاسبين المرخص لهم طبقًا لهذا النظام وبين المحاسبين القانونيين غير السعوديين طبقًا لما تحدده اللائحة التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يستمر العمل بالتراخيص الصادرة للمحاسبين القانونيين قبل نفاذ هذا النظام شريطة أن يكون المرخص له مزاولًا للمهنة مع التزام مكاتب المحاسبة الأجنبية أفرادًا أو شركات بما يلي:أ - مشاركة محاسب أو أكثر من المحاسبين القانونيين السعوديين المرخص لهم بمزاولة المهنة وذلك خلال سنتين من تاريخ العمل بهذا النظام، وإلا اعتبر الترخيص الممنوح لها منتهيًّا، وتحدد اللائحة التنفيذية قواعد ونسبة مشاركة السعوديين في هذه المكاتب وسبل التأكد من تطبيقها.ب - أن يقيم المحاسب أو الشريك الأجنبي بالمملكة مدة لا تقل عن تسعة أشهر في السنة وأن يزاول المهنة فعلًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يلغي هذا النظام نظام المحاسبين القانونيين الصادر بالمرسوم الملكي رقم (م/43) وتاريخ 13 / 7 / 1394هـ، وتعديلاته، وكل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ، ويعمل به بعد تسعين يوما من تاريخ نشره، ويصدر وزير التجارة اللوائح والقرارات اللازمة لتنفيذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/56195fdf-46c2-44f0-88e5-a9a700f1be50/1
  verified: false
