regulation:
  code: BOE350
  name_ar: تنظيم مركز الملك عبدالله بن عبد العزيز للتخطيط والسياسات اللغوية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها، مالم يقتض السياق غير ذلك: التنظيم: تنظيم مركز الملك عبدالله بن عبد العزيز للتخطيط والسياسات اللغوية. المركز: مركز الملك عبدالله بن عبد العزيز للتخطيط والسياسات اللغوية. المجمع: مجمع الملك سلمان العالمي للغة العربية. المجلس: مجلس أمناء المركز. الرئيس: رئيس المجلس. المدير العام: مدير عام المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية والاستقلال المالي والإداري، ويكون مقره في مدينة الرياض، وله –بقرار من المجلس– إنشاء فروع أو مكاتب تابعة له بحسب الحاجة، ويرتبط تنظيمياً بالمجمع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى تأصيل أعمال التخطيط والسياسات اللغوية على المستوى الوطني، ليكون مرجعية موثوقة للمختصين في اتخاذ القرارات اللغوية المناسبة، وبيت خبرة على مستوى العالم العربي. ويتولى -في سبيل تحقيق ذلك- المهمات والاختصاصات الآتية: بناء السياسات والمعايير والأطر اللغوية، والسعي إلى تفعيلها، بالتنسيق مع الجهات ذات العلاقة. بناء البرامج المتصلة بمجال التخطيط والسياسات اللغوية، ومتابعة تنفيذها محليّاً ودوليّاً. رصد وضع اللغة العربية محليّاً ودوليّاً. دعم الحركة العلمية المتخصصة في مجالات عمل المركز، وتفعيلها. المساهمة في تنفيذ الأعمال والمهمات الواردة في استراتيجية المجمع مما له علاقة بالتخطيط والسياسات اللغوية. تكريم العلماء والباحثين والمختصين في التخطيط اللغوي. تقديم الخدمات ذات العلاقة بأغراضه للأفراد والجهات الحكومية وغير الحكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يتولى مجلس أمناء المجمع ممارسة اختصاصات ومهمات مجلس أمناء المركز الواردة في هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'المجلس هو السلطة العليا المهيمنة على شؤون المركز وإدارته وتصريف أموره ووضع السياسة العامة التي يسير عليها وفقاً للتنظيم ولوائحه، وله جميع الصلاحيات اللازمة لتحقيق أغراضه وبصفة خاصة ما يأتي: إقرار السياسات العامة المتعلقة بنشاط المركز والاستراتيجيات والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. اعتماد اللوائح المالية والإدارية للمركز، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار اللوائح الداخلية والفنية والإجراءات والقواعد والمعايير المتعلقة بنشاط المركز. إقرار الهيكل التنظيمي للمركز. إقرار مشروع ميزانية المركز وحسابه الختامي وتقرير مراجع الحسابات والتقرير السنوي، ورفعها إلى المجمع، للنظر فيها، تمهيداً لاستكمال الإجراءات النظامية المتبعة. تشكيل اللجان وتخويلها ما يراه من صلاحيات من أجل إنجاز الأمور التي تعرض على المجلس. قبول الهبات والتبرعات والمنح والوصايا وريع الأوقاف، وفقاً للأحكام
    المنظمة لذلك. تحديد المقابل المالي لما يقدمه المركز من خدمات وأعمال يرى المجلس استحصال مقابل مالي عنها. الموافقة على إبرام الاتفاقيات والعقود بعد التنسيق مع المجمع وبحسب الإجراءات النظامية المتبعة، وله تفويض المدير العام أو من ينيبه بذلك. الاستعانة بالشركات والجهات الاستشارية لتحقيق أغراضه، وفقاً للإجراءات النظامية المتبعة. النظر في التقارير الدورية عن سير العمل في المركز واتخاذ القرارات اللازمة بشأنها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعقد المجلس اجتماعاته بصفة دورية برئاسة الرئيس أو من ينيبه من الأعضاء، ويعقد الاجتماع بناءً على دعوة من رئيسه أو بناءً على طلب أغلبية الأعضاء على الأقل وفقًا للوائح الداخلية التي يقرها المجلس، على ألا تقل اجتماعاته عن مرتين في السنة. ولا يكون اجتماع المجلس نظاميًّا إلا بحضور أغلبية أعضائه على الأقل، على أن يكون من بينهم الرئيس أو من ينيبه من الأعضاء. وتصدر القرارات بموافقة أغلبية الأعضاء الحاضرين على الأقل، وعند التساوي يُرجّح الجانب الذي صوت معه رئيس الاجتماع. وللرئيس دعوة من يراه من غير الأعضاء لحضور اجتماعات المجلس دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يعين المجلس مديراً عاماً من ذوي الكفاية والخبرة، ويكون المسؤول عن المركز، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم ولوائحه، وما يقرره المجلس، وله على وجه الخصوص: التحضير لاجتماعات المجلس. متابعة تنفيذ القرارات الصادرة من المجلس. الإشراف على إعداد مشروع ميزانية المركز ومشروع حسابه الختامي وتقريره السنوي، ورفعها إلى المجلس. اقتراح الهيكل التنظيمي للمركز. تعيين العاملين في المركز وفروعه ومكاتبه، وفقاً للوائح المنظمة لذلك، والإشراف عليهم. إصدار أوامر الصرف الخاصة بالمركز وفقاً للميزانية السنوية المعتمدة ولوائح المركز المالية. تقديم تقارير دورية إلى المجلس عن أعمال المركز ومنجزاته ونشاطاته. اقتراح خطط المركز وبرامجه والإشراف على تنفيذها بعد موافقة المجلس عليها. اقتراح اللوائح الإدارية والمالية التي يسير عليها المركز، واقتراح تعديلها، ورفعها إلى المجلس. اقتراح اللوائح الداخلية والفنية للمركز والسياسات واللوائح الخاصة بأوجه نشاطه. يمثل المدير العام المركز أمام القضاء والجهات الحكومية والمؤسسات الأخرى، وغيرها من الجهات داخل المملكة وخارجها. وله تفويض بعض الاختصاصات المنصوص
    عليها في هذه المادة إلى غيره من المسؤولين عن إدارة المركز وفروعه ومكاتبه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تشكل في المركز -بقرار من المجلس- لجنة استشارية من خمسة أشخاص على الأقل غير متفرغين، يساعدون المدير العام، وتكون من مهمات هذه اللجنة المساعدة فيما يأتي: اقتراح السياسات العامة المتعلقة بنشاط المركز والاستراتيجيات والخطط والبرامج اللازمة لتنفيذها. اقتراح اللوائح والإجراءات الكفيلة بالتنفيذ الأمثل لأعمال المركز. اقتراح الخطط والبرامج والمشروعات السنوية. إجراء البحوث العلمية. إعداد التقارير ذات العلاقة بنشاط المركز. ولها أن تستعين بمن تراه في سبيل القيام بتلك المهمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد المركز المالية مما يأتي: الإعانات التي تخصصها له الدولة. المقابل المالي الذي يتقاضاه عن الخدمات والأعمال التي يقوم بها. الهبات والتبرعات والمنح والوصايا وريع الأوقاف التي يقبلها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تودع أموال المركز في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المركز حسابًا له في البنك المركزي السعودي. وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانيته المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات المركز؛ يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة تعد وتصدر وفقًا لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخضع جميع منسوبي المركز لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يحل التنظيم محل تنظيم مركز الملك عبد الله بن عبد العزيز الدولي لخدمة اللغة العربية الموافق عليه بقرار مجلس الوزراء (104) وتاريخ 6 / 4 / 1431هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يُنشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/7463cdec-7e4b-4781-9f95-add900b4bd80/1
