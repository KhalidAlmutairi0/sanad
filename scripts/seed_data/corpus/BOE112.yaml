regulation:
  code: BOE112
  name_ar: نظام الإحصاءات العامة للدولة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يسمى هذا النظام ( نظام الإحصاءات العامة للدولة ).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنشأ بموجب هذا النظام مصلحة للإحصاءات العامة، وتكون تابعة لوزارة المالية والاقتصاد الوطني ، وتعتبر المرجع الإحصائي الرسمي الوحيد في المملكة العربية السعودية لتنفيذه وتطبيقه، وكذا لتزويد الإدارات الحكومية والمؤسسات العامة والخاصة والأفراد بالمعلومات والبيانات الإحصائية الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تضطلع مصلحة الإحصاءات العامة بمهمة إجراء إحصاءات تجارية أو اقتصادية أو صحية أو تعليمية أو صناعية أو مالية أو زراعية، وغيرها حسب الاقتضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يتم إجراء الإحصاءات المنصوص عليها في المادة السابقة بقيام الوزارات والإدارات الحكومية المختلفة بإرسال كافة البيانات الإحصائية التي لديها إلى وزارة المالية والاقتصاد الوطني بصفة دورية، يتم الاتفاق عليها بين هذه الوزارة وبين الجهات الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يخصص قسم في كل وزارة أو دائرة من الوزارات والدوائر الحكومية التي تدعو الحاجة لإيجاد قسم خاص للإحصاء فيها، تكون مهمته جمع الإحصاءات المتعلقة بأعمال تلك الوزارة أو الدوائر، ويقوم بوضع مناهجه العملية بالاتفاق مع مدير عام مصلحة الإحصاءات العامة وتحت إشرافه، ويتبع كافة التعليمات الإحصائية والفنية التي يضعها، وعلى هذا القسم أن يزود مدير الإحصاءات بانتظام وبطريقة دورية تحدد فيما بعد بالإحصاءات التي يجمعها سواء كانت شهرية أو ربع أو نصف سنوية أو سنوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تباشر مصلحة الإحصاءات العامة جمع كافة الإحصاءات المتعلقة بأحوال البلاد وحياتها الاقتصادية والاجتماعية بواسطة موظفيها ومستخدميها وغيرهم من الموظفين ومستخدمي الحكومة الذين يندبون لهذا الغرض بموافقة الوزير المختص، كما تتعاون مع الوزارات والدوائر الحكومية الأخرى، وتساعدها على جمع وتنسيق المعلومات الإحصائية التي تقع في اختصاصها، وللمصلحة كذلك أن تستعين عند اللزوم بمن تشاء من العمد والمشايخ ورؤساء القبائل وغيرهم. على أن تنفرد مصلحة الإحصاءات العامة وحدها بتحليل ودراسة ونشر نتائج تلك الإحصاءات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب على المكلفين بإجراء الإحصاءات أن ينفذوا التعليمات التي تصدر إليهم من المصلحة، وعلى جميع موظفي الجهات الإدارية ورجال الضبط أن يعاونوهم فيما يريدون القيام به، لتحقيق الغرض والفائدة من تلك الإحصاءات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على الأفراد والشركات والمؤسسات والجمعيات والهيئات العامة أن يقدموا إلى مصلحة الإحصاءات العامة أو مندوبيها في المواعيد وبالكيفية المبينة بالقرارات المشار إليها في المادة الرابعة من هذا النظام جميع البيانات المطلوبة على الوجه الذي يطابق الحقيقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: على أصحاب المحال الصناعية والتجارية والمحال العامة أو من ينوب عنهم أن يقدموا لمندوبي الإحصاء المستندات اللازمة لتأييد صحة البيانات المقدمة منهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تقوم مصلحة الإحصاءات العامة بنشر البيانات الإحصائية في جداول عامة، لا تتناول بحال بيانات فردية أو خاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون جميع البيانات التي تتعلق بأي إحصاء سرية، ولا يجوز اطلاع أي فرد أو هيئة عامة أو خاصة عليها أو بإبلاغهم شيئا منها، أو استخدامها لغرض غير إعداد الجداول الإحصائية ، أو استعمالها كبينة ضد مقدمها في أي حال من الأحوال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يتولى إثبات المخالفات لأحكام هذا النظام موظفو دائرة الأمن العام وموظفو مصلحة الإحصاءات العامة والموظفون الذين يندبون لهذا الغرض بالاشتراك مع موظفي دوائر الأمن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يعاقب بالحبس مدة لا تزيد على ثلاثة أشهر أو بغرامة لا تتجاوز ألف ريالا عربيا أو بهما معا في حالة العود، كل من أفشى من موظفي مصلحة الإحصاءات العامة أو مندوبي الإحصاء بيانا من البيانات التي تتناولها كشوف الإحصاء، أو سرا من أسرار الصناعة أو التجارة، أو غير ذلك من أساليب العمل التي يكون قد اطلع عليها بحكم عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: كل من عطل عمدا أعمال الإحصاء، أو امتنع عن إعطاء البيانات المطلوبة، أو أعطى بيانات غير صحيحة مع عمله بذلك، يعاقب بغرامة لا تقل عن خمسمائة ريال لأول مرة من ارتكاب المخالفة، ولا تتجاوز ألف ريال في حالة تعدد المخالفات والإصرار على تعطيل أعمال الإحصاء.يعتبر الشخص ممتنعا عن إعطاء البيانات، إذا انقضت مدة ثلاثين يوما من التاريخ المحدود دون أن يقدم البيانات المطلوب منه تقديمها، ما لم يثبت أن تأخره عن الموعد المذكور كان لعذر مقبول. لوزير المالية إعطاء مهلة إضافية قدرها ثلاثين يوما إضافة إلى المهلة المذكورة أعلاه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعاقب بالعقوبات المبينة في المادة السابقة، كل من حاول بطريق الغش أو التهديد أو الإيهام، أو بأية وسيلة أخرى الحصول على بيانات من أحد موظفي الإحصاءات العامة أو مندوبيها. ويعاقب بنفس العقوبة كل من حاول الحصول على معلومات أو بيانات باتخاذه صفة موظفي أو مندوبي \ مصلحة الإحصاءات العامة ، وذلك بقطع النظر عن العقوبات المنصوص عنها في نظام الموظفين أو الأنظمة الأخرى لانتحال صفة الموظف الرسمي بصورة مخالفة للحقيقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على وزير المالية والاقتصاد الوطني تنفيذ هذا النظام، وإصدار التعليمات المحققة واللازمة لذلك حسب الاقتضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يسري مفعول هذا النظام اعتبارا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3563a355-6ff9-4296-af66-a9a700f20e70/1
  verified: false
