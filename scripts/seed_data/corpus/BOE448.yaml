regulation:
  code: BOE448
  name_ar: تنظيم صندوق مدينة الملك فهد الطبية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالمصطلحات التالية المعاني الموضحة أمامها أينما وردت في هذا التنظيم . المدينة : مدينة الملك فهد الطبية . الإيرادات المالية الذاتية : جميع الإيرادات المالية التي تحصل في نطاق مدينة الملك فهد الطبية وفقاً للأنظمة والقرارات ذات العلاقة . الصندوق :صندوق الإيرادات المالية الذاتية لمدينة الملك فهد الطبية . المجلس: مجلس إدارة صندوق الإيرادات المالية الذاتية لمدينة الملك فهد الطبية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يؤسس وفقاً لهذا التنظيم صندوق للإيرادات المالية الذاتية بالمدينة، يهدف إلى تنظيم عملية تنمية وتحصيل الموارد الذاتية للمدينة وصرفها . ويتمتع الصندوق بالشخصية المعنوية والذمة المالية المستقلة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يشكل المجلس على النحو التالي : 1 - المدير العام التنفيذي للمدينة رئيسًا 2 ـ المدير التنفيذي للشؤون المالية والإدارية في المدينة نائباً للرئيس 3 ـ المدير التنفيذي للشؤون الأكاديمية والتدريب في المدينة عضواً 4 ـ مدير إدارة التخطيط والتطوير في المدينة عضواً 5 ـ مندوب من وزارة الصحة يحدده وزير الصحة عضواً 6 ـ مندوب من وزارة المالية يحدده وزير المالية عضواً'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يعقد المجلس اجتماعاته بشكل دوري بدعوة من رئيسه أو نائبه، ويمكن دعوة المجلس للانعقاد بصفة استثنائية إذا استدعى الأمر ذلك . ولا ينعقد المجلس إلا بحضور معظم الأعضاء بمن فيهم الرئيس أو نائبه، وللمجلس أن يدعو لحضور اجتماعاته من يرى الاستعانة به دون أن يكون له حق التصويت . وتثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس المجلس وأعضاؤه الحاضرون .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين في الاجتماع، وعند تساوي الأصوات يرجح الجانب الذي صوّت معه الرئيس . ولا يجوز للمجلس أن يصدر قرارات بطريق عرضها على الأعضاء متفرقين إلا في حالة الضرورة، ويشترط عندئذ موافقة جميع أعضاء المجلس على تلك القرارات كتابة، وتعرض هذه القرارات على المجلس في أول اجتماع لاحق لإثباتها في محضر الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعين المجلس أميناً عاماً له ومحاسباً للصندوق، ويحدد المجلس اختصاصاتهما وحقوقهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يختص المجلس بالإشراف على الصندوق وتصريف شؤونه، وإدارة كل الأمور الخاصة به، وله على وجه الخصوص ما يلي : 1 ـ اعتماد التنظيم المالي والإداري للصندوق .2 ـ اعتماد الميزانية السنوية للصندوق .3 ـ اعتماد الحساب الختامي للصندوق .4 ـ اعتماد أنشطة الصندوق .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يمثل الصندوق في صلاته بغيره من الجهات وأمام القضاء رئيس المجلس أو من يفوضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يصرف لعضو المجلس مبلغ (500 ريال) خمسمائة ريال عن كل جلسة، على ألا يتجاوز ما يصرف له (10.000 ريال) عشرة آلاف ريال في السنة الواحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تكون إيرادات الصندوق على النحو التالي : 1 ـ إيرادات التعليم والتدريب المستمر .2 ـ إيرادات النشاط الاجتماعي .3 ـ إيرادات الاستشارات المتخصصة .4 ـ إيرادات تقديم الخدمات المساندة .5 ـ أي تبرع أو هبة يتلقاها الصندوق .6 ـ المبالغ المحصلة نتيجة مخالفات أنظمة ولوائح المدينة .7 ـ فوائض أموال الصندوق المدورة من السنة السابقة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يتولى الصندوق الصرف من إيراداته على متطلبات المدينة، ومن ضمنها ما يلي : 1 ـ الأبحاث والدراسات والتطوير .2 ـ التعليم والتدريب والمؤتمرات .3 ـ النشاطات الاجتماعية والثقافية.4 ـ تطوير مرافق المدينة وتجهيزاتها وتحسينهما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يفتح للصندوق حساب في أحد البنوك المحلية وتودع فيه الإيرادات ويصرف منه وفقاً لما يحدده المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تزود وزارة المالية ووزارة الصحة وديوان المراقبة العامة بنسخة من الحساب الختامي للصندوق، ويحق لديوان المراقبة العامة الرقابة المالية على حساب الصندوق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تكون السنة المالية للصندوق (12) شهراً، تبدأ مع بداية السنة المالية للدولة وتنتهي بنهايتها ، على أن تبدأ السنة المالية الأولى له من تاريخ الموافقة على هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يبدأ العمل بهذا التنظيم من تاريخ الموافقة عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5f028fb6-ec65-4745-8836-a9a700f28c38/1
  verified: false
