regulation:
  code: BOE401
  name_ar: تنظيم المعهد الوطني للتطوير المهني التعليمي 1441هـ
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية المعاني المبينة أمام كل منها, ما لم يقتضِ السياق غير ذلك: التنظيم: تنظيم المعهد الوطني للتطوير المهني التعليمي. المعهد: المعهد الوطني للتطوير المهني التعليمي. المجلس: مجلس إدارة المعهد. الرئيس: رئيس المعهد. الوزارة: وزارة التعليم. الوزير: وزير التعليم. الهيئة: هيئة تقويم التعليم والتدريب. القطاع التعليمي: التعليم العام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: ينشأ معهد باسم "المعهد الوطني للتطوير المهني التعليمي", يتمتع بالشخصية الاعتبارية العامة وبالاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير. يكون المقر الرئيس للمعهد في مدينة الرياض، ويجوز بقرار من المجلس إنشاء فروع له داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: الـمادة الثالثة
  article_text_ar: 'يهدف المعهد إلى ما يأتي: دعم تمهين التعليم العام، والارتقاء بمستوى الممارسات المهنية التعليمية إلى مستوى الاحتراف. بناء منظومة للتطوير المهني التعليمي في قطاع التعليم العام ذات كفاية وفاعلية عالية، ودعم تطبيقها. تنظيم عمليات التطوير المهني التعليمي وبرامجه، وضبط جودته بما يضمن كفايته وفاعليته في القطاع التعليمي. تعزيز التنمية المهنية المستدامة في القطاع التعليمي من خلال بناء مسارات مهنية وأوعية تطوير مهني متنوعة. إعداد قيادات تعليمية من خلال الكشف عنها واستقطابها وتأهيلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يقوم المعهد بكل ما يلزم في سبيل تحقيق أهدافه، ومن ذلك ما يأتي: وضع سياسات ومواصفات وإجراءات تكفل جودة التطوير المهني التعليمي في المؤسسات التعليمية، وصياغة الضوابط التي تكفل تطبيقها. وضع الضوابط المتعلقة بمزاولة مهنة التطوير المهني في القطاعات التعليمية، وصياغتها بما يكفل تطبيقها في مختلف المستويات، وإعداد لوائح تنظم الإشراف الفني عليها. وضع معايير ومواصفات متعلقة بإنشاء مراكز التطوير المهني وتشغيلها في القطاعات التعليمية، وإعداد لوائح تنظم الإشراف الفني على تلك المراكز. تحديد مواصفات وضوابط لبرامج تأهيل ممارسي العمل التعليمي وتطويرهم مهنيًّا، واعتمادها. المراجعة والتقويم الدوري لأداء مراكز التطوير المهني في القطاعات التعليمية, بالتنسيق مع الهيئة. اعتماد برامج تأهيل المعلم غير المنتهية بمؤهل في القطاع التعليمي. اعتماد برامج التطوير المهني غير المنتهية بمؤهل مع الجهات ذات العلاقة، لمختلف ممارسي مهنة التعليم في القطاعات التعليمية. اعتماد برامج تأهيل ممارسي التطوير المهني غير المنتهية بمؤهل في القطاع التعليمي. الترخيص لمقدمي خدمة التطوير المهني في القطاع التعليمي، بالتنسيق
    مع الهيئة. وضع شروط لممارسي صناعة التطوير المهني في القطاع التعليمي بالتنسيق مع الهيئة. القيام بالدراسات والبحوث العلمية المتعلقة بالتطوير المهني في القطاع التعليمي، بالشراكة مع مراكز أبحاث متخصصة. تقديم الاستشارات ذات العلاقة بالتطوير المهني في القطاع التعليمي. تقديم برامج نوعية ذات طبيعة خاصة لممارسي مهنة التعليم والتطوير المهني، والقيادات التعليمية في القطاع التعليمي, وفق الأنظمة المتبعة. تمثيل المملكة في المنظمات والهيئات ذات العلاقة بالتطوير المهني التعليمي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمعهد مجلس إدارة برئاسة الوزير، وعضوية كل من: رئيس المعهد. عضواً ممثل من وزارة المالية. عضواً ممثل من وزارة الخدمة المدنية. عضواً ممثل من وزارة التعليم. عضواً ممثل من معهد الإدارة العامة. عضواً ممثل من المؤسسة العامة للتدريب التقني والمهني. عضواً ممثل من هيئة تقويم التعليم والتدريب. عضواً اثنان من أعضاء هيئة التدريس في الجامعات الحكومية. أعضاء ممثلان من قطاع التعليم والتدريب الأهلي. أعضاء ويجب ألاَّ تقل مراتب ممثلي الأجهزة الحكومية عن (الرابعة عشرة) أو ما يعادلها، ويعين الأعضاء المنصوص عليهم في الفقرتين (8،9) بأمر من رئيس مجلس الوزراء بناء على اقتراح من رئيس المجلس، وفيما عدا رئيس المعهد تكون مدة العضوية في المجلس ثلاث سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للمعهد, ويختص بالإشراف على شؤونه وإدارته وتصريف أموره, ووضع السياسة العامة التي يسير عليها, ويتخذ جميع القرارات اللازمة لتحقيق أغراضه في حدود أحكام التنظيم, وله بصفة خاصة الصلاحيات والاختصاصات الآتية: إقرار سياسات المعهد العامة ورسم توجهاته. إقرار خطة المعهد الاستراتيجية. إقرار هيكل المعهد التنظيمي. الموافقة على إنشاء فروع للمعهد. اعتماد لوائح المعهد الإدارية والمالية بالاتفاق مع وزارة المالية. اعتماد الضوابط المتعلقة بمزاولة التطوير المهني في القطاعات التعليمية المختلفة. اعتماد معايير ومواصفات تتعلق بإنشاء مراكز التطوير المهني في القطاعات التعليمية المختلفة وتشغيلها. اعتماد معايير برامج التطوير المهني التعليمي غير المنتهية بمؤهل. اعتماد لوائح الترخيص لمراكز ومقدمي خدمات التطوير المهني التعليمي. اعتماد لوائح المعهد الداخلية، واللوائح الخاصة بأوجه نشاطه. الموافقة على مشروع ميزانية المعهد، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، ورفع ما يلزم بحسب الإجراءات النظامية. الموافقة على تعيين المراجع الخارجي لتدقيق حسابات المعهد. إقرار المقابل
    المالي للخدمات التي يقدمها المعهد. قبول الهبات والتبرعات والوصايا والأوقاف، وفقاً للأنظمة. اعتماد مؤشرات قياس أداء المعهد. إقرار خطة المعهد السنوية بما يحقق أهدافه وتطلعاته. اعتماد الشراكات الاستراتيجية التي يعقدها المعهد. تشكيل اللجان وتفويضها بما يراه ملائمًا من الصلاحيات لإنجاز المهمات التي تكلف بها. وللمجلس تفويض بعض صلاحياته إلى رئيسه أو إلى من يراه من أعضائه أو من منسوبي المعهد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المعهد برئاسة رئيس المجلس أو من ينيبه من الأعضاء, ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يعقد المجلس اجتماعاته بصفة دورية أربع مرات في العام الدراسي، ولرئيس المجلس دعوته إلى الاجتماع متى ما دعت الحاجة إلى ذلك. يشترط لصحة الاجتماع حضور أغلبية أعضاء المجلس، على الأقل، بمن فيهم رئيس المجلس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل, فإن تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تُثْبَت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع، وأعضاء المجلس الحاضرون. للمجلس أن يدعو من يراه إلى حضور جلساته دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمجلس أمانة عامة، وأمين عام من منسوبي المعهد يعين بقرار من رئيس المجلس، ويمارس المهمات الآتية: إعداد جدول أعمال المجلس. إثبات مداولات المجلس وقرارته في محاضر, وتوقيع الأعضاء عليه. تنفيذ أي مهمة يكلها إليه المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يكون للمعهد رئيس يعين في منصبه ويعفى بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويتولى قيادة المعهد وإدارته نحو تحقيق أهدافه، ويمارس المهمات التي تمكنه من ذلك, وله بوجه خاص ما يأتي: الإشراف على إعداد خطة المعهد الاستراتيجية. اقتراح لوائح المعهد الإدارية والمالية واللوائح الخاصة بأوجه نشاطه، ورفعها إلى المجلس, لاعتمادها. اقتراح الضوابط المتعلقة بمزاولة مهنة التطوير المهني في القطاعات التعليمية المختلفة، ورفعها إلى المجلس؛ لاعتمادها. اقتراح المعايير والمواصفات المتعلقة بإنشاء مراكز التطوير المهني في القطاعات التعليمية المختلفة وتشغيلها، ورفعها إلى المجلس؛ لاعتمادها. اقتراح معايير اعتماد برامج التطوير المهني التعليمي غير المنتهية بمؤهل, ورفعها إلى المجلس؛ لاعتمادها. اقتراح لوائح ترخيص مراكز ومقدمي خدمات التطوير المهني التعليمي, ورفعها إلى المجلس؛ لاعتمادها. الإشراف على إعداد تقرير المعهد السنوي ومشروع ميزانيته وحسابه الختامي؛ وعرضه على المجلس. الإشراف على تقديم خطة مقترحة لأعمال المعهد للعام الجديد. رفع مرئياته واقتراحاته لتطوير المعهد إلى المجلس؛ لإقرارها.
    اقتراح فتح فروع للمعهد داخل المملكة، ورفعها إلى المجلس؛ للموافقة. استقطاب الخبرات وبناء الشراكات التي من شأنها دعم قدرات المعهد. تمثيل المعهد أمام القضاء, ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات، داخل المملكة وخارجها. تنظيم مشاركة المعهد في المؤتمرات والندوات والمعارض المحلية والإقليمية والدولية. تنفيذ أي مهمة يكلها إليه المجلس في مجال اختصاصه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يحق للمعهد تملك الأصول المنقولة والثابتة والتصرف فيها، وفق الأنظمة المتبعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون موارد المعهد من الآتي: المبالغ التي تخصص له في الميزانية العامة للدولة. المقابل المالي للخدمات التي يقدمها. الهبات والتبرعات والوصايا والأوقاف، التي يقبلها المجلس وفقاً للأنظمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع جميع إيرادات المعهد في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يفتح المعهد حساباً له في مؤسسة النقد العربي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويتم الصرف من هذه الحسابات وفق ميزانية المعهد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكون للمعهد ميزانية مستقلة. تكون سنة المعهد المالية هي السنة المالية للدولة. واستثناء من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم, وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يخضع منسوبو المعهد لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: مع عدم الإخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات المعهد ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/113554a2-190a-4afc-957e-ab1000cbe63d/1
  verified: false
