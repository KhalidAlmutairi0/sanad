articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني الموضحة أمام كل منها: النظام: نظام الانضباط الوظيفي. اللائحة: اللائحة التنفيذية للنظام. الوزير: الوزير المختص بشؤون وزارته، أو رئيس الجهة المستقلة، بحسب الأحوال. الهيئة: هيئة الرقابة ومكافحة الفساد. الوظيفة العامة: مهمات واختصاصات مدنية يؤديها الموظف العام لخدمة عامة، يخضع فيها للسلطة الرئاسية في التنظيم الإداري. الموظف العام: من يعمل لدى الدولة، أو لدى أحد الأجهزة ذات الشخصية المعنوية العامة بوظيفة مدنية -بأي صفة كانت- سواء كان يعمل بصورة دائمة أو مؤقتة. المخالفة التأديبية: كل عمل، أو امتناع عن عمل، يصدر عن الموظف، يتضمن خروجًا على الواجبات، أو ارتكابًا للمحظورات الوظيفية المنصوص عليها نظامًا، أو يشكل مساسًا بشرف وكرامة الوظيفة. الجزاء: أي جزاء إداري وارد في النظام. اللجنة: لجنة النظر في المخالفات. حفظ التحقيق: أمر إداري يصدر من سلطة التحقيق بعدم استكماله؛ إذا رأت أنه لا محل للسير فيه. كف اليد: إيقاف الموظف عن تأدية مهمات وظيفته بصفة مؤقتة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف النظام إلى حماية الوظيفة العامة، وضمان سير المرفق العام بانتظام، وحسن أداء الموظف لعمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يسري النظام على جميع الموظفين عدا من يعملون وفقًا لأنظمة ينظم فيها الجزاء بقواعد خاصة؛ فيعاملون وفقًا لتلك القواعد، وفي حدود ما تتضمنه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: لا يجوز إيقاع أي جزاء على الموظف إلَّا بعد التحقيق معه، ومواجهته بالمخالفة المنسوبة إليه، وسماع أقواله، وتحقيق دفاعه، وإثبات ذلك كتابة في محضر. ويكون القرار الصادر بإيقاع الجزاء مسببًا. وتحدد اللائحة كيفية التحقيق، وإجراءاته. لا يجوز شغل وظيفة من صدر في شأنه حكم أو قرار بالفصل من الخدمة؛ بطريق التعيين، أو التعاقد، أو الترقية، أو النقل؛ إلَّا بعد تحصن القرار بفوات مواعيد الطعن عليه أو بعد اكتساب الحكم الصفة النهائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: كل موظف ثبت ارتكابه مخالفة مالية أو إدارية أو مسلكية مما يعد إخلالًا بواجب من واجباته الوظيفية، يطبق عليه الجزاء المنصوص عليه في النظام، وذلك دون إخلال بالحق في رفع دعوى الحق العام، أو دعوى الحق الخاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'الجزاء الذي يجوز إيقاعه على الموظف هو: الإنذار المكتوب. الحسم من الراتب بما لا يتجاوز صافي راتب (ثلاثة) أشهر على ألَّا يتجاوز المحسوم شهريًّا (ثلث) صافي الراتب الشهري. الحرمان من علاوة سنوية واحدة. عدم النظر في ترقيته بما لا يتجاوز سنتين من تاريخ استحقاقه للترقية. الفصل من الخدمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يعفى الموظف من الجزاء إذا ثبت أن ارتكابه المخالفة كان تنفيذًا لأمر صدر من رئيسه، بالرغم من تنبيه الموظف لرئيسه بالمخالفة كتابة أو بأي من الطرق المعتبرة نظامًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: في غير حالتي الوفاة أو العجز الصحي الكلي؛ لا يمنع انتهاء خدمة الموظف من اتخاذ الإجراءات المنصوص عليها في النظام، أو الاستمرار فيها. وفي هذه الحالة يكون الجزاء غرامة لا تزيد على ما يعادل (ثلاثة) أمثال صافي آخر راتب شهري كان يتقاضاه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تشكل لجنة -أو أكثر بحسب الحال- بقرار من الوزير في كل جهة حكومية، تتولى النظر في المخالفات التي يرتكبها الموظفون والتحقيق فيها، وتحدد اللائحة عدد أعضاء كل من اللجان المنصوص عليها في النظام وتشكيلها، وآلية عملها، وإجراءاتها، وطريقة اتخاذ توصياتها، على أن يراعى أن تكون كل لجنة برئاسة متخصص في الأنظمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'مع مراعاة ما نصت عليه كلٌّ من المادتين (الحادية عشرة) و(الثانية عشرة) من النظام: إذا ظهر للجهة ارتكاب موظف لمخالفة، فيحال إلى اللجنة للتحقيق معه للنظر في إيقاع أحد الجزاءات وفقاً للنظام، وترفع توصياتها إلى الوزير، وتعتمد بقرار منه. إذا أوصت اللجنة بإيقاع جزاء الفصل، ورأى الوزير مناسبته، فيحيل توصيتها إلى لجنة يشكلها لهذا الغرض بقرار منه يشارك في عضويتها ممثل من وزارة الموارد البشرية والتنمية الاجتماعية، ويراعى أن تكون هذه اللجنة برئاسة متخصص في الأنظمة؛ للنظر في التوصية بجزاء الفصل ومناسبته، وتعتمد توصياتها بقرار من الوزير، وإذا لم تر اللجنة الأخذ بجزاء الفصل؛ فلها التوصية بإيقاع أي جزاء آخر. يراعى عند اختيار الجزاء أن يكون متناسبًا مع درجة المخالفة، مع الأخذ في الاعتبار السوابق، والظروف المخففة والمشددة، على ألَّا يوقع أكثر من جزاء واحد عن المخالفة نفسها، أو المخالفات المرتبطة بعضها ببعض. لا يحول تطبيق الأحكام الواردة في هذه المادة دون صلاحية الوزير -لأي سبب يقدره- في إحالة أي موظف إلى الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: إذا أوصت اللجنة بإيقاع جزاء الفصل على من يشغل أيًّا من المرتبتين (الرابعة عشرة) و(الخامسة عشرة) أو ما يعادلهما؛ فيحيل الوزير المخالفة المرتكبة من الموظف إلى الهيئة -لاستكمال ما يلزم وفقًا لاختصاصها- لتنظر في إيقاع جزاء الفصل أمام المحكمة المختصة، أو إعادة إحالة المخالفة إلى جهة عمل الموظف، مع اقتراح أي جزاء آخر غير الفصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'أ- مع مراعاة اختصاصات الهيئة -المقررة نظامًا- يحال إليها الآتي: الموظف الذي نسب إليه ارتكاب مخالفة في جهة حكومية غير التي يعمل فيها، أو الذي نقل منها بعد ارتكابه لتلك المخالفة إلى جهة أخرى. الموظفون الذين يتبعون أكثر من جهة حكومية، المنسوب إليهم ارتكاب مخالفة أو مخالفات مرتبط بعضها ببعض. الموظف الذي انتهت خدماته قبل الانتهاء من التحقيق معه، أو قبل البدء في اتخاذ الإجراءات الإدارية ضده. الموظف الذي يرتكب مخالفة أثناء عمله، ثم يتغير مركزه الوظيفي بانتقاله للعمل على نظام وظيفي آخر. الموظف الذي يحيله الوزير وفق الفقرة (4) من المادة (العاشرة) من النظام. وإذا رأت الهيئة توافر أدلة كافية لثبوت المخالفة -في أي من الفقرات السابقة- فترفع دعوى أمام المحكمة المختصة، مع إبلاغ الجهة الحكومية التي يتبعها الموظف بذلك. طلبات الفصل لموظفي المرتبتين (الرابعة عشرة) و(الخامسة عشرة) أو ما يعادلهما وفقًا للمادة (الحادية عشرة) من النظام. وتقوم الهيئة في حال ثبوت المخالفة ورأت إيقاع جزاء الفصل؛ برفع الدعوى أمام المحكمة المختصة، مع إبلاغ الجهة الحكومية التي يتبعها الموظف بذلك. ب- للمحكمة المختصة
    إيقاع أي من الجزاءات المنصوص عليها في النظام في الدعاوى التي ترفعها إليها الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تزود الهيئة وزارة الموارد البشرية والتنمية الاجتماعية والجهة الحكومية التي يتبع لها الموظف -إن كان لا يزال موظفًا حكوميًّا- بصورة من الحكم النهائي الصادر بحقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: إذا صدر على الموظف حكم قضائي نهائي في دعوى جزائية بعقوبة غير موجبة للفصل بقوة النظام؛ فلجهة عمله إذا رأت أن ارتكابه للفعل يمثل إخلالًا بواجبات وظيفته، أن تحيل الموظف إلى اللجنة؛ لاستكمال الإجراءات اللازمة بشأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: للهيئة -في الحالات التي تنظرها- أن تحفظ التحقيق، أو أن تقترح الجزاء المناسب على الموظف، مع بيان الأفعال المنسوبة إليه على وجه التحديد، وتحيل المعاملة إلى جهته الإدارية؛ لإصدار قرار الجزاء بذلك وفق ما تراه الجهة الإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تزود الجهة الحكومية المختصة وزارة الموارد البشرية والتنمية الاجتماعية، والهيئة، والديوان العام للمحاسبة، والموظف صاحب الشأن؛ بصورة من القرار الصادر عنها بإيقاع الجزاء ضده، وتحدد اللائحة إجراءات ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تصدر الجهة الحكومية، أو الهيئة، أو المحكمة المختصة -كل بحسب اختصاصه وبما تقتضيه مصلحة العمل، أو التحقيق، أو المحاكمة- قرار كفِّ يد الموظف لمدة (أو مدد) لا تتجاوز سنتين. إذا كان الموظف مكفوف اليد لارتكابه مخالفة أو في حكم مكفوف اليد، أو الموقوف احتياطيًّا، وصدر بحقه قرار بالفصل بسببها؛ فتعد خدمته منتهية من تاريخ كفِّ يده أو توقيفه احتياطيًّا، أيهما أسبق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: على جهة الضبط إبلاغ الجهة الحكومية التي يعمل بها الموظف الموقوف احتياطيًّا لاتهامه بارتكاب جريمة، وذلك فور إيقافه من قبل جهة الضبط. على الجهة الحكومية التي يعمل بها الموظف الموقوف احتياطيًّا، تمكينه من العمل عند إخلاء سبيله، ما لم تتطلب مصلحة العمل أو التحقيق أو المحاكمة كف يده وفقًا للنظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: في الأحوال التي يتقرر فيها إحالة الموظف إلى التحقيق، أو المحاكمة جنائيًّا، في مخالفة بوشرت فيها إجراءات إدارية أو في مخالفات مرتبطة بها؛ توقف الإجراءات الإدارية عن المخالفة نفسها، وعن المخالفات المرتبطة بها، إلى أن تنتهي إجراءات التحقيق أو المحاكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'تسقط المخالفة أو الدعوى -بحسب الحال- في الحالات الآتية: الوفاة. العجز الصحي الكلي الذي تتعذر معه مساءلة الموظف، المثبت بتقرير طبي من الهيئة الطبية العامة. مضي سنتين من تاريخ اكتشاف وقوع المخالفة دون اتخاذ أي من إجراءات التحقيق أو المحاكمة، أو مضي سنتين من تاريخ اتخاذ آخر إجراء. وإذا تعدد المتهمون فإن انقطاع المدة تجاه أحدهم يترتب عليه انقطاعها تجاه الآخرين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: مع مراعاة ما تقضي به الأنظمة الأخرى، تمحا الجزاءات التأديبية الموقعة على الموظف بعد مضي سنتين من تاريخ صدورها، ما لم يصدر في حقه جزاء آخر خلال تلك المدة. وفي هذه الحالة تحسب المدة من تاريخ صدور قرار الجزاء الأخير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يجوز للوزير -بقرار مكتوب- تفويض من يراه من منسوبي الجهة، ببعض صلاحياته المقررة في النظام، عدا إيقاع جزاء الفصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تعد وزارة الموارد البشرية والتنمية الاجتماعية -بالتنسيق مع الهيئة وديوان المظالم- اللائحة، وتصدر بقرار من وزير الموارد البشرية والتنمية الاجتماعية خلال (تسعين) يومًا من تاريخ نشر النظام، ويعمل بها عند نفاذ النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يلغي النظام المواد من (31) إلى (46) والمادة (48)، من نظام تأديب الموظفين، الصادر بالمرسوم الملكي رقم (م / 7) وتاريخ 1 / 2 / 1391ه، وكل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يعمل بالنظام بعد (مائة وثمانين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/896f4986-334b-4c76-b938-ada500eae2eb/1
  verified: false
