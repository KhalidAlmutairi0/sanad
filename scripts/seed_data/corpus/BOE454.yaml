articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية- أينما وردت في هذا التنظيم- المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك: المركز: المركز السعودي لسلامة المرضى. المجلس: المجلس الصحي السعودي. مجلس الإدارة: مجلس إدارة المركز. الرئيس: رئيس مجلس الإدارة. المدير العام: مدير عام المركز. المنشآت الصحية: المرافق الصحية الحكومية أو الخاصة التي تقدم خدمات الرعاية الصحية، وتشمل: (المستشفيات، ومراكز الرعاية الصحية الأولية، والمجمعات الطبية العامة والمتخصصة، والعيادات، ومراكز الأشعة، والمختبرات الطبية، ومراكز جراحة اليوم الواحد، ومراكز الخدمات الصحية المساندة، ومراكز خدمات النقل الإسعافي). سلامة المرضى: وقاية المرضى من الضرر. الأحداث العارضة: أي حدث سلبي غير مقصود يحدث خلال تقديم الرعاية الصحية، قد ينتج منه ضرر جسدي أو نفسي دائم للمريض. الأحداث الجسيمة: أي حدث عارض أدى إلى وفاة المريض، أو فقد أحد أعضائه أو فقد منفعته، أو إلى ضرر جسدي أو نفسي دائم للمريض. الأخطاء الطبية: الأخطاء التي تحدث أثناء تقديم الرعاية الصحية نتيجة فعل، أو عدم القيام بفعل واجب من قبل الممارس الصحي أو المنشأة الصحية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يرتبط المركز تنظيمياً برئيس المجلس، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى رفع مستوى الوعي والمعرفة في مجال سلامة المرضى، وتعزيز أفضل الممارسات لجميع الممارسين الصحيين والمنشآت الصحية في المملكة ذات الصلة بهذا المجال. وله في سبيل ذلك -دون حصر- القيام بالمهمات والاختصاصات الآتية: وضع الاستراتيجية الوطنية لسلامة المرضى، ورفعها؛ لاستكمال الإجراءات النظامية اللازمة في شأنها. إصدار أفضل المعايير والممارسات والنماذج في مجال سلامة المرضى ليطبقها الممارسون الصحيون والمنشآت الصحية. إنشاء منصة إلكترونية موحدة لرصد الأخطاء الطبية والأضرار المترتبة على تقديم خدمات الرعاية الصحية ومتابعتها على المستوى الوطني، وتحليلها ودراستها ووضع الحلول المناسبة لتعزيز سلامة وأمان المرضى والزوار والعاملين في المنشآت الصحية، وتمكينهم من الإبلاغ عن تلك الأخطاء. إقرار آلية الإبلاغ عن الأحداث العارضة والأحداث الجسيمة والأخطاء الطبية التي تطرأ في المنشآت الصحية وعن كل ما يخص سلامة المرضى، والرقابة على تطبيقها؛ لضمان التعامل مع تلك الأحداث والأخطاء والحد من آثارها. وضع سياسات وأدلة استرشادية متعلقة بمجال سلامة المرضى. إجراء مسوحات ودراسات وأبحاث علمية وميدانية
    متعلقة بسلامة المرضى. توعية المرضى وذويهم في شأن سلامة المرضى وبث الثقة بين المرضى ومقدمي الرعاية الصحية من خلال جميع الوسائل المتاحة. التعاون وتبادل الخبرات مع المنظمات والمؤسسات المحلية والإقليمية والدولية ذات العلاقة بسلامة المرضى، وعقد الاتفاقيات والشراكات المتعلقة بذلك بما يحقق أهداف المركز. تمثيل المملكة خارجياً فيما يتعلق بسلامة المرضى، وفقاً للإجراءات النظامية المتبعة. تحديد مؤشرات قياس الأداء المتعلقة بسلامة المرضى ومتابعتها، والمشاركة مع الخبراء والمختصين لتحسينها وتطويرها؛ لتتوافق مع متطلبات تحقيق سلامة المرضى ومقدمي خدمات الرعاية الصحية. التنسيق بين المنشآت الصحية والمرضى وذويهم فيما يخص المبادرات المتعلقة بسلامة المرضى. تنظيم المؤتمرات والندوات في مجال سلامة المرضى، وفقاً للإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون للمركز مجلس إدارة برئاسة رئيس المجلس، وعضوية عدد لا يقل عن (خمسة) من الخبراء والمختصين بسلامة المرضى، يعينون بأمر من رئيس مجلس الوزراء بناءً على اقتراح من الرئيس، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد مرة واحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى مجلس الإدارة الإشراف على إدارة شؤون المركز وتصريف أموره، ويتخذ جميع القرارات اللازمة لتحقيق أهدافه في حدود ما تضمنه هذا التنظيم، وله على وجه خاص ما يأتي: وضع السياسات والخطط التي يسير عليها المركز لتحقيق أهدافه، والبرامج اللازمة لذلك، والإشراف على تنفيذها. اقتراح مشروعات الأنظمة المتعلقة بسلامة المرضى، واقتراح تعديل المعمول به منها، ورفعها إلى المجلس تمهيداً لاستكمال الإجراءات النظامية اللازمة في شأنها اقتراح الاستراتيجية الوطنية لسلامة المرضى، ورفعها إلى المجلس تمهيداً لاستكمال الإجراءات النظامية اللازمة في شأنها، والإشراف على تنفيذها بعد اعتمادها. الموافقة على آلية الإبلاغ عن الأحداث العارضة والأحداث الجسيمة والأخطاء الطبية التي تطرأ في المنشآت الصحية وعن كل ما يخص سلامة المرضى، والرقابة على تطبيقها. الموافقة على إنشاء فروع أو مكاتب للمركز داخل المملكة. إقرار اللوائح المالية التي يسير عليها المركز، بالاتفاق مع وزارة المالية. إقرار اللوائح الإدارية المنظمة لشؤون منسوبي المركز، بالاتفاق مع وزارة المالية فيما يتعلق بالأحكام ذات الأثر المالي الواردة فيها. إقرار اللوائح
    الداخلية الأخرى التي يسير عليها المركز. تحديد المقابل المالي للخدمات والأعمال التي يقدمها المركز والتي يرى مجلس الإدارة استحصال مقابل مالي عنها. اقتراح مخصص مالي للمركز ورفعه إلى المجلس؛ لاستكمال ما يلزم في شأن اعتماده. النظر في التقارير الدورية عن سير العمل في المركز واتخاذ القرارات اللازمة في شأنها. الموافقة على إبرام الاتفاقات والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف وفقاً للأحكام المنظمة لذلك. ولمجلس الإدارة - في سبيل تحقيق هذه الاختصاصات - تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المعهود بها إليها. .ولمجلس الإدارة - كذلك - تفويض بعض اختصاصاته إلى الرئيس أو إلى من يراه من أعضائه أو منسوبي المركز'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعقد مجلس الإدارة اجتماعاته في مقر المركز، وله -عند الاقتضاء- أن يعقدها في مكان آخر داخل المملكة. يجتمع مجلس الإدارة مرة على الأقل كل (ثلاثة) أشهر بناءً على دعوة من الرئيس، وكلما دعت الحاجة، أو إذا طلب ذلك - كتابة - (ثلاثة) من أعضائه على الأقل. يكون اجتماع مجلس الإدارة صحيحاً إذا حضره أغلبية الأعضاء على الأقل، على أن يكون من بينهم الرئيس أو من ينيبه من الأعضاء في حال غيابه. وتصدر قرارات مجلس الإدارة بأغلبية أصوات الحاضرين. وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات مجلس الإدارة وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل الاعتراض وأسبابه ضمن محضر اجتماع مجلس الإدارة. لا يجوز للعضو أن يفشي شيئاً من أسرار المركز. لمجلس الإدارة دعوة من يرى الاستعانة بهم من المختصين والمستشارين إلى حضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للمركز مدير عام متفرغ، يتم اختياره بقرار من مجلس الإدارة، لا تقل مرتبته عن (الرابعة عشرة) أو ما يعادلها، ويتولى المدير العام إدارة المركز وتصريف شؤونه، وفقاً للاختصاصات والصلاحيات المنصوص عليها في هذا التنظيم وما يقرره مجلس الإدارة، وله على وجه خاص ما يأتي: اقتراح سياسات المركز وخططه وبرامجه، والإشراف على تنفيذها بعد موافقة مجلس الإدارة عليها. اقتراح اللوائح الإدارية والمالية وغيرها من اللوائح الداخلية التي يسير عليها المركز، ورفعها إلى مجلس الإدارة. اقتراح المقابل المالي الذي يتقاضاه المركز عن الأعمال والخدمات التي يقدمها ضمن اختصاصه، ورفعه إلى مجلس الإدارة. الإشراف الإداري والمالي على المركز والعاملين فيه، وفقاً للصلاحيات الممنوحة له باللوائح المعتمدة. اقتراح إنشاء فروع أو مكاتب للمركز داخل المملكة، ورفعه إلى مجلس الإدارة. إعداد مقترح مخصص مالي للمركز، ورفعه إلى مجلس الإدارة. إعداد آلية للإبلاغ عن الأحداث العارضة والأحداث الجسيمة والأخطاء الطبية التي تطرأ في المنشآت الصحية وعن كل ما يخص سلامة المرضى، ورفعها إلى مجلس الإدارة. تشكيل اللجان الفنية والإدارية اللازمة
    لتسيير أعمال المركز. متابعة تنفيذ توصيات اللجنة الاستشارية العلمية المنصوص عليها في المادة (الثامنة) من هذا التنظيم. تمثيل المركز أمام الجهات الحكومية والمؤسسات ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وأمام القضاء. وله تفويض غيره بذلك. رفع تقرير سنوي عن سير أعمال المركز ومنجزاته ونشاطاته وما يراه من مقترحات إلى مجلس الإدارة. مباشرة ما يخوله به مجلس الإدارة من مهمات وصلاحيات متصلة بعمل المركز. وللمدير العام تفويض بعض اختصاصاته إلى غيره من المسؤولين في المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تشكل بقرار من الرئيس (لجنة استشارية علمية) للمركز؛ برئاسة المدير العام وعضوية عدد من ذوي الاختصاصات الاستشارية العلمية من القطاعات الصحية الحكومية والقطاع الصحي الخاص في المملكة في مجال سلامة المرضى، يرشحهم مجلس الإدارة، وتتولى اللجنة المهمات والاختصاصات الآتية: مراجعة السياسات العامة والاستراتيجيات والخطط التي يقترحها المركز في مجال سلامة المرضى، ووضعها في برامج تنفيذية محددة. تقديم التوصيات والمشورة العلمية للمركز في مجال سلامة المرضى. مراجعة وتقويم البرامج والنشاطات الخاصة بسلامة المرضى لدى المنشآت الصحية، ورفع التوصيات في شأنها إلى مجلس الإدارة. الاطلاع على تقارير الإحصاءات الصحية ذات العلاقة بسلامة المرضى من قواعد بيانات المركز وغيره من الجهات ذات العلاقة بالخدمات الصحية، ورفع التوصيات في شأنها إلى مجلس الإدارة. مراجعة وتقويم نتائج الأبحاث والدراسات العلمية التي يجريها المركز، وتحديد آليات الاستفادة منها. أي مهمة علمية أخرى يكلفها بها الرئيس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تعقد اللجنة الاستشارية العلمية اجتماعاتها في مقر المركز، ولها -عند الاقتضاء- أن تعقدها في مكان آخر داخل المملكة. تجتمع اللجنة الاستشارية العلمية مرة على الأقل كل (ثلاثة) أشهر بناءً على دعوة من رئيسها، ولرئيس اللجنة دعوتها إلى الاجتماع متى دعت الحاجة إلى ذلك. يكون اجتماع اللجنة الاستشارية العلمية صحيحاً إذا حضره ثلثا أعضائها على الأقل، على أن يكون من بينهم رئيسها أو من ينيبه من الأعضاء في حال غيابه. وتصدر قرارات اللجنة بأغلبية أصوات الحاضرين. وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. لرئيس اللجنة الاستشارية العلمية دعوة من يرى الاستعانة بهم من المختصين والمستشارين إلى حضور اجتماعاتها، دون أن يكون لهم حق التصويت. تثبت مداولات اجتماعات اللجنة الاستشارية العلمية وتوصياتها في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون تمهيداً لاعتمادها من مجلس الإدارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يكون للمركز مخصص مالي ضمن ميزانية المجلس. تتكون موارد المركز من الآتي: أ - ما يخصص له من اعتماد ضمن ميزانية المجلس. ب- المقابل المالي الذي يتقاضاه عن الأعمال والخدمات التي يقدمها ضمن اختصاصه، وفقاً لما يقرره مجلس الإدارة. ج - ما يقبله مجلس الإدارة من هبات وتبرعات ومنح ووصايا، وعائدات أوقافه، وفقاً للأحكام المنظمة لذلك. د - أي مورد آخر يقره مجلس الإدارة، بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. يعامل المركز من حيث الرقابة المالية معاملة المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: السنة المالية للمركز هي السنة المالية للدولة. واستثناءً من ذلك، تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يخضع جميع منسوبي المركز - فيما عدا المدير العام - لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ينشر هذا التنطيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/47160380-97d9-47de-a08e-ac5f00cc3875/1
  verified: false
