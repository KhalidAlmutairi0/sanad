articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والكلمات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها ما لم يقتضِ سياق النص غير ذلك: التنظيم: تنظيم الهيئة السعودية لتسويق الاستثمار. الوزارة: وزارة الاستثمار. الوزير: وزير الاستثمار. الهيئة: الهيئة السعودية لتسويق الاستثمار. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. تسويق الاستثمار: مجموعة من الأعمال التي تتصل بتشجيع المستثمرين على الاستثمار وتوسيع استثماراتهم في فرص ومشروعات استثمارية في المملكة، والترويج لها داخل المملكة وخارجها، ومن ذلك: التواصل مع المستثمرين، وإقامة الفعاليات والأنشطة والمعارض والمنتديات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة وخارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى إبراز المملكة وجهةً استثمارية عالميًّا ومحليًّا، وتسويق الفرص الاستثمارية في كافة القطاعات بجميع مكوناتها، وتعزيز الأعمال والخدمات ذات الصلة بتسويق الاستثمار؛ في ضوء السياسات العامة للاستثمار وخططها التنفيذية التي تعدها الوزارة. ولها -دون إخلال باختصاصات ومسؤوليات الجهات الأخرى- القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: إعداد السياسات العامة المتعلقة بنشاطها، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنها. إعداد الاستراتيجية الخاصة بتسويق الاستثمار، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنها. مباشرة الأعمال ذات الصلة بتسويق الاستثمار داخل المملكة وخارجها؛ للتعريف بمزايا الاستثمار في المملكة وفرصه وحوافزه. وللهيئة أن تسند مباشرة أيًّا من الأعمال الآنف ذكرها للجهة المعنية بموضوع تسويق الاستثمار. إدارة الهوية الوطنية الموحدة لتسويق الاستثمارات وجذبها إلى المملكة، وتفعيلها بالتنسيق مع الوزارة والجهات المعنية؛ من أجل توحيد الرسائل والمحتوى وتنسيق الجهود التسويقية والإعلامية للاستثمار.
    اقتراح تعديل الأنظمة ذات العلاقة باختصاصاتها، ورفعه لاستكمال الإجراءات النظامية في شأنه. دعم أنشطة تسويق الاستثمار التي تقوم بها الوزارات والجهات المعنية ومنظومة القطاع الخاص. وضع الخطط الإعلامية الداعمة لتسويق الاستثمار، وتنفيذها داخل المملكة وخارجها. عقد وتنظيم الملتقيات والمؤتمرات والمنتديات والمعارض لتسويق الاستثمار، داخل المملكة وخارجها، والمشاركة فيها بأي وسيلة ترى مناسبتها. المشاركة مع الوزارة في تحديد المؤشرات التي تقيس أداء تسويق الاستثمار. الاستعانة بذوي الاختصاص والخبراء من الشركات والمؤسسات المحلية والعالمية المتميزة لتقديم منتجات وأدوات احترافية والاستفادة من خبراتها في مجالات اختصاصها. تشجيع الشراكات المحققة لأهداف التنمية بين المستثمر المحلي والمستثمر الأجنبي. إصدار الموافقات اللازمة لإقامة الجهات الحكومية للمعارض والمنتديات والمؤتمرات في مجال تسويق الاستثمار. العمل على استقطاب المؤتمرات الدولية ذات العلاقة بتسويق الاستثمار، والمساهمة في تطوير المؤتمرات المحلية، ودعمها، واستحداث مبادرات جديدة في سبيل ذلك، وفقًا للإجراءات النظامية. التعاون وتبادل الخبرات مع الجهات الحكومية
    والهيئات والمنظمات الإقليمية والدولية والهيئات المماثلة في الدول الأخرى، في حدود اختصاصاتها. تقديم الدعم لبرامج ومبادرات الوزارة المتعلقة بتسويق الاستثمار خارج المملكة. جمع وحصر ومتابعة ما تتلقاه من مرئيات المستثمرين وتحدياتهم، وتزويد الوزارة بها لمعالجتها. الاشتراك في المنظمات والجمعيات الدولية فيما يتعلق باختصاصاتها؛ وفقًا للإجراءات النظامية. تمثيل المملكة في المحافل والمعارض الدولية ذات الصلة باختصاصاتها. إعداد الدراسات والأبحاث ذات الصلة بتسويق الاستثمار، وإصدار التقارير الدورية والمتخصصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: ممثل من وزارة الاستثمار. ممثلين لجهات حكومية لا يزيد عددهم على (أربعة)، وتحدد تلك الجهات بأمر من رئيس مجلس الوزراء بناءً على اقتراح من الرئيس. ممثلين من ذوي الخبرة والاختصاص في مجالات عمل الهيئة لا يزيد عددهم على (ثلاثة)، يصدر بتسميتهم أمر من رئيس مجلس الوزراء بناءً على ترشيح من الرئيس. لا تقل مرتبة ممثلي الجهات الحكومية في المجلس المشار إليه في الفقرتين (1) و(2) من هذه المادة، عن (الخامسة عشرة) أو ما يعادلها. وتكون مدة العضوية في المجلس (ثلاث) سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يعد المجلس السلطة العليا للهيئة، ويتولى الإشراف على إدارة الهيئة، وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنه التنظيم، وله على وجه خاص ما يأتي: إقرار السياسات العامة المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنها. اعتماد الاستراتيجية الخاصة بتسويق الاستثمار، والرفع عما يستلزم استكمال إجراءات في شأنها. اقتراح تعديل الأنظمة ذات العلاقة باختصاصات الهيئة، والرفع عنه لاستكمال الإجراءات النظامية في شأنه. إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية. إقرار اللوائح الداخلية، وغيرها من اللوائح اللازمة لتسيير عمل الهيئة. إقرار الهيكل والدليل التنظيمي للهيئة. الموافقة على إنشاء فروع ومكاتب للهيئة داخل المملكة وخارجها. تحديد المقابل المالي للأعمال والخدمات التي تقدمها الهيئة. الموافقة على مشروع الميزانية السنوية للهيئة، وحسابها الختامي، وتقريرها السنوي؛ تمهيدًا لاعتمادها وفق
    الإجراءات النظامية. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات والعقود، وفق الإجراءات النظامية. قبول الهبات والتبرعات والمنح والوصايا والأوقاف؛ وفقًا للأحكام المنظمة لذلك. النظر في التقارير الدورية التي تقدم له عن سير أعمال الهيئة. الموافقة على اشتراك الهيئة في المنظمات والجمعيات الدولية المتخصصة؛ وفقًا للإجراءات النظامية. وللمجلس -في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم، يَكِل إليها ما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها. وللجان الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض اختصاصاته إلى الرئيس، أو من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع المجلس دوريًّا (مرتين) -على الأقل- في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وتكون اجتماعاته برئاسة الرئيس أو من ينيبه من الأعضاء من ممثلي الجهات الحكومية في المجلس. ويوجه الدعوةَ للاجتماع الرئيسُ أو من ينيبه، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته وتوصياته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. للمجلس دعوة من يراه لحضور اجتماعاته للاستفادة من معلوماتهم وخبراتهم، دون أن يكون لهم حق التصويت. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. تعقد اجتماعات المجلس في مقر الهيئة. ويجوز عند الحاجة عقدها في مكان آخر. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة ووفقًا لما يقدره الرئيس- أن يصدر قرارًا أو توصية بالتمرير، ويوقع عليها بما يفيد باطّلاع جميع الأعضاء عليها.
    ولا تعدّ التوصيات والقرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرر على جميع أعضاء المجلس، ويصوتوا عليها، وتحُز على أغلبية أصواتهم على الأقل. يجوز -عند الحاجة وفي الحالات المستعجلة ووفقًا لما يقدره الرئيس- عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية. يضع المجلس القواعد والإجراءات المنظمة لعقد اجتماعاته عن بعد، بما في ذلك تحديد إجراءات الدعوة للاجتماعات وكيفية انعقادها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يُعيَّن ويعفى من منصبه بقرار من المجلس بناءً على ترشيح من الرئيس، ويعد المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود التنظيم وما يقرره المجلس، ويتولى الاختصاصات الآتية: الإشراف على إعداد السياسات العامة المتعلقة بنشاط الهيئة، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس. الإشراف على إعداد الاستراتيجية الخاصة بتسويق الاستثمار، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس. الإشراف على سير العمل في الهيئة من خلال الأنظمة واللوائح والخطط والبرامج المعتمدة. التعاقد مع الخبراء والمستشارين وبيوت الخبرة بما يخدم أهداف الهيئة واختصاصاتها، وفقًا لما تحدده لوائح الهيئة، والإجراءات النظامية المتبعة. الإشراف على إعداد اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية اللازمة لتسيير العمل في الهيئة؛ تمهيدًا لرفعها إلى المجلس للموافقة عليها. اقتراح الهيكل والدليل التنظيميين للهيئة، ورفعهما إلى المجلس. اقتراح الخطط لتطوير نشاط تسويق الاستثمار في المملكة. الإشراف على إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها،
    وعرضها على المجلس. الإشراف على إعداد تقرير الهيئة السنوي ومشروع ميزانيتها وحسابها الختامي، ورفعها إلى المجلس للموافقة عليها؛ تمهيدًا لاستكمال الإجراءات النظامية اللازمة في شأنها. التوقيع على الاتفاقيات والعقود -ذات الصلة باختصاصات الهيئة- بعد موافقة المجلس، ووفقًا للإجراءات النظامية المتبعة. تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والمؤسسات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره في ذلك. الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية؛ وفقًا للأنظمة واللوائح التي يقرها المجلس، وفي حدود الصلاحيات التي فوضه بها المجلس. التعاقد لتنفيذ الأعمال والخدمات وغيرها؛ وفقًا للأنظمة والصلاحيات التي فوضه بها المجلس. اقتراح إنشاء فروع أو مكاتب للهيئة داخل المملكة وخارجها. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في التنظيم واللوائح الصادرة بناءً عليها والقواعد والإجراءات المعتمدة، بحسب الصلاحيات المخولة له. اعتماد إجراءات العمل المبنية على اللوائح والقرارات الصادرة عن المجلس. تعيين منسوبي الهيئة، والإشراف عليهم، وفقًا للوائح المنظمة لذلك. أي اختصاص
    آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يسري على منسوبي الهيئة نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع أوقاف. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. يُفتح للهيئة حساب في البنك المركزي السعودي، ويجوز أن يُفتح لها حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويُصرف من هذه الحسابات وفق ميزانيتها المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء، خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، تقريرًا سنويًّا عما حققته من إنجازات خلال السنة المنقضية، وما واجهته من صعوبات، وما تراه من مقترحات لتحسين سير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاصات الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يُعمل بالتنظيم من تاريخ الموافقة عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/43151145-3b31-47d1-8a6c-b2db00a871d0/1
  verified: false
