articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: الهيئة: هيئة المحتوى المحلي والمشتريات الحكومية. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. المحتوى المحلي: إجمالي الإنفاق في المملكة العربية السعودية من خلال مشاركة العناصر السعودية في القوى العاملة والسلع والخدمات والأصول والتقنية ونحوها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الشؤون الاقتصادية والتنمية، ويكون مقرها الرئيس في مدينة الرياض، ولها -بحسب الحاجة وبقرار من المجلس- إنشاء فروع أو مكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنمية المحتوى المحلي بجميع مكوناته على مستوى الاقتصاد الوطني، والارتقاء بالمشتريات الحكومية ومتابعتها؛ لتحقيق الأهداف التنموية والمالية بحسب الرؤى والاستراتيجيات والخطط الوطنية، ووفقًا للأنظمة واللوائح والتعليمات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة -دون إخلال باختصاصات ومسؤوليات الجهات الأخرى، وبالإضافة إلى ما يُسند إليها بناءً على الأنظمة والتنظيمات الأخرى- القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك -على سبيل المثال لا الحصر- ما يأتي: وضع السياسات والاستراتيجيات والخطط والبرامج ذات الصلة بتنمية المحتوى المحـلي والمساهمة في الارتقاء بالمشتريات الحكومية، وذلك بالتنسيق مع الجهات الحكومية ذات العلاقة، واستكمال ما يلزم في شأنها. اقتراح مشروعات الأنظمة والتنظيمات ذات الصلة بتنمية المحتوى المحـلي والارتقاء بالمشتريات الحكومية، واقتراح تعديل القائم منها، والرفع لاستكمال الإجراءات النظامية في شأنها. وضع معايير ومؤشرات قياس المحتوى المحـلي وآلية احتسابه ومساهمة المشتريات الحكومية في تحقيق الأهداف التنموية والمالية، ونشرها. وضع متطلبات ومستهدفات المحتوى المحـلي فيما يخص مشتريات الجهات الحكومية وعقودها واتفاقاتها بالاتفاق مع هيئة كفاءة الإنفاق والمشروعات الحكومية، ومتابعة أداء تلك الجهات في سبيل تحقيق ذلك وفقًا للأحكام النظامية ذات الصلة. وضع القواعد والتعليمات الخاصة بآلية احتساب واعتماد نسب المحتوى المحلي في
    منشآت القطاع الخاص. إصدار شهادات بنسب المحتوى المحلي المعتمدة لمنشآت القطاع الخاص. تأهيل مكاتب المراجعة المرخصة؛ لتدقيق نسب المحتوى المحلي في منشآت القطاع الخاص. تحديد النشاطات ذات المكاسب العالية لتنمية المحتوى المحلي، والتنسيق مع الجهات الحكومية التي ترخص لممارسة تلك النشاطات؛ للتحقق من وضع متطلبات ومستهدفات المحتوى المحلي عليها، بما يتفق مع الأنظمة المعمول بها. حساب المحتوى المحلي ووضع مستهدفاته على مستوى القطاعات الاقتصادية في المملكة، ومتابعتها وتحديثها بالتنسيق مع الجهات ذات العلاقة. متابعة تنفيذ الجهات الحكومية والشركات التي تملك الدولة فيها نسبة (51 %) فأكثر؛ لمتطلبات المحتوى المحلي، وفقًا للأحكام المنظمة لذلك. الإسهام في تطوير أعمال المشتريات الحكومية وإجراءاتها بما يحقق مستهدفات المحتوى المحلي وتحسين عملية الشراء الحكومي، وفقًا للأحكام النظامية ذات الصلة. الاشتراك في تحديد المشتريات الحكومية التي تحتاج إليها أكثر من جهة حكومية، ومتابعة إجراءات التعاقد والتنفيذ للعقود والاتفاقيات التي تبرمها الجهة المختصة بالشراء الموحد؛ على أن يكون إعدادها وفق العناصر والمرتكزات والمعايير التي
    تضعها الهيئة ودون إخلال بما ورد في الفقرة (4) من هذه المادة. الإسهام في إعداد متطلبات المحتوى المحـلي في مشروعات التخصيص بالتنسيق مع الجهات المعنية، بما يكفل الالتزام بتلك المتطلبات؛ تمهيدًا لاتخاذ ما يلزم في شأنها. تشجيع القطـاع الخـاص على المساهمة في تنمية المحتوى المحـلي. وللهيئة وضع المحفزات والبرامج التي تساهم في تحقيق ذلك. تطوير الأدوات والمنهجيات والبرامج اللازمة لتمكين الجهات الحكومية ورفع قدراتها والإسهام في تدريب الكوادر الوطنية فيما يتعلق بتنمية المحتوى المحلي والارتقاء بالمشتريات الحكومية بالتنسيق مع الجهات ذات العلاقة. دراسة سياسات وطرق وآليات الإنفاق الرأسمالي والتشغيلي في الجهات الحكومية؛ لتحديد فرص تنمية المحتوى المحلي وتعظيم الفائدة من المشتريات الحكومية. إدارة ما يتصل بالعقود التي تكون جهة الإدارة طرفًا فيها ضمن برنامج التوازن الاقتصادي، وتطويرها، والإشراف على تنفيذها، والتفاوض مع الجهات والشركات الأجنبية لنقل التقنية وتنمية المحتوى المحلي في إطار البرنامج، ووضع القواعد والإجراءات المتعلقة بذلك. إعداد الدراسات والبحوث والتقارير ذات الصلة بالمحتوى المحـلي، والتعاون في
    شأن تلك الدراسات والبحوث والتقارير مع الجهات المختصة فيما يتصل بالمشتريات الحكومية. العمل مع وزارة المالية -بالتنسيق مع الجهات الحكومية ذات العلاقة- لوضع قاعدة معلومات للموردين والمصنعين، وتحديثها، بما يخدم أهداف الهيئة. التعاون وتبادل الخبرات مع الهيئات والمنظمات الإقليمية والدولية، والجهات المماثلة في الدول الأخرى، وبيوت الخبرة المتخصصة، وذلك في حدود اختصاصات الهيئة، ووفقًا للإجراءات النظامية المتبعة. تمثيل المملكة أو المشاركة في تمثيلها لدى الهيئات والمنظمات والفعاليات الإقليمية والدولية ذات العلاقة باختصاصات الهيئة، وذلك وفقًا للإجراءات النظامية المتبعة. اقتراح المبادرات الخاصة بتنمية المحتوى المحلي والجهات المسؤولة عن تنفيذها، والرفع عن ذلك لاستكمال الإجراءات النظامية في شأنها. نشر الثقافة حول مفاهيم المحتوى المحلي والأعمال ذات الصلة به، وتوعية الجهات الحكومية والقطاع الخاص والأفراد، وذلك عبر التواصل مع وسائل الإعلام المختلفة، والنشر عبر الوسائط المختلفة، والمشاركة في الأنشطة العامة. إقامة المعارض والمؤتمرات وجلسات العمل ذات الصلة بالمحتوى المحـلي، والتعاون في شأن تلك المعارض والمؤتمرات
    والجلسات مع الجهات المختصة فيما يتصل بالمشتريات الحكومية، وفقًا للإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة يشكّل من رئيس يعين بأمر ملكي، وعضوية كل من: أ- عدد لا يقل عن (خمسة) أعضاء يمثلون جهات حكومية ذات علاقة بعمل الهيئة، لا تقل مرتبة أي منهم عن المرتبة (الممتازة) أو ما يعادلها، وتكون عضويتهم لمدة (ثلاث) سنوات قابلة للتجديد. ب- (ثلاثة) من المتخصصين ومن ذوي الخبرة في المجالات ذات العلاقة بعمل الهيئة، وتكون مدة عضوية كل منهم (ثلاث) سنوات قابلة للتجديد مرة واحدة. ج- الرئيس التنفيذي. يصدر بتحديد الجهات المشار إليها في الفقرة الفرعية (أ) من الفقرة (1) من هذه المادة، وتعيين الأعضاء المشار إليهم في الفقرة الفرعية (ب) من الفقرة (1) من هذه المادة؛ قرار من مجلس الوزراء بناءً على اقتراح من الرئيس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها، وله على وجه خاص ما يأتي: إقرار السياسات العامة المتعلقة بنشاط الهيئة والاستراتيجيات والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. اقتراح مشروعات الأنظمة والتنظيمات المتعلقة بنشاط الهيئة، واقتراح تعديل المعمول به منها، ورفعها؛ تمهيدًا لاعتمادها وفق الإجراءات النظامية المتبعة. إقرار هيكل الهيئة التنظيمي. إقرار اللوائح المالية والإدارية للهيئة وغيرها من اللوائح الداخلية، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. الموافقة على إنشاء فروع ومكاتب للهيئة داخل المملكة. الموافقة على مشروع ميزانية الهيئة السنوية وحسابها الختامي وتقرير مراجع الحسابات والتـقـرير السنوي؛ تمهيدًا لرفع ما يتطلب منها وفقًا للإجراءات النظامية المتبعة. الموافقة على متطلبات ومستهدفات المحتوى المحـلي وآليات ومعايير ومؤشرات
    قياسه، والتعاون في شأن ذلك كله مع الجهات المختصة فيما يتصل بالمشتريات الحكومية، دون إخلال بما ورد في الفقرة (4) من المادة (الرابعة)، والرفع بذلك إلى مجلس الشؤون الاقتصادية والتنمية؛ لاعتماده. إقرار القواعد والتعليمات الخاصة بآلية احتساب واعتماد نسبة المحتوى المحلي في منشآت القطاع الخاص، والقواعد والتعليمات الخاصة بإصدار شهادات بنسب المحتوى المحلي لتلك المنشآت. إقرار القواعد والتعليمات الخاصة بتأهيل مكاتب المراجعة المرخصة؛ لتدقيق نسب المحتوى المحلي في منشآت القطاع الخاص. إقرار معايير تحديد النشاطات -التي ترخص الجهات الحكومية ممارستها- ذات المكاسب العالية في تنمية المحتوى المحلي. إقرار قواعد وإجراءات إدارة العقود التي تكون جهة الإدارة طرفًا فيها لبرنامج التوازن الاقتصادي. تحديد المقابل المالي للخدمات والأعمال التي تقدمها الهيئة. الموافقة على إبرام مذكرات التفاهم مع القطاع الخاص؛ لتشجيعه على المساهمة في تحقيق مستهدفات المحتوى المحلي. الموافقة على الاستعانة بمراكز الدراسات والبحوث والتخطيط، وبيوت الخبرة، والخبراء والمستشارين؛ لتحقيق أهداف الهيئة. تعيين مراجع حسابات خارجي معتمد (أو أكثر)،
    ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والإعانات والتبرعات والمنح والوصايا والأوقاف، وفقًا للأحكام المنظمة لذلك. النظر في التقارير الدورية التي تقدم إليه عن سير العمل في الهيئة. وللمجلس -في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم، يُعهد إليها بما يراه من مهمات، ويُحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها. وللجان الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس -كذلك- تفويض بعض اختصاصاته إلى رئيسه أو أي من أعضائه أو إلى الرئيس التنفيذي وفقًا لما يقتضيه سير العمل في الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تُعقد اجتماعات المجلس في مقر الهيئة برئاسة الرئيس أو من ينيبه من الأعضاء ممثلي الجهات الحكومية، ويجوز -عند الاقتضاء- عقدها في مكان آخر يحدده الرئيس. يعقد المجلس اجتماعاته بصفة دورية (أربع) مرات في السنة على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس أو إذا طلب ذلك (ثلث) أعضاء المجلس على الأقل. توجه الدعوة إلى الاجتماع من الرئيس -كتابة- قبل موعد الاجتماع بـ(خمسة) أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللمجلس استخدام الوسائل الإلكترونية في سبيل ذلك، ويجوز للعضو الذي يعترض على أي قرار أن يُثبّت اعتراضه مسببًا في المحضر. لا يجوز لعضو المجلس الامتناع عن التصويت، ولا تفويض عضو آخر في التصويت نيابة عنه عند غيابه. يجوز-عند الحاجة وفي الحالات المستعجلة ووفقًا لما يقدره الرئيس- عقد الاجتماعات
    والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة ووفقًا لما يقدره الرئيس- أن يصدر قرارًا بالتمرير، ويشترط في هذه الحالة موافقة جميع أعضاء المجلس على القرار، ويُعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. لا يجوز لعضو المجلس أن يفشي شيئًا مما وقف عليه من أسرار الهيئة بسبب عضويته في المجلس، حتى بعد انقضاء عضويته. للمجلس -أو لرئيسه- دعوة من يرى الاستعانة بهم من المختصين والمستشارين إلى حضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يعين ويعفى بقرار من المجلس بناء على ترشيح من الرئيس، ويحدد القرار أجره ومزاياه المالية، ويعد المسؤول عن إدارة شؤون الهيئة وتسيير أعمالها ومسؤولياتها في حدود ما ينص عليه التنظيم واللوائح الصادرة بناءً عليه، وما يقرره المجلس، وله على وجه الخصوص مباشرة الاختصاصات الآتية: الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة. اقتراح السياسات العامة المتعلقة بنشاط الهيئة، والاستراتيجيات والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. اقتراح هيكل الهيئة التنظيمي واللوائح المالية والإدارية، وغيرها من اللوائح اللازمة لتسيير العمل في الهيئة، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية، وفقًا للأحكام المنظمة لذلك والصلاحيات المفوضة له من المجلس. تعيين العاملين في الهيئة وفقًا للوائح المنظمة لذلك، والإشراف عليهم، وإنهاء خدماتهم. إعداد التـقارير الدورية الخاصة بتنفيذ خطط الهيئة وبرامجها وإنجازاتها ونشاطاتها والمعوقات التي تواجهها، وعرضها على
    المجلس. الإشراف على إعداد مشروع الميزانية السنوية للهيئة وحسابها الختامي وتقريرها السنوي، والرفع بها إلى المجلس للموافقة عليها. اقتراح متطلبات ومستهدفات المحتوى المحـلي وآليات ومعايير ومؤشرات قياسه، وكذلك اقتراح ما يتصل بتلك المتطلبات والمستهدفات والآليات والمعايير والمؤشرات المتعلقة بالمشتريات الحكومية، ورفعها إلى المجلس. اقتراح القواعد والتعليمات الخاصة بآلية احتساب واعتماد نسبة المحتوى المحلي في منشآت القطاع الخاص، والقواعد والتعليمات الخاصة بإصدار شهادات بنسب المحتوى المحلي لتلك المنشآت. اقتراح القواعد والتعليمات الخاصة بتأهيل مكاتب المراجعة المرخصة؛ لتدقيق نسب المحتوى المحلي في منشآت القطاع الخاص. اقتراح معايير تحديد النشاطات -التي ترخص الجهات الحكومية ممارستها- ذات المكاسب العالية في تنمية المحتوى المحلي، ورفعها إلى المجلس. اقتراح قواعد وإجراءات إدارة العقود التي تكون جهة الإدارة طرفًا فيها لبرنامج التوازن الاقتصادي، ورفعها إلى المجلس. اقتراح الخدمات والأعمال التي يمكن تقديمها والمقابل المالي لها، ورفعها إلى المجلس. التوقيع على مذكرات التفاهم مع القطاع الخاص بعد موافقة المجلس عليها،
    أو بحسب الصلاحيات الممنوحة له من المجلس. التوقيع على الاتفاقيات والبروتوكولات والعقود، بعد موافقة المجلس عليها، أو بحسب الصلاحيات الممنوحة له من المجلس؛ وفقًا للإجراءات النظامية المتبعة. تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى المعنية، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي أن يفوض بعض اختصاصاته ومهماته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون موارد الهيئة المالية مما يأتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- المقابل الذي تتقاضاه نظير الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من هبات وإعانات وتبرعات ومنح ووصايا وأوقاف. د- الموارد الأخرى التي يقرها المجلس بما لا يخالف الأنظمة والتعليمات. تودع أموال الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حسابًا لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويُزوّد الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة بالرقابة على حسابات الهيئة وعملياتها، يعين المجلس مراجع حسابات خارجيًّا معتمدًا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويُرفع تقرير مراجع الحسابات إلى المجلس، ويُزوّد الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يرفع الرئيس إلى رئيس مجلس الوزراء -خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية- تقريرًا سنويًّا عمَّا حققته الهيئة من إنجازات مقارنة بما ورد في خطتها المعتمدة، وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/45ebca20-c6de-4ce3-b593-ad2500d05ec7/1
