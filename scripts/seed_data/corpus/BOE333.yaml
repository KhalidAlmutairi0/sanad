regulation:
  code: BOE333
  name_ar: اللائحة التنفيذية لنظام الأحداث
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات الآتية -أينما وردت في هذه اللائحة- المعاني المبينة أمام كل منها: النظام: نظام الأحداث. اللائحة: اللائحة التنفيذية للنظام. الوزارة: وزارة الموارد البشرية والتنمية الاجتماعية. الحدث: كل ذكر أو أنثى أتم (السابعة) ولم يتم (الثامنة عشرة) من عمره. المحكمة: المحكمة -أو الدائرة- المختصة بالنظر في قضايا الأحداث. الدار: جهة تابعة للوزارة، تخصص فيها أماكن مستقلة لإيداع الأحداث من (الذكور)، وأخرى خاصة بالإناث، وأماكن توقيف مستقلة للأحداث الموقوفين من (الذكور)، وأخرى خاصة بالإناث الموقوفات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: إذا لم تتوافر لدى جهات الضبط أي وثيقة رسمية يُعتمَد عليها في معرفة سن الحدث؛ فتحيله فورًا إلى الجهة الطبية المختصة لتقدير سنه بصفة عاجلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تخصَّص أماكن داخل الدار لضبط بلاغ الحدث المدعي وتسمع شهادته، وتكون بعيدة عن أماكن التوقيف ويشعر فيها بالراحة والطمأنينة. إذا كان الحدث لا يحمل ما يثبت هويته، فيضبط بلاغه وتسمع شهادته من رئيس جهة الضبط أو من ينيبه وتحت مسؤوليته وبحضور مندوب من الوزارة، أو بما يمنع الخلوة والانفراد به. مع مراعاة الفقرة (1) من هذه المادة، يضبط بلاغ الحدث المدّعي وتسمع شهادته بشكل مفصل وبما يفيد في كشف الحقيقة على نحو يكفل عدم حضوره مستقبلاً، وفق نموذج يعد بالتنسيق مع النيابة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'عند القبض على الحدث في حالات التلبس؛ يبلغ ولي أمره أو من يقوم مقامه فورًا بالوسائل المتاحة، ثم يكتب محضر تدون فيه جميع البيانات اللازمة. يودع رجل الضبط الحدث في الدار فور القبض عليه في حالة التلبس، على أن يراعي في إجراءات إيداع الحدث ما يمنع الخلوة أو الانفراد به. في غير حالة التلبس، على رجل الضبط عدم القبض على الحدث إذا ظهر عليه ما يمنع من القبض كمرض أو نحوه، ويعدَّ محضراً بذلك ويبلغ النيابة العامة لاتخاذ اللازم. يحال ملف الحدث فور القبض عليه إلى النيابة العامة. يحظر استخدام القيود والأغلال عند القبض على الحدث، إلا عند مقاومته. يجب عند القبض على الحدث، أن يبلَّغ الحدث وولي أمره أو من يقوم مقامه بالآتي: أ- أسباب القبض عليه والتهمة المنسوبة إليه. ب- حقه في الاستعانة بوكيل أو محام في مرحلة الاستدلال والتحقيق والمحاكمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: وفقاً للحكم الوارد في المادة (السادسة) من النظام، إذا كان الحدث المودع في الدار مجهول الهوية فيكون التبليغ صحيحاً إذا بُلغت الدار، وتشعر وزارة الداخلية بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يقدم طلب تمديد التوقيف مدة أو مدداً متعاقبة، الواردة في المادة (التاسعة) من النظام، قبل انقضائها، وإذا انقضت المدة ولم يصدر قرار بتمديدها أو رفضت المحكمة طلب تمديد الإيقاف؛ فيسلم الحدث إلى ولي أمره أو من يقوم مقامه فوراً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: عند تسليم الحدث إلى ولي أمره أو من يقوم مقامه؛ تؤخذ الضمانات اللازمة من المستلم بما يكفل الحفاظ على الحدث وعدم إيذائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجري التحقيق مع الحدث داخل الدار وفي مكان يشعر من خلاله بالطمأنينة والراحة النفسية. إذا اقتضت مصلحة الحدث قيام النيابة العامة بالتحقيق معه في مكان خارج الدار؛ فينبغي أن توفر للحدث الطمأنينة والراحة النفسية وألا يترتب على التحقيق معه في هذه الأماكن أي تأثير عليه من الناحية النفسية أو الاجتماعية أو السلوكية أو التعليمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تقوم الدار فور إيداع الحدث لديها بإعداد تقرير اجتماعي عن حالته، يشتمل على كل ما يفيد القاضي في إصدار حكمه، واقتراح ما تراه الدار مناسباً للحدث بما يمكن من تقويم سلوكه من النواحي الأسرية والاجتماعية والنفسية والمادية والتعليمية، والعوامل التي يرجح أن تكون سببًا في انحرافه. وفي جميع الأحوال، ترفع الدار التقرير الاجتماعي عن حالة الحدث بصفة مستمرة إلى المحكمة كل (خمسة عشر) يومًا خلال (التسعين) يومًا من إيداعه، وبعد مضي هذه المدة يكون رفع التقرير كل (ثلاثين) يومًا، وكلما طلبت المحكمة ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تحدد المحكمة، عند فرض التدابير المنصوص عليها في المادة (الخامسة عشرة) من النظام، المدد التي يتعين على الجهة المكلفة بالتنفيذ أن تقدم تقريرًا خلالها عن حالة الحدث. تشمل المراقبة الاجتماعية للحدث، الواردة في الفقرة الفرعية (هـ) من الفقرة (1) من المادة (الخامسة عشرة) من النظام، مراقبة سلوكه في بيئته الطبيعية باستخدام وسائل المراقبة الحديثة، ما لم تحدد المحكمة نوع المراقبة. للجهات التنفيذية، الواردة في الفقرة (4) من المادة (الخامسة عشرة) من النظام، التنسيق مع المؤسسات والجمعيات الأهلية لتنفيذ التدبير أو التدابير التي فرضتها المحكمة، ما لم تقرر المحكمة غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يتضمن السجل الخاص بالحدث في الدار، الوارد في المادة (التاسعة عشرة) من النظام، جميع البيانات عن الأحكام الصادرة في حقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع مراعاة ما ورد في الفقرة (1) من المادة (العشرين) من النظام، للمحكمة عند الإفراج المشروط عن الحدث المحكوم عليه طلب أي ضمان تراه بحسب حاله وظروفه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية، ويعمل بها بعد مضي (ثلاثين) يوماً من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9f08ef46-6240-4fd7-a437-ac8900df75a8/1
  verified: false
