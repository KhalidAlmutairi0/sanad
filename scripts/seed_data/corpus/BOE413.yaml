regulation:
  code: BOE413
  name_ar: تنظيم هيئات تطوير المناطق والمدن واللائحة المالية لهيئات تطوير المناطق والمدن واللائحة الإدارية لهيئات تطوير المناطق والمدن
  name_en: ''
  authority: —
