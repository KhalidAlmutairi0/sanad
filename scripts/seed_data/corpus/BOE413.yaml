articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: الهيئة: أي من هيئات تطوير المناطق والمدن، المشمولة بحكم المادة (الثانية) من التنظيم. التنظيم: تنظيم الهيئة. المجلس: مجلس الهيئة. اللجنة: اللجنة التنفيذية للهيئة. المنطقة: النطاق الجغرافي لعمل كل هيئة بحسب اسمها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يسري التنظيم على الهيئات الآتية: هيئة تطوير منطقة مكة المكرمة. هيئة تطوير منطقة المدينة المنورة. هيئة تطوير مدينة الرياض. هيئة تطوير منطقة حائل. هيئة تطوير المنطقة الشرقية. هيئة تطوير منطقة عسير أي هيئة تنشأ مستقبلاً، ما لم تنص أداة إنشائها على غير ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف الهيئة -دون إخلال باختصاصات الأجهزة المعنية الأخرى- إلى التخطيط والتطوير الشامل للمنطقة في المجالات العمرانية، والسكانية، والاقتصادية، والتنموية، والاجتماعية، والثقافية، والبيئية، والنقل، والبنية الأساسية، والبنية التحتية الرقمية، وتهدف كذلك إلى توفير احتياجات المنطقة من الخدمات والمرافق العامة. وتتولى الهيئة، في سبيل تحقيق ذلك، المهمات والاختصاصات الآتية: رسم السياسات العامة لتطوير المنطقة وتنميتها. إعداد الخطط والدراسات والمخططات الاستراتيجية الشاملة للمنطقة وبرامجها التنفيذية، وإقرارها، وتحديثها عند الحاجة. الإشراف المباشر على تخطيط البرامج والمشروعات الاستراتيجية وتصميمها وتنفيذها، وما يتصل بها من أعمال التشغيل والصيانة. مراجعة خطط التنمية والبرامج والمشروعات -ذات الصلة بعمل الهيئة- التي تعدها الأجهزة الحكومية والهيئات والمؤسسات العامة والجمعيات والمؤسسات الأهلية، بما يضمن تحقيق التنمية المتوازنة في المنطقة، وإقرارها. متابعة تخطيط مشروعات البنية الأساسية بالتنسيق مع الأجهزة المعنية. ترتيب أولويات تنفيذ البرامج والمشروعات في المنطقة بما يتفق مع خطط التنمية. متابعة
    تنفيذ البرامج والمشروعات في المنطقة، واتخاذ ما يلزم لضمان تنفيذها، بالتنسيق مع الأجهزة المعنية، وتطبيق مؤشرات تحسين وقياس كفاية الأداء الحضري عليها في ضوء أهداف خطط التنمية المعتمدة. اقتراح نزع ملكية بعض العقارات لتطوير المنطقة، بالتنسيق مع أمانة المنطقة ومع الأجهزة ذات العلاقة، تمهيداً لاستكمال الإجراءات النظامية في شأنها. الإشراف على تأهيل الأحياء العمرانية القائمة -بما في ذلك الأحياء التاريخية- وتحسينها، ومعالجة الأحياء العشوائية وتطويرها والارتقاء بها عمرانيًّا واجتماعيًّا واقتصاديًّا وأمنيًّا وبيئيًّا، وإجراء ما يلزم لضمان تنفيذ ذلك. إعداد ضوابط البناء واستعمالات الأراضي التي تسهم في تنفيذ مخططات تطوير المنطقة وتنميتها، وإقرارها. مراجعة مخططات تقسيمات الأراضي، وإقرارها. إنشاء قاعدة بيانات ونظم معلومات حضرية وإدارتها، بحيث تكون منصة موحدة ومرجعاً أساساً للمعلومات التي تستند إليها الأجهزة ذات الصلة بتطوير المنطقة وتنميتها. تنسيق وتنظيم الجهود بين الأجهزة ذات الصلة بتطوير المنطقة وتنميتها، وفقاً للدراسات والخطط المقرة. وضع البرامج والأسس والإجراءات اللازمة والسبل المحفزة لمشاركة القطاع
    الخاص في تحقيق أهداف التنمية وتنفيذ المشروعات والخدمات في المنطقة، والإشراف عليها. وللهيئة في سبيل تحقيق مهماتها واختصاصاتها الاستعانة بمن يلزم من الأجهزة الحكومية وغيرها، بما في ذلك بيوت الخبرة، والكوادر المتخصصة، داخل المملكة وخارجها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1- يكون للهيئة مجلس يشكل على النحو الآتي: - أمير المنطقة رئيساً - نائب أمير المنطقة نائباً للرئيس - رئيس اللجنة عضواً - الرئيس التنفيذي عضواً - أمين المنطقة عضواً - ممثل من وزارة الاقتصاد والتخطيط عضواً - ممثل من وزارة المالية عضواً - ممثل من وزارة الشؤون البلدية والقروية عضواً - ممثل من وزارة النقل عضواً - ممثل من وزارة الاتصالات وتقنية المعلومات عضواً - مدير شرطة المنطقة عضواً - ممثل من الشركة السعودية للكهرباء عضواً - ممثل من شركة المياه الوطنية عضواً - وكيل أمين المنطقة للتعمير والمشاريع عضواً - رئيس مجلس إدارة الغرفة التجارية والصناعية في المنطقة عضواً - أربعة من أهالي المنطقة أو من غيرهم، يرشحهم رئيس المجلس، ويصدر بتعيينهم أمر من رئيس مجلس الوزراء، وتكون مدة عضويتهم ثلاث سنوات قابلة للتجديد لمرة واحدة. أعضاء 2- يضاف ممثل من وزارة الحج والعمرة إلى عضوية كل من مجلس هيئة تطوير منطقة مكة المكرمة، وعضوية مجلس هيئة تطوير منطقة المدينة المنورة. 3- يضاف ممثل من الهيئة الملكية للجبيل وينبع إلى عضوية مجلس هيئة تطوير منطقة المدينة المنورة، وعضوية مجلس هيئة تطوير المنطقة الشرقية.
    4- يضاف محافظ محافظة الأحساء، وممثل من شركة أرامكو السعودية، إلى عضوية مجلس هيئة تطوير المنطقة الشرقية. 5- لرئيس المجلس بقرار منه أن يضم إلى عضوية المجلس من يراه من أمناء المحافظات في المنطقة. 6- يجب ألا يقل مستوى ممثلي الجهات الحكومية المشاركين في عضوية المجلس عن المرتبة (الخامسة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المسؤولة عن إدارة شؤون الهيئة وتصريف أمورها، وله في حدود التنظيم اتخاذ ما يراه مناسباً من القرارات والإجراءات اللازمة لتحقيق أهدافها، وعلى وجه خاص ما يأتي: إقرار السياسات العامة للهيئة وخططها وبرامجها التشغيلية والتنفيذية. اقتراح تعديل التنظيم ولوائح الهيئة المالية والإدارية. إقرار هيكل الهيئة التنظيمي. إقرار مشروع ميزانية الهيئة، وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. قبول التبرعات والهبات والأوقاف والوصايا والمنح، وفقاً للأحكام المنظمة لذلك. تعيين مراجع حسابات خارجي معتمد ومراقب مالي داخلي. الموافقة على استثمار أموال الهيئة بما يحقق أهدافها، وفقاً للأنظمة والتعليمات المتبعة. تأسيس شركات أو المشاركة في تأسيسها أو الدخول فيها لتنفيذ المشروعات التي تحددها الهيئة، وذلك وفقاً للإجراءات النظامية ذات الصلة. إقرار خطط التنمية والبرامج والمشروعات -ذات الصلة بعمل الهيئة- التي تعدها الأجهزة الحكومية والهيئات والمؤسسات العامة والجمعيات والمؤسسات الأهلية. إقرار الخطط والدراسات والمخططات الاستراتيجية
    الشاملة للمنطقة وبرامجها التنفيذية، وتحديثها عند الحاجة. إقرار ضوابط البناء واستعمالات الأراضي. إقرار مخططات تقسيمات الأراضي. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو إلى اللجنة أو إلى من يراه من أعضائه. وللمجلس كذلك تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات. ويُحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة، ويجوز بقرار من رئيس المجلس عقدها في مكان آخر داخل المنطقة. يعقد المجلس اجتماعاته بصفة دورية أربع مرات في السنة، ولرئيس المجلس دعوته للانعقاد متى دعت الحاجة إلى ذلك. وتوجه الدعوة للاجتماع من الرئيس التنفيذي -كتابةً- بموافقة رئيس المجلس، قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. ولا يكون اجتماع المجلس نظاميًّا إلا بحضور أغلبية أعضائه على الأقل بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بموافقة أغلبية الأعضاء الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. للمجلس دعوة بعض المسؤولين والخبراء لحضور اجتماعاته لتقديم ما لديهم من معلومات وإيضاحات، دون أن يكون لهم حق التصويت. تُبلِّغ الهيئة قرارات المجلس إلى الأجهزة المعنية بعد توقيع رئيس المجلس والأعضاء الحاضرين عليها، مع مراعاة استكمال الإجراءات النظامية للقرارات التي تتطلب ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمجلس لجنة تنفيذية، يعين لها رئيس بأمر من رئيس مجلس الوزراء، وعضوية عدد كافٍ يسمون بقرار من المجلس من بين أعضائه ومن الخبراء المحليين والعالميين بناءً على اقتراح من رئيس اللجنة. تعقد اللجنة اجتماعاتها بشكل دوري وبما لا يقل عن مرة واحدة في الشهر. تتخذ اللجنة قراراتها بأغلبية الأعضاء، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس اللجنة. تختص اللجنة بما يأتي: أ- مراجعة الخطط والدراسات والبرامج والمشروعات والمخططات، تمهيداً لرفعها إلى المجلس لإقرارها. ب- مراجعة مقترح تعديل ضوابط البناء واستعمالات الأراضي في المنطقة، تمهيداً لرفعها إلى المجلس لإقرارها. ج- مراجعة مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي، تمهيداً لرفعها إلى المجلس لإقرارها بحسب الإجراءات النظامية. د- مراجعة الهيكل التنظيمي للهيئة، تمهيداً لرفعه إلى المجلس لإقراره. وللجنة تشكيل لجان دائمة أو مؤقتة من بين أعضائها أو من سواهم، تعهد إليها بما تراه من مهمات في مجالات أعمال الهيئة. ويُحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يعين ويعفى بقرار من المجلس بناء على اقتراح من اللجنة يحدد فيه راتبه ومزاياه المالية والوظيفية الأخرى، ويكون المسؤول التنفيذي عن إدارة أعمال الهيئة وشؤونها، وتتركز مسؤولياته في حدود التنظيم واللوائح، وله على وجه خاص ممارسة الاختصاصات والمسؤوليات الآتية: الإشراف على منسوبي الهيئة وفقاً للصلاحيات الممنوحة له وما تحدده اللوائح المالية والإدارية. الإشراف على أعمال الهيئة الفنية والإدارية والمالية من خلال اللوائح والسياسات المعتمدة وفقاً للتنظيم. متابعة تنفيذ القرارات التي يصدرها المجلس واللجنة. تمثيل الهيئة أمام القضاء والأجهزة الحكومية والمؤسسات داخل المملكة، وكذلك الهيئات ذات العلاقة خارج المملكة. إعداد مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي، وعرضها على اللجنة لمراجعتها، تمهيداً لرفعها إلى المجلس لإقرارها. إعداد التقارير الخاصة بتنفيذ خطط الهيئة وبرامجها ودراساتها، وعرضها على اللجنة. الإشراف على التحضير لاجتماعات المجلس، وإعداد جدول أعماله وعرضه على اللجنة لإقراره. الإشراف على التحضير لاجتماعات اللجنة، وإعداد جدول
    أعمالها وإقراره. تعيين منسوبي الهيئة وفقاً للوائح الإدارية والمالية. التعاقد مع الخبراء والاستشاريين المحليين والعالميين. أي مهمة أخرى يكلفه بها المجلس أو رئيسه أو اللجنة. ويجوز للرئيس التنفيذي تفويض بعض صلاحياته لغيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تحدد اللوائح الإدارية للهيئة جميع الأحكام المنظمة لشؤونها الإدارية، بما في ذلك الأحكام المنظمة لأوضاع منسوبيها. تحدد اللوائح المالية للهيئة جميع الأحكام المنظمة لشؤونها المالية، بما في ذلك الأحكام المتعلقة بآليات تنفيذ منافساتها وتأمين مشترياتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون موارد الهيئة من الآتي: ما يخصص لها من اعتمادات مالية في الميزانية العامة للدولة. التبرعات والمنح والهبات والوصايا. عائدات أوقافها وفقاً للقواعد التي يضعها المجلس. الدخل الذي تحصل عليه من عائدات استثماراتها. أي مورد آخر يقره المجلس، بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع إيرادات الهيئة في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. تفتح الهيئة حساباً لها في مؤسسة النقد العربي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف منها في حدود ميزانية الهيئة المعتمدة ووفقاً للوائح المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يكون للهيئة ميزانية سنوية مستقلة، تعد وتصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع الهيئة حسابها الختامي السنوي إلى مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: لا يخل ما ورد في التنظيم من أحكام باختصاصات الأجهزة المعنية الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابه. ويُرفع تقرير مراجع الحسابات إلى اللجنة ومن ثم ترفعه إلى المجلس مصحوباً بملحوظاتها إن وجدت، ويزود ديوان المراقبة العامة بنسخة منه بعد إقراره من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من اليوم التالي لنشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية ( السنة المالية )
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة ( الميزانية التقديرية )
  article_text_ar: يكون للهيئة ميزانية مستقلة تصدر ضمن الميزانية العامة للدولة، وتعد الهيئة مشروع الميزانية السنوية على أساس تقدير الإيرادات والمصروفات المتوقعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة ( إعداد الميزانية التقديرية )
  article_text_ar: تتولى الإدارة المختصة في الهيئة إعداد تعليمات التحضير لمشروع الميزانية بحسب الفترات المحددة في التعليمات الواردة من وزارة المالية، وعلى أساس تقدير إيرادات الهيئة ومصروفاتها، وتُزود بها جميع القطاعات والإدارات وتبدي ملحوظاتها عليها -إن وجدت- وتناقش ويُرد على استفساراتها، وذلك لإدراج المشروعات والبرامج في مشروع الميزانية السنوية لاعتماده من الرئيس التنفيذي وعرضه على اللجنة، تمهيداً لرفعه إلى المجلس للموافقة عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة ( إحالة الميزانية )
  article_text_ar: تزود الهيئة وزارة المالية بمشروع الميزانية في الموعد المحدد لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة ( استمرار العمل بالميزانية السابقة )
  article_text_ar: إن بدأت السنة المالية الجديدة والميزانية لم تعتمد فيستمر العمل بالميزانية السابقة بقرار من الرئيس التنفيذي، وفقاً للتعليمات المتبعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة ( تنفيذ الميزانية )
  article_text_ar: تخصص بنود الميزانية بعد اعتمادها وتسلمها من وزارة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة ( التعديل على مخصصات الميزانية )
  article_text_ar: يجوز التعديل على إجمالي مخصصات الميزانية بالزيادة أو التخفيض وفقاً للضوابط المحددة لذلك بما فيها تعليمات تنفيذ الميزانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة ( الارتباطات المالية )
  article_text_ar: يجب التأكد من وجود اعتمادات مالية في ميزانية الهيئة قبل إنشاء أي التزام مالي عليها، وأن يكون الالتزام أو الارتباط بالصرف في حدود المخصصات المعتمدة في الميزانية السنوية للبند المخصص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة العاشرة ( طرق نشوء الارتباطات المالية على الهيئة )
  article_text_ar: 'تنشأ الارتباطات المالية للغير نتيجة الآتي: إبرام عقد بين الهيئة وغيرها. صدور تعميد، أو أمر شراء، أو إشعار بالترسية؛ من الهيئة لغيرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية عشرة ( المناقلات في الميزانية )
  article_text_ar: تكون المناقلات المالية بين أبواب الميزانية، والمناقلات بين البنود داخل الباب الواحد، وفقاً لما يرد في اللائحة، بما لا يتعارض مع تعليمات تنفيذ الميزانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية عشرة ( المناقلة بين الوفورات )
  article_text_ar: تُجرى المناقلة بين الوفورات المتحققة في التكاليف المعتمدة في الميزانية للبرامج والمشروعات، بحسب ما تقضي به تعليمات تنفيذ الميزانية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة عشرة (ترحيل وتدوير الأرصدة الباقية)
  article_text_ar: لا يجوز ترحيل (تدوير) الأرصدة الباقية من مخصصات بنود ميزانية الهيئة في نهاية العام المالي إلى ميزانية العام المالي التالي عدا المبالغ المرتبط عليها للمشروعات والمشتريات التي كان مقرراً الانتهاء من تنفيذها أو توريدها، ويجوز ترحيل أرصدة مخصصات المشروعات والمشتريات الطويلة الأجل (أكثر من سنة) إلى السنة المالية التالية في حال عدم الانتهاء من تنفيذها خلال السنة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة عشرة (اعتمادات المشروعات الجديدة والطارئة)
  article_text_ar: تطبق الهيئة القواعد المقرة في شأن تدبير الاعتمادات المالية الإضافية اللازمة من الخزينة العامة للمشروعات الجديدة والطارئة التي تكلَّف الهيئة بتنفيذها أو ترى ضرورة تنفيذها خلال السنة المالية التي لم تدرج في ميزانيتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة عشرة (نظام القيد والتسجيل والمتابعة)
  article_text_ar: تضع الإدارة المالية نظاماً متكاملاً للقيد والتسجيل والمتابعة يفي بمتطلبات سلامة ودقة تنفيذ الميزانية السنوية والارتباط عليها والصرف منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة عشرة (نظام الارتباط المالي)
  article_text_ar: 'تضع الإدارة المالية نظاماً للارتباطات المالية بما يتمشى مع النفقات العامة وبرامج الهيئة ومشاريعها، يؤدي إلى تحقيق الأهداف الآتية: إحكام الرقابة على الالتزامات المالية التي تنشأ على الهيئة، بحيث تتفق مع المخصصات المعتمدة. إظهار الموقف المالي لكل من البنود والبرامج والمشاريع، ومعرفة المبالغ المرتبط بها، والرصيد لكل منها في تاريخ معين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة عشرة (التقارير الدورية)
  article_text_ar: تعد الإدارة المالية تقارير ربع سنوية توضح المبالغ المرتبط بها والمناقلات التي تمت والمبالغ المصروفة ورصيد كل بند من بنود الميزانية، وتعرضها على الرئيس التنفيذي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة عشرة (قوائم الهيئة المالية)
  article_text_ar: تعد القوائم المالية للهيئة وفقاً للمبادئ والمعايير المحاسبية المعتمدة، ويكون تسجيل معاملات الهيئة المالية في السجلات المحاسبية بالريال، ووفقاً للتسلسل التاريخي لتلك المعاملات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة عشرة (مدة القوائم المالية)
  article_text_ar: تعد القوائم المالية السنوية عن مدة اثني عشر شهراً تبدأ من الحادي عشر من برج الجدي وتنتهي في العاشر من برج الجدي من السنة التالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة العشرون (ذمم مدينة ودائنة)
  article_text_ar: تعد الحقوق المالية المستحقة للغير ذمماً مدينة على الهيئة، ويشمل ذلك مستحقات الموظفين، وتمثل الذمم الدائنة حقوقاً مالية مترتبة للهيئة على الغير وفقاً للمعايير المحاسبية المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والعشرون (الاستهلاك)
  article_text_ar: تحدد نسب الاستهلاك للأصول وفقاً للمعايير المحاسبية المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والعشرون (الحسابات الختامية)
  article_text_ar: تقفل الحسابات الختامية للهيئة في نهاية السنة المالية وفقاً لأحكام اللائحة والتعليمات المتبعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والعشرون (موارد الهيئة)
  article_text_ar: 'تتكون موارد الهيئة من الآتي: الاعتمادات المالية التي تخصص لها في الميزانية العامة للدولة. الدخل الذي تحصل عليه من عائد استثماراتها. التبرعات والمنح والهبات والوصايا. عائدات أوقافها وفقاً للقواعد التي يضعها المجلس. أي مورد آخر يقره المجلس، بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والعشرون (إيداع إيرادات الهيئة)
  article_text_ar: تودع الهيئة إيراداتها في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والعشرون (استخدام الإيرادات)
  article_text_ar: تقيد إيرادات الهيئة ضمن حسابات الميزانية العامة للدولة، وعلى الهيئة التنسيق مع وزارة المالية لتخصيص هذه الإيرادات للهيئة؛ للصرف منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والعشرون (أساليب صرف المستحقات المالية)
  article_text_ar: تُدفع المبالغ التي تستحق على الهيئة بعد استكمال الإجراءات واستيفاء المستندات المؤيدة اللازمة لإجراء الصرف، ويكون الصرف بشيكات أو اعتمادات مستندية أو حوالات مصرفية أو وفقاً لأنظمة التسديد والتحويل من خلال العهد والسلف النقدية المستديمة أو المؤقتة وذلك باعتماد الصرف من الرئيس التنفيذي أو من يفوضه، ومن مدير الإدارة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والعشرون (ضوابط الصرف)
  article_text_ar: يكون الصرف بشيكات غير قابلة للتظهير بتوقيع شخصين وفق دليل الصلاحيات، بحيث يقوم صاحب الاستحقاق -أو من يفوضه- بالتوقيع على مستند الصرف بما يفيد بتسلّم الشيك أو إيصال تسلم محرر من صاحب الاستحقاق، وفي حال إيداع الشيك ترفق نسخة من إشعار الإيداع مع مستند الصرف، على أن تختم جميع الشيكات الصادرة من الهيئة بختم الصرف للمستفيد الأول فقط. يكون إلغاء الشيكات المحررة والموقعة وفقاً للقواعد والإجراءات التي تضعها الإدارة المالية. تحفظ دفاتر الشيكات غير المستعملة في مكان آمن في الإدارة المالية، وتكون تحت مسؤولية رئيس الحسابات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة والعشرون (ضوابط الصرف من العهد النقدية)
  article_text_ar: يكون الصرف بموجب العهد النقدية المستديمة وفقاً للقواعد التي تعدها الإدارة المالية، ويعتمدها الرئيس التنفيذي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة والعشرون (إجراءات الصرف وحفظ المستندات)
  article_text_ar: تُجرى جميع عمليات الصرف والتسويات عن طريق الإدارة المالية في الهيئة وفقاً للإجراءات المحاسبية؛ من مراجعة، وإعداد، وقيد، وتدقيق، واعتماد، وتسديد، ومن ثم تحفظ مع مرافقاتها في ملفات في الإدارة المالية، بعد إثباتها وقيدها مسلسلة رقميًّا في البرامج المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثلاثون (تحصيل الأموال من الغير)
  article_text_ar: يكون تحصيل الأموال المستحقة للهيئة لدى الغير آليًّا عن طريق النظام الآلي "سداد" أو بشيكات مصدقة من أحد البنوك المرخص لها بالعمل في المملكة أو بحوالات مصرفية، وذلك بموجب إيصالات تسلُّم في حالة التحصيل في مقر الهيئة، على أن يراعى أن تقيد في دفاتر إيصالات التسلُّم عهدة على الموظف المختص بالتحصيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والثلاثون (متابعة الأرصدة البنكية)
  article_text_ar: يقوم مدير الإدارة المالية بمتابعة أرصدة حسابات الهيئة مرة على الأقل كل شهر، وتحرير محضر بذلك، ورفع صورة من المحضر للرئيس التنفيذي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والثلاثون (متابعة تحصيل حقوق الهيئة)
  article_text_ar: 'يقوم مدير الإدارة المالية -كل شهر- بمتابعة تحصيل الحقوق المستحقة للهيئة لدى الغير، وذلك من خلال ما يأتي: إعداد تقارير شهرية عن المبالغ المستحقة المسددة وغير المسددة. وضع آلية تضمن تحصيل تلك الحقوق ومتابعتها. رفع التوصيات اللازمة لصاحب الصلاحية في شأن الحقوق التي تعذر تحصيلها لمعالجتها وفقاً لما تقضي به الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والثلاثون (الختم بخاتم صرف)
  article_text_ar: تختم أوامر الصرف والمستندات الأصلية المؤيدة بختم "صرف" أو "مدفوع" لضمان عدم تكرار الصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والثلاثون (السلف المستديمة والمؤقتة)
  article_text_ar: 'يجوز -بقرار من الرئيس التنفيذي أو من يفوضه- صرف سلف نقدية مستديمة أو مؤقتة على النحو الآتي: سلفة مستديمة لمديري الإدارات، لا تتجاوز (300.000) ثلاثمائة ألف ريال للمدير الواحد؛ للصرف منها على المعاملات النقدية والمشتريات، تسوى قبل نهاية السنة المالية وفق القواعد والإجراءات التي تضعها الإدارة المالية وبما لا يتعارض مع تعليمات تنفيذ الميزانية، ويستعاض المصروف من السلفة المستديمة كلما قاربت على النفاد وبعد تقديم مستندات الصرف كاملة. سلفة مؤقتة لمنسوبي الهيئة، لا تتجاوز ( 200.000) مائتي ألف ريال للشخص الواحد؛ وذلك لأغراض محددة، تسوى عند انتهاء المهمة أو قبل نهاية السنة المالية وفق القواعد والإجراءات التي تضعها الإدارة المالية وبما لا يتعارض مع تعليمات تنفيذ الميزانية. لا يجوز صرف سلفة أخرى لشخص ما لم تسدد سابقتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والثلاثون (نظام الهيئة المحاسبي)
  article_text_ar: مع مراعاة ما ورد في اللائحة، يكون للهيئة نظام محاسبي تعتمده اللجنة، يشتمل على مجموعة مستندية وسجلات وتقارير ملائمة تخدم أغراض الهيئة، وعلى نظام للرقابة الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والثلاثون ( أساليب عمل نظام الهيئة المحاسبي )
  article_text_ar: يجب أن يشتمل النظام المحاسبي على دورة مستندية شاملة تشمل أساليب سير العمل ومراحله، والقواعد والإجراءات الواجب اتباعها في القيد والتسجيل والتدقيق والتصحيح والتعديل والإلغاء، والتأكد من مطابقة أرصدة الحسابات الفرعية المساعدة المقيدة في برامج الهيئة المحاسبية مع إجمالي الحسابات المختلفة في الأستاذ العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والثلاثون (إجراءات عمل نظام الهيئة المحاسبي)
  article_text_ar: تقوم الإدارة المالية بتصميم وإعداد دليل للحسابات يعتمده الرئيس التنفيذي، بحيث توفّر البيانات المالية اللازمة للإدارة العليا في الهيئة بصفة دورية وعند الطلب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة والثلاثون ( حسابات الهيئة البنكية )
  article_text_ar: دون إخلال بالمادة (الرابعة والعشرين) من اللائحة، تفتح حسابات لدى مؤسسة النقد العربي السعودي أو أحد البنوك المحلية داخل المملكة باسم الهيئة، وفقاً للتعليمات المنظمة لذلك، تودع فيها أموال الهيئة وإيراداتها وينفق منها على مصروفاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة والثلاثون (الرقابة المالية)
  article_text_ar: يكون للهيئة وحدة مراجعة داخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الأربعون (مهمات وحدة المراجعة الداخلية)
  article_text_ar: 'مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة وما تقضي به اللائحة الموحدة لوحدات المراجعة الداخلية في الأجهزة الحكومية والمؤسسات العامة؛ تتولى وحدة المراجعة الداخلية المهمات الآتية: تقويم أنظمة الرقابة الداخلية، بما في ذلك النظام المحاسبي، للتحقق من سلامتها وملاءمتها وتحديد أوجه القصور فيها إن وجدت، واقتراح الوسائل والإجراءات اللازمة لعلاجها بما يكفل حماية أموال الهيئة وممتلكاتها من الاختلاس والتلاعب والضياع. التأكد من التزام الهيئة بالأنظمة واللوائح والتعليمات والإجراءات المالية المعتمدة لديها، والتحقق من كفايتها وملاءمتها. فحص المستندات الخاصة بالمصروفات والإيرادات بعد إتمامها، للتأكد من أنها تمت وفق الأنظمة واللوائح والتعليمات ذات العلاقة. فحص البرامج المحاسبية للتأكد من انتظام القيود وصحتها وسلامة التوجيه المحاسبي. مراجعة حسابات الهيئة البنكية، وفحص برامجها المحاسبية، وفقاً للقواعد والإجراءات المقررة. مراجعة أعمال المستودعات، وفحص برامجها المحاسبية، والتحقق من أن الجرد والتقويم وأساليب التخزين قد تمت وفقاً لأحكام اللائحة والقواعد والإجراءات
    المقررة. مراجعة التقارير المالية والحسابات الختامية التي تعدها الهيئة، والتأكد من دقتها ومدى موافقتها للأنظمة واللوائح والتعليمات والسياسات التي تطبقها الهيئة. القيام بالأعمال التي يكلفها بها الرئيس التنفيذي، في حدود اختصاصاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والأربعون (صلاحية وحدة المراجعة الداخلية)
  article_text_ar: يكون لوحدة المراجعة الداخلية، ومن يكلفهم المجلس بالرقابة على الأعمال المالية، صلاحية الحصول والاطلاع على جميع البيانات والمعلومات اللازمة لأداء مهماتهم، وعلى الإدارات المختصة في الهيئة التعاون معهم في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والأربعون (مسؤولية مدير الإدارة المالية)
  article_text_ar: يعدّ مدير الإدارة المالية مسؤولاً عن اقتراح الإجراءات التنفيذية ومتابعتها لتحقيق الضبط المالي في الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والأربعون (الرقابة والفحص)
  article_text_ar: تخضع جميع إيرادات الهيئة ومصروفاتها وإجراءاتها المالية للرقابة والفحص من الجهات المختصة، للتأكد من سلامة السياسات والإجراءات المالية المتبعة، ومدى انسجامها مع اللوائح والقرارات المالية المعتمدة لدى الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والأربعون (الفصل بين المسؤوليات والاختصاصات)
  article_text_ar: يجب الفصل بين مسؤوليات واختصاصات الوظائف التي تتولى القيد في البرامج والسجلات المحاسبية، ومسؤوليات واختصاصات الوظائف التي تتولى التدقيق والمراجعة قبل الصرف، ومسؤوليات واختصاصات الوظائف التي تتولى صرف المستحقات المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والأربعون (إعداد التقارير والبيانات المالية)
  article_text_ar: تعد الإدارة المالية تقارير وبيانات مالية ومحاسبية، وتزود بها قطاعات وإدارات العمل المختلفة في الهيئة عند الحاجة إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والأربعون (مراقبة الموجودات)
  article_text_ar: تكون الرقابة على الموجودات عن طريق الجرد والتفتيش الدوري والمفاجئ، وكذا الرقابة بوساطة التسجيل المنتظم في السجلات التفصيلية ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والأربعون (الاستغناء عن الموجودات)
  article_text_ar: يستغنى عن الموجودات التي يتعذر إصلاحها أو استعمالها أو الاستفادة منها، عن طريق لجنة تشكل بقرار من الرئيس التنفيذي لا يقل عدد أعضائها عن (ثلاثة)، تتولى حصر تلك الموجودات وتقدير الحد الأدنى لقيمة بيعها بموجب محضر يوقع عليه جميع أعضاء هذه اللجنة، ويوضع التقدير في ظرف مختوم لا يفتح إلا من قبل رئيس لجنة البيع بحضور جميع أعضائها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة والأربعون (بيع الموجودات)
  article_text_ar: يكون بيع موجودات الهيئة -ما عدا العقارات- والمستغنى عنها عن طريق لجنة تشكل بقرار من الرئيس التنفيذي لا يقل عدد أعضائها عن (ثلاثة)، ويكون البيع بالطريقة التي تراها اللجنة محققة لمصلحة الخزينة العامة ووفق القواعد والإجراءات التي تعدها الإدارة المالية، وبموجب الأنظمة والتعليمات المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة والأربعون (قواعد أعمال المستودعات)
  article_text_ar: يصدر الرئيس التنفيذي قراراً باعتماد القواعد التي تنظم أعمال المستودعات في الهيئة، ويدخل في ذلك إعداد نماذج الاستمارات والدفاتر والبطاقات المستودعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخمسون (طرق تنفيذ المشروعات وتأمين المشتريات والخدمات)
  article_text_ar: تؤمن المواد والخدمات وتنفذ الأعمال التي تقوم بها الهيئة عن طريق منافسات عامة أو محدودة أو بطريق الشراء المباشر، وفقاً لما يعتمده الرئيس التنفيذي لأسلوب التأمين المناسب، ويؤجر ويستثمر ما يخص الهيئة من المشروعات والعقارات عن طريق المزايدة العامة أو المحدودة، وذلك بحسب ما تقتضيه المصلحة وظروف تنفيذ الأعمال، مع التقيد حين الترسية والتعاقد بالاعتماد من صاحب الصلاحية وفق الجدول المرفق. يوجه الرئيس التنفيذي -في حال المنافسة المحدودة- الدعوات الخاصة لتنفيذ المشروعات والأعمال والمشتريات والخدمات إلى ما لا يقل عن ثلاث من الشركات والمؤسسات والأفراد المختصين في المجال المطلوب تأمينه لتقديم عروضهم. للهيئة عند الحاجة إلى وضع تصميم معين لمشروع مميز -وفقاً لتقديرها- الإعداد لإجراء مسابقة فيما بين (ثلاثة) مكاتب استشارية هندسية -على الأقل- مختصة بالتصميم؛ لتقديم أفكارها الأولية لتصميم المشروع، وذلك ضمن حدود الدليل الإرشادي الخاص بالمسابقة، الذي يتم اعتماده متضمنًا الشروط الفنية للمسابقة، مع تخصيص (ثلاث) جوائز -على الأكثر- للفائزين الأوائل الذين يعتمدون بقرار من لجنة تحكيمٍ؛ يُعين أعضاؤها
    وتحدد مكافآتهم ومقدار كل من جوائز الفائزين مع أي مصروف آخر؛ بقرار من الرئيس التنفيذي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والخمسون (لجنة فحص العروض)
  article_text_ar: تشكل لجنة (أو أكثر) بقرار من الرئيس التنفيذي -أو من يفوضه- لفحص وتحليل عروض المنافسات العامة والمحدودة، لا يقل عدد أعضائها عن (ثلاثة) يكون من بينهم المراقب المالي الداخلي، إضافةً إلى رئيسها. ولا يعد انعقاد اللجنة نظاميًّا إلا بمشاركة المراقب المالي الداخلي. وينص في القرار على عضو احتياطي يكمل النصاب إن غاب أحد الأعضاء، وتكون مدة اللجنة ثلاث سنوات، ويجوز التجديد لأعضائها لمرة واحدة فقط. تشكل لجنة (أو أكثر) بقرار من الرئيس التنفيذي أو من يفوضه لفحص عروض التأمين المباشر وتحليلها. تشكل لجنة (أو أكثر) بقرار من الرئيس التنفيذي -أو من يفوضه- لفحص وتحليل عروض المزايدات العامة والمحدودة، لا يقل عدد أعضائها عن ثلاثة يكون من بينهم المراقب المالي الداخلي، إضافةً إلى رئيسها. وينص في القرار على عضو احتياطي يكمل النصاب إن غاب أحد الأعضاء، وتكون مدة اللجنة ثلاث سنوات، ويجوز التجديد لأعضائها لمرة واحدة فقط. على أن ترفع لجان فحص العروض توصياتها بنتائج تحليل العروض إلى صاحب الصلاحية للبت فيها بحسب الجدول المشار إليه في الفقرة (1) من المادة الخمسين من اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والخمسون (اللجنة الفنية)
  article_text_ar: تشكل بقرار من الرئيس التنفيذي أو من يفوضه لجنة فنية متخصصة لا يقل عدد أعضائها عن (ثلاثة) يختارون من بين موظفي الهيئة؛ لرفع توصياتها فيما يخص تحديد مواقع الاستثمار، ولتقدير الحد الأدنى للأجرة أو عوائد الاستثمار وفقاً للأسعار السائدة بموجب محضر موقع من جميع أعضاء اللجنة المذكورة، وذلك قبل طرح أي مشروع خاص بتأجير أو استثمار أيٍ من المشروعات التابعة أو الخاضعة لإشراف الهيئة وإدارتها، ويوضع التقدير في ظرف مختوم يفتح من قبل رئيس لجنة فحص عروض التأجير والاستثمار، وبحضور كل أعضائها، بعد تسلم جميع العروض المقدمة للمشروع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والخمسون (التقدم للمنافسة)
  article_text_ar: 'على من يرغب في التقدم للمنافسة تقديم عرضين: أحدهما فني والآخر مالي، ويكون فتح العرض المالي مرهوناً بقبول العرض الفني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والخمسون (الاستعباد من المنافسة)
  article_text_ar: 'للهيئة استبعاد المتقدم للمنافسة في أيّ من الحالتين الآتيتين: إن قل سعر عرضه عن السعر التقديري للمشروع أو الأسعار السائدة بنسبة تزيد على (35%) خمسة وثلاثين في المائة. إن تبين للجنة فحص العروض أن المتقدم للمنافسة لديه مشروعات يزيد فيها حجم التزاماته التعاقدية على قدراته المالية أو الفنية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والخمسون (العرض الوحيد)
  article_text_ar: إن لم يُقدم للمنافسة إلاَّ عرض واحد، أو قدمت عدة عروض واتضح أنها غير مطابقة للشروط والمواصفات -عدا عرض واحد- فيجوز قبول هذا العرض إن كانت أسعاره مماثلة للأسعار السائدة، وكانت حاجة العمل لا تسمح بإعادة طرح المنافسة مرة أخرى، وذلك بعد موافقة الرئيس التنفيذي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والخمسون (الضمانات البنكية)
  article_text_ar: '1-الضمان الابتدائي: أ- يقدم مع العرض ضمان ابتدائي يتراوح (من واحد إلى اثنين في المائة) من قيمة العرض وفقاً لشروط المنافسة ووفقاً لنماذج الضمانات البنكية الحكومية المعتمدة. ويكون ساري المفعول لمدة لا تقل عن تسعين يوماً من التاريخ المحدد لفتح المظاريف. وللهيئة قبول الضمان الابتدائي إن كان النقص في حدود ثلاثين يوماً، مع حقها في تمديده بما يكمل تسعين يوماً. ب- لا يلزم تقديم الضمان الابتدائي في حالة الشراء المباشر، أو عند التعاقد مع الجهات الحكومية والجمعيات والمؤسسات الأهلية؛ بشرط تنفيذها الأعمال بنفسها. ج- ترد الضمانات الابتدائية إلى أصحاب العروض المستبعدة بعد البت في الترسية، وكذلك في حالة إلغاء المنافسة، أو بعد انتهاء الوقت المحدد لسريان العروض، ما لم يبدِ صاحب العرض رغبته في الاستمرار في الارتباط بعرضه وموافقة الهيئة على ذلك. 2-الضمان النهائي: أ- على من تتم الترسية عليه أن يقدم ضماناً وفقاً لنماذج الضمانات الحكومية وصيغها المعتمدة بنسبة (5%) خمسة في المائة من قيمة العقد خلال خمسة عشر يوماً من تاريخ إشعاره بالترسية، ويجوز تمديد هذه المدة لفترة مماثلة. فإن تأخر عن ذلك فلا
    يعاد له الضمان الابتدائي، ويجرى التفاوض مع صاحب العرض الذي يليه، وفي حال عدم موافقته يجرى التفاوض مع أصحاب العروض الأخرى وفقاً لتسلسلهم. ب- لا يلزم تقديم الضمان النهائي في حالة الشراء المباشر، ما لم تنص وثائق المنافسة على ذلك. وتعفى من تقديم الضمان النهائي الجهات الحكومية والمؤسسات العامة والشركات التي تساهم الحكومة فيها بنسبة لا تقل عن (51%) واحد وخمسين في المائة من رأس مالها وقت الترسية، والجمعيات والمؤسسات الأهلية، بشرط تنفيذها الأعمال بنفسها، وكذا الهيئات والمؤسسات الدولية العلمية والبحثية (غير الهادفة للربح). ج- يجب الاحتفاظ بالضمان النهائي حتى ينفِّذ المتعاقد التزاماته، وفي عقود الأشغال العامة حتى انتهاء فترة الصيانة وتسليم الأعمال نهائيًّا. د- يُخفّض الضمان النهائي في العقود ذات التنفيذ المستمر سنويًّا بحسب تنفيذ الأعمال، بشرط ألا يقل الضمان عن (5%) خمسة في المائة من قيمة الأعمال الباقية من العقد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والخمسون (أشكال الضمانات المقبولة)
  article_text_ar: 'تقبل الضمانات إن كانت وفق أحد الأشكال الآتية: خطاب ضمان بنكي من أحد البنوك المحلية المرخص لها. خطاب ضمان بنكي من بنك في الخارج يقدم بوساطة أحد البنوك المحلية المرخص لها . تأمين نقدي إلى جانب الضمان البنكي في الحالات الخاصة بتوريد الإعاشة أو التي تتطلب تأميناً عاجلاً بما لا يتجاوز تكلفة الإعاشة أو الأعمال لمدة ثلاثة أيام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة والخمسون (عقود التأجير والاستثمار)
  article_text_ar: للهيئة تأجير أو استثمار ما يدخل ضمن اختصاصها من العقارات المملوكة للدولة وذلك من خلال طرحها في مزايدات عامة أو محدودة وفقاً لما يقرره الرئيس التنفيذي، على أن تتم الترسية ومباشرة إجراءات التعاقد بعد موافقة صاحب الصلاحية طبقاً لجدول الصلاحيات المشار إليه الفقرة (1) من المادة الخمسين من اللائحة. وتزود وزارة المالية بنسخة من عقود التأجير أو الاستثمار، التي تبلغ إيرادتها السنوية مليوني ريال فأكثر، قبل توقيعها، لمراجعتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة والخمسون (استئجار العقار)
  article_text_ar: للرئيس التنفيذي -أو من يفوضه- استئجار الأعيان، أو العقارات من الغير وفقاً لحاجة الهيئة، وذلك مع مراعاة ما تقضي به الأنظمة والتعليمات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الستون (إعداد العقود)
  article_text_ar: مع مراعاة نماذج العقود الحكومية المعتمدة، تتولى الإدارة العامة للشؤون القانونية في الهيئة إعداد نماذج العقود المختلفة، وتعتمد من الرئيس التنفيذي أو من يفوضه. فيما عدا عقود التوظيف، لا تبرم أي اتفاقية أو عقد إلاَّ بعد مراجعته من الإدارة العامة للشؤون القانونية، وتزوَّد بنسخة من ذلك بعد التوقيع. توثق عملية الشراء إن كان مبلغها ثلاثمائة ألف ريال فأكثر بموجب عقد أو اتفاقية، وفيما عدا ذلك فللهيئة الاكتفاء بالمكاتبات المتبادلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والستون (زيادة الالتزامات في العقود وتخفيضها)
  article_text_ar: 'للهيئة زيادة الالتزامات التعاقدية بما لا يتجاوز نسبة (10%) عشرة في المائة من القيمة الإجمالية للعقد، أو تخفيض هذه الالتزامات بما لا يتجاوز (20%) عشرين في المائة من القيمة الإجمالية للعقد، وذلك بموجب أمر (أو أوامر) تغيير يقره الرئيس التنفيذي، وذلك ضمن حدود نسبتي الزيادة أو النقص المشار إليهما في هذه المادة، على أن تراعى في ذلك الضوابط الآتي: أ‌- التأكد من توافر المبالغ اللازمة لتغطية الأعمال الإضافية قبل تعميد المتعاقد بها. ب‌- إن لم يكن للأعمال الإضافية بنود أو كميات مماثلة في العقد، فيتم العرض على لجنة فحص العروض أو اللجنة المختصة بالشراء المباشر بحسب الأحوال؛ لدراسة التكليف بتلك الأعمال، ومناسبة الأسعار التي قدمها المتعاقد. فإن لم يوافق المتعاقد على ما تنتهي إليه اللجنة، فيتم التعاقد على تنفيذها بوساطة مقاولين آخرين. ج- لا يجوز التكليف بأعمال إضافية بعد تسلم الأعمال محل العقد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والستون (صرف المقابل المالي)
  article_text_ar: تدفع قيمة العقود بالريال السعودي، ويجوز أن تدفع بأي عملة أخرى إن نصت شروط المنافسة على ذلك، على أنه لا يجوز دفع قيمة العقد الذي تتجاوز قيمته خمسة ملايين ريال بأكثر من عملة إلاَّ بعد التنسيق مع وزارة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والستون (صرف الدفعة المقدمة)
  article_text_ar: 'للهيئة أن تدفع للجهة المتعاقد معها دفعة مقدمة من استحقاقها بنسبة لا تتجاوز (5%) خمسة في المائة من القيمة الإجمالية للعقد مقابل تقديمها ضماناً بنكيًّا مساوياً لهذه القيمة، وينص على ذلك في شروط المنافسة، وتستوفى هذه الدفعة بالنسبة نفسها اعتباراً من المستخلص الأول للمتعاقد وفقاً لما يأتي: تصرف مستحقات المقاول على دفعات وفقاً لما ينجز من عمل بموجب المستخلصات التي تعتمدها الجهة المختصة في الهيئة. يصرف المستخلص الأخير، الذي يجب ألاَّ يقل عن (10%) عشرة في المائة في عقود الأشغال العامة وعن (5%) خمسة في المائة في العقود الأخرى، بعد تسليم الأعمال تسليماً ابتدائيًّا، أو توريد المشتريات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والستون (تمديد عقود التشغيل والصيانة)
  article_text_ar: يجوز -بموافقة الرئيس التنفيذي- تمديد عقود الخدمات ذات التنفيذ المستمر (التي تقل مدتها عن خمس سنوات) كالتشغيل والصيانة والنظافة التي تبرمها الهيئة؛ في حالات الضرورة وبناء على توصية من لجنة فحص العروض، على ألاَّ تتجاوز كامل مدة العقد الإجمالية بما في ذلك مدد التجديد (5) خمس سنوات، وعلى أن تكون بأسعار العقد الأساس نفسها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والستون (ما لم يرد فيه نص)
  article_text_ar: تطبق الأحكام الواردة في نظام المنافسات والمشتريات الحكومية، فيما لم يرد فيه نص خاص في هذا الفصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والستون (قبول التبرعات)
  article_text_ar: للهيئة -بموافقة المجلس- قبول التبرعات والهبات والأوقاف والوصايا والمنح المطلقة والمقيدة منها تحت أي اسم، مع مراعاة القواعد التي تنظم وتحكم الرقابة على تلقي الجهات الحكومية تبرعات عينية أو نقدية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والستون (الرعاية)
  article_text_ar: للهيئة -بموافقة الرئيس التنفيذي- رعاية الأنشطة والمناسبات ذات العلاقة بالأنشطة التي تدخل ضمن اختصاصاتها وأغراضها الأساس، في حدود الصلاحيات المحددة في دليل الصلاحيات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة والستون (إعداد الدليل)
  article_text_ar: مع مراعاة الصلاحيات المحددة في اللائحة، يعد الرئيس التنفيذي دليل الصلاحيات، وتعتمده اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة والستون (الالتزام بالصلاحيات المالية)
  article_text_ar: على جميع المختصين في الهيئة الالتزام بمستوى الصلاحيات المحددة في اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السبعون (مراجع الحسابات الخارجي)
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة، يعين المجلس مراجعاً (أو أكثر) للحسابات من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابه ومدة عمله. لا يجوز الجمع بين عمل مراجع الحسابات الخارجي للهيئة والقيام بأي عمل فني أو إداري لها، ولا يجوز كذلك أن يكون لمراجع الحسابات الخارجي مصلحة مباشرة في أي عمل من أعمال الهيئة، ولا يجوز أن يتقاضى أي مكافأة أو بدل سوى الأتعاب المقررة له سنويًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والسبعون (مراجعة الحسابات الختامية)
  article_text_ar: يتولى مراجع الحسابات مراجعة الحسابات الختامية والبيانات المرافقة لها الخاصة بالهيئة، وذلك لإبداء رأيه الفني المحايد حول دقة وعدالة تمثيل تلك القوائم والحسابات للوضع المالي لها، وذلك بعد التأكد من وجود نظام آلي أو دفتري ومستندي يخدم أغراضها، وأن هناك نظاماً للرقابة الداخلية يشمل جميع العمليات المالية لها. وله في سبيل تحقيق ذلك الاطلاع في أي وقت على دفاتر الهيئة وسجلاتها، وغيرها من الوثائق، وله طلب البيانات والإيضاحات التي يرى ضرورة الحصول عليها لأداء مهمته، وكذلك التحقق من موجوداتها وحقوقها والتزاماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والسبعون (الحسابات الختامية)
  article_text_ar: يعد الرئيس التنفيذي الحساب الختامي، ويعرضه على اللجنة لمراجعته ورفعه إلى المجلس خلال تسعين يوماً (على الأكثر) من انتهاء السنة المالية؛ تمهيداً لرفعه إلى مجلس الوزراء، مع تزويد ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والسبعون (التعامل مع المخالفات)
  article_text_ar: عند اكتشاف أي مخالفة، أو اختلاس، أو تصرف يُعرِّض أموال الهيئة أو أصولها للهدر، يتعين على إدارة المراجعة الداخلية ومراجع الحسابات الخارجي تقديم تقرير فوري بذلك -يتضمن التوصيات المناسبة- إلى الرئيس التنفيذي لاتخاذ ما يراه في شأنه، مع إحاطة ديوان المراقبة العامة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والسبعون (سريان اللائحة)
  article_text_ar: تسري اللائحة اعتباراً من اليوم التالي لتاريخ اعتمادها. يصدر الرئيس التنفيذي القرارات والإجراءات المنفذة لأحكام اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية (إجراءات التوظيف وشروطه)
  article_text_ar: 'يكون اختيار المتقدمين للعمل في الهيئة وترشيحهم وفق ضوابط وإجراءات يعتمدها الرئيس التنفيذي بحسب ما تقتضيه الوظائف ومتطلبات شغلها. الجدارة والكفاية هي الأساس في اختيار المرشحين من أصحاب المؤهلات والمهارات والقدرات المناسبة لشغل وظائف الهيئة. تكون الأولوية في التوظيف للمرشحين السعوديين. يشترط فيمن يتعاقد معه للعمل في الهيئة ما يأتي: أ- أن يكون حائزاً على مؤهلات علمية وخبرات تتناسب مع متطلبات الوصف الوظيفي للوظيفة المراد شغلها. ب- أن يجتاز ما تقرره الهيئة من اختبارات أو مقابلات شخصية أو إجراءات تتطلبها الوظيفة. ج- أن يكون لائقاً طبياً بموجب شهادة طبية من الجهة التي تحددها الهيئة. د- أن يكون حسن السيرة والسلوك. هـ- ألاّ يكون قد سبقت إدانته في جريمة مخلة بالشرف والأمانة، ما لم يكن قد رد إليه اعتباره. و- ألاّ يكون قد فُصل من وظيفة في إحدى الأجهزة العامة لأسباب تأديبية، ما لم يكن قد مضى على فصله ثلاث سنوات. ز- أن يكون قد أتم سن الثامنة عشرة. ح- ألاّ يكون موظفًا أو مرتبطاً بعقد عمل لدى أي جهة. يجوز -بقرارٍ من المجلس- إعفاء المتقدمين للعمل من شرط (أو أكثر) من الشروط المنصوص عليها
    في الفقرة (4) من هذه المادة، عدا شرط اللياقة الطبية. مع عدم الإخلال بما تقضي به الأنظمة ذات العلاقة، إن ثبت أن تعاقد العامل قد تم بانتحاله شخصية غيره، أو بتقديمه شهادات أو توصيات أو قرارات أو بيانات أو معلومات أو وثائق مزورة أو غير صحيحة؛ فيفسخ عقد العمل تلقائيًّا دون سابق إشعار ودون مكافأة أو تعويض، مع احتفاظ الهيئة بحقها في مطالبته بالتعويض عن الأضرار المترتبة على تصرفه وما تكبدته من مصاريف وخسائر في سبيل التعاقد معه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة (متطلبات التوظيف)
  article_text_ar: 'على المرشح أن يقدم الوثائق اللازمة للتوظيف، وبخاصة الآتي: أ- صورة من بطاقة الهوية الوطنية للسعودي مع الأصل للمطابقة. ب- صورة من رخصة الإقامة أو الوثائق الأخرى المقرة نظاماً أو جواز السفر لغير السعودي، مع الأصل للمطابقة. ج- صورة مصدقة من مؤهلاته العلمية وخبراته العملية. د- شهادة طبية تثبت لياقته الطبية من جهة تحددها الهيئة. هـ- أربع صور شمسية ملونة حديثة. وتحفظ هذه الوثائق في ملف خدمة العامل. لغرض التعاقد، تعدّ بطاقة الهوية الوطنية شهادة لإثبات السن والجنسية للسعوديين، وتعدّ رخصة الإقامة السارية المفعول أو جواز السفر أو الوثائق الأخرى المقرة نظاماً شهادة إثبات ذلك لغير السعوديين. تُشغل الوظائف الشاغرة في الهيئة بقرار من الرئيس التنفيذي أو من يفوضه بحسب دليل الصلاحيات المعتمد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة (المباشرة وعقود العمل ومدة التجربة)
  article_text_ar: تبلِّغ الهيئة المرشح للوظيفة بالعرض الوظيفي الذي يكون التعاقد بناءً عليه بخطاب رسمي يسلم له مناولة أو يرسل إليه على عنوانه البريدي أو عبر البريد الإلكتروني الخاص به. يعدّ تاريخ أول يوم يباشر فيه المرشح العمل فعليًّا لدى الهيئة هو تاريخ تعيينه. يوظّف المرشح بموجب عقد عمل تعتمده الهيئة يحرر من نسختين باللغة العربية، تسلم إحداهما له وتودع الأخرى في ملف خدمته لدى الهيئة. ويجب أن يتضمن العقد بياناً بطبيعة العمل والأجر والمزايا الوظيفية وما إذا كان العقد محدد المدة أو غير محدد أو لأداء عمل معين وأيّ بيان ضروري. إلى جانب اللغة العربية، يجوز تحرير العقد بلغة أخرى إن تطلب الأمر ذلك، على أن يكون النص العربي هو المعتمد عند الاختلاف. للهيئة إلغاء العرض الوظيفي أو عقد العمل الخاص بالعامل الذي لا يباشر مهمات عمله دون عذر مشروع خلال خمسة عشر يوماً من التاريخ المحدد للمباشرة إن كان متعاقدًا معه من داخل المملكة. للهيئة إلغاء العرض الوظيفي أو عقد العمل الخاص بالعامل الذي لا يباشر مهمات عمله دون عذر مشروع خلال ثلاثين يوماً من تاريخ حصوله على تأشيرة العمل من سفارة المملكة ببلد التعاقد إن
    كان متعاقداً معه من خارج المملكة. يعدّ عقد العمل سارياً ومنتجاً لجميع الآثار المترتبة عليه من تاريخ مباشرة العامل الفعلية للعمل. لا يعدّ العامل الذي يعمل لدى الهيئة تحت التجربة إلا إذا نص عقد العمل على ذلك بشرط ألا تزيد مدتها على (تسعين) يوماً. ويجوز باتفاق مكتوب بين الطرفين تمديد مدة التجربة قبل انتهائها على ألا تزيد في مجملها على (مائة وثمانين) يوماً. يجوز باتفاق الطرفين -كتابةً- إخضاع العامل لمدة تجربة أخرى، بشرط أن تكون في مهنة أخرى أو عمل آخر. لا تدخل في احتساب مدة التجربة إجازة عيد الفطر وعيد الأضحى والإجازة المرضية. إذا لم تثبت صلاحية العامل للعمل خلال مدة التجربة جاز للهيئة إنهاء عقد العمل دون مكافأة أو إشعار أو تعويض، وفقاً لنظام العمل، ويرد إليه ما استقطع منه من عائدات تقاعدية، على أن تتاح له الفرصة لكي يبدي أسباب معارضته للإنهاء. وللعامل إنهاء عقد العمل خلال مدة التجربة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة (التكليف)
  article_text_ar: يجوز تكليف العامل بالقيام بأعمال وظيفة أخرى متجانسة من حيث التخصص مع وظيفته الأصلية وذات درجة وظيفية أعلى من الدرجة الوظيفية التي يشغلها، وفق القواعد والإجراءات التي يعتمدها الرئيس التنفيذي. إن كُلف عامل بالقيام بأعمال عامل آخر، فإن المكلف لا يتمتع بالصلاحيات المفوضة للآخر. يجوز تكليف العامل بالعمل في مكان مختلف عن المكان المتفق عليه دون موافقته، وذلك في حالات الضرورة التي تقتضيها ظروف عارضة، ولمدة لا تتجاوز ثلاثين يوماً في السنة، على أن تتحمل الهيئة تكاليف الانتقال والإقامة. لا يجوز تكليف أي عامل بالقيام بمهمات وظيفة أخرى ذات درجة وظيفية أقل من التي يشغلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة (النقل)
  article_text_ar: لا يجوز نقل العامل -بغير موافقته كتابياً- من مقر عمله الأصلي إلى مكان آخر يقتضي تغييرًا في مكان إقامته، إلاَّ إذا كان هناك سبب مشروع تقتضيه طبيعة العمل على أن تتحمل الهيئة تكاليف الانتقال. يجب أن تتوافر لدى العامل المراد نقله مواصفات الوظيفة المراد نقله إليها ومتطلباتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة (التدريب والابتعاث)
  article_text_ar: تتيح الهيئة الفرصة لعامليها للتدريب والابتعاث والإيفاد، وفق لائحة التدريب والابتعاث والإيفاد التي يعتمدها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة (إعارة عاملي الهيئة)
  article_text_ar: 'تجوز إعارة العامل -بعد موافقته- للعمل لدى أي جهة عامة أو خاصة داخل المملكة أو خارجها، وتكون إعارته بقرار من الرئيس التنفيذي. يجوز بقرار من الرئيس التنفيذي إلغاء قرار الإعارة قبل انتهاء مدته إن اقتضت مصلحة العمل ذلك. يحتفظ العامل المعار بوظيفته ودرجته الوظيفية طوال مدة الإعارة، ولا يجوز شغلها بغيره. مدة الإعارة سنة واحدة، ويجوز تمديدها مدة أو مدداً لا تزيد كل منها على سنة واحدة، ولا يجوز أن تزيد مدة الإعارة على ثلاث سنوات. ولا تجوز إعارة العامل، الذي أكمل الحد الأقصى للإعارة، قبل مضي ثلاث سنوات على الأقل من تاريخ إكماله الحد المشار إليه، ويجب ألا تزيد على المدة المتبقية من مدة عقده إذا كان محدد المدة. تحتسب مدة الإعارة في الخدمة، وعلى العامل المعار أن يؤدي خلالها جميع الحسميات المقررة نظاماً على أجره في وظيفته الأصلية. للهيئة استعارة موظفين من أي جهة عامة أو خاصة، وذلك مقابل مكافأة مالية لا تتجاوز الأجر المقرر للدرجة الوظيفية المراد شغلها لدى الهيئة وفقًا للضوابط الآتية: أ- موافقة الجهة التي يعمل لديها العامل أو الموظف. ب- توافر شروط شغل الوظيفة لديه. يجوز الاتفاق على
    أن تتحمل جهة المعار راتبه أو أجره. وفي هذه الحالة يصرف له الفرق بين ما يتقاضاه في وظيفته الحالية ومخصصات وظيفته في الهيئة إن وجد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة (الأجر)
  article_text_ar: يصرف للعامل أجر شهري بحسب ما يتفق عليه في عقد العمل وفق سلم الأجور المرافق للائحة. يحتسب أجر العامل ومستحقاته من تاريخ مباشرته العمل في الهيئة. تخضع الأجور للحسميات المقررة وفقاً للوائح الداخلية التي يعتمدها المجلس، والأنظمة المعمول بها. تدفع أجور العاملين بالريال السعودي عن طريق أحد البنوك المعتمدة في المملكة. العامل الذي تنهي الهيئة التعاقد معه، يُدفع أجره وجميع مستحقاته خلال سبعة أيام عمل من تاريخ إنهاء العلاقة التعاقدية، بعد استكماله الإجراءات والنماذج اللازمة لذلك. العامل الذي ينهي العقد ويترك العمل من تلقاء نفسه، يُدفع أجره وجميع مستحقاته خلال خمسة عشر يوم عمل من تاريخ إنهاء العلاقة التعاقدية، بعد استكمال الإجراءات والنماذج اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة العاشرة (بدل السكن)
  article_text_ar: تؤمن الهيئة السكن المناسب للعامل، وفي حال عدم تأمين السكن، يصرف له بدل سكن بما يعادل أجره الأساس لثلاثة أشهر وبحد أدنى مبلغ (20.000) عشرين ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية عشرة (بدل نقل)
  article_text_ar: 'ستحق العامل بدل نقل شهري يصرف مع الأجر الأساس وفقاً لدرجته الوظيفية. لا يستحق العامل بدل النقل إذا أمنت له الهيئة وسيلة نقل ذهاباً وإياباً من مكان سكنه إلى مقر العمل. يصرف للعامل الذي تتطلب طبيعة عمله التنقل، أثناء وقت العمل الرسمي بشكل متكرر ومستمر مستخدماً سيارته الخاصة في هذا التنقل، تعويضٌ يعادل بدل النقل المقرر للدرجة الوظيفية التي يشغلها، ويصرف هذا التعويض وفق ضوابط يعتمدها الرئيس التنفيذي. مع مراعاة ما ورد في الفقرة (2) من هذه المادة، يجوز للرئيس التنفيذي ـوفقاً للضوابط التي يعتمدهاـ تأمين وسيلة نقل مناسبة للعامل على المرتبة (47) فأعلى لاسـتعمالها في تنقلاته. على أن يراعى فيما يتعلق بالعامل السعودي الأحكام الآتية: أ- أن يتحمل العامل المؤمن له وسيلة نقل وفقاً لأحكام هذه المادة تكاليف المحروقات والصيانة. ب- أن تكون مدة الاستفادة من وسيلة النقل أربع سنوات ميلادية، يتم في نهايتها نقل ملكيتها له. ج- إن انتهت خدمة العامل المؤمن له وسيلة النقل بسبب الوفاة، أو العجز الصحي عن العمل، أو بسبب بلوغه السن النظامية لاستحقاق المعاش، فتنقل ملكيتها له دون اشتراط إكمال مدة أربع
    سنوات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية عشرة (بدل ترحيل)
  article_text_ar: 'يصرف للعامل المنقول من مدينته التي يعمل فيها إلى مدينة أخرى بدل ترحيل مرة واحدة يعادل الأجر الأساس لشهرين، ويشترط لصرف هذا البدل ما يأتي: أ- ألاَّ تقل المسافة بين مقر العمل المنقول منه ومقر العمل المنقول إليه عن (80 كم). ب- أن يكون النقل بناءً على مصلحة العمل وليس بناءً على رغبة العامل. يصرف للـمعار إلى الهيئة من جهة أخرى يقع مقرها خارج مقر الهيئة؛ بدل ترحيل له ولعائلته يعادل راتب شهرين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة عشرة (بدل خطر)
  article_text_ar: يُصرف للعامل الذي يعرضه عمله للضرر أو الخطر بدل يُحدد الرئيس التنفيذي مقداره وحالات منحه وقواعد صرفه، على أن يستأنس في ذلك باللوائح الصادرة بموجب نظام الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة عشرة (بدل تجهيز)
  article_text_ar: يُصرف للعامل الـمتعاقد معه بدل تجهيز يُعادل راتب شهر واحد ولمرة واحدة عند التعاقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة عشرة (حالة وفاة العامل)
  article_text_ar: يُصرف لورثة العامل في حالة وفاته ما يعادل راتب ثلاثة أشهر بالإضافة إلى نفقات العودة إلى مقر التعاقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة عشرة (صرف مزايا أخرى)
  article_text_ar: للمجلس حق صرف بدل أو مكافأة أو تعويض في غير الحالات المنصوص عليها في اللائحة، على أنه لا يجوز أن يتجاوز مجموع ما يصرف للعامل من بدلات وعلاوات نسبة (100%) من الأجر الأساس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة عشرة (تقويم الأداء الوظيفي)
  article_text_ar: يخضع العامل لتقويم الأداء الوظيفي لقياس مستوى أدائه لواجبات وظيفته وسلوكه، وتقدير مدى صلاحيته في الاستمرار في شغل الوظيفة، ومدى قدرته على القيام بمسؤوليات أعلى، وذلك وفقاً لعناصر ومعايير وإجراءات يعتمدها الرئيس التنفيذي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة عشرة (إجراء التقويم)
  article_text_ar: يجرى التقويم مرة واحدة -على الأقل- في السنة. يعد الرئيس المباشر تقريراً عن أداء العامل، على أن يعتمده لاحقاً صاحب الصلاحية. يزود العامل بصورة من التقرير فور اعتماده، ويحق له التظلم منه خلال خمسة عشر يوماً من تاريخ إبلاغه به، وفقاً لأحكام التظلم المنصوص عليها في اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة عشرة (العلاوات)
  article_text_ar: للهيئة منح علاوة سنوية وفقاً لسلم الأجور المرافق للائحة، وبناء على نتيجة تقويم مستوى أداء العامل الوظيفي في السنة السابقة لسنة المنح، ووفقاً لضوابط يعتمدها الرئيس التنفيذي، وتحتسب تلك العلاوة من أول يوم في السنة المالية لا يجوز أن يزيد الأجر الأساس -بعد العلاوة السنوية- على الحد الأعلى المقرر للمرتبة والدرجة الوظيفية للعامل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة العشرون (الترقيات)
  article_text_ar: 'للهيئة ترقية العامل إلى المرتبة التالية لمرتبته -وفقاً للضوابط والإجراءات التي يعتمدها الرئيس التنفيذي- متى توافرت الشروط الآتية: أ- وجود وظيفة شاغرة. ب- توافر مؤهلات شغل الوظيفة فيه. ج- أن يكون قد أمضى سنتين -على الأقل- في مرتبته. د- حصوله على درجة جيد جداً -على الأقل- في آخر تقويم للأداء الوظيفي. تشكل لجنة للنظر في الترقيات بقرار من الرئيس التنفيذي يحدد فيه مهماتها وتشكيلها وصلاحياتها. لا تكون الترقية نافذة إلاَّ من تاريخ مباشرة العامل فعليًّا لمهمات الوظيفة المرقى إليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والعشرون (مكافأة الأداء)
  article_text_ar: للهيئة منح مكافأة أداء سنوية -لا تزيد على (15%) خمسة عشر في المائة من أجر العامل- للعامل المتميز الذي أثبت جدارة وكفاية في أدائه، وفق الضوابط والإجراءات التي يعتمدها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والعشرون (الإركاب)
  article_text_ar: 'تؤمن الهيئة تذاكر سفر بالطائرة ذهاباً وإياباً في الحالات الآتية: أ- من يدعى للمقابلة الشخصية من أجل الترشيح النهائي للتوظيف بناءً على طلب الهيئة ولمرة واحدة فقط. ب- للعامل -عند بداية التعاقد معه- ولأفراد أسرته الذين تعتمدهم الهيئة (وبحد أقصى أربعة أفراد للأسرة بمن فيهم العامل) من البلد الذي تم فيه التعاقد أو استقدم منه إلى مقر العمل. ج- للعامل عند انتهاء خدمته وطلبه العودة إلى المكان الذي تم التعاقد معه فيه أو استقدم منه وذلك وفقاً لأحكام نظام العمل. د- للعامل إن حصل على إجازة مرضية وأوصت الجهة المختصة بعلاجه في غير مقر عمله، ما لم يحصل على تذاكر من جهة أخرى. تكون درجات الإركاب بالدرجة الأولى للعاملين شاغلي المراتب (47) فأعلى. يجوز إركاب العامل في الدرجة الأولى حتى وإن لم يكن مستحقاً لها وفقاً للفقرة (2) من هذه المادة وذلك في الحالات الآتية: أ- إن كان ضمن وفد يمثل الهيئة، بشرط أن يكون رئيس الوفد هو رئيس المجلس أو نائبه أو أحد أعضاء المجلس. ب- عند مرافقته لضيوف رسميين تكون درجة إركابهم في الدرجة الأولى. ج- إن كان العامل ضِمْن وفد يمثل المملكة، وكان إركاب الوفد في الدرجة
    الأولى. مع مراعاة ما ورد في الفقرتين (2) و(3) من هذه المادة، تكون درجات الإركاب بالطائرات وفق ما تحدده القواعد والإجراءات المقرة نظاماً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والعشرون ( الانتداب )
  article_text_ar: 'إن احتاج العمل إلى انتداب عامل لأداء مهمة خارج مقر عمله لمسافة تبلغ (80كم) (أو أكثر) من مقر العمل، فتتّبع الإجراءات التي يعتمدها الرئيس التنفيذي، ويصدر قرار الانتداب وفقاً لدليل الصلاحيات. يحدد في قرار الانتداب اسم العامل المنتدب، ودرجته الوظيفية، واسم وظيفته، وطبيعة المهمة، والمدة اللازمة لأدائها، وتاريخ بدايتها، ودرجة الإركاب. لا يجوز انتداب العامل للعمل خارج مقر عمله إن كان من الممكن أن يؤدي المهمة أحد عمال الهيئة أو أحد منسوبيها الموجودين في نطاق المكان الذي تقع فيه المهمة. لا يجوز انتداب العامل خارج مقر عمله مدة أو مددًا متوالية تزيد على ستين يومًا خلال السنة المالية الواحدة. إن انتدب العامل لأداء عمل خارج مقر عمله فيعامل وفقاً لما يأتي: أ- يصرف له بدل انتداب يومي عن كل يوم من أيام انتدابه وفقًا للبدل المحدد في سلم الأجور للدرجة الوظيفية التي يشغلها. ب- إن أمنت الهيئة له السكن والطعام والنقل -وفقاً لرغبته- فيخفض البدل إلى الربع، وإن وفرت له السكن فقط فيخفض البدل إلى النصف، ولا يتأثر هذا البدل في حال تقديم التذاكر والسكن والطعام من أي جهة غير حكومية ما لم يحتسب على
    الهيئة. ج- توفر الهيئة للعامل المنتدب وسيلة سفر مناسبة لنقله إلى مكان المهمة التي كلف بها داخل المملكة أو خارجها، وذلك وفق أحكام الإركاب المبينة في اللائحة. تحسب النفقات المشار إليها في الفقرة (5) من هذه المادة من اليوم الذي غادر فيه العامل مقر عمله إلى يوم عودته وفق المدة التي حددتها له الهيئة. يحتسب ضمن مدة الانتداب أو التدريب في الداخل أو الخارج إلى إحدى الدول المصنفة ضمن فئتي (ج) و (ب) في جدول تصنيف الدول بحسب فئات التمثيل الدبلوماسي؛ يوم واحد سابق على بداية المهمة ويوم بعدها. وفي حال الانتداب أو التدريب في إحدى الدول المصنفة ضمن الفئة (أ) أو الفئة (مرتفعة المعيشة) في جدول تصنيف الدول بحسب فئات التمثيل الدبلوماسي؛ فيحتسب ضمن المدة يومان سابقان للمهمة ويومان بعدها. مع مراعاة ما ورد في الفقرة (4) من هذه المادة، يجوز تمديد مدة الانتداب بموافقة صاحب الصلاحية، إن تعذر إنجاز المهمة في المدة المحددة. يجوز أن يعطى العامل المنتدب بدل الانتداب مقدّماً بما لا يزيد على ما يستحقه عن المدة المحددة في قــرار الانتداب، بعد موافقة صاحب الصلاحية. إن صرف للعامل انتدابه مقدماً وفقاً للفقرة (9) من هذه
    المادة، وانتهت خدمته بالوفاة أو العجز الدائم عن العمل قبل انتهاء المدة المحددة في قرار الانتداب، فلا يستعاد منه ما صرف له من بدل انتداب. إن انتدب العامل للقيام بمهمة رسمية لمصلحة جهة أخرى، فتتحمل الجهة المنتدبة ما يستحقه من بدل وتعويض ومكافأة. للهيئة تعويض العامل المنتدب عن المصروفات اللازمة لإنجاز المهمة، مثل المصروفات المترتبة على استخدام الفاكس والبريد والهاتف ورسوم المطارات ورسوم استئجار أماكن أداء المهمة وغيرها. ولا يعوض إلاَّ بعد الحصول على موافقة كتابية مسبقة من صاحب الصلاحية، وبموجب الوثائق والمستندات الأصلية المثبتة لذلك. إن انتدب العامل الذي يعمل خارج المملكة لأداء مهمة رسمية، فيعامل وفق التفصيل الآتي: أ- إن كان الانتداب إلى خارج الدولة التي فيها مقر عمله، فيعامل معاملة المنتدب من داخل المملكة إلى البلد المنتدب إليها. ب- إن كان الانتداب داخل الدولة التي فيها مقر عمله، فيعامل معاملة العامل المنتدب داخل المملكة. تتحمل الهيئة قيمة تأشيرة الخروج والعودة، وتأشيرة البلد الذي انتدب العامل إليه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والعشرون (أيام العمل وساعاته والراحة)
  article_text_ar: تكون أيام العمل خمسة أيام في الأسبوع، ويكون يوما الجمعة والسبت يومي الراحة الأسبوعية بأجر كامل لجميع العمال، وللهيئة أن تستبدل بهما يومين آخرين من أيام الأسبوع لبعض الفئات أو العمال وفقاً لمقتضيات العمل. لا تزيد ساعات عمل العامل في الهيئة على ثماني ساعات يوميًّا في الأيام العادية، وتخفض ساعات العمل خلال شهر رمضان إلى ست ساعات في اليوم. يجوز تشغيل العامل بالتناوب وفق السياسات الداخلية للهيئة، ويتم توزيع ساعات العمل اليومية على مدار اليوم بحسب طبيعة كل نشاط من أنشطة الهيئة، وذلك بقرار من الرئيس التنفيذي. يكون حضور العامل إلى مكان العمل وانصرافه في المواعيد المحددة وفق ما يعتمده الرئيس التنفيذي، ويثبت العامل حضوره وانصرافه وفق ما تعتمده الهيئة. يكون دخول العامل إلى موقع عمله وانصرافه منه من الأماكن المخصصة لذلك، ويجب عليه الامتثال للإجراءات الأمنية. لا يجوز أن يعمل العامل أكثر من خمس ساعات متواصلة دون فترة للراحة والصلاة والطعام لا تقل عن نصف ساعة، على ألاَّ يبقى العامل في مكان العمل أكثر من اثنتي عشرة ساعة في اليوم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والعشرون (التكليف بالعمل الإضافي)
  article_text_ar: 'يجوز تكليف العامل بالعمل الإضافي خارج وقت الدوام الرسمي وأثناء العطل الرسمية أو عطلة نهاية الأسبوع، على أن يصدر من صاحب الصلاحية قراراً في هذا الشأن وفقاً لجدول الصلاحيات يبين طبيعة العمل المكلف به وعدد الساعات المطلوبة لإنجازه. يراعى قبل التكليف بالعمل الإضافي ما يأتي: أ- ألاَّ يكون هناك سبيل لإنجاز ذلك العمل أثناء وقت الدوام الرسمي. ب- ألاَّ يكون التكليف نتيجة تقصير العامل أو إهمال منه في أداء عمله. يكون احتساب ساعات العمل الإضافي على أساس أجر الساعة الواحدة بساعة ونصف في الأيام العادية وإجازة نهاية الأسبوع والأعياد والعطل الرسمية. يصرف للعامل المكلف بالعمل الإضافي في غير أوقات الدوام عن كل يوم من أيام تكليفه أو انتدابه بدل انتقال إضافي يعادل نسبة (1 / 30) من بدل الانتقال الشهري ما لم توفر له وسيلة النقل. لا يجوز الجمع بين مكافأة العمل الإضافي وبدل الانتداب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والعشرون (الإجازات السنوية)
  article_text_ar: 'يستحق العامل إجازة عادية مدتها ستة وثلاثون يوماً عن كل سنة من سنوات الخدمة بأجر كامل بحسب آخر أجر أساس تقاضاه، ويجوز صرف أجرها مقدماً إن كانت مدة الإجازة التي سيتمتع بها ثلاثين يوماً فأكثر. يجوز تمديد الإجازة العادية بداية من تاريخ انتهائها. يستحق العامل عند انتهاء خدمته بدلاً نقدياً محسوباً على أساس آخر راتب يتقاضاه عن رصيد إجازاته العادية التي لم يمكّن من التمتع بها بسبب متطلبات العمل، مضافاً إليه ما يستحقه عن السنة أو جزء منها التي انتهت خدمته خلالها أو بنهايتها دون التمتع بها. يجوز للعامل الذي لا يتوافر له رصيد من الإجازة العادية -بعد موافقة رئيسه- أن يتغيب براتب كامل لأسباب طارئة مدة أقصاها خمسة أيام خلال السنة المالية الواحدة. للهيئة حسم أيام غياب العامل عن العمل بعذر تقبله الهيئة من رصيده من الإجازات، فإن لم يكن له رصيد وكان سبب الغياب مقبولاً لدى الهيئة، فتحسب غياباً بعذر لا يستحق عنها أجراً. لا يستحق العامل إجازة عادية عن المدد الآتية: أ- مدة الإجازة الاستثنائية ومدة الإجازة الدراسية. ب- مدة كف اليد وما في حكمه في حالة الإدانة. ج- مدة الغياب. د- المدة التي يقضيها
    في السجن تنفيذاً لحكم صادر ضده. هـ- مدة الابتعاث للدراسة في الخارج أو الإيفاد للدراسة في الداخل، أو التدريب الذي يتخلله إجازة لا تقل مدتها عن شهر في الداخل أو الخارج. و- مدة الإعارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والعشرون (الإجازات الرسمية)
  article_text_ar: 'يستحق العامل إجازة بأجر كامل، في المناسبات الآتية: إجازة عيدي الفطر والأضحى بما يتفق مع الإجازة الرسمية للدولة. أي إجازة أخرى تقررها الدولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة والعشرون (الإجازات الخاصة)
  article_text_ar: 'يستحق العامل إجازة بأجر كامل وذلك على النحو الآتي: خمسة أيام عمل عند الزواج. ثلاثة أيام عند ولادة زوجته. خمسة أيام عمل في حالة وفاة أحد أصوله (الأب - الأم - الجد - الجدة) أو أحد فروعه (أبناؤه - بناته - أبناؤهم)، أو أحد إخوته، أو زوجته. للمرأة العاملة الحق في إجازة وضع بأجر كامل وفقاً لأحكام نظام العمل. مدة العدة للعاملة في حالة وفاة زوجها تكون وفقاً لأحكام نظام العمل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة والعشرون (إجازة المشاركات في الأنشطة )
  article_text_ar: للعامل -بعد موافقة الهيئة- أن يتغيب بأجر كامل للمشاركة في الأنشطة الرياضية أو الكشفية أو الثقافية أو الاجتماعية، ومن تستعين بهم الأندية الأدبية للمشاركة في المؤتمرات والندوات، أو للمشاركة في أعمال الإغاثة وأعمال الدفاع المدني وفق الإجراءات التي يعتمدها الرئيس التنفيذي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثلاثون (الإجازة المرضية )
  article_text_ar: 'يستحق العامل الذي يثبت مرضه بشهادة طبية صادرة من مرجع طبي معتمد لدى الهيئة؛ إجازة مرضية خلال السنة الواحدة، وذلك على النحو الآتي: أ- الشهر الأول بأجر كامل. ب- الشهران الثاني والثالث بثلاثة أرباع الأجر. ج- الشهر الرابع دون أجر. تحتسب بداية السنة من تاريخ أول إجازة مرضية. للعامل أن يطلب التمتع بإجازته العادية قبل إجازته المرضية أو بعدها. لا يسمح للعامل المريض أن يباشر عمله إلاَّ إذا قرر المرجع الطبي الذي أصدر الشهادة الطبية أنه شفي من مرضه وأصبح قادراً على مزاولة عمله وأنه لا خطر عليه من أداء العمل ولا ضرر منه في مخالطة زملائه بالعمل. إن لم يعد العامل لعمله بعد انتهاء مدة الإجازة المرضية بسبب المرض، فيعرض أمره على اللجنة الطبية المختصة في المؤسسة العامة للتأمينات الاجتماعية؛ للنظر في إنهاء خدماته أو تمديد إجازته بما لا يتجاوز ما هو محدد في الفقرة (1) من هذه المادة، مع تحديد المدة الإضافية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والثلاثون (إجازة مرض الفشل الكلوي)
  article_text_ar: تمنح الهيئة العامل المصاب بالفشل الكلوي إجازة بأجر كامل عن الأيام التي يجرى له فيها الغسل للتنقية الدموية، بموجب تقرير من الجهة الطبية التي تتولى علاجه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والثلاثون (إجازة مرافقة مريض)
  article_text_ar: في الحالات التي يضطر فيها العامل إلى مرافقة أحد أقربائه لعلاجه، يُسمح له بالتمتع برصيده من الإجازات العادية. وإن زادت المدة اللازمة للمرافقة على ما يستحقه من الإجازات العادية، فيُسمح له بالغياب وفقًا لأحكام الفقرة (1) من المادة (الثلاثين) من اللائحة وبحسب التقارير الطبية، على أن يكون المريض والدًا للعامل أو ولدًا أو زوجًا له أو يعوله العامل شرعاً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والثلاثون (إجازة أداء الحج)
  article_text_ar: للعامل الحق في الحصول على إجازة بأجر لا تقل مدتها عن عشرة أيام ولا تزيد على خمسة عشر يوماً بما فيها إجازة عيد الأضحى؛ وذلك لأداء فريضة الحج لمرة واحدة طوال مدة خدمته إن لم يكن قد أداها من قبل. ويشترط لاستحقاق هذه الإجازة أن يكون العامل قد أمضى في العمل لدى الهيئة سنتين على الأقل. وللهيئة أن تحدد حداً أقصى لعدد العمال الذين يمنحون هذه الإجازة سنويَّا وفقاً لمقتضيات العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والثلاثون (الإجازة الدراسية)
  article_text_ar: 'للهيئة أن تمنح العامل إجازة دراسية دون أجر إن كان يحمل شهادة الدراسة الثانوية أو ما يعادلها على الأقل وفق ما تعتمده الهيئة في هذا الشأن من ضوابط وإجراءات، مع مراعاة الآتي: أ- أن يكون قد أمضى في الخدمة مدة لا تقل عن سنتين وحاصلاً على تقدير أداء (جيد جداً) على الأقل. ب- أن يكون لموضوع دراسته علاقة بطبيعة عمله في الهيئة. إن لم يتحقق الغرض الذي من أجله منحت الإجازة الدراسية فلا تحتسب مدة الإجازة الدراسية لأغراض الخدمة أو الترقية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والثلاثون (إجازة الامتحانات الدراسية)
  article_text_ar: تمنح الهيئة العامل الذي يتابع تدريبه أو تحصيله العلمي إجازة بأجر كامل مدة الامتحانات النهائية، وذلك عن سنة غير معادة تحدد مدتها بعدد أيام الامتحان الفعلية، أما إن كان الامتحان عن سنة معادة، فتمنحه إجازة دون أجر لأداء الامتحان. للهيئة أن تطلب من العامل تقديم الوثائق المؤيدة لطلب الإجازة، وكذلك ما يدل على أدائه الامتحان. على العامل أن يتقدم بطلب الإجازة قبل موعدها بخمسة عشر يوماً على الأقل. يحرم العامل من أجر هذه الإجازة إن ثبت أنه لم يؤدِّ الامتحان، مع عدم الإخلال بالمساءلة التأديبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والثلاثون (الإجازة الاستثنائية)
  article_text_ar: يجوز بقرار من الرئيس التنفيذي منح العامل -لأسباب مشروعة تقبلها الهيئة- إجازة استثنائية دون أجر لا تزيد مدتها على سنة واحدة كل ثلاث سنوات من خدمته سواء كانت لمدة متصلة أو مدد متقطعة. للهيئة منح العامل السعودي الراغب في مرافقة زوجِه أو من يعوله العامل شرعاً إلى الخارج للدراسة أو العمل؛ إجازة استثنائية دون أجر، وذلك بقدر مدة المرافقة، وبحد أقصى لا يتجاوز عشر سنوات متصلة أو منفصلة طوال العلاقة التعاقدية، ويعامل العامل إن كان محرماً شرعياً وفق هذه المادة. لا تمنح الهيئة العامل إجازة دون أجر إلاَّ بعد نفاد رصيده من الإجازة العادية، ويؤخذ في الحسبان أن العامل لا يستحق إجازة سنوية عن فترة الإجازة دون أجر مهما كانت مدتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والثلاثون (العمل لدى الغير)
  article_text_ar: لا يجوز للعامل أن يعمل لدى أي جهة أثناء تمتعه بأي إجازة من الإجازات المنصوص عليها في هذا الفصل، سواء كان ذلك بأجر أو دون أجر. وإن ثبت أن العامل خالف ذلك؛ فللهيئة الحق في حرمانه من أجره عن مدة الإجازة، أو أن تسترد منه ما دفعته له من أجر، مع عدم الإخلال بالمساءلة التأديبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثامنة والثلاثون (الوقاية والسلامة)
  article_text_ar: تطبق الهيئة معايير الوقاية والسلامة للعاملين ومكان العمل، ويصدر الرئيس التنفيذي دليلاً لمعايير وإجراءات الوقاية والسلامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة التاسعة والثلاثون (الرعاية الطبية)
  article_text_ar: 'تقدم الهيئة الرعاية الطبية المناسبة لجميع العمال وأفراد عائلاتهم من خلال توفير التأمين الطبي الملائم لهم، ويشمل ذلك الفحوصات الطبية والأدوية وإجراء العمليات الجراحية والإقامة في المستشفيات التي تحددها الهيئة. يقصد بأفراد العائلة الآتي: أ- للسعودي: الوالدان، والأولاد، والزوجة، ومن يعولهم شرعاً. ب- لغير السعوديين: الزوجة والأولاد المعتمدون لدى الهيئة. للهيئة السماح للعامل بالتمتع بمزايا العلاج الطبي حتى لو كان في إجازة دون أجر. \تستمر الهيئة في تقديم الرعاية الطبية لأولاد العامل المتوفى حتى انتهاء صلاحية وثيقة التأمين الطبي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الأربعون (العجز والوفاة وإصابات العمل والأمراض المهنية)
  article_text_ar: فيما يتعلق بالعجز والوفاة وبإصابات العمل والأمراض المهنية، يطبق على العاملين في الهيئة الأحكام ذات العلاقة الواردة في نظام التأمينات الاجتماعية ولوائحه التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الحادية والأربعون (حقوق العامل)
  article_text_ar: 'تلتزم الهيئة بما يأتي: معاملة العامل بشكل لائق يبرز اهتمامها بأحواله ومصالحه، والامتناع عن كل ما من شأنه أن يمس دينه أو كرامته. أن تعطيه الوقت اللازم لممارسة حقوقه المنصوص عليها في اللائحة دون المساس بالأجر. أن تدفع له أجره في الزمان والمكان اللذين يحددهما عقد العمل أو العرف، مع مراعاة ما تقضي به الأنظمة الخاصة بذلك. أن تدفع له أجر المدة التي لا يؤدي فيها العمل إن حضر لمزاولة عمله في الفترة اليومية التي يلزمه بها عقد العمل أو أعلن أنه مستعد لمزاولة عمله في هذه الفترة، وكان عدم مزاولته للعمل بسبب راجع إلى الهيئة. توفير بيئة عمل مناسبة وفقاً للدليل الإرشادي لبيئة العمل المادية في الأجهزة الحكومية. الاحتفاظ بسجل للعامل لدى الهيئة يشتمل على اسمه، ولقبه، ومهنته، وجنسيته، وتاريخ ميلاده، وتاريخ توظيفه، وأجوره، وعنوانه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثانية والأربعون (التزامات العامل)
  article_text_ar: 'يلتزم العامل بما يلي: مراعاة تعاليم الدين الإسلامي والأنظمة والعادات والتقاليد في المملكة. التقيد بالتعليمات والأوامر المتعلقة بالعمل، ما لم يكن فيها ما يخالف نصوص عقد العمل أو النظام العام أو الآداب العامة أو ما يعرِّض المنشأة أو العاملين فيها للخطر. المحافظة على مواعيد العمل. إنجاز عمله على الوجه المطلوب، تحت إشراف الرئيس المباشر ووفق توجيهاته. العناية بالآلات والأدوات الموضوعة تحت تصرفه، والمحافظة عليها وعلى ممتلكات الهيئة. أن يترفع عن كل ما يخل بشرف الوظيفة والكرامة، سواء أكان ذلك في مكان العمل أم خارجه. الالتزام بحسن السيرة والسلوك، والعمل على سيادة روح التعاون بينه وبين زملائه، وطاعة رؤسائه، والحرص على إرضاء عملاء الهيئة في نطاق اختصاصه وفي حدود النظام. تقديم العون والمساعدة في الحالات الطارئة أو الأخطار التي تهدد سلامة مكان العمل أو العاملين فيه، وفي حدود مؤهلاته وقدراته. التقيد بالإرشادات الصحية، وتعليمات الأمن والسلامة. أن يخصص وقت العمل لأداء واجبات وظيفته، وأن ينفذ الأوامر الصادرة إليه بدقة وأمانة في حدود الأنظمة والتعليمات. المحافظة على المعلومات التي يطَّلع
    عليها بسبب عمله في الهيئة. عدم استقبال زائرين في أماكن العمل من غير عمال الهيئة لغير أغراض العمل ومن دون معرفة الرئيس المباشر. عدم ممارسة أي عمل آخر خارج نطاق عمله -سواء أكان ذلك بأجر أم بلا أجر- لدى أي جهة أخرى؛ إلاَّ بعد موافقة صاحب الصلاحية، ويشمل ذلك الاشتغال بالتجارة بطريقة مباشرة أو غير مباشرة. عدم الاشتراك في تأسيس الشركات، أو قبول عضوية مجالس إداراتها، أو أي عمل فيها، إلاَّ بموجب موافقة الهيئة المسبقة. الامتناع عن إساءة استعمال السلطة الوظيفية المخولة إليه، وعن استغلال النفوذ لمصالحه الخاصة. عدم الإدلاء بأي تصريح لوسائل الإعلام والتواصل الاجتماعي أو غيرها عن أمور تتعلق بأعمال الهيئة، إلاَّ بتفويض من صاحب الصلاحية. إبلاغ الهيئة بمقر إقامته، وما يطرأ عليه من تغيير خلال أسبوع على الأكثر من تاريخ حدوث التغيير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: 'مع عدم الإخلال بحق العامل في الالتجاء إلى الجهات الإدارية أو القضائية المختصة، يحق للعامل أن يتظلم إلى إدارة الهيئة من أي تصرف أو إجراء يتخذ في حقه، ولا يضار العامل من تقديم تظلمه. على العامل أن يتقيد -عند رفع تظلمه- بما يأتي: أ- أن يقدم تظلمه كتابيًا، وأن يكون مستنداً إلى وقائع محددة. ب- أن يقدم التظلم إلى رئيسه المباشر، أو إلى من هو أعلى منه وظيفيًّا مباشرة في حالة عدم تسلّم الأول للتظلم أو امتناعه. ج- أن يقدم التظلم خلال خمسة عشر يوم عمل من تاريخ إشعاره بصدور القرار أو الإجراء المتظلم منه. تشكل بقرار من الرئيس التنفيذي لجنة مختصة للنظر في التظلمات، ويحدد القرار مدتها ومهماتها وعدد أعضائها - يكون من بينهم مستشار قانوني- وسكرتاريتها. يتم البت في التظلم في مدة لا تتجاوز ثلاثين يوماً من تاريخ تقديمه، ويبلغ العامل بالنتيجة خلال ثلاثة أيام عمل من تاريخ صدور القرار. يعفى العامل من العمل، ويتقاضى أجراً كاملاً عن اليوم الذي يقضيه في حضور جلسات تظلمه في مواعيدها المحددة وفق مذكرة التبليغ الصادرة من الجهة المختصة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الرابعة والأربعون (انتهاء الخدمة)
  article_text_ar: 'تنتهي خدمة العامل في الحالات الآتية: أ- عدم اجتياز مدة التجربة بنجاح. ب- انتهاء مدة العقد المحدد المدة، ما لم يتفق الطرفان على تجديده كتابياً. ج- اتفاق الهيئة والعامل كتابيًّا على إنهاء العقد أثناء مدة سريانه. د- استقالة العامل، مع مراعاة المدة المحددة في نظام العمل. هـ- فسخ العقد لأحد الأسباب الواردة في نظام العمل. و- ترك العامل العمل في الحالات الواردة في نظام العمل. ز- عجز العامل عجزاً كليًّا عن أداء العمل المتفق عليه، وثبوت ذلك بتقرير طبي معتمد. ح- وفاة العامل. ط- إن ألغت السلطات الحكومية المختصة رخصة عمل العامل غير السعودي أو إقامته، أو قررت عدم تجديدها، أو إبعاده عن البلاد. ي- بلوغ العامل السعودي ستين سنة، والعاملة السعودية خمسًا وخمسين سنة، في العقود غير محددة المدة. ك- إنهاء عقد العمل لأسباب مشروعة وفق أحكام نظام العمل، أو إذا حكم على العامل بحد شرعي، أو بالسجن مدة تزيد على سنة، أو أُدين في جريمة مخلة بالشرف والأمانة. ل- إلغاء الوظيفة نتيجة لإعادة الهيكلة، أو إنهاء الهيئة لبعض مشروعاتها، مع الالتزام بأحكام نظام العمل فيما يخص مكافأة نهاية الخدمة، وفترة الإشعار،
    وفق عقد العمل. م- إنهاء عقد العمل غير محدد المدة من قبل أي من طرفيه بناءً على سبب مشروع مع مراعاة المدد المحددة في نظام العمل. في الأحوال التي تتطلب فيها أحكام نظام العمل فسخ عقد العمل أو انتهاءه، يجب توجيه إشعار إلى الطرف الآخر يراعى فيه ما يأتي: أ- أن يكون كتابيًا. ب- أن يسلّم في مقر العمل ويوقع عليه الطرف المرسل إليه مع توضيح تاريخ التسلّم. ج- إن امتنع الطرف الموجه إليه الإشعار عن التسلم أو رفض التوقيع فيرسل إليه الإشعار بخطاب مسجل بحسب الآتي: - بالنسبة إلى الهيئة، يوجه الإشعار إلى البريد الإلكتروني الخاص بمدير عام الإدارة العامة للموارد البشرية. - بالنسبة إلى العامل، يوجه الإشعار إلى عنوانه المدون في ملفه أو بريده الإلكتروني. - في جميع الأحوال تحتفظ الهيئة بنسخة من الإشعار وإقرار العامل بالتسلّم أو تأكيد تسلّمه له بأي وسيلة كانت في ملفه. - إن كان الإشعار من جانب الهيئة، فللعامل أن يتغيب خلال مهلة الإشعار يوماً كاملاً في الأسبوع أو ثماني ساعات أثناء الأسبوع، مع استحقاقه لأجر هذا اليوم أو ساعات الغياب وفقاً لما هو منصوص عليه في نظام العمل. تعاد للعامل حال إنهاء أو انتهاء خدمته، وبناء
    على طلبه؛ النسخ الأصلية من شهاداته ووثائقه الخاصة المودعة في ملف خدمته، وتعطي الهيئة العامل شهادة الخدمة المنصوص عليها في نظام العمل، دون مقابل. في كل الأحوال التي تنتهي فيها خدمة العامل لدى الهيئة لأي سبب من الأسباب، للهيئة إجراء مقاصة بين استحقاق العامل واستحقاقاتها عليه التي لم يتم استيفاؤها مهما كان نوع هذه الاستحقاقات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة الخامسة والأربعون (مكافأة نهاية الخدمة)
  article_text_ar: 'يستحق العامل مكافأة نهاية خدمة في الحالات الآتية: أ- انتهاء عقد العمل محدد المدة، أو الاتفاق على إنهائه وفقاً للأحكام المنصوص عليها في نظام العمل. ب- استقالة العامل. ج- غياب العامل نتيجة المرض بعد استنفاد إجازاته المرضية والسنوية. د- عجز العامل عجزاً كليًّا عن أداء العمل، بشرط ثبوت ذلك بتقرير طبي معتمد. هـ- وفاة العامل. و- ترك العامل العمل في الحالات الواردة في نظام العمل. ز- إنهاء عقد العمل لأسباب مشروعة وفق أحكام نظام العمل. يستحق العامل عند نهاية خدمته مكافأة عن الخدمة التي قضاها في الهيئة تحسب على أساس أجر شهر عن كل سنة من سنوات الخدمة، ويُتخذ الأجر الأخير له أساساً لحساب هذه المكافـأة، ويستحق العامل مكافأة عن أجزاء السنة بنسبة ما قضاه منها في العمل. تحتسب جميع البدلات الثابتة ضمن مكافأة نهاية الخدمة دون البدلات التي تكون طبيعتها قابلة للزيادة أو النقصان. إن كان انتهاء علاقة العمل بسبب استقالة العامل، فيستحق في هذه الحالة ثلث المكافأة بعد خدمة لا تقل مدتها عن سنتين متتاليتين، ولا تزيد على خمس سنوات، ويستحق ثلثيها إن زادت مدة خدمته على خمس سنوات متتالية ولم تبلغ عشر
    سنوات، ويستحق المكافأة كاملة إن بلغت مدة خدمته عشر سنوات فأكثر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السادسة والأربعون (أحكام تشغيل النساء)
  article_text_ar: على العاملة في الشهور الأولى للحمل أن تبادر بإبلاغ الهيئة بالحمل، لإجراء الفحص الطبي الدوري عليها، وتقرير العلاج اللازم، وتحديد التاريخ المرجح للولادة بموجب شهادة طبية. يحق للعاملة المرضع أن تأخذ فترات لا تزيد في مجموعها على ساعة في اليوم لإرضاع طفلها، وذلك علاوة على فترات الراحة الممنوحة لجميع العمال، وتحسب هذه الفترة أو الفترات من ساعات العمل الفعلية، ولا يترتب عليها تخفيض الأجر. تعد الهيئة أماكن مستقلة لعمل النساء بمعزل عن الرجال، وعلى النساء العاملات مراعاة الاحتشام في الملبس والمظهر وفق ما تقرره الهيئة في هذا الشأن والتقيد بالعادات والتقاليد المراعاة في البلاد. لا يجوز في أي حال من الأحوال خلوة الرجال بالنساء في أماكن العمل وما يتبعه من مرافق وغيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: 'تسري أحكام اللائحة على جميع العاملين والعاملات في الهيئة من السعوديين وغير السعوديين. يستثنى من تطبيق اللائحة المستشارون والخبراء والمتعاونون، وتسري عليهم الأحكام الآتية: أ- تكون الاستعانة بالـموظفين والخبراء العاملين في الجهات الحكومية أو الـمؤسسات العامة أو القطاع الخاص على أساس غير متفرغ، بقرار من الرئيس التنفيذي، وذلك مقابل مكافأة شهرية يقدرها لهم، ويعامل هؤلاء في حالة الانتداب داخل المملكة أو خارجها معاملة جهاتهم لهم في مثل هذه الحالة. ب- يكون التعاقد مع الخبراء المحليين والعالميين للعمل في أي من مشروعات الهيئة بقرار من الرئيس التنفيذي، وذلك مقابل مكافأة شهرية يقدرها لهم، على أن يتم التعاقد وفقاً لأحكام نمــوذج اتفاقية خاصة يعتمدها الرئيس التنفيذي في هذا الشأن. ج- للرئيس التنفيذي التعاقد مع المحالين إلى التقاعد، مقابل مكافأة شهرية يحددها لكل واحد منهم بقرار منه بالنظر إلى طبيعة المهام المسندة إلى كل منهم، على أن يكون التعاقد مع كل منهم بموجب اتفاق يُعد لهذا الغرض. يصدر الرئيس التنفيذي دليل الصلاحيات الإدارية والقرارات والإجراءات المنفذة لأحكام اللائحة. تسري أحكام
    نظام العمل ولائحته التنفيذية والقرارات الوزارية الصادرة تنفيذاً له، فيما لم يرد في شأنه نص ضمن اللائحة. تسري أحكام اللائحة اعتباراً من تاريخ اليوم التالي لاعتمادها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2ae2b616-e5c9-4b81-b55e-ae3d00acbf1a/1
  verified: false
