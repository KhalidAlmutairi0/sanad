regulation:
  code: BOE200
  name_ar: النظام الأساسي للاتحادات الرياضية واللجنة الأولمبية العربية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: الاتِّحاد الرياضي لكُل لعبة أو نشاط لهُ علاقة بالرياضة يُعتبر هيئة رياضية ذات شخصية اعتبارية، تُساعِدُها الدولة على تحقيق أهدافِها ماديًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتكون الاتِّحاد الرياضي لكُل لعبة أو نشاط رياضي من الأندية والأجهزة والمؤسسات التي لها نشاط ملموس في لعبة أو نشاط الاتِّحاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف الاتِّحاد الرياضي لكُل لُعبة أو نشاط إلى رفع المُستوى الفني والارتِقاء بمُستوى المُشاركين من جميع النواحي الفنية والثقافية والاجتِماعية، وتوطيد العلاقات الطيبة مع الاتِّحادات المُماثِلة في الدول العربية والإسلامية والدول الصديقة، وذلك إضافة للاتحاد العربي والآسيوي والدولي للُعبة الاتحاد أو نشاطِه ضِمن مبادئ وتعاليم الدين الإسلامي الحنيف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يختص الاتِّحاد الرياضي لكُل لُعبة أو نشاط بالإشراف على تنظيم وإدارة شؤون لُعبتِه أو نشاطِه في جميع أنحاء المملكة، ولهُ وحده حق تمثيل المملكة في المؤتمرات والاجتِماعات أو الدورات والمُسابقات أو المُباريات التي تُقام على المُستوى العربي أو القاري أو الدولي، سواء أُقيمت داخِل المملكة أو خارجها، كما يُشرف على شؤون أعمالِه الإدارية والفنية والمالية، ويُصدِر في سبيل ذلك التعليمات واللوائح المُنظِمة له، والتي تضمن تحقيق ونجاح أهدافِه، وذلك في إطار السياسة العامة للرئاسة العامة لرعاية الشباب ، والأُسس والمبادئ التي تُحدِّدُها اللجنة الأولمبية العربية السعودية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يلتزم أعضاء الاتِّحاد والمُنتمون لهُ من الأندية والأجهِزة والمؤسسات بتعليمات ولوائح وأنظِمة الاتِّحاد والرئاسة العامة لرعاية الشباب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يُصدِر الرئيس العام لرعاية الشباب ، القواعِد اللازِمة لتشكيل أو إعادة تشكيل مجالِس إدارة الاتِّحادات، واللوائح التنفيذية التي تُنظم أعمالها من جميع النواحي الإدارية والفنية والمالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يُصدِر الرئيس العام لرعاية الشباب قرارًا بتشكيل أو إعادة تشكيل مجالِس إدارات هذه الاتِّحادات مرة كُل أربع سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تُعتبر اللجنة الأولمبية العربية السعودية هيئة رياضية ذات شخصية اعتبارية، تُساعِدُها الدولة على تحقيق أهدافِها ماديًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تتكون اللجنة الأولمبية العربية السعودية مِن مُمثِلي الاتِّحادات الرياضية والأجهزة والمؤسسات وغيرِها من المُهتمين بالنشاط الأولمبي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تهدِف اللجنة الأولمبية العربية السعودية إلى تعميق وترسيخ المبادئ والقواعِد الأولمبية، وتوطيد العلاقات الطيبة مع اللِّجان الأولمبية المُماثِلة في الدول العربية والدول الإسلامية والدول الصديقة، إضافة للجنة الأولمبية الدولية، وذلك ضِمن إطار السياسة العامة للمملكة، وتعليمات وأنظِمة الرئاسة العامة لرعاية الشباب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تختص اللجنة الأولمبية العربية السعودية ، برسم السياسة الخاصة بنشاطات الاتِّحادات الرياضية بالمملكة، والتنسيق فيما بينِها، والإشراف على مُنتخبات المملكة بمُختلف الألعاب عند مُشاركتِها في الدورات العربية أو الآسيوية أو الأولمبية. ولها وحدِها حق تمثيل المملكة في المؤتمرات والاجتِماعات التي تجرى على المُستوى الأولمبي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يضع الرئيس العام لرعاية الشباب القواعد اللازمة لتشكيل مجلس إدارة اللجنة الأولمبية العربية السعودية واللوائح والتعليمات المنظمة لأعمالها من جميع النواحي الإدارية والمالية والفنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يُصدِر الرئيس العام لرعاية الشباب قرارًا بتشكيل أو إعادة تشكيل مجلِس إدارة اللجنة الأولمبية العربية السعودية مرة كُل أربع سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا يجوز استِعمال اسم أو شِعار اللجنة الأولمبية العربية السعودية والاتِّحادات الرياضية إلا بإذن خاص مِنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'تتكون إيرادات الاتِّحادات الرياضية واللجنة الأولمبية العربية السعودية من الآتي: أ - الإعانة التي تُخصَّص في ميزانية الدولة لتغطية نشاطات الاتِّحادات الرياضية واللجنة الأولمبية العربية السعودية . ب - ما قد يُخصَّص من إيرادات المُباريات.ج - التبرُّعات والهِبات التي يوافِق عليها مجلِس الإدارة المُختص.د - رسوم الانتِساب والاشتِراكات التي يُقرُّها مجلِس الإدارة المُختص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يُلغي هذا النِّظام كُل ما يتعارض معهُ من أنظِمة أو قرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يُنشر هذا النِّظام في الجريدة الرسمية، ويُعمل بِه بعد ثلاثين يومًا من تاريخ نشرِه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/040228ce-9ca5-4666-aab1-a9a700f27c6d/1
  verified: false
