  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبيّـنة أمام كل منها، ما لم يقتض السياق غير ذلك: النظام: نظام التنفيذ. اللائحة: اللائحة التنفيذية للنظام. المجلس: المجلس الأعلى للقضاء. الوزارة: وزارة العدل. الوزير: وزير العدل. المحكمة: محكمة التنفيذ. الإدارة المختصة: الوحدة الإدارية في الوزارة أو في المحكمة المعنية بمباشرة إجراء من إجراءات التنفيذ وفقًا لما ورد في النظام واللائحة. الجهة المختصة: الجهة العامة المختصة نظامًا بأعمال ذات صلة بالتنفيذ. الجهة المشرفة على الأموال أو تسجيلها: الجهة العامة المختصة نظامًا بالإشراف على نوع من أنواع الأموال -سواءً أكانت ثابتة أم منقولة- أو تسجيل ملكيتها، بما في ذلك الجهة العامة المختصة بالإشراف على المؤسسات المالية والجهة العامة المختصة بالإشراف على السوق المالية. القوة المختصة: الشرطة أو الجهة الأمنية المختصة لدعم التنفيذ باستعمال القوة الجبرية. التنفيذ المباشر: تنفيذ السند التنفيذي متى كان محل الحق فيه أداء فعل أو امتناعًا عن فعل. مصروفات التنفيذ: الالتزامات المالية المترتبة على إجراءات التنفيذ وفقًا للأحكام
    المنظمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتكون المحكمة من دوائر ابتدائيّة ودوائر استئناف، أو من دوائر ابتدائيّة فقط. يكون استئناف الأحكام الصادرة من الدوائر الابتدائيّة في المحكمة التي ليس فيها دوائر استئناف؛ أمام دوائر الاستئناف في المحكمة التي يحددها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: على جميع الجهات المختصة -ومنها الجهات المشرفة على الأموال أو تسجيلها- الاستجابة لأوامر وقرارات المحكمة ذات الصلة بالتنفيذ وإجراءاته خلال مدة لا تتجاوز (ثلاثة) أيام عمل من تاريخ إبلاغ تلك الجهات بها، وذلك فيما لم يرد في شأنه نص خاص في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: عدا تنفيذ العقوبات الجزائية وما تختص به محاكم ديوان المظالم، تختص المحكمة بالإشراف على التنفيذ وإجراءاته، وبالتنفيذ الجبري وإجراءاته، وتتولى الفصل في منازعات التنفيذ، وإصدار الأحكام والأوامر والقرارات المتعلقة بالتنفيذ. مع مراعاة ما قضت به المادة (التاسعة) من النظام، تتولى المحكمة التحقق من استيفاء السند التنفيذي شروطه النظامية دون النظر إلى أصل الحق محل السند التنفيذي. تحال طلبات التنفيذ وفق قواعد التوزيع التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: إذا تعددت الجهات التي أصدرت أمر الحجز على مال من أموال المنفذ ضده، فعلى المحجوز لديه المال إشعار الجهة التي أصدرت أمر الحجز اللاحق بالحجز الأول. وتحدد اللائحة الأحكام اللازمة لما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: استثناءً من أحكام الاختصاص المنصوص عليها في النظام ونظام التنفيذ أمام ديوان المظالم والأنظمة الأخرى ذات الصلة، إذا اجتمع حجز تنفيذي من جهتين قضائيتين أو من جهة قضائية مع جهة إدارية أو من جهتين قضائيتين مع جهة إدارية على أموال المنفذ ضده؛ فتعد جميع أمواله محجوزة لمصلحة كافة طلبات التنفيذ، وتختص الجهة القضائية التي أصدرت أمر الحجز أولاً بالإشراف على الحجوزات المترتبة على تلك الطلبات وما يتعلق بالبيع وتوزيع الحصيلة وإصدار الأحكام والأوامر والقرارات المتعلقة بذلك، وفق الأحكام المنصوص عليها في نظامها المعني بالتنفيذ. يصدر الوزير -بالتنسيق مع المجلس ومجلس القضاء الإداري- قواعد تبين الأحكام والإجراءات اللازمة لما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'لا يجوز التنفيذ الجبري إلا بسند تنفيذي، اقتضاءً لحقٍّ معيّنٍ حالّ الأداء. والسندات التنفيذية المشمولة بأحكام النظام -دون إخلال بالسندات التنفيذية المشمولة بنظام التنفيذ أمام ديوان المظالم- هي: أ- الأحكام والأوامر والقرارات النهائية، والأحكام المشمولة بالنفاذ المعجّل؛ الصادرة من محاكم المملكة. ب- أحكام المحكّمين وفقًا للنصوص النظامية ذات الصلة. ج- اتفاقات التسوية ووثائق الصلح الموثّقة وفقًا لنظام التوثيق، أو التي تصدرها الجهات المخولة بذلك نظامًا. د- الكمبيالات والسندات لأمر متى كانت مسجلة في المنصات الإلكترونية الوطنية. وتبين اللائحة الشروط والضوابط والإجراءات المتعلقة بتسجيل الكمبيالات والسندات لأمر في تلك المنصات. هـ- الشيكات. و- العقود والإقرارات الموثقة وفقًا لنظام التوثيق. ز- الأحكام والأوامر القضائية، وأحكام المحكمين، واتفاقات التسوية، والمحررات الموثقة؛ الصادرة من دولة أجنبية وفق ما قضت به المادة (التاسعة) من النظام. ح- العقود والمحررات التي لها حكم السندات التنفيذية بموجب نظام أو قرار صادر من مجلس الوزراء. تحدد اللائحة الإجراءات اللازمة لما ورد في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: إذا كان الحق محل السندات التنفيذية، المنصوص عليها في الفقرات الفرعية (ج) و(و) و(ح) من الفقرة (1) من المادة (السابعة) من النظام، معلقًا على تنفيذ التزام لا يعلم تحقق تنفيذه من السند نفسه؛ فيجوز لصاحب الحق التقدم إلى المحكمة بطلب تنفيذ السند مرافقًا له تقرير من إحدى جهات الخبرة التي تعتمدها الوزارة، يثبت فيه تنفيذ ذلك الالتزام. وتحدد اللائحة الأحكام والإجراءات اللازمة لما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'مع مراعاة ما تقضي به التزامات المملكة بموجب المعاهدات والاتفاقيات الدولية، لا يجوز للمحكمة تنفيذ الحكم أو الأمر الأجنبي إلا على أساس المعاملة بالمثل وبعد التحقق من توافر الشروط الآتية: أ- ألا تكون الدعوى الصادر فيها الحكم أو الأمر الأجنبي مما تنفرد بالاختصاص بنظره جهة قضائية في المملكة. ب- ألا تكون هناك دعوى مماثلة قائمة في المملكة سابقة على قيد الدعوى التي صدر الحكم أو الأمر الأجنبي فيها. ج- ‌أنّ الخصوم في الدعوى التي صدر فيها الحكم قد كُلفوا بالحضور، ومُثّلوا تمثيلاً صحيحًا، ومُكِّنوا من الدفاع عن أنفسهم. د- أنّ الحكم أو الأمر الأجنبي أصبح نهائيًّا، وفقًا للأحكام المنظمة للجهة القضائية المختصة التي أصدرته. هـ- أنّ الحكم أو الأمر الأجنبي لا يتعارض مع حكم أو أمر سابق -في الموضوع نفسه- صدر من جهة قضائية مختصة في المملكة. و- ألا يتضمن الحكم أو الأمر الأجنبي ما يخالف أحكام النظام العام في المملكة. يكون تنفيذ أحكام المحكّمين واتفاقات التسوية الصادرة في دولة أجنبية؛ وفق ما تقضي به التزامات المملكة بموجب المعاهدات والاتفاقيات الدولية، وبعد التحقق من توافر الشروط المنصوص عليها
    في الفقرة (1) من هذه المادة. يكون تنفيذ المحررات الموثقة الصادرة في دولة أجنبية بعد التحقق من توافر الشروط المقررة في أنظمة تلك الدولة، وعلى أساس المعاملة بالمثل فيما بين المملكة وتلك الدولة فيما يتصل بشروط تنفيذ المحررات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: للمدين أن يتقدم إلى المحكمة بطلب استيفاء الدائن لحق معين حالّ الأداء وثابت بموجب سند تنفيذي امتنع الدائن عن استيفائه، وتأمر المحكمة في هذه الحالة الدائن باستيفاء حقه، فإن تعذر استيفاء الدائن للحق أثبتت المحكمة ذلك، واتخذت الإجراءات التي تكفل للمدين الوفاء بالحق الثابت في ذمته؛ وفقًا لما تحدده اللائحة. وفي جميع الأحوال، تعدّ التكاليف المترتبة على تنفيذ ما ورد في هذه المادة -إن وجدت- من مصروفات التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: دون إخلال بما تقضي به الأحكام النظامية ذات الصلة، لا يُقبل طلب التنفيذ بموجب سند تنفيذي مضى على تاريخ استحقاقه أكثر من (عشر) سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تحدد اللائحة الحالات التي يجب فيها أن يخطر الدائن المدين بأداء الحق محل السند التنفيذي قبل قيد طلب التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تقيّد الإدارة المختصة طلب التنفيذ بعد تحققها من استيفائه المتطلبات المنصوص عليها في النظام واللائحة، وذلك وفقًا للإجراءات والنماذج التي تحددها الوزارة. إذا قررت الإدارة المختصة عدم قيد طلب التنفيذ، لعدم استيفاء المتطلبات وفقًا لما ورد في الفقرة (1) من هذه المادة؛ فعلى طالب القيد استيفاء ما نقص خلال (عشرة) أيام عمل من تاريخ إبلاغه بذلك، وإن لم يستوفِ ما نقص خلال هذه المدة عُدَّ الطلب مرفوضًا. لطالب القيد التظلم من عدم القيد خلال (عشرة) أيام عمل من تاريخ اعتبار طلبه مرفوضًا، وفق أحكام التظلم على القرارات المنصوص عليها في المادة (السادسة والأربعين) من النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: إذا كان السند مستوفيًا شروطه النظامية، أمرت المحكمة المنفذ ضده بتنفيذه، ويبلغ المنفذ ضده بأمر التنفيذ فور صدوره، فإذا تعذر التبليغ فيُعلن عن أمر التنفيذ عبر الوسيلة المناسبة لذلك، وتسري آثار التبليغ من تاريخ الإعلان. وتحدد اللائحة الأحكام اللازمة لما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'على المنفذ ضده أن يفصح عن أمواله من تاريخ إبلاغه بأمر التنفيذ أو من تاريخ الإعلان وفق ما قضت به المادة (الرابعة عشرة) من النظام. على المحكمة -بناءً على طلب طالب التنفيذ- إذا توافرت قرائن تدل على إخفاء المنفذ ضده أموالَه أو تهريبها أن تأمر بالإفصاح كلاً من: أ- وكلاء المنفذ ضده ومن تربطه بهم علاقة تعاقد عمالية. ب- المتعاملين ماليًّا مع المنفذ ضده، ومدينيه، والمشتبه في محاباتهم له. ج- المحجوز لديه مال من أموال المنفذ ضده. وذلك في حدود ما يحقق الغرض من الإفصاح. وعلى المأمور بالإفصاح أن يستجيب لذلك خلال مدة لا تتجاوز (عشرة) أيام عمل من تاريخ إبلاغه به عبر الوسيلة المناسبة التي تحددها اللائحة. على الجهة المشرفة على الأموال أو تسجيلها تزويد المحكمة بما لديها من بيانات أو معلومات بناءً على أمر صادر من المحكمة، خلال مدة لا تتجاوز (ثلاثة) أيام عمل من تاريخ إبلاغها بالأمر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'على الجهة المشرفة على الأموال أو تسجيلها أو الكيانات التي تشرف عليها وفق النصوص النظامية ذات العلاقة -بحسب الأحوال- القيام بالآتي: إنشاء أو تحديد إدارة (أو أكثر) لتكون مسؤولة عن معالجة الأوامر والقرارات المتعلقة بالتنفيذ. إعداد قواعد بيانات بملكية الأموال الثابتة أو المنقولة وفق ما تحدده اللائحة. تمكين الربط والتكامل الإلكترونيين مع أنظمة الوزارة الإلكترونية ذات الصلة بطلبات التنفيذ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: مع مراعاة ما تقضي به التزامات المملكة بموجب المعاهدات والاتفاقيات الدولية، يكون تبادل الإفصاح عن الأموال مع الدول الأخرى على أساس المعاملة بالمثل، وفي حدود ما يحقق الغرض من تبادل الإفصاح، وبما لا يترتب عليه مساس بالأمن الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'إذا مضت (خمسة) أيام عمل من تاريخ إبلاغ المنفذ ضده بأمر التنفيذ أو من تاريخ الإعلان وفق ما قضت به المادة (الرابعة عشرة) من النظام، ولم ينفذ المنفذ ضده التزامه؛ تبدأ فورًا إجراءات التنفيذ الجبري في الأموال المنصوص عليها في الفقرة (2) من هذه المادة، ما لم يقدم المنفذ ضده ضماناً بنكياً يكفي للوفاء بالحق، فيمهل مدة (عشرة) أيام عمل إضافية. تكون إجراءات التنفيذ الجبري في الأموال وفق الآتي: أ- إشعار الجهات المرخص لها نظامًا بتسجيل المعلومات الائتمانية بواقعة عدم التنفيذ. ب- حجز أموال المنفذ ضده وما يرد إليه مستقبلاً، والتنفيذ عليها، بما في ذلك مستحقاته لدى الجهات العامة؛ وفقًا للأحكام المنظمة لذلك. للمحكمة -إضافةً إلى ما سبق ذكره في الفقرة (2) من هذه المادة- فرض غرامة لا تزيد على (خمسة آلاف) ريال يوميًّا على المنفذ ضده عن كل يوم يمضي دون إتمام التنفيذ، على ألا تتجاوز حدًّا تحدد اللائحة مقداره. وللمحكمة إلغاء الغرامة أو جزء منها إذا نفّذ المنفذ ضده ما عليه من التزام. ولا تستوفى الغرامة إلا بعد الانتهاء من توزيع حصيلة التنفيذ. وتؤول حصيلة الغرامة الإجمالية إلى خزينة الدولة. تحدد
    اللائحة الآليات التي يجوز للمحكمة اتخاذها لإنفاذ الإجراءات المنصوص عليها في الفقرتين (2) و(3) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'إذا انقضت المدة، المنصوص عليها في الفقرة (1) من المادة (الثامنة عشرة) من النظام، تأمر المحكمة بمنع المنفذ ضده من السفر إلى خارج المملكة -بناءً على طلب يقدم من طالب التنفيذ- مدة لا تتجاوز (ثلاث) سنوات، ويجوز للمحكمة تمديدها بناءً على طلب جديد بذلك يقدم من طالب التنفيذ، على ألا تتجاوز مدد المنع من السفر إلى خارج المملكة (ست) سنوات. وفي جميع الأحوال، ينقضي الأمر بالمنع من السفر بانتهاء طلب التنفيذ. لا يخل صدور أمر المنع من السفر إلى خارج المملكة بسلطة الجهات المختصة في إنهاء إقامة غير السعودي، أو أمره بمغادرة المملكة أو إبعاده؛ وذلك وفقًا لما تقضي به النصوص النظامية ذات الصلة. ترفع المحكمة الأمر بالمنع من السفر إلى خارج المملكة في الأحوال الآتية: أ- إذا ظهرت -بموجب تقرير طبي معتمد- حاجة المنفذ ضده إلى العلاج خارج المملكة. ب- إذا كان مجموع الدين أو الديون محل التنفيذ من المبالغ اليسيرة وفق ما تحدده اللائحة. ج- إذا كانت مهنة أو حرفة أو وظيفة المنفذ ضده تستوجب السفر إلى خارج المملكة. د- إذا كان المنع من السفر إلى خارج المملكة سيترتب عليه ضرر بالمنفذ ضده. هأ- إذا أفصح المنفذ
    ضده عن أموال تكفي للوفاء بالدين محل التنفيذ ولا يحول مانع من الاستيفاء منها. تحدد اللائحة الضوابط اللازمة لإنفاذ ما ورد في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: في حال عدم تنفيذ المنفذ ضده لأمر التنفيذ بعد البدء في إجراءات التنفيذ الجبري، تأمر المحكمة بتتبع أمواله بناءً على طلب يقدم من طالب التنفيذ؛ متى توافرت قرائن تدل على إخفاء المنفذ ضده أموالَه أو تهريبها. وتعدّ تكاليف تتبع الأموال من مصروفات التنفيذ. في حدود ما يحقق الغرض من الاطلاع على البيانات أو المعلومات المرتبطة باستيفاء الحق محل السند التنفيذي، تُمكّن المحكمة طالب التنفيذ -بناءً على طلبه- من الاطلاع على البيانات أو المعلومات التي لديها عن أموال المنفذ ضده، وللمحكمة أن تأمر الجهة المشرفة على الأموال أو تسجيلها بتمكين من أسند إليه عمل من أعمال التنفيذ من الاطلاع على بيانات ومعلومات أموال المنفذ ضده المتوافرة لديها. وتحدد اللائحة الضوابط اللازمة لما ورد في هذه الفقرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'للمحكمة -بناءً على طلب طالب التنفيذ- إذا توافرت قرائن تدل على إخفاء المنفذ ضده أمواله أو تهريبها أن تقوم بنفسها، أو من خلال أمر تصدره للإدارة المختصة أو للقطاع الخاص المرخص بتتبع الأموال، باستجواب المنفذ ضده أو من يشتبه في تهريب الأموال إليه من: أقاربه، ووكلائه، ومن تربطه بهم علاقة تعاقد عمالية، والمتعاملين معه ماليًّا، ومدينيه، والمشتبه في محاباتهم له؛ وفق ما يظهر من القرائن التي تدل على ذلك. على المطلوب للاستجواب -وفقًا لما ورد في الفقرة (1) من هذه المادة- أن يستجيب لذلك خلال مدة لا تتجاوز (ثلاثة) أيام عمل من تاريخ إبلاغه بالأمر عبر الوسيلة المناسبة التي تحددها اللائحة. ويجوز للمحكمة -عند الاقتضاء- الأمر بإحضاره بالقوة الجبرية لاستجوابه أمام المحكمة. للمحكمة أن تأمر الجهة المختصة، أو الجهة المشرفة على الأموال أو تسجيلها، بتتبع أموال المنفذ ضده ومن يشتبه في تهريب الأموال إليه، وتزويد المحكمة بتقرير بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تحدد اللائحة ضوابط وإجراءات تتبع الأموال المنصوص عليه في هذا الفصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: جميع أموال المنفذ ضده ضامنة لديونه من تاريخ إخطاره بطلب أداء الحق وفق ما قضت به المادة (الثانية عشرة) من النظام، أو من تاريخ إبلاغه بأمر التنفيذ أو من تاريخ الإعلان وفق ما قضت به المادة (الرابعة عشرة) من النظام. يقع الحجز والتنفيذ على مال المنفذ ضده المحجوز حجزًا تحفظيًّا من جهة مختصة، وعلى الجهة المحجوز لديها مال المنفذ ضده حجزًا تحفظيًّا إشعار الحاجز حجزًا تحفظيًّا بإيقاع الحجز التنفيذي. وتحدد اللائحة الإجراءات اللازمة لإنفاذ ما ورد في هذه الفقرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: 'يجوز لطالب التنفيذ أن يتقدم إلى المحكمة بدعوى إبطال تصرف المنفذ ضده، إذا ثبت أنه تصرف بأي مالٍ من أمواله من تاريخ إخطاره بطلب أداء الحق وفق ما قضت به المادة (الثانية عشرة) من النظام، أو من تاريخ إبلاغه بأمر التنفيذ أو من تاريخ الإعلان وفق ما قضت به المادة (الرابعة عشرة) من النظام، وذلك قبل صدور الأمر بالحجز على المال، وتحكم المحكمة -في مواجهة من انتقل إليه المال- بإبطال التصرف كله أو بعضه في حدود مقدار السند التنفيذي؛ إذا كان تصرف المنفذ ضده من التصرفات الآتية: أ- الهبات والتبرعات. ب- الوفاء بدين قبل حلوله. ج- العقود والالتزامات المالية غير المعتادة من مثله، وفق ما تقدره المحكمة. يكون تصرف المنفذ ضده باطلاً إذا تصرف بالأموال محل التنفيذ بعد صدور الأمر بالحجز عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: لا يجوز حجز أموال المنفذ ضده إلا بمقدار الدين المطالب به، ما لم يكن المال المحجوز عليه غير قابل للتجزئة. تحدد المحكمة أموال المنفذ ضده محل التنفيذ بما يحقق سرعة الوفاء، سواء أكان ذلك قبل صدور الأمر بالحجز عليها أم بعده. وتبين اللائحة الضوابط المتعلقة بما ورد في هذه الفقرة. يجوز للمنفذ ضده إذا أثبت أن لديه أموالاً أكثر من مقدار الحق محل السند التنفيذي المراد استيفاؤه؛ أن يحدد مالاً تكون له الأولوية في التنفيذ عليه، وعلى المحكمة أن تأخذ بذلك ما لم يُخِل بمصلحة التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'لا يجوز الحجز والتنفيذ على ما يأتي: الأموال العامة. الدار التي يسكنها المنفذ ضده أو من يعولهم أو وسيلة نقل المنفذ ضده أو من يعولهم، إذا لم تتجاوز مقدار كفايتهم، وكذلك ما يلزم المنفذ ضده لمزاولة مهنته أو حرفته بنفسه، ومستلزماته الشخصيّة. ويجوز الحجز والتنفيذ على أي من الأموال المذكورة في هذه الفقرة إذا كان مرهونًا للدائن أو إذا كان هو عين مال طالب التنفيذ. الأجور والرواتب إلا فيما يأتي: أ- مقدار النصف من إجمالي الأجر أو النصف من إجمالي الراتب؛ لدين النفقة. ب- مقدار الثلث من إجمالي الأجر أو الثلث من إجمالي الراتب؛ للديون الأخرى. وعند التزاحم، يخصص نصف إجمالي الأجر أو الراتب لدين النفقة، وثلث النصف الآخر للديون الأخرى، وفي حال تعدد هذه الديون يوزع ثلث النصف بين الدائنين. معاش التقاعد المدني والعسكري إلا فيما يأتي: أ- مقدار النصف من إجمالي المعاش لدين النفقة. ب- مقدار الربع من إجمالي المعاش للديون الأخرى. وعند التزاحم، يخصص نصف إجمالي المعاش لدين النفقة، وربع النصف الآخر للديون الأخرى، وفي حال تعدد هذه الديون يوزع ربع النصف بين الدائنين. الإعانات الحكومية المقدمة للمنفذ ضده.
    ما يصدر به قرار من مجلس الوزراء. وتحدد اللائحة الأحكام والإجراءات اللازمة لإنفاذ ما ورد في الفقرات (1) و(2) و(3) (4) و(5) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: على الجهة المشرفة على الأموال أو تسجيلها أن تنفذ فوراً الحجز الذي تأمر به المحكمة. إذا اقتضى تنفيذ الحجز استعمال القوة الجبرية، فللمحكمة أن تأمر القوة المختصة بذلك. تحدد اللائحة إجراءات الحجز على الأموال، وإيداعها، وإدارتها، والحراسة عليها، بما في ذلك إجراءات الحجز على الأموال التي تستحق للمدين مستقبلاً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: إذا توافر لدى المحكمة أدلة أو قرائن تدل على ارتكاب المنفذ ضده أو غيره سلوكًا جرميًّا بإخفاء أموال المنفذ ضده أو تهريبها أو تبديدها أو تقديم بيانات أو معلومات مضللة أو غير صحيحة أمام المحكمة؛ فتحيل الواقعة إلى الجهة المختصة بالتحقيق لاتخاذ المقتضى النظامي وفقًا للنصوص النظامية ذات العلاقة، ولا يحول ذلك دون الاستمرار في إجراءات التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: للمحكمة تمكين المنفذ ضده من بيع أمواله طوعًا بما يحقق مصلحة التنفيذ. وتحدد اللائحة الأحكام المتعلقة بما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: فيما عدا ما ورد في المادة (التاسعة والعشرين) من النظام وما تحدده اللائحة، تباع الأموال المحجوزة عن طريق المزاد العلني. يكون وقت انعقاد العقد المنتج لآثاره في البيع بصدور قرار الترسية لمن رسا عليه البيع. يكون قرار الترسية مطهرًا للمال المباع من أي استحقاق تجاه من رسا عليه البيع. تباع الأوراق المالية الخاضعة لنظام السوق المالية وفق ضوابط يُتفق عليها مع الجهة المختصة بالإشراف على السوق المالية، بما يحقق عدالة السعر وضمانات التنفيذ. تحدد اللائحة الأحكام اللازمة لما ورد في الفقرات (1) و(2) و(3) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: لا يسلم ثمن المبيع لطالب التنفيذ -ومن يقوم مقامه- إلا بعد إكمال إجراءات نقل الملكية من الجهة المختصة. إذا طلب من انتقل إليه عقار -وفق أحكام هذا الفصل- من شاغل العقار إخلاءه، فيجب على شاغل العقار إخلاؤه ما لم يكن شاغلاً للعقار بسند تنفيذي يتضمن حقًّا في استغلال العقار. فإن امتنع شاغل العقار عن إخلائه، فتتخذ المحكمة في شأن الممتنع الإجراءات المنصوص عليها في المادة (السادسة والثلاثين) من النظام، وذلك بناءً على طلب يقدمه من انتقل إليه العقار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: دون إخلال بما ورد في الفقرة (2) من هذه المادة، يتحمّل المنفذ ضده مصروفات التنفيذ، ما لم يكن سبب مصروفات التنفيذ عائدًا لغيره؛ فيتحملها المتسبب بقرار تصدره المحكمة، ويكون قابلاً للاعتراض عليه وفقًا للإجراءات المنظمة لذلك. يتحمل طالب التنفيذ مصروفات التنفيذ إذا أنهى طلب التنفيذ وفقًا للفقرتين الفرعيتين (ه) و(و) من الفقرة (1) من المادة (الثالثة والأربعين) من النظام، ما لم يتفق طالب التنفيذ مع المنفذ ضده على خلاف ذلك. دون إخلال بما ورد في الفقرة (1) من هذه المادة، إذا اقتضى الحال تسليم مصروفات التنفيذ؛ فيسلمها المنفذ ضده، فإن امتنع سلّمها طالب التنفيذ أو من له مصلحة في طلب التنفيذ من أطراف التنفيذ، فإن لم تُسلم مصروفات التنفيذ فتُوقف إجراءات التنفيذ المنصوص عليها في النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: تفتح الوزارة حسابات مصرفية وصناديق للأمانات لغرض التنفيذ، ويكون إيداع حصيلة التنفيذ وصرفها وإدارة الحسابات المصرفية وصناديق الأمانات وفق الضوابط والإجراءات التي تحددها اللائحة. تبين اللائحة -بالتنسيق مع البنك المركزي السعودي- الأحكام والإجراءات المتعلقة بمشاركة البنوك -وما في حكمها- في إجراءات التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: إذا كانت حصيلة التنفيذ كافية للوفاء بحقوق طالبي التنفيذ الحاجزين ومن يُعَدُّ طرفًا في إجراءات التنفيذ وفقًا لأحكام النظام، فتأمر المحكمة بتوزيع حصيلة التنفيذ بينهم وفق ما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 'إذا كانت حصيلة التنفيذ لا تكفي للوفاء بحقوق طالبي التنفيذ الحاجزين ومن يُعَدُّ طرفًا في إجراءات التنفيذ وفقًا لأحكام النظام، فتتخذ المحكمة الآتي: إذا اتفق طالبو التنفيذ الحاجزون ومن يُعَدُّ طرفًا في الإجراءات على تسوية ودية فيما بينهم لتوزيع الحصيلة؛ تثبت المحكمة اتفاقهم في محضر وتأمر بالتوزيع وفق مقتضى الاتفاق الوارد فيه. إذا لم يتفق طالبو التنفيذ الحاجزون ومن يُعَدُّ طرفًا في الإجراءات على تسوية ودية فيما بينهم لتوزيع الحصيلة؛ تأمر المحكمة بتوزيع الحصيلة بينهم مع مراعاة تقديم الديون الممتازة المتعلقة بأي منهم على سائر الديون وفقًا للأحكام النظامية المنظمة لذلك والضوابط التي تحددها اللائحة. ويكون الأمر الصادر بتوزيع الحصيلة قابلاً للاعتراض عليه وفقًا للإجراءات المنظمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 'إذا كان محل التنفيذ فعلاً أو امتناعًا عن فعل، ولم يُنفذ المنفذ ضده التزامه خلال (خمسة) أيام عمل من تاريخ إبلاغه بأمر التنفيذ أو من تاريخ الإعلان وفق ما قضت به المادة (الرابعة عشرة) من النظام؛ فتتخذ إجراءات التنفيذ الجبري الآتية: تأمر المحكمة فورًا باستعمال القوة المختصة للقيام بما يلزم من إجراءات التنفيذ، وذلك ما لم يتطلب التنفيذ أن يقوم به المنفذ ضده بنفسه. تخاطب المحكمة فورًا الجهة المختصة -عند الاقتضاء- لتنفيذ الحق محل السند التنفيذي. إذا تعذر التنفيذ باستعمال القوة المختصة، أو عن طريق الجهة المختصة، أو اقتضى التنفيذ قيام المنفذ ضده به بنفسه ولم يقم بذلك؛ فتتخذ إجراءات التنفيذ الجبري الآتية: ‌أ- تأمر المحكمة بمنع المنفذ ضده من السفر إلى خارج المملكة -بناءً على طلب يقدم من طالب التنفيذ- وفقًا لأحكام المادة (التاسعة عشرة) من النظام. ب- تفرض المحكمة غرامة لا تزيد على (عشرة آلاف) ريال يوميًّا على المنفذ ضده عن كل يوم يمضي دون إتمام التنفيذ، على ألا تتجاوز حدًّا تحدد اللائحة مقداره. وللمحكمة إلغاء الغرامة أو جزء منها إذا نفذ المنفذ ضده ما عليه من التزام. وتؤول حصيلة الغرامة
    الإجمالية إلى خزينة الدولة. وتحدد اللائحة الضوابط والإجراءات اللازمة لما ورد في هذه المادة، بما في ذلك ضوابط وإجراءات إخلاء العقار والتصرف بالمنقولات الموجودة فيه إذا لم يتسلمها مالكها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: إذا مضى (ثلاثون) يوم عمل على اتخاذ أي من إجراءات التنفيذ الجبري الواردة في المادة (السادسة والثلاثين) من النظام ولم يُنفذ المنـفذ ضده التزامه، فتأمر المحكمة -بناءً على طلب طالب التنفيذ- بحبس المنفذ ضده لإجباره على التنـفيذ بما لا يزيد على (مائة وثمانين) يومًا، يجوز تمديدها مدةً أخرى بناءً على طلب طالب التنفيذ. لا يجوز حبس المنفذ ضده وفقًا للفقرة (1) من هذه المادة إذا لم يتجاوز الثامنة عشرة من عمره، أو ثبت -بموجب تقرير طبي معتمد- إصابته بمرض لا يتحمل معه الحبس، أو إذا كان امرأة حاملاً أو لها طفل لم يتجاوز الثانية من عمره، أو إذا كان المنفذ ضده أحد أصول أو فروع طالب التنفيذ. ينفذ حبس المنفذ ضده وفقًا للفقرة (1) من هذه المادة بمعزل عن المسجونين في القضايا الجزائية. لا ينقضي الحق محل السند التنفيذي بانتهاء مدة الحبس وفقًا للفقرة (1) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: ينفذ السند التنفيذي المتعلق بمسائل الأحوال الشخصية بالطرق المقررة في النظام واللائحة. تبين اللائحة إجراءات التنفيذ في مسائل الأحوال الشخصية المتضمنة دفع أموال بشكل دوري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: ينفذ -جبرًا- السند التنفيذي الصادر بالحضانة، والزيارة، حتى لو أدى ذلك إلى الاستعانة بالقوة المختصة وإلى دخول المنازل بحسب ما يقتضيه الحال، ويعاد تنفيذ السند التنفيذي كلما اقتضى الأمر ذلك. تسري أحكام التنفيذ المباشر على الممتنع عن التنفيذ في مسائل الأحوال الشخصية وفق ضوابط تحددها اللائحة يراعى فيها طبيعة مسائل الأحوال الشخصية وظروف التنفيذ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: تراعي المحكمة في تنفيذ السند التنفيذي الصادر بزيارة المحضون ما يحقق مصلحته، ويتناسب مع ظروف التنفيذ. وتحدد اللائحة الأحكام اللازمة لإنفاذ ما ورد في هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: تسري أحكام التنفيذ المباشر -في التنفيذ على الشخصية الاعتبارية الخاصة- على المتسبب في إعاقة التنفيذ من منسوبي الشخصية الاعتبارية الخاصة وفق الضوابط والإجراءات التي تحددها اللائحة. مع مراعاة ما ورد في الفقرة (1) من هذه المادة، تبين اللائحة الأحكام والإجراءات المتعلقة بالتنفيذ على الشخصية الاعتبارية الخاصة وفقًا لأحكام النظام والأنظمة ذات الصلة، وبما يتفق مع طبيعة التنفيذ على هذه الشخصية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: على طالب التنفيذ إنهاء طلبه بعد استيفاء الحق محل السند التنفيذي، وذلك خلال المدة التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: 'ينتهي طلب التنفيذ في الأحوال الآتية: أ- إذا استوفي الحق محل السند التنفيذي. ب- إذا ثبت للمحكمة عدم وجود أموال للمنفذ ضده. وتصدر المحكمة قرارًا بإنهاء طلب التنفيذ تبعًا لذلك، ويكون قابلاً للاعتراض عليه وفقًا للإجراءات المنظمة لذلك. ج- إذا اتُّخذت جميع إجراءات التنفيذ المنصوص عليها في النظام واللائحة، ومضت -بعد آخر إجراء- المدة المحددة لطلب التنفيذ. د- إذا تعذر تنفيذ طلب التنفيذ. وتصدر المحكمة قرارًا بإنهاء طلب التنفيذ تبعًا لذلك، ويكون قابلاً للاعتراض عليه وفقًا للإجراءات المنظمة لذلك. هـ- إذا أنهى طالب التنفيذ طلب التنفيذ بناءً على اتفاق بينه وبين المنفذ ضده أو لأي سبب آخر. و- إذا أبرأ طالب التنفيذ ذمة المنفذ ضده من الحق محل السند التنفيذي. لا يخل ما ورد في الفقرات الفرعية (ب) و(ج) و(د) و(ه) من الفقرة (1) من هذه المادة، بحق الدائن في استكمال طلب التنفيذ مرة أخرى -وفقًا لأحكام النظام- إذا توافر ما يسوغ ذلك. تحدد اللائحة الضوابط والإجراءات اللازمة لما ورد في هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: فيما عدا ما حدده النظام، تكون جميع أوامر وقرارات المحكمة نهائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: دون إخلال بما نصت عليه الفقرة (٢) من المادة (الرابعة) من النظام، لمن له مصلحة من أطراف التنفيذ أو من غيرهم أن يتقدم بمنازعة تنفيذ تتعلق بصحة السند التنفيذي أو شروط تنفيذ السند التنفيذي أو اختصاص المحكمة بتنفيذه. تفصل المحكمة في منازعة التنفيذ وفقًا للأحكام المنظمة للدعاوى المستعجلة والإجراءات التي تحددها اللائحة. يحدد المجلس منازعات التنفيذ التي لا يجوز استئناف الأحكام الصادرة فيها. يكون الحكم الصادر من دوائر الاستئناف، في الأحكام الصادرة في منازعات التنفيذ التي يجوز استئنافها؛ غير قابل للاعتراض عليه بطريق النقض. استثناءً من الحكم الوارد في الفقرة (4) من هذه المادة، للمجلس أن يحدد منازعات التنفيذ التي يجوز الاعتراض على الأحكام الصادرة فيها بطريق النقض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: لكل ذي مصلحة أن يتظلم من الأوامر والقرارات المتعلقة بإجراءات التنفيذ -التي تحددها اللائحة- الصادرة من المحكمة أو الإدارة المختصة أو القطاع الخاص. يكون التظلم والفصل فيه لدى رئيس المحكمة أو من يحدده المجلس، خلال (عشرة) أيام عمل من اليوم التالي لتاريخ إتاحة الاطلاع على القرار أو الأمر وفق ما تحدده اللائحة. ويجوز لرئيس المحكمة أو من يحدده المجلس -بحسب الحال- إيقاف تنفيذ الأمر أو القرار المتظّلم منه متى تحققت المصلحة في ذلك إلى حين البت في التظلم، ويترتب على إيقاف تنفيذ الأمر أو القرار توقف جميع الإجراءات والمهل المتعلقة به. في جميع الأحوال، يكون القرار الصادر في شأن التظلم المنصوص عليه في هذه المادة نهائيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: لا يحول وجود منازعة تنفيذ، أو نزاع في أصل الحق محل السند التنفيذي، أو تظلم من أي إجراء من إجراءات التنفيذ؛ دون الاستمرار في سير إجراءات التنفيذ وفقًا لأحكام النظام واللائحة، ما لم يقرر المختص بنظر النزاع أو التظلم خلاف ذلك. يترتب على وقف إجراءات التنفيذ توقف جميع الإجراءات والمهل المتعلقة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: فيما عدا ما ورد في الفقرة (1) من المادة (السابعة والخمسين) من النظام، تتولى المحكمة المختصة النظر في الدعاوى الناشئة من تطبيق الأحكام الواردة في هذا الباب وإيقاع العقوبات المقررة فيها. تتولى الجهة المختصة بالتحقيق والادعاء مهمة التحقيق والادعاء أمام المحكمة المختصة عن الجرائم المنصوص عليها في هذا الباب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: 'دون إخلال بالأحكام النظامية ذات العلاقة، يتولى ضبط الجرائم -المنصوص عليها في هذا الباب- موظفون أو عاملون من: الوزارة، أو من أي من الجهات العامة الأخرى، الذين يصدر بتسميتهم قرار من الوزير، وتكون لهم صفة الضبط الجنائي. وتبين اللائحة صلاحياتهم وكذلك الإجراءات والضوابط التي يتعين عليهم التقيد بها في أداء مهماتهم وممارسة صلاحياتهم. لا يخل ما ورد في الفقرة (1) من هذه المادة بصلاحية المحكمة في إحالة الأفعال التي تشكل جرائم -المنصوص عليها في هذا الباب- بشكل مباشر إلى الجهة المختصة بالتحقيق والادعاء لاستكمال ما يلزم وفقًا للنصوص النظامية ذات الصلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: 'يعاقب بالسجن مدة لا تزيد على (ثلاث) سنـوات وبغرامة لا تزيد على (مليون) ريال، أو بإحدى هاتين العقوبتين؛ كل من ارتكب أيًّا من الجرائم الآتية: أ- إخفاء الأموال، أو تهريبها؛ وذلك بقصد الحيلولة دون استيفاء الحق محل السند التنفيذي وفقًا لأحكام النظام. ب- تعمد تعطيل التنفيذ، وذلك بالامتناع عن تنفيذ أمر التنفيذ الصادر في حقه، أو بالامتناع عن الإفصاح عما لديه من أموال، أو بإقامة دعوى بقصد تعطيل التنفيذ، أو بالتصرف بالأموال محل التنفيذ بعد صدور الأمر بالحجز عليها، أو بعدم الاستجابة للاستجواب؛ وذلك وفقًا لأحكام النظام. ج- مقاومة التنفيذ، بأن هدد أو تعدى بنفسه -أو بوساطة غيره- على موظف أو مرخص له أثناء تأديته لأعمال التنفيذ أو بسببها، أو هدد أو تعدى على طالب التنفيذ بسبب التنفيذ، أو قام بأي فعل آخر غير مشروع بقصد مقاومة التنفيذ. د- تقديم بيانات أو معلومات مضللة أو غير صحيحة، بشكل متعمد، أمام المحكمة أو أثناء إجراءات التنفيذ. يعاقب بالعقوبة المقررة في الفقرة (1) من هذه المادة، كل من شارك في ارتكاب جريمة من الجرائم المنصوص عليها في هذه المادة. ويُعد شريكًا في الجريمة كل من اتفق أو
    حرض أو ساعد في ارتكابها مع علمه بذلك إذا ارتكبت الجريمة بناءً على هذا الاتفاق أو التحريض أو المساعدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يعاقب بالسجن مدة لا تزيد على (خمس) سنوات الموظف العام ومن في حكمه إذا منع التنفيذ أو أعاقه، ويُعد ذلك جريمة من الجرائم المخلة بالأمانة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: يعاقب بالسجن مدة لا تزيد على (خمس عشرة) سنة كل مدين ثبت قيامه بتبديد أمواله إذا كانت الأموال كثيرة ولو ثبت إعساره، ويُعد ذلك من الجرائم الكبيرة الموجبة للتوقيف. يضع النائب العام –بعد التنسيق مع وزارة العدل ووزارة المالية- ضوابط ومعايير لتحديد الأموال المنصوص عليها في الفقرة (1) من هذه المادة بحسب أنواع الديون وأموال المدينين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: 'يعاقب بالسجن مدة لا تزيد على (ثلاث) سنوات، وبغرامة لا تزيد على (مائة ألف) ريال، أو بإحدى هاتين العقوبتين؛ كلٌّ من: طالب التنفيذ إذا تقدم بطلب إجراء من إجراءات التنفيذ بقصد الإضرار بالمنفذ ضده، أو إذا ماطل في إنهاء الطلب بعد استيفاء الحق محل السند التنفيذي بقصد الإضرار بالمنفذ ضده. المخول -وفقًا لأحكام النظام- بالاطلاع على البيانات أو المعلومات المتعلقة بأموال المنفذ ضده، إذا أفشاها دون سبب نظامي، ويعاقب بالعقوبة نفسها كل شخص اطلع على تلك البيانات أو المعلومات دون أمر قضائي. مقدم خدمات التنفيذ المرخص له أو تابعيه، إذا أخلَّ أيٌّ منهم بواجباته؛ بتعدّيه أو تهرّبه من تسليم الأموال أو تَسَلُّمِها. المقوم أو وكيل البيع أو تابعيهما، أو المشارك في بيوع المزادات؛ إذا تعمد أيٌّ منهم التأثير في السعر، أو التضليل في عدالة الأسعار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: يعاقب بالسجن مدة لا تزيد على (تسعين) يومًا، وبغرامة لا تزيد على (ثلاثين ألف) ريال، أو بإحدى هاتين العقوبتين؛ كل من امتنع من الوالدين -أو غيرهما- عن تنفيذ أمر تنفيذ صادر بالحضانة، أو الولاية، أو الزيارة، أو قاوم التنفيذ، أو عطّله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: إذا شكل أي فعل من الأفعال التي تشكل جرائم -المنصوص عليها في هذا الباب- جريمة منصوصًا عليها في نظام آخر؛ فتطبق العقوبة الأشد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: يجوز في حالة العود الحكم بمضاعفة العقوبة المحكوم بها للجرائم المنصوص عليها في هذا الباب، حتى لو ترتب عليها تجاوز الحد الأقصى لها على ألا تتجاوز ضعف هذا الحد. ويُعد عائدًا كل من ارتكب أيًّا من الجرائم المحكوم عليه فيها بحكم نهائي؛ خلال (ثلاث) سنوات من تاريخ اكتساب الحكم الصفة القطعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: 'دون إخلال بأي عقوبة أشد منصوص عليها في أي نظام آخر، وفيما لم يرد في شأنه نص خاص في النظام؛ يعاقب مقدم خدمات التنفيذ في حال مخالفته لأي من أحكام النظام أو اللائحة أو لائحة أعمال مقدمي خدمات التنفيذ، بعقوبة (أو أكثر) من العقوبات الآتية: أ-الإنذار. ب- فرض غرامة لا تزيد على (ثلاثمائة ألف) ريال. ج-إيقاف الترخيص مدة لا تزيد على (سنة). د-إلغاء الترخيص. تكوّن بقرار من الوزير لجنة (أو أكثر) لا يقل عدد أعضائها عن (ثلاثة)، ويسمى أحدهم رئيسًا، ويكون من بينهم مختص نظامي؛ تتولى النظر في المخالفات وإيقاع العقوبات المنصوص عليها في الفقرة (1) من هذه المادة، وذلك بحسب نوع المخالفة المرتكبة وجسامتها ومدى تأثيرها، ويعتمد قرار اللجنة الوزير أو من يفوضه بذلك. ويصدر الوزير -بقرار منه- قواعد عمل اللجنة، وتحدد فيها مكافآت أعضائها. يحق لمن صدر ضده قرار من اللجنة المنصوص عليها في الفقرة (2) من هذه المادة، التظلم منه أمام المحكمة الإدارية وفقًا لأحكام نظام المرافعات أمام ديوان المظالم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: للمحكمة المختصة أو اللجنة المنصوص عليها في الفقرة (2) من المادة (السابعة والخمسين) من النظام -بحسب الأحوال- تضمين الحكم أو القرار الصادر منها بتحديد العقوبة النصَّ على نشر ملخصه على نفقة المحكوم عليه أو المخالف في صحيفة محلية (أو أكثر) تصدر في مكان إقامته، فإن لم تكن في مكان إقامته صحيفة ففي أقرب منطقة له، أو نشره في أي وسيلة أخرى مناسبة، وذلك بحسب نوع الجريمة أو المخالفة المرتكبة وجسامتها ومدى تأثيرها، ويكون النشر بعد اكتساب الحكم الصفة القطعية، أو تحصن القرار بفوات ميعاد التظلم منه، أو صدور حكم نهائي برفض التظلم منه. للمحكمة المختصة أو اللجنة المنصوص عليها في الفقرة (2) من المادة (السابعة والخمسين) من النظام -بحسب الأحوال- تضمين الحكم أو القرار الصادر منها بتحديد العقوبة إلزامَ المخالف بحضور برامج تأهيلية معيّنة على نفقته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: فيما لم يرد فيه نص خاص في النظام، تطبق على الإجراءات والمنازعات الواردة في النظام -بما لا يتعارض مع طبيعتها- أحكام نظام المرافعات الشرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: 'فيما عدا إصدار أوامر حبس المنفذ ضدهم لإجبارهم على التنـفيذ المباشر، وأوامر المنع من السفر إلى خارج المملكة، والفصل في المنازعات والتظلمات، وإصدار الأحكام؛ يجوز -بقرار من الوزير- أن تسند إجراءات التنفيذ المنصوص عليها في النظام واللائحة إلى الإدارة المختصة، أو الجهة المختصة بعد الاتفاق معها، أو القطاع الخاص. يشترط فيما يسند من إجراءات التنفيذ إلى القطاع الخاص -وفقًا لما ورد في الفقرة (1) من هذه المادة- أن تستوفي الجهة المسند إليها ما يأتي: أ- أن تكون الجهة مرخصًا لها في المملكة بمزاولة النشاط محل الإسناد. ‌ب- أن تتوافر لدى الجهة الخبرات الفنية والقدرات المالية اللازمة للقيام بالأعمال المسندة بحسب ما تقرره الوزارة. ‌ج- ألا يكون هناك تعارض مصالح لدى الجهة، وإن كان هذا التعارض محتملاً. ‌د- أن تلتزم الجهة بالمحافظة على سرية أي بيانات أو معلومات اطُّلع عليها بسبب قيامها بتقديم الأعمال المسندة إليها، وأن يمتد هذا الالتزام حتى بعد انتهاء الإسناد. تحدد اللائحة الأحكام والإجراءات اللازمة لما ورد في الفقرة (1) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: 'تتولى الوزارة الترخيص لمقدمي خدمات التنفيذ والإشراف عليهم. ويُعد من مقدمي خدمات التنفيذ: وكيل البيع القضائي، والحارس القضائي، ومقدم خدمة استرداد الأصول، ومقدم خدمة تتبع الأموال، ومقدم خدمات تنفيذ أحكام الزيارة في مسائل الأحوال الشخصية، وغيرهم ممن تبينهم اللائحة. يصدر الوزير لائحة تنظم أعمال مقدمي خدمات التنفيذ، بما في ذلك تحديد اختصاصاتهم، وأحكام الترخيص لهم، والضمان المالي المطلوب لذلك، وقواعد تأهيلهم، وواجباتهم، والقواعد والإجراءات المتعلقة بضبط مخالفاتهم، وسياسات تحديد الأجور التي يتقاضونها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: يكون اتخاذ أي قرار أو إجراء من إجراءات التنفيذ الواردة في النظام واللائحة عبر استعمال الوسائل الإلكترونية المعتمدة، ويستغنى عن أي منهما متى تحققت الغاية باستعمال أساليب التقنيات الحديثة المعتمدة، وإذا تعذر تنفيذ أي منهما بالوسائل الإلكترونية المعتمدة أو أساليب التقنيات الحديثة المعتمدة، يكون تنفيذه عبر الطرق العادية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: تصدر الوزارة ما يلزم للعمل بأحكام النظام واللائحة من أدلة إجرائية وقرارات ونماذج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: يصدر الوزير اللائحة خلال (مائة وثمانين) يومًا من تاريخ صدور النظام، ويعمل بها من تاريخ العمل بالنظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: يحل النظام محل نظام التنفيذ، الصادر بالمرسوم الملكي رقم (م / 53) وتاريخ 13 / 8 / 1433هـ، وتعديلاته، ويلغي كل ما يتعارض معه من أحكام. يعمل بالنظام بعد مضي (مائة وثمانين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/67dd54bc-c33a-48c8-8356-b44700a9ab55/1
  verified: false
