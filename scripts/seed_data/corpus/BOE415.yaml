regulation:
  code: BOE415
  name_ar: تنظيم المؤسسة العامة للتقاعد
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات التالية – حيثما وجدت – المعاني الموضحة أمامها ما لم يقتض السياق خلاف ذلك : المؤسسة : المؤسسة العامة للتقاعد. التنظيم : تنظيم المؤسسة العامة للتقاعد. مجلس الإدارة : مجلس إدارة المؤسسة العامة للتقاعد. رئيس المجلس : رئيس مجلس إدارة المؤسسة العامة للتقاعد. المحافظ : محافظ المؤسسة العامة للتقاعد. نظام التقاعد : نظام التقاعد المدني ونظام التقاعد العسكري.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع المؤسسة بالشخصية الاعتبارية العامة وبالاستقلال الإداري والمالي، وترتبط إداريا بوزير المالية ، ومقرها الرئيس في مدينة الرياض، ويجوز إنشاء فروع أو مكاتب لها داخل المملكة، وتؤول إلى المؤسسة جميع الحقوق المترتبة لصندوق التقاعد والالتزامات المترتبة عليه بموجب أنظمة التقاعد السابقة والحالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتولى المؤسسة تنفيذ نظام التقاعد، ولمجلس الوزراء أن يعهد إلى المؤسسة بتنفيذ أي نظام آخر للتقاعد، كما له أن يعهد إليها بإدارة صناديق ادخارية للموظفين المدنيين والعسكريين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف المؤسسة إلى تأمين مورد مالي للمتقاعدين من موظفي الدولة المدنيين والعسكريين والمستفيدين منهم بعد انتهاء خدماتهم الوظيفية بحسب ما يقرره نظام التقاعد، وفقا لمبدأ التكافل الاجتماعي، وتحقيق التواصل بينهم وبين فئات المجتمع في مختلف نشاطاته بما يحقق الاستفادة المشتركة للمتقاعدين والأفراد والمؤسسات، وللمؤسسة في سبيل تحقيق ذلك القيام بما يلي: 1 - تنمية الموارد المالية للمؤسسة سعيا إلى تحقيق التوازن المالي بين موارد المؤسسة والتزاماتها. 2 - دعم النشاطات الخاصة بالمتقاعدين وفقا لما تحدده اللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمؤسسة مجلس إدارة من ثمانية أعضاء، من بينهم رئيس المجلس ونائبه على النحو التالي: - وزير المالية رئيساً - المحافظ نائباً للرئيس - ممثل من وزارة الخدمة المدنية لا تقل مرتبته عن الرابعة عشرة عضواً - ممثل من وزارة الاقتصاد والتخطيط لا تقل مرتبته عن الرابعة عشرة عضواً - ممثل من مؤسسة النقد العربي السعودي لا تقل مرتبته عن الرابعة عشرة عضواً - ممثل من القطاعات العسكرية لا تقل رتبته عن لواء عضواً - اثنان من المتقاعدين من ذوي الخبرة، يعينان بقرار من مجلس الوزراء بناءً على ترشيح وزير المالية عضوين وينعقد مجلس الإدارة مرة كل ثلاثة أشهر على الأقل، وذلك بناء على دعوة من رئيسه أو نائبه، كما ينعقد بناء على طلب (أربعة) من أعضائه على الأقل. ولا يكون انعقاده نظاميا إلا بحضور (ستة) أعضاء على الأقل من بينهم رئيس المجلس أو نائبه. وتصدر قراراته بأكثرية أصوات الحاضرين، وعند التساوي يرجح الجانب الذي صوت معه رئيس الجلسة. ولمجلس الإدارة أن يدعو لحضور جلساته من يرى الاستعانة بهم دون أن يكون لهم حق التصويت.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'مجلس الإدارة هو السلطة العليا في إدارة شؤون المؤسسة وتصريف أمورها، ويشمل ذلك على سبيل المثال لا الحصر ما يأتي: 1 - الإشراف العام على حسن تنفيذ نظام التقاعد ولوائحه التنفيذية، والمراجعة الدورية لأداء المؤسسة، واتخاذ كل ما يراه لبلوغ أهدافها وسير أعمالها. 2 - اعتماد استراتيجية المؤسسة بما يكفل تحقيق أهدافها على الوجه الأكمل وبلوغ أعلى مستويات الفعالية والكفاية في أدائها. 3 - إصدار اللوائح التنفيذية لهذا التنظيم وتعديلها. 4 - إصدار التنظيم الإداري والدليل التنظيمي للمؤسسة. 5 - اعتماد الميزانية السنوية للمؤسسة. 6 - إقرار الحساب الختامي والتقرير السنوي للمؤسسة تمهيدا لرفعهما إلى رئيس مجلس الوزراء ، لاستكمال الإجراءات النظامية. 7 - إقرار سياسات استثمار أموال المؤسسة وقواعده وخططه، واعتماد جميع مشاريع الاستثمار. 8 - اعتماد سلم رواتب موظفي المؤسسة وبدلاتهم ومكافآتهم ومزاياهم، بعد التنسيق مع وزارة المالية ووزارة الخدمة المدنية. 9 - إصدار اللوائح المالية والوظيفية والمحاسبية الخاصة بالمؤسسة، بعد التنسيق مع وزارة المالية، ووزارة الخدمة المدنية. 10 - الموافقة على إنشاء فروع ومكاتب
    للمؤسسة. 11 - تشكيل لجنة مراجعة، تحدد مهماتها وعدد أعضائها ومكافآتهم ومدة عضويتهم لائحة يصدرها مجلس الإدارة، على أن يكون من مهماتها تقويم اللوائح والقواعد والضوابط الرقابية والتأكد من فعاليتها. 12 - تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. 13 - إجراء مراجعة دورية لهذا التنظيم ولنظام التقاعد واقتراح ما يلزم في شأنهما، ورفع ذلك بحسب النظام. 14 - النظر في المواضيع التي يحيلها إليه رئيس مجلس الإدارة. 15 - القيام بأي مهمة أخرى تعهد إليه بموجب نظام التقاعد أو لوائحه، أو بموجب أنظمة أخرى. 16 - تفويض بعض الصلاحيات للمحافظ أو غيره. 17 - تشكيل اللجان المتفرعة من المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تحال القرارات التي يتخذها مجلس الإدارة برئاسة نائب رئيس المجلس إلى رئيس المجلس لاعتمادها. وله أن يعيد إلى مجلس الإدارة القرارات التي لم يعتمدها موضحا مرئياته، على أن يتم ذلك خلال خمسة عشر يوما وإلا فتعد نافذة. وتعرض القرارات المعادة في الجلسة التالية للمجلس، وتعد هذه القرارات نافذة إذا صوت إلى جانبها ستة أعضاء على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يعين المحافظ بالمرتبة الممتازة، وهو الرئيس التنفيذي للمؤسسة ويتولى إدارة شؤونها، ويكون مسؤولا أمام مجلس الإدارة عن الأعمال والمهمات التي ينفذها. وله على وجه الخصوص الصلاحيات والمهمات التالية :'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المؤسسة، يتولى مراجع الحسابات الخارجي – الذي يعينه مجلس الإدارة – مراجعة حسابات المؤسسة؛ ويحدد المجلس أتعابه، فإن تعدد المراجعون فإنهم يكونون مسؤولين بالتضامن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد المؤسسة من: 1 - اشتراكات الموظفين المدنيين والعسكريين المنصوص عليها في نظام التقاعد. 2 - الاشتراكات التي تدفعها وزارة المالية (الخزينة العامة) وما تدفعه الشخصيات الاعتبارية العامة التي يطبق على موظفيها نظام التقاعد. 3 - العوائد الناتجة عن استثمار أموال المؤسسة. 4 - إعانة الدولة التي تتقرر في الميزانية العامة للدولة عند الحاجة. 5 - الموارد الأخرى التي تخصص للمؤسسة بموجب نظام آخر أو لائحة أخرى. 6 - الهبات والوصايا والأوقاف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يقتصر الصرف من أموال المؤسسة ومواردها على تقديم المعاشات والتعويضات وتحقيق أهدافها الأخرى التي ينص عليها هذا التنظيم ولوائحه ونظام التقاعد ولوائحه، ويشمل ذلك تغطية نفقاتها الإدارية بحسب ما تحدده اللوائح الإدارية والمالية للمؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخصص حسابان مستقلان – إضافة إلى الحسابات التشغيلية للمؤسسة – أحدهما مدني والآخر عسكري، وترصد فيهما الحسابات الدورية والسنوية للمؤسسة، وتعتمد على هذا الأساس، وتحدد اللوائح كيفية تحميل كل حساب بما يخصه من مصروفات وإيرادات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا يجوز أن تتجاوز النفقات الإدارية للمؤسسة ما نسبته (5%) خمسة في المائة من مواردها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يخضع موظفو المؤسسة لنظام التقاعد، ويخضع عمالها لنظامي العمل والعمال والتأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ، ويعمل به من تاريخ نشره، ويلغي جميع ما يتعارض معه من أحكام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5160cfca-da74-4008-97e2-a9a700f23b92/1
  verified: false
