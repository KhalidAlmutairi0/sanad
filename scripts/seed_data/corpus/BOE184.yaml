articles:
- article_ref: (الباب الأول) تشكيل الديوان
  article_text_ar: ديوان المظالم هيئة قضاء إداري مستقلة، يرتبط مباشرة بالملك، ويكون مقره مدينة الرياض.ويتمتع قضاء الديوان وقضاته بالضمانات المنصوص عليها في نظام القضاء، ويلتزمون بالواجبات المنصوص عليها فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتألف ديوان المظالم من رئيس بمرتبة وزير، ونائب رئيس أو أكثر، وعدد كاف من القضاة، ويلحق به العدد اللازم من الباحثين والفنيين والإداريين ونحوهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يتم تعيين نواب رئيس الديوان بأمر ملكي ممن تتوفر فيهم شروط شغل درجة رئيس محكمة استئناف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: (الباب الثاني) مجلس القضاء الإداري
  article_text_ar: 'يُنشأ في الديوان مجلس يسمى « مجلس القضاء الإداري » ويتكون من : ـ رئيس ديوان المظالم رئيساً - رئيس المحكمة الإدارية العليا عضواً - أقدم نواب رئيس الديوان عضواً - أربعة قضاة ممن يشغلون درجة قاضي استئناف يسمون بأمر ملكي أعضاء'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: مع عدم الإخلال باختصاصات مجلس القضاء الإداري المنصوص عليها في هذا النظام، يتولى مجلس القضاء الإداري بالنسبة لديوان المظالم ، اختصاصات المجلس الأعلى للقضاء الواردة في نظام القضاء، ويكون لرئيس مجلس القضاء الإداري بالنسبة لديوان المظالم الاختصاصات المقررة لرئيس المجلس الأعلى للقضاء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: ينعقد مجلس القضاء الإداري برئاسة رئيسه مرة كل شهرين على الأقل وكلما دعت الحاجة إلى ذلك، ولا يكون انعقاد المجلس نظاميا إلا بحضور خمسة من أعضائه على الأقل، وتصدر قراراته بأغلبية المجلس، وفي حالة غياب رئيس المجلس يحل محله رئيس المحكمة الإدارية العليا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للمجلس أمانة عامة، ويختار المجلس الأمين العام من بين القضاة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: (الباب الثالث) محاكم الديوان
  article_text_ar: تتكون محاكم ديوان المظالم من الآتي:1 - المحكمة الإدارية العليا .2 - محاكم الاستئناف الإدارية .3 - المحاكم الإدارية .وتؤلف محاكم الاستئناف الإدارية من رئيس وعدد كاف من القضاة لا تقل درجتهم عن درجة قاضي استئناف.وتؤلف المحاكم الإدارية من رئيس وعدد كافٍ من القضاة.ويجوز لمجلس القضاء الإداري إحداث محاكم متخصصة أخرى بعد موافقة الملك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تُباشر المحاكم اختصاصاتها من خلال دوائر متخصصة تكون على النحو الآتي: 1 - دوائر المحكمة الإدارية العليا ، من ثلاثة قضاة.2 - دوائر محاكم الاستئناف الإدارية من ثلاثة قضاة.3 - دوائر المحاكم الإدارية من ثلاثة قضاة، ويجوز أن تكون من قاض واحد.وتشكل دوائر محاكم الاستئناف الإدارية والمحاكم الإدارية من قبل مجلس القضاء الإداري بناء على اقتراح رؤساء المحاكم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: (الفصل الثاني) المحكمة الإدارية العليا
  article_text_ar: 1 - يكون مقر المحكمة الإدارية العليا مدينة الرياض، وتؤلف من رئيس وعدد كاف من القضاة بدرجة رئيس محكمة استئناف. 2 - يسمى رئيس المحكمة الإدارية العليا بأمر ملكي ، وتكون درجته بمرتبة وزير، ولا تنهى خدمته إلا بأمر ملكي. ويشترط أن تتوافر فيه الشروط المطلوبة لشغل درجة رئيس محكمة استئناف وعند غيابه ينوب عنه أقدم قضاتها. ويسمى أعضاء المحكمة الإدارية العليا بأمر ملكي ، بناء على اقتراح مجلس القضاء الإداري . 3 - يكون للمحكمة الإدارية العليا هيئة عامة برئاسة رئيس المحكمة، وعضوية جميع قضاتها، ويكون أقدم قضاتها نائبا له عند غيابه، وتنعقد الهيئة برئاسة الرئيس أو نائبه، ولا يكون انعقادها نظاميا إلا إذا حضره ثلثا أعضائها على الأقل بمن فيهم الرئيس أو من ينوب عنه، وتصدر قراراتها بأغلبية أعضائها. 4 - إذا رأت إحدى دوائر المحكمة الإدارية العليا ـ عند نظرها أحد الاعتراضات العدول عن مبدأ تقرر في حكم صادر منها أو من إحدى دوائر المحكمة ؛ تعين على الدائرة رفع الاعتراض إلى رئيس المحكمة، ليحيله إلى الهيئة العامة للمحكمة للفصل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: (الفصل الثالث) اختصاصات المحاكم
  article_text_ar: 'تختص المحكمة الإدارية العليا بالنظر في الاعتراضات على الأحكام التي تصدرها محاكم الاستئناف الإدارية ، إذا كان محل الاعتراض على الحكم ما يأتي: أ - مخالفة أحكام الشريعة الإسلامية، أو الأنظمة التي لا تتعارض معها أو الخطأ في تطبيقها أو تأويلها، بما في ذلك مخالفة مبدأ قضائي تقرر في حكم صادر من المحكمة الإدارية العليا . ب - صدوره عن محكمة غير مختصة.ج - صدوره عن محكمة غير مكونة وفقًا للنظام.د - الخطأ في تكييف الواقعة، أو في وصفها.هـ - فصله في نزاع خلافًا لحكم آخر سبق أن صدر بين طرفي الدعوى.و - تنازع الاختصاص بين محاكم الديوان.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تتولى محاكم الاستئناف الإدارية النظر في الأحكام القابلة للاستئناف الصادرة من المحاكم الإدارية، وتحكم بعد سماع أقوال الخصوم وفق الإجراءات المقررة نظامًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تختص المحاكم الإدارية بالفصل في الآتي: أ ـ الدعاوى المتعلقة بالحقوق المقررة في نظم الخدمة المدنية والعسكرية والتقاعد لموظفي ومستخدمي الحكومة والأجهزة ذوات الشخصية المعنوية العامة المستقلة أو ورثتهم والمستحقين عنهم.ب - دعاوى إلغاء القرارات الإدارية النهائية التي يقدمها ذوو الشأن، متى كان مرجع الطعن عدم الاختصاص، أو وجود عيب في الشكل، أو عيب في السبب، أو مخالفة النظم واللوائح، أو الخطأ في تطبيقها أو تأويلها، أو إساءة استعمال السلطة، بما في ذلك القرارات التأديبية، والقرارات التي تصدرها اللجان شبه القضائية والمجالس التأديبية . وكذلك القرارات التي تصدرها جمعيات النفع العام - وما في حكمها - المتصلة بنشاطاتها، ويعد في حكم القرار الإداري رفض جهة الإدارة أو امتناعها عن اتخاذ قرار كان من الواجب عليها اتخاذه طبقًا للأنظمة واللوائح.ج - دعاوى التعويض التي يقدمها ذوو الشأن عن قرارات أو أعمال جهة الإدارة.د - الدعاوى المتعلقة بالعقود التي تكون جهة الإدارة طرفا فيها.هـ - الدعاوى التأديبية التي ترفعها الجهة المختصة.و - المنازعات الإدارية الأخرى.ز - طلبات تنفيذ الأحكام الأجنبية وأحكام المحكمين
    الأجنبية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: لا يجوز لمحاكم ديوان المظالم النظر في الدعاوى المتعلقة بأعمال السيادة، أو النظر في الاعتراضات على ما تصدره المحاكم ــ غير الخاضعة لهذا النظام ـ من أحكام داخلة في ولايتها، أو ما يصدره المجلس الأعلى للقضاء ومجلس القضاء الإداري من قرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'مع عدم الإخلال بما ورد في المادة السابعة والعشرين من نظام القضاء، إذ رفعت دعوى عن موضوع واحد أمام إحدى محاكم الديوان وأمام أي جهة أخرى، تختص بالفصل في بعض المنازعات ولم تتخلَّ إحداهما عن نظرها أو تخلتا كلتاهما ؛ فيرفع طلب تعيين الجهة المختصة إلى لجنة الفصل في تنازع الاختصاص التي تؤلف من ثلاثة أعضاء: عضو من المحكمة الإدارية العليا يختاره رئيس المحكمة، وعضو من الجهة الأخرى يختاره رئيس الجهة، وعضو من مجلس القضاء الإداري يختاره رئيس المجلس ويكون رئيسًا لهذه اللجنة، كما تختص هذه اللجنة بالفصل في النزاع الذي يقوم بشأن تنفيذ حكمين نهائيين متناقضين صادر أحدهما من محاكم الديوان والآخر من الجهة الأخرى، وتفصل في هذه الدعاوى وفقًا للأحكام والإجراءات الواردة في نظام القضاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: (الباب الرابع) تعيين قضاة الديوان وجميع شؤونهم الوظيفية
  article_text_ar: درجات قضاة الديوان هي الدرجات المنصوص عليها في نظام القضاء، ويعاملون من حيث الرواتب والبدلات والمكافآت والمزايا معاملة نظرائهم في نظام القضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجرى تعيين قضاة الديوان، وترقيتهم، ونقلهم، وندبهم، وتدريبهم، وإعارتهم، والترخيص بإجازاتهم، والتفتيش عليهم، وتأديبهم، وعزلهم، وإنهاء خدماتهم، وفقًا للإجراءات المقررة في نظام القضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: (الباب الخامس) أحكام عامة
  article_text_ar: مع عدم الإخلال بالأحكام المنصوص عليها في هذا النظام، يتولى رئيس الديوان الإشراف الإداري والمالي على الديوان، وله صلاحيات الوزير المنصوص عليها في نظام القضاء والأنظمة والقرارات المنفذة لها، وذلك بالنسبة إلى موظفي الديوان ومستخدميه، وهو المرجع فيما يصدر من الديوان في هذا الشأن إلى مختلف الوزارات والجهات الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يتولى نواب الرئيس الأعمال التي يكلفهم بها الرئيس، ويحل محله في حال غيابه أو خلو منصبه أقدم نوابه، وذلك دون إخلال بما ورد في المادة (السادسة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يعد مجلس القضاء الإداري في نهاية كل عام تقريرا شاملا عن أعمال الديوان يتضمن الإنجازات التي تحققت والمعوقات ومقترحاته بشأنها، ويرفعه رئيس الديوان إلى الملك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يُكوًن في الديوان مكتب للشؤون الفنية من رئيس وعدد من القضاة والفنيين والباحثين، يختص بإبداء الرأي وإعداد البحوث والدراسات وغير ذلك من الأمور التي يطلبها منه رئيس الديوان، ويقوم المكتب في نهاية كل عام بتصنيف الأحكام التي أصدرتها محاكم الديوان، ومن ثم طبعها ونشرها في مجموعات، ويرفع نسخة منها مع التقرير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 1 - مع عدم الإخلال بالأحكام الواردة في هذا النظام، تسري على موظفي الديوان ومستخدميه ـ من غير القضاة ـ أحكام أنظمة الخدمة المدنية، ويعمل موظفو كل محكمة تحت رقابة رئيسهم الإداري ويخضع الجميع لرقابة رئيس المحكمة. 2 - مع عدم الإخلال بما نص عليه نظام الخدمة المدنية، يشترط فيمن يعين من أعوان القضاء أن ينجح في امتحان تحدد إجراءاته وشروطه بقرار من مجلس القضاء الإداري .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: تكون جميع التعيينات والترقيات في درجات السلك القضائي في الديوان في حدود الاعتمادات المقررة في الميزانية وأحكامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: استثناءً من أحكام هذا النظام، يجوز خلال الخمس السنوات التالية لنفاذه تكليف من تتوافر فيه شروط شغل درجة قاضي استئناف بالقيام بأعمال درجة رئيس محكمة استئناف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يبين نظام المرافعات أمام ديوان المظالم قواعد المرافعات والإجراءات أمامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يحل هذا النظام محل نظام ديوان المظالم ، الصادر بالمرسوم الملكي رقم (م/51) وتاريخ 17 / 7 / 1402 هـ
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5d3379bd-3547-494e-9fbd-a9a700f26e24/1
  verified: false
