regulation:
  code: BOE188
  name_ar: نظام حماية الطفل
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لأغراض هذا النظام، يقصد بالكلمات والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتضِ سياق النص خلاف ذلك: 1 - الطفل : كل إنسان لم يتجاوز الثامنة عشرة من عمره. 2 - الإيذاء : كل شكل من أشكال الإساءة للطفل أو استغلاله أو التهديد بذلك، ومنها: - الإساءة الجسدية : تعرض الطفل لضرر أو إيذاء جسدي. - الإساءة النفسية : تعرض الطفل لسوء التعامل الذي قد يسبب له أضرارًا نفسية أو صحية. - الإساءة الجنسية : تعرض الطفل لأي نوعٍ من الاعتداء أو الأذى أو الاستغلال الجنسي. 3 - الإهمال : عدم توفير حاجات الطفل الأساسية أو التقصير في ذلك، وتشمل: الحاجات الجسدية، والصحية، والعاطفية، والنفسية، والتربوية، والتعليمية، والفكرية، والاجتماعية، والثقافية، والأمنية. 4 - اللائحة : اللائحة التنفيذية لهذا النظام. 5 - الجهات ذات العلاقة : الجهات التي لها علاقة بحماية الطفل، وفقًا لما تحدده اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يهدف هذا النظام إلى ما يأتي:1 - التأكيد على ما قررته الشريعة الإسلامية، والأنظمة والاتفاقيات الدولية التي تكون المملكة طرفًا فيها والتي تحفظ حقوق الطفل وتحميه من كل أشكال الإيذاء والإهمال.2 - حماية الطفل من كل أشكال الإيذاء والإهمال ومظاهرهما التي قد يتعرض لها في البيئة المحيطة به (المنزل أو المدرسة أو الحي أو الأماكن العامة أو دور الرعاية والتربية أو الأسرة البديلة أو المؤسسات الحكومية والأهلية أو ما في حكمها)، سواء وقع ذلك من شخصٍ له ولاية على الطفل أو سلطة أو مسؤولية أو له به علاقة بأي شكل كان، أو من غيره.3 - ضمان حقوق الطفل الذي تعرض للإيذاء والإهمال؛ بتوفير الرعاية اللازمة له.4 - نشر الوعي بحقوق الطفل وتعريفه بها، وبخاصة ما يرتبط بحمايته من الإيذاء والإهمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يعد إيذاء أو إهمالًا تعرض الطفل لأيٍّ مما يأتي:1 - إبقاؤه دون سند عائلي.2 - عدم استخراج وثائقه الثبوتية، أو حجبها، أو عدم المحافظة عليها.3 - عدم استكمال تطعيماته الصحية الواجبة.4 - التسبب في انقطاعه عن التعليم.5 - وجوده في بيئة قد يتعرض فيها للخطر.6 - سوء معاملته.7 - التحرش به جنسيًّا، أو تعريضه للاستغلال الجنسي. 8 - استغلاله ماديًّا، أو في الإجرام، أو في التسول.9 - استخدام الكلمات المسيئة التي تحط من كرامته أو تؤدي إلى تحقيره.10 - تعريضه لمشاهد مخلة بالأدب، أو إجرامية، أو غير مناسبة لسنه.11 - التمييز ضده لأي سبب عرقي، أو اجتماعي، أو اقتصادي.12 - التقصير البيّن المتواصل في تربيته ورعايته.13 - السماح له بقيادة المركبة دون السن النظامية.14 - كل ما يهدد سلامته أو صحته الجسدية أو النفسية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يُعد الطفل معرضًا لخطر الانحراف في أيٍّ مما يأتي:1 - ممارسة التسول أو أي عملٍ غير مشروع.2 - خروجه عن سلطة الأبوين أو من يقوم على رعايته.3 - اعتياده على الهرب من البيت أو من المؤسسات التربوية أو الإيوائية.4 - اعتياده على النوم في أماكن غير معدة للإقامة أو المبيت.5 - تردده على الأماكن المشبوهة أخلاقيًّا أو اجتماعيًّا، أو الأماكن غير المناسبة لسنه، أو مخالطته المتشردين أو الفاسدين.6 - قيامه بأعمال تتصل بالدعارة أو الفسق أو القمار أو المخدرات أو نحوها، أو قيامه بخدمة من يقومون بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: للطفل - في جميع الأحوال - أولوية التمتع بالحماية والرعاية والإغاثة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: للطفل الحق في الحماية من كل أشكال الإيذاء أو الإهمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'للطفل الذي لا تتوافر له بيئة عائلية مناسبة، قد يتعرض فيها للإيذاء أو الإهمال؛ الحق في الرعاية البديلة من خلال ما يأتي: 1 - الأسرة الحاضنة التي تتولى كفالته ورعايته.2 - مؤسسات الرعاية الاجتماعية الحكومية أو الأهلية أو الخيرية، إذا لم تتوافر أسرة حاضنة.وتحدد اللائحة الضوابط اللازمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: دون الإخلال بما ورد في نظام العمل، يُحظر تشغيل الطفل قبل بلوغه سن الخامسة عشرة، كما يحظر تكليفه بأعمال قد تضر بسلامته أو بصحته البدنية أو النفسية، أو استخدامه في الأعمال العسكرية أو النزاعات المسلحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يحظر استغلال الطفل جنسيًّا، أو تعريضه لأشكال الاستغلال الجنسي، أو المتاجرة به في الإجرام أو التسول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يحظر استخدام الطفل في أماكن إنتاج المواد المخدرة أو المؤثرات العقلية أو تداولها بأي شكل من الأشكال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 1- يحظر أن يباع للطفل التبغ ومشتقاته وغيره من المواد التي تضر بسلامته، وكذلك يحظر أن يستخدم في شرائها أو أماكن إنتاجها أو بيعها أو الدعاية لها.2 - يحظر استيراد وبيع ألعاب الطفل أو الحلوى المصنعة على هيئة سجائر أو أي أداة من أدوات التدخين.3 - يحظر عرض المشاهد التي تشجع الطفل على التدخين، ويحظر كذلك التدخين أثناء وجوده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يحظر إنتاج ونشر وعرض وتداول وحيازة أي مصنف مطبوع أو مرئي أو مسموع موجه للطفل يخاطب غريزته أو يثيرها بما يزين له سلوكًا مخالفًا لأحكام الشريعة الإسلامية أو النظام العام أو الآداب العامة، أو يكون من شأنه تشجيعه على الانحراف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تحظر مشاركة الطفل في السباقات والنشاطات الرياضية أو الترفيهية التي تعرض سلامته أو صحته للخطر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون الإخلال بما تقضي به الأنظمة الأخرى، يحظر القيام بأي تدخلٍ أو إجراء طبي للجنين إلا لمصلحة أو ضرورة طبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعد والدا الطفل - أو أحدهما ، أو من يقوم على رعايته - مسؤولين في حدود إمكاناتهما المالية وقدراتهما عن تربيته وضمان حقوقه، والعمل على توفير الرعاية له، وحمايته من الإيذاء والإهمال. تتخذ الجهات ذات العلاقة التدابير اللازمة لضمان التزام والدي الطفل - أو من يقوم على رعايته - بتحمل مسؤولياتهما تجاهه، وحفظ حقوقه، وحمايته من الإيذاء والإهمال. في حالة انفصال الوالدين، يضمن للطفل حق الزيارة والاتصال بأي منهما؛ ما لم تقتض مصلحته غير ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على جميع الجهات مراعاة مصلحة الطفل في جميع الإجراءات التي تتخذ في شأنه والإسراع في إنجازها، ومراعاة حاجاته العقلية، والنفسية، والجسدية، والتربوية، والتعليمية، بما يتفق مع سنه وصحته ونحوهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على الجهات ذات العلاقة سرعة اتخاذ تدابير الرعاية والإصلاح المناسبة إذا كان الطفل في بيئة تعرض سلامته العقلية أو النفسية أو الجسدية أو التربوية لخطر الانحراف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'على الجهات ذات العلاقة اتخاذ جميع التدابير المناسبة من أجل الآتي: 1 - القيام بدورٍ بنّاءٍ وفاعلٍ في مجال الوقاية والإرشاد الصحي والتوعية بحقوق الطفل، وبخاصة فيما يتعلق بصحته وتغذيته ومزايا الرضاعة الطبيعية وسلامة فكره ووقايته من الحوادث وضرر التدخين وبيان خطورته أثناء الحمل وتوضيح ما للطفل من حقوق، وذلك عبر وسائل الإعلام المختلفة.2 - دعم نظام الصحة المدرسية ليقوم بدوره الكامل في مجال الوقاية والإرشاد الصحي. 3 - ضمان حق الطفل في الحصول على التعليم المناسب لسنه.4 - الوقاية من إصابة الطفل بالأمراض المعدية والخطيرة.5 - تأمين الطفل من الإصابات الناتجة من حوادث المركبات وغيرها.6 - وقاية الطفل من خطر التلوث البيئي.7 - رفع معاناة الأطفال الذين يعيشون في ظروف صعبة، كالأطفال المتنازع عليهم، وأطفال الشوارع والمشردين، وضحايا الكوارث والحروب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: على الجهات ذات العلاقة وضع برامج صحية وتربوية وتعليمية ونفسية واجتماعية لإعادة تأهيل الطفل الذي تعرض لإحدى حالات الإيذاء أو الإهمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: على الجهات ذات العلاقة وضع معايير جودة شاملة لألعاب الأطفال المصنعة محليًّا أو المستوردة، بحيث تكون مطابقة للمواصفات والمعايير الصحية والبيئية والثقافية، ووسائل السلامة، وغير مخالفة للضوابط الشرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'لا تخل الأحكام والإجراءات المنصوص عليها في هذا النظام بما يأتي: 1 - الالتزامات المترتبة على الجهات المعنية الأخرى، كل بحسب اختصاصه.2 - أي حكم يكفل حمايةً أفضل للطفل ينص عليه نظام آخر أو اتفاقية دولية تكون المملكة طرفًا فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 1 - على كل من يطّلع على حالة إيذاء أو إهمال، تبليغ الجهات المختصة فورًا.2 - على الجهات المختصة أن تسهل إجراءات التبليغ عن حالات الإيذاء والإهمال، وبخاصة التبليغ الوارد من الطفل.3 - تحدد اللائحة إجراءات التبليغ عن حالات الإيذاء والإهمال وكيفية التعامل معها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 1- مع مراعاة ما ورد في الفقرة (3) من المادة (الثانية والعشرين) من هذا النظام، تتولى هيئة التحقيق والادعاء العام التحقيق في مخالفات أحكام هذا النظام، وإقامة الدعوى أمام المحكمة المختصة.2 - مع مراعاة ما تقضي به الأنظمة الأخرى ذات العلاقة، تتولى المحكمة المختصة النظر في مخالفات أحكام هذا النظام، وتقرير العقوبة المناسبة في حق المخالف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: (الثالثة والعشرون مكرر)
  article_text_ar: '- أضيفت هذه المادة وذلك بموجب المرسوم الملكي رقم (م/72) وتاريخ 1443/8/6هـ، و تنص على الآتي: مع مراعاة ماتقضي به الفقرة (2) من هذه المادة، ودون إخلال بأي عقوبة أشد مقررة شرعاً أو نظاماً، يعاقب بالسجن مدة لا تزيد على (سنتين) وبغرامة لا تزيد على (مائة) ألف ريال، أو بإحدى هاتين العقوبتين، كل من ارتكب فعلاً شكل جريمة من أفعال الإيذاء الواردة في المادة (الأولى) من هذا النظام. وللمحكمة المختصة إصدار عقوبة بديلة للعقوبات السالبة للحرية. تكون عقوبة الجريمة المشار إليها في الفقرة (1) من هذه المادة السجن مدة لا تقل عن (سنتين) ولا تزيد على (خمس) سنوات، وغرامة لا تقل عن (مائة) ألف ريال ولا تزيد على (خمسمائة) ألف ريال، في حالة اقتران الجريمة بأي مما يأتي: أ- إن كان من وقع عليه الإيذاء من الأشخاص ذوي الإعاقة. ب- إن وقع الإيذاء في مكان العمل أو الدراسة أو الرعاية أو العبادة. ج- إن وقع الإيذاء ممن يناط بهم تطبيق أحكام هذا النظام. د- إن وقع الإيذاء مقروناً باستخدام أحد الأسلحة. هـ- إن تعددت أفعال الإيذاء في الواقعة. تضاعف العقوبة الموقعة في حالة العود. يعاقب كل من حرض غيره أو اتفق معه
    أو ساعده بأي صورة من صور التحريض أو الاتفاق أو المساعدة على ارتكاب الجريمة المشار إليها في الفقرة (1) من هذه المادة، بالعقوبة المقررة للجريمة".'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يصدر وزير الشؤون الاجتماعية اللائحة خلال (تسعين) يومًا من تاريخ نشر هذا النظام في الجريدة الرسمية، بعد التنسيق مع وزارة الداخلية ووزارة التربية والتعليم ووزارة الصحة وهيئة حقوق الانسان والجهات الأخرى ذات العلاقة كلٌّ فيما يخصه، ويعمل بها من تاريخ العمل بهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2d3cb83a-0379-4cde-8e0b-a9a700f272bd/1
