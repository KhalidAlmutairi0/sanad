regulation:
  code: BOE341
  name_ar: اللائحة التنظيمية للخيل العربية الأصيلة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لأغراض تطبيق هذه اللائحة، يقصد بالكلمات والعبارات الآتية المعاني الموضحة أمام كل منها: التنظيم: تنظيم مركز الملك عبد العزيز للخيل العربية الأصيلة. اللائحة: اللائحة التنظيمية للخيل العربية الأصيلة. المركز: مركز الملك عبد العزيز للخيل العربية الأصيلة. الوزير: وزير البيئة والمياه والزراعة. الخيل العربية الأصيلة: السلالات المنحدرة من الخيل العربية، بما فيها الخيل السعودية الأصل والمنشأ (خيل المؤسس)، المسجلة في سجلات المركز، والموثقة في المنظمة العالمية للجواد العربي (WAHO). التسجيل: تقييد جميع المعلومات المتصلة بالخيل العربية الأصيلة. المربط: مكان مجهز لإيواء الخيل العربية الأصيلة ورعايتها. رياضة الفروسية: مسابقات العروض والجمال وغيرها، الخاصة بالخيل العربية الأصيلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يصدر الوزير الضوابط والشروط والمتطلبات اللازمة للآتي: تسجيل الخيل العربية الأصيلة. إصدار التراخيص لمرابط الخيل العربية الأصيلة. شروط الحصول على الموافقات اللازمة لاستيراد الخيل العربية الأصيلة، أو تصديرها. إقامة رياضة الفروسية الخاصة بالخيل العربية الأصيلة، وتنظيمها. إقامة المزادات الخاصة بالخيل العربية الأصيلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يختص المركز وفقاً لأحكام التنظيم بما يأتي: تسجيل الخيل العربية الأصيلة. الترخيص لمرابط الخيل العربية الأصيلة. إصدار الموافقات اللازمة لاستيراد الخيل العربية الأصيلة أو تصديرها، وفقاً للأنظمة والتعليمات ذات العلاقة. منح الإذن بإقامة رياضة الفروسية، وتنظيمها، والإشراف عليها، والتنسيق في هذا الشأن مع الجهات ذات العلاقة. منح الإذن بإقامة المزادات للخيل العربية الأصيلة، وتنظيمها، والإشراف عليها. مراقبة جميع الأنشطة والرياضات والمزادات المتعلقة بالخيل العربية الأصيلة، الداخلة في اختصاص المركز، والتفتيش عليها. التواصل والتعاون مع المراكز والمنظمات الإقليمية والدولية المختصة بشؤون الخيل العربية؛ لنقل أفضل الممارسات لتحسين فصيلة الخيل العربية والمحافظة عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يعد مخالفاً لأحكام اللائحة كل من ارتكب أيًّا من الأفعال الآتية: مخالفة أحكام التسجيل وشروطه. ممارسة نشاط المرابط دون ترخيص. استيراد الخيل العربية الأصيلة أو تصديرها دون الحصول على الموافقات اللازمة لذلك، وفقاً للأنظمة والتعليمات ذات العلاقة واللائحة. إقامة رياضة الفروسية أو تنظيمها دون إذن من المركز. إقامة المزادات للخيل العربية الأصيلة أو تنظيمها دون إذن من المركز. تقديم أي معلومة مضللة أو غير صحيحة إلى المركز. عدم تقديم المعلومات -المتعلقة بنشاط المركز- التي يطلبها المركز، أو إعاقة عمل المختصين عند قيامهم بجولات تفتيشية. مخالفة شروط أو ضوابط رياضة الفروسية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون ضبط المخالفات المنصوص عليها في المادة (الرابعة) من اللائحة عن طريق موظفي المركز أو غيرهم، الذين يصدر بتسميتهم قرار من الوزير. يصدر الوزير قراراً بتحديد إجراءات ضبط المخالفات، وإثباتها، والتحقيق فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تُكوّن بقرار من الوزير لجنة (أو أكثر) لا يقل عدد أعضائها عن (ثلاثة) من موظفي المركز أو من غيرهم، على أن يكون من بينهم -على الأقل- مستشار قانوني أو شرعي، ويحدد القرار رئيس اللجنة ونائبه. تختص تلك اللجنة بالنظر في المخالفات وإيقاع العقوبات المنصوص عليها في اللائحة. تَصْدر قواعد عمل اللجنة وإجراءاتها وتحديد مكافآت أعضائها؛ بقرار من الوزير. يعتمد الوزير قرارات تلك اللجنة، ويجوز له أن يفوّض من يراه باعتماد القرارات الصادرة بإلغاء الترخيص أو بغرامة تقل قيمتها عن (100.000) مائة ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'دون إخلال بأي عقوبة أشد يقضي بها أي نص نظامي آخر، يعاقب كل من ارتكب إحدى المخالفات المنصوص عليها في المادة (الرابعة) من اللائحة بواحدة أو أكثر من العقوبات الآتية: أ- غرامة لا تزيد على (500,000) خمسمائة ألف ريال. ب- منع المخالف من ممارسة أي نشاط يتعلق بالخيل العربية الأصيلة لمدة لا تزيد على (ستة) أشهر. ج- تعليق الترخيص لمدة لا تزيد على (ستة) أشهر. د- إلغاء الترخيص. أ- تجوز -في حال تكرار المخالفة أو في حال استمرارها أو عدم تصحيحها خلال المهلة التي تحددها اللجنة- مضاعفة العقوبة الموقعة بها وفقاً للفقرات (أ) و(ب) و(ج) من الفقرة (1) من هذه المادة، على ألا تتجاوز الغرامة ضعف حدها الأعلى. ب- يجوز أن يتضمن القرار الصادر بتحديد العقوبة النص على نشر ملخصه على نفقة المخالف في صحيفة (أو أكثر) من الصحف المحلية أو في أي وسيلة أخرى مناسبة، وذلك بحسب نوع المخالفة المرتكبة وجسامتها وتأثيرها، على أن يكون النشر بعد اكتساب القرار الصفة القطعية. يجوز التظلم من قرارات اللجنة أمام المحكمة الادارية المختصة. مع مراعاة ما ورد في اللائحة من أحكام، يضع المركز جدولاً للمخالفات يشتمل على تصنيف لها
    وما يقابلها من عقوبات، على أن يراعى فيه التناسب بين المخالفة والعقوبة، ويصدر الجدول بقرار من الوزير.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يصدر الوزير القرارات اللازمة لتنفيذ أحكام اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تنشر اللائحة في الجريدة الرسمية، ويعمل بها بعد (ستين) يوماً من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0b5b0f37-b2c9-4b3f-8657-acce001690f5/1
  verified: false
