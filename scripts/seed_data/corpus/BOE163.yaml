regulation:
  code: BOE163
  name_ar: نظام المناطق البحرية للمملكة العربية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك: 1 ـ المملكة : المملكة العربية السعودية . 2 ـ الميل البحري : اثنان وخمسون وثمانمائة وألف متر (1852متراً) . 3 ـ السواحل : سواحل المملكة المطلة على البحر الأحمر ، وخليج العقبة، والخليج العربي . 4 ـ الاتفاقية : اتفاقية الأمم المتحدة لقانون البحار لعام 1982م . 5 ـ خطوط الأساس : خطوط الأساس المعتمدة نظاماً للمناطق البحرية للمملكة في البحر الأحمر وخليج العقبة والخليج العربي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: المياه الداخلية للمملكة هي المياه الواقعة باتجاه البر من خطوط الأساس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تحدد أنظمة المملكة ولوائحها ضوابط دخول السفن إلى مياهها الداخلية وخروجها منها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تمتد سيادة المملكة خارج إقليمها البري ومياهها الداخلية إلى بحرها الإقليمي ، وكذلك الحيز الجوي الذي يعلو البحر الإقليمي ، وقاع هذا البحر وباطن أرضه . وتباشر المملكة سيادتها على بحرها الإقليمي وفقاً لأحكام الاتفاقية وغيرها من قواعد القانون الدولي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1 ـ يمتد البحر الإقليمي للمملكة مسافة أثني عشر ميلاً بحرياً باتجاه البحر ، تقاس من خطوط الأساس .2 ـ الحد الخارجي للبحر الإقليمي للمملكة هو الخط الذي يكون بُعد كل نقطة عليه من أقرب نقطة على خطوط الأساس مساوياً لعرض البحر الإقليمي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: مع الالتزام بالأنظمة واللوائح النافذة في المملكة ، تتمتع سفن جميع الدول بحق المرور البرئ، في البحر الإقليمي للمملكة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون المرور بريئاً ما دام لا يضر بسلم المملكة أو بحسن نظامها أو بأمنها . ويتم المرور البرئ، عبر البحر الإقليمي وفقاً لأحكام هذا النظام والاتفاقية وأي قواعد أخرى في القانون الدولي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تبين أنظمة المملكة ولوائحها تنظيم المرور البرئ عبر بحرها الإقليمي ، طبقاً للاتفاقية وأي قواعد أخرى في القانون الدولي ، وتتناول الأمور التالية : 1 ـ تعيين الممرات البحرية وتنظيمها . 2 ـ حماية وسائل تيسير الملاحة والتسهيلات الملاحية ، وغير ذلك من المرافق والمنشآت . 3 ـ حماية الكابلات وخطوط الأنابيب . 4 ـ حفظ الموارد الحية للبحر . 5 ـ منع خرق أنظمة المملكة ولوائحها المتعلقة بمصايد الأسماك . 6 ـ المحافظة على بيئة المملكة ومنع تلوثها ، وخفض التلوث والسيطرة عليه . 7 ـ البحث العلمي البحري وأعمال المسح الهيدروغرافي . 8 ـ منع خرق أنظمة المملكة ولوائحها الجمركية أو الضريبية أو المتعلقة بالهجرة أو الصحة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1 ـ على جميع الغواصات والمركبات الغاطسة الأخرى رفع علمها والإبحار طافية في البحر الإقليمي للمملكة. 2 ـ على السفن والغواصات - التي تعمل بالطاقة النووية أو السفن التي تحمل مواد نووية أو مواد خطرة أو سامة - الحصول على إذن مسبق من السلطات المختصة في المملكة بدخولها أو مرورها عبر البحر الإقليمي للمملكة ، وتتحمل دولة علم السفينة المسؤولية كاملة عن أي خسارة أو ضرر ينجمان عن المرور البرئ لهذه السفن والغواصات في البحر الإقليمي للمملكة. 3 ـ على جميع السفن والغواصات - التي تمارس حق المرور البرئ في البحر الإقليمي للمملكة- الالتزام بأنظمة المملكة ولوائحها ، وأن تمتثل لجميع الأنظمة الدولية المعمول بها في شأن منع التصادم في البحر .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تتحمل دولة علم السفينة الحربية أو الغواصة أو أي سفينة حكومية أخرى مستعملة لأغراض غير تجارية- المسؤولية الدولية عن أي خسارة أو ضرر يلحق المملكة نتيجة لعدم امتثالها لأنظمة المملكة أو لأحكام الاتفاقية أو لأي قواعد أخرى في القانون الدولي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: '1 ـ للمملكة منطقة متاخمة ملاصقة لبحرها الإقليمي ، تمتد مسافة أثني عشر ميلاً بحرياً من الحد الخارجي للبحر الإقليمي للمملكة. 2 ـ تمارس المملكة في المنطقة المتاخمة ، السيطرة والرقابة اللازمة من أجل الآتي : أ ـ منع خرق الأنظمة أو اللوائح النافذة في المملكة المتعلقة بالأمن والأنظمة البيئية والملاحة والجمارك والضرائب وشؤون الهجرة والصحة داخل إقليم المملكة أو بحرها الإقليمي .ب ـ معاقبة أي خرق لتلك الأنظمة أو اللوائح يحصل داخل إقليم المملكة أو في بحرها الإقليمي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: للمملكة منطقة اقتصادية خالصة تقع مباشرة وراء بحرها الإقليمي وملاصقة له ، وتمتد إلى الحدود البحرية مع الدول المجاورة والمقابلة للمملكة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'للمملكة في منطقتها الاقتصادية الخالصة ما يأتي : 1 - حقوق سيادة خالصة ؛ لغرض استكشاف الموارد الطبيعية ـ الحية منها وغير الحية ـ للمياه التي تعلو قاع البحر ، ولقاع البحر وباطن أرضه ، وحفظ هذه الموارد وادارتها، وكذلك فيما يتعلق بالأنشطة الأخرى للاستكشاف والاستغلال الاقتصاديين للمنطقة الاقتصادية الخالصة ، كإنتاج الطاقة من المياه والتيارات والرياح . 2 - ولاية خالصة فيما يتعلق بالآتي : أ ـ حماية البيئة البحرية والحفاظ عليها . ب ـ إجراء البحث العلمي والإشراف عليه . ج ـ إقامة الجزر الاصطناعية والمنشآت والتركيبات وتشغيلها وصيانتها ، وتحديد مناطق السلامة ، بما في ذلك الولاية في إصدار القوانين والأنظمة الجمركية والضريبية والصحية ، وقوانين الأمن والسلامة والهجرة وغيرها . 3 - جميع الحقوق الأخرى المقررة طبقاً للاتفاقية ولأي قواعد أخرى في القانون الدولي .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: '1- للمملكة - في سبيل ممارستها لحقوق السيادة في استكشاف الموارد الحية واستغلالها وحفظها وإدارتها في المنطقة الاقتصادية الخالصة - أن تتخذ تدابير من بينها : تفقد السفن وتفتيشها واحتجازها وإقامة دعاوى قضائية ضدها ، وفقاً لما تقتضيه الضرورة ؛ لضمان الامتثال لأنظمة المملكة ولوائحها في المنطقة الاقتصادية الخالصة . 2- لا يخلى سبيل السفن المحتجزة إلا بعد تقديم كفالة أو ضمان . 3- تبلغ المملكة دولة العلم في حالات احتجاز السفن الأجنبية بالإجراء المتخذ وبأي عقوبات تفرض بعد ذلك .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يقتصر حق الصيد في المنطقة الاقتصادية الخالصة على مواطني المملكة . ويجوز للسلطات المختصة في المملكة - وفقاً للشروط والقيود التي تضعها - أن ترخص لغير المواطنين بالصيد، مع مراعاة التدابير التي تتخذها المملكة للمحافظة على الثروات الحية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: على جميع الدول أن تراعي حقوق المملكة في منطقتها الاقتصادية الخالصة ، وأن تمتثل لأنظمة المملكة وأحكام الاتفاقية وأي قواعد أخرى في القانون الدولي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يشمل الجرف القاري للمملكة قاع أرض المساحات المغمورة وباطنها ، التي تمتد إلى ما وراء بحرها الإقليمي في جميع أنحاء الامتداد الطبيعي لإقليم المملكة البري .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 1- تمارس المملكة على جرفها القاري حقوق سيادة خالصة لأغراض استكشاف موارده الطبيعية ، واستغلالها . 2- تشمل الموارد الطبيعية - المشار إليها في الفقرة (1) من هذه المادة - الموارد المعدنية وغيرها من الموارد غير الحية في قاع البحر وباطن أرضه ، بالإضافة إلى الكائنات الحية التي تنتمي إلى الأنواع الآبدة، وهي الكائنات التي تكون في المرحلة التي يمكن جنيها ، إما غير متحركة وموجودة على قاع البحر أو تحته ، أو غير قادرة على الحركة إلا وهي على اتصال مادي دائم بقاع البحر أو باطن أرضه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: للمملكة الحق الخالص في الإذن بالحفر في جرفها القاري ، وتنظيم هذا الحفر لجميع الأغراض . ويحق لها استغلال باطن الأرض عن طريق حفر الأنفاق أياً كان ارتفاع الماء فوق باطن الأرض .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 1- تعني حقوق السيادة في الجرف القاري أنها حقوق خالصة للمملكة ، ولا تتوقف حقوق المملكة في الجرف القاري على احتلال فعلي أو حكمي ، ولا على إعلان صريح من المملكة . 2- لا يجوز لأحد أن يباشر أيًّا من الحقوق المشار إليها في الفقرة (1) من هذه المادة دون موافقة خطية وصريحة من السلطات المختصة في المملكة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: حرية الملاحة والتحليق ومد الكابلات ووضع الأنابيب المغمورة مكفولة للدول الأخرى في المنطقة الاقتصادية الخالصة والجرف القاري للمملكة ، وفقاً لأحكام الاتفاقية وقواعد القانون الدولي وأنظمة المملكة ولوائحها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: لا يخل تطبيق هذا النظام بما سبق إبرامه من اتفاقيات بين المملكة والدول المجاورة والمقابلة لها فيما يتعلق بالحدود البحرية أو باستغلال الموارد الطبيعية في البحر الأحمر وخليج العقبة والخليج العربي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98b1d2e8-4724-439b-af00-a9a700f255ef/1
  verified: false
