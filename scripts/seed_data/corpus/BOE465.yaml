articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ الآتية -أينما وردت في هذا التنظيم- المعاني المبـينة أمامها: التنظيم: تنظيم الهيئة العامة للمساحة والمعلومات الجيومكانية. الهيئة: الهيئة العامة للمساحة والمعلومات الجيومكانية. المجلس: مجلس إدارة الهيئة. القطاع: قطاع المساحة والمعلومات الجيومكانية والتصوير، المتعلق بأعمال المساحة والمعلومات الجيومكانية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة وبالاستقلال المالي والإداري، وتـرتبط تنظيميًّا بوزير الدفاع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون مقر الهيئة الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب أخرى داخل المملكة بقرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف الهيئة إلى تنظيم القطاع في المملكة، والارتقاء به، والإشراف عليه، ومراقبته باستثناء الأعمال المتعلقة بوزارة الدفاع؛ بما يحقق الجودة وتحسين الأداء، والمحافظة على الجوانب الأمنية بالتنسيق مع الجهات المعنية، ولها القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: وضع المعاييـر والضوابط الأساسية والاستـرشادية المتعلقة بالقطاع، وتحديثها؛ لتحقيق الاستخدام التكاملي لمنظومة المعلومات الجيومكانية بـين الجهات ذات العلاقة، والتأكد من تطبـيقها، والالتزام بها. اقتراح الأنظمة ذات الصلة بالقطاع، بعد العرض على المجلس. اعتماد وتطويـر البنية التحتية الجيومكانية الوطنية، والمرجع الجيوديسي الوطنـي، والشبكات الجيوديسية الوطنية، والمسح البحري الهيدروغرافي، وتوفير البـيانات والمنتجات والخدمات والتطبـيقات الإلكتـرونية والخرائط الطبوغرافية والجوية وخرائط الملاحة البحرية ذات الصلة بالقطاع وتسويقها، والمحافظة على أمنها وسريتها. إعداد الخطط الاستـراتيجية، وإجراء الدراسات والبحوث المرتبطة بالقطاع، والعمل على تفعيلها، بمشاركة الجهات ذات العلاقة. التـرخيص لممارسة الأنشطة في القطاع، والإشراف
    على تأهيل الممارسين، وتصنيفهم، ووضع القواعد المنظمة لذلك. العمل على حماية مصالح المستفيدين من القطاع. تهيئة القطاع ليكون جاذبًا للاستثمار، وتحفيز نموه. العمل على تطويـر الكفايات الوطنية في القطاع، بالتعاون مع الجامعات والمعاهد المتخصصة داخل المملكة وخارجها. التنسيق والتعاون مع نظيراتها في الدول الأخرى والهيئات والمنظمات الدولية ذات العلاقة بالقطاع، وفقًا للإجراءات النظامية. تمثيل المملكة داخليًّا وخارجيًّا فيما يتعلق باختصاصاتها، وفقًا للإجراءات النظامية. الإشراف على إصدار أطالس المملكة، وتحديثها، والعمل على تطويـرها بالتنسيق مع الجهات ذات العلاقة. العمل على توفير المعلومات والدراسات الخاصة بحدود المملكة البرية والبحرية فيما يتعلق بالقطاع، وتقديم الاستشارات المتعلقة بها، وتطوير قاعدة بيانات لهذا الغرض بالتنسيق مع الجهات ذات العلاقة. تقديم الاستشارات والخدمات المرتبطة بالقطاع للجهات الحكومية والخاصة وغيـرها داخل المملكة وخارجها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'أولًا: يكون للهيئة مجلس إدارة يشكل على النحو الآتي: وزيـر الدفاع رئيسًا نائب وزير الدفاع عضوًا ونائبًا للرئيس ممثل من وزارة الداخلية عضوًا ممثل من وزارة الدفاع عضوًا ممثل من وزارة الشؤون البلدية والقروية عضوًا ممثل من وزارة النقل عضوًا ممثل من وزارة المالية عضوًا ممثل من وزارة التعليم عضوًا ممثل من وزارة البيئة والمياه والزراعة عضوًا ممثل من وزارة الاقتصاد والتخطيط عضوًا ممثل من وزارة الاتصالات وتقنية المعلومات عضوًا ممثل من مدينة الملك عبد العزيز للعلوم والتقنية عضوًا ممثل من هيئة المساحة الجيولوجية السعودية عضوًا ممثل من الهيئة العامة للإحصاء عضوًا ممثل من الهيئة السعودية للبيانات والذكاء الاصطناعي عضوًا رئيس الهيئة عضوًا اثنان من ذوي الاختصاص والمكانة العلمية والمهنية في مجال عمل الهيئة عضوين اثنان يمثلان القطاع الخاص عضوين ثانيًا: يكون تعيين الأعضاء المشار إليهم في الفقرتين (17) و(18) من البند (أولًا) من هذه المادة بقرار من مجلس الوزراء بناءً على تـرشيح من رئيس المجلس، لمدة (ثلاث) سنوات قابلة للتجديد مرة (واحدة). ثالثًا: يجب ألاَّ تقل مرتبة ممثلي الأجهزة الحكومية
    عن (الخامسة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا المختصة بتصريف شؤون الهيئة، ورسم السياسة العامة، واتخاذ القرارات اللازمة لتحقيق أغراضها، وله على وجه خاص الصلاحيات الآتية: إقرار سياسات الهيئة وخططها وبرامجها التشغيلية. إقرار ضوابط وشروط منح الهيئة للتـراخيص والتصاريح المتعلقة بمزاولة الأنشطة والأعمال في القطاع. إقرار هيكل الهيئة التنظيمي. إقرار اللوائح المالية بالاتفاق مع وزارة المالية. إقرار اللوائح الإدارية بالاتفاق مع وزارة المالية فيما يتصل بالأحكام ذات الأثر المالي فيها. إقرار اللوائح الفنية واللوائح الداخلية اللازمة لتسيير شؤون الهيئة. إقرار حقوق من يستعين بهم المجلس للاستفادة من خبـراتهم. إقرار سياسة التسعيـر للأعمال والمنتجات والخدمات والتراخيص والتصاريح في القطاع، والمقابل المالي عن أي عمل أو منتج أو خدمة أو ترخيص أو تصريح تقدمه الهيئة. إقرار آلية المقاصة والتسوية بـين الجهات ذات العلاقة. تعيين مراقب مالي داخلي. إقرار مشروع ميزانية الهيئة وحسابها الختامي وتقريـر مراجع الحسابات، تمهيدًا لاستكمال الإجراءات النظامية. اعتماد التقرير السنوي للهيئة، ورفعه وفق الإجراءات النظامية. الموافقة على
    تأسيس الشركات أو المشاركة في تأسيسها أو المساهمة فيها للعمل في القطاع أو الدخول في شراكات أو تحالفات، وفقًا للإجراءات النظامية. الموافقة على شراء العقارات لمصلحة الهيئة بما يحقق أغراضها، ووفقًا للإجراءات النظامية. قبول التبـرعات والهبات والمنح والوصايا والأوقاف التي تقدم للهيئة. ويجوز للمجلس تفويض بعض صلاحياته إلى من يراه من المسؤولين في الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة، ويجوز عند الاقتضاء انعقادها في أي مكان آخر داخل المملكة. يجتمع المجلس بدعوة من رئيسه (مرتيـن) على الأقل في السنة، ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع، وعلى رئيس المجلس أن يدعو المجلس إلى الاجتماع متى طلب ذلك (نصف) أعضائه على الأقل. يشتـرط لصحة الاجتماع حضور أغلبـية الأعضاء على الأقل بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بأغلبـية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يـرجح الجانب الذي صوت معه رئيس الاجتماع. وللعضو المعتـرض تسجيل اعتـراضه وأسباب الاعتـراض ضمن محضر اجتماع المجلس. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، ويقوم رئيس الهيئة بنشر القرارات بالطريقة النظامية. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. لا يجوز للعضو أن يفشي شيئًا مما وقف عليه من أسرار الهيئة. يكون للمجلس أمين سر من بين منسوبي الهيئة يختاره رئيس المجلس بناءً على ترشيح رئيس الهيئة، ويحدد المجلس مهماته ومكافآته. للمجلس أن يدعو إلى حضور جلساته من يـرى الاستعانة بمعلوماتهم
    وخبـراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس بالمرتبة الممتازة، يعين بناءً على تـرشيح من رئيس المجلس، وهو المسؤول التنفيذي عن إدارة الهيئة، وتتـركز مسؤولياته في حدود ما ينص عليه التنظيم، ويمارس بوجه خاص الصلاحيات والاختصاصات الآتية: الإشراف على أعمال الهيئة الإدارية والمالية والفنية. متابعة تنفيذ القرارات التي يصدرها المجلس. الموافقة على استئجار العقارات وشراء المنقولات وتأجيـرها لمصلحة الهيئة بما يحقق أغراضها. اقتـراح هيكل الهيئة التنظيمي ولوائحها المالية والداخلية والفنية والإدارية، وعرضها على المجلس، والإشراف على تنفيذها بعد إقرارها. اقتـراح سياسة التسعيـر للأعمال والمنتجات والخدمات والتراخيص والتصاريح في القطاع، والمقابل المالي عن أي عمل أو منتج أو خدمة أو ترخيص أو تصريح تقدمه الهيئة. إعداد خطط الهيئة وبـرامجها، والإشراف على تنفيذها. اقتـراح حقوق من يستعين بهم المجلس للاستفادة من خبـراتهم. اقتـراح آلية المقاصة والتسوية بـين الجهات ذات العلاقة. الإشراف على إعداد مشروع ميزانية الهيئة، والتقريـر السنوي، والحساب الختامي، وعرضها على المجلس. إصدار الأوامر بمصروفات الهيئة ضمن حدود الميزانية السنوية
    المعتمدة. إصدار التـراخيص والتصاريح المتعلقة بمزاولة الأنشطة في القطاع -بالتنسيق مع الجهات ذات العلاقة- وفق الضوابط والشروط المعتمدة من المجلس. تحصيل الإيـرادات (مباشرةً، مقاصةً، سدادًا) وتطويـر إجراءات تحصيلها. إعداد الدراسات اللازمة لتأسيس الشركات أو المشاركة في تأسيسها أو المساهمة فيها أو الدخول في شراكات أو تحالفات. تعيين منسوبـي الهيئة، والإشراف عليهم، وفقًا للصلاحيات الممنوحة له وما تحدده لوائح الهيئة. استقطاب الكفايات التي تستدعي حاجة العمل الاستعانة بهم، وتعيين من يقتضي عمل الهيئة تعيينه. إقرار الابتعاث والتدريب لموظفي الهيئة؛ للدراسة في الداخل أو الخارج، وفقًا للوائح الهيئة. تقديم تقاريـر دورية إلى المجلس عن أعمال الهيئة ومنجزاتها ونشاطاتها. تمثيل الهيئة في صلتها بغيـرها من الجهات وأمام الجهات القضائية والإدارية وغيـرها. مباشرة ما تخوله إياه قرارات المجلس وأحكام التنظيم من اختصاصات. ولرئيس الهيئة تفويض بعض صلاحياته ومهماته إلى غيـره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: فيما عدا رئيس الهيئة، يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد الهيئة المالية من المصادر الآتية: ما يخصص لها في الميزانية العامة للدولة. المقابل المالي عن أي عمل أو منتج أو خدمة أو ترخيص أو تصريح تقدمه الهيئة. لأموال المنقولة وغيـر المنقولة الواقعة تحت تصرفها، أو التي تؤول إليها من جهات أخرى. الأموال الناتجة من استثمارات الهيئة. ما يقبله المجلس من هبات وتبـرعات ومنح ووصايا وأوقاف. أي مورد آخر يقره المجلس وفق الأنظمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة تصدر بمرسوم ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع أموال الهيئة في حساب جاري وزارة المالية بمؤسسة النقد العربـي السعودي، ولها فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفق ميزانية الهيئة المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تـرفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: دون إخلال بحق الديوان العام للمحاسبة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبـيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابه. ويـرفع تقريـر مراجع الحسابات إلى المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يحل التنظيم محل تنظيم الهيئة العامة للمساحة، الصادر بقرار مجلس الوزراء رقم (8) وتاريخ 14 / 1 / 1427ه، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يُنشر التنظيم في الجريدة الرسمية، ويُعمل به بعد (تسعين) يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/796a6587-8da2-4583-8603-ac4500d5b8bc/1
  verified: false
