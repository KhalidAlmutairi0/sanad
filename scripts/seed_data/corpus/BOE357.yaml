regulation:
  code: BOE357
  name_ar: تنظيم الهيئة العامة للجمارك
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للمصطلحات والعبارات الآتية المعاني الموضحة قرين كل منها ما لم يقتضِ السياق غير ذلك: التنظيم: تنظيم الهيئة العامة للجمارك. الهيئة: الهيئة العامة للجمارك. المجلس: مجلس إدارة الهيئة. رئيس المجلس: رئيس مجلس إدارة الهيئة العامة للجمارك. المحافظ: محافظ الهيئة. المنافذ الجمركية: المنافذ التي تقع تحت مسؤولية الهيئة سواء أكانت برية أم بحرية أم جوية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية وبالاستقلال المالي والإداري وترتبط تنظيميًا بوزير المالية، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب بحسب الحاجة داخل المملكة وخارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنظيم جميع الأنشطة المتعلقة بالعمل الجمركي والمنافذ الجمركية، وإدارتها، بما يكفل النهوض بمستواها إلى أقصى درجة من الكفاية والإنتاج والتنافس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة -إضافة إلى اختصاصاتها المقررة نظاماً- ودون إخلال باختصاصات الجهات الحكومية ذات العلاقة، اتخاذ ما يلزم في سبيل تحقيق أهدافها، ولها على وجه خاص ما يأتي: 1- وضع السياسة العامة والخطط والبرامج اللازمة لعمل الهيئة. 2- توظيف التقنية الحديثة في تنفيذ أعمال الهيئة ومراقبتها وتسهيلها، وفي تعزيز الدور الأمني في مكافحة التهريب الجمركي. 3- التعاون مع القطاع الخاص في شأن تنفيذ بعض الأعمال المساندة، وإدارتها. 4- وضع الخطط اللازمة؛ لتنظيم مرافق المنافذ الجمركية وإدارتها واستثمارها. 5- وضع معايير لمتابعة مؤشرات أداء أعمال الهيئة وخططها, التي تكفل تطوير أدائها وخدماتها, وللهيئة التنسيق في هذا الشأن مع من تراه من الجهات ذات الصلة باختصاصها. 6- تمثيل المملكة في المنظمات والهيئات والمحافل والمؤتمرات الإقليمية والدولية ذات الصلة باختصاصات الهيئة. 7- التعاون وتبادل الخبرات مع المنظمات والهيئات الإقليمية والدولية، وبيوت الخبرة المتخصصة داخل المملكة وخارجها، وذلك في حدود اختصاصات الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'أولاً: يكون للهيئة مجلس إدارة برئاسة وزير المالية، وعضوية كل من: 1- محافظ الهيئة. 2- ممثل من وزارة الداخلية. 3- ممثل من رئاسة أمن الدولة. 4- ممثل من وزارة المالية. 5- ممثل من وزارة التجارة والاستثمار. 6- ممثل من وزارة النقل. 7- ممثل من وزارة الاقتصاد والتخطيط. 8- ثلاثة من القطاع الخاص يعينون بقرار من مجلس الوزراء، بناءً على ترشيح من رئيس المجلس. ثانياً: يجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها، وفيما عدا رئيس المجلس والمحافظ، تكون عضوية المجلس ثلاث سنوات قابلة للتجديد مرة واحدة فقط، وتحدد مكافآت الأعضاء بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس الإشراف على شؤون الهيئة وتصريف أمورها، وله أن يتخذ القرارات اللازمة لتحقيق أغراضها في حدود أحكام هذا التنظيم، وله على وجه خاص اتخاذ ما يلي: 1- إقرار الهيكل التنظيمي للهيئة. 2- إقرار اللوائح المالية والإدارية لأعمال الهيئة. 3- إقرار السياسات العامة للهيئة وخططها وبرامجها. 4- اعتماد مشروع ميزانية الهيئة. 5- الموافقة على حساب الهيئة الختامي والتقرير السنوي وتقرير مراجع الحسابات؛ تمهيداً لرفعها بحسب الإجراءات النظامية. 6- تعيين مراجع حسابات خارجي. 7- الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، وفقاً للإجراءات النظامية المتبعة. 8- اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل القائم منها، ورفعها لاستكمال الإجراءات النظامية. 9- النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة. 10- تحديد المقابل المالي للخدمات التي تقدمها الهيئة. وللمجلس -في سبيل تحقيق هذه الاختصاصات- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة
    بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض كل اختصاصاته أو بعضها إلى رئيسه، أو إلى من يراه من أعضائه أو منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- تعقد اجتماعات المجلس في مقر الهيئة الرئيس، ويجوز عقدها في مكان آخر. 2- يجتمع المجلس مرتين على الأقل في السنة بناءً على دعوة من رئيسه، ومتى اقتضت المصلحة ذلك، على أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع، وعلى رئيس المجلس أن يدعو المجلس إلى الاجتماع متى طلب ذلك (أربعة) من أعضائه على الأقل، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم رئيس المجلس أو من ينيبه من ممثلي الجهات الحكومية الأعضاء في المجلس لرئاسة الاجتماعات في حال غيابه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. 3- تدون مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. 4- لا يجوز للعضو الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه. 5- لا يجوز للعضو أن يفشي شيئًا مما اطلع عليه من أسرار الهيئة حتى بعد انتهاء عضويته في المجلس. 6 - للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة محافظ بالمرتبة الممتازة، وهو المسؤول التنفيذي عن إدارة الهيئة، ويمارس الاختصاصات الآتية: 1- الإشراف على إعداد هيكل الهيئة التنظيمي، ورفعه إلى المجلس؛ للنظر في إقراره. 2- الإشراف على إعداد اللوائح المالية والإدارية للهيئة, ورفعها إلى المجلس؛ للنظر في إقرارها. 3- الإشراف على إعداد السياسات العامة للهيئة وخططها وبرامجها, ومتابعة تنفيذها بعد إقرار المجلس لها. 4- الإشراف على إعداد مشروع الميزانية والحساب الختامي والتقرير السنوي للهيئة، ورفعها إلى المجلس. 5- الإشراف على سير العمل في الهيئة، وإدارة الأمور الجمركية وجميع الإجراءات المتعلقة بتسيير أعمال الهيئة وما يعتمده المجلس في المجال الإداري والمالي والفني للهيئة. 6- تعيين العاملين في الهيئة والإشراف على منسوبيها، وفقاً للأنظمة واللوائح المعمول بها. 7- الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المعمول بها، وفي حدود الصلاحيات التي فوضه بها المجلس. 8- تمثيل الهيئة أمام القضاء, ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها. 9-
    التعاقد مع الغير وفق ما يقتضيه سير العمل في الهيئة، وفي حدود الصلاحيات التي فوضه بها المجلس. 10- التوقيع على الاتفاقيات ومذكرات التفاهم والعقود بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. 11- تقديم تقارير دورية إلى المجلس عن أعمال الهيئة. 12- أي اختصاص آخر يكلفه به المجلس. وللمحافظ تفويض بعض صلاحياته إلى غيره من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يكون للمحافظ نائب (أو أكثر) يعينون بقرار من المجلس بناء على ترشيح من المحافظ ويتولون الأعمال والصلاحيات المنوطة بوظائفهم أو التي يفوضهم المحافظ بها في حدود ما تقضي به الأنظمة واللوائح المعمول بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يخضع منسوبو الهيئة -عدا المحافظ- لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتألف موارد الهيئة من الآتي: 1- ما تخصصه لها الدولة من أموال. 2- المقابل المالي الذي تحصل عليه عن الخدمات التي تقدمها. 3- الأصول الثابتة والمنقولة التي تحت تصرفها. 4- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. 5- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع أموال الهيئة لدى مؤسسة النقد العربي السعودي، ولها فتح حسابات أخرى لهذا الغرض في البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفق ميزانية الهيئة المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (90) يومًا من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجيًا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابهم، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c5bf1170-5ee7-4d6f-b69d-a9eb017e7912/1
  verified: false
