regulation:
  code: BOE173
  name_ar: نظام الأرصاد
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لأغراض تطبيق هذا النظام، يقصد بالألفاظ والعبارات الآتية -أينما وردت فيه- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: النظام: نظام الأرصاد. اللوائح: لوائح النظام. المركز: المركز الوطني للأرصاد. الوزير: وزير البيئة والمياه والزراعة رئيس مجلس إدارة المركز. الشخص: أي شخص ذي صفة طبيعية أو اعتبارية. الطقس: حالة الجو في موقع معين لمدة زمنية قصيرة. المناخ: حالة الجو في موقع معين لمدة زمنية طويلة. الأرصاد الجوية: عملية الرصد أو المراقبة أو التنبؤ بحالة الطقس والمناخ والظواهر الجوية والبحرية المؤثرة في حالة الغلاف الجوي. معلومات الأرصاد الجوية: تقارير وتحاليل وتنبؤات الأرصاد الجوية وأي بيانات أخرى تتعلق بالأحوال الجوية السائدة أو المتوقعة. خدمات الأرصاد الجوية: أنشطة ونواتج ومعلومات عن الأرصاد الجوية. خدمات الأرصاد الجوية السيادية: أنشطة ونواتج ومعلومات عن الأرصاد الجوية ذات العلاقة بالأمن الوطني. محطات الرصد: كل منشأة أو معدّة أو جهاز، تُستخدم للقيام بأي من خدمات الأرصاد الجوية. التصريح: وثيقة يُصدرها المركز للشخص قبل البدء في ممارسة عمل أو نشاط يتعلق بالأرصاد الجوية.
    الترخيص: وثيقة يُصدرها المركز للشخص لممارسة عمل أو نشاط يتعلق بالأرصاد الجوية. المصرح له: الشخص الحاصل على التصريح. المرخص له: الشخص الحاصل على الترخيص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجب عند القيام بأي من خدمات الأرصاد الجوية الالتزام بالاشتراطات والضوابط والإجراءات والمقاييس والمعايير اللازمة للأرصاد الجوية، وذلك وفقاً لما تُحدده اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يجب عند القيام بأي من خدمات الأرصاد الجوية، أو نشر أي من معلومات الأرصاد الجوية سواء بإنشاء موقع إلكتروني، أو بأي وسيلة كانت؛ الحصول -بحسب الأحوال- على ترخيص أو تصريح (أو كليهما). وتُصنف اللوائح أنواع تلك الخدمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب عند إنشاء مشروع تتطلب طبيعته معرفة معلوماتٍ عن الأرصاد الجوية واستخدامها؛ الحصول عليها -قبل البدء في إنشاء ذلك المشروع- من المركز أو من مقدمي خدمات الأرصاد الجوية المرخص لهم، وتُحدد اللوائح طبيعة تلك المشروعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب عند القيام بنشاط استيراد محطات الرصد، أو تركيبها، أو تشغيلها، أو نقلها، أو تداولها، أو معايرتها، أو صيانتها؛ الحصول على ترخيص، وتُحدد اللوائح أوصاف محطات الرصد. يجب عند التنازل عن محطات الرصد الحصول على ترخيص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجب على من يمارس نشاط تدريب أشخاص على القيام بأي من خدمات الأرصاد الجوية؛ الحصول على ترخيص. يقوم المركز بتحديد معايير وضوابط التدريب لخدمات الأرصاد الجوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تُصنف اللوائح أنواع التراخيص والتصاريح، بناءً على الاشتراطات والضوابط والإجراءات اللازمة لكل منها، وتُحدد تلك الاشتراطات والضوابط والإجراءات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يُقصر القيام بخدمات الأرصاد الجوية السيادية على المركز، وتُصنف اللوائح أنواع تلك الخدمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يقدّم المركز أو المرخص له خدمات الأرصاد الجوية إلى الجهات المعنية بالملاحة الجوية في المملكة؛ وفقاً لأنظمة الطيران المدني والاتفاقيات الدولية -ذات العلاقة- التي تكون المملكةُ طرفاً فيها. يقدّم المركز أو المرخص له خدمات الأرصاد الجوية إلى الجهات المعنية بالملاحة البحرية. يُحدد المركز المقابل المالي لتقديم خدمات الأرصاد الجوية إلى الجهات المعنية بالملاحة الجوية في المملكة بالتنسيق مع الهيئة العامة للطيران المدني؛ وفقاً للأحكام المتعلقة بذلك في أنظمة الطيران المدني والاتفاقيات الدولية -ذات العلاقة- التي تكون المملكةُ طرفاً فيها. ويحدد كذلك المقابل المالي لتقديم خدمات الأرصاد الجوية إلى الجهات المعنية بالملاحة البحرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يُعد القيام بأي من الأفعال الآتية مخالفة لأحكام النظام: المساس بأي من محطات الرصد أو مرافقها أو شبكاتها أو البيانات الصادرة عنها، سواء بالتعدي عليها أو العبث بها أو تعطيلها أو نقلها أو إتلافها جزئياً أو كلياً؛ سواء بشكل مباشر أو غير مباشر. استخدام الترخيص أو التصريح لغير الأغراض التي أُصدر من أجلها. القيام بأي من خدمات الأرصاد الجوية دون الحصول على الترخيص أو التصريح. إنشاء محطات الرصد دون الحصول على ترخيص. مخالفة أي حكم آخر من أحكام النظام واللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يتولى مفتشون من المركز -يصدر بتحديدهم قرار من الوزير- ضبط مخالفات أحكام النظام واللوائح، والتحقيق فيها وإثباتها، وتُحدد اللوائح آليات وإجراءات عملهم. للمفتش قبل دخول المواقع بغرض تفتيشها وضبط المخالفات فيها؛ الاستعانة بالجهات المختصة، وتُحدد اللوائح الآليات اللازمة لذلك. للمفتش التحفظ الفوري على كل ما يشتبه باستخدامه بما يخالف أحكام النظام واللوائح، على أن يحرر محضراً يوضح الأصناف المحرزة وأوصافها أثناء الضبط، ويعرضه على اللجنة المنصوص عليها في الفقرة (1) من المادة (الثالثة عشرة) من النظام -خلال مدة لا تزيد على (سبعة) أيام- لتقرير استمرار التحفظ أو إلغائه؛ وذلك وفقاً لما تُحدده اللوائح. يُحظر منع المفتش أو إعاقته عن تأدية أعماله المتعلقة بالتفتيش والضبط. وعلى المفتش إبراز بطاقته الوظيفية عند مباشرة اختصاصاته. دون إخلال بما ورد في الفقرة (1) من هذه المادة، للوزير إسناد بعض مهمات التفتيش وضبط المخالفات ذات الطبيعة الإدارية، إلى شركات متخصصة؛ وذلك وفق ضوابط ومعايير تُحددها اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'دون إخلال بأي عقوبة أشد يُنص عليها في نظام آخر، يعاقب كل من يرتكب أيًّا من المخالفات المنصوص عليها في المادة (العاشرة) من النظام بواحدة أو أكثر من العقوبات الآتية: أ- غرامة لا تزيد على (500.000) خمسمائة ألف ريال. ب- تعليق الترخيص أو التصريح لمدة لا تزيد على (ستة) أشهر. ج- إلغاء الترخيص أو التصريح. د- مصادرة المضبوطات محل المخالفة. هـ - إلزام المخالف بإصلاح الضرر الناتج عن المخالفة تحت إشراف المركز أو التعويض عن قيمة الإصلاح، وفوات المنفعة. يُصدر الوزير جداول تصنيف المخالفات المنصوص عليها في المادة (العاشرة) من النظام، وتحديد العقوبات المقابلة لها من العقوبات المنصوص عليها في الفقرات الفرعية (أ، ب، ج) من الفقرة (1) من هذه المادة؛ ويراعى فيها طبيعة كل مخالفة وجسامتها، والظروف المشددة والمخففة لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'مع مراعاة ما ورد في المادة (الرابعة عشرة) من النظام يتولى النظر في مخالفات أحكام النظام، وإيقاع العقوبات المنصوص عليها في الفقرات الفرعية (أ، ب، ج) من الفقرة (1) من المادة (الثانية عشرة) من النظام؛ لجنة (أو أكثر) تُكوَّن بقرار من الوزير لمدة (ثلاث) سنوات قابلة للتجديد، تتكون من (ثلاثة) أعضاء، ويحدد قرار تكوينها من يتولى رئاستها، على أن يكون من المتخصصين في الشريعة أو الأنظمة، وتصدر قراراتها بالأغلبية على الأقل، وتكون مسببة، ويعتمد الوزير قراراتها الصادرة بالغرامة التي تزيد على (100.000) مئة ألف ريال، أو بإلغاء الترخيص أو التصريح. وتُحدد اللوائح قواعد عمل اللجنة وإجراءاتها، ومكافآت أعضائها. للجنة -المنصوص عليها في الفقرة (1) من هذه المادة- وفقاً لأحكام النظام ما يأتي: أ- فرض غرامة عن كل يوم يستمر فيه المخالف في مخالفته بعد تبليغه بقرار اللجنة المكتسب الصفة القطعية. ب- مضاعفة العقوبة الموقعة على المخالف في حال تكرار المخالفة. ج- الطلب من المحكمة المختصة الحكم بمصادرة المضبوطات محل المخالفة ويجوز لصاحب الشأن التظلم من القرارات الصادرة في حقه أمام المحكمة الإدارية خلال (ستين)
    يوماً من تاريخ إبلاغه بالقرار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال بأي عقوبة أشد ينص عليها نظام آخر، يعاقب بالسجن مدة لا تزيد على (عشر) سنوات وبغرامة لا تزيد على (2.000,000) مليوني ريال، أو بإحدى هاتين العقوبتين؛ كل من قام -بالمخالفة لحكم المادة (الثامنة) من النظام- بأي من أعمال خدمات الأرصاد الجوية السيادية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تتولى النيابة العامة التحقيق والادعاء في المخالفات التي تدخل في اختصاص المحكمة الجزائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'تتولى المحكمة الجزائية النظر في المخالفات المنصوص عليها في المادة (الرابعة عشرة) من النظام، وإيقاع العقوبتين المنصوص عليهما فيها، ويجوز لها ما يأتي: فرض غرامة عن كل يوم يستمر فيه المخالف في مخالفته بعد تبليغه بالحكم النهائي الصادر بالعقوبة. مضاعفة الغرامة الموقعة على المخالف في حالة تكرار المخالفة. مصادرة المضبوطات محل المخالفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجوز تضمين الحكم أو القرار الصادر بالعقوبة -بحسب الأحوال- النص على نشر منطوقه على نفقة المخالف في صحيفة محلية تصدر في مقر إقامته، فإن لم تكن في مقر إقامته صحيفة ففي أقرب منطقة إليه، أو نشره في أي وسيلة أخرى مناسبة؛ وذلك بحسب نوع المخالفة المرتكبة وجسامتها وتأثيرها، على أن يكون النشر بعد اكتساب الحكم الصفة القطعية، أو تحصن القرار بفوات ميعاد التظلم منه، أو صدور حكم نهائي برفض التظلم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تُمثل الأحكام الواردة في النظام واللوائح الحد الأدنى فيما يتعلق بتحقيق الالتزام بالاشتراطات والضوابط والإجراءات والمقاييس والمعايير اللازمة لتنظيم قطاع الأرصاد. دون إخلال بما ورد في الفقرة (1) من هذه المادة، تُطبق أحكام النظام فيما لم يرد في شأنه نص نظامي خاص، على ألا يخل ذلك النص بالتقيد بالأحكام الأخرى الواردة في النظام. لا يخل تطبيق أحكام النظام بالتزامات المملكة في الاتفاقيات الدولية -ذات العلاقة- التي تكون المملكةُ طرفاً فيها، والأنظمة الصادرة من مجلس التعاون لدول الخليج العربية التي صادقت عليها المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يُصِدر الوزير اللوائح خلال (مائة وثمانين) يوماً من تاريخ نشر النظام في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يُعمَل بالنظام بعد مضي (مائة وثمانين) يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cd3a793a-ab18-4ad3-b28e-ad2e00a7f88f/1
  verified: false
