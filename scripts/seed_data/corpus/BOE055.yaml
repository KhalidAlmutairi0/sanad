regulation:
  code: BOE055
  name_ar: نظام الهيئة السعودية للمهندسين
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: الهيئة السعودية للمهندسين هيئة مهنية علمية ذات شخصية اعتبارية وذمة مالية مستقلة تعمل تحت إشراف وزارة التجارة مقرها مدينة الرياض، ويجوز لها أن تنشئ فروعا داخل المملكة، ويعبر عنها بالهيئة في مواد هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تهدف الهيئة إلى النهوض بمهنة الهندسة وكل ما من شأنه تطوير ورفع مستوى هذه المهنة والعاملين فيها، ولها على الأخص ما يأتي : 1 - وضع أسس ومعايير مزاولة المهنة وتطويرها بما في ذلك شروط الترخيص.2 - وضع القواعد والامتحانات اللازمة للحصول على الدرجات المهنية.3 - إعداد الدراسات والبحوث والإحصاءات المتعلقة بشعب وفروع الهندسة، ونشرها، وإصدار مجلات مهنية وعلمية.4 - تنظيم الدورات وإقامة المؤتمرات والندوات والمعارض ذات العلاقة بالمهنة، والمشاركة فيها.5 - إبداء المقترحات التي تراها مناسبة للقرارات والتعليمات المتعلقة بالمهنة.6 - تقديم المشورة الفنية في مجال اختصاصها وفقا للضوابط التي يقرها مجلس إدارة الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تتكون عضوية الهيئة من : 1 - عضوية أساسية : وتشمل جميع السعوديين الحاصلين على شهادة جامعية في التخصصات الهندسية أو ما يعادلها، العاملين في هذه المهن. 2 - عضوية انتساب وتشمل : أ - جميع المهندسين غير السعوديين الحاصلين على شهادة جامعية أو ما يعادلها في إحدى شعب الهندسة، العاملين في مهنة الهندسة داخل المملكة.ب - من يتقدم بطلب العضوية من الفنيين والطلاب والمهتمين بعلوم الهندسة.ج - المكاتب والشركات المهنية الهندسية المرخص لها بمزاولة مهنة الهندسة في المملكة. 3 - عضوية فخرية : ويمنحها مجلس إدارة الهيئة لمن يقدم إسهامات متميزة تخدم الهيئة. ويعفى العضو الفخري من رسوم الاشتراك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون للهيئة جمعية عمومية تتكون من الأعضاء الأساسيين الذين سددوا اشتراكاتهم السنوية. وتعقد الجمعية العمومية اجتماعاتها العادية مرة كل سنة، وتعقد اجتماعاتها الاستثنائية وفق ما تحدده اللائحة التنفيذية.وتوجه الدعوة لاجتماعات الجمعية العمومية قبل عشرين يوما على الأقل من تاريخ انعقادها، وتحدد الدعوة مكان الاجتماع وزمانه. ويكون الاجتماع صحيحا مهما كان عدد الحاضرين. وتصدر قرارات الجمعية العمومية بأغلبية أصوات الحاضرين، وفي حالة التساوي يرجح الجانب الذي صوت معه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تختص الجمعية العمومية بما يأتي : 1 - إصدار التنظيم الداخلي للهيئة.2 - إقرار اللوائح التنفيذية لنظام الهيئة.3 - إقرار اشتراكات الأعضاء.4 - الموافقة على الحسابات الختامية للهيئة، وتعيين مراقب لحساباتها وتحديد مكافآته. واستثناء من ذلك يعين مجلس الإدارة مراقب الحسابات للمدة الأولى ويحدد مكافآته.5 - إقرار خطة العمل التي يقدمها مجلس إدارة الهيئة، واعتماد التقرير السنوي عن نشاطها.6 - انتخاب ممثلي الجمعية العمومية في مجلس الإدارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى إدارة الهيئة مجلس إدارة يتكون من: 1- وزير التجارة رئيسا وله أن ينيب أحد أعضاء المجلس في ذلك.2- وكيل وزارة التجارة عضواً.3- وكيل وزارة الشؤون البلدية والقروية ، أو من يختاره وزير الشؤون البلدية والقروية ، على ألا تقل مرتبته عن الرابعة عشرة.4- وكيل وزارة الصناعة والكهرباء ، أو من يختاره وزير الصناعة والكهرباء ، على ألا تقل مرتبته عن الرابعة عشرة.5- ثلاثة أعضاء سعوديين من أعضاء هيئة التدريس بالجامعات من الكليات ذات العلاقة لا تقل درجة كل منهم عن أستاذ مشارك، يختارهم وزير التعليم العالي.6- ممثل لمجلس الغرف التجارية الصناعية يسميه وزير التجارة بناءً على ترشيح من مجلس الغرف .7- ستة من الأعضاء الأساسيين في الهيئة تنتخبهم الجمعية العمومية للهيئة لمدة ثلاث سنوات قابلة للتجديد مرة واحدة، واستثناءً من ذلك يعين ممثلو الجمعية العمومية في مجلس الإدارة الأول بقرار من وزير التجارة .ويعاد تشكيل المجلس كل ثلاث سنوات، ويجتمع مجلس الإدارة مرة على الأقل كل تسعين يوماً، أو كلما طلب ذلك - كتابة - أربعة أعضاء على الأقل، أو رئيس مجلس الإدارة . وتعقد الاجتماعات بحضور أغلبية الأعضاء، على
    أن يكون من بينهم الرئيس أو من ينيبه. وتصدر القرارات بأغلبية أصوات الحاضرين، فإذا تساوت الأصوات يكون صوت رئيس الاجتماع مرجحاً. ويحضر الأمين العام للهيئة الاجتماعية دون أن يكون له حق التصويت.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يقوم مجلس الإدارة بممارسة الصلاحيات اللازمة لتصريف شؤونها وتحقيق أهداف الهيئة المنصوص عليها في المادة (الثانية) من النظام. وله على الأخص ما يأتي:1 - دعوة الجمعية العمومية للانعقاد.2 - اقتراح التنظيم الداخلي للهيئة .3 - اقتراح اللوائح التنفيذية لنظام الهيئة .4 - اقتراح قيمة اشتراكات الأعضاء.5 - إعداد الحسابات الختامية للهيئة.6 - إعداد التقرير السنوي عن نشاط الهيئة، واقتراح خطة عمل لها.7 - إقرار الميزانية السنوية للهيئة .8 - تشكيل اللجان الفنية والعلمية والشعب الهندسية، ووضع قواعد ممارسة مهماتها.9 - تعيين الأمين العام للهيئة ونائبه ، وتحديد واجباتهما ومسؤولياتهما وحقوقهما.10 - قبول الهبات والتبرعات. 11 - إقرار سياسة استثمار أموال الهيئة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتكون موارد الهيئة المالية من: 1 - اشتراكات الأعضاء.2 - الهبات والتبرعات.3 - إيراد ما تقدمه الهيئة من خدمات.4 - عائد استثمار أموال الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ، ويعمل به بعد ستين يوما من تاريخ نشره، ويلغى كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e1de77d-3cd1-44d8-b174-a9a700f1ab06/1
  verified: false
