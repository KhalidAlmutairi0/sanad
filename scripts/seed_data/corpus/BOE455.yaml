  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولاً
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذه الترتيبات- المعاني المبينة أمام كل منها: الترتيبات: الترتيبات التنظيمية لهيئة الصحة العامة. الهيئة: هيئة الصحة العامة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الصحة العامة: منظور متكامل وشامل لصحة الفرد والأسرة والمجتمع، والتأثيرات البيئية والاجتماعية والاقتصادية والوراثية عليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: ثانياً
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميًّا بوزير الصحة، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: 'تهدف الهيئة إلى حماية الصحة العامة وتعزيزها، والوقاية من الإصابة بالأمراض، ورفع الجاهزية العامة للاستجابة لطوارئ الصحة العامة من خلال تنظيم الجهود بين الجهات ذات العلاقة. ولها في سبيل ذلك -دون إخلال باختصاصات الجهات ذات العلاقة- ممارسة الاختصاصات الآتية: وضع السياسات والخطط والبرامج والمبادرات في مجال الصحة العامة، ومراجعتها، وتقويمها، والإشراف على تنفيذها. إعداد خطط الجاهزية والاستجابة لطوارئ الصحة العامة، بالتنسيق مع منظمة الصحة العالمية والجهات المحلية والإقليمية والدولية ذات العلاقة، وفق الإجراءات النظامية المتبعة. رصد وتقصي المخاطر والأمراض المهددة للصحة العامة، ومتابعتها على المستوى الوطني والإقليمي والدولي. اعتماد إجراءات السلامة والرعاية الصحية الوقائية لمخاطر الصحة العامة، ومكافحتها، وتقويمها؛ بالتنسيق مع الجهات ذات العلاقة. اعتماد سياسات وإجراءات عمل مختبرات الصحة العامة، بالتنسيق مع الجهات ذات العلاقة. اعتماد المختبرات المتخصصة بمجالات الصحة العامة، ووضع المعايير والاشتراطات الفنية المخبرية اللازمة ذات العلاقة باختصاص الهيئة، والتنسيق مع الجهات المعنية لربط
    تراخيص تلك المختبرات بالحصول على شهادات الاعتماد. إعداد المعايير المهنية الداخلة في اختصاصها، وتزويد الجهات ذات العلاقة بها لمراعاتها عند ممارسة منسوبيها لمهماتهم في مجال الصحة العامة، وكذلك تزويد قطاعات التعليم والتدريب الحكومية والأهلية التي تقدم برامج تعليمية ذات علاقة بتلك المعايير، للاسترشاد بها ولتكون حدًّا أدنى لمتطلبات المناهج المقدمة لتلبية احتياجات سوق العمل. إنشاء قاعدة بيانات خاصة بالأمراض المعدية والأوبئة ومخاطر الصحة العامة، وتبادل المعلومات في شأنها مع الجهات ذات العلاقة. توثيق المعلومات في مجالات الصحة العامة، وحفظها، ونشرها، بالتنسيق مع الجهات والمراكز ذات العلاقة. اقتراح الحلول العلمية للمشكلات الصحية ومخاطر الصحة العامة. تحديد أولويات نقل التقنية الخاصة بصناعة الأدوية واللقاحات والأمصال وتطويرها، وبخاصة المضادة للفيروسات، وذلك بحسب الأولويات الصحية التي تحددها الهيئة، بالتنسيق مع الجهات ذات العلاقة. عقد المؤتمرات والندوات وورش العمل، وإصدار النشرات في مجال الصحة العامة، وفق الإجراءات النظامية المتبعة. اعتماد المقيمين المؤهلين لمهمات الاعتماد ذات العلاقة باختصاصات الهيئة.
    تمثيل المملكة في الجهات النظيرة والمنظمات الإقليمية والدولية في مجالات اختصاص الهيئة، وفق الإجراءات النظامية المتبعة. إنشاء وتشغيل مختبرات الأمان البيولوجي من المستويين الثالث والرابع والمختبرات التي تشمل جميع اختصاصاته. مراجعة الأنظمة والتنظيمات واللوائح ذات العلاقة باختصاص الهيئة، والرفع عما يتطلب اتخاذ إجراء في شأنه. اعتماد إجراءات إحالة العينات والنقل بين مختبرات الصحة العامة وكذلك المختبرات من القطاعات الأخرى الحكومية والخاصة، بالتنسيق مع الجهات ذات العلاقة. إنشاء نظام ربط آلي لمختبرات الصحة العامة والمختبرات ذات العلاقة؛ لتكوين شبكة متكاملة لتبادل المعلومات في مجال الصحة العامة على مستوى المملكة. التنسيق مع الجهات الحكومية المختصة لزيارة المرافق التي تمارس أنشطة ذات علاقة باختصاص الهيئة، وجمع المعلومات اللازمة وإصدار التوصيات في شأنها، والرفع عما يلزم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: رابعاً
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة وزير الصحة، وعضوية عدد من الأعضاء على النحو الآتي: أ- الرئيس التنفيذي للهيئة العامة للغذاء والدواء. عضواً ب- ممثل من وزارة الصحة. عضواً ج- ممثل من وزارة الداخلية. عضواً د- أمين عام الهيئة السعودية للتخصصات الصحية. عضواً هـ- ممثل من وزارة الشؤون البلدية والقروية والإسكان للشؤون البلدية. عضواً و- ممثل من وزارة البيئة والمياه والزراعة. عضواً ز- ممثل من وزارة التعليم. عضواً ح- ممثل من وزارة الموارد البشرية والتنمية الاجتماعية. عضواً ط- ممثل من وزارة التجارة. عضواً ي- ممثل من المجلس الصحي السعودي. عضواً ك- الرئيس التنفيذي للهيئة. عضواً ل- (ثلاثة) من المتخصصين وذوي الخبرة في مجال عمل الهيئة، يعينون بقرار من مجلس الوزراء بناء على ترشيح من الرئيس. أعضاء يجب ألا تقل مراتب ممثلي الجهات الحكومية عن المرتبة (الثالثة عشرة) أو ما يعادلها، وتكون مدة عضوية الأعضاء -عدا الرئيس والرئيس التنفيذي- (ثلاث) سنوات قابلة للتجديد لمرة واحدة. لرئيس المجلس تعيين نائب له من ممثلي الجهات الحكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: خامساً
  article_text_ar: 'يعد المجلس السلطة المهيمنة على شؤون الهيئة وإدارتها وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها وتنفيذ اختصاصاتها، وله على وجه خاص ما يلي: إقرار السياسات العامة والخطط الاستراتيجية للهيئة، ومراجعتها، ومتابعة تنفيذها. إقرار اللوائح الإدارية والمالية وغيرها من اللوائح الداخلية للهيئة، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية ووزارة الموارد البشرية والتنمية الاجتماعية. تحديد المقابل المالي لما تقدمه الهيئة من خدمات أو أعمال يرى المجلس استحصال مقابل مالي عنها، بالاتفاق مع وزارة المالية، ومركز تنمية الإيرادات غير النفطية. اعتماد المؤشرات ذات العلاقة بالوضع الصحي الوطني وعبء الأمراض، ومشاركتها مع المنظمات والهيئات الدولية عبر القنوات الرسمية. إقرار قواعد وإجراءات تكوين اللجان العلمية والفنية وفرق العمل في الهيئة، وتحديد مكافآت أعضائها. إقرار مشروع الميزانية السنوية للهيئة. إقرار الحساب الختامي والتقرير السنوي للهيئة، ورفعهما وفق الإجراءات النظامية المتبعة. تعيين مراجع معتمد (أو أكثر) لحسابات الهيئة،
    واعتماد تقاريره. قبول التبرعات والهبات والمنح والوصايا والأوقاف التي تقدم إلى الهيئة، وفق الإجراءات النظامية المتبعة. الموافقة على فتح فروع أو مكاتب للهيئة. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، وفق الإجراءات النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: سادساً
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة، ويجوز -عند الحاجة- بموافقة الرئيس عقدها في مكان آخر. يجتمع المجلس (أربع) مرات في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وعلى الرئيس دعوة المجلس إلى الاجتماع إذا طلب ذلك نصف الأعضاء على الأقل. وفي جميع الأحوال، يجب أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء على الأقل بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حال تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. ولا يجوز لعضو المجلس الامتناع عن التصويت ولا تفويض عضو آخر بالتصويت نيابةً عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسبابه ضمن محضر اجتماع المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: سابعاً
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يعين ويعفى بقرار من المجلس، ويحدد فيه أجره ومزاياه المالية الأخرى، يتولى إدارة شؤون الهيئة، وله على وجه خاص ما يلي: الإشراف على سير العمل في الهيئة. إعداد الخطط والبرامج اللازمة لتنفيذ أهداف الهيئة، ورفعها إلى المجلس؛ لاعتمادها. إعداد هيكل الهيئة التنظيمي، ورفعه إلى المجلس؛ لاعتماده. إعداد لوائح الهيئة المالية والإدارية وغيرها من اللوائح الداخلية لتسيير شؤون الهيئة، ورفعها إلى المجلس؛ لاعتمادها. تعيين العاملين في الهيئة وفق اللوائح المعتمدة، والإشراف عليهم. تنفيذ البرامج وجميع نشاطات الهيئة في حدود الميزانية السنوية للهيئة. الصرف من الميزانية المعتمدة، واتخاذ الإجراءات المالية وفقاً للأنظمة ولما يقرره المجلس. تمثيل الهيئة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى داخل المملكة وخارجها، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. إعداد مشروع الميزانية السنوية للهيئة، ورفعه إلى المجلس؛ لإقراره. إعداد التقرير السنوي، والتقارير الخاصة بتنفيذ خطط الهيئة وبرامجها، وعرضها على المجلس؛ لاعتمادها. الموافقة على عقد الهيئة
    المؤتمرات والندوات واللقاءات العلمية، ذات العلاقة بعملها، وفق الإجراءات النظامية المتبعة. التوقيع على الاتفاقيات والعقود، وفق الإجراءات النظامية المتبعة. ما يسنده إليه المجلس من اختصاصات أو صلاحيات أخرى. وللرئيس التنفيذي تفويض بعض اختصاصاته وصلاحياته إلى من يراه من منسوبي الهيئة، وفق ما تحدده لوائح الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: ثامناً
  article_text_ar: يكون للهيئة ميزانية سنوية مستقلة، تعد وتصدر وفق ترتيبات إصدار الميزانية العامة للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: تاسعاً
  article_text_ar: 'تتكون موارد الهيئة المالية من الآتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- المقابل المالي للأعمال والخدمات التي تقدمها. ج- التبرعات والهبات والمساعدات والوصايا وريع الأوقاف التي يقبلها المجلس. د- أي مورد آخر يقره المجلس بما لا يتعارض مع الأنظمة والتعليمات. تودع أموال الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة المعتمدة ولوائحها المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: عاشراً
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: حادي عشر
  article_text_ar: يقوم المجلس بإعداد مشروع تنظيم للهيئة، في ضوء ما ورد في الترتيبات، وما قد يظهر له في هذا الشأن. يرفع المجلس مشروع التنظيم -المنصوص عليه في الفقرة (1) من هذا البند- خلال مدة لا تتجاوز (اثني عشر) شهراً من تاريخ الموافقة على الترتيبات؛ لاستكمال الإجراءات النظامية اللازمة في شأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: ثاني عشر
  article_text_ar: تحل هذه الترتيبات محل قرار مجلس الوزراء رقم (200) وتاريخ 19 / 6 / 1434هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
  verified: false
- article_ref: ثالث عشر
  article_text_ar: تنشر الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c7a10e52-37e6-492d-a3cf-acea0013f2f0/1
