articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالمصطلحات والعبارات الآتية أينما وردت في هذا النظام المعاني الموضحة أمام كل منها، ما لم يدل السياق على خلاف ذلك: 1- التزوير: كل تغيير للحقيقة بإحدى الطرق المنصوص عليها في هذا النظام ـ حدث بسوء نية ـ قصداً للاستعمال فيما يحميه النظام من محررٍ أو خاتمٍ أو علامةٍ أو طابعٍ ، وكان من شأن هذا التغيير أن يتسبب في ضرر مادي أو معنوي أو اجتماعي لأي شخص ذي صفة طبيعية أو اعتبارية. 2- الخاتم: الأداة التي تمهر بها المحررات للتوثيق، أو الأثر المنطبع منها. 3- الطابع: الملصق أو ما يقوم مقامه مما يطبع آليًّا أو إلكترونيًّا ويستخدم لأغراض البريد أو لتحصيل الإيرادات العامة. 4- العلامة: الإشارة (أو الرمز) التي تستعملها جهة عامة للدلالة على معنى خاص بها يرتب أثراً نظاميًّا، بصرف النظر عن نوعها أو شكلها. 5- المحرر: كل مسطور يتضمن حروفاً أو علامات ينتقل بقراءتها الفكر إلى معنى معين بصرف النظر عن الوعاء الذي كتبت أو حفظت فيه، بما في ذلك وسائل تقنية المعلومات. 6- الأوراق الخاصة بالمصارف: المحررات التي تستعملها المصارف للإيداع أو السحب أو التحويل من خزينتها أو حساباتها أو من حساب أحد العملاء،
    ويدخل في ذلك الاعتمادات المستندية، وخطابات الضمان، وبطاقات الائتمان، وبطاقات الحسم. 7- الوثيقة التاريخية: محرر قديم ونادر يتضمن وقائع ومعلومات عن تاريخ المملكة، وتكون له قيمة تاريخية وليست له حجية نظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يقع التزوير بإحدى الطرق الآتية: أ - صنع محررٍ أو خاتمٍ أو علامةٍ أو طابعٍ، لا أصل له أو مقلدٍ من الأصل أو محرَّفٍ عنه. ب- تضمين المحرر خاتماً أو توقيعاً أو بصمة أو علامة أو طابعاً، لا أصل له أو مقلداً من الأصل أو محرفاً عنه. ج- تضمين المحرر توقيعاً صحيحاً أو بصمة صحيحة، حصل على أي منهما بطريق الخداع. د- التغيير أو التحريف في محررٍ أو خاتمٍ أو علامةٍ أو طابعٍ، سواء وقع ذلك بطريق الإضافة أو الحذف أو الإبدال، أو الإتلاف الجزئي للمحرر الذي يغير من مضمونه. هـ - التغيير في صورة شخصية في محرر، أو استبدال صورة شخص آخر بها. و- تضمين المحرر واقعة غير صحيحة بجعلها تبدو واقعةً صحيحة، أو ترك تضمين المحرر واقعةً كان الفاعل عالماً بوجوب تضمينها فيه. ز- تغيير إقرار أُولي الشأن الذي كان الغرض من تحرير المحرر إدراجه فيه. ح- إساءة استخدام توقيع أو بصمة على بياض اؤتمن عليه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: من زوّر خاتم الدولة، أو خاتم الملك أو ولي العهد أو رئيس مجلس الوزراء أو أحد نوابه، أو خاتم الديوان الملكي أو ديوان ولي العهد؛ يعاقب بالسجن من ثلاث إلى عشر سنوات وبغرامة لا تزيد على مليون ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: من زوّر خاتماً أو علامةً منسوبة إلى جهة عامة، أو إلى أحد موظفيها بصفته الوظيفية، أو زوّر خاتماً أو علامة لها حجية في المملكة عائدة لأحد أشخاص القانون الدولي العام أو لأحد موظفيه بصفته الوظيفية ؛ يعاقب بالسجن من سنة إلى سبع سنوات وبغرامة لا تزيد على سبعمائة ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: من زوّر خاتمَ جهةٍ غير عامة، يعاقب بالسجن مدة لا تتجاوز ثلاث سنوات وبغرامة لا تزيد على ثلاثمائة ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: من زوّر طابعاً يعاقب بالسجن مدة لا تتجاوز خمس سنوات، وبغرامةٍ لا تزيد على خمسمائة ألف ريال، مع إلزامه بدفع ما فوته على الخزينة العامة من مبالغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: من أعاد استعمال طابعٍ سبق تحصيل قيمته، يعاقب بالسجن مدة لا تتجاوز ثلاثة أشهر، وبغرامةٍ لا تزيد على ثلاثين ألف ريال ، أو بإحدى هاتين العقوبتين، مع إلزامه بدفع ما فوته على الخزينة العامة من مبالغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: من زوّر محرراً منسوباً إلى جهة عامة أو أحد موظفيها بصفته الوظيفية، أو إلى أحد أشخاص القانون الدولي العام أو أحد موظفيه بصفته الوظيفية إذا كان للمحرر حجية في المملكة؛ يعاقب بالسجن من سنة إلى خمس سنوات وبغرامة لا تزيد على خمسمائة ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: من زوّر محرراً عرفيًّا، يعاقب بالسجن مدة لا تتجاوز ثلاث سنوات وبغرامة لا تزيد على ثلاثمائة ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: من زوّر محرراً منسوباً إلى الملك، أو ولي العهد، أو رئيس مجلس الوزراء، أو أحد نوابه؛ يعاقب بالسجن من ثلاث إلى عشر سنوات وبغرامة لا تزيد على مليون ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: من زوّر سنداتٍ أو أوراقاً ذات قيمة مما تصدره الخزينة العامة، يعاقب بالسجن من سنتين إلى سبع سنوات وبغرامة لا تزيد على مليون ريال، مع إلزامه بدفع ما فوته على الخزينة العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: كل موظفٍ عامٍّ زوّر محرراً مما يختص بتحريره، يعاقب بالسجن من سنة إلى سبع سنوات وبغرامة لا تزيد على سبعمائة ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: من زوّر أوراقاً تجارية أو مالية أو الأوراق الخاصة بالمصارف، أو وثائق تأمين؛ يعاقب بالسجن من سنة إلى خمس سنوات وبغرامة لا تزيد على أربعمائة ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: من زوّر أو منح (بحسب اختصاصه) تقريراً أو شهادةً طبيةً على خلاف الحقيقة مع علمه بذلك؛ يعاقب بالسجن مدة لا تتجاوز سنة وبغرامة لا تزيد على مائة ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: كل مختص زوّر في أوراق إجابات الاختبارات الدراسية أو بيانات رصد نتائجها، يعاقب بالسجن مدة لا تتجاوز ستة أشهر وبغرامة لا تزيد على ستين ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: من زوّر في محرر معدّ لإثبات حضور الموظف إلى عمله أو انصرافه منه؛ يعاقب بالسجن مدة لا تتجاوز ثلاثة أشهر وبغرامة لا تزيد على ثلاثين ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: من استعمل حكماً أو أمراً قضائياً أو وكالة صادرة من جهة مختصة انتهت صلاحيتها، وكان عالماً بذلك، وقاصداً الإيهام بأنها لا تزال حافظةً لحجيتها النظامية، وترتب على هذا الاستعمال إثبات حقٍّ أو إسقاطه أو حدوث ضررٍ للغير؛ يعاقب بالسجن مدة لا تتجاوز سنة وبغرامة لا تزيد على مائة ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: من زوّر وثيقة تاريخية، يعاقب بالسجن مدة لا تتجاوز ثمانية أشهر وبغرامة لا تزيد على ثمانين ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يعاقب بالعقوبة نفسها المقررة لجريمة التزوير المنصوص عليها في هذا النظام، كل من استعمل أيًّا مما نص على تجريمه في هذا النظام مع علمه بتزويره، وكل من جلب إلى المملكة أو حاز فيها أيًّا مما نص على تجريمه في المواد (الثالثة) و(الرابعة) و(السادسة) و(الثامنة) و(العاشرة) و(الحادية عشرة) و(الثالثة عشرة) مع علمه بتزويره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يعاقب على الشروع في أي من الجرائم المنصوص عليها في هذا النظام، بما لا يتجاوز نصف الحد الأقصى للعقوبة المقررة لتلك الجريمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: من اشترك - بطريق الاتفاق أو التحريض أو المساعدة - في ارتكاب أيّ من الجرائم المنصوص عليها في هذا النظام، يعاقب بالعقوبة نفسها المقررة لتلك الجريمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: على المحكمة المختصة - عند الإدانة بأيٍّ من الجرائم المنصوص عليها في هذا النظام - الحكم بمصادرة جميع الأشياء المضبوطة التي استعملت في تلك الجريمة والمتحصلة منها دون الإخلال بحق الغير حسن النية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: كل منشأة خاصة تعمل في المملكة ثبت أن مديرها أو أحد منسوبيها ارتكب جريمة من الجرائم المنصوص عليها في هذا النظام لمصلحتها وبعلم منها، تعاقب بغرامة لا تزيد على عشرة ملايين ريال، وبالحرمان من التعاقد من سنتين إلى خمس سنوات مع أي جهة عامة، وذلك دون الإخلال بأي عقوبة نص عليها هذا النظام في حق الشخص ذي الصفة الطبيعية مرتكب الجريمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: للمحكمة المختصة إيقاف أي عقوبة تبعية تترتب على الإدانة بالجرائم المنصوص عليها في المواد (السابعة) و(الرابعة عشرة) و(الخامسة عشرة) و(السادسة عشرة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تحكم المحكمة المختصة بالإعفاء من عقوبة جرائم التزوير المنصوص عليها في هذا النظام، لكل من بادر من الجناة بالإبلاغ عن جريمته قبل اكتشافها واستعمال المزوّر.وللمحكمة المختصة إعفاء الجاني من العقوبة بعد اكتشاف الجريمة إذا أرشد عن باقي الجناة وسهّل القبض عليهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تطبق أحكام هذا النظام على كل من ارتكب خارج المملكة جريمةً من الجرائم المنصوص عليها في المواد (الثالثة) و(الرابعة) و(الثامنة) و(العاشرة) و(الحادية عشرة) و(الثالثة عشرة) من هذا النظام، إلا إذا ثبت أنه سبق أن صدر حكمٌ قضائي في الخارج بعدم إدانته بما أسند إليه أو حكم بإدانته عن الفعل نفسه واستوفى عقوبته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: فيما عدا الجرائم المنصوص عليها في المادتين (الثالثة) و(العاشرة)، تنقضي الدعوى الجزائية في الجرائم المنصوص عليها في هذا النظام بعد مضي عشر سنوات تبدأ من اليوم التالي لوقوع الجريمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: فيما عدا المواد (الرابعة عشرة) و(الخامسة عشرة) و(السادسة عشرة)، يجوز الحكم بنشر العقوبة المقضي بها في الجرائم الواردة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يلغي هذا النظام نظام مكافحة التزوير، الصادر بالمرسوم الملكي رقم (114) وتاريخ 26 /11 /1380هـ، وكل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يعمل بهذا النظام بعد مضي ثلاثين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c1878d16-7ce0-4710-993b-a9a700f17ac5/1
  verified: false
