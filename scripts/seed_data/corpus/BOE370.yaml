regulation:
  code: BOE370
  name_ar: تنظيم اللجنة الوطنية لتقنين أعمال التشغيل والصيانة وتقييسها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تنشأ - بموجب أحكام هذا التنظيم - لجنة وطنية في الهيئة السعودية للمهندسين تسمى (اللجنة الوطنية لتقنين أعمال التشغيل والصيانة وتقييسها)، ويشار إليها في هذا التنظيم بـ(اللجنة)، وتهدف إلى ما يلي: 1 - دراسة أوضاع التشغيل والصيانة وطرق تنفيذها. 2 - تطوير أساليب التشغيل والصيانة بما يتوافق مع التقنيات والأساليب الحديثة.3 - توحيد مواصفات التشغيل والصيانة وإجراءاتها.4 - وضع الأسس والضوابط والمعايير الفنية لأعمال التشغيل والصيانة. 5 - تحديد متطلبات أعمال التشغيل والصيانة بما يضمن جودة الأداء والاقتصاد في التكاليف.6 - تحديث المواصفات والإجراءات المتعلقة بأعمال التشغيل والصيانة بصفة مستمرة. 7 - التنسيق والمتابعة مع الجهات ذات العلاقة بالتشغيل والصيانة داخليًّا وخارجيًّا بما يتواءم مع تحقيق أهداف اللجنة. 8 - وضع خطط وبرامج إستراتيجية لتدريب العاملين في مجال التشغيل والصيانة وتأهيلهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: '1 - تشكل اللجنة من عدد من المختصين في مجال التشغيل والصيانة، وفقا لما يأتي: - ممثل من وزارة الدفاع والطيران (الإدارة العامة للأشغال العسكرية)عضواً - ممثل من وزارة الشؤون البلدية والقروية عضواً - ممثل من وزارة المالية عضواً - ممثل من وزارة الصحة عضواً - ممثل من وزارة النقل عضواً - ممثل من الهيئة السعودية للمواصفات والمقاييس والجودة عضواً - ممثل من الهيئة السعودية للمهندسين عضواً - ممثل من المديرية العامة للدفاع المدني (الإدارة العامة للسلامة)عضواً - ممثل من شركة أرامكو السعودية عضواً - ممثل من القطاع الخاص (يرشحه مجلس الغرف السعودية) عضواً - ثلاثة من أعضاء هيئة التدريس في الجامعات السعودية من المتخصصين في مجال التشغيل والصيانة، ويحدد أعضاء اللجنة الآخرون هذه الجامعات خلال الاجتماع الأول لها. 2 - تكون تسمية الأعضاء من رئيس الجهاز أو من ينيبه. 3 - يكون أعضاء اللجنة - الذين ترشحهم جهاتهم - أعضاء دائمين فيها، مع مراعاة أن ينوب عضو احتياطي عن العضو الدائم لتمثيل الجهة التابع لها، ويتمتع العضو الاحتياطي بجميع الحقوق والواجبات التي يتمتع بها العضو الدائم. 4 - يتولى ممثل الهيئة
    السعودية للمهندسين رئاسة الاجتماعات الثلاثة الأولى من بداية عمل اللجنة، على أن يتم خلالها اختيار رئيس اللجنة ونائبه من بين أعضائها وذلك بالتصويت، ويعاد اختيار رئيس اللجنة ونائبه وفقاً للآلية نفسها وذلك بشكل دوري كل سنة. 5 - للجنة أن تشكل فرقاً ولجاناً دائمة أو مؤقتة من بين أعضائها أو من غيرهم، وتعهد إليها بما تراه من مهمات، ويحدد قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ولها الاستعانة بمن تراه لتأدية المهمة المكلفة بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تعقد اللجنة اجتماعاتها بشكل دوري، على ألا تقل عن ستة اجتماعات في السنة، ويعد الاجتماع صحيحاً إذا حضره أكثر من نصف الأعضاء. وتتخذ اللجنة قراراتها بأغلبية أصوات الحاضرين، فإن تساوت الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. ولا تكون قرارات اللجنة نافذة بالنسبة إلى الفقرات (أ، ب،ج، د ،هـ ، و، ز،ح) من الفقرة (2) من مهمات اللجنة المنصوص عليها في المادة (الرابعة) من هذا التنظيم إلا بعد اعتمادها من مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تكون خطة عمل اللجنة على النحو الآتي: 1 - المرحلة الأولى، مدتها سنتان، وتهدف بشكل أساس إلى مسح الوضع الحالي لأعمال التشغيل والصيانة ودراسته، ووضع تصور لآليات عمل اللجنة، ويكون ذلك من خلال المهمات الآتية: أ - دراسة الوضع الراهن لأعمال التشغيل والصيانة وتقويمه، ووضع تصور موحد لمفاهيمها، وأسس تحديد متطلباتها، وتقدير تكاليفها، وإبداء المقترحات في شأنها.‌ب - وضع تصور لمتطلبات إعداد أدلة إرشادية للأسس السليمة للإشراف على أعمال التشغيل والصيانة، والطرق الصحيحة لتقويم الأداء والتحكم في أعمال التشغيل والصيانة، وإبداء المقترحات في شأنها.‌ج - اقتراح التعديلات المناسبة على أعمال اللجنة، وأعضائها وارتباطها ورئاستها، وآلية اتخاذ قراراتها والإلزام بها في المرحلة التالية. 2 - المرحلة الثانية تبدأ بعد موافقة مجلس الوزراء على مقترحات اللجنة المشار إليها في الفقرة (1) من هذه المادة، وتكون مهمات اللجنة خلال هذه المرحلة على النحو الآتي: أ - تحديد طرق التشغيل والصيانة التي تطبق في المرافق الحكومية، ووضع الأسس والضوابط والمعايير الفنية والنظامية ذات العلاقة بالتشغيل والصيانة. ب - إصدار دليل
    موحد يشتمل على تعريف وشرح مصطلحات وإجراءات التشغيل والصيانة.ج - وضع الأسس اللازمة لتحديث المنشآت والمرافق والمعدات وإعادة تأهيلها، وتحديد الأساليب المناسبة للمحافظة عليها بطرق اقتصادية خلال عمرها الافتراضي.د - وضع مؤشرات الأداء القياسية لأعمال التشغيل والصيانة وتطويرها.هـ - إصدار دليل لتنظيم تكاليف أعمال التشغيل والصيانة. و - إصدار دليل الإشراف على أعمال التشغيل والصيانة. ز - وضع معايير مهنية للأخصائيين والفنيين العاملين في مجال التشغيل والصيانة بالتنسيق مع الجهات ذات العلاقة.ح - وضع القواعد والأسس والمعايير الفنية التي تكفل انتظام المنشآت والمرافق وسلامة تشغيلها.ط - دراسة العقود النموذجية للتشغيل والصيانة بالتنسيق مع وزارة المالية والجهات ذات العلاقة، واقتراح السبل الكفيلة بتطويرها.ي - تقديم المشورة الفنية للجهات الحكومية والقطاع الخاص، لضبط مراقبة أعمال التشغيل والصيانة وجودتها. ك - إجراء الدراسات والبحوث والإحصاءات من أجل تحسين أعمال التشغيل والصيانة وتطويرها، وإيجاد قاعدة معلومات مرجعية.ل - التعاون وتبادل المعلومات في مجال أعمال التشغيل والصيانة مع الجهات المحلية والإقليمية والعالمية
    المتخصصة في أعمال التشغيل والصيانة، ونشرها.م - إصدار المطبوعات الإرشادية المتخصصة، ودعم الجهود المماثلة التي تنفذها الجهات المعنية الأخرى.ن - عقد الندوات واللقاءات المتعلقة بأعمال التشغيل والصيانة، وإقامة المعارض المختصة بذلك، لرفع مستوى الوعي لدى مؤسسات المجتمع وأفراده. 3 - يجب على اللجنة رفع مقترحاتها المشار إليها في الفقرة (1) من هذه المادة إلى وزير المالية قبل ثلاثة أشهر من انتهاء السنة الثانية للمرحلة الأولى ؛ لرفعها إلى مجلس الوزراء للنظر فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: للجنة الاستعانة بمستشارين ومتخصصين وبدور استشارية متخصصة لمساعدتها في تأدية مهماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: على اللجنة عند دراسة موضوعات تتعلق بجهة حكومية غير ممثلة في اللجنة الاستعانة بممثلين من تلك الجهة يرشحهم رئيسها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب على إدارات المشاريع والتشغيل والصيانة والإدارات المعنية في الأجهزة الحكومية التقيد بقرارات اللجنة التي يعتمدها مجلس الوزراء، ويجب على الأجهزة الرقابية - كل فيما يخصه - التأكد من قيام الإدارات في الأجهزة الحكومية بتنفيذ تلك القرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: '1- يكون للجنة أمانة مقرها الهيئة السعودية للمهندسين (شعبة هندسة التشغيل والصيانة)، ويكون للجنة أمين متفرغ ترشحه الشعبة وتوافق عليه اللجنة، ويرتبط تنظيميًّا برئيس اللجنة. 2 - تقوم الأمانة بالأعمال الإدارية، والمساندة الفنية لأعمال اللجنة، وبخاصة ما يأتي: أ‌ - إعداد وتحضير جدول أعمال اجتماعات اللجنة، واللجان المنبثقة منها، وموافاة اللجنة بالموضوعات المطروحة.ب‌ - متابعة تنفيذ أعمال اللجنة، وإعداد التقارير الدورية اللازمة عن الإنجازات والتوصيات، ورفعها إلى رئيس اللجنة.جـ - تسجيل المداولات والنقاشات والتوصيات، وإعداد محاضر اجتماعات اللجنة. د - إعداد ملفات اللجنة وتنظيمها وحفظها، كالمحاضر والوثائق والمستندات وكل ما يتعلق بأعمالها.هـ - توفير الوثائق والمصادر والمراجع الضرورية التي تحتاج إليها اللجنة، وتزويدها بالمراسلات والاتصالات ذات العلاقة بأعمالها. و - القيام بجميع الأعمال الخاصة بالشؤون الإدارية والمالية والسكرتارية للجنة، واتخاذ الإجراءات الإدارية والمالية اللازمة لتنفيذ خطة العمل التي تقرها اللجنة وفق صلاحياتها. ز- أي عمل آخر تكلفها به اللجنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعتمد ضمن ميزانية وزارة المالية بند خاص باسم (اللجنة الوطنية لتقنين أعمال التشغيل والصيانة وتقييسها)، ويصرف منه - وفق ضوابط تقترحها اللجنة ويعتمدها وزير المالية - على أعمال اللجنة ومكافآت أعضائها وأمانتها وفرق العمل والدور الاستشارية وفقاً للأنظمة واللوائح المالية المعمول بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ffa77a62-ef58-4cf2-a6f6-a9a700f1e70f/1
  verified: false
