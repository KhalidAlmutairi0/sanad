regulation:
  code: BOE287
  name_ar: اللائحة التنظيمية للجان إصلاح ذات البين في إمارات المناطق
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تُشكَّل في كل منطقة بقرار من أمير المنطقة لجنة لإصلاح ذات البين في القضايا المحكوم فيها بالقتل قصاصًا، ترتبط بأمير المنطقة، ويشار إليها فيما بعد بـ(اللجنة).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتولى اللجنة السعي في الإصلاح بين أطراف القضية، بما يحقق التسامح وإنهاء الخلافات وتصفية النفوس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يكون تشكيل اللجنة برئاسة وكيل إمارة المنطقة، وعضوية كل من: وكيل الإمارة المساعد لشؤون الحقوق نائبًا أمين اللجنة أربعة على الأقل من ذوي الخبرة والأمانة، وتكون عضويتهم لمدة (أربع) سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تعقد اجتماعات اللجنة في مقر إمارة المنطقة، ويجوز عند الاقتضاء عقدها في مكان آخر. تجتمع اللجنة -بناء على دعوة من الرئيس أو نائبه- مرة كل (ثلاثة) أشهر على الأقل، أو كلما دعت الحاجة إلى ذلك، أو بطلب من ثلث أعضائها على الأقل. ويجب أن توجه الدعوة للاجتماع -كتابة- قبل الاجتماع بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول أعمال الاجتماع. يكون اجتماع اللجنة صحيحًا بحضور أغلبية أعضائها على الأقل بمن فيهم رئيس اللجنة أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات اللجنة وقراراتها في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. للجنة أن تعقد اجتماعاتها وأن يُصوّت عليها عن بعد من خلال استخدام وسائل التقنية. ويمكن أن تتخذ القرارات بطريق التمرير على الأعضاء، وفي هذه الحالة يشترط موافقة جميع أعضاء اللجنة على القرار. لا يجوز للعضو الامتناع عن التصويت، أو تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن المحضر. لا يجوز للعضو المشاركة أو التوصية في أي موضوع
    يكون له علاقة أو مصلحة مباشرة فيه. لا يجوز للعضو أن يفشي شيئًا مما وقف عليه من أسرار اللجنة. للجنة دعوة من تراه لحضور اجتماعاتها للاستفادة من خبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تقوم اللجنة -في سبيل تحقيق أهدافها- بالمهمات والاختصاصات اللازمة التي تخدم الغاية التي أنشئت من أجلها، ومن ذلك ما يأتي: السعي في الإصلاح دون إكراه أو إجبار أو ضغط، وتقريب وجهات النظر بين أطراف القضية. الإشراف على أعمال السعي في الصلح في المنطقة إشرافًا كاملًا. الاستعانة بمن تراه مناسباً لإنجاز مهماتها. اقتراح تشكيل لجان فرعية تابعة لها بالمحافظات، ويكون إنشاؤها بقرار من أمير المنطقة، وتكون خاضعة لما تضمنته هذه اللائحة من أحكام وشروط. المساهمة والمشاركة المجتمعية فيما يتعلق بمهماتها، لتحقيق الهدف الذي أنشئت من أجله. أي مهمة أخرى تتعلق بأهداف اللجنة يسندها أمير المنطقة إليها، بما لا يتعارض مع هدف اللجنة المنصوص عليه المادة (الثانية) من هذه اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يكون للجنة أمين من منسوبي إمارة المنطقة، يعين بقرار من أمير المنطقة، ويشترط فيه الآتي: أ- أن يكون حاصلًا على درجة البكالوريوس على الأقل. ب- أن يكون من ذوي الخبرة والكفاية. ج- أن يكون مشهودًا له بالصلاح والاستقامة. يتولى أمين اللجنة الاختصاصات الآتية: أ- وضع آليات العمل، بما يتفق مع مهمات اللجنة وواجباتها. ب- الإشراف على سير العمل في اللجنة، وسكرتاريتها. ج- متابعة أعمال اللجنة. دـ- إعداد جدول أعمال اجتماعات اللجنة. هـ- إعداد التقارير الدورية والاحتياجات المالية لأعمال اللجنة تمهيدًا لرفعها إلى أمير المنطقة. و- الإشراف على الحسابات البنكية التي تفتح لجمع مبالغ الصلح، والمحافظة على سريتها، وفقًا للتعليمات المنظمة لذلك. ولأمين اللجنة الاستعانة ببعض منسوبي الإمارة للعمل في اللجنة بعد موافقة أمير المنطقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'تبدأ اللجنة أعمال السعي في الصلح بعد تعميد الإمارة من وزارة الداخلية بتنفيذ أحكام القتل، وعلى اللجنة قبل البدء في أعمالها التحقق من توافر الشروط الآتية: أن يكون الحكم الصادر في القضية قد تم تأييده من المحكمة العليا. أن يكون طلب السعي في الصلح ورد إلى اللجنة بتوجيه من أمير المنطقة، وللجنة قبول الطلب من غيره، على أن ترفعه مباشرة إلى أمير المنطقة مشفوعًا بما يسوّغه، لأخذ الإذن منه في البدء في أعمالها. ألَّا تكون القضية المحكوم فيها من قضايا جرائم القتل التي ترتبط بأعمال الخطف، أو السرقة، أو فعل فاحشة الزنا أو اللواط، أو التمثيل بالقتيل، أو تبييت النية بالقتل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تقوم اللجنة بعد ورود طلب البدء في أعمال السعي في الصلح بالآتي: التحقق من أن الطلب تتوافر فيه الشروط المنصوص عليها في المادة (السابعة) من هذه اللائحة. القيام بفتح ملف خاص بالقضية، على أن يشتمل الملف على ما يأتي: أ- توجيه أمير المنطقة بالبدء بأعمال السعي بالصلح. ب- صورة من صك الحكم. ج- تفاصيل القضية، ومعلومات المجني عليه، ومعلومات عن المحكوم عليه وتقرير عنه وعن وضعه في السجن وسلوكه، وصحيفة سوابقه. تكليف عضو -أو أكثر- من أعضاء اللجنة بتولي السعي في الصلح، على أن يزوّد اللجنة بتقرير دوري عما وصلت إليه أعمال السعي في الصلح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: عند التوصل إلى صلح مع أولياء الدم أو أحدهم؛ فعلى اللجنة تدوين الصلح في الحال، وأخذ توقيع الموافقين على الصلح من أولياء الدم عليه ومن حضر ممن يمثل المحكوم عليه بالقصاص، ويُكمل اللازم عليه عاجلاً. وإذا كان الصلح بمقابل؛ فيجب أن يكون هذا المقابل غير مُبالغ فيه، فإن كان كذلك فعلى الأعضاء المكلفين بالسعي في الصلح تدوين ذلك، مع مواصلة السعي في تخفيض المقابل، وتزويد اللجنة بما يتم في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: إذا كان الصلح مع أولياء الدم بمقابل، فيكون المحكوم عليه هو المطالب بالسداد، وعند تقدمه أو أحد ذويه أو وكيله للجنة بطلب فتح حساب بنكي لجمع المقابل، فيُرفع بذلك إلى وزارة الداخلية لطلب الموافقة عليه، ويكون الحساب البنكي تحت إشراف أمين اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: على كل من يرغب في السعي في الصلح من غير أعضاء اللجنة أن يتقدم بطلب إلى اللجنة، وعلى اللجنة إكمال اللازم على ضوء الضوابط المنظمة لأعمالها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يكون للجنة مخصص مالي، وفقاً لما يعتمده أمير المنطقة ضمن بنود ميزانية الإمارة، على أن يشمل ذلك المكافآت التي تخصص لرئيس وأعضاء اللجنة وأمينها وفق ما يحدده أمير المنطقة. يكون الصرف من المخصص المالي للجنة بقرار من أمين اللجنة بعد موافقة أمير المنطقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع اللجنة إلى أمير المنطقة تقريرًا سنويًّا مشتملًا على إنجازاتها وتقاريرها المالية، تمهيدًا لرفعه إلى وزير الداخلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'تُشكّل في وزارة الداخلية لجنة دائمة من كل من: وزارة الداخلية، ورئاسة أمن الدولة؛ تتولى مهمات الإشراف على أعمال لجان إصلاح ذات البين المشكلة في إمارات المناطق، والنظر في التقارير الدورية لتلك اللجان، واقتراح ما تراه لتطوير أعمالها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يصدر أمير المنطقة ما يلزم من قرارات لتنفيذ أحكام هذه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يعمل بهذه اللائحة من تاريخ الموافقة عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4a64a81-307e-4899-a555-af34014304ad/1
  verified: false
