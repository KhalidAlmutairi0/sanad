articles:
- article_ref: 'أولاً: التعريفات'
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذه القواعد- المعاني المبينة أمام كل منها: المجلس: مجلس الشؤون الاقتصادية والتنمية. المركز: المركز الوطني للتخصيص. مجلس الإدارة: مجلس إدارة المركز. اللجنة: اللجنة الإشرافية للقطاع المستهدف بالتخصيص. المشروع: مشروع التخصيص. القطاع: القطاع المستهدف بالتخصيص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'ثانياً: القطاعات'
  article_text_ar: 'تقسم القطاعات وفقًا لما يأتي: قطاع البيئة والمياه والزراعة، ويشمل (وزارة البيئة والمياه والزراعة، والمؤسسة العامة لتحلية المياه المالحة، والمؤسسة العامة للري، والمؤسسة العامة للحبوب، والمركز الوطني لإدارة النفايات، والمركز الوطني للأرصاد، والمركز الوطني لتنمية الغطاء النباتي ومكافحة التصحر، والمركز الوطني لتنمية الحياة الفطرية، والمركز الوطني للرقابة على الالتزام البيئي، وشركة المياه الوطنية). قطاع النقل، ويشمل (وزارة النقل، والهيئة العامة للطيران المدني، والهيئة العامة للنقل، والهيئة العامة للموانئ، والمؤسسة العامة للخطوط الجوية العربية السعودية، والمؤسسة العامة للخطوط الحديدية). قطاع الطاقة، ويشمل (وزارة الطاقة، ومدينة الملك عبدالله للطاقة الذرية والمتجددة). قطاع الصناعة والثروة المعدنية، ويشمل (وزارة الصناعة والثروة المعدنية، والهيئة الملكية للجبيل وينبع، والهيئة السعودية للمدن الصناعية ومناطق التقنية "مدن"، والمركز الوطني للتنمية الصناعية). قطاع العمل والتنمية الاجتماعية (وزارة الموارد البشرية والتنمية الاجتماعية). قطاع الإسكان (وزارة الإسكان). قطاع التعليم، ويشمل
    (وزارة التعليم، والمؤسسة العامة للتدريب التقني والمهني، والجامعات الحكومية). قطاع الصحة، ويشمل (وزارة الصحة، والمجلس الصحي السعودي، والمستشفيات التخصصية). قطاع البلديات، ويشمل (وزارة الشؤون البلدية والقروية، والأمانات). قطاع الحج والعمرة (وزارة الحج والعمرة) قطاع الاتصالات وتقنية المعلومات، ويشمل (وزارة الاتصالات وتقنية المعلومات، ومؤسسة البريد السعودي، وبرنامج التعاملات الإلكترونية الحكومية "يسر"). قطاع الإعلام، ويشمل (وزارة الإعلام، وهيئة الإذاعة والتلفزيون، والهيئة العامة للإعلام المرئي والمسموع، ووكالة الأنباء السعودية). قطاع الرياضة (وزارة الرياضة).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'ثالثاً: إضافة القطاعات وتشكيل اللجان'
  article_text_ar: 'تشكل لجنة لكل قطاع من القطاعات المشار إليها في البند (ثانيًا)، وأي قطاع آخر يستحدث وفقًا للفقرة (2) من هذا البند. يجوز لمجلس الإدارة إضافة قطاعات أخرى إلى القطاعات المشار إليها في البند (ثانيًا)، أو أجهزة أخرى إلى قطاعات قائمة أو التعديل عليها أو إلغاؤها، وتشكيل لجنة خاصة لأي من الأجهزة أو الأصول والخدمات الداخلة في أي من القطاعات وتحديد رئيس وأعضاء ومهمات وصلاحيات كل لجنة خاصة يتم تشكيلها، على أن يتضمن التشكيل وزارة المالية. تتكون كل لجنة على النحو الآتي: أ- الأعضاء الأساسيون: الوزير المعني (أو من يقوم مقامه) أو من يفوضه رئيسًا للجنة وزير المالية أو من يفوضه عضوًا ولمجلس الإدارة إضافة عضو آخر، على أن يحدد مجلس الإدارة في قراره صلاحيات ذلك العضو. ب- الأعضاء الإضافيون:يجوز بإجماع الأعضاء الأساسيين إضافة أعضاء إلى اللجنة على ألا يزيد عددهم على عضوين إضافيين وإنهاء عضويتهم، سواءً أكانت عضويتهم لمشاريع أو مشروع محدد، على أن يحدد في قرار الإضافة صلاحيات ذلك العضو. يجب أن يكون كل الأعضاء الأساسيين والإضافيين من الموظفين الحكوميين، وألا تقل مرتبة أي منهم عن (الخامسة عشرة) أو
    ما يعادلها. في حالة إضافة قطاع آخر إلى القطاعات المشار إليها في البند (ثانيًا) وكان الوزير المعني به هو وزير المالية (رئيس اللجنة)؛ فيكون لمجلس الإدارة إضافة عضو آخر إلى اللجنة إلى جانب رئيسها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'رابعاً: تطوير القطاع'
  article_text_ar: 'تقوم الوزارة أو الجهاز الحكومي المعني بالقطاع -بعد التنسيق مع الجهات الأخرى المشمولة بالقطاع ومع المركز- خلال المدة التي يحددها مجلس الإدارة -على ألا تتجاوز (أربعة وعشرين) شهرًا من تاريخ نفاذ هذه القواعد بالنسبة للقطاعات المشار إليها في البند (ثانيًا)- بإعداد خطة التخصيص للقطاع على أن تتضمن ما يأتي: أ- الأهداف المنشودة من مشاريع التخصيص في القطاع، وقائمة مشاريع التخصيص المقترحة، وأولويات تنفيذها، والجداول الزمنية المقترحة لتنفيذها. ب- مراجعة البيئة النظامية المنظمة للقطاع واقتراح تطويرها بما يحفز القطاع الخاص للاستثمار فيه، ويحقق الأهداف من التخصيص. تقوم الوزارة أو الجهاز الحكومي المعني بالقطاع -من خلال اللجنة- برفع خطة التخصيص -التي تم إعدادها- إلى مجلس الإدارة؛ للنظر في اعتمادها. ولمجلس الإدارة -وفق ما يراه مناسبًا وبعد أخذ موافقة رئيس اللجنة- نشر خطة التخصيص المعتمدة للقطاع المستهدف أو أي جزء منها للعموم أو إبلاغ أي أشخاص أو جهات أخرى يحددهم مجلس الإدارة بمضامينها أو أجزاء منها. إذا تضمنت خطة التخصيص المعتمدة ما يلزم استكمال إجراءات نظامية في شأن اقتراح تطوير البيئة
    النظامية المنظمة للقطاع، فتقوم الوزارة أو الجهاز الحكومي المعني بالقطاع باتخاذ الإجراءات النظامية اللازمة. لا يجوز البدء بدراسة أو طرح أو تنفيذ أي مشروع تخصيص غير وارد في قائمة المشاريع المقترحة ضمن خطة التخصيص المعتمدة للقطاع. على الوزارة أو الجهاز الحكومي المعني بالقطاع -بعد التنسيق مع المركز ومع الجهات الأخرى المشمولة بالقطاع- تحديث خطة التخصيص للقطاع مرة واحدة على الأقل كل (خمس) سنوات أو كلما لزم الأمر، والرفع بالخطة المحدثة بحسب ما هو محدد في الفقرة (2) من هذا البند. لا يسري حكم الفقرة (4) من هذا البند على القطاعات المشار إليها في البند (ثانيًا) أو أي قطاعات أخرى مضافة وفقًا لما ورد في البند (ثالثًا) إلا بعد مضي (ثلاثين) شهرًا من تاريخ نفاذ هذه القواعد أو إضافة قطاع أو اعتماد خطة تخصيص القطاع أيهما أسبق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'خامساً: اجتماعات اللجان وآليات عملها'
  article_text_ar: 'يصدر مجلس الإدارة ما يأتي: أ- القواعد والإجراءات المنظمة لاجتماعات اللجان، بما في ذلك عدد اجتماعاتها ونصاب الحضور، وآليات اتخاذ القرارات، والتفويض في الحضور، وغير ذلك من قواعد وإجراءات. ب- القواعد المنظمة لعمل اللجان والاستشاريين وفرق العمل، المتعلقة بإعداد الخطط التنفيذية، والعلاقات التعاقدية، والتفاوض، والتعاقد. ج- قواعد تفويض اللجان لمهماتها وصلاحياتها. د- معايير اختيار الاستشاريين وفرق العمل الذين تستعين بهم اللجان في أداء مهماتها. ه- قواعد الاتصال بالقطاع الخاص في شأن المشاريع، ويشمل ذلك طلبات تقديم المعلومات أو المؤهلات أو العروض. و- قواعد التفاوض مع المستثمرين المحتملين. يعامَل المركز معاملة اللجان في علاقته بالاستشاريين وفرق العمل، فيما يتعلق بحصوله على الوثائق والدراسات والإجابة على الاستفسارات التي يطلبها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'سادساً: مهمات اللجان وصلاحياتها'
  article_text_ar: 'تعمل كل لجنة -بعد التنسيق مع المركز- وفق القواعد والسياسات العامة التي يصدرها المركز في هذا الشأن، وتتولى المهمات والصلاحيات الآتية: إعداد وثيقة المبادرة لكل مشروع (وثيقة المبادرة) والرفع بها إلى الجهة المختصة بإصدار الموافقات بناءً على الفقرة (1) من البند (سابعًا) لاتخاذ ما تراه في شأنها على أن تشمل الوثيقة الأهداف لمشروع التخصيص، واقتراح بدائل التخصيص المناسبة للمشروع؛ بما في ذلك الأساليب المتاحة للتخصيص من النواحي الفنية والمالية والتنظيمية والنظامية وغيرها، وإيضاح الآثار السلبية والإيجابية الاقتصادية والاجتماعية لكل بديل منها، مع بيان الأسلوب الذي ترشحه اللجنة ومسوغات ذلك، والبرنامج التنفيذي له، ونوعية وطبيعة العلاقات التعاقدية اللازمة، وذلك بناءً على دراسة تفصيلية تجريها الجهة المعنية بالمشروع مع مراعاة خطة تخصيص القطاع المعتمدة على أن تشمل هذه الدراسة الجوانب الفنية والمالية والنظامية والتنظيمية والاجتماعية للمشروع، وذلك بعد التنسيق مع المركز. ويجوز لمجلس الإدارة استثناء بعض مشاريع الشراكة بين القطاعين العام والخاص من متطلب إعداد وثيقة المبادرة المشار إليها أو بعض
    محتوياتها، وذلك في حال وجود وثيقة مبادرة سابقة تم إعدادها لمشروع شراكة بين القطاعين العام والخاص مماثل للمشروع محل الاستثناء، وتمت الموافقة على هذا المشروع وفقًا لأحكام هذه القواعد. البدء في تنفيذ عملية التخصيص بعد صدور الموافقة اللازمة وفقًا لما هو منصوص عليه في البند (سابعًا) من هذه القواعد، وتتمتع اللجنة بجميع الصلاحيات المخولة لها بناءً على خطة التخصيص المعتمدة ووثيقة المبادرة، بالإضافة إلى الصلاحيات التنفيذية التي تحددها الجهة المختصة وفقًا لما ورد في الفقرة (1) من البند (سابعًا) من هذه القواعد. الاتصال المباشر بالأجهزة الحكومية لأجل الحصول على المعلومات والبيانات اللازمة لأداء اللجنة لمهماتها. الاتصال بالقطاع الخاص في شأن المشاريع، ويشمل ذلك طلبات تقديم المعلومات أو المؤهلات أو العروض. التفاوض مع المستثمرين المحتملين. التوقيع على العقود المتعلقة بتنفيذ المشروع، والقيام بما يتطلبه ذلك من إجراءات، مع مراعاة ما ورد في الفقرة (2) من هذا البند. اقتراح ما يلزم في شأن منح الامتيازات المتعلقة بتنفيذ المشروع، ورفعها إلى المجلس لاستكمال ما يلزم من إجراءات. تفويض من تراه لتمثيلها في التفاوض،
    وتوقيع العقود، والقيام بما يتطلبه ذلك من إجراء. ولكل لجنة الاستعانة باستشاريين بالتنسيق مع المركز، لمساعدتها في أداء مهماتها، وتوقيع العقود معهم، وتشكيل وتكليف فرق العمل، وتحديد مهماتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'سابعاً: صلاحية إصدار الموافقات'
  article_text_ar: 'تكون الصلاحية بإصدار الموافقات اللازمة لتنفيذ المشاريع وفق الآتي: أ- تكون صلاحية الموافقة على جميع مشاريع نقل ملكية الأصول لمجلس الوزراء بما فيها الموافقة على وثيقة المبادرة والطرح والترسية وتوقيع العقود ذات الصلة. ب- تكون صلاحية الموافقة على مشاريع الشراكة بين القطاعين العام والخاص، في حال كانت الالتزامات المالية السنوية المباشرة (500.000.000) خمسمائة مليون ريال أو أكثر للعقد الواحد؛ لمجلس الإدارة بما فيها الموافقة على وثيقة المبادرة والطرح والترسية وتوقيع العقود ذات الصلة. ج- تكون صلاحية الموافقة على مشاريع الشراكة بين القطاعين العام والخاص، في حال لم تكن هناك التزامات مالية مباشرة أو كانت الالتزامات المالية السنوية المباشرة أقل من (500.000.000) خمسمائة مليون ريال للعقد الواحد؛ للجنة المعنية، بما فيها الموافقة على وثيقة المبادرة والطرح والترسية وتوقيع العقود ذات الصلة. لأغراض تحديد حجم مشروع الشراكة بين القطاعين العام والخاص، لمجلس الإدارة وضع السياسات والآليات اللازمة لاحتساب الالتزامات المالية السنوية المباشرة لمشاريع الشراكة بين القطاعين العام والخاص. تكون ممارسة
    الصلاحيات المحددة في الفقرتين الفرعيتين (ب) و(ج) من الفقرة (1) من هذا البند حصرية وغير قابلة للتفويض. دون إخلال بما ورد في الفقرة (3) من هذا البند، تحدد القرارات الصادرة بالموافقات المنصوص عليها في الفقرة (1) من هذا البند الصلاحيات والمهمات التي تتمتع بها اللجنة والجهات المعنية الأخرى لتنفيذ تلك القرارات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'ثامناً: الدعم المالي والائتماني لمشاريع التخصيص'
  article_text_ar: تتولى وزارة المالية تقديم أنواع الدعم المالي والائتماني اللازم للمشروع بما في ذلك إبرام أي اتفاقية أو ترتيب يتطلبه إصدار ذلك الدعم في حال رأت الوزارة مناسبة ذلك ووفقًا للآلية والشروط التي تضعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'تاسعاً: أمانات اللجان'
  article_text_ar: يتولى المركز مهمات ومسؤوليات أمانات اللجان، ولمجلس الإدارة تفويض هذا الاختصاص إلى من يراه من اللجان، على أن تتبع الأمانة المحددة من تلك اللجان الإجراءات والنماذج التي يقرها المركز لجميع أمانات اللجان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'عاشراً: مصاريف التخصيص'
  article_text_ar: يضع مجلس الإدارة بالاتفاق مع وزارة المالية القواعد والآليات اللازمة لتحمل نفقات أمانات اللجان، وفرق العمل، والاستشاريين، وغير ذلك من النفقات الإدارية المرتبطة بالمشاريع، والأحكام المرتبطة باسترداد تلك النفقات، وذلك وفقًا للإجراءات النظامية المتبعة، وفي حدود الإمكانات والصلاحيات المالية المتاحة وبما لا يتجاوز الأسقف المحددة للإنفاق العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
- article_ref: 'حادي عشر: العرض الدوري'
  article_text_ar: يتولى رئيس كل لجنة تقديم عرض لمجلس الإدارة كل (ثلاثة) أشهر يتضمن إنجازات اللجنة والصعوبات التي واجهتها واقتراح سبل تذليلها، وخططها المستقبلية، على أن يقوم المركز بتقديم عرض شامل إلى المجلس كل (ستة) أشهر، يتضمن ملخصًا لأهم مضامين عروض اللجان، وأي ملاحظات أو مرئيات يراها المركز في شأنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cb94c5cf-017b-46c1-92b8-ac3e00deaff7/1
  verified: false
