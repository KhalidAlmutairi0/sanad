regulation:
  code: BOE458
  name_ar: التنظيم الخاص بهيئة المساحة الجيولوجية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تنشأ بموجب هذا التنظيم هيئة مساحة جيولوجية تسمى (هيئة المساحة الجيولوجية السعودية) وترتبط بوزارة البترول والثروة المعدنية، وتكون لها شخصية اعتبارية وتتمتع بالأهلية الكاملة لتحقيق أغراضها ويشار إليها فيما يلي باسم (الهيئة).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: مقر الهيئة مدينة جدة ولها الحق في إنشاء فروع ومكاتب وتوكيلات داخل المملكة أو خارجها. ويجوز نقل مقرها إلى مكان آخر في المملكة بقرار من مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'أغراض الهيئة هي القيام بنفسها أو بوساطة غيرها في إقليم المملكة وفي منطقتها الاقتصادية الخالصة، وجرفها القاري بجميع أعمال المسح والتنقيب عن المعادن وتنمية تلك الأعمال وتطويرها، وتوفير المعلومات الكافية عن الرواسب المعدنية وإجراء البحوث والدراسات ذات الصلة بعلوم الأرض ولها في سبيل ذلك - دون حصر - القيام بالأعمال التالية : أ - إجراء الأبحاث الجيولوجية، والجيوكيميائية، والجيوفيزيائية، والهيدرولوجية واستكشاف المصادر المعدنية. ب - استخدام أفضل الوسائل في البحث والتنقيب عن المصادر المعدنية. ج - إجراء دراسات ما قبل الجدوى الاقتصادية على بعض الخامات الواعدة المساعدة في صناعة التعدين. د - تصنيف المعلومات الجيولوجية الخاصة بالمصادر التعدينية وتقويمها وإعداد التقارير والخرائط الجيولوجية المختلفة وغيرها من الخرائط ذات العلاقة بأعمالها، وطبعها ونشرها وتخزين بياناتها باستخدام الحاسب الآلي. هـ - القيام بنفسها أو بوساطة غيرها بالأبحاث والدراسات وتقديم الخدمات الاستشارية التي تتعلق بأعمالها ونشاطها إلى الجهات الحكومية والخاصة، ويجوز لها الحصول على مثل تلك الخدمات، كما يجوز لها الاشتراك
    مع الشركات والهيئات والجامعات ومراكز البحث العلمي وغيرها من الجهات التي تزاول أعمالًا مشابهة لأعمالها. و - القيام بأعمال المسح والتنقيب لتحديد مصادر المياه والتعرف على المخزون المائي وتحديد النوعيات والكميات الممكن استخراجها، وتحديد مدى صلاحيتها للأغراض المختلفة وذلك بالتشاور مع وزارة الزراعة والمياه.ز- دراسة النواحي الجيولوجية للشئون البيئية بما في ذلك التعرف على أفضل السبل للتخلص من آثار التعدين الضارة ومن النفايات الناجمة عن الأنشطة التعدينية والجيولوجية البيئية.ح - القيام بالدراسات والأبحاث اللازمة لرصد النشاطات الزلزالية والبركانية المحتمل وقوعها في المملكة واستقصاء الفيضانات الناجمة عن الأمطار والسيول ومواقع الانهيارات الأرضية ووضع خرائط لمستويات الخطر لجميع أنواع الكوارث وإعداد سجل تاريخي بها.ط - تدريب السعوديين داخل المملكة وخارجها في مجالات أعمال الهيئة.ويجوز للهيئة القيام خارج المملكة ببعض الأعمال الموكولة إليها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يتولى إدارة الهيئة مجلس إدارة برئاسة وزير البترول والثروة المعدنية وعضوية ممثل من كل من: ( وزارة الدفاع والطيران ، ووزارة المالية والاقتصاد الوطني ، ووزارة البترول والثروة المعدنية ، ووزارة التعليم العالي ، ووزارة الزراعة والمياه ، ووزارة التخطيط ، ومدينة الملك عبد العزيز للعلوم والتقنية )، ورئيس الهيئة ، وثلاثة من ذوي الاختصاص يختارون لمكانتهم العلمية والمهنية يتم تعيينهم بقرار من مجلس الوزراء بناءً على ترشيح وزير البترول والثروة المعدنية، ويحدد قرار مجلس الوزراء مكافآتهم. وتكون مدة عضوية ممثلي الأجهزة الحكومية والثلاثة المعينين من ذوي الاختصاص ثلاث سنوات فقط.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجتمع مجلس الإدارة بدعوة من رئيسه مرتين على الأقل كل سنة، وعلى الرئيس دعوة المجلس إذا طلب ذلك نصف الأعضاء على الأقل، ويجب أن تشتمل الدعوة على جدول الأعمال. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم رئيس المجلس، وتصدر القرارات بأغلبية أصوات الحاضرين وفي حالة تساوي الأصوات يرجح الجانب الذي يصوت معه الرئيس، وللمجلس أن يدعو لحضور جلساته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت، وتثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس المجلس وأعضاؤه الحاضرون. ولا يجوز للمجلس أن يصدر قرارات بطريق عرضها على الأعضاء متفرقين إلا في حالة الضرورة، ويشترط عندئذ موافقة جميع أعضاء المجلس على القرارات كتابة، وتعرض هذه القرارات على مجلس الإدارة في أول اجتماع لاحق لإثباتها في محضر الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'مجلس إدارة الهيئة هو السلطة العليا المهيمنة على شئونها وإدارتها وتصريف أمورها ووضع السياسة العامة التي تسير عليها. وله بصفة خاصة الصلاحيات التالية : أ - وضع لائحة داخلية لأعماله. ب - اعتماد اللوائح المالية والإدارية والفنية للهيئة. ج - اعتماد اللوائح الداخلية للهيئة والسياسات واللوائح الخاصة بأنشطتها. د - الإشراف على أعمال الهيئة الفنية والإدارية والمالية ومراجعتها.هـ - اعتماد سلم رواتب العاملين الخاضعين لنظام العمل والعمال. و - إقرار مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراقب الحسابات والتقرير السنوي تمهيدًا لرفع ذلك حسب النظام.ز- تشكيل اللجان وتخويلها ما يراه ملائمًا من الصلاحيات بهدف إنجاز الأمور التي تعرض عليها.ح - تفويض المسئولين عن إدارة الهيئة في إبرام الاتفاقات والعقود بأنواعها في حدود القواعد التي يضعها مجلس الإدارة.ط - شراء العقارات وبيعها وتأجيرها واستئجارها تحقيقًا لأغراض الهيئة.ي - إقرار خطة عمل الهيئة وخططها التشغيلية.ك - قبول المساعدات والهبات والتبرعات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز لأعضاء مجلس الإدارة أن يفشوا شيئًا مما وقفوا عليه من أسرار الهيئة؛ بسبب مباشرتهم لإدارتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس بالمرتبة الممتازة يتم تعيينه بأمر ملكي وهو المسؤول التنفيذي عن إدارة الهيئة، ومرجعه رئيس مجلس الإدارة، وتتركز مسئولياته في حدود ما ينص عليه هذا التنظيم وما يقرره مجلس الإدارة، ويمارس رئيس الهيئة الاختصاصات التالية : أ - التحضير لاجتماعات مجلس الإدارة. ب - متابعة وتنفيذ القرارات الصادرة من مجلس الإدارة. ج - إعداد مشروع ميزانية الهيئة ومشروع الحساب الختامي. د - الإشراف على موظفي الهيئة ومستخدميها وعمالها طبقًا للصلاحيات الممنوحة له وما تحدده اللوائح. هـ - إصدار أوامر بالمصروفات الخاصة بالهيئة بموجب الميزانية السنوية المعتمدة. و - تقديم تقارير دورية إلى مجلس الإدارة عن أعمال الهيئة ومنجزاتها ونشاطاتها. ز- اقتراح خطط وبرامج الهيئة والإشراف على تنفيذها بعد الموافقة عليها من مجلس الإدارة. ولرئيس الهيئة تفويض بعض هذه الاختصاصات إلى غيره من المسؤولين عن إدارة الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يمثل الهيئة في صلاتها بغيرها من الجهات وأمام القضاء - رئيس مجلس إدارة الهيئة أو من يفوضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون أموال الهيئة من : أ - الأموال التي تسهم بها الدولة.ب - جميع الأموال المنقولة وغير المنقولة التي تئول إليها من جهات أخرى.ج - ما تقبله من مساعدات وهبات وتبرعات.د - الدخل الذي تحققه من ممارسة نشاطاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تعامل الهيئة من حيث إعفاء مستورداتها من الرسوم الجمركية بحسب القواعد المتبعة بشأن مستوردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تودع أموال الهيئة - بما في ذلك إسهام الدولة - في حسابات بنكية داخل المملكة ويتم الصرف منها وفق ميزانية الهيئة المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة يعين مجلس الإدارة مراقبًا أو أكثر للحسابات من الأشخاص الطبيعيين أو الاعتباريين المرخص لهم بالعمل في المملكة ويحدد أتعابهم، وإذا تعدد مراقبو الحسابات فإنهم يكونون مسئولين بالتضامن عن أعمالهم أمام الهيئة، ويرفع تقرير مراقب الحسابات إلى مجلس الإدارة، ويزود ديوان المراقبة العامة ووزارة البترول والثروة المعدنية بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يلغي هذا التنظيم كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5329f61e-2ad8-42b8-8592-a9a700f298d1/1
  verified: false
