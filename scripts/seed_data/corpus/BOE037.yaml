regulation:
  code: BOE037
  name_ar: نظام مزاولة نقل النقود والمعادن الثمينة والمستندات ذات القيمة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية – أينما وردت في هذا النظام – المعاني الموضحة أمامها ما لم يقتض السياق خلاف ذلك: 1 - النقود : كل عملة متداولة رسميا في المملكة، سواء الورقية منها أو المعدنية. 2 - المعادن الثمينة : جميع المعادن والأحجار الطبيعية والصناعية التي يكون لها قيمة ثمينة ويمكن تحويلها إلى نقد. 3 - المستندات ذات القيمة : جميع المستندات التي تحمل قيمة نقدية مثل: الشيكات النقدية لعملة المملكة العربية السعودية والعملات الأخرى بجميع فئاتها، والأسهم ، والسندات ، والصكوك ، والأوراق المالية الأخرى. 4 - النشاط : مزاولة خدمة نقل النقود و المعادن الثمينة والمستندات ذات القيمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: '1- تطبق أحكام هذا النظام على الجهات الآتية: أ - المؤسسات والشركات المالية العاملة في المملكة التي تتطلب طبيعة عملها نقل النقود و المعادن الثمينة والمستندات ذات القيمة، مثل: البنوك أو محلات الصرافة أو شركات ومؤسسات الاستثمار أو التأمين. ب - مصانع المعادن الثمينة في المملكة، ومعارضها، ومحلات بيعها، وذلك فيما يتعلق بنقل المعادن الثمينة . ج - المؤسسات، والشركات السعودية الحاصلة على ترخيص بمزاولة نشاط الحراسة المدنية الخاصة، وذلك عند مزاولتها لنشاط نقل النقود و المعادن الثمينة و المستندات ذات القيمة . 2 - لا يجوز الترخيص بمزاولة نقل النقود و المعادن الثمينة والمستندات ذات القيمة إلا للجهات المشار إليها في البند (1) من هذه المادة، بشرط توافر إدارة خاصة بالأمن في الجهات المذكورة في الفقرتين (أ) و (ب) من البند الآنف ذكره.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 1- تقدم طلبات الحصول على تراخيص مزاولة هذا النشاط ، أو تجديده إلى مديرية الأمن العام، وتحدد اللائحة التنفيذية لهذا النظام الشروط والمستندات المطلوبة. 2 - يدفع طالب الترخيص – عند إصدار الترخيص أو تجديده – رسما قدره ألف ريال عن كل سنة، وتحدد اللائحة التنفيذية شروط ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يصدر وزير الداخلية – أو من يفوضه – قرارا بالموافقة على مزاولة الجهة طالبة الترخيص للنشاط، وبناء عليه يصدر مدير الأمن العام تراخيص مزاولة النشاط لمدة ثلاث سنوات قابلة للتجديد. ويحدد في الترخيص منطقة (أو مناطق) مزاولة النشاط .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تلتزم جميع الجهات الحاصلة على ترخيص بمزاولة النشاط بإبرام وثيقة تأمين مع إحدى شركات التأمين المرخص لها بالعمل في المملكة تغطي قيمة جميع المنقولات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: على جميع الجهات الحاصلة على ترخيص لمزاولة هذا النشاط أن تبلغ الجهة المعنية في الأمن العام عن أي عملية نقل تتجاوز قيمة المنقولات فيها (خمسمائة ألف) ريال قبل بدئها بوقت كاف، ويلتزم بخط السير المقترح ولا يغير إلا بعد التنسيق مع تلك الجهة. ويجري التقيد بتسلم النقود وتسليمها أثناء ساعات الدوام الرسمي للبنوك ومؤسسات وشركات الصرافة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: مع عدم الإخلال بصلاحيات الجهات الأخرى المقررة نظاما، تخضع الجهات المرخص لها فيما يتعلق بهذا النشاط للإشراف المباشر من دوائر الأمن العام المختصة في المناطق وفق ما تحدده اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'مع مراعاة الشروط ذات الصلة في نظام الحراسة الأمنية المدنية الخاصة، يشترط فيمن يتولى إدارة الجهات الواردة في الفقرتين (أ) و (ب) من البند (1) من المادة (الثانية) من هذا النظام المرخص لها بهذا النشاط ، أو إدارة الأمن في الجهات الواردة في الفقرة (ج) من البند (1) من المادة (الثانية) من هذا النظام المرخص لها بهذا النشاط ما يأتي: 1 - أن يكون سعودي الجنسية، وألا تقل سنه عن خمس وعشرين سنة. 2 - أن يكون حاصلا على شهادة إتمام الدراسة الجامعية، أو ما يعادلها. 3 - ألا يكون قد سبق الحكم عليه بحد شرعي، أو في جريمة مخلة بالشرف أو بالأمانة ما لم يكن قد رد إليه اعتباره.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يشترط فيمن يعمل ضمن طاقم السيارة المستخدمة في هذا النشاط ما يأتي: 1 - أن يكون سعودي الجنسية، وألا تقل سنه عن عشرين سنة ولا تزيد على خمسين. 2 - ألا يقل مؤهله عن الثانوية العامة، أو ما يعادلها. 3 - ألا يكون قد سبق الحكم عليه بحد شرعي، أو في جريمة مخلة بالشرف أو بالأمانة ما لم يكن قد رد إليه اعتباره. 4 - أن يكون لائقا طبيا. 5 - أن يكون قد أنهى متطلبات التدريب اللازمة في المراكز التي اعتمدتها مديرية الأمن العام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يلتزم أفراد طاقم السيارات المستخدمة في النشاط باتخاذ جميع ما يلزم من أجل سلامة المنقولات، ويحظر عليهم إخلاء السيارة أثناء عملية النقل سواء داخل المدينة أو خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يزود طاقم سيارة النقل المستخدمة في هذا النشاط بالأسلحة اللازمة وفقا لما يحدده وزير الداخلية، استنادا إلى الصلاحيات المخولة له بموجب نظام الأسلحة والذخائر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 1 - تصدر مديرية الأمن العام ترخيصا مستقلا لكل سيارة، على أن تكون جميع السيارات المخصصة لهذا النشاط سواء المستوردة منها، أو المصنعة محليا، مصفحة ومطابقة للمواصفات التي تحددها اللائحة التنفيذية لهذا النظام. 2 - يحظر استيراد السيارات المصفحة المخصصة لهذا النشاط أو تصنيعها أو بيعها إلا بعد موافقة من مديرية الأمن العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تحدد اللائحة التنفيذية لهذا النظام أشكال التراخيص والبطاقات والملابس والشعارات والألوان المستخدمة لهذا النشاط .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يكون وزير الداخلية لجنة أو أكثر في المناطق من ثلاثة أعضاء أحدهم يحمل مؤهلا شرعيا أو نظاميا؛ للنظر في مخالفات هذا النظام وتقرير العقوبة المناسبة وفقا للمادة (الخامسة عشرة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'يعاقب كل من يخالف أحكام هذا النظام بواحدة، أو أكثر من العقوبات الآتية: 1 - الإنذار. 2 - الغرامة المالية بما لا يتجاوز مائة ألف ريال. 3 - الإيقاف المؤقت للترخيص. 4 - إلغاء الترخيص. ويجوز لمن صدر ضده قرار العقوبة بغير الإنذار التظلم أمام ديوان المظالم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يصدر وزير الداخلية اللائحة التنفيذية لهذا النظام خلال تسعين يوما من تاريخ نشره بالجريدة الرسمية، ويعمل بها من تاريخ نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد تسعين يوما من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2640f5ff-1f7b-49fc-a57c-a9a700f192c9/1
  verified: false
