regulation:
  code: BOE095
  name_ar: نظام الأوسمة السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تمنح الأوسمة السعودية بأوامر ملكية للملوك ورؤساء الدول والشخصيات المدنية والعسكرية الوطنية والأجنبية ؛ تكريماً لهم، أو تقديراً لما قاموا به من أعمال، أو لتخليد وقائع مهمة، أو لتسجيل مناسبات ذات قيمة وطنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'الأوسمة السعودية هي : 1 - أوسمة الدرجة الأولى : أ - قلادة بدر الكبرى . ب - قلادة الملك عبدالعزيز. 2 - أوسمة الدرجة الثانية : أ- وشاح الملك عبدالعزيز. ب - وشاح الملك عبدالعزيز من الطبقة الثانية. 3 - أوسمة الدرجة الثالثة : وسام الملك عبدالعزيز 4 - أوسمة الدرجة الرابعة : أ- وسام الملك سعود. ب- وسام الملك فيصل. ج - وسام الملك خالد. د - وسام الملك فهد. هـ - وسام الملك عبدالله.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: '" قلادة بدر الكبرى" و "قلادة الملك عبدالعزيز" و "وشاح الملك عبدالعزيز" و "وشاح الملك عبدالعزيز من الطبقة الثانية" و "وسام الملك عبدالعزيز" ؛ أوسمة تكريمية، أو تقديرية، أو تكريمية وتقديرية معاً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: '"قلادة بدر الكبرى" و "قلادة الملك عبدالعزيز" هما أرفع الأوسمة السعودية درجة في التكريم، ولا تمنحان إلا تكريماً للملوك ورؤساء الدول، ويحملهما ملك المملكة العربية السعودية تبعاً لمبايعته ملكاً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يُمنح "وشاح الملك عبدالعزيز" للأشخاص المذكورين فيما يأتي : أ - أعضاء مجالس الوصاية على العرش أو من في مستواهم.ب - أولياء العهد وأمراء الأسر المالكة.ج - رؤساء مجالس الوزراء.د - رؤساء الهيئات النيابية ومن في درجتهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يُمنح وشاح الملك عبدالعزيز من الطبقة الثانية للوزراء والسفراء السعوديين والأجانب ممن قدموا للدولة خدمات جليلة غير عادية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يشتمل "وسام الملك عبدالعزيز" على خمس درجات هي : الدرجة الممتازة، والدرجة الأولى، والدرجة الثانية، والدرجة الثالثة، والدرجة الرابعة. ويُمنح تقديراً لمن قدم خدمات كبرى للدولة أو لإحدى مؤسساتها، أو قام بخدمات أو أعمال ذات قيمة معنوية مهمة، أو قدم تضحيات كبيرة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يُمنح وسام الملك عبدالعزيز من الدرجة الممتازة لمن يُعين وزيراً أو في مرتبة وزير أو ما يعادلها ولمن يعين سفيراً ممثلاً للمملكة في الخارج. ويمنح وسام الملك عبدالعزيز من الدرجة الأولى لمن يعين في المرتبة الممتازة أو ما يعادلها، ولمن يعين عضواً في مجلس الشورى. وتحدد اللائحة التنفيذية لهذا النظام الضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'وسام الملك سعود، ووسام الملك فيصل، ووسام الملك خالد، ووسام الملك فهد، ووسام الملك عبدالله؛ أوسمة تقديرية، تكون في الدرجة الرابعة من حيث الترتيب بالنسبة إلى الأوسمة السعودية، ويشتمل كل منها على ثلاث درجات. وتُمنح بمناسبة اليوم الوطني للمملكة لمن حققوا إنجازات كبيرة أو قاموا بعمل استثنائي مميز، وذلك على النحو الآتي : ١ - يُمنح وسام الملك سعود تقديراً للمتميزين في مجال الخدمة المدنية، والقضاء، والاقتصاد والمال، والمهن الحرة، ولمن قام بعمل بطولي نبيل . ٢ - يُمنح وسام الملك فيصل تقديراً للمتميزين في مجال خدمة الإسلام، والمجال الدبلوماسي، والمجالات العسكرية والأمنية. ٣ - يُمنح وسام الملك خالد تقديراً للمتميزين في مجال خدمة اللغة العربية، والتراث الوطني، وحماية البيئة والتطوير الحضري. ٤ - يُمنح وسام الملك فهد تقديراً للمتميزين في مجالات العلوم، والفنون، والآداب، والطب، والتربية والتعليم، والبحث العلمي، والتنمية المستدامة، وكذلك لأصحاب المبادرات البارزة في مجالات خدمة المسلمين، والعناية بكتاب الله والسنة النبوية، وخدمة التضامن العربي، وتوطيد الأمن والاستقرار الدوليين، والمحافظة
    على الأمن الوطني. ٥ - يُمنح وسام الملك عبدالله تقديراً للمتميزين في مجال المبادرات الإنسانية العالية، والتنمية الاجتماعية، والوحدة العربية والإسلامية، وإرساء مبادئ العدالة والتسامح، والتقنية والاتصالات، والتطوير الإداري.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: للوزارات والأجهزة الحكومية الأخرى والجمعيات الأهلية أن تُرشح من تراه للأوسمة التي تُمنح بمناسبة اليوم الوطني وفقاً للمادة (التاسعة) من هذا النظام، وذلك بناءً على توصية لجنة برئاسة الوزير أو رئيس الجهاز الحكومي، ويُقصر الترشيح على من قاموا بعمل استثنائي مميز. وتُرفع الترشيحات إلى رئيس مجلس الوزراء قبل اليوم الوطني بثلاثة أشهر على الأقل، ويُعلن عمن يُمنحون هذه الأوسمة بمناسبة اليوم الوطني من كل عام. وتُبين اللائحة التنفيذية للنظام أعضاء لجان الترشيح، والشروط والإجراءات والبيانات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لا يُسحب الوسام من حامله إلا بأمر ملكي مُسبب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجوز - في حالات استثنائية لها ما يسوغها - منح الوسام لمن يستحقه من المتوفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تُبين اللائحة التنفيذية لهذا النظام أوصاف الأوسمة السعودية، وشروط منحها وإجراءاته، وحالات حملها، وحالات سحبها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تصدر اللائحة التنفيذية لهذا النظام بقرار من مجلس الوزراء بناءً على اقتراح من رئيس المراسم الملكية، خلال مائة وثمانين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع عدم الإخلال بحقوق من سبق منحهم أوسمة، يُلغي هذا النظام نظام الأوسمة السعودية، الصادر بالمرسوم الملكي رقم (م/23) وتاريخ 6 / 9 / 1389هـ، والمرسوم الملكي رقم (م/41) وتاريخ 14 / 9 /1391هـ، والمرسوم الملكي رقم (م/6) وتاريخ 4 /3 / 1397هـ. كما يُلغي ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يعمل بهذا النظام بعد مائة وثمانين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/9ba0d5dc-2dc4-4b71-b979-a9a700f1f5fd/1
  verified: false
