articles:
- article_ref: 'المادة الأولى: المركز النظامي للصندوق'
  article_text_ar: 1 - يكون للصندوق الخيري الاجتماعي شخصية اعتبارية مستقلة. ويكون مقره الرئيس مدينة الرياض، وله - بقرار من مجلس إدارته - إنشاء فروع أو مكاتب داخل المملكة عند الاقتضاء. ويشار إليه فيما بعد بـ (الصندوق).2 - يعد الصندوق إحدى الأدوات التنفيذية للاستراتيجية الوطنية للإنماء الاجتماعي .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الثانية: هدف الصندوق'
  article_text_ar: يهدف الصندوق إلى العمل على الإنماء الاجتماعي ، وبخاصة تحسين معيشة المستهدفين به، من خلال أساليب غير تقليدية تقوم على تهيئة المناخ الملائم، وإيجاد فرص عمل تتناسب مع قدرات الأفراد والأسر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الثالثة: اختصاصات الصندوق'
  article_text_ar: 'مع عدم الإخلال باختصاصات الجهات الأخرى، يقوم الصندوق بكل ما من شأنه تحقيق أغراضه، وله في سبيل ذلك ما يلي: 1 - تشجيع المستهدفين به القادرين على العمل بإقامة مشروعات استثمارية صغيرة وفق ضوابط يضعها مجلس إدارة الصندوق.2 - الإسهام في تنمية قدرات المستهدفين به من خلال التوعية والتوجيه والتدريب.3 - الإسهام في إيجاد فرص العمل المناسبة لقدرات المستهدفين به من العاطلين عن العمل كليًّا أو جزئيًّا.4 - تطوير برامج الأسر المنتجة الموجهة إلى فئة المستهدفين به ودعمها.5 - الإسهام في إيجاد حاضنات للأعمال الصغيرة.6 - تنمية المشاركة الاجتماعية في مجال تحقيق أهدافه.7 - مساعدة الجهات المختصة في التعرف على احتياجات المستهدفين به من الخدمات الصحية، والتعليمية، والسكنية، والاجتماعية.8 - تشجيع القطاع الخاص على الإسهام في الإنماء الاجتماعي الخاص بالصندوق.9 - العمل مع الجهات المعنية على تيسير الإجراءات المتعلقة بمصالح المستهدفين به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الرابعة:   موارد الصندوق'
  article_text_ar: 'تتكون موارد الصندوق مما يأتي: 1 - ما تقرره الدولة له من مخصصات، وما تقدمه له من إعانات .2 - الزكوات ، والصدقات ، والمنح ، والهبات ، والوصايا ، والمساعدات ، والأوقاف والتبرعات .3 - عوائد استثمار أمواله وممتلكاته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الخامسة:   مجلس إدارة الصندوق'
  article_text_ar: '1- يكون للصندوق مجلس إدارة يؤلف على النحو الآتي: أ - وزير الشؤون الاجتماعية رئيساً ب - ستة أعضاء من الجهات الآتية: ( وزارة الداخلية ، ووزارة المالية ، ووزارة الشؤون الاجتماعية ، ووزارة العمل ، ووزارة التجارة والصناعة والمؤسسة العامة للتدريب التقني والمهني )، وتسمي كل جهة من يمثلها على ألا تقل مرتبته عن (الرابعة عشرة).ج - خمسة أعضاء من القطاع الخاص أو ممن لهم اهتمامات بالمجال الاجتماعي، يصدر بتعيينهم قرار من مجلس الوزراء بناءً على ترشيح من رئيس مجلس إدارة الصندوق. 2 - يحدد رئيس مجلس الإدارة من ينوب عنه في رئاسة اجتماعات المجلس من الأعضاء عند غيابه. 3 - مدة العضوية في المجلس أربع سنوات قابلة للتجديد لمرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة السادسة: اختصاصات مجلس إدارة الصندوق'
  article_text_ar: 'يتولى مجلس إدارة الصندوق العمل على تحقيق الغرض الذي من أجله أنشئ الصندوق، وله في سبيل ذلك الاختصاصات الآتية: 1 - تحديد الفئات المستهدفة بخدمات الصندوق. 2 - إقرار برامج عمل الصندوق لتحقيق الأهداف المرسومة. 3 - إقرار الهيكل التنظيمي للصندوق، وإصدار جميع اللوائح الإدارية والمالية اللازمة لعمله وإدارته. 4 - إقرار الميزانية التقديرية لنشاط الصندوق ونفقاته لكل سنة مالية ، والقواعد التي تتبع في حال نقص الإيرادات أو زيادة المصروفات عما هو مقرر في الميزانية . 5 - تعيين مراجع حسابات (أو أكثر) من المراجعين المرخص لهم، وتحديد أتعابه ومدة عمله. 6 - الموافقة على إنشاء فروع للصندوق داخل المملكة عند الاقتضاء. 7 - تكوين لجان استشارية وفنية يكون أعضاؤها من ذوي الخبرة والاختصاص لإعداد البرامج والمشروعات اللازمة لتحقيق الغرض الذي من أجله أنشئ الصندوق.ويحدد قرار تكوين كل لجنة رئيسها وأعضاءها ومهماتها، وصلاحياتها، ومدتها. 8 - تعديل نوع الخدمات المقدمة - سواء بالإضافة أم بالإلغاء - بما يضمن عدم الازدواج في تقديم خدمات مشابهة لخدمات جهات أخرى. 9 - الاستعانة بمن يراه من خبراء ومستشارين وغيرهم
    - متفرغين وغير متفرغين - لأداء ما يعهد إليهم من أعمال، وتحديد حقوقهم وواجباتهم. 10 - الموافقة على تعيين المدير العام، وتحديد مسؤولياته، وصلاحياته، ومزاياه المالية. 11 - العمل على تنمية موارد الصندوق، وإقرار مشروعات استثمارها، وله في سبيل ذلك إنشاء شركات لتحقيق أهدافه في تأهيل المستهدفين به . 12 - الموافقة على الحساب الختامي والتقرير السنوي عن نشاط الصندوق ؛ تمهيداً لرفعهما وفقاً للإجراءات النظامية . 13 - تعيين مراقب مالي داخلي للصندوق .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة السابعة: اجتماعات مجلس إدارة الصندوق  وقراراته'
  article_text_ar: 1 - يعقد مجلس الإدارة أربعة اجتماعات على الأقل في السنة، ويكون الاجتماع صحيحاً إذا حضره أغلبية الأعضاء، على أن يكون من بينهم الرئيس أو من ينوب عنه.2 - يمكن عقد اجتماع بصورة استثنائية بناءً على دعوة من الرئيس، أو طلب ثلاثة أعضاء على الأقل، ويكون الاجتماع حينئذ صحيحاً إذا حضره ثلثا الأعضاء، على أن يكون من بينهم الرئيس أو من ينوب عنه.3 - تصدر قرارات مجلس الإدارة بأغلبية الأعضاء الحاضرين، وفي حال التساوي يرجح الجانب الذي يصوت معه رئيس الاجتماع.4 - يحضر المدير العام اجتماعات المجلس دون أن يكون له حق التصويت على القرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الثامنة:  فقدان العضوية'
  article_text_ar: '1 - يفقد عضو مجلس الإدارة عضويته في المجلس في أي من الحالات التالية: أ - إذا غاب عن حضور اجتماعات المجلس خمس جلسات عادية متتالية دون عذر.ب - إذا قام بأي عمل أو نشاط يترتب عليه إلحاق ضرر بالصندوق ماديًّا أو أدبيًّا.ج - إذا قدم طلباً يعتذر فيه عن العضوية.د - إذا عجز عن العمل. 2 - يتخذ رئيس مجلس إدارة الصندوق في حالة فقدان أحد الأعضاء عضويته الإجراءات اللازمة لإحلال بديل عنه وفقاً للإجراءات المنصوص عليها في الفقرة (1) من المادة (الخامسة) من هذا التنظيم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة التاسعة: السنة المالية'
  article_text_ar: تبدأ السنة المالية للصندوق مع بداية السنة المالية للدولة وتنتهي بنهايتها، واستثناء من ذلك تحسب السنة المالية الأولى للصندوق من تاريخ مزاولة الصندوق نشاطه وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة العاشرة: اللجنة التنفيذية'
  article_text_ar: تنشأ بقرار من مجلس إدارة الصندوق لجنة تنفيذية تتكون من رئيس وأربعة أعضاء، ويضع المجلس لائحتها وكيفية ممارسة عملها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الحادية عشرة:  الإدارة العامة'
  article_text_ar: 'يكون للصندوق مدير عام يختاره مجلس الإدارة، وعدد من الموظفين الإداريين والفنيين بحسب ما تقتضيه الحاجة، ويعينون وتحدد أجورهم ومستحقاتهم طبقاً للوائح الإدارية والمالية التي يعتمدها مجلس إدارة الصندوق، ويتولى المدير العام المهمات الآتية: 1 - تمثيل الصندوق أمام جميع الجهات المختصة، وممارسة صلاحياته وفقاً للوائح الصندوق. 2 - أمانة سر المجلس . 3 - تنفيذ قرارات المجلس. 4 - تنفيذ الأعمال التي يكلفه بها الرئيس. 5 - إعداد الخطط والبرامج والمشروعات ورفعها للمجلس لإقرارها. 6 - إعداد مشروعات اللوائح الإدارية والمالية ورفعها للمجلس لإقرارها. 7 - إعداد مشروع الميزانية التقديرية للصندوق ورفعه للمجلس لإقراره. 8 - تعيين العاملين في الصندوق وفقاً لما يتطلبه الهيكل التنظيمي للصندوق . 9 - متابعة أداء العاملين، ورفع كفايتهم الإنتاجية. 10 - الإشراف على إعداد التقرير السنوي عن أعمال الصندوق وأنشطته والحساب الختامي ، ورفعهما إلى المجلس للموافقة عليهما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الثانية عشرة: مراجعة الحسابات'
  article_text_ar: 1 - يراجع حسابات الصندوق ويدققها محاسب قانوني (أو أكثر) يعين وتحدد أتعابه سنويًّا بقرار من مجلس إدارة الصندوق .2 - تسري على الصندوق - فيما يتعلق بالأمور المالية - الأحكام المنصوص عليها في لائحة المؤسسات والجمعيات الخيرية، الصادرة بقرار مجلس الوزراء رقم (107) وتاريخ 25 / 6 / 1410 هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الثالثة عشرة: الصرف من  موارد الصندوق'
  article_text_ar: يصرف من الموارد المالية للصندوق وفقاً للوائح الإدارية والمالية التي يعتمدها مجلس إدارة الصندوق .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
- article_ref: 'المادة الرابعة عشرة: النشر والنفاذ'
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/807582c2-555f-4ee0-aeea-a9a700f2b6b3/1
  verified: false
