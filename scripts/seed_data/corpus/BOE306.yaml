regulation:
  code: BOE306
  name_ar: تنظيم تملك مواطني دول المجلس للعقار في الدول الأعضاء بمجلس التعاون لغرض السكن والاستثمار
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: (المادة الأولى)
  article_text_ar: يسمح لمواطني دول مجلس التعاون من الأشخاص الطبيعيين أو الاعتباريين (المملوكين بالكامل لمواطني دول مجلس التعاون ) باستئجار وتملك العقارات المبنية والأراضي لغرض السكن أو الاستثمار في أية دولة عضو بإحدى طرق التملك المقررة قانونًا (نظامًا) أو بالوصية أو الميراث، ويعاملون في هذا الشأن معاملة مواطني الدولة التي يقع فيها العقار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81fa0eb9-de83-4e83-b2aa-a9a700f21774/1
  verified: false
- article_ref: (المادة الثانية)
  article_text_ar: إذا كان العقار أرضًا فيجب أن يستكمل بناؤها أو استغلالها خلال أربع سنوات من تاريخ تسجيلها باسمه، وإلا كان للدولة التي يقع فيها العقار حق التصرف بالأرض مع تعويض المالك بنفس ثمنها وقت شرائها أو ثمنها حين بيعها أيهما أقل مع حفظ حقه بالتظلم أمام الجهة المختصة بالدولة. وللدولة أن تمدد المدة المذكورة إذا اقتنعت بأسباب تأخر المالك عن تلك المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81fa0eb9-de83-4e83-b2aa-a9a700f21774/1
  verified: false
- article_ref: (المادة الثالثة)
  article_text_ar: يجوز للمالك التصرف في العقار المبني في أي وقت، أما إذا كان أرضا فيجوز التصرف فيها من تاريخ استكمال بنائها أو استغلالها أو مرور أربع سنوات من تاريخ تسجيلها باسمه، ويجوز استثناء التصرف فيها قبل ذلك بشرط الحصول على إذن من الجهة المختصة في الدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81fa0eb9-de83-4e83-b2aa-a9a700f21774/1
  verified: false
- article_ref: (المادة الرابعة)
  article_text_ar: لا يتعارض هذا التنظيم مع حق الدولة التي يقع فيها العقار في نزع ملكيته للمنفعة العامة مقابل تعويض عادل للمالك طبقًا للقوانين (الأنظمة) التي تعامل بها مواطنيها. كما لا يتعارض هذا التنظيم مع حق الدولة في حضر التملك أو الانتفاع في مناطق أو مواقع معينة، وتستثني – بناء عليه – العقارات الواقعة داخل مكة المكرمة والمدينة المنورة من أحكام هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81fa0eb9-de83-4e83-b2aa-a9a700f21774/1
  verified: false
- article_ref: (المادة الخامسة)
  article_text_ar: لا يخل هذا التنظيم بأية حقوق أفضل سارية وقت إقراره أو التي تمنحها كل أو بعض الدول الأعضاء في المستقبل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81fa0eb9-de83-4e83-b2aa-a9a700f21774/1
  verified: false
- article_ref: (المادة السادسة)
  article_text_ar: 1 - يحل هذا التنظيم محل التنظيم المقر في الدورة العشرين للمجلس الأعلى. 2 - يطبق هذا التنظيم بعد ثلاثة أشهر من موافقة المجلس الأعلى عليه، وتجري مراجعته بهدف تطويره وتحسينه بعد ثلاث سنوات من بدء تطبيقه. 3 - للجنة التعاون المالي والاقتصادي حق تفسير مواد هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/81fa0eb9-de83-4e83-b2aa-a9a700f21774/1
  verified: false
