regulation:
  code: BOE397
  name_ar: تنظيم المؤسسة العامة للتدريب التقني والمهني
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات التالية – أينما وردت في هذا التنظيم– المعاني الموضحة أمام كل منها ما لم يقتض السياق خلاف ذلك : التنظيم : تنظيم المؤسسة العامة للتدريب التقني والمهني. المؤسسة : المؤسسة العامة للتدريب التقني والمهني. التدريب : برامج غير أكاديمية– مختلفة الأشكال والمستويات والمدد– تهدف إلى إكساب الفرد مهارات ومعارف تطبيقية تقنية أو مهنية. وحدات التدريب : الأماكن أو المنشآت التي تدرب فيها المؤسسة بمختلف أنماطها التنظيمية وأسمائها وأماكنها . المجلس : مجلس إدارة المؤسسة. الرئيس : رئيس المجلس. المحافظ : محافظ المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع المؤسسة بشخصية اعتبارية عامة مستقلة ماليًّا وإداريًّا، ويكون مقرها الرئيس في مدينة الرياض، ولها أن تنشئ فروعاً في مناطق المملكة المختلفة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف المؤسسة إلى تنمية الموارد البشرية الوطنية من خلال التدريب، بما يسهم في سد احتياجات سوق العمل من القوى البشرية المؤهلة، ولها في سبيل تحقيق ذلك– دون حصر– القيام بما يلي : 1 - إعداد السياسات والخطط العامة للتدريب ومراجعتها وتطويرها وفقًا لما تقتضيه خطط التنمية الوطنية. 2 - تأهيل المدربين التقنيين والمهنيين، وتطويرهم. 3 - تصميم برامج التدريب، وتنفيذها. 4 - الترخيص للقطاع الخاص بالتدريب والإشراف عليه وتحديد معاييره الفنية. 5 - عقد شراكات إستراتيجية مع مؤسسات التدريب في القطاعين العام والخاص؛ لإدارة وحدات التدريب المختلفة، وتشغيلها. 6 - مشاركة القطاعين العام والخاص في التدريب؛ لتوفير الموارد البشرية التقنية والمهنية المتخصصة. 7 - تقديم المساعدة الفنية والمشورة الإدارية في مجال التدريب للقطاعين العام والخاص. 8 - إنشاء حاضنات تقنية ومهنية للتدريب. 9 - إجراء البحوث والدراسات في مجال التدريب. 10 - إنتاج وسائل التدريب وتقنياته، وتطويرها. 11 - عقد المؤتمرات والندوات والحلقات والمشاركة فيها داخل المملكة وخارجها، بعد استكمال الإجراءات النظامية اللازمة. 12 - الاشتراك في عضوية المنظمات
    والهيئات والمؤسسات الإقليمية والدولية المهتمة بالتدريب، بعد استكمال الإجراءات النظامية اللازمة. 13 - تقديم مرئياتها حيال الأنظمة واللوائح والقرارات ذات الصلة بالتدريب واقتراح ما يلزم لتطويرها ورفعها أو إحالتها إلى الجهات المختصة وفق الطرق النظامية المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: '1- يكون للمؤسسة مجلس إدارة يشكل على النحو التالي : أ – وزير العمل رئيساً ب - المحافظ نائباً للرئيس ج - ممثل من وزارة العمل عضواً د - ممثل من وزارة المالية عضواً هـ - ممثل من وزارة التربية والتعليم عضواً و - ممثل من وزارة التجارة والصناعةعضواً ويجب ألا تقل مراتب ممثلي الوزارات في عضوية المجلس عن المرتبة (الرابعة عشرة). ز - أربعة أعضاء من ذوي الخبرة من القطاع الخاص، يصدر بتعيينهم قرار من مجلس الوزراء بناء على اقتراح من وزير العمل بعد التشاور مع مجلس الغرف التجارية والصناعية السعودية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'المجلس هو السلطة العليا للمؤسسة ويشرف على إدارتها وتصريف أمورها، وله بوجه خاص الصلاحيات التالية: 1 - الموافقة على مشاريع السياسات والخطط العامة للتدريب ومراجعتها وتطويرها تمهيدًا لإقرارها من مجلس الوزراء.2 - إقرار السياسات العامة لإدارة المؤسسة وهيكلها التنظيمي.3 - إقرار اللوائح الداخلية للمؤسسة وبخاصة ما يتعلق بالشؤون الإدارية والمالية، وبوظائف هيئة التدريب في وحدات التدريب المختلفة بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية.4 - إقرار اللوائح المنظمة للتدريب في وحدات التدريب، وبخاصة ما يتعلق بتحديد ساعاته وخططه ومدده والإجازات وشروط الالتحاق والامتحانات والشهادات. 5 - إقرار اللوائح المنظمة للتدريب في القطاع الخاص، وبخاصة ما يتعلق بالمعايير الفنية.6 - إقرار اللوائح التي تحدد مكافآت المتدربين وإعاناتهم وحوافزهم في جميع وحدات التدريب.7 - الموافقة على إنشاء وحدات التدريب في مناطق المملكة المختلفة بما يتفق مع خطط التنمية الوطنية.8 - إقرار مشروع ميزانية المؤسسة السنوية، وحسابها الختامي، وتقرير مراجع حساباتها، وتقريرها السنوي، والرفع عنها وفق الإجراءات النظامية المتبعة.9
    - تعيين المراقب المالي الداخلي للمؤسسة.10 - تعيين مديري وحدات التدريب المختلفة. 11 - تطوير الموارد البشرية في المؤسسة بالإيفاد والابتعاث والتدريب في الداخل والخارج.12 - إقرار القواعد المتعلقة بالرخص والتصاريح والخدمات والأعمال التي تقدمها المؤسسة، وتحديد المقابل المالي لها.13 - الموافقة على شراء العقارات وبيعها لمصلحة المؤسسة بما يتفق مع أهدافها.14 – قبول الهبات والوصايا والأوقاف.15 - تعيين نائب (أو أكثر) للمحافظ وفق الإجراءات المتبعة.16 - تشكيل لجان متفرعة من المجلس وتخويلها الصلاحيات اللازمة لإنجاز المهمات المنوطة بها.17 - تفويض بعض الصلاحيات إلى المحافظ أو غيره من مسؤولي المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- تعقد اجتماعات المجلس في مقر المؤسسة الرئيس، ويجوز انعقادها في أي مكان آخر من المملكة عند الحاجة.2 - يدعو الرئيس إلى عقد اجتماع للمجلس مرة واحدة على الأقل كل ستة أشهر، وله دعوة المجلس إلى عقد جلسة طارئة كلما رأى ضرورة ذلك، أو إذا طلب منه ذلك كتابة أربعة من أعضاء المجلس على الأقل، على أن يوجه الدعوة – في هذه الحالة – خلال الخمسة عشر يومًا التالية لتقديم الطلب، ويجب أن تشتمل الدعوة في كل الأحوال على جدول أعمال الاجتماع.3 - يشترط لصحة الاجتماع حضور أغلبية الأعضاء على أن يكون من بينهم الرئيس أو نائبه، وللمجلس أن يدعو لحضور اجتماعاته من يرى الاستعانة بخبراتهم ومعلوماتهم دون أن يكون لهم حق التصويت. 4 - تصدر قرارات المجلس بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع، ولا يجوز للعضو تفويض شخص آخر للتصويت عنه عند غيابه، وللعضو تسجيل وجهة نظره المخالفة لرأي أغلبية الأعضاء في المحضر المعد لضبط مداولات المجلس. 5 - لا يجوز للعضو أن يفشي شيئًا مما وقف عليه من أسرار المؤسسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للمؤسسة محافظ يعين بالمرتبة الممتازة بناء على اقتراح من الرئيس، وهو الرئيس التنفيذي للمؤسسة، ويتولي إدارة شؤونها وتصريف أمورها وفقًا للأحكام الواردة في هذا التنظيم، ويكون مسؤولًا أمام المجلس عن الأعمال والمهمات التي ينفذها، وله بوجه خاص ما يلي : 1 - الإعداد لاجتماعات المجلس ولجانه المتفرعة.2 - تنفيذ قرارات المجلس ومتابعتها وإطلاع المجلس على ما تم في شأنها.3 - ترشيح مراقب مالي داخلي للمؤسسة.4 - تقديم تقارير دورية للمجلس عن أعمال المؤسسة ومنجزاتها ونشاطاتها.5 - ممارسة صلاحيات رئيس الدائرة المستقلة فيما يتعلق بتدبير الأمور المالية للمؤسسة.6 - تمثيل المؤسسة في صلاتها بالآخرين وأمام القضاء. 7 - متابعة إدارة وحدات التدريب المختلفة، واتخاذ ما يلزم لرفع مستوى أدائها وكفايتها.8 - الإشراف على شؤون المتدربين ورعايتها.9 - الإشراف على إعداد سياسات المؤسسة وخططها وبرامجها، ومتابعة تنفيذها، واقتراح تطويرها.10 - اقتراح مشاريع اللوائح والقرارات الخاصة بسير العمل في المؤسسة التي تدخل في اختصاص المجلس.11 - الإشراف على إعداد مشروع ميزانية المؤسسة والحساب الختامي والتقرير السنوي.وللمحافظ
    تفويض بعض صلاحياته إلى المسؤولين في المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تكون للمؤسسة ميزانية مستقلة تصدر بمرسوم ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: '1- تتكون أموال المؤسسة مما يلي : أ - الأموال التي تخصصها لها الدولة.ب - الأصول الثابتة والمنقولة التي تحت تصرفها.ج - الإيرادات التي تحققها من ممارسة نشاطها.د – ريع أملاكها وما ينتج من استثمارها.هـ - الهبات والوصايا والأوقاف.و - الموارد المالية الأخرى التي يقرها المجلس، على ألا تتعارض مع طبيعة نشاط المؤسسة. 2 - تودع أموال المؤسسة في حساب مستقل لدى مؤسسة النقد العربي السعودي، ولها فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفقًا لميزانية المؤسسة ولوائحها المالية المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات المؤسسة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) لمراجعة حسابات المؤسسة من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابه (أتعابهم)، وعند تعدد مراجع الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام المؤسسة، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يحل هذا التنظيم محل نظام المؤسسة العامة للتعليم الفني والتدريب المهني، الصادر بالمرسوم الملكي رقم (م/30) وتاريخ 10/ 8/ 1400هـ، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به بعد مضي ثلاثين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/750bf502-86c2-4928-bdb9-a9a700f1ff3b/1
  verified: false
