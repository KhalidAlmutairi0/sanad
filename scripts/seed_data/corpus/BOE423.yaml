  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ الآتية -أينما وردت في هذه الترتيبات- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: المركز: المركز الوطني للنخيل والتمور. الترتيبات: الترتيبات التنظيمية للمركز. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية، والاستقلال المالي والإداري، ويرتبط -تنظيميّاً- بوزير البيئة والمياه والزراعة، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'دون إخلال باختصاصات الجهات الحكومية ذات العلاقة، يهدف المركز إلى المساهمة في تطوير واستدامة زراعة النخيل وإنتاج التمور في المملكة وتعزيزها ورفع جودتها، والعمل على وضع منظومة متكاملة من الخدمات الزراعية والتسويقية، وله في سبيل ذلك -بالتعاون مع الجهات ذات العلاقة كل فيما يخصه- ممارسة الاختصاصات الآتية: وضع السياسات والخطط والبرامج والمبادرات في مجال زراعة النخيل وإنتاج وتسويق التمور، ومراجعتها، وتقويمها، والإشراف على تنفيذها. مراجعة الأنظمة والتنظيمات واللوائح والقرارات والأوامر ذات العلاقة باختصاص المركز، والرفع عنها وفقاً للإجراءات النظامية المتبعة. التشجيع على إدخال التمور في الصناعات الغذائية، وتسويقها، وزيادة الوعي بأهمية القيمة الغذائية والصحية للتمور. دعم الأبحاث والدراسات التطبيقية في مجال زراعة النخيل وزيادة إنتاج وتسويق التمور وتعبئتها. المساهمة في تطبيق اللوائح الفنية والمواصفات القياسية المعتمدة من الهيئة العامة للغذاء والدواء، الخاصة بالتمور في المملكة. تشجيع مشاركة منتجي التمور بالمعارض المحلية والدولية. المساهمة في تشجيع تصدير التمور من خلال الدعاية لتسويقها
    في الخارج عن طريق السفارات والمعارض التجارية، وفقاً للأحكام المنظمة لذلك. إعداد قاعدة بيانات ومعلومات خاصة بالنخيل والتمور على موقع المركز الإلكتروني، وإطلاق مبادرة لدعم التجارة الإلكترونية للتمور. الإشراف على برنامج دعم صغار المزارعين السنوي لدعم التنمية الريفية. القيام بالدراسات والبحوث عن الحشرات والأمراض التي تصيب النخيل وتقلل من إنتاج التمور. تطوير برنامج الإدارة المتكاملة لآفات النخيل وبخاصة مكافحة سوسة النخيل الحمراء، والحد من انتشارها، والإشراف على متابعة تنفيذ تلك البرامج، والعمل على تجهيز الفرق المساندة لتنفيذ حملات المكافحة. عقد المؤتمرات والندوات وجلسات العمل وإصدار النشرات في مجال اختصاص المركز، وفق الإجراءات النظامية المتبعة. تمثيل المملكة لدى الجهات النظيرة والمنظمات الإقليمية والدولية في مجالات اختصاص المركز، وفقاً للإجراءات النظامية المتبعة. الإشراف على مصنع تعبئة التمور في محافظة الأحساء وتشغيله، وغيره من الجهات الأخرى التي ينتقل للمركز تشغيلها أو الإشراف عليها، بالتنسيق مع الجهات المختصة، والعمل على رفع مستوى الجودة فيها وفقاً للمواصفات والمعايير الدولية. العمل على
    رفع جودة زراعة النخيل وإنتاج وتسويق التمور في الأسواق المحلية والخارجية، والسعي إلى تحقيق التوازن في الأسواق.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'أولاً: يكون للمركز مجلس إدارة برئاسة وزير البيئة والمياه والزراعة، وعضوية كل من: الرئيس التنفيذي للهيئة العامة للغذاء والدواء. ممثلين من وزارة البيئة والمياه والزراعة. ممثل من صندوق التنمية الزراعية. ممثل من وزارة التجارة. الرئيس التنفيذي للمركز. أمين هيئة تنمية الصادرات السعودية. اثنين من المختصين وذوي الخبرة في مجال عمل المركز، يعينان بأمر من رئيس مجلس الوزراء بناء على ترشيح من الرئيس، تكون مدة عضويتهما ثلاث سنوات قابلة للتجديد مرة واحدة. ثانياً: يجب ألا تقل مرتبة ممثلي الجهات الحكومية عن (الثالثة عشرة) أو ما يعادلها، ويراعى أن يكون ممثلو تلك الجهات من ذوي الاختصاص. ثالثاً: يجوز للرئيس تعيين نائب له من أعضاء المجلس من ممثلي الجهات الحكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على شؤون المركز وإدارته، وتصريف أموره، وله اتخاذ القرارات الإدارية اللازمة لتحقيق أهدافه وممارسة صلاحياته في حدود اختصاص المركز والأنظمة ذات العلاقة. وله على وجه خاص ما يلي: إقرار السياسات العامة والخطط الاستراتيجية والتشغيلية للمركز، ومراجعتها، ومتابعة تنفيذها. إقرار اللوائح الإدارية والمالية التي يسير عليها المركز وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونه، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار الهيكل التنظيمي للمركز. تحديد المقابل المالي لما يقدمه المركز من خدمات أو أعمال يرى المجلس استحصال مقابل مالي عنها. الموافقة على استثمار أموال المركز بما يحقق أهدافه، وفقاً للأحكام المنظمة لذلك. الموافقة على تأسيس أو الاستحواذ على شركات أو المشاركة فيها في مجال اختصاص المركز، بحسب الإجراءات النظامية المتبعة. الموافقة على افتتاح فروع أو مكاتب للمركز عند الحاجة. الموافقة على مشروع الميزانية السنوية
    للمركز، وإقرار الحساب الختامي وتقرير مراجع الحسابات والتقرير السنوي للمركز، ورفعها وفقًا للإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. قبول التبرعات والهبات والوصايا والأوقاف التي تقدم للمركز، وفقاً للإجراءات النظامية المتبعة. الموافقة على إبرام الاتفاقيات والعقود بحسب الإجراءات النظامية المتبعة. وللمجلس تفويض بعض صلاحياته إلى الرئيس أو من يراه من أعضائه أو منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعقد اجتماعات المجلس في مقر المركز، ويجوز عند الحاجة وبموافقة من الرئيس عقدها في مكان آخر. يجتمع المجلس على الأقل (أربع) مرات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وعلى الرئيس دعوة المجلس إلى الاجتماع إذا طلب ذلك نصف الأعضاء على الأقل. وفي جميع الأحوال، يجب أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. لا تكون اجتماعات المجلس صحيحة إلا بحضور أغلبية الأعضاء على الأقل، على أن يكون من بينهم الرئيس أو نائبه، وتصدر قرارات المجلس بأغلبية أصوات الحاضرين على الأقل، فإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع، ولا يجوز لعضو المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت نيابةً عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسبابه ضمن محضر اجتماع المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للمركز رئيس تنفيذي يعين ويعفى بقرار من المجلس يحدد فيه أجره ومزاياه المالية الأخرى، ويتولى إدارة شؤون المركز، وله على وجه الخصوص ما يلي: الإشراف على سير العمل في المركز. إعداد الخطط والبرامج اللازمة لتنفيذ أهداف المركز، ورفعها إلى المجلس؛ لاعتمادها. إعداد هيكل التنظيمي للمركز، ورفعه إلى لمجلس لإقراره. إعداد لوائح المركز المالية والإدارية وغيرها من اللوائح الداخلية لتسيير شؤون المركز، ورفعها إلى المجلس؛ لإقرارها. تعيين العاملين في المركز وفقاً للوائح المعتمدة، والإشراف عليهم. تنفيذ برامج وجميع نشاطات المركز في حدود الميزانية السنوية للمركز. الصرف من الميزانية المعتمدة، واتخاذ الإجراءات المالية، وفقاً للأنظمة ولما يقرره المجلس. تمثيل المركز أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى داخل المملكة وخارجها، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. الإشراف على إعداد مشروع الميزانية السنوية للمركز، وعرضه على المجلس لإقراره. إعداد التقرير السنوي، والتقارير الخاصة بتنفيذ خطط المركز وبرامجه، وعرضها على المجلس؛ لإقرارها. الموافقة على عقد المركز
    المؤتمرات، والندوات، واللقاءات العلمية، المتعلقة بعمله، وفقاً للإجراءات النظامية. التوقيع على الاتفاقيات والعقود، وفق الإجراءات النظامية المتبعة. ما يسنده إليه المجلس من اختصاصات أو صلاحيات أخرى. وللرئيس التنفيذي تفويض بعض اختصاصاته وصلاحياته إلى من يراه من منسوبي المركز، وفقاً لما تحدده لوائح المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للمركز اعتمادات مالية لتغطية نفقاته ضمن ميزانية وزارة البيئة والمياه والزراعة لمدة خمس سنوات بدءاً من العام المالي (2022م).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للمركز -بعد انتهاء المدة المحددة في المادة (الثامنة) من الترتيبات- ميزانية سنوية مستقلة من إيراداته، تعد وتصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد المركز المالية من الآتي: أ- ما يخصص له من اعتمادات في الميزانية العامة للدولة وفقاً للمادة (الثامنة) من الترتيبات. ب- المقابل المالي للأعمال والخدمات التي يقدمها. ج- التبرعات، والهبات، والمساعدات، والوصايا، وريع الأوقاف، التي يقبلها المجلس. د- أي مورد آخر يقره المجلس بما لا يتعارض مع الأنظمة والتعليمات. تودع أموال المركز في حساب جاري وزارة المالية لدى البنك المركزي السعودي. يفتح المركز حساباً له في البنك المركزي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات من ميزانية المركز المعتمدة وفق لوائحه المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو المركز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يقوم المجلس بالآتي: إعداد مشروع تنظيم للمركز، وذلك في ضوء ما ورد في هذه الترتيبات، وما قد يظهر له في هذا الشأن. رفع مشروع التنظيم لاستكمال الإجراءات النظامية اللازمة في شأنه خلال مدة لا تتجاوز (اثني عشر) شهراً من تاريخ الموافقة على هذه الترتيبات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تنشر الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/df2f2e83-ba65-4564-8c6f-ae2900cd879a/1
  verified: false
