regulation:
  code: BOE464
  name_ar: تنظيم المركز الوطني للتنمية الصناعية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: المركز: المركز الوطني للتنمية الصناعية. التنظيم: تنظيم المركز. الوزارة: وزارة الصناعة والثروة المعدنية الوزير: وزير الصناعة والثروة المعدنية. المجلس: مجلس إدارة المركز. التجمعات الصناعية: مجموعة من الصناعات الأساسية والصناعات المساندة والصناعات اللاحقة من سلاسل الإمداد التي تعمل في صناعة معينة، تترابط وتتكامل فيما بينها في إنتاج مجموعة من منتجات أو خدمات هذه الصناعة. القطاعات الصناعية: القطاعات التي تقع ضمن اختصاصات الوزارة وترخص لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية المستقلة، ويتمتع بالاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع ومكاتب حسب الحاجة بقرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى الإسهام في تحقيق التنمية الصناعية المستدامة من خلال استهداف قطاعات صناعية ذات أثر في الاقتصاد الوطني، وقيادة الجهود نحو تطوير وتشجيع وتمكين الصناعات فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات الجهات الأخرى، للمركز القيام بكل ما يلزم في سبيل تحقيق أهدافه، ومن ذلك ما يأتي: وضع السياسات المتعلقة بنشاط عمله، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. اقتراح مشروعات الأنظمة ذات الصلة باختصاصاته، واتخاذ ما يلزم لاستكمال الإجراءات النظامية. التعاون مع الجهات ذات العلاقة لتوفير البنى التحتية والمرافق والخدمات اللوجستية التي تدعم تنمية القطاعات الصناعية المستهدفة. العمل مع الجهات ذات العلاقة على تعظيم الاستفادة من الميزات التنافسية للمملكة في سبيل تطوير القطاعات الصناعية. تحديد وتطوير الصناعات الأساسية واللاحقة وسلاسل الإمداد المستهدفة ذات القيمة المضافة على الاقتصاد الوطني. تحديد مواقع التجمعات الصناعية، واقتراح معايير ومواصفات قياسية لإدارتها، وتطويرها. بناء مؤشرات ومعايير قياس مستوى نضج بيئة الاستثمار الصناعي، وتطويرها دوريًّا. العمل على جذب الصناعات ورؤوس الأموال المحلية والأجنبية وعلى نقل التقنيات المتقدمة لتلبية احتياجات القطاعات الصناعية. العمل مع الجهات ذات العلاقة لمواءمة مخرجات التعليم والتدريب
    الفني مع احتياجات القطاعات الصناعية المستهدفة. التعاون وتبادل الخبرات مع الهيئات والمنظمات الإقليمية والدولية في مجال التنمية الصناعية داخل المملكة وخارجها، وذلك في حدود اختصاصاته. عقد شراكات استراتيجية مع القطاعين العام والخاص محليًّا وعالميًّا لتحقيق أهدافه، وفق الإجراءات النظامية. إجراء الدراسات والبحوث وتقديم الاستشارات في مجالات اختصاصاته، بنفسه أو من خلال التعاون مع الخبراء والشركات والهيئات والجامعات والمراكز الاستشارية والبحثية. تقديم الخدمات الإدارية والاستشارية والفنية للمستثمرين في القطاعات الصناعية المستهدفة. تمثيل المملكة في الهيئات والمنظمات والفعاليات الإقليمية والدولية ذات العلاقة باختصاصاته، وفقاً للإجراءات النظامية المتبعة. تنظيم المؤتمرات والمعارض والفعاليات المحلية والدولية وإقامتها، وذلك في حدود اختصاصاته والمشاركة فيها، وذلك بالتنسيق مع الجهات ذات العلاقة، ووفقاً للإجراءات المتبعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: للمركز في سبيل تحقيق أهدافه الاستعانة بخبراء ومستشارين وبيوت خبرة -من داخل المملكة وخارجها- في مجالات عمله وفقًا للإجراءات النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: للمركز تقديم خدماته للغير بمقابل مالي وفق قواعد يقرها المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير، وعضوية كلّ من: أ- رئيس المركز. ب- أعضاء لا يقل عددهم عن (أربعة) يمثلون جهات حكومية ذات علاقة بعمل المركز، لا تقل مرتبة أي منهم عن المرتبة (الرابعة عشرة) أو ما يعادلها. ج- أعضاء لا يقل عددهم عن (اثنين) من القطاع الخاص من المهتمين والمختصين وذوي الخبرة في المجالات ذات العلاقة بعمل المركز، لمدة (ثلاث) سنوات قابلة للتجديد مرة واحدة فقط. يصدر بتحديد الجهات المشار إليها في الفقرة (ب) من هذه المادة وتعيين الأعضاء المشار إليهم في الفقرة (ج) من هذه المادة؛ قرار من مجلس الوزراء بناءً على اقتراح من رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'المجلس هو السلطة المهيمنة على شؤون المركز، وإدارته، وتصريف أموره، وله جميع الصلاحيات اللازمة لتحقيق أهدافه، وله على وجه خاص ما يلي: إقرار السياسات المتعلقة بنشاط المركز، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات المركز، واقتراح تعديل المعمول به منها، والرفع عما يستلزم استكمال إجراءات في شأنه. إقرار الهيكل التنظيمي للمركز. إقرار اللوائح المالية والإدارية للمركز وغيرها من اللوائح الداخلية، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية. إقرار لائحة داخلية لأعمال المجلس. إقرار القواعد لما يقدمه المركز من أعمال وخدمات وتراخيص، وتحديد المقابل المالي لها. إقرار مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ ورفعها بحسب الإجراءات النظامية المتبعة. الموافقة على إبرام الاتفاقات ومذكرات التفاهم والعقود، بحسب الإجراءات النظامية. الموافقة على إنشاء فروع للمركز أو مكاتب له. تعيين مراجع حسابات خارجي (أو أكثر).
    قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقاً للقواعد المنظمة لذلك. النظر في التقارير الدورية عن سير العمل، واتخاذ ما يلزم في شأنها. وللمجلس تشكيل لجان -دائمة أو مؤقتة- من أعضائه أو من غيرهم، يعهد إليها بما يراه من مهمات ويكون لها الاستعانة بمن تراه لتأدية المهمات المكلفة بها، ما لم يقرر المجلس غير ذلك. ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها ومكافآت أعضائها، وللمجلس تفويض بعض اختصاصاته إلى رئيس المجلس أو من يراه من أعضائه أو من منسوبي المركز وفق ما يقتضيه سير العمل فيه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المركز الرئيس، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة أو خارجها. ويجوز عقد اجتماعات المجلس والتصويت على قراراته بوساطة وسائل التقنية الحديثة. يجتمع المجلس (أربع) مرات في السنة على الأقل بناءً على دعوة من رئيسه أو من ينيبه، ومتى اقتضت المصلحة ذلك، وعلى الرئيس دعوة المجلس للاجتماع متى طلب ذلك ثلث أعضائه على الأقل. ويجب أن توجه الدعوة قبل موعد الاجتماع بـ(سبعة) أيام عمل على الأقل، على أن تتضمن الدعوة جدول الأعمال ومكان الاجتماع وطريقة انعقاده. يشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل بمن فيهم رئيس المجلس أو من ينيبه من ممثلي الجهات الحكومية. تصدر قرارات المجلس بأغلبية أصوات أعضائه الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. لا يجوز للعضو الامتناع عن التصويت ولا تفويض عضو آخر بالتصويت عنه عند غيابه. لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار المركز حتى بعد
    انتهاء عضويته في المجلس. للمجلس أن يدعو لحضور اجتماعاته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت. يكون للمجلس أمين سر، يعين وتحدد اختصاصاته ومكافأته بقرار من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يكون للمركز رئيس تنفيذي يكون تعيينه وإعفاؤه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، وهو المسؤول التنفيذي عن إدارة المركز، وتتركز مسؤولياته في حدود ما يبينه التنظيم وما يقرره المجلس، ويمارس الاختصاصات التالية: اقتراح السياسات المتعلقة بنشاط المركز، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس لإقرارها. الإشراف على سير العمل في عمل المركز. اقتراح الهيكل التنظيمي للمركز، ورفعه إلى المجلس لإقراره. إعداد اللوائح المالية والإدارية للمركز وغيرها من اللوائح الداخلية، ورفعها إلى المجلس لإقرارها. تعيين منسوبي المركز، والإشراف عليهم؛ وفقاً للأنظمة واللوائح المعمول بها. متابعة تنفيذ القرارات التي يصدرها المجلس. الصرف من ميزانية المركز، واتخاذ جميع الإجراءات المالية؛ وفقاً للأنظمة واللوائح المقرّة، وفي حدود الصلاحية التي يفوضه بها المجلس. الإشراف على إعداد مشروع ميزانية المركز، وحسابه الختامي، والتقرير السنوي، ورفعها للمجلس لإقرارها. رفع تقارير دورية للمجلس عن أعمال المركز وإنجازاته ونشاطاته والمعوقات التي يواجهها. تمثيل المركز أمام القضاء، ولدى الجهات الحكومية
    والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. اقتراح القواعد المتعلقة بالخدمات التي يقدمها المركز في مجال اختصاصه والمقابل المالي لها، والرفع بها إلى المجلس لإقرارها. إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناءً عليها؛ بحسب الصلاحيات المخولة له. الاستعانة بالخبراء والمختصين والمستشارين ذوي الكفايات المؤهلة والمطلوبة في المجلات ذات العلاقة باختصاصات المركز؛ وفقاً للوائح التي يقرها المجلس. أي اختصاص آخر يسنده إليه المجلس. وله تفويض بعض هذه الصلاحيات إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تكون الموارد المالية للمركز مما يلي: أ- الاعتمادات التي تخصص له في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه عن الأعمال والخدمات والتراخيص التي يقدمها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية لدى مؤسسة النقد العربي السعودي، وله فتح حسابات أخرى لهذا الغرض في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الأموال وفق ميزانية المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة. واستثناء من ذلك تبدأ السنة المالية الأولى من تاريخ الموافقة على التنظيم وتنتهي بنهاية السنة المالية التي تليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة؛ يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع منسوبو المركز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e26d2707-afe5-4a81-894f-ac3800a8d131/1
  verified: false
