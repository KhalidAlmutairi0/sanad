regulation:
  code: BOE119
  name_ar: نظام ملكية الوحدات العقارية وفرزها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات أو العبارات الواردة في هذا النظام ما يأتي : 1 - الأرض : هي القطعة المخصصة لتشييد بناء عليها وإنشاء مرافقه وخدماته، حسب المخطط الهندسي المعتمد برخصة البناء. 2 - الوحدة العقارية : هي الدار أو الطبقة أو الشقة أو المرآب (القراج) أو الدكان أو أي جزء من البناء النظامي يمكن فرزه وإجراء حقوق الملكية عليه والتصرف به مستقلا عن أجزاء البناء الأخرى. 3 - المالك : هو الذي يملك وحدة عقارية مستقلة سواء كان واحدا أو أكثر. 4 - الصيانة والترميم : هي الأعمال اللازمة لحفظ العين أو حفظ المنفعة سواء كانت لوحدة مستقلة أو لما تشمله الملكية المشتركة كالمصعد والسلم والحديقة. 5 - الأجزاء المشتركة : هي الأرض المشيد عليها البناء والحدائق والارتدادات وهيكل البناء والسطح والمداخل والسلم، وجميع أجزاء البناء الأخرى المعدة للاستعمال المشترك، ملتصقة أو منفصلة كالمواقف والممرات والنوافير والمصاعد ما لم يتفق على خلاف ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1 - لكل مالك أن يبني على أرضه ضمن حدود الأنظمة والتعليمات بناء من طبقة أو أكثر ويفرزه إلى وحدات عقارية مستقلة تبعا للتصميم المعتمد في المخطط والرخصة ، ويكون تصرفه في كل أو بعض هذه الوحدات باعتبار كل وحدة منها مستقلة عن الأخرى.2 - ترقم الوحدات العقارية في البناء الواحد ترقيما تسلسليا بحيث لا يتكرر رقم واحد لوحدتين عقاريتين في البناء الواحد.3 - يجب أن يبقى شكل وحدود الأرض وأطوالها والبناء ومقاييسه مطابقا للمخطط المعتمد.4 - تبقى محتويات صك الملكية مطابقة لأوصاف الأرض وحدودها وشكلها وأوصاف الوحدة العقارية وحدودها وشكلها الهندسي، فإذا اختلفت الأوصاف عن الواقع تجري الجهة المختصة تصحيح بيانات الصك وفقا للإجراءات النافذة، ويمكن إصدار صك لكل وحدة.5 - أ- إذا اشترك شخصان فأكثر في تشييد بناء اعتبروا جميعا شركاء في ملكيته أرضا وبناء، ملكية شائعة في كل طبقاته ووحداته العقارية وملاحقه كل بنسبة مساهمته في رأس المال والمصروفات ما لم يكن في العقد اتفاق بخلاف ذلك. ب - يجب أن يتضمن العقد أسماء أصحاب الحصص العينية من مالكي الأرض وأصحاب الحصص النقدية، وأوصاف الأرض المعدة للبناء ورقم صك الملكية
    وتاريخه ومصدره والتزامات الشركاء وحقوقهم الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: للشركاء أن يتقاسموا حصصهم الشائعة في البناء المشترك، ويختص كل منهم بوحدة عقارية أو أكثر، فإن لم يتفقوا على القسمة فلطالبها اللجوء إلى القضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 1- يكون مالكو الوحدات العقارية في بناء واحد، شركاء في الأجزاء المشتركة ما لم يتفق على خلاف ذلك.2- تكون الحواجز الجانبية والحيطان بين وحدتين متلاصقتين في بناء قائم مشتركة بين أصحابها ما لم يثبت خلاف ذلك، ولا يحق لأي منهما استعمال حصته فيما يلحق ضررا بالآخر.3- تكون الأجزاء المشتركة التي تقتصر منفعتها على بعض المالكين ملكا مشتركا بينهم ما لم يتفق على خلاف ذلك.4- يكون نصيب كل مالك في الأجزاء المشتركة فيما لا يقبل القسمة جزءا مشاعا في الأرض والبناء، ويلحق بالوحدة العقارية إلحاقا تاما في التصرفات جميعا ما لم يتفق على خلاف ذلك.5- تكون حصة كل مالك في الأجزاء المشتركة بنسبة قيمة الجزء الذي يملكه مفرزا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- يشترك كل مالك وحدة عقارية أو أكثر في تكاليف صيانة الأجزاء المشتركة المذكورة في المادة الرابعة، وإدارتها وترميمها كل بقدر ما يملك من البناء.2- لأي مالك بعد موافقة جمعية الملاك أن يحسن على نفقته الانتفاع بالأجزاء المشتركة أو جزء منها دون أن يغير من تخصيصها أو ما يلحق الضرر بالآخرين.3- على مالك الوحدة صيانة حصته المستقلة وترميمها، ولو لم يكن ينتفع بها لدفع الضرر عن الآخرين أو عن الأجزاء المشتركة.4- ليس لأي مالك وحدة عقارية التخلي عن حصته في الأجزاء المشتركة بغية التخلص من الاشتراك في تكاليف حفظها أو صيانتها أو ترميمها.5- على صاحب السفل القيام بالأعمال والترميمات العادية لمنع ضرر العلو وسقوطه، وعلى صاحب العلو ألا يحدث في بنائه ما يضر بالسفل، وأن يقوم بالأعمال والترميمات اللازمة لمنع ضرر السفل.6- إذا دعت الضرورة إجراء بعض الأعمال حفظا لسلامة البناء المشترك أو لحسن الانتفاع بالأجزاء المشتركة أو صيانتها وترميمها داخل أي وحدة من هذا البناء، فليس لمالكها أو جمعية الملاك معارضة المتضرر في ذلك، على أن تعاد الحال في هذه الوحدة إلى ما كانت عليه على نفقة المباشر فور انتهاء الإصلاحات
    اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: على كل مالك وفقا لهذا النظام، ألا يغلو في استعمال حقه إلى الحد الذي يضر بجاره، وليس للجار أن يرجع على جاره في مضار الجوار المألوفة التي لا يمكن تجنبها، وإنما له أن يطلب إزالة هذه المضار إذا تجاوزت المألوف، على أن يراعي في ذلك الآداب الشرعية والعرف وطبيعة العقار وموقع كل وحدة عقارية بالنسبة للأخرى والغرض الذي خصصت له كل وحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تتم إجراءات نقل الملكية أمام الجهة المختصة في توثيق العقود والإقرارات وإصدار الصكوك المتعلقة بها، وفقا للإجراءات النافذة، مع مراعاة ما ورد في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1- إذا اقتضت المصلحة العامة نزع ملكية البناء، فإن كان النزع لكامل البناء أو بعضه أو لما هو مشترك كالحديقة والارتداد، فإن لكل مالك من التعويض بقدر نسبة قيمة ما يملكه من البناء.2- أما إن كان المنزوع جزءا مفرزا من البناء، فإن التعويض لصاحب الجزء المنزوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: '1 - إذا وجدت ملكية مشتركة لعقار مقسم إلى وحدات عقارية يزيد عددها على عشر وجاوز عدد ملاكها خمسة، فعلى الملاك أن يكونوا جمعية فيما بينهم لمصلحة العقار، ويجوز تكوين جمعية فيما بينهم إذا كان عدد هذه الوحدات عشرا فأقل أو كان الملاك خمسة فأقل.2 - تتمتع جمعية الملاك بشخصية معنوية وتكون لها ذمة مالية مستقلة، وتسجل في وزارة العمل والشؤون الاجتماعية .3 - تتكون موارد جمعية الملاك مما يأتي : أ - اشتراكات الملاك.ب - المبالغ التي يتقرر تحصيلها من الملاك لمواجهة التزامات الجمعية.ج - القروض.د - التبرعات والهبات.هـ - عائد استثمار الأجزاء القابلة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تنتخب جمعية الملاك رئيسا لها من بين أعضائها يتولى رئاسة اجتماعاتها ومتابعة قراراتها، ويتم انتخابه بالأغلبية المنصوص عليها في المادة الثانية عشرة، وتكون مدته ثلاث سنوات قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لجمعية الملاك أن تضع بموافقة ثلاثة أرباع الملاك لائحة لضمان حسن الانتفاع بالعقار المشترك وحسن إدارته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: إذا لم يوجد لائحة للإدارة أو خلت من النص على بعض الأمور، تكون إدارة الأجزاء المشتركة من حق جمعية الملاك ، وقراراتها في ذلك ملزمة بشرط أن يدعى جميع ذوي الشأن بخطاب مسجل إلى الاجتماع، وأن تصدر القرارات بأغلبية الملاك محسوبة على أساس قيمة الأنصباء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لجمعية الملاك بأغلبية الأصوات المنصوص عليها في المادة الثانية عشرة، أن تأذن في إجراء أي أعمال أو تركيبات يترتب عليها زيادة في قيمة العقار كله أو بعضه، وذلك على نفقة من يطلبه من الملاك وبما تضعه الجمعية من شروط وما تفرضه من تعويضات والتزامات أخرى لمصلحة الشركاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- يكون لجمعية الملاك مدير يتولى تنفيذ قراراتها، ويعين بالأغلبية المشار إليها في المادة الثانية عشرة، وعلى المدير إذا اقتضى الحال أن يقوم بما يلزم لحفظ جميع الأجزاء المشتركة وحراستها وصيانتها، وله أن يطالب كل ذي شأن بتنفيذ ذلك ما لم يوجد نص في لائحة الجمعية يخالفه.2- يمثل المدير جمعية الملاك أمام القضاء والجهات الأخرى، وله مقاضاة الملاك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1- يحدد أجر المدير بالقرار الصادر بتعيينه.2- يجوز عزل المدير بقرار تتوفر فيه الأغلبية المشار إليها في المادة الثانية عشرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 1- إذا تضرر البناء بسبب حريق أو غيره، فعلى الشركاء أن يلتزموا لتجديده بما تقرره جمعية الملاك بالأغلبية المنصوص عليها في المادة الثانية عشرة ما لم يتفق على خلاف ذلك.2- إذا انهدم البناء تقرر جمعية الملاك ما تراه، وفي حال الاختلاف يرفع الأمر للقضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يصدر وزير الشئون البلدية والقروية اللائحة التنفيذية والقرارات اللازمة لتنفيذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يلغي هذا النظام كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد تسعين يوما من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c104908b-d32d-411a-b71e-a9a700f214b0/1
  verified: false
