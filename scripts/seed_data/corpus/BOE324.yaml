regulation:
  code: BOE324
  name_ar: اللائحة الأساسية لبرامج تأهيل المعوقين
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة (1)
  article_text_ar: تقوم الإدارة العامة للتأهيل بوزارة العمل والشئون الاجتماعية بوضع السياسة العامة لبرامج تأهيل المعوقين والتي تتضمن برامج لتأهيل من يصلح منهم مهنياً وبرامج أخرى للذين يثبت عدم صلاحيتهم للتأهيل المهني وذلك برعايتهم صحياً ونفسياً وتأهيل من يصلح منهم اجتماعياً وتشمل كلمة "المعوقين" في هذه اللائحة الجنسين من الذكور والإناث.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (2)
  article_text_ar: تختص الإدارة العامة للتأهيل بالإشراف على وضع وتنفيذ برامج تأهيل المعوقين وإجراء البحوث اللازمة لتطوير هذه البرامج واقتراح التنظيمات الإدارية والفنية اللازمة لتنظيم العمل بمراكز التأهيل وتوفير المستوى الملائم للخدمات الخاصة بفئات المعوقين المختلفة وإيجاد صورة متجددة عن حجم الظاهرة بتسجيل الخدمات التي تقدم لهم وجمع البيانات الاحصائية عنهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (3)
  article_text_ar: 'تشكل بوزارة العمل والشئون الاجتماعية لجنة تنسيق على النحو التالي : - مندوبان عن وزارة العمل والشئون الاجتماعية يكون أحدهما رئيساً والآخر مقرراً. - مندوب عن وزارة المعارف. - مندوب عن وزارة الصحة.ويجوز بقرار من وزير العمل والشئون الاجتماعية ضم عضو خامس للجنة عند الحاجة من ذوي التخصص والخبرة في مجال التأهيل المهني والاجتماعي للمعوقين ويكون من اختصاصها ما يلي : - تنسيق الخدمات بين الجهات المعنية برعاية وتأهيل المعوقين وتفادي الازدواجية في تقديم الخدمات لهم. - تقديم المقترحات والتوصيات للمسئولين بما يحقق أهداف رعاية وتأهيل المعوقين طبياً وتعليمياً ومهنياً واجتماعياً.- تيسير الحصول على البيانات الإحصائية اللازمة لكل جهة عن المعوقين. - تبادل البحوث والدراسات التي يتم إجراؤها في مجال المعوقين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (4)
  article_text_ar: تجتمع اللجنة المشار إليها في المادة السابقة كلما دعت الحاجة الى اجتماعها على أن لا يقل اجتماعها عن مرتين في السنة الواحدة ويتم تحديد موعد اجتماعها ومكانه من قبل الرئيس ويمنح عضو اللجنة مكافأة مقدارها (300) ثلاثمائة ريال عن كل جلسة يحضرها على أن لا يزيد ما يتقاضاه كل منهم في السنة عن ثلاثة آلاف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (5)
  article_text_ar: تشرف الإدارة العامة للتأهيل على إعداد ومتابعة برامج مراكز التأهيل المهني للمعوقين بجميع فئاتهم والتي تهدف الى تأهيل المعوقين بدنياً وحسياً وعقلياً بتنمية ما لديهم من قدرات واستعدادات خاصة وذلك بتوجيههم وتدريبهم على المهن المناسبة من أجل إعادة تكيفهم نفسياً واجتماعياً ومهنياً ولجعلهم قادرين على العمل والكسب المشروع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (6)
  article_text_ar: تكون هذه المراكز في المناطق الرئيسية في المملكة، على أن يتم تعميمها مستقبلا حسب الحاجة إليها وبما يغطي احتياجات فئات المعوقين وطبقا لخطة وسياسة الوزارة في هذا الشأن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (7)
  article_text_ar: 'تشمل فئات المعوقين التي تقبل بهذه المراكز على سبيل المثال : ( أ ) فئة المعوقين جسمياً : مثل المصابين ببتر بالأطراف العليا والسفلى، المشلولين، المشلولين جسميا، مرضى القلب.( ب ) فئة الصم والبكم، الصم، البكم، الصم البكم، ضعاف السمع.( ج ) فئة المكفوفين وضعاف البصر.( د ) فئة ناقهي الدرن.( هـ ) فئة المعوقين عقليًّا : المتخلفين عقليًّا " فئة المورون " والحالات المتحسنة من مرضى العقول.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (8)
  article_text_ar: لمراكز التأهيل المهني أن تؤدي الخدمة لكل هذه الفئات أو بعضها، وكذا إعطاء الأولوية لفئة دون أخرى حسب الامكانيات المادية والفنية المتاحة وتبعا لظروف المنطقة المقام فيها المركز وحجم كل فئة، ويتم تأهيل المكفوفين في وحدات خاصة بهذه المراكز، ويجوز فصلهم في مراكز مستقلة إذا دعت الحاجة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (9) شروط القبول
  article_text_ar: 'يشترط لقبول المعوق في هذه المراكز الآتي : ( أ ) أن يكون من المعوقين جسمياً أو حسياً أوعقليًّا من الوجهة الطبية ودون التقيد بالأمثلة الواردة في المادة (7) ويجوز قبول بعض حالات مزدوجي الإعاقة إذا اتضح إمكانية تأهيلهم وتشغيلهم بعد ذلك. ( ب ) أن يكون سعودي الجنسية، ويجوز قبول نسبة لا تزيد عن ١٠٪ من أبناء الدول العربية في حدود الإمكانيات المتاحة وبموافقة الإدارة العامة للتأهيل. ( ج ) أن لا تقل نسبة الذكاء في جميع فئات العجز عن (50). ( د ) أن يكون قد أكمل الخامسة عشرة من عمره وأن لا يكون قد تجاوز الخامسة والأربعين وقت التقدم، ويمكن للادارة العامة للتأهيل التجاوز عن هذين الحدين إذا اتضح امكانية استفادته من التأهيل. ( هـ ) أن يثبت صلاحية الحالة للتأهيل المهني بالفحوص والدراسات المختلفة. ( و ) لوزير العمل والشئون الاجتماعية إعفاء بعض الحالات من بعض هذه الشروط بناءً على تقرير من الإدارة العامة للتأهيل يوضح مبررات الإعفاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (10)
  article_text_ar: تشكل في كل مركز لجنة فنية يكون من بين أعضائها طبيب وتختص هذه اللجنة بالنظر في طلبات التأهيل ووضع خطة تأهيل المعوق ومتابعتها وتقرير منح الشهادات أو إنهاء التدريب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (11)
  article_text_ar: يتم التدريب وفق دورات تدريبية لا تزيد عن عشرين شهراً، ويجوز تمديدها بموافقة الادارة العامة للتأهيل متى دعت الحاجة لذلك.أما فئة المكفوفين فتكون دورتهم التدريبية لمدة ثلاث سنوات، ويجوز تمديدها سنة رابعة بموافقة الإدارة العامة للتأهيل متى دعت الحاجة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (12)
  article_text_ar: يجوز تدريب المعوقين خارج المراكز بالمؤسسات الخاصة والشركات والورش الصناعية والمصالح الحكومية وذلك بعد موافقة الإدارة العامة للتأهيل وبإشراف من المسئولين بالمركز وبموجب عقود تبرم بين أصحاب الأعمال والمراكز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (13)
  article_text_ar: يجوز صرف أجر مقابل التدريب للجهات التي يتم فيها التدريب طبقا للمادة السابقة بحيث لا يزيد عن (300) ثلاثمائة ريال شهرياً عن كل متدرب وطبقاً لنوع المهنة ومتطلباتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (14)
  article_text_ar: تصرف مكافأة مالية مقدارها (400) أربعمائة ريال لكل معوق متدرب شهرياً اعتبارا من تاريخ التحاقه ببرنامج التأهيل بما في ذلك الإجازات، وفي حالة إقامته بالقسم الداخلي تخفض هذه المكافأة إلى (200) مائتي ريال شهرياً، وفي كلتا الحالتين يضاف إلى المبلغ (200) مائتا ريال لمن يعول عائلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (15)
  article_text_ar: توفر مراكز التأهيل المهني للمتدربين - التدريب المهني والرعاية الاجتماعية والنفسية والترويحية والصحية مع تأمين الأدوية والأدوات اللازمة وكذلك تأمين وجبة غذائية يومية أثناء التدريب وملابس التدريب ومعداته وتأمين وسائل النقل، ويجوز عند تعذر تأمين وسائل النقل أو صعوبتها صرف بدل نقدي للمعوقين تقترحه المراكز ويعتمده وكيل الوزارة.كما يجوز صرف مصاريف انتقال المعوق المقيم خارج المدينة التي يقع فيها المركز عند حضوره - للتأهيل، وعند عودته إلى مقره الأصلي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (16)
  article_text_ar: ينشأ في كل مركز قسم داخلي لإقامة المتدربين يوفر لهم فيه إلى جانب السكن الإقامة الكاملة والإعاشة والملابس والخدمات الأخرى كلما توفرت الحاجة والإمكانيات لإنشاء هذه الاقسام الداخلية. ويجوز للمركز إيواء بعض الحالات بالقسم الداخلي والتي يتطلب بقاؤها لإتمام الفحوص والدراسات اللازمة للقبول بالمركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (17)  التخرج ومنح الشهادات
  article_text_ar: ( أ ) يعقد في نهاية الدورة التدريبية المقررة لكل مهنة اختبار ويمنح المتدرب الذي يجتاز الاختبارات بنجاح شهادة التأهيل المهني للمعوقين.( ب ) يجوز منح شهادة التأهيل المهني للمعوقين للفئات المنصوص عليها في المادة (7) من هذه اللائحة لمن يجتاز الاختبار بنجاح ولو لم يكن قد تدرب بالمركز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (18) تشغيل المعوقين مهنيا
  article_text_ar: تبذل مراكز التأهيل المهني بالتنسيق مع الإدارة العامة للتأهيل جهودها لتشغيل المعوقين المؤهلين مهنيا وتتبعهم وذلك باستخدام كافة الأساليب الممكنة وفي حدود الإمكانيات المتاحة، ويمكن الإستعانة بمكاتب العمل لتشغيلهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (19)
  article_text_ar: تشرف الإدارة العامة للتأهيل على إنشاء ومتابعة برامج مراكز التأهيل الاجتماعي لشديدي الإعاقة الذين لا يصلحون للتأهيل المهني نتيجة شدة العجز أو تعدد الإعاقة أو التخلف العقلي الشديد وتهدف هذه المراكز إلى إيواء هذه الحالات لتخفيف العبء عن كاهل أسرهم وتوفير الرعاية الصحية والنفسية لهم وتأهيل الحالات التي تصلح منهم اجتماعياً بتعويدهم على خدمة أنفسهم بأنفسهم وشغل وقت فراغهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (20)
  article_text_ar: 'فئات المعوقين التي تقبل بهذه المراكز : ( أ ) الإعاقات الجسمية الشديدة كالبتر المزدوج الشديد والشلل الرباعي أو الدماغي أو ضمور الاطراف. ( ب) ازدواجية الاعاقة : مثل كف البصر مع الصم، كف البصر مع التخلف العقلي، التخلف العقلي مع الصم والبكم ، كف البصر مع الشلل الشديد. ( ج ) الحالات المتحسنة من المتخلفين عقليًّا من فئة البله والمعتوهين الذين تقل نسبة ذكائهم عن (50) بشرط أن لا يكون التخلف العقلي مصحوباً باضطرابات نفسية أو عقلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (21)
  article_text_ar: 'شروط قبول شديدي الإعاقة : ( أ ) أن يكون المعوق سعودي الجنسية.( ب ) أن يثبت بالفحوص المختلفة عدم صلاحيته للتأهيل المهني لشدة أو إزدواجية إعاقته مع عدم التقيد بالأمثلة الواردة في المادة (20).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (22) رعاية شديدي الإعاقة
  article_text_ar: 'تقوم مراكز التأهيل الاجتماعي لشديدي الإعاقة بتوفير الخدمات الآتية : ( أ ) الإيواء الكامل الذي يتضمن المسكن والمأكل والملبس.( ب ) الرعاية الصحية والطبية وصرف الأدوية.( ج ) الرعاية النفسية.( د ) الترويح وشغل وقت الفراغ.( هـ ) التأهيل الاجتماعي كالعلاج بالعمل والتدريب على خدمة أنفسهم بأنفسهم ما أمكن ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (23)
  article_text_ar: يمنح أولياء أمور شديدي الإعاقة الذين يتعذر قبولهم بمراكز التأهيل الاجتماعي لعدم وجود إمكانيات لرعايتهم بالمركز أو الذين يرغب أولياء أمورهم في رعايتهم وتتوفر لديهم الظروف الصالحة لرعايتهم إعانة نقدية يحددها وزير العمل والشئون الاجتماعية على أن لا تتجاوز عشرة آلاف ريال في السنة، ويجوز الجمع بين الإعانة وأي إعانات أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (24)
  article_text_ar: تصرف إعانة نقدية للفئات التي لا تنطبق عليها شروط شديدي الإعاقة - من السعوديين - ويتعذر استفادتها من الخدمات، وترى الإدارة العامة للتأهيل حاجتها للإعانة، ويحدد مقدار هذه الإعانة بقرار من وزير العمل والشئون الاجتماعية على أن لا تتجاوز ستة آلاف ريال في السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (25)
  article_text_ar: 'ينتهي إيواء المعوقين بمراكز شديدي الإعاقة في الحالات الآتية : ( أ ) إذا رغب ولي أمر المعوق عدم إيوائه بالمركز وتوفرت الظروف الصالحة لرعايته في الأسرة.( ب ) تحسن حالة المعوق وقبوله في مركز التأهيل المهني.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (26)
  article_text_ar: 'يجوز في حالة تعذر قيام نوعي التأهيل المشار إليهما في الباب الثاني والثالث كل على حدة لعدم توفر العدد الصالح والكافي من المعوقين والمعوقات لكل منهما منفرداً أو لعدم توفر الجهاز الإداري والفني أو لأسباب أخرى ترى الجهة المختصة سلامتها يجوز ادماج نوعي التأهيل المشار إليهما تحت مسمى واحد هو : - مراكز التأهيل الشاملة وبنفس الأحكام الواردة - فيهما على أن يقتصر منح بدل التأهيل في المراكز الشاملة على ٢٥٪ فقط.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (27)
  article_text_ar: يمنح العاملون الذين يباشرون تقديم خدمات التأهيل المهني بدل تأهيل معوقين بواقع ٢٥٪ من الراتب الشهري لكل منهم، ويمنح العاملون منهم في مجال التأهيل الاجتماعي لشديدي الإعاقة بدل رعاية معوقين بواقع ٣٠٪ من الراتب الشهري لكل منهم، وتحدد فئات هؤلاء بقرار من وزير العمل والشئون الاجتماعية بالاتفاق مع رئيس ديوان الخدمة المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (28)
  article_text_ar: تحدد مواعيد الدورات وإجازات وقواعد تأديب المتدربين و التنظيمات الإدارية للمراكز بموجب قرارات يصدرها وزير العمل والشئون الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (29)
  article_text_ar: يجوز الجمع بين المزايا التي تقررها هذه اللائحة وأية مزايا تقررها نصوص نظامية أخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
- article_ref: المادة (30)
  article_text_ar: تحل هذه اللائحة محل اللائحة المعتمدة بقرار مجلس الوزراء رقم 1219 وتاريخ 9 / 7 / 1396هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/dcc76b09-2e3b-41cc-8b8f-a9a700f2bb5e/1
  verified: false
