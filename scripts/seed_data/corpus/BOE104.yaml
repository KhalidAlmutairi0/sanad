regulation:
  code: BOE104
  name_ar: النظام الأساس لجمعية الكشافة العربية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك : الجمعية : جمعية الكشافة العربية السعودية . النظام: النظام الأساس لجمعية الكشافة العربية السعودية. اللوائح : اللوائح التي تصدر من المجلس . المجلس : مجلس إدارة الجمعية . الرئيس : رئيس مجلس إدارة الجمعية . العضو : عضو جمعية الكشافة العربية السعودية بحسب نوع العضوية المحدد في النظام . مفوض العلاقات الخارجية: أحد القادة الكشفيين السعوديين المكلف بمهمة العلاقات الخارجية في الجمعية . الوحدات الكشفية : الفرق أو العشائر الكشفية التي يشرف على كل منها قائد كشفي. مفوضيات الرواد : المكاتب التي تشرف على نشاط رواد الكشافة في المملكة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: الجمعية هيئة ذات نفع عام، لها شخصيتها الاعتبارية المستقلة، وتعمل بموجب أنظمة المملكة العربية السعودية، والمعاهدات والاتفاقيات الدولية المنظمة للعمل الكشفي، التي تكون المملكة طرفاً فيها، ومقرها الرئيس في مدينة الرياض، ويجوز لها إنشاء فروع في جميع أنحاء المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الجمعية إلى: 1 - نشر الحركة الكشفية، وتشجيعها، وتنظيمها في أنحاء المملكة. 2 - الإسهام في تهيئة النشء، وتوجيه الشباب وإعدادهم خلقياً وثقافياً واجتماعياً. 3 - تنمية الشعور بالواجب نحو الله - جل شأنه - ثم الملك والوطن. 4 - تعزيز الروابط بين الكشاف السعودي ونظرائه في الدول الأخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تختص الجمعية بالمهمات الآتية: 1- رسم الخطة العامة للحركة الكشفية في المملكة، والإشراف على تنفيذها . 2- تنسيق البرامج الكشفية في القطاعين الحكومي والأهلي، ودعمها فنياً . 3- تنظيم البرامج التدريبية والتأهيلية وفق الأنظمة الكشفية العالمية . 4- الإسهام في أعمال الحج والعمرة وبرامج خدمة المجتمع وتنميته , على أن تتحمل الجهات المستفيدة تكاليف خدمات الجمعية المساندة لها . 5- التنظيم والاشتراك في المؤتمرات، والندوات، والدورات، والمخيمات العربية والإسلامية والدولية، والإشراف على البعثات الكشفية التي تمثل المملكة في مختلف أوجه النشاط الكشفي في المحيط العربي، والإسلامي، والدولي . 6- منح الدرجات، والشهادات، والشارات، والأوسمة الكشفية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 1- للجمعية السماح لأي جهة أو هيئة حكومية أو أهلية بممارسة النشاط الكشفي، وذلك دون اخلال بالمتطلبات النظامية الأخرى. 2- لا يجوز استخدام اسم الجمعية في أي عمل أو مشروع دون تصريح منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تتقيد الوحدات الكشفية ومفوضيات الرواد المسجلة في الجمعية بالأنظمة واللوائح والقرارات المنظمة لأوجه نشاطاتها المتنوعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعتمد الجمعية الشارات التي تميزها، ولها شعاراتها وأعلامها وعلاماتها المميزة، ولا يجوز تقليدها، وتطبق على من قلد شيئاً منها العقوبات التي تقضي بها الأنظمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يجب أن تتوافر في عضو الجمعية الشروط الآتية : 1- أن يكون قد أتم الثامنة عشرة من عمره . 2- أن يكون كامل الأهلية المعتبرة شرعاً . 3- ألاّ يكون قد حكم عليه بالإدانة في جريمة مخلة بالشرف أو الأمانة ما لم يكن قد رد إليه اعتباره. 4- أن يسدد رسوم الاشتراك السنوية. 5- أي شرط آخر تنص عليه اللوائح، أو يصدر بقرار الجمعية العمومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'أنواع العضوية هي : 1- عضو عامل : وهو العضو الذي يطلب الالتحاق بالجمعية، وتطبق عليه جميع الشروط المطلوبة لعضوية الجمعية , وله حق التصويت على قراراتها، وترشيح نفسه لعضوية المجلس بعد مضي سنة كاملة على التحاقه بالجمعية عضواً عاملاً . 2- عضو منتسب : وهو العضو الذي يطلب الانتساب إلى عضوية الجمعية، وتتحقق فيه الشروط المنصوص عليها في المادة (الثامنة) من هذا النظام، عدا شرط العمر. 3- عضو شرف : وهو العضو الذي تمنحه الجمعية - بقرار من المجلس - عضويتها نظير ما قدمه لها من خدمات جليلة، أو لخبراته وخدمته للحركة الكشفية عموماً ، ولا يجب عليه دفع أي رسم أو اشتراك . 4- عضو فخري : وهو الشخص ذو الصفة الطبيعية أو المعنوية، الذي تمنحه الجمعية - بقرار من المجلس - عضويتها عند تبرعه المادي للجمعية ، ويقدر المجلس أهمية ذلك التبرع في تحقيق الجمعية لأهدافها التي أسست من أجلها، ولا يجب عليه دفع أي رسم أو اشتراك. وللأعضاء المذكورين في الفقرات (2) و(3) و(4) حضور اجتماعات الجمعية العمومية دون أن يكون لهم حق التصويت أو ترشيح أنفسهم لعضوية المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: '1- تنتهي - بقوة النظام - العضوية في الجمعية بأحد الأسباب الآتية : أ- الوفاة. ب- إذا فقد العضو شرطاً من شروط العضوية الواردة في المادة (الثامنة) من هذا النظام. ج- إذا تأخر العضو عن تسديد الاشتراك المطلوب لاستمرار عضويته مدة ستة أشهر من تاريخ استحقاقه. 2- تنتهي العضوية في الجمعية بناءً على قرار من المجلس في الحالات الآتية : أ- الاستقالة من الجمعية بطلب مكتوب يقدم إلى إدارتها . ب- إذا ألحق العضو بالجمعية - عن عمد - أضراراً جسيمة سواءً أكانت مادية أم معنوية, ويعود تقدير تلك الأضرار للمجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز لمن فقد العضوية بسبب عدم تسديد الاشتراك استعادتها بعد تسديد الاشتراك السابق واللاحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يحق لكل عضو عامل من أعضاء الجمعية الاطلاع - في مقر الجمعية - على قرارات المجلس، والجمعية العمومية، والميزانية، ومرافقاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'تتكون الجمعية من الهيئات الإدارية والفنية الآتية : 1- الجمعية العمومية. 2- المجلس. 3- الأمانة العامة. 4- اللجان والهيئات الإدارية والفنية التي تكونها الجمعية العمومية أو المجلس, ويحدد اختصاص كل لجنة واسمها في القرار الصادر بتكوينها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- تتكون الجمعية العمومية من جميع الأعضاء العاملين الذين سددوا اشتراكاتهم ومضت على عضويتهم ستة أشهر على الأقل، وتستثنى من شرط المدة الجمعية العمومية للسنة الأولى. 2- تعقد الجمعية العمومية اجتماعاتها في مقر الجمعية، أو في أي فرع لها في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'الجمعية العمومية هي السلطة المشرفة على الجمعية، وتختص بالآتي: 1- إقرار سياسات الجمعية العامة. 2- انتخاب أعضاء المجلس، وإنهاء عضويتهم. 3- اعتماد مقترح المجلس بتعديل النظام. 4- إقرار ميزانية الجمعية، والتصديق على الحساب الختامي . 5- تعيين محاسب قانوني، وتحديد أتعابه السنوية. 6- اعتماد فتح فروع للجمعية ومكاتب عملها ومقراتها داخل المملكة وتحديد ميزانياتها. 7- اعتماد تقرير المجلس عن أعمال الجمعية خلال السنة المنتهية. 8- تفويض بعض صلاحياتها للمجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'تنقسم اجتماعات الجمعية العمومية إلى ما يأتي : 1- عادية : وتعقد مرة كل سنة في مدة لا تتجاوز ثلاثة أشهر من تاريخ انتهاء السنة المالية للجمعية . 2- غير عادية : وتعقد عند الحاجة إلى النظر في أي أمر طارئ يستوجب عقدها. وتعقد الجمعية العمومية اجتماعاتها غير العادية بناءً على طلب المجلس، أو طلب يقـدمه إلى المجلس (10%) على الأقل من الأعضاء العاملين . وعلى المجلس دعوة الجمعية العمومية للانعقاد خلال ثلاثين يوماً من تاريخ استقبال طلب هؤلاء الأعضاء، على أن يكون الطلب مسبباً وموضحة فيه الأمور التي يطلب عقد الجمعية العمومية لأجلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يُعد اجتماع الجمعية العمومية العادية وغير العادية صحيحاً إذا حضره أكثر من نصف الأعضاء العاملين الذين يحق لهم الحضور، فإذا لم يكتمل النصاب النظامي لعقد الاجتماع فعلى المجلس دعوة الجمعية العمومية للانعقاد مرة أخرى خلال مدة لا تتجاوز ثلاثين يوماً، فإن لم يكتمل النصاب النظامي في المرة الثانية جاز عقد الجمعية العمومية بمن حضر من الأعضاء العاملين بعد مضي ساعة على انقضاء الموعد المحدد لعقد الاجتماع , ويعد الاجتماع في هذه الحالة صحيحًا، وتتخذ الجمعية العمومية قراراتها بأغلبية أصوات الأعضاء الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجوز للعضو العامل قبول توكيل مكتوب لعضو عامل آخر بما لا يزيد على اثنين لحضور اجتماع الجمعية العمومية، والتصويت عن موكله، ولا يجوز أن يكون التوكيل لعضو المجلس أو لمن هو مرشح لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يتولى الرئيس رئاسة اجتماعات الجمعية العمومية، وله حق إنابة أحد أعضائها في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تكوَّن لجنة من ثلاثة أعضاء من الأعضاء العاملين الذين حضروا الاجتماع ؛ للإشراف على عملية التصويت , وتدوين وقائع الاجتماع ، وقرارات الجمعية العمومية ، وعدد الأصوات التي حازها كل قرار في سجل خاص بمحاضر اجتماعات الجمعية العمومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: 'المادة الحادية والعشرون: المجلس'
  article_text_ar: '1- يتكون المجلس من تسعة أعضاء، تنتخبهم الجمعية العمومية من بين أعضائها العاملين، بطريقة الاقتراع السري. 2- يعقد المجلس المنتخب - فور انتخابه - اجتماعاً من أجل انتخاب الرئيس ونائبه بالتزكية، أو التصويت. 3- مدة عضوية المجلس (ثلاث سنوات)، ويجوز إعادة انتخاب المجلس كاملاً، أو بعض أعضائه لفترة ثانية فقط. 4- عند تعذر انعقاد الجمعية العمومية للنظر في ترشيح أعضاء للمجلس، أو عدم تقدم عدد كافٍ للترشيح ؛ يستمر المجلس السابق في تسيير أعمال الجمعية حتى ينتخب مجلس جديد. 5- يحق لكل من: أ‌- الأمين العام. ب- مفوض العلاقات الخارجية. ج- أمين الصندوق. حضور اجتماعات المجلس، ولهم حق المناقشة وطرح الموضوعات، وليس لهم حق التصويت.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 'يشترط في عضو المجلس - إضافة إلى الشروط المنصوص عليها في المادة (الثامنة) من هذا النظام - ما يأتي : 1- ألا يقل عمره عن خمس وعشرين سنة. 2- أن يكون سعودي الجنسية، ومقيماً في المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'يتولى المجلس أعمال الجمعية بما يحقق الأهداف المحددة في هذا النظام، ولوائحه، والقرارات والأنظمة المراعاة في المملكة، ومن ذلك : 1- إدارة ممتلكات الجمعية وأموالها، والتصرف في الثابت والمنقول وفقاً للأصول المتبعة. 2- اختيار الأمين العام، وأمين الصندوق ، ومفوض العلاقات الخارجية. 3- إقرار اللوائح الخاصة بالجمعية مع مراعاة ما تقضي به الأنظمة النافذة. 4- تكوين اللجان العاملة بالجمعية ومتابعتها. 5- اتخاذ القرارات في شأن المشاركات الدولية مع الجمعيات المماثلة، والاتحادات الدولية للكشافة وفق أنظمة الدولة وتعليماتها. 6- الإشراف الإداري والمالي على الجمعية , وتنفيذ قرارات الجمعية العمومية في هذا الشأن . 7- قبول المنح، والهبات، والإعانات التي تقدم للجمعية، أو رفضها . 8- استيفاء ما للجمعية من حقوق ، وتأدية ما عليها من التزامات للغير. 9- إعداد الخطط العامة والبرامج الشاملة لنشاطات الجمعية، ومتابعة تنفيذها . 10- إعداد التقرير السنوي عن أعمال الجمعية ومنجزاتها. 11- دراسة ميزانية الجمعية وحسابها الختامي، وإعداد تقرير عنها، ومناقشتها أمام الجمعية العمومية . 12- دعوة الجمعية العمومية للانعقاد
    . 13- تعيين المديرين التنفيذيين في الجمعية، وتحديد أجورهم وصلاحياتهم . 14- اقتراح فتح فروع للجمعية، أو مكاتب، أو مقرات عمل داخل المملكة، وتحديد ميزانياتها السنوية، وتقديمها للجمعية العمومية لاعتمادها. 15- اقتراح تعديل النظام عند الحاجة. 16- تمثيل الجمعية أمام القضاء، وتوكيل الغير في ذلك بقرار من المجلس تحدد فيه صلاحيات الوكيل وحدود وكالته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: يعقد المجلس اجتماعات دورية لا تقل عن أربعة اجتماعات في السنة المالية الواحدة، وتكون اجتماعات المجلس صحيحة إذا حضرها ما يزيد على نصف الأعضاء، وتتخذ القرارات بالأغلبية، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'فيما عدا الحالات العادية، يجوز عقد جلسة غير عادية للمجلس في الحالات الآتية : 1- تخلف بعض أعضاء المجلس عن الحضور بشكل لا يتحقق معه النصاب النظامي لعقد الاجتماعات. 2- طلب ما لا يقل عن ثلاثة أعضاء عقد اجتماع غير عادي، على أن يكون الطلب مسبباً، ومقدمًا إلى الرئيس. 3- أي أمر طارئ يرى الرئيس أو نائبه دعوة المجلس لمناقشته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'يفقد عضو المجلس عضويته بأحد الأسباب الآتية : 1- إذا فقد شرطاً من شروط العضوية المنصوص عليها في هذا النظام. 2- إذا توافر فيه سبب من أسباب انتهاء العضوية المنصوص عليها في المادة (العاشرة) من هذا النظام. 3- إذا تغيب - دون عذر مقبول - عن حضور ثلاث جلسات متتالية . 4- إذا قدم استقالته، وقبلها المجلس . وفي جميع الحالات تفقد العضوية بموجب قرار يصدره المجلس, ويكون نافذاً من تاريخ صدوره، وللعضو الذي صدر في حقه هذا القرار أن يتظلم منه أمام الجمعية العمومية خلال ثلاثين يوماً من تاريخ إبلاغه به, وينظر في هذا التظلم في أول اجتماع للجمعية العمومية يعقد بعد رفع التظلم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: عند نقص عدد أعضاء المجلس عن تسعة لأي سبب من الأسباب، يسد النقص بأكثر المرشحين أصواتاً في آخر انتخابات لأعضاء المجلس، فإن كان المنصب للرئيس أو نائبه، فيشغل بالانتخاب من بين أعضاء المجلس بعد اكتمال عددهم، فإن تعذر سد النقص بهذه الطريقة، وجبت دعوة الجمعية العمومية للانعقاد لترشيح من يسد النقص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: تحدد اللوائح لهذا النظام صلاحيات الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: 'المادة التاسعة والعشرون : الأمانة العامة'
  article_text_ar: يكون للجمعية أمانة عامة ، وتحدد اللوائح مهماتها، وصلاحيات الأمين العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: 'موارد الجمعية هي : 1- الإعانة المخصصة لها ضمن ميزانية الدولة. 2- اشتراكات الأعضاء، ورسوم التسجيل. 3- التبرعات، والهبات النقدية والعينية. 4- إيرادات الأنشطة ذات العائد المالي . 5- الوصايا، والأوقاف . 6- عائدات استثمار ممتلكات الجمعية الثابتة والمنقولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: المالية للجمعية هي السنة المالية للدولة، وتعد الميزانية المقترحة معتمدة إذا أقرتها الجمعية العمومية، وعند تأخر اعتمادها يصرف منها بما لا يتجاوز بنود الميزانية السابقة حتى تعتمد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: تمسك الجمعية السجلات، والدفاتر الإدارية والمحاسبية التي تحتاج إليها وفقاً للأسس المحاسبية المعتبرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يتولى محاسب الجمعية القانوني مراجعة الحسابات المالية، وإعداد ميزانيتها وحسابها الختامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد (مائة وثمانين) يوماً من تاريخ نشره، ويلغي نظام جمعية الكشافة العربية السعودية، الصادر بالمرسوم الملكي رقم (م/8) وتاريخ 20 / 4 / 1407 هـ، وجميع ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4db42334-ba00-47bf-b9f9-a9f4016e0ac1/1
  verified: false
