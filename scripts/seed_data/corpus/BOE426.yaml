- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذه الترتيبات التنظيمية- المعاني المبينة أمام كل منها: الهيئة: الهيئة السعودية للمياه. الوزير: وزير البيئة والمياه والزراعة. الترتيبات التنظيمية: الترتيبات التنظيمية للهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. الشخص: الشخص ذو الصفة الطبيعية أو الاعتبارية. أنشطة تقديم الخدمات: نشاط يقوم به أشخاص أو يعتزمون القيام به، ويشمل: تحلية المياه، وتنقيتها، ومعالجتها، وأنشطة المشتري الرئيس للمياه، وإنتاج المياه للاستخدام الحضري أو الصناعي أو الزراعي، وذلك من خلال ضخ مياه الآبار أو السدود مباشرة أو تنقيتها، ونقل هذه المياه والمياه المحلاة إلى نقاط التوزيع، وتوزيعها، وخزنها استراتيجيًّا، والمتاجرة بها، وبيعها بالتجزئة، وتجميع مياه الصرف الصحي ونقلها ومعالجتها، وإعادة استخدامها للأغراض الحضرية أو الصناعية أو الزراعية. ولا يشمل ذلك نشاط الأشخاص الذين يقومون بتعبئة المياه في العبوات. الرخصة: وثيقة تصدرها الهيئة لشخص للقيام بأي نشاط من أنشطة تقديم الخدمات بناء على الأحكام النظامية ذات الصلة.
    المرخص له: كل شخص يحمل رخصة أو إعفاء. التصريح: وثيقة تصدرها الهيئة فيما يتصل بأعمال الإعداد -بما في ذلك إعداد الخطط والقيام بالدراسات- قبل الشروع في أعمال إنشاء أي نشاط من أنشطة تقديم الخدمات. ويقصد بالكلمات والعبارات الآتية: (الإعفاء، والمستهلك، وتعريفة المياه)؛ المعاني المبينة في المادة (الأولى) من نظام المياه، الصادر بالمرسوم الملكي رقم (م / 159) وتاريخ 11 / 11 / 1441هـ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة، والاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير. ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنظيم الأعمال والخدمات المتعلقة بأنشطة المياه والرقابة عليها وتطوير أساليبها؛ بما يُسهم في تعزيز الاستدامة المالية وتحقيق أهداف رؤية المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'للهيئة -دون إخلال باختصاصات الجهات الأخرى- القيام بكل ما يلزم لتحقيق أهدافها، ومن ذلك ما يلي: وضع المعايير والإجراءات والنماذج ذات الصلة بمجالات اختصاصها. وضع وتطوير السياسات والخطط والبرامج والمبادرات ذات الصلة بقطاع المياه، والرفع عما يتطلب استكمال إجراءات نظامية في شأنه. وضع الضوابط والاشتراطات اللازمة، لما تصدره من تراخيص ذات صلة بالأنشطة المرتبطة بمجالات اختصاصها. تطوير وتوحيد المعايير الفنية والهندسية المتعلقة بالأنشطة المرتبطة بمجالات اختصاصها، والتـحقق من مواءمتها مع معايير ومواصفات المحتوى المحلي ومعايير الاستدامة. اقتراح مشروعات الأنظمة ذات الصلة بمجالات اختصاصها، واقتراح تعديل المعمول به منها، والرفع عن ذلك وفقاً للإجراءات النظامية المتبعة. إدارة وتخطيط متطلبات البنية التحتية لمشروعات قطاع المياه. إدارة عملية تخطيط المحافظ الرأسمالية لسلسلة إمداد المياه في المملكة، ورفع التقارير والتوصيات والحلول الاستراتيجية والفنية للأداء العام لقطاع المياه. احتساب مقدار العجز الناتج عن الفرق بين الدخل المفترض للخدمات -الذي تقدره الهيئة بناءً على أسس تجارية- والدخل الحقيقي
    المتحقق من التعريفة المعتمدة للسنة المعنية. وتقوم وزارة المالية بسداد ذلك العجز بالاتفاق مع المجلس، ووفق النموذج المعتمد في هذا الشأن. توطين الصناعة والخدمات المتصلة بالأنشطة المرتبطة بمجالات اختصاصها، ورفع نسبة المحتوى المحلي فيها. تنظيم ورقابة قطاع المياه، من خلال دراسة وإقرار التكاليف والأسعار البينية المرتبطة بتقديم خدمات المياه في المملكة. تنظيم الاتفاقيات التجارية مع الجهات ذات العلاقة بقطاع المياه. وضع إطار تنظيمي لخدمات المياه، وذلك بالتنسيق مع المؤسسات والجهات ذات العلاقة والمرخص لهم؛ لوضع الإطار التنظيمي والإجرائي اللازم لضمان مزاولة جميع أنشطة خدمات المياه -بصفة عامة- سواء للاستخدام العام أو الخاص عند مستويات ذات جودة وموثوقية عالية، وتوفير هذه الخدمات للمستهلك بأسعار وتعريفات مناسبة ومساندة للتنمية المستدامة. الإشراف والرقابة على تطبيق مواصفات وضوابط جودة المياه والأصول التشغيلية والخدمات المرتبطة بهذه الأصول. اعتماد المواصفات الفنية والهندسية للأصول التشغيلية لمزودي الخدمة على جميع سلاسل إمداد المياه. إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة بقطاع المياه، مع الجهات المعنية
    داخل المملكة وخارجها، وفقاً للإجراءات النظامية المتبعة. عقد المؤتمرات والندوات وجلسات العمل والفعاليات ذات الصلة بنشاط الهيئة، داخل المملكة وخارجها، والاشتراك فيها، وفقاً للإجراءات النظامية المتبعة. دعم البحوث والدراسات، وإجراؤها في مجالات اختصاصها، سواء بشكل منفرد أو بالاشتراك مع الجهات ذات العلاقة. التعاون مع مراكز البحوث وبيوت الخبرة على المستويين المحلي والدولي -عند الحاجة- بما يسهم في تحقيق أهداف الهيئة. تقديم الخدمات أو الأعمال أو المبادرات ذات الصلة بمجالات اختصاصها. إصدار التراخيص والتصاريح المرتبطة بتقديم خدمات المياه في المملكة. مراقبة جميع مقدمي الخدمات في قطاع المياه؛ للتأكد من تقيدهم بالأنظمة وتنفيذ شروط وأحكام التراخيص الصادرة لهم. مراقبة تطبيق معايير الاستدامة البيئية والاجتماعية والحوكمة في قطاع المياه. تلقي الشكاوى ذات الصلة بمجالات اختصاصها، والتحقيق والبت فيها وفقاً لما تقضي به الأنظمة. العمل على توفير البيئة الاستثمارية الملائمة في مجالات اختصاصها، بالتنسيق مع الجهات ذات العلاقة. العمل على زيادة فرص حصول المستهلكين على الإمدادات اللازمة من خدمات المياه، والعمل على
    التحقق من إيصالها إلى المناطق التي لم تصل إليها. التأكد من توفير إمدادات مأمونة وموثوقة من المياه يمكن الاعتماد عليها وذات كفاءة عالية. حماية حقوق المستهلكين والأشخاص المرخص لهم والمستثمرين في تطوير أنشطة تقديم الخدمة. التخطيط التكاملي لجميع مكونات سلسلة إمدادات المياه وفقاً لخطة العرض والطلب المعتمدة من الوزارة وفقاً للأحكام النظامية ذات الصلة، وإدارة الأمن المائي، وإعداد تقييم شامل لجاهزية وموثوقية البنية التحتية، والإشراف على أصول المصادر المكملة لأمن الإمداد المائي من المصادر الطبيعية والخزن الاستراتيجي. مراقبة سلسلة الإمداد، وتحليل ورفع كفاءة البيانات والمعلومات المرتبطة بقطاع المياه، ومراقبة تنفيذ أعمال تطوير البنية التحتية. الإسهام في بناء القدرات لقطاع المياه عبر التدريب والتأهيل، وذلك بالتنسيق مع الجهات التدريبية. تمثيل المملكة في الهيئات والمنظمات الإقليمية والدولية في مجالات اختصاص الهيئة وفقاً للإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، وعضوية كل من: ممثل من وزارة البيئة والمياه والزراعة. ممثل من وزارة المالية. ممثل من وزارة الشؤون البلدية والقروية والإسكان. ممثل من وزارة الطاقة. ممثل من وزارة الاقتصاد والتخطيط. الرئيس التنفيذي. اثنين من ذوي الخبرة والاختصاص بعمل الهيئة يصدر بتعيينهما أمر من رئيس مجلس الوزراء بناء على اقتراح من الرئيس، لمدة (ثلاث) سنوات قابلة للتجديد لمرة واحدة. ويجب ألا تقل مرتبة ممثلي الجهات الحكومية عن المرتبة (الخامسة عشرة) أو ما يعادلها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنته الترتيبات التنظيمية والأنظمة ذات الصلة من أحكام. وله -بوجه خاص- ما يأتي: إقرار السياسات والخطط والبرامج والمبادرات ذات الصلة بمجالات اختصاص الهيئة، والرفع عما يتطلب استكمال إجراءات في شأنها. إقرار الضوابط والاشتراطات اللازمة لما تصدره الهيئة من تراخيص ذات صلة بالأنشطة المرتبطة بمجالات اختصاصها، وفقاً للأحكام النظامية ذات الصلة، ومتابعة تنفيذها. اقتراح مشروعات الأنظمة ذات العلاقة بمجالات اختصاص الهيئة، واقتراح تعديل المعمول به منها، ورفعها لاستكمال الإجراءات النظامية. إقرار الهيكل والدليل التنظيمي للهيئة، وفقاً للإجراءات النظامية المتبعة. إقرار اللوائح المالية والإدارية التي تسير عليها الهيئة، وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية، ويكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. إقرار المقابل المالي
    الذي تتقاضاه الهيئة عن التراخيص والتصاريح وما تقدمه من أعمال وخدمات وفقاً للأحكام النظامية ذات الصلة. إقرار الضوابط الخاصة بإدارة أنشطة تقديم الخدمة في الحالات الضرورية، وفقاً للأحكام النظامية ذات الصلة وبحسب القواعد والإجراءات والضوابط التي تضعها الهيئة على نشاط أي شخص يخالف الأحكام النظامية ذات الصلة. اعتماد تعريفات أنشطة تقديم الخدمة، وتعديلها بجميع مكوناتها ولجميع فئات المستهلكين بما يعكس سعر التكلفة الفعلية، وفقاً للدعم المقرر نظاماً. اعتماد تكلفة أنشطة تقديم الخدمة دون إعانة بينية بين ما يُنتَج أو يقدم من خدمات. الموافقة على مشروع ميزانية الهيئة وحسابها الختامي، والتقرير السنوي عن نشاطها؛ تمهيداً لاستكمال الإجراءات النظامية في شأنها. الموافقة على إنشاء فروع أو مكاتب للهيئة. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. اعتماد تقرير مراجع الحسابات. النظر في التقارير الدورية التي تقدم له عن سير العمل في الهيئة، واتخاذ القرارات اللازمة في شأنها. الموافقة على إبرام الهيئة للاتفاقيات ومذكرات التفاهم والعقود، بحسب الإجراءات النظامية المتبعة؛ وفقاً للأحكام النظامية ذات الصلة.
    الموافقة على عقد المؤتمرات والندوات والمنتديات العلمية، والفعاليات ذات الصلة بنشاط الهيئة، وفقاً للأحكام النظامية ذات الصلة. الموافقة على إقامة العقارات وشرائها وبيعها وتأجيرها لمصلحة الهيئة بما يحقق أغراضها، بعد الاتفاق مع الهيئة العامة لعقارات الدولة؛ وفقاً للأحكام النظامية ذات الصلة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقاً للأحكام النظامية ذات الصلة. احتساب مقدار العجز الناتج عن الفرق بين الدخل اللازم للخدمات الذي تقدره الهيئة بناءً على أسس تجارية والدخل الحقيقي المتحقق من التعريفة المعتمدة، تمهيداً لاستكمال ما يلزم وفقاً للإجراءات المعتمدة. وللمجلس -في سبيل تحقيق اختصاصاته ودون إخلال بالواجبات المنوطة به- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدِّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، وقواعد عملها، ويكون لها الاستعانة بمن تراه لتأدية المهمات المعهود بها إليها. وله كذلك تفويض بعض اختصاصاته إلى الرئيس أو الرئيس التنفيذي أو من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة، برئاسة الرئيس أو من ينيبه من الأعضاء ممثلي الجهات الحكومية. ويجوز عقدها في مكان آخر داخل المملكة. يعقد المجلس اجتماعاته بصفة دورية بما لا يقل عن (ثلاث) مرات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو إذا طلب ذلك (ثلث) الأعضاء على الأقل. يوجّه الرئيس الدعوة إلى الاجتماع كتابةً قبل موعده بوقت كافٍ، ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يكون اجتماع المجلس صحيحًا إذا حضره أغلبية الأعضاء -على الأقل- بمن فيهم الرئيس أو من ينيبه من الأعضاء ممثلي الجهات الحكومية. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل. وفي حال تساوي الأصوات، يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز -عند الحاجة، وفي الحالات المستعجلة، ووفقًا لما يقدره الرئيس- أن تعقد الاجتماعات وأن يصوت على القرارات، عن بُعد. ويمكن أن تُتخذ القرارات عن طريق التمرير على أعضاء المجلس، ويوقَّع عليها بما يفيد باطّلاع جميع الأعضاء عليها. ولا تُعدّ القرارات الصادرة بهذه الطريقة صحيحة
    ما لم تمُرَّر على جميع الأعضاء، ويصوتوا عليها، وتحُزْ على أغلبية أصواتهم على الأقل. لا يجوز لعضو المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. يكون للمجلس أمين من منسوبي الهيئة، يعينه المجلس -بناءً على ترشيح الرئيس التنفيذي- ويتولى الإعداد لاجتماعات المجلس، وإبلاغ أعضائه بمواعيدها، وتهيئة محاضر المجلس وقراراته، وما يكلفه به المجلس أو الرئيس من مهمات. لا يجوز لعضو المجلس أن يفشي شيئًا ممّا وقف عليه من أسرار الهيئة حتى بعد انتهاء عضويته في المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي، يعيَّن بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية والوظيفية الأخرى، ويُعَد المسؤول عن إدارة الهيئة وتسيير أعمالها. وتتركز مسؤولياته وصلاحياته في حدود ما تنصُّ عليه الترتيبات التنظيمية واللوائح الصادرة بناءً عليه، وما يقره المجلس. وله -في سبيل تحقيق ذلك- ممارسة الصلاحيات والاختصاصات اللازمة، ومنها: الإشراف على إعداد السياسات والخطط والبرامج والمبادرات ذات الصلة بمجالات اختصاص الهيئة، ورفعها إلى المجلس. الإشراف على إعداد الضوابط والاشتراطات اللازمة لما تصدره الهيئة من تراخيص ذات صلة بالأنشطة المرتبطة بمجالات اختصاصها، ورفعها إلى المجلس. الإشراف على إعداد مشروعات الأنظمة ذات العلاقة بمجالات اختصاص الهيئة، واقتراح تعديل المعمول به منها، ورفعها إلى المجلس. الإشراف على سير العمل في الهيئة طبقًا للوائحها وخططها وبرامجها المعتمدة، ومتابعة تنفيذ القرارات التي يصدرها المجلس. الإشراف على إعداد الهيكل والدليل التنظيمي للهيئة، واللوائح الإدارية والمالية، وغيرها من اللوائح اللازمة لتسيير شؤون الهيئة، واقتراح تعديل المعمول به منها، ورفعها إلى المجلس؛
    وتنفيذها بعد إقرارها. الإشراف على إعداد مشروع ميزانية الهيئة وحسابها الختامي وتقريرها السنوي؛ ورفعها إلى المجلس. اقتراح المقابل المالي الذي تتقاضاه الهيئة عن التراخيص والتصاريح وما تقدمه من أعمال وخدمات، ورفعه إلى المجلس. اقتراح إنشاء فروع أو مكاتب للهيئة، ورفعه إلى المجلس. اقتراح عقد المؤتمرات والندوات والمنتديات العلمية، والفعاليات ذات الصلة بنشاط الهيئة، ورفعه إلى المجلس. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في الترتيبات التنظيمية واللوائح الصادرة بناءً عليها، بحسب الصلاحيات المخولة له. الصرف من ميزانية الهيئة، واتخاذ جميع الإجراءات المالية، وفقاً للأحكام النظامية ذات الصلة. إبرام الاتفاقيات ومذكرات التفاهم والبروتوكولات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات التي يمنحها إيّاه المجلس؛ وذلك وفقاً للأحكام النظامية ذات الصلة. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. تعيين منسوبي الهيئة والإشراف عليهم؛ وفقًا للأحكام النظامية ذات الصلة. إقرار الخطط والبرامج المتصلة بتدريب منسوبي الهيئة وابتعاثهم وإيفادهم في جميع
    مجالات عمل الهيئة، وفقاً للأحكام النظامية ذات الصلة. التعاقد مع الخبراء والمستشارين وبيوت الخبرة من داخل المملكة أو خارجها بما يخدم أهداف الهيئة واختصاصاتها، وفقاً للأحكام النظامية ذات الصلة. التحضير لاجتماعات المجلس. إعداد تقارير دورية عن أعمال الهيئة ومنجزاتها ونشاطاتها، ورفعها إلى المجلس. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته أو صلاحياته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة، تُعَدّ وتصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد الهيئة المالية مما يأتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع أوقاف. ج- المقابل المالي الذي تتقاضاه نظير التراخيص والتصاريح وما تقدمه من أعمال وخدمات. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع أموال الهيئة في حساب جاري وزارة المالية لدى البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ولها فتح حسابات في أي من البنوك المرخص لها بالعمل داخل المملكة. ويكون الصرف من هذه الحسابات وفقاً لميزانية الهيئة ولوائحها المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يومًا من بداية كل سنة مالية تقريرًا سنويًّا عما حققته من إنجازات خلال السنة المنقضية، وما واجهها من صعوبات، وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يُعمل بالترتيبات التنظيمية من تاريخ نشرها في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cc6aa1e2-f6d3-4fb3-9208-b17500e9c0e4/1
  verified: false
