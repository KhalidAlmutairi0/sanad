articles:
- article_ref: 'المادة الأولى: غايات السياسة الاقتصادية'
  article_text_ar: 'تقوم السياسة الاقتصادية للمملكة على ثوابت الرعاية الاجتماعية الشاملة ومفهوم الاقتصاد الحر والأسواق المفتوحة للمال والسلع والخدمات والمنتجات من أجل تحقيق الغايات الآتية: 1 - أمن ورفاهية وازدهار المجتمع مع المحافظة على القيم الإسلامية والبيئة والثروات الطبيعية بشكل يوازن بين الحاضر والمستقبل.2 - نمو الاقتصاد الوطني بصفة منتظمة وبمستوى ملائم بحيث تتحقق زيادة حقيقية في دخل الفرد.3 - استقرار في الأسعار.4 - توفير فرص العمل المنتج، وتوظيف أمثل للقوى البشرية وتشغيلها.5 - ضبط الدين العام والسيطرة عليه في حدود آمنة ومقبولة.6 - تأكيد التوزيع العادل للدخل وفرص الاستثمار والعمل.7 - تنويع القاعدة الاقتصادية وزيادة مصادر الإيراد العام.8 - تنمية المدخرات وتطوير أوعية ادخارية وقنوات استثمارية سليمة. 9 - زيادة دخل الدولة وربطه بحركة ونمو الاقتصاد الوطني بما يمكنها من أداء مسؤولياتها نحو التنمية الوطنية والرعاية الشاملة .10 - زيادة استثمار رؤوس الأموال والمدخرات المحلية في الاقتصاد الوطني بالسبل الفعالة، ودعم برنامج الحكومة للتخصيص، وتطوير برنامج التوازن الاقتصادي. 11 - زيادة مشاركة القطاع
    الأهلي وتوسيع مساهمته في الاقتصاد الوطني وفاعليته في المسيرة التنموية، والمشاركة في برنامج الحكومة للتخصيص.12 - تعزيز مقدرة الاقتصاد الوطني على التفاعل بمرونة وكفاءة مع المتغيرات الاقتصادية الدولية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة الثانية : إنشاء مجلس اقتصادي أعلى'
  article_text_ar: يتم إنشاء مجلس يسمى (المجلس الاقتصادي الأعلى) يعنى بالأعمال والمهام اللازمة لأداء مجلس الوزراء لمسؤولياته وممارسته لاختصاصه فيما يتعلق بالشؤون والقضايا الاقتصادية واتخاذه القرارات نحوها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة الثالثة : تكوين  هيئة استشارية للشؤون الاقتصادية'
  article_text_ar: يتم تكوين هيئة استشارية للشؤون الاقتصادية ترتبط برئيس المجلس الاقتصادي الأعلى وتقوم بدراسة ما يوجهه إليها رئيسه من أعمال، وتضم الهيئة عشرة من الخبراء ذوي الكفاءة والتأهيل في مجال الاقتصاد وما يتصل به مباشرة من غير مسئولي الحكومة يتم اختيارهم بأمر ملكي، وللهيئة أن تقدم لرئيس المجلس مقترحاتها وآرائها في أي موضوع يتصل بالاقتصاد الوطني .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة الرابعة : رئاسة المجلس وعضويته'
  article_text_ar: يرأس المجلس الاقتصادي الأعلى ولي العهد نائب رئيس مجلس الوزراء ورئيس الحرس الوطني، ويكون صاحب السمو الملكي النائب الثاني لرئيس مجلس الوزراء وزير الدفاع والطيران والمفتش العام نائبًا للرئيس، ويضم المجلس في عضويته رئيس اللجنة العامة لمجلس الوزراء واثنين من وزراء الدولة أعضاء مجلس الوزراء، ووزراء المالية والاقتصاد الوطني، والتخطيط، والتجارة، والعمل والشؤون الاجتماعية، والبترول والثروة المعدنية، ومحافظ مؤسسة النقد العربي السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة الخامسة : اختصاصات المجلس'
  article_text_ar: 'مع مراعاة ما تقضي به الأنظمة، يختص المجلس الاقتصادي الأعلى- دون حصر- بما يلي : 1 - بلورة السياسة الاقتصادية وصياغة البدائل الملائمة. 2 - التنسيق بين الجهات الحكومية التي تتصل أعمالها مباشرة بالاقتصاد الوطني لتحقيق الترابط والتكامل بين أعمالها، واتخاذ كافة الإجراءات اللازمة لذلك. 3 - متابعة تنفيذ السياسة الاقتصادية وما تقضي به قرارات مجلس الوزراء في الشؤون والقضايا الاقتصادية، واتخاذ كافة الإجراءات اللازمة لذلك، ورفع تقرير دوري بذلك إلى مجلس الوزراء.4- دراسة ما يلي : أ - الإطار العام لخطة التنمية الذي تعده وزارة التخطيط، ومشروع الخطة، وتقارير متابعتها، والتقرير الاقتصادي. ب - السياسة المالية وأسس إعداد مشروع الميزانية وأولويات أوجه الإنفاق التي تبلورها وزارة المالية والاقتصاد الوطني وتعد ميزانية الدولة في ضوئها. ج - مشروع ميزانية الدولة وميزانيات الأجهزة ذوات الشخصية المعنوية العامة التي تعدها وزارة المالية والاقتصاد الوطني. د - السياسات التجارية على الصعيدين المحلي والدولي، والقواعد التي تنظم سوق العمل وأسواق المال وتحمي مصالح المستهلك، وتلك التي تهيئ المناخ الملائم للمنافسة
    والاستثمار، والسياسات الصناعية والزراعية التي تعدها الجهات المعنية.هـ - ما ترفعه اللجان والجهات الحكومية لمجلس الوزراء من تقارير وغيرها فيما يتعلق بالشؤون والقضايا الاقتصادية بما في ذلك ما يتصل بمستويات الأسعار السائدة، والرسوم والضرائب والتعرفات بأنواعها، وإيرادات الدولة واستثماراتها وإنفاقها ومصروفاتها، ووضع الدين العام للدولة والقروض والامتيازات، وما ترفعه اللجنة الوزارية للتخصيص، ولجنة التوازن الاقتصادي، واللجنة الوزارية المشكلة بالأمر السامي رقم 154 /8 وتاريخ 27 /1 /1404هـ، وأعمال اللجان المشتركة في المجال الاقتصادي، والحساب الختامي للدولة، والحسابات الختامية للأجهزة ذوات الشخصية المعنوية العامة.و - مشروعات الأنظمة واللوائح المتعلقة بالشؤون والقضايا الاقتصادية ومشروعات الاتفاقيات الاقتصادية والتجارية، والأنظمة التي تحمي البيئة، وذلك بالتعاون مع الجهات المختصة.ز - ما يحال إليه من مجلس الوزراء أو المقام السامي الكريم . 5 - اتخاذ ما يلزم لإعداد الدراسات والتقارير والبحوث حول الموضوعات ذات الصلة بالاقتصاد وذلك بتكليف الجهات الحكومية ذات العلاقة أو التعاقد مع بيوت الخبرة أو الاستعانة
    بمن يراه من الخبراء. ويستمع المجلس الاقتصادي الأعلى لما يقدمه محافظ مؤسسة النقد العربي السعودي من معلومات وتقارير وسياسات نقدية.6 - إعداد تقرير دوري عن الاقتصاد الوطني بناء على ما تعده الجهات المختصة.7 - ممارسة الاختصاصات التي تسند إليه نظامًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة السادسة : انعقاد المجلس'
  article_text_ar: ينعقد المجلس الاقتصادي الأعلى بحضور أغلبية أعضائه بمن فيهم الرئيس أو نائبه، ويصدر ما يتوصل إليه بالأغلبية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة السابعة : اللجنة الدائمة للمجلس'
  article_text_ar: يتم تكوين لجنة دائمة للمجلس الاقتصادي الأعلى من بين أعضائه يتم اختيارهم بموجب أمر ملكي وتحدد قواعد وإجراءات عمل اللجنة الدائمة بأمر ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة الثامنة : الأمانة العامة للمجلس'
  article_text_ar: يتم إنشاء أمانة عامة مقرها الأمانة العامة لمجلس الوزراء، يرأسها أمين عام بمرتبة لا تقل عن الخامسة عشرة، توفر لها كافة التجهيزات اللازمة، وتزود بعدد من الخبراء والمختصين في مجال الاقتصاد والمال والتخطيط والتجارة الدولية والإدارة والأنظمة، لا يقل عددهم عن خمسة وعشرين موظفًا مع مراعاة ترشيد الجهاز الإداري ما أمكن، وتحصل الأمانة على المعلومات ذات الصلة بالشؤون والقضايا الاقتصادية. وتزاول الأمانة العامة للمجلس أعمالها مراعية في ذلك اختصاصات الجهات ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة التاسعة : النواحى المالية للمجلس'
  article_text_ar: ترصد المبالغ المالية اللازمة لأداء المجلس الاقتصادي الأعلى والهيئة الاستشارية لمسئولياتهما وممارستهما لاختصاصاتهما ضمن ميزانية الأمانة العامة لمجلس الوزراء بحيث تحدد المبالغ المخصصة لكل منهما في كل البنود بما في ذلك بند للصرف على الدراسات والبحوث ومكافأة من يستعان به من الخبراء، وتقوم الأمانة العامة لمجلس الوزراء بتنفيذ الصرف من هذه المبالغ وفقًا لقرارات المجلس الاقتصادي الأعلى ورئيسه وأمينه العام في حدود النظام. وتبين اللوائح الداخلية للمجلس الاقتصادي الأعلى والهيئة الاستشارية الأحكام المتعلقة بعقد الاجتماعات والجهاز الإداري والصلاحيات المالية والإدارية اللازمة لتسيير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
- article_ref: 'المادة العاشرة: أحكام عامة'
  article_text_ar: 1- يؤلف المجلس الاقتصادي الأعلى لجنة تحضيرية، ويحدد قواعد وإجراءات عملها. 2 - للمجلس الاقتصادي الأعلى أن يؤلف لجانًا من بين أعضائه أو من غيرهم لبحث مسألة يراها وتقديم تقرير خاص عنها.3 - لكل عضو من أعضاء المجلس الاقتصادي الأعلى أن يقترح ما يرى مصلحة من بحثه في المجلس. 4 - للمجلس الاقتصادي الأعلى أن يدعو من يراه من الوزراء أو المسئولين في الدولة أو من ذوي الخبرة خارجها لسماع ما لديهم من معلومات. 5 - تعد هيئة الخبراء بمجلس الوزراء بالتعاون مع معهد الإدارة العامة اللوائح الداخلية للمجلس الاقتصادي الأعلى والهيئة الاستشارية، والهيكل التنظيمي والإداري، وتصدر بقرار من المجلس الاقتصادي الأعلى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/02dbc4d4-4763-41f9-9039-a9a700f1c0c1/1
  verified: false
