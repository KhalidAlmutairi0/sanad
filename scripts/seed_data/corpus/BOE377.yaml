regulation:
  code: BOE377
  name_ar: تنظيم الهيئة السعودية للملكية الفكرية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردة في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق خلاف ذلك: الهيئة: الهيئة السعودية للملكية الفكرية. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. الرئيس التنفيذي: الرئيس التنفيذي للهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1- تتمتع الهيئة بالشخصية الاعتبارية العامة وبالاستقلال المالي والإداري، وترتبط تنظيميًّا بوزير التجارة والاستثمار. 2- يكون مقر الهيئة الرئيس في مدينة الرياض، ولها أن تنشئ فروعاً ومكاتب داخل المملكة, ومكاتب خارجها بالتنسيق مع وزارة الخارجية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى تنظيم مجالات الملكية الفكرية في المملكة ودعمها وتنميتها ورعايتها وحمايتها وإنفاذها والارتقاء بها وفقاً لأفضل الممارسات العالمية، ولها في سبيل تحقيق أهدافها المهمات والاختصاصات الآتية: 1- إعداد الإستراتيجية الوطنية للملكية الفكرية, ومتابعة تنفيذها بعد اعتمادها، ووضع خطط عمل وبرامج زمنية لها بالتنسيق والتعاون مع الجهات ذات العلاقة. 2- اقتراح الأنظمة واللوائح المتعلقة بحقوق الملكية الفكرية. 3- تسجيل حقوق الملكية الفكرية، ومنحها وثائق الحماية وإنفاذها. 4- توفير المعلومات المتعلقة بحقوق الملكية الفكرية، وإتاحتها للجمهور. 5- التوعية بأهمية الملكية الفكرية وحماية حقوقها. 6- تمثيل المملكة في المنظمات الدولية والإقليمية ذات العلاقة بحقوق الملكية الفكرية، والدفاع عن مصالحها. 7- إبداء الرأي في شأن الاتفاقيات الدولية المتعلقة بحقوق الملكية الفكرية. 8- متابعة تنفيذ الالتزامات المترتبة على انضمام المملكة إلى الاتفاقيات الدولية المتعلقة بالملكية الفكرية. 9- تعزيز الاستفادة من الملكية الفكرية؛ لبناء اقتصاد متقدم قائم على المعرفة. 10- إنشاء قواعد للمعلومات في مجال عمل
    الهيئة, وتبادل المعلومات مع الجهات المحلية والإقليمية والعالمية. 11- الترخيص للأنشطة ذات العلاقة بمجال عمل الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يشكل للهيئة مجلس إدارة على النحو الآتي: 1- وزير التجارة والاستثمار رئيسًا 2- الرئيس التنفيذي عضوًا 3- ممثل من وزارة المالية عضوًا 4- ممثل من وزارة التجارة والاستثمار عضوًا 5- ممثل من وزارة الثقافة والإعلام عضوًا 6- ممثل من وزارة الاقتصاد والتخطيط عضوًا 7- ممثل من وزارة التعليم عضوًا 8- ممثل من وزارة الخارجية عضوًا 9- ممثل من وزارة الاتصالات وتقنية المعلومات عضوًا 10- ممثل من الهيئة العامة للجمارك عضوًا 11- ممثل من الهيئة العامة للغذاء والدواء عضوًا 12- ممثل من مدينة الملك عبدالعزيز للعلوم والتقنية عضوًا 13- ثلاثة من المهتمين بموضوع الملكية الفكرية من الجهات غير الحكومية, يعينون بقرار من مجلس الوزراء بناء على اقتراح من رئيس المجلس أعضاء ويجب ألاَّ تقل مراتب ممثلي الأجهزة الحكومية عن (الرابعة عشرة) أو ما يعادلها، وتكون مدة عضويتهم في المجلس ثلاث سنوات قابلة للتجديد مرة واحدة, وتحدد مكافآتهم بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتولى المجلس الإشراف على شؤون الهيئة وإدارتها وتصريف أمورها ووضع السياسة العامة التي تسير عليها، وله بصفة خاصة الصلاحيات والاختصاصات الآتية: 1- الإشراف على تنفيذ الهيئة المهمات المنوطة بها. 2- إقرار السياسات والخطط التي تحقق أهداف الهيئة. 3- إصدار اللوائح الإدارية والمالية التي تسير عليها الهيئة -بالتنسيق مع وزارة المالية ووزارة الخدمة المدنية- وغيرها من اللوائح الداخلية. 4- اعتماد الهيكل التنظيمي للهيئة. 5- الموافقة على إنشاء فروع ومكاتب للهيئة داخل المملكة, ومكاتب خارجها. 6- تحديد المقابل المالي للخدمات التي تقدمها الهيئة. 7- إقرار قواعد عمل اللجان وإجراءاتها، وتحديد مكافآت أعضائها. 8- تعيين مراجع حسابات خارجي ومراقب مالي داخلي. 9- الموافقة على مشروع ميزانية الهيئة وحسابها الختامي وتقرير مراجع الحسابات ؛ تمهيداً لاعتمادها وفق الإجراءات النظامية المتبعة. 10- اعتماد التقرير السنوي لنشاطات الهيئة. 11- قبول الهبات والإعانات والمنح والوصايا والأوقاف وفقاً للأنظمة المتبعة. 12- الموافقة على استثمار أموال الهيئة بما يحقق أهدافها وفقاً للأحكام المنظمة لذلك. 13- الموافقة على
    إبرام العقود، وتفويض الرئيس التنفيذي بالتوقيع عليها. 14- النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة ومركزها المالي. وللمجلس تفويض رئيسه أو من يراه من أعضاء المجلس أو من منسوبي الهيئة ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- يجتمع المجلس مرة واحدة كل (شهرين), أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس, أو إذا طلب ذلك ثلث أعضائه على الأقل. ولرئيس المجلس أن ينيب من يراه من ممثلي الجهات الحكومية الأعضاء في المجلس لرئاسة الاجتماعات في حال غيابه. وتوجه الدعوة إلى الاجتماع من رئيس المجلس -كتابةً- قبل موعد الاجتماع بسبعة أيام على الأقل, على أن تتضمن الدعوة جدول الأعمال, ويشترط لصحة الاجتماع حضور أغلبية الأعضاء, بمن فيهم رئيس المجلس أو من ينيبه. وتصدر القرارات بأغلبية أصوات الحاضرين, وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. 2- يجوز -عند الحاجة وفي الحالات المستعجلة ووفقاً لما يقدره رئيس المجلس- أن تعقد الاجتماعات وأن يصوت على القرارات عن بعد من خلال استخدام وسائل التقنية ويمكن أن تتخذ القرارات بطريق التمرير على الأعضاء ويوقع عليها بما يفيد اطلاع جميع الأعضاء عليها, ولا تعد القرارات الصادرة بهذه الطريقة صحيحة ما لم تمرر على جميع أعضاء المجلس ويصوّت عليها جميع الأعضاء وتحصل على أغلبية أصواتهم على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للمجلس أن يشكل لجاناً دائمة أو مؤقتة من بين أعضائه أو من غيرهم، ويعهد إليها بما يراه من مهمات، ويُحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ولها الاستعانة بمن تراه لتأدية المهمات المكلفة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يعين بقرار من المجلس, ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون الهيئة، ويتولى الاختصاصات والمهمات الآتية: 1- الإشراف على سير العمل في الهيئة من خلال اللوائح والخطط والبرامج المعتمدة. 2- اقتراح السياسات العامة للهيئة، المتعلقة بأنشطتها، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس. 3- اقتراح هيكل الهيئة التنظيمي، ورفعه إلى المجلس. 4- اقتراح الخطط والبرامج لدعم حقوق الملكية الفكرية. 5- إعداد مشروع ميزانية الهيئة السنوية ومشروع حسابها الختامي وتقرير مراجع الحسابات ورفعها إلى المجلس. 6- اقتراح قواعد عمل اللجان وإجراءاتها وتحديد مكافآت أعضائها. 7- تمثيل الهيئة لدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة داخل المملكة وخارجها. 8- اقتراح اللوائح اللازمة لتسيير العمل في الهيئة، واعتماد إجراءات العمل المبنية على اللوائح والقرارات التي يصدرها المجلس. 9- الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المقرة والصلاحيات التي فوضه فيها المجلس. 10- إعداد التقارير الخاصة بتنفيذ
    خطط الهيئة وبرامجها, ودراستها، وعرضها على المجلس. 11- التوقيع على العقود بما فيها تنفيذ الأعمال والخدمات وغيرها, وفقاً للأنظمة والصلاحيات المخولة له. 12- إعداد التقرير السنوي عن نشاط الهيئة والعقبات التي واجهتها واقتراح الحلول المناسبة لها، وتقديمه إلى المجلس؛ للنظر في اعتماده ورفعه إلى الجهات المختصة. 13- تنظيم مشاركة الهيئة في المؤتمرات والفعاليات والمهرجانات الإقليمية والدولية . 14- تنظيم المؤتمرات والندوات واللقاءات العلمية والبرامج التدريبية المتعلقة بمجال عمل الهيئة، وفق الإجراءات المتبعة. 15- إصدار القرارات اللازمة لتنفيذ أحكام التنظيم ولائحته التنفيذية والقواعد والإجراءات المعتمدة، بحسب الصلاحيات المخولة له . 16- تعيين العاملين في الهيئة طبقاً للوائح، والإشراف عليهم. 17- التعاقد مع الخبراء والمستشارين وفقاً لما تحدده اللوائح. 18- إقرار الخطط والبرامج اللازمة لتدريب منسوبي الهيئة وابتعاثهم وإيفادهم في جميع مجالات عملها، ومتابعة تنفيذها. 19- مباشرة ما تخوّله إياه قرارات المجلس واللوائح الخاصة بالهيئة من اختصاصات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: '1- تتكون موارد الهيئة مما يأتي: أ- ما يخصص لها في الميزانية العامة للدولة. ب- ما تحصله من إيرادات من ممارسة مهماتها وما تقدمه من خدمات. ج- ما يقبله المجلس من هبات وإعانات ومنح ووصايا وأوقاف. د- أي مورد آخر يقره المجلس. 2- تودع أموال الهيئة لدى مؤسسة النقد العربي السعودي، ولها - بموافقة وزارة المالية- فتح حسابات في البنوك المرخص لها بالعمل في المملكة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 1- تكون للهيئة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. 2- السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء -خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية- تقريراً سنويًّا عمَّا حققته من إنجازات مقارنة بما ورد في الخطة العامة للتنمية خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات الهيئة وعملياتها، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6cf17f84-7a45-4ff1-a61a-a9f600fd90bd/1
  verified: false
