regulation:
  code: BOE010
  name_ar: نظام مكتبة الملك عبد العزيز العامة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تنشأ مؤسسة خيرية تسمى (مكتبة الملك عبد العزيز العامة) وتكون لها شخصية اعتبارية مستقلة ومقرها الرئيسي مدينة الرياض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجوز أن تنشأ فروع للمكتبة بأي مدينة في المملكة، كما يجوز أن تنشأ فروع تتولى تقديم خدماتها للنساء أو أي فئة أخرى وفقًا للدراسات التي تحدد الحاجة وفي حدود الإمكانات المتاحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تتكون المكتبة على النحو التالي : 1 - قسم للمراجع والكتب والمخطوطات والدوريات والصحف والمجلات والوثائق والخرائط وغير ذلك من المطبوعات والإصدارات ووسائل التعبير والصور، بالإضافة إلى الأفلام والشرائح ووسائل عرضها السمعية والبصرية والمشتركة وبصفة عامة أوعية العلوم والمعارف والثقافة التي تصدر بالداخل والخارج. 2 - قاعة متخصصة بتاريخ الملك عبد العزيز يرحمه الله تختص بتجميع وتقديم المعلومات المتعددة وبكافة اللغات لكل ما يتصل بالمغفور له الملك عبد العزيز طيب الله ثراه. 3 - قسم يختص بتنظيم الندوات والمحاضرات وإصدار الكتب والبحوث وإعداد برامج خدمة المجتمع. 4 - مركز متخصص في دراسات الفروسية. 5 - وحدة للتسجيل والتصوير والتوثيق والتدريب ووسائل ممارسة الأنشطة. 6 - مركز للمعلومات المحلية والدولية وما يحتويه من وسائل الحفظ والاسترجاع والاتصال، والذي يهتم بتوفير الخدمات المطبوعة والمقروءة والمسموعة عن طريق الاتصال الداخلي والخارجي والتعاون مع المراكز والجامعات في المملكة وخارجها بتبادل المعلومات والاتصال بالباحثين وتبادل المقتنيات أو صورها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تهدف المكتبة إلى تحقيق ما يلي : 1 - توفير الخدمات المكتبية الممكنة للراغبين فيها.2 - نشر ودعم المعرفة والثقافة والعلوم خاصة الإسلامية والعربية منها.3 - دعم حركة التأليف والبحث والترجمة.4 - الاهتمام بالتراث الإسلامي والعربي وإحيائه، خاصة تاريخ الملك عبد العزيز وتاريخ المملكة العربية السعودية عامة.5 - الإسهام في خدمة المجتمع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'للمكتبة في سبيل تحقيق أهدافها استخدام الوسائل الآتية : 1 - إصدار الكتب والبحوث والنشرات المتنوعة.2 - توثيق الصلات بينها وبين المؤسسات المماثلة ومراكز البحث العلمي في الداخل والخارج.3 - تنظيم وعقد الندوات والحلقات الثقافية والمحاضرات والبرامج الدراسية في الداخل والخارج.4 - إقامة المعارض والمهرجانات والمشاركة فيها داخليًّا وخارجيًّا، وتنظيم العروض السينمائية والمسرحية.5 - التعاقد على إعداد بعض البحوث ونشرها.6 - إعداد برامج خدمة المجتمع وتنفيذها.7 - إصدار بعض المطبوعات والنماذج التي تستخدم في الخدمات المكتبية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: الرئيس الأعلى للمكتبة هو حضرة صاحب السمو الملكي الأمير عبد الله بن عبد العزيز آل سعود.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يكون للمكتبة مجلس إدارة يُعيَّن رئيسه ومن ينوب عنه وأعضاؤه من قبل الرئيس الأعلى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجتمع مجلس الإدارة بصفة دورية مرة كل ستة أشهر على الأقل ولرئيس المجلس أو نائبه أن يدعو المجلس إلى اجتماعات غير عادية كلما دعت الحاجة إلى ذلك، ويكون الاجتماع نظاميًّا بحضور أغلبية أعضائه وتصدر قرارات المجلس بأغلبية أصوات الحاضرين وعند التساوي يرجح الجانب الذي فيه الرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى مجلس الإدارة تصريف شؤون المكتبة الإدارية والمالية والفنية والإشراف عليها، وله على الأخص : 1 - وضع السياسة العامة والإدارية والتنظيمية. 2 - إصدار اللوائح المالية والإدارية والتنظيمية. 3 - بحث سبل تطوير المكتبة بما يكفل أداءها لمهامها وأهدافها. 4 - اعتماد الخطط والبرامج المقترحة لتطوير المكتبة. 5 - اعتماد مشروع الميزانية الذي يعده مدير المكتبة. 6 - اعتماد محاضر الجرد الدوري والنظر في إسقاط ما يظهر فيها من عجز يتجاوز النسبة المقررة لمدير المكتبة بموجب اللوائح. 7 - الموافقة على استبعاد بعض النسخ المكررة من عهدة المكتبة وكذلك المطبوعات التالفة والوسائل التي فقدت قيمتها العلمية والعملية وتقرير الطريقة التي يتم بها التخلص من هذه العهد. 8 - التكليف بإجراء البحوث والدراسات اللازمة والمهيئة لدعم كفاءة المكتبة. 9 - الموافقة على تكوين اللجان وتحديد اختصاصاتها، بناء على اقتراح مدير المكتبة. 10 - الموافقة على حضور المؤتمرات والندوات والمعارض وما في حكمها في داخل المملكة وخارجها. 11 - النظر في كل ما يحيله إليه مدير المكتبة من المسائل التي تتعلق بأعمال وأنشطة المكتبة. 12 - تعيين
    مدير المكتبة ومساعديه والموافقة على تعيين الموظفين بناء على عرض من مدير المكتبة. 13 - إقرار لوائح ونظم العمل الداخلية. 14 - لمجلس الإدارة أن يفوض مدير المكتبة أو أحد أعضاء المجلس في بعض اختصاصاته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يشترط أن يكون مدير المكتبة من حملة الدرجات العلمية فوق الجامعية وأن يكون مساعدوه من بين حملة الدرجات الجامعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يمثل المكتبة في كافة المجالات وأمام جميع الجهات في الداخل والخارج مديرها ويحل مساعدوه محله أثناء غيابه كلٌّ في مجال اختصاصه كما يؤدون ما يكلفهم به من أعمال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'يقوم مدير المكتبة بتصريف شئونها والارتقاء بخدماتها وزيادة فاعليتها وكفاءتها ويختص بصفة أساسية بما يلي : 1 - تنفيذ قرارات وتوصيات وتوجيهات مجلس إدارة المكتبة.2 - اقتراح اللوائح والخطط التي تساعد في تحقيق أهداف المكتبة.3 - إعداد مشروع ميزانية المكتبة وحسابها الختامي وعرضها على مجلس الإدارة.4 - الصرف وفقًا للوائح المالية للمكتبة.5 - الإشراف على سير العمل في المكتبة وتنفيذ لوائح المكتبة.6 - تقديم الاقتراحات الكفيلة بحسن سير العمل.7 - الدعوة لحضور جلسات مجلس الإدارة العادية وغير العادية.8 - اقتراح الاستعانة بالخبراء وأصحاب الكفاءات العلمية والمتخصصين.9 - ترشيح العناصر البشرية التي تحتاجها المكتبة.10 - الاتصال بمراكز البحوث والدراسات والجامعات والمنظمات الدولية والإسلامية والعربية المعنية بالبحوث والدراسات من أجل التعاون وتبادل الخبرات في مختلف أوجه النشاط.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تبدأ السنة المالية للمكتبة من أول السنة المالية للدولة واستثناء من ذلك فإن السنة المالية الأولى تبدأ من تاريخ نفاذ هذا النظام وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يعد مشروع الميزانية في الشهر الأخير من السنة المالية عن السنة الجديدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تتم كل الارتباطات وتصرف النفقات في حدود الميزانية التي يقرها مجلس الإدارة ويوافق عليها الرئيس الأعلى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تمسك حسابات منظمة للمكتبة ترصد فيها إيراداتها ومصروفاتها ويعين الرئيس الأعلى للمكتبة مراقبًا للحسابات يعهد إليه في نهاية كل سنة مالية بوضع تقرير عن الوضع المالي للمكتبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تتكون موارد المكتبة المالية من المخصصات التي يقدمها صاحب السمو الملكي الأمير عبد الله بن عبد العزيز آل سعود، وما يتقرر قبوله من المنح والإعانات العامة والخاصة والهبات والوصايا التي توجه للمكتبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يفتح حساب أو أكثر باسم المكتبة في واحد أو أكثر من البنوك المعتمدة ويتم السحب من هذا الحساب بموجب توقيعين لمدير المكتبة وأمين صندوقها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يعمد البنك بتحويل المبالغ المطلوب سدادها خارج الرياض، ويوقع على هذا التعميد أصحاب الصلاحيات في الإذن بالسحب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يجوز صرف سلفة مستديمة لمدير المكتبة لا تتجاوز ثلاثين ألف ريال لتغطية النفقات العاجلة أو الطارئة، ويجري تعويض ما يتم صرفه منها طبقًا لإجراءات الصرف الأخرى ويودع الرصيد الباقي من السلفة في نهاية السنة المالية في حساب المكتبة لدى البنك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يتم اعتماد هذا النظام وتعديله بأمر ملكي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يصبح هذا النظام نافذًا من تاريخ اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fe1771f7-158f-4570-9bb1-a9a700f16dec/1
  verified: false
