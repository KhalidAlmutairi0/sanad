regulation:
  code: BOE289
  name_ar: لائحة حقوق وواجبات من يستعان بهم في أعمال الدفاع المدني وعلاقتهم بجهاتهم
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لغرض تطبيق أحكام هذه اللائحة، يكون للكلمات والمصطلحات الآتية المعاني الموضحة أمام كل منها: اللائحة: لائحة حقوق وواجبات من يستعان بهم في أعمال الدفاع المدني وعلاقتهم بجهاتهم. النظام: نظام الدفاع المدني. الوزير: وزير الداخلية. الأمانة: الأمانة العامة لمجلس المخاطر الوطنية. أعمال الدفاع المدني: مجموعة الأعمال والإجراءات اللازمة لحماية الأرواح والممتلكات العامة والخاصة؛ من أخطار الحرائق والكوارث والحروب والحوادث المختلفة، وإغاثة المنكوبين، وتأمين سلامة المواصلات والاتصالات وسير العمل في المرافق العامة، وحماية مصادر الثروة الوطنية، وذلك في زمن السلم وفي حالات الحرب والطوارئ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنظم اللائحة حقوق وواجبات من تقتضي المصلحة العامة الاستعانة بهم من منسوبي الجهات الحكومية (من غير منسوبي المديرية العامة للدفاع المدني)؛ للقيام بعمل من أعمال الدفاع المدني، وتحدد الإجراءات المنظمة لذلك وفقًا لأحكام النظام. استثناء من حكم الفقرة (1) من هذه المادة، يجوز بقرار من (الوزير)، أو من يفوضه في حالات الطوارئ ولطبيعة تخصص معين؛ استدعاء شخص (أو أكثر) من منسوبي جهة أهلية للقيام بعمل من أعمال الدفاع المدني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يجوز لأي من الجهات الحكومية الاستعانة بمن تقتضي المصلحة استدعاءه لأعمال الدفاع المدني، وذلك بتقديم طلب إلى الوزير، توضح فيه احتياجها والمؤهلات المطلوبة في المرشح المراد استدعاؤه، وجهة عمله، وذلك وفقاً لأحكام اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يصدر الوزير -أو من يفوضه- قرار الاستدعاء، ويحدد فيه اسم المستدعى والجهة التي يعمل فيها ومدة الاستدعاء. يجوز في حالات الطوارئ أن يكون الاستدعاء بإحدى وسائل الاتصال السريعة. يكون الاستدعاء الجماعي عن طريق وسائل الإعلام في الحالات التي يحددها الوزير. للوزير -أو من يفوضه- إصدار قرار إلغاء الاستدعاء أو إنهائه في حال طلبت الجهة المعنية ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تتولى الأمانـة ما يأتي: دراسة طلبات الجهات الحكومية للاستعانة وفقاً للمادة (الثالثة) من اللائحة، ومخاطبة الجهة المعنية لترشيح الأشخاص، والرفع عنها إلى الوزير لاعتمادها. إثبات قرار الاستدعاء كتابة في الحالات المنصوص عليها في الفقرتين (2، 3) من المادة (الرابعة) من اللائحة. تبليغ قرار الاستدعاء وقرار إنهائه أو إلغائه إلى الجهات المعنية به مع تزويد المستدعى بصورة منه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: مدة الاستدعاء لا تزيد على (ثلاثين) يوماً في السنة الواحدة؛ ويجوز في حالات الضرورة تمديدها إلى أكثر من (ثلاثين) يوماً، وذلك بقرار من الوزير أو من يفوضه، بناءً على طلب تقدمه جهة الاستدعاء. وفي جميع الأحوال يجب ألا تزيد المدة على (ستين) يوماً للمستدعى في السنة الواحدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يلتزم المستدعى بما يأتي: تلبية قرار الاستدعاء، ومباشرة المهمة في أقرب وقت، إلا إذا تعذر ذلك لعذر مشروع تقبله جهة الاستدعاء، على أن تبلغ الأمانة بهذا العذر. أداء المهمات المكلف بها، والتقيد بالأوامر والتعليمات الصادرة إليه في شأنها، ما دامت تدخل ضمن الأعمال المعتادة بحكم طبيعة تخصصه الذي استدعي من أجله. عدم إفشاء الأسرار التي يطَّلع عليها نتيجة لأعمال الاستدعاء. المحافظة على العُهد المسلمة إليه واستخدامها في الغرض الذي حدَّدت له وإعادة غير المستهلك منها عند انتهاء مدة الاستدعاء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: على جهة عمل المستدعى اتخاذ ما يلزم لتمكينه من تنفيذ قرار الاستدعاء. لا يجوز لأي شخص العمل على تعطيل قرار الاستدعاء أو عدم تنفيذه؛ إلا بعذر مشروع تقبله جهة الاستدعاء، على أن تبلغ الأمانة بهذا العذر. تتولى جهة الاستدعاء إثبات حـضور المستـدعى، والإفادة بمدى تنفيـذه للعمل المستدعى من أجله، وإشعار الأمانة بذلك كتابيًّا. تلتزم جهة الاستدعاء بتوفير جميع التجهيزات والمستلزمات المطلوبة لتنفيـذ مهمة الاستدعاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تتحمل جهة عمل المستدعى رواتبه وبدلاته وتعويضاته والمزايا الأخرى التي يحصل عليها عادة، وذلك طوال مدة الاستدعاء. تتحمل جهة الاستدعاء رواتب المستدعى من منسوبي الجهة الأهلية وبدلاته وتعويضاته والمزايا الأخرى التي يحصل عليها عادة، وذلك طوال مدة الاستدعاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يعامل المستدعى من منسوبي الجهات الحكومية والأهلية كما لو كان على رأس العمل، من حيث العلاج والإجازات المرضية والتعويض في حالة الوفاة أو الإصابة نتيجة لأعمال الاستدعاء، على أن تحتسب مدة الاستدعاء خدمة فعلية للمستدعى لدى جهة عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يصدر الوزير القرارات اللازمة لتنفيذ اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تنشر هذه اللائحة في الجريدة الرسمية، ويعمل بها بعد (ستين) يوماً من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/90f66860-d28b-40ed-b49d-ac3700baf50e/1
  verified: false
