regulation:
  code: BOE313
  name_ar: لائحة أعضاء هيئة التحقيق والادعاء العام والعاملين فيها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يُشترط فيمن يعين عضواً في الهيئة ما يأتي: 1 - أن يكون سعودي الجنسية.2 - أن يكون حسن السيرة والسلوك.3 - أن يكون متمتعاً بالأهلية اللازمة.4 - أن يكون حاصلاً على شهادة إحدى كليات الشريعة، أو شهادة أخرى معادلة لها، أو أن يكون حاصلاً على تخصص الأنظمة من إحدى جامعات المملكة، أو شهادة أخرى معادلة لها، ويشترط في حالة المعادلة أن ينجح في امتحان خاص يعقد لهذا الغرض.5 - ألا تقل سنه عن اثنتين وعشرين سنة.6 - أن يكون لائقاً صحيًّا.7 - ألا يكون قد حكم عليه بحد، أو تعزير، أو في جرم مخل بالشرف، أو الأمانة، أو صدر في حقه قرار تأديبي بالفصل من وظيفة عامة، ولو كان قد رد إليه اعتباره.8 - أن يجتاز بنجاح الاختبار الذي يعقد لأجل التعيين.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يخضع أعضاء الهيئة لبرنامج تدريبي مكثف لا تقل مدته عن ستة أشهر، وتُعد هذه المدة معادلة للاشتغال بأعمال نظيرة مدتها سنة، ويحدد مجلس الهيئة قواعد تنفيذ هذا البرنامج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يُشترط فيمن يشغل مرتبة ملازم تحقيق - بالإضافة إلى ما ورد في المادة (الأولى) من هذه اللائحة - أن يكون قد حصل على الشهادة الجامعية بتقدير عامّ لا يقل عن جيد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يُشترط فيمن يشغل مرتبة محقق (ج) أن يكون قد أمضى في مرتبة ملازم تحقيق ثلاث سنوات على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يُشترط فيمن يشغل مرتبة محقق (ب) أن يكون قد أمضى سنة على الأقل في مرتبة محقق (ج)، أو أن يكون قد اشتغل بأعمال نظيرة لمدة أربع سنوات على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يُشترط فيمن يشغل مرتبة محقق (أ) أن يكون قد أمضى أربع سنوات على الأقل في مرتبة محقق (ب)، أو أن يكون قد اشتغل بأعمال نظيرة لمدة ثماني سنوات على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يُشترط فيمن يشغل مرتبة وكيل رئيس دائرة تحقيق وادعاء (ب) أن يكون قد أمضى ثلاث سنوات على الأقل في مرتبة محقق (أ)، أو أن يكون قد اشتغل بأعمال نظيرة لمدة إحدى عشرة سنة على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يُشترط فيمن يشغل مرتبة وكيل رئيس دائرة تحقيق وادعاء (أ) أن يكون قد أمضى سنتين على الأقل في مرتبة وكيل رئيس دائرة تحقيق وادعاء (ب)، أو أن يكون قد اشتغل بأعمال نظيرة لمدة ثلاث عشرة سنة على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يُشترط فيمن يشغل مرتبة رئيس دائرة تحقيق وادعاء (ب) أن يكون قد أمضى سنتين على الأقل في مرتبة وكيل رئيس دائرة تحقيق وادعاء (أ)، أو أن يكون قد اشتغل بأعمال نظيرة لمدة خمس عشرة سنة على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يُشترط فيمن يشغل مرتبة رئيس دائرة تحقيق وادعاء (أ) أن يكون قد أمضى سنتين على الأقل في مرتبة رئيس دائرة تحقيق وادعاء (ب)، أو أن يكون قد اشتغل بأعمال نظيرة لمدة سبع عشرة سنة على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يُشترط فيمن يشغل مرتبة مدعي استئناف أن يكون قد أمضى سنتين على الأقل في مرتبة رئيس دائرة تحقيق وادعاء (أ)، أو أن يكون قد اشتغل بأعمال نظيرة لمدة تسع عشرة سنة على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يُشترط فيمن يشغل مرتبة رئيس دوائر تحقيق وادعاء أن يكون قد أمضى سنتين على الأقل في مرتبة مدعي استئناف، أو اشتغل بأعمال نظيرة لمدة إحدى وعشرين سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يحدد مجلس الهيئة المقصود بالأعمال النظيرة في المواد السابقة، ويُعد الاشتغال بأعمال القضاء، أو تدريس مواد الشريعة أو الأنظمة في إحدى الكليات؛ اشتغالاً بأعمال نظيرة، وتُعد كل من:أ - شهادة الماجستير في مجال العمل ودبلوم الدراسات القانونية بمعهد الإدارة العامة معادلة للاشتغال بأعمال نظيرة مدة أربع سنوات.ب - شهادة الدكتوراه في مجال العمل معادلة للاشتغال بأعمال نظيرة مدة ست سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- تكون مدة التجربة لملازم التحقيق سنتين من تاريخ مباشرته العمل بعد صدور قرار من مجلس الهيئة بتعيينه على هذه الوظيفة، فإن رئي خلال هذه المدة عدم مناسبته للقيام بأعمال الهيئة يصدر مجلس الهيئة قراراً بالاستغناء عنه.2 - مع مراعاة ما ورد في الفقرة (1) من هذه المادة، يكون من يعين من أعضاء الهيئة ابتداءً تحت التجربة لمدة عام ولو كان له سابق خدمة، وإذا لم تثبت مناسبته خلال هذه المدة تنتهي خدمته بأمر ملكي.3 - يمنح من يعين لأول مرة من أعضاء الهيئة بدلاً يعادل راتب ثلاثة أشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 1- تراعى في ترقية أعضاء الهيئة إلى مرتبة رئيس دائرة تحقيق وادعاء (ب) فما دون ترتيب الأقدمية في المرتبة، وعند التساوي يقدم الأكفأ بموجب تقارير الكفاية، وعند التساوي أو عدم وجود تقارير الكفاية يقدم الأكبر سنًّا.2 - يراعى في ترقية الأعضاء إلى مرتبة رئيس تحقيق وادعاء (أ) فما فوق تقدير الكفاية والأعمال والإنجازات والمسؤوليات التي قام بها عضو الهيئة وفقاً لتقدير مجلس الهيئة ووفقاً لتقارير المفتشين الواردة عنهم ومن وقائع أعمالهم مع مراعاة ما قد يوجد في سجله من عقوبات تأديبية وعند التساوي يرجح العضو الأقدم في المرتبة.3 - لا يجوز أن يرقى عضو الهيئة إلا إذا كان قد تم التفتيش عليه مرتين على الأقل في المرتبة المراد الترقية منها، وثبت في التقريرين الأخيرين السابقين على الترقية أن درجة كفايته لا تقل عن المتوسط عدا محقق (ج) فيكتفى بالتفتيش عليه مرة واحدة، ما لم يرَ مجلس الهيئة غير ذلك لأسباب يقدرها. 4 - على عضو الهيئة مزاولة أعمال الوظيفة المرقى إليها في مقرها، ولا يكون التعيين أو الترقية نافذين إلاَّ بمزاولة أعمالها بعد صدور الأمر الملكي بالتعيين أو الترقية، ما لم يرَ مجلس الهيئة ندب
    عضو الهيئة أو إعارته إلى مكان آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يكون نقل أعضاء الهيئة داخل نطاقها، أو ندبهم، أو إعارتهم بقرار من مجلس الهيئة، وتكون مدة الندب أو الإعارة سنة واحدة قابلة للتجديد لسنة أخرى، على أنه يجوز للمشرف في الحالات الاستثنائية أن يندب أحد أعضاء الهيئة داخل نطاقها، أو خارجه لمدة لا تتجاوز ثلاثة أشهر في العام الواحد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يرخص رئيس الهيئة - أو من يفوضه - بالإجازات لأعضاء الهيئة في حدود أحكام نظام الخدمة المدنية ولوائحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تُنشأ في الهيئة دائرة للتفتيش والمتابعة، تتكون من رئيس وعدد كاف من الأعضاء المتفرغين يختارهم مجلس الهيئة، وللمجلس أن يندب أعضاء آخرين من الهيئة للقيام بالتفتيش، وتكون الدائرة مرتبطة برئيس الهيئة، وتنشأ عند الحاجة دوائر للمتابعة في الفروع بقرار من رئيس الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: 'تتولى دائرة التفتيش والمتابعة في الهيئة ما يأتي: 1 - التفتيش على أعمال أعضاء الهيئة ومتابعتها، وذلك بجمع البيانات التي تؤدي إلى معرفة درجة كفايتهم، ومدى حرصهم على أداء واجبات وظائفهم.2 - التحقيق في الشكاوى التي يقدمها أعضاء الهيئة، أو تقدم ضدهم بعد إحالتها إلى دائرة التفتيش والمتابعة من رئيس الهيئة، أو من يفوضه.3 - التفتيش على أعمال موظفي الهيئة من غير الأعضاء ومتابعتها.ويكون التفتيش والتحقيق المشار إليهما في الفقرتين (1) و(2) بوساطة عضو مرتبته أعلى من مرتبة العضو المفتِّش عليه، أو سابق له في الأقدمية إن كانا في مرتبة واحدة، ويكون التحقيق والتفتيش على أعضاء الهيئة في المقر الرئيس للهيئة، أو بالانتقال إلى مقر عمل العضو المراد التفتيش عليه، أو من خلال دوائر المتابعة في الفروع والمحافظات، وذلك بناءً على ما يراه رئيس الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يجب إجراء التفتيش على أعضاء الهيئة مرة أو مرتين على الأكثر في السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يكون تقدير كفاية عضو الهيئة بإحدى الدرجات الآتية:متميز، فوق المتوسط، متوسط، أقل من المتوسط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: 1- تُبلغ دائرة التفتيش والمتابعة عضو الهيئة بالتقرير وتقدير كفايته، وتبلغه كذلك بكل ما يودع في ملفه، وله أن يقدم لدائرة التفتيش والمتابعة اعتراضه على ذلك خلال (ثلاثين) يوماً من تاريخ تبليغه، ما لم يكن لديه عذر مقبول في تأخره عن هذه المدة.2- تحيل دائرة التفتيش والمتابعة الاعتراض إلى مجلس الهيئة مشفوعاً بمذكرة بالرأي فيه خلال (خمسة عشر) يوماً من تاريخ تقديمه.ويفصل المجلس في الاعتراض بعد الاطلاع على الأوراق، ويبلّغ المعترض بقرار المجلس كتابة، ويكون قرار المجلس في هذا الشأن نهائيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يحدد مجلس الهيئة واجبات أعضاء الهيئة، والأعمال المحظورة عليهم، ويصدر قواعد وإجراءات التفتيش على أعمالهم وإجراءات تقويم أداء الأعضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: على عضو الهيئة أن يقيم في البلد الذي فيه مقر عمله، ولمجلس الهيئة - لظروف استثنائية - أن يسمح للعضو بالإقامة المؤقتة في بلد آخر قريب من مقر عمله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: لا يجوز لعضو الهيئة - بغير عذر مقبول مرخص له فيه كتابة - أن يتغيب عن مقر عمله، أو أن ينقطع عن عمله لسبب غير طارئ، فإن أخل العضو بهذا الواجب نبه إلى ذلك كتابة، فإن تكرر منه ذلك وجب رفع الأمر إلى مجلس الهيئة؛ للنظر في محاكمته تأديبيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: مع عدم الإخلال بما يتضمنه نظام الخدمة المدنية من شروط التعيين؛ يشترط فيمن يعين في الهيئة من كتاب الضبط وكتاب السجل والباحثين والخبراء والمترجمين ونحوهم أن ينجح في امتحان تُحدَّد إجراءاته، وشروطه بقرار من مجلس الهيئة، ويكون تعيينهم على سبيل التجربة لمدة سنتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تطبق على موظفي الهيئة من غير الأعضاء أنظمة الخدمة المدنية، وذلك مع مراعاة ما ورد في هذه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: لا يجوز لموظفي الهيئة إفشاء الأسرار التي يطّلعون عليها بحكم عملهم ولو بعد تركهم للخدمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تحل هذه اللائحة محل لائحة أعضاء هيئة التحقيق والادعاء العام والعاملين فيها، الصادرة بقرار مجلس الوزراء رقم (140) وتاريخ 13/ 8/ 1409هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: تُنشر هذه اللائحة في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/788be42c-94c8-48ae-bdf9-a9a700f273f4/1
  verified: false
