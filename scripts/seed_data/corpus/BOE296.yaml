regulation:
  code: BOE296
  name_ar: لائحة رقابة ديوان المراقبة العامة على المؤسسات الخاصة والشركات التي تساهم الدولة في رأسمالها أو تضمن لها حدا ادنى من الأرباح (لائحة رقابة الديوان العام للمحاسبة)
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يختص ديوان المراقبة العامة بفحص ومراجعة حسابات المؤسسات الخاصة والشركات التي تساهم الدولة في رأسمالها أو تضمن لها حدا ادنى من الأرباح، وتكون مراجعة الديوان لحسابات المؤسسات الخاصة والشركات المذكورة طبقا للأصول التجارية وفي نطاق الاحكام المنظمة لأعمال هذه المؤسسات والشركات، وعلى الوجه البين في هذه اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تستهدف رقابة الديوان على المؤسسات الخاصة والشركات التي تساهم فيها الحكومة أو الهيئات والمؤسسات العامة بما لا يقل عن 25% من رأسمالها التحقق من انها تقوم بتطبيق الأنظمة واللوائح المالية والحسابية التي تخضع لها وفقا لأنظمتها الخاصة تطبيقاً كاملاً وأنه ليس في تصرفاتها المالية ما يتعارض مع تلك الأنظمة واللوائح. وللديوان في سبيل ذلك تحقيق هذه الأهداف مايلـــــــــــــــــي: فحص الحسابات الختامية والميزانية العمومية والتأكد من ادراج المعلومات الضرورية الواجب ابرازها فيها ومن انها تعبر تعبيرا صحيحاً عن صافي الأرباح او الخسائر او فائض الإيرادات عن المصروفات او عجزها في كل سنة مالية وعن المركز المالي الحقيقي للمؤسسة او الشركة. فحص تقارير مراقبي الحسابات عن الحسابات الختامية والميزانية العمومية وبحث تحفظاتهم عليها والتأكد من مبرراتها ان وجدت ومتابعة ما يجب ان يتخذ حيالها. مراجعة الدفاتر والسجلات المالية وتدقيق المستندات بالقدر الذي يراه الديوان لازماً في تقديره. فحص كفاءة الإدارة والتحقق من حسن استعمال الأموال واستغلالها للأغراض المطلوبة منها. والتثبت ان المؤسسة أو الشركة تقوم بتطبيق
    نظم حديثه وكافيه للرقابة المالية والداخلية بما في ذلك الرقابة على المستودعات. وعلى مجلس إدارة المؤسسة او الشركة عرض ما قد يطلب الديوان عرضه من ملاحظات على الجمعية العمومية العادية للمساهمين عند انعقادها وعلى الديوان أن يقدم تقريراً سنوياً عن نتيجة فحصه ومراجعته للحسابات وتقييمه للأداء لكل من الجهات المشار إليها في هذه المادة وإلى رئيس مجس الوزراء ووزير المالية والاقتصاد الوطني والوزير المختص.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'على كل من المؤسسات والشركات المشار إليها في المادة السابقة ان تقدم للديوان كافة الإيضاحات والبيانات والمستندات التي يرى انها ضرورية ولازمة للقيام – باختصاصاته على الوجه الأكمل، وان تزود الديوان بنسخة كاملة من: نظامها الأساسي وانظمتها ولوائحها المالية والمحاسبية وصلاحيات مجلس الإدارة والمديرين وما قد يطرا على ذلك من تعديلات. حسابها الختامي المنصوص عليه في نظامها وتقرير مجلس الإدارة او المدير العام عن نشاطها ومركزها المالي عن السنة المالية المنقضية وذلك قبل الموعد المحدد لانعقاد الجمعية العامة بخمسة وعشرين يوما على الأقل. وعلى مراقبي حساباتها تزويد الديوان ببرنامج الفحص والمراجعة الذي يقوم بتطبيقه وما قد يطرأ عليه من تعديل في حينه وبصورة من تقريره عن الحسابات الختامية وما قد يكون قد كشفه من مخالفات واخطاء وذلك قبل الموعد المحدد لانعقاد الجمعية العامة بخمسة عشر يوما على الاقل.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: لديوان المراقبة العامة أن يرسل مندوباً او اكثر لمناقشة ملاحظاته المعروضة في اجتماعات الجمعيات العامة العادية للمساهمين، وعلى المؤسسات والشركات المشار إليها في المادة السابقة اشعار الديوان بمواعيد انعقاد هذه الجمعيات قبل الميعاد المحدد لانعقادها بخمسة عشر يوما على الاقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: فيما يتعلق بالمؤسسات الخاصة والشركات التي تساهم فيها الحكومة او الهيئات والمؤسسات العامة باقل من (%25) من رأسمالها، تكون الرقابة على حساباتها وفق ما يرد في انظمتها الأساسية من احكام وما ينص عليه نظام الشركات وأية انظمة اخرى يتم صدورها بهذا الخصوص ويتوجب على تلك الجهات موافاة الديوان بنسخة كاملة من حسابها الختامي المنصوص عليه في نظامها وتقرير مجلس الادارة او المدير العام عن نشاطها ومركزها المال عن السنة المالية المنقضية وذلك قبل موعد انعقاد الجمعية العامة العادية للمساهمين بثلاثين يوما عل الاقل حتى يتمكن الديوان من تزويد ممثلي الدولة في اجتماعات هذه الجمعيات بملاحظاته على تلك الحسابات والتقارير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تكون الرقابة على المؤسسات الخاصة والشركات التي تضمن لها الدولة حداً أدني من الأرباح للتحقق من صحة استحقاقها لمبلغ الاعانة المصروفة. وللديوان في سبيل ذلك ان يطلب من الجهة التي قامت يصرف الاعانة موافاته بالمعلومات والايضاحات اللازمة وبجميع المستندات والتقارير التي تم على أساسها تحديد وصرف مبلغ الاعانة، وله ان يطلع في حدود ما يستلزمه الفحص على ما يرى ضرورة الاطلاع عليه من دفاتر وسجلات ومستندات في مقر المؤسسة الخاصة او الشركة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لرئيس ديوان المراقبة العامة ان يطلب من الجهات المختصة اجراء التحقيق اللازم وتوقيع العقوبات المناسبة على كل من يتبين انه اخفى بسوء نية معلومات بقصد عدم تمكين الديوان من أداء مهامه المنصوص عليها في هذه اللائحة او ارتكب مخالفة مالية للقواعد المنصوص عليها في أنظمة ولوائح المؤسسات الخاصة والشركات الخاضعة لرقابته من شأنها احداث تغيير في مركزها المالي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تستثنى من أحكام هذه اللائحة المؤسسات والشركات والجمعيات والمراكز والمنظمات التي تساهم فيها الدولة مع دولة او دول اخرى او مع منظمات او هيئات دولية حيث ان رقابتها تكون وفقاً لما يرد في أنظمتها الأساسية من احكام وعلى الوزارات والهيئات والمؤسسات العامة المختصة التي تمثل الدولة في تلك الجهات ان ترسل لديوان المراقبة العامة الحسابات الختامية والميزانيات والتقارير المالية التي تتلقاها من مندوبيها ليقوم الديوان بدراستها وإرسال مطالعاته عليها للوزراء أو رؤساء الهيئات والمؤسسات العامة المختصين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعمل بأحكام هذه اللائحة بعد شهر من تاريخ نشرها في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/861bfe91-e37d-4c72-8f07-acc700231794/1
  verified: false
