regulation:
  code: BOE155
  name_ar: نظام الثروة الحيوانية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات الآتية أينما وردت في هذا النظام المعاني المذكورة أمامها ما لم يقتض السياق خلاف ذلك : 1 - الثروة الحيوانية : جميع أنواع الحيوانات والدواجن والطيور الأليفة والمستأنسة. 2 - الوزارة : وزارة الزراعة . 3 - الوزير : وزير الزراعة . 4 - المرض الوبائي أو المعدي : أي من الأمراض الوبائية أو المعدية المصنفة في القائمتين (أ، ب) بحسب تصنيف منظمة الصحة الحيوانية وما يطرأ عليها من تعديلات. 5 - كل ذي صلة بالثروة الحيوانية : الأطباء والمساعدون البيطريون، ومالكو الثروة الحيوانية ، والمشرفون عليها، والقائمون على رعايتها، والمسؤولون عنها، والعاملون في مراكز البحوث والمعاهد والجامعات ذات الصلة. 6 - اللائحة : اللائحة التنفيذية لهذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف هذا النظام إلى ما يأتي : 1 - حماية الثروة الحيوانية في المملكة من الأمراض الوبائية والمعدية والأخطار الناجمة عن التلوث البيئي. 2 - ضمان الرعاية والتغذية والتربية المناسبة للثروة الحيوانية والرفق بها، وعدم تعريضها للاستغلال أو التعامل معها بشكل يترتب عليه ضرر أو خطر أو قسوة عليها. 3 - وضع الخطط والتدابير والإجراءات اللازم اتخاذها لمكافحة أي مرض من الأمراض المعدية أو الوبائية التي قد تصيب الثروة الحيوانية والأمراض المشتركة بينها وبين الإنسان، أو غير ذلك من الأخطار الأخرى. 4 - ضمان سلامة المنتجات الحيوانية المحلية والتأكد من صلاحيتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تتولى الوزارة مسؤولية الإشراف العام على رعاية الثروة الحيوانية وصحتها، والعمل على حمايتها من جميع الأمراض والأوبئة والأخطار الأخرى، ووضع الخطط والبرامج، وتقديم الخدمات البيطرية االوقائية والعلاجية والإرشادية اللازمة لتحقيق ذلك، بالتعاون مع الجهات الأخرى ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تلتزم الجهات الحكومية المعنية وكل ذي صلة بالثروة الحيوانية أو منتجاتها أو مخلفاتها - بالتعاون مع الوزارة، وفقاً لما يأتي : 1 - تقديم أي معلومات أو تسهيلات تساعد الوزارة في تحقيق أهداف هذا النظام. 2 - تطبيق التدابير والإجراءات اللازمة للوقاية من الأمراض أو التلوث البيئي اللذين قد تتعرض لهما الثروة الحيوانية ، وفقاً لما تحدده اللائحة. 3 - ضمان سلامة المنتجات الحيوانية والتأكد من صلاحيتها وخلوها من أي بقايا ضارة من محفزات النمو أو الأدوية البيطرية، وفقاً لما تحدده اللائحة. 4 - المحافظة على السلالات المحلية من الثروة الحيوانية وتطويرها. 5 - الرفق بالثروة الحيوانية وتوفير التغذية والرعاية اللازمة لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يقوم رؤساء البعثات الدبلوماسية السعودية المعتمدة في الخارج بتبليغ الوزارة - من خلال القنوات الرسمية وفي أسرع وقت ممكن - بما يتوافر لهم من معلومات تتعلق بالأمراض والأوبئة التي تصيب الثروة الحيوانية في تلك الدول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تمنح الوزارة التراخيص اللازمة لمشروعات الثروة الحيوانية ، وتتولى الإشراف عليها وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تمنح الوزارة التراخيص اللازمة للعيادات والمختبرات البيطرية، وتتولى الإشراف عليها وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يجوز بقرار من الوزير إلزام مالكي الثروة الحيوانية بما يأتي : 1 - التسجيل الجبري لكل أنواع الثروة الحيوانية أو بعضها. 2 - تحصين بعض أنواع الثروة الحيوانية بالوسيلة المناسبة لحمايتها من الأمراض، حسب البرامج المحددة في اللائحة. 3 - اختبار بعض أنواع الثروة الحيوانية لتشخيص الأمراض المعدية أو الوبائية في موعد محدد أو مواعيد دورية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: لا يجوز لأي فرد أو جهة في المملكة إرسال أي مادة أو عينة تتعلق بالثروة الحيوانية إلى خارج المملكة لإجراء الفحوصات المخبرية الا بعد موافقة الوزارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'يجب على كل ذي صلة بالثروة الحيوانية عند الاشتباه في اصابتها بأي مرض معد أو وبائي القيام بما يأتي : 1 - عزلها في مكان منفصل وبعيد عن الثروة الحيوانية السليمة، وعدم التصرف فيها أو منتجاتها أو المخالطة لها، سواء كانت حية أو مذبوحة أو ميتة. 2 - إبلاغ الوزارة أو أقرب فرع لها فوراً، وخلال مدة أقصاها أربع وعشرون ساعة من اشتباهه بالمرض.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تقوم الوزارة عند اكتشاف أي مرض وبائي أو معد للثروة الحيوانية أو مرض مشترك بينها وبين الإنسان، بما يأتي : 1 - إبلاغ وزارة الصحة إذا كان المرض مشتركاً بين الإنسان والثروة الحيوانية. 2 - تحديد المناطق الموبوءة وإعلانها. 3 - حظر تحرك الثروة الحيوانية أو منتجاتها أو مخلفاتها من المناطق الموبوءة وإليها، وذلك بالتعاون مع وزارة الداخلية. 4 - اتخاذ الاجراءات اللازمة لمكافحة المرض. 5 - الإعلان في حالة القضاء على المرض عن خلو المناطق الموبوءة من المرض ورفع الحظر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا يجوز التصرف بأي نوع من أنواع الثروة الحيوانية مصاب بأي مرض معد أو وبائي أو مخلفاته أو منتجاته أو الأدوات المستخدمة في رعايته إلا تحت إشراف الوزارة ووفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: إذا أصيب أي نوع من أنواع الثروة الحيوانية بمرض وبائي أو معد قد يشكل خطراً على الإنسان أو الثروة الحيوانية ، فعلى الوزارة اتخاذ الاجراءات اللازمة للتخلص منه أو منتجاته أو مخلفاته وفقاً لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تقوم الوزارة بتسجيل اللقاحات والأمصال البيطرية والهرمونات والمواد البيولوجية والإضافات العلفية، ومراقبة استخداماتها، وفقاً للاجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: في حالة قيام الوزارة بذبح أي نوع من أنواع الثروة الحيوانية المحلية مصاب بمرض معد أو وبائي، يجب تعويض مالكي الثروة الحيوانية المذبوحة بما لا يقل عن (50%) من القيمة السوقية لهذه الحيوانات، وتحدد اللائحة شروط وقواعد وإجراءات تقدير وصرف هذا التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يشكل الوزير لجنة أو أكثر للنظر في مخالفات أحكام هذا النظام وتوقيع العقوبات المناسبة الواردة في المادة (السابعة عشرة) من هذا النظام، ويراعى ألا يقل عدد أعضاء اللجنة عن (ثلاثة) ويكون من بينهم طبيب بيطري مختص ومستشار نظامي. ويعتمد الوزير قرارات اللجنة، وتحدد اللائحة مدة العضوية في هذه اللجنة وكيفية العمل فيها ومكافآت أعضائها وفقاً للأنظمة والتعليمات المطبقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'دون إخلال بأي عقوبة أشد منصوص عليها في أنظمة أخرى، يعاقب كل من تثبت مخالفته أي حكم من أحكام هذا النظام بعقوبة أو أكثر من العقوبات الآتية : 1 - الإنذار. 2 - غرامة مالية لا تقل عن ألف ريال ولا تزيد على مليون ريال. 3 - وقف الترخيص بمزاولة النشاط لمدة لا تزيد على سنة. 4 - إلغاء الترخيص . 5 - السجن مدة لا تزيد على خمس سنوات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: إذا رأت اللجنة أن المخالفة تستوجب توقيع عقوبة السجن أو غرامة مالية تزيد على خمسمائة ألف ريال أو إلغاء الترخيص، فعليها أن ترفع الموضوع إلى الوزير لإحالته الى ديوان المظالم ، للنظر فيه وتقرير ما يراه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يجوز التظلم من قرار اللجنة أمام ديوان المظالم خلال ستين يوماً من تاريخ إبلاغ القرار لمن صدر ضده قرار العقوبة، ولا يوقف تنفيذ عقوبة وقف الترخيص بمزاولة النشاط - التظلم من قرار العقوبة أمام ديوان المظالم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام خلال تسعين يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: ينشر هذا النظام فى الجريدة الرسمية ، ويعمل به بعد تسعين يوما من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/965f24c7-0ddb-4d8f-a658-a9a700f24b24/1
  verified: false
