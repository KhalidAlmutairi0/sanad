articles:
- article_ref: المادة الأولى
  article_text_ar: البلدية شخصية اعتبارية ذات استقلال مالي وإداري، تمارس الوظائف الموكولة إليها بموجب هذا النظام ولوائحه التنفيذية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: أ - يتم إنشاء البلديات وتسميتها، وتحديد وتعديل درجاتها وإلغاؤها بقرار من وزير الشئون البلدية والقروية بناء على اقتراح مجلس المقاطعة، ويراعى في ذلك الظروف السكانية والاجتماعية والعمرانية والاقصادية وغيرها.ب - يعين وزير الشئون البلدية والقروية - للبلدية - عند إنشائها لجنة تمارس الاختصاصات والصلاحيات المخولة للمجلس البلدي والمنصوص عليها في هذا النظام لمدة سنتين، يجرى قبل انتهائها تشكيل مجلس بلدي وفق أحكام هذا النظام، ويجوز لوزير الشئون البلدية والقروية في حالة تعذر ذلك تمديد هذه المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يعتمد وزير الشئون البلدية والقروية بناء على اقتراح المجلس البلدي وموافقة مجلس المقاطعة مخططا يبين حدود البلدية والمنطقة الخاضعة لسلطتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: أ - يجوز ضم بلديتين أو أكثر، بقرار من وزير الشئون البلدية والقروية بناء على توصية من المجالس البلدية المعنية وموافقة مجلس المقاطعة ، ويحدد في القرار اسم البلدية الجديد ومركزها ودرجتها وكل ما يتعلق بحقوقها والتزاماتها.ب - يجوز فصل بلدية إلى بلديتين أو أكثر، بقرار من وزير الشئون البلدية والقروية وبناء على اقتراح مجلس المقاطعة ، ويحدد في القرار أسماء البلديات ومراكزها ودرجاتها وكل ما يتعلق بحقوقها والتزاماتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'مع عدم الإخلال بما تقضي به الأنظمة من اختصاص عام لبعض الإدارات أو المصالح، تقوم البلدية بجميع الأعمال المتعلقة بتنظيم منطقتها وإصلاحها وتجميلها والمحافظة على الصحة والراحة والسلامة العامة، ولها في سبيل ذلك اتخاذ التدابير اللازمة خاصة في النواحي التالية: 1 - تنظيم وتنسيق البلدة وفق مخطط تنظيمي مصدق أصولا من الجهات المختصة.2 - الترخيص بإقامة الإنشاءات والأبنية وجميع التمديدات العامة والخاصة ومراقبتها.3 - المحافظة على مظهر ونظافة البلدة، وإنشاء الحدائق والساحات والمنتزهات وأماكن السباحة العامة وتنظيمها وإدارتها بطريق مباشر أو غير مباشر، ومراقبتها.4 - وقاية الصحة العامة وردم البرك والمستنقعات، ودرء خطر السيول، وإنشاء أسوار من الأشجار حول البلدة لحمايتها من الرمال.5 - مراقبة المواد الغذائية والاستهلاكية والإشراف على تموين المواطنين بها، ومراقبة أسعارها وأسعار الخدمات العامة ، ومراقبة الموازين والمكاييل والمقاييس بالاشتراك مع الجهات المختصة، ووضع الإشارة (الدمغة) عليها سنويا.6 - إنشاء المسالخ وتنظميها.7 - إنشاء الأسواق وتحديد مراكز البيع.8 - الترخيص بمزاولة الحرف والمهن وفتح
    المحلات العامة ومراقبتها صحيا وفنيا.9 - المحافظة على السلامة والراحة وبصورة خاصة، اتخاذ الإجراءات اللازمة بالاشتراك مع الجهات المعنية لدرء وقوع الحرائق وإطفائها، وهدم الأبنية الآيلة للسقوط أو الأجزاء المتداعية منها، وإنشاء الملاجئ العامة.10 - تحديد مواقف الباعة المتجولين، والسيارات والعربات بالاتفاق مع الجهات المختصة.11 - تنظيم النقل الداخلي، وتحديد أجوره بالاتفاق مع الجهات المختصة.12 - نزع ملكية العقارات للمنفعة العامة .13 - تحديد واستيفاء رسوم وعوائد البلدية ، والغرامات والجزاءات التي توقع على المخالفين لأنظمتها.14 - الإشراف على انتخابات وترشيح رؤساء الحرف والمهن، ومراقبة أعمالهم وحل الخلافات التي تحدث بينهم.15 - حماية الأبنية الأثرية بالتعاون مع الجهات المختصة.16 - تشجيع النشاط الثقافي والرياضي والاجتماعي، والمساهمة فيه بالتعاون مع الجهات المعنية.17 - التعاون مع الجهات المختصة لمنع التسول والتشرد وإنشاء الملاجئ للعجزة والأيتام والمعتوهين وذوي العاهات وأمثالهم.18 - إنشاء المقابر والمغاسل، وتسويرها وتنظيفها، ودفن الموتى.19 - تلافي أضرار الحيوانات السائبة والكاسرة، والرفق بالحيوان.20
    - منع وإزالة التعدي على أملاكها الخاصة، والأملاك العامة الخاضعة لسلطتها.21 - أية اختصاصات أخرى يصدر بها قرار من مجلس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى السلطات في البلدية : 1 - المجلس البلدي ، ويمارس سلطة التقرير والمراقبة.2 - رئيس البلدية ، ويمارس سلطة التنفيذ بمعاونة أجهزة البلدية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: أ - وزير الشئون البلدية والقروية المرجع الإداري للبلدية .ب - يحدد وزير الشئون البلدية والقروية قرارات المجلس البلدي التي تخضع لتصديقه أو تصديق من يفوضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يحدد وزير الشئون البلدية والقروية بقرار منه عدد أعضاء المجلس البلدي في كل بلدية، على أن لا يقل عن أربعة ولا يزيد على أربعة عشر عضوا، ويكون من بينهم رئيس البلدية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يتم اختيار نصف الأعضاء بالانتخاب، ويختار وزير الشئون البلدية والقروية النصف الآخر من ذوي الكفاءة والأهلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يختار المجلس البلدي رئيسه ونائبه من بين أعضائه بصفة دورية لمدة سنتين قابلة للتجديد، وإذا تساوت الأصوات بين المرشحين، فيعتبر قرار وزير الشئون البلدية والقروية مرجحًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يشترط في عضو المجلس البلدي أن يكون: 1 - سعوديا بالدم أو المولد أو متجنسا مضى على تجنسه عشر سنوات على الأقل.2 - متما الخامسة والعشرين من عمره.3 - أن يقيم إقامة دائمة في نطاق البلدية طوال مدة عضويته.4 - غير محكوم عليه بحد شرعي أو بالسجن في جريمة مخلة بالشرف أو الأمانة، ما لم يكن قد مضى على تنفيذ الحد أو السجن خمس سنوات.5 - غير مفصول من الخدمة العامة لأسباب تأديبية، ما لم يكن قد مضى على هذا الفصل خمس سنوات.6 - مجيدا للقراءة والكتابة.7 - متمتعا بالأهلية الشرعية.8 - غير محكوم عليه بالإفلاس الاحتيالي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: أ - يصدر وزير الشئون البلدية والقروية قرارا بتسمية أعضاء المجلس المنتخبين والمعينين، ولا يجوز تعديل عدد أعضاء المجلس البلدي خلال فترة ولايته.ب - إذا شغرت عضوية أحد أعضاء المجلس المنتخبين لأي سبب، يسمي وزير الشئون البلدية والقروية الحائز على أعلى الأصوات - إن وجد - عضوا ويدعى ليحل محل من شغرت عضويته وللمدة الباقية من ولاية المجلس، أما إذا لم يوجد مرشح حائز على الأصوات، أو إذا شغرت عضوية أحد أعضاء المجلس المعينين لأي سبب، فيتم في هاتين الحالتين تعيين بديل عن أي منهما للمدة الباقية من ولاية المجلس، بقرار من وزير الشئون البلدية والقروية .ج - إذا نقص عدد أعضاء المجلس عن النصف، وتعذر ملء الشواغر بالشكل المحدد بالفقرة السابقة، فيعتبر المجلس منحلا ويصدر قرار بذلك من وزير الشئون البلدية والقروية .د - مدة ولاية المجلس البلدي أربع سنوات، اعتبارا من تاريخ صدور قرار تسمية أعضائه.هـ - يجوز حل المجلس البلدي قبل انتهاء مدة ولايته إذا عجز عن القيام بواجباته، وذلك بقرار من وزير الشئون البلدية والقروية وفي هذه الحالة يحدد الوزير من يمارس صلاحيات المجلس حتى صدور قرار تسمية أعضاء المجلس الجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 'لا يجوز لعضو المجلس البلدي: أ - أن يجمع بين عضوية مجلس بلديتين.ب - أن يكون موظفا في البلدية ، ما لم يكن قد مضى على استقالته أو نقله من وظيفته سنة واحدة على الأقل.ج - أن يكون مقاولا لأعمال أو لأشغال أو لوازم البلدية سواء كان ذلك بصورة مباشرة أو غير مباشرة. د - أن يكون رئيسا أو مديرا في شركة لها علاقة بأعمال البلدية أو عضوا في مجلس إدارة هذه الشركة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تحدد اللائحة التنفيذية طريقة انتخاب أعضاء المجالس البلدية والشروط الخاصة بالناخبين وإجراءات الاقتراع والطعن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجتمع المجلس البلدي في المكان المخصص له مرة في الشهر على الأقل بناء على دعوة رئيسه أو نائبه في حال غيابه، ويجب أن تشتمل الدعوة على جدول الأعمال، وعلى الرئيس أو نائبه أن يدرج في الجدول أي موضوع يطلب عضو في المجلس منه خطيا إدراجه في الجدول قبل أربعة أيام على الأقل من الاجتماع. وليس للمجلس أن يبحث في مواضيع غير مدرجة في الجدول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يجوز لرئيس المجلس البلدي دعوة المجلس لعقد جلسة طارئة كلما رأى ضرورة لذلك، وعلى الرئيس دعوة المجلس لجلسة طارئة إذا طلب منه ذلك أكثر أعضاء المجلس، وتعقد الجلسة خلال يومين على الأكثر من تاريخ وصول الطلب إلى الرئيس، ويقتصر البحث فيها على المواضيع التي عقدت من أجلها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على رئيس المجلس أو أي عضو من أعضائه مغادرة الجلسة في كل مرة يبحث فيها المجلس قضية تتعلق بصورة مباشرة أو غير مباشرة بمصلحة خاصة له، وعلى المجلس أن يتخذ القرار بالاقتراع السري في غيابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: جلسات المجلس البلدي سرية، وللمجلس أن يدعو لحضور جلسات المجلس أي شخص يرى فائدة في حضوره، دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: لا تعتبر جلسات المجلس البلدي نظامية إلا بحضور الأغلبية للأعضاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: أ - يتخذ المجلس البلدي قراراته بأكثرية أصوات أعضائه الحاضرين، وفي حالة التساوي يكون صوت الرئيس أو نائبه في حال غيابه مرجحا.ب - يجرى التصويت بطريقة الاقتراع العلني، ويجوز للمجلس أن يقرر في بعض الحالات الهامة إجراء الاقتراع سريا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يجوز للمجلس تشكيل لجان من بعض أعضائه للنظر في قضايا معينة، ورفع النتيجة فيها إلى المجلس لاتخاذ القرار اللازم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تتضمن اللوائح التنفيذية إجراءات سير العمل الداخلي للمجلس، وتسجيل محاضره وصياغة قراراته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: 'يتخذ المجلس البلدي قراراته في جميع المسائل المتعلقة بالبلدية طبقا لهذا النظام وغيره من الأنظمة واللوائح وخاصة فيما يلي: 1 - إعداد مشروع ميزانية البلدية .2 - إقرار مشروع الحساب الختامي بقصد رفعه للجهات المختصة.3 - إعداد مشروع المخطط التنظيمي للبلدية -بالاشتراك مع الجهات المعنية- تمهيدا لاعتماده من وزير الشئون البلدية والقروية .4 - وضع اللوائح التنفيذية الخاصة بالشروط التخطيطية والتنظيمية والفنية الواجب توافرها في المناطق العمرانية.5 - اقتراح المشاريع العمرانية في البلدة.6 - وضع اللوائح التنفيذية اللازمة لممارسة البلدية واجباتها فيما يتعلق بالصحة والراحة والمباني والمرافق العامة وغيرها.7 - تحديد مقدار الرسوم والغرامات بما لا يتجاوز مائة ريال.8 - اقتراح مقدار الرسوم والغرامات بما زاد عن مائة ريال.9 - مراقبة الإيرادات والمصرفات، وإدارة أموال البلدية طبقا للأنظمة والتعليمات السارية وضمن الحدود المبينة في الإعانات الحكومية المخصصة لها.10 - مراقبة سير أعمال البلدية ، والعمل على رفع كفاءتها وحسن أدائها للخدمات.11 - اقتراح مشاريع نزع الملكية للمنفعة العامة .12 - عقد القروض من
    المؤسسات الحكومية المختصة، وقبول الوصايا والهبات المتمشية مع الشريعة الإسلامية والمصلحة العامة .13 - تحديد أسعار الخدمات والمواد التي تقدمها البلدية بطريق مباشر أو غير مباشر.14 - إبداء الرأي فيما يعرض على المجلس من قضايا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: مع مراعاة الفقرة (ب) من المادة (7)، يتخذ المجلس البلدي قراراته في جميع المسائل المتعلقة بالبلدية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: تقدم استقالة عضو المجلس البلدي إلى وزير الشئون البلدية والقروية للبت فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: 'يفقد عضو المجلس البلدي صفة العضوية بقرار من المجلس، خاضع للتصديق من وزير الشئون البلدية والقروية في الحالات الآتية: 1 - إذا فقد أحد الشروط المنصوص عليها في هذا النظام للمرشح لعضوية المجلس البلدي ، أو إذا تبين بعد تسميته أنه كان فاقدا لأحدها.2 - إذا ثبت استغلاله صفة العضوية للحصول على منفعة شخصية، أو إضراره بمصالح البلدية .3 - إذا وجهت إليه الدعوة وتخلف دون عذر يقبله وزير الشئون البلدية والقروية عن حضور ثلاث جلسات متتالية أو ست جلسات خلال سنة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يحدد وزير الشئون البلدية والقروية بلائحة تصدر منه المكافآت الشهرية لرؤساء وأعضاء المجالس البلدية، أو اللجان التي تقوم مقامها، كما يحدد نفقات الانتداب والانتقال وغيرها في حالة تكليف العضو بمهمة رسمية داخل أو خارج البلدة، وترصد الاعتمادات اللازمة لهذه المكافآت وجميع النفقات اللازمة لممارسة المجالس البلدية أعمالها في ميزانية البلديات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: رئيس البلدية هو المرجع الأول في أمور البلدية وهو المسئول عن إدارتها وحسن قيام موظفيها بواجباتهم وفق الأنظمة والتعليمات النافذة، وله الحق في إصدار القرارات والتعليمات الخاصة بشئون البلدية بما لا يتعارض مع الأنظمة المرعية، وهو الذي يمثلها أمام الغير وله أن ينيب عنه خطيا من يمثلها من موظفي البلدية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'على رئيس البلدية بصفته رئيسا لسلطتها التنفيذية اتخاذ جميع التدابير اللازمة لقيام البلدية بواجباتها وفق هذا النظام وغيره من الأنظمة واللوائح والقرارات، وخاصة ما يلي: 1 - إدارة واردات ومصروفات البلدية وأموالها ومراقبة حساباتها وصيانة حقوقها.2 - إعداد تقرير شامل عن نشاط البلدية كل أربعة أشهر، وتقديمه إلى المجلس البلدي .3 - إعداد مشروع ميزانية البلدية وبرنامج المشاريع المراد تنفيذها خلال السنة المالية القادمة وتقديمه إلى المجلس البلدي .4 - تنفيذ الميزانية.5 - إعداد الحساب الختامي للسنة المالية الماضية، وتقديمه إلى المجلس البلدي .6 - إبرام العقود.7 - مراقبة الأعمال التي تنفذ لحساب البلدية واستلامها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يحدد وزير الشئون البلدية والقروية قرارات رئيس البلدية التي تحتاج إلى تصديقه أو تصديق من يفوضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يحدد وزير الشئون البلدية والقروية بالاتفاق مع وزير الداخلية، البلديات التي تحتاج إلى شرطة بلدية ، كما يحدد عدد أفرادها ورتبهم، ويتم اختيار شرطة البلدية من بين رجال قوات الأمن الداخلي وفق أحكام النظام الخاص بهم، ويكونون خلال فترة إلحاقهم بالبلدية تحت إمرة رئيسها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثانية الثلاثون
  article_text_ar: مع مراعاة الحقوق المعتبرة شرعا، تكون جميع الأراضي التي لا يملكها أحد داخل حدود البلدية ملكا لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: أملاك البلدية المنقولة وغير المنقولة وكافة مواردها غير قابلة للحجز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يتم إعداد ميزانية البلدية وفق الأنظمة الخاصة بذلك، وتتبع من حيث بدئها ونهايتها ميزانية الدولة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: 'تتألف موارد البلدية من: 1 - رسوم البلدية المباشرة التي تجبيها البلدية بنفسها وحصتها من الرسوم غير المباشرة التي تخصصها الدولة للبلديات وتجبيها لصالحها.2 - الغرامات .3 - إيرادات أموال البلدية .4 - الوصايا والهبات.5 - الرسوم التي تفرض بنظام خاص لتأمين نفقات استثنائية طارئة.6 - الإعانات والمخصصات التي تعتمدها الدولة للبلدية .7 - الموارد الأخرى المأذون بها نظاما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يقدم مشروع الميزانية من رئيس البلدية إلى المجلس البلدي ، ويناقش المشروع طبقا للإجراءات والمواعيد المنصوص عليها في اللوائح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: إذا لم يتم اعتماد ميزانية البلدية للسنة المالية الجديدة من الجهة المختصة في حينها لأي سبب من الأسباب، تبقى الواردات والنفقات العادية جارية على أساس الميزانية السابقة، إلى أن يتم اعتماد الميزانية الجديدة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: على رئيس البلدية أن يقدم إلى المجلس البلدي خلال شهرين على الأكثر من انتهاء السنة المالية الحساب الختامي لتلك السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: تحصل موارد البلدية والغرامات والجزاءات وفق الأنظمة والتعليمات المرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: تنظم إجراءات صرف أموال البلدية واستيفاء وارداتها، وإدارة وتنظيم شئون موظفيها ومستخدميها وعمالها بلوائح يراعى فيها طبيعة أعمال البلديات، يصادق عليها مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: يتم تحديد وتطوير وتنمية خدمات القرى وتنظيم إدارتها، بلائحة تصدر عن مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يمارس وزير الداخلية ووزير الشئون البلدية والقروية الصلاحيات المنصوص عليها في هذا النظام لمجلس المقاطعة ، إلى أن يتم تشكيله وفقا لنظام المقاطعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يجوز للبلديات أن تعقد فيما بينها اتفاقات في الأمور المتعلقة بمصالحها المشتركة، وتخضع هذه الاتفاقات لموافقة وزير الشئون البلدية والقروية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الأربعة والأربعون
  article_text_ar: إذا امتنع أي شخص عن تنفيذ أوامر البلدية الصادرة بموجب صلاحياتها النظامية، فيجوز أن تقوم البلدية بأمر رئيسها بالتنفيذ على نفقة الممتنع في حدود النظام، مع عدم الإخلال بما يترتب على الامتناع من جزاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: لرئيس البلدية إيقاف مفعول الرخص والإجازات مؤقتا إذا خالف صاحبها مضمونها، كما يمكن له بعد موافقة المجلس البلدي إلغاء هذه الرخص والإجازات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: يحق لمن أصابه ضرر من تصرفات وقرارات المجلس البلدي أو رئيس البلدية أن يتظلم إلى وزير الشئون البلدية والقروية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: يخضع رؤساء وموظفو ومستخدمو البلديات لأحكام نظامي الموظفين العام والمستخدمين ونظام التقاعد المدني، إلا ما استثني بموجب اللوائح الصادرة تنفيذا للمادة (40) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يصدر وزير الشئون البلدية والقروية اللوائح والتعليمات التنفيذية لهذا النظام، وله تخويل بعض سلطاته المنصوص عليها في هذا النظام للمسئولين المناط بهم إدارة البلديات والقرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: 'مع مراعاة نظام مجلس الوزراء ، ونظام المقاطعات، يلغي هذا النظام: 1 - نظام أمانة العاصمة والبلديات .2 - نظام ترتيب الانتخابات البلدية .3 - جميع ما يتعارض معه من أنظمة وقرارات ولوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e5f63d07-7de5-4a4d-a02f-a9a700f21187/1
  verified: false
