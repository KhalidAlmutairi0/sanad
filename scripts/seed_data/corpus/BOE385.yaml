regulation:
  code: BOE385
  name_ar: تنظيم الهيئة السعودية للمراجعين والمحاسبين
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: الهيئة: الهيئة السعودية للمراجعين والمحاسبين. التنظيم: تنظيم الهيئة. الوزارة: وزارة التجارة. الوزير: وزير التجارة. الجمعية العامة: الجمعية العامة للهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. المهنة: مهنة المحاسبة والمراجعة. المحاسب القانوني: شخص ذو صفة طبيعية أو اعتبارية مرخص له بمزاولة المهنة. التسجيل المهني: برنامج يعتمده المجلس لتسجيل العاملين في وظائف المحاسبة والمراجعة. الشهادات المهنية: شهادة الزمالة والشهادات المهنية الأخرى التي تمنح لأي شخص يتقدم لنيلها وفقاً للقواعد التي يعتمدها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية وبالاستقلال المالي والإداري، وتعمل تحت إشراف الوزارة، ويكون مقرها الرئيس في مدينة الرياض، ولها أن تنشئ فروعًا أو مكاتب تابعة لها داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى تحسين وتطوير مزاولة المهنة والنهوض بها، ومراقبة جودة أدائها، وتنمية الوعي بقواعدها وسلوكياتها وأعرافها واحترامها، وكل ما من شأنه تطويرها وتعزيز مشاركتها في خدمة الاقتصاد الوطني والمجتمع. ولها -في سبيل تحقيق ذلك- ما يأتي: وضع السياسات والاستراتيجيات واقتراح الأنظمة واللوائح ذات الصلة بالمهنة، وفق ما يحدده المجلس. مراجعة وتطوير واعتماد معايير المحاسبة والمراجعة، وأي معايير أخرى ذات علاقة بالمهنة. تنظيم الاختبارات اللازمة للحصول على الشهادات المهنية. إنشاء معاهد متخصصة، لإقامة الندوات والدورات التدريبية والاختبارات وتطويرها وتنظيمها، ولإصدار الدوريات والكتب والنشرات ذات العلاقة بالمهنة وترجمتها. تنظيم الرقابة الميدانية على جودة أداء المهنة وتنفيذها. المشاركة في الندوات والمؤتمرات واللجان المحلية والدولية المتعلقة بالمهنة. تنظيم المهنة وفروعها ذات العلاقة بها والرقابة الميدانية على جودة أدائها. تقديم المشورة الفنية في الأمور التي يكون من شأنها الإسهام في تطوير المهنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تتكون عضوية الهيئة من: أ- أعضاء أساسيون، وهم الحاصلون على شهادة زمالة الهيئة. ب- أعضاء منتسبون، وهم من يأتي: 1- جميع الحاصلين على الشهادة الجامعية أو الدبلوم في المحاسبة. 2- جميع العاملين في المهنة المسجلين مهنيًّا في برنامج التسجيل المهني. ج- الأعضاء المهنيون من غير المحاسبين القانونيين، وهم: 1- المرخص لهم بتقديم خدمات المحاسبة. 2- المرخص لهم بتقديم خدمات محاسبة الزكاة والضريبة. د‌- أعضاء فخريون، ويمنح المجلس العضوية الفخرية لمن يقدم إسهامات متميزة في مجال المهنة. هـ- الطلاب المنتسبون، وتشمل الطلاب الذين يدرسون في الجامعات والكليات المسجلين في الهيئة. يصدر المجلس ضوابط العضوية بما في ذلك ما يتعلق بمنحها وتعليقها وشطبها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للهيئة جمعية عامة تتكون من جميع الأعضاء الأساسيين الذين سددوا اشتراكاتهم السنوية. يعقد اجتماع الجمعية العامة العادية بدعوة من المجلس مرة واحدة -على الأقل- في السنة، ويحدد الموعد بداية كل سنة مالية للهيئة، ويجوز عقد اجتماع استثنائي للجمعية العامة كلما طلب ذلك (20%) أو أكثر من أعضائها الأساسيين أو (خمسة) أعضاء أو أكثر من المجلس. وعلى المجلس إعداد جدول أعمال الجمعية العامة وتحديد موعد الاجتماع ومكانه، على أن يعلن عنه قبل عشرة أيام -على الأقل- من موعد عقده. يرأس اجتماع الجمعية العامة الرئيس أو من ينيبه، وتعقد الجمعية العامة اجتماعاتها -العادية أو الاستثنائية- بحضور أغلبية أعضائها، فإذا لم يكتمل النصاب فيدعى إلى اجتماع آخر يعقد خلال الثلاثين يوماً التالية لموعد الاجتماع (الأول)، ويكون الاجتماع في هذه الحالة صحيحاً بمن حضر، وتصدر قراراتها بأغلبية أصوات الأعضاء الحاضرين، وفي حال التساوي يكون صوت رئيس الاجتماع مرجحًا. يجوز للجمعية العامة عقد الاجتماعات والتصويت على القرارات؛ من خلال استخدام الوسائل الإلكترونية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تختص الجمعية العامة بما يأتي: إقرار القوائم المالية السنوية للهيئة. إقرار سياسة استثمار أموال الهيئة. تعيين مراجعي حسابات الهيئة، وتحديد أتعابهم. إقرار التقرير السنوي عن نشاط الهيئة. انتخاب الأعضاء الأساسيين السعوديين في المجلس. إقرار إجراءات الانتخاب والشروط الواجب توافرها في المرشحين في المجلس. مناقشة كل ما يرد بجدول أعمالها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير أو من ينيبه وعضوية كل من: أ- ممثل من وزارة التجارة. ب- ممثل من وزارة الموارد البشرية والتنمية الاجتماعية. ج- ممثل من وزارة المالية. د- ممثل من الديوان العام للمحاسبة. هـ- ممثل من هيئة السوق المالية. و- عضو من ذوي الاختصاص من القطاع الخاص يرشحه مجلس الغرف التجارية والصناعية. ز- ثلاثة من أعضاء الهيئة الأساسيين الذين تنتخبهم الجمعية العامة لمدة ثلاث سنوات قابلة للتجديد مرة واحدة. ح- أحد أعضاء هيئة التدريس -سعودي الجنسية- بقسم المحاسبة في إحدى جامعات المملكة، يرشحه وزير التعليم. ط- الرئيس التنفيذي للهيئة. لا تقل مرتبة أي من الأعضاء المشار إليهم في الفقرات (أ) و(ب) و(ج) و(د) و(ه) من الفقرة (1) من هذه المادة عن المرتبة (الرابعة عشرة) أو ما يعادلها، ويراعى أن يكون ممثلو تلك الجهات من ذوي الاختصاص. تكون عضوية الأعضاء المشار إليهم في الفقرتين (و) و(ح) من الفقرة (1) من هذه المادة لمدة ثلاث سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يجتمع المجلس مرتين -على الأقل- في السنة بدعوة من رئيسه، وعلى الرئيس توجيه الدعوة إلى الاجتماع إذا طلب ذلك -كتابة- (أربعة) من أعضاء المجلس على الأقل. لا تكون اجتماعات المجلس صحيحة إلا بحضور أغلبية الأعضاء على الأقل، على أن يكون من بينهم الرئيس أو من ينيبه، ويجوز للمجلس -عند الحاجة ووفقاً لما يقدره الرئيس- عقد الاجتماعات من خلال استخدام الوسائل الإلكترونية. تصدر قرارات المجلس بأغلبية أصوات الحاضرين على الأقل، فإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. للمجلس -عند الحاجة- أن يصدر قرارًا بعرضه على الأعضاء متفرقين، وفي هذه الحالة يشترط موافقة جميع الأعضاء على القرار كتابة، ويعرض هذا القرار على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، وله أن يتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود أحكام التنظيم، ويختص بما يأتي: تشكيل المجالس واللجان المهنية، واعتماد قواعد عملها وإجراءاتها ولوائحها. ومن ذلك: مجلس معايير المحاسبة، ومجلس معايير المراجعة، ومجلس مراقبة جودة الأداء المهني، ولجنة الاختبارات، ولجنة سلوك وآداب المهنة، وغيرها. تطوير معايير المحاسبة ومعايير المراجعة والمعايير المهنية الأخرى ذات العلاقة بها، واعتمادها. منح العضوية الفخرية. دعوة الجمعية العامة للانعقاد. الموافقة على السياسات والاستراتيجيات -المتعلقة بالمهنة- والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. إصدار القرارات والقواعد ذات العلاقة بالمهنة واختصاصات الهيئة. اعتماد اللوائح المالية والإدارية وغيرها من اللوائح الداخلية، اللازمة لتسيير شؤون الهيئة. تحديد المقابل المالي لاشتراكات العضوية، والتسجيل المهني، وما تقدمه الهيئة من خدمات وأعمال، وآلية السداد، وذلك في حدود اختصاصها. وضع القواعد اللازمة للحصول على شهادة زمالة الهيئة، والشهادات المهنية
    في أحد فروع المهنة. تطوير دورات التدريب وبرنامج التعليم المهني المستمر، وتنظيمها. استثمار أموال الهيئة، بما في ذلك الاستثمار في تملك العقار وتأجيره والاستثمار في الأدوات المالية وغيرها من الاستثمارات. تعيين رئيس تنفيذي للهيئة، وتحديد واجباته ومسؤولياته وحقوقه وأجره ومزاياه الوظيفية والمالية الأخرى. إقرار هيكل الهيئة التنظيمي. اقتراح تعديل الأنظمة والتنظيمات ذات العلاقة باختصاصات الهيئة أو بالمهنة، والرفع عنها إلى الوزارة تمهيداً لاستكمال الإجراءات النظامية. الموافقة على إنشاء فروع ومكاتب للهيئة. اعتماد مشروع الموازنة التقديرية وخطة عمل الهيئة السنوية. إعداد القوائم المالية والتقرير السنوي للهيئة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف وفقاً للأحكام المنظمة لذلك. النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة. وللمجلس تفويض رئيسه أو من يراه من أعضائه ببعض الصلاحيات، وتفويض المجالس أو اللجان المهنية ببعض الصلاحيات بما يتناسب مع طبيعة عملها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد الهيئة من الآتي: ما يخصص لها سنويًّا من إعانات حكومية. ما يقدم إليها من دعم من هيئة السوق المالية، والهيئة العامة للزكاة والدخل، لأي برامج تطويرية. الهبات والتبرعات والمنح والوصايا وريع الأوقاف التي يقرر المجلس قبولها. عوائد استثمار أموالها. المقابل المالي لما تقدمه من خدمات وأعمال. الاشتراكات السنوية التي يحددها المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: للهيئة فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف منها وفقاً للوائحها المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تعين الجمعية العامة مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بمزاولة المهنة في المملكة بناء على ترشيح من المجلس -على ألا يكون مراجع حسابات الهيئة أو أحد شركائه عضوًا في المجلس أو أيًّا من المجالس واللجان المهنية في الهيئة- لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، وتحدد الجمعية العامة أتعابه. ويرفع تقرير مراجع الحسابات إلى الجمعية العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: السنة المالية للهيئة هي السنة الميلادية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به بعد مضي (90) يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3fd2d5d4-e39f-4543-a69f-ad0100b32c4d/1
  verified: false
