regulation:
  code: BOE069
  name_ar: نظام استيراد المواد الكيميائية وإدارتها ( نظام إدارة المواد الكيميائية )
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية– أينما وردت في هذا النظام– المعاني المبينة أمامها ما لم يقتض السياق خلاف ذلك : المواد الكيميائية : أي مادة كيميائية بحالتها الغازية أو السائلة أو الصلبة، وتحدد اللائحة أسماءها وأنواعها. إدارة المواد الكيميائية : كل تعامل مع المواد الكيميائية بما في ذلك إنتاجها، وتصنيعها، وتداولها، ونقلها، وتخزينها، ومعالجتها، وإتلافها، والتخلص منها. الجهة المختصة : الجهة المخولة وفقًا لأحكام هذا النظام بإصدار إذن استيراد المواد الكيميائية وإذن فسحها. النفايات الكيميائية : المخلفات الكيميائية التي يرغب في التخلص منها، كالمواد الناتجة عن العمليات الصناعية والبحثية. المواد الكيميائية المتراكمة : مواد كيميائية موجودة منذ مدة طويلة في مخازن المستوردين لها أو المتعاملين معها وفق ما تحدده اللائحة. المواد الكيميائية الخطرة : مواد كيميائية تتصف بسميتها أو قابليتها للانفجار، أو ذات خصائص أخرى يمكن أن ينجم عنها خطر على صحة الإنسان أو البيئة. اللائحة : اللائحة التنفيذية لأحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: لا يجوز استيراد المواد الكيميائية إلا بعد الحصول على إذن باستيرادها، ولا تفسح من الجمارك إلا بعد تقديم إذن فسحها. وتحدد اللائحة إجراءات طلب إصدار الإذن والنماذج الخاصة به وشروطه ومدته وكيفية تجديده وإلغائه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: '1 - تختص الجهات الآتية بإصدار إذن استيراد وفسح المواد الكيميائية المبينة أمام كل منها : أ - وزارة الداخلية: المواد الكيميائية التي تدخل في تركيب المتفجرات.ب - وزارة التعليم العالي: المواد الكيميائية الخاصة بالمؤسسات التعليمية.ج - وزارة الصحة: المواد الكيميائية التي تدخل في تحضير الأدوية وتركيبها، والمواد الكيميائية التي يحتاج إليها القطاع الصحي بما في ذلك الكواشف غير المشعة.د - وزارة الزراعة: المواد الكيميائية التي تدخل في تحضير أو تركيب المبيدات الزراعية ومحسنات التربة والأسمدة والأدوية البيطرية، والمواد الكيميائية التي تحتاج إليها مراكز الأبحاث الزراعية.هـ - وزارة المياه والكهرباء: المواد الكيميائية التي تستخدم في معالجة المياه والصرف الصحي، والمحطات الخاصة بذلك، والمواد الكيميائية التي تحتاج إليها مختبرات ومراكز أبحاث المياه والصرف الصحي، وشركات الكهرباء.و - وزارة التجارة والصناعة: المواد الكيميائية المتداولة في الأسواق المحلية التي تستوردها المؤسسات والشركات التجارية، والمواد الكيميائية الخاصة بالمصانع وشركات البترول والتعدين . 2 - لا تصدر الجهات المشار إليها في الفقرات
    (ج، د، هـ، و) إذن الاستيراد أو الفسح إلا بعد الاتفاق مع وزارة الداخلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تزود الجهات المختصة الرئاسة العامة للأرصاد وحماية البيئة بنسخة من إذن الفسح الذي تصدره للمواد الكيميائية حال إصداره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تضع الهيئة العربية السعودية للمواصفات والمقاييس المواصفات القياسية الخاصة بعبوات المواد الكيميائية ، من حيث نوعها، وحجمها، ولونها، والعلامات والتعليمات الواجب لصقها عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تصدر وزارة النقل والهيئة العامة للطيران المدني– كل جهة بحسب اختصاصها– تراخيص نقل المواد الكيميائية وفق الشروط والمواصفات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا تجوز إدارة المواد الكيميائية إلا بعد الحصول على ترخيص بذلك، وتحدد اللائحة جهات الاختصاص، وإجراءات الحصول على الترخيص وشروطه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تتولى وزارة الداخلية المهمات الآتية : 1 - حصر ومراقبة جميع ما يستورد من مواد كيميائية تدخل في تركيب المتفجرات، والجهات المستوردة لها. 2 - مرافقة الشاحنات المحملة بالمواد الكيميائية الخطرة – التي تحددها اللائحة– لتأمين سلامتها على الطرق. 3 - وضع تدابير الحماية والوقاية من أخطار المواد الكيميائية، ومتابعة تنفيذها. 4 - إيجاد فرق للتدخل في الحوادث الكيميائية، والعمل على تهيئة هذه الفرق بالتدريب والتجهيزات اللازمة للقيام بأعمالها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتولى مصلحة الجمارك المهمات الآتية: 1 - إنهاء الإجراءات الجمركية اللازمة لأي إرسالية مواد كيميائية تصل إلى المملكة حال تقديم إذن فسحها . 2 - التنسيق مع الجهات المختصة لمعالجة أي مشكلة تعوق فسح المواد الكيميائية المستوردة أو تؤخره. 3 - إبلاغ الرئاسة العامة للأرصاد وحماية البيئة بالمواد الكيميائية المتروكة لديها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتولى الرئاسة العامة للأرصاد وحماية البيئة المهمات الآتية : 1 - التنسيق مع الجهات المختصة لإنشاء قاعدة معلومات تشتمل على ما يأتي : أ – بيان بالمواد الكيميائية التي فسحت، والجهات التي استوردتها، وما أتلف منها. ب - بيان بالمواد الكيميائية المحظورة التي لا يسمح قطعيًّا بدخولها إلى المملكة، والمواد الكيميائية المقيدة التي لا يسمح بدخولها إلا وفق شروط وتعليمات خاصة، مع تزويد الجهات المختصة بنسخة من هذا البيان.ج - جميع ما يتعلق بالنفايات الكيميائية وخصائصها ودرجة خطورتها والظروف المناسبة لحفظها ونقلها وإعادة استخدامها وطرق تخزينها وكيفية التخلص منها. 2 - تنظيم وسائل الاستشعار والإنذار من أخطار الحوادث الكيميائية، وإعداد الخطط لمواجهة الحالات الطارئة المؤثرة على البيئة بالتنسيق مع الجهات ذات العلاقة. 3 - إصدار تراخيص إنشاء محطات ومرافق معالجة النفايات الكيميائية وفق المعايير التي تحددها اللائحة، ومراقبة تلك المحطات والمرافق وما يتم التخلص منه فيها. 4 - إعداد القواعد والإجراءات للتحكم في عمليات الإتلاف والتخلص من النفايات الكيميائية ومراقبة تطبيقها، وذلك بما يتوافق مع الأنظمة
    والمعاهدات المتعلقة بهذا الشأن.5 - التنسيق مع الجهات ذات العلاقة لتأمين مواقع مناسبة لعمليات إتلاف المواد الكيميائية وردمها، والإشراف على إنشاء المرادم وعمليات الإتلاف والردم.6 - اتخاذ التدابير اللازمة في شأن المواد الكيميائية الموجودة لدى الجهات التي ترغب في التخلص منها، وذلك فور إبلاغ الرئاسة بذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يلتزم مستوردو المواد الكيميائية والقائمون على إداراتها بما يأتي: 1 - إنهاء إجراءات إذن الفسح قبل وصول المواد الكيميائية إلى المملكة أو حال وصولها.2 - تسلم المواد الكيميائية المستوردة ونقلها خلال مدة لا تتجاوز ثلاثة أيام عمل من تاريخ فسحها من المنافذ الجمركية .3 - نقل المواد الكيميائية بطريقة آمنة وبوساطة وسائل نقل مرخص لها.4 - إبلاغ وزارة الداخلية قبل نقل المواد الكيميائية الخطرة.5 - تخزين المواد الكيميائية في أماكن مخصصة لها، وفق الشروط والتعليمات التي تحددها اللائحة.6 - تطبيق التعليمات الخاصة بسلامة العاملين في المنشآت التي تتعامل مع المواد الكيميائية .7 - تطبيق المواصفات القياسية الخاصة بعبوات المواد الكيميائية .8 - عدم استخدام المواد الكيميائية المستوردة في غير المجال الذي طلبت من أجله إلا بعد موافقة الجهة المختصة.9 - عدم تداول المواد الكيميائية إلا في الأماكن المخصصة لذلك.10 - التعامل مع المواد الكيميائية بواسطة أشخاص مؤهلين في مجال السلامة والوقاية.11 - إبلاغ الجهة المختصة والرئاسة العامة للأرصاد وحماية البيئة بصفة دورية بما لديهم من مواد كيميائية متراكمة أو منتهية
    الصلاحية أو نفايات كيميائية .12 - التخلص من النفايات الكيميائية بواسطة مرفق متخصص مرخص له، مع تزويد الرئاسة العامة للأرصاد وحماية البيئة بما يثبت ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتولي الجهات المختصة– حسب اختصاصها– القيام بما يأتي: 1 - الرقابة والتفتيش على المنشآت والمرافق التي تتعامل مع المواد الكيميائية؛ للتأكد من الالتزام بأحكام هذا النظام ولائحته وما يصدر من تعليمات تتعلق بالمواد الكيميائية .2 - ضبط مخالفات أحكام هذا النظام وإثباتها، وتحرير محضر بذلك. وتحدد اللائحة إجراءات ضبط المخالفات وإثباتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: '1 - مع عدم الإخلال بما تقضي به الأنظمة الأخرى من عقوبات أشد، يعاقب كل من يخالف أي حكم من أحكام هذا النظام بواحدة أو أكثر من العقوبات الآتية: أ - غرامة مالية لا تزيد على خمسمائة ألف ريال. ب - السجن مدة لا تزيد على خمس سنوات. ج - منع المخالف من استيراد المواد الكيميائية وإدارتها مدة لا تزيد على خمس سنوات. 2 - يجوز – إضافة على العقوبات السابقة – الحكم بإعادة المواد الكيميائية المستوردة محل المخالفة إلى مصدرها، أو إتلافها، وذلك على نفقة المخالف. 3 - في جميع الأحوال يلزم المخالف بإزالة الآثار المترتبة على المخالفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تختص هيئة التحقيق والادعاء العام بالتحقيق والادعاء العام في مخالفات أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يختص ديوان المظالم بالفصل في جميع المخالفات والمنازعات ودعاوى المطالبة بالتعويض الناشئة عن تطبيق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: 'لا يسري هذا النظام على ما يأتي: 1 - الأدوية.2 - المواد الكيميائية ذات الاستعمال المنزلي التي تحددها اللائحة.3 - المواد الكيميائية التي تستوردها القوات المسلحة مباشرة لأغراض عسكرية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'مع مراعاة ما تقضي به الأنظمة والاتفاقات الدولية، يصدر وزير الداخلية اللائحة التنفيذية لهذا النظام خلال مائة وثمانين يومًا من تاريخ نشره، بناء على توصية من لجنة تكون من: وزارة الداخلية، ووزارة الصحة، ووزارة التجارة والصناعة، ووزارة النقل، ووزارة الزراعة، ووزارة المياه والكهرباء، ووزارة التعليم العالي، ووزارة المالية (مصلحة الجمارك)، والرئاسة العامة للأرصاد وحماية البيئة، ومدينة الملك عبد العزيز للعلوم والتقنية، والهيئة العامة للطيران المدني، والهيئة العامة للاستثمار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/64aee787-4618-4979-b4d8-a9a700f1c647/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يعمل بهذا النظام بعد مائة وثمانين يومًا من تاريخ نشره في الجريدة الرسمية،
