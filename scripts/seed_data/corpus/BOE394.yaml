articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: المركز: المركز الوطني لنظم الموارد الحكومية. التنظيم: تنظيم المركز. الوزير: وزير المالية. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمركز. النظام الموحد: النظام الموحد للموارد الحكومية UGRP)). نظم الموارد الحكومية: النظم المالية والإدارية الإلكترونية للموارد الحكومية، التي تخدم الجهات الحكومية والأفراد وجهات القطاع الخاص المتعاملين مع تلك الجهات. وتتضمن هذه النظم: النظام الموحد، والنظم الإلكترونية الأخرى المتعلقة بالمالية والحسابات والميزانية العامة للدولة والمدفوعات الحكومية، والمنافسات والمشتريات الحكومية وعلاقات الموردين وسلاسل الإمداد، ونظم إدارة الأصول والمستودعات الحكومية، وفوترة وتحصيل الإيرادات الحكومية، ونظم الموارد البشرية وشؤون الموظفين والرواتب والخدمات الذاتية لطلبات الإجازة ومهمات العمل والتدريب والإركاب ونحوها. الجهات الحكومية: الجهات المشمولة بالميزانية العامة للدولة، والجهات المشمولة بتطبيق نظام المنافسات والمشتريات الحكومية،
    والمشمولة بتطبيق نظام إيرادات الدولة وأي أنظمة تصدر بخصوص نظم الموارد الحكومية. التشغيل التقني: عمليات الصيانة والتشغيل التقنية اليومية لنظم الموارد الحكومية، التي تشمل: تحديث وترقية البرمجيات والعتاد التقني الذي يكوّن تلك النظم، وإصلاح الأعطال ومراقبة الأداء، وتقديم الدعم الفني لمستخدمي تلك النظم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط -تنظيميًّا- بالوزير، ويكون مقره الرئيس في مدينة الرياض، وله إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى ما يلي: توفير نظم إلكترونية معيارية وموحدة لإدارة الموارد الحكومية، تدعم تكامل وتوحيد وتحسين الإجراءات بين الجهات الحكومية، وتدعم عمليات اتخاذ القرار عبر تحسين جودة البيانات والتقارير، بالتنسيق مع الجهات المعنية. المساهمة في مساندة الجهات الحكومية في تخطيط وإدارة مواردها المالية والبشرية وسلاسل الإمداد بكفاية وفاعلية. العمل على تحقيق كفاءة الإنفاق بالحد من تكرار بناء وتشغيل نظم الموارد الحكومية في الجهات. المساهمة في توحيد الضوابط والمعايير والإجراءات المتعلقة بنظم الموارد الحكومية في الجهات الحكومية، وتوفير المرونة والسرعة في الاستجابة لطلبات التغيير على تلك النظم، وقياس وتحليل الأثر المتوقع من تلك الطلبات. المساهمة في تحقيق الشفافية واكتشاف وتقليل الأخطاء والتجاوزات، ورفع مستوى سلامة ودقة البيانات والتقارير لعمليات المراجعة والرقابة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات الجهات ذات العلاقة، يتولى المركز الاختصاصات والمهمات الآتية: وضع السياسات والاستراتيجيات والخطط والبرامج ذات الصلة بنظم الموارد الحكومية وحوكمتها، وذلك بالتنسيق مع الجهات ذات العلاقة، واستكمال ما يلزم في شأنها. إدارة وحوكمة بيانات نظم الموارد الحكومية والاستفادة منها لتحقيق أهداف المركز، ووضع السياسات والإجراءات اللازمة لتحديد صلاحيات المستفيدين من تلك البيانات. إدارة الهويات الاعتبارية للمستفيدين من نظم الموارد الحكومية وفقاً للمواصفات والسياسات المعتمدة للنفاذ الوطني الموحد لجميع البوابات والخدمات الحكومية الإلكترونية. الاستفادة من البيانات التي يقوم المركز بإنتاجها، أو جمعها من المستفيدين من نظم الموارد الحكومية، ويشمل ذلك على سبيل المثال لا الحصر: معالجة البيانات، وتخزينها، وتحليلها، بما يحقق الأهداف الاستراتيجية للمركز. إدارة وحوكمة عمليات تصميم وتطوير إجراءات العمل التفصيلية في نظم الموارد الحكومية والتحسين المستمر لها، ووضع الضوابط والقواعد المتعلقة بهذه الإجراءات؛ والتنسيق في ذلك مع الجهات الحكومية المختصة. الإدارة والتصميم والتطوير والتشغيل
    التقني لنظم الموارد الحكومية. تصميم وتنفيذ وتشغيل وإدارة البنية التحتية لنظم الموارد الحكومية. تقديم الخدمات المتعلقة بنظم الموارد الحكومية إلى المستفيدين. تقديم خدمات التقارير والمعلومات ونماذج التحليل والتنبؤ المتعلقة بنظم الموارد الحكومية، إلى المستفيدين المصرح لهم. وضع المعايير والخطط والضوابط اللازمة لفرض تطبيق نظم الموارد الحكومية، بالتنسيق مع الجهات ذات العلاقة، وقياس مؤشرات الأداء للعمليات في نظم الموارد الحكومية. تقديم الخدمات الإلكترونية الداعمة إلى الجهات الحكومية؛ لإدارة مواردها الحكومية ولتحقيق تكامل الإجراءات وتبادل البيانات مع نظم الجهات الحكومية. ويشمل ذلك النظم الإلكترونية المركزية والداعمة لها، التي يحتاج إليها المركز لتحقيق أهدافه أو يكون لها دور في رفع كفاءة الإنفاق والتشغيل وتحقيق وفورات مالية للدولة. تقديم الخدمات الإدارية والاستشارية وإدارة المشاريع لصالح الجهات الحكومية؛ لتمكينها من استخدام نظم الموارد الحكومية. تقديم خدمات التدريب والدعم للمستفيدين من نظم الموارد الحكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة برئاسة الوزير وعضوية كل من: مدير مركز المعلومات الوطني. نائب وزير الموارد البشرية والتنمية الاجتماعية للخدمة المدنية. محافظ هيئة الحكومة الرقمية. ممثل عن وزارة الدفاع بالمرتبة الممتازة. مساعد وزير المالية للشؤون المالية. الرئيس التنفيذي للمركز الوطني لنظم الموارد الحكومية. ممثل على الأقل من ذوي الاختصاص يعين بأمر من رئيس مجلس الوزراء بناءً على اقتراح من الوزير وتكون مدة عضويته (ثلاث) سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للمركز، ويتولى الإشراف على شؤونه وإدارته وتصريف أموره، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق أهدافه وممارسة صلاحيته في حدود اختصاصات المركز، وله على وجه خاص ما يلي: إقرار السياسة العامة للمركز وخطة عمله وخططه التشغيلية، التي يسير عليها لتحقيق أغراضه، ومراجعتها، ومتابعة تنفيذها. وضع السياسات والإجراءات المناسبة لتطبيق النظام الموحد. الإشراف على تنفيذ النظام الموحد. استثناء الجهات الحكومية التي لديها أنظمة موارد حكومية مستقلة ولديها مبررات أمنية أو عملية، لمدة زمنية محددة؛ من تطبيق النظام الموحد عليها، لإبقاء أنظمتها مستقلة عنه. إقرار الهيكل التنظيمي للمركز. إقرار اللوائح الإدارية والمالية التي يسير عليها المركز، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وإقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. إقرار المقابل المالي الذي يتقاضاه المركز عن التراخيص والتصاريح وما يقدمه من أعمال وخدمات وفقاً لتنظيمه. الموافقة على إنشاء فروع ومكاتب للمركز داخل
    المملكة. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيداً لرفعها وفقاً للإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف التي تقدم إلى المركز، وفقاً للإجراءات النظامية المتبعة. تعيين مراجع حسابات خارجي معتمد (أو أكثر)، ومراقب مالي داخلي. الموافقة على إبرام الاتفاقيات والعقود بحسب الإجراءات النظامية المتبعة. وللمجلس تفويض بعض صلاحياته إلى الرئيس أو من يراه من أعضائه أو منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: للمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من غيرهم، يوكل إليها ما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ولتلك اللجان الاستعانة بمن تراه لتأدية المهمات الموكولة إليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تعقد اجتماعات المجلس في مقر المركز برئاسة الرئيس أو من ينيبه من ممثلي الجهات الحكومية الأعضاء في المجلس، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يجتمع المجلس -بناء على دعوة من رئيسه- مرة كل (ثلاثة) أشهر، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. وعلى الرئيس دعوة المجلس إلى الاجتماع إذا طلب ذلك نصف الأعضاء على الأقل. ويجب أن توجه الدعوة -كتابة- قبل الاجتماع بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول أعمال الاجتماع. لا يعد اجتماع المجلس صحيحاً إلا بحضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه من ممثلي الجهات الحكومية الأعضاء في المجلس. تصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين، وفي حال تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز أن تعقد اجتماعات المجلس عن بُعد، من خلال استخدام الوسائل التقنية. ويمكن أن تُتخذ القرارات عن طريق التمرير على الأعضاء، ويوقعون عليها بما يفيد باطلاعهم عليها. ولا تعد القرارات المتخذة بهذه الطريقة صحيحة ما لم يصوت عليها جميع الأعضاء، وتحز على موافقة ثلثي الأعضاء على الأقل. وتعرض القرارات
    المتخذة بهذه الطريقة على المجلس في أول اجتماع -لاحق- لإثباتها في محضر الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض أن يثبت اعتراضه مسبباً في المحضر. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. يجوز للمجلس أن يدعو من يراه من المختصين والمستشارين -سواء من داخل المملكة أو خارجها- لحضور اجتماعاته والاستعانة بهم، دون أن يكون لهم حق التصويت. يتولى أمين المجلس الإعداد لاجتماعات المجلس وإبلاغ أعضائه بمواعيدها وتهيئة محاضره وقراراته، وما يكلفه به المجلس أو الرئيس من مهمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يكون للمركز رئيس تنفيذي يعين ويعفى من منصبه بقرار من المجلس يحدد فيه أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة المركز وأعماله اليومية، وله على وجه الخصوص ممارسة الاختصاصات الآتية: الإشراف على سير عمل المركز من خلال اللوائح والخطط والبرامج المعتمدة. اقتراح السياسات العامة للمركز وخطة عمله وخططه التشغيلية، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. اقتراح هيكل المركز التنظيمي ولوائحه الإدارية والمالية، ورفعها إلى المجلس لإقرارها. إصدار القرارات اللازمة لتنفيذ ما يقتضيه التنظيم واللوائح والقواعد والإجراءات المعتمدة، وذلك بحسب الصلاحيات المفوضة إليه. الإشراف على إعداد مشروع ميزانية المركز، ومشروع حسابه الختامي، وتقريره السنوي، تمهيداً لعرضها على المجلس. تعيين العاملين في المركز وفقًا لما تحدده لوائح المركز، والإشراف عليهم. التعاقد مع الخبراء والمستشارين وبيوت الخبرة من داخل المملكة أو خارجها بما يخدم أهداف المركز واختصاصاته، وفقًا لما تحدده لوائح المركز، والإجراءات النظامية المتبعة. التوقيع على الاتفاقيات ومذكرات التفاهم والعقود وغيرها من الوثائق، بعد موافقة
    المجلس ووفقاً للإجراءات النظامية المتبعة. تمثيل المركز أمام الجهات القضائية والإدارية وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. الصرف من ميزانية المركز، واتخاذ جميع الإجراءات المالية، وفقاً للأنظمة واللوائح المعتمدة، وفي حدود الصلاحيات التي يفوضه بها المجلس. تقديم تقارير دورية إلى المجلس عن أعمال المركز ومنجزاته ونشاطاته، وما يواجهه من تحديات وما يراه من مقترحات لتحسين سير العمل. ما يسنده إليه المجلس من اختصاصات أو صلاحيات أخرى. وللرئيس التنفيذي تفويض بعض اختصاصاته وصلاحياته إلى من يراه من منسوبي المركز، وفقاً لما تحدده لوائح المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون موارد المركز المالية من الآتي: أ- ما يخصص له في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه المركز نظير التراخيص والتصاريح وما يقدمه من أعمال وخدمات. ج- الهبات والتبرعات والمنح والوصايا والأوقاف التي يقبلها المجلس. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية لدى البنك المركزي السعودي. يفتح المركز حساباً له في البنك المركزي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات من ميزانية المركز المعتمدة وفق لوائحه المالية والإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
