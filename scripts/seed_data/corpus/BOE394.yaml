- article_ref: المادة الثالثة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات المركز ومعاملاته وبياناته وميزانيته السنوية، وحسابه الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ومن ثم يزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يحل التنظيم محل الترتيبات التنظيمية للمركز الوطني لنظم الموارد الحكومية، الصادرة بقرار مجلس الوزراء رقم (682) وتاريخ 19 / 11 / 1442هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fa6e1c30-cf23-49ff-9573-b0d600a82c9f/1
  verified: false
