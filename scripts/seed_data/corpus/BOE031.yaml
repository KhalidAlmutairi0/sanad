regulation:
  code: BOE031
  name_ar: نظام استبدال الغرامة بالحبس
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: لا يجوز في تنفيذ الأحكام أن يستبدل الحبس بالغرامة، ويجوز أن تستبدل الغرامة بالحبس بالشروط والقيود التي يبينها هذا النظام.ويسمى الحبس الذي يعوض عن الغرامة بـ " الحبس التعويضي " في أحكام هذا النظام. ولمجلس الوزراء إذا اقتضت المصلحة العامة ذلك أن يستبدل التشغيل بالغرامة على أن يصدر قرار ينظم به أحوال هذا الاستبدال وشروطه وأحكامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f62643d0-eff3-43c2-8629-a9a700f18812/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يصدر قرار استبدال الغرامة بالحبس التعويضي من وزير الداخلية إذا اقتضت المصلحة العامة ذلك بشرط أن يثبت شرعا إعسار المحكوم عليه بالغرامة. ويكون استبدال الغرامة بالحبس بواقع عشرة ريالات لليوم الواحد من أيام الحبس المحكوم به على ألا تزيد مدة الحبس في مجموعها على سنة واحدة بالنسبة للغرامة الواحدة يسقط بعدها التزام المحكوم عليه بدفع أي مبلغ متبقي من تلك الغرامة. وإذا دفع المحكوم عليه - المحبوس حبسا تعويضيا - مبلغ الغرامة بعد حسم ما يعادل الأيام التي قضاها في الحبس وجب إطلاق سراحه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f62643d0-eff3-43c2-8629-a9a700f18812/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: إذا أصدر الحاكم الشرعي حكما بالغرامة والحبس بمقتضى سلطة التعزير فإن حق إصدار قرار استبدال الغرامة بالحبس التعويضي يكون لرئاسة مجلس الوزراء في حدود الأسس التي تبينها أحكام هذا النظام.أما إذا صدر حكم الحاكم الشرعي بمقتضى سلطة التعزير بالغرامة فقط، فيكون استبدالها بالحبس بقرار من وزير الداخلية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f62643d0-eff3-43c2-8629-a9a700f18812/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: إذا تعددت الغرامات المحكوم بها على الشخص في مدة سنة واحدة فيمكن استبدال أكبرها مبلغا فقط طبقا لأحكام هذا النظام، ويلزم المحكوم عليه بدفع بقية الغرامات، على أنه إذا كانت أكبرها تقل عن المبلغ الذي يوفيه الحبس التعويضي لمدة سنة يجوز أن تجمع إليها غرامة أو أكثر من تلك الغرامات حتى يبلغ الحبس التعويضي سنة واحدة، وكل غرامة دخلت كلها أو بعضها في مدة الحبس التعويضي تسقط عن المحكوم عليه، أما باقي الغرامات فيلزم بدفعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f62643d0-eff3-43c2-8629-a9a700f18812/1
  verified: false
