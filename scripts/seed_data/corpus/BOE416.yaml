  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني الموضحة أمام كل منها، ما لم يقتض السياق غير ذلك: المركز: المركز الوطني لتنمية القطاع غير الربحي. المجلس: مجلس إدارة المركز. الرئيس التنفيذي: الرئيس التنفيذي للمركز. التنظيم: تنظيم المركز. القطاع غير الربحي: منظومة الأنشطة الأهلية والخدمات التطوعية والمنظمات غير الحكومية، التي لا تقصد الربح أساساً، وتهدف إلى تحقيق غرض من أغراض البر أو التكافل أو التعاون أو التنمية الاجتماعية أو غيرها من أغراض النفع العام أو المخصص. منظمات القطاع غير الربحي: أي مجموعة أو كيان غير حكومي، ذي تنظيم مستمر، يهدف إلى تحقيق غرض غير ربحي أساساً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية والاستقلال المالي والإداري، ويرتبط برئيس مجلس الوزراء، ويكون مقره الرئيس في مدينة الرياض، وله -بقرار من المجلس- إنشاء فروع داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى تنظيم دور منظمات القطاع غير الربحي وتفعيله وتوسيعه في المجالات التنموية، والعمل على تكامل الجهود الحكومية في تقديم خدمات الترخيص لتلك المنظمات، والإشراف المالي والإداري والفني على القطاع، وزيادة التنسيق والدعم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات الجهات الأخرى، للمركز القيام بكل ما يلزم في سبيل تحقيق أهدافه وفق التنظيم، ومن ذلك ما يأتي: إعداد الاستراتيجيات والخطط والبرامج ومؤشرات الأداء ذات العلاقة بالقطاع غير الربحي، والتحقق من مدى فاعليتها، وإعداد تقارير دورية عن ذلك. إصدار ما يستلزمه تنظيم القطاع غير الربحي من لوائح وقواعد وأدلة ومعايير وفق ما تقضي به أنظمة القطاع وسياساته. إصدار التراخيص والتصاريح لمنظمات القطاع غير الربحي، وفق ما تقضي به الأنظمة ذات العلاقة، بالتنسيق مع الجهة المختصة والجهات المشرفة التي يدخل نشاط تلك المنظمات في نطاق إشرافها. الإشراف المالي والإداري على منظمات القطاع غير الربحي، وتصنيفها، والعمل على حوكمتها وفق أفضل المعايير العالمية. التنسيق والتكامل مع الوحدات الإشرافية في الجهات الحكومية التي يدخل نشاط منظمات القطاع غير الربحي في نطاقها، لتفعيل وتطوير الإشراف الفني على أنشطة القطاع ومنظماته، وتسهيل وتسريع تأسيس منظمات القطاع المتخصصة، وتشجيع العمل غير الربحي وتفعيل دوره وتوسيعه في المجالات التنموية. نشر ثقافة التطوع، وتشجيع العمل التطوعي، وتنظيمه وتمكينه، بما يحقق
    زيادة الفرص التطوعية وتنوعها، وزيادة عدد المتطوعين. العمل على تحسين كفاية منظمات القطاع غير الربحي وفاعليتها، وإزالة ما يواجهها من معوقات، وتقديم الدعم الإداري والفني لها، وبناء قدرات العاملين فيها، وتصميم وتنفيذ البرامج اللازمة لذلك بالشراكة مع الجهات الحكومية والقطاعين الخاص وغير الربحي. الإشراف على الدعم المادي المقدّم لمنظمات القطاع غير الربحي بالتنسيق مع الجهات الداعمة، والعمل على توجيه الدعم بما يحقق الأولويات والخطط التنموية ويدعم الاستدامة المالية لهذه المنظمات. حوكمة جمع منظمات القطاع غير الربحي للتبرعات وما تقيمه من حملات، وفق ما تقضي به الأنظمة ذات العلاقة. نشر الوعي بأهمية القطاع غير الربحي، وتحفيز المساهمة فيه بمختلف أشكالها، وإقامة المعارض والمؤتمرات والندوات ذات الصلة، والمشاركة فيها. إجراء وتشجيع البحوث والدراسات والإحصاءات المتعلقة بالقطاع غير الربحي ونشرها، بالتنسيق والشراكة مع الجهات ذات العلاقة، وإنشاء قاعدة بيانات القطاع ومنظماته وبرامجه واحتياجاته وأولوياته. إنشاء حاضنات ومسرعات الأعمال الاجتماعية والحاويات الفكرية لمنظمات القطاع غير الربحي وتنظيمها، وتحفيز القطاعين
    غير الربحي والخاص لإنشائها. تفعيل دور القطاع غير الربحي في تحقيق أهداف التنمية المستدامة. تفعيل الاستثمار ذي الأثر الاجتماعي، وتحفيز المساهمة فيه. تقديم الخدمات الاستشارية والتدريبية ذات الصلة باختصاصه، وله أخذ مقابل لذلك. تمثيل المملكة في المنظمات والمنتديات الدولية والإقليمية ذات الصلة باختصاصه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'أولاً: يكون للمركز مجلس إدارة برئاسة وزير الموارد البشرية والتنمية الاجتماعية، وعضوية كل من: ممثل من وزارة الموارد البشرية والتنمية الاجتماعية. ممثل من وزارة الداخلية. ممثل من وزارة المالية. ممثل من وزارة التجارة. ممثل من الهيئة العامة للأوقاف. ممثلين عن الجمعيات الأهلية يرشحهما رئيس مجلس إدارة المركز بالتنسيق مع مجلس الجمعيات الأهلية. ممثل من المؤسسات الأهلية يرشحه رئيس مجلس إدارة المركز بالتنسيق مع مجلس المؤسسات الأهلية. ممثل من الجمعيات التعاونية يرشحه رئيس مجلس إدارة المركز بالتنسيق مع مجلس الجمعيات التعاونية. ممثل من القطاع الخاص من المهتمين والداعمين للقطاع غير الربحي، يرشحه رئيس مجلس إدارة المركز بالتنسيق مع مجلس الغرف السعودية. اثنين من ذوي الخبرة والاختصاص في مجال عمل المركز يرشحهما رئيس مجلس إدارة المركز. ثانياً: يجب ألا تقل مرتبة ممثلي الجهات الحكومية في المجلس عن (الرابعة عشرة) أو ما يعادلها. ثالثاً: يعين الأعضاء المشار إليهم في الفقرات (6) و(7) و(8) و(9) و(10) بقرار من مجلس الوزراء، لمدة ثلاث سنوات قابلة للتجديد مرة واحدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للمركز، ويتولى الإشراف عليه وتصريف أموره، وله اتخاذ جميع القرارات اللازمة لتحقيق أغراضه في حدود أحكام التنظيم، وله على وجه خاص القيام بالآتي: إقرار الاستراتيجيات والخطط والبرامج ومؤشرات الأداء ذات العلاقة بالقطاع غير الربحي، ومراجعتها، وتقويمها، والعمل على تطويرها وتحديثها، والرفع بذلك وفقاً للإجراءات النظامية المتبعة. اقتراح مشروعــات الأنظمة ذات العــلاقة باختصــاصات المركز، وكذلك اقتراح تعديــل المعمول به منها. إقرار ما يستلزمه تنظيم القطاع غير الربحي من تنظيمات ولوائح وقواعد وأدلة ومعايير، وفق ما تقضي به أنظمة القطاع وسياساته. إقرار قواعد وآليات إصدار التراخيص والتصاريح التي تدخل في اختصاصات المركز. إقرار هيكل المركز التنظيمي. إقرار اللوائح المالية للمركز بالاتفاق مع وزارة المالية. إقرار اللوائح الإدارية المنظمة لشؤون منسوبي المركز، بالاتفاق مع وزارة المالية فيما يتعلق بالأحكام ذات الأثر المالي الواردة فيها. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقریر مراجع الحسابات، والتقرير السنوي، تمهيداً لرفعها وفق الإجراءات النظامية المتبعة.
    تحديد المقابل المادي للأعمال والخدمات التي يقدمها المركز في مجال اختصاصه. الموافقة على إنشاء حاضنات ومسرعات الأعمال الاجتماعية والحاويات الفكرية لمنظمات القطاع غير الربحي. الموافقة على إقامة المعارض والمؤتمرات والندوات ذات الصلة بمهمات المركز، وفق الإجراءات المنظمة لذلك. إقرار ضوابط استعانة المركز بالخبرات والمكاتب الاستشارية المحلية والأجنبية للدراسات والبحوث. اعتماد خطة العمل السنوية وخطط المركز التشغيلية. تعيين مراجع حسابات خارجي معتمد، وتعيين مراقب مالي داخلي. الموافقة على تعيين شاغلي الوظائف القيادية في المركز، ومدير وحدة المراجعة الداخلية. قبول التبرعات والهبات والوصايا والمنح والأوقاف والإعانات. تشكيل لجان دائمة أو مؤقتة من بين أعضائه أو من غيرهم، يعهد إليها بما يراه من مهمات، ويحدد في قرار تكوين كل لجنة اختصاصاتها ورئيسها وأعضاؤها، ويكون لها الاستعانة بمن تراه في تأدية المهمات الموكولة إليها، ما لم يقرر المجلس غير ذلك. وللمجلس تفويض بعض صلاحياته إلى من يراه من أعضائه أو من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس مرة – على الأقل – كل ثلاثة أشهر بناء على دعوة من رئيسه، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس، أو بناء على طلب من ثلث أعضائه على الأقل. يجوز لرئيس المجلس إنابة أحد أعضاء المجلس من ممثلي الجهات الحكومية؛ ليرأس اجتماعات المجلس حال غيابه. يجب على رئيس المجلس توجيه الدعوة إلى الاجتماع كتابياً، مع تحديد تاريخ الاجتماع ومكان انعقاده، وتسلم الدعوة باليد أو عبر وسائل الاتصال الحديثة للعضو قبل عقد الاجتماع بسبعة أيام على الأقل. ويجب أن تتضمن الدعوة جدول الأعمال وجميع الوثائق ذات الصلة ببنوده. يشترط لصحة انعقاد المجلس حضور أغلبية الأعضاء على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. لا يجوز للعضو الامتناع عن التصويت ولا تفويض شخص آخر للتصويت عنه عند غيابه. وللعضو الحاضر تسجيل اعتراضه الذي أبداه في الجلسة وأسباب الاعتراض ضمن محضر المجلس. تدون مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز – عند الحاجة وفي الحالات المستعجلة وفق تقدیر
    رئيس المجلس – عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية أو بالتمرير على أعضاء المجلس والتوقيع عليها عند تمريرها بما يفيد اطلاع جميع الأعضاء عليها، ولا تعد القرارات الصادرة بهذه الطريقة صحيحة إلا بتمريرها على أعضاء المجلس جميعهم، وتصويتهم عليها، وحصولها على غالبية أصواتهم على الأقل. يجوز للمجلس توجيه الدعوة، من خلال رئيس المجلس، إلى من يراه من ممثلي الجهات الحكومية غير الممثلة في المجلس، أو خبراء، أو متخصصين، لحضور اجتماعات المجلس؛ دون أن يكون لهم حق التصويت. لا يجوز للعضو ولا لأي شخص يحضر جلسات المجلس أن يفشي شيئاً مما وقف عليه من أسرار المركز بسبب عضويته في المجلس أو حضوره لاجتماعاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي، يكون تعيينه وإعفاؤه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، وهو المسؤول التنفيذي عن إدارة المركز، وتتركز مسؤولياته في حدود التنظيم وما يقرره المجلس، ويمارس الاختصاصات الآتية: الإشراف عــلى سير عمـــل المركز، والعامـــلين فيه، وفقاً للصــلاحيات المنوطــة به ومــا تحدده لوائح المركز. التحضير لاجتماعات المجلس، والدعوة إليها، والإشراف على إعداد محاضر المجلس وقراراته، ومتابعة تنفيذها بعد اعتمادها. اقتراح الاستراتيجيات والخطط والبرامج ومؤشرات الأداء ذات العلاقة بالقطاع غير الربحي، والإشراف على تنفيذها بعد إقرارها. اقتراح ما يستلزمه تنظيم القطاع غير الربحي من تنظيمات ولوائح وقواعد وأدلة ومعايير، وفق ما تقضي به أنظمة القطاع وسياساته، والإشراف على تنفيذها بعد إقرارها. اقتراح هيكل المركز التنظيمي، ولوائحه الإدارية والمالية، ولوائحه الداخلية الأخرى، والإشراف على تنفيذها بعد إقرارها. الإشراف على إعداد مشروع ميــزانــيـــة المركز وحســـابه الختامي والتقرير السنوي، ورفــعــها إلى المجلس. إصدار أوامر الصرف وفق ميزانية المركز السنوية المعتمدة،
    واتخاذ جميع الإجراءات المالية وفق الأنظمة واللوائح المالية، وفي حدود الصلاحيات التي فوضه بها المجلس. تعيين منسوبي المركز وفق اللوائح المنظمة لذلك، والإشراف عليهم. إعداد تقارير دورية عن أعمال المركز وإنجازاته ونشاطاته والمعوقات التي تواجهه، ورفعها إلى المجلس؛ تمهيداً لاستكمال ما يلزم في شأنها. تمثيل المركز أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات، وغيرها من الجهات داخل المملكة أو خارجها، وله تفويض غيره. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، ووفقاً للإجراءات النظامية المتبعة. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي -بعد موافقة المجلس- تفويض بعض اختصاصاته إلى غيره من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع جميع منسوبي المركز لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتكون موارد المركز مما يأتي: أ- ما يخصص له من اعتمادات في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه عن الأعمال والخدمات التي يقدمها. ج- التبرعات والهبات والوصايا والمنح والأوقاف والإعانات التي يقبلها المجلس. د- أي مورد آخر يقره مجلس الإدارة بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات المركز في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المركز حساباً له في البنك المركزي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانيته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي، ويحدد المجلس أتعابه. ويُرفع تقریر مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يرفع المركز إلى مجلس الوزراء حسابه الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يرفع المركز إلى مجلس الوزراء -خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية- تقريراً سنوياً عما حققه من إنجازات وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/3e63e522-900b-48a8-9843-ad4600902324/1
  verified: false
