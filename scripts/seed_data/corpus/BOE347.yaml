  name_ar: تنظيم دارة الملك عبدالعزيز
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبنية أمام كل منها، ما لم يقتض السياق غير ذلك: الدارة: دارة الملك عبدالعزيز. المجلس: مجلس إدارة الدارة. الرئيس: رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الدارة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض؛ ولها إنشاء فروع ومكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: الدارة هي مرجع أساس لتاريخ المملكة العربية السعودية وتراثها، وتهدف إلى خدمة تاريخ وتراث المملكة والعالمين العربي والإسلامي، من خلال المحافظة على المعرفة التاريخية وتعزيزها محلياً ودولياً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع عدم الإخلال باختصاصات الجهات الأخرى، للدارة في سبيل تحقيق أغراضها -دون حصر- الاختصاصات الآتية: 1- توثيق المصادر والمعلومات التاريخية المتعلقة بالمملكة العربية السعودية والعالمين العربي والإسلامي بجميع أنواعها، وجمعها وأرشفتها وإتاحتها للجمهور، بما فيها الوثائق، والكتب، والمخطوطات، والصور، والأفلام، والروايات، والصحف، والخرائط، والبرامج الرقمية، وغيرها. 2- إعداد البحوث والدراسات في مجال عمل الدارة، والقيام بأعمال النشر والترجمة، وتشجيع الباحثين في هذا المجال ودعم دراساتهم وبحوثهم وأنشطتهم. 3- إقامة المعارض والملتقيات، وعقد الندوات العلمية وجلسات العمل في مجال عمل الدارة, وفقًا للإجراءات النظامية المتبعة. 4- إعداد البرامج والتطبيقات عن التاريخ والتراث الوطني والعربي والإسلامي. 5- تنفيذ مبادرات التواصل والإعلام لنشر التاريخ الوطني والعربي والإسلامي. 6- بناء شراكات فعّالة محلية وعالمية لتطوير البرامج البحثية المشتركة، وتبادل المواد التاريخية، وتعزيز التواصل، وفقاً للإجراءات النظامية المتبعة. 7- إنشاء القاعات التذكارية والمتاحف وإدارتها، وإدارة القصور الملكية التاريخية.
    8- المحافظة على المواد التاريخية بجميع أنواعها، بما في ذلك القيام بأعمال الترميم والتعقيم والمعالجة. 9- تقديم المشورة والتدريب لمختلف الجهات الحكومية والخاصة والأفراد فيما يتعلق بالمعلومات والمواد التاريخية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1- يكون للدارة مجلس إدارة يُشكل من رئيس يعين بأمر ملكي، وعضوية كل من: أ‌. الرئيس التنفيذي. ب‌. أربعة - على الأقل - يمثلون جهات حكومية ذات علاقة، لا تقل مرتبة أي منهم عن (الرابعة عشرة) أو ما يعادلها. ج. عدد لا يتجاوز (ثمانية) من ذوي الخبرة في مجال عمل الدارة. 2- يصدر بتحديد الجهات الحكومية المشار إليها في الفقرة (ب/1) وتعيين الأعضاء المشار إليهم في الفقرة (ج/1) قرار من مجلس الوزراء بناء على ترشيح الرئيس، وتكون مدة عضويتهم ثلاث سنوات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'يتولى المجلس إدارة شؤون الدارة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود أحكام هذا التنظيم، وله على وجه خاص ما يأتي: 1- وضع الاستراتيجيات والسياسات والخطط ذات الصلة بمجال عمل الدارة، والإشراف على تنفيذها. 2- وضع مؤشرات الأداء اللازمة لتحقيق أهداف الدارة ومتابعتها، بالتنسيق مع الجهات المعنية. 3- إقرار اللوائح الإدارية, والمالية -بالاتفاق مع وزارة المالية-, وغيرها من اللوائح الداخلية. 4- إقرار الهيكل التنظيمي للدارة، ورفعه لاستكمال الإجراءات النظامية لاعتماده. 5- النظر في التقارير الدورية التي تقدم عن سير العمل في الدارة. 6- الموافقة على مشروع ميزانية الدارة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. 7- تحديد المقابل المالي للخدمات التي تقدمها الدارة في مجال اختصاصها. 8- تعيين مراجع حسابات خارجي ومراقب مالي داخلي. 9- قبول الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف، وفقاً للأحكام المنظمة لذلك. 10- الموافقة على فتح فروع ومكاتب للدارة داخل المملكة. وللمجلس تشكيل لجان دائمة أو مؤقتة
    من بين أعضائه أو من سواهم، ويعهد إليها بما يـراه من مهمات. ويحدد قرارُ تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ولتلك اللجان الاستعانة بمن تراه لتأدية المهمات المنوطة بها. وله تفويض بعض مهماته إلى الرئيس التنفيذي أو إلى من يراه من مسؤولي الدارة، وفقاً لما يقتضيه سير العمل فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- يجتمع المجلس بناءً على دعوة من الرئيس أربع مرات في السنة على الأقل، أو كلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس. 2- ينعقد المجلـس بحضـور ثلث أعضـائه على الأقل، بمن فيهم الرئيس أو من ينيبه من أعضاء المجلس، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل, وعند التساوي يرجح الجانب الذي صوت مع رئيس الاجتماع. 3- للرئيس دعوة من يراه لحضور اجتماعات المجلس، دون أن يكون له حق التصويت. 4- لا يجوز لأي عضو الامتناع عن التصويت ولا أن يفوض عضوًا آخر للتصويت نيابة عنه عند غيابه. 5- لا يجوز لأي عضو أن يفشي شيئًا من أسرار الدارة اطلع عليه بسبب عضويته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للدارة رئيس تنفيذي يعين في منصبه ويعفى منه بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، ويكون المسؤول التنفيذي عن إدارة الدارة، وتتركز مسؤولياته في حدود ما ينص عليه هذا التنظيم، وما يقرره المجلس، وله بوجه خاص مباشرة الاختصاصات الآتية: 1- اقتراح استراتيجيات وسياسات وخطط الدارة وبرامجها، ورفعها إلى المجلس، ومتابعة تنفيذها بعد إقرارها. 2- اقـتراح الهيكل التنظيمي للدارة، ورفعه إلى المجلس لإقراره. 3- اقتراح اللوائح المالية والإدارية للدارة وغيرها من اللوائح الداخلية، ورفعها إلى المجلـس لإقرارها، والإشراف على تنفيذها بعد إقرارها. 4- تقديم تقارير دورية إلى المجلس عن أعمال الدارة ومنجزاتها وأنشطتها. 5- الإشراف على إعداد مشروع ميزانية الدارة، وحسابها الختامي، والتقرير السنوي، ورفعها إلى المجلس مع تقرير مراجع الحسابات لاتخاذ ما يلزم بشأنها. 6- تعيين العاملـين في الـدارة والإشـراف عليهم؛ طبقاً للصلاحيات الممنوحة له وما تحدده اللوائح. 7- إصدار الأوامر بمصروفات الدارة، وفقًا للوائح المالية. 8- التوقيع على الاتفاقيات والعقود، بعد موافقة المجلس، ووفقًا للإجراءات النظامية
    المتبعة. 9- تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. 10- تمثيل الدارة أمام القضاء, ولدى الجهات الحكومية والمؤسسات الأخرى ذات العلاقة, وغيرها من الجهات داخل المملكة وخارجها, وله تفويض غيره في ذلك. 11- التعاقـد مع الخبراء والمتخصصين، وفقاً لاحتياجـات الدارة بحسب لوائحها الداخلية. 12- إصـدار القرارات اللازمة لتنفيذ أحكام هذا التنظيم واللوائـح الصادرة بناءً عليه، وذلك بحسب الصلاحيات المفوضة له. وللرئيس التنفيذي تفويض بعض مهماته وصلاحياته إلى من يراه من منسوبي الدارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 1- يكون للدارة ميزانية سنوية مستقلة. 2- السنة المالية للدارة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتألف موارد الدارة مما يأتي: ‌1- ما يخصص لها في الميزانية العامة للدولة. ‌2- ما يقبله المجلس من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف. ‌3- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها. 4- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تودع جميع إيرادات الدارة في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: تفتح الدارة حساباً لها في مؤسسة النقد العربي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويتم الصرف من هذه الحسابات وفق ميزانية الدارة المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخضع منسوبو الدارة لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الدارة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يحل هذا التنظيم محل نظام دارة الملك عبدالعزيز، الصادر بالمرسوم الملكي رقم (م/45) وتاريخ 5 / 8 / 1392 هـ، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/884a0f1e-1e36-4ba3-9574-a9f6010f31ce/1
  verified: false
