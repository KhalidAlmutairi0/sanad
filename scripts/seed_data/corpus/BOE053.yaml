regulation:
  code: BOE053
  name_ar: نظام البيانات التجارية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يعد بيانا تجاريا - فيما يختص بتطبيق أحكام هذا النظام - كل إيضاح يتعلق بصفة مباشرة أو غير مباشرة بما يأتي: أ - عدد البضائع، أو مقدارها، أو مقاسها، أو كيلها، أو طاقتها، أو وزنها، أو تاريخ الإنتاج، أو تاريخ انتهاء الصلاحية ب- الجهة ، أو البلاد التي صنعت أو أنتجت فيها. ج- العناصر الداخلة في تركيبها. د- اسم المنتج أو الصانع ، أو صفاته. هـ- وجودء براءات اختراع أو غيرها من حقوق الملكية الصناعية أو أي امتيازات أو جوائز أو مميزات تجارية أو صناعية. و- الاسم أو الشكل الذي تعرف به بعض البضائع أو تقوم به عادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجب أن يكون البيان التجاري مكتوبا باللغة العربية على الأقل، ومطابقا للحقيقة من جميع الوجوه، سواء أكان موضوعا على المنتجات ذاتها أم على المحال، أو المخازن، أو على عناوينها، أو الأغلفة، أو الفواتير، أو أوراق الخطابات، أو وسائل الإعلان أو غير ذلك مما يستعمل في عرض البضائع على الجمهور.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: لا يجوز ذكر ميداليات أو دبلومات أو جوائز أو درجات فخرية من أي نوع إلا بالنسبة للمنتجات التي تنطبق عليها هذه المميزات، وبالنسبة للأشخاص والأسماء التجارية الذين اكتسبوها أو لمن آلت إليهم حقوقها، ويجب أن يشتمل ذلك على بيان صحيح بتاريخها، ونوعها، والجهة التي منحتها. ولا يجوز لمن اشترك مع آخرين في عرض منتجات أن يستعمل لمنتجاته الخاصة المميزات التي منحت للمعروضات المشتركة، ما لم يبين بطريقة واضحة مصدر تلك المميزات ونوعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: لا يجوز وضع اسم البائع أو عنوانه على منتجات واردة من بلد غير البلد الذي يحصل فيها البيع، ما لم يكن مقترنا ببيان دقيق مكتوب بحروف ظاهرة عن البلد أو الجهة التي صنع أو أنتج فيها. ولا يجوز للأشخاص المقيمين في جهة ذات شهرة خاصة في إنتاج بعض المنتجات أو صنعها من الذين يتجرون في منتجات مشابهة واردة من جهة أخرى- أن يضعوا عليها علاماتهم إذا كان من شأنها أن تضلل الجمهور فيما يتعلق بمصدر تلك المنتجات حتى ولو كانت العلامات لا تشتمل على أسماء هؤلاء الأشخاص أو عناوينهم، ما لم تتخذ التدابير الكفيلة بمنع كل لبس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لا يجوز للصانع أن يستعمل اسم الجهة التي يوجد له بها مصنع رئيس فيما يصنع لحسابه من منتجات في جهة أخرى، ما لم يقترن هذا الاسم ببيان الجهة الأخرى على وجه يمتنع معه كل لبس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: إذا كان مقدار المنتجات أو مقاسها أو كيلها أو طاقتها أو وزنها أو مصدرها أو العناصر الداخلة في تركيبها من العوامل التي لها دخل في تقدير قيمتها جاز بقرار يصدر من وزيرالتجارة منع استيراد تلك المنتجات أو بيعها، أو عرضها للبيع، ما لم تحمل بيانا أو أكثر من هذه البيانات. وتحدد بقرار يصدر من وزيرالتجارة الكيفية التي توضع بها البيانات على المنتجات والإجراءات التي يستعاض بها عند عدم إمكانية ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: مع عدم الإخلال بأي عقوبة أشد يعاقب من يخالف أحكام هذا النظام بغرامة مالية لا تزيد على مائة ألف ريال، وفي حالة العود تضاعف العقوبة مع غلق المحل لمدة لا تزيد على سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يتولى موظفو وزارة التجارة المختصون ضبط ما يقع من مخالفات لأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تختص هيئة التحقيق والادعاء العام بالتحقيق فيما يقع من مخالفات لأحكام هذا النظام والادعاء فيها أمام الجهة القضائية المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يختص ديوان المظالم بالفصل في المخالفات والمنازعات الناشئة عن تطبيق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز لديوان المظالم أن يحكم بمصادرة الأشياء المحجوزة، وبيع ما يمكن بيعه منها، وخصم قيمته من التعويضات والغرامات التي قد يحكم بها، وبإتلاف الباقي منها، أو التصرف فيه بأي طريقة يراها مناسبة. كما يجوز للديوان أن يحكم بنشر القرار الصادر بالإدانة أو المصادرة أو الإتلاف في إحدى الصحف اليومية الصادرة في منطقة إقامة المحكوم عليه وعلى نفقته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال بحق ذوي الشأن في المطالبة بالتعويض عن الأضرار الناشئة عن استخدام بيانات غير مطابقة للحقيقة، يجوز لهم في أي وقت، ولو كان ذلك قبل رفع أي دعوى، اللجوء إلى ديوان المظالم لاتخاذ الإجراءات التحفظية اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يصدر وزيرالتجارة اللائحة التنفيذية والقرارات اللازمة لتنفيذ أحكام هذا النظام خلال مائة وثمانين يوما من تاريخ صدوره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/95a6369d-d712-4028-842e-a9a700f1a957/1
  verified: false
