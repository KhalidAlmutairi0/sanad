regulation:
  code: BOE264
  name_ar: نظام وظائف مباشرة الأموال العامة
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية - أينما وردت في هذا النظام - المعاني المبينة أمام كل منها، ما لم يقتض السياق خلاف ذلك: الأموال العامة : أموال الدولة (النقدية، والعينية) التي في عهدة الموظفين المشمولين بأحكام هذا النظام. الجرد : التحقق من تطابق ما تظهره السجلات والأرصدة والنظم الآلية مع ما في الصناديق، والمستودعات، وما تبقى من عهد. لائحة الجرد والمحاسبة : لائحة تحدد إجراءات الجرد والمحاسبة والنماذج اللازمة لذلك. الوزارة : وزارة المالية. الوزير : وزير المالية. اللائحة : اللائحة التنفيذية لهذا النظام. السنة : السنة الهجرية. الجهة : كل وزارة، أو مصلحة عامة، أو مؤسسة عامة، أو هيئة عامة، أو ما في حكمها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1 - تسري أحكام هذا النظام على من يمارس مباشرة الأموال العامة وحفظها من منسوبي الجهة المنصوص عليها في هذا النظام. 2 - تحدد اللائحة أسماء الوظائف الخاضعة لنظام الخدمة المدنية المشمولة بأحكام هذا النظام، وذلك بالتنسيق بين الوزارة ووزارة الخدمة المدنية. 3 - تحدد المؤسسات والهيئات العامة وما في حكمها (التي لا يخضع منسوبوها لنظام الخدمة المدنية) أسماء الوظائف ذات الصلة بمباشرة الأموال العامة وحفظها، وتدرج تلك الأسماء - بعد أن تعتمدها مجالس إداراتها أو ما في حكمها - في لوائحها ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: على الجهة جرد موجودات الصندوق مرة كل ثلاثة أشهر، وجرد المستودع والعهدة العينية مرة كل سنة؛ وفقًا للإجراءات والضوابط التي تحددها لائحة الجرد والمحاسبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: على الجهة استخدام الوسائل الإلكترونية التي تضبط مدخلات الصناديق والمستودعات، ومخرجاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'مع مراعاة ما تقضي به الشروط المقررة نظامًا، يشترط فيمن يمارس مهمات إحدى الوظائف المشمولة بأحكام هذا النظام ما يأتي: 1 - أن يكون سعودي الجنسية. 2 - ألا يقل عمره عن إحدى وعشرين سنة.3 - ألا يكون قد صدر في حقه حكم نهائي بالإدانة في جريمة مُخلة بالأمانة أو الشرف.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تصرف الجهة لمن يمارس مهمات إحدى الوظائف المشمولة بأحكام هذا النظام؛ مكافأة سنوية تعادل راتب شهرين من راتبه الأساس وفق الدرجة والمرتبة التي يشغلها؛ إذا تحققت الشروط الآتية: 1 - إكمال الموظف سنة متصلة في الوظيفة.2 - إتمام إجراءات الجرد والمحاسبة النظامية.3 - الحصول على شهادة تبرئة ذمة من الجهة التي يعمل فيها، مصدقة من ديوان المراقبة العامة، وهيئة الرقابة والتحقيق. وتحدد لائحة الجرد والمحاسبة النماذج اللازمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'استثناءً من حكم الفقرة (1) من المادة (السادسة) من هذا النظام، تصرف الجهة لمن مارس مهمات إحدى الوظائف المشمولة بأحكام هذا النظام المكافأة كاملة عن السنة - ولو انقضى جزء منها - في الحالات الآتية: 1 - الوفاة.2 - العجز الكلي أو الجزئي الذي يحول بصفة دائمة دون مباشرة أعمال الوظيفة؛ بعد ثبوت هذا العجز وفقًا للإجراءات النظامية.3 - النقل من الوظيفة دون طلب الموظف ودون ارتكابه مخالفة، أو لترقيته إلى وظيفة أخرى.وتحدد اللائحة الضوابط والإجراءات اللازمة لذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعد عدم إجراء الجرد والمحاسبة في المواعيد المقررة في المادة (الثالثة) من هذا النظام، أو إجراؤه بطريقة غير نظامية؛ مخالفة إدارية، وتقع مسؤولية ذلك على المسؤول الإداري المباشر عن إجراء الجرد - أو من يقوم مقامه، أو يمارس اختصاصاته - في الجهة التي يتبع لها الصندوق، أو المستودع، أو العهد العينية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعد عدم توافر المستندات اللازمة لإجراء الجرد والمحاسبة مخالفة إدارية، تقع مسؤوليتها على من يمارس مهمات إحدى الوظائف المشمولة بأحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: دون إخلال بما يقضي به أي نظام آخر من إجراءات أو جزاءات، إذا ثبت أن هناك عجزًا مقصودًا، أو ناتجًا من إهمال عند الجرد والمحاسبة؛ يمنع الموظف المشمولة وظيفته بأحكام هذا النظام من تولي أي وظيفة مشمولة بأحكامه، وتحدد اللائحة الأحكام الخاصة بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز للوزير المختص أو رئيس الجهة المستقلة أن يكلف موظفًا - ممن تكون له خبرة سابقة في الأعمال المالية لا تقل عن سنتين - بالقيام بأعمال أي من الوظائف المشمولة بهذا النظام، على أن يكون ذلك لمدة مؤقتة لا تزيد على سنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجوز - بقرار من الوزير المختص أو رئيس الجهة المستقلة - صرف عهدة (نقدية، أو عينية) للموظف المعين على وظيفة غير مشمولة بأحكام هذا النظام، وتحدد اللائحة قيمة العهدة، وضوابط صرفها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام، ويصدر رئيس ديوان المراقبة العامة لائحة الجرد والمحاسبة، وذلك خلال مدة لا تتجاوز (مائة وثمانين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يحل هذا النظام محل نظام وظائف مباشرة الأموال العامة، الصادر بالمرسوم الملكي رقم (م/77) وتاريخ 23 / 10 / 1395هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعمل بهذا النظام بعد مضي (مائة وثمانين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/fd30f9c7-8606-4367-bb22-a9a700f2d952/1
  verified: false
