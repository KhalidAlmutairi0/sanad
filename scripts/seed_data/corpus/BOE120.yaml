articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالمصطلحات والعبارات الآتية .. المعاني المحددة أمام كل منها : - السجل العقاري : مجموعة الوثائق التي تبين أوصاف كل عقار وموقعه وحالته الشرعية، وما له من حقوق وما عليه من التزامات، والتعديلات التي تطرأ عليه تباعا. - المنطقة العقارية : مجموعة من الوحدات العقارية محددة بشوارع رئيسة أو معالم ثابتة وواضحة. - الخارطة : رسم هندسي مساحي مبني على نظام إحداثيات وطني يبين موقع المنطقة والوحدة أو الوحدات العقارية وحدودها ومعالمها وأرقامها وأطوالها ومساحتها. - خرائط الأساس الطبوغرافية : تمثيل لمساحة معينة من سطح الأرض بما عليها من ظواهر مختلفة، وفق مقياس رسم دقيق يمثل نسبة ثابتة بين الأبعاد الخطية على الخارطة والأبعاد الأصلية المناظرة لها على الطبيعة. - القيد الأول : إدراج الوحدات العقارية في السجل العقاري لأول مرة بحالتها التي هي عليها، وتخصيص صحيفة لكل منها وفقا لأحكام هذا النظام. - أعمال التحديد والتحرير : الوقوف على طبيعة الوحدة العقارية، وإعداد خارطة لها بمعرفة مهندس أو مساح، يوضح عليها رقمها وبياناتها، وتحرير محضر يذكر فيه ما يدلي به المالك من أقوال وما يؤيدها من مستندات،
    وأقوال من يدعي لنفسه حقا عليها، وأقوال الجيران وغيرهم إن لزم الأمر وفقا للنموذج المعد لهذا الغرض، ويتم ذلك تحت إشراف قاض من المحكمة المختصة. - القيود التالية : إدراج التصرفات التي ترد على الوحدة العقارية بعد إتمام القيد الأول في السجل العقاري. - المحكمة المختصة : المحكمة التي يقع العقار في دائرة اختصاصها. - الحق العقاري : سلطة مباشرة يقرها النظام لشخص أو أكثر على عقار معين، تخوله التصرف فيه والاستئثار بمنافعه. - الحق العيني الأصلي : الحق المستقل بذاته، غير المستند إلى حق آخر يرد على استعمال الشيء محل الحق أو استغلاله أو التصرف فيه. - الحق العيني التبعي : حق يتقرر على العقار ضمانا لحق شخصي. - حق الارتفاق : حق عيني عقاري يحد من منفعة عقار لمصلحة عقار غيره يملكه شخص آخر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: ينشأ سجل عقاري تثبت فيه - وفقا لأحكام هذا النظام - الحقوق العقارية وما يطرأ عليها من تعديلات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يكون للسجل العقاري قوة إثبات مطلقة، ولا يجوز الطعن في بياناته بعد انتهاء الآجال المحددة للطعن المنصوص عليها في هذا النظام إلا تأسيسا على مخالفتها لمقتضى الأصول الشرعية أو تزويرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تعد وحدة عقارية في تطبيق أحكام هذا النظام : 1 - كل قطعة من الأرض -بما عليها من بناء وغراس وغير ذلك- تقع في منطقة عقارية واحدة، وتكون مملوكة لشخص أو أكثر، دون أن يفصل جزءا منها عن سائر الأجزاء فاصل من ملك عام أو خاص، ودون أن يكون لجزء منها من الحقوق أو عليه من الالتزامات ما ليس للأجزاء الأخرى أو عليها. 2 - قطعة الأرض المخصصة لمنفعة عامة وفقا للضوابط التي تحددها اللائحة التنفيذية . 3 - المناجم والمحاجر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجوز بقرار من وزير العدل - بعد الاتفاق مع وزير الشؤون البلدية والقروية - أن تعد منطقة من مناطق السكنى أو غيرها وحدة عقارية في جملتها تفرد لها صحيفة عامة، وذلك في الحالات التي يصعب تطبيق ضوابط الوحدة العقارية عليها. ويعد لقيد المعاملات والحقوق الخاصة بهذه المناطق فهرس خاص يرتب وفقا لأسماء الأشخاص ويلحق بالصحيفة التي يتعلق بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يخصص لكل منطقة سجل عقاري تفرد فيه صحيفة لكل وحدة عقارية، تقيد بها الحقوق والالتزامات. وتبين اللائحة التنفيذية كيفية إعداد هذا السجل وتحديد بياناته والوثائق المتعلقة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يلحق بكل سجل عقاري فهرس شخصي هجائي تستقى بياناته منه، يخصص فيه لكل مالك صحيفة أو أكثر. تبين فيه الوحدات العقارية التي يملكها وما قد يطرأ عليها من تعديلات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تقيد الحقوق العقارية في السجل العقاري إذا كانت قد نشأت أو تقررت بسبب من أسباب اكتساب الحقوق العينية على النحو الذي تقره الشريعة الإسلامية. وتوضح اللائحة التنفيذية شروط وإجراءات قيد تلك الحقوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتولى كل من: وزارة الشؤون البلدية والقروية ووزارة العدل أعمال التسجيل العقاري والتوثيق وفقا لما يأتي:1- تقوم الإدارة المختصة بالأراضي والمساحة في وزارة الشؤون البلدية والقروية بحصر الوحدات العقارية ، والقيام بالأعمال المساحية، وإعداد الخرائط اللازمة وتحديثها، وتنفيذ نظم معلومات الأراضي. ويصدر وزير الشؤون البلدية والقروية القرارات والتعليمات اللازمة لذلك.2- تقوم الإدارة المختصة بالتسجيل العقاري والتوثيق في وزارة العدل بقيد وتوثيق الحقوق المتعلقة بالوحدات العقارية الواقعة في دائرة اختصاصها. فإذا كانت الوحدة العقارية واقعة في دائرة اختصاص إدارات متعددة، وجب إجراء القيد في كل منها، ولا يكون للقيد الذي يتم في إحداها أثر إلا بالنسبة للجزء الواقع في دائرة اختصاصها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تحفظ في إدارة التسجيل العقاري أصول الصكوك والأحكام التي يتم القيد بموجبها والسجلات والوثائق الخاصة بالقيد، ويحظر نقلها إلى خارجها. ولا يجوز لغير الجهات القضائية أو من تندبه من أرباب الخبرة وهيئات النظر الاطلاع عليها. ويستثنى من ذلك الوثائق المتعلقة بقيد المنشآت العسكرية والمشروعات الاقتصادية ذات الطابع الوطني فتحفظ في مقار الجهات الحكومية التابعة لها، وتتبع في شأنها أحكام السرية المقررة في الأنظمة الخاصة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يستند في قيد الوحدات العقارية في السجل العقاري إلى الخرائط الآتية: 1 - خرائط الأساس الطبوغرافية 2 - خارطة الوحدة العقارية 3 - خارطة المنطقة العقارية'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يكون لكل وحدة عقارية خارطة مستقلة تبين موقعها وحدودها وأطوالها ومساحتها ومعالمها وما عليها من منشآت وأرقام الوحدات المجاورة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يكون لكل منطقة عقارية خارطة أو خرائط مساحية تبين عليها الوحدات العقارية الواقعة بها وأرقامها. ويستند في إعدادها إلى خرائط الأساس الطبوغرافية ، وخرائط الوحدات العقارية المكونة لها. ولا تعد نهائية إلا بعد تمام أعمال التحديد والتحرير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يعطى ذوو الشأن بناء على طلبهم صورا من خرائط الوحدات العقارية بعد أداء المقابل المالي المقرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يطبق هذا النظام تدريجيا، ويصدر وزير العدل - بعد الاتفاق مع وزير الشؤون البلدية والقروية - قرارا بتحديد المنطقة أو المناطق العقارية التي يبدأ فيها تطبيق النظام. وينشر هذا القرار في الجريدة الرسمية، ويعلن عنه بالطرق التي تحددها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يصدر القاضي المشرف على القيد الأول - فور نشر قرار وزير العدل المشار إليه في المادة الخامسة عشرة - قرارا بتحديد موعد البدء في أعمال التحديد والتحرير. وينشر هذا القرار في الجريدة الرسمية قبل بدء تلك الأعمال بمدة لا تقل عن ستين يوما، كما يعلن عنه بالطرق التي تحددها اللائحة التنفيذية . ويتضمن الإعلان دعوة ذوي الشأن أو من يمثلهم شرعا إلى الإرشاد عن أملاكهم وبيان حقوقهم وتقديم ما يؤيدها من مستندات في المواعيد والأماكن المحددة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تعد إدارة الأراضي والمساحة الخرائط اللازمة لأعمال التحديد والتحرير، وتقوم بحصر الوحدات العقارية وتحديد كل وحدة بعلامات ثابتة مملوكة للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: على كل جهة تقديم ما لديها من بيانات ومستندات متعلقة بإجراء القيد في السجل العقاري إلى إدارات التسجيل العقاري ، وتوثيقها خلال ثلاثين يوما من تاريخ طلبها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يجب على واضع اليد على الوحدة العقارية - أيا كان سبب ذلك - أن يمكن الموظفين المكلفين بالأعمال المساحية من القيام بعمليات التحديد ووضع العلامات اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يقيد في صحيفة الوحدة العقارية رقمها وحدودها وأطوالها ومساحتها والإنشاءات المقامة عليها، واسم المالك أو المالكين لها ومقدار حصصهم فيها، والوحدات العقارية المجاورة لها وبيان ما لها من حقوق وما عليها من التزامات، وتاريخ نشأتها وأصحابها، على النحو الذي توضحه اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: إذ وقع تناقض بين صكوك الملكية في شأن وحدة عقارية واحدة تقيد الحقوق باسم من يظهر للقاضي المشرف على القيد الأول أنه صاحب الحق، ويرفق في صحيفة الوحدة العقارية تقرير بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: تجرى أعمال القيد الأول في السجل العقاري تحت إشراف قاض من المحكمة التي يقع العقار في دائرة اختصاصها، ويعاونه في ذلك عدد من المهندسين والمساحين للقيام بأعمال التحديد والتحرير، يصدر بتكليفهم قرار من وزارة الشؤون البلدية والقروية ، ويكونون تابعين لها فيما يتعلق بالأعمال الفنية والإدارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: لوزير العدل أن يؤجل لمدة أقصاها ثلاث سنوات أعمال التحديد والتحرير لأي وحدة عقارية بناء على توصية مسببة من القاضي المشرف على القيد الأول إذا رأى أن المصلحة العامة تقتضي ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: بعد الانتهاء من أعمال التحديد والتحرير، يعد محضر بذلك يوقعه القاضي المشرف على القيد الأول ، ويعلن عن بيانات الوحدات العقارية التي تم تحديدها. ويتضمن الإعلان دعوة ذوي الشأن للاطلاع على البيانات التفصيلية للوحدات الخاصة بهم وميعاد الاعتراض عليها، كما يوجه إلى كل منهم في الوقت نفسه إشعارا يذكر فيه ما أثبت بأسمائهم في جداول التحديد والتحرير من وحدات عقارية وما لها من حقوق وما عليها من التزامات. ويكون الإعلان والإشعار المشار إليهما على الوجه الذي تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: لذوي الشأن الاعتراض على نتيجة أعمال التحديد والتحرير خلال ستين يومًا من تاريخ الإعلان عن انتهائها، ويوقف القيد إلى حين الفصل في تلك الاعتراضات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يصدر القاضي المشرف على القيد الأول قرارا بتشكيل لجنة للنظر في الاعتراضات المشار إليها في المادة (الخامسة والعشرين)، تتكون من عضو يكلفه القاضي وآخر فني ترشحه وزارة الشؤون البلدية والقروية . وتقوم هذه اللجنة بالتحقيق والمعاينة اللازمة وتعد تقريرا بذلك تحيله إلى القاضي خلال ثلاثين يومًا من تاريخ وصول الاعتراض إليها ويصدر القاضي قرارا إما ببقاء الحال على ما هو عليه أو بالتصحيح. ويبلغ ذوو الشأن بهذا القرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تعرض محاضر التحديد والتحرير التي لم يقدم بشأنها اعتراضات على القاضي المشرف على القيد الأول حسب الأرقام المتسلسلة للوحدات العقارية، فإذا تأكد من صحتها صدق عليها وأمر بقيدها في السجل العقاري ، وإلا أمر باستيفاء أوجه النقص وإجراء ما يلزم من تحقيقات، ثم يصدر قراره بالتصديق أو الرفض، وفي الحالة الأخيرة يكون قراره مسببا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: لكل ذي مصلحة أن يعترض على البيانات التي أدرجت في صحيفة الوحدة العقارية وأن يطلب من القاضي المشرف على القيد الأول تغييرها وذلك خلال سنة من تاريخ القيد في السجل العقاري ، ويجوز بقرار من وزير العدل تمديد تلك الفترة لمدة أو مدد إضافية لا تزيد على سنة. ويتبع في نظر الاعتراض والفصل فيه الإجراءات التي تبينها اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: ينظم القاضي المشرف على القيد الأول بيانا متسلسلا للعقارات التي قدم بشأنها اعتراضات، ويتم النظر فيها حسب تاريخ تقديم الدعوى أو الطلب. وللقاضي أن يستعين بوزارة الشئون البلدية والقروية في إعداد مذكرة البيانات والملحوظات المتعلقة بذلك قبل النظر في الاعتراض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يوقف أثر القيد الأول فيما يتعلق بالوحدات العقارية محل الاعتراض إلى حين صدور حكم القاضي المشرف على القيد الأول أو قراره بشأنها. وعليه أن يفصل في الاعتراض على وجه السرعة ولو لم يحضر ذوو الشأن بعد التحقق من إبلاغهم بموعد النظر في الاعتراض، على النحو الذي تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: لا تسمع الدعاوى والطلبات التي تقدم اعتراضا على القيد الأول في السجل العقاري أمام أية جهة قضائية بعد انتهاء الآجال المشار إليها في المادتين الثامنة والعشرين، الرابعة والثلاثين، إلا وفقًا لحكم المادة الثالثة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'تعلن الأحكام والقرارات الصادرة من القاضي المشرف على القيد الأول بشأن الطلبات والدعاوى التي أقيمت اعتراضًا على القيد الأول، ويخطر بها أطراف الدعوى وذوو الطلبات. وتكون تلك الأحكام والقرارات نهائية في الحالتين الآتيتين: 1 - إذا كان التغيير المطلوب في بيانات السجل متفقا عليه بين جميع ذوي الشأن الواردة أسماؤهم في صحائف الوحدات العقارية .2 - إذا كان التغيير المطلوب لا يمس حق شخص من الأشخاص الواردة أسماؤهم في السجل العقاري .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: فيما عدا الحالتين المنصوص عليهما في المادة الثانية والثلاثين، يجوز لذوي الشأن طلب تمييز الأحكام الصادرة من القاضي المشرف على القيد الأول خلال ثلاثين يومًا من تاريخ النطق بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يجوز الاعتراض على البيانات المدرجة في السجل العقاري أمام المحكمة المختصة خلال سنتين من تاريخ القيد في السجل إذا ظهرت أدلة أو وثائق جديدة لم يتيسر إبرازها من قبل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يحق لمن كان قاصرًا أو فاقدًا للأهلية وقت القيد في صحائف السجل العقاري أن يطعن فيه أمام المحكمة المختصة خلال خمس سنوات من تاريخ بلوغ القاصر، أو سنتين من التاريخ الذي يسترد فيه فاقد الأهلية أهليته الشرعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يجب أن تقيد في السجل العقاري جميع التصرفات التي من شأنها إنشاء حق من الحقوق العينية العقارية الأصلية أو التبعية أو نقله أو تغييره أو زواله، وكذا الأحكام النهائية المثبتة لشيء من ذلك، ويدخل في هذه التصرفات القسمة العقارية والوصية والوقف والميراث والرهن ، ولا يسري أثرها على الغير إلا من تاريخ قيدها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: يجب قيد عقود الإيجار والسندات التي ترد على منفعة العقار التي تزيد مدتها على خمس سنوات والمخالصات والحوالات بأكثر من أجرة ثلاث سنوات مقدما، والأحكام النهائية المثبتة لشئ من ذلك. ويترتب على عدم قيدها أن هذه الحقوق لا تكون نافذة في حق الغير فيما زاد على المدد المشار إليها آنفا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يجب قيد الحق الثابت بالإرث إذا اشتمل على حقوق عينية عقارية . وإلى أن يتم هذا القيد لا يجوز قيد أي تصرف يصدر من الوارث بشأن حق من هذه الحقوق، ويجوز أن يقتصر قيد هذا الحق على جزء من عقارات التركة، وفي هذه الحالة لا يجوز قيد أي تصرف من الوارث إلا في حدود نصيبه الشرعي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: يجب التأشير بالمحررات المثبتة لدين من الديون العادية على المورث في السجل العقاري ، وعلى الدائن للتركة إبلاغ ذوي الشأن بقيام الدين قبل التأشير به، ولا يحتج بهذا التأشير إلا من تاريخ حصوله، ومع ذلك إذا تم التأشير خلال سنة من تاريخ القيد المشار إليه في المادة الثامنة والثلاثين، فللدائن أن يحتج بحقه على كل من تلقى من الوارث حقا عينيا عقاريا وقام بقيده قبل هذا التأشير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: الدعاوى المتعلقة بحق عيني عقاري أو بتصرف من التصرفات الواجب قيدها يجب التأشير بها في السجل العقاري بناء على طلب المحاكم المختصة بعد قيدها لديها، متى تضمنت هذه الدعاوى طلب إجراء تغيير في بيانات السجل، ولا يتم سماع الدعوى إلا بعد تقديم ما يثبت حصول التأشير بمضمون هذه الدعاوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: يترتب على التأشير بالدعاوى في السجل العقاري أن حق المدعي إذا تقرر بحكم نهائي يكون حجة على من ترتبت لهم حقوق أو أثبت لمصلحتهم بيانات في السجل العقاري بعد إجراء التأشير المذكور، وذلك متى تم قيد الحكم خلال خمس سنوات من التاريخ الذي أصبح فيه نهائيا، وتبدأ مدة السنوات الخمس بالنسبة للأحكام النهائية الصادرة قبل العمل بهذا النظام من تاريخ سريانه على المنطقة العقارية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: يجب التأشير بإعلان الرغبة في الأخذ بالشفعة في صحف الوحدات العقارية المشفوع فيها، ويترتب على ذلك أن حق الشفيع إذا تقرر بحكم نهائي مقيد في السجل يكون حجة على من تترتب لهم حقوق عينية بعد إجراء التأشير، وذلك متى تم قيد الحكم خلال خمس سنوات من التاريخ الذي أصبح فيه نهائيا، وتبدأ مدة السنوات الخمس بالنسبة للأحكام النهائية الصادرة قبل العمل بهذا النظام من تاريخ سريانه على المنطقة العقارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: يقدم طلب القيد إلى إدارة التسجيل العقاري والتوثيق التي يقع العقار في دائرة اختصاصها من قبل ذوي الشأن أو من يمثلهم شرعا، ويرفق بالطلب صك الملكية والمستندات المؤيدة له، وعلى الإدارة أن تعد دفترا لليومية تدون فيه طلبات ذوي الشأن وفقا لساعة وتاريخ تقديمها على النحو الذي تحدده اللائحة التنفيذية ، ولا يجوز إجراء القيد إذا تضمنت صحيفة الوحدة العقارية قيودا تمنع التصرف فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يعد طلب القيد كأن لم يكن إذا لم يقدم صاحب الشأن البيانات والوثائق المؤيدة للطلب اللازمة لإتمامه خلال سنة من تاريخ تقديمه، وتمدد هذه المدة مرة واحدة سنة أخرى إذا قدم قبل انتهاء السنة الأولى بخمسة عشر يوما طلبا لمد ذلك الأجل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: إذا قدم إلى إدارة التسجيل العقاري والتوثيق أكثر من طلب للقيد في شأن وحدة عقارية واحدة وجب بحثها وفقا لأسبقية إدراجها في دفتر اليومية، وذلك على النحو الذي تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: إذا لم يتيسر إتمام الإجراءات الخاصة بالطلب الأسبق بسبب نقص أو عيب في البيانات أو الوثائق، أخطر صاحب الشأن بذلك لتلافيه خلال أجل لا يتجاوز خمسة عشر يومًا من تاريخ الإخطار، فإن لم يفعل كان لرئيس إدارة التسجيل العقاري والتوثيق أن يصدر قرارا مسببا برفض الطلب أو بسقوط أسبقيته أو بوقف الإجراءات الخاصة بالطلبات التالية حسب الأحوال، ويخطر ذوو الشأن بذلك، وينظر في إجراءات الطلبات اللاحقة للطلب الذي تقرر رفضه أو سقوط أسبقيته بعد مضي خمسة عشر يوما من تاريخ هذا الإخطار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: يحق لمن أخطر برفض طلبه أو بسقوط أسبقيته أو بوقف الإجراءات أن يتظلم لرئيس إدارة التسجيل العقاري والتوثيق خلال خمسة عشر يوما من تاريخ إخطاره بذلك، فإذا قبل رئيس الإدارة تظلمه أمر بالقيد، أما إذا رفضه فعليه إحالة التظلم إلى المحكمة المختصة للفصل فيه بصفة مستعجلة بحكم غير قابل للتمييز، ويوقف النظر في الطلبات اللاحقة لحين الفصل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: يتم قيد المحررات في السجل العقاري طبقا للترتيب الوارد في دفتر اليومية، وتاريخ إدراجها في هذا الدفتر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: يحصل مقابل مالي -لا يقل عن مائة ريال ولا يزيد على خمسة آلاف ريال- عن القيود التالية للقيد الأول وعن استخراج الصكوك البديلة والشهادات والخرائط، وتحدد اللائحة التنفيذية فئات هذا المقابل وكيفية تحصيله، ولمجلس الوزراء تعديل هذا المقابل المالي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: لا يجوز إجراء أي تغيير في البيانات الواردة في السجل العقاري إلا بناء على طلب ممن يملك حق التصرف في الحقوق المقيدة بها، أو بموجب أحكام قضائية نهائية على النحو الذي تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: تحال الطلبات والمستندات المتعلقة بها التي من شأنها أن تغير في البيانات المساحية إلى إدارة الأراضي والمساحة؛ لبحثها وإعادتها إلى إدارة التسجيل العقاري والتوثيق مشفوعا بها نتيجة البحث.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: لرئيس إدارة التسجيل العقاري والتوثيق أن يصحح الأخطاء المادية البحتة في صحائف السجل من تلقاء نفسه، أو بناء على طلب من ذوي الشأن قبل القيد، فإذا كان القيد قد تم فلا يجوز إجراء هذا التصحيح إلا بعد إخطار ذوي الشأن على النحو الذي تحدده اللائحة التنفيذية . وعلى رئيس الإدارة تحرير محضر يوضح فيه الخطأ وسببه وكيفية الوقوف عليه والإجراء الذي اتخذ بشأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: على الجهة المختصة في البلدية إعلام إدارة التسجيل العقاري والتوثيق برخص البناء والهدم المعطاة لأصحاب الشأن بخصوص الوحدات العقارية المدرجة في السجل العقاري ؛ للتأشير بها أمام كل وحدة عقارية على النحو الذي تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: يجب على ملاك الوحدات العقارية إعلام إدارة التسجيل العقاري والتوثيق بأي تغيير يطرأ على الوحدة العقارية بسبب إنشاء مبان أو إضافتها أو تعديلها أو إزالتها، وذلك خلال تسعين يومًا من تاريخ هذا التغيير، ويرفق به شهادة مصدقة من الجهة المختصة، ويتم إجراء تحديث بيانات السجل العقاري بناء على ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: لرئيس إدارة التسجيل العقاري والتوثيق أن يصدر قرارا بإضافة أي تغيير مرخص به قائم على الطبيعة غير مثبت في السجل العقاري .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: لكل ذي مصلحة أن يطلب من المحكمة بصفة مستعجلة محو التأشير المشار إليه في المادتين (التاسعة والثلاثين والأربعين)، وتأمر المحكمة بالمحو متى كان سند الدين غير ثابت شرعا أو متى تبين لها أن الدعوى التي تم التأشير بها لم ترفع إلا لغرض كيدي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: يجب على إدارة التسجيل العقاري والتوثيق إخطار كل شخص تغيرت حقوقه أو زالت بقيد أو محو أو تأشير أو تصحيح، وكذلك إخطار إدارة الأراضي والمساحة بالتغييرات التي تطرأ على بيانات السجل العقاري كافة، ويدرج ذلك بالتفصيل في صك الملكية والشهادات المستخرجة من السجل وفقا لما تحدده اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: إذا ألغي المحو عادت لقيد الحق مرتبته الأصلية في السجل العقاري ، ومع ذلك لا يكون لإلغائه أثر رجعي بالنسبة للقيود التي أجريت في الفترة ما بين المحو والإلغاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: للمتضررين من القيد في السجل العقاري الرجوع بالتعويض على المتسبب والمستفيد من هذا القيد متى ثبت أنه تم دون وجه حق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: إذا جزئت الوحدة العقارية المرتفقة بقي حق الارتفاق مستحقا لكل جزء منها، على ألا يزيد ذلك في العبء الواقع على الوحدة العقارية المرتفق بها، غير أنه إذا كان حق الارتفاق لا يفيد في الواقع إلا جزءًا من هذه الأجزاء، فلمالك الوحدة العقارية المرتفق بها أن يطلب من المحكمة المختصة زوال هذا الحق عن الأجزاء الأخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: إذا جزئت الوحدة العقارية المرتفق بها بقي حق الارتفاق واقعا على كل جزء من أجزائها، غير أنه إذا كان حق الارتفاق لا يستعمل في الواقع على بعض هذه الأجزاء أو لا يمكن أن يستعمل عليها، فلمالك كل جزء منها أن يطلب من المحكمة المختصة زوال الحق عن الجزء الذي يملكه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: تخطر إدارة التسجيل العقاري والتوثيق ملاك الوحدات العقارية المرتفقة والمرتفق بها في الحالتين المنصوص عليهما في المادتين (الستين والحادية والستين)، وفي حالة الخلاف بين ذوي الشأن يعرض الأمر على المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: تنتهي حقوق الارتفاق إذا أصبحت الوحدة العقارية المرتفق بها والوحدة العقارية المرتفقة في يد مالك واحد، وعلى إدارة التسجيل العقاري والتوثيق شطبها تلقائيًّا دون حاجة إلى طلب من المالك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: إذا جزئت الوحدة العقارية المحملة بحق عيني تبعي إلى وحدتين عقاريتين أو أكثر، تحملت كل وحدة عقارية جديدة بالحق كاملا، ويجوز الاتفاق بين الملاك الجدد وصاحب الحق التبعي على تجزئته بحيث لا تتحمل كل وحدة عقارية جديدة إلا جزءا منه يحدده الاتفاق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: إذا أدمجت وحدتان عقاريتان إحداهما محملة بحق عيني تبعي والأخرى غير محملة، امتد الحق التبعي ليشمل الوحدة العقارية الجديدة بأكملها دون موافقة صاحب الحق، أما إذا كانت كل من الوحدتين محملة بحق عيني مستقل ، فيجب موافقة أصحاب الحقوق على الإدماج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة والستون
  article_text_ar: يعد العقار المتعدد الشقق والطوابق وحدة عقارية واحدة، ويخصص له صحيفة عقارية في السجل العقاري تلحق بها صحائف تكميلية بأسماء ملاك شققه وطوابقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة والستون
  article_text_ar: تسلم لكل مالك صورة من صحيفة الوحدة العقارية المملوكة له وتسمى " صك الملكية "، فإذا كانت الوحدة العقارية مملوكة على الشيوع .. يسلم إلى كل مالك صك ملكية بأسماء جميع الملاك على الشيوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة والستون
  article_text_ar: تسلم لذوي الشأن بناء على طلبهم شهادة بالبيانات المقيدة في السجل العقاري بعد أداء المقابل المالي المقرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة التاسعة والستون
  article_text_ar: لا يجوز تسليم صك ملكية آخر إلا بعد ثبوت تلف الصك الأول أو فقده، ويكون التسليم بعد موافقة رئيس إدارة التسجيل العقاري والتوثيق وبعد سداد المقابل المالي المقرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السبعون
  article_text_ar: يسلم لذوي الشأن بناء على طلبهم شهادة بمطابقة صك الملكية للثابت في السجل العقاري بعد أداء المقابل المالي المقرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الحادية والسبعون
  article_text_ar: الدعاوى المشار إليها في المادة الأربعين، المنظورة أمام المحاكم وقت نفاذ هذا النظام والتي لم يؤشر بها، لا يجوز الاستمرار في نظرها إلا بعد التأشير بها في السجل العقاري . ويمنح المدعون بها لإجراء هذا التأشير مهلة قدرها ستون يوما من تاريخ بدء أعمال التحديد والتحرير في المنطقة العقارية ، فإذا لم تقدم في أول جلسة بعد انتهاء هذا الميعاد شهادة بحصول هذا التأشير تعين عدم سماع الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثانية والسبعون
  article_text_ar: 'يتبع بشأن التعاملات العقارية في أثناء إجراءات القيد الأول الأحكام الآتية : 1 - التعاملات التي تجري على الوحدات العقارية التي أعدت لها محاضر تحديد وتحرير ولم يقدم بشأنها طعون، تعرض على القاضي المشرف على القيد الأول لينظر فيها وفقًا (للمادة السابعة والعشرين)، دون التقيد بالأرقام المسلسلة للوحدات العقارية . 2 - التعاملات التي تجري في أثناء النظر في الطعون على محاضر التحديد والتحرير أمام القاضي المشرف على القيد الأول ، يوقف أثرها إلى حين الفصل في تلك الطعون. 3 - التعاملات التي تجري فيما بعد الفصل في الطعون المشار إليها فيما سبق، تقدم إلى إدارة التسجيل العقاري والتوثيق للنظر في أمر قيدها وفقا لأحكام هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثالثة والسبعون
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد ينص عليها نظام آخر، يعاقب بغرامة لا تقل عن خمسة آلاف ريال ولا تتجاوز مائة ألف ريال، كل من ارتكب أحد الأفعال الآتية : أ - التوصل بسوء نية إلى قيد عقار بغير اسم مالكه، أو ترتيب حق عيني عليه دون وجه حق. ب - إقامة دعوى كيدية. ج - تغيير علامات تحديد الوحدات العقارية أو إتلافها، مع إلزامه بدفع مصاريف إعادتها إلى وضعها السابق. د - الإخبار أو الشهادة بحق عيني لا وجود له، أو الامتناع عن الإخبار بوجود حق عيني يعلمه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الرابعة والسبعون
  article_text_ar: 'مع عدم الإخلال بأي عقوبة أشد ينص عليها نظام آخر، يعاقب بغرامة لا تتجاوز عشرة آلاف ريال : أ - كل من تخلف عن الإخطار المنصوص عليه في المادة (الرابعة والخمسين).ب - كل من امتنع عن الحضور أمام القاضي المشرف على القيد الأول ؛ لمباشرة إجراءات التحديد والتحرير رغم إعلانه بذلك إعلانًا صحيحًا.ج - كل من قام بعمل من شأنه عرقلة إجراءات التحديد والتحرير.د - كل من امتنع عن تقديم المستندات الدالة على الملكية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الخامسة والسبعون
  article_text_ar: 'تتولى النظر في مخالفة أحكام هذا النظام واستيفاء ما تراه من تحقيقات لجان تشكل بقرار من وزير العدل في الأماكن التي يرى أن الحاجة تقتضي تشكيل لجان فيها، وتتكون كل لجنة من ممثل عن كل من: وزارة العدل ، وزارة الشئون البلدية والقروية ووزارة الداخلية ، ويجوز لمن صدر قرار عقوبة بحقه أن يتظلم منه أمام ديوان المظالم خلال ستين يوما من تاريخ إبلاغه بالقرار.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السادسة والسبعون
  article_text_ar: يستمر العمل بنظم تسجيل العقار المعمول بها على العقارات التي لم يشملها النظام حتى صدور ما يفيد شموله لها وفقا للمادة (الخامسة عشرة).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة السابعة والسبعون
  article_text_ar: يصدر وزير العدل بعد الاتفاق مع وزير الشئون البلدية والقروية اللائحة التنفيذية لهذا النظام، وتنشر في الجريدة الرسمية، ويعمل بها من تاريخ نفاذ هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
- article_ref: المادة الثامنة والسبعون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد سنة من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/eb5cc9e3-b938-42db-b375-a9a700f2156b/1
  verified: false
