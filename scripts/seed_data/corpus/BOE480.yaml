articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات الآتية المعاني المبينة أمام كل منها، ما لم يقتضِ السياق غير ذلك: 1- التنظيم: تنظيم الهيئة العامة للموانئ. 2- المـمـلكـة: المملكة العربية السعودية. 3- الــوزارة: وزارة النقل. 4- الـــوزير: وزير النقل. 5- الهــيئــة: الهيئة العامة للموانئ. 6- الـمجلس: مجلس إدارة الهيئة. 7- الـرئيس: رئيس الهيئة. 8- الموانئ: جميع الموانئ البحرية في المملكة عدا الموانئ العسكرية وموانئ المدن الاقتصادية. 9- خدمات تشغيل الموانئ: الخدمات التي يقدمها المرخص لهم. 10- مستخدمو الموانئ: الأشخاص ذوو الصفة الطبيعية أو الاعتبارية المستفيدون من خدمات تشغيل الموانئ. 11- الترخيص: موافقة تصدرها الهيئة لشخص ذي صفة طبيعية أو اعتبارية لمزاولة تقديم خدمة أو أكثر من خدمات تشغيل الموانئ. 12- المرخص لهم: الأشخاص ذوو الصفة الطبيعية أو الاعتبارية الذين تصدر لهم تراخيص من الهيئة. 13- البنية الأساسية للموانئ: جميع المشروعات التي من شأنها تأسيس الموانئ ومرافقها لتكون جاهزة للتشغيل، بما في ذلك أعمال التعميق، وتهيئة ساحات الميناء، والسفلتة، والإنارة، والكهرباء، والمياه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 1- تتمتع الهيئة بالشخصية الاعتبارية العامة، وبالاستقلال المالي والإداري، وترتبط تنظيميًّا بالوزير. 2- يكون مقر الهيئة الرئيس في مدينة الرياض، ولها بقرار من المجلس إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى تنظيم إدارة الموانئ والإشراف على تشغيلها، والعمل على تهيئتها بوصفها عنصر جذب استثماري، وتطويرها بما يدعم التجارة في المملكة وتنمية الاقتصاد الوطني، ولها في سبيل ذلك ما يأتي: 1- وضع القواعد اللازمة لإدارة الموانئ وفقاً لأفضل النظم والأساليب الدولية. 2- وضع اللوائح والقواعد والمعايير الخاصة باستخدام الموانئ وإدارتها وتشغيلها. 3- وضع لائحة منح التراخيص. 4- تشجيع الاستثمار في خدمات تشغيل الموانئ، ودعم الأنشطة الاستثمارية والخدمات ذات القيمة المضافة في الموانئ، بما فيها الخدمات المساندة. 5- مراقبة قواعد المنافسة في مجال تقديم خدمات تشغيل الموانئ والعمل على حماية مصالح مستخدميها، ومراقبة أداء المرخص لهم لواجباتهم. 6- التحقيق فنيًّا في أي حادث أو عارض يؤدي إلى تعطيل أو خسائر في أي من الموانئ. 7- توفير النشرات الملاحية عن الموانئ لذوي العلاقة. 8- وضع معايير الأمان والسلامة والبيئة المتعلقة بالموانئ بعد التنسيق مع الأجهزة الحكومية ذات الصلة. 9- الاستعانة بالوكالات المتخصصة والمؤسسات العلمية أو الفنية أو المستشارين المؤهلين؛ للاستفادة من خبراتهم العلمية والعملية
    في مجال التطوير والدراسات الاستراتيجية، وفي مجال إدارة الموانئ، وتشغيلها. 10- تهيئة بيئة المنافسة في مجال تقديم خدمات تشغيل الموانئ وتسويقها، وإدارة المنافسة بين الموانئ، والعمل على تحقيق التكامل بينها. 11- القيام بجميع النشاطات التي تمكنها من تحقيق أغراضها وتؤدي إلى تعزيز الوضع التنافسي للموانئ. 12- تأسيس شركات، أو الدخول في شركات قائمة شريكاً أو مساهماً وفقاَ للإجراءات النظامية -بالتنسيق مع صندوق الاستثمارات العامة- للقيام بأعمال البنية الأساسية للموانئ. 13- تمثيل المملكة في الهيئات والمنظمات الدولية ذات العلاقة بالموانئ. 14- إنشاء قواعد بيانات، تضم جميع بيانات وإحصاءات النقل البحري والتجارة البحرية في المملكة، وجعلها متاحة لمستخدمي الموانئ ولذوي العلاقة. 15- التعاون والتنسيق مع الأجهزة الحكومية من أجل إنجاز مهمات الهيئة بكفاية وعلى أكمل وجه. 16- مراجعة الأنظمة والتنظيمات التي تحكم نشاط الموانئ، واقتراح ما تراه لتطويرها، ورفع ذلك بحسب الإجراءات المتبعة. 17- أي مهمة أخرى توكل إليها بموجب الأنظمة واللوائح.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تعمل الهيئة على أسس ومعايير تجارية، بما يمكنها من القيام بمسؤولياتها وأداء مهماتها في تنظيم خدماتها وتطويرها وجذب الاستثمارات والقدرة على المنافسة، وبما يدعم التجارة في المملكة وتنمية الاقتصاد الوطني، وذلك وفقاً للوائحها المالية والإدارية والتشغيلية والاستثمارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1- يكون للهيئة مجلس إدارة يشكل على النحو الآتي: أ- وزير النقل رئيساً ب- رئيس الهيئة عضواً ج- مدير عام مصلحة الجمارك العامة عضواً د- ممثل من وزارة النقل عضواً هـ- ممثل من وزارة المالية عضواً و- ممثل من وزارة التجارة والاستثمار عضواً ز- ثلاثة من القطاع الخاص من غير المستثمرين في قطاع الموانئ، يصدر بتعيينهم قرار من مجلس الوزراء بناء على اقتراح من الوزير. أعضاء 2- تكون مدة عضوية ممثلي الأجهزة الحكومية والأعضاء من القطاع الخاص ثلاث سنوات قابلة للتجديد لمرة واحدة، ويجب ألاَّ تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1- يعقد المجلس اجتماعاته العادية بدعوة من رئيسه مرة كل أربعة أشهر على الأقل. 2- يجوز أن يعقد المجلس اجتماعات استثنائية بدعوة من رئيسه أو بناء على طلب أربعة من أعضائه على الأقل. 3- لرئيس المجلس أن ينيب من يراه من ممثلي الأجهزة الحكومية الأعضاء في المجلس لرئاسة الاجتماعات في حال غيابه. 4- يكون انعقاد المجلس صحيحًا بحضور أغلبية أعضائه بمن فيهم رئيس المجلس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. 5- لا يجوز لعضو المجلس الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه، ولعضو المجلس المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. 6- لا يجوز لعضو المجلس أن يفشي شيئاً مما وقف عليه من معلومات سرية بسبب عضويته في المجلس. 7- لرئيس المجلس دعوة من يراه من مديري الموانئ أو من يرى الاستعانة بخبراته وعلمه لحضور اجتماعات المجلس دون أن يكون له حق التصويت. 8- تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. 9- تنشر القرارات التي يرى المجلس ضرورة إبلاغها للمرخص لهم أو
    المتعاملين مع خدمات الهيئة في الجريدة الرسمية وفي أي وسيلة أخرى يرى المجلس مناسبتها، على ألاَّ يخل هذا النشر بالمصلحة العامة أو بأسرار العمل. وتبلغ الهيئة هذه القرارات للجهات المعنية بها مباشرة بالطريقة المناسبة. 10- يكون للمجلس أمين يختاره الرئيس من بين موظفي الهيئة، يتولى سكرتارية المجلس والإعداد للاجتماعات وتسجيل مداولات المجلس وقراراته وإبلاغها للجهات المعنية، ويحدد المجلس مكافأته، ويحضر الأمين اجتماعات المجلس دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا المهيمنة على شؤون الهيئة وتصريف أمورها، وله ممارسة جميع الصلاحيات واتخاذ جميع القرارات اللازمة لتحقيق أغراضها؛ وذلك في حدود أحكام التنظيم، وله بوجه خاص ما يأتي: 1- إقرار خطط الهيئة وسياساتها وبرامجها، ومتابعة تنفيذها. 2- اعتماد القواعد اللازمة لإدارة الموانئ وفقاً لأفضل النظم والأساليب الدولية. 3- اعتماد اللوائح والقواعد والمعايير الخاصة باستخدام الموانئ. 4- اعتماد معايير الأمان والسلامة والبيئة الخاصة بالموانئ، ومتابعة تنفيذها. 5- اعتماد هيكل الهيئة الإداري ودليلها التنظيمي. 6- اعتماد لوائح الهيئة المالية والإدارية والتشغيلية والاستثمارية. 7- اعتماد لائحة منح التراخيص. 8- اعتماد المقابل المالي الذي تتقاضاه الهيئة عن الخدمات التي تقدمها. 9- مراجعة الأجور وفئاتها الواردة في نظام رسوم وأجور خدمات الموانئ الصادر بالمرسوم الملكي رقم (م/42) وتاريخ 2 / 7 / 1405 هـ، وتعديلها واعتمادها وإلغاؤها، متى اقتضت الحاجة ذلك، وعليه عند قيامه بذلك مراعاة الآتي: أ‌- أن تكون فئات الأجور ضمن المعايير المعمول بها وضمن الأسعار المنافسة دوليًّا وإقليميًّا. ب- أن تكون
    الأجور محفزة لشركات النقل البحري والخاصة للتشغيل في الموانئ واستخدام مرافقها والاستفادة من خدماتها. ج‌- أن يؤخذ في الاعتبار الأهمية الاستراتيجية لبعض موانئ المملكة. 10- استحداث فئات لخدمات الموانئ، وتحديد مبالغ أجورها، وتعديلها، متى اقتضت الحاجة ذلك. 11- الموافقة -بعد التنسيق مع صندوق الاستثمارات العامة- على تأسيس شركة أو أكثر، أو على دخول الهيئة في شركات قائمة شريكاً أو مساهماً وفقاً للإجراءات النظامية. 12- تحديد خدمات تشغيل الموانئ المستهدفة بالتخصيص. 13- تحديد البنية الأساسية للموانئ التي تقوم بها الهيئة بمفردها أو بالاشتراك مع غيرها. 14- النظر في التقارير الدورية التي تقدم عن سير العمل في الهيئة وعن مركزها المالي واتخاذ ما يلزم في شأنها. 15- الموافقة على استثمار العقارات والمرافق التي تملكها الهيئة. 16- إقرار ميزانية الهيئة ورفعها بحسب الإجراءات النظامية. 17- إقرار حساب الهيئة الختامي وتقريرها السنوي وتقرير مراجع الحسابات، ورفعها بحسب الإجراءات النظامية. 18- إبرام الاتفاقيات والعقود بأنواعها مع الأفراد والمؤسسات والشركات والمنظمات فيما له علاقة بأغراض الموانئ ونشاطاتها ، ومراجعتها
    بصفة دورية بحسب المتطلبات التشغيلية، وتعديل ما يلزم في شأنها بالتوافق مع المستثمرين. 19- قبول الهبات والإعانات والمنح والوصايا والتبرعات والأوقاف وفقاً للأنظمة. وللمجلس تفويض الرئيس في بعض تلك الصلاحيات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس يعين بقرار من المجلس ويحدد فيه أجره ومزاياه المالية الأخرى، وهو المسؤول التنفيذي للهيئة. وتتركز مسؤولياته في الإشراف على أعمال الهيئة وإدارتها في حدود ما ينص عليه التنظيم وما يقرره المجلس، وله -بالإضافة إلى الصلاحيات المالية والإدارية المخولة له نظاماً- الاختصاصات والمهمات الآتية: 1- الإشراف على إعداد خطط الهيئة وسياساتها وبرامجها، والعمل على تنفيذها بعد إقرارها من المجلس. 2- اقتراح هيكل الهيئة الإداري ودليلها التنظيمي والتعديلات عليهما، ورفعها إلى المجلس. 3- متابعة تنفيذ القرارات التي يصدرها المجلس، وإحاطته بما يتم في شأنها. 4- الإشراف على إعداد مشاريع لوائح الهيئة المالية والإدارية والتشغيلية والاستثمارية، ورفعها إلى المجلس. 5- اقتراح مشروع لائحة منح التراخيص، ورفعه إلى المجلس. 6- إقرار صلاحيات مديري الموانئ بما يتناسب مع حجم العمل والمسؤوليات لكل ميناء. 7- تعيين منسوبي الهيئة وفقًا للوائح المنظمة لذلك. 8- الإشراف على منسوبي الهيئة، ومباشرة الاختصاصات والصلاحيات المالية والإدارية والتشغيلية الممنوحة له وفقًا للتنظيم وما تحدده اللوائح. 9- الإشراف على
    إعداد مشروع ميزانية الهيئة وحسابها الختامي وتقريرها السنوي، ورفعها إلى المجلس. 10- اعتماد أوامر الصرف في حدود اعتمادات الميزانية. 11- رفع تقارير دورية إلى المجلس عن سير العمل في الهيئة وعن مركزها المالي. 12- المراجعة الدورية للإجراءات الإدارية والمستندية في الموانئ من أجل تسهيلها وتيسيرها والاسترشاد بما هو متبع في موانئ العالم المتميزة. 13- التعاقد مع الغير وفق ما يقتضيه سير العمل في الهيئة وبحسب الصلاحيات المخولة له. 14- تمثيل الهيئة في علاقاتها مع الجهات الحكومية ومع الغير. وللرئيس تفويض من يراه من منسوبي الهيئة في بعض هذه الاختصاصات والمهمات. 15- تمثيل الهيئة أمام الجهات القضائية، وله تفويض من يراه في ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يدير كل ميناء مدير يرتبط مباشرة بالرئيس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يشكل في كل ميناء مجلس استشاري يتألف من ممثلين من الإدارات الحكومية العاملة في الميناء، بالإضافة إلى ممثل من كل من وكلاء الشحن البحري والغرفة التجارية والصناعية في المدينة أو المحافظة التي يقع فيها الميناء، ومن كل من ترى الهيئة أن له علاقة مباشرة بأعمال الميناء. ويحدد الرئيس مهمات المجالس الاستشارية وصلاحياتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تحدد لائحة منح التراخيص أنواع التراخيص وشروطها، وآلية الحصول عليها، ومدتها، وحالات تعديلها أو إلغائها، والمقابل المالي لإصدارها وتجديدها، والمختص بإصدارها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: 1- ما يخصص لها من اعتمادات من الدولة. 2- إيرادات خدمات تشغيل الموانئ. 3- المقابل المالي للتراخيص التي تصدرها وفقاً للتنظيم. 4- ما يقبله المجلس من هبات وإعانات ومنح ووصايا وتبرعات وأوقاف وفقاً للأنظمة. 5- الموارد الأخرى التي يقرر المجلس إضافتها إلى أموالها وفقاً للأنظمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: 1- تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. 2- تفتح الهيئة حساباً لها في مؤسسة النقد العربي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويُصرف من هذه الحسابات وفق ميزانية الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 1- تكون للهيئة ميزانية مستقلة تعد وفقاً للأسس والمعايير التجارية. 2- السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تتمتع الهيئة بالإعفاءات والمزايا الأخرى التي تتمتع بها المؤسسات والهيئات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: مع عدم الإخلال باختصاصات ديوان المراقبة العامة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها وحسابها الختامي، ويحدد المجلس أتعابه. ولا يجوز أن تتجاوز مدة عمل مراقب الحسابات أكثر من ثماني سنوات متواصلة. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه بعد موافقة المجلس عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تعد الهيئة تقريراً سنويًّا عن أعمالها، وذلك خلال تسعين يومًا على الأكثر من تاريخ انتهاء السنة المالية، يوضح إنجازات الهيئة وما واجهها من صعوبات، وما تراه من مقترحات لتحسين سير العمل فيها. ويعرض هذا التقرير على المجلس لإقراره، وتستكمل الإجراءات النظامية في شأنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يحل التنظيم محل نظام المؤسسة العامة للموانئ، الصادر بالمرسوم الملكي رقم (م/13) وتاريخ 7 / 4 / 1397هـ، ويُلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به بعد تسعين (90) يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/a04e017e-cefb-4939-973f-a9ee00ff5646/1
  verified: false
