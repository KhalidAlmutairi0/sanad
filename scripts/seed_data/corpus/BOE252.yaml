regulation:
  code: BOE252
  name_ar: نظام جمع التبرعات
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'لأغراض هذا النظام، يقصد بالألفاظ والعبارات الآتية -أينما وردت فيه- المعاني المبينة أمام كل منها: النظام: نظام جمع التبرعات. اللائحة: اللائحة التنفيذية للنظام. المركز: المركز الوطني لتنمية القطاع غير الربحي. جمع التبرعات: تلقي التبرعات النقدية أو العينية من خلال الدعوة للتبرع أو إقامة حملة لذلك. الدعوة إلى جمع التبرعات: حث الأشخاص ذوي الصفة الطبيعية أو الاعتبارية على التبرع لجهة محددة، لغرض معين وفي وقت محدد ووفق آلية محددة. حملة جمع التبرعات: نشاط منظم يُدعى من خلاله إلى جمع التبرعات. الجهة المرخِّصة: المركز، وغيره من الجهات المختصة نظاماً بإصدار تراخيص لجمع التبرعات. الجهة المرخَّص لها: الجمعيات والمؤسسات الأهلية، وغيرها من أجهزة القطاع غير الربحي؛ التي تجيز لها أنظمتها أو لوائحها جمع التبرعات، والحاصلة على ترخيص بجمع التبرعات من الجهة المرخِّصة. المتبرع: شخص ذو صفة طبيعية أو اعتبارية يقدم تبرعاً نقديًّا أو عينيًّا لأي جهة مرخَّص لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يُقصر جمع التبرعات على الجهة المرخَّص لها. يجب أن يكون القائمون على جمع التبرعات وصرفها لدى الجهة المرخَّص لها من السعوديين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'لا يجوز لأي جهة مرخَّص لها أن تجمع تبرعات، إلا بما يتفق مع أهدافها التي ينص عليها نظامها أو لائحتها، ويكون جمعها للتبرعات من خلال الآتي: حساباتها البنكية المعتمدة، وفقاً لتعليمات البنك المركزي السعودي. الحوالات المالية عبر القنوات الإلكترونية، ونحوها مما تحدده اللائحة. الشيكات، على أن تودع في حساباتها البنكية المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: للجهة المرخَّص لها تلقي التبرعات العينية من خلال مقرها الرئيس، أو فروعها، أو المواقع المرخص لها بجمع التبرعات فيها، على أن يثبت ذلك في إيصالات ذات أرقام متسلسلة، يسلَّم المتبرع نسخة منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يحظر على الجهة المرخَّص لها ما يلي: تلقي التبرعات النقدية إلا من خلال الإيداع المباشر في حساباتها البنكية المعتمدة لدى البنوك وفروعها. تلقي تبرعات من خارج المملكة، إلَّا بعد موافقة الجهة المرخِّصة. وتحدد اللائحة آلية التنسيق بين الجهة المرخِّصة والجهات ذات العلاقة في هذا الشأن.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: على الجهة المرخَّص لها قبل قيامها بحملة جمع تبرعات تقديم طلب إلى الجهة المرخِّصة، يتضمن الغرض من الحملة وتاريخ بدايتها ومدتها والمبلغ المراد جمعه، وعلى هذه الجهة دراسة الطلب وإصدار قرارها في شأنه خلال (ثلاثين) يوماً من تاريخ تقديم الطلب إليها. يجب أن تتوقف حملة جمع التبرعات عند انتهاء المدة المحددة لها أو توافر المبلغ المستهدف أيهما أسبق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: لا يجوز للجهة المرخَّص لها طباعة مطبوعات لغرض الدعوة إلى جمع التبرعات، ولا نشرها، ما لم يكن نظامها أو لائحتها تجيز لها ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تكون الدعوة إلى جمع التبرعات من خلال الوسائل الآتية: وسائل الإعلام المحلية. شركات الاتصالات المحلية، وفقاً للتعليمات المنظمة لذلك. اللوحات الإعلانية، وفواتير الخدمات. المطبوعات التي تعدها الجهة المرخَّص لها، وفقاً لنظامها أو لائحتها. وسائل التواصل الاجتماعي، ومواقع الإنترنت. أي وسيلة أخرى تحددها اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'على الجهة المرخَّص لها عند الدعوة إلى جمع التبرعات في أي من الوسائل المشار إليها في المادة (الثامنة) من النظام، أن تُضمّن دعوتها البيانات الآتية: رقم الترخيص. أرقام حساباتها البنكية المعتمدة. عنوان مقرها الرئيس، أو فروعها، وأرقام هواتفها. معلومات عن الغرض المطلوب له جمع التبرعات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تزود الجهة المرخَّص لها الجهة المرخِّصة، خلال (خمسة عشر) يوماً من تاريخ انتهاء حملة جمع التبرعات، بكشف حساب بنكي، وتقرير مالي مفصل موضحة فيه التبرعات العينية والنقدية المتحصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لا يجوز للجهة المرخَّص لها صرف ما جمعته من تبرعات في غير الغرض الذي جُمع من أجله، إلا بموافقة الجهة المرخِّصة، مع مراعاة شرط المتبرع إن وجد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: على الجهة المرخَّص لها تحديد أصحاب الصلاحية في الصرف من التبرعات، على ألا يقل عددهم عن (اثنين) بتوقيع مشترك، على أن يكون توقيع المسؤول المالي في الجهة المرخَّص لها توقيعاً أساسيًّا. ويكون الصرف من حساباتها البنكية المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تلتزم الجهة المرخَّص لها عند إعداد ميزانيتها السنوية ببيان حصيلة جمع التبرعات، ومفردات إيراداتها، ومصروفاتها، مؤيداً بالمستندات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: إذا خالفت الجهة المرخَّص لها -عند جمعها للتبرعات- أي حكم من أحكام النظام، فعلى الجهة المرخِّصة أن تصدر قراراً بإيقافها عن جمع التبرعات للغرض الذي جمعت من أجله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: مع مراعاة ما يقضي به نظام الجمعيات والمؤسسات الأهلية، ومراعاة حق أي طرف آخر حسن النية، لكل من الجهة المرخِّصة، والنيابة العامة، ورئاسة أمن الدولة؛ طلب إيقاع الحجز التحفظي على الحسابات البنكية التابعة لأي جهة مرخَّص لها أو أي شخص ذي صفة طبيعية أو اعتبارية يجمع التبرعات بطريقة تخالف أحكام النظام، لمدة لا تتجاوز (ستين) يوماً، ويمكن تمديد الحجز مدة أطول بناءً على أمر قضائي صادر من المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: تتولى النيابة العامة التحقيق في مخالفات أحكام النظام، والادعاء أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يعاقب الشخص ذو الصفة الطبيعية الذي يجمع التبرعات بغرامة لا تزيد على (خمسمائة ألف) ريال، أو بالسجن مدة لا تزيد على سنتين، أو بهما معاً، مع إبعاده من المملكة إن كان غير سعودي بعد انتهاء محكوميته، وعدم السماح له بدخول المملكة إلا بما تقضي به أنظمة الحج والعمرة. تعاقب الجهة غير المرخَّص لها التي تجمع التبرعات بغرامة لا تزيد على (خمسمائة ألف) ريال. وتضاعف الغرامة في حال تكرار المخالفة. تعاقب الجهة المرخَّص لها التي تدعو إلى جمع التبرعات بما يخالف أحكام المادة (التاسعة) من النظام، بغرامة لا تزيد على (مائتي ألف) ريال. وتضاعف الغرامة في حال تكرار المخالفة. تعاقب أي جهة تخالف حكم المادة (السابعة) من النظام، بغرامة لا تزيد على (مائتي ألف) ريال. وتضاعف الغرامة في حال تكرار المخالفة، ويجوز إلغاء ترخيص الجهة حال التكرار. يعاقب كل من يخالف أي حكم من أحكام النظام لم ترد له عقوبة في هذه المادة، بغرامة لا تزيد على (مائة ألف) ريال. وتضاعف الغرامة في حال تكرار المخالفة. تعاقب الوسيلة الإعلامية التي تعلن لجهة غير مرخَّص لها، عن جمع تبرعات، بغرامة لا تزيد على (خمسمائة ألف) ريال. وتضاعف الغرامة
    في حال تكرار المخالفة. تتولى المحكمة المختصة النظر في مخالفات أحكام النظام، وتطبيق العقوبات المنصوص عليها في هذه المادة. إذا شكّلت أي من الأفعال المشار إليها في هذه المادة جريمة بناءً على أنظمة أخرى؛ فتطبق العقوبة الأشد. لا يخل تطبيق الأحكام الواردة في هذه المادة بما تقضي به الأنظمة الأخرى ذات الصلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تُصادر -بحكم قضائي- جميع التبرعات التي جمعت بالمخالفة لأحكام النظام، وتُنفق في أوجه البر التي تحددها اللائحة، مع مراعاة شرط المتبرع إن وجد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يحدد المسؤول الأول في الجهة المرخِّصة من تكون لهم صفة الضبط من منسوبيها؛ لضبط مخالفات أحكام النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: لا تسري أحكام النظام على الجهات التي تخضع للقواعد التي تنظم وتحكم الرقابة على تلقي الجهات الحكومية هبات وتبرعات، الصادرة بقرار مجلس الوزراء رقم (365) وتاريخ 14 / 8 / 1436هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: تصدر اللائحة بقرار من مجلس الوزراء، وذلك بعد إعدادها من المركز الوطني لتنمية القطاع غير الربحي بالتنسيق مع وزارة الداخلية، ووزارة الشؤون الإسلامية والدعوة والإرشاد، ورئاسة أمن الدولة، والهيئة العامة للأوقاف، والبنك المركزي السعودي، خلال مدة لا تتجاوز (تسعين) يومًا من تاريخ نشر النظام في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يلغي النظام لائحة جمع التبرعات للوجوه الخيرية -الصادرة بقرار مجلس الوزراء رقم (547) وتاريخ 30 / 3 / 1396هـ- وجميع ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يعمل بالنظام بعد مضي (مائة وثمانين) يوماً من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/738c42bb-a29f-4da7-bed4-b1d300a55f20/1
  verified: false
