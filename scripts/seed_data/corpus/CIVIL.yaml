regulation:
  code: CIVIL
  name_ar: نظام المعاملات المدنية
  name_en: Civil Transactions Law
  authority: Ministry of Justice
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تُطبق نصوص هذا النظام على جميع المسائل التي تناولتها في لفظها أو في فحواها، فإن لم يوجد نص يمكن تطبيقه طُبقت القواعد الكلية الواردة في الأحكام الختامية، فإن لم توجد قاعدة يمكن تطبيقها طُبقت الأحكام المستمدة من الشريعة الإسلامية الأكثرُ ملاءمة لهذا النظام. لا يخل تطبيق نصوص هذا النظام بالنصوص النظامية الخاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تحسب المدد والمواعيد الواردة في هذا النظام بالتقويم الهجري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تبدأ شخصية الإنسان بتمام ولادته حيًّا وتنتهي بموته. حقوق الحمل المستكن تحددها النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تسري على المفقود والغائب ومجهول النسب النصوص النظامية الخاصة بهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تسري على أسماء الأشخاص وألقابهم وأسرهم وقراباتهم وجنسياتهم النصوص النظامية الخاصة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: القرابة المباشرة هي الصلة بين الأصول والفروع. القرابة غير المباشرة هي الرابطة بين أشخاصٍ يجمعهم أصلٌ مشتركٌ دون أن يكون أحدهم فرعًا للآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تتحدد درجة القرابة المباشرة باعتبار كل فرعٍ درجةً عند الصعود للأصل دون حساب الأصل، وتتحدد درجة القرابة غير المباشرة بعدد الفروع صعودًا من الفرع للأصل المشترك ثم نزولًا منه إلى الفرع الآخر، وكل فرع فيما عدا الأصل المشترك يعدُّ درجة. يعدُّ أقارب أحد الزوجين في القرابة والدرجة نفسها بالنسبة إلى الزوج الآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: الموطن هو المكان الذي يقيم فيه الشخص عادةً. ويجوز أن يكون للشخص في وقتٍ واحدٍ أكثرُ من موطن، وإذا لم يكن له مكانٌ يقيم فيه عادةً عدّ محل وجوده موطنًا له، فإن لم يكن معلومًا ففي آخر محل وجد فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعدُّ المكان الذي يباشر فيه الشخص تجارةً أو مهنةً موطنًا له فيما يتعلق بإدارة أعمال هذه التجارة أو المهنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: موطن عديم الأهلية أو ناقصها أو المفقود أو الغائب هو موطن من ينوب عنه نظامًا، ويجوز أن يكون لناقص الأهلية موطنٌ خاصٌّ فيما يتعلق بالتصرفات التي يُعدُّ أهلًا لمباشرتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يجوز اتخاذ موطنٍ مختارٍ لعملٍ معيَّن، ويكون هو الموطن لكل ما يتعلق بهذا العمل؛ ما لم يُشترط صراحةً قصر هذا الموطن على أعمالٍ دون أخرى. لا يجوز إثبات وجود الموطن المختار إلا بالكتابة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: كامل الأهلية هو كلُّ شخصٍ بلغ سن الرشد متمتعًا بقواه العقلية ولم يُحجر عليه. سن الرشد هي تمام (ثماني عشرة) سنة هجرية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: عديم الأهلية هو كل شخص فاقدٍ للتمييز لصغرٍ في السن أو لجنون. لا يعدُّ مميزًا من لم يتم (السابعة) من عمره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: 'ناقصو الأهلية هم: ‌أ- الصغير الذي بلغ سن التمييز ولم يبلغ سن الرشد. ‌ب- المعتوه، وهو ناقص العقل الذي لم يبلغ حد الجنون. ‌ج- المحجور عليه لسفهٍ أو لكونه ذا غفلة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يخضع عديمو الأهلية وناقصوها لأحكام الولاية أو الوصاية بحسب الأحوال، وفقًا لما تقرره النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ليس لأحدٍ النزول عن أهليته أو التعديل في أحكامها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: 'الأشخاص ذوو الصفة الاعتبارية هم: أ- الدولة. ب- الهيئات والمؤسسات العامة والمصالح التي تمنح شخصية اعتبارية بموجب النصوص النظامية. ج- الأوقاف. د- الشركات التي تمنح شخصية اعتبارية بموجب النصوص النظامية. هـ- الجمعيات الأهلية والتعاونية والمؤسسات الأهلية التي تمنح شخصية اعتبارية بموجب النصوص النظامية. و- كل ما يُمنح شخصية اعتبارية بموجب النصوص النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'يتمتع الشخص ذو الصفة الاعتبارية بجميع الحقوق إلا ما كان منها ملازمًا لخصائص الشخص ذي الصفة الطبيعية، وذلك في الحدود المقررة بموجب النصوص النظامية. يكون للشخص ذي الصفة الاعتبارية: أ- ذمةٌ ماليةٌ مستقلة. ب- أهليةٌ في الحدود التي يعينها سند إنشائه أو التي تقررها النصوص النظامية. ج- حق التقاضي. د- موطنٌ مستقلٌ، وهو المكان الذي يوجد فيه مركز إدارته الرئيس. ويجوز اعتبار المكان الذي يوجد فيه أحد فروع الشخص ذي الصفة الاعتبارية موطنًا له، وذلك فيما يتعلق بنشاط هذا الفرع. هـ- جنسيةٌ وفقًا لما تقرره النصوص النظامية. يجب أن يكون للشخص ذي الصفة الاعتبارية من يمثله ويعبر عن إرادته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: كل شيء مادي أو غير مادي يصح أن يكون محلًّا للحقوق المالية، عدا الأشياء التي لا تقبل بطبيعتها أن يستأثر أحد بحيازتها، أو التي تمنع النصوص النظامية أن تكون محلًّا للحقوق المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: المال كلُّ ما له قيمةٌ مادية معتبرة في التعامل من عينٍ أو منفعةٍ أو حقٍّ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: الأشياء المثلية هي ما تتماثل آحادها أو تتقارب بحيث يمكن أن يقوم بعضها مقام بعض عند الوفاء بلا فرقٍ يُعتد به عرفًا. الأشياء القيمية هي ما تتفاوت آحادها في الصفات أو القيمة تفاوتًا يعتد به عرفًا أو يندر وجود أمثالٍ لها في التداول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: العقار كلُّ شيءٍ ثابتٍ في حيزه لا يمكن نقله منه دون تلفٍ أو تغيُّرٍ في هيئته، وما عدا ذلك فهو منقول. يعدُّ عقارًا بالتخصيص المنقولُ الذي يضعه مالكه في عقارٍ له رصدًا على خدمة العقار أو استغلاله على سبيل الدوام ولو لم يكن متصلًا به اتصال قرار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: الأشياء القابلة للاستهلاك هي التي ينحصر استعمالها -بحسب ما أُعدّت له- في استهلاكها أو إنفاقها، ويعد قابلًا للاستهلاك كل ما أعد في المتاجر للبيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: تسري على المال العام النصوص النظامية الخاصة به
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: يكون الحقُّ الماليُّ شخصيًّا أو عينيًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: يكون الحقُّ العينيُّ أصليًّا أو تبعيًّا. الحقوق العينية الأصلية هي حق الملكية، وحق الانتفاع، وحق الاستعمال، وحق السكنى، وحق الارتفاق، وحق الوقف، وما يعد كذلك بموجب النصوص النظامية. الحقوق العينية التبعية هي حق الرهن، وحق الامتياز، وما يعد كذلك بموجب النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تسري على الحقوق التي ترد على شيءٍ غير مادي النصوص النظامية الخاصة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: من استعمل حقه استعمالًا مشروعًا لا يكون مسؤولًا عما ينشأ عن ذلك من ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: 'لا يجوز التعسف في استعمال الحق. يكون استعمال الحق تعسفيًّا في الحالات الآتية: أ- إذا لم يقصد بالاستعمال سوى الإضرار بالغير. ب- إذا كانت المنفعة من استعماله لا تتناسب مطلقًا مع ما يسببه للغير من ضرر. ج- إذا كان استعماله في غير ما شُرع له أو لغاية غير مشروعة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: تطبق الأحكام الواردة في هذا الفصل على العقود المسماة وغير المسماة، وذلك دون إخلال بالأحكام الواردة في النصوص النظامية التي تنظم عقودًا ذات طبيعة خاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: ينشأ العقد بارتباط الإيجاب بالقبول لإحداث أثر نظامي، مع مراعاة ما تقرره النصوص النظامية من أوضاعٍ معيّنةٍ لانعقاد العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: يتحقق الرضى إذا توافقت إرادتا متعاقدين (أو أكثر) لديهما أهلية التعاقد وعُبِّر عن الإرادة بما يدل عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: يكون الإيجاب والقبول بكل ما يدل على الإرادة. يجوز أن يكون التعبير عن الإرادة باللفظ أو بالكتابة أو بالإشارة المفهومة أو بالمعاطاة، وأن يكون صريحًا أو ضمنيًّا، وذلك ما لم تقتض النصوص النظامية أو الاتفاق أو طبيعة المعاملة خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يعد عرض البضائع والخدمات مع بيان ثمنها إيجابًا، إلا إذا قامت دلائل تفيد خلاف ذلك. لا يعدُّ الإعلان مع بيان الأسعار المتعامل بها إيجابًا، إلا إذا قامت دلائل تفيد أن المراد به الإيجاب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: للموجب أن يعدل عن الإيجاب قبل صدور القبول؛ ما لم تكن للإيجاب مدةٌ معينة. إذا لم تكن للإيجاب مدة معينة؛ فعلى الموجب إذا عدل إعلام من وجه إليه الإيجاب بذلك، وإلا لزم الموجب تعويضه عما لحقه من ضرر، ولا يشمل ذلك ما فاته من كسب متوقع من العقد الذي عُدِل عن إبرامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: 'يسقط الإيجاب في الحالات الآتية: أ- إذا عدل عنه الموجب وفق أحكام المادة (الخامسة والثلاثين) من هذا النظام. ب- إذا رفضه من وجه إليه صراحةً أو ضمنًا، وأي تعديل يتضمنه القبول يعد رفضًا يتضمن إيجابًا جديدًا. ج- إذا مات الموجب أو من وجه إليه الإيجاب أو فقد أحدهما أهليته قبل صدور القبول، ولو كانت للإيجاب مدةٌ معينة. د- إذا لم يتصل القبول بالإيجاب عرفًا أو انقضت المدة التي عيَّنها الموجب للقبول دون صدوره. القبول بعد سقوط الإيجاب لا ينعقد به العقد، ولكنه يُعد إيجابًا جديدًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: لا يعد سكوت من وجه إليه الإيجاب قبولًا إلا إذا كان هناك اتفاقٌ أو وجدت قرينة تدل على ذلك. يعد السكوت قبولًا إذا كان هناك تعاملٌ سابقٌ بين المتعاقدين واتصل الإيجاب بهذا التعامل أو كان هذا الإيجاب لمحض منفعة الموجب له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: إذا كان المتعاقدان حاضرين في مكانٍ واحدٍ أو في مكانين مختلفين عبر وسائل الاتصال المباشرة؛ عُدَّ العقد قد تمَّ في الزمان والمكان اللذين صدر فيهما القبول؛ ما لم يُتفق على خلاف ذلك. إذا كان المتعاقدان غائبين؛ عُدَّ العقد قد تمَّ في الزمان والمكان اللذين علم فيهما الموجب بالقبول؛ ما لم يُتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: دون إخلال بالنصوص النظامية؛ لا يتم العقد في المزايدات إلا برسو المزايدة، ويسقط العطاء بعطاء يزيد عليه ولو وقع باطلًا، أو بإقفال المزايدة دون رسوّها على أحد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: القبول في عقود الإذعان يقتصر على مجرد التسليم بشروط مقررة يضعها الموجب ولا يقبل مناقشة فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: ذا تمَّ التفاوض على عقد فلا يرتب ذلك على أطراف التفاوض التزامًا بإبرام هذا العقد، ومع ذلك يكون من يتفاوض أو يُنهي التفاوض بسوء نية مسؤولًا عن الضرر الذي أصاب الطرف الآخر، ولا يشمل ذلك التَّعويض عمَّا فاته من كسب متوقع من العقد محل التفاوض. يُعدُّ من سوء النية عدم الجدية في التفاوض، أو تعمد عدم الإدلاء ببيانٍ جوهريٍّ مؤثرٍ في العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: إذا اتفق المتعاقدان على المسائل الجوهرية في العقد وعلى إرجاء الاتفاق على المسائل غير الجوهرية؛ كان ذلك كافيًا لاعتبار القبول مطابقًا للإيجاب، ولا يؤثر اختلافهما في المسائل غير الجوهرية في انعقاد العقد ما لم يكونا قد ربطا انعقاده بالاتفاق اللاحق على تلك المسائل. إذا لم يتفق المتعاقدان على المسائل غير الجوهرية؛ حدَّدتها المحكمة وفقًا لأحكام النصوص النظامية وطبيعة المعاملة والعرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: لا يكون الوعد الذي يتعهد بمقتضاه أحد الطرفين أو كلاهما بإبرام عقدٍ في المستقبل ملزمًا إلا إذا عُيّنت المسائل الجوهرية في العقد المراد إبرامه، والمدة التي يجب إبرامه فيها، وتوفرت شروطه عند إنشاء الوعد، بما في ذلك أيّ شروطٍ شكلية تشترطها النصوص النظامية لذلك العقد. إذا امتنع الواعد عن تنفيذ الوعد وطالبه الآخر وكانت شروط العقد متوفرةً؛ قام حكم المحكمة في حال صدوره مقام العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: دفع العربون عند إبرام العقد يفيد أن لدافع العربون وحده الحق في العدول عن العقد، وليس له إذا عدل أن يسترد مبلغ العربون، وذلك كله ما لم يتفق على خلافه. إذا لم يعين المتعاقدان مدة العدول عينتها المحكمة بحسب العرف وظروف العقد. يعد سكوت دافع العربون حتى مضي المدة أو عدم تنفيذ ما التزم به خلالها عدولًا منه عن العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: الاتفاق الإطاري عقدٌ يُحدد المتعاقدان بمقتضاه البنود الأساسية التي تخضع لها العقود التي ينشئها المتعاقدان بينهما وفقًا لأحكام هذا الاتفاق، ويُعد ذلك الاتفاق جزءًا من العقود المبرمة بينهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: إذا أحال المتعاقدان صراحةً أو ضمنًا في العقد إلى أحكام وثيقةٍ نموذجيَّةٍ أو قواعد محددة أو أي وثيقة أخرى عُدَّت جزءًا من العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: كل شخصٍ أهلٌ للتصرف؛ ما لم يكن عديم الأهلية أو ناقصها بمقتضى نص نظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: الصغير ولو كان مميزًا والمجنون والمعتوه محجورٌ عليهم بحكم النِّظام. يكون الحجر على السفيه وذي الغفلة ورفعه عنهما بحكم المحكمة، وللمحكمة أن تعلن الحكم إن رأت مصلحة في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: تصرفات الصغير غير المميز باطلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: إذا كانت تصرفات الصغير المميز نافعةً نفعًا محضًا فهي صحيحة، وإذا كانت ضارةً ضررًا محضًا فهي باطلة. إذا كانت تصرفات الصغير المميز دائرةً بين النفع والضرر فهي صحيحة، ولوليه أو وصيه أو الصغير بعد بلوغه سن الرشد طلب إبطال التصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: إذا أتمَّ الصغير (الخامسة عشرة) من عمره فلوليه أو وصيه -دون إخلال بما تقضي به المادتان (الرابعة والخمسون) و(الخامسة والخمسون) من هذا النظام- أن يسلم الصغير مقدارًا من ماله ويأذن له في التصرفات المالية. ولا يبطل الإذن بموت الآذن أو عزله. وللمحكمة أن تأذن له في التصرف عند امتناع وليه أو وصيه عن الإذن. الصغير المميز المأذون له -وفقًا لأحكام الفقرة (1) من هذه المادة- بمنزلة من بلغ سن الرشد في التصرفات التي أُذِن له فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: تصرفات المعتوه في حكم تصرفات الصغير المميز. تصرفات المجنون في حكم تصرفات الصغير غير المميز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: تصرفات السفيه وذي الغفلة بعد الحجر عليهما في حكم تصرفات الصغير المميز، أما تصرفاتهما قبل الحجر فصحيحةٌ إلا إذا كانت نتيجة استغلالٍ أو تواطؤٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: تسري على المسائل المتعلقة بالولاية والوصاية النصوص النظامية الخاصة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: تعدُّ التصرفات الصادرة عن الأولياء والأوصياء صحيحةً في الحدود التي تقررها النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: إذا لجأ ناقص الأهلية إلى طرقٍ احتياليَّةٍ لإخفاء نقص أهليته لزمه التعويض عن الضرر الذي أصاب المتعاقد معه بسبب إبطال العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: للمتعاقد طلب إبطال العقد إذا وقع في غلط جوهري لولاه لم يرض بالعقد، وبخاصة إذا كان الغلط الجوهري في صفة المحل أو شخص المتعاقد معه أو صفته أو الحكم النظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: لا يُعتد بغلط المتعاقد إلا إذا كان المتعاقد الآخر قد وقع معه في الغلط نفسه أو علم بوقوعه فيه أو كان من السهل عليه أن يتبينه
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: لا يؤثر في العقد مجرد الغلط المادي في الحساب أو الكتابة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: ليس لمن وقع في غلطٍ أن يتمسك به على وجه يتعارض مع ما يقضي به حسن النية، ويكون ملزمًا بالعقد الذي قصد إبرامه إذا أظهر المتعاقد الآخر استعداده لتنفيذ هذا العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: التغرير أن يخدع أحد المتعاقدين الآخر بطرق احتياليَّةٍ تحمله على إبرام عقد لم يكن ليبرمه لولاها. يعد تغريرًا تعمد السكوت لإخفاء أمرٍ لم يكن المغرر به ليبرم العقد لو علم به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: للمغرر به طلب إبطال العقد إذا كان التغرير في أمر جوهري لولاه لم يرض بالعقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: إذا صدر التغرير من غير المتعاقدين فليس للمغرر به أن يطلب إبطال العقد؛ ما لم يثبت أن المتعاقد الآخر كان يعلم بالتغرير أو كان من المفترض أن يعلم به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: الإكراه تهديد شخصٍ دون حقٍّ بوسيلةٍ ماديَّةٍ أو معنويَّةٍ تُخيفه فتحمله على التصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: يتحقق الإكراه إذا كان التهديد بخطرٍ جسيمٍ محدقٍ يلحق بنفس المكرَه أو عرضه أو ماله، أو كان التهديد مسلَّطًا على غيره ولم يكن المكرَه ليُبرم العقد لولا وجود الإكراه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والستون
  article_text_ar: يُراعى في تقدير الإكراه سن من وقع عليه الإكراه وحالته الاجتماعية والصحية وكل ظرف آخر من شأنه أن يؤثر في جسامة الإكراه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والستون
  article_text_ar: للمُكرَه طلب إبطال العقد إذا صدر الإكراه من المتعاقد الآخر. إذا صدر الإكراه من غير المتعاقدين فليس للمُكرَه طلب إبطال العقد؛ ما لم يثبت أن المتعاقد الآخر كان يعلم بالإكراه أو كان من المفترض أن يعلم به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والستون
  article_text_ar: إذا استغل أحد المتعاقدين ضعفًا ظاهرًا أو حاجة ملحة في المتعاقد الآخر، لإبرام عقدٍ لحقه منه غبنٌ، فللمحكمة بناء على طلب المتعاقد المغبون ومراعاة لظروف الحال أن تنقص من التزاماته أو تزيد من التزامات المتعاقد الآخر أو تبطل العقد، ويجب أن ترفع الدعوى بذلك خلال (مائة وثمانين) يومًا من تاريخ التعاقد، وإلا امتنع سماعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والستون
  article_text_ar: الغبن زيادة العوض أو نقصه قدرًا خارجًا عن المعتاد. ويُرجع في تحديد الغبن إلى العرف. ليس للمتعاقد طلب إبطال العقد لمجرد الغبن إلا في مال عديم الأهلية وناقصها وما تقضي به النصوص النظامية، وللمتعاقد الآخر توقي الإبطال إذا قدم ما تراه المحكمة كافيًا لرفع الغبن. لا يجوز الطعن لمجرد الغبن في عقدٍ أُبرم بطريق المزايدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعون
  article_text_ar: يصحُّ أن يكون محلُّ الالتزام نقل حق عيني أو عملًا أو امتناعًا عن عمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والسبعون
  article_text_ar: يصح أن يكون محل الالتزام شيئًا مستقبلًا معيَّنًا بنوعه ومقداره، وفيما عدا الأحوال التي تجيزها النصوص النظامية لا يصح أن تكون تركة شخص على قيد الحياة محلًّا للتعامل ولو كان قد صدر منه أو برضاه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والسبعون
  article_text_ar: 'يجب أن تتوفر في محل الالتزام الشروط الآتية: أ- أن يكون ممكنًا في ذاته. ب- ألا يكون مخالفًا للنظام العام. ج- أن يكون معيَّنًا بذاته أو بنوعه ومقداره أو قابلًا للتعيين. يقع العقد باطلًا إذا لم تتوفر في المحل الشروط الواردة في الفقرة (1) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والسبعون
  article_text_ar: إذا لم يحدِّد المتعاقدان مقدار المحل وتضمن العقد ما يمكن للمحكمة تحديده به؛ حددته بناءً على ذلك. إذا لم يتفق المتعاقدان على درجة جودة الشيء ولم يوجد عرف أو قرينة؛ التزم المدين بأن يسلم شيئًا ذا جودة متوسطة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والسبعون
  article_text_ar: يجوز أن يتضمن العقد أي شرطٍ يرتضيه المتعاقدان إذا توفرت فيه الشروط الواردة في الفقرة (1) من المادة (الثانية والسبعين) من هذا النظام. إذا تضمن العقد شرطًا باطلًا بطل الشرط وحده، وللمتعاقد طلب إبطال العقد إذا تبيّن أنه ما كان ليرضى بالعقد دون ذلك الشرط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والسبعون
  article_text_ar: يقع باطلًا أي عقد يكون السبب الباعث على التعاقد فيه غير مشروع إذا صُرِّح به في العقد أو دلت عليه ظروف التعاقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والسبعون
  article_text_ar: كل عقد لم يُذكر سببه يُفترض أن له سببًا مشروعًا؛ ما لم يقم الدليل على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والسبعون
  article_text_ar: إذا جعل نص نظامي لأحد المتعاقدين الحق في طلب إبطال العقد؛ فليس للمتعاقد الآخر أن يتمسك بهذا الحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والسبعون
  article_text_ar: يسقط الحق في طلب إبطال العقد بالإجازة الصريحة أو الضمنية إذا صدرت ممن له هذا الحق، وإذا أجاز العقد استندت الإجازة إلى وقت إبرامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والسبعون
  article_text_ar: لا تسمع دعوى إبطال العقد إذا انقضت (سنة) من تاريخ العلم بسبب الإبطال، وإذا كان إبطال العقد لنقص الأهلية أو الإكراه فبانقضاء (سنة) من تاريخ اكتمال الأهلية أو زوال الإكراه. فيما عدا حال نقص الأهلية، لا تسمع دعوى إبطال العقد إذا انقضت (عشر) سنوات من تاريخ التعاقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثمانون
  article_text_ar: يجوز لكل ذي مصلحةٍ أن يُعذِر من له حق إبطال العقد بإبداء رغبته في إجازة العقد أو إبطاله خلال مدة لا تقل عن (تسعين) يومًا من تاريخ الإعذار. فإذا مضت المدة ولم يبد رغبته دون عذر؛ سقط حقه في الإبطال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثمانون
  article_text_ar: إذا وقع العقد باطلًا جاز لكل ذي مصلحة أن يتمسك بالبطلان، وللمحكمة أن تقضي به من تلقاء نفسها، ولا يزول البطلان بالإجازة. لا تسمع دعوى البطلان إذا انقضت (عشر) سنوات من تاريخ التعاقد، ولكن لكل ذي مصلحة أن يدفع ببطلان العقد في أي وقت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثمانون
  article_text_ar: في حالتي إبطال العقد أو بطلانه، يعود المتعاقدان إلى الحالة التي كانا عليها قبل التعاقد، وإذا استحال ذلك جاز أن يُقضى بالتعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثمانون
  article_text_ar: في حالتي إبطال العقد أو بطلانه لنقص أهلية المتعاقد أو انعدامها، لا يلزمه أن يرد غير ما عاد عليه من منفعة معتبرة بسبب تنفيذ العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثمانون
  article_text_ar: إذا كان العقد في جزء منه باطلًا أو يجوز إبطاله؛ يبطل ذلك الجزء فقط، إلا إذا تبين أن المتعاقد ما كان ليرضى بالعقد دون ذلك الجزء فله طلب إبطال العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثمانون
  article_text_ar: إذا توفرت في العقد الباطل أركان عقد آخر؛ انعقد هذا العقد إذا تبين أن إرادة المتعاقدين كانت تنصرف إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثمانون
  article_text_ar: لا يحتج بإبطال العقد تجاه الخلف الخاص للمتعاقد إذا كسب حقًّا عينيًّا معاوضة بحسن نية. يعد الخلفُ الخاصُّ حسنَ النية إذا كان عند التعاقد لا يعلم سبب إبطال عقد سلفه ولم يكن بمقدوره أن يعلم لو أنه بذل من الحرص ما تقتضيه ظروف الحال من الشخص المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثمانون
  article_text_ar: يصح التعاقد بالنيابة؛ ما لم تقتض النصوص النظامية خلاف ذلك. تكون النيابة في التعاقد اتفاقيةً أو قضائيةً أو نظاميةً.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثمانون
  article_text_ar: ليس للنائب أن يتجاوز حدود نيابته المعيَّنة في سند إنشائها، سواء أكان السند عقدًا أم حكمًا قضائيًّا أم نصًّا نظاميًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثمانون
  article_text_ar: في التعاقد بالنيابة يكون شخص النائب هو المعتبر في عيوب الرضى، وفي أثر العلم بالأمور التي يختلف فيها حكم العقد بين علم المتعاقد بها أو جهله. إذا كانت النيابة اتفاقية ووضع الأصيل للنائب تعليمات محددة لإبرام العقد؛ فليس للأصيل أن يتمسك بجهل نائبه بالأمور التي يؤثر العلم أو الجهل بها في العقد ما دام الأصيل يعلمها أو يفترض علمه بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التسعون
  article_text_ar: إذا تعاقد النائب في حدود نيابته باسم الأصيل فإن ما ينشأ عن العقد من حقوقٍ والتزاماتٍ يُضاف إلى الأصيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والتسعون
  article_text_ar: إذا لم يُعلِم النائبُ المتعاقدَ الآخرَ وقت إنشاء العقد أنَّه تعاقد بصفته نائبًا؛ فإنَّ أثر العقد لا يُضاف إلى الأصيل دائنًا أو مدينًا إلا إذا كان من المفترض أنَّ من تعاقد معه النائب يعلم بوجود النيابة أو كان يستوي عنده أن يتعامل مع الأصيل أو النائب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والتسعون
  article_text_ar: إذا كان النائب والمتعاقد معه يجهلان معًا عند التعاقد انتهاء النيابة؛ فإن العقد يُضاف إلى الأصيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والتسعون
  article_text_ar: لا يجوز للنائب أن يتعاقد مع نفسه بمقتضى نيابته دون أن يكون مأذونًا له بذلك سواء أكان تعاقده مع نفسه لحسابه أم لحساب الغير، وللأصيل أن يجيز التعاقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والتسعون
  article_text_ar: إذا تم العقد صحيحًا لم يجز نقضه أو تعديله إلا بالاتفاق أو بمقتضى نص نظامي. تثبت الحقوق التي يُنشئها العقد فور انعقاده، دون توقفٍ على القبض أو غيره؛ ما لم يقض نص نظامي بخلاف ذلك، ويجب على المتعاقدين الوفاء بما أوجبه العقد عليهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والتسعون
  article_text_ar: يجب تنفيذ العقد طبقًا لما اشتمل عليه وبطريقة تتفق مع ما يوجبه حسن النية. لا يقتصر العقد على إلزام المتعاقد بما ورد فيه، ولكن يشمل ما هو من مستلزماته وفقًا لما تقضي به النصوص النظامية والعرف وطبيعة العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والتسعون
  article_text_ar: إذا تمَّ العقد بطريق الإذعان وتضمن شروطًا تعسفيةً؛ فللمحكمة أن تعدلها أو تعفي الطرف المـُذْعِن منها وفقًا لما تقتضيه العدالة. ويقع باطلًا كل اتفاق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والتسعون
  article_text_ar: إذا طرأت ظروف استثنائيةٌ عامَّةٌ لم يكن في الوسع توقعها وقت التعاقد وترتب على حدوثها أن يصير تنفيذ الالتزام التعاقدي مرهقًا للمدين بحيث يهدده بخسارةٍ فادحةٍ؛ فله -دون تأخرٍ غير مسوغ- دعوة الطرف الآخر للتفاوض. طلب التفاوض لا يخول المدين الامتناع عن تنفيذ الالتزام. إذا لم يُتوصل إلى اتِّفاقٍ خلال مدَّةٍ معقولةٍ؛ فللمحكمة تبعًا للظروف وبعد الموازنة بين مصلحة الطرفين أن ترد الالتزام المرهق إلى الحد المعقول. يقع باطلًا كل اتفاق على خلاف أحكام هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والتسعون
  article_text_ar: ينصرف أثر العقد إلى المتعاقدين والخلف العام، دون إخلال بالأحكام الخاصة بالإرث؛ ما لم يتبين من العقد أو من طبيعة المعاملة أو من النصوص النظامية أن هذا الأثر لا ينصرف إلى الخلف العام. إذا أنشأ العقد التزامات وحقوقًا شخصية تتصل بشيء انتقل بعد ذلك إلى خلف خاص فإن هذه الالتزامات والحقوق تنتقل إليه في الوقت الذي ينتقل فيه ذلك الشيء إذا كانت من مستلزماته وكان الخلف الخاص يعلم بها وقت انتقال ذلك الشيء إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والتسعون
  article_text_ar: لا يرتب العقد التزامًا في ذمة الغير، ولكن يجوز أن يكسبه حقًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة المائة
  article_text_ar: إذا تعهد شخص بأن يجعل الغير يلتزم بأمرٍ فإن ذلك الغير لا يُلزم به. إذا قبل الغير ذلك التعهد فإن قبوله لا ينتج أثرًا إلا من وقت صدوره؛ ما لم يتبين أنه قصد صراحةً أو ضمنًا أن يستند أثر هذا القبول إلى وقت التعهد. إذا رفض الغير ذلك التعهد لزم المتعهد تعويض المتعهد له إذا كان لذلك مقتضٍ، وللمتعهد أن يتخلص من التعويض بأن يقوم بتنفيذ الالتزام الذي تعهد به إن كان ذلك ممكنًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأولى بعد المائة
  article_text_ar: للشخص أن يتعاقد باسمه على التزامات يشترطها لمصلحة غيره إذا كان له في تنفيذ هذه الالتزامات مصلحة شخصية مادية كانت أم أدبية. يترتب على الاشتراط لمصلحة الغير أن يَكسِبَ الغير حقًّا مباشرًا تجاه المتعهد يستطيع أن يطالبه بوفائه ما لم يُتفق على خلاف ذلك، وللمتعهد أن يتمسك تجاه المنتفع بالدفوع التي تنشأ عن العقد. للمشترط أن يطالب المتعهد بتنفيذ ما اشترط لمصلحة المنتفع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية بعد المائة
  article_text_ar: للمشترط دون دائنيه أو ورثته أن ينقض الاشتراط، أو أن يُحل منتفعًا آخر محل الأول، أو أن يحول المنفعة لنفسه؛ ما لم يُعلم المنتفعُ المتعهدَ أو المشترطَ قبوله لما اشتُرط له، أو يكن ذلك مضرًّا بمصلحة المتعهد، وذلك كله ما لم يتفق على خلافه. لا يترتب على نقض الاشتراط براءة ذمة المتعهد تجاه المشترط إلا إذا اتُّفق صراحةً أو ضمنًا على براءته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة بعد المائة
  article_text_ar: يجوز في الاشتراط لمصلحة الغير أن يكون المنتفع شخصًا مستقبلًا أو أن يكون شخصًا غير معين وقت العقد إذا كان من الممكن تعيينه عند الوفاء بالالتزام المشترط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة بعد المائة
  article_text_ar: إذا كانت عبارة العقد واضحةً فلا يُعدل عن مدلولها بحجة تفسيرها بحثًا عن إرادة المتعاقدين. إذا كان هناك محل لتفسير العقد فيجب البحث عن الإرادة المشتركة للمتعاقدين، دون الاكتفاء بالمعنى الحرفي للألفاظ، ويُستهدى في ذلك بالعرف وظروف العقد وطبيعة المعاملة وما جرت به العادة في التعامل بين المتعاقدين وحالهما وما ينبغي أن يسود من أمانة وثقة بينهما، وتُفسِّر شروط العقد بعضها بعضًا وذلك بإعطاء كل شرط المعنى الذي لا يتعارض به مع غيره من الشروط. يُفسر الشك لمصلحة من يتحمل عبء الالتزام أو الشرط، ويُفسر في عقود الإذعان لمصلحة الطرف المـُذْعِن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة بعد المائة
  article_text_ar: للمتعاقدين أن يتقايلا العقد برضاهما في المحل أو بعضه، وتطبق على الإقالة شروط العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة بعد المائة
  article_text_ar: يجوز التعاقد بشرط الخيار في العدول عن العقد، ولمن له الخيار حق العدول خلال المدة المعينة بشرط إعلام المتعاقد الآخر، فإذا عدل من له الخيار عُدَّ ذلك فسخًا للعقد، وإذا لم تعين مدة الخيار عينتها المحكمة بحسب العرف وظروف العقد. يسقط الخيار في العدول عن العقد بإسقاطه صراحة أو ضمنًا ممن له الخيار، ويسقط بمضي مدة الخيار دون عدول، وإذا كان الخيار للمتعاقدين وسقط خيار أحدهما لم يسقط خيار الآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة بعد المائة
  article_text_ar: في العقود الملزمة للجانبين، إذا لم يوف أحد المتعاقدين بالتزامه، فللمتعاقد الآخر بعد إعذاره المتعاقد المخل أن يطلب تنفيذ العقد أو فسخه، مع التعويض في الحالتين إن كان له مقتض، وللمحكمة أن ترفض طلب الفسخ إذا كان الجزء الذي لم يوف به المخل قليل الأهمية بالنسبة إلى الالتزام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة بعد المائة
  article_text_ar: يجوز الاتفاق على أن يكون للدائن حق فسخ العقد عند إخلال المدين بالتزاماته دون حاجة إلى حكم قضائي، ولا يُعفي هذا الاتفاق من الإعذار إلا إذا اتفق المتعاقدان صراحةً على الإعفاء منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة بعد المائة
  article_text_ar: تُعدُّ عقود المعاوضات منعقدةً على أساس سلامة محل العقد من العيوب إلا ما جرى العرف على التسامح فيه، فإذا تبيَّن في المحل عيبٌ لم يجر العرف على التسامح فيه؛ عُدَّ ذلك إخلالًا بالالتزام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة بعد المائة
  article_text_ar: في العقود الملزمة للجانبين، إذا أصبح تنفيذ الالتزام مستحيلًا بسببٍ لا يد للمدين فيه، انقضى التزامه والالتزام المقابل له، وانفسخ العقد من تلقاء نفسه. إذا كانت الاستحالة جزئيَّةً انقضى الالتزام في الجزء المستحيل وما يقابله فقط، ويسري هذا الحكم على الاستحالة الوقتية في العقود الزمنية، وفي كلتا الحالتين يجوز للدائن طلب فسخ العقد، وللمحكمة رفض طلب الفسخ إذا كان القدر المستحيل قليل الأهمية بالنسبة إلى الالتزام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة بعد المائة
  article_text_ar: في حالتي فسخ العقد أو انفساخه يعود المتعاقدان إلى الحالة التي كانا عليها قبل التعاقد، وإذا استحال ذلك فللمحكمة أن تقضي بالتعويض. إذا كان العقد من العقود الزمنية فلا يكون للفسخ أو الانفساخ أثرٌ رجعيٌّ، وللمحكمة أن تقضي بالتعويض إن وجد له مقتضٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة بعد المائة
  article_text_ar: لا يحتج بفسخ العقد تجاه الخلف الخاص للمتعاقد إذا كسب حقًّا عينيًّا بحسن نية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد المائة
  article_text_ar: دون إخلال بالنصوص النظامية، لا يزول بفسخ العقد شرط الالتزام بتسوية المنازعة ولا شرط الالتزام بالسرية؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد المائة
  article_text_ar: في العقود الملزمة للجانبين، إذا كانت الالتزامات المتقابلة مستحقة الوفاء جاز لأي من المتعاقدين أن يمتنع عن تنفيذ التزامه ما دام المتعاقد الآخر ممتنعًا عن تنفيذ ما التزم به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد المائة
  article_text_ar: يجوز أن يلتزم الشخص بإرادته المنفردة، وذلك في الأحوال التي تقررها النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة بعد المائة
  article_text_ar: تسري على التصرف بالإرادة المنفردة أحكام العقد، عدا ما تعلق منها بضرورة وجود إرادتين متطابقتين لإنشاء الالتزام، وذلك ما لم تقض النصوص النظامية بخلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة بعد المائة
  article_text_ar: من وجه للجمهور وعدًا بجائزةٍ محددةٍ على عملٍ معيَّنٍ، التزم بإعطاء الجائزة لمن قام بهذا العمل وفقًا للشروط المعلنة، ولو قام به دون نظر إلى الوعد بالجائزة أو دون علم بها. إذا لم يحدد الواعد أجلًا للقيام بالعمل جاز له الرجوع في وعده إذا أعلنه بالطريق الذي وجه به الوعد أو بإعلانه للكافة، ولا يؤثر رجوع الواعد في استحقاق الجائزة لمن أتم العمل المطلوب قبل إعلان الرجوع، وتسقط دعوى المطالبة بالجائزة إذا انقضت (تسعون) يومًا من تاريخ إعلان الرجوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد المائة
  article_text_ar: مع مراعاة أحكام المسؤولية الواردة في نصوص نظامية خاصة؛ تسري أحكام هذا الفصل على المسؤولية الناشئة عن الفعل الضار من الشخص ذي الصفة الطبيعية أو الاعتبارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد المائة
  article_text_ar: لا تخل المسؤولية المدنية بالمسؤولية الجزائية، ولا تأثير للعقوبة في تحديد نطاق المسؤولية المدنية وتقدير التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العشرون بعد المائة
  article_text_ar: كل خطأٍ سبب ضررًا للغير يُلزم من ارتكبه بالتعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد المائة
  article_text_ar: إذا كان الفعل الضار من مباشر له؛ عُدَّ الضرر ناشئًا بسبب ذلك الفعل؛ ما لم يقم الدليل على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد المائة
  article_text_ar: يكون الشخص مسؤولًا عن الفعل الضار متى صدر منه وهو مميز. إذا وقع الضرر من غير المميز ولم يكن هناك من هو مسؤول عن الضرر أو تعذر الحصول على تعويضٍ من المسؤول، لزم غير المميز تعويضٌ مناسبٌ تقدره المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد المائة
  article_text_ar: من أحدث ضررًا وهو في حالة دفاع مشروع عن نفس أو عرض أو مال؛ كان غير مسؤول، على ألا يجاوز دفاعه القدر الضروري لدفع الاعتداء، وإلا كان ملزمًا بالتعويض بالقدر الذي تراه المحكمة مناسبًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد المائة
  article_text_ar: من أحدث ضررًا للغير ليتفادى ضررًا أكبر محدقًا به أو بغيره؛ لا يكون ملزمًا بالتعويض إلا بالقدر الذي تراه المحكمة مناسبًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد المائة
  article_text_ar: لا يكون الشخص مسؤولًا إذا ثبت أن الضرر قد نشأ عن سببٍ لا يد له فيه، كقوةٍ قاهرةٍ أو خطأ الغير أو خطأ المتضرر؛ ما لم يُتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد المائة
  article_text_ar: لا يكون الموظف العام مسؤولًا عن عمله الذي أضر بالغير، إذا أداه تنفيذًا لنص نظامي أو لأمر صدر إليه من رئيسه، متى كانت إطاعة هذا النص أو الأمر واجبة عليه، أو كان يعتقد لمبررات مقبولة أنها واجبة، وأثبت أنه كانت لديه أسباب معقولة جعلته يعتقد مشروعية العمل الذي أتاه، وأنه راعى في عمله جانب الحيطة والحذر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد المائة
  article_text_ar: إذا تعدد المسؤولون عن فعل ضار كانوا متضامنين في التزامهم بتعويض الضرر، وتعين المحكمة نصيب كل منهم في التعويض وفق القواعد الواردة في هذا الفصل، وإذا تعذر ذلك كانت المسؤولية بينهم بالتساوي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد المائة
  article_text_ar: إذا اشترك المتضرر بخطئه في إحداث الضرر أو زاد فيه، سقط حقه أو بعض حقه في التعويض، وذلك بنسبة اشتراكه فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد المائة
  article_text_ar: من وجبت عليه نظامًا أو اتفاقًا أو قضاءً رقابة شخص لصغر سنِّه أو قصور حالته العقلية أو الجسمية؛ كان مسؤولًا عن الضرر الذي أحدثه ذلك الشخص، إلا إذا أثبت متولي الرقابة أنه قد قام بواجب الرقابة بما ينبغي من العناية أو أن الضرر كان لابد من حدوثه ولو قام بهذا الواجب بما ينبغي من العناية. يكون المتبوع مسؤولًا تجاه المتضرر عن الضرر الذي يحدثه تابعه بخطئه أثناء تأدية عمله أو بسبب هذا العمل، إذا كانت للمتبوع سلطة فعلية في رقابة التابع وتوجيهه ولو لم يكن المتبوع حرًّا في اختيار تابعه. لمن أدى التعويض عن الشخص الذي وقع منه الضرر في الحالتين المنصوص عليهما في الفقرتين (1) و(2) من هذه المادة حق الرجوع عليه في الحدود التي يكون فيها ذلك الشخص مسؤولًا عن تعويض الضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثون بعد المائة
  article_text_ar: يكون حارس الحيوان مسؤولًا عن تعويض الضرر الذي يحدثه الحيوان؛ ما لم يثبت أن الضرر كان بسبب لا يد له فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد المائة
  article_text_ar: يكون حارس البناء مسؤولًا عن تعويض الضرر الذي يحدثه تهدّم البناء كله أو بعضه؛ ما لم يثبت أن الضرر لا يرجع سببه إلى إهمال في الصيانة أو قدم في البناء أو عيب فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد المائة
  article_text_ar: كل من تولى حراسة أشياء تتطلب عنايةً خاصَّةً -بطبيعتها أو بموجب النصوص النظامية- للوقاية من ضررها؛ كان مسؤولًا عمَّا تحدثه تلك الأشياء من ضرر، ما لم يثبت أن الضرر كان بسبب لا يد له فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد المائة
  article_text_ar: لكل من كان مهدَّدًا بضررٍ من شيءٍ معيَّنٍ أن يطالب حارسه باتخاذ ما يلزم من التدابير لدرء خطره، فإذا لم يقم باتخاذ هذه التدابير في وقت مناسب فلمن يهدده الخطر أن يحصل على إذن المحكمة في إجرائها على نفقة المالك، ويجوز في حال الاستعجال أن يتخذ ما يلزم من التدابير بغير إذن المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد المائة
  article_text_ar: يُعَدُّ حارسًا للشيء من له بنفسه أو بوساطة غيره سلطة فعليّة عليه ولو كان الحارس غير مميز، ويفترض أن مالك الشيء هو حارسه ما لم يقم الدليل على أن الحراسة انتقلت لغيره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد المائة
  article_text_ar: استعمال الحق في المنافع العامة مقيَّدٌ بسلامة الغير، فمن استعمل حقه في منفعةٍ عامَّةٍ وأضر بالغير ضررًا يمكن التحرز منه كان مسؤولًا عن ذلك الضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد المائة
  article_text_ar: يكون التعويض بما يجبر الضرر كاملًا؛ وذلك بإعادة المتضرر إلى الوضع الذي كان فيه أو كان من الممكن أن يكون فيه لولا وقوع الضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد المائة
  article_text_ar: يتحدد الضرر الذي يلتزم المسؤول بالتعويض عنه بقدر ما لحق المتضرر من خسارةٍ وما فاته من كسب، إذا كان ذلك نتيجةً طبيعيةً للفعل الضار. ويعد كذلك إذا لم يكن في مقدور المتضرر تفاديه ببذل الجهد المعقول الذي تقتضيه ظروف الحال من الشخص المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد المائة
  article_text_ar: يشمل التعويضُ عن الفعل الضار التعويضَ عن الضرر المعنوي. يشمل الضرر المعنوي ما يلحق الشخص ذا الصفة الطبيعية من أذى حسيٍّ أو نفسيٍّ، نتيجة المساس بجسمه أو بحريته أو بعرضه أو بسمعته أو بمركزه الاجتماعي. لا ينتقل حق التعويض عن الضرر المعنوي إلى الغير إلا إذا تحددت قيمته بمقتضى نص نظامي أو اتفاقٍ أو حكمٍ قضائيٍّ. تقدر المحكمة الضرر المعنوي الذي أصاب المتضرر، وتراعي في ذلك نوع الضرر المعنوي وطبيعته وشخص المتضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد المائة
  article_text_ar: يُقدر التعويض بالنقد، على أنه يجوز للمحكمة تبعًا للظروف وبناءً على طلب المتضرر أن تقضي بالتعويض بالمثل أو بإعادة الحال إلى ما كانت عليه، أو أن تقضي بأمر معين متصل بالفعل الضار. يجوز الحكم بأداء التعويض على أقساط أو في صورة إيراد مرتب، وللمحكمة في هاتين الحالتين أن تحكم بإلزام المدين بتقديم ضمان كافٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعون بعد المائة
  article_text_ar: إذا ترتب على الفعل الضار تلف جسيم تتعذر معه إعادة الشيء للاستعمال المعد له؛ فللمتضرر الاحتفاظ به أو تركه للمتلف، والمطالبة بالتعويض في كلتا الحالتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد المائة
  article_text_ar: للمحكمة إذا لم تتمكن من تقدير التعويض تقديرًا نهائيًّا أن تقرر تقديرًا أوَّليًّا للتعويض مع حفظ حق المتضرر في المطالبة بإعادة النظر في تقدير التعويض خلال مدة تعينها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والأربعون بعد المائة
  article_text_ar: إذا كان الضرر واقعًا على النفس أو ما دونها فإن مقدار التعويض عن الإصابة ذاتها يتحدد وفقًا لأحكام الضمان المقدّر في الشريعة الإسلامية في الجناية على النفس وما دونها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد المائة
  article_text_ar: لا تُسمع دعوى التعويض الناشئة عن الفعل الضار بانقضاء (ثلاث) سنوات من تاريخ علم المتضرر بوقوع الضرر وبالمسؤول عنه. وفي جميع الأحوال لا تسمع الدعوى بانقضاء (عشر) سنوات من تاريخ وقوع الضرر. إذا كانت دعوى التعويض ناشئة عن جريمة؛ فإنه لا يمتنع سماعها ما دامت الدعوى الجزائية لم يمتنع سماعها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد المائة
  article_text_ar: كل شخص -ولو غير مميز- يثري دون سبب مشروع على حساب شخص آخر يلزمه في حدود ما أثرى به تعويض هذا الشخص عما لحقه من خسارة، ويبقى هذا الالتزام قائمًا ولو زال الإثراء فيما بعد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد المائة
  article_text_ar: كل من تسلَّم على سبيل الوفاء ما ليس مستحقًّا له وجب عليه ردُّه. لا محلَّ للرد إذا كان من قام بالوفاء يعلم أنه يدفع ما ليس مستحقًا، إلا أن يكون ناقص الأهلية أو مُكرهًا على هذا الوفاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والأربعون بعد المائة
  article_text_ar: يصح استرداد غير المستحق إذا كان الوفاء تنفيذًا لالتزامٍ لم يتحقَّق سببه أو زال بعد تحقُّقه، أو كان الوفاء تنفيذًا لالتزامٍ لم يحل أجله وكان الموفي جاهلًا قيام الأجل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والأربعون بعد المائة
  article_text_ar: لا محل لاسترداد غير المستحق إذا حصل الوفاء من غير المدين وترتب عليه أن الدائن وهو حسن النية قد تجرد من سند الدين أو مما حصل عليه من الضمانات أو ترك دعواه قِبَل المدين الأصلي حتى انقضاء المدة المعينة لسماعها، وللغير الذي وفى أن يرجع على المدين الأصلي بالدين وفق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والأربعون بعد المائة
  article_text_ar: إذا كان من تسلَّم غير المستحق حسن النيَّة فلا يُلزم بأن يرد إلا ما تسلَّم، وإذا كان سيء النيَّة فإنه يُلزم بردِّ ما تسلَّم وثماره التي قبضها والتي قصَّر في قبضها، وذلك من اليوم الذي أصبح فيه سيء النيَّة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والأربعون بعد المائة
  article_text_ar: إذا لم تتوفر أهلية التعاقد فيمن تسلَّم غير المستحق فلا يكون مُلزمًا إلا بالقدر الذي أثرى به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسون بعد المائة
  article_text_ar: الفضالة أن يتولى شخص عن قصدٍ القيام بشأن عاجل لحساب شخص آخر، دون أن يكون ملزمًا بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والخمسون بعد المائة
  article_text_ar: تتحقق الفضالة ولو كان الفضولي أثناء توليه شأنًا لنفسه قد تولى شأن غيره لما بين الشأنين من ارتباطٍ يمنع من القيام بأحدهما منفصلًا عن الآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والخمسون بعد المائة
  article_text_ar: تسري أحكام الوكالة إذا أجاز المنتفع ما قام به الفضولي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والخمسون بعد المائة
  article_text_ar: يجب على الفضولي أن يمضي في العمل الذي بدأه إلى أن يتمكن المنتفع من مباشرته بنفسه، ويجب عليه أن يُعلم المنتفع بتدخله فور استطاعته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والخمسون بعد المائة
  article_text_ar: يجب على الفضولي أن يبذل عناية الشخص المعتاد، ويكون مسؤولًا عن الضرر الناشئ عن خطئه، وللمحكمة أن تنقص التعويض إن وُجد مسوّغ لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والخمسون بعد المائة
  article_text_ar: إذا عهد الفضولي إلى غيره بكل العمل أو بعضه كان مسؤولًا عن تصرفات المعهود إليه، دون إخلالٍ بما للمنتفع من الرجوع مباشرة على المعهود إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والخمسون بعد المائة
  article_text_ar: يلتزم الفضولي برد ما حصل لديه بسبب الفضالة وبتقديم حسابٍ عما قام به للمنتفع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والخمسون بعد المائة
  article_text_ar: يعدُّ الفضولي نائبًا عن المنتفع إذا كان قد بذل في قيامه بالعمل عناية الشخص المعتاد ولو لم تتحقق النتيجة المرجوة، وعلى المنتفع في هذه الحال أن ينفذ التعهدات التي عقدها الفضولي لحسابه وأن يعوضه عن التعهدات التي التزم بها وأن يرد له النفقات الضرورية والنافعة التي سوغتها الظروف وأن يعوضه عن الضرر الذي لحقه بسبب قيامه بالعمل. لا يستحق الفضولي أجرًا عن عمله إلا أن يكون من أعمال مهنته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والخمسون بعد المائة
  article_text_ar: إذا مات الفضولي، وجب على ورثته -إذا توفرت فيهم الأهلية- أو نائبهم وكانوا على علم بالفضالة؛ أن يبادروا بإعلام المنتفع بموت مورثهم، وأن يتخذوا من التدابير ما تقتضيه الحال لمصلحته. إذا مات المنتفع، بقي الفضولي ملتزمًا للورثة بما كان ملتزمًا به تجاه مورثهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والخمسون بعد المائة
  article_text_ar: لا تُسمع الدعوى الناشئة عن الإثراء بلا سبب أو دفع غير المستحق أو الفضالة بانقضاء (ثلاث) سنوات من تاريخ علم الدائن بحقه. وفي جميع الأحوال لا تُسمع الدعوى بانقضاء (عشر) سنوات من تاريخ نشوء الحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستون بعد المائة
  article_text_ar: الالتزامات التي تنشأ مباشرةً عن النظام وحده تسري عليها النصوص النظامية التي أنشأتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والستون بعد المائة
  article_text_ar: يجب على المدين تنفيذ التزامه عند استحقاقه، فإذا امتنع نفذ عليه جبرًا متى استوفى التنفيذ الجبري شروطه النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والستون بعد المائة
  article_text_ar: إذا لم يستوف الالتزام الشروط النظامية لتنفيذه جبرًا يبقى قائمًا في ذمة المدين ديانةً، فإذا وفاه مختارًا كان وفاؤه صحيحًا ولا يُعدُّ تبرعًا ولا دفعًا لغير المستحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والستون بعد المائة
  article_text_ar: الالتزام القائم ديانةً يُعدُّ أساسًا صالحًا لأن يبني عليه المدين التزامًا نظاميًّا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والستون بعد المائة
  article_text_ar: يُجبَر المدين بعد إعذاره على تنفيذ التزامه تنفيذًا عينيًّا متى كان ذلك ممكنًا. إذا كان في التنفيذ العيني إرهاقٌ للمدين جاز للمحكمة بناءً على طلبه أن تقصر حق الدائن على اقتضاء التعويض إذا كان ذلك لا يلحق به ضررًا جسيمًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والستون بعد المائة
  article_text_ar: إذا تعلق الحق بشيء معين بالنوع لا بالذات، فإنه لا يختص بشيء بذاته من ذلك النوع إلا بإفرازه. إذا لم يقم المدين بتنفيذ التزامه جاز للدائن أن يحصل على شيء من هذا النوع على نفقة المدين بعد إذن المحكمة أو دون إذنها في حال الاستعجال، وذلك دون إخلال بحق الدائن في التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والستون بعد المائة
  article_text_ar: الالتزام بنقل حق عيني يتضمن الالتزام بتسليم الشيء والمحافظة عليه حتى تسليمه، فإذا لم يقم المدين بتسليمه حتى هلك أو تلف كانت تبعة ذلك عليه. إذا كان محل الالتزام عملًا وتضمن تسليم شيء ولم يقم المدين بتسليمه بعد أن أعذر حتى هلك أو تلف؛ كانت تبعة ذلك عليه؛ ما لم يُثبت أنّ الهلاك أو التلف سيحدث ولو سلَّم الشيء للدائن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والستون بعد المائة
  article_text_ar: 'إذا كان الالتزام بعمل فتسري على تنفيذه الأحكام الآتية: أ- إذا نص الاتفاق أو اقتضت طبيعة العمل أن ينفذ المدين الالتزام بنفسه جاز للدائن أن يرفض الوفاء من غير المدين. ب- إذا لم يقم المدين بتنفيذ التزامه، جاز للدائن أن يطلب إذنًا من المحكمة في تنفيذ الالتزام على نفقة المدين إذا كان هذا التنفيذ ممكنًا، ويجوز للدائن في حال الاستعجال تنفيذ الالتزام على نفقة المدين دون إذن المحكمة. ج- يقوم حكم المحكمة مقام تنفيذ العمل إذا اقتضت ذلك طبيعة الالتزام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والستون بعد المائة
  article_text_ar: إذا كان المطلوب من المدين هو المحافظة على الشيء أو القيام بإدارته أو توخي الحيطة في تنفيذ التزامه، فإنه يكون قد وفى بالالتزام إذا بذل في تنفيذه عناية الشخص المعتاد ولو لم يتحقق الغرض المقصود، ما لم يقض نص نظامي بخلاف ذلك، أما إذا كان المطلوب هو تحقيق غاية فلا يُعدُّ الوفاء حاصلًا إلا بتحقق تلك الغاية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والستون بعد المائة
  article_text_ar: إذا التزم المدين بالامتناع عن عمل وأخل بهذا الالتزام، كان للدائن أن يطلب إزالة ما وقع مخالفًا للالتزام مع التعويض إذا كان له مقتضٍ، وله أن يطلب إذنًا من المحكمة في القيام بهذه الإزالة على نفقة المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعون بعد المائة
  article_text_ar: يحكم على المدين بالتعويض لعدم الوفاء إذا استحال التنفيذ عينًا، بما في ذلك أن يتأخر فيه المدين حتى يصبح غير مجدٍ للدائن. للدائن إذا تأخر المدين في تنفيذ التزامه عينًا أن يعين له مدة معقولة للتنفيذ، فإذا لم ينفذ جاز للدائن طلب التعويض لعدم الوفاء. لا يحكم بالتعويض وفقًا للفقرتين (1) و(2) من هذه المادة إذا أثبت المدين أن عدم الوفاء بسبب لا يد له فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والسبعون بعد المائة
  article_text_ar: إذا تأخر المدين في تنفيذ التزامه وجب عليه تعويض الدائن عما يلحقه من ضرر بسبب التأخير، ما لم يثبت أن تأخير الوفاء بسبب لا يد له فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والسبعون بعد المائة
  article_text_ar: إذا اشترك الدائن بخطئه في إحداث الضرر الناشئ عن عدم التنفيذ أو التأخر فيه أو زاد في ذلك الضرر، فتطبق أحكام المادة (الثامنة والعشرين بعد المائة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والسبعون بعد المائة
  article_text_ar: يجوز الاتفاق على إعفاء المدين من التعويض عن الضرر الناشئ عن عدم تنفيذ التزامه التعاقدي أو تأخره فيه، إلا ما يكون عن غش أو خطأ جسيم منه. لا يجوز الاتفاق على الإعفاء من المسؤولية المترتبة على الفعل الضار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والسبعون بعد المائة
  article_text_ar: يجوز الاتفاق على أن يتحمل المدين تبعة القوة القاهرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والسبعون بعد المائة
  article_text_ar: لا يُستحق التعويض إلا بعد إعذار المدين؛ ما لم يوجد اتفاق أو نص نظامي بخلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والسبعون بعد المائة
  article_text_ar: 'لا يشترط إعذار المدين في الحالات الآتية: أ- إذا اتفق الطرفان صراحة أو ضمنًا على عَدِّ المدين معذرًا بمجرد حلول الأجل. ب- إذا أصبح تنفيذ الالتزام غير ممكنٍ أو غير مجدٍ بفعل المدين. ج- إذا كان محل الالتزام تعويضًا ترتب على الفعل الضار. د- إذا كان محل الالتزام رد شيء تسلمه المدين دون حقٍّ وهو عالمٌ بذلك. هـ- إذا صرح المدين كتابةً بأنه لن ينفذ التزامه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والسبعون بعد المائة
  article_text_ar: يكون الإعذار بأي وسيلة متفق عليها بين المتعاقدين، أو بأي وسيلة مقررة نظامًا للتبليغ، بما في ذلك رفع الدعوى أو أي إجراء قضائي آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والسبعون بعد المائة
  article_text_ar: يجوز للمتعاقدين أن يحددا مقدمًا مقدار التعويض بالنص عليه في العقد أو في اتفاقٍ لاحقٍ؛ ما لم يكن محل الالتزام مبلغًا نقديًّا، ولا يشترط لاستحقاق التعويض الإعذار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والسبعون بعد المائة
  article_text_ar: لا يكون التعويض الاتفاقيُّ مستحَقًّا إذا أثبت المدين أن الدائن لم يلحقه أي ضرر. للمحكمة بناءً على طلب المدين أن تنقص هذا التعويض إذا أثبت أن التعويض المتفق عليه كان مبالغًا فيه أو أن الالتزام الأصلي قد نُفذ جزء منه. للمحكمة بناءً على طلب الدائن أن تزيد هذا التعويض إلى ما يساوي الضرر إذا أثبت أن الضرر جاوز مقدار التعويض الاتفاقي نتيجة غش أو خطأٍ جسيمٍ من المدين. يقع باطلًا كلُّ اتفاقٍ يُخالف أحكام هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثمانون بعد المائة
  article_text_ar: إذا لم يكن التعويض مقدرًا في العقد أو بنص نظامي؛ قدرته المحكمة وفقًا لأحكام المواد (السادسة والثلاثين بعد المائة) و(السابعة والثلاثين بعد المائة) و(الثامنة والثلاثين بعد المائة) و(التاسعة والثلاثين بعد المائة) من هذا النظام. ومع ذلك إذا كان الالتزام مصدره العقد فلا يلتزم المدين الذي لم يرتكب غشًا أو خطأ جسيمًا إلا بتعويض الضرر الذي كان يمكن توقعه عادة وقت التعاقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثمانون بعد المائة
  article_text_ar: أموال المدين جميعها ضامنةٌ للوفاء بديونه، وجميع الدائنين متساوون في هذا الضمان، ولا أولوية لأحدهم إلا بنص نظامي. يجوز الاتفاق بين الدائنين على تحديد الأولوية في استيفاء الديون بما لا يتعارض مع النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثمانون بعد المائة
  article_text_ar: لكل دائنٍ ولو لم يكن حقه مستحق الأداء أن يستعمل حقوق مدينه إلا ما كان منها متصلًا بشخصه خاصةً أو غير قابلٍ للحجز، وذلك إذا لم يستعمل المدين هذه الحقوق وكان من شأن ذلك أن يؤدي إلى زيادة ديونه على أمواله. لا يلزم لاستعمال الدائن حقوق مدينه إعذار هذا المدين، ولكن إذا رفعت دعوى باسم المدين وجب إدخاله فيها. يعد الدائن نائبًا عن مدينه في استعمال حقوقه، وكل نفعٍ يعود من استعمال هذه الحقوق يكون من أموال المدين وضمانًا لجميع دائنيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثمانون بعد المائة
  article_text_ar: إذا تصرف المدين تصرفًا ترتبت عليه زيادة ديونه على أمواله، فلكل دائن كان حقه مستحق الأداء وتضرر من التصرف طلب منع نفاذ هذا التصرف في حقه إذا كان التصرف تبرعًا، أو كان معاوضة والمدين وخلفه المعاوض يعلمان بإحاطة الدين. يسري حكم الفقرة (1) من هذه المادة على تصرف الخلف إذا كان تصرفه تبرعًا أو كان معاوضة والمتصرف إليه يعلم بإحاطة الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثمانون بعد المائة
  article_text_ar: لكل من تلقى حقًّا من المدين الذي أحاطت ديونه بأمواله أن يتخلص من دعوى منع نفاذ التصرف إذا أودع عوض المثل لدى الجهة التي يحددها وزير العدل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثمانون بعد المائة
  article_text_ar: إذا تصرف المدين الذي أحاطت ديونه بأمواله تصرفًا لم يقصد منه إلا تفضيل دائن على آخر دون حق، فلا يترتب على ذلك إلا حرمان الدائن من هذه المزية. ذا وفى المدين الذي أحاطت ديونه بأمواله أحد دائنيه قبل حلول الأجل كان للدائنين الآخرين طلب عدم نفاذ الوفاء في حقهم، أما إذا وفى المدين الدين بعد حلول الأجل، فلا يكون للدائنين طلب عدم نفاذ الوفاء إلا إذا كان قد تم بالتواطؤ بين المدين والدائن الذي استوفى حقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثمانون بعد المائة
  article_text_ar: إذا ادعى الدائن إحاطة الدين بمال المدين فليس على الدائن إلا أن يثبت مقدار ما في ذمة المدين من ديون حالة، وللمدين أن يدفع دعوى الإحاطة إذا أثبت أن له أموالًا تساوي مقدار تلك الديون أو تزيد عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثمانون بعد المائة
  article_text_ar: إذا قُضي بعدم نفاذ تصرف المدين الذي أحاطت ديونه بأمواله؛ استفاد من ذلك جميع الدائنين الذين يضارون بهذا التصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثمانون بعد المائة
  article_text_ar: لا تُسمع دعوى عدم نفاذ التصرف بانقضاء (سنة) من تاريخ علم الدائن بسبب عدم النفاذ، ولا تُسمع الدعوى في جميع الأحوال بانقضاء (عشر) سنوات من تاريخ التصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثمانون بعد المائة
  article_text_ar: إذا أبرم عقد صوري، فلدائني المتعاقدين وللخلف الخاص متى كانوا حسني النية، أن يتمسكوا بالعقد الصوري، ولهم أيضًا أن يتمسكوا بالعقد المستتر ويثبتوا صورية العقد الذي أضر بهم. إذا تعارضت مصالح ذوي الشأن، فتمسك بعضهم بالعقد الظاهر وتمسك الآخرون بالعقد المستتر، كانت الأفضلية لمن تمسك بالعقد الظاهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التسعون بعد المائة
  article_text_ar: إذا ستر المتعاقدان عقدًا حقيقيًّا بعقد ظاهر فالعقد النافذ فيما بين المتعاقدين والخلف العام هو العقد الحقيقي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والتسعون بعد المائة
  article_text_ar: لكل من التزم بأداء شيءٍ أن يمتنع عن الوفاء به ما دام الدائن لم يوف بالتزام في ذمته نشأ بسبب التزام المدين وكان مرتبطًا به، ولم يقدم الدائن ضمانًا كافيًا للوفاء بهذا الالتزام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والتسعون بعد المائة
  article_text_ar: لكل من أنفق على ملك غيره نفقاتٍ ضروريَّة أو نافعة وهو تحت يده بطريق مشروع أن يحبسه حتى يسترد ما هو مستحقٌّ له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والتسعون بعد المائة
  article_text_ar: من حبس شيئًا فعليه أن يحافظ عليه وأن يقدم حسابًا عن غلته. إذا كان الشيء المحبوس يخشى عليه من الهلاك أو التلف، أو طالت مدة حبسه عرفًا؛ فللحابس بيعهُ بعد إذن المحكمة، أو دون إذنها في حال الاستعجال وينتقل حقه في الحبس إلى ثمنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والتسعون بعد المائة
  article_text_ar: الحق في حبس الشيء لا يجعل للحابس أولوية في استيفاء حقه منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والتسعون بعد المائة
  article_text_ar: ينقضي الحق في الحبس بهلاك الشيء المحبوس، أو استيفاء الحابس حقه من مدينه، أو خروج الشيء من يد حابسه. لحابس الشيء إذا خرج من يده دون علمه أو بالرغم من معارضته؛ أن يطلب من المحكمة استرداده خلال (ثلاثين) يومًا من التاريخ الذي علم فيه بخروجه من يده وقبل انقضاء (سنةٍ) من تاريخ خروجه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والتسعون بعد المائة
  article_text_ar: تسري على إعسار المدين النصوص النظامية الخاصة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والتسعون بعد المائة
  article_text_ar: يكون الالتزام معلَّقًا على شرطٍ إذا كان وجوده أو زواله مترتِّبًا على أمرٍ مستقبلٍ محتمل الوقوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والتسعون بعد المائة
  article_text_ar: إذا علق الالتزام على أمر واقع عد الالتزام ناجزًا، وإذا علق على أمر مستحيل عد الشرط باطلًا، ويبطل الالتزام الذي علق عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والتسعون بعد المائة
  article_text_ar: لا ينشأ الالتزام إذا عُلق على شرطٍ يكون القصد من التعليق عليه الحض على أمر غير مشروع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة المائتان
  article_text_ar: لا يكون الالتزام قائمًا إذا علق على شرط واقف يجعل وجود الالتزام متوقفًا على محض إرادة الملتزم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأولى بعد المائتين
  article_text_ar: لا يكون الالتزام المعلق على شرط واقف نافذًا إلا إذا تحقق الشرط المعلق عليه، ولا يكون الالتزام قبل تحقق الشرط قابلًا للتنفيذ، وللدائن أن يتخذ من الإجراءات ما يُحافظ به على حقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية بعد المائتين
  article_text_ar: يترتب على تحقق الشرط الفاسخ زوال الالتزام، ويلزم الدائن رد ما أخذه، فإذا استحال الرد لسبب هو مسؤولٌ عنه لزمه التعويض، وتبقى أعمال الإدارة التي تصدر من الدائن نافذة رغم تحقق الشرط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة بعد المائتين
  article_text_ar: إذا تحقق الشرط استند أثره إلى الوقت الذي نشأ فيه الالتزام إلا إذا تبين من إرادة المتعاقدين أو من طبيعة العقد أن وجود الالتزام أو زواله إنما يكون في الوقت الذي تحقق فيه الشرط وكذا إذا كان تنفيذ الالتزام قبل تحقق الشرط غير ممكن لسبب لا يد للمدين فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة بعد المائتين
  article_text_ar: يكون الالتزام لأجل إذا كان نفاذه أو انقضاؤه مترتبًا على أمر مستقبل محقق الوقوع. الالتزام المضاف إلى أجل لا يكون نافذًا إلا عند حلول الأجل. وللدائن قبل حلول الأجل أن يتخذ من الإجراءات ما يُحافظ به على حقه بما في ذلك أن يطلب ضمانًا إذا خشي إعسار المدين واستند في ذلك إلى سبب مقبول. يترتب على انقضاء الأجل الفاسخ زوال الالتزام دون أن يكون لهذا الزوال أثر رجعي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة بعد المائتين
  article_text_ar: يسقط حق المدين في الأجل إذا حكم بإعساره، أو لم يقدم ضمانات الدين المتفق عليها، أو نقصت تلك الضمانات بفعله أو بسبب لا يد له فيه؛ ما لم يبادر إلى إكمالها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة بعد المائتين
  article_text_ar: يجوز تعجيل الوفاء بالدين ممن كان الأجل لمصلحته ما لم يلحق التعجيل ضررًا بالطرف الآخر. عند الشك في كون الأجل لمصلحة المدين أو الدائن فالأصل أن يُعدَّ لمصلحة المدين. إذا قضى المدين الدين قبل حلول الأجل ثم استُحِقَّ المقبوضُ عاد الدين مؤجلًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة بعد المائتين
  article_text_ar: لا يحل الدين المؤجل بموت الدائن، ويحل بموت المدين إلا إذا كان الدين موثَّقًا بضمانٍ عينيٍّ أو قدم الورثة ضمانًا كافيًا عينيًّا أو شخصيًّا أو وافق الدائن على بقاء دينه مؤجلًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة بعد المائتين
  article_text_ar: إذا سقط حق المدين في الأجل وفقًا لما تقضي به النصوص النظامية، وتبين أنَّ للأجل أثرًا في زيادة مقدار الدين عند إنشاء العقد؛ فتنقص المحكمة من تلك الزيادة مراعيةً في ذلك مقدار ما سقط من الأجل وسبب سقوطه وطبيعة المعاملة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة بعد المائتين
  article_text_ar: إذا تبيّن من الاتفاق أن الوفاء لا يكون إلا حين الميسرة، حددت المحكمة أجلًا يكون مظنة للقدرة على الوفاء مراعيةً في ذلك موارد المدين الحالية والمستقبلية وما تقتضيه عناية الشخص الحريص على الوفاء بالتزامه، ومتى ثبتت قدرته سقط الأجل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة بعد المائتين
  article_text_ar: يكون الالتزام تخييريًّا إذا شمل محله أشياء متعددة تبرأ ذمة المدين متى أدى واحدًا منها، ويكون الخيار للمدين ما لم يوجد اتفاق أو نص نظامي بخلاف ذلك. إذا امتنع من له الخيار دائنًا أو مدينًا عن الاختيار، أو تعدد من له الخيار دائنًا أو مدينًا ولم يتفقوا؛ حَدَّدت المحكمة أجلًا لتعيين محل الالتزام، فإذا انقضى الأجل دون تعيين انتقل الخيار إلى الطرف الآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة بعد المائتين
  article_text_ar: يكون الالتزام بدليًّا إذا لم يشمل محله إلا شيئًا واحدًا، مع حق المدين أن يؤدي بدلًا منه شيئًا آخر. الأصل لا البدل هو وحده محل الالتزام، وهو الذي يعين طبيعته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة بعد المائتين
  article_text_ar: لا يكون التضامن بين الدائنين إلا باتفاقٍ أو بنص نظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد المائتين
  article_text_ar: للدائنين المتضامنين مجتمعين أو منفردين مطالبة المدين بكل الدين. للمدين أن يعترض على مطالبة أحد دائنيه المتضامنين بأوجه الاعتراض الخاصة بهذا الدائن وبالأوجه المشتركة بين جميع الدائنين، وليس له أن يعترض عليه بأوجه الاعتراض الخاصة بدائن آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد المائتين
  article_text_ar: كل ما يستوفيه أحد الدائنين المتضامنين يكون من حقهم جميعًا، ويتحاصون فيه إلا إذا قضى نص نظامي أو وجد اتفاق بخلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد المائتين
  article_text_ar: للمدين أن يوفي دينه لأي من الدائنين المتضامنين إلا إذا أعذره أحدهم بعدم وفاء نصيبه لدائن معين ولم يترتب على ذلك ضرر بالمدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة بعد المائتين
  article_text_ar: إذا برئت ذمة المدين تجاه أحد الدائنين المتضامنين بسبب غير الوفاء فلا تبرأ ذمته تجاه باقي الدائنين إلا بقدر حصة ذلك الدائن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة بعد المائتين
  article_text_ar: إذا قام أحد الدائنين المتضامنين بعمل من شأنه الإضرار بالدائنين الآخرين لم ينفذ هذا العمل في حقهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد المائتين
  article_text_ar: لا يحول تضامن الدائنين دون انقسام الدين بين ورثة أيٍّ منهم، وينتقل التضامن في الدين كله إلى كل وارث بقدر نصيبه من التركة، ما لم يكن الدين غير قابل للانقسام فينتقل التضامن إلى كل وارث في الدين كله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد المائتين
  article_text_ar: يكون الدين مشتركًا بين عدة دائنين إذا اتحد سببه، ويعد دينًا مشتركًا الدينُ الذي آل بالإرث إلى أكثر من وارث.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العشرون بعد المائتين
  article_text_ar: لكل من الشركاء في الدين المشترك المطالبة بقدر حصته فيه، ولباقي الشركاء أن يشاركوه فيما قبض بنسبة حصة كلٍّ منهم، ويتبَعُوا المدين بما بقي؛ ما لم يترك أحد الشركاء للقابض ما قبضه صراحةً أو ضمنًا على أن يتبع المدين بحصته، فليس له في هذه الحال أن يرجع على شريكه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد المائتين
  article_text_ar: إذا قبض أحد الشركاء حصته في الدين المشترك ثم تصرف فيها فللشركاء الآخرين أن يرجعوا عليه بأنصبتهم فيها، وإذا هلكت في يده بغير خطأ منه لم يلزمه تعويض الشركاء عن حصصهم مما قبضه، ويكون قد استوفى حصته، وما بقي من الدين في ذمة المدين يكون للشركاء الآخرين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد المائتين
  article_text_ar: لا يكون التضامن بين المدينين إلا باتفاق أو بنص نظامي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد المائتين
  article_text_ar: يتحقق التضامن بين المدينين ولو كان دين بعضهم مؤجلًا أو معلقًا على شرطٍ أو مرتبطًا بأي وصف مؤثرٍ فيه، وكان دين الآخرين منجزًا أو خاليًا من ذلك الوصف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد المائتين
  article_text_ar: إذا وفى أحد المدينين المتضامنين الدين برئت ذمته وذمة باقي المدينين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد المائتين
  article_text_ar: للدائن أن يطالب بدينه كل المدينين المتضامنين أو بعضهم، على أن يراعي في مطالبته ما في علاقته بكل مدين من وصف مؤثر في الدين. لا تحول مطالبة أحد المدينين المتضامنين دون مطالبة الباقين. لكل مدينٍ متضامنٍ أن يعترض عند مطالبته بالوفاء بأوجه الاعتراض الخاصة به أو المشتركة بين المدينين فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد المائتين
  article_text_ar: لا يجوز للمدين المتضامن أن يحتج بالمقاصة التي تقع بين الدائن ومدين متضامن آخر إلا بقدر حصة هذا المدين الآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد المائتين
  article_text_ar: إذا انقضت حصة أحد المدينين المتضامنين في الدين باتحاد الذمة؛ فإن الدين لا ينقضي بالنسبة إلى باقي المدينين إلا بقدر حصة هذا المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد المائتين
  article_text_ar: إذا أبرأ الدائن أحد المدينين المتضامنين من الدين فقط برئت ذمته وذمة الباقين بقدر حصته وبقي تضامنه. إذا أبرأ الدائن أحد المدينين المتضامنين من التضامن فقط بقي دينه في ذمته وامتنعت مطالبة الدائن له بحصة الآخرين، وللمدينين الرجوع عليه بما يدفعونه عنه بحكم التضامن بينهم. إذا أبرأ الدائن أحد المدينين المتضامنين من الدين بصورةٍ مطلقةٍ، انصرف الإبراء إلى الدين والتضامن معًا؛ ما لم يتبين من دلالة الحال أو من طبيعة التعامل أن الإبراء ينصرف إلى أحدهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد المائتين
  article_text_ar: في الأحوال التي يُبرئ فيها الدائن أحد المدينين المتضامنين سواء من الدين أو من التضامن، يكون لباقي المدينين عند الاقتضاء أن يرجعوا على هذا المدين بنصيبه في حصة المعسر منهم، إلا أنه إذا أخلى الدائن المدين الذي أبرأه من كل مسؤولية عن الدين، فإن الدائن هو الذي يتحمل نصيب هذا المدين في حصة المعسر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثون بعد المائتين
  article_text_ar: لا يفيد عدم سماع الدعوى لمرور الزمن بالنسبة إلى أحد المدينين المتضامنين باقي المدينين إلا بقدر حصة ذلك المدين. ليس للدائن أن يتمسك بوقف سريان مرور الزمن أو انقطاعه بالنسبة إلى أحد المدينين المتضامنين في مواجهة باقي المدينين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد المائتين
  article_text_ar: لا يكون المدين المتضامن مسؤولًا في تنفيذ الالتزام إلا عن فعله. إذا أعذر الدائن المدين المتضامن أو طالبه قضاءً فلا أثر لذلك بالنسبة إلى باقي المدينين المتضامنين، أما إعذار أحد المدينين المتضامنين للدائن فإنه يفيد الباقين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد المائتين
  article_text_ar: ينفذ الصلح الذي يعقده أحد المدينين المتضامنين مع الدائن على باقي المدينين، ما لم يرتب في ذمتهم التزامًا جديدًا أو زيادةً في التزامهم؛ فإنه لا ينفذ في حق أي منهم إلا بإجازته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد المائتين
  article_text_ar: لا يسري إقرار أحد المدينين المتضامنين بما عليه من الدين في حق باقي المدينين المتضامنين، ولا يضار باقي المدينين المتضامنين إذا وجه إليه الدائن يمينًا فنكل عنها أو وجهها إلى الدائن فحلفها، أما إذا وجه إليه الدائن يمينًا فحلفها فإن باقي المدينين يفيدون من ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد المائتين
  article_text_ar: إذا وفى أحد المدينين المتضامنين أكثر من حصته في الدين فليس له أن يرجع فيما زاد على حصته على أي من الباقين إلا بقدر حصته، ولو كان الموفي قد رجع عليهم بحلوله محل الدائن. تكون حصص المدينين المتضامنين فيما يرجع به بعضهم على بعض متساوية ما لم يوجد اتفاق أو نص نظامي بخلاف ذلك. وإذا كان أحدهم هو وحده صاحب المصلحة في الدين فهو الذي يتحمل الدين كله تجاههم. إذا تبين أن أحد المدينين المتضامنين معسر تحمل المدين الذي وفَّى الدين مع الموسرين من المدينين المتضامنين تبعة هذا الإعسار؛ كل بقدر حصته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد المائتين
  article_text_ar: يكون الالتزام غير قابل للانقسام إذا ورد على محل لا يقبل أن ينقسم بطبيعته، أو تبين من الغرض الذي قصده المتعاقدان أن الالتزام لا يجوز تنفيذه منقسمًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد المائتين
  article_text_ar: إذا تعدد المدينون في التزام غير قابل للانقسام كان كل منهم ملزمًا بوفاء الدين كاملًا، وللمدين الذي وفى بالدين حق الرجوع على الباقين كل بقدر حصته
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد المائتين
  article_text_ar: إذا تعدد الدائنون أو ورثة الدائن في التزام غير قابل للانقسام، جاز لكل منهم أن يطالب بأدائه كاملًا، وإذا اعترض أحدهم كان المدين ملزمًا بأداء الالتزام لهم مجتمعين أو إيداع الشيء محل الالتزام لدى الجهة التي يحددها وزير العدل، وللبقية حق الرجوع على الدائن الذي استوفى الالتزام كل بقدر حصته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد المائتين
  article_text_ar: للدائن أن يحيل حقه إلى شخص آخر، وذلك ما لم تقتضِ النصوص النظامية أو الاتفاق أو طبيعة الالتزام خلاف ذلك، ولا يشترط لانعقاد الحوالة رضى المدين بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد المائتين
  article_text_ar: لا تصح حوالة الحق إلا بقدر ما يكون منه قابلًا للحجز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعون بعد المائتين
  article_text_ar: لا تكون حوالة الحق نافذة تجاه المدين أو تجاه الغير إلا إذا قبلها المدين أو أُعلِم بها بأي وسيلة مقررة نظامًا، على أن نفاذها تجاه الغير بقبول المدين يستلزم أن يكون هذا القبول ثابت التاريخ ومكتوبًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد المائتين
  article_text_ar: ينتقل الحق إلى المحال له بصفاته وتوابعه وضماناته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والأربعون بعد المائتين
  article_text_ar: إذا كانت الحوالة بعوض، لم يضمن المحيل إلا وجود الحق المحال به وقت انعقاد الحوالة، ما لم يتفق على خلاف ذلك. إذا كانت الحوالة بغير عوض، لم يضمن المحيل وجود الحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد المائتين
  article_text_ar: لا يضمن المحيل يسار المدين إلا إذا وجد اتفاق خاص على هذا الضمان، وإذا ضمن المحيل يسار المدين لا ينصرف هذا الضمان إلا إلى اليسار وقت انعقاد الحوالة ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد المائتين
  article_text_ar: إذا رجع المحال له بالضمان على المحيل طبقًا للمادتين (الثانية والأربعين بعد المائتين) و(الثالثة والأربعين بعد المائتين) من هذا النظام، فلا يلزم المحيل ردُّ أكثر مما أخذه من المحال له مع النفقات ولو وجد اتفاق بخلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد المائتين
  article_text_ar: للمدين أن يتمسك تجاه المحال له بالدفوع التي كان له أن يتمسك بها تجاه المحيل وقت نفاذ الحوالة في حقه، كما يجوز له أن يتمسك بالدفوع المستمدة من عقد الحوالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والأربعون بعد المائتين
  article_text_ar: إذا تعددت الحوالة بحقٍّ واحدٍ قدمت الحوالة التي تكون أسبق في نفاذها في حق الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والأربعون بعد المائتين
  article_text_ar: إذا وقع تحت يد المدين حجز قبل أن تصبح الحوالة نافذة في حق الغير كانت الحوالة بالنسبة إلى الحاجز بمثابة حجز آخر، فيقسم الحق بين المحال له والحاجز قسمة غرماء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والأربعون بعد المائتين
  article_text_ar: حوالة الدين عقد يقتضي نقل الالتزام من ذمة المحيل إلى ذمة المحال عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والأربعون بعد المائتين
  article_text_ar: تنعقد حوالة الدين باتفاق بين المحيل والمحال عليه، ولا تنفذ في حق المحال إلا إذا قبلها. إذا لم يقبل المحال الحوالة فإن المحال عليه يكون ملزمًا تجاه المحيل بالوفاء للمحال، ما لم يُتفق على خلاف ذلك، أو يتبين من ظروف الحال أن نفاذ الحوالة بينهما معلق على قبول المحال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسون بعد المائتين
  article_text_ar: يجوز أن تنعقد حوالة الدين باتفاقٍ بين المحيل والمحال، ولا تنفذ في حق المحال عليه إلا إذا قبلها، وإذا كان المحال عليه مدينًا للمحيل بمثل الدين المحال به فتنفذُ في حق المحال عليه والغير وفق أحكام المادة (الأربعين بعد المائتين) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والخمسون بعد المائتين
  article_text_ar: ينتقل الدين المحال به إلى المحال عليه بصفاته وتوابعه وتبرأ ذمة المحيل من الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والخمسون بعد المائتين
  article_text_ar: تبقى للدين المحال به ضماناته، ومع ذلك لا تبقى الضمانات المقدمة من الغير، ويبقى المدينون المتضامنون ملتزمين بعد خصم حصة المحيل من الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والخمسون بعد المائتين
  article_text_ar: للمحال عليه أن يتمسك تجاه المحال بالدفوع التي كان للمحيل أن يتمسك بها، كما يجوز له أن يتمسك بالدفوع المستمدة من عقد الحوالة، وليس له أن يحتج بالدفوع الخاصة بشخص المحيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والخمسون بعد المائتين
  article_text_ar: يضمن المحيل يسار المحال عليه وقت انعقاد الحوالة إذا كانت الحوالة بين المحيل والمحال، ووقت نفاذها إذا كانت الحوالة بين المحيل والمحال عليه؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والخمسون بعد المائتين
  article_text_ar: يجوز للمتعاقد أن ينقل صفته كطرف في عقد إلى غيره بموافقة المتعاقد الآخر، ويجوز أن تمنح الموافقة مقدمًا إذا عين فيها العقد الذي يراد التنازل عنه، وينفذ التنازل في هذه الحال في حق المتنازل لديه إذا أعلمه به المتنازل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والخمسون بعد المائتين
  article_text_ar: إذا وافق المتنازل لديه على التنازل، برئ المتنازل تجاه المتنازل لديه بالنسبة إلى المستقبل، وإذا لم يوافق التزم المتنازل بتنفيذ العقد بالتضامن مع المتنازل له، ما لم يتفق على خلاف ذلك، أو يتبين من ظروف الحال أن نفاذ التنازل بينهما معلق على قبول المتنازل لديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والخمسون بعد المائتين
  article_text_ar: للمتنازل له أن يحتج تجاه المتنازل لديه بالدفوع المتعلقة بالدين، وليس له أن يحتج بالدفوع الخاصة بشخص المتنازل. للمتنازل لديه أن يحتج تجاه المتنازل له بجميع الدفوع التي كان له الاحتجاج بها تجاه المتنازل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والخمسون بعد المائتين
  article_text_ar: إذا لم يبرئ المتنازل لديه المتنازل بقيت جميع الضمانات المتفق عليها بينهما، وإذا أبرأه لم تبق الضمانات المقدمة من الغير، وبقي المدينون المتضامنون ملتزمين بعد خصم حصة المتنازل من الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والخمسون بعد المائتين
  article_text_ar: 'يصح الوفاء من الآتي: أ- المدين أو نائبه أو أي شخص آخر له مصلحة في الوفاء؛ ما لم يوجد نص نظامي بخلاف ذلك. ب- من لا مصلحة له في الوفاء، إلا أنه يجوز للدائن أن يرفض الوفاء في هذه الحال إذا أبلغ المدين الدائن اعتراضه على ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستون بعد المائتين
  article_text_ar: يُشترط لصحة الوفاء أن يكون الموفي مالكًا للشيء الذي وفى به. لا يصح الوفاء من عديم الأهلية، أما الوفاء من ناقص الأهلية بشيءٍ مستحقٍّ عليه فيكون صحيحًا ما لم يلحق الوفاء ضررًا به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والستون بعد المائتين
  article_text_ar: من وفى دين غيره ولم يكن متبرعًا كان له الرجوع على المدين بقدر ما دفعه، ما لم يكن الوفاء بغير إذن المدين وأثبت أن له أيَّ مصلحة في الاعتراض على الوفاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والستون بعد المائتين
  article_text_ar: 'من وفى دين غيره حل محل الدائن الذي استوفى حقه في الحالات الآتية: ‌أ- إذا كان الموفي ملزمًا بالدين مع المدين أو ملزمًا بوفائه عنه. ‌ب- إذا كان الموفي دائنًا ووفى دائنًا آخر مقدمًا عليه بما له من ضمانٍ عيني، ولو لم يكن للموفي أي ضمان. ‌ج- إذا وجد نص نظامي يقضي بأن للموفي حق الحلول. ‌د- إذا اتفق الدائن والموفي عند الوفاء أو قبله على أن يحل محله، ولو لم يقبل المدين ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والستون بعد المائتين
  article_text_ar: إذا حلَّ الموفي محلَّ الدائن كان للموفي حقُّ الدائن بما لهذا الحق من صفات وما يلحقه من توابع وما يكفله من ضمانات وما يرد عليه من دفوع، ويكون هذا الحلول بالقدر الذي أداه الموفي من ماله. إذا كان الحلول في جزء من الحق فيكون الدائن مقدمًا في استيفاء ما بقي على الموفي، ما لم يتفقا على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والستون بعد المائتين
  article_text_ar: إذا وفى المدين في مرض موته بعض دائنيه ولم تف تركته بديون الباقين؛ فلهم الرجوع على من استوفوا ديونهم ومشاركتهم فيما أخذوا كل بقدر حصته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والستون بعد المائتين
  article_text_ar: يكون الوفاء للدائن أو لنائبه، ويعد ذا صفة في استيفاء الدين من يقدم للمدين سندًا بمخالصة صادرة من الدائن؛ ما لم يتفق على أن الوفاء يكون للدائن شخصيًّا. إذا كان الدائن عديم الأهلية أو ناقصها، فلا تبرأ ذمة المدين إلا بالوفاء لوليه أو وصيه، ويصح الوفاء للدائن ناقص الأهلية إذا كان نشوء الالتزام بإذن وليه أو وصيه، ولم يمنع الولي أو الوصي من الوفاء له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والستون بعد المائتين
  article_text_ar: إذا رفض الدائن دون مسوغٍ الوفاء المعروض عليه عرضًا صحيحًا، أو لم يقم بالأعمال التي لا يتم الوفاء بدونها، أو أَعلَم المدينَ أنه لن يقبل الوفاء؛ فللمدين أن يعذره وفق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والستون بعد المائتين
  article_text_ar: إذا أُعذِر الدائن تحمل تبعة هلاك الشيء أو تلفه وأصبح للمدين الحق في إيداع الشيء على نفقة الدائن والمطالبة بالتعويض عن الضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والستون بعد المائتين
  article_text_ar: لا يكون العرض صحيحًا إلا إذا كان لكامل الدين المستحق ونفقاته بحسب ما يقتضيه العقد أو نوع الدين. يجوز العرض أثناء المرافعة أمام المحكمة دون إجراءات أخرى إذا كان الدائن المعروض عليه حاضرًا، ويعد ذلك إعذارًا. يكون الإيداع بأمر المحكمة في كل شيء بحسب طبيعته بما في ذلك إيداعه عينًا أو وضعه تحت الحراسة، ويُبلَّغ الدائن بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والستون بعد المائتين
  article_text_ar: إذا كان محل الوفاء شيئًا يسرع إليه الفساد، أو يكلف إيداعه أو حراسته نفقاتٍ باهظة؛ جاز للمدين -بعد إذن المحكمة، أو دون إذنها في حال الاستعجال- أن يبيعه بسعر السُّوق، فإن تعذر ذلك فبالمزاد، ويقوم إيداع الثمن مقام إيداع الشيء نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعون بعد المائتين
  article_text_ar: 'يُكتفى بالإيداع أو ما يقوم مقامه دون حاجة للعرض في الحالات الآتية: أ- إذا كان المدين يجهل شخص الدائن أو موطنه. ب- إذا كان الدائن عديم الأهلية أو ناقصها وليس له نائبٌ يقبل الوفاء. ج- إذا كان الدين متنازعًا عليه بين عدة أشخاص. د- إذا كانت هناك أسباب جدية أخرى تقدرها المحكمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والسبعون بعد المائتين
  article_text_ar: إذا تم العرض وأُتبع بالإيداع على الوجه الصحيح قام العرض مقام الوفاء وترتبت عليه جميع آثاره من وقت العرض، وليس للمدين الرجوع في الوفاء. يتحمل الدائن نفقات العرض والإيداع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والسبعون بعد المائتين
  article_text_ar: يكون الوفاء بالشيء المستحق أصلًا، فلا يُجبَر الدائن على قبول غيره ولو كان أعلى قيمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والسبعون بعد المائتين
  article_text_ar: ليس للمدين أن يجبر الدائن على قبول وفاءٍ جزئيٍّ لدينٍ واحدٍ؛ ما لم تقتض النصوص النظامية أو الاتفاق خلاف ذلك. إذا كان الدين متنازعًا في جزءٍ منه وقَبِلَ الدائن أن يستوفي الجزء المعترف به فليس للمدين أن يرفض الوفاء بهذا الجزء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والسبعون بعد المائتين
  article_text_ar: إذا تعددت الديون في ذمة المدين، وكانت من نوعٍ واحدٍ ولدائنٍ واحدٍ، وكان ما أداه المدين لا يفي بهذه الديون جميعًا؛ فالقول للمدين في تعيين الدين المراد وفاؤه، ما لم يوجد اتفاقٌ أو نصٌّ نظامي يمنع هذا التعيين. إذا لم يعين المدين الدين على الوجه المبيّن في الفقرة (1) من هذه المادة، وتعذَّر الرجوع إليه؛ حُسِب ما أداه من الدين الحالِّ أو الأقرب حلولًا. فإن كانت كلها حالةً أو مؤجلةً إلى أجلٍ واحدٍ؛ حُسِب ما أداه من أشدها كلفةً على المدين. فإن تساوت الديون في الكلفة، فللدائن تعيين الدين الذي يكون له الوفاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والسبعون بعد المائتين
  article_text_ar: يجب أن يتمَّ الوفاء فورًا بمجرد ترتب الالتزام في ذمة المدين؛ ما لم يوجد اتفاق أو نص نظامي بخلاف ذلك. فيما لم يرد فيه نصٌّ نظامي؛ يجوز للمحكمة في حالاتٍ استثنائيَّةٍ أن تُنظر المدين إلى أجل معقولٍ يُنفذ فيه التزامه إذا استدعت حالته ذلك ولم يلحق الدائن من هذا التأجيل ضررٌ جسيمٌ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والسبعون بعد المائتين
  article_text_ar: إذا كان الالتزام مؤجلًا ولم يحدد أجل الوفاء به، حددته المحكمة -بناءً على طلب الدائن أو المدين- بحسب العرف وطبيعة المعاملة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والسبعون بعد المائتين
  article_text_ar: 'يكون مكان الوفاء عند عدم تعيينه بالاتفاق أو بنصٍّ نظامي على النحو الآتي: أ- إذا كان الالتزام تعاقديًّا، ففي مكان نشوء الالتزام، ما لم يكن محل الالتزام معيَّنًا بالذات فيجب تسليمه في المكان الذي كان موجودًا فيه وقت نشوء الالتزام. ب- إذا كان الالتزام غير تعاقدي، ففي موطن المدين وقت الوفاء، أو في المكان الذي يباشر فيه أعماله إذا كان الالتزام متعلقًا بهذه الأعمال.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والسبعون بعد المائتين
  article_text_ar: تكون نفقات الوفاء على المدين؛ ما لم يوجد نص نظامي أو اتفاق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والسبعون بعد المائتين
  article_text_ar: لمن يقوم بوفاء الدين أو جزء منه أن يطلب سندًا بما وفاه، فإذا رفض الدائن ذلك كان للمدين أو لذي المصلحة إيداع الدين لدى الجهة التي يحددها وزير العدل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثمانون بعد المائتين
  article_text_ar: يصح وفاء الدين ببديلٍ يتفق عليه الطرفان. تسري على الوفاء البديل أحكام العقد الذي يناسبه بحسب الأحوال، وأحكام الوفاء في قضاء الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثمانون بعد المائتين
  article_text_ar: للمدين المقاصة بين ما هو مستحق الأداء عليه لدائنه وما هو مستحق الأداء له تجاه هذا الدائن ولو اختلف سبب الدينين، إذا كان موضوع كل منهما نقودًا أو أشياءَ متماثلة في النوع والصفة، وكان كل منهما خاليًا من النزاع، وصالحًا للمطالبة به قضاءً، وقابلًا للحجز.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثمانون بعد المائتين
  article_text_ar: لا تقع المقاصة إلا إذا تمسك بها من له مصلحة فيها، ولا يصح النزول عنها قبل ثبوت الحق فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثمانون بعد المائتين
  article_text_ar: يجوز للمدين أن يتمسك بالمقاصة ولو اختلف مكان الوفاء في الدينين. ويجب عليه في هذه الحال أن يعوض الدائن عما لحقه من ضرر لعدم تمكنه بسبب المقاصة من استيفاء ما له من حق أو الوفاء بما عليه من دين في المكان الذي عين لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثمانون بعد المائتين
  article_text_ar: يترتب على المقاصة انقضاء الدينين بمقدار الأقل منهما منذ الوقت الذي يصبحان فيه صالحين للمقاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثمانون بعد المائتين
  article_text_ar: إذا تخلف أحد الشروط الواردة في المادة (الحادية والثمانين بعد المائتين) من هذا النظام لم تقع المقاصة إلا باتفاق الطرفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثمانون بعد المائتين
  article_text_ar: لا يجوز أن تقع المقاصَّة إضرارًا بحقوقٍ كسبها الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثمانون بعد المائتين
  article_text_ar: إذا كان للمودع لديه دينٌ على المودع أو كان للمستعير دين على المعير، فلا تقع المقاصة بين الدين والوديعة أو بين الدين والشيء المعار ولو كان الدين من نوع أي منهما إلا باتفاق الطرفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثمانون بعد المائتين
  article_text_ar: إذا كان أحد الدينين لا تُسمع فيه الدعوى لمرور الزمن وقت التمسك بالمقاصة فإن ذلك لا يمنع من وقوعها ما دامت شروطها قد اكتملت قبل مرور تلك المدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثمانون بعد المائتين
  article_text_ar: إذا أدى المدين دينًا عليه وكان له أن يقاص فيه بحق له لم يجز أن يتمسك بضمانات هذا الحق بما يضر بالغير إلا إذا كان يجهل وجود الحق وقت الوفاء وكان له في ذلك عذر مقبول.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التسعون بعد المائتين
  article_text_ar: إذا اجتمع في شخص واحد صفتا الدائن والمدين في دينٍ واحدٍ، انقضى هذا الدين بالقدر الذي اتحدت فيه الذمة. إذا كان الدائن وارثًا للمدين لم تتحد الذمة، وإنما يكون كسائر الدائنين في اقتضاء دينه من التركة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والتسعون بعد المائتين
  article_text_ar: إذا زال سبب اجتماع صفتي الدائن والمدين وكان لزواله أثر رجعي، عاد الدين إلى ما كان عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والتسعون بعد المائتين
  article_text_ar: ينقضي التزام المدين إذا أبرأه الدائن، ولا يتوقف الإبراء على قبول المدين، ولكن إذا رده المدين عاد الدين إلى ما كان عليه. لا يصح الإبراء إلا من دينٍ قائم، ولو لم يكن حالًّا
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والتسعون بعد المائتين
  article_text_ar: تسري على الإبراء الأحكام الموضوعية للتبرعات، ولا يُشترط فيه شكل خاص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والتسعون بعد المائتين
  article_text_ar: ينقضي التزام المدين إذا أثبت استحالة التنفيذ عليه بسبب لا يد له فيه، وينقضي كذلك الالتزام المقابل له إن وجد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والتسعون بعد المائتين
  article_text_ar: لا ينقضي الحق بمرور الزمن، ولكن لا تُسمع الدعوى به على المنكر بانقضاء (عشر) سنوات فيما عدا الحالات التي ورد فيها نص نظامي أو الاستثناءات الواردة في هذا الفرع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والتسعون بعد المائتين
  article_text_ar: 'دون إخلال بالنصوص النظامية، لا تُسمع الدعوى على المنكر بانقضاء (خمس) سنوات في الحقوق الآتية: أ- حقوق أصحاب المهن الحرة، كالأطباء والمحامين والمهندسين عما أدوه من عملٍ متصلٍ بمهنهم وما أنفقوه من نفقة. ب- الحقوق الدورية المتجددة، كأجرة العقارات والأجور والإيرادات المرتبة ونحوها، ويُستثنى من ذلك إذا كان الحق ريعًا في ذمة حائزٍ سيء النية أو ريعًا واجبًا على ناظر الوقف أداؤه للمستحق، فلا تسمع الدعوى بشأنه بانقضاء (عشر) سنوات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والتسعون بعد المائتين
  article_text_ar: 'دون إخلال بالنصوص النظامية، لا تُسمع الدعوى على المنكر بانقضاء (سنة) في الحقوق الآتية: أ- حقوق التّجار عن السلع والخدمات المقدمة لأشخاصٍ لا يتّجرونَ فيها. ب- حقوق أصحاب المنشآت المعدة لإيواء النزلاء والمطاعم ومن في حكمهم الناشئة عن ممارسة تلك الأنشطة. ج- حقوق الأجراء من أجورٍ يوميَّةٍ وغير يوميَّةٍ ومن ثمن ما قدموه من أشياء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والتسعون بعد المائتين
  article_text_ar: لا تُسمع الدعوى في الحقوق الواردة في الفقرة (أ) من المادة (السادسة والتسعين بعد المائتين) من هذا النظام والحقوق الواردة في المادة (السابعة والتسعين بعد المائتين) من هذا النظام بانقضاء المدد المعينة ولو استمر نوع التعامل بين أصحابها والمدينين بها، وإذا حُرِّر سند بحقٍّ من هذه الحقوق لم يمتنع سماع الدعوى به إلا بانقضاء (عشر) سنوات من تاريخ تحرير السند.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والتسعون بعد المائتين
  article_text_ar: يبدأ سريان المدة المقررة لعدم سماع الدعوى لمرور الزمن -فيما لم يرد فيه نص نظامي- من اليوم الذي يكون فيه الحق مستحق الأداء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثمائة
  article_text_ar: يقف سريان مدة عدم سماع الدعوى كلما وُجد عذرٌ تتعذر معه المطالبة بالحق. يعدُّ من الأعذار التي يقف بها سريان مدة عدم سماع الدعوى وجود تفاوضٍ عن حسن نيَّةٍ بين الطرفين يكون قائمًا عند اكتمال المدة، أو وجود مانع أدبي يحول دون المطالبة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأولى بعد الثلاثمائة
  article_text_ar: إذا تعدد الدائنون بدينٍ واحدٍ ولم يطالب أي منهم بالحق فإن عدم سماع الدعوى لا يسري إلا على من ليس له عذر منهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية بعد الثلاثمائة
  article_text_ar: 'تنقطع مدة عدم سماع الدعوى في الحالات الآتية: أ- إقرار المدين بالحق صراحةً أو ضمنًا. ب- المطالبة القضائية، ولو كانت أمام محكمة غير مختصة. ج- أي إجراءٍ قضائيٍّ آخر يقوم به الدائن للتمسك بحقه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة بعد الثلاثمائة
  article_text_ar: إذا انتقل الحق من شخص إلى خلفه فلا تنقطع المدة المقررة لعدم سماع الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة بعد الثلاثمائة
  article_text_ar: إذا انقطعت مدة عدم سماع الدعوى بدأت مدةٌ جديدةٌ مماثلة للمدة الأولى من انتهاء الأثر المترتب على سبب الانقطاع. إذا صدر حكم قضائي بحق، أو كان الحق من الحقوق الواردة في الفقرة (أ) من المادة (السادسة والتسعين بعد المائتين) من هذا النظام أو الحقوق الواردة في المادة (السابعة والتسعين بعد المائتين) من هذا النظام وانقطعت مدة عدم سماع الدعوى بإقرار المدين؛ فتكون المدة الجديدة (عشر) سنوات، إلا أن يكون الحق المحكوم به متضمنًا لالتزامات دورية متجددة لا تستحق الأداء إلا بعد صدور الحكم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة بعد الثلاثمائة
  article_text_ar: لا يجوز الاتفاق على تقصير مدة عدم سماع الدعوى، ولا على إطالتها. لا يجوز أن يُسقط المدين حقه في التمسك بعدم سماع الدعوى قبل ثبوت هذا الحق له. إسقاط المدين حقه في التمسك بعدم سماع الدعوى تجاه بعض دائنيه لا ينفذ في حق الباقين إذا كان مضرًّا بهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة بعد الثلاثمائة
  article_text_ar: لا تقضي المحكمة بعدم سماع الدعوى لمرور الزمن إلا بناءً على طلب المدين أو ذي مصلحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة بعد الثلاثمائة
  article_text_ar: البيع عقد يُمَلِّكُ بمقتضاه البائع المبيع للمشتري مقابل ثمنٍ نقدي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة بعد الثلاثمائة
  article_text_ar: يجب أن يكون المبيع معلومًا للمشتري برؤيته أو ببيان صفاته المميزة له. إذا تضمّن عقد البيع أن المشتري عالمٌ بالمبيع فلا حق له في طلب إبطال العقد لعدم العلم إلا إذا أثبت تغرير البائع به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة بعد الثلاثمائة
  article_text_ar: إذا كان البيع بالعيّنة وجَبَ أن يكون المبيع مطابقًا لها. إذا فُقدت العيّنة أو تلفت في يد أحد المتعاقدين ولو من غير خطأٍ منه، واختلفا في مطابقة المبيع للعيّنة؛ فالقول للمتعاقد الآخر، ما لم يُثبت من فُقدت أو تلفت العيّنة في يده عكس ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة بعد الثلاثمائة
  article_text_ar: يجوز البيع بشرط التجربة خلال مدة معينة، وإذا لم يعين المتبايعان المدة حملت على المدة المعتادة للتجربة، وعلى البائع تمكين المشتري منها، وللمشتري فسخ البيع ولو لم يجرب المبيع بشرط إعلام البائع بالفسخ خلال مدة التجربة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة بعد الثلاثمائة
  article_text_ar: إذا أسقط المشتري حقه في الفسخ صراحةً أو ضمنًا، أو تجاوز في استعمال المبيع حدَّ التجربة، أو هلك المبيع أو تلف بفعل المشتري أو بعد تسلمه، أو مضت المدة المتفق عليها دون فسخٍ مع تمكنه من التجربة؛ لزم البيع بالثَّمن المتَّفق عليه مستندًا إلى وقت انعقاده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة بعد الثلاثمائة
  article_text_ar: إذا تبين من الاتفاق أو ظروف الحال أن البيع بشرط التجربة معلَّقٌ على قبول المشتري للمبيع؛ لم ينفُذ البيع إلا بقبوله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد الثلاثمائة
  article_text_ar: يصح أن يقتصر تقدير الثمن على بيان أسس صالحة يتحدد بمقتضاها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد الثلاثمائة
  article_text_ar: إذا اتفق المتعاقدان على تحديد الثمن بسعر السوق اعتُبر سعر السوق في زمان البيع ومكانه، فإن لم يكن في مكان البيع سوقٌ اعتُبر المكان الذي يقضي العرف بأن تكون أسعاره سارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد الثلاثمائة
  article_text_ar: إذا لم يحدد المتعاقدان ثمنًا للمبيع فلا يترتب على ذلك بطلان البيع متى تبيَّن من الظروف توجه إرادتهما إلى سعر السوق أو السعر الذي جرى عليه التعامل بينهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة بعد الثلاثمائة
  article_text_ar: إذا حدد الثمن بناءً على رأس مال البائع في المبيع مرابحة أو وضيعة أو تولية، وجب عليه أن يبين كل ما له تأثير في رأس ماله، وللمشتري طلب إبطال العقد إذا كتم البائع أمرًا ذا تأثير في رأس المال. إذا لم يكن رأس المال محددًا عند العقد وتبين في الثمن غبن للمشتري جاز له طلب إبطال العقد، وللبائع توقي الإبطال إذا قدم ما تراه المحكمة كافيًا لرفع الغبن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة بعد الثلاثمائة
  article_text_ar: ١- يُستحق الثمن في البيع معجلًا ما لم يُوجد اتفاق على أن يكون مؤجَّلًا أو مقسَّطًا لأجلٍ معلومٍ. 2- إذا كان الثمن مؤجلًا أو مقسَّطًا فيبدأ الأجل من تاريخ العقد؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد الثلاثمائة
  article_text_ar: تنتقل ملكية المبيع إلى المشتري بانعقاد البيع، وذلك دون إخلال بأحكام المواد (الخامسة والخمسين بعد الستمائة) و(السادسة والخمسين بعد الستمائة) و(السابعة والخمسين بعد الستمائة) من هذا النظام. لا يمنع من انتقال الملكية كون البيع تمَّ جُزافًا ولو كان تعيين الثمن فيه يتوقف على تقدير المبيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد الثلاثمائة
  article_text_ar: يلتزم البائع بأن يقوم بما هو ضروريٌّ من جانبه لنقل ملكية المبيع للمشتري وأن يمتنع عن أي عمل من شأنه جعل نقل الملكية مستحيلًا أو عسيرًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العشرون بعد الثلاثمائة
  article_text_ar: للبائع -إذا كان الثمن مؤجلًا أو مقسَّطًا- أن يشترط تعليق نقل الملكية للمشتري حتى يؤدي جميع الثمن ولو سُلِّم المبيع. إذا استوفى البائع الثمن عُدّت ملكية المشتري مستندةً إلى وقت انعقاد البيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد الثلاثمائة
  article_text_ar: يلتزم البائع بتسليم المبيع إلى المشتري بالحال التي كان عليها وقت البيع، وتكون نفقات تسليم المبيع على البائع، وذلك كله ما لم يتفق على خلافه. يلتزم البائع بتسليم المبيع مجرَّدًا من كل حق للغير لا يعلمه المشتري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد الثلاثمائة
  article_text_ar: يشمل تسليم المبيع ملحقاته، وما اتصل به اتصال قرار، وما جرى العرف على أنه من توابع المبيع ولو لم يذكر في العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد الثلاثمائة
  article_text_ar: 'إذا عين مقدار المبيع عند العقد فبان فيه نقصٌ أو زيادةٌ ولم يوجد اتفاقٌ؛ وجب اتباع الآتي: أ- إذا كان المبيع مما تضره التجزئة والثمن المسمى لمجموعه وليس بالوحدة القياسية فالزيادة للمشتري والنقص لا يقابله شيء من الثمن، وفيما عدا ذلك يكون النقص من حساب البائع والزيادة له يستردها عينًا إن كان المبيع لا تضره التجزئة أو يستحق ثمنها إن كان المبيع تضره التجزئة. ب- إذا كانت الزيادة تُلزم المشتري أكثر مما اشترى به بمقدار جسيم أو كان النقص يُخل بغرضه بحيث لو علم به لما أتم العقد كان له طلب فسخ البيع. لا تسمع الدعوى بالفسخ أو إنقاص الثمن أو إكماله إذا انقضت (سنة) من تاريخ تسليم المبيع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد الثلاثمائة
  article_text_ar: يكون تسليم المبيع بوضعه في حيازة المشتري، أو بأن يخلي البائع بين المبيع والمشتري بحيث يتمكن من حيازته والانتفاع به دون مانع، ما دام البائع قد أعلم المشتري بذلك، ويكون هذا التسليم على النحو الذي يتفق مع طبيعة المبيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد الثلاثمائة
  article_text_ar: إذا كان المبيع تحت يد المشتري قبل البيع بأي صفةٍ أو سببٍ عُدَّت هذه الحيازة تسليمًا؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد الثلاثمائة
  article_text_ar: 'تُعدُّ الحالات الآتية تسليمًا للمبيع: أ- إذا اتفق المتبايعان على عدّ المشتري متسلمًا للمبيع في حالة معينة. ب- إذا عدّ نصٌ نظامي المشتري متسلمًا للمبيع في حالة معينة. ج- إذا استبقى البائع المبيع في يده بعد البيع لسبب آخر غير الملكية برضى المشتري.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد الثلاثمائة
  article_text_ar: يُعدُّ المشتري متسلمًا للمبيع ويلزمه أداء الثمن إذا هلك المبيع أو تلف قبل التسليم بفعله، فإن كان للبائع الحق في العدول عن العقد واختاره؛ كان له الرجوع على المشتري بالتعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد الثلاثمائة
  article_text_ar: إذا هلك المبيع أو جزء منه قبل التسليم بفعل البائع أو الغير؛ كان للمشتري طلب فسخ البيع، أو إمضاؤه والرجوع بالتعويض على المتسبب بالهلاك، أو طلب الفسخ في الجزء الذي هلك فقط.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد الثلاثمائة
  article_text_ar: إذا هلك المبيع قبل التسليم بسببٍ لا يد لأحد المتبايعين أو الغير فيه انفسخ البيع واسترد المشتري الثمن. إذا كان الهلاك على جزء من المبيع انفسخ البيع في ذلك الجزء واسترد المشتري ما يقابله من الثمن، وللمشتري طلب فسخ البيع في الباقي واسترداد كامل الثمن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثون بعد الثلاثمائة
  article_text_ar: يضمن البائع عدم تعرضه للمشتري في الانتفاع بالمبيع كله أو بعضه. يضمن البائع سلامة المبيع من أي حق للغير في المبيع كله أو بعضه إذا كان الحق سابقًا لعقد البيع أو آيلًا إلى الغير من البائع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد الثلاثمائة
  article_text_ar: ترفع دعوى استحقاق المبيع قبل تسلمه على البائع أو المشتري أو عليهما معًا. إذا رفعت على المشتري دعوى استحقاق المبيع فعليه المبادرة إلى إعلام البائع بذلك، وعلى البائع أن يتدخل في الدعوى. إذا أُعلم البائع في الوقت الملائم ولم يتدخل في الدعوى أو تدخل وحكم في الحالتين باستحقاق المبيع للغير؛ لزمه الضمان، إلا إذا أثبت أن الحكم الصادر في الدعوى كان نتيجة تغرير من المشتري أو خطأ جسيم منه. إذا لم يعلم المشتري البائع بالدعوى في الوقت الملائم وصدر على المشتري حكمٌ؛ سقط حقُّه في الرجوع بالضمان إذا أثبت البائع أن تدخله في الدعوى كان يؤدي إلى رفض دعوى الاستحقاق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد الثلاثمائة
  article_text_ar: يثبت حق المشتري في الضمان ولو أقرَّ للغير بالحق أو تصالح معه وهو حسن النية في الحالتين دون أن ينتظر صدور حكم قضائي متى كان قد أعلم البائع بالدعوى في الوقت الملائم فلم يتدخل؛ وذلك ما لم يثبت البائع أن المدعي لم يكن على حق في دعواه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد الثلاثمائة
  article_text_ar: إذا تصالح المشتري مع مدعي الاستحقاق على مال قبل صدور حكم قضائي له، فللبائع أن يتخلص من نتائج الضمان بأن يرد للمشتري ما يعادل بدل الصلح ونفقاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد الثلاثمائة
  article_text_ar: إذا استحق المبيع كله كان للمستحق إذا أجاز البيع الرجوع على البائع بالثمن، ويَخلُص المبيع للمشتري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد الثلاثمائة
  article_text_ar: 'إذا استحق المبيع كله ولم يجز المستحق البيع، فللمشتري أن يطلب من البائع الآتي: أ- ثمن المبيع. ب- قيمة الثمار التي أُلزِمَ المشتري بردها للمستحق. ج- النفقات النافعة التي أحدثها المشتري في المبيع مما لا يلزم المستحق تعويض المشتري عنها. د- النفقات الكمالية إذا كان البائع سيء النية. هـ- التعويض عن أي أضرار أخرى نشأت باستحقاق المبيع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد الثلاثمائة
  article_text_ar: إذا استُحق بعض المبيع وأحدث الاستحقاق عيبًا في الباقي كان للمشتري طلب الفسخ، فإن اختار إمساك المبيع أو لم يحدث الاستحقاق عيبًا في الباقي فليس له إلا الرجوع بالضمان في الجزء المستحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد الثلاثمائة
  article_text_ar: يصحُّ الاتفاق على إعفاء البائع من ضمان الاستحقاق أو الحد من هذا الضمان أو زيادته، عدا ما يكون منه ناشئًا عن فعل البائع أو كان قد تعمد إخفاءه. لا يحول الاتفاق على الإعفاء من ضمان الاستحقاق دون حق المشتري في الرجوع على البائع بالثمن؛ ما لم يثبت أن المشتري كان يعلم وقت البيع سبب الاستحقاق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد الثلاثمائة
  article_text_ar: يضمن البائع عند تسليم المبيع سلامته من أي عيبٍ ينقص من قيمته أو من نفعه بحسب الغاية المقصودة منه، والمستفادة مما هو مبين في العقد، أو مما هو ظاهر من طبيعة الشيء، أو الغرض الذي أعد له. ويضمن البائع هذا العيب ولو لم يكن عالماً بوجوده. إذا ظهر في المبيع عيب كان المشتري مخيَّرًا بين طلب فسخ البيع أو إمساك المبيع والرجوع على البائع بفرق الثمن، وهو نسبة قيمة المبيع سليمًا إلى قيمته معيبًا من الثمن. وللبائع أن يتوقَّى ذلك بإحضار بديلٍ مماثلٍ للمبيع غير معيبٍ. للمشتري في الحالات الواردة في الفقرة (2) من هذه المادة الحق في التعويض عما يلحقه من ضرر إن كان له مقتضٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد الثلاثمائة
  article_text_ar: 'لا يضمن البائع العيب في الحالات الآتية: أ- إذا كان المشتري يعلم بالعيب وقت البيع، أو كان يستطيع أن يتبيّنه بنفسه لو فحص المبيع بعناية الشخص المعتاد؛ ما لم يضمن البائع له سلامة المبيع من عيب بعينه أو كان البائع تعمد إخفاءه. ب- إذا كان العيب مما جرى العرف على التسامح فيه. ج- إذا حدث العيب بعد التسليم ما لم يكن مستندًا إلى سبب موجود في المبيع قبل التسليم. د- إذا كان البيع في المزاد من قبل الجهات القضائية أو الإدارية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعون بعد الثلاثمائة
  article_text_ar: إذا تسلّم المشتري المبيع فعليه التحقق من حالته بمجرد أن يتمكّن من ذلك وفقًا للمألوف في التعامل، فإذا كشف عيبًا يضمنه البائع فعليه أن يعلمه به خلال مدة معقولة، فإن لم يفعل عُدَّ قابلًا للمبيع بما فيه من عيب. إذا كان العيب مما لا يمكن الكشف عنه بالفحص المعتاد ثم كشفه المشتري، فعليه أن يعلم به البائع بمجرد ظهوره، وإلا عُدَّ قابلًا للمبيع بما فيه من عيب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد الثلاثمائة
  article_text_ar: 'إذا رضي المشتري بالعيب صراحةً أو ضمنًا سقط حقه في الفسخ وفي الرجوع بفرق الثمن. يسقط حقّ المشتري في الفسخ، وله الرجوع بفرق الثمن في الحالات الآتية: أ- إذا تصرّف في المبيع تصرّفًا يخرجه عن ملكه، فإن عاد إلى ملكه قبل طلب فرق الثمن لم يسقط حقه في الفسخ. ب- إذا رتبّ على المبيع حقًّا للغير لا يخرجه عن ملكه وتعذّر تخليصه منه خلال مدة معقولة. ج- إذا هلك المبيع أو تعيّب بفعله أو بعد تسلمه له. د- إذا زاد في المبيع زيادةً متصلةً غير متولّدةٍ منه قبل التسلّم أو بعده.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والأربعون بعد الثلاثمائة
  article_text_ar: إذا بيعت أشياء متعددةٌ صفقةً واحدةً، وظهر في بعضها عيب، وليس في تجزئتها ضررٌ؛ فللمشتري طلب فسخ البيع في الجزء المعيب أو إمساكه مع الرجوع بفرق ثمنه، وليس له طلب الفسخ في جميع المبيع، ما لم يتبين أنه ما كان ليرضى بالعقد دون الجزء المعيب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد الثلاثمائة
  article_text_ar: يصحُّ الاتفاق على إعفاء البائع من ضمان العيب أو الحد من هذا الضمان أو زيادته ما لم يكن البائع قد تعمد إخفاءه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد الثلاثمائة
  article_text_ar: لا تُسمع دعوى ضمان العيب بانقضاء (مائةٍ وثمانين) يومًا من تاريخ تسليم المبيع؛ ما لم يلتزم البائع بالضمان مدة أطول. ليس للبائع أن يتمسك بانقضاء المدة الواردة في الفقرة (1) من هذه المادة إذا ثبت أن إخفاء العيب كان بغشٍّ منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد الثلاثمائة
  article_text_ar: يلزم المشتري أداء الثمن قبل تسلُّم المبيع؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والأربعون بعد الثلاثمائة
  article_text_ar: للبائع أن يحبس المبيع حتى يستوفي ما هو مستحق له من الثمن ولو قدم المشتري رهنًا أو كفالةً. وإذا هلك المبيع أو تلف في يد البائع وهو حابس له كانت تبعة ذلك على المشتري. إذا قبل البائع تأجيل الثمن سقط حقه في حبس المبيع ولزمه تسليم المبيع للمشتري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والأربعون بعد الثلاثمائة
  article_text_ar: إذا تسلّم المشتري المبيع قبل أداء الثمن الحال على علم من البائع ولم يمنعه كان ذلك إذنًا بالتسلم. إذا تسلّم المشتري المبيع قبل أداء الثمن الحال دون إذن البائع كان للبائع استرداده، وإذا هلك أو تلف في يد المشتري عُدَّ متسلمًا له، وللبائع إن اختار استرداده مطالبة المشتري بالتعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والأربعون بعد الثلاثمائة
  article_text_ar: يلتزم المشتري بأداء الثمن الذي استحق وفاؤه وقت تسليم المبيع في مكان التسليم، وإذا لم يكن الثمن مستحق الوفاء وقت تسليم المبيع، لزم أداؤه في مكان العقد، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والأربعون بعد الثلاثمائة
  article_text_ar: إذا رفعت على المشتري دعوى استحقاق المبيع مستندةً إلى حقٍّ سابقٍ على البيع أو آيلٍ إلى مدعي الاستحقاق من البائع؛ جاز للمشتري حبس الثمن حتى يقدم البائع ضمانًا مناسبًا برد الثمن عند ثبوت الاستحقاق. وللبائع أن يطلب من المحكمة تكليف المشتري إيداع الثمن لدى الجهة التي يحددها وزير العدل بدلًا من تقديم الضمان. يسري حكم الفقرة (1) من هذه المادة إذا تبين للمشتري أن في المبيع عيبًا مضمونًا على البائع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسون بعد الثلاثمائة
  article_text_ar: إذا حُدد في البيع موعدٌ معيَّنٌ، واشترط البائع أنه إذا لم يؤد المشتري الثمن في الموعد فلا بيع بينهما، ولم يؤده؛ عُدَّ البيع مفسوخًا إذا اختار البائع ذلك، دون حاجةٍ إلى إعذار، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والخمسون بعد الثلاثمائة
  article_text_ar: يلتزم المشتري بتسلم المبيع في المكان الذي يوجد فيه المبيع وقت البيع، ونقله دون إبطاء، إلا ما يقتضيه النقل من زمن، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والخمسون بعد الثلاثمائة
  article_text_ar: تكون نفقات الوفاء بالثمن وتسلم المبيع وعقد البيع وتسجيله على المشتري، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والخمسون بعد الثلاثمائة
  article_text_ar: مرض الموت هو المرض الذي يعجز فيه الإنسان عن متابعة أعماله المعتادة، ويغلب فيه الهلاك ويتصل به الموت. يُعد في حكم مرض الموت الحالات التي يحيط بالإنسان فيها خطر الموت ويغلب في أمثالها الهلاك ولو لم يكن مريضًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والخمسون بعد الثلاثمائة
  article_text_ar: بيع المريض مرض الموت لوارثٍ وشراؤه منه بمحاباةٍ لا ينفذ في قدر المحاباة في حق باقي الورثة إلا بإجازتهم. بيع المريض مرض الموت لغير وارث وشراؤه منه بمحاباةٍ لا ينفذ في قدر المحاباة في حق الورثة فيما زاد على قيمة (ثلث) التركة عند الموت بما فيها المبيع ذاته، إلا بإجازتهم أو أن يردّ المتصرف إليه للتركة ما يفي بإكمال (الثلثين).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والخمسون بعد الثلاثمائة
  article_text_ar: لا يحتج بعدم نفاذ بيع المريض مرض الموت إذا تصرف المشتري في المبيع تصرفًا أكسب من كان حسن النية حقًّا عينيًّا في المبيع مقابل عوض، وذلك دون إخلال بحق الورثة في الرجوع على المشتري بما يُكمل (ثلثي) التركة أو ثَمن المثل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والخمسون بعد الثلاثمائة
  article_text_ar: مع مراعاة النصوص النظامية؛ ليس للنائب أن يشتري لنفسه باسمه أو اسم غيره ولو بطريق المزاد ما عهد إليه بيعه بمقتضى نيابته ما لم يكن مأذونًا له بذلك، كما لا يحق ذلك للوسيط ولا للخبير ولا لمن في حكمهما في الأموال التي عهد إليه بيعها أو تقدير قيمتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والخمسون بعد الثلاثمائة
  article_text_ar: إذا تمَّ البيع في الأحوال المنصوص عليها في المادة (السادسة والخمسين بعد الثلاثمائة) من هذا النظام، لم ينفذ في حق من تم لحسابه إلا إذا أجازه، وليس له أن يحتج بعدم نفاذ البيع تجاه الخلف الخاص إذا كسب هذا الخلف حقًا عينيًا معاوضة بحسن نية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والخمسون بعد الثلاثمائة
  article_text_ar: لا يجوز للقاضي، ولا لعضو النيابة العامة ومن في حكمه، ولا لموظف المحكمة، أن يشتري لنفسه باسمه أو باسم غيره الحق المتنازع فيه أو بعضه، ويكون العقد باطلًا. لا يجوز للمحامي أن يشتري لنفسه باسمه أو باسم غيره الحق المتنازع فيه أو بعضه متى كان وكيلًا فيه، ويكون العقد باطلًا. يعد الحق متنازعًا فيه إذا كان موضوعه قد رفعت به دعوى أو قام في شأنه نزاع جدي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والخمسون بعد الثلاثمائة
  article_text_ar: إذا باع شخص بلا إذن شيئًا معينًا بالذات وهو لا يملكه؛ فلا ينفذ هذا البيع في حق المالك، وإذا أجازه نفذ في حقه، دون إخلال بحقوق الغير. للمشتري طلب إبطال البيع ما لم تؤل ملكية المبيع إلى البائع بعد العقد، أو يُجز المالك البيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستون بعد الثلاثمائة
  article_text_ar: إذا كان المشتري يجهل أن المبيع غير مملوكٍ للبائع، وحكم بإبطال البيع، فللمشتري أن يُطالب بالتَّعويض ولو كان البائع حسن النية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والستون بعد الثلاثمائة
  article_text_ar: المقايضة عقد مبادلة مالٍ بمالٍ على سبيل التمليك ليس أي منهما نقدًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والستون بعد الثلاثمائة
  article_text_ar: يعدّ كل من المتقايضين بائعًا لما قايض به ومشتريًا لما قايض عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والستون بعد الثلاثمائة
  article_text_ar: لا يُخرِجُ المقايضة عن طبيعتها إضافة نقد إلى أحد العوضين لتعويض الفرق في القيمة، إلا إذا كان ذلك العوض أقل قيمة من النقد الذي أضيف إليه، فيصير العقد بيعًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والستون بعد الثلاثمائة
  article_text_ar: تكون نفقات عقد المقايضة مناصفة بين طرفي العقد ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والستون بعد الثلاثمائة
  article_text_ar: تسري على عقد المقايضة أحكام عقد البيع بما لا يتعارض مع طبيعته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والستون بعد الثلاثمائة
  article_text_ar: الهبة عقد يُملِّكُ بمقتضاه الواهبُ حال حياته الموهوب له مالًا دون عوض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والستون بعد الثلاثمائة
  article_text_ar: يصح أن يشترط الواهب التزامًا معيَّنًا على الموهوب له. إذا اشترط الواهب عوضًا على الموهوب له فيكون العقد معاوضة تطبق عليه أحكام المعاوضات بحسب طبيعة العوض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والستون بعد الثلاثمائة
  article_text_ar: إذا كان الموهوب عقارًا فلا تنعقد هبته إلا بتوثيقها وفق النصوص النظامية. إذا كان الموهوب منقولًا فلا تنعقد هبته إلا بتوثيقها وفق النصوص النظامية أو بالقبض ولو من دون توثيق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والستون بعد الثلاثمائة
  article_text_ar: لا ينفذ عقد الهبة إذا كان الموهوب غير مملوك للواهب إلا إذا أجازه المالك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعون بعد الثلاثمائة
  article_text_ar: تصح هبة الدين للمدين، وتعد إبراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والسبعون بعد الثلاثمائة
  article_text_ar: تصح هبة الشريك حصته في المال الشائع لشريكه أو لغيره عقارًا كان أو منقولًا، ولو كان الموهوب قابلًا للقسمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والسبعون بعد الثلاثمائة
  article_text_ar: لا يضمن الواهب استحقاق الموهوب ولا خلوه من العيوب، ولكنه مسؤولٌ عما يلحق الموهوب له من ضرر بسبب الاستحقاق أو العيب إذا تعمد إخفاء أيٍّ منهما أو ضمن خلو الموهوب منهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والسبعون بعد الثلاثمائة
  article_text_ar: إذا كانت الهبة مشروطةً بالتزامٍ لزم الموهوب له أداء ما اشترطه الواهب من التزامٍ لمصلحته أو لمصلحة غيره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والسبعون بعد الثلاثمائة
  article_text_ar: إذا تعلق بالموهوب حقّ عينيّ وفاءً لدين في ذمة الواهب أو ذمة الغير فيلتزم الموهوب له بوفاء هذا الدين في حدود قيمة الموهوب؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والسبعون بعد الثلاثمائة
  article_text_ar: تكون نفقات عقد الهبة وتسليم الموهوب ونقله؛ على الموهوب له، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والسبعون بعد الثلاثمائة
  article_text_ar: 'يجوز للواهب أن يرجع في الهبة إذا قبل الموهوب له رد الموهوب. إذا لم يقبل الموهوب له رد الموهوب فللواهب أن يطلب ذلك من المحكمة في الحالات الآتية: أ- إذا كانت الهبة من أحد الوالدين لولده إذا وجد مسوّغ لذلك. ب- إذا جعل الواهب لنفسه حق الرجوع في الهبة في حالاتٍ حددها يكون له فيها غرضٌ مشروعٌ. ج- إذا كانت الهبة مشروطةً صراحةً أو ضمنًا بالتزامٍ على الموهوب له وأخلَّ به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والسبعون بعد الثلاثمائة
  article_text_ar: يسقط حقُّ الرجوع في الهبة الوارد في المادة (السادسة والسبعين بعد الثلاثمائة) من هذا النظام بموت أحد طرفي العقد قبل الرجوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والسبعون بعد الثلاثمائة
  article_text_ar: للواهب عند الرجوع في الهبة استرداد الموهوب، وله ثماره من وقت قبول الموهوب له رد الموهوب، أو من وقت رفع الدعوى في الحالات التي يحق له فيها طلب الرجوع. ليس للموهوب له أن يسترد مما أنفقه على الموهوب إلا النفقات النافعة بقدر ما زاد في قيمة الموهوب، والنفقات الضرورية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والسبعون بعد الثلاثمائة
  article_text_ar: 'ليس للواهب عند الرجوع في الهبة استرداد عين الموهوب في الحالات الآتية: أ- إذا تصرف الموهوب له في الموهوب تصرفًا ناقلًا للملكية، فإذا اقتصر التصرف على بعض الموهوب فللواهب استرداد الباقي. ب- إذا زاد الموهوب زيادة متصلة ذات أهمية، أو غيَّر الموهوب له الموهوب على وجه تغيَّر فيه اسمه أو طبيعته. ج- إذا هلك الموهوب في يد الموهوب له، فإن هلك بعضه فللواهب استرداد الباقي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثمانون بعد الثلاثمائة
  article_text_ar: إذا لم يكن للواهب استرداد عين الموهوب وفقًا لأحكام المادة (التاسعة والسبعين بعد الثلاثمائة) من هذا النظام؛ فلا يستحق قيمة الموهوب إلا إذا كانت الهبة مشروطةً بالتزامٍ وأخل به الموهوب له؛ فللواهب قيمة الموهوب وقت سقوط حقه في استرداده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثمانون بعد الثلاثمائة
  article_text_ar: إذا كان للواهب الرجوع في الهبة وهلك الموهوب في يد الموهوب له بعد إعذاره بالتسليم؛ لزمه تعويض الواهب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثمانون بعد الثلاثمائة
  article_text_ar: القرض عقد يُمَلِّكُ بمقتضاه المقرِضُ شيئًا مثليًّا للمقترض على أن يرد مثله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثمانون بعد الثلاثمائة
  article_text_ar: لا ينعقد القرض إلا بقبض الشيء المقترض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثمانون بعد الثلاثمائة
  article_text_ar: يجب في القرض أن يكون المقرض كامل الأهلية. ليس للولي أو الوصي إقراض مال من هو في ولايته ولا اقتراضه إلا وفقًا للنصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثمانون بعد الثلاثمائة
  article_text_ar: يقع باطلًا كل شرط عند العقد أو عند تأجيل الوفاء يتضمن زيادة في رد القرض يؤديها المقترض إلى المقرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثمانون بعد الثلاثمائة
  article_text_ar: لا يضمن المقرِض استحقاق المال المقترَض ولا خلوه من العيوب، ولكنه مسؤولٌ عما يلحق المقترض من ضرر بسبب الاستحقاق أو العيب إذا تعمد إخفاء أيٍّ منهما أو ضمن خلو المال المقترَض منهما. إذا استُحق المال المقترَض وهو قائمٌ في يد المقترِض سقط التزامه برد مثله. إذا ظهر في المال المقترَض عيبٌ واختار المقترِض استبقاء المال فلا يلتزم إلا برد قيمته معيبًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثمانون بعد الثلاثمائة
  article_text_ar: إذا عُيِّن للقرض أجلٌ أو غرضٌ لم يلزم المقترض الوفاء قبل انقضاء الأجل أو المدة المعتادة للانتفاع به في مثل ذلك الغرض. إذا لم يعين للقرض أجلٌ أو غرضٌ لزم المقترض الوفاء عند طلب المقرض؛ ما لم يكن المقترض يتضرر بالوفاء فلا يلزمه إلا إذا مضت المدة المعتادة للانتفاع بمثل المال المقترض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثمانون بعد الثلاثمائة
  article_text_ar: يلتزم المقترِض برد مثل الشيء المقترَض مقدارًا ونوعًا وصفةً عند انقضاء مدة القرض، فإذا تعذر رد مثله وجب رد قيمته يوم الاقتراض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثمانون بعد الثلاثمائة
  article_text_ar: يلتزم المقترض بالوفاء في مكان القرض؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التسعون بعد الثلاثمائة
  article_text_ar: تكون نفقات القرض والوفاء به على المقترض؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والتسعون بعد الثلاثمائة
  article_text_ar: الصلح عقدٌ يحسم بمقتضاه المتصالحان نزاعًا قائمًا أو يتوقيان نزاعًا محتملًا، بأن ينزل كلٌّ منهما على وجه التَّقابل عن مُطالبته أو جزءٍ منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والتسعون بعد الثلاثمائة
  article_text_ar: يجب أن يكون المتصالح أهلًا للتصرف بعوضٍ في الحقوق التي يشملها عقد الصلح. إذا تضمن الصلح إسقاط شيءٍ من الحقوق دون مقابل وجب أن يكون من أسقط حقه كامل الأهلية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والتسعون بعد الثلاثمائة
  article_text_ar: استثناءً من حكم الفقرة (1) من المادة (الثانية والتسعين بعد الثلاثمائة) من هذا النظام؛ لا يصح صلح الصغير المميز المأذون له، إذا ألحق الصلح به ضررًا بيّنًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والتسعون بعد الثلاثمائة
  article_text_ar: يجب أن يكون المتصالح عنه مما يصح أخذ العوض في مقابله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والتسعون بعد الثلاثمائة
  article_text_ar: يصح الصلح ولو كان الحق الذي يشمله مجهولًا إذا كانت الجهالة لا تمنع التسليم وكان الحق مما يتعذّر العلم به في مدة قريبة بحسب طبيعة الحق ومقداره ومكانه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والتسعون بعد الثلاثمائة
  article_text_ar: يصح الصلح عن الحقوق سواء أقر بها المدعى عليه أو أنكرها أو سكت ولم يبد فيها إقرارًا ولا إنكارًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والتسعون بعد الثلاثمائة
  article_text_ar: يصح الصلح على بعض ما يدعيه المتصالح في ذمة الآخر. يصح الصلح على تأجيل الدين المدعى به أو بعضه دون زيادة، أو على تعجيله والحط منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والتسعون بعد الثلاثمائة
  article_text_ar: يصح أن يتصالح شخصان يدعي كل منهما حقًّا له لدى الآخر على أن يحتفظ كلٌّ منهما بالحق الذي لديه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والتسعون بعد الثلاثمائة
  article_text_ar: لا يُنشئ الصلح حقًّا جديدًا لأيٍّ من المتصالحين فيما يشمله من الحقوق، وأما عوض الصلح من غير هذه الحقوق فيُنشئ فيه الصلح حقًّا وتسري عليه أحكام المعاوضة بحسب طبيعة العوض والحق المتنازل عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعمائة
  article_text_ar: تُفسَّر عبارات التَّنازل التي يتضمَّنها عقد الصلح تفسيرًا ضيِّقًا في حدود الحقوق التي كانت محلًا للنزاع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأولى بعد الأربعمائة
  article_text_ar: يترتب على عقد الصلح انقضاء الحقوق والادعاءات التي نزل عنها أيٌّ من المتصالحين، وليس لأي منهما أو لورثته الرجوع فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية بعد الأربعمائة
  article_text_ar: يقتصر أثر الصلح على الحقوق التي شملها وحسم النزاع فيها دون غيرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة بعد الأربعمائة
  article_text_ar: المسابقة عقدٌ يلتزم بمقتضاه شخصٌ ببذل جُعلٍ لمن يفوز في سباقٍ يتوقف الفوز فيه على عمل المتسابق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة بعد الأربعمائة
  article_text_ar: يصحُّ في المسابقة أن يكون الالتزام بالجُعل من بعض المتسابقين أو من غيرهم، ولا يصحُّ أن يكون من جميعهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة بعد الأربعمائة
  article_text_ar: إذا كانت المسابقة بين فريقين عُدَّ كلُّ فريقٍ في حكم الشخص الواحد في الالتزام بالجعل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة بعد الأربعمائة
  article_text_ar: يقع باطلًا كلُّ اتفاقٍ على قمار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة بعد الأربعمائة
  article_text_ar: الإيجار عقد يُمَكِّنُ بمقتضاه المؤجر المستأجر من الانتفاع مدةً معينةً بشيءٍ غير قابل للاستهلاك مقابل أجرةٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة بعد الأربعمائة
  article_text_ar: يصح أن يكون المأجور عينًا أو منفعةً أو حقًّا؛ سواء كان معيَّنًا بالذات أو بالنوع. يصح أن يكون المأجور حصَّةً شائعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة بعد الأربعمائة
  article_text_ar: يصح أن يقتصر تقدير الأجرة على بيان أسسٍ صالحةٍ تتحدد بمقتضاها، ويصح أن تكون بمبلغٍ معيَّنٍ مع نسبةٍ معلومةٍ من الناتج أو من الربح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة بعد الأربعمائة
  article_text_ar: يصح اشتراط تعجيل الأجرة أو تأجيلها أو تقسيطها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة بعد الأربعمائة
  article_text_ar: إذا عُقد الإيجار على شيءٍ معينٍ بأجرةٍ إجماليةٍ، وذُكر عدد وحداته دون بيان أجرة كل وحدة منها، فظهرت وحداته أزيد أو أنقص؛ كانت الأجرة هي المحددة في العقد لا يزاد عليها ولا ينقص منها، وللمستأجر في حالة النقص طلب فسخ العقد. إذا حددت في العقد أجرة كل وحدة التزم المستأجر بالأجرة المحددة للوحدات الزائدة، والتزم المؤجر بإنقاص الأجرة المحددة للوحدات الناقصة، وللمستأجر طلب الفسخ في الحالتين. إذا كان مقدار النقص أو الزيادة يسيرًا ولا أثر له في المنفعة المقصودة فليس للمستأجر طلب الفسخ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة بعد الأربعمائة
  article_text_ar: تبدأ مدة الإيجار من التاريخ المحدد في العقد، فإذا لم يحدد فمن تاريخ انعقاد العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد الأربعمائة
  article_text_ar: إذا لم تعين مدة الإيجار وكانت الأجرة عن وحدة زمنية معينة عُدَّ عقد الإيجار منعقدًا إلى نهاية تلك الوحدة الزمنية، وإلا عينت المحكمة مدة الإيجار بحسب العرف وظروف العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد الأربعمائة
  article_text_ar: تصح إضافة عقد الإيجار إلى أجل مستقبل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد الأربعمائة
  article_text_ar: إذا انقضت مدة الإيجار وثبت وجود ضرورة ملحة لامتدادها فإنها تمتد بقدر تلك الضرورة على أن يؤدي المستأجر أجرة المثل عن هذه المدة، ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة بعد الأربعمائة
  article_text_ar: على المؤجر تسليم المأجور وملحقاته في حالٍ يصلح معها لاستيفاء المنفعة المقصودة كاملة. يكون التسليم بتمكين المستأجر من الانتفاع بالمأجور دون مانعٍ يعوق الانتفاع، مع بقاء ذلك مستمرًّا حتى انقضاء مدة الإيجار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة بعد الأربعمائة
  article_text_ar: للمؤجر أن يمتنع عن تسليم المأجور حتى يستوفي الأجرة المعجلة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد الأربعمائة
  article_text_ar: تسري على تسليم المأجور وملحقاته أحكام تسليم المبيع؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد الأربعمائة
  article_text_ar: يلتزم المؤجر بالإصلاحات الضرورية اللازمة لبقاء المأجور صالحًا للانتفاع، بما في ذلك إصلاح أي خللٍ في المأجور يؤثر في استيفاء المنفعة المقصودة. إذا تأخر المؤجر-بعد إعذاره- عن القيام بالإصلاحات الواردة في الفقرة (1) من هذه المادة ودون إخلال بحق المستأجر في طلب الفسخ أو إنقاص الأجرة؛ فللمستأجر الحصول على إذن من المحكمة بالقيام بالإصلاحات، وله الرجوع على المؤجر بما أنفق بالقدر المتعارف عليه. ويجوز للمستأجر دون إذن المحكمة القيام بالإصلاحات واقتطاع نفقتها من الأجرة بالقدر المتعارف عليه إذا كانت من الأمور المستعجلة أو كانت يسيرة عرفًا، وعلى المستأجر في جميع الأحوال أن يقدم للمؤجر حسابًا عما تم إصلاحه. يجوز للمؤجر والمستأجر الاتفاق على خلاف أحكام الفقرتين (1) و(2) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العشرون بعد الأربعمائة
  article_text_ar: إذا هلك المأجور أثناء مدة الإيجار هلاكًا كليًّا انفسخ العقد من تلقاء نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد الأربعمائة
  article_text_ar: إذا هلك المأجور أثناء مدة الإيجار هلاكًا جزئيًا أو أصبح في حال تنقص من الانتفاع الذي أُجِّر من أجله، ولم يكن ذلك بسبب المستأجر؛ جاز له طلب فسخ العقد أو إنقاص الأجرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد الأربعمائة
  article_text_ar: إذا أحدث المستأجر بإذن المؤجر إنشاءاتٍ أو إصلاحات لمنفعة المأجور؛ فله الرجوع بما أنفق بالقدر المتعارف عليه وإن لم يشترط المستأجر الرجوع، ما لم يتفق على خلاف ذلك. إذا كان ما أحدثه المستأجر عائدًا لمنفعته الشخصية فليس له الرجوع على المؤجر؛ ما لم يُتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد الأربعمائة
  article_text_ar: على المؤجر أن يمتنع عن التعرض للمستأجر في استيفائه للمنفعة طوال مدة الإيجار، بما في ذلك أن يحدث المؤجر في المأجور تغييرًا يمنع من الانتفاع به أو يخل بالمنفعة المقصودة، وإلا كان ضامنًا. ويعد في حكم تعرض المؤجر التعرض الصادر من أحد تابعيه. يضمن المؤجر للمستأجر التعرض الصادر من الغير إذا كان التعرض مبنيًّا على سبب نظامي. إذا ترتب على التعرض الوارد في الفقرتين (1) و(2) من هذه المادة حرمان المستأجر كليًّا أو جزئيًّا من الانتفاع بالمأجور؛ جاز له طلب الفسخ أو إنقاص الأجرة، دون إخلالٍ بحقه في التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد الأربعمائة
  article_text_ar: لا يضمن المؤجر التعرض الصادر من الغير إذا لم يكن مبنيًّا على سبب نظامي، على أنه إذا كان التعرض بسبب لا يد للمستأجر فيه، وترتب عليه حرمانه من الانتفاع بالمأجور؛ جاز له طلب الفسخ أو إنقاص الأجرة. إذا ترتب على عمل من جهة عامة نقص في الانتفاع بالمأجور جاز للمستأجر طلب فسخ العقد أو إنقاص الأجرة دون إخلال بحقه في مطالبة المؤجر بالتعويض إذا كان عمل الجهة العامة قد صدر لسبب يكون المؤجر مسؤولًا عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد الأربعمائة
  article_text_ar: يضمن المؤجر للمستأجر ما يوجد في المأجور من عيوبٍ تحول دون الانتفاع به أو تنقص منه. لا يضمن المؤجر العيوب التي جرى العرف على التسامح فيها أو التي علم بها المستأجر وقت التعاقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد الأربعمائة
  article_text_ar: إذا ترتب على العيب حرمان المستأجر كليًّا أو جزئيًّا من الانتفاع بالمأجور جاز له طلب الفسخ أو إنقاص الأجرة دون إخلال بحقه في التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد الأربعمائة
  article_text_ar: يقع باطلًا كل اتفاق يتضمن الإعفاء أو الحد من ضمان التعرض أو العيب إذا كان المؤجر قد تعمّد إخفاء سبب هذا الضمان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد الأربعمائة
  article_text_ar: يصح بيع المأجور ولا يؤثر ذلك في حقوق المستأجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد الأربعمائة
  article_text_ar: يلتزم المستأجر بأن يؤدي الأجرة في المواعيد المتفق عليها، فإن لم يتفق على المواعيد التزم بأدائها عند تسليم المأجور، وإذا كانت مدة عقد الإيجار مقسَّمة على فتراتٍ زمنيَّة التزم بأدائها في بداية كل فترةٍ زمنيَّة. لا تُستحق الأجرة عن مدةٍ انقضت قبل تسليم المأجور؛ ما لم يكن التأخر في التسليم بسبب المستأجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثون بعد الأربعمائة
  article_text_ar: يلتزم المستأجر بأن يحافظ على المأجور محافظة الشخص المعتاد. يلتزم المستأجر بتعويض المؤجر عما يلحق المأجور من أضرارٍ ناشئةٍ عن تعديه أو تقصيره، وإذا تعدد المستأجرون لزم كل واحد منهم التعويض عن الأضرار الناشئة عن تعديه أو تقصيره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد الأربعمائة
  article_text_ar: يلتزم المستأجر باستعمال المأجور في حدود المنفعة المتفق عليها في العقد، فإن لم يكن هناك اتفاقٌ التزم باستعمالهِ بحسب ما أُعد له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد الأربعمائة
  article_text_ar: ليس للمستأجر أن يحدث في المأجور تغييرًا دون إذن المؤجر إلا إذا كان يستلزمه إصلاح المأجور ولا يلحق ضررًا به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد الأربعمائة
  article_text_ar: يلتزم المستأجر خلال مدة الإيجار بصيانة المأجور وفقًا لما يقتضيه العرف؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد الأربعمائة
  article_text_ar: ليس للمستأجر منع المؤجر من القيام بالإصلاحات الضرورية لحفظ المأجور إذا أعلمه المؤجر قبل البدء فيها بمدة معقولة. إذا ترتب على قيام المؤجر بالإصلاحات الواردة في الفقرة (1) من هذه المادة إخلالٌ بانتفاع المستأجر، جاز له طلب الفسخ أو إنقاص الأجرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد الأربعمائة
  article_text_ar: يلتزم المستأجر برد المأجور إلى المؤجر عند انتهاء عقد الإيجار بالحال التي تسلمه بها، ويُستثنى من ذلك ما يقتضيه الاستعمال المعتاد. إذا أبقى المستأجر المأجور تحت يده دون حقٍّ استحق المؤجر أجرة المثل، دون إخلال بحقه في التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد الأربعمائة
  article_text_ar: إذا أحدث المستأجر لمنفعته بناءً أو غراسًا في المأجور ولو بإذن المؤجر ولم يكن بينهما اتفاق على بقائه بعد مدة الإيجار؛ كان للمؤجر عند انتهاء عقد الإيجار أن يطلب إزالة المحدثات على نفقة المستأجر مع التعويض إن كان له مقتضٍ، أو يستبقيها المؤجر بدفع قيمتها مستحقة الإزالة أو بدفع مبلغٍ يساوي ما زاد في قيمة المأجور بسبب البناء أو الغراس. للمستأجر أن يطلب إزالة ما أحدثه من بناءٍ أو غراسٍ إذا كان ذلك لا يُلحق ضررًا بالمأجور ولو اعترض المؤجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد الأربعمائة
  article_text_ar: لا يجوز للمستأجر أن يؤجر المأجور كله أو بعضه أو يتنازل عن العقد إلا بإذن المؤجر أو إجازته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد الأربعمائة
  article_text_ar: يتقيد المستأجر المأذون له بالتأجير أو التنازل للغير عند قيامه بذلك بقيود المنفعة التي يملكها نوعًا وزمنًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد الأربعمائة
  article_text_ar: إذا تنازل المستأجر عن العقد فإن المتنازل له يحل محل المستأجر في جميع الحقوق والالتزامات المترتبة بمقتضى العقد المتنازل عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعون بعد الأربعمائة
  article_text_ar: ينتهي عقد الإيجار بانقضاء المدة المعينة فيه؛ ما لم يُشتَرط تجدده تلقائيًّا. إذا انتهى عقد الإيجار واستمر المستأجر في الانتفاع بالمأجور برضى المؤجر الصريح أو الضمني عُدَّ العقد مجددًا بشروطه وضماناته عدا الضمانات المقدمة من الغير، وتتعين مدة العقد الجديد وفق أحكام المادة (الثالثة عشرة بعد الأربعمائة) من هذا النظام. ما لم يتجدد العقد وفقًا للفقرتين (1) و(2) من هذه المادة؛ إذا طلب المؤجر من المستأجر زيادة معينة على الأجرة المحددة وظل المستأجر حائزًا للمأجور بعد انتهاء مدة العقد دون اعتراض منه على الزيادة؛ لزمته تلك الزيادة ابتداءً من وقت انتهاء العقد القائم، وعُدَّ العقد مجددًا بشروطه وضماناته عدا الضمانات المقدمة من الغير، وتتعين مدة العقد الجديد وفق أحكام المادة (الثالثة عشرة بعد الأربعمائة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد الأربعمائة
  article_text_ar: لا ينتهي عقد الإيجار بموت أحد المتعاقدين. لورثة المستأجر طلب فسخ العقد خلال مدة معقولة إذا أثبتوا أن أعباء العقد قد أصبحت بسبب موت مورثهم أثقل من أن تتحملها مواردهم من التركة، أو أن العقد يتجاوز حدود حاجتهم، أو أنه أُبرم بناءً على اعتبارات تتعلق بشخص مورثهم. للمؤجر طلب فسخ العقد إذا مات المستأجر وكان العقد قد أُبرم بناءً على اعتبارات تتعلق بشخصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والأربعون بعد الأربعمائة
  article_text_ar: لكل من المتعاقدين طلب فسخ عقد الإيجار إذا حدث عذر طارئ متعلق به، ويلزمه تعويض المتعاقد الآخر عما ينشأ عن هذا الفسخ من ضرر. إذا كان المؤجر هو الذي يطلب فسخ العقد فلا يجبر المستأجر على رد المأجور حتى يستوفي التعويض أو يحصل على ضمان كافٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد الأربعمائة
  article_text_ar: يصح إيجار الأرض للزراعة مع تعيين ما يزرع فيها أو أن يجعل المؤجر للمستأجر اختيار ما يزرع فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد الأربعمائة
  article_text_ar: لا يصح إيجار الأرض للزراعة إيجارًا منجزًا وهي مشغولة بزرع لغير المستأجر لم يبلغ حصاده وكان مزروعًا بحق، فإن كان الزرع بلغ حصاده أو كان مزروعًا بغير حق صح إيجار الأرض ولزم صاحب الزرع إزالته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد الأربعمائة
  article_text_ar: يصح إيجار الأرض المشغولة بالزرع إيجارًا مضافًا إلى أجل تكون الأرض فيه خالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والأربعون بعد الأربعمائة
  article_text_ar: إذا استأجر شخص الأرض للزراعة شمل الإيجار ملحقاتها، وما اتصل بها اتصال قرار، وما جرى العرف على أنه من توابعها، ولا يشمل ذلك الأدوات والآلات الزراعية، ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والأربعون بعد الأربعمائة
  article_text_ar: من استأجر أرضًا على أن يزرعها دون الاتفاق على جنس المزروع ونوعه؛ فله أن يزرعها في جميع فصول السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والأربعون بعد الأربعمائة
  article_text_ar: إذا انقضت مدة إيجار الأرض للزراعة قبل أن يبلغ الزرع حصاده لسبب لا يد للمستأجر فيه، فله أن يُبقيه بأجرة المثل حتى يتم حصاده، ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والأربعون بعد الأربعمائة
  article_text_ar: يلتزم المؤجر بالإصلاحات التي يتوقف عليها تمكن المستأجر من استغلال الأرض. يلتزم المستأجر بالصيانة التي يقتضيها استغلال الأرض بما في ذلك صيانة الآبار، والسواقي، والمصارف، والطرق، وإذا شمل العقد إيجار الأدوات والآلات الزراعية؛ لزم المستأجر أن يستعملها ويتعهدها بالصيانة، وذلك وفقًا للمتعارف عليه. يجوز للمؤجر والمستأجر الاتفاق على خلاف أحكام الفقرتين (1) و(2) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسون بعد الأربعمائة
  article_text_ar: إذا هلك الزرع كله قبل حصاده بسبب قوةٍ قاهرةٍ فللمستأجر طلب إسقاط الأجرة. إذا هلك بعض الزرع بسبب قوةٍ قاهرةٍ وترتب على هلاكه نقصٌ كبيرٌ في ريع الأرض فللمستأجر طلب إنقاص الأجرة. ليس للمستأجر طلب إسقاط الأجرة أو إنقاصها إذا حصل له تعويضٌ يجبر ما أصابه من ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والخمسون بعد الأربعمائة
  article_text_ar: الإعارة عقد يمكِّن بمقتضاه المعيرُ المستعيرَ من الانتفاع بشيءٍ غير قابل للاستهلاك مدةً معينةً أو لغرضٍ معينٍ دون عوضٍ على أن يرده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والخمسون بعد الأربعمائة
  article_text_ar: لا تنعقد الإعارة إلا بقبض الشيء المـُعار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والخمسون بعد الأربعمائة
  article_text_ar: إذا عُيِّن للإعارة أجل أو غرض لم يلزم المستعير رد الشيء المعار قبل انقضاء الأجل أو المدة المعتادة للانتفاع به في مثل ذلك الغرض. إذا لم يُعيَّن للإعارة أجل أو غرض لزم المستعير رد الشيء المعار عند طلب المعير؛ ما لم يكن المستعير يتضرر بالرد فله حق استبقائه إلى أن يزول الضرر، فإن تجاوز المدة المعتادة للانتفاع بمثله لزمته أجرة المثل عن المدة الزائدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والخمسون بعد الأربعمائة
  article_text_ar: لا يضمن المعير استحقاق الشيء المعار ولا خلوه من العيوب، ولكنه مسؤولٌ عما يلحق المستعير من ضرر بسبب الاستحقاق أو العيب إذا تعمد إخفاء أي منهما أو ضمن خلو الشيء المعار منهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والخمسون بعد الأربعمائة
  article_text_ar: على المستعير أن يبذل في حفظ الشيء المعار العناية التي يبذلها في المحافظة على ماله دون أن ينزل عن عناية الشخص المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والخمسون بعد الأربعمائة
  article_text_ar: تكون نفقات الشيء المعار وصيانته المعتادة ونفقات رده على المستعير، وذلك كله ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والخمسون بعد الأربعمائة
  article_text_ar: إذا كانت الإعارة غير مقيدة بزمانٍ أو بمكانٍ أو بنوع من الانتفاع؛ فللمستعير أن ينتفع بالشيء المعار على الوجه المعتاد. إذا كانت الإعارة مقيدة بزمانٍ أو بمكانٍ التزم المستعير بهذا القيد، وليس له عند تعيين نوع الانتفاع أن يجاوز قدره المماثل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والخمسون بعد الأربعمائة
  article_text_ar: لا يجوز للمستعير أن يتصرف في الشيء المعار تصرفًا يرتب لأحدٍ حقًّا في عينه أو منفعته إلا بإذن المعير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والخمسون بعد الأربعمائة
  article_text_ar: ينتهي عقد الإعارة بموت المعير أو المستعير، ولا ينتقل إلى الورثة، ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستون بعد الأربعمائة
  article_text_ar: ينتهي عقد الإعارة بانقضاء الأجل المتفق عليه أو باستيفاء المنفعة محل الإعارة. إذا رد المستعير الشيء المعار قبل انقضاء مدة الإعارة؛ لزم المعير تسلمه؛ ما لم يترتب على ذلك ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والستون بعد الأربعمائة
  article_text_ar: المقاولة عقدٌ يلتزم بمقتضاه المقاول بصنع شيءٍ أو أداء عملٍ مقابل أجر دون أن يكون تابعًا لصاحب العمل ولا نائبًا عنه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والستون بعد الأربعمائة
  article_text_ar: يصح أن يكون التزام المقاول بتنفيذ العمل بمواد من عنده أو من صاحب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والستون بعد الأربعمائة
  article_text_ar: إذا اشترط صاحب العمل أن يقدم المقاول المواد كلها أو بعضها؛ كان المقاول مسؤولًا عن توفر الشروط والمواصفات المتفق عليها إن وجدت، وإلا التزم بأن تكون وافيةً بالغرض المقصود وفقًا للعرف. إذا كان صاحب العمل هو الذي قدم المواد؛ التزم المقاول بأن يبذل في المحافظة عليها عناية الشخص المعتاد وأن يراعي في عمله الأصول الفنية وأن يرد إلى صاحب العمل ما بقي منها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والستون بعد الأربعمائة
  article_text_ar: يتحمَّل المقاول نفقات ما يستلزمه إنجاز العمل من آلات وأدوات، ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والستون بعد الأربعمائة
  article_text_ar: يلتزم المقاول بإنجاز العمل وفقًا لشروط العقد وفي المدة المتفق عليها، فإن لم تكن هناك شروطٌ أو لم يُتفق على مدةٍ التزم بإنجازه وفقًا للأصول المتعارف عليها وفي المدة المعقولة التي تقتضيها طبيعة العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والستون بعد الأربعمائة
  article_text_ar: إذا أخل المقاول بشروط العقد أثناء سير العمل فلصاحب العمل إعذاره بالالتزام بها وتصحيح العمل خلال مدة معقولة يعينها له، فإذا انقضت هذه المدة دون تصحيح فلصاحب العمل أن يعهد إلى مقاول آخر بإنجاز العمل أو تصحيحه على نفقة المقاول الأول وفق أحكام المادة (السابعة والستين بعد المائة) من هذا النظام أو أن يطلب فسخ العقد. لصاحب العمل طلب فسخ العقد في الحال إذا استحال إصلاح الخلل أو تأخر المقاول في البدء بتنفيذ العمل أو في إنجازه تأخرًا لا يرجى معه أن يتمكن من إتمامه في المدة المتفق عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والستون بعد الأربعمائة
  article_text_ar: إذا هلك الشيء أو تلف بسبب لا يد للمقاول فيه قبل تسليمه لصاحب العمل؛ فليس للمقاول أن يطالب بالأجر المتفق عليه ولا بالنفقات التي تحملها؛ ما لم يكن صاحب العمل وقت الهلاك أو التلف مخلاًّ بالتزامه بتسلم العمل. إذا كانت المواد مقدمة من صاحب العمل وهلك الشيء أو تلف قبل تسليمه له بسبب لا يد للمقاول فيه؛ فليس لصاحب العمل أن يُطالب المقاول بقيمتها ما لم يكن المقاول وقت الهلاك أو التلف قد أُعذر لإخلاله بتسليم العمل، ولم يثبت أن الشيء كان ليهلك أو يتلف لو أنه قام بالتسليم من غير إخلال بالتزامه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والستون بعد الأربعمائة
  article_text_ar: إذا أتم المقاول العمل ووضعه تحت تصرف صاحب العمل لزمته المبادرة إلى تسلمه، فإن امتنع بغير سبب مشروع رغم إعلامه بذلك وهلك في يد المقاول أو تلف دون تعديه أو تقصيره؛ لم يلزم المقاول التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والستون بعد الأربعمائة
  article_text_ar: يلتزم صاحب العمل بالوفاء بالأجر عند تسلم العمل المتفق عليه، ما لم يتفق على خلاف ذلك. إذا كان العمل مكوَّنًا من عدة أجزاء، أو كان الأجر محدَّدًا على أساس الوحدة؛ التزم صاحب العمل بأن يفي للمقاول من الأجر بقدر ما أنجز من العمل بعد معاينته وقبوله، على أن يكون ما تم إنجازه متميزًا أو ذا أهمية بالنسبة إلى العمل في جملته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعون بعد الأربعمائة
  article_text_ar: إذا أُبرم عقد بمقتضى مقايسةٍ على أساس الوحدة وتبين أثناء العمل أن من الضروري لتنفيذ التصميم المتفق عليه مجاوزة المقايسة المقدرة مجاوزةً ظاهرةً؛ لزم المقاول أن يعلم في الحال صاحب العمل بذلك مبينًا مقدار ما يتوقعه من زيادة في الأجر، فإن لم يفعل سقط حقه في طلب ما جاوز به قيمة المقايسة من نفقات. إذا كانت المجاوزة التي يقتضيها تنفيذ التصميم جسيمةً؛ فلصاحب العمل أن يتحلل من العقد ويوقف التنفيذ، على أن يكون ذلك دون تأخر، مع إيفاء المقاول قيمة ما أنجزه من الأعمال مقدرةً وفقًا لشروط العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والسبعون بعد الأربعمائة
  article_text_ar: إذا تم عقد المقاولة بموجب تصميمٍ متفقٍ عليه مقابل أجرٍ إجماليٍّ فليس للمقاول أن يطالب بأيّ زيادةٍ في الأجر ولو ارتفعت أسعار المواد المستخدمة في العمل أو ارتفعت أجور العمال أو غيرها من النفقات. ليس للمقاول إذا حدث في التصميم تعديل أو إضافة أن يطالب بأي زيادة في الأجر إلا إذا كان ذلك راجعًا إلى خطأ صاحب العمل أو كان بإذنه واتفق مع المقاول على الزيادة في الأجر. إذا انهار التوازن العقدي بين التزامات كل من صاحب العمل والمقاول بسبب ظروف استثنائيةٍ عامَّةٍ لم يكن في الوسع توقعها وقت التعاقد وتداعى بذلك الأساس الذي قام عليه التقدير المالي لعقد المقاولة، فللمحكمة تبعًا للظروف بعد الموازنة بين مصلحة الطرفين أن تقضي بإعادة التوازن العقدي، بما في ذلك تمديد مدة التنفيذ أو زيادة الأجر أو إنقاصه، أو أن تقضي بفسخ العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والسبعون بعد الأربعمائة
  article_text_ar: إذا لم يعين في العقد أجر المقاول استحق أجر المثل عما عمل مع قيمة ما قدمه من المواد التي يتطلبها العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والسبعون بعد الأربعمائة
  article_text_ar: للمقاول أن يُسند تنفيذ العمل كله أو بعضه إلى مقاول من الباطن؛ ما لم تقتض النصوص النظامية أو الاتفاق أو طبيعة العمل خلاف ذلك أو كانت شخصية المقاول محل اعتبار. تبقى مسؤولية المقاول قائمة قِبَلَ صاحب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والسبعون بعد الأربعمائة
  article_text_ar: لا يجوز للمقاول من الباطن أن يطالب لنفسه صاحب العمل بشيءٍ مما يستحقه المقاول إلا إذا أحاله على صاحب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والسبعون بعد الأربعمائة
  article_text_ar: ينتهي عقد المقاولة بإنجاز العمل المتفق عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والسبعون بعد الأربعمائة
  article_text_ar: لكل من المتعاقدين طلب فسخ عقد المقاولة إذا حدث له عذر طارئ يتعلق بتنفيذ العقد، ويلزمه تعويض المتعاقد الآخر عما ينشأ عن هذا الفسخ من ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والسبعون بعد الأربعمائة
  article_text_ar: إذا بدأ المقاول في التنفيذ ثم أصبح عاجزًا عن إتمامه لسبب لا يد له فيه؛ فإنه يستحق قيمة ما تم من الأعمال، وما أنفق في العمل الذي لم يتم بقدر ما عاد على صاحب العمل من نفع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والسبعون بعد الأربعمائة
  article_text_ar: ينفسخ عقد المقاولة بموت المقاول إذا اشتُرط أن يعمل المقاول بنفسه أو كان العقد قد أبرم بناءً على اعتبارات تتعلق بشخصه. إذا خلا العقد من الشرط الوارد في الفقرة (1) من هذه المادة، ولم يكن شخص المقاول محل اعتبار في التعاقد؛ فلصاحب العمل طلب فسخ العقد إذا لم تتوفر في الورثة الضمانات الكافية لتنفيذ العمل. يستحق الورثة في الحالتين الواردتين في الفقرتين (1) و(2) من هذه المادة؛ قيمة ما تم من الأعمال وما أنفق في العمل الذي لم يتم بقدر ما عاد على صاحب العمل من نفع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والسبعون بعد الأربعمائة
  article_text_ar: تسري على عقد العمل النصوص النظامية الخاصة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثمانون بعد الأربعمائة
  article_text_ar: الوكالة عقد يقيم بمقتضاه الموكل الوكيل مقام نفسه في تصرُّفٍ نظاميٍّ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثمانون بعد الأربعمائة
  article_text_ar: يصح أن تكون الوكالة مطلقةً أو مقيدةً أو معلقةً على شرط أو مضافةً إلى أجل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثمانون بعد الأربعمائة
  article_text_ar: لا تصح الوكالة بألفاظ عامة لا تخصيص فيها لنوع التصرف النظامي محل الوكالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثمانون بعد الأربعمائة
  article_text_ar: تصح الوكالة الخاصة في نوع معين من أنواع التصرفات النظامية ولو لم يعين محل هذا التصرف إلا إذا كان التصرف من التبرعات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثمانون بعد الأربعمائة
  article_text_ar: كل عمل ليس من أعمال الإدارة يجب أن تكون الوكالة فيه خاصة تُعيِّن نوع العمل وما تستلزمه الوكالة فيه من تصرفات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثمانون بعد الأربعمائة
  article_text_ar: تعد الإجازة اللاحقة للتصرف في حكم الوكالة السابقة له.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثمانون بعد الأربعمائة
  article_text_ar: يثبت للوكيل بمقتضى عقد الوكالة حق التصرف فيما يتناوله التوكيل وما يقتضيه من توابع ضرورية وفقًا لطبيعة التصرف ولما انصرفت إليه إرادة المتعاقدين وما جرى عليه العرف. يعد المال الذي تسلَّمَه الوكيل لحساب موكله وديعة. لا يعد تصرف الوكيل بما هو أنفع للموكل تجاوزًا لحدود الوكالة؛ ما لم يكن للموكل غرضٌ في تحديد الوكالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثمانون بعد الأربعمائة
  article_text_ar: إذا كانت الوكالة بلا أجر التزم الوكيل بأن يبذل في تنفيذها العناية التي يبذلها في أعماله الخاصة دون أن يكلف في ذلك أزيد من عناية الشخص المعتاد. إذا كانت الوكالة بأجر التزم الوكيل بأن يبذل في تنفيذها عناية الشخص المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثمانون بعد الأربعمائة
  article_text_ar: إذا تعدد الوكلاء، وكان لكل منهم عقد مستقل؛ فإن له الانفراد فيما وكل فيه إلا أن يشترط عليهم الموكل عدم الانفراد. إذا تعدد الوكلاء، وعينوا جميعًا في عقد واحد دون أن يأذن الموكل في انفراد أي منهم بالتصرف؛ كان عليهم أن يعملوا مجتمعين. إذا تعدد الوكلاء، كانوا مسؤولين بالتضامن متى كانت الوكالة غير قابلة للانقسام، أو كان الضرر الذي أصاب الموكل نتيجة خطأ مشترك، ولا يكون الوكلاء ولو كانوا متضامنين مسؤولين عما فعله أحدهم مجاوزًا حدود الوكالة أو متعسفًا في تنفيذها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثمانون بعد الأربعمائة
  article_text_ar: لا يجوز للوكيل أن يوكل غيره فيما وكل فيه أو في بعضه إلا إذا كان مأذونًا له بذلك من قبل الموكل، ويعد الوكيل الثاني وكيلًا عن الموكل الأصلي. الوكيل المأذون له بتوكيل الغير دون تعيين لشخصه لا يكون مسؤولًا تجاه موكله إلا عن خطئه في اختياره للوكيل أو فيما أصدره من تعليمات كانت سببًا في الضرر. لكل من الموكل ووكيله أن يعزل الوكيل الثاني الذي عينه الوكيل، ويترتب على عزل الوكيل الأول انعزال الوكيل الثاني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التسعون بعد الأربعمائة
  article_text_ar: ليس للوكيل الذي وكل في شراء شيء دون بيان ثمنه أن يشتريه بأكثر من ثمن المثل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والتسعون بعد الأربعمائة
  article_text_ar: لا يجوز لمن وكل في شراء شيء معين بالذات أن يشتريه لنفسه، ويكون الشراء للموكل ولو صرح الوكيل بأنه يشتريه لنفسه. لا يجوز للوكيل في الشراء أن يكون شراؤه من ماله أو من مال أصوله أو فروعه أو زوجه أو ممن كان التصرف معه يجر مغنمًا أو يدفع مغرمًا إلا بإذن موكله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والتسعون بعد الأربعمائة
  article_text_ar: إذا اشترى الوكيل بغبن أو عين الموكل الثمن واشترى الوكيل بما يزيد عليه؛ انصرف العقد إذا لم يُجزه الموكل إلى الوكيل، وإذا أجازه الموكل نفذ في حقه وله مطالبة الوكيل بالتعويض. إذا صرح الوكيل بأنه اشترى الشيء لنفسه في حضور الموكل كان الشراء للوكيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والتسعون بعد الأربعمائة
  article_text_ar: إذا دفع الوكيل في الشراء ثمن المبيع من ماله فله الرجوع به على موكله مع ما أنفقه في سبيل تنفيذ الوكالة بالقدر المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والتسعون بعد الأربعمائة
  article_text_ar: إذا عين الموكل للوكيل في البيع ثمن المبيع فليس له أن يبيع بما يقل عنه، وإن لم يعين الثمن فليس له أن يبيع بأقل من ثمن المثل. إذا باع الوكيل بنقص دون إذن الموكل لم ينفذ البيع في حق الموكل، وليس له أن يحتج بعدم نفاذ البيع تجاه المشتري حسن النية. وإذا أجاز الموكل البيع نفذ في حقه، وله مطالبة الوكيل بالتعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والتسعون بعد الأربعمائة
  article_text_ar: لا يجوز للوكيل في البيع أن يشتري لنفسه ما وكل في بيعه إلا بإذن موكله. لا يجوز للوكيل في البيع أن يبيع إلى أصوله أو فروعه أو زوجه أو إلى من كان التصرف معه يجر مغنمًا أو يدفع مغرمًا إلا بإذن موكله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والتسعون بعد الأربعمائة
  article_text_ar: ليس للوكيل في البيع أن يبيع مال موكله بثمن مؤجل إلا بإذن صريح أو ضمني. إذا باع الوكيل مؤجَّلًا فله أن يأخذ رهنًا أو كفيلًا على المشتري بما باعه مؤجَّلًا وإن لم يفوضه الموكل في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والتسعون بعد الأربعمائة
  article_text_ar: على الوكيل أن يزود موكله بالمعلومات الضرورية عما وصل إليه في تنفيذ الوكالة، وأن يقدم له حسابًا عنها؛ ما لم يقتض الاتفاق أو طبيعة المعاملة خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والتسعون بعد الأربعمائة
  article_text_ar: على الموكل أداء الأجر المتفق عليه للوكيل متى أنجز العمل، فإن لم يتفقا على دفع أجر وكان الوكيل ممن يعمل بأجر على سبيل الاعتياد فله أجر المثل؛ وإلا كان متبرعًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والتسعون بعد الأربعمائة
  article_text_ar: يلتزم الموكل بأن يرد للوكيل ما أنفقه في سبيل تنفيذ الوكالة التنفيذ المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسمائة
  article_text_ar: يلتزم الموكل بكل ما ترتب في ذمة الوكيل بسبب تنفيذ الوكالة تنفيذًا معتادًا. يكون الموكل مسؤولًا عما يصيب الوكيل من ضرر بسبب تنفيذ الوكالة تنفيذًا معتادًا ما لم يكن الضرر ناشئًا عن خطئه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأولى بعد الخمسمائة
  article_text_ar: تسري أحكام النيابة في التعاقد -المنصوص عليها في هذا النظام- على علاقة الموكل والوكيل بالغير الذي يتعامل مع الوكيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية بعد الخمسمائة
  article_text_ar: ينتهي عقد الوكالة بإنجاز العمل الموكل فيه، أو بانقضاء الأجل المعين للوكالة، أو بموت الموكّل أو الوكيل، أو بفقد أحدهما أهليته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة بعد الخمسمائة
  article_text_ar: للموكل أن يعزل وكيله أو يقيد وكالته متى أراد إلا إذا كانت صادرة لصالح الوكيل أو لصالح الغير فإنه لا يجوز للموكل أن يعزله أو يقيد الوكالة دون موافقة من صدرت لصالحه، وفي جميع الأحوال على الموكل إعلام الوكيل بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة بعد الخمسمائة
  article_text_ar: إذا كانت الوكالة بأجر وعزل الموكل وكيله في وقت غير مناسب أو بغير مسوغ مقبول، لزمه تعويض الوكيل عن الضرر الذي يلحقه بسبب ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة بعد الخمسمائة
  article_text_ar: للوكيل أن يتخلى عن الوكالة إذا لم تتعلق بها مصلحة للغير بشرط إعلام موكله بتخليه عنها. إذا تعلقت بالوكالة مصلحة للغير فلا يجوز للوكيل أن يتخلى عن الوكالة إلا إذا وجدت أسباب جدية تسوغ ذلك، على أن يعلم الغير بذلك ويمهله وقتًا كافيًا ليتخذ ما يراه مناسبًا لرعاية مصلحته. يلتزم الوكيل في جميع الأحوال بمتابعة القيام بالأعمال التي بدأها حتى يبلغ مرحلة لا يخشى معها ضرر على الموكل، وإلا لزمه التعويض عن الضرر. إذا كانت الوكالة بأجر وتخلّى الوكيل عن الوكالة في وقت غير مناسب أو بغير مسوغ مقبول، لزمه تعويض الموكل عن الضرر الذي يلحقه بسبب ذلك، ولو كان تخلّي الوكيل عن عمل لم يشرع فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة بعد الخمسمائة
  article_text_ar: الإيداع عقد يحفظ بمقتضاه المودع لديه مال المودع على أن يرده بعينه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة بعد الخمسمائة
  article_text_ar: ليس للمودع لديه أجر على حفظ الوديعة؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة بعد الخمسمائة
  article_text_ar: إذا كان الإيداع بلا أجرٍ فلا ينعقد إلا بالقبض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة بعد الخمسمائة
  article_text_ar: يلتزم المودع لديه بأن يبذل في حفظ الوديعة العناية التي يبذلها في حفظ ماله الخاص دون أن يكلف في ذلك أزيد من عناية الشخص المعتاد، فإن كان الإيداع بأجر فعليه أن يبذل في حفظها عناية الشخص المعتاد. للمودع لديه أن يحفظ الوديعة بنفسه أو بمن يأتمنه على حفظ ماله ممن يعولهم؛ ما لم يكن الإيداع بأجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة بعد الخمسمائة
  article_text_ar: ليس للمودع لديه أن يودع الوديعة لدى الغير دون إذن المودع إلا إذا كان مضطرًّا، وعليه استعادتها بعد زوال السبب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة بعد الخمسمائة
  article_text_ar: لا يجوز للمودع لديه أن يستعمل الوديعة أو يرتب عليها حقًّا للغير دون إذن المودع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة بعد الخمسمائة
  article_text_ar: إذا كان الإيداع بأجر فعلى المودع أن يؤدي الأجر المتفق عليه في الوقت الذي انتهى فيه حفظ الوديعة، ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد الخمسمائة
  article_text_ar: يلتزم المودع بأن يؤدي إلى المودع لديه ما أنفقه من نفقة يقتضيها حفظ الوديعة، ما لم يتفق على خلاف ذلك. إذا كان المودع غائبًا جاز للمودع لديه أن يرفع الأمر إلى المحكمة لتأمر في الوديعة بما تراه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد الخمسمائة
  article_text_ar: يلتزم المودع بدفع نفقات رد الوديعة وتسليمها، وكذلك تعويض المودع لديه عن أيّ ضرر لحقه بسبب الوديعة ما لم يكن ناشئًا عن تعديه أو تقصيره، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد الخمسمائة
  article_text_ar: إذا كان الإيداع بلا أجر فللمودع لديه رد الوديعة وللمودع استردادها في أي وقت؛ على ألا يكون في وقت غير مناسب. إذا كان الإيداع بأجر فليس للمودع لديه رد الوديعة قبل حلول الأجل، وللمودع استردادها في أي وقت إذا دفع الأجر المتفق عليه كاملًا ولم يوجد شرط يحول دون ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة بعد الخمسمائة
  article_text_ar: ينتهي عقد الإيداع بانقضاء الأجل المتفق عليه، أو برد الوديعة رضاءً أو قضاءً، أو بموت المودع لديه؛ ما لم يُتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة بعد الخمسمائة
  article_text_ar: الحراسة عقدٌ يتولى بمقتضاه الحارس حفظ مالٍ متنازع فيه وإدارته ورده مع غلته إلى من يثبت له الحق فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد الخمسمائة
  article_text_ar: يعين الحارس باتفاق ذوي الشأن على تعيينه، فإن لم يتفقوا فللمحكمة تعيينه إذا رأت أن في بقاء المال في يد حائزه خطرًا عاجلًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد الخمسمائة
  article_text_ar: إذا اتفق ذوو الشأن على تسليم المال لحارسين أو أكثر فلا يجوز لأحدهم الانفراد بحفظ المال أو إدارته أو التصرف في الغلة دون إذن الباقين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العشرون بعد الخمسمائة
  article_text_ar: يحدد عقد الحراسة أو الحكم الصادر بها التزامات الحارس وحقوقه، وإلا فتطبق في ذلك الأحكام المنصوص عليها في هذا الفصل وأحكام الوديعة والوكالة بحسب الأحوال بالقدر الذي لا يتعارض مع طبيعة الحراسة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد الخمسمائة
  article_text_ar: يلتزم الحارس بأن يبذل في حفظ الأموال المعهودة إليه حراستها وفي إدارتها عناية الشخص المعتاد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد الخمسمائة
  article_text_ar: لا يجوز للحارس في غير أعمال الحفظ والإدارة أن يتصرف في الأموال المعهودة إليه حراستها إلا برضى ذوي الشأن، أو بإذن من المحكمة أو دون إذنها في حال الاستعجال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد الخمسمائة
  article_text_ar: يلتزم الحارس بأن يقدم لذوي الشأن المعلومات التي تتعلق بتنفيذ مهمته، وأن يقدم حسابًا عنها في المواعيد وبالطريقة التي يتفق عليها الطرفان أو تأمر بها المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد الخمسمائة
  article_text_ar: للحارس أن يسترد المبالغ التي أنفقها في أداء عمله بالقدر المتعارف عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد الخمسمائة
  article_text_ar: يستحق الحارس الأجر المتفق عليه بأداء العمل فإن لم يُتفق على دفع أجرٍ كان له أجر المثل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد الخمسمائة
  article_text_ar: إذا كان الحارس متبرعًا فله أن يتخلى عن مهمته متى أراد، على أن يبلغ ذوي الشأن وأن يتابع القيام بالأعمال التي بدأها حتى يبلغ مرحلة لا يُلحق التخلي عنها ضررًا بذوي الشأن، وإلا لزمه التعويض. إذا كان الحارس يعمل بأجر فإنه يلتزم بالتعويض عن أي ضرر ينشأ عن تخليه عن الحراسة في وقتٍ غير مناسب أو بغير مسوغ مقبول، ولو كان تخليه عن عمل لم يشرع فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد الخمسمائة
  article_text_ar: تنتهي الحراسة باتفاق ذوي الشأن، أو بحكم المحكمة، أو بانتهاء مدتها إن كانت محددة المدة. على الحارس عند انتهاء الحراسة أن يرد المال مع غلته إلى من يتفق عليه ذوو الشأن أو من تعينه المحكمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد الخمسمائة
  article_text_ar: يجب أن تكون عقود المشاركة الواردة في هذا الباب مكتوبة، وإلا كانت باطلة، ولا يجوز أن يحتج المتعاقد بالبطلان تجاه الغير، ولا يكون للبطلان أثر فيما بين المتعاقدين أنفسهم إلا إذا طلب أحدهم الحكم به، فيسري ذلك من تاريخ قيد الدعوى. يسري حكم الفقرة (1) من هذه المادة على أي تعديل يطرأ على عقود المشاركة الواردة في هذا الباب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد الخمسمائة
  article_text_ar: الشركة عقد يسهم بمقتضاه شريكان أو أكثر بتقديم حصة من مال أو عمل أو منهما معًا في مشروع لاقتسام ما ينشأ عنه من ربح أو خسارة. لا تسري أحكام هذا الفصل على الشركات المقررة أحكامها في نصوص نظامية خاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثون بعد الخمسمائة
  article_text_ar: لا يصح أن تكون الحصة أو بعضها ما للشريك من نفوذ أو سمعة أو ثقة مالية. إذا كانت حصة الشريك غير نقدية، قُدرت الحصة بقيمتها عند التعاقد أو بما يتفق عليه الشركاء من أسس صالحة لتقديرها. إذا كانت حصة الشريك دينًا لدى الغير، لم ينقض التزام الشريك بتقديم الحصة إلا بعد تحصيله الدين وتسليمه للشركاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد الخمسمائة
  article_text_ar: يصح أن تقوم الشركة على أساس تضامن الشركاء فيما يلتزمون به في ذممهم من مال أو عملٍ لمصلحة الشركة، وتكون حصة كل منهم في رأس مال الشركة بقدر ما التزم به في ذمته؛ ما لم يتفق على خلاف ذلك. يصح أن يتفاوت الشركاء فيما يلتزمون به في ذممهم من مالٍ أو عملٍ، أو أن تكون الآلات والأدوات اللازمة للعمل من بعضهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد الخمسمائة
  article_text_ar: تتحدد حصة كل شريك بالحصة التي التزم بها في عقد الشركة، ولا يجوز للشريك زيادة حصته عن الحصة المحددة في عقد الشركة إلا بموافقة باقي الشركاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد الخمسمائة
  article_text_ar: إذا كانت حصة الشريك حق ملكية أو أي حق عينيّ آخر فإن أحكام البيع هي التي تسري على ضمان الحصة إذا هلكت أو استحقت أو ظهر فيها عيب، وإذا كانت الحصة مجرد الانتفاع بالمال فإن أحكام الإيجار هي التي تسري في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد الخمسمائة
  article_text_ar: تكون قسمة الأرباح بين الشركاء بنسبة حصة كل شريك في الشركة، ما لم يتفق على خلاف ذلك. توزع الخسائر بين الشركاء بنسبة حصة كل منهم في الشركة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد الخمسمائة
  article_text_ar: لا يصح اشتراط أن يكون نصيب الشريك من الربح مبلغًا محدَّدًا، أو أنه لا يستفيد من الربح أو يُعفى من الخسارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد الخمسمائة
  article_text_ar: للشركاء الاتفاق على طريقة توزيع الأرباح ومواعيد استحقاقها، على أن يكون التوزيع بعد سلامة رأس المال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد الخمسمائة
  article_text_ar: للشركاء أن يعينوا منهم أو من غيرهم من يدير أموال الشركة ويتصرف فيها نيابة عنهم. إذا لم يعين الشركاء من يدير أموال الشركة فيعد كل شريك وكيلًا عن باقي الشركاء في إدارة أموال الشركة والتصرف فيها بما يحقق الغرض الذي أنشئت من أجله دون الرجوع إلى باقي الشركاء؛ على أن يكون لأي منهم حق الاعتراض على أي عمل قبل تمامه؛ ولأغلبية الشركاء باعتبار قيمة الحصص الحق في رفض هذا الاعتراض؛ وذلك كله ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد الخمسمائة
  article_text_ar: لكل شريك أو من يفوضه الاطلاع على دفاتر الشركة ومستنداتها، ويقع باطلًا كل اتفاق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد الخمسمائة
  article_text_ar: يلتزم من يدير الشركة أو يتصرف في أموالها نيابة عن الشركاء ببذل العناية التي يبذلها في أعماله الخاصة، إلا إن كان يتقاضى عن عمله أجرًا أو حصة من الربح فليس له أن ينزل في ذلك عن عناية الشخص المعتاد. ليس لمن يدير الشركة أو يتصرف نيابة عن الشركاء أن يتصرف تصرفًا يلحق الضرر بالشركة أو يخالف الصلاحيات المخولة له أو الغرض الذي أنشئت من أجله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعون بعد الخمسمائة
  article_text_ar: لا يجوز لمن يتولى إدارة الشركة أو يتصرف في أموالها نيابة عن الشركاء هبة شيء من مال الشركة ولا إقراضه؛ ما لم يكن مأذونًا له بذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد الخمسمائة
  article_text_ar: ليس للشريك أن يحتجز لنفسه شيئًا من أموال الشركة ولا أن يستخدمه لنفسه وإلا كان ملزمًا بتعويض الشركاء عن أي ضرر ينشأ بسبب ذلك. إذا دفع الشريك للشركة من ماله أو أنفق في مصلحتها نفقات نافعة اقتضاها الاستعجال فله الحق في استرداد ما دفع أو أنفق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والأربعون بعد الخمسمائة
  article_text_ar: للدائن الشخصي للشريك أن يطلب استيفاء حقه من نصيب الشريك المدين من الأرباح القابلة للتوزيع أو من نصيبه في مال الشركة بعد التصفية، وللدائن طلب بيع ما يلزم من حصص ذلك الشريك إن أمكن بيعها دون ضرر على باقي الشركاء ليستوفي حقه من حصيلة بيعها، على أن تكون لباقي الشركاء الأولوية في شراء تلك الحصص.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد الخمسمائة
  article_text_ar: مع مراعاة أحكام المادة (الحادية والتسعين) من هذا النظام، إذا ترتب على أعمال الشركة دين متصل بأغراضها ولم تفِ به أموالها؛ لزم الشركاء في أموالهم الخاصة ما بقي من الدين بمقدار حصة كل منهم في الشركة. لا يقتضي عقد الشركة تضامن الشركاء ما لم يتفقوا على ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد الخمسمائة
  article_text_ar: ينتهي عقد الشركة بانقضاء الغرض الذي أنشئت من أجله أو بانقضاء مدته، ويجوز باتفاق الشركاء مد أجله قبل انقضاء المدة. إذا انقضت المدة المعينة للشركة أو انتهى الغرض الذي أنشئت من أجله ثم استمر الشركاء في عمل من نوع الأعمال التي أنشئت لها الشركة، كان ذلك تجديدًا لعقد الشركة بشروطه الأولى عدا ما يتعلق منها بتعيين مدة الشركة، وتسري عليها أحكام الشركة غير معينة المدة. لدائن أحد الشركاء أن يعترض على تجديد عقد الشركة، ويترتب على اعتراضه عدم نفاذ تجديد العقد في حقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد الخمسمائة
  article_text_ar: إذا كانت مدة الشركة غير معينة جاز للشريك أن ينسحب منها في أي وقت على أن يعلم جميع الشركاء -كتابة- بإرادته الانسحاب قبل حصوله بمدة معقولة، وألا يكون انسحابه عن غش أو في وقت غير مناسب. إذا كانت مدة الشركة معينة؛ فليس للشريك أن ينسحب منها قبل انقضاء المدة، وللمحكمة إخراجه منها إذا طلب ذلك وتقدم بأسباب مقبولة، على أن يعوض الشركاء عن أي ضرر يلحقهم بسبب ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والأربعون بعد الخمسمائة
  article_text_ar: للشركاء الاتفاق في عقد الشركة على كيفية إخراج أي من الشركاء منها وإجراءات ذلك. لأيٍّ من الشركاء أن يطلب من المحكمة إخراج شريك أو أكثر من الشركة إذا كانت هناك أسباب مقبولة تدعو إلى ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والأربعون بعد الخمسمائة
  article_text_ar: ينتهي عقد الشركة بموت أحد الشركاء أو الحجر عليه أو إعساره أو افتتاح إجراء التصفية له أو انسحابه. يجوز الاتفاق على أنه إذا مات أحد الشركاء تستمر الشركة مع ورثته ولو كان فيهم عديم الأهلية أو ناقصها. يجوز الاتفاق على أنه إذا مات أحد الشركاء أو حجر عليه أو أعسر أو افتتحت إجراءات التصفية له أو انسحب؛ تستمر الشركة بين باقي الشركاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والأربعون بعد الخمسمائة
  article_text_ar: إذا انتهت الشركة في حق أحد الشركاء واستمرت بين الباقين، قُدِّر نصيب الشريك الذي انتهت الشركة في حقه بحسب قيمته وقت حصول السبب الذي أدى إلى انتهاء الشركة في حقه، ويُدفع له أو لورثته نقدًا، ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والأربعون بعد الخمسمائة
  article_text_ar: تُصفّى أموال الشركة وتقسم وفق الإجراءات التي اتفق عليها الشركاء. إذا لم يتفق الشركاء على إجراءات التصفية جاز لكل من له مصلحة أن يطلب من المحكمة إجراء التصفية والقسمة، وللمحكمة تحديد إجراءات التصفية مراعية في ذلك طبيعة الأموال محل التصفية، ولها عند الاقتضاء تعيين مصفٍّ. تتبع في قسمة أموال الشركة القواعد المتعلقة بقسمة المال الشائع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسون بعد الخمسمائة
  article_text_ar: المضاربة عقد يسلم رب المال بمقتضاه مالًا لمن يعمل فيه بجزء شائع من الربح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والخمسون بعد الخمسمائة
  article_text_ar: يصح أن يكون رأس مال المضاربة الدين الذي لرب المال في ذمة المضارب. إذا كان ما قدمه رب المال للمضاربة مالًا من غير النقد فيكون رأس المال قيمة ما قدمه عند التعاقد أو بما يتفق عليه المتعاقدان من أسس صالحة لتقييمه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والخمسون بعد الخمسمائة
  article_text_ar: يلتزم رب المال بتسليم مال المضاربة للمضارب وتمكينه من إدارته والتصرف فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والخمسون بعد الخمسمائة
  article_text_ar: يثبت للمضارب بعد تسليم رأس المال إليه حق الإدارة والتصرف فيه وفق أحكام المواد (التاسعة والثلاثين بعد الخمسمائة) و(الأربعين بعد الخمسمائة) و(الحادية والأربعين بعد الخمسمائة) من هذا النظام، مع مراعاة ما يقتضيه عقد المضاربة بينه وبين رب المال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والخمسون بعد الخمسمائة
  article_text_ar: على المضارب أن يزود رب المال بالمعلومات المتعلقة بأعمال المضاربة وأن يقدم له حسابًا عنها عند انتهاء مدتها، وإذا كان العقد غير معين المدة وجب تقديم هذه المعلومات في نهاية كل سنة، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والخمسون بعد الخمسمائة
  article_text_ar: إذا كان عقد المضاربة مقيدًا بزمان أو مكان أو نوع من العمل أو غير ذلك؛ لزم المضارب ما قُيّد به العقد. إذا كان عقد المضاربة مطلقًا كان المضارب مأذونًا له في العمل وفقًا لما جرى عليه العرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والخمسون بعد الخمسمائة
  article_text_ar: لا يجوز للمضارب أن يخلط مال المضاربة بماله ولا أن يسلمه للغير مضاربة، إلا إذا جرى العرف بذلك أو كان رب المال قد فوضه العمل بما يراه. في الأحوال التي يجوز فيها للمضارب خلط مال المضاربة بماله؛ يحسب ربح كل مال بقدر نسبته من المال المختلط، ويوزع النصيب المستحق لمال المضاربة بين المتعاقدين وفق أحكام هذا الفصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والخمسون بعد الخمسمائة
  article_text_ar: يتحمل رب المال وحده نقص رأس المال، ويقع باطلًا كل شرط يقضي بخلاف ذلك. إذا نقص رأس المال في يد المضارب من غير تعد ولا تقصير منه فلا يلزمه تعويض رب المال عن النقص. إذا وقع من المضارب تعد أو تقصير لزمه تعويض رب المال عن نقص رأس المال وعن كل ما يترتب على ذلك من ضرر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والخمسون بعد الخمسمائة
  article_text_ar: يتحدد نصيب كل من المتعاقدين من الربح بحسب الاتفاق. إذا لم يوجد اتفاق على تحديد نصيب كل من المتعاقدين من الربح؛ تحدد بحسب العرف، وللمتعاقد في هذه الحال إنهاء عقد المضاربة وفقًا للفقرة (1) من المادة (الثانية والستين بعد الخمسمائة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والخمسون بعد الخمسمائة
  article_text_ar: لا يصح في عقد المضاربة اشتراط مبلغ محدد من الربح لأحد المتعاقدين. يصح الاتفاق على أن يكون الربح مقاسمة بين المتعاقدين وما زاد منه على حد معين ينفرد به أحدهما، أو الاتفاق على أن يتغير نصيب كل منهما من الربح بحسب ما يتحقق للمضاربة من ربح وفق أسس صالحة لتحديده. يصح الاتفاق على أن يكون لأحد المتعاقدين أجر معلوم مقابل عمل معين مع استحقاقه نصيبه من الربح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستون بعد الخمسمائة
  article_text_ar: يستحق المتعاقد نصيبه من الربح عند انتهاء المضاربة، ما لم يوجد اتفاق على تقييم المضاربة وتعيين ما يستحقه كل من المتعاقدين في مواعيد محددة مع استمرار المضاربة، ويفترض أن ما يُوزَّع في أثناء المضاربة من الربح. ليس للمتعاقد أن يأخذ نصيبه من الربح قبل استحقاقه دون موافقة الآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والستون بعد الخمسمائة
  article_text_ar: ينتهي عقد المضاربة بانقضاء الأجل إذا كان العقد معين المدة، أو بانتهاء العمل الذي عقدت المضاربة من أجله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والستون بعد الخمسمائة
  article_text_ar: إذا كان عقد المضاربة غير معين المدة؛ جاز للمتعاقد أن ينسحب منه في أي وقت على أن يعلم المتعاقد الآخر بإرادته الانسحاب قبل حصوله بمدة معقولة وألا يكون الانسحاب عن غش أو في وقت غير مناسب. إذا كان عقد المضاربة معين المدة؛ فليس للمتعاقد أن ينسحب منه قبل انقضاء المدة، وله أن يطلب ذلك من المحكمة إذا تقدم بأسباب مقبولة، على أن يعوض المتعاقد الآخر عن أي ضرر يلحقه بسبب ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والستون بعد الخمسمائة
  article_text_ar: يلزم المضارب إذا انتهى عقد المضاربة أن يصل بالأعمال التي بدأها إلى حالٍ لا تتعرض معها أموال المضاربة أو أرباحها للتلف أو النقص. لا يجوز للمضارب بعد انتهاء عقد المضاربة أن يتصرف في أموالها، وإذا كانت من غير النقد لزم المضارب تحويلها إلى نقد، إلا إذا اقتضى الاتفاق أو طبيعة المعاملة خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والستون بعد الخمسمائة
  article_text_ar: يلتزم المضارب عند انتهاء عقد المضاربة بأن يرد إلى رب المال نصيبه من مال المضاربة. إذا تأخر المضارب في الرد دون مسوغٍ مقبول فنقص المال كانت تبعة ذلك عليه، وإن ربح فلرب المال التعويض عما يتحقق لماله من ربح إلى حين رده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والستون بعد الخمسمائة
  article_text_ar: ينتهي عقد المضاربة بموت أحد المتعاقدين أو الحجر عليه أو إعساره أو افتتاح إجراء التصفية له. إذا انتهى عقد المضاربة بموت المضارب وجب على ورثته -إذا توفرت فيهم الأهلية- أو نائبهم وكانوا على علم بالمضاربة أن يبادروا بإعلام رب المال بموت مورثهم، وأن يتخذوا من التدابير ما تقتضيه الحال للمحافظة على المال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والستون بعد الخمسمائة
  article_text_ar: المشاركة في الناتج عقد يسلم رب المال بمقتضاه شيئًا غير قابل للاستهلاك لمن يستغله مقابل جزء شائع من الناتج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والستون بعد الخمسمائة
  article_text_ar: يلزم رب المال تمكين العامل من العمل وفق المتفق عليه، ويلزم العامل بذل عناية الشخص المعتاد في العمل والمحافظة على المال. تكون نفقات حفظ الأصل على رب المال، ونفقات استغلاله على العامل؛ وذلك كله ما لم يُتفق على خلافه. للعامل أن يستأجر على نفقته أجراء ليستعين بهم على القيام بكل الأعمال أو بعضها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والستون بعد الخمسمائة
  article_text_ar: يستحق كل متعاقد نصيبه من الناتج بتحققه، ويجوز الاتفاق على طريقة حساب الناتج ومواعيد استحقاقه. إذا انتهى عقد المشاركة في الناتج رُدّ إلى رب المال الأصل الذي قدمه، ورُدّت إلى العامل الزيادات المنفصلة التي أنفقها ولم تدخل في الناتج، وما أنفقه من نفقات متصلة نافعة ما لم يكن فصلها يضر الأصل، فلرب المال في هذه الحال تملكها بقيمة ما أنفقه العامل أو بمقدار ما زاد في قيمة الأصل؛ وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والستون بعد الخمسمائة
  article_text_ar: إذا أبطل عقد المشاركة في الناتج، فالناتج لرب المال وللعامل أجر مثل عمله ما لم تكن المواد التي تولد منها الناتج من العامل فيكون الناتج له، ولرب المال أجرة المثل عن مدة استغلال الأصل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعون بعد الخمسمائة
  article_text_ar: ينتهي عقد المشاركة في الناتج بانقضاء الأجل، أو بإنجاز العمل. ينتهي عقد المشاركة في الناتج بموت العامل إن كان مقصودًا لشخصه في العقد، أو إذا اختار الورثة عدم إتمام العمل، ولرب المال طلب فسخ العقد إذا لم تتوفر في الورثة الضمانات الكافية لحسن تنفيذ العمل. لا ينتهي عقد المشاركة في الناتج بموت رب المال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والسبعون بعد الخمسمائة
  article_text_ar: المشاركة الزراعية عقد تسلم بمقتضاه أرض أو شجر لمن يعمل عليها مزارعة أو مساقاة مقابل جزءٍ شائع من الناتج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والسبعون بعد الخمسمائة
  article_text_ar: يصح في عقد المشاركة الزراعية أن يكون البذر أو الغراس من رب المال أو من العامل أو منهما جميعًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والسبعون بعد الخمسمائة
  article_text_ar: لا يصح اشتراط أن يكون نصيب أحد المتعاقدين مقدارًا غير شائع من الناتج أو ناتج موضع معين من الأرض أو الشجر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والسبعون بعد الخمسمائة
  article_text_ar: إذا لم تُعين مدة عقد المشاركة الزراعية أو عُيِّنت مدة لا تحتمل بلوغ الحصاد أو الجذاذ؛ تعيَّنت مدة العقد بدورة زراعية واحدة في المزارعة، وبمدة تحتمل حصول أول ناتج في المساقاة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والسبعون بعد الخمسمائة
  article_text_ar: إذا امتنع العامل عن إتمام العمل جاز لرب المال -بعد إعذاره العامل- أن يستأجر على نفقة العامل من يكمل العمل وفق أحكام المادة (السابعة والستين بعد المائة) من هذا النظام أو أن يطلب فسخ العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والسبعون بعد الخمسمائة
  article_text_ar: يستحق كل متعاقد نصيبه من الناتج بظهوره، فإذا انقضت المدة قبل ظهوره لم يستحق أحد المتعاقدين شيئًا على الآخر. وإذا انقضت بعد ظهور الناتج وقبل أن يبلغ حصاده أو جذاذه، خُيِّر العامل بين أن يعمل إلى بلوغ الحصاد أو الجذاذ ويأخذ نصيبه كاملًا أو أن يترك العمل، فإذا اختار ترك العمل وأنفق رب المال النفقات اللازمة لبلوغ الحصاد أو الجذاذ فللعامل نصيبه من الناتج بعد أن يقتطع رب المال منه ما أنفقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والسبعون بعد الخمسمائة
  article_text_ar: للعامل طلب فسخ عقد المشاركة الزراعية إذا حدث له عذر طارئ قبل ظهور الناتج يتعلق بتنفيذ العقد، ويستحق أجر مثل عمله وقيمة ما أنفقه وذلك بقدر ما عاد على رب المال من نفع، وذلك دون إخلال بتعويض رب المال إن كان له مقتضٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والسبعون بعد الخمسمائة
  article_text_ar: الكفالة عقدٌ يلتزم بمقتضاه الكفيل للدائن بأن يفي بالتزام على المدين إذا لم يَفِ به المدين نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والسبعون بعد الخمسمائة
  article_text_ar: تنعقد الكفالة بين الكفيل والدائن، ويعد سكوت الدائن إذا وجه إليه الإيجاب قبولًا للكفالة. لا يتوقف انعقاد الكفالة على قبول المدين، وتجوز دون علمه، وتجوز أيضًا رغم معارضته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثمانون بعد الخمسمائة
  article_text_ar: يجب في عقد الكفالة أن يكون الكفيل كامل الأهلية. الكفالة من المريض مرض الموت لا تنفذ في حق الورثة فيما زاد على (ثلث) التركة إلا بإجازتهم، وإذا كانت الكفالة لوارث أو عنه لم تنفذ في حق باقي الورثة ولو فيما دون (الثلث) إلا بإجازتهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثمانون بعد الخمسمائة
  article_text_ar: لا تكون الكفالة صحيحة إلا إذا كان الالتزام المكفول به صحيحًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثمانون بعد الخمسمائة
  article_text_ar: يصح أن تكون الكفالة منجزةً أو معلقةً على شرط أو مؤقتةً أو مضافةً إلى أجل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثمانون بعد الخمسمائة
  article_text_ar: تصح الكفالة في الدين المستقبل إذا حدد مقدمًا مقدار المكفول به، وتصح في الدين المعلق على شرط. للكفيل في الدين المستقبل إذا لم يعين مدة للكفالة أن يرجع عن كفالته بشرط إعلام الدائن برجوعه قبل ترتب الدين بوقت كافٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثمانون بعد الخمسمائة
  article_text_ar: إذا كانت الكفالة في مبلغ أكبر مما هو مستحق على المدين وبشروط أشد من المكفول فيه لم تصح إلا في قدر الدين المستحق على المدين وبشروطه. تصح الكفالة في مبلغ أقل من الدين المستحق على المدين وبشروط أخف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثمانون بعد الخمسمائة
  article_text_ar: إذا وقعت الكفالة مطلقة فإن التزام الكفيل يتبع التزام المدين معجلًا كان أو مؤجلًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثمانون بعد الخمسمائة
  article_text_ar: تصح كفالة الدين الحالّ كفالة مؤجلة، وللدائن مطالبة المدين به حالًّا، وليس له مطالبة الكفيل به إلا عند حلول الأجل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثمانون بعد الخمسمائة
  article_text_ar: لا يطالب الكفيل في الكفالة المؤقتة إلا بالالتزامات المترتبة مدة الكفالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثمانون بعد الخمسمائة
  article_text_ar: 'تبرأ ذمة الكفيل بقدر ما أضاعه الدائن بخطئه من ضمانات الدين. يقصد بضمانات الدين: كل ما خصص لضمان الدين ولو تقرر بعد الكفالة، وكل ضمان مقرر نظامًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثمانون بعد الخمسمائة
  article_text_ar: إذا حلَّ الدين ولم يطالب الدائن المدين به جاز للكفيل إذا لم يكن متضامنًا مع المدين أن يُعذر الدائن باتخاذ الإجراءات ضد المدين، وإذا لم يقم الدائن بذلك خلال (مائة وثمانين) يومًا من تاريخ الإعذار برئت ذمة الكفيل من الكفالة ولو منح الدائن المدين أجلًا؛ ما لم يكن ذلك بموافقة الكفيل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التسعون بعد الخمسمائة
  article_text_ar: إذا افتتح أيٌّ من إجراءات التصفية للمدين وفق النصوص النظامية ولم يتقدم الدائن بمطالبته بالدين وفق ذلك الإجراء سقط حقه في الرجوع على الكفيل بقدر ما كان يستوفيه لو أنه تقدم بمطالبة المدين به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والتسعون بعد الخمسمائة
  article_text_ar: ليس للدائن أن يرجع على الكفيل وحده إلا بعد رجوعه على المدين، ولا أن ينفذ على أموال الكفيل إلا بعد تجريده المدين من أمواله، وذلك كله ما لم يكن الكفيل متضامنًا مع المدين. لا تقضي المحكمة بما ورد في الفقرة (1) من هذه المادة إلا إذا تمسك الكفيل بحقه في الحالتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والتسعون بعد الخمسمائة
  article_text_ar: إذا طلب الكفيل التجريد لزمه أن يقوم على نفقته بإرشاد الدائن إلى أموال للمدين تفي بالدين كله، ولا عبرة بالأموال إذا كانت خارج المملكة، أو كانت أموالًا متنازعًا فيها. في الأحوال التي يرشد فيها الكفيل إلى أموال المدين، يكون الدائن مسؤولًا تجاه الكفيل عن إعسار المدين الذي يترتب على عدم اتخاذ الدائن الإجراءات اللازمة في الوقت المناسب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والتسعون بعد الخمسمائة
  article_text_ar: تقتضي الكفالة النظامية والقضائية تضامن الكفلاء مع المدين وتضامنهم فيما بينهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والتسعون بعد الخمسمائة
  article_text_ar: إذا كان الدين موثَّقًا بضمانٍ عيني قبل الكفالة أو معها ولم يكن الكفيل متضامنًا مع المدين؛ فلا يجوز التنفيذ على أموال الكفيل قبل التنفيذ على الأموال الموثقة للدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والتسعون بعد الخمسمائة
  article_text_ar: إذا تعدد الكفلاء بدين واحد جازت مطالبة كل منهم بكل الدين إلا إذا كفلوا جميعًا في عقد واحد ولم يشترط فيه تضامنهم فلا يطالب أحد منهم إلا بقدر حصته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والتسعون بعد الخمسمائة
  article_text_ar: إذا كان الكفلاء متضامنين فيما بينهم ووفى أحدهم الدين؛ كان له أن يرجع على كل واحد من الباقين بحصته في الدين وبنصيبه في حصة المعسر منهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والتسعون بعد الخمسمائة
  article_text_ar: للكفيل بمقتضى عقد الكفالة أن يرجع على المدين بما وفى عنه وبما دفعه من نفقات اقتضاها العقد؛ إذا كانت الكفالة بعلم المدين ودون معارضته. إذا عجّل الكفيل وفاء الدين المؤجل فليس له الرجوع على المدين بما عجّل وفاءه من الدين المؤجل قبل حلول الأجل ما لم يكن تعجيله بإذن المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والتسعون بعد الخمسمائة
  article_text_ar: إذا وفى الكفيل الدين فعلى الدائن أن يسلمه جميع المستندات اللازمة لاستعمال حقه في الرجوع على المدين. إذا وفى الكفيل الدين وكان الدين موثَّقًا بضمانٍ عيني، فعلى الدائن التخلي عنه للكفيل إن كان منقولًا، أو القيام بالإجراءات اللازمة لنقل حقوقه إلى الكفيل إن كان عقارًا، ويتحمل الكفيل نفقات هذا النقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والتسعون بعد الخمسمائة
  article_text_ar: إذا وفى الكفيل الدين كان له أن يحل محل الدائن في جميع ما له من حقوق قِبَل المدين، وإذا لم يوفِ إلا بعض الدين، فلا يرجع بما وفى إلا بعد أن يستوفي الدائن كل حقه من المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستمائة
  article_text_ar: إذا وفى الكفيل عوضًا عن الدين شيئًا آخر فإنه يرجع على المدين بالدين أو بما وفاهُ فعلًا أيهما أقل. إذا صالح الكفيل الدائن على أقل من الدين فإنه يرجع على المدين بما وفى لا بما كفل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأولى بعد الستمائة
  article_text_ar: يلزم المدين أن يعلم الكفيل عن أي سبب يقتضي انقضاء الدين أو بطلانه، فإن لم يفعل ووفى الكفيل الدين عند الاستحقاق كان له الرجوع على المدين، دون إخلال بحق الكفيل في الرجوع على الدائن وفق أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية بعد الستمائة
  article_text_ar: إذا كان المدينون متضامنين فلمن كفلهم جميعًا الرجوع على أي منهم بكل ما وفاه من الدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة بعد الستمائة
  article_text_ar: يبرأ الكفيل بمجرد براءة المدين، وللكفيل -ولو كان متضامنًا- أن يتمسك بجميع الدفوع التي يحتج بها المدين؛ ما لم يكن ما يحتج به المدين هو نقص أهليته وكان الكفيل عالماً بذلك وقت التعاقد فليس له أن يحتج به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة بعد الستمائة
  article_text_ar: إذا قبل الدائن أن يستوفي في مقابل الدين شيئًا آخر برئت ذمة الكفيل ولو استحق هذا الشيء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة بعد الستمائة
  article_text_ar: إذا أحال المدين أو الكفيل الدائن بالدين المكفول به أو بجزء منه على آخر حوالةً صحيحةً برئ المدين والكفيل في حدود هذه الحوالة. إذا اشترط في الحوالة براءة الكفيل فقط برئ وحده دون المدين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة بعد الستمائة
  article_text_ar: لا ينتهي عقد الكفالة بموت الكفيل أو المدين، ويبقى الالتزام على تركة من مات منهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة بعد الستمائة
  article_text_ar: تسري على عقد التأمين النصوص النظامية الخاصة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة بعد الستمائة
  article_text_ar: حقُّ الملكية يخول المالك وحده في حدود النظام استعمال الشيء المملوك واستغلاله والتصرف فيه. لمالك الشيء وحده الحق في كل ثماره ومنتجاته وملحقاته؛ ما لم يوجد نص نظامي أو تصرف يقضي بخلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة بعد الستمائة
  article_text_ar: مالك الشيء يملك كلَّ ما يُعدُّ من عناصره الجوهرية، وهو ما لا يمكن فصله عنه دون أن يهلك أو يتلف أو يتغير. كل من ملك أرضًا ملك ما فوقها وما تحتها إلى الحد المفيد في التمتع بها علوًّا وعمقًا؛ ما لم يوجد نص نظامي أو تصرف يقضي بخلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة بعد الستمائة
  article_text_ar: لا يُمنع أحد من ملكه ولا ينزع ملكه منه إلا في الأحوال التي تقررها النصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة بعد الستمائة
  article_text_ar: على المالك أن يتقيَّد في استعمال حقه بما تقضي به النصوص النظامية من قيود مقررة للمصلحة العامة أو الخاصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة بعد الستمائة
  article_text_ar: إذا تعلق بالملك حقٌّ للغير فليس للمالك أن يتصرف فيه تصرفًا ضارًّا إلا بإذن صاحب الحق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد الستمائة
  article_text_ar: على المالك ألا يغلو في استعمال حقه إلى حد يضر بملك الجار. ليس للجار أن يرجع على جاره في مضار الجوار المألوفة التي لا يمكن تجنبها، وإنما له أن يطلب إزالة هذه المضار إذا تجاوزت الحد المألوف، ويُراعى في ذلك العرف، وطبيعة العقارات، وموقع كل منها بالنسبة إلى الآخر، والغرض الذي خصصت له، ولا يحول الترخيص الصادر من الجهات المختصة دون استعمال الجار حقه في المطالبة بإزالة هذه المضار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد الستمائة
  article_text_ar: إذا كان الحائط مشتركًا بين اثنين (أو أكثر) فلا يجوز لأي منهما أن يحدث أي تغيير فيه بما يتنافى مع الغرض الذي أعدَّ له بغير إذن الآخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد الستمائة
  article_text_ar: للشريك في الحائط المشترك أن يعليه على نفقته إذا كانت له مصلحة جديّة في ذلك، بشرط ألا يلحق بشريكه ضررًا جسيمًا. إذا لم يكن الحائط المشترك صالحًا للتعلية فعلى من يرغب في تعليته من الشركاء أن يعيد بناء الحائط كله على نفقته. إذا أصبح الحائط المشترك غير صالح للغرض الذي أقيم من أجله، فنفقة إصلاحه على جميع الشركاء بنسبة حصة كل منهم فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة بعد الستمائة
  article_text_ar: ليس لمالك الحائط أن يهدمه إن كان الهدم يضر بالجار الذي يستتر ملكه بالحائط، إلا إذا كان هناك سبب مُعتبر للهدم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة بعد الستمائة
  article_text_ar: ليس للمالك أن يشترط في تصرفه -عقدًا كان أو وصية- شرطًا يمنع المتصرف إليه من التصرف في مال إلا إذا كان هذا الشرط لمدة معقولة وقصد به حماية مصلحة مشروعة للمتصرف أو المتصرف إليه أو الغير. إذا لم تعين مدة منع المتصرف إليه من التصرف فللمحكمة تعيينها بحسب العرف وطبيعة المعاملة والغرض من التصرُّف. يقع باطلًا كل شرط يمنع المتصرف إليه من التصرف ما لم تتوفر فيه أحكام الفقرة (1) من هذه المادة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد الستمائة
  article_text_ar: إذا كان الشرط المانع من التصرف صحيحًا وفقًا للمادة (السابعة عشرة بعد الستمائة) من هذا النظام، فكل تصرف مخالف له يكون باطلًا، دون إخلال بحق خلف الممنوع من التصرف إذا كسبه معاوضة بحسن نيّة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة عشرة بعد الستمائة
  article_text_ar: إذا تملك أكثر من شخص شيئًا دون أن تفرز حصة كل منهم فهم شركاء على الشيوع، وتكون حصصهم متساوية، ما لم يقم الدليل على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العشرون بعد الستمائة
  article_text_ar: لكل شريك في الملك التصرف في حصته واستغلالها واستعمالها؛ وذلك دون إذن من باقي الشركاء بشرط ألا يلحق ضررًا بحقوقهم. إذا كان تصرف الشريك في الملك منصبًّا على جزء مفرز من المال الشائع ولم يقع هذا الجزء عند القسمة في حصة المتصرف انتقل حق المتصرف إليه من وقت التصرف إلى الجزء الذي آل إلى المتصرف بطريق القسمة، وإذا كان المتصرف إليه يجهل أن المتصرف لا يملك العين المتصرف فيها مفرزة عند العقد، فله الحق في إبطال التصرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد الستمائة
  article_text_ar: تكون إدارة المال الشائع من حق الشركاء مجتمعين ما لم تقتضِ النصوص النظامية أو الاتفاق خلاف ذلك، وإذا تولى أحد الشركاء الإدارة دون اعتراض من الباقين عُدَّ وكيلًا عنهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والعشرون بعد الستمائة
  article_text_ar: إذا اختلف الشركاء في إدارة المال الشائع كان رأي الأغلبية في الإدارة المعتادة ملزمًا لجميع الشركاء وخلفهم العام والخاص، وتعتبر الأغلبية بقيمة الحصص، ولها أن تختار مديرًا من الشركاء أو من غيرهم، وأن تضع تنظيمًا لإدارة المال وحسنِ الانتفاع به يسري على جميع الشركاء. إذا لم تتوفر الأغلبية المنصوص عليها في الفقرة (1) من هذه المادة فللمحكمة بناءً على طلب أي شريك أن تعين مديرًا للمال الشائع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والعشرون بعد الستمائة
  article_text_ar: للشركاء الذين يملكون ما لا يقل عن ثلاثة أرباع المال الشائع أن يقرروا في سبيل تحسين الانتفاع بهذا المال من التغييرات الأساسية والتعديل في الغرض الذي أعد له ما يخرج عن حدود الإدارة المعتادة على أن يقوموا بإعلام باقي الشركاء بقراراتهم، ولمن خالف منهم حق الاعتراض أمام المحكمة خلال (ثلاثين) يومًا من تاريخ إعلامه. للمحكمة إذا وافقت على قرار الأغلبية المنصوص عليها في الفقرة (1) من هذه المادة أن تقرر ما تراه مناسبًا من تدابير بما في ذلك ما يضمن للمعترض الوفاء بما قد يُستحق من تعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والعشرون بعد الستمائة
  article_text_ar: لكل شريك على الشيوع الحق في أن يتخذ من الوسائل ما يحفظ المال الشائع ولو كان ذلك دون موافقة باقي الشركاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والعشرون بعد الستمائة
  article_text_ar: يتحمل نفقات إدارة المال الشائع وحفظه وسائر النفقات الناتجة عن الشيوع أو المقررة على المال؛ جميع الشركاء كل بقدر حصته، وذلك كله ما لم يتفق على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والعشرون بعد الستمائة
  article_text_ar: إذا اتفق جميع الشركاء على القسمة صحت ولو أنقصت منفعة المال أو قيمته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والعشرون بعد الستمائة
  article_text_ar: يجوز لمن يريد الخروج من الشيوع أن يطلب القسمة القضائية ما لم يوجد اتفاق أو نص نظامي يمنع من ذلك أو يتبين من الغرض الذي خصص له المال أنه يجب أن يبقى دائمًا على الشيوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والعشرون بعد الستمائة
  article_text_ar: إذا طلب أحد الشركاء قسمة المال الشائع وامتنع الباقون، وكان المال قابلًا للقسمة عينًا دون أن يترتب على ذلك تعطل الانتفاع به أو نقصٌ كبيرٌ في قيمته قَسَمتْه المحكمة، فإن ترتب على القسمة أيٌّ منهما أمرت المحكمة ببيع المال في المزاد. إذا كان طالب القسمة يستطيع أن يبيع حصته بما لا يقل عن قيمتها لو بيع المال كاملًا لم يُلزم الشركاء بالبيع في المزاد، وللشركاء -إذا ترتب على بيع الحصة نقصان قيمتها- أن يتوقوا البيع في المزاد بأن يؤدوا لطالبها مقدار ما يلحق حصته من نقص بسبب بيعه إياها منفردة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والعشرون بعد الستمائة
  article_text_ar: لدائن أي شريك أن يعترض على أن تتم قسمة المال الشائع أو أن يباع في المزاد بغير إدخاله، وذلك بالتدخل أمام المحكمة إن كانت القسمة قضائية، أو بإبلاغ كل الشركاء بالاعتراض إن كانت القسمة اتفاقية، وعليهم أن يدخلوه في إجراءاتها، وإلا كانت غير نافذة في حقه، ويجب في جميع الأحوال إدخال الدائن المقيّد حقه قبل رفع دعوى القسمة القضائية أو إبرام القسمة الاتفاقية. إذا تمت القسمة فليس للدائن الذي لم يتدخل أن يطعن فيها إلا في حال الغش.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثلاثون بعد الستمائة
  article_text_ar: إذا ظهر دين على الميت بعد قسمة التركة لزم كل واحدٍ من الورثة نصيبه من الدَّين في الحصة التي آلت إليه من التركة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثلاثون بعد الستمائة
  article_text_ar: يجوز نقض القسمة الاتفاقية إذا أثبت المتقاسم أنه قد لحقه منها غبن ويجب أن ترفع الدعوى خلال السنة التالية للقسمة، وللطرف الآخر توقي نقض القسمة إذا أكمل للمتقاسم نقدًا أو عينًا ما يرفع عنه الغبن.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثلاثون بعد الستمائة
  article_text_ar: إذا استحق المقسوم كله أو بعضه لسبب سابق على القسمة فللمتقاسم الذي استحق نصيبه أو بعضه أن يرجع بضمان ذلك الاستحقاق على بقية المتقاسمين كُلٌّ بنسبة حصته؛ والمعتبر في تقدير الضمان قيمة الشيء وقت القسمة. ليس للمتقاسم الرجوع بضمان الاستحقاق إذا كان هناك اتفاق يقضي بالإعفاء منه إذا نشأ بسبب محدد صراحةً في الاتفاق أو كان راجعًا إلى خطأ المتقاسم نفسه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون بعد الستمائة
  article_text_ar: يُعد المتقاسم مالكًا للحصة التي آلت إليه منذ أن تملك في الشيوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثلاثون بعد الستمائة
  article_text_ar: المهايأة قسمة منفعة المال الشائع بين الشركاء زمانيًّا أو مكانيًّا بمقدار حصصهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثلاثون بعد الستمائة
  article_text_ar: يجب في المهايأة الزمنية تعيين وقت ابتدائها ومدة انتفاع كل شريك، فإن اختلف الشركاء في ذلك فتعين المحكمة المدة التي تراها مناسبة بحسب طبيعة النزاع والمال الشائع، ولها إجراء القرعة لتعيين وقت البدء في الانتفاع. يجب في المهايأة المكانية تعيين محل انتفاع كل شريك، فإذا اختلف الشركاء في ذلك فللمحكمة إجراء القرعة لتعيين محل الانتفاع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثلاثون بعد الستمائة
  article_text_ar: تسري على المهايأة أحكام عقد الإيجار فيما لا يتعارض مع طبيعتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثلاثون بعد الستمائة
  article_text_ar: للشركاء أثناء إجراءات قسمة المال أن يتفقوا على المهايأة حتى تتم القسمة، فإذا تعذر اتفاقهم فللمحكمة بناءً على طلب أحدهم إلزامهم بالمهايأة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثلاثون بعد الستمائة
  article_text_ar: إذا طلب أحد الشركاء قسمة المال وطلب الآخرون المهايأة، أو طلب أحد الشركاء القسمة أثناء سريان المهايأة؛ قُبل طلب القسمة. إذا طلب أحد الشركاء المهايأة وامتنع الآخرون ولم يطلبوا القسمة فإنهم يجبرون على المهايأة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثلاثون بعد الستمائة
  article_text_ar: لا تنقضي المهايأة بموت أحد الشركاء، ويحلُّ ورثته محله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأربعون بعد الستمائة
  article_text_ar: تسري على ملكية الوحدات العقارية النصوص النظامية الخاصة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والأربعون بعد الستمائة
  article_text_ar: من أحرز منقولًا مباحًا بنيّة تملُّكه، مَلَكَه. يكون المنقول مباحًا إذا لم يمنع من تملكه نص نظامي ولم يكن له مالك أو تخلى عنه مالكه بنيّة النزول عن ملكيته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والأربعون بعد الستمائة
  article_text_ar: تسري على المعادن والمواد الهيدروكربونية والنفايات والمياه واللقطة والآثار والصيد النصوص النظامية الخاصة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والأربعون بعد الستمائة
  article_text_ar: تسري على عقارات الدولة النصوص النظامية الخاصة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والأربعون بعد الستمائة
  article_text_ar: كل مال وجب التعويض عنه يملكه من لزمه التعويض إذا أدى مثله أو قيمته للمالك الأصلي، وتكون الملكية مستندةً إلى وقت سبب التعويض بشرط أن يكون المحل قابلًا لثبوت الملك فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والأربعون بعد الستمائة
  article_text_ar: يملك الوارث بالإرث نصيبه من الأموال المملوكة للمورث، وفقًا للنصوص النظامية الخاصة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والأربعون بعد الستمائة
  article_text_ar: يملك الموصى له المال الموصى به، وفقًا للنصوص النظامية الخاصة بالوصية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والأربعون بعد الستمائة
  article_text_ar: كل تصرف نظامي يصدر من شخص في مرض الموت ويكون تبرعًا أو معاوضة فيها محاباة؛ يأخذ التبرع أو قدر المحاباة فيه حكم الوصية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والأربعون بعد الستمائة
  article_text_ar: إذا تصرف شخص لأحد ورثته واحتفظ بحيازة الشيء الذي تصرف فيه، وبحق الانتفاع به مدى حياته، عُدَّ التصرف مضافًا إلى ما بعد الموت وتسري عليه أحكام الوصية ما لم يقم الدليل على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والأربعون بعد الستمائة
  article_text_ar: يعد كل ما علا الأرض أو كان تحتها من بناء أو غراس من عمل مالك الأرض أقامه على نفقته، ويكون ملكًا له؛ وذلك كلّه ما لم يقم دليل على خلافه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخمسون بعد الستمائة
  article_text_ar: إذا أحدث مالك الأرض بناءً أو غراسًا على أرضه بمواد مملوكة لغيره دون إذن فللغير استردادها على نفقة مالك الأرض إذا لم تكن إزالتها تلحق ضررًا جسيمًا بالأرض، فإذا كانت الإزالة تلحق بالأرض ضررًا جسيمًا؛ تملّكها صاحب الأرض بقيمتها مع التعويض إن كان له مقتضٍ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والخمسون بعد الستمائة
  article_text_ar: إذا أحدث شخص بناءً أو غراسًا بمواد من عنده على أرض يعلم أنها مملوكة لغيره دون إذن مالكها؛ فللمالك أن يطلب إزالة المحدثات على نفقة من أحدثها مع التعويض إن كان له مقتضٍ، أو يستبقيها بدفع قيمتها مستحقة الإزالة أو بدفع مبلغٍ يساوي ما زاد في قيمة الأرض بسبب البناء أو الغراس. للمحدث أن يطلب إزالة ما أحدثه من بناءٍ أو غراسٍ إذا كان ذلك لا يُلحق ضررًا بالأرض ولو لم يرض مالكها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والخمسون بعد الستمائة
  article_text_ar: إذا أحدث شخص بحسن نية بناءً أو غراسًا بمواد من عنده على أرض مملوكة لغيره، فللمحدث أن يزيله إذا لم تكن الإزالة تضر بالأرض، فإن كانت الإزالة تضر بالأرض أو لم يختر المحدث الإزالة؛ خير المالك بين أن يدفع قيمة المواد وأجرة العمل أو أن يدفع مبلغًا يساوي ما زاد في قيمة الأرض بسبب البناء أو الغراس. وإذا بلغ البناء أو الغراس حدًّا من الجسامة يرهق مالك الأرض أن يؤدي ما هو مستحق عنهما، كان له أن يطلب تمليك الأرض لمن أقام البناء أو الغراس مقابل تعويض عادل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والخمسون بعد الستمائة
  article_text_ar: إذا كان مالك الأرض وهو يقيم عليها بناءً قد جار بحسن نية على جزء من الأرض الملاصقة، جاز للمحكمة -إذا رأت محلًّا لذلك- أن تجبر صاحب هذه الأرض على أن ينزل لجاره عن ملكية الجزء المشغول بالبناء، وذلك مقابل تعويض عادل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والخمسون بعد الستمائة
  article_text_ar: إذا اتصل منقولان لمالكين مختلفين بحيث لا يمكن فصلهما دون تلف ولم يكن هناك اتفاق بين المالكين قضت المحكمة في النزاع مع مراعاة الضرر الذي وقع وحال الطرفين وحسن نية كل منهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والخمسون بعد الستمائة
  article_text_ar: تنتقل الملكية وغيرها من الحقوق العينية في العقار والمنقول بالعقد متى ورد على محل مملوك للمتصرف وفقًا للنصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والخمسون بعد الستمائة
  article_text_ar: إذا كان محل العقد معيَّنًا بالذات انتقلت ملكيته بالعقد. إذا كان محل العقد معيَّنًا بالنوع لم تنتقل الملكية في أيٍّ من أفراده إلا بإفرازه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والخمسون بعد الستمائة
  article_text_ar: إذا اشترط نص نظامي إجراءً لانتقال الملكية والحقوق العينية الأخرى، لم تنتقل إلا باستكمال ذلك الإجراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والخمسون بعد الستمائة
  article_text_ar: الشفعة حق الشريك في أن يتملّك العقار المبيع بالثمن الذي بيع به وبنفقاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والخمسون بعد الستمائة
  article_text_ar: إذا اجتمع أكثر من شفيع كان استحقاق كل منهم من الشفعة على قدر نصيبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الستون بعد الستمائة
  article_text_ar: إذا اشترى شخص ما تصح الشفعة فيه ثم باعه لآخر قبل إعلام الشفيع رغبته الأخذ بالشفعة وفقًا للفقرتين (ب) و(ج) من المادة (السادسة والستين بعد الستمائة) من هذا النظام، فليس للشفيع أخذه إلا بالثمن الذي بيع به على المشتري الثاني ونفقاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والستون بعد الستمائة
  article_text_ar: تثبت الشفعة بتمام البيع مع قيام السبب الموجب لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والستون بعد الستمائة
  article_text_ar: ليس للشفيع حق الشفعة إلا إذا كان مالكًا لنصيبه في العقار وقت شراء المشتري نصيب البائع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والستون بعد الستمائة
  article_text_ar: إذا ثبتت الشفعة وفقا للمادة (الحادية والستين بعد الستمائة) من هذا النظام؛ فلا تسقط بموت البائع أو المشتري أو الشفيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والستون بعد الستمائة
  article_text_ar: لا تقبل الشفعة التجزئة، فليس للشفيع أن يأخذ بعض العقار جبرًا على المشتري، إلا إذا تعدد المشترون واتحد البائع؛ فللشفيع أن يأخذ نصيب بعضهم ويترك الباقي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والستون بعد الستمائة
  article_text_ar: 'لا شفعة في الحالات الآتية: أ- إذا كان انتقال الملك بغير البيع. ب- إذا وقع البيع بين الأصول والفروع أو بين الزوجين. ج- إذا بيع العقار في المزاد وفقًا للنصوص النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والستون بعد الستمائة
  article_text_ar: 'تسقط الشفعة في الحالات الآتية: أ- إذا نزل الشفيع عن حقه في الشفعة صراحةً أو ضمنًا ولو كان ذلك قبل البيع. ب- إذا لم يقم الشفيع بإعلام البائع والمشتري برغبته في الأخذ بالشفعة خلال (عشرة) أيام من تاريخ الإعذار الذي يوجهه إليه البائع أو المشتري بطلب إبداء رغبته، على أن يتضمن هذا الإعذار البيانات الكافية عن المشتري والمبيع والثمن وشروط العقد. ج- إذا لم يرفع الشفيع دعوى الشفعة خلال (ثلاثين) يومًا من تاريخ الإعلام الذي وجهه إلى البائع والمشتري.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والستون بعد الستمائة
  article_text_ar: لا تسمع دعوى الشفعة بانقضاء (مائة وثمانين) يومًا من تاريخ تسجيل البيع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والستون بعد الستمائة
  article_text_ar: ترفع دعوى الشفعة على البائع أو المشتري، وللمحكمة أن تمهل الشفيع (خمسة عشر) يومًا لإيداع الثمن أو جزء منه وفق تقدير المحكمة لدى الجهة التي يحددها وزير العدل، وإلا سقط حقه في الشفعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والستون بعد الستمائة
  article_text_ar: يثبت الملك للشفيع في العقار المبيع من حين الحكم بثبوت الشفعة أو بتسليم المشتري له بالتراضي، وذلك مع مراعاة ما تشترطه النصوص النظامية في تسجيل ملكية العقار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعون بعد الستمائة
  article_text_ar: يحل الشفيع تجاه البائع محل المشتري في جميع حقوقه والتزاماته، وللشفيع الانتفاع بالأجل الممنوح للمشتري في دفع الثمن إذا قدم الشفيع للبائع ضمانات كافية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والسبعون بعد الستمائة
  article_text_ar: إذا زاد المشتري في العقار المشفوع شيئًا من ماله أو بنى أو غرس فيه قبل إعلام الشفيع البائع والمشتري برغبته في الشفعة؛ فعلى الشفيع إذا أخذ بالشفعة أن يدفع -تبعًا لما يختاره المشتري- مقدار ما أنفقه أو ما زاد في قيمة العقار بسبب زيادة المشتري أو بنائه أو غراسه. ذا كانت الزيادة أو البناء أو الغراس بعد الإعلام؛ فللشفيع إذا أخذ بالشفعة أن يطلب الإزالة على نفقة المشتري مع التعويض إن كان له مقتضٍ، أو أن يستبقي البناء أو الغراس على أن يدفع للمشتري ما أنفقه أو ما زاد في قيمة العقار بسبب زيادة المشتري أو بنائه أو غراسه. إذا نقص العقار المشفوع بغير فعل المشتري أو بفعله قبل الإعلام؛ فللشفيع أخذه بكل الثمن أو تركه، ويحط عن الشفيع من ثمنه قيمة ما نقص بفعل المشتري بعد الإعلام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والسبعون بعد الستمائة
  article_text_ar: للشفيع أن يطلب عدم نفاذ تصرفات المشتري إذا كانت بعد إعلام الشفيعِ البائعَ والمشتري برغبته في الشفعة، مع بقاء حقه في طلب الشفعة إذا تحققت شروطها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والسبعون بعد الستمائة
  article_text_ar: الحيازة وضع الشخص يده على الشيء المحوز ظاهرًا عليه بمظهر المالك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والسبعون بعد الستمائة
  article_text_ar: تُعدُّ حيازة المنقول قرينة على الملكية عند النزاع فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والسبعون بعد الستمائة
  article_text_ar: الحائزُ حَسنُ النية من يجهل أنه يعتدي على حق الغير؛ ما لم يكن الجهل ناشئًا عن خطئه الجسيم. ويُفترض حُسنُ النية في الحائزِ ما لم يقم الدليل على خلاف ذلك. تزول صفة حسن النية عن الحائز من حين علمه بعيوب سند حيازته، أو بإعلامه بها في صحيفة الدعوى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والسبعون بعد الستمائة
  article_text_ar: إذا كان الحائز حسن النية فإنه يملك الثمار التي قبضها مدة حيازته بنية تملكها. يكون الحائز سيءُ النية مسؤولًا عن جميع الثمار التي قبضها والتي قصّر في قبضها وذلك من الوقت الذي أصبح فيه سيء النية، وله أن يسترد ما أنفقه في إنتاج هذه الثمار. تُعدُّ الثمار الطبيعية أو المستحدثة مقبوضةً يوم فصلها، أما الثمار المدنية فتُعدُّ مقبوضةً يومًا فيومًا، والحصول على المنفعة كقبض الثمار المدنية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والسبعون بعد الستمائة
  article_text_ar: يلزم المالك الذي يرد إليه الشيء أن يؤدي إلى الحائز جميع ما أنفقه من نفقاتٍ ضروريَّةٍ. النفقات النافعة تطبق في شأنها أحكام المادتين (الحادية والخمسين بعد الستمائة) و(الثانية والخمسين بعد الستمائة) من هذا النظام. لا يلزم المالك أداء النفقات الكمالية، ويجوز للحائز أن يزيل ما أقامه بهذه النفقات على أن يعيد الشيء إلى حالته الأولى، وللمالك أن يستبقيها مقابل قيمتها مستحقة الإزالة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والسبعون بعد الستمائة
  article_text_ar: لا يلزم الحائز حسن النية التعويض عما يصيب الشيء بسبب انتفاعه به انتفاع الملاك، ولا يكون مسؤولًا عن أي هلاك أو تلف إلا بقدر ما عاد عليه من نفعٍ ترتب على ذلك الهلاك أو التلف. الحائزُ سيءُ النية مسؤولٌ عن هلاك الشيء أو تلفه ولو كان ذلك بسبب لا يد له فيه، إلا إذا أثبت أن الشيء كان سيهلك أو يتلف ولو كان تحت يد مالكه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والسبعون بعد الستمائة
  article_text_ar: حق الانتفاع حقٌ عينيٌّ يخول المنتفع استعمال شيء مملوك لغيره واستغلاله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثمانون بعد الستمائة
  article_text_ar: يُكسب حق الانتفاع بالتصرف النظامي، أو بالإرث إذا كان الانتفاع معين المدة، أو بالشفعة من الشريك على الشيوع في حق الانتفاع على عقار.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والثمانون بعد الستمائة
  article_text_ar: يُراعى في حقوق المنتفع والتزاماته السند الذي أنشأ حق الانتفاع وكذا الأحكام المقررة في هذا الفرع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والثمانون بعد الستمائة
  article_text_ar: ثمارُ الشيء المنتفع به من حق المنتفع مدة انتفاعه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والثمانون بعد الستمائة
  article_text_ar: يلتزم المنتفع بالانتفاع بالشيء المنتفع به في حدود ما اتفق عليه؛ فإن لم يكن هناك اتفاق فبحسب ما أعد له في حدود الانتفاع المعتاد. للمالك أن يعترض على أي استعمال غير مشروع أو لا يتفق مع طبيعة الشيء المنتفع به، وله أن يطالب المنتفع بتقديم ضمانات إذا أثبت أن حقوقه في خطر، فإن لم يقدمها المنتفع أو استمر على ذلك الاستعمال، فللمحكمة أن تنزع الشيء المنتفع به من يده وتسلمه إلى من يتولى إدارته، ولها تبعًا لجسامة الخطر إنهاء حق الانتفاع، دون إخلال بحقوق الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والثمانون بعد الستمائة
  article_text_ar: يلتزم المنتفع -أثناء انتفاعه- بالنفقات المعتادة التي يقتضيها حفظ الشيء المنتفع به وأعمال الصيانة، أما النفقات غير المعتادة والإصلاحات الجسيمة التي لم تنشأ عن خطأ المنتفع، فإنها تكون على المالك لكن لا يلزمه القيام بها أثناء مدة الانتفاع، فإذا قام بها المنتفع كان له الرجوع على المالك بعد رد الشيء إليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والثمانون بعد الستمائة
  article_text_ar: يلتزم المنتفع بأن يبذل من العناية في حفظ الشيء المنتفع به ما يبذله الشخص المعتاد؛ فإذا هلك أو تلف دون تعدٍّ أو تقصير منه لم يلزمه التعويض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والثمانون بعد الستمائة
  article_text_ar: يلزم المنتفع التعويض إذا هلك الشيء المنتفع به أو تلف بعد انقضاء مدة الانتفاع ولم يرده لمالكه مع إمكان الرد؛ ولو لم يستعمل ذلك الشيء بعد انقضاء المدة، ما لم يثبت أن الشي كان سيهلك أو يتلف ولو رده لمالكه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والثمانون بعد الستمائة
  article_text_ar: 'يلتزم المنتفع بأن يُعلم المالك في الحالات الآتية: ‌أ- إذا استولى على الشيء المنتفع به شخصٌ أو ادعى الغير حقًّا عليه. ‌ب- إذا هلك الشيء أو تلف أو احتاج إلى إصلاحات جسيمة مما يجب على المالك أن يتحمل نفقاته. ‌ ج- إذا احتاج إلى اتخاذ إجراء لدفع خطر خفيٍّ. إذا لم يقم المنتفع بالإعلام الوارد في الفقرة (1) من هذه المادة خلال مدة معقولة فإنه يكون مسؤولًا عن التعويض عن الضرر.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والثمانون بعد الستمائة
  article_text_ar: إذا كان مع الشيء المنتفع به منقولات استهلاكيّة واستهلكها المنتفع التزم برد بدلها بعد انتهاء حقه في الانتفاع. إذا مات المنتفع قبل أن يرد المنقولات المذكورة في الفقرة (1) من هذه المادة لصاحبها كانت مضمونة على تركته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والثمانون بعد الستمائة
  article_text_ar: ينتهي حق الانتفاع باتحاد صفتي المالك والمنتفع؛ ما لم تكن للمالك مصلحة في بقائه كما لو كان الشيء مرهونًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التسعون بعد الستمائة
  article_text_ar: ينتهي حق الانتفاع إذا انقضى الأجل المعين له، فإن لم يعيّن له أجل انتهى الحق بموت المنتفع. إذا انتهى حق الانتفاع بانقضاء الأجل أو موت المنتفع -وفقًا لأحكام الفقرة (1) من هذه المادة- وكانت الأرض المنتفع بها مشغولة بزرع المنتفع؛ استمر حق الانتفاع بأجرة المثل حتى يبلغ الزرع حصاده؛ ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والتسعون بعد الستمائة
  article_text_ar: ينتهي حق الانتفاع بهلاك الشيء المنتفع به، إلا أنه إذا دُفِع عنه تعويض انتقل حق الانتفاع إلى العوض وعلى المنتفع أن يرد عينه أو بدله -حسب الأحوال- بعد انتهاء حقه في الانتفاع. إذا كان الهلاك راجعًا إلى خطأ المالك فإنه يجبر على إعادة الشيء إلى حالته الأولى إذا كان ذلك ممكنًا، ويعود حق الانتفاع للمنتفع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية والتسعون بعد الستمائة
  article_text_ar: ينتهي حق الانتفاع بنزول المنتفع عنه، ولا يؤثر ذلك في التزاماته لمالك الشيء المنتفع به ولا في حقوق الغير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة والتسعون بعد الستمائة
  article_text_ar: لا تسمع دعوى المطالبة بحق الانتفاع إذا انقضت على عدم استعماله مدة (عشر) سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة والتسعون بعد الستمائة
  article_text_ar: يصح أن يقتصر حق الانتفاع على حق الاستعمال أو حق السكنى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة والتسعون بعد الستمائة
  article_text_ar: يتحدد حق الاستعمال وحق السكنى بحاجة صاحب الحق وأسرته، ويراعى في هذا الشأن ما يقرره السند المنشئ للحق والعرف.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة والتسعون بعد الستمائة
  article_text_ar: لا يصح التنازل للغير عن حق الاستعمال أو حق السكنى إلا بناءً على شرط صريح في سند إنشاء الحق أو للضرورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة والتسعون بعد الستمائة
  article_text_ar: تسري أحكام حق الانتفاع على حق الاستعمال وحق السكنى فيما لا يتعارض مع أحكام هذين الحقين وطبيعتهما.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة والتسعون بعد الستمائة
  article_text_ar: تسري على حق الوقف النصوص النظامية الخاصة به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة والتسعون بعد الستمائة
  article_text_ar: حق الارتفاق حقٌّ عينيٌّ مقررٌ لمنفعة عقار لشخص على عقار مملوك لشخص آخر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السبعمائة
  article_text_ar: يُكسب حق الارتفاق بالتصرف النظامي أو بالإرث.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الأولى بعد السبعمائة
  article_text_ar: إذا أنشأ مالك عقارين منفصلين ارتفاقًا ظاهرًا بينهما بقي الحق إذا انتقل العقاران أو أحدهما إلى أيدي ملاك آخرين دون تغيير في حالتهما ما لم يتفق على خلاف ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية بعد السبعمائة
  article_text_ar: إذا ثبت لأحد حق المرور في أرض مملوكة لآخر فليس لصاحبها منعه. لا يثبت حق المرور بالإذن به على وجه التسامح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة بعد السبعمائة
  article_text_ar: لصاحب العقار الذي لا يتصل بالطريق العام أو كان وصوله إليه يتم بنفقة باهظة أو مشقة كبيرة حق المرور في العقار المجاور بالقدر المعتاد مقابل عوض عادل، ولا يستعمل هذا الحق إلا في العقار الذي يكون المرور فيه أخف ضررًا وفي موضع منه يتحقق فيه ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة بعد السبعمائة
  article_text_ar: لصاحب الأرض العالية أن يسقي أرضه من المسيل الطبيعي قدر حاجته التي يقتضيها العرف ثم يرسل المياه إلى الأرض المنخفضة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة بعد السبعمائة
  article_text_ar: من أنشأ جدولًا أو مجرى ماء مأذونًا فيه لريِّ أرضه فليس لغيره حق الانتفاع به إلا بإذنه أو وفقًا للنصوص النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة بعد السبعمائة
  article_text_ar: ليس لأحد الشركاء في مورد الماء أو الجدول المشترك أن يشق منه جدولًا آخر إلا بإذن باقي الشركاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة بعد السبعمائة
  article_text_ar: حق المجرى حقٌّ لمالك الأرض في جريان مياه الريّ -طبيعيًّا كان أو اصطناعيًّا- في أرض غيره لتصل من موردها البعيد إلى أرضه. إذا ثبت حق المجرى لأحد فليس لملاك الأراضي التي تجري فيها هذه المياه منعه ولو تطلب ذلك إقامة منشآت عليها، بشرط أن يدفع صاحب الحق عوضًا معجَّلًا وألا يخل ذلك بانتفاع مالك الأرض إخلالًا بيّنًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة بعد السبعمائة
  article_text_ar: لمالك الأرض إذا أصاب أرضه ضررٌ من المجرى أن يطلب من صاحب حق المجرى تعميره وإصلاحه لرفع ذلك الضرر، فإذا امتنع جاز لمالك الأرض أن يقوم به على نفقة صاحب الحق بالقدر المتعارف عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة التاسعة بعد السبعمائة
  article_text_ar: ليس لمالك الأرض المنخفضة أن يقيم سدًّا لمنع المياه السائلة سيلًا طبيعيًّا من الأرض العالية. ليس لمالك الأرض العالية أن يقوم بعمل يزيد في عبء الأرض المنخفضة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة العاشرة بعد السبعمائة
  article_text_ar: لا يجوز إجراء مسيل ضار في ملك الغير أو في طريق عام أو خاص، ويزال الضرر ولو كان قديمًا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية عشرة بعد السبعمائة
  article_text_ar: يخضع حق الارتفاق للقواعد المقررة في سند إنشائه، ولما جرى عليه عرف المكان الذي يقع فيه العقار، ولأحكام المواد من (الثانية عشرة بعد السبعمائة) إلى (الخامسة عشرة بعد السبعمائة) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثانية عشرة بعد السبعمائة
  article_text_ar: تكون نفقات الأعمال اللازمة لاستعمال حق الارتفاق والمحافظة عليه على مالك العقار المـُرتَفِقِ؛ ما لم يُتَّفق على خلاف ذلك. إذا كان مالك العقار المـُرتَفَقِ به هو المكلف بأن يقوم بتلك الأعمال على نفقته كان له أن يتخلص من هذا التكليف بالتخلي عن العقار المرتفق به كله أو بعضه لمالك العقار المرتفق. إذا كانت الأعمال نافعة لمالكي العقارين المـُرتَفِقِ والمـُرتَفَقِ به، كانت نفقات تلك الأعمال على الطرفين كل بنسبة ما يعود عليه من النفع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثالثة عشرة بعد السبعمائة
  article_text_ar: لا يجوز لمالك العقار المـُرتَفَقِ به أن يقوم بعمل من شأنه التأثير في استعمال حق الارتفاق أو تغيير وضعه، إلا إذا أصبح الارتفاق أشد إرهاقًا لمالك العقار المرتَفَق به أو كان يمنعه من القيام بالإصلاحات المفيدة؛ فله أن يطلب نقل الحق إلى موضع يتمكن معه مالك العقار المرتفِق من استعمال حقه بسهولة الموضع القديم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الرابعة عشرة بعد السبعمائة
  article_text_ar: إذا جزئ العقار المـُرتَفِقُ بقي حق الارتفاق مستحقًّا لكل جزء منه على ألا يزيد ذلك في أعباء العقار المـُرتَفَقِ به. إذا كان حق الارتفاق لا يفيد إلا بعض هذه الأجزاء فلمالك العقار المـُرتَفَقِ به أن يطلب إنهاء حق الارتفاق عن باقي الأجزاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الخامسة عشرة بعد السبعمائة
  article_text_ar: إذا جزئ العقار المـُرتَفَقُ به بقي حق الارتفاق على كل جزء منه، وإذا كان غير مستعمل في الواقع على بعض أجزاء العقار المـُرتَفَقِ به ولا يمكن أن يستعمل عليها، فلمالك كل جزء منها أن يطلب إنهاء هذا الحق من الجزء الذي يخصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السادسة عشرة بعد السبعمائة
  article_text_ar: 'ينتهي حق الارتفاق في الحالات الآتية: أ- انقضاء الأجل المعين له أو زوال محله. ب- اجتماع العقارين المـُرتَفِقِ والمـُرتَفَقِ به في يد مالك واحد. ج- تعذُّر استعماله بسبب تغير وضع العقارين المرتفق والمرتفق به. ويعود حق الارتفاق إذا عاد الوضع إلى ما كان عليه. د- نزول صاحب الحق عنه وإعلامه مالك العقار المرتفق به بذلك. هـ- زوال الغرض من حق الارتفاق للعقار المرتفق، أو بقاء فائدة محدودة لا تتفق مع الأعباء الواقعة على العقار المرتفق به.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة السابعة عشرة بعد السبعمائة
  article_text_ar: لا تسمع دعوى المطالبة بحق الارتفاق إذا انقضت على عدم استعماله مدة (عشر) سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الثامنة عشرة بعد السبعمائة
  article_text_ar: يَقطع انتفاعُ أحد الشركاء على الشيوع بحق الارتفاق مرورَ الزمن المانع من سماع الدعوى لمصلحة باقي الشركاء، كما أن وقف سريان مدة عدم سماع الدعوى لمصلحة أحد الشركاء يجعله موقوفًا لمصلحة باقيهم.
