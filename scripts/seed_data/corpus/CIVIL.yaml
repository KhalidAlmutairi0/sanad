- article_ref: المادة العشرون بعد السبعمائة
  article_text_ar: 'دون إخلال بما تقضي به المادة (الأولى) من هذا النظام، تطبق القواعد الواردة في هذه المادة بالقدر الذي لا تتعارض فيه مع النصوص النظامية، مع مراعاة طبيعتها والشروط والاستثناءات الخاصة بكل منها، وهي: القاعدة الأولى: الأمور بمقاصدها. القاعدة الثانية: العبرة في العقود بالمقاصد والمعاني لا بالألفاظ والمباني. القاعدة الثالثة: العادة مُحَكَّمة. القاعدة الرابعة: التعيين بالعرف كالتعيين بالنص. القاعدة الخامسة: المعروف عرفًا كالمشروط شرطًا. القاعدة السادسة: الممتنع عادة كالممتنع حقيقة. القاعدة السابعة: اليقين لا يزول بالشك. القاعدة الثامنة: الأصل بقاء ما كان على ما كان. القاعدة التاسعة: الأصل براءة الذمة. القاعدة العاشرة: الأصل في العقود والشروط الصحة واللزوم. القاعدة الحادية عشرة: الأصل في الصفات العارضة العدم. القاعدة الثانية عشرة: الأصل إضافة الحادث إلى أقرب أوقاته. القاعدة الثالثة عشرة: لا ينسب إلى ساكت قول، لكن السكوت في معرض الحاجة إلى البيان بيان. القاعدة الرابعة عشرة: لا عبرة بالدلالة في مقابلة التصريح. القاعدة الخامسة عشرة: لا عبرة بالظن البين خطؤه. القاعدة السادسة عشرة:
    الضرر يزال. القاعدة السابعة عشرة: الضرر لا يزال بمثله. القاعدة الثامنة عشرة: يُدفع الضرر الأشد بالضرر الأخف. القاعدة التاسعة عشرة: درء المفاسد مقدم على جلب المصالح. القاعدة العشرون: إذا تعارض المانع والمقتضي قُدِّم المانع. القاعدة الحادية والعشرون: المشقة تجلب التيسير. القاعدة الثانية والعشرون: الضرورات تقدر بقدرها. القاعدة الثالثة والعشرون: الاضطرار لا يُبطل حق الغير. القاعدة الرابعة والعشرون: الأصل في الكلام الحقيقة. القاعدة الخامسة والعشرون: إعمال الكلام أولى من إهماله. القاعدة السادسة والعشرون: المطلق يجري على إطلاقه؛ ما لم يقم دليل التقييد نصًّا أو دلالة. القاعدة السابعة والعشرون: الوصف في الحاضر لغو وفي الغائب معتبر. القاعدة الثامنة والعشرون: التابع تابع. القاعدة التاسعة والعشرون: يُغتفر في التوابع ما لا يُغتفر في غيرها. القاعدة الثلاثون: يُغتفر في البقاء ما لا يُغتفر في الابتداء. القاعدة الحادية والثلاثون: إذا سقط الأصل سقط الفرع. القاعدة الثانية والثلاثون: لا مساغ للاجتهاد في مورد النص. القاعدة الثالثة والثلاثون: على اليد ما أخذت حتى تؤديه. القاعدة الرابعة والثلاثون: الخراج بالضمان.
    القاعدة الخامسة والثلاثون: ما لا يتم الواجب إلا به فهو واجب. القاعدة السادسة والثلاثون: إذا زال المانع عاد الممنوع. القاعدة السابعة والثلاثون: ما ثبت لعذر يزول بزواله. القاعدة الثامنة والثلاثون: الساقط لا يعود. القاعدة التاسعة والثلاثون: إذا تعذَّر الأصل يُصار إلى البدل. القاعدة الأربعون: من سعى في نقض ما تمَّ من جهته فسعيه مردودٌ عليه. القاعدة الحادية والأربعون: الجهل بالحكم ليس عذرًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
  verified: false
- article_ref: المادة الحادية والعشرون بعد السبعمائة
  article_text_ar: يُعمل بهذا النظام بعد مضي (مائة وثمانين) يومًا من تاريخ نشره في الجريدة الرسمية، ويُلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/655fdb42-8c96-422b-b8c4-b04f0095c94c/1
