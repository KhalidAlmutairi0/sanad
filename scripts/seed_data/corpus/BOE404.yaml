articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا الترتيبات- المعاني المبينة أمام كل منها: المركز: المركز الوطني للمناهج. الترتيبات: الترتيبات التنظيمية للمركز. المجلس: مجلس إدارة المركز. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للمركز. الوزير: وزير التعليم. الوزارة: وزارة التعليم. الهيئة: هيئة تقويم التعليم والتدريب. التعليم العام: جميع المراحل التعليمية إلى نهاية المرحلة الثانوية أو ما يعادلها. المناهج: مناهج التعليم العام، وتشمل سياسات ووثائق ومعايير وأطر المناهج، والمواد التعليمية، والمقررات الدراسية، والمحتوى التعليمي بمختلف أنواعه ووسائله وأدوات واستراتيجيات تقديمه، وأدلة استخدام المناهج، وأي وثائق أو مواد تعليمية يقرر المجلس اعتبارها ضمن مناهج التعليم العام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية، وبالاستقلال المالي والإداري، ويرتبط تنظيميًّا بالوزير. يكون مقر المركز الرئيس في مدينة الرياض. ويجوز إنشاء فروع أو مكاتب له داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يهدف المركز إلى تحقيق ما يأتي: تطوير المناهج تطويرًا يستجيب لمتطلبات التنمية والمستهدفات الوطنية وفق أحدث النظريات، والنماذج، والأساليب العلمية والتربوية، وبما يراعي الثوابت الإسلامية والرؤى والتوجهات الوطنية، ووفق أفضل الممارسات الدولية. أن يكون بيتَ خبرة وطنية ومرجعية علمية وبحثية رائدة لعمليات تطوير المناهج على المستويين الإقليمي والدولي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات ومسؤوليات الجهات الحكومية الأخرى، للمركز -في سبيل تحقيق أهدافه- القيام بالمهمات والاختصاصات الآتية: اقتراح مشروع الاستراتيجية الوطنية للمناهج، ورفعه وفقًا للإجراءات النظامية. إقرار الإطار الوطني للمناهج بالتنسيق مع الوزارة والهيئة وغيرهما من الجهات ذات العلاقة، ومتابعة تنفيذه بعد إقراره. وضع السياسات والخطط والبرامج والأدوات الهادفة إلى تطوير المناهج في المملكة، بالتنسيق مع الجهات ذات العلاقة. بناء معايير المناهج بالتنسيق مع الوزارة والهيئة، واعتمادها، وتحديثها دوريًّا. إعداد المناهج وبناؤها وتخطيطها وتصميمها وتطويرها ومراجعتها واعتمادها والترخيص لها. بناء الخطط الدراسية للتعليم العام، وتحديد الأوزان النسبية للمناهج (المواد التعليمية) في التعليم العام بالاتفاق مع الوزارة. مواءمة المناهج مع مناهج ما بعد التعليم العام، ومع متطلبات سوق العمل ومهارات المستقبل. اعتماد ومراجعة مناهج الهوية الوطنية (الدراسات الإسلامية واللغة العربية والعلوم الاجتماعية) للمدارس الخاصة والأهلية التي تطبق مناهج دولية، وللمدارس الأجنبية، بالتنسيق مع الوزارة. إنشاء مراكز بحثية
    وتطويرية تخصصية ترتبط به تنظيميًّا لتتولى تنفيذ بعض اختصاصاته ومهماته. التواصل مع الجهات الحكومية والخاصة وغير الربحية داخل المملكة وخارجها وإبرام مذكرات التفاهم والتعاون معها، وذلك وفق الإجراءات النظامية؛ بما يخدم أهدافه والغايات التي أنشئ من أجلها. التعاون مع المؤسسات الخاصة وغير الربحية الرائدة والمتخصصة في النشر والخدمات التعليمية داخل المملكة وخارجها، وذلك بما يخدم أهدافه والغايات التي أنشئ من أجلها. تنظيم المنتديات والمؤتمرات، وعقد الندوات، وورش العمل المحلية والإقليمية والدولية، التي تعنى بتطوير المناهج، وفق الإجراءات النظامية المتبعة. تمثيل المملكة في المنظمات الدولية والمؤتمرات واللقاءات ذات العلاقة باختصاصاته بعد موافقة الجهات المعنية. رصد وتحليل المؤشرات والتقارير، التي لها أثر على المناهج في المملكة، الصادرة عن منظمات عالمية معتبرة، والعمل على الارتقاء بترتيب المملكة فيها، وذلك بالتعاون مع الجهات ذات العلاقة. إصدار المجلات والدوريات والأدلة الإرشادية والنشرات والبحوث ذات العلاقة بمهماته ونشاطه. بناء وعقد شراكات استراتيجية مع المنظمات وبيوت الخبرة والمراكز المحلية والدولية
    المعنية بتطوير المناهج. بناء قاعدة بيانات خاصة بالمناهج الدراسية السعودية، توضح مدى التقدم المنجز في بناء تلك المناهج وتطويرها. استطلاع ورصد آراء العموم -عبر الوسائل المختلفة- فيما يتعلق بإعداد وتطوير المناهج.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمركز مجلس إدارة يشكل برئاسة الوزير، وعضوية كل من: أ- نائب وزير التعليم للتعليم العام. ب- نائب وزير الثقافة. ج- نائب وزير الرياضة. د- نائب وزير الاقتصاد والتخطيط. هـ- نائب رئيس هيئة حقوق الإنسان. و- رئيس هيئة تقويم التعليم والتدريب. ز- محافظ هيئة تنمية البحث والتطوير والابتكار. ح- أحد أعضاء مجلس شؤون الجامعات. ط- ممثل من القطاع الخاص أو غير الربحي في مجال التعليم الخاص أو الأهلي. ي- عضو من ذوي الخبرة والاختصاص في مجال عمل المركز يعين الأعضاء المنصوص عليهم في الفقرات (ح) و (ط) و (ي) من الفقرة (1) بأمر من رئيس مجلس الوزراء بناءً على اقتراح من الرئيس، وتكون مدة عضويتهم (ثلاث) سنوات قابلة للتجديد لمرة واحدة. يختار الرئيس نائبًا له من بين الأعضاء من ممثلي الجهات الحكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العُليا للمركز، ويتولى الإشراف عليه ويصرف أموره، وله -في حدود أحكام الترتيبات- اتخاذ جميع القرارات اللازمة لتحقيق أهدافه، وله على وجه الخصوص ما يأتي: الموافقة على مشروع الاستراتيجية الوطنية للمناهج ورفعه وفقًا للإجراءات النظامية. إقرار الإطار الوطني للمناهج. إقرار السياسات والأطر والمعايير واللوائح المنظمة الخاصة بالمناهج. اعتماد اللوائح واتخاذ القرارات اللازمة لتنفيذ اختصاصات المركز. إقرار السياسات العامة للمركز وخطة عمله والبرامج التي يسير عليها لتحقيق أغراضه، ومتابعة تنفيذها. إقرار هيكل المركز التنظيمي ودليله التنظيمي. إقرار اللوائح المالية والإدارية التي يسير عليها المركز وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونه، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية والاجتماعية، وأن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية. الموافقة على إنشاء فروع أو مكاتب للمركز. إقرار إنشاء مراكز بحثية وتطويرية تخصصية تابعة للمركز لتتولى تنفيذ بعض اختصاصاته ومهماته، وتنظيم
    اختصاصاتها ومهماتها وآليات عملها، وترتيب أوضاعها المالية والإدارية وتكون ميزانية تلك المراكز من ضمن الميزانية المخصصة للمركز. إقرار المقابل المالي للخدمات والتراخيص التي يقدمها المركز. النظر في التقارير الدورية التي يرفعها الرئيس التنفيذي عن سير عمل المركز. الموافقة على مشروع ميزانية المركز، وحسابه الختامي، وتقرير مراجع حساباته، وتقريره السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. قبول المنح والتبرعات والهبات والوصايا والأوقاف، وفقًا للأحكام النظامية المنظمة لذلك. تعيين مراجع حسابات خارجي (أو أكثر)، ومراقب مالي داخلي. تقويم أداء المركز، ومتابعته، واتخاذ الإجراءات التصحيحية اللازمة إذا تطلب الأمر ذلك. وللمجلس -في سبيل ممارسة اختصاصاته- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها ما يراه من مهمات، ويحدَّد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس كذلك تفويض بعض اختصاصاته إلى الرئيس أو إلى من يراه من أعضائه أو من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجتمع المجلس بدعوة من الرئيس (أربع) مرات سنويًّا على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو إذا طلب ذلك ثلث الأعضاء على الأقل. توجه الدعوة إلى حضور اجتماع المجلس -كتابة- قبل موعد الاجتماع (بسبعة) أيام على الأقل. ويجب أن تتضمن الدعوة جدول الأعمال. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء -على الأقل- بمن فيهم الرئيس أو نائبه، وتصدر قرارات المجلس بأغلبية أصوات الأعضاء الحاضرين، وفي حال تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الاجتماع. لا يجوز لأي عضو من أعضاء المجلس الامتناع عن التصويت ولا تفويض عضو آخر في التصويت نيابة عنه عند غيابه. على العضو الإفصاح عن أي تعارض مصالح في موضوع مدرج في جدول أعمال المجلس. يجوز للمجلس -عند الحاجة وفي الحالات المستعجلة ووفقًا لما يقدره الرئيس- عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية، ويمكن أن تتخذ القرارات عن طريق التمرير على أعضاء المجلس، ويوقع عليها بما يفيد اطلاع جميع الأعضاء عليها، ولا تعد القرارات الصادرة بهذه الطريقة صحيحة ما لم تمرر على جميع الأعضاء ويصوتوا عليها جميعًا وتحصل
    على أغلبية أصواتهم على الأقل، وتعرض هذه القرارات على المجلس في أول اجتماع لاحق لإثباتها في محضر الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقع عليها رئيس الاجتماع وأعضاؤه الحاضرون. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. للمجلس دعوة من يرى من أهل الاختصاص والخبرة لحضور اجتماعاته، وتقديم المعلومات والرأي والمشورة، دون أن يكون لهم حق التصويت. لا يجوز للعضو أن يفشي شيئًا مما وقف عليه من أسرار المركز حتى بعد انتهاء عضويته. تعقد اجتماعات المجلس في مقر المركز الرئيس، ويجوز -بموافقة من الرئيس- عقد الاجتماع في أي مكان آخر داخل المملكة. ويكون للمجلس أمين من منسوبي المركز أو من غيرهم يختاره المجلس -بناء على ترشيح الرئيس- وتحدد بقرار من المجلس مهماته وصلاحياته ومزاياه المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمركز رئيس تنفيذي، يعين ويعفى بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية الأخرى، وهو المسؤول التنفيذي عن إدارة شؤون المركز، وتسيير أعماله ومسؤولياته في حدود ما تنص عليه الترتيبات واللوائح الصادرة بموجبها وما يقرره المجلس، ويمارس الاختصاصات الآتية: اقتراح ما يلزم في شأن مشروع الاستراتيجية الوطنية للمناهج، ورفعه إلى المجلس للنظر في اعتماده. اقتراح مشروع الإطار الوطني للمناهج، ورفعه إلى المجلس لإقراره. اقتراح السياسات والأطر والمعايير واللوائح المنظمة الخاصة بالمناهج، ورفعها إلى المجلس لإقرارها. اقتراح السياسات العامة للمركز، وخطة العمل والبرامج التي يسير عليها المركز لتحقق أهدافه، ورفعها إلى المجلس لإقرارها. اقتراح اللوائح والمشاريع والبرامج اللازمة في إطار تنفيذ اختصاصات المركز، ورفعها للمجلس للنظر في اعتمادها. اقتراح الهيكل والدليل التنظيميين للمركز، ولوائحه الإدارية والمالية واللوائح اللازمة لتسيير العمل فيه، ورفعها إلى المجلس للنظر في إقرارها، والإشراف على تنفيذها بعد إقرارها. الإشراف على سير عمل المركز، والعاملين فيه، وفقًا للصلاحيات المنوطة به وما تحدده
    لوائح المركز. الصرف من ميزانية المركز، واتخاذ جميع الإجراءات المالية، وفقًا للأنظمة واللوائح، وفي حدود الصلاحيات التي يفوضه بها المجلس. الإشراف على إعداد تقرير المركز السنوي ومشروع ميزانيته وحسابه الختامي؛ تمهيدًا لعرضها على المجلس. تمثيل المركز أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى المعنية، وغيرها من الجهات داخل المملكة وخارجها. وله تفويض غيره بذلك. إعداد تقارير دورية عن أعمال المركز وإنجازاته ونشاطاته والمعوقات التي يواجهها، ورفعها إلى المجلس؛ تمهيدًا لاستكمال ما يلزم في شأنها. التوقيع على الاتفاقيات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات الممنوحة له من المجلس، ووفقًا للإجراءات النظامية المتبعة. تعيين منسوبي المركز وفقًا للوائح المنظمة لذلك، والإشراف عليهم، وإنهاء خدماتهم؛ طبقًا للصلاحيات الممنوحة له وما تحدده لوائح المركز. التعاقد مع الخبراء والمختصين والمستشارين في المجالات ذات العلاقة بعمل المركز. تقديم المقترحات والتوصيات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. اقتراح الخدمات والتراخيص التي يمكن للمركز تقديمها والمقابل المالي لتلك الخدمات والرفع
    عن ذلك إلى المجلس؛ للنظر في إقرارها. متابعة تنفيذ القرارات ذات الصلة بأعمال المركز. إعداد مؤشرات لقياس أداء المركز، ورفعها إلى المجلس لاعتمادها. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى من يراه من منسوبي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد المركز مما يأتي: أ- الاعتمادات المالية التي تخصص له في ميزانية الدولة. ب- المقابل المالي الذي يتقاضاه نظير تقديم الخدمات والتراخيص التي يصدرها. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف. د- الموارد الأخرى التي يقرها المجلس بما لا يتعارض مع الأنظمة والتعليمات. تودع أموال المركز في حساب جاري وزارة المالية في البنك المركزي السعودي. يفتح المركز حسابًا له في البنك المركزي السعودي، ويجوز له فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المركز ولوائحه المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يسري على منسوبي المركز نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يكون للمركز ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للمركز هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات المركز ومعاملاته وبياناته وميزانياته السنوية وحسابه الختامي، ويحدد المجلس أتعابه، ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يرفع المركز إلى رئيس مجلس الوزراء -خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية- تقريرًا سنويًّا عما حققه من إنجازات وما واجهه من صعوبات وما يراه من مقترحات لتحسين سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يرفع المركز إلى رئيس مجلس الوزراء حسابه الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تنشر هذه الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/abfdc6be-18f4-4daf-ac9b-b13600b9691e/1
  verified: false
