regulation:
  code: GOVPROC
  name_ar: نظام المنافسات والمشتريات الحكومية
  name_en: Government Tenders and Procurement Law
  authority: Ministry of Finance
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يهدف هذا النظام إلى: أ - تنظيم إجراءات المنافسات والمشتريات التي تقوم بها الجهات الحكومية ومنع تأثير المصالح الشخصية فيها، وذلك حماية للمال العام .ب - تحقيق أقصى درجات الكفاية الاقتصادية للحصول على المشتريات الحكومية وتنفيذ مشروعاتها بأسعار تنافسية عادلة .ج - تعزيز النزاهة والمنافسة، وتوفير معاملة عادلة للمتعهدين والمقاولين؛ تحقيقًا لمبدأ تكافؤ الفرص .د - تحقيق الشفافية في جميع مراحل إجراءات المنافسات والمشتريات الحكومية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتعامل الجهات الحكومية عند تنفيذ منافساتها وتوفير مشترياتها مع الأفراد والمؤسسات والشركات المرخص لهم بمزاولة العمل الذي تقع في نطاقه الأعمال طبقًا للأنظمة والقواعد المتبعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: مع مراعاة ما ورد في نظام الاستثمار الأجنبي ، يعطى جميع الأفراد والمؤسسات والشركات الراغبين في التعامل مع الحكومة ممن تتوافر فيهم الشروط التي تؤهلهم لهذا التعامل فرصًا متساوية ويعاملون على قدم المساواة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: توفر للمتنافسين المعلومات الواضحة الكاملة والموحدة عن العمل المطلوب ، ويمكنون من الحصول على هذه المعلومات في وقت محدد ، كما توفر نسخ كافية من وثائق المنافسة لتلبية طلبات الراغبين في الحصول عليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: تكون الأولوية في التعامل للمصنوعات والمنتجات والخدمات الوطنية وما يعامل معاملتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تطرح جميع الأعمال والمشتريات الحكومية في منافسة عامة عدا ما يستثنى من المنافسة بموجب أحكام هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: أ - يعلن عن جميع المنافسات الحكومية في الجريدة الرسمية وفي صحيفتين محليتين ، وبالوسائل الإعلانية الإلكترونية وفقًا لما تحدده اللائحة التنفيذية لهذا النظام ، ويجب أن يحدد في الإعلان عن المنافسة موعد تقديم العروض وفتح المظاريف ومكانهما .ب - الأعمال أو المشاريع ذات الطبيعة الخاصة التي لا يتوفر لها متعهد أو مقاول داخل المملكة يتم الإعلان عنها خارج المملكة بالإضافة إلى الإعلان عنها في الداخل وفقًا لما تضمنته الفقرة السابقة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: لا يجوز قبول العروض والتعاقد بموجبها إلا طبقًا للشروط والمواصفات الموضوعة لها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجب أن يتم الشراء وتنفيذ الأعمال والمشاريع بأسعار عادلة لا تزيد على الأسعار السائدة ، وتعد المنافسة الوسيلة العملية للوصول إلى ذلك وفق الأحكام الواردة في هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تقدم العروض في مظاريف مختومة في الموعد والمكان المحددين لقبولها . ولا يجوز قبول العروض التي تقدم أو تصل إلى الجهة الحكومية بعد انتهاء الموعد المحدد لتقديمها. ويجوز تقديم العروض وفتحها عن طريق الوسائل الإلكترونية وفقًا لما تحدده اللائحة التنفيذية لهذا النظام ، وتعلن الجهة الحكومية عن أسماء الشركات والمؤسسات التي تقدمت بعروضها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'يقدم مع العرض ضمان ابتدائي يتراوح من (1%) إلى (2%) (من واحد إلى اثنين في المائة) من قيمته وفقًا لشروط المنافسة ، ولا يلزم تقديم هذا الضمان في الحالات التالية : أ - الشراء المباشر (إلا إذا كانت العروض مغلقة) .ب - تعاقدات الجهات الخاضعة لأحكام هذا النظام فيما بينها ، وفي التعاقد مع الجمعيات الخيرية والجمعيات ذات النفع العام ، بشرط تنفيذها الأعمال بنفسها .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: أ - تكون مدة سريان العروض في المنافسات العامة تسعين يومًا من التاريخ المحدد لفتح المظاريف ، فإن سحب مقدِّم العرض عرضه قبل انتهاء هذه المدة فلا يعاد له ضمانه الابتدائي .ب - لا يجوز تمديد مدة سريان العرض والضمان الابتدائي إلا بموافقة مقدِّم العرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجب أن تحدد الأسعار الإجمالية وما يرد عليها من زيادة أو تخفيض في خطاب العرض الأصلي . ولا يعتد بأي تخفيض يقدم بوساطة خطاب مستقل حتى لو كان مرافقًا للعرض .ولا يجوز للمتنافسين في غير الحالات التي يجوز التفاوض فيها وفقًا لأحكام هذا النظام تعديل أسعار عروضهم بالزيادة أو التخفيض بعد تقديمها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تكوّن لجنة أو أكثر لدى الجهة الحكومية لفتح المظاريف لا يقل عدد أعضائها عن ثلاثة إضافة إلى رئيسها الذي لا تقل مرتبته عن العاشرة أو ما يعادلها . وينص في التكوّين على عضو احتياطي يكمل النصاب إن غاب أحد الأعضاء . ويعاد تكوّين اللجنة كل ثلاث سنوات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تفتح المظاريف بحضور جميع أعضاء لجنة فتح المظاريف في الموعد المحدد لذلك . وتعلن على من حضر من المتنافسين أو مندوبيهم الأسعار الواردة في العروض ، ويجب على هذه اللجنة إحالة محضرها وأوراق المنافسة إلى لجنة فحص العروض خلال سبعة أيام من تاريخ فتح المظاريف .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: أ - تكوّن في الجهة الحكومية لجنة أو أكثر لفحص العروض تتكون من ثلاثة أعضاء على الأقل إضافة إلى رئيسها الذي لا تقل مرتبته عن الثالثة عشرة أو ما يعادلها ، على أن يكون من بينهم المراقب المالي ومن هو مؤهل تأهيلًا نظاميًّا . ويُنص في التكوّين على عضو احتياطي يكمل النصاب إن غاب أحد الأعضاء ، وتتولى هذه اللجنة تقديم توصياتها في الترسية على أفضل العروض وفقًا لأحكام هذا النظام ولائحته التنفيذية ، ولها أن تستعين في تقديم توصياتها بتقرير من فنيين متخصصين . ب - يعاد تكوين اللجنة كل سنة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: لا يجوز الجمع بين رئاسة لجنة فحص العروض وصلاحية البت في المنافسة ، كما لا يجوز الجمع بين رئاسة لجنة فتح المظاريف ورئاسة لجنة فحص العروض أو العضوية فيهما .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: يجوز أن يرأس لجنة فحص العروض موظف لا تقل مرتبته عن العاشرة أو ما يعادلها ، إذا كانت مُشكَّلة في غير مقر الجهة الرئيس .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تتخذ اللجنة توصياتها بحضور كامل أعضائها ، وتدون هذه التوصيات في محضر ، ويوضح الرأي المخالف إن وجد ، وحجة كلا الرأيين ، ليعرض على صاحب الصلاحية للبت في الترسية بما يتفق مع أحكام هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: يجب على الجهة الحكومية البت في العروض واعتماد الترسية خلال المدة المحددة لسريان العروض المشار إليها في المادة الثانية عشرة ، وبعد انتهاء هذه المدة تتخذ الإجراءات اللازمة لإعادة الضمانات الابتدائية لأصحابها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: 'يجوز للجنة فحص العروض التفاوض مع صاحب أقل عرض مطابق للشروط والمواصفات ثم مع من يليه من المتنافسين في الحالتين التاليتين : أ - إذا ارتفعت العروض عن أسعار السوق بشكل ظاهر تحدد اللجنة مبلغ التخفيض بما يتفق مع أسعار السوق ، وتطلب كتابيًّا من صاحب العرض الأقل تخفيض سعره . فإن امتنع أو لم يصل بسعره إلى المبلغ المحدد ، تتفاوض مع العرض الذي يليه وهكذا . فإن لم يتم التوصل إلى السعر المحدد تلغى المنافسة ، ويعاد طرحها من جديد . ب - إذا زادت قيمة العروض على المبالغ المعتمدة للمشروع ، يجوز للجهة الحكومية إلغاء بعض البنود أو تخفيضها للوصول إلى المبالغ المعتمدة بشرط أن لا يؤثر ذلك على الانتفاع بالمشروع أو ترتيب العروض وإلا تُلغى المنافسة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: لا يجوز استبعاد أي عرض بحجة تدني أسعاره إلا إذا قل بنسبة (35%) خمسة وثلاثين في المائة فأكثر عن تقديرات الجهة الحكومية والأسعار السائدة ، ويجوز للجنة فحص العروض بعد مناقشة صاحب العرض وإجراء التحليل المالي والفني ووصولها إلى قناعة بمقدرة صاحب العرض على تنفيذ العقد التوصية بعدم استبعاد العرض .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجوز للجنة فحص العروض التوصية باستبعاد أي عرض من العروض من المنافسة حتى لو كان أقل العروض سعرًا ، إذا تبين أن لدى صاحب العرض عددًا من المشاريع ورأت اللجنة أن حجم التزاماته التعاقدية قد أصبح مرتفعًا على نحو يفوق قدراته المالية أو الفنية بما يؤثر على تنفيذه لالتزاماته التعاقدية ، وفي هذه الحالة تتفاوض مع العطاء الذي يليه وفقًا لقواعد التفاوض المحددة في هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: إذا لم يقدم للمنافسة إلا عرض واحد ، أو قدمت عدة عروض واتضح أنها غير مطابقة للشروط والمواصفات - عدا عرض واحد - فلا يجوز قبول هذا العرض إلا إذا كانت أسعاره مماثلة للأسعار السائدة ، وكانت حاجة العمل لا تسمح بإعادة طرح المنافسة مرة أخرى ، وذلك بعد موافقة الوزير المختص أو رئيس الدائرة المستقلة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 'مع مراعاة ما ورد في المادتين (الحادية والعشرين) و(الرابعة والعشرين) من هذا النظام : أ - لا يجوز إلغاء المنافسة إلا للمصلحة العامة ، أو لمخالفة إجراءاتها أحكام النظام ، أو لوجود أخطاء جوهرية مؤثرة في الشروط أو المواصفات ، وتكون صلاحية الإلغاء للوزير المختص أو رئيس الدائرة المستقلة . ب - ترد لأصحاب العروض قيمة وثائق المنافسة في حالة الإلغاء لأسباب تعود للجهة الحكومية .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: تكون صلاحية البت في المنافسة وتنفيذ الأعمال للوزير أو رئيس الدائرة المستقلة ، ويجوز له التفويض للمسئولين بما لا يزيد على ثلاثة ملايين ريال ، على أن يكون التفويض متدرجًا بحسب مسئولية الشخص المفوض .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: تصاغ العقود ووثائقها وملحقاتها باللغة العربية . ويجوز استخدام لغة أخرى إلى جانب العربية ، على أن تكون اللغة العربية هي اللغة المعتمدة في تفسير العقد وتنفيذه وتحديد مواصفاته ومخططاته والمراسلات المتعلقة به .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: أ - لا تتجاوز مدة تنفيذ عقود الخدمات ذات التنفيذ المستمر ، كالصيانة والنظافة والتشغيل والإعاشة ، خمس سنوات . ويجوز زيادة هذه المدة للعقود التي تتطلب ذلك بعد موافقة وزارة المالية .ب - يجب في عقود مشاريع الأشغال العامة أن تتناسب المدة المحددة لتنفيذ المشروع مع كمية الأعمال وطبيعتها ، ومع الاعتمادات السنوية المخصصة للصرف على المشروع .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: تلتزم الجهات الحكومية عند إعداد عقودها باستخدام نماذج العقود التي تعتمد وفقًا لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: أ - يحرر العقد بين الجهة الحكومية ومن رست عليه الأعمال بعد إبلاغه بالترسية وتقديم خطاب الضمان النهائي .ب - يسلم موقع العمل للمتعاقد خلال ستين يومًا من تاريخ اعتماد الترسية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يجوز للجهة الحكومية الاكتفاء بالمكاتبات المتبادلة بدلًا من تحرير العقد إذا كانت قيمة العقد ثلاثمائة ألف ريال فأقل .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: تلتزم جميع الجهات والمصالح والهيئات والمؤسسات الحكومية بعرض عقودها التي تزيد مدة تنفيذها على سنة وتبلغ قيمتها خمسة ملايين ريال فأكثر على وزارة المالية لمراجعتها قبل توقيعها . وعلى وزارة المالية إنهاء المراجعة خلال أسبوعين من تاريخ ورود العقد ، فإن لم ترد الوزارة خلال هذه المدة عُدَّت مُوافِقَةً .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: أ - يجب على من تتم الترسية عليه أن يقدم ضمانًا نهائيًّا بنسبة (5%) خمسة في المائة من قيمة العقد خلال عشرة أيام من تاريخ الترسية ، ويجوز تمديد هذه المدة لفترة مماثلة ، وإن تأخر عن ذلك فلا يعاد له الضمان الابتدائي ، ويتم التفاوض مع العرض الذي يليه وفقًا لأحكام هذا النظام .ب - لا يلزم تقديم الضمان النهائي في حالة الشراء المباشر ما لم تر الجهة الحكومية المتعاقدة ضرورة إلى ذلك . وتعفى من تقديم الضمان النهائي الجهات الخاضعة لأحكام هذا النظام والمؤسسات العامة والشركات التي تساهم الحكومة فيها بنسبة لا تقل عن (51%) واحد وخمسين في المائة من رأس مالها ، والجمعيات الخيرية والجمعيات ذات النفع العام بشرط تنفيذها الأعمال بنفسها.ج - يجب الاحتفاظ بالضمان النهائي حتى ينفِّذ المتعاقد التزاماته ، وفي عقود الأشغال العامة حتى انتهاء فترة الصيانة وتسلم الأعمال نهائيًّا .د - يتم تخفيض الضمان النهائي في العقود ذات التنفيذ المستمر سنويًّا بحسب تنفيذ الأعمال ، بشرط ألا يقل الضمان عن (5%) خمسة في المائة من قيمة الأعمال المتبقية من العقد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: 'تقبل الضمانات إذا كانت وفق أحد الأشكال التالية : أ - خطاب ضمان بنكي من أحد البنوك المحلية .ب - خطاب ضمان بنكي من بنك في الخارج يقدم بوساطة أحد البنوك المحلية العاملة في المملكة .ج - تأمين نقدي إلى جانب الضمان البنكي في الحالات الخاصة بتأمين الإعاشة أو التي تتطلب تأمينًا عاجلًا بما لا يتجاوز تكلفة الإعاشة أو الأعمال لمدة ثلاثة أيام .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: توضح اللائحة التنفيذية لهذا النظام شروط الضمانات البنكية والمالية وأحكامها ونماذجها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يجوز للجهة الحكومية زيادة التزامات المتعاقد ضمن نطاق العقد بما لا يتجاوز (10%) عشرة في المائة من القيمة الإجمالية للعقد ، أو تخفيض هذه الالتزامات بما لا يتجاوز (20%) عشرين في المائة . وتوضح اللائحة التنفيذية الضوابط اللازمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: تدفع قيمة العقود بالريال السعودي . ويجوز أن تدفع بأي عملة أخرى بعد التنسيق مع وزارة المالية . وينص في شروط المنافسة على العملة التي يقدم بها العرض ، على أنه لا يجوز دفع قيمة العقد بأكثر من عملة واحدة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يجوز للجهة الحكومية أن تدفع للمتعاقد معها دفعة مقدمة من استحقاقه بنسبة (5%) خمسة في المائة من القيمة الإجمالية للعقد ، بشرط ألا تتجاوز قيمة الدفعة مبلغ خمسين مليون ريال أو ما يعادلها مقابل ضمان بنكي مساوٍ لهذه القيمة ، وينص على الدفعة المقدمة ، إن وجدت ، في الشروط والمواصفات عند طرح المنافسة ، وتحسم هذه الدفعة من مستخلصات المتعاقد على أقساط ابتداءً من المستخلص الأول ، وفقًا للضوابط الموضحة في اللائحة التنفيذية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: تصرف مستحقات المقاول على دفعات طبقًا لما يتم إنجازه من عمل بموجب المستخلصات التي تعتمدها الجهة الحكومية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يصرف المستخلص الأخير الذي يجب ألا يقل عن (10%) عشرة في المائة في عقود الأشغال العامة وعن (5%) خمسة في المائة في العقود الأخرى بعد تسليم الأعمال تسليمًا ابتدائيًّا ، أو توريد المشتريات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: يجوز للجهة الحكومية عند الحاجة وبعد الاتفاق مع وزارة المالية أن تنفذ بعض مشاريعها بحيث تسدد التكاليف على أقساط سنوية على أن تطرح مثل تلك الأعمال في منافسة عامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية والأربعون
  article_text_ar: تكون القيمة الإجمالية للعقد شاملة ومغطية جميع تكاليف تنفيذه وفقًا لشروطه ، بما في ذلك قيمة الرسوم والضرائب التي يدفعها المتعاقد . ولا يجوز الإعفاء منها أو إعفاء أرباح المتعاقدين مع الجهة الحكومية أو دُخول موظفيهم من الضريبة أو دفعها عنهم عدا ما استثني من ذلك بموجب نص نظامي خاص .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة والأربعون
  article_text_ar: 'عند تعديل التعريفة الجمركية أو الرسوم أو الضرائب أو المواد أو الخدمات المسعرة رسميًّا بالزيادة أو النقص - بعد تاريخ تقديم العرض - تزاد قيمة العقد أو تنقص - بحسب الأحوال - بمقدار الفرق . ويشترط لدفع الفرق الناتج عن الزيادة ما يلي : أ - أن يثبت المتعاقد أنه دفع التعريفة الجمركية أو الرسوم أو الضرائب أو المواد أو الخدمات المسعرة رسميًّا على أساس الفئات المعدلة بالزيادة نتيجة توريده مواد مخصصة لأعمال العقد . ب - ألا يكون تعديل التعريفة الجمركية أو الرسوم أو الضرائب أو المواد أو الخدمات المسعرة رسميًَّا قد صدر بعد انتهاء المدة المحددة لتنفيذ العقد . أو أن يكون تحمل المتعاقد لها نتيجة لتأخره في التنفيذ ، إلا إذا أثبت أن التأخير كان بسبب خارج عن إرادته .وفي كل الأحوال يخصم من المتعاقد مقدار الفرق في الرسوم أو الضرائب أو المواد أو الخدمات المسعرة رسميًّا بعد تخفيضها ما لم يثبت المتعاقد أنه أداها على أساس الفئات الأصلية قبل التعديل .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة والأربعون
  article_text_ar: يجوز توفير احتياجات الجهة الحكومية وتنفيذ أعمالها عن طريق الشراء المباشر في الحالات العاجلة ، على ألا تتجاوز قيمة الشراء مليون ريال .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة والأربعون
  article_text_ar: أ - عند تنفيذ الأعمال والمشتريات عن طريق الشراء المباشر يجب الحصول على ثلاثة عروض على الأقل ، وتفحص هذه العروض لجنةٌ يكونها الوزير المختص أو رئيس الدائرة المستقلة على ألا تتجاوز التكاليف السعر السائد في السوق .ب - تكون صلاحية البت في الشراء المباشر للوزير أو رئيس الدائرة المستقلة ، ولا يجوز له التفويض إلا في حدود خمسمائة ألف ريال .ج - الأعمال والمشتريات التي لا تزيد قيمتها على ثلاثين ألف ريال يتم توفيرها وفق الأسلوب الذي تراه الجهة الحكومية مناسبًا .د - يجوز للجهة الحكومية توفير احتياجاتها التي تتم بالشراء المباشر عن طريق الوسائل الإليكترونية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة والأربعون
  article_text_ar: لا تجوز تجزئة المشتريات أو الأعمال من أجل الوصول بها إلى صلاحية الشراء المباشر. كما لا تجوز تجزئة هذه الأعمال من أجل الوصول بها إلى صلاحية المسئولين المفوضين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة والأربعون
  article_text_ar: 'استثناءً من المنافسة العامة ، يجوز توفير احتياجات الجهات الحكومية من الأعمال والمشتريات التالي ذكرها وفقًا للأساليب المحددة لشرائها ، حتى لو تجاوزت تكلفتها صلاحية الشراء المباشر ، وهي : أ - الأسلحة والمعدات العسكرية وقطع غيارها بالشراء مباشرة من الشركات المنتجة ، ويتم اختيار أفضل العروض بما يحقق المصلحة العامة من قبل لجنة وزارية تكوّن بأمر ملكي لهذا الغرض من ثلاثة أعضاء على الأقل إضافة إلى رئيسها ثم تعرض توصياتها على رئيس مجلس الوزراء للموافقة عليها .ب - الأعمال الاستشارية والفنية والدراسات ووضع المواصفات والمخططات والإشراف على تنفيذها وخدمات المحاسبين والمحامين والمستشارين القانونيين ، عن طريق دعوة خمسة مكاتب متخصصة من المرخص لها بممارسة هذه الأعمال على الأقل ليقدم كل منهم عرضه خلال مدة تحددها الجهة ، وتتم الترسية وفقًا لأحكام المادة السادسة عشرة من هذا النظام .ج - قطع غيار الآلات الميكانيكية والكهربائية والإلكترونية والمعدات ، عن طريق دعوة ثلاثة متخصصين على الأقل ليقدم كل منهم عرضه خلال مدة تحددها الجهة ، ويُكَوِّن الوزير المختص أو رئيس الدائرة المستقلة لجنة الفحص هذه
    العروض ويختار أفضلها .د - السلع أو الإنشاءات أو الخدمات التي لا تتوافر إلا لدى متعهد أو مقاول أو منتج واحد ولم يكن لها بديل مقبول ، يتم توفيرها بالشراء المباشر بعد موافقة الوزير المختص أو رئيس الدائرة المستقلة ، وفقًا للإجراءات الموضحة في اللائحة التنفيذية .هـ - المستلزمات الطبية المطلوبة عاجلًا في حالات ظهور أوبئة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة والأربعون
  article_text_ar: إذا تأخر المتعاقد في تنفيذ العقد عن الموعد المحدد تفرض عليه غرامة تأخير لا تتجاوز (6%) ستة في المائة من قيمة عقود التوريد ، ولا تتجاوز (10%) عشرة في المائة من قيمة العقود الأخرى .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة والأربعون
  article_text_ar: إذا قصر المتعاقد في عقود الصيانة والتشغيل والعقود ذات التنفيذ المستمر في تنفيذ التزاماته ، تفرض عليه غرامة لا تتجاوز (10%) عشرة في المائة من قيمة العقد ، مع حسم قيمة الأعمال التي لم تنفذ .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخمسون
  article_text_ar: يتحمل المتعاقد تكاليف الإشراف على تنفيذ المشروع ، خلال مدة خضوعه لغرامة التأخير .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية والخمسون
  article_text_ar: يتم تمديد العقد والإعفاء من الغرامة باتفاق الجهة الحكومية المتعاقدة مع وزارة المالية إذا كان التأخير ناتجًا عن ظروف طارئة ، أو لسبب خارج عن إرادة المتعاقد ، بشرط أن تتناسب مدة التأخير مع هذه الأسباب .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية والخمسون
  article_text_ar: 'للوزير المختص أو رئيس الدائرة المستقلة تمديد العقد في الحالات التالية : أ - إذا كلف المتعاقد بأعمال إضافية على ما ورد في العقد ، بشرط أن تكون المدة المضافة متناسبة مع حجم الأعمال وطبيعتها وتاريخ التكليف بها .ب - إذا صدر أمر من الجهة الحكومية بإيقاف الأعمال أو بعضها لأسباب لا تعود للمتعاقد .ج - إذا كانت الاعتمادات المالية السنوية للمشروع غير كافية لإنجاز العمل في الوقت المحدد .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة والخمسون
  article_text_ar: 'يجوز للجهة الحكومية سحب العمل من المتعاقد ، ومن ثم فسخ العقد أو التنفيذ على حسابه مع بقاء حق الجهة في الرجوع على المتعاقد بالتعويض المستحق عما لحقها من ضرر بسبب ذلك في أي من الحالات التالية : أ - إذا ثبت أن المتعاقد قد شرع بنفسه أو بوساطة غيره بطريق مباشر أو غير مباشر في رشوة أحد موظفي الجهات الخاضعة لأحكام هذا النظام أو حصل على العقد عن طريق الرشوة. ب - إذا تأخر عن البدء في العمل أو تباطأ في تنفيذه أو أخلَّ بأي شرط من شروط العقد ولم يصلح أوضاعه خلال خمسة عشر يومًا من تاريخ إبلاغه كتابة بتصحيح الوضع . ج - إذا تنازل عن العقد أو تعاقد لتنفيذه من الباطن دون إذن خطي مسبق من الجهة الحكومية . د - إذا أفلس ، أو طلب إشهار إفلاسه ، أو ثبت إعساره ، أو صدر أمر بوضعه تحت الحراسة ، أو كان شركة وجرى حلها أو تصفيتها . هـ - إذا توفي المتعاقد وكانت مؤهلاته الشخصية محل اعتبار في التعاقد ، ويجوز للجهة الحكومية الاستمرار في التعاقد مع الورثة إذا توافرت الضمانات الفنية أو المالية الكافية لدى الورثة . وتوضح اللائحة التنفيذية الإجراءات اللازمة لما ورد في الفقرات السابقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة والخمسون
  article_text_ar: يجب على الجهة الحكومية تنفيذ العقد وفقًا لشروطه ، وإذا أخلت بتنفيذ التزاماتها بما في ذلك تأخير سداد المستحقات جاز للمتعاقد التقدم بهذه المطالبات أمام اللجنة المنصوص عليها في المادة (الثامنة والسبعين) من هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة والخمسون
  article_text_ar: يجوز للجهة الحكومية التنازل عما تستغني عنه من منقولات إلى الجهات الحكومية والجهات التدريبية التابعة لها على أن تشعر وزارة المالية بذلك . وتحيط الجهة المالكة للمنقولات الجهات الحكومية في المنطقة التي تقع فيها بأنواع الأصناف وكمياتها ، وتحدد لها مدة للإفصاح عن رغبتها فيها ، فإن لم ترد خلال تلك المدة جاز لها بيعها عن طريق المزايدة العامة إذا بلغت قيمتها التقديرية مائتي ألف ريال فأكثر ، ويعلن عنها طبقًا لقواعد الإعلان عن المنافسات العامة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة والخمسون
  article_text_ar: تباع الأصناف التي تقل قيمتها التقديرية عن مائتي ألف ريال ؛ إما بالمزايدة العامة ، أو بالطريقة التي تراها الجهة محققة لمصلحة الخزينة العامة ، بشرط أن تتيح المجال لأكبر عدد من المزايدين .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة والخمسون
  article_text_ar: إن كانت المزايدة بمظاريف مختومة ، يقدم المزايد مع عرضه ضمانًا ابتدائيًّا قدره (2%) اثنان في المائة من قيمة العرض . وعلى من ترسو عليه المزايدة زيادة ضمانه إلى (5%) خمسة في المائة ، ولا يفرج عنه إلا بعد تسديد كامل القيمة ونقل الأصناف التي اشتراها . ويعاد الضمان إلى من لم يرسُ عليه المزاد . وإن كانت المزايدة علنية يقدم من ترسو عليه المزايدة ضمانًا بواقع (5%) خمسة في المائة من قيمتها . ويجوز قبول الشيك المصرفي أو المبلغ النقدي ضمانات في المزايدة العلنية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة والخمسون
  article_text_ar: إن لم يتقدم أحد للمزايدة بعد الإعلان عنها ، يعلن عنها مرة أخرى . فإن لم يتقدم أحد للمرة الثانية ، فلصاحب الصلاحية الحق في دعوة مختصين في مجال الأصناف المراد بيعها وعرض بيعها عليهم . فإن لم يتم تقدم سعر مناسب جاز منحها للجمعيات الخيرية أو الجمعيات ذات النفع العام ، على أن تشعر وزارة المالية بذلك .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة والخمسون
  article_text_ar: للوزير أو رئيس الدائرة المستقلة صلاحية اعتماد ترسية المزايدات العامة في بيع المنقولات . ويجوز له التفويض فيما لا يزيد على مليون ريال ، على أن يكون التفويض متدرجًا بحسب مسئولية الشخص المفوض .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الستون
  article_text_ar: توضح اللائحة التنفيذية لهذا النظام إجراءات المزايدة وتكوين لجان البيع فيها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية والستون
  article_text_ar: فيما لم يرد فيه نص خاص ، يكون تأجير واستثمار العقارات التي تملكها الدولة - مما لم يسعر رسميًّا - عن طريق المزايدة العامة ، وفقًا للإجراءات الموضحة في اللائحة التنفيذية لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية والستون
  article_text_ar: يجوز للجهة الحكومية أن تؤجر عقارًا أو جزءًا منه مقابل إنشاء منشآت حسب شروط ومواصفات تضعها ، ثم تئول ملكية هذه المنشآت إلى الجهة الحكومية وفق ما تبينه اللائحة التنفيذية لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة والستون
  article_text_ar: يتم اعتماد ترسية المزايدات العامة في تأجير واستثمار العقارات الحكومية وفقًا لأحكام المادة (التاسعة والخمسين) من هذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة والستون
  article_text_ar: يجب أن يكون التعاقد على أساس شروط ومواصفات فنية دقيقة ومفصلة مطابقة للمواصفات القياسية المعتمدة ، أو المواصفات العالمية فيما ليس له مواصفات معتمدة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة والستون
  article_text_ar: يجب على الجهة الحكومية عند إعداد مواصفات وشروط المنافسة أن تكون محققة للمصلحة العامة ، وألا تكون معدة لتتطابق مع منتجات أو خدمات مماثلة لشركات أو موردين بعينهم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة والستون
  article_text_ar: لا يجوز التعاقد على أعمال غير محددة كمياتها وفئاتها ومواصفاتها في العقد . كما لا يجوز وضع مبالغ احتياطية في العقد لتنفيذ أعمال طارئة لم يتم التنافس عليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة والستون
  article_text_ar: يجوز للجهة الحكومية توفير بعض احتياجاتها بالاستئجار ، أو استبدال ما لديها من أجهزة ومعدات بأخرى جديدة ، وفقًا للضوابط التي تحددها اللائحة التنفيذية لهذا النظام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة والستون
  article_text_ar: للجهات الخاضعة لأحكام هذا النظام التعاقد فيما بينها بطريق الاتفاق المباشر ، بشرط تنفيذها الأعمال بنفسها . كما أن لهذه الجهات أن تنوب عن بعضها في مباشرة إجراءات التعاقد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة والستون
  article_text_ar: مع مراعاة الاتفاقيات والمعاهدات الدولية النافذة التي تكون المملكة طرفًا فيها ، يطبق هذا النظام ولائحته التنفيذية على جميع الأجهزة الحكومية والوزارات والمصالح والمؤسسات العامة والأجهزة ذات الشخصية المعنوية العامة المستقلة ؛ عدا الجهات التي لها نظام خاص ، فيطبق عليها هذا النظام فيما لم يُنظم في أنظمتها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السبعون
  article_text_ar: يخضع لأحكام هذا النظام المشروعات والأعمال التي تنفذها الجهات الحكومية خارج المملكة ، وبالنسبة لطلبات الاستثناء من أحكام هذا النظام في هذا الخصوص تتم دراسته من قبل وزارة المالية حسب ما تقتضيه ظروف تنفيذ هذه المشروعات وبما يحقق المصلحة العامة ويتم الرفع عن ذلك لرئيس مجلس الوزراء للبت فيه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية والسبعون
  article_text_ar: يتم التعاقد مع المصرح لهم بالعمل مباشرة ، ولا تجوز الوساطة في التعاقد . ولا يعد وسيطًا الموزع أو الوكيل المعتمد من المنتج الأصلي . وينفذ المتعاقد العمل بنفسه ، ولا يجوز له التنازل عنه أو عن جزء منه ، أو إنابة غيره في تنفيذه بغير إذن خطي سابق من الجهة المتعاقدة . ومع ذلك يبقى المتعاقد مسئولا بالتضامن مع المتنازل إليه أو المقاول من الباطن عن تنفيذ العقد .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثانية والسبعون
  article_text_ar: تعد وزارة المالية نماذج العقود ، بما يتفق وأحكام هذا النظام ، وترفعها إلى مجلس الوزراء للموافقة عليها .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثالثة والسبعون
  article_text_ar: على جميع العاملين في الجهات الحكومية المحافظة على سرية المعلومات المقدمة في العروض وعدم الإفصاح عنها للمتنافسين الآخرين أو غيرهم، باستثناء ما نص عليه في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الرابعة والسبعون
  article_text_ar: يجب على جميع الجهات الحكومية الإعلان عن نتائج المنافسات العامة والمشتريات الحكومية التي تتعاقد على تنفيذها وتزيد على مائة ألف ريال . وتحدد اللائحة التنفيذية أسلوب الإعلان وإجراءاته .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الخامسة والسبعون
  article_text_ar: كل مخالفة لأي حكم من أحكام هذا النظام تعرض الموظف المسئول عنها للمساءلة التأديبية ، وفقًا لأحكام نظام تأديب الموظفين وغيره من الأحكام الجزائية الأخرى المطبقة على العاملين في القطاعات الحكومية والمؤسسات العامة ، مع احتفاظ الجهة بالحق في إقامة الدعوى الجنائية أو المدنية على المخالف عند الاقتضاء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السادسة والسبعون
  article_text_ar: يضمن المتعاقد ما يحدث من تهدم كلي أو جزئي لما أنشأه خلال عشر سنوات من تاريخ تسليمه إياه للجهة الحكومية تسليمًا نهائيًّا متى كان ذلك ناشئًا عن عيب في التنفيذ ما لم يكن المتعاقدان قد اتفقا على بقاء المنشآت لمدة أقل من عشر سنوات .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة السابعة والسبعون
  article_text_ar: يجب على المتعاقدين والجهات الحكومية تنفيذ عقودهم وفقًا لشروطها وبحسن نية وبما يقتضيه حسن سير المرفق العام ومصلحته. وعلى الوزارات والمصالح الحكومية والأجهزة ذات الشخصية المعنوية المستقلة إبلاغ وزارة المالية بحالات الغش والتحايل والتلاعب فور اكتشافها، وكذلك تزويدها بالقرارات التي تتخذ في هذا الخصوص ، بما في ذلك قرارات سحب العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثامنة والسبعون
  article_text_ar: أ- يُكوِّن وزير المالية لجنة من مستشارين ، لا يقل عددهم عن ثلاثة ، من الوزارة والجهات الحكومية الأخرى ذات العلاقة بعد التنسيق مع تلك الجهات ، ويكون من بينهم مستشار قانوني وخبير فني ، ويرأس هذه اللجنة مستشار قانوني لا تقل مرتبته عن الثالثة عشرة أو ما يعادلها ، وينص في التكوّين على عضو احتياطي ، ويحدد مكافآت أعضائها وسكرتيرها . ويعاد تكوين هذه اللجنة كل ثلاث سنوات ، ويجوز تجديد عضويتها لمرة واحد فقط .ب - تتولى هذه اللجنة النظر في طلبات التعويض المقدمة من المقاولين والمتعهدين وكذلك بلاغات الغش والتحايل والتلاعب وقرارات سحب العمل والنظر في طلبات الجهات الحكومية التي ترد إلى وزير المالية بطلب منع التعامل مع المقاول الذي نفذ مشروعًا تنفيذًا معيبًا أو مخالفًا للشروط والمواصفات الموضوعة له . ج - يجب على هذه اللجنة سماع أقوال المتظلمين من المقاولين والمتعهدين ومن نسبت إليهم المخالفة ودفوعاتهم ووجهة نظر الجهة الحكومية في ذلك حضوريًّا أو كتابيًّا، ولها أن تستعين بمن تراه من المختصين الفنيين، وتصدر اللجنة قرارها -بحضور كامل أعضائها- بالإجماع أو بالأغلبية، ويوضح في محاضر اللجنة الرأي
    المخالف إن وجد، وحجة كلا الرأيين. د - إذا ثبت لدى هذه اللجنة أحقية المقاول أو المتعهد ، تصدر اللجنة قرارها في دفع التعويضات . ويكون هذا القرار قابلًا للاعتراض عليه أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغه لصاحب الشأن .هـ - إذا ثبت لدى هذه اللجنة مخالفة المتعاقد مما أشير إليه في الفقرة (ج) من هذه المادة ، تصدر اللجنة قرارًا بمنع التعامل معه مدة لا تتجاوز خمس سنوات . ويكون هذا القرار قابلًا للاعتراض عليه أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغه لصاحب الشأن .وبعد صدور حكم نهائي من الديوان بالإدانة أو إذا انتهت مدة الاعتراض دون أن يقدم اعتراضه يشهر به على نفقته في صحيفتين محليتين ، وتبلغ جميع الجهات الحكومية بمنع التعامل معه بتعميم من وزير المالية .و - توضح اللائحة التنفيذية لهذا النظام الإجراءات اللازمة لعمل هذه اللجنة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة التاسعة والسبعون
  article_text_ar: إذا ظهرت حاجة إلى استثناء حكم من أحكام هذا النظام فيتم الرفع لرئيس مجلس الوزراء لتكوين لجنة من وزير المالية والوزير المختص واثنين من الوزراء لدراسة الموضوع مع تحديد محل الاستثناء ومبرراته والرفع بما يرونه للمقام السامي للتوجيه بما يراه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الثمانون
  article_text_ar: يصدر وزير المالية اللائحة التنفيذية لهذا النظام خلال مائة وعشرين يومًا من تاريخ صدوره وتنشر في الجريدة الرسمية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
- article_ref: المادة الحادية والثمانون
  article_text_ar: يحل هذا النظام محل نظام تأمين مشتريات الحكومة وتنفيذ مشروعاتها وأعمالها الصادر بالمرسوم الملكي ذي الرقم م/14 والتاريخ 7 / 4 / 1397 هـ، ولائحته التنفيذية ويلغي كل ما يتعارض معه من أحكام ، ويطبق بعد مائة وعشرين يومًا من تاريخ نشره في الجريدة الرسمية .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/c2c05ee1-201a-48de-91e7-a9a700f2d14f/1
  verified: false
