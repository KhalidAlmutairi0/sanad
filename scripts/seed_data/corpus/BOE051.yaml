articles:
- article_ref: مادة (1)
  article_text_ar: ينشأ بموجب هذا النظام صندوق يسمى ( صندوق الاستثمارات العامة ).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (2)
  article_text_ar: يخصص هذا الصندوق لتمويل الاستثمار من المشاريع الإنتاجية ذات الطابع التجاري، سواء كانت تابعة للحكومة أو لمؤسسات الإقراض الصناعي المرتبطة بها أو المؤسسات العامة وسواء كانت هذه المشاريع تنفذ استقلالًا - أو عن طريق مشاركة الجهات الإدارية المذكورة لمؤسسات خاصة، ويتم هذا التمويل عن طريق الإقراض أو الضمان ويجوز في حالات خاصة أن يتم التمويل عن طريق تخصيص مبالغ يحتاجها مشروع معين .. كل ذلك بالشروط والأوضاع التي يحددها مجلس إدارة الصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (3)
  article_text_ar: يعتمد لهذا الصندوق مبلغ ألف مليون ريال يجرى تأمينه خلال ثلاث سنوات مالية تبدأ من السنة المالية 1391 /1392هـ. ويجوز بقرار من مجلس الوزراء زيادة هذا المبلغ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (4)
  article_text_ar: 'يقوم بإدارة الصندوق مجلس إدارة مكون من: وزير المالية والاقتصاد الوطني رئيسًا.وعضوية:اثنين من أعضاء مجلس الوزراء يسميهما رئيس مجلس الوزراء .رئيس الهيئة المركزية للتخطيط . محافظ مؤسسة النقد العربي السعودي .ويتولى المجلس في حدود أحكام هذا النظام رسم السياسة العامة للصندوق والنظر والبت في طلبات التمويل التي تُقدم له من الجهات المختصة بعد أن يجري المجلس بمعرفته الدراسات اللازمة لتحديد مدى الجدوى الاقتصادية للمشروع، كما يقترح المجلس الاعتمادات التي ترصد في الميزانية العامة سنويًّا لتمويل الصندوق، ويقوم بإقرار المركز المالي السنوي للصندوق وحسابه الختامي تمهيدًا لرفعه إلى مجلس الوزراء لاعتماده.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (5)
  article_text_ar: يرشح مجلس الإدارة أمينًا عامًّا للمجلس يصدر بتعيينه قرار من مجلس الوزراء وتقوم وزارة المالية والاقتصاد الوطني ضمن ميزانيتها بتوفير الخدمات اللازمة لمكتب الأمين العام والموظفين اللازمين سواء من الخبراء أو الباحثين أو المحللين الاقتصاديين أو الكتبة وغيرهم، ويجوز بقرار من مجلس إدارة الصندوق التعاقد بالشروط وبالكيفية التي يراها مناسبة مع أشخاص أو هيئات لتقديم خدمات استشارية أو دراسات لازمة للصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (6)
  article_text_ar: تقوم الأمانة العامة للمجلس بإعداد لائحة أعمال مجلس الإدارة والدراسات اللازمة لمشروعات الاستثمار وطلبات القروض والضمان والتقارير الضرورية وإعداد المركز المالي وتقرير الحساب الختامي ، ويقدم تقريرًا نصف سنوي شاملًا لنشاط الصندوق في الفترة المقدم عنها التقرير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (7)
  article_text_ar: يُفتح في مؤسسة النقد العربي السعودي حساب مستقل للصندوق تقيد فيه عملياته وتحول إليه إيراداته، ويجري الصرف منه بواسطة مؤسسة النقد العربي السعودي طبقًا للتعليمات التي يصدرها مجلس إدارة الصندوق وتُقدم مؤسسة النقد العربي السعودي إلى مجلس إدارة الصندوق حسابًا سنويًّا بعملياته خلال الفترة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (8)
  article_text_ar: لا ينظر الصندوق في طلبات التمويل للمشاريع إلا إذا أرفقت بها دراسات وافية تشمل الجدوى الاقتصادية للمشروع، وبيانًا بالتكاليف مُوضحًا التكاليف المتعلقة بالعملة المحلية والتكاليف المتعلقة بالعملة الأجنبية ومدة التنفيذ، والكيفية المقترحة للتمويل، إلى غير ذلك من البيانات والمعلومات التي يقرر مجلس الإدارة وجوب إرفاقها بالطلب .. ويجب على الوزارة أو المصلحة الحكومية أو المؤسسة العامة التي موّل الصندوق مشروعًا تابعًا لها أن تقدم للصندوق تقريرًا ماليًّا سنويًّا بالمبالغ المخصصة من الصندوق للمشروع وكيفية صرفها، وآثارها في تقدم المشروع، إلى غير ذلك من البيانات التي يقرر مجلس الإدارة وجوب تضمن الحساب السنوي لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (9)
  article_text_ar: لا يجوز السحب على المبالغ الموافق على اعتمادها من الصندوق لمشروع معين إلا بقدر ما تدعو إلى ذلك الحاجة الآتية للمشروع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
- article_ref: مادة (10)
  article_text_ar: تضمن بيانات الميزانية العامة للدولة بيانًا ماليًّا باستثمارات الصندوق ويقدم مجلس إدارة الصندوق تقريرًا سنويًّا مفصلًا لمجلس الوزراء يبين بالإضافة للمركز المالي للصندوق وحسابه الختامي ، ملخصًا لعملياته الرئيسية في الفترة المقدم عنها التقرير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/2541255e-9e5b-4393-a8b0-a9a700f1a596/1
  verified: false
