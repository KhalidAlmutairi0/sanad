- article_ref: 'أولاً : فيما يتصل بالمجلس الأعلى للقضاء'
  article_text_ar: 'يتولى مجلس القضاء الأعلى إلى حين تشكيل المجلس الأعلى للقضاء ما يلي : أ - اقتراح القضاة الأربعة المتفرغين لعضوية المجلس الأعلى للقضاء المنصوص عليهم في الفقرة (ب) من المادة (الخامسة) من نظام القضاء من بين أعضاء المجلس الحالي أو من غيرهم . ب- اقتراح أعضاء المحكمة العليا . ج - النظر في شؤون القضاة الوظيفية من تعيين وترقية وتأديب وندب ونقل وتفتيش ونحوها وفقاً للشروط المنصوص عليها في نظام القضاء الجديد . د - أي اختصاص آخر معهود به إلى المجلس الأعلى للقضاء بموجب آلية العمل التنفيذية لنظام القضاء ونظام ديوان المظالم . يتولى رئيس مجلس القضاء الأعلى اختصاصات رئيس المجلس الأعلى للقضاء المنصوص عليها في آلية العمل التنفيذية ، وذلك إلى حين تشكيل المجلس الأعلى للقضاء . استحداث عدد من الوظائف الإدارية والفنية التي تتناسب مع حجم العمل في المجلس الأعلى للقضاء ، وذلك في أول سنة مالية تالية لنفاذ نظام القضاء . وتقوم اللجنة المشار إليها في الفقرة (2) من البند "التاسع عشر" من الترتيبات التنظيمية لأجهزة القضاء وفض المنازعات (التي سيشار إليها فيما بعد "باللجنة الفنية") بالاشتراك مع ممثل من المجلس
    الأعلى للقضاء بما يلي : أ- تحديد تلك الوظائف بعد حصر الوظائف الشاغرة والمشغولة. ب- وضع الترتيبات المالية والإدارية والوظيفية التي تعين المجلس الأعلى للقضاء على تولي مهماته. ج- دراسة مدى الحاجة إلى استحداث وظائف إدارية وفنية أخرى للمجلس ، وذلك خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء . توفير مقر للمجلس الأعلى للقضاء يتناسب مع أهميته قبل مباشرته مهماته بمدة كافية ، وتقوم وزارة المالية بتوفير المبالغ اللازمة لذلك ، ويكون ذلك بالتنسيق مع المجلس الأعلى للقضاء . تنقل إلى المجلس الأعلى للقضاء إدارة التفتيش القضائي التابعة تنظيمياً لوزارة العدل بقضاتها وموظفيها من تاريخ مباشرة المجلس مهماته ، ويكون تنفيذ ذلك بالتنسيق بين رئيس المجلس الأعلى للقضاء ووزير العدل ، ويستمر العمل بقواعد التفتيش القضائي الحالية وإجراءاته حتى يصدر المجلس لائحة التفتيش القضائي.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'ثانياً : فيما يتصل بالمحكمة العليا'
  article_text_ar: تستمر الهيئة الدائمة في مجلس القضاء الأعلى في مباشرة اختصاصاتها المنصوص عليها في الأنظمة الحالية ، وذلك إلى حين تسمية أعضاء المحكمة العليا . تتولى المحكمة العليا بعد تسمية أعضائها اختصاصات الهيئة الدائمة في مجلس القضاء الأعلى، وذلك إلى حين تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية . تنقل الوظائف الإدارية والفنية المرتبطة بالعمل القضائي الشاغرة والمشغولة بعد حصرها وفق ما ورد في الفقرة (3) من البند (أولاً) من هذه الآلية بموظفيها من مجلس القضاء الأعلى إلى المحكمة العليا ، ويكون ذلك بالتزامن مع تسمية أعضاء المحكمة العليا . تنشأ إدارة متخصصة في المحكمة العليا باسم "إدارة الدراسات والبحوث" ، يعين فيها عدد كافٍ من الباحثين الشرعيين والنظاميين، تكون مهمتها إجراء الدراسات والبحوث القضائية التي تطلبها دوائر المحكمة . يستحدث عدد من الوظائف الإدارية والفنية تتناسب مع حجم العمل في المحكمة العليا ، وذلك في أول سنة مالية تالية لنفاذ نظام القضاء ، وتقوم اللجنة الفنية - بالاشتراك مع ممثل من المجلس الأعلى للقضاء وممثل من وزارة العدل وممثل من المحكمة العليا خلال مدة لا تتجاوز
    ((سنتين)) من تاريخ نفاذ نظام القضاء - بوضع الترتيبات المالية والإدارية والوظيفية التي تعين المحكمة العليا على تولي اختصاصاتها ، ودراسة مدى الحاجة إلى استحداث وظائف إدارية وفنية أخرى للمحكمة. توفير مقر يتناسب مع أهمية المحكمة العليا قبل مباشرتها اختصاصاتها بمدة كافية ، ويكون ذلك بالتنسيق بين المجلس الأعلى للقضاء والمحكمة العليا ووزارة العدل ، وتقوم وزارة المالية بتوفير المبالغ اللازمة لذلك . يحال - من مجلس القضاء الأعلى إلى المحكمة العليا - كل ما يدخل في اختصاص المحكمة العليا من المعاملات القضائية ودفاترها وسجلاتها وملفاتها . ويكون ذلك عند مباشرة المحكمة العليا اختصاصاتها ، وذلك بالتنسيق بين رئيس المجلس الأعلى للقضاء ورئيس المحكمة العليا .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: اعتبار صدور الأمر الملكي بتسمية القضاة الأربعة في المجلس الأعلى للقضاء ، ورئيس المحكمة العليا وأعضائها ، بمثابة إحداث وظائف وفقاً للدرجات المطلوب شغلها بموجب نظام القضاء ، وإدراجها تبعاً لذلك في ميزانية الجهة ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'رابعاً: فيما يتصل بمحاكم الاستئناف'
  article_text_ar: 'تستمر كل من : محكمة التمييز في الرياض ومحكمة التمييز في مكة المكرمة في تولي اختصاصاتهما المنصوص عليها في الأنظمة الحالية ، وذلك إلى حين تحويلهما إلى محكمتي استئناف وفقاً لما ورد في الفقرة (5) من هذا البند. تستحدث وظائف قضاة محاكم استئناف، لا يقل عددها عن (مائة وعشرين) وظيفة ، وتستحدث كذلك وظائف رؤساء محاكم استئناف لا يقل عددها عن (ثلاثين) وظيفة ، وذلك في أول سنة مالية تالية لنفاذ نظام القضاء . يقوم المجلس الأعلى للقضاء بشغل الوظائف الواردة في الفقرة السابقة عن طريق الترقية أو التعيين أو النقل ، ويعالج المجلس أماكن عمل من يشغلها وأوضاعهم من الناحية المادية إلى حين إنشاء محاكم الاستئناف ومباشرتها اختصاصاتها ، على أن يخصص عدد كاف من القضاة المعينين أو المرقين للعمل في محكمة الرياض ومحكمة مكة المكرمة . يقوم المجلس الأعلى للقضاء بزيادة عدد الدوائر في كل من محكمتي الرياض ومكة المكرمة. يصدر المجلس الأعلى للقضاء - خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - قراراً يتضمن ما يلي : أ - بالنسبة إلى محكمة التمييز في الرياض : 1- تحويل المحكمة إلى محكمة استئناف . 2- تحديد
    العدد المناسب من القضاة للعمل في المحكمة . 3- قصر اختصاصاتها على النظر في الأحكام الصادرة من محاكم الدرجة الأولى في القضاء العام في منطقة الرياض . ب- بالنسبة إلى محكمة التمييز في مكة المكرمة : 1- تحويل المحكمة إلى محكمة استئناف . 2- تحديد العدد المناسب من القضاة للعمل في هذه المحكمة . 3- أن يقصر اختصاصاتها على النظر في الأحكام الصادرة من محاكم الدرجة الأولى في القضاء العام في كل من منطقة مكة المكرمة ومنطقة المدينة المنورة ومنطقة الباحة . ج - إنشاء محكمة استئناف في المنطقة الشرقية يراعى فيها ما يلي : 1- أن يكون مقرها مدينة الدمام . 2- أن يحدد العدد المناسب من القضاة للعمل في هذه المحكمة . 3- قصر اختصاصاتها على النظر في الأحكام الصادرة من محاكم الدرجة الأولى في القضاء العام في المنطقة الشرقية . د - إنشاء محكمة استئناف في منطقة القصيم يراعى فيها ما يلي : 1- أن يكون مقرها مدينة بريدة . 2- أن يحدد العدد المناسب من القضاة للعمل في هذه المحكمة . 3- أن يقصر اختصاصاتها على النظر في الأحكام الصادرة من محاكم الدرجة الأولى في القضاء العام في منطقة القصيم، ومنطقة حائل. هـ- إنشاء محكمة استئناف في
    منطقة عسير ، يراعى فيها ما يلي : 1- أن يكون مقرها مدينة أبها . 2- أن يحدد العدد المناسب من القضاة للعمل في هذه المحكمة . 3- أن يقصر اختصاصاتها على النظر في الأحكام الصادرة من محاكم الدرجة الأولى في القضاء العام في منطقة عسير ، ومنطقة جازان، ومنطقة نجران. و - إنشاء محكمة استئناف في منطقة الجوف يراعى فيها ما يلي : 1- أن يكون مقرها مدينة سكاكا . 2- أن يحدد العدد المناسب من القضاة للعمل في هذه المحكمة . 3- أن يقصر اختصاصاتها على النظر في الأحكام الصادرة من محاكم الدرجة الأولى في القضاء العام في منطقة الجوف ، ومنطقة الحدود الشمالية ، ومنطقة تبوك. تتولى محاكم الاستئناف اختصاصات محكمة التمييز إلى حين تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية ، وذلك دون إخلال بما ورد في الفقرة (9) من هذا البند . تقوم اللجنة الفنية - بالاشتراك مع المجلس الأعلى للقضاء ووزارة العدل خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - بما يلي: أ - دراسة مدى الحاجة إلى استحداث وظائف قضائية أخرى لتلك المحاكم . ب- تحديد احتياجات كل محكمة من محاكم الاستئناف من وظائف إدارية وفنية، واستحداثها في أول سنة
    مالية تالية للتحديد . ج - النظر في ملاءمة نقل بعض الوظائف الإدارية والفنية الشاغرة والمشغولة بموظفيها من بعض فروع وزارة العدل إلى تلك المحاكم . د - وضع الترتيبات المالية والإدارية والوظيفية التي تعين كل محكمة من تلك المحاكم على تولي اختصاصاتها . توفير مقر لكل محكمة استئناف صدر بإنشائها قرار من المجلس الأعلى للقضاء قبل مباشرتها اختصاصاتها بمدة كافية ، ويراعى في المقر تناسبه مع طبيعة عمل محاكم الاستئناف وأهميته وحجمه ، وتقوم وزارة المالية بتوفير المبالغ اللازمة لذلك . يحدد المجلس الأعلى للقضاء فترة انتقالية - بعد تعديل نظام المرافعات الشريعة ونظام الإجراءات الجزائية - لتباشر بعدها محاكم الاستئناف اختصاصاتها وفقاً لنظام القضاء ، وتراعى في ذلك القضايا المحالة إلى محكمتي التمييز في الرياض ومكة المكرمة بأن تستمر في نظرها حتى انتهائها ، وتحاط وزارة العدل بما تم من ترتيبات في هذا الشأن . يضع المجلس الأعلى للقضاء خطة زمنية محددة لإنشاء محاكم استئناف في بقية مناطق المملكة ، وتزود وزارة العدل بنسخة من هذه الخطة قبل التنفيذ بوقت كافٍ .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'خامساً : فيما يتصل بمحاكم الأحوال الشخصية'
  article_text_ar: 'يستحدث عدد كاف من وظائف السلك القضائي لمحاكم الأحوال الشخصية ، وذلك في أول سنة مالية تالية لنفاذ نظام القضاء . يصدر المجلس الأعلى للقضاء - خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - قراراً يتضمن ما يلي : أ- تحويل المحكمة الجزئية للضمان والأنكحة في كل من الرياض وجدة إلى محكمتي أحوال شخصية. ب- تحديد العدد المناسب من القضاة للعمل في كل محكمة أحوال شخصية . ج- تخصيص عدد من القضاة العاملين حالياً في المحاكم العامة والمحاكم الجزئية للعمل في محاكم الأحوال الشخصية عند مباشرتها اختصاصاتها ويراعى في ذلك حجم عمل محاكم الأحوال الشخصية والمحاكم العامة . ينقل القضاة المشار إليهم في الفقرة السابقة عند مباشرة كل محكمة أحوال شخصية اختصاصاتها . تقوم اللجنة الفنية - بالتنسيق مع المجلس الأعلى للقضاء ووزارة العدل خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - بما يلي : أ - دراسة مدى الحاجة إلى استحداث وظائف قضائية أخرى تخصص لتلك المحاكم . ب- تحديد احتياجات كل محكمة أحوال شخصية من وظائف إدارية وفنية ، واستحداثها في أول سنة مالية تالية للتحديد . ج - تخصيص بعض الوظائف الإدارية
    والفنية الشاغرة والمشغولة في المحكمة العامة لمحكمة الأحوال الشخصية الواقعة في منطقتها أو محافظتها . توفير مقر لكل محكمة أحوال شخصية صدر بإنشائها قرار من المجلس الأعلى للقضاء قبل مباشرتها اختصاصاتها بمدة كافية ، ويراعى في المقر تناسبه مع طبيعة وحجم المنازعات التي تنظرها محاكم الأحوال الشخصية ، وتقوم وزارة المالية بتوفير المبالغ اللازمة لذلك . تحال قضايا الأحوال الشخصية التي لدى المحاكم العامة والمحاكم الجزئية ولم يجر ضبطها إلى محاكم الأحوال الشخصية التي تقع في نطاق اختصاصها المكاني ، ويكون ذلك عند مباشرتها اختصاصاتها ، وذلك بالتنسيق بين رئيسي المحكمتين وفق ترتيب يضعه المجلس الأعلى للقضاء. يحدد المجلس الأعلى للقضاء فترة انتقالية - بعد تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية - لتباشر بعدها محاكم الأحوال الشخصية اختصاصاتها ، ويراعى في ذلك أن تستمر المحاكم العامة والمحاكم الجزئية في نظر قضايا الأحوال الشخصية التي ضبطتها حتى الحكم فيها ، وتحاط وزارة العدل بما تم من ترتيبات في هذا الشأن . يضع المجلس الأعلى للقضاء خطة زمنية محددة لإنشاء محاكم أحوال شخصية في مناطق المملكة ومحافظاتها
    وتزود وزارة العدل بنسخة من هذه الخطة ، قبل التنفيذ بوقت كاف .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'سادساً : فيما يتصل بالمحاكم الجزائية'
  article_text_ar: 'يستحدث عدد كاف من وظائف السلك القضائي للمحاكم الجزائية ، وذلك في أول سنة مالية تالية لنفاذ نظام القضاء . يصدر المجلس الأعلى للقضاء - خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - قراراً يتضمن ما يلي : أ- تحويل المحاكم الجزئية القائمة حالياً إلى محاكم جزائية. ب- تحديد العدد المناسب من القضاة للعمل في كل محكمة جزائية. ج- تخصيص عدد من القضاة العاملين حالياً في المحاكم العامة والمحاكم الجزئية للعمل في المحاكم الجزائية عند مباشرتها اختصاصاتها ، ويراعى في ذلك حجم عمل "المحاكم الجزائية" و"المحاكم العامة" . ينقل القضاة المشار إليهم في الفقرة السابقة عند مباشرة كل محكمة جزائية اختصاصاتها. تقوم اللجنة الفنية - بالتنسيق مع المجلس الأعلى للقضاء ووزارة العدل خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - بما يلي : أ - دراسة مدى الحاجة إلى استحداث وظائف قضائية أخرى تخصص لتلك المحاكم. ب- تقويم وضع المحاكم الجزئية القائمة حالياً من حيث وضعها الوظيفي ووضعها المالي ، ووضع المباني وما يتطلبه تحويلها إلى محاكم جزائية . ج- تحديد احتياجات كل محكمة جزائية من وظائف إدارية وفنية
    ، واستحداثها في أول سنة مالية تالية للتحديد . د- تخصيص بعض الوظائف الإدارية والفنية الشاغرة والمشغولة في المحكمة العامة للمحكمة الجزائية التي تقع في منطقتها أو محافظتها . توفير مقر لكل محكمة جزائية صدر بإنشائها قرار من المجلس الأعلى للقضاء قبل مباشرتها اختصاصاتها بمدة كافية ، ويراعى في المقر تناسبه مع طبيعة وحجم المنازعات التي تنظرها المحاكم الجزائية ، وتقوم وزارة المالية بتوفير المبالغ اللازمة لذلك . تسلخ الدوائر الجزائية التابعة لديوان المظالم بقضاتها ومعاونيهم ووظائفهم إلى المحاكم الجزائية . وتسلخ كذلك دوائر التدقيق الجزائي بقضاتها ومعاونيهم ووظائفهم من ديــوان المظــالم إلى محاكم الاستئناف ، ويكون ذلك بعد تهيئة مقار تلك المحاكم ، ومباشرتها اختصاصاتها ، على أن يستمروا بالعمل في تلك المحاكم مدة لا تقل عن خمس سنوات وبالتخصص نفسه المنقولين منه ولا يمنع ذلك من تكليفهم إكمال النصاب في دوائر أخرى . تحال القضايا التي تختص بنظرها المحاكم الجزائية الموجودة لدى المحاكم العامة ولم يجر ضبطها إلى المحاكم الجزائية التي تقع في نطاق اختصاصها المكاني ، ويكون ذلك عند مباشرتها اختصاصاتها، وذلك بالتنسيق
    بين رئيسي المحكمتين وفق ترتيب يضعه المجلس الأعلى للقضاء . تحال القضايا الجزائية وسجلاتها التي ما زالت تحت النظر من الدوائر الجزائية ودوائر التدقيق الجزائية في ديوان المظالم إلى المحاكم الجزائية المختصة ، وكذلك تنقل إلى المحاكم الجزائية سجلات وأوراق وملفات القضايا الجزائية السابقة المنتهية التي لدى الديوان ، ويكون ذلك بعد مباشرتها اختصاصاتها ، وذلك بالتنسيق بين المجلس الأعلى للقضاء ومجلس القضاء الإداري ، على أن يراعى في ذلك الاختصاص المكاني . يحدد المجلس الأعلى للقضاء فترة انتقالية - بعد تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية - لتباشر بعدها المحاكم الجزائية اختصاصاتها، ويراعى في ذلك أن تستمر المحاكم العامة في نظر القضايا القائمة التي ضبطتها لديها حتى الحكم فيها ، وتحاط وزارة العدل بما تم من ترتيبات في هذا الشأن . يقوم المجلس الأعلى للقضاء بالتنسيق مع وزارة العدل والمعهد العالي للقضاء بإلحاق قضاة المحاكم الجزائية ، وقضاة الدوائر الجزائية في محاكم الاستئناف وفي المحاكم العامة في المحافظات والمراكز ، وقضاة دوائر دعاوى حوادث السير في المحاكم العامة ، ببرنامج تدريبي في المعهد
    العالي للقضاء ، وتعقد لهم حلقات علمية في المعهد نفسه لمدة كافية لا تقل عن شهرين حول نظام الإجراءات الجزائية وغيره من الأنظمة ذات الصلة ، ويشارك في ذلك أهل الخبرة والاختصاص من القضاة وغيرهم. يضع المجلس الأعلى للقضاء خطة زمنية محددة لإنشاء محاكم جزائية في مناطق المملكة ومحافظاتها وتزود وزارة العدل بنسخة من الخطة ، قبل التنفيذ بوقت كاف .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'سابعاً: فيما يتصل بالمحاكم العمالية'
  article_text_ar: 'يستحدث عدد كاف من وظائف السلك القضائي للمحاكم العمالية ، وذلك في أول سنة مالية تالية لنفاذ نظام القضاء . يصدر المجلس الأعلى للقضاء - خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - قراراً يتضمن ما يلي : أ- تحديد العدد المناسب من القضاة للعمل في كل محكمة عمالية . ب- تخصيص عدد من القضاة العاملين حالياً في المحاكم العامة والمحاكم الجزئية للعمل في المحاكم العمالية عند مباشرتها اختصاصاتها ، ويراعى في ذلك حجم العمل الذي ستباشره "المحاكم العمالية" و "المحاكم العامة". ينقل القضاة المشار إليهم في الفقرة السابقة عند مباشرة كل محكمة عمالية اختصاصاتها. تقوم اللجنة الفنية - بالتنسيق مع المجلس الأعلى للقضاء ووزارة العدل خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - بما يلي : أ - دراسة مدى الحاجة إلى استحداث وظائف قضائية أخرى تخصص لتلك المحاكم. ب- التنسيق مع وزارة العمل بالنظر في وضع هيئات تسوية الخلافات العمالية القائمة حالياً من حيث وضعها الوظيفي ووضعها المالي ووضع المباني وما يتطلبه تحويلها إلى محاكم عمالية . ج- تحديد احتياجات كل محكمة عمالية من وظائف إدارية وفنية
    ، واستحداثها في أول سنة مالية تالية للتحديد . د- تخصيص بعض الوظائف الإدارية والفنية الشاغرة والمشغولة في المحكمة العامة التي تقع في منطقتها أو محافظتها . استمرار الهيئات الابتدائية لتسوية الخلافات العمالية والهيئة العليا لتسوية الخلافات العمالية ؛ في النظر في الدعاوى العمالية ، واستمرار العمل بلائحة المرافعات أمام تلك الهيئات ، وذلك حتى تنشأ المحاكم العمالية وتباشر اختصاصاتها . توفير مقر لكل محكمة عمالية صدر بإنشائها قرار من المجلس الأعلى للقضاء ، قبل مباشرتها اختصاصاتها بمدة كافية ، ويراعى في المقر تناسبه مع طبيعة وحجم المنازعات التي تنظرها المحاكم العمالية ، وتقوم وزارة المالية بتوفير المبالغ اللازمة لذلك . يحدد المجلس الأعلى للقضاء فترة انتقالية - بعد تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية - لتباشر بعدها المحاكم العمالية اختصاصاتها المنصوص عليها نظاماً، وتنقل بعد ذلك القضايا القائمة وما يتعلق بها من هيئات تسوية الخلافات العمالية والهيئة العليا لتسوية الخلافات العمالية إلى المحاكم العمالية للفصل فيها ، وذلك بالتنسيق بين رئيس المجلس الأعلى للقضاء ووزير العمل ، ويراعى
    في ذلك الاختصاص المكاني ، وتحاط وزارة العدل بما تم من ترتيبات في هذا الشأن . يفرغ بعض أعضاء هيئات تسوية المنازعات العمالية مدة مناسبة للعمل في المحاكم العمالية بوصفهم مستشارين بعد مباشرتها اختصاصاتها - إذا اقتضت المصلحة ذلك - ويكون ذلك بالتنسيق بين المجلس الأعلى للقضاء ووزارة العدل ووزارة العمل ، ويعد المفرغ في هذه الحالة في حكم المكلف بمهمة رسمية. يقوم المجلس الأعلى للقضاء - بالتنسيق مع وزارة العدل والمعهد العالي للقضاء - بإلحاق قضاة المحاكم العمالية وقضاة الدوائر العمالية في محاكم الاستئناف وفي المحاكم العامة في المحافظات والمراكز ، ببرنامج تدريبي في المعهد العالي للقضاء وتعقد لهم حلقات علمية في المعهد نفسه لمدة لا تقل عن شهرين حول نظام العمل وغيره من الأنظمة ذات الصلة ويشارك في ذلك أهل الخبرة والاختصاص من القضاة وغيرهم . يضع المجلس الأعلى للقضاء خطة زمنية محددة لإنشاء محاكم عمالية في مناطق المملكة ومحافظاتها ، وتزود وزارة العدل بنسخة من هذه الخطة ، قبل التنفيذ بوقت كاف .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'ثامناً : فيما يتصل بالمحاكم التجارية'
  article_text_ar: 'يستحدث عدد كاف من وظائف السلك القضائي للمحاكم التجارية ، وذلك في أول سنة مالية تالية لنفاذ نظام القضاء . يقوم المجلس الأعلى للقضاء بتخصيص عدد كاف من القضاة الذين يعينون ابتداءً ، وعدد كاف من القضاة العاملين حالياً للعمل في هذه المحاكم عند مباشرتها اختصاصاتها ، ويكون ذلك خلال مدة لا تزيد على سنة من تاريخ نفاذ نظام القضاء. يجب ألا يقل عدد القضاة المشار إليهم في الفقرة السابقة عن (80) قاضياً . تقوم اللجنة الفنية - بالتنسيق بين المجلس الأعلى للقضاء ووزارة العدل خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام القضاء - بما يلي : أ- دراسة مدى الحاجة إلى استحداث وظائف قضائية أخرى تخصص لتلك المحاكم. ب- تحديد احتياجات كل محكمة تجارية من وظائف إدارية وفنية ، واستحداثها في أول سنة مالية تالية للتحديد . ج- تخصيص بعض الوظائف الإدارية والفنية الشاغرة والمشغولة في المحكمة العامة للمحكمة التجارية التي تقع في منطقتها أو محافظتها . توفير مقر لكل محكمة تجارية صدر بإنشائها قرار من المجلس الأعلى للقضاء ، قبل مباشرتها اختصاصاتها بمدة كافية ، ويراعى في المقر تناسبه مع طبيعة وحجم المنازعات التي
    تنظرها المحاكم التجارية ، وتقوم وزارة المالية بتوفير المبالغ اللازمة. تسلخ الدوائر التجارية التابعة لديوان المظالم بقضاتها ومعاونيهم ووظائفهم إلى المحاكم التجارية . وتسلخ كذلك دوائر التدقيق التجاري بقضاتها ومعاونيهم ووظائفهم من ديــوان المظــالم إلى محاكم الاستئناف ، ويكون ذلك بعد تهيئة مقار تلك المحاكم ، ومباشرتها اختصاصاتها ، على أن يستمروا بالعمل في تلك المحاكم مدة لا تقل عن خمس سنوات وبالتخصص نفسه المنقولين منه ولا يمنع ذلك من تكليفهم إكمال النصاب في دوائر أخرى . تحال القضايا التجارية وسجلاتها التي ما زالت تحت النظر في الدوائر التجارية ودوائر التدقيق التجاري في ديوان المظالم إلى المحاكم التجارية ، وكذلك تنقل إلى المحاكم التجارية سجلات وأوراق وملفات القضايا التجارية السابقة المنتهية التي لدى الديوان ويكون ذلك بعد مباشرتها اختصاصاتها ، وذلك بالتنسيق بين المجلس الأعلى للقضاء ومجلس القضاء الإداري . ويراعى في ذلك الاختصاص المكاني . يحدد المجلس الأعلى للقضاء فترة انتقالية - بعد تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية - لتباشر بعدها المحاكم التجارية اختصاصاتها، ويراعى في ذلك
    أن تستمر المحاكم العامة في نظر القضايا القائمة التي ضبطتها حتى الحكم فيها ، وتحاط وزارة العدل بما تم من ترتيبات في هذا الشأن . يقوم المجلس الأعلى للقضاء بعد التنسيق مع وزارة العدل والمعهد العالي للقضاء بإلحاق قضاة المحاكم التجارية وقضاة الدوائر التجارية في محاكم الاستئناف وفي المحاكم العامة في المحافظات والمراكز ، ببرنامج تدريبي في المعهد العالي للقضاء وتعقد لهم حلقات علمية في المعهد نفسه لمدة لا تقل عن شهرين حول الأنظمة التجارية ، يشارك في ذلك أهل الخبرة والاختصاص من القضاة وغيرهم. يضع المجلس الأعلى للقضاء خطة زمنية محددة لإنشاء محاكم تجارية في مناطق المملكة ومحافظاتها ، وتزود وزارة العدل بنسخة من هذه الخطة ، قبل التنفيذ بوقت كاف .'
