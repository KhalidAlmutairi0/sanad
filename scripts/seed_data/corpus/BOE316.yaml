- article_ref: 'تاسعاً : فيما يتصل باللجان شبة القضائية وما في حكمها'
  article_text_ar: مع عدم الإخلال باختصاصات اللجان المستثناة المنصوص عليها في الفقرة (7) من القسم الثالث (أحكام عامة) من هذه الآلية ؛ تنقل إلى القضاء العام - بعد تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية وصدور نظام المرافعات أمام ديوان المظالم والعمل بموجبه - اختصاصات اللجان شبه القضائية التي تنظر في قضايا جزائية أو منازعات تجارية أو مدنية ، وتتولى اللجنة المشكلة في هيئة الخبراء - خلال مدة لا تتجاوز سنة من تاريخ نفاذ نظام القضاء - مراجعة الأنظمة التي تأثرت بذلك ، واقتراح تعديلها وفقاً للإجراءات النظامية اللازمة لذلك ، كما تتولى دراسة وضع اللجان شبه القضائية التي تنظر في منازعات إدارية وتكون قراراتها قابلة للتظلم أمام ديوان المظالم ، واقتراح ما تراه في شأنها . تسلخ الوظائف المتعلقة باللجان شبه القضائية التي تنقل اختصاصها إلى القضاء العام (من وظائف الأعضاء ووظائف مساعدة) ، ويعين العاملون في هذه اللجان ممن تنطبق عليهم شروط القضاء على وظائف قضائية أو استشارية بحسب الحاجة. على أن تقوم اللجنة الفنية - بالاشتراك مع المجلس الأعلى للقضاء ووزارة العدل وممثل من الجهة التي لها علاقة - بتحديد
    ما سينقل من كل لجنة يُنقل اختصاصها إلى المحاكم من وظائف وموظفين ومخصصات مالية وغيرها . يحدد المجلس الأعلى للقضاء فترة انتقالية - بعد تعديل نظام المرافعات الشرعية ونظام الإجراءات الجزائية وصدور نظام المرافعات أمام ديوان المظالم والعمل بموجبه - لتباشر بعدها المحاكم المختصة اختصاصاتها المنقولة إليها من اللجان شبه القضائية، وتنقل بعد ذلك القضايا القائمة وما يتعلق بها من سجلات وأوراق وملفات من تلك اللجان إلى القضاء العام للفصل فيها وذلك بالتنسيق بين المجلس الأعلى للقضاء والجهة التي لها علاقة، ويراعى في ذلك الاختصاص المكاني ، وتحاط وزارة العدل بما تم من ترتيبات في هذا الشأن .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'أولاً : فيما يتصل بمجلس القضاء الإداري'
  article_text_ar: 'تتولى لجنة الشؤون الإدارية في ديوان المظالم - إلى حين تشكيل مجلس القضاء الإداري - ما يلي : أ - اقتراح أعضاء المحكمة الإدارية العليا . ب- النظر في شؤون القضاة الوظيفية من تعيين وترقية وتأديب وندب ونقل وتفتيش ونحوها ، وفقاً للشروط المنصوص عليها في نظام القضاء الجديد . ج- أي اختصاص آخر معهود به إلى مجلس القضاء الإداري بموجب آلية العمل التنفيذية لنظام القضاء ونظام ديوان المظالم . يستحدث عدد من الوظائف الإدارية والفنية التي تتناسب مع حجم العمل في مجلس القضاء الإداري ، وذلك في أول سنة مالية تالية لنفاذ نظام ديوان المظالم . وتقوم اللجنة - الفنية بالاشتراك مع ممثل من مجلس القضاء الإداري - بتحديد الوظائف المطلوب استحداثها ، ووضع الترتيبات المالية والإدارية والوظيفية التي تعين مجلس القضاء الإداري على تولي مهماته ، كما تقوم هذه اللجنة خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام ديوان المظالم بدراسة مدى الحاجة إلى استحداث وظائف إدارية وفنية أخرى للمجلس . يتولى رئيس لجنة الشؤون الإدارية في ديوان المظالم اختصاصات رئيس مجلس القضاء الإداري المنصوص عليها في آلية العمل التنفيذية ، إلى
    حين تشكيل مجلس القضاء الإداري .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'ثانياً : فيما يتصل بالمحكمة الإدارية العليا'
  article_text_ar: تتولى المحكمة الإدارية العليا - بعد تسمية أعضائها - اختصاصاتها بعد صدور نظام المرافعات أمام ديوان المظالم والعمل بموجبه . يستحدث عدد من الوظائف الإدارية والفنية التي تتناسب مع حجم العمل في المحكمة الإدارية العليا ، وذلك في أول سنة مالية تالية لنفاذ ديوان المظالم ، وتقوم اللجنة الفنية بالاشتراك مع ممثل من مجلس القضاء الإداري وممثل من المحكمة الإدارية العليا ؛ بتحديد الوظائف المطلوب استحداثها ، ووضع الترتيبات المالية والإدارية والوظيفية التي تعين المحكمة الإدارية العليا على تولي اختصاصاتها ، كما تقوم هذه اللجنة خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام ديوان المظالم بدراسة مدى الحاجة إلى استحداث وظائف إدارية وفنية أخرى للمحكمة . تنشأ إدارة متخصصة في المحكمة الإدارية العليا باسم "إدارة الدراسات والبحوث" ، يعين فيها عدد كافٍ من الباحثين الشرعيين والنظاميين، تكون مهمتها إجراء الدراسات والبحوث القضائية التي تطلبها دوائر المحكمة. توفير مقر يتناسب مع أهمية المحكمة الإدارية العليا قبل مباشرتها اختصاصاتها بمدة كافية، ويكون ذلك بالتنسيق بين رئيس مجلس القضاء الإداري ورئيس المحكمة
    الإدارية العليا ، وتقوم وزارة المالية بتوفير المبالغ اللازمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'رابعاً : فيما يتصل بمحاكم الاستئناف الإدارية'
  article_text_ar: 'تستمر دوائر التدقيق الإداري في هيئة التدقيق في ديوان المظالم في تولي اختصاصاتها المنصوص عليها في قواعد المرافعات والإجراءات أمام ديوان المظالم إلى حين تحويل الهيئة إلى محكمة استئناف إدارية. تستحدث وظائف قضاة محاكم استئناف ، لا يقل عددها عن (ستين) وظيفة ، وكذلك تستحدث وظائف رؤساء محاكم استئناف لا يقل عددها عن (عشرين) وظيفة ، وذلك في أول سنة مالية تالية لنفاذ نظام ديوان المظالم. يقوم مجلس القضاء الإداري بشغل الوظائف الواردة في الفقرة السابقة عن طريق الترقية أو التعيين أو النقل . ويعالج المجلس أماكن عمل من يشغلها وأوضاعهم من الناحية المادية إلى حين إنشاء محاكم الاستئناف الإدارية ومباشرتها اختصاصاتها . يقوم مجلس القضاء الإداري بزيادة عدد دوائر التدقيق الإداري في هيئة التدقيق. يصدر مجلس القضاء الإداري - خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام ديوان المظالم - قراراً يتضمن ما يلي : أ- تحويل هيئة التدقيق بالديوان إلى محكمة استئناف إدارية في مدينة الرياض ، يراعى فيها ما يلي : 1- أن تكون من عدد كاف من الدوائر . 2 - أن يحدد اختصاصها بالنظر في الاعتراضات على الأحكام الصادرة
    عن المحاكم الإدارية في منطقة الرياض ومنطقة القصيم . ب- إنشاء محكمة استئناف إدارية في محافظة جدة ، يراعى فيها ما يلي : 1- أن تكون من عدد كاف من الدوائر . 2 - أن يحدد اختصاصها بالنظر في الاعتراضات على الأحكام الصادرة عن المحاكم الإدارية في منطقة مكة المكرمة ومنطقة المدينة المنورة . ج- إنشاء محكمة استئناف إدارية في مدينة الدمام ، يراعى فيها ما يلي : 1- أن تكون من عدد كاف من الدوائر . 2 - أن يحدد اختصاصها بالنظر في الاعتراضات على الأحكام الصادرة عن المحاكم الإدارية في المنطقة الشرقية ، ومنطقة الجوف . د- إنشاء محكمة استئناف إدارية في مدينة أبها ، يراعى فيها ما يلي : 1- أن تكون من عدد كاف من الدوائر . 2 - أن يحدد اختصاصها بالنظر في الاعتراضات على الأحكام الصادرة عن المحكمة الإدارية في منطقة عسير . تتولى محاكم الاستئناف الإدارية اختصاصات دوائر التدقيق الإداري إلى حين صدور نظام المرافعات أمام ديوان المظالم والعمل بموجبه ، وذلك دون إخلال بما ورد في الفقرة (1) من هذا البند . تقوم اللجنة الفنية - بالاشتراك مع مجلس القضاء الإداري خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام ديوان المظالم - بما
    يلي : أ - دراسة مدى الحاجة إلى استحداث وظائف قضائية أخرى لمحاكم الاستئناف الإدارية. ب- تحديد احتياجات كل محكمة من محاكم الاستئناف من وظائف إدارية وفنية واستحداثها في أول سنة مالية تالية للتحديد . ج - وضع الترتيبات المالية والإدارية والوظيفية التي تعين كل محكمة من تلك المحاكم على تولي اختصاصاتها . توفير مقر لكل محكمة استئناف إدارية صدر بإنشائها قرار من مجلس القضاء الإداري قبل مباشرتها اختصاصاتها بمدة كافية ، ويراعى في المقر تناسبه مع طبيعة عمل هذه المحاكم وأهميته وحجمه ، ويكون ذلك بالتنسيق مع مجلس القضاء الإداري ، وتقوم وزارة المالية بتوفير المبالغ اللازمة. يحدد مجلس القضاء الإداري فترة انتقالية - بعد صدور نظام المرافعات أمام ديوان المظالم والعمل بموجبه - لتباشر بعدها محاكم الاستئناف الإدارية اختصاصاتها. يضع مجلس القضاء الإداري خطة زمنية محددة لإنشاء محاكم استئناف إدارية في بقية مناطق المملكة .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: 'خامساً : فيما يتصل بالمحاكم الإدارية'
  article_text_ar: 'يصدر مجلس القضاء الإداري قراراً بتحويل فروع الديوان الحالية إلى محاكم إدارية . يضع مجلس القضاء الإداري خطة زمنية محددة لإنشاء محاكم إدارية في بقية مناطق المملكة . يستحدث عدد كافٍ من وظائف السلك القضائي للمحاكم الإدارية . توفير مقر لكل محكمة إدارية صدر بإنشائها قرار من مجلس القضاء الإداري يتناسب مع أهميتها قبل مباشرتها اختصاصاتها بمدة كافية ، وتقوم وزارة المالية بتوفير المبالغ اللازمة لذلك ، ويكون ذلك بالتنسيق مع مجلس القضاء الإداري . تقوم اللجنة الفنية - بعد التنسيق مع مجلس القضاء الإداري خلال مدة لا تتجاوز (سنتين) من تاريخ نفاذ نظام ديوان المظالم - بما يلي : أ - دراسة مدى الحاجة إلى استحداث وظائف قضائية أخرى للمحاكم الإدارية . ب- تحديد احتياجات كل محكمة من المحاكم الإدارية من وظائف إدارية وفنية، واستحداثها في أول سنة مالية تالية للتحديد . ج- وضع الترتيبات المالية والإدارية والوظيفية التي تعين كل محكمة من تلك المحاكم على تولي اختصاصاتها .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
- article_ref: أحكام عامة
  article_text_ar: لا تتجاوز الفترة الانتقالية التي يحددها المجلس الأعلى للقضاء ومجلس القضاء الإداري - بحسب الأحوال - المشار إليها في هذه الآلية ؛ مدة ثلاث سنوات من تاريخ تعديل نظام المرافعات الشرعية وتعديل نظام الإجراءات الجزائية وصدور نظام المرافعات أمام ديوان المظالم والعمل بموجبه . يقوم المجلس الأعلى للقضاء بعد مباشرته مهماته بإجراء دراسة شاملة لوضع اللجان المستثناة (البنوك ، والسوق المالية ، والقضايا الجمركية) المشار إليها في البند (عاشراً) من الترتيبات التنظيمية لأجهزة القضاء وفض المنازعات ، ورفع ما يتم التوصل إليه خلال مدة لا تتجاوز سنة لاستكمال الإجراءات النظامية . ينسق المجلس الأعلى للقضاء ، ومجلس القضاء الإداري عند إعداد اللوائح المتعلقة بشؤون القضاة الوظيفية . يتولى المجلس الأعلى للقضاء ومجلس القضاء الإداري ووزارة العدل - كل فيما يخصه - صلاحية تنفيذ ومتابعة ما يخصه من هذه الآلية ، وإصدار القرارات التنفيذية اللازمة لوضعها موضع التنفيذ . يرفع المجلس الأعلى للقضاء ومجلس القضاء الإداري ووزارة العدل - كل فيما يخصه - بعد التنسيق مع أمانة اللجنة الوزارية للتنظيم الإداري ؛ تقارير دورية
    إلى الملك في شأن تنفيذ هذه الآلية متضمنة الصعوبات التي واجهتها وما تقترحه في هذا الشأن وما تم تنفيذه وأسباب ما لم يتم تنفيذه . تعد وظيفة وكيل وزارة العدل محدثة بالمرتبة الممتازة من تاريخ نفاذ نظام القضاء. تشكل لجنة من ممثلين لا تقل مرتبة كل منهم عن الثانية عشرة من المجلس الأعلى للقضاء ، ومجلس القضاء الإداري ، ووزارة المالية ، ووزارة العدل ، ووزارة الشؤون البلدية والقروية ، وأمانة اللجنة الوزارية للتنظيم الإداري ؛ لوضع خطة زمنية تتضمن إنشاء مقار دائمة للمجلس الأعلى للقضاء والمحكمة العليا وديوان المظالم ، والمحكمة الإدارية العليا ، ومحاكم الاستئناف , ومحاكم الاستئناف الإدارية ، وبقية المحاكم الأخرى المنصوص عليها في نظام القضاء ونظام ديوان المظالم ، ورفع ما يتم التوصل إليه إلى المقام السامي لاستكمال الإجراءات النظامية . قيام وزارة العدل بعد التنسيق مع المجلس الأعلى للقضاء بوضع مواصفات فنية لمباني المحاكم المراد إنشاؤها ، وكذلك تحديد المتطلبات المتعلقة باستئجار المحاكم الجديدة على أن تكون هذه المتطلبات بحسب الإمكانات المتاحة في توفر الدور. تتولى اللجنة المشكلة في هيئة الخبراء بمجلس الوزراء
    المعنية بمراجعة الأنظمة التي تأثرت بالترتيبات التنظيمية لأجهزة القضاء وفض المنازعات ؛ البت في الإشكالات التي قد تحدث عند تنفيذ هذه الآلية . يعمل بهذه الآلية من تاريخ نفاذ نظام القضاء ونظام ديوان المظالم .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8b59b6e9-94ff-4d7c-90df-acc60000e5ee/1
  verified: false
