regulation:
  code: BOE052
  name_ar: نظام محلات بيع المركبات الملغى تسجيلها
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: يسري هذا النظام على جميع المحلات التي تقوم بتفكيك المركبات ومعدات الأشغال العامة والدراجات بعد إلغاء تسجيلها وبيعها أو بيع بعض أجزائها (محلات التشليح).
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتم تجميع تلك المحلات في مواقع محددة وفق الشروط والإجراءات التي تحددها اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يحظر فتح تلك المحلات قبل الحصول على ترخيص من الجهة المختصة وفق الشروط والإجراءات التي تحددها اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب على من يرغب في (تفكيك) مركبة أو معدة أشغال عامة، أو دراجة أن يلغي تسجيلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يجب على أصحاب تلك المحلات أن يحتفظوا في محلاتهم بمعلومات عن البائع والمشتري وفقًا لما تحدده اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تقوم كل من وزارة الداخلية ووزارة الشؤون البلدية والقروية بأعمال تفتيش على تلك المحلات ومراقبتها، كل فيما يخصه، وفقًا لما تحدده اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'مع عدم الإخلال بأية عقوبة أشد تنص عليها أنظمة أخرى يعاقب كل من يخالف الأحكام الواردة في هذا النظام وفقًا لما يلي: 1 - غرامة مالية مقدارها ثلاثة آلاف ريال عند المخالفة للمرة الأولى.2 - غرامة مالية مقدارها سبعة آلاف ريال مع إغلاق المحل مدة شهر واحد عند المخالفة للمرة الثانية.3 - غرامة مالية مقدارها تسعة آلاف ريال مع إغلاق المحل نهائيًّا وسحب الترخيص عند المخالفة للمرة الثالثة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تشكل لجان في المناطق والمحافظات والمراكز التي توجد فيها مواقع لتلك المحلات مكونة من ثلاثة أعضاء من وزارة الداخلية يكون أحدهم من ذوي الخبرة الشرعية أو النظامية؛ للنظر في توقيع العقوبات المنصوص عليها في هذا النظام، ويتم اعتماد هذه العقوبات من وزير الداخلية أو من يفوضه، ويجوز لمن صدرت بحقه عقوبة من العقوبات المنصوص عليها في المادة السابعة التظلم أمام ديوان المظالم خلال ستين يومًا من تاريخ تبليغه بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يصدر وزير الداخلية بالاتفاق مع وزير الشؤون البلدية والقروية اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية ويعمل به بعد مضي ستين يومًا من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/cf510039-d022-421f-9901-a9a700f1a8a0/1
  verified: false
