# Tracked regulatory sources. Drives the batch fetcher (scripts/fetch_all_laws.py), the update
# checker (scripts/check_law_updates.py), and the API run-check (app/services/monitoring).
# Every source is fetched VERBATIM; ingested as official_fetch until human-reviewed.
#
# Per-source fields (spec: per-source adapters):
#   adapter: which adapter parses this source (app/services/monitoring/adapters). Default 'boe'.
#            boe = laws.boe.gov.sa (verified). moj/cma = html. uqn = pdf gazette.
#   enabled: default true. Set false to register a source whose live structure is not yet
#            verified — it will NOT run in run-check until enabled.
# robots.txt was checked per source before adding it (see MONITORING_STATUS.md).
