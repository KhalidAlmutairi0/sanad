regulation:
  code: BOE196
  name_ar: نظام حماية التراث المخطوط في المملكة العربية السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: 'المادة الأولى: تعريفات'
  article_text_ar: 'تدل المصطلحات الآتية حيثما وردت على المعاني المدونة أمامها : أ - المخطوط : هو ما خط باليد أو رُقن بالآلة، ومضى على تدوينه خمسون عامًا فأكثر، سواء أنشر فيما بعد أم لم ينشر، وسواء أكان في مكتبة رسمية أم خاصة، أو لدى الهيئات أو شخص بعينه. ب - المكتبة : هي مكتبة الملك فهد الوطنية. ج - الترميم : معالجة الأجزاء التالفة من المخطوط، وصيانته بطريقة فنية لا تؤثر على محتواه العلمي. د - التسجيل : هو تدوين البيانات الوصفية المتعلِقة بالمخطوط في سجِل خاص بالمكتبة. هـ - الفهرسة : هي تدوين البيانات الوصفية عن المخطوط بذكر عنوانه وموضوعه ومؤلفه، والعصر الذي عاش فيه، ومسطرته وعدد أوراقه وناسخه وتاريخ نسخه، والمعلومات الأخرى المثبتة عليه من تملك ووقف، وبيان حالته المادية وما يحتوي عليه من ميزات فنية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'يهدف هذا النظام إلى ما يأتي : أ - الحفاظ على التراث المخطوط في المملكة. ب - إعطاء المكتبة سندًا نظاميًّا يساعد على طلب المخطوطات من الهيئات والمكتبات المحلية والأفراد بالتراضي لتصويرها، وإتاحتها للباحثين في مكان واحد. ج - إعانة المكتبة على إصدار فهرس وطني بالمخطوطات الموجودة داخل المملكة، بما يعين على توفير المعلومات عنها للباحثين وغيرهم.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تعمل المكتبة على ما يأتي : أ - اقتناء المخطوطات الأصلية عن طريق الشراء أو الإهداء أو الوقف . ب - تسجيل المخطوطات المحفوظة في المكتبات الرسمية والخاصة، وما لدى الهيئات والأفراد في سجل خاص، ومنح شهادات تسجيل لملاك المخطوطات من الأفراد والمكتبات الرسمية والخاصة. ج - التنسيق مع المكتبات الأخرى المؤهلة فنيًّا في تعقيم المخطوطات التي تحتاج إلى ذلك وترميمها وصيانتها. د - تصوير جميع المخطوطات الأصلية المحفوظة بالمكتبات الرسمية والخاصة والمملوكة من قبل الأفراد، وحفظ نسخة منها ضمن مجموعاتها لإتاحتها للباحثين، وفي حال إيداع نسخة أخرى في مخزن خاص يوفر لها الحماية والأمن، ويكون ذلك في موقع يبعد عن موقع المكتبة بمسافة لا تقل عن أربعة أكيال. هـ - فهرسة المخطوطات الموجودة في المملكة، وإخراج فهرس وصفي لها، مع موالاة إصدار فهارس متعاقبة لكل مجموعة تنتهي فهرستها فيما بعد. و - تبادل صور المخطوطات بين الأجهزة العلمية المختلفة في الداخل والخارج.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يكون مجلس أمناء المكتبة لجنة متخصصة لتحديد التراث المخطوط المشمول بالحماية وفقا لهذا النظام، والنظر في مخالفات أحكامه. وتوضح اللائحة التنفيذية كيفية عمل هذه اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: أ - للمكتبة الاطلاع على مخطوطات المكتبات الخاصة أو الهيئات أو الأفراد، بهدف توثيقها. ب - من حق صاحب المخطوط أن يخرجه خارج المملكة لغرض الترميم أو العرض أو البيع بموافقة المكتبة، إذا لم ترغب المكتبة أو سواها من داخل المملكة في الشراء بالسعر المعروض، وتشعر المكتبة بالمالك الجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يعاقب كل من يخالف ما ورد في الفقرة (ب) من المادة الخامسة، بغرامة لا تزيد على خمسين ألف ريال وفق المادة الرابعة من هذا النظام. ويمكن التظلم أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يصدر مجلس أمناء المكتبة اللائحة التنفيذية لهذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد تسعين يومًا من تاريخ نشر، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8161ec24-d5e0-48b4-8392-a9a700f278d8/1
  verified: false
