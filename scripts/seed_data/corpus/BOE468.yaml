articles:
- article_ref: 'المادة الأولى: إنشاء الصندوق'
  article_text_ar: يؤسَّس بمُقتضى هذا التنظيم صندوق يُسمَّى ( صندوق تنمية الموارِد البشريِّة )، ويختص بتسهيل توظيف المواطنين وتدريبِهم وتشجيعِهم على العمل في القِطاع الخاص . وتكون له الشخصية الاعتبارية ، ويتمتع بالاستقلال الإداري والمالي ، ويُمثِلُه رئيس مجلِس إدارتِه ويكون مركزُه الرئيسي في مدينة الرياض، وللصندوق في سبيل مُزاولة نشاطِه أن يُنشئ فروعاً أو يُعيِّن وكلاء في مُدُّن أُخرى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: 'المادة الثانية: أهداف واختِصاصات الصندوق'
  article_text_ar: 'يهدف الصندوق إلى دعم جهود تأهيل القوى العامِلة الوطنية، وتوظيفِها في القِطاع الخاص . وله في سبيل تحقيق أهدافِه، القيام بما يلي: 1 - تقديم الإعانات من أجل تأهيل القوى العامِلة الوطنية، وتدريبِها وتوظيفِها في القِطاع الخاص .2 - المُشاركة في تكاليف تأهيل القوى العامِلة الوطنية، وتدريبِها على وظائف القِطاع الخاص . ويُحدِّد مجلِس إدارة الصندوق نِسبة هذه المُشاركة، وتُدفع النِسبة المُتبقية من قِبل صاحِب العمل المُستفيد من تأهيل المُتدرِب.3 - تحمُّل نِسبة من راتب من يتم توظيفه في مُنشآت القِطاع الخاص ، بعد تأهيلِه وتدريبِه، وكذلك من يتم توظيفُه في هذه المُنشآت بالتنسيق مع الصندوق، ويدفع صاحِب العمل النِسبة المُتبقية من الراتِب. ويكون تحمُّل الصندوق لهذه النِسبة لفترة لا تزيد على سنتين، ويقوم مجلِس الإدارة بوضع الشروط اللازِمة لصرفِها. 4 - دعم تمويل برامِج ميدانية ومشاريع وخُطَّط ودِراسات تهدِف لتوظيف السعوديين وإحلالِهم محل العمالة الوافِدة.5 - تقديم قروض لمُنشآت تأهيل وتدريب القوى العامِلة الوطنية الخاصة التي تؤسَّس في المملكة، والمُنشآت القائمة بغرض توسِعة نشاطِها، أو لإدخال
    الأساليب الحديثة عليها.6 - القيام بالبحوث والدِراسات المُتعلِقة بأنشِطته في مجال تأهيل وتدريب وتوظيف القوى العامِلة الوطنية، وكذلك تقديم المشورة الفنية والإدارية لمُنشآت تأهيل القوى العامِلة الوطنية وتدريبِها .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: 'المادة الثالثة: مصادِر تمويل أنشِطة الصندوق'
  article_text_ar: 1 - الرسوم التي تُقرِّرُها الدولة لصالِح الصندوق.2 - الإعانات التي تُقدِّمُها الدولة.3 - المِنح والهِبات والمُساعدات والأوقاف التي يُقرِّر مجلِس الإدارة قبولِها.4 - العائد من استثمارات الصندوق لموارِده.5 - أجور الخدمات، وما يقوم بتحصيلِه في سبيل مُّمارسة نشاطِه في مجال الإقراض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: 'المادة الرابعة: ضوابِط منح القروض'
  article_text_ar: 1- إجراء تقويم للجدوى الاقتِصادية لبرامِج ومشروعات التدريب قبل إقراض المُنشأة، مع مُراعاة الأهداف العامة للصندوق. 2 - الحصول على ضمانات كافية من المُنشأة التي يُقرِضُها، تتناسب وحجم التمويل الذي يُقدِّمُه الصندوق. 3 - لا يتجاوز مبلغ القرض المُقدَّم لأي برنامج أو مشروع في مُنشأة واحدة نِسبة (2.5%) من المبالِغ المُخصَّصة للقروض في الميزانية السنوية للصندوق، وكذلك نسبة (30%) من التكلُفة الإجمالية للمشروع المُقترِض له. 4 - مُراقبة تنفيذ البرامِج والمشروعات التي يُقرِضُها للتأكُد من أنها تسير سيراً مُنتظِماً حسب الخُطة المُحدَّدة لها، وتقديم مشورتِه للمُنشآت فيما يتعلق بالمُشكِلات والصعوبات التي تتعرض لها هذه البرامِج والمشروعات، وتَّتِم هذه الرِّقابة عن طريق الحصول على تقارير دورية عن سير العمل في تلك البرامِج والمشروعات، والقيام بزيارات تفتيشية لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: 'المادة الخامسة: السنة المالية للصندوق ومصاريف التشغيل'
  article_text_ar: 1 - السنة المالية للصندوق هي السنة المالية للدولة.2 - تُمول نفقات الصندوق الإدارية لِكُل سنة من إيراداتِه، على ألاَّ تتجاوز تلك النفقات نِسبة مُحدَّدة من إيراداتِه يُقرِّرُها مجلِس الإدارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: 'المادة السادسة: مجلِس إدارة الصندوق'
  article_text_ar: 'أولاً - يتكون مجلِس إدارة الصندوق على النحو الآتي : 1- وزير الداخلية رئيس مجلِس القوى العامِلة رئيساً 2 - وزير العمل والشؤون الاجتِماعية نائباً للرئيس 3 - عضوية مُّمثِلين عن كُلٍ مِن : وزارة المالية والاقتِصاد الوطني، وزارة التخطيط، وزارة الصِناعة والكهرباء، و وزارة التجارة ، المؤسسة العامة للتعليم الفني والتدريب المِهني ، معهد الإدارة العامة والأمانة العامة لمجلِس القوى العامِلة . 4 - ثلاثة أعضاء يُمثِلون القِطاع الخاص يُرشحُهم وزير التِجارة، ويصدُر بتعيينهم قرار من مجلس الوزراء .'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: 'المادة السابعة: اختِصاصات مجلِس إدارة الصندوق'
  article_text_ar: 1- إقرار توسيع مهماتِه لتشمل إعادة تأهيل المواطِن السعوديِّ وتدريبِه. 2 - إقرار الهيكل التنظيمي. 3 - إصدار جميع اللوائح اللازِمة لعمل الصندوق وإدارتِه، بما في ذلك اللوائح المالية، واللوائح الخاصة بموظفي الصندوق، وذلك بما يُمكِّنُه من تحقيق أهدافِه. 4 - تكوين اللجنة التنفيذية للصندوق، وتعيين المُدير العام، وتحديد صلاحياتِه. 5 - إصدار ميزانية تقديرية لنشاط الصندوق ونفقاتِه الإدارية لِكُلِ سنة مالية، ويُحدِّد مجلِس الإدارة القواعِد التي تُّتبع في حال نقص الإيرادات أو زيادة المصروفات عمَّا هو مُقدر. 6 - تعيين مُراجِع حِسابات من بين المُراجعين المُرخص لهُم، وتحديد أتعابِه ومُدة عملِه. 7 - رفع الحِساب الختامي والتقرير السنوي عن نشاط الصندوق لمجلِس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 1 - تتمتع القروض التي يمنحها الصندوق بالمزايا والضمانات المُقرَّرة لحقوق الخزينة العامة .2 - يقوم ديوان المُراقبة العامة بمُراجعة حِسابات الصندوق ومُراقبتِها وِفقاً لهذا التنظيم وإجراءات الصندوق.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يُنشر هذا التنظيم في الجريدة الرسمية ، ويُعمل بِه بعد تسعين يوماً من تاريخ نشرِّه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5a16cf9b-e1b8-426f-82ab-a9a700f2a640/1
  verified: false
