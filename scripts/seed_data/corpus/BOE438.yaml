regulation:
  code: BOE438
  name_ar: إنشاء الهيئة العليا لأندية الفروسية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'تنشأ هيئة عليا لأندية الفروسية، مقرها مدينة الرياض، تتولى وضع السياسة العامة لأندية الفروسية، والعمل على تطويرها وتهيئة أنسب الظروف والسبل لأحياء التراث العربي والإسلامي للفروسية، وتنمية الجياد العربية، وتنشيط ودعم حركة رياضة الفروسية بمختلف ألوانها بين صفوف الشباب، كما تتخذ كافة الوسائل المشروعة لتحقيق هذه الأهداف. وتتكون الهيئة العليا من: 1 - رئيس يعين بأمر ملكي .2 - نائب للرئيس يختاره رئيس الهيئة العليا.3 - رئيس مجلس إدارة كل ناد للفروسية عضوًا.4 - عشرين عضوًا يختارهم رئيس الهيئة العليا، لمدة أربع سنوات، قابلة للتجديد.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تختص الهيئة العليا بإنشاء أندية الفروسية، واعتماد لوائحها المالية والإدارية، ومراقبة تنفيذها، والإشراف على إدارتها. ولها على وجه الخصوص ما يلي: 1 - وضع اللائحة المالية والإدارية، وغيرها من اللوائح اللازمة، لحسن سير العمل في الهيئة وتنظيم اجتماعاتها. وتشكيل ما يلزم من لجان فرعية، وتحديد مهامها.2 - وضع قواعد السباق وبرامجه.3 - وضع لائحة لعضوية أندية الفروسية تبين فيها فئات العضوية وشروطها، وحقوق الأعضاء وواجباتهم، والرسوم والاشتراكات، وحالات إسقاط العضوية، والجزاءات التي توقع قبل ذلك، وشروط العضوية لمجلس الإدارة، وقواعد الترشيح والاختيار للعضوية.4 - التنسيق بين أندية الفروسية، وخاصة في مجال السباق والتمويل.5 - مناقشة تقرير مجلس إدارة كل ناد للفروسية عن أعماله وحالته خلال العام المنصرم، واتخاذ ما يراه.6 - إقرار مشروع ميزانية كل ناد للفروسية للسنة المالية المقبلة.7 - الموافقة على الحساب الختامي ، لكل ناد للفروسية، للسنة المالية المنتهية، واعتماد تقرير مراقب الحسابات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يعين للهيئة العليا أمين عام من بين أعضائها أو من غيرهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: تجتمع الهيئة العليا في الموعد الذي يحدده الرئيس أو من ينيبه، وتدون قراراتها في سجل محاضر جلسات الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون اجتماع الهيئة العليا نظاميا بحضور أغلبية أعضائها، على أن يكون من بينهم الرئيس أو نائبه، أو من ينيبه الرئيس، وتتخذ القرارات بأغلبية أصوات الأعضاء الحاضرين، وإذا تساوت الأصوات يرجح الجانب الذي معه رئيس الجلسة، ولا يجوز لعضو الهيئة العليا الاشتراك في التصويت إذا كان له مصلحة شخصية في القرار المطروح للتصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'تتألف أموال وإيرادات الهيئة العليا من: 1 - الإعانات والتبرعات والهبات.2 - نسبة من إيرادات كل ناد للفروسية إن وجدت، بعد خصم المصروفات. ويتم تحديدها بقرار من الهيئة العليا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون لكل ناد للفروسية مجلس إدارة، يتكون من: 1 - رئيس يختاره رئيس الهيئة العليا.2 - ستة أعضاء يختارهم رئيس الهيئة العليا بالتشاور مع أعضائها لمدة أربع سنوات قابلة للتجديد مرة واحدة، ويختار من بينهم نائبًا للرئيس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون لكل ناد للفروسية مدير عام، يعين بقرار من مجلس الإدارة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: أموال كل ناد للفروسية الثابتة والمنقولة وكافة إيراداته تعتبر ملكًا له، وليس للأعضاء أي حق فيها، ولا يجوز الإنفاق من أموال أندية الفروسية في غير الأغراض التي أنشئت من أجلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تتم مراجعة وتدقيق حسابات أندية الفروسية وفق المعايير المحاسبية المتعارف عليها من قبل مراجع حسابات قانوني، على أن تقدم هذه الحسابات وفق تقرير نهائي إلى الهيئة العليا خلال ستين يومًا من نهاية كل سنة مالية للموافقة عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: لكل مجلس إدارة إذا تبين له أن النادي أصبح عاجزًا عن تحقيق أغراضه أن يطلب دعوة الهيئة العليا للاجتماع للنظر في حل النادي أو اندماجه مع غيره، وفي حالة حل النادي- لأي سبب- يصدر الرئيس قرارًا بالحل، ينص فيه على تعيين الجهة التي يعهد إليها بمهمة تصفية النادي، والإجراءات التي يتعين أتباعها في هذا الصدد، والجهة التي تؤول إليها أموال النادي وممتلكاته بعد إتمام التصفية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: لا يجوز لأندية الفروسية أن تبت نهائيًّا في المفاوضات والاتصالات مع أفراد أو هيئات خارج المملكة، إلا بعد الحصول على موافقة الجهة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/ff94406f-9cba-4e01-bc22-a9a700f27d2b/1
  verified: false
