regulation:
  code: BOE492
  name_ar: الترتيبات التنظيمية لمركز الفعاليات (المركز الوطني للفعاليات)
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ الآتية -أينما وردت في هذه الترتيبات- المعاني المبينة أمامها، ما لم يقتضِ السياق غير ذلك: الترتيبات: الترتيبات التنظيمية لمركز الفعاليات. المركز: مركز الفعاليات. المجلس: مجلس الشؤون الاقتصادية والتنمية. اللجنـــة: لجنة الفعاليات بالمجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يتمتع المركز بالشخصية الاعتبارية وبالاستقلال المالي والإداري، ويرتبط تنظيميًّا بالمجلس. يكون مقر المركز الرئيس في مدينة الرياض، وله إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يهدف المركز إلى تعزيز قطاع الفعاليات في المملكة، والارتقاء بالخدمات المقدمة في هذا المجال، ودعم مواسم السعودية، وفقًا لما يصدر من أوامر وقرارات، ووفقًا للتوجهات والرؤى التي تضعها اللجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات ومسؤوليات الجهات الأخرى، للمركز في سبيل تحقيق أهدافه القيام -دون حصر- بما يأتي: اقتراح مشروعات الأنظمة واللوائح ذات الصلة باختصاصات المركز، واتخاذ ما يلزم لاستكمال الإجراءات النظامية. إعداد وتنفيذ الشراكات والاتفاقيات بالتعاون مع الجهات ذات العلاقة، بما يمكن من تحقيق أهداف المركز. تحسين كفاية الإنفاق في قطاع الفعاليات. إجراء الدراسات والبحوث ذات الصلة باختصاصات المركز. الاستعانة بالكفايات المحلية والدولية المتخصصة في مجالات عمل المركز بما يسهم في تحقيق أهدافه. أي اختصاص آخر يكلفه به المجلس أو اللجنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'تتولى اللجنة الإشراف على إدارة شؤون المركز وتصريف أموره، وتتخذ جميع القرارات اللازمة لتحقيق أغراضه في حدود ما تضمنته الترتيبات، ولها على وجه الخصوص ما يأتي: إقرار السياسات المتعلقة بنشاط المركز، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات في شأنه. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات المركز، واقتراح تعديل المعمول به منها، والرفع عما يستلزم استكمال إجراءات في شأنه. إقرار اللوائح المالية والإدارية للمركز وغيرها من اللوائح الداخلية، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية. إقرار هيكل المركز التنظيمي. الموافقة على إنشاء فروع أو مكاتب للمركز. تحديد المقابل المالي لما يقدمه المركز من خدمات وأعمال في مجال اختصاصه. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. الموافقة على مشروع ميزانية المركز السنوية، وحسابه الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيدًا لاستكمال ما يلزم في شأنها. اعتماد التقارير الدورية التي تقدم عن سير العمل في المركز. الموافقة على إبرام الاتفاقيات والبروتوكولات
    والعقود، بحسب الإجراءات النظامية المتبعة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقًا للأحكام المنظمة لذلك. وللجنة -في سبيل تنفيذ اختصاصاتها الواردة في هذه المادة- تشكيل لجان دائمة أو مؤقتة من أعضائها أو من سواهم، تعهد إليها بما تراه من مهمات، ويُحدد قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها. ولها كذلك تفويض تلك اللجان ببعض اختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللجنة أيضاً تفويض بعض اختصاصاتها -المشار إليها في هذه المادة- إلى رئيسها أو إلى من تراه من أعضائها أو من مسؤولي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: تعقد اللجنة اجتماعاتها -فيما يتصل بأعمال المركز- بصفة دورية أربع مرات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس اللجنة، أو إذا طلب ذلك ثلث أعضائها على الأقل. توجه الدعوة للاجتماع من رئيس اللجنة -كتابة- قبل موعد الاجتماع بسبعة أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. يشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم رئيس اللجنة أو من ينيبه من الأعضاء في حال غيابه، وتصدر القرارات بأغلبية أصوات الأعضاء الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوّت معه رئيس الاجتماع. تثبت مداولات اللجنة وقراراتها في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. لا يجوز للعضو الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسبابه ضمن محضر الاجتماع. لا يجوز للعضو أن يفشي شيئًا مما وقف عليه من أسرار المركز بسبب عضويته في اللجنة. للجنة دعوة من ترى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاتها، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للمركز مدير عام، يكون تعيينه وإعفاؤه بقرار من اللجنة، ويحدد القرار أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون المركز وتنسيق العمل فيه، وتتركز مسؤولياته في حدود الأحكام الواردة في الترتيبات وما تقرره اللجنة، ويتولى الاختصاصات الآتية: اقتراح السياسات المتعلقة بنشاط المركز، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى اللجنة لاعتمادها. الإشراف على سير العمل في المركز من خلال اللوائح والخطط والبرامج المعتمدة. الإشراف على إعداد هيكل المركز التنظيمي ولوائحه المالية والإدارية، وعرضها على اللجنة لإقرارها، والإشراف على تنفيذها بعد إقرارها. الإشراف على إعداد مشروع ميزانية المركز وتقريره السنوي وحسابه الختامي، ورفعها إلى اللجنة. التوقيع على الاتفاقيات والبروتوكولات بعد موافقة اللجنة، ووفقاً للإجراءات النظامية المتبعة. تمثيل المركز أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض ذلك إلى من يراه من المختصين. إصدار الأوامر بمصروفات المركز، وفقاً للوائح المالية. التعاقد لتنفيذ الأعمال والخدمات
    وغيرها، وفقاً للأنظمة والصلاحيات التي فوضته بها اللجنة. إصدار القرارات اللازمة لتنفيذ الأحكام الواردة في الترتيبات واللوائح الصادرة بناءً عليها، بحسب الصلاحيات المخولة له. تعيين العاملين في المركز والإشراف عليهم، وفقاً لما تحدده اللوائح. أي مهمة أخرى تكلفه بها اللجنة. وللمدير العام تفويض بعض اختصاصاته إلى غيره من مسؤولي المركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يرفع مدير عام المركز إلى اللجنة -خلال (ثلاثين) يوماً من بداية كل سنة مالية- تقريراً سنويًّا عما حققه المركز من إنجازات وفقاً لأهدافه مقارنة بما يرد في الرؤى الوطنية للمملكة وخططها وبرامجها، وما واجهه من تحديات، وما يراه من مقترحات لحسن سير العمل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتألف موارد المركز مما يأتي: أ- ما يخصص له من اعتمادات في الميزانية العامة للدولة. ب- المقابل المالي الذي يتقاضاه عن الخدمات والأعمال التي يقدمها. ج- ما تقبله اللجنة من هبات وتبرعات ومنح ووصايا وأوقاف. د- أي مورد آخر تقره اللجنة، بما لا يخالف الأنظمة والتعليمات. تودع إيرادات المركز في حساب جاري وزارة المالية في مؤسسة النقد العربي السعودي. يفتح المركز حساباً له في مؤسسة النقد العربي السعودي، وله فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق اللوائح المالية للمركز.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للمركز ميزانية سنوية مستقلة. السنة المالية للمركز هي السنة المالية للدولة. واستثناء من ذلك تبدأ السنة المالية الأولى له من تاريخ نفاذ الترتيبات، وتنتهي بنهاية السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، تعيّن اللجنة مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المركز ومعاملاته وبياناته وميزانيته السنوية وحسابه الختامي، وتحدد اللجنة أتعابه. ويرفع تقرير مراجع الحسابات إلى اللجنة، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يخضع منسوبو المركز لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تنشر الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e73fd7d3-e812-477b-8112-ad3f00d16fd9/1
  verified: false
