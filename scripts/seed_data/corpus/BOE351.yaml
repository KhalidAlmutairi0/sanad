articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ الآتية -أينما وردت في هذا التنظيم- المعاني المبيّنة أمام كل منها، ما لم يقتضِ السياق غير ذلك: الوزير: وزير الإعلام. الوكالة: وكالة الأنباء السعودية (واس). المجلس: مجلس إدارة الوكالة. التنظيم: تنظيم الوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يكون للوكالة شخصية اعتبارية عامة، واستقلال مالي وإداري (باعتبارها هيئة عامة)، وترتبط تنظيميّاً بالوزير. ويكون مقرها الرئيس مدينة الرياض، ولها -عند الحاجة- إنشاء فروع ومكاتب داخل المملكة وخارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الوكالة إلى الآتي: تغطية الأحداث والقضايا والنشاطات المختلفة ومتابعتها وتوثيقها على المستوى المحلي والإقليمي والدولي، وبصفة خاصة ذات الصلة بالمملكة. بث الأخبار المحلية والإقليمية والدولية، وتسويقها، وتوزيعها، على الأفراد والمؤسسات الإعلامية، وتقديم كافة الخدمات الإخبارية لهم. نشر مضامين الأنظمة والقرارات واللوائح في المملكة، وتوعية المجتمع بها. الإسهام في تعزيز المهنية الإعلامية والصحفية في المملكة. مواكبة المتغيرات وتوظيف التطورات المهنية والتقنية في مجال اختصاصها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'دون إخلال باختصاصات الجهات الأخرى، تتولى الوكالة لتحقيق أهدافها -على سبيل المثال لا الحصر- المهمات والاختصاصات الآتية: تقديم الخدمات الإخبارية والمواد الصحفية التي تجمع وتعد من مختلف المصادر داخل المملكة وخارجها، وبثها، وتوزيعها. تبادل المعلومات والتسهيلات المهنية والتقنية مع وكالات الأنباء الإقليمية والدولية. إعداد الدراسات والبحوث والنشرات المتخصصة واستطلاعات الرأي والخدمات الإخبارية. نشر الأخبار العالمية وتوزيعها من فروعها ومكاتبها الخارجية أو من وكالاتها وإذاعاتها ومراسليها. توثيق أوجه التعاون مع وكالات الأنباء الإقليمية والعالمية، وتدعيم الروابط باتحادات وكالات الأنباء الإقليمية والعالمية. تأسيس الوكالات التي تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها أو الإسهام في تأسيسها، بالاتفاق مع وزارة المالية، ووفق الإجراءات النظامية ذات الصلة. القيام بكل الأعمال والمهمات الإعلامية والإخبارية أو أي عمل آخر متصل أو متعلق بها. نشر الإعلانات الحكومية والتجارية، دون إخلال بما يخص السرية. توثيق الإنجازات التنموية، وتوزيعها، وتسويقها، وبثها. المشاركة في إعداد الاستراتيجية الوطنية
    للإعلام، بالتنسيق مع الجهات ذات العلاقة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للوكالة مجلس إدارة برئاسة الوزير وعضوية كل من: أ- رئيس الوكالة. ب- ممثل من وزارة الخارجية. جـ- ممثل من وزارة المالية. د- ممثل من الهيئة العامة للإعلام المرئي والمسموع. هـ- عضوين من أصحاب الخبرة والاختصاص، يعينان بأمر من رئيس مجلس الوزراء بناء على ترشيح من الوزير، وتكون عضويتهما لمدة (ثلاث) سنوات قابلة للتجديد لمرة واحدة. يجب ألا تقل مراتب ممثلي الجهات الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها. يختار رئيس المجلس نائباً له من بين أعضاء المجلس المشار إليهم في الفقرات (ب، جـ، د) من الفقرة (1) من هذه المادة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجتمع المجلس -بصفة دورية- بما لا يقل عن (أربعة) اجتماعات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره رئيس المجلس أو نائبه، أو إذا طلب ذلك (ثلث) أعضائه على الأقل. وتوجه الدعوة إلى الاجتماع من رئيس المجلس أو نائبه -كتابةً- قبل موعد الاجتماع بـ(سبعة) أيام على الأقل، وتتضمن الدعوة جدول الأعمال. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء على الأقل، بمن فيهم رئيس المجلس أو نائبه. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تعقد اجتماعات المجلس في مقر الوكالة الرئيس. ويجوز للمجلس، بقرار من رئيس المجلس أو نائبه، عقد الاجتماع في أي مكان آخر داخل المملكة. يجوز -عند الحاجة- عقد الاجتماعات والتصويت على القرارات عن بُعد باستخدام وسائل التقنية، ولا تعد القرارات المتخذة بهذه الطريقة صحيحة ما لم يصوت عليها جميع أعضاء المجلس. ولا يكون القرار نافذاً إلا إذا حاز على موافقة أغلبية الثلثين على الأقل. ويعرض القرار المتخذ بهذه الطريقة على المجلس في أول اجتماع لاحق لإثباته في محضر الاجتماع. لا يجوز لأي عضو الامتناع عن التصويت،
    ولا أن يفوض غيره بالتصويت نيابةً عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. ويجوز للعضو تسجيل اعتراضه مسبباً في محضر اجتماع المجلس. لرئيس المجلس أو نائبه دعوة من يراه من أهل الاختصاص والخبرة لحضور اجتماعات المجلس، وتقديم المعلومات والرأي والمشورة، دون أن يكون له حق التصويت. يكون للمجلس أمين من بين منسوبي الوكالة يختاره رئيس المجلس بناء على ترشيح رئيس الوكالة، يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر والمداولات والقرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'المجلس هو السلطة العليا في الوكالة، ويختص بالإشراف عليها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق الأهداف التي قامت من أجلها وفقاً لأحكام التنظيم واللوائح الصادرة بناء عليه، وله على وجه خاص ما يأتي: اعتماد السياسات العامة للوكالة المتعلقة بأنشطتها، واعتماد الخطط والبرامج اللازمة لتنفيذها، ومتابعة تنفيذها بعد اعتمادها. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الوكالة، واقتراح تعديل المعمول به منها، والرفع عن ذلك وفق الإجراءات النظامية المتبعة. الإشراف على تنفيذ الوكالة للمهمات والاختصاصات المنوطة بها. اعتماد الهيكل التنظيمي للوكالة. إقرار اللوائح المالية واللوائح الإدارية التي تسير عليها الوكالة، بالاتفاق مع وزارة المالية فيما يتعلق باللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية، وبالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية فيما يتعلق باللوائح الإدارية. إقرار اللوائح الداخلية الأخرى التي تسير عليها الوكالة. الموافقة على مشروع ميزانية الوكالة، وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي؛ تمهيداً لرفعها بحسب الإجراءات
    النظامية. تعيين مراجع حسابات (أو أكثر) خارجي معتمد، ومراقب مالي داخلي. قبول الهبات والتبرعات والأوقاف والإعانات والمنح والوصايا، وفقاً للإجراءات المنظمة لذلك. الموافقة على إبرام مذكرات التفاهم والاتفاقيات والعقود، وفقاً للإجراءات النظامية المتبعة. النظر في التقارير الدورية التي تقدم عن سير العمل في الوكالة ومركزها المالي. الموافقة على تأسيس الوكالة للوكالات التي تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها، أو الإسهام في تأسيسها، بالاتفاق مع وزارة المالية، واستكمال ما يلزم. الموافقة على إنشاء فروع ومكاتب للوكالة داخل المملكة وخارجها. إقرار المقابل المالي للخدمات والأعمال التي تقدمها الوكالة، وفق الإجراءات النظامية المتبعة. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه مناسباً من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض صلاحياته إلى رئيسه أو من يراه من أعضاء المجلس أو من منسوبي الوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للوكالة رئيس يعين على المرتبة الممتازة، ويعد المسؤول عن إدارة شؤونها، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويتولى على وجه خاص الاختصاصات الآتية: اقتراح السياسات العامة للوكالة المتعلقة بأنشطتها، واقتراح الخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس لاعتمادها، والإشراف على تنفيذها بعد اعتمادها. الإشراف على إعداد الهيكل التنظيمي للوكالة، ولوائحها الإدارية والمالية، واللوائح الداخلية اللازمة لتسيير العمل فيها، ورفعها للمجلس لاعتمادها. الإشراف على سير أنشطة وأعمال الوكالة طبقاً للصلاحيات الممنوحة له من المجلس وما تحدده الأنظمة واللوائح ذات الصلة. اقتراح الخدمات والأعمال التي يمكن تقديمها والمقابل المالي لها، والرفع عن ذلك إلى المجلس؛ لاعتمادها. تمثيل الوكالة أمام القضاء والجهات الحكومية والهيئات الأخرى داخل المملكة وخارجها. وله تفويض من يراه في ذلك. تنفيذ قرارات المجلس ومباشرة ما يخوله إياه المجلس من اختصاصات وصلاحيات. الإشراف على إعداد مشروع ميزانية الوكالة، والتقرير السنوي، ومشروع الحساب الختامي، ورفعها للمجلس؛ للموافقة عليها. الصرف من
    ميزانية الوكالة المعتمدة، واتخاذ جميع الإجراءات المالية، وفق الأنظمة واللوائح ذات الصلة. إعداد التقارير الخاصة بتنفيذ خطط الوكالة وبرامجها ودراستها، وعرضها على المجلس. اقتراح الخطط لتطوير الأداء المهني والتقني والإخباري. التعاقد على تنفيذ الأعمال والخدمات وغيرها، وفق الأنظمة واللوائح ذات الصلة. التوقيع على الاتفاقيات والبروتوكولات والعقود، وفقاً للإجراءات النظامية المعتمدة. متابعة تنفيذ القرارات والتوصيات الصادرة عن المجلس، والقرارات ذات الصلة بأعمال الوكالة. تشكيل لجان العمل الداخلية (الدائمة والمؤقتة)، وفقاً لما تقضي به الأنظمة واللوائح والسياسات والإجراءات المعتمدة في الوكالة. الاستعانة بخدمات وكالات الأنباء العالمية والتعاقد مع مراسلين من داخل المملكة وخارجها، للحصول على الأخبار المحلية والعالمية والتقارير والتحليلات. الإشراف على مشاركة الوكالة في المؤتمرات والفعاليات والمهرجانات والمعارض المحلية والإقليمية والعربية والدولية، وفقاً للإجراءات النظامية المتبعة. إقرار الخطط والبرامج اللازمة لتدريب وابتعاث وإيفاد منسوبي الوكالة في جميع مجالات عملها، وفقاً للأنظمة واللوائح ذات الصلة،
    ومتابعة تنفيذها. تعيين العاملين في الوكالة طبقاً للأنظمة واللوائح ذات الصلة، والإشراف عليهم. الاستعانة بالخبراء والاستشاريين المتخصصين الذين تحتاج إليهم الوكالة، وفقاً للأنظمة واللوائح ذات الصلة. وللرئيس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتألف موارد الوكالة مما يأتي: أ- الاعتمادات التي تخصص لها في الميزانية العامة للدولة. ب- المقابل المالي الذي تتقاضاه عن الخدمات والأعمال التي تقدمها. ج- ما يقبله المجلس من هبات وتبرعات وأوقاف وإعانات ومنح ووصايا. د- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تودع جميع إيرادات الوكالة في حساب جاري وزارة المالية لدى البنك المركزي السعودي. تفتح الوكالة حساباً لها في البنك المركزي السعودي. ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تعامل الوكالة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للوكالة ميزانية سنوية مستقلة، تصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للوكالة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يخضع منسوبو الوكالة -ما عدا رئيس الوكالة- لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الوكالة إلى مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع الوكالة إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية تقريراً سنويًّا عما حققته من إنجازات خلال السنة المنقضية، وما واجهها من صعوبات، وما تراه من مقترحات لتحسين سير العمل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات الوكالة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الوكالة ومعاملاتها وميزانياتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f6093ffa-cdb4-4b47-86b1-b025008fdf45/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويحل محل تنظيم وكالة الأنباء السعودية الصادر بقرار مجلس الوزراء رقم (303) وتاريخ 11 / 9 / 1433هـ ، ويلغي كل ما يتعارض معه من أحكام.
