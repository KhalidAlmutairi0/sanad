regulation:
  code: BOE283
  name_ar: قواعد تنظيم لوحات الدعاية والإعلان
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد باللوحات والإعلانات في تطبيق أحكام هذه القواعد جميع وسائل الإعلام التالية : 1 - لوحات الدعاية : وتشمل كافة أنواع اللوحات المضاءة والعادية والمتغيرة ذاتيًّا الواقعة على الأرصفة وأعمدة الإنارة والميادين وتقاطعات الشوارع داخل حدود المدن. 2 - اللوحات الإرشادية المضاءة والعادية الخاصة بالمحلات التجارية. 3 - لوحات الدعاية الواقعة في الممتلكات الخاصة: وتشمل كافة اللوحات الواقعة في الأراضي وعلى أسطح المنازل والعمائر. 4 - لوحات الدعاية على الحافلات داخل حدود المدن لغير مالك الحافلة أو صفة النقل. 5 - لوحات الدعاية الواقعة على الطرق التي تنفذ من قبل وزارة المواصلات خارج النطاق العمراني. 6 - لوحات الدعاية الواقعة بالمدن والملاعب الرياضية الخاضعة لإشراف الرئاسة العامة لرعاية الشباب.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: 'تكون مسئولية تنظيم الإعلانات الواردة في المادة الأولى والإشراف عليها وفقًا للتفصيل التالي: 1 - وزارة الشئون البلدية والقروية ممثلة في الأمانات والبلديات والمجمعات القروية للإعلانات الموضحة في الفقرات (1 ، 2 ، 3 ، 4).2 - وزارة المواصلات للإعلانات الموضحة في الفقرة (5).3 - الرئاسة العامة لرعاية الشباب للإعلانات الموضحة في الفقرتين (6 ، 7).4 - المؤسسة العامة للموانئ للإعلانات الموضحة في الفقرة (8).5 - رئاسة الطيران المدني للإعلانات الموضحة في الفقرة (9).6 - المؤسسة العامة للخطوط الحديدية للإعلانات الموضحة في الفقرة (10).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يحدد رسم سنوي عن لوحات الدعاية والإعلان الواردة في المادة الأولى وفق الترتيب التالي: 1 - مائتي ريال عن كل متر مربع أو أجزاء منه وذلك لجميع اللوحات الواردة في الفقرات (1، 3، 4، 5، 6، 8، 9، 10).2 - مائة ريال عن كل متر مربع أو أجزاء منه وذلك لجميع اللوحات الواردة في الفقرة (2).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يتم تحصيل الرسوم المشار إليها في المادة الثالثة من قبل الجهات التالية : 1 - الرئاسة العامة لرعاية الشباب لجميع الإعلانات الموضحة في الفقرة (6) من المادة الأولى. 2 - وزارة المواصلات لجميع الإعلانات الواقعة على الطرق التي تنفذ وتصان من قبلها خارج النطاق العمراني.3 - وزارة الشئون البلدية والقروية لجميع اللوحات والإعلانات الواقعة داخل المدن بما فيها الإعلانات الموضحة في الفقرة (4)، عدا تلك التي في الأماكن المغلقة مثل صالات المطارات وسكك الحديد والموانئ والملاعب الرياضية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يتم تأجير مواقع الإعلانات وفق الأسس التالية: 1 - التحديد الدقيق لمواقع وإعداد ومساحات لوحات الدعاية المسموح بها.2 - مراعاة ألا تؤثر اللوحات الدعائية من حيث الموقع والإضاءة على حركة المرور والمشاة.3 - ضرورة إزالة اللوحات الإعلانية ومنشآتها عند انتهاء عقد التأجير ما لم تطلب الجهة المؤجرة خلاف ذلك.4 - يتم التأجير للشركات والمؤسسات المرخص لها بمزاولة نشاط الدعاية والإعلان.5 - باستثناء ما ورد في الفقرات (2 ، 3، 4) من المادة الأولى، تتم عملية التأجير وفق الأنظمة والتعليمات الخاصة بتأجير الأماكن المملوكة للدولة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'باستثناء ما ورد في الفقرات (2 ، 3، 4) من المادة الأولى، يتم تأجير مواقع لوحات الدعاية والإعلان من قبل الجهات التالية: 1 - وزارة الشئون البلدية والقروية بالنسبة لجميع مواقع لوحات الدعاية والإعلان الواردة في الفقرة (1) ومواقع لوحات الدعاية والإعلان الواقعة على الطرق التي تنفذ وتصان من قبل وزارة المواصلات داخل حدود النطاق العمراني.2 - وزارة الموصلات بالنسبة لمواقع لوحات الدعاية والإعلان الواقعة على الطرق التي تنفذ وتصان من قبلها خارج حدود النطاق العمراني.3 - الرئاسة العامة لرعاية الشباب بالنسبة لمواقع لوحات الدعاية والإعلان الموضحة في الفقرة (6) وبالنسبة للإعلانات الموضحة في الفقرة (7).4 - المؤسسة العامة للموانئ بالنسبة لمواقع لوحات الدعاية والإعلان الموضحة في الفقرة (8).5 - الرئاسة العامة للطيران المدني بالنسبة لمواقع لوحات الدعاية والإعلان الموضحة في الفقرة (9)6 - المؤسسة العامة للخطوط الحديدية بالنسبة لمواقع لوحات الدعاية والإعلان الموضحة في الفقرة (10).'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعتبر الرسوم والأجور المحصلة من قبل الأمانات والبلديات والمجمعات القروية من الإيرادات الذاتية لها، أما الرسوم والأجور التي تحصلها الجهات الحكومية الأخرى فتعتبر إيرادات عامة وتودع في مؤسسة النقد العربي السعودي لحساب وزارة المالية والاقتصاد الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: تلتزم الشركة أو المؤسسة المرخص لها بالإعلان بتنفيذ نسبة معينة من الإعلانات ذات الهدف الخيري دون مقابل وذلك وفقًا لما تحدده وزارة الإعلام بالاتفاق مع الجهة ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تلتزم الشركة أو المؤسسة المنفذة للإعلان بدفع تكاليف إيصال واستهلاك التيار الكهربائي وأية تكاليف أخرى ذات علاقة حسب الأنظمة والتعليمات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون مسئولية الشركة أو المؤسسة المنفذة للإعلان تجهيز المواقع وما يلزم لها من منشآت مع صيانتها ونظافتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: إذا تعرضت لوحات الدعاية والإعلان لحوادث مرورية أو عوامل طبيعية فعلى الشركة أو المؤسسة المنفذة للإعلان إصلاحها ورفع المخلفات الناتجة عن الحوادث فورًا وخلال مدة لا تتعدى أربعًا وعشرين ساعة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: بالنسبة للمواقع المؤجرة من قبل الجهات الحكومية يجب ألا تزيد مدة التعاقد على استئجارها عن ثلاث سنوات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: لا يجوز للشركة أو المؤسسة المتعاقد معها على الإعلان التنازل عن العقد أو أي جزء منه لأي طرف آخر إلا بعد موافقة جهة الاختصاص كتابيًّا، وفي حالة المخالفة يحق لجهة الاختصاص إنهاء العقد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: للجهة المختصة بالتأجير الحق في إلغاء العقد المبرم مع الشركة أو المؤسسة المنفذة للإعلان إذا خالفت بندًا من بنود العقد دون تحمل أي التزام مالي قد يترتب على عملية الإلغاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يجب أن يكون الإعلان منسجمًا مع عادات وتقاليد البلاد، وأن تتلاءم مادة الإعلان مع الذوق السليم، مع مراعاة أن تكون الصور والكتابات في إطار الآداب الإسلامية، وأن تراعى قواعد اللغة العربية الفصحى في نص الإعلان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يجب على كل مرخص له أن يراعي مقتضيات الأمن والسلامة وعدم تشويه المناظر الطبيعية عند وضع الإعلان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: يجب على كل مرخص له بالإعلان أن يراعي في تطبيق هذه القواعد القرارات الخاصة بتشجيع المنتجات والخدمات المحلية، والإعلان عنها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: تلغي هذه القواعد جميع ما يتعارض معها، ولا تسري أحكامها على اللوحات والإعلانات الحكومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: يجوز تعديل هذه القواعد بقرار من مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: تنشر هذه القواعد في الجريدة الرسمية ويعمل بها بعد تسعين يومًا من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/16c49913-599f-406b-b016-a9a700f172c9/1
  verified: false
