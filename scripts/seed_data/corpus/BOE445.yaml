  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: أولاً
  article_text_ar: 'يكون للألفاظ والعبارة الآتية -أينما وردت في هذه الترتيبات- المعاني المبينة أمام كل منها، ما لم يقتض السياق غير ذلك: الهيئة:الهيئة السعودية للألعاب والرياضات الإلكترونية. الترتيبات: الترتيبات التنظيمية للهيئة. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. القطاع: قطاع الألعاب والرياضات الإلكترونية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: ثانياً
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: ثالثاً
  article_text_ar: تهدف الهيئة إلى تنظيم القطاع وتعزيز مكانته واستدامته وجاذبيته ومعالجة تحدياته، والعمل على تطويره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: رابعاً
  article_text_ar: 'دون إخلال باختصاصات الجهات الأخرى، للهيئة -في سبيل تحقيق أهدافها- القيام بما يأتي: اقتراح مشروعات الأنظمة واللوائح ذات الصلة بالقطاع، واقتراح تعديل النافذ منها، والرفع عن ذلك وفقاً للإجراءات النظامية. الإشراف على تنفيذ استراتيجية القطاع، وتحديثها والرفع عن ذلك وفقاً للإجراءات النظامية. وضع المعايير والإجراءات الخاصة بالقطاع. وضع الاستراتيجيات والسياسات والخطط والبرامج والمبادرات ذات الصلة بالقطاع، والرفع عما يتطلب استكمال إجراءات نظامية في شأنها. إصدار تراخيص مزاولة فعاليات وبطولات الألعاب والرياضات الإلكترونية، ووضع الضوابط والاشتراطات اللازمة لذلك؛ بالتنسيق مع الجهات ذات العلاقة، والتأكد من الالتزام بشروط وأحكام التراخيص. جمع بيانات القطاع وتحليلها وتحديثها، وإنشاء قاعدة للبيانات ذات الصلة بالقطاع، والتنسيق مع الجهات ذات العلاقة لتزويد الهيئة بما تحتاجه من معلومات أو بيانات أو تقارير تتطلبها طبيعة عمل الهيئة وفقاً للإجراءات النظامية. التعاون مع الجهات الحكومية وغيرها من الجهات ذات العلاقة، لتنفيذ المهمات المنوطة بالهيئة وبما يحقق مستهدفات استراتيجية القطاع، ومن ذلك
    ما يتعلق بالعمل على توظيف اللاعبين، وتقديم التسهيلات الممكنة لهم بتوفير بيئة عمل مناسبة، وإيجاد عقود رعاية، والبحث عن مصادر تمويل، وتطوير الألعاب الإلكترونية وإنتاجها، وبرمجتها، وتطوير أجهزتها. إبرام الاتفاقيات ومذكرات التفاهم ذات الصلة في مجالات اختصاصاتها مع الجهات المعنية داخل المملكة وخارجها، وفقاً للإجراءات النظامية. عقد المؤتمرات والندوات وجلسات العمل ذات الصلة في مجالات اختصاصاتها، والاشتراك فيها داخل المملكة وخارجها، وفقاً للإجراءات النظامية. دعم البحوث والدراسات، وإجراؤها في مجالات اختصاصاتها، سواء بشكل منفرد أو بالاشتراك مع الجهات ذات العلاقة. التعاون مع مراكز البحوث وبيوت الخبرة على المستويين المحلي والدولي -عند الحاجة- بما يساهم في تحقيق أهدافها. تقديم الخدمات والأعمال والمبادرات ذات الصلة في مجالات اختصاصاتها. العمل على توفير البيئة الاستثمارية الملائمة في مجالات اختصاصاتها، لتشجيع الشراكات في مجال القطاع من خلال المستثمرين من القطاعين العام والخاص، بالتنسيق مع الجهات ذات العلاقة. تمثيل المملكة في المنظمات الدولية والإقليمية ذات الصلة بالقطاع.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: خامساً
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة رئيس مجلس الشؤون الاقتصادية والتنمية، وعضوية كل من: وزير الرياضة. وزير الاتصالات وتقنية المعلومات. وزير الاقتصاد والتخطيط. وزير الاستثمار. رئيس مجلس إدارة الهيئة العامة لتنظيم الإعلام. رئيس مجلس إدارة الهيئة العامة للترفيه. مدير عام مكتب الإدارة الاستراتيجية بمجلس الشؤون الاقتصادية والتنمية. رئيس الاتحاد السعودي للرياضات الإلكترونية. عضوين من القطاع الخاص، أو من ذوي الخبرة والاختصاص بمجال عمل الهيئة، يعينان بأمر من رئيس مجلس الوزراء بناءً على ترشيح من الرئيس، وتكون عضويتهما لمدة (ثلاث) سنوات قابلة للتجديد لمرة واحدة. الرئيس التنفيذي. ويختار الرئيس نائباً له من الأعضاء المشار إليهم في الفقرات (1) و(2) و(3) و(4) و(5) و(6) و(7) من هذا البند.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: سادساً
  article_text_ar: 'يتولى المجلس الإشراف على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أهدافها في حدود ما تضمنته الترتيبات، وله على وجه خاص ما يأتي: الإشراف على تنفيذ الهيئة المهمات المنوطة بها. الموافقة على مشروعات الأنظمة ذات الصلة بالقطاع، واقتراح تعديل المعمول به منها، تمهيداً للرفع عن ذلك وفق الإجراءات النظامية. اعتماد الاستراتيجيات والسياسات والخطط والبرامج والمبادرات ذات الصلة بالقطاع وباختصاصات الهيئة، تمهيداً للرفع عما يتطلب استكمال إجراءات نظامية في شأنها. تحديث استراتيجية القطاع، تمهيداً للرفع عن ذلك وفقاً للإجراءات النظامية. إقرار المعايير والإجراءات الخاصة بالقطاع. إقرار الضوابط والاشتراطات اللازمة، لما تصدره الهيئة من تراخيص ذات الصلة بالأنشطة المرتبطة في مجالات اختصاصاتها. اعتماد هيكل الهيئة ودليلها التنظيمي. إقرار اللوائح المالية والإدارية التي تسير عليها الهيئة وغيرها من اللوائح الداخلية والفنية اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية، ويكون إقرار اللوائح الإدارية
    بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. تحديد المقابل المالي للتراخيص والخدمات والأعمال التي تقدمها الهيئة. الموافقة على إنشاء فروع الهيئة ومكاتبها. اعتماد مشروع ميزانية الهيئة وحسابها الختامي وتقريرها السنوي وتقرير مراجع حساباتها، تمهيداً لرفعها بحسب الإجراءات النظامية. تعيين مراجع حسابات خارجي للهيئة ومراقب مالي داخلي لها. النظر في التقارير الدورية التي تقدم له عن سير العمل في الهيئة والقطاع، واتخاذ القرارات اللازمة في شأنها. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، بحسب الإجراءات النظامية. الموافقة على آليات وضوابط قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقاً للأحكام المنظّمة لذلك. وللمجلس تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المعهود إليها. وللمجلس تفويض بعض اختصاصاته إلى رئيسه أو من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: سابعاً
  article_text_ar: يجتمع المجلس -بصفة دورية- (ثلاث) مرات في السنة على الأقل، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس أو نائبه، أو إذا طلب ذلك (ثلث) أعضائه على الأقل، وتوجه الدعوة للاجتماع من الرئيس أو نائبه -كتابةً- قبل موعد الاجتماع بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول الأعمال. تعقد اجتماعات المجلس في مقر الهيئة الرئيس. ويجوز -بقرار من الرئيس أو نائبه- عقد الاجتماع في أي مكان آخر داخل المملكة. يشترط لصحة اجتماع المجلس حضور أغلبية الأعضاء على الأقل بمن فيهم الرئيس أو نائبه. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند تساوي الأصوات يُرجّح الجانب الذي صوت معه رئيس الاجتماع. للمجلس دعوة من يرى من أهل الاختصاص والخبرة لحضور اجتماعات المجلس، وتقديم المعلومات والرأي والمشورة، دون أن يكون لهم حق التصويت. لا يجوز لعضو المجلس الامتناع عن التصويت ولا تفويض عضو آخر للتصويت عنه عند غيابه. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر الاجتماع. للمجلس -عند الحاجة ووفقاً لما يقدره الرئيس
    أو نائبه- عقد الاجتماعات والتصويت على القرارات عن بعد من خلال استخدام وسائل التقنية. ويمكن أن تُتّخذ القرارات عن طريق التمرير على الأعضاء، ويُوقّع عليها بما يُفيد اطّلاع جميع الأعضاء عليها. ولا تُعد القرارات الصادرة بهذه الطريقة صحيحة ما لم تُمرّر على جميع أعضاء المجلس الحاضرين، ويصوتوا عليها، وتحُز على أغلبية أصواتهم على الأقل. يكون للمجلس أمين من أعضاء المجلس أو من منسوبي الهيئة يعينه المجلس -بناءً على ترشيح الرئيس- يتولى أمانة المجلس، والإعداد للاجتماعات، وتسجيل المحاضر، والمداولات والقرارات. لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار الهيئة حتى بعد انتهاء عضويته في المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: ثامناً
  article_text_ar: 'يكون للهيئة رئيس تنفيذي، يعّين ويعفى بقرار من المجلس، ويحدد قرار تعيينه أجره ومزاياه المالية الأخرى، ويعد المسؤول عن إدارة شؤون الهيئة، وترتكز مسؤولياته في حدود الترتيبات وما يقرره المجلس، ويتولى الاختصاصات الآتية: الإشراف على سير العمل في الهيئة وفقاً للوائح والخطط والبرامج المعتمدة. الإشراف على إعداد مشروعات الأنظمة ذات الصلة بالقطاع، واقتراح تعديل النافذ منها، والرفع عنها للمجلس؛ لاستكمال الإجراءات النظامية في شأنها. الإشراف على وضع الاستراتيجيات والسياسات والخطط والبرامج والمبادرات ذات الصلة بالقطاع وباختصاصات الهيئة، ورفعها إلى المجلس؛ للنظر في اعتمادها. إعداد المعايير والإجراءات الخاصة بالقطاع، ورفعها إلى المجلس؛ للنظر في إقرارها. إعداد الضوابط والاشتراطات اللازمة، لما تصدره الهيئة من تراخيص ذات صلة بالأنشطة المرتبطة بمجالات اختصاصاتها، ورفعها إلى المجلس، للنظر في إقرارها. متابعة تنفيذ القرارات التي يصدرها المجلس. اقتراح هيكل الهيئة ودليلها التنظيمي، ورفعهما إلى المجلس؛ للنظر في اعتمادهما. اقتراح لوائح الهيئة المالية والإدارية التي تسير عليها، وغيرها من اللوائح
    الداخلية والفنية اللازمة لتسيير شؤونها، ورفع ما يلزم منها إلى المجلس؛ للنظر في إقرارها. الإشراف على إعداد مشروع الميزانية والحساب الختامي والتقرير السنوي للهيئة، ورفعها إلى المجلس؛ للنظر في اعتمادها. الصرف من ميزانية الهيئة المعتمدة، واتخاذ جميع الإجراءات المالية، وفقاً للأنظمة واللوائح المقرة، وفي حدود الصلاحيات التي يفوضه بها المجلس. اقتراح آليات وضوابط قبول الهيئة للهبات والتبرعات والمنح والوصايا والأوقاف وفقاً للأحكام المنظّمة لذلك، ورفعها إلى المجلس؛ للموافقة عليها. التوقيع على الاتفاقيات ومذكرات التفاهم والعقود بعد موافقة المجلس. تمثيل الهيئة أمام القضاء، والجهات الحكومية ذات العلاقة، وغيرها من الجهات الأخرى داخل المملكة وخارجها، وله تفويض غيره بذلك. الإشراف على إعداد التقارير الدورية التي تقدَّم عن سير العمل في الهيئة والقطاع، ورفعها إلى المجلس؛ للنظر فيها. تعيين العاملين في الهيئة والإشراف عليهم، وفقاً للوائح المعتمدة للهيئة. التعاقد مع المكاتب الاستشارية وبيوت الخبرة والخبراء في حدود نشاط الهيئة، ووفقاً لما تحدده اللوائح المعتمدة للهيئة. أي اختصاص آخر يسنده إليه المجلس. وللرئيس
    التنفيذي تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: تاسعاً
  article_text_ar: يخضع منسوبو الهيئة لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: عاشراً
  article_text_ar: 'تتألف موارد الهيئة مما يأتي: ما يُخصص لها في الميزانية العامة للدولة. ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وأوقاف، وفقاً للأحكام المنظمة لذلك. المقابل المالي الذي تتقاضاه عن التراخيص والخدمات والأعمال التي تقدمها. أي مورد آخر يقرُّه المجلس، بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: حادي عشر
  article_text_ar: تودع جميع إيرادات الهيئة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ويجوز لها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية الهيئة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: ثاني عشر
  article_text_ar: يكون للهيئة ميزانية سنوية مستقلة، تعد وتصدر وفقاً لترتيبات إصدار الميزانية العامة للدولة. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: ثالث عشر
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء حسابها الختامي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، ويزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: رابع عشر
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية تقريراً سنويًّا عما حققته من إنجازات، وما واجهته من صعوبات، وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: خامس عشر
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة؛ لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
- article_ref: سادس عشر
  article_text_ar: تنشر الترتيبات في الجريدة الرسمية، ويعمل بها من تاريخ نشرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6df93eb2-af1f-4c0b-bb4e-b0ec00a5e4ea/1
  verified: false
