regulation:
  code: BOE176
  name_ar: نظام محاكمة الوزراء
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة 1 -
  article_text_ar: تسري أحكام هذا النظام على أعضاء مجلس الوزراء والموظفين المعينين بمرتبة وزير، إذا ارتكبوا أثناء تأدية وظيفتهم أي الجرائم المنصوص عنها في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 2-
  article_text_ar: 'مع عدم الإخلال بما ينص عليه أي نظام آخر، يعاقب المحكوم عليهم وفقًا لهذا النظام بالسجن 25 عاما أو بالقتل، إذا ارتكبوا جريمة من الجرائم الآتية: أولاً : الأفعال المقصود بها محاولة تغيير النظام الملكي. ثانياً : جرائم الخيانة العظمى. ثالثاً : تعريض أمن الدولة الداخلي وسلامتها ووحدتها للخطر. رابعاً : زعزعة ولاء أفراد القوى المسلحة للملك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 3-
  article_text_ar: 'تعتبر الأفعال الآتية الذكر خيانة عظمى : أ - حمل السلاح ضد الدولة.ب - معاونة دولة أخرى في أعمال عدوانية ضد الدولة.ج - تسهيل دخول العدو إلى البلاد.د - تسليم المدن والحصون والمنشآت والمواقع والمواني والمصانع والسفن والطائرات والأدوات والذخائر والمؤن وطرق المواصلات إلى العدو.هـ - تحريض الجنود أو المدنيين على الانضمام للعدو.و - مساعدة تقدم العدو، بإثارة الفتن وإلقاء الذعر بمختلف الوسائل.ز- إفشاء أسرار الدفاع عن البلاد وتسليمها إلى دولة أجنبية بالذات أو بالواسطة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 4-
  article_text_ar: 'مع عدم الإخلال بما ينص عليه أي نظام آخر، يعاقب بالسجن من 5 - 10 سنوات من ارتكب إحدى الجرائم الآتية: أ - دس الدسائس لدى دولة أجنبية أو الاتصال بها لدفعها إلى مباشرة العدوان على أراضي الدولة.ب - القيام بأعمال أو خطب أو كتابات أو غير ذلك، بقصد اقتطاع جزء من أراضي الدولة لضمه إلى دولة أجنبية أو بقصد تمليكها حقا أو امتيازا فيها.جـ - تقديم السكن أو الطعام أو اللباس لجندي من جنود الأعداء أو لأحد جواسيسه، أو تسهيل فرار أسير حرب أو أحد رعايا العدو المعتقلين.د - سرقة أشياء أو وثائق أو معلومات تتعلق بسلامة الدولة لمنفعة دولة أجنبية.وفي حالة الحرب تعتبر هذه الأفعال من ضمن الفقرة (ب) من المادة الثالثة من هذا النظام.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 5-
  article_text_ar: 'مع عدم الإخلال بما ينص عليه أي نظام آخر، يعاقب بالسجن لمدة تتراوح من 3 - 10سنوات المتهم بموجب أحكام هذا النظام، إذا ارتكب إحدى الجرائم الآتية: أ - التصرفات أو الأفعال التي من شأنها التأثير بالزيادة أو النقص في أثمان البضائع والعقارات أو العملة أو الأوراق المالية، للحصول على فائدة شخصية له أو لغيره.ب - قبول فائدة - أيا كان نوعها - لنفسه أو لغيره، لقضاء عمل رسمي أو الامتناع عن عمل رسمي.جـ - استغلال النفوذ ولو بطريق الإيهام للحصول على فائدة أو ميزة لنفسه أو لغيره من أية هيئة أو شركة أو مؤسسة أو مصلحة من مصالح الدولة.د - تعمد مخالفة النظم واللوائح والأوامر التي يترتب عليها ضياع حقوق الدولة المالية، أو حقوق الأفراد الثابتة شرعا أو نظاما.هـ - إفشاء قرارات ومداولات مجلس الوزراء التي تتعلق بأمن الدولة الداخلي وبسلامتها الخارجية، وبالشئون المالية والاقتصادية، وبمحاكمة الوزراء.و - التدخل الشخصي في شئون القضاء والهيئات والدوائر الحكومية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 6-
  article_text_ar: يترتب حتما على الحكم بإدانة الوزير أو من في مرتبته، عزله من منصبه وحرمانه من تولي الوظائف العامة ومن عضوية مجالس إدارة الهيئات والشركات والمؤسسات، ومن أية وظيفة فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 7-
  article_text_ar: يترتب على الحكم بإدانة المتهم وفقا لهذا النظام، الحكم عليه من قبل الهيئة الحاكمة برد ما أفاده من جريمته. ويجوز لهيئة المحاكمة أن تحكم بتعويض ما حدث من ضرر لأي شخص، سواء كان طبيعيا أو اعتباريا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 8-
  article_text_ar: لا تنفذ عقوبة القتل إلا إذا كان الحكم صادرًا بالإجماع. أما إذا صدر الحكم المذكور بالأغلبية فتحال القضية إلى القضاء للبت فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 9-
  article_text_ar: الإجراءات المنصوص عليها في هذا النظام واجبة الاتباع في جميع أدوار التحقيق والمحاكمة، وأي إخلال بها يجعل الحكم باطلا.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 10-
  article_text_ar: يقوم رئيس مجلس الوزراء بمجرد قيام دلائل جدية على اقتراف الوزير أو من في مرتبته إحدى الجرائم المنصوص عليها في هذا النظام، بتأليف لجنة تحقيق من وزيرين أو من في مرتبتهما وعضو شرعي برتبة رئيس محكمة كبرى على الأقل. تتولى هذه الهيئة دراسة الموضوع والتحقيق فيه، وترفع تقريرا بنتيجة ذلك إلى رئيس مجلس الوزراء خلال ثلاثين يوما من تاريخ تكليفها ببحث الموضوع.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 11-
  article_text_ar: يحدد رئيس مجلس الوزراء جلسة لمجلس الوزراء لمناقشة تقرير اللجنة خلال خمسة عشر يوما من تاريخ رفع التقرير إليه، وتكون المناقشة في غيبة المتهم.يتخذ مجلس الوزراء قراره في الموضوع، فإذا قرر الاتهام عمد إلى تشكيل هيئة المحاكمة المنصوص عنها في المادة (15) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 12-
  article_text_ar: في حالة الاتهام يأمر رئيس مجلس الوزراء بإبلاغ المتهم بصورة من قرار الإحالة إلى المحاكمة، ويجري تبليغ المتهم وفقا لما هو وارد في المادة (20) من هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 13-
  article_text_ar: لمجلس الوزراء عند إقراره إحالة المتهم إلى المحاكمة، أن يقرر حبسه احتياطيا لحين انعقاد أول جلسة من جلسات هيئة المحاكمة، ولهيئة المحاكمة بعد ذلك أن تجدد حبس المتهم إذا اقتضت الضرورة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 14-
  article_text_ar: يصدر رئيس مجلس الوزراء قرارا بكف يد المتهم عن العمل إلى أن يفصل في أمره، ويوقف صرف رواتبه منذ صدور القرار بكف اليد.ولا يحيل إنهاء خدمة الوزير دون إقامة الدعوى عليه أو الاستمرار فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 15-
  article_text_ar: تتولى محاكمة الوزراء أو من في مرتبتهم وفقا لهذا النظام، هيئة تشكل من "ثلاثة وزراء" يختارهم مجلس الوزراء بطريق (القرعة) وعضوين شرعيين برتبة رئيس محكمة كبرى، على الأقل. ولا يكون من بينهم من يمت للمتهم بالقرابة. ويكون أكبر الوزراء سنا هو رئيس هيئة المحاكمة .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 16-
  article_text_ar: يقوم بواجب الادعاء العام من يختاره رئيس مجلس الوزراء .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 17-
  article_text_ar: يختار رئيس هيئة المحاكمة أمين سر لضبط محاضر الجلسات وتدوينها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 18-
  article_text_ar: لهيئة المحاكمة إذا رأت نقصا في التحقيق أن تستكمله بنفسها أو بمن تنتدبه من أعضائها لهذا الغرض.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 19-
  article_text_ar: يعين رئيس هيئة المحاكمة موعد انعقادها للنظر في الموضوع خلال مدة لا تزيد عن ثلاثين يوما من تاريخ إعلان المتهم بصورة من قرار إحالته إلى المحاكمة. وعلى رئيس هيئة المحاكمة تكليف المدعي العام بإعلان المتهم بموعد المحاكمة ومكان انعقادها، وأسماء شهود الإثبات قبل موعد المحاكمة بثمانية أيام على الأقل.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 20-
  article_text_ar: تعقد هيئة المحاكمة جلساتها بحضور المتهم، فإذا تغيب المتهم عن الحضور تؤجل الجلسة إلى موعد آخر لا يتجاوز سبعة أيام من تاريخ التأجيل. وعلى المدعي العام إعلان المتهم في آخر محل إقامة له داخل المملكة عن الموعد الجديد، فإذا لم يعلم له محل إقامة ثابتة جاز تبليغه في مقر وزارة الداخلية ، وتجري محاكمة المتهم غيابيا بعد ذلك ، وللمتهم أن يستحضر معه وكيلا له خبرة في الشئون النظامية لحضور جلسات المحاكمة والدفاع عنه .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 21-
  article_text_ar: يصدر قرار هيئة المحاكمة بأغلبية الأصوات. ولا تصح اجتماعات الهيئة إلا إذا حضرها جميع الأعضاء. فإذا قام عذر لدى أحد أعضاء الهيئة اختار مجلس الوزراء فورا عضوا آخر يحل محله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 22-
  article_text_ar: لا يجوز معاقبة المتهم عن واقعة لم ترد في قرار إحالته إلى المحاكمة ولا الحكم عليه بغير الجزاءات الواردة في هذا النظام، أو بغير العقوبات الواردة فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 23-
  article_text_ar: في حالة صدور حكم غيابي بالإدانة، تعاد المحاكمة عند حضور المحكوم عليه أو ضبطه، وتعاد المحاكمة خلال ثلاثين يوما من تاريخ الحضور أو الضبط، فإذا فر المحكوم عليه أو امتنع عن حضور جلسات إعادة المحاكمة، يعتبر الحكم الصادر بمثابة الحكم الحضوري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 24-
  article_text_ar: تختص هيئة المحاكمة بالنظر في جميع الجرائم المرتبطة بجريمة من تقوم بمحاكمته، كما تختص بمحاكمة الفاعلين الأصليين والشركاء، وتطبق عليهم العقوبات المقررة في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 25-
  article_text_ar: 'باستثناء ما ورد في المواد: (8، 26 ،27) من هذا النظام، تكون قرارات هيئة المحاكمة نهائية من حين صدورها، ولا يجوز الاعتراض عليها وتكون نافذة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 26-
  article_text_ar: 'للمحكوم عليه أن يتظلم إلى جلالة الملك استنادا إلى المواد: (9، 19، 20، 22) من هذا النظام، ببطلان الحكم الصادر. ولجلالة الملك قبول الطعن أو رده، فإذا قبل الطعن بالبطلان وجبت إعادة المحاكمة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
- article_ref: المادة 27-
  article_text_ar: لجلالة الملك في جميع الأحوال إصدار الأمر بالعفو الخاص عن المحكومين وفقا لهذا النظام، أو تخفيف العقوبة عنهم إلى الحد الذي يقرره أمر العفو.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/e143d9d5-1889-45d8-8d99-a9a700f263cd/1
  verified: false
