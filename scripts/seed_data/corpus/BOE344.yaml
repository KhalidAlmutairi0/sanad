articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالعبارات والمصطلحات الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك : الوزارة : وزارة الثقافة والإعلام. الوزير : وزير الثقافة والإعلام. الوكالة : "وكالة الأنباء السعودية " (و.ا.س). المجلس : مجلس إدارة الوكالة. الرئيس : رئيس الوكالة. التنظيم : تنظيم الوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الوكالة بالشخصية الاعتبارية المستقلة والاستقلال المالي والإداري - باعتبارها هيئة عامة - وترتبط تنظيمياً بالوزير. ويكون مقرها الرئيس مدينة الرياض، ولها أن تنشئ فروعاً ومكاتب داخل المملكة وخارجها بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الوكالة إلى : 1 - تغطية الأحداث والقضايا والنشاطات المختلفة ومتابعتها على المستوى المحلي والإقليمي والدولي، وبصفة خاصة ذات الصلة بالمملكة. 2 - الإسهام في تعزيز المهنية الإعلامية والصحفية في المملكة. 3 - مواكبة التطورات والمتغيرات المهنية والتقنية في مجال اختصاصاتها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تتولى الوكالة لتحقيق أغراضها - على سبيل المثال لا الحصر- المهمات والاختصاصات الآتية: 1 - تقديم الخدمات الإخبارية والمواد الصحفية التي تجمع وتعد من مختلف المصادر داخل المملكة وخارجها، وبثها وتوزيعها . 2 - تبادل المعلومات والتسهيلات المهنية والتقنية مع وكالات الأنباء.3 - إعداد الدراسات والبحوث والنشرات المتخصصة واستطلاعات الرأي والخدمات الإخبارية.4 - نشر الأخبار العالمية وتوزيعها من مكاتبها الخارجية أو من الوكالات والإذاعات والمراسلين.5 - توثيق أوجه التعاون مع الوكالات الإقليمية والعالمية وتدعيم الروابط باتحادات وكالات الأنباء الإقليمية والعالمية.6 - تأسيس الشركات والوكالات التي تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها أو الإسهام في تأسيسها، وفقاً للأنظمة، وذلك بالاتفاق مع وزارة المالية.7 - القيام بكل الأعمال والمهمات الإعلامية والإخبارية أو أي عمل آخر متصل أو متعلق بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: '1 - يكون للوكالة مجلس إدارة يشكل على النحو الآتي : أ - وزير الثقافة والإعلام رئيساً ب - رئيس وكالة الأنباء السعودية عضواً ونائباً للرئيس ج - ممثل من وزارة الخارجية عضواً د - ممثل من وزارة الثقافة والإعلام عضواً هـ - ممثل من وزارة المالية عضواً و - عضوان من أصحاب الرأي والخبرة ، يعينان بقرار من مجلس الوزراء بناءً على اقتراح من الوزير، وتكون عضويتهما لمدة ثلاث سنوات قابلة للتجديد لمرة واحدة. ويجب ألا تقل مرتبة ممثلي الأجهزة الحكومية عن المرتبة (الرابعة عشرة) أو ما يعادلها. 2 - تحدد مكافآت أعضاء المجلس بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا في الوكالة، ويختص بالإشراف عليها وتصريف أمورها، وله اتخاذ ما يلزم من قرارات وإجراءات لتحقيق الأغراض التي قامت من أجلها وفقاً لأحكام هذا التنظيم واللوائح الصادرة بناء عليه، وله على وجه خاص ما يأتي : 1 - إقرار السياسات العامة للوكالة، المتعلقة بأنشطتها، والخطط والبرامج اللازمة لتنفيذ ذلك. 2 - إقرار مشروع الهيكل التنظيمي للوكالة، ورفعه لاستكمال الإجراءات النظامية لاعتماده. 3 - إصدار اللوائح الإدارية والمالية التي تسير عليها الوكالة بالاتفاق مع وزارة المالية ووزارة الخدمة المدنية، وغيرها من اللوائح الداخلية. 4 - إقرار مشروع ميزانية الوكالة السنوية، ورفعه وفقاً للإجراءات النظامية. 5 - إقرار الحساب الختامي السنوي للوكالة، ورفعه وفقاً للإجراءات النظامية. 6 - تعيين مراجع حسابات خارجي معتمد، ومراقب مالي داخلي. 7 - اعتماد التقرير السنوي لنشاطات الوكالة، ورفعه بحسب الإجراءات النظامية . 8 - الموافقة على قبول ما يقدم للوكالة من هبات وأوقاف وإعانات ومنح ووصايا . 9 - الموافقة على إبرام الاتفاقيات والعقود، وتفويض رئيس الوكالة بالتوقيع عليها. 10 - النظر في التقارير
    الدورية التي تقدم عن سير العمل في الوكالة ومركزها المالي. 11 - الموافقة على تأسيس الوكالة للشركات والوكالات التي تقوم بأداء نشاطات ذات علاقة بطبيعة أعمالها أو الإسهام في تأسيسها، وفقاً للأنظمة وبالاتفاق مع وزارة المالية. 12 - الموافقة على إنشاء الفروع والمراكز والمكاتب داخل المملكة وخارجها. 13 - الموافقة على شراء العقارات وبيعها واستثمارها. 14 - تحديد المقابل المالي للخدمات التي تقدمها الوكالة. وللمجلس تفويض رئيسه أو نائبه أو لجنة من أعضائه ببعض صلاحياته.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 1- يعقد المجلس اجتماعاته بصفة دورية كل (ثلاثة أشهر) ولرئيس المجلس دعوته للاجتماع متى دعت الحاجة إلى ذلك أو متى طلب ذلك (ثلاثة) أعضاء على الأقل.2- يكون اجتماع المجلس صحيحاً إذا حضره أغلبية الأعضاء بمن فيهم رئيس المجلس أو نائبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وفي حالة تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع.3- للمجلس دعوة من يراه لحضور جلساته للاستفادة من خبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للوكالة رئيس لا تقل مرتبته عن (الخامسة عشرة)، يعين - بناء على اقتراح من الوزير - وفقاً للإجراءات النظامية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'يتولى الرئيس إدارة وتصريف جميع شؤون الوكالة وإداراتها وأقسامها ، وفق الصلاحيات المنصوص عليها في هذا التنظيم واللوائح الصادرة بناء عليه وقرارات المجلس، وله على وجه خاص ما يأتي : 1 - اقتراح السياسات العامة للوكالة، المتعلقة بأنشطتها، والخطط والبرامج اللازمة لتنفيذ ذلك، ورفعها إلى المجلس. 2 - اقتراح مشروع هيكل الوكالة التنظيمي، ورفعه إلى المجلس. 3 - تمثيل الوكالة أمام القضاء والجهات الحكومية والهيئات الأخرى داخل المملكة وخارجها، وله توكيل من يراه في ذلك. 4 - تنفيذ قرارات المجلس ومباشرة ما يخوله إياه المجلس من اختصاصات وصلاحيات . 5 - اقتراح اللوائح الإدارية والمالية التي تسير عليها الوكالة، وغيرها من اللوائح الداخلية، ورفعها إلى المجلس. 6 - الصرف من الميزانية المعتمدة، واتخاذ جميع الإجراءات المالية وفق الأنظمة واللوائح المقرة. 7 - إعداد التقارير الخاصة بتنفيذ خطط الوكالة وبرامجها ودراساتها، وعرضها على المجلس. 8 - اقتراح الخطط لتطوير الأداء المهني والتقني والإخباري. 9 - إعداد مشروع ميزانية الوكالة ومشروع الحساب الختامي وعرضهما على المجلس. 10 - التعاقد على تنفيذ الأعمال والخدمات
    وغيرها. 11 - الاستعانة بخدمات وكالات الأنباء العالمية والتعاقد مع مراسلين في الداخل والخارج للحصول على الأخبار المحلية والعالمية والتقارير والتحليلات. 12 - إعداد التقرير السنوي عن نشاط الوكالة والصعوبات التي واجهتها والحلول المقترحة لها، وعرضه على المجلس للنظر فيه . 13 - التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، وفقاً للأنظمة. 14 - تنظيم مشاركة الوكالة في المؤتمرات والفعاليات والمهرجانات والمعارض المحلية والإقليمية والعربية والدولية، وفقاً للأنظمة. 15 - إقرار الخطط والبرامج اللازمة للتدريب والابتعاث داخليًا وخارجيًا، ومتابعة تنفيذها. 16 - تعيين العاملين في الوكالة طبقاً للوائح، والإشراف عليهم. 17 - التعاقد مع الخبراء وفقاً لاحتياجات الوكالة. وللرئيس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي الوكالة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: '1- تتكون موارد الوكالة مما يأتي : أ- ما يخصص لها من اعتمادات في الميزانية العامة للدولة. ب- المقابل المالي الذي تحصل عليه من الخدمات التي تقدمها. ج- ما تقبله من هبات وتبرعات وأوقاف وإعانات ومنح ووصايا. د- أي مورد آخر يقره المجلس. 2- تودع أموال الوكالة في حساب مفتوح لها في مؤسسة النقد العربي السعودي، ولها فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الأموال وفق ميزانية الوكالة المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تعامل الوكالة من حيث إعفاء وارداتها من الرسوم الجمركية بحسب القواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 1 - تكون للوكالة ميزانية سنوية مستقلة، تصدر بمرسوم ملكي، وفقاً لترتيبات إصدار الميزانية العامة للدولة. 2 - السنة المالية للوكالة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى من تاريخ نفاذ هذا التنظيم، وتنتهي بنهاية السنة المالية التالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع عدم الإخلال باختصاص ديوان المراقبة العامة بالرقابة على حسابات وعمليات الوكالة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم رسميًّا بالعمل في المملكة، لتدقيق حسابات ومعاملات الوكالة وبياناتها وميزانيتها السنوية وحسابها الختامي ويحدد المجلس مكافآته، وعند تعدد مراجعي الحسابات، فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الوكالة، ويرفع تقرير مراجع الحسابات للمجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع منسوبو الوكالة - عدا الرئيس - من حيث أوضاعهم الوظيفية للأحكام المعتمدة بالأمر السامي رقم (5464/م ب) وتاريخ 20 / 4 / 1426هـ.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره، ويلغي كل ما يتعارض معه من أحكام .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/438c79cd-db47-437e-ade4-a9a700f17587/1
  verified: false
