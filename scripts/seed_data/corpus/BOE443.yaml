- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمام كل منها: الوزارة: وزارة الرياضة. الوزير: وزير الرياضة. التنظيم: تنظيم الوزارة.'
