- article_ref: المادة الثانية
  article_text_ar: 'الوزارة هي الجهة المختصة والمرجع الرئيس في المملكة فيما يتعلق بتنظيم قطاع الرياضة وتطويره، والنهوض بمقوماته، وتوسيع قاعدة الممارسين للرياضة، والعمل على تحقيق تميُّز الرياضة السعودية محلياً ودولياً، وهي المشرفة على جميع الأنشطة الرياضية. ولها - دون إخلال باختصاصات ومسؤوليات الجهات الأخرى - القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: اقتراح مشروعات الأنظمة المتعلقة بالرياضة، واقتراح تعديل المعمول به منها، ورفعها لاستكمال الإجراءات النظامية اللازمة. وضع المؤشرات المتعلقة بمجالات عمل الوزارة والقطاع الرياضي، وقياسها بشكل دوري، وتطويرها، ومقارنتها بالمؤشرات الدولية. وضع إطار ونموذج حوكمة قطاع الرياضة، والإشراف على تنفيذه. تنمية القدرات والطاقات الرياضية، وصقل المواهب والمهارات. تشجيع جميع فئات المجتمع على ممارسة الرياضات المتنوعة، وتنظيمها والمشاركة فيها. الترخيص لإقامة منشآت ومرافق ممارسة الأنشطة الرياضية، وإقامة الفعاليات الرياضية. وضع قواعد ومعايير إنشاء المرافق والمنشآت الرياضية، وإدارتها. تصنيف الأندية الرياضية، وتأسيسها، وكذلك الترخيص للغير بتأسيسها؛ وذلك
    وفق ضوابط تضعها. تأسيس اتحادات نوعية في الأنشطة غير التنافسية وفق ضوابط تضعها. تنظيم عمل المجموعات الرياضية، وتقديم الإعانة والدعم لها؛ وذلك وفق ضوابط تضعها. العمل على نشر ثقافة التطوع والشراكة المجتمعية في المجالات الرياضية. وضع البرامج التدريبية للعاملين والمتطوعين في المجالات الرياضية. تصنيف العاملين في المجالات الرياضية، وفق معايير تضعها. إصدار الرخص اللازمة لمزاولة العمل في المجالات الرياضية، وفق قواعد ومعايير تضعها. العمل مع وزارة التعليم والجهات المعنية الأخرى لتنمية وتطوير رياضة المدارس والمعاهد والكليات والجامعات، ووضع البرامج الخاصة بها تشجيع الاستثمار في المجال الرياضي، وتنميته، وتطويره، وجذب الاستثمارات الرياضية المحلية والعالمية؛ وفقاً للإجراءات النظامية المتبعة. الإسهام مع الجهات المعنية في الارتقاء بالإعلام الرياضي بما يكفل تحقيق أهدافه المرسومة له، ويؤسس لإعلام رياضي احترافي متميز يساعد على رفع مستوى المجال الرياضي، وينمي روح المنافسة الشريفة، ويحد من التمييز والإساءة والتعصب الرياضي. اتخاذ ما يلزم لمكافحة المنشطات المحظورة في المجالات الرياضية، وذلك بالتنسيق مع الجهات
    المعنية. الإسهام مع الجهات المعنية في تطوير الطب الرياضي والارتقاء به. تنسيق الجهود مع اللجنة الأولمبية العربية السعودية واللجنة العربية السعودية البارالمبية والاتحادات الرياضية والجمعية العربية السعودية لبيوت الشباب وغيرها من الجهات الرياضية المحلية، والتعاون معها، ودعمها، والعمل على الارتقاء بأدائها؛ وذلك وفق ما تقضي به الأنظمة والاتفاقيات والمواثيق الدولية ذات الصلة. اتخاذ ما يلزم للحد من المخالفات التي قد تقع في المجالات الرياضية، وذلك دون الإخلال بما تقضي به الأنظمة الأساسية للاتحادات الرياضية ولوائحها. اتخاذ ما يلزم لتعزيز النزاهة في المجالات الرياضية، وما يكفل الشفافية والحد من الممارسات غير المشروعة. تقديم الاستشارات في المجالات الرياضية. التعاون وتبادل الخبرات مع نظيراتها من الأجهزة في الدول الأخرى، ومع المنظمات الرياضية الإقليمية والدولية، وبيوت الخبرة المتخصصة داخل المملكة وخارجها؛ وذلك في حدود اختصاصاتها، ووفقاً للإجراءات النظامية المتبعة. تنفيذ التزامات المملكة الدولية المتعلقة بالمجالات الرياضية. تمثيل المملكة أو المشاركة في تمثيلها لدى اللجان والمنظمات والهيئات والمحافل
    والمؤتمرات الإقليمية والدولية ذات الصلة باختصاصات الوزارة. . إجراء الدراسات والأبحاث المتصلة باختصاصاتها، والتعاون مع مراكز البحوث وبيوت الخبرة المتخصصة في هذا الشأن. إبرام الاتفاقيات ذات الصلة بنشاط الوزارة مع الجهات المعنية في الدول الأخرى ومع المنظمات الدولية، وفقًا للإجراءات النظامية المتبعة. أي مهمة تسند إلى الوزارة نظاماً.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f34db566-b4d4-48fc-a64b-ac4500e680b6/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'يتولى الوزير إدارة شؤون الوزارة وتصريف أمورها، ويتخذ جميع القرارات والإجراءات لتحقيق الأهداف التي أنشئت من أجلها وفقاً لأحكام التنظيم، وله - بوجهٍ خاص - ما يأتي: اقتراح السياسات والاستراتيجيات في المجالات الرياضية في المملكة، ورفعها لاستكمال الإجراءات النظامية اللازمة في شأنها، والإشراف على تنفيذها بعد اعتمادها. إقرار اللوائح الداخلية التي تسير عليها الوزارة، بما لا يتعارض مع النصوص النظامية ذات الصلة. إقرار اللوائح المنظمة لإقامة منشآت ومرافق ممارسة الأنشطة الرياضية، وإقامة الفعاليات الرياضية. اقتراح مشروع الهيكل التنظيمي للوزارة، والرفع به لاستكمال الإجراءات النظامية اللازمة في شأنه. الموافقة على إنشاء فروع أو مكاتب للوزارة، وفقًا للإجراءات النظامية المتبعة. الاستعانة بمن يراه من الخبراء والمستشارين للعمل بشكل متفرغ أو غير متفرغ لإنجاز بعض الأعمال والخدمات، وتقديم المشورة، وإجراء البحوث والدراسات، وفقاً لما تتضمنه الأحكام ذات الصلة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف وفقاً للأحكام المنظمة لذلك. تمثيل الوزارة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات
    الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. تعيين منسوبي الوزارة وفقاً للوائح المنظمة لذلك، والإشراف عليهم. الإشراف على تنظيم الوزارة للمؤتمرات والندوات والمعارض الداخلية والخارجية والفعاليات المتعلقة بالرياضة، وإقامتها، والمشاركة فيها، وإسناد تنفيذها لمن يراه؛ وفقاً للإجراءات النظامية المتبعة. الموافقة على مشروع ميزانية الوزارة وحسابها الختامي والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية المتبعة. وللوزير تفويض بعض صلاحياته إلى من يراه من منسوبي الوزارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/f34db566-b4d4-48fc-a64b-ac4500e680b6/1
  verified: false
