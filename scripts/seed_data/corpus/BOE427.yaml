- article_ref: المادة الثانية
  article_text_ar: تتمتع المؤسسة بالشخصية الاعتبارية العامة وبالاستقلال المالي والإداري، وترتبط تنظيمياً بالوزير، ويكون مقرها الرئيس في محافظة الأحساء، ولها إنشاء فروع أو مكاتب داخل المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف المؤسسة إلى تنظيم الأعمال والخدمات المتعلقة بنشاط الري ونشاط السدود ونشاط إعادة استخدام المياه المعالجة في المملكة، والرقابة على تلك الأنشطة وتشغيلها وتطويرها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'تتولى المؤسسة إدارة نشاط الري ونشاط السدود ونشاط إعادة استخدام المياه المعالجة في المملكة، وتشغيلها وتطويرها. ولها -دون إخلال باختصاصات الجهات الحكومية الأخرى- القيام بكل ما يلزم في سبيل تحقيق أهدافها، ومن ذلك ما يأتي: وضع السياسات والاستراتيجيات والخطط والبرامج ذات الصلة باختصاصاتها، ومراجعتها وتقويمها والإشراف على تنفيذها، والرفع عما يتطلب استكمال إجراءات نظامية في شأنه. تقديم خدمات الري والصرف الزراعي، بما في ذلك نقل وتوزيع وبيع المياه المعالجة بجميع استخداماتها: (الزراعية، والصناعية، والحضرية)، وتصميم السدود وإنشاؤها وتطويرها وتشغيلها وصيانتها. وضع برامج جدولة الري للمحاصيل الزراعية وفق المقننات المائية. معالجة مياه الصرف الزراعي والاستفادة منها. وضع وتنفيذ خطط الطوارئ والأزمات لأنشطتها ومواجهة نقص المياه، بالتنسيق مع الجهات ذات العلاقة، ووفقاً للإجراءات النظامية ذات الصلة. اقتراح مشروعات الأنظمة واللوائح ذات الصلة باختصاصاتها، واقتراح تعديل القائم منها، والرفع عنها وفقاً للإجراءات النظامية. وضع المعايير ذات الصلة باختصاصاتها، والرفع عما يتطلب وفقاً للإجراءات النظامية.
    تطبيق معايير نوعية المياه المستخدمة في أنشطتها ومراقبة مستوى جودتها وجودة التربة الزراعية، ودعم الإصلاح البيئي. تصميم وإنشاء وتطوير وتشغيل وصيانة مصادر إمداد المياه لأنشطتها بالتنسيق مع الجهات ذات العلاقة. تصميم وإنشاء وتطوير وتشغيل وصيانة محطات الضخ، وأعمال البنية التحتية لمشاريع أنشطة المؤسسة، وأنظمة الصرف الزراعي. تطوير التقنيات المعتمدة لرصد استهلاك مياه الري والسدود والمياه المعالجة، وضمان امتثالها لمخصصات وبرامج استخدام المياه، واتخاذ الإجراءات المناسبة لمعالجة حالات عدم الامتثال وفق الأنظمة واللوائح والإجراءات ذات الصلة. إجراء الدراسات والبحوث ذات الصلة باختصاصاتها بالمشاركة مع الجامعات والمعاهد والجهات المتخصصة. تبني التقنيات الحديثة لترشيد استخدام مياه الري ومياه السدود والمياه المعالجة. تمثيل المملكة، أو المشاركة في تمثيلها، في المنظمات والمؤسسات المحلية والإقليمية والدولية ذات العلاقة باختصاصاتها، وفق الإجراءات النظامية. عقد جلسات عمل وندوات ومؤتمرات ومعارض، والمشاركة فيها. التنسيق مع الجهات ذات العلاقة لتقديم البرامج والدورات في المجالات ذات الصلة باختصاصاتها، وتأهيل الكوادر
    البشرية العاملة في هذه المجالات. توفير قاعدة بيانات ومعلومات إحصائية عن أنشطتها. الاستثمار بما يحقق أهدافها، وفقاً للإجراءات النظامية. تحديد المقابل المالي نظير بيع المياه المعالجة والخدمات والأعمال والمنتجات التي تقدمها المؤسسة، وفقاً للأحكام النظامية ذات الصلة. الترخيص لممارسة الأنشطة ذات الصلة باختصاصات المؤسسة، وفقاً لما تقضي به الأنظمة واللوائح ونحوها ذات الصلة. تعزيز الإيرادات وتحقيق العوائد على الاستثمار في أصول المؤسسة من داخل المؤسسة أو بالشراكة مع جهات خارجية؛ وفقاً للأحكام النظامية ذات الصلة. العمل على الاستفادة من المصادر المتاحة لمياه الري ومياه السدود والمياه المعالجة التقليدية وغير التقليدية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'يكون للمؤسسة مجلس إدارة برئاسة الوزير وعضوية كل من: أ- ممثل من وزارة الاقتصاد والتخطيط. ب- ممثل من وزارة المالية. ج- ممثل من وزارة البيئة والمياه والزراعة د- ممثل من صندوق التنمية الزراعية. هـ- الرئيس التنفيذي للمؤسسة. و- الرئيس التنفيذي لشركة المياه الوطنية. ز- اثنين من ذوي الخبرة والاختصاص في مجال عمل المؤسسة، يصدر بتسميتهما أمر من رئيس مجلس الوزراء بناءً على ترشيح من رئيس المجلس. فيما عدا الرئيس والعضوين المشار إليهما في الفقرتين الفرعيتين (ه) و(و) من الفقرة (1) من هذه المادة، تكون مدة العضوية في المجلس (ثلاث) سنوات قابلة للتجديد لمدة مماثلة ولمرة واحدة. يجب ألا تقل مرتبة ممثلي الجهات الحكومية عن المرتبة (الرابعة عشرة)، أو ما يعادلها. يختار الرئيس نائباً له من ممثلي الجهات الحكومية عدا الرئيس التنفيذي للمؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على شؤون المؤسسة، ويشرف على إدارتها وتصريف شؤونها، ويتخذ جميع القرارات اللازمة لتحقيق أغراضها في حدود أحكام التنظيم، وله على وجه خاص ما يأتي: الإشراف على تنفيذ المؤسسة المهمات المنوطة بها. إقرار السياسات والاستراتيجيات المتعلقة باختصاصات المؤسسة، والخطط والبرامج اللازمة لتنفيذها، والرفع عما يتطلب استكمال إجراءات نظامية في شأنه. اقتراح مشروعات الأنظمة واللوائح ذات الصلة باختصاصات المؤسسة، واقتراح تعديل القائم منها، والرفع عما يستلزم وفقاً للإجراءات النظامية. إقرار المعايير ذات الصلة باختصاصات المؤسسة، والرفع عما يستلزم وفقاً للإجراءات النظامية. النظر في التقارير الدورية التي تقدم إليه عن سير العمل في المؤسسة. إقرار الهيكل والدليل التنظيمي للمؤسسة. إقرار اللوائح المالية والإدارية التي تسير عليها المؤسسة، وغيرها من اللوائح الداخلية اللازمة لتسيير شؤونها. ويكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الأخرى بالاتفاق مع وزارة المالية، وإقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية. إقرار مكافآت ومزايا
    من تستعين بهم المؤسسة من الخبراء المختصين ذوي الكفايات المطلوبة، وفقاً للأحكام النظامية ذات الصلة. تحديد المقابل المالي للخدمات والأعمال والمنتجات والتراخيص التي تقدمها المؤسسة. الموافقة على مشروع ميزانية المؤسسة وحسابها الختامي وتقرير مراجع الحسابات والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية. إقرار سياسات الاستثمار بالمؤسسة بما يحقق أهدافها، وفقاً للأحكام النظامية ذات الصلة. قبول الوصايا والهبات والتبرعات وريع الأوقاف والمنح التي تقدم إلى المؤسسة، وفقاً للأحكام المنظمة لذلك. الموافقة على إبرام الاتفاقيات ومذكرات التفاهم والعقود، بحسب الإجراءات النظامية. تعيين مراجع حسابات خارجي، ومراقب مالي داخلي. تعيين أمين عام للمجلس. وللمجلس تشكيل لجان دائمة أو مؤقتة، من أعضائه أو من سواهم، يعهد إليها بما يراه من مهمات، ويحدد في قرار تشكيل كل لجنة رئيسها وأعضاؤها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وللمجلس تفويض بعض اختصاصاته -عدا الاختصاصات الواردة في الفقرات (2) و(5) و(6) و(7) و(9) و(10) و(11) و(14) من هذه المادة- إلى من يراه من المسؤولين في المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر المؤسسة أو في أي مكان آخر في المملكة، برئاسة الرئيس أو من ينيبه من أعضاء المجلس ممثلي الجهات الحكومية ما عدا الرئيس التنفيذي للمؤسسة. يعقد المجلس اجتماعاته بصفة دورية، على ألا تقل عن (اجتماعين) في السنة. وللرئيس الدعوة للاجتماع متى دعت الحاجة إلى ذلك، أو متى طلب ذلك (ثلث) أعضاء المجلس على الأقل، وتوجه الدعوة إلى الاجتماع من الرئيس، أو من ينيبه، كتابة قبل الاجتماع بـ(سبعة) أيام على الأقل، على أن تتضمن الدعوة جدول أعمال الاجتماع ومكانه. يكون اجتماع المجلس صحيحاً إذا حضره أغلبية أعضائه على الأقل، بمن فيهم الرئيس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل، وعند التساوي يرجح الجانب الذي صوت معه رئيس الاجتماع. يجوز للمجلس -عند الحاجة ووفقاً لما يقدره الرئيس- أن يعقد الاجتماعات وأن يصوت على التوصيات والقرارات عن بُعد من خلال استخدام وسائل التقنية، ويمكن أن تتخذ التوصيات والقرارات عن طريق التمرير على الأعضاء، ويوقع عليها بما يفيد باطلاع جميع الأعضاء عليها، ولا تعد التوصيات والقرارات الصادرة بهاتين الطريقتين صحيحة ما لم تمرر على جميع
    أعضاء المجلس، ويصوتوا عليها، وتحز على أغلبية أصواتهم على الأقل. للمجلس دعوة من يراه لحضور اجتماعاته لتقديم معلومات أو آراء أو إيضاحات دون أن يكون له حق التصويت. لا يجوز للعضو أن يمتنع عن التصويت، أو أن يفوض عضواً آخر للتصويت نيابةً عنه عند غيابه، وللعضو المعترض تسجيل اعتراضه وأسبابه ضمن محضر الاجتماع. تثبت مداولات المجلس وتوصياته وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. لا يجوز للعضو أن يفشي شيئاً مما اطلع عليه من أسرار المؤسسة بسبب عضويته في المجلس. يتولى أمين عام المجلس الإعداد لجداول الأعمال ومحاضر الاجتماعات والتوصيات والقرارات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للمؤسسة رئيس تنفيذي يعين ويعفى بقرار من المجلس، ويكون المسؤول عن إدارة المؤسسة، وتتركز مسؤولياته في حدود ما ينص عليه التنظيم وما يقرره المجلس، ويتولى مباشرة الاختصاصات الآتية: اقتراح السياسات والاستراتيجيات المتعلقة باختصاصات المؤسسة، والخطط والبرامج اللازمة لتنفيذها، ورفعها إلى المجلس؛ للنظر في إقرارها. الإشراف على سير العمل في المؤسسة من خلال اللوائح والخطط والبرامج المعتمدة. اقتراح هيكل المؤسسة ودليلها التنظيمي، واللوائح المالية والإدارية التي تسير عليها المؤسسة وغيرها من اللوائح الداخلية اللازمة لتسيير شؤونها، ورفعها إلى المجلس؛ للنظر في إقرارها. تنفيذ القرارات التي يصدرها المجلس. الإشراف على إعداد مشروع ميزانية المؤسسة السنوية ومشروع حسابها الختامي والتقرير السنوي، ورفعها إلى المجلس؛ للنظر في إقرارها. تعيين العاملين في المؤسسة وفقاً للصلاحيات الممنوحة له، والإشراف عليهم. الصرف من الميزانية المعتمدة للمؤسسة، واتخاذ جميع الإجراءات المالية وفقاً للأنظمة واللوائح المعتمدة والصلاحيات التي فوضها إليه المجلس. إعداد التقارير الخاصة بتنفيذ خطط المؤسسة وبرامجها ومنجزاتها،
    وعرضها على المجلس. التوقيع على الاتفاقيات ومذكرات التفاهم والعقود، وفقاً للإجراءات النظامية ذات الصلة. التعاقد لتنفيذ الأعمال والخدمات والمهمات المنوطة بالمؤسسة متى ما دعت الحاجة، وغيرها من الأعمال والخدمات، وفقاً للأنظمة والصلاحيات التي فوضها إليه المجلس. تنظيم مشاركة المؤسسة في المؤتمرات والفعاليات والمهرجانات والمعارض الإقليمية والدولية، وفقاً للإجراءات النظامية. إصدار القرارات اللازمة لتنفيذ أحكام التنظيم واللوائح الصادرة بناءً عليه والقواعد والإجراءات المعتمدة، بحسب الصلاحيات المخولة له. تمثيل المؤسسة أمام القضاء، ولدى الجهات الحكومية والمؤسسات والهيئات الأخرى ذات العلاقة، وغيرها من الجهات داخل المملكة وخارجها، وله تفويض غيره بذلك. اقتراح مكافآت ومزايا من تستعين بهم المؤسسة من الخبراء المختصين ذوي الكفايات المطلوبة، والرفع عن ذلك إلى المجلس؛ للنظر في إقرارها. أي اختصاص آخر يسنده إليه المجلس. وللرئيس أن يفوض بعض اختصاصاته إلى من يراه من منسوبي المؤسسة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد المؤسسة المالية مما يأتي: ما يخصص لها في الميزانية العامة للدولة. المقابل المالي الذي تستوفيه نظير الخدمات والأعمال والمنتجات والتراخيص التي تقدمها. عوائد استثماراتها. ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع أوقاف، وفقاً للإجراءات النظامية ذات الصلة. أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تودع أموال المؤسسة في حساب جاري وزارة المالية في البنك المركزي السعودي. تفتح المؤسسة حساباً لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفق ميزانية المؤسسة ولوائحها المالية المعتمدة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تكون للمؤسسة ميزانية سنوية مستقلة. السنة المالية للمؤسسة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة في الرقابة على حسابات المؤسسة وعملياتها، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات المؤسسة ومعاملاتها وبياناتها وميزانيتها السنوية وحساباتها الختامية، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده من المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يخضع منسوبو المؤسسة لأحكام نظام العمل، ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: ترفع المؤسسة إلى رئيس مجلس الوزراء -خلال (تسعين) يوماً من بداية كل سنة مالية- تقريراً سنوياً عما حققته من إنجازات خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ترفع المؤسسة إلى رئيس مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
  verified: false
