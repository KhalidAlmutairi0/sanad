- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: المؤسسة: المؤسسة العامة للري. التنظيم: تنظيم المؤسسة. الوزير: وزير البيئة والمياه والزراعة. المجلس: مجلس إدارة المؤسسة. الرئيس: رئيس المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/831af69c-9bad-4f06-9843-b33100926b3c/1
