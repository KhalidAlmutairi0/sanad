regulation:
  code: BOE365
  name_ar: تنظيم هيئة تنمية الصادرات السعودية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ والعبارات التالية المعاني المبينة أمام كل منها ما لم يقتض السياق خلاف ذلك : الهيئة : هيئة تنمية الصادرات السعودية .مجلس الإدارة : مجلس إدارة الهيئة. التنظيم : تنظيم هيئة تنمية الصادرات السعودية. الوزارة : وزارة التجارة والصناعة.الوزير: وزير التجارة والصناعة. الرئيس : رئيس مجلس إدارة الهيئة.الأمين العام : أمين عام الهيئة. العضو : عضو مجلس الإدارة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تنشأ بموجب هذا التنظيم هيئة تسمى "هيئة تنمية الصادرات السعودية" وتتمتع بالشخصية الاعتبارية وبالاستقلال المالي والإداري، وترتبط بالوزير، ويكون مقرها مدينة الرياض، ولها إنشاء فروع داخل المملكة، أو مكاتب خارج المملكة بحسب الحاجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تعنى الهيئة بشؤون تنمية الصادرات غير النفطية في المملكة، ولها على سبيل المثال ما يلي : 1 - المشاركة في إعداد سياسات الدولة في مجال تنمية الصادرات غير النفطية وتطويرها. 2 - إعداد البرامج اللازمة لتنمية الصادرات وزيادة قدرتها التنافسية. 3 - التطوير المستمر للسياسات والتشريعات التي تضمن تحقيق أهداف برامج تنمية الصادرات وخططها.4 - تحسين البيئة التصديرية عن طريق وضع البرامج وتقديم الحوافز للمصدرين وحماية الاستثمارات. 5 - التعاون الوثيق مع الممثلين التجاريين في الخارج، ومع غرف التجارة والصناعة، لتحديد أفضل السبل لتصدير المنتجات، وإيجاد فرص جديدة للمصدرين، وتحسين البيئة التصديرية.6 - تقديم المساعدات الإدارية والفنية والاستشارية والحوافز للمصدرين، لتسويق الصادرات وجذب المستفيدين الأجانب. 7 - إعداد الدراسات عن فرص التصدير والأسواق الخارجية المحتملة. 8 - إعداد الخطط والبرامج لترويج وتطوير المنتجات والخدمات. 9 - تأهيل الكفايات السعودية ونشر ثقافة التصدير اللازمة للتسويق الدولي والتصدير بالتعاون مع أجهزة التدريب المحلية والدولية، وذلك بمقابل مالي تتقاضاه الهيئة من الشركات والمؤسسات
    الأهلية الراغبة في الاستفادة من ذلك. 10 - تنظيم الندوات والمؤتمرات وإقامة المعارض التجارية الداخلية والخارجية، والمشاركة في المعارض التجارية الدولية والإقليمية، للتعريف بالصادرات السعودية وزيادة قدرتها التنافسية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'يكون للهيئة مجلس إدارة برئاسة الوزير، ويتكون من : 1- ممثل من الوزارة عضواً 2- ممثل من وزارة الاقتصاد والتخطيط عضواً 3- ممثل من وزارة الزراعة عضواً 4- ممثل من وزارة الخارجية عضواً 5- ممثل من وزارة المالية عضواً 6- ممثل من الهيئة العامة للاستثمار عضواً 7- ممثل من الصندوق السعودي للتنمية عضواً 8- ممثل من مجلس الغرف التجارية الصناعية السعودية عضواً 9- ممثل من الشركة السعودية للصادرات الصناعية عضواً 10- الأمين العام للهيئة عضواً 11- أربعة من المصدرين من مناطق المملكة يقترحهم الرئيس، ويصدر بتعيينهم قرار من مجلس الوزراء أعضاء ويجب ألا تقل مرتبة ممثلي الأجهزة الحكومية في مجلس الإدارة عن وكيل وزارة أو ما يعادلها. ويجوز للرئيس أن ينيب من بين أعضاء المجلس من يراه لرئاسة المجلس في حالة غيابه.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: 'مجلس الإدارة هو السلطة المختصة في إدارة شئون الهيئة، وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أغراضها في حدود أحكام هذا التنظيم، وله بوجه خاص ما يلي : 1 - المساهمة في إعداد السياسات والتشريعات اللازمة لتنمية الصادرات السعودية غير النفطية، لإقرارها وفقًا للإجراءات النظامية.2 - إقرار البرامج اللازمة لتنفيذ السياسة العامة لتنمية الصادرات غير النفطية.3 - اعتماد الشروط والضوابط اللازمة لتقديم المساعدات الإدارية والفنية والاستشارية وغيرها من الحوافز؛ لتشجيع المصدرين على نفاذ منتجاتهم إلى الأسواق العالمية.4 - إقرار الهيكل التنظيمي للهيئة. 5 - إصدار اللوائح الإدارية والمالية التي تسير عليها الهيئة بالاتفاق مع وزارتي المالية والخدمة المدنية.6 - إقرار قواعد وإجراءات تكوين اللجان، وفرق العمل، وتحديد مكافآت أعضائها.7 - الموافقة على إبرام العقود بأنواعها التي تتجاوز قيمتها الصلاحيات المحددة للمسئولين في الهيئة، وتفويض من يراه بتوقيعها.8 - تشكيل اللجان من أعضاء مجلس الإدارة، ومن غيرهم، وتخويلها الصلاحيات اللازمة لإنجاز المهمات المنوطة بها.9 - الموافقة على مشروع ميزانية الهيئة،
    وحسابها الختامي، وتقرير مراقب الحسابات، والتقرير السنوي؛ تمهيدًا لرفع ذلك بحسب الإجراءات النظامية المتبعة.10 - اعتماد المقابل المالي الذي تتقاضاه الهيئة عن أي عمل أو خدمة تقدمها وفقًا لتنظيمها. 11 - تعيين مراجع (أو أكثر) لحسابات الهيئة، واعتماد تقاريره. 12 - قبول المساعدات والتبرعات والهبات التي تقدم إلى الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 1 - تعقد اجتماعات المجلس في مقر الهيئة الرئيس، ويجوز عند الحاجة انعقاد المجلس في أي مكان آخر في المملكة. 2 - يجتمع مجلس الإدارة بدعوة من الرئيس مرة كل ثلاثة أشهر على الأقل، وكلما دعت الحاجة إلى ذلك، ومتى طلب نصف أعضاء المجلس على الأقل عقد اجتماع. ويجب أن تشتمل الدعوة على جدول الأعمال. ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم الرئيس أو من ينيبه.وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي يصوت معه رئيس الجلسة.3 - للمجلس أن يدعو لحضور جلساته من يرى الاستعانة بخبراتهم ومعلوماتهم دون أن يكون لهم حق التصويت.4 - لا يجوز للعضو تفويض شخص آخر للتصويت عنه عند غيابه، وللعضو تسجيل اعتراضه وأسباب الاعتراض ضمن محضر قرارات المجلس.5 - لا يجوز للعضو أن يفشي شيئًا مما وقف عليه من أسرار الهيئة بسبب عضويته في المجلس.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: 'يكون للهيئة أمين عام لا تقل مرتبته عن الخامسة عشرة، وهو المسؤول التنفيذي عن إدارة الهيئة ، وتتركز مسؤولياته في حدود ما ينص عليه هذا التنظيم، وما يقرره مجلس الإدارة، ويمارس الاختصاصات التالية : 1 - الإشراف على الخطط والبرامج التي تعدها الهيئة لتنفيذ السياسات المتعلقة بتنمية الصادرات.2 - اقتراح مشاريع اللوائح والقرارات التنفيذية الخاصة بسير العمل في الهيئة وعرضها على مجلس الإدارة.3 - الإشراف على الإعداد لاجتماعات مجلس الإدارة.4 - متابعة تنفيذ القرارات الصادرة من مجلس الإدارة.5 - الإشراف على إعداد مشروع ميزانية الهيئة، ومشروع الحساب الختامي، والتقرير السنوي؛ تمهيدًا لعرضها على مجلس الإدارة.6 - الإشراف على موظفي الهيئة ومستخدميها وفقًا للصلاحيات الممنوحة له، وما تحدده اللوائح.7 - تعيين العاملين في الهيئة، وفقًا للقواعد المنظمة لذلك.8 - إصدار الأوامر بمصروفات الهيئة، بموجب الميزانية السنوية المعتمدة ولوائح المؤسسة ذات العلاقة.9 - تمثيل الهيئة أمام الجهات القضائية والحكومية الأخرى، وغيرها، وله تفويض بعض مسئولي الهيئة في أي من الاختصاصات المنصوص عليها في هذا التنظيم.10 - تقديم
    تقارير دورية إلى مجلس الإدارة عن أعمال الهيئة ومنجزاتها ونشاطاتها.11 - إقرار ابتعاث موظفي الهيئة للدراسة والتدريب، في الداخل والخارج، وفقًا للقواعد المنظمة لذلك. 12 - الموافقة على مشاركة موظفي الهيئة ومنسوبيها في المؤتمرات، والندوات، والبرامج ، والحلقات ، والزيارات ذات العلاقة بأهداف الهيئة واختصاصها في الداخل والخارج، وفقًا للأنظمة واللوائح. 13 - الموافقة على عقد الهيئة للمؤتمرات والندوات واللقاءات المتعلقة بعملها وفقًا للإجراءات المتبعة ووفقًا للأنظمة والتعليمات المنظمة لذلك.14 - ما يسنده إليه مجلس الإدارة من مهمات أخرى.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يكون للأمين العام نواب يعينون بقرار من مجلس الإدارة بناء على ترشيح الأمين العام ، ويتولون الأعمال والصلاحيات التي يمنحهم إياها الأمين العام في حدود ما يقضي به التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة تعد وتصدر وفقًا لترتيبات إصدار الميزانية العامة للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: 'تتكون موارد الهيئة من المصادر التالية : 1 - الاعتمادات التي تخصص لها في ميزانية الدولة.2 - المقابل المالي الذي تتقاضاه عن الأعمال التي تقدمها وفقًا للتنظيم.3 - التبرعات والهبات والمساعدات التي تقدم لها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة ، واستثناء من ذلك تبدأ السنة المالية الأولي للهيئة من تاريخ نفاذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة، يعين مجلس الإدارة مراقبًا (أو أكثر) للحسابات من الأشخاص ذوي الصفة الطبيعية أو الاعتبارية المرخص لهم بالعمل في المملكة ويحدد أتعابهم. وإذا تعدد مراقبو الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة. ويرفع تقرير مراقب الحسابات إلى مجلس الإدارة، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى مجلس الوزراء حسابها الختامي السنوي خلال تسعين يومًا من تاريخ انتهاء السنة المالية، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يصدر مجلس الإدارة اللائحة التنفيذية لهذا التنظيم خلال ستين يومًا من تاريخ صدوره، ويعمل بها من تاريخ العمل بالتنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعمل بهذا التنظيم بعد تسعين يومًا من تاريخ نشره في الجريدة الرسمية، ويلغي كل ما يتعارض معه من أحكام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/98642c12-dd48-4148-841d-a9a700f1b3ea/1
  verified: false
