regulation:
  code: BOE030
  name_ar: النظام الجزائي الخاص بتزييف وتقليد النقود
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: تعني لفظة (نقود) الواردة في هذا النظام، النقود المعدنية على اختلافها أيا كان نوع المعدن المسكوكة به، وكذلك النقود الورقية المتداولة نظاماً داخل المملكة العربية السعودية، أو خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: كل من زيف أو قلد نقوداً متداولة نظاماً في مملكة العربية السعودية، أو خارجها أو قام بجلب نقود متداولة تكون مزيفة، أو مقلدة أو أصدرها أو اشتغل بالتعامل بها، أو الترويج لها بأية وسيلة أو أي سبيل أو صنع أو اقتنى أو امتلك بدون مسوغ كل أو بعض آلات وأدوات ومواد ووسائل التزييف بسوء نية يعاقب بالسجن مع الأشغال الشاقة لمدة تتراوح بين خمس سنوات، وخمس عشرة سنة مع غرامة لا تقل عن ثلاثين ألف ريال، ولا تتجاوز مائة ألف ريال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: كل من تعمد بسوء قصد، تغيير معالم النقود المتداولة نظاماً في داخل المملكة العربية السعودية، أو تشويشها أو تمزيقها أو غسلها بالوسائل الكيماوية، أو إنقاص وزنها، أو حجمها أو إتلافها، جزئياً بأية وسيلة، يعاقب بالسجن لمدة تتراوح بين ثلاث سنوات وخمس سنوات، وبغرامة لا تقل عن ثلاثة آلاف ريال، ولا تتجاوز عشرة آلاف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: كل من صنع أو حاز ، بقصد البيع لأغراض ثقافية، أو صناعية، أو تجارية قطعاً معدنية ، أو أوراقاً مشابهة في مظهرها للعملة المتداولة نظاماً في المملكة العربية السعودية، وكان من شأن هذه المشابهة إيقاع الجمهور في الغلط، يعاقب بالسجن لمدة لا تزيد عن سنة واحدة وبغرامة لا تتجاوز ألفي ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: كل من طبع أو نشر أو استعمل للأغراض المذكورة في المادة الرابعة من هذا النظام صوراً تمثل وجهاً أو جزءاً من وجه لعملة ورقية متداولة نظاماً في المملكة العربية السعودية، بدون أن يحصل على ترخيص من الجهات المختصة ويعمل بالقيود المفروضة في هذا الترخيص، يعاقب بالسجن لمدة لا تتجاوز سنة وبغرامة لا تتجاوز ألف ريال، أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: كل من قبل بحسن نية عملة مقلدة أو مزيفة ثم تعامل بها بعد علمه بعيبها يعاقب بالسجن لمدة لا تتجاوز سنة، وبغرامة لا تتجاوز ألفي ريال أو بإحدى هاتين العقوبتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: كل من اشترك في اقتراف جريمة من الجرائم المنصوص عليها في هذا النظام سواءً بالتحريض أو المساهمة أو المساعدة يعاقب بذات العقوبات المقررة للجريمة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: يعاقب على الشروع في أية جريمة من الجرائم المنصوص عليها في هذا النظام بعقوبة تعادل نصف العقوبة المقررة للجريمة التامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يعاقب على الجرائم المنصوص عليها في هذا النظام سواءً ارتكبت في داخل المملكة العربية السعودية أو في خارجها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يعفى بأمر ملكي - بناءً على اقتراح رئيس مجلس الوزراء - الأشخاص المرتكبون للجرائم المنصوص عليها في هذا النظام، إذا أخبروا السلطات المختصة بتلك الأفعال قبل تمامها وسهلوا القبض على باقي شركائهم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: تحجز وتصادر جميع النقود المزيفة أو المقلدة وتسلم إلى مؤسسة النقد العربي السعودي ، ولا يدفع مقابل لها أي تعويض عنها بأية حال من الأحوال.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: للحكومة الحق في اقتضاء الغرامة بطريق التنفيذ الجبري على أملاك المحكوم عليه الثابتة والمنقولة أو بطريق الإكراه بحبس المحكوم عليه يوماً واحداً عن كل خمسة ريالات سعودية على أن لا تتجاوز مدة الحبس ستة أشهر.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: يجوز للحكومة ولكل من أصابه ضرر بسبب الجرائم المنصوص عليها في هذا النظام أن يطالب المحكوم عليه بتعويضه عما لحقه من ضرر مادي أو معنوي.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: على رئيس مجلس الوزراء ووزير المالية والاقتصاد الوطني ووزير الداخلية تنفيذ هذا النظام كل منهم فيما يخصه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: يعمل بهذا النظام من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/8a1799f2-3cd4-4619-b2ce-a9a700f18741/1
  verified: false
