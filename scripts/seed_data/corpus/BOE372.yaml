articles:
- article_ref: 'المادة الأولى: تعريفات'
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية أينما وردت في هذا التنظيم المعاني المبينة أمامها، ما لم يقتضِ السياق خلاف ذلك: الهيئة : الهيئة السعودية للمقاولين. التنظيم : تنظيم الهيئة السعودية للمقاولين. الوزير : وزير التجارة والصناعة. الوزارة : وزارة التجارة والصناعة. المقاول : الشخص ذو الصفة الطبيعية أو الاعتبارية، المرخص له نظاماً بالقيام - منفرداً أو مشتركاً مع غيره - بتنفيذ عقد في أحد مجالات المقاولات. الجمعية العمومية : الجمعية العمومية للهيئة. المجلس : مجلس إدارة الهيئة. العضو : عضو المجلس. الأمين العام : الأمين العام للهيئة. اللائحة : اللائحة الداخلية للهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الثانية: إنشاء الهيئة'
  article_text_ar: 'تنشأ وفقاً لأحكام هذا التنظيم هيئة مهنية أهلية تسمى (الهيئة السعودية للمقاولين)، تتمتع بالشخصية الاعتبارية والذمة المالية المستقلة، يكون مقرها في مدينة الرياض، ويجوز لها أن تنشئ فروعاً لها داخل مناطق المملكة. وتعمل تحت إشراف الوزارة ويشمل ذلك ما يأتي : 1 - مراجعة اللوائح المتعلقة بالتنظيم قبل إقرارها من الجمعية العمومية، والتأكد من مطابقتها لأحكامه وغاياته، وطلب تعديلها إذا تضمنت أحكاماً لا تتفق مع أحكام التنظيم وغاياته، فإن لم تُعدَّل وفقاً لذلك؛ فتتخذ الوزارة ما يلزم حيالها بما في ذلك إيقاف العمل بها. 2 - تزويد الوزارة بنسخ من الحسابات الختامية للهيئة قبل عرضها على الجمعية العمومية، وبعد إقرارها. وفي حال وجود ملحوظات على تلك الحسابات، فعلى الوزارة اتخاذ ما يلزم حيالها خلال (ثلاثين) يوماً من تاريخ تسلمها للنسخ.3- تزويد الوزارة بنسخ من القرارات ذات الصلة بالأمور المالية والإدارية - متى طلبت ذلك - وتوجيه الهيئة بإيقاف العمل بأيٍّ منها إذا تضمنت بنوداً لا تتفق مع أحكام التنظيم ولوائحه وذلك خلال (ثلاثين) يوماً من تاريخ تسلمها للنسخ.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الثالثة: أهداف الهيئة وصلاحياتها'
  article_text_ar: 'تهدف الهيئة إلى تطوير قطاع المقاولات في المملكة ورفع مستوى العاملين في هذه المهنة، ولها على الأخص - وبما لا يتعارض مع الأنظمة ذات العلاقة - ما يأتي : 1 - وضع الأسس والمعايير المتعلقة بقطاع المقاولات والارتقاء بها وتطويرها. 2 - جمع المعلومات والإحصاءات المتعلقة بقطاع المقاولات ونشرها. 3 - وضع مؤشرات للمعلومات ذات الصلة بقطاع المقاولات، مثل أسعار مواد البناء وأجور المقاولين السائدة في السوق. 4 - إعداد صيغ عقود مقاولات نموذجية لقطاع المقاولات. 5 - إعداد الدراسات والبحوث المتعلقة بقطاع المقاولات. 6 - إمداد الجهات ذات العلاقة بالبيانات والمعلومات والمستجدات المتعلقة بقطاع المقاولات. 7 - العمل على دعم قطاع المقاولات الوطنية والأجنبية في المملكة. 8 - إبلاغ المقاولين بالأنظمة والقرارات والتعليمات ذات العلاقة بقطاع المقاولات. 9 - العمل على حصر العوائق التي تواجه قطاع المقاولات والمقاولين؛ تمهيداً لمناقشتها مع الجهات الحكومية المختصة ووضع الحلول المناسبة التي تخدم القطاع. 10 - العمل على تأهيل المحكمين المتخصصين عن طريق إعطاء دورات متعلقة بقطاع المقاولات. 11 - العمل بقدر الإمكان
    على حل النزاعات التي تنشأ بين المقاولين، وذلك بالطرق الودية إذا اتفق أطراف النزاع على ذلك. 12 - إطلاع المقاولين على فرص الاستثمار الجديدة في قطاع المقاولات. 13 - تشجيع المقاولين وحثهم على الاستفادة من بيوت الخبرة المحلية والأجنبية. 14 - تشجيع الاستثمار في المشاريع المشتركة في قطاع المقاولات. 15 - تنظيم الدورات وإقامة المؤتمرات والندوات والمعارض ذات العلاقة بقطاع المقاولات، والمشاركة فيها.16 - تقديم الاستشارات الفنية في مجال اختصاصها، وفقاً للضوابط التي يقرها المجلس. 17 - تقديم التوصيات والاقتراحات للجهات الحكومية عند سَنِّ ومراجعة الأنظمة ذات العلاقة بقطاع المقاولات متى طلب ذلك. 18 - تمثيل قطاع المقاولات في اللجان والهيئات والاتحادات والنقابات الدولية ذات العلاقة. 19 - تشجيع المقاولين على توظيف السعوديين في قطاع المقاولات. 20 - إنشاء سجل إلكتروني يتضمن بيانات تفاعلية تحدد فيها معلومات عن المقاول وتخصصه وأعماله السابقة، يُمكّن الجمهور من تحديد مدى الرضا عن أداء المقاول، ويتم تحديثه بشكل دوري.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الرابعة: العضوية'
  article_text_ar: 'تكون العضوية في الهيئة على النحو الآتي: 1 - عضوية أساسية: ويتمتع بها المقاولون السعوديون المرخص لهم بمزاولة مهنة المقاولات، الذين سددوا مبالغ اشتراكات العضوية السنوية المقررة. 2 - عضوية انتساب: ويتمتع بها المقاولون غير السعوديين في المملكة المرخص لهم بمزاولة مهنة المقاولات، وكذلك المهتمون بقطاع المقاولات فيها، الذين سددوا مبالغ اشتراكات العضوية السنوية المقررة. 3 - عضوية فخرية: ويتمتع بها من يقرر المجلس منحها إياها ممن يقدم إسهامات متميزة تخدم أهداف الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الخامسة: انتهاء العضوية'
  article_text_ar: 'تنتهي العضوية الأساسية وعضوية الانتساب في أيِّ من الحالات الآتية: 1 - وفاة العضو ذي الشخصية الطبيعية، أو انقضاء (حل) الشخصية الاعتبارية. 2 - تأخر العضو عن سداد مبلغ اشتراك العضوية الأساسية أو عضوية الانتساب مدة تزيد على تسعين يوماً من تاريخ الاستحقاق، ومن ثم مضي خمسة عشر يوماً من تاريخ إنذاره بالسداد، دون عذرٍ يقبله المجلس. 3 - صدور قرار من المجلس بإنهاء العضوية لأي سببٍ يقدره. 4 - انتهاء الترخيص له بمزاولة مهنة المقاولات لأي سبب كان.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة السادسة: الجمعية العمومية'
  article_text_ar: تكون للهيئة جمعية عمومية تتكون من جميع الأعضاء الأساسيين الذين سددوا مبالغ اشتراكات العضوية السنوية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: المادة السابعة اجتماعات الجمعية العمومية
  article_text_ar: 1 - تعقد الجمعية العمومية اجتماعها العادي خلال تسعين يوماً من بداية كل سنة مالية للهيئة.2 - يرأس رئيس المجلس - أو من ينيبه من أعضاء المجلس - اجتماع الجمعية العمومية. 3 - لا يكون اجتماع الجمعية صحيحاً إلا إذا حضره نصف أعضائها على الأقل، فإذا لم يكتمل النصاب يدعى إلى اجتماع آخر يعقد خلال مدة لا تقل عن خمسة عشر يوماً ولا تزيد على ستين يوماً من موعد الاجتماع الأول، ويكون الاجتماع في هذه الحالة صحيحاً بمن حضر. ويجوز للجمعية العمومية عقد اجتماعات استثنائية وفقاً لما تحدده اللائحة. وللوزير تكليف من يمثله لحضور اجتماعات الجمعية العمومية، متى دعت الحاجة إلى ذلك. 4 - تصدر قرارات الجمعية العمومية بأغلبية أصوات الحاضرين، وفي حال التساوي يكون صوت رئيس الاجتماع مرجحاً. 5 - يوجه رئيس مجلس الإدارة الدعوة لاجتماعات الجمعية العمومية قبل ثلاثين يوماً على الأقل من تاريخ انعقادها، ويحدد فيها زمان الاجتماع ومكانه وجدول أعماله. 6 - للوزير دعوة الجمعية العمومية لاجتماع استثنائي في حالة حدوث أي أمر طارئ يستدعي ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الثامنة: اختصاصات الجمعية العمومية'
  article_text_ar: 'تختص الجمعية العمومية بما يأتي: 1 - إقرار اللائحة. 2 - إقرار اللوائح الإدارية والمالية. 3 - إقرار الضوابط والمعايير الخاصة بقبول طلبات عضوية الانتساب. 4 - إقرار مبالغ اشتراكات العضوية وأي مقابل مالي تتقاضاه الهيئة، وآلية السداد. 5 - انتخاب أعضاء المجلس. 6 - إقرار الميزانية السنوية للهيئة، والموافقة على حساباتها الختامية. 7 - تعيين مراقب لحسابات الهيئة وتحديد مكافأته، واستثناء من ذلك يعين المجلس مراقب الحسابات للمدة الأولى ويحدد مكافأته. 8 - إقرار خطة العمل التي يقدمها المجلس، واعتماد التقرير السنوي للهيئة. 9 - إقرار سياسة استثمار أموال الهيئة. 10 - تحديد مكافآت أعضاء المجلس، وفقاً لما تحدده اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة التاسعة: تكوين المجلس'
  article_text_ar: 1 - يتكون المجلس من عشرة من الأعضاء الأساسيين تنتخبهم الجمعية العمومية، وتحدد اللائحة الإجراءات اللازمة لذلك وما يشترط في المرشحين. 2 - يتولى المجلس في أول جلسة اختيار رئيس له ونائب للرئيس من بين أعضائه بالاقتراع السري. 3 - إذا خلا محل عضو في المجلس لأي سبب من الأسباب الواردة في المادة (الرابعة عشرة) من التنظيم، حل محله من حاز على أكثر الأصوات من الأعضاء المنتخبين، وتكون العضوية في هذه الحالة لنهاية المدة المتبقية للمجلس. 4 - يلتزم عضو المجلس بالإفصاح عن أي مصلحة - أو علاقة ناشئة أو قد تنشأ - لها صلة بعضويته في المجلس بصورة مباشرة أو غير مباشرة، وذلك بما يحقق مبدأ الشفافية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة العاشرة: مدة المجلس'
  article_text_ar: تكون مدة العضوية في المجلس ثلاث سنوات، ولا يجوز انتخاب العضو أكثر من مرتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الحادية عشرة: اجتماعات المجلس ونصاب الحضور والتصويت'
  article_text_ar: 1 - يجتمع المجلس بدعوة من رئيسه مرة على الأقل كل تسعين يوماً، أو كلما طلب ذلك - كتابة - أربعة أعضاء على الأقل. 2 - يعقد المجلس اجتماعاته بحضور أغلبية أعضائه على أن يكون من بينهم الرئيس أو نائبه. وتصدر قراراته بموافقة أغلبية الأعضاء الحاضرين، وإذا تساوت الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. 3 - لا يجوز لعضو المجلس التصويت على أي قرار يكون له فيه مصلحه مباشرة أو غير مباشرة. 4 - تثبت قرارات ومداولات المجلس في محاضر يوقعها رئيس الجلسة والأعضاء الحاضرون. 5 - يتولى الأمين العام - أو من ينوب عنه - أمانة المجلس دون أن يكون له حق التصويت. وللمجلس أن يطلب حضور من يرى الاستعانة بقدراته وخبراته، دون أن يكون له حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الثانية عشرة:  اختصاصات المجلس'
  article_text_ar: 'فيما عدا ما يدخل في اختصاصات الجمعية العمومية، يكون للمجلس حق ممارسة جميع الصلاحيات اللازمة لتصريف شؤون الهيئة وتحقيق أهدافها، ومنها: 1 - اقتراح اللائحة واللوائح المالية والإدارية. 2 - اقتراح مبالغ اشتراكات العضوية وأي مقابل مالي تتقاضاه الهيئة، وآلية السداد. 3 - اقتراح الضوابط والمعايير الخاصة بقبول طلبات عضوية الانتساب. 4 - إعداد الحساب الختامي ومشروع الميزانية السنوية للهيئة.5 - إعداد التقرير السنوي عن نشاط الهيئة.6 - تكوين اللجان اللازمة لمساعدة المجلس في ممارسة مهماته.7 - قبول الهبات والتبرعات.8 - اقتراح سياسة استثمار أموال الهيئة. 9 - اقتراح خطة عمل الهيئة. 10 - التصرف في أموال الهيئة الثابتة والمنقولة بما يحقق أغراضها، وفقاً لما تحدده اللوائح المالية. 11 - تعيين أمين عام للهيئة ونائب له، وتحديد واجباتهما ومسؤولياتهما وحقوقهما.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: تشكل لجنة لترشيح وانتخاب أعضاء المجلس، ويكون لكل ناخب صوت واحد عند إجراء الانتخابات، على أن تبين اللائحة الأحكام المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الرابعة عشرة:  انتهاء عضوية المجلس'
  article_text_ar: 'تنتهي العضوية في المجلس بقرار منه في أي من الحالات الآتية: 1 - الوفاة. 2 - استقالة العضو.3 - عدم حضور ثلاثة اجتماعات متتالية، أو ستة اجتماعات متفرقة في الدورة الواحدة، دون عذر يقبله المجلس.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: إذا حال مانع دون انتخاب المجلس، أو حدث خلل أعاقه عن ممارسة اختصاصاته، فللوزير أن يتخذ ما يلزم من الإجراءات والآليات والتدابير بما في ذلك حل المجلس، وأن يوكل ـ بقرار منه ولمدة لا تتجاوز ستة أشهر ـ صلاحيات المجلس إلى مجلس إدارة مؤقت يؤلفه لهذا الغرض، وأن يدعو الجمعية العمومية للانعقاد لانتخاب مجلس جديد. ويمارس المجلس المؤقت صلاحيات المجلس إلى حين انتخاب مجلس إدارة جديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: يمثل الهيئة في صلاتها بغيرها من الجهات وأمام القضاء رئيس المجلس أو من ينيبه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة السابعة عشرة:  السنة المالية'
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة، واستثناء من ذلك، تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ التنظيم، وتنتهي بنهاية السنة المالية التالية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: 'المادة الثامنة عشرة: موارد الهيئة'
  article_text_ar: 'تتكون موارد الهيئة من الآتي: 1 - مبالغ اشتراكات الأعضاء والمقابل المالي لما تقدمه من خدمات. 2 - الإعانات الحكومية إن وجدت. 3 - الهبات والتبرعات التي يقبلها المجلس. 4 - عوائد استثمار أموالها'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: تودع أموال الهيئة النقدية باسمها لدى أحد البنوك المحلية، ولا يجوز سحب أي مبلغ إلا بشيك يوقعه رئيس المجلس - أو من يفوضه من أعضاء المجلس - والأمين العام. ولا يجوز للهيئة أن تنفق أموالها في غير الأغراض التي أنشئت من أجلها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به بعد ستين يوماً من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/0f1168b3-b5f0-46bd-ad62-a9a700f1ea17/1
  verified: false
