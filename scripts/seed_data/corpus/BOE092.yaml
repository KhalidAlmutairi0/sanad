  name_ar: نظام الأسماء التجارية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: 'المادة الأولى: التعريفات'
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية -أينما وردت في هذا النظام- المعاني المبينة أمام كل منها: النظام: نظام الأسماء التجارية. اللائحة: اللائحة التنفيذية للنظام. الوزارة: وزارة التجارة. الوزير: وزير التجارة. الاسم التجاري: الاسم الذي يستعمله التاجر في مزاولة أعماله التجارية لتمييزه عن غيره من التجار. التاجر: شخص ذو صفة طبيعية أو اعتبارية ينطبق عليه وصف التاجر وفقًا للنظام التجاري. السجل التجاري: سجل يحتوي على بيانات التجار من خلال قاعدة بيانات إلكترونية مركزية. المسجل: الجهة الحكومية المحددة من الوزير لإدارة السجل التجاري.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثانية: الأهداف'
  article_text_ar: يهدف النظام إلى تعزيز الثقة في البيئة التجارية من خلال تنظيم إجراءات حجز الأسماء التجارية وقيدها في السجل التجاري، وتعزيز قيمتها، وضمان حمايتها والحقوق المتصلة بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثالثة: الالتزام باتخاذ الاسم التجاري وقيده'
  article_text_ar: يجب على كل تاجر اتخاذ اسم تجاري وقيده في السجل التجاري. يجوز حجز الاسم التجاري لمدة مؤقتة لدى المسجل دون قيده في السجل التجاري. وتحدد اللائحة مدة الحجز وضوابطه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الرابعة: تكوين الاسم التجاري'
  article_text_ar: يُتخذ الاسم التجاري من اسم التاجر الشخصي أو من اسم مميز أو منهما معًا. ويتكون من ألفاظ عربية أو معربة، أو من حروف أو أرقام عربية، أو من واحد أو أكثر منها. يجوز أن يتكون الاسم التجاري من ألفاظ أو حروف أو أرقام أو من واحد أو أكثر منها بلغة غير العربية. تحدد اللائحة الأحكام الخاصة بهذه المادة، بما في ذلك اللغة غير العربية للاسم التجاري، وطريقة عرض الاسم التجاري في السجل التجاري، وأحكام حجز وقيد اسم (السعودية) وأسماء (المدن والمناطق والأماكن العامة) و(الأسماء العائلية) أسماءً تجارية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الخامسة: طلب حجز الاسم التجاري أو قيده'
  article_text_ar: يقدم طلب حجز الاسم التجاري أو قيده إلى المسجل، متضمنًا البيانات التي تحددها اللائحة. يبت المسجل في الطلب المستوفي البيانات المطلوبة خلال (عشرة) أيام من تاريخ تقديمه. وللمسجل في حالات تحددها اللائحة تمديد تلك المدة. يشهر المسجل الاسم التجاري المقبول حجزه أو قيده في الوسيلة التي تحددها اللائحة، ويتحمل طالب الحجز أو القيد المقابل المالي للشهر إن وجد. عند وجود أكثر من طلب لحجز أو قيد اسم تجاري، تكون الأولوية للأسبق في تقديم الطلب. في حال رفض الطلب، يجب أن يكون القرار مسببًا، ويُبلغ به طالب الحجز أو القيد وفقًا لما تحدده اللائحة، ويحق له التظلم أمام الوزارة خلال (ستين) يومًا من تاريخ إبلاغه برفضه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة السادسة: حماية الاسم التجاري'
  article_text_ar: يحظر على أي شخص آخر استعمال الاسم التجاري المحجوز أو المقيد للتاجر وفقًا لأحكام النظام، وذلك مع مراعاة الأنظمة الأخرى ذات العلاقة. يحق للتاجر، المقيد اسمه التجاري في السجل التجاري، أن يطالب من استعمل اسمه التجاري بالتعويض عن الضرر الذي ترتب عليه، وذلك أمام المحكمة المختصة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة السابعة: الأسماء المحظورة'
  article_text_ar: 'يحظر حجز أو قيد الاسم التجاري المخالف للنظام العام أو الآداب العامة أو الذي يؤدي إلى التضليل، أو المحظور استعماله بناءً على الأحكام النظامية ذات الصلة، ويشمل ذلك ما إذا كان الاسم: أ- يشابه اسمًا تجاريًّا محجوزًا أو مُقيدًا في السجل التجاري أيًّا كان نوع النشاط. وتحدد اللائحة معايير تشابه الأسماء التجارية وأوجه التمييز بينها. ب- يشابه اسمًا تجاريًّا أو علامة تجارية مشهورة عالميًّا، أو يشابه علامة تجارية مسجلة أو مشهورة في المملكة، ما لم تكن العلامة التجارية مملوكة لمقدم الطلب. ج- يتضمن معنى أو دلالة أو مضمونًا سياسيًّا أو عسكريًّا أو دينيًّا. د- يشابه اسمًا أو شارة شرفية أو رمزًا خاصًّا بأي من المنظمات -المحلية أو الإقليمية أو الدولية- أو إحدى مؤسساتها. تضع الوزارة قائمة بأبرز الأسماء التي يحظر حجزها أو قيدها أسماءً تجارية وفق الفقرة (1) من هذه المادة، وتحدث دوريًا.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثامنة: عرض الاسم التجاري'
  article_text_ar: يجب على التاجر أن يعرض اسمه التجاري على واجهة مكان مزاولة أعماله التجارية بحسب طبيعتها، وأن يضعه في جميع وثائقه ومراسلاته ومطبوعاته.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة التاسعة: تعديل الاسم التجاري'
  article_text_ar: للتاجر المقيد في السجل التجاري تعديل اسمه التجاري بعد استيفاء الشروط والإجراءات الواردة في النظام واللائحة، ويسري التعديل من تاريخ قيده في السجل التجاري، وذلك دون مساس بالحقوق والالتزامات التي نشأت قبل تعديله.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة العاشرة: التصرف في الاسم التجاري'
  article_text_ar: يجوز للتاجر التصرف في الاسم التجاري المقيد تصرفًا مستقلًا عن المتجر، وتحدد اللائحة الأحكام الخاصة بذلك. لا ينفذ التصرف في الاسم التجاري إلا بعد قيده وشهره في السجل التجاري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الحادية عشرة: أثر نقل ملكية الاسم التجاري مع المتجر'
  article_text_ar: تنتقل إلى من آل إليه الاسم التجاري مع المتجر الحقوق والالتزامات التي سبق أن ترتبت تحت هذا الاسم، إلا إذا اتفق على غير ذلك. ومع ذلك، يبقى السلف والخلف مسؤولين بالتضامن أمام الدائنين، ولا يسري أي اتفاق على غير ذلك في حقهم إلا بعد موافقتهم، ولا تُسمع دعوى مسؤولية الخلف عن التزامات السلف بعد (خمس) سنوات من تاريخ نقل الملكية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثانية عشرة: إلغاء حجز الاسم التجاري'
  article_text_ar: 'يلغي المسجل -من تلقاء نفسه أو بناءً على طلب ذي مصلحة- حجز الاسم التجاري في أيّ من الحالتين الآتيتين: إذا كان يخالف النظام العام أو الآداب العامة أو يؤدي إلى التضليل أو محظور استعماله بناءً على الأحكام النظامية ذات الصلة. انقضاء مدة الحجز دون تمديد. ويبلغ المسجل من ألغي حجز اسمه التجاري وفقًا لما تحدده اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثالثة عشرة: شطب قيد الاسم التجاري'
  article_text_ar: 'يشطب المسجل -من تلقاء نفسه أو بناءً على طلب ذي مصلحة- قيد الاسم التجاري، في أي من الحالات الآتية: أ- إذا كان يخالف النظام العام أو الآداب العامة أو يؤدي إلى التضليل أو محظور استعماله بناءً على الأحكام النظامية ذات الصلة. ‌ب- إذا صدر قرار أو حكم نهائي بشطبه.‌ ج- إذا شطب القيد في السجل التجاري. ويبلغ المسجل من شطب قيد اسمه التجاري وفقًا لما تحدده اللائحة. على من شطب قيد اسمه التجاري وفق الفقرتين الفرعيتين (أ) و(ب) من الفقرة (1) من هذه المادة أن يقيد اسمًا تجاريًّا محل الاسم التجاري المشطوب، وذلك وفقًا لما تحدده اللائحة. يحجز المسجل الاسم التجاري للتاجر الذي شطب قيده في السجل التجاري وفق الفقرة الفرعية (ج) من الفقرة (1) من هذه المادة، وذلك وفقًا لما تحدده اللائحة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الرابعة عشرة: بيان المخالفات'
  article_text_ar: 'دون إخلال بأي عقوبة ينص عليها نظام آخر، يعاقب بغرامة لا تزيد على (خمسين) ألف ريال كل من: أ- استعمل اسماً تجاريّاً محجوزاً أو مقيداً له بما يخالف أحكام النظام. ب- لم يلتزم بأحكام الفقرة (1) من المادة (الثالثة)، أو الفقرة (1) من المادة (السادسة)، أو المادة (الثامنة)، أو الفقرة (2) من المادة (الثالثة عشرة) من النظام. يجوز أن تضاعف الغرامة في حال التكرار. ويكون التكرار بارتكاب المخالفة نفسها الصادر بثبوتها قرار نهائي خلال (ثلاث) سنوات من تاريخ صدور القرار. يراعى في تحديد مقدار الغرامة جسامة المخالفة وظروفها، وملابساتها، وآثارها، وحجم المنشأة. وتحدد اللائحة جدول تصنيف المخالفات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الخامسة عشرة: ضبط المخالفات'
  article_text_ar: يتولى ضبط ما يقع من مخالفات لأحكام النظام موظفون يصدر بتسميتهم قرار من الوزير، وتكون لهم صفة الضبط. يصدر الوزير قواعد تنظم عمل ومهمات الموظفين المشار إليهم في الفقرة (1) من هذه المادة. يصدر الوزير قواعد منح المكافآت المالية للعاملين على كشف المخالفات المنصوص عليها في النظام، وذلك بالاتفاق مع وزارة المالية ووزارة الموارد البشرية والتنمية الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة السادسة عشرة: لجنة النظر في المخالفات'
  article_text_ar: تكوّن بقرار من الوزير لجنة (أو أكثر) من أعضاء لا يقل عددهم عن (ثلاثة)، ويرأسها ذو تأهيل نظامي، وتختص بالنظر في المخالفات وإيقاع العقوبة المنصوص عليها في المادة (الرابعة عشرة) من النظام، ويكون للوزير تحديد المخالفات التي يجوز إيقاع عقوبات مباشرة بشأنها دون عرضها على اللجنة. وتصدر قواعد عمل اللجنة وتحدد مكافآت رئيسها وأعضائها وأمانتها، بقرار من الوزير.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة السابعة عشرة: الإجراءات البديلة'
  article_text_ar: 'إذا ثبت أن التاجر قد ارتكب أيًّا من المخالفات الواردة في المادة (الرابعة عشرة) من النظام، فيحق للجنة أن تتخذ -بالإضافة إلى العقوبة المقررة أو بدلًا منها- أيًّا من الآتي: ‌إنذار التاجر. إلزام التاجر باتخاذ الخطوات الضرورية لتجنب وقوع المخالفة مستقبلًا. إلزام التاجر باتخاذ الخطوات التصحيحية اللازمة لمعالجة آثار المخالفة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثامنة عشرة: التظلم على القرارات'
  article_text_ar: يحق لمن صدر ضده أي قرار بناءً على أحكام النظام التظلم منه أمام المحكمة المختصة خلال (ثلاثين) يومًا من تاريخ التبليغ به وفقًا لما تحدده اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة التاسعة عشرة: إسناد المهمات'
  article_text_ar: للوزير الاستعانة بالجهات العامة أو الخاصة للقيام بالمهمات المقررة للمسجل، وله إسناد بعضها إلى تلك الجهات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة العشرون: منصة خبراء اللغة العربية'
  article_text_ar: تشجع الوزارة استعمال اللغة العربية، لتعزيز قاعدة الأسماء التجارية العربية، عبر منصة لخبراء اللغة العربية تقيد فيها بيانات الخبراء، وتعرض أعمالهم للعموم، وفق الضوابط والإجراءات التي تحددها اللائحة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الحادية والعشرون: المقابل المالي'
  article_text_ar: تحدد اللائحة المقابل المالي للخدمات المقدمة من المسجل تنفيذًا لأحكام النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثانية والعشرون: إصدار اللائحة'
  article_text_ar: يصدر الوزير اللائحة خلال (مائة وثمانين) يومًا من تاريخ نشر النظام في الجريدة الرسمية، ويعمل بها من تاريخ نفاذه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
- article_ref: 'المادة الثالثة والعشرون: نفاذ النظام'
  article_text_ar: يحل النظام محل نظام الأسماء التجارية، الصادر بالمرسوم الملكي رقم (م / 15) وتاريخ 12 / 8 / 1420هـ، ويعمل به بعد (مائة وثمانين) يومًا من تاريخ نشره في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/d4801a45-7f76-4414-bdca-b20900db6fc4/1
  verified: false
