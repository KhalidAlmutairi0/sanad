regulation:
  code: BOE489
  name_ar: تنظيم هيئة تطوير بوابة الدرعية
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يكون للألفاظ الآتية - أينما وردت في هذا التنظيم - المعاني المبينة أمامها، ما لم يقتض السياق خلاف ذلك: الهيئة: هيئة تطوير بوابة الدرعية. التنظيم: تنظيم الهيئة. المجلس: مجلس إدارة الهيئة. الرئيس التنفيذي: الرئيس التنفيذي للهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: الماة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة وبالاستقلال المالي والإداري ، وترتبط تنظيمياً برئيس مجلس الشؤون الاقتصادية والتنمية، ويكون مقرها محافظة الدرعية. تعمل الهيئة على أسس ومعايير تجارية ، وتمنح المرونة والصلاحيات التي تمكنها من القيام بمهماتها، وذلك وفقاً للوائحها الداخلية والمالية والإدارية المنصوص عليها في هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: 'تهدف الهيئة إلى تطوير مشروع بوابة الدرعية المستهدف في المجالات: العمرانية، والاقتصادية، والاجتماعية، والثقافية، والتاريخية، وإدارة البيئة وحمايتها، وتوفير احتياجاته من المرافق العامة والخدمات ونحو ذلك، والارتقاء بها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'مع عدم الإخلال باختصاصات الجهات الأخرى ، يكون للهيئة في سبيل تحقيق أغراضها ما يأتي: اتخاذ ما يلزم من خطط وبرامج لتنفيذ مشروع تطوير بوابة الدرعية المستهدف وتنميته. الاستعانة بمراكز الدراسات والتخطيط ، والكوادر المتخصصة من داخل المملكة وخارجها، لوضع الخطط اللازمة لمشروع تطوير بوابة الدرعية المستهدف. متابعة تخطيط ما يتصل بالبنية الأساسية في مشروع تطوير بوابة الدرعية المستهدف ومتابعة تنفيذه بالتنسيق مع الأجهزة المعنية. المشاركة في اقتراح الأنظمة والتعليمات التي تسهم في تنفيذ مخططات مشروع تطوير بوابة الدرعية المستهدف وتنميته. تنسيق وتنظيم الجهود بين جميع الجهات ذات الصلة بمشروع تطوير بوابة الدرعية المستهدف وتنميته ، وفقاً للدراسات والخطط المعتمدة، بما يسهم في تحقيق أهداف الهيئة. تأسيس الشركات أو المساهمة فيها، وتأسيس الصناديق الاستثمارية والوقفية، بما يكفل أداء الهيئة لمهماتها وتحقيق أغراضها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للهيئة مجلس إدارة يشكل من عدد من الأعضاء من ذوي الخبرة والاختصاص لا يقل عددهم عن أربعة أعضاء يرشحهم رئيس مجلس الشؤون الاقتصادية والتنمية ، ويعين رئيس المجلس وأعضاؤه بأمر ملكي تحدد فيه مكافآتهم ويختار المجلس - بعد تعيينه- من بين أعضائه أميناً لهم. تكون مدة العضوية في المجلس ثلاث سنوات قابلة للتجديد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة المهيمنة على إدارة شؤون الهيئة وتصريف أمورها، ويتخذ جميع القرارات اللازمة لتحقيق أغراضها، واختيار الأسلوب الذي يراه مناسباً لمشروع تطوير بوابة الدرعية المستهدف- دون التقيد بالقواعد المالية والإدارية المعمول بها- وله على وجه الخصوص ما يأتي: إقرار السياسات العامة للهيئة وخطة عملها وخططها التشغيلية في إطار الخطة العامة للدولة. إقرار الهيكل التنظيمي للهيئة، ولوائحها الداخلية والمالية والإدارية. اعتماد اللوائح الفنية والإجراءات والقواعد والمعايير المتعلقة بعمل الهيئة. إقرار ميزانية الهيئة، تمهيداً لرفعها إلى رئيس مجلس الوزراء لاعتمادها. إقرار الحساب الختامي للهيئة وتقرير مراجع الحسابات والتقرير السنوي، تمهيداً لرفعها بحسب الإجراءات النظامية. وضع القواعد المتعلقة بالرخص والتصاريح والخدمات والأعمال الداخلة في اختصاص الهيئة، وتحديد المقابل المالي لها. الموافقة على شراء العقارات وبيعها واستئجارها وتأجيرها بما يحقق أهداف الهيئة. الموافقة على تأسيس الشركات أو المساهمة فيها وتأسيس الصناديق الاستثمارية والوقفية، وفق قواعد يضعها لهذا الغرض. الموافقة على إبرام الاتفاقات
    والعقود ، بحسب الإجراءات النظامية المتبعة. قبول التبرعات والهبات والوصايا والأوقاف والإعانات التي تقدم للهيئة. تعيين مراجع حسابات خارجي معتمد، ومراقب مالي دخلي. تشكيل اللجان وتخويلها الصلاحيات اللازمة لإنجاز المهمات المنوطة بها. ويجوز للمجلس تفويض بعض اختصاصاته إلى رئيسه أو أحد أعضائه أو من يراه من مسؤولي الهيئة وفق ما يقتضيه سير العمل فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة، ويجوز عند الاقتضاء عقدها في مكان آخر داخل المملكة. يجتمع المجلس أربع مرات في السنة على الأقل بناءً على دعوة من رئيسه أو متى طلب ذلك عضوان من أعضائه على الأقل، ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع، ويشترط لصحة الاجتماع حضور أغلبية الأعضاء بمن فيهم رئيس المجلس أو من ينيبه، وتصدر القرارات بأغلبية أصوات الحاضرين، وعند تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع، وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون، وتبلغ الهيئة هذه القرارات إلى الجهات المعنية بها مباشرة وبالطريقة المناسبة. لا يجوز للعضو الامتناع عن التصويت أو تفويض عضو آخر بالتصويت عنه عند غيابه. لا يجوز للعضو أن يفشي شيئاً مما وقف عليه من أسرار الهيئة. للمجلس أن يدعو لحضور اجتماعاته من يرى الاستعانة بمعلوماتهم وخبراتهم دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي يعين بقرار من المجلس ، ويحدد القرار أجره ومزاياه المالية، وهو المسؤول التنفيذي عن إدارة الهيئة، وتتركز مسؤولياته في حدود هذا التنظيم، ويمارس الاختصاصات التالية: اقتراح خطة عمل الهيئة وبرامجها وخططها التشغيلية، وتقديمها إلى المجلس، ومتابعة تنفيذها بعد موافقة المجلس عليها. اقتراح الهيكل التنظيمي للهيئة ولوائحها الداخلية والمالية والإدارية وعرضها على المجلس والإشراف على تنفيذها بعد اعتمادها. تعيين العاملين في الهيئة والإشراف عليهم طبقاً للصلاحيات الممنوحة له وما تحدده اللوائح. إصدار الأوامر بمصروفات الهيئة بموجب الميزانية السنوية المعتمدة. متابعة تنفيذ القرارات الصادرة عن المجلس. تقديم تقارير دورية إلى المجلس عن أعمال الهيئة ومنجزاتها ونشاطاتها. تقديم الاقتراحات إلى المجلس في شأن الموضوعات الداخلة في اختصاصه. التوقيع على الاتفاقات والعقود بعد موافقة المجلس. الإشراف على إعداد مشروع ميزانية الهيئة، والتقرير السنوي ، والحساب الختامي، وعرضها على المجلس لاتخاذ ما يلزم في شأنها. تمثيل الهيئة أمام الجهات القضائية والإدارية وغيرها. إصدار القرارات اللازمة
    لتنفيذ أحكام التنظيم والقواعد والإجراءات المعتمدة، وذلك بحسب الصلاحيات المفوضة له. مباشرة ما تخوله إياه قرارات المجلس والنظم واللوائح الخاصة بالهيئة من اختصاصات. وللرئيس التنفيذي تفويض بعض صلاحياته ومهماته إلى غيره من مسؤولي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يخضع منسوبو الهيئة لنظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة تعتمد وفقاً لما ورد في الفقرة (4) من المادة (السادسة) من هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: 'تتألف موارد الهيئة المالية من المصادر الآتية: أ - الاعتمادات التي تخصص لها في ميزانية الدولة. ب- المقابل المالي الذي تتقاضاه الهيئة عن الرخص والتصاريح والخدمات والأعمال التي تقدمها وفقاً لأحكام هذا التنظيم. ج - عوائد استثمار أموال الهيئة. د - الإيجارات التي تحصلها من الأراضي أو المباني التي تملكها أو المخصصة لها أو التي تشارك فيها. هـ- التبرعات والهبات والوصايا والأوقاف والإعانات التي تقدم لها. و - أي مورد آخر يقر المجلس. تودع أموال الهيئة في حساب يفتح لها في مؤسسة النقد العربي السعودي، ولها فتح حسابات في البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الأموال وفق ميزانية الهيئة المعتمدة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: السنة المالية للهيئة هي السنة المالية للدولة، واستثناءً من ذلك تبدأ السنة المالية الأولى للهيئة من تاريخ نفاذ هذا التنظيم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يوماً من تاريخ انتهاء السنة المالية، لاتخاذ ما يلزم نظاماً في شأنه، ويزود ديوان المراقبة العامة بنسخة منه. ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يوماً من بداية السنة المالية تقريراً سنوياً عما حققته من إنجازات خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لحسن سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: مع عدم الإخلال بحق ديوان المراقبة العامة في الرقابة على حسابات الهيئة، يعين المجلس مراجع حسابات خارجياً (أو أكثر) من الأشخاص ذوي الصفة الطبيعية أو الصفة الاعتبارية المرخص لهم بالعمل في المملكة، ويحدد أتعابهم. وإذا تعدد مراجعو الحسابات فإنهم يكونون مسؤولين بالتضامن عن أعمالهم أمام الهيئة. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود ديوان المراقبة العامة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: تعامل الهيئة من حيث إعفاء وارداتها من الرسوم الجمركية وفقاً للقواعد المتبعة في شأن واردات المؤسسات العامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: ينشر هذا التنظيم في الجريدة الرسمية ، ويعمل به من تاريخ نشره.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5fa38926-e89f-42fc-bf9f-ac4d00e16635/1
  verified: false
