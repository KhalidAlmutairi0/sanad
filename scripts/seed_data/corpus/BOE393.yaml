articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالألفاظ والعبارات الآتية -أينما وردت في هذا التنظيم- المعاني المبينة أمام كل منها: الهيئة: هيئة التأمين. المجلس: مجلس إدارة الهيئة. الرئيس: رئيس المجلس. الرئيس التنفيذي: الرئيس التنفيذي للهيئة. التنظيم: تنظيم الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: تتمتع الهيئة بالشخصية الاعتبارية العامة والاستقلال المالي والإداري، وترتبط تنظيميًّا برئيس مجلس الوزراء، ويكون مقرها الرئيس في مدينة الرياض، ولها إنشاء فروع لها داخل المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تهدف الهيئة إلى تنظيم قطاع التأمين في المملكة والإشراف والرقابة عليه بما يدعمه ويعزز من فاعليته، وتعمل على تنمية الوعي التأميني، وحماية حقوق المؤمن لهم والمستفيدين، واستقرار قطاع التأمين، والمساهمة في الاستقرار المالي، وتعزيز وتنمية قطاع التأمين، والعمل على ترسيخ مبادئ العلاقة التعاقدية التأمينية وأركانها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: 'الهيئة هي الجهة المعنية بتنظيم أعمال التأمين في المملكة والإشراف والرقابة عليها وتطويرها، ولها -بالإضافة إلى اختصاصاتها المقررة نظاماً ودون إخلال باختصاصات ومسؤوليات الجهات الأخرى- القيام بكل ما يلزم لتحقيق أهدافها، ومن ذلك ما يأتي: وضع الاستراتيجية الوطنية لقطاع التأمين، ورفعها لاستكمال الإجراءات النظامية. وضع السياسات العامة والخطط والبرامج المتعلقة بقطاع التأمين، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه، ومتابعة تنفيذها. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل المعمول بها منها، ورفعها لاستكمال الإجراءات النظامية. المساهمة في تشجيع الاستثمار في قطاع التأمين بالتنسيق مع الجهات ذات العلاقة. وضع إجراءات جمع البيانات التأمينية، وحفظها، واستخدامها، وآلية الاستفادة منها، وفقًا للإجراءات النظامية. إجراء الدراسات والبحوث وتحليل البيانات والمعلومات المتعلقة بقطاع التأمين. وضع متطلبات التراخيص لممارسة أعمال التأمين، وتسلم طلبات التأسيس ومنح التراخيص لممارسة هذه الأعمال، ووضع المتطلبات الخاصة بممارسة كل نوع من أنواع التأمين. إعداد النشرات والتقارير
    الإحصائية لقطاع التأمين، ونشرها. اقتراح آليات لتطوير التأمين على مشاريع الجهات العامة في المملكة واستثماراتها، ومدى الحاجة إلى إلزامية التأمين على النشاطات التي تشرف عليها هذه الجهات، بما يسهم في تنمية قطاع التأمين وتطويره، وذلك بالتنسيق مع الجهات ذات العلاقة، ووفقًا للإجراءات النظامية. تزويد الجهات العامة والمنشآت الخاصة والأفراد والهيئات الدولية، بالإحصاءات الرسمية عن قطاع التأمين، وفقًا للإجراءات النظامية. إعداد التقارير وإنشاء قواعد للمعلومات المتعلقة بمجال عمل الهيئة، وتبادل المعلومات مع الجهات المحلية والإقليمية والعالمية، بما في ذلك دراسة الأثر الاقتصادي لقطاع التأمين وتحليلُه بالتنسيق مع الجهات المعنية واستكمال ما يلزم حيال ذلك. إعداد برامج ودورات في مجال التأمين وتنفيذها، وتدريب كوادر متخصصة في هذا المجال وتأهيلها، ووضع الاختبارات والاشتراطات المتصلة بالمرخص لهم وأعمالهم؛ وذلك بالتنسيق مع الجهات ذات العلاقة. عقد المؤتمرات والندوات واللقاءات ذات العلاقة باختصاصات الهيئة، وفقًا للإجراءات النظامية. التعاون وتبادل الخبرات مع الهيئات والمنظمات الإقليمية والدولية، وبيوت الخبرة المتخصصة
    داخل المملكة وخارجها، وذلك في حدود اختصاصات الهيئة. تمثيل المملكة في الهيئات والمنظمات والمحافل والمؤتمرات الإقليمية والدولية ذات الصلة باختصاصات الهيئة، وفقًا للإجراءات النظامية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يكون للهيئة مجلس إدارة يعين رئيسه بأمر ملكي، وبعضوية خمسة يكون من بينهم ذوو كفاية وخبرة في مجال عمل الهيئة يعينون بأمر من رئيس مجلس الوزراء بناءً على ترشيح من مجلس الشؤون الاقتصادية والتنمية، وتكون عضويتهم في المجلس لمدة ثلاث سنوات قابلة للتجديد مرتين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: 'المجلس هو السلطة العليا للهيئة، ويتولى الإشراف عليها وتصريف أمورها وإدارتها، ويتخذ جميع القرارات اللازمة لتحقيق أغراضها في حدود أحكام التنظيم والأنظمة ذات الصلة بقطاع التأمين، وله بصفة خاصة الاختصاصات الآتية: إقرار الاستراتيجية الوطنية لقطاع التأمين، تمهيدًا لاستكمال الإجراءات النظامية. إقرار السياسات العامة للهيئة والخطط والبرامج اللازمة لتنفيذها، والرفع عما يستلزم استكمال إجراءات نظامية في شأنه. إقرار الهيكل التنظيمي للهيئة. إقرار اللوائح الإدارية والمالية التي تسير عليها الهيئة، وغيرها من اللوائح اللازمة لتسيير شؤونها، على أن يكون إقرار اللوائح الإدارية بالاتفاق مع وزارة الموارد البشرية والتنمية الاجتماعية، وأن يكون إقرار اللوائح المالية والأحكام ذات الأثر المالي في اللوائح الإدارية بالاتفاق مع وزارة المالية. اقتراح مشروعات الأنظمة ذات العلاقة باختصاصات الهيئة، واقتراح تعديل المعمول بها منها، ورفعها لاستكمال الإجراءات النظامية. الموافقة على إنشاء فروع للهيئة. الموافقة على مشروع ميزانية الهيئة، وحسابها الختامي، وتقرير مراجع الحسابات، والتقرير السنوي، تمهيدًا لرفعها
    بحسب الإجراءات النظامية. تعيين العاملين في أعمال الفحص والرقابة والضبط لما يقع من مخالفات لأحكام الأنظمة ذات الصلة بقطاع التأمين. تعيين مراجع حسابات خارجي (أو أكثر) ومراقب مالي داخلي. النظر في التقارير الدورية التي تُقدم عن سير العمل في الهيئة وتقويم أداء الإدارة التنفيذية، واتخاذ الإجراءات اللازمة حيال ما ينتج عن ذلك. الموافقة على إبرام الاتفاقيات والبروتوكولات والعقود، وفقًا للإجراءات النظامية. تحديد المقابل المالي للخدمات والأعمال التي تقدمها الهيئة في مجال اختصاصاتها. الموافقة على مؤشرات قياس أداء الهيئة. قبول الهبات والتبرعات والمنح والوصايا والأوقاف، وفقًا للإجراءات النظامية. وللمجلس -في سبيل تحقيق اختصاصاته ودون الإخلال بالواجبات المنوطة به- تشكيل لجان دائمة أو مؤقتة من أعضائه أو من سواهم، وتخويلها ما يراه من مهمات، ويحدِّد في قرار تشكيل كل لجنة رئيسها وأعضاءها واختصاصاتها، ويكون لها الاستعانة بمن تراه لتأدية المهمات الموكولة إليها. وله كذلك تفويض بعض اختصاصاته إلى الرئيس أو من يراه من أعضائه أو من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: تعقد اجتماعات المجلس في مقر الهيئة، برئاسة الرئيس أو من ينيبه من الأعضاء. ويجوز عقدها في مكان آخر داخل المملكة. يعقد المجلس اجتماعاته بصفة دورية بما لا يقل عن (أربع) مرات في السنة، وكلما دعت الحاجة إلى ذلك بحسب ما يقدره الرئيس، أو إذا طلب ذلك (ثلث) الأعضاء على الأقل. توجه الدعوة للاجتماع من الرئيس كتابة قبل موعد الاجتماع بوقت كافٍ بحسب ما يقدره الرئيس، ويتعين أن تكون الدعوة مصحوبة بجدول أعمال الاجتماع. يكون اجتماع المجلس صحيحًا إذا حضره أغلبية الأعضاء -على الأقل- بمن فيهم الرئيس أو من ينيبه من الأعضاء. وتصدر القرارات بأغلبية أصوات الحاضرين على الأقل. وفي حال تساوي الأصوات يرجح الجانب الذي صوت معه رئيس الاجتماع. تثبت مداولات المجلس وقراراته في محاضر يوقعها رئيس الاجتماع والأعضاء الحاضرون. يجوز -عند الحاجة، وفي الحالات المستعجلة، ووفقًا لما يقدره الرئيس- أن تعقد الاجتماعات وأن يصوت على القرارات، عن بُعد من خلال استخدام وسائل التقنية. ويمكن أن تُتخذ القرارات عن طريق التمرير على أعضاء المجلس، ويوقع عليها بما يفيد اطلاع جميع الأعضاء عليها. ولا تعد القرارات الصادرة بهذه الطريقة
    صحيحة ما لم تمُرر على جميع الأعضاء، ويصوتوا عليها، وتحُز على أغلبية أصواتهم. لا يجوز لعضو المجلس الامتناع عن التصويت، ولا تفويض عضو آخر بالتصويت عنه عند غيابه. وللعضو المعترض تسجيل اعتراضه وأسباب الاعتراض ضمن محضر اجتماع المجلس. لا يجوز لعضو المجلس أن يفشي شيئًا ممّا وقف عليه من أسرار الهيئة حتى بعد انتهاء عضويته في المجلس. للمجلس دعوة من يرى الاستعانة بهم من المختصين والمستشارين لحضور اجتماعاته، دون أن يكون لهم حق التصويت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'يكون للهيئة رئيس تنفيذي، يعيَّن بقرار من المجلس، ويحدد القرار أجره ومزاياه المالية والوظيفية الأخرى، ويعد المسؤول عن إدارة شؤون الهيئة، وتتركز مسؤولياته في حدود التنظيم وما يقرره المجلس. ويتولى الاختصاصات الآتية: الإشراف على إعداد الاستراتيجية الوطنية لقطاع التأمين، ورفعها إلى المجلس؛ لاستكمال ما يلزم في شأنها. اقتراح السياسات العامة للهيئة، والخطط والبرامج التي تسير عليها لتحقيق أهدافها، ورفعها إلى المجلس؛ لاستكمال ما يلزم في شأنها. اقتراح الهيكل التنظيمي للهيئة، ورفعه إلى المجلس؛ لاستكمال ما يلزم في شأنه. اقتراح اللوائح بما في ذلك اللوائح الإدارية والمالية للهيئة، والإشراف على تنفيذها بعد إقرارها. الإشراف على سير العمل في الهيئة، طبقًا للوائحها وخططها وبرامجها المعتمدة. الإشراف على إعداد مشروع ميزانية الهيئة ومشروع حسابها الختامي وتقريرها السنوي، ورفعها إلى المجلس. تمثيل الهيئة أمام القضاء ولدى الجهات الحكومية والمؤسسات والهيئات والمنظمات المعنية، وغيرها من الجهات أو المؤتمرات أو الفعاليات داخل المملكة وخارجها، وله تفويض غيره بذلك. الموافقة على عقد الهيئة للمؤتمرات
    والندوات واللقاءات ذات العلاقة باختصاصات الهيئة وفقًا للإجراءات النظامية. التوقيع على الاتفاقيات والبروتوكولات والعقود بعد موافقة المجلس، أو بحسب الصلاحيات التي يمنحها إيّاه المجلس. اقتراح المقابل المالي للخدمات والأعمال التي تقدمها الهيئة، والرفع عن ذلك إلى المجلس. تعيين منسوبي الهيئة وفقًا للأنظمة واللوائح المنظمة لذلك، والإشراف عليهم. أي اختصاص آخر يسنده إليه المجلس. وللرئيس التنفيذي تفويض بعض اختصاصاته إلى من يراه من منسوبي الهيئة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تتكون موارد الهيئة من الآتي: أ- المقابل المالي الذي تتقاضاه نظير الخدمات والأعمال التي تقدّمها. ب- عوائد استثمارات مواردها المالية المتاحة. ج- ما يقبله المجلس من هبات وتبرعات ومنح ووصايا وريع أوقاف. د- الغرامات المالية التي تفرضها الهيئة على المخالفين لأحكام الأنظمة ذات الصلة بقطاع التأمين. هـ- أي مورد آخر يقره المجلس بما لا يخالف الأنظمة والتعليمات. تفتح الهيئة حساباً لها في البنك المركزي السعودي، ولها فتح حسابات أخرى في أي من البنوك المرخص لها بالعمل في المملكة، ويصرف من هذه الحسابات وفقاً لميزانية الهيئة ولوائحها المالية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: تكون للهيئة ميزانية سنوية مستقلة من مواردها المالية، تقدم إلى وزارة المالية وتعتمد وفقاً للإجراءات النظامية المتبعة، ويحوَّل الفائض من مواردها المالية إلى وزارة المالية، بعد اقتطاع جميع النفقات الجارية والرأسمالية وغيرها من المصروفات التي تحتاج إليها الهيئة. وتحتفظ الهيئة باحتياطي عام لا يقل عن ضعف إجمالي نفقاتها المبينة في ميزانياتها السنوية السابقة، وفقاً لما يحدده المجلس في بداية السنة المالية. السنة المالية للهيئة هي السنة المالية للدولة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء حسابها الختامي السنوي خلال (تسعين) يومًا من تاريخ انتهاء السنة المالية، ويُزود الديوان العام للمحاسبة بنسخة منه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: دون إخلال باختصاص الديوان العام للمحاسبة، يعين المجلس مراجع حسابات خارجيًّا (أو أكثر) من المرخص لهم بالعمل في المملكة، لتدقيق حسابات الهيئة ومعاملاتها وبياناتها وميزانيتها السنوية وحسابها الختامي، ويحدد المجلس أتعابه. ويرفع تقرير مراجع الحسابات إلى المجلس، ويزود الديوان العام للمحاسبة بنسخة منه بعد اعتماده.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: ترفع الهيئة إلى رئيس مجلس الوزراء خلال (تسعين) يومًا من بداية كل سنة مالية تقريرًا سنويًا عما حققته من إنجازات خلال السنة المنقضية وما واجهها من صعوبات وما تراه من مقترحات لتحسين سير العمل فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يخضع منسوبو الهيئة لأحكام نظام العمل ونظام التأمينات الاجتماعية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/6994e763-5a47-4c4e-b796-b08000dccc7d/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: ينشر التنظيم في الجريدة الرسمية، ويعمل به بعد (تسعين) يومًا من تاريخ نشره.
