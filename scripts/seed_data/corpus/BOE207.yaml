regulation:
  code: BOE207
  name_ar: نظام وحدات الإخصاب والأجنة وعلاج العقم
  name_en: ''
  authority: —
  source_domain: laws.boe.gov.sa
articles:
- article_ref: المادة الأولى
  article_text_ar: 'يقصد بالكلمات والعبارات الآتية أينما وردت في هذا النظام المعاني الموضحة أمامها ما لم يقتض السياق خلاف ذلك : 1 - الوزير : وزير الصحة . 2 - الوزارة : وزارة الصحة . 3 - وحدة الإخصاب والأجنة وعلاج العقم : كل وحدة طبية حكومية أو خاصة تقوم بعمليات الإخصاب والأجنة وعلاج العقم، سواء أكانت مستقلة أم تابعة لمؤسسة صحية. 4 - لجنة الإشراف : هي اللجنة الخاصة بالإشراف على أمور الإخصاب والأجنة وعلاج العقم. 5 - الإخصاب : التقاء الحوين المنوي بالبييضة واختراق جدارها. 6 - العقم : تأخر حدوث الحمل لزوجين لأكثر من اثني عشر شهرًا في ظل علاقة زوجية قائمة. 7 - النطفة : مني الرجل. 8 - اللقيحة : البييضة المخصبة بالحوين المنوي للزوج. 9 - الجنين : البييضة الملقحة المنقسمة إلى خليتين أو أكثر في مرحلة ما قبل تكون الأعضاء والتخلق، أي في فترة الأسبوعين الأولين. 10 - استحثاث الإباضة : إعطاء أدوية لاستحثاث الإباضة المتعددة في المبيض. 11 - الحقن الصناعي : تحضير الحوينات المنوية للزوج وتركيزها في المعمل وحقنها في رحم الزوجة. 12 - عملية طفل الأنابيب : عملية تلقيح بييضات الزوجة- بعد سحبها من المبيض- بالسائل
    المنوي للزوج في المعمل، وحفظها تحت ظروف معينة، ثم إعادة الأجنة أو اللقيحة إلى رحم الزوجة، بعد التأكد من حدوث الانقسام السليم. 13 - الحقن المجهري : عملية مجهرية دقيقة لحقن "السيتوبلازم" (المادة الهلامية) لبييضة الزوجة بالحوين المنوي للزوج في المعمل، وحفظها تحت ظروف معينة، ثم إعادة الأجنة بعد التأكد من حدوث الانقسام السليم إلى رحم الزوجة. 14 - المنابلات الدقيقة : العمليات المجهرية الدقيقة التي تجري على البييضات أو الحوينات المنوية أو الأجنة؛ لإجراء تحاليل معينة أو للحصول على خلية لمراقبة طبيعتها ودراسة الصبغات الوراثية فيها، وغير ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يجوز التدخل الطبي لعلاج العقم الناتج عن ضعف الخصوبة أو عن وجود مشكلة مرضية قابلة للعلاج بناء على تقرير طبي، ولا يجوز إطلاقًا إجراء عمليات الإخصاب لعلاج العقم الذي يثبت عدم قدرة المصاب به على الإنجاب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: تلتزم وحدات الإخصاب والأجنة وعلاج العقم في ممارسة نشاطها بالفتاوى الشرعية التي تصدرها هيئة كبار العلماء في المملكة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يجب التأكد من وجود علاقة زواج قائمة قبل البدء في العلاج، ويحظر تخصيب أي بييضة للزوجة بنطفة الزوج بعد الطلاق أو الوفاة، ويجب على الطبيب عند حدوث ذلك أن يوقف عمليات الإخصاب والتلقيح.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: لا يجوز زرع بييضة مخصبة من زوجين في رحم زوجة أخرى أو امرأة أخرى، ولا يجوز التلقيح بنطفة من غير الزوج ولا تخصيب بييضة لغير الزوجة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: يجب الحصول على موافقة كتابية صريحة من الزوجين على طريقة العلاج، بعد تعريفهما بجميع إجراءات العلاج ومخاطره واحتمالات نتائجه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يجب التأكد من قبل اثنين على الأقل من المختصين بوحدة الإخصاب والأجنة وعلاج العقم من تطابق الهوية ورقم السجل الطبي لكلا الزوجين عند جمع العينات والإخصاب ونقل اللقيحة والأجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: لا يجوز التدخل في الخلايا الجنسية أو الجينات الوراثية، إلا لمعالجة أمراض وراثية أو جينية يمكن أن تصيب الجنين ويمكن تعديلها بعلاج الجينات الوراثية، على أن تجيزها لجنة الإشراف قبل ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: يجب على وحدات الإخصاب والأجنة وعلاج العقم الالتزام بالتنظيم الدقيق للنطف والبييضات واللقائح والأجنة، وتوفير أقصى درجات الحرص والاحتياط والحذر من اختلاطها أو الاستبدال بها بقصد أو دون قصد. وتحدد اللائحة التنفيذية لهذا النظام القواعد المنظمة لذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: يكون الطبيب مسؤولًا مسؤولية كاملة عن جميع الأضرار التي يسببها خطؤه في العلاج.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يكون كل من الطبيب والمساعد والفني مسؤولًا عما يرتكبه من إهمال أو تقصير أو خطأ يؤدي إلى اختلاط أو استبدال النطف أو البييضات أو اللقائح أو الأجنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: يجب أن تراعي وحدة الإخصاب والأجنة وعلاج العقم السرية المطلقة بالنسبة إلى المعلومات الخاصة بالمرضى، ويجب ألا تسمح لأحد بالاطلاع عليها إلا في الحالات التي تقتضيها الضرورة، بناء على موافقة لجنة الإشراف أو الجهات القضائية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: مع مراعاة ما تقضي به الأنظمة ذات العلاقة، لا يجوز لوحدات الإخصاب والأجنة وعلاج العقم إجراء أبحاث تتعلق بالنطف والبييضات واللقائح والأجنة، إلا بعد الحصول على موافقة الأشخاص الذين أخذت منهم العينات وموافقة لجنة الإشراف .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: تلتزم وحدات الإخصاب والأجنة وعلاج العقم برفع تقرير سنوي إلى لجنة الإشراف ، يتضمن إحصائية شاملة وبيانًا عن الحالات التي فحصت وعولجت.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'أ - تكون لجنة للإشراف على أمور الإخصاب والأجنة وعلاج العقم بقرار من الوزير على النحو الآتي : 1 - وكيل وزارة الصحة أو من ينيبه رئيساً 2 - مدير عام الرخص الطبية في وزارة الصحة عضواً 3 - عضو هيئة تدريس من إحدى كليات الطب بالجامعات السعودية، لا تقل درجته عن أستاذ مشارك في طب أمراض النساء والتوليد وعلاج العقم يسميه وزير التعليم العالي عضواً 4 - استشاري في طب الأطفال الخدج يسميه الوزير عضواً 5 - استشاري متخصص في أمراض العقم والإخصاب يسميه الوزير عضواً 6 - مستشار شرعي يسميه وزير العدل عضواً 7 - مستشار نظامي يسميه الوزير عضواً ب - يكون مقر اللجنة في الوزارة بالرياض. ج - تحدد مكافأة رئيس وأعضاء اللجنة من قبل مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: مدة العضوية في هذه اللجنة ثلاث سنوات قابلة للتجديد، وإذا تعذر استمرار أي عضو من أعضاء اللجنة لأي سبب يعين بديل له بالطريقة نفسها التي عين بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: تنعقد لجنة الإشراف بحضور ثلثي أعضائها على الأقل، وتعقد اجتماعاتها بدعوة من رئيسها بصفة دورية، أو كلما دعت الحاجة إلى ذلك، وتصدر قراراتها بأغلبية أصوات الأعضاء الحاضرين، ويعتمد الوزير تلك القرارات، ويجوز التظلم من قرار اللجنة أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: 'تختص لجنة الإشراف بما يأتي : 1 - التوصية بمنح الترخيص لوحدات الإخصاب والأجنة وعلاج العقم، وتحديد مستوى نشاطها، وذلك بعد التأكد من استيفاء شروط الترخيص. 2 - دراسة طرق ووسائل الإخصاب والأجنة وعلاج العقم، وتحديد شروطها، وإقرارها. 3 - النظر في طلبات إجراء أبحاث أو تجارب طبية في مجال الإخصاب والأجنة وعلاج العقم. 4 - تشكيل لجان فنية للتأكد من استيفاء شروط الترخيص، ودراسة التقارير والشكاوى، والقيام بأعمال الرقابة على هذه الوحدات، وأي موضوع تراه لجنة الإشراف ، وتحدد مكافأة هذه اللجان من قبل مجلس الوزراء. 5 - أي مهمة أخرى تسند إليها بموجب هذا النظام أو لائحته التنفيذية. وللجنة الاستعانة بخبراء أو جمعيات أو مراكز علمية أو هيئات متخصصة على سبيل المشورة. وتحدد اللائحة التنفيذية لهذا النظام إجراءات وقواعد عمل هذه اللجنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: لا يجوز تأسيس وحدة للإخصاب والأجنة وعلاج العقم ولا تشغيلها، إلا بعد الحصول على ترخيص الوزارة، بناء على توصية من لجنة الإشراف .
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'مع مراعاة ما يقضي به نظام ممارسة مهنة الطب البشري وطب الأسنان ونظام المؤسسات الصحية الخاصة وما صدر بشأنهما، يرخص لوحدات الإخصاب والأجنة وعلاج العقم وفقًا للمستويات الآتية وبالشروط التي تحددها اللائحة التنفيذية لهذا النظام : المستوى الأول : علاج العقم بأدوية استحثاث الإباضة عن طريق الحقن. المستوى الثاني : علاج العقم بالحقن الصناعي . المستوى الثالث : علاج العقم بعمليات طفل الأنابيب والحقن المجهري والمنابلة الدقيقة . وتحدد اللائحة التنفيذية لهذا النظام مؤهلات الأطباء المشرفين والأطباء الآخرين والفنيين العاملين في كل مستوى من هذه المستويات.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يجب توافر جميع التجهيزات والمرافق اللازمة لكل مستوى بحسب المواصفات التي تحددها اللائحة التنفيذية لهذا النظام، وذلك في كل وحدة من وحدات الإخصاب والأجنة وعلاج العقم.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: يشمل الترخيص الممنوح لوحدات الإخصاب والأجنة وعلاج العقم لمستوى معين ما قبله من مستويات أدنى.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: على وحدات الإخصاب والأجنة وعلاج العقم إعلان المستوى المرخص به مقرونًا باسم الوحدة في اللوحات الداخلية والخارجية ومطبوعاتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: لا يجوز الترخيص لمعمل الإخصاب والأجنة وعلاج العقم إلا ضمن وحدة إخصاب مرخص لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: لا يسمح بإجراء تقنيات التناسل التي تتطلب تنظيرًا للبطن أو تخديرًا عامًّا إلا لوحدات إخصاب داخل مستشفى أو لوحدات لديها تصريح بجراحة اليوم الواحد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: المشرف الطبي المسؤول عن وحدة الإخصاب والأجنة وعلاج العقم مسؤول مسؤولية كاملة عن عمل هذه الوحدة، وتحدد اللائحة التنفيذية لهذا النظام مهمات هذا المشرف في كل مستوى، كما تحدد مهمات الأطباء المساعدين والتقنيين والفنيين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: على وحدات الإخصاب والأجنة وعلاج العقم توثيق جميع المعلومات والبيانات والإجراءات التي تقوم بها، وتسجيل دورات العلاج ونوعيتها ونتائجها بدقة ووضوح وأمانة، وحفظها لمدة عشر سنوات على الأقل، وتقديمها للجهات المختصة عند طلب مراجعتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 'أ - تشكل لجنة للنظر في مخالفات أحكام هذا النظام ولائحته التنفيذية، وتوقيع العقوبات المناسبة وفقًا لهذا النظام - عدا عقوبة السجن - وتحديد مقدار التعويض عن الأضرار لأصحاب الحق الخاص، ويكون تشكيل اللجنة على النحو الآتي : 1 - قاضٍ لا تقل درجته عن قاضي (أ) يسميه وزير العدل رئيساً 2 - عضو هيئة تدريس من إحدى كليات الطب بالجامعات السعودية لا تقل درجته عن أستاذ مشارك في طب أمراض النساء والتوليد يسميه وزير التعليم العالي عضواً 3 - استشاري متخصص في أمراض النساء والتوليد يسميه الوزير عضواً 4 - استشاري متخصص في أمراض العقم والإخصاب يسميه الوزير عضواً 5 - استشاري متخصص في طب الأطفال الخدج يسميه الوزير عضواً 6 - مستشار نظامي يسميه الوزير عضواً ب - يكون مقر اللجنة في الوزارة بالرياض، ويجوز إنشاء لجان مماثلة في مناطق المملكة بقرار من الوزير. ج - تحدد مكافأة رئيس وأعضاء اللجنة من قبل مجلس الوزراء. د - تحدد اللائحة التنفيذية لهذا النظام القواعد والإجراءات اللازمة لعمل اللجنة. هـ - إذا رأت اللجنة أن المخالفة تستوجب عقوبة السجن فتحيل القضية إلى ديوان المظالم للنظر فيها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: مدة العضوية في هذه اللجنة ثلاث سنوات قابلة للتجديد، وإذا تعذر استمرار أي عضو من أعضاء اللجنة لأي سبب، يعين بديل له بالطريقة نفسها التي عين بها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: تنعقد اللجنة بحضور جميع أعضائها، وذلك بدعوة من رئيسها كلما دعت الحاجة إلى ذلك، وتصدر قراراتها بأغلبية أصوات الأعضاء، على أن يكون من بينهم الرئيس، ويكون صوته مرجحًا عند التساوي، وإذا تعذر صدور القرار على هذا النحو تحال القضية إلى ديوان المظالم للنظر فيها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: يمثل الادعاء العام أمام اللجنة عضو من هيئة التحقيق والادعاء العام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: 'دون إخلال بأي عقوبة أشد منصوص عليها في أنظمة أخرى، يعاقب بعقوبة أو أكثر من العقوبات الآتية : - غرامة مالية لا يقل مقدارها عن مئتي ألف ريال ولا يزيد على خمسمئة ألف ريال. - السجن مدة لا تزيد على خمس سنوات. - إلغاء الترخيص بمزاولة المهنة. كل من يرتكب أي مخالفة من المخالفات الآتية : 1 - ممارسة علاج العقم والإخصاب دون ترخيص أو في غير المستوى المرخص به. 2 - حقن نطف أو أجنة في امرأة من غير زوجها. 3 - حقن نطف أو أجنة بعد انتهاء العلاقة الزوجية. 4 - نقل لقائح أو أجنة تخص امرأة إلى رحم امرأة أخرى. 5 - التغرير بالمريض أو عدم استخدام الأسس الطبية السليمة في طريقة العلاج بقصد الابتزاز أو الاستغلال. 6 - التدخل في الخلايا أو الجينات الوراثية دون الحصول على موافقة سابقة من لجنة الإشراف . 7 - نقل الأعضاء التناسلية.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: 'دون إخلال بأي عقوبة أشد منصوص عليها في أنظمة أخرى- وفيما عدا المخالفات المنصوص عليها في المادة (الثانية والثلاثين) من هذا النظام- يعاقب كل من تثبت مخالفته أي حكم من أحكام هذا النظام أو لائحته التنفيذية بعقوبة أو أكثر من العقوبات الآتية: - الإنذار. - غرامة مالية لا تقل عن عشرين ألف ريال ولا تزيد على مئتي ألف ريال. - السجن لمدة لا تزيد عن سنتين. - إلغاء الترخيص بمزاولة المهنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الرابعة والثلاثون
  article_text_ar: يجوز للوزير أن يوقف مؤقتًا ترخيص مزاولة المهنة حتى صدور قرار لجنة النظر في المخالفات المنصوص عليها في المادة (الثامنة والعشرين) من هذا النظام، وذلك في حالة التلبس بارتكاب المخالفة أو توافر أدلة وقرائن ترجح الإدانة بارتكاب المخالفة، وإذا كان سيترتب على هذا الإيقاف المؤقت إلحاق ضرر بالمرضى المستفيدين، فعلى الوزير اتخاذ ما يجب لاستمرار تلقي المرضى ما يحتاجونه، ويحق لمن صدر بحقه هذا الأمر التظلم منه لدى ديوان المظالم خلال ثلاثين يومًا من إبلاغه به.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الخامسة والثلاثون
  article_text_ar: يجوز التظلم من قرار العقوبة أمام ديوان المظالم خلال ستين يومًا من تاريخ إبلاغه لمن صدر بحقه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السادسة والثلاثون
  article_text_ar: يجوز للوزير أن يأمر بتنفيذ القرار الصادر بالإلغاء أو الإيقاف المؤقت للترخيص بمزاولة المهنة من تاريخ صدوره، ولا يمنع التنفيذ الفوري للقرار التظلم منه أمام ديوان المظالم، على ألا يترتب على تقديم التظلم وقف تنفيذ القرار الفوري.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة السابعة والثلاثون
  article_text_ar: في حالة إلغاء الترخيص بمزاولة المهنة، لا يجوز النظر في طلب ترخيص جديد قبل انقضاء مدة ثلاث سنوات من تاريخ صدور قرار الإلغاء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الثامنة والثلاثون
  article_text_ar: يجوز أن يتضمن قرار العقوبة النهائي نشر منطوق القرار على نفقة المخالف فيما لا يزيد على ثلاث صحف محلية تصدر إحداها على الأقل في مقر إقامته، فإن لم يكن هناك صحيفة في المنطقة ففي الصحيفة الصادرة في أقرب منطقة لها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة التاسعة والثلاثون
  article_text_ar: فيما لم يرد بشأنه نص في هذا النظام، تخضع وحدات الإخصاب والأجنة وعلاج العقم لنظام مزاولة مهنة الطب البشري وطب الأسنان ونظام المؤسسات الصحية الخاصة ونظام مزاولة مهنة الصيدلة والأنظمة الأخرى ذات العلاقة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الأربعون
  article_text_ar: يصدر الوزير اللائحة التنفيذية لهذا النظام خلال مئة وعشرين يومًا من تاريخ نشره، وتنشر في الجريدة الرسمية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
- article_ref: المادة الحادية والأربعون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به بعد مئة وعشرين يومًا من تاريخ نشره، وعلى وحدات الإخصاب والأجنة وعلاج العقم القائمة وقت صدوره استكمال الشروط والمتطلبات اللازمة وتصحيح أوضاعها خلال مئة وعشرين يومًا من تاريخ العمل به، على أن يعرض أمرها بعد مضي هذه المدة على لجنة الإشراف للنظر في استمرار ترخيصها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/4943163b-a079-4beb-b544-a9a700f286b1/1
  verified: false
