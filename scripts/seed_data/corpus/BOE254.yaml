articles:
- article_ref: المادة الأولى
  article_text_ar: ديوان المراقبة العامة جهاز مستقل مرجعه رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثانية
  article_text_ar: يشكل الديوان من رئيس ونائب للرئيس ومن عدد كاف من الموظفين.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثالثة
  article_text_ar: يتم تعيين رئيس الديوان بأمر ملكي، ولا يجوز عزله أو إحالته إلى التقاعد إلا بأمر ملكي. ويعامل من حيث المرتب الشهري ومرتب التقاعد وقواعد الاتهام والمحاكمة معاملة الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الرابعة
  article_text_ar: يتم تعيين نائب رئيس الديوان بأمر ملكي في المرتبة الخامسة عشرة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الخامسة
  article_text_ar: يتولى رئيس الديوان الإشراف على تنظيم الديوان، وكل ما يتعلق بإدارة أعماله وشئون موظفيه، ويكون له في كل ذلك ما للوزير في وزارته من صلاحيات. وتسري على موظفي الديوان جميع القواعد الموضوعة لسائر موظفي الحكومة، إلا ما ورد بشأنه نص خاص في هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة السادسة
  article_text_ar: لرئيس الديوان أن يفوض عنه نائبه في مباشرة بعض صلاحياته، وينوب نائب الرئيس عن رئيس الديوان ويقوم بجميع صلاحياته عند غيابه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة السابعة
  article_text_ar: يختص الديوان بالرقابة اللاحقة على جميع إيرادات الدولة ومصروفاتها، وكذلك مراقبة كافة أموال الدولة المنقولة والثابتة ومراقبة حسن استعمال هذه الأموال واستغلالها والمحافظة عليها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثامنة
  article_text_ar: 'تنفيذا لأحكام المادة السابقة يعمل الديوان على إعداد اللوائح التنفيذية، والتصديق عليها من رئيس مجلس الوزراء، وإيجاد الأجهزة اللازمة التي تكفل ما يأتي: 1 - التحقق من أن جميع إيرادات الدولة ومستحقاتها من أموال وأعيان وخدمات قد أدخلت في ذمتها وفقا للنظم السارية، وأن كافة مصروفاتها قد تمت وفقا لأحكام الميزانية السنوية، وطبقا للنظم واللوائح الإدارية والمالية والحسابية النافذة.2 - التحقق من أن كافة أموال الدولة المنقولة والثابتة تستعمل في الأغراض التي خصصت من أجلها قبل الجهة المختصة، وأن لدى هذه الجهات من الإجراءات ما يكفل سلامة هذه الأموال وحسن استعمالها واستغلالها، ويضمن عدم إساءة استعمالها أو استخدامها في غير الأغراض التي خصصت من أجلها.3 - التحقق من أن كل جهة من الجهات الخاضعة لرقابة الديوان - وفقا لأحكام المادة التاسعة - تقوم بتطبيق الأنظمة واللوائح المالية والحسابية التي تخضع لها وفقا لنظامها الخاص تطبيقا كاملا وأنه ليس في تصرفاتها المالية ما يتعارض مع تلك الأنظمة واللوائح.4 - متابعة الأنظمة واللوائح المالية والحسابية النافذة للتحقق من تطبيقها وكفايتها وملاءمتها للتطورات
    التي تستجد على الإدارة العامة بالمملكة، وتوجيه النظر إلى أوجه النقص في ذلك، وتقديم الاقتراحات اللازمة لتطوير هذه الأنظمة واللوائح أو تغييرها.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة التاسعة
  article_text_ar: 'تخضع لرقابة الديوان وفقا لأحكام هذا النظام: 1 - جميع الوزارات والإدارات الحكومية وفروعها.2 - البلديات وإدارات العيون ومصالح المياه.3 - المؤسسات العامة والإدارات الأخرى ذات الميزانيات المستقلة التي تخرج لها الحكومة جزءا من مال الدولة إما بطريق الإعانة أو لغرض الاستثمار.4 - كل مؤسسة خاصة أو شركة تساهم الدولة في رأس مالها أو تضمن لها حدا أدنى من الأرباح، على أن تتم الرقابة عليها وفق تنظيم خاص يعده الديوان ويصدر به قرار من مجلس الوزراء يحدد فيه مدى هذه الرقابة بحيث تتناسب مع طبيعة عملها ومدى علاقتها المالية بالدولة، وبحيث لا يعرقل نشاطها.5 - كل هيئة يكلف الديوان بمراقبة حساباتها بأمر من رئيس مجلس الوزراء أو بقرار من مجلس الوزراء.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة العاشرة
  article_text_ar: على جميع الجهات الخاضعة لرقابة الديوان تقديم كافة البيانات الحسابية وغيرها والمستندات والوثائق التي تمكن الديوان من مباشرة اختصاصاته وفقا لهذا النظام، وكذلك تقديم كافة التسهيلات اللازمة لمندوبيه ومفتشيه وفقا للوائح التنفيذية التي تصدر بهذا الصدد.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الحادية عشرة
  article_text_ar: يبلغ الديوان ملاحظاته إلى الجهة المختصة، ويطلب إليها اتخاذ الإجراءات اللازمة. وعلى الجهة أن تخبر الديوان بما اتخذته في خلال مدة أقصاها شهر من تاريخ إبلاغها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثانية عشرة
  article_text_ar: 'تفترض مسئولية مدير الشئون المالية الشخصية أو من يقوم مقامه في الأحوال التالية ما لم يثبت أن شخصا آخر بعينه هو المسئول: 1 - أية مخالفة لأحكام المادة الحادية عشرة.2 - تأخر إرسال البيانات المطلوبة والتقارير الدورية إلى الديوان عن مواعيدها المحددة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثالثة عشرة
  article_text_ar: إذا وقع خلاف بين الجهة المختصة وبين الديوان ولم تقتنع الجهة بوجهة نظر الديوان الأخيرة وجب عليه عندئذ عرض الأمر في الحال على رئيس مجلس الوزراء للفصل فيه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الرابعة عشرة
  article_text_ar: يلتزم الديوان باتخاذ الإجراءات الكفيلة بالمحافظة التامة على أسرار الجهات التي يقوم بمراقبتها.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الخامسة عشرة
  article_text_ar: 'تعتبر المخالفات المالية ما يلي: 1 - مخالفة أي حكم من أحكام هذا النظام أو اللوائح التنفيذية التي تصدر تنفيذا لأحكامه.2 - مخالفة أي حكم من أحكام أنظمة الدولة ولوائحها المتعلقة بالمحافظة على أموالها المنقولة والثابتة، وتنظيم شئونها المالية، كأحكام الميزانية والأنظمة المالية والحسابية ولوائح المستودعات.3 - كل إهمال أو تقصير يترتب عليه ضياع حق من الحقوق المالية للدولة، أو تعريض مصلحة من مصالحها المالية للخطر، أو يكون من شأنه أن يؤدي إلى ذلك.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة السادسة عشرة
  article_text_ar: في حالة اكتشاف مخالفة فللديوان أن يطلب تبعا لأهمية المخالفة من الجهة التابع لها الموظف إجراء التحقيق اللازم، ومعاقبته إداريا، أو أن يقوم الديوان بتحريك الدعوى العامة ضد الموظف المسئول أمام الجهة المختصة نظاما بإجراءات التأديب.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة السابعة عشرة
  article_text_ar: على كل جهة من الجهات المنصوص عليها في الفقرات (1) و (2) و (3) من المادة التاسعة إحاطة الديوان فور اكتشافها لأية مخالفة مالية أو وقوع حادث من شأنه أن تترتب عليه خسارة مالية للدولة، وذلك دون إخلال بما يجب أن تتخذه تلك الجهة من إجراءات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثامنة عشرة
  article_text_ar: لا يجوز التجاوز عن أية مخالفة مالية إلا بقرار من مجلس الوزراء بعد أخذ رأي ديوان المراقبة العامة في ذلك.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة التاسعة عشرة
  article_text_ar: استثناءً من أحكام المادة السابقة لرئيس الديوان سلطة التجاوز عن المخالفات المالية البسيطة التي لا تلحق بالخزينة العامة ضررا، ولا تتجاوز قيمتها خمسمائة ريال، وذلك متى قام الموظف المسئول بإعادة المبلغ إلى الخزينة ووجدت مبررات للتجاوز يقتنع بها رئيس الديوان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة العشرون
  article_text_ar: 'يجب على رئيس الديوان رفع تقرير سنوي عن كل سنة مالية في فترة لا تتجاوز بأية حال من الأحوال اليوم الأخير من الشهر التاسع للسنة المالية التالية، فإذا صادف ذلك اليوم يوم عطلة رسمية وجب تقديم التقرير في اليوم الذي يليه، على أن يشتمل التقرير على ما يلي: 1 - تقييم للإدارة المالية للدولة بصفة عامة خلال تلك السنة.2 - تقييم للإدارة المالية لكل جهة من الجهات الخاضعة لرقابة الديوان خلال تلك السنة.3 - بيان عن الحساب الختامي لتلك السنة، فإذا لم يتم تقديم الحساب الختامي من وزارة المالية قبل حلول موعد التقرير السنوي بوقت كاف وجب أن يشتمل التقرير على بيان الأسباب التي حالت دون تقديم الحساب الختامي ورأي الديوان في ذلك، لا سيما بالنسبة للخطوات التي يرى الديوان اتباعها لإزالة تلك الأسباب.4 - بيان موجز عن أعمال الديوان خلال تلك السنة.'
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الحادية والعشرون
  article_text_ar: يرفع التقرير السنوي المشار إليه في المادة السابقة إلى جلالة الملك، على أن ترسل صورة منه إلى مجلس الوزراء وأخرى إلى وزارة المالية والاقتصاد الوطني.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثانية والعشرون
  article_text_ar: لرئيس الديوان - دون إخلال بأحكام المادة العشرين - أن يرفع تقارير أخرى خلال السنة، سواء كانت تقارير عامة أو خاصة بموضوع معين أو قضية معينة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثالثة والعشرون
  article_text_ar: يجب أن ترسل إلى الديوان نسخة أصلية من عقود التوريدات والتعهدات والأعمال والخدمات، وعلى وجه العموم كل عقد أو اتفاق تبرمه إحدى الجهات المنصوص عليها في الفقرات (1) و (2) و (3) من المادة التاسعة يكون من شأنه ترتيب حقوق أو التزامات مالية للدولة أو عليها تزيد قيمتها عن (50.000) خمسين ألف ريال سعودي فور إبرامها، ويجب أن تكون تلك النسخة مصحوبة بكافة ما يتعلق بالعقد من وثائق ومستندات وبيانات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الرابعة والعشرون
  article_text_ar: على رئيس الديوان تحديد الإجراءات اللازمة لمباشرة اختصاصات الديوان المتعلقة بالمؤسسات والهيئات المنصوص عليها في الفقرتين (3 و4) من المادة التاسعة، بما يتفق وأنظمتها المالية الخاصة ويتلاءم مع طبيعة أعمالها ويتناسب مع استقلال هذه المؤسسات والهيئات.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الخامسة والعشرون
  article_text_ar: 1 - على رئيس الديوان تحديد النسب المئوية لأعمال المراجعة التي يقوم بها الديوان ووضع إجراءات اختيار العينات على أسس علمية وفقا للطرق الإحصائية وعلى ضوء الحاجة والخبرة، وذلك بالنسبة لكل فئة من المستندات والعمليات التي يقوم الديوان بمراجعتها لكل جهة من الجهات الخاضعة لرقابة الديوان.2 - يتم تحديد النسب المئوية هذه من قبل رئيس الديوان في لوائح سرية يصدرها لذلك وتوضع إجراءات للمحافظة على سريتها التامة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة السادسة والعشرون
  article_text_ar: لرئيس الديوان بناء على اقتراح منه وموافقة رئيس مجلس الوزراء صرف مكافأة تشجيعية لموظفي الديوان الذين يؤدي اجتهادهم إلى توفير مبالغ ضخمة للخزينة العامة، أو إنقاذ كمية كبيرة من أموال الدولة من خطر محقق. وتصرف تلك المكافآت من الاعتماد الذي يخصص في ميزانية الديوان لهذا الغرض، على ألا يتجاوز ما يصرف للموظف رواتب ثلاثة أشهر في السنة.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة السابعة والعشرون
  article_text_ar: يضع رئيس الديوان مشروع ميزانية الديوان طبقا للقواعد المعمول بها في الإدارات الحكومية.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثامنة والعشرون
  article_text_ar: 1- لا يجوز لرئيس الديوان ونائبه ولا أي موظف من موظفي الديوان الآخرين في أثناء توليه وظيفته، أن يزاول أي عمل حكومي آخر بمرتب أو بمكافأة من خزانة الدولة، أو أن يقبل عضوية أية شركة أو هيئة مالية، سواء كان ذلك بمقابل أم بدون مقابل، أو أن يزاول أي عمل تجاري أو مهني.2- بالإضافة إلى ما يرد في الفقرة السابقة لا يجوز لأي من رئيس الديوان ونائبه في أثناء توليه وظيفته أن يشتري شيئا من أموال الدولة أو أن يؤجرها أو يبيعها شيئا من أمواله أو يقايضها عليه.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة التاسعة والعشرون
  article_text_ar: يصرف بدل تفرغ لمن يستحق من موظفي الديوان الفنيين بقرار من مجلس الوزراء بناء على اقتراح رئيس الديوان.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثلاثون
  article_text_ar: يعمل الديوان على إعداد اللوائح التنفيذية اللازمة لتنفيذ هذا النظام والتصديق عليها من رئيس مجلس الوزراء.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الحادية والثلاثون
  article_text_ar: مجلس الوزراء هو الجهة المختصة بتفسير أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثانية والثلاثون
  article_text_ar: تطبق أحكام نظام الموظفين العام في الحالات التي لم يرد في شأنها نص خاص في أحكام هذا النظام.
  source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/5dc538d4-5bbd-4995-8f0c-a9a700f2c88c/1
  verified: false
- article_ref: المادة الثالثة والثلاثون
  article_text_ar: ينشر هذا النظام في الجريدة الرسمية، ويعمل به من تاريخ نشره. ويلغي كل ما يخالفه من أحكام،،،
