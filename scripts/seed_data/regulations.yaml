# SANAD seed corpus — small, real, human-verified PDPL + Labor Law articles.
#
# PROVENANCE / HUMAN GATE:
#   Every article below carries article_ref + source_url pointing at the official source.
#   The seed inserts them with verified_by = the seed verifier user (a stand-in for the
#   human verification gate). Before any production deployment, a qualified reviewer MUST
#   reconcile each article_text_ar against the official gazette (laws.boe.gov.sa /
#   sdaia.gov.sa / hrsd.gov.sa) and re-verify. Text here is faithful in substance and kept
#   short; it is NOT a substitute for the verbatim official text.
#
# This keeps the Phase A slice runnable end-to-end with a real, cited corpus.

verifier:
  email: verifier@sanad.local
  display_name: Seed Verifier
  role: admin

regulations:
  - code: PDPL
    name_ar: نظام حماية البيانات الشخصية
    name_en: Personal Data Protection Law
    authority: SDAIA
    source_domain: sdaia.gov.sa
  - code: LABOR
    name_ar: نظام العمل
    name_en: Saudi Labor Law
    authority: وزارة الموارد البشرية والتنمية الاجتماعية
    source_domain: hrsd.gov.sa

articles:
  - regulation: PDPL
    article_ref: Article 4
    article_text_ar: >-
      يكون لصاحب البيانات الشخصية وفقاً لأحكام هذا النظام ولوائحه الحقوق الآتية: الحق في
      العلم، ويشمل الحق في معرفة الأساس النظامي لجمع بياناته الشخصية والغرض من معالجتها؛
      والحق في الوصول إلى بياناته الشخصية المحفوظة لدى جهة التحكم؛ والحق في طلب الحصول على
      بياناته الشخصية بصيغة واضحة ومقروءة؛ والحق في طلب تصحيح بياناته أو استكمالها أو
      تحديثها؛ والحق في طلب إتلاف بياناته الشخصية التي لم تعد لازمة.
    article_text_en: >-
      The data subject shall, in accordance with this Law and its Regulations, have the
      following rights: the right to be informed of the legal basis and purpose of
      collecting personal data; the right to access personal data held by the controller;
      the right to request a copy of personal data in a clear and readable format; the
      right to request correction, completion or updating of the data; and the right to
      request destruction of personal data that is no longer needed.
    source_url: https://sdaia.gov.sa/en/SDAIA/about/Documents/Personal%20Data%20English%20V2-23April2023-Reviewed-.pdf
    effective_date: 2023-09-14

  - regulation: PDPL
    article_ref: Article 5
    article_text_ar: >-
      لا يجوز معالجة البيانات الشخصية إلا بعد موافقة صاحبها وفقاً للأحوال والضوابط المنصوص
      عليها في هذا النظام ولوائحه، ويجب أن تكون الموافقة صادرة عن إرادة حرة، ولصاحب البيانات
      الرجوع عن موافقته في أي وقت. وتحدد اللوائح الحالات التي تجوز فيها المعالجة دون موافقة.
    article_text_en: >-
      Personal data may not be processed without the consent of its owner, except in the
      cases and according to the controls set out in this Law and its Regulations. Consent
      must be freely given, and the data subject may withdraw consent at any time. The
      Regulations specify the cases in which processing without consent is permitted.
    source_url: https://sdaia.gov.sa/en/SDAIA/about/Documents/Personal%20Data%20English%20V2-23April2023-Reviewed-.pdf
    effective_date: 2023-09-14

  - regulation: PDPL
    article_ref: Article 29
    article_text_ar: >-
      يجوز لجهة التحكم نقل البيانات الشخصية إلى جهة خارج المملكة أو الإفصاح عنها لجهة خارجها
      في الحالات ووفق الضوابط التي تحددها اللوائح، بما لا يخل بأمن المملكة ومصالحها الحيوية،
      وبعد التحقق من توافر مستوى ملائم من الحماية للبيانات الشخصية خارج المملكة لا يقل عن
      المستوى المقرر في هذا النظام ولوائحه، وأن يقتصر النقل أو الإفصاح على الحد الأدنى اللازم.
    article_text_en: >-
      The controller may transfer personal data outside the Kingdom or disclose it to a
      party outside the Kingdom in the cases and according to the controls specified by the
      Regulations, without prejudice to the security of the Kingdom and its vital
      interests, after verifying that an adequate level of protection no less than that
      provided by this Law is available outside the Kingdom, and provided the transfer or
      disclosure is limited to the minimum necessary.
    source_url: https://sdaia.gov.sa/en/SDAIA/about/Documents/Personal%20Data%20English%20V2-23April2023-Reviewed-.pdf
    effective_date: 2023-09-14

  - regulation: PDPL
    article_ref: Article 35
    article_text_ar: >-
      يعاقب بالسجن مدة لا تزيد على سنتين وبغرامة لا تزيد على ثلاثة ملايين ريال، أو بإحدى
      هاتين العقوبتين، كل من أفشى بيانات شخصية حساسة أو أتاحها للغير بقصد الإضرار بصاحب
      البيانات أو تحقيق منفعة له أو لغيره، وذلك خلافاً لأحكام هذا النظام.
    article_text_en: >-
      A penalty of imprisonment for a term not exceeding two years and a fine not exceeding
      three million riyals, or either penalty, shall be imposed on anyone who discloses or
      makes available sensitive personal data to others with the intent to harm the data
      subject or to achieve a benefit for himself or others, in violation of this Law.
    source_url: https://sdaia.gov.sa/en/SDAIA/about/Documents/Personal%20Data%20English%20V2-23April2023-Reviewed-.pdf
    effective_date: 2023-09-14

  - regulation: LABOR
    article_ref: Article 77
    article_text_ar: >-
      إذا أنهى أحد طرفي العقد العقد لسبب غير مشروع، كان للطرف الآخر الحق في تعويض تحدده
      المحكمة، ما لم يكن هناك تعويض متفق عليه في العقد؛ ويقدر التعويض في العقد غير محدد
      المدة بأجر خمسة عشر يوماً عن كل سنة من سنوات خدمة العامل، على ألا يقل التعويض عن أجر
      شهرين. وفي العقد محدد المدة يقدر بأجر المدة الباقية من العقد.
    article_text_en: >-
      If either party terminates the contract for an unlawful reason, the other party shall
      be entitled to compensation assessed by the court, unless compensation is agreed in
      the contract. For an indefinite-term contract, compensation is the wage of fifteen
      days for each year of the worker's service, and shall not be less than two months'
      wage. For a fixed-term contract it equals the wage for the remaining period.
    source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b7cfae89-828e-4994-b167-a9a700f2ec1d/1
    effective_date: 2005-04-23

  - regulation: LABOR
    article_ref: Article 98
    article_text_ar: >-
      لا يجوز تشغيل العامل تشغيلاً فعلياً أكثر من ثماني ساعات في اليوم الواحد إذا اعتمد صاحب
      العمل المعيار اليومي، أو أكثر من ثمان وأربعين ساعة في الأسبوع إذا اعتمد المعيار
      الأسبوعي. وتخفض ساعات العمل الفعلية خلال شهر رمضان للعمال المسلمين بحيث لا تزيد على
      ست ساعات في اليوم أو ست وثلاثين ساعة في الأسبوع.
    article_text_en: >-
      A worker may not be required to work actually for more than eight hours per day where
      the employer adopts the daily standard, or more than forty-eight hours per week where
      the weekly standard is adopted. Actual working hours during Ramadan for Muslim workers
      are reduced so as not to exceed six hours per day or thirty-six hours per week.
    source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b7cfae89-828e-4994-b167-a9a700f2ec1d/1
    effective_date: 2005-04-23

  - regulation: LABOR
    article_ref: Article 109
    article_text_ar: >-
      يستحق العامل عن كل عام إجازة سنوية مدفوعة الأجر لا تقل مدتها عن واحد وعشرين يوماً،
      تُزاد إلى مدة لا تقل عن ثلاثين يوماً إذا أمضى العامل في خدمة صاحب العمل خمس سنوات
      متصلة. ويجب أن يتمتع العامل بإجازته في سنة استحقاقها، ولا يجوز النزول عنها.
    article_text_en: >-
      A worker is entitled to a paid annual leave of not less than twenty-one days for each
      year, increased to not less than thirty days if the worker has completed five
      consecutive years in the employer's service. The worker must take the leave in the
      year it is due and may not waive it.
    source_url: https://laws.boe.gov.sa/BoeLaws/Laws/LawDetails/b7cfae89-828e-4994-b167-a9a700f2ec1d/1
    effective_date: 2005-04-23
